  trans: '

    ##### 通过命中测试正确传递触摸事件


    让 cocos2d 视图后方的视图响应触摸事件的最简单方法，是完全禁用 cocos2d 视图上的触摸输入。如果你添加以下这行代码，将不再从 `CCTouchDispatcher`
    接收任何消息：


    ```

    // 这会禁用 cocos2d 视图上的所有触摸事件

    glView.userInteractionEnabled = NO;

    ```


    现在，cocos2d 视图后方的文本字段可以正常工作，但 cocos2d 视图的触摸输入被禁用了。位于 cocos2d 视图前方的 UIKit 视图也应该正常工作并响应触摸，除非你直接将它们添加到了
    cocos2d 的 `glView` 上，而不是添加到了虚拟视图上。


    你可能会想，为什么禁用 cocos2d 视图上的触摸输入是最好的，或者说至少是最简单的选项。为此，你必须理解，cocos2d 视图是一个覆盖整个屏幕区域的
    `UIView`。尽管你现在可以看穿它（因为你已经将其设置为透明），但它仍然会积极响应 `UIView` 的 `hitTest` 事件。毕竟，任何触摸都在屏幕上的某个位置，并且由于
    cocos2d 视图与屏幕一样大，并且不考虑其视图内实际显示的内容，所以它会积极响应命中测试。因此，任何到达 cocos2d 视图的触摸都将由其（或者更准确地说是
    `CCTouchDispatcher` 类）处理。cocos2d 视图下方的任何内容都无法接收触摸事件。


    不幸的是，cocos2d 没有一个内置系统来将 `hitTest` 事件转发给它的节点，以便让它们决定是否真的需要响应触摸。我将向你展示一个解决方案，该方案使用节点的边界框，但需要对
    cocos2d 代码进行一些修改。


    **注意：** 只有当你的项目中绝对需要时，才将以下命中测试代码添加到 `EAGLView` 类中。每当触发触摸事件时（基本上只要用户至少有一根手指在触摸屏上），它都会对性能产生负面影响。场景中的节点越多，性能损失就越大。


    如果你想执行自定义命中测试，首要任务是确保 `userInteractionEnabled` 被设置为 `YES`。请立即执行此操作；否则，你可能会忘记 `userInteractionEnabled`
    属性，转而开始在命中检测代码中寻找错误。


    现在，打开 `EAGLView.m` 文件，你可以在 Xcode 项目中的 `/libs/cocos2d/Platforms/iOS` 组中找到它。在文件开头添加以下
    `#import` 语句，因为 `EAGLView` 类需要了解这些 cocos2d 类：


    ```

    #import "CCArray.h"

    #import "CCScene.h"

    #import "CCLayer.h"

    ```


    现在，在 `EAGLView` 类的实现部分中的某个位置，覆盖 列表 15–4 中所示的 `hitTest` 方法。此方法是 `UIView` 类的一部分，当
    UIKit 框架试图确定哪个视图需要响应触摸事件时，会调用该方法。该方法要么返回一个 `UIView` 实例（该实例应接收触摸输入），要么返回 `nil`
    以表示命中测试失败，在这种情况下，UIKit 框架会继续寻找可能想要处理触摸事件的其他视图。


    **列表 15–4.** *准备对 cocos2d 场景的所有子节点进行命中测试*


    ```

    -(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event

    {

        UIView* hitView = [super hitTest:point withEvent:event];


        if (hitView == self)

        {

            CCScene* runningScene = [CCDirector sharedDirector].runningScene;

            CCArray* sceneChildren = [runningScene children];

            CGPoint glPoint = [[CCDirector sharedDirector] convertToGL:point];


            bool hit = [self hitTestNodeChildren:sceneChildren point:glPoint];

            return (hit ? self : nil);

        }


        return hitView;

    }

    ```


    在这种情况下，我们首先调用父类的实现来获取 `hitTest` 通常返回的视图。在绝大多数情况下，这将是 `EAGLView` 本身，但由于你可以向 `EAGLView`
    添加子视图，它可能会返回一个子视图，在这种情况下，你需要允许该子视图处理触摸。


    否则，通过 `CCDirector` 获取 `runningScene`，这使你能够通过 `children` 数组访问 cocos2d 节点层次结构。由于
    `hitTest` 点是 Cocoa Touch 坐标，因此你还需要将其转换为 GL 坐标，然后再将 `sceneChildren` 和 `glPoint`
    传递给 `hitTestNodeChildren` 方法。如果该方法返回命中，则 `hitTest` 通过返回 `self` 来响应。否则，它通过返回 `nil`
    使 `hitTest` 失败，允许 cocos2d 视图后面的所有视图轮流进行命中测试。


    列表 15–5 中的 `hitTestNodeChildren` 方法更复杂且更难理解，因为它使用递归来遍历 cocos2d 节点层次结构。换句话说，该函数可以调用自身以深入到更深的
    cocos2d 节点层次结构中。将 `hitTestNodeChildren` 方法添加到 `hitTest` 方法之上。


    **列表 15–5.** *递归测试所有节点，检查其 boundingBox 是否包含给定点*


    ```

    -(BOOL) hitTestNodeChildren:(CCArray*)children point:(CGPoint)point

    {

        bool hit = NO;


        if ([children count] > 0)

        {

            Class sceneClass = [CCScene class];

            Class layerClass = [CCLayer class];

            CCNode* node = nil;

            CCARRAY_FOREACH(children, node)

            {

                // 首先检查节点的子节点

                hit = [self hitTestNodeChildren:[node children] point:point];


                // 首次命中则中止搜索

                if (hit)

                {

                    break;

                }


                // 场景/图层始终是全屏的，因此不对它们进行命中测试

                if ([node isKindOfClass:sceneClass] || [node isKindOfClass:layerClass])

                {

                    continue;

                }

                // 检查节点本身

                hit = CGRectContainsPoint([node boundingBox], point);


                // 首次命中则中止搜索

                if (hit)

                {

                    break;

                }

            }

        }


        return hit;

    }

    ```


    `CCARRAY_FOREACH` 循环的前半部分简单地通过使用当前节点的子节点递归调用函数，深入到 cocos2d 节点层次结构中。如果任何递归调用找到了命中，则立即中止循环。


    在后半部分，检查正在迭代的实际节点。这里执行实际的命中测试，首先确保我们不是在测试 `CCScene` 或 `CCLayer` 类节点。原因是它们的 `boundingBox`
    都被设置为整个屏幕区域。如果你测试这些类中的任何一个，你总是会“命中”它们，而这正是你想要避免的。


    现在，我们确定测试的节点具有合理的边界框，实际检查就简单了，只需测试该点是否在 `boundingBox` 内：


    ```

    hit = CGRectContainsPoint([node boundingBox], point);

    ```


    同样，如果存在命中，则循环中止，方法返回。这是一种优化，因为我们只需要找到任何对命中测试给出肯定响应的节点。

    '
- fmt: "Obviously, this solution has some drawbacks. For one, it assumes that a node\
    \ should get a touch event if the touch is inside its `boundingBox`. What it doesn’t\
    \ know is whether there’s some kind of game state that would prevent the node\
    \ from processing the touch, for example if the node is a `CCMenuItem` that is\
    \ currently disabled. Or, if the touch is on a sprite that actually performs a\
    \ pixel-perfect collision check, in that case the bounding box check is too broad.\
    \ Moreover, the `boundingBox` is excessively large when the node is rotated because\
    \ it is an axis-aligned bounding box that changes in size as the node rotates.\n\
    \nWhat you can do to alleviate this situation is to add a `hitTest` method to\
    \ the `CCNode` class, which performs just the bounding box check by default but\
    \ can be overridden by subclasses to perform more accurate or conditional checks.\
    \ You’ll find this minor code change in the CocosWithCocoa04 project along with\
    \ additional debug logging and touch detection code to help you understand the\
    \ hit testing process.\n\n### Sandwiching the cocos2d View\n\nJust for completing\
    \ this test, I’d like to add another text field but in front of the cocos2d view\
    \ so that we truly have a sandwiched cocos2d view with UIKit views in the back\
    \ and in the front and all of them will be able to respond to touches.\n\nThe\
    \ change is rather simple; just add this code at the end of the `addSomeCocoaTouch`\
    \ method, and make sure you add the `textFieldFront` as subview of the `dummyView`\
    \ and not the `glView`:\n\n```\nUITextField* textFieldFront = [[UITextField alloc]\
    \ initWithFrame:\n    CGRectMake(280, 40, 200, 24)];\ntextFieldFront.text = @\"\
    \  On top of Cocos2D\";\ntextFieldFront.borderStyle = UITextBorderStyleRoundedRect;\n\
    textFieldFront.delegate = self;\n\n[dummyView addSubview:textFieldFront];\n[textFieldFront\
    \ release];\n```\n\nActually, you could also add the `textFieldFront` to the `glView`\
    \ as a subview without any immediately noticeable change. But adding the text\
    \ field to the `dummyView` allows you to reorder it in the view hierarchy at any\
    \ time; for example, you could move it behind the cocos2d view using the `sendSubviewToBack`\
    \ method of the `dummyView`. You wouldn’t be able to do that if you add the view\
    \ directly to cocos2d’s `glView`.\n\nCheck out [Figure 15–4](#Chapter15.html#fig_15_4)\
    \ with the result. You’ll have UIKit views on top of the cocos2d view and behind\
    \ it. The text view at the back can still be edited and manipulated as the `Cut,\
    \ Copy, Paste, Replace` button shows. More importantly, despite the accompanying\
    \ text field being behind the cocos2d view, the `Cut, Copy, Paste, Replace` pop-over\
    \ button is automatically on top of the cocos2d view. Just how it ought to be!\n\
    \n![images](images/1504.jpg)\n\n**Figure 15–4.** *UIKit views on top and behind\
    \ the cocos2d view, with input enabled for all of them*\n\n### Adding Views Designed\
    \ with Interface Builder\n\nAt this point, you may be wondering how you could\
    \ add a view that was designed with Apple’s Interface Builder. Let’s tackle this\
    \ now. Code-wise, it’s surprisingly simple, and you can look it up in the CocosWithCocoa05\
    \ project if you want.\n\nThe first order of business is to create an Interface\
    \ Builder resource file. In Xcode 4 you create them comfortably from within the\
    \ project using the **File > New > New File** command from the menu, or right-click\
    \ a group and select **New File**.\n\nYou’ll be prompted to choose a template\
    \ from the file template dialog. As you can see in [Figure 15–5](#Chapter15.html#fig_15_5),\
    \ you should create the Interface Builder file using the `UIViewController` subclass\
    \ template. This will also create the Interface Builder nib file for you and connect\
    \ it with your view controller, which is essential for the view to work.\n\n![images](images/1505.jpg)\n\
    \n**Figure 15–5.** *Create an Interface Builder view by creating a `UIViewController`\
    \ subclass.*\n\nMake sure that the check box **WithXIB for user interface** in\
    \ [Figure 15–6](#Chapter15.html#fig_15_6) is checked, and make sure the **Subclass\
    \ of** text is the `UIViewController`. I decided to save this template using the\
    \ file name MyView.m. You should end up with three new files in your project:\
    \ `MyView.h`, `MyView.m`, and `MyView.xib`.\n\n**NOTE:** The developer documentation\
    \ and even the Cocoa Touch API refers to Interface Builder files as *nib files*\
    \ even though they use the extension .xib. They used to have the .nib extension,\
    \ and it simply stuck as a tradition even though the file extension was changed\
    \ years ago. So, *nib* and *xib* are used interchangeably and refer to the same\
    \ thing.\n\n![images](images/1506.jpg)\n\n**Figure 15–6.** *Make sure “With XIB\
    \ for user interface” is checked.*\n\nIf you click the `MyView.xib` file, you’ll\
    \ be presented with the Interface Builder, which is no longer a separate application\
    \ but integrated into Xcode 4\\. You’ll see an iPhone screen’s view onto which\
    \ you can drag and drop views from the Object Library, accessible via **View >\
    \ Utilities > Object Library** in case it’s not currently visible.\n\nWith Interface\
    \ Builder, you can easily create your UIKit user interface visually. Since it’s\
    \ beyond the scope of the book to explain the Interface Builder workflow, I’ll\
    \ refer you to Apple’s Xcode 4 User Guide and specifically the section on Designing\
    \ User Interfaces:\n\n`http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/InterfaceBuilder/InterfaceBuilder.html`\n\
    \nWhile I’m at it, if you need a refresher or introduction to Views and Windows,\
    \ take a look at Apple’s View Programming Guide for iOS:\n\n`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html`\n\
    \n**NOTE:** Unfortunately, you cannot use Interface Builder to design your cocos2d\
    \ view. For that you will have to use a separate editor like CocoShop, CocoaBuilder,\
    \ LevelHelper, or any other editing tool with cocos2d support that fits your need.\
    \ Please refer to [Chapter 17](#Chapter17.html#ch17) for a list of cocos2d editing\
    \ tools.\n\nFor now, it is sufficient to just add any views to the Interface Builder\
    \ view, like sliders, buttons, labels, and whatnot. But ideally you should at\
    \ least do the following: select the main view and bring up the Attributes Inspector\
    \ via **View > Utilities > Attributes Inspector**. The first attribute under Simulated\
    \ Metrics is called Orientation, and you should change that to Landscape since\
    \ the application is currently only capable of running in Landscape mode. If you\
    \ don’t do that, your views will be rotated by 90 degrees when you run the application."
  raw: 'Obviously, this solution has some drawbacks. For one, it assumes that a node
    should get a touch event if the touch is inside its `boundingBox`. What it doesn’t
    know is whether there’s some kind of game state that would prevent the node from
    processing the touch, for example if the node is a `CCMenuItem` that is currently
    disabled. Or, if the touch is on a sprite that actually performs a pixel-perfect
    collision check, in that case the bounding box check is too broad. Moreover, the
    `boundingBox` is excessively large when the node is rotated because it is an axis-aligned
    bounding box that changes in size as the node rotates.


    What you can do to alleviate this situation is to add a `hitTest` method to the
    `CCNode` class, which performs just the bounding box check by default but can
    be overridden by subclasses to perform more accurate or conditional checks. You’ll
    find this minor code change in the CocosWithCocoa04 project along with additional
    debug logging and touch detection code to help you understand the hit testing
    process.


    ##### Sandwiching the cocos2d View


    Just for completing this test, I’d like to add another text field but in front
    of the cocos2d view so that we truly have a sandwiched cocos2d view with UIKit
    views in the back and in the front and all of them will be able to respond to
    touches.


    The change is rather simple; just add this code at the end of the `addSomeCocoaTouch`
    method, and make sure you add the `textFieldFront` as subview of the `dummyView`
    and not the `glView`:


    `UITextField* textFieldFront = [[UITextField alloc] initWithFrame:`![image](images/U002.jpg)

    `    CGRectMake(280, 40, 200, 24)];`

    `textFieldFront.text = @"  On top of Cocos2D";`

    `textFieldFront.borderStyle = UITextBorderStyleRoundedRect;`

    `textFieldFront.delegate = self;`


    `[dummyView addSubview:textFieldFront];`

    `[textFieldFront release];`


    Actually, you could also add the `textFieldFront` to the `glView` as a subview
    without any immediately noticeable change. But adding the text field to the `dummyView`
    allows you to reorder it in the view hierarchy at any time; for example, you could
    move it behind the cocos2d view using the `sendSubviewToBack` method of the `dummyView`.
    You wouldn’t be able to do that if you add the view directly to cocos2d’s `glView`.


    Check out [Figure 15–4](#Chapter15.html#fig_15_4) with the result. You’ll have
    UIKit views on top of the cocos2d view and behind it. The text view at the back
    can still be edited and manipulated as the `Cut, Copy, Paste, Replace` button
    shows. More importantly, despite the accompanying text field being behind the
    cocos2d view, the `Cut, Copy, Paste, Replace` pop-over button is automatically
    on top of the cocos2d view. Just how it ought to be!


    ![images](images/1504.jpg)


    **Figure 15–4.** *UIKit views on top and behind the cocos2d view, with input enabled
    for all of them*


    #### Adding Views Designed with Interface Builder


    At this point, you may be wondering how you could add a view that was designed
    with Apple’s Interface Builder. Let’s tackle this now. Code-wise, it’s surprisingly
    simple, and you can look it up in the CocosWithCocoa05 project if you want.


    The first order of business is to create an Interface Builder resource file. In
    Xcode 4 you create them comfortably from within the project using the **File ![image](images/U001.jpg)
    New ![image](images/U001.jpg) New File** command from the menu, or right-click
    a group and select **New File**.


    You’ll be prompted to choose a template from the file template dialog. As you
    can see in [Figure 15–5](#Chapter15.html#fig_15_5), you should create the Interface
    Builder file using the `UIViewController` subclass template. This will also create
    the Interface Builder nib file for you and connect it with your view controller,
    which is essential for the view to work.


    ![images](images/1505.jpg)


    **Figure 15–5.** *Create an Interface Builder view by creating a UIViewController
    subclass.*


    Make sure that the check box **WithXIB for user interface** in [Figure 15–6](#Chapter15.html#fig_15_6)
    is checked, and make sure the **Subclass of** text is the `UIViewController`.
    I decided to save this template using the file name MyView.m. You should end up
    with three new files in your project: MyView.h, MyView.m, and MyView.xib.


    **NOTE:** The developer documentation and even the Cocoa Touch API refers to Interface
    Builder files as *nib files* even though they use the extension .xib. They used
    to have the .nib extension, and it simply stuck as a tradition even though the
    file extension was changed years ago. So, *nib* and *xib* are used interchangeably
    and refer to the same thing.


    ![images](images/1506.jpg)


    **Figure 15–6.** *Make sure “With XIB for user interface” is checked.*


    If you click the MyView.xib file, you’ll be presented with the Interface Builder,
    which is no longer a separate application but integrated into Xcode 4\. You’ll
    see an iPhone screen’s view onto which you can drag and drop views from the Object
    Library, accessible via **View ![image](images/U001.jpg) Utilities ![image](images/U001.jpg)
    Object Library** in case it’s not currently visible.


    With Interface Builder, you can easily create your UIKit user interface visually.
    Since it’s beyond the scope of the book to explain the Interface Builder workflow,
    I’ll refer you to Apple’s Xcode 4 User Guide and specifically the section on Designing
    User Interfaces:


    `http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual`

    `/Xcode4UserGuide/InterfaceBuilder/InterfaceBuilder.html`


    While I’m at it, if you need a refresher or introduction to Views and Windows,
    take a look at Apple’s View Programming Guide for iOS:


    `http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/V`

    `iewPG_iPhoneOS/Introduction/Introduction.html`


    **NOTE:** Unfortunately, you cannot use Interface Builder to design your cocos2d
    view. For that you will have to use a separate editor like CocoShop, CocoaBuilder,
    LevelHelper, or any other editing tool with cocos2d support that fits your need.
    Please refer to [Chapter 17](#Chapter17.html#ch17) for a list of cocos2d editing
    tools.


    For now, it is sufficient to just add any views to the Interface Builder view,
    like sliders, buttons, labels, and whatnot. But ideally you should at least do
    the following: select the main view and bring up the Attributes Inspector via
    **View ![image](images/U001.jpg) Utilities ![image](images/U001.jpg) Attributes
    Inspector**. The first attribute under Simulated Metrics is called Orientation,
    and you should change that to Landscape since the application is currently only
    capable of running in Landscape mode. If you don’t do that, your views will be
    rotated by 90 degrees when you run the application.'
  trans: "\n显然，这个方案存在一些缺陷。首先，它假设只要触摸点位于节点的 `boundingBox` 内，该节点就应该接收触摸事件。但它无法判断是否存在某种游戏状态会阻止节点处理触摸事件——例如，节点是一个当前处于禁用状态的\
    \ `CCMenuItem`。或者，当触摸点落在一个实际执行像素级碰撞检测的精灵（sprite）上时，边界框检测就显得过于宽泛了。此外，当节点旋转时，`boundingBox`\
    \ 会变得过大，因为它是一个轴对齐的边界框，其尺寸会随节点旋转而变化。\n\n为了缓解这种情况，你可以在 `CCNode` 类中添加一个 `hitTest`\
    \ 方法。该方法默认仅执行边界框检测，但子类可以重写它，以执行更精确或带条件的检测。你可以在 CocosWithCocoa04 项目中找到这一微小的代码改动，该项目还包含额外的调试日志和触摸检测代码，帮助你理解命中测试（hit\
    \ testing）过程。\n\n### 实现 Cocos2D 视图的“三明治”效果\n\n为了完善这个测试，我想在 cocos2d 视图的前方再添加一个文本字段，这样我们就能得到一个真正的“三明治”式\
    \ cocos2d 视图：后方和前方都有 UIKit 视图，并且所有这些视图都能响应触摸。\n\n改动非常简单；只需在 `addSomeCocoaTouch`\
    \ 方法的末尾添加以下代码，并确保将 `textFieldFront` 添加为 `dummyView` 的子视图，而不是 `glView`：\n\n```\n\
    UITextField* textFieldFront = [[UITextField alloc] initWithFrame:\n    CGRectMake(280,\
    \ 40, 200, 24)];\ntextFieldFront.text = @\"  在 Cocos2D 上方\";\ntextFieldFront.borderStyle\
    \ = UITextBorderStyleRoundedRect;\ntextFieldFront.delegate = self;\n\n[dummyView\
    \ addSubview:textFieldFront];\n[textFieldFront release];\n```\n\n实际上，你也可以将 `textFieldFront`\
    \ 添加为 `glView` 的子视图，这不会产生任何立即可见的差别。但是，将文本字段添加到 `dummyView` 允许你随时在视图层级中重新排列它；例如，你可以使用\
    \ `dummyView` 的 `sendSubviewToBack` 方法将其移到 cocos2d 视图之后。如果你直接将视图添加到 cocos2d 的\
    \ `glView`，就无法做到这一点。\n\n查看 Figure 15–4 了解结果。你将在 cocos2d 视图的上方和后方都看到 UIKit 视图。后方的文本视图仍然可以像“剪切、复制、粘贴、替换”按钮所展示的那样进行编辑和操作。更重要的是，尽管对应的文本字段位于\
    \ cocos2d 视图后方，但“剪切、复制、粘贴、替换”弹出按钮却自动显示在 cocos2d 视图的上方——这正是我们想要的效果！\n\n![images](img/1504.jpg)\n\
    \n**Figure 15–4.** *UIKit 视图位于 cocos2d 视图的前方和后方，所有视图的输入功能均已启用*\n\n### 添加使用 Interface\
    \ Builder 设计的视图\n\n此时，你可能想知道如何添加一个使用苹果公司的 Interface Builder 设计的视图。现在我们就来探讨这个问题。从代码层面来看，这出奇地简单，如果你想了解，可以在\
    \ CocosWithCocoa05 项目中查看详情。\n\n首要任务是创建一个 Interface Builder 资源文件。在 Xcode 4 中，你可以方便地在项目内部通过菜单栏的\
    \ **File > New > New File** 命令来创建，或者右键点击一个组并选择 **New File**。\n\n系统会提示你从文件模板对话框中选择一个模板。正如你在\
    \ Figure 15–5 中所见，你应该使用 `UIViewController` 子类模板来创建 Interface Builder 文件。这还会为你创建\
    \ Interface Builder 的 nib 文件，并将其与你的视图控制器连接起来，这对视图的正常工作至关重要。\n\n![images](img/1505.jpg)\n\
    \n**Figure 15–5.** *通过创建 `UIViewController` 子类来创建 Interface Builder 视图。*\n\n请确保\
    \ Figure 15–6 中的复选框 **With XIB for user interface** 已被勾选，并确保 **Subclass of** 文本框中的内容是\
    \ `UIViewController`。我决定使用文件名 MyView.m 来保存此模板。最终，你的项目中应该会新增三个文件：`MyView.h`、`MyView.m`\
    \ 和 `MyView.xib`。\n\n**注意：** 开发者文档乃至 Cocoa Touch API 都将 Interface Builder 文件称为\
    \ *nib 文件*，尽管它们使用的是 .xib 扩展名。过去它们确实使用 .nib 扩展名，这个叫法便作为传统沿袭下来了，即使文件扩展名已在多年前更改过。因此，*nib*\
    \ 和 *xib* 可以互换使用，指代的是同一个事物。\n\n![images](img/1506.jpg)\n\n**Figure 15–6.** *确保\
    \ “With XIB for user interface” 已勾选。*\n\n如果你点击 `MyView.xib` 文件，就会看到 Interface\
    \ Builder——它不再是一个独立的应用程序，而是已经集成到了 Xcode 4 中。你会看到一个 iPhone 屏幕视图，你可以将对象库中的视图拖放到这个视图上。如果对象库当前不可见，可以通过\
    \ **View > Utilities > Object Library** 来访问它。\n\n使用 Interface Builder，你可以轻松地以可视化的方式创建\
    \ UIKit 用户界面。由于解释 Interface Builder 的工作流程超出了本书的范围，我建议你参考苹果公司的《Xcode 4 用户指南》，特别是其中关于“设计用户界面（Designing\
    \ User Interfaces）”的章节：\n\n`http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/InterfaceBuilder/InterfaceBuilder.html`\n\
    \n趁此机会，如果你需要复习或了解关于视图和窗口的知识，可以看看苹果公司的《iOS 视图编程指南》：\n\n`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html`\n\
    \n**注意：** 遗憾的是，你不能使用 Interface Builder 来设计你的 cocos2d 视图。为此，你必须使用单独的编辑器，例如 CocoShop、CocoaBuilder、LevelHelper，或任何其他支持\
    \ cocos2d 且满足你需求的编辑工具。关于 cocos2d 编辑工具的列表，请参考 第 17 章。\n\n目前，仅需向 Interface Builder\
    \ 视图中添加任意视图（比如滑块、按钮、标签等）就已经足够了。但理想情况下，你至少要执行以下操作：选中主视图，然后通过 **View > Utilities\
    \ > Attributes Inspector** 打开属性检查器（Attributes Inspector）。在“模拟度量（Simulated Metrics）”下的第一个属性是“方向（Orientation）”，由于当前应用程序仅支持横向模式运行，你应该将其改为“横向（Landscape）”。如果不这样做，运行应用程序时，你的视图将会旋转\
    \ 90 度。\n"
- fmt: "`MyView`类无需修改；默认实现即可正常工作。您可以通过在`addSomeCocoaTouch`方法末尾添加以下代码，直接加载`MyView.xib`文件：\n\
    \n```\n// add an Interface Builder view\nMyView* myViewController = [[MyView alloc]\
    \ initWithNibName:@\"MyView\" bundle:nil];\n[dummyView addSubview:myViewController.view];\n\
    [dummyView sendSubviewToBack:myViewController.view]; // optional\n[myViewController\
    \ release];\n```\n\n请注意，`initWithNibName`接受xib文件的名称作为参数，但**不包含**`.xib`扩展名。如果您添加了扩展名，将会收到一条错误消息，提示无法加载该xib。`bundle`参数为`nil`，这意味着应用程序应在主bundle中查找该文件。\n\
    \n由于`MyView`类继承自`UIViewController`，您可以通过`myViewController.view`属性访问实际的视图。您需要将该视图添加到`dummyView`中，如果需要，还可以发送`sendSubviewToBack`消息将其置于背景中。最后，与往常一样，当您使用完`myViewController`后需要释放它，因为`addSubview`方法会保留该视图。\n\
    \n现在，您可以创建并使用Interface Builder设计的视图，并将其添加到cocos2d应用程序中。最终效果可能类似于[Figure 15–7](#Chapter15.html#fig_15_7)所示。\n\
    \n![images](images/1507.jpg)\n\n**Figure 15–7.** *最终项目展示了使用Interface Builder设计的`MyView.xib`文件，位于下半部分。*\n\
    \n#### 自动旋转方向课程\n\n是时候讨论自动旋转了。当您从纯cocos2d应用程序迁移到同时使用UIKit控件的应用程序时，这是需要特别注意的事项之一。如果在第一代或第二代设备上运行之前的任何`CocosWithCocoaexample`项目，这一点最为明显。在这种情况下，您会看到所有UIKit控件都定向为纵向模式。问题出在哪里？\n\
    \n问题根源在于cocos2d项目模板创建的`GameConfig.h`文件中的代码。以下是该文件的核心代码，它使用编译器标志根据设备类型和平台更改默认的自动旋转行为：\n\
    \n```\n#define kGameAutorotationNone 0\n#define kGameAutorotationCCDirector 1\n\
    #define kGameAutorotationUIViewController 2\n\n// 3代及更新设备：使用UIViewController旋转。\n\
    #if defined(__ARM_NEON__) || TARGET_IPHONE_SIMULATOR\n#define GAME_AUTOROTATION\
    \ kGameAutorotationUIViewController\n\n// ARMv6（第1代和第2代设备）：不旋转。旋转代价非常高昂。\n#elif\
    \ __arm__\n#define GAME_AUTOROTATION kGameAutorotationNone\n\n// 在Mac上忽略此值\n#elif\
    \ defined(__MAC_OS_X_VERSION_MAX_ALLOWED)\n\n#else\n#error(unknown architecture)\n\
    #endif\n```\n\nCocos2d定义了三种不同的自动旋转支持类型：\n\n*   `kGameAutorotationNone`\n*   `kGameAutorotationCCDirector`\n\
    *   `kGameAutorotationUIViewController`\n\n不支持自动旋转会将应用程序锁定在其设计的初始方向上。这也是最快的模式，特别是在考虑对ARMv6（第一代和第二代）设备性能的影响时；由于影响严重，该模式默认在这些设备上被禁用。那么，如果自动旋转会影响性能，为什么还要支持它呢？\n\
    \n答案在于苹果的iOS人机界面指南（HIG）。具体请参见“处理方向变化”部分：\n\n```\ndeveloper.apple.com/library/ios/#documentation/UserExperience/Conceptual/Mobile\n\
    HIG/UEBestPractices/UEBestPractices.html\n```\n\n从中应得出的最低建议是：您的应用程序至少应支持某个方向的两种变体。将应用程序锁定为单一方向可能会导致在审批过程中被拒绝。\n\
    \n**提示：** 在iPad首次发布前不久，苹果的iOS人机界面指南明确规定所有iPad应用程序必须支持所有方向的旋转。经过开发者（尤其是那些游戏难以轻松支持所有方向的游戏开发者）的强烈抗议后，苹果已将措辞从“必须拥有”修改为：“在iPad上，努力满足用户的期望，使其能够在所有方向上运行。”\n\
    \n这样就剩下另外两种自动旋转模式。`kGameAutorotationCCDirector`与`kGameAutorotationUIViewController`之间的区别在于，基于`CCDirector`的自动旋转仅旋转cocos2d视图，但忽略任何UIKit视图。只有当您的应用程序中包含UIKit视图时，才需要使用基于`UIViewController`的自动旋转模式。这主要是因为它是速度最慢的模式，如果未使用UIKit视图，则会浪费性能。\n\
    \n初始方向在`AppDelegate`类中设置。在`applicationDidFinishLaunching`方法中，您会看到几行代码检查`GAME_AUTOROTATION`设置以确定初始方向。由于无论应用程序支持哪些方向，`UIViewController`都期望从纵向模式启动，因此初始方向设置为纵向。否则，将使用默认的横向方向：\n\
    \n```\nviewController = [[RootViewController alloc] initWithNibName:nil bundle:nil];\n\
    viewController.wantsFullScreenLayout = YES;\n\n…\n\n#if GAME_AUTOROTATION == kGameAutorotationUIViewController\n\
    \    [director setDeviceOrientation:kCCDeviceOrientationPortrait];\n#else\n  \
    \  [director setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];\n#endif\n\
    ```"
  raw: 'The `MyView` class does not need to be modified; the default implementation
    works just fine. You can directly load the MyView.xib file by adding the following
    code at the end of the `addSomeCocoaTouch` method:


    `// add an Interface Builder view`

    `MyView* myViewController = [[MyView alloc] initWithNibName:@"MyView" bundle:nil];`

    `[dummyView addSubview:myViewController.view];`

    `[dummyView sendSubviewToBack:myViewController.view]; // optional`

    `[myViewController release];`


    Notice that the `initWithNibName` takes the name of the xib file as a parameter
    but without the .xib extension. If you add the extension, you’ll receive an error
    message that the xib could not be loaded. The bundle parameter is `nil`, which
    means the app should look for the file in the main bundle.


    Since the `MyView` class inherits from `UIViewController`, you can access the
    actual view with the `myViewController.view` property. You’ll add that to the
    `dummyView`, and if you want, you can also issue an `sendSubviewToBack` message
    to put the view in the background. Lastly, and as always, you’ll release the `myViewController`
    when you’re done with it, since the `addSubview` method retains the view.


    You can now create and add views designed with Interface Builder to a cocos2d
    app. Your result might look something like the one in [Figure 15–7](#Chapter15.html#fig_15_7).


    ![images](images/1507.jpg)


    **Figure 15–7.** *The resulting project shows the MyView.xib file designed with
    Interface Builder in the bottom half.*


    #### Orientation Course on Autorotation


    It’s about time that we discuss autorotation. It’s one of the things that need
    special considerations when you move from a purely cocos2d-based app to one that
    also uses UIKit controls. This is most obvious if you run any of the previous
    CocosWithCocoaexample projects on a first- or second-generation device. In that
    case, you’ll see all UIKit controls oriented to the portrait mode. What’s wrong?


    The culprit is the code in the file GameConfig.h that the cocos2d project template
    creates. Here’s the essential code of the file making use of compiler flags to
    change the default autorotation behavior depending on the device type and platform:


    `#define kGameAutorotationNone 0`

    `#define kGameAutorotationCCDirector 1`

    `#define kGameAutorotationUIViewController 2`


    `// 3rd generation and newer devices: Rotate using UIViewController.`

    `#if defined(__ARM_NEON__) || TARGET_IPHONE_SIMULATOR`

    `#define GAME_AUTOROTATION kGameAutorotationUIViewController`


    `// ARMv6 (1st and 2nd generation devices): Don''t rotate. It is very expensive.`

    `#elif __arm__`

    `#define GAME_AUTOROTATION kGameAutorotationNone`


    `// Ignore this value on Mac`

    `#elif defined(__MAC_OS_X_VERSION_MAX_ALLOWED)`


    `#else`

    `#error(unknown architecture)`

    `#endif`


    Cocos2d defines three distinct types of autorotation support:


    *   `kGameAutorotationNone`

    *   `kGameAutorotationCCDirector`

    *   `kGameAutorotationUIViewController`


    Not supporting autorotation will lock the app into the orientation it was designed
    for. It is also the fastest mode, especially if you consider the impact on performance
    on ARMv6 (first- and second-generation) devices; it is considered so severe that
    it is disabled by default for those devices. So, why would you even support autorotation
    if it has an impact on performance?


    The answer lies in Apple’s iOS Human Interface Guidelines (HIG). Specifically,
    see the Handling Orientation Changes section here:


    `developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/Mobile`

    `HIG/UEBestPractices/UEBestPractices.html`


    The minimum recommendation to take away from this is that your app should at least
    support both variants of an orientation. Locking the app to just a single orientation
    could cause a rejection of your app during the approval process.


    **TIP:** Shortly before the iPad was first released, Apple’s iOS Human Interface
    Guidelines specified explicitly that all iPad apps must support rotation to all
    orientations. After much protest from developers, specifically from game developers
    whose games can’t easily support all orientations, Apple has changed the wording
    from a “must have” to: “On iPad, strive to satisfy users’ expectations by being
    able to run in all orientations.”


    This leaves the other two autorotation modes. The difference between `kGameAutorotationCCDirector`
    and `kGameAutorotationUIViewController` is that the `CCDirector`-based autorotation
    rotates only the cocos2d view but ignores any UIKit views. Only if you have UIKit
    views in your app should you need to use the `UIViewController`-based autorotation
    mode. Mainly that’s because it’s the slowest mode and would simply waste performance
    if you did not use UIKit views.


    The initial orientation is set in the `AppDelegate` class. In the `applicationDidFinishLaunching`
    method, you’ll see a few lines of code that check the `GAME_AUTOROTATION` setting
    to set the initial orientation. Since the `UIViewController` expects to be started
    in the portrait mode regardless of which orientations your app supports, it is
    initially set to portrait orientation. Otherwise, the default landscape orientation
    is used:


    `viewController = [[RootViewController alloc] initWithNibName:nil bundle:nil];`

    `viewController.wantsFullScreenLayout = YES;`


    `…`


    `#if GAME_AUTOROTATION == kGameAutorotationUIViewController`

    `    [director setDeviceOrientation:kCCDeviceOrientationPortrait];`

    `#else`

    `    [director setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];`

    `#endif`'
