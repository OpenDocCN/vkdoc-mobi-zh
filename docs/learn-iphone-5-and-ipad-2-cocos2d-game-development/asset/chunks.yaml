- fmt: '### The cocos2d Scene Graph


    Sometimes called a *scene hierarchy*, the scene graph is a hierarchy of every
    cocos2d node that’s currently active.


    A cocos2d node is any object that is derived from the `CCNode` class. Most nodes
    like `CCSprite` and `CCLabelTTF` are displayed on the screen, but a few have no
    visual representation, including `CCNode` as well as `CCScene` and `CCLayer`.
    They are no less important; to the contrary, they frequently cause confusion among
    new cocos2d developers.


    I’ll go into more detail on those classes and explain what they are used for in
    the upcoming sections. For now, I’ll focus on the high-level concepts, and it’s
    sufficient for you to know that `CCSprite` displays a texture on the screen, `CCLabelTTF`
    prints arbitrary text, and `CCNode`, `CCScene`, and `CCLayer` are used mainly
    to group nodes together.


    [Figure 3–1](#Chapter03.html#fig_3_1) depicts the shoot ’em up game that you’ll
    create starting in [Chapter 6](#Chapter06.html#ch6) and illustrates what is not
    immediately noticeable to players of the game but very important to understand
    for game developers.


    ![images](images/0301.jpg)


    **Figure 3–1.** *A shoot ’em up game*


    The scene in [Figure 3–1](#Chapter03.html#fig_3_1) is entirely made of just `CCSprite`
    objects. At least that’s what you can see. What you can’t see is how the `CCScene`
    and `CCLayer` classes are used to group and order the various sprites: several
    background layers, the player’s ship, the enemies, the bullets, and the virtual
    joypad and button. To illustrate the layering of this scene’s elements, I created
    an exploded view drawing of that scene in [Figure 3–2](#Chapter03.html#fig_3_2).


    ![images](images/0302.jpg)


    **Figure 3–2.** *An exploded view illustrating a typical cocos2d game scene layout*


    In this particular case, three layers help maintain the proper draw order of the
    sprites in relation to each other: the background layer, the game objects layer,
    and the virtual joypad layer. Using multiple layers in a scene is also helpful
    if you want to hide an entire layer’s nodes, move the layer and thus all the nodes
    it contains, or reorder the layer so that its nodes are drawn above or behind
    another layer’s nodes. You can even rotate and scale a layer, which would rotate
    and scale all the nodes contained in that layer. This makes using layers a powerful
    concept.


    In this respect, the game scene is modeled using layers just like you edit an
    image in an image-editing program such as Photoshop, Seashore, or Gimp. However,
    the nodes (brush strokes) in each layer aren’t static and instead remain individual
    elements.


    The actual `Scene` object is just the container for all the layers (the actual
    image so to speak), just like a layer is a container for other nodes. Each of
    these nodes can run logic, the scene, the layers, the individual nodes, the sprites,
    the labels, and so on, depending on how you organize your code.


    Any node can have any other node as a child, and every node in the hierarchy—except
    for the scene itself—has one parent object, which is the object the node is a
    child of. If you remove the node from the scene graph or you haven’t added it
    yet, it will not have a parent object. Note that this parent-child relationship
    of nodes is not to be confused with inheritance in object-oriented programming.
    In other words, the parent node is not the node’s `super` class!


    This treelike hierarchy of nodes that you can create is what is called the *scene
    graph*, and throughout this book I’ll sometimes refer to it as the *node hierarchy*.
    For those familiar with programming design patterns, you’ll recognize this hierarchical
    structure as the Composite design pattern. [Figure 3–3](#Chapter03.html#fig_3_3)
    shows you what the simplified node hierarchy of this scene looks like as a tree
    structure.


    ![images](images/0303.jpg)


    **Figure 3–3.** *The node hierarchy of the scene illustrated in [Figure 3–2](#Chapter03.html#fig_3_2)*


    Note that this scene/layer/nodes structure is not enforced by cocos2d, except
    that the scene graph always has a `CCScene` class object as its root node. But
    other than that, you can use any `CCNode` class instead of `CCLayer` to create
    your “layers.”


    In fact, I generally prefer to use the plain `CCNode` class over `CCLayer` for
    layering and grouping objects; in most cases, the `CCLayer` class adds unnecessary
    overhead because it is able to receive touch and accelerometer input on Mac OS
    X keyboard and mouse input. Strip away support for input handling, and the `CCLayer`
    class is practically just a `CCNode` class. The same goes for `CCScene`, which
    is also just an abstract concept in order to enforce a common root node class.
    But otherwise a `CCScene` class is virtually the same as a `CCNode`.


    **CAUTION:** The nodes in a cocos2d node hierarchy are positioned relative to
    their parent nodes. The child nodes inherit certain properties from their parents,
    such as `scale` and `rotation` but not `color` and `opacity`. This may be confusing
    the first time you experience this.


    For example, if the parent of a `CCLabelTTF` node is a nondrawing node like the
    `CCNode`, `CCScene`, or `CCLayer` nodes and they themselves are the only children
    of other nondrawing nodes, the position of the label will be relative to the view’s
    lower-left corner. So, all is well and as expected. But if you were to add another
    `CCLabelTTF` as a child to this label, the position of the child label will be
    relative to the parent label.


    You would have reason to expect the child label to be centered on the parent label’s
    position. Alas, this is not the case, as you can see in [Figure 3–4](#Chapter03.html#fig_3_4).
    You’ll find that the child label will be centered on the lower-left corner of
    the parent label’s texture instead, which is an unfortunate oddity in cocos2d’s
    design. To correctly position such a node and center it on its parent node, you
    will have to use parent node’s `contentSize.width / 2` and `contentSize.height
    / 2` as the child node’s `position.x` and `position.y`.


    I created the NodeHierarchy project to give you examples of relative positioning,
    and rotation, of nodes in a parent-child relationship and to allow you to familiarize
    yourself with the cocos2d node hierarchy. Consider it a test bed for your own
    experiments.


    ![images](images/0304.jpg)


    **Figure 3–4.** *Caution: the default position of a child node is unexpectedly
    offset from its parent’s position.*


    ### The CCNode Class Hierarchy


    At this point, you may be wondering what classes derive from `CCNode`. [Figure
    3–5](#Chapter03.html#fig_3_5) shows the `CCNode` class hierarchy. The node classes
    that you’ll be working with the most are highlighted, and you can make quite impressive
    games with just these classes. I will explain the most important classes shortly,
    and over the course of the book, you’ll get to know even the more obscure ones
    in depth.


    ![images](images/0305.jpg)


    **Figure 3–5.** *The CCNode class hierarchy*


    ### CCNode


    `CCNode` is the base class for all nodes. It’s an abstract class that has no visual
    representation and defines all properties and methods common to all nodes.'
