  trans: "\n# Kobold2D 提供“库服务”\n\nKobold2D 的一个核心作用是让开发者免于将第三方库集成到 cocos2d 项目中的痛苦。正确配置第三方库通常需要对构建系统有深入的了解，需要具备解读编译器和链接器错误的直觉，甚至可能需要在正确的位置对源代码进行微小但关键的修改。要让别人的代码在所有平台上（iOS\
    \ (`ARMv6` 和 `ARMv7`)、iOS 模拟器，以及 32 位和 64 位 Mac OS X）成功编译和链接，可能需要花费数小时乃至数天的时间。\n\
    \n这正是 Kobold2D 所提供的：库服务。在 Kobold2D 的第一个公开版本中，包含了以下库：\n\n- 以下库同时适用于 iOS 和 Mac OS\
    \ X 项目：\n  - `Kobold2D`（游戏引擎代码，Objective-C）\n  - `cocos2d-iphone`（2D 图形，Objective-C）\n\
    \  - `cocos2d-iphone-extensions`（工具代码，Objective-C）\n  - `Box2D`（物理引擎，C++）\n  -\
    \ `Chipmunk`（物理引擎，C）\n  - `Chipmunk SpaceManager`（Chipmunk 物理引擎，Objective-C）\n\
    \  - `CocosDenshion`（音频，Objective-C）\n  - `Wax`（脚本，Lua）\n- 以下库仅适用于 iOS 项目：\n \
    \ - `cocos3d`（3D 图形，Objective-C）\n  - `ObjectAL`（音频，Objective-C）\n  - `SneakyInput`（摇杆，Objective-C）\n\
    \  - `iSimulate`（用于 iSimulate 应用的库）\n\n每当像 `cocos2d` 或 `cocos3d` 这样的核心库更新时，Kobold2D\
    \ 都会在数天内（若非数小时内）发布新版本。你无需在库方面进行任何额外操作。\n\n有些读者可能会担心，集成了所有这些库是否会导致 Kobold2D 应用变得臃肿。你可能会惊讶地发现，早期测试表明，即使\
    \ `Wax` 和 `Lua` 已内置在 Kobold2D 中，Kobold2D 应用实际上比 `cocos2d-iphone` 应用还要稍微小一些。原因是\
    \ Kobold2D 项目配置为允许链接器丢弃应用中未使用的任何代码。这意味着，例如，如果你没有包含任何 `Box2D` 头文件，那么 `Box2D` 库代码就不会链接到你的应用中。但如果你确实想开始使用\
    \ `Box2D`，只需将 `Box2D.h` 头文件添加到你的项目中，就可以开始编写支持 `Box2D` 的物理引擎应用了。\n\n# Kobold2D\
    \ 高度重视跨平台\n\n通过在项目模板中默认为每个平台（iOS 和 Mac OS X）设立一个目标，Kobold2D 允许你在同一个 Xcode 项目中为这两个平台构建并运行代码。\n\
    \nKobold2D 的 API 也鼓励为 iOS 和 Mac OS 平台进行开发，它在很大程度上确保了游戏引擎代码能在这两个平台上编译通过。例如，如果你尝试在\
    \ iOS 上读取鼠标按钮状态，代码仍然可以编译，并且会返回一个安全的默认值，在这种情况下，该值简单地报告没有鼠标按钮被按下。\n\n## Kobold2D\
    \ 工作区\n\n下载并安装 Kobold2D 后，你会在 `~/Kobold2D` 的一个带版本号的子文件夹中找到最新版本的 Kobold2D，例如 `~/Kobold2D/Kobold2D-1.0.*`。安装程序还会为你打开\
    \ `Kobold2D Project Starter.app`，你可以使用它从提供的项目模板之一创建新的 Kobold2D 项目（参见 图 16–1）。\n\
    \n![图片](img/1601.jpg)\n\n**图 16–1.** *Kobold2D 项目启动工具让你可以轻松创建新项目。*\n\n选择 `Hello-Kobold2D`\
    \ 模板，在 `新项目名称` 文本字段中输入任意名称，然后点击 `从模板创建项目`。如果你想将新项目添加到一个自定义工作区，也可以修改 `添加到工作区` 文本（如有必要，该工作区会被创建）。默认情况下，Kobold2D\
    \ 项目会被添加到 `Kobold2D.xcworkspace`。\n\nXcode 现在应该会打开包含你新项目的 Kobold2D 工作区，如 图 16–2\
    \ 所示。\n\n**注意：** Kobold2D 使用了 Xcode 4 的新工作区概念，它允许你在单个工作区窗口中组合多个项目。如果你从最近使用列表中打开或通过在\
    \ Finder 中双击打开 Kobold2D 项目的 `.xcodeproj` 文件，该项目将无法工作。你可以很容易地发现这个问题，因为 `Kobold2D-Libraries`\
    \ 项目会从 `项目导航器` 窗格中消失。请确保始终打开包含你想要处理的 `.xcodeproj` 的对应 `.xcodeworkspace` 文件。\n\n\
    因此，Kobold2D 与 Xcode 3.x 不兼容，因为工作区功能是在 Xcode 4.0 中首次引入的。\n\n![图片](img/1602.jpg)\n\
    \n**图 16–2.** *运行中的 Hello Kobold2D Mac OS X 项目的 Kobold2D Xcode 4 工作区视图*\n\n##\
    \ Hello Kobold2D 模板项目\n\n让我们更仔细地看看 `Hello Kobold2D` 项目（图 16–2），以演示 Kobold2D 的几个关键概念。\n\
    \n### Hello World 项目文件\n\n在 图 16–3 中，你将看到从 `Hello-Kobold2D` 模板项目创建的 `我的第一个 Kobold2D\
    \ 项目` 中的分组和文件。\n\n![图片](img/1603.jpg)\n\n**图 16–3.** *Kobold2D 项目的默认分组结构*\n\n\
    与常规 cocos2d 项目相比，一个明显的区别是，这里有三个以 `Projectfiles` 开头的分组，并且多了一个 `BuildSettings` 分组。其设计思路是，使用一个\
    \ `Projectfiles` 分组和文件夹来存放所有平台通用的源代码和资源文件。你的大部分源代码和资源都将放在这个文件夹中。额外的 `Projectfiles-iOS`\
    \ 和 `Projectfiles-Mac` 分组则只应包含由特定平台使用的文件。这些分组只是作为建议；你当然可以自由地按照你认为合适的方式组织项目分组。\n\
    \n`BuildSettings` 分组包含几个 `.xcconfig` 文件，这些是 Xcode 构建设置的文本格式。通常你不需要修改这些文件，但在某些情况下你可能需要，例如，禁用\
    \ `iSimulate` 或启用对 `cocos3d` 的支持。`.xcconfig` 文件的一大优点是它们可以附带文档说明，因此你会看到针对每个构建设置的若干注释，说明其作用、影响什么，以及你何时可能想要启用或禁用它。\n\
    \n几乎所有 Kobold2D 项目模板都提供了针对 iOS 和 Mac OS X 的目标，分别以后缀 `-iOS` 和 `-Mac` 标识。我希望现成的\
    \ Mac 目标能鼓励你和其他开发者从一开始就考虑跨平台开发，并向苹果应用商店发布更多应用。当然，从一开始就将跨平台开发考虑进来，要比在应用完成后再进行移植容易得多。\n\
    \n### Kobold2D 如何启动应用\n\nKobold2D 简化了启动过程，特别是你的项目中需要多少自定义代码（默认情况下：无需任何代码）。Kobold2D\
    \ 在后台执行了 `main` 函数、应用代理和根视图控制器的所有初始化工作。\n\n此外，Kobold2D 允许你轻松修改启动设置，例如要显示的第一个场景或图层、设备方向、渲染设置、Mac\
    \ 窗口大小、Retina 支持等等。所有这些设置都集中在 `config.lua` 脚本文件中。\n"
- fmt: '### Main, AppDelegate, and RootViewController


    The `main.m` file is the entry point for each application; it contains the `main`
    method. The Kobold2D implementation simply calls its internal method `KKMain`:


    ```

    #import "kobold2d.h"


    int main(int argc, char *argv[])

    {

        return KKMain(argc, argv, NULL);

    }

    ```


    `KKMain` takes both `argc` and `argv` arguments and a third, optional parameter
    that can be used to pass additional parameters to the start-up process if needed.
    Since that’s rarely, if ever, needed, you can just pass `NULL`. `KKMain` hides
    the complexity of launching the app for either the iOS or Mac OS platform. It
    also parses the `config.lua` file, which provides app configuration settings.
    I’ll discuss the `config.lua` file in the next section.


    At this point, it makes sense to show you the `AppDelegate` class of a Kobold2D
    project, or, rather, what’s left of it. Here’s the interface:


    ```

    #import "KKAppDelegate.h"


    @interface AppDelegate : KKAppDelegate

    {

    }


    @end

    ```


    Nothing there. Maybe there’s more in the implementation part of the app delegate?


    ```

    #import "AppDelegate.h"


    @implementation AppDelegate


    // Called when Cocos2D is fully setup and you are able to run the first scene

    -(void) initializationComplete

    {

    }


    @end

    ```


    Nope. I can already hear you: dude, where’s my app delegate?


    Kobold2D takes care of the entire app start-up process for you and hides it within
    the `KKAppDelegate` class from which the `AppDelegate` class inherits. In particular,
    `KKAppDelegate` correctly sets up cocos2d based on the `config.lua` settings and
    encapsulates platform-specific app delegate code.


    The `KKAppDelegate` class is a regular `UIApplicationDelegate` on iOS and a `NSApplicationDelegate`
    class on Mac OS; you can implement (override) any of the app delegate protocol
    methods yourself whenever you need to do so. However, you should make sure to
    call the super implementation of overridden methods to ensure that `KKAppDelegate`
    still performs its duties.


    The only custom method that the `AppDelegate` class offers you is `initializationComplete`,
    which is called after the app and cocos2d have been fully initialized but before
    the first scene is about to be run. You can call the `CCDirectorrunWithScene`
    method inside `initializationComplete` to run a specific scene. However, it doesn’t,
    because the `config.lua` file has a setting `FirstSceneClassName` that allows
    you to specify just the name of the class that cocos2d should run as its first
    scene.


    You’ll also notice the `RootViewController` class is equally and unimpressively
    minimal. The gist of the code is in Kobold2D’s `KKRootViewController`. Once more,
    if you override any of the `UIViewController` messages, be sure to call its `super`
    implementation. Note that Mac OS targets do not use the `RootViewController` class.


    In essence, the Kobold2D classes `KKMain`, `KKAppDelegate`, and `KKRootViewController`
    provide the common functionality developers expect from these classes. Furthermore,
    they provide the foundation code for any Kobold2D project, enabling you to use
    Lua for configuration files, among other things. You also have less code to maintain.
    In particular, if there’s an essential change to these classes in iOS, Mac OS,
    or cocos2d, Kobold2D will take care of these changes or additions for you.


    ### The Start-up Configuration File


    Kobold2D always loads the Lua script file `config.lua`, which is in the Resources
    group of each Kobold2D project.


    The `config.lua` script file returns a Lua table containing all the game’s settings.
    A Lua table is a flexible data structure that combines the features of dictionaries
    (indexed by string) and arrays (indexed by value). You can create deeply nested
    Lua tables, which in terms of possibilities equal XML files or property lists
    but with a relatively simple, readable syntax with built-in error-reporting.


    Lua scripts are text files, so naturally they’re easier to edit than property
    lists, regardless of whether you’re using a property list editor or editing the
    property list XML file directly. And Lua scripts allow you to comment on each
    line to explain your rationale, the range of valid values, and so on. You can’t
    do that with property list files since property list editors don’t allow you to
    comment on entries.


    **NOTE:** Lua support for Kobold2D is provided by the Wax library created by Corey
    Johnson. Wax allows all Lua scripts to call any Objective-C method and to instantiate
    Objective-C classes, including cocos2d classes. However, Kobold2D avoids Wax scripting;
    it does not make calls to Objective-C methods from Lua. Instead, Kobold2D relies
    on just loading settings provided by Lua, executing Lua scripts and calling Lua
    functions. This is fast.


    The other way around, calling Objective-C methods from Lua through Wax, is a lot
    slower. Wax performs a lot of Objective-C runtime method calls behind the scenes.
    This adds overhead that can quickly add up, especially during game play you don’t
    want to waste precious milliseconds. Besides, even if you could live with that,
    the syntax of Wax scripts is too close to Objective-C to give you much benefit
    in terms of the number of code lines. Worse yet, Xcode has no support for Lua
    scripts, so there is no code completion, no syntax highlighting, no compiler warnings
    or errors, and no runtime debugging of Lua scripts. For those reasons, it is preferable
    to just use Lua for configuration files rather than attempting to write an entire
    game with Wax.


    The `config.lua` file contains settings for just about everything you might want
    to tweak during the start-up process. [Listing 16–1](#Chapter16.html#list_16_1)
    shows an example `config.lua` file.


    **Listing 16–1.** *The `config.lua` Script Contains All Start-up Settings for
    Kobold2D*


    ```

    local config =

    {

        KKStartupConfig =

        {

            -- load first scene from a CCScene or CCLayer derived class with this
    name

            FirstSceneClassName = "HelloWorldLayer",


            -- set the director type, and the fallback in case the first isn''t available

            DirectorType = DirectorType.DisplayLink,

            DirectorTypeFallback = DirectorType.NSTimer,


            MaxFrameRate = 60,

            DisplayFPS = YES,


            EnableUserInteraction = YES,

            EnableMultiTouch = NO,


            -- Render settings

            DefaultTexturePixelFormat = TexturePixelFormat.RGBA8888,

            GLViewColorFormat = GLViewColorFormat.RGB565,

            GLViewDepthFormat = GLViewDepthFormat.DepthNone,

            GLViewMultiSampling = NO,

            GLViewNumberOfSamples = 0,


            Enable2DProjection = NO,

            EnableRetinaDisplaySupport = YES,


            -- Orientation & Autorotation

            DeviceOrientation = DeviceOrientation.Portrait,

            AutorotationType = Autorotation.UIViewController,

            ShouldAutorotateToLandscapeOrientations = YES,

            ShouldAutorotateToPortraitOrientations = YES,

            AllowAutorotateOnFirstAndSecondGenerationDevices = NO,


            -- iAd setup

            EnableAdBanner = YES,

            LoadOnlyPortraitBanners = YES,

            LoadOnlyLandscapeBanners = NO,

            PlaceBannerOnBottom = NO,


            -- Mac OS specific settings

            AutoScale = NO,

            AcceptsMouseMovedEvents = NO,

            WindowFrame = RectMake(1024-640, 768-480, 640, 480),        

        },

    }

    ```'
