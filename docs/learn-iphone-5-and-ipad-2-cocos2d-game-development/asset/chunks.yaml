    The only notable aspect of the `Contact` class is that it overrides the `retain`
    method. This is in case a user tries to retain contact information, which is not
    allowed in Box2D. Directly after the call to the Box2D contact methods, the `contact`
    variable will be released by Box2D and so the `otherFixture`, `ownFicture`, and
    `b2contact` pointers will be invalid, and accessing them would cause a crash.
    Since calling `retain` indicates that the user wants to keep a reference to the
    `Contact` object for later use, this must be prevented by throwing an exception
    that will cause the program execution to halt with an error message logged to
    the debug console.


    ##### Responding to Contact Events


    Now whenever the ball and the plunger get in contact, the `beginContactWithBall`
    method in the `Plunger` class will be called:


    `-(void) endPlunge:(ccTime)delta`

    `{`

    `    // stop the scheduling of endPlunge`

    `    [self unschedule:_cmd];`


    `    // stop the motor`

    `    joint->EnableMotor(NO);`

    `}`


