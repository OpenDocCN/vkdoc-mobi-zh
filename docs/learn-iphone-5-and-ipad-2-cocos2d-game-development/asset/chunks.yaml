    \ 是通用的，任何类型的敌人都可以使用。\n\n```objectivec\n-(void) spawn\n{\n    // 在屏幕右侧外部选择一个生成位置\n\
    \    CGRect screenRect = [GameScene screenRect];\n    CGSize spriteSize = [self\
