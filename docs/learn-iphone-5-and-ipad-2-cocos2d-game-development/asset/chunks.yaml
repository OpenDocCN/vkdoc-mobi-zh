    We have the two positions of the body and the finger, and then we subtract the
    finger position from the body position. For example, if the body''s position would
    be at the screen center (160, 240) and the finger is touching near the upper-right
    corner of the screen at (300, 450), then subtracting the body position from the
    finger position being the subtraction of the individual x and y coordinates results
    in (300 - 160, 450 - 240) = (140, 210). The vector `bodyToFingerDirection` is
    now (140, 210). It''s called the direction from `bodyPos` to `fingerPos` because
    if you would add `bodyToFingerDirection` to `bodyPos`, you would get to the coordinates
    of `fingerPos`.


    **NOTE:** The `b2Vec2` struct makes use of a technique called operator overloading,
    which makes it possible to subtract, add, or multiply two or more `b2Vec2` structs
    with each other. Operator overloading is a feature of the C++ language; it''s
    not available in Objective-C—so you can''t subtract, add, or multiply `CGPoint`
    variables this way.


    So, the `bodyToFingerDirection` vector is now pointing from the body to the finger.
    When `Normalize` is called on the `bodyToFingerDirection` vector, it''s turned
    into a *unit vector* as mentioned earlier. A unit vector is a vector of length
    1—or one unit. This allows you to multiply it with a fixed factor, in this case
    doubling its length, to create a constant force vector pointing in the direction
    of the finger. You can then use the `ApplyForce` method of the body to apply this
    as an external force to the body''s center. You could also use a position other
    than the center; however, in that case, the body would start spinning.


    The end result of this is that the ball accelerates toward the point on the screen
