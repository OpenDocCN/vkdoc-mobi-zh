  trans: "\n### 碰撞时阻止玩家移动\n\n最后，我们不希望角色能穿越墙壁和山脉。虽然他可能是个忍者，但也没*那么*厉害。为了解决这个问题，在 Tiled\
    \ 中通过 `层` -> `添加图块层…` 新建一个名为 `Collisions` 的层；然后将 `不透明度` 滑块拖到 `层` 列表上方大约中间的位置。现在从图块集中选择一个颜色与当前地图形成强烈对比的图块，因为我们要用它在地图上绘制碰撞区域，即便透明度较低，这些区域也应该易于识别。\n\
    \n我选择了其中一个紫色图块。右键单击你选择的图块，从上下文菜单中选择`图块属性…`。请注意，Tiled 菜单中没有与此等效的命令；图块属性只能通过右键单击图块来访问。在\
    \ 图 11–19 所示的图块属性对话框中，添加一个名为 `blocks_movement` 的属性，并将值设置为 `1`。实际上，在代码中我将忽略这个值；重要的是\
    \ `blocks_movement` 属性存在。\n\n![images](img/1119.jpg)\n\n**图 11–19.** *添加 `blocks_movement`\
    \ 图块属性*\n\n选中 `Collisions` 层后，使用设置了 `blocks_movement` 属性的图块在地图上绘制。在你不想让玩家移动到的任何位置放置该图块，例如墙壁、山脉、房屋等。\n\
    \n`Tilemap10` 项目中的 `isometric-with-border.tmx` 地图已经预先配置了一个碰撞层。碰撞层仅用于检查图块是否可移动，不应在游戏中显示，因此你在\
    \ `TileMapLayer` 类的 `init` 方法中首先要做的就是将该层设置为不可见（参见代码清单 11–9）。\n\n**代码清单 11–9.**\
    \ *隐藏碰撞层*\n\n```c\nCCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:\n\
    \    @\"isometric-with-border.tmx\"];\n[self addChild:tileMap z:-1 tag:TileMapNode];\n\
    \nCCTMXLayer* layer = [tileMap layerNamed:@\"Collisions\"];\nlayer.visible = NO;\n\
    ```\n\n为了检查某个特定图块坐标是否被阻挡，我在 `Tilemap10` 项目中添加了 `isTilePosBlocked` 方法，如代码清单 11–10\
    \ 所示。\n\n**代码清单 11–10.** *判断图块是否被阻挡*\n\n```c\n-(bool) isTilePosBlocked:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    CCTMXLayer* layer = [tileMap layerNamed:@\"\
    Collisions\"];\n    NSAssert(layer != nil, @\"Collisions layer not found!\");\n\
    \n    bool isBlocked = NO;\n    unsigned int tileGID = [layer tileGIDAt:tilePos];\n\
    \    if (tileGID > 0)\n    {\n        NSDictionary* tileProperties = [tileMap\
    \ propertiesForGID:tileGID];\n        id blocks_movement = [tileProperties objectForKey:@\"\
    blocks_movement\"];\n        isBlocked = (blocks_movement != nil);\n    }\n\n\
    \    return isBlocked;\n}\n```\n\n代码首先尝试从碰撞层获取指定坐标处的图块。如果该位置没有图块，`tileGID` 将为\
    \ `0`，我们可以安全地假设该图块未被阻挡。但如果 `tilePos` 坐标处存在有效的 `tileGID`，则会查询该图块的属性，返回一个 `NSDictionary`\
    \ 对象。如果字典的 `objectForKey` 方法对于键 `blocks_movement` 返回了一个有效对象，则说明该图块被阻挡。\n\n碰撞检测的位置在\
    \ `update` 方法中，如代码清单 11–11 所示。\n\n**代码清单 11–11.** *在 `update` 方法中检测碰撞*\n\n```c\n\
    -(void) update:(ccTime)delta\n{\n    …\n\n    // 如果地图正在移动，则等待其移动完成\n    if ([tileMap\
    \ numberOfRunningActions] == 0)\n    {\n        if (currentMoveDirection != MoveDirectionNone)\n\
    \        {\n            CGPoint tilePos = [self tilePosFromLocation:screenCenter\
    \ tileMap:tileMap];\n\n            CGPoint offset = moveOffsets[currentMoveDirection];\n\
    \            tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);\n\
    \            tilePos = [self ensureTilePosIsWithinBounds:tilePos];\n\n       \
    \     if ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)\n           \
    \ {\n                [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\
    \            }\n        }\n    }\n\n    …\n}\n```\n\n在移动地图之前，会调用 `isTilePosBlocked`\
    \ 方法来检查玩家是否真的可以移动到那里。如果目标图块坐标未被阻挡，则玩家会移动；否则不会。\n\n### 为游戏增加更多内容\n\n到目前为止，我们有了一个在等距地图世界中引导角色的游戏。隐藏在树后和避免碰撞只是这个游戏世界的基础。如果你想在世界中添加更多角色，无论是敌人还是非玩家角色（NPC），该怎么办？\n\
    \n原则上，移动它们的方式和移动玩家类似，只不过玩家是居中在屏幕上的，而 NPC 可以在地图的任何位置。不过，你仍然只需要确定 NPC 应该朝哪个方向移动，然后像\
    \ `centerTileMapOnTileCoord` 方法中移动图层那样移动它。唯一的区别是动作是在 NPC 上执行的，并且方向需要反转，因为你不是在移动地图，而是\
    \ NPC 在地图上移动。\n\n一旦有了四处游荡的 NPC，下一步就是思考如何让它们从 A 点移动到 B 点，同时避开障碍物并找到最短路径。答案是 A*\
    \ 寻路算法，这是一种行业标准算法，并已在许多场景中被改编和优化。基于图块的游戏是该寻路算法的理想应用场景，因为角色的位置通常限制在图块坐标上。想要深入了解\
    \ A* 寻路算法，坦白说，想要了解许多游戏编程主题，你必须访问 Amit 的 A* 页面：[`http://theory.stanford.edu/~amitp/GameProgramming/`](http://theory.stanford.edu/~amitp/GameProgramming/)。\n\
    \n你也会想访问 Amit 的游戏编程信息页面。他链接了关于人工智能和基于图块的游戏的文章，包括程序化世界生成。许多文章可能看起来已经过时，但事实上，它们大多是经典之作，仍然是宝贵的信息来源。可以前往\
    \ [`http://www-cs-students.stanford.edu/~amitp/gameprog.html`](http://www-cs-students.stanford.edu/~amitp/gameprog.html)\
    \ 查看。\n\n### 本章小结\n\n在本章中，你学习了等距地图的特殊之处、等距图块的设计方法，以及如何创建具有深度感的地图。你还学习了如何使用 Tiled\
    \ 创建和优化等距地图，包括添加不可穿越的边界和防止碰撞。\n\n你还学习了为在 cocos2d 中使用而设置地图的必要技术，以及如何配置 cocos2d\
    \ 本身，使其使用 2D 投影和深度缓冲区，以便正确渲染重叠的图块和精灵。\n\n最后，我们添加了一个玩家，其精灵会依据前方或后方是否有图块进行正确的裁剪。你也可以通过点击并按住屏幕相对于玩家精灵的方向，让玩家逐图块移动过去——除非该方向被你用\
    \ Tiled 设置的山脉、墙壁或其他阻挡移动的图块挡住了。\n\n到目前为止，你所处理的游戏都需要以离散步骤进行控制和动画。你需要负责实现所有角色的移动和旋转，以及碰撞检测。在接下来的两章中，我将向你介绍物理引擎，它可以让你轻松地观看游戏物体自行弹来弹去、相互碰撞。如果这是你第一次接触物理引擎，那将是一次神奇的经历。系好你的帽子！\n\
    \n## 第 12 章\n"
- fmt: '# Physics Engines


    Physics engines are what drive popular iOS games like Angry Birds, Stick Golf,
    Jelly Car, and Stair Dismount. They allow you to create a world that feels more
    dynamic and lifelike.


    Cocos2d is distributed with two physics engines: Box2D and Chipmunk. Both are
    designed to work only in two dimensions, so they''re a perfect fit for cocos2d.


    In this chapter, you''ll learn the basics of both physics engines, and along the
    way you''ll probably come to appreciate one more than the other. I''ll briefly
    explain the differences between the two physics engines, but for the most part
    it''s a choice based on personal preference.


    If you''ve never worked with a physics engine before, I''ll also give you a quick
    introduction to their basic concepts and key elements.


    ## Basic Concepts of Physics Engines


    You can think of a physics engine as an animation system for game objects. Of
    course, it''s up to the game developer to connect and synchronize game objects
    like sprites with the physics objects, called *rigid bodies*. They are called
    that because physics engines animate them as if they were stiff, nondeformable
    objects. This simplification allows physics engines to calculate a large number
    of bodies.


    There are generally two types of bodies: *dynamic* (moving) and *static* (immovable)
    objects. The differentiation is important because static bodies never move—and
    should never be moved—and the physics engine can rely on certain optimizations
    based on the fact that static bodies never collide with each other.


    Dynamic bodies, on the other hand, collide with each other and with static bodies.
    They also have at least three defining parameters in addition to their position
    and rotation. One is *density*, or *mass*—in other words, a measure of how heavy
    an object is. Then there is *friction*—how resistant or slippery the dynamic body
    is with respect to moving over surfaces. Finally, there is *restitution*, which
    determines the bounciness of the object. While impossible in the real world, physics
    engines can create dynamic bodies that will never lose momentum as they bounce,
    or even gain speed every time they bounce off of some other body.


    Both dynamic and static bodies have one or more shapes that determine the area
    the body encompasses. Most often the shape is a circle or a rectangle, but it
    can also be a polygon, a number of vertices forming any complex shape, or merely
    a straight line. The shapes of a body determine where other bodies and their shapes
    collide. And in turn, each collision generates *contact points*—the points where
    the two bodies'' shapes intersect. These contact points can be used to play particle
    effects or add scratch marks at exactly the places where the bodies have collided.


    Dynamic bodies are animated by the physics engine through applying forces, impulses,
    and torque instead of setting their position and rotation directly. Modifying
    position and rotation directly is advised against, because physics engines make
    certain predictions that no longer hold true if you manually reposition bodies.


    Finally, bodies can be connected together by using a selection of *joints*, which
    limit the movement of connected bodies in various ways. Some joints may have motors,
    which for example can act as the drive wheel of a car or as friction for the joint
    so that the joint tries to snap back to its original position.


    ## Limitations of Physics Engines


    Physics engines have their limits. They have to take shortcuts because the real
    world is prohibitively complex to simulate. The use of rigid bodies is such an
    example. In some extreme cases, physics engines may not be able to catch every
    collision—for example, when bodies are moving very fast, in which case they can
    tunnel through each other. While this has been proven to happen in quantum physics,
    real-world objects that we can actually see with our own eyes have yet to show
    that effect.


    Rigid bodies can sometimes penetrate each other and get stuck, especially if they
    are constrained by joints that hold two or more bodies together and limit their
    range of motion. This can lead to undesirable trembling motions of the bodies
    as they struggle to move apart while keeping their joint constraints satisfied.
    You may have seen this even in modern games; for example, the ragdolls of dead
    actors in a first-person shooter game can sometimes be seen in very unnatural
    body positions or limbs not coming to rest at all. Such events continue to amaze
    and amuse players.


    And of course there can be game-play issues. With rigid bodies, you never know
    what will happen given enough players interacting with them. Eventually some players
    may manage to block themselves and trap themselves in a dead-end situation, or
    they may figure out how to exploit the physics simulation to be able to move to
    areas they shouldn''t be able to reach.


    ## The Showdown: Box2D vs. Chipmunk


    Cocos2d is distributed with two physics engines: Box2D and Chipmunk. How should
    you choose between them?


    In a lot of cases, this boils down to a matter of taste. Most developers argue
    along the lines of the programming language in which the physics engines are implemented:
    Box2D is written entirely in C++, while Chipmunk is written in C.


    You may favor Box2D over Chipmunk simply because of its C++ interface. Being written
    in C++ has the added advantage that it integrates better with the likewise object-oriented
    Objective-C language. You may also appreciate that Box2D uses fully written-out
    words throughout, as opposed to the many one-letter abbreviations common in Chipmunk.
    In addition, Box2D makes use of operator overloading so that you can, for example,
    add two vectors simply by writing the following:


    `b2Vec2 newVec = vec1 + vec2;`


    Box2D has a few features that Chipmunk doesn''t offer. For example, it has a solution
    for fast-moving objects (bullets) that solves the tunneling problem I mentioned
    earlier.


    If you''re not very familiar with C++, you may find the steep learning curve of
    the C++ language daunting. To that end, the Chipmunk physics engine may be more
    welcoming to you if you''re more familiar with C language syntax or prefer a lightweight
    implementation of a physics engine that is easier to pick up and learn. Its being
    part of the cocos2d distribution for many months longer than Box2D has also spawned
    more tutorials and forum posts about Chipmunk, although Box2D tutorials are catching
    on.


    One warning ahead of time: Chipmunk uses *C structures*, which expose internal
    fields. If you''re experimenting and don''t know what certain fields are used
    for and they''re not documented, that means you should not change them—because
    they are used only internally.


    There is also the popular Chipmunk *SpaceManager*, which adds an easy-to-use Objective-C
    interface to Chipmunk. SpaceManager also makes it easy to attach cocos2d sprites
    to bodies and adds debug drawing, among other things. You can download Chipmunk
    SpaceManager here: [`http://code.google.com/p/chipmunk-spacemanager`](http://code.google.com/p/chipmunk-spacemanager).


    In terms of functionality, you can safely choose either engine. Unless your game
    relies on one particular feature that one physics engine has and the other doesn''t,
    you can use either one to great effect. Especially if you have no familiarity
    with either physics engine, feel free to choose the one that appeals to you more
    based on the language and coding style.


    I will now introduce you to the basics of both physics engines for the rest of
    this chapter so that you can decide for yourself which one appeals to you more.
    In the next chapter, you''ll learn how to build a playable pinball game with bumpers,
    flippers, and lanes built with Box2D and the VertexHelper tool.'
