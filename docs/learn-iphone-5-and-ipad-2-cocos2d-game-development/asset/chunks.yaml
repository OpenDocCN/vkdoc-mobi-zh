- fmt: '# Limitations of Mixing Cocoa Touch with cocos2d


    When designing your app or game that mixes Cocoa Touch views with the cocos2d
    view, you should be aware of some limitations. Most obviously, UIKit views are
    not designed for high performance, so you may notice a drop in performance, especially
    if you use UIKit views in fast-paced games and during game play.


    For example, it is more favorable for performance to rely on `CCLabelBMFont` to
    display the score during game play than using a `UITextField` for the same purpose.
    And likewise, you should prefer to use `CCMenu` for the in-game pause menu button
    rather than using a `UIButton`. In menu screens, however, those performance considerations
    are usually not a problem, and you can see improved productivity from being able
    to use Interface Builder to create your menu screens.


    Mixing UIKit views in a cocos2d app while supporting autorotation will also affect
    performance, quite severely on first- and second-generation devices. Just allowing
    all views to be possibly rotated can have your framerate drop to below 60 fps
    right away, without even rendering anything! That means you might want to leave
    autorotation support disabled specifically for the older devices, which is the
    default setting in the cocos2d project templates.


    You should also be aware that any UIKit view can be either in front of the entire
    cocos2d view or entirely behind it. You can’t have a UIKit view that is in front
    of some of the cocos2d scene’s sprites, labels, effects, and so on, while at the
    same time being behind other cocos2d sprites, labels, effects, or other nodes.
    In other words, you cannot “sandwich” a UIKit view between two or more cocos2d
    nodes.


    You can do the opposite, however, although with some limitations. You can “sandwich”
    the cocos2d view: UIKit views in the background, then a transparent cocos2d view,
    and then some more UIKit views in the foreground. This approach requires only
    a little more work setting up the view hierarchy and making the cocos2d view transparent.
    Imagine playing a full-motion video in the background, over which you draw cocos2d
    sprites, and the rest of the user interface is made up of UIKit views.


    But touch input remains a problem: either the UIKit views and not the cocos2d
    view will receive input or those UIKit views added to the cocos2d view and the
    cocos2d view itself will receive input but not the views in the background. This
    has to do with the fact that the cocos2d view receives all touches on the screen
    simply because it occupies the entire screen. So, you need to write additional
    code to process the touches on the cocos2d view and then decide whether the cocos2d
    view should forward the touches, for example if the user didn’t touch any of the
    cocos2d sprites currently displayed on screen.


    Allowing all views to receive input is possible, and I’ll provide you with a basic
    solution later in this chapter. But it is up to you to improve and adapt it for
    your own needs. Depending on your needs, the necessary code changes may actually
    be substantial and challenging in order to fully support UIKit views both in front
    of the cocos2d view and behind it and have all views reacting properly to touch
    input.


    ## How Is Cocoa Touch Different from cocos2d?


    Let’s take a look at the major differences of Cocoa Touch programming compared
    to working with cocos2d. One difference is the Model-View-Controller pattern common
    to Cocoa Touch applications but essentially missing from cocos2d. And then you
    also have to consider the differences caused by cocos2d’s OpenGL ES view since
    it behaves differently in some aspects than a regular `UIView`.


    ### The Model-View-Controller Pattern


    Probably the first and biggest difference for programmers coming from a Cocoa
    Touch background is that cocos2d does not strictly adhere to the Model-View-Controller
    (MVC) pattern, which is commonplace in Cocoa and Cocoa Touch.


    The MVC pattern divides the programming tasks into the three subsets: model, view,
    and controller. The model contains any algorithms that run behind the scenes and
    maintains the state of the world; in essence, the model represents knowledge.
    The view is the visual representation of the model and renders the current state
    of the world based on the model data. And the controller essentially provides
    a means for the user to interact with the world through user input, but it is
    also used to react to other external events such as receiving data over the network.
    The model, view, and controller are each separate classes to decouple the user
    interface from business (or game) logic.


    In games, the MVC pattern can be applied, and many have attempted to do so with
    cocos2d. You’ll find a good number of articles on the subject if you search for
    *cocos2d mvc*, and my personal favorite treatment of the subject is this two-part
    article by Bartek Wilczyński:


    `http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-game`

    `http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-gamepart-2`


    For Cocoa Touch programmers, the fact that cocos2d does not follow the MVC pattern
    may come as a culture shock. But it’s one you can work around. On the other hand,
    as a cocos2d programmer, you likely won’t even notice that you’re using MVC because
    the entire Cocoa Touch framework is designed for the MVC pattern. You’ll happily
    use the controllers and views provided to you, and you’ll find no problem adding
    the logic and algorithms (the model) into either controller or view, or both.
    That is also a valid pattern, albeit more tightly coupled and less maintainable
    in large projects.


    ### Cocos2d’s View Uses OpenGL ES


    Instead of relying on UIKit for displaying its graphics, cocos2d creates an OpenGL
    ES view. This means cocos2d has more direct access to graphics resources and can
    render its view much faster. On the other hand, it does lose some of the automatic
    features of UIKit applications, like autorotation.


    Of course, behind the scenes, all UIKit views are also rendered by OpenGL ES;
    there’s just a lot more stuff going behind the scenes that is needed for graphical
    user interfaces but is essentially a waste of performance if you want to make
    games. You may remember the very early games that were written entirely with UIKit,
    Core Graphics, and Core Animation? If not, good for you. They were often slow
    and unresponsive.


    One immediately noticeable difference between Cocoa Touch and cocos2d is how autorotation
    is handled. Later in this chapter you’ll learn how cocos2d implements autorotation
    to rotate both OpenGL ES content as well as UIKit views. Fortunately for us, this
    issue was solved eventually by the cocos2d engine so you can rotate both UIKit
    and cocos2d views, but there are some performance drawbacks. And in some cases,
    you still need to consider the differences in coordinate systems used by UIKit
    and OpenGL ES, especially if views are being rotated.


    And since cocos2d is programmed to interact directly with the graphics hardware,
    it uses its own hierarchy of displaying graphical elements. In cocos2d that’s
    the `CCNode` hierarchy where you can add any `CCNode`-based class to any other
    `CCNode`, with a `CCScene` as the very first element in that hierarchy. The UIKit
    framework, on the other hand, operates with a view hierarchy where you add `UIView`-based
    classes to another, often with a `UIWindow` as the topmost element. Both view
    hierarchies are incompatible, so you can’t add a `UIView` to a `CCNode`, and vice
    versa. This is noticeable when you change from one `CCScene` to another using
    a `CCTransitionScene`. While the cocos2d nodes all move aside, the UIKit views
    will remain fixed in place unless you also move them separately and in sync with
    the cocos2d animation. It’s actually a good idea to avoid this kind of situation
    in the first place.'
