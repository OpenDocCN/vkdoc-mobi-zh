    \ 找到 OpenGL ES 2.0 的文档。\n\n### 添加弹球\n\n你能想象一个没有弹球的弹球游戏吗？我无法想象，所以让我们给 PhysicsBox2D04\
    \ 项目添加一个弹球，并看看它的实现。这个恰如其分地命名为 `Ball` 的类派生自 `BodyNode`，并且为了实验目的还实现了 `CCTargetedTouchDelegate`\
