  trans: '

    ##### 粒子纹理


    如果没有纹理，所有粒子都将是扁平的彩色方块，如图 9–3 所示。要为粒子效果使用纹理，请使用 `CCTextureCache` 的 `addImage` 方法提供一个纹理，该方法会返回给定图像文件的
    `CCTexture2D`：


    ```

    self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];

    ```


    粒子纹理的最佳效果是呈云状且大致为球形。如果纹理具有高对比度区域，类似于特定的形状或形态（例如射击游戏中的 `redcross.png`），通常会对粒子效果产生不利影响。这使得单个粒子更容易被识别出来，因为它们之间的融合效果不佳。某些效果可以巧妙地利用这一点，比如之前提到的在玩家头部周围旋转的星星。此外，卡通风格的图片或渐变效果最佳，而逼真照片风格的图片往往会产生难以辨认的像素混乱。为了验证这一点，你将在图
    9–6 中看到三种不同纹理应用于同一粒子效果的情况。


    粒子纹理最重要的一点是：图像的尺寸**必须**不超过 64x64 像素。纹理尺寸越小，粒子效果的运行性能越好。


    ![images](img/0906.jpg)


    **图 9–6.** *同一粒子效果使用不同纹理的情况。逼真照片风格的图像效果不佳。*


    ### 粒子设计器


    粒子设计器是一款用于为 cocos2d 和 iOS OpenGL 应用程序创建粒子效果的交互式工具。你可以从 [`http://particledesigner.71squared.com`](http://particledesigner.71squared.com)
    下载试用版。


    这是一款非常宝贵的工具，能为你节省大量创建粒子效果的时间。它的强大之处在于，你可以立即看到更改粒子效果属性时屏幕上发生的变化，并且你可以与他人分享你的创作，同时从其他开发者的粒子效果中获得灵感。


    #### 粒子设计器介绍


    默认情况下，粒子设计器的用户界面会显示一个粒子效果的视觉列表。要编辑特定效果，请选中它，然后通过双击或点击右上角的 `Emitter Config`（发射器配置）按钮，切换到
    `Emitter Config` 视图（图 9–7）。


    ![images](img/0907.jpg)


    **图 9–7.** *粒子设计器充满了可以交互式调整的属性。一个单独的窗口（图 9–8）会在你编辑时同步显示效果。*


    你应该能认出这些参数，它们与之前描述的自制粒子效果属性一致。只有少数属性在粒子设计器中不可用或无法编辑。一个是 `positionType`，另一个是半径发射器模式的
    `endRadiusVar` 属性。后者意味着你无法创建在半径模式下向外旋转的粒子效果。但你可以随时加载一个粒子设计器效果，然后通过覆盖某些属性（例如将 `positionType`
    设置为 `kCCPositionTypeFree`，稍后将在代码清单 9–4 中实现）在代码中对其进行微调。与实际看到滑块移动时效果如何变化相比，这只是一点小麻烦。


    **注意**：粒子设计器的开发者目前正在开发粒子设计器 2.0，该版本将拥有重新设计的、不那么拥挤的用户界面。他们还计划创建专门的控件，允许你通过单个类似计量器的控件同时更改值和方差。因此，如果你的粒子设计器与图
    9–7 中的外观大不相同，你可能正在使用 2.0 版本。如果你阅读本文时 2.0 版本尚未发布，请知悉现有客户可以免费升级至 2.0 版本。


    唯一不常用的控件是“粒子纹理”。这里没有用于加载图像的按钮，双击该字段也不会产生任何效果。其中的诀窍在于：粒子纹理框只接受拖放至其上的图像。只需从 Finder
    中拖动任意图像到该框上，该框就会变绿，表示它可以接受该图像。一旦你放下图像，它就会被粒子效果使用。


    **警告：** 如果你拖放的图像尺寸大于 512x512 像素，粒子设计器会发出警告。它仍会使用该图像，但会将其缩小至 512x512 像素，而忽略其原始宽高比。另外请注意，粒子设计器
    1.3 版本已经移除了此前对纹理 64x64 像素的限制。


    图 9–8 中的粒子设计器预览窗口看起来与 iPhone 模拟器一模一样。它也可以设置为 iPad 屏幕尺寸，并且可以通过点击粒子设计器菜单栏中“Load”、“Save”和“Save
    As”按钮右侧的 `iPad`/`iPhone` 和 `Orientation`（方向）按钮来更改方向。通过点击并在预览窗口内拖动，你可以移动粒子效果，这有助于你了解效果在移动物体上可能呈现的样子。


    请注意，背景颜色设置并非实际效果的组成部分。它们只会改变预览窗口的背景色。如果你的游戏色彩明亮，而你想要设计一个暗淡或微弱的效果，并且仍然能够看清你在做什么，这个功能会很有用。


    ![images](img/0908.jpg)


    **图 9–8.** *粒子设计器有一个类似于 iPhone 模拟器的预览窗口。你也可以将其设置为 iPad 屏幕尺寸并更改其方向。如果在屏幕内点击并拖动，你甚至可以移动粒子效果，以查看其在移动物体上可能呈现的效果。*


    如果你缺乏灵感，可以随时使用 `Ramdomize`（随机化）按钮。你也可以琢磨一下 *ramdomize* 这个单词的含义，在粒子设计器中它就是这么拼写的。根据《城市词典》的解释，*ramdom*
    是随机（random）的一种更酷的说法。所以，我猜开发者只是觉得他们的随机化工具格外酷。嗯，尽管它并没有随机化所有可用属性，但它的确能激发灵感。例如，`Ramdomize`
    永远不会更改发射器类型、发射器位置以及许多发射器类型特有的参数。


    一旦你找到了灵感，你就可以滑动滑块，观察预览窗口中的变化。慢慢来，调整一个效果，直到你满意为止。不过要小心，因为这确实是一项极具吸引力甚至令人着迷的活动，你会很容易发现自己仅仅为了乐趣而创建新的粒子效果。


    **警告：** 设计粒子效果时请务必谨慎！首先，请记住，你的游戏还需要计算和渲染许多其他内容。如果你当前设计的效果在粒子设计器的预览窗口中以 60 FPS
    运行，这并不意味着它在你的游戏中使用时不会拖慢帧率。始终在游戏中测试新的粒子效果，并密切关注帧率。此外，请务必在设备上（尤其是在旧款设备上！）运行这些测试！你的游戏在
    iPhone/iPad 模拟器中的性能表现通常具有误导性，因此必须视为完全不可靠。粒子设计器预览窗口也是如此。

    '
- fmt: '# Using Particle Designer Effects


    I''m assuming that, hours later, you''ve made the perfect particle effect and
    now you''d like to use that in cocos2d. I made mine, and the first step is to
    save the particle effect. When you click the `Save` or `Save As` button in Particle
    Designer, you''ll be presented with a dialog as shown in [Figure 9–9](#Chapter09.html#fig_9_9).


    ![images](images/0909.jpg)


    **Figure 9–9.** *Saving a particle effect from Particle Designer requires you
    set the file format to cocos2d. Embedding the texture into the plist file is optional.*


    For the saved particle effect to be usable by cocos2d, you must set the `File
    Format` setting to `cocos2d (plist)`. You can also check the `Embed texture` box,
    which will save the texture into the plist file. The benefit is that you only
    have to add the plist file to your Xcode project; the downside is that you then
    can''t change the effect''s texture without loading the particle effect back into
    Particle Designer.


    After saving the effect, you have to add the effect plist and, if you didn''t
    embed the texture, the effect''s PNG file to your Xcode project''s Resources group.
    In the `ParticleEffects03` project, I''ve added both variants, one effect with
    a separate PNG texture and another effect that has the texture embedded in the
    plist file.


    [Listing 9–4](#Chapter09.html#list_9_4) shows how I modified the `runEffect` method
    to load the Particle Designer effects.


    **Listing 9–4.** *Using a Particle Effect Created with Particle Designer*


    ```

    -(void) runEffect

    {

        // remove any previous particle FX

        [self removeChildByTag:1 cleanup:YES];


        CCParticleSystem* system;


        switch (particleType)

        {

            case ParticleTypeDesignedFX:

                system = [CCParticleSystemQuad particleWithFile:@"fx1.plist"];

                break;

            case ParticleTypeDesignedFX2:

                system = [CCParticleSystemQuad particleWithFile:@"fx2.plist"];

                system.positionType = kCCPositionTypeFree;

                break;

            case ParticleTypeSelfMade:

                system = [ParticleEffectSelfMade node];

                break;


            default:

                // do nothing

                break;

        }


        CGSize winSize = [[CCDirector sharedDirector] winSize];

        system.position = CGPointMake(winSize.width / 2, winSize.height / 2);

        [self addChild:system z:1 tag:1];


        [label setString:NSStringFromClass([system class])];

    }

    ```


    You initialize a `CCParticleSystem` with a Particle Designer effect by using the
    `particleWithFile` method and providing the particle effect''s plist file as parameter.
    In this case, I chose a `CCParticleSystemQuad` since it performs well on all iOS
    devices. You can also leave this decision to cocos2d by using the `ARCH_OPTIMAL_PARTICLE_SYSTEM`
    keyword in place of an actual class name:


    ```

    system = [ARCH_OPTIMAL_PARTICLE_SYSTEM particleWithFile:@"fx1.plist"];

    ```


    **CAUTION:** Particle Designer effects must be initialized with either `CCParticleSystemQuad`
    or `CCParticleSystemPoint`. Even though `CCParticleSystem`, the parent class for
    the aforementioned subclasses, implements the `particleWithFile` method, it won''t
    display anything unless you use one of the subclasses, either Quad or Point particle
    systems, when loading Particle Designer effects.


    As a side note, I moved the two lines that position the particle system node at
    the center of the screen outside of the `switch` case to avoid duplicating that
    code. As I mentioned before, it''s always good practice to minimize the amount
    of code duplication, and this is one area where I''ve seen developers simply copying
    and pasting what''s already there.


    # Sharing Particle Effects


    What''s very cool about Particle Designer is that you can share your creations
    with other Particle Designer users. From the Particle Designer menu, simply choose
    `Share` and then `Share Emitter` to open a dialog that lets you enter a title
    and description for your particle effect, as shown in [Figure 9–10](#Chapter09.html#fig_9_10).


    ![images](images/0910.jpg)


    **Figure 9–10.** *By submitting a Particle Effect to the Online Library, you can
    share your creations with other users.*


    **CAUTION:** As the message in [Figure 9–8](#Chapter09.html#fig_9_8) indicates,
    you should be careful to only upload artwork for which you have the rights to
    share and distribute or for which you are the copyright holder. Otherwise, you
    risk violating someone''s copyright or may be violating a nondisclosure or other
    agreement if you work under contract.


    In [Figure 9–11](#Chapter09.html#fig_9_11), you can see the effect I just submitted
    in the lower-right corner.


    ![images](images/0911.jpg)


    **Figure 9–11.** *The submitted effect quickly appears in the Online Library.
    The effect I just submitted is the one in the bottom-right corner. Apparently
    my description was too long to fit in the display area.*


    Shared particle effects may not always be perfect for your requirements, but they
    often provide good starting points for your own effects. They help you achieve
    the desired effect much faster, and, at the very least, they can be an inspiration.
    I encourage you to scroll through the list of effects and try as many as you can
    to gain a good sense of what''s possible, what looks good, and what just doesn''t
    work.'
