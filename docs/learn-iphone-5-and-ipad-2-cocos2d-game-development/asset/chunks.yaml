    对于大多数 iOS 开发者来说，存在一条清晰的分界线：如果你想用“常规”的、没有或只有很少多媒体内容的应用，你会使用 Cocoa Touch 及其 UIKit
    框架来创建 iPhone 和 iPad 的原生用户界面。


    另一方面，如果你想开发 iOS 游戏和多媒体应用，你会使用 cocos2d，并且几乎没有动力使用除`CCSprite`和`CCMenu`之外的任何东西来创建游戏的场景和用户界面。


    大量开发者只熟悉其中一种环境，他们常常会发现从 Cocoa Touch 跨越到 cocos2d，或者反过来，是一件令人困惑的事情。在几乎所有这些情况下，程序员都希望结合两者的优点，利用他们已有的关于
    Cocoa Touch 或 cocos2d 的知识来创建混合型应用。


    由于 Cocoa Touch 和 cocos2d 的工作方式根本不同，并且需要不同的思维方式，创建这样的混合应用通常并不直接。本章将帮助你在这两个方向上进行过渡。你将学习如何向
    cocos2d 应用中添加 Cocoa Touch 视图和功能；同时，你还将学习如何将 cocos2d 嵌入到现有的 Cocoa Touch 应用中。


    ### 什么是 Cocoa Touch？


    Cocoa Touch 是用于创建 iOS 应用的应用程序编程接口（API）的名称。它当然受到了 Cocoa 的启发，Cocoa 是用于编程 Mac OS
    X 应用的 API。


    Cocoa Touch 由多个框架组成，例如 Core Animation、Core Data、Map Kit、Store Kit 和 Web Kit，仅举几例。但严格来说，甚至
    cocos2d 也是一个 Cocoa Touch 库，因为 cocos2d 所基于的 OpenGL ES 框架，以及 Core Audio、OpenAL 和
    AV Foundation（AV 代表 Audio/Video）框架，都是 Cocoa Touch 的一部分。


    因此，当大多数程序员询问如何将 Cocoa Touch 视图集成到 cocos2d 中时，他们具体指的就是 UIKit。UIKit 是一个框架，它为程序员提供了用于构建
    iOS 应用图形用户界面（GUI）的原生 iOS 控件和视图。同时，其他框架如 iAd、Web Kit、Game Kit 和 Map Kit 添加了专门的视图，它们大多使用
    UIKit 提供的 GUI 元素构建。


    所以，从技术上讲，即使程序员讨论 Game Center 与 cocos2d 的集成问题，他们也常常将这些视图视为 UIKit 的一部分，即使实际的视图是由
    Game Kit 或 Web Kit 等提供的。供参考，以下是分别标记为 UIKit 和 Cocoa Touch 的 cocos2d 论坛主题：


    `http://www.cocos2d-iphone.org/forum/tags/uikit`

    `http://www.cocos2d-iphone.org/forum/tags/cocoa-touch`


    ### 同时使用 Cocoa Touch 和 cocos2d


    在我们开始处理本章的代码之前，我想先退一步，讨论一下为什么有人想要将 cocos2d 与 Cocoa Touch（UIKit 视图）混合使用，存在哪些限制，以及
    Cocoa Touch 和 cocos2d 之间的区别是什么。


    #### 为什么要将 Cocoa Touch 与 cocos2d 混合使用？


    有很多充分的理由可以将 Cocoa Touch 和 cocos2d 混合使用。本质上，它们都是为了实现更好的用户体验或更快的开发速度。


    一方面，如果你是一位 cocos2d 程序员，你迟早会向你的应用中添加一些 Cocoa Touch 视图，最常见的是为了通过 iAd 产生一些收益，或者如果你在编写一个支持
    Game Center 的游戏。但你也可能希望为用户提供一个原生外观的用户界面，这可以通过 Interface Builder 高效地设计，然后使用保持游戏外观和感觉的纹理进行皮肤化处理，这样你的用户界面就不会看起来像“设置”应用。Carcassone
    就是一个很好的皮肤化应用例子；你可能需要看两次才能发现它的用户界面实际上完全是由 UIKit 视图构成的。


    虽然你可以使用 cocos2d 制作相当不错的用户界面，但是 UIKit 中已经有大量 cocos2d 不提供的现成控件。而偶尔在 cocos2d 中的重新实现总是缺乏手感和功能。滑块、开/关切换按钮、导航视图和标签栏在设计游戏用户界面时都非常有用，尤其是在那些性能不是最重要的游戏或游戏部分。


    如果你是一位 Cocoa Touch 程序员，并且你的游戏中需要一些多媒体内容，那么依赖 cocos2d 来完成这项工作并以高性能运行，比起直接用 OpenGL
    ES 编程要容易得多。毕竟，cocos2d 让你免于处理 OpenGL ES，并提供了一个更易于使用的接口。


    Cocoa Touch 确实提供了强大的图形框架，如 Core Graphics 和 Core Animation。但它们有一个主要缺点：对于实时游戏来说，它们通常不够快。它们被设计用于显示和动画化用户界面元素，而不是游戏。

