    \ = NO;\n\n    CCTMXLayer* eventLayer = [tileMap layerNamed:@\"GameEventLayer\"\
    ];\n    int tileGID = [eventLayer tileGIDAt:tilePos];\n\n    if (tileGID != 0)\n\
    \    {\n        NSDictionary* properties = [tileMap propertiesForGID:tileGID];\n\
    \        if (properties)\n        {\n            NSString* isWaterProperty = [properties\
    \ valueForKey:@\"isWater\"];\n            isTouchOnWater = ([isWaterProperty boolValue]\
    \ == YES);\n        }\n    }\n\n    // 根据触摸位置决定下一步操作\n    if (isTouchOnWater)\n\
    \    {\n        [[SimpleAudioEngine sharedEngine] playEffect:@\"alien-sfx.caf\"\
    ];\n    }\n    else\n    {\n        // 获取冬季图层并切换其可见性\n        CCTMXLayer* winterLayer\
    \ = [tileMap layerNamed:@\"WinterLayer\"];\n        winterLayer.visible = !winterLayer.visible;\n\
    \    }\n}\n```\n\n`CCTMXTiledMap`以常规方式检索。触摸位置首先被转换为屏幕坐标，然后用于获取包含该特定屏幕位置切片地图索引的`tilePos`。稍后我会介绍`tilePosFromLocation`方法。现在，只需知道它返回了被触摸切片的索引即可。\n"
- fmt: "# Introduction to Global Identifiers (GIDs) for Tiles\n\nAt this point, I'd\
    \ like to introduce the concept of global identifiers (GIDs) for tiles, which\
    \ are unique integer numbers assigned to each tile used in a tilemap. The tiles\
    \ in a map are consecutively numbered, starting with 1. A GID of 0 represents\
    \ an empty tile. With the `tileGIDAt` method of the `CCTMXLayer`, you can determine\
    \ the GID number of the tile at the given tile coordinates.\n\nNext, the `CCTMXLayer`\
    \ named `GameEventLayer` is obtained from the tilemap. This is the layer where\
    \ I defined the `isWater` tile and drew it over the river tiles. The `tileGIDAt`\
    \ method returns the unique identifier for this tile. If the identifier happens\
    \ to be 0, it means there is no tile at this position on this layer—in that case,\
    \ it's already clear that the touched tile can't be an `isWater` tile.\n\nThe\
    \ `CCTMXTiledMap` has a `propertiesForGID` method, which returns an `NSDictionary`\
    \ if there are properties available for the tile with the given identifier (GID).\
    \ This `NSDictionary` contains the properties edited in Tiled (see [Figure 10–8](#Chapter10.html#fig_10_8)).\
    \ The dictionary stores any key/value pairs as `NSString` objects. If you want\
    \ to see what's in a particular `NSDictionary` for debugging purposes, you can\
    \ use a `CCLOG` statement like this:\n\n```\nCCLOG(@\"NSDictionary 'properties'\
    \ contains:\\n%@\", properties);\n```\n\nThis will print out a line similar to\
    \ the following in the Debugger Console window:\n\n```\n2010–08-30 19:50:52.344\
    \ Tilemap[978:207] NSDictionary 'properties' contains:\n{\n    isWater = 1;\n\
    }\n```\n\nYou'll be dealing with a variety of `NSDictionary` objects while working\
    \ with tilemaps. Logging its contents allows you to peek inside any `NSDictionary`,\
    \ or any iPhone SDK collection class, for that matter. This will come in handy\
    \ at times.\n\nEach property in an `NSDictionary` can be retrieved by its name\
    \ through the `NSDictionary` method `valueForKey`, which returns an `NSString`.\
    \ To get a bool value from the `NSString`, you can simply use the `NSString`'s\
    \ `boolValue` method. In much the same way, you can retrieve integer and floating-point\
    \ values using `NSString`'s `intValue` and `floatValue` methods, respectively.\n\
    \nAt the end of `ccTouchesBegan`, I check whether the touch was on water, and\
    \ if so, a sound is played. Otherwise, I retrieve the `WinterLayer` and toggle\
    \ its `visible` property by negating it. Changing seasons has never been this\
    \ simple! The effect should illustrate how you can use multiple layers in Tiled\
    \ to achieve changes on a global scale without having to load a completely separate\
    \ tilemap.\n\nFor more local changes to individual tiles, you can make use of\
    \ the `removeTileAt` and `setTileGID` methods to remove or replace tiles of a\
    \ specific layer during game play:\n\n```\n[winterLayer removeTileAt:tilePos];\n\
    [winterLayer setTileGID:tileGID at:tilePos];\n```\n\n## Locating Touched Tiles\n\
    \nI mentioned the `tilePosFromLocation` method earlier, and I'll repeat the two\
    \ relevant lines here:\n\n```\n// Get the position in tile coordinates from the\
    \ touch location\nCGPoint touchLocation = [self locationFromTouch:[touches anyObject]];\n\
    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\
    ```\n\nFirst, the position of the touch is mapped to screen coordinates. I've\
    \ done this before, but since you'll be needing this code a lot, I've provided\
    \ it in [Listing 10–2](#Chapter10.html#list_10_2) for your reference.\n\n**Listing\
    \ 10–2.** *Determining the Position of a Touch*\n\n```\n-(CGPoint) locationFromTouch:(UITouch*)touch\n\
    {\n    CGPoint touchLocation = [touch locationInView: [touch view]];\n    return\
    \ [[CCDirector sharedDirector] convertToGL:touchLocation];\n}\n```\n\nWith the\
    \ touch location converted to screen coordinates, the `tilePosFromLocation` method\
    \ is called. It gets both the touch location and a pointer to the `tileMap` as\
    \ parameters. The method in [Listing 10–3](#Chapter10.html#list_10_3) contains\
    \ a bit of math, which I'll explain in a second—hold your breath:\n\n**Listing\
    \ 10–3.** *Converting Location to Tile Coordinates*\n\n```\n-(CGPoint) tilePosFromLocation:(CGPoint)location\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // Tilemap position must be offset,\
    \ in case the tilemap is scrolling\n    CGPoint pos = ccpSub(location, tileMap.position);\n\
    \n    // Cast to int makes sure that result is in whole numbers\n    pos.x = (int)(pos.x\
    \ / tileMap.tileSize.width);\n    pos.y = (int)((tileMap.mapSize.height * tileMap.tileSize.height\
    \ - pos.y) /\n        tileMap.tileSize.height);\n\n    CCLOG(@\"touch at (%.0f,\
    \ %.0f) is at tileCoord (%i, %i)\", location.x, location.y,\n        (int)pos.x,\
    \ (int)pos.y);\n    NSAssert(pos.x >= 0 && pos.y >= 0 && pos.x < tileMap.mapSize.width\
    \ &&\n        pos.y < tileMap.mapSize.height, @\"%@: coordinates (%i, %i) out\
    \ of bounds!\",\n        NSStringFromSelector(_cmd), (int)pos.x, (int)pos.y);\n\
    \n    return pos;\n}\n```\n\nStill with me? If you've worked with tilemaps before,\
    \ this bit of code should be familiar, but if not, you may be at a loss. I'll\
    \ explain. The first thing this method does is subtract the current `tileMap.position`\
    \ from the touch location. The upcoming Tilemap03 example project adds tilemap\
    \ scrolling, so the tilemap's position will most likely not be at (0,0).\n\nTo\
    \ make the viewpoint scroll further up (north) and to the right (east), you actually\
    \ have to change its position by negative amounts. That is because the tilemap\
    \ starts at position (0,0), which positions the map's bottom-left corner at the\
    \ very bottom left of the screen. The tilemap's (0,0) point coincides with the\
    \ screen's (0,0) point initially. If you were to move the tilemap to position\
    \ (100,100), it would seem as if the viewpoint were moving toward the left and\
    \ down. The common mistake is to assume that you're moving the viewpoint, which\
    \ you are not. The tilemap layer is what's moving, and to scroll further toward\
    \ the center of the tilemap, you have to offset the tilemap by negative values.\n\
    \nThe rest is simple math: to get the proper offset from the tilemap (whose position\
    \ we know is always negative), we have to subtract the touch location and `tileMap.position`.\
    \ The concrete numbers reveal that subtracting a negative number is actually an\
    \ addition:\n\n`location(240, 160) – tileMap.position(-100, -100) = pos(340, 260)`\n\
    \nWith the tilemap layer moved (-100,-100) pixels away from the screen's (0,0)\
    \ point and the touch being at (240,160) pixels on the screen, the total offset\
    \ of the touch location from the tilemap's position is (340,260) pixels away from\
    \ the current `tileMap.position`."
