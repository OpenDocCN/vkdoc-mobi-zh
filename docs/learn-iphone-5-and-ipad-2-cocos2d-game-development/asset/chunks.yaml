  trans: '

    # 弹球游戏


    我希望充分利用 Box2D 物理引擎，因此在本章中，你将制作一个真正的弹球游戏。弹球台的核心在于利用物理世界将其转化为有趣的体验。然而，借助物理引擎，你并不局限于现实世界的物理规则。


    弹球台上的某些元素，例如缓冲器和球，只需选择适当的摩擦、弹性和密度组合即可创建。其他元素则需要关节来运作——挡板需要`旋转`关节，而发射器需要`棱柱`关节。当然，你还需要大量静态形状来定义球台的碰撞多边形。


    由于在源代码中定义碰撞多边形并不现实，至少对于构建一个可信的弹球台所需的细节程度而言如此，我将介绍另一个有用的工具：PhysicsEditor。使用该工具，你可以通过简单地绘制顶点来创建碰撞多边形，甚至更快捷地，只需单击鼠标即可让
    PhysicsEditor 自动追踪形状的轮廓。


    在本章结束时，你将拥有一个完全可玩的弹球游戏，如图 Figure 13–1 所示。


    ![images](img/1301.jpg)


    **图 13–1.** *本章构建的弹球台*


    ## 形状：凸形与逆时针方向


    让我们从碰撞多边形的需求开始。为 Box2D 和 Chipmunk 定义碰撞多边形时，首先需要了解的是，这些引擎要求碰撞多边形具备以下属性：


    * 顶点按逆时针方向定义

    * 多边形为凸形


    *凸*形状是指任意两点之间的连线始终位于形状内部的形状。与之相对的是*凹*形状，其中两点之间的连线可能不完全包含在形状内部。凸形与凹形的区别如图 Figure
    13–2 所示。


    ![images](img/1302.jpg)


    **图 13–2.** *凸形与凹形*


    按逆时针方向定义凸形的顶点可以通过在脑海中绘制一个凸形来理解。你在任意位置放置一个顶点，然后向左放置另一个顶点。接着向下再向右，你便以逆时针方向绘制了一个矩形。或者放置另一个顶点，然后向右、向上、再向左，你同样会得到一个逆时针方向的形状。第一个顶点的起始位置无关紧要，但遵循顶点的逆时针顺序非常重要。


    幸运的是，如果你使用 PhysicsEditor，则无需关心多边形顶点的顺序（方向）或多边形是凸形还是凹形。PhysicsEditor 会自动为你透明地处理这些问题。PhysicsEditor
    会将凹形分割成一个或多个凸形。PhysicsEditor 附带的物理对象加载器随后会将所有形状分配给一个单一的 Box2D 刚体。尽管如此，尽量让形状不被分割仍然是一个好习惯，以便每个刚体具有尽可能少的碰撞形状，从而获得最佳性能。


    **提示：** 如何判断你是否犯了错误，意外创建了顺时针方向或凹形的碰撞形状？不同的物理引擎反应不同。有些会直接抛出错误。但对于 Box2D 而言，如果一个移动的刚体撞上了一个格式不正确的碰撞形状，该刚体在接近该形状时就会停止移动。如果你在
    Box2D 游戏中看到这种情况发生，请检查附近的碰撞多边形。


    ## 使用 PhysicsEditor


    了解了正确定义碰撞多边形的知识后，是时候看看 PhysicsEditor 工具了，你可以从 [`www.physicseditor.de`](http://www.physicseditor.de)
    下载。打开下载的 PhysicsEditor 磁盘映像，将 `PhysicsEditor.app` 拖入你的应用程序文件夹后，就可以运行 PhysicsEditor
    了（见图 Figure 13–3）。在 PhysicsEditor 磁盘映像中，你还会找到一个名为 `Loaders` 的文件夹，其中包含用于加载 PhysicsEditor
    创建的 Box2D 和 Chipmunk plist 文件的加载器代码（形状缓存）。在本章的示例项目中，你将使用 `GB2ShapeCache` 类来加载由
    PhysicsEditor 创建的形状。


    ![images](img/1303.jpg)


    **图 13–3.** *PhysicsEditor 应用程序*


    现在，请你将 `PhysicsBox2D03` 项目中 `Assets/pinball` 文件夹内的 PNG 文件拖放到 PhysicsEditor 最左侧标有
    `Shapes` 的窗格中。


    **注意：** 你只需使用高清分辨率图像来创建物理形状。无需为高/低分辨率分别创建物理形状。物理模拟世界与对象的图形表示无关，因此与屏幕分辨率无关。


    在 PhysicsEditor 中，首先需要修改的是导出器的设置。PhysicsEditor 可以导出到多种游戏引擎，支持 Box2D 和 Chipmunk
    物理引擎，甚至允许你创建自定义的导出格式。要编写与 `cocos2d` 兼容的文件，你必须将最右侧窗格中的 `Exporter` 设置改为 `Box2D generic
    (PLIST)`。先设置导出器很重要，因为它会根据目标物理引擎的能力启用或禁用 PhysicsEditor GUI 的某些功能。


    接下来，你应该将 `PTM-Ratio` 设置设为 240。这个值的单位是每米像素数，意味着在 Box2D 物理模拟世界中，240 像素等于 1 米。Box2D
    物理世界的尺寸很重要，因为 Box2D 针对 1 到 10 米大小的对象进行了优化。你也可以轻松运行更大或更小对象的模拟。但是，当对象非常大（几十甚至几百米）或非常小（几厘米或更小）时，Box2D
    会丢失精度并可能出现奇怪的行为。


    由于我们在 PhysicsEditor 中使用的是高分辨率图像，因此 `PTM-Ratio` 设为 240 将创建一个高 4 米（960 视网膜分辨率像素除以
    240）、宽 2.6 米（640 视网膜分辨率像素除以 240）的弹球台。`cocos2d` 中实际的像素与米的比例将是 PhysicsEditor 中 `PTM-Ratio`
    设置的一半，即每米 120 像素。这是因为 `cocos2d` 的坐标系以点为单位，这意味着标准分辨率屏幕和视网膜屏幕具有相同的尺寸：320x480 点。一个点在标准显示器上等于
    1 像素，在视网膜显示器上等于 2 像素。球台在 Box2D 物理世界中的大小不受实际屏幕分辨率的影响。如果你只使用标准分辨率图像并在应用中禁用了视网膜支持，那么
    PhysicsEditor 中的 `PTM-Ratio` 设置将等于 `Cocos2D` 中的值。

    '
- fmt: '### Defining the Plunger Shape


    Let’s start with the plunger, the spring that kicks the ball into play. Select
    the plunger image on the leftmost pane and click the `Add polygon` button on the
    center view’s toolbar. This creates a new triangle shape on the center working
    area and highlights it. Since we need a rectangular shape, double-click one of
    the sides to add a fourth vertex. In case you added too many vertices, you can
    right-click or Option-click a vertex and choose `Delete point` to remove it.


    You should move the four vertices to the four corners of the plunger by clicking
    and dragging them. Create a rectangular shape that encompasses the entire plunger,
    including the spring. Make the rectangle cover the complete plunger, including
    the spring. This will avoid problems when the ball by accident falls below the
    plunger’s head.


    You may have noticed the little bluish circle with the `+` inside. This is the
    anchor point of the shape, which coincides with the anchor point of the shape’s
    sprite. Later, when we position the shape in cocos2d, the shape’s anchor point
    will be centered on the coordinates that we provide.


    You will want to move the anchor point to the bottom center of the plunger image
    to make it easier to position the plunger. You can drag the blue circle, but in
    many cases, you will want to place it very accurately. In those cases, you can
    modify the anchor point’s absolute pixel position or the relative position in
    the `Parameters` pane under `Image Parameters`.


    In [Figure 13–4](#Chapter13.html#fig_13_4), you’ll see the plunger shape being
    edited.


    ![images](images/1304.jpg)


    **Figure 13–4.** *Manually defining a shape in PhysicsEditor*


    Instead of creating the shape from a polygon, you could have also used the `Add
    Rectangle` button. But then I wouldn’t have been able to tell you how to add or
    delete vertices and how to drag them.


    You can and should also set the collision bits for the plunger under the `Fixture
    parameters` section in the `Parameters` pane. The collision bits allow you to
    define which shapes collide and which don’t. The collision bit settings will be
    used to prevent the plunger from colliding with any shapes but the ball.


    To make working with collision bits easier, you can change the names of collision
    bits. The collision bit names are not exported; they serve only to remind you
    what each bit is used for. By default, the bits are called `bit_0` to `bit_15`.
    You will want to change the names of the first five bits to `Ball`, `Bumper`,
    `Flipper`, `Plunger`, and `Wall`, respectively.


    Box2D shapes collide with each other only when the category bit (the check box
    column labeled `Cat.`) and the mask bit (the check box column labeled `Mask`)
    of both shapes are set. Typically you will want to assign each shape to just one
    particular category. In the case of the plunger, make sure that only the category
    bit for the `Plunger` category is set. In other words, you’re assigning the plunger’s
    shape to be in the `Plunger` collision bit category. With the `Mask` check box,
    you then set with which other categories this shape is allowed to collide with.
    In the case of the plunger, you should set only the `Mask` check box for the `Ball`
    category, allowing the plunger to collide with the ball. [Figure 13–5](#Chapter13.html#fig_13_5)
    shows the correct settings for the Plunger collision category and mask flags.


    **NOTE:** So far, the plunger would collide with the ball, but the ball would
    not collide with the plunger. You’ll have to keep in mind that defining collisions
    is a two-way process, and in this case, you’ll still have to put the ball in the
    `Ball` category and check the ball’s `Mask` bit that corresponds with the `Plunger`
    category to have both ball and plunger collide with each other.


    You can also set the mask bit for the same category, allowing multiple objects
    of the same category to collide with each other. In the case of the ball shape,
    it would make sense to set the `Mask` bit of the `Ball` category in order to allow
    ball-to-ball collisions. This will be useful if you want to extend the pinball
    game to support multiple balls on the table at the same time.


    ![images](images/1305.jpg)


    **Figure 13–5.** *Collision parameters for the plunger*


    Below the `Cat.` and `Mask` columns, you’ll find the buttons `All`, `None`, and
    `Inv.`, which allow you to check all, uncheck all, or invert the check boxes’
    checked status. They are helpful to avoid clicking possibly dozens of check boxes
    one after another.'
