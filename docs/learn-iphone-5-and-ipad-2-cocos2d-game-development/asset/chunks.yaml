    \ `hidden` 或被其他视图遮挡，否则 cocos2d 渲染的最后一帧将作为静态图像保留在 `EAGLView` 中。这就是隐藏 `EAGLView`\
    \ 是个好主意的原因。有时需要调用 `stopAnimation` 来确保某些 UIKit 视图能够响应并流畅地执行动画，特别是所有派生自 `UIScrollView`\
    \ 的视图。良好的做法是在显示（几乎）全屏的 UIKit 视图时调用 `stopAnimation`，以节省前景视图的性能和电池电量。一旦前景视图被关闭，你再次调用\
    \ `startAnimation`，cocos2d 视图和导演便会从其停止的地方继续运行。\n\n**提示：** 如果你希望查看此应用在自动旋转时的行为，则需要对\
    \ `ViewBasedAppWithCocos2DViewController` 类做一个小修改。只需从 `shouldAutorotateToInterfaceOrientation`\
    \ 方法返回 `YES`，以启用所有方向的旋转。虽然你的应用程序对此支持得并不好（它并非为横屏方向设计），但这足以说明 cocos2d 视图即使没有其 `RootViewController`\
    \ 类也能正确自动旋转。\n\n# 更改场景\n\n完成此项目的最后一步是使用分段控件（Segmented Control）的按钮来更改 cocos2d 视图中的场景。在代码清单\
    \ 15–9 中，取自 `ViewBasedAppWithCocos2DViewController` 类，展示了添加到 `sceneChanged` 方法中的代码。\n\
    \n**代码清单 15–9.** *每次按下 UIKit 按钮时更改场景*\n\n```\n- (IBAction)sceneChanged:(id)sender\n\
    {\n    CCDirector* director = [CCDirector sharedDirector];\n    if (director.openGLView\
    \ == nil || director.openGLView.hidden)\n    {\n        return;\n    }\n\n   \
    \ UISegmentedControl* sceneChanger = (UISegmentedControl*)sender;\n    int selection\
    \ = sceneChanger.selectedSegmentIndex;\n\n    CCScene* helloScene = [HelloWorldLayer\
    \ scene];\n    CCScene* transScene = nil;\n    if (selection == 0)\n    {\n  \
    \      transScene = [CCTransitionSlideInR transitionWithDuration:1 scene:helloScene];\n\
    \    }\n    else if (selection == 1)\n    {\n        transScene = [CCTransitionPageTurn\
    \ transitionWithDuration:1 scene:helloScene];\n    }\n    else\n    {\n      \
    \  transScene = [CCTransitionShrinkGrow transitionWithDuration:1 scene:helloScene];\n\
    \    }\n\n    [director replaceScene:transScene];\n}\n```\n\n由于用户可以在任何时候（甚至在 cocos2d\
    \ 视图初始化之前）按下分段控件按钮，因此该方法首先检查 `director.openGLView` 是否存在且未被隐藏。否则，其余代码可能导致应用程序崩溃。\n\
    \n`sender` 参数始终是触发事件的控件。这里我假设它是一个 `UISegmentedControl`。如果你曾更改过它，那么此处也需要更改控件的类。通过\
    \ `selectedSegmentIndex`，你可以获取当前选中按钮的索引，然后使用该索引来决定为新场景使用哪种过渡效果。我只是简单地创建了同一个 `HelloWorldLayer`\
    \ 类的新实例；当然，如果你愿意，也可以为每个按钮使用不同的场景类。最后，将 `transScene` 与导演方法 `replaceScene` 一起使用，来实际将场景更改为新场景。\n\
    \n**注意：** cocos2d 的过渡效果仅作用于 cocos2d 视图及其节点。UIKit 视图不会受到 cocos2d 过渡效果的影响。但你可以在\
    \ cocos2d 视图上使用 `UIView` 动画和过渡效果。你可以在此处了解有关 `UIView` 动画的更多信息： [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html)。\n\
    \n我用一些额外的 cocos2d 标签作为背景以及按钮标签，丰富了 `HelloWorldLayer` 场景。你可以在 `ViewBasedAppWithCocos2D`\
    \ 项目中找到对 `HelloWorldLayer` 类的这些代码更改。结果类似于图 15–13。\n\n![images](img/1513.jpg)\n\
    \n**图 15–13.** *基于视图的应用程序中的 cocos2d 视图*\n"
- fmt: '### Summary


    This chapter provided you with everything you need to know to successfully and
    painlessly mix `cocos2d` with regular UIKit views. You now have the option to
    choose how much UIKit you want in your `cocos2d` app and when, where, and how
    you would like your `cocos2d` view in your UIKit app.


    The trickiest aspects were making the `cocos2d` view transparent in order to allow
    UIKit views in the background as well as having a hit test method perform hit
    tests on `cocos2d` node in an attempt to allow all views to receive input, whether
    UIKit or `cocos2d` and regardless of where they are in the view hierarchy. And
    then there was autorotation, which `cocos2d` can do in two ways, but only one
    way using the `RootViewController` allows you to rotate UIKit views correctly.


    Adding `cocos2d` to a UIKit app also proved to be fairly simple, even if you need
    to turn the `cocos2d` view on and off only at specific times. You may have also
    taken away that the `cocos2d` view doesn’t need to be full-screen at all but can
    be any size, or even resized while the app is running.


    But you also learned that mixing `cocos2d` and UIKit views is not without drawbacks,
    specifically performance-wise. Keep a watchful eye on your app’s performance by
    testing it regularly on a device, particularly on first- and second-generation
    devices.


    ## Chapter 16


    ## Kobold2D Introduction


    In more than two years of working with `cocos2d`, I found plenty of opportunity
    and need to improve the `cocos2d` development workflow by adding helpful code
    snippets, by extending `cocos2d` classes, by enabling easier cross-platform development,
    by automating often-repeated tasks, by simplifying the `cocos2d` upgrade process,
    and by providing complete and accurate documentation. Eventually, this culminated
    in the inception of `Kobold2D`, a game engine that is still very much based on
    `cocos2d-iphone` but improves the workflow for `cocos2d` developers.


    The goal of `Kobold2D` is to make it easier for new developers to work with `cocos2d`
    while at the same time satisfying my own needs for a professional work environment
    (and I hope yours too!). To be sure of that, the development of `Kobold2D` is
    strongly user-driven: if you need it (and others too), you’ll get it! If you have
    an idea or suggestion, please vote for it on or add it to the `Kobold2D` feedback
    page: [`www.kobold2d.com/display/KKSITE/Kobold2D+Feedback`](http://www.kobold2d.com/display/KKSITE/Kobold2D+Feedback).


    `Kobold2D` merges the `cocos2d` engine with popular libraries many developers
    have been using with `cocos2d` in the past. Some of these libraries have almost
    become essential add-ons, including `cocos3d`, `Wax`, `Lua`, the new `cocos2d-iphone-extensions`
    project, `SneakyInput`, the `Chipmunk SpaceManager`, `ObjectAL`, and `iSimulate`.
    `Kobold2D` makes these libraries readily accessible and usable by all developers;
    you’ll just have to import a library’s header files and call library methods.
    In almost all cases, you won’t have to fiddle with build settings or linker flags,
    and you don’t need to worry about an increased app size.


    Over time, `Kobold2D` will add more and more convenience features, starting with
    a simplified way to handle user input that allows you to poll the keyboard and
    mouse button states, provides automatic accelerometer filtering, and gives you
    access to gyroscope and device motion data without having to learn the `Core Motion`
    framework.


    In this chapter, I’ll introduce you to the key concepts of working with `Kobold2D`
    and how it changes the way you develop `cocos2d`-based apps. I’ll guide you through
    the `Kobold2D` version of the `Doodle Drop` project to illustrate how easy it
    is to write a game that also runs on Mac OS computers and to give you an introduction
    on `Kobold2D` user input processing. In addition, I’ll provide you with a short
    introduction to `cocos3d`, the 3D add-on library for `cocos2d`.


    You can learn more about `Kobold2D` and download it at [`www.kobold2d.com`](http://www.kobold2d.com).


    ### Benefits of Using Kobold2D


    I view `Kobold2D` as a game development kit rather than a game engine. It’s more
    like a Linux distribution with the `cocos2d-iphone` project as its “kernel” and
    multiple other modules tacked onto it, all ready to use after installation.


    To stick with the analogy, if `cocos2d-iphone` were a Linux kernel with just its
    command-line interface, `Kobold2D` would be providing the graphical user interface
    and the essential applications that make the operating system more powerful, enjoyable
    to work with, and accessible to a broader user base.


    At the same time, the command line is still there; it has simply become part of
    a bigger whole.


    #### Kobold2D Is Ready to Use


    `Kobold2D` will be installed like a regular application. There’s no need to run
    a script in the Terminal app or any other such error-prone tasks. Download and
    run the package installer, follow the on-screen instructions, and you’re done.
    It’s quick and painless.


    After installing `Kobold2D`, you can build one of the 15 template projects right
    away; most of them are based on projects we’ve created throughout the book. With
    the exception of the app start-up process, which is now simply a configuration
    file, everything you’ve learned about `cocos2d` in this book and elsewhere still
    applies.


    #### Kobold2D Is Free


    `Kobold2D` is free and distributed under the MIT License. All of the included
    libraries use either the MIT License or a compatible license.


    The only exception is `iSimulate`, which requires the paid `iSimulate` app from
    the App Store to unlock all features. The free `iSimulate Lite`, for example,
    doesn’t support the forwarding of multi-touch events to the iOS Simulator.


    #### Kobold2D Is Easy to Upgrade


    A big incentive for `Kobold2D` was to simplify and streamline upgrading `cocos2d`
    in existing projects. The downside of using the `cocos2d` Xcode project templates
    is that a copy of the entire `cocos2d` source code resides in each and every project,
    making the upgrade process unnecessarily complex.


    `Kobold2D` fixes that by keeping your code separate from any library’s code. If
    a new version of `Kobold2D` is released and you want your project to use the updated
    code, simply run the `Kobold2D Project Upgrader` tool of the newly installed `Kobold2D`
    version. It will scan previous `Kobold2D` versions and offer you to upgrade each
    individual project with a click of the mouse. The only task that remains for you
    to upgrade your code is the unavoidable code maintenance because of API changes,
    for example, classes that may have been renamed in `cocos2d` or other libraries,
    or library methods whose parameters have changed.'
