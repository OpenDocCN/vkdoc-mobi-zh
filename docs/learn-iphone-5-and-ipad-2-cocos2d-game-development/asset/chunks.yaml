    \            self.radialAccel = -90;\n            self.radialAccelVar = 20;\n\
    \            self.tangentialAccel = 120;\n            self.tangentialAccelVar\
    \ = 10;\n            self.speed = 15;\n            self.speedVar = 4;\n      \
    \  }\n        else if (self.emitterMode == kCCParticleModeRadius)\n        {\n\
    \            self.startRadius = 100;\n            self.startRadiusVar = 0;\n \
    \           self.endRadius = 10;\n            self.endRadiusVar = 0;\n       \
    \     self.rotatePerSecond = -180;\n            self.rotatePerSecondVar = 0;\n\
    \        }\n\n        self.position = CGPointZero;\n        self.posVar = CGPointZero;\n\
    \        self.positionType = kCCPositionTypeFree;\n\n        self.startSize =\
    \ 40.0f;\n        self.startSizeVar = 0.0f;\n        self.endSize = kCCParticleStartSizeEqualToEndSize;\n\
    \        self.endSizeVar = 0;\n\n        self.angle = 0;\n        self.angleVar\
    \ = 0;\n\n        self.life = 5.0f;\n        self.lifeVar = 1.0f;\n\n        self.emissionRate\
    \ = 30;\n        self.totalParticles = 250;\n\n        startColor.r = 1.0f;\n\
    \        startColor.g = 0.25f;\n        startColor.b = 0.12f;\n        startColor.a\
    \ = 1.0f;\n        startColorVar.r = 0.0f;\n        startColorVar.g = 0.0f;\n\
    \        startColorVar.b = 0.0f;\n        startColorVar.a = 0.0f;\n        endColor.r\
    \ = 0.0f;\n        endColor.g = 0.0f;\n        endColor.b = 0.0f;\n        endColor.a\
    \ = 1.0f;\n        endColorVar.r = 0.0f;\n        endColorVar.g = 0.0f;\n    \
    \    endColorVar.b = 1.0f;\n        endColorVar.a = 0.0f;\n\n        self.blendFunc\
    \ = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};\n        // 或使用此快捷方式将 blend func\
    \ 设置为：GL_SRC_ALPHA, GL_ONE\n        //self.blendAdditive = YES;\n\n        self.texture\
    \ = [[CCTextureCache sharedTextureCache] addImage:@\"fire.png\"];\n    }\n   \
    \ return self;\n}\n@end\n```\n\n### `CCParticleSystem`属性\n\n在清单 9–3 中，你会注意到代码相当冗长，原因是有太多粒子系统属性需要初始化。而且，其中大部分属性需要设置为可接受的值，才能在屏幕上显示出一个合理且有意义的粒子效果。有些属性甚至是互斥的，不能一起使用。是时候仔细研究一下这些粒子系统属性具体是做什么的了。\n\
    \n#### 方差属性\n\n你会注意到，许多属性都有后缀为`Var`的伴随属性。这些是方差属性，它们决定了相应属性所允许的模糊范围。以属性`life =\
    \ 5`和`lifeVar = 1`为例。这些值意味着平均每个粒子会存在 5 秒钟。方差允许的范围是 5-1 到 5+1。因此，每个粒子将获得一个 4 到\
    \ 6 秒之间的随机生命周期。\n\n如果你不希望有任何变化，请将`Var`变量设置为 0。正是方差赋予了粒子效果那种有机、模糊的行为和外观。但是，当你设计一个新效果时，方差也可能造成混淆，所以除非你有一些经验，否则我建议从一个方差很小或没有方差的粒子效果开始。\n\
    \n#### 粒子数量\n\n让我们从粒子效果中的粒子总数开始了解粒子，该数量由`totalParticles`属性控制。`totalParticles`变量通常由`initWithTotalParticles`方法设置，但之后可以更改。粒子数量直接影响效果的外观和性能。\n\
    \n```\n-(id) init\n{\n    return [self initWithTotalParticles:250];\n}\n```\n\n\
    如果粒子太少，你将无法获得漂亮的辉光，但可能足以在玩家撞墙时在他头上撒几颗星星。如果粒子太多，也可能不是你想要的，因为许多粒子会重叠渲染并且可能混合，导致你最终看到的是一团白色。此外，使用太多粒子很容易导致帧率下降。这就是\
    \ Particle Designer 工具不允许你创建超过 2000 个粒子的效果的原因。\n\n**提示：** 通常，你应该力求使用最少的粒子数来达到理想效果。粒子大小也扮演着重要角色——单个粒子的尺寸越小，性能就会越好。特别是对于粒子效果，在第一代和第二代设备上进行测试非常重要，因为它们会严重且负面地影响旧设备的性能。\n"
- fmt: '# Emitter Duration


    The `duration` property determines how long particles will be emitted. If set
    to 2, it will create new particles for two seconds and then stop. It''s that simple:


    ```

    self.duration = 2.0f;

    ```


    If you''d like the particle effect node to be automatically removed from its parent
    node once the particle system has stopped emitting particles and the last particles
    have vanished, set the `autoRemoveOnFinish` property to `YES`:


    ```

    self.autoRemoveOnFinish = YES;

    ```


    The `autoRemoveOnFinish` property is a convenience feature that is meaningful
    only if used in conjunction with particle systems that don''t run infinitely,
    like one-time explosion effects. Cocos2d defines a constant `kCCParticleDurationInfinity
    (equals: -1)` for infinitely running particle effects.


    ```

    self.duration = kCCParticleDurationInfinity;

    ```


    The majority of particle effects are infinitely running and can be stopped only
    by removing them from the node hierarchy. Infinitely running particle effects
    ignore the `autoRemoveOnFinish` property.


    # Emitter Modes


    There are two emitter modes: `gravity` and `radius`, controlled by the `emitterMode`
    property. These two modes create fundamentally different effects even if most
    of the parameters are the same, as you can see when you compare [Figure 9–4](#Chapter09.html#fig_9_4)
    with [Figure 9–5](#Chapter09.html#fig_9_5). Both modes use several exclusive properties
    (see [Listing 9–3](#Chapter09.html#list_9_3)) that must not be set if they are
    not supported by the current mode; otherwise, you''ll receive a runtime exception
    from cocos2d like this:


    ```

    ParticleEffects[6332:207] *** Terminating app due to uncaught exception

                ''NSInternalInconsistencyException'', reason: ''Particle Mode should
    be Radius''

    ```


    ## Emitter Mode: Gravity


    Gravity mode lets particles fly toward or away from a center point. Its strength
    is that it allows very dynamic, organic effects. You can set gravity mode with
    this line:


    ```

    self.emitterMode = kCCParticleModeGravity;

    ```


    Gravity mode uses the following exclusive properties, which can be used only when
    `emitterMode` is set to `kCCParticleModeGravity`:


    ```

    self.sourcePosition = CGPointMake(-15, 0);

    self.gravity = CGPointMake(-50, -90);

    self.radialAccel = -90;

    self.radialAccelVar = 20;

    self.tangentialAccel = 120;

    self.tangentialAccelVar = 10;

    self.speed = 15;

    self.speedVar = 4;

    ```


    The `sourcePosition` determines the offset as a `CGPoint` from the node''s position
    where new particles appear. The name is a bit misleading in that the actual center
    of gravity is the node''s position, and `sourcePosition` is an offset to that
    center of gravity. The `gravity` property then determines the speed with which
    particles accelerate in the `x` and `y` directions. In this case, the negative
    values indicate that the gravitational force will accelerate particles toward
    the left (-50) and downward (-90). But this acceleration is relative to the particle
    node''s position. Since particles start out at a `sourcePosition` offset of -15
    (slightly offset to the left), they will perform a counterclockwise movement around
    the particle node''s position. You can see this effect in [Figure 9–4](#Chapter09.html#fig_9_4),
    and tweaking the values in the ParticleEffects02 project helps to understand how
    `sourcePosition` and `gravity` affect the movement of particles.


    For the center of gravity to have any impact, the gravity of the particles shouldn''t
    be too high, and the `sourcePosition` should not be offset too far. The previous
    values give you a good working example that you can tweak.


    The `radialAccel` property defines how fast particles accelerate the further they
    move away from the emitter. This parameter can also be negative, which makes particles
    slow down as they move away. The `tangentialAccel` property is similar in that
    it lets particles rotate around the emitter and speed up as they move away. Negative
    values let the particles spin clockwise, and positive values spin them counterclockwise.


    The `speed` property should be fairly obvious—it''s simply the speed of the particles.
    It has no particular unit of measurement. [Figure 9–4](#Chapter09.html#fig_9_4)
    shows an example particle effect using gravity mode. Particles are attracted by
    the particle node''s position and start out slightly to the left of the particle
    node''s position, so they perform a counterclockwise radial movement.


    ![images](images/0904.jpg)


    **Figure 9–4.** *The ParticleEffectSelfMade from the ParticleEffects02 project
    in gravity mode*


    ## Emitter Mode: Radius


    Radius mode causes particles to rotate in a circle. It also allows you to create
    spiral effects with particles either rushing inward or rotating outward. You set
    radius mode with this line:


    ```

    self.emitterMode = kCCParticleModeRadius;

    ```


    Like gravity mode, radius mode has exclusive properties. The following properties
    can be used only when `emitterMode` is set to `kCCParticleModeRadius`:


    ```

    self.startRadius = 100;

    self.startRadiusVar = 0;

    self.endRadius = 10;

    self.endRadiusVar = 0;

    self.rotatePerSecond = -180;

    self.rotatePerSecondVar = 0;

    ```


    The `startRadius` property determines how far away from the particle effect node''s
    position the particles will be emitted. Likewise, the `endRadius` determines the
    distance from the node''s position the particles will rotate toward. If you want
    to achieve a perfect circle effect, you can set `endRadius` to the same as the
    `startRadius` using this constant:


    ```

    self.endRadius = kCCParticleStartRadiusEqualToEndRadius;

    ```


    Using the `rotatePerSecond` property, you can influence the direction the particles
    move and the speed with which they move, and thus the number of times they rotate
    around if `startRadius` and `endRadius` are different.


    The same particle effect that was shown in [Figure 9–4](#Chapter09.html#fig_9_4)
    using gravity mode is shown in [Figure 9–5](#Chapter09.html#fig_9_5) using radius
    mode, and you''ll notice how different it looks, despite all other properties—except
    for the exclusive ones—being the same. To test this, uncomment the following line
    in the ParticleEffects02 project:


    ```

    //self.emitterMode = kCCParticleModeRadius;

    ```


    ![images](images/0905.jpg)


    **Figure 9–5.** *The very same effect using radius mode looks completely different.*


    # Particle Position


    By moving the node, you also move the effect. But the effect also has a `posVar`
    property that determines the variance in the position where new particles will
    be created. By default, both are at the center of the node:


    ```

    self.position = CGPointZero;

    self.posVar = CGPointZero;

    ```


    A very important aspect of particle positions is whether existing particles should
    move relative to the node''s movement or whether they should not be influenced
    at all by the node''s position. For example, if you have a particle effect that
    creates stars around your player-character''s head, you would want the stars to
    follow the player as he moves around. You can achieve this effect by setting this
    property:


    ```

    self.positionType = kCCPositionTypeGrouped;

    ```


    On the other hand, if you want to set your player on fire and you want the particles
    to create a trail-like effect as the player moves around, you should set the `positionType`
    property like this:


    ```

    self.positionType = kCCPositionTypeFree;

    ```


    The free movement is best used with effects like steam, fire, engine exhaust smoke,
    and similar effects that move around with the object they are attached to and
    should give the impression of not being connected to the object that emits these
    particles.'
