- fmt: "#### Creating a New Isometric Tilemap\n\nOpen `Tiled` and choose `File` →\
    \ `New` to open the New Map dialog in [Figure 11–7](#Chapter11.html#fig_11_7).\
    \ The orientation should obviously be set to Isometric, and the map size is set\
    \ to 30 tiles wide and high, just right for our example project. The odd thing\
    \ here is the tile size width and height, which seem to be off a bit. I already\
    \ mentioned that the individual tiles in `dg_iso32.png` are 54x49 pixels. The\
    \ size of the diamond shape, which you have to consider when laying down tiles,\
    \ is 54x27 pixels. Yet the tile size in the New Map dialog is 52x26. This is because\
    \ David Gervais designed his tiles to require overlapping of 2 pixels in the horizontal\
    \ and 1 pixel in the vertical direction in order to close all gaps between the\
    \ tiles.\n\nThis offset is on purpose, because isometric tiles are often designed\
    \ to overlap each other a little. In this case, the size of the tiles in the Tiled\
    \ isometric map must be 2 pixels less wide and 1 pixel less high than the actual\
    \ size of the diamond shapes in the tileset. Other isometric tilesets may require\
    \ different offsets, or even no offset at all.\n\n![images](images/1107.jpg)\n\
    \n**Figure 11–7.** *Create a new isometric tilemap in Tiled.*\n\nIf you see any\
    \ artifacts like the ones in [Figure 11–8](#Chapter11.html#fig_11_8), you have\
    \ set the wrong tile size when creating a new isometric map with David Gervais'\
    \ tileset. You can find this erroneous tilemap as `isometric-no-offset.tmx` in\
    \ the `Tilemap05` project's resources folder, for illustration purposes.\n\n![images](images/1108.jpg)\n\
    \n**Figure 11–8.** *Artifacts like these indicate a tile-size offset problem.*\n\
    \nIf you did make a mistake and picked incorrect offsets and you don't want to\
    \ lose the tilemap you've just spent hours designing or if you have other reasons\
    \ to want to tweak the tilemap size or tileset size, there's a simple way to do\
    \ this, but it requires manipulating the TMX file directly since there's no such\
    \ option in Tiled itself.\n\nThe following trick makes it easy to experiment with\
    \ various offsets until you get it just right. Close Tiled if it's currently running\
    \ and then select the TMX file in your Xcode project; you'll see that it's displayed\
    \ as a plain-text XML file. At the beginning of the file, you'll find the map\
    \ section:\n\n```xml\n<map version=\"1.0\" orientation=\"isometric\" width=\"\
    30\" height=\"30\" tilewidth=\"54\"\n    tileheight=\"27\">\n```\n\nYou can edit\
    \ the `tilewidth` and `tileheight` parameters until you've found the correct offsets\
    \ for the tilemap. Likewise, if you're having problems determining the tile size\
    \ of the isometric tileset you're using, you can modify the `tilewidth` and `tileheight`\
    \ parameters of the tileset(s):\n\n```xml\n<tileset firstgid=\"1\" name=\"dg_iso32\"\
    \ tilewidth=\"54\" tileheight=\"49\">\n    <image source=\"dg_iso32.png\"/>\n\
    </tileset>\n```\n\nJust make sure to reload the TMX file in Tiled after you made\
    \ any manual changes to it, because Tiled will not automatically update the file.\n\
    \n#### Creating a New Isometric Tileset\n\nNext you need to load a tileset containing\
    \ isometric tiles. For this chapter I will be using the `dg_iso32.png` tileset\
    \ image found in the `Tilemap05` project's resources folder. In Tiled, choose\
    \ `Map` → `New Tileset…` and browse to the `dg_iso32.png` file.\n\nNotice that\
    \ Tiled will set default tile width and height according to the settings in the\
    \ New Map dialog, shown in [Figure 11–7](#Chapter11.html#fig_11_7). For isometric\
    \ tilemaps, the defaults will always need to be corrected because of the overlap\
    \ of isometric tiles. As I mentioned earlier, the `dg_iso32.png` tileset uses\
    \ a tile width of 54 pixels and a tile height of 49 pixels. Note that you have\
    \ to use the full canvas height of the isometric tiles, not the diamond shape\
    \ height of 27 pixels. [Figure 11–9](#Chapter11.html#fig_11_9) shows the correct\
    \ setup for this tileset.\n\n![images](images/1109.jpg)\n\n**Figure 11–9.** *Adding\
    \ the tileset with width 54 pixels and height 49 pixels*\n\n#### Laying Down Some\
    \ Ground Rules\n\nThe most important rule for designing isometric maps is that\
    \ you're going to need at least two layers so that game characters can walk behind\
    \ certain tiles. One layer is for flat ground objects and floor tiles, and the\
    \ other is for all other objects that either overlap other tiles or are not fully\
    \ opaque, such as items. In the tileset of [Figure 11–6](#Chapter11.html#fig_11_6),\
    \ the first two rows are ground tiles and need to be placed on the ground floor,\
    \ whereas in row 3 the mountains as well as almost all tiles in row 4 and after\
    \ need to be placed on the Objects layer.\n\nIn Tiled, add two new layers via\
    \ `Layer` → `Add Tile Layer…` and name them Ground and Objects. Make sure that\
    \ the Objects layer is drawn on top of the Ground layer. When designing your tilemap,\
    \ you should take great care to lay down only fully opaque, flat floor tiles on\
    \ the Ground layer. All other tiles have to be placed on the Objects layer.\n\n\
    Cocos2d has issues with properly displaying game characters and other sprites\
    \ behind partially occluding tiles in tilemaps, unless you apply the following\
    \ steps. As one part of the solution, a special property named `cc_vertexz` needs\
    \ to be added to tiled layers. I'll explain the solution in more detail shortly;\
    \ for now, select the Ground layer and click `Layer` → `Layer Properties…`. Add\
    \ a new property named `cc_vertexz` and set its value to `-1000`. Do the same\
    \ with the Objects layer but instead of entering `-1000`, enter the string `automatic`,\
    \ as in [Figure 11–10](#Chapter11.html#fig_11_10).\n\n![images](images/1110.jpg)\n\
    \n**Figure 11–10.** *The Objects layer needs the `cc_vertexz` property set to\
    \ `automatic`.*\n\nNow you can spend some time designing a nice-looking tilemap,\
    \ or you can simply load the one I designed in the `Tilemap05` project. Be sure\
    \ to put only floor tiles on the Ground layer and only overlapping and transparent\
    \ tiles on the Objects layer. When you're done, you should have a nice-looking\
    \ tilemap like the one in [Figure 11–11](#Chapter11.html#fig_11_11).\n\n![images](images/1111.jpg)\n\
    \n**Figure 11–11.** *A completed isometric tilemap in Tiled using David Gervais's\
    \ tileset*\n\n### Isometric Game Programming\n\nLet's use this isometric tilemap\
    \ in a cocos2d game. As you might expect, some things will have to change compared\
    \ to working with orthogonal tilemaps. In particular, you need to set up cocos2d\
    \ properly to allow isometric tiles to partially occlude game characters. Determining\
    \ a touched tile also requires different code than from orthogonal tilemaps, and\
    \ when scrolling, you can no longer stop scrolling at the borders of the tilemap\
    \ because the tilemap itself has a diamond shape.\n\n#### Loading the Isometric\
    \ Tilemap in Cocos2d\n\nThis is easy. Compared to orthogonal tilemaps, you don't\
    \ need to change anything except to load the `isometric.tmx` file instead of `orthogonal.tmx`.\n\
    \n```objc\nCCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"isometric.tmx\"\
    ];\n[self addChild:tileMap z:-1 tag:TileMapNode];\ntileMap.position = CGPointMake(-500,\
    \ -300);\n```\n\nI do set the isometric tilemap's position to `-500, -300` right\
    \ away, assuming the tilemap size is 30x30 tiles. This approximately centers the\
    \ screen on the lower corner of the small village on the north of the tilemap\
    \ in [Figure 11–11](#Chapter11.html#fig_11_11). I did this to illustrate the following\
    \ point about properly setting up Cocos2D for isometric tilemaps, and in [Figure\
    \ 11–12](#Chapter11.html#fig_11_12) you can see there's something obviously wrong\
    \ with the tilemap."
  raw: '#### Creating a New Isometric Tilemap


    Open Tiled and choose `File` ![images](images/U001.jpg) `New` to open the New
    Map dialog in [Figure 11–7](#Chapter11.html#fig_11_7). The orientation should
    obviously be set to Isometric, and the map size is set to 30 tiles wide and high,
    just right for our example project. The odd thing here is the tile size width
    and height, which seem to be off a bit. I already mentioned that the individual
    tiles in dg_iso32.pngare 54x49 pixels. The size of the diamond shape, which you
    have to consider when laying down tiles, is 54x27 pixels. Yet the tile size in
    the New Map dialog is 52x26\. This is because David Gervais designed his tiles
    to require overlapping of 2 pixels in the horizontal and 1 pixel in the vertical
    direction in order to close all gaps between the tiles.


    This offset is on purpose, because isometric tiles are often designed to overlap
    each other a little. In this case, the size of the tiles in the Tiled isometric
    map must be 2 pixels less wide and 1 pixel less high than the actual size of the
    diamond shapes in the tileset. Other isometric tilesets may require different
    offsets, or even no offset at all.


    ![images](images/1107.jpg)


    **Figure 11–7.** *Create a new isometric tilemap in Tiled.*


    If you see any artifacts like the ones in [Figure 11–8](#Chapter11.html#fig_11_8),
    you have set the wrong tile size when creating a new isometric map with David
    Gervais'' tileset. You can find this erroneous tilemap as isometric-no-offset.tmx
    in the Tilemap05 project''s resources folder, for illustration purposes.


    ![images](images/1108.jpg)


    **Figure 11–8.** *Artifacts like these indicate a tile-size offset problem.*


    If you did make a mistake and picked incorrect offsets and you don''t want to
    lose the tilemap you''ve just spent hours designing or if you have other reasons
    to want to tweak the tilemap size or tileset size, there''s a simple way to do
    this, but it requires manipulating the TMX file directly since there''s no such
    option in Tiled itself.


    The following trick makes it easy to experiment with various offsets until you
    get it just right. Close Tiled if it''s currently running and then select the
    TMX file in your Xcode project; you''ll see that it''s displayed as a plain-text
    XML file. At the beginning of the file, you''ll find the map section:


    `<map version="1.0" orientation="isometric" width="30" height="30" tilewidth="54"`![images](images/U002.jpg)

    `    tileheight="27">`


    You can edit the `tilewidth` and `tileheight` parameters until you''ve found the
    correct offsets for the tilemap. Likewise, if you''re having problems determining
    the tile size of the isometric tileset you''re using, you can modify the `tilewidth`
    and `tileheight` parameters of the tileset(s):


    `<tileset firstgid="1" name="dg_iso32" tilewidth="54" tileheight="49">`

    `    <image source="dg_iso32.png"/>`

    `</tileset>`


    Just make sure to reload the TMX file in Tiled after you made any manual changes
    to it, because Tiled will not automatically update the file.


    #### Creating a New Isometric Tileset


    Next you need to load a tileset containing isometric tiles. For this chapter I
    will be using the dg_iso32.pngtileset image found in the Tilemap05 project''s
    resources folder. In Tiled, choose `Map` ![images](images/U001.jpg) `New Tileset…`
    and browse to the dg_iso32.png file.


    Notice that Tiled will set default tile width and height according to the settings
    in the New Map dialog, shown in [Figure 11–7](#Chapter11.html#fig_11_7). For isometric
    tilemaps, the defaults will always need to be corrected because of the overlap
    of isometric tiles. As I mentioned earlier, the dg_iso32.png tileset uses a tile
    width of 54 pixels and a tile height of 49 pixels. Note that you have to use the
    full canvas height of the isometric tiles, not the diamond shape height of 27
    pixels. [Figure 11–9](#Chapter11.html#fig_11_9) shows the correct setup for this
    tileset.


    ![images](images/1109.jpg)


    **Figure 11–9.** *Adding the tileset with width 54 pixels and height 49 pixels*


    #### Laying Down Some Ground Rules


    The most important rule for designing isometric maps is that you''re going to
    need at least two layers so that game characters can walk behind certain tiles.
    One layer is for flat ground objects and floor tiles, and the other is for all
    other objects that either overlap other tiles or are not fully opaque, such as
    items. In the tileset of [Figure 11–6](#Chapter11.html#fig_11_6), the first two
    rows are ground tiles and need to be placed on the ground floor, whereas in row
    3 the mountains as well as almost all tiles in row 4 and after need to be placed
    on the Objects layer.


    In Tiled, add two new layers via `Layer` ![images](images/U001.jpg) `Add Tile
    Layer…` and name them Ground and Objects. Make sure that the Objects layer is
    drawn on top of the Ground layer. When designing your tilemap, you should take
    great care to lay down only fully opaque, flat floor tiles on the Ground layer.
    All other tiles have to be placed on the Objects layer.


    Cocos2d has issues with properly displaying game characters and other sprites
    behind partially occluding tiles in tilemaps, unless you apply the following steps.
    As one part of the solution, a special property named `cc_vertexz` needs to be
    added to tiled layers. I''ll explain the solution in more detail shortly; for
    now, select the Ground layer and click `Layer` ![images](images/U001.jpg) `Layer
    Properties….` Add a new property named `cc_vertexz` and set its value to -1000\.
    Do the same with the Objects layer but instead of entering -1000, enter the string
    **automatic**, as in [Figure 11–10](#Chapter11.html#fig_11_10).


    ![images](images/1110.jpg)


    **Figure 11–10.** *The Objects layer needs the cc_vertexz property set to automatic.*


    Now you can spend some time designing a nice-looking tilemap, or you can simply
    load the one I designed in the Tilemap05 project. Be sure to put only floor tiles
    on the Ground layer and only overlapping and transparent tiles on the Objects
    layer. When you''re done, you should have a nice-looking tilemap like the one
    in [Figure 11–11](#Chapter11.html#fig_11_11).


    ![images](images/1111.jpg)


    **Figure 11–11.** *A completed isometric tilemap in Tiled using David Gervais''s
    tileset*


    ### Isometric Game Programming


    Let''s use this isometric tilemap in a cocos2d game. As you might expect, some
    things will have to change compared to working with orthogonal tilemaps. In particular,
    you need to set up cocos2d properly to allow isometric tiles to partially occlude
    game characters. Determining a touched tile also requires different code than
    from orthogonal tilemaps, and when scrolling, you can no longer stop scrolling
    at the borders of the tilemap because the tilemap itself has a diamond shape.


    #### Loading the Isometric Tilemap in Cocos2d


    This is easy. Compared to orthogonal tilemaps, you don''t need to change anything
    except to load the isometric.tmxfile instead of orthogonal.tmx.


    `CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@"isometric.tmx"];`

    `[self addChild:tileMap z:-1 tag:TileMapNode];`

    `tileMap.position = CGPointMake(-500, -300);`


    I do set the isometric tilemap''s position to -500, -300 right away, assuming
    the tilemap size is 30x30 tiles. This approximately centers the screen on the
    lower corner of the small village on the north of the tilemap in [Figure 11–11](#Chapter11.html#fig_11_11).
    I did this to illustrate the following point about properly setting up Cocos2D
    for isometric tilemaps, and in [Figure 11–12](#Chapter11.html#fig_11_12) you can
    see there''s something obviously wrong with the tilemap.'
  trans: "\n#### 创建新的等距瓦片地图\n\n打开 `Tiled`，选择 `文件` → `新建`，打开如图 11–7 所示的新建地图对话框。方向显然应设置为等距（Isometric），地图宽度和高度均设为\
    \ 30 个瓦片，这正好适合我们的示例项目。奇怪的是瓦片尺寸的宽度和高度，看起来有些偏差。我之前提到过，`dg_iso32.png` 中的单个瓦片尺寸是 54x49\
    \ 像素。在铺设瓦片时需要考虑的菱形区域的尺寸是 54x27 像素。然而新建地图对话框中的瓦片尺寸却是 52x26。这是因为 David Gervais 在设计他的瓦片时，为了消除所有瓦片之间的间隙，需要在水平方向上重叠\
    \ 2 像素，在垂直方向上重叠 1 像素。\n\n这种偏移是有意为之的，因为等距瓦片通常被设计成相互之间略有重叠。在这种情况下，Tiled 中等距地图的瓦片尺寸必须比瓦片集中菱形区域的实际尺寸宽度少\
    \ 2 像素，高度少 1 像素。其他等距瓦片集可能需要不同的偏移量，甚至完全不需要偏移。\n\n![图片](img/1107.jpg)\n\n**图 11–7.**\
    \ *在 Tiled 中创建新的等距瓦片地图。*\n\n如果你看到类似 图 11–8 中的瑕疵，说明在使用 David Gervais 的瓦片集创建新等距地图时，你设置了错误的瓦片尺寸。为了方便说明，你可以在\
    \ `Tilemap05` 项目的资源文件夹中找到这个错误的瓦片地图文件，名为 `isometric-no-offset.tmx`。\n\n![图片](img/1108.jpg)\n\
    \n**图 11–8.** *像这样的瑕疵表明存在瓦片尺寸偏移问题。*\n\n如果你确实犯了错误，选择了错误的偏移量，并且不想丢失你花了数小时设计的瓦片地图，或者你有其他原因想要调整瓦片地图尺寸或瓦片集尺寸，有一种简单的方法可以实现，但这需要直接操作\
    \ TMX 文件，因为 Tiled 本身没有这样的选项。\n\n下面的技巧让你可以轻松尝试各种偏移量，直到找到正确的设置。如果 Tiled 正在运行，请先关闭它，然后在你的\
    \ Xcode 项目中选择 TMX 文件；你会看到它以纯文本 XML 文件的形式显示。在文件开头，你会找到地图部分：\n\n```xml\n<map version=\"\
    1.0\" orientation=\"isometric\" width=\"30\" height=\"30\" tilewidth=\"54\"\n\
    \    tileheight=\"27\">\n```\n\n你可以编辑 `tilewidth` 和 `tileheight` 参数，直到找到瓦片地图的正确偏移量。同样，如果你在确定所使用的等距瓦片集的瓦片大小时遇到问题，你也可以修改瓦片集的\
    \ `tilewidth` 和 `tileheight` 参数：\n\n```xml\n<tileset firstgid=\"1\" name=\"dg_iso32\"\
    \ tilewidth=\"54\" tileheight=\"49\">\n    <image source=\"dg_iso32.png\"/>\n\
    </tileset>\n```\n\n在对 TMX 文件进行任何手动修改后，请务必在 Tiled 中重新加载该文件，因为 Tiled 不会自动更新文件。\n\
    \n#### 创建新的等距瓦片集\n\n接下来，你需要加载一个包含等距瓦片的瓦片集。本章我将使用 `Tilemap05` 项目资源文件夹中的 `dg_iso32.png`\
    \ 瓦片集图片。在 Tiled 中，选择 `地图` → `新建瓦片集...`，然后浏览到 `dg_iso32.png` 文件。\n\n请注意，Tiled 会根据图\
    \ 11–7 中新建地图对话框的设置，自动设置默认的瓦片宽度和高度。对于等距瓦片地图，由于等距瓦片之间的重叠，这些默认值通常需要修正。正如我之前提到的，`dg_iso32.png`\
    \ 瓦片集使用的瓦片宽度为 54 像素，瓦片高度为 49 像素。请注意，你必须使用等距瓦片的完整画布高度，而不是 27 像素的菱形区域高度。图 11–9 显示了该瓦片集的正确设置。\n\
    \n![图片](img/1109.jpg)\n\n**图 11–9.** *添加宽度为 54 像素、高度为 49 像素的瓦片集*\n\n#### 制定一些基本规则\n\
    \n设计等距地图最重要的规则是，你需要至少两个图层，以便游戏角色可以在某些瓦片后面行走。一个图层用于平坦的地面物体和地板瓦片，另一个图层用于所有其他物体，这些物体要么与其他瓦片重叠，要么不完全透明，例如物品。在图\
    \ 11–6 的瓦片集中，前两行是地面瓦片，需要放置在地面层上，而第 3 行中的山脉以及第 4 行及之后几乎所有瓦片都需要放置在物体层上。\n\n在 Tiled\
    \ 中，通过 `图层` → `添加瓦片图层...` 添加两个新图层，并将其命名为 Ground 和 Objects。确保 Objects 图层绘制在 Ground\
    \ 图层之上。在设计瓦片地图时，你应特别注意只在 Ground 图层上放置完全透明、平坦的地板瓦片。所有其他瓦片都必须放置在 Objects 图层上。\n\n\
    除非你应用以下步骤，否则 Cocos2d 在瓦片地图中正确显示被部分遮挡瓦片后面的游戏角色和其他精灵时会存在问题。作为解决方案的一部分，需要向 Tiled\
    \ 图层添加一个名为 `cc_vertexz` 的特殊属性。稍后我将更详细地解释这个解决方案；现在，请选择 Ground 图层，点击 `图层` → `图层属性...`。添加一个名为\
    \ `cc_vertexz` 的新属性，并将其值设置为 `-1000`。对 Objects 图层执行相同操作，但不要输入 `-1000`，而是输入字符串 `automatic`，如图\
    \ 11–10 所示。\n\n![图片](img/1110.jpg)\n\n**图 11–10.** *Objects 图层需要将 `cc_vertexz`\
    \ 属性设置为 `automatic`。*\n\n现在你可以花些时间设计一个漂亮的瓦片地图，或者直接加载我在 `Tilemap05` 项目中设计好的那个。请务必确保只将地板瓦片放在\
    \ Ground 图层上，只将重叠和透明的瓦片放在 Objects 图层上。完成后，你应该会得到一个像图 11–11 那样漂亮的瓦片地图。\n\n![图片](img/1111.jpg)\n\
    \n**图 11–11.** *在 Tiled 中使用 David Gervais 的瓦片集完成的等距瓦片地图*\n\n### 等距游戏编程\n\n让我们在\
    \ cocos2d 游戏中使用这个等距瓦片地图。正如你所料，与使用正交瓦片地图相比，有些事情需要改变。特别是，你需要正确设置 cocos2d，以允许等距瓦片部分遮挡游戏角色。确定触摸的瓦片也需要与正交瓦片地图不同的代码，而且在滚动时，你不能再在瓦片地图的边界处停止滚动，因为瓦片地图本身是菱形形状。\n\
    \n#### 在 Cocos2d 中加载等距瓦片地图\n\n这很简单。与正交瓦片地图相比，你只需要加载 `isometric.tmx` 文件而不是 `orthogonal.tmx`，其他无需任何更改。\n\
    \n```objc\nCCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"isometric.tmx\"\
    ];\n[self addChild:tileMap z:-1 tag:TileMapNode];\ntileMap.position = CGPointMake(-500,\
    \ -300);\n```\n\n我立即将等距瓦片地图的位置设置为 `-500, -300`，假设瓦片地图大小为 30x30 个瓦片。这大致使屏幕中心对准图\
    \ 11–11 中瓦片地图北部小村庄的下角。我这样做是为了说明下面关于为等距瓦片地图正确设置 Cocos2D 的观点，从图 11–12 中你可以看到瓦片地图明显存在问题。\n"
- fmt: "### Setup Cocos2d for Isometric Tilemaps\n\nIf you followed the creation of\
    \ the tilemap thus far and you set the `cc_vertexz` properties on the Ground and\
    \ Objects layers in Tiled as described earlier, the resulting tilemap may look\
    \ like the one in [Figure 11–12](#Chapter11.html#fig_11_12). Somehow, the Ground\
    \ layer is zoomed far out, and tiles from the Objects layer seem to be floating\
    \ in midair. It looks like a scary place to be.\n\n![images](images/1112.jpg)\n\
    \n**Figure 11–12.** *Without 2D projection, the ground layer will render incorrectly.*\n\
    \nThe way to fix this and to enable proper rendering of overlapping sprites requires\
    \ cocos2d to be initialized in a different way from how the cocos2d Application\
    \ template in Xcode sets things up. It initializes cocos2d in a standard way,\
    \ which is fine for most games but fails to work properly with isometric tilemap\
    \ games. In the Tilemap05 project, the cocos2d startup code is replaced by the\
    \ code in [Listing 11–1](#Chapter11.html#list_11_1) with the important changes\
    \ highlighted.\n\n**Listing 11–1.** *Manually Initializing cocos2d's `EAGLView`*\n\
    \n```\nwindow = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    if ([CCDirector setDirectorType:kCCDirectorTypeDisplayLink] == NO)\n    [CCDirector\
    \ setDirectorType:kCCDirectorTypeNSTimer];\n\nCCDirector *director = [CCDirector\
    \ sharedDirector];\n[director setAnimationInterval:1.0/60];\nEAGLView *glView\
    \ = [EAGLView viewWithFrame:[window bounds]\n                               pixelFormat:kEAGLColorFormatRGB565\n\
    \                               depthFormat:GL_DEPTH_COMPONENT24_OES];\n[director\
    \ setOpenGLView:glView];\n[window addSubview:glView];\n[window makeKeyAndVisible];\n\
    \n// this fixes the zoomed out ground layer:\n[director setProjection:kCCDirectorProjection2D];\n\
    ```\n\nYou have to change two things: first you need to enable the OpenGL depth\
    \ buffer to allow a more fine-grained control over the z-ordering of objects.\
    \ Second, the `CCDirector` has to use a 2D projection to work with the depth buffer.\n\
    \n**NOTE:** The actual initialization code in cocos2d projects created from a\
    \ project template may differ from [Listing 11–1](#Chapter11.html#list_11_1).\
    \ But if you look at the initialization code line by line, you'll see that essentially\
    \ the same code is run; however, it may be in a different order, or there may\
    \ be other additional code added in between. The initialization code of cocos2d\
    \ changes frequently, practically with every new major release, so it's not a\
    \ problem if your initialization code looks different. For example, I did not\
    \ include the `RootViewController` class initialization code in all previous projects,\
    \ because we haven't had a use for it. But I'll get to that in detail in [Chapter\
    \ 15](#Chapter15.html#ch15), where we'll mix cocos2d with Cocoa Touch.\n\nYou\
    \ first create a `UIWindow` and then decide on a `CCDirector` type to use and\
    \ set the animation interval to 60 frames per second. This is the default behavior.\n\
    \nThe `EAGLView` line is important because for overlapping tiles to render properly,\
    \ a depth buffer must be specified with the `depthFormat` parameter. In this case,\
    \ it's `GL_DEPTH_COMPONENT24_OES`, which creates a depth buffer of 24 bits. To\
    \ conserve memory, you can also use a 16-bit depth buffer, which may also be sufficient.\n\
    \nDepth buffering allows OpenGL to determine whether a certain pixel is in front\
    \ or behind another pixel so it can decide whether to actually draw the new pixel\
    \ or discard it. This comes at a cost of additional memory usage—around 500KB\
    \ for a 24-bit depth buffer—but it allows sprites and tiles to correctly overlap\
    \ one another.\n\nAfter the `glView` has been created, it's assigned to the `CCDirector`,\
    \ added as a subview to the window, and then the window is made visible.\n\nThe\
    \ other really important line in the initialization is `setProjection`, which\
    \ puts cocos2d in 2D projection mode. This changes a couple of OpenGL parameters\
    \ that affect the way cocos2d renders nodes. In this case, it fixes the issue\
    \ in [Figure 11–12](#Chapter11.html#fig_11_12) where the ground floor is not rendered\
    \ as expected, with the result in [Figure 11–13](#Chapter11.html#fig_11_13). But\
    \ it also enables you to finely tune the z-order of sprites by using the `vertexZ`\
    \ property rather than the `zOrder` property of sprites.\n\nBy default, cocos2d's\
    \ z-ordering of nodes is based on the z value when you're adding a node via the\
    \ `addChild` method. Nodes with a lower `zOrder` are drawn before nodes with a\
    \ higher `zOrder`. Nodes that have the same `zOrder` are drawn in the order that\
    \ they've been added to the node hierarchy, meaning nodes added last will be drawn\
    \ over nodes added before that node. This allows cocos2d to order nodes without\
    \ using a depth buffer.\n\nIf you enable depth buffering, you can also use the\
    \ `vertexZ` property to change each node's draw order freely. Cocos2d requires\
    \ this freedom in order to let the `cc_vertexz` tilemap property work its magic.\
    \ We'll later manipulate the `vertexZ` property of the player character to correctly\
    \ draw the player sprite in front of or behind other isometric tiles.\n\n![images](images/1113.jpg)\n\
    \n**Figure 11–13.** *With 2D projection, the ground layer is displayed as expected.*"
  raw: '#### Setup Cocos2d for Isometric Tilemaps


    If you followed the creation of the tilemap thus far and you set the `cc_vertexz`
    properties on the Ground and Objects layers in Tiled as described earlier, the
    resulting tilemap may look like the one in [Figure 11–12](#Chapter11.html#fig_11_12).
    Somehow, the Ground layer is zoomed far out, and tiles from the Objects layer
    seem to be floating in midair. It looks like a scary place to be.


    ![images](images/1112.jpg)


    **Figure 11–12.** *Without 2D projection, the ground layer will render incorrectly.*


    The way to fix this and to enable proper rendering of overlapping sprites requires
    cocos2d to be initialized in a different way from how the cocos2d Application
    template in Xcode sets things up. It initializes cocos2d in a standard way, which
    is fine for most games but fails to work properly with isometric tilemap games.
    In the Tilemap05 project, the cocos2d startup code is replaced by the code in
    [Listing 11–1](#Chapter11.html#list_11_1) with the important changes highlighted.


    **Listing 11–1.** *Manually Initializing cocos2d''s `EAGLView`*


    `window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `if ([CCDirector setDirectorType:kCCDirectorTypeDisplayLink] == NO)`

    `    [CCDirector setDirectorType:kCCDirectorTypeNSTimer];`


    `CCDirector *director = [CCDirector sharedDirector];`

    `[director setAnimationInterval:1.0/60];`

    `EAGLView *glView = [EAGLView viewWithFrame:[window bounds]`

    `                               pixelFormat:kEAGLColorFormatRGB565`

    **`                               depthFormat:GL_DEPTH_COMPONENT24_OES];`**

    `[director setOpenGLView:glView];`

    `[window addSubview:glView];`

    `[window makeKeyAndVisible];`


    **`// this fixes the zoomed out ground layer:`**

    **`[director setProjection:kCCDirectorProjection2D];`**


    You have to change two things: first you need to enable the OpenGL depth buffer
    to allow a more fine-grained control over the z-ordering of objects. Second, the
    `CCDirector` has to use a 2D projection to work with the depth buffer.


    **NOTE:** The actual initialization code in cocos2d projects created from a project
    template may differ from [Listing 11–1](#Chapter11.html#list_11_1). But if you
    look at the initialization code line by line, you''ll see that essentially the
    same code is run; however, it may be in a different order, or there may be other
    additional code added in between. The initialization code of cocos2d changes frequently,
    practically with every new major release, so it''s not a problem if your initialization
    code looks different. For example, I did not include the `RootViewController`
    class initialization code in all previous projects, because we haven''t had a
    use for it. But I''ll get to that in detail in [Chapter 15](#Chapter15.html#ch15),
    where we''ll mix cocos2d with Cocoa Touch.


    You first create a `UIWindow` and then decide on a `CCDirector` type to use and
    set the animation interval to 60 frames per second. This is the default behavior.


    The `EAGLView` line is important because for overlapping tiles to render properly,
    a depth buffer must be specified with the `depthFormat` parameter. In this case,
    it''s `GL_DEPTH_COMPONENT24_OES`, which creates a depth buffer of 24 bits. To
    conserve memory, you can also use a 16-bit depth buffer, which may also be sufficient.


    Depth buffering allows OpenGL to determine whether a certain pixel is in front
    or behind another pixel so it can decide whether to actually draw the new pixel
    or discard it. This comes at a cost of additional memory usage—around 500KB for
    a 24-bit depth buffer—but it allows sprites and tiles to correctly overlap one
    another.


    After the `glView` has been created, it''s assigned to the `CCDirector`, added
    as a subview to the window, and then the window is made visible.


    The other really important line in the initialization is `setProjection`, which
    puts cocos2d in 2D projection mode. This changes a couple of OpenGL parameters
    that affect the way cocos2d renders nodes. In this case, it fixes the issue in
    [Figure 11–12](#Chapter11.html#fig_11_12) where the ground floor is not rendered
    as expected, with the result in [Figure 11–13](#Chapter11.html#fig_11_13). But
    it also enables you to finely tune the z-order of sprites by using the `vertexZ`
    property rather than the `zOrder` property of sprites.


    By default, cocos2d''s z-ordering of nodes is based on the z value when you''re
    adding a node via the `addChild` method. Nodes with a lower z-order are drawn
    before nodes with a higher z-order. Nodes that have the same z-order are drawn
    in the order that they''ve been added to the node hierarchy, meaning nodes added
    last will be drawn over nodes added before that node. This allows cocos2d to order
    nodes without using a depth buffer.


    If you enable depth buffering, you can also use the `vertexZ` property to change
    each node''s draw order freely. Cocos2d requires this freedom in order to let
    the `cc_vertexz tilemap` property work its magic. We''ll later manipulate the
    `vertexZ` property of the player character to correctly draw the player sprite
    in front of or behind other isometric tiles.


    ![images](images/1113.jpg)


    **Figure 11–13.** *With 2D projection, the ground layer is displayed as expected.*'
  trans: "\n### 为等距瓦片地图设置 Cocos2d\n\n如果你按照之前的步骤创建了瓦片地图，并按照前文所述在 Tiled 中为地面层和物体层设置了\
    \ `cc_vertexz` 属性，那么生成的瓦片地图可能会像图 11-12 所示。不知为何，地面层被缩小得很远，而物体层的瓦片似乎悬浮在半空中。这看起来像是个可怕的场景。\n\
    \n![图片](img/1112.jpg)\n\n**图 11–12.** *没有 2D 投影，地面层将渲染错误。*\n\n要修复此问题并实现重叠精灵的正确渲染，需要以不同于\
    \ Xcode 中 Cocos2d 应用模板默认设置的方式来初始化 Cocos2d。Xcode 模板以标准方式初始化 Cocos2d，这对大多数游戏来说没问题，但无法正确支持等距瓦片地图游戏。在\
    \ Tilemap05 项目中，Cocos2d 的启动代码已被替换为代码清单 11-1 中的代码，重要更改部分已高亮显示。\n\n**代码清单 11–1.**\
    \ *手动初始化 Cocos2d 的 `EAGLView`*\n\n```\nwindow = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\nif ([CCDirector setDirectorType:kCCDirectorTypeDisplayLink]\
    \ == NO)\n    [CCDirector setDirectorType:kCCDirectorTypeNSTimer];\n\nCCDirector\
    \ *director = [CCDirector sharedDirector];\n[director setAnimationInterval:1.0/60];\n\
    EAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n                 \
    \              pixelFormat:kEAGLColorFormatRGB565\n                          \
    \     depthFormat:GL_DEPTH_COMPONENT24_OES];\n[director setOpenGLView:glView];\n\
    [window addSubview:glView];\n[window makeKeyAndVisible];\n\n// 修复地面层被缩小的问题：\n\
    [director setProjection:kCCDirectorProjection2D];\n```\n\n你需要修改两处：首先，需要启用 OpenGL\
    \ 深度缓冲区，以便对对象的 z 轴排序进行更精细的控制。其次，`CCDirector` 必须使用 2D 投影才能配合深度缓冲区工作。\n\n**注意：**\
    \ 从项目模板创建的 Cocos2d 项目中的实际初始化代码可能不同于代码清单 11-1。但如果你逐行查看初始化代码，会发现本质上运行的是相同的代码；不过，顺序可能不同，或者中间可能添加了其他额外的代码。Cocos2d\
    \ 的初始化代码变化频繁，实际上几乎每个主要新版本都会有所变化，因此如果你的初始化代码看起来不同，这不成问题。例如，我在之前所有项目中都没有包含 `RootViewController`\
    \ 类的初始化代码，因为我们还没有用到它。但在第 15 章中，我会详细介绍这一点，届时我们将把 Cocos2d 与 Cocoa Touch 混合使用。\n\n\
    你首先创建一个 `UIWindow`，然后决定使用哪种 `CCDirector` 类型，并将动画间隔设置为每秒 60 帧。这是默认行为。\n\n`EAGLView`\
    \ 这一行很重要，因为要正确渲染重叠的瓦片，必须使用 `depthFormat` 参数指定一个深度缓冲区。在本例中，使用的是 `GL_DEPTH_COMPONENT24_OES`，它会创建一个\
    \ 24 位的深度缓冲区。为了节省内存，你也可以使用 16 位深度缓冲区，这可能也足够了。\n\n深度缓冲允许 OpenGL 确定某个像素是在另一个像素的前面还是后面，从而决定是实际绘制新像素还是丢弃它。这需要额外的内存开销——对于\
    \ 24 位深度缓冲区大约 500KB——但它允许精灵和瓦片正确重叠。\n\n创建 `glView` 后，将其分配给 `CCDirector`，作为子视图添加到窗口中，然后使窗口可见。\n\
    \n初始化过程中另一个非常重要的代码行是 `setProjection`，它将 Cocos2d 置于 2D 投影模式。这会更改一些影响 Cocos2d 渲染节点方式的\
    \ OpenGL 参数。在这种情况下，它修复了图 11-12 中地面层未按预期渲染的问题，得到了图 11-13 中的结果。但它也使你能够通过使用精灵的 `vertexZ`\
    \ 属性，而不是 `zOrder` 属性，来精细调整精灵的 z 轴顺序。\n\n默认情况下，Cocos2d 对节点的 z 轴排序是基于你通过 `addChild`\
    \ 方法添加节点时的 z 值。`zOrder` 较低的节点会先于 `zOrder` 较高的节点绘制。具有相同 `zOrder` 的节点则按照它们添加到节点层次结构中的顺序绘制，这意味着后添加的节点将绘制在先添加的节点之上。这使得\
    \ Cocos2d 无需使用深度缓冲区即可对节点进行排序。\n\n如果启用了深度缓冲，你还可以使用 `vertexZ` 属性自由更改每个节点的绘制顺序。Cocos2d\
    \ 需要这种自由度才能让 `cc_vertexz` 瓦片地图属性发挥其神奇作用。我们稍后将操纵玩家角色的 `vertexZ` 属性，以正确地将玩家精灵绘制在其他等距瓦片的前面或后面。\n\
    \n![图片](img/1113.jpg)\n\n**图 11–13.** *有了 2D 投影，地面层显示正常。*\n"
- fmt: "### Locating an Isometric Tile\n\nThe next thing to do is to determine from\
    \ a touch location the coordinates of the touched tile. This is done in the `Tilemap06`\
    \ project.\n\nIf you refer to [Figure 10–11](#Chapter10.html#fig_10_11) in the\
    \ previous chapter, you'll recall that the tilemap indices of orthogonal tilemaps\
    \ have their origin point (`0, 0`) at the top-left corner. Now, with isometric\
    \ tilemaps, there is no top-left corner anymore. The tilemap itself is rotated\
    \ by 45 degrees, which makes the topmost tile the point of origin. [Figure 11–14](#Chapter11.html#fig_11_14)\
    \ illustrates this well. Tiles toward the bottom right have increasing X coordinates,\
    \ while Tiles toward the bottom left have increasing Y coordinates. The bottommost\
    \ tile then has the coordinates `29, 29` in a map consisting of `30x30` tiles.\n\
    \n![images](images/1114.jpg)\n\n**Figure 11–14.** *The coordinate system of an\
    \ isometric tilemap*\n\nThis may seem strange at first, but if you lean your head\
    \ a bit to the right, you may notice that the tile coordinates follow the exact\
    \ same order as in orthogonal tilemaps, except that the whole map is rotated by\
    \ 45 degrees.\n\nYou can now straighten your head again, because I need you to\
    \ focus on the modified `tilePosFromLocation` method, which calculates the touched\
    \ tile coordinates from a touch location on the screen. As [Listing 11–2](#Chapter11.html#list_11_2)\
    \ shows, it's a wee bit more complex than the orthogonal counterpart.\n\n**Listing\
    \ 11–2.** *Calculating the Tile Coordinates from a Touch Location*\n\n```\n-(CGPoint)\
    \ tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap\n{\n \
    \   // Tilemap position must be subtracted, in case the tilemap position is scrolling\n\
    \    CGPoint pos = ccpSub(location, tileMap.position);\n\n    float halfMapWidth\
    \ = tileMap.mapSize.width * 0.5f;\n    float mapHeight = tileMap.mapSize.height;\n\
    \    float tileWidth = tileMap.tileSize.width;\n    float tileHeight = tileMap.tileSize.height;\n\
    \n    CGPoint tilePosDiv = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);\n\
    \    float inverseTileY = mapHeight - tilePosDiv.y;\n\n    // Cast to int makes\
    \ sure that result is in whole numbers\n    float posX = (int)(inverseTileY +\
    \ tilePosDiv.x - halfMapWidth);\n    float posY = (int)(inverseTileY - tilePosDiv.x\
    \ + halfMapWidth);\n\n    // make sure coordinates are within isomap bounds\n\
    \    posX = MAX(0, posX);\n    posX = MIN(tileMap.mapSize.width - 1, posX);\n\
    \    posY = MAX(0, posY);\n    posY = MIN(tileMap.mapSize.height - 1, posY);\n\
    \n    return CGPointMake(posX, posY);\n}\n```\n\nSubtracting the tilemap position\
    \ to take scrolling of the tilemap into account is the same as in the orthogonal\
    \ version of this method. Next I create a number of variables just to make the\
    \ code a bit more readable and have less to type, and then I divide the map size\
    \ width by half. I then create a `CGPoint tilePosDiv`, which is the pixel location\
    \ within the tilemap divided by the tilemap's width and height, and an `inverseTileY`\
    \ variable, which is simply the inverse of the tilemap's Y coordinates. This inversion\
    \ is necessary because the tilemap Y coordinates count from top down, whereas\
    \ screen Y coordinates count from bottom up.\n\nNow I get to actually calculating\
    \ the X, Y coordinates of the touched tile. The calculation starts with the inverse\
    \ Y coordinate, which will be in the range of 0 to 29 for a tilemap that has a\
    \ height of 30 tiles. It defines the vertical position in the tilemap from which\
    \ we'll be looking for the x and y tile coordinates horizontally.\n\nThis becomes\
    \ clearer if you look at [Figure 11–4](#Chapter11.html#fig_11_4) and locate tile\
    \ coordinate (`3,3`). You'll notice that when you move on a horizontal line to\
    \ the left of tile coordinate (`3,3`), the x coordinates decrease while the y\
    \ coordinates increase: (`2,4`), (`1,5`), (`0,6`). Similarly, if you move to the\
    \ right of tile coordinate (`3,3`), the x coordinates increase while the y coordinates\
    \ decrease: (`4,2`), (`5,1`), (`6,0`).\n\nThat means you can get both x and y\
    \ tile coordinates from the `inverseTileY` position. In the case of the x tile\
    \ coordinate, you add the `tilePosDiv.x` coordinate and then subtract `halfMapWidth`.\
    \ For the y tile coordinate, you subtract the sum of `tilePosDiv.x` and `halfMapWidth`\
    \ from `inverseTileY`.\n\n**NOTE:** I'll spare you the details of the mathematical\
    \ concepts behind this calculation, since you can apply the code as is and don't\
    \ need to change anything. If you are interested in understanding the intricate\
    \ details of isometric projection and the mathematics behind it, I recommend reading\
    \ the excellently illustrated article by Herbert Glarner at [`www.gandraxa.com/isometric_projection.aspx`](http://www.gandraxa.com/isometric_projection.aspx).\n\
    \nBy applying the Objective-C `MIN` and `MAX` macros, I ensure that the returned\
    \ tile coordinate is within the bounds of the tilemap. In other words, it will\
    \ return coordinates from (`0, 0`) to (`29, 29`) for the `30x30` tilemap used\
    \ by the isometric tilemap projects."
  raw: '#### Locating an Isometric Tile


    The next thing to do is to determine from a touch location the coordinates of
    the touched tile. This is done in the Tilemap06 project.


    If you refer to [Figure 10–11](#Chapter10.html#fig_10_11) in the previous chapter,
    you''ll recall that the tilemap indices of orthogonal tilemaps have their origin
    point (0, 0) at the top-left corner. Now, with isometric tilemaps, there is no
    top-left corner anymore. The tilemap itself is rotated by 45 degrees, which makes
    the topmost tile the point of origin. [Figure 11–14](#Chapter11.html#fig_11_14)
    illustrates this well. Tiles toward the bottom right have increasing X coordinates,
    while Tiles toward the bottom left have increasing Y coordinates. The bottommost
    tile then has the coordinates 29, 29 in a map consisting of 30x30 tiles.


    ![images](images/1114.jpg)


    **Figure 11–14.** *The coordinate system of an isometric tilemap*


    This may seem strange at first, but if you lean your head a bit to the right,
    you may notice that the tile coordinates follow the exact same order as in orthogonal
    tilemaps, except that the whole map is rotated by 45 degrees.


    You can now straighten your head again, because I need you to focus on the modified
    `tilePosFromLocation` method, which calculates the touched tile coordinates from
    a touch location on the screen. As [Listing 11–2](#Chapter11.html#list_11_2) shows,
    it''s a wee bit more complex than the orthogonal counterpart.


    **Listing 11–2.** *Calculating the Tile Coordinates from a Touch Location*


    `-(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap`

    `{`

    `    // Tilemap position must be subtracted, in case the tilemap position is scrolling`

    `    CGPoint pos = ccpSub(location, tileMap.position);`


    `    float halfMapWidth = tileMap.mapSize.width * 0.5f;`

    `    float mapHeight = tileMap.mapSize.height;`

    `    float tileWidth = tileMap.tileSize.width;`

    `    float tileHeight = tileMap.tileSize.height;`


    `    CGPoint tilePosDiv = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);`

    `    float inverseTileY = mapHeight - tilePosDiv.y;`


    `    // Cast to int makes sure that result is in whole numbers`

    `    float posX = (int)(inverseTileY + tilePosDiv.x - halfMapWidth);`

    `    float posY = (int)(inverseTileY - tilePosDiv.x + halfMapWidth);`


    `    // make sure coordinates are within isomap bounds`

    `    posX = MAX(0, posX);`

    `    posX = MIN(tileMap.mapSize.width - 1, posX);`

    `    posY = MAX(0, posY);`

    `    posY = MIN(tileMap.mapSize.height - 1, posY);`


    `    return CGPointMake(posX, posY);`

    `}`


    Subtracting the tilemap position to take scrolling of the tilemap into account
    is the same as in the orthogonal version of this method. Next I create a number
    of variables just to make the code a bit more readable and have less to type,
    and then I divide the map size width by half. I then create a `CGPointtilePosDiv`,
    which is the pixel location within the tilemap divided by the tilemap''s width
    and height, and an `inverseTileY` variable, which is simply the inverse of the
    tilemap''s Y coordinates. This inversion is necessary because the tilemap Y coordinates
    count from top down, whereas screen Y coordinates count from bottom up.


    Now I get to actually calculating the X, Y coordinates of the touched tile. The
    calculation starts with the inverse Y coordinate, which will be in the range of
    0 to 29 for a tilemap that has a height of 30 tiles. It defines the vertical position
    in the tilemap from which we''ll be looking for the x and y tile coordinates horizontally.


    This becomes clearer if you look at [Figure 11–4](#Chapter11.html#fig_11_4) and
    locate tile coordinate (3,3). You''ll notice that when you move on a horizontal
    line to the left of tile coordinate (3,3), the x coordinates decrease while the
    y coordinates increase: (2,4), (1,5), (0,6). Similarly, if you move to the right
    of tile coordinate (3,3), the x coordinates increase while the y coordinates decrease:
    (4,2), (5,1), (6,0).


    That means you can get both x and y tile coordinates from the `inverseTileY` position.
    In the case of the x tile coordinate, you add the `tilePosDiv.x` coordinate and
    then subtract `halfMapWidth`. For the y tile coordinate, you subtract the sum
    of `tilePosDiv.x` and `halfMapWidth` from `inverseTileY`.


    **NOTE:** I''ll spare you the details of the mathematical concepts behind this
    calculation, since you can apply the code as is and don''t need to change anything.
    If you are interested in understanding the intricate details of isometric projection
    and the mathematics behind it, I recommend reading the excellently illustrated
    article by Herbert Glarner at [`www.gandraxa.com/isometric_projection.aspx`](http://www.gandraxa.com/isometric_projection.aspx).


    By applying the Objective-C `MIN` and `MAX` macros, I ensure that the returned
    tile coordinate is within the bounds of the tilemap. In other words, it will return
    coordinates from (0, 0) to (29, 29) for the 30x30 tilemap used by the isometric
    tilemap projects.'
  trans: "\n### 定位等距瓦片\n\n接下来要做的，是根据触摸位置确定被触摸瓦片的坐标。这将在 `Tilemap06` 项目中完成。\n\n如果你回顾上一章的图\
    \ 10-11 就会记得，正交瓦片地图的索引原点 (`0, 0`) 位于左上角。而对于等距瓦片地图，不再有左上角的概念。瓦片地图本身旋转了 45 度，使得最顶部的瓦片成为原点。图\
    \ 11-14 清晰地展示了这一点。朝右下方的瓦片其 X 坐标递增，而朝左下方的瓦片其 Y 坐标递增。在一个由 `30x30` 个瓦片组成的地图中，最底部的瓦片坐标为\
    \ `29, 29`。\n\n![images](img/1114.jpg)\n\n**图 11-14.** *等距瓦片地图的坐标系*\n\n乍看之下可能有些奇怪，但如果你把头向右偏一点，可能会注意到瓦片坐标的顺序与正交瓦片地图完全相同，只是整个地图旋转了\
    \ 45 度。\n\n现在你可以把头正过来了，因为我需要你专注于修改后的 `tilePosFromLocation` 方法，它根据屏幕上的触摸位置计算被触摸的瓦片坐标。如列表\
    \ 11-2 所示，它比正交版本要稍微复杂一些。\n\n**列表 11-2.** *根据触摸位置计算瓦片坐标*\n\n```\n-(CGPoint) tilePosFromLocation:(CGPoint)location\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // 必须减去瓦片地图位置，以防瓦片地图位置在滚动\n    CGPoint\
    \ pos = ccpSub(location, tileMap.position);\n\n    float halfMapWidth = tileMap.mapSize.width\
    \ * 0.5f;\n    float mapHeight = tileMap.mapSize.height;\n    float tileWidth\
    \ = tileMap.tileSize.width;\n    float tileHeight = tileMap.tileSize.height;\n\
    \n    CGPoint tilePosDiv = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);\n\
    \    float inverseTileY = mapHeight - tilePosDiv.y;\n\n    // 转换为 int 确保结果是整数\n\
    \    float posX = (int)(inverseTileY + tilePosDiv.x - halfMapWidth);\n    float\
    \ posY = (int)(inverseTileY - tilePosDiv.x + halfMapWidth);\n\n    // 确保坐标在等距地图边界内\n\
    \    posX = MAX(0, posX);\n    posX = MIN(tileMap.mapSize.width - 1, posX);\n\
    \    posY = MAX(0, posY);\n    posY = MIN(tileMap.mapSize.height - 1, posY);\n\
    \n    return CGPointMake(posX, posY);\n}\n```\n\n减去瓦片地图位置以考虑其滚动，这与该方法的正交版本相同。接下来我创建了几个变量，只是为了让代码更易读并减少输入量，然后我将地图尺寸宽度除以一半。接着我创建了一个\
    \ `CGPoint tilePosDiv`，它是瓦片地图内的像素位置除以瓦片地图的宽度和高度，以及一个 `inverseTileY` 变量，简单来说就是瓦片地图\
    \ Y 坐标的取反。之所以需要取反，是因为瓦片地图的 Y 坐标从上往下计数，而屏幕的 Y 坐标是从下往上计数。\n\n现在我来实际计算被触摸瓦片的 X、Y\
    \ 坐标。计算从取反后的 Y 坐标开始，对于一个高度为 30 个瓦片的地图，其范围是 0 到 29。它定义了我们在瓦片地图中的垂直位置，我们将从这个位置水平地寻找瓦片的\
    \ x 和 y 坐标。\n\n如果你查看图 11-4 并定位瓦片坐标 (`3,3`)，这就变得更清晰了。你会注意到，当你沿着 (`3,3`) 瓦片坐标左侧的水平线移动时，x\
    \ 坐标递减而 y 坐标递增：(`2,4`)、(`1,5`)、(`0,6`)。同样地，如果你向 (`3,3`) 右侧移动，x 坐标递增而 y 坐标递减：(`4,2`)、(`5,1`)、(`6,0`)。\n\
    \n这意味着你可以从 `inverseTileY` 位置同时获得 x 和 y 瓦片坐标。对于 x 瓦片坐标，你加上 `tilePosDiv.x` 坐标，然后减去\
    \ `halfMapWidth`。对于 y 瓦片坐标，你从 `inverseTileY` 中减去 `tilePosDiv.x` 与 `halfMapWidth`\
    \ 之和。\n\n**注意：** 我将略过此计算背后的数学概念细节，因为你可以直接应用此代码，无需做任何更改。如果你有兴趣理解等距投影及其背后数学的复杂细节，我推荐阅读\
    \ Herbert Glarner 撰写的图文并茂的文章，网址是 [`www.gandraxa.com/isometric_projection.aspx`](http://www.gandraxa.com/isometric_projection.aspx)。\n\
    \n通过应用 Objective-C 的 `MIN` 和 `MAX` 宏，我确保返回的瓦片坐标在瓦片地图边界内。换句话说，对于等距瓦片地图项目所使用的 `30x30`\
    \ 瓦片地图，它将返回范围在 (`0, 0`) 到 (`29, 29`) 内的坐标。\n"
- fmt: "# Scrolling the Isometric Tilemap\n\nWith the `tilePosFromLocation` method\
    \ updated to work with isometric tilemaps, the Tilemap06 project continues by\
    \ implementing isometric tilemap scrolling, using the tile coordinates returned\
    \ from the `tilePosFromLocation` method. Just as in the orthogonal tilemap project,\
    \ this is done using the `centerTileMapOnTileCoord` method, shown in [Listing\
    \ 11–3](#Chapter11.html#list_11_3).\n\n**Listing 11–3.** *Scrolling the Screen\
    \ to Center on a Specific Tile Coordinate*\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // center tilemap on the given tile\
    \ pos\n    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n    CGPoint\
    \ screenCenter = CGPointMake(screenSize.width * 0.5f,\n        screenSize.height\
    \ * 0.5f);\n\n    // get the ground layer\n    CCTMXLayer* layer = [tileMap layerNamed:@\"\
    Ground\"];\n    NSAssert(layer != nil, @\"Ground layer not found!\");\n\n    //\
    \ internally tile Y coordinates are off by 1\n    tilePos.y -= 1;\n\n    // get\
    \ the pixel coordinates for a tile at these coordinates\n    CGPoint scrollPosition\
    \ = [layer positionAt:tilePos];\n\n    // negate the position to account for scrolling\n\
    \    scrollPosition = ccpMult(scrollPosition, -1);\n\n    // add offset to screen\
    \ center\n    scrollPosition = ccpAdd(scrollPosition, screenCenter);\n\n    //\
    \ move the tilemap\n    CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];\n\
    \    [tileMap stopAllActions];\n    [tileMap runAction:move];\n}\n```\n\nFirst,\
    \ the screen center position is determined as before. Then I want to use the convenience\
    \ method of the layer, `positionAt`, which returns a screen position for a tile\
    \ coordinate. To do so, I get the Ground layer and assert that it exists. It doesn't\
    \ matter which layer you use, as long as all layers use the same size tiles.\n\
    \nBefore calling the `positionAt` method, I have to subtract 1 from the tile Y\
    \ coordinate to fix a persistent offset problem. Seasoned programmers may be worried\
    \ that using a tile Y coordinate of 0 and subtracting 1 from it could lead to\
    \ an invalid index and thus a disastrous crash. But in this case, the `positionAt`\
    \ method doesn't use the tile coordinates as indices, and it works with any tile\
    \ coordinate, even negative ones.\n\nThe `positionAt` method returns the pixel\
    \ position of the given tile coordinate within the tilemap and stores it in the\
    \ `scrollPosition` variable. This method isn't specific to isometric tilemaps;\
    \ it works for all tilemap types: orthogonal, isometric, and hexagonal. Internally,\
    \ cocos2d checks which type of tilemap is currently being used and then uses the\
    \ appropriate calculation, since they differ in profound ways. If you are interested\
    \ in the specific implementation of each of these calculations, take a look at\
    \ the methods `positionForOrthoAt`, `positionForIsoAt`, and `positionForHexAt`\
    \ in the `CCTMXLayer.m` implementation file.\n\nBecause the tilemap may be scrolling,\
    \ in which case it will have a negative position, the `scrollPosition` is multiplied\
    \ by -1, negating it. After that I just add the `screenCenter` position to it,\
    \ and I know where to scroll to. The `move` action is the same as before and moves\
    \ the tilemap so that the touched tile is centered on-screen.\n\n# This World\
    \ Deserves a Better End\n\nBecause of the diamond-shaped nature of isometric tilemaps,\
    \ it's inevitable that the scrolling tilemap will reveal parts outside of the\
    \ tilemap, as shown in [Figure 11–15](#Chapter11.html#fig_11_15). Indeed, the\
    \ `tilePosFromLocation` method ensures that the returned tile coordinate is always\
    \ within bounds, so you can use that safely even if the player touches outside\
    \ the tilemap. But if you don't want the player to see the end of your isometric\
    \ tilemap world, you'll have to use a trick.\n\nOpen Tiled and load the `isometric.tmx`\
    \ file from the Tilemap06 project's resource folder. What you want to do is to\
    \ add a border around the existing map and fill it with tiles that give the impression\
    \ of an impassable area. In Tiled, use `Map` → `Resize Map…` to bring up the Resize\
    \ dialog shown in [Figure 11–16](#Chapter11.html#fig_11_16). You need to add 10\
    \ tiles to each side of this tilemap to completely fill the border. Depending\
    \ on the tile size, you will have to experiment to find the minimum number of\
    \ tiles that need to be appended. In this case, enter **50** as the new width\
    \ and height and also enter **10** in the offset boxes. This makes the tilemap\
    \ 20x20 tiles larger and also moves everything you've edited previously to the\
    \ center so that you end up with a border of 10 tiles on each side.\n\n![images](images/1115.jpg)\n\
    \n**Figure 11–15.** *It's the end of the world as we know it (and it feels wrong).*\n\
    \n![images](images/1116.jpg)\n\n**Figure 11–16.** *Resizing the map in Tiled to\
    \ add a border*\n\nYou can now fill this border area to give the impression of\
    \ an area of the map that is simply impassable. It helps to choose a darker ground\
    \ tile to hint to the player that this area can't be entered, and of course you\
    \ should add impenetrable objects onto the Objects layer and around the border\
    \ of the playable area. Your result should look something like [Figure 11–17](#Chapter11.html#fig_11_17).\
    \ I saved my version into the resources folder of the Tilemap07 project and named\
    \ it `isometric-with-border.tmx`.\n\n![images](images/1117.jpg)\n\n**Figure 11–17.**\
    \ *A convincing impassable map border area*\n\n**NOTE:** The impassable area in\
    \ [Figure 11–17](#Chapter11.html#fig_11_17) does look quite repetitive and boring.\
    \ You may be tempted to add more detail to that area, but that is a double-edged\
    \ sword. On one side, more details and variations within the impassable area will\
    \ make it look better. On the other, it can also fool the player into thinking\
    \ about and, even worse, spending time trying to reach that one spot in the impassable\
    \ area that looks like it could be visited. The player might assume it's a secret\
    \ area and he simply has to figure out how to get there. If you have a player\
    \ thinking like this, it's bad for your game. You don't want to tempt the player\
    \ into trying things that are absolutely impossible to achieve. It just wastes\
    \ his time, and it ends in frustration.\n\nThe Tilemap07 project also implements\
    \ the code that prevents you from scrolling outside the playable area by defining\
    \ the inner tile coordinates of the playable area. I added two `CGPoint` variables,\
    \ `playableAreaMin` and `playableAreaMax`, to the `TileMapLayer` class:\n\n```\n\
    @interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin, playableAreaMax;\n\
    }\n```\n\nThe playable area variables are initialized with a border size of 10\
    \ tiles in the `init` method of the class:\n\n```\nconst int borderSize = 10;\n\
    playableAreaMin = CGPointMake(borderSize, borderSize);\nplayableAreaMax = CGPointMake(tileMap.mapSize.width\
    \ - 1 - borderSize,\n    tileMap.mapSize.height - 1 - borderSize);\n```\n\nThe\
    \ playable area is defined as anything within the bounds of the tile coordinates\
    \ `(10, 10)` to `(39, 39)`. All tiles outside this area should be considered not\
    \ part of the playfield. All that remains is to update the `tilePosFromLocation`\
    \ method by replacing the `MIN`/`MAX` lines to implement this rule of the playable\
    \ area. Instead of keeping the tile coordinates within the bounds of the whole\
    \ tilemap, you now want to keep it within the bounds of the playable area, as\
    \ such:\n\n```\nposX = MAX(playableAreaMin.x, posX);\nposX = MIN(playableAreaMax.x,\
    \ posX);\nposY = MAX(playableAreaMin.y, posY);\nposY = MIN(playableAreaMax.y,\
    \ posY);\n```\n\nIf you try this, you'll see that only the tiles within the playable\
    \ area can be centered on-screen. What's more, clicks outside the playable area\
    \ are not just ignored; the tilemap scrolls as close as possible to the tile you\
    \ clicked. This way, you don't destroy the player's impression of a world that\
    \ seemingly extends far beyond what the player can see."
  raw: '#### Scrolling the Isometric Tilemap


    With the `tilePosFromLocation` method updated to work with isometric tilemaps,
    the Tilemap06 project continues by implementing isometric tilemap scrolling, using
    the tile coordinates returned from the `tilePosFromLocation` method. Just as in
    the orthogonal tilemap project, this is done using the `centerTileMapOnTileCoord`
    method, shown in [Listing 11–3](#Chapter11.html#list_11_3).


    **Listing 11–3.** *Scrolling the Screen to Center on a Specific Tile Coordinate*


    `-(void) centerTileMapOnTileCoord:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap`

    `{`

    `    // center tilemap on the given tile pos`

    `    CGSize screenSize = [[CCDirector sharedDirector] winSize];`

    `    CGPoint screenCenter = CGPointMake(screenSize.width * 0.5f,`![images](images/U002.jpg)

    `        screenSize.height * 0.5f);`


    `    // get the ground layer`

    `    CCTMXLayer* layer = [tileMap layerNamed:@"Ground"];`

    `    NSAssert(layer != nil, @"Ground layer not found!");`


    `    // internally tile Y coordinates are off by 1`

    `    tilePos.y -= 1;`


    `    // get the pixel coordinates for a tile at these coordinates`

    `    CGPoint scrollPosition = [layer positionAt:tilePos];`


    `    // negate the position to account for scrolling`

    `    scrollPosition = ccpMult(scrollPosition, -1);`


    `    // add offset to screen center`

    `    scrollPosition = ccpAdd(scrollPosition, screenCenter);`


    `    // move the tilemap        `

    `    CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];`

    `    [tileMap stopAllActions];`

    `    [tileMap runAction:move];`

    `}`


    First, the screen center position is determined as before. Then I want to use
    the convenience method of the layer, `positionAt`, which returns a screen position
    for a tile coordinate. To do so, I get the Ground layer and assert that it exists.
    It doesn''t matter which layer you use, as long as all layers use the same size
    tiles.


    Before calling the `positionAt` method, I have to subtract 1 from the tile Y coordinate
    to fix a persistent offset problem. Seasoned programmers may be worried that using
    a tile Y coordinate of 0 and subtracting 1 from it could lead to an invalid index
    and thus a disastrous crash. But in this case, the `positionAt` method doesn''t
    use the tile coordinates as indices, and it works with any tile coordinate, even
    negative ones.


    The `positionAt` method returns the pixel position of the given tile coordinate
    within the tilemap and stores it in the `scrollPosition` variable. This method
    isn''t specific to isometric tilemaps; it works for all tilemap types: orthogonal,
    isometric, and hexagonal. Internally, cocos2d checks which type of tilemap is
    currently being used and then uses the appropriate calculation, since they differ
    in profound ways. If you are interested in the specific implementation of each
    of these calculations, take a look at the methods `positionForOrthoAt`, `positionForIsoAt`,
    and `positionForHexAt` in the CCTMXLayer.m implementation file.


    Because the tilemap may be scrolling, in which case it will have a negative position,
    the `scrollPosition` is multiplied by -1, negating it. After that I just add the
    `screenCenter` position to it, and I know where to scroll to. The `move` action
    is the same as before and moves the tilemap so that the touched tile is centered
    on-screen.


    #### This World Deserves a Better End


    Because of the diamond-shaped nature of isometric tilemaps, it''s inevitable that
    the scrolling tilemap will reveal parts outside of the tilemap, as shown in [Figure
    11–15](#Chapter11.html#fig_11_15). Indeed, the `tilePosFromLocation` method ensures
    that the returned tile coordinate is always within bounds, so you can use that
    safely even if the player touches outside the tilemap. But if you don''t want
    the player to see the end of your isometric tilemap world, you''ll have to use
    a trick.


    Open Tiled and load the isometric.tmxfile from the Tilemap06 project''s resource
    folder. What you want to do is to add a border around the existing map and fill
    it with tiles that give the impression of an impassable area. In Tiled, use `Map`
    ![images](images/U001.jpg) `Resize Map…` to bring up the Resize dialog shown in
    [Figure 11–16](#Chapter11.html#fig_11_16). You need to add 10 tiles to each side
    of this tilemap to completely fill the border. Depending on the tile size, you
    will have to experiment to find the minimum number of tiles that need to be appended.
    In this case, enter **50** as the new width and height and also enter **10** in
    the offset boxes. This makes the tilemap 20x20 tiles larger and also moves everything
    you''ve edited previously to the center so that you end up with a border of 10
    tiles on each side.


    ![images](images/1115.jpg)


    **Figure 11–15.** *It''s the end of the world as we know it (and it feels wrong).*


    ![images](images/1116.jpg)


    **Figure 11–16.** *Resizing the map in Tiled to add a border*


    You can now fill this border area to give the impression of an area of the map
    that is simply impassable. It helps to choose a darker ground tile to hint to
    the player that this area can''t be entered, and of course you should add impenetrable
    objects onto the Objects layer and around the border of the playable area. Your
    result should look something like [Figure 11–17](#Chapter11.html#fig_11_17). I
    saved my version into the resources folder of the Tilemap07 project and named
    it isometric-with-border.tmx.


    ![images](images/1117.jpg)


    **Figure 11–17.** *A convincing impassable map border area*


    **NOTE:** The impassable area in [Figure 11–17](#Chapter11.html#fig_11_17) does
    look quite repetitive and boring. You may be tempted to add more detail to that
    area, but that is a double-edged sword. On one side, more details and variations
    within the impassable area will make it look better. On the other, it can also
    fool the player into thinking about and, even worse, spending time trying to reach
    that one spot in the impassable area that looks like it could be visited. The
    player might assume it''s a secret area and he simply has to figure out how to
    get there. If you have a player thinking like this, it''s bad for your game. You
    don''t want to tempt the player into trying things that are absolutely impossible
    to achieve. It just wastes his time, and it ends in frustration.


    The Tilemap07 project also implements the code that prevents you from scrolling
    outside the playable area by defining the inner tile coordinates of the playable
    area. I added two `CGPoint` variables, `playableAreaMin` and `playableAreaMax`,
    to the `TileMapLayer` class:


    `@interface TileMapLayer : CCLayer`

    `{`

    `    CGPoint playableAreaMin, playableAreaMax;`

    `}`


    The playable area variables are initialized with a border size of 10 tiles in
    the `init` method of the class:


    `const int borderSize = 10;`

    `playableAreaMin = CGPointMake(borderSize, borderSize);`

    `playableAreaMax = CGPointMake(tileMap.mapSize.width - 1 - borderSize,`![images](images/U002.jpg)

    `    tileMap.mapSize.height - 1 - borderSize);`


    The playable area is defined as anything within the bounds of the tile coordinates
    `(10, 10)` to `(39, 39)`. All tiles outside this area should be considered not
    part of the playfield. All that remains is to update the `tilePosFromLocation`
    method by replacing the `MIN`/`MAX` lines to implement this rule of the playable
    area. Instead of keeping the tile coordinates within the bounds of the whole tilemap,
    you now want to keep it within the bounds of the playable area, as such:


    `posX = MAX(playableAreaMin.x, posX);`

    `posX = MIN(playableAreaMax.x, posX);`

    `posY = MAX(playableAreaMin.y, posY);`

    `posY = MIN(playableAreaMax.y, posY);`


    If you try this, you''ll see that only the tiles within the playable area can
    be centered on-screen. What''s more, clicks outside the playable area are not
    just ignored; the tilemap scrolls as close as possible to the tile you clicked.
    This way, you don''t destroy the player''s impression of a world that seemingly
    extends far beyond what the player can see.'
  trans: "\n# 滚动等距瓦片地图\n\n在更新了`tilePosFromLocation`方法使其支持等距瓦片地图后，Tilemap06 项目接下来利用该方法返回的瓦片坐标，实现了等距瓦片地图的滚动。与正交瓦片地图项目类似，这是通过`centerTileMapOnTileCoord`方法完成的，如代码清单\
    \ 11-3 所示。\n\n**代码清单 11-3.** *滚动屏幕以特定瓦片坐标为中心*\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap *)tileMap\n{\n    // 以指定瓦片位置为中心滚动瓦片地图\n    CGSize screenSize\
    \ = [[CCDirector sharedDirector] winSize];\n    CGPoint screenCenter = CGPointMake(screenSize.width\
    \ * 0.5f,\n        screenSize.height * 0.5f);\n\n    // 获取地面层\n    CCTMXLayer*\
    \ layer = [tileMap layerNamed:@\"Ground\"];\n    NSAssert(layer != nil, @\"未找到地面层！\"\
    );\n\n    // 内部瓦片 Y 坐标需减 1\n    tilePos.y -= 1;\n\n    // 获取指定坐标处瓦片的像素坐标\n   \
    \ CGPoint scrollPosition = [layer positionAt:tilePos];\n\n    // 取反以处理滚动偏移\n \
    \   scrollPosition = ccpMult(scrollPosition, -1);\n\n    // 加上屏幕中心偏移量\n    scrollPosition\
    \ = ccpAdd(scrollPosition, screenCenter);\n\n    // 移动瓦片地图\n    CCAction* move\
    \ = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];\n    [tileMap\
    \ stopAllActions];\n    [tileMap runAction:move];\n}\n```\n\n首先，像之前一样确定屏幕中心位置。接着，我希望使用层的便捷方法`positionAt`，该方法能根据瓦片坐标返回屏幕位置。为此，我获取了地面层并断言其存在。只要所有层使用相同尺寸的瓦片，选择哪一层都没有关系。\n\
    \n在调用`positionAt`方法前，需要从瓦片 Y 坐标中减去 1，以修正一个持续的偏移问题。经验丰富的程序员可能会担心，如果瓦片 Y 坐标为 0 并减去\
    \ 1，会导致无效索引从而引发灾难性崩溃。但在此例中，`positionAt`方法并不将瓦片坐标用作索引，它可以处理任何瓦片坐标，甚至负数坐标。\n\n`positionAt`方法返回给定瓦片坐标在瓦片地图中的像素位置，并将其存储在`scrollPosition`变量中。此方法并非专用于等距瓦片地图，它适用于所有类型的瓦片地图：正交、等距和六边形。在内部，cocos2d\
    \ 会检测当前使用的瓦片地图类型，然后采用相应的计算方法，因为这些类型在根本上是不同的。如果你对这些计算的具体实现感兴趣，可以查看`CCTMXLayer.m`实现文件中的`positionForOrthoAt`、`positionForIsoAt`和`positionForHexAt`方法。\n\
    \n由于瓦片地图可能正在滚动，此时其位置为负数，因此将`scrollPosition`乘以-1 进行取反。之后，只需将`screenCenter`位置加到这个值上，就能知道滚动目标位置。`move`动作与之前相同，负责移动瓦片地图，使触摸到的瓦片居中显示在屏幕上。\n\
    \n# 这个世界值得拥有更好的边界\n\n由于等距瓦片地图的菱形特性，滚动时不可避免地会显示出瓦片地图之外的区域，如图 11-15 所示。事实上，`tilePosFromLocation`方法确保返回的瓦片坐标始终在边界内，因此即使玩家触摸到地图外部，你也可以安全使用该坐标。但如果你不想让玩家看到等距瓦片地图世界的尽头，就需要使用一个小技巧。\n\
    \n打开 Tiled，加载 Tilemap06 项目资源文件夹中的`isometric.tmx`文件。你需要做的是在现有地图周围添加一个边框，并用瓦片填充它，使其看起来像不可通过的区域。在\
    \ Tiled 中，使用`Map` → `Resize Map…`打开如图 11-16 所示的调整大小对话框。你需要在此瓦片地图的每一边添加 10 个瓦片，以完全填充边框。根据瓦片尺寸，你可能需要试验以找到需要附加的最小瓦片数。在此例中，将新的宽度和高度都设置为**50**，并在偏移框中输入**10**。这样会使瓦片地图扩大\
    \ 20x20 个瓦片，并将之前编辑的所有内容移至中心，最终在每边形成 10 个瓦片的边框。\n\n![images](img/1115.jpg)\n\n\
    **图 11-15.** *我们所知的世界尽头（而且感觉不对劲）。*\n\n![images](img/1116.jpg)\n\n**图 11-16.**\
    \ *在 Tiled 中调整地图大小以添加边框*\n\n现在你可以填充这个边框区域，使其看起来像是地图中完全无法通过的区域。选择一个颜色较深的地面瓦片有助于提示玩家此区域无法进入，当然，你还应该在\
    \ Objects 层添加障碍物，环绕可玩区域的边界。最终效果应类似于图 11-17。我将我的版本保存到 Tilemap07 项目的资源文件夹中，并命名为`isometric-with-border.tmx`。\n\
    \n![images](img/1117.jpg)\n\n**图 11-17.** *一个令人信服的不可通过地图边界区域*\n\n**注意：** 图 11-17\
    \ 中的不可通过区域看起来确实相当重复且乏味。你可能会想为该区域添加更多细节，但这是一把双刃剑。一方面，在不可通过区域内增加更多细节和变化会让它看起来更好。另一方面，这也会误导玩家，让他们思考甚至浪费时间试图到达不可通过区域中某个看起来可以到达的地点。玩家可能会认为这是一个秘密区域，只需要想办法到达那里。如果你有玩家产生这样的想法，对你的游戏是不利的。你不应该引诱玩家尝试那些完全不可能实现的事情。这只是浪费他们的时间，并最终导致挫败感。\n\
    \nTilemap07 项目还实现了通过定义可玩区域内部瓦片坐标来防止滚动到可玩区域之外的代码。我在`TileMapLayer`类中添加了两个`CGPoint`变量：`playableAreaMin`和`playableAreaMax`：\n\
    \n```\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin, playableAreaMax;\n\
    }\n```\n\n可玩区域变量在类的`init`方法中初始化为 10 个瓦片的边框大小：\n\n```\nconst int borderSize = 10;\n\
    playableAreaMin = CGPointMake(borderSize, borderSize);\nplayableAreaMax = CGPointMake(tileMap.mapSize.width\
    \ - 1 - borderSize,\n    tileMap.mapSize.height - 1 - borderSize);\n```\n\n可玩区域定义为瓦片坐标`(10,\
    \ 10)`到`(39, 39)`范围内的任意位置。该区域之外的所有瓦片不应被视为游戏区的一部分。剩下的工作就是更新`tilePosFromLocation`方法，用`MIN`/`MAX`行替换以实现可玩区域的规则。现在你不希望将瓦片坐标限制在整个瓦片地图的边界内，而是要限制在可玩区域的边界内，如下所示：\n\
    \n```\nposX = MAX(playableAreaMin.x, posX);\nposX = MIN(playableAreaMax.x, posX);\n\
    posY = MAX(playableAreaMin.y, posY);\nposY = MIN(playableAreaMax.y, posY);\n```\n\
    \n如果你尝试这个代码，会发现只有可玩区域内的瓦片可以被居中显示到屏幕上。更重要的是，点击可玩区域之外并不会被忽略；瓦片地图会滚动到尽可能接近你点击的瓦片位置。通过这种方式，你不会破坏玩家对一个看似无限延伸的世界的印象。\n"
- fmt: "### Adding a Movable Player Character\n\nBy adding a player character moving\
    \ about the tilemap world, you get closer to an actual isometric game. In this\
    \ case, I chose the `ninja.png` as the player character and added it to the `Tilemap08`\
    \ project. The player is a class derived from `CCSprite`, aptly named `Player`.\
    \ [Listing 11–4](#Chapter11.html#list_11_4) shows the header file.\n\n**Listing\
    \ 11–4.** *The Player Class Interface*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface Player : CCSprite\n{\n}\n\n+(id) player;\n\
    \n@end\n```\n\nThe `+(id) player` method in [Listing 11–5](#Chapter11.html#list_11_5)\
    \ is the static autorelease initialize, which also initializes the sprite with\
    \ the `ninja.png` file.\n\n**Listing 11–5.** *The Player Class Implementation*\n\
    \n```\n#import \"Player.h\"\n\n@implementation Player\n\n+(id) player\n{\n   \
    \ return [[[self alloc] initWithFile:@\"ninja.png\"] autorelease];\n}\n\n@end\n\
    ```\n\nYou then create the player in the `TileMapLayer` class's `init` method:\n\
    \n```\nCGSize screenSize = [[CCDirector sharedDirector] winSize];\n\n// Create\
    \ the player and add it\nplayer = [Player player];\nplayer.position = CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2);\n\n// approximately position player's texture to\
    \ best match the tile center position\nplayer.anchorPoint = CGPointMake(0.3f,\
    \ 0.1f);\n[self addChild:player];\n```\n\nThe player's position is set to the\
    \ center of the screen on purpose. Since you already have a method that allows\
    \ you to center a specific tile on the screen, centering the player sprite on\
    \ the screen as well makes it behave as if it were moving across the tilemap,\
    \ when in fact it always remains at the same position. You don't have to move\
    \ the player sprite at all!\n\nThe player's `anchorPoint` is offset a little from\
    \ its default of `(0.5f, 0.5f)` to `(0.3f, 0.1f)` to approximately center the\
    \ sprite's feet on the center position of the tile. Otherwise, it might look wrong\
    \ because all other game objects like trees and cacti have their roots, literally\
    \ speaking, at the center of the tile. So, it's only natural to try to place the\
    \ player's feet at that position as well.\n\nIf you try this now, even though\
    \ the player sprite never moves, it looks as if the player is walking about the\
    \ tilemap world. Perfect!\n\nWell, not quite. If you move over mountains and walls\
    \ and trees and buildings, the player sprite is always drawn in front of them.\n\
    \n### Enabling the Player to Move Behind Tiles\n\nTo allow the player to be partially\
    \ hidden by object tiles in front of him, such as buildings, walls, trees, and\
    \ whatnot, you have to change his `vertexZ` value as he moves around on the map.\
    \ At the start of this chapter, when you created the Objects layer in Tiled, you\
    \ gave it a property named `cc_vertexz` and set it to automatic. This instructed\
    \ cocos2d to assign consecutive `vertexZ` values to the tiles in that layer. [Figure\
    \ 11–18](#Chapter11.html#fig_11_18) shows you which `vertexZ` values the tiles\
    \ are assigned in a tilemap that's 50x50 tiles in size. This is different from\
    \ the tile indices shown in [Figure 11–14](#Chapter11.html#fig_11_14) because\
    \ the `vertexZ` values increase in both X and Y directions. You could say that\
    \ `vertexZ` values decrease with each horizontal row of the tilemap.\n\n![images](images/1118.jpg)\n\
    \n**Figure 11–18.** *The vertexZ values of tiles in the 50x50 tilemap*\n\nThis\
    \ is reflected in code by the `updateVertexZ` method added to the `Player` class:\n\
    \n```\n-(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n\
    {\n    float lowestZ = -(tileMap.mapSize.width + tileMap.mapSize.height);\n  \
    \  float currentZ = tilePos.x + tilePos.y;\n    self.vertexZ = lowestZ + currentZ\
    \ - 1;\n}\n```\n\nThe lowest `vertexZ` value is simply the sum of the map size\
    \ width and height in the negative. Likewise, you can get the difference of any\
    \ tile coordinate in the tilemap to the lowest `vertexZ` value, which is the tile\
    \ at position `0, 0`. It's the sum of the X and Z coordinates of that position.\
    \ For example, the tile at position `2, 2` is `2 + 2 = 4` less than the lowest\
    \ `vertexZ` value. If you add the two, you get `-100 + 4 = -96`. Since the player\
    \ sprite is added to the `TileMapLayer` after the tilemap, it will render on top\
    \ of tiles with the same `vertexZ` value. Because of this, I also subtract `1`\
    \ so that the end result is a `vertexZ` value of `-97` if the player is standing\
    \ on the tile coordinate `2, 2`.\n\nTo make this code work, you also have to define\
    \ the `updateVertexZ` method in the `Player` class's interface:\n\n```\n@interface\
    \ Player : CCSprite\n{\n}\n\n+(id) player;\n-(void) updateVertexZ:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap;\n@end\n```\n\nAnd then you should call the\
    \ `updateVertexZ` method every time the tilemap is moved, which is done in the\
    \ `ccTouchesBegan` method of the `TileMapLayer` class:\n\n```\n-(void) ccTouchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n    CCNode* node = [self getChildByTag:TileMapNode];\n\
    \    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @\"not a CCTMXTiledMap\"\
    );\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\n    CGPoint touchLocation\
    \ = [self locationFromTouches:touches];\n    CGPoint tilePos = [self tilePosFromLocation:touchLocation\
    \ tileMap:tileMap];\n\n    [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\
    \n    // fix the player's Z position\n    [player updateVertexZ:tilePos tileMap:tileMap];\n\
    }\n```\n\nIf you try this now, you'll see that the ninja player will hide behind\
    \ walls, trees, and other large objects, like a good ninja does."
  raw: '#### Adding a Movable Player Character


    By adding a player character moving about the tilemap world, you get closer to
    an actual isometric game. In this case, I chose the ninja.png as the player character
    and added it to the Tilemap08 project. The player is a class derived from `CCSprite`,
    aptly named `Player`. [Listing 11–4](#Chapter11.html#list_11_4) shows the header
    file.


    **Listing 11–4.** *The Player Class Interface*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface Player : CCSprite`

    `{`

    `}`


    `+(id) player;`


    `@end`


    The `+(id) player` method in [Listing 11–5](#Chapter11.html#list_11_5) is the
    static autorelease initialize, which also initializes the sprite with the ninja.png
    file.


    **Listing 11–5.** *The Player Class Implementation*


    `#import "Player.h"`


    `@implementation Player`


    `+(id) player`

    `{`

    `    return [[[self alloc] initWithFile:@"ninja.png"] autorelease];`

    `}`


    `@end`


    You then create the player in the `TileMapLayer` class''s `init` method:


    `CGSize screenSize = [[CCDirector sharedDirector] winSize];`


    `// Create the player and add it`

    `player = [Player player];`

    `player.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);`


    `// approximately position player''s texture to best match the tile center position`

    `player.anchorPoint = CGPointMake(0.3f, 0.1f);`

    `[self addChild:player];`


    The player''s position is set to the center of the screen on purpose. Since you
    already have a method that allows you to center a specific tile on the screen,
    centering the player sprite on the screen as well makes it behave as if it were
    moving across the tilemap, when in fact it always remains at the same position.
    You don''t have to move the player sprite at all!


    The player''s `anchorPoint` is offset a little from its default of `(0.5f, 0.5f)`
    to `(0.3f, 0.1f)` to approximately center the sprite''s feet on the center position
    of the tile. Otherwise, it might look wrong because all other game objects like
    trees and cacti have their roots, literally speaking, at the center of the tile.
    So, it''s only natural to try to place the player''s feet at that position as
    well.


    If you try this now, even though the player sprite never moves, it looks as if
    the player is walking about the tilemap world. Perfect!


    Well, not quite. If you move over mountains and walls and trees and buildings,
    the player sprite is always drawn in front of them.


    ##### Enabling the Player to Move Behind Tiles


    To allow the player to be partially hidden by object tiles in front of him, such
    as buildings, walls, trees, and whatnot, you have to change his `vertexZ` value
    as he moves around on the map. At the start of this chapter, when you created
    the Objects layer in Tiled, you gave it a property named `cc_vertexz` and set
    it to automatic. This instructed cocos2d to assign consecutive `vertexZ` values
    to the tiles in that layer. [Figure 11–18](#Chapter11.html#fig_11_18) shows you
    which `vertexZ` values the tiles are assigned in a tilemap that''s 50x50 tiles
    in size. This is different from the tile indices shown in [Figure 11–14](#Chapter11.html#fig_11_14)
    because the `vertexZ` values increase in both X and Y directions. You could say
    that `vertexZ` values decrease with each horizontal row of the `tilemap`.


    ![images](images/1118.jpg)


    **Figure 11–18.** *The vertexZ values of tiles in the 50x50 tilemap*


    This is reflected in code by the `updateVertexZ` method added to the `Player`
    class:


    `-(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap`

    `{`

    `    float lowestZ = -(tileMap.mapSize.width + tileMap.mapSize.height);`

    `    float currentZ = tilePos.x + tilePos.y;`

    `    self.vertexZ = lowestZ + currentZ - 1;`

    `}`


    The lowest `vertexZ` value is simply the sum of the map size width and height
    in the negative. Likewise, you can get the difference of any tile coordinate in
    the tilemap to the lowest `vertexZ` value, which is the tile at position 0, 0\.
    It''s the sum of the X and Z coordinates of that position. For example, the tile
    at position 2, 2 is 2 + 2 = 4 less than the lowest `vertexZ` value. If you add
    the two, you get -100 + 4 = -96\. Since the player sprite is added to the `TileMapLayer`
    after the tilemap, it will render on top of tiles with the same `vertexZ` value.
    Because of this, I also subtract 1 so that the end result is a `vertexZ` value
    of -97 if the player is standing on the tile coordinate 2, 2.


    To make this code work, you also have to define the `updateVertexZ` method in
    the `Player` class''s interface:


    `@interface Player : CCSprite`

    `{`

    `}`


    `+(id) player;`

    `-(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap;`

    `@end`


    And then you should call the `updateVertexZ` method every time the tilemap is
    moved, which is done in the `ccTouchesBegan` method of the `TileMapLayer` class:


    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    CCNode* node = [self getChildByTag:TileMapNode];`

    `    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");`

    `    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;`


    `    CGPoint touchLocation = [self locationFromTouches:touches];`

    `    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];`


    `    [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];`


    **`    // fix the player''s Z position`**

    **`    [player updateVertexZ:tilePos tileMap:tileMap];`**

    `}`


    If you try this now, you''ll see that the ninja player will hide behind walls,
    trees, and other large objects, like a good ninja does.'
  trans: "\n### 添加可移动玩家角色\n\n通过添加一个在瓦片地图世界中移动的玩家角色，你就能更接近真实的等距游戏了。此处，我选择了`ninja.png`作为玩家角色，并将其添加到`Tilemap08`项目中。该玩家角色是一个继承自`CCSprite`的类，恰如其分地命名为`Player`。代码清单\
    \ 11-4 显示了其头文件。\n\n**代码清单 11–4.** *玩家类接口*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface Player : CCSprite\n{\n}\n\n+(id) player;\n\
    \n@end\n```\n\n代码清单 11-5 中的`+(id) player`方法是静态的自动释放初始化方法，它同时也使用`ninja.png`文件初始化了精灵。\n\
    \n**代码清单 11–5.** *玩家类实现*\n\n```\n#import \"Player.h\"\n\n@implementation Player\n\
    \n+(id) player\n{\n    return [[[self alloc] initWithFile:@\"ninja.png\"] autorelease];\n\
    }\n\n@end\n```\n\n接着，你在`TileMapLayer`类的`init`方法中创建玩家角色：\n\n```\nCGSize screenSize\
    \ = [[CCDirector sharedDirector] winSize];\n\n// 创建玩家角色并添加\nplayer = [Player player];\n\
    player.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);\n\n\
    // 大致调整玩家纹理位置，使其与瓦片中心位置对齐\nplayer.anchorPoint = CGPointMake(0.3f, 0.1f);\n[self\
    \ addChild:player];\n```\n\n玩家角色的位置被有意设置到屏幕中心。既然你已经有了一个能将指定瓦片居中到屏幕的方法，将玩家精灵也居中到屏幕，就能让它表现得像是在瓦片地图上移动，而实际上它始终保持在相同位置。你根本不需要移动玩家精灵！\n\
    \n玩家的`anchorPoint`从其默认的`(0.5f, 0.5f)`偏移到了`(0.3f, 0.1f)`，以便大致将精灵的脚部居中在瓦片的中心位置上。否则，看起来就可能不对劲，因为所有其他游戏对象，如树木和仙人掌，其根部（可说是）都位于瓦片中心。因此，尝试将玩家的脚部也放置在该位置是很自然的。\n\
    \n现在如果你尝试运行，尽管玩家精灵从未移动，但看起来就像玩家正在瓦片地图世界中行走。完美！\n\n嗯，还不完全是。如果你移动到山脉、墙壁、树木和建筑物之上，玩家精灵总是绘制在它们前面。\n\
    \n### 让玩家能移动到瓦片后方\n\n为了让玩家能够被其前方的大型物体瓦片（如建筑物、墙壁、树木等等）部分遮挡，你需要在玩家在地图上移动时改变他的`vertexZ`值。在本章开头，当你在\
    \ Tiled 中创建 Objects 层时，你为其赋予了一个名为`cc_vertexz`的属性并将其设置为`automatic`。这指示 cocos2d\
    \ 为该层中的瓦片分配连续的`vertexZ`值。图 11-18 展示了在大小为 50x50 瓦片的地图中，瓦片被分配了哪些`vertexZ`值。这与图 11-14\
    \ 中显示的瓦片索引不同，因为`vertexZ`值在 X 和 Y 两个方向上都会增加。可以说，`vertexZ`值随着瓦片地图的每一水平行而递减。\n\n\
    ![images](img/1118.jpg)\n\n**图 11–18.** *50x50 瓦片地图中瓦片的 vertexZ 值*\n\n这在代码中通过添加到`Player`类的`updateVertexZ`方法得以体现：\n\
    \n```\n-(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n\
    {\n    float lowestZ = -(tileMap.mapSize.width + tileMap.mapSize.height);\n  \
    \  float currentZ = tilePos.x + tilePos.y;\n    self.vertexZ = lowestZ + currentZ\
    \ - 1;\n}\n```\n\n最低的`vertexZ`值就是地图尺寸宽度与高度之和的相反数。同样地，你可以计算地图中任意瓦片坐标与最低`vertexZ`值的差值，最低值对应于坐标为`0,\
    \ 0`的瓦片。这个差值就是该位置 X 坐标与 Z 坐标之和。例如，位置`2, 2`上的瓦片比最低`vertexZ`值小`2 + 2 = 4`。将两者相加，得到`-100\
    \ + 4 = -96`。由于玩家精灵是在瓦片地图之后添加到`TileMapLayer`中的，它会渲染在具有相同`vertexZ`值的瓦片之上。正因如此，我减去了`1`，这样如果玩家站在瓦片坐标`2,\
    \ 2`上，最终得到的`vertexZ`值就是`-97`。\n\n为了使这段代码生效，你还需要在`Player`类的接口中声明`updateVertexZ`方法：\n\
    \n```\n@interface Player : CCSprite\n{\n}\n\n+(id) player;\n-(void) updateVertexZ:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap;\n@end\n```\n\n然后，你需要在每次移动瓦片地图时调用`updateVertexZ`方法，这将在`TileMapLayer`类的`ccTouchesBegan`方法中完成：\n\
    \n```\n-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n\
    \    CCNode* node = [self getChildByTag:TileMapNode];\n    NSAssert([node isKindOfClass:[CCTMXTiledMap\
    \ class]], @\"not a CCTMXTiledMap\");\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\
    \n    CGPoint touchLocation = [self locationFromTouches:touches];\n    CGPoint\
    \ tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\n    [self\
    \ centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\n    // 修正玩家的 Z 轴位置\n \
    \   [player updateVertexZ:tilePos tileMap:tileMap];\n}\n```\n\n现在如果你尝试运行，你会看到忍者玩家会像一位真正的忍者一样，躲到墙壁、树木和其他大型物体的后面。\n"
- fmt: "### Moving the Player, Tile by Tile\n\nSo far, the player (actually, the screen)\
    \ moves faster the further away from the center the screen is touched. The player\
    \ also moves across the tiles freely, but he really should be moving from tile\
    \ to tile in only four directions. The `Tilemap09` project changes the control\
    \ mechanism to one that allows you to move the player in one of the four allowed\
    \ directions as long as you keep a finger on the screen. The move direction depends\
    \ on where you touch the screen relative to the player.\n\nThis requires some\
    \ additions to the `TileMapLayer` interface, shown in [Listing 11–6](#Chapter11.html#list_11_6).\n\
    \n**Listing 11–6.** *The TileMapLayer Class Interface*\n\n```objc\ntypedef enum\n\
    {\n    MoveDirectionNone = 0,\n    MoveDirectionUpperLeft,\n    MoveDirectionLowerLeft,\n\
    \    MoveDirectionUpperRight,\n    MoveDirectionLowerRight,\n\n    MAX_MoveDirections,\n\
    } EMoveDirection;\n\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
    \ playableAreaMax;\n\n    Player* player;\n\n    CGPoint screenCenter;\n    CGRect\
    \ upperLeft, lowerLeft, upperRight, lowerRight;\n    CGPoint moveOffsets[MAX_MoveDirections];\n\
    \    EMoveDirection currentMoveDirection;\n}\n```\n\nThe `EMoveDirection` enum\
    \ is later used to determine in which direction the player intends to walk, with\
    \ `MoveDirectionNone` signaling no movement. Let's look at changes in the implementation\
    \ of the `TileMapLayer` class's `init` method in [Listing 11–7](#Chapter11.html#list_11_7).\n\
    \n**Listing 11–7.** *Initializing the Player's Movement Directions*\n\n```objc\n\
    // divide the screen into 4 areas\nscreenCenter = CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2);\nupperLeft = CGRectMake(0, screenCenter.y, screenCenter.x,\
    \ screenCenter.y);\nlowerLeft = CGRectMake(0, 0, screenCenter.x, screenCenter.y);\n\
    upperRight = CGRectMake(screenCenter.x, screenCenter.y, screenCenter.x,\n    screenCenter.y);\n\
    lowerRight = CGRectMake(screenCenter.x, 0, screenCenter.x, screenCenter.y);\n\n\
    moveOffsets[MoveDirectionNone] = CGPointZero;\nmoveOffsets[MoveDirectionUpperLeft]\
    \ = CGPointMake(-1, 0);\nmoveOffsets[MoveDirectionLowerLeft] = CGPointMake(0,\
    \ 1);\nmoveOffsets[MoveDirectionUpperRight] = CGPointMake(0, -1);\nmoveOffsets[MoveDirectionLowerRight]\
    \ = CGPointMake(1, 0);\n\ncurrentMoveDirection = MoveDirectionNone;\n\n// continuously\
    \ check for walking\n[self scheduleUpdate];\n```\n\nThe four `CGRect` variables,\
    \ `upperLeft`, `lowerLeft`, `upperRight`, and `lowerRight`, divide the screen\
    \ into four quadrants, each of which is the touch area to move the player in the\
    \ desired direction. Thus, a touch in the lower-right area of the screen will\
    \ move the player to the right and down along the tilemap.\n\nThe `moveOffsets`\
    \ array contains a `CGPoint` for each move direction that, when added to the current\
    \ tile coordinate, will return the next tile coordinate in that direction. The\
    \ `currentMoveDirection` variable simply holds which direction the player is moving\
    \ toward, and you need a `scheduleUpdate` to continuously check whether the player\
    \ still wants to move.\n\nThe `ccTouchesBegan` method ([Listing 11–8](#Chapter11.html#list_11_8))\
    \ has changed to simply check which quadrant of the screen received the touch\
    \ and then sets the `currentMoveDirection`. The newly added `ccTouchesEnded` method\
    \ sets the `currentMoveDirection` back to `MoveDirectionNone`.\n\n**Listing 11–8.**\
    \ *Moving the Player Based on Touch Location*\n\n```objc\n-(void) ccTouchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n    // get the position in tile coordinates\
    \ from the touch location\n    CGPoint touchLocation = [self locationFromTouches:touches];\n\
    \n    // check where the touch was and set the move direction accordingly\n  \
    \  if (CGRectContainsPoint(upperLeft, touchLocation))\n    {\n        currentMoveDirection\
    \ = MoveDirectionUpperLeft;\n    }\n    else if (CGRectContainsPoint(lowerLeft,\
    \ touchLocation))\n    {\n        currentMoveDirection = MoveDirectionLowerLeft;\n\
    \    }\n    else if (CGRectContainsPoint(upperRight, touchLocation))\n    {\n\
    \        currentMoveDirection = MoveDirectionUpperRight;\n    }\n    else if (CGRectContainsPoint(lowerRight,\
    \ touchLocation))\n    {\n        currentMoveDirection = MoveDirectionLowerRight;\n\
    \    }\n}\n\n-(void) ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n\
    {\n    currentMoveDirection = MoveDirectionNone;\n}\n```\n\nThe gist of the work\
    \ has now been moved to the `update` method, which is scheduled to be called every\
    \ frame:\n\n```objc\n-(void) update:(ccTime)delta\n{\n    CCNode* node = [self\
    \ getChildByTag:TileMapNode];\n    NSAssert([node isKindOfClass:[CCTMXTiledMap\
    \ class]], @\"not a CCTMXTiledMap\");\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\
    \n    // if the tilemap is currently being moved, wait until it's done moving\n\
    \    if ([tileMap numberOfRunningActions] == 0)\n    {\n        if (currentMoveDirection\
    \ != MoveDirectionNone)\n        {\n            CGPoint tilePos = [self tilePosFromLocation:screenCenter\
    \ tileMap:tileMap];\n\n            CGPoint offset = moveOffsets[currentMoveDirection];\n\
    \            tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);\n\
    \            tilePos = [self ensureTilePosIsWithinBounds:tilePos];\n\n       \
    \     [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n        }\n  \
    \  }\n\n    // continuously fix the player's Z position\n    CGPoint tilePos =\
    \ [self floatingTilePosFromLocation:screenCenter tileMap:tileMap];\n    [player\
    \ updateVertexZ:tilePos tileMap:tileMap];\n}\n```\n\nThe tilemap has a running\
    \ action only when it is moving, so I give it a new move action only if it has\
    \ no move action currently running and the `currentMoveDirection` isn't `MoveDirectionNone`.\
    \ The `tilePosFromLocation` is no longer retrieved from the screen touch location,\
    \ but instead the `screenCenter` position is used. Since the player is always\
    \ centered on the screen, this is a convenient shortcut to the tile coordinate\
    \ at the center of the screen.\n\nThe `moveOffsets` array returns a `CGPoint`\
    \ that is added to `tilePos` to get the new tile coordinate we intend to move\
    \ to. Because this can be outside the playable area, the new tile coordinate is\
    \ run through the `ensureTilePosIsWithinBounds` method. It's the same code we\
    \ used before to keep the tile coordinate within the playable area but refactored\
    \ into a separate method to avoid duplicating this code. Lastly, the `centerTileMapOnTileCoord`\
    \ method is called to move and center the screen on the desired tile coordinate,\
    \ which also adds the move action.\n\nWith the player now moving across the tilemap\
    \ tile by tile, we can keep updating the player's `vertexZ` value. Previously,\
    \ the `vertexZ` value was set to the target tile coordinate immediately, which\
    \ caused the player to be drawn below all object tiles he was moving over. By\
    \ continuously updating the `vertexZ` value as the player moves across the tilemap,\
    \ his z position is now more accurate and removes any overlap glitches from the\
    \ previous `Tilemap08` project.\n\n**NOTE:** When you're moving the player through\
    \ an arc, you'll notice that as he moves through the arc he'll suddenly appear\
    \ in front of the arc or disappear behind it, depending on the direction he's\
    \ moving. This is an unavoidable side effect of 2D isometric tilemaps. You can\
    \ reduce this effect only by drawing your archways higher than any character in\
    \ your game. You could also split the arc into three tiles so that only the middle\
    \ section is passable, whereas the two sides of the archway are regarded as blocking\
    \ tiles."
  raw: '##### Moving the Player, Tile by Tile


    So far, the player (actually, the screen) moves faster the further away from the
    center the screen is touched. The player also moves across the tiles freely, but
    he really should be moving from tile to tile in only four directions. The Tilemap09
    project changes the control mechanism to one that allows you to move the player
    in one of the four allowed directions as long as you keep a finger on the screen.
    The move direction depends on where you touch the screen relative to the player.


    This requires some additions to the `TileMapLayer` interface, shown in [Listing
    11–6](#Chapter11.html#list_11_6).


    **Listing 11–6.** *The TileMapLayer Class Interface*


    **`typedef enum`**

    **`{`**

    **`    MoveDirectionNone = 0,`**

    **`    MoveDirectionUpperLeft,`**

    **`    MoveDirectionLowerLeft,`**

    **`    MoveDirectionUpperRight,`**

    **`    MoveDirectionLowerRight,`**


    **`    MAX_MoveDirections,`**

    **`} EMoveDirection;`**


    `@interface TileMapLayer : CCLayer`

    `{`

    `    CGPoint playableAreaMin, playableAreaMax;`


    `    Player* player;`


    **`    CGPoint screenCenter;`**

    **`    CGRect upperLeft, lowerLeft, upperRight, lowerRight;`**

    **`    CGPoint moveOffsets[MAX_MoveDirections];`**

    **`    EMoveDirection currentMoveDirection;`**

    `}`


    The `EMoveDirectionenum` is later used to determine in which direction the player
    intends to walk, with `MoveDirectionNone` signaling no movement. Let''s look at
    changes in the implementation of the `TileMapLayer` class''s `init` method in
    [Listing 11–7](#Chapter11.html#list_11_7).


    **Listing 11–7.** *Initializing the Player''s Movement Directions*


    `// divide the screen into 4 areas`

    `screenCenter = CGPointMake(screenSize.width / 2, screenSize.height / 2);`

    `upperLeft = CGRectMake(0, screenCenter.y, screenCenter.x, screenCenter.y);`

    `lowerLeft = CGRectMake(0, 0, screenCenter.x, screenCenter.y);`

    `upperRight = CGRectMake(screenCenter.x, screenCenter.y, screenCenter.x,`![images](images/U002.jpg)

    `    screenCenter.y);`

    `lowerRight = CGRectMake(screenCenter.x, 0, screenCenter.x, screenCenter.y);`


    `moveOffsets[MoveDirectionNone] = CGPointZero;`

    `moveOffsets[MoveDirectionUpperLeft] = CGPointMake(-1, 0);`

    `moveOffsets[MoveDirectionLowerLeft] = CGPointMake(0, 1);`

    `moveOffsets[MoveDirectionUpperRight] = CGPointMake(0, -1);`

    `moveOffsets[MoveDirectionLowerRight] = CGPointMake(1, 0);`


    `currentMoveDirection = MoveDirectionNone;`


    `// continuously check for walking`

    `[self scheduleUpdate];`


    The four `CGRect` variables, `upperLeft`, `lowerLeft`, `upperRight`, and `lowerRight`,
    divide the screen into four quadrants, each of which is the touch area to move
    the player in the desired direction. Thus, a touch in the lower-right area of
    the screen will move the player to the right and down along the tilemap.


    The `moveOffsets` array contains a `CGPoint` for each move direction that, when
    added to the current tile coordinate, will return the next tile coordinate in
    that direction. The `currentMoveDirection` variable simply holds which direction
    the player is moving toward, and you need a `scheduleUpdate` to continuously check
    whether the player still wants to move.


    The `ccTouchesBegan` method ([Listing 11–8](#Chapter11.html#list_11_8)) has changed
    to simply check which quadrant of the screen received the touch and then sets
    the `currentMoveDirection`. The newly added `ccTouchesEnded` method sets the `currentMoveDirection`
    back to `MoveDirectionNone`.


    **Listing 11–8.** *Moving the Player Based on Touch Location*


    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    // get the position in tile coordinates from the touch location`

    `    CGPoint touchLocation = [self locationFromTouches:touches];`


    `    // check where the touch was and set the move direction accordingly`

    `    if (CGRectContainsPoint(upperLeft, touchLocation))`

    `    {`

    `        currentMoveDirection = MoveDirectionUpperLeft;`

    `    }`

    `    else if (CGRectContainsPoint(lowerLeft, touchLocation))`

    `    {`

    `        currentMoveDirection = MoveDirectionLowerLeft;`

    `    }`

    `    else if (CGRectContainsPoint(upperRight, touchLocation))`

    `    {`

    `        currentMoveDirection = MoveDirectionUpperRight;`

    `    }`

    `    else if (CGRectContainsPoint(lowerRight, touchLocation))`

    `    {`

    `        currentMoveDirection = MoveDirectionLowerRight;`

    `    }`

    `}`


    `-(void) ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    currentMoveDirection = MoveDirectionNone;`

    `}`


    The gist of the work has now been moved to the `update` method, which is scheduled
    to be called every frame:


    `-(void) update:(ccTime)delta`

    `{`

    `    CCNode* node = [self getChildByTag:TileMapNode];`

    `    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");`

    `    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;`


    `    // if the tilemap is currently being moved, wait until it''s done moving`

    `    if ([tileMap numberOfRunningActions] == 0)`

    `    {`

    `        if (currentMoveDirection != MoveDirectionNone)`

    `        {`

    `            CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];`


    `            CGPoint offset = moveOffsets[currentMoveDirection];`

    `            tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);`

    `            tilePos = [self ensureTilePosIsWithinBounds:tilePos];`


    `            [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];`

    `        }`

    `    }`


    `    // continuously fix the player''s Z position`

    `    CGPoint tilePos = [self floatingTilePosFromLocation:screenCenter tileMap:tileMap];`

    `    [player updateVertexZ:tilePos tileMap:tileMap];`

    `}`


    The tilemap has a running action only when it is moving, so I give it a new move
    action only if it has no move action currently running and the `currentMoveDirection`
    isn''t `MoveDirectionNone`. The `tilePosFromLocation` is no longer retrieved from
    the screen touch location, but instead the `screenCenter` position is used. Since
    the player is always centered on the screen, this is a convenient shortcut to
    the tile coordinate at the center of the screen.


    The `moveOffsets` array returns a `CGPoint` that is added to `tilePos` to get
    the new tile coordinate we intend to move to. Because this can be outside the
    playable area, the new tile coordinate is run through the `ensureTilePosIsWithinBounds`
    method. It''s the same code we used before to keep the tile coordinate within
    the playable area but refactored into a separate method to avoid duplicating this
    code. Lastly, the `centerTileMapOnTileCoord` method is called to move and center
    the screen on the desired tile coordinate, which also adds the move action.


    With the player now moving across the tilemap tile by tile, we can keep updating
    the player''s `vertexZ` value. Previously, the `vertexZ` value was set to the
    target tile coordinate immediately, which caused the player to be drawn below
    all object tiles he was moving over. By continuously updating the `vertexZ` value
    as the player moves across the tilemap, his z position is now more accurate and
    removes any overlap glitches from the previous Tilemap08 project.


    **NOTE:** When you''re moving the player through an arc, you''ll notice that as
    he moves through the arc he''ll suddenly appear in front of the arc or disappear
    behind it, depending on the direction he''s moving. This is an unavoidable side
    effect of 2D isometric tilemaps. You can reduce this effect only by drawing your
    archways higher than any character in your game. You could also split the arc
    into three tiles so that only the middle section is passable, whereas the two
    sides of the archway are regarded as blocking tiles.'
  trans: "\n### 逐格移动玩家\n\n到目前为止，玩家（实际上是屏幕）的移动速度会随着触摸点远离屏幕中心而加快。玩家也可以在地砖上自由移动，但理想情况下，他应该只能在四个方向上逐格移动。`Tilemap09`\
    \ 项目将控制机制改为：只要手指在屏幕上保持接触，你就能让玩家在四个允许方向之一移动。移动方向取决于你触摸屏幕时相对于玩家的位置。\n\n这需要对 `TileMapLayer`\
    \ 接口进行一些补充，如代码清单 11–6 所示。\n\n**代码清单 11–6.** *TileMapLayer 类接口*\n\n```objc\ntypedef\
    \ enum\n{\n    MoveDirectionNone = 0,\n    MoveDirectionUpperLeft,\n    MoveDirectionLowerLeft,\n\
    \    MoveDirectionUpperRight,\n    MoveDirectionLowerRight,\n\n    MAX_MoveDirections,\n\
    } EMoveDirection;\n\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
    \ playableAreaMax;\n\n    Player* player;\n\n    CGPoint screenCenter;\n    CGRect\
    \ upperLeft, lowerLeft, upperRight, lowerRight;\n    CGPoint moveOffsets[MAX_MoveDirections];\n\
    \    EMoveDirection currentMoveDirection;\n}\n```\n\n`EMoveDirection` 枚举后续用于确定玩家意图行走的方向，其中\
    \ `MoveDirectionNone` 表示无移动。让我们看看代码清单 11–7 中 `TileMapLayer` 类 `init` 方法实现的改动。\n\
    \n**代码清单 11–7.** *初始化玩家的移动方向*\n\n```objc\n// 将屏幕划分为 4 个区域\nscreenCenter = CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2);\nupperLeft = CGRectMake(0, screenCenter.y, screenCenter.x,\
    \ screenCenter.y);\nlowerLeft = CGRectMake(0, 0, screenCenter.x, screenCenter.y);\n\
    upperRight = CGRectMake(screenCenter.x, screenCenter.y, screenCenter.x,\n    screenCenter.y);\n\
    lowerRight = CGRectMake(screenCenter.x, 0, screenCenter.x, screenCenter.y);\n\n\
    moveOffsets[MoveDirectionNone] = CGPointZero;\nmoveOffsets[MoveDirectionUpperLeft]\
    \ = CGPointMake(-1, 0);\nmoveOffsets[MoveDirectionLowerLeft] = CGPointMake(0,\
    \ 1);\nmoveOffsets[MoveDirectionUpperRight] = CGPointMake(0, -1);\nmoveOffsets[MoveDirectionLowerRight]\
    \ = CGPointMake(1, 0);\n\ncurrentMoveDirection = MoveDirectionNone;\n\n// 持续检测行走状态\n\
    [self scheduleUpdate];\n```\n\n四个 `CGRect` 变量 `upperLeft`、`lowerLeft`、`upperRight`\
    \ 和 `lowerRight` 将屏幕划分为四个象限，每个象限都是将玩家向期望方向移动的触摸区域。因此，触摸屏幕右下区域将使玩家沿瓦片地图向右下方移动。\n\
    \n`moveOffsets` 数组为每个移动方向包含一个 `CGPoint`，该点与当前瓦片坐标相加后，即可得到该方向的下一个瓦片坐标。`currentMoveDirection`\
    \ 变量仅保存玩家当前移动的方向，你需要通过 `scheduleUpdate` 持续检查玩家是否仍想移动。\n\n`ccTouchesBegan` 方法（代码清单\
    \ 11–8）已改为仅检查屏幕的哪个象限接收了触摸，然后设置 `currentMoveDirection`。新增的 `ccTouchesEnded` 方法则将\
    \ `currentMoveDirection` 重置为 `MoveDirectionNone`。\n\n**代码清单 11–8.** *基于触摸位置移动玩家*\n\
    \n```objc\n-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n\
    {\n    // 从触摸位置获取瓦片坐标中的位置\n    CGPoint touchLocation = [self locationFromTouches:touches];\n\
    \n    // 检查触摸位置并据此设置移动方向\n    if (CGRectContainsPoint(upperLeft, touchLocation))\n\
    \    {\n        currentMoveDirection = MoveDirectionUpperLeft;\n    }\n    else\
    \ if (CGRectContainsPoint(lowerLeft, touchLocation))\n    {\n        currentMoveDirection\
    \ = MoveDirectionLowerLeft;\n    }\n    else if (CGRectContainsPoint(upperRight,\
    \ touchLocation))\n    {\n        currentMoveDirection = MoveDirectionUpperRight;\n\
    \    }\n    else if (CGRectContainsPoint(lowerRight, touchLocation))\n    {\n\
    \        currentMoveDirection = MoveDirectionLowerRight;\n    }\n}\n\n-(void)\
    \ ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n{\n    currentMoveDirection\
    \ = MoveDirectionNone;\n}\n```\n\n现在，主要工作已转移到 `update` 方法，该方法被安排每帧调用一次：\n\n```objc\n\
    -(void) update:(ccTime)delta\n{\n    CCNode* node = [self getChildByTag:TileMapNode];\n\
    \    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @\"not a CCTMXTiledMap\"\
    );\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\n    // 如果瓦片地图正在移动，则等待其移动完成\n\
    \    if ([tileMap numberOfRunningActions] == 0)\n    {\n        if (currentMoveDirection\
    \ != MoveDirectionNone)\n        {\n            CGPoint tilePos = [self tilePosFromLocation:screenCenter\
    \ tileMap:tileMap];\n\n            CGPoint offset = moveOffsets[currentMoveDirection];\n\
    \            tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);\n\
    \            tilePos = [self ensureTilePosIsWithinBounds:tilePos];\n\n       \
    \     [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n        }\n  \
    \  }\n\n    // 持续修正玩家的 Z 位置\n    CGPoint tilePos = [self floatingTilePosFromLocation:screenCenter\
    \ tileMap:tileMap];\n    [player updateVertexZ:tilePos tileMap:tileMap];\n}\n\
    ```\n\n瓦片地图只有在移动时才会有一个正在运行的 action，因此只有当它当前没有运行移动 action 并且 `currentMoveDirection`\
    \ 不为 `MoveDirectionNone` 时，我才会给它分配一个新的移动 action。`tilePosFromLocation` 不再从屏幕触摸位置获取，而是使用\
    \ `screenCenter` 位置。由于玩家始终居中于屏幕，这是获取屏幕中心瓦片坐标的一个便捷捷径。\n\n`moveOffsets` 数组返回一个 `CGPoint`，将其与\
    \ `tilePos` 相加即可得到我们打算移动到的目标瓦片坐标。由于这可能会超出可玩区域，因此目标瓦片坐标会通过 `ensureTilePosIsWithinBounds`\
    \ 方法进行处理。这与我们之前用来将瓦片坐标保持在可玩区域内的代码相同，只是将其重构为一个单独的方法以避免代码重复。最后，调用 `centerTileMapOnTileCoord`\
    \ 方法将屏幕移动并居中到目标瓦片坐标，同时也会添加移动 action。\n\n现在玩家能逐格穿越瓦片地图，我们可以持续更新玩家的 `vertexZ` 值。此前，`vertexZ`\
    \ 值会立即设置为目标瓦片坐标，导致玩家在移动过程中被绘制到所有他经过的物体瓦片下方。通过持续更新玩家在瓦片地图上移动时的 `vertexZ` 值，其 Z\
    \ 位置现在更加精确，消除了之前 `Tilemap08` 项目中出现的任何重叠图形异常。\n\n**注意：** 当你引导玩家穿过拱门时，会注意到当他在拱门下移动时，会突然出现在拱门前方或消失在拱门后方，具体取决于移动方向。这是\
    \ 2D 等距瓦片地图不可避免的副作用。你只能通过将拱门绘制得比游戏中的任何角色都更高来减小这种影响。你也可以将拱门拆分为三个瓦片，这样只有中间部分可通过，而拱门两侧则视为阻挡瓦片。\n"
- fmt: "### Stop Player on Collisions\n\nLastly, we don't want the player to walk\
    \ over walls and mountains. He may be a ninja, but he's not *that* good. To solve\
    \ that problem, add a new layer in Tiled via `Layer` `Add Tile Layer…` and name\
    \ it `Collisions`; then move the `Opacity` slider just above the `Layers` list\
    \ to about the middle. Now pick a tile from the tileset whose color is a strong\
    \ contrast to the tilemap, because we'll use it to draw collision areas over the\
    \ tilemap, and they should be easily recognizable despite having a low opacity.\n\
    \nI chose one of the purple tiles. Right-click the tile of your choice, and select\
    \ `Tile Properties…` from the context menu. Note that this command has no equivalent\
    \ in the Tiled menu; tile properties can be accessed only by right-clicking a\
    \ tile. In the Tile Properties dialog shown in [Figure 11–19](#Chapter11.html#fig_11_19),\
    \ add a property named `blocks_movement` and set the value to `1`. Actually, I'm\
    \ going to ignore the value in code; it's only important that the `blocks_movement`\
    \ value exists.\n\n![images](images/1119.jpg)\n\n**Figure 11–19.** *Add a `blocks_movement`\
    \ tile property*\n\nWith the `Collisions` layer selected, draw on the tilemap\
    \ with the tile that has the `blocks_movement` property set. Place a tile everywhere\
    \ you don't want the player to move onto, for example, walls, mountains, houses,\
    \ and so on.\n\nThe tilemap `isometric-with-border.tmx` in the `Tilemap10` project\
    \ is already prepared with a collision layer. The collision layer is only for\
    \ checking whether a tile can be moved on and should not be displayed in the game,\
    \ so the first thing you do in the `init` method of the `TileMapLayer` class is\
    \ to set this layer invisible (see [Listing 11–9](#Chapter11.html#list_11_9)).\n\
    \n**Listing 11–9.** *Hiding the Collisions Layer*\n\n```c\nCCTMXTiledMap* tileMap\
    \ = [CCTMXTiledMap tiledMapWithTMXFile:\n    @\"isometric-with-border.tmx\"];\n\
    [self addChild:tileMap z:-1 tag:TileMapNode];\n\nCCTMXLayer* layer = [tileMap\
    \ layerNamed:@\"Collisions\"];\nlayer.visible = NO;\n```\n\nTo check whether a\
    \ certain tile coordinate is blocked, I've added the `isTilePosBlocked` method\
    \ to the `Tilemap10` project, as shown in [Listing 11–10](#Chapter11.html#list_11_10).\n\
    \n**Listing 11–10.** *Determine Whether a Tile Is Blocked*\n\n```c\n-(bool) isTilePosBlocked:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    CCTMXLayer* layer = [tileMap layerNamed:@\"\
    Collisions\"];\n    NSAssert(layer != nil, @\"Collisions layer not found!\");\n\
    \n    bool isBlocked = NO;\n    unsigned int tileGID = [layer tileGIDAt:tilePos];\n\
    \    if (tileGID > 0)\n    {\n        NSDictionary* tileProperties = [tileMap\
    \ propertiesForGID:tileGID];\n        id blocks_movement = [tileProperties objectForKey:@\"\
    blocks_movement\"];\n        isBlocked = (blocks_movement != nil);\n    }\n\n\
    \    return isBlocked;\n}\n```\n\nThe code first tries to get a tile at the given\
    \ tile coordinate from the `Collisions` layer. If there is no tile there, the\
    \ `tileGID` will be `0`, and we can safely assume that this tile is not blocked.\
    \ But if there is a valid `tileGID` at the `tilePos` coordinate, the `tileMap`\
    \ is queried for the properties of the tile, which returns an `NSDictionary` object.\
    \ If the dictionary's `objectForKey` method returns a valid object for the key\
    \ named `blocks_movement`, the tile is blocked.\n\nThe place to check for collision\
    \ is in the `update` method, as shown in [Listing 11–11](#Chapter11.html#list_11_11).\n\
    \n**Listing 11–11.** *Checking for Collision in the `update` Method*\n\n```c\n\
    -(void) update:(ccTime)delta\n{\n    …\n\n    // if the tilemap is currently being\
    \ moved, wait until it's done moving\n    if ([tileMap numberOfRunningActions]\
    \ == 0)\n    {\n        if (currentMoveDirection != MoveDirectionNone)\n     \
    \   {\n            CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];\n\
    \n            CGPoint offset = moveOffsets[currentMoveDirection];\n          \
    \  tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);\n      \
    \      tilePos = [self ensureTilePosIsWithinBounds:tilePos];\n\n            if\
    \ ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)\n            {\n   \
    \             [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n     \
    \       }\n        }\n    }\n\n    …\n}\n```\n\nBefore moving the tilemap, the\
    \ `isTilePosBlocked` method is called to see whether the player can actually move\
    \ there. If the destination tile coordinate is not blocked, he will move; otherwise,\
    \ he won't.\n\n### Adding More Content to the Game\n\nSo far, we have a game where\
    \ you guide a character through an isometric tilemap world. Hiding behind trees\
    \ and avoiding collisions are just the foundation for a game set in this world.\
    \ What if you want to add more actors to the world, whether enemies or nonplayer\
    \ characters (NPCs)?\n\nIn principle, you animate them just like you'd move the\
    \ player, except that the player is centered on-screen, whereas NPCs can be anywhere\
    \ on the tilemap. Still, you only need to determine which direction the NPC should\
    \ walk toward and then move him like the layer is moved in the `centerTileMapOnTileCoord`\
    \ method. The only difference is that the actions are run on the NPC, and the\
    \ directions need to be reversed, since you aren't moving the layer; the NPC is\
    \ moving on the layer.\n\nAs soon as you have NPCs wandering around, the next\
    \ step is to ask how you can get them to move from A to B while avoiding obstacles\
    \ and finding the shortest route. The answer to that is the A* pathfinding algorithm,\
    \ which is an industry standard and has been adapted and tweaked for many situations.\
    \ Tile-based games are ideal candidates for this particular pathfinding algorithm,\
    \ since actor positions are usually restricted to the tile coordinates. For an\
    \ in-depth introduction to the A* pathfinding algorithm, and honestly to a lot\
    \ of game programming topics in general, you must visit Amit's A* pages at [`http://theory.stanford.edu/~amitp/GameProgramming/`](http://theory.stanford.edu/~amitp/GameProgramming/).\n\
    \nAnd you'll want to visit Amit's Game Programming Information pages. He links\
    \ to articles concerning artificial intelligence and tile-based games, including\
    \ procedural world generation. A lot of the articles may seem dated, but, in fact,\
    \ most of them are timeless and are still valuable sources of information. Check\
    \ them out at [`www-cs-students.stanford.edu/~amitp/gameprog.html`](http://www-cs-students.stanford.edu/~amitp/gameprog.html).\n\
    \n### Summary\n\nIn this chapter, you learned what's special about isometric tilemaps,\
    \ how isometric tiles are designed, and how to create a tilemap with a perceived\
    \ depth. You learned how to create and improve such an isometric tilemap with\
    \ Tiled by adding an impassable border and preventing collisions.\n\nYou also\
    \ learned the techniques necessary to set up a tilemap for use with cocos2d and\
    \ how to set up cocos2d itself with 2D projection and a depth buffer for correct\
    \ rendering of overlapping tiles and sprites.\n\nFinally, we added a player whose\
    \ sprite is correctly clipped depending on whether it is in front or behind tiles.\
    \ You can also move the player around tile by tile by tapping and holding the\
    \ screen relative to the player sprite to make him go in that direction. That\
    \ he will do unless the direction is blocked by a mountain, wall, or any other\
    \ movement-blocking tile that you set in Tiled.\n\nSo far, you've worked with\
    \ games that needed to be controlled and animated in discrete steps. You were\
    \ responsible for implementing all of the actor's movement and rotation as well\
    \ as checking for collisions. In the next two chapters, I'll introduce you to\
    \ physics engines, which allow you to lean back as you watch your game's objects\
    \ bounce around and collide with each other all by themselves. If this is the\
    \ first time you've worked with a physics engine, it will be a magical experience.\
    \ Hold onto your hat!\n\n## Chapter 12"
  raw: '##### Stop Player on Collisions


    Lastly, we don''t want the player to walk over walls and mountains. He may be
    a ninja, but he''s not *that* good. To solve that problem, add a new layer in
    Tiled via `Layer` ![images](images/U001.jpg) `Add Tile Layer…` and name it Collisions;
    then move the Opacity slider just above the Layers list to about the middle. Now
    pick a tile from the tileset whose color is a strong contrast to the tilemap,
    because we''ll use it to draw collision areas over the tilemap, and they should
    be easily recognizable despite having a low opacity.


    I chose one of the purple tiles. Right-click the tile of your choice, and select
    `Tile Properties…` from the context menu. Note that this command has no equivalent
    in the Tiled menu; tile properties can be accessed only by right-clicking a tile.
    In the Tile Properties dialog shown in [Figure 11–19](#Chapter11.html#fig_11_19),
    add a property named `blocks_movement` and set the value to 1\. Actually, I''m
    going to ignore the value in code; it''s only important that the `blocks_movement`
    value exists.


    ![images](images/1119.jpg)


    **Figure 11–19.** *Add a blocks_movement tile property*


    With the Collisions layer selected, draw on the tilemap with the tile that has
    the `blocks_movement` property set. Place a tile everywhere you don''t want the
    player to move onto, for example, walls, mountains, houses, and so on.


    The tilemap isometric-with-border.tmxin the Tilemap10 project is already prepared
    with a collision layer. The collision layer is only for checking whether a tile
    can be moved on and should not be displayed in the game, so the first thing you
    do in the `init` method of the `TileMapLayer` class is to set this layer invisible
    (see [Listing 11–9](#Chapter11.html#list_11_9)).


    **Listing 11–9.** *Hiding the Collisions Layer*


    `CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:`![images](images/U002.jpg)

    `    @"isometric-with-border.tmx"];`

    `[self addChild:tileMap z:-1 tag:TileMapNode];`


    `CCTMXLayer* layer = [tileMap layerNamed:@"Collisions"];`

    `layer.visible = NO;`


    To check whether a certain tile coordinate is blocked, I''ve added the `isTilePosBlocked`
    method to the Tilemap10 project, as shown in [Listing 11–10](#Chapter11.html#list_11_10).


    **Listing 11–10.** *Determine Whether a Tile Is Blocked*


    `-(bool) isTilePosBlocked:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap`

    `{`

    `    CCTMXLayer* layer = [tileMap layerNamed:@"Collisions"];`

    `    NSAssert(layer != nil, @"Collisions layer not found!");`


    `    bool isBlocked = NO;`

    `    unsigned int tileGID = [layer tileGIDAt:tilePos];`

    `    if (tileGID > 0)`

    `    {`

    `        NSDictionary* tileProperties = [tileMap propertiesForGID:tileGID];`

    `        id blocks_movement = [tileProperties objectForKey:@"blocks_movement"];`

    `        isBlocked = (blocks_movement != nil);`

    `    }`


    `    return isBlocked;`

    `}`


    The code first tries to get a tile at the given tile coordinate from the Collisions
    layer. If there is no tile there, the `tileGID` will be 0, and we can safely assume
    that this tile is not blocked. But if there is a valid `tileGID` at the `tilePos`
    coordinate, the `tileMap` is queried for the properties of the tile, which returns
    an `NSDictionary` object. If the dictionary''s `objectForKey` method returns a
    valid object for the key named `blocks_movement`, the tile is blocked.


    The place to check for collision is in the `update` method, as shown in [Listing
    11–11](#Chapter11.html#list_11_11).


    **Listing 11–11.** *Checking for Collision in the* `update` *Method*


    `-(void) update:(ccTime)delta`

    `{`

    `    …`


    `    // if the tilemap is currently being moved, wait until it''s done moving`

    `    if ([tileMap numberOfRunningActions] == 0)`

    `    {`

    `        if (currentMoveDirection != MoveDirectionNone)`

    `        {`

    `            CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];`


    `            CGPoint offset = moveOffsets[currentMoveDirection];`

    `            tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);`

    `            tilePos = [self ensureTilePosIsWithinBounds:tilePos];`


    `            if ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)`

    `            {`

    `                [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];`

    `            }`

    `        }`

    `    }`


    `    …`

    `}`


    Before moving the tilemap, the `isTilePosBlocked` method is called to see whether
    the player can actually move there. If the destination tile coordinate is not
    blocked, he will move; otherwise, he won''t.


    ### Adding More Content to the Game


    So far, we have a game where you guide a character through an isometric tilemap
    world. Hiding behind trees and avoiding collisions are just the foundation for
    a game set in this world. What if you want to add more actors to the world, whether
    enemies or nonplayer characters (NPCs)?


    In principle, you animate them just like you''d move the player, except that the
    player is centered on-screen, whereas NPCs can be anywhere on the tilemap. Still,
    you only need to determine which direction the NPC should walk toward and then
    move him like the layer is moved in the `centerTileMapOnTileCoord` method. The
    only difference is that the actions are run on the NPC, and the directions need
    to be reversed, since you aren''t moving the layer; the NPC is moving on the layer.


    As soon as you have NPCs wandering around, the next step is to ask how you can
    get them to move from A to B while avoiding obstacles and finding the shortest
    route. The answer to that is the A* pathfinding algorithm, which is an industry
    standard and has been adapted and tweaked for many situations. Tile-based games
    are ideal candidates for this particular pathfinding algorithm, since actor positions
    are usually restricted to the tile coordinates. For an in-depth introduction to
    the A* pathfinding algorithm, and honestly to a lot of game programming topics
    in general, you must visit Amit''s A* pages at [`http://theory.stanford.edu/~amitp/GameProgramming/`](http://theory.stanford.edu/~amitp/GameProgramming/).


    And you''ll want to visit Amit''s Game Programming Information pages. He links
    to articles concerning artificial intelligence and tile-based games, including
    procedural world generation. A lot of the articles may seem dated, but, in fact,
    most of them are timeless and are still valuable sources of information. Check
    them out at [`www-cs-students.stanford.edu/~amitp/gameprog.html`](http://www-cs-students.stanford.edu/~amitp/gameprog.html).


    ### Summary


    In this chapter, you learned what''s special about isometric tilemaps, how isometric
    tiles are designed, and how to create a tilemap with a perceived depth. You learned
    how to create and improve such an isometric tilemap with Tiled by adding an impassable
    border and preventing collisions.


    You also learned the techniques necessary to set up a tilemap for use with cocos2d
    and how to set up cocos2d itself with 2D projection and a depth buffer for correct
    rendering of overlapping tiles and sprites.


    Finally, we added a player whose sprite is correctly clipped depending on whether
    it is in front or behind tiles. You can also move the player around tile by tile
    by tapping and holding the screen relative to the player sprite to make him go
    in that direction. That he will do unless the direction is blocked by a mountain,
    wall, or any other movement-blocking tile that you set in Tiled.


    So far, you''ve worked with games that needed to be controlled and animated in
    discrete steps. You were responsible for implementing all of the actor''s movement
    and rotation as well as checking for collisions. In the next two chapters, I''ll
    introduce you to physics engines, which allow you to lean back as you watch your
    game''s objects bounce around and collide with each other all by themselves. If
    this is the first time you''ve worked with a physics engine, it will be a magical
    experience. Hold onto your hat!


