    #### The EnemyCache Class


    I just mentioned the `EnemyCache` class. By its name, it should remind you of
    the `BulletCache` class, which also holds a number of pre-initialized objects
    for fast and easy reuse. This avoids creating and releasing objects during gameplay
    that can be a source of minor performance hiccups. Especially for action games,
    those small glitches can have a devastating effect on the player''s experience.
