- fmt: '### It’s Objective, See?


    Furthermore, `cocos2d` is written in `Objective-C`, Apple’s native programming
    language for writing iOS apps. It’s the same language used by the iOS SDK, which
    makes it easier to understand Apple’s documentation and implement iOS SDK functionality.


    A lot of other useful APIs like `Facebook Connect` and `OpenFeint` are also written
    in `Objective-C`, so it makes it easier to integrate those APIs, too.


    **NOTE:** Learning `Objective-C` is advised, even if you prefer some other language.
    I have a strong C++ and C# background, and the `Objective-C` syntax looked very
    odd at first glance. I wasn’t happy at the prospect of learning a new programming
    language that was said to be old and outdated. Not surprisingly, I struggled for
    a while to get the hang of writing code in a programming language that required
    me to let go of old habits and expectations.


    Don’t let the thought of programming with `Objective-C` distract you, though.
    It does require some getting used to, but it pays off soon enough, if only for
    the sheer amount of documentation available. I promise you won’t look back!


    ### It’s 2D


    Of course, `cocos2d` carries the 2D in its name for a reason. It focuses on helping
    you create 2D games. It’s a specialization few other iOS game engines are currently
    offering.


    It does not prevent you from loading and displaying 3D objects. In fact, an entire
    add-on product aptly named `cocos3d` has been created as an open source project
    to add 3D rendering support to `cocos2d`.


    But I have to say that the iOS devices are an ideal platform for great 2D games.
    The majority of new games released on the iTunes App Store are still 2D-only games
    even today. 2D games are generally easier to develop, and the algorithms in 2D
    games are easier to understand and implement. In almost all cases, 2D games are
    less demanding on the hardware, allowing you to create more vibrant, more detailed
    graphics.


    ### It’s Got Physics


    There are also two physics engines you can choose from that are already integrated
    with `cocos2d`. On one hand there’s `Chipmunk`, and on the other there’s `Box2d`.
    Both physics engines superficially differ only in the language they’re written
    in: `Chipmunk` is written in C, and `Box2d` is written in C++. The feature set
    is almost the same. If you’re looking for differences, you’ll find some, but it
    requires a good understanding of how physics engines work to base your choice
    on the differences. In general, you should simply choose the physics engine you
    think is easier to understand and better documented, and for most developers that
    tends to be `Box2d`. Plus, its object-oriented nature makes it a little easier
    to use with `Objective-C`.


    ### It’s Less Technical


    What game developers enjoy most about `cocos2d` is how it hides the low-level
    `OpenGL ES` code. Most of the graphics are drawn using simple sprite classes that
    are created from image files. In other words, a sprite is a texture that can have
    scaling, rotation, and color applied to it by simply changing the appropriate
    `Objective-C` properties of the `CCSprite` class. You don’t have to be concerned
    about how this is implemented using `OpenGL ES` code, which is a good thing.


    At the same time, `cocos2d` gives you the flexibility to add your own `OpenGL
    ES` code at any time for any game object that needs it. And if you’re thinking
    about adding some Cocoa Touch user interface elements, you’ll appreciate knowing
    that these can be mixed in as well.


    And `cocos2d` doesn’t just shield you from the `OpenGL ES` intricacies; it also
    provides high-level abstraction of commonly performed tasks, some of which would
    otherwise require extensive knowledge of the iOS SDK. But if you do need more
    low-level access or want to make use of iOS SDK features, `cocos2d` won’t hold
    you back.


    ### It’s Still Programming


    In general, you could say that `cocos2d` makes programming iOS games simpler while
    still truly requiring excellent programming skills first and foremost. Other iOS
    game engines such as `Unity`, `iTorque`, and `Shiva` focus their efforts on providing
    tool sets and workflows to reduce the amount of programming knowledge required.
    In turn, you give away some technical freedom—and cash too. With `cocos2d`, you
    have to put in a little extra effort, but you’re as close to the core of game
    programming as possible without having to actually deal with the core.


    ### It’s Got a Great Community


    The `cocos2d` community always has someone quick to answer a question, and developers
    are generally open to sharing knowledge and information. You can get in touch
    with the community on the official forum ([`www.cocos2d-iphone.org/forum`](http://www.cocos2d-iphone.org/forum))
    or in my own forum dubbed Cocos2D Central ([`http://cocos2d-central.com`](http://cocos2d-central.com)).


    New tutorials and sample source code are released on an almost daily basis, most
    of it for free. And you’ll find scattered over the Internet plenty of resources
    to learn from and get inspired by.


    Once your game is complete and released on the App Store, you can even promote
    it on the `cocos2d` web site. At the very least, you’ll get the attention of fellow
    developers and ideally valuable feedback.


    **TIP:** To stay up to date with what’s happening in the `cocos2d` community,
    I recommend following `cocos2d` on Twitter: [`http://twitter.com/cocos2d`](http://twitter.com/cocos2d).


    While you’re at it, you might want to follow me as well: [`http://twitter.com/gaminghorror`](http://twitter.com/gaminghorror).


    Next, enter `cocos2d` in Twitter’s search box and then click the “Save this search”
    link. That way, you can regularly check for new posts about `cocos2d` with a single
    click. More often than not, you’ll come across useful `cocos2d`-related information
    that would otherwise have passed you by. And you’ll definitely get to know your
    fellow developers who are also working with `cocos2d`.'
