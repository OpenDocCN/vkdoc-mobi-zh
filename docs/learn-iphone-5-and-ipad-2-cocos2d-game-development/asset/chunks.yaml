    \ 向量现在从物体指向手指。当对 `bodyToFingerDirection` 向量调用 `Normalize` 方法时，它会被转换为之前提到的*单位向量*。单位向量是长度为\
    \ 1（即一个单位）的向量。这样你就可以将其乘以一个固定系数（本例中将其长度加倍），来创建一个指向手指方向的恒定力向量。然后，你可以使用物体的 `ApplyForce`\
    \ 方法，将这个力作为外力施加到物体的中心。你也可以使用中心之外的位置；不过在这种情况下，物体会开始旋转。\n\n最终效果是，球会朝着触摸屏幕的位置加速运动。球通常会冲过头，然后减速并返回。这有点像太阳对行星的引力牵引，虽然效果要戏剧化得多。\n\
    \n然而，作为一个对天文学感兴趣的人，我必须纠正一下自己。引力是一种随着两个物体之间距离的平方而衰减的力，这两个物体通过引力相互拉扯。因此，如果你希望游戏中模拟出更真实的引力效果，只需将\
    \ `applyForceTowardsFinger` 代码替换为列表 13–11 中的代码即可。\n\n**列表 13–11.** *模拟引力牵引*\n\n\
    ```\n-(void) applyForceTowardsFinger\n{\n    b2Vec2 bodyPos = body->GetWorldCenter();\n\
    \    b2Vec2 fingerPos = [Helper toMeters:fingerLocation];\n    float distance\
    \ = bodyToFingerDirection.Length();\n    bodyToFingerDirection.Normalize();\n\n\
    \    // \"真实\"引力随距离平方衰减\n    float distanceSquared = distance * distance;\n  \
    \  b2Vec2 force = ((1.0f / distanceSquared) * 20.0f) * bodyToFingerDirection;\n\
    \    body->ApplyForce(force, body->GetWorldCenter());\n}\n```\n\n此处乘以 20.0f 是一个魔法数字。它只是为了确保引力牵引足够明显。现在，球离手指越近速度越快，而如果你在离球较远处点击屏幕，球几乎不会移动。\n\
    \n虽然 `applyForceTowardsFinger` 代码仅作为临时控制机制，但你可以利用列表 13–11 中的引力代码，在弹球台上创建磁性物体。\n\
    \n## 添加缓冲器\n\n既然你已经有了一个可以用手指移动的球，那就让我们通过引入缓冲器让游戏变得更有趣些。什么是缓冲器？它们是圆形的、蘑菇状的物体，当球碰到它们时，会把球弹开。\n\
    \n**注意：** 有时人们会将缓冲器与玩家控制的挡板（flippers）或挡板上方通常呈三角形的弹弓（slingshots）混淆。如果你想回顾一下弹球术语，关于弹球的维基百科页面应该能帮到你：`en.wikipedia.org/wiki/Pinball`。\n\
    \n列表 13–12 展示了 `Bumper` 类同样相当简洁的头文件。\n\n**列表 13–12.** *Bumper 类的接口*\n\n```\n#import\
    \ \"BodyNode.h\"\n\n@interface Bumper : BodyNode\n{\n\n}\n\n+(id) bumperWithWorld:(b2World*)world\
    \ position:(CGPoint)pos;\n@end\n```\n\n同样地，`Bumper` 类派生自 `BodyNode`。其初始化过程看起来与初始化球的列表\
    \ 13–9 非常相似，因此我将重点放在列表 13–13 中的关键部分。\n\n**列表 13–13.** *初始化 Bumper*\n\n```\n-(id)\
    \ initWithWorld:(b2World*)world position:(CGPoint)pos\n{\n    if ((self = [super\
    \ initWithShape:@\"bumper\" inWord:world]))\n    {\n        // 设置物体位置\n      \
    \  body->SetTransform([Helper toMeters:pos], 0.0f);\n    }\n    return self;\n\
    }\n\n+(id) bumperWithWorld:(b2World*)world position:(CGPoint)pos\n{\n    return\
    \ [[[self alloc] initWithWorld:world position:pos] autorelease];\n}\n```\n\n`Bumper`\
    \ 类唯一的关键要素是将弹性系数（restitution）设置为高于 1.0f——在本例中，你已经在 `PhysicsEditor` 中将其设置为 1.5f。这使得任何碰到缓冲器表面的刚体获得一个脉冲，其强度比撞击缓冲器的力高出\
    \ 50%。结果是在现实世界中不可能出现的：撞击物体在碰到缓冲器表面后速度增加。这是物理引擎的魔力，在此处非常理想，因为我们省去了实现缓冲器逻辑的诸多麻烦。Box2D\
    \ 帮你完成了这一切。\n\n剩下的工作是在 `TableSetup` 类的 `init` 方法中添加以下几行代码来添加一些缓冲器。你可以根据自己的喜好重新定位这些缓冲器：\n\
    \n```\n// 添加一些缓冲器\n[self addBumperAt:ccp( 76, 405) inWorld:world];\n[self addBumperAt:ccp(158,\
    \ 415) inWorld:world];\n[self addBumperAt:ccp(239, 375) inWorld:world];\n[self\
    \ addBumperAt:ccp( 83, 341) inWorld:world];\n[self addBumperAt:ccp(157, 294) inWorld:world];\n\
    [self addBumperAt:ccp(260, 286) inWorld:world];\n[self addBumperAt:ccp( 67, 228)\
    \ inWorld:world];\n[self addBumperAt:ccp(183, 189) inWorld:world];\n```\n\n为了方便添加缓冲器，`TableSetup`\
    \ 类中还添加了 `addBumperAt` 方法：\n\n```\n-(void) addBumperAt:(CGPoint)pos inWorld:(b2World*)world\n\
    {\n    Bumper* bumper = [Bumper bumperWithWorld:world position:pos];\n    [self\
    \ addChild:bumper];\n}\n```\n\n现在请查看并试试 `PhysicsBox2D04` 项目中缓冲器的感受——我认为已经非常接近真实的弹球缓冲器了。\n\
    ```"
- fmt: "#### The Plunger\n\nI hate to take control away from you, but for now I must.\
    \ We're adding the plunger now, and being able to control the ball with your fingers\
    \ might get in the way. So, go into the `Ball` class's `update` method and comment\
    \ out the call to `applyForceTowardsFinger`:\n\n```\nif (moveToFinger == YES)\n\
    {\n    // disabled: no longer needed\n    // [self applyForceTowardsFinger];\n\
    }\n```\n\nNow you can add the `Plunger` class, which I've already done in the\
    \ PhysicsBox2D05 project. [Listing 13–14](#Chapter13.html#list_13_14) shows the\
    \ `Plunger` class's interface, which is also derived from `BodyNode`.\n\n**Listing\
    \ 13–14.** *The Plunger's Header File*\n\n```\n#import \"BodyNode.h\"\n\n@interface\
    \ Plunger : BodyNode\n{\n    b2PrismaticJoint* joint;\n}\n\n+(id) plungerWithWorld:(b2World*)world;\n\
    \n@end\n```\n\nThe `Plunger` class has a member variable for `b2PrismaticJoint`,\
    \ which it's going to use to propel itself upward. A prismatic joint allows only\
    \ one axis of movement—a telescope bar would be a good example of a prismatic\
    \ joint in the real world. You can only move the smaller pipe inside the larger\
    \ pipe, which allows the telescope bar to be extended and retracted but only in\
    \ one direction.\n\nInitializing the plunger is also straightforward, as [Listing\
    \ 13–15](#Chapter13.html#list_13_15) shows. The plunger's physics settings were\
    \ edited in PhysicsEditor. In particular, the friction was set to a very high\
    \ value, while restitution was set to 0. This ensures that the ball is launched\
    \ smoothly by remaining in close contact with the plunger during the time the\
    \ plunger is propelled upward.\n\n**Listing 13–15.** *Initializing the Plunger*\n\
    \n```\n-(id) initWithWorld:(b2World*)world\n{\n    if ((self = [super initWithShape:@\"\
    plunger\" inWord:world]))\n    {\n        CGSize screenSize = [[CCDirector sharedDirector]\
    \ winSize];\n        CGPoint plungerPos = CGPointMake(screenSize.width - 13, -32);\n\
    \n        body->SetTransform([Helper toMeters:plungerPos], 0);\n        body->SetType(b2_dynamicBody);\n\
    \n        [self attachPlunger];\n    }\n    return self;\n}\n```\n\nMost interesting\
    \ is the call to `attachPlunger` and the actual creation of the prismatic joint\
    \ in this method, which is shown in [Listing 13–16](#Chapter13.html#list_13_16).\n\
    \n**Listing 13–16.** *Creating the Plunger's Prismatic Joint*\n\n```\n-(void)\
    \ attachPlunger\n{\n    // create an invisible static body to attach joint to\n\
    \    b2BodyDef bodyDef;\n    bodyDef.position = body->GetWorldCenter();\n    b2Body*\
    \ staticBody = body->GetWorld()->CreateBody(&bodyDef);\n\n    // Create a prismatic\
    \ joint to make plunger go up/down\n    b2PrismaticJointDef jointDef;\n    b2Vec2\
    \ worldAxis(0.0f, 1.0f);\n    jointDef.Initialize(staticBody, body, body->GetWorldCenter(),\
    \ worldAxis);\n    jointDef.lowerTranslation = 0.0f;\n    jointDef.upperTranslation\
    \ = 0.35f;\n    jointDef.enableLimit = true;\n    jointDef.maxMotorForce = 80.0f;\n\
    \    jointDef.motorSpeed = 40.0f;\n    jointDef.enableMotor = false;\n\n    joint\
    \ = (b2PrismaticJoint*)body->GetWorld()->CreateJoint(&jointDef);\n}\n```\n\nFirst,\
    \ a static body is created at the same location as the plunger's dynamic body.\
    \ It will act as the larger pipe of a telescope bar held in place so that only\
    \ the inner pipe may spring upward when released. Remember physics (or *Mythbusters*,\
    \ for that matter): every action has an equal and opposite reaction. To avoid\
    \ the opposite reaction—a downwards-oriented movement of the other body of the\
    \ prismatic joint—it is turned into a static, unmovable body holding the plunger\
    \ in place.\n\nThe `worldAxis` restricts the prismatic joint's movement to the\
    \ y-axis (in other words, up and down). The `worldAxis` is expressed as a normal\
    \ vector with values from 0.0f to 1.0f; when the y-axis is set to 1.0f, the `worldAxis`\
    \ becomes parallel to the y-axis. If you were to set both x- and y-axes to 0.5f,\
    \ the `worldAxis` would be a 45-degree angle. `b2PrismaticJointDef` is initialized\
    \ with the `staticBody` and the world center position of the plunger's dynamic\
    \ body. As anchor point for the joint the `worldAxis` is used, which restricts\
    \ motion of the prismatic joint along the y-axis.\n\nNow follows a set of parameters.\
    \ The lower and upper translations define how far along the axis the plunger is\
    \ allowed to move. In this case, it is allowed to move 0.35f meters upward, which\
    \ is exactly 42 points or 84 pixels on Retina display devices and 42 pixels on\
    \ non-Retina devices. The `enableLimit` field is set to `true` so that this movement\
    \ limit is actually adhered to by the connected bodies. Since the static body\
    \ won't move, the plunger will move the full extent. If both were dynamic bodies,\
    \ both bodies would be able to move, which would be undesirable in this case,\
    \ as mentioned earlier.\n\nNext, I set `maxMotorForce` to `80.0f` (the unit in\
    \ this case is Newton-meters, which is a unit of torque). In Chipmunk this is\
    \ called the body's *moment*. The `maxMotorForce` value limits the torque, or\
    \ energy, of the joint's movement. The `motorSpeed` then determines how quickly,\
    \ if at all, this `maxMotorForce` is reached. I determined both values merely\
    \ by trial and error until it felt about right. The ball is now catapulted up\
    \ and around with just about the right speed. The motor is initially disabled\
    \ because I only want the plunger to go off when there's a ball touching it.\n\
    \nThe joint is then created using the world's `CreateJoint` method and stored\
    \ in the `joint` member variable. Since `CreateJoint` returns a `b2Joint` pointer,\
    \ it has to be cast to a `b2PrismaticJoint` pointer before assignment.\n\nNotice\
    \ that it is not necessary to destroy the joint that the `Plunger` class is keeping\
    \ as a member variable. The joint is automatically destroyed when either body\
    \ it is attached to is destroyed, and in this case the `BodyNode`'s `dealloc`\
    \ method destroys the body.\n\nThe plunger must also be added to the table. As\
    \ usual, this is done in the `initTableWithWorld` method of the `TableSetup` class.\
    \ Simply append the following code:\n\n```\n// Add plunger\nPlunger *plunger =\
    \ [Plunger plungerWithWorld:world];\n[self addChild:plunger z:-1];\n```"
