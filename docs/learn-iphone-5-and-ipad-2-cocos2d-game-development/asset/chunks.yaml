    the returned object is an autorelease object, its memory will be freed automatically.
    But the texture it loads will still be in the `CCTextureCache`.


    `-(void) preloadParticleEffects:(NSString*)particleFile`

    `{`

    `    [ARCH_OPTIMAL_PARTICLE_SYSTEM particleWithFile:particleFile];`

    `}`


    If you chose not to embed the texture inside the particle effect plist file, you
    can preload the particle effect textures simply by calling the `CCTextureCacheaddImage`
    method:


    `[[CCTextureCache sharedTextureCache] addImage:particleFile];` ![images](images/0912.jpg)


    **Figure 9–12.** *I killed the boss, and I can''t see a darn thing. But those
    particles are so beautiful!*


    ### Summary


    This chapter was truly a visual joyride! The stock effects provided by cocos2d
    give a good indication of what the particle effect is able to deliver. They''re
    quick and easy to use.


    But it was also excruciating to create a particle effect in source code. There
    are so many properties to tweak; some are exclusive to specific emitter modes;
    some have misleading names, and they aren''t exactly straightforward to figure
    out. With the explanation for each property, however, you should now have a good
    understanding how a particle effect is put together and what the most important
    parameters are.


    We then saw how particle effects can shine with Particle Designer. This tool is
    extremely helpful—and lots of fun—to work with it. Suddenly, when you can move
    sliders and see the results immediately on-screen, it changes your whole view
    on particle effects, and even more so since you can share your creations with
    others and experiment with other designers'' effects.


    Finally the Shoot ‘em Up game got a makeover and now plays particle explosions
    when enemies are destroyed. This makes for a much more lively game.


    In the next chapter I''ll set the Shoot ''em Up game aside for a bit to tell you
    all you need to know about tilemaps.


    ## Chapter 10


    ## Working with Tilemaps


    In the next two chapters, I''ll introduce you to the world of tile-based games.
    Whether you''ve been playing games since the age of classic role-playing games
    like Ultima or you''ve just recently joined your Facebook friends in Farmville,
    I''m sure you''ve already played a game that uses the tilemap concept for displaying
    its graphics.


    In tilemap games, the graphics consist of a small number of images, called *tiles*,
    that align with each other; placing them on a grid allows us to build rather convincing
    game worlds. The concept is very attractive because it conserves memory as compared
    to drawing the whole world as individual textures, while still allowing a lot
    of variety.


    This chapter will introduce general tilemap concepts by using the simplest tilemaps
    of all: *orthogonal tilemaps*. They are most often built from square, rarely from
    nonsquare rectangular tiles, and typically display the world in a top-down fashion.
    I''ll discuss the various display styles of tilemaps, and the next chapter will
    focus on isometric tilemaps, building on the tilemap programming basics that you''ll
    learn in this chapter.'
  trans: "\n### 用粒子效果打造弹幕射击游戏\n\n我非常希望能在游戏中看到这些效果！让我们把这款弹幕射击游戏提升到一个新高度。你可以在本章的 `ShootEmUp04`\
    \ 项目中找到相关成果，其中还加入了音效，具体效果如图 9-12 所示。\n\n在 `EnemyEntity` 类中，`gotHit` 方法是添加破坏性粒子爆炸效果的绝佳位置，如代码清单\
    \ 9-5 所示。我决定让 Boss 怪物拥有专属的粒子效果，主要因为它体型庞大，而且颜色是紫色的。\n\n**代码清单 9-5.** *为弹幕射击游戏添加爆炸效果*\n\
    \n```\n-(void) gotHit\n{\n    hitPoints--;\n    if (hitPoints <= 0)\n    {\n \
    \       self.visible = NO;\n\n        // 当敌人被摧毁时播放粒子效果\n        CCParticleSystem*\
    \ system;\n\n        if (type == EnemyTypeBoss)\n        {\n            system\
    \ = [ARCH_OPTIMAL_PARTICLE_SYSTEM particleWithFile:@\"fx-explosion2.plist\"];\n\
    \        }\n        else\n        {\n            system = [ARCH_OPTIMAL_PARTICLE_SYSTEM\
    \ particleWithFile:@\"fx-explosion.plist\"];\n        }\n\n        // 设置一些无法在粒子设计器中设置的参数\n\
    \        system.positionType = kCCPositionTypeFree;\n        system.autoRemoveOnFinish\
    \ = YES;\n        system.position = self.position;\n\n        [[GameScene sharedGameScene]\
    \ addChild:system];\n    }\n}\n```\n\n粒子效果文件 `fx-explosion.plist` 和 `fx-explosion2.plist`\
    \ 必须作为资源添加到 Xcode 项目中。粒子系统的初始化方式与之前相同。由于粒子效果应该且必须独立于创建它的敌人，因此需要进行一些准备工作。首先，将 `autoRemoveOnFinish`\
    \ 标志设置为 `YES`，以便效果自动移除。这之所以可行，是因为两种爆炸效果的持续时间都很短。此外，效果还需要获取敌人的当前位置，以便在正确的位置显示。\n\
    \n我将粒子效果添加到 `GameScene` 中，因为敌人本身无法显示粒子效果。一开始，敌人是不可见的，而且它可能很快会重生，这会影响粒子效果。但最重要的是，所有\
    \ `EnemyEntity` 对象都添加到了 `CCSpriteBatchNode` 中，该节点只允许添加 `CCSprite` 对象。如果粒子效果直接添加在\
    \ `EnemyEntity` 对象上，必然会导致运行时异常。\n\n当你使用新的粒子效果玩游戏时，可能会注意到第一次显示这些效果时，游戏会短暂地暂停一下。这是因为\
    \ cocos2d 正在加载粒子效果的纹理——这一过程相当缓慢，无论纹理是如本例这样嵌入 plist 文件，还是作为独立的纹理提供。为了避免这种情况，我在\
    \ `GameScene` 中添加了一个预加载机制：现在 `init` 方法会为游戏过程中使用的每个粒子效果调用 `preloadParticleEffect`\
    \ 方法：\n\n```\n// 为了预加载纹理，在屏幕外播放每个效果一次\n[self preloadParticleEffects:@\"fx-explosion.plist\"\
    ];\n[self preloadParticleEffects:@\"fx-explosion2.plist\"];\n```\n\n`preloadParticleEffects`\
    \ 方法只是简单地创建粒子效果。由于返回的对象是自动释放对象，其内存会被自动释放。但它加载的纹理仍会保存在 `CCTextureCache` 中。\n\n\
    ```\n-(void) preloadParticleEffects:(NSString*)particleFile\n{\n    [ARCH_OPTIMAL_PARTICLE_SYSTEM\
    \ particleWithFile:particleFile];\n}\n```\n\n如果你选择不将纹理嵌入粒子效果的 plist 文件，那么只需调用\
    \ `CCTextureCacheaddImage` 方法即可预加载粒子效果纹理：\n\n```\n[[CCTextureCache sharedTextureCache]\
    \ addImage:particleFile];\n```\n\n**图 9-12.** *我干掉了 Boss，眼前一片模糊。但那些粒子效果真是太美了！*\n\
    \n### 小结\n\n本章真是一场视觉盛宴！cocos2d 提供的内置效果很好地展示了粒子系统所能实现的效果，而且使用起来快速便捷。\n\n但在代码中创建粒子效果也相当繁琐。需要调整的属性太多：有些属性是特定发射器模式专用的；有些名称具有误导性，而且理解起来并不直接。然而，通过对每个属性的解释，你现在应该对粒子效果的构成以及最重要的参数有了很好的理解。\n\
    \n接着，我们看到了粒子效果如何通过 `Particle Designer` 大放异彩。这款工具非常有用，而且使用起来乐趣无穷。当你能够移动滑块并在屏幕上即时看到结果时，它彻底改变了你对粒子效果的看法，更棒的是，你可以与他人分享你的创作，并体验其他设计师制作的效果。\n\
    \n最后，弹幕射击游戏进行了改造，现在敌人被摧毁时会播放粒子爆炸效果。这让游戏变得更加生动。\n\n在下一章中，我将暂时放下弹幕射击游戏，向你介绍关于瓦片地图你需要了解的一切。\n\
    \n## 第 10 章\n\n## 使用瓦片地图\n\n在接下来的两章中，我将带你进入基于瓦片的游戏世界。无论你是从《创世纪》这类经典角色扮演游戏时代就开始玩游戏，还是最近才加入\
    \ Facebook 上与朋友一起玩《Farmville》，我相信你一定玩过使用瓦片地图概念来显示图形的游戏。\n\n在瓦片地图游戏中，图形由少量可相互对齐的图像（称为\
    \ *瓦片*）组成；将它们放置在网格上，就能构建出相当可信的游戏世界。这个概念非常有吸引力，因为与将整个世界绘制成独立纹理相比，它节省了内存，同时仍然允许大量的变化。\n\
    \n本章将通过使用最简单的瓦片地图——*正交瓦片地图*——来介绍瓦片地图的通用概念。它们通常由正方形瓦片构建而成，偶尔也会使用非正方形的矩形瓦片，并且通常以俯视方式显示世界。我将讨论瓦片地图的各种显示风格，下一章将重点介绍等距瓦片地图，并会基于你在本章学到的瓦片地图编程基础知识进行讲解。\n"
- fmt: '### What Is a Tilemap?


    Tilemaps are 2D game worlds made of individual tiles. You can create large world
    maps with just a handful of images that all have the same dimensions. This means
    tilemaps are very efficient at conserving memory for large maps (game worlds).
    It''s no wonder that they first appeared in the early days of computer games.
    Many classic role-playing games used square tiles to create fantastic fantasy
    worlds. These games looked a bit like the tilemap in [Figure 10–1](#Chapter10.html#fig_10_1),
    which is also a perfect example of an orthogonal tilemap. It looks like an aerial
    view, looking straight down. For this reason, orthogonal tilemaps usually look
    flat.


    ![images](images/1001.jpg)


    **Figure 10–1.** *An orthogonal tilemap in Tiled (Qt) Map Editor*


    Tiles in an orthogonal tilemap actually don''t need to be square; you can create
    orthogonal tilemaps from rectangular images as well. Those were most often used
    by Asian role-playing games, such as Dragon Quest. While still using an orthogonal
    perspective, it allowed the designers to create objects that are seemingly taller
    than wide. This enabled the designers to create the illusion of volumes, like
    houses, by painting them as several tiles and allowing game characters to be partially
    obstructed by tiles.


    That method really came to shine with Ultima 6 and in particular Ultima 7. By
    skewing the perspective with which tiles were drawn, the effect came close to
    isometric tilemaps while still being orthogonal tilemaps. Using this method, the
    designers were able to create the illusion of depth, as you can see in [Figure
    10–2](#Chapter10.html#fig_10_2).


    ![images](images/1002.jpg)


    **Figure 10–2.** *An orthogonal tilemap with perspective tiles designed to be
    created in multiple layers to give the impression of depth. This tilemap style
    has come to fame by Ultima 7.*


    Isometric tilemaps take this one step further by not just drawing the tiles in
    a certain perspective but also by rotating the tiles by 45 degrees. Isometric
    tilemaps are very effective in tricking our minds into believing that there really
    is a third dimension in this world, even though all of the images are still essentially
    flat. Isometric tilemaps achieve this impression of depth by using tile images
    that are drawn as diamond shapes (rhombuses) and allowing tiles closer to the
    viewer to draw over the tiles further away from the viewer. See [Figure 10–3](#Chapter10.html#fig_10_3)
    for an example of an isometric tilemap, which I''ll be discussing in the next
    chapter in greater detail.


    ![images](images/1003.jpg)


    **Figure 10–3.** *An isometric tilemap in Tiled (Qt) Map Editor*


    The tilemaps in [Figures10–2](#Chapter10.html#fig_10_2) and [10–3](#Chapter10.html#fig_10_3)
    prove that tilemaps don''t need to be flat-looking. The layering or stacking of
    tiles can also be used with some games that allow players to interact with the
    game world, as many of the Farmville fan videos show to great effect. Several
    Farmville users have used nothing but crop fields to build houses and even tall
    skyscrapers just by stacking tiles. They make use of an optical illusion that''s
    possible with isometric tilemaps.


    Editing tilemaps is usually done with an editor, and the one directly supported
    by `cocos2d` is called Tiled (Qt) Map Editor. Tiled is free, is open source, and
    allows you to edit both orthogonal and isometric tilemaps with multiple layers.
    Tiled also enables you to add trigger areas (Object Layer), which can be used
    in a game to trigger certain actions when a character enters the area. They also
    serve as a way to add arbitrary positions to the map so that you can, for example,
    define spawn locations. By editing tile properties, you can determine what type
    of tile it is. This can also be used to block characters from entering certain
    tiles or, for example, to take damage when moving over a lava tile.


    **NOTE:** Qt refers to Nokia''s Qt framework, on which Tiled is built. Since there
    is also a defunct Java version of Tiled, it''s important to make this differentiation
    by writing Tiled (Qt). The Java version is no longer updated but contains a few
    extra features that may be worth checking out. But in this and the following chapter,
    I will be using and discussing Tiled (Qt).


    ### Preparing Images with TexturePacker


    Before you start working with the Tiled (Qt) Map Editor, you need to prepare the
    tilemap graphics. The set of tile images for a tilemap is commonly referred to
    as *tileset*. Technically it''s just a texture atlas containing tile images.


    In the `Tilemap01` project for this chapter, you''ll find a number of square tile
    images in the `Assets/tiles` folder. Add all of these tile images to `TexturePacker`
    and then uncheck `Allow Rotation`, set `Algorithm` to `Basic`, and set `Sort by`
    to `Name`. These settings ensure that the tiles are ordered and aligned correctly
    for Tiled. The resulting tileset in `TexturePacker` should look similar to [Figure
    10–4](#Chapter10.html#fig_10_4).


    ![images](images/1004.jpg)


    **Figure 10–4.** *Creating a texture atlas of a few square tiles using TexturePacker*


    For Tiled it is crucial that the tiles stay at the same position—this is why the
    sorting by name is so important—since Tiled refers to individual tiles in the
    tileset by position and offset only. That means that if tiles in the texture shift
    places, the tilemap in Tiled using this tileset texture will look completely different.
    The tilemap still refers to the same tile positions in the tileset, but instead
    of a grass tile there could now be a water tile at that position, for example.


    **NOTE:** `TexturePacker` will get a new algorithm called `TileMap`—a special
    mode for creating tilesets for tilemaps, allowing you to manually arrange the
    tiles within the grid. Please visit [`www.texturepacker.com`](http://www.texturepacker.com)
    for availability and more information regarding this new feature.


    ### Tiled (Qt) Map Editor


    The most popular tool to create tilemaps for use with `cocos2d` is the Tiled (Qt)
    Map Editor that I''ve already mentioned in the preceding sections. The `TMX` files
    it creates are natively supported by the `cocos2d` game engine. `TMX` files are
    simply `XML` files that, if need be, you could edit with a text editor.


    Tiled is available as a free download, and at the time of this writing, version
    0.7 is the most current. You can download Tiled from its home page, at [`www.mapeditor.org`](http://www.mapeditor.org).


    If you would like to support the development of Tiled, consider making a donation
    to the project''s developer, Thorbjørn Lindeijer. You can donate to the project
    here: [`http://sourceforge.net/donate/index.php?group_id=161281`](http://sourceforge.net/donate/index.php?group_id=161281).'
