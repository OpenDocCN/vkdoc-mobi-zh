  trans: "\n# 从 Apple ID 开始\n\n你需要一个 Apple ID 来使用“家庭”App。Apple ID 是你的唯一标识，通常与一张有效的信用卡绑定。（在某些情况下，你可以绕过信用卡绑定——详情请参见\
    \ [`https://appleid.apple.com/cn`](https://appleid.apple.com/cn)。（请注意，此处的网址是针对美国的。请登录你所在国家的\
    \ `apple.com` 并搜索 `Apple ID`，以查找针对你所在地区的本地化信息。）\n\n当你在“家庭”App 中创建你的“家庭”时，它是属于你个人的——也就是说，它与你的\
    \ Apple ID 相关联。在“家庭”App 中，你可以创建多个家庭、房间和配件，但它们都属于与你的 Apple ID 关联的同一个“家庭”的一部分。\n\
    \n许多人拥有多个 Apple ID。有时这是随着时间的推移偶然发生的，尤其是在 Apple ID 体系不断演变的过程中。其他情况下则是故意的，例如开发者和作者必须为他们用于管理应用程序和\
    \ iBooks 的账户分别使用独立的 Apple ID。\n\n你可以使用“家人共享”功能，在多个其他家庭成员之间共享一个 Apple ID，而每个成员也都有自己的\
    \ Apple ID。“家人共享”主要是为儿童设计的，这样，组织者（作为家长或监护人的成年人）将为所有人支付账单。这使得 13 岁以下的儿童可以拥有自己的\
    \ Apple ID，并在获得许可的情况下，从家庭账户中进行购买。\n\n如果你曾在 iTunes 或 App Store 购买过任何东西，那么你已经至少拥有一个\
    \ Apple ID。在几乎所有情况下，最好使用现有的 Apple ID 来使用“家庭”App。如果你为每种用途都创建新的 Apple ID，最终可能会弄得一团糟。\n\
    \n一旦你拥有了 Apple ID，并在 Apple TV 或 iPad 上安装了“家庭”App，你就可以开始使用了。\n\n## 在 iPad 上快速开始\n\
    \n如果你想直接上手，以下是在 iPad 上开始使用“家庭”App 的方法。安装 iOS 10（或购买预装了该系统的 iPad）后，只需轻点“家庭”图标，如之前图\
    \ 2-1 所示。\n\n**注意**\n\n这是你首次看到的样子。如果你之前打开过“家庭”App，你将不会看到这些步骤：别担心！此处展示的所有重要内容在“管理家庭设置”一节中也有描述。\n\
    \n在你第一次轻点“家庭”图标后，你会看到以下内容并执行以下操作：\n\n1.  图 2-2 所示的屏幕是你的首次使用介绍。你只需轻点`“开始使用”`即可。\n\
    \n    ![A367674_1_En_2_Fig2_HTML.jpg](img/A367674_1_En_2_Fig2_HTML.jpg)\n    \n\
    \    图 2-2. 开始使用\n\n2.  当你首次使用“家庭”App 时，系统会提示你允许该 App 在使用期间访问位置信息，如图 2-3 所示。你可以在不使用“定位服务”的情况下使用“家庭”的某些部分，但许多功能都依赖于你的位置，因此如果你轻点`“不允许”`，将严重限制其可用性。所以请轻点`“允许”`。（请参阅后面的提示以了解如何重置此设置。）\n\
    \n    ![A367674_1_En_2_Fig3_HTML.jpg](img/A367674_1_En_2_Fig3_HTML.jpg)\n    \n\
    \    图 2-3. 允许访问位置信息\n\n3.  处理完“定位服务”后，你便进入了主界面，如图 2-4 所示。\n\n    ![A367674_1_En_2_Fig4_HTML.jpg](img/A367674_1_En_2_Fig4_HTML.jpg)\n\
    \    \n    图 2-4. 开始使用“家庭”App\n\n此时你就可以探索“家庭”App 了，但如果你能抵制住直接上手的诱惑，第 3 章将为你提供一次导览。下面是一个预览以吊起你的胃口（它还能帮助你更好地在“家庭”App\
    \ 中导航）。在图 2-4 所示的屏幕底部，注意带有两个标签页的标签栏：“家庭”和“自动化”。轻点“自动化”以预览即将推出的功能，如图 2-5 所示。\n\n\
    ![A367674_1_En_2_Fig5_HTML.jpg](img/A367674_1_En_2_Fig5_HTML.jpg)\n\n图 2-5. 预览“家庭”App\
    \ 中的自动化功能\n\n你随时可以使用底部的标签栏在“家庭”App 的不同区域之间切换。\n\n## 管理家庭设置\n\n与大多数 iOS 应用程序一样，你可以使用主屏幕上的“设置”来管理应用程序的设置。某些设置在此处设置，其他设置则在应用内部设置。“设置”通常管理最通用的设置，以及那些可以（有时必须）在应用外部进行设置的选项。\n\
    \n**提示**\n\n关于应用内设置与“设置”应用设置的一个示例通常是 iCloud 的使用。当你首次运行一个启用了 iCloud 的应用时，通常会被询问是否要使用\
    \ iCloud。如果你之后想更改这个决定，你需要在“设置”中，而非应用内进行更改。这种结构使得当你为该应用打开或关闭 iCloud 时，应用能够进行必要的内部调整。以这种方式操作意味着，切换到或从\
    \ iCloud 切换出来的实际工作可以在后台完成，而不是在应用内。这也意味着，即使应用未运行，你也可以进行 iCloud 的开启或关闭操作。\n\n1.\
    \  在你的 iPad 上，轻点`“设置”`，然后从内置应用列表中选择`“家庭”`，如图 2-6 所示。\n\n    ![A367674_1_En_2_Fig6_HTML.jpg](img/A367674_1_En_2_Fig6_HTML.jpg)\n\
    \    \n    图 2-6. 在“设置”中选择“家庭”\n    \n    你可能希望在将来的某个时候为“家庭”使用 iCloud，所以不妨在此处将其打开。请记住，你需要一个用于\
    \ iCloud 的 Apple ID。这个 ID 应该与你用于“家庭”的 Apple ID 相同。\n\n2.  你也可以利用此机会，将你正在使用的设备（iPad\
    \ 或 Apple TV）指定为家庭中枢，请记住你可以拥有多个家庭中枢。\n\n3.  你可以从单个“家庭”开始，如图 2-6 所示。\n\n4.  你可以轻点展开三角形以进一步配置它，如图\
    \ 2-7 所示。\n\n    ![A367674_1_En_2_Fig7_HTML.jpg](img/A367674_1_En_2_Fig7_HTML.jpg)\n\
    \    \n    图 2-7. 配置一个“家庭”\n\n5.  请注意，你始终可以使用图 2-6 底部显示的按钮，选择完全重新开始。这将弹出如图 2-8\
    \ 所示的警告。\n\n    ![A367674_1_En_2_Fig8_HTML.jpg](img/A367674_1_En_2_Fig8_HTML.jpg)\n\
    \    \n    图 2-8. 你始终可以重置“家庭”\n\n**注意**\n\n这是重置“家庭”的方法。你也可以通过从设备中移除“家庭”来达到类似效果。与移除任何应用的情况一样，你将删除其数据。这是一种重置“家庭”的粗暴方式，绝对不推荐。\n\
    \n## 进入你的“家”\n\n在你配置完“设置”后启动“家庭”App（如果你现在就这样做——请记住这是可选的），你可能会看到如图 2-9 所示的基本屏幕。\n\
    \n![A367674_1_En_2_Fig9_HTML.jpg](img/A367674_1_En_2_Fig9_HTML.jpg)\n\n图 2-9.\
    \ 探索你的“家”\n\n这就是你在应用中看到的你的“家”。你所看到的内容将根据你的具体家庭、其房间及其电器而有所不同。你可以配置背景图像以及视图中的几乎所有内容。背景图像可以是你的家庭照片。也许你希望背景图像是从卧室窗户看到的景色。\n\
    \n**提示**\n\n请记住，“家庭”（该应用程序）可以管理多个家，因此你为特定家庭选择的背景图像应该能非常清晰地提醒你这个家是什么。对于学校的宿舍房间（是的，在某些情况下，单个房间也可以是一个家），你可以选择一张校园地标的照片。对于你真正的家（正如罗伯特·弗罗斯特所写，“那个地方，当你必须去那里时，他们必须收留你”），你可以选择一张后院的照片。为什么要这样选择照片？如果你的家庭图像显示的是你的床和书桌，上面堆满了电脑、文件、午餐（午餐日期不明）等等，你可能无法快速识别出哪张照片对应的是哪个地方。\n"
- fmt: '## Add and Configure a Home


    You can see the default Home, and you may have explored it. Now it’s time to build
    your own. To add a new Home, tap the arrow in the top left of the window shown
    previously in Figure [2-9](#A367674_1_En_2_Chapter.html#Fig9). You’ll see the
    Add Home alert as shown in Figure [2-10](#A367674_1_En_2_Chapter.html#Fig10).


    ![A367674_1_En_2_Fig10_HTML.jpg](A367674_1_En_2_Fig10_HTML.jpg)


    Figure 2-10. Add a Home


    As you see in Figure [2-10](#A367674_1_En_2_Chapter.html#Fig10), you can name
    your Home. You’ll be able to invite people to control the Home accessories (that
    will be discussed in Chapter [3](#A367674_1_En_3_Chapter.html)). You can take
    a photo for your Home wallpaper or choose from an existing image. You can come
    back here later on to rename the Home, change the wallpaper, or invite people
    to control the accessories.


    ## Edit or Add a Room


    Use the Rooms tab in the tab bar at the bottom of a Home window to look at your
    Rooms. Use the list icon at the top left of the window to see the options for
    Rooms as shown in Figure [2-11](#A367674_1_En_2_Chapter.html#Fig11). You can configure
    the Room you’re looking at or add a new Room.


    ![A367674_1_En_2_Fig11_HTML.jpg](A367674_1_En_2_Fig11_HTML.jpg)


    Figure 2-11. Manage Rooms


    If you choose Room Settings, you’ll see the alert shown in Figure [2-12](#A367674_1_En_2_Chapter.html#Fig12)
    where you can add a new Room or configure an existing Room.


    ![A367674_1_En_2_Fig12_HTML.jpg](A367674_1_En_2_Fig12_HTML.jpg)


    Figure 2-12. Add or configure a Room


    Remember that the default room is named Default Room. Use the disclosure triangle
    to the right of its name to rename it (or any room). When you tap the disclosure
    triangle, you can set the room data as shown in Figure [2-13](#A367674_1_En_2_Chapter.html#Fig13).


    ![A367674_1_En_2_Fig13_HTML.jpg](A367674_1_En_2_Fig13_HTML.jpg)


    Figure 2-13. Configure a Room


    Notice the pattern here: set the name for a Home, Room, or (in the following section)
    accessory. Set its wallpaper from an existing image or take a photo. That’s the
    routine: name, wallpaper, Done (top right) or Cancel (top left).


    ## Add and Configure an Accessory


    Accessories are lamps, garage doors, or any of devices that will be known to HomeKit
    and controlled by it. Add an accessory from the `+` at the top right of a Home
    or a Room (switch between them with the tab bar at the bottom of the screen).
    Figure [2-14](#A367674_1_En_2_Chapter.html#Fig14) shows adding an accessory to
    a Home.


    ![A367674_1_En_2_Fig14_HTML.jpg](A367674_1_En_2_Fig14_HTML.jpg)


    Figure 2-14. Add and configure an accessory


    Note: Scenes are combinations of accessories and schedules. They’re what you use
    to pull the pieces of Home automation together. They’re discussed in Chapter [3](#A367674_1_En_3_Chapter.html).


    Adding an accessory starts the process by which HomeKit searches for the accessory
    and configures it for HomeKit. Figure [2-15](#A367674_1_En_2_Chapter.html#Fig15)
    shows the initial screen, and Chapter [3](#A367674_1_En_3_Chapter.html) describes
    the steps.


    ![A367674_1_En_2_Fig15_HTML.jpg](A367674_1_En_2_Fig15_HTML.jpg)


    Figure 2-15. Start to configure an accessory


    # 3. Adding Scenes—The Practical Part of HomeKit


    In Chapter [2](#A367674_1_En_2_Chapter.html), you see the very logical and recognizable
    structure of HomeKit homes: the home contains rooms, and each room contains accessories
    such as lamps, sensors for smoke or temperature, and a whole variety of devices
    such as garage door openers (well, maybe not inside a room) and automated window
    blinds. You can use HomeKit to manage all the rooms and accessories by turning
    them on and off or adjusting their settings. You can also use HomeKit to check
    the settings of accessories, such as whether they’re on or off as well as their
    brightness and color (in the case of bulbs).


    This is a nice structure, and it’s quite recognizable. As you proceed through
    the book, you’re going to see how to control these things, and when you get a
    bit further into the book, you’ll find out how to automate them.


    In many ways, this pattern (home ➤ room ➤ accessory) is what you live with. Watch
    how you turn your accessories on and off during your day at home. For many people,
    the turning on and off depends on the time of day, where you are in the home,
    and what you are doing. When you go into a small room (particularly at night),
    you turn on the light, and that light is often a ceiling fixture. A larger room
    may have a single ceiling fixture, but, in many rooms there are several lamps
    and perhaps not even one ceiling fixture. There may be a reading/working light
    on the desk, and a floor lamp by an easy chair, and perhaps a small nightlight
    you turn on overnight to prevent people (including yourself) from walking into
    furniture.


    Many people organize these lights into groups so that a single light switch turns
    on several of them at the same time. It’s not particularly burdensome to walk
    into your living room in the evening and turn on three separate lights, but it’s
    not necessary with various mechanical devices (e.g., power strips).


    ## What Is a Scene?


    HomeKit scenes are just a digital version of the multiple-light scenario. A scene
    is a set of accessories each of which can be added to the scene with its own specific
    settings.


    ### Creating Basic Scenes


    You can create a scene for evening in your living room that turns on the floor
    lamp by a sofa as well as a reading lamp on the desk. Because accessories can
    be more than lamps, the evening scene could also include a window shade accessory.
    When the scene is constructed from the accessories, you can set their attributes
    so that in the scenario just described, the scene could be formally defined as
    follows:


    - Floor lamp: soft white (2550 K), 50% brightness

    - Reading lamp: standard white (2400 K), 80% brightness

    - Window shade: closed


    Color Temperature


    Color temperature (measured on the Kelvin scale and abbreviated K) is the description
    of the type of light emitted by a bulb or other light source. (It’s actually more
    complex than this—you can find an excellent reference on Wikipedia at [https://en.wikipedia.org/w/index.php?title=Color_temperature&oldid=740585423](https://en.wikipedia.org/w/index.php%3Ftitle=Color_temperature%26oldid=740585423).
    Without getting too deep into the details, consider these K values and what they
    represent (the representations are subjective and not part of a formal classification):


    - 1850 K: candle flame

    - 2400 K: standard incandescent light bulb

    - 2550 K: soft white incandescent light bulb

    - 3000 K: warm white compact fluorescent bulbs

    - 6500 K: overcast daylight

    - 15,000-27,000 K: clear blue sky


    Another scene can be created to end the evening. A go-to-bed scene might look
    like this:


    - Floor lamp: soft white (2550 K), 10% brightness

    - Reading lamp: standard bulb (2400 K), 0% brightness

    - Window shade: closed


    ### Scenes Can Involve Several Rooms


    Think back to the home ➤ room ➤ accessory pattern, and you can see that this all
    fits very well. But now you can modify this scene in a way that breaks that pattern.
    Consider the following variation on the evening scene:


    - Floor lamp: soft white (2550 K), 50% brightness

    - Reading lamp: standard bulb (2400 K), 80% brightness

    - Window shade: closed

    - Bedside lamp: soft white (2550 K), 75% brightness


    What is broken in the home ➤ room ➤ accessory pattern is that now the go-to-bed
    scene includes a lamp in another room (the bedside lamp in the bedroom). This
    is important whether you use scenes manually from an iOS device or as part of
    an automation. The collection of accessories in a scene doesn’t rely on the rooms
    those accessories are in. If you move the accessories from one room to another,
    the scene will still function. (You may be surprised at the results until you
    realize that the lamp on the coffee table used to be on the bedside table.)'
