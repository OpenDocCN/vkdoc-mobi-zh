- fmt: '### Scenes Can Be Automated and Respond to Siri


    Another important aspect of scenes is that each scene has a name, and `Siri` recognizes
    those names. Thus, scenes are critically important for automation (described in
    the final chapter of the book) as well as for `Siri`. If you want to move beyond
    building a complex replacement for a light switch that costs less than a dollar,
    having automation and voice recognition tools is key.


    ### Scenes Are Instantaneous


    There’s one final aspect of scenes to consider: they are instantaneous. This doesn’t
    mean that they are activated immediately when you tap a scene button or get to
    the time a trigger is set to function: it takes time for messages to be sent over
    the network. Rather, it’s important to note that a scene describes accessories
    and their settings at a single point in time. If you manually turn a light that
    is part of a scene on or off, it will remain on or off until the next scene that
    involves it is activated. A by-product of this is the fact that if you want lights
    to be on for a period of time (or a door to be locked or unlocked for a period
    of time), you will need two scenes: one to turn it on/lock it and another to turn
    it off/unlock it.


    Because each scene is independent, if you construct a scene to turn on several
    lights, you must construct another scene (or use `Siri` or iPad controls) to turn
    off the lights.


    ## Working with Scenes


    To start working with scenes, take a look at your home screen in the `Home` app
    as shown in Figure [3-1](#A367674_1_En_3_Chapter.html#Fig1).


    ![A367674_1_En_3_Fig1_HTML.jpg](A367674_1_En_3_Fig1_HTML.jpg)


    Figure 3-1. See scenes on the home screen


    This screen provides a summary of your home. Your favorite scenes are shown here.
    This is an excellent place to put scenes that involve several rooms: you just
    mark them as favorites.


    ### Creating a Scene


    From the home screen, use the `+` in the top right to add a scene as you see in
    Figure [3-1](#A367674_1_En_3_Chapter.html#Fig1).


    `HomeKit` has several predefined scenes, as you will see after you tap `Add Scene`
    (shown in Figure [3-2](#A367674_1_En_3_Chapter.html#Fig2)).


    ![A367674_1_En_3_Fig2_HTML.jpg](A367674_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. Create a new scene


    These scenes have names that should get you started thinking. They are not predefined
    beyond their names because they have to use your accessories. You can create your
    own scene by tapping `Custom`. If you create a custom scene, you can name it as
    in the alert shown in Figure [3-3](#A367674_1_En_3_Chapter.html#Fig3).


    ![A367674_1_En_3_Fig3_HTML.jpg](A367674_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. Name a scene


    ### Adding Accessories


    After you name a scene, you can add accessories to it as you see in Figure [3-4](#A367674_1_En_3_Chapter.html#Fig4).
    (You can always come back later to rename it and add or remove accessories.)


    ![A367674_1_En_3_Fig4_HTML.jpg](A367674_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. Add accessories


    You’ll see your rooms and their accessories as shown in Figure [3-4](#A367674_1_En_3_Chapter.html#Fig4).
    You can add any accessory by tapping the circle at the top right. You can also
    add all the accessories in a room by tapping `Add All`. Figure [3-5](#A367674_1_En_3_Chapter.html#Fig5)
    shows all of the accessories added in that way for the dining room. Note that
    `Add All` for the dining room is now changed to `Remove All`.


    ![A367674_1_En_3_Fig5_HTML.jpg](A367674_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. Add a room’s accessories


    As you see in Figure [3-6](#A367674_1_En_3_Chapter.html#Fig6), you can also add
    or remove individual accessories in a room just by tapping that round circle in
    the top right of the accessory.


    ![A367674_1_En_3_Fig6_HTML.jpg](A367674_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. Add or remove individual accessories


    Tap `Done` at the top right to finish adding or removing accessories.


    ### Adjusting Accessories


    When you tap `Done`, you’re back to the basic scene description as shown in Figure
    [3-7](#A367674_1_En_3_Chapter.html#Fig7). You can rename it here, but what’s important
    is that you can now adjust your accessories and test the scene.


    ![A367674_1_En_3_Fig7_HTML.jpg](A367674_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. Adjust your scene and accessories


    Tip: At least while you’re testing, add the scene to Favorites on the home page
    as you can see in Figure [3-7](#A367674_1_En_3_Chapter.html#Fig7).


    To adjust an accessory, tap and hold it to open the detail view shown in Figure
    [3-8](#A367674_1_En_3_Chapter.html#Fig8). Remember that this view will be different
    depending on the type of accessory you are dealing with. Figure [3-8](#A367674_1_En_3_Chapter.html#Fig8)
    shows a light bulb detail view. You can slide the divider on the bulb up or down
    to adjust the brightness.


    ![A367674_1_En_3_Fig8_HTML.jpg](A367674_1_En_3_Fig8_HTML.jpg)


    Figure 3-8. Adjust an accessory


    ### Finishing Up


    When you’re finished, you can see your new scene on the home screen (at least
    you can if you added it as a favorite as shown in Figure [3-7](#A367674_1_En_3_Chapter.html#Fig7)).
    Figure [3-9](#A367674_1_En_3_Chapter.html#Fig9) shows the home screen now.


    ![A367674_1_En_3_Fig9_HTML.jpg](A367674_1_En_3_Fig9_HTML.jpg)


    Figure 3-9. New scene on the home screen


    ### Editing Your Scene


    Tap and hold a scene on the home screen (or on a room screen — the room screen
    shows all scenes for that room). When you lift your finger after the hold, you’ll
    see the scene as shown in Figure [3-10](#A367674_1_En_3_Chapter.html#Fig10). Tap
    `Details` at the bottom of the screen to edit it.


    ![A367674_1_En_3_Fig10_HTML.jpg](A367674_1_En_3_Fig10_HTML.jpg)


    Figure 3-10. Start to edit the scene


    As you see in Figure [3-11](#A367674_1_En_3_Chapter.html#Fig11), you’re back to
    being able to edit the scene. If you made it a favorite just for testing, you
    can turn that off here.


    ![A367674_1_En_3_Fig11_HTML.jpg](A367674_1_En_3_Fig11_HTML.jpg)


    Figure 3-11. Edit the scene


    You can delete a scene from here as well. If you do, you’ll need to confirm it
    as you see in Figure [3-12](#A367674_1_En_3_Chapter.html#Fig12).


    ![A367674_1_En_3_Fig12_HTML.jpg](A367674_1_En_3_Fig12_HTML.jpg)


    Figure 3-12. Delete a scene


    It’s important to remember that scenes build on the accessories in your home,
    but they do not modify those accessories. This means that you can delete a scene
    without disturbing anything else. (If the scene is used in an automation, you
    will upset the automation, of course, but you won’t affect the accessories themselves.)


    # 4. Exploring Your Development Environment


    For almost every `HomeKit` developer, getting started means setting up a new environment
    and, in some cases, a new way of working. If you’re a developer who’s familiar
    with `iOS`, you’re well on your way to `HomeKit`... as long as your familiarity
    includes the most recent version or two of `iOS`. Lots of things have changed
    in the decade (barely) since `iOS` emerged from `iPhone OS` (which in turn only
    emerged from `NeXTSTEP` and `OpenStep` after Apple bought `NeXT` in 1997).


    As a `HomeKit` developer, you need to become familiar with `HomeKit` itself in
    addition to `iOS`. And just to keep you on your toes, you’ll need to start using
    the latest version of `Xcode`, the integrated development environment (`IDE`)
    for `iOS` and Mac apps.


    You may need to explore a new programming language (`Swift`), and, perhaps, you’ll
    need to become familiar with event-driven programming. This may seem like a tall
    order, but, in fact, these are common aspects of today’s development environments,
    and whether you’re developing for `HomeKit` or another modern `API` (application
    program interface) (even one on other platforms), you’ll probably need to know
    at least some of these things.


    So let’s get started.'
