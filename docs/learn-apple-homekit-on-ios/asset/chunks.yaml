- fmt: "### HomeKit Hubs\n\nNow that we know what to call these things (accessories),\
    \ it’s time to move on to see how they can be integrated into HomeKit. Within\
    \ the home, you have at least one hub. A hub can be an iPad or an Apple TV. It\
    \ should remain in the home and be powered on at all times. The hub can communicate\
    \ over the Internet so that remote users can get to it and manage the HomeKit\
    \ home. If there is more than one hub in the home, they can communicate with one\
    \ another as well as with the Internet.\n\nWithin the home, an accessory communicates\
    \ using Bluetooth LE (low energy) or the WiFi network. Hubs are often referred\
    \ to as remote access devices in HomeKit documentation.\n\n**Tip**  \nSee “Setting\
    \ Up Hubs” in Chapter [9](#A367674_1_En_9_Chapter.html), “Working with iCloud\
    \ and Users with HomeKit” to see how to set up an Apple TV or iPad as a HomeKit\
    \ hub that never sleeps. The display can sleep, but the device and its network\
    \ connection needs to always be available to HomeKit. If you have a TV connected\
    \ to your Apple TV, it can go to sleep or even be powered off: It is the Apple\
    \ TV device itself that must remain awake and reachable.\n\n### The Basic HomeKit\
    \ Home\n\nThe most basic HomeKit home consists of a hub (typically an Apple TV)\
    \ and one accessory (perhaps a HomeKit-compatible switch with a lamp plugged into\
    \ it or a lamp plugged into the wall socket but with a HomeKit-enabled bulb in\
    \ it). You also need an iOS device (iPhone, iPad, or iPod Touch) to configure\
    \ your home.\n\n**Tip**  \nYour accessory (e.g., your lamp), needs to be turned\
    \ on in the old-fashioned way with its switch. Once it is turned on, you can use\
    \ HomeKit to adjust it or turn it off, but, particularly with light bulbs, make\
    \ certain that you've got them powered on before you use HomeKit to adjust them.\n\
    \n### Extending HomeKit\n\nThere are several basic ways to move beyond the bare-bones\
    \ HomeKit:\n\n*   You can add `Accessory`, `Home`, `Room`, and `Scene` HomeKit\
    \ objects.\n*   You can add more HomeKit hub devices—such as another iPad, but\
    \ start small to get one hub and one device working.\n*   **Bridges**: some home\
    \ automation products such as Philips Hue bulbs require an intermediate connection\
    \ to their own bridge. The bulb or other device is connected to the bridge and\
    \ it communicates with its own protocols. The bridge is connected to HomeKit using\
    \ a HomeKit protocol. Devices such as Hue bulbs are controlled by HomeKit through\
    \ the bridge, but they do not communicate directly with HomeKit. You don’t have\
    \ to worry about this once it’s set up because when you work with HomeKit, you\
    \ see Hue bulbs just as you see other bulbs: you no longer worry about the bridge\
    \ (as long as it remains plugged in!).\n\n## Summary\n\nThe basic architecture\
    \ of HomeKit focuses on hardware—the iOS devices you use to control HomeKit as\
    \ well as the accessories such as lamps, door locks, motion sensors, and window\
    \ shades. There’s another side to HomeKit: the software.\n\nYou don’t need to\
    \ be a software engineer to know how to put a HomeKit installation together. You\
    \ need a basic understanding of your accessories and what they can do, but that\
    \ is probably knowledge that you already have. (Remember, we’re talking about\
    \ light bulbs and lamps, door locks, and other devices that have been around for\
    \ decades (centuries in the case of door locks).\n\nPerhaps the most important\
    \ thing to remember about HomeKit software is that users never interact with HomeKit\
    \ itself (the exception to this is to reset all of HomeKit). Users use apps that\
    \ typically are designed to work with a single accessory or group of accessories\
    \ from the same source. In addition to the accessory-specific information, users\
    \ see HomeKit information (rooms, homes, and scenes). They expect to be able set\
    \ up a home as well as users; they also need to be able to set up scenes that\
    \ combine a number of accessories.\n\nEach HomeKit appliance app thus provides\
    \ an entry into the overall HomeKit environment. With this high-level view of\
    \ the HomeKit architecture, it’s time to focus on specifics.\n\n# 2. Exploring\
    \ the HomeKit World\n\nStarting with iOS 10 (released in the fall of 2016), HomeKit\
    \ has an app for users to use to control their HomeKit world. Over the years since\
    \ its announcement in 2014, Apple has been building out the HomeKit infrastructure—the\
    \ application program interfaces (APIs) that developers use, the terminology that\
    \ is shared among HomeKit developers and users (homes, rooms, scenes, and appliances),\
    \ the third-party HomeKit-enabled products, and, most important, the ideas of\
    \ how HomeKit can fit into the real world with real people in it. These various\
    \ tracks (API, third-party products, terminology, and awareness) come together\
    \ in the Home app.\n\nAfter you have iOS 10 installed (either by buying a new\
    \ device equipped with it or downloading it from the App Store), you’ll find it\
    \ on your Home screen as shown in Figure [2-1](#A367674_1_En_2_Chapter.html#Fig1).\n\
    \n![A367674_1_En_2_Fig1_HTML.jpg](A367674_1_En_2_Fig1_HTML.jpg)\n\nFigure 2-1.\
    \ Home app on the Home screen\n\nAs you’ll see in this chapter, with the Home\
    \ app, you’re on your way.\n\n## Configuring Your HomeKit Environment\n\n`Home`\
    \ provides you with the centralized controls for HomeKit—your home, its rooms,\
    \ and your accessories (devices like garage doors and lights). Your home as well\
    \ as all of your accessories are controlled from one or more centralized devices\
    \ that are always connected to power and to the Internet. Those devices are called\
    \ `Home Hubs`. One of them is often an Apple TV; you can also use an iPad that\
    \ is available in your house. Whichever device you use (or both if you use both),\
    \ HomeKit makes two assumptions.\n\nThe first assumption is that the Apple TV\
    \ or iPad is always powered on and is awake (you’ll see how to keep your Apple\
    \ TV awake with the settings shown at the end of this chapter). Typically, that’s\
    \ from a direct connection to power (an outlet in lay parlance). In the case of\
    \ an iPad, it can be the battery. In the cases of both Apple TV and iPad, you\
    \ may be running on battery power that the device itself doesn’t know about. This\
    \ is the case, for example, if you have your own power backup system that kicks\
    \ in when power from the grid isn’t available. These backup devices (usually generators\
    \ or battery-powered) are becoming more widely available and their prices are\
    \ coming down. The devices that are plugged in to them, often have no way of knowing\
    \ if the power is coming from the grid (through a wall outlet) or from the generator\
    \ or backup system.\n\nNo matter your details, HomeKit assumes always-on power\
    \ so that timers can run all the time.\n\nThe second assumption is that your Apple\
    \ TV and/or iPad will always have an Internet connection. There is some link between\
    \ power and Internet—if your power goes down, your Internet connection may also\
    \ be lost.\n\nIt’s wise to have automatic precautions for your power and Internet\
    \ to continue functioning in the case of outages, and modern devices rely on that\
    \ happening—that is, they rely on your environment providing whatever contingency\
    \ planning is necessary to having continuous power and Internet.\n\nNow it’s on\
    \ to more specific requirements for HomeKit."
  raw: '### HomeKit Hubs


    Now that we know what to call these things (accessories), it’s time to move on
    to see how they can be integrated into HomeKit. Within the home, you have at least
    one hub. A hub can be an iPad or an Apple TV. It should remain in the home and
    be powered on at all times. The hub can communicate over the Internet so that
    remote users can get to it and manage the HomeKit home. If there is more than
    one hub in the home, they can communicate with one another as well as with the
    Internet.


    Within the home, an accessory communicates using Bluetooth LE (low energy) or
    the WiFi network. Hubs are often referred to as remote access devices in HomeKit
    documentation.


    Tip


    See “Setting Up Hubs” in Chapter [9](#A367674_1_En_9_Chapter.html), “Working with
    iCloud and Users with HomeKit” to see how to set up an Apple TV or iPad as a HomeKit
    hub that never sleeps. The display can sleep, but the device and its network connection
    needs to always be available to HomeKit. If you have a TV connected to your Apple
    TV, it can go to sleep or even be powered off: It is the Apple TV device itself
    that must remain awake and reachable.


    ### The Basic HomeKit Home


    The most basic HomeKit home consists of a hub (typically an Apple TV) and one
    accessory (perhaps a HomeKit-compatible switch with a lamp plugged into it or
    a lamp plugged into the wall socket but with a HomeKit-enabled bulb in it). You
    also need an iOS device (iPhone, iPad, or iPod Touch) to configure your home.


    Tip


    Your accessory (e.g., your lamp), needs to be turned on in the old-fashioned way
    with its switch. Once it is turned on, you can use HomeKit to adjust it or turn
    it off, but, particularly with light bulbs, make certain that you''ve got them
    powered on before you use HomeKit to adjust them.


    ### Extending HomeKit


    There are several basic ways to move beyond the bare-bones HomeKit :


    *   You can add Accessory, Home, Room, and Scene HomeKit objects

    *   You can add more HomeKit hub devices—such as another iPad, but start small
    to get one hub and one device working .

    *   Bridges: some home automation products such as Philips Hue bulbs require an
    intermediate connection to their own bridge. The bulb or other device is connected
    to the bridge and it communicates with its own protocols. The bridge is connected
    to HomeKit using a HomeKit protocol. Devices such as Hue bulbs are controlled
    by HomeKit through the bridge, but they do not communicate directly with HomeKit.
    You don’t have to worry about this once it’s set up because when you work with
    HomeKit, you see Hue bulbs just as you see other bulbs: you no longer worry about
    the bridge (as long as it remains plugged in!).


    ## Summary


    The basic architecture of HomeKit focuses on hardware—the iOS devices you use
    to control HomeKit as well as the accessories such as lamps, door locks, motion
    sensors, and window shades. There’s another side to HomeKit: the software.


    You don’t need to be a software engineer to know how to put a HomeKit installation
    together. You need a basic understanding of your accessories and what they can
    do, but that is probably knowledge that you already have. (Remember, we’re talking
    about light bulbs and lamps, door locks, and other devices that have been around
    for decades (centuries in the case of door locks).


    Perhaps the most important thing to remember about HomeKit software is that users
    never interact with HomeKit itself (the exception to this is to reset all of HomeKit).
    Users use apps that typically are designed to work with a single accessory or
    group of accessories from the same source. In addition to the accessory-specific
    information, users see HomeKit information (rooms, homes, and scenes). They expect
    to be able set up a home as well as users; they also need to be able to set up
    scenes that combine a number of accessories.


    Each HomeKit appliance app thus provides an entry into the overall HomeKit environment.
    With this high-level view of the HomeKit architecture, it’s time to focus on specifics.


    # 2. Exploring the HomeKit World


    Starting with iOS 10 (released in the fall of 2016), HomeKit has an app for users
    to use to control their HomeKit world. Over the years since its announcement in
    2014, Apple has been building out the HomeKit infrastructure—the application program
    interfaces (APIs) that developers use, the terminology that is shared among HomeKit
    developers and users (homes, rooms, scenes, and appliances), the third-party HomeKit-enabled
    products, and, most important, the ideas of how HomeKit can fit into the real
    world with real people in it. These various tracks (API, third-party products,
    terminology, and awareness) come together in the Home app.


    After you have iOS 10 installed (either by buying a new device equipped with it
    or downloading it from the App Store), you’ll find it on your Home screen as shown
    in Figure [2-1](#A367674_1_En_2_Chapter.html#Fig1).


    ![A367674_1_En_2_Fig1_HTML.jpg](A367674_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Home app on the Home screen


    As you’ll see in this chapter, with the Home app, you’re on your way.


    ## Configuring Your HomeKit Environment


    Home provides you with the centralized controls for HomeKit—your home, its rooms,
    and your accessories (devices like garage doors and lights). Your home as well
    as all of your accessories are controlled from one or more centralized devices
    that are always connected to power and to the Internet. Those devices are called
    Home Hubs . One of them is often an Apple TV; you can also use an iPad that is
    available in your house. Whichever device you use (or both if you use both), HomeKit
    makes two assumptions.


    The first assumption is that the Apple TV or iPad is always powered on and is
    awake (you’ll see how to keep your Apple TV awake with the settings shown at the
    end of this chapter). Typically, that’s from a direct connection to power (an
    outlet in lay parlance). In the case of an iPad, it can be the battery. In the
    cases of both Apple TV and iPad, you may be running on battery power that the
    device itself doesn’t know about. This is the case, for example, if you have your
    own power backup system that kicks in when power from the grid isn’t available.
    These backup devices (usually generators or battery-powered) are becoming more
    widely available and their prices are coming down. The devices that are plugged
    in to them, often have no way of knowing if the power is coming from the grid
    (through a wall outlet) or from the generator or backup system.


    No matter your details, HomeKit assumes always-on power so that timers can run
    all the time.


    The second assumption is that your Apple TV and/or iPad will always have an Internet
    connection. There is some link between power and Internet—if your power goes down,
    your Internet connection may also be lost.


    It’s wise to have automatic precautions for your power and Internet to continue
    functioning in the case of outages, and modern devices rely on that happening—that
    is, they rely on your environment providing whatever contingency planning is necessary
    to having continuous power and Internet.


    Now it’s on to more specific requirements for HomeKit.'
  trans: "\n### HomeKit 中枢\n\n既然我们已经知道了如何称呼这些设备（配件），接下来要探讨它们如何集成到 HomeKit 中。在家庭环境中，你至少拥有一个中枢。中枢可以是\
    \ iPad 或 Apple TV。它需要始终留在家里并保持通电状态。中枢可以通过互联网进行通信，以便远程用户可以访问它并管理 HomeKit 家庭。如果家里有多个中枢，它们之间可以相互通信，也可以与互联网通信。\n\
    \n在家中，配件通过蓝牙低功耗（Bluetooth LE）或 WiFi 网络进行通信。在 HomeKit 文档中，中枢通常被称为远程访问设备。\n\n**提示**\
    \  \n请参阅第 9 章“使用 iCloud 和用户管理 HomeKit”中的“设置中枢”一节，了解如何将 Apple TV 或 iPad 设置为永不休眠的\
    \ HomeKit 中枢。显示屏可以休眠，但设备和其网络连接必须始终对 HomeKit 可用。如果你的 Apple TV 连接了电视，电视可以休眠甚至关机：真正需要保持唤醒和可访问状态的是\
    \ Apple TV 设备本身。\n\n### 基础 HomeKit 家庭\n\n最基本的 HomeKit 家庭由一个中枢（通常是 Apple TV）和一个配件（可能是一个兼容\
    \ HomeKit 的开关，上面插着一盏灯；或者是一盏插在墙插上但使用了支持 HomeKit 的灯泡的灯）组成。你还需要一台 iOS 设备（iPhone、iPad\
    \ 或 iPod Touch）来配置你的家庭。\n\n**提示**  \n你的配件（例如你的灯）需要以传统方式通过其开关打开电源。一旦打开，你就可以使用 HomeKit\
    \ 来调节它或将其关闭，但对于灯泡尤其要注意，在使用 HomeKit 调节它们之前，请确保它们已经通电。\n\n### 扩展 HomeKit\n\n要超越最基本的\
    \ HomeKit 配置，有几种基本方法：\n\n*   你可以添加 `Accessory`、`Home`、`Room` 和 `Scene` 等 HomeKit\
    \ 对象。\n*   你可以添加更多 HomeKit 中枢设备——例如另一台 iPad，但建议从小处着手，先让一个中枢和一个设备正常工作。\n*   **桥接器**：某些家庭自动化产品，如\
    \ Philips Hue 灯泡，需要中间连接到它们自己的桥接器。灯泡或其他设备连接到桥接器，并使用其自有协议进行通信。桥接器则通过 HomeKit 协议连接到\
    \ HomeKit。像 Hue 灯泡这样的设备由 HomeKit 通过桥接器控制，但它们不直接与 HomeKit 通信。一旦设置完成，你无需担心这一点，因为当你使用\
    \ HomeKit 时，你会像看待其他灯泡一样看待 Hue 灯泡：你不再需要关心桥接器（只要它保持插电状态！）。\n\n## 总结\n\nHomeKit 的基本架构侧重于硬件——你用来控制\
    \ HomeKit 的 iOS 设备，以及诸如灯具、门锁、运动传感器和百叶窗等配件。HomeKit 还有另一面：软件。\n\n你不需要成为软件工程师也能知道如何搭建一个\
    \ HomeKit 系统。你需要对配件及其功能有基本的了解，但这可能是你已经掌握的知识。（请记住，我们谈论的是灯泡、灯具、门锁以及其他已经存在了数十年（门锁甚至存在了几个世纪）的设备。）\n\
    \n关于 HomeKit 软件，最重要的一点可能是用户从不直接与 HomeKit 本身交互（重置所有 HomeKit 设置是个例外）。用户使用的应用程序通常设计用于控制来自同一厂商的单个配件或一组配件。除了特定于配件的详细信息外，用户还能看到\
    \ HomeKit 信息（房间、家庭和场景）。他们期望能够设置家庭和用户；也需要能够设置组合了多个配件的场景。\n\n因此，每个 HomeKit 家电应用都提供了一个进入整个\
    \ HomeKit 环境的入口。有了对 HomeKit 架构的这种高层理解，现在可以专注于具体细节了。\n\n# 2. 探索 HomeKit 世界\n\n\
    从 iOS 10（2016 年秋季发布）开始，HomeKit 有了一个供用户控制其 HomeKit 世界的应用程序。自 2014 年宣布以来的几年里，苹果一直在构建\
    \ HomeKit 的基础设施——开发者使用的应用程序编程接口（API）、HomeKit 开发者和用户共享的术语（家庭、房间、场景和电器）、第三方支持 HomeKit\
    \ 的产品，以及最重要的，即 HomeKit 如何融入普通人所在的现实世界的理念。这些不同的线索（API、第三方产品、术语和认知）在“家庭”应用中汇聚在一起。\n\
    \n在安装了 iOS 10 之后（无论是通过购买预装该系统的新设备，还是从 App Store 下载），你会像图 2-1 所示在主屏幕上找到它。\n\n![A367674_1_En_2_Fig1_HTML.jpg](img/A367674_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1. 主屏幕上的“家庭”应用\n\n正如你将在本章中看到的，有了“家庭”应用，你就上路了。\n\n## 配置你的 HomeKit 环境\n\n\
    `家庭` 为你提供了 HomeKit 的集中控制——你的家庭、其中的房间以及你的配件（如车库门和灯等设备）。你的家庭以及所有配件都由一个或多个始终连接电源和互联网的集中设备控制。这些设备被称为\
    \ `家庭中枢`。其中之一通常是 Apple TV；你也可以使用家里的 iPad。无论你使用哪个设备（或两者都使用），HomeKit 都基于两个假设。\n\n\
    第一个假设是 Apple TV 或 iPad 始终通电并保持唤醒状态（你将看到如何使用本章末尾显示的设置来保持 Apple TV 唤醒）。通常，这依赖于直接连接电源（通俗地说就是插座）。对于\
    \ iPad，可能依赖于电池。对于 Apple TV 和 iPad，你可能在设备本身并不知晓的电池电源上运行。例如，如果你有自己的备用电源系统，当电网电源不可用时，它会自动启动。这些备用设备（通常是发电机或电池供电）正变得越来越普及，价格也在下降。插入这些设备的设备通常无法知道电源是来自电网（通过墙壁插座）还是来自发电机或备用系统。\n\
    \n无论你的具体情况如何，HomeKit 都假设设备始终通电，以便计时器可以全天候运行。\n\n第二个假设是你的 Apple TV 和/或 iPad 将始终有互联网连接。电源和互联网之间存在某种关联——如果你的电源中断，你的互联网连接也可能会丢失。\n\
    \n明智的做法是为你的电源和互联网设置自动预防措施，使其在中断时能继续运行，而现代设备也依赖于这种情况的发生——也就是说，它们依赖于你的环境提供必要的应急规划，以确保持续的电源和互联网连接。\n\
    \n现在来看 HomeKit 更具体的要求。\n"
- fmt: "# Starting from an Apple ID\n\nYou need an Apple ID for Home. An Apple ID\
    \ uniquely identifies you, and it is normally linked to a valid credit card. (You\
    \ can work around the credit card link in some cases—see [`https://appleid.apple.com/us`](https://appleid.apple.com/us)\
    \ for more details. (Note that the URL (uniform resource locator) provided here\
    \ is for the United States. Log on to `apple.com` in your home country and search\
    \ on `Apple ID` to find your localized information.)\n\nWhen you create your Home\
    \ in Home, it’s yours—that is, it is identified with your Apple ID. Within Home,\
    \ you can create multiple homes, rooms, and accessories, but they’re all part\
    \ of your home that’s linked to your Apple ID.\n\nMany people have more than one\
    \ Apple ID. Sometimes it happens by accident over time, particularly as Apple\
    \ ID has evolved. Other times it’s deliberate, as is the case for developers and\
    \ authors who must have separate Apple IDs for the accounts they use to manage\
    \ their apps and their iBooks.\n\nYou can use Family Sharing to share a single\
    \ Apple ID among several other family members, each of whom has an Apple ID. Family\
    \ Sharing is designed largely for kids so that the single organizer (an adult\
    \ who’s a parent or guardian) gets the bill for everyone. This allows kids under\
    \ 13 to have their own Apple IDs and to purchase—with permission—from the family\
    \ account.\n\nYou have at least one Apple ID already if you have bought anything\
    \ from iTunes or the App stores. In almost all cases, it’s best to use an existing\
    \ Apple ID for Home. If you start creating new Apple IDs for each use, you may\
    \ wind up with a bit of a mess.\n\nOnce you have your Apple ID and Home installed\
    \ on your Apple TV or an iPad, you’re ready to go.\n\n## Quick Start with iPad\n\
    \nIf you want to jump right in, here’s how you can get started with Home on iPad.\
    \ Once you’ve installed iOS 10 (or purchased an iPad with it preloaded), just\
    \ tap Home as shown previously in Figure [2-1](#A367674_1_En_2_Chapter.html#Fig1).\n\
    \n**Caution**\n\nThis is what you see the first time. If you’ve ever launched\
    \ Home before, you won’t see these steps: Don’t worry! Everything that’s shown\
    \ here and that matters is also described in the section “Managing Home Settings.”\n\
    \nAfter you’ve tapped Home for the first time, here’s what you see and what you\
    \ do:\n\n1.  The screen shown in Figure [2-2](#A367674_1_En_2_Chapter.html#Fig2)\
    \ is your first-time introduction. All you have to do is tap `Get Started`.\n\n\
    \    ![A367674_1_En_2_Fig2_HTML.jpg](A367674_1_En_2_Fig2_HTML.jpg)\n    \n   \
    \ Figure 2-2. Get started\n\n2.  The first time you use Home, you’ll be prompted\
    \ to allow access to location while the app is in use, as shown in Figure [2-3](#A367674_1_En_2_Chapter.html#Fig3).\
    \ You can use some parts of HomeKit without using Location Services, but many\
    \ features rely on your location, so you’ll severely limit its usability if you\
    \ tap `Don’t Allow`. So do tap `Allow`. (See the Tip later on how to reset this.)\n\
    \n    ![A367674_1_En_2_Fig3_HTML.jpg](A367674_1_En_2_Fig3_HTML.jpg)\n    \n  \
    \  Figure 2-3. Allow access to location\n\n3.  Once you’ve managed Location Services,\
    \ you’re in as shown in Figure [2-4](#A367674_1_En_2_Chapter.html#Fig4).\n\n \
    \   ![A367674_1_En_2_Fig4_HTML.jpg](A367674_1_En_2_Fig4_HTML.jpg)\n    \n    Figure\
    \ 2-4. Start to use Home\n\nYou can explore Home at this point, but if you can\
    \ resist the temptation to jump right in, Chapter [3](#A367674_1_En_3_Chapter.html)\
    \ will take you on a guided tour. Here’s one preview to whet your appetite (and\
    \ it will help you navigate in Home). At the bottom of the screen shown in Figure\
    \ [2-4](#A367674_1_En_2_Chapter.html#Fig4), note the tab bar with two tabs: Home\
    \ and Automation. Tap Automation to get a preview of what’s in store as shown\
    \ in Figure [2-5](#A367674_1_En_2_Chapter.html#Fig5).\n\n![A367674_1_En_2_Fig5_HTML.jpg](A367674_1_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5. Get a preview of automation in Home\n\nYou can always switch from\
    \ one area of Home to another using the tab bar at the bottom.\n\n## Managing\
    \ Home Settings\n\nAs with most iOS apps, you can manage settings for your apps\
    \ using Settings from the Home screen. Some settings are set here, and others\
    \ are set inside the app itself. Settings typically manages the most general settings\
    \ as well as settings that can (sometimes must) be set outside the app.\n\n**Tip**\n\
    \nAn example of in-app settings compared to Settings app settings is often iCloud\
    \ use. When you first run an iCloud-enabled app, you are typically asked if you\
    \ want to use iCloud. If you later want to change that decision, you make the\
    \ decision in Settings rather than in the app. This structure enables the app\
    \ to make the necessary internal adjustments when you turn iCloud on or off for\
    \ the app. Doing it in this way means that the actual work of switching to or\
    \ from iCloud can be done behind the scenes rather than inside the app. It also\
    \ means that you can make the change to or from iCloud when the app isn’t even\
    \ running.\n\n1.  On your iPad, tap `Settings` and select `Home` from the list\
    \ of built-in apps as shown in Figure [2-6](#A367674_1_En_2_Chapter.html#Fig6).\n\
    \n    ![A367674_1_En_2_Fig6_HTML.jpg](A367674_1_En_2_Fig6_HTML.jpg)\n    \n  \
    \  Figure 2-6. Select Home in Settings\n    \n    You will probably want to use\
    \ iCloud for HomeKit at some time in the future, so you might as well turn it\
    \ on here. Remember, that you need an Apple ID for iCloud. That should be the\
    \ same Apple ID you’re using with HomeKit.\n\n2.  You also can use this opportunity\
    \ to designate the device you’re using (an iPad or Apple TV) as Home Hub, remember\
    \ you can have more than one.\n\n3.  You start with a single Home as you see in\
    \ Figure [2-6](#A367674_1_En_2_Chapter.html#Fig6).\n\n4.  You can tap the disclosure\
    \ triangle to configure it further as shown in Figure [2-7](#A367674_1_En_2_Chapter.html#Fig7).\n\
    \n    ![A367674_1_En_2_Fig7_HTML.jpg](A367674_1_En_2_Fig7_HTML.jpg)\n    \n  \
    \  Figure 2-7. Configure a Home\n\n5.  Note that you will always have the option\
    \ to completely start over using the button shown at the bottom of Figure [2-6](#A367674_1_En_2_Chapter.html#Fig6).\
    \ It opens the alert shown in Figure [2-8](#A367674_1_En_2_Chapter.html#Fig8).\n\
    \n    ![A367674_1_En_2_Fig8_HTML.jpg](A367674_1_En_2_Fig8_HTML.jpg)\n    \n  \
    \  Figure 2-8. You can always reset Home\n\n**Caution**\n\nThis is the way to\
    \ reset Home. You can achieve a similar result by removing Home from your device.\
    \ As is the case with removing any app, you’ll remove its data. That is a brute-force\
    \ way of resetting Home, and it is definitely not recommended.\n\n## Moving into\
    \ Your Home\n\nWhen you launch Home after configuring Settings (if you do that\
    \ now—remember it’s optional) you may see the basic screen shown in Figure [2-9](#A367674_1_En_2_Chapter.html#Fig9).\n\
    \n![A367674_1_En_2_Fig9_HTML.jpg](A367674_1_En_2_Fig9_HTML.jpg)\n\nFigure 2-9.\
    \ Exploring your Home\n\nThis is your Home as shown in the app. What you see will\
    \ vary depending on your specific home, its rooms, and its appliances. You can\
    \ configure the background image as well as just about everything in the view.\
    \ The background image can be a photo of your home. Maybe you’d like the background\
    \ image to be the view you see from the bedroom window.\n\n**Tip**\n\nRemember,\
    \ Home (the app) can manage several homes, so the background image that you choose\
    \ for a specific home should very clearly remind you what it is. For a dorm room\
    \ at school (yes, a single room can be a Home in some cases), you might choose\
    \ a photo of a campus landmark. For your actual home (i.e., “the place where,\
    \ when you have to go there, they have to take you in,” as Robert Frost wrote),\
    \ you might choose a photo of the backyard. Why would you make these photo choices?\
    \ If your Home image shows your bed and desk covered with computer, papers, lunch\
    \ (date of lunch undetermined), and so forth, you may not be able to quickly notice\
    \ which of those photos is which place."
