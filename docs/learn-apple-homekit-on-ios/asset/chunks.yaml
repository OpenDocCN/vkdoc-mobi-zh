- fmt: '# Bringing Home Automation Home


    If you’re used to buying a product like an iPhone, taking it home, turning it
    on, and getting to work, HomeKit will be a very different experience. HomeKit
    is an integration technology that brings together your home, HomeKit-enabled accessories
    (door locks, light bulbs, sensors, and the like), and your own ideas about how
    your home should be automated.


    This chapter provides an introduction to these components and concepts so that
    you get an idea of what it means to automate your home with HomeKit as well as
    how you might go about it. Don’t worry if it seems as if there are many moving
    parts to this machine—there are, but HomeKit can help you put them together.


    Use the first chapters in this book to get a sense of what is possible. You may
    want to experiment with devices that you have as you go along, but if you haven’t
    set up a HomeKit home before (or any home automation home at all), don’t expect
    to perform a miracle right away.


    That said, HomeKit is a terrific tool to work with once you get the idea of how
    it works. That basic idea of how it works is the heart of these first few chapters.
    You may come back to them periodically, but once the proverbial light goes on
    (not your HomeKit light bulb but the light in your head), you’ll see how it works
    together and how it can—literally—change your life and your home.


    ## Welcome Home


    Projects at Apple (and everywhere else in the technology world) don’t happen overnight.
    Often, they take shape gradually as engineers and users experiment with new ideas
    and technologies. Many times, a new product’s evolution is dependent on one, more,
    or many outside factors. (Just think of how many technologies went into the first
    iPhone). HomeKit is a project that brings together a number of technologies not
    all of which are under Apple’s control. The story begins in 2014, but we’ll skip
    to the critical moment at Apple’s World Wide Developers Conference (WWDC) in 2016
    when `Home App` was first shown to the public (at least that part of the public
    that comprises developers and the technology media).


    “Internet of Things” (often referred to as `IoT`) is one of those phrases that
    floats around for a while and then starts popping up everywhere as if it were
    something brand new. Before long (well, not too long), it seems as if it has always
    been with us. Apple’s HomeKit project was announced in June 2014 at Apple’s WWDC.
    Unlike announcements of Apple products, there was nothing for consumers to rush
    out and buy. What was available (to developers only) was an `API` (application
    program interface—the blueprint for code that developers would start writing to
    develop with HomeKit). There were some early devices, but not much beyond that.


    Then, HomeKit went quiet for a while.


    ## 2015: Apple Unveils New Technologies


    Although HomeKit was fairly quiet, Apple engineers and third party developers
    were busily at work.


    ### CarPlay Revs Up


    Meanwhile, in another part of Apple’s busy campus, engineers were hard at work
    on CarPlay which had first been announced a year before HomeKit at WWDC in 2013
    as `iOS in the Car`. Early implementations on some models began soon after the
    announcement. At an event in March 2015, Chief Executive Officer (CEO) Tim Cook
    announced that CarPlay would be available on vehicles from all the major manufacturers
    by the end of that year. Sure enough, as the new lines of 2016 models started
    to hit the showrooms in the fall of 2015, CarPlay was available on many of them.


    Although some of the early CarPlay implementations were on high-end cars, the
    rollout was across a wide range of vehicles as this quiet project suddenly (after
    only several years of development!) moved front and center. CarPlay lets you integrate
    your data with your car so that you can listen to your music, use Siri to update
    or query your calendar, and otherwise bring your digital life with you no matter
    where you’re traveling (provided there’s an Internet connection).


    ### Turning On Apple TV


    In yet another part of the Apple campus, engineers and designers were plugging
    away at Apple TV, turning what had been described as a “hobby” for Apple into
    a new way of thinking about television. In the announcement of Apple TV at the
    beginning of September 2015, CEO Tim Cook said, “The future of television is apps.”
    That sentence was repeated many times in the course of the presentations at that
    time. The key point is that television has been a linear medium: you turn it on
    and watch a show that has a beginning and end. For archived or recorded shows,
    you play them and watch them—perhaps from beginning to end and perhaps jumping
    around with fast forward and reverse. No matter how you watch traditional television,
    it’s a linear process.


    Apps are inherently nonlinear. You jump into an app and do what you want, and
    then you jump out to do something else that may be in another app, on another
    device, and even something unrelated such as going for a walk, having a meal,
    or discussing something with friends or colleagues.


    ### Watching the Time


    The Apple event in March 2015 at which the CarPlay announcement was made was focused
    on Apple Watch.'
