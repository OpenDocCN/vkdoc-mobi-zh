    图 7-5. 特征的单位


    #### 单位


    选择特征的单位，如图 7-6 所示。


    ![A367674_1_En_7_Fig6_HTML.jpg](img/A367674_1_En_7_Fig6_HTML.jpg)


    图 7-6. 特征的单位


    ### 配件做什么？（服务）


    使用图 7-1 底部的“添加服务...”按钮，为你的配件添加任意数量的服务。当你添加服务时，需要填写如图 7-7 所示的信息。


    ![A367674_1_En_7_Fig7_HTML.jpg](img/A367674_1_En_7_Fig7_HTML.jpg)


    图 7-7. 配置一个服务


    请注意，你可以为服务分配一个特定的 UUID（通用唯一标识符）。图 7-8 显示了服务类型的选项。


    ![A367674_1_En_7_Fig8_HTML.jpg](img/A367674_1_En_7_Fig8_HTML.jpg)


    图 7-8. 选择一个服务


    ### 查找配件状态


    以下是配件的瞬态特征，它们取决于网络和其他条件。你在 API 中而非模拟器中管理它们。模拟器提供给你基本数据，然后这些数据被修改，并且此类修改会传递给配件的委托。当你通过代码创建配件时需要设置该委托。


    以下是通常用于查询配件状态的最常用函数。你可以根据需要查询其他特定属性，但这些是状态属性。


    ```

    var isReachable: Bool

    var isBlocked: Bool

    var isBridged: Bool

    ```


    # 8. 充满想象的机会：事件、触发器和操作


    你的房屋和房间，连同其中的配件、配件特征和服务，是组织 HomeKit 资产的绝佳方式，但就其本身而言，它们实际上什么也做不了。它们只是待在那里，等待你通过
    Siri 命令或其他方式激活它们？（注意，Siri 是一个可以与你的 HomeKit 资产配合使用的界面，但它的使用更多是用户界面层面的问题，而非开发层面，因此本书不作介绍。）


    让你的 HomeKit 资产和资源活跃起来，让你的家变得“智能”的，是事件、触发器和操作这三者组合。它们不是物理设备：它们是概念或抽象，代表着你想对你的 HomeKit
    资源做什么，以及你想在什么时候做这些事情。尽管这些词代表了 HomeKit API（特别是 `HMEvent`、`HMTrigger` 和 `HMAction`）的特定方面，但它们使用的是日常含义。在本书中，当使用
    API（应用程序编程接口）名称如 `HMEvent` 时，将以特殊的字体显示。


    基本模式很简单。你定义一个事件（例如一天的特定时间或到达某个位置），然后触发器监视该事件的发生。当事件发生时，触发器启动一个操作。这就是“当我到家时，打开走廊场景”这种方式实现的原理。


    **场景在哪里？**


    场景是用户设置的，用于组合配件和设置。因此，“走廊场景”可能包括将走廊天花板灯调至特定颜色和亮度，以及打开走廊的百叶窗。场景是由用户创建的：它们基于第 6
    章和第 7 章中讨论的 API。从开发者的角度来看，场景是操作的集合：一个操作集。


    事件、操作和触发器协同工作。你可能希望快速扫描本章以了解概况，然后再回过头来关注细节。在这种情况下，一个可能只有单个灯泡的测试安装对于感受 HomeKit
    非常有帮助。在进行实验时，请记住，触发器在你设置后并非即时生效。当你打开或关闭场景时，你可以获得即时响应，但是当你将场景与事件和触发器连接时，由于 HomeKit
    需要建立设置然后执行它们，可能会存在时间延迟。用户有时需要等待一段时间（通常是一天），以便随着时间推移和日常事件的发生，检查他们的事件和触发器是否设置正确。

