    # 让家居自动化走进生活


    如果你习惯购买像 iPhone 这样的产品，带回家、开机、然后直接使用，那么 HomeKit 将带来截然不同的体验。HomeKit 是一项集成技术，它将你的家、支持
    HomeKit 的配件（如门锁、灯泡、传感器等）以及你对自己家居自动化的设想融合在一起。


    本章将介绍这些组件和概念，让你了解使用 HomeKit 实现家居自动化的意义和操作方法。如果觉得这个系统涉及太多活动部件，不用担心——确实如此，但 HomeKit
    能帮你把它们整合起来。


    先阅读本书前几章，了解可能实现的功能。你可以一边阅读一边尝试操作已有的设备，但如果你此前从未搭建过 HomeKit 家居（甚至从未接触过任何家居自动化），就不要指望立刻创造奇迹。


    话虽如此，一旦你掌握了 HomeKit 的工作原理，它就会成为一个非常出色的工具。其基本工作原理正是前几章的核心内容。你可能会时不时重温这些章节，但一旦那个众所周知的"灯泡"亮起（不是你的
    HomeKit 灯泡，而是你脑海中的灯泡），你就会明白它是如何协同工作的，以及它如何能够——毫不夸张地说——改变你的生活和家居。


    ## 欢迎回家


    苹果公司（以及科技界的其他地方）的项目都不是一夜之间完成的。通常，它们是在工程师和用户不断尝试新想法和新技术的过程中逐渐成型的。很多时候，新产品的演进依赖于一个、多个甚至许多外部因素。（想想第一代
    iPhone 融合了多少技术就知道了。）HomeKit 是一个集成了多项技术的项目，而这些技术并非全部由苹果控制。这个故事始于 2014 年，但我们将直接跳到
    2016 年苹果全球开发者大会（WWDC）的关键时刻，当时 `Home App` 首次向公众展示（至少是向由开发者和科技媒体组成的部分公众展示）。


    "物联网"（通常称为 `IoT`）是一个流行词汇，它会在某个时期内被反复提及，然后突然无处不在，仿佛是个全新的概念。但没过多久（其实也不算太久），它就好像一直伴随着我们。苹果的
    HomeKit 项目于 2014 年 6 月在苹果 WWDC 上宣布。与苹果产品发布不同，这次并没有什么消费者需要抢购的东西。当时只向开发者提供了一个 `API`（应用程序编程接口——开发者编写
    HomeKit 代码的蓝图）。虽然也有一些早期设备，但仅此而已。


    随后，HomeKit 沉寂了一段时间。


    ## 2015 年：苹果发布新技术


    尽管 HomeKit 相当低调，但苹果工程师和第三方开发者一直在忙碌工作。


    ### CarPlay 加速发展


    与此同时，在苹果繁忙园区的另一角，工程师们正在全力开发 CarPlay。该项目最初于 2013 年的 WWDC（比 HomeKit 早一年）宣布，当时名为
    `iOS in the Car`。宣布后不久，一些车型便开始初步实施。在 2015 年 3 月的一次活动中，首席执行官蒂姆·库克宣布，到当年年底，所有主要汽车制造商都将提供
    CarPlay 功能。果然，随着 2016 年新款车型在 2015 年秋季陆续进入展厅，许多车型都配备了 CarPlay。


    尽管早期的一些 CarPlay 实现出现在高端汽车上，但这项安静的工程（仅经过几年开发！）突然成为焦点，并迅速推广到各种车型。CarPlay 能将你的数据与汽车整合，让你可以听音乐、使用
    Siri 更新或查询日历，无论你旅行到何处（只要有网络连接），都能随身携带你的数字生活。


    ### 开启 Apple TV


    在苹果园区的另一个角落，工程师和设计师们正在努力开发 Apple TV，将这个曾被描述为苹果"业余爱好"的产品转变为一种全新的电视思考方式。在 2015 年
    9 月初的 Apple TV 发布会上，首席执行官蒂姆·库克表示："电视的未来在于应用。"这句话在当时的多次演讲中被反复提及。关键在于，电视传统上是一种线性媒介：你打开它，观看一个有始有终的节目。对于存档或录制的节目，你可以从头到尾播放观看，也可以使用快进和快退功能跳转观看。无论你如何观看传统电视，这都是一个线性过程。


    而应用本质上是非线性的。你进入一个应用，做你想做的事，然后跳出来做其他事情——这些事可能涉及另一个应用、另一台设备，甚至是一些完全无关的活动，比如散步、吃饭，或与朋友同事讨论某事。


    ### 关注时间


    2015 年 3 月发布 CarPlay 公告的苹果活动，其焦点实际上是 Apple Watch。

