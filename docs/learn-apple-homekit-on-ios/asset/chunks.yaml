- fmt: "## Bringing It Together\n\nYou’ve now seen the HomeKit setup process described\
    \ in terms of how you set it up. If it seems complicated, consider looking at\
    \ it in reverse, and you’ll see how the pieces fit together. Once it is set up,\
    \ here’s what will happen:\n\n1. Perform an automation action: turn lights on/off,\
    \ open a garage door, adjust a thermostat, etc.\n2. When something happens:\n\
    \    1. A time of day\n    2. Another HomeKit accessory does something\n    3.\
    \ You arrive at or leave from a place. The various steps you’ve gone through in\
    \ this chapter simply set that up. Along the way, you do have to do some setup\
    \ actions, but in most cases, you’ll reuse them many times. Following are the\
    \ main setup actions you need to perform:\n    * For location-based triggers,\
    \ make sure the address is in your Contacts. If not, add it.\n    * Keep your\
    \ iPhone with you to let location-based triggers work.\n    * Identify each accessory\
    \ you want to reference either as a trigger or to perform an action.\n       \
    \ * To identify accessories, define them in HomeKit\n        * To organize accessories,\
    \ place them in rooms.\n        * To organize accessories regardless of room,\
    \ mark them as favorites so they appear in the Home tab at the left of the bottom\
    \ toolbar.\n    * Make certain that your hub (Apple TV or iPad) is powered on\
    \ and linked to WiFi and the Internet and that it’s set not to sleep. A surge\
    \ suppressor is a good idea, but they should recover from momentary power outages.\n\
    \n# 6. Exploring the HomeKit World as a Developer, Designer, or Device Manufacturer\n\
    \nSo far in this book, you’ve looked at HomeKit from the outside, observing the\
    \ things you see and control with HomeKit. Now it’s time to look at HomeKit from\
    \ the inside out by starting with the code. The code is what interacts with the\
    \ home itself and its components, including third-party devices. Everything talks\
    \ to code, and in many ways, the code itself is the best description of the HomeKit\
    \ components. This chapter gives you an overview of the HomeKit framework with\
    \ its objects and functionality.\n\nHomeKit is a modern framework from Apple,\
    \ and it’s based on Swift. If you’re a long-time Swift developer (that means you’ve\
    \ used it for two or three years!) you’ll be right at home. If you’re new to Swift,\
    \ explore the free Swift iBook that you can download from `https://itunes.apple.com/us/book/swift-programming-language/id881256329?mt=11#`.\n\
    \nThis chapter explores the basics you’ll need to use HomeKit. It’s designed as\
    \ a reference so consider reading the first section and then coming back to the\
    \ other sections as necessary. Once you have the overview of HomeKit, it’s a lot\
    \ easier to learn the details while you’re actually trying to do something.\n\n\
    No matter what part of the HomeKit world you’re exploring, the code is the heart\
    \ of it all. The third-party opportunities for HomeKit are just being explored\
    \ now. Home is the iOS app that is built into the iOS 10 distribution. More complex\
    \ and customized versions of that app can easily be imagined. For device manufacturers,\
    \ there are obvious opportunities in building devices and configuration details\
    \ that are very specific to the device and its application. Integration of HomeKit\
    \ technology with other technologies, devices, and construction projects is still\
    \ a wide-open field.\n\nBefore you can explore these and other opportunities,\
    \ here’s the code side of HomeKit that you’ll be working with.\n\n## HomeKit Overview\n\
    \nIf you’re experienced with object-oriented programming, this section may bring\
    \ you sufficiently up to speed to use Swift with HomeKit. It’s far from a complete\
    \ tutorial on either one (`developer.apple.com` is the source for all definitive\
    \ documentation), but it can get you going. This section gives you the key features\
    \ you need to know that are different from what you may already know about object-oriented\
    \ programming in other languages.\n\n### Swift’s Object-Oriented Features for\
    \ HomeKit\n\nLike most object-oriented frameworks in any language, HomeKit consists\
    \ primarily of objects and functions. To hone in on the technology a little bit,\
    \ objects are the runtime instantiations of classes. In other words, HomeKit consists\
    \ of classes that are created at runtime as objects.\n\nFunctions are declared\
    \ either within a class or independently. (In very strict object-oriented coding,\
    \ free-standing functions are frowned upon, but you can create them.)\n\nA function\
    \ that is declared within a class is often referred to as a method.\n\nThere are\
    \ historical reasons for this terminology, but don’t worry about it.\n\nHomeKit\
    \ classes often represent physical objects (homes, rooms, accessories); they also\
    \ can represent activities or processes. This is the same as it is in many object-oriented\
    \ systems, but HomeKit is a bit more focused on physical objects than many other\
    \ systems. It shouldn’t matter to you too much."
