    \n本书中可能出现的商标名称、徽标和图片。我们未在每个商标名称、徽标或图片出现时使用商标符号，而是仅以编辑方式使用这些名称、徽标和图片，以维护商标所有者的权益，并无意侵犯商标权。\n\
    \n本出版物中使用的商品名称、商标、服务标志及类似术语，即使未明确标识，也不应被视为对其是否受专有权利保护的立场表达。\n\n尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑和出版商均不对可能出现的任何错误或疏漏承担法律责任。出版商对书中所包含的材料不作任何明示或默示的担保。\n\
    \n印刷于无酸纸上\n\n本书通过 Springer Science+Business Media New York 向全球图书贸易发行，地址：233 Spring\
    \ Street, 6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电邮：orders-ny@springer-sbm.com，或访问\
    \ www.springeronline.com。\n\nApress Media, LLC 是加利福尼亚州的一家有限责任公司，其唯一成员（所有者）为 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。\n\
    \n## 引言\n\nHomeKit 是 Apple 推出的一项全新产品。真正的新产品。它不是像 iPhone、iPad 甚至 Mac 本身那样的新设备。也不是像\
    \ Pages、Keynote 甚至 Xcode 那样的新应用——Xcode 是 Apple 及第三方开发者用来构建应用程序以及操作系统本身（macOS、iOS、tvOS，以及现在的\
    \ watchOS）的重型应用。HomeKit 本质上是一个管理家居自动化的数据管理框架。它与 Apple 的 HealthKit 同属一类，后者是另一个专注于健康领域的数据管理框架。\n\
    \n这里存在一种模式。Apple 正在将其庞大的资源投入到针对性的数据库和框架中，期望软件和硬件的第三方开发者能够围绕这些框架聚集起来。HomeKit 实际上运行在\
    \ Apple iOS 设备上绝非巧合：随着 HomeKit 生态系统的增长，越来越多的人使用它，并体会到 Apple 大多数产品所带来的便捷性。\n\n\
    HomeKit 框架旨在支持诸如灯具、门及其锁具、恒温器、传感器以及 21 世纪住宅的其他自动化组件。这个灵活而强大的框架恰好运行在 Apple 设备上，这极大地激励了\
    \ Apple 去构建它，并且以足够稳健的方式构建，以便能处理来自世界各地开发者和供应商的、目前还难以想象的设备。\n\n像 HomeKit（以及 HealthKit）这样的框架，其架构决定了只需投入相对适中的技能和时间，即可对其进行扩展和定制，以适配所有与之集成的第三方配件。这是减少庞大积压代码（这些代码需要编写才能让尽可能多的人享受现代技术的好处）的一种方式。\n\
    \n本书向您提供对 HomeKit 的两种介绍。在前几章中，您将看到如何在家中设置 HomeKit，以及如何管理家中的配件、房间和场景（这些日常用语在 HomeKit\
    \ 的词汇表中保留了其日常含义）。\n\n在本书的第二部分，您将看到如何将第一部分中通过点按操作执行的命令用代码重新实现，这样您就可以构建自己的 HomeKit\
    \ 应用程序，以新的、不同的方式组合 HomeKit 的各个组件。\n\n随着我们进入这种新型技术（框架和数据管理工具包），您可以将 HomeKit 作为入门，积累以新技术协同工作的经验。如果您对软件开发世界如何随着这些工具包而变化并不特别感兴趣，也欢迎您：您可以使用\
    \ HomeKit 来管理家中的房间、场景和配件。\n\n以这种方式管理您的家可以让生活更轻松，而且还能带来回报。决定何时使用灯光和电器，有助于您打造一个舒适的家，不仅不浪费电力，甚至可能通过利用非高峰时段的较低电价来管理用电。\n\
    \n是时候开始了。\n\n## 致谢\n\n一如既往地感谢 Waterside Productions 的 Carole Jelen。Aaron Crabtree\
    \ 再次在 Apple 技术问题方面提供了巨大帮助。在 Apress，Jessica Vakili 和 Aaron Black 为本书的出版提供了宝贵的支持。\n"
