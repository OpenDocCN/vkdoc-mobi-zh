  trans: '

    # 使用操作


    作为开发者或设计师，你通常需要处理操作，以便设置用户界面，让用户能够将它们组合起来，从而能被事件触发。当触发器被激活时，操作或操作集才会实际运行。操作可用于打开或关闭配件，或调整其特性（例如亮度或颜色）。


    > **提示：** 你可以将操作想象成一个动词——即日常用语中常用的“动作”一词。


    大多数情况下，你会用到操作集（`HMActionSet`），而操作集本身由多个操作（`HMAction`）组成。


    > **注意：** “集”在此处使用的是其技术含义，即无序的项目集合。这意味着操作集中的操作将以未指定的顺序执行。有时这些操作会按照指定的顺序执行，但这纯属偶然。在追踪明显的错误时，这一点可能非常重要。


    操作集具有名称和`UUID`。Siri 能够识别操作集的名称。你的代码可以让用户在此基础上构建他们自己的 HomeKit 环境。


    操作集由操作组成，而操作是`HMAction`的具体子类。`HMAction`是一个抽象类，这意味着你不会直接创建它的实例。你会创建诸如`HMCharacteristicWriteAction`等类的具体实例，此类用于将特定值写入配件的某个特性。以下是你将使用的方法声明：


    ```

    init(characteristic: HMCharacteristic, targetValue: TargetValueType)

    ```


    正如你在第 7 章所见，配件可以拥有特性和服务。为了找到允许用户设置操作集时使用的特定服务，你可以使用类似下面的函数来查找给定配件上的服务，该函数使用`HMAccessory`的这个属性作用于用户想要操作的特定配件：


    ```

    var services: [HMService] { get }

    ```


    如果你在写入特性时恰好没有特定配件，可以使用`HMHome`的以下方法，通过服务类型在整个家庭中查找服务：


    ```

    func servicesWithTypes(_ serviceTypes: [String]) -> [HMService]?

    ```


    请注意，此函数返回一个可选值：可能不存在特定类型的服务，你的代码必须处理这种情况。


    服务与特性相互关联，因此当你拥有一个`HMCharacteristic`时，通常也会有一个相关的服务。同样，当你拥有一个`HMService`时，可以找到其特性。


    以下是`HMCharacteristic`中可用于获取其服务的属性：


    ```

    var service: HMService?

    ```


    从`HMService`对象出发，以下是找到其配件的方法：


    ```

    var accessory: HMAccessory?

    ```


    请注意，无论从配件还是从特性出发，你都可以获取到另一个对象，但有一个非常重要的注意点：这两个属性都是可选的，因此它们可能不存在。尤其当用户正在设置他们的家庭但尚未完成相关任务时，这种情况经常发生。不要假设设置家庭的用户会处理好所有遗留问题。


    用户尝试过程中出现“孤立”场景是有合理解释的。此外，请记住，你正在处理的设备有其自身的电源和其他因素问题。尽管如今生产的灯泡寿命估计长达数年甚至更久，但它们最终还是会坏掉。如电源或墙壁插座这样的有线连接也会受制于各种线缆问题，从被拔掉到意外插在由开关控制的插座上。


    最后一点是许多人的常见问题。你经常会发现墙上插座有两个插孔，其中一个由开关控制。这意味着墙壁开关可以打开连接到受控插孔上的灯，而另一个插孔则始终保持通电，供电子钟、加湿器或其他需要一直运行的设备使用。你可能知道这一点，甚至多年后还记得，但做一次大扫除的人可能会拔掉两个插头以便移动沙发，结果你由
    HomeKit 控制的灯就可能插到受控插孔上了。


    # 在 HomeKit 中使用 iCloud 和用户


    HomeKit 会配合其发现网络工作。最基本的通信层级是在配件与你的 HomeKit 中枢（通常是一台 Apple TV 或一台 iPad，或两者兼有）之间进行的。在短距离内（例如在家中），HomeKit
    使用 WiFi 网络或蓝牙低功耗（Bluetooth LE）。


    在家以外，HomeKit 会利用能找到的任何网络，通过 Apple ID 进行通信。随着 iOS 10 及 Home App（预装在 iPad 上）的推出，HomeKit
    的可及性比以往任何时候都高。


    本章将帮助你使用 HomeKit 的部分网络功能。


    > **警告：** 你的中枢必须始终处于开机状态，HomeKit 操作才能正常工作。请记住，当你定义一个自动化来开启某个场景时（参见第 8 章），HomeKit
    会使用触发器来启动场景。如果触发器本应触发（或者确实触发了但配件未通电）之后你才给设备或中枢通电，那么直到下一次触发机会出现之前，什么都不会发生。如果触发条件是每天某个时间，那么下一次机会就是第二天。


    ## 设置中枢


    你的中枢需要始终通电，并且需要连接网络。对大多数人来说，这意味着要确保中枢本身（Apple TV 或 iPad）能够使用蓝牙和 WiFi 网络。为了实现远程访问，中枢需要连接到互联网（通常是通过
    WiFi 连接）。


    ### Apple TV


    对于 Apple TV，你需要确保已启用 HomeKit。首先，确保 Apple TV 使用与你（或将）用于 HomeKit 中枢相同的 Apple ID。（对于许多使用单个
    Apple ID 的人来说，这不是问题。）


    在你的 Apple TV 上，前往“设置”，如图 9-1 所示。


    ![A367674_1_En_9_Fig1_HTML.jpg](img/A367674_1_En_9_Fig1_HTML.jpg)


    图 9-1. 在 Apple TV 上前往“设置”


    选择“账户”来为 HomeKit 设置你的 Apple ID。如图 9-2 所示，你需要为“家庭共享”设置一个 Apple ID（这是系统设置中对于 HomeKit
    的称呼）。


    ![A367674_1_En_9_Fig2_HTML.jpg](img/A367674_1_En_9_Fig2_HTML.jpg)


    图 9-2. 设置 Apple ID 账户


    如果在将来的某个时候，你想关闭 Apple TV 的中枢功能，可以如图 9-3 所示将其关闭，图中显示正在关闭家庭共享账户。


    ![A367674_1_En_9_Fig3_HTML.jpg](img/A367674_1_En_9_Fig3_HTML.jpg)


    图 9-3. 关闭家庭共享


    ### iPad


    将 iPad 设置为中枢的过程略有不同。前往 iPad 上的“设置”，然后找到“家庭”，如图 9-4 所示。如果需要，你可以让多个 HomeKit 中枢共享同一个
    Apple ID。


    ![A367674_1_En_9_Fig4_HTML.jpg](img/A367674_1_En_9_Fig4_HTML.jpg)


    图 9-4. 将 iPad 设为 HomeKit 中枢


    ## 设置用户


    除了中枢之外，你还可以为 HomeKit 设置用户。所有与你用于设置 HomeKit 的 Apple ID 共享的用户都可以用自己的 Apple ID 登录，但你也可以邀请其他人加入。

    '
- fmt: '### Inviting Other Users


    From the `Home` tab in Home on your iPad, tap `Edit` in the top right and then
    the disclosure triangle next to the name of the home (it might be “My Home” if
    you’re using the defaults) to open the alert shown in Figure [9-5](#A367674_1_En_9_Chapter.html#Fig5).
    Note that you can do this from the same `Apple ID` as you have used for your `Apple
    TV`. Many people rely on `Apple TV` to do the back-end processing of automations,
    but they use an iPad to manage things such as adding users. You’ll see how to
    manage what users can do in the section “Setting Permissions for Users.”


    ![A367674_1_En_9_Fig5_HTML.jpg](A367674_1_En_9_Fig5_HTML.jpg)


    *Figure 9-5. Invite other users*


    Click `Invite` to open the invitation alert shown in Figure [9-6](#A367674_1_En_9_Chapter.html#Fig6).
    Type in the e-mail address you want to use for the invitation at the top.


    ![A367674_1_En_9_Fig6_HTML.jpg](A367674_1_En_9_Fig6_HTML.jpg)


    *Figure 9-6. Send the invitation*


    ### Responding to an Invitation


    You probably don’t know how your invitee will receive the invitation. It can arrive
    on an iPad or an iPhone, so here are the screens your invitee will see. You’ll
    particularly need this information if you haven’t contacted the person before
    you send the invitation. You might consider contacting the person in advance (after
    all, it’s only polite).


    ### Responding on an iPad


    If the invitee receives the invitation, it may appear on the lock screen of the
    iPad as you see in Figure [9-7](#A367674_1_En_9_Chapter.html#Fig7). (Notice that
    it comes as a notification from Home rather than a message or an e-mail. You can
    tell this from the icon on the notification.)


    ![A367674_1_En_9_Fig7_HTML.jpg](A367674_1_En_9_Fig7_HTML.jpg)


    *Figure 9-7. The user receives the invitation*


    If the user receives the invitation on an iPad, here’s what it looks like once
    the notification of the invitation is unlocked. In the invitee’s `Settings`, the
    invitation is shown in the `Follow Ups` section (you may never have seen that
    before because these invitations haven’t been used much until now). The invitee
    can choose to view the invitation (or not) as you see in Figure [9-8](#A367674_1_En_9_Chapter.html#Fig8).


    ![A367674_1_En_9_Fig8_HTML.jpg](A367674_1_En_9_Fig8_HTML.jpg)


    *Figure 9-8. The invitee can choose to view the invitation*


    If the user chooses to see the invitation, the view shown in Figure [9-9](#A367674_1_En_9_Chapter.html#Fig9)
    appears. Note that `iCloud` must be enabled to accept the invitation. Rather than
    send the user off to check to see if `iCloud` is enabled, the current setting
    is shown in Figure [9-9](#A367674_1_En_9_Chapter.html#Fig9). If it’s off, the
    user can turn it on from here. (The other `iCloud` settings remain available in
    `Settings`.)


    ![A367674_1_En_9_Fig9_HTML.jpg](A367674_1_En_9_Fig9_HTML.jpg)


    *Figure 9-9. The invitee accepts or declines the invitation*


    If the user accepts, the action is reversible. Just go back to `HomeKit` in `Settings`
    to view the home(s) to which you have access. You can leave any of them as you
    see in Figure [9-10](#A367674_1_En_9_Chapter.html#Fig10).


    ![A367674_1_En_9_Fig10_HTML.jpg](A367674_1_En_9_Fig10_HTML.jpg)


    *Figure 9-10. You can leave a home at any time*


    **Tip:** If you’re going to be inviting people to share your home (perhaps relatives
    or others in the house who have different `Apple IDs`), you might want to modify
    the default `My Home` name for the home.


    ### Responding on an iPhone


    If the invitee views the invitation on an iPhone, here’s what it looks like. First
    of all, `HomeKit` is still in `Settings` on iPhone, but it looks a bit different
    as you see in Figure [9-11](#A367674_1_En_9_Chapter.html#Fig11). (In this section,
    a few of the intermediate screens that are identical to iPad are omitted.)


    ![A367674_1_En_9_Fig11_HTML.jpg](A367674_1_En_9_Fig11_HTML.jpg)


    *Figure 9-11. View the invitation on an iPhone*


    After choosing to see the invitation (just as on the iPad), the invitee can modify
    `iCloud` settings. If the invitee is already part of a home, this is where to
    come to begin the process of leaving by tapping the relevant home, as you can
    see in Figure [9-12](#A367674_1_En_9_Chapter.html#Fig12).


    ![A367674_1_En_9_Fig12_HTML.jpg](A367674_1_En_9_Fig12_HTML.jpg)


    *Figure 9-12. Once you tap the home you’re interested in working with, you can
    leave it*


    as you see in Figure [9-13](#A367674_1_En_9_Chapter.html#Fig13).


    ![A367674_1_En_9_Fig13_HTML.jpg](A367674_1_En_9_Fig13_HTML.jpg)


    *Figure 9-13. Change HomeKit settings on iPhone*


    ## Set Permissions for Users


    To set permissions for users, go to the `Home` tab in the `Home` app, tap `Edit`,
    and then tap the disclosure triangle next to the home name. You’ll see the alert
    shown in Figure [9-14](#A367674_1_En_9_Chapter.html#Fig14).


    ![A367674_1_En_9_Fig14_HTML.jpg](A367674_1_En_9_Fig14_HTML.jpg)


    *Figure 9-14. Manage users*


    Note that Figure [9-14](#A367674_1_En_9_Chapter.html#Fig14) shows two users: one
    has a pending invitation and the other is already a user. You can invite someone
    else if you want, as you saw previously in Figure [9-5](#A367674_1_En_9_Chapter.html#Fig5).


    Double-tap a user to set permissions as you can see in Figure [9-15](#A367674_1_En_9_Chapter.html#Fig15).


    ![A367674_1_En_9_Fig15_HTML.jpg](A367674_1_En_9_Fig15_HTML.jpg)


    *Figure 9-15. Set user permissions*'
