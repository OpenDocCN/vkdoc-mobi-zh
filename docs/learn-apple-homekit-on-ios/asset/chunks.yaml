    be sufficient at this point. If the hub accessories don’t show up, here is where
    you start to troubleshoot. You may need to compare HomeKit documentation with
    documentation from the hub manufacturer. Online help on web sites and Twitter
    can be very helpful. Just be calm and remember that many people by now have managed
    the connection between the hub and HomeKit.


    ## Using Automation


    The Automation tab in the bottom toolbar is the heart of HomeKit’s power. It lets
    you manage automations—sequences of commands that can affect one or more accessories
    (e.g., the accessories in a room). Begin by tapping the Automation tab as shown
    in Figure [5-10](#A367674_1_En_5_Chapter.html#Fig10).


    ![A367674_1_En_5_Fig10_HTML.jpg](A367674_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Create an automation


    Automations come in three varieties as you’ll see on the next screen (shown in
    Figure [5-11](#A367674_1_En_5_Chapter.html#Fig11)). Although they appear different,
    they really are the same: it’s only the triggering event that differs. (That event
    is called a trigger for that reason.)


    ![A367674_1_En_5_Fig11_HTML.jpg](A367674_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Set a trigger for when you leave or arrive


    ### Automating Location Changes


    The first trigger relies on your location , and that means it relies on your iPhone.
    As you can see in Figure [5-11](#A367674_1_En_5_Chapter.html#Fig11), you can set
    the trigger to occur when you leave or arrive.


    Although the example on the screen shows home, in fact, you can set the automation
    to any address that you have in Contacts. When you tap Next at the top right,
    you’ll see a list of your contact addresses as shown in Figure [5-12](#A367674_1_En_5_Chapter.html#Fig12).
    Just tap the one you want to use.


    ![A367674_1_En_5_Fig12_HTML.jpg](A367674_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Choose the address to use


    ### Automating Time of Day


    You can also set an automation to run at a certain time of day (or several days).
    If you choose that option, you’ll be able to add the details as shown in Figure
    [5-13](#A367674_1_En_5_Chapter.html#Fig13). Sunrise and sunset are managed for
    you automatically by Siri and HomeKit, and you can set the time. Most people use
    automations on a repeat basis, so you can choose the time (or sunrise/sunset)
    and tap the day(s) on which you want the automation to run. Every Day in the bottom
    left will do just that.


    ![A367674_1_En_5_Fig13_HTML.jpg](A367674_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Manage the time and repetition settings


    Note that this type of automation is designed to repeat. You can use it on a one-time
    basis , but there is no way to specify a particular date. By default, it will
    run at the chosen time on the next day you have selected.


    ### Letting Accessories Control Automations


    Perhaps the most interesting type of automation is one that is triggered by another
    accessory. You control this by selecting the accessory in the room that you’re
    interested in as shown in Figure [5-14](#A367674_1_En_5_Chapter.html#Fig14). (Tap
    the circle in the top right of an accessory to choose it.)


    ![A367674_1_En_5_Fig14_HTML.jpg](A367674_1_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    Let an accessory trigger an automation


    Once you’ve selected the triggering accessory, set the action it performs that
    will trigger the automation as you can see in Figure [5-15](#A367674_1_En_5_Chapter.html#Fig15).
    (The actions you can choose from differ for each type of accessory.)


    ![A367674_1_En_5_Fig15_HTML.jpg](A367674_1_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    Select the triggering action


    You have the accessory and the action that you want to trigger your automation.
    On the next screen select the accessory (or accessories with multiple choices)
    you want to respond to that trigger as shown in Figure [5-16](#A367674_1_En_5_Chapter.html#Fig16).
    (Scenes are described later on, but they basically work the same way as accessories
    in this context.)


    ![A367674_1_En_5_Fig16_HTML.jpg](A367674_1_En_5_Fig16_HTML.jpg)


    Figure 5-16.


    Choose the scene(s) or accessory(ies) to automate


    The last step is to provide the details of what this automation should do with
    what accessory(ies) on the next screen, shown in Figure [5-17](#A367674_1_En_5_Chapter.html#Fig17).


    ![A367674_1_En_5_Fig17_HTML.jpg](A367674_1_En_5_Fig17_HTML.jpg)


    Figure 5-17.


    Specify the action to perform'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    # 设置房间


    无论你是从系统默认创建的房间开始，还是自己创建房间（也许是一个只包含你用来做实验的测试灯和灯泡的小房间），你都可以为每个房间配置设置。


    要开始配置房间，请点击底部工具栏中的 `Rooms` 按钮。使用左上角的 `List` 按钮，可以显示房间列表，如图 5-4 所示。


    ![A367674_1_En_5_Fig4_HTML.jpg](img/A367674_1_En_5_Fig4_HTML.jpg)


    图 5-4. 显示房间列表


    要为房间添加或移除配件，请点击房间名称，你将进入该房间。


    如果你想编辑房间的设置，请点击 `Room Settings`。你将以不同的格式看到房间列表，如图 5-5 所示。


    ![A367674_1_En_5_Fig5_HTML.jpg](img/A367674_1_En_5_Fig5_HTML.jpg)


    图 5-5. 选择一个房间进行编辑


    点击你想要编辑的房间右侧的展开三角形。（记住，你正在编辑的是房间的描述：要编辑房间内的配件，只需从左上角的列表中选择该房间即可。）你将看到图 5-6 所示的视图。在这里，你可以重命名房间、选择墙纸（或拍摄实际房间的照片用作背景），甚至可以从
    HomeKit 中移除该房间。


    ![A367674_1_En_5_Fig6_HTML.jpg](img/A367674_1_En_5_Fig6_HTML.jpg)


    图 5-6. 编辑房间


    要编辑房间内的一个配件（稍后你将了解如何添加配件），请长按该配件。（如果只是点击它，你将会打开或关闭该配件。）图 5-7 显示了 `Details` 视图。


    ![A367674_1_En_5_Fig7_HTML.jpg](img/A367674_1_En_5_Fig7_HTML.jpg)


    图 5-7. 编辑房间内的配件


    配件的 `Details` 视图取决于其本身：HomeKit 会显示配件提供的所有信息。（在代码中支持这些配件是接下来两章的主题。）


    要编辑配件的详细信息，请点击图 5-7 所示视图右下角的 `Details`，以打开图 5-8 所示的详细信息。这些主要是 HomeKit 的设置，并且对所有配件来说基本都是相同的。在这里，你可以将配件从一个房间移动到另一个房间（只需点击
    `Location` 即可获得一个列表供选择）。你也可以选择在主屏幕的“收藏”中显示此配件。


    ![A367674_1_En_5_Fig8_HTML.jpg](img/A367674_1_En_5_Fig8_HTML.jpg)


    图 5-8. 编辑配件详细信息


    `Status` 按钮将让你选择此配件是否在概览项目中显示。


    如果你已添加了一个集线器，例如 Hue 桥接器，你可以在这里对其进行配置，如图 5-9 所示。


    ![A367674_1_En_5_Fig9_HTML.jpg](img/A367674_1_En_5_Fig9_HTML.jpg)


    图 5-9. 配置桥接器


    此时，仅按照制造商的说明连接桥接器可能就足够了。如果集线器配件没有显示出来，那么你需要从这里开始进行故障排除。你可能需要将 HomeKit 的文档与集线器制造商的文档进行对照检查。网站和推特上的在线帮助会非常有用。请保持冷静，记住，现在有很多人已经成功建立了集线器与
    HomeKit 之间的连接。


    # 使用自动化


    底部工具栏中的 `Automation` 标签页是 HomeKit 强大功能的核心。它允许你管理自动化——即可以影响一个或多个配件（例如，某个房间内的所有配件）的命令序列。首先，点击
    `Automation` 标签页，如图 5-10 所示。


    ![A367674_1_En_5_Fig10_HTML.jpg](img/A367674_1_En_5_Fig10_HTML.jpg)


    图 5-10. 创建一个自动化


    正如你将在下一个屏幕（如图 5-11 所示）上看到的，自动化分为三种类型。虽然它们看起来不同，但实际上本质是一样的：它们的区别仅在于触发事件不同。（基于这个原因，该事件被称为触发器。）


    ![A367674_1_En_5_Fig11_HTML.jpg](img/A367674_1_En_5_Fig11_HTML.jpg)


    图 5-11. 设置当你离开或到达时触发的触发器


    ## 自动化地理位置变化


    第一种触发器依赖于你的位置，这意味着它依赖于你的 iPhone。如图 5-11 所示，你可以将触发器设置为在离开或到达时触发。


    虽然屏幕上的示例显示的是“家”，但实际上，你可以将自动化设置为 `Contacts` 中的任何地址。当你点击右上角的 `Next` 时，你将看到你的联系人地址列表，如图
    5-12 所示。只需点击你想要使用的地址即可。


    ![A367674_1_En_5_Fig12_HTML.jpg](img/A367674_1_En_5_Fig12_HTML.jpg)


    图 5-12. 选择要使用的地址


    ## 自动化特定时间


    你也可以设置一个在一天中的某个特定时间（或几天）运行的自动化。如果你选择该选项，你将能够添加详细信息，如图 5-13 所示。日出和日落时间由 Siri 和
    HomeKit 自动为你管理，你也可以自行设置时间。大多数人会重复使用自动化，因此你可以选择时间（或日出/日落），然后点击你希望自动化运行的日期（或多天）。左上角的
    `Every Day` 将实现每天运行的效果。


    ![A367674_1_En_5_Fig13_HTML.jpg](img/A367674_1_En_5_Fig13_HTML.jpg)


    图 5-13. 管理时间和重复设置


    请注意，这种类型的自动化旨在重复执行。你也可以将其用于一次性场景，但无法指定特定日期。默认情况下，它会在你选择的第二天中的设定时间运行。


    ## 让配件控制自动化


    也许最有趣的自动化类型是由另一个配件触发的自动化。你可以通过选择你感兴趣的房间中的配件来控制这一点，如图 5-14 所示。（点击配件右上角的圆圈来选择它。）


    ![A367674_1_En_5_Fig14_HTML.jpg](img/A367674_1_En_5_Fig14_HTML.jpg)


    图 5-14. 让一个配件触发自动化


    一旦你选择了触发配件，请设置它将执行的、用于触发自动化的操作，如图 5-15 所示。（对于不同类型的配件，可供选择的操作会有所不同。）


    ![A367674_1_En_5_Fig15_HTML.jpg](img/A367674_1_En_5_Fig15_HTML.jpg)


    图 5-15. 选择触发操作


    你已经有了配件和你想要触发自动化的操作。在下一个屏幕上，选择你想要响应该触发器的配件（或多个配件），如图 5-16 所示。（场景稍后会描述，但在当前上下文中，它们的工作方式与配件基本相同。）


    ![A367674_1_En_5_Fig16_HTML.jpg](img/A367674_1_En_5_Fig16_HTML.jpg)


    图 5-16. 选择要自动化的场景或配件


    最后一步是在下一个屏幕上提供此自动化应对哪些配件执行何种操作的详细信息，如图 5-17 所示。


    ![A367674_1_En_5_Fig17_HTML.jpg](img/A367674_1_En_5_Fig17_HTML.jpg)


    图 5-17. 指定要执行的操作

