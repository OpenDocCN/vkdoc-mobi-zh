  trans: "\n## 整合运用\n\n现在你已经了解了 HomeKit 的整个设置流程。如果觉得有些复杂，不妨从反向视角来看，你会发现各个部分是如何紧密衔接的。一旦设置完成，实际运作流程如下：\n\
    \n1.  执行自动化操作：开关灯、打开车库门、调节恒温器等。\n2.  当触发条件发生时：\n    1.  特定时间点\n    2.  其他 HomeKit\
    \ 配件执行了某个操作\n    3.  你到达或离开某个地点。本章中介绍的各个步骤仅仅是为了搭建这个自动化系统。在此过程中，你确实需要执行一些设置操作，但大多数情况下，这些设置可以重复多次使用。以下是需要执行的主要设置操作：\n\
    \    *   对于基于位置的触发器，请确保地址已保存在你的通讯录中。如果没有，请添加。\n    *   随身携带你的 iPhone，以便基于位置的触发器能够正常工作。\n\
    \    *   识别你要用作触发器或执行操作的每个配件。\n        *   若要识别配件，请在 HomeKit 中定义它们。\n        *\
    \   若要整理配件，请将它们归入不同房间。\n        *   若要将配件按房间之外的逻辑进行整理，请将它们标记为“收藏”，这样它们就会出现在底部工具栏左侧的“家庭”标签页中。\n\
    \    *   确保你的家庭中枢（Apple TV 或 iPad）已开机，并连接到 WiFi 和互联网，且已设置为不会进入休眠状态。建议使用浪涌保护器，但设备应能在短暂断电后自动恢复。\n\
    \n# 6. 作为开发者、设计师或设备制造商探索 HomeKit 世界\n\n到目前为止，本书一直从外部视角审视 HomeKit，观察你能看到和用 HomeKit\
    \ 控制的那些事物。现在，让我们从代码入手，由内而外地探索 HomeKit。代码是连接家居本身及其所有组件（包括第三方设备）的核心。一切都与代码对话，从许多方面来说，代码本身是对\
    \ HomeKit 组件的最佳描述。本章将为你概述 HomeKit 框架及其对象和功能。\n\nHomeKit 是苹果公司的一个现代化框架，基于 Swift\
    \ 构建。如果你是一位资深的 Swift 开发者（这意味着你已经用了两三年了！），你会感觉得心应手。如果你是 Swift 新手，可以探索一下免费的 Swift\
    \ iBook，你可以从 `https://itunes.apple.com/us/book/swift-programming-language/id881256329?mt=11#`\
    \ 下载。\n\n本章探讨了使用 HomeKit 所需的基础知识。它被设计为一本参考手册，因此建议你先阅读第一节，然后在需要时再回过头来查阅其他章节。一旦你对\
    \ HomeKit 有了总体了解，在实际操作时学习细节就会容易得多。\n\n无论你在探索 HomeKit 世界的哪个方面，代码都是其核心。HomeKit 的第三方潜力目前才刚刚开始被挖掘。“家庭”是内置于\
    \ iOS 10 系统中的 iOS 应用。我们可以轻松构想出该应用更复杂、更定制化的版本。对于设备制造商而言，在构建设备以及配置与设备及其应用紧密相关的细节方面，存在着明显的机遇。将\
    \ HomeKit 技术与其他技术、设备和建筑项目集成，仍然是一个前景广阔的领域。\n\n在探索这些及其他可能性之前，首先需要了解你将使用的 HomeKit\
    \ 代码端。\n\n## HomeKit 概述\n\n如果你熟悉面向对象编程，本节内容可能足以让你快速上手，将 Swift 与 HomeKit 结合使用。虽然这远非关于这两者的完整教程（所有权威文档的来源是\
    \ `developer.apple.com`），但它能帮你入门。本节将为你介绍需要了解的关键特性，这些特性与你可能已知的其他语言的面向对象编程有所不同。\n\
    \n### Swift 面向 HomeKit 的面向对象特性\n\n与任何语言中的大多数面向对象框架一样，HomeKit 主要由对象和函数组成。更精确地说，对象是类的运行时实例化。换句话说，HomeKit\
    \ 由在运行时作为对象创建的类组成。\n\n函数可以在类内部声明，也可以独立声明。（在非常严格的面向对象编程中，不鼓励使用独立函数，但你仍然可以创建它们。）\n\
    \n在类内部声明的函数通常被称为方法。\n\n这种术语有其历史原因，但不必担心。\n\nHomeKit 的类通常代表物理对象（家庭、房间、配件）；它们也可以代表活动或过程。这与许多面向对象系统相同，但\
    \ HomeKit 比其他许多系统更侧重于物理对象。这对你来说应该影响不大。\n"
- fmt: "# Protocols and Delegates: Architecture\n\nOne of the things that distinguishes\
    \ Swift from many other object-oriented programming languages is its use of protocols\
    \ and delegates. As in all object-oriented programming languages, a class can\
    \ be descended from another. The descendent class inherits the functionality and\
    \ variables of the ancestor (or superclass). This can be overridden in the subclass\
    \ as needed.\n\nOne of the major challenges in object-oriented programming has\
    \ been the issue of multiple inheritance—how do you handle the situation where\
    \ you want a bit of this class as a superclass and a bit of that class as a superclass\
    \ —both for the same subclass. Swift manages this with protocols. When you declare\
    \ a class, you specify a class from which it inherits if one exists. There is\
    \ a common base class for most objects in the Cocoa frameworks (Cocoa Touch and\
    \ Cocoa), and that base class is `NSObject`. You can explore `NSObject` to see\
    \ its structure and components in the Xcode documentation, but for your purposes\
    \ now you need merely know that it’s the common base class for many of the Cocoa\
    \ classes.\n\nIf you want to mix and match parts of several classes to create\
    \ a form of multiple inheritance, you can use protocols. A protocol has some resemblance\
    \ to classes in that its definition can contain methods, but a protocol is not\
    \ directly instantiated as a class is. Instead, a class can declare that it conforms\
    \ to a protocol. That means that the class itself implements the protocol (strictly\
    \ speaking, the required methods of a protocol because some methods can be marked\
    \ as optional). If a class conforms to a protocol, its subclasses conform to that\
    \ protocol as well. The class or its subclasses must implement the methods declared\
    \ in the protocol. The syntax for declaring classes, superclasses, and protocols\
    \ makes the commonality clear. For example, following is a declaration of a Swift\
    \ class:\n\n```\nclass MyClass {\n}\n```\n\nHere is the declaration of a class\
    \ that will be used as a superclass. Note that there’s nothing syntactical to\
    \ indicate that it will be a superclass: that’s just for clarity of the code example.\n\
    \n```\nclass MySuperClass {\n}\n```\n\nFollowing is a declaration of a Swift class\
    \ with a superclass:\n\n```\nclass MyClass2: MySuperClass {\n}\n```\n\nHere is\
    \ a declaration of a protocol.\n\n```\nprotocol MyProtocol {\n    var protocolVar:\
    \ String { get }\n}\n```\n\nThe protocol is never going to be implemented on its\
    \ own as a class could be. Thus, when declaring a property `protocolVar` that\
    \ is a string, the protocol will rely on a class that actually adopts the protocol\
    \ to implement `protocolVar`.\n\nFollowing is a declaration of a Swift class which\
    \ adopts a protocol:\n\n```\nclass MyClass3: MyProtocol {\n}\n```\n\nHere is a\
    \ declaration of a Swift class with a superclass where the Swift class adopts\
    \ a protocol.\n\n```\nclass MyClass4: MySuperClass, MyProtocol {\n    internal\
    \ var protocolVar: String = \"Test\"\n}\n```\n\nIt is the class that adopts the\
    \ protocol that implements it, so after the previous code snippets, you can now\
    \ write the following:\n\n```\nlet x = MyClass4 ()\nprint (x.protocolVar)\n```\n\
    \nFigure 6-1 shows this code all put together.\n\n![A367674_1_En_6_Fig1_HTML.jpg](A367674_1_En_6_Fig1_HTML.jpg)\n\
    \n*Figure 6-1. Classes, superclasses, and protocols example*\n\nIn case you’re\
    \ wondering how the compiler can correctly interpret a line of code such as the\
    \ following, where `MySomething` could be either a protocol or a superclass, the\
    \ answer is that the compiler requires that `MySomething` be declared before use,\
    \ and it can figure out which it is.\n\n```\nclass MyClass: MySomething {\n}\n\
    ```\n\nIt is a commonly used convention (or design pattern if you prefer that\
    \ terminology) that when a class adopts a protocol, the protocol functionality\
    \ may in fact be implemented by another object at runtime. This object is the\
    \ delegate. This structure keeps the functionality well-organized and makes development\
    \ and maintenance of code easier.\n\nBy using protocols, the multiple inheritance\
    \ issue is pretty much solved. In addition, by being able to add protocols to\
    \ implement rather limited functionalities, the inheritance tree in Swift is often\
    \ much flatter than in other languages. In fact, many protocols in Swift are particularly\
    \ lightweight and are added to a number of classes as needed. The next section\
    \ examines three protocols that appear over and over in HomeKit classes.\n\n#\
    \ Protocols and Delegates: Key Players\n\nAs noted previously, Swift class hierarchies\
    \ that use protocols tend to be much flatter than class hierarchies in other languages.\
    \ The common base object for Cocoa and Cocoa Touch (`NSObject`) which itself conforms\
    \ to `NSObjectProtocol` does a lot of the heavy lifting for many objects in the\
    \ frameworks. Most of the HomeKit classes are subclasses of `NSObject` (and therefore\
    \ conform to `NSObjectProtocol`).\n\nIn addition, many of the HomeKit classes\
    \ also adopt three very common protocols: `CVarArg`, `Equatable`, and `Hashable`.\
    \ You don’t really need to worry about them, but if you’re looking things up in\
    \ the documentation and keep running across them, here’s what they are and what\
    \ they do.\n\n### `CVarArg`\n\nThis protocol allows you to use a variadic list\
    \ of variables (a C va_list).\n\n### `Equatable`\n\nThis protocol means that types\
    \ can be compared with `==` or `!=`.\n\n### `Hashable`\n\nAs its name suggests,\
    \ this protocol means that objects conforming to it can be hashed so that you\
    \ can easily locate them in a dictionary or a set.\n\n# Creating New Instances\n\
    \nYou’ll find that many of the HomeKit classes do not allow you to simply create\
    \ new instances of themselves. You must use a method that returns a new instance\
    \ in some context. These are often referred to as “factory methods.”\n\nFor example,\
    \ if you want to create a new room, you use `addRoom(withName:completionHandler:)`\
    \ on an `HMHome` instance. This means that the room you add is added to the rooms\
    \ array in the `HMHome` instance.\n\nThis design pattern is repeated in many places\
    \ (e.g., `HMZone` instances). This may minimize the issue of “orphan” objects.\n\
    \n## Basic HomeKit Objects\n\nThe basic objects in a home are:\n\n- Rooms\n- Accessories\n\
    - Scenes\n- Actions (these are organized into action sets which will be described\
    \ later in this section)\n\nThey are the main objects you’ll be working with (in\
    \ addition to the home itself, of course). Within an `HMHome` instance, you can\
    \ find them in arrays.\n\nThe balance of this chapter explores those objects.\
    \ You’ll see the interface as well as the code that can be used to implement it.\
    \ (Note that the actual implementation within the Home app may use other code,\
    \ but it will functionally be the same as the code you see here.)\n\nAlmost every\
    \ object in HomeKit has a unique identifier:\n\n```\nvar uniqueIdentifier: UUID\n\
    ```\n\nA unique identifier is a string that is generated in such a way as to be\
    \ unique. (The example shown in Apple documentation is `E621E1F8-C36C-495A-93FC-0C247A3E6E5F`).\
    \ Swift `UUID` (universally unique identifier) is bridged to `NSUUID` so the two\
    \ can be used interchangeably. It is based on RFC 4122 version 4 random bytes.\n\
    \n# Working with Rooms\n\nRooms are what you work with when you set up HomeKit\
    \ as a user, but here is the back-end view."
  raw: '#### Protocols and Delegates: Architecture


    One of the things that distinguishes Swift from many other object-oriented programming
    languages is its use of protocols and delegates. As in all object-oriented programming
    languages, a class can be descended from another. The descendent class inherits
    the functionality and variables of the ancestor (or superclass). This can be overridden
    in the subclass as needed.


    One of the major challenges in object-oriented programming has been the issue
    of multiple inheritance—how do you handle the situation where you want a bit of
    this class as a superclass and a bit of that class as a superclass —both for the
    same subclass. Swift manages this with protocols. When you declare a class, you
    specify a class from which it inherits if one exists. There is a common base class
    for most objects in the Cocoa frameworks (Cocoa Touch and Cocoa), and that base
    class is `NSObject`. You can explore `NSObject` to see its structure and components
    in the Xcode documentation, but for your purposes now you need merely know that
    it’s the common base class for many of the Cocoa classes.


    If you want to mix and match parts of several classes to create a form of multiple
    inheritance , you can use protocols. A protocol has some resemblance to classes
    in that its definition can contain methods, but a protocol is not directly instantiated
    as a class is. Instead, a class can declare that it conforms to a protocol. That
    means that the class itself implements the protocol (strictly speaking, the required
    methods of a protocol because some methods can be marked as optional). If a class
    conforms to a protocol, its subclasses conform to that protocol as well. The class
    or its subclasses must implement the methods declared in the protocol. The syntax
    for declaring classes, superclasses, and protocols makes the commonality clear.
    For example, following is a declaration of a Swift class:


    ```

    class MyClass {

    }

    ```


    Here is the declaration of a class that will be used as a superclass. Note that
    there’s nothing syntactical to indicate that it will be a superclass: that’s just
    for clarity of the code example.


    ```

    class MySuperClass {

    }

    ```


    Following is a declaration of a Swift class with a superclass:


    ```

    class MyClass2: MySuperClass {

    }

    ```


    Here is a declaration of a protocol.


    ```

    protocol MyProtocol {

    var protocolVar: String {get}

    }

    ```


    The protocol is never going to be implemented on its own as a class could be.
    Thus, when declaring a property protocolVar that is a string, the protocol will
    rely on a class that actually adopts the protocol to implement `protocolVar`.


    Following is a declaration of a Swift class which adopts a protocol:


    ```

    class MyClass3: MyProtocol {

    }

    ```


    Here is a declaration of a Swift class with a superclass where the Swift class
    adopts a protocol.


    ```

    class MyClass4: MySuperClass, MyProtocol {

    internal var protocolVar: String = "Test"

    }

    ```


    It is the class that adopts the protocol that implements it, so after the previous
    code snippets, you can now write the following:


    ```

    let x = MyClass4 ()

    print (x.protocolVar)

    ```


    Figure [6-1](#A367674_1_En_6_Chapter.html#Fig1) shows this code all put together.


    ![A367674_1_En_6_Fig1_HTML.jpg](A367674_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Classes, superclasses, and protocols example


    In case you’re wondering how the compiler can correctly interpret a line of code
    such as the following, where `MySomething` could be either a protocol or a superclass,
    the answer is that the compiler requires that `MySomething` be declared before
    use, and it can figure out which it is.


    ```

    class MyClass: MySomething {

    }

    ```


    It is a commonly used convention (or design pattern if you prefer that terminology)
    that when a class adopts a protocol, the protocol functionality may in fact be
    implemented by another object at runtime. This object is the delegate. This structure
    keeps the functionality well-organized and makes development and maintenance of
    code easier.


    By using protocols, the multiple inheritance issue is pretty much solved. In addition,
    by being able to add protocols to implement rather limited functionalities, the
    inheritance tree in Swift is often much flatter than in other languages. In fact,
    many protocols in Swift are particularly lightweight and are added to a number
    of classes as needed. The next section examines three protocols that appear over
    and over in HomeKit classes.


    #### Protocols and Delegates: Key Players


    As noted previously, Swift class hierarchies that use protocols tend to be much
    flatter than class hierarchies in other languages. The common base object for
    Cocoa and Cocoa Touch (`NSObject`) which itself conforms to `NSObjectProtocol`
    does a lot of the heavy lifting for many objects in the frameworks. Most of the
    HomeKit classes are subclasses of `NSObject` (and therefore conform to `NSObjectProtocol).`


    In addition, many of the HomeKit classes also adopt three very common protocols:
    `CVarArg`, `Equatable`, and `Hashable`. You don’t really need to worry about them,
    but if you’re looking things up in the documentation and keep running across them,
    here’s what they are and what they do.


    ```

    CVarArg

    ```


    This protocol allows you to use a variadic list of variables (a C va_list).


    ```

    Equatable

    ```


    This protocolSwift’s Object-Oriented featuresprotocols and delegateskey players
    means that types can be compared with == or !=.


    ```

    Hashable

    ```


    As its name suggests, this protocol means that objects conforming to it can be
    hashed so that you an easily locate them in a dictionary or a set.


    ## Creating New Instances


    You’ll find that many of the HomeKit classes do not allow you to simply create
    new instances of themselves. You must use a method that returns a new instance
    in some context. These are often referred to as “factory methods.”


    For example, if you want to create a new room, you use addRoom (withName: completionHandler:)
    on an HMHome instance. This means that the room you add is added to the rooms
    array in the HMHome instance.


    This design pattern is repeated in many places (e.g., HMZone instances). This
    may minimize the issue of “orphan” objects.


    ### Basic HomeKit Objects


    The basic objects in a home are


    *   Rooms

    *   Accessories

    *   Scenes

    *   Actions (these are organized into action sets which will be described later
    in this section)


    They are the main objects you’ll be working with (in addition to the home itself,
    of course). Within an HMHome instance , you can find them in arrays.


    The balance of this chapter explores those objects. You’ll see the interface as
    well as the code that can be used to implement it. (Note that the actual implementation
    within the Home app may use other code, but it will functionally be the same as
    the code you see here.)


    Almost every object in HomeKit has a unique identifier:


    ```

    var uniqueIdentifier: UUID

    ```


    A unique identifier is a string that is generated in such a way as to be unique.
    (The example shown in Apple documentation is


    ```

    E621E1F8-C36C-495A-93FC-0C247A3E6E5F)

    ```


    Swift UUID (universally unique identifier) is bridged to NSUUID so the two can
    be used interchangeably. It is based on RFC 4122 version 4 random bytes.


    ## Working with Rooms


    Rooms are what you work with when you set up HomeKit as a user, but here is the
    back-end view.'
  trans: "\n# 协议与委托：架构\n\nSwift 与其他面向对象编程语言的区别之一在于其对协议和委托的使用。与所有面向对象编程语言一样，一个类可以继承自另一个类。子类继承父类（或超类）的功能和变量，并且可以根据需要在子类中进行重写。\n\
    \n面向对象编程中的一个主要挑战是多继承问题——当你想同时将某个类的部分功能和另一个类的部分功能作为超类，用于同一个子类时，该如何处理？Swift 通过协议解决了这个问题。在声明类时，你需要指定其继承的父类（如果有的话）。在\
    \ Cocoa 框架（包括 Cocoa Touch 和 Cocoa）中，大多数对象都有一个共同的基类，即 `NSObject`。你可以在 Xcode 文档中查看\
    \ `NSObject` 的结构和组成部分，但目前你只需知道它是许多 Cocoa 类的共同基类即可。\n\n如果你想混合使用多个类的部分功能来创建一种多继承形式，可以使用协议。协议与类有相似之处，因为其定义可以包含方法，但协议不能像类那样直接实例化。相反，一个类可以声明自己遵循某个协议，这意味着该类本身实现了该协议（严格来说，是实现协议中的必需方法，因为有些方法可以标记为可选）。如果一个类遵循了某个协议，其子类也会遵循该协议。该类或其子类必须实现协议中声明的方法。声明类、超类和协议的语法清晰地体现了这种共性。例如，下面是\
    \ Swift 类的声明：\n\n```\nclass MyClass {\n}\n```\n\n下面是一个将作为超类的类的声明。注意，语法上没有任何指示表明它将作为超类，这只是为了代码示例的清晰性。\n\
    \n```\nclass MySuperClass {\n}\n```\n\n下面是带有超类的 Swift 类声明：\n\n```\nclass MyClass2:\
    \ MySuperClass {\n}\n```\n\n下面是一个协议的声明。\n\n```\nprotocol MyProtocol {\n    var\
    \ protocolVar: String { get }\n}\n```\n\n协议永远不会像类那样被独立实现。因此，在声明一个字符串类型的属性 `protocolVar`\
    \ 时，协议将依赖于一个实际采纳该协议的类来实现 `protocolVar`。\n\n下面是一个采纳了协议的 Swift 类声明：\n\n```\nclass\
    \ MyClass3: MyProtocol {\n}\n```\n\n下面是一个带有超类且采纳了协议的 Swift 类声明。\n\n```\nclass\
    \ MyClass4: MySuperClass, MyProtocol {\n    internal var protocolVar: String =\
    \ \"Test\"\n}\n```\n\n是采纳协议的类来实现它，因此在上述代码片段之后，你可以编写以下代码：\n\n```\nlet x = MyClass4\
    \ ()\nprint (x.protocolVar)\n```\n\n图 6-1 展示了整合后的这段代码。\n\n![A367674_1_En_6_Fig1_HTML.jpg](img/A367674_1_En_6_Fig1_HTML.jpg)\n\
    \n*图 6-1. 类、超类和协议示例*\n\n如果你想知道编译器如何正确解释像下面这样的代码行（其中 `MySomething` 可能是协议也可能是超类），答案是编译器要求\
    \ `MySomething` 在使用前必须声明，并且它能分辨出具体是哪种。\n\n```\nclass MyClass: MySomething {\n\
    }\n```\n\n通常有一种惯例（如果你喜欢用这个术语，也可以称之为设计模式）：当一个类采纳某个协议时，该协议的功能实际上可能在运行时由另一个对象实现。这个对象就是委托（Delegate）。这种结构使功能组织得井然有序，并使得代码的开发和维护更加容易。\n\
    \n通过使用协议，多继承问题基本得到了解决。此外，由于可以添加协议来实现相当有限的功能，Swift 中的继承树通常比其他语言扁平得多。实际上，Swift 中的许多协议都特别轻量，并根据需要被添加到多个类中。下一节将介绍在\
    \ HomeKit 类中反复出现的三个协议。\n\n# 协议与委托：关键角色\n\n如前所述，使用协议的 Swift 类层次结构通常比其他语言的类层次结构扁平得多。Cocoa\
    \ 和 Cocoa Touch 的共同基类 `NSObject`（它本身遵循 `NSObjectProtocol`）为框架中的许多对象完成了大量繁重的工作。大多数\
    \ HomeKit 类都是 `NSObject` 的子类（因此也遵循 `NSObjectProtocol`）。\n\n此外，许多 HomeKit 类还采纳了三个非常常见的协议：`CVarArg`、`Equatable`\
    \ 和 `Hashable`。你其实不必过于担心它们，但如果你在文档中查找信息时经常遇到它们，以下是它们的具体内容和作用。\n\n### `CVarArg`\n\
    \n该协议允许你使用可变参数列表（C 语言的 va_list）。\n\n### `Equatable`\n\n该协议意味着类型可以使用 `==` 或 `!=`\
    \ 进行比较。\n\n### `Hashable`\n\n顾名思义，该协议意味着遵循它的对象可以被哈希，以便你可以在字典或集合中轻松定位它们。\n\n# 创建新实例\n\
    \n你会发现许多 HomeKit 类不允许你直接创建它们的新实例。你必须使用某种在特定上下文中返回新实例的方法。这些方法通常被称为“工厂方法”。\n\n例如，如果你想创建一个新房间，你需要在\
    \ `HMHome` 实例上使用 `addRoom(withName:completionHandler:)`。这意味着你添加的房间会被添加到 `HMHome`\
    \ 实例的 rooms 数组中。\n\n这种设计模式在许多地方重复出现（例如 `HMZone` 实例）。这可以最大限度地减少“孤立”对象的问题。\n\n##\
    \ 基本 HomeKit 对象\n\n家庭中的基本对象包括：\n\n-   房间\n-   配件\n-   场景\n-   动作（这些动作被组织成动作集，将在本节后面描述）\n\
    \n它们是你将主要使用的对象（当然，除了家庭本身之外）。在 `HMHome` 实例内，你可以在数组中找到它们。\n\n本章的其余部分将探讨这些对象。你将看到界面以及可用于实现它的代码。（请注意，Home\
    \ App 中的实际实现可能使用其他代码，但功能上与你在此看到的代码相同。）\n\nHomeKit 中几乎每个对象都有一个唯一标识符：\n\n```\nvar\
    \ uniqueIdentifier: UUID\n```\n\n唯一标识符是一个以特定方式生成的字符串，以确保其唯一性。（Apple 文档中显示的示例是\
    \ `E621E1F8-C36C-495A-93FC-0C247A3E6E5F`）。Swift 的 `UUID`（通用唯一标识符）桥接到了 `NSUUID`，因此两者可以互换使用。它基于\
    \ RFC 4122 版本 4 的随机字节。\n\n# 处理房间\n\n当你以用户身份设置 HomeKit 时，房间是你需要处理的对象，但这里展示的是后端视角。\n"
- fmt: "### Managing Rooms\n\nAdd a room by tapping the list icon at the top left\
    \ of any room in the Home app as you see in Figure [6-2](#A367674_1_En_6_Chapter.html#Fig2).\n\
    \n![A367674_1_En_6_Fig2_HTML.jpg](A367674_1_En_6_Fig2_HTML.jpg)\n\nFigure 6-2.\
    \ Listing and adding rooms\n\nAs you see in the background of Figure [6-2](#A367674_1_En_6_Chapter.html#Fig2),\
    \ this list of rooms is available from any room. The list of rooms is an array\
    \ of the rooms in an `HMHome`, so that must be in the view you see in Figure [6-2](#A367674_1_En_6_Chapter.html#Fig2).\
    \ The list is found using the `HMHome` array: `HMRoom` array.\n\n```\nvar rooms:\
    \ [HMRoom]\n```\n\nThus, in order to add a room, you can tell from the interface\
    \ that you know the `HMHome` object (because that’s where the list of rooms is).\
    \ The `HMHome` class manages adding and removing rooms from the home using the\
    \ following:\n\n```\nfunc addRoom(withName: String, completionHandler: (HMRoom?,\
    \ Error?) -> Void)\nfunc removeRoom(HMRoom, completionHandler: (Error?) -> Void)\n\
    ```\n\nFigure [6-3](#A367674_1_En_6_Chapter.html#Fig3) shows how you add a room.\n\
    \n![A367674_1_En_6_Fig3_HTML.jpg](A367674_1_En_6_Fig3_HTML.jpg)\n\nFigure 6-3.\
    \ Room settings\n\nThere’s another interesting aspect of the `HMHome` API (application\
    \ program interface) that relates to rooms, and that’s a method that returns all\
    \ parts of the home that aren’t in any other room.\n\n```\nfunc roomForEntireHome()\n\
    ```\n\nSo you can be confident in proceeding under the assumption that objects\
    \ such as accessories will be in a room even if it’s only the entire home room.\n\
    \n### Editing a Room\n\nOnce you have added or located a room, you can edit it.\
    \ Figure [6-4](#A367674_1_En_6_Chapter.html#Fig4) shows the interface (you get\
    \ here as a user from Add Room at the bottom of Figure [6-3](#A367674_1_En_6_Chapter.html#Fig3)).\n\
    \n![A367674_1_En_6_Fig4_HTML.jpg](A367674_1_En_6_Fig4_HTML.jpg)\n\nFigure 6-4.\
    \ Room settings\n\nThe name of a room is set when you first create it using `HMHome.addRoom(withName:\
    \ String, completionHandler: (HMRoom?, Error?) -> Void)`.\n\nUpdating the name\
    \ after you have created the room is done with `HMRoom`.\n\n```\nfunc updateName(String,\
    \ completionHandler: (Error?) -> Void)\n```\n\nFigure [6-4](#A367674_1_En_6_Chapter.html#Fig4)\
    \ shows the user interface. The same design pattern that has an array of rooms\
    \ within a home occurs with accessories in a room: they are stored in an array\
    \ in `HMRoom`.\n\n```\nvar accessories: [HMAccessory]\n```\n\n## Working with\
    \ Accessories\n\nRooms within a home are a fairly simple case if only because\
    \ both the home and the room are physical objects, and in practice rooms are fairly\
    \ static. When you think about it, changes to rooms within a home are frequently\
    \ changes in name (e.g., the nursery becomes the study). It’s true that accessories\
    \ are a different matter if only because they tend to move around. (The lamp that\
    \ used to be in the living room may be moved to a bedroom.)\n\n### Finding Accessories\n\
    \nThe `HMAccessoryBrowser` class is used to find accessories. If you’ve set up\
    \ a HomeKit home, you’ve been through the process. You start by adding an accessory,\
    \ as you can see in Figure [6-5](#A367674_1_En_6_Chapter.html#Fig5).\n\n![A367674_1_En_6_Fig5_HTML.jpg](A367674_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5. Selecting an accessory\n\nWhat happens next is that the app launches\
    \ an `HMAccessoryBrowser`. It goes around and attempts to discover accessories\
    \ as you can see in Figure [6-6](#A367674_1_En_6_Chapter.html#Fig6).\n\n![A367674_1_En_6_Fig6_HTML.jpg](A367674_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6. Browsing for accessories\n\nThe process that goes on is a typical\
    \ Cocoa design pattern involving a delegate. There are three steps.\n\n1. First,\
    \ you start searching for accessories that are not yet associated with a home.\
    \ (If accessories are associated with a home, the user will need to remove them.)\
    \ To carry out the search, you create an `HMAccessoryBrowser`.\n2. When an accessory\
    \ is found, you need to be notified. In some cases, a completion routine is used\
    \ for this call-back processing. However, in other cases (such as this), a delegate\
    \ is used. The delegate implements a protocol—in this case, it’s the `HMAccessoryBrowserDelegateProtocol`.\
    \ The protocol consists of two methods:\n\n   ```\n   func accessoryBrowser(HMAccessoryBrowser,\
    \ didFindNewAccessory: HMAccessory)\n   func accessoryBrowser(HMAccessoryBrowser,\
    \ didRemoveNewAccessory: HMAccessory)\n   ```\n\n   It is fairly common that the\
    \ object creating the delegate appoints itself as the delegate, but that isn’t\
    \ required. What’s important is that this is an asynchronous process that can\
    \ be fired off (starting the search) and then handled if and when an event occurs.\n\
    \n3. Once you have set up the delegate, you use a method of the browser to start\
    \ searching.\n\n   ```\n   func startSearchingForNewAccessories()\n   ```\n\n\
    4. When appropriate, you stop searching.\n\n   ```\n   func stopSearchingForNewAccessories()\n\
    \   ```\n\nThere is more on completion handlers and delegation in Chapter [7](#A367674_1_En_7_Chapter.html).\n\
    \n### Managing Accessories\n\nOnce you have completed your search, you add accessories\
    \ using `HMHome`.\n\n```\nfunc addAccessory(_ accessory: HMAccessory,\ncompletionHandler\
    \ completion: (Error?) -> Void)\n```\n\nNot surprisingly, you remove them also\
    \ using `HMHome`.\n\n```\nfunc removeAccessory(_ accessory: HMAccessory,\ncompletionHandler\
    \ completion: (Error?) -> Void)\n```\n\nYou can get a list of accessories from\
    \ a room using the `HMRoom` method that returns the array of that room’s accessories.\n\
    \n```\nvar accessories: [HMAccessory]\n```\n\nBecause accessories are added and\
    \ removed by `HMHome`, you can move them around using `HMHome`:\n\n```\nfunc assignAccessory(_\
    \ accessory: HMAccessory,\nto room: HMRoom,\ncompletionHandler completion: (Error?)\
    \ -> Void)\n```\n\n### Editing Accessories\n\nYou see the accessory information\
    \ in a view that varies depending on the type of accessory. For example, if you\
    \ tap and hold an accessory in Figure [6-5](#A367674_1_En_6_Chapter.html#Fig5),\
    \ you may see the view shown in Figure [6-7](#A367674_1_En_6_Chapter.html#Fig7)\
    \ which represents a light bulb.\n\n![A367674_1_En_6_Fig7_HTML.jpg](A367674_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7. Editing an accessory’s details\n\nAs far as the interface of the\
    \ Home app is concerned, you can edit an accessory’s general information that\
    \ is visible to the room itself by a long press on it in the user interface. Figures\
    \ [6-8](#A367674_1_En_6_Chapter.html#Fig8) and [6-9](#A367674_1_En_6_Chapter.html#Fig9)\
    \ show you the user interface. It is the same for all types of accessories.\n\n\
    ![A367674_1_En_6_Fig9_HTML.jpg](A367674_1_En_6_Fig9_HTML.jpg)\n\nFigure 6-9. Setting\
    \ the values (bottom)\n\n![A367674_1_En_6_Fig8_HTML.jpg](A367674_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8. Setting the values (top)\n\n**Note:** Chapter [7](#A367674_1_En_7_Chapter.html)\
    \ provides much more on accessories."
