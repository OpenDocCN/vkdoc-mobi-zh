  trans: "\n### 管理房间\n\n轻点“家庭”应用中任意房间左上角的列表图标即可添加房间，如图 6-2 所示。\n\n![A367674_1_En_6_Fig2_HTML.jpg](img/A367674_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2. 列出并添加房间\n\n如图 6-2 的背景所示，此房间列表可从任意房间中调出。房间列表是 `HMHome` 中存储房间的数组，因此必须显示在图\
    \ 6-2 所示的视图中。该列表通过 `HMHome` 数组 `HMRoom` 数组获取。\n\n```\nvar rooms: [HMRoom]\n```\n\
    \n因此，若要添加房间，您可以从界面上得知 `HMHome` 对象（因为房间列表就在该对象中）。`HMHome` 类通过以下方法管理家中房间的添加和移除：\n\
    \n```\nfunc addRoom(withName: String, completionHandler: (HMRoom?, Error?) ->\
    \ Void)\nfunc removeRoom(HMRoom, completionHandler: (Error?) -> Void)\n```\n\n\
    图 6-3 展示了如何添加房间。\n\n![A367674_1_En_6_Fig3_HTML.jpg](img/A367674_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3. 房间设置\n\n`HMHome` API（应用程序编程接口）中还有一个与房间相关的有趣特性，即一个返回家中所有未分配到其他房间的部分的方法。\n\
    \n```\nfunc roomForEntireHome()\n```\n\n因此，您可以确信地假定诸如配件之类的对象将被分配到某个房间中，即使只是整个家所在的房间。\n\
    \n### 编辑房间\n\n添加或定位到某个房间后，您可以对其进行编辑。图 6-4 显示了其界面（用户可从图 6-3 底部的“添加房间”进入该界面）。\n\n\
    ![A367674_1_En_6_Fig4_HTML.jpg](img/A367674_1_En_6_Fig4_HTML.jpg)\n\n图 6-4. 房间设置\n\
    \n房间名称在首次使用 `HMHome.addRoom(withName: String, completionHandler: (HMRoom?, Error?)\
    \ -> Void)` 创建时设定。\n\n创建房间后，可通过 `HMRoom` 更新名称。\n\n```\nfunc updateName(String,\
    \ completionHandler: (Error?) -> Void)\n```\n\n图 6-4 显示了用户界面。与家中房间数组相同的设计模式也适用于房间中的配件：它们存储在\
    \ `HMRoom` 的数组中。\n\n```\nvar accessories: [HMAccessory]\n```\n\n## 使用配件\n\n家中的房间是一个相当简单的案例，仅仅是因为家与房间都是物理对象，而且在实践中房间相当固定。仔细想想，家中房间的变更通常只是名称上的变化（例如，婴儿房变成了书房）。诚然，配件则有所不同，因为它们往往会被移动（曾经放在客厅的灯可能会被移到卧室）。\n\
    \n### 查找配件\n\n`HMAccessoryBrowser` 类用于查找配件。如果您已经设置了一个 HomeKit 家庭，那么您已经经历过这个过程。您从添加配件开始，如图\
    \ 6-5 所示。\n\n![A367674_1_En_6_Fig5_HTML.jpg](img/A367674_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5. 选择配件\n\n接下来，应用会启动一个 `HMAccessoryBrowser`。它会四处搜索并尝试发现配件，如图 6-6 所示。\n\n\
    ![A367674_1_En_6_Fig6_HTML.jpg](img/A367674_1_En_6_Fig6_HTML.jpg)\n\n图 6-6. 浏览配件\n\
    \n这个过程是一个典型的 Cocoa 设计模式，涉及一个委托。共有三个步骤。\n\n1.  首先，您开始搜索尚未与某个家庭关联的配件。（如果配件已与某个家庭关联，用户需要将其移除。）为了执行搜索，您需要创建一个\
    \ `HMAccessoryBrowser`。\n2.  当发现某个配件时，您需要得到通知。在某些情况下，会使用一个完成例程来进行此回调处理。然而，在其他情况下（如此处），则会使用一个委托。该委托实现了一个协议——此处是\
    \ `HMAccessoryBrowserDelegateProtocol`。该协议包含两个方法：\n\n    ```\n    func accessoryBrowser(HMAccessoryBrowser,\
    \ didFindNewAccessory: HMAccessory)\n    func accessoryBrowser(HMAccessoryBrowser,\
    \ didRemoveNewAccessory: HMAccessory)\n    ```\n\n    创建委托的对象通常会将自身设为委托，但这并非强制要求。重要的是，这是一个异步过程，可以启动（开始搜索）然后在事件发生时进行处理。\n\
    \n3.  设置好委托后，您使用浏览器的一个方法开始搜索。\n\n    ```\n    func startSearchingForNewAccessories()\n\
    \    ```\n\n4.  在适当的时候，您停止搜索。\n\n    ```\n    func stopSearchingForNewAccessories()\n\
    \    ```\n\n关于完成例程和委托的更多内容，请参阅第 7 章。\n\n### 管理配件\n\n完成搜索后，您可以使用 `HMHome` 添加配件。\n\
    \n```\nfunc addAccessory(_ accessory: HMAccessory,\ncompletionHandler completion:\
    \ (Error?) -> Void)\n```\n\n不出所料，您也使用 `HMHome` 移除配件。\n\n```\nfunc removeAccessory(_\
    \ accessory: HMAccessory,\ncompletionHandler completion: (Error?) -> Void)\n```\n\
    \n您可以使用返回该房间配件数组的 `HMRoom` 方法，从房间中获取配件列表。\n\n```\nvar accessories: [HMAccessory]\n\
    ```\n\n由于配件由 `HMHome` 添加和移除，您可以使用 `HMHome` 来移动它们：\n\n```\nfunc assignAccessory(_\
    \ accessory: HMAccessory,\nto room: HMRoom,\ncompletionHandler completion: (Error?)\
    \ -> Void)\n```\n\n### 编辑配件\n\n您可以在一个视图中查看配件信息，该视图因配件类型而异。例如，如果您在图 6-5 中长按一个配件，您可能会看到图\
    \ 6-7 所示的视图，它代表一个灯泡。\n\n![A367674_1_En_6_Fig7_HTML.jpg](img/A367674_1_En_6_Fig7_HTML.jpg)\n\
    \n图 6-7. 编辑配件详情\n\n就“家庭”应用的界面而言，您可以通过在用户界面中长按配件来编辑其对房间可见的常规信息。图 6-8 和 6-9 向您展示了该用户界面。它适用于所有类型的配件。\n\
    \n![A367674_1_En_6_Fig9_HTML.jpg](img/A367674_1_En_6_Fig9_HTML.jpg)\n\n图 6-9.\
    \ 设置数值（底部）\n\n![A367674_1_En_6_Fig8_HTML.jpg](img/A367674_1_En_6_Fig8_HTML.jpg)\n\
    \n图 6-8. 设置数值（顶部）\n\n**注意：** 第 7 章将提供更多关于配件的内容。\n"
- fmt: '# 7. Dive into Accessories


    When it comes to home automation, the basics are homes, rooms, and devices. This
    applies to any home automation environment. Generally, you can adjust the settings
    on the devices (most often bulbs for many people), and you can combine devices
    with their settings into scenes. A timing mechanism lets you turn scenes on and
    off.


    HomeKit goes beyond the basics in two important ways.


    - HomeKit is built as a home for third-party devices and apps. Apple is starting
    with the framework and the database and building it out for others to flesh out.
    At this point (and, rumor has it, for the future), Apple is not developing HomeKit
    devices. For those of us who are into software design, starting from the logic
    first is a great way to work (it’s what we do every day). Apple’s involvement
    with the hardware for home automation consists of its certification program for
    devices that work with HomeKit.

    - HomeKit is positioned as a component of the Apple devices on which it is pre-installed.
    The `Home` app is part of iOS 10, so it’s ready for anyone who wants to connect
    devices to it.


    Chapter [6](#A367674_1_En_6_Chapter.html) describes the devices for home automation
    fairly generically. You’ve seen the code to add accessories to rooms and how to
    add rooms to homes, but the basic code there doesn’t require too much exploration
    inside the HomeKit classes that support accessories.


    This chapter goes inside accessories. They are the features of HomeKit that actually
    provide the user benefits, and they are implemented in simple, elegant, and powerful
    classes.


    Rooms within a home are a fairly simple case if only because both the home and
    the room are physical objects, and in practice rooms are fairly static. When you
    think about it, changes to rooms within a home are frequently changes in name
    (e.g., the nursery becomes the study). It’s true that accessories are a different
    matter if only because they tend to move around. (That lamp that used to be in
    the living room may be moved to a bedroom.)


    ## Building Accessories


    In order to build actual accessories (rather than buying pre-built accessories
    online or in a store), you need to join the `MFi` program. Once you are licensed,
    you will have access to HomeKit technical specifications (i.e., physical specifications
    as opposed to the API specifications that you get as a registered developer).
    You also have access to hardware technical support and marketing materials (e.g.,
    the `MFi` logo). Find out more at the `MFi` FAQ page: [`https://mfi.apple.com/MFiWeb/getFAQ.action`](https://mfi.apple.com/MFiWeb/getFAQ.action).


    ## Working with Accessories


    You have seen the basics of what an accessory is in this book so far. In Chapter
    [6](#A367674_1_En_6_Chapter.html), you’ve also seen the basics of the API (application
    program interface) to set up an accessory. Beyond that, the best way to learn
    what an accessory is to create one using the `HomeKit Accessory Simulator`. (Remember
    that the accessory itself may not yet exist if you’re working on a development
    project that combines new accessories with a new HomeKit app.)


    There are two key questions you have to answer about your accessories.


    - What is the accessory—its name and some descriptive information about it?

    - What does the accessory do? Obviously, this is related to what it is, but it
    is not always clear just from the description of the accessory. In HomeKit terms,
    what service does the accessory provide?


    If you are going to be developing an app for HomeKit (perhaps a version of the
    `Home` app that is focused on your particular functionality and issues as you’ll
    see in Chapter [8](#A367674_1_En_8_Chapter.html)), you can simulate accessories
    without buying them (or even before they have been fully developed). Get started
    by following the instructions on the Developer Site to download the `HomeKit Accessory
    Simulator` from [`https://developer.apple.com/library/prerelease/content/documentation/NetworkingInternet/Conceptual/HomeKitDeveloperGuide/TestingYourHomeKitApp/TestingYourHomeKitApp.html`](https://developer.apple.com/library/prerelease/content/documentation/NetworkingInternet/Conceptual/HomeKitDeveloperGuide/TestingYourHomeKitApp/TestingYourHomeKitApp.html).


    When you create a new accessory in the `HomeKit Accessory Simulator`, you see
    the view shown in Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1).


    ![A367674_1_En_7_Fig1_HTML.jpg](A367674_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. Create a new accessory with `HomeKit Accessory Simulator`


    ## What Is an Accessory?


    Create a new accessory by launching the `HomeKit Accessory Simulator` and choosing
    File ➤ New ➤ Accessory to open the modal view shown in Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1).
    You can also create a new bridge, but the accessory choice is the most common
    one.


    You can read this section as a how-to of how to build an accessory in the simulator,
    but you can also read it as the ultimate definition of what an accessory is. In
    that view, remember that the accessory also has the following properties:


    ```

    var uniqueIdentifier: UUID

    var uniqueIdentifiersForBridgedAccessories: [UUID]?

    ```


    As you do in other cases, you assign a delegate to an accessory (it is optional
    so not every accessory has a delegate). You might have a delegate for each accessory
    or one for all of them. Whatever the delegate is, it implements these methods.
    As you can see, the accessory’s delegate finds out when there are changes so whatever
    is needed to be done can be done. The delegate implements the `HMAccessoryDelegate`
    protocol:


    ```

    func accessoryDidUpdateName(HMAccessory)

    func accessoryDidUpdateReachability(HMAccessory)

    func accessoryDidUpdateServices(HMAccessory)

    func accessory(HMAccessory, didUpdateNameFor: HMService)

    func accessory(HMAccessory, service: HMService, didUpdateValueFor: HMCharacteristic)

    func accessory(HMAccessory, didUpdateAssociatedServiceTypeFor: HMService)

    ```'
