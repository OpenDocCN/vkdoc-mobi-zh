- fmt: "## Working with Events\n\nEvents are often things that happen outside the\
    \ world of HomeKit (often, but not always). They fall into two groups which are\
    \ subclasses of `HMEvent`. The subclasses are `HMLocationEvent` and `HMCharacteristicEvent`.\
    \ `HMEvent` itself contains a universally unique identifier (UUID) called `uniqueIdentifier`.\
    \ Any other properties are properties of subclasses. As you’ll see when you start\
    \ to use events in triggers, this abstract superclass is a key component of triggers\
    \ because although geofencing is very different from the state of an accessory’s\
    \ data, both geofencing and characteristics are the same when they become part\
    \ of triggers.\n\n> **Tip**  \n> You may want to think of an event as a noun—that\
    \ is, a thing.\n\n### Geofencing with Location Events\n\nA location event is a\
    \ geofence event. Its basic property is a `CLRegion` (i.e., a region as defined\
    \ in `CLLocationManager` in the Core Location framework).\n\nThe heart of an `HMLocationEvent`\
    \ is its region which is represented by its sole property.\n\n```\nvar region:\
    \ CLRegion?\n```\n\nYou create an `HMLocationEvent` with a region, and you can\
    \ update that region as necessary.\n\n```\ninit(region: CLRegion)\nfunc updateRegion(_\
    \ region: CLRegion, completionHandler completion: (Error?) -> Void)\n```\n\n###\
    \ Monitoring Characteristic Events\n\nA characteristic event is an event that\
    \ represents a certain value of an accessory characteristic. For example, a characteristic\
    \ event for a door lock could be that it is locked or unlocked. A characteristic\
    \ event for a smoke detector could be that it senses smoke. And, very simply,\
    \ a characteristic event for a light bulb could be that it is on or off.\n\n>\
    \ **Tip**  \n> You may want to think of a characteristic as an adjective—that\
    \ is, a modifier or description of an object.\n\nThus for an `HMCharacteristicEvent`,\
    \ two properties are involved: the characteristic (lock) and the value that you\
    \ care about (secured/unsecured).\n\nThe two properties of `HMCharacteristicEvent`\
    \ are\n\n```\nvar characteristic: HMCharacteristic\nvar triggerValue: TriggerValueType?\n\
    ```\n\nYou can initialize an `HMCharacteristicEvent` with a characteristic and\
    \ an optional value. Because `triggerValue` can be null, you can come back later\
    \ on (or the user can come back) to specify a value (that is what “optional” means\
    \ in Swift — it can have no value). A binary condition such as secured/unsecured\
    \ doesn’t lend itself to this, but a temperature sensor certainly does.\n\n```\n\
    init(characteristic: HMCharacteristic, triggerValue: TriggerValueType?)\nfunc\
    \ updateTriggerValue(_ triggerValue: TriggerValueType?, completionHandler completion:\
    \ (Error?) -> Void)\n```\n\n## Working with Triggers\n\nTriggers execute action\
    \ sets (`HMActionSet`) which themselves consist of actions (they’re described\
    \ in the following section). `HMTrigger` is an abstract class: You typically implement\
    \ (or subclass) one of the primary `HMTrigger` subclasses—`HMTimerTrigger` or\
    \ `HMEventTrigger`. Triggers are said to fire when a certain event occurs (i.e.,\
    \ when you enter or leave the region of an `HMLocationEvent` or when a characteristic\
    \ of an accessory in an `HMCharacteristicEvent` takes on the trigger value you’re\
    \ waiting for.)\n\nTriggers are identified by names and UUIDs. Both are created\
    \ when a trigger is created. Names can be updated as needed (the update function\
    \ allows a delegate to notice that the name has been changed).\n\n```\nvar name:\
    \ String\nfunc updateName(_ name: String, completionHandler completion: (Error?)\
    \ -> Void)\nvar uniqueIdentifier: UUID\n```\n\nIn addition to the static name\
    \ and UUID, it’s important to control whether or not a trigger is enabled and\
    \ the last time it fired:\n\n```\nvar isEnabled: Bool\nfunc enable(_ enable: Bool,\
    \ completionHandler completion: (Error?) -> Void)\nvar lastFireDate: Date?\n```\n\
    \n> **Note**  \n> `lastFireDate` is an optional because the trigger may never\
    \ have been fired. Also, remember that the `Date` type is actually a bridge to\
    \ `NSDate` in the Foundation framework. `NSDate` is a single point in time and\
    \ is not specific to a calendar, time zone, or location.\n\n### Using a Basic\
    \ Trigger\n\nThe action sets for a trigger are managed by the following methods:\n\
    \n```\nvar actionSets: [HMActionSet]\nfunc addActionSet(_ actionSet: HMActionSet,\
    \ completionHandler completion: (Error?) -> Void)\nfunc removeActionSet(_ actionSet:\
    \ HMActionSet, completionHandler completion: (Error?) -> Void)\n```\n\n### Adding\
    \ Conditions to Triggers with Predicates\n\nEvent triggers can use predicates\
    \ to add conditions that must be true for the event trigger to fire.\n\nPredicates\
    \ are a basic part of the Cocoa and Cocoa Touch foundation framework. They are\
    \ a way of describing a Boolean condition to use in retrieving data from a data\
    \ store or for any other case in which you need a Boolean such as defining a condition\
    \ for an event trigger."
  raw: '## Working with Events


    Events are often things that happen outside the world of HomeKit (often, but not
    always). They fall into two groups which are subclasses of `HMEvent.` The subclasses
    are `HMLocationEvent` `and` `HMCharacteristicEvent`. `HMEvent` itself contains
    a universally unique identifier (UUID) called `uniqueIdentifier` . Any other properties
    are properties of subclasses. As you’ll see when you start to use events in triggers,
    this abstract superclass is a key component of triggers because although geofencing
    is very different from the state of an accessory’s data, both geofencing and characteristics
    are the same when they become part of triggers.


    Tip


    You may want to think of an event as a noun—that is, a thing.


    ### Geofencing with Location Events


    A location event is a geofence event. Its basic property is a CLRegion (i.e.,
    a region as defined in CLLocationManager in the Core Location framework).


    The heart of an `HMLocationEvent` is its region which is represented by its sole
    property.


    ```

    var region: CLRegion?

    ```


    You create an `HMLocation` event with a region, and you can update that region
    as necessary.


    ```

    init(region: CLRegion)

    func updateRegion(_ region: CLRegion, completionHandler completion: (Error?) ->
    Void)

    ```


    ### Monitoring Characteristic Events


    A characteristic event is an event that represents a certain value of an accessory
    characteristic. For example, a characteristic event for a door lock could be that
    it is locked or unlocked. A characteristic event for a smoke detector could be
    that it senses smoke. And, very simply, a characteristic event for a light bulb
    could be that it is on or off.


    Tip


    You may want to think of a characteristic as an adjective—that is, a modifier
    or description of an object.


    Thus for an `HMCharacteristicEvent`, two properties are involved: the characteristic
    (lock) and the value that you care about (secured/unsecured).


    The two properties of `HMCharacteristicEvent` are


    ```

    var characteristic: HMCharacteristic

    var triggerValue: TriggerValueType?

    ```


    You can initialize an `HMCharacteristicEvent` with a characteristic and an optional
    value. Because `triggerValue` can be null, you can come back later on (or the
    user can come back) to specify a value (that is what “optional” means in Swift
    — it can have no value). A binary condition such as secured/unsecured doesn’t
    lend itself to this, but a temperature sensor certainly does.


    ```

    init(characteristic: HMCharacteristic, triggerValue: TriggerValueType?)

    func updateTriggerValue(_ triggerValue: TriggerValueType?, completionHandler completion:
    (Error?) -> Void)

    ```


    ## Working with Triggers


    Triggers execute action sets (`HMActionSet`) which themselves consist of actions
    (they’re described in the following section). `HMTrigger` is an abstract class:
    You typically implement (or subclass) one of the primary `HMTrigger` subclasses—`HMTimerTrigger`
    or `HMEventTrigger`. Triggers are said to fire when a certain event occurs (i.e.,
    when you enter or leave the region of an `HMLocationEvent` or when a characteristic
    of an accessory in an `HMCharacteristicEvent` takes on the trigger value you’re
    waiting for.)


    Triggers are identified by names and UUIDs. Both are created when a trigger is
    created. Names can be updated as needed (the update function allows a delegate
    to notice that the name has been changed).


    ```

    var name: String

    func updateName(_ name: String, completionHandler completion: (Error?) -> Void)

    var uniqueIdentifier: UUID

    ```


    In addition to the static name and UUID, it’s important to control whether or
    not a trigger is enabled and the last time it fired:


    ```

    var isEnabled: Bool

    func enable(_ enable: Bool, completionHandler completion: (Error?) -> Void)

    var lastFireDate: Date?

    ```


    Note


    `lastFireDate` is an optional because the trigger may never have been fired. Also,
    remember that the `Date` type is actually a bridge to `NSDate` in the Foundation
    framework. `NSDate` is a single point in time and is not specific to a calendar,
    time zone, or location.


    ### Using a Basic Trigger


    The action sets for a trigger are managed by the following methods:


    ```

    var actionSets: [HMActionSet]

    func addActionSet(_ actionSet: HMActionSet, completionHandler completion: (Error?)
    -> Void)

    func removeActionSet(_ actionSet: HMActionSet, completionHandler completion: (Error?)
    -> Void)

    ```


    ### Adding Conditions to Triggers with Predicates


    Event triggers can use predicates to add conditions that must be true for the
    event trigger to fire.


    Predicates are a basic part of the Cocoa and Cocoa Touch foundation framework.
    They are a way of describing a Boolean condition to use in retrieving data from
    a data store or for any other case in which you need a Boolean such as defining
    a condition for an event trigger.'
  trans: "\n## 使用事件\n\n事件通常是发生在 HomeKit 世界之外的事情（通常，但不总是如此）。它们可分为两类，分别是 `HMEvent` 的子类。这两个子类是\
    \ `HMLocationEvent` 和 `HMCharacteristicEvent`。`HMEvent` 本身包含一个名为 `uniqueIdentifier`\
    \ 的通用唯一标识符 (UUID)。其他任何属性都是子类的属性。当你开始在触发器中使用事件时，你会发现这个抽象超类是触发器的关键组成部分，因为尽管地理围栏与配件的状态数据截然不同，但当地理围栏和特征成为触发器的一部分时，它们本质上是相同的。\n\
    \n> **提示**  \n> 你可以将事件视为一个名词——即一个事物。\n\n### 使用位置事件进行地理围栏\n\n位置事件是一种地理围栏事件。其基本属性是\
    \ `CLRegion`（即 Core Location 框架中 `CLLocationManager` 定义的一个区域）。\n\n`HMLocationEvent`\
    \ 的核心是其区域，由它的唯一属性表示。\n\n```\nvar region: CLRegion?\n```\n\n你可以通过一个区域来创建 `HMLocationEvent`，并且可以根据需要更新该区域。\n\
    \n```\ninit(region: CLRegion)\nfunc updateRegion(_ region: CLRegion, completionHandler\
    \ completion: (Error?) -> Void)\n```\n\n### 监控特征事件\n\n特征事件是表示配件特征特定值的事件。例如，门锁的特征事件可以是已锁或未解锁。烟雾探测器的特征事件可以是感应到烟雾。再简单一点，灯泡的特征事件可以是开启或关闭。\n\
    \n> **提示**  \n> 你可以将特征视为一个形容词——即对某个对象的修饰或描述。\n\n因此，对于 `HMCharacteristicEvent`，涉及两个属性：特征（如锁）以及你关心的值（如已锁定/未锁定）。\n\
    \n`HMCharacteristicEvent` 的两个属性是：\n\n```\nvar characteristic: HMCharacteristic\n\
    var triggerValue: TriggerValueType?\n```\n\n你可以通过一个特征和一个可选值来初始化 `HMCharacteristicEvent`。由于\
    \ `triggerValue` 可以为 null，你可以稍后再回来（或者由用户回来）指定一个值（这就是 Swift 中“可选”的含义——它可能没有值）。像“已锁定/未锁定”这样的二元条件不适合这种情况，但温度传感器肯定适合。\n\
    \n```\ninit(characteristic: HMCharacteristic, triggerValue: TriggerValueType?)\n\
    func updateTriggerValue(_ triggerValue: TriggerValueType?, completionHandler completion:\
    \ (Error?) -> Void)\n```\n\n## 使用触发器\n\n触发器执行操作集（`HMActionSet`），操作集本身由操作组成（下一节将介绍）。`HMTrigger`\
    \ 是一个抽象类：你通常实现（或继承）主要的 `HMTrigger` 子类之一——`HMTimerTrigger` 或 `HMEventTrigger`。当特定事件发生时（即，当你进入或离开\
    \ `HMLocationEvent` 的区域，或者当 `HMCharacteristicEvent` 中配件的特征达到你等待的触发器值时），触发器就会被触发。\n\
    \n触发器通过名称和 UUID 来标识。两者都在创建触发器时创建。名称可以根据需要更新（更新函数允许委托注意到名称已被更改）。\n\n```\nvar name:\
    \ String\nfunc updateName(_ name: String, completionHandler completion: (Error?)\
    \ -> Void)\nvar uniqueIdentifier: UUID\n```\n\n除了静态的名称和 UUID 之外，控制触发器是否启用以及上次触发的时间也很重要：\n\
    \n```\nvar isEnabled: Bool\nfunc enable(_ enable: Bool, completionHandler completion:\
    \ (Error?) -> Void)\nvar lastFireDate: Date?\n```\n\n> **注意**  \n> `lastFireDate`\
    \ 是可选的，因为触发器可能从未被触发过。另外，请记住 `Date` 类型实际上是 Foundation 框架中 `NSDate` 的桥接。`NSDate`\
    \ 表示时间线上的一个点，并不具体对应某个日历、时区或位置。\n\n### 使用基本触发器\n\n触发器的操作集通过以下方法管理：\n\n```\nvar\
    \ actionSets: [HMActionSet]\nfunc addActionSet(_ actionSet: HMActionSet, completionHandler\
    \ completion: (Error?) -> Void)\nfunc removeActionSet(_ actionSet: HMActionSet,\
    \ completionHandler completion: (Error?) -> Void)\n```\n\n### 使用谓词为触发器添加条件\n\n\
    事件触发器可以使用谓词来添加条件，这些条件必须为真，事件触发器才会触发。\n\n谓词是 Cocoa 和 Cocoa Touch 基础框架的基本组成部分。它们是一种描述布尔条件的方法，可用于从数据存储中检索数据，或用于任何其他需要布尔值的场景，例如为事件触发器定义条件。\n"
- fmt: '# Working with Actions


    As a developer or designer, you generally deal with actions in order to set up
    the user interface that allows users to put them together so that they can be
    triggered by events. The actual running of an action or action set happens when
    the trigger fires. An action can be used to turn an accessory on or off or to
    adjust its characteristics (such as brightness or color).


    > **Tip:** You may want to think of an action as a verb—that is, an action in
    the common everyday use of the word.


    Most of the time, you work with action sets (`HMActionSet`) which themselves consist
    of sets of actions (`HMAction`).


    > **Note:** Set is used in its technical sense of an unordered collection of items.
    This means that the actions within an action set will execute in an unspecified
    order. It is sometimes the case that those actions will execute in the order in
    which they have been specified, but that is happenstance. This can be important
    in tracking down apparent bugs.


    Action sets have names and `UUID`s. Siri recognizes the names of action sets.
    Your code makes it possible for users to build on it in creating their own HomeKit
    environments.


    Action sets consist of actions, but actions are specific subclasses of `HMAction`.
    `HMAction` is an abstract class which means that you don’t directly create instances
    of it. You create specific instances of classes such as `HMCharacteristicWriteAction`
    which itself writes a specific value to a characteristic of an accessory. Following
    is the declaration of the method you’ll use:


    ```

    init(characteristic: HMCharacteristic, targetValue: TargetValueType)

    ```


    As you saw in Chapter [7](#A367674_1_En_7_Chapter.html), accessories can have
    characteristics and services. To find a specific service to use in allowing users
    to set up an action set, you can use a function such as this one to find the services
    for a given accessory you can use this variable of `HMAccessory` on the specific
    accessory the user wants to work with:


    ```

    var services: [HMService] { get }

    ```


    If you don’t happen to have the specific accessory when you are writing the characteristic,
    you can find it with the following method of `HMHome`, which lets you find services
    by their type in the entire home:


    ```

    func servicesWithTypes(_ serviceTypes: [String]) -> [HMService]?

    ```


    Note that this function returns an optional: there may be no services of a given
    type and your code must handle this case.


    Services and characteristics are linked to one another, so when you have an `HMCharacteristic`,
    you usually have a related service. Likewise, when you have an `HMService` you
    can find its characteristics.


    Following is the property in `HMCharacteristic` you can use to get its service:


    ```

    var service: HMService?

    ```


    Starting from an `HMService` object, here’s how you find its accessory:


    ```

    var accessory: HMAccessory?

    ```


    Note that working either from an accessory or a characteristic, you can get the
    other with the very important caveat that both of these properties are optionals
    so they may not exist. That would particularly be the case as users are setting
    up their home and have not yet completed the task in many cases. Don’t assume
    that a user setting up a home tidies up all the loose ends.


    There are valid reasons why there may be “orphan” scenes as users are experimenting.
    Also, remember that you are dealing with devices that have their own issues regarding
    power and other factors. Although the light bulbs that are manufactured today
    are estimated to have life spans measured in years—many years—they will eventually
    fail. Wired connections such as to a power supply or wall outlet are subject to
    the vicissitudes of cable issues ranging from becoming unplugged to being accidentally
    plugged into an outlet that is controlled by a switch.


    This last is a common issue for many people. You often find a wall outlet with
    two sockets one of which is controlled by a switch. This means that a wall switch
    can turn on a light connected to the switched outlet while the other one is always
    on for a device such as an electric clock, humidifier, or something else that
    should remain on at all times. You may know this and even remember it over the
    years, but someone who does a big house-cleaning project may unplug both plugs
    to move the sofa and your HomeKit-controlled lamp winds up in the switched socket.


    # Working with iCloud and Users with HomeKit


    HomeKit works with the networks it finds. The most basic level of communication
    is between an accessory and your HomeKit hub which typically is either an Apple
    TV or an iPad—or both. For short distances (such as within your home, HomeKit
    uses a WiFi network or Bluetooth Low Energy (Bluetooth LE).


    Beyond the home, HomeKit uses an Apple ID over whatever network it can find. With
    the advent of iOS 10 and the Home app (pre-installed on iPads), HomeKit is more
    available than ever.


    This chapter helps you use some of the networking capabilities of HomeKit.


    > **Warning:** Your hub needs to be powered on at all times for your HomeKit actions
    to work. Remember that when you define an automation that turns a scene on (see
    Chapter [8](#A367674_1_En_8_Chapter.html)), HomeKit uses the triggers to launch
    scenes. If you power on a device or hub after a trigger should have fired (or
    actually did fire but the accessory wasn’t powered on), nothing happens until
    the next trigger opportunity arises. If that’s a time of day, the next opportunity
    is the next day.


    ## Setting Up Hubs


    Your hub needs to be powered on all the time and it needs network connections.
    For most people, this means making certain that the hub itself (Apple TV or iPad)
    can use Bluetooth and a WiFi network. For remote access, the hub needs to be connected
    to the Internet (usually this is via the WiFi connection).


    ### Apple TV


    For Apple TV, you need to make certain that HomeKit is enabled. For starters,
    make certain that the Apple TV uses the same Apple ID you use (or will use) for
    your HomeKit hub. (This is not an issue for the many people who use a single Apple
    ID.)


    On your Apple TV, go to Settings, as shown in Figure [9-1](#A367674_1_En_9_Chapter.html#Fig1).


    ![A367674_1_En_9_Fig1_HTML.jpg](A367674_1_En_9_Fig1_HTML.jpg)


    Figure 9-1. Go to Settings on Apple TV


    Select Accounts to set up your Apple ID for HomeKit. As you see in Figure [9-2](#A367674_1_En_9_Chapter.html#Fig2),
    you need to set an Apple ID for Home Sharing (that’s the Settings term for HomeKit.)


    ![A367674_1_En_9_Fig2_HTML.jpg](A367674_1_En_9_Fig2_HTML.jpg)


    Figure 9-2. Set the Apple ID account


    If, at some point in the future, you want to turn off the Apple TV as a hub, turn
    it off as you see in Figure [9-3](#A367674_1_En_9_Chapter.html#Fig3) where the
    Home Sharing account is being turned off.


    ![A367674_1_En_9_Fig3_HTML.jpg](A367674_1_En_9_Fig3_HTML.jpg)


    Figure 9-3. Turn home sharing off


    ### iPad


    The process for setting up an iPad as a hub is a little different. Go to Settings
    on the iPad and then find Home as you see in Figure [9-4](#A367674_1_En_9_Chapter.html#Fig4).
    You can have several HomeKit hubs sharing the same Apple ID if you want.


    ![A367674_1_En_9_Fig4_HTML.jpg](A367674_1_En_9_Fig4_HTML.jpg)


    Figure 9-4. Make an iPad a HomeKit hub


    ## Setting Up Users


    In addition to your hubs, you can set up users for HomeKit. Everyone who shares
    the Apple ID you’ve used to set up HomeKit can log on with his or her own Apple
    ID, but you can ask other people to join.'
