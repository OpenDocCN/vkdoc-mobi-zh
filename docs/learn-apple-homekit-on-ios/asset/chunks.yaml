  trans: '

    ## 添加并配置家庭


    您可以看到默认的家庭，并且可能已经探索过它了。现在是时候创建您自己的家庭了。要添加新家庭，请点击之前图 2-9 所示窗口左上角的箭头。您将看到如图 2-10
    所示的“添加家庭”提示。


    ![A367674_1_En_2_Fig10_HTML.jpg](img/A367674_1_En_2_Fig10_HTML.jpg)


    图 2-10. 添加家庭


    如图 2-10 所示，您可以命名您的家庭。之后您可以邀请他人来控制家庭的配件（这将在第 3 章中讨论）。您可以为家庭墙纸拍照，或从现有图片中选择。稍后您可以返回此处重命名家庭、更改墙纸，或邀请他人控制配件。


    ## 编辑或添加房间


    使用家庭窗口底部标签栏中的“房间”标签来查看您的房间。使用窗口左上角的列表图标查看房间选项，如图 2-11 所示。您可以配置当前查看的房间，或添加新房间。


    ![A367674_1_En_2_Fig11_HTML.jpg](img/A367674_1_En_2_Fig11_HTML.jpg)


    图 2-11. 管理房间


    如果选择“房间设置”，您将看到如图 2-12 所示的提示，其中可以添加新房间或配置现有房间。


    ![A367674_1_En_2_Fig12_HTML.jpg](img/A367674_1_En_2_Fig12_HTML.jpg)


    图 2-12. 添加或配置房间


    请记住，默认房间的名称是“默认房间”。使用其名称右侧的展开三角形来重命名它（或任何房间）。当您点击展开三角形时，可以设置房间数据，如图 2-13 所示。


    ![A367674_1_En_2_Fig13_HTML.jpg](img/A367674_1_En_2_Fig13_HTML.jpg)


    图 2-13. 配置房间


    请注意这里的模式：为家庭、房间或（下一节中的）配件设置名称。从现有图片设置其墙纸或拍照。这就是常规操作：命名、墙纸、完成（右上角）或取消（左上角）。


    ## 添加并配置配件


    配件是灯具、车库门或任何 HomeKit 可识别并控制的设备。从家庭或房间（通过屏幕底部的标签栏切换）右上角的 `+` 添加配件。图 2-14 展示了向家庭添加配件的过程。


    ![A367674_1_En_2_Fig14_HTML.jpg](img/A367674_1_En_2_Fig14_HTML.jpg)


    图 2-14. 添加并配置配件


    注意：场景是配件与时间表的组合。您可以用它们来将家庭自动化的各个部分整合在一起。相关内容将在第 3 章讨论。


    添加配件会启动一个流程，HomeKit 会搜索该配件并为其配置 HomeKit。图 2-15 显示了初始界面，第 3 章描述了后续步骤。


    ![A367674_1_En_2_Fig15_HTML.jpg](img/A367674_1_En_2_Fig15_HTML.jpg)


    图 2-15. 开始配置配件


    # 3. 添加场景——HomeKit 的实践部分


    在第 2 章中，您看到了 HomeKit 家庭非常逻辑清晰且易于识别的结构：家庭包含房间，每个房间包含配件，例如灯具、烟雾或温度传感器，以及各种各样的设备，如车库门开启器（好吧，可能不在房间内）和自动窗帘。您可以使用
    HomeKit 管理所有房间和配件，将其打开或关闭，或调整其设置。您还可以使用 HomeKit 检查配件的设置，例如它们是否开启，以及它们的亮度和颜色（对于灯泡而言）。


    这是一个很好的结构，也非常易于理解。随着您阅读本书的深入，您将了解如何控制这些东西，并且当您进一步阅读时，您将发现如何使它们自动化。


    在许多方面，这种模式（家庭 ➤ 房间 ➤ 配件）就是您的日常生活。观察一下您在家时如何开关配件。对许多人来说，开关取决于一天中的时间、您在家中的位置以及您在做什么。当您进入一个小房间（尤其是在晚上）时，您会打开灯，而那个灯通常是天花板固定灯具。一个较大的房间可能只有一个天花板固定灯具，但在许多房间里，会有几盏灯，甚至可能根本没有天花板固定灯具。可能书桌上有一盏阅读/工作灯，安乐椅旁有一盏落地灯，也许还有一盏小夜灯，您会整夜开着它，防止人们（包括您自己）撞到家具。


    许多人将这些灯组织成组，这样只需一个开关就能同时打开多盏灯。晚上走进客厅，分别打开三盏不同的灯并不特别麻烦，但有了各种机械装置（例如电源板）就没有必要这么做了。


    ## 什么是场景？


    HomeKit 场景只是多灯场景的数字版本。一个场景是一组配件，每个配件都可以以其特定的设置添加到场景中。


    ### 创建基本场景


    您可以创建一个用于客厅傍晚的场景，该场景会打开沙发旁的落地灯以及书桌上的阅读灯。由于配件不仅限于灯具，这个傍晚场景还可以包括一个窗帘配件。当场景由配件构建而成时，您可以设置它们的属性，以便在刚刚描述的场景中，该场景可以正式定义如下：


    - 落地灯：暖白 (2550 K)，50% 亮度

    - 阅读灯：标准白 (2400 K)，80% 亮度

    - 窗帘：关闭


    色温


    色温（以开尔文为单位测量，缩写为 K）是对灯泡或其他光源发出的光线类型的描述。（实际比这更复杂——您可以在维基百科上找到极好的参考资料，网址为 [`en.wikipedia.org/w/index.php?title=Color_temperature&oldid=740585423`](https://en.wikipedia.org/w/index.php%3Ftitle=Color_temperature%26oldid=740585423)。在不深入细节的情况下，请考虑以下
    K 值及其代表含义（这些表示是主观的，并非正式分类的一部分）：


    - 1850 K：烛光

    - 2400 K：标准白炽灯泡

    - 2550 K：暖白炽灯泡

    - 3000 K：暖白紧凑型荧光灯泡

    - 6500 K：阴天日光

    - 15,000-27,000 K：晴朗蓝天


    可以创建另一个场景来结束夜晚。一个“准备睡觉”的场景可能如下所示：


    - 落地灯：暖白 (2550 K)，10% 亮度

    - 阅读灯：标准灯泡 (2400 K)，0% 亮度

    - 窗帘：关闭


    ### 场景可以涉及多个房间


    回想一下 家庭 ➤ 房间 ➤ 配件的模式，您可以看到这非常契合。但现在您可以以一种打破这种模式的方式来修改此场景。考虑上述傍晚场景的以下变体：


    - 落地灯：暖白 (2550 K)，50% 亮度

    - 阅读灯：标准灯泡 (2400 K)，80% 亮度

    - 窗帘：关闭

    - 床头灯：暖白 (2550 K)，75% 亮度


    在 家庭 ➤ 房间 ➤ 配件 模式中被打破的是，现在这个“准备睡觉”的场景包含了另一个房间的灯具（卧室的床头灯）。这一点很重要，无论您是手动从 iOS 设备使用场景，还是将其作为自动化的一部分。场景中的配件集合不依赖于这些配件所在的房间。如果您将配件从一个房间移动到另一个房间，场景仍然会起作用。（直到您意识到咖啡桌上的灯以前是在床头柜上时，您可能会对结果感到惊讶。）

