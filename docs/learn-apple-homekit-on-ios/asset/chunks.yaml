- fmt: '# Setting Up a Room


    Whether you start from the default room that is created for you by default or
    are creating your own rooms (maybe a tiny room that contains only that test lamp
    and bulb that you’re using for experimentation), you can configure the settings
    for each room.


    To start configuring a room, tap the `Rooms` button in the bottom toolbar. Use
    the `List` button in the top left to show a list of rooms as shown in Figure [5-4](#A367674_1_En_5_Chapter.html#Fig4).


    ![A367674_1_En_5_Fig4_HTML.jpg](A367674_1_En_5_Fig4_HTML.jpg)


    Figure 5-4. Show the list of rooms


    To add or remove accessories for a room, tap the room name, and you’ll move to
    that room.


    If you want to edit a room’s settings, tap `Room Settings`. You’ll see the list
    of Rooms in a different format as shown in Figure [5-5](#A367674_1_En_5_Chapter.html#Fig5).


    ![A367674_1_En_5_Fig5_HTML.jpg](A367674_1_En_5_Fig5_HTML.jpg)


    Figure 5-5. Choose a room to edit


    Tap the disclosure triangle at the right of the room you want to edit. (Remember,
    you’re editing the room’s description: to edit the accessories in a room, just
    select the room from the list in the top left.) You’ll see the view shown in Figure
    [5-6](#A367674_1_En_5_Chapter.html#Fig6). Here’s where you can rename the room,
    choose the wallpaper (or take a photo of the actual room to use as a background),
    or even remove the room from HomeKit.


    ![A367674_1_En_5_Fig6_HTML.jpg](A367674_1_En_5_Fig6_HTML.jpg)


    Figure 5-6. Edit a room


    To edit an accessory in a room (you’ll see how to add an accessory shortly), press
    and hold the accessory. (If you just tap it, you’ll turn the accessory on or off.)
    Figure [5-7](#A367674_1_En_5_Chapter.html#Fig7) shows the `Details` view.


    ![A367674_1_En_5_Fig7_HTML.jpg](A367674_1_En_5_Fig7_HTML.jpg)


    Figure 5-7. Edit accessories in a room


    The `Details` view for an accessory depends on the accessory: HomeKit displays
    whatever the accessory provides. (Supporting these accessories in code is the
    topic of the next two chapters.)


    To edit the details of an accessory, tap `Details` in the lower right of the view
    shown in Figure [5-7](#A367674_1_En_5_Chapter.html#Fig7) to open the details shown
    in Figure [5-8](#A367674_1_En_5_Chapter.html#Fig8). These are mostly the HomeKit
    settings, and they’re basically the same for all accessories. Here is where you
    can move an accessory from one room to another (just tap `Location` to get a list
    to choose from). You can also choose to show this accessory in Favorites on the
    home screen.


    ![A367674_1_En_5_Fig8_HTML.jpg](A367674_1_En_5_Fig8_HTML.jpg)


    Figure 5-8. Edit accessory details


    The `Status` button will let you choose whether this accessory will be shown in
    the overview items.


    If you have added a hub such as the Hue bridge, here is where you can configure
    it as you can see in Figure [5-9](#A367674_1_En_5_Chapter.html#Fig9).


    ![A367674_1_En_5_Fig9_HTML.jpg](A367674_1_En_5_Fig9_HTML.jpg)


    Figure 5-9. Configure a bridge


    Merely connecting the bridge according to the manufacturer’s instructions may
    be sufficient at this point. If the hub accessories don’t show up, here is where
    you start to troubleshoot. You may need to compare HomeKit documentation with
    documentation from the hub manufacturer. Online help on web sites and Twitter
    can be very helpful. Just be calm and remember that many people by now have managed
    the connection between the hub and HomeKit.


    # Using Automation


    The `Automation` tab in the bottom toolbar is the heart of HomeKit’s power. It
    lets you manage automations—sequences of commands that can affect one or more
    accessories (e.g., the accessories in a room). Begin by tapping the `Automation`
    tab as shown in Figure [5-10](#A367674_1_En_5_Chapter.html#Fig10).


    ![A367674_1_En_5_Fig10_HTML.jpg](A367674_1_En_5_Fig10_HTML.jpg)


    Figure 5-10. Create an automation


    Automations come in three varieties as you’ll see on the next screen (shown in
    Figure [5-11](#A367674_1_En_5_Chapter.html#Fig11)). Although they appear different,
    they really are the same: it’s only the triggering event that differs. (That event
    is called a trigger for that reason.)


    ![A367674_1_En_5_Fig11_HTML.jpg](A367674_1_En_5_Fig11_HTML.jpg)


    Figure 5-11. Set a trigger for when you leave or arrive


    ## Automating Location Changes


    The first trigger relies on your location, and that means it relies on your iPhone.
    As you can see in Figure [5-11](#A367674_1_En_5_Chapter.html#Fig11), you can set
    the trigger to occur when you leave or arrive.


    Although the example on the screen shows home, in fact, you can set the automation
    to any address that you have in `Contacts`. When you tap `Next` at the top right,
    you’ll see a list of your contact addresses as shown in Figure [5-12](#A367674_1_En_5_Chapter.html#Fig12).
    Just tap the one you want to use.


    ![A367674_1_En_5_Fig12_HTML.jpg](A367674_1_En_5_Fig12_HTML.jpg)


    Figure 5-12. Choose the address to use


    ## Automating Time of Day


    You can also set an automation to run at a certain time of day (or several days).
    If you choose that option, you’ll be able to add the details as shown in Figure
    [5-13](#A367674_1_En_5_Chapter.html#Fig13). Sunrise and sunset are managed for
    you automatically by Siri and HomeKit, and you can set the time. Most people use
    automations on a repeat basis, so you can choose the time (or sunrise/sunset)
    and tap the day(s) on which you want the automation to run. `Every Day` in the
    bottom left will do just that.


    ![A367674_1_En_5_Fig13_HTML.jpg](A367674_1_En_5_Fig13_HTML.jpg)


    Figure 5-13. Manage the time and repetition settings


    Note that this type of automation is designed to repeat. You can use it on a one-time
    basis, but there is no way to specify a particular date. By default, it will run
    at the chosen time on the next day you have selected.


    ## Letting Accessories Control Automations


    Perhaps the most interesting type of automation is one that is triggered by another
    accessory. You control this by selecting the accessory in the room that you’re
    interested in as shown in Figure [5-14](#A367674_1_En_5_Chapter.html#Fig14). (Tap
    the circle in the top right of an accessory to choose it.)


    ![A367674_1_En_5_Fig14_HTML.jpg](A367674_1_En_5_Fig14_HTML.jpg)


    Figure 5-14. Let an accessory trigger an automation


    Once you’ve selected the triggering accessory, set the action it performs that
    will trigger the automation as you can see in Figure [5-15](#A367674_1_En_5_Chapter.html#Fig15).
    (The actions you can choose from differ for each type of accessory.)


    ![A367674_1_En_5_Fig15_HTML.jpg](A367674_1_En_5_Fig15_HTML.jpg)


    Figure 5-15. Select the triggering action


    You have the accessory and the action that you want to trigger your automation.
    On the next screen select the accessory (or accessories with multiple choices)
    you want to respond to that trigger as shown in Figure [5-16](#A367674_1_En_5_Chapter.html#Fig16).
    (Scenes are described later on, but they basically work the same way as accessories
    in this context.)


    ![A367674_1_En_5_Fig16_HTML.jpg](A367674_1_En_5_Fig16_HTML.jpg)


    Figure 5-16. Choose the scene(s) or accessory(ies) to automate


    The last step is to provide the details of what this automation should do with
    what accessory(ies) on the next screen, shown in Figure [5-17](#A367674_1_En_5_Chapter.html#Fig17).


    ![A367674_1_En_5_Fig17_HTML.jpg](A367674_1_En_5_Fig17_HTML.jpg)


    Figure 5-17. Specify the action to perform'
