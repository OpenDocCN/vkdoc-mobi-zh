    Delaware corporation. Introduction


    HomeKit is something new from Apple. Something really new. It’s not a new device
    like an iPhone, an iPad, or even the Mac itself. And it’s not a new app like Pages,
    Keynote, or even Xcode, the heavy-duty app that is used by Apple and third-party
    developers to build apps as well as the operating systems themselves (macOS, iOS,
    tvOS, and now watchOS). HomeKit is basically a data management framework that
    manages home automation. It joins Apple’s HealthKit, which is another data management
    framework that focuses on health.


    There’s a pattern here. Apple is bringing its massive resources to a targeted
    database and framework in the expectation that third-party developers of software
    and hardware will gather around the framework. It’s no coincidence that HomeKit
    actually runs on the Apple iOS devices: as the HomeKit ecosystem grows, more and
    more people use it and appreciate the ease of use that comes with most of what
    Apple touches. The HomeKit framework is designed to support accessories such as
    lamps, doors and their locks, thermostats, sensors, and the other automated components
    of a home for the 21st century. And the fact that this flexible and powerful framework
    just happens to run on the Apple devices is a great incentive for Apple to have
    built it and to build it in such a way that it is robust enough to handle yet-undreamed-of
    devices from developers and vendors around the world.


    The architecture of a framework such as HomeKit (and HealthKit) is such that there’s
    a relatively modest investment of skill and time needed to extend and customize
    it for all of the third-party accessories that integrate with it. This is one
    way of whittling away at the enormous backlog of code that needs to be written
    to bring the benefits of modern technology to as many people as possible.


    This book provides you with two introductions to HomeKit. In the first chapters,
    you’ll see how to set up HomeKit in your home and how to manage your home’s accessories
    , rooms , and scenes (those everyday terms are used in HomeKit’s vocabulary with
    their everyday meanings).


    In the second part of the book, you’ll see how the point-and-tap commands from
    the first part of the book can be reimplemented in code so that you can build
    your own HomeKit apps that combine the components of HomeKit in new and different
    ways.


    As we move into this new type of technology (the kits of frameworks and data management),
    you can use HomeKit as your entrée to gain experience with a new way of working
    with technology. If you’re not particularly interested in how the software development
    world is changing with these kits, feel welcome: you can use HomeKit to manage
    your home’s rooms, scenes, and accessories.


    Managing your home in this way can make your life easier, but it also can pay
    off. Deciding when lights and appliances are used helps you create a comfortable
    home that does not waste electricity and may even manage the use of electricity
    in such a way as to take advantage of off-peak lower pricing.


    It’s time to get started.


    Acknowledgments


    As always, thanks to Carole Jelen at Waterside Productions. Aaron Crabtree has
    once again provided great help in the technical issues of an Apple technology.
    At Apress, Jessica Vakili and Aaron Black have been invaluable in helping to bring
    this book into being.'
