  trans: '

    # 7. 深入探索配件


    在家庭自动化领域，基础概念是家、房间和设备。这适用于任何家庭自动化环境。通常，你可以调整设备（对多数人来说最常见的是灯泡）的设置，并且可以将设备及其设置组合成场景。定时机制则可以让你自动开启和关闭场景。


    HomeKit 在两个方面超越了这些基础概念。


    - HomeKit 被构建为第三方设备和应用的家园。苹果从框架和数据库开始搭建，并由其他人来充实完善。目前（据传闻，未来也是如此），苹果并不开发 HomeKit
    设备。对于热衷软件设计的人来说，先从逻辑入手是极好的工作方式（这也是我们日常工作的方法）。苹果在家庭自动化硬件方面的工作，体现在其对兼容 HomeKit 设备的认证程序上。

    - HomeKit 被定位为其预装设备（即苹果设备）的一个组件。`Home` 应用是 iOS 10 的一部分，因此任何想要将设备连接到它的用户都可以直接使用。


    第 6 章相当泛泛地描述了家庭自动化的设备。你已经了解了将配件添加到房间以及将房间添加到家庭的代码，但那里展示的基础代码并不需要深入探索支持配件的 HomeKit
    类。


    本章将深入讲解配件。它们是 HomeKit 中真正为用户带来好处的特性，并且通过简单、优雅且功能强大的类来实现。


    如果仅仅因为家与房间都是物理对象，并且房间在实际使用中相当静态，那么房间内的处理就相对简单。仔细想想，家庭内房间的变更通常只是名称的改变（例如，婴儿房变成了书房）。诚然，配件则是另一回事，仅仅因为它们经常会被移动。（以前放在客厅的那盏灯可能会被搬到卧室。）


    ## 构建配件


    为了构建实际的配件（而不是在网上或商店购买预制的配件），你需要加入 `MFi` 计划。一旦获得许可，你就可以访问 HomeKit 技术规格（即物理规格，不同于注册开发者获得的
    API 规格）。你还可以获得硬件技术支持以及营销材料（例如 `MFi` 标志）。更多信息请访问 `MFi` 常见问题页面：[`https://mfi.apple.com/MFiWeb/getFAQ.action`](https://mfi.apple.com/MFiWeb/getFAQ.action)。


    ## 使用配件


    到目前为止，你已经在本书中了解了配件的基本概念。在第 6 章中，你也了解到了用于设置配件的 API（应用程序接口）基础。除此之外，了解配件的最佳方式是使用
    `HomeKit 配件模拟器` 创建一个配件。（请记住，如果你正在开发一个将新配件与新 HomeKit 应用结合的项目，配件本身可能还不存在。）


    关于你的配件，你需要回答两个关键问题。


    -   配件是什么——它的名称和一些描述信息？

    -   配件做什么？显然，这与它是什么有关，但仅从配件的描述中并不总能一目了然。用 HomeKit 的术语来说，配件提供什么服务？


    如果你打算为 HomeKit 开发一款应用（也许是第 8 章中你将看到的，专注于特定功能和问题的 `Home` 应用的某个版本），你可以在不购买配件的情况下（甚至在它们完全开发出来之前）模拟它们。首先，请按照开发者网站上的说明，从
    [`https://developer.apple.com/library/prerelease/content/documentation/NetworkingInternet/Conceptual/HomeKitDeveloperGuide/TestingYourHomeKitApp/TestingYourHomeKitApp.html`](https://developer.apple.com/library/prerelease/content/documentation/NetworkingInternet/Conceptual/HomeKitDeveloperGuide/TestingYourHomeKitApp/TestingYourHomeKitApp.html)
    下载 `HomeKit 配件模拟器`。


    当你在 `HomeKit 配件模拟器` 中创建一个新配件时，你会看到如图 7-1 所示的视图。


    ![A367674_1_En_7_Fig1_HTML.jpg](img/A367674_1_En_7_Fig1_HTML.jpg)


    图 7-1. 使用 `HomeKit 配件模拟器` 创建一个新配件


    ## 什么是配件？


    通过启动 `HomeKit 配件模拟器` 并选择“文件 ➤ 新建 ➤ 配件”来创建一个新配件，会打开如图 7-1 所示的模态视图。你也可以创建一个新的桥接器，但选择“配件”是最常见的。


    你可以将本节当作如何在模拟器中构建配件的操作指南来阅读，但也可以将其视为对配件本质的最终定义。在那个视图中，请记住配件还具有以下属性：


    ```

    var uniqueIdentifier: UUID

    var uniqueIdentifiersForBridgedAccessories: [UUID]?

    ```


    与在其他情况下一样，你可以为配件分配一个委托（这是可选的，因此并非每个配件都有委托）。你可以为每个配件分配一个委托，或者所有配件共享一个委托。无论委托是什么，它都会实现这些方法。如你所见，配件的委托会在发生变更时获知，从而可以执行所需操作。该委托实现了
    `HMAccessoryDelegate` 协议：


    ```

    func accessoryDidUpdateName(HMAccessory)

    func accessoryDidUpdateReachability(HMAccessory)

    func accessoryDidUpdateServices(HMAccessory)

    func accessory(HMAccessory, didUpdateNameFor: HMService)

    func accessory(HMAccessory, service: HMService, didUpdateValueFor: HMCharacteristic)

    func accessory(HMAccessory, didUpdateAssociatedServiceTypeFor: HMService)

    ```

    '
- fmt: '### Basic Accessory Data


    You fill in the basic accessory information at the top section of the accessory
    view shown in Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1). What it does will
    be described as the services that you can add with the button at the bottom of
    Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1). This section focuses on the description—the
    Accessory information shown in Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1).


    You start with the setup code that is created for you by the simulator, but as
    your testing continues, you can modify it. Pairings are used during testing as
    well. The basic information shown here is up to you.


    #### Categories


    Choose a category for the accessory. The interface provides you with the list
    shown in Figure [7-2](#A367674_1_En_7_Chapter.html#Fig2).


    ![A367674_1_En_7_Fig2_HTML.jpg](A367674_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Choose a category


    The code for the categories follows:


    ```

    let HMAccessoryCategoryTypeOther: String

    let HMAccessoryCategoryTypeBridge: String

    let HMAccessoryCategoryTypeDoor: String

    let HMAccessoryCategoryTypeDoorLock: String

    let HMAccessoryCategoryTypeFan: String

    let HMAccessoryCategoryTypeGarageDoorOpener: String

    let HMAccessoryCategoryTypeIPCamera:String

    let HMAccessoryCategoryTypeLightbulb: String

    let HMAccessoryCategoryTypeOutlet: String

    let HMAccessoryCategoryTypeProgrammableSwitch: String

    let HMAccessoryCategoryTypeRangeExtender: String

    let HMAccessoryCategoryTypeSecuritySystem: String

    let HMAccessoryCategoryTypeSensor: String

    let HMAccessoryCategoryTypeSwitch: String

    let HMAccessoryCategoryTypeThermostat: String

    let HMAccessoryCategoryTypeVideoDoorbell: String

    let HMAccessoryCategoryTypeWindow: String

    let HMAccessoryCategoryTypeWindowCovering: String

    ```


    The only category that needs explanation is the Identify information: does this
    accessory have the ability to identify itself as when light bulb flickers to identify
    itself? This is a yes/no Boolean value.


    - Name

    - Manufacturer

    - Model

    - Serial Number

    - Identify

    - Accessory Categories


    #### Characteristics


    You add characteristics that apply to this accessory. You can add as many characteristics
    as you want to an accessory. You use the Add Characteristic button shown in Figure
    [7-1](#A367674_1_En_7_Chapter.html#Fig1). It opens the modal view shown in Figure
    [7-3](#A367674_1_En_7_Chapter.html#Fig3). The details shown in Figure [7-3](#A367674_1_En_7_Chapter.html#Fig3)
    depend on what type of characteristic you select at the top of the view.


    ![A367674_1_En_7_Fig3_HTML.jpg](A367674_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Choose a characteristic


    #### Type


    For the characteristic, choose its type from the pop-up menu at the top of Figure
    [7-3](#A367674_1_En_7_Chapter.html#Fig3). Figure [7-4](#A367674_1_En_7_Chapter.html#Fig4)
    shows the choices.


    ![A367674_1_En_7_Fig4_HTML.jpg](A367674_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. Characteristic choices


    #### Format


    Choose the format for the characteristic as shown in Figure [7-5](#A367674_1_En_7_Chapter.html#Fig5).


    ![A367674_1_En_7_Fig5_HTML.jpg](A367674_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. Units for the characteristic


    #### Units


    Choose the units for the characteristic as shown in Figure [7-6](#A367674_1_En_7_Chapter.html#Fig6).


    ![A367674_1_En_7_Fig6_HTML.jpg](A367674_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. Units for the characteristic


    ### What Does the Accessory Do? (Services)


    Add as many services as you want to your accessory by using the Add Service...
    button at the bottom of Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1). When
    you add a service, you need to complete the information shown in Figure [7-7](#A367674_1_En_7_Chapter.html#Fig7).


    ![A367674_1_En_7_Fig7_HTML.jpg](A367674_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. Configure a service


    Note that you can assign a specific UUID (universally unique identifier) to the
    service. Figure [7-8](#A367674_1_En_7_Chapter.html#Fig8) shows the choices for
    the type of service.


    ![A367674_1_En_7_Fig8_HTML.jpg](A367674_1_En_7_Fig8_HTML.jpg)


    Figure 7-8. Select a service


    ### Finding Accessory State


    The following are transient characteristics of accessories that depend on the
    network and other conditions. You manage them in the API rather than the simulator.
    The simulator gives you basic data that is then modified, and such modifications
    are passed on to the accessory’s delegate. You need to set that delegate when
    you create the accessory in your code.


    These are the most commonly used functions to query an accessory’s state in general.
    You can query other properties specifically as you need them, but these are the
    state properties.


    ```

    var isReachable: Bool

    var isBlocked: Bool

    var isBridged: Bool

    ```


    # 8. Imaginative Opportunities: Events, Triggers, and Actions


    Your homes and rooms with their accessories along with the accessory characteristics
    and services are a great way of organizing your HomeKit assets, but on their own,
    they really don’t do anything. They just sit there waiting for you to activate
    them with Siri commands or with... something else? (Note that Siri is an interface
    that can work with your HomeKit assets, but its use is more of a user interface
    concern than development, so it’s not covered in this book.)


    What brings your HomeKit assets and resources to life and makes your home “smart”
    is the trio of events, triggers, and actions. These aren’t physical devices: they
    are concepts or abstractions that represent what you want to do with your HomeKit
    resources as well as when you want to do those things. Although those words represent
    specific aspects of the HomeKit API (specifically `HMEvent`, `HMTrigger`, and
    `HMAction`) they are used in their everyday meaning. In this book when the API
    (application program interface) names such as `HMEvent` are used, they are shown
    in a distinctive font.


    The basic pattern is simple. You define an event (such as a specific time of day
    or arriving at a location), and a trigger watches for that event to occur. When
    it does occur, the trigger launches an action. This is how “when I get home, turn
    hallway scene on” happens.


    **Where are Scenes?**


    A scene is something a user sets up that combines accessories and settings. Thus,
    “hallway scene” might consist of hallway ceiling light being turned on to a specific
    color and brightness as well as opening the hallway window blinds. It is the user
    who creates the scenes: They are based on the API that is discussed in Chapters
    [6](#A367674_1_En_6_Chapter.html) and [7](#A367674_1_En_7_Chapter.html). From
    the developer’s point of view, a scene is a collection of actions: an action set.


    Events, actions, and triggers work together. You may want to scan this chapter
    quickly to get the big picture and then come back to focus on specifics. This
    is a case where a test installation of perhaps a single lamp can be very helpful
    in getting a feel for HomeKit. As you experiment, remember that triggers are not
    instantaneous when you set them. You can get an instantaneous response when you
    turn a scene on or off, but when you connect scenes to events and triggers, there
    can be a time lag as HomeKit establishes the settings and then implements them.
    Users sometimes wait for a while (often a day) to check that their events and
    triggers are set properly as time goes along and daily events occur.'
  raw: '### Basic Accessory Data


    You fill in the basic accessory information at the top section of the accessory
    view shown in Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1). What it does will
    be described as the services that you can add with the button at the bottom of
    Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1). This section focuses on the description—the
    Accessory information shown in Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1).


    You start with the setup code that is created for you by the simulator, but as
    your testing continues, you can modify it. Pairings are used during testing as
    well. The basic information shown here is up to you.


    #### Categories


    Choose a category for the accessory. The interface provides you with the list
    shown in Figure [7-2](#A367674_1_En_7_Chapter.html#Fig2).


    ![A367674_1_En_7_Fig2_HTML.jpg](A367674_1_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    Choose a category


    The code for the categories follows:


    ```

    let HMAccessoryCategoryTypeOther: String

    let HMAccessoryCategoryTypeBridge: String

    let HMAccessoryCategoryTypeDoor: String

    let HMAccessoryCategoryTypeDoorLock: String

    let HMAccessoryCategoryTypeFan: String

    let HMAccessoryCategoryTypeGarageDoorOpener: String

    let HMAccessoryCategoryTypeIPCamera:String

    let HMAccessoryCategoryTypeLightbulb: String

    let HMAccessoryCategoryTypeOutlet: String

    let HMAccessoryCategoryTypeProgrammableSwitch: String

    let HMAccessoryCategoryTypeRangeExtender: String

    let HMAccessoryCategoryTypeSecuritySystem: String

    let HMAccessoryCategoryTypeSensor: String

    let HMAccessoryCategoryTypeSwitch: String

    let HMAccessoryCategoryTypeThermostat: String

    let HMAccessoryCategoryTypeVideoDoorbell: String

    let HMAccessoryCategoryTypeWindow: String

    let HMAccessoryCategoryTypeWindowCovering: String

    ```


    The only category that needs explanation is the Identify information: does this
    accessory have the ability to identify itself as when light bulb flickers to identify
    itself. This is a yes/no Boolean value.


    *   Name

    *   Manufacturer

    *   Model

    *   Serial Number

    *   Identify

    *   Accessory Categories


    #### Characteristics


    You add characteristics that apply to this accessory. You can add as many characteristics
    as you want to an accessory. You use the Add Characteristic button shown in Figure
    [7-1](#A367674_1_En_7_Chapter.html#Fig1). It opens the modal view shown in Figure
    [7-3](#A367674_1_En_7_Chapter.html#Fig3). The details shown in Figure [7-3](#A367674_1_En_7_Chapter.html#Fig3)
    depend on what type of characteristic you select at the top of the view.


    ![A367674_1_En_7_Fig3_HTML.jpg](A367674_1_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    Choose a characteristic


    #### Type


    For the characteristic, choose its type from the pop-up menu at the top of Figure
    [7-3](#A367674_1_En_7_Chapter.html#Fig3). Figure [7-4](#A367674_1_En_7_Chapter.html#Fig4)
    shows the choices.


    ![A367674_1_En_7_Fig4_HTML.jpg](A367674_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    Characteristic choices


    #### Format


    Choose the format for the characteristic as shown in Figure [7-5](#A367674_1_En_7_Chapter.html#Fig5).


    ![A367674_1_En_7_Fig5_HTML.jpg](A367674_1_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Units for the characteristic


    #### Units


    Choose the units for the characteristic as shown in Figure [7-6](#A367674_1_En_7_Chapter.html#Fig6).


    ![A367674_1_En_7_Fig6_HTML.jpg](A367674_1_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    Units for the characteristic


    ## What Does the Accessory Do? (Services)


    Add as many services as you want to your accessory by using the Add Service .
    . . button at the bottom of Figure [7-1](#A367674_1_En_7_Chapter.html#Fig1). When
    you add a service, you need to complete the information shown in Figure [7-7](#A367674_1_En_7_Chapter.html#Fig7).


    ![A367674_1_En_7_Fig7_HTML.jpg](A367674_1_En_7_Fig7_HTML.jpg)


    Figure 7-7.


    Configure a service


    Note that you can assign a specific UUID (universally unique identifier ) to the
    service. Figure [7-8](#A367674_1_En_7_Chapter.html#Fig8) shows the choices for
    the type of service.


    ![A367674_1_En_7_Fig8_HTML.jpg](A367674_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    Select a service


    ## Finding Accessory State


    The following are transient characteristics of accessories that depend on the
    network and other conditions. You manage them in the API rather than the simulator.
    The simulator gives you basic data that is then modified, and such modifications
    are passed on to the accessory’s delegate. You need to set that delegate when
    you create the accessory in your code.


    These are the most commonly used functions to query an accessory’s state in general.
    You can query other properties specifically as you need them, but these are the
    state properties.


    ```

    var isReachable: Bool

    var isBlocked: Bool

    var isBridged: Bool

    ```


    # 8. Imaginative Opportunities: Events, Triggers, and Actions


    Your homes and rooms with their accessories along with the accessory characteristics
    and services are a great way of organizing your HomeKit assets, but on their own,
    they really don’t do anything. They just sit there waiting for you to activate
    them with Siri commands or with . . . something else? (Note that Siri is an interface
    that can work with your HomeKit assets, but its use is more of a user interface
    concern than development, so it’s not covered in this book.)


    What brings your HomeKit assets and resources to life and makes your home “smart”
    is the trio of events, triggers, and actions. These aren’t physical devices: they
    are concepts or abstractions that represent what you want to do with your HomeKit
    resources as well as when you want to do those things. Although those words represent
    specific aspects of the HomeKit API (specifically `HMEvent`, `HMTrigger`, and
    `HMAction`) they are used in their everyday meaning. In this book when the API
    (application program interface ) names such as `HMEvent` are used, they are shown
    in a distinctive font.


    The basic pattern is simple. You define an event (such a specific time of day
    or arriving at a location), and a trigger watches for that event to occur. When
    it does occur, the trigger launches an action. This is how “when I get home, turn
    hallway scene on” happens.


    Where are Scenes?


    A scene is something a user sets up that combines accessories and settings. Thus,
    “hallway scene” might consist of hallway ceiling light being turned on to a specific
    color and brightness as well as opening the hallway window blinds. It is the user
    who creates the scenes: They are based on the API that is discussed in Chapters
    [6](#A367674_1_En_6_Chapter.html) and [7](#A367674_1_En_7_Chapter.html). From
    the developer’s point of view, a scene is a collection of actions: an action set.


    Events, actions, and triggers work together. You may want to scan this chapter
    quickly to get the big picture and then come back to focus on specifics. This
    is a case where a test installation of perhaps a single lamp can be very helpful
    in getting a feel for HomeKit. As you experiment, remember that triggers are not
    instantaneous when you set them. You can get an instantaneous response when you
    turn a scene on or off, but when you connect scenes to events and triggers, there
    can be a time lag as HomeKit establishes the settings and then implements them.
    Users sometimes wait for a while (often a day) to check that their events and
    triggers are set properly as time goes along and daily events occur.'
