- fmt: '### Putting It Together


    You may be wondering why a book on HomeKit starts by talking about CarPlay, Apple
    TV, and Apple Watch as well as HomeKit. The answer is simple: it’s all part of
    the same thing. It’s a new way of working, playing, learning, and going about
    your life. Apple’s implementation of IoT isn’t one thing over here and another
    over there. What Apple is doing now is what it does best: it is integrating products
    (its own as well as products from others). Along with the integration, it’s simplifying
    a total picture so that it makes useful sense. As many people have pointed out,
    Apple tends not to be an innovator in technology. Its forte is innovating in the
    use of technology and its integration into our lives so that new technology becomes
    something we can’t imagine how we lived without.


    This book shows you how to work with HomeKit as a developer of HomeKit-compatible
    apps, a maker of devices, or an integrator of home automation technologies (a
    contractor, architect, or designer), or as a user of HomeKit devices who wants
    to delve deeper into the issues and technologies that just get things working.
    The focus is on HomeKit, but from time to time you may see how the HomeKit structure
    shows up in CarPlay and Apple Watch, particularly in the design patterns in the
    software that are extraordinarily message- and event-driven rather than linear.
    This shouldn’t be surprising, because Apple is just as aware as you are that someone
    can pay attention to the tap on the wrist from the Apple Watch that reminds him
    or her that it’s time to leave work to drive home for that dinner party. Turning
    into the driveway on an autumn evening with the early evening settling in, it’s
    reassuring to see the HomeKit lights turn on in the house. If it’s starting to
    snow, it’s definitely nice not to have to get out of the car to open the garage
    door (thanks to HomeKit). Not everything is automated in this little scenario.
    The dog barks a welcome so you don’t want to dally in the car even though you’re
    listening to some music you like. As you open the door, the music follows you
    from car to your speakers in the house. It’s a nice welcoming scenario, and the
    dog’s wagging tail may suggest that he had something to do with it all and please
    give him a biscuit.


    HomeKit, CarPlay, Apple Watch. . . . Yes, you can think of them as great examples
    of the Internet of Things. What Apple has been thinking about is how they all
    fit together in your life. We are moving away from a world of huge monolithic
    apps into one in which small components of apps fit together. So if you’re expecting
    to learn how to build a big “killer” HomeKit app in this book, tamp down your
    expectation. What you’ll build for HomeKit are targeted small apps that fit together
    within the HomeKit framework. If the user winds up assembling those pieces into
    a “killer” and convenient home, that’s just fine, but what we developers do today
    is build the pieces that make it possible for users to put together their technology
    their way.


    As noted in the Introduction, the first part of this book (Chapters [1](#A367674_1_En_1_Chapter.html)
    through [3](#A367674_1_En_3_Chapter.html)) provides you with background of the
    technology and ideas behind it. Then, in Chapters [4](#A367674_1_En_4_Chapter.html)
    and [5](#A367674_1_En_5_Chapter.html), we’ll move on to the details of implementation
    and the use of HomeKit, focusing on how you can use it yourself. Finally, in Chapters
    [6](#A367674_1_En_6_Chapter.html) through [9](#A367674_1_En_9_Chapter.html), you’ll
    see how to write code that performs the manual tasks you did in the previous chapters.


    If you want to jump ahead, feel free to do so, but make sure to come back to these
    introductory chapters. They will help you to understand what you have to do in
    the later ones. Otherwise, it may seem like a collection of unrelated ideas and
    processes. It’s true that in working with HomeKit (and with IoT in general), you’re
    constantly switching from one device to another and one technology to another,
    but as long as you keep your mind on the principles in these first three chapters,
    it should stay a unified and coherent whole.


    ### Moving Beyond Talking Refrigerators


    “Connect your refrigerator to the Internet, and it will let you know when you’re
    running out of milk!” In June 2000, LG introduced the Internet Digital DIOS refrigerator
    that promised to fill this need in the world of consumer appliances.


    As has been demonstrated over the years, the launch of a major new iPhone or other
    device from Apple draws crowds of people who sometimes camp out hours or even
    days before the Apple Store opens. The Internet Digital DIOS refrigerator didn’t
    draw crowds of that size or enthusiasm. In fact, the $20,000 Internet refrigerator
    did not succeed in the marketplace. (iPhone is a different story.)


    It is interesting to compare iPhones and Internet refrigerators. In their first
    incarnations, they both could be seen as demonstrations of what could be done
    with new technologies. In that perspective, the products are pretty similar. From
    another point of view, they were very different. Internet refrigerators promised
    to put those new technologies to use to do tasks that were familiar to people
    (e.g., checking to see how much milk is left on the shelf). iPhone used those
    new technologies to do tasks that hadn’t yet been invented. In fact, many of the
    tasks that are part and parcel of iPhone today weren’t even invented by Apple:
    they’ve been invented and discovered by people using the technologies and iPhone.


    Now it’s time to look at what’s here in the present with HomeKit (and related
    Apple automation initiatives). The rest of this chapter brings you up to speed
    on the technology of HomeKit and what’s behind it.


    ### How It Works—The View from the Mountaintop


    “Connecting a refrigerator to the Internet” conjures up various images and possibilities,
    but, as many consumers have realized, when you start thinking about why you would
    do that and how it would work, things are a little murky.


    This section is an overview of the connection process. You’ll see that connecting
    something to the Internet and HomeKit is a bit different from connecting a computer
    to the Internet. What’s important to note is that this is an overall view of most
    home automation. The details of HomeKit are specific to Apple’s approach to home
    automation, but the overall architecture is not unique.


    Remember that this is the high-level view. In other chapters, you’ll delve more
    deeply into the details that make all of the HomeKit environment work together,
    and you’ll see what you can do to make HomeKit and your appliances do exactly
    what you want.


    #### Introducing Accessories


    What exactly is it that you connect to the Internet and HomeKit? As of this writing,
    it can be a light switch, a thermostat (such as the compatible ones from Ecobee),
    an electrical plug (the iHome Control Smart Plug is one and iDevices Switch is
    another), sensors that can check the weather or the status of doors and windows
    (Elgato makes several), or a hub such as Insteon Hub pro or one of the Lutron
    bridges.


    Before we move on, we need to know how to refer to these in general. You can call
    them “devices,” of course, or even “things” (as in Internet of Things). For this
    book’s discussion of HomeKit, we’ll refer to them as `accessories`, which is the
    term that Apple uses. There are some other HomeKit terms that matter, but they
    require no special introduction (words like `home` and `room` are used in the
    everyday senses).'
