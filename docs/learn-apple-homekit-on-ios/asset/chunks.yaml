  trans: '

    ### 场景可自动化，并响应 Siri 指令


    场景的另一个重要方面是每个场景都有一个名称，`Siri` 能够识别这些名称。因此，场景对于自动化（详见本书最后一章）以及 `Siri` 都至关重要。如果你想要超越构建一个简单的、成本不到一美元的灯开关替代品，那么拥有自动化和语音识别工具就是关键。


    ### 场景是即时生效的


    关于场景，最后要考虑的一个方面是：它们是即时生效的。这并不意味着当你点击场景按钮或者到达触发器设定的时间时，场景会立即被激活：通过网络发送消息是需要时间的。更确切地说，重要的是要明白，一个场景描述的是配件在单个时间点上的状态及其设置。如果你手动打开了场景中的一盏灯，那么这盏灯会保持开启状态，直到下一个涉及它的场景被激活。这带来的一个副作用是：如果你想让灯开启一段时间（或者让门锁定/解锁一段时间），你将需要两个场景：一个用于开启/锁定，另一个用于关闭/解锁。


    由于每个场景都是独立的，如果你构建了一个开启多盏灯的场景，你就必须构建另一个场景（或使用`Siri`或 iPad 控制）来关闭这些灯。


    ## 使用场景


    要开始使用场景，请查看`Home`应用中的主屏幕，如图 3-1 所示。


    ![A367674_1_En_3_Fig1_HTML.jpg](img/A367674_1_En_3_Fig1_HTML.jpg)


    图 3-1. 在主屏幕上查看场景


    此屏幕提供了你家庭的概览信息。你常用的场景会显示在这里。这是一个放置涉及多个房间的场景的绝佳位置：你只需将它们标记为常用即可。


    ### 创建场景


    从主屏幕开始，使用右上角的 `+` 来添加一个场景，如图 3-1 所示。


    在点击`添加场景`（如图 3-2 所示）后，你会看到`HomeKit`提供了几个预定义的场景。


    ![A367674_1_En_3_Fig2_HTML.jpg](img/A367674_1_En_3_Fig2_HTML.jpg)


    图 3-2. 创建新场景


    这些场景的名称可以启发你的思考。它们除了名称之外并没有预定义其他内容，因为场景需要使用你自家的配件。你可以通过点击`自定`来创建自己的场景。如果创建自定义场景，你可以像图
    3-3 中提示框所示那样为其命名。


    ![A367674_1_En_3_Fig3_HTML.jpg](img/A367674_1_En_3_Fig3_HTML.jpg)


    图 3-3. 为场景命名


    ### 添加配件


    为场景命名后，你可以像图 3-4 所示那样为其添加配件。（你随时可以返回重命名场景，或添加/移除配件。）


    ![A367674_1_En_3_Fig4_HTML.jpg](img/A367674_1_En_3_Fig4_HTML.jpg)


    图 3-4. 添加配件


    你会看到你的房间及其配件，如图 3-4 所示。你可以点击右上角的圆圈来添加任何配件。你也可以通过点击`全部添加`来添加一个房间内的所有配件。图 3-5 展示了餐厅中以此方式添加的所有配件。请注意，餐厅的`全部添加`现在已变为`全部移除`。


    ![A367674_1_En_3_Fig5_HTML.jpg](img/A367674_1_En_3_Fig5_HTML.jpg)


    图 3-5. 添加一个房间的配件


    如图 3-6 所示，你也可以通过点击配件右上角的圆形按钮来添加或移除房间内的单个配件。


    ![A367674_1_En_3_Fig6_HTML.jpg](img/A367674_1_En_3_Fig6_HTML.jpg)


    图 3-6. 添加或移除单个配件


    点击右上角的`完成`来结束添加或移除配件。


    ### 调整配件


    当你点击`完成`后，你将会回到基本的场景描述界面，如图 3-7 所示。你可以在此重命名场景，但更重要的是，你现在可以调整配件并测试场景了。


    ![A367674_1_En_3_Fig7_HTML.jpg](img/A367674_1_En_3_Fig7_HTML.jpg)


    图 3-7. 调整场景和配件


    提示：至少在测试阶段，你可以将场景添加到主页面的“常用”中，如图 3-7 所示。


    要调整配件，请长按其以打开详情视图，如图 3-8 所示。请记住，此视图会根据你处理的配件类型而有所不同。图 3-8 显示了一个灯泡的详情视图。你可以向上或向下滑动灯泡上的分隔条来调整亮度。


    ![A367674_1_En_3_Fig8_HTML.jpg](img/A367674_1_En_3_Fig8_HTML.jpg)


    图 3-8. 调整配件


    ### 完成设置


    完成后，你可以在主屏幕上看到你的新场景（如果你已按照图 3-7 所示将其添加为常用，则肯定可以看到）。图 3-9 显示了此时的主屏幕。


    ![A367674_1_En_3_Fig9_HTML.jpg](img/A367674_1_En_3_Fig9_HTML.jpg)


    图 3-9. 主屏幕上的新场景


    ### 编辑场景


    在主屏幕（或房间屏幕——房间屏幕会显示该房间的所有场景）上长按一个场景。长按后抬起手指，你将看到如图 3-10 所示的场景界面。点击屏幕底部的`详细信息`来编辑它。


    ![A367674_1_En_3_Fig10_HTML.jpg](img/A367674_1_En_3_Fig10_HTML.jpg)


    图 3-10. 开始编辑场景


    如图 3-11 所示，你回到了可以编辑场景的状态。如果你只是为了测试而将其设为常用，可以在此处关闭该设置。


    ![A367674_1_En_3_Fig11_HTML.jpg](img/A367674_1_En_3_Fig11_HTML.jpg)


    图 3-11. 编辑场景


    你也可以从此处删除场景。如果执行此操作，你需要如图 3-12 所示进行确认。


    ![A367674_1_En_3_Fig12_HTML.jpg](img/A367674_1_En_3_Fig12_HTML.jpg)


    图 3-12. 删除场景


    重要的是要记住，场景基于你家庭中的配件构建，但它们不会修改这些配件。这意味着你可以在不影响其他任何内容的情况下删除一个场景。（当然，如果该场景用于自动化工序，删除它会破坏自动化，但不会影响配件本身。）


    # 4. 探索你的开发环境


    对于几乎所有的`HomeKit`开发者来说，入门意味着搭建一个新环境，在某些情况下，还意味着一种新的工作方式。如果你是一个熟悉`iOS`的开发者，那么你已经为`HomeKit`做好了充分的准备……只要你对`iOS`最新的一两个版本也很熟悉。自从`iOS`从`iPhone
    OS`（而`iPhone OS`本身又是继苹果在 1997 年收购`NeXT`之后，从`NeXTSTEP`和`OpenStep`衍生而来的）诞生以来，在（刚刚）过去的十年间，很多事情都发生了变化。


    作为一名`HomeKit`开发者，除了要熟悉`iOS`之外，你还需要熟悉`HomeKit`本身。而且，为了让你跟得上节奏，你需要开始使用最新版本的`Xcode`，这是用于`iOS`和
    Mac 应用的集成开发环境（`IDE`）。


    你可能需要探索一门新的编程语言（`Swift`），并且，也许还需要熟悉事件驱动编程。这看起来要求很高，但事实上，这些是当今开发环境的常见方面，无论你是在为`HomeKit`还是其他现代`API`（应用程序编程接口）（即使是其他平台上的`API`）进行开发，你都可能需要至少了解其中一些内容。


    那么，让我们开始吧。

    '
- fmt: '## Getting Developer Access


    Apple is making it increasingly easy for developers—including those new to the
    platforms—to develop apps for macOS and iOS. If you’re already an Apple developer,
    you have your developer credentials and can skip this section and move on to “Downloading
    the Tools.” If you’ve never been an Apple developer, this section provides you
    with an overview. And if you’ve been an Apple developer but haven’t used your
    account for a while (since about 2015), there have been a number of changes (simplifications)
    that you’ll need to know about.


    What has not changed is that you need an Apple ID to access the full range of
    developer tools. An Apple ID is free for the asking as long as you are over 13
    (the age may vary by the country you are in) and have a valid e-mail address (to
    be used to confirm your identity). Your Apple ID can be used for purchases in
    iTunes, the App Store, and the Mac App Store. If you already have one, you can
    use it as a developer.


    However, note that as a developer, you may want to have a separate Apple ID account.
    In fact, if you are an iBooks Author, at least at the moment, the Apple ID you
    use to publish in the iBooks Store needs to be separate from your developer Apple
    ID. (Check out `developer.apple.com` for the latest information for your country.)


    What is most important is that you need an Apple ID (free) and that Apple ID gives
    you access to development tools like `Xcode` (the IDE) and the `iOS Simulator`
    that you can use to test your iOS apps.


    With your free Apple ID, you can build apps and test them on your own devices.
    (This capability is new beginning with `Xcode 7` in 2015. Before that, you had
    to be part of a developer program.)


    Speaking of which, you may want to become a member of one of Apple’s developer
    programs at some time. Although you can now install your apps on your own devices
    without being a developer program member, you cannot submit them to an App Store
    without being a registered developer. This means that you cannot distribute them
    to other people. In order to have access to the App Store, you need to join one
    of the developer programs at `developer.apple.com`. There are several types of
    programs, but most developers opt for the `$99`/year basic membership that gives
    you access to the App Store.


    **Note**


    Your developer program membership typically includes two Developer Technical Support
    incidents (DTIs) a year. You can buy more of them at `$99` for two. A DTI allows
    you to ask a question of an Apple engineer. It can be broad, such as “where do
    I find information about . . .,” but most developers use the more detailed technical
    support. You can submit an app (or part of an app) with which you’re having trouble
    as a developer. (DTIs don’t cover support for using other people’s apps, but they
    do cover support for using `Xcode`.) An Apple engineer will review your code and
    help you pinpoint problems and solutions. This is an incredibly valuable resource,
    particularly if you are an independent developer who can’t turn to a colleague
    to help you out (and you’ll of course offer to return the favor some time).


    With your Apple ID (whether for your personal use or a separate one to use as
    a developer), you’re ready to download and install the tools to start building
    HomeKit apps.


    ## Reviewing the Tools


    Membership in one of the Apple developer programs, as described in the previous
    section, gives you access to the tools you need. You don’t need all of them to
    start, but here is a review of what they are and what you need to look for.


    Don’t be put off by this list: it’s designed to give you an idea of what is involved.
    The standard download of `Xcode` includes all the current versions of these tools.
    Options in `Xcode` let you automatically receive updates as they are released.
    (You can also receive updates only on demand. Typically, automatic updates are
    for minor—“dot”—releases such as `8.3.1`, as opposed to major releases such as
    `8` or even `8.3`.)


    Furthermore, remember that `Xcode` and these tools are available without charge.
    Some of the development features may require a developer program membership, but
    the basic development tools and the tools to deploy them on your own devices are
    free.


    **Tip**


    The full download may take a while. You may want to go to the Energy Saver panel
    in System Preferences to prevent automatic sleep until the download is complete.
    You also may choose to do the full download at a time when your system and communications
    environments are not being stressed—overnight is a good choice in many cases.


    The tools fall into several interrelated categories.


    - Languages

    - Frameworks

    - Simulators


    ### Languages : Swift and Objective-C


    Before Apple bought NeXT and launched OS X (and later, iOS), developers used a
    variety of programming languages. The original Mac was based on Pascal, and the
    operating system contained a bit of low-level code as well. Over time, the operating
    system also included some C and C++. The NeXT acquisition brought with it the
    Objective-C programming language which had been developed along with NeXT (you
    can find more about the history on Wikipedia which has several excellent articles
    on it).


    Objective-C remained the primary language for Mac and iOS for a long time, and
    it still is a major language both for the operating system and for application
    programming. However, as with other object-oriented programming languages, advances
    in hardware and software opened up new opportunities. Objective-C remained (and
    to this day still remains) primarily under Apple’s management. In 2014, Apple
    released the first version of a new programming language: Swift. It takes advantage
    of many advances in operating system and software development technologies. Swift
    is now an open source project, and there are versions available on Linux and the
    IBM Swift Sandbox web site (`https://swiftlang.ng.bluemix.net/?cm_mmc=developerWorks-_-dWdevcenter-_-swift-_-lp&cm_mc_uid=58573134700514602917751&cm_mc_sid_50200000=1460291775#/repl`)


    **Note**


    Both Objective-C and Swift remain widely used on Apple products and on third-party
    apps. Although Apple’s demonstrations and example code typically use Swift today,
    Apple often provides alternate versions in Objective-C. Furthermore, considering
    the enormous amount of legacy software, both languages will continue in use for
    the foreseeable future.


    If you are new to development on Apple platforms, Swift is generally the easiest
    language to learn; you’ll eventually need a simple understanding of Objective-C
    in some special cases (this is akin to the distinction between passive—reading—knowledge
    of a natural language and active—speaking or writing—knowledge of a natural language).'
