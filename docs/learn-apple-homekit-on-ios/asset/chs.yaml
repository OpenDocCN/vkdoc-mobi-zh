- "# 让家居自动化走进生活\n\n如果你习惯购买像 iPhone 这样的产品，带回家、开机、然后直接使用，那么 HomeKit 将带来截然不同的体验。HomeKit\
  \ 是一项集成技术，它将你的家、支持 HomeKit 的配件（如门锁、灯泡、传感器等）以及你对自己家居自动化的设想融合在一起。\n\n本章将介绍这些组件和概念，让你了解使用\
  \ HomeKit 实现家居自动化的意义和操作方法。如果觉得这个系统涉及太多活动部件，不用担心——确实如此，但 HomeKit 能帮你把它们整合起来。\n\n\
  先阅读本书前几章，了解可能实现的功能。你可以一边阅读一边尝试操作已有的设备，但如果你此前从未搭建过 HomeKit 家居（甚至从未接触过任何家居自动化），就不要指望立刻创造奇迹。\n\
  \n话虽如此，一旦你掌握了 HomeKit 的工作原理，它就会成为一个非常出色的工具。其基本工作原理正是前几章的核心内容。你可能会时不时重温这些章节，但一旦那个众所周知的\"\
  灯泡\"亮起（不是你的 HomeKit 灯泡，而是你脑海中的灯泡），你就会明白它是如何协同工作的，以及它如何能够——毫不夸张地说——改变你的生活和家居。\n\n\
  ## 欢迎回家\n\n苹果公司（以及科技界的其他地方）的项目都不是一夜之间完成的。通常，它们是在工程师和用户不断尝试新想法和新技术的过程中逐渐成型的。很多时候，新产品的演进依赖于一个、多个甚至许多外部因素。（想想第一代\
  \ iPhone 融合了多少技术就知道了。）HomeKit 是一个集成了多项技术的项目，而这些技术并非全部由苹果控制。这个故事始于 2014 年，但我们将直接跳到\
  \ 2016 年苹果全球开发者大会（WWDC）的关键时刻，当时 `Home App` 首次向公众展示（至少是向由开发者和科技媒体组成的部分公众展示）。\n\n\"\
  物联网\"（通常称为 `IoT`）是一个流行词汇，它会在某个时期内被反复提及，然后突然无处不在，仿佛是个全新的概念。但没过多久（其实也不算太久），它就好像一直伴随着我们。苹果的\
  \ HomeKit 项目于 2014 年 6 月在苹果 WWDC 上宣布。与苹果产品发布不同，这次并没有什么消费者需要抢购的东西。当时只向开发者提供了一个 `API`（应用程序编程接口——开发者编写\
  \ HomeKit 代码的蓝图）。虽然也有一些早期设备，但仅此而已。\n\n随后，HomeKit 沉寂了一段时间。\n\n## 2015 年：苹果发布新技术\n\
  \n尽管 HomeKit 相当低调，但苹果工程师和第三方开发者一直在忙碌工作。\n\n### CarPlay 加速发展\n\n与此同时，在苹果繁忙园区的另一角，工程师们正在全力开发\
  \ CarPlay。该项目最初于 2013 年的 WWDC（比 HomeKit 早一年）宣布，当时名为 `iOS in the Car`。宣布后不久，一些车型便开始初步实施。在\
  \ 2015 年 3 月的一次活动中，首席执行官蒂姆·库克宣布，到当年年底，所有主要汽车制造商都将提供 CarPlay 功能。果然，随着 2016 年新款车型在\
  \ 2015 年秋季陆续进入展厅，许多车型都配备了 CarPlay。\n\n尽管早期的一些 CarPlay 实现出现在高端汽车上，但这项安静的工程（仅经过几年开发！）突然成为焦点，并迅速推广到各种车型。CarPlay\
  \ 能将你的数据与汽车整合，让你可以听音乐、使用 Siri 更新或查询日历，无论你旅行到何处（只要有网络连接），都能随身携带你的数字生活。\n\n### 开启\
  \ Apple TV\n\n在苹果园区的另一个角落，工程师和设计师们正在努力开发 Apple TV，将这个曾被描述为苹果\"业余爱好\"的产品转变为一种全新的电视思考方式。在\
  \ 2015 年 9 月初的 Apple TV 发布会上，首席执行官蒂姆·库克表示：\"电视的未来在于应用。\"这句话在当时的多次演讲中被反复提及。关键在于，电视传统上是一种线性媒介：你打开它，观看一个有始有终的节目。对于存档或录制的节目，你可以从头到尾播放观看，也可以使用快进和快退功能跳转观看。无论你如何观看传统电视，这都是一个线性过程。\n\
  \n而应用本质上是非线性的。你进入一个应用，做你想做的事，然后跳出来做其他事情——这些事可能涉及另一个应用、另一台设备，甚至是一些完全无关的活动，比如散步、吃饭，或与朋友同事讨论某事。\n\
  \n### 关注时间\n\n2015 年 3 月发布 CarPlay 公告的苹果活动，其焦点实际上是 Apple Watch。\n\n\n\n### 融会贯通\n\
  \n你可能会好奇，为什么一本关于 HomeKit 的书，开篇却要讨论 CarPlay、Apple TV、Apple Watch 以及 HomeKit 本身？答案很简单：它们都属于同一个整体。这是一种全新的工作、娱乐、学习和生活方式。苹果对物联网的诠释并非此处一套、彼处另一套。苹果现在所做的，正是它最擅长的事：整合产品（既有自家产品，也有他人的产品）。在整合的同时，它也在简化整个图景，使其变得切实有用。正如许多人指出的，苹果通常不是技术上的创新者。它的强项在于技术的使用创新以及将其融入我们的生活，使得新技术最终成为我们无法想象离开它的东西。\n\
  \n本书将向你展示，无论是作为开发 HomeKit 兼容应用的开发者、设备制造商、家庭自动化技术集成商（如承包商、建筑师或设计师），还是作为想要更深入探究那些能让设备正常运作的问题与技术的\
  \ HomeKit 设备用户，你该如何与 HomeKit 打交道。本书的重点是 HomeKit，但你会不时看到 HomeKit 架构如何在 CarPlay 和\
  \ Apple Watch 中体现，尤其是在软件设计模式中，这些模式极其依赖消息和事件驱动，而非线性流程。这并不令人意外，因为苹果与你一样清楚：一个人可能会因\
  \ Apple Watch 上的腕部轻触提醒而注意到该下班回家参加晚餐聚会了。在一个秋日的傍晚，暮色渐浓，驶入车道时，看到 HomeKit 控制的屋内灯光亮起，着实让人安心。如果天开始飘雪，不用下车就能打开车库门（多亏了\
  \ HomeKit），那无疑是很棒的。在这个小场景中，并非一切都能自动完成。狗叫声迎接你回家，所以即便你正听着喜欢的音乐，也不会想在车里磨蹭。当你开门时，音乐便从车上无缝衔接到你家里的音箱。这是一个温馨的欢迎场景，而狗摇摆的尾巴似乎在暗示这一切都与它有关，并且请给它一块饼干。\n\
  \nHomeKit、CarPlay、Apple Watch……是的，你可以将它们视作物联网的绝佳范例。苹果一直在思考的是，它们如何共同融入你的生活。我们正在从一个由庞大单体应用组成的世界，迈向一个由小型应用组件共同拼合的世界。因此，如果你期望从本书中学习如何构建一个“杀手级”的大型\
  \ HomeKit 应用，请降低你的期望。你为 HomeKit 构建的将是目标明确的小型应用，它们在 HomeKit 框架内协同工作。如果用户最终将这些组件拼凑成一个“杀手级”且便利的家，那自然很好，但我们开发者当下所做的，是构建这些组件，让用户能够按照自己的方式来整合他们的技术。\n\
  \n正如引言所述，本书的第一部分（第 1 章至第 3 章）为你介绍其背后的技术和理念背景。接着，在第 4 章和第 5 章中，我们将深入探讨 HomeKit 的实现细节和使用方法，着重于你如何自行运用。最后，在第\
  \ 6 章至第 9 章中，你将看到如何编写代码来执行在前几章中手动完成的任务。\n\n如果你想直接跳到后面，完全没问题，但请务必回来阅读这些介绍性章节。它们将帮助你理解在后续章节中需要做什么。否则，一切可能会看起来像是一堆毫不相干的想法和流程。诚然，在与\
  \ HomeKit（以及更广泛的物联网）打交道时，你总是在不同的设备和不同的技术之间切换，但只要你牢记前三章中阐述的原则，它就会保持为一个统一连贯的整体。\n\n\
  ### 超越会说话的冰箱\n\n“把冰箱联网，它会在你牛奶快喝完时提醒你！”2000 年 6 月，LG 推出了互联网数字 DIOS 冰箱，承诺要满足消费电器世界的这一需求。\n\
  \n过去多年的经验表明，苹果新款 iPhone 或其他重磅设备的发布总能吸引成群结队的人，他们有时会在苹果店开门前露营数小时甚至数天。而互联网数字 DIOS 冰箱却未能吸引如此规模或热情的围观人群。事实上，这款两万美元的互联网冰箱并未在市场上取得成功。（而\
  \ iPhone 则另当别论。）\n\n将 iPhone 与互联网冰箱进行比较是件有趣的事。在它们最初的产品形态中，两者都可以被视为展示新技术可能性的示范。从这个角度看，它们相当相似。但从另一个角度看，它们又截然不同。互联网冰箱承诺将这些新技术用于完成人们熟悉的任务（例如，检查货架上还剩多少牛奶）。而\
  \ iPhone 则将这些新技术用于完成那些尚未被发明出来的任务。事实上，如今 iPhone 上许多不可或缺的任务甚至并非苹果发明的：它们是由使用技术和 iPhone\
  \ 的人们发明和发掘出来的。\n\n现在，是时候审视当下 HomeKit（以及苹果相关的自动化计划）的现状了。本章剩余部分将让你快速了解 HomeKit 的技术及其背后的原理。\n\
  \n### 工作原理——山顶俯瞰图\n\n“把冰箱联网”会让人联想到各种场景和可能性，但正如许多消费者所意识到的那样，当你开始思考为什么要这么做以及它会如何工作时，事情就变得有些模糊了。\n\
  \n本节是连接过程的概述。你将看到，将某些东西连接到互联网和 HomeKit 与将电脑连接到互联网略有不同。需要特别注意的是，这是对大多数家庭自动化的一个整体看法。HomeKit\
  \ 的细节是苹果公司对家庭自动化的特有方法，但总体架构并非独一无二。\n\n请记住，这是宏观层面的视角。在其他章节中，你将更深入地探究使整个 HomeKit 环境协同工作的细节，并了解你能做些什么，让\
  \ HomeKit 和你的设备完全按你的意愿行事。\n\n#### 认识配件\n\n你究竟要将什么连接到互联网和 HomeKit？在撰写本文时，它可以是一个电灯开关、一个恒温器（例如\
  \ Ecobee 兼容的型号）、一个电源插头（例如 iHome Control Smart Plug 或 iDevices Switch）、能够检查天气或门窗状态的传感器（Elgato\
  \ 生产了多款此类产品），或者是一个集线器，例如 Insteon Hub Pro 或 Lutron 的某种桥接器。\n\n在继续之前，我们需要知道如何统称它们。当然，你可以称它们为“设备”，甚至叫“物品”（如物联网）。为了便于本书讨论\
  \ HomeKit，我们将它们称为`配件`，这是苹果使用的术语。还有一些其他重要的 HomeKit 术语，但它们无需特别介绍（像`家`和`房间`这样的词在日常语境中都有使用）。\n\
  \n\n\n### HomeKit 中枢\n\n既然我们已经知道了如何称呼这些设备（配件），接下来要探讨它们如何集成到 HomeKit 中。在家庭环境中，你至少拥有一个中枢。中枢可以是\
  \ iPad 或 Apple TV。它需要始终留在家里并保持通电状态。中枢可以通过互联网进行通信，以便远程用户可以访问它并管理 HomeKit 家庭。如果家里有多个中枢，它们之间可以相互通信，也可以与互联网通信。\n\
  \n在家中，配件通过蓝牙低功耗（Bluetooth LE）或 WiFi 网络进行通信。在 HomeKit 文档中，中枢通常被称为远程访问设备。\n\n**提示**\
  \  \n请参阅第 9 章“使用 iCloud 和用户管理 HomeKit”中的“设置中枢”一节，了解如何将 Apple TV 或 iPad 设置为永不休眠的\
  \ HomeKit 中枢。显示屏可以休眠，但设备和其网络连接必须始终对 HomeKit 可用。如果你的 Apple TV 连接了电视，电视可以休眠甚至关机：真正需要保持唤醒和可访问状态的是\
  \ Apple TV 设备本身。\n\n### 基础 HomeKit 家庭\n\n最基本的 HomeKit 家庭由一个中枢（通常是 Apple TV）和一个配件（可能是一个兼容\
  \ HomeKit 的开关，上面插着一盏灯；或者是一盏插在墙插上但使用了支持 HomeKit 的灯泡的灯）组成。你还需要一台 iOS 设备（iPhone、iPad\
  \ 或 iPod Touch）来配置你的家庭。\n\n**提示**  \n你的配件（例如你的灯）需要以传统方式通过其开关打开电源。一旦打开，你就可以使用 HomeKit\
  \ 来调节它或将其关闭，但对于灯泡尤其要注意，在使用 HomeKit 调节它们之前，请确保它们已经通电。\n\n### 扩展 HomeKit\n\n要超越最基本的\
  \ HomeKit 配置，有几种基本方法：\n\n*   你可以添加 `Accessory`、`Home`、`Room` 和 `Scene` 等 HomeKit\
  \ 对象。\n*   你可以添加更多 HomeKit 中枢设备——例如另一台 iPad，但建议从小处着手，先让一个中枢和一个设备正常工作。\n*   **桥接器**：某些家庭自动化产品，如\
  \ Philips Hue 灯泡，需要中间连接到它们自己的桥接器。灯泡或其他设备连接到桥接器，并使用其自有协议进行通信。桥接器则通过 HomeKit 协议连接到\
  \ HomeKit。像 Hue 灯泡这样的设备由 HomeKit 通过桥接器控制，但它们不直接与 HomeKit 通信。一旦设置完成，你无需担心这一点，因为当你使用\
  \ HomeKit 时，你会像看待其他灯泡一样看待 Hue 灯泡：你不再需要关心桥接器（只要它保持插电状态！）。\n\n## 总结\n\nHomeKit 的基本架构侧重于硬件——你用来控制\
  \ HomeKit 的 iOS 设备，以及诸如灯具、门锁、运动传感器和百叶窗等配件。HomeKit 还有另一面：软件。\n\n你不需要成为软件工程师也能知道如何搭建一个\
  \ HomeKit 系统。你需要对配件及其功能有基本的了解，但这可能是你已经掌握的知识。（请记住，我们谈论的是灯泡、灯具、门锁以及其他已经存在了数十年（门锁甚至存在了几个世纪）的设备。）\n\
  \n关于 HomeKit 软件，最重要的一点可能是用户从不直接与 HomeKit 本身交互（重置所有 HomeKit 设置是个例外）。用户使用的应用程序通常设计用于控制来自同一厂商的单个配件或一组配件。除了特定于配件的详细信息外，用户还能看到\
  \ HomeKit 信息（房间、家庭和场景）。他们期望能够设置家庭和用户；也需要能够设置组合了多个配件的场景。\n\n因此，每个 HomeKit 家电应用都提供了一个进入整个\
  \ HomeKit 环境的入口。有了对 HomeKit 架构的这种高层理解，现在可以专注于具体细节了。\n\n"
- "# 2. 探索 HomeKit 世界\n\n从 iOS 10（2016 年秋季发布）开始，HomeKit 有了一个供用户控制其 HomeKit 世界的应用程序。自\
  \ 2014 年宣布以来的几年里，苹果一直在构建 HomeKit 的基础设施——开发者使用的应用程序编程接口（API）、HomeKit 开发者和用户共享的术语（家庭、房间、场景和电器）、第三方支持\
  \ HomeKit 的产品，以及最重要的，即 HomeKit 如何融入普通人所在的现实世界的理念。这些不同的线索（API、第三方产品、术语和认知）在“家庭”应用中汇聚在一起。\n\
  \n在安装了 iOS 10 之后（无论是通过购买预装该系统的新设备，还是从 App Store 下载），你会像图 2-1 所示在主屏幕上找到它。\n\n![A367674_1_En_2_Fig1_HTML.jpg](img/A367674_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1. 主屏幕上的“家庭”应用\n\n正如你将在本章中看到的，有了“家庭”应用，你就上路了。\n\n## 配置你的 HomeKit 环境\n\n`家庭`\
  \ 为你提供了 HomeKit 的集中控制——你的家庭、其中的房间以及你的配件（如车库门和灯等设备）。你的家庭以及所有配件都由一个或多个始终连接电源和互联网的集中设备控制。这些设备被称为\
  \ `家庭中枢`。其中之一通常是 Apple TV；你也可以使用家里的 iPad。无论你使用哪个设备（或两者都使用），HomeKit 都基于两个假设。\n\n\
  第一个假设是 Apple TV 或 iPad 始终通电并保持唤醒状态（你将看到如何使用本章末尾显示的设置来保持 Apple TV 唤醒）。通常，这依赖于直接连接电源（通俗地说就是插座）。对于\
  \ iPad，可能依赖于电池。对于 Apple TV 和 iPad，你可能在设备本身并不知晓的电池电源上运行。例如，如果你有自己的备用电源系统，当电网电源不可用时，它会自动启动。这些备用设备（通常是发电机或电池供电）正变得越来越普及，价格也在下降。插入这些设备的设备通常无法知道电源是来自电网（通过墙壁插座）还是来自发电机或备用系统。\n\
  \n无论你的具体情况如何，HomeKit 都假设设备始终通电，以便计时器可以全天候运行。\n\n第二个假设是你的 Apple TV 和/或 iPad 将始终有互联网连接。电源和互联网之间存在某种关联——如果你的电源中断，你的互联网连接也可能会丢失。\n\
  \n明智的做法是为你的电源和互联网设置自动预防措施，使其在中断时能继续运行，而现代设备也依赖于这种情况的发生——也就是说，它们依赖于你的环境提供必要的应急规划，以确保持续的电源和互联网连接。\n\
  \n现在来看 HomeKit 更具体的要求。\n\n\n\n### 从 Apple ID 开始\n\n你需要一个 Apple ID 来使用“家庭”App。Apple\
  \ ID 是你的唯一标识，通常与一张有效的信用卡绑定。（在某些情况下，你可以绕过信用卡绑定——详情请参见 [`https://appleid.apple.com/cn`](https://appleid.apple.com/cn)。（请注意，此处的网址是针对美国的。请登录你所在国家的\
  \ `apple.com` 并搜索 `Apple ID`，以查找针对你所在地区的本地化信息。）\n\n当你在“家庭”App 中创建你的“家庭”时，它是属于你个人的——也就是说，它与你的\
  \ Apple ID 相关联。在“家庭”App 中，你可以创建多个家庭、房间和配件，但它们都属于与你的 Apple ID 关联的同一个“家庭”的一部分。\n\n\
  许多人拥有多个 Apple ID。有时这是随着时间的推移偶然发生的，尤其是在 Apple ID 体系不断演变的过程中。其他情况下则是故意的，例如开发者和作者必须为他们用于管理应用程序和\
  \ iBooks 的账户分别使用独立的 Apple ID。\n\n你可以使用“家人共享”功能，在多个其他家庭成员之间共享一个 Apple ID，而每个成员也都有自己的\
  \ Apple ID。“家人共享”主要是为儿童设计的，这样，组织者（作为家长或监护人的成年人）将为所有人支付账单。这使得 13 岁以下的儿童可以拥有自己的 Apple\
  \ ID，并在获得许可的情况下，从家庭账户中进行购买。\n\n如果你曾在 iTunes 或 App Store 购买过任何东西，那么你已经至少拥有一个 Apple\
  \ ID。在几乎所有情况下，最好使用现有的 Apple ID 来使用“家庭”App。如果你为每种用途都创建新的 Apple ID，最终可能会弄得一团糟。\n\n\
  一旦你拥有了 Apple ID，并在 Apple TV 或 iPad 上安装了“家庭”App，你就可以开始使用了。\n\n### 在 iPad 上快速开始\n\n\
  如果你想直接上手，以下是在 iPad 上开始使用“家庭”App 的方法。安装 iOS 10（或购买预装了该系统的 iPad）后，只需轻点“家庭”图标，如之前图\
  \ 2-1 所示。\n\n**注意**\n\n这是你首次看到的样子。如果你之前打开过“家庭”App，你将不会看到这些步骤：别担心！此处展示的所有重要内容在“管理家庭设置”一节中也有描述。\n\
