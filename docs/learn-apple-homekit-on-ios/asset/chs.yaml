  \n图 5-10. 创建一个自动化\n\n正如你将在下一个屏幕（如图 5-11 所示）上看到的，自动化分为三种类型。虽然它们看起来不同，但实际上本质是一样的：它们的区别仅在于触发事件不同。（基于这个原因，该事件被称为触发器。）\n\
  \n![A367674_1_En_5_Fig11_HTML.jpg](img/A367674_1_En_5_Fig11_HTML.jpg)\n\n图 5-11.\
  \ 设置当你离开或到达时触发的触发器\n\n### 自动化地理位置变化\n\n第一种触发器依赖于你的位置，这意味着它依赖于你的 iPhone。如图 5-11 所示，你可以将触发器设置为在离开或到达时触发。\n\
  \n虽然屏幕上的示例显示的是“家”，但实际上，你可以将自动化设置为 `Contacts` 中的任何地址。当你点击右上角的 `Next` 时，你将看到你的联系人地址列表，如图\
  \ 5-12 所示。只需点击你想要使用的地址即可。\n\n![A367674_1_En_5_Fig12_HTML.jpg](img/A367674_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12. 选择要使用的地址\n\n### 自动化特定时间\n\n你也可以设置一个在一天中的某个特定时间（或几天）运行的自动化。如果你选择该选项，你将能够添加详细信息，如图\
  \ 5-13 所示。日出和日落时间由 Siri 和 HomeKit 自动为你管理，你也可以自行设置时间。大多数人会重复使用自动化，因此你可以选择时间（或日出/日落），然后点击你希望自动化运行的日期（或多天）。左上角的\
  \ `Every Day` 将实现每天运行的效果。\n\n![A367674_1_En_5_Fig13_HTML.jpg](img/A367674_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13. 管理时间和重复设置\n\n请注意，这种类型的自动化旨在重复执行。你也可以将其用于一次性场景，但无法指定特定日期。默认情况下，它会在你选择的第二天中的设定时间运行。\n\
  \n### 让配件控制自动化\n\n也许最有趣的自动化类型是由另一个配件触发的自动化。你可以通过选择你感兴趣的房间中的配件来控制这一点，如图 5-14 所示。（点击配件右上角的圆圈来选择它。）\n\
  \n![A367674_1_En_5_Fig14_HTML.jpg](img/A367674_1_En_5_Fig14_HTML.jpg)\n\n图 5-14.\
  \ 让一个配件触发自动化\n\n一旦你选择了触发配件，请设置它将执行的、用于触发自动化的操作，如图 5-15 所示。（对于不同类型的配件，可供选择的操作会有所不同。）\n\
  \n![A367674_1_En_5_Fig15_HTML.jpg](img/A367674_1_En_5_Fig15_HTML.jpg)\n\n图 5-15.\
  \ 选择触发操作\n\n你已经有了配件和你想要触发自动化的操作。在下一个屏幕上，选择你想要响应该触发器的配件（或多个配件），如图 5-16 所示。（场景稍后会描述，但在当前上下文中，它们的工作方式与配件基本相同。）\n\
  \n![A367674_1_En_5_Fig16_HTML.jpg](img/A367674_1_En_5_Fig16_HTML.jpg)\n\n图 5-16.\
  \ 选择要自动化的场景或配件\n\n最后一步是在下一个屏幕上提供此自动化应对哪些配件执行何种操作的详细信息，如图 5-17 所示。\n\n![A367674_1_En_5_Fig17_HTML.jpg](img/A367674_1_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17. 指定要执行的操作\n\n\n\n### 整合运用\n\n现在你已经了解了 HomeKit 的整个设置流程。如果觉得有些复杂，不妨从反向视角来看，你会发现各个部分是如何紧密衔接的。一旦设置完成，实际运作流程如下：\n\
  \n1.  执行自动化操作：开关灯、打开车库门、调节恒温器等。\n2.  当触发条件发生时：\n    1.  特定时间点\n    2.  其他 HomeKit\
  \ 配件执行了某个操作\n    3.  你到达或离开某个地点。本章中介绍的各个步骤仅仅是为了搭建这个自动化系统。在此过程中，你确实需要执行一些设置操作，但大多数情况下，这些设置可以重复多次使用。以下是需要执行的主要设置操作：\n\
  \    *   对于基于位置的触发器，请确保地址已保存在你的通讯录中。如果没有，请添加。\n    *   随身携带你的 iPhone，以便基于位置的触发器能够正常工作。\n\
  \    *   识别你要用作触发器或执行操作的每个配件。\n        *   若要识别配件，请在 HomeKit 中定义它们。\n        * \
  \  若要整理配件，请将它们归入不同房间。\n        *   若要将配件按房间之外的逻辑进行整理，请将它们标记为“收藏”，这样它们就会出现在底部工具栏左侧的“家庭”标签页中。\n\
  \    *   确保你的家庭中枢（Apple TV 或 iPad）已开机，并连接到 WiFi 和互联网，且已设置为不会进入休眠状态。建议使用浪涌保护器，但设备应能在短暂断电后自动恢复。\n\
  \n"
- "# 6. 作为开发者、设计师或设备制造商探索 HomeKit 世界\n\n到目前为止，本书一直从外部视角审视 HomeKit，观察你能看到和用 HomeKit\
  \ 控制的那些事物。现在，让我们从代码入手，由内而外地探索 HomeKit。代码是连接家居本身及其所有组件（包括第三方设备）的核心。一切都与代码对话，从许多方面来说，代码本身是对\
  \ HomeKit 组件的最佳描述。本章将为你概述 HomeKit 框架及其对象和功能。\n\nHomeKit 是苹果公司的一个现代化框架，基于 Swift 构建。如果你是一位资深的\
  \ Swift 开发者（这意味着你已经用了两三年了！），你会感觉得心应手。如果你是 Swift 新手，可以探索一下免费的 Swift iBook，你可以从 `https://itunes.apple.com/us/book/swift-programming-language/id881256329?mt=11#`\
  \ 下载。\n\n本章探讨了使用 HomeKit 所需的基础知识。它被设计为一本参考手册，因此建议你先阅读第一节，然后在需要时再回过头来查阅其他章节。一旦你对\
  \ HomeKit 有了总体了解，在实际操作时学习细节就会容易得多。\n\n无论你在探索 HomeKit 世界的哪个方面，代码都是其核心。HomeKit 的第三方潜力目前才刚刚开始被挖掘。“家庭”是内置于\
  \ iOS 10 系统中的 iOS 应用。我们可以轻松构想出该应用更复杂、更定制化的版本。对于设备制造商而言，在构建设备以及配置与设备及其应用紧密相关的细节方面，存在着明显的机遇。将\
  \ HomeKit 技术与其他技术、设备和建筑项目集成，仍然是一个前景广阔的领域。\n\n在探索这些及其他可能性之前，首先需要了解你将使用的 HomeKit 代码端。\n\
  \n## HomeKit 概述\n\n如果你熟悉面向对象编程，本节内容可能足以让你快速上手，将 Swift 与 HomeKit 结合使用。虽然这远非关于这两者的完整教程（所有权威文档的来源是\
  \ `developer.apple.com`），但它能帮你入门。本节将为你介绍需要了解的关键特性，这些特性与你可能已知的其他语言的面向对象编程有所不同。\n\n\
  ### Swift 面向 HomeKit 的面向对象特性\n\n与任何语言中的大多数面向对象框架一样，HomeKit 主要由对象和函数组成。更精确地说，对象是类的运行时实例化。换句话说，HomeKit\
  \ 由在运行时作为对象创建的类组成。\n\n函数可以在类内部声明，也可以独立声明。（在非常严格的面向对象编程中，不鼓励使用独立函数，但你仍然可以创建它们。）\n\
  \n在类内部声明的函数通常被称为方法。\n\n这种术语有其历史原因，但不必担心。\n\nHomeKit 的类通常代表物理对象（家庭、房间、配件）；它们也可以代表活动或过程。这与许多面向对象系统相同，但\
  \ HomeKit 比其他许多系统更侧重于物理对象。这对你来说应该影响不大。\n\n\n\n#### 协议与委托：架构\n\nSwift 与其他面向对象编程语言的区别之一在于其对协议和委托的使用。与所有面向对象编程语言一样，一个类可以继承自另一个类。子类继承父类（或超类）的功能和变量，并且可以根据需要在子类中进行重写。\n\
  \n面向对象编程中的一个主要挑战是多继承问题——当你想同时将某个类的部分功能和另一个类的部分功能作为超类，用于同一个子类时，该如何处理？Swift 通过协议解决了这个问题。在声明类时，你需要指定其继承的父类（如果有的话）。在\
  \ Cocoa 框架（包括 Cocoa Touch 和 Cocoa）中，大多数对象都有一个共同的基类，即 `NSObject`。你可以在 Xcode 文档中查看\
  \ `NSObject` 的结构和组成部分，但目前你只需知道它是许多 Cocoa 类的共同基类即可。\n\n如果你想混合使用多个类的部分功能来创建一种多继承形式，可以使用协议。协议与类有相似之处，因为其定义可以包含方法，但协议不能像类那样直接实例化。相反，一个类可以声明自己遵循某个协议，这意味着该类本身实现了该协议（严格来说，是实现协议中的必需方法，因为有些方法可以标记为可选）。如果一个类遵循了某个协议，其子类也会遵循该协议。该类或其子类必须实现协议中声明的方法。声明类、超类和协议的语法清晰地体现了这种共性。例如，下面是\
  \ Swift 类的声明：\n\n```\nclass MyClass {\n}\n```\n\n下面是一个将作为超类的类的声明。注意，语法上没有任何指示表明它将作为超类，这只是为了代码示例的清晰性。\n\
  \n```\nclass MySuperClass {\n}\n```\n\n下面是带有超类的 Swift 类声明：\n\n```\nclass MyClass2:\
  \ MySuperClass {\n}\n```\n\n下面是一个协议的声明。\n\n```\nprotocol MyProtocol {\n    var protocolVar:\
  \ String { get }\n}\n```\n\n协议永远不会像类那样被独立实现。因此，在声明一个字符串类型的属性 `protocolVar` 时，协议将依赖于一个实际采纳该协议的类来实现\
  \ `protocolVar`。\n\n下面是一个采纳了协议的 Swift 类声明：\n\n```\nclass MyClass3: MyProtocol {\n\
  }\n```\n\n下面是一个带有超类且采纳了协议的 Swift 类声明。\n\n```\nclass MyClass4: MySuperClass, MyProtocol\
  \ {\n    internal var protocolVar: String = \"Test\"\n}\n```\n\n是采纳协议的类来实现它，因此在上述代码片段之后，你可以编写以下代码：\n\
  \n```\nlet x = MyClass4 ()\nprint (x.protocolVar)\n```\n\n图 6-1 展示了整合后的这段代码。\n\n\
  ![A367674_1_En_6_Fig1_HTML.jpg](img/A367674_1_En_6_Fig1_HTML.jpg)\n\n*图 6-1. 类、超类和协议示例*\n\
  \n如果你想知道编译器如何正确解释像下面这样的代码行（其中 `MySomething` 可能是协议也可能是超类），答案是编译器要求 `MySomething`\
  \ 在使用前必须声明，并且它能分辨出具体是哪种。\n\n```\nclass MyClass: MySomething {\n}\n```\n\n通常有一种惯例（如果你喜欢用这个术语，也可以称之为设计模式）：当一个类采纳某个协议时，该协议的功能实际上可能在运行时由另一个对象实现。这个对象就是委托（Delegate）。这种结构使功能组织得井然有序，并使得代码的开发和维护更加容易。\n\
  \n通过使用协议，多继承问题基本得到了解决。此外，由于可以添加协议来实现相当有限的功能，Swift 中的继承树通常比其他语言扁平得多。实际上，Swift 中的许多协议都特别轻量，并根据需要被添加到多个类中。下一节将介绍在\
  \ HomeKit 类中反复出现的三个协议。\n\n#### 协议与委托：关键角色\n\n如前所述，使用协议的 Swift 类层次结构通常比其他语言的类层次结构扁平得多。Cocoa\
  \ 和 Cocoa Touch 的共同基类 `NSObject`（它本身遵循 `NSObjectProtocol`）为框架中的许多对象完成了大量繁重的工作。大多数\
  \ HomeKit 类都是 `NSObject` 的子类（因此也遵循 `NSObjectProtocol`）。\n\n此外，许多 HomeKit 类还采纳了三个非常常见的协议：`CVarArg`、`Equatable`\
  \ 和 `Hashable`。你其实不必过于担心它们，但如果你在文档中查找信息时经常遇到它们，以下是它们的具体内容和作用。\n\n#### `CVarArg`\n\
  \n该协议允许你使用可变参数列表（C 语言的 va_list）。\n\n#### `Equatable`\n\n该协议意味着类型可以使用 `==` 或 `!=`\
  \ 进行比较。\n\n#### `Hashable`\n\n顾名思义，该协议意味着遵循它的对象可以被哈希，以便你可以在字典或集合中轻松定位它们。\n\n## 创建新实例\n\
  \n你会发现许多 HomeKit 类不允许你直接创建它们的新实例。你必须使用某种在特定上下文中返回新实例的方法。这些方法通常被称为“工厂方法”。\n\n例如，如果你想创建一个新房间，你需要在\
  \ `HMHome` 实例上使用 `addRoom(withName:completionHandler:)`。这意味着你添加的房间会被添加到 `HMHome`\
  \ 实例的 rooms 数组中。\n\n这种设计模式在许多地方重复出现（例如 `HMZone` 实例）。这可以最大限度地减少“孤立”对象的问题。\n\n## 基本\
  \ HomeKit 对象\n\n家庭中的基本对象包括：\n\n-   房间\n-   配件\n-   场景\n-   动作（这些动作被组织成动作集，将在本节后面描述）\n\
  \n它们是你将主要使用的对象（当然，除了家庭本身之外）。在 `HMHome` 实例内，你可以在数组中找到它们。\n\n本章的其余部分将探讨这些对象。你将看到界面以及可用于实现它的代码。（请注意，Home\
  \ App 中的实际实现可能使用其他代码，但功能上与你在此看到的代码相同。）\n\nHomeKit 中几乎每个对象都有一个唯一标识符：\n\n```\nvar\
  \ uniqueIdentifier: UUID\n```\n\n唯一标识符是一个以特定方式生成的字符串，以确保其唯一性。（Apple 文档中显示的示例是 `E621E1F8-C36C-495A-93FC-0C247A3E6E5F`）。Swift\
  \ 的 `UUID`（通用唯一标识符）桥接到了 `NSUUID`，因此两者可以互换使用。它基于 RFC 4122 版本 4 的随机字节。\n\n### 处理房间\n\
  \n当你以用户身份设置 HomeKit 时，房间是你需要处理的对象，但这里展示的是后端视角。\n\n\n\n#### 管理房间\n\n轻点“家庭”应用中任意房间左上角的列表图标即可添加房间，如图\
  \ 6-2 所示。\n\n![A367674_1_En_6_Fig2_HTML.jpg](img/A367674_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2. 列出并添加房间\n\n如图 6-2 的背景所示，此房间列表可从任意房间中调出。房间列表是 `HMHome` 中存储房间的数组，因此必须显示在图\
  \ 6-2 所示的视图中。该列表通过 `HMHome` 数组 `HMRoom` 数组获取。\n\n```\nvar rooms: [HMRoom]\n```\n\
  \n因此，若要添加房间，您可以从界面上得知 `HMHome` 对象（因为房间列表就在该对象中）。`HMHome` 类通过以下方法管理家中房间的添加和移除：\n\n\
  ```\nfunc addRoom(withName: String, completionHandler: (HMRoom?, Error?) -> Void)\n\
  func removeRoom(HMRoom, completionHandler: (Error?) -> Void)\n```\n\n图 6-3 展示了如何添加房间。\n\
  \n![A367674_1_En_6_Fig3_HTML.jpg](img/A367674_1_En_6_Fig3_HTML.jpg)\n\n图 6-3. 房间设置\n\
  \n`HMHome` API（应用程序编程接口）中还有一个与房间相关的有趣特性，即一个返回家中所有未分配到其他房间的部分的方法。\n\n```\nfunc roomForEntireHome()\n\
  ```\n\n因此，您可以确信地假定诸如配件之类的对象将被分配到某个房间中，即使只是整个家所在的房间。\n\n#### 编辑房间\n\n添加或定位到某个房间后，您可以对其进行编辑。图\
  \ 6-4 显示了其界面（用户可从图 6-3 底部的“添加房间”进入该界面）。\n\n![A367674_1_En_6_Fig4_HTML.jpg](img/A367674_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 房间设置\n\n房间名称在首次使用 `HMHome.addRoom(withName: String, completionHandler:\
  \ (HMRoom?, Error?) -> Void)` 创建时设定。\n\n创建房间后，可通过 `HMRoom` 更新名称。\n\n```\nfunc updateName(String,\
  \ completionHandler: (Error?) -> Void)\n```\n\n图 6-4 显示了用户界面。与家中房间数组相同的设计模式也适用于房间中的配件：它们存储在\
  \ `HMRoom` 的数组中。\n\n```\nvar accessories: [HMAccessory]\n```\n\n## 使用配件\n\n家中的房间是一个相当简单的案例，仅仅是因为家与房间都是物理对象，而且在实践中房间相当固定。仔细想想，家中房间的变更通常只是名称上的变化（例如，婴儿房变成了书房）。诚然，配件则有所不同，因为它们往往会被移动（曾经放在客厅的灯可能会被移到卧室）。\n\
  \n### 查找配件\n\n`HMAccessoryBrowser` 类用于查找配件。如果您已经设置了一个 HomeKit 家庭，那么您已经经历过这个过程。您从添加配件开始，如图\
  \ 6-5 所示。\n\n![A367674_1_En_6_Fig5_HTML.jpg](img/A367674_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5. 选择配件\n\n接下来，应用会启动一个 `HMAccessoryBrowser`。它会四处搜索并尝试发现配件，如图 6-6 所示。\n\n![A367674_1_En_6_Fig6_HTML.jpg](img/A367674_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6. 浏览配件\n\n这个过程是一个典型的 Cocoa 设计模式，涉及一个委托。共有三个步骤。\n\n1.  首先，您开始搜索尚未与某个家庭关联的配件。（如果配件已与某个家庭关联，用户需要将其移除。）为了执行搜索，您需要创建一个\
  \ `HMAccessoryBrowser`。\n2.  当发现某个配件时，您需要得到通知。在某些情况下，会使用一个完成例程来进行此回调处理。然而，在其他情况下（如此处），则会使用一个委托。该委托实现了一个协议——此处是\
  \ `HMAccessoryBrowserDelegateProtocol`。该协议包含两个方法：\n\n    ```\n    func accessoryBrowser(HMAccessoryBrowser,\
  \ didFindNewAccessory: HMAccessory)\n    func accessoryBrowser(HMAccessoryBrowser,\
  \ didRemoveNewAccessory: HMAccessory)\n    ```\n\n    创建委托的对象通常会将自身设为委托，但这并非强制要求。重要的是，这是一个异步过程，可以启动（开始搜索）然后在事件发生时进行处理。\n\
  \n3.  设置好委托后，您使用浏览器的一个方法开始搜索。\n\n    ```\n    func startSearchingForNewAccessories()\n\
  \    ```\n\n4.  在适当的时候，您停止搜索。\n\n    ```\n    func stopSearchingForNewAccessories()\n\
  \    ```\n\n关于完成例程和委托的更多内容，请参阅第 7 章。\n\n### 管理配件\n\n完成搜索后，您可以使用 `HMHome` 添加配件。\n\
  \n```\nfunc addAccessory(_ accessory: HMAccessory,\ncompletionHandler completion:\
  \ (Error?) -> Void)\n```\n\n不出所料，您也使用 `HMHome` 移除配件。\n\n```\nfunc removeAccessory(_\
  \ accessory: HMAccessory,\ncompletionHandler completion: (Error?) -> Void)\n```\n\
  \n您可以使用返回该房间配件数组的 `HMRoom` 方法，从房间中获取配件列表。\n\n```\nvar accessories: [HMAccessory]\n\
  ```\n\n由于配件由 `HMHome` 添加和移除，您可以使用 `HMHome` 来移动它们：\n\n```\nfunc assignAccessory(_\
  \ accessory: HMAccessory,\nto room: HMRoom,\ncompletionHandler completion: (Error?)\
  \ -> Void)\n```\n\n### 编辑配件\n\n您可以在一个视图中查看配件信息，该视图因配件类型而异。例如，如果您在图 6-5 中长按一个配件，您可能会看到图\
  \ 6-7 所示的视图，它代表一个灯泡。\n\n![A367674_1_En_6_Fig7_HTML.jpg](img/A367674_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 编辑配件详情\n\n就“家庭”应用的界面而言，您可以通过在用户界面中长按配件来编辑其对房间可见的常规信息。图 6-8 和 6-9 向您展示了该用户界面。它适用于所有类型的配件。\n\
  \n![A367674_1_En_6_Fig9_HTML.jpg](img/A367674_1_En_6_Fig9_HTML.jpg)\n\n图 6-9. 设置数值（底部）\n\
  \n![A367674_1_En_6_Fig8_HTML.jpg](img/A367674_1_En_6_Fig8_HTML.jpg)\n\n图 6-8. 设置数值（顶部）\n\
  \n**注意：** 第 7 章将提供更多关于配件的内容。\n\n\n\n"
- '# 7. 深入探索配件


  在家庭自动化领域，基础概念是家、房间和设备。这适用于任何家庭自动化环境。通常，你可以调整设备（对多数人来说最常见的是灯泡）的设置，并且可以将设备及其设置组合成场景。定时机制则可以让你自动开启和关闭场景。


  HomeKit 在两个方面超越了这些基础概念。


  - HomeKit 被构建为第三方设备和应用的家园。苹果从框架和数据库开始搭建，并由其他人来充实完善。目前（据传闻，未来也是如此），苹果并不开发 HomeKit
  设备。对于热衷软件设计的人来说，先从逻辑入手是极好的工作方式（这也是我们日常工作的方法）。苹果在家庭自动化硬件方面的工作，体现在其对兼容 HomeKit 设备的认证程序上。

  - HomeKit 被定位为其预装设备（即苹果设备）的一个组件。`Home` 应用是 iOS 10 的一部分，因此任何想要将设备连接到它的用户都可以直接使用。


  第 6 章相当泛泛地描述了家庭自动化的设备。你已经了解了将配件添加到房间以及将房间添加到家庭的代码，但那里展示的基础代码并不需要深入探索支持配件的 HomeKit
  类。


  本章将深入讲解配件。它们是 HomeKit 中真正为用户带来好处的特性，并且通过简单、优雅且功能强大的类来实现。


  如果仅仅因为家与房间都是物理对象，并且房间在实际使用中相当静态，那么房间内的处理就相对简单。仔细想想，家庭内房间的变更通常只是名称的改变（例如，婴儿房变成了书房）。诚然，配件则是另一回事，仅仅因为它们经常会被移动。（以前放在客厅的那盏灯可能会被搬到卧室。）


  ## 构建配件


  为了构建实际的配件（而不是在网上或商店购买预制的配件），你需要加入 `MFi` 计划。一旦获得许可，你就可以访问 HomeKit 技术规格（即物理规格，不同于注册开发者获得的
  API 规格）。你还可以获得硬件技术支持以及营销材料（例如 `MFi` 标志）。更多信息请访问 `MFi` 常见问题页面：[`https://mfi.apple.com/MFiWeb/getFAQ.action`](https://mfi.apple.com/MFiWeb/getFAQ.action)。


  ## 使用配件


  到目前为止，你已经在本书中了解了配件的基本概念。在第 6 章中，你也了解到了用于设置配件的 API（应用程序接口）基础。除此之外，了解配件的最佳方式是使用 `HomeKit
  配件模拟器` 创建一个配件。（请记住，如果你正在开发一个将新配件与新 HomeKit 应用结合的项目，配件本身可能还不存在。）


  关于你的配件，你需要回答两个关键问题。


  -   配件是什么——它的名称和一些描述信息？

  -   配件做什么？显然，这与它是什么有关，但仅从配件的描述中并不总能一目了然。用 HomeKit 的术语来说，配件提供什么服务？


  如果你打算为 HomeKit 开发一款应用（也许是第 8 章中你将看到的，专注于特定功能和问题的 `Home` 应用的某个版本），你可以在不购买配件的情况下（甚至在它们完全开发出来之前）模拟它们。首先，请按照开发者网站上的说明，从
  [`https://developer.apple.com/library/prerelease/content/documentation/NetworkingInternet/Conceptual/HomeKitDeveloperGuide/TestingYourHomeKitApp/TestingYourHomeKitApp.html`](https://developer.apple.com/library/prerelease/content/documentation/NetworkingInternet/Conceptual/HomeKitDeveloperGuide/TestingYourHomeKitApp/TestingYourHomeKitApp.html)
  下载 `HomeKit 配件模拟器`。


  当你在 `HomeKit 配件模拟器` 中创建一个新配件时，你会看到如图 7-1 所示的视图。


  ![A367674_1_En_7_Fig1_HTML.jpg](img/A367674_1_En_7_Fig1_HTML.jpg)


  图 7-1. 使用 `HomeKit 配件模拟器` 创建一个新配件


  ## 什么是配件？


  通过启动 `HomeKit 配件模拟器` 并选择“文件 ➤ 新建 ➤ 配件”来创建一个新配件，会打开如图 7-1 所示的模态视图。你也可以创建一个新的桥接器，但选择“配件”是最常见的。


  你可以将本节当作如何在模拟器中构建配件的操作指南来阅读，但也可以将其视为对配件本质的最终定义。在那个视图中，请记住配件还具有以下属性：


  ```

  var uniqueIdentifier: UUID

  var uniqueIdentifiersForBridgedAccessories: [UUID]?

  ```


  与在其他情况下一样，你可以为配件分配一个委托（这是可选的，因此并非每个配件都有委托）。你可以为每个配件分配一个委托，或者所有配件共享一个委托。无论委托是什么，它都会实现这些方法。如你所见，配件的委托会在发生变更时获知，从而可以执行所需操作。该委托实现了
  `HMAccessoryDelegate` 协议：


  ```

  func accessoryDidUpdateName(HMAccessory)

  func accessoryDidUpdateReachability(HMAccessory)

  func accessoryDidUpdateServices(HMAccessory)

  func accessory(HMAccessory, didUpdateNameFor: HMService)

  func accessory(HMAccessory, service: HMService, didUpdateValueFor: HMCharacteristic)

  func accessory(HMAccessory, didUpdateAssociatedServiceTypeFor: HMService)

  ```




  ### 基本配件数据


  你需要在配件视图（如图 7-1 所示）的顶部区域填写基本配件信息。其功能将通过你使用图 7-1 底部的按钮添加的服务来描述。本节重点介绍描述部分——即图 7-1
  中显示的配件信息。


  你从模拟器为你创建的设置代码开始，但随着测试的进行，你可以修改它。在测试过程中也会使用配对。此处显示的基本信息由你决定。


  #### 类别


  为配件选择一个类别。界面会为你提供如图 7-2 所示的列表。


  ![A367674_1_En_7_Fig2_HTML.jpg](img/A367674_1_En_7_Fig2_HTML.jpg)


  图 7-2. 选择一个类别


  类别的代码如下：


  ```

  let HMAccessoryCategoryTypeOther: String

  let HMAccessoryCategoryTypeBridge: String

  let HMAccessoryCategoryTypeDoor: String

  let HMAccessoryCategoryTypeDoorLock: String

  let HMAccessoryCategoryTypeFan: String

  let HMAccessoryCategoryTypeGarageDoorOpener: String

  let HMAccessoryCategoryTypeIPCamera:String

  let HMAccessoryCategoryTypeLightbulb: String

  let HMAccessoryCategoryTypeOutlet: String

  let HMAccessoryCategoryTypeProgrammableSwitch: String

  let HMAccessoryCategoryTypeRangeExtender: String

  let HMAccessoryCategoryTypeSecuritySystem: String

  let HMAccessoryCategoryTypeSensor: String

  let HMAccessoryCategoryTypeSwitch: String

  let HMAccessoryCategoryTypeThermostat: String

  let HMAccessoryCategoryTypeVideoDoorbell: String

  let HMAccessoryCategoryTypeWindow: String

  let HMAccessoryCategoryTypeWindowCovering: String

  ```


  唯一需要解释的类别是标识信息：该配件是否具有自我标识的能力，例如灯泡闪烁以标识自身？这是一个是/否的布尔值。


  -   名称

  -   制造商

  -   型号

  -   序列号

  -   标识

  -   配件类别


  #### 特征


  你可以添加适用于此配件的特征。你可以为一个配件添加任意数量的特征。使用图 7-1 中所示的“添加特征”按钮。它会打开如图 7-3 所示的模态视图。图 7-3 中显示的详细信息取决于你在视图顶部选择的特征类型。


  ![A367674_1_En_7_Fig3_HTML.jpg](img/A367674_1_En_7_Fig3_HTML.jpg)


  图 7-3. 选择一个特征


  #### 类型


  对于特征，从图 7-3 顶部的弹出菜单中其类型。图 7-4 显示了可选项。


  ![A367674_1_En_7_Fig4_HTML.jpg](img/A367674_1_En_7_Fig4_HTML.jpg)


  图 7-4. 特征选项


  #### 格式


  选择特征的格式，如图 7-5 所示。


  ![A367674_1_En_7_Fig5_HTML.jpg](img/A367674_1_En_7_Fig5_HTML.jpg)


  图 7-5. 特征的单位


  #### 单位


  选择特征的单位，如图 7-6 所示。


  ![A367674_1_En_7_Fig6_HTML.jpg](img/A367674_1_En_7_Fig6_HTML.jpg)


  图 7-6. 特征的单位


  ### 配件做什么？（服务）


  使用图 7-1 底部的“添加服务...”按钮，为你的配件添加任意数量的服务。当你添加服务时，需要填写如图 7-7 所示的信息。


  ![A367674_1_En_7_Fig7_HTML.jpg](img/A367674_1_En_7_Fig7_HTML.jpg)


  图 7-7. 配置一个服务


  请注意，你可以为服务分配一个特定的 UUID（通用唯一标识符）。图 7-8 显示了服务类型的选项。


  ![A367674_1_En_7_Fig8_HTML.jpg](img/A367674_1_En_7_Fig8_HTML.jpg)


  图 7-8. 选择一个服务


  ### 查找配件状态


  以下是配件的瞬态特征，它们取决于网络和其他条件。你在 API 中而非模拟器中管理它们。模拟器提供给你基本数据，然后这些数据被修改，并且此类修改会传递给配件的委托。当你通过代码创建配件时需要设置该委托。


  以下是通常用于查询配件状态的最常用函数。你可以根据需要查询其他特定属性，但这些是状态属性。


  ```

  var isReachable: Bool

  var isBlocked: Bool

  var isBridged: Bool

  ```


