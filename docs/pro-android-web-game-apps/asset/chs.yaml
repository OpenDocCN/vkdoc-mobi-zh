  \ 3, 3, 3, 3],\n];\n```\n\n### 渲染瓦片地图\n\n现在我们准备绘制瓦片地图。为此，我们将创建一个名为 `MapRenderer`\
  \ 的独立类。绘制形成网格的一组方形瓦片的基本代码非常简单。要基于瓦片地图渲染世界，我们需要知道三件事：\n\n-   地图数据（刚刚保存在 `world.js`\
  \ 文件中的数组）\n-   用于提取瓦片的图像\n-   瓦片的大小\n\n我们使用矩形瓦片，因此不需要宽度和高度；仅需一个参数就足够了——`tileSize`。`MapRenderer`\
  \ 类的构造函数看起来相当简单（见代码清单 6-3）。\n\n**代码清单 6-3.** `MapRenderer` 的构造函数\n\n```javascript\n\
  function MapRenderer(mapData, image, tileSize) {\n  this._mapData = mapData;\n \
  \ this._image = image;\n  this._tileSize = tileSize;\n  // 地图的坐标\n  this._x = 0;\n\
  \  this._y = 0;\n  // 图像中一行包含的瓦片数量\n  this._tilesPerRow = image.width / tileSize;\n\
  }\n```\n\n除了保存参数外，构造函数还计算了瓦片表单行中包含的瓦片数量。我们很快将需要这个值来获取瓦片在表单内的坐标。`_x` 和 `_y` 变量是地图本身的坐标。当用户移动视口时，我们将修改这些坐标以在新的位置渲染地图（见代码清单\
  \ 6-4）。\n\n**代码清单 6-4.** *在屏幕上渲染瓦片网格*\n\n```javascript\n_p = MapRenderer.prototype;\n\
  \n/* 绘制整个地图 */\n_p.draw = function(ctx) {\n  for (var cellY = 0; cellY < this._mapData.length;\
  \ cellY++) {\n    for (var cellX = 0; cellX < this._mapData[cellY].length; cellX++)\
  \ {\n      var tileId = this._mapData[cellY][cellX];\n      this._drawTileAt(ctx,\
  \ tileId, cellX, cellY);\n    }\n  }\n};\n\n/* 绘制单个瓦片 */\n_p._drawTileAt = function(ctx,\
  \ tileId, cellX, cellY) {\n  // 瓦片在瓦片表单中的位置\n  var srcX = (tileId % this._tilesPerRow)\
  \ * this._tileSize;\n  var srcY = Math.floor(tileId / this._tilesPerRow) * this._tileSize;\n\
  \  // 瓦片的大小\n  var size = this._tileSize;\n  // 瓦片在屏幕上的位置\n  var destX = this._x\
  \ + cellX * size;\n  var destY = this._y + cellY * size;\n  ctx.drawImage(this._image,\
  \ srcX, srcY, size, size, destX, destY, size, size);\n};\n```\n\n如你所见，绘制瓦片比绘制精灵要简单得多。精灵由帧组成，每帧有自己的大小和锚点。而所有瓦片的大小相同，且不需要锚点。瓦片背后的数学逻辑一点也不复杂。\n\
  \n**第 225 页**\n\n**注意：** 在数组中设置瓦片索引时应格外小心。如果瓦片索引超过了瓦片总数，Canvas API 不会静默忽略复制超出图像边界的像素的尝试。这将抛出异常，导致瓦片地图无法正确渲染。\n\
