  \n**329**\n\n添加事件处理的最后一步是响应圆形按钮的点击并更新其状态。直接将处理程序添加到 `RoundStateButton` 类中即可。我几乎想不到任何场景，在这种按钮点击会表示除“更改状态”以外的含义（别忘了在构造函数中注册此监听器）：\n\
  \n```\n_p._onUpEvent = function(e) {\n    this.nextFrame();\n};\n```\n\n添加这段代码并尝试运行应用程序。你很快就会发现，这段代码执行了过多的操作。点击按钮不仅会改变按钮状态，还会进入下一层并修改地形或改变对象。对象删除也看起来有问题：一旦对象被删除，事件会传递到\
  \ `IsometricTileLayer`，在那里对象又会被重新创建！\n\n**停止事件传播**\n\n在某些情况下，我们不希望事件继续在层之间传递。上一节中有几个这样的例子。一旦按钮被点击，你不希望任何底层接收相同的事件。事件应该在\
  \ `UiLayer` 处结束。出于同样的原因，DOM API 提供了事件操作方法：`stopPropagation()` 和 `preventDefault()`。我们需要自己实现一个类似的机制。问题在于如何保存事件的状态，并跟踪它是被停止了，还是应该继续在层之间传递。\n\
  \n有两种选择。第一种是将事件制作为构造对象，为它们创建一个单独的类层次结构，并添加两个方法，类似于 DOM API 的方法：`stopPropagation()`\
  \ 和 `isPropagationStopped()`。另一种方法是选择简单的路径，约定在事件上设置某个标志，以标记它不应再继续传递。对于这样的项目，采用更简单的方法是有意义的；我们希望事件保持小巧、简单和轻量。\n\
  \n让我们将这个标志称为“stopped”。因此，每当你编写\n\n```\ne.stopped = true;\n```\n\n你就在说：“这个事件我已处理完毕。不要让游戏中的任何其他组件对此作出反应。”\n\
  \n代码中有两个地方应该停止事件。第一个是 `Game` 类中的 `objectClicked` 事件处理程序。如果你点击一个对象来移除它，你必须停止事件的进一步传播。否则，事件会命中\
  \ `IsometricTileLayer`，并且 `Game` 会再次创建一个新的虚拟球体！这就是我们刚刚看到的行为。修改 `Game` 类中的监听器代码，如\
  \ `清单 7-49` 所示。\n\n**清单 7-49.** *Game 类应在处理事件后将其停止*\n\n```\n_p._onObjectClicked\
  \ = function(e) {\n    if (this._ui.getState() == \"objects\") {\n        this._objectLayer.removeObject(e.object);\n\
  \        e.cause.stopped = true;\n    }\n};\n```\n\n请注意，游戏接收到的是 `onObjectClicked`\
  \ 事件，而不是需要停止的 up 事件。为了访问原始事件，我们使用了 `e.cause` 属性——这正是我们为此目的使用的一个小技巧。\n\n第二个显而易见的位置是按钮的事件处理程序。如果用户点击了\n\
  \n\n\n按钮，他只想改变状态，其他什么都不做。这类事件不应该被传播。请修改`RoundStateButton`的代码，如清单 7-50 所示。\n\n**清单\
  \ 7-50.** *在用户点击按钮时阻止事件传播*\n\n```\n_p._onUpEvent = function(e) {\n  this.nextFrame();\n\
  \  e.stopped = true;\n};\n```\n\n该方案的最后一个部分，是更新 `LayerManager`——这个类决定了事件是否应该传播到下一层。代码的修改非常简单，如清单\
  \ 7-51 所示。\n\n**清单 7-51.** *在 LayerManager 中阻止事件传播*\n\n```\n_p._onUpEvent = function(e)\
  \ {\n  for (var i = this._layers.length - 1; i >= 0; i--) {\n    this._layers[i].emit(\"\
  up\", e);\n    if (e.stopped)\n      return;\n  }\n};\n```\n\n**注意：** 还有另一种标记事件已被阻止的方式：事件处理函数的返回值。通常情况下，返回值是`false`。如果某个处理函数返回了`false`，下一层将不会接收到事件。\n\
