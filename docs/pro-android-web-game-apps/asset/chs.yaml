  \ API，我们将实现它的四个文件都放在一个名为 `input` 的独立文件夹中。\n\n## 第 5 章：事件处理与用户输入\n\n### 高级输入\n\n\
  构建输入层来向游戏核心逻辑隐藏浏览器 API，仅仅是拥有良好游戏控制的第一步。我们已经学会了如何处理“原子”输入动作（触摸、释放和移动），现在是时候看一些稍微高级一些的例子了。\n\
  \n#### 拖放\n\n拖放是一种与为触摸屏设计的游戏进行交互的非常方便的方式。例如，在一个拥有大地图的游戏中，拖动地图是浏览世界的自然方式。此外，拖放还可以用于在英雄的仓库和背包之间移动物品，或者为孩子们构建拼图游戏。通过拖放移动拼图碎片是与它们交互的第二自然的方式（仅次于用手抓取）。这种输入方式用于我们下一个游戏实验——第\
  \ 7 章中的等距游戏。\n\n拖放非常容易实现。该方法包含以下三个步骤：\n\n1. 当用户开始交互时，检查他是否选中了一个可拖动的组件。如果没有，则中止该过程，因为没有东西可以拖动。如果有很多可拖动组件，请标记当前处于活动状态的那个。我们称这一步为**拾取**。\n\
  2. 监听移动事件并相应地调整组件的位置。我们称这一步为**移动**。\n3. 当用户完成交互时，完成拖动：执行拖放背后的游戏逻辑（例如，在背包中移动物品），然后取消标记“活动”组件。我们称这一步为**释放**。\n\
  \n让我们构建另一个演示来说明这个概念（参见清单 5-25）。我们将在屏幕上放置几个矩形，并允许用户拖动它们。所有这三个阶段都可以使用我们的 API 轻松实现（完整代码位于本章示例文件夹中的\
  \ `02.drag_and_drop.html` 文件中）。\n\n**清单 5-25.** *实现拖放*\n\n```javascript\n// 拾取阶段\n\
  input.on(\"down\", function(e) {\n    rectangles.forEach(function(rect, index) {\n\
  \        if (insideRectangle(e, rect))\n            selectedIndex = index;\n   \
  \ });\n});\n\n// 移动阶段\ninput.on(\"move\", function(e) {\n    if (selectedIndex >\
  \ -1) {\n        rectangles[selectedIndex].x += e.deltaX;\n        rectangles[selectedIndex].y\
  \ += e.deltaY;\n    }\n});\n\n// 释放阶段\ninput.on(\"up\", function(e) {\n    selectedIndex\
  \ = -1;\n});\n```\n\n移动阶段和释放阶段很简单；然而，拾取阶段有一些陷阱。通过坐标进行检查相当容易判断点\n\n\n### 位于圆形或正方形内。\
  \  \n多边形稍微复杂一些，但仍然可以实现。但如果场景中的物体形状更复杂呢？如果你想选取一张图像，其中包含不应被视为\"材质\"的透明区域呢？显然，有些情况仅使用简单的数学算法是无法实现的。针对此类情况，本章下一节将介绍一种\"\
  像素级精确\"的选择方法。实现拖拽功能的完整源代码可在文件 `04.drag_and_drop.html` 中找到。\n\n**注意：** 我们在本书中创建的游戏不需要像素级精确的选取。然而，这类输入是许多游戏开发者面临的常见问题。因此，我决定专门用一节来讨论这个问题。例如，拼图类游戏如果没有这种技术几乎无法正确实现。\n\
  \n#### 像素级精确选取与图像蒙版\n\n用户能够选择的最小单位是一个像素。与 Canvas API 不同，浏览器事件不处理像素的分数部分：无法选中\"像素的左侧\"\
  或\"像素的底部角落\"。选取复杂形状的任务可以用略微不同的方式表述：确定给定像素属于场景中的哪个图形。显然，如果我们能做到这一点，就能以完美的精度选取任何图形。事实证明，只需相对较少的努力就能实现这样的算法。\n\
  \n每个像素都有一种颜色。假设我们制作了一个游戏，其中每个形状都有一种独特的纯色。例如，三角形是蓝色，正方形是红色，圆形是绿色。当用户点击屏幕时，我们可以通过获取像素的颜色并将其映射到图形，立即知道用户手指下的是哪个图形。这可以通过\
  \ Canvas API 轻松实现。首先，我们需要获取一个像素的颜色；如果用户在坐标 `(51, 73)` 处点击了屏幕，获取该像素值的代码如下所示：\n\n\
  ```javascript\nvar imageData = ctx.getImageData(51, 73, 1, 1).data;\n```\n\n`imageData`\
  \ 是一个包含四个元素的数组：颜色的红色值、绿色值、蓝色值和 alpha 值。有了这个原始像素数据，我们可以判断选中了哪个图像：\n\n```javascript\n\
  if (imageData[2] == 255) {\n    console.log(\"蓝色三角形\");\n} else if (imageData[0]\
  \ == 255) {\n    console.log(\"红色正方形\");\n} else if (imageData[1] == 255) {\n  \
  \  console.log(\"绿色圆形\");\n} else {\n    console.log(\"空白区域\");\n}\n```\n\n但我们制作的大多数游戏都包含各种形状和多种颜色。大多数精灵都有多种颜色！这是否意味着这种技术毫无用处？绝非如此。即使图像和形状有不同的颜色，我们也可以将它们绘制成被纯色\"\
  覆盖\"的样子。在进一步讨论之前，让我们先看看这意味着什么。图 5-6 展示了这一概念。我们有两张卡通房屋图像，每张都有一个调色板（左图）。为了让我们的技术生效，我们必须重新绘制房屋图像，为每张赋予一种独特的纯色（右图）。\n\
  \n**图 5-6.** *原始图像（左）和蒙版（右）*\n\n这种技术被称为蒙版，而图形的纯色轮廓通常被称为蒙版。稍后我们将看到如何创建蒙版；现在，我们先假设这是可行的。\n\
  \n每个像素都有一种颜色。颜色由一个 32 位数字表示，分为四个 8 位分量：红色、绿色、蓝色和 alpha。我们可以轻松地将颜色转换为其整数值，反之亦然。如果我们为场景中的每个图形赋予一个唯一的\
  \ ID，然后将这个 ID 编码为颜色，会发生什么？没错。我们就能为场景中的每个图形获得唯一的颜色。如果我们用这种独特的颜色绘制每个图形的蒙版呢？那么像素的颜色就代表了占据该像素的图形的\
  \ ID！当用户点击屏幕时，我们…\n\n\n\n"
- "# 排版后的内容\n\n只需要将遮罩颜色的红色、绿色和蓝色值转换回来，就可以得到形状的整数 ID。\n\n关键在于现在实现这一技术。\n\n**注意：** 但用户点击后，屏幕难道不会闪过彩虹的每一种颜色吗？我们需要事后*渲染*那些颜色！没错，我们需要渲染遮罩，但承载它们的画布不必与你的“主”画布相同。在真实的游戏中，用于绘制遮罩的画布对用户永远不可见，遮罩也绝不会出现在屏幕上。所有渲染都在内存中幕后完成。\n\
  \n#### 复合操作\n\n让我们从一个简单的问题开始：如何绘制图像遮罩？我们需要将图像的每个不透明像素替换为具有遮罩颜色的不透明像素。为此，我们使用 2D\
