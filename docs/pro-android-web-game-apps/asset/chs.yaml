  \ 中的代码。\n\n**清单 1-1.** *基础 HTML5 页面*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\
  >\n<head>\n<title>Hello World</title>\n</head>\n<body>\nIt Works!\n</body>\n</html>\n\
