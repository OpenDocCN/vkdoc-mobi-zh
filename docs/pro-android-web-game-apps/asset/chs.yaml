  这段代码为测试你的 AI 算法提供了一个良好的开端。\n\n### 构建寻路 AI\n\n构建简单的寻路 AI 需要两个步骤：找到一种方法来构建关卡对应的寻路图，并实现在该图上寻找路径的算法。我们先从算法开始讲起。\n\
  \n### A*算法\n\nA*（读作\"A 星\"）是现代游戏中寻路的事实标准。A* 解决了在图的任意两个节点之间寻找最佳路径的任务。在寻路领域，\"最佳\"\
  路径指的是代价最低的路径——即所有连接权重的总和尽可能小的那条路。从节点 A 到节点 B，经过权重为 3-3-2 的路径（总代价为 8）显然优于经过权重为 5-3-4\
  \ 的路径（总代价为 12）。在我们的简单示例中，连接的权重就是节点之间的距离；然而，其他衡量标准也是可能的：例如，当游戏涉及不同地形类型（如泥土或岩石），或者关卡中存在传送点（可以瞬间将玩家移动到世界的另一部分）时。我们将从一个非常非正式的解释开始介绍这个算法。\n\
  \n##### 非正式描述\n\nA* 的核心思想是在图的节点间进行移动，以便最…\n\n\n首先探索有希望的路径。路径是从起始节点到图中某个其他节点的连接列表，其成本是构成路径的连接权重的总和。图\
  \ 13-9 显示了节点`0`和`3`之间的路径，该路径的成本为`485`（从`0`到`1`需`256`，从`1`到`3`需`229`）。该图展示的与图 13-2\
  \ 完全相同，只是去掉了周围的障碍物。路径查找图构建完成后，我们不再关心关卡的地形几何，只需处理节点位置和连接权重。\n\n![](img/index-526_1.jpg)\n\
  \n**图 13-9.** *节点`0`和`3`之间的路径；该路径的成本为`485`。*\n\n如果我们需要找到节点`0`和`7`之间的路径，前两步是显而易见的。我们移动到节点`1`，然后是节点`3`，因为在这里我们别无选择——只有一条可能的路径。但在节点`3`，我们有四个其他节点可以探索：`2`、`4`、`5`和`6`。问题是先选择哪一个。\n\
  \nA*会选择最有可能最短的路径。为了找出哪条路径最短，我们需要计算路径的预估成本。由于不知道还需要访问多少个节点，我们将路径分为两部分来估算成本。第一部分是“已知”部分——在当前节点之前已经访问过的节点。这一部分的成本很容易计算——只需累加到达当前点所经过的连接权重即可。路径的第二部分，即从当前点到目的地，是未知的，但我们仍需估算它。为此，我们假设当前节点到目的地有一条直接连接。这条连接的权重将是这两点之间的距离。将其加到第一部分，就能得到路径可能成本的粗略估计。\n\
  \n这是对路径长度的乐观估计——我们知道路径至少会这么长，可能更长，但绝不会更短。事实证明，这种启发式方法效果相当不错。\n\n现在，让我们尝试从节点`3`选择最佳路径。表\
  \ 13-1 总结了我们需要对四条可能的路径进行的计算。\n\n**表 13-1.** *计算路径预估成本*\n\n| 路径 | 成本 | 到目标点的距离 |\
  \ 预估成本 |\n|---|---|---|---|\n| `0-1-3-2` | `485 + 248 = 706` | | |\n| `0-1-3-4`\
  \ | `485 + 325 = 810` | | |\n| `0-1-3-5` | `485 + 189 = 674` | | `901` |\n| `0-1-3-6`\
  \ | `485 + 394 = 879` | | |\n\n最有希望的路径是预估成本最小的路径，即`0-1-3-5`。如你所见，这条路径并不是正确的路径，但算法的后续步骤会修正这个问题。\n\
  \n在下一步中，A*会前往节点`5`，并计算路径`0-1-3-5-6`的成本。这条路径比我们在上一步尝试的`0-1-3-6`更长。尽管当时没有选择路径`0-1-3-6`，但现在它反而成为了最有希望的路径。\n\
  \n过程反复进行：选择最佳节点，将其标记为“当前”节点，找到相邻节点，检查哪个最佳，将其标记为当前节点，依此类推，直到我们到达目标节点。该算法保证：如果路径存在，就一定能找到。\n\
  \n当访问一个节点时，我们会记录下到达该节点的连接：一旦找到目标并需要构建整条路径时，我们将使用这些信息。每个节点会跟踪路径的总成本和路径的预估总成本。因此，每个被访问的节点都关联着三个数字：\n\
  \n- 到达该节点的上一个被访问节点\n- 路径成本（截至目前）\n- 到达目的地的预估路径成本\n\n##### 节点列表\n\nA*会跟踪所有已被访问或处理的节点。有两个列表，分别称为\
  \ `open list` 和 `closed list`。当一个节点被处理完毕，且其所有连接都已评估（换言之，该节点在算法的某个步骤中曾是“当前”节点），则它被视为已关闭节点并被移至。\n\
  \n\n\n闭合列表。通过某条连接被访问过，并且具有关联的路径长度和成本估算的节点称为开放节点。\n\n![图 13-8](img/index-528_1.jpg)\n\
  \n## 第 13 章：游戏中的 AI\n\n该节点会被移动到开放列表中。请查看图 13-10，该图说明了节点如何在列表之间移动。\n\n**图 13-10.**\
  \ *A* 算法的列表：填充的节点位于闭合列表中，加粗的节点位于开放列表中，其余节点未被处理。*\n\n第一步从节点`0`开始。在第一步结束时，节点`0`被关闭（因为所有连接都已被处理），其相邻节点变为开放状态（因为我们对其有了成本估算，但尚未处理它们的连接）。第二步从选择一个最佳开放节点开始。由于只有一个节点`1`，我们选择了它。所有连接到节点`1`的节点现在都被处理，然后节点`1`也被移动到闭合列表。接下来，我们将节点`2`、`4`、`5`和`6`添加到开放列表，并找出其中最有希望的节点。当检查完所有四个节点后，节点`3`被移动到闭合列表。\n\
  \n在算法的运行过程中，我们最终可能会尝试评估一个已经在某个列表中的节点。如果到达该节点的新路径比之前的路径更好，那么我们只需将该节点视为未处理：更新关联的值，如果该节点尚未在开放列表中，则将其移动到开放列表。\n\
  \n##### 形式化描述\n\n现在我们准备好进行算法的形式化描述了。`A*`算法首先将第一个节点放入开放节点列表。接下来，当开放节点列表不为空时，执行以下步骤：\n\
  \n1.  寻找最有希望的开放节点（最小估算成本）。该节点现在是“当前”节点。\n2.  对于连接到当前节点的每一个节点：\n    -   a. 计算路径成本和估算路径成本。\n\
  \    -   b. 如果该节点在闭合列表中，并且新路径成本低于与该节点关联的成本，则将其从闭合列表中移除，像对待新节点一样更新其值，然后将其放入开放列表。\n\
  \    -   c. 如果该节点在开放列表中，并且新路径成本低于与该节点关联的成本，则更新其值并将其保留在列表中。\n    -   d. 否则，更新其值并将该节点放入开放列表。\n\
  3.  将当前节点从开放列表移动到闭合列表。\n\n一旦找到终点节点，就可以通过追溯形成路径的节点连接来构建路径。\n\n##### 实现\n\n`A*`算法的实现相当简单（见清单\
  \ 13-4）。根据前面的解释，你应该能轻松理解`findPath`函数的代码。\n\n**清单 13-7.** *A* 算法的 JavaScript 实现*\n\
  \n```\n_p.findPath = function(startNode, endNode) {\n\n  function updateNodeValues(node,\
  \ prevNode, routeCost) {\n    node.routeCost = routeCost;\n    node.estimatedCost\
  \ = routeCost + Graph.distance(node, endNode);\n    node.prevNode = prevNode;\n\
  \  }\n\n  var openList = [];\n  var closedList = [];\n\n  startNode.routeCost =\
  \ 0;\n  openList.push(startNode);\n\n  var routeFound = false;\n\n  while (openList.length\
  \ > 0) {\n    // 获取最小元素（可以考虑更好的获取最小元素的方法）。\n    var currentNode = openList.sort(function(a,\
  \ b) {\n      return a.estimatedCost - b.estimatedCost;\n    })[0];\n\n    if (currentNode\
  \ == endNode) {\n      routeFound = true;\n      break;\n    }\n\n    currentNode.getConnections().forEach(function(connection)\
  \ {\n      var node = connection.node;\n      var newRouteCost = currentNode.routeCost\
  \ + connection.weight;\n\n      if (closedList.indexOf(node) > -1) {\n        //\
  \ 该节点在闭合列表中\n        if (newRouteCost < node.routeCost) {\n          // 从闭合列表中移除\n\
  \          closedList.splice(closedList.indexOf(node), 1);\n          updateNodeValues(node,\
  \ currentNode, newRouteCost);\n          openList.push(node);\n        }\n     \
  \ } else if (openList.indexOf(node) > -1) {\n        // 该节点在开放列表中\n        if (newRouteCost\
  \ < node.routeCost) {\n          updateNodeValues(node, currentNode, newRouteCost);\n\
  \        }\n      } else {\n        // 该节点未被处理\n        updateNodeValues(node, currentNode,\
  \ newRouteCost);\n        openList.push(node);\n      }\n    });\n\n    // 从开放列表中移除\n\
  \    // ... (此处代码似乎不完整，但已按原文保留)\n  }\n}\n```\n\n\n\n`openList.splice(openList.indexOf(currentNode),\
  \ 1);`\n\n`// 添加到关闭列表`\n\n`closedList.push(currentNode);`\n\n`}`\n\n`var route =\
  \ [];`\n\n`if (routeFound) {`\n\n`var routeNode = endNode;`\n\n`while (routeNode)\
  \ {`\n\n`route.push(routeNode);`\n\n`routeNode = routeNode.prevNode;`\n\n`}`\n\n\
  `route.reverse();`\n\n`}`\n\n`// 清理，防止旧数据造成干扰`\n\n`this._nodes.forEach(function(node)\
  \ {`\n`delete node.routeCost;`\n`delete node.estimatedCost;`\n`delete node.prevNode;`\n\
  `});`\n\n![](img/index-531_1.jpg)\n\n**第 13 章：游戏中的 AI**\n\n**531**\n\n`return route;`\n\
  \n`};`\n\n如果再花些绘图功夫，你就可以高亮显示路径，看到图 13-11 所示的结果。\n\n**图 13-11.** *节点之间高亮显示的路径*\n\n\
  #### 实现注意事项\n\n该算法的具体实现可能差异很大，具体取决于你正在制作的游戏。例如，在战术游戏中，单位在方形网格内移动，你其实并不需要路点图。网格本身扮演了图的角色。每个瓦片恰好有四个连接：东、西、北、南（如果你允许对角线移动则是八个），并且很容易预测当前瓦片旁边的瓦片是哪个。如果某个瓦片被标记为“墙壁”，则那个方向就没有连接。图\
  \ 13-12 展示了一个此类游戏世界的示例。\n\n移动的代价通常也是恒定的。距离的计算方式有所不同：欧几里得距离不适用，因为你不允许角色笔直穿过瓦片移动。这种情况下使用的距离被称为曼哈顿距离。它代表了一种只能沿坐标轴移动的世界——就像在曼哈顿市区，你驾车行驶在由街道和林荫大道构成的网格中，但不会穿过摩天大楼。曼哈顿距离由公式\
  \ `|x2 - x1| + |y2 - y1|` 计算得出。对于此类寻路，你可以坚持使用更简单的 A* 算法实现。\n\n**图 13-12.** *基于方形瓦片的游戏世界在寻路时可以无需图结构也能运作。*\n\
  \n最后，实现中有一行代码在大图上可能成为性能杀手：\n\n```\nvar currentNode = openList.sort(function(a, b)\
  \ {return a.estimatedCost - b.estimatedCost})[0];\n```\n\n问题在于，在包含数千个节点的大图上，对开放节点数组进行排序可能会非常慢（在小地图上你不会注意到差异）。如果你需要一个高效的算法，应该寻找能够保持元素预排序的数据结构。例如，基于二叉树的优先队列实现。对这些算法的讨论超出了本章的范围，但你可以在互联网上轻松找到几种优秀的实现。`https://github.com/vadimg/js_bintrees`\
  \ 上的小型库是一个不错的起点。\n\n### 构建寻路图的方法\n\n正确构建的寻路图是实现智能 AI 移动的关键。构建图的方法有很多种，本节将对其中一些进行简要概述。\n\
  \n- 全手动图：由你自行设置节点和连接的坐标。\n- 视线方法：允许你仅设置节点位置，然后基于关卡几何体计算连接。\n- 导航网格：图的节点是多边形而非点。\n\
  \n#### 全手动图\n\n手动创建图的第一种方法是逐个定义每个节点和连接，然后让角色选择离他最近的节点。对于拥有大型关卡的的游戏来说，这种方法可能相当低效，因为游戏设计师在放置节点时必须非常小心。图\
  \ 13-13 展示了一个可能的问题：角色选择了最近的节点，但中间有一堵墙挡路。\n\n**图 13-13.** *左侧是简单寻路图存在的问题：由于关卡设计师的失误，角色试图穿过墙壁到达节点。右侧是修正后的版本。*\n\
  \n\n\n此问题可通过在选中最近节点前检查其是否可见来解决。虽然编码通常不难，但该算法在运行时执行代价可能相当高昂。\n\n手动放置节点也是一项相当繁琐的任务。有几种方法能让关卡设计师的工作更轻松。\n\
  \n#### 射线投射（视线检测）\n\n在许多 2D 游戏中，如果从一个节点能看到另一个节点，则两者可达。利用这一简单规则，我们可以自动生成路径点图的边：放置顶点就变得容易得多。请看图\
  \ 13-14，它展示了这一思想。节点由关卡设计师放置。然后我们在每对节点之间投射虚拟射线，检查中间是否有障碍物。如果视线清晰，则将该边添加到图中：\n\n![](img/index-534_1.jpg)\n\
  \n![](img/index-534_2.jpg)\n\n**图 13-14.** *利用视线自动生成路径点图的边。*\n\n#### 导航网格\n\n现代游戏开发中最流行的技术是导航网格，通常简称为\
  \ navmesh。其背后的思想是让关卡设计师准备图形，但不是放置单个节点，而是绘制多边形来标记“可移动”区域（见图 13-15）。\n\n**图 13-15.**\
  \ *导航网格及其构建的导航图示例*\n\n使用这种方法有很多优点。角色不再需要选择最近的路径点，因此不会试图穿过墙壁到达那里。关卡设计师习惯于移动多边形，也会很快适应导航网格。导航网格的最后一个重要特性是，角色应该能够从其所在多边形的任意点移动到任意相邻多边形的任意点。换句话说，角色不需要遵循可能看起来像轨道的路径。借助导航网格，角色可以实现更智能、更自然的移动算法。\n\
  \n一旦构建了寻路图并实现了寻路算法，就可以让角色在关卡中实际移动。使用第 4 章中描述的技术来构建角色从一个路径点移动到另一个路径点的动画。\n\n### 决策制定\n\
  \n现在智能体可以在关卡中移动了，但其行为仍然不够智能。角色下一步应该做什么？奔跑、追击敌人、寻找食物，还是休息一下？这是决策型 AI 通常要回答的问题。在日常生活中，每个人都需要某种信息来做决定。例如，如果我有点饿，而桌上正好有三明治，我就会吃掉它。如果我非常饿，桌上没有三明治，但厨房里有一个，我就会去拿来吃。为了做决定，我需要观察自己的内部状态（我饿不饿？）和周围的世界（三明治在哪里？）。\n\
  \n在最简单的情况下，决策型 AI 的工作方式几乎相同。然而，内部和外部条件以更形式化的方式呈现：\n\n```\nmakeDecision() {\n  if\
  \ (!isHungry()) {\n    workMore();\n  } else if (isLittleHungry()) {\n    if (isSandwichOnTheDesk())\
  \ {\n      eat();\n    } else {\n      workMore();\n    }\n  } else if (isVeryHungry())\
  \ {\n    if (isSandwichOnTheDesk() || isSandwichInTheKitchen()) {\n      eat();\n\
  \    } else {\n      workMore();\n    }\n  }\n}\n```\n\n这种表示方式称为决策树，因为它很容易以树的形式表示和配置（见图\
  \ 13-16）。\n\n![](img/index-536_1.jpg)\n\n![](img/index-536_2.jpg)\n\n**图 13-16.**\
  \ *决策树示例*\n\n当每个节点都是一个独立的 JavaScript 对象，可以检查条件并返回一个决策或另一个节点时，由此产生的系统可以配置成实现相当有趣的\
  \ AI 行为。\n\n决策树有许多不同类型。例如，树分支不一定只有“是/否”。它可以有多个分支，或概率条件，如图 13-17 所示。\n\n\n\n### **图\
  \ 13-17.** 决策树上的多分支与概率条件\n\n**清单 13-6** 至 **13-8** 中的代码展示了此类决策代理的 JavaScript 实现。该代理只有两个“需求”——进食与睡眠。它会在需要时随时睡觉，但进食的概率仅为\
  \ 30%。这些清单本身相当不言自明，代码基于两种类型的决策节点。\n\n`NumericDecision` 检查对象的参数；如果参数值“小于或等于”阈值，则将执行委托给\
  \ `leNode`，若大于阈值则委托给 `gNode`。该数值决策用于触发饥饿行为。当饥饿值高于 50 时，代理会考虑寻找食物（有 30% 的概率）。我们需要的第二种节点是\
  \ `ProbabilisticNode`——它会根据随机数的值选择相应动作。\n\n### **清单 13-6.** 决策树节点\n\n```javascript\n\
  /**\n * 数值决策基于特定代理参数的值。\n * 若数值小于或等于阈值，执行 leNode\n * 否则执行 gNode。\n */\nfunction\
  \ NumericDecision(name, threshold, leNode, gNode) {\n    this._name = name;\n  \
  \  this._threshold = threshold;\n    this._leNode = leNode;\n    this._gNode = gNode;\n\
  }\n\nNumericDecision.prototype.execute = function(agent) {\n    var node = agent[this._name]\
  \ > this._threshold ? this._gNode : this._leNode;\n    node.execute(agent);\n};\n\
  \n/**\n * 概率决策根据机会值执行\n * 0 - 从不执行\n * 1 - 始终执行\n * 介于 0-1 之间\n */\nfunction ProbabilisticDecision(chance,\
  \ trueNode, falseNode) {\n    this._chance = chance;\n    this._trueNode = trueNode;\n\
  \    this._falseNode = falseNode;\n}\n\nProbabilisticDecision.prototype.execute\
  \ = function(agent) {\n    var node = Math.random() < this._chance ? this._trueNode\
  \ : this._falseNode;\n    node.execute(agent);\n};\n```\n\n现在我们已经有了节点，接着可以添加一些动作。`EatAction`\
  \ 让代理前往预定义的食物源位置并开始进食。`SleepAction` 让代理在原地睡觉。最后，`WanderAroundAction` 让代理在地图上选择一个随机点并向其移动。\n\
  \n### **清单 13-7.** 动作：决策树的叶节点\n\n```javascript\n/**\n * 进食 - 降低饥饿值\n */\nfunction\
  \ EatAction() { }\n\nEatAction.prototype.execute = function(agent) {\n    console.log(\"\
  Decided to eat\");\n    navigateTo(220, 70);\n    eat();\n};\n\n/**\n * 睡眠 - 增加能量\n\
  \ */\nfunction SleepAction() {}\n\nSleepAction.prototype.execute = function(agent)\
  \ {\n    console.log(\"Decided to sleep\");\n    sleep();\n};\n\n/**\n * 无所事事\n\
  \ */\nfunction WanderAroundAction() {}\n\nWanderAroundAction.prototype.execute =\
  \ function(agent) {\n    console.log(\"Wandering around...\")\n    goToRandomPoint();\n\
  };\n```\n\n最后，我们需要创建决策树并让其做出决策。**清单 13-8** 展示了具体实现方法。\n\n### **清单 13-8.** 初始化决策树\n\
  \n```javascript\n/**\n * 初始化决策树\n */\nfunction buildDecisionTree() {\n    var wander\
  \ = new WanderAroundAction();\n    var sleep = new SleepAction();\n    var eat =\
  \ new EatAction();\n    return new NumericDecision(\"hunger\", 50,\n        new\
  \ NumericDecision(\"energy\", 30,\n            sleep,\n            wander),\n  \
  \      new ProbabilisticDecision(0.3,\n            eat,\n            new NumericDecision(\"\
  energy\", 30,\n                sleep,\n                wander)));\n}\n```\n\n一旦决策树初始化完成，每当代理需要做出决策时，即可调用\
  \ `tree.execute()`。值得一提的是，决策不应在游戏的每一帧都执行。决策逻辑仅在角色需要重新考虑当前行为时触发。在本章附带的源代码示例中，角色在完成动作序列并需要执行新动作时才会做出决策。\n\
  \n决策本身可能需要复杂的动作。例如，决定为武器补充弹药可能涉及寻找弹药位置、移动至该位置（借助寻路算法）、拾取弹药并装填，最后返回前线。这样一组复杂动作通常被称为行为。\n\
  \n\n\n# 排版后的文本\n\n构建人工智能有许多其他方法：模糊逻辑、面向目标的设计、状态机、规则系统及其组合。虽然涉及的内容很多，但对于许多休闲游戏而言，仅需具备寻路和基于决策树的\
  \ AI 引擎就足够了。如果你对进一步研究感兴趣，可以阅读伊恩·米林顿（Ian Millington）和约翰·芬格（John Funge）合著的优秀著作《游戏人工智能（第二版）》（Morgan\
  \ Kaufmann，2009 年）。书中包含一系列讲解清晰的 AI 算法，若能明智运用，可使你的游戏机器人表现得非常聪明。\n\n结合了寻路与决策技术的代码可在名为`04.decisions.html`的文件中找到，该文件与本章节的其他源码一同提供。别忘了时常访问\
  \ GitHub 上的 JavaScript AI 沙盒项目（<https://github.com/Juriy/gameai>）。你可能会在那里找到对自己游戏有用的内容。\n\
  \n## 总结\n\n本章是深入探索 AI 主题的起点。人工智能在游戏开发中扮演着重要角色，但你应仔细评估特定游戏所需的 AI 水平。有时最有趣的游戏恰恰使用了最简单的\
  \ AI 技术。AI 执行的最基本且最常见的任务就是寻路——在关卡中两点之间找到一条路径。A*寻路算法依赖于航点图——即游戏世界中可到达区域的数学表示。\n\n\
  ## 第 13 章：游戏中的 AI\n\n我们学习了构建图的多种方法，并强调了每种技术的常见陷阱。我们还初步了解了为关卡表示导航数据的不同方式，即导航网格。\n\
  \n我们还探讨了决策树——一种帮助智能体选择下一步行动的简单算法。这可能是该系列中最简单的算法，但它能让我们实现非常有趣且逼真的行为。\n\n## 第 14 章：JavaScript\
  \ 游戏引擎\n\n本章致力于介绍第三方工具：专为网页浏览器设计的游戏引擎和图形库。游戏引擎提供了制作游戏所需的高级功能，极大简化了开发者工作。例如，如果从头开始制作游戏，你必须亲自处理每个细节：加载图片、将其分解为帧和精灵、渲染世界、检测点击等。我们在第\
  \ 7 章已经做过这些工作，你可能还记得需要操心相当多的方面。一个好的 2D 游戏引擎能直接为你提供所有这些功能。\n\n此时常见的问题是：“既然可以直接选择游戏引擎并开始制作游戏，为什么还要花大量时间学习基础知识？”原因很简单：游戏引擎并非万能灵药，若不理解其背后的基本原理，就无法以最高效率使用它们。此外，当你找到适合需求的引擎时，可能仍需要为其添加一些游戏特需的功能。既然你已经掌握了这些知识，让我们看看一些旨在让游戏开发者工作更轻松的领先开源工具。\n\
  \n本章将专注于游戏引擎和图形库。我们将探讨以下主题：\n\n- 游戏引擎及其与图形 API 的区别\n- 实体组件系统\n\n## 第 14 章：JavaScript\
  \ 游戏引擎（续）\n\n- 如何使用 2D 游戏引擎 Crafty.js 编写游戏\n\n**注意：** 2D 和 3D 图形领域都有相当多的产品，所以如果你想知道我为什么选择介绍\
  \ Crafty 而不是引擎 X，我将解释我的决策依据。首先，工具必须免费且开源。阅读引擎代码以了解其内部工作原理是很有益处的。研究成熟引擎的代码是学习新技巧的好方法。其次，该项目应至少\n\
  \n\n\n### 排版后\n\n至少是近期有过活跃更新的。如果它已经三四个月没有更新，那么该引擎的作者很可能已经对其失去了兴趣。第三，社区规模也很重要：一个活跃且乐于助人的社区总是加分项。\n\
  \n### 图形 API、库与游戏引擎\n\n我们已经开始讨论游戏引擎、图形库和 API，但还没有强调这些工具类别之间的差异。本节旨在让你对它们的区别、用途和局限性有一个基本的了解。\n\
  \n假设你正拿着一部智能手机测试你刚创建的游戏。JavaScript 代码正在渲染帧，而角色正在敌群中奋力厮杀。但要说 100%准确的话，渲染帧的并非 JavaScript\
  \ 本身。你发送到画布上的渲染命令，需要经过漫长路径，最终才能在负责实际工作的硬件上执行。\n\nJavaScript 游戏开发的最大优点之一，就是你无需关心图形系统架构或硬件细节等底层问题。之所以能做到这一点，是因为浏览器提供了图形\
  \ API——即我们用于渲染的一组函数。\n\n#### 图形 API\n\n图形 API 是一个抽象层，位于你的代码和底层系统之间。其主要目标是使渲染与平台无关。图\
  \ 14-1 展示了图形 API 的鸟瞰图。\n\n![](img/index-543_1.jpg)\n\n**图 14-1.** *图形 API 的高层视图。图形\
  \ API 的作用是在 JavaScript 代码和底层系统之间提供一个抽象层。*\n\n到目前为止，我们只使用过`Context2D`和`WebGL`这两种图形\
  \ API。从 HTML5 游戏的角度来看，这些 API 属于底层 API：它们提供了一小组函数，这些函数就像微小的构建模块——你用来创建应用程序的小积木。在图形\
  \ API 层面工作，能让你完全控制渲染过程，至少是底层上下文所允许的“完全”控制。\n\n这类 API 的缺点在于，实现你的想法通常需要编写大量代码。例如，要用`Context2D`画一条线，你需要设置描边样式，然后依次调用`beginPath()`、`moveTo()`、`lineTo()`，最后调用`stroke()`。要显示最简单的事物，至少需要五个函数调用！\n\
  \n你可以使用图形 API 将代码打磨至完美。考虑到上一段的例子，如果你知道你的游戏需要渲染许多线条，你可以微调执行此操作的函数。你可以按颜色对线条进行分组，并将`fillStyle()`和`stroke()`的调用次数降至最低——从而从\
  \ CPU 中榨取每一丝性能。高级 API 通常不允许这种级别的控制，有时你不得不为了开发速度而牺牲游戏性能。\n\n#### 图形库\n\n图形库是构建在原始\
  \ API 之上的“瑞士军刀”式工具，为处理图形内容时出现的典型任务提供标准解决方案。通常，它们比图形 API 更专业化。例如，一个库可以专注于通用几何图形并处理形状，或者专注于照片处理并调整亮度和饱和度，或者应用复杂的艺术效果和滤镜。第三种工具可能专门处理图表，并简化图形渲染任务。\n\
  \n![](img/index-544_1.jpg)\n\n图形库有其优势：它们实现了那些否则可能需要你自己花费大量时间才能实现的功能。快，想一个在画布上应用“锐化边缘”滤镜的方法！大多数人无法立即回答这个问题；他们会花费宝贵的时间去搜索、编写代码、测试，最后才将其添加到项目中。`WebGL`是另一个底层\
  \ API 的好例子，有时它会让事情看起来……\n\n\n\n# 图形库与游戏引擎\n\n它们本应更易于使用。一些图形库让 WebGL 应用的编写成为真正的乐事。\n\
  \n部分图形库专为游戏设计，这意味着它们专注于解决典型的游戏开发任务。在第 7 章中，我们创建了一系列类来加载关卡、绘制等距地形、渲染对象、标记脏矩形区域等。实际上，我们编写了一个面向游戏的库，可用于在其上构建游戏。图\
  \ 14-2 展示了图形库与渲染系统其他组件之间的关系。\n\n**图 14-2.** *图形库是一组在图形 API 之上运行的工具，为典型的图形相关任务提供典型解决方案。*\n\
  \n世界发展日新月异，它不会等你亲手打造每一个工具。没有合适工具的帮助，几乎不可能完成一个项目。在本书的许多章节中，我们已经使用了一些工具：`Node.js`和`Express`框架、`Socket.IO`以及`Cordova`。图形领域也不例外——如果你知道某个库能解决你的问题，在重复造轮子之前，不妨先试试它。\n\
  \n#### 游戏引擎\n\n游戏引擎的主要目标是为游戏服务。游戏引擎解决了游戏开发中特定的广泛问题。它们比典型的库复杂得多，且不限于处理图形。\n\n![index-545_1.jpg](img/index-545_1.jpg)\n\
  \n第 14 章：JavaScript 游戏引擎 **545\n\n游戏引擎通常为构建游戏提供完整的解决方案，包括物理、人工智能、音效、视频播放、网络、社交功能以及关卡编辑器等组件。游戏引擎可以提供基础设施解决方案，如聊天室、高分榜或社交网络集成。\n\
  \n游戏引擎不仅是一个 API，也不仅是一组供程序员加速开发的辅助类。它是一个拥有自身架构的框架，能帮助程序员构建经过深思熟虑的应用。如果你想了解大型商业游戏引擎的样貌，可以尝试虚幻引擎（[www.unrealengine.com](http://www.unrealengine.com)）或\
  \ Unity3D（[`unity3d.com`](http://unity3d.com)）。\n\n游戏引擎与系统其他层之间的关系如图 14-3 所示。\n\n\
  **图 14-3.** *游戏引擎为游戏开发提供复杂解决方案；渲染只是其中的一部分。*\n\n**注意：** 在本节中，我并非倡导你为项目使用（或不用）任何类型的工具。没有万能的银弹，也没有适用于所有情况的\
  \ API。请务实思考：想想你实际能从该工具中获得什么，以及它的权衡之处是什么。也许该 API 是为比你最初计划支持的 Android 版本更新的版本设计的。也许该工具并非免费，而是需要一些投入。或者它可能为你节省一半的开发时间，让你的游戏比竞争对手更快推向市场！\n\
  \n第 14 章：JavaScript 游戏引擎 **Crafty\n\n`Crafty`（[`craftyjs.com`](http://craftyjs.com)）是一个设计精良且轻量级的\
  \ 2D 游戏引擎。核心文件压缩后仅有 81K，却仍提供了许多出色的开箱即用功能：\n\n- 自定义事件系统\n- 精灵表、动画和瓦片地图——包括等距地图\n\
  - 碰撞检测与\"重力\"\n- 输入处理与音频播放\n\n这只是一个简短的列表。完整的功能集在[官方文档](http://craftyjs.com/api/)中有详细描述。`Crafty`还支持模块，因此如果你缺少某些功能，可以查看[组件页面](http://craftycomponents.com)。\n\
  \n`Crafty`建立在\"实体组件范式\"（或称实体组件系统）的理念之上——这是一种完美契合游戏开发的特殊游戏实体处理方式。作为我们介绍`Crafty`的第一步，让我们看看实体组件系统与传统面向对象方法有何不同，以及你能用它解决哪些类型的游戏开发问题。\n\
  \n\n\n### 实体组件系统\n\n让我们来思考一个典型的游戏，其中包含许多具有不同属性的对象。策略游戏就是一个很好的例子。游戏实体主要分为两大类：由工程师建造并固定在地面上的建筑物，以及可以移动、射击、飞行、治疗其他单位、携带乘客并执行其他有用功能的单位。现在，请思考一下这类游戏的类层次结构。通用的“游戏实体”应位于层次结构的顶层。接着，我们有建筑和单位两种实体。每个单位又可以飞行或步行、造成伤害或进行治疗、运输或被运输，甚至同时具备多种功能。如果继续这样构建类树，你很快就会得到一个相当复杂且难以管理的架构。图\
  \ 14-4 展示了这样一个重量级层次结构的示例。\n\n![](img/index-547_1.jpg)\n\n**图 14-4.** *游戏实体继承的一个典型问题*\n\
  \n即使你设法将实体拆分到树的分支中，你很快也会面临一个问题：如何添加那些必须同时属于两个分支的新实体。如果有一个可以治疗附近单位的建筑呢？一方面，它属于“建筑”层次结构，但另一方面，它必须继承自\
  \ `Healer`。然而，`Healer` 属于“单位”分支。这意味着它具有许多对建筑来说无用的方法。当你尝试添加“战斗矿工”或“飞行机械师”时，同样的情况也会发生。事实上，这是继承中的一个典型问题。多个独立且可互换的属性是继承最不擅长处理的情况。\n\
  \n另一种方法是使用“组合”方法。将像 `Fighter`、`Healer`、`Builder` 或 `Flyer` 这样的特定属性提取到单独的对象中，如图 14-5\
  \ 所示。Crafty 使用术语“组件”来描述这些属性。每个组件都包含与其所描述属性特定的方法和属性。例如，一个 `Flyer` 可以拥有 `pitch`、`yaw`\
  \ 和 `flightSpeed` 等属性，以及 `doBarrelRoll()` 或 `land()` 等方法。而一个 `Mechanic` 则会有 `sparePartsLeft`\
  \ 和 `startFixing()`。\n\n![](img/index-548_1.jpg)\n![](img/index-548_2.jpg)\n\n**图\
  \ 14-5.** *游戏实体的“属性”或“组件”*\n\n然后，这些组件被“注入”到对象中，从而描述出你想要的确切游戏单位。图 14-6 展示了一些可能的单位属性组合。\n\
  \n**图 14-6.** *组合组件以描述单位的属性*\n\n通过使用这种方法，飞行机械师由三个组件组成：`destroyable`（因为有人可以射击它）、`flying`（因为它可以飞行，并且拥有飞行速度和飞行距离等参数）和\
  \ `mechanic`（意味着它可以修理损坏的单位）。类似地，治疗建筑和攻击型矿工也由三个组件组成。\n\n在 JavaScript 中，这种系统的实现非常直接。本质上，组件是为了描述特定属性而必须添加到对象中的函数和变量的集合。例如，`Flyer`\
  \ 和 `Mechanic` 组件可能如下所示：\n\n```\nvar Flyer = {\n  pitch: 0,\n  yaw: 0.31,\n  doBarrelRoll:\
  \ function() {\n    // code goes here\n  }\n}\n\nvar Mechanic = {\n  sparePartsLeft:\
  \ 10,\n  startFixing: function() {\n    // code goes here\n  }\n}\n```\n\n如果我们需要创建一个飞行机械师单位，我们必须将两个组件的代码合并到一个对象中，使结果如下所示：\n\
  \n```\nvar FlyingMechanic = {\n  pitch: 0,\n  yaw: 0.31,\n  sparePartsLeft: 10,\n\
  \  startFixing: function() {\n    // code goes here\n  },\n  doBarrelRoll: function()\
  \ {\n    // code goes here\n  }\n}\n```\n\n程序化地组合组件也非常容易。清单 14-1 给出了一个示例实现。请注意，这不是一个\
  \ Crafty 的实现，而是一个展示该系统工作原理的简化模型。\n\n**清单 14-1.** *程序化组合组件*\n\n```\nvar flyingMechanic\
  \ = {};\n```\n\n\n\n```javascript\n[Flying, Mechanic].forEach(function(component)\
  \ {\n  for (var prop in component) {\n    flyingMechanic[prop] = component[prop];\n\
  \  }\n});\n```\n\n这段代码简单地将各组件的属性和函数复制到 `flyingMechanic` 对象中。最终结果正如我们所期望：一个兼具飞行单位与机械师特质的对象。\n\
  \n古老的面向对象编程原则曾这样描述对象的组织方式：“组合优于继承”。在游戏开发中，这一原则的实践常被称为**实体组件系统**。游戏实体最初为空，随后通过组件不断丰富，每个组件描述了该实体的特定属性。每个组件都为对象添加新的参数和方法。这正是\
  \ Crafty 的核心思想，稍后我们将看到具体代码实现。\n\n## 第 14 章：JavaScript 游戏引擎\n\n**注意：** 实体组件系统还有另一个更常用的名称：**混入**。这个名称的灵感来源于一种可添加葡萄干、坚果或糖果等美味配料的冰淇淋。关于混入（这里指编程概念，而非冰淇淋）的深度探讨，可以参阅一篇精彩博文《重新审视\
  \ JavaScript 混入》，地址为 [`bit.ly/lZVgQs`](http://bit.ly/lZVgQs)。\n\n既然我们已经了解了 Crafty\
  \ 的核心思想，现在就开始用它编写一个真正的游戏吧！\n\n### Crafty 入门\n\n首先，从官方网站（[`craftyjs.com`](http://craftyjs.com)）下载最新版\
  \ Crafty（截至撰写本文时为 0.4.9 版本）。使用 Crafty 制作的游戏通常以一段简单的初始化代码开始，如清单 14-2 所示。\n\n**清单\
  \ 14-2.** *Crafty 初始化*\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n\
  <meta charset=\"utf-8\" />\n<meta name=\"viewport\"\ncontent=\"width=device-width,\
  \ initial-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi\"\
  />\n<style>\nhtml, body {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\n\
  padding:0;\nborder: 0;\n}\n</style>\n<script src=\"js/crafty.js\"></script>\n<script>\n\
  window.onload = function() {\n// 全屏初始化 Crafty\nCrafty.init();\n// 初始化画布\nCrafty.canvas.init();\n\
  // 其余游戏代码写在这里\n};\n</script>\n</head>\n<body>\n</body>\n</html>\n```\n\nCrafty 无需任何\
  \ HTML 元素即可启动：它会自行创建所需的 DOM 元素。此外，Crafty 还会尽力判断用户使用的是桌面浏览器还是移动浏览器。如果是移动浏览器，Crafty\
  \ 会让画布元素占满整个屏幕，监听触摸事件作为输入，并添加适当的 meta 属性来设置视口属性。\n\n下一步是定义一个或多个场景。场景即游戏画面，例如加载画面、游戏棋盘、高分榜等。第\
  \ 12 章中的“四球游戏”有两个主要状态：“大厅”和“游戏”。尽管名称不同，Crafty 中的场景概念与之类似。清单 14-3 中的代码展示了如何为典型游戏流程创建四个场景。\n\
  \n**清单 14-3.** *设置游戏场景：加载、游戏、胜利和游戏结束*\n\n```javascript\nwindow.onload = function()\
  \ {\nCrafty.init();\nCrafty.canvas.init();\nCrafty.scene(\"loading\", function()\
  \ {\n// 加载场景，例如显示加载画面\n});\nCrafty.scene(\"game\", function() {\n// 场景开始\n}, function()\
  \ {\n// 场景结束\n} );\nCrafty.scene(\"win\", function() {\n// 胜利场景\n});\nCrafty.scene(\"\
  gameover\", function() {\n// 游戏结束场景\n});\n// 启动\"加载\"场景\nCrafty.scene(\"loading\"\
  );\n}\n```\n\n![图 14-7](img/index-552_1.jpg)\n\n我们在本章中创建的游戏遵循一个简单流程，如图 14-7 所示。\n\
  \n**图 14-7.** *示例游戏的流程*\n\n`Crafty.scene()` 函数用于定义或运行场景。传入的两个参数函数分别是 intro（场景启动时运行的代码）和\
  \ outro（下一个场景接管前运行的代码）。第一个函数是游戏的“核心”——在此处展示视觉效果并运行逻辑。\n\n\n\n让我们给游戏添加一个简单的加载画面。为游戏创建一个漂亮的标志，并将其放入`img/logo.png`文件。或者，直接使用本章提供的标志文件。第一步是根据文件创建精灵：\n\
  \n```\nCrafty.sprite(420, 75, \"img/logo.png\", { logo: [0,0] });\n```\n\n这行代码告诉`Crafty`，我们要从`\"\
  img/logo.png\"`图片加载一个精灵。我们的精灵有一帧，其尺寸为 420 × 75 像素，帧名为`logo`，在精灵表中的位置为 (0, 0)。`Crafty`将会创建一个名为`logo`的新组件。现在，让我们创建使用这个新组件的实体：\n\
  \n```\nvar logoEntity = Crafty.e(\"2D, Canvas, logo\");\n```\n\n借助`Crafty.e()`函数，我们创建了新的游戏实体。这个实体是三个组件的组合：`2D`、`canvas`和`logo`。前两个组件是`Crafty`的内置组件，它们决定了实体被绘制的方式。第三个组件`logo`，是我们刚刚创建的。让我们将新实体放置在屏幕中央。以下几行代码正是实现此目的：\n\
  \n```\nlogoEntity.attr({\n  x: (Crafty.DOM.window.width - 420)/2,\n  y: (Crafty.DOM.window.height\
  \ - 75)/2\n});\n```\n\n清单 14-4 展示了经过优化的代码版本。粗体行表示标志的新代码。\n\n**清单 14-4.** *在游戏开始时显示标志*\n\
