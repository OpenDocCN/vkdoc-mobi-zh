  100\"></canvas>\n</body>\n</html>\n```\n\n- **95**\n\n\n\n### 强制屏幕方向\n\n清单 3-6 中的骨架代码并不会强制锁定屏幕方向，它只是在检测到窗口尺寸变化时重新绘制画布内容。众所周知，许多原生安卓游戏会根据游戏最佳体验，将屏幕固定在竖屏或横屏模式。但在浏览器环境中，强制锁定方向是不可行的。这种做法被认为过于侵入性，可能会损害用户体验。毫无疑问，游戏与展示新闻或天气预报的典型网页截然不同，因此对某类网站有害的做法，对其他类型网站或许正是良策。\n\
  \n网页游戏本质上是在浏览器内渲染的网页，用户期望它具备浏览器的常规行为：当设备旋转时，浏览器应随之调整方向。若要改变这一行为，你必须有非常充分的理由。但且慢，我刚刚提到无法锁定屏幕方向，那我们又如何改变这一行为呢？\n\
  \n安卓浏览器通过`'orientationchange'`事件通知页面设备方向已改变。当前方向值存储在`window.orientation`属性中。结合这两者，你可以构建一种机制，友好地提示用户：以另一种屏幕方向游玩本游戏效果更佳。例如，你可以创建一个对话框（最好不是警告框，而是模拟游戏\
  \ UI 风格的对话框），输出类似“提示：《四球大作战》最佳体验为竖屏模式”的建议性文本。记得添加“不再提示”复选框或类似功能，以便用户取消订阅该通知。\n\n\
  另一种可行的方案是模拟锁定方向的效果。借助上下文变换（context transformation），当用户旋转屏幕时，你可以旋转画布的坐标系统，使游戏元素始终保持正确方向。清单\
  \ 3-7 中的代码展示了如何更新骨架代码，从而实现游戏方向的“锁定”效果。\n\n## 清单 3-7. 锁定游戏方向\n\n```\n<script>\nvar\
  \ canvas;\nvar ctx;\n\nfunction init() {\n    canvas = initFullScreenCanvas(\"mainCanvas\"\
  );\n    ctx = canvas.getContext(\"2d\");\n    repaint();\n}\n\nfunction initFullScreenCanvas(canvasId)\
  \ {\n    var canvas = document.getElementById(canvasId);\n    resizeCanvas(canvas);\n\
  \    window.addEventListener(\"resize\", function() {\n        resizeCanvas(canvas);\n\
  \    });\n    return canvas;\n}\n\nfunction resizeCanvas(canvas) {\n    canvas.width\
  \ = document.width || document.body.clientWidth;\n    canvas.height = document.height\
  \ || document.body.clientHeight;\n    // 绘制一些内容以观察方向变化的效果\n    repaint();\n}\n\n\
  function repaint() {\n    if (!ctx)\n        return;\n    // 清除背景\n    ctx.fillStyle\
  \ = \"white\";\n    ctx.fillRect(0, 0, canvas.width, canvas.height);\n    reorient();\n\
  \    ctx.fillStyle = \"darkgreen\";\n    ctx.fillRect(10, 10, 250, 30);\n}\n\nfunction\
  \ reorient() {\n    var angle = window.orientation;\n    if (angle) {\n        var\
  \ rot = -Math.PI*(angle/180);\n        ctx.translate(angle == -90 ? canvas.width\
  \ : 0,\n                      angle == 90 ? canvas.height : 0);\n        ctx.rotate(rot);\n\
  \    }\n}\n</script>\n```\n\n新增的代码以粗体显示。我们添加了一个`repaint()`函数，它会绘制一个形似字母 T 的绿色图形。在执行绘制代码之前，该函数会调用`reorient()`——当设备方向改变时，这个函数会修改画布上下文的坐标系统。效果是：无论用户如何旋转智能手机，屏幕看起来都像被“锁定”在竖屏模式。绿色的“T”会始终吸附在设备顶部。图\
  \ 3-2 对比了浏览器的正常行为与“锁定”行为。\n\n## 图 3-2. 竖屏锁定页面（上方）与正常页面（下方）的行为对比\n\n图 3-2 左侧的图像展示了页面在竖屏方向下的初始状态。顶部两幅图像展示了锁定版本在旋转时的行为。如你所见，唯一随方向变化的元素是...\n\
  \n\n\n\n"
- "# 第三章：创建第一个游戏\n\n`orientation` 指的是地址栏。页面似乎对方向变化没有响应。\n\n下方两张图片展示了页面的正常行为。\n\n关于网页游戏的一般建议：如果你能让你的游戏在横竖两种屏幕方向下都能运行——那就这样做。这样，你就不会违反标准行为，用户也会感到满意。如果无论如何都需要锁定屏幕方向——那就使用侵入性最小的方式来实现。本书其余部分的代码都依赖于标准浏览器行为，并不会强制指定任何特定方向。\n\
  \n**注意：** 在原生的安卓游戏中锁定屏幕方向是一种标准做法，因此，如果你设计的是原生游戏，则不应避免这样做。关于如何从 Web 应用制作原生游戏，更多信息请参见第\
  \ 15 章。\n\n本书中的大多数示例都使用了这个基本框架，本章的项目也不例外。我们刚刚实现的全屏画布设置当然不是布局网页的唯一可能方式。游戏可以有一个更小的画布，并将其余页面空间用于用户界面元素——例如，游戏内的聊天控件。然而，本节描述的方法是最典型的。\n\
  \n为了方便起见，该框架的代码单独保存在名为 `skeleton.html` 的文件中。一旦你开始新的游戏实验，就可以将其作为模板使用。\n\n### 游戏架构\n\
  \n本节的目标是思考组成“四球游戏”的组件。这些组件的功能是什么？它们之间的关系又是什么？游戏是相对复杂的应用程序，可能包含数十个不同的类，每个类负责自己的任务：加载资源、渲染场景、游戏逻辑、网络、人工智能、声音等等。如果所有代码都放入一个庞大的类中（或者更糟糕，直接放入\
  \ HTML 页面的主体中），你最终会得到一个难以理解或修改的、怪物般的脚本。\n\n我们希望我们的项目编写良好：没有用于保存状态的全局变量，代码中没有“坏味道”，并且拥有一个清晰、面向对象的\
  \ API，每个类都执行一组明确定义的功能。如果你对 JavaScript 中的继承和原型感到不自在，请毫不犹豫地回顾本书的第一章。理解这些原则对于本章至关重要。\n\
  \n**第三章：创建第一个游戏 99**\n\n让我们从游戏流程开始，然后思考游戏如何被分解为一组独立的组件。以下是游戏加载后发生的事情：\n\n1.  最初，用户看到空棋盘。\n\
  2.  用户点击棋盘放置棋子。如果该回合无效，则不会发生任何事。\n3.  如果上一个回合是“获胜”回合，游戏会报告哪个玩家获胜：红色或绿色。如果棋盘上没有剩余空间，游戏则报告平局。否则，下一个玩家有机会进行他的回合。\n\
  4.  游戏结束后（无论获胜还是平局），玩家应该看到一个提示框，其中显示诸如“红方玩家获胜”之类的文本。\n5.  最后，新游戏开始。棋盘清空，准备开始游戏。\n\
  \n非常简单，对吧？现在，让我们再进一步，思考为了实现上述流程，游戏具体需要具备哪些能力：\n\n-   绘制棋盘和棋子（渲染）\n-   检查回合是否有效且不违反游戏规则，并检查玩家是否获胜或是否达到平局状态（逻辑）\n\
  -   响应用户输入，并确定点击了哪一列（事件处理）\n-   将组件连接起来：将浏览器事件传递给逻辑处理程序和渲染例程；当棋盘状态改变时更新 UI；管理游戏流程；报告获胜或平局；为新游戏清空棋盘；等等（内务管理）。\n\
  \n现在，将整个项目分解成各个类就非常容易了。它们如下所示：\n\n-   `Game`：负责启动游戏、事件处理的类\n\n\n\n## 第 3 章：创建第一个游戏\n\
  \n`handling`和`housekeeping`。它的任务是将其他组件连接起来，让它们相互通信。可以将其视为游戏的主要\"编排\"类。\n\n- **`BoardModel`**：游戏的核心。负责实现机制的类。它存储游戏状态信息：哪些格子为空，哪些被红绿棋子占据，当前轮到哪位玩家，以及如果玩家将棋子放入第三列会发生什么。这里我们将实现游戏规则：走棋验证和获胜条件检查。\n\
  - **`BoardRenderer`**：负责视觉呈现和在画布上渲染游戏界面的类。当`BoardRenderer`需要渲染某个格子时，它会向`BoardModel`询问该格子的状态：是空、红色还是绿色？`BoardModel`充当渲染器的数据源。该类的代码大部分已在第\
  \ 2 章编写完成。\n\n为了让架构更清晰，以下示例展示了用户轻触屏幕时各类之间的交互流程：\n\n1. 用户轻触屏幕。浏览器触发包含点击坐标的事件。\n2.\
  \ `Game`类接收事件并检查用户点击的是哪一列。它能够从浏览器坐标转换为列坐标，因为它知道棋盘在画布中的位置以及每列的宽度，因此可以判断出被点击的是哪一列。\n\
  3. 获得列索引后，`Game`询问`BoardModel`是否可以执行此操作。如果该列已满，将忽略无效输入。有效操作会更新`BoardModel`：新棋子出现在内部棋盘表示中。\n\
  4. 现在走棋已完成，但用户尚未在屏幕上看到任何变化。我们更新了模型但未更新画布——它仍显示旧版本棋盘。`Game`调用`BoardRenderer`重绘包含新棋子的格子。\n\
  5. 为重绘格子，`BoardRenderer`需要知道该格子中棋子的颜色。它从`BoardModel`获取颜色标识符，并渲染出带有渐变填充的可爱球体。\n6.\
  \ 现在画布已更新，玩家看到新棋子。\n7. 最后，当比赛结束时，`Game`显示提示框通知用户结果。\n8. `Game`\"重置\"`BoardModel`的状态，调用`BoardRenderer`重绘空棋盘，并开始新比赛。\n\
  \n### 制作游戏\n\n一旦定义了架构，我们就可以开始编写代码。首先创建空文件夹，并将清单 3-5 中的骨架代码复制到`index.html`文件中。创建`js`文件夹——我们将把所有脚本保存在这里。现在可以按照第\
  \ 1 章所述，将 nginx Web 服务器指向项目文件夹，以便使用真实设备测试游戏。\n\n#### 渲染棋盘\n\n我们将从`BoardRenderer`开始——这是项目中最简单的类。它负责渲染界面：背景、网格和棋子。本节中的大部分代码源自第\
  \ 2 章的示例，因此看起来会比较熟悉。\n\n创建名为`BoardRenderer.js`的新文件，并将其放入`js`文件夹。然后，在`index.html`文件中添加以下标签以加载脚本：\n\
  \n```html\n<script src=\"js/BoardRenderer.js\"></script>\n```\n\n在你最喜欢的 IDE 中打开新创建的文件，准备编写代码。\n\
  \n**注意：** 在本书中，每个示例都使用相同的命名约定和几乎相同的项目结构。当你需要创建新类并将其添加到项目时，首先在`<project_folder>/js`中创建空文件。文件名应为`<ClassName>.js`。例如，`BoardModel`类的代码应放在名为`BoardModel.js`的文件中。这是一种简单且非常方便的代码组织方式。它能让项目文件夹保持整洁，并便于查找所需类。同时，别忘了将你创建的每个脚本都包含到`index.html`页面中。\n\
  \n#### 构造函数\n\n让我们从构造函数开始。编写类的构造函数时，\n\n\n\n## 第 3 章：创建第一个游戏\n\n你必须思考哪些数据类型对这个类来说是绝对必要的。它需要什么才能正常运行？`BoardRenderer`类需要`context`来进行绘制，否则将毫无用处。它还需要`BoardModel`来获取棋子的颜色。清单\
  \ 3-8 展示了构造函数的前几行。\n\n**清单 3-8.** *BoardRenderer 构造函数的第一个版本，保存了必要的参数*\n\n```\nfunction\
  \ BoardRenderer(context, model) {\n  this._ctx = context;\n  this._model = model;\n\
  }\n```\n\n`_p = BoardRenderer.prototype;`\n\n现在思考那些保存类状态的字段。将它们放入构造函数中，即使你暂时无法用有意义的值来初始化它们（参见清单\
