  \ `XHR` 调用加载它，然后读取内容。你也可以创建一个着色器库，并将其保存为带有一些额外描述和元信息的 `XML` 文件。如何管理它们完全取决于你。只需记住，最终你需要包含源代码的\
  \ `JavaScript` 字符串才能编译着色器。\n\n当源代码编写完毕并准备好后，执行清单 9-8 中的代码。\n\n**清单 9-8.** 编译顶点着色器\n\
  \n```\nvar vertexShader = gl.createShader(gl.VERTEX_SHADER);\ngl.shaderSource(vertexShader,\
  \ source);\ngl.compileShader(vertexShader);\nif (!gl.getShaderParameter(vertexShader,\
  \ gl.COMPILE_STATUS)) {\n    // Something went wrong\n    alert(gl.getShaderInfoLog(vertexShader));\n\
  }\n```\n\n这段代码创建了着色器对象，加载了源代码，并尝试编译它。然后，它检查编译状态，如果有错误，则向用户显示（不要忘记在正式产品构建中关闭 `alert`\
  \ 弹窗）。该过程\n\n\n创建片段着色器的过程与此相同，只是着色器类型是`gl.FRAGMENT_SHADER`而不是`gl.VERTEX_SHADER`。\n\
  \n现在，您已将两个着色器编译完毕，需要将它们组合成一个着色器程序，即可以在管线中使用的单一单元（参见清单 9-9）。\n\n**清单 9-9.** *从两个已编译的着色器创建着色器程序*\n\
  \n```\nvar shaderProgram = gl.createProgram();\ngl.attachShader(shaderProgram, vertexShader);\n\
  gl.attachShader(shaderProgram, fragmentShader);\ngl.linkProgram(shaderProgram);\n\
