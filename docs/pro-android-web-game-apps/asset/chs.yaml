  \ [];\n  }\n  this._listeners[type].push(listener)\n};\n\n/**\n * 从指定事件类型中取消订阅给定的监听器\n\
  \ * @param type 事件类型\n * @param listener 要从监听器列表中移除的函数\n */\n_p.removeListener =\
  \ function(type, listener) {\n  if (typeof listener !== \"function\")\n    throw\
  \ \"监听器必须是一个函数\";\n  if (!this._listeners[type])\n    return;\n  var position =\
  \ this._listeners[type].indexOf(listener);\n  if (position != -1)\n    this._listeners[type].splice(position,\
  \ 1);\n};\n\n/**\n * 移除指定事件类型注册的所有监听器\n */\n```\n\n\n`_p.removeAllListeners` = function(type)\
  \ {\nif (type) {\nthis._listeners[type] = [];\n} else {\nthis._listeners = {};\n\
  }\n};\n\n/**\n * 通知所有订阅了给定事件类型的监听器，\n * 并将事件对象作为参数传递\n * @param type 事件类型\n * @param\
  \ event 事件对象\n */\n`_p.emit` = function(type, event) {\nif (!(this._listeners[type]\
  \ && this._listeners[type].length)) {\nreturn;\n}\nfor (var i = 0; i < this._listeners[type].length;\
  \ i++) {\nthis._listeners[type][i].apply(this, event);\n}\n};\n\n当 `EventEmitter`\
