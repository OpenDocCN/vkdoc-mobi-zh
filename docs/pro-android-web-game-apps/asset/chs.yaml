  \ 14-8 所示。\n\n**图 14-8.** *未来游戏的标志*\n\n#### Crafty 游戏\n\n现在，让我们用`Crafty`构建一个简单的游戏。我将这个游戏命名为\
  \ \"Escaping Knight\"。游戏的目标是抓住一个试图逃离守卫路线并前往酒馆的骑士。玩家通过点击精灵来尝试抓住骑士。这个游戏虽然没什么挑战性，但它展示了大量实用的技术：\n\
  \n*   游戏生命周期（从加载到游戏画面，再到胜利或失败画面）\n*   加载和渲染精灵\n*   创建动画\n*   响应用户输入\n*   与精灵交互\n\
  \n完成后的游戏将如图 14-9 所示。\n\n**图 14-9.** *完成后的 Escaping Knight 游戏*\n\n##### 加载精灵\n\n\
  在`Crafty`中，没有什么比预加载一组图像更容易的了。对于 \"Escaping Knight\" 游戏，我们只需要其中的几个：用于渲染地形的瓦片集、四个用于各种物体（房屋和拱门）的瓦片、一个用于奔跑骑士角色的精灵表，以及两个用于\
  \ \"Game Over\" 和 \"You Win\" 画面的横幅。清单 14-5 展示了加载它们的代码。我们将只预加载游戏关卡所需的精灵，\"Win\"\
  \ 和 \"End Game\" 的横幅将被延迟加载——就在玩家需要看到它们之前。\n\n**清单 14-5.** *为关卡预加载一组精灵*\n\n```\n\
  var images = [\"img/terrain.png\", \"img/house-1.png\", \"img/house-2.png\",\n \
