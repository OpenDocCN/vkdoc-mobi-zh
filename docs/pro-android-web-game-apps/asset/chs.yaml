  ```\n\n现在，当用户点击画布时，事件会像 DOM 事件一样在图层间传播。接下来是最有趣的部分。让我们为`Game`类添加事件监听器来实现我们的逻辑。在`_initLayers()`中添加以下两行代码：\n\
