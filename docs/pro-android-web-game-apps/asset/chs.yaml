  ];\nCrafty.load(images,\n  function() {\n    // 当图片加载完成时调用\n  });\n```\n\n我们希望将此代码添加到\
  \ \"loading\" 画面，因为图像必须在游戏过程开始前加载。一旦所有图像就绪，我们就可以准备进入下一个场景。\"loading\" 场景的最终版本将是：\n\
  \n\n\n如下是排版后的 Markdown 文档：\n\n`look like` `列表 14-6`。\n\n**`列表 14-6`.** **预加载游戏所需资源的“加载”场景**\n\
  ```javascript\nvar images = [\"img/terrain.png\", \"img/house-1.png\", \"img/house-2.png\"\
  ,\n\"img/arch-left.png\", \"img/arch-right.png\", \"img/knight.png\"];\nvar logo\
