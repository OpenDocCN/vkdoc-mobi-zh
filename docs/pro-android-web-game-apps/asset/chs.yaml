  \n**第 2 章：浏览器中的图形：Canvas 元素**\n\n**63**\n\n我们拥有与上一节完全相同的设置（三个点和一个`t`值），并且我们已经知道如何找到这种曲线上的点。\n\
  \n**图 2-17. 贝塞尔曲线示例**\n\n*贝塞尔曲线比二次曲线更灵活：四个点让您对形状有更多控制。贝塞尔曲线可以自交，但二次曲线不能。图 2-18 展示了不同贝塞尔曲线的行为。*\n\
  \n**图 2-18.** *更多贝塞尔曲线*\n\n### 绘制曲线\n\n在画布上绘制曲线比理解其背后的数学原理要容易得多。您唯一需要做的就是将控制点的坐标传递给两个方法之一：`quadraticCurveTo()`或`bezierCurveTo()`，具体取决于您想要哪种类型的曲线。第一个控制点隐式地是调用方法前“虚拟铅笔”所在的点。举例来说，如果您调用了`moveTo(10,\
  \ 20)`，然后调用了`lineTo(40, 50)`，您“当前”的坐标就是`(40, 50)`；它们将被用作曲线的第一个控制点。以下是贝塞尔曲线的一个示例：\n\
  \n```\nctx.beginPath();\nctx.moveTo(50, 50);\nctx.bezierCurveTo(0, 100, 60, 200,\
  \ 30, 300);\nctx.stroke();\n```\n\n这段代码绘制了一条具有四个控制点的贝塞尔曲线：`(50, 50)`——曲线的起点，`(0,\
  \ 100)`；`(60, 200)`——磁力点；以及`(30, 300)`——曲线的终点。\n\n![index-70_1.jpg](img/index-70_1.jpg)\n\
  \n**第 2 章：浏览器中的图形：Canvas 元素**\n\n让我们发挥想象力，在游戏板的背景上添加一些抽象图形。绘制两条贝塞尔曲线怎么样？在您用纯色填充背景之后，但在描边边框之前（否则曲线会重叠），添加清单\
  \ 2-7 中的代码：\n\n**清单 2-7.** *在背景上绘制曲线*\n\n```\n// Drawing curves\nctx.strokeStyle\
  \ = \"#6f6e62\";\nctx.fillStyle = \"#e8b948\";\nctx.beginPath();\nctx.moveTo(50,\
  \ 300);\nctx.bezierCurveTo(450, -50, -150, -50, 250, 300);\nctx.fill();\n\nctx.beginPath();\n\
  ctx.moveTo(50, 0);\nctx.bezierCurveTo(450, 350, -150, 350, 250, 0);\nctx.fill();\n\
  ```\n\n结果看起来……有点抽象。稍加练习，我相信您可以做得比图 2-19 中展示的更好。\n\n**图 2-19.** *使用曲线装饰背景*\n\n曲线不仅仅能绘制波浪或小山。事实上，贝塞尔曲线在游戏开发中被大量使用：用于定义运动路径、高级缓动函数以及描述相当复杂的\
  \ 3D 几何形状，如 B 样条或 NURBS 曲面。贝塞尔曲线的强大之处在于它表示形状的方式；仅需几个点，即可轻松通过网络传输或保存到文件中。\n\n**第\
  \ 2 章：浏览器中的图形：Canvas 元素**\n\n**65**\n\n##### 子路径\n\n2D 上下文中的路径可能由几个独立的图形组成，称为子路径；例如，您可以绘制两个三角形作为单个“路径”的组成部分。当您调用`stroke()`或`fill()`时，每个子路径作为单独的图形进行描边或填充。\n\
  \n有两种方法可以开始新的子路径：调用`moveTo()`或`closePath()`。区别在于，`closePath`会添加一条从当前点到子路径起点的线段以使其闭合；而`moveTo`则只是简单地开始新的子路径。\n\
  \n**注意：** `closePath`这个名称极具误导性；路径本身并未关闭。只有当您再次调用`beginPath`时，路径才会关闭（实际上是被丢弃）。\n\n\
  所有新的几何图形——线、曲线和弧——都会添加到同一个路径中。\n\n清单 2-8 展示了一个借助绘制两个三角形的示例：\n\n---\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n```markdown\n`subpaths`。 其效果与使用独立路径渲染它们相同。\n\n**列表 2-8.** *作为子路径渲染的两个三角形*\n\n\
  ```\nctx.beginPath();                // 开始路径\nctx.moveTo(150, 150);           //\
  \ 开始第一个子路径\nctx.lineTo(200, 200);\nctx.lineTo(100, 200);\n// 无需添加回到 (150, 150) 的线段，closePath\
  \ 会添加\nctx.closePath();                // 结束子路径（不是路径本身）\nctx.moveTo(250, 200); \
  \          // 开始第二个子路径\nctx.lineTo(300, 250);\nctx.lineTo(200, 250);\nctx.closePath();\
  \                // 结束第二个子路径\nctx.fill();\nctx.stroke();\n// 此时两个三角形都被填充和描边，\n//\
  \ 因为它们是同一路径的子路径\nctx.beginPath();                // 旧路径被丢弃，新路径从这里开始\n…         \
  \                      // 接下来的子路径代码写在这里\n```\n\n这段代码的结果是两个三角形，它们作为单个路径进行填充和描边（见图\
  \ 2-20）。\n\n![](img/index-72_1.jpg)\n\n**图 2-20.** *作为单个路径的子路径绘制的两个三角形*\n\n然而，大多数情况下，您会为每个图形创建一个独立的路径。当您需要绘制大量具有相同描边和填充样式的图形时，子路径的作用就显现出来了；例如，将网格作为一个大路径绘制比单独描边每条线要快约\
  \ 1.5 倍。不过，这种情况相当少见。\n\n我们已经学习了如何绘制形状，现在是时候学习如何用吸引人的颜色来绘制它们了。我们之前已经看到了如何更改填充和描边的颜色，但\
  \ Canvas 2D API 提供的选项远不止单一的纯色填充。\n\n**描边与填充**\n\n在前面的章节中，您已经看到了一些描边和填充的示例。下面的代码展示了如何设置填充颜色、描边颜色和线宽：\n\
  \n```\nctx.fillStyle = \"gray\";\nctx.strokeStyle = \"blue\";\nctx.lineWidth = 3;\n\
  ```\n\n描边和填充非常容易理解。描边描述了形状的轮廓，而填充描述了内部区域。描边是路径的“边界”，填充是它的颜色。`fillStyle()` 和 `strokeStyle()`\
  \ 都接受相同类型的值：纯色、渐变色和图案。\n\n**纯色**\n\nCSS 颜色是定义样式最简单的方式。您可以使用任何喜欢的格式：颜色名称、颜色代码或 `rgb`\
  \ 和 `rgba` 函数（见列表 2-9）。\n\n**列表 2-9.** *为描边和填充定义颜色的几种方式*\n\n```\nctx.fillStyle =\
  \ \"#987654\";              // 使用颜色的代码\nctx.strokeStyle = \"blue\";            \
  \   // 使用预定义的 CSS 颜色名称\nctx.fillStyle = \"rgb(255, 0, 0)\";       // 使用 rgb 函数\n\
  ctx.strokeStyle = \"rgba(255, 0, 0, 0.5)\"; // 使用 rgba 函数\n```\n\n上下文会“记住”填充和描边的设置。它会一直使用最新的值，直到您显式地覆盖它们。\n\
  \n现在让我们尝试渐变色！\n\n**渐变色**\n\n渐变色是指两种或多种颜色之间，或同一种颜色的不同色调之间的平滑过渡。日落时分的天空，从蓝色变为红色或彩虹色，就是自然渐变的一个例子。在计算机图形学中，渐变色用于模拟光照效果，如耀斑、发光或柔和的阴影。图\
  \ 2-21 展示了渐变色的几种用途。\n\n**图 2-21.** **渐变色。** 左侧图片截取自游戏 *《指挥官基恩》*；天空背景使用了锯齿状渐变色。在右侧，使用了多个径向渐变色来模拟内部发光和光泽高光。\n\
  \nCanvas 支持两种类型的渐变色：**线性渐变色** 和 **径向渐变色**。\n\n**线性渐变色**\n\n要创建线性渐变色，首先需要创建渐变对象：\n\
  \n```\nvar gradient = ctx.createLinearGradient(10, 10, 50, 50);\n```\n\n传递给 `createLinearGradient`\
  \ 的参数是两个点的 `x` 和 `y` 坐标：渐变的起点和渐变的终点。在前面的例子中，我初始化了一个从 `(10, 10)` 开始、在 `(50, 50)`\
  \ 结束的渐变色。接下来，您必须为渐变色设置颜色断点：\n\n```\ngradient.addColorStop(0, \"blue\");\ngradient.addColorStop(0.3,\
  \ \"green\");\n```\n```\n\n\n`gradient.addColorStop(1, \"red\");`\n\n![](img/index-74_1.jpg)\n\
