  \n**注意：** 同样的方法不仅适用于游戏，也适用于任何 GUI 应用程序。例如，Swing——用于构建用户界面的 Java 工具包——就具有相同的功能。它只渲染自上次以来发生变化的界面部分——一个按下的按钮、一个移动的控件等等。\n\
