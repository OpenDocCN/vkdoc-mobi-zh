  \ 元素**\n\n当使用负数缩放值时，缩放会改变轴的方向，效果如同翻转图形。x 轴上的`-1`导致水平翻转；y 轴上的`-1`导致垂直翻转。当然，你也可以将其与尺寸变化结合使用；例如，`ctx.scale(0.5,\
  \ -0.5)`会使所有图形缩小两倍，同时翻转 y 轴。\n\n翻转对于创建图像的镜像版本非常有用。例如，如果你有一张骑士面朝左的图像，你可以直接在浏览器中轻松创建其镜像版本（骑士面朝右），而无需从服务器额外下载图像。图\
