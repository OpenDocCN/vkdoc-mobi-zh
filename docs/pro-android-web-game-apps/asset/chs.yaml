  \n**图 12-6.** *应用 CSS 样式后的同一大厅*\n\n当前状态的项目保存在`02.lobby`文件夹中，以及本章的其他源码文件。欢迎随意尝试并改进大厅的外观和感觉。\n\
  \n### 添加游戏逻辑\n\n本节的目标是完成多人版“四球”游戏的实现。我们现在有了一个可运行的大厅，玩家可以互相挑战。接下来让我们添加游戏处理逻辑本身。\n\
  \n在深入代码之前，我们先看看客户端和服务器都需要哪些共享组件。这个类就是`BoardModel`——它负责处理回合逻辑，并能检查回合是否合法。\n\n####\
  \ 在客户端和服务器之间共享逻辑\n\n目前，游戏板在单人模式下运行良好。当用户尝试走一步时，`BoardModel`会在移动正确时将新棋子放入场地，否则忽略该操作。在多玩家游戏中，仅点击屏幕不足以将棋子放到棋盘上。回合首先发送到服务器，然后服务器验证合法玩家是否在进行合法回合，只有在那之后，服务器才会将回合结果发送回客户端。\n\
  \n一个设计良好的游戏也应在客户端执行回合验证。这样做提高了可用性：错误的回合会立即被报告，无需向服务器发送响应。执行回合的算法如下：\n\n1. 用户点击游戏板。\n\
  2. 客户端检测点击并计算点击下方列的编号。\n3. 游戏客户端检查回合是否有效（如果无效，则忽略该回合，算法终止）。\n4. 回合被发送到服务器，服务器执行相同类型的验证。\n\
  5. 回合结果发送给两位玩家，然后下一个玩家可以开始他的回合（当然，如果游戏未结束的话）。\n\n如你所见，我们必须在客户端和服务器中重用验证逻辑——步骤 3\
  \ 和步骤 4 执行相同的操作：步骤 3 在客户端验证回合，步骤 4 在服务器端验证。由于游戏的两部分都是用 JavaScript 编写的，因此自然而然地尝试重用相同的代码和可能相同的文件，以避免无用的代码重复。\n\
  \n这种方法只有一个问题。Node.js 的模块定义方式与常规的基于浏览器的类不同。Node.js 使用了一些在浏览器环境中不存在的“魔法”变量。例如，在 Node.js\
  \ 中，你必须使用`exports`来使模块的部分内容对外部可见，而在浏览器中，你只需声明新的函数，它们就会被附加到全局`window`对象上。换句话说……\n\
  \n\n\n# 第 12 章：制作多人游戏\n\n## 497\n\n不同的是 `Node.js` 与浏览器环境下类的发布方式。\n\n幸运的是，调整组件代码使其在两种环境下都能工作并不太难。我们先来看看代码清单\
  \ 12-8 中的代码。\n\n**代码清单 12-8.** *为在浏览器和 Node.js 中使用而对类代码进行封装*\n\n```\n(function(exports)\
  \ {\n\nfunction BoardModel(cols, rows) {\n\n/* 此处为常规构造函数 */\n\n}\n\n/* BoardModel.js\
  \ 的其余代码 */\n\n// 将 API 发布到外部世界\n\nexports.BoardModel = BoardModel;\n\n})(typeof\
  \ global == \"object\" ? exports : window);\n```\n\n从最后一行开始阅读代码。最后一行试图检测当前执行环境。如果当前作用域中定义了\
  \ `global` 对象，则代码由 `Node.js` 执行，否则由浏览器执行。\n\n**注意：** 当然，这种检测方式远非完美。例如，如果有人在浏览器中定义了\
  \ `window.global` 变量，这段代码就会失效。然而在撰写本文时，还没有更好的方法来检测 JavaScript 模块的执行环境。\n\n代码清单的最后一行将\
  \ `exports` 或 `window` 对象作为参数传递给匿名函数。接下来的代码片段相当简单：构造函数及其他函数和变量照常定义，只是它们现在属于函数的内部作用域（而不是像之前那样属于全局作用域）。最后，我们必须让构造函数对外部世界可用：`exports.BoardModel\
  \ = BoardModel` 正是实现这一目的。在 `Node.js` 中，构造函数之后像往常一样通过调用 `require()` 来获取；而在浏览器中，这段代码等同于\
  \ `window.BoardModel = BoardModel`，这简单地将构造函数追加到浏览器的全局作用域中。\n\n这种技术远非完美，但比代码复制要好得多。要完成此任务，请将更新后的\
  \ `Board.js` 文件添加到 `public/js` 文件夹中。放在这个位置，客户端和 `Node.js` 都可以访问到它。\n\n从第 10 章中获取旧版本的\
  \ `BoardModel.js` 文件。按照代码清单 12-8 所示进行更新，并保存到 `public/js/BoardModel.js` 中。该文件\n\n\
  ![](img/index-499_1.jpg)\n\n在客户端和服务器端都是必需的。这就是我们把它放在两者都可以访问的位置的原因。客户端可以读取 `public`\
  \ 文件夹中的任何内容，而服务器端则可以读取任何内容，包括 `public` 文件夹。\n\n#### 服务器端\n\n鉴于我们已经为 `Node.js` 适配了主要的逻辑处理类，服务器现在已准备好处理真正的游戏会话！玩家从大厅开始，在那里他可以挑战其他玩家或等待被挑战（我们已经实现了这个功能）。一旦被挑战，玩家便进入与服务器之间的一种新的“通信模式”。他现在可以发送和接收游戏回合。一旦游戏结束，玩家便返回大厅。\n\
  \n让我们来看看客户端和服务器之间的通信协议，我们需要实现这个协议来支持所有这些功能。当玩家从列表中选择一位对手时，他会发送挑战。在真实的游戏中，玩家应该可以选择接受或拒绝挑战，但在这个简单的例子中，挑战总是被接受。服务器此时会处理几种错误情况。例如，玩家不能挑战自己，也不能挑战正在进行另一场比赛的玩家。如果没有错误，双方玩家都会收到一条指示游戏开始的消息。此时，双方客户端都应切换活动屏幕，显示棋盘而不是大厅，让玩家轮流操作。比赛结束后，双方玩家都返回大厅，可以挑战新的对手。\n\
  \n图 12-7 展示了主要的游戏流程。\n\n**图 12-7.** *多人游戏流程*\n\n现在，让我们开始编写主要的服务器类。它必须处理一种名为 `challenge`\
  \ 的新消息类型。请看实现该功能的代码清单 12-9 中的代码，\n\n\n\n# 处理后的文档\n\n服务端流程中处理连接的部分。`onConnection()`\
  \ 函数的代码大部分你已经熟悉，新的部分是处理挑战（即开始游戏的邀请）。我们首先检查挑战是否有效；如果有效，则在用户之间启动游戏。游戏在 `startGame()`\
  \ 函数内部启动，我们稍后会查看它。\n\n**列表 12-9.** *主服务端文件*\n\n```javascript\n/* set up express\
  \ and socket.io as usual */\n\nio.sockets.on(\"connection\", onConnection);\n\n\
  /**\n * 全局计数器和用户注册表\n */\n\nvar maxUserId = 0;\nvar maxGameId = 0;\nvar users =\
  \ {};\n\n/**\n * 连接处理器，多人服务器的\"主\"函数\n * @param socket\n */\n\nfunction onConnection(socket)\
  \ {\n  var userId = addUser(socket);\n\n  // 处理挑战，检查挑战的有效性，如果有效则借助 startGame()\n\
  \  // 将两位用户（挑战者及其对手）设置为\"游戏中\"模式\n  socket.on('challenge', function (challengedUserId,\
  \ respond) {\n    if (userId == challengedUserId) {\n      respond({ error: \"不能挑战自己\"\
  \ });\n    } else if (!users[challengedUserId]) {\n      respond({ error: \"找不到用户\
  \ \" + challengedUserId });\n    } else if (users[challengedUserId].status != \"\
  ready\") {\n      respond({ error: \"用户尚未准备好游戏\" });\n    } else {\n      startGame(users[userId],\
  \ users[challengedUserId], respond)\n    }\n  });\n\n  socket.on('disconnect', function\
  \ () {\n    console.log(users[userId].name + \" 已断开连接\");\n    socket.broadcast.emit('user-left',\
  \ users[userId]);\n    delete users[userId];\n  });\n}\n\n/**\n * 在服务器上注册用户。通知所有人该用户已加入大厅，\n\
  \ * 并将在线用户列表发送给新连接的用户。\n * @param socket 已连接客户端的 socket 对象\n * @returns 新创建用户的 ID\n\
  \ */\n\nfunction addUser(socket) {\n  var userId = maxUserId++;\n  var userName\
  \ = \"用户 \" + userId;\n  var user = {id: userId, name: userName, status: \"ready\"\
  };\n  Object.defineProperty(user, \"socket\", {\n    value : socket,\n    enumerable\
  \ : false}\n  );\n  users[userId] = user;\n  socket.emit('info', {text: \"您已连接\"\
  });\n  socket.emit('user-list', { users: users });\n  socket.broadcast.emit('user-joined',\
  \ user);\n  return userId;\n}\n```\n\n服务端的第二部分是 `startGame()` 函数。游戏在两个玩家之间启动：“发起者”（在游戏大厅中选择对手的一方）和他的对手“目标”。该函数创建特殊的\
  \ `initGame` 消息，发送给双方。消息包含玩家数据，以便客户端应用程序可以在屏幕上显示玩家姓名。接下来，我们通知所有在线用户，发起者和目标现在处于“游戏中”状态。他们的名字现在在用户列表中会以不同方式高亮显示，所有人都能看到他们正在忙。\n\
  \n最后，该函数创建新的 `GameSession` 对象，负责处理玩家之间的游戏内交互。`GameSession` 构造函数接受四个参数：\n\n- `gameId`：唯一标识此会话的编号\n\
  - `player1`：先出招的玩家（在我们的例子中是目标）\n- `player2`：后出招的玩家（在我们的例子中是发起者）\n- `onEndGame`：游戏结束时调用的回调函数\n\
  \n现在，`startGame()` 函数的代码（如列表 12-10 所示）应该很容易阅读了。\n\n**列表 12-10.** *startGame 函数：在两个玩家之间启动游戏*\n\
  \n```javascript\nfunction startGame(initiator, target, initiatorRespond) {\n\n \
  \ initiator.status = target.status = \"playing\";\n\n  var initGame = {\n    player1:\
  \ initiator,\n    player2: target\n  };\n\n  initiatorRespond(initGame);\n  target.socket.emit('challenged',\
  \ initGame);\n\n  io.sockets.emit(\"user-playing\", initiator);\n  io.sockets.emit(\"\
  user-playing\", target);\n\n  var gameId = maxGameId++;\n\n  new GameSession(gameId,\
  \ target, initiator, function() {\n    initiator.status = target.status = \"ready\"\
  ;\n    io.sockets.emit(\"user-ready\", initiator);\n    io.sockets.emit(\"user-ready\"\
  , target);\n  });\n}\n```\n\n\n`respond`对象作为第二个参数传递给监听器函数，允许服务器对来自客户端的特定消息发送响应。以下是相应的客户端代码：\n\
  \n```javascript\n// Client-side code. data is the\nsocket.emit('challenge', userId,\
  \ function (data) {\n    if (data.error) {\n        // Something bad has happened,\
  \ maybe the other party has left\n    } else {\n        // The game has started\n\
  \    }\n}\n```\n\n如你所见，`Socket.IO`将响应传递给回调方法。这相当方便，尤其是当客户端发送多个相同类型的消息时；否则，在没有额外编码工作的情况下，无法将特定的请求消息与特定的接收响应匹配。\n\
  \n最后，我们需要创建一个`GameSession`类，它负责运行两个玩家之间的游戏。让我们从清单 12-11 中的构造函数开始。一切都相当简单：游戏会话以默认值初始化：当前玩家为\
  \ 0，以及空的`BoardModel`。然后，我们向`socket`添加特定于游戏的监听器，这些监听器将监听`\"turn\"`事件。\n\n**清单 12-11.**\
  \ `GameSession`类\n\n```javascript\nexports = module.exports = GameSession;\n\nvar\
  \ board = require(\"public/js/BoardModel\");\nvar BoardModel = board.BoardModel;\n\
  \nfunction GameSession(id, player1, player2, onEndGame) {\n    this._roomName =\
  \ \"game\" + id;\n    this._players = [player1, player2];\n    this._currentPlayer\
  \ = 0;\n    this._boardModel = new BoardModel();\n    this._onEndGame = onEndGame;\n\
  \    for (var i = 0; i < this._players.length; i++) {\n        this._setupGameListeners(i);\n\
  \    }\n}\n```\n\n此时唯一不完全清晰的代码片段是`_roomName`变量。为什么我们需要它？`Socket.IO`有一个非常实用的概念，称为房间。房间是一个便捷的\
  \ API，允许你在需要时对套接字进行分组，并快速向房间成员发送特定消息。这类似于聊天应用中的房间或更高级消息 API 中的“主题订阅”。一旦你向房间发送了某些内容，每个订阅的套接字都会收到该消息。\n\
  \n清单 12-12 展示了`GameSession`代码的最后一部分，即实现主要游戏流程的`_setupGameListeners()`函数。在这个简化模型中，玩家在比赛过程中唯一能做的就是走一步。最终，一名玩家获胜或游戏进入平局状态。当这种情况发生时，监听器会被注销。\n\
  \n**清单 12-12.** 响应玩家走棋并结束游戏\n\n```javascript\nvar _p = GameSession.prototype;\n\
  _p._setupGameListeners = function(playerIndex) {\n    var socket = this._players[playerIndex].socket;\n\
  \    socket.join(this._roomName);\n    socket.on(\"turn\", (function(column) {\n\
  \        if (playerIndex != this._currentPlayer) {\n            // For some reason,\
  \ the wrong player is trying to make a turn\n            socket.emit(\"error\",\
  \ {\n                cause: \"It is not your turn now\"\n            });\n     \
  \       return;\n        }\n        // Let's try to make a turn and see what happens\n\
  \        var turn = this._boardModel.makeTurn(column);\n        // Check if that\
  \ was illegal turn\n        if (turn.status == BoardModel.ILLEGAL_TURN) {\n    \
  \        socket.emit(\"error\", {\n                cause: \"This turn is illegal\"\
  \n            });\n            return;\n        }\n        // The turn is legal,\
  \ we can broadcast it to both parties\n        socket.manager.sockets.to(this._roomName).emit(\"\
  turn\", turn);\n        // Next player is the \"current\" now\n        this._currentPlayer\
  \ = (this._currentPlayer + 1)%2;\n        // If there's a win condition or it is\
  \ a draw,\n        // then players are already in lobby. Clean up listeners.\n \
  \       if (turn.status == BoardModel.WIN || turn.status == BoardModel.DRAW) {\n\
  \            // End game, leave room and de-register listeners\n            for\
  \ (var i = 0; i < this._players.length; i++) {\n                this._players[i].socket.removeAllListeners(\"\
  turn\");\n                this._players[i].socket.leave(this._roomName);\n     \
  \       }\n        }\n        // Call the callback\n        this._onEndGame();\n\
  \    }).bind(this));\n};\n```\n\n服务器已经就绪。它完成了我们计划的所有工作：大厅、游戏处理以及两者之间的切换。游戏的最后一部分是……\n\
