  就是这样！现在你应用的错误报告功能（几乎）达到了商业级水准！如果你想更有趣一些，可以在 NPM 上搜索其他模块，发布到 Twitter，发送 Jabber 消息，连接短信服务，甚至把\
  \ bug 直接发送到你的手机上——一切皆由你掌控。\n\n错误处理中最后但最重要的一点是：永远、永远不要让任何异常从你的错误报告代码中溜走。Express 会吞掉原始错误，并将新错误报告给底层中间件。\n\
  \n##### 日志记录\n\n应用的另一个重要方面是日志记录——将使用信息写入控制台或文件。Express 默认的日志记录功能相当简陋，但对我们来说已经足够。最简单的设置是在你的中间件栈顶部添加日志中间件：\n\
  \n```\napp.use(express.logger());\n```\n\n完成这一步后，你会看到应用在控制台输出更多的信息。现在每个请求都会被记录下来。\n\
  \n```\n127.0.0.1 - - [2011 年 11 月 14 日 周一 22:35:11 GMT] \"GET / HTTP/1.1\" 500 -\
  \ \"-\"\n\"Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/535.7 (KHTML, like Gecko)\n\
  Chrome/16.0.912.36 Safari/535.7\"\n\n127.0.0.1 - - [2011 年 11 月 14 日 周一 22:35:11\
  \ GMT] \"GET /favicon.ico HTTP/1.1\" 404 -\n\"-\" \"Mozilla/5.0 (Windows NT 6.1;\
  \ WOW64) AppleWebKit/535.7 (KHTML, like Gecko) Chrome/16.0.912.36 Safari/535.7\"\
  \n\n第 10 章：转向服务器端\n\n127.0.0.1 - - [2011 年 11 月 14 日 周一 22:35:12 GMT] \"GET / HTTP/1.1\"\
  \ 500 - \"-\"\n\"Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/535.7 (KHTML, like\
  \ Gecko)\nChrome/16.0.912.36 Safari/535.7\"\n```\n\n这些行里包含了大量信息：主机、时间、请求、状态、用户代理等。如果你不需要如此详细的信息，可以更改\
  \ `logger` 的 `format`。格式是由多个令牌组成的字符串，每个令牌代表一类信息。下面是一个格式行示例，它只打印 HTTP 方法、页面 URL 以及处理它所花费的时间：\n\
  \n```\napp.use(express.logger({\n  format: \":method :url - :response-time ms\"\n\
  }));\n```\n\n如果你将该行传递给记录器，你会得到更简洁（当然，信息量也更少）的输出。\n\n```\nGET / - 5 ms\nGET /favicon.ico\
  \ - 3 ms\nGET / - 4 ms\nGET /favicon.ico - 3 ms\n```\n\n可用的令牌列表可以在 Connect 文档页面找到——[`extjs.github.com/Connect/logger.html`](http://extjs.github.com/Connect/logger.html)（请记住，Express\
  \ 使用的是 Connect 的中间件）。\n\n在生产环境中，写入控制台并不是最佳选择。写入文件要好得多。做起来有点小技巧。Connect 的记录器没有直接传递文件名的方式，但它接受所谓的\
  \ `stream`。在 Node.js 中，这是可写流——任何你可以写入的东西：TCP/IP 套接字、文件、Unix 套接字、控制台等等（参见 [`nodejs.org/docs/api/streams.html`](http://nodejs.org/docs/api/streams.html)）。为了将记录器的输出发送到文件，你需要在该文件上打开一个流并将其传递给记录器。清单\
  \ 10-31 展示了如何做到这一点。\n\n**清单 10-31.** *将日志写入文件*\n\n```\nvar express = require(\"\
  express\");\nvar email = require(\"mailer\");\nvar fs = require(\"fs\");\nvar fileStream\
  \ = fs.createWriteStream(__dirname + \"/node.log\",\n  { flags: 'a',\n    encoding:\
  \ \"UTF-8\" });\nvar app = express.createServer();\napp.set('views', __dirname +\
  \ '/views');\napp.set('view engine', 'ejs');\n\n第 10 章：转向服务器端\n\napp.use(express.logger({\n\
  \  format: \":method :url - :response-time ms\",\n  stream: fileStream\n}));\n```\n\
  \n在第三行，我们加载了 `fs` 模块，它允许我们处理文件。\n\n\n\n文件系统。然后我们创建`WriteStream`，传入文件名以及一组参数，这些参数指明我们希望文件以何种方式打开。\n\
  \n`flags`参数表明文件以写入模式打开，并且光标位于文件末尾。这样，你的日志就能在服务器重启后得以保留。最后，我们将创建好的流传递给 logger 中间件，并享受其结果。\n\
  \n当然，你也可以自行向同一个文件写入内容。列表 10-32 展示了一个错误处理器的示例，正如我所承诺的，它会将堆栈信息保存到文件中。\n\n**列表 10-32.**\
  \ *将错误信息写入同一日志文件*\n\n```javascript\n// Write logs\napp.use(function(err, req, res,\
  \ next) {\n    fileStream.write(err.stack);\n    next(err);\n});\n```\n\n我们几乎完成了维护工作，但还剩下一项小任务：支持不同的服务器配置。通常，企业级服务器会拥有多个配置文件，用以描述十几种不同的环境：开发环境、测试环境、预上线环境、生产环境等等。其动机非常简单：你希望在不同配置下启用不同的服务器特性。\n\
  \n#### 服务器配置\n\n我们决定对用户隐藏错误信息，但不想对自己隐藏。当你编写大量代码并每分钟都在测试变更时，你希望立即看到错误追踪信息，而无需查看控制台。换句话说，你希望在生产环境中启用“友好错误页面”功能，但在开发环境中则不需要。很可能，你也不想让自己的邮箱塞满通知邮件，而且同样不需要日志。\n\
  \n显然，你希望在不编写一行代码的情况下切换服务器模式（我们都很懒，记得吧）。这个任务通常通过添加配置文件支持来解决，但 Express 提供了一种更轻量级的机制。Node\
  \ 预留了一个叫`NODE_ENV`的特殊环境变量，用于保存环境标识符。它有两个“魔法”值：`development`（默认使用的值）和`production`（启用“生产模式”）。\n\
  \nExpress 有一个名为`configure`的函数，它允许你定义仅在特定环境中执行的配置部分。列表 10-33 展示了针对`production`配置的代码片段。\n\
  \n**列表 10-33.** *环境特定配置的示例*\n\n```javascript\n// For production we want logs to\
  \ be written to the file and have the verbose format\napp.configure(\"production\"\
  , function() {\n    loggerStream = fs.createWriteStream(__dirname + \"/node.log\"\
  , { flags: 'a'});\n    app.use(express.logger({\n        format: \"default\",\n\
  \        stream: loggerStream\n    }));\n});\n```\n\n这样，初始化日志的代码仅在`production`环境中执行——即当你明确将`NODE_ENV`设置为`production`时。默认情况下，Express\
  \ 会忽略这一部分。如果`configure`函数不带参数调用，它会在任何可用环境中执行。\n\n现在你已经拥有了为不同运行模式定义服务器不同行为的工具。请看以下完整代码，它阐释了这一思路（为了节省篇幅，我删去了冗长的函数）：\n\
  \n```javascript\nvar express = require(\"express\");\nvar BoardModel = require(\"\
  ./BoardModel\");\nvar nodemailer = require(\"nodemailer\");\nvar fs = require(\"\
  fs\");\nvar loggerStream;\nvar app = express.createServer();\n\n// Every environment\
  \ has the same settings for views\napp.configure(function() {\n    app.set('views',\
  \ __dirname + '/views');\n    app.set('view engine', 'ejs');\n});\n\n// For production\
  \ we want logs to be written to the file and have the verbose format\napp.configure(\"\
  production\", function() {\n    loggerStream = fs.createWriteStream(__dirname +\
  \ \"/node.log\", { flags: 'a'});\n    app.use(express.logger({\n        format:\
  \ \"default\",\n        stream: loggerStream\n    }));\n});\n\n// For development,\
  \ we don't use logger at all\n// Main stack is the same for both environments\n\
  app.configure(function() {\n    app.use(express.cookieParser());\n    app.use(express.session({\
  \ secret: \"gameserversession\" }));\n```\n\n第 10 章：迈向服务端\n\n**445**\n\n\n```javascript\n\
  app.use(app.router);\n\napp.use(express.static(__dirname + '/public'));\n\n});\n\
  \n// 写入日志并隐藏页面——仅在生产环境中使用\napp.configure(\"production\", function() {\n  app.use(function(err,\
  \ req, res, next) {\n    loggerStream.write(err.stack);\n    next(err);\n  });\n\
  \n  // 向团队发送邮件\n  app.use(function(err, req, res, next) {\n    /* 邮件代码 */\n    next(err);\n\
  \  });\n\n  // 向用户渲染一个友好的错误页面\n  app.use(function(err, req, res, next) {\n    res.render(\"\
  error\", {layout: false});\n  });\n});\n\n// 开发环境下使用标准错误处理即可\napp.configure(\"development\"\
  , function() {\n  app.use(express.errorHandler({stack: true, dump: true}));\n});\n\
  \napp.get('/', function(req, res) {\n  // 生成错误以观察处理流程。\n  // 在生产环境下，你应该看到为用户设计的友好错误页面。\n\
  \  // 在开发环境下，你会在网页和控制台中看到堆栈跟踪信息。\n  var foo = req[\"bar\"].baz;\n  res.send(\"这是页面内容\"\
  );\n});\n\napp.listen(80);\n```\n\n有时，你可能希望为“环境”设置使用不同的来源——例如，配置文件或自定义的命令行选项。在这种情况下，你可以通过调用\
  \ `app.set(\"env\", \"production\")` 来始终覆盖这个值。\n\n环境切换功能相当好用，但事实上，你只有在真正进入生产阶段时才需要它，这意味着你要将应用程序展示给朋友之外的其他人。在此之前，你只需记住你手头有这个功能，并像我们在本章大部分时间所做的那样，使用单一的开发环境即可。\n\
  \n本章的成果位于名为 `06.housekeeping` 的目录中。如果你想测试邮件通知，别忘了将邮件设置替换成你自己的。\n\n## 总结\n\n在本章中，我们无需切换语言，就从客户端开发转向了服务端开发。我们学习了一个强大且快速演进的工具\
  \ —— Node.js，它允许我们像运行操作系统原生代码一样运行 JavaScript 代码。Node.js 使我们能够创建 Web 服务器并实现非常基础的用户交互。更重要的是：我们学习了服务端编程的基本构建模块，在接下来的章节中，我们将利用这些模块来构建一个完整的多人应用——一个具有一些相当高级功能的“四球”游戏。\n\
  \n我们还学习了 Node.js 最流行和强大的 Web 开发框架之一：Express。我们从简单的 Hello World 应用开始，逐步增加功能集。我们学习了如何处理查询参数（用户输入），如何通过会话跟踪用户活动，以及如何通过模板引擎将服务器逻辑与\
  \ HTML 视图分离。\n\n我们简要了解了 Express 的架构，并学习了封装了小型功能集的不同中间件：Cookie、查询解析、日志记录、会话等。我们学习了中间件栈以及请求是如何被它处理的。\n\
  \n最后，我们完成了一些维护任务：我们研究了 Express 的错误处理、日志记录和配置。现在我们已准备好继续前进。凭借我们获得的知识，我们可以开始构建一个多人客户端，该客户端使用\
  \ Ajax 从服务器获取数据，并发送用户操作的信息——例如点击、聊天消息或游戏对局提议。\n\n# 第 11 章：与服务器对话\n\n阅读完上一章后，你已经准备好创建一个游戏服务器，并为其提供包含模板、错误处理和日志记录的完善基础设施。然而，要构建一个真正的多人应用，仅有服务器是不够的。网络架构的第二个关键部分是客户端。本章的目标是从客户端的角度提供扎实的网络知识。为此，我们将学习以下内容：\n\
  \n- 如何在不重新加载网页的情况下从服务器加载数据\n- `XMLHttpRequest` 对象的新版本 —— XHR Level 2\n\n\n# 如何从服务器加载二进制数据并在客户端解析\n\
  \n- 移动设备的局限性\n- 关于反向 Ajax 以及实现实时客户端-服务器通信可用方案的一些要点\n- 传输层的定义，以及开发者为游戏选择传输层时需要考虑的权衡类型\n\
  \n本章开头，我们将简要回顾网络通信的演进历程：从历史 API 到即将面世的尖端技术。随后，我们将准备应对更复杂的任务：探索客户端与服务器之间的不同通信方式，并构建支持双向消息发送的实时解决方案。\n\
  \n## 第 11 章：与服务器对话\n\n### 浏览器中网络功能的演进\n\n让我们上一堂（非常）简短的历史课，看看网络技术如何帮助 Web 应用发展到今天的样子，开发者曾面临哪些问题，以及这些问题中大部分是如何被解决的。\n\
  \n早期，浏览器只能渲染纯 HTML 页面、点击链接、下载和显示图片，并提供搜索、书签等少数实用功能。没有人将浏览器视为构建丰富应用或游戏的平台。当时使用 Web\
  \ 的常规模式是：\n\n- 加载页面\n- 阅读页面内容\n- 点击链接，在地址栏输入地址，或需要新内容时重新加载页面\n\n显然，这种模式将网页的完全控制权交给了用户；没有用户的明确操作，内容将保持不变。这种模式非常适合被动浏览和探索静态数据。例如，允许用户阅读书籍章节的网站可以完全不依赖\
  \ JavaScript 和 Ajax 等动态功能运行，仍然保持可读性和用户友好性。\n\n然而，有许多情况下这种模式不足以支持舒适的浏览体验。重新加载网页意味着重新加载其每个部分；在某些情况下，这可能是冗余且浪费的。想象一个左侧有分层菜单的页面。如果所有页面都是静态的，点击菜单项展开将导致整个页面重新加载。即使流量不是问题，从头开始渲染页面的过程也会分散用户的注意力——至少页面会闪烁。\n\
  \n这种模式最终必然\"终结\"。事实上，它的实际使用存在大量开销，甚至像聊天或 Web 游戏这样的基本交互式应用也无法在无法在不重新加载页面的情况下从服务器加载新数据时实现。然后\
  \ Ajax 登场了。\n\nAjax 是一种无需重新加载网页即可加载服务器数据的技术。它最初由微软实现为名为`XMLHTTP`的小组件。后来，`XMLHttpRequest`使得查询服务器、接收响应并仅更新需要更新的页面部分成为可能。\n\
  \nAjax 感觉像是 Web 的自然演进——允许网页在不重新加载的情况下执行 HTTP 请求，使开发者能够创建一个全新的 Web 应用世界；更复杂的网页中，用户与浏览器之间的交互不再仅仅是浏览过程的副产品。当然，即使在\
  \ Ajax 出现之前也有可能制作动态网页——例如，通过将永不间断的内容流加载到`IFRAME`中——但这些技术只是权宜之计：它们缺乏可靠性和良好的跨浏览器支持。\n\
  \n**注意：** 严格来说，Ajax 是 Asynchronous JavaScript and XML（异步 JavaScript 和 XML）的缩写。缩写词通常使用大写字母拼写。然而，这个词已成为一个普通名词，大多数在线媒体将其拼写为\
  \ Ajax。在本书中，我将采用第二种命名方式。\n\nAjax 既不是标准，也不是实现方案或 API 名称。它只是一个流行术语。\n\n\n\nAjax 是一种开发者用于从服务器加载数据而无需重新加载页面的技术。我们将在本章后续部分看到一个\
  \ Ajax 调用的示例。\n\nAjax 有其自身的局限性，其中最主要的就是 HTTP 本身。HTTP 是一种请求-响应协议，客户端与服务器之间的通信遵循预定顺序：\n\
  \n1. 客户端发送一个请求，精确描述它想要读取或更新的内容。\n2. 服务器分析请求、形成响应并将其发送回客户端。\n3. 连接被关闭。\n4. 要发送另一段数据，客户端必须发起一个新连接。\n\
  \n服务器无法自行向客户端发送消息：这种通信模型假设服务器仅响应来自页面的请求。当你用一个例子来思考时，传统 Ajax 的弱点就很容易理解了。想象一下，你正在编写一个带有内部邮件系统的多人在线游戏。在某个时刻，服务器收到一封需要传递给用户的新邮件：我们希望在屏幕角落显示一个闪烁的“新邮件”图标。即使服务器现在有了该用户的新数据，它也无法对其进行任何处理，因为服务器无法与页面建立新连接。相反，服务器必须耐心等待新的\
  \ Ajax 请求，然后才能用新更新进行响应。这种模式的明显缺点是，客户端必须不断轮询服务器，以检查是否有新消息（本章下一节将详细介绍这种模式及其问题）。\n\n\
  丰富的应用程序，尤其是游戏，通常需要更好的网络连接。它们需要一种像 TCP/IP 那样工作的连接：一旦页面打开它，它就保持打开状态，并且任何一方（客户端和服务器）都可以随时、以任意顺序发送各自的消息。使用这样的连接，服务器可以立即将邮件通知发送给客户端，而无需等待页面的新请求。\n\
  \n进化的下一个合乎逻辑的步骤是 WebSocket，它是一种填补网页与服务器之间实时双向通信空白的**技术**。WebSocket 允许你打开一个真正的 TCP\
  \ 连接并传输数据，而无需任何 HTTP 开销。类似这样的技术正在推动整个 HTML5 游戏开发领域向前发展，开启了几年前还无法想象的可能性。\n\n**注意：**\
  \ 在 Android 平台上，WebSocket 仅在 Android 版 Chrome 中可用。标准浏览器中缺少 WebSocket 是 Android 网络开发者成千上万投诉的原因。更糟糕的是，Android\
  \ 的主要竞争对手 iOS 已经支持它了。毫无疑问，Android 原生浏览器*最终*会支持它，但就目前而言，我们只能等待。\n\nWebSocket 正是 Web\
  \ 应用开发者从一开始就想要的：一种能够以最小开销和延迟发送消息的持久双向连接。游戏比任何其他应用都更需要它，因为在游戏中，延迟至关重要。如果你有一个聊天应用，聊天消息到达时延迟了\
  \ 200 毫秒，那你运行的是一个完美的聊天应用，你的用户会喜欢它！如果你要制作一款实时 3D 射击游戏，这种延迟就太长了——游戏会显得不精确或卡顿，因为 200\
  \ 毫秒就是击中目标与击中他身后墙壁之间的差异。\n\nWeb 开发者和浏览器厂商发明了许多不同的技术来构建可靠的客户端-服务器通信解决方案。这些技术被称为传输方式。WebSocket\
  \ 和 Ajax 轮询是两种不同的传输方式，它们都服务于同一个目标：尽快将服务器的更新传回客户端。许多库将传输方式的细节隐藏在抽象层之下，这样开发者就不必担心错误处理或恢复断开的连接等实现细节。\n\
  \n\n\n## 第 11 章：与服务器通信\n\n### 服务器设置\n\n本章及下一章中的大部分示例都需要运行服务器。你可以随意使用前一章中的服务器代码作为示例的起点，或者从头编写一个十几行的\
  \ Express 应用。我们将省略前一章中有关环境搭建的代码部分，转而专注于实际功能，并保持代码清单的简洁。请记住，这并非生产环境的可选方案：在将项目公开上线前，应返回第\
  \ 10 章再次仔细审阅。清单 11-1 是服务器的起点代码。\n\n**清单 11-1.** *本章使用的基础服务器代码*\n\n```\nvar express\
  \ = require(\"express\");\nvar app = express.createServer();\napp.set('views', __dirname\
  \ + '/views');\napp.set('view engine', 'ejs');\napp.use(express.bodyParser());\n\
  app.use(express.cookieParser());\napp.use(express.session({ secret: \"gameserversession\"\
  \ }));\napp.use(app.router);\napp.use(express.static(__dirname + '/public'));\n\
  app.use(express.errorHandler());\napp.get('/', function(req, res) {\n    res.sendfile(__dirname\
  \ + \"/public/index.html\");\n});\napp.listen(80);\n```\n\n### 使用 `XMLHttpRequest`\
  \ API 进行基本 HTTP 请求\n\n所有主流浏览器均提供了 `XMLHttpRequest` 对象，作为从网页向服务器发起 HTTP 请求的公认标准方式。你可能已经使用过它：无论是直接自行创建新实例，还是通过\
  \ `jQuery` 或 `Prototype.js` 等 JavaScript 库提供的抽象层间接使用。\n\n**注意：** 正如 W3C 所承认的，该对象的名称相当具有误导性：*\"\
  首先，该对象支持任何基于文本的格式，包括 XML。其次，它可用于通过 HTTP 和 HTTPS 发起请求 (...) 最后，它支持广义上的'请求'概念，即涉及定义\
  \ HTTP 方法的所有 HTTP 请求或响应活动。\"*\n\n[—www.w3.org/TR/XMLHttpRequest/](http://www.w3.org/TR/XMLHttpRequest/)\n\
  \n`XMLHttpRequest` API 有两个版本：大多数浏览器提供的常规旧版本，以及新增了许多实用功能的新版 `XMLHttpRequest Level\
  \ 2`（二级 XMLHttpRequest）。\n\n**注意：** `XMLHttpRequest` 常被简称为 `XHR`。我在本书中交替使用这两个名称。`XMLHttpRequest\
  \ Level 2` 是另一个非常长的 API 名称，因此常被简称为 `Level 2`、`XHR Level 2` 甚至 `XHR2`。最后一个名称有些误导性，因为它看起来像是在谈论一个不同的对象，因此我使用另外两个名称。\n\
  \n`Level 2` 规范（[www.w3.org/TR/XMLHttpRequest2](http://www.w3.org/TR/XMLHttpRequest2)）并未定义完全不同的接口，而是通过增加对上传文件到服务器、发送和接收二进制数据、跟踪上传进度以及提供更好的生命周期通知等支持，对现有接口进行了扩展。这意味着所有为\"\
  原始\" `XMLHttpRequest` 编写的代码同样适用于 `Level 2` 版本。\n\n尽管该规范自 2008 年起一直处于\"工作草案\"状态（根据\
  \ W3C 流程，这是文档最早期且最不成熟的阶段），但大多数浏览器已经实现了这些新特性（[`caniuse.com/xhr2`](http://caniuse.com/xhr2)）。Android\
  \ 原生浏览器从 Android 3.0 开始也在其中。在撰写本文时，搭载 Android 3.0 或更高版本的设备市场份额尚未达到安全放弃旧 API 并迁移到\
  \ `Level 2` 的程度，但这只是时间问题。我在本节中同时介绍新旧 API，以便你可以在市场成熟时迁移到新实现。\n\n#### 使用传统 `XHR` 发起\
  \ HTTP 请求\n\n`XMLHttpRequest` 对象是为网页添加网络功能的大多数方法的基础。如今，很难找到一个网页不使用它来动态检查表单、按需加载\
  \ UI 片段或实现其他类型的功能。\n\n\n\n# 第 11 章：与服务器对话\n\n## **455\n\n`XMLHttpRequest` 于 2006\
  \ 年标准化，但自那时起，Web 应用程序已变得更为复杂且要求更高。基于以往经验，W3C 正在制定旨在解决原始实现问题的新标准（XMLHttpRequest Level\
  \ 2）。\n\n让我们从一个非常基础的 Hello World 示例开始。我们将向服务器发送 GET 请求，并将响应打印到控制台。在本节中，我们将使用旧方法（Level\
  \ 2 之前）。请查看清单 11-2 中的网页代码，以及清单 11-3 中提供数据的服务器端代码。\n\n**清单 11-2.** *发送 XHR 请求以从服务器检索文本数据*\n\
  \n```\nfunction init() {\n  var xhr = new XMLHttpRequest();\n  xhr.onreadystatechange\
  \ = function (e) {\n    if (xhr.readyState == 4) {\n      console.log(\"Got \" +\
  \ xhr.status +\n        \" saying [\" + xhr.responseText + \"]\");\n    }\n  };\n\
  \  xhr.open(\"GET\", \"data.json\");\n  xhr.send();\n}\n```\n\n**清单 11-3.** *为清单\
  \ 11-2 的请求提供数据的服务器代码*\n\n```\napp.get(\"/data.json\", function(req, res) {\n  res.contentType(\"\
  application/json\");\n  res.send(JSON.stringify({hello: \"World\"}));\n});\n```\n\
  \n启动示例并查看输出。它应该在控制台打印这一行：\n\n```\nGot 200 saying [{\"hello\":\"World\"}]\n```\n\n\
  客户端函数与我们之前用于从服务器下载图像的代码（第 4 章）非常相似。主要区别在于我们收到的是文本响应而非图像。此外，`onreadystatechange`\
  \ 包含一些额外代码，用于检查请求的当前状态：只有当 XHR 对象的`readyState`为 4 时，该函数才会执行实际的数据处理；否则，它会直接返回，忽略本次调用。\n\
  \n与仅指示图像是否已成功加载或是否发生错误的 Image 对象相比，`XMLHttpRequest`（即使是旧版本）支持对 HTTP 请求的生命周期进行更细粒度的控制。浏览器的`XMLHttpRequest`每次状态变化都会调用`onreadystatechange`。状态本身存储在名为`readyState`的属性中，我们在函数体内进行检查。\n\
  \n状态'4'表示完成。当对象状态为完成时，意味着 XHR 已到达其生命周期的最后阶段，并且响应文本已完全可用（在成功调用的情况下）。状态如下所示：\n\n-\
  \ UNSENT (0)：对象已构建，但尚未调用`open()`方法。此时尚未进行任何网络活动。\n- OPENED (1)：在调用`open`方法之后，但在调用`send`之前。网络通信尚未开始。\n\
  - HEADERS_RECEIVED (2)：在调用`send`之后，重定向已解析，且服务器已发送其标头。网络通信正在进行中，但响应尚不可用。\n- LOADING\
  \ (3)：正在从服务器下载响应主体。\n- DONE (4)：响应主体已下载完毕并可用。\n\n在大多数情况下，您唯一检查的状态是状态 4。使用清单 11-2\
  \ 和 11-3 中的代码更新客户端（`public/index.html`文件）和服务器（`main.js`文件），然后运行示例。本示例的完整源代码可在`01.XHR`文件夹以及本章的其他资料中找到。\n\
  \n#### 使用 XHR 处理错误\n\n如果在请求执行过程中发生错误，对象仍然会进入完成状态，但响应数据（HTTP 响应代码、标头和响应主体）可能不可用。清单\
  \ 11-4 展示了一个略微改进的代码版本，它显式检查错误。\n\n**清单 11-4.** *检查错误的清单 11-2 更新版本*\n\n```\nfunction\
  \ init() {\n  var xhr = new XMLHttpRequest();\n  xhr.onreadystatechange = function\
  \ (e) {\n    if (xhr.readyState == 4) {\n      if (xhr.status == 200) {\n      \
  \  console.log(\"Got \" + xhr.status +\n          \" saying [\" + xhr.responseText\
  \ + \"]\");\n      } else {\n        第 11 章：与服务器对话\n      }\n    }\n  };\n}\n```\n\
  \n## **457\n\n\n\n```javascript\nconsole.log(\"Got error \" + xhr.status + \" saying\
  \ [\" + xhr.statusText + \"]\");\n```\n\n此版本的代码稍有改进。在报告请求成功之前，它会检查服务器返回的 HTTP 状态码。`200`\
  \ 是表示“OK”（正常成功响应）的状态码。这样，XHR 调用会将所有服务器端问题视为错误，因此它们不会完全被忽略。例如，当使用默认服务器（该服务器不知道如何处理对\
  \ `/no.json` 的请求）启动清单 11-4 中的代码时，它会在控制台打印以下消息：\n\n`http://localhost/:27 Got error\
  \ 404 saying [Not Found]`\n\n这条消息提供了足够的细节来描述和诊断问题：服务器发送了状态码 `404`，表明无法找到给定的资源。然而，有时这种检查还不够。如果存在网络问题，或者用户通过调用\
  \ `xhr.abort()` 中止了请求，状态行的信息量会较少：\n\n`Got error 0 saying []`\n\n如果服务器没有机会处理请求，甚至没有看到请求，那么\
  \ HTTP 状态码和状态文本都是未定义的，从而无法判断到底出了什么问题。无法通过 JavaScript 以编程方式诊断问题的根本原因。XHR API 允许你区分两种类型的错误：服务器错误和任何其他错误。显然，“任何其他错误”这个描述过于宽泛，难以依赖——网络连接丢失、DNS\
  \ 查找失败、重定向过多或程序性中止——这些以及许多其他问题都属于同一类别。\n\n看到这些问题的几率远低于常见的 `404` 或 `503` 状态码；如果浏览器能够加载网页本身，则意味着当时\
  \ Web 服务器是可用的，并且带宽足以承载初始内容。这通常也意味着 Ajax 请求能够顺利完成。然而，对于移动游戏来说，概率会稍高一些，主要是因为移动互联网的质量高度依赖于环境（如果用户跑到他家的水泥地下室，他可能会失去信号）。\n\
  \n## 提示\n\n有几种方法可以检查你的应用程序在低连接性下的工作情况。测试网络问题最简单的方法是随机中止你的请求。第二种技术是从服务器端中止连接，不写回任何数据，如下所示：\n\
  \n```javascript\napp.get(\"/no.json\", function(req, res) {\n    req.socket.end();\n\
  \    req.socket.destroy();\n});\n```\n\n在更复杂的情况下（例如，当你想要测试低带宽连接、数据包丢失等时），你应该使用专门的网络模拟软件。\n\
  \n#### XMLHttpRequest Level 2\n\n新的 Level 2 规范为 XHR 对象增加了一些缺失的功能，包括更好的事件处理器、支持发送和接收二进制数据、支持文件上传以及跟踪上传进度等。在本节中，我们通过两个示例来比较旧\
  \ API 与 Level 2：一个常规 HTTP 请求和一个二进制请求。这两个任务对于游戏开发都至关重要。尽管这两个任务使用旧 API 也能完成，但 Level\
  \ 2 看起来更方便，并且不需要任何 hack。\n\n让我们来看一下清单 11-5 中同一个“Hello World”应用程序的代码——但已更新为使用新版本\
  \ XHR 的某些功能。\n\n**清单 11-5.** Level 2 版本的 Hello World 请求\n\n```javascript\nfunction\
  \ init() {\n    var xhr = new XMLHttpRequest();\n\n    xhr.onload = function(e)\
  \ {\n        if (xhr.status == 200) {\n            console.log(\"Got response saying\
  \ [\" + xhr.responseText + \"]\");\n        } else {\n            console.log(\"\
  Got server error \" + xhr.status +\n                \" saying [\" + xhr.statusText\
  \ + \"]\");\n        }\n    };\n\n    xhr.onerror = function(e) {\n        console.log(\"\
  Got network error\");\n    };\n\n    xhr.onabort = function(e) {\n        console.log(\"\
  Request is explicitly aborted\");\n    };\n\n    xhr.open(\"GET\", \"data.json\"\
  );\n    xhr.send();\n}\n```\n\n\n\n# 排版后的内容\n\n此方案显然优于原始版本。针对 HTTP 请求的结果，有三种不同的回调函数进行处理：\n\
  \n- `onload`，用于处理 HTTP 调用正常完成时的常规情况（不区分响应状态码，因此 200 和 503 状态码均视为正常）；\n- `onabort`，当用户中断请求时触发；\n\
  - `onerror`，当发生网络错误时触发。\n\n此代码的主要优势在于更易阅读，并且它是迈向更高质量错误报告的第一步。在 `XMLHttpRequest`\
  \ Level 2 中，`abort` 被视作独立事件处理。\n\nLevel 2 带来的改进远不止细粒度的回调函数，其中最重要的新特性之一是对二进制数据的处理能力。\n\
  \n#### 处理二进制数据\n\n能够处理二进制数据对于游戏开发而言极为重要。无论是出于历史原因，还是为了节省流量并保持资源体积小巧，3D 模型等游戏资源通常以二进制格式保存。在\
  \ XHR Level 2 之前，并没有标准方法来实现这一需求。唯一可行的方案依赖于自定义函数 `overrideMimeType()`。清单 11-6 展示了这一方法。\n\
  \n**清单 11-6.** *使用原始 XMLHttpRequest 加载二进制数据（自定义字符集 Hack）*\n\n```\nfunction init()\
  \ {\n  var xhr = new XMLHttpRequest();\n  xhr.open('GET', 'bin/marine.md2');\n \
  \ xhr.overrideMimeType('text/plain; charset=x-user-defined');\n  xhr.onreadystatechange\
  \ = function(e) {\n    if (this.readyState == 4 && this.status == 200) {\n     \
  \ for (var i = 0; i < this.responseText.length; i++) {\n        var byte = this.responseText.charCodeAt(i)\
  \ & 0xff;\n        // 在此处处理字节\n      }\n    }\n  };\n  xhr.send();\n}\n```\n\n清单\
  \ 11-6 中的代码覆盖了服务器返回的 MIME 类型，强制浏览器将二进制响应解释为带有未知字符集 `x-user-defined` 的文本。这种方式旨在确保浏览器不对响应进行处理，从而保持服务器发送的字节数据不变。\n\
  \nXHR Level 2 规范明确增加了对二进制通信的支持。支持新特性的浏览器可以发送和接收任意二进制数据，而无需像清单 11-6 那样采用变通方法。查看清单\
  \ 11-7 中的代码，了解其工作原理。\n\n**清单 11-7.** *XHR Level 2 中对二进制数据交换的支持*\n\n```\nfunction\
  \ init() {\n  var xhr = new XMLHttpRequest();\n  xhr.open('GET', 'bin/marine.md2');\n\
  \  xhr.responseType = 'arraybuffer';\n  xhr.onload = function(e) {\n    var byteArray\
  \ = new Uint8Array(xhr.response);\n    for (var i = 0; i < byteArray.length; i++)\
  \ {\n      var byte = byteArray[i];\n      // 在此处处理字节\n    }\n  };\n  xhr.send();\n\
  }\n```\n\n清单 11-7 中的代码未使用任何 Hack 手段，因此更易于阅读和使用。要启用此功能，你需要将 XHR 对象的 `responseType`\
  \ 属性设置为 `ArrayBuffer` 或 `Blob`。在这种情况下，浏览器会将服务器的响应视为二进制数据，你无需任何变通即可访问字节。`responseType`\
  \ 的其他可能值包括 `document`（用于 DOM 对象）和 `text`（用于纯文本响应），默认值为 `text`。注意，在清单 11-7 中，我们使用了\
  \ XHR 的不同属性来访问响应数据：即 `response` 而非之前的 `responseText`。\n\nXHR Level 2 中的二进制数据支持依赖于其他规范：类型化数组（www.khronos.org/registry/typedarray/specs/latest/）和文件\
  \ API（www.w3.org/TR/FileAPI/）。类型化数组增加了操作二进制数据的标准方式。在类型化数组出现之前，开发者必须自行处理数据类型：从字节序列中创建字节、浮点数、整数及其他原子类型。在清单\
  \ 11-7 中，服务器的响应被视为“无符号 8 位整数”数组，换言之，即字节数组。\n\n还有其他类型，例如：`Int32Array` 用于表示 32 位有符号整数。\n\
  \n\n\n# 等效于 C 中的`int`或`Float64Array`（双精度浮点类型）\n\n等效于 C 中的`double`。第二种二进制响应类型是`Blob`（[`dev.w3.org/2006/webapi/FileAPI/#blob`](http://dev.w3.org/2006/webapi/FileAPI/#blob)），这是来自\
  \ File API 规范的数据结构，与`ArrayBuffer`非常相似，唯一的区别在于`Blob`保留了它所持有的数据类型信息——无论是 PNG 图像、ZIP\
  \ 压缩包还是 MD2 模型。\n\n**注意：** 本章编写时，所有三个规范——`XMLHttpRequest Level 2`、`File API`和类型化数组——均处于工作草案状态。这意味着它们可能在几个月内发生变化。然而，浏览器厂商已经在基于这些规范构建实现。目前，你仍然需要考虑不支持新功能的设备和浏览器；这样的设备和浏览器数量仍然很多。关于浏览器支持的最佳信息来源，通常可以访问[`caniuse.com/fileapi`](http://caniuse.com/fileapi)和[`caniuse.com/typedarrays`](http://caniuse.com/typedarrays)，以及通过模拟器和真实设备进行广泛测试。\n\
  \n如果你想了解更多关于新 API 的激动人心的特性，请参阅 Eric Bidelman 撰写的精彩 HTML5 Rocks 文章《New Tricks in\
  \ XMLHttpRequest2》([www.html5rocks.com/en/tutorials/file/xhr2/](http://www.html5rocks.com/en/tutorials/file/xhr2/))。另一个很好的灵感来源是\
  \ W3C 规范——这些文档在本书中经常被引用，因为它们对开发者友好且编写良好。你应该阅读它们，以全面了解新特性应该如何工作以及 Web 的发展方向。\n\n\
  ### 反向 Ajax\n\n本节致力于探讨客户端与服务器之间的低延迟通信，其中双方都可以相互发送消息。`XHR`的典型用法假设客户端是唯一的事件源；例如，当用户填写表单时，他可能需要验证服务的响应，此时他向服务器请求执行某些操作并返回响应。如果我们有一个应用程序，其中服务器应该能够向客户端发送请求，该怎么办？例如，在聊天应用程序中，服务器可能想要向客户端发送新的聊天消息；换句话说，就是向客户端发送请求。\n\
  \n允许服务器与客户端通信的技术集合通常被称为反向 Ajax。从技术上讲，服务器无法连接到网页并直接发送消息，因为能够建立连接的唯一一方是网页。然而，通过服务器与客户端之间的某种协作，可以实现这一结果。\n\
  \n每种此类技术背后的思路是在页面与 Web 服务器之间建立某种持久连接，以便服务器在出现更新时能够使用该连接将消息推回给客户端。当没有活动时，连接保持空闲，但一旦服务器有要发布的新事件，它就可以利用打开的连接立即将其传递给客户端。这种模型与常规\
  \ Ajax 不同，因为它允许服务器（而非客户端）成为通信的发起方。\n\n**注意：** 这种架构有几种名称，但都未标准化。最流行的名称是反向 Ajax、服务器推送和\
  \ Comet。除了 Comet 之外，所有这些名称都表明通信的主动权现在在服务器端：服务器现在可以*推送*消息给客户端，这种模型是常规 Ajax 工作方式的*反向*。\n\
  \n#### 问题\n\n任何在线游戏服务的大厅都是服务器推送架构至关重要的完美示例。假设用户已连接到游戏，他需要找出还有谁在玩。其他玩家的列表必须……\n\n\
  \n\n# 与服务器通信：第 11 章\n\n交互性至关重要；用户希望了解其他玩家的状态（准备游戏、游戏中、离开键盘）。他还希望列表能够实时更新。\n\n在这种情况下，服务器充当事件的调度者：当两位玩家决定开始一局比赛时，服务器应通知所有其他已订阅的用户，正在游戏的玩家状态已变更，并且在完成游戏之前无法接受新的游戏请求（这是基于匹配的在线游戏的常见做法）。\n\
  \n#### 解决方案\n\n现在，我们需要找到一种方法，向每个正在浏览页面的用户展示大厅的实时更新。解决此任务的每种可用方法都属于以下三类之一：\n\n- **最佳解决方案**：专为解决此类任务而设计的\
  \ API。\n- **可接受的解决方案**：考虑到可用 API 和限制，仅仅是“足够好”的解决方案。\n- **过时的解决方案**：通常不再使用，但仍可能在某些库中可用的方法。\n\
  \n在本节中，我主要关注第二组，即可接受的解决方案。最佳解决方案仅作简要描述，因为它们无法在 Android 浏览器中使用。过时的解决方案不会在代码中展示：它们出现在本章中只是为了“完整性”地回顾传输方式。\n\
  \n**注意：** 如本章前面所述，实现服务器推送的不同方法通常被称为*传输方式*。\n\n##### 最佳解决方案\n\n有两种专门设计用于处理实时通信以及从客户端向服务器发送事件的\
  \ API：\n\n- **WebSocket**：规范[`(www.w3.org/TR/websockets/)`](http://www.w3.org/TR/websockets/)\
  \ 支持情况[`(http://caniuse.com/websockets)`](http://caniuse.com/websockets)\n- **服务器发送事件（SSE）**：规范[`(www.w3.org/TR/eventsource/)`](http://www.w3.org/TR/eventsource/)\
  \ 支持情况[`(http://caniuse.com/eventsource)`](http://caniuse.com/eventsource)\n\n不幸的是，这两者都无法在原生\
  \ Android 浏览器中使用。然而，由于这两种 API 正在向桌面浏览器普及，Android 平台最终也可能支持它们（例如，Android 版 Chrome\
  \ 支持 WebSocket）。本节简要概述了这两种 API 的客户端代码。当你阅读本章时，新的 Android 版本很可能已经支持`WebSocket`或`SSE`。\n\
  \n###### WebSocket\n\n`WebSocket`提供 API 和基于 TCP 的轻量级协议，用于保持客户端与服务器之间的连接。如果 Android\
  \ 支持它，任务将相对简单。每个客户端都会初始化与服务器的连接，该连接在应用程序的生命周期内保持打开状态。当玩家的状态发生变化时，服务器会将消息发送到所有打开的`WebSocket`连接。假设的`WebSocket`客户端代码如下所示：\n\
  \n```javascript\nvar webSocket = new WebSocket('ws://example.com/lobby');\n\nwebSocket.onmessage\
  \ = function (e) {\n    // e.data holds the response from the server,\n    // update\
  \ the UI or log it to the console\n    console.log('Server: ' + e.data);\n};\n```\n\
  \n`WebSocket`与`XHR`的区别在于，客户端和服务器都可以相互发送消息，并且连接在消息发送后保持打开状态。\n\n###### 服务器发送事件\n\n\
  服务器发送事件（SSE）是一种 API，它定义了一个名为`EventSource`的新 DOM 元素。当构造此对象时，它会连接到服务器并开始监听新事件。以下展示了如果\
  \ Android 支持，客户端代码将如何编写：\n\n```javascript\nvar es = new EventSource('lobby');\n\n\
  source.addEventListener('message', function(e) {\n    // now you can manipulate\
  \ the event data\n    console.log(e.data);\n}, false);\n```\n\n从客户端角度来看，`SSE`和`WebSocket`看起来非常相似；然而，它们在技术上有重大差异。Eric\
  \ Bidelman 在他发表于 HTML5 Rocks 的文章《使用服务器发送事件进行流更新》中，非常出色地解释了使用这些 API 的细微差别。\n\n\n\n\
  ([www.html5rocks.com/en/tutorials/eventsource/basics/](http://www.html5rocks.com/en/tutorials/eventsource/basics/)):\n\
  \n“……像 WebSockets 这样的 API 提供了更丰富的协议，可以实现双向、全双工通信。对于游戏、即时通讯应用以及需要在两个方向上获得近乎实时更新的场景而言，双向通道更具吸引力。然而，在某些场景下，客户端无需发送数据，你只需要从某个服务器动作中获取更新即可。\n\
  \n……SSE 通过传统 HTTP 协议发送。这意味着它们不需要特殊的协议或服务器实现就能工作。另一方面，WebSockets 则需要全双工连接，并且需要新的\
  \ WebSocket 服务器来处理该协议。此外，服务器推送事件具有 WebSockets 在设计上所缺乏的一系列特性，例如自动重连、事件 ID 以及发送任意事件的能力。”\n\
  \n（此片段经 Eric Bidelman 许可发布。）\n\n本节中描述的解决方案可用于针对移动设备和桌面设备的项目。然而，为了在安卓智能手机上实现相同效果，应提供一个可靠的降级方案。下一节将专门介绍此类降级传输方案。它们虽不如本节中的“最佳”方案那样完美，但已被证明是行之有效的。\n\
  \n**注意：** 不要被本节名称所误导：*最佳*并不意味着*完美无缺*。WebSocket API 和 SSE 都有各自的缺点和陷阱。“最佳”一词是指这些 API\
  \ 的语义比 XHR 等其他 API 更契合此任务。\n\n##### 可接受的解决方案\n\n“可接受”的解决方案是在依赖尖端技术的优雅代码与经过数百万用户多年实地检验的稳定方案之间寻求的折中。\n\
  \n首先，我们来看看用 XHR 模拟服务器到客户端通信的最简单方法。客户端每隔几秒轮询服务器，询问“有我的新事件吗？”如果存在新事件，则将其传输给客户端；否则，服务器仅返回空响应。这种情况下的客户端与服务器通信如图\
  \ 11-1 所示。那些未给客户端或服务器带来任何信息的“无用”请求以灰色显示。如你所见，为了仅接收一个事件，客户端和服务器都需要处理许多连接，只为给服务器一个响应的机会。\n\
  \n![](img/index-468_1.jpg)\n\n**图 11-1.** *最简单的轮询技术需要服务器和客户端执行大量不必要的工作。*\n\n在简单轮询方法中，即使没有新事件，也会写入响应并关闭连接。然后客户端会等待一定时间（称为“轮询间隔”），并再次重新连接。这种方法的缺点是，在最坏情况下，延迟等于轮询间隔时间。缩短间隔值也不可取：大量带宽将被浪费在仅发送头部信息上。服务器会在巨大负载下不堪重负（处理一个\
  \ HTTP 请求本身就有少量 CPU 和内存开销）。更多的客户端意味着更多浪费的 CPU 时间。\n\nHTTP 协议有一个有趣的特点：它不要求服务器立即响应客户端请求。事实上，服务器可以根据需要保持\
  \ HTTP 连接长时间打开。本节中的第一个技术正是利用这一事实来减少无用的调用次数。\n\n###### XHR 长轮询\n\nXHR 长轮询的工作原理与传统轮询几乎相同。唯一的区别在于，当服务器没有新事件时，它会保持连接打开。一旦有客户端的新事件，服务器就会响应并在之后关闭连接。这样，客户端连接可能会保持打开数秒钟，等待新数据。图\
  \ 11-2 说明了这一思路。\n\n![](img/index-469_1.jpg)\n\n![](img/index-469_2.jpg)\n\n\n\n\
  ## 第 11 章：与服务器通信\n\n**图 11-2.** *通过 XHR 长轮询，服务器会保持连接打开，直到有数据需要发送给客户端。*\n\n如您所见，XHR\
  \ 长轮询使用较少的请求来维持与服务器的连接。最大延迟开销是网页重新连接服务器所需的时间。\n\n然而，长轮询也有其缺点：长时间运行的 XHR 请求可能会被中间代理服务器甚至浏览器本身终止。例如，运行在三星\
  \ Galaxy 上的 Android 2.2 如果空闲约 20 秒，就会终止 XHR 连接。更糟糕的是，中断\"挂起\"连接的规则可能因浏览器和代理而异。安全超时时间约为\
  \ 15 秒。如果超过此时间且服务器没有响应内容，它应发送空响应并关闭连接。\n\n第二个缺点是，在消息密集型环境中，长轮询会失去优势并退化为常规轮询。这是该技术不适用于竞速类、在线\
  \ RPG 或策略游戏等快节奏实时游戏的原因之一。客户端会花费大量时间重新连接服务器（见图 11-3）。\n\n**图 11-3.** *消息密集型环境中的长轮询问题。长轮询退化为简单轮询：每秒发送一次请求。*\n\
  \n长轮询的示例代码如清单 11-8（客户端）和 11-9（服务器）所示。\n\n**清单 11-8.** *XHR 长轮询客户端示例*\n\n```javascript\n\
  function init() {\n  pollServer();\n}\n\nfunction pollServer() {\n  var xhr = new\
  \ XMLHttpRequest();\n  console.log(\"Requesting\");\n  xhr.open('GET', 'lobby');\n\
  \  xhr.onload = function(e) {\n    console.log(\"RESPONSE:\" + xhr.responseText);\n\
  \    setTimeout(pollServer, 4); // 收到响应后再次轮询服务器\n  };\n  xhr.onerror = function(e)\
  \ {\n    console.log(\"Error, retrying\");\n    setTimeout(pollServer, 4); // 发生错误时再次轮询服务器\n\
  \  };\n  xhr.send();\n}\n```\n\n**清单 11-9.** *最简单的长轮询服务器*\n\n```javascript\nvar\
  \ clients = [];\n\n// 以随机间隔发送通知\n(function() {\n  notifyClients();\n  setTimeout(arguments.callee,\
  \ Math.floor((Math.random()*10000)));\n})();\n\n/**\n * 向每个已连接客户端发送新事件数据\n */\n\
  function notifyClients() {\n  clients.forEach(function(res) {\n    res.send(\"new\
  \ event data\");\n  });\n  clients = []; // 客户端将重新连接，清空数组\n}\n\napp.get(\"/lobby\"\
  , function(req, res) {\n  clients.push(res);\n  console.log(\"Added client, now\
  \ \" + clients.length + \" connected\");\n});\n```\n\n当然，这种实现不应用于生产环境；它仅说明长轮询传输背后的基本技术。如您所见，服务器不会立即返回响应。相反，响应对象会保存在`clients`数组中供后续使用。一旦有可用数据，服务器会将其广播给客户端并清空数组。此时客户端断开连接，并在几毫秒后重新连接。\n\
  \n实际生产环境中的实现会更加复杂。它需要优雅地处理断开连接和错误，将客户端消息保存在队列中以免在客户端重连时丢失，等等。下一章，我们将使用 Socket.IO——这个库已经实现了传输处理的复杂部分。\n\
  \n这个简化版长轮询实现的完整源代码与其他本章资源一起位于`02.longpoll`文件夹中。\n\n###### XHR 流式传输\n\n有一种方法可以解决长轮询的主要问题：在每次收到消息后重新连接。这种方法称为\
  \ XHR 流式传输。\n\n从技术上讲，这并非全新的传输方式，而是对长轮询的轻微改进。\n\n其工作原理如下：如果将响应内容的类型设置为自定义\n\n\n\n\
  # Markdown 排版结果\n\n`value`（如`\"application/x-custom-event-stream\"`），浏览器不会等待接收完整的响应体。相反，它会将服务器写入`XHR`对象的`responseText`的所有内容追加到末尾，并触发`onreadystatechange`（以及\
  \ Level 2 中的`onprogress`），让您有机会从流中提取新消息。请查看列表 11-10 和 11-11 中更新的客户端和服务器代码。\n\n**列表\
  \ 11-10.** *XHR Streaming Transport：示例客户端*\n\n```javascript\nfunction init() {\n\
  \  pollServer();\n}\n\nfunction pollServer() {\n  var responseMarker = 0;\n  var\
  \ xhr = new XMLHttpRequest();\n  console.log(\"Requesting\");\n  xhr.open('GET',\
  \ 'lobby');\n\n  xhr.onload = function(e) {\n    console.log(\"Server closed the\
  \ stream, reconnect\");\n    setTimeout(pollServer, 4);\n  };\n\n  xhr.onprogress\
  \ = function(e) {\n    if (this.readyState == 3 && this.status == 200) {\n     \
  \ var response = xhr.responseText.substr(responseMarker);\n      responseMarker\
  \ = xhr.responseText.length;\n      console.log(response);\n    }\n  };\n\n  xhr.onerror\
  \ = function(e) {\n    console.log(\"Error, retrying\");\n    setTimeout(pollServer,\
  \ 4);\n  };\n\n  xhr.send();\n}\n```\n\n客户端的代码发生了显著变化。此版本的代码依赖`onprogress()`函数来获取新事件，而不是通常的`onload()`。此外，新消息被追加到`responseText`的末尾，因此要使用所描述的方法，必须从整个响应字符串中手动提取最新消息。\n\
  \n**列表 11-11.** *XHR Streaming：示例服务器*\n\n```javascript\nvar clients = [];\n\n//\
  \ send notification with random intervals\n(function() {\n  notifyClients();\n \
  \ setTimeout(arguments.callee, Math.floor((Math.random() * 10000)));\n})();\n\n\
  /**\n * Sends the new event data to every connected client\n */\nfunction notifyClients()\
  \ {\n  clients.forEach(function(res) {\n    res.write(\"new event data\");\n  });\n\
  \  // clients = []; // Do not clean the array, clients stay connected\n}\n\napp.get(\"\
  /lobby\", function(req, res) {\n  res.contentType(\"application/x-custom-event-stream\"\
  );\n  clients.push(res);\n  console.log(\"Added client, now \" + clients.length\
  \ + \" connected\");\n});\n```\n\n服务器几乎保持不变。更改的部分已加粗。首先，服务器向浏览器发送自定义的`contentType`。然后，当新消息到达时，它会将新消息写入客户端流中。`write()`函数不会关闭底层连接，因此此时无需清除客户端数组（当客户端断开连接时仍需清除，否则数组会保留垃圾数据；但就这个简单的演示而言，它工作得很好）。流式传输的主要优势在于，在消息密集的环境中，客户端无需在每条消息后重新建立连接。\n\
  \n完整的 XHR 流式传输示例应用程序位于`03.streaming`文件夹中，与本章的其他代码一起提供。\n\n##### 过时的解决方案\n\n本节介绍了一些以前使用过但已被其他\
  \ API 替代的传输方式，这些 API 以更好的方式解决了问题。这些传输方式包括：\n\n- JSONP 轮询\n- Flash Socket\n- Forever\
  \ IFRAME\n\n###### JSONP 轮询\n\nJSONP 轮询旨在解决从与客户端不同域的服务器加载数据的问题。例如，如果服务器位于`http://server.example.com`，而客户端\
  \ HTML 页面从`http://client.example.com`加载，由于同源策略的限制，它们无法通过`XHR`进行通信，这是一种安全限制，阻止了`XHR`向其他域发送请求。\n\
  \nJSONP 背后的技术是创建新的`<script>`元素并将其附加到文档的`body`中。由于`script`元素可以从任何域加载脚本，因此没有安全限制阻止请求检索数据。\n\
  \nJSONP 传输已过时，因为现在有一种新的 API 以标准方式规定域间资源共享：跨域资源共享（CORS）。\n\n\n\n## 第 11 章：与服务器通信\n\
  \n### 共享或 CORS\n\nCORS（跨域资源共享）是一种在 [www.w3.org/TR/cors/](http://www.w3.org/TR/cors/)\
  \ 中描述的规范。该规范描述了服务器必须发送给客户端以允许访问其资源的特殊标头。使用 CORS 更为可取，因为 JSONP 对请求生命周期（例如，一旦启动就无法取消）和错误处理的控制能力要弱得多。使用\
  \ CORS 的最后一个重要原因是它是一个受支持的标准，而不是像 JSONP 那样的权宜之计。\n\n### Flash Socket\n\nFlash Socket\
  \ 是一种依赖 Flash 插件来处理与服务器通信的传输方式。Flash 组件通知 JavaScript 新事件的发生。Flash 负责通知，而 JavaScript\
  \ 负责处理逻辑。许多人不同意这种传输方式已经过时；事实上，Flash 在处理持久的低延迟连接方面做得非常好，非常类似于 WebSocket。然而，Adobe\
  \ 停止了对移动设备上 Flash Player 的支持——这就是为什么不能再依赖这种传输方式的原因（至少不能在智能手机上）。\n\n这种传输方式过时，并不是因为通信技术被更好的\
  \ API 取代，而是因为它所依赖的核心组件现在已走到生命周期的尽头。\n\n### 永久 IFRAME\n\n永久 IFRAME 是最古老的传输方式：它依赖于\
  \ HTTP/1.1 的一个特性及其分块编码，该编码最初是为了处理非常大的文档而引入的。IFRAME 与服务器建立一个永不关闭的连接。服务器的任务是不断提供新的数据块——即包含处理新事件命令的\
  \ script 元素。每当服务器需要发送事件时，它就会向这个无限页面中追加另一个 `<script>` 块。该脚本会被客户端立即执行，这就是这种传输方式提供低延迟通信的原理。\n\
  \n这种传输方式已经过时，因为它已被本节前面描述的几种更好的解决方案所取代。永久 IFRAME 的两个主要缺点是在不同浏览器之间行为不一致以及错误处理能力差。\n\
  \n### 在现场测试传输方式\n\n一个好的传输方式的主要要求之一是可靠性。我们生活在一个不完美的世界，移动数据连接有时可能会中断。作为开发者，你对此无能为力。你的目标是确保连接的暂时中断不会将玩家踢出游戏，并且当连接恢复后，他可以继续游戏。此外，在连接不畅期间游戏尝试发送的消息不应丢失。这些消息应该被保存在某个地方，以便在设备重新上线后发送并传递到服务器。\n\
  \n测试游戏的最佳方式是启动一个服务器，然后尝试在从家到办公室的路上进行游戏。从家里的 Wi-Fi 连接开始，然后当你走到街上时切换到 3G。坐几站公交车，然后换乘地铁，继续在那里进行你的实验。最后，去买杯咖啡，然后去公园。别忘了在有空闲时间时接听来电或发送几条短信。\n\
  \n现在，请诚实地回答以下问题：\n\n-   你的在线游戏体验如何？\n-   是否有任何卡顿或崩溃？\n-   你是否丢失了任何数据、回合或服务器更新？\n\
  -   一旦服务器变得可用，游戏引擎是否能够恢复同步？\n-   你的游戏是否显示某种消息来警告你未连接？\n-   从你的对手的角度看情况如何？他是否知道你正在失去连接？他应该知道吗？当他看到你几分钟没有响应时，他是否有机会结束比赛？\n\
  \n如果你在第一次进行此类实验后对所有答案都感到满意，请给我寄张明信片。我想生活在一个拥有完美移动数据覆盖的城市。\n\n跑遍全城并不是调试网络的最佳方式，但是如何\n\
  \n\n\n#### 调试网络问题\n\n如果你的办公室 Wi-Fi 运行完美，为何还要调试？有一些工具可以模拟糟糕的网络环境；它们就是为此专门设计的。\n\n\
  ##### `DDMS` （Dalvik 调试监控服务器）\n\n模拟不良网络最简单的方法是使用 Android 模拟器配合一个名为 Dalvik 调试监控服务器（简称`DDMS`）的标准工具。它位于模拟器安装目录的`Tools`文件夹中。运行该应用程序，并在右侧找到`Emulator\
  \ Control`标签页（见图 11-4）。其中包含几个用于控制数据行为、带宽和延迟的选项。\n\n![](img/index-476_1.jpg)\n\n\
  **第 11 章：与服务器通信**\n\n**图 11-4.** *DDMS 窗口显示了多个用于模拟真实网络环境的选项* 还有一个选项可以完全切断模拟器的网络连接，但建议不要勾选它：`DDMS`和`ADB`（Android\
  \ 调试桥）是通过网络与模拟器通信的。如果关闭了网络，你将无法以同样的方式重新开启，因为模拟器将不再响应。\n\n`Telephony Actions`（电话操作）部分允许你模拟来电或短信。\n\
  \n##### 模拟不良网络的专用软件\n\n`DDMS`的功能有些局限，因为它只能模拟低带宽和网络延迟，无法模拟数据包丢失和临时断连。\n\n幸运的是，有多种解决方案可用于模拟不良网络，不过大多数方案都需要一定的网络知识。\n\
  \n遗憾的是，深入讨论网络配置以及搭建一个能帮助模拟真实移动流量的系统超出了本书的范围。不过，我将为你提供关于`DummyNet`和`WANem`的信息，它们是入门的不错选择。\n\
  \n`DummyNet`（[`info.iet.unipi.it/~luigi/dummynet/`](http://info.iet.unipi.it/~luigi/dummynet/)）是一个用于流量整形和低连接性模拟的工具。它最初是为\
  \ FreeBSD 开发的，但后来被移植到所有主流平台，包括 Windows 和 Linux。\n\n**第 11 章：与服务器通信**\n\n**475**\n\
  \n你可以在[`cs.baylor.edu/~donahoo/tools/dummy/tutorial.htm`](http://cs.baylor.edu/~donahoo/tools/dummy/tutorial.htm)找到关于为`DummyNet`设置规则的教程。\n\
  \n`WANem`项目（[http://wanem.sourceforge.net](http://wanem.sourceforge.net）是一个基于定制\
  \ Knoppix 发行版的工具。基本上，`WANem`是一个独立的操作系统，需要通过 Live CD 加载或在虚拟盒子中运行，以便它能在任何现代操作系统上运行。`WANem`拥有直观的\
  \ Web 界面，允许只想测试 Web 游戏连接性的人员无需深入研究网络细节即可搭建测试环境。市面上还有其他工具，但`DummyNet`和`WANem`似乎是最流行的。\n\
  \n## 本章小结\n\n在本章中，我们回顾了从服务器加载数据的多种可用技术。主要有两种通信类型：\n\n- **Ajax**：一种“经典”模型，其中客户端是唯一可以发起通信的一方。\n\
  - **反向 Ajax**：一种“反转”模型，也称为服务器推送和 Comet，其中服务器可以将消息推送到客户端。\n\n我们了解到这两种技术都有多种可用的 API，但市场上大多数设备对新\
  \ API 的支持程度并不高。对于 Ajax，我们学习了如何通过普通的`XMLHttpRequest`从服务器请求数据，以及同一 API 的更好版本——`XMLHttpRequest\
  \ Level 2`。我们还研究了加载二进制数据并在客户端进行解析的问题。\n\n反向 Ajax 允许我们在服务器和网页之间建立一个相对可靠且低延迟的通信通道，以实现接近实时的通信。\n\
  \n为此，客户端和服务器必须建立连接并尽可能长时间地保持其打开状态。然后服务器可以利用此连接发送更新。有多种方法可以建立这种通信并支持该连接，这些方法被称为传输机制。\n\
  \n\n\n## 第 12 章：打造多人游戏\n\n在撰写本文时，没有任何一种传输方式能像银弹一样完美适用于游戏开发。每种可用的传输方式都是在浏览器支持、延迟、可靠性、CPU\
  \ 周期和流量之间进行权衡。\n\n在下一章中，我们将把所学知识应用于实际任务：为我们的“四球游戏”构建客户端-服务器实现。\n\n## 打造多人游戏\n\n\
  本章致力于将我们在前两章中学到的技能付诸实践。目标是将我们在第 3 章中开发的单人版“四球游戏”打造成一个功能完备的多人游戏版本。阅读本章后，你将了解如何：\n\
  \n- 实现基本的多人游戏架构\n- 在客户端和服务器之间分配游戏逻辑\n- 在浏览器和`Node.js`之间共享 JavaScript 组件\n- 使用`Socket.IO`处理实时通信\n\
  \n我们将从审视网络游戏的架构开始，内容涵盖从典型休闲在线游戏面临的挑战，到近期可能在移动网页上出现的高级快节奏实时游戏。\n\n下一节将专门介绍支持在线体验的多人游戏基本组件。\n\
  \n接着，我们将讨论`Socket.IO`——这个`Node.js`模块能够减轻提供最佳实时网络传输方式的负担。最后一节专门讲解游戏实现：我们将采用单人版的代码，并新增对大厅和多人比赛的支持。代码将展示`Socket.IO`的常见模式；一旦你掌握了这些，就可以自行向项目添加更高级的功能。\n\
  \n### 网络游戏架构分析\n\n网络应用总是由两个部分组成：客户端和服务器。在 PC 游戏开发行业中，服务器端逻辑常被嵌入到游戏中。例如，当两个用户想要玩《暗黑破坏神\
  \ 2》时，他们无需单独设置专门的服务器软件；相反，他们启动游戏并选择局域网游戏模式。随后，其中一个启动的实例担任服务器角色，允许其他人连接并一起游戏，负责处理数据包传输、语音通信、游戏内聊天以及其他常见的多人游戏功能。在这种情况下，可能没有独立的服务器应用程序，比如游戏文件夹中的某个`server.exe`文件。尽管如此，这两个组成部分——客户端和服务器——在每一个支持网络的游戏中都实际存在。\n\
  \n网页游戏的工作方式则不同：游戏客户端通常是一个包含一定量 JavaScript 逻辑的网页。该页面由网页服务器准备和提供，然后由浏览器加载和渲染。从这一刻起，它可以作为独立应用程序运行（就像前几章详细介绍的那些），也可以作为一个“客户端”，与相同或不同的服务器“对话”，并让用户与其他像他自己一样的玩家一起游玩。\n\
  \n本章的任务是制作一个更高级的“四球游戏”版本。我们将添加非常基础的网络支持——一个大厅和游戏的多人版本。本章的材料将让你构建一个支持网络功能的网页应用工作骨架，你可以在此基础上进一步扩展，以满足实际需求。\n\
  \n对于一个从未开发过简单在线多人游戏的人来说，这可能听起来是一项非常容易的任务。确实，我们已经实现了游戏中最困难的部分——图形引擎和逻辑——因此我们可以重用部分代码并迅速组装出一个服务器。然而，在实践中，情况并非如此。根据经验法则，将你制作一款优秀单人游戏所付出的努力乘以十，就是你制作同一款优秀多人版本所需付出的努力。图\
  \ 12-1 展示了完成游戏网络版本所需的工作量。\n\n\n\n# 简易游戏。核心游戏本身只是整个基础设施的一小部分。\n\n![](img/index-480_1.jpg)\n\
  \n## 第 12 章：制作多人游戏\n\n**479**\n\n**图 12-1.** *开发一款优秀多人游戏各部分的投入比例*\n\n为何需要如此多时间？多人游戏之所以更复杂，是因为它们需要特定的基础设施来支持无缝在线体验：大厅、评分、排行榜、好友列表、头像、聊天室——这些仅仅是个开始。浏览先进在线游戏社区，你还会发现更多组件。用户在线游戏时，不仅希望利用离线经验并消耗网络流量，更想结识新朋友、找到合适的对手、查看成就与进度，并证明自己胜过他人——这正是在线游戏的乐趣所在。开发此类基础设施工具往往比实现游戏核心（逻辑和\
  \ UI）更具挑战性。\n\n**注意：** 本章假定读者具备 HTTP 协议基础知识。至少应了解请求头与请求体的区别，熟悉`GET`和`POST`方法及其差异，知道开发者向服务器发送参数时应如何序列化，理解服务器响应码的含义，以及其他\
  \ HTTP 基础知识。\n\n## 第 12 章：制作多人游戏\n\n#### 游戏架构：从单机走向联机\n\n让我们找出将第三章创建的独立游戏升级为多人版本的最佳方式。首先，客户端-服务器方案涉及两个共同承担职责与逻辑的组件：客户端和服务器。我们需要分析两者之间分配任务的最佳方式。由于已实现部分组件，我们希望尽可能复用它们。需考虑两点：第一，专为单机设计的组件通常至少需要微调才能使用；第二，如何实现组件代码在客户端与服务器间的共享。\n\
  \n解决这两个问题后，即可着手设计游戏架构并用代码实现。通用流程如下：\n\n1. 明确客户端与服务器的职责。\n2. 审查现有游戏组件，思考如何复用。\n3.\
  \ 设计游戏架构。\n4. 实现架构。\n\n#### 客户端与服务器的职责\n\n划分客户端与服务器的职责并非总是小事一桩，但架构师大多会基于游戏类型、安全需求、响应速度要求等因素做出决策。核心问题在于游戏逻辑（例如回合验证）的存放位置。本节中，我们将探讨不同类型的游戏，而不仅是四球游戏。\n\
  \nWeb 领域的古老规则是：\"永远不要信任客户端输入。\"这意味着客户端能发送到服务器的任何内容，恶意用户也可能发送，以攻击系统并获取本不应访问的功能。举个简单的潜在问题示例：支持将最终得分提交至全球排行榜的游戏。如果用户具备足够技术能力，就可能轻易劫持向服务器传输结果的过程，并发送任意数值。通常，使用\
  \ HTTP 等文本协议更容易实现，二进制协议稍难，但只要黑客有足够时间和耐心，任何协议都可能被突破。这样一来，任何用户都可能登上排行榜首位。最好的情况是作弊者被识别并封禁。\n\
  \n考虑到安全性，解决方案似乎显而易见：将所有可能的逻辑都放在服务器端，不让客户端做出任何\n\n\n\n`unchecked input`。这种偏执的方法在处理回合制游戏时效果很好，因为整个验证逻辑都在服务器端完成。服务器是仲裁者，无论如何都不允许客户端作弊。然而，这并非总是可行的。\n\
  \n对于仅在联系服务器时发送高分数据的单人游戏客户端，其合法性是无法验证的，因为客户端并没有发送任何能证明它通过合法操作获得该分数的证据。服务器就像一位告诉学生“如果你们完成了作业，就举手”的大学教授。如果他不核实那些声称完成的学生是否真的做了，学生们很快就开始为了获得加分或好成绩而作弊。\n\
  \n另一类极难限制作弊的广泛游戏类型是快节奏的多人游戏，例如在线射击游戏。这类游戏往往不得不为了更好的可玩性和更低的服务器复杂度而牺牲验证。之所以无法完美验证用户的操作，至少有两个原因：数据量过大以及导致验证不准确的延迟。\n\
  \n如果用于验证而发送的数据量过大，那么在流量和所需的处理能力方面，验证成本都会变得过于高昂。Heckler & Koch MP5K 系列的射速约为每分钟 900\
  \ 发（每秒 15 发）。验证每一颗子弹需要多少流量和 CPU 周期？更不用说在多人游戏地图上十个人同时开火的情况了。当然，这个问题是可以解决的：例如，你可以只发送连发中每第十发子弹的方向，然后对其他的子弹方向进行插值计算。\n\
  \n第二个使服务器端验证对实时动作游戏吸引力下降的问题是网络延迟（或称 lag）。图 12-2 说明了这个问题。这是虚拟游戏战场的俯视图，玩家正试图用投射武器攻击一个快速移动的目标。客户端看到玩家击中了目标，但由于延迟，服务器端的游戏状态与客户端不同，服务器认为玩家打偏了。不用说，当玩家看到自己刚刚击中的敌人欢快地跑开时，会非常沮丧。\n\
  \n![](img/index-483_1.jpg)\n\n**图 12-2.** 由于延迟，服务器接收到的射击结果与客户端不同。\n\n有很多复杂的算法可以解决延迟问题，这些算法通常被称为延迟补偿技术。例如，如果特定客户端的网络延迟是\
  \ 300 毫秒，那么当服务器接收到事件时，它会尝试回退 300 毫秒，并像玩家在射击那一刻看到的那样查看游戏世界。不幸的是，这些技术为一种截然不同的网络协议漏洞利用方式打开了方便之门，使得恶意玩家能够在游戏中获得不公平的优势。\n\
  \n**注意：** 正如我所提到的，Android 游戏尚未准备好应对这类问题，因为快节奏的在线游戏离不开网络层的良好支持。在默认的 Android 浏览器支持\
  \ `WebSockets` 或任何其他类似 API 之前，那些毫秒数至关重要的游戏是无法以可接受的质量来实现的。\n\n回到“四球”游戏，将逻辑迁移到服务器端的任务并不太难：没有像\
  \ 3D 射击游戏那样需要补偿的延迟，也没有需要在服务器端复制的物理效果等，而且规则相当简单。我们将让服务器验证玩家执行的每一步——这就是我们验证解决方案的策略。如果这一步是有效的，服务器就将其广播给双方玩家；否则，它会向试图发送错误操作的玩家发送一个错误。\n\
  \n### 游戏组件\n\n至少，多人游戏应该有一个大厅，也就是玩家列表。\n\n\n\n# 第 12 章：制作多人游戏\n\n等待对手并准备开始游戏。这意味着除了我们已经拥有的组件外，还需要至少再创建两个：用于在客户端渲染的大厅\
  \ UI，以及用于通知新用户的服务器端支持。\n\n游戏架构中一个非常重要的变化是，客户端现在拥有多个屏幕（或状态）：大厅和游戏。在此之前，我们的游戏是在一个大画布上渲染的，唯一的游戏状态就是“游玩中”。然而，当你制作一款商业游戏时，它会有几个完全不同的屏幕，以完全不同的方式渲染，并支持一套完全不同的用户操作。例如，以下是一款在线策略游戏的几个屏幕：\n\
  \n- 主菜单\n- 世界地图\n- 城市界面\n- 建筑与交易界面\n- 战场界面\n- 游戏内帮助界面\n- 设置界面\n\n这些屏幕充当游戏的子模块：它们提供了访问游戏不同方面的途径，你应该将它们视为独立的软件组件。如果你决定更新战场界面，那意味着只更新这个模块，而不是整个项目。我们即将实现的游戏非常简单：它只有两个屏幕（大厅和游戏板），但我们仍然需要思考一种好的方法，向用户显示正确的屏幕，并根据应用程序的当前状态处理输入。最后这项任务在\
  \ HTML 触摸界面中非常简单：触摸事件总是分发给你触摸的组件，因此不可见的组件不会接收到任何事件。\n\n我们唯一缺少的重要部分就是传输方式的选择。在本章中，我们将使用`Socket.IO`库。在讨论完项目结构之后，我们将立即开始学习它。\n\
  \n### 项目结构\n\n这个项目的文件夹结构与典型的 Node 项目结构相同。我们来回顾一下，确保文件夹结构清晰。图 12-3 展示了项目完成时的样子。\n\
  \n![](img/index-485_1.jpg)\n\n**图 12-3.** *项目的结构*\n\n`main.js`文件是 Node.js 应用程序的入口点。用于浏览器\
  \ HTML 文件和客户端 JavaScript 文件的文件存放在`public`文件夹中。创建所描述的文件夹结构，并将我们在第 3 章中创建的离线游戏代码放入`public`文件夹中。我将旧的`index.html`文件重命名为`offline.html`，以保持单人游戏版本可访问。新的`index.html`文件是多人游戏版本的入口点。\n\
  \n### 使用 Socket.IO 的游戏大厅\n\n`Socket.IO`是由 Guillermo Rauch（[`devthought.com`](http://devthought.com)）创建的项目，可在\
  \ GitHub（[`github.com/LearnBoost/socket.io`](https://github.com/LearnBoost/socket.io)）或作为\
  \ NPM 模块获取。该项目的目标是“模糊不同传输机制之间的差异”，正如官方项目页面（[`socket.io/`](http://socket.io/)）所述。更正式地说，`Socket.IO`是一个便捷的客户端-服务器库，它允许你在不考虑传输细节的情况下实现页面内网络连接。让`Socket.IO`回答一些底层问题，比如“在这个设备上使用哪种传输方式最好？”或“如何处理客户端重新连接时可能到来的消息？”或“如何跟踪所有客户端并在需要时向他们广播消息？”节省下来的时间可以用来构建更好的游戏。\n\
  \n![](img/index-486_1.jpg)\n\n**注意：** 如果说`Socket.IO`是唯一可用的浏览器网络库，那是不公平的。还有另一个不错的项目叫\
  \ Faye（[`github.com/faye/faye`](https://github.com/faye/faye)），由 James Coglan（[`jcoglan.com`](http://jcoglan.com)）创建。它提供了类似的解决方案，并获得了开发者们的一些好评。\n\
  \n\n\n# 为何本章选择 Socket.IO 而非 Faye\n\n我选择在教程中使用 `Socket.IO` 而非 `Faye`，理由与技术或质量无关。首先，`Faye`\
  \ 实现了一种名为 `Bayeux` 的高级通信协议（http://svn.cometd.org/trunk/bayeux/bayeux.html），为保持内容简洁，我不打算花费额外篇幅来详述该协议。第二个原因则纯粹出于社交层面：`Socket.IO`\
  \ 拥有更庞大的开源社区，且规模持续增长。在我撰写本章期间，其邮件列表又新增了约 50 名成员。不过，我仍鼓励你亲自去了解 `Faye`，从而对这个精巧项目形成自己的判断。\n\
  \n`Socket.IO` 基于套接字（Socket）理念构建。`Socket.IO` 中的套接字与真正的 TCP 套接字或 Unix 套接字并无关联，它仅仅是针对不同客户端所使用的传输层协议之上的抽象层。请参考图\
  \ 12-4 了解其工作原理：服务器可同时维持与多个客户端的连接，每个客户端会选用最适合的传输方式。无论是客户端还是服务器，都不需要执行任何传输层相关的具体操作（例如创建\
  \ XHR 对象或发送请求）。统一的通信接口就是 `Socket`——其余细节均由库自行处理。我相信你已经迫不及待想看到实际案例了。\n\n**图 12-4.**\
  \ *Socket.IO 隐藏了底层传输的细节，为客户端与服务器之间的通信提供了简单可靠的 API。*\n\n#### 客户端-服务器通信\n\n让我们先迈出实现大厅功能的第一步。当第一个客户端连接到服务器时，应收到“你已连接”的消息；后续客户端则应收到“新用户加入”的消息。\n\
  \n首先，你需要安装 `Socket.IO`（即使 `Socket.IO` 报告无法编译原生扩展也无需担心，项目依然能正常运行）：\n\n```\n> npm\
  \ install socket.io\n```\n\n接着，初始化 `Socket.IO` 服务器。它可独立运行，但更常见的是作为 `Express` 服务器的包装器（参见代码清单\
  \ 12-1）。专用于 `Socket.IO` 的请求会被拦截，并与主流网站流程分开独立处理。`Express` 与 `Socket.IO` 的集成相得益彰，过程简洁流畅。\n\
  \n**代码清单 12-1.** *为 Express 服务器添加 Socket.IO 支持*\n\n```\nvar express = require(\"\
  express\");\nvar http = require(\"http\");\nvar app = express();\nvar server = http.createServer(app);\n\
  var io = require(\"socket.io\").listen(server, {\n  \"polling duration\": 10\n});\n\
  …\n// 接下来是常规的 Express 设置\nserver.listen(80);\n```\n\n你可能已经猜到，新对象 `io` 包装了现有的服务器。`listen`\
  \ 的第二个参数是可选的服务器配置项列表。`\"polling duration\"` 控制长轮询模式下保持打开请求的最大时长，此处已从默认值调低，因为某些移动设备会提前强制断开连接。新创建的\
  \ `io` 对象就是准备就绪的 `Socket.IO` 服务器，可以监听连接并与客户端交换消息。事不宜迟，让我们为服务器添加用户跟踪功能吧。\n\n从现在开始，通信流程变得十分直接。每当有新客户端连接时，服务器会创建一个名为\
  \ `socket` 的新对象——这是隐藏传输细节的抽象层。你可以监听客户端可能通过 `emit()` 发出的各种套接字事件，也可以自行使用 `emit()`\
  \ 发送消息。若需要向多个客户端通知特定事件，可调用 `broadcast()`。代码清单 12-2 实现了基本的大厅功能，是展示 `Socket.IO` 基础知识的良好示例。\n\
  \n**代码清单 12-2.** *为服务器添加基本大厅功能*\n\n```\nvar maxUserId = 0;\nio.sockets.on(\"connection\"\
  , function (socket) {\n  var userId = maxUserId++;\n  var userName = \"User \" +\
  \ userId;\n  var user = {id: userId, name: userName};\n  socket.emit(\"info\", {\
  \ text: \"You have connected\" });\n}\n```\n\n\n\n`socket.broadcast.emit(\"user-joined\"\
  , user);`\n\n`socket.on(\"disconnect\", function () {`\n\n`    socket.broadcast.emit(\"\
  user-left\", user);`\n\n`});`\n\n`});`\n\n第二行监听了为每个新建立的连接触发的`\"connection\"`事件。请注意，`Socket.IO`连接与`Express`会话无关。例如，如果您在谷歌浏览器中打开两个选项卡并访问同一个页面，它们共享同一个`Express`会话（因为它们共享存储在\
  \ Cookie 中的会话 ID），但`Socket.IO`将它们识别为两个不同的套接字。API 将`socket`对象作为参数传递给该函数。\n\n接下来的两行创建了一个包含某些用户信息的新对象，以便用一种人类可读的方式识别用户。每个用户都有一个\
  \ ID 和一个唯一的默认名称。如果您的游戏具有身份验证和授权算法，您可能会从数据库或社交网络 API 获取用户名，但在这个简单的示例中，所有用户都称为`User\
  \ 1`、`User 2`，依此类推。\n\n代码中最有趣的部分是对`emit()`和`broadcast()`的两次调用。在第一行中，我们向刚刚连接的用户发送消息（或者，用`Socket.IO`的术语来说，我们触发了该事件），消息类型为`\"\
  info\"`，并附带一个包含问候文本的对象。第二行“广播”了这个事件——即向除已连接用户之外的所有其他用户发送消息。最后一部分监听了`\"disconnect\"\
  `事件，并再次广播消息，以通知其他玩家大厅内发生的变化。\n\n现在让我们构建客户端。请查看列表 12-3 中的客户端代码。和往常一样，这是一个简单的网页；不过，它带有一些`Socket.IO`的魔法。\n\
  \n**第 12 章：制作多玩家游戏**\n\n**列表 12-3.** *用于 Socket.IO 服务器的客户端*\n\n```\n<!DOCTYPE html>\n\
  <html lang=\"en\">\n<head>\n    <meta charset=\"utf-8\" />\n    <meta name=\"viewport\"\
  \n          content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0,\n\
  \          user-scalable=no, target-densitydpi=device-dpi\"/>\n    <style>\n   \
  \     html, body {\n            overflow: hidden;\n            width: 100%;\n  \
  \          height: 100%;\n            margin:0;\n            padding:0;\n      \
  \      border: 0;\n        }\n    </style>\n    <script src=\"js/utils.js\"></script>\n\
  \    <script src=\"/socket.io/socket.io.js\"></script>\n    <script>\n        var\
  \ socket;\n        function init() {\n            socket = io.connect();\n     \
  \       socket.on(\"user-joined\", function (user) {\n                console.log\
  \ (user.name + \" joined\");\n            });\n            socket.on(\"user-left\"\
  , function (user) {\n                console.log (user.name + \" left\");\n    \
  \        });\n            socket.on(\"info\", function (info) {\n              \
  \  console.log (info.text);\n            });\n        }\n    </script>\n</head>\n\
  <body onload=\"init()\">\n</body>\n</html>\n```\n\n列表 12-3 中的代码使用了与服务器完全相同的方法。它获取`socket`对象，并将其用作与服务器通信的唯一入口点。然后使用该`socket`来监听消息，或触发新的事件（稍后会详细介绍）。请注意，服务器上并没有名为`\"\
  /socket.io/socket.io.js\"`的文件。`Socket.IO`服务器会处理对此脚本的请求，并返回该文件本身，因此您无需为此担心。这段代码看起来异常简单和清晰！\n\
  \n**注意：**几年前，我必须实现一个自定义的浏览器网络库，该库仅依赖于两种传输实现：`XHR`长轮询和`XHR`流式传输。我花了大约三周的时间来构建服务器和可靠的客户端，而它们完成的功能与我们刚才在三分钟内构建的完全相同。\n\
  \n现在您可以尝试运行此代码。到目前为止，它没有任何用户界面元素，但预期的控制台输出可以证明您所做的一切都是正确的，并且您已经让一个非常基本的`Hello World`应用程序运行起来了。\n\
  \n当前状态下的应用程序代码以及本章的其他资料位于名为`01.basic_io`的文件夹中。\n\n**添加游戏大厅屏幕**\n\n我们已经建立了基本的通信，现在我们应该制作一个游戏大厅屏幕。将消息写入控制台并不是通知用户游戏事件的好方法。\n\
  \n\n\n# 排版后的文档\n\n大厅是一个可点击按钮的列表——每个按钮代表一个用户。当玩家点击按钮时，游戏应开始。你永远不应忘记的经验法则是：不要试图通过光栅图形或`canvas`来重现丰富的用户界面。人们在此阶段常犯的错误是开始重新造轮子，并在\
  \ 2D 上下文中渲染按钮。有时这种做法是有意义的，但 99%的情况下，这会极大浪费你的努力和浏览器资源。现代浏览器多年来已逐步改进典型 UI 元素的渲染算法。我无法相信有人能在游戏开发通常有限的时间范围内，在`canvas`上做到同样的事情。不要尝试在`canvas`上自行实现滑块、按钮或下拉列表。在你有真正充分的理由之前，请使用\
  \ HTML 设施。\n\n我们将大厅的用户列表实现为一个独立的类，名为`LobbyUsersList`。它封装了 UI 元素，并将其用作用户列表的占位符。这个类的代码相当简单：它只进行\
  \ DOM 操作。这里使用的一个小技巧是——列表项的类名与用户在大厅中的状态名称相同：`playing`或`ready`。这样，我们可以根据玩家是否准备好游戏，轻松更改按钮的视觉样式。清单\
  \ 12-4 展示了这个类的代码。\n\n**清单 12-4.** *`LobbyUsersList`类：用于显示当前可用用户的客户端组件*\n\n```javascript\n\
  function LobbyUsersList(listElement, clickCallback) {\n  this._users = {};\n  this._listElement\
  \ = listElement;\n  this._clickCallback = clickCallback;\n}\n\nvar _p = LobbyUsersList.prototype;\n\
  \n_p.add = function(userId, username, status) {\n  // 如果用户已存在，则仅更新其信息\n  if (this._users[userId])\
  \ {\n    this.setStatus(userId, status);\n    this.setName(userId, username);\n\
  \  } else {\n    // 否则，创建新元素并附加到 DOM 树\n    var el = this._getUserListElement(userId,\
  \ username, status);\n    this._users[userId] = el;\n    this._listElement.appendChild(el);\n\
  \n    // 当列表项被点击时，提取当前用户数据并执行回调\n    el.addEventListener(\"click\", (function(e)\
  \ {\n      var userId = el.getAttribute(\"data-userid\");\n      var userName =\
  \ el.innerHTML;\n      var state = el.className;\n      this._clickCallback.call(this,\
  \ userId, userName, status);\n    }).bind(this));\n  }\n};\n\n_p.setStatus = function(userId,\
  \ status) {\n  // 设置\"status\"意味着更新类名\n  if (this._users[userId]) {\n    this._users[userId].className\
  \ = status;\n  }\n};\n\n_p.setName = function(userId, name) {\n  // Name 是 innerHTML\n\
  \  if (this._users[userId]) {\n    this._users[userId].innerHTML = name;\n  }\n\
  };\n\n_p.remove = function(userId) {\n  if (this._users[userId]) {\n    this._listElement.removeChild(this._users[userId]);\n\
  \    delete this._users[userId];\n  }\n};\n\n_p._getUserListElement = function(userId,\
  \ userName, status) {\n  // 创建新元素（列表项）并设置值\n  var el = document.createElement(\"\
  li\");\n  el.className = status;\n\n  // 使用 HTML5 data 属性保存与此元素关联的自定义数据\n  // http://dev.w3.org/html5/spec/Overview.html#embedding-custom-non-visible-data-with-the-data-attributes\n\
  \  el.setAttribute(\"data-userid\", userId);\n  el.innerHTML = userName;\n  return\
  \ el;\n};\n```\n\n这个类有点取巧：它将模型（用户列表、用户名、ID 和状态）与视图（表示各个项目的 HTML 元素）结合在一起。代码相当不言自明。如果我们将用户列表元素添加到页面，并钩入`Socket.IO`事件，我们将获得一个功能完善的大厅（参见清单\
  \ 12-5）。\n\n**清单 12-5.** *创建大厅的代码*\n\n```html\n<html>\n<head>\n```\n\n\n# 第 12 章：制作多人游戏\n\
  \n从 Wow! eBook 下载 <www.wowebook.com>\n\n```html\n<script>\nvar socket;\nvar userList;\n\
