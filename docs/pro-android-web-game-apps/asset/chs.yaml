  ```\n\n这些方法之间的区别在于它们的使用场景。回调的目标是将单个异步函数调用的结果传递给程序。回调通常与方法的单次调用相关联，并且在调用执行完毕后不会被保留。事件监听器则更持久：它与对象相关联，而不是与函数调用相关联。\n\
  \n当然，你可以在单个类中混合使用这两种方法。例如，`ImageManager` 可以在有新图片添加到列表时触发事件。同时，它也可以为每张图片传递回调函数。这样，客户端既可以（借助回调）跟踪特定图片的加载情况，也可以（借助监听器）跟踪整体的加载进度，如清单\
  \ 5-12 所示。\n\n**清单 5-12.** *ImageManager 同时使用回调和事件的示例*\n\n```\nvar onImageAdded\
