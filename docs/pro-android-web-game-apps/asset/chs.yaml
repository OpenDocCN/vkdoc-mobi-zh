  \n**注意：** 这里描述的技术可以通过多种方式进行优化；例如，我们可以检查每个图像的大小和位置，并丢弃那些不符合条件的图像。\n\n\n\n## 排版结果\n\
  \n不要与选中像素重叠。此外，我们保留了全尺寸的画布对象用于绘制遮罩，但实际只需要单个像素。我们可以改用单像素大小的画布，从而节省一些 CPU 时间和内存。这类优化显而易见，且在你的项目中如需实现也并不困难。不过，大多数情况下，可供选择的拖拽对象并不会太多，此处描述的方案仍能展现出不错的性能。\n\
  \n![](img/index-218_1.jpg)\n\n## 第 5 章：事件处理与用户输入\n\n### **模拟摇杆**\n\n本章的最后部分致力于模拟真实世界的游戏控制方式。这是移动游戏的常见做法：尝试制作用于输入的虚拟硬件版本。\n\
  \n从太空模拟游戏到第三人称射击游戏，各类游戏都会使用摇杆。当你需要对游戏角色进行直接控制时，对于缺乏多点触控的设备而言，摇杆可能是最佳选择。虚拟摇杆是一个对触摸和移动敏感的区域。其内部有一个小“摇杆柄”来显示当前位置。玩家可以改变方向（角度）和力度（距中心的距离）。\n\
  \n摇杆采用极坐标系。使用笛卡尔坐标系对其而言意义不大。极坐标系采用不同的方法来指定空间中的点位置。它不使用`x`和`y`值，而是使用方位角和半径。例如，笛卡尔坐标为\
  \ (`1`, `1`) 的点，在极坐标中半径约为 `1.414`，方位角为 `Math.PI / 4`。这两种坐标系之间的关系如图 5-10 所示。\n\n\
  **图 5-10.** *笛卡尔坐标系 (x, y) 与极坐标系 (方位角, 半径)*\n\n摇杆的输出是极坐标比常规坐标系更有用的绝佳例子。“方向”即方位角，而“力度”（距中心的距离）即半径。这种表示方式更适合控制任务。\n\
  \n摇杆的实现思路相当简单：追踪用户的触摸和移动，并计算摇杆位置的方位角和半径。\n\n![](img/index-219_1.jpg)\n\n如果用户点击了“活动”摇杆区域之外，该触摸将被忽略。图\
  \ 5-11 展示了该简易摇杆界面在网页上的可能外观。\n\n**图 5-11.** *简易虚拟摇杆。外圆是用户点击以控制物体位置的“活动”区域。内部的圆表示摇杆的当前位置。*\n\
  \n代码相对简单；最重要的函数如代码清单 5-29 所示。完整实现可在本书的其他材料中找到。\n\n**代码清单 5-29.** *实现虚拟摇杆控制*\n\n\
  ```\n_p._onDownOrMove = function(coords) {\n    // 当收到“按下”或“移动”事件时，保存当前\n    //\
  \ 偏移量并更新半径和方位角\n    var deltaX = coords.x - this._x;\n    var deltaY = coords.y\
  \ - this._y;\n    this._updateJoystickValues(deltaX, deltaY);\n};\n\n_p._onUp =\
  \ function(x, y) {\n    // 如果没有交互，则恢复空闲状态\n    this._updateJoystickValues(0, 0);\n\
  };\n\n_p._updateJoystickValues = function(deltaX, deltaY) {\n    var newAzimuth\
  \ = 0;\n    var newRadius = 0;\n    // 如果摇杆处于空闲状态，则无需进行计算\n    if (deltaX != 0 ||\
  \ deltaY != 0) {\n        newRadius = Math.sqrt(deltaX*deltaX + deltaY*deltaY)/this._controllerRadius;\n\
  \        // 用户滑动距离过远，摇杆返回空闲状态\n        if (newRadius > 1) {\n            deltaX\
  \ = 0;\n            deltaY = 0;\n            newRadius = 0;\n        } else {\n\
  \            newAzimuth = Math.atan2(deltaY, deltaX);\n        }\n    }\n    //\
  \ 如果值实际发生了变化，通知监听器\n    if (this._azimuth != newAzimuth || this._radius != newRadius)\
  \ {\n        this._azimuth = newAzimuth;\n        this._radius = newRadius;\n  \
  \      this._deltaX = deltaX;\n        this._deltaY = deltaY;\n        this.emit(\"\
  joystickchange\", {\n            azimuth: newAzimuth,\n            radius: newRadius\n\
  \        });\n    }\n};\n```\n\n\n\n"
- "# 第 1 章：事件处理与用户输入\n\n当`InputHandler`检测到交互（点击、触摸或移动）时，会调用第一个函数。它会计算增量（即控制器中心与触摸坐标之间的\
  \ x 和 y 距离）。\n\n接下来，使用几个简单的三角函数公式计算半径和方位角的值。最后，如果位置自上次以来发生了变化，则会通知用户。从游戏代码中使用摇杆甚至更加简单（参见清单\
  \ 5-30）。\n\n**清单 5-30.** *将摇杆添加到游戏中*\n\n```\nfunction init() {\n    canvas = initFullScreenCanvas(\"\
  mainCanvas\");\n    ctx = canvas.getContext(\"2d\");\n    joystick = new Joystick(canvas);\n\
  \    var r = joystick.getControllerRadius();\n    joystick.setPosition(r + 50, canvas.height\
  \ - r - 50);\n    animateCanvas();\n}\n\nfunction animateCanvas() {\n    var speed\
  \ = 20;\n    var joystickRadius = joystick.getRadius();\n    if (joystickRadius\
  \ > 0) {\n        var joystickAzimuth = joystick.getAzimuth();\n        var xSpeed\
  \ = joystickRadius * Math.cos(joystickAzimuth) * speed;\n        var ySpeed = joystickRadius\
  \ * Math.sin(joystickAzimuth) * speed;\n        controlledObject.x += xSpeed;\n\
  \        controlledObject.y += ySpeed;\n    }\n    // ... the rest of animation\
  \ code goes here\n}\n```\n\n虚拟摇杆是一个非常棒的工具，尤其适用于移动设备。然而，在桌面浏览器上存在可用性问题。主要问题是您必须按住鼠标按钮才能移动它。如果您的游戏同时面向移动和桌面平台，请确保考虑可用性，不仅针对触摸屏，也要考虑传统的鼠标和键盘。摇杆演示的最终版本位于名为`07.joystick.html`的文件中，该文件随本章的源代码一起提供。\n\
  \n## 总结\n\n在本章中，我们深入探讨了浏览器事件处理和用户控制。我们了解了触摸界面与常规桌面浏览器输入模型的不同之处。我们发现处理浏览器事件可能是一项繁琐的任务。更好的方法是创建一个合适的中间\
  \ API 层，该层隐藏事件细节并公开简单的接口。\n\n我们学习了如何构建在游戏内部使用的自定义事件处理程序。对于像将事件对象发送给直接订阅者这样的简单任务，使用浏览器重量级的事件模型通常没有意义。\n\
  \n我们通过拖放和像素完美选择模型开发了与游戏交互的高级方式。最后，我们创建了模拟摇杆的自定义组件——摇杆自电子游戏诞生以来一直用于与视频游戏交互的硬件。\n\n\
  完成本章后，我们已准备好迎接下一个挑战：渲染虚拟世界。\n\n"
- "# 渲染虚拟世界\n\n在前几章中，我们学习了如何渲染动画、控制时序以及响应用户输入。下一个有趣的主题是游戏世界的渲染。如果您正在创建像国际象棋这样的游戏，这可能是一项简单的任务，但如果是角色扮演游戏或策略游戏，其中的世界非常巨大呢？显然，将地图和游戏对象存储在智能手机的内存中不是一个好选择——数据太多，通过网络传输的字节太多，渲染速度也太慢。\n\
  \n接下来的两章专门介绍虚拟世界的渲染。首先，我们将介绍在智能手机屏幕上绘制广阔 2D 空间的基本技术。我们将探讨几种不同的方法来优化渲染速度以及服务器和客户端之间传输的数据量。\n\
  \n我们将尝试关注每种技术背后的动机，讨论何时以及为何需要应用它们。本章的内容将为在下一章中构建成熟的等距引擎奠定坚实的基础。\n\n在本章中，我们将学习以下内容：\n\
  \n- 瓦片地图以及如何将世界表示为瓦片网格\n- 如何在画布上渲染瓦片地图\n- 如何优化渲染性能\n\n\n\n### 如何渲染建筑物和角色等世界对象\n\n\
  ## 第 6 章：渲染虚拟世界\n\n#### 瓦片地图\n\n`Tile maps`（瓦片地图）是一种非常强大的技术，它允许使用名为`tiles`（瓦片）的小图像来构建庞大而复杂的关卡。想象一下，你正在制作一款大型多人在线策略游戏，其中包含一张巨大的世界地图，拥有河流、平原、森林和山脉，总尺寸为\
  \ 100,000 × 100,000 像素。这对大型游戏来说绰绰有余。显然，我们无法直接使用一张图像将其展示给用户：无论是移动设备还是个人电脑，都没有足够的\
  \ RAM 来容纳如此巨大的地图。\n\n事实证明，地图的广阔区域由非常相似的图案组成。雪地几乎到处都一样——洁白而闪亮。沙漠、草地、水域和类似的自然区域也是如此。也许我们可以利用这一点来优化我们的地图？\n\
  \n##### 瓦片地图背后的理念\n\n`Tiles`是相同尺寸的小图像，设计成彼此无缝衔接而不破坏图案——它们就是这样拼凑出地图的一部分的。请看图 6-1，你会看到这一概念的实际应用。\n\
  \n**图 6-1.** *《魔兽争霸 2》中的*瓦片地图\n\n这是《魔兽争霸 2》地图编辑器的截图。白线显示了构成一幅完整图像的瓦片边界。注意，瓦片是对齐到网格上的。如果仔细观察，你会发现瓦片并非独一无二。事实上，它们重复出现的频率相当高。例如，森林只有三四种不同的瓦片，泥土有几种瓦片，而森林向泥土过渡的边界区域大约有十二种瓦片。\n\
  \n瓦片的设计方式使得用户看不出分隔瓦片的边界。查看截图中未被辅助网格覆盖的右侧部分，你会发现森林看起来相当自然。尽管几乎所有的树木看起来都一样，但你不会立刻意识到这张图像的瓦片本质。玩家也同样不会意识到。\n\
  \n那么，这如何帮助我们解决超大尺寸地图的问题呢？让我们进行一些简单的计算。假设我们有四种地形类型：雪地、森林、平原和山脉。我们的设计师为每种地形创建了四个瓦片，共计\
  \ 16 个瓦片。此外，我们还有大约 40 个边界瓦片，用于渲染一种地形向另一种地形过渡的区域，使得瓦片总数达到 56 个。\n\n如果每个瓦片的尺寸是 64\
  \ 像素，我们可以将整个瓦片集放入一张 512 × 512 像素的图像中。因此，我们不再需要一张庞大的 100,000 × 100,000 像素的地图图像，取而代之的是一张\
  \ 512 × 512 像素的瓦片集，任何现代设备都能轻松下载。\n\n下一步是将世界表示为一个瓦片网格。通常，关卡设计师会使用专门编辑瓦片地图的工具。将世界地图划分为\
  \ 64 × 64 的单元格，并为每个单元格选择合适的瓦片。现在，整个世界都可以用一个二维数组来描述。以下是这样一个数组可能的示例：\n\n```javascript\n\
  var world = [\n  [2, 2, 2, 8, 2, 2],\n  [5, 4, 7, 3, 4, 3],\n  [5, 4, 3, 3, 4, 7]\n\
  ];\n```\n\n当然，实际的数组会大得多。数组元素的索引是世界地图中单元格的坐标（x 和 y），而值则是瓦片集中的瓦片编号。例如，在该数组中，`world[1][2]`\
  \ 的值是 7。这意味着世界地图中坐标（x=2, y=1）处的单元格使用瓦片集中的 7 号瓦片来渲染。具体是哪个瓦片取决于实际的瓦片集，可能是雪地、沙子或森林。图\
  \ 6-2 展示了与《魔兽争霸 2》地图编辑器相同的截图；每个单元格上都标有瓦片索引。这是一个世界片段的示例，可以用我们的数组来描述。\n\n**图 6-2.**\
  \ *带有标记瓦片的瓦片地图片段*\n\n这种方法还有一个优势：你无需一次性下载描述整个世界地图的数组。还记得我们一开始举的例子吗——一个用于大型多人在线游戏的巨大地图？\n\
  \n\n\n为了进一步优化地图加载，我们最初只需要加载玩家周围`50 × 50`个瓦片的区域。假设这片地图区域最有可能满足玩家当前的探索需求。剩余的瓦片可以在玩家开始移动或滚动地图时，从服务器加载。我将在本章稍后部分展示如何实现此技术。\n\
  \n通过合理的内存管理，“世界地图”的大小实际上可以是无限的，因为它不存储在浏览器中；只有当前“最重要”的那块地图区域才会被缓存在客户端。其余部分则保留在服务器上。\n\
  \n##### 实现瓦片地图\n\n在本节中，我们将学习如何使用 JavaScript 实现瓦片地图。我们将从最简单的实现开始，然后逐步改进。在本章中，我们使用方形瓦片，但当然，其他形状也是可以的。例如，等距游戏使用菱形瓦片。回合制策略游戏可能会使用六边形瓦片，因为六边形瓦片之间距离的计算更为“公平”。一旦我们为方形瓦片创建了引擎，实现相同思路的其他几何形状就会相当容易，但其背后的数学原理可能稍微复杂一些。图\
  \ 6-3 展示了不同形状的瓦片。\n\n![](img/index-226_1.jpg)\n\n![](img/index-226_2.jpg)\n\n**图\
  \ 6-3.***瓦片可能有不同的大小和形状。*\n\n在本章中，我们使用一个名为`img/tiles.png`的文件中的瓦片集，该文件随本章的源代码一起提供。这个瓦片集有\
  \ 14 个`40 × 40`的瓦片，这正好满足我们的需求。这些瓦片来自[www.lostgarden.com](http://www.lostgarden.com)的免费瓦片集，并得到了\
  \ Daniel Cook 的许可。为了让您了解我们的资源是什么样的，它们展示在图 6-4 中。\n\n**图 6-4.***本章所使用的资源。左侧是用于渲染背景的瓦片。右侧是世界对象。*\n\
  \n### 设置\n\n让我们从在屏幕上绘制瓦片开始，不进行任何优化。现在我们正在处理一个由`40 × 40`数组描述的相当小的世界。该代码基于第 3 章的骨架（清单\
  \ 3-6），并增加了第 4 章动画的支持（清单 4-24）和第 5 章的事件处理（“自定义事件”部分）。清单 6-1 显示了 `<script>` 块，它是进行虚拟世界实验的基础。该代码建立了一个典型的游戏开发试验场：它初始化了图像加载、输入处理和动画循环。为了方便起见，这个更高级的骨架与本章节的其他源代码一起保存在一个名为`setup`的文件夹中。\n\
