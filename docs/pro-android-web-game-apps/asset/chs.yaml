  \ = 0;\n    this.reset();\n}\n\n_p = BoardModel.prototype;\n```\n\n构造函数接受两个可选参数：棋盘的列数和行数。JavaScript\
  \ 在语言层面没有可选参数的概念。要使参数变为可选，你需要检查它是否被设置，若未设置则使用默认值。\n\n这一行代码\n\n```javascript\nthis._cols\
  \ = cols || 7\n```\n\n等同于\n\n```javascript\nif (cols) {\n```\n\n\n```javascript\n\
  this._cols = cols;\n\n} else {\n\nthis._cols = 7;\n\n}\n```\n\n变量`_data`保存游戏的当前状态——一个二维数字数组：`0`代表空单元格，`1`代表红色棋子，`2`代表绿色棋子。\n\
  \n通过此类 ID 引用棋子容易出错。考虑以下代码，它检查单元格中的棋子是否为绿色：\n\n```javascript\nif (this._data[i][j]\
  \ == 2) {\n  /* 2 是什么？这里发生了什么？ */\n}\n```\n\n这段代码难以立即理解。让我们为每个 ID 创建变量并使用它们。将代码清单\
  \ 3-15 中的代码添加到`BoardModel`类中。\n\n**代码清单 3-15.** *使用“常量”代替数字的代码更易读*\n```javascript\n\
  BoardModel.EMPTY = 0;\nBoardModel.RED = 1;\nBoardModel.GREEN = 2;\n```\n\n现在，同样的颜色检查代码变得容易理解多了：\n\
  \n```javascript\nif (this._data[i][j] == BoardModel.GREEN) {\n  /* 好，明白了，是绿色，让我们做点什么\
  \ */\n}\n```\n\n**第 3 章：创建第一个游戏**\n\n**注意：** 大写命名的变量（`CAPITAL_CASED`）是另一种代码约定，就像下划线开头的私有变量（`_underlinedPrivateVariables`）一样。它表示该变量是一个“常量”——一旦初始化，就不能更改其值。\n\
  \n初始化代码分为两个函数：构造函数和名为`reset`的函数。之所以有独立的`reset`函数，是因为我们在多轮游戏中复用同一个`BoardModel`实例。它将对象恢复到初始状态，就像刚构造完成后一样：空棋盘、总棋子数为\
  \ 0、第一个移动的玩家是`RED`。`reset()`函数的代码如代码清单 3-16 所示。\n\n**代码清单 3-16.** *将游戏板重置为初始状态*\n\
  ```javascript\n_p.reset = function() {\n    this._data = [];\n    for (var i = 0;\
  \ i < this._rows; i++) {\n        this._data[i] = [];\n        for (var j = 0; j\
  \ < this._cols; j++) {\n            this._data[i][j] = BoardModel.EMPTY;\n     \
  \   }\n    }\n    this._currentPlayer = BoardModel.RED;\n    this._totalTokens =\
  \ 0;\n};\n```\n\n`BoardModel`外部的代码需要访问游戏状态。例如，`BoardRenderer`需要读取单元格的状态才能绘制棋子。让我们添加一些公共函数来支持这一点（见代码清单\
  \ 3-17）。\n\n**代码清单 3-17.** *访问游戏板状态的函数*\n```javascript\n_p.getPiece = function(col,\
  \ row) {\n    return this._data[row][col];\n};\n\n_p.getCols = function() {\n  \
  \  return this._cols;\n};\n\n_p.getRows = function() {\n    return this._rows;\n\
  };\n```\n\n初始化代码现已就位，我们可以进入最有趣的部分：游戏逻辑的实现。\n\n**第 3 章：创建第一个游戏**\n\n### 进行移动\n\n\
  当玩家点击屏幕时会发生什么？根据流程，一旦我们获得列的 ID，我们将执行以下操作：\n\n1.  检查移动是否有效（如果无效——立即返回）\n2.  更新游戏状态（切换玩家，增加移动计数器，将棋子放入单元格）\n\
  3.  检查是否满足胜利或平局条件\n\n移动的有效性意味着列 ID 在范围内（例如，当只有七列时，将棋子放在第 10 列是不允许的），并且目标列至少有一个空单元格。这两个条件都非常容易检查。如果移动有效，`BoardModel`会放置棋子并检查胜利条件（我们将在下一节实现这种检查）。代码清单\
  \ 3-18 的注释很完善，因此不难理解。\n\n**代码清单 3-18.** *检查新移动的有效性并更新棋盘*\n```javascript\n_p.makeTurn\
  \ = function(column) {\n    // 我们要放下的棋子的颜色\n    var piece = this._currentPlayer;\n\
  \n    // 检查列是否有效\n    if (column < 0 || column > this._cols) {\n        return {\n\
  \            status: BoardModel.ILLEGAL_TURN\n        }\n    }\n\n    // 检查给定列中是否存在空行，\n\
  \    // 如果没有空行，则此次移动非法\n    var row = this._getEmptyRow(column);\n    if (row ==\
  \ -1) {\n        return {\n            status: BoardModel.ILLEGAL_TURN\n       \
  \ }\n    }\n\n    // 我们找到了空行，可以放下棋子\n    this._totalTokens++;\n    this._data[row][column]\
  \ = piece;\n\n    // 切换下一个玩家\n    this._toggleCurrentPlayer();\n\n    // 返回成功的移动以及游戏的\n\
  \    // 新状态（NONE、WIN 或 DRAW）\n    return {\n```\n**第 3 章：创建第一个游戏**\n\n\n`status:\
  \ this._getGameState(column, row)`,\n\n`x: column`,\n\n`y: row`,\n\n`piece: piece`\n\
  \n};\n\n};\n\n`_p._getEmptyRow = function(column)` {\n\nfor (var i = this._rows\
  \ - 1; i >= 0; i--) {\n\nif (!this.getPiece(column, i)) {\n\nreturn i;\n\n}\n\n\
  }\n\nreturn -1;\n\n};\n\n`_p._toggleCurrentPlayer = function()` {\n\nif (this._currentPlayer\
  \ == BoardModel.RED)\n\nthis._currentPlayer = BoardModel.GREEN;\n\nelse\n\nthis._currentPlayer\
  \ = BoardModel.RED;\n\n};\n\n`makeTurn` 函数返回一个描述回合结果的对象：回合是否成功？棋子的颜色和落子的位置是什么？我们必须引入几个额外的常量来标识游戏的不同状态：`NONE`（正常状态，游戏进行中）、`WIN`（上一回合是获胜回合）、`DRAW`（没有剩余空格，平局）和`ILLEGAL_TURN`（状态未改变，因为该回合不被允许）。使用常量而非直接使用数字的原因与之前相同：使用常量编写的代码更易于阅读（参见清单\
  \ 3-19）。\n\n**清单 3-19.** 定义更多“常量”来引用游戏状态\n\n```javascript\n/**\n * Game state after\
  \ the turn\n */\nBoardModel.NONE = 0;           // No win or draw\nBoardModel.WIN\
  \ = 1;            // The player who just dropped a piece has won\nBoardModel.DRAW\
  \ = 2;           // No more free cells in the board - it is a draw\nBoardModel.ILLEGAL_TURN\
  \ = 3;   // The last attempted move was illegal\n```\n\n唯一需要编写的函数是`_getGameState()`，它检查游戏是否达到获胜条件。\n\
  \n![](img/index-119_1.jpg)\n\n第 3 章：创建第一个游戏\n\n**113**\n\n**获胜条件**\n\n游戏的目标从其名称“四球”中显而易见。如果最后一步完成了一条由四个或更多同色棋子组成的直线，那么落下最后一个棋子的玩家即为赢家。该算法在`_getGameState()`函数中实现。它比例如国际象棋的算法要简单得多。不过，它仍然值得用几句话来解释。\n\
  \n显然，最后落下的棋子必须是获胜线的一部分；否则，游戏在当前回合之前就已经结束了。我们需要检查是否存在一条通过给定单元格（即最后一个棋子落下的格子）的直线，该直线由四个或更多同色棋子组成。我们计算所有可能方向上构成直线的棋子数量。例如，如果左边有两个同色棋子，右边有一个同色棋子，那么我们就有一条由四个棋子组成的线：左边两个，右边一个，以及中间的一个——即最后一步落下的棋子。我们对水平线、垂直线以及两条对角线分别进行此检查。\n\
  \n图 3-4 说明了这些检查的工作原理。图中存在获胜条件，因为有一条由四个球组成的水平线。最后落下的球左边有两个球，右边有一个球，总共四个。\n\n**图 3-4.**\
  \ 检查获胜条件\n\n实现此检查的代码非常精简。它被拆分为两个函数。其中一个函数`_checkWinDirection()`，从最后落下的球开始，计算在某个方向上相同颜色的球有多少个。另一个函数`_getGameState()`，在检查完所有可能的方向后返回游戏状态。方向由两个数值设置：`deltaX`和`deltaY`。在循环的每一步，这些值都会被加到单元格的坐标上。例如，如果`deltaX`为\
  \ -1，意味着我们每一步都会减小列索引（向左移动）；如果`deltaY`为 0，意味着每一步行索引保持不变。结合起来，就产生了向左移动。如果单元格坐标为 (4,\
  \ 2)，则检查以下单元格： (3, 2), (2, 2), (1, 2)。当然，如果其中一个单元格为空或存在不同颜色的棋子，检查将提前结束。清单 3-20 展示了`_checkWinDirection`的代码，该函数计算在给定方向上相同颜色球的数量。\n\
  \n\n\n### 排版后的文本\n\n**清单 3-20** *检查特定方向上同色球的数量*\n\n`_p.checkWinDirection = function(column,\
  \ row, deltaX, deltaY) {`\n\n```javascript\nvar pieceColor = this.getPiece(column,\
  \ row);\nvar tokenCounter = 0;\nvar c = column + deltaX;\nvar r = row + deltaY;\n\
  while (c >= 0 && r >= 0 && c < this._cols && r < this._rows && this.getPiece(c,\
  \ r) == pieceColor) {\n      c += deltaX;\n      r += deltaY;\n      tokenCounter++;\n\
  }\nreturn tokenCounter;\n};\n```\n\n该“行”由两个相反方向组成。例如，图 3-3 中的获胜行有两个方向：左和右。我们在循环中将`deltaX`和`deltaY`的值从-1\
  \ 改为 1，尝试每一种可能的方向。当`deltaX`和`deltaY`均为 0 时，跳过此步骤。显然，如果不移动任何位置，就会陷入无限循环。`_getGameState()`计算每一行中的棋子数量，如果该数量大于\
  \ 4，则报告获胜（参见清单 3-21）。\n\n**清单 3-21** *检查获胜状态*\n\n`_p.getGameState = function(column,\
  \ row) {`\n\n```javascript\nif (this._totalTokens == Game.BOARD_WIDTH * Game.BOARD_HEIGHT)\n\
  \      return BoardModel.DRAW;\nfor (var deltaX = -1; deltaX < 2; deltaX++) {\n\
