  \ `Java 到 JavaScript 适配器`，并将该 API 显式暴露给网页。这就是 Cordova 支持插件系统的原因。如果您缺少某个 `原生` 功能，您可以随时自己编写一个插件，而无需等待开发者在核心框架中实现它。\n\
