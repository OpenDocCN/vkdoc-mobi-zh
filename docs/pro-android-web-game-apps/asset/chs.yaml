  \ 是一个非常优秀且便捷的游戏引擎，能够轻松处理相当复杂的任务。凭借良好的起步和活跃的社区，毫无疑问，它很快就会成为一个成熟的游戏开发引擎。\n\n## 总结\n\
  \n在本章中，我们探讨了游戏引擎这一主题。首先描述了与图形系统交互的三个层级：图形 API、库和游戏引擎。我们了解了它们之间的区别、各自的用途和局限性。\n\n\
  我们在 `Crafty` 的帮助下构建了游戏——这是一个专注于为游戏开发者整合典型工具的 2D 游戏引擎，包括精灵表、动画、事件处理、游戏状态与转换以及许多其他功能。我们创建了一个相当完整的游戏（当然省略了玩法），它具备完整产品的绝大部分功能——而源代码总大小仅为约\
  \ 140 行 JavaScript 代码。\n\n尽管游戏引擎看起来像银弹，但它们并非如此。它们能为你节省大量时间和精力，但高效使用每个游戏引擎都需要了解其底层机制。即使你选择使用其中之一，通过本书各章节所学到的技能，也将让你更好地理解引擎的魔法。\n\
  \n## 第 15 章：构建原生应用\n\n人们在安卓设备上使用的大多数应用都是原生的——即用 Java 编写并与操作系统紧密集成的程序。游戏也不例外。大多数安卓游戏都是原生游戏。本书中创建的应用则属于不同类型——它们是网络应用。这些应用已经运行得相当不错，而且毫无疑问，经过一些额外的打磨，将网络应用提升到商业水平并非难事。然而，有几个理由可能让你想为游戏构建原生安卓版本。\n\
  \n为什么要从已有的网页版本构建原生应用？这是个好问题。确实，网络应用有很多优势：部署更方便、无需安装、支持更多平台、更新更容易……那么为什么还要花额外时间做原生应用呢？以下是让原生应用非常有吸引力的最重要特性总结：\n\
  \n- 通过应用市场分发\n- 访问原生 API\n- 全屏模式\n- 使用浏览器尚不支持的 HTML5 API\n- 原生应用不一定需要网络连接，用户可以离线玩游戏\n\
  \n在本章中，我们将讨论原生应用的优缺点。此外，我们还将学习如何：\n\n- 安装和配置 Apache Cordova（原 PhoneGap 和 Apache\
  \ Callback）\n- 将现有的网页游戏封装为原生应用\n- 访问手机资源（如电话簿或 GPS）\n\n\n\n### 构建原生应用\n\n## 签名与发布\n\
  \n- 为应用签名，并准备将其发布到市场\n- 在 Google Play 上注册\n- 发布游戏，并通过 Google Play 应用下载\n- 更新应用，并发布新版本\n\
  \n从头开始创建一个 Android 应用是一项相当复杂的任务：需要具备 Java 和 Android 架构方面的特定知识。如果你不熟悉这些技术，可能需要花费大量时间和精力才能掌握到能编写商业级游戏的程度。幸运的是，有一种方法可以在不失去熟悉的网页环境的前提下获得原生应用的优势，本章将专门探讨这个主题。\n\
  \n**注意：** 本章以逐步指南的形式编写。其中某些步骤与常规的网页开发任务相去甚远；要完全理解它们，需要具备其他领域的一些经验。我将尽力让你对整体流程有良好的了解，并为你理解原生应用的工作原理提供初步指引；然而，Java\
  \ 编程超出了本书的讨论范围。如果你想了解更多，请自由查阅其他资料。关于 Java 入门，可以尝试阅读 Jay Bryant 所著的 *《Java 7 入门经典》*（Apress，2012）。如果你已有一定的\
  \ Java 基础，Mario Zechner 和 Robert Green 合著的 *《Android 游戏开发入门》* 第二版（Apress，2012）则是一本很好的资料。Android\
  \ 开发近期已成为非常热门的话题，因此你很容易在网上找到优质的学习材料。\n\n### 原生应用\n\n让我们从一些非常基础的问题开始。什么是原生应用？它长什么样？又由什么构成？原生\
  \ Android 应用是用 Java 编写的。一个典型的 Android 项目包含 Java 文件、Java 库，以及资源和素材，例如图片、XML 配置文件和媒体文件。有一个名为\
  \ `AndroidManifest.xml` 的特殊文件，它保存着应用的相关信息。应用本身以 APK 文件的形式分发：一种具有特定内部结构的 zip 压缩包。\n\
  \n构建 APK 的过程相当漫长；当编码部分完成后，开发者需要完成以下步骤才能生成一个可在设备上部署的文件：\n\n- 运行工具以自动生成几个 Java 文件\n\
  - 编译 Java 源代码\n- 将编译后的源代码转换为 Android 字节码\n- 将所有内容打包到 APK 文件中\n- 使用密钥对 APK 进行签名\n\
  - 执行对齐操作——优化 APK 压缩包\n\n如你所见，这个过程相当复杂。如果每次测试应用的一个微小改动都需要手动完成所有步骤，那将是对时间的巨大浪费。Android\
  \ 开发者使用一个名为 `Ant`（[`ant.apache.org`](http://ant.apache.org)）的工具来简化流程。`Ant` 是一个自动化构建系统；它可以执行用\
  \ XML 编写的构建脚本，这些脚本描述了构建应用所需的每一步操作。它的工作方式类似于 Windows 上的 `.bat` 文件或 Linux 上的 `make`，但\
  \ `Ant` 是跨平台的，并且拥有许多 Java 相关的扩展。借助它，只需在命令行中执行一条命令就能创建一个 Android 应用。\n\n**注意：** 大多数集成开发环境（IDE）都有支持\
  \ Android 开发的插件，能将应用构建过程的细节对开发者隐藏起来。Eclipse 和 IntelliJ Idea 都对 Android 开发有很好的支持。如果你考虑更深入地学习原生\
  \ Android 开发，可以先设置一个你喜欢的 IDE，就像我们在第 1 章中所做的那样。至于本章，使用命令行工具搭配文本编辑器就足以达成我们的目标。\n\n\
  从逻辑角度来看，Android 应用由各种组件和 UI 元素组成——按钮、进度条、组合框等等。这类组件有数十种，既有默认的也有自定义的。其中之一是“浏览器”，在\
  \ Android 中被称为 `WebView`。`WebView` 是一个常规的\n\n\n\n组件（如按钮或进度条）；任何应用程序都可以使用它来像普通浏览器一样渲染\
  \ HTML 页面。\n\n制作一个占用整个可用空间、包含 `WebView` 的单屏应用程序，并用它来渲染包含游戏的 HTML 文件并不困难。尽管页面渲染方式与往常一样，但它不再是一个“简单”的页面。它是一个真正的原生应用程序，可以访问通常禁止网页使用的系统资源。这样的应用程序结合了两个世界的优势：网页的简单性和原生应用的行为。\n\
  \n让我们更仔细地审视这种方法的优势：\n\n- **市场**。像 Google Play 这样的应用市场是极其重要的分发渠道。与发布在市场上的原生应用相比，网页本身更难推广。在使用市场时，可以轻松收集社区反馈并通知用户新版本的功能。最后，但同样重要的是，如果你决定向用户收费，市场是处理账单的最佳方式。\n\
  \n- **访问原生 API**。普通应用可以访问的一切，你的网页也可以访问。例如，你可以访问文件系统、SQLite 数据库、连接设施、传感器以及普通 Android\
  \ 应用可以访问的其他一切。有时你需要编写一些 Java 代码或使用现有的第三方组件来实现这一点。然而，这种无限制的资源访问为你构建完全不同的、更复杂的解决方案提供了途径。\n\
  \n**注意：** 当然，当我说“无限制访问”时，并不意味着你可以入侵用户的设备并为所欲为。Android 原生应用使用与网页不同的权限方案。用户安装应用时，系统会提示他确认“允许”某些类型的操作：访问网络、发送短信、读取通讯录等。之后，应用就可以使用这些设备资源。主要区别在于网页没有请求此类权限的选项。\n\
  \n- **全屏模式**。此功能对于游戏开发极其重要。在手持设备上，每一寸屏幕都很宝贵。地址栏和任务栏占用了大量有用空间！游戏可以利用全屏显示更大的地图部分，或显示自己的状态栏或\
  \ HUD（抬头显示器）。此外，全屏游戏给用户带来不同的感受。它更像他们过去常玩的普通 Java 游戏。\n\n- **使用浏览器尚未支持的 API**。Android\
  \ 浏览器（尤其是旧版 Android 上的浏览器）缺乏对某些优秀 HTML5 规范的实现。其中一些 API 可以借助原生资源来实现。`WebSocket` 和\
  \ `FileSystem API` 无法在普通网页中通过 shim 模拟——它们缺乏在所需级别与操作系统交互的权限。使用原生页面，可以实现一个符合标准的 shim，并将其用作真实\
  \ API 的替代品。\n\n你可以看到，使用这种方法有很多理由。那么，让我们利用这项技术将我们的“四球”游戏（Four Balls game）准备好发布到 Android\
  \ 市场——并发布它！\n\n**设置 Apache Cordova（PhoneGap）**\n\n毫不意外，已经有工具可以简化网页的包装过程。这个工具就是 Apache\
  \ Cordova（[`phonegap.com`](http://phonegap.com)）。\n\n**注意：** Cordova 最初名为 PhoneGap。后来它被移至\
  \ Apache Incubator，并更名为 Apache Callback。几个月后，它再次更名，现在被称为 Apache Cordova。在搜索博文、示例和教程时，最好使用最老的名称作为搜索词，因为\
  \ PhoneGap 是该项目在其大部分生命周期中为人所知的名字。在本章中，我们使用当前的名字——Cordova。\n\nCordova 是一个解决多个任务的工具。\n\
  \n- 它简化了“网页到原生”的包装过程。\n- 它提供了对原生资源的访问：通讯录、相机等。\n\n\n# 第 15 章：构建原生应用程序\n\n它为第三方插件提供了一个平台，这是通过自定义功能扩展核心功能的标准方式。\n\
  \n`Cordova` 并非只针对 Android 的项目；它也为 iOS、Symbian、Blackberry 及其他多个平台提供了类似的工具集。该项目的最终目标是让开发者能够将现有的\
  \ HTML5 应用以原生应用的形式移植到不同的移动平台，通过应用商店进行分发，并访问设备特定的 API。这恰恰是我们所需要的。\n\n让我们从安装 `Cordova`\
  \ 及其依赖项开始。\n\n#### 设置 Cordova\n\n`Cordova` 没有特殊的安装步骤——从官网 ([`phonegap.com`](http://phonegap.com))\
  \ 下载归档文件，然后解压出其中名为 `lib/android` 的文件夹。无需设置任何环境变量之类的东西；只需记住解压的位置即可。\n\n#### 设置 Apache\
  \ Ant\n\nApache [Ant (http://ant.apache.org)](http://ant.apache.org) 是一个自动化构建系统，也是一种用于复杂构建脚本的基于\
  \ XML 的语言。为了使用 Apache `Cordova` 并创建原生应用，我们首先需要安装 `Ant`。\n\n**注意：** 如果你使用的是 Mac，可能已经安装了\
  \ `Ant`。打开命令行并输入 `ant –version`。如果能看到版本号（比如 `1.8.2`），那么 `Ant` 就已经准备好可以工作了；否则，请按照下面的描述进行安装。\n\
  \n从官网 [`ant.apache.org/bindownload.cgi`](http://ant.apache.org/bindownload.cgi)\
  \ 下载最新版本的 `Ant` 发行版，并将归档文件的内容解压到你选择的文件夹中。创建环境变量 `ANT_HOME`，并将其指向你刚刚解压的文件夹。修改 `PATH`\
  \ 变量，将 `ANT_HOME\\bin` 添加到路径中，这样命令行就能访问到可执行文件了。\n\n输入：\n```\nant –version\n```\n\
  \n你应该会看到包含构建信息（版本和日期）的输出：\n```\nApache Ant(TM) version 1.8.2 compiled on December\
  \ 20 2010\n```\n\n如果看到类似内容，说明 `Ant` 已成功安装在系统上。\n\n### 构建原生应用\n\n此时，我们需要创建一个真正的原生\
  \ Android 项目。尽管我们需要编辑几个 Java 文件，但我们并不会进行大量的 Java 编程。如前所述，Android 开发的细节不在本书的讨论范围之内。不过，如果你对我稍加信任，并跟着做下去，你就会对自己能做什么有一个清晰的认识。如果你更喜欢深入研究，可以随时查看官方的原生\
  \ Android 开发 Hello World 教程 ([`developer.android.com/resources/tutorials/hello-world.html`](http://developer.android.com/resources/tutorials/hello-world.html))。\n\
  \n#### 创建空白的 Android 项目\n\n第一步是创建一个空白的 Android 项目，并尝试在设备上启动它。导航到你想放置项目的文件夹，然后执行以下命令来显示可能的目标列表。目标就是你构建应用程序所基于的平台。\n\
  \n```\nandroid list targets\n```\n\n可用的 Android 目标：\n```\nid: 1 or \"android-8\"\
  \nName: Android 2.2\nType: Platform\nAPI level: 8\nRevision: 3\nSkins: HVGA, QVGA,\
  \ WQVGA400, WQVGA432, WVGA800 (default), WVGA854\nABIs : armeabi\n\nid: 2 or \"\
  android-10\"\nName: Android 2.3.3\nType: Platform\nAPI level: 10\nRevision: 2\n\
  Skins: HVGA, QVGA, WQVGA400, WQVGA432, WVGA800 (default), WVGA854\nABIs : armeabi\n\
  …\n```\n\n确定你计划支持的最低 Android 版本。我们将制作一个适用于 Android 2.2 及以上版本的应用。在我的电脑上，对应目标的 id\
  \ 是 `1`。查看前面的输出：加粗的行显示了在哪里可以找到 Android 版本及其 id。有了版本 id 后，在控制台中再执行一条命令：\n\n```\n\
  android create project --package com.juriy.fourballs --activity FourBalls --target\
  \ 1 --path fourballsnative\n```\n\n这条命令会创建一个新的、空白的 Android 项目，可供编译。\n\n\n\n## 排版后的内容\n\
  \n在设备上进行打包和测试。我们来仔细看看这些参数；一旦你开始准备生产环境，它们就变得非常重要。\n\n- `--package` 是你的应用程序的“命名空间”。Java\
  \ 开发者有一种惯例，即按照一定的规范部署他们的库，以便名称相同的类不会相互冲突。如果你有一个名为 `Sprite` 的类，而项目中的另一个库也有一个同名类，只要它们的包不同，这两个类就能正常工作。包是一个由点分隔的单词列表；不过，通常的做法是拿你拥有的域名并倒序书写。例如，我拥有域名\
  \ `juriy.com`；我可以使用包 `com.juriy`、`com.juriy.whatever`，甚至更长的 `com.juriy.game.client.utilites`。你需要为项目选择一个包名。\n\
  \n- `--activity` 是主类的名称。选择任何你觉得合适的名字即可。`FourBalls`、`Main` 或其他任何名字都可以。\n\n- `--target`\
  \ 是平台的版本 ID，如前所述。\n\n- `--path` 是你存放文件的文件夹。由于没有名为 `fourballsnative` 的文件夹，系统为我创建了一个。\n\
  \n项目创建完成后，你会看到有不少新的文件和文件夹。请看图 15-1。你会看到一个类似的结构。如果你没有 Android 开发经验，不要试图去理解这些文件是做什么的。知道这是\
  \ Android 项目的典型结构就足够了。\n\n![图 15-1](img/index-573_1.jpg)\n![图 15-2](img/index-573_2.jpg)\n\
  \n**图 15-1.** *Android 项目的典型结构*\n\n现在你已经构建了一个空项目。它还没有包含 Cordova，但已经可以在设备或模拟器上进行编译和测试。\n\
  \n#### 测试空的 Android 项目\n\n在开始添加 Cordova 库之前，我们先确保创建的项目确实能工作。启动模拟器或通过 USB 线连接设备。确保调试模式已开启（如果你不知道如何启用调试模式，请参考附录\
  \ A）。确保你在项目文件夹的根目录下。执行以下命令：\n\n```\nant clean debug install\n```\n\n`Ant` 使用一个名为\
  \ `build.xml` 的构建脚本来创建应用的调试版本。它会使用调试密钥对应用进行签名（每个 Android 应用都必须使用密钥签名——更多内容将在后面介绍），并将其安装到当前正在运行的模拟器或连接的设备上。如果它既没有找到模拟器也没有找到设备，构建将会失败。如果你操作正确，你应该能在已安装的应用列表中看到新创建的应用，并且能够运行它。这个应用看起来相当单调——一个黑色的屏幕上显示着灰色的“Hello\
  \ World, `FourBalls`”文本，如图 15-2 所示。\n\n**图 15-2.** *空的 Hello World Android 项目*\n\
  \n**注意：** 当你执行“install”命令时，需要确保设备或模拟器正在运行。如果两者都没有运行，构建脚本将会失败。如果即使模拟器已打开，脚本仍然失败，请依次执行以下两个命令：\n\
  \n```\nadb kill-server\nadb start-server\n```\n\n#### 基本的 Cordova 项目\n\n现在我们需要完成构建“封装的原生应用”的主要工作。那就是将\
  \ Cordova 库添加到空项目中，修改 Java 文件，并将 Web 资源（HTML、脚本、CSS 等）放到正确的位置。本章的这一部分包含了许多“黑魔法”步骤。我鼓励你深入研究原生\
  \ Android 应用开发，以便更好地理解这个过程。\n\n##### 为 Cordova 开发准备项目\n\n首先，我们需要复制几个文件，并提供一定的文件夹结构，以便为我们的应用添加\
  \ Cordova 支持。请按照以下步骤操作：\n\n1.  在你解压 Cordova 的文件夹中的 `/lib/android` 目录下找到 `cordova-2.0.0.jar`（当然，版本号可能不同）。\n\
  2.  将其复制到你项目的 `libs` 文件夹中。\n3.  创建一个新文件夹 `assets`，并在其中创建另一个文件夹 `www`。\n\n\n\n```markdown\n\
  将`/path/to/xxx`用作 Web 应用文件的根目录：HTML 文件、JavaScript 文件等。\n\n4. 在第一步中与 jar 文件相同的位置找到`cordova-2.0.0.js`文件，并将其复制到新创建的`www`文件夹中。\n\
  5. 创建一个`index.html`文件——一个包含一些文本的纯 HTML 文件。稍后我们将用它来测试一切是否正常工作。我使用了清单 15-1 中的虚拟内容。\n\
  6. 将 Cordova 发行版中的`xml`文件夹复制到项目的`res`文件夹中。\n\n**清单 15-1.** *用于测试 Cordova 项目是否正常工作的虚拟\
  \ HTML*\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"\
  utf-8\" />\n<meta name=\"viewport\"\ncontent=\"width=device-width, initial-scale=1.0,\
  \ maximum-scale=1.0,\nuser-scalable=no, target-densitydpi=device-dpi\"/>\n<style>\n\
  html, body {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\npadding:0;\n\
  border: 0;\n}\n#main {\nfont-size: 20px;\n}\n</style>\n</head>\n<body>\n<div id=\"\
