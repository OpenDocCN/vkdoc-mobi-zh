  \n本书中，我们经常会从代码清单中删除注释，因为代码通常会在正文中直接讨论。但各章节的源代码则包含了更详尽的注释。\n\n**渲染棋盘**\n\n回到 `BoardRenderer`，下面三个函数是第\
  \ 2 章中代码的精炼版本：`_drawBackground()`、`_drawGrid()` 和 `drawToken()`（参见清单 3-12）。每个函数绘制用户界面（UI）的一个元素：带有曲线的渐变背景、网格或棋子。\n\
  \n**清单 3-12.** *渲染棋盘用户界面的函数：给定单元格中的背景、网格和棋子*\n\n```\n_p._drawBackground = function()\
  \ {\n    var ctx = this._ctx;\n    // 背景\n    var gradient = ctx.createLinearGradient(0,\
  \ 0, 0, this._height);\n    gradient.addColorStop(0, \"#fffbb3\");\n    gradient.addColorStop(1,\
  \ \"#f6f6b2\");\n    ctx.fillStyle = gradient;\n    ctx.fillRect(0, 0, this._width,\
  \ this._height);\n    // 绘制曲线\n    var co = this._width/6; // 曲线偏移量\n    ctx.strokeStyle\
  \ = \"#dad7ac\";\n    ctx.fillStyle = \"#f6f6b2\";\n    // 第一条曲线\n    ctx.beginPath();\n\
  \    ctx.moveTo(co, this._height);\n    ctx.bezierCurveTo(this._width + co*3, -co,\n\
  \        -co*3, -co, this._width - co, this._height);\n    ctx.fill();\n    // 第二条曲线\n\
  \    ctx.beginPath();\n    ctx.moveTo(co, 0);\n    ctx.bezierCurveTo(this._width\
  \ + co*3, this._height + co,\n        -co*3, this._height + co, this._width - co,\
  \ 0);\n    ctx.fill();\n};\n\n_p._drawGrid = function() {\n    var ctx = this._ctx;\n\
  \    ctx.beginPath();\n    // 绘制水平线\n    for (var i = 0; i <= this._cols; i++) {\n\
  \        ctx.moveTo(i*this._cellSize + 0.5, 0.5);\n        ctx.lineTo(i*this._cellSize\
  \ + 0.5, this._height + 0.5)\n    }\n    // 绘制垂直线\n    for (var j = 0; j <= this._rows;\
  \ j++) {\n        ctx.moveTo(0.5, j*this._cellSize + 0.5);\n        ctx.lineTo(this._width\
  \ + 0.5, j*this._cellSize + 0.5);\n    }\n    // 描边以在屏幕上显示\n    ctx.strokeStyle\
  \ = \"#CCC\";\n    ctx.stroke();\n};\n\n_p.drawToken = function(cellX, cellY) {\n\
  \    var ctx = this._ctx;\n    var cellSize = this._cellSize;\n    var tokenType\
  \ = this._model.getPiece(cellX, cellY);\n    // 单元格为空\n    if (!tokenType)\n   \
  \     return;\n```\n\n\n```javascript\nvar colorCode = \"black\";\n\nswitch(tokenType)\
  \ {\n\ncase BoardModel.RED:\n\ncolorCode = \"red\";\n\nbreak;\n\ncase BoardModel.GREEN:\n\
  \ncolorCode = \"green\";\n\nbreak;\n\n}\n```\n\n## 第三章：创建首个游戏\n\n```javascript\n\
  // 棋子的中心\nvar x = this._x + (cellX + 0.5)*cellSize;\nvar y = this._y + (cellY +\
  \ 0.5)*cellSize;\nctx.save();\nctx.translate(x, y);\n\n// 棋子半径\nvar radius = cellSize*0.4;\n\
  \n// 渐变中心点\nvar gradientX = cellSize*0.1;\nvar gradientY = -cellSize*0.1;\n\nvar\
  \ gradient = ctx.createRadialGradient(\n    gradientX, gradientY, cellSize*0.1,\
  \ // 内圆（高光）\n    gradientX, gradientY, radius*1.2); // 外圆\n\ngradient.addColorStop(0,\
  \ \"yellow\"); // “光源”的颜色\ngradient.addColorStop(1, colorCode); // 棋子的颜色\n\nctx.fillStyle\
  \ = gradient;\nctx.beginPath();\nctx.arc(0, 0, radius, 0, 2*Math.PI, true);\nctx.fill();\n\
  ctx.restore();\n```\n\n**注意：** `BoardRenderer` 的函数依赖 `BoardModel` 来获取单元格中棋子的颜色。我们将在下一节创建这个类，因此你现在还无法直接运行代码。如果你仍然急于尝试其效果，可以先对值进行硬编码，测试渲染效果，待\
  \ `BoardModel` 准备就绪后再切换回来。\n\n我们需要创建的最后一个函数是 `repaint`（见清单 3-13）。它按步骤渲染整个棋盘：先绘制背景，再绘制网格，最后绘制棋子。\n\
  \n**清单 3-13.** *Repaint 函数从头开始渲染整个棋盘*\n\n```javascript\n_p.repaint = function()\
  \ {\n    this._ctx.save();\n    this._ctx.translate(this._x, this._y);\n    this._drawBackground();\n\
  \    this._drawGrid();\n    this._ctx.restore();\n\n    for (var i = 0; i < this._cols;\
  \ i++) {\n        for (var j = 0; j < this._rows; j++) {\n            this.drawToken(i,\
  \ j);\n        }\n    }\n};\n```\n\n`BoardRenderer` 现已就绪。让我们再次回顾类的结构。它有两个用于绘制的公开方法：`repaint()`\
  \ 和 `drawToken()`。第一个方法用于重新渲染整个棋盘，例如当屏幕方向发生改变时。第二个方法用于在用户执行一次有效操作后绘制单个棋子。当然，我们也可以每次都重新渲染整个棋盘，但这会造成资源浪费（虽然不太明显，但我们希望把事情做到位）。\n\
  \n`BoardRenderer` 不会自行决定棋盘的优化尺寸。这个任务留给了其他类，因为 `BoardRenderer` 对其运行环境（屏幕尺寸、画布大小或像素密度）一无所知。这个类的职责是绘制——并且只负责绘制。\n\
  \n**注意：** 只执行小任务的细粒度类是 API 设计良好的标志。这个原则被称为“单一职责”。它是面向对象编程五大基本原则之一。如果你有兴趣了解其他四个原则，可以从维基百科的相关条目开始查阅：[`en.wikipedia.org/wiki/SOLID_(object-oriented_design)`](http://en.wikipedia.org/wiki/SOLID_(object-oriented_design))。\n\
  \n本章的源代码中包含该类的最终版本。文件名为 `BoardRenderer.js`。\n\n### 游戏状态与逻辑\n\n我们已经有了一个能渲染棋盘当前状态的类，但缺少一个负责持有该状态的类。让我们来创建一个！像往常一样开始：在项目的\
  \ `js` 文件夹中创建一个名为 `BoardModel.js` 的新文件，并在 `index.html` 中添加额外的 `<script>` 标签来加载它。现在你可以编写这个类的代码了。\n\
  \n让我们从构造函数开始，如清单 3-14 所示。\n\n**清单 3-14.** *BoardModel 构造函数*\n\n```javascript\nfunction\
  \ BoardModel(cols, rows) {\n    this._cols = cols || 7;\n    this._rows = rows ||\
