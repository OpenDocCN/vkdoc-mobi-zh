  \n### 优化渲染性能\n\n当前版本的 `MapRenderer` 能够正确显示平铺地图；然而，它\n\n\n\n## 第 6 章：渲染虚拟世界\n\n...但这种方式远非最佳。在本节中，我们将尝试提升渲染性能。首先从减少每帧绘制的瓦片数量开始。\n\
  \n#### 只绘制所需内容\n\n我们的第一个问题：每次都会绘制整个世界，尽管玩家只需要其中一小部分。与其绘制整个瓦片阵列，不如只绘制可见的部分。图 6-7\
  \ 展示了这一思路。\n\n![图 6-7](img/index-234_1.jpg)\n\n**图 6-7.** 仅绘制当前视口中可见的瓦片。被划掉的瓦片是我们将绘制的区域。\n\
  \n`MapRenderer` 需要知道视口的大小才能确定哪些瓦片是可见的。然后，我们可以使用以下简单公式计算最左侧和最右侧可见瓦片的坐标：\n\n```javascript\n\
  var startX = Math.floor(-this._x / this._tileSize);\n```\n\n表达式 `-this._x / this._tileSize`\
  \ 给出了视口左侧的瓦片数量。由于这个数字可能是小数，我们对其应用 `Math.floor()` 来获取整数索引，从而得到用户看到的最左侧瓦片的 `x` 坐标。类似公式可用于获取最右侧坐标：\n\
  \n```javascript\nvar endX = Math.floor((this._viewportWidth - this._x) / this._tileSize);\n\
  ```\n\n当用户滚动超过地图边界时，`startX` 和 `endX` 可能超出世界数组的范围。因此，我们需要检查边界并在必要时裁剪值。\n\n```javascript\n\
  startX = Math.max(startX, 0);\nendX = Math.min(endX, this._mapData[0].length - 1);\n\
  ```\n\n使用相同的公式获取可见瓦片的最顶部和最底部 `y` 坐标。一旦你获得全部四个值—— `startX`、`endX`、`startY` 和 `endY`\
  \ ——就能确切知道用户通过当前视口看到的内容，从而可以省略任何无用的瓦片。让我们如清单 6-7 所示实现这一改动。\n\n**清单 6-7.** 仅绘制可见瓦片\n\
  \n```javascript\nfunction MapRenderer(mapData, image, tileSize, viewportWidth, viewportHeight)\
  \ {\n    ...\n    this.setViewportSize(viewportWidth, viewportHeight);\n}\n\n_p.setViewportSize\
  \ = function(width, height) {\n    this._viewportWidth = width;\n    this._viewportHeight\
  \ = height;\n};\n\n_p.draw = function(ctx) {\n   // 不再绘制地图的每个瓦片，而是检查哪些\n   // 是实际可见的\n\
  \n   // 最左侧可见瓦片的 x 坐标\n   var startX = Math.floor(-this._x / this._tileSize);\n\
  \   startX = Math.max(startX, 0);\n\n   // 最右侧可见瓦片的 x 坐标\n   var endX = Math.floor((this._viewportWidth\
  \ - this._x) / this._tileSize);\n   endX = Math.min(endX, this._mapData[0].length\
  \ - 1);\n\n   // 最顶部可见瓦片的 y 坐标\n   var startY = Math.floor(-this._y / this._tileSize);\n\
  \   startY = Math.max(startY, 0);\n\n   // 最底部可见瓦片的 y 坐标\n   var endY = Math.floor((this._viewportHeight\
  \ - this._y) / this._tileSize);\n   endY = Math.min(endY, this._mapData.length -\
  \ 1);\n\n   // 仅绘制可见瓦片\n   for (var cellY = startY; cellY <= endY; cellY++) {\n\
  \        for (var cellX = startX; cellX <= endX; cellX++) {\n            var tileIndex\
  \ = this._mapData[cellY][cellX];\n            ...\n            ...\n        }\n\
  \   }\n};\n```\n\n你应注意画布可能随时改变大小。用户倾向于晃动和翻转智能手机和平板电脑，导致屏幕方向变化，因此画布渲染器应能感知此类变化。更新画布大小的代码也应同时更新视口大小，以便\
  \ `MapRenderer` 能使用新值计算可见瓦片。清单 6-8 展示了如何更新 `index.html` 文件以保持 `MapRenderer` 与画布大小一致。\n\
  \n**清单 6-8.** 每次更新画布大小时同步更新视口大小\n\n```javascript\nfunction resizeCanvas(canvas)\
  \ {\n    canvas.width = document.width || document.body.clientWidth;\n    canvas.height\
