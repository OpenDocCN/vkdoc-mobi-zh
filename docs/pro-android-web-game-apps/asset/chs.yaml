  \ 0, canvas.width, canvas.height);\n    var timeSinceFrameStart = now - currentFrameStart;\n\
  \    if (timeSinceFrameStart > timePerFrame) {\n        currentFrame = ++currentFrame%5;\n\
  \        console.log(currentFrame);\n        currentFrameStart = now;\n    }\n \
  \   spriteSheet.drawFrame(ctx, currentFrame, 10, 40);\n    requestAnimationFrame(arguments.callee);\n\
  }\nanimate(0);\n```\n\n如果你尝试运行此脚本，会发现在桌面浏览器和 Android 浏览器上的结果大致相同。\n\n**注意：** `requestAnimationFrame()`\
  \ 应将时间戳参数传递给监听函数，但由于我们使用了前一节中描述的小技巧，任何不支持新定时器的浏览器都会回退到 `setTimeout()`。在这种情况下，我们需要自己计算当前时间（幸运的是，这并非重量级操作）。这就是额外那行代码的由来：\n\
  \n```javascript\nvar now = t || new Date().getTime();\n```\n\n然而，这种方法也有其缺点。请看图 4-10\
  \ 和图 4-11，它们展示了动画流程。我们先看图 4-10，它展示了理想情况。在完美世界中，定时器恰好在我们需要的时刻触发——每隔 50 毫秒——从而提供非常可预测的帧间间隔。\n\
