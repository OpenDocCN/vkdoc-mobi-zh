  \n#### 全局命名空间和 Node 模块\n\nNode.js 拥有一个非常活跃的开发者社区，他们为它创建扩展和工具。如果没有对贡献者 API 的结构化和沙盒化的良好支持，这样的生态系统就无法存在。想象一下，当两个程序员（我们称他们为\
  \ John 和 Frank）正在开发他们的框架时。John 定义了一个名为`count`的全局变量，他用它来保存从服务器加载的图像文件数量。Frank 对 John\
  \ 的代码一无所知，他创建了自己的同名变量，但他用它来跟踪 `mousedown` 事件的数量。假设你想要同时使用这两个框架。如果这些变量冲突了怎么办？显然，如果我们不特别小心，我们将面临一个需要清理的大烂摊子。很可能，其中一个框架会出错，或者两者都会出错。\n\
  \n在研究 Node 如何解决这个问题之前，让我们先尝试思考一下解决方案。在本书的前面部分，我们将程序的功能分解为类，并将每个类放入一个单独的文件中。这种方法对于应用程序来说效果很好，但在涉及可分发的\
  \ API 时就失效了。所有问题的根本原因是 JavaScript 的全局作用域，它对所有文件都是相同的。任何对全局作用域的粗心使用都会引入错误。\n\n但是，如果我们承诺非常小心，并且完全不依赖全局作用域呢？我们将不会创建或读取全局变量，只在类和方法中定义它们。这会有帮助吗？这当然会让情况稍好一些，但不会解决根本问题，因为类的构造函数是一个全局变量。\n\
  \n\n```markdown\n\n`variable`本身，以及同名的类会发生冲突。\n\n看一下清单 10-5 中的代码。它模拟了两个庞大且有用的框架的加载过程：一个处理数学运算，另一个处理字符串。两个框架都有一个名为`Utils`的类。猜猜会发生什么？\n\
  \n**清单 10-5.** *一段完全有效的 JavaScript 代码，却导致了意想不到的行为*\n\n```javascript\n<script>\n\n\
  // The class defined in Mathematics API\n\nfunction Utils() {\n\n}\n\nUtils.prototype.add\
  \ = function(x, y) {\n\nreturn x + y;\n\n};\n\n</script>\n\n<script>\n\n// The class\
  \ defined in Strings API\n\nfunction Utils() {\n\n}\n\nUtils.prototype.add = function(x,\
  \ y) {\n\nreturn x + \"\" + y;\n\n};\n\n</script>\n\n<script>\n\n// Now we want\
  \ to add two numbers... easy, right?\n\nconsole.log(new Utils().add(2, 3));\n\n\
  </script>\n```\n\n从 Wow! eBook <www.wowebook.com> 下载\n\n结果显然是`23`，因为字符串 API 覆盖了全局变量`Utils`（该变量保存了类的构造函数）。现在`add`方法只对字符串能正确工作。解决这个问题的常用方法是使用包——一种对\
  \ API 而言唯一的特殊命名空间。例如，如果每个开发者都使用自己网页的名称来标识其作品，那么避免冲突就会容易得多。清单 10-6 展示了一个通常做法的示例。\n\
  \n**清单 10-6.** *通过创建命名空间解决命名问题*\n\n```javascript\n<script>\n\n// The class defined\
  \ in Mathematics API\n\nif (typeof com == \"undefined\") {com = {};}\n\nif (!com.juriy)\
  \ {com.juriy = {};}\n\nif (!com.juriy.math) {com.juriy.math = {};}\n\ncom.juriy.math.Utils\
  \ = function () {\n\n};\n\ncom.juriy.math.Utils.prototype.add = function(x, y) {\n\
  \nreturn x + y;\n\n};\n\n</script>\n\n<script>\n\n// The class defined in Strings\
  \ API\n\nif (typeof com == \"undefined\") {com = {};}\n\nif (!com.juriy) {com.juriy\
  \ = {};}\n\nif (!com.juriy.strings) {com.juriy.strings = {};}\n\ncom.juriy.strings.Utils\
  \ = function() {\n\n};\n\ncom.juriy.strings.Utils.prototype.add = function(x, y)\
  \ {\n\nreturn x + \"\" + y;\n\n};\n\n</script>\n\n<script>\n\n// Now we want to\
  \ add two numbers... easy, right?\n\nconsole.log(new com.juriy.math.Utils().add(2,\
  \ 3));\n\n</script>\n```\n\n我的网站是 <http://juriy.com>。如果一切顺利，我打算在未来 60 年内保持它——足够长的时间来将其用作我\
  \ API 的唯一标识符。最后一个示例没有第一个版本代码的问题——它显示了正确的结果。当然，代码不那么简洁，但我们总是可以通过一些便利函数来清理它。尽管如此，这种方法仍然存在一个问题。\n\
  \n如果我支持 API 的多个版本，并决定推出一个不向后兼容的新主版本呢？我引入了一个真正的问题，因为有些框架依赖我的旧 API，有些框架依赖新 API——而你在同一个应用程序中不能同时使用它们，因为它们使用了相同的命名空间：`com.juriy.math`！\n\
  \n**注意：** 这听起来可能像一个人为的问题，但在现实世界中，尤其是在高端企业环境中的软件和组件方面，这并不少见。那里的组件可能多年都不会更新，因为旧库经过充分测试，已知\
  \ Bug 且有变通方法。更新任何东西的动机都非常小。俗话说：“如果没坏，就别修它。”\n\n许多平台干脆忽略了最后一个问题。例如，Java 没有一种好的开箱即用方式来支持同一个库的多个版本。Java\
  \ 中的库以`jar`文件形式分发，Java 程序员有一个专门的术语来描述他们遇到这个问题时的情况：`Jar Hell`。正如你可能猜到的，这是最难处理的问题之一。别担心，Node.js\
  \ 在模块方面非常智能：它不会让你失望。\n\n问题的根本原因是一样的：全局命名空间。我们刚刚引入的命名空间是保存在全局作用域中的普通对象。解决这个严重问题的方法简单得令人惊讶：不要使用全局作用域。\n\
  \n```\n\n\n##### 定义 API 的作用域\n\n使用 JavaScript 闭包，只需几行代码即可实现 API 的作用域隔离。清单 10-7 展示了如何将两个\
  \ API 彼此隔离。\n\n**清单 10-7.** *将 API 与全局作用域隔离*\n\n```html\n<script>\n// The class\
  \ defined in old String API\nvar oldApi = (function () {\n    function Utils() {\n\
  \    }\n    Utils.prototype.add = function(x, y) {\n        return x + \"\" + y;\n\
  \    };\n    return Utils;\n})();\n\n// The class defined in new String API\nvar\
  \ newApi = (function () {\n    function Utils() {\n    }\n    Utils.prototype.add\
  \ = function(x, y) {\n        return x + \"!THIS IS COOL TO JOIN STRINGS!\" + y;\n\
  \    };\n    return Utils;\n})();\n\nconsole.log(new oldApi().add(\"foo\", \"bar\"\
  ));\nconsole.log(new newApi().add(\"foo\", \"bar\"));\n</script>\n```\n\n如你所见，旧\
  \ API 和新 API 都定义了同名对象——`Utils`——但它们不会冲突，因为通过包装器与全局作用域隔离。在 JavaScript 中，新函数会创建一个新作用域——你可以在其中定义任何新变量，而不必担心覆盖已定义的内容。\n\
  \n这种方法与 Node 的做法非常相似。当你调用`var foobarApi = require('foobar')`时，Node 会查找名为`foobar.js`的文件，在独立作用域中执行文件内容，并返回该文件决定与外部世界共享的任何内容。\n\
  \n示例中的`foobar`被称为模块。模块是可重用的 API，你可以在应用程序中使用它。如前所述，每个主流平台都有类似的可重用组件概念——有些称为库，有些称为扩展，还有些称为插件。Node\
  \ 将它们称为模块。\n\n每个平台都使用自己的规则来打包和分发此类组件，以及查找规则——当需要时到哪里去找它们。Node.js 当然也有自己的规则，我们将在编写第一个\
  \ Node.js 模块后立即探讨这些规则！\n\n#### 编写第一个模块\n\n为 Node 编写模块并不困难。实际上，它与为浏览器编写普通脚本没有太大区别，但有两大不同：你无需担心全局作用域，并且必须明确声明要与外部世界共享哪些变量或构造函数。\n\
  \n创建一个名为`animal.js`的新文件，并将清单 10-8 中的代码复制到新文件中。\n\n**清单 10-8.** *创建自己的模块*\n\n```javascript\n\
  function Animal() {\n    console.log(\"New animal is born\");\n}\n\nvar _p = Animal.prototype;\n\
  \n_p.sayHello = function() {\n    console.log(\"Hello, I'm a humble animal\");\n\
  };\n\nfunction makeNewAnimal() {\n    return new Animal();\n}\n\nexports.Animal\
  \ = Animal;\n```\n\n你不需要显式地将模块包装到函数调用中，因为 Node 会为你进行作用域隔离。`exports`是每个模块都可用的“伪全局”变量。通过将属性赋值给`exports`，你可以将它们与系统的其他部分共享。如你所见，我们只导出了构造函数。函数`makeNewAnimal`未被导出，因此它对该模块保持私有。\n\
  \n我们可以访问新创建的模块，如清单 10-9 所示。\n\n**清单 10-9.** *访问模块*\n\n```javascript\nvar animalApi\
  \ = require(\"./animal\");\nvar animal = new animalApi.Animal(); // Creates the\
  \ new instance of animal\nconsole.log(typeof animalApi.makeNewAnimal); // Undefined,\
  \ method is not visible\nanimal.sayHello(); // Prints greeting\n```\n\n`require`函数从当前文件夹加载`animal.js`文件，执行其中的代码，并返回包含所有“已导出”字段的对象。完成后，你可以访问你导出的任何内容——调用函数、从构造函数创建对象等。第三行显示，定义在模块内部但未导出的函数仍然不可访问。\n\
  \n语法有点不寻常。有些人更倾向于导出函数本身，而不是包含函数作为值之一的对象。那样语法会更清晰一些：\n\n```javascript\nvar Animal\
  \ = require(\"./animal\");\nvar hamster = new Animal();\n```\n\n\n\n为此，你必须使用 `module.exports`，它指向模块外部实际可访问的对象。列表\
  \ 10-10 展示了一种常见模式，即当你的模块只需要导出一个变量时（通常该变量是构造函数）。\n\n**列表 10-10.** 导出单个变量\n\n```\n\
  // 仅导出构造函数\nexports = module.exports = Animal;\n\nfunction Animal() {\n  console.log(\"\
  新动物出生了\");\n}\n// 其余代码写在这里\n```\n\n一个模块可以包含任意数量的类、函数和变量，但一个文件只能包含一个模块。另一个重要点是继承。它的工作方式与浏览器中的继承完全相同。为了进行“干净”的实验，创建另一个名为\
  \ `hamster.js` 的文件，并将其保存在 `animal.js` 旁边。将列表 10-11 中的代码复制到新文件中。\n\n**列表 10-11.**\
  \ Node 模块中的继承\n\n```\nvar Animal = require(\"./animal\");\nvar util = require(\"\
  util\");\n\nfunction Hamster() {\n  Animal.call(this);\n  console.log(\"这是仓鼠\");\n\
  }\n\nutil.inherits(Hamster, Animal);\nvar _p = Hamster.prototype;\n\n_p.sayHello\
  \ = function() {\n  console.log(\"(咀嚼胡萝卜)\");\n};\n\nexports = module.exports =\
  \ Hamster;\n```\n\n在第二行，我们加载了 Node 的一个核心模块——`util`。尽管附近没有 `util.js` 文件，它仍然能被正确加载。这个模块被直接编译到\
  \ Node 的二进制文件中，不需要任何额外的文件。\n\n现在让我们回到继承问题。第一部分看起来与我们的浏览器代码完全相同。我们像往常一样调用父构造函数。第二部分，调用\
  \ `util` 模块的 `inherits()` 函数，与我们的实现（称为 `extend()`）非常相似。\n\n更新主脚本，使用 `Hamster` 替代\
  \ `Animal`，并检查输出。示例代码如列表 10-12 所示。请注意，我们只导入实际使用的模块，而不是其依赖项。\n\n**列表 10-12.** 更新后的主脚本\n\
  \n```\nvar Hamster = require(\"./hamster\");\n\nvar animal = new Hamster();\nanimal.sayHello();\n\
  ```\n\n以下是输出结果：\n\n```\nC:\\apps\\node\\node.exe C:/apps/projects/jsbook/chap10/02.writing_modules/main.js\n\
  新动物出生了\n这是仓鼠\n(咀嚼胡萝卜)\n```\n\n就是这样。现在仓鼠是动物的快乐后代。请注意，主脚本不再需要加载 `animal` 模块。从 `hamster`\
  \ 中调用它就足够了。当你创建 Node.js 脚本时，你只需要那些实际需要的模块。所有依赖模块都会自动加载。\n\n本节展示如何组织自己的模块的完整代码示例可以在\
  \ `02.writing_modules` 文件夹中找到。\n\n**注意：** Node.js 模块背后的架构是 [CommonJS (www.commonjs.org)\
  \ 规范](http://www.commonjs.org) 的实现。CommonJS 的目标是为如何编写 JavaScript 模块创建一套通用规则。理论上，遵循预定义模式的模块应该能在不同环境中正常运行：Rhino、Node、浏览器等。然而，在实践中，服务器端\
  \ JavaScript 与浏览器 JavaScript 差异很大，这使得 CommonJS 在浏览器环境中的实用性降低。\n\n这些权衡在 RequireJS（用于浏览器的\
  \ CommonJS 风格模块）的创建者 James Burke 的一篇精彩文章中有详细描述，文章地址为 [`tagneto.blogspot.com/2010/03/commonjs-module-trade-offs.html`](http://tagneto.blogspot.com/2010/03/commonjs-module-trade-offs.html)。基本上，CommonJS\
  \ 与浏览器环境配合得并不好，这就是为什么我们没有从本书开头就直接使用它的原因。\n\n#### 发现模块\n\n在 Node.js 中，有两种主要方式引用模块，我们都已见过。第一种是指定模块文件的路径，可以是绝对路径，也可以是相对路径。例如，`require(\"\
  ./hamster\")` 通过指定相对路径来加载模块（绝对路径以 `/` 开头，指向文件系统的根目录）。\n\n\n\n第十章：迈向服务器端\n\n`filesystem`)。第二种方式才是真正神奇的地方——当你仅通过模块名称来引用它时，例如\
  \ `require(\"http\")`。\n\n在后一种情况下，Node.js 会在当前模块（或主文件）所在目录下的 `node_modules` 目录中进行查找。Node\
  \ 会按以下顺序查找描述该模块的三个文件之一：\n\n1.  `node_modules/<module-name>.js` 文件\n2.  `node_modules/<module-name>/package.json`\
  \ 文件\n3.  `node_modules/<module-name>/index.js` 文件\n\n`package.json` 是一个 JSON 文件，它必须至少包含一个名为\
  \ `name` 的属性，该属性指向模块的主文件。清单 10-13 展示了一个最简单的 `package.json` 文件示例。\n\n**清单 10-13.**\
  \ *最简单的模块描述文件*\n\n```\n{\n  \"main\": \"hamster\"\n}\n```\n\n主文件可能会依次引用其他模块，并为复杂功能提供接口。在大型模块中，主文件通常不实现特定功能，而是执行一些内务处理任务：例如加载依赖文件、向导出对象添加键等。这种发现机制允许将复杂的模块作为一个文件夹来分发，例如可以从版本控制系统中检出这个文件夹。\n\
  \n如果在当前文件夹中未找到这三个文件中的任何一个，Node 就会进入父文件夹并重复整个过程。如果仍然找不到请求的模块，它就会继续向上查找，直到到达文件系统的根目录。这种方法允许你在文件系统的某个顶层位置设置模块的默认版本，使其对你所有的\
  \ Node 项目都可用。然而，如果某个特定项目需要与默认版本不同的库版本，你可以很容易地在项目自身的 `node_modules` 文件夹中覆盖它。你还可以通过定义\
  \ `NODE_PATH` 环境变量，将任意文件夹添加到搜索过程中。\n\n有时你需要知道模块是从哪里被加载的（通常是在某些行为不符合预期时）。在 Node.js\
  \ 中，有一种方法可以做到这一点：\n\n```\n> node\n> require.resolve(\"hamster\");\n'c:\\\\apps\\\
  \\projects\\\\jsbook\\\\chap10\\\\node_modules\\\\hamster\\\\hamster.js'\n```\n\n\
  最后这个清单展示的是所谓的 REPL 模式（读取-求值-输出循环）。如果你启动 Node 时没有指定 `.js` 文件，就可以直接在终端中输入命令。当你懒得创建和保存文本文件时，这是一种快速检查某些内容的方法。\n\
  \n本书的范畴不涵盖构建和分发复杂 Node 模块的内容，但如果你对这个主题感兴趣并且想要深入了解，官方关于模块的文档（http://nodejs.org/api/modules.html）是一个不错的起点。\n\
  \n![index-420_1.jpg](img/index-420_1.jpg)\n\n#### 使用 NPM\n\nNPM 是 Node.js 中的标准包管理器。它不仅仅是一个简单的下载和解压类型的软件，而是一套完整的工具集，允许你安装和管理模块、创建自己的模块、通过关键词在在线注册表中搜索模块，以及做更多事情。NPM\
  \ 本身是一个 Node 应用程序，尽管你像调用普通 Windows 程序一样从命令行调用它。NPM 由 Isaac Z. Schlueter 开发和维护。\n\
  \n与其继续写 NPM 能做什么，不如让我们执行几个命令，看看实际操作是什么样子。关于 Node.js 我们已经学习了足够多的理论；现在我们需要挑选一个合适的框架来构建我们的多人应用。我们希望一个遵循\
  \ REST 风格（https://www.ibm.com/developerworks/webservices/library/ws-restful/）的 Web\
  \ 框架。\n\n让我们问问 NPM 是否知道这样的框架：\n\n```\n> npm search web rest framework\n```\n\n输出是一个漂亮的搜索结果列表，其中关键词会用不同的颜色高亮显示。图\
  \ 10-5 展示了我机器上的输出效果。\n\n**图 10-5.** *NPM 搜索的结果*\n\n现在你可以浏览这些结果，并选择你喜欢的框架。\n\n\n\n\
  当然，你通常会在网上先搜索相关框架，阅读论坛和邮件列表，然后才会选择要使用的工具。在本书中，我选择了`Express`（[`expressjs.com`](http://expressjs.com)）——市场上最流行的框架之一。现在我们来安装它。\n\
  \n> `npm install express`\n\n在几行显示进度的输出后，你会看到`NPM`报告该模块及其所需依赖已安装完毕：\n\n![](img/index-421_1.jpg)\n\
  \n```\nCHAPTER 10: Going Server-Side\nexpress@3.0.0beta7 node_modules\\express\n\
  ├── methods@0.0.1\n├── fresh@0.1.0\n├── range-parser@0.0.4\n├── cookie@0.0.3\n├──\
  \ commander@0.6.1\n├── debug@0.7.0\n├── mkdirp@0.3.3\n├── response-send@0.0.1 (crc@0.2.0)\n\
  ├── send@0.0.3 (mime@1.2.6)\n└── connect@2.3.9 (bytes@0.1.0, cookie@0.0.4, crc@0.2.0,\
  \ qs@0.4.2,\n    formidable@1.0.11)\n```\n\n安装过程需要一点时间——`NPM`需要先下载包及其依赖，然后将其安装到系统中。打开项目文件夹，查看我们执行这两条命令后出现的文件结构。你应该会看到类似图\
  \ 10-6 所示的结构。\n\n**图 10-6.** *安装 Express 后创建的文件夹结构*\n\n如你所见，`NPM`创建了`node_modules`文件夹，其中现在包含`express`文件夹。由于`Express`作为模块依赖其他几个模块，其依赖也位于自身的`node_modules`中。\n\
  \n让我们验证模块是否已安装，并输出每个模块更详细的信息。输出如图 10-7 所示（在我的 Windows 机器上）。\n\n![](img/index-422_1.jpg)\n\
  \n**图 10-7.** *每个已安装模块的详细信息*\n\n现在你不仅可以看到可用包的名称和版本，还能看到简短描述、模块文件夹路径以及模块的来源——指向`Git`仓库的链接。现在我们知道了`Express`是一个“受`Sinatra`启发的\
  \ Web 开发框架”，并且该模块的源代码可以在`git://github.com/visionmedia/express.git`处检出。信息真不少！你还可以使用`list`命令的同义词：`ll`、`ls`和`la`（`ll`和`la`显示“长”版本，`ls`显示短版本）。\n\
  \n如果由于某种原因你忘记了命令的详细信息，请使用：\n\n`npm <command> help`\n\n它会打开浏览器窗口，并从本地文件系统打开文档部分。\n\
  \n关于入门`Node`需要了解的`NPM`知识，这几乎就是全部了。我们现在已经完成了`Node.js`的学习曲线——我们已经准备好编写我们的服务器了。\n\n\
  ## 第 10 章：走向服务端\n\n### 实战：为游戏构建一个服务器\n\n现在我们了解了很多关于`Node.js`的知识：如何编写简单的脚本，如何调试它们，如何安装额外的模块，以及如何编写我们自己的模块。是时候应用我们的知识，构建一个更高级的应用程序了——多人版本的“四球”游戏。我们将从头开始，创建一个简单的纯文本页面，允许两名玩家轮流操作。\n\
  \n本节将介绍如何使用我们刚刚安装的`Express`框架来完成此任务。让我们从学习`Express`开始。为了确保我们从干净的环境开始，请删除文件夹中的所有文件，然后重新安装`Express`。\n\
  \n#### Node 的 Web 开发框架\n\n什么是`Express`（[`expressjs.com`](http://expressjs.com)）？为什么我们会在游戏中使用它？正如我们在上一节中学到的，`Express`是一个“受`Sinatra`启发的\
  \ Web 开发框架”。`Sinatra`是一个用于`Ruby`的 Web 开发框架。\n\n\n\n“web 开发框架”到底是什么？如你所见，`Node` 原生就能处理\
  \ HTTP 流量，那为什么我们还需要安装额外的工具呢？让我们退一步，思考一下构建网站时通常需要执行的常见操作。至少，你需要解析 URL，从中提取 `GET`\
  \ 或 `POST` 参数，然后将调用路由到执行有用操作的脚本。接下来，你需要提供静态数据——图片、CSS、客户端 `JavaScript` 等等。有时你还需要处理用户会话、错误页面（404\
  \ 和 500）以及日志。当然，如果你愿意，可以自己实现所有这些功能，但这只是在重复造轮子。\n\n但是，仅仅为了制作一个简单的“四球游戏”，我们真的需要所有这些功能吗？好吧，你说得对。实际上，我们并不需要。我们或许可以使用一个像\
  \ `Connect`（[`senchalabs.github.com/connect/`](http://senchalabs.github.com/connect/)）这样更小的框架，它只处理\
  \ cookies 和请求路由等基本功能；但一旦你开始为项目添加功能，最终你会面临两个选择：安装 `Express`，或者再次重复造轮子。好消息是，`Express`\
  \ 是构建在 `Connect` 之上的，一旦你学会了如何使用这个“大哥大”，你就能轻松掌握 `Connect`。\n\n第 10 章：走向服务器端\n\n**421**\n\
  \n**注意：** 本章专门讲解服务器端编程，这意味着我们完全不会触及智能手机。一旦你开始考虑 Android，事情会变得稍微复杂一些——你需要实现许多与服务器无关的客户端功能。为了避免同时处理客户端和服务器端带来的混乱，我将这部分内容分成了三章。这意味着，抱歉各位，本章没有花里胡哨的东西；界面功能仅足以测试服务器是否正常工作——仅此而已。但别担心。在接下来的章节中，我们将回到我们熟悉的环境，并制作一个外观酷炫的游戏客户端。\n\
  \n基本输出\n\n和往常一样，起点是 Hello World 应用程序（参见清单 10-14）。在深入研究细节之前，先让一些东西跑起来总是不错的。\n\n**清单\
  \ 10-14.** *使用 Express 的 Hello World*\n\n```\nvar app = require('express').createServer();\n\
  \napp.get('/', function(req, res){\n  res.send('hello world');\n});\n\napp.listen(80);\n\
  ```\n\n安装好 `Express`（如果尚未安装）后，将脚本保存到 `main.js` 文件中，并使用以下命令运行它：\n\n> `node main`\n\
  \n访问 [`localhost`](http://localhost)。你应该能在那里看到我们熟悉的文字。代码的第一行加载了一个名为 `express` 的模块（我们已经安装好了它），然后调用了导出对象的\
  \ `createServer()` 函数。`app` 变量现在持有我们用来设置应用本身的 `Server` 对象。这个示例只添加了一条路由规则：所有对网站根目录的\
  \ `GET` 请求都会输出 `Hello World` 这行文字。最后一行将服务器绑定到 80 端口。请确保你没有运行 `nginx`——在本章中，我们只使用\
  \ `Node` 来提供文件服务。\n\n让我们通过创建一个简单的游戏界面来增加一些实际操作——仅仅是为了验证服务器能正常工作。我们将从第 3 章中加载空的 `BoardModel`，然后通过\
  \ HTML 页面显示它。\n\n第 10 章：走向服务器端\n\n**注意：** 原始 `BoardModel` 的代码可以在第 3 章的资料中找到，文件名为\
  \ `js/BoardModel.js`。\n\n为此，我们首先需要将 `BoardModel` 转换为 `Node` 模块。幸运的是，改动不多。我们修改了其中的继承代码（因为它在\
  \ `Node` 中无效），并将构造函数赋值给了 `exports` 变量。清单 10-15 展示了结果。我删减了旧函数的代码（当我粘贴整个源码时，它有三页长；如果你和我一样，那么你没有耐心阅读三页的代码）。如果你想查看这个类的完整源代码，可以下载本章的代码。\n\
  \n\n\n# 排版后的内容\n\n请参考 `chapter` 或第 3 章。我将保留函数名以提醒你关于 `BoardModel` 的接口。我们新增了一个名为\
  \ `toString()` 的方法，它返回棋盘状态的人类可读字符串表示。\n\n**清单 10-15.** *作为 Node.js 模块的 BoardModel*\n\
  \n```\nfunction BoardModel(cols, rows) {\n\nthis._cols = cols || 7;\n\nthis._rows\
  \ = rows || 6;\n\nthis._data = [];\n\nthis._currentPlayer = BoardModel.RED;\n\n\
  this._totalTokens = 0;\n\nthis.reset();\n\n}\n\nBoardModel.EMPTY = 0;\n\nBoardModel.RED\
  \ = 1;\n\nBoardModel.GREEN = 2;\n\nBoardModel.NONE = 0;\n\nBoardModel.WIN = 1;\n\
  \nBoardModel.DRAW = 2;\n\nBoardModel.ILLEGAL_TURN = 3;\n\n_p = BoardModel.prototype;\n\
  \n_p.reset = function() { … };\n\n_p.getCols = function() { … };\n\n_p.getRows =\
  \ function() { … };\n\n_p.makeTurn = function(column) { … };\n\n_p.getPiece = function(col,\
  \ row) { … };\n\n/**\n * 此处省略了几个私有方法\n */\n\n/**\n * 此方法在最新版本中添加，用于构建\n * BoardModel\
  \ 的简单字符串表示。\n */\n\n_p.toString = function() {\n    var value = \"\";\n    for (var\
  \ row = 0; row < this._rows; row++) {\n        for (var col = 0; col < this._cols;\
  \ col++) {\n            value += \"[\" + this._cellToString(this._data[row][col])\
  \ + \"]\";\n        }\n        value += \"\\n\";\n    }\n    return value;\n};\n\
  \n_p._cellToString = function(value) {\n    switch (value) {\n        case 0:\n\
  \            return \" \";\n        case BoardModel.GREEN:\n            return \"\
  X\";\n        case BoardModel.RED:\n            return \"O\";\n    }\n};\n\nexports\
  \ = module.exports = BoardModel;\n```\n\n现在让我们更新主脚本以显示棋盘，而不是\"Hello World\"。清单 10-16\
  \ 展示了如何实现这一点。\n\n**清单 10-16.** *在网站主页显示棋盘*\n\n```\nvar app = require('express').createServer();\n\
  var BoardModel = require(\"./BoardModel\");\nvar board = new BoardModel();\n\nboard.makeTurn(2);\n\
  board.makeTurn(3);\n\napp.get('/', function(req, res){\n    res.setHeader('Content-Type',\
  \ 'text/plain');\n    res.send(board.toString());\n});\n\napp.listen(80);\n```\n\
  \n现在代码的功能应该非常明显了。唯一不同的是我们在响应中额外发送了一个 `Content-Type` 头。在清单 10-14 中，我们传递的文本是随 `Content-Type:\
  \ text/html`（这是 Express 在未明确指定 `Content-Type` 时使用的默认值）一起发送到浏览器的。如果我们在这里也这样做，浏览器会将棋盘显示为一行方括号。HTML\
  \ 不会将 `\\n` 符号视为新行，这就是为什么我们需要将 `Content-Type` 显式设置为 `text/plain`。我们还放了几枚棋子以确保页面渲染出有意义的内容。图\
  \ 10-8 展示了 Chrome 如何渲染我们刚刚创建的网页。\n\n**图 10-8.** *渲染后的棋盘*\n\n这显然是正确的，但……它看起来一点都不美观。此外，你无法点击任何东西，因为这不是\
  \ HTML，而是纯文本。尽管我们决定在服务器端工作时不在乎美观与否，但我们仍然需要某种方式与棋盘进行交互。\n\n不要急于更新你的代码使其看起来像 HTML。如果你在\
  \ JavaScript 代码内部编写页面标记，这意味着方法从根本上出了问题。UI 应该保存在漂亮的 HTML 文件中，你可以将其交给设计师进行样式设计。想象一下，如果你给他发送几百行\
  \ JavaScript 代码，他会说什么。\n\n**注意：** 项目当前阶段完整的代码可以在 `03.board_model` 文件夹中找到。\n\n####\
  \ 渲染网页\n\n本节的目标是向浏览器输出 HTML 而不是纯文本。虽然调整 `toString()` 函数的代码相当容易，但我们不想这样做。`BoardModel`\
  \ 是代表游戏状态和游戏逻辑的类；渲染 HTML 显然超出了它的职责范围。\n\n我们将从学习如何向客户端浏览器发送静态文件（HTML、CSS 和 JavaScript\
  \ 文件）开始。之后，我们将探索模板——一种将应用程序逻辑与渲染逻辑分离的机制。\n\n\n\n我们无需改动其他部分，即可改变页面的外观。\n\n**提供静态文件**\n\
  \n向用户发送纯 HTML 或 CSS 文件相当简单。你只需要告诉 `Express` 你想要使用“静态中间件”——一个用于提供静态文件的模块——然后将文件放入你指定为静态文件根目录的文件夹中即可。清单\
  \ 10-17 展示了具体做法。一旦你按照清单所示更新代码，`Express` 就会在浏览器请求时提供 `public` 文件夹中的任何文件。\n\n**清单\
  \ 10-17.** *提供静态文件*\n\n```\nvar express = require('express');\nvar BoardModel =\
  \ require(\"./BoardModel\");\nvar app = express.createServer();\napp.use(express.static(__dirname\
  \ + '/public'));\nvar board = new BoardModel();\nboard.makeTurn(2);\nboard.makeTurn(3);\n\
  app.get('/', function(req, res){\n    res.setHeader('Content-Type', 'text/plain');\n\
  \    res.send(board.toString());\n});\napp.listen(80);\n```\n\n`__dirname` 是 `Node`\
  \ 的全局变量之一。它保存着脚本所在目录的路径（注意，这取决于脚本本身；如果在模块中使用它，它指向的是模块所在的目录，而不是最初的启动文件）。现在，如果你将名为\
  \ `about.html` 的文件放入项目中的 `public` 文件夹，就可以通过 `http://localhost/about.html` 访问它。创建这个文件并试试看。制作一个小页面，确保\
  \ `Node` 能正确提供服务。\n\n**注意：** 为什么我们要在这里使用一个特殊的文件夹，而不是项目的根目录？这是出于良好的安全原因。因为你的服务器是用\
  \ JavaScript 编写的，而 JavaScript 文件只是另一种类型的静态内容，如果你将项目根目录设为静态文件目录，`Node` 会愉快地提供服务器本身及其所有模块的源代码。此外，将客户端脚本与服务器脚本分开总是更好的做法。\n\
  \n现在我们知道如何提供静态文件了，但这仍然没有解决渲染棋盘的问题。我们需要以某种方式将当前的棋盘数据传递给 HTML。这时，模板就派上用场了。\n\n**什么是模板**\n\
  \n模板是一种特殊的文件，它定义了文档的通用结构，并用占位符来代替实际的动态数据。清单 10-18 展示了一个模板可能的样子。\n\n**清单 10-18.**\
  \ *模板示例*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\"\
  \ />\n</head>\n<body>\n<% if (user) { %>\n<h1><%= user.name %></h1>\n<% } %>\n</body>\n\
  </html>\n```\n\n这是 `EJS`（`https://github.com/visionmedia/ejs`）的代码，它是可用的模板引擎之一。请注意，该模板主要是一个\
  \ HTML 文件，因此设计师会感到相当舒适。此外，模板包含一种可用于渲染的嵌入式语言。在清单 10-18 中，模板检查是否存在一个名为 `user` 的变量；如果存在，它就在\
  \ `<h1>` 标签中输出该用户的名称。对于 `EJS`，这种语言就是 JavaScript。稍后你会看到，JavaScript 并非必需。\n\n模板本身不足以渲染一个\
  \ HTML 页面。如你所见，模板引用了数据——名为 `user` 的变量，该变量并不存在于模板本身。这就在渲染逻辑和应用程序的其他部分之间提供了清晰的分离。\n\
  \n将模板代码和数据结合起来，并输出 HTML 页面的组件被称为模板引擎。图 10-9 展示了该过程的高层概述。\n\n**图 10-9.** *模板背后的理念。要生成\
  \ HTML 页面，模板引擎需要两个组件：模板和数据模型。*\n\n基本上，只要引擎知道如何用数据丰富模板代码并将其转换为可用的形式，模板代码本身是什么样子并不重要。这个特性允许你构建非常有趣的模板方言，旨在使标记看起来更好看。清单\
  \ 10-19 展示了一个模板示例，用于其中一种\n\n\n\n# 最流行的模板引擎\n\n最流行的引擎 —— `jade` ([`jade-lang.com`](http://jade-lang.com)).\n\
