- '# 第五章：事件处理与用户输入


  ### 用户输入


  本章致力于探讨几个重要主题：处理用户输入、实现自定义事件处理器，以及构建舒适的游戏控制方案。主要目标是为你提供扎实的输入机制知识储备，并启发你打造玩家与游戏世界之间无缝且自然的交互界面。


  移动设备与桌面浏览器的输入模式存在显著差异。触摸屏不仅在游戏中，在常规应用里也能提供更直观的界面控制方式。用手指触碰按钮——即便这个按钮只是屏幕上由发光像素构成的矩形区域——显得更加自然。在游戏地图上指向新建筑物应该出现的位置，或是在战场上直接划出攻击方向来派遣军队，也都更加直观。


  触摸界面在直观易用的操控方面取得了巨大进步，因为它们实现了用户与 UI 之间的直接交互。即使两岁的孩子也能操作触摸屏，而鼠标和键盘则需要更多技巧。


  浏览器的输入 API 围绕事件、事件发射器和事件监听器构建。每当对象发生重要事件时，将小消息（即"事件"）传递给监听器的这种思路，并非输入处理所独有。例如，负责与服务器通信的`JavaScript`类可能会利用事件来通知其他类：某聊天室刚刚发布了一条新消息。监听事件的聊天
  UI 随后会更新自身，向用户展示这条新消息。在本章中，我们将深入探讨这种架构的细节，并学习如何构建适用于大多数游戏开发场景的自定义实现。


  掌握基础知识后，我们就能构建更高级的输入模型，例如拖放操作、摇杆模拟等。我们将学习如何实现"拾取"功能，即通过鼠标或触摸操作选择复杂形状。


  总而言之，我们的目标是掌握以下内容：


  - 如何构建自定义事件发射器

  - 鼠标界面与触摸界面之间的差异

  - 如何构建抽象层以隐藏底层输入系统（鼠标或触摸）的细节，并使用最低公共标准

  - 如何实现拖放操作

  - 如何为像素级精确的对象拾取寻找合适方案

  - 如何在网页上模拟摇杆


  ### 浏览器事件


  触摸设备为用户带来的交互体验与使用鼠标和键盘操控的传统桌面电脑截然不同。因此，浏览器事件也存在差异，这并不令人意外。在本节中，我们将了解这两种控制类型的优缺点。之后，我们将尝试构建一个通用的输入处理接口，以隐藏底层系统的细节，使其对游戏的其他部分透明。


  #### 桌面浏览器与安卓浏览器的输入对比


  桌面用户受限于鼠标和键盘（它们充当着人与计算机之间的"中介"），而移动端玩家能做更多事：旋转和摇晃设备、触摸和滑动屏幕、在真实世界的街道上移动以完成游戏目标、拍照以及录制视频。


  当然，移动端控制也并非完美：在面对键盘所擅长的操作时，它们很快暴露不足。一个典型的例子是电子邮件输入——使用实体键盘输入文本要容易得多。让我们分析移动端控制的优缺点，以便知晓如何扬长避短。


  #### 移动端控制的优势：


  - 移动端控制感觉更自然。用户用手指而非鼠标光标进行指向，感觉更像是在与游戏世界的对象进行交互。

  - 移动设备支持多点触控，相当于拥有十个鼠标指针！




  '
- '# 移动设备控制与事件处理


  移动设备配备的加速度计和陀螺仪，使其本身可作为控制器使用。


  ##### 移动端控制的局限性


  - 用户没有像样的键盘。即使输入名字也颇为不便。

  - 鼠标支持多种交互方式（悬停、单击、右键单击、滚轮滚动），而触摸操作仅有点击和滑动。

  - 鼠标拥有更多按键，部分型号甚至多达 20 个。而在无键盘的触摸界面中，你只有一个“按键”——点击。常规情况下，要实现至少一种额外交互方式，可借助长按操作，但这也已是极限。其余交互均需通过屏幕按钮、手势或多点触控来弥补。

  - 大多数安卓设备并未向浏览器开放多点触控功能（除少数摩托罗拉设备外，但效果也不尽如人意）。

  - 安卓设备未向浏览器开放陀螺仪和加速度计数据。


  正如你所见，前文列表中的两点优势因浏览器支持不足而瞬间失效。不幸的是，这恰恰是安卓原生浏览器的现状，因此你实际可开发的游戏类型仅限于能用单键鼠标操控的品种。


  情况即将迎来转机。最新发布的安卓版本（撰写本文时为 4.0）为 HTML5 游戏世界带来了曙光。加速度计和陀螺仪逐渐向游戏开发者开放。目前你仍可使用这些功能，但仅限打包为原生安卓应用的网页（如
  Apache Cordova 等工具——我们将在第 15 章详述——可将此 API 暴露给 JavaScript）。这并非最佳选择，但总比没有强。现在，我们将基于原生浏览器开展工作，并尝试寻找移动端与桌面端输入模型的最大公约数。


  ![](img/index-181_1.jpg)


  ### 利用事件捕捉用户输入


  让我们从最根本的动机问题开始：应用程序为何要实现事件与事件处理器？作为经验丰富的开发者，你或许已知答案：构建事件系统的目的是解耦各组件。例如，按钮组件无需直接通知特定对象状态变化，而是触发事件。任何订阅方都会知晓按钮状态变化并做出响应。按钮无需了解订阅者的类型，只需知道当重要事件发生时，订阅者具备需被调用的函数即可。


  就 JavaScript 与 DOM 而言，事件是浏览器对自身状态变化或外部动作的响应。你点击按钮，事件被触发；你滑动手指，另一事件被触发；页面加载完成，又一个事件被触发。若要查看各类事件，请打开谷歌
  Chrome 浏览器，按`F12`进入开发者工具窗口，选择 Script 标签（见图 5-1）。在右侧面板中展开“事件监听器断点”并查看事件列表。可见浏览器事件按类型分类：键盘、鼠标、控件等。几乎所有操作场景都有对应事件。


  **图 5-1.** *浏览器事件长列表片段*


  ![](img/index-182_1.jpg)


  ### 事件对象


  在 JavaScript 语境中，事件是传递给已注册事件监听器的普通对象。事件对象与普通对象一样包含字段和方法。其字段提供事件发生的额外信息。例如，用户点击屏幕时，仅知点击发生不足以执行有意义的操作，还需知道点击坐标。图
  5-2 展示了事件发射器与监听器之间的关系，事件对象承载着事件详情。




  '
- "# 事件处理与用户输入\n\n点击事件的坐标或按钮的状态——具体取决于场景和事件类型。\n\n**图 5-2.** 事件机制解析：发射器将名为“事件”的特殊对象发送给已注册的监听器，这样监听器就能获知重要事件的发生。\n\
  \n**注意：** 多年来，跨浏览器事件处理一直是令人头疼的问题。各浏览器采用完全不同的处理模型。过去，JavaScript 书籍通常需要专门用一两章来讲解如何通过已知的\"\
  hack 技巧\"和变通方案，搭建通往完美跨浏览器事件处理的康庄大道。如今情况已大为改善。\n\nDownload from Wow! eBook <www.wowebook.com>\n\
  \n首先，市面上有许多高质量库已经实现了完善的事件处理机制。事实上，所有定位为\"开发者必备工具集\"的严肃库都具备此功能。\n\n其次，浏览器厂商也终于开始统一标准化进程。\n\
  \n尽管如此，问题仍未完全解决。即便是本章创建的简单应用程序中，我们仍需实现一个小 hack 来支持移动端 Firefox（第 9 章我们将使用 Firefox\
  \ 测试 WebGL）。\n\n事件对象还包含多个用于控制事件行为的方法（稍后详述）。\n\n### 注册事件：DOM 属性\n\n现在让我们编写代码，看看事件处理的实际运作。清单\
  \ 5-1 展示了一种事件处理方式。\n\n**清单 5-1.** 事件处理：传统方式\n\n```\n<!DOCTYPE html>\n<html lang=\"\
  en\">\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\"\ncontent=\"width=device-width,\
  \ initial-scale=1.0, maximum-scale=1.0,\nuser-scalable=no, target-densitydpi=device-dpi\"\
  />\n<style>\nhtml, body {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\n\
  padding:0;\nborder: 0;\n}\n</style>\n<script src=\"js/utils.js\"></script>\n<script>\n\
  function init() {\nconsole.log(\"document is loaded\");\n}\n</script>\n</head>\n\
  <body onload=\"init()\">\n<canvas id=\"mainCanvas\" width=\"20px\" height=\"20px\"\
  ></canvas>\n</body>\n</html>\n```\n\n等等！这不就是我们从第 2 章开始一直使用的代码吗？！没错！完全脱离事件处理来编写实用\
  \ JavaScript 程序几乎不可能——我不得不在正式介绍前就先使用事件，实属汗颜。\n\n让我们回顾这段代码：我们在 HTML 文档的`body`标签中添加了`onload`参数，其值是一个\
  \ JavaScript 代码片段。虽然可以在此放置多个用分号分隔的函数调用，但我们只调用了`init()`函数。这种技术可以（但不应该）用于大多数 DOM 元素：找到事件名称，在其前面加上`on`，然后输入所需代码：\n\
  \n```javascript\nonclick=\"alert('bad style')\";\n```\n\n为什么说这是不好的编码风格？开发者总是力求结构化与分离。HTML\
  \ 本质是标记语言，负责描述文档的语义和结构，不应承担其他职责：动态行为（应由 JavaScript 负责）或样式（应由 CSS 负责）。将事件处理代码直接嵌入\
  \ HTML 违反了这一原则，代码会很快变得混乱且难以维护。\n\n从纯实践角度而言，这种方式的主要局限是无法添加多个事件处理器——DOM 树不允许存在两个同名属性。\n\
  \n### 注册事件：事件监听器\n\n现在我们来学习更好的事件订阅方式，如清单 5-2 所示。\n\n**清单 5-2.** 正确的事件处理方式\n\n```javascript\n\
  var el = document.getElementById(\"mainCanvas\");\n\nfunction onCanvasTouchStart(e)\
  \ {\nconsole.log(\"touch\");\n}\n\nel.addEventListener(\"touchstart\", onCanvasTouchStart,\
  \ false);\n```\n\n每个 DOM 元素都具有`addEventListener()`函数，其功能正如其名：将第二个参数传入的函数注册为该 DOM\
  \ 元素的事件监听器。在清单 5-2 中，`el`代表 canvas 元素。\n\n\n\n## 第 5 章：事件处理与用户输入\n\n默认行为是浏览器对输入的正常响应；例如，点击\
  \ `<a>` 标签的默认行为是跳转到新页面。`Tab` 键的默认行为是将焦点移到下一个可聚焦元素。对于普通网页，这些行为正是用户所期望的；但对于网页游戏来说则不然。点击画布会高亮整个元素，比如给它加上边框并播放“点击”音效，且伴有明显恼人的延迟。这在用户玩“四球”游戏时绝对不是他们想要的。\n\
  \n浏览器有两个控制事件正常流程的函数：\n\n- **`stopPropagation()`** 阻止事件向 DOM 层级结构的下一级传递\n- **`preventDefault()`**\
  \ 确保浏览器不执行默认行为，相当于直接忽略该事件\n\n同时调用这两个函数的代码示例如下：\n\n```javascript\na.addEventListener(\"\
  click\", function(e) {\n  e.stopPropagation();\n  e.preventDefault();\n}, false);\n\
  ```\n\n如果某个变量是一个 `<a>` DOM 节点，那么浏览器将永远不会因 `preventDefault()` 而跳转该链接。同时，由于 `stopPropagation()`，`<a>`\
  \ 的父节点将不会接收到发生在 `<a>` 上的点击事件。我们将在 API 中使用这种技术来限制那些仅针对主画布元素的事件的正常流程。\n\n### 从事件中获取更多信息\n\
  \n这个作为参数传递给每个事件监听器的小小 `e` 中隐藏着许多有趣的信息。对于 `touchstart` 事件，`e` 包含一个名为 `targetTouches`\
  \ 的数组。而 `targetTouches` 中的每个元素又包含 `pageX` 和 `pageY` 这两个参数，分别表示触摸点相对于页面左上角的坐标。\n\n\
  现在让我们运用这一知识，创建一个简单的应用：当用户点击画布时，在上面绘制一个弹孔（见清单 5-3）。这是一个简单但相当有用的练习；你可以立即看到事件处理是否正常工作，以及能从中获得什么：你手中的设备是否支持多点触控，如果支持，它最多能同时处理多少个触摸点？\n\
  \n## 清单 5-3. 检测 DOM 元素上的触摸事件\n\n```html\n<!DOCTYPE html>\n<html lang=\"zh\">\n<head>\n\
  \  <meta charset=\"utf-8\" />\n  <meta name=\"viewport\"\n        content=\"width=device-width,\
  \ initial-scale=1.0, maximum-scale=1.0,\n                 user-scalable=no, target-densitydpi=device-dpi\"\
  />\n  <style>\n    html, body {\n      overflow: hidden;\n      width: 100%;\n \
  \     height: 100%;\n      margin:0;\n      padding:0;\n      border: 0;\n    }\n\
  \  </style>\n  <script>\n    function init() {\n      var canvas = initFullScreenCanvas(\"\
  mainCanvas\");\n      var ctx = canvas.getContext(\"2d\");\n      canvas.addEventListener(\"\
  touchstart\", function(e) {\n        for (var i = 0; i < e.targetTouches.length;\
  \ i++) {\n          drawBullet(\n              e.targetTouches[i].pageX,\n     \
  \         e.targetTouches[i].pageY, ctx);\n        }\n        e.stopPropagation();\n\
  \        e.preventDefault();\n      }, false);\n    }\n\n    function drawBullet(x,\
  \ y, ctx) {\n      ctx.fillStyle = \"darkred\";\n      ctx.strokeStyle = \"black\"\
  ;\n    }\n  </script>\n```\n\n监听函数 `onCanvasTouchStart()` 将接收新的监听器。事件类型为 `touchstart`，事件监听器是\
  \ `onCanvasTouchStart()` —— 一个向控制台输出消息的函数。现在，每当在 `el` 上触发新的 `touchstart` 事件时，就会调用\
  \ `onCanvasTouchStart()`。\n\n请注意，监听函数也有一个参数：它被称为 `e`。这是单个字母作为参数名完全没问题的情况之一。每个人都知道\
  \ `e` 代表异常或事件，而且 99% 的情况下，根据上下文就能明确其含义。\n\n事件被注册在元素上的监听器处理之后，会被发送到其直接父节点。然后该事件会触发父节点上注册的相应类型的所有监听器。接着事件会继续向上传递到父节点的父节点，以此类推，直到到达\
  \ DOM 层次结构的顶部。这种行为被称为 **冒泡** —— 事件就像一杯水中的气泡，从底部移动到表面。但不同的是，事件不是穿过水层，而是穿过 DOM 层次结构的层级：从一层到另一层，直到到达顶部。然后浏览器会为这个事件执行“默认行为”。\n\
  \n\n\n```javascript\nctx.lineWidth = 4;\n\nctx.beginPath();\n\nctx.arc(x, y, 15,\
  \ 0, 2*Math.PI, false);\n\nctx.fill();\n\nctx.stroke();\n\n}\n\nfunction initFullScreenCanvas(canvasId)\
  \ { /* 已省略 */ }\n\nfunction resizeCanvas(canvas) { /* 已省略 */ }\n\n第五章：事件处理与用户输入\n\
  \n</script>\n\n</head>\n\n<body onload=\"init()\">\n\n<canvas id=\"mainCanvas\"\
  \ width=\"100\" height=\"100\"></canvas>\n\n</body>\n\n</html>\n```\n\n代码最重要的部分已被加粗。对于检测到的每一次触摸，我们都会在用户手指正下方绘制一个小圆。如果你用两根手指点击画布，却只看到一个圆，则说明该浏览器不支持多点触控。用于此简单触控测试的代码可在本章源代码文件\
  \ `01.touch_test.html` 中找到。\n\n**注意：** `targetTouches` 看起来虽然像数组，但它实际上并非真正的数组。它没有\
  \ `forEach` 或 `splice` 等数组方法。这类对象有时被称为*伪数组*。\n\n清单 5-3 中的代码仅适用于支持触控的设备。该示例无法在常规台式机上运行，因为台式机浏览器不会触发触摸事件，而是触发点击事件。此外，你只有一个鼠标指针，因此事件中不会包含\
  \ `targetTouches` 坐标数组，而只有一对 `(x, y)` 坐标。\n\n### 处理触控与鼠标界面的差异\n\n通常，我们希望代码不仅能运行在\
  \ Android 触控设备上，也能在常规台式机系统上运行。除了让更多用户能够体验你的游戏这一显而易见的原因外，程序员也习惯使用台式机浏览器进行大部分开发和调试工作。因此，正确处理两种平台上的输入至关重要。\n\
  \n让我们稍微更新一下代码，使其也能在 Google Chrome 中运行。首先，我们需要检测当前设备是常规设备还是支持触控的设备。技巧在于检查浏览器是否了解触摸事件（参见清单\
  \ 5-4）。如果支持，那么你很可能正在使用触控设备。\n\n**清单 5-4.** *检查设备类型：触控设备 vs. 常规浏览器*\n\n```javascript\n\
  /**\n* 检查我们正在使用的是触摸屏还是\n* 常规的桌面浏览器。用于确定应该使用\n* 哪种类型的事件：\n* 鼠标事件还是触摸事件。\n*/\nfunction\
  \ isTouchDevice() {\n    return ('ontouchstart' in document.documentElement);\n\
  }\n```\n\n重要的代码行已被加粗。我们正在检查当前上下文中是否提供了 `ontouchstart` 监听器。如果可用，则 `document.documentElement`\
  \ 的键列表中会包含 `ontouchstart`。这意味着该浏览器能够识别并支持触摸事件。将这段函数代码添加到项目中的 `utils.js` 文件里，因为我们之后会经常用到它。后续依赖于此函数的代码清单将假定该函数已经可用。\n\
  \n**注意：** 还有很多其他方法可以测试触摸屏支持情况。请访问 [`modernizr.github.com/Modernizr/touch.html`](http://modernizr.github.com/Modernizr/touch.html)\
  \ 了解其他方法。该页面是 Modernizr 项目的一部分，这是一个轻量级的特性检测库。如果你需要检测更多浏览器特性（例如 WebSockets 或 XHR2\
  \ 支持），可以考虑使用这个小巧的工具：[`modernizr.com`](http://modernizr.com)。\n\n现在让我们修改代码，使得在 Google\
  \ Chrome 中点击画布也能生效（参见清单 5-5）。完整示例（名为 `02.touch_and_mouse.html`）包含在本章的源代码中。\n\n**清单\
  \ 5-5.** *添加对桌面浏览器的支持*\n\n```javascript\nfunction init() {\n    var canvas = initFullScreenCanvas(\"\
  mainCanvas\");\n    var ctx = canvas.getContext(\"2d\");\n    if (isTouchDevice())\
  \ {\n        canvas.addEventListener(\"touchstart\", function(e) {\n           \
  \ for (var i = 0; i < e.targetTouches.length; i++) {\n                drawBullet(e.targetTouches[i].pageX,\
  \ e.targetTouches[i].pageY, ctx);\n            }\n            e.stopPropagation();\n\
  \            e.preventDefault();\n        }, false);\n    } else {\n        canvas.addEventListener(\"\
  mousedown\", function(e) {\n            drawBullet(e.pageX, e.pageY, ctx);\n   \
  \         e.stopPropagation();\n            e.preventDefault();\n        }, false);\n\
  \    }\n}\n```\n\n\n\n## 第 5 章：事件处理与用户输入\n\n鼠标事件每个事件只关联一对坐标。这就是为什么它们没有像 `targetTouches`\
  \ 这样的特殊对象。坐标直接存储在事件对象中。\n\n`pageX` 和 `pageY` 是事件相对于页面（而非画布）的坐标。只要画布位于页面左上角（大多数情况如此），这种方法就能正常工作。如果你添加了其他元素（如调试用\
  \ div、FPS 计数器或简单的边距），我们的演示就会出问题。我们需要额外做一些工作来计算画布在页面中的正确坐标。\n\n清单 5-6 展示了实现这一功能的代码。\n\
  \n**清单 5-6.** *获取画布不在屏幕左上角时的事件坐标*\n\n```\nif (isTouchDevice()) {\n    canvas.addEventListener(\"\
  touchstart\", function(e) {\n        for (var i = 0; i < e.targetTouches.length;\
  \ i++) {\n            drawBullet(e.targetTouches[i].pageX - canvas.offsetLeft,\n\
  \                        e.targetTouches[i].pageY - canvas.offsetTop, ctx);\n  \
  \      }\n        e.stopPropagation();\n        e.preventDefault();\n    }, false);\n\
  } else {\n    canvas.addEventListener(\"mousedown\", function(e) {\n        drawBullet(e.pageX\
  \ - canvas.offsetLeft, e.pageY - canvas.offsetTop, ctx);\n        e.stopPropagation();\n\
  \        e.preventDefault();\n    }, false);\n}\n```\n\n新代码考虑了画布在页面上的位置：`offsetLeft`\
  \ 和 `offsetTop` 是保存元素相对于页面位置的参数。现在演示在原生浏览器上可以正常运行……但在移动版 Firefox 上却不行。为什么？因为 Firefox\
  \ 没有 `pageX` 和 `pageY` 属性。它有一对完全无用的 `clientX` 和 `clientY` 坐标，保存的是事件相对于当前浏览器视口的位置。如果页面发生滚动，演示就会再次失效。这时就需要使用特定浏览器的\
  \ hack 技巧。我们演示的最终版本如清单 5-7 所示。为了证明滚动不会破坏坐标，我必须从第 3 章使用的游戏页面骨架（见清单 3-3）切换回普通的 HTML5\
  \ 骨架，后者不限制滚动，也不强制全屏画布（如清单 3-1 所示）。\n\n**清单 5-7.** *输入演示的最终版本*\n\n```\n<!DOCTYPE\
  \ html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"utf-8\" />\n    <script\
  \ src=\"js/utils.js\"></script>\n    <script>\n        function init() {\n     \
  \       var canvas = document.getElementById(\"mainCanvas\");\n            var ctx\
  \ = canvas.getContext(\"2d\");\n            // 填充画布以便查看其位置\n            ctx.fillStyle\
  \ = \"lightgray\";\n            ctx.fillRect(0, 0, canvas.width, canvas.height);\n\
  \n            if (isTouchDevice()) {\n                canvas.addEventListener(\"\
  touchstart\", function(e) {\n                    for (var i = 0; i < e.targetTouches.length;\
  \ i++) {\n                        var coords = getInputCoordinates(e.targetTouches[i],\
  \ canvas);\n                        drawBullet(coords.x, coords.y, ctx);\n     \
  \               }\n                    e.stopPropagation();\n                  \
  \  e.preventDefault();\n                }, false);\n            } else {\n     \
  \           canvas.addEventListener(\"mousedown\", function(e) {\n             \
  \       var coords = getInputCoordinates(e, canvas);\n                    drawBullet(coords.x,\
  \ coords.y, ctx);\n                    e.stopPropagation();\n                  \
  \  e.preventDefault();\n                }, false);\n            }\n        }\n\n\
  \        function getInputCoordinates(e, element) {\n            return {\n    \
  \            x: (e.pageX || e.clientX + document.body.scrollLeft) - element.offsetLeft,\n\
  \                y: (e.pageY || e.clientY + document.body.scrollTop) - element.offsetTop\n\
  \            }\n        }\n\n        function drawBullet(x, y, ctx) {\n        \
  \    ctx.fillStyle = \"darkred\";\n            ctx.strokeStyle = \"black\";\n  \
  \          ctx.lineWidth = 4;\n            ctx.beginPath();\n            ctx.arc(x,\
  \ y, 15, 0, 2*Math.PI, false);\n            ctx.fill();\n            ctx.stroke();\n\
  \        }\n    </script>\n</head>\n<body onload=\"init()\">\n    <div style=\"\
  height: 250px\"></div>\n    <canvas id=\"mainCanvas\" width=\"400\" height=\"400\"\
  ></canvas>\n</body>\n</html>\n```\n\n如你所见，我们创建了一个专用函数来从事件对象中提取点击坐标。在桌面浏览器的情况下，它使用事件本身；而对于触摸界面，则使用\
  \ `targetTouches` 中的一个。此示例的代码包含在本章源码的 `03.click_coordinates.html` 文件中。\n\n\n\n**注意：**\
  \ 在第 3 章中，我提到游戏最典型的 HTML 页面结构是一个占据所有可用空间的`canvas`。在这种页面中出现滚动条的情况相当罕见，尤其是在移动设备上。不过，拥有一个也能处理这些情况的更“可靠”的代码是很好的，尤其是当只需要添加几行代码时。\n\
  \n上一个清单中的代码看起来并不美观：其中有大量样板代码，应该被隐藏在一个良好的 API 之下。除此之外，触摸事件和鼠标事件看起来非常相似，但它们的处理方式不同。例如，`touchstart`的工作原理与`mousedown`完全相同。从语义上讲，它们都表示“交互开始”。其他事件也是相关的：`mouseup`类似于`touchend`，因为它们都表示“交互结束”；`mousemove`类似于`touchmove`，它们都表示“拖拽”。如果我们能消除这些差异，并创建一个仅包含三个事件——`up`、`down`和`move`——的\
  \ API，那么事件处理代码将缩减到只有几行，例如：\n\n```\ninput.on(\"down\", function(e) {\n  drawBullet(e.x,\
  \ e.y, ctx);\n});\n```\n\n为此，我们需要引入我们自己的事件，不同于浏览器默认提供的事件。\n\n### 自定义事件\n\n具有复杂内部逻辑的应用程序通常需要单独的机制来处理其自定义事件。想象一个典型的休闲游戏：角色在关卡中跳跃，躲避敌人并收集硬币以获得更多分数。这种系统可能使用的事件类型包括`coin_collected`、`level_completed`或`level_restarted`。这些事件在游戏引擎之外没有价值；它们与`mousemove`或`touchstart`事件无关。它们不必传播到其他\
  \ DOM 组件或以任何其他方式由浏览器处理。\n\n**注意：** 有两个不同的概念共享“自定义事件”这个名称。第一个概念是`CustomEvent`，即 DOM\
  \ Level 3 Events 规范中描述的接口（[www.w3.org/TR/DOM-Level-3-Events/#interface-CustomEvent](http://www.w3.org/TR/DOM-Level-3-Events/#interface-CustomEvent)）。它用于向\
  \ DOM 添加新类型的事件。这个术语的另一个含义是“完全独立于 DOM 的事件 API”。在本节中，我们讨论的是第二种事件类型，尽管我们的目标可以通过两种方法实现。从纯粹的架构角度来看，使用`CustomEvent`会稍微好一些，但为了解释这个重要的概念，我选择了第二种方法。\n\
  \n让我们看看清单 5-8 中的代码，它展示了我们如何在游戏中使用自定义事件（支持该功能的功能将在本章下一节中实现）。`levelManager`是一个加载关卡并跟踪玩家何时完成关卡的对象。它有两个自定义事件：`loaded`和`finished`。客户端\
  \ API 利用这些事件来执行特殊操作，例如在关卡中放置硬币和报告关卡进度。一个对象可以为单一事件类型拥有多个监听器。在清单 5-8 中，有两个`loaded`事件的监听器。一个放置硬币，另一个将一些调试输出打印到控制台。\n\
  \n**清单 5-8.** *自定义事件示例*\n\n```\n// \"on\" 是 \"addEventListener\" 的别名\n// 它读起来更自然\n\
