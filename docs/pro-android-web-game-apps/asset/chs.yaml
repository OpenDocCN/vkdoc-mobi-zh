  \  \"house-1\": \"img/house-1.png\",\n  \"house-2\": \"img/house-2.png\",\n}, function()\
  \ {\n  /* 加载完成，继续执行 */\n});\n```\n\n`ImageManager` 并未发送事件，而是接受了一个特殊参数：回调函数，用于通知外部\
  \ API 图片已加载完成。这两种方法之间有什么区别吗？它们都依赖于一个特定的函数（监听器或回调）来向外界通知重要事件，并且两种方法都服务于同一个目标：将发射器与监听器解耦。它们看起来非常相似。\n\
  \n实际上，可以轻松地将 `ImageManager` 重写为我们刚刚创建的 `EventEmitter` 的用法。那么客户端代码将如清单 5-11 所示。\n\
  \n**第 5 章：事件处理与用户输入**\n\n**清单 5-11.** *ImageManager，使用事件代替回调的版本*\n\n```\nvar onDone\
  \ = function(event) {\n  // 加载完成时执行某些操作；\n};\nimageManager.addEventListener(\"done\"\
