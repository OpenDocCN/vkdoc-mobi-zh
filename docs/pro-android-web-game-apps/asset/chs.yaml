  \ 程序的工具。在本书中我们不会直接使用 JDK，但我们需要的一些组件会依赖它。\n\n对于 Windows 用户，可以从官方网站下载 JDK：  \n[www.oracle.com/technetwork/java/javase/downloads/index.html](http://www.oracle.com/technetwork/java/javase/downloads/index.html)（在此页面点击\
