  #### 变换的叠加\n\n你并不局限于每个上下文只能应用一个变换。事实上，你可以应用任意数量的变换；每一个变换都会改变渲染规则。变换的顺序非常重要；例如，如果我们有两个变换（比如，绕\
  \ Z 轴旋转 π/2 和在 X 轴上缩放 2 倍），其结果取决于调用相应函数的顺序。\n\n请看图 2-31。它展示了同一场景以不同顺序应用两种变换的结果。\n\
  \n**图 2-31.** *变换的顺序会影响结果。左侧，先应用缩放后应用旋转；右侧，先应用旋转后应用缩放*\n\n上下文按其调用顺序的逆序对形状应用变换。如果你先调用`rotate`再调用`scale`，形状看起来会像是先被缩放然后才被旋转。\n\
  \n在内部，变换以矩阵的形式存储：一个二维的 3 × 3 数字数组。当你应用变换时，你隐式地改变这个数组。一个副作用是，你可以应用任意数量的变换而不会影响性能。应用了\
  \ 100 个变换的上下文不会比只有两个变换的上下文运行得更慢。\n\n如果你确实了解自己在做什么，你可以手动将变换矩阵传递给上下文。有两种方法可以实现：`transform()`，它在现有变换之上应用新变换；以及`setTransform()`，它会完全重置矩阵。\n\
  \n**提示：** 如果你不理解矩阵是什么，或者它如何改变场景中形状的坐标，不必担心。在第 8 章中，我们将深入探讨这个话题。\n\n#### 上下文状态\n\n\
  上下文状态是影响渲染的各种设置（变换、填充、描边等）的集合。有时，保存当前状态以便稍后恢复是很有用的。让我们看一个简单的场景：一个坦克游戏，其中每辆坦克都可以改变其朝向，并且可以旋转它们的炮管。\n\
  \n绘制坦克的代码如清单 2-15 所示。\n\n**清单 2-15.** *变换上下文状态*\n\n```\nfunction drawTank(ctx, x,\
  \ y, tankRotation, cannonRotation) {\n    ctx.translate(x, y);\n```\n\n\n```javascript\n\
  ctx.rotate(tankRotation);\n\n// draw tank body\n\nctx.rotate(cannonRotation);\n\n\
  // draw cannon\n```\n\n该函数通过变换上下文来绘制坦克。问题在于，这些变换在事后并未清除。当你尝试绘制第二辆坦克时，上下文已发生变换，后续的变换会叠加在先前的变换之上（如前文所述），结果可能不正确。\n\
  \n要解决这个问题，必须恢复上下文的状态。当然，可以应用逆向变换。如果你调用了 `translate(x, y)`，就调用 `translate(-x, -y)`；但这种方法容易出错，且浪费宝贵的\
  \ CPU 资源。更好的方法如清单 2-16 所示，即在第一行 `save()` 上下文状态，然后在最后一行 `restore()` 它。\n\n**清单 2-16.**\
  \ *保存并恢复上下文状态*\n```javascript\nfunction drawTank(ctx, x, y, tankRotation, cannonRotation)\
  \ {\n  ctx.save();\n  ctx.translate(x, y);\n  ctx.rotate(tankRotation);\n  // 绘制坦克车身\n\
  \  ctx.rotate(cannonRotation);\n  // 绘制坦克炮管\n  ctx.restore();\n}\n```\n\n状态被“保存”到内部堆栈中。如果你多次调用此方法，状态会逐一压入堆栈。然后，你可以通过\
  \ `restore()` 将状态弹出。注意，当你调用 `save()` 时，上下文的当前状态并不会重置。它仍保留在调用 `save()` 之前应用的所有变换和样式。\n\
  \n经验法则：如果函数或代码块除了填充和描边样式之外还更改了任何内容，则应在绘制完成后恢复上下文的原始状态（参见清单 2-17）。\n\n**清单 2-17.**\
