  \ CPU 循环以节省几次操作是可行的。\n\n接下来， `Animator` 会检查自循环开始以来经过的时间量。若该数值超过循环持续时间，`Animator`\
  \ 将进入下一次循环（或结束动画）。请注意我们特别关注了跳过多次循环的情况。这种情况并非如表面看上去那般不可能。请记住，当浏览器标签页处于非活动状态时，`requestAnimationFrame()`\
  \ 不会执行其回调函数。同时，当隐藏浏览器窗口时，Android 原生浏览器会暂停定时器活动。完全有可能在数秒不活动后收到一次更新，并跳过几十个动画循环。如果游戏在非活动期间未被暂停，它必须尽力呈现一致的状态。\n\
  \n**注意：** 这个副作用非常有用。它让我们能够识别出距离上次更新已过去很长时间，并将其视为“自动暂停”。例如，若 `animate` 函数中的 `deltaTime`\
  \ 大于 1000 毫秒，则表示用户切换到了不同标签页，或在 Android 设备上隐藏了浏览器窗口。对于玩家可能因不活动而失败的枪战游戏，启用暂停模式而非让玩家品尝失败苦果可能是个好主意。\n\
  \n当我们得知跳过的循环数量后，可以检查动画是否已完成、判断当前循环是正向还是反向执行，并执行其他维护操作。之后，我们就可以计算并返回 `fraction` 值了。\n\
  \n你是否注意到这四个函数：`_onLoopEnd()`、`_onAnimationEnd()`、`_timingEventPreprocessor()` 和\
  \ `_onUpdate()`？除 `_timingEventPreprocessor()` 外，其余三个函数均无实际操作。这些是插入的钩子函数，旨在让你无需侵入\
  \ `Animator` 代码即可扩展其功能。稍后我们将讨论如何扩展 `Animator`。\n\n接下来是一个稍显复杂但适用于测试运动的示例。代码清单 4-32\
  \ 绘制了一个子弹（带填充与描边的圆形），并为其从点 `(50, 50)` 到点 `(300, 50)` 的移动制作了动画。你可以在此处调整不同的动画参数，以确定最适合的配置。\n\
  \n**代码清单 4-32.** *使用动画器移动子弹，更多自定义属性*\n\n```\nanimator = new Animator(1000);\nanimator.setRepeatCount(Animator.INFINITE);\n\
  animator.setRepeatBehavior(Animator.RepeatBehavior.REVERSE);\nanimator.setAcceleration(0.8);\n\
  animator.setDeceleration(0.15);\nanimator.start();\nvar lastUpdate = new Date();\n\
  var startX = 50;\nvar endX = 300;\nfunction animate(t) {\n    var now = t || new\
  \ Date().getTime();\n    var deltaTime = now - lastUpdate;\n    lastUpdate = now;\n\
  \    var fraction = animator.update(deltaTime);\n    var x = (1 - fraction)*startX\
  \ + fraction*endX;\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0, 0, canvas.width,\
  \ canvas.height);\n    drawBullet(x, 50, ctx);\n    requestAnimationFrame(arguments.callee);\n\
  }\nanimate(0);\nfunction drawBullet(x, y, ctx) {\n    ctx.fillStyle = \"darkred\"\
  ;\n    ctx.strokeStyle = \"black\";\n    ctx.lineWidth = 4;\n    ctx.beginPath();\n\
  \    ctx.arc(x, y, 15, 0, 2*Math.PI, false);\n    ctx.fill();\n    ctx.stroke();\n\
  }\n```\n\n看，这有多简单！花些时间多做尝试。试着改变大小以制造脉动效果，或者同时改变大小和颜色。尝试绘制并制作一个即将爆炸的卡通炸弹或发射导弹的飞船动画。发挥你的想象力吧。\n\
  \n**扩展动画器**\n\n\n\n让我们回到之前提到的钩子函数。在 `Animator` 的默认实现中，这些函数是空的，但它们的主要用途是让你有机会通过自己的酷炫功能对其进行扩展。\n\
  \n让我们再次利用精灵对象，创建一个 `Animator` 的扩展版本，使其能够自动设置对象的某些属性；例如，将任意对象的高度从 30 像素更改为 150 像素，同时隐藏内部公式。能写出像下面这样的代码岂不是很棒？我们将使用钩子函数，将自定义逻辑插入到默认的\
  \ `Animator` 实现中，而无需更改该类的代码。\n\n当你为其他开发者设计 API 时，考虑如何让你的逻辑能被定制通常是个好主意。每个开发者对于你的类应该执行何种“魔法”都有自己的想法。与其试图预测每一种可能的用例，不如像\
  \ `Animator` 那样添加一些扩展点，让其他开发者能够实现他们自己的想法，同时让你的类保持一致。清单 4-33 从客户的角度展示了相关代码。\n\n**清单\
  \ 4-33.** *`PropertyAnimator`：能在动画过程中设置类任意属性的类*\n\n```js\nanimator = new PropertyAnimator(1000,\
  \ [{\n  \"setter\": setHeight,\n  \"start\": 30,\n  \"end\": 100\n}, {\n  \"setter\"\
  : setTransparency,\n  \"start\": 50,\n  \"end\": 255\n}]);\nanimator.setEasingFunction(function(fraction)\
  \ {\n  return fraction*fraction*fraction;\n});\nanimator.setRepeatCount(Animator.INFINITE);\n\
  animator.setRepeatBehavior(Animator.RepeatBehavior.REVERSE);\nanimator.setAcceleration(0.8);\n\
  animator.setDeceleration(0.15);\nanimator.start();\n```\n\n对于动画需要更改的每个属性，你需传入设置函数的名称、属性的起始值和结束值。剩下的工作就交给框架了（什么？难道两个类就能称为框架了吗？）。\n\
  \n让我们再加大难度，添加对自定义函数的支持，以便在将分数值传递给设置函数之前对其进行修改。对于这个特殊的对象，常规的动画规则根本不够用，我要求它按照二次方，不，是三次方的速率增长！\n\
  \n**注意：** 对分数值进行预处理的函数通常被称为*缓动函数*。即使使用最简单的缓动函数，你也能实现许多非常令人兴奋的动画效果。应用加速和减速的代码也是一种缓动函数。请参考\
  \ jQuery UI Effects ([`jqueryui.com/demos/effect/easing.html`](http://jqueryui.com/demos/effect/easing.html))，获取关于使用缓动函数的灵感。这些图是交互式的，点击即可查看不同的动画效果。\n\
  \n遗憾的是，本书的篇幅不足以涵盖我想介绍的所有内容。而且由于缓动函数是一个比较技术宅的话题，我将留给你自行探索。\n\n让我们尝试扩展我们的 `Animator`\
  \ 以满足这些需求。当然，我们不想去触碰基类并在其中添加越来越多的代码——那样最终会导致它变得庞大而缓慢。这就是为什么我们创建一个名为 `PropertyAnimator`\
  \ 的新类。\n\n像往常一样，先写构造函数。我们只需要两个参数和两个额外的属性来支持新功能（见清单 4-34）。\n\n**清单 4-34.** *`PropertyAnimator`\
  \ 的构造函数*\n\n```js\nfunction PropertyAnimator(duration, props) {\n  Animator.call(this,\
  \ duration);\n  this._props = props;\n  this._easingFunction = null;\n}\n```\n\n\
  接下来，我们需要缓动函数的设置器。你应该检查传递给设置器的参数是否有效。缓动函数的限制条件是：(1) 它应该是一个接受一个参数作为参数的函数，(2) 它返回一个介于\
  \ 0 和 1 之间的数字。我们在设置器中唯一能测试的限制是，新值是一个函数，如清单 4-35 所示。\n\n**清单 4-35.** *缓动函数的设置器*\n\
  \n```js\n_p.setEasingFunction = function(easingFunction) {\n  this._throwIfStarted();\n\
  ```\n\n\n\n```javascript\nif (typeof easingFunction != \"function\") {\n  throw\
  \ \"easingFunction must be a function\";\n}\n\nthis._easingFunction = easingFunction;\n\
  };\n```\n\n别忘了从父类调用 `_throwIfStarted()` 方法——我们必须确保在动画循环中不会破坏正在执行的操作。\n\n以上是简单部分。现在我们需要做两件事：\n\
  - 在加速/减速的基础上应用新的缓动函数。\n- 当计算出进度值后，将其传递给对象的 setter。\n\n利用我们的钩子函数（见列表 4-36）可以轻松实现。用于预处理值的\
  \ `_timingEventPreprocessor()` 是应用自定义缓动的最佳位置。另一个名为 `_onUpdate()` 的函数则允许我们在完成更新前执行自定义操作。\n\
  \n**列表 4-36.** 为动画器添加新功能的自定义钩子函数\n\n```javascript\n// 在返回进度值前调用，重定义此函数可设置自定义缓动行为替代默认行为\n\
  _p._timingEventPreprocessor = function(fraction) {\n  fraction = Animator.prototype._timingEventPreprocessor.call(this,\
  \ fraction);\n  if (this._easingFunction) {\n    fraction = this._easingFunction.call(this,\
  \ fraction);\n    // 如果缓动函数返回值大于 1 或小于 0，则将其修剪到允许区间内\n    if (fraction > 1) fraction\
  \ = 1;\n    if (fraction < 0) fraction = 0;\n  }\n  return fraction;\n};\n\n// 在进度值计算完成后、更新函数末尾调用。此钩子允许在返回进度值前执行额外操作。\n\
  // 在本例中，我们调用对象的 setter\n_p._onUpdate = function(fraction) {\n  this._props.forEach(function(item)\
  \ {\n    item.setter.call(this, (1 - fraction) * item.start + fraction * item.end);\n\
  \  }, this);\n};\n```\n\n这很容易实现。现在轮到你了。想一个炫酷的动画效果并尝试实现它。试试不同的缓动函数。如果使用 `Math.sin`\
  \ 或 `Math.cos`，或者两者结合会怎样？你知道的，看起来可能很酷！本章提供的其他源代码中包含两个使用 `Animator` 的示例。第一个示例 `06.animator.html`\
  \ 展示了两点之间的简单移动。第二个示例 `07.swinging_axe.html` 展示了如何结合精灵的位置、角度和大小变化来实现挥斧头的效果。\n\n恭喜！现在你不仅掌握了动画的基础知识，还了解了一些高级特性。但动画还不是游戏，用户需要一种与游戏世界互动的方式。而这正是我们下一章要学习的内容！\n\
  \n## 总结\n\n在本章中，我们学习了图像加载和动画的基础知识。我们从加载图像开始，了解了两种将图像数据传入浏览器的方式——从文件加载和从数据 URI 加载。我们学习了如何处理实际开发中可能出现的加载错误，比如连接中断或服务器上文件缺失。我们还学习了如何组织精灵表以及如何在画布上渲染图像。\n\
  \n下一步是掌握动画技术，从简单的屏幕帧切换，到更复杂的主题，例如优化动画一致性、处理加速与减速，以及自定义缓动函数。\n\n我们简要概述了支持本章所述大部分技术的类——`Animator`（完整源代码随本章其他材料一同提供）。我们学习了如何使用\
  \ `Animator` 将更新动画状态（进度值）的代码与在屏幕上渲染新状态（即改变帧或元素位置）的代码解耦。\n\n掌握动画处理技巧仍不足以制作完整的游戏——但我们已接近目标！游戏的核心在于玩家与游戏世界的交互。在下一章中，我们将学习如何响应用户输入，让玩家控制屏幕上的角色。\n\
