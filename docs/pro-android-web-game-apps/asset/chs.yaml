  \ // 棋盘矩形的宽度和高度\n  this._width = 0;\n  this._height = 0;\n  // 棋盘格的最佳尺寸\n  this._cellSize\
  \ = 0;\n}\n```\n\n如果你不理解这些字段从何而来，不必担心，我马上就会解释一切。\n\n将类的原型引用保存到简短名称的变量中会非常方便，如下所示：\n\
  \n`_p = BoardRenderer.prototype;`\n\n当你开始编写函数时，代码看起来会整洁得多。请看下面比较两种风格的片段。第一行使用了显式的原型，理解起来更困难：你必须在最终看到函数名之前，先阅读`BoardRenderer.prototype`这一部分（23\
  \ 个字符！）。而在第二种情况下，只有两个字符。\n\n`BoardRenderer.prototype.repaint = function() { … }`\
  \ // 使用无简写变量\n`_p.repaint = function() { … }` // 使用简写变量\n\n### 处理不同的屏幕尺寸\n\n这个类最重要的特性之一，是不应依赖于任何硬编码的坐标或尺寸。例如，如果你硬编码了棋子大小，就等于将这个类的使用范围限制在了特定分辨率和像素密度的设备上。在智能手机上看起来不错的棋子，在全高清笔记本电脑屏幕上可能就太小了。这就是保持所有尺寸相对性的重要性所在。清单\
  \ 3-10 展示了如何计算棋子的半径和渐变偏移量。\n\n**清单 3-10.** *计算棋子半径和渐变偏移量*\n\n```\n// 棋子半径\nvar radius\
  \ = cellSize*0.4;\n// 渐变中心\nvar gradientX = cellSize*0.1;\nvar gradientY = -cellSize*0.1;\n\
  var gradient = ctx.createRadialGradient(\n  gradientX, gradientY, cellSize*0.1,\
  \ // 内圈（高光）\n  gradientX, gradientY, radius*1.2); // 外圈\n```\n\n`cellSize`变量在其他地方计算（确切地说是在`Game`类中），它代表浏览器窗口中棋盘格的最佳尺寸。屏幕越大，`cellSize`的值就越大。如果我们改变这个变量的值，所有元素会随之缩放，棋子保持其比例，渐变也仍能正确定位。清单\
  \ 3-11 是为设置游戏 UI 参数（位置和`cellSize`）的函数代码。\n\n**清单 3-11.** *设置游戏 UI 的参数：棋盘在画布中的位置以及每个格子的大小*\n\
  \n```\n/**\n * 设置棋盘的新位置和尺寸。应该调用 repaint 来查看变化\n * @param x 左上角的 x 坐标\n * @param\
