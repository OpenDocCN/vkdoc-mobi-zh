  \    this._objectLayer.draw(this._ctx);\n};\n```\n\n这段代码包含许多重复的行。每当为游戏添加一个新图层时，我们都必须在每个`move()`、`resize()`和`render()`函数中额外添加一行代码。这不是管理图层的好方法。事实上，这种方式非常容易出错。如果忘记在某处添加一行代码，渲染就会出错。在本章稍后，我们将找到更好的方法来管理多个图层。现在，先让我们看看效果，然后进入`ObjectLayer`更复杂的部分。图\
  \ 7-15 展示了游戏当前的进展。\n\n**图 7-15.** *中间结果：等距地形周围点缀着几间小屋*\n\n#### 实现对象集群\n\n下一步是优化对象渲染过程。目前，无论世界是大是小，每个对象都会被检查是否在视口内。更糟的是，如果对象在移动，则必须对整个对象集合进行排序，以保持一致的绘制顺序。\n\
  \n明智的做法是只处理视口附近的一小部分对象，而忽略其他对象直到它们足够接近。为此，我们将世界空间划分为若干个区域（即集群），并将每个对象分配给一个或多个这样的集群。当需要渲染帧时，我们只检查与当前视口相交的那些集群。图\
