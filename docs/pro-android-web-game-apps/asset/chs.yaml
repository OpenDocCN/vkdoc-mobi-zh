  \ imageManager.get(\"tiles\"),\n        40, canvas.width, canvas.height);\n    animate(0);\n\
  }\n```\n\n\n\n现在正是看看它在设备上效果的好时机！每秒三十四帧！成功！嗯……其实还不算完全成功。它还能运行得更快；导致我们每秒丢失最多帧数的问题在于，每一帧我们都重新绘制整个地图，即使可见部分并没有变化。换句话说，如果用户看到的地图片段是\
  \ 10×15 个格子，我们每帧要执行 `150` 次 `drawImage()` 调用，而大多数情况下绘制结果与前一帧完全相同。如果能够缓存视口的当前状态，并在需要时将其作为一张图片重新绘制，就能获得巨大的性能提升。这正是我们接下来要介绍的技术的核心理念。\n\
  \n#### 离屏缓冲\n\n如果我们直接创建另一个与视口大小完全相同的 `canvas` 实例，并将渲染好的地图保存到其中呢？如果用户没有移动地图，我们就可以使用预渲染的快照。这项技术在游戏开发中非常普遍，因为它能让复杂图案的绘制变得更快。它通常被称为离屏缓冲。之所以叫“离屏”，是因为你看不到存放缓存片段的元素。\n\
  \n在深入代码之前，请先看一下图 6-8，它说明了这个思路。\n\n现在我们有两个 `canvas` 实例，而不是一个。第二个 `canvas` 是不可见的，甚至没有附加到\
  \ DOM 上。我们称之为离屏 `canvas`。它保存了上次绘制在屏幕上的帧。如果用户没有移动地图，也没有改变设备方向，那么我们就可以使用“缓存”的帧并再次绘制它。否则，离屏\
  \ `canvas` 就失效了（这种状态通常称为脏）。我们需要先更新离屏 `canvas`，再将离屏 `canvas` 的内容复制到屏幕上。\n\n![](img/index-237_1.jpg)\n\
  \n**图 6-8.** *我们不会每帧重新渲染整个图块集合，而是将当前帧“缓存”在不可见的离屏 canvas 上。如果视口坐标没有变化，我们就使用预渲染的帧，从而节省一些计算周期。*\n\
  \n如果用户没有移动地图，帧始终不变，我们就不需要重新绘制几十个图块。在这种情况下使用离屏缓冲可以节省大量的 CPU 周期。绘制大图在性能上优于尝试用小块图填充同一区域。这正是我们获得性能提升的关键所在。\n\
  \n现在来看一些代码。`MapRenderer` 再次需要添加几个额外的字段。我们将其添加进去（见代码清单 6-9）。\n\n**代码清单 6-9.** *为\
  \ MapRenderer 添加对离屏 Canvas 的支持*\n\n```\nfunction MapRenderer(mapData, image, tileSize,\
  \ viewportWidth, viewportHeight) {\n    …\n    // 离屏 canvas\n    this._offCanvas\
  \ = document.createElement(\"canvas\");\n    // 离屏 canvas 的上下文\n    this._offContext\
  \ = this._offCanvas.getContext(\"2d\");\n    // 标志，表示用户已移动视口\n    // 并且离屏 canvas\
  \ 必须重新绘制\n    this._offDirty = true;\n    this.setViewportSize(viewportWidth, viewportHeight);\n\
  }\n```\n\n前两个字段不言自明：离屏 `canvas` 及其上下文。第三个字段 `_offDirty` 是我们要设置的标志，用于指示离屏 `canvas`\
  \ 的内容已失效，需要重新绘制。\n\n我们需要保持离屏 `canvas` 的大小与视口大小一致。此外，如果地图移动了，我们需要设置 `_offDirty` 标志。最好的方法就是更新\
  \ `move()` 方法。代码清单 6-10 展示了如何实现这一更新。\n\n**代码清单 6-10.** *保持离屏 Canvas 大小与视口一致，并在用户移动地图时将其标记为脏*\n\
  \n```\n_p.setViewportSize = function(width, height) {\n    this._viewportWidth =\
  \ width;\n    this._viewportHeight = height;\n    this._resetOffScreenCanvas();\n\
  };\n\n/**\n * 更新离屏 canvas 的大小，并将其标记为脏\n */\n_p._resetOffScreenCanvas = function()\
  \ {\n    this._offCanvas.width = this._viewportWidth;\n```\n\n\n\n`this._offCanvas.height\
  \ = this._viewportHeight;`\n\n`this._offDirty = true;`\n\n`};`\n\n`_p.move = function(deltaX,\
  \ deltaY) {`\n\n`Drawable.prototype.move.call(this, deltaX, deltaY);`\n\n`this._offDirty\
  \ = true;`\n\n`};`\n\n现在到了最后、也是最关键的一步。更新 `draw()` 函数，使其更加智能。不再直接从瓦片地图绘制瓦片，而是先检查离屏缓冲区是否“洁净”。缓冲区洁净意味着用户未移动地图，且视口大小未改变；换句话说，离屏缓冲区中保存的图像与当前帧所需的图像完全一致。因此，我们无需逐块绘制世界的一部分，只需将离屏画布的内容直接复制到屏幕上即可。\n\
  \n如果缓冲区是“脏”的呢？那我们就需要执行与之前完全相同的操作：逐块渲染世界片段，只不过这次要在离屏画布上进行。渲染完成后，我们便再次拥有一个洁净的缓冲区，可以将其绘制到屏幕上。清单\
  \ 6-11 总结了这些改动。\n\n**清单 6-11.** *更新 MapRenderer 的绘制函数*\n\n```\n_p.draw = function(ctx)\
  \ {\n  if (this._offDirty) {\n    this._redrawOffscreen();\n  }\n  ctx.drawImage(this._offCanvas,\
  \ 0, 0);\n};\n\n_p._redrawOffscreen = function() {\n  var ctx = this._offContext;\n\
  \  ctx.clearRect(0, 0, this._viewportWidth, this._viewportHeight);\n\n  var startX\
  \ = Math.max(Math.floor(-this._x / this._tileSize), 0);\n  var endX = Math.min(Math.floor((this._viewportWidth\
  \ - this._x) /\n      this._tileSize), this._mapData[0].length - 1);\n  var startY\
  \ = Math.max(Math.floor(-this._y / this._tileSize), 0);\n  var endY = Math.min(Math.floor((this._viewportHeight\
  \ - this._y) /\n      this._tileSize), this._mapData.length - 1);\n\n  for (var\
  \ cellY = startY; cellY <= endY; cellY++) {\n    for (var cellX = startX; cellX\
  \ <= endX; cellX++) {\n      var tileIndex = this._mapData[cellY][cellX];\n    \
  \  if (tileIndex > -1) {\n        ctx.drawImage(this._image,\n          (tileIndex%this._tilesPerRow)*this._tileSize,\n\
  \          Math.floor(tileIndex/this._tilesPerRow)*this._tileSize,\n          this._tileSize,\
  \ this._tileSize,\n          this._x + cellX*this._tileSize,\n          this._y\
  \ + cellY*this._tileSize,\n          this._tileSize, this._tileSize);\n      }\n\
  \    }\n  }\n  this._offDirty = false;\n};\n```\n\n如你所见，`draw` 函数中的大部分代码都转移到了 `_redrawOffscreen()`\
  \ 函数中，唯一的区别在于 `_redrawOffscreen()` 操作的是离屏上下文。\n\n就这样！现在我们的代码比本章开头时复杂了一些，那么让我们看看这些努力是否值得。稳定达到\
  \ 45 帧！离我们的目标更近了一步。\n\n然而，这段代码仍有一个问题。当用户移动地图时，新版本的 `draw()` 函数执行的工作甚至比以前更多。你自己比较一下。在最后一次修改之前，我们每帧只重绘几十个瓦片。而在新版本中，如果地图静止不动，我们就不重绘。但如果地图持续移动，我们首先要将瓦片重绘到离屏缓冲区（与之前相同的工作），然后再将离屏缓冲区绘制到屏幕上。我们优化了地图静止或移动不多的情况（45\
  \ 帧已经非常好了），但让地图移动时的情况变得更糟了。\n\n有些游戏依赖于始终移动的地图。例如，如果视口与角色绑定，那么角色的每一步都会移动视口。让我们看看如何改进最坏的情况。\n\
  \n#### 缓存视口周围区域\n\n那么，我们现在面临的问题如下：由于离屏画布与视口大小相同，每次移动都不得不重绘它。每一个像素都会导致缓冲区变“脏”。此外，我们通常每次都会重绘同一组瓦片。如果我们把离屏画布做得比视口稍大一些，使其能够容纳视口周围的小区域，会怎样呢？这样，我们就可以绘制一组瓦片，并将它们保留在“缓冲区”中，直到视口越过网格的下一个单元格。一旦发生这种情况，我们就需要绘制一组新的瓦片。这样就能避免重复绘制相同的瓦片。\n\
  \n\n\n一次又一次地重复。这里的关键是，当用户拖动地图时，我们不会在每一帧都重绘缓冲区。只有当用户跨越某个瓦片的边界时，我们才进行重绘，频率大约是每 25\
  \ 到 30 帧一次。这样就能解决性能下降的问题。图 6-9 展示了这一思路。\n\n**图 6-9.** *地图渲染的进一步优化。屏幕外画布包含的区域大于视口；只有当视口跨越“预绘制”区域时，才会重绘屏幕外画布。我们选择覆盖整数个地图单元格的区域作为该区域。*\n\
  \n这次我们需要更新不少方法，但成果是值得的。显然，我们需要更改屏幕外画布的大小。这次我们要求它至少比视口大一个单元格，这样只有当可见的瓦片集合发生变化时，我们才进行重绘。\n\
  \n此前，我们在每次移动时都会重绘缓冲区。这次，在判断缓冲区为“脏”之前，我们需要检查用户是否已经越过了已渲染区域的边界。清单 6-12 中的 `_updateOffscreenBounds()`\
  \ 函数正是执行此操作的。\n\n第 6 章：渲染虚拟世界\n\n**清单 6-12.** *检查用户是否已越过已渲染区域的边界*\n\n```\n_p.updateOffscreenBounds\
  \ = function() {\n    var newBounds = {\n        x: Math.floor(-this._x / this._tileSize),\n\
  \        y: Math.floor(-this._y / this._tileSize),\n        w: Math.ceil(this._viewportWidth/this._tileSize)\
  \ + 1,\n        h: Math.ceil(this._viewportHeight/this._tileSize) + 1\n    };\n\
  \    var oldBounds = this._offBounds;\n    if (!(oldBounds.x == newBounds.x\n  \
  \      && oldBounds.y == newBounds.y\n        && oldBounds.w == newBounds.w\n  \
  \      && oldBounds.h == newBounds.h)) {\n        this._offBounds = newBounds;\n\
  \        this._offDirty = true;\n    }\n};\n```\n\n`_updateOffScreenBounds()` 会在视口每次移动时被调用，以检查用户是否已导航到地图上尚未在屏幕外上下文中渲染的新区域。如果后台画布需要更新，则设置\
  \ `_offDirty` 标志。现在，我们来更新那些可能会使屏幕外画布失效的函数——`move()` 和 `_setViewportSize()`，如清单 6-13\
  \ 所示。这段代码非常简单。\n\n**清单 6-13.** *更新 MapRenderer*\n\n```\n_p.move = function(deltaX,\
  \ deltaY) {\n    this._updateOffscreenBounds();\n}\n\n_p.setViewportSize = function(width,\
  \ height) {\n    this._viewportWidth = width;\n    this._viewportHeight = height;\n\
  \    this._resetOffScreenCanvas();\n};\n\n_p._resetOffScreenCanvas = function()\
  \ {\n    this._updateOffscreenBounds();\n    this._offCanvas.width = this._offBounds.w*this._tileSize;\n\
  \    this._offCanvas.height = this._offBounds.h*this._tileSize;\n    this._offDirty\
  \ = true;\n};\n```\n\n一旦你设置了新的画布大小，画布就会被清空；这就是为什么 `_resetOffScreenCanvas()` 要显式地设置\
  \ `_offDirty` 标志。实际边界是否改变并不重要；因为那里的内容已经不存在了，所以我们需要重新绘制。现在我们已经定义了屏幕外画布的边界，接下来看看如何渲染它。下一步，我们需要更新\
  \ `_redrawOffscreen()` 函数，该函数用瓦片填充屏幕外画布。改动很小：我们不再使用 `this._x` 和 `this._y` 来计算可见瓦片的集合，而是使用\
  \ `this._offBounds` 对象，如清单 6-14 所示。\n\n**清单 6-14.** *更新屏幕外画布*\n\n```\n_p._redrawOffscreen\
  \ = function() {\n    var ctx = this._offContext;\n    ctx.clearRect(0, 0, this._offCanvas.width,\
  \ this._offCanvas.height);\n    var startX = Math.max(this._offBounds.x, 0);\n \
  \   var endX = Math.min(startX + this._offBounds.w - 1,\n        this._mapData[0].length\
  \ - 1);\n    var startY = Math.max(this._offBounds.y, 0);\n    var endY = Math.min(startY\
  \ + this._offBounds.h - 1,\n        this._mapData.length - 1);\n    for (var cellY\
  \ = startY; cellY <= endY; cellY++) {\n        for (var cellX = startX; cellX <=\
  \ endX; cellX++) {\n            var tileIndex = this._mapData[cellY][cellX];\n \
  \           if (tileIndex > -1) {\n                ctx.drawImage(this._image,\n\
  \                    (tileIndex%this._tilesPerRow)*this._tileSize,\n           \
  \         Math.floor(tileIndex/this._tilesPerRow)*this._tileSize,\n            \
  \        this._tileSize, this._tileSize,\n                    cellX*this._tileSize\
  \ - this._offBounds.x*this._tileSize,\n```\n\n\n\n`cellY * this._tileSize - this._offBounds.y\
  \ * this._tileSize`，  \n`this._tileSize`, `this._tileSize`);  \n\n下载自 Wow! eBook\
  \ <www.wowebook.com>  \n\n```  \n}  \n}  \n}  \nthis._offDirty = false;  \n``` \
  \ \n\n在之前版本的代码中，离屏画布的大小与视口完全相同，因此我们在每次`draw()`调用中将整个缓冲区复制到屏幕上。而这一次，缓冲区比画布大，因此我们需要计算要传输的区域的坐标。我们必须进行一些额外的计算，以确保绘制正确的像素。清单\
  \ 6-15 展示了如何更新`draw()`方法。  \n\n"
- "# 第 6 章：渲染虚拟世界  \n\n## 清单 6-15：新的 Draw 方法  \n\n```javascript\n_p.draw = function(ctx)\
  \ {\n    if (this._offDirty) {\n        this._redrawOffscreen();\n    }\n\n    //\
  \ Should draw offscreen at\n    var offCanvasX = -Math.floor(this._x) - this._offBounds.x\
  \ * this._tileSize;\n    var offCanvasY = -Math.floor(this._y) - this._offBounds.y\
  \ * this._tileSize;\n    var offCanvasW = Math.min(this._offCanvas.width - offCanvasX,\n\
  \                              this._viewportWidth);\n    var offCanvasH = Math.min(this._offCanvas.height\
  \ - offCanvasY,\n                              this._viewportHeight);\n\n    ctx.drawImage(this._offCanvas,\
  \ offCanvasX, offCanvasY, offCanvasW,\n                  offCanvasH, 0, 0, offCanvasW,\
  \ offCanvasH);\n};\n```  \n\n运行测试并享受结果！尽管在静态图像上运行速度稍慢，但在移动地图上我们获得了显著更好的效果！我的 Galaxy\
  \ S 在此演示中稳定保持在 45 fps。当前状态的代码版本已保存到`v.04`文件夹中，与本章的其他代码放在一起。  \n\n同样的优化类型也可以应用于从服务器加载地图区块。我们将地图划分为几个虚拟区域：视口——用户当前看到的内容；离屏缓冲区——预渲染的内容；以及世界的其余部分。规则很简单：当用户到达某个区域的边界时，该区域会被重新计算（在我们的例子中，离屏缓冲区会被重新渲染）。\
  \  \n\n但如果我们像图 6-10 那样在离屏缓冲区和世界的其余部分之间增加一个区域呢？我们将已传输到浏览器中的地图数据存储在这个新区域中，一旦用户到达边界，我们从服务器加载新数据。这是我们已经实现的想法的扩展。\
  \  \n\n![](img/index-244_1.jpg)  \n\n## 图 6-10：进一步扩展该想法。如果我们添加新的“已加载到浏览器”区域，就可以跟踪用户何时到达边界，并及时从服务器加载新的数据部分。\
  \  \n\n地图运行得相当不错。当然，这并不意味着没有改进空间！事实上，我认为完全可以写一整本独立的书来描述各种优化算法，榨取处理器时间的每一毫秒。但从这一点开始，你已经准备好自己实现这些算法了，因为你已经了解了优化的基本原则，并且可以比较每种算法的效果。\
  \  \n\n我们在这些章节中实现的优化保存在不同的文件夹中，因此只需在智能手机上打开每个演示，就可以比较效果。  \n\n- `v.01` 包含没有任何优化的代码（对我来说是\
  \ 21 fps）  \n- `v.02` 实现了“仅绘制可见部分”策略（34 fps）  \n- `v.03` 实现了后备缓冲区（地图不移动时约 45 fps；地图持续移动时约\
  \ 30 fps）  \n- `v.04` 实现了视口周边小区域的缓存（约 43-45 fps，取决于地图是否移动；性能下降太小，没有 `xStats` 图表难以察觉）\
  \  \n\n![](img/index-245_1.jpg)  \n\n"
- "# 第 6 章：渲染虚拟世界  \n\n## 世界对象  \n\n你已经创建了一个美丽的世界。但现在，它只是没有树木、动物或建筑物的地形。让我们来添加这些元素吧！\
  \  \n\n世界对象（或实体）就是精灵，就像我们之前看到的精灵一样……\n\n\n\n"
- "# 第 4 章 它们的渲染方式与平铺地形不同。地形瓦片是统一的——它们的大小都相同。而世界对象可以有不同的大小——有些较大，另一些较小。这就是为什么世界对象不能像瓦片那样轻松对齐到网格中。在本节中，我们将学习渲染游戏世界对象的基础知识。我们仅涵盖基础主题；下一章将介绍更高级的解决方案。\n\
  \n#### 坐标系\n\n在处理对象时，像处理地图那样用屏幕坐标来描述它们并没有太大意义。用世界坐标来描述对象要方便得多。例如，当对象在世界内部移动并改变了相对于地图的位置时，我们自然会认为它发生了移动，而不是由于滚动而产生的移动。但仅有世界坐标不足以渲染对象。我们需要将屏幕坐标传递给渲染函数，以便将精灵显示在正确的位置上。这样一来，游戏对象会同时“存在于”多个坐标系中。我们刚刚描述的两种坐标系分别是世界坐标系和屏幕坐标系。图\
  \ 6-11 展示了这一概念。\n\n**图 6-11.** 游戏对象的两个坐标系：虚线箭头是屏幕坐标；实线箭头是世界坐标。\n\n我们需要使用多个不同的坐标系，并能够快速地将坐标从一个坐标系转换到另一个坐标系。如果那棵树位于世界坐标的\
  \ (1270, 930) 处，我们应该在屏幕上的哪个位置绘制它？它是否可见？这是将世界坐标转换为屏幕坐标的一个例子。相反的例子是——当用户点击屏幕上的 (50,\
  \ 120) 位置时，我们需要判断该点击处是否有一棵树。在这种情况下，我们需要从屏幕坐标转换到世界坐标，并检查给定的世界位置上是否有一棵树。\n\n像我们现在正在探讨的这种俯视图，是坐标系之间转换最容易的视图。例如，要将屏幕坐标转换为世界坐标，我们可以这样写：\n\
  \n```\nworldX = screenX - mapX;\nworldY = screenY - mapY,\n```\n\n其中 `mapX` 和 `mapY`\
  \ 是地图在屏幕上的当前位置。例如，`MapRenderer` 会将它们存储为 `this._x` 和 `this._y`。\n\n反向转换，即从世界坐标转换到屏幕坐标，也同样容易：\n\
  \n```\nscreenX = worldX + mapX;\nscreenY = worldY + mapY,\n```\n\n有时，你还需要根据点击坐标或世界坐标来获取世界数组中瓦片的位置。例如，用户点击地图以建造一个兵营，游戏需要检查点击处下方地形的类型。如果用户点击了一个水域瓦片，我们就不应允许他在那里建造任何东西。这第三种常用的坐标系被称为瓦片坐标。其转换公式也非常简单：\n\
  \n```\ntileX = Math.floor((screenX - mapX) / tileSize);\ntileY = Math.floor((screenY\
  \ - mapY) / tileSize);\n```\n\n如你所见，这些计算一点也不难。这是因为世界空间与屏幕空间非常相似。然而，情况并非总是如此。例如，由菱形或六边形瓦片构成的等距世界的计算就会稍微复杂一些。\n\
  \n**注意：** 在游戏开发中，坐标系通常被称为*空间*。例如，较为冗长的短语“从屏幕坐标系转换到世界坐标系”通常被简称为“从屏幕空间转换到世界空间”。我们会交替使用这些术语。\n\
  \n#### 实现 `WorldObjectRenderer`\n\n现在我们准备实现 `WorldObjectRenderer` 类，它负责在屏幕上绘制对象。让我们从一个名为\
  \ `WorldObject` 的辅助类开始，它代表一个简单的可绘制实体，比如一棵树或一块岩石。代码如列表 6-16 所示。\n\n\n\n**清单 6-16.**\
  \ *WorldObject 类*\n\n```\nfunction WorldObject(spriteSheet, frame) {\n    this._spriteSheet\
  \ = spriteSheet;\n    this._frame = frame;\n    this._x = 0;\n    this._y = 0;\n\
  }\n\n_p = WorldObject.prototype;\n\n_p.getPosition = function() {\n    return {\n\
  \        x: this._x,\n        y: this._y\n    };\n};\n\n_p.setPosition = function(x,\
  \ y) {\n    this._x = x;\n    this._y = y;\n};\n\n_p.draw = function(ctx, x, y)\
  \ {\n    this._spriteSheet.drawFrame(ctx, this._frame, x, y);\n};\n```\n\n`WorldObject`\
  \ 是对 `SpriteSheet` 的封装，它将世界坐标与精灵表中的特定帧关联起来。`WorldObject` 期望内部 API 在调用 `draw()` 方法时传入正确的屏幕坐标。该类不关心视口位置或地图位置。\n\
  \n主要工作在 `WorldObjectRenderer` 类中完成，该类负责在地图之上渲染对象集合。该类的初始版本也非常简单：它将屏幕坐标传递给每个 `WorldObject`\
  \ 并请求其自行绘制。代码如清单 6-17 所示。\n\n**清单 6-17.** *绘制世界对象：第一版*\n\n```\nfunction WorldObjectRenderer(objects,\
  \ viewportWidth, viewportHeight) {\n    this._objects = objects;\n    this._viewportWidth\
  \ = viewportWidth;\n    this._viewportHeight = viewportHeight;\n    this._x = 0;\n\
  \    this._y = 0;\n}\n\n_p = WorldObjectRenderer.prototype;\n\n_p.move = function(deltaX,\
  \ deltaY) {\n    this._x += deltaX;\n    this._y += deltaY;\n};\n\n_p.setViewportSize\
  \ = function(width, height) {\n    this._viewportWidth = width;\n    this._viewportHeight\
  \ = height;\n};\n\n_p.draw = function(ctx) {\n    for (var i = 0; i < this._objects.length;\
  \ i++) {\n        var obj = this._objects[i];\n        var pos = obj.getPosition();\n\
  \        obj.draw(ctx, this._x + pos.x, this._y + pos.y);\n    }\n};\n```\n\n`WorldObjectRenderer`\
  \ 的 API 与 `MapRenderer` 非常相似。实际上，唯一的区别在于构造函数的参数。在下一章中，我们将学习如何利用这一特性，但就目前而言，我们将保持一切不变。\n\
  \n最后一步是更新 `index.html` 文件。我们需要添加代码来加载新资源（包含世界对象的图片）、创建一些 `WorldObject` 实例并渲染它们。清单\
  \ 6-18 中的代码总结了这些更新。\n\n**清单 6-18.** *更新 index.html 以在平铺地图上渲染对象*\n\n```\nvar spriteSheet;\n\
  var objectRenderer;\n\nvar images = {\n    \"tiles\": \"img/tiles.png\",\n    \"\
  objects\": \"img/objects.png\" // 加载对象图片\n};\n\n// 帧的坐标\nvar frames = [\n    [0,\
  \ 0, 110, 96, 55, 96],\n    [110, 0, 68, 108, 34, 108],\n    [178, 0, 71, 79, 35,\
  \ 79],\n    [250, 0, 29, 56, 15, 56],\n    [256, 60, 40, 31, 20, 31]\n];\n\n/**\
  \ 一旦所有图片加载完成，启动动画循环 */\nfunction onLoaded() {\n    mapRenderer = new MapRenderer(world,\
  \ imageManager.get(\"tiles\"),\n        40, canvas.width, canvas.height);\n    spriteSheet\
  \ = new SpriteSheet(imageManager.get(\"objects\"), frames);\n    objectRenderer\
  \ = new WorldObjectRenderer(getObjects(),\n        canvas.width, canvas.height);\n\
  \    animate(0);\n}\n\nfunction getObjects() {\n    return [\n        getTree(200,\
  \ 200),\n        getTree(280, 220),\n        getRock(300, 270),\n        getRock(150,\
  \ 197)\n    ];\n}\n\nfunction getTree(x, y) {\n    var obj = new WorldObject(spriteSheet,\
  \ 1);\n    obj.setPosition(x, y);\n    return obj;\n}\n\nfunction getRock(x, y)\
  \ {\n    var obj = new WorldObject(spriteSheet, 3);\n    obj.setPosition(x, y);\n\
  \    return obj;\n}\n\n/** 在此执行渲染 */\nfunction animate(t) {\n    clear();\n    mapRenderer.draw(ctx);\n\
  \    objectRenderer.draw(ctx);\n    requestAnimationFrame(arguments.callee);\n}\n\
  \n/** 处理地图移动 */\nfunction onMove(e) {\n    mapRenderer.move(e.deltaX, e.deltaY);\n\
  \    objectRenderer.move(e.deltaX, e.deltaY);\n}\n\nfunction resizeCanvas(canvas)\
  \ {\n    canvas.width = document.width || document.body.clientWidth;\n    canvas.height\
  \ = document.height || document.body.clientHeight;\n    mapRenderer && mapRenderer.setViewportSize(canvas.width,\
  \ canvas.height);\n    objectRenderer && objectRenderer.setViewportSize(canvas.width,\n\
  \        canvas.height);\n}\n```\n\n保存更改并刷新页面后，您应该会看到如图 6-12 所示的画面。效果更棒了！\n\n**图\
  \ 6-12.** *世界对象的渲染*\n\n#### 渲染顺序\n\n\n\n##### 游戏对象的渲染顺序\n\n游戏对象必须按正确的顺序渲染。图 6-13\
  \ 展示了使用错误渲染顺序可能发生的情况。岩石本应位于树的后方，但由于渲染顺序错误，它出现在了树的前方。\n\n![图 6-13：错误的渲染顺序](img/index-251_1.jpg)\n\
  \n**图 6-13.** *错误的渲染顺序*\n\n为了解决这个问题，我们必须确保“更靠后”的对象在更靠近玩家的对象之前被渲染。在 2D 世界中，这很容易实现。你可以根据对象底部的坐标对其排序，然后按从远到近的顺序绘制它们。为此，我们向\
  \ `SpriteSheet` 类添加了几行代码。我们需要知道帧的边界才能对世界对象进行排序。清单 6-19 展示了具体做法。\n\n**清单 6-19.**\
  \ *向 SpriteSheet 添加代码以获取帧的边界*\n\n```javascript\n_p.getFrameBounds = function(index,\
  \ x, y) {\n    var frame = this._frames[index];\n    if (!frame)\n        return;\n\
  \    return {\n        x: x - frame[SpriteSheet.FRAME_ANCHOR_X],\n        y: y -\
  \ frame[SpriteSheet.FRAME_ANCHOR_Y],\n        w: frame[SpriteSheet.FRAME_WIDTH],\n\
  \        h: frame[SpriteSheet.FRAME_HEIGHT]\n    };\n};\n```\n\n接下来，更新 `WorldObject`\
  \ 自身，使其能向 `WorldObjectRenderer` 报告相对于世界对象位置的边界（参见清单 6-20）。\n\n**清单 6-20.** *更新 WorldObject\
  \ 类，添加 getBounds() 函数*\n\n```javascript\n_p.getBounds = function() {\n    return\
  \ this._spriteSheet.getFrameBounds(this._frame, this._x, this._y);\n};\n```\n\n\
  最后，在 `WorldObjectRenderer` 的构造函数中添加排序代码，如清单 6-21 所示。\n\n**清单 6-21.** *排序世界对象*\n\n\
  ```javascript\nfunction WorldObjectRenderer(objects, viewportWidth, viewportHeight)\
  \ {\n    this._objects = objects;\n    this._objects.sort(function(o1, o2) {\n \
  \       var bounds1 = o1.getBounds();\n        var bounds2 = o2.getBounds();\n \
  \       return (bounds1.y + bounds1.h) - (bounds2.y + bounds2.h);\n    });\n   \
  \ this._viewportWidth = viewportWidth;\n    this._viewportHeight = viewportHeight;\n\
  \    this._x = 0;\n    this._y = 0;\n}\n```\n\n完成对象的排序后，渲染就正确了。\n\n这个简单的问题很容易解决，但它带来了很多影响。在拥有大量世界对象且对象可能移动并破坏已排序顺序的情况下，“每帧排序”不再是可行方案。目前，所有对象都是静态的——只有岩石和树木——但一旦你添加了移动的实体，情况就会变得有趣得多。在下一章中，我们将解决这个问题，并构建一个更高级的\
  \ `WorldObjectRenderer` 版本，它也能处理移动。\n\n##### 优化\n\n从优化的角度来看，对象的处理方式与常规图块完全相同。规则依然不变：如果你不想浪费任何\
  \ CPU 周期，只绘制你真正需要绘制的内容。我们不会再重复从最简单的案例开始逐步改进的练习——同样的技巧没有必要做两次。让我们直接思考一种近乎最优的对象渲染方式。\n\
  \n我们无法轻易确定需要绘制哪些对象。游戏对象不构成网格，我们也不能像对待图块那样说“本轮我们绘制五号到八号对象”。因此，我们有两个选择。第一，我们可以检查世界中的每一个对象，并决定是否绘制它。是的，这确实是一个选项。例如，假设在你的游戏中，主要角色在房间之间移动；那么房间会逐个加载，并且每个房间相对于屏幕尺寸来说都比较小。这样一来，你可能需要绘制世界中至少\
  \ 50% 的对象。对于拥有较小世界的社交农场类游戏也是如此。在这种情况下，使用最简单的方案来节省编码时间其实是合理的：检查每个对象的边界框，并绘制那些落在可见区域内的对象。\n\
  \n然而，也存在其他情况，比如当你的世界非常大时，玩家……\n\n\n\n只能同时看到屏幕上不到 1% 的对象。很有可能！在这种情况下，我们不能像那样检查对象，因为这会立刻拖垮游戏性能。唯一的解决方案是将游戏对象组织成某种空间结构，该结构可以决定哪些对象“现在”最有可能可见。\n\
  \n**注意：** 这个问题并非游戏开发所独有。还有许多其他类型的应用程序也面临同样的问题。例如，“用户能看到哪些精灵？”这个问题与“列出距离我家不超过 3 英里的加油站”非常相似，后者常见于地图和导航领域。加油站就是精灵，“3\
  \ 英里”是视口的大小，“我的家”是视口的当前位置。因此，这个问题被认真研究过也就不足为奇了。\n\n有各种算法可以解决这个问题（大多数基于树），它们通过将实体分组到边界矩形中，并在下一级将边界矩形分组到更大的边界矩形中（尝试搜索“`R-Tree`”以获取关于此方法如何工作的好例子）。然而，其背后的数学原理相当复杂，在此解释会占用太多篇幅，而且对大多数读者来说也不有趣。\n\
  \n有一种更简单的方法适用于游戏开发（至少在客户端），实现起来不需要火箭科学学位。我们喜欢使用网格。网格很简单，因为它们有整齐的方形单元格，并且很容易找到与当前视口相交的单元格。我们之前在瓦片网格中使用过这个技巧，那么让我们再用一次！我们可以将整个游戏对象集合分解为一个均匀的网格，并且只检查落在可见单元格中的对象。\n\
  \n看一下图 6-14 中的图片，它展示了这个想法。在图片所示的例子中，只有四个对象会被检查是否与视口相交：位于网格单元格 (2,0)、(3,0)、(2,1)\
  \ 和 (3,1) 中的对象。其中只有两个实际与视口相交的对象会被渲染。这样，我们就能消除无用的检查，只绘制真正重要的内容。\n\n![图 6-14](img/index-254_1.jpg)\n\
  \n第 6 章：渲染虚拟世界 **249**\n\n**图 6-14.** *最小化绘制前需要检查的对象数量。世界被划分为网格。每个对象被分配到几个网格单元格中。在每一帧中，只检查单元格\
  \ (2,0) 到 (3,1) 中的对象。*\n\n显然，游戏对象可能位于两个单元格的边界上，甚至位于两个边界相交的点上。在这种情况下，该对象会被分配到两个或四个网格单元格中。之后，我们会过滤这些对象，以免将它们绘制两次或四次。\n\
  \n如果对象在移动怎么办？我们必须跟踪它，并确保当它离开某个网格单元格时取消注册，并在进入新单元格时进行注册。这就像带着手机在城市里旅行：它总是在寻找最好的 GSM\
  \ 发射器。当您离开一个发射器的范围时，您就会在另一个发射器上注册。\n\n确定网格单元格的最佳大小非常重要。最佳大小取决于您游戏的具体情况、游戏对象的密度，以及它们是静态的（不移动、不出现或消失）还是动态的（四处移动、出现新对象、旧对象消失）。如果单元格做得很大，意味着在每一动画帧中您都必须检查更多对象。例如，如果一个单元格是\
  \ 500×500 像素，而视口位于单元格的交汇处，这意味着您必须测试一个 1000×1000 像素区域内的对象，这相当大。如果把单元格做得太小，很快就会面临大量空单元格的问题。此外，一个移动的对象必须不断地在这些单元格中注册/取消注册。那么最佳大小是多少？这个问题最好通过在您的特定设置上运行一些基准测试来回答。\n\
  \n\n\n"
- '# 第六章：渲染虚拟世界


  ### 等距视角


  在下一章中，我们将基于网格这一简单概念，构建更高级的对象渲染器。


  ![](img/index-255_1.jpg)


  ![](img/index-255_2.jpg)


  本章最后部分专门快速概述等距投影。到目前为止，我们一直使用的是俯视图，这意味着用户以 90 度角观察场景。图 6-15 展示了俯视图和等距投影之间的区别。


  **图 6-15.** *左侧是任天堂于 1986 年发行的《塞尔达传说》，采用正交（俯视）视图。右侧是黑岛工作室制作、Interplay 于 1998 年发行的《辐射
  2》，采用等距投影。*


  另一种有趣的观察方式是当摄像机轻微旋转时。当然，在 2D 世界中，我们无法旋转摄像机。对于 2D 游戏而言，等距视图意味着一种特殊的绘制和渲染对象的方式，它能营造出深度感。其定义是：等距投影是坐标轴之间角度相等（均为
  120 度）的投影。


  图 6-16 展示了我们正在制作的立方体在俯视图投影和等距投影中的样子。


  **图 6-16.** *左侧的立方体是俯视图投影——无论是俯视还是侧视，看起来都一样。右侧的立方体是等距投影。*


  ![](img/index-256_1.jpg)


  有许多游戏采用这种渲染世界的方法。与俯视图相比，等距视图对用户来说看起来更自然。当你玩棋盘游戏时，你不会直接从正上方看棋盘。当中世纪的将军率领军队作战时，他也不会从热气球上俯瞰战场。


  让我们看看在`canvas`上创建基于等距投影的引擎需要什么。最重要的是，我们在本章中介绍的优化方法并非俯视图游戏所独有。它同样适用于“等距游戏”。唯一的区别在于绘制瓦片的方式以及在坐标系之间转换的方式。


  在等距游戏中，瓦片是菱形的，其宽度是高度的两倍。因此，它们形成的网格不是矩形的；奇数行的瓦片相对于偶数行的瓦片会偏移半个宽度。所以，等距瓦片的渲染代码需要进行调整。**图
  6-17 展示了一个等距网格的示例。**


  **图 6-17.** *等距地图的左侧填充了“空”瓦片，以展示网格的样子。*


  等距瓦片的坐标系也与我们在通常的“方形”投影中使用的坐标系不同。在等距瓦片地图中，至少有两种设置瓦片坐标和渲染瓦片世界的方法。图 6-18 展示了第一种为瓦片分配坐标的方法。


  ![](img/index-257_1.jpg)


  ![](img/index-257_2.jpg)


  **图 6-18.** *为等距网格分配坐标的一种方法*


  在这里，地图的坐标轴与`canvas`的坐标轴平行。第二种方法如图 6-19 所示：将坐标逆时针旋转 45 度。`x`轴现在指向屏幕的右下角，而`y`轴指向左下角。


  **图 6-19.** *绘制瓦片地图的另一种方法*


  这段简短的介绍应该能让您对等距投影是什么以及等距游戏的外观有所了解。我们还没有探讨如何实现等距游戏，但这正是下一章的全部内容。您一定玩过至少几款等距游戏，即使不是在《辐射
  2》的时代，那么近些年在社交网络中也玩过。等距引擎在吸引人的外观与相对较低的复杂性（例如与 3D 引擎相比）之间取得了平衡。这就是等距游戏成为社交应用开发者主要目标的原因。


  ## 总结




