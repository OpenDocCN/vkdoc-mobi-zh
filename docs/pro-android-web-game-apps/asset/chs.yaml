  \ JavaScript 页面。\n\nJavaScript 是一种动态语言，与 Java 或 C++ 不同。静态语言和动态语言的主要区别在于，静态语言必须在运行时之前定义数据结构。例如，在静态语言中，如果程序员想要创建一个名为\
  \ `Van` 的类，就必须显式地描述其所有内容。\n\n\n\n`properties` 和 `methods`：`color`， `maxSpeed`， `drive()`\
