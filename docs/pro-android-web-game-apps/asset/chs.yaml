  \n**第 3 章：创建第一个游戏**\n\n现在我们已经创建了`BoardModel`——整个项目中最复杂的类。该类的完整注释代码可在本章的`BoardModel.js`文件中找到。我们现在有了游戏逻辑，以及将棋盘渲染到画布上的类。如果我们让它们协同工作，就会得到游戏！\n\
