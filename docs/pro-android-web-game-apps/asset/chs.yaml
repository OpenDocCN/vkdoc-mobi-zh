  \n下一步是创建用于在集群中存储对象的数据结构。三维数组是显而易见的选择：二维用于网格，第三维用于存储对象。数组是回答\"哪些对象属于给定集群\"这一问题的快速方法。对于反向问题，我们需要另一种数据结构。从对象\
  \ ID 到矩形集群集合的映射即可满足需求。完成这些修改后，你的代码应如代码清单 7-19 所示。\n\n**代码清单 7-19.** *将世界空间划分为集群并在其间分配对象*\n\
  \n```javascript\nfunction ObjectLayer(objects, clusterSize, worldWidth, worldHeight)\
  \ {\n    GameObject.call(this);\n    this._objects = objects;\n    this._clusterSize\
  \ = clusterSize;\n    this._worldWidth = worldWidth;\n    this._worldHeight = worldHeight;\n\
  \n    /* 按网格排列的集群 */\n    this._clusters = [];\n\n    /* 对象 ID 到矩形对象 - 集群边界 */\n\
  \    this._idToClusterBounds = {};\n\n    /* 当前可见的集群 */\n    this._visibleClusterBounds\
  \ = {};\n\n    /* 来自活动集群的已排序对象数组，无重复 */\n    this._cache = [];\n\n    /* 如果缓存需要完全重建，则为\
