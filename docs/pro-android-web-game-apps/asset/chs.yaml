  \ // 绘制坦克的其他部件\n  ctx.restore();\n}\n\nfunction drawCannon(ctx, cannonRotation)\
  \ {\n  ctx.save();\n  ctx.rotate(cannonRotation);\n  // 此处为实际代码\n  ctx.restore();\n\
