  \ `assets/www` 是不够的。首先，你必须重写那些使用相对 URL 访问服务器端资源的代码行。当你启动 Cordova 应用时，它直接从文件系统加载页面。这意味着每个相对\
  \ URL 也指向文件系统，而不是像通常那样指向服务器。例如，考虑典型的 XHR 调用：\n\n```\nvar xhr = new XMLHttpRequest();\n\
  xhr.open(\"GET\", \"user/182.json\", true);\nxhr.send(null);\n```\n\n通常情况下，请求会发送到服务器，服务器从数据库加载所需信息并形成动态响应。而在\
  \ Cordova 应用中，请求会尝试从 `/assets/www/user/182.json` 文件加载数据，显然会失败。解决这个问题很直接：使用绝对 URL\
  \ 代替相对 URL：\n\n```\nxhr.open(\"GET\", \"http://myserver.com/user/182.json\", true);\n\
  ```\n\n但是浏览器的同源策略呢？通常，你只能访问自己的服务器！好消息：对于 Cordova 加载的页面，没有这种策略限制。你可以输入任何你喜欢的 URL，并接收响应。\n\
  \n第 15 章：构建原生应用\n\n复制第 12 章多人游戏应用中的代码，并调整绝对 URL，如清单 15-4 所示。\n\n**清单 15-4.** *为四球多人游戏版本修复\
