- "# 排版后的文本\n\n注册的回调函数，当操作完成时被调用。\n\n让我们来看一下代码，如列表 4-1 所示。\n\n## 第 4 章：动画与精灵\n\n**127**\n\
  \n**列表 4-1.** **加载图像，最简单的示例**\n\n```\nvar img = new Image(); // 创建新的 Image 对象。加载尚未开始。\n\
  img.onload = function() { // 当加载完成时调用此函数\n    alert(\"Image is loaded\"); // 此时你知道图像已就绪\n\
  };\nimg.src = \"img/knight.png\"; // 当你设置 src 属性时，浏览器开始下载文件。\n```\n\n图像加载是一个异步操作：一旦你设置了`src`属性，浏览器就开始加载字节数据，但脚本会继续运行。当加载完成时，浏览器会调用一个已注册的回调函数来通知你的脚本操作的结果。\n\
  \n你可以同时加载多个图像，但浏览器不保证任何特定的加载顺序。例如，一个最后开始加载的小图像可能最先加载完成。实际上，这意味着你始终需要检查每个已加入加载队列的图像的状态，而像“如果\
  \ `b.png` 已加载，那么 `a.png` 可能也加载完了”这样的假设是不可靠的。\n\n**注意：** 另一个处理所有资源（不仅仅是图像）的重要规则：你绝不应依赖良好的网络状况，或假设你等待的资源\
  \ 100%可用。当你创建游戏时，你通常是在一个运行如钟表般精确的本地环境中工作。在现实世界中，互联网连接可能在你最意想不到的时候中断。你应该为此做好准备，要么重试下载资源，要么通知用户问题并退出，要么在没有资源的情况下继续。在没有资源的情况下继续运行并不意味着你可以忽略事故。对于图像，如果不重要的图像加载失败，你可以使用占位图像来代替正确的图像（好吧，我们没能加载巫师帽子的纹理，但游戏的其他部分已加载完成，所以我们为什么要结束这个世界呢？）。\n\
  \n列表 4-2 展示了如何处理图像问题。请注意加粗的行。\n\n**列表 4-2.** **使用错误回调**\n\n```\nvar img = new Image();\n\
  img.onload = function() {\n    alert(\"Image loaded\");\n};\nimg.onerror = function()\
  \ { // 当出现问题时调用此回调\n    alert(\"Failed to load the image\");\n};\nimg.src = \"img/knight.png\"\
  ;\n```\n\n加粗的行显示了你应该在`Image`对象上注册的第二个回调函数——`onerror`。当图像无法加载时，此函数被调用，并给你运行后备机制的机会。\n\
  \n**注意：** 为什么我们使用 PNG 图像？PNG 已成为游戏开发的事实标准。它是一种*无损*格式，意味着即使在压缩后它也能保持像素完美（与 JPEG 不同）。它是开放的并且免费使用。此外，它支持透明度和半透明度。对于精灵来说，还需要什么呢？\n\
  \n#### 加载多个图像\n\n通常你的游戏需要不止一个图像。你必须跟踪每个精灵的加载状态，对问题做出反应，并执行其他小的维护任务。创建一个负责此类任务的工具类是个好主意。我们想进一步简化图像加载！\n\
  \n我们需要管理多个图像的加载，当加载完成时触发一个单一的回调。由于图像加载是一个相对较慢的操作，我们需要某种进度指示。考虑到我们在创建一个用户友好的界面，我们想显示一个进度条。我们想要实现的最终任务是给每个图像一个别名：一个用于在项目中标识图像的字符串。使用别名比使用文件名要方便得多。文件名经常变化，而别名保持不变。\n\
  \n让我们从结果开始。列表 4-3 展示了我们如何使用`ImageManager`来预加载游戏所需的图像。\n\n\n\n## 第 4 章：动画与精灵\n\n\
  **清单 4-3.** *ImageManager API：一种稍好的图像加载方式*\n\n```\nfunction init() {\n    var canvas\
  \ = initFullScreenCanvas(\"mainCanvas\");\n    var imageManager = new ImageManager();\n\
  \    imageManager.load({\n        \"arch-left\": \"img/arch-left.png\",\n      \
  \  \"arch-right\": \"img/arch-right.png\",\n        \"knight\": \"img/knight.png\"\
  \n    }, onDone, onProgress);\n}\n```\n\n`onProgress()` 函数：\n\n```\nfunction onProgress(loaded,\
  \ total, key, path, success) {\n    if (success) {\n        // 进度条\n        console.log(\"\
  已加载 \" + loaded + \" / \" + total);\n    } else {\n        // 错误处理\n        console.log(\"\
  错误：无法加载 \" + path);\n    }\n}\n```\n\n`onDone()` 函数：\n\n```\nfunction onDone() {\n\
  \    console.log(\"所有图片已加载完成\");\n}\n```\n\n首先，我们将三张图片（它们的别名和路径）添加到队列中。加载会立即开始。我们传入两个回调函数：`onLoaded`\
  \ 和 `onProgress`。当所有图片都已加载就绪时，`onLoaded` 会被调用。每当得知某张图片的加载结果（成功或失败）时，`onProgress`\
  \ 会被调用。我们可以利用这个回调来更新进度条，或向用户提示错误信息。该回调接受以下五个参数：\n\n- `loaded`：目前已加载的图片数量；可用于移动进度条。\n\
  - `total`：队列中图片的总数。\n- `key`：图片的别名。\n- `path`：图片文件的实际路径；有助于调试加载问题。\n- `success`：指示加载是否成功的标志。如果一切正常且图片可供渲染，则为\
  \ `true`；如果出现问题，则为 `false`。\n\n现在让我们动手编写代码来实现这个管理器。\n\n**注意：** 我假设你已经习惯了创建新类，并且知道你应该创建名为\
  \ `ImageManager.js` 的新文件，将其放入 `js` 文件夹，并在 HTML 页面中添加额外的 `<script>` 标签来加载它。\n\n我们从构造函数开始。清单\
  \ 4-4 展示了代码。\n\n**清单 4-4.** *ImageManager 的构造函数*\n\n```\nfunction ImageManager(placeholderDataUri)\
  \ {\n    this._images = {};\n}\n```\n\n`this._images` 是保存所有已加载图片的对象；`this._images`\
  \ 的键是图片别名，值则是实际的图片对象。图片加载完成后，该对象会类似下面这样：\n\n```\nthis._images = {\n    \"knight\"\
  : [已加载的图片],\n    \"arch-left\": [已加载的图片],\n    \"arch-right\": [已加载的图片]\n}\n```\n\
  \n一旦图片加载完成，就可以非常方便地获取它们，如清单 4-5 所示。\n\n**清单 4-5.** *`get` 函数通过别名返回已加载的图片*\n\n```\n\
  _p.get = function(key) {\n    return this._images[key];\n};\n```\n\n`ImageManager`\
  \ 类中最有趣的部分当然是 `load` 函数，它负责排队加载图片。清单 4-6 展示了这个函数的完整代码，我接下来会对其进行解释。\n\n**清单 4-6.**\
  \ *ImageManager 类的核心：发起图片加载的 `load` 函数*\n\n```\n_p.load = function(images, onDone,\
  \ onProgress) {\n    // 图片队列\n    var queue = [];\n    for (var im in images) {\n\
  \        queue.push({\n            key: im,\n            path: images[im]\n    \
  \    });\n    }\n    if (queue.length == 0) {\n        onProgress && onProgress(0,\
  \ 0, null, null, true);\n        onDone && onDone();\n        return;\n    }\n \
  \   var itemCounter = {\n        loaded: 0,\n        total: queue.length\n    };\n\
  \    for (var i = 0; i < queue.length; i++) {\n        this._loadItem(queue[i],\
  \ itemCounter, onDone, onProgress);\n    }\n};\n```\n\n我们为用户想要加载的图片创建了一个队列。对于每张图片，我们存储其\
  \ `key`（别名）和 `path`（路径）。如果发现队列为空，我们会立即通知两个监听器，表示加载已完成（实际上，如果没有需要加载的内容，加载就会立即完成且没有任何错误）。\n\
  \n请注意下面这个表达式：\n\n```\nonProgress && onProgress(0, 0, null, null, true);\n```\n\n\
  它的含义是“如果 `onProgress` 存在（不是 `null` 或 `undefined`），则调用它，否则什么都不做。” 这个表达式是一个简单的逻辑与（AND）运算。其巧妙之处在于：当表达式的第一部分为\
  \ `false`（`null` 和 `undefined` 会被转换为 `false`）时，结果保证为 `false`，因此 JavaScript 解释器就不会再去处理后续部分。\n\
  \n\n```markdown\n# 排版后的内容\n\n调用整个第二部分。换句话说，该表达式表示：“如果`onProgress`函数已定义，则调用它。” 这等价于：\n\
  \n```javascript\nif (onProgress)\n    onProgress(0, 0, null, null, true)\n```\n\n\
  但被写成一行代码。您可以根据自己的喜好选择哪种写法。\n\n接下来，我们创建`itemCounter`——用于跟踪此特定队列执行进度的对象：队列中的项目数量以及已加载的项目数量。请注意，`itemCounter`是一个局部变量，它“关联”于单个队列，而不是整个对象。如果您决定调用两次`load()`：\n\
  \n```javascript\nimageManager.load({\n    \"arch-left\": \"img/arch-left.png\",\n\
  \    \"arch-right\": \"img/arch-right.png\"\n}, onArchLoaded, onArchProgress);\n\
  \nimageManager.load({\n    \"knight\": \"img/knight.png\"\n}, onKnightLoaded, onKnightProgress);\n\
  ```\n\n那么您将拥有两个不同的队列、两个不同的计数器以及一组不同的回调函数。这些计数器不会冲突，同时调用也完全正常。如果我们使用单个共享对象来保存项目，则会出现各种错误。尽管此功能可能不常用，但让代码尽可能健壮是件好事。\n\
  \n在最后几行中，我们调用了`_loadItem()`——该函数为每个项目创建`Image`对象并设置`src`属性，以使浏览器加载图像。此函数的代码如清单 4-7\
  \ 所示。\n\n**第 4 章：动画与精灵**\n\n**清单 4-7.** `_loadItem`函数，用于启动加载并为队列中的每个图像设置`onload`和`onerror`回调\n\
  \n```javascript\n_p._loadItem = function(queueItem, itemCounter, onDone, onProgress)\
  \ {\n    var self = this;\n    var img = new Image();\n    img.onload = function()\
  \ {\n        self._images[queueItem.key] = img;\n        self._onItemLoaded(queueItem,\
  \ itemCounter, onDone, onProgress, true);\n    };\n    img.onerror = function()\
  \ {\n        self._onItemLoaded(queueItem, itemCounter, onDone, onProgress, false);\n\
  \    };\n    img.src = queueItem.path;\n};\n```\n\n这行代码：\n\n```javascript\nvar self\
  \ = this;\n```\n\n是您在需要使用回调时使用的典型模式。在回调函数体内，`this`关键字引用的是状态发生变化的图像，而不是`ImageManager`对象。为了保存对`ImageManager`实例的引用，我们引入了一个名为`self`的额外变量。如果没有`self`变量，则无法从回调代码中引用`ImageManager`函数。解决此问题的另一种方法是使用`bind()`函数，我们将在本书后面探讨。\n\
  \n`_loadItem()`函数中的其余代码很容易理解。对于队列中的每个图像，它都会注册`onload`和`onerror`监听器。如果图像加载成功，则会使用相应的键将其添加到内部存储中。\n\
  \n`_onItemLoaded()`函数只是调用传递给原始`load()`函数的监听器。请看清单 4-8 中的代码。\n\n**清单 4-8.** `_onItemLoaded`函数处理图像加载的结果，包括成功和失败两种情况\n\
  \n```javascript\n_p._onItemLoaded = function(queueItem, itemCounter, onDone, onProgress,\
  \ success) {\n    itemCounter.loaded++;\n    onProgress && onProgress(itemCounter.loaded,\
  \ itemCounter.total,\n                             queueItem.key, queueItem.path,\
  \ success);\n    if (itemCounter.loaded == itemCounter.total) {\n        onDone\
  \ && onDone();\n    }\n};\n```\n\n由于图像已加载完毕（无论成功与否），此函数会增加计数器，并使用适当的参数调用`onProgress`。如果计数器达到了图像总数，则`onItemLoaded()`还会调用`onDone()`。\n\
  \n就是这样。这个小型类（仅约 50 行）使图像加载变得更加容易！此外，它还具有一些非常好的特性。首先，您可以在并行队列中加载图像，而无需担心计数器冲突。其次，两个回调都是可选的。因此，如果您只需要知道图像何时加载完毕，而不关心进度，您的代码将变得更加简单，如下所示：\n\
  \n```javascript\nimageManager.load({\n    \"arch-left\": \"img/arch-left.png\",\n\
  \    \"arch-right\": \"img/arch-right.png\"\n}, function() {\n    // 加载完成后的回调\n\
  });\n```\n```\n\n\n```javascript\nalert(\"两个架构部分均已加载\");\n```\n\n`});`\n\n借助 `ImageManager`\
  \ 加载图像的完整示例，连同本章的源代码，一并收录在 `01.basic_image_manager.html` 文件中。\n\n#### 使用数据 URL 作为图像\n\
  \n还记得我曾提到，为一个非关键图像加载失败时使用的占位图创建一个备用方案是个好主意。例如，在 3D 应用中，单个纹理丢失并不足以成为用错误终止游戏的充分理由。\n\
  \n现在我们来思考几个问题。如果我们连占位图都无法加载，该怎么办？有没有一种方法可以确保图像无论如何都能被加载？事实证明，确实存在这样的方法。毕竟，图像就是一组字节，那么，如果我们将这些字节直接存储在\
  \ JavaScript 代码中，并将其直接传输到图像对象中，会怎样呢？\n\n有一种方法可以实现。`Image` 对象的 `src` 属性支持所谓的 **data\
  \ URL（数据 URL）**。数据 URL 的样式如下：\n\n```\ndata:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAAm0lEQVRoQ+\n\
  3YMRWAMBQEwcRT/Cv4nuAhYYtQDQaAyXIFe2aedfk65+zLt1jbiwRiJxKwpBWwlrSClrQClrQKlrSKlt\n\
  UKWtIKWFarYEmraFmtoCWtgGW1Cpa0ipbVClrXf5x9z/LHvzMvEk7diRQsaRUtH3vQklbAslsFS1pFy2\n\
  oFLWkFLKtVsKRVtKxW0JJWwLJaBUtaRctqBa0X1+W43qGn25cAAAAASUVORK5CYII=\n```\n\n**图 4-4.**\
  \ *无图占位符*\n\n**注意：** 数据 URL 背后并没有什么魔法。其格式非常简单：`data:[<MIME 类型>][;charset=<编码>][;base64],<数据>`。在我们的例子中，MIME\
  \ 类型是 `image/png`，且省略了字符集/编码部分。这里没有二进制图像编码，字符集/编码部分仅对文本信息有意义。然后，在 `base64` 之后是 Base64\
  \ 编码的 PNG 数据。\n\n`Base64` 是一种以文本字符串形式编码二进制数据的格式。`Base64` 用于在操作文本的系统中存储二进制数据。例如，无法将图像放入\
  \ XML 节点中，因为图像文件是二进制格式；而 XML 节点只能包含文本。由于 `Base64` 是一种文本格式，你可以将图像编码为 `Base64` 并存储在\
  \ XML 节点中。数据 URI 是另一个例子。URI 是文本，在其原始形式中不能附加任何二进制数据，但 `Base64` 编码解决了这个问题，并允许在有效的\
  \ URI 内存储图像数据。\n\n本质上，数据 URL 是某些二进制数据的字符串表示形式，其前面带有元数据。例如，这个 URL 代表一个 50×50 像素的小图像，白色背景上有两个灰色矩形——正是我用作“无图”占位符的那个（见图\
  \ 4-4）。\n\n根据这个字符串构建图像的代码相当简单，如清单 4-9 所示。\n\n**清单 4-9.** *从数据 URL 创建图像*\n\n```javascript\n\
  var image = new Image();\nimage.src = \"data:image/png;base64,iVBORw0KGgoAAAAN …\
  \ 5CYII=\";\n```\n\n这是一种在 JavaScript 中创建有效图像的可靠方法。这里不涉及网络操作，图像数据直接传输到 `Image` 对象中。尽管看起来图像是瞬间创建的，但对于数据\
  \ URL 并非如此。图像的加载方式与从网络下载的图像完全相同——在触发 `onload` 监听器之前，你无法使用它。另一方面，加载过程非常快，你可以放心地认为，该图像的创建速度会快于任何从服务器下载的其他图像。\n\
  \n使用数据 URL 作为图像数据源的完整示例，可以在本章的源代码文件 `02.data_url.html` 中找到。\n\n让我们更新管理器，使其对无图占位符使用数据\
  \ URL（见清单 4-10）。\n\n**清单 4-10.** *更新 ImageManager 以使用数据 URL 作为占位符*\n\n```javascript\n\
  function ImageManager(placeholderDataUri) {\n\n    this._imageQueue = [];\n\n  \
  \  this._images = {};\n\n    if (placeholderDataUri) {\n\n        this._placeholder\
  \ = new Image();\n\n        this._placeholder.src = placeholderDataUri;\n\n    }\n\
  \n}\n```\n\n```javascript\n_p._loadItem = function(queueItem, itemCounter, progressListener)\
  \ {\n\n    ...\n\n    img.onerror = function() {\n    }\n};\n```\n\n\n\n`self._images[queueItem.key]\
  \ = self._placeholder ? self._placeholder : null;`\n\n`self._onItemLoaded(queueItem,\
  \ itemCounter, progressListener, false);`\n\n`img.src = queueItem.path;`\n\n现在，如果为\
  \ `ImageManager` 提供了占位图，它会创建一个图像，并将其用于 `_images` 数组中那些下载失败的图像。\n\n最后一个要讨论的问题是如何获取图像的\
  \ Data URL。最简单的方法是将这个任务交给 Canvas。清单 4-11 展示了我是如何创建占位图像的。\n\n**清单 4-11.** *使用 Canvas\
  \ 生成 Data URL*\n\n```\nctx.fillStyle = \"#CCC\";\nctx.fillRect(0, 0, 25, 25);\n\
  ctx.fillRect(25, 25, 25, 25);\nalert(canvas.toDataURL(\"image/png\"));\n```\n\n\
  `toDataURL` 方法会创建 Canvas 内容的“截图”，并按照指定格式进行编码。获得包含 URL 的字符串后，你可以按任意方式使用它——例如，作为占位图，或者将其发送到服务器作为用户的截图存储。这完全取决于你的想象力。\n\
  \n清单 4-12 是我们的 `ImageManager` 类的完整源代码，其中包含了对占位图的支持。\n\n## 第 4 章：动画与精灵\n\n**清单 4-12.**\
  \ *支持占位图的 ImageManager 完整源代码*\n\n```\nfunction ImageManager(placeholderDataUri)\
  \ {\n   this._images = {};\n   if (placeholderDataUri) {\n      this._placeholder\
  \ = new Image();\n      this._placeholder.src = placeholderDataUri;\n   }\n}\n_p\
  \ = ImageManager.prototype;\n_p.load = function(images, onDone, onProgress) {\n\
  \   // 图像队列\n   var queue = [];\n   for (var im in images) {\n      queue.push({\n\
  \         key: im,\n         path: images[im]\n      });\n   }\n   if (queue.length\
  \ == 0) {\n      onProgress && onProgress(0, 0, null, null, true);\n      onDone\
  \ && onDone();\n      return;\n   }\n   var itemCounter = {\n      loaded: 0,\n\
  \      total: queue.length\n   };\n   for (var i = 0; i < queue.length; i++) {\n\
  \      this._loadItem(queue[i], itemCounter, onDone, onProgress);\n   }\n};\n_p._loadItem\
  \ = function(queueItem, itemCounter, onDone, onProgress) {\n   var self = this;\n\
  \   var img = new Image();\n   img.onload = function() {\n      self._images[queueItem.key]\
  \ = img;\n      self._onItemLoaded(queueItem, itemCounter, onDone, onProgress, true);\n\
  \   };\n   img.onerror = function() {\n      self._images[queueItem.key] = self._placeholder\
  \ ? self._placeholder : null;\n      self._onItemLoaded(queueItem, itemCounter,\
  \ onDone, onProgress, false);\n   };\n   img.src = queueItem.path;\n};\n_p._onItemLoaded\
  \ = function(queueItem, itemCounter, onDone, onProgress, success) {\n   itemCounter.loaded++;\n\
  \   onProgress && onProgress(itemCounter.loaded, itemCounter.total, queueItem.key,\
  \ queueItem.path, success);\n   if (itemCounter.loaded == itemCounter.total) {\n\
  \      onDone && onDone();\n   }\n};\n_p.get = function(key) {\n   return this._images[key];\n\
  };\n```\n\n#### 图像加载技巧\n\n现在你已经知道了如何从服务器加载图像，以及如何通过 Data URL 将图像数据直接嵌入到 JavaScript\
  \ 代码中。但哪种方式更好呢：是下载一百张小图，还是下载一张包含所有图形的大图？或者，将所有图像嵌入为一个巨大的 Data URL 并确保它能够被加载，这样是不是更有意义？\n\
  \n##### 尺寸 vs. 数量\n\n管理几十张小图片非常令人头疼。下载一张图片的过程涉及到向服务器发送一个独立的请求，而完成这个请求需要时间。图片越多，意味着请求越多、流量越大、等待时间越长。\n\
  \n另一方面，一张大图片意味着在下载过程中，用户界面无法显示任何有意义的进度。尽管你可以实现重试策略来重新下载损坏的图片，但拥有小块数据还是比一大块数据要好。\n\
  \n当你在决策图像加载策略时，应该考虑到图像是缓存的最佳候选对象。浏览器会非常积极地缓存图像文件，因为图像内容发生变化的可能性极低。\n\n在游戏开发中，图像经常需要更新。你可能需要对游戏进行改版，或者添加新的道具或关卡。你可能想在圣诞节时给主角戴上圣诞帽，或者在背景中添加一棵棕榈树。\n\
  \n\n\n"
- "# 图像优化策略\n\n你有一张巨大的单张图像，即便是微小的更新也会强制客户端重新下载所有游戏内容。换句话说，这非常令人头疼。\n\n一般的推荐做法是将精灵图按类别拆分；例如，主角一张图，敌人一张图，关卡物品一张图，等等。如果你决定更新某个物品，只需要重新下载一张图。\n\
  \n你还应该考虑到，在游戏开始的第一分钟内，你几乎不可能需要所有游戏图形。例如，平台射击游戏通常有多个关卡。每个关卡可能有独特的图形——比如独特的背景或独特的敌人——这些图形在其他关卡中并不需要。显然，你不应该在用户到达某个关卡之前就下载这些图形。那将是浪费时间和带宽。\n\
  \n## 文件与数据 URL\n\n`Data URL` 并不是处理图像的常见方式。尽管 `Data URL` 有很多优点，但它们也有缺点。\n\n第一个也是最明显的缺点是\
  \ `Data URL` 难以管理。你可以在查看器应用程序中遍历图像，轻松找到你需要的图像。而 `Data URL` 是一堆乱码；你无法区分编码为 `Data\
  \ URL` 的汽车图像和同样方式编码的仓鼠图像（除非你是机器人，或者拥有即时解码 `Base64` 的特殊超能力）。\n\n图像以二进制文件存储时占用空间更小。`Data\
  \ URL` 的大小比同一图像作为文件的大小大约大 30%。如果你使用的网页服务器正在压缩内容，这个比率会略好一些，但二进制文件仍然更优。\n\n使用 `Data\
  \ URL` 会将脚本与资源“耦合”，这是一种不好的做法。一旦你修改了其中任何一个，客户端就必须重新下载整个文件。编辑图像后，你必须重新生成 `Data URL`。每次设计师改动一个像素，你就必须更新代码。\n\
  \n`Data URL` 的好处在于它们是文本。它们可以通过只接受文本的系统传输。它们可以嵌入到代码中，但这并不意味着它们应该被嵌入到代码中。上一节中的例子——占位图像——是\
  \ `Data URL` 的正确用法。我们想确保图像始终对脚本可用，这就是我们使用 `Data URL` 的原因。\n\n`![](img/index-144_1.jpg)`\n\
  \n第四章：动画与精灵图\n\n**139**\n\n## 那么策略是什么？\n\n检查你的游戏是否需要在启动时加载所有图形，或者某些文件可以等到玩家到达游戏中的某个节点再加载。如果是这种情况，你应该将可以延迟加载的图形分开，并在需要时才加载它们。\n\
  \n一张合适的图像大小应该在 `50 KB` 到 `250 KB` 之间。如果小于这个范围，会产生大量请求，因此你应该将几个小文件合并成一个大文件（包含多个小精灵图的大图像被称为精灵表，我们将在本章后面讨论）。如果你的文件明显更大，它们会卡住进度指示器。此外，如果你修改了其中哪怕一个像素，你就必须从服务器重新下载它。\n\
  \n在有充分理由时使用 `Data URL`；否则，就使用传统的图像文件。\n\n### 绘制图像\n\n加载图像本身并不有趣，但一旦你知道如何加载它，你就可以在画布上绘制它了。让我们继续我们的绘制实验。\n\
  \n#### 如何绘制图像\n\n`Context2D API` 中有一个专门的函数用于绘制图像，它叫做 `drawImage()`。其思路是从图像（源）中获取一个矩形像素区域，并将其适配到画布（目标）中的矩形区域，如图\
  \ 4-5 所示。\n\n***图 4-5.** 在画布上绘制图像*\n\n`![](img/index-145_1.jpg)`\n\n第四章：动画与精灵图\n\
  \n该函数接受八个参数：\n\n```\ndrawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)\n\
  ```\n\n\n\n第一个参数是我们加载的`Image`对象。接下来的四个参数：`sx`、`sy`、`sWidth`和`sHeight`定义了要绘制的图像部分，此矩形外的所有内容将被忽略。参数名中的小写‘`s`’代表“`source`”（源）。最后四个参数定义画布上的一个矩形，用于将图像部分绘制进去。参数名中的小写‘`d`’代表“`destination`”（目标）。\n\
  \n如果目标矩形与源矩形不同（更大、更小或边长比例不同），图像将被缩放以适应目标区域（见图 4-6）。栅格图像在未缩放时效果最佳，因此应尽量保持源矩形和目标矩形的大小一致。不过，这种效果可用于制作精美的动画。\n\
  \n**图 4-6.** 如果源矩形与目标矩形不同，图像将被缩放以适应目标区域。此示例显示了一个不成比例的变化，导致图像在宽度方向上的缩放程度大于高度方向。\n\
  \n*回想一下，精灵图缩放效果不佳。过度缩放或不成比例缩放会使精灵图看起来相当糟糕。*\n\n现在，让我们加载精灵图表并在画布上绘制一个精灵。第一步是使用`ImageManager`加载图像。完成后，我们就可以继续绘制实际的精灵图。清单\
  \ 4-13 中的函数绘制了一个单独的动画帧。\n\n**第 4 章：动画与精灵**\n\n**141**\n\n**清单 4-13.** 从精灵图表绘制单个精灵的函数\n\
  ```javascript\nfunction drawPlayer() {\n    var canvas = document.getElementById(\"\
  mainCanvas\");\n    var ctx = canvas.getContext(\"2d\");\n    var playerImage =\
  \ imageManager.getImage(\"player\");\n    ctx.drawImage(playerImage, 8, 8, 40, 40,\
  \ 50, 50, 40, 40);\n}\n```\n\n如你所见，我们限定了图像区域——第一个矩形`(8, 8, 40, 40)`覆盖了一个动画帧。源矩形的大小与目标矩形相同，因此图像不会被缩放。这是从精灵图表绘制精灵的常用方法。关于如何在画布上绘制图像的完整示例，可在本章源代码的`03.drawing_image.html`文件中找到。\n\
  \n还有另外两种绘制图像的方式，如清单 4-14 所示。\n\n**清单 4-14.** `drawImage`的简写版本\n```javascript\n//\
  \ 在画布的 (dx, dy) 点绘制整个图像，不进行缩放。\nctx.drawImage(image, dx, dy);\n// 这是以下完整版本的简写\n\
  ctx.drawImage(im, 0, 0, im.width, im.height, dx, dy, im.width, im.height);\n\n//\
  \ 缩放图像以适应矩形 (dw, dh) 并在 (dx, dy) 处绘制\ndrawImage(image, dx, dy, dw, dh)\n// 这是以下完整版本的简写\n\
  ctx.drawImage(im, 0, 0, im.width, im.height, dx, dy, dw, dh);\n```\n\n这些版本的绘图函数参数数量较少。但它们都作用于整个源图像，不允许从精灵图表中选取精确的帧。这就是为什么它们在游戏开发中不太有用。\n\
  \n**绘制性能**\n\n在基于精灵的游戏中，每个人都会问同样的问题：每帧实际能绘制多少个精灵？绘制四个小的`32 × 32`图像效果好，还是使用一个大的`64\
  \ × 64`图像更好？答案很大程度上取决于三个参数：硬件、软件以及你正在使用的图像。我在[`jsperf.com/draw-image`](http://jsperf.com/draw-image)上编写了几个测试，来观察它在不同浏览器和硬件上的实际表现。我检查了`PNG`透明度、图像大小、图像内容和缩放如何影响绘制性能。\n\
  \n当我第一次执行这些测试时，我对结果感到惊讶。不同的浏览器似乎针对不同类型的图像渲染进行了优化。\n\n**第 4 章：动画与精灵**\n\n例如，谷歌`Chrome`以几乎相同的速度渲染每种类型的图像：无论大小、是否透明、是从精灵图表中截取的还是原样绘制的。其他浏览器的表现则完全不同。\n\
  \n\n\n用户偏好不透明背景的图像，而非同一图像的纯色背景。Safari 浏览器则偏好透明图像。\n\n几乎不可能给出适用于所有浏览器的优化建议：有些浏览器渲染图形更快，有些则稍慢。不过，仍有一些相对恒定的行为可被用于优化。\n\
  \n**注意：** `jsperf.com` 测试的结果是每秒迭代次数。换句话说，它告诉你一秒钟内可以执行某个任务多少次——次数越多越好。这些数字不应被视为衡量某个操作速度的绝对数值。测试结果用于比较一个操作比另一个操作快多少。哪个操作更快：将数字乘以`0.5`还是除以`2`？这正是`jsperf.com`旨在回答的问题。如果你对某种方法相对于另一种方法的有效性有任何疑问，请毫不犹豫地使用这个小巧实用的工具。\n\
  \n较小的图像通常比较大的图像绘制得更快。这听起来像是一个显而易见的观察，但有趣的一点是，绘制一张大图比用几张小图覆盖相同区域要“更便宜”。我测试了一组`25`个精灵。一组`64\
  \ × 64`的精灵每秒执行了`306`次重绘，而一组`32 × 32`的精灵则达到了`506`次（记住，次数越多越好）。要覆盖与大精灵相同的面积，我需要绘制`100`个小精灵，因为一个`64\
  \ × 64`的精灵覆盖的面积是一个`32 × 32`精灵的四倍。考虑到面积因素的相对数字是：大精灵覆盖面积时为`306`，而小精灵覆盖面积时为`127`（`506\
  \ ÷ 4 = 127`）。大精灵完成工作的速度几乎快了`三倍`！\n\n缩放是魔鬼。当我测试图像缩放行为时，几乎所有浏览器都出现了极端的性能下降。在标准的 Android\
  \ 2.2 浏览器中，将一个`32 × 32`的图像缩放到`64 × 64`的大小所需的时间是绘制未缩放的`64 × 64`图像的两倍。Firefox Mobile\
  \ 绘制它的速度慢了`九倍`（在撰写本文时）。结论：如果你想支持不同尺寸的精灵，最好创建不同的资源集——一套用于低分辨率，一套用于高分辨率。如果你试图在运行时进行缩放，CPU\
  \ 是不会感激你的。\n\n![图 4-7](img/index-148_1.jpg)\n\n**第 4 章：动画和精灵**\n\n**143**\n\n精灵图集比单个图像工作得稍慢一些。等等！但你刚才说精灵图集很好！是的，它们很好——尤其是在通过\
  \ 3G 网络传输图像时；但当你需要绘制它时，单个图像会赢得比赛。性能损失有多严重？没那么严重：单个图像每秒`306`次操作，而同一图像从精灵图集中裁剪出来则为`267`次操作。在一个精灵密集型的游戏中，尽可能榨取每个\
  \ CPU 周期仍然很重要，但逐帧加载图像是不可行的。你已经看到了如何使用数据 URL 从`canvas`对象构建图像。你可以在此处使用相同的方法：将图像作为精灵图集传输，但在浏览器中将其转换为一组单独的图像。在加载时间上多花几秒钟通常是换取性能提升的好代价。\n\
  \n小数像素会扼杀性能。在大多数浏览器上，使用小数坐标（如`(1.5, 1.5)`）绘制精灵比在`(1, 1)`或`(2, 2)`上绘制同一图像要慢得多。性能损失的程度与缩放图像相当。还记得第\
  \ 1 章中描述的模糊线条吗？精灵的工作方式相同：浏览器使用抗锯齿来绘制小数坐标处的精灵，从而带来图像预处理和边界上的半透明像素，这两者都倾向于消耗 CPU（见图\
  \ 4-7）。解决方案很简单：在绘制前对坐标执行`Math.round()`。没有小数部分，就不会有问题。\n\n\n\n**图 4-7.** *使用整数坐标（左图）与小数坐标（右图）绘制的效果。右图输出耗时是左图的九倍，且视觉效果并不理想。*\n\
  \n在撰写本书时，Android 2.2 的标准浏览器会忽略子像素值，以完全相同的效果绘制图像。这就是为何在整数坐标与小数坐标下绘制效果相同的原因。然而，即使你只针对\
  \ Android 平台开发，也不应忽视此问题——因为你永远无法预知玩家设备系统中默认的浏览器会是哪一款。它可能是 Firefox Mobile，而这款浏览器并不会自动修剪坐标。\n\
  \n不过，问题仍未得到解答：每秒能绘制多少精灵图？精确答案自然是“这取决于诸多因素……”，但我想各位从政治类电视节目中听到的类似回答已经够多了。为此我编写了一个简单测试用例，用于评估手机浏览器与桌面浏览器的性能表现。我假设游戏需要约\
  \ 30 FPS 才能保证流畅体验，并测试了在不低于此帧率上限前提下，可绘制的 32×32 像素精灵图数量。在我看来，使用更小的精灵图毫无意义——在当今屏幕密度下，32×32\
  \ 像素的图案已经显得非常渺小了。\n\n我的 Galaxy S 手机在 Dolphin HD 浏览器上可稳定承载约 370 个精灵图，而自带浏览器及 Fennec\
  \ 则停留在 100 个左右。\n\n桌面 PC 在处理简单精灵图方面表现更佳：Safari 可渲染约 2200 个；Google Chrome 15 与 Opera\
  \ 11 轻松达到 3200 个；IE9 达到 4500 个；Firefox 7 则管理着 5500 个。要完全铺满全高清屏幕，大约需要 2000 个精灵图。\n\
  \n**注：** 在每个测试用例中，我都会检查浏览器是否能覆盖游戏屏幕区域。若你每帧都能用全新精灵图重新渲染整个屏幕，那游戏运行应当流畅。这是一个非常粗略的衡量标准，因为它基于最坏情况。实际上\
  \ 99% 的情况下你无需更新整个屏幕。有许多技术可优化此流程，仅渲染画布中真正需要更新的部分。\n\n此外，我未将可能相当复杂的游戏逻辑纳入考量。在《愤怒的小鸟》这类游戏中，计算真实物理效果所消耗的\
  \ CPU 时间远超渲染几个方块的耗时。关于优化渲染速度的具体技术，将在第 7 章详细论述。\n\n即使处理能力不足以用瓦片铺满屏幕，也并不意味着游戏无法运行，而是需要进行更精确的基准测试，并很可能需要构建原型在目标设备上运行。每开发一款新游戏都进行此类测试是良好实践。你永远无法预知这个小实验会暴露出哪些问题。\n\
  \n### 精灵图集\n\n让我们更仔细地观察角色图像。它包含一组构成十几种动画的动画帧。每个帧在精灵图集上都有独立位置且互不重叠。各帧尺寸不同：角色静止站立时的帧比挥手时的帧要小，因为举手动作需要占据更多空间。\n\
  \n角色在帧内的位置也会随帧变化。该位置取决于角色的姿势或动作：静止站立时大致位于帧中央；蹲下时可能略微右移；挥动武器时可能左移，以此类推。\n\n当渲染流畅动画时，我们需要知道这个位置（即锚点）。当角色鞠躬时，其双脚必须固定在游戏世界的某个位置，且不随帧尺寸改变。“角色中心点”就是该帧的锚点。\n\
  \n\n\n**注意：** 在本章中，我将展示如何直接从精灵表（sprite sheet）中绘制精灵。尽管这种技术比渲染单个图像稍慢，但一旦你知道如何绘制每一帧，调整代码来预渲染每一帧会相当容易。\n\
  \n锚点（anchor point）用于在屏幕上定位帧。当我们需要在坐标点（`x`, `y`）绘制一帧时，这意味着锚点应放置在该位置，而非图像的左上角或任何其他点（见图\
  \ 4-8）。\n\n**图 4-8.** 动画帧的锚点。在每一帧中，锚点可能具有不同的坐标。\n\n我们刚刚弄清了在给定坐标集下绘制动画角色之前需要了解的帧信息：帧的大小以及该帧内锚点的坐标。如果没有合适的\
  \ API，十几个精灵表（每个表多达上百帧）很快就会变得难以管理。所以，是时候创建一个新类了！`SpriteSheet` 这个名字听起来不错。\n\n到目前为止，`SpriteSheet`\
  \ 是本书中最简单的类之一。我在清单 4-15 中展示了代码。\n\n## 第 4 章：动画与精灵\n\n**清单 4-15.** 负责绘制单个帧的 `SpriteSheet`\
  \ 类\n\n```javascript\n/**\n*\n* @param image 用于绘制的图像对象\n* @param frames 描述精灵表帧的数组，格式如下：\n\
  * [\n*   [x, y, width, height, anchorX, anchorY] // - 帧 1\n*   [x, y, width, height,\
  \ anchorX, anchorY] // - 帧 2\n*   ...\n* ]\n*/\nfunction SpriteSheet(image, frames)\
  \ {\n    this._image = image;\n    this._frames = frames;\n}\n\nSpriteSheet.FRAME_X\
  \ = 0;\nSpriteSheet.FRAME_Y = 1;\nSpriteSheet.FRAME_WIDTH = 2;\nSpriteSheet.FRAME_HEIGHT\
  \ = 3;\nSpriteSheet.FRAME_ANCHOR_X = 4;\nSpriteSheet.FRAME_ANCHOR_Y = 5;\n\n/**\n\
  * 在画布（Context）的给定坐标处绘制精灵表的帧。\n* @param ctx 要绘制的画布\n* @param index 帧的索引\n* @param\
  \ x 锚点出现的 x 坐标\n* @param y 锚点出现的 y 坐标\n*/\n_p.drawFrame = function(ctx, index, x,\
  \ y) {\n    var frame = this._frames[index];\n    if (!frame)\n        return;\n\
  \    ctx.drawImage(this._image,\n        frame[SpriteSheet.FRAME_X], frame[SpriteSheet.FRAME_Y],\n\
  \        frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT],\n    \
  \    x - frame[SpriteSheet.FRAME_ANCHOR_X],\n        y - frame[SpriteSheet.FRAME_ANCHOR_Y],\n\
  \        frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT]);\n};\n\
  ```\n\n构造函数接受两个参数：一个图像和帧的描述信息。每个帧由一个包含六个元素的数组描述：其中四个用于描述帧在精灵表中的大小和位置，另外两个用于锚点的坐标。绘制函数也非常简单：它计算给定帧的偏移量，使锚点出现在\
  \ (`x`, `y`) 位置。\n\n**注意：** 你可能注意到我创建了几个常量来引用帧数组的索引。它们的唯一目的是让代码更具可读性。将清单中的代码与下面不使用常量重写的代码进行比较：\n\
  \n```javascript\nctx.drawImage(this._image, frame[0], frame[1], frame[2],\n    frame[3],\
  \ x - frame[5], y - frame[6], frame[2],\n    frame[3]);\n```\n\n这段代码看起来更紧凑一些，但如果以后你重读这段代码，我敢打赌你不会记得索引背后的含义。\n\
  \n现在我们可以将精灵表描述与绘制代码分离开来，如清单 4-16 所示。\n\n**清单 4-16.** 使用 `SpriteSheet` 绘制精灵\n\n```javascript\n\
  var frames = [\n    [9, 8, 38, 37, 10, 36],\n    [57, 8, 39, 37, 10, 36],\n    [107,\
  \ 8, 45, 37, 10, 36],\n    [163, 8, 45, 37, 10, 36]\n];\nvar spriteSheet = new SpriteSheet(imageManager.getImage(\"\
  player\"), frames);\nspriteSheet.drawFrame(ctx, current, 10, 40);\n```\n\n**提示：**\
  \ 这些帧描述的数字从哪里来？通常由你的美术人员提供，但请务必在美术人员开始工作之前向他解释你需要帧的描述信息。否则，你将花费一个晚上的时间，用鼠标指针悬停在图像上，自己费力地找出坐标。\n\
  \n\n\n"
- "# 测量像素的图形编辑器\n\n精灵表的另一个有趣用途是渲染游戏中的光栅字体。游戏可能会使用以位图形式呈现的非常精美的字体，其中每个精灵代表一个字母或字符。\n\
  \n### 光栅字体\n\n构建一个能够使用位图字体渲染字符串的类，其复杂程度可能很简单，也可能相当复杂，具体取决于你所需的功能集。如果你只需要字符串的单行位图表示，那么花五分钟就能构建一个实现该功能的类。另一方面，如果考虑换行、对齐和间距等高级解决方案，则会变得非常复杂。排版是一个广阔而有趣的话题，超出了本书的讨论范围。\n\
  \n### 动画基础\n\n我们正逐渐接近游戏开发中最激动人心的部分之一：动画。当画面开始移动时，你的游戏就变得“活”了起来。看到你第一个动画精灵在屏幕上移动，这是一种令人难以置信的美妙感觉。\n\
  \n#### 最简单的动画\n\n如今，人人都知道动画是如何工作的。这背后并没有什么神秘之处。当你足够快地更换帧，并更新屏幕上的画面（改变其形状、位置、切换到动画序列中的下一帧，或同时执行上述所有操作）时，用户就会体验到运动的错觉。画面变得栩栩如生——宇宙飞船飞行并射击，吃豆人逃离追击，坦克转动炮塔。\n\
  \n要创建动画，我们必须实现三个步骤：\n\n1.  随时间更新画面的状态（移动画面、更换帧等）。\n2.  在屏幕上绘制画面。\n3.  等待一段时间，重复前两个步骤，绘制新帧（不要忘记清除前一帧的内容）。\n\
  \n帧变化得越快，动画对用户来说就越流畅。帧变化的速度称为帧率，以每秒帧数（即 FPS）来衡量。\n\n按照我们刚才概述的方案，我们应该创建一个渲染帧的函数，并每隔\
  \ 30 到 50 毫秒调用一次。清单 4-17 展示了实现此功能的代码。\n\n**清单 4-17.** *最简单的画布动画*\n\n```javascript\n\
  var currentFrame = -1;\n\nfunction animate(timestamp) {\n  ctx.fillStyle = \"white\"\
  ;\n  ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n  currentFrame = ++currentFrame\
  \ % 5;\n  spriteSheet.drawFrame(ctx, currentFrame, 10, 40);\n\n  requestAnimationFrame(arguments.callee);\n\
  }\n\nanimate();\n```\n\n让我们仔细看看这段代码，因为它是本章将要构建的整个动画框架的基础。函数的前两行在第二章中已经熟知：我们用纯白色清空整个画布。在绘制新帧之前，我们必须清除旧帧，因为画布不会自动清除自身，它会将新内容绘制在旧内容之上。这种方法的完整示例可在名为`05.sprite_sheet_animation.html`的文件以及本章的源代码中找到。\n\
  \n名为`current`的变量保存了动画序列中当前帧的索引。该序列总共有五帧。下一行代码`currentFrame = ++currentFrame % 5`将计数器加一，并执行取模运算（返回除以五的余数），以确保该数字永远不会大于四。这一行可以用以下更详细的方式重写：\n\
  \n```javascript\ncurrent++;\nif (current > 4)\n  current = 0;\n```\n\n它的作用与清单 4-17\
  \ 中的那一行完全相同：当计数器达到 4 后，它会回到 0，并由此继续。下一行绘制帧，最后一行安排同一函数在 50 毫秒后执行。`animate()`函数的最后一行是一个重要且新颖的概念。JavaScript\
  \ 定时器是一种简单但非常强大的机制，用于安排代码片段稍后执行。每隔几毫秒重绘帧...\n\n\n\n`milliseconds`是我们在实现动画时需要处理的核心任务之一。现在我们就来着手处理。\n\
  \n"
- "# 第四章：动画与精灵\n\n**注意：**`arguments.callee`是对函数自身的引用。例如，当我在名为`animate`的函数内部时，`arguments.callee`指向的就是这个函数——`animate()`。当你需要在函数内部引用自身时，这是最佳方式。按名称引用有其缺陷。例如，如果你重构代码，需要记得更新另一个引用。在\
  \ JavaScript 中，函数可能根本没有名称。在这种情况下，`arguments.callee`是函数被创建后访问它的唯一方式。最后一行可以理解为“在 50\
  \ 毫秒后再次调用同一个函数”。\n\n为了举例说明，让我们考虑另一种暂停脚本的方法。我们告诉 JavaScript“等待五毫秒，然后继续执行”。最糟糕且通常不可接受的方式是向\
  \ CPU 抛出一个无用的任务，并在循环中重复执行。每次循环后，检查经过了多少时间，并决定是否继续（参见清单 4-18）。请勿在家中尝试。\n\n**清单 4-18.**\
  \ 让浏览器等待 5 秒再继续的原始方法\n\n```\nvar delay = 5000; // 五秒\nvar start = new Date().getTime();\n\
  while (true) {\n    // 找点事让 CPU 忙活，比如做点数学运算？\n    Math.sin(Math.random()*2*Math.PI)\
  \ + Math.cos(Math.random()*2*Math.PI);\n    var passed = new Date().getTime() -\
  \ start;\n    if (passed > delay)\n        break;\n}\n```\n\n为了理解如何以最佳方式组织动画，需要深入\
  \ JavaScript 的内部机制，了解为什么清单 4-18 中的代码是最糟糕的做法之一，如何避免长时间运行任务带来的陷阱，并正确调度动画循环。\n\n###\
  \ JavaScript 线程模型\n\nJavaScript 是一种单线程语言。这意味着在任何给定时刻，最多只有一段代码在执行。例如，如果在另一个函数执行时，一个图片恰好加载完成，回调函数不会立即并行运行。JavaScript\
  \ 会将那段代码的执行安排在当前函数结束后。如果有多个监听器，它们会被排队并逐一执行。\n\n![图片](img/index-156_1.jpg)\n\n第四章：动画与精灵\
  \ **151**\n\n图片加载并非 JavaScript 中唯一使用回调的场景。用户输入处理代码（我们将在下一章详细讨论）也依赖类似的机制来响应触摸和鼠标点击。这意味着，当脚本执行一个长时间任务时，其余部分都会被冻结，直到任务完成。图\
  \ 4-9 说明了这一点。\n\n**图 4-9.** JavaScript 的线程模型。由于 JavaScript 是单线程的，同一时刻只能执行一段代码。长时间运行的任务会阻塞用户界面，导致应用无响应。\n\
  \n假设你正处于一个运行时间很长的重量级函数中。用户将鼠标光标移到用户界面组件上。这个操作会生成几十个事件，但在长时间运行的函数完成之前，这些事件都不会被处理。\n\
  \n从以上内容可以得出什么实际结论？有两点。\n\n- 你可以确信当前执行的代码是唯一正在运行的代码片段。如果你在一个监听器内部，不用担心在`animate()`恰好重绘场景时会发生什么；这种情况根本不可能发生。\n\
  - 任何长时间运行的函数都会阻塞输入。如果你的象棋 AI 需要 5 秒来计算最佳策略，这意味着用户至少需要等待 5 秒才能看到反馈。长时间运行的任务可以分解成较小的任务，这样就不会阻止其他部分的执行。\n\
  \n第二点听起来可能令人头疼。实际上，这完全不是问题。你只需要在设计包含长时间运行任务的应用程序时多花一点心思。\n\n\n\n## 第 4 章：动画与精灵\n\
  \n上述方法的主要优势在于，设计单线程应用程序（每个 JavaScript 应用程序都是单线程的）比编写多线程代码要简单得多。像`Java`这样的语言充分利用了线程的强大功能，但代价是需要使用复杂且非常复杂的\
  \ API 来协调多个线程的执行。更糟的是，多线程环境中的错误可能会数月不被察觉，最终仅仅因为时间上的不凑巧而导致整个系统崩溃。对多线程代码进行单元测试是一种只有少数人才能掌握的“黑魔法”。\n\
  \n既然我们了解了这些陷阱，现在回到我们的问题：如何安排`repaint`函数在稍后执行？\n\n### 定时器\n\n如我所提，JavaScript 拥有所谓的定时器，这是一种用于安排任务稍后执行的内置机制。在本节中，我们将学习定时器如何帮助处理像动画这样的重复任务。\n\
  \n#### 设置定时器\n\nJavaScript 有三个用于安排代码稍后执行的函数：`setInterval()`、`setTimeout()`和`requestAnimationFrame()`。这三个函数都做类似的事情——它们告诉浏览器：“嘿，请安排我给你的代码的执行。当你有空闲周期时，大约在\
  \ N 毫秒后调用我。”\n\nN 毫秒后，浏览器会将函数的执行排入队列，就像处理一个简单的事件监听器一样。如果队列为空，那你很幸运，你的函数会立即执行。如果队列中充满了其他任务——那么，无论你的函数多么重要，它都必须等待。\n\
  \n**注意：** 这是关于定时器的一个重要概念：它们并不能保证在你设定的时间精确触发。原因之一前面已经展示过；如果另一段代码正在执行，定时器就必须等待轮到它。即使在没有任何事件和用户活动的完全静止的页面中，定时器也无法保证准时运行。延迟可能发生，例如由于操作系统定时器的分辨率问题（但这远超本书的讨论范围）。\n\
  \n你只能依赖两件事：\n\n- 定时器绝不会在预定时间之前触发。\n- 浏览器会尽最大努力准时触发它。\n\n**提示：** 不用担心定时器延迟了一毫秒。通常用户不会注意到这个微小故障。不要追求完美，也不要试图让定时器变得完美。当我还在做\
  \ Java 游戏开发时，我花了很多时间试图让 Java 中的动画循环稍微好一点。Java 作为一个企业级平台，也存在同样的定时器问题——你不能依赖定时器的精度。这曾让我抓狂，我写了数十个测试、原生模块和变通方案，但效果几乎难以察觉。把这时间花在编写真正的游戏代码上要好得多。\n\
  \n现在让我们回到调度函数，看看它们有什么不同。\n\n`setInterval()` 每隔 N 毫秒安排一次函数的执行（参见代码清单 4-19）。\n\n**代码清单\
  \ 4-19.** `setInterval` 示例\n\n```javascript\nsetInterval(\n  function() {\n    console.log(\"\
  Hello\")\n  }, 500);\n```\n\n代码清单 4-19 中的代码会每秒两次向控制台输出单词“Hello”。\n\n`setTimeout()`\
  \ 安排函数执行一次。当然，你也可以在函数末尾再次调用`setTimeout()`，从而模拟`setInterval()`的工作方式。调用`setTimeout`有两种不同的方式；代码清单\
  \ 4-20 展示了这两种方法。第一个调用安排单次执行，而第二个调用在每次循环后再次安排执行。\n\n**代码清单 4-20.** 调用 `setTimeout`\
  \ 的两种方式\n\n```javascript\n// 将触发一次\nsetTimeout(function() {\n  console.log(\"Hello\"\
  )\n}, 500);\n\n// 几乎像 setInterval 一样工作，将永远触发\nsetTimeout(function() {\n  setTimeout(arguments.callee,\
  \ 500);\n  console.log(\"Hello\")\n}, 500);\n```\n\n`requestAnimationFrame()` 是最后一个定时器函数，也是最近才添加的。它受到绝大多数桌面浏览器的支持，但遗憾的是……\n\
  \n\n\n## 第 4 章：动画与精灵\n\n不是通过安卓原生浏览器实现的（移动版火狐浏览器支持）。顾名思义，这个函数是专门为处理动画而创建的。你不能向`requestAnimationFrame`传递超时值；由浏览器自行决定下一次动画循环的最佳时机。浏览器会将`requestAnimationCallback`与页面上的其他动画（如\
  \ CSS 过渡、DOM 动画、SVG 的 SMIL 等）进行同步，从而提升页面的整体性能。此外，如果浏览器标签页不可见，`requestAnimationFrame()`将不会触发。既然没人观看动画，何必浪费宝贵的\
  \ CPU 周期和电池电量呢？这应是 JavaScript 游戏中用于调度动画的标准方法。列表 4-21 展示了如何在 JavaScript 游戏中使用该函数来调度动画（适用于支持该功能的浏览器）。\n\
  \n**列表 4-21.** *`requestAnimationFrame`使用示例*\n\n```\nfunction animate(timestamp){\n\
  \    console.log(\"Hello\");\n    requestAnimationFrame(animate);\n}\n```\n\n在撰写本文时，此函数仍需要使用厂商特定的前缀。在\
  \ WebKit 浏览器中，它被称为`webkitRequestAnimationFrame()`；在 Opera 中，则为`oRequestAnimationFrame()`，依此类推。当该函数标准化后，浏览器厂商最终会移除前缀；但目前，使用以下由\
  \ Paul Irish 实现的填充层（列表 4-22）会更为便利。\n\n**列表 4-22.** *`requestAnimationFrame`的填充层*\n\
  \n```\nwindow.requestAnimationFrame = (function(){\n    //检查每种浏览器\n    //@paul_irish\
  \ 函数\n    //将此函数全局化，使其能在任何浏览器上运行，\n    //因为每种浏览器对此有不同的命名空间\n    return window.requestAnimationFrame\
  \ || //Chromium\n        window.webkitRequestAnimationFrame || //Webkit\n      \
  \  window.mozRequestAnimationFrame || //Mozilla Geko\n        window.oRequestAnimationFrame\
  \ || //Opera Presto\n        window.msRequestAnimationFrame || //IE Trident\n  \
  \      function(callback, element){ //后备函数\n            return window.setTimeout(callback,\
  \ 1000/60);\n        }\n})();\n```\n\n请注意这段代码是如何优雅地降级到`setTimeout()`的。即使浏览器不支持`requestAnimationFrame()`，你的代码也不会崩溃！而且，一旦浏览器增加了对这个神奇小功能的支持，你无需做任何更改就能使用它。\n\
  \n**注意：** Paul 使用的这种构造方式乍看可能令人困惑。让我们花点时间解释一下。Paul 创建了一个匿名函数，该函数返回另一个函数（记住，在 JavaScript\
  \ 中，函数像任何其他对象一样，可以被方法返回），并立即调用了它。这个函数会检查可用的`requestAnimationFrame`实现，并将其赋值给`window.requestAnimationFrame`属性：\n\
  \n```\nwindow.requestAnimationFrame = (function(){\n    // 实际的填充代码在此\n})();\n```\n\
  \n将这段代码添加到`utils.js`文件中，因为我们在本书的大部分章节中都会用到它。\n\n#### 停止定时器\n\n有时你需要取消定时器——例如，当游戏结束，不再需要任何动画时，你可能想要停止`requestAnimationFrame()`或其他定时器。我们之前描述的每个函数都有一个对应的反函数，用于停止定时器并阻止下一次调用。\n\
  \n要停止通过`setTimeout()`设置的定时器，你可以像下面这样调用`clearTimeout()`：\n\n```\nvar handler = setTimeout(function()\
  \ {alert (\"Boom\");}, 1000);\nclearTimeout(handler);\n```\n\n每个定时器函数都会返回一个用于标识该定时器的`handler`。当你的脚本中有多个定时器时，这个处理程序用于区分它们。间隔定时器遵循完全相同的模式，唯一的区别是用于停止执行的函数叫做`clearInterval()`：\n\
  \n```\nvar handler = setInterval(function() {alert (\"Tick\");}, 1000);\nclearInterval(handler);\n\
  ```\n\n最后，清除动画帧（animationFrame）会稍微复杂一些，因为存在不同的命名约定。我们需要另一个填充层来实现。\n\n\n\n"
- "# 以浏览器无关的方式实现 `cancelRequestAnimationFrame()`，并自然提供标准 `clearTimeout()` 实现作为回退方案（参见清单\
  \ 4-23）。\n\n## 第 4 章：动画与精灵\n\n**清单 4-23.** *取消 `requestAnimationFrame`*\n\n```javascript\n\
  window.cancelRequestAnimFrame = ( function() {\n    return window.cancelAnimationFrame\
  \ ||\n        window.webkitCancelRequestAnimationFrame ||\n        window.mozCancelRequestAnimationFrame\
  \ ||\n        window.oCancelRequestAnimationFrame ||\n        window.msCancelRequestAnimationFrame\
  \ ||\n        clearTimeout\n} )();\n```\n\n### 改进动画\n\n既然我们已经知道了如何组织动画序列，接下来就该思考如何改进这个简单的方案了。例如，要考虑到当前帧率可能远低于理想的\
  \ 60 FPS，并处理可能出现的画面异常。本节末尾将介绍 `Animator` 类——一个用于处理更复杂动画策略的类。\n\n#### 帧率与帧间时间\n\n\
  让我们再次回顾本节开头的动画示例。这个版本的代码（见清单 4-24）并未考虑帧率因素。动画在性能更强的设备上会渲染得更快。\n\n**清单 4-24.** *动画的基本实现*\n\
  \n```javascript\nvar currentFrame = -1;\nfunction animate(timestamp) {\n    ctx.fillStyle\
  \ = \"white\";\n    ctx.fillRect(0, 0, canvas.width, canvas.height);\n    currentFrame\
  \ = ++currentFrame%5;\n    spriteSheet.drawFrame(ctx, current, 10, 40);\n    requestAnimationFrame(arguments.callee);\n\
  }\nanimate();\n```\n\n如果你添加更多精灵并在不同设备上测试，会发现动画速度严重依赖于 CPU 和帧率（只需确保添加足够多的精灵即可）。该动画没有考虑时间因素，因此在不同的浏览器和硬件上表现会不一致。\n\
  \n如果用清单 4-24 所示的动画方法构建图形密集型游戏，你很快会发现动画速度取决于设备硬件：在无法保持稳定 60 FPS 的低性能设备上运行较慢，而在新款多核智能手机上则较快。这并不是用户对游戏的预期表现。动画速度应保持恒定，不应依赖于帧率。让我们来解决这个问题。\n\
  \n我们需要让每一帧在屏幕上停留固定的时间（例如 50 毫秒），然后再切换到下一帧。这样一来，游戏的连贯性会稍有提升。清单 4-25 所示的第二个代码版本实现了这一思路。\n\
  \n**清单 4-25.** *检查帧间经过时间的改进版代码*\n\n```javascript\nfunction animate(t) {\n    var\
