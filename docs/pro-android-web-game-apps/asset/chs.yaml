  \n## 第 8 章：浏览器中的 3D\n\n### 总结\n\n本章致力于理解 3D 引擎背后的基础。计算顶点位置和应用透视只是一个真实的引擎在游戏中为每一帧所做的第一步。其他步骤可能更复杂——例如，丢弃不可见的多边形以节省资源、为模型表面应用纹理、计算光照效果等等。3D\
  \ 引擎通常比 2D 引擎涉及更复杂的数学运算，并且它们在不断发展。开发者和数学家们致力于带来更好的算法，让渲染出的画面更加逼真。\n\n即使是最复杂的 3D\
  \ 数学运算，也是从世界中顶点的位置以及模型变换的计算开始的。如果你以前从未接触过 3D 图形，那么现在你已经是为数不多的真正理解自己在做什么的 3D 开发者之一了。\n\
  \n在本章中，我们构建了最简单的 3D 演示——一个旋转的立方体。在此过程中，我们学到了几个重要的方面：\n\n-   模型在内存中的表示方式\n-   如何使用矩阵来移动、旋转或缩放模型\n\
  -   如何渲染线框\n-   投影以及如何在场景中实现透视\n\n现在，我们准备探索一个更高级的主题：WebGL API。\n\n## 第 9 章\n\n###\
  \ 使用 WebGL\n\nWebGL 是一项非常有前景的倡议，它已经征服了大部分桌面浏览器世界。WebGL 是一个 API，它将显卡的资源暴露给你的 JavaScript\
  \ 应用程序。有了 WebGL，你可以创建 3D 游戏并在浏览器中运行，而无需像我们在第 8 章中那样自己实现所有 3D 数学运算。WebGL 基于 `OpenGL\
  \ ES 2.0`（嵌入式系统 OpenGL，一个适用于移动设备的 `OpenGL` API 子集）。\n\nWebGL 在移动端网页中才刚刚起步。它尚未获得\
  \ Android 设备的广泛支持。事实上，只有 Firefox Mobile 支持这一对游戏开发者至关重要的 API。其他先行者包括索尼爱立信的 Xperia\
  \ 手机——它们也在原生浏览器中支持 WebGL。在撰写本文时，除 IE 外，所有主要的桌面浏览器都支持 WebGL。\n\n本章专门介绍 WebGL。这项技术尚未为\
  \ Android 网页游戏的大众市场做好准备，但它正变得越来越受游戏开发者欢迎。本章的目标是向你介绍这项尖端技术。\n\n\n\nedge API，并为您在更多设备支持该\
  \ API 时创建游戏做好准备。本章是 3D 编程的入门简介。我们将构建几个示例，演示如何使用 `WebGL` 的各个方面。我们将执行以下操作：\n\n- 在移动浏览器中初始化\
  \ `WebGL` 上下文\n- 学习 `WebGL` 渲染管线\n- 使用 OpenGL 着色语言（`GLSL`），这是一种用于着色器的语言\n- 显示基本图元\n\
  - 加载纹理并学习如何渲染它们\n- 从二进制源加载 3D 模型\n\n本章的目标是让您对 `WebGL` 有一个扎实、基本的理解。您将学习 3D 程序的结构，并具备足够的知识来继续自行探索。阅读完本章后，您将有很多资源可以自行探索。\n\
  \n### WebGL 基础\n\n制作一个展示 3D 渲染效果的 `WebGL` 示例网页，比在 2D 上下文中渲染一个三角形或圆形要复杂一些。之所以复杂，是因为渲染是在显卡上执行的，而不是在\
  \ `JavaScript` 代码中，并且您必须用来将渲染参数传递给 GPU 的 API 是相当底层的。`WebGL` 的学习曲线很陡峭——它涉及相当多的数学知识，但在阅读前一章后，您会很快掌握它。\n\
  \n在本章中，我们将使用 `Firefox` 在桌面端和智能手机上运行和调试我们的示例。从 [desktop from www.mozilla.org/en-US/firefox/new/](http://www.mozilla.org/en-US/firefox/new/)\
  \ 下载并安装适用于桌面的最新版本。然后安装 `Firebug` ([`getfirebug.com`](http://getfirebug.com))，这个插件可以为\
  \ `Firefox` 添加开发工具，类似于我们在 `Chrome` 中使用的。安装最新版本的 `Firefox` 移动版 ([www.mozilla.org/en-US/mobile/](http://www.mozilla.org/en-US/mobile/))，或者从您的设备应用商店中查找。\n\
  \n**注意：** 在桌面上使用兼容的浏览器不能保证 `WebGL` 能为您工作。拥有受支持的显卡和最新的驱动程序非常重要。\n\n`WebGL` 有黑名单和白名单，用于确定对每个单独案例的支持级别。更多信息请参见官方\
  \ `WebGL` 维基：[www.khronos.org/webgl/wiki/BlacklistsAndWhitelists](http://www.khronos.org/webgl/wiki/BlacklistsAndWhitelists)。如果您的显卡或驱动程序被列入黑名单，您可以自行承担风险启用\
  \ `WebGL`。在 `Firefox` 中，转到 `about:config` 页面，找到 `webgl.force-enabled` 标志，并将其设置为\
  \ `true`。这将使 `Firefox` 绕过黑名单。\n\n### 初始化 WebGL\n\n`WebGL` 作为 `canvas` 的上下文暴露给 `JavaScript`，因此大部分代码保持不变。但是，有几个\
