  \n图 5-7 展示了该操作的组成部分以及操作结果——也就是你预期会看到的结果。房子图像先被绘制；因此，在绘制圆形时，它已经在画布上了。房子是目标。圆形后绘制，所以它是源。\n\
  \n![](img/index-214_1.jpg)\n\n![](img/index-214_2.jpg)\n\n**图 5-7.** *默认复合操作：source-over*\n\
  \n这是绘画的自然方式。当你绘制图像时，你期望它出现在任何现有背景图像之上。然而，这条规则可以很容易地改变。如果你将`globalCompositeOperation`设置为`\"\
  source-atop\"`，新绘制的像素只会出现在背景不透明的地方，如图 5-8 所示。\n\n**图 5-8.** *source-atop 复合操作。源像素仅当背景不透明时才出现在背景之上；其他所有部分都被裁剪。*\n\
  \n这正是制作图像遮罩所需要的！但我们将使用覆盖整个图像的纯色矩形，而不是带有花哨图案的圆形。我们首先绘制图像（目标），然后用由唯一对象 ID 定义的颜色覆盖它。这个概念非常简单但非常强大。图\
  \ 5-9 展示了如何使用`source-atop`操作制作图像遮罩。\n\n![](img/index-215_1.jpg)\n\n**图 5-9.** *使用\
  \ source-atop 操作的图像遮罩。纯色矩形仅覆盖图像的非透明部分。*\n\n**注意：** Canvas API 还提供了其他几种复合操作。如果你对深入了解此主题感兴趣，请查看名为`08.composites.html`的演示，该演示随本章材料提供。它展示了每个可用复合操作的效果。关于颜色合成背后数学的更多正式描述，请参考\
  \ Thomas Porter 和 Tom Duff 的论文《合成数字图像》。*计算机图形学* 18, 第 3 期 (1984 年 7 月)。\n\n现在让我们在实践中实现这一技术。我们从清单\
  \ 5-26 中的两个函数开始。\n\n**清单 5-26.** *使用从图像 ID 派生的颜色绘制图像遮罩*\n\n```\nfunction numberToColor(n)\
  \ {\n    var hexString = n.toString(16);\n    // 添加填充\n    return \"#\" + \"000000\"\
  .substr(0, 6 - hexString.length) + hexString;\n}\n\nfunction drawImageMask(image,\
  \ x, y, maskColor, ctx) {\n    var w = bufferCanvas.width = image.width;\n    var\
  \ h = bufferCanvas.height = image.height;\n    var maskCtx = bufferCanvas.getContext(\"\
  2d\");\n    // 原始图像先绘制，它是目标\n    maskCtx.drawImage(image, 0, 0);\n    // 设置复合操作\n\
  \    maskCtx.globalCompositeOperation = \"source-atop\";\n    maskCtx.fillStyle\
  \ = maskColor;\n    maskCtx.fillRect(0, 0, w, h);\n}\n```\n\n\n\n`ctx.drawImage(bufferCanvas,\
  \ x, y);`\n\n第一个函数`numberToColor()`是一个小型工具，它将对象的数字 ID 转换为适合设置填充样式的颜色表示。第二个函数使用不可见的`bufferCanvas`来创建遮罩图像。然后，从`bufferCanvas`将纯色遮罩绘制到作为参数传递的`context`上。您可以在此处插入任何复杂的渲染代码，而不仅仅是绘制图像，因为一旦像素位于`context`上，无论原始来源是\
  \ PNG 图像还是 JavaScript 例程，都无关紧要。\n\n如果您以这种方式绘制每个图像，获取所选像素的颜色并找到所选形状就相当容易（参见`Listing\
  \ 5-27`）。展示如何渲染图像遮罩的示例可以在`05.mask.html`文件中找到，该文件与本章节的其他源代码一同提供。\n\n**`Listing 5-27.`**\
  \ *从颜色转换为图形 ID*\n\n```\nvar imageData = pixelContext.getImageData(x, y, 1, 1).data;\n\
  \n// The black color is default, so we have to draw masks starting from\n// color\
  \ “1” (or take alpha values into the account). To return back\n// from color to\
  \ array index we have to subtract 1 back.\nvar index = (imageData[0] << 16 | imageData[1]\
  \ << 8 | imageData[2]) - 1;\nconsole.log(“User selected index “ + index.toString(16));\n\
  ```\n\n加粗的位运算可能需要一点解释。它从三个颜色分量中恢复整数。颜色的位表示为`RRRRRRRRGGGGGGGGBBBBBBBB`（`R`块是红色的 8\
  \ 位，`G`块是绿色的 8 位，`B`块是蓝色的 8 位）。\n\n`<<`操作向数字的右侧添加指定位数，并用零填充额外的空间。例如，数字 3 的二进制形式是`11`。`3\
  \ << 1`表示“在右边加一个`0`”，结果为`110`，即十进制形式的 6。\n\n整个表达式意味着“从数组的第 0 个元素中取 8 位放入`R`块；接着，从第\
  \ 1 个元素中取 8 位填充`G`块；最后，用`B`块填充剩余部分。”这产生了该值的数值表示，其操作与我们在`numberToColor()`中所做的相反。\n\
  \n遮罩操作仅适用于没有半透明像素的图像。如果图像有半透明区域，遮罩将不会保留其原始颜色；相反，它会受到目标透明度的影响。要处理此类图像，必须在运行时对其进行预处理；大于\
  \ 0 的 alpha 值必须设置为 1。\n\n第五章：事件处理和用户输入\n\n如果您要处理半透明像素，您需要稍微修改代码，并在应用遮罩之前从图像中移除 alpha\
  \ 值。否则，原始颜色将无法保存，您将无法找到您要查找的形状索引。我们可以像读取像素值一样更改像素值（参见`Listing 5-28`）。\n\n**`Listing\
