  \ 600);\nthis._objectLayer.addObject(this._archBall);\nimg = im.get(\"arch-left\"\
  );\nthis._objectLayer.addObject(new StaticImage(img, 120, 470));\nimg = im.get(\"\
  arch-right\");\nthis._objectLayer.addObject(new StaticImage(img, 234, 462));\n```\n\
