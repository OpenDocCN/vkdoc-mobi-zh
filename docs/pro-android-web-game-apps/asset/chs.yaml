  首先，我们需要加载 `cordova-2.0.0.js` 文件，该文件提供了原生访问功能。其次，`main` 入口点发生了变化。通常，我们会使用 body 的\
  \ `onload` 事件来插入 JavaScript 启动代码。对于 Cordova 应用程序，页面加载的速度可能比 Cordova 准备就绪提供其功能的速度更快，因此，您无法可靠地从\
  \ body 的 `onload` 中调用 `原生` 函数。Cordova 提供了自己的事件，用于指示原生函数已可以使用，代码清单 15-8 说明了其工作原理。当您收到\
  \ `deviceready` 事件时，就可以安全地调用任何 Cordova 代码。请注意，如果您不使用原生调用，则无需对应用程序做任何更改。\n\n为了测试其工作原理，我们将读取整个设备电话簿并将每个联系人显示在列表中。为此，我们首先需要在\
  \ `AndroidManifest.xml` 中指定应用程序现在需要一个额外的权限——从联系人数据库读取的权限。将以下行添加到清单文件中，紧跟在 `INTERNET`\
