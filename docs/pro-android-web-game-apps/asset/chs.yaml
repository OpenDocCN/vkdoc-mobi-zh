  \ 1.0);\" +\n    \"}\";\n\nvar fragmentShaderSource =\n    \"precision mediump float;\"\
  \ +\n    \"void main(void) {\" +\n    \"    gl_FragColor = vec4(1.0, 1.0, 1.0, 1.0);\"\
