- "# 第五章：事件处理与用户输入\n\n### 自定义事件\n\n自定义事件 API 背后的理念是为触摸事件和鼠标事件提供\"最小公分母\"接口。有三对事件的工作方式几乎相同：`mousedown`-`touchstart`、`mousemove`-`touchmove`\
  \ 和 `mouseup`-`touchend`。正是\"几乎\"这个词让开发者的生活变得更加艰难。让我们从再次分析事件开始，找出它们的共同点和差异。\n\n\
  第一个主要差异是 `targetTouches` 对象。它仅适用于触摸屏，但由于 Android 浏览器尚未广泛支持多点触控，这一差异可以安全地忽略。多点触控支持目前并不相关，但后续处理起来也很容易。\n\
  \n以下是三个事件组：\n\n- **按下事件**：由 `mousedown` 和 `touchstart` 事件表示。它们标志着交互的开始：用户触摸了屏幕或按下了鼠标按钮。当用户处于此状态时，可以执行两种操作之一：开始移动控制器（鼠标或手指），或者立即释放并触发\"\
  点击\"。\n\n- **抬起事件**：由 `mouseup` 和 `touchend` 表示。它们的工作方式相同，但 `touchend` 不提供用户手指抬起位置的坐标。此时不再有触摸，这意味着可能没有坐标（鼠标没有这个问题，因为光标停留在屏幕上，`mouseup`\
  \ 的坐标是有效的）。为了模拟与触摸事件相同的行为，我们必须跟踪触摸的最后已知坐标，并在用户抬起手指时提供这些坐标。\n\n- **移动事件**：由 `mousemove`\
  \ 和 `touchmove` 表示。最重要的区别在于，鼠标可以有两种移动类型：悬停（在按钮未按下时移动光标）和拖动（在按钮按下时移动光标）。由于触摸屏没有对应的悬停操作，我们必须忽略悬停。同时，我们必须跟踪按钮的状态，以便在使用鼠标时区分悬停和拖动。\n\
