  \n**图 15-10.** *在模拟器上运行的联系人列表*\n\n你可以在官方文档页面 [`docs.phonegap.com`](http://docs.phonegap.com)\
  \ 上阅读更多关于可用 API 的信息。那里有许多有用的示例可供参考。本节仅着重介绍 API 使用的通用概念。现在，你可以自行探索所有可能的功能。\n\n最后，我想提及一个非常重要的一点。请记住使用权限的基本规则：只申请你真正需要的权限。你申请的权限越多，用户相信你的应用程序是无害的游戏、而非想要窃取其隐私数据的恶意软件的可能性就越小。例如，申请\
  \ `INTERNET` 权限或 `READ_CONTACTS` 权限都是可以的。然而，如果一个应用同时申请了这两项权限，它就具备了将你的整个通讯录上传到任意网站所需的一切条件。这绝对不是用户想要的。在接下来的章节中，我们将恢复读取通讯录的权限，使我们的游戏再次成为一个无害、清白的应用程序。\n\
  \n## **为发布到市场做准备**\n\n现在原生应用程序已经准备就绪，是时候将其发布到市场上了。这通常是“转向原生”的主要动力。该过程包含以下几个步骤：\n\
  \n-  创建密钥并为应用签名。\n-  在 Android 市场注册（撰写本文时需支付 25 美元）。\n-  发布应用程序。\n-  在做出更改或发布新版本时更新应用程序。\n\
  -  本节的目的是将我们出色的“四球”游戏推向公众并发布到 Google Play 商店。根据我们的列表，第一步是为应用签名。\n\n#### 签名应用程序\n\
  \n如果你没有接触过 Java、.NET 或类似平台，那么签名的概念对你来说可能有些陌生。签名是一种强大的安全机制，它允许用户验证特定数据的完整性和真实性。在\
  \ Android 开发中，这里的“数据”就是你分发的应用程序。每个应用程序都必须签名：不仅是通过市场分发的应用程序，任何应用程序都必须如此。我们在本章中创建的每个示例都隐含地进行了签名——Ant\
  \ 构建脚本使用调试密钥为其签名。然而，Google Play 商店不接受调试密钥，因此你需要创建一个真正的密钥，才能与他人分享你的作品。\n\n**注意：**\
  \ 官方 Android [文档](http://developer.android.com/guide/publishing/app-signing.html)中提供了关于签名过程的非常出色的解释。在本节中，我不会详细解释数字签名的概念并重复在线信息，而是提供一个关于如何为将应用发布到\
  \ Android 市场做准备的快速指南。\n\n## **589\n\n\n\n##### 创建数字密钥\n\n要签署应用程序，您需要创建一个数字密钥。管理密钥的命令行工具随\
  \ JDK 一同提供，名为 `keytool`。密钥存储在密钥库中——该文件包含多个密钥的信息。\n\n执行以下命令生成一个包含 2048 位 RSA 密钥的密钥库：\n\
  \n```\nkeytool -genkey -v -keystore juriy-android.keystore -alias android-release\
  \ -keyalg RSA -keysize 2048 -validity 10000\n```\n\n`keytool` 会提示您回答几个问题，如下方我的示例密钥创建输出所示。回答问题并非强制，因此您可以根据实际情况任意回答。\n\
  \n```\n输入密钥库密码：\n再次输入新密码：\n您的名字与姓氏是什么？\n  [未知]：Juriy Bura\n您的组织单位名称是什么？\n  [未知]：\n\
  您的组织名称是什么？\n  [未知]：\n您所在的城市或地区名称是什么？\n  [未知]：Kiev\n您所在的州或省份名称是什么？\n  [未知]：\n该单位的双字母国家代码是什么？\n\
  \  [未知]：UA\nCN=Juriy Bura, OU=Unknown, O=Unknown, L=Kiev, ST=Unknown, C=UA 是否正确？\n\
  \  [否]：是\n正在生成 2.048 位 RSA 密钥对和自签名证书 (SHA1withRSA)\n有效期为 10.000 天\n用于：CN=Juriy Bura,\
  \ OU=Unknown, O=Unknown, L=Kiev, ST=Unknown, C=UA\n输入 <android-release> 的密钥密码\n\
  \    （如果与密钥库密码相同，则按回车）：\n[正在存储 juriy-android.keystore]\n```\n\n密钥库是一个简单的文件，包含一个或多个密钥和证书。密钥库中的每个密钥都由其自己的密码保护，并有一个别名——您用来引用该密钥的名称。文件创建后，应该如下所示，请检查它是否为有效的密钥库，并且其中包含别名为\
  \ `android-release` 的密钥：\n\n```\nkeytool -list -v -keystore juriy-android.keystore\n\
  输入密钥库密码：\n\n密钥库类型：JKS\n密钥库提供者：SUN\n\n您的密钥库包含 1 个条目\n\n别名名称：android-release\n创建日期：2012\
  \ 年 7 月 10 日\n条目类型：PrivateKeyEntry\n证书链长度：1\n证书[1]：\n所有者：CN=Juriy Bura, OU=Unknown,\
  \ O=Unknown, L=Kiev, ST=Unknown, C=UA\n签发者：CN=Juriy Bura, OU=Unknown, O=Unknown,\
  \ L=Kiev, ST=Unknown, C=UA\n序列号：4f357fb2\n有效期自：2012 年 2 月 10 日星期五 22:36:02 EET 至：2039\
  \ 年 6 月 28 日星期二 23:36:02 EEST\n证书指纹：\n         MD5：  EA:48:BE:09:AA:8A:05:20:AC:04:D6:13:B2:7A:09:05\n\
  \         SHA1：74:ED:15:74:98:D0:A2:1F:89:76:46:E2:B6:2A:48:37:D9:66:AD:5D\n   \
  \      签名算法名称：SHA1withRSA\n         版本：3\n*******************************************\n\
  *******************************************\n```\n\n如果您看到类似上述信息，则说明密钥库已准备就绪。\n\n\
  ##### 签署应用程序\n\n下一步是构建应用程序的“发布”版本，并使用密钥对其进行签名。为此，您需要告诉 Ant 脚本密钥库的位置以及要使用的密钥（别名）。执行以下命令：\n\
  \n```\nant -Dkey.store=<密钥库路径>.keystore -Dkey.alias=<密钥别名> clean release\n```\n\n\
  在构建脚本的某个时刻，`Ant` 会提示您输入两个密码：一个用于密钥库，另一个用于密钥。密码会在您输入时显示在屏幕上，因此请确保无人偷看。\n\n或者，您可以在项目根目录的\
  \ `ant.properties` 文件中添加两行：\n\n```\nkey.store=../<密钥库路径>\nkey.alias=<密钥别名>\n```\n\
  \n如果这样做，您可以在命令行中省略额外参数，直接输入：\n\n```\nant clean release\n```\n\n**注意：** 如果您像我一样对密码过于敏感，可以手动签署软件包。该过程稍微复杂一些，因为它要求您先签名，然后“对齐”应用程序。有关详细信息，请参考官方\
  \ Android 教程 [(http://developer.android.com/guide/publishing/app-signing.html#signapp)](http://developer.android.com/guide/publishing/app-signing.html#signapp)。\n\
  \n\n\n最后一步是检查已签名的应用程序是否确实已签名。在控制台中执行以下命令，并检查输出是否显示`jar verified`，如下所示。\n\n> `jarsigner\
  \ -verify bin/FourBalls-release-unsigned.apk`\n\n`jar verified.`\n\n如果你做对了所有步骤并看到此输出，那么你已经为发布到市场做好了准备！\n\
  \n当你使用\"生产\"密钥签署应用程序后，你将无法直接将其安装在\"调试\"版本之上。如果在构建过程中看到类似如下的消息：\n\n`[exec] Failure\
  \ [INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES]`\n\n请卸载旧版本的应用程序：\n\n> `adb uninstall\
  \ <package>`\n\n在我的案例中，我输入的是：\n\n> `adb uninstall com.juriy.fourballs`\n\n原因是，如果证书不匹配，Android\
  \ 不会静默地重新安装应用程序。\n\n### 发布到 Google Play\n\n此步骤需要少量资金投入。要创建账户，你需要支付注册费，在撰写本文时为 25\
  \ 美元。\n\n**注意：** 如果你尚未准备好发布应用，建议你跳过本节，或者快速阅读以便了解如何在市场上操作。你现在已有的知识已足够创建应用程序，并将其发布在自己的网站上，展示给朋友和商业伙伴。本章接下来的几页将专门介绍\
  \ Google Play 商店。\n\n![](img/index-592_1.jpg)\n\n访问 `https://play.google.com/apps/publish/`，使用你的\
  \ Google 账号登录，然后按照注册流程操作。注册的第一步如图 15-11 所示。\n\n**图 15-11.** *Android 市场注册的第一步*\n\
  \n在你同意许可协议并支付注册费后，就可以开始发布了。初始网页将如图 15-12 所示。点击`上传应用`按钮，选择已签名的版本文件。该应用不会立即发布，所以如果你觉得自己还未百分之百准备好公开，不用担心。\n\
  \n![](img/index-593_1.jpg)\n\n![](img/index-593_2.jpg)\n\n**图 15-12.** *首次进入时的开发者控制台。此时尚无已发布的应用。*\n\
  \n图 15-10 中的截图显示的是一个已经有一个已发布应用的页面。如果你是刚开始，你会看到一个空的应用列表。\n\n当文件上传完成后，你会看到 APK 的快速摘要，如图\
  \ 15-13 所示。\n\n**图 15-13.** *新的 APK 摘要屏幕*\n\n在这里，你可以审查应用所需的权限列表。点击`保存`并进入发布表单。表单本身相当长；大部分列出的项目是可选的。不过，Android\
  \ Market 指南建议将每个字段都视为必填项。对于一款新游戏，展示几张明亮多彩的截图并提供良好的产品描述尤为重要。要让人们想要玩你的游戏！\n\n唯一必需的图片是截图和高分辨率图标（512\
  \ × 512）。其他都是可选的。然而，强烈建议尽可能多地提供推广素材。用户看到得越多，就越喜欢这个应用——也就越有可能下载它。\n\n**注意：** 有多种方法可以为你的应用创建截图。最简单的方法是在模拟器中加载页面，并使用常规的屏幕捕获工具创建截图。另一种方法是使用名为`DDMS`（Dalvik\
  \ 调试监控服务器）的小工具连接到你的设备，该工具位于 Android SDK 的`Tools`文件夹中。连接已启用 USB 调试的设备，运行该工具，从列表中选择设备，然后选择`设备屏幕截图`。搞定！你将获得一张与真实设备屏幕完全一致的截图。\n\
  \n按照指南填写表单：为应用选择名称，编写...\n\n\n# 格式化后的文档\n\n填写描述和推广文字，列出变更内容（在提交应用程序更新版本时使用），并选择分类。由于我要发布的应用程序远非真正的商业游戏，我将其归入“应用、库和演示”类别。\n\
  \n**注意：** 为了方便，我用于 Google Play 商店的截图、图标和推广图片已随本章的其他资源一同提供。你可以将它们用做参考点，或作为你自己应用程序的占位符。\n\
  \n表单的最后一部分是关于语言和分发区域的。填写完成后，打开“APK 文件”标签页，点击已上传的唯一 APK 文件旁边的“激活”按钮。当 APK 变为激活状态后，点击“发布”。几秒钟后，应用程序就发布成功并可下载了！此时你应已返回到应用列表，并看到新发布的应用。图\
  \ 15-14 展示了开发者控制台此时的样子。\n\n![图 15-14](img/index-595_1.jpg)\n\n**第 15 章：构建原生应用 595**\n\
  \n**图 15-14.** *应用发布后的开发者控制台*\n\n**注意：** 发布过程可能需要一些时间，所以如果你的应用程序没有立即上架，不必担心。喝杯咖啡休息一下通常有助于应用程序更快发布。\n\
  \n使用以下格式的 URL 访问应用页面：`https://play.google.com/store/apps/details?id=<package_name>`，其中`<package_name>`是你在本章开头设置的程序包名称。我新发布的游戏可通过`https://play.google.com/store/apps/details?id=com.juriy.fourballs`访问。如果你从\
  \ Android 设备点击此页面的链接，系统会提示你打开市场应用并安装“Four Balls”。这是该应用在 Android Market 中的“主页”。图\
  \ 15-15 显示了该页面在桌面浏览器中的样子，图 15-16 则显示了该页面在设备上市场应用中的样子。\n\n![图 15-15](img/index-596_1.jpg)\n\
  ![图 15-16](img/index-596_2.jpg)\n\n**第 15 章：构建原生应用 596**\n\n**图 15-15.** *桌面浏览器中\
  \ Google Play 商店上的应用页面* **图 15-16.** *左侧：设备上打开的应用页面。右侧：安装提示显示所需权限列表。*\n\n**第 15\
  \ 章：构建原生应用 597**\n\n如果你想了解更多关于发布过程的信息，请访问官方 Android 文档页面：`http://developer.android.com/guide/publishing/publishing.html`。\n\
  \n### 更新你的应用程序\n\n一旦你的应用程序变得流行，你可能希望更新一些新功能来吸引更多用户。本章的最后部分专门讨论如何将更新推送到 Google Play\
  \ 商店。让我们看一个简单的场景：你发现白色背景在设备上看起来不好看，想将其改为黑色。你在一分钟内修复了一行 JavaScript 代码，现在急于发布新版本。在创建新的签名构建之前，再次打开`AndroidManifest.xml`文件，并更新清单\
  \ 15-11 中加粗的行。\n\n**清单 15-11.** *在 Android Manifest 中更新应用版本*\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    package=\"com.juriy.fourballs\"\n    android:versionCode=\"2\"\n    android:versionName=\"\
  1.0.1\">\n    ...\n```\n\n`versionCode`参数必须是一个整数，市场用它来比较用户设备上已安装的版本与市场上可用的最新版本。第二个参数`versionName`是用户看到的版本号。保存文件并重新构建应用程序。\n\
  \n一旦应用程序打包并签名完成，打开 Google Play 商店开发者控制台，选择“Four Balls”应用程序，并上传新的 APK。由于这是应用程序的新版本，并且与上一个版本相比有所变化，请填写\n\
  \n\n  \n# 近期更新  \n\n通过`近期更新`字段让用户了解为何需要更新。应用程序的外观已发生变化，因此你也应当更新截图和宣传图。关注这类细节对应用的成功至关重要。\
  \  \n\n上传新的`APK`文件。点击第一个版本的`APK`旁的`停用`按钮，然后点击新版本`1.0.1`旁的`启用`按钮。点击`保存`并等待数分钟。更新内容会出现在市场上，所有已安装该应用的用户都会收到获取新版本的提示。\
  \  \n\n与市场协作其实并不困难。一旦你发布第一个应用，就会对整个流程得心应手。市场是一个非常强大的分发渠道，当你的游戏能够在浏览器中运行时，就应该考虑将其发布到市场上。\
  \  \n\n## 总结  \n\n在本章中，我们学习了如何用`Apache Cordova`封装现有网页，并创建原生安卓应用。我们掌握了处理此类配置特殊性的方法：服务器\
  \ URL、应用权限以及原生应用资源的访问。  \n\n我们学会了如何制作应用的\"生产\"版本：创建密钥、签名应用，并做好发布到`Google Play`商店的准备。\
  \  \n\n在本章最后部分，我们探讨了如何使用`Google Play`商店——从创建账号到发布应用、与他人共享应用，再到更新至更新更好的版本。  \n\n\
  原生应用具有诸多优势。无论你是用`Java`还是`HTML5`技术栈创建此类应用都不重要。只要用户能将应用加载到设备上并运行你的游戏，你就达成了目标。  \n\n\
  ---\n\n# 第 16 章：添加音效  \n\n音效是打造一款完整的、可供市场发售的游戏所需添加的最终元素之一。在移动游戏中，音效通常扮演次要角色。这背后有几个原因。\
  \  \n\n- 移动游戏大多是休闲类游戏。人们在旅途中、排队时、机场候机期间或枯燥的会议中玩手游——这些场合下音效反而可能打扰他人。  \n- 如果玩家戴着耳机，他们多半在听自己喜欢的音乐——来自庞大`MP3`曲库的歌曲。\
  \  \n- 音效会消耗电量，尽管实际功耗很小，但仍有用户更愿意把电量留给其他用途。  \n- 对多数休闲游戏而言，缺少音效并不会影响游戏体验。在像`反恐精英`这样的桌面游戏中，玩家仅凭脚步声就能判断敌人位置。在像`辐射\
  \ 3`这样的游戏中，音效则是深入游戏世界的方式。相比之下，休闲游戏在\"静音\"模式下完全能够畅玩。  \n\n尽管如此，音效仍是移动游戏中相当重要的方面，你不应在自己的项目中忽视它。没有音效的游戏更像未完成的业余作品，而非商业产品。看看`愤怒的小鸟`——这款现象级休闲游戏的经典范例：小猪们等待命运的安静咕哝声，加上小鸟们激昂的战斗呐喊，确实让游戏变得更加有趣。\
  \  \n\n作为开发者，你的任务是让用户想要开启音效。即使只有 15%的用户会开启音效玩游戏，他们也一定会为你的市场评分增加额外的一颗星。  \n\n本章将专注于音效。我们将学习以下主题：\
  \  \n\n- Android 浏览器对音效的支持情况  \n- 常见问题的解决方案  \n- `SoundManager2`——终极网页音效库  \n- 原生应用中的音效（`Cordova`\
  \ API）  \n- 常见音效可用性模式  \n\n## 网页中的音频  \n\n我们首先来看看\"老大哥们\"——即紧跟最新`HTML5`趋势的桌面浏览器——所提供的\
  \ API。目前有两种可用的音频 API 用于处理音效：简单的`HTML5`音频标签（`www.whatwg.org/specs/web-apps/current-work/#the-audio-element`）以及\
  \  \n\n\n[sophisticated full-blown Web Audio API](https://dvcs.w3.org/hg/audio/raw-file/tip/webaudio/specification.html)\n\
  \n#### 音频标签\n\n音频标签是在网页中播放声音的最简单方式。其 API 直观且简洁，如清单 16-1 所示。\n\n**清单 16-1.** *在网页中使用音频元素*\n\
  \n```html\n<head>\n<script>\nvar audio;\n\nfunction init() {\n    audio = new Audio(\"\
  sound/theme.mp3\");\n}\n\nfunction play() {\n    audio.play();\n    setInterval(function()\
  \ {\n        audio.volume -= 0.1;\n    }, 200);\n}\n\nfunction pause() {\n    audio.pause();\n\
  }\n\nfunction changeVolume(deltaVolume) {\n    audio.volume += deltaVolume;\n}\n\
  </script>\n</head>\n\n<body onload=\"init()\">\n<div>\n    <button onclick=\"play()\"\
  >播放</button>\n    <button onclick=\"pause()\">暂停</button>\n    <button onclick=\"\
  changeVolume(0.2)\">音量+</button>\n    <button onclick=\"changeVolume(-0.2)\">音量-</button>\n\
  </div>\n</body>\n```\n\n`new Audio(\"sound/theme.mp3\")`这行代码是一个便捷构造函数，用于动态创建音频标签。\n\
  \n清单 16-2 中的代码会产生相同效果。\n\n**清单 16-2.** *通过向页面添加 audio 标签来初始化声音的替代方法*\n\n```html\n\
  <script>\nvar audio;\n\nfunction init() {\n    audio = document.getElementById(\"\
  player\");\n}\n/* 其余代码保持不变 */\n</script>\n</head>\n\n<body onload=\"init()\">\n\
  <div>\n    <audio id=\"player\" src=\"sound/theme.mp3\"></audio>\n    <button onclick=\"\
  play()\">播放</button>\n    <button onclick=\"pause()\">暂停</button>\n    <button onclick=\"\
  changeVolume(0.2)\">音量+</button>\n    <button onclick=\"changeVolume(-0.2)\">音量-</button>\n\
  </div>\n</body>\n```\n\n`audio`标签实现了音频功能的最基本功能：加载文件、播放/暂停音轨、调节播放音量。它也可以在网页上显示简单的播放控件（在游戏中很少需要）。尽管很难想象比这更简单的\
  \ API，但对于休闲游戏来说，这些功能通常已经足够：加载背景音乐、设置音量、循环播放，偶尔为各种游戏事件播放其他音效。\n\n#### Web Audio API\n\
  \nWeb Audio API 是面向 Web 的下一代音频处理 API。它不仅允许你播放音频，还能实时处理音频，操控原始音频数据——即波形。为了更好地理解该\
  \ API 的功能，不妨想想我们通过 Canvas API 实现的实时图像处理——面对成千上万的原始像素，我们可以做出真正令人惊叹的事情：动态渲染世界、创建 3D\
  \ 模型、实现闪电和火焰等特效、用\"战争迷雾\"覆盖地图部分区域等等。之所以能够实现这一切，是因为我们可以操控原始像素数据，而不仅仅是静态的预渲染图像。\n\n\
  声音并不比图像简单，有时甚至更加复杂。想象一款 3D 冒险游戏：玩家进入一个房间，看到两个 NPC（非玩家角色）正在互相交谈并与玩家交流。最终产生的声音波形取决于许多不同的参数：\n\
  - 每个 NPC 相对于玩家的位置（离玩家越近，声音越响亮）\n- 玩家面朝的方向（左右声道需要接收不同的声音才能营造真实感）\n- 房间的大小和材质：洞穴中的声音与音乐厅或街道上的声音截然不同\n\
  \n由此可见，为这种复杂场景预渲染声音几乎是不可能的。Web Audio API 允许你获取声音的\"源\"并在播放前对其进行实时处理：混合多个音轨、应用洞穴回声或无线电静电等特效、添加滤波器，最后将处理结果发送到音频设备。\n\
  \n遗憾的是，该 API 目前仅适用于少数桌面浏览器，距离普及到大众市场的 Android 设备仍有相当距离。不过，为了内容的完整性，清单 16-3 提供了示例代码来展示如何实现这一功能。\n\
  \n\n# API 实践\n\n**清单 16-3.** 使用 Web Audio API 播放声音\n\n```javascript\nvar context;\n\
  var buffer;\n\nfunction init() {\n    try {\n        context = new webkitAudioContext();\n\
  \    } catch(e) {\n        alert('Web Audio API not supported');\n        return;\n\
  \    }\n\n    // Load the binary data from music file\n    var request = new XMLHttpRequest();\n\
  \    request.open('GET', \"sound/theme.mp3\", true);\n    request.responseType =\
  \ 'arraybuffer';\n    request.onload = function() {\n        // Decode data and\
  \ play sound\n        context.decodeAudioData(request.response, function(buff) {\n\
  \            buffer = buff;\n            var source = context.createBufferSource();\n\
  \            source.buffer = buffer;\n            source.connect(context.destination);\n\
  \            source.noteOn(0);\n        });\n    };\n    request.send(null);\n}\n\
  ```\n\n**注意：** 音频 API 并不需要源文件。就像你可以在空白画布上画一条线一样，你也可以即时生成声音数据并播放。你可以创建诸如“虚拟钢琴”之类的应用，无需为每个音符准备单独的声音文件，甚至还可以制作更加复杂的应用，例如基于特定发音参数生成“逼真”的外星语音合成。\n\
  \nWeb Audio API 与 HTML5 音频标签之间的区别，大致等同于 Canvas API 与 `IMG` 标签之间的区别。后者为你提供了一种渲染静态媒体的简单方式，而\
  \ Web Audio API 则让你对整个处理过程拥有完全的控制权（当然，代价是代码更加复杂）。\n\n#### Android 浏览器中的声音\n\n遗憾的是，Android\
  \ 浏览器对声音 API 的支持相当差。Web Audio API 仍属于尖端技术，尚未完全普及到移动平台。然而，即使是基本的 `audio` 标签支持，在 Android\
  \ 中也有不少 bug 和局限性。原生应用的情况要好得多，但标准浏览器仍有很大的改进空间。\n\n第一个支持 `Audio` 元素的 Android 版本是 Android\
  \ 2.2，而那种“支持”相当……特殊。尽管浏览器能识别该元素本身，但它无法播放任何音频文件。这看起来更像是为未来扩展预留的一个空壳。因此，直到 Android\
  \ 2.3 Gingerbread 版本才真正支持音频播放。不过，这距离完美依然非常遥远。\n\n说到音频文件，对播放音频的“支持”并不自动意味着浏览器能识别所有可能的音频格式。就像\
  \ `IMG` 标签只能显示少数几种文件格式——PNG、JPEG、GIF 以及少数其他格式——一样，`audio` 标签也仅限于特定的文件格式。更麻烦的是，对于浏览器应支持哪些格式，并没有统一的标准。一些厂商坚持使用\
  \ OGG 等开源免费格式，而另一些则力推 MP3 和 h.264 等封闭的专有格式。换句话说，没有一种文件格式是每种浏览器都支持的。这就是为什么 `audio`\
  \ 标签允许你设置多个备选文件作为音频源的原因。浏览器会选择它能“认识”的格式。\n\n在撰写本文时，Gingerbread 之前的设备仍占据着高达 23% 的市场份额。当然，简单放弃为每四位客户中的一位提供声音支持是不可取的。幸运的是，有一个库解决了\
  \ Android 的大部分声音问题。`SoundManager2` ([www.schillmania.com/projects/soundmanager2/](http://www.schillmania.com/projects/soundmanager2/))\
  \ 采用了一种简单的方法：如果浏览器过于简陋而无法播放音频，我们就让 Flash 来做繁重的工作。丰富的开箱即用媒体支持是 Flash 变得如此流行的原因之一——Flash\
  \ Player 知道如何处理播放。\n\n**注意：** `SoundManager2` 并非 Android 专属解决方案。它的使命是让从最老旧的版本开始的各种浏览器都能获得无缝的声音处理能力。使用\
  \ Flash 的想法也并不完全是新事物。我们在第 12 章中使用过的网络 API——`Socket.IO`，也提供了一种回退到 `Flash Sockets`\
  \ 的选项——这是一种基于 Flash 的、在网页与服务器之间建立持久连接的实现。\n\n\n\n# 第 16 章：添加声音\n\nFlash 组件。正如你所见，对于仍在追赶潮流的浏览器来说，小型\
  \ Flash 组件通常扮演着\"备选方案\"的角色。\n\n`SoundManager2` 最大的优点在于其易用性。只需几行代码——你的游戏就能拥有音乐了！\n\
  \n在本章中，我们将为现有游戏《逃亡骑士》添加音效——这个游戏是我们在第 14 章测试 Crafty 游戏引擎时创建的。请从第 14 章的游戏中复制代码，或使用你自己的项目。\n\
  \n**图 16-1.** *初始目录结构*\n\n**605**\n\n### 使用 SoundManager2\n\n现在是时候为这个关于逃亡骑士的故事增添一些声音了。但首先，我们需要搭建项目环境。\n\
  \n#### 初始设置\n\n第一步是从官方网站 [www.schillmania.com/projects/soundmanager2/doc/download/](http://www.schillmania.com/projects/soundmanager2/doc/download/)\
  \ 下载最新版本的 SoundManager（编写本章时版本为 2.97a）。\n\n然后，将压缩包解压到硬盘上的某个位置。该发行版包含许多演示和工具，但我们项目中只需要其中几个。请执行以下步骤：\n\
  \n1.  将发行版中的 `/script/soundmanager2.js` 文件复制到你的 `js` 文件夹。\n2.  将整个 `swf` 文件夹复制到项目根目录。\n\
  3.  在项目根目录创建一个名为 `sound` 的新文件夹。我们将把音效文件放在那里。\n4.  获取本书附带的 `theme.mp3` 文件，并将其复制到上一步创建的文件夹中。\n\
  \n你的目录结构应如图 16-1 所示。\n\n**注意：** `SoundManager2` 发行版的 `script` 文件夹包含多个文件。它们都具有完全相同的生产功能。带有\
  \ `nodebug` 后缀的文件具有不同的默认设置（所有调试功能均已关闭）；它们没有注释和调试方法。名称中包含 `jsmin` 的文件已用 JSMin（[www.crockford.com/javascript/jsmin.html](http://www.crockford.com/javascript/jsmin.html)）预处理过，JSMin\
  \ 是一种 JavaScript“代码压缩工具”，可以移除源代码中的所有多余空格，使文件更小、下载速度更快。在开发过程中，我们始终使用启用调试功能的原始未处理文件。一旦进入生产环境，请考虑将其替换为\
  \ `nodebug` 压缩版本。\n\n现在，我们准备为游戏添加一些美妙的音效。将清单 16-4 中的代码添加到页面中。\n\n**清单 16-4.** *初始化\
  \ SoundManager2*\n\n```html\n<script src=\"js/soundmanager2.js\"></script>\n<script>\n\
  soundManager.url = 'swf/';\nsoundManager.flashVersion = 9;\nsoundManager.onready(function()\
  \ {\n    soundManager.createSound({\n        id:'theme',\n        url:'sound/theme.mp3',\n\
  \        autoLoad:true,\n        onload:function() {\n            this.play();\n\
  \        }\n    });\n});\n</script>\n```\n\n一旦加载了 `soundmanager2.js` 文件，`soundManager`\
  \ 这个“神奇”的对象就会出现在全局命名空间中。前两行初始化基本设置——`swf` 文件夹的路径以及 `SoundManager` 将要使用的 `swf` 版本。有两个选项——8\
  \ 和 9，默认是 8。版本 9 解锁了一些炫酷的新功能，而且你的玩家设备上很可能已经安装了相应版本的 Flash Player。\n\n**注意：** 如果你比较务实，想了解使用旧版本\
  \ Flash Player 的用户（不仅限于移动设备）所占的百分比，请参考 Adobe 的官方版本使用统计信息：[www.adobe.com/products/flashplatformruntimes/statistics.displayTab3.html](http://www.adobe.com/products/flashplatformruntimes/statistics.displayTab3.html)\n\
  \n**607**\n\n下一行添加了 `onready` 事件监听器，当 `soundManager` 开始运行并准备好执行实际的音频相关任务时，该监听器会被触发。最后，我们从\
  \ MP3 文件中加载声音，并指示 `soundManager` 在声音准备好后开始播放。\n\n在浏览器中运行该页面，然后享受背景音乐吧。请注意，如果你在使用模拟器，此时可能听不到声音。这是因为模拟器没有\
  \ Flash 插件。如果你要进行调试...\n\n\n\n在模拟器中使用声音时，你需要手动在模拟器上安装播放器。\n\n音乐主题只播放一次。通常背景主题应该重复并连续播放。让我们让音乐循环起来。\n\
  \n#### 循环\n\n循环本身相当容易实现——你只需要设置循环次数（参见清单 16-5）。\n\n**清单 16-5.** *循环背景主题*\n\n```\n\
  soundManager.url = 'swf/';\nsoundManager.flashVersion = 9;\nsoundManager.onready(function()\
  \ {\n  soundManager.createSound({\n    id: 'loopTest',\n    url: 'sound/theme.mp3',\n\
  \    loops: 10000,\n    autoLoad: true,\n    onload:function() {\n      this.play();\n\
  \    }\n  });\n});\n```\n\n`SoundManager`不支持无限循环，所以当你需要无限播放时，只需使用一个像 10000 这样的大数字——对于一个五秒钟的声音样本，这将为你提供大约\
  \ 13 小时的连续播放——对于休闲游戏来说已经足够了。\n\n然而，音乐循环比这要棘手得多。就像图块必须与其相邻图块匹配以创建坚实地形的错觉一样，循环的结尾必须匹配开头。否则，玩家会清晰地听到乐曲在几毫秒后结束并重新开始。这将不是连续的环境背景音乐，而是一组令人厌烦的循环。\n\
  \n如果你将文件保存为`MP3`或类似的`有损格式`，你可能会发现另一个意外。即使声音在声音编辑器中完美循环，一旦在游戏中播放，每次迭代后你都会听到一声“咔哒”声。这是一个由有损压缩算法的特性导致的众所周知的问题。\n\
  \n看看图 16-2，它显示了一个简单的波形——一个生成的声音（就像电视公司用来屏蔽粗俗语言的那种）。图像的顶部显示了原始波形，底部显示了保存为`MP3`的相同波形。\n\
  \n**图 16-2.** *原始波形（顶部）和压缩后的 MP3 文件。由于压缩算法，前 50 毫秒几乎是静音的。*\n\n请注意，压缩后的波形以大约 50 毫秒的静音开始。`MP3`就是这样工作的：它无法像我们希望的那样保存声音的每一个比特，这导致了烦人的“咔哒”声。然而，这当然不是游戏开发的借口。我们希望背景主题播放流畅。\n\
  \n有两种方法可以解决这个问题。如果样本以相对安静的片段（甚至静音）开始和结束，那么“咔哒”声就听不到了。它仍然存在，但玩家会认为这是音乐作品中安静的部分，不会感到烦躁。\n\
  \n另一种方法是使用专门的编码软件，它可以重新编码`MP3`并使“咔哒”声稍微“轻”一些。这背后的确切机制超出了本章的范围。如果你对更深入的解释感兴趣，请参考以下有用的链接：\n\
  \n- [www.schillmania.com/projects/soundmanager2/demo/api/#looping](http://www.schillmania.com/projects/soundmanager2/demo/api/#looping)：`SoundManager`关于循环的文档。\n\
  - [www.flickr.com/photos/schill/4499319436/](http://www.flickr.com/photos/schill/4499319436/)：关于如何为`SoundManager`制作流畅声音循环的快速“指南”。\n\
  - [www.compuphase.com/mp3/mp3loops.htm](http://www.compuphase.com/mp3/mp3loops.htm)：一个名为`MP3Loop`的工具的主页。顾名思义，该工具用于创建“循环”的`MP3`文件。该页面很好地解释了为什么`MP3`编码器会这样表现以及如何修复它。\n\
  \n从现在开始，我们将假设你的`MP3`文件已经为你的游戏准备好了。\n\n#### 为游戏添加声音\n\n现在我们已经准备好为游戏本身添加声音了。我们的游戏将包含三种声音：主主题、一个点击声和一个“游戏结束”声。主\n\
  \n\n\n# 主题声音应在加载后循环播放，而其他两个声音在特定游戏事件时播放。按照以下代码清单加载所有三个声音文件。首先，加载声音并将主题声音设置为加载时播放（参见清单\
  \ 16-6）。\n\n**清单 16-6.** *加载声音并在主题加载后播放*\n\n`soundManager.url` = `'swf/'`;\n\n`soundManager.flashVersion\
  \ = 9;`\n\n`soundManager.onready(function() {`\n\n`soundManager.createSound({`\n\
  \n`id: 'theme',`\n\n`url: 'sound/theme.mp3',`\n\n`loops: 10000,`\n\n`autoLoad: true,`\n\
  \n`onload:function() {`\n\n`this.play();`\n\n`}`\n\n`});`\n\n`soundManager.createSound({`\n\
  \n`id: 'click',`\n\n`url: 'sound/click.mp3',`\n\n`autoLoad: true`\n\n`});`\n\n`soundManager.createSound({`\n\
  \n`id: 'gameover',`\n\n`url: 'sound/gameover.mp3',`\n\n`autoLoad: true`\n\n`});`\n\
  \n`});`\n\n现在你有了循环播放的主主题音乐。不过，我用的这个声音对于休闲游戏来说太响了。你可以直接在代码中设置音量（值为 0 到 100 之间），如清单\
  \ 16-7 所示。\n\n**清单 16-7.** *设置声音音量*\n\n`soundManager.createSound({`\n\n`id: 'gameover',`\n\
  \n`url: 'sound/gameover.mp3',`\n\n`volume: 40,`\n\n`autoLoad: true`\n\n`});`\n\n\
  现在让我们添加点击声音。当玩家点击屏幕时，这个声音播放。请注意，Android 有自己的点击声音，除非你在点击事件上调用`preventDefault()`，否则它会与我们的自定义声音同时播放。播放点击声音的代码如清单\
  \ 16-8 所示。\n\n**清单 16-8.** *当用户点击屏幕或按下鼠标按钮时播放点击声音*\n\n```\nCrafty.addEvent(this,\
  \ window, \"touchstart\", function (e) {\n  e.preventDefault();\n  soundManager.getSoundById(\"\
  click\").play();\n});\n\nCrafty.addEvent(this, window, \"mousedown\", function (e)\
  \ {\n  e.preventDefault();\n  soundManager.getSoundById(\"click\").play();\n});\n\
  ```\n\n不幸的是，调用`preventDefault()`也会导致 Crafty 忽略骑士精灵上的点击事件。我们必须将精灵渲染到单独的 DOM 元素上，然后手动添加事件监听器，如清单\
  \ 16-9 所示。\n\n**清单 16-9.** *绘制角色*\n\n```\nfunction drawCharacter() {\n  var knight\
  \ = Crafty.e(\"2D, DOM, knight, SpriteAnimation, Mouse\")\n    .attr({x: 100, y:\
  \ 280})\n    .animate(\"move_left\", 1, 0, 3)\n    .animate(\"move_right\", 0, 1,\
  \ 2)\n    .animate(\"move_right\", 15, -1)\n    .bind(\"EnterFrame\", function()\
  \ {\n      this.x += 0.3;\n      if (this.x > 500) {\n        Crafty.trigger(\"\
  GameOver\");\n      }\n    });\n\n  Crafty.addEvent(this, knight._element, \"touchstart\"\
  , function() {\n    Crafty.trigger(\"Win\");\n  });\n\n  Crafty.addEvent(this, knight._element,\
  \ \"mousedown\", function() {\n    Crafty.trigger(\"Win\");\n  });\n}\n```\n\n当游戏结束时，我们需要停止主主题并播放“游戏结束”主题一次。让我们创建一个函数来实现这个功能（参见清单\
  \ 16-10）。\n\n**清单 16-10.** *播放游戏结束声音*\n\n```\nfunction playGameoverSound() {\n \
  \ soundManager.getSoundById(\"theme\").stop();\n  soundManager.getSoundById(\"gameover\"\
  ).play();\n}\n```\n\n最后一步是在“赢”和“游戏结束”场景中调用这个函数（参见清单 16-11）。\n\n**清单 16-11.** *为赢和失败状态播放游戏结束声音*\n\
  \n```\nCrafty.scene(\"gameover\", function() {\n  playGameoverSound();\n  showGameOverBanner();\n\
  });\n\nCrafty.scene(\"win\", function() {\n  playGameoverSound();\n  showWinBanner();\n\
  });\n```\n\n就是这样！只需 40 行代码（大部分是配置），我们就为游戏添加了不错的音效！\n\n### 在 Cordova 应用中播放声音\n\n\
  如果你正在制作原生应用，你拥有更多可用的工具——实际上，整个 Android API 都是你的。在 Cordova 应用中使用它来播放声音是浪费的——Android\
  \ 可以自行播放声音。Cordova 有一个用于媒体播放的简化 API，位于\n\n\n\n\n[`http://docs.phonegap.com/en/1.0.0/phonegap_media_media.md.html`](http://docs.phonegap.com/en/1.0.0/phonegap_media_media.md.html)\n\
  \n用于在原生封装的应用程序中播放音频的代码如下所示：\n\n```javascript\nvar media = new Media(\"/android_asset/www/sound/sound.mp3\"\
  );\nmedia.play();\n```\n\n就是这样。不要忘记加载核心的 PhoneGap API。至于循环播放，情况再次变得相当复杂。Cordova\
  \ API 不知道如何循环播放媒体。Cordova 开发者忽略了社区关于此问题的请求，只是简单地说：“循环播放未在 Android 上实现。”绕过此限制的 Hack\
  \ 方法如代码清单 16-12 所示。\n\n**代码清单 16-12.** *使用 Cordova 循环播放音轨*\n\n```javascript\nvar\
  \ media = new Media(\"/android_asset/www/sound/sound.mp3\",\n    null, null,\n \
  \   function(status) {\n        if (status == 4) {\n            media.stop();\n\
  \            media.play();\n        }\n    }\n);\nmedia.play();\n```\n\n这段代码监听了媒体的`status`，一旦播放完成，就会重新开始播放。结果远非完美——循环之间的延迟非常明显，但聊胜于无。此外，还有一些插件可以为\
  \ Cordova 带来更好的声音支持。[`www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1`](http://www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1)\
  \ 上的一篇文章描述了其中一个。\n\n### 用户体验\n\n声音是一个强大的功能，应该明智地使用。声音本质上比你可能在游戏中使用的其他类型的反馈更具感染力。这就是为什么你应该确保你的美妙音频带来的是乐趣而非烦恼。\n\
  \n在设计应用的声音功能时，请遵循常识。记住，你的用户可能正坐在礼堂里听一场无聊的讲座，上网寻找一些更刺激的东西。现在他找到了你的页面。如果你的应用程序大吹大擂地播放所有音效，用户会非常不高兴。\n\
  \n在 Web 世界中，一条经验法则是声音默认是禁用的。或者，你可以在用户首次启动时询问他是否要启用它——但永远不要创建默认开启声音的页面。你能做的最糟糕的事情是创建一个有显著延迟的引导音：如果用户已经切换到了另一个标签页，他将很难找到播放该曲调的页面。\n\
  \n如果你正在制作原生应用程序，你可以让声音默认开启，尽管我建议你友好一点，仍然询问用户是否想要声音。\n\n一款休闲游戏应该可以在没有任何声音的情况下进行游玩。以下是关于优秀声音设计的更多提示：\n\
  \n-   使用静音按钮设计声音。使其在游戏屏幕内易于访问（最多点击两次）。\n-   添加音量控制。允许玩家独立设置背景音乐和音效的音量。\n-   使用一致的声音。就像来自同一集合的图标具有相同大小且相互匹配一样，声音应该具有相同的“风格”和音量。\n\
  -   不要使用过于响亮或扰人的声音，或带来负面情绪的声音。例如，游戏结束事件播放逼真的婴儿哭声，并不会激励你的玩家再试一次。\n\n遵循这些简单的建议，你的游戏音频将顺利且自然地融入到游戏进程中。\n\
  \n## 总结\n\n在本章中，我们学习了如何在浏览器中处理声音。声音 API 仍然远非完美，尤其是在移动设备上。像 `SoundManager2` 这样的库旨在使声音能够轻松地从\
  \ JavaScript 访问。当浏览器无法播放某些声音格式时，`SoundManager` 会使用 Flash 插件，并允许你在任何地方播放媒体。\n\n\n\
  \n\n# 添加声音\n\n即使在相当老旧的浏览器上也能实现。\n\n我们学习了如何播放单个音效和循环音效，如何处理有损音频格式的问题，以及如何实现无缝循环播放。还了解了\
  \ Apache Cordova 的声音功能，以便为原生应用添加音效。\n\n我们为《逃离骑士》——即第 14 章用 Crafty 引擎创建的游戏——添加了声音功能。使用了三种音效：一个背景循环音效、一个“点击”音效，以及一个“游戏结束”音效。\n\
  \n### 进一步探索\n\n本书中，我们学习了 Android 网页游戏开发的基础技术。现在，你已经清楚地了解如何从零开始制作自己的 Android 网页游戏：2D\
  \ 或 3D、单人或多人在线、带声音、动画和 AI 功能。但游戏开发远不止于此。\n\n移动娱乐世界是一个发展极其迅速的世界。即便是几年前听起来还很神奇的东西，如今已成为现实：GPS、3D\
  \ 图形、富媒体、网络、语音识别、增强现实——所有这些都融合在崭新智能手机闪亮的屏幕之下。无限的可能性为你打开了大门，等你探索那些根本不同的游戏。\n\n未来令人兴奋，随时准备好接纳你最疯狂的想法。\n\
  \n# 附录 A：调试客户端 JavaScript\n\n我曾有位朋友告诉我：“在 Android 上调试 JavaScript 代码就像用勺子砍柴。”默认情况下，Android\
  \ 浏览器没有任何调试器。我们无法实现典型的调试场景：设置断点、添加监视变量，然后以“逐步”模式执行，直到在代码中找到问题所在。因此，我们唯一能用的就是 `console.log`——将一些值写入设备日志，然后再读取。\n\
  \n不过，仍然有好几种工具和技巧，希望能让你的调试体验——即便谈不上愉快——至少变得稍微轻松一些。\n\n本附录将专门介绍这些调试工具。调试是开发过程中最重要的环节。代码中的错误是不可避免的，而我们能做的，就是尽量快速、省力地修复它们。\n\
  \n好消息是，你通常可以在常规浏览器中完成 90% 的工作，只在设备上进行最后 10% 的打磨。通常，如果你在智能手机上发现了一个 bug，在桌面浏览器中也存在完全相同的\
  \ bug，而桌面浏览器拥有大量非常好用的工具来定位并修复问题。\n\nAndroid 的默认浏览器基于 WebKit。显然，你用于早期测试和调试的主要桌面浏览器也应该来自同一家族。最流行的基于\
  \ WebKit 的浏览器是 Safari 和 Google Chrome。两者都拥有强大的“开发者工具”。如果你已经习惯在其中一种浏览器中进行调试，那么切换到另一种浏览器时也能轻松上手。\n\
  \n在本附录中，我们将学习如何执行以下操作：\n\n- 使用桌面浏览器调试常见问题\n- 使用 Android 提供的默认工具\n- 使用 weinre 简化部分调试任务\n\
  \n## 调试示例\n\n在本附录中，我们采用基于实操示例的方法。让我们尝试为我们的网页进行最简单的调试过程。我们需要一些 JavaScript 代码来操作（参见代码清单\
  \ A-1）。\n\n### 代码清单 A-1. 存在 Bug 的 JavaScript 代码示例\n\n```html\n<!DOCTYPE html>\n\
  <html lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n<script>\nfunction getMax(a,\
  \ b) {\n    if (a > b)\n        return a;\n    if (b > a)\n        return b;\n}\n\
  \nfunction init() {\n    writeToDiv(getMax(1, 2));\n    writeToDiv(getMax(4, 1));\n\
  \    writeToDiv(getMax(1, 1));\n}\n</script>\n```\n\n\n\n```html\nfunction writeToDiv(value)\
  \ {\n    document.getElementById(\"result\").innerHTML += value + \"<br/>\";\n}\n\
  </script>\n</head>\n<body onload=\"init()\">\n<div id=\"result\"></div>\n</body>\n\
  </html>\n```\n\n主函数 `getMax()`（来自清单 A-1）旨在返回两个数中的较大值。在给定数值输入的情况下，它应始终返回一个数字。将清单复制到一个新的\
  \ HTML 文件中，并加载到浏览器中：使用 `nginx`（在第 1 章中描述）或 `Node.js`（在第 10 章中描述）将页面提供给浏览器。以下输出与我们预期的并不完全一致：\n\
  \n```\n2\n4\nundefined\n```\n\n页面没有显示三个数字，而是只显示了两个，然后出现了难看的 `undefined`。显然，该函数有一个\
  \ bug！是时候来解决它了。\n\n## 在桌面浏览器中调试\n\n遇到 bug 时，首先要做的是检查它是否能在桌面浏览器中重现。如果可以，那么你就可以使用全套开发工具来查找并修复有问题的代码行。\n\
  \n打开 Google Chrome 并加载该页面。然后按 `F12` 打开开发者工具窗口。欢迎来到你的终极调试工具。点击顶行的 **脚本** 按钮。现在你应该能看到我们刚刚创建的有\
  \ bug 的页面的代码。如果代码没有立即显示出来，你可能需要从下拉列表中选择包含脚本的正确文件，如图 A-1 所示。\n\n**图 A-1.** *脚本标签页，显示页面代码以及一个包含已加载文件列表的下拉菜单*\n\
  \n调试 JavaScript 的思路与其他任何语言相同：定位看起来可疑的代码，在代码片段开头设置断点，然后逐行执行脚本，确保每一步中变量都具有正确的值。\n\n\
  在代码窗口左侧有一个带行号的面板。找到 `getMax()` 函数中的第一条指令：`if (a > b)`，然后点击左侧面板上对应的行（图 A-1 中的第 7\
  \ 行）。现在你应该看到一个小蓝色箭头，表示断点已设置。然后重新加载页面。你刚才标记的那一行会以蓝色背景高亮显示（见图 A-2）。执行已暂停，你可以检查脚本的状态。\n\
  \n**图 A-2.** *在 Google Chrome 中调试 JavaScript*\n\n图 A-2 右侧的面板可帮助你进行检查。例如，调用堆栈允许你检查当前正在执行的函数堆栈。看一下：第一个函数是\
  \ `onload`，它是事件处理程序，然后 `onload` 调用了一个名为 **\"匿名函数\"** 的东西——这是我们写在 body 标签的 `onload`\
  \ 参数中的代码：`onload=\"init()\"`。接着，它调用了 `init()` 函数，然后执行传递给了 `getMax()`。该函数将从 `init()`\
  \ 中被调用三次，每次的结果会追加到前一个结果下方。如你所见，有问题的调用是最后一次，传入的参数是 `(1, 1)`。\n\n接下来，检查 **作用域变量**\
  \ 部分：一组从当前代码行可访问的变量。当你需要追踪某个表达式的结果时，打开 **监视表达式** 块，点击小的加号，然后输入要计算的表达式。例如，如果你输入 `Math.max(a,\
  \ b)`，你将看到我们期望从自定义函数中得到的结果（见图 A-3）。如果变量在当前作用域中无法访问，你将看到 `ReferenceError`，而不是表达式的结果。\n\
  \n**图 A-3.** *近距离查看脚本标签页右侧面板，该面板允许你检查当前执行状态并管理断点*\n\n按 `F10` 进入下一条指令，按 `F11` **\"\
  单步进入\"** 函数。逐步遍历代码，直到你到达出错的代码处——在本例中，是第三次调用：`writeToDiv(getMax(1, 1))`。当参数相等时，似乎一切都会出错。没错，`if`\
  \ 检查没有通过，`return` 语句根本没有被调用：这就是为什么我们得到了 `undefined` 值。好了，既然你知道问题出在哪里了——你就可以轻松修复它了！\n\
  \n**注意：** 这是典型的动态语言问题的另一个例子。在 JavaScript 中，同一个函数可以返回不同类型的值：字符串、数字、对象或 `undefined`。静态语言会在编译时检查函数的返回类型，像这样的错误永远不会进入生产环境。在\
  \ JavaScript 中，这段代码是完全合法的。\n\n这很简单，对吧？也许甚至太简单了。这个 bug 不用调试器，仅通过阅读四行代码就能追踪到。但情况并非总是如此。有时你需要更多手段来调试一个就是不能按预期工作的函数。Chrome\
  \ 的调试器功能远不止这些。详细的调试教程超出了本书的范围，但你可以在 `http://code.google.com/chrome/devtools/docs/overview.html`\
  \ 找到更多关于 Chrome 开发者工具的信息。\n\n## 在移动设备上调试\n\n现在让我们考虑最坏的情况：你必须在设备（或模拟器）上调试代码。你唯一真正可行的选择是写入控制台，然后读取日志。这是一种繁琐且低效的技术，但不幸的是，当桌面浏览器不可用时，这是我们唯一的方法。\n\
  \n如果你打算用模拟器调试，运行它并打开页面。如果你使用的是真实设备，你首先需要启用 USB 调试；否则，你将无法访问设备日志。进入 **设置 ➤ 应用程序 ➤\
  \ 开发**，确保 **USB 调试** 已激活。之后，用数据线将你的智能手机或平板电脑连接到 PC，然后继续。\n\n打开命令行并输入以下内容：\n\n```\n\
  > adb logcat -v raw browser:I *:S\n```\n\n这会实时显示设备（或模拟器）的日志，并过滤它们，只显示你实际感兴趣的消息；在本例中，是来自浏览器的控制台输出。\n\
  \n**注意：** 你不相信魔法，想要一个更好的解释来说明这一切是如何工作的？好吧，`adb`（Android 设备桥）是用于从 PC 与 Android 设备或模拟器进行通信的工具。使用这个工具，你可以直接向设备发出命令，或使用设备的服务。除了检查日志，你还可以安装或卸载程序、重启设备，甚至访问你的\
  \ Android 设备的 shell。\n\n我们刚才发出的命令（`logcat`）用于查看日志。第二个参数 `-v raw` 告诉 `logcat` 省略额外的日志信息，比如正在写入日志的进程\
  \ ID 或日志级别。最后一个参数是过滤器。默认情况下，`logcat` 非常冗长：每一个 Android 组件都倾向于记录周围发生的任何有趣的事情。没有过滤器，`logcat`\
  \ 几乎毫无用处。尝试不带最后一个参数运行它，你自己就会看到。\n\n\n\n# Android 日志调试\n\n每个 Android 日志条目都有一个日志级别和一个标签。日志级别表示消息的严重程度：`Verbose`、`Debug`、`Info`、`Warn`、`Error`。标签通常表示写入日志的组件。\n\
  \n我们传递给 `logcat` 的最后一个参数包含两个过滤器：\n\n`browser:I`\n\n这意味着：为标签 `browser` 写入所有日志级别为\
  \ `Info` 及更高的输出（不显示 `Verbose`）。\n\n第二个过滤器：\n\n`*:S`\n\n告诉它除了我们在其他过滤器中指定显示的内容之外，不要显示任何其他内容。星号（`*`）代表“所有其他标签”。`S`\
  \ 表示 `Silent` —— 无日志记录。\n\n使用这些选项运行 `logcat` 将只显示我们正在查找的输出。\n\n现在让我们向应用程序添加一些调试输出，以了解其工作原理。\n\
  \n清单 [A-2] 是代码的更新版本，它打印出我们正在调试的函数的参数和返回值。\n\n**清单 A-2.** 使用日志语句调试的更新示例（使用 logcat）\n\
  \n```javascript\nfunction getMax(a, b) {\n  console.log(\"getMax a=\" + a + \" b=\"\
  \ + b);\n  if (a > b)\n    return a;\n  if (b > a)\n    return b;\n}\n\nfunction\
  \ init() {\n  var result;\n  writeToDiv(result = getMax(1, 2));\n  console.log(result);\n\
  \  writeToDiv(result = getMax(4, 1));\n  console.log(result);\n  writeToDiv(result\
  \ = getMax(1, 1));\n  console.log(result);\n}\n```\n\n附录：调试客户端 JavaScript（[622]）\n\
  \n现在在设备浏览器中重新加载页面并查看 `logcat` 输出。每条消息后，`console.log` 会打印页面地址和行号。\n\n```\n> adb -d\
  \ logcat -v raw browser:I *:S\n--------- beginning of /dev/log/main\n--------- beginning\
  \ of /dev/log/system\nConsole: getMax a=1 b=2 http://192.168.1.142/:19\nConsole:\
  \ 2 http://192.168.1.142/:29\nConsole: getMax a=4 b=1 http://192.168.1.142/:19\n\
  Console: 4 http://192.168.1.142/:31\nConsole: getMax a=1 b=1 http://192.168.1.142/:19\n\
  Console: undefined http://192.168.1.142/:33\n```\n\n你可能已经猜到了，这就是所谓的“用勺子砍木头”。这种方法极其缓慢且效率低下，但嘿，总比没有好。此外，你必须更改应用程序代码来添加日志记录，这可能会引入更多错误。底线是：只要能用桌面浏览器调试，就用它来调试。\n\
  \n### 几乎无需更改代码的日志记录\n\n日志记录的一个缺点是必须更改代码才能使其工作。你必须在各处放置日志语句，只是为了调试有问题的片段。有时你只需要记录函数名称、输入参数和结果。所以这里在清单\
  \ A-3 中有一个技巧，可以向任何给定函数添加适度的日志记录功能，而无需显著影响其代码。\n\n**清单 A-3.** 便捷日志包装器\n\n```javascript\n\
  function getMax(a, b) {\n  if (a > b)\n    return a;\n  if (b > a)\n    return b;\n\
  }\n\n/**\n * 创建\"日志记录\"包装器，记录每个函数调用：\n * 传递的参数和结果。\n * @param tag 日志标签（通常是函数名称）\n\
  \ * @param fun 函数。确保传递函数本身，而不是函数结果！\n */\nfunction wrapWithLogging(tag, fun) {\n\
  \  return function() {\n    var result = fun.apply(this, arguments);\n    var argumentsString\
  \ = Array.prototype.join.call(arguments, \"|\");\n    console.error(tag + \"(\"\
  \ + argumentsString + \") = \" + result);\n    return result;\n  };\n}\n\nfunction\
  \ init() {\n  getMax = wrapWithLogging(\"getMax\", getMax);\n  writeToDiv(getMax(1,\
  \ 2));\n  writeToDiv(getMax(4, 1));\n  writeToDiv(getMax(1, 1));\n}\n```\n\n附录：调试客户端\
  \ JavaScript（[623]）\n\n\n\n可以看到，`wrapWithLogging` 将目标函数作为参数，并将其包裹在一个匿名函数中，该匿名函数执行目标函数，然后将参数和返回值写入控制台。让我们更仔细地看一下代码。\n\
  \n```javascript\nreturn function() {\n  var result = fun.apply(this, arguments);\n\
  \  var argumentsString = Array.prototype.join.call(arguments, \"|\");\n  console.error(tag\
  \ + \"(\" + argumentsString + \") = \" + result);\n  return result;\n};\n```\n\n\
  在第一行中，我们使用传递给它的任意参数执行原始函数。然后，我们创建函数参数的简单字符串表示，将消息写入控制台，并返回原始调用的结果。\n\n接着，在下面的代码中，我们将原始函数替换为包装后的函数，并保持其余代码不变：\n\
  \n```javascript\ngetMax = wrapWithLogging(\"getMax\", getMax);\n```\n\nwriteToDiv(getMax(1,\
  \ 2));\n\nwriteToDiv(getMax(4, 1));\n\nwriteToDiv(getMax(1, 1));\n\n**注意：** 这种函数技巧可能看起来像黑魔法。好消息是，它实际上并非如此。只需要了解一些关于\
  \ JavaScript 的知识就能弄清楚。在 JavaScript 中，一切都是对象，甚至函数也是对象。\n\n所以，如果你有如下代码：\n\n```javascript\n\
  function foo() {\n  return 1;\n}\n```\n\n那么 `foo()`（带括号）会执行函数并返回结果，而 `foo`（不带括号）则引用函数本身，而不是它的结果。按照同样的逻辑，函数的返回类型可以是另一个函数——就像我们这里的例子一样。\n\
  \n第二个可能不那么明显的部分是 `arguments` 变量。它是一个可以从任何 JavaScript 函数内部访问的变量。它的行为类似于数组：你可以使用括号语法\
  \ `arguments[0]` 访问单个参数，或者获取 `arguments.length`，但不能对其使用数组方法，因为它*不是*真正的数组。因此，这里使用了\
  \ `join` 的技巧：\n\n```javascript\nArray.prototype.join.call(arguments, \"|\");\n```\n\
  \n我们必须使用 `Array` 中的函数，因为 `arguments` 对象没有自己的 `join()` 方法。\n\n控制台输出正是我们所需要的，如下所示：\n\
  \nConsole: getMax(1|2) = 2 http://192.168.1.142/:25\n\nConsole: getMax(4|1) = 4\
  \ http://192.168.1.142/:25\n\nConsole: getMax(1|1) = undefined http://192.168.1.142/:25\n\
  \n这个辅助函数有些局限性。例如，对于接受对象作为参数的函数来说，它的作用有限：我的简单包装器不知道如何获取对象的属性并清晰地打印它们。当函数参数是对象时，它无法避免需要在函数体内放置日志语句的情况。\n\
  \n### weinre\n\n`weinre`（[`people.apache.org/~pmuellr/weinre/`](http://people.apache.org/%7Epmuellr/weinre/isagreattoolthataimstofillthegapofremotedebuggingbetweenthePCandAndroidstockbrowser.Itdoesn%E2%80%99thavethewh)）是一个很棒的工具，旨在填补\
  \ PC 和 Android 原生浏览器之间远程调试的空白。它不具备桌面调试器的全部功能，但仍然非常有用。尽管它不允许你设置断点并分析变量，但它拥有一套丰富的工具，可用于\
  \ DOM 操作、跟踪脚本时间线以及直接在设备上即时执行 JavaScript。\n\n下载最新版本的 `weinre-jar` 压缩包，请访问：\n\n\n\n\
  [`people.apache.org/~pmuellr/weinre/builds/.`](http://people.apache.org/~pmuellr/weinre/builds/)\
  \ 解压 zip 文件，然后在命令行中运行以下命令：\n\n```\njava -jar weinre.jar --httpPort 8000 --boundHost\
  \ -all-\n```\n\n`weinre.jar`文件是一个可执行的 Java 程序，用于启动调试服务器，该服务器充当设备和 PC 之间的中介。\n\n\
  它为连接到它的 WebKit 浏览器提供调试接口，并与调试目标（在设备或模拟器上运行的网页）交换命令。上述命令会在端口 8000 上启动服务器。\n\n要完成设置，请将要调试的网页中添加以下一行代码：\n\
  \n```\n<script src=\"http://10.0.2.2:8000/target/target-script-min.js#anonymous\"\
  ></script>\n```\n\n这行代码指示 HTML 页面加载由调试服务器提供的特殊脚本，然后开始通信。根据您的环境更改 IP 地址和端口。例如，上述行用于从模拟器启动页面，该页面通过`10.0.2.2`引用主机操作系统。端口\
  \ 8000 是通过`weinre.jar`启动选项配置的。\n\n在设备上加载该页面。现在，在桌面 Chrome 浏览器中访问`http://localhost:8000/client`（该界面在\
  \ Safari 中也可用，但在 Chrome 上显示效果略好）。图 A-4 显示了打开的调试会话。背景中的浏览器窗口显示调试界面。如您所见，它看起来与我们在本附录第一节中尝试的\
  \ Chrome 开发者工具完全一样。\n\n![图 A-4](img/index-626_1.jpg)\n\n**附录：调试客户端 JavaScript**\n\
  \n**图 A-4** *weinre 调试会话。打开的“元素”选项卡允许您探索和修改设备 DOM 树的内容。*\n\n有关 weinre 的更多信息，请参考其主页：`http://people.apache.org/~pmuellr/weinre/`。Chrome\
  \ 开发者工具文档页面位于：`http://code.google.com/chrome/devtools/docs/overview.html`。\n\n##\
  \ 总结\n\nAndroid 缺乏对浏览器中全功能调试的支持，这会使调试变得极其困难。幸运的是，大多数问题并非设备特定，可以在桌面浏览器上进行调试。基于 WebKit\
  \ 的浏览器（Chrome 和 Safari）提供了一套出色的“开发工具”，专注于解决各种问题：布局、逻辑或时序。\n\n在本附录中，我们学习了如何执行以下操作：\n\
  \n- 在基于 WebKit 的浏览器中调试网页\n- 使用标准的 Android 工具：`console.log`和`logcat`来追踪问题\n- 设置`weinre`以调试网页可能存在的布局或时序问题\n\
