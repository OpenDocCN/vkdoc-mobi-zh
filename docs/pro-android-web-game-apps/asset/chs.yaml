  \ JavaScript 并且喜欢它；我们可以用它来处理模板，没有理由不去用它。\n\n##### 创建模板\n\n让我们把关于模板的知识应用到项目中。创建一个能渲染游戏面板的模板。首先，你需要安装模板引擎\
