  \        this._clusters[i] = [];\n        for (var j = 0; j < Math.ceil(this._worldWidth/this._clusterSize);\
  \ j++) {\n            this._clusters[i][j] = [];\n        }\n    }\n\n    // 将每个对象分配到集群中\n\
  \    for (i = 0; i < this._objects.length; i++) {\n        var obj = this._objects[i];\n\
  \        this._addToClusters(obj);\n    }\n};\n```\n\n要添加对象，首先需要找到重叠的集群（`Rect` 类中已包含执行此操作的\
  \ `getOverlappingGridCells()` 函数）。然后，将对象推入数组，并将边界保存到 `_idToClusterBounds` 中。清单 7-20\
  \ 演示了如何实现。\n\n**清单 7-20.** 将对象添加到集群\n\n```javascript\n_p._addToClusters = function(obj,\
  \ clusterBounds) {\n    clusterBounds = clusterBounds || obj.getBounds().getOverlappingGridCells(\n\
  \        this._clusterSize, this._clusterSize,\n        this._clusters[0].length,\
  \ this._clusters.length);\n\n    var startY = clusterBounds.y;\n    var endY = clusterBounds.y\
  \ + clusterBounds.height;\n    \n    for (var clusterY = startY; clusterY < endY;\
  \ clusterY++) {\n        var startX = clusterBounds.x;\n        var endX = clusterBounds.x\
  \ + clusterBounds.width;\n        \n        for (var clusterX = clusterBounds.x;\
