  \ 4 之后的结果保存到单独的 `cache` 中，并用于渲染。\n\n对象缓存与 `IsometricTileLayer` 的离屏画布有些相似，但它保存的不是图像，而是一个对象数组。它的工作方式非常直接。一旦我们知道当前可见的集群，我们就将每个对象添加到缓存中，并检查它是否已存在。然后对数组进行排序，以便在绘制代码中直接使用。清单\
