  \ 的算法非常简单：计算出可容纳的最大区域，然后将棋盘居中显示在屏幕上（见代码清单 3-24）。  \n\n**代码清单 3-24.** *调整棋盘尺寸：为界面留出最大空间并将其置于屏幕中央*\
