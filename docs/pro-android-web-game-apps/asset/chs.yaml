  \n#### 缩放\n\n缩放是一种对场景中的形状进行“拉伸”或“收缩”的变换。x 轴和 y 轴的缩放值可独立设置。初始正常缩放值为两轴均为 1，简称`(1,\
  \ 1)`（在本小节中，此写法表示缩放值而非坐标；数字分别代表 x 和 y 方向的缩放值）。\n\n以下三个简单示例有助于你更好地理解缩放：\n\n- 缩放值大于\
  \ 1 会使每个图形变大。例如，`(2, 2)`使形状变为两倍大。\n- 缩放值介于 0 和 1 之间会缩小图形。例如，`(0.5, 0.5)`使每个形状变为正常大小的一半。\n\
  - 负数缩放值会改变坐标轴方向并翻转形状。例如，`(-1, 1)`会使每个形状水平翻转。\n\n以下代码展示了缩放的常见用法：\n\n```\nctx.scale(2,\
