  \ 我们将使用 `ejs` 引擎来渲染模板。接下来的两行...\n\n\n```markdown\n\n\n将中间件添加到服务器。我们明确告诉服务器，我们会首先尝试通过`app.get(…)`函数来服务请求。只有当在那里找不到合适的内容时，我们才会转而处理静态文件。\n\
