  \n`IsometricTileLayer`略有不同，因为单个瓦片并非以对象形式表示。该图层仅发送一个自定义`tileClicked`事件。列表 7-47 展示了如何更新`IsometricTileLayer`的代码以响应事件。现在，每当用户点击瓦片时，该图层就会发送`tileClicked`事件。\n\
  \n**列表 7-47.** *更新 IsometricTileLayer*\n\n```\n_p._onUpEvent = function(e) {\n \
