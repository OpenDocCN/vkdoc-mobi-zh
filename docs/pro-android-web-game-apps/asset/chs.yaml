  , function() {\n  Crafty.background(\"#000\");\n  showLogo();\n  Crafty.load(images,\n\
  \    function() {\n      Crafty.scene(\"game\");\n    });\n});\n\nfunction showLogo()\
  \ {\n  Crafty.sprite(logo.width, logo.height, logo.sprite, { logo: [0,0] });\n \
  \ Crafty.e(\"2D, Canvas, logo\").attr({\n    x: (Crafty.DOM.window.width - logo.width)/2,\n\
  \    y: (Crafty.DOM.window.height - logo.height)/2\n  });\n}\n```\n\n在本地环境下，图片几乎是瞬间加载完成的，因此你很可能根本看不到加载画面。为了开发调试，你可能想要增加一个人为延迟，让加载画面至少显示两秒钟（参见`列表\
  \ 14-7`）。当你的游戏正式上线后，只需移除这段代码即可。\n\n**`列表 14-7`.** **延迟加载场景，以便你能够看到第一张图片**\n```javascript\n\
  Crafty.scene(\"loading\", function() {\n  Crafty.background(\"#000\");\n  showLogo();\n\
  \  var startTime = new Date().getTime();\n  Crafty.load(images,\n    function()\
  \ {\n      var timeLoading = new Date().getTime() - startTime;\n      setTimeout(function()\
  \ {\n        Crafty.scene(\"game\");\n      }, Math.max(2000 - timeLoading, 0));\n\
  \    });\n});\n```\n\n此时，图片已加载完毕并准备好在屏幕上渲染。接下来的任务是渲染关卡。\n\n**渲染地形和物体**\n\n你已经看到过从图片创建精灵的代码。实际上，`Crafty.sprite()`\
  \ 方法就是设计用来处理精灵表的。以下代码展示了它是如何工作的：\n\n```javascript\nCrafty.sprite(128, 68, \"img/terrain.png\"\
  , {\n  grass: [0,0], grass2: [1,0], roadNW: [2,0],\n  bricks: [0,1], roadSW: [1,1],\
  \ roadNS: [2,1],\n  roadWE: [0,2], roadNE: [1,2], roadSE: [2,2]\n});\n```\n\n该精灵表由\
  \ `128 × 68` 像素的图片组成。每张图片占据精灵表的一个“单元格”。`Crafty.sprite()` 函数将这些单元格坐标与特定名称（如 `grass`、`bricks`\
  \ 或 `roadWE`）关联起来。\n\n然后，这个精灵就可以像其他任何组件一样使用了：\n\n```javascript\nCrafty.e(\"2D, Canvas,\
  \ grass\").attr({x: 30, y: 20});\n```\n\n现在，渲染关卡的代码对你来说应该是小菜一碟了（参见`列表 14-8`）。我们将使用与第\
  \ 7 章完全相同的技术来渲染等距地图。如果你需要复习等距数学的知识，请随时回顾第 7 章。\n\n**`列表 14-8`.** **渲染背景**\n```javascript\n\
