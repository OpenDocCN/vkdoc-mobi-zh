  \n**注意：** 那些了解 REST 原则的人一定在想：“这家伙全做错了——谁来阻止他。”我刚刚违反了`GET`请求的语义，该语义不应该改变系统的状态。当你设计\
  \ API 或服务器时，你的`GET`请求应该只检索数据，而不是修改它。对于修改，我们有`POST`。这次我为了简单起见使用了`GET`来更新棋盘。但使用`GET`的危险是什么？嗯，点击任意单元格进行一次操作，然后刷新浏览器几次。这就是这个糟糕设计决策的副作用。在实际开发中不要这样做。\n\
  \n**第 10 章：走向服务端**\n\n**433**\n\n还有两种方法可以将参数传递给服务器：通过`POST`（在这种情况下，它被编码在请求体中）以及通过路径本身：对于\n\
  \n\n```\n\n```markdown\n\n例如，我们的 URL 可能看起来像 `http://localhost/turn/5`，那么 `5` 就是参数（顺便一提，`turn`\
  \ 也可以是参数）。如果你想要了解更多关于这个技巧的信息，可以查阅 Express 的文档（`http://expressjs.com/guide.html#route-param\
  \ pre-conditions`），或者继续阅读下一章——我们在那里使用了它。\n\n#### 使用会话（Sessions）\n\n目前，任何用户都可以加入游戏并开始点击棋盘，因为整个服务器只有一个共享的棋盘。当你开始制作真正的游戏时，需要将用户与游戏分开。换句话说，对于每一个正在游戏的用户，你需要存储他正在玩的棋盘的引用。一旦你知道如何处理会话，这就变成了一项简单的任务。\n\
  \n会话是一种识别用户并跟踪其行为的方式。如果你之前没有接触过会话，可以将其视为一个与用户浏览器关联的对象。这个对象驻留在服务器上，因此用户无法更改它。例如，我们可以通过向用户会话中添加一个计数器，并在每次为用户提供页面服务时增加它，来跟踪用户访问了多少个页面。\n\
  \n为了给我们的服务器添加会话支持，我们需要使用另一件中间件：我想你已经开始看到这种模式了。清单 10-24 展示了所需的配置。\n\n**清单 10-24.**\
  \ *向服务器添加会话支持*\n\n```javascript\napp.use(express.cookieParser());\napp.use(express.session({\
  \ secret: \"gameserversession\" }));\napp.use(app.router);\napp.use(express.static(__dirname\
  \ + '/public'));\n```\n\n以上就是跟踪用户所需的全部内容。添加这些行之后，传递给处理函数（handler function）的请求对象（`request`）会被添加一个名为\
  \ `session` 的新字段。你可以添加新的属性，读取之前设置过的属性，并将它们传递给模板。清单 10-25 中的示例展示了如何创建一个新的会话参数 `totalTurns`，该参数会在用户每次执行操作（turn）时递增。\n\
  \n**清单 10-25.** *使用会话参数*\n\n```javascript\napp.get('/', function(req, res) {\n \
  \ if (!req.session.totalTurns) {\n    req.session.totalTurns = 0;\n  }\n  var turn\
  \ = req.query[\"turn\"];\n  if (!isNaN(turn)) {\n    board.makeTurn(turn);\n   \
  \ req.session.totalTurns++;\n  }\n  res.render('test', {\n    BoardModel: boardApi.BoardModel,\n\
  \    board: board,\n    totalTurns: req.session.totalTurns,\n    layout: false\n\
  \  });\n});\n```\n\n会话的典型用途是区分用户：在需要时支持身份验证和授权。最常见的用例是检查会话是否包含 `userID` 属性，如果包含，则表示用户已登录并可以访问你网站的受限区域。如果没有这个属性，则表示用户是匿名用户，他应该继续前往登录表单。当用户输入正确的登录名和密码后，他的会话会被更新，并设置\
  \ `userID`。\n\n我们使用会话将用户与进度关联起来。显然，一个真正的多人解决方案必须支持多个同时进行的游戏，而不是像我们之前那样只支持一个。因此，我们将使用会话来跟踪在服务器上运行的众多游戏实例中，哪一个是属于该用户的正确实例。我们将在第\
  \ 12 章中为游戏添加这个功能。\n\n关于会话的最后一点重要说明：默认情况下，会话数据存储在内存中，因此服务器重启后会话将不会保留。如果你需要一个更可靠的解决方案，应该查阅\
  \ Express 文档，地址是 `http://expressjs.com/guide.html#session-support`。\n\n当前状态的项目源代码位于\
  \ `05.sessions` 文件夹中。\n\n#### 理解中间件（Middleware）\n\n我们在本章中多次使用这个术语，因此我认为现在是时候解释一下它到底是什么了。中间件是\
  \ Express 选用的一种特殊说法，用来表示一个模块，该模块可以用某种方式来过滤 HTTP 请求，\n\n```\n\n\n# 为下一个中间件丰富请求和响应变量\n\
  \n在 Express 中，你几乎所有的操作都在这些小巧精良的模块中完成。为了更好地理解它们，不妨将其视为层级（参见图 10-11）。\n\n**图 10-11.**\
  \ *中间件层级。请求会依次通过每个执行特定任务的\"层级\"。*  \n*请求处理可以在某个层级停止并返回，也可以继续传递到下一层级，如此类推。*\n\n每个新请求都会先传递到第一层。它可以在该层停止并返回结果，也可以传递到下一层，以此类推。正如你所见，中间件有时依赖于前几层的处理结果。例如，我们的`get`处理器需要会话才能正常工作。如果将其放在会话中间件之上，那么调用时就不会有可用的会话数据。会话本身也是如此。会话需要先解析\
  \ Cookie。Cookie 存储着当前用户的会话 ID，没有它，我们就无法加载用户的会话数据。如果前一层没有解析 Cookie，会话就无法工作。这意味着`cookieParser`中间件必须放在`session`中间件之前。\n\
  \n典型的中间件堆栈如代码清单 10-26 所示。\n\n**代码清单 10-26.** *一个典型的 Node.js 服务器中间件堆栈*\n\n```javascript\n\
  app.use(express.logger(...)); // 类似于 Apache HTTP 服务器的访问日志\napp.use(express.bodyParser(...));\
  \ // 提取请求体中存储的有用数据（通常是 POST 请求）\napp.use(express.cookieParser(...)); // 解析 Cookie\
  \ 并填充 req.cookies\napp.use(express.session(...)); // 启用会话支持，并填充 session 和 sessionStore\n\
  \n第 10 章：转向服务端\n\napp.use(app.router); // 执行路由函数\napp.use(express.static(...));\
  \ // 提供静态文件服务\napp.use(express.errorHandler(...)); // 报告任何异常\n```\n\n你可以对中间件其他层级的执行进行一定程度的控制。这种控制通过`next()`函数赋予你，它通常作为第三个参数传递给回调函数。在此之前，我们一直忽略第三个参数：\n\
  \n```javascript\napp.get('/', function(req, res) {\n  …\n});\n```\n\n要接收这个回调，只需像这样添加一个参数：\n\
  \n```javascript\napp.get('/', function(req, res, next) {\n  …\n});\n```\n\n请求的执行会在决定不调用`next()`的中间件处停止。忽略`next()`意味着该中间件决定返回结果，并且不希望将执行传递到更低层级。\n\
  \n请看代码清单 10-27，它演示了如何利用这个技巧实现一些疯狂的内容过滤。假设有一个非常特殊的静态页面，只对至少完成了十次操作的用户显示。我们可以添加一个路由来匹配该页面地址，并在其中检查安全限制。\n\
  \n**代码清单 10-27.** *通过层级传递控制权*\n\n```javascript\napp.get('/prize.html', function(req,\
  \ res, next) {\n  if (req.session.totalTurns && req.session.totalTurns > 10) {\n\
  \    next();\n  } else {\n    res.send(\"点击次数还不够哦！\");\n  }\n});\n```\n\n当路由器收到对`/prize.html`的请求时，它会检查用户的操作次数。该值存储在会话中。如果值大于十，我们只需调用`next()`。这样做可以让其他中间件继续工作。反之，如果点击次数不够，我们就自己处理请求。由于我们没有调用`next()`，请求处理在此停止，静态中间件甚至不会知道用户曾试图访问该页面。只有当你的路由器在堆栈中位于静态中间件之上时，这个技巧才有效。否则，你将无法过滤请求，因为静态中间件会先于你提供内容。\n\
  \n如果在中间件层级中遇到错误并决定让它继续传递，你应该将错误作为参数传递给`next()`函数。然后错误会被注册的错误处理器捕获并处理。请继续阅读以了解其工作方式。\n\
  \n#### 内务整理\n\n本章的最后一部分将致力于那些虽小但实用的内务管理任务。\n\n\n\n# 每个 Web 服务器都应实现的功能\n\n每个 Web\
  \ 服务器都应具备的功能包括：日志记录、错误报告以及对不同环境的支持。在前一节中，你可能已经注意到了几个新的中间件：`logger`和`errorHandler`。现在我们来深入了解它们，以此结束对\
  \ Express 框架的初步认识。\n\n##### 报告错误\n\n日志记录和错误报告都是非常重要的任务——无法想象一个运行在生产环境中的严肃 Web 服务器会忽视这两者中的任何一个。我们从错误报告系统开始，编写一些会产生错误并引发异常的代码（见清单\
  \ 10-28）。这是最简单的一步——引入错误可比解决错误容易多了！\n\n**清单 10-28.** 制造人为错误以展示服务器如何处理\n\n```\nvar\
  \ express = require('express');\nvar app = express.createServer();\napp.set('views',\
  \ __dirname + '/views');\napp.set('view engine', 'ejs');\napp.use(express.cookieParser());\n\
  app.use(express.session({ secret: \"gameserversession\" }));\napp.use(app.router);\n\
  app.use(express.static(__dirname + '/public'));\napp.get('/', function(req, res)\
  \ {\n  var foo = {};\n  var bar = foo[\"bar\"].baz;\n  res.send(\"这行本不应可见\");\n\
  });\napp.listen(80);\n```\n\n显然，尝试访问未定义属性的某个属性必然会导致问题。启动服务器并发送请求，错误信息会同时输出到控制台和渲染在网页上。在我的环境中，堆栈跟踪信息如下所示：\n\
  \n```\nTypeError: Cannot read property 'baz' of undefined\n  at C:\\apps\\projects\\\
  jsbook\\chap10\\err.js:18:25\n  at callbacks (C:\\apps\\projects\\jsbook\\chap10\\\
  node_modules\\express\\lib\\router\\index.js:272:11)\n  at param (C:\\apps\\projects\\\
  jsbook\\chap10\\node_modules\\express\\lib\\router\\index.js:246:11)\n  at pass\
  \ (C:\\apps\\projects\\jsbook\\chap10\\node_modules\\express\\lib\\router\\index.js:253:5)\n\
  \  at Router._dispatch (C:\\apps\\projects\\jsbook\\chap10\\node_modules\\express\\\
  lib\\router\\index.js:280:4)\n  at Object.handle (C:\\apps\\projects\\jsbook\\chap10\\\
  node_modules\\express\\lib\\router\\index.js:45:10)\n  at next\n```\n\n这样的错误信息对开发者来说或许还能接受，但绝对不适合生产环境，原因有两点。首先，错误报告显然不够用户友好。你的最终用户不需要知道具体出了什么问题，也不需要了解是哪些代码行导致服务器崩溃。用户真正需要知道的只是：发生了某些问题，你的应用程序无法处理该请求。他或许应该再试一次——毕竟错误可能是临时性的。\n\
  \n同时，最好告诉用户：\"当你看到这条信息时，我们的技术支持团队已经在调查这个错误，并且正在尽最大努力修复它。\" 关注这类小细节是让项目显得可靠的关键。浏览器窗口中的堆栈跟踪会让你的系统看起来完全崩溃了，仿佛内部电线和齿轮正通过船体上的一个洞盯着用户。而一个设计良好的自定义错误页面则会让用户觉得这个错误并不严重。嘿，我们是游戏开发者——我们必须制作有趣的错误页面！想找一些错误页面设计的灵感，可以看看\
  \ GitHub 的 404 页面（见图 10-12）[`github.com/404`](https://github.com/404)。\n\n![](img/index-442_1.jpg)\n\
  \n**图 10-12.** 一个优秀错误页面的示例，它具备一些动态特性。当你在页面周围移动鼠标时，由于简单的视差效果，页面会感觉\"活\"起来。\n\n默认错误处理的第二个问题是，错误除了记录在日志中之外，不会在其他任何地方被报告。想象一下，你的朋友打电话给你说：\"\
  嘿，我刚试玩了你那款很棒的新在线游戏，但当我进入精灵森林时，它显示了一个花哨的错误界面。\" 如果你保留默认的错误处理，你甚至不会知道发生了什么——错误只会输出到控制台。这并非是报告此类重要错误的可靠方式。\n\
  \n\n\n当然，你可以将控制台输出保存到日志文件中，但你必须定期翻阅它，以检查一切是否正常。相信我，你迟早会懒得去做。程序员都很懒——这是我们的美德之一。但如果你可以对朋友说，“感谢报告，我正在处理。我已经在邮箱里收到报告了。”那该多好。这一切通过\
  \ Express 都能实现。\n\n第一步是添加`errorHandler`中间件，它可以配置为在浏览器中显示更美观（但仍然对技术人员友好）的错误页面。在你的中间件列表末尾添加以下代码行：\n\
  \n```javascript\napp.use(express.errorHandler());\n```\n\n这个中间件仅在开发阶段使用。图 10-13\
  \ 展示了异常屏幕的外观。\n\n![](img/index-443_1.jpg)\n\n**图 10-13.** *更美观的错误报告。对用户来说仍然可怕，因为阅读堆栈跟踪会让他们觉得自己的电脑要爆炸了。*\n\
  \n对于生产环境，我们应该提供一个更好的错误页面。如果你注册一个任意四个参数的函数到`use()`方法中，它会被视为错误处理器并作为中间件工作。它完全集成到生命周期中，可以决定是自己处理某个错误还是将其传递给下一层。清单\
  \ 10-29 展示了多个错误处理中间件如何协同工作。\n\n**清单 10-29.** *添加自定义错误处理中间件*\n\n```javascript\napp.use(express.cookieParser());\n\
  app.use(express.session({ secret: \"gameserversession\" }));\napp.use(app.router);\n\
  app.use(express.static(__dirname + '/public'));\napp.use(function(err, req, res,\
  \ next) {\n  if (canHandleMyself()) {\n    res.render(\"error\", {layout: false});\n\
  \  } else {\n    // 传递给下面定义的标准 errorHandler 中间件\n    next(err);\n  }\n});\napp.use(express.errorHandler());\n\
  ```\n\n示例中的代码非常简单，但它实现了一个有用的功能：它向用户隐藏了错误的可怕细节，并显示了一个精美的错误页面。在当前设置下，它会在`views`文件夹中查找`error.ejs`文件，并渲染它来代替默认的错误信息。我将设计你喜欢的错误页面的任务留给你。`canHandleMyself()`是你自己实现的函数。如果你不需要多层错误处理器，可以随意重写代码，使其始终返回自定义错误页面。\n\
  \n```javascript\napp.use(function(err, req, res, next) {\n  res.render(\"error\"\
  , {layout: false});\n});\n```\n\n现在我们来到最后的任务：将错误保存到某个地方，并通知支持团队。我会在本章下一节中，连同其他与日志相关的问题，向你展示如何将异常写入日志文件。接下来，我们转向支持团队的通知。最明显的选择是发送电子邮件。对于这类典型任务，通常已经有一个模块可以完成。它叫做`nodemailer`\
