  \ {\n  this.setPosition(this._bounds.x + deltaX, this._bounds.y + deltaY);\n};\n\
  \n_p.setPosition = function(x, y) {\n  if (this._bounds.x != x || this._bounds.y\
  \ != y) {\n    var evendData = {\n      oldX: this._bounds.x,\n      oldY: this._bounds.y,\n\
  \      x: x,\n      y: y,\n      object: this\n    };\n    this._bounds.x = x;\n\
  \    this._bounds.y = y;\n    this.emit(\"move\", evendData);\n  }\n};\n\n_p.getBounds\
  \ = function() {\n  return this._bounds;\n};\n\n_p.getId = function() {\n  return\
  \ this._id;\n};\n```\n\n`GameObject` 继承了 `EventEmitter`，因此每个游戏对象都可以发送自定义事件。这是一个相当便捷的特性。例如，`IsometricTileLayer`\
  \ 可以触发一个带额外参数的 `tileClicked` 事件，通知外部用户点击了某个特定瓦片；而 `ObjectLayer` 则可以触发 `objectClicked`——这是一个专属于其领域的事件。\n\
  \n每个游戏对象都有一个唯一 ID。这个 ID 在许多方面都很有用——从网络同步（精确判断十栋建筑中是哪一栋被摧毁）到调试这样虽小却重要的事情。`GameObject`\
  \ 类的代码使用一个全局计数器来跟踪已分配给游戏对象的最大 ID，并在每次后续构造函数调用时递增该值。\n\n### **数组**\n\n最后一个工具类将一小套工具整合在一起，使数组操作至少变得稍微容易一些。JavaScript\
  \ 对数组操作的支持非常薄弱；即使是其他语言通常内置提供的诸如 `contains()` 和 `remove()` 这样简单的函数，在 JavaScript 中也是缺失的。我们只需要三个辅助方法。这个类，如**清单\
  \ 7-5** 所示，非常小巧，我直接把它放到了 `utils.js` 文件中。\n\n### **清单 7-5.** `Array` 类：简化数组操作的小型辅助方法集合\n\
  \n```javascript\nvar Arrays = {\n  remove: function(obj, arr) {\n    var index =\
  \ arr.indexOf(obj);\n    if (index != -1)\n      arr.splice(index, 1);\n  },\n \
