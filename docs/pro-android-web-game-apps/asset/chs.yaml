- "# 第 3 段\n\n最后一部分是处理用户输入——追踪点击和拖拽事件，将事件传播到正确的图层，并执行更改地形或添加对象等操作。我们将再次审视事件架构，构建一个不引人注目的通知系统，使引擎的各组件尽可能地相互独立。事件系统就位后，我们将为项目添加最后润色——实现核心游戏机制（更改地形、添加和移除对象、改变游戏状态）。\n\
  \n### 准备工作\n\n我们需要使用前几章创建的几个类：`ImageManager`、`utils.js`、`EventEmitter`以及与用户输入相关的所有内容。请从之前的章节复制这些文件，或从本章素材中获取。接下来，将图片复制到`img`文件夹，并创建一个名为`Game.js`的空文件——我们很快会将游戏逻辑放入其中。完成这些步骤后，目录结构应如图\
  \ 7-3 所示。\n\n**图 7-3.** *项目初始结构*\n\n### 基础代码\n\n`index.html`文件的代码与前几章的初始代码相比变化不大。为完整起见，清单\
  \ 7-1 展示了该代码。页面加载完成后，`Game`类获取控制权（缩放行为除外，它被保留在外部，因为`Game`不应知道底层画布缩放的原因和时机）。\n\n\
  **清单 7-1.** *`index.html`文件：游戏入口*\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\"\
  >\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\"\ncontent=\"width=device-width,\
  \ initial-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi\"\
  />\n<style>\nhtml, body {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\n\
  padding:0;\nborder: 0;\n}\n</style>\n<script src=\"js/utils.js\"></script>\n<script\
  \ src=\"js/ImageManager.js\"></script>\n<script src=\"js/EventEmitter.js\"></script>\n\
  <script src=\"js/input/InputHandlerBase.js\"></script>\n<script src=\"js/input/MouseInputHandler.js\"\
  ></script>\n<script src=\"js/input/TouchInputHandler.js\"></script>\n<script src=\"\
  js/input/InputHandler.js\"></script>\n<script src=\"js/Game.js\"></script>\n<script>\n\
  var game;\nfunction init() {\ngame = new Game(initFullScreenCanvas(\"mainCanvas\"\
  ));\n}\nfunction initFullScreenCanvas(canvasId) {\nvar canvas = document.getElementById(canvasId);\n\
  resizeCanvas(canvas);\nwindow.addEventListener(\"resize\", function() {\nresizeCanvas(canvas);\n\
  });\nreturn canvas;\n}\nfunction resizeCanvas(canvas) {\ncanvas.width = document.width\
  \ || document.body.clientWidth;\ncanvas.height = document.height || document.body.clientHeight;\n\
  game && game.resize();\n}\n</script>\n</head>\n<body onload=\"init()\">\n<canvas\
  \ id=\"mainCanvas\" width=\"200\" height=\"200\"></canvas>\n</body>\n</html>\n```\n\
  \n`Game.js`的初始版本包含一组桩代码和空函数。该类处理核心机制并将各组件编排为工作机制，但由于目前尚无组件，也无需编排任何内容，因此它仍然是空的。不过，`Game`类确实执行了一些有用的操作：加载图像和注册事件监听器。在本章中，我们只处理两种事件类型：拖拽和抬起，因此我们将立即注册监听器，但在它们能够执行实际工作之前，先保持为空。清单\
  \ 7-2 显示了该类的初始代码。该代码使用了我们尚未了解的`bind()`函数。我稍后会进行解释。\n\n\n\n### **清单 7-2** *游戏类：未来游戏的入口点*\n\
  \n```js\nfunction Game(canvas) {\n  this._canvas = canvas;\n  this._ctx = this._canvas.getContext(\"\
  2d\");\n  this._boundAnimate = this._animate.bind(this);\n  this._imageManager =\
  \ new ImageManager();\n  this._imageManager.load({\n    \"terrain\": \"img/terrain.png\"\
  ,\n    \"arch-left\": \"img/arch-left.png\",\n    \"arch-right\": \"img/arch-right.png\"\
  ,\n    \"house-1\": \"img/house-1.png\",\n    \"house-2\": \"img/house-2.png\",\n\
  \    \"ball\": \"img/ball.png\",\n    \"ui\": \"img/ui.png\"\n  }, this._onImagesLoaded.bind(this));\n\
  }\n\n_p = Game.prototype;\n```\n\n### 第 7 章：制作等距引擎\n\n```js\n/** 所有图片加载完成后调用 */\n\
  _p._onImagesLoaded = function() {\n  this.resize();\n  var inputHandler = new InputHandler(this._canvas);\n\
  \  inputHandler.on(\"move\", this._onMove.bind(this));\n  inputHandler.on(\"up\"\
  , this._onUp.bind(this));\n  this._clearBg();\n  this._animate();\n};\n\n/** 在世界中移动视口\
  \ */\n_p.move = function(deltaX, deltaY) { };\n\n/** 调整大小处理 */\n_p.resize = function()\
  \ { };\n\n/** 事件处理 */\n_p._onMove = function(e) {};\n_p._onUp = function(e) {};\n\
  \n/** 更新对象 - 移动、动画等 */\n_p._updateWorld = function() { };\n\n/** 在上下文中渲染帧 */\n_p._renderFrame\
  \ = function() { };\n\n/** 每帧调用，更新对象并在需要时重新渲染帧 */\n_p._animate = function() {\n\
  \  requestAnimationFrame(this._boundAnimate);\n  this._updateWorld();\n  this._renderFrame();\n\
  };\n\n/** 用黑色填充背景 */\n_p._clearBg = function() {\n  this._ctx.fillStyle = \"black\"\
  ;\n  this._ctx.fillRect(0, 0, this._canvas.width, this._canvas.height);\n};\n```\n\
  \n一旦资源准备就绪，`Game` 就会初始化包含两部分的动画循环：`_updateWorld()`（用于逻辑更新、AI 等）和 `_renderFrame()`（在画布上输出结果）。我们已经知道如何处理动画和定时，因此在此项目中不会实现这一部分。如果你愿意，在所有其他部分完成后，添加动画角色是一个非常直接的任务。\n\
  \n### 第 7 章：制作等距引擎\n\n**263**\n\n#### 工具函数\n\n等距引擎是一个复杂的项目。为了保持代码整洁，值得在开始时投入一点时间，将通用和可复用的功能提取到单独的类中，并探索一些能让代码更易读的有用技巧。我们将从探索用于解决事件监听器中\
  \ `this` 关键字丢失问题的 `bind()` 函数开始。\n\n##### `bind()`、`apply()` 和 `call()` 函数\n\n正如你在前几章所见，新函数体内使用的\
  \ `this` 关键字可能指向与外部 `this` 关键字不同的对象。以下代码展示了 `this` 的行为如何取决于其具体使用位置；该示例取自 `ImageManager`\
  \ 类：\n\n```js\n_p._loadItem = function(queueItem, itemCounter, onDone, onProgress)\
  \ {\n  // this 关键字指向当前 ImageManager 实例\n  var img = new Image();\n  img.onload =\
  \ function() {\n    // this 关键字指向 img\n  };\n  img.onerror = function() {\n    //\
  \ this 关键字指向 img\n  };\n  // this 关键字再次指向 ImageManager\n};\n```\n\n`this` 的值取决于函数的执行上下文。执行上下文（除其他事项外）决定了函数“看到”哪些变量，以及\
  \ `this` 背后是哪个对象。例如，考虑以下代码：\n\n```js\nvar a = {\n  name: \"a\",\n  f: function()\
  \ {\n    console.log(this.name);\n  }\n}\n\na.f(); // 输出 \"a\"\n\nvar b = {\n  name:\
  \ \"b\",\n  f: a.f\n}\n```\n\n### 第 7 章：制作等距引擎\n\n```js\nb.f(); // 输出 \"b\"\n```\n\
  \n`f()` 函数最初是为 `a` 对象定义的；它通过 `this` 引用输出对象的名称。但这并不意味着 `this` 关键字背后的对象始终是 `a`。在下一行中，我们将该函数赋值给\
  \ `b` 对象，然后通过 `b.f()` 调用它。在第二次调用期间，函数体内 `this` 的值是 `b`。尽管该函数最初是在另一个对象上定义的，但它输出了当前“所有者”——`b`——的名称。\n\
  \n`img.onload()` 回调的工作方式类似。\n\n\n\n`assigned`给`Image`对象，一旦图片加载完成，它将会从该对象中被调用。因此，`this`的值将是`img`，而不是`ImageManager`实例。\n\
  \n但如果我们希望`this`始终指向某个特定对象，无论函数如何被调用，该怎么办？JavaScript 提供了一种方法：`bind()`函数正是为此而生。请看以下代码：\n\
  \n```\nvar a = {\n  name: \"a\",\n}\n\nvar b = {\n  name: \"b\"\n}\n\nf = (function()\
  \ {\n  console.log(this.name);\n}).bind(a);\n\na.f = b.f = f;\n\na.f(); // 输出 \"\
  a\"\nb.f(); // 输出 \"a\"! 因为我们使用了\"绑定\"函数\nf(); // 即使不通过任何对象调用，仍然输出 \"a\"\n```\n\n\
  `bind()`返回一个新函数，其行为与原函数完全相同，但`this`关键字被绑定到给定的对象。在上述代码中，函数`f`被绑定到了对象`a`，因此无论以何种方式调用——`a.f()`、`b.f()`，甚至不通过对象直接调用`f()`——它始终输出相同的值：`\"\
  a\"`。\n\n需要理解的是，`bind()`不会以任何方式修改原函数；它只是创建了函数的一个新版本并返回给调用者。请看以下代码：\n\n```\nvar f\
  \ = function() {\n  console.log(this.name);\n};\n\nvar boundF = f.bind(a);\n```\n\
  \n只有名为`boundF()`的函数将`this`关键字绑定到了某个对象。原函数`f()`的行为保持不变，因为它在`bind()`调用之后并未发生改变。\n\n\
  **注意：** `this`关键字背后的机制在以下 MDN 文章中有详细描述：\n[`developer.mozilla.org/en/JavaScript/Reference/Operators/this`](https://developer.mozilla.org/en/JavaScript/Reference/Operators/this)\n\
  \n`bind()`函数是在 ECMAScript 第 5 版中引入的，目前尚无法在所有移动浏览器中使用。为保证代码的跨浏览器兼容性，请将以下 shim（见清单\
  \ 7-3）添加到您的`utils.js`文件中。\n\n**清单 7-3.** *确保旧版浏览器也能使用`bind()`函数的 shim*\n\n```\n\
  if (!Function.prototype.bind) {\n  Function.prototype.bind = function (oThis) {\n\
  \    if (typeof this !== \"function\") {\n      // 最接近 ECMAScript 5\n      // 内部\
  \ IsCallable 函数的实现\n      throw new TypeError(\"Function.prototype.bind – \" +\n\
  \        \"what is trying to be bound is not callable\");\n    }\n\n    var fSlice\
  \ = Array.prototype.slice,\n        aArgs = fSlice.call(arguments, 1),\n       \
  \ fToBind = this,\n        fNOP = function () {},\n        fBound = function ()\
  \ {\n          return fToBind.apply(this instanceof fNOP\n            ? this\n \
  \           : oThis || window,\n            aArgs.concat(fSlice.call(arguments)));\n\
  \        };\n\n    fNOP.prototype = this.prototype;\n    fBound.prototype = new\
  \ fNOP();\n\n    return fBound;\n  };\n}\n```\n\n**注意：** 上述 shim 代码来自 MDN 的以下文章：\n\
  [`developer.mozilla.org/en/JavaScript/Reference/Global_Objects/Function/bind`](https://developer.mozilla.org/en/JavaScript/Reference/Global_Objects/Function/bind)\n\
  \n现在应该很容易理解为什么我们在清单 7-2 中使用了下面这行代码：\n`this._boundAnimate = this._animate.bind(this);`\n\
  \n`animate()`函数是作为`requestAnimationFrame()`的回调被调用的。直接使用它时，会在第一次调用后丢失`this`的值。使用`_boundAnimate()`代替`_animate()`可以确保`this`始终指向`Game`的实例。\n\
  \n关于`this`关键字和执行上下文的讨论，如果不涉及两个极其有用的函数——`apply()`和`call()`——就不算完整。这两个函数允许你用任意的`this`值执行任意函数，甚至无需将函数赋值给该对象。\n\
  \n```\nvar a = {\n  name: \"a\",\n}\n\nvar b = {\n  name: \"b\"\n}\n\nf: function()\
  \ {\n  console.log(this.name);\n}\n\nf.call(a); // 执行 f，this 将指向对象 a\nf.apply(b,\
  \ []); // 执行 f，this 将指向对象 b\n```\n\n`call()`和`apply()`让你显式地提供`this`关键字所需的对象。两者唯一的区别在于接受函数参数的方式——`apply()`接受参数数组，而`call()`则将参数作为自身参数逐个接收：\n\
  \n```\nfun.apply(newThis, [arg1, arg2, arg3]);\nfun.call(newThis, arg1, arg2, arg3);\n\
  ```\n\n\n\n"
- "# 第七章：制作等距引擎\n\n当然，如果函数绑定到某个对象，那么 `apply()` 和 `call()` 都无法改变这一行为。\n\n**注意：** 严格来说，`apply()`\
  \ 和 `call()` *确实* 会改变“绑定”函数中 `this` 关键字的值，但不会改变原始函数中的值。不过这种改变不会产生任何效果，因为绑定函数并不依赖\
  \ `this`。\n\n#### 数学函数与 `Rect` 类\n\n自然，编写 2D 引擎需要一些 2D 数学知识。等距引擎也不例外。最常见的数学运算包括矩形操作——判断两个矩形是否相等，测试对象是否可见（对象矩形与视口矩形相交），测试用户是否点击了对象（点击位置在对象矩形内），以及找出需要重绘以覆盖所有脏区域的最小矩形（寻找矩形凸包）。\n\
  \n由于函数数量众多，若将它们分散在代码中会显得杂乱。更好的方法是创建一个类，并在其中实现所有矩形处理相关的数学运算。我们将这个类命名为 `Rect`（`Rectangle`\
  \ 输入起来太长了）。这些函数的代码实际上属于大家在学校学过的基础数学课程内容，因此在此不再赘述。完整源代码随本章资料一起提供，位于 `js/Rect.js`\
  \ 文件中。这里我们仅列出函数声明，以便了解我们依赖的工具：\n\n```\nfunction Rect(x, y, width, height) {\n  \
  \  this.x = x; this.y = y;\n    this.width = width; this.height = height;\n}\n\n\
  _p = Rect.prototype;\n\n/* 创建一个与给定矩形大小和位置完全相同的新矩形 */\n_p.copy = function() {...}\n\
  \n/* 如果两个矩形相等则返回 true（大小和位置相同） */\n_p.equals = function(r2) {...};\n\n/* 返回矩形的字符串表示，便于调试\
  \ */\n_p.toString = function() {...};\n\n/* 将 toString() 的值输出到控制台 */\n_p.print =\
  \ function() {...};\n\n/**\n * 所有接受 4 个参数（坐标）的函数\n * 也可以接受单个参数（矩形）\n */\n\n/* 如果两个矩形相交（共享部分区域）则返回\
  \ true */\n_p.intersects = function(x2, y2, w2, h2) { ... };\n\n/* 如果该矩形完全覆盖另一个矩形则返回\
  \ true。 */\n_p.covers = function(x2, y2, w2, h2) { ... };\n\n/* 返回当前矩形与作为参数传入的矩形的凸包。\n\
  \ * 换句话说，返回能够覆盖两者的最小可能矩形。\n */\n_p.convexHull = function(x2, y2, w2, h2) { ... };\n\
  \n/* 返回两个矩形的交集 */\n_p.intersection = function(x2, y2, w2, h2) { ... };\n\n/* 如果该矩形包含坐标\
  \ (x, y) 的点，则返回 true */\n_p.containsPoint = function(x, y) { ... };\n\n/**\n * 给定一个矩形单元格网格，单元格大小为\
  \ (cellW, cellH)，\n * 测试该矩形重叠了哪些单元格。\n * cellsInRow 和 cellsInColumn 仅用于限制坐标，\n *\
  \ 以防止例如数组访问越界。\n */\n_p.getOverlappingGridCells = function(cellW, cellH, cellsInRow,\
  \ cellsInColumn) {\n    ... };\n```\n\n#### `GameObject` 类\n\n在编写引擎本身之前，我们需要创建的另一个重要类是\
  \ `GameObject`。这个类是游戏中所有实体的根类：对象、图层、UI 小部件等。我们放在屏幕上、渲染、移动或调整大小的所有东西都属于这个类。清单 7-4\
  \ 是 `GameObject.js` 的代码。清单中最有趣的部分是 `setPosition()`。一旦 `GameObject` 确认新位置与旧位置确实不同，它就会触发\
  \ `move` 事件。其他实体（如图层）可以订阅此事件并相应地更新世界（例如，`ObjectLayer` 的聚类算法需要追踪每个对象的移动以保持聚类的一致性）。\n\
  \n\n\n### **清单 7-4.** `GameObject` 类：游戏对象体系的根节点\n\n```javascript\nfunction GameObject()\
  \ {\n  EventEmitter.call(this);\n  this._id = GameObject._maxId++;\n  this._bounds\
  \ = new Rect(0, 0, 100, 100);\n}\n\nextend(GameObject, EventEmitter);\n\nvar _p\
