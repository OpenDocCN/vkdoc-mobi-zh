  在本章中，我们学习了在浏览器中渲染图形的基础知识。为此，我们使用了`canvas`对象，这是一个相对较新的 HTML5 元素，它突破了浏览器图形能力的限制，使我们能够制作更高级的浏览器游戏。\n\
  \n我们有一个实际目标：为将在第 3 章中制作的“四球游戏”准备代码。我们创建了游戏板：一个网格、棋子，以及一个充满线性渐变并用贝塞尔曲线装饰的背景。为了完成这些工作，我们学习了`canvas`\
  \ API。具体来说，我们学习了如何：\n\n- 绘制形状（简单和复杂）\n- 使用填充（颜色、图案和渐变）\n- 应用变换（`translate()`、`moveTo()`和`fill()`）\n\
  - 保存和恢复上下文状态\n\n渲染游戏的代码已基本就绪，但它还不是一个游戏。游戏必须具有特定的逻辑，并且必须处理用户输入。接下来的章节将专门讨论这些主题。\n\
  \n## 第 3 章：创建第一个游戏\n\n本章的目标是制作一个简单的 2D 网页游戏。我们已经学习了`canvas` API 的精髓，这是网页内渲染任意形状或图像的强大机制。现在是时候将这些知识付诸实践，创建一个真正的游戏项目了。\n\
  \n我们将把这个游戏称为“四球游戏”。这是一款流行逻辑游戏的网页版，该游戏有多个名称，包括“四连珠”、“四子连线”和“四分棋”，并且有多种规则变体。据传闻，早在\
  \ 18 世纪，詹姆斯·库克船长就玩过这个游戏。他非常喜欢这款游戏，以至于他的船员们称其为“船长的心上人”。该游戏的一个热门商业化版本，Connect Four（连珠四子），于\
  \ 1974 年由米尔顿·布拉德利公司首次发售。1988 年，Connect Four 被“数学求解”。结果发现，先手玩家通过遵循特定的最优策略可以确保胜利。尽管如此，这款游戏在现实生活和电子版本中仍然非常受欢迎。\n\
  \n规则非常简单。游戏在一个垂直的七列六行棋盘上进行。玩家放置不同颜色的棋子，棋子会沿着棋盘垂直下落。最先使四个同色棋子连成一条线的玩家获胜。这个项目相当容易完成，但它展示了游戏开发的几个重要方面。\n\
  \n在动手编写代码之前，我们需要一个好的计划。我们将从回顾 HTML5 骨架开始。我们在第 2 章中使用的版本需要进行调整，以适应游戏开发的需求。\n\n游戏架构是另一个需要解决的问题。将越来越多的代码添加到同一个文件中，很快就会使项目难以改进和维护。我们必须为它开发一个更好的“逻辑”结构：将游戏功能分散到多个类中，每个类负责自己的小任务。\n\
  \n最后，我们还需要添加用户输入处理并实现游戏逻辑。用户输入和浏览器事件将在第 5 章中更详细地介绍；然而，我们仍然需要添加少量代码，而不深入探讨其工作原理的细节，否则我们无法拥有一个可运行的游戏。\n\
  \n在本章中，我们将学习如何执行以下操作：\n\n- 为移动游戏开发需求更新 HTML5 骨架\n- 创建游戏架构，并将负责游戏逻辑的代码与渲染代码分离\n-\
  \ 实现游戏机制：回合验证、游戏状态、胜负条件\n- 将基本的输入处理添加到项目中\n\n在开始之前，请看图 3-1。它展示了游戏在浏览器中启动后的最终版本。\n\
  \n**图 3-1.** *四球游戏*\n\n### HTML5 游戏骨架\n\n游戏与常规网页不同，它们需要不同的 HTML 骨架。本节将致力于制作这样一个骨架。我们开始\n\
  \n\n\n"
- "# 第三章：创建首个游戏\n\n在概述了为何需要改变的原因后，我们将探讨如何用 `HTML`、`CSS` 和 `JavaScript` 实现新的骨架。在本节中，我们将先构建一个包含所需基本功能的骨架。其中一项功能是支持优雅的屏幕旋转。不过有时你可能更偏好特定方向——竖屏或横屏——因此我们也会探讨如何管理“强制方向”。\n\
  \n#### 标准骨架\n\n普通网页可能包含许多元素，如果空间不足以显示所有内容，浏览器会添加滚动条。面向游戏的移动端网页通常只有一个 `HTML` 元素：即占据全部可用屏幕空间的\
  \ `canvas` 元素。\n\n移动端游戏应尽力防止浏览器显示滚动条。滚动条不仅占用宝贵的空间，还会“窃取”游戏中的移动事件。例如，在策略游戏中，滑动操作可视为“滚动世界地图”——这正是用户滑动屏幕时的预期行为。但如果页面无法适应单屏显示，同样的操作就必须被解读为“滚动浏览器页面”。这种情况下，游戏引擎无法使用该移动事件，因为它已被浏览器占用。\n\
  \n移动端网页游戏不应允许用户或浏览器进行缩放。如今，移动设备种类繁多，像素密度和分辨率各不相同。移动浏览器会尝试智能缩放网页，使其在特定设备上呈现最佳效果。这对普通页面很有意义：字体既不会过小也不会过大，页面在新旧设备、智能手机和平板电脑上看起来大致相同。但游戏引擎则不同。它们不需要浏览器“自作聪明”，因为游戏本身足够智能。游戏常由光栅图像构成，无论浏览器如何努力，这些图像缩放效果都不佳。因此，最好从一开始就关闭此功能。\n\
  \n**注：** 想要了解更多关于浏览器这种行为的原因和影响，可参阅精彩博文《像素不再是像素》（原文：`www.quirksmode.org/blog/archives/2010/04/a_pixel_is_not.html`）[`http://www.quirksmode.org/blog/archives/2010/04/a_pixel_is_not.html`](http://www.quirksmode.org/blog/archives/2010/04/a_pixel_is_not.html)。\n\
  \n该骨架应能优雅地处理方向变化。一旦用户旋转设备，`canvas` 将被调整大小以适应屏幕的新比例，游戏会重新渲染自身，并将新尺寸纳入考虑。\n\n我们从第\
  \ 2 章的 `HTML5` 骨架开始，添加几行代码来实现上述功能。清单 3-1 展示了初始骨架。\n\n**清单 3-1.** *初始 HTML5 骨架*\n\
  \n```\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n\
  <style>\n</style>\n<script>\nfunction init() {\n}\n</script>\n</head>\n<body onload=\"\
  init()\">\n</body>\n</html>\n```\n\n首先，我们来限制缩放行为。在 `meta charset` 之后立即添加另一个 meta\
  \ 标签，如清单 3-2 所示。\n\n**清单 3-2.** *视口 Meta 标签：为网页设置缩放选项*\n\n```\n...\n<meta charset=\"\
  utf-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0,\
  \ maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi\"/>\n<style>\n\
  ...\n```\n\n这段代码设置了视口的参数；换句话说，它为浏览器提供了若干关于如何渲染页面的提示。我们指示浏览器将初始缩放和最大缩放比例设置为 `1.0`（即不缩放），忽略用户缩放页面的尝试（`user-scalable=no`），最后，提供真实的像素，使得\
  \ `1px` 名副其实——即设备屏幕的一个物理像素（`target-densitydpi=device-dpi`）。\n\n然而，页面可能仍会出现滚动条。为了防止它们出现，请添加清单\
  \ 3-3 中的样式声明。\n\n**清单 3-3.** *页面 CSS：无滚动条、外边距、内边距或边框*\n\n```\n<style>\nhtml, body\
  \ {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\npadding:0;\nborder:\
  \ 0;\n```\n\n\n\n## 第 3 章：创建第一个游戏\n\n- **93**\n\n`overflow: hidden`指令让浏览器“切掉”超出视觉页面边界的所有内容，从而从不显示滚动条。其他行确保页面主体使用每一个可用的像素：宽度和高度各为`100%`，没有边距、边框或内边距。\n\
  \nCanvas 的缩放是最棘手的部分。不幸的是，我们不能用纯 CSS 来实现，因此必须编写几行 JavaScript。清单 3-4 中的代码使用了浏览器事件，我们将在第\
  \ 5 章详细讨论这些事件。目前，你只需要相信它能工作就行。\n\n**清单 3-4.** *监听浏览器事件，在页面缩放后调整 Canvas 大小*\n\n```javascript\n\
  function init() {\n    var canvas = initFullScreenCanvas(\"mainCanvas\");\n}\n\n\
  /**\n * Resizes the canvas element once the window is resized.\n * @param canvasId\
  \ – string id of the canvas element\n */\nfunction initFullScreenCanvas(canvasId)\
  \ {\n    var canvas = document.getElementById(canvasId);\n    resizeCanvas(canvas);\n\
  \    window.addEventListener(\"resize\", function() {\n        resizeCanvas(canvas);\n\
  \    });\n    return canvas;\n}\n```\n\n清单 3-4 中的代码包含两个函数。第一个函数`init()`你已经熟悉了：浏览器在页面主体加载完毕后执行它。第二个函数`initFullScreenCanvas()`让\
  \ Canvas 占据所有可用的屏幕空间，即使窗口被缩放或设备更改了方向也是如此。它会“监听”`resize`事件，每次检测到该事件时，就调用`resizeCanvas()`。接下来，`resizeCanvas()`负责具体的缩放：它找出页面的新尺寸，并相应地更新\
  \ Canvas 的大小。这个函数的代码如清单 3-5 所示，同样相当简单。\n\n**清单 3-5.** *resizeCanvas 函数，用于找出页面的新尺寸并将\
