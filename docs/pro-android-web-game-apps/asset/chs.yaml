  user-left\", function (user) {\n    userList.remove(user.id);\n  });\n\n  socket.on(\"\
  user-playing\", function (user) {\n    userList.setStatus(user.id, \"playing\");\n\
  \  });\n\n  socket.on(\"user-ready\", function (user) {\n    userList.setStatus(user.id,\
