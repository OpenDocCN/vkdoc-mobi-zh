  \    this._cacheUnsorted = false;\n\n    this._resetClusters();\n}\n\nextend(ObjectLayer,\
  \ GameObject);\n```\n\n\n```javascript\n_p = ObjectLayer.prototype;\n\n/**\n* 将每个对象重新分配到一个（或多个）集群中\n\
  */\n\n_p._resetClusters = function() {\n    // 清除集群\n    this._clusters = [];\n\
