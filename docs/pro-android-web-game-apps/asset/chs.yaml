  \ y, cellSize) {\n```\n\n```\nthis._x = x;\nthis._y = y;\nthis._cellSize = cellSize;\n\
  this._width = this._cellSize*this._cols;\n```\n\n\n\n`this._height = this._cellSize\
  \ * this._rows;` ;\n\n**JSDoc 注释**\n\n尽管函数体本身很简单，但这种注释风格对你来说可能是全新的。这种记录代码的方式被称为\
