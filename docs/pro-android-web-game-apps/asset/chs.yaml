  ```\n根据具体 Java 版本，路径可能略有不同。创建名为`JAVA_HOME`的新变量，并指向该文件夹。\n\n完成以上步骤，Java 就安装好了，你可以准备迎接更激动人心的事情。\n\
  \nIntegrated Development Environment  \n有时 JavaScript 项目仅由几个脚本组成，例如从 HTML 表单中隐藏字段或通过\
  \ Ajax 加载内容。这种情况下，使用文本编辑器即可——它比 IDE 加载更快，界面更简单，且节省大量内存（如今的 IDE 确实很耗内存）。对于小型项目，你只需要语法高亮功能，让代码更美观并避免低级拼写错误。\n\
  \n对于稍大型的项目，IDE 就必不可少。你需要一系列高级功能，这些是典型文本编辑器不具备的：良好的代码分析、检查、潜在错误检测、自动补全、重构工具、集成版本控制系统、问题跟踪器等。\n\
  \n如前所述，市场上没有完美的 IDE。有些适合 JavaScript，有些则不然。它们在价格、系统要求、支持平台和功能集上各有不同。选择 IDE 时，最重要的是让你感到舒适。初次使用新\
  \ IDE 可能困难，但如果在几周后你仍然觉得每行代码都很吃力，就应该尝试其他产品。生产力的提升往往能弥补一两个功能的缺失。\n\n如果你之前接触过 JavaScript，可能已经有了心仪的\
  \ IDE。如果没有，以下是一些选择：\n\n- **IntelliJ IDEA** ([www.jetbrains.com/idea/](http://www.jetbrains.com/idea/))\
  \ 对整个 Web 技术栈有良好支持：HTML、CSS、JavaScript 以及服务器端语言如 PHP 和 Java。如果你的项目是开源的，IntelliJ\
  \ IDEA 是免费的——否则需支付约 200 美元。IntelliJ 有几个从 IDEA 派生的轻量级 IDE，其中 WebStorm 专门用于 HTML 和\
  \ JavaScript，仅需 69 美元。\n- **Aptana Studio** ([`aptana.com`](http://aptana.com))\
  \ 基于强大且优雅的 Eclipse 项目 ([www.eclipse.org](http://www.eclipse.org))。它功能极其丰富，拥有几乎所有功能的插件，从探索数据库和构建企业级报告到提醒你茶已泡好。Aptana\
  \ 免费且开源。\n\n![](img/index-15_1.jpg)\n\n\n\n## 第 1 章：入门指南\n\n两者之间的选择通常取决于个人偏好。有一大批\
