  \    return clusterBounds;\n};\n```\n\n#### 对象缓存\n\n一旦每个对象都被分配到了集群，我们就可以开始绘制它们。整个过程如下所示：\n\
  \n1. 确定当前哪些集群对用户可见。\n2. 获取所有这些集群中注册的对象。\n3. 移除重复的对象。\n4. 对对象进行排序。\n5. 绘制对象。\n\n\
