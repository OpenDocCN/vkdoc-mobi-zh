  \ 7-38 总结了这些更改。在`ObjectLayer`中有三个地方可以更新帧：`_onObjectMove()`（当对象改变位置时调用的函数），以及`addObject()`和`removeObject()`（添加或移除世界实体的函数）。在这些情况下，屏幕的相关部分可能会变脏。\n\
  \n**清单 7-38.** *在 ObjectLayer 中标记脏矩形*\n\n```\n_p._onObjectMove = function(e) {\n\
