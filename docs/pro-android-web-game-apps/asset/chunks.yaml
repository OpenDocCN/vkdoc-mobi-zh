    \n另一种方法是使用专门的编码软件，它可以重新编码`MP3`并使“咔哒”声稍微“轻”一些。这背后的确切机制超出了本章的范围。如果你对更深入的解释感兴趣，请参考以下有用的链接：\n\
    \n- [www.schillmania.com/projects/soundmanager2/demo/api/#looping](http://www.schillmania.com/projects/soundmanager2/demo/api/#looping)：`SoundManager`关于循环的文档。\n\
    - [www.flickr.com/photos/schill/4499319436/](http://www.flickr.com/photos/schill/4499319436/)：关于如何为`SoundManager`制作流畅声音循环的快速“指南”。\n\
    - [www.compuphase.com/mp3/mp3loops.htm](http://www.compuphase.com/mp3/mp3loops.htm)：一个名为`MP3Loop`的工具的主页。顾名思义，该工具用于创建“循环”的`MP3`文件。该页面很好地解释了为什么`MP3`编码器会这样表现以及如何修复它。\n\
    \n从现在开始，我们将假设你的`MP3`文件已经为你的游戏准备好了。\n\n### 为游戏添加声音\n\n现在我们已经准备好为游戏本身添加声音了。我们的游戏将包含三种声音：主主题、一个点击声和一个“游戏结束”声。主\n"
- fmt: "# 主题声音应在加载后循环播放，而其他两个声音在特定游戏事件时播放。按照以下代码清单加载所有三个声音文件。首先，加载声音并将主题声音设置为加载时播放（参见清单16-6）。\n\
    \n**清单16-6.** *加载声音并在主题加载后播放*\n\n`soundManager.url` = `'swf/'`;\n\n`soundManager.flashVersion\
    \ = 9;`\n\n`soundManager.onready(function() {`\n\n`soundManager.createSound({`\n\
    \n`id: 'theme',`\n\n`url: 'sound/theme.mp3',`\n\n`loops: 10000,`\n\n`autoLoad:\
    \ true,`\n\n`onload:function() {`\n\n`this.play();`\n\n`}`\n\n`});`\n\n`soundManager.createSound({`\n\
    \n`id: 'click',`\n\n`url: 'sound/click.mp3',`\n\n`autoLoad: true`\n\n`});`\n\n\
    `soundManager.createSound({`\n\n`id: 'gameover',`\n\n`url: 'sound/gameover.mp3',`\n\
    \n`autoLoad: true`\n\n`});`\n\n`});`\n\n现在你有了循环播放的主主题音乐。不过，我用的这个声音对于休闲游戏来说太响了。你可以直接在代码中设置音量（值为0到100之间），如清单16-7所示。\n\
    \n**清单16-7.** *设置声音音量*\n\n`soundManager.createSound({`\n\n`id: 'gameover',`\n\n\
    `url: 'sound/gameover.mp3',`\n\n`volume: 40,`\n\n`autoLoad: true`\n\n`});`\n\n\
    现在让我们添加点击声音。当玩家点击屏幕时，这个声音播放。请注意，Android有自己的点击声音，除非你在点击事件上调用`preventDefault()`，否则它会与我们的自定义声音同时播放。播放点击声音的代码如清单16-8所示。\n\
    \n**清单16-8.** *当用户点击屏幕或按下鼠标按钮时播放点击声音*\n\n```\nCrafty.addEvent(this, window, \"\
    touchstart\", function (e) {\n  e.preventDefault();\n  soundManager.getSoundById(\"\
    click\").play();\n});\n\nCrafty.addEvent(this, window, \"mousedown\", function\
    \ (e) {\n  e.preventDefault();\n  soundManager.getSoundById(\"click\").play();\n\
    });\n```\n\n不幸的是，调用`preventDefault()`也会导致Crafty忽略骑士精灵上的点击事件。我们必须将精灵渲染到单独的DOM元素上，然后手动添加事件监听器，如清单16-9所示。\n\
    \n**清单16-9.** *绘制角色*\n\n```\nfunction drawCharacter() {\n  var knight = Crafty.e(\"\
    2D, DOM, knight, SpriteAnimation, Mouse\")\n    .attr({x: 100, y: 280})\n    .animate(\"\
    move_left\", 1, 0, 3)\n    .animate(\"move_right\", 0, 1, 2)\n    .animate(\"\
    move_right\", 15, -1)\n    .bind(\"EnterFrame\", function() {\n      this.x +=\
    \ 0.3;\n      if (this.x > 500) {\n        Crafty.trigger(\"GameOver\");\n   \
    \   }\n    });\n\n  Crafty.addEvent(this, knight._element, \"touchstart\", function()\
    \ {\n    Crafty.trigger(\"Win\");\n  });\n\n  Crafty.addEvent(this, knight._element,\
    \ \"mousedown\", function() {\n    Crafty.trigger(\"Win\");\n  });\n}\n```\n\n\
    当游戏结束时，我们需要停止主主题并播放“游戏结束”主题一次。让我们创建一个函数来实现这个功能（参见清单16-10）。\n\n**清单16-10.** *播放游戏结束声音*\n\
    \n```\nfunction playGameoverSound() {\n  soundManager.getSoundById(\"theme\").stop();\n\
