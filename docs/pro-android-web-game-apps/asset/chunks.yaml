    \ not just static pre-rendered images.\n\nSound is no simpler than images, and\
    \ sometimes it is even more complicated. Imagine a 3D adventure game where the\
    \ player enters a room and sees two NPCs (non-player characters), who talk to\
    \ each other and the player. The resulting sound wave depends on many different\
    \ parameters:\n- The position of each NPC relative to the player (the closer to\
    \ the player, the louder the sound)\n- The direction the player is facing (the\
    \ left and right channels should each receive different sounds in order to make\
    \ it realistic)\n- The size of and the material in the room: a voice in a cave\
    \ sounds totally different from a voice in a concert hall or on the street\n\n\
    As you can see, it is nearly impossible to pre-render the sound for such complex\
