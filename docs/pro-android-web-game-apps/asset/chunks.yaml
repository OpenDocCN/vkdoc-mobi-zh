    `Recent Changes` field to let your users know why they should update. The application
    has changed its appearance, so you should also update the screenshots and promo
    graphics. Paying attention to such small details is essential for the success
    of the app.


    Upload the new `APK`. Click the `Deactivate` button near the first version of
    the `APK`, and then `Activate` near the new version `1.0.1`. Click `Save` and
    wait several minutes. The update appears on the market, and every user who already
    has the application is prompted to get the new version.


    Working with the market is not hard at all. Once you publish your first application,
    you become comfortable with the whole process. The market is a very powerful distribution
    channel, and once your game is working in the browser, you should think about
    putting it onto the market.


    ## Summary


    In this chapter, we learned how to wrap existing web pages with `Apache Cordova`
    and create a native Android application. We learned how to deal with the specifics
    of such a setup: server URLs, application permissions, and access to the native
    application resources.


    We learned how to make a "production" version of the application: create a key,
    sign the app, and prepare it for `Google Play` store publishing.


    In the last part of the chapter, we looked at how to use `Google Play` store —
    from creating the account to publishing your application, sharing it with other
    people, and updating it with newer and better versions.


    Native applications have many advantages. It doesn’t matter how you create such
    an app, with `Java` or with an `HTML5` technology stack. If the user can load
    the app to his device and play your game, then you achieved your goal.


    ---


    # Chapter 16: Adding Sound


    Sound is one of the final touches that you need to add in order to make a complete,
    market-ready game. In mobile gaming, sound often plays a secondary role. There
    are several reasons for that.


    - Mobile games are mostly casual. People play mobile games while traveling, in
    long lines, at airports, and in dull meetings — places where sound might actually
    disturb others.

    - If the player has headphones, most likely he’s listening to the music he likes
    — songs from his huge `MP3` collection.

    - Sound consumes battery life, so even though the amount of actual power loss
    is very small, some users would rather save it for something else.

    - The lack of sound doesn’t hurt the playing experience for most casual games.
    In desktop games like `Counter Strike`, players know the location of the enemies
    just by listening to their steps. In games like `Fallout 3`, sound is a way of
    diving deeper into the game world. In contrast, casual games are perfectly playable
    in "muted" mode.


    Nevertheless, sound is a pretty important aspect of mobile games, and you should
    not ignore it in your own project. A game without it feels more like an uncompleted
    garage project rather than a commercial product. Look at `Angry Birds` — the canonical
    example of a crazy-popular casual game: the quiet grunting of pigs awaiting their
    destiny and the vigorous battle cries of birds really make this game even more
    fun to play.


    Your job as a developer is to make users want to turn the sound on. Even if only
    15 percent of them actually play with the sound, they will certainly give you
    an extra star in their market rating.


    This chapter is devoted to sound. We will learn about the following topics:


    - Sound support in Android browsers

    - Workarounds for common problems

    - `SoundManager2` — the ultimate web sound library

    - Sound in native applications (`Cordova` API)

    - Common sound usability patterns


    ## Audio on Web Pages


    Let’s start by looking at the APIs available to the "big brothers" — the desktop
    browsers that tend to follow the latest `HTML5` tendencies. There are two audio
    APIs available for working with sound: the simple `HTML5` audio tag (`www.whatwg.org/specs/web-apps/current-work/#the-audio-element`)
