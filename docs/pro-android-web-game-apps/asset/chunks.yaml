    **Notes on Implementation**


    The exact implementation of the algorithm might vary a lot, depending on the


    game that you are building. For example, in tactic games, where units move


    within a square grid, you do not really need a waypoint graph. The grid itself


    plays the role of the graph. Every tile has exactly four connections: east, west,


    north, and south (or eight if you allow moving diagonally), and it is easy to


    predict which tile is next to the current one. If the tile is marked as a ‘ wall,’’


    there is no connection in that direction. Figure 13-12 shows an example of such


    a game world.


    The weight of the move is usually constant too. The distance is calculated


    differently: Euclidian distance doesn’t work because you do not allow the


    character to move straight through the tiles. The distance that is used in this


    case is called a Manhattan distance. It represents the world where you can only


    move along an axis-----like in the city of Manhattan, where you drive through
    a


    grid of streets and avenues but not through the skyscrapers. Manhattan


    ![](index-532_1.jpg)


    CHAPTER 13: AI in Games


    distance is calculated by the formula |x2 -- x1| + |y2 -- y1|. For that kind of


    pathfinding, you can stick with the much easier implementation of the A*


    algorithm.


    **Figure 13-12.** *A game world based on square tiles can survive without graphs
    for pathfinding.*


