- fmt: '# 注意

    演示转换用法的代码可随本章源码一同找到，文件名为`transform-demo.html`。该代码相当庞大，除了几行转换代码外并无其他有价值的新内容，因此本节中不再重复。该代码使用了一个略有不同的HTML框架：它包含多个`canvas`元素，而非只有一个。第一个元素显示原始场景，其余元素显示变换后的版本。你可以将其用作实验场：尝试不同的转换，以不同顺序应用于不同形状。该演示使用形状而非图像。


    ![](index-82_1.jpg)


    **第2章：浏览器中的图形：Canvas元素**


    本节中的图展示了两件重要的事情：坐标轴如何变换，以及形状如何变化。初始场景示意性地呈现在图2-27中。


    **图2-27.** *无变换，原始场景*


    默认情况下，未应用任何变换时，坐标系如图2-27所示：x轴向右递增，y轴向下递增，原点`(0, 0)`位于画布的左上角。初始状态下，坐标空间中只有x和y值均为正的部分是可见的。


    从Wow! eBook下载：<www.wowebook.com>


    ## 平移


    平移是一种将每个对象移动给定距离的变换。要应用此变换，请调用：


    ```

    ctx.translate(50, 100)

    ```


    这段代码将坐标轴（以及所有图形）向右移动50像素，向下移动100像素（见图2-28）。画布的左上角现在位于点`(-50, -100)`处。


    ![](index-83_1.jpg)


    **第2章：浏览器中的图形：Canvas元素**


    **77**


    **图2-28.** *使用`translate`函数移动场景中的形状*


    此变换常用于需要更改组件位置而又不修改其代码的情况。本章后续部分将介绍如何利用此变换来改进令牌渲染代码，使其更清晰、更易理解。


    ## 缩放


    缩放是一种对场景中的形状进行“拉伸”或“收缩”的变换。x轴和y轴的缩放值可独立设置。初始正常缩放值为两轴均为1，简称`(1, 1)`（在本小节中，此写法表示缩放值而非坐标；数字分别代表x和y方向的缩放值）。


    以下三个简单示例有助于你更好地理解缩放：


    - 缩放值大于1会使每个图形变大。例如，`(2, 2)`使形状变为两倍大。

    - 缩放值介于0和1之间会缩小图形。例如，`(0.5, 0.5)`使每个形状变为正常大小的一半。

    - 负数缩放值会改变坐标轴方向并翻转形状。例如，`(-1, 1)`会使每个形状水平翻转。


    以下代码展示了缩放的常见用法：


    ```

    ctx.scale(2, 2) // 使所有形状放大两倍

    ctx.scale(1, 2) // 仅沿Y轴缩放（宽高比将改变）

    ctx.scale(1, 1) // 不做任何操作，保持坐标不变

    ctx.scale(-1, 1) // 沿X轴翻转

    ```


    ![](index-84_1.jpg)


    **第2章：浏览器中的图形：Canvas元素**


    当使用负数缩放值时，缩放会改变轴的方向，效果如同翻转图形。x轴上的`-1`导致水平翻转；y轴上的`-1`导致垂直翻转。当然，你也可以将其与尺寸变化结合使用；例如，`ctx.scale(0.5,
    -0.5)`会使所有图形缩小两倍，同时翻转y轴。


    翻转对于创建图像的镜像版本非常有用。例如，如果你有一张骑士面朝左的图像，你可以直接在浏览器中轻松创建其镜像版本（骑士面朝右），而无需从服务器额外下载图像。图2-29展示了缩放和翻转的效果。


    **图2-29.** *缩放。左侧图像沿x轴缩放；右侧图像显示翻转后的场景。*'
  raw: 'NOTE: The code that illustrates the use of transformations can be found with
    the


    sources for this chapter, the transform-demo.html file. The code is rather large


    and doesn’t have any valuable new material, except for the few lines of


    transformations, so it is not reprinted in this section. The code uses a slightly


    different HTML skeleton. Instead of one canvas element, it has several canvas


    elements. The first element shows the original scene, and the rest show the


    transformed versions. You can use it as a playground: try different transformations,
    applying them in different order and to different shapes. The demo uses shapes


    instead of an image.


    ![](index-82_1.jpg)


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    The figures in this section show two important things: how coordinate axes are


    transformed and how the shape changes. The initial scene is schematically


    presented in Figure 2-27.


    **Figure 2-27.** *No transformation, the original scene*


    By default, when no transformations are applied, the coordinate system looks


    like what is shown in Figure 2-27: the x axis increasing to the right, and y axis
    to the bottom, and (0, 0) is in the top-left corner of the canvas. Initially,
    the only


    visible part of the coordinate space is where both x and y values are positive.


    Download from Wow! eBook <www.wowebook.com>


    Translate


    Translate is the transformation that shifts every object by a given distance.
    To


    apply this transformation call:


    ctx.translate(50, 100)


    This code moves the axes, and hence every figure 50 pixels to the right and 100


    pixels down (see Figure 2-28). The top-left corner of the canvas is now at point


    (-50, -100).


    ![](index-83_1.jpg)


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    **77


    **Figure 2-28.** *Using the translate function to move the shapes on the scene*
    This transformation is often used when you need to change the position of the


    component without changing its code. Later in this chapter, we see how this


    transformation might be used to improve the token rendering code by making it


    more clear and easier to follow.


    Scale


    Scaling is the transformation that ‘ stretches’’ or ‘‘shrinks’’ the shapes on
    the


    scene. The scale value is set independently for x and y axes. The initial normal


    scale is 1 for both axes, recorded as (1, 1) for short (in this subsection we
    use


    this notion for scale values and not coordinates; the numbers mean the scale


    value for x and y respectively).


    The following are three simple examples to help you understand scaling better:


     Scaling larger than 1 makes every figure bigger.


    (2, 2), for example, makes shapes twice as large.


     Scaling between 0 and 1 shrinks the shapes.


    (0.5, 0.5) makes every shape half of the normal size.


     Negatively scaling values changes the axis direction and flips


    shapes. For example, (-1, 1) flips every shape horizontally.


    The following code shows the common use cases of scaling:


    ctx.scale(2, 2) // Makes all shapes two times larger


    ctx.scale(1, 2) // Scales only by the Y axis (the aspect ratio will change)


    ctx.scale(1, 1) // Does nothing, and leaves the coordinates intact


    ctx.scale(-1, 1) // Flips on X axis


    ![](index-84_1.jpg)


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    When used with the negative values, scale changes the direction of the axis. It


    looks as if flipping the shape. -1 on X causes the horizontal flip; -1 on Y causes


    the vertical flip. Of course, you can combine it with the changes of the size;
    for


    example, ctx.scale(0.5, -0.5) makes all figures two times smaller and also


    flips the y axis.


    Flipping is very useful for creating mirrored versions of the images. If you have


    an image of a knight facing left, for example, you can easily create the mirrored


    version (the knight facing right) straight in the browser instead of downloading


    the extra image from the server. Figure 2-29 shows the effects of scaling and


    flipping.


    **Figure 2-29.** *Scaling. The left image is scaled on the x axis; the image on
    the right shows a flipped* *scene.*'
