    \ paradigm. It has helped build complex programs for more than half a century.\
    \ The most popular languages, like Java and C#, work with the concept of classes—the\
    \ blueprints that define the common structure of the object.\n\nJavaScript doesn’t\
    \ have classes; instead, it has functions and prototypes that give similar functionality.\
    \ This section of the chapter is devoted to implementing the OOP approach in JavaScript.\n\
    \n**Note:** The description of best OOP practices is beyond the scope of this\
    \ book. This section only shows how to implement a basic OOP system, not how to\
    \ build the effective architectures based on objects. We will have a lot of practice\
    \ with objects throughout the remaining chapters, however, and we will try to\
