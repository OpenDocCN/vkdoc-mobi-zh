    **第 4 章：动画和精灵**


    **143**


    精灵图集比单个图像工作得稍慢一些。等等！但你刚才说精灵图集很好！是的，它们很好——尤其是在通过 3G 网络传输图像时；但当你需要绘制它时，单个图像会赢得比赛。性能损失有多严重？没那么严重：单个图像每秒`306`次操作，而同一图像从精灵图集中裁剪出来则为`267`次操作。在一个精灵密集型的游戏中，尽可能榨取每个
    CPU 周期仍然很重要，但逐帧加载图像是不可行的。你已经看到了如何使用数据 URL 从`canvas`对象构建图像。你可以在此处使用相同的方法：将图像作为精灵图集传输，但在浏览器中将其转换为一组单独的图像。在加载时间上多花几秒钟通常是换取性能提升的好代价。


    小数像素会扼杀性能。在大多数浏览器上，使用小数坐标（如`(1.5, 1.5)`）绘制精灵比在`(1, 1)`或`(2, 2)`上绘制同一图像要慢得多。性能损失的程度与缩放图像相当。还记得第
    1 章中描述的模糊线条吗？精灵的工作方式相同：浏览器使用抗锯齿来绘制小数坐标处的精灵，从而带来图像预处理和边界上的半透明像素，这两者都倾向于消耗 CPU（见图
    4-7）。解决方案很简单：在绘制前对坐标执行`Math.round()`。没有小数部分，就不会有问题。

    '
- fmt: '**Figure 4-7.** *Drawing with integer (left) and decimal coordinates (right).
    The right image takes nine times longer to output, and doesn’t look all that good
    anyway.*


    At the time of writing, the standard browser in Android 2.2 ignored the subpixel
    values, drawing the image exactly the same way. That’s why it works equally well
    on both integer and decimal coordinates. You should not ignore this issue, however,
    even if you’re developing only for Android—you never know which browser will be
    the default on your player’s system. It could be Firefox Mobile, which doesn’t
    trim coordinates for you.


    Still, the question is not answered. How many sprites can I draw per second? The
    exact answer, of course, is “it depends on this and that…” but I think you’ve
    had enough of answers like that from political TV shows. I have written a simple
    test case to check how much you can expect from both mobile and desktop browsers.
    I assumed that the game needs around 30 FPS to feel smooth, and tested the number
    of 32 × 32 sprites I could draw without falling below the FPS cap. In my opinion,
    there’s no sense to use smaller sprites—on modern screen densities, 32 × 32 pixels
    look tiny already.


    My Galaxy S proudly held around 370 sprites on Dolphin HD, and the stock browser
    Fennec stuck at around 100.


    Desktop PCs are way better at handling simple sprites. Safari can render around
    2200 sprites; Google Chrome 15 and Opera 11 easily hit 3200 sprites; IE9 got 4500;
    and Firefox 7 managed 5500. You need around 2000 sprites to fully cover the Full
    HD screen.


    **NOTE:** For every test case, I’m checking whether or not the browser is capable
    of covering the area that is supposed to be a game screen. If you can rerender
    the whole screen each frame, covering it with a completely new set of sprites,
    then your game should run just fine. This is a very rough metric since it assumes
    the worst case scenario. Ninety-nine percent of the time, you will not need to
    update the whole screen. There are a lot of techniques on how to optimize this
    process and render only the parts of the canvas that actually need to be rendered.


    Also, I’m not taking into account the game logic that might be pretty involved.
    In games like *Angry Birds*, far more CPU time is spent calculating realistic
    physics than rendering those few boxes. The techniques to optimize rendering speed
    are covered in detail in Chapter 7.


    If you don’t have enough processing power to cover the screen with tiles, it doesn’t
    mean that your game won’t run, but that you need to do a more accurate benchmark,
    and probably build a prototype and run it on the target device. It is good practice
    to do that for every new game that you create. You never know what kind of issues
    you may uncover with this small experiment.


    ## Sprite Sheets


    Let’s have a closer look at the character image. It has a set of animation frames
    for a dozen animations. Each frame has its own position on the sheet and doesn’t
    overlap with the other frames. Frames are of different sizes: a frame with the
    character standing still is smaller than the frame with the character waving hand
    since the raised hand takes up some space.


    The position of the character inside the frame also differs from one frame to
    another. It changes depending on the character’s pose or action. When he is standing
    still, he is roughly in the middle of the frame; when he is crouching, he might
    be shifted a little bit to the right; when he’s swinging his weapon, he might
    be shifted to the left, and so on.


    When we render a smooth animation, we need to know this position, or anchor point.
    When the character is bowing, his feet must stay in a fixed location of the game
    world, and does not depend on the dimensions of the frame. The “center of the
    character” is the anchor of the frame.'
