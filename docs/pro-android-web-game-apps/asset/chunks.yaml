- fmt: "\n[`http://docs.phonegap.com/en/1.0.0/phonegap_media_media.md.html`](http://docs.phonegap.com/en/1.0.0/phonegap_media_media.md.html)\n\
    \n用于在原生封装的应用程序中播放音频的代码如下所示：\n\n```javascript\nvar media = new Media(\"/android_asset/www/sound/sound.mp3\"\
    );\nmedia.play();\n```\n\n就是这样。不要忘记加载核心的 PhoneGap API。至于循环播放，情况再次变得相当复杂。Cordova\
    \ API 不知道如何循环播放媒体。Cordova 开发者忽略了社区关于此问题的请求，只是简单地说：“循环播放未在 Android 上实现。”绕过此限制的\
    \ Hack 方法如代码清单 16-12 所示。\n\n**Listing 16-12.** *使用 Cordova 循环播放音轨*\n\n```javascript\n\
    var media = new Media(\"/android_asset/www/sound/sound.mp3\",\n    null, null,\n\
    \    function(status) {\n        if (status == 4) {\n            media.stop();\n\
    \            media.play();\n        }\n    }\n);\nmedia.play();\n```\n\n这段代码监听了媒体的`status`，一旦播放完成，就会重新开始播放。结果远非完美——循环之间的延迟非常明显，但聊胜于无。此外，还有一些插件可以为\
    \ Cordova 带来更好的声音支持。[`www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1`](http://www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1)\
    \ 上的一篇文章描述了其中一个。\n\n## 用户体验\n\n声音是一个强大的功能，应该明智地使用。声音本质上比你可能在游戏中使用的其他类型的反馈更具感染力。这就是为什么你应该确保你的美妙音频带来的是乐趣而非烦恼。\n\
    \n在设计应用的声音功能时，请遵循常识。记住，你的用户可能正坐在礼堂里听一场无聊的讲座，上网寻找一些更刺激的东西。现在他找到了你的页面。如果你的应用程序大吹大擂地播放所有音效，用户会非常不高兴。\n\
    \n在 Web 世界中，一条经验法则是声音默认是禁用的。或者，你可以在用户首次启动时询问他是否要启用它——但永远不要创建默认开启声音的页面。你能做的最糟糕的事情是创建一个有显著延迟的引导音：如果用户已经切换到了另一个标签页，他将很难找到播放该曲调的页面。\n\
    \n如果你正在制作原生应用程序，你可以让声音默认开启，尽管我建议你友好一点，仍然询问用户是否想要声音。\n\n一款休闲游戏应该可以在没有任何声音的情况下进行游玩。以下是关于优秀声音设计的更多提示：\n\
    \n-   使用静音按钮设计声音。使其在游戏屏幕内易于访问（最多点击两次）。\n-   添加音量控制。允许玩家独立设置背景音乐和音效的音量。\n-   使用一致的声音。就像来自同一集合的图标具有相同大小且相互匹配一样，声音应该具有相同的“风格”和音量。\n\
    -   不要使用过于响亮或扰人的声音，或带来负面情绪的声音。例如，游戏结束事件播放逼真的婴儿哭声，并不会激励你的玩家再试一次。\n\n遵循这些简单的建议，你的游戏音频将顺利且自然地融入到游戏进程中。\n\
    \n## 总结\n\n在本章中，我们学习了如何在浏览器中处理声音。声音 API 仍然远非完美，尤其是在移动设备上。像 `SoundManager2` 这样的库旨在使声音能够轻松地从\
    \ JavaScript 访问。当浏览器无法播放某些声音格式时，`SoundManager` 会使用 Flash 插件，并允许你在任何地方播放媒体。\n"
  raw: '[http://docs.phonegap.com/en/1.0.0/phonegap_media_media.md.html.](http://docs.phonegap.com/en/1.0.0/phonegap_media_media.md.html)


    The code for playing audio from within a native-wrapped app looks like the


    following:


    var media = new Media("/android_asset/www/sound/sound.mp3");


    media.play();


    That’s it. Don’t forget to load the core phonegap API. As for looping, things
    are


    quite complicated once again. The Cordova API doesn’t know how to loop


    media. Cordova developers are ignoring community requests on this subject,


    simply saying, ‘ Looping is not implemented on Android.’’ The hacky way to get


    around this limitation is shown in Listing 16-12.


    **Listing 16-12.** *Looping Track with Cordova*


    var media = new Media("/android_asset/www/sound/sound.mp3",


    null, null,


    function(status) {


    [if (status == 4) {](#index_split_000.html#p11)


    media.stop();


    media.play();


    }


    }


    );


    media.play();


    The code listens to the ‘ status’ of the media, and once the playback is finished,


    it starts it again. The results are far from perfect----the delays between the
    loops are more than noticeable, but it is better than nothing. Besides, there
    are a few


    Download from Wow! eBook <www.wowebook.com>


    plug-ins that bring better sound support to Cordova. An article at


    [www.scirra.com/tutorials/](http://www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1)[283/ph](#index_split_003.html#p287)[onegap-low-latency-audio/page-](http://www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1)[1](#index_split_000.html#p8)
    [de](http://www.scirra.com/tutorials/283/phonegap-low-latency-audio/page-1)scribes
    one of them.


    **User Experience**


    Sound is a powerful feature that should be used wisely. Sound, by its nature,
    is


    much more evocative than other types of feedback that you might use in your


    game. That’s why you should make sure that your splendid audio actually brings


    fun and not annoyance.


    Follow common sense when you design the sound capabilities of your app.


    Remember, your user might be sitting in a boring lecture in the middle of the


    auditorium, surfing the web and looking for something more exciting. Now he


    CHAPTE[R 16: Addi](#index_split_000.html#p23)ng Sound


    **[613](#index_split_007.html#p613)


    finds your page. If your application plays all its bells and whistles, the user
    will be none too pleased.


    As a rule of thumb in the web, sound is disabled by default. Alternatively, you


    can ask the user if he wants to enable it on the first launch-----but never create


    pages with the sound turned on. The worst thing you can do is create an intro


    sound that plays with a significant delay: if the user has switched to a different


    tab, he will have a tough time finding the page that plays the tune.


    If you are making a native application, you may leave the sound turned on by


    default, although I would suggest that you be nice and still ask the user if he


    wants sound or not.


    A casual game should be playable without any sound. The following are more


    tips on good sound design:


     Design sound with a Mute button. Make it easily accessible


    from within the game screen (two clicks at most).


     Add volume controls. Allow the player to set the volume of the


    background music and effects independently.


     Use consistent sounds. Just as icons from the same collection


    have the same size and suit each other, sounds should have


    the same ‘ style’’ and volume.


     Don’t use sounds that are too loud or too disturbing, or


    sounds that bring negative emotions. A realistic baby cry for


    the game over event, for example, will not motivate your player


    to try again.


    Follow this simple advice, and your game audio will fit smoothly and naturally


    into the game process.


    **Summary**


    In this chapter, we learned how to work with sound in the browser. Sound APIs


    are still far from perfect, especially when it comes to mobile devices. Libraries


    like SoundManager2 are designed to make sound easily accessible from


    JavaScript. When the browser is not capable of playing certain sound formats,


    SoundManager uses the Flash plug-in and allows you to play media anywhere,'
