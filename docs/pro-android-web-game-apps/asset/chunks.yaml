    \ = function () {\n  console.log(this._color + \" car has stopped\");\n};\n\n\
    var car2 = new Car(\"blue\");\n\n// Objects share the same object for prototype\n\
    console.log(Object.getPrototypeOf(car1) === Object.getPrototypeOf(car2)); // true\n\
    \n// Both objects can now access the new method\ncar2.stop();\ncar1.stop();\n\
    ```\n\nWhen you execute this script, you’ll see that the new methods are available\
    \ to both `car1` and `car2`. Figure 1-13 illustrates this idea. Each object that\
    \ is created with the `new Car()` call shares the same object as its prototype.\
    \ Obviously, by sharing the prototype, they share the whole prototype chain.\n\
    \n**Figure 1-13.** *All objects created with `new Car()` share the same prototype\
    \ defined in `Car.prototype`*\n\n## Inheritance\n\nInheritance is one of the core\
    \ concepts of OOP. It allows reusing the common functionality defined in a ‘parent’\
    \ object and extends it with the specifics of ‘child’ objects. Let’s look at an\
    \ example of an application that operates several different types of cars: fire\
    \ trucks, racing cars, and ice cream vans. All of these cars have common features.\
    \ They can all move, turn, and stop. But each car has special features that are\
    \ only available to it: fire trucks can rotate a water cannon, a racing car can\
    \ drift, and an ice cream van can play melodies. Figure 1-14 illustrates this\
    \ architecture.\n\n![](index-41_1.jpg)\n\nCHAPTER 1: Getting Started\n\n**Figure\
    \ 1-14.** *The idea of inheritance. The “parent” (`Car`) defines the common methods,\
    \ while “children” (`FireTruck`, `RacingCar`, and `IceCreamVan`) define only the\
    \ specific extensions.*\n\nAs you can see, the prototype chain does exactly the\
    \ same thing: it allows you to reuse the methods and variables from the prototypes\
    \ on the upper levels.\n\nLet’s start with the code for two constructors that\
    \ define the required methods (see Listing 1-6).\n\n**Listing 1-6.** *The Basic\
    \ Setup for Inheritance*\n\n```javascript\nfunction Car(color) {\n  this._color\
    \ = color;\n}\n\nCar.prototype.move = function() {\n  console.log(this._color\
    \ + \" car moves\");\n};\n\nCar.prototype.turn = function(direction) {\n  console.log(this._color\
    \ + \" car turns \" + direction);\n};\n\nCar.prototype.stop = function() {\n \
    \ console.log(this._color + \" car stops\");\n};\n\nfunction FireTruck() {}\n\n\
    FireTruck.prototype.turnCannon = function(direction) {\n  console.log(\"Cannon\
    \ moves to the \" + direction);\n};\n\n// Link prototypes of FireTruck and Car\
    \ into the chain somehow\nvar truck = new FireTruck();\n\n// Will not work, because\
    \ the Car.prototype is not in the prototype chain\n// of the truck object yet,\
    \ so method move() is not available\ntruck.move();\ntruck.turnCannon(\"right\"\
    );\n```\n\n**NOTE:** As you see, the code uses `console.log` to trace the execution.\
    \ To learn how to capture the console output in both mobile and desktop browsers,\
    \ refer to Appendix A.\n\nThe code will not work. The `truck.move()` call results\
    \ in an error since the `move` method is not available to `FireTruck`. Fixing\
    \ this code and adding the `Car` into the chain is surprisingly easy. There is\
    \ a special method in JavaScript called `Object.create(proto, properties)`. It\
    \ creates a new blank object and sets its prototype to `proto` — the first argument\
    \ of the function. Listing 1-7 shows how to fix the code.\n\n**Listing 1-7.**\
    \ *Corrected Inheritance*\n\n```javascript\nfunction FireTruck() {}\n\nFireTruck.prototype\
    \ = Object.create(Car.prototype);\n\n// Check just in case\nconsole.log(Object.getPrototypeOf(FireTruck.prototype)\
    \ === Car.prototype);\n// true\n```\n\nDownload from Wow! eBook <www.wowebook.com>"
