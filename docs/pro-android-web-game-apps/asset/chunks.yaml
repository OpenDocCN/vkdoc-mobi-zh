    \ in the Browser: The Canvas Element\n\n**Figure 2-9.** *A filled and stroked\
    \ rectangle*\n\n### Paths\n\nIn 2D context, everything that is not a rectangle\
    \ is a complex shape, which is another geeky name. A complex shape is a “virtual”\
    \ path that you draw on the context. Why is it virtual? Because it is not visible\
    \ until you stroke or fill it.\n\nThe dotted line on the first image in Figure\
    \ 2-10 does not show on the display; I put it there for reference. Fill works\
    \ like the paint bucket; stroke is the border. You can use either one of these,\
    \ or both together, but the path will stay invisible until you use either to “paint”\
    \ it. Setting a path is like drawing a sketch with a very thin pencil; to finish\
    \ the picture, paint should be applied on top of it. Figure 2-10 illustrates this\
    \ idea.\n\n**Figure 2-10.** *(1) Path without strokes and fills (invisible). (2)\
    \ Path with stroke only. (3) Path with fill only. (4) Path with both stroke and\
    \ fill.*\n\n`Context2D API` has three “instruments” for building paths: lines,\
    \ arcs, and curves (quadratic and Bézier).\n\nWe will start learning how paths\
    \ work from drawing a grid on the game board. Then we look at arcs and draw tokens\
    \ for the game. Finally, we will use curves to draw some nice board decorations.\n\
    \n![](index-62_1.jpg)\n\n## Chapter 2: Graphics in the Browser: The Canvas Element\n\
    \n### Lines\n\nLine is the simplest of the paths. The code to render a line on\
    \ the canvas is very straightforward:\n\n```\nctx.beginPath();\nctx.moveTo(50,\
    \ 50);\nctx.lineTo(120, 100);\nctx.strokeStyle = \"#000\";\nctx.stroke();\n```\n\
    \nFirst of all, we need to let context know that we are starting a new path: `beginPath`\
    \ does exactly that. The `moveTo` method means “we are going to draw the next\
    \ path segment from this point.” Or, continuing the analogy with the pencil and\
    \ paper, “take your pencil off the paper and put it to that point without drawing\
    \ anything.” The next line of the code is self-explanatory: draw the line from\
    \ wherever you are to `(120, 100)`. At this point, the line is not drawn yet;\
    \ it exists only as a virtual path. The final two lines stroke the path; the line\
    \ finally becomes visible. The result is not surprising: the line from `(50, 50)`\
    \ to `(120, 120)`, as shown in Figure 2-11.\n\n**Figure 2-11.** *Drawing a line*\n\
    \nNow you know how to draw lines. Let’s use this knowledge to draw a grid for\
    \ the board (see Listing 2-5).\n\n**Listing 2-5.** *Drawing a Grid*\n\n```\n//\
    \ For now, set cell size explicitly, later\n// we will calculate it based on device\
    \ dimensions\nvar cellSize = 40;\n\nctx.beginPath();\n\n// Drawing horizontal\
    \ lines\nfor (var i = 0; i < 8; i++) {\n  ctx.moveTo(i*cellSize + 0.5, 0);\n \
    \ ctx.lineTo(i*cellSize + 0.5, cellSize*6)\n}\n\n// Drawing vertical lines\nfor\
    \ (var j = 0; j < 7; j++) {\n  ctx.moveTo(0, j*cellSize + 0.5);\n  ctx.lineTo(cellSize*7,\
    \ j*cellSize + 0.5);\n}\n\n// Stroking to show them on the screen\nctx.lineWidth\
    \ = 1;\nctx.strokeStyle = \"#989681\";\nctx.stroke();\n```\n\nThe board has seven\
    \ columns and six rows, so we need to draw eight vertical and seven horizontal\
    \ lines. Note that we don’t stroke each line individually. The lines are joined\
    \ into one big path that is stroked afterwards with a single `ctx.stroke()` call.\
    \ The individual line is called a subpath. More about subpaths later in this chapter.\n\
    \n**NOTE:** As you see, I’m hard-coding the cell size here. Don’t do this in the\
    \ real application if your game needs to scale to fit screens with different resolutions.\
    \ We will rewrite the code and make it adapt to the screen size later in the next\
    \ chapter.\n\nIf you add this code after the code from Listing 2-4, the result\
    \ will look almost like the board. The grid is not yet perfectly centered inside\
    \ the board, but that’s easy to fix as we will see in the final sections of this\
    \ chapter."
