    CHAPTER 3: Creating the First Game


    **113


    **Win Condition**


    The goal of the game is obvious from its name-----Four Balls. If the last move


    completed a straight line that consists of four or more same-colored pieces,


    then the player who dropped the last piece is the winner. The algorithm is


    implemented in the _getGameState() function. It is much easier than, for


    example, the algorithm for chess. Still, it deserves a few more words to explain.


    It is obvious that the last fallen piece must be the part of the winning line;


    otherwise, the game would have been over before the current turn. We need to


    check if there’s a straight line of four or more same-colored pieces that lies


    through the given cel -----the cell that the last piece dropped to. We calculate
    the number of pieces in all possible directions that make up the straight line.
    If there are two pieces of the same color straight to the left, for example, and
    one piece


    of the same color straight to the right, then we have a line of four pieces: two
    at


    the left, one at the right, and one between them-----the piece from the last move.


    We do this check for a horizontal line, for a vertical line, and then for two


    diagonal lines.


    Figure 3-4 illustrates how these checks work. There is a win condition because


    there is a horizontal line of four balls. Two balls to the left of the last dropped


    ball and one to the right give a total of four.


    **Figure 3-4.** *Checking win conditions*


    The code that implements this check is quite small. It is split into two functions.


    One of them, _checkWinDirection(), calculates how many balls of the same


    color are present in a certain direction starting from the last dropped ball.
    The


    other function, _getGameState(), returns the state of the game once every


    possible direction is checked. The direction is set by two numbers: deltaX and


    deltaY. On each step of the loop, these values are added to the coordinates of


    the cell. If deltaX is -1, for example, it means that we will decrease the column


    index at each step (moving to the left); if deltaY is 0, it means that the row
    index stays the same at each step. Combined, it gives the movement in a left


    direction. If the cell coordinates are (4, 2), then the following cells are checked:


    CHAPTER 3: Creating the First Game


    (3, 2), (2, 2), (1, 2). Of course, the check will end earlier if one of the cells
    is empty or has a piece of a different color. Listing 3-20 shows the code for


    _checkWinDirection, the function that calculates the number of same-colored


    balls in a given direction.'
