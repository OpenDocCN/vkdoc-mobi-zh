    \n如果你没有接触过 Java、.NET 或类似平台，那么签名的概念对你来说可能有些陌生。签名是一种强大的安全机制，它允许用户验证特定数据的完整性和真实性。在\
    \ Android 开发中，这里的“数据”就是你分发的应用程序。每个应用程序都必须签名：不仅是通过市场分发的应用程序，任何应用程序都必须如此。我们在本章中创建的每个示例都隐含地进行了签名——Ant\
    \ 构建脚本使用调试密钥为其签名。然而，Google Play 商店不接受调试密钥，因此你需要创建一个真正的密钥，才能与他人分享你的作品。\n\n**注意：**\
    \ 官方 Android [文档](http://developer.android.com/guide/publishing/app-signing.html)中提供了关于签名过程的非常出色的解释。在本节中，我不会详细解释数字签名的概念并重复在线信息，而是提供一个关于如何为将应用发布到\
    \ Android 市场做准备的快速指南。\n\n## **589\n"
- fmt: "# Creating a Digital Key\n\nTo sign an application, you need to create a digital\
    \ key. The command-line tool for managing keys comes along with JDK; it is called\
    \ a `keytool`. The key is stored in a keystore—the file that contains the information\
    \ about multiple keys.\n\nExecute the following command to generate the keystore\
    \ with one 2048-bit RSA key:\n\n```\nkeytool -genkey -v -keystore juriy-android.keystore\
    \ -alias android-release -keyalg RSA -keysize 2048 -validity 10000\n```\n\nThe\
    \ `keytool` prompts you to answer several questions, as shown in the following\
    \ output from my example key creation. Answering the questions is not obligatory,\
    \ so answer whatever suits you.\n\n```\nEnter keystore password:\nRe-enter new\
    \ password:\nWhat is your first and last name?\n  [Unknown]: Juriy Bura\nWhat\
    \ is the name of your organizational unit?\n  [Unknown]:\nWhat is the name of\
    \ your organization?\n  [Unknown]:\nWhat is the name of your City or Locality?\n\
    \  [Unknown]: Kiev\nWhat is the name of your State or Province?\n  [Unknown]:\n\
    What is the two-letter country code for this unit?\n  [Unknown]: UA\nIs CN=Juriy\
    \ Bura, OU=Unknown, O=Unknown, L=Kiev, ST=Unknown, C=UA correct?\n  [no]: yes\n\
    Generating 2.048 bit RSA key pair and self-signed certificate (SHA1withRSA) with\n\
    a validity of 10.000 days\nfor: CN=Juriy Bura, OU=Unknown, O=Unknown, L=Kiev,\
    \ ST=Unknown, C=UA\nEnter key password for <android-release>\n    (RETURN if same\
    \ as keystore password):\n[Storing juriy-android.keystore]\n```\n\nThe keystore\
    \ is a simple file that has one or many keys and certificates. Each key in the\
    \ keystore is protected by its own password and has an alias—the name that you\
    \ use to refer the key. Once the file is created, which should look like the following,\
    \ check that it is a valid keystore and that it has a key with the `android-release`\
    \ alias:\n\n```\nkeytool -list -v -keystore juriy-android.keystore\nEnter keystore\
    \ password:\n\nKeystore type: JKS\nKeystore provider: SUN\n\nYour keystore contains\
    \ 1 entry\n\nAlias name: android-release\nCreation date: 10 Jul 2012\nEntry type:\
    \ PrivateKeyEntry\nCertificate chain length: 1\nCertificate[1]:\nOwner: CN=Juriy\
    \ Bura, OU=Unknown, O=Unknown, L=Kiev, ST=Unknown, C=UA\nIssuer: CN=Juriy Bura,\
    \ OU=Unknown, O=Unknown, L=Kiev, ST=Unknown, C=UA\nSerial number: 4f357fb2\nValid\
    \ from: Fri Feb 10 22:36:02 EET 2012 until: Tue Jun 28 23:36:02 EEST 2039\nCertificate\
    \ fingerprints:\n         MD5:  EA:48:BE:09:AA:8A:05:20:AC:04:D6:13:B2:7A:09:05\n\
    \         SHA1: 74:ED:15:74:98:D0:A2:1F:89:76:46:E2:B6:2A:48:37:D9:66:AD:5D\n\
    \         Signature algorithm name: SHA1withRSA\n         Version: 3\n*******************************************\n\
    *******************************************\n```\n\nIf you see something like\
    \ the preceding, then the keystore is ready.\n\n# Signing the Application\n\n\
    The next step is to build the \"release\" version of your application, and sign\
    \ it with the key. To do that, you need to tell the Ant script where to find the\
    \ keystore and which key (alias) to use. Execute the following command:\n\n```\n\
    ant -Dkey.store=<path-to-keystore>.keystore -Dkey.alias=<key-alias> clean release\n\
    ```\n\nAt some point of the build script, `Ant` prompts you to enter two passwords:\
    \ one for the keystore and another for the key. The password appears on the screen\
    \ as you type, so make sure that nobody’s looking over your shoulder.\n\nAlternatively,\
    \ you can put two extra lines into the `ant.properties` file in the project root:\n\
    \n```\nkey.store=../<path-to-keystore>\nkey.alias=<key-alias>\n```\n\nIf you do\
    \ so, you can omit the extra parameters in the command line and just type:\n\n\
    ```\nant clean release\n```\n\n**NOTE:** If you are as paranoid about your passwords\
    \ as I am, you can sign the package manually. The process is somewhat more complex,\
    \ since it requires you to sign and then \"align\" the application. Refer to the\
    \ official Android tutorial for details [(http://developer.android.com/guide/publishing/app-signing.html#signapp)](http://developer.android.com/guide/publishing/app-signing.html#signapp)."
