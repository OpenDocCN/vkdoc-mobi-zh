    This code works perfectly for static objects. But what if an object moves?


    Handling Movement


    Movement is simple once you think of it in terms of removing objects from


    clusters and adding them to other clusters. The flow for an object that has


    moved is shown in Figure 7-17.


    Download from Wow! eBook <www.wowebook.com>


    **Figure 7-17.** *Object movement: preserving the consistent state of clusters
    and the cache* As you remember, we use custom events to track the movement of
    the object.


    The code that fires it is in the GameObject class. The first thing to do is to
    set up appropriate listeners for every object added to the layer, as in Listing
    7-27\. Once


    the object is removed from the layer, the listener is de-registered too.


    **Listing 7-27.** *Tracking Moving Objects*


    function ObjectLayer(objects, clusterSize, worldWidth, worldHeight) {


    /* unchanged code*/


    this._boundOnMove = this._onObjectMove.bind(this);


    this._addMoveListeners();


    this._resetClusters();


    }


    CHAPTER 7: Making an Isometric Engine


    **299


    _p._addMoveListeners = function() {


    for (var i = 0; i < this._objects.length; i++) {


    this._objects[i].addListener("move", this._boundOnMove);


    }


    };


    _p.addObject = function(obj) {


    this._objects.push(obj);


    obj.addListener("move", this._boundOnMove);


    var clusters = this._addToClusters(obj);


    if (clusters.intersects(this._visibleClusterBounds)) {


    this._cache.push(obj);


    this._cacheUnsorted = true;


    }


    };


    _p.removeObject = function(obj) {


    if (!Arrays.contains(obj, this._objects)) {


    return;


    }


    obj.removeListener("move", this._boundOnMove);


    this._removeFromClusters(obj);


    Arrays.remove(obj, this._cache);


    };


    The function that handles movement is _onObjectMove() (_boundOnMove() is the


    version bound to the instance of ObjectLayer, but essential y is the same


    function). It accepts one argument-----the movement event. The key point of this


    function is to keep layer data consistent: the clusters (both _clusters and


    _idToClusterBounds) and the cache. The first step is to determine if an object


    has moved to the new clusters. If so, we have to remove the object from the old


    clusters and add it to the new ones. Next, if the object is in one of the active


    clusters and moves vertically, we need to mark the cache as unsorted. Listing
    7-


    28 shows how to implement this flow.


    **Listing 7-28.** *Handling the Object Movement*


    _p._onObjectMove = function(e) {


    var obj = e.object;


    var id = obj.getId();


    var objectBounds = obj.getBounds();


    var newClusters = objectBounds.getOverlappingGridCells(


    this._clusterSize, this._clusterSize,


    this._clusters[0].length, this._clusters.length);


    ![](index-304_1.jpg)


    CHAPTER 7: Making an Isometric Engine


    var oldClusters = this._idToClusterBounds[id];


    if (!oldClusters.equals(newClusters)) {


    this._moveObjectBetweenClusters(obj, oldClusters, newClusters);


    }


    if (newClusters.intersects(this._visibleClusterBounds) && e.y != e.oldY) {


    this._cacheUnsorted = true;


    }


    };


    _p._moveObjectBetweenClusters = function(obj, oldClusters, newClusters) {


    this._removeFromClusters(obj, oldClusters);


    this._addToClusters(obj, newClusters);


    this._idToClusterBounds[obj.getId()] = newClusters;


    // If object has left the screen, remove from cache


    if (newClusters.intersects(this._visibleClusterBounds)) {


    Arrays.addIfAbsent(obj, this._cache);


    } else {


    Arrays.remove(obj, this._cache);


    }


    };


    The ObjectLayer can now be used with moving objects!


    Composite Objects


    Composite objects can’t be represented as one sprite in the game world


    because of the way we render them. Take an arch, for example. It should allow
    a


    character to pass underneath it. But here we have an ordering problem: what do


    we draw first: the arch or the characters? After a bit of experimentation, you


    discover that it is neither. Figure 7-18 illustrates the problem.


    **Figure 7-18.** *The problem with objects like arches: no matter what the rendering
    sequence is, the* *result will be wrong at some point.*


    ![](index-305_1.jpg)


    CHAPTER 7: Making an Isometric Engine


    **301


    The problem lies in our assumption that there are only two types of ordering.
