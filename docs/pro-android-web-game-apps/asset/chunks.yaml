- fmt: "# 与服务器通信：第11章\n\n交互性至关重要；用户希望了解其他玩家的状态（准备游戏、游戏中、离开键盘）。他还希望列表能够实时更新。\n\n在这种情况下，服务器充当事件的调度者：当两位玩家决定开始一局比赛时，服务器应通知所有其他已订阅的用户，正在游戏的玩家状态已变更，并且在完成游戏之前无法接受新的游戏请求（这是基于匹配的在线游戏的常见做法）。\n\
    \n## 解决方案\n\n现在，我们需要找到一种方法，向每个正在浏览页面的用户展示大厅的实时更新。解决此任务的每种可用方法都属于以下三类之一：\n\n- **最佳解决方案**：专为解决此类任务而设计的API。\n\
    - **可接受的解决方案**：考虑到可用API和限制，仅仅是“足够好”的解决方案。\n- **过时的解决方案**：通常不再使用，但仍可能在某些库中可用的方法。\n\
    \n在本节中，我主要关注第二组，即可接受的解决方案。最佳解决方案仅作简要描述，因为它们无法在Android浏览器中使用。过时的解决方案不会在代码中展示：它们出现在本章中只是为了“完整性”地回顾传输方式。\n\
    \n**注意：** 如本章前面所述，实现服务器推送的不同方法通常被称为*传输方式*。\n\n## 最佳解决方案\n\n有两种专门设计用于处理实时通信以及从客户端向服务器发送事件的API：\n\
    \n- **WebSocket**：规范[`(www.w3.org/TR/websockets/)`](http://www.w3.org/TR/websockets/)\
    \ 支持情况[`(http://caniuse.com/websockets)`](http://caniuse.com/websockets)\n- **服务器发送事件（SSE）**：规范[`(www.w3.org/TR/eventsource/)`](http://www.w3.org/TR/eventsource/)\
    \ 支持情况[`(http://caniuse.com/eventsource)`](http://caniuse.com/eventsource)\n\n\
    不幸的是，这两者都无法在原生Android浏览器中使用。然而，由于这两种API正在向桌面浏览器普及，Android平台最终也可能支持它们（例如，Android版Chrome支持WebSocket）。本节简要概述了这两种API的客户端代码。当你阅读本章时，新的Android版本很可能已经支持`WebSocket`或`SSE`。\n\
    \n### WebSocket\n\n`WebSocket`提供API和基于TCP的轻量级协议，用于保持客户端与服务器之间的连接。如果Android支持它，任务将相对简单。每个客户端都会初始化与服务器的连接，该连接在应用程序的生命周期内保持打开状态。当玩家的状态发生变化时，服务器会将消息发送到所有打开的`WebSocket`连接。假设的`WebSocket`客户端代码如下所示：\n\
    \n```javascript\nvar webSocket = new WebSocket('ws://example.com/lobby');\n\n\
    webSocket.onmessage = function (e) {\n    // e.data holds the response from the\
    \ server,\n    // update the UI or log it to the console\n    console.log('Server:\
    \ ' + e.data);\n};\n```\n\n`WebSocket`与`XHR`的区别在于，客户端和服务器都可以相互发送消息，并且连接在消息发送后保持打开状态。\n\
    \n### 服务器发送事件\n\n服务器发送事件（SSE）是一种API，它定义了一个名为`EventSource`的新DOM元素。当构造此对象时，它会连接到服务器并开始监听新事件。以下展示了如果Android支持，客户端代码将如何编写：\n\
    \n```javascript\nvar es = new EventSource('lobby');\n\nsource.addEventListener('message',\
    \ function(e) {\n    // now you can manipulate the event data\n    console.log(e.data);\n\
    }, false);\n```\n\n从客户端角度来看，`SSE`和`WebSocket`看起来非常相似；然而，它们在技术上有重大差异。Eric Bidelman在他发表于HTML5\
    \ Rocks的文章《使用服务器发送事件进行流更新》中，非常出色地解释了使用这些API的细微差别。"
