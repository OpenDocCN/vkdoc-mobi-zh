    # 矩阵——你无需深究点是如何变换的细节，也不必纠结正弦或余弦函数为何出现在那里。


    **图 8-15.** *以矩阵形式呈现的不同变换类型*


    ## 实现变换


    现在我们已经准备就绪，可以绘制“立方体引擎”的第一个版本了。先从好消息说起。有一个非常优秀的 JavaScript 库能帮我们处理矩阵运算的所有繁重工作，它叫
    `gl-matrix`（[`github.com/toji/gl-matrix`](https://github.com/toji/gl-matrix)）。感谢布兰登·琼斯，我们拥有了一个出色且高效的工具。获取名为
    `gl-matrix.js` 或 `gl-matrix-min.js` 的文件，并将其添加到你的项目中。顾名思义，这个库原本是为 WebGL 设计的，但由于它实现了通用的矩阵数学运算（这些运算在全球范围内都是相同的），我们将把它用于我们的项目。


    渲染立方体线框的思路是执行两个简单步骤：


    1.  按照我们想要的方式变换每个顶点（这里我们希望旋转顶点）。

    2.  在每两个具有共享边的顶点之间绘制一条线段。


    这个过程的具体步骤如图 8-16 所示。


    **图 8-16.** *渲染立方体线框的步骤*


    我们先从第一部分开始。需要对立方体应用两个变换：绕 x 轴旋转和绕 y 轴旋转（如果你愿意，也可以应用其他变换）。`gl-matrix` 提供了几个便捷方法，将矩阵的细节封装在库内部。创建变换矩阵的代码如代码清单
    8-3 所示。


    **代码清单 8-3.** *创建变换矩阵*


    ```

    var modelView = mat4.create();

    mat4.identity(modelView);

    mat4.rotateX(modelView, xRot);

    mat4.rotateY(modelView, yRot);

    ```


    在第一行，我们创建了一个空矩阵。由于创建的矩阵填充的是零，所以在使用之前必须将其初始化为单位矩阵（否则它会将所有点变换到坐标 (0, 0, 0)）。第三行向矩阵添加了
    x 轴旋转，这相当于先创建旋转矩阵，再将我们的单位矩阵与其相乘。最后一行完成了准备工作，现在我们可以旋转立方体了。


    **注意：** 为什么我们将矩阵变量命名为 `modelView`？这是 OpenGL 中使用的名称，它表示……呃，模型的视图：即应用到顶点上、用以精确表示我们所需模型的所有变换。为什么不直接叫“matrix”？因为在这个过程中还有其他矩阵参与。例如，我们将在本章后面处理用于计算透视的投影矩阵。


    “旋转”过程非常简单：我们将矩阵逐一应用到每个顶点上。得到变换后的坐标后，通过简单地丢弃 `z` 坐标，将其投影到相机表面上。我们还需要将立方体稍微放大一些，以便它能够适配屏幕。立方体的大小仅为
    2（范围从 -1 到 1），如果直接将其换算成像素，它会显得非常小。代码清单 8-4 展示了如何计算投影的坐标。


    **注意：** 大小为 2？2 什么？像素、英寸、米还是甜瓜？在 3D 图形学中，这并不重要。你需要在项目中自行制定某种约定来定义这些数值。唯一的规则是在整个项目中保持度量单位的一致性。如果你决定“2”代表“2
    米”，之后可别忘了；否则，你可能会意外创建出一个跟小汽车一样大的兔子模型。但这也不是问题：你随时可以用神奇的矩阵将它缩放到适合你的场景。在本章中，当需要指代
    3D 场景中的大小时，我会使用“单位”这个词。


    **代码清单 8-4.** *计算每个点的投影坐标*

