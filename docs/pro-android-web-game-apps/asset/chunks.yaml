    **Graphical APIs, Libraries, and Game Engines**


    We already started to speak about the game engines, graphical libraries, and


    APIs, but we haven’t yet highlighted the differences between these classes of


    tools. This section aims to give you a basic understanding of how they are


    different, their purpose, and limitations.


    Let’s say that you are holding a smartphone to test the game that you have just


    created. The JavaScript code is rendering frames as the character fights its way


    through hordes of enemies. To be 100 percent precise, it is not JavaScript that


    renders the frame. The rendering commands that you send to a canvas travel a


    long way before they end up being executed on the hardware that does the


    actual job.


    Download from Wow! eBook <www.wowebook.com>


    One of the best things about JavaScript game development is that you don’t


    care about low-level details like the architecture of a graphical system or the


    hardware specifics. This is possible because the browser provides the graphical


    API----the set of functions that we use for rendering.


    Graphical APIs


    A graphical API is a layer of abstraction that stands between your code and the


    underlying system. Its main goal is to make rendering platform-agnostic. Figure


    14-1 shows a bird’s-eye view of graphical APIs.


    ![](index-543_1.jpg)


    CHAPTER 14: JavaScript Game Engines


    **543


    **Figure 14-1.** *A high-level view of graphical APIs. The role of a graphical
    API is to provide a layer of* *abstraction between JavaScript code and the underlying
    system.*


    So far, we have worked only with graphical APIs: Context2D and WebGL. From


    the perspective of an HTML5 game, these APIs are low-level: they have a small


    set of functions that act like tiny building blocks----small bricks that you use
    to


    create your application. Working on the level of the graphical API gives you full


    control over the rendering, at least as ‘‘full’’ as allowed by the underlying


    context.


    The downside of such APIs is that you usually have to write many lines of code


    to implement your ideas. For example, to draw a line with Context2D, one must


    set the stroke style and then call beginPath(), moveTo(), lineTo(), and finally


    stroke(). At least five calls to display the very simplest thing!


    You can polish your code to perfection with graphical APIs. Considering the


    example from the previous paragraph, if you know that your game needs to


    render many lines, you fine-tune the function that does it. You can group the


    lines by color, and reduce the number fillStyle() and stroke() calls to a


    minimum----squeezing every bit of performance out of the CPU. The higher-level


    APIs usually do not allow this level of control, and sometimes you have to


    sacrifice the performance of the game to gain the speed of development.


    Graphical Libraries


    Graphical libraries are the ‘ Swiss Army knife’’ type of tools built on top of
    raw


    APIs that provide standard solutions to typical tasks that arise when you deal


    with graphical content. Usually, they are more specialized than graphical APIs.


    For example, a library can be focused on general geometry and deal with


    shapes, or on photo processing and change brightness and saturation, or apply


    sophisticated artistic effects and filters. A third tool might specialize in charts


    and simplify graph-rendering tasks.


    ![](index-544_1.jpg)


    CHAPTER 14: JavaScript Game Engines


    Graphical libraries have their advantages: they implement features that might


    otherwise take a considerable amount of time to make on your own. Quickly,


    think of a way to apply the ‘ sharpen edges’’ filter on the canvas! Most people


    can’t answer this question straightaway; they would spend valuable time


    Googling, writing code, testing it, and finally adding it to the project. WebGL
    is


    another good example of a low-level API that sometimes makes things look'
