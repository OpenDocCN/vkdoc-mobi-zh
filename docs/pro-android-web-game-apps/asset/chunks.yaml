  trans: "\n# 第 6 章：渲染虚拟世界\n\n...但这种方式远非最佳。在本节中，我们将尝试提升渲染性能。首先从减少每帧绘制的瓦片数量开始。\n\n\
    ## 只绘制所需内容\n\n我们的第一个问题：每次都会绘制整个世界，尽管玩家只需要其中一小部分。与其绘制整个瓦片阵列，不如只绘制可见的部分。图 6-7 展示了这一思路。\n\
    \n![图 6-7](img/index-234_1.jpg)\n\n**图 6-7.** 仅绘制当前视口中可见的瓦片。被划掉的瓦片是我们将绘制的区域。\n\
    \n`MapRenderer` 需要知道视口的大小才能确定哪些瓦片是可见的。然后，我们可以使用以下简单公式计算最左侧和最右侧可见瓦片的坐标：\n\n```javascript\n\
    var startX = Math.floor(-this._x / this._tileSize);\n```\n\n表达式 `-this._x / this._tileSize`\
    \ 给出了视口左侧的瓦片数量。由于这个数字可能是小数，我们对其应用 `Math.floor()` 来获取整数索引，从而得到用户看到的最左侧瓦片的 `x` 坐标。类似公式可用于获取最右侧坐标：\n\
    \n```javascript\nvar endX = Math.floor((this._viewportWidth - this._x) / this._tileSize);\n\
    ```\n\n当用户滚动超过地图边界时，`startX` 和 `endX` 可能超出世界数组的范围。因此，我们需要检查边界并在必要时裁剪值。\n\n```javascript\n\
    startX = Math.max(startX, 0);\nendX = Math.min(endX, this._mapData[0].length -\
    \ 1);\n```\n\n使用相同的公式获取可见瓦片的最顶部和最底部 `y` 坐标。一旦你获得全部四个值—— `startX`、`endX`、`startY`\
    \ 和 `endY` ——就能确切知道用户通过当前视口看到的内容，从而可以省略任何无用的瓦片。让我们如清单 6-7 所示实现这一改动。\n\n**清单 6-7.**\
    \ 仅绘制可见瓦片\n\n```javascript\nfunction MapRenderer(mapData, image, tileSize, viewportWidth,\
    \ viewportHeight) {\n    ...\n    this.setViewportSize(viewportWidth, viewportHeight);\n\
    }\n\n_p.setViewportSize = function(width, height) {\n    this._viewportWidth =\
    \ width;\n    this._viewportHeight = height;\n};\n\n_p.draw = function(ctx) {\n\
    \   // 不再绘制地图的每个瓦片，而是检查哪些\n   // 是实际可见的\n\n   // 最左侧可见瓦片的 x 坐标\n   var startX\
    \ = Math.floor(-this._x / this._tileSize);\n   startX = Math.max(startX, 0);\n\
    \n   // 最右侧可见瓦片的 x 坐标\n   var endX = Math.floor((this._viewportWidth - this._x)\
    \ / this._tileSize);\n   endX = Math.min(endX, this._mapData[0].length - 1);\n\
    \n   // 最顶部可见瓦片的 y 坐标\n   var startY = Math.floor(-this._y / this._tileSize);\n\
    \   startY = Math.max(startY, 0);\n\n   // 最底部可见瓦片的 y 坐标\n   var endY = Math.floor((this._viewportHeight\
    \ - this._y) / this._tileSize);\n   endY = Math.min(endY, this._mapData.length\
    \ - 1);\n\n   // 仅绘制可见瓦片\n   for (var cellY = startY; cellY <= endY; cellY++)\
    \ {\n        for (var cellX = startX; cellX <= endX; cellX++) {\n            var\
    \ tileIndex = this._mapData[cellY][cellX];\n            ...\n            ...\n\
    \        }\n   }\n};\n```\n\n你应注意画布可能随时改变大小。用户倾向于晃动和翻转智能手机和平板电脑，导致屏幕方向变化，因此画布渲染器应能感知此类变化。更新画布大小的代码也应同时更新视口大小，以便\
    \ `MapRenderer` 能使用新值计算可见瓦片。清单 6-8 展示了如何更新 `index.html` 文件以保持 `MapRenderer` 与画布大小一致。\n\
    \n**清单 6-8.** 每次更新画布大小时同步更新视口大小\n\n```javascript\nfunction resizeCanvas(canvas)\
    \ {\n    canvas.width = document.width || document.body.clientWidth;\n    canvas.height\
    \ = document.height || document.body.clientHeight;\n    mapRenderer && mapRenderer.setViewportSize(canvas.width,\
    \ canvas.height);\n}\n\nfunction onLoaded() {\n    mapRenderer = new MapRenderer(world,\
    \ imageManager.get(\"tiles\"),\n        40, canvas.width, canvas.height);\n  \
    \  animate(0);\n}\n```\n"
- fmt: "现在正是看看它在设备上效果的好时机！每秒三十四帧！成功！嗯……其实还不算完全成功。它还能运行得更快；导致我们每秒丢失最多帧数的问题在于，每一帧我们都重新绘制整个地图，即使可见部分并没有变化。换句话说，如果用户看到的地图片段是\
    \ 10×15 个格子，我们每帧要执行 `150` 次 `drawImage()` 调用，而大多数情况下绘制结果与前一帧完全相同。如果能够缓存视口的当前状态，并在需要时将其作为一张图片重新绘制，就能获得巨大的性能提升。这正是我们接下来要介绍的技术的核心理念。\n\
    \n## 离屏缓冲\n\n如果我们直接创建另一个与视口大小完全相同的 `canvas` 实例，并将渲染好的地图保存到其中呢？如果用户没有移动地图，我们就可以使用预渲染的快照。这项技术在游戏开发中非常普遍，因为它能让复杂图案的绘制变得更快。它通常被称为离屏缓冲。之所以叫“离屏”，是因为你看不到存放缓存片段的元素。\n\
    \n在深入代码之前，请先看一下图 6-8，它说明了这个思路。\n\n现在我们有两个 `canvas` 实例，而不是一个。第二个 `canvas` 是不可见的，甚至没有附加到\
    \ DOM 上。我们称之为离屏 `canvas`。它保存了上次绘制在屏幕上的帧。如果用户没有移动地图，也没有改变设备方向，那么我们就可以使用“缓存”的帧并再次绘制它。否则，离屏\
    \ `canvas` 就失效了（这种状态通常称为脏）。我们需要先更新离屏 `canvas`，再将离屏 `canvas` 的内容复制到屏幕上。\n\n![](index-237_1.jpg)\n\
    \n**图 6-8.** *我们不会每帧重新渲染整个图块集合，而是将当前帧“缓存”在不可见的离屏 canvas 上。如果视口坐标没有变化，我们就使用预渲染的帧，从而节省一些计算周期。*\n\
    \n如果用户没有移动地图，帧始终不变，我们就不需要重新绘制几十个图块。在这种情况下使用离屏缓冲可以节省大量的 CPU 周期。绘制大图在性能上优于尝试用小块图填充同一区域。这正是我们获得性能提升的关键所在。\n\
    \n现在来看一些代码。`MapRenderer` 再次需要添加几个额外的字段。我们将其添加进去（见代码清单 6-9）。\n\n**代码清单 6-9.** *为\
    \ MapRenderer 添加对离屏 Canvas 的支持*\n\n```\nfunction MapRenderer(mapData, image, tileSize,\
    \ viewportWidth, viewportHeight) {\n    …\n    // 离屏 canvas\n    this._offCanvas\
    \ = document.createElement(\"canvas\");\n    // 离屏 canvas 的上下文\n    this._offContext\
    \ = this._offCanvas.getContext(\"2d\");\n    // 标志，表示用户已移动视口\n    // 并且离屏 canvas\
    \ 必须重新绘制\n    this._offDirty = true;\n    this.setViewportSize(viewportWidth,\
    \ viewportHeight);\n}\n```\n\n前两个字段不言自明：离屏 `canvas` 及其上下文。第三个字段 `_offDirty` 是我们要设置的标志，用于指示离屏\
    \ `canvas` 的内容已失效，需要重新绘制。\n\n我们需要保持离屏 `canvas` 的大小与视口大小一致。此外，如果地图移动了，我们需要设置 `_offDirty`\
    \ 标志。最好的方法就是更新 `move()` 方法。代码清单 6-10 展示了如何实现这一更新。\n\n**代码清单 6-10.** *保持离屏 Canvas\
    \ 大小与视口一致，并在用户移动地图时将其标记为脏*\n\n```\n_p.setViewportSize = function(width, height)\
    \ {\n    this._viewportWidth = width;\n    this._viewportHeight = height;\n  \
    \  this._resetOffScreenCanvas();\n};\n\n/**\n * 更新离屏 canvas 的大小，并将其标记为脏\n */\n\
    _p._resetOffScreenCanvas = function() {\n    this._offCanvas.width = this._viewportWidth;\n\
    ```"
  raw: 'Now is a great time to see how it looks on the device! Thirty-four frames
    per


    second! Success! Well … not exactly. It still can run a lot faster; the problem


    that steals the most frames per second from us is when we repaint the entire


    map each frame, even when the visible fragment doesn’t change. In other


    words, if the user sees the fragment of the map that is 10 × 15 tiles, we perform


    150 calls to drawImage() on every frame, and most of the time the drawing


    results in exactly the same picture as the frame before. If we could cache the


    current state of the viewport and repaint it as a one image when we need to,


    we’ll get a huge performance boost. That’s the idea behind our next technique.


    Offscreen Buffer


    What if we simply create another instance of canvas that is exactly the same size


    as our viewport, and save the rendered map there? If the user doesn’t move the


    map, we can use a pre-rendered snapshot instead. This technique is


    widespread in game development since it makes drawing complex patterns


    much faster. It is often referred to as the offscreen buffer. It’s ‘ offscreen’’


    because you don’t see the element that holds the cached fragment.


    Before diving into the code, take a look at Figure 6-8, which explains the idea.


    Now we have two canvas instances instead of one. The second canvas is


    invisible, and is not even attached to the DOM. We will call it offscreen canvas.
    It holds the last frame that was drawn on the screen. If the user hasn’t moved
    the


    map and hasn’t changed the orientation of the device, then we can use the


    ‘ cached’’ frame and draw it again. Otherwise, the offscreen canvas becomes


    invalid (this state is often called dirty). We need to update the offscreen canvas


    first, and copy the offscreen canvas back on the screen.


    ![](index-237_1.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **Figure 6-8.** *Instead of re-rendering the whole set of tiles every frame, we
    will “cache” the current* *frame on the invisible offscreen canvas. If the coordinates
    of the viewport hasn’t changed, we use the* *pre-rendered frame, saving some cycles.*


    If the user doesn’t move the map, the frame is always the same and we don’t


    need to repaint dozens of tiles. Using the offscreen buffer in this case saves


    many CPU cycles. Drawing big pictures is preferable in terms of performance,


    rather than trying to fill the same area with small tiles. That’s exactly where
    we


    get the performance boost.


    Now it’s time for some code. Once again, MapRenderer needs a few extra fields.


    Let’s add them (see Listing 6-9).


    **Listing 6-9.** *Adding Support for the Offscreen Canvas to the MapRenderer*


    function MapRenderer(mapData, image, tileSize, viewportWidth, viewportHeight)
    {


    …


    // offscreen canvas


    this._offCanvas = document.createElement("canvas");


    // context of the offscreen canvas


    this._offContext = this._offCanvas.getContext("2d");


    // flag that indicates, that a user has moved the viewport


    // and the offscreen canvas must be repainted


    this._offDirty = true;


    this.setViewportSize(viewportWidth, viewportHeight);


    }


    The first two fields are rather self-explanatory: offscreen canvas and its context.


    The third field ----_offDirty-----is the flag that we raise to indicate that the
    content of the offscreen canvas is no longer valid and needs to be repainted.


    CHAPTER 6: Rendering Virtual Worlds


    **233


    We need to keep the size of the offscreen canvas consistent with the size of the


    viewport. Besides, if the map has moved, we need to raise the _offDirty flag.


    The best way to do it is to update the move() method. Listing 6-10 shows how to


    implement that update.


    **Listing 6-10.** *Keeping the Size of the Offscreen Canvas Consistent with the
    Viewport and Marking It* *Dirty Once the User Moves the Map*


    _p.setViewportSize = function(width, height) {


    this._viewportWidth = width;


    this._viewportHeight = height;


    this._resetOffScreenCanvas();


    };


    /**


    * Updates the size of the offscreen canvas and marks


    * it as dirty


    */


    _p._resetOffScreenCanvas = function() {


