    \n#### Node 的 Web 开发框架\n\n什么是`Express`（[`expressjs.com`](http://expressjs.com)）？为什么我们会在游戏中使用它？正如我们在上一节中学到的，`Express`是一个“受`Sinatra`启发的\
    \ Web 开发框架”。`Sinatra`是一个用于`Ruby`的 Web 开发框架。\n"
- fmt: "“web 开发框架”到底是什么？如你所见，`Node` 原生就能处理 HTTP 流量，那为什么我们还需要安装额外的工具呢？让我们退一步，思考一下构建网站时通常需要执行的常见操作。至少，你需要解析\
    \ URL，从中提取 `GET` 或 `POST` 参数，然后将调用路由到执行有用操作的脚本。接下来，你需要提供静态数据——图片、CSS、客户端 `JavaScript`\
    \ 等等。有时你还需要处理用户会话、错误页面（404 和 500）以及日志。当然，如果你愿意，可以自己实现所有这些功能，但这只是在重复造轮子。\n\n但是，仅仅为了制作一个简单的“四球游戏”，我们真的需要所有这些功能吗？好吧，你说得对。实际上，我们并不需要。我们或许可以使用一个像\
    \ `Connect`（[http://senchalabs.github.com/connect/](http://senchalabs.github.com/connect/)）这样更小的框架，它只处理\
    \ cookies 和请求路由等基本功能；但一旦你开始为项目添加功能，最终你会面临两个选择：安装 `Express`，或者再次重复造轮子。好消息是，`Express`\
    \ 是构建在 `Connect` 之上的，一旦你学会了如何使用这个“大哥大”，你就能轻松掌握 `Connect`。\n\n第 10 章：走向服务器端\n\n\
    **421**\n\n**注意：** 本章专门讲解服务器端编程，这意味着我们完全不会触及智能手机。一旦你开始考虑 Android，事情会变得稍微复杂一些——你需要实现许多与服务器无关的客户端功能。为了避免同时处理客户端和服务器端带来的混乱，我将这部分内容分成了三章。这意味着，抱歉各位，本章没有花里胡哨的东西；界面功能仅足以测试服务器是否正常工作——仅此而已。但别担心。在接下来的章节中，我们将回到我们熟悉的环境，并制作一个外观酷炫的游戏客户端。\n\
    \n基本输出\n\n和往常一样，起点是 Hello World 应用程序（参见清单 10-14）。在深入研究细节之前，先让一些东西跑起来总是不错的。\n\n\
    **清单 10-14.** *使用 Express 的 Hello World*\n\n```\nvar app = require('express').createServer();\n\
    \napp.get('/', function(req, res){\n  res.send('hello world');\n});\n\napp.listen(80);\n\
    ```\n\n安装好 `Express`（如果尚未安装）后，将脚本保存到 `main.js` 文件中，并使用以下命令运行它：\n\n> `node main`\n\
    \n访问 [http://localhost](http://localhost)。你应该能在那里看到我们熟悉的文字。代码的第一行加载了一个名为 `express`\
    \ 的模块（我们已经安装好了它），然后调用了导出对象的 `createServer()` 函数。`app` 变量现在持有我们用来设置应用本身的 `Server`\
    \ 对象。这个示例只添加了一条路由规则：所有对网站根目录的 `GET` 请求都会输出 `Hello World` 这行文字。最后一行将服务器绑定到 80 端口。请确保你没有运行\
    \ `nginx`——在本章中，我们只使用 `Node` 来提供文件服务。\n\n让我们通过创建一个简单的游戏界面来增加一些实际操作——仅仅是为了验证服务器能正常工作。我们将从第\
    \ 3 章中加载空的 `BoardModel`，然后通过 HTML 页面显示它。\n\n第 10 章：走向服务器端\n\n**注意：** 原始 `BoardModel`\
    \ 的代码可以在第 3 章的资料中找到，文件名为 `js/BoardModel.js`。\n\n为此，我们首先需要将 `BoardModel` 转换为 `Node`\
    \ 模块。幸运的是，改动不多。我们修改了其中的继承代码（因为它在 `Node` 中无效），并将构造函数赋值给了 `exports` 变量。清单 10-15\
    \ 展示了结果。我删减了旧函数的代码（当我粘贴整个源码时，它有三页长；如果你和我一样，那么你没有耐心阅读三页的代码）。如果你想查看这个类的完整源代码，可以下载本章的代码。"
  raw: 'What exactly is the ‘ web development framework’’? As you’ve seen, Node can


    handle HTTP traffic out of the box, so why do we need to install something


    beyond it? Let’s take a step back and think of common activities that you


    usually need to perform when you want to build a web site. At the very least,
    you


    need to parse the URL, extract GET or POST parameters from it, then route the


    call to the script that does something useful. Next you’ll need to serve static


    data-----images, CSS, client-side JavaScript, and so forth. Sometimes you also


    need to handle user sessions, error pages (404s and 500s), and logging. Well,


    you could do that yourself, of course, if you want to, but you’d just be


    reinventing yet another wheel.


    But do we really need all these facilities just to make a simple Four Balls game?


    Okay, you got me. In fact, we don’t. We could probably get by with a smaller


    framework like Connect [(http://senchalabs.github.com/connect/)](http://senchalabs.github.com/connect/)
    that just does basic things like cookies and request routing; but once you start
    adding


    features to your project, you end up doing one of two things: installing Express


    or reinventing the wheel. The good news is that Express is built on top of


    Connect, and once you learn how to work with the big brother, you can handle


    Connect in no time.


    CHAPTER 10: Going Server-Side


    **421


    **NOTE:** This chapter is devoted to server-side programming, which means that
    we will not touch smartphones at all. Once you start thinking about Android, things
    get slightly more complex—you need to implement a lot of client-side features
    that don’t have anything to do with the server. I want to avoid the mess of making
    both client


    and server in one go, so I’ve divided this material into three chapters. This
    means


    that, sorry guys, there are no bells and whistles in this chapter; the interface
    is just enough to test that the server is working—and no more. But fear not. In
    the next


    chapters, we’ll get back to our usual environment and make a cool-looking game


    client too.


    Basic Output


    The starting point is the Hello World application as usual (see Listing 10-14).
    It is good to have something working before diving deep into the details.


    **Listing 10-14.** *Hello World with Express*


    var app = require(''express'').createServer();


    app.get(''/'', function(req, res){


    res.send(''hello world'');


    });


    app.listen(80);


    After installing Express (if it is not yet installed), save the script into the
    main.js file and run it with the following:


    > node main


    Go to [http://localhost.](http://localhost) You should see our favorite line there.
    The first line of the code loads a module called express(we’ve already installed
    it) and then calls


    the createServer() function of the exported object. The app variable now holds


    the Server object that we use to set up the application itself. This demo adds


    only one routing rule: all GET requests to the root of the web site output the
    line


    Hello World. The last line attaches the server to port 80\. Make sure that you


    don’t have nginx around-----in this chapter, we only use Node to serve files.


    Let’s add some real action by creating a simple game screen-----just for the sake


    of verifying that the server works fine. We’ll load the empty BoardModel from


    Chapter 3 and then display it via HTML page.


    CHAPTER 10: Going Server-Side


    **NOTE:** The code for the original BoardModel can be found with the materials
    for Chapter 3 in the js/BoardModel.js file.


    To do so, we first need to translate BoardModel into the Node module. Luckily,


    there’s not much to change. We have updated the inheritance code from it


    (since it is not valid in Node) and assigned the constructor to the exports


    variable. Listing 10-15 shows the result. I’m stripping the old function’s code


    (when I pasted the entire source, it was three pages long; and if you’re like
    me,


    then you’re not patient enough to read three pages of code). If you want to look


    at the full source code for this class, you can either download the code for this'
