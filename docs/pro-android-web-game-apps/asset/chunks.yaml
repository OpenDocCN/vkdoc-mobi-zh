    \ John 的代码一无所知，他创建了自己的同名变量，但他用它来跟踪 `mousedown` 事件的数量。假设你想要同时使用这两个框架。如果这些变量冲突了怎么办？显然，如果我们不特别小心，我们将面临一个需要清理的大烂摊子。很可能，其中一个框架会出错，或者两者都会出错。\n\
    \n在研究 Node 如何解决这个问题之前，让我们先尝试思考一下解决方案。在本书的前面部分，我们将程序的功能分解为类，并将每个类放入一个单独的文件中。这种方法对于应用程序来说效果很好，但在涉及可分发的\
    \ API 时就失效了。所有问题的根本原因是 JavaScript 的全局作用域，它对所有文件都是相同的。任何对全局作用域的粗心使用都会引入错误。\n\n\
