- fmt: "Rebuild and run the application once again. You should now see that the status\
    \ bar is gone and `Four Balls` uses every available screen pixel. Figure 15-8\
    \ shows the difference between the previous version of application and the new\
    \ one----without the status bar.\n\n![](index-584_1.jpg)  \n![](index-584_2.jpg)\n\
    \n## CHAPTER 15: Building Native Applications\n\n**Figure 15-8.** *The game with\
    \ a status bar (left) vs. the game without a status bar (right)*\n\n### Using\
    \ Native APIs\n\nTo complete our introduction to Cordova, let’s try one more very\
    \ important feature----using native device resources that are not available to\
    \ the browser. Regular Java applications can access them directly via the Java\
    \ API. JavaScript doesn’t have direct access to such API, so Cordova’s job is\
    \ to provide a layer between the two. From a high level, the architecture looks\
    \ like Figure 15-9.\n\n**Figure 15-9.** *Communication between native resources\
    \ and the HTML page*\n\nIn other words, for every piece of Java API that you want\
    \ to use, Cordova must provide a `Java to JavaScript adapter` and explicitly expose\
    \ the API to the web page. That’s why Cordova supports a system of plug-ins. If\
    \ you miss a `native` feature, you can always write a plug-in yourself without\
    \ waiting for developers to implement it in the core framework.\n\nThe basic template\
    \ that we’ll use in this section is somewhat different (see Listing 15-8).\n\n\
    **CHAPTER 15: Building Native Applications**  \n**585**\n\n**Listing 15-8.** *Basic\
    \ Template for Working with Native Resources*\n\n```html\n<!DOCTYPE html>\n<html\
    \ lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\"\n\
    content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0,\nuser-scalable=no,\
    \ target-densitydpi=device-dpi\"/>\n<style>\nhtml, body {\noverflow: hidden;\n\
    width: 100%;\nheight: 100%;\nmargin:0;\npadding:0;\nborder: 0;\n}\n#main {\nfont-size:\
    \ 20px;\n}\n</style>\n<script src=\"cordova-2.0.0.js\"></script>\n<script>\ndocument.addEventListener(\"\
    deviceready\", onDeviceReady, false);\nfunction onDeviceReady() {\n/* code here\
    \ */\n}\n</script>\n</head>\n<body>\n<div id=\"main\">\nCordova is working!\n\
    </div>\n</body>\n</html>\n```\n\nFirst, we need to load the `cordova-2.0.0.js`\
    \ file that provides the native access facilities. Next, the `main` entry point\
    \ has changed. Usually, we use the body `onload` event to insert the JavaScript\
    \ starting code. With the Cordova app, the page can load faster than Cordova is\
    \ ready to provide its facilities, and as a result, you can’t call `native` functions\
    \ reliably from body `onload`. Cordova provides its own event that indicates that\
    \ the native functions can be used, and Listing 15-8 illustrates how it works.\
    \ When you receive the `deviceready` event, you can safely call any Cordova code.\
    \ Note that you don’t have to change anything in your app if you don’t use native\
    \ calls.\n\nTo test how it works, we will read the entire device phonebook and\
    \ display every contact in the list. To do it, we first need to specify in `AndroidManifest.xml`\
    \ that the application now needs one extra permission----the permission to read\
    \ from the contact database. Add the following lines to the manifest, right after\
    \ the `INTERNET` permission (see Listing 15-9). The second permission, `ACCESS_NETWORK_STATE`,\
    \ is required by Cordova itself.\n\n**Listing 15-9.** *Requesting Permission to\
    \ Read Contacts*\n\n```xml\n<supports-screens\nandroid:largeScreens=\"true\"\n\
    android:normalScreens=\"true\"\nandroid:smallScreens=\"true\"\nandroid:resizeable=\"\
    true\"\nandroid:anyDensity=\"true\"\n/>\n<!-- Uncomment this line if your page\
    \ will interact with the server -->\n<uses-permission android:name=\"android.permission.INTERNET\"\
    \ />\n<!-- Used to read from the contacts database -->\n<uses-permission android:name=\"\
    android.permission.READ_CONTACTS\" />\n<!-- Required by Cordova -->\n<uses-permission\
    \ android:name=\"android.permission.ACCESS_NETWORK_STATE\" />\n<application android:label=\"\
    @string/app_name\"\nandroid:icon=\"@drawable/icon\">\n<activity android:name=\"\
    FourBalls\"\n...\n```\n\nNow, update the `index.html` file with the code in Listing\
    \ 15-10.\n\n**Listing 15-10.** *Reading Phonebook Contacts from JavaScript*\n\n\
    ```javascript\n<script>\n```"
