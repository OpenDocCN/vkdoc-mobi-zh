     Sprite sheets, animations, and tile maps----including isometric


    maps


     Collision detection and ‘‘gravity’’


     Input handling and audio playback


    This is a short list. The full set of features is described in the official


    documentation [at http://craftyjs.com/api/.](http://craftyjs.com/api/) Crafty
    also supports modules, so if you are missing anything, you can look at the ‘ components’
