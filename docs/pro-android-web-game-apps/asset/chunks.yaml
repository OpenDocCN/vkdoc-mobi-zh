    \nexports = module.exports = BoardModel;\n```\n\n现在让我们更新主脚本以显示棋盘，而不是\"Hello World\"\
    。清单 10-16 展示了如何实现这一点。\n\n**清单 10-16.** *在网站主页显示棋盘*\n\n```\nvar app = require('express').createServer();\n\
    var BoardModel = require(\"./BoardModel\");\nvar board = new BoardModel();\n\n\
