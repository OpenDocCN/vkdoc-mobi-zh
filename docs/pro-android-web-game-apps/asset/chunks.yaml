- fmt: '# CHAPTER 1: Getting Started


    The choice between the two usually comes down to one’s own preference. There is
    an army of Eclipse fans and a similar army of IntelliJ fans, which tend to start
    a holy war each time one side releases a new version. If you’re in doubt, try
    both and choose the IDE you like best. Next, I give you a brief look at these
    IDEs and demonstrate how they work by making a Hello World project in each of
    them.


    ## IntelliJ Idea


    Download the installer from the official site ([www.jetbrains.com/idea/download/index.html](http://www.jetbrains.com/idea/download/index.html))
    and launch it. Follow the regular installation process (there are no odd questions
    here; IntelliJ Idea only wants to know an installation folder location).


    After the installation has completed and you launch IntelliJ Idea for the first
    time, you will need to choose which plug-ins to enable. If you plan to use IntelliJ
    as your IDE, it is better to review the lists and select only the plug-ins that
    you will really use. A smaller number of enabled plug-ins improves the startup
    time. Otherwise, just leave all the checkmarks with default values. Finally, you
    see the Welcome screen shown in Figure 1-1; it has several rows of buttons. Click
    `Create New Project` to see the New Project window, and choose `Create Project
    from Scratch`.


    **Figure 1-1.** *IntelliJ Idea welcome screen*


    ![](index-16_1.jpg)


    IntelliJ Idea treats a “project” as a set of one or more modules. For example,
    if you write a chat application, the “chat application” as a whole is the project.
    The modules of this project could be Server, Android Client, Desktop Client, and
