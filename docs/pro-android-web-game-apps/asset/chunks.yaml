    Degrees are the usual metric for everyday life: a right angle is 90 degrees, the


    Earth’s axial tilt is around 23.4 degrees, and so on. Radians are mostly used
    in


    math and … the canvas API. A full circle is 360 degrees or 2*pi (2 *π*) radians,
    so one radian is about 57 degrees. It doesn’t make much sense to convert every


    angle with a calculator to radians if you are used to degrees, or even write a


    code that does so. It is best to get used to radians.


    Radians expressed as plain numbers don’t make much sense; they are almost


    always shown with pi ( *π*) number. A full circle is 2 *π* radians; a right angle
    is *π*/2; 45 degrees is *π*/8, and so forth. In JavaScript, there’s a handy constant
    defined in Math class: Math.PI. Use it whenever you need to set the angle in radians.


    Figure 2-12 illustrates how the arc is drawn and how the angles are expressed
    in


    radians.


