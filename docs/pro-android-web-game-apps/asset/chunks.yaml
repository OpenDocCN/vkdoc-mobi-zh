    \n**第 225 页**\n\n**注意：** 在数组中设置瓦片索引时应格外小心。如果瓦片索引超过了瓦片总数，Canvas API 不会静默忽略复制超出图像边界的像素的尝试。这将抛出异常，导致瓦片地图无法正确渲染。\n\
    \n让我们添加一个功能来在屏幕上移动地图，使我们的应用程序更具交互性。代码清单 6-5 展示了相关代码。\n\n**代码清单 6-5.** *移动地图*\n\
