  trans: '

    假设你想绘制一条从 `(1, 0)` 到 `(1, 4)` 的细垂直线。你希望这条线宽度为一个像素，且颜色为黑色。上下文会将其视为一条位于屏幕**第一与第二像素之间**的线。图
    2-4 展示了 2D API 如何处理此类调用。


    **图 2-4.** 上下文将整数坐标的线视为位于像素之间。


    线的宽度为一个像素，因此上下文应绘制左侧像素的一半和右侧像素的一半，以凑成一个完整像素。显然，设备显示器无法完成此任务，因为像素是原子级元素——它无法同时被涂上两种不同颜色。因此，这条线会同时覆盖左右两个像素。为了补偿线宽的增大，上下文会将两个像素都渲染为半透明，从而使线的颜色看起来更浅。图
    2-5 展示了这条一个像素宽的线位于实际物理像素边界上的模型。


    ![](img/index-56_1.jpg)


    **图 2-5.** 线的宽度为一个像素，因为它跨越了两个像素的边界，所以各覆盖了它们的一半。


    上下文的工作方式就像一位油漆工，桶里恰好有足够覆盖一面墙的油漆。突然，他发现有**两面**墙需要粉刷。他决定用水稀释油漆来完成这项工作（没有额外资金再买一桶油漆——生活就是这样）。现在两面墙都有了新颜色，但由于油漆层太薄，你仍能透过它看到旧墙纸。这就是上下文绘制线的方式：描边颜色被“分配”给左侧和右侧的像素。用户最终看到的颜色不会是黑色，而是浅灰色。最终颜色还取决于背景色，因为背景色会透过半透明的线显现出来。此外，最终线的宽度会是两个像素，因为左右两个像素都被原始线“覆盖”了。图
    2-6 展示了此类调用在 2D 上下文中的结果。白色虚线是原本想要绘制的线，它位于像素之间。最终绘制的线以 50%透明度呈现；因此，背景会影响线的最终颜色。线的上方为深红色，下方为深灰色。


    ![](img/index-57_1.jpg)


    **图 2-6.** 使用整数坐标绘制一个像素宽的垂直线所得结果


    要绘制一个像素宽的黑色线，你必须设置小数坐标，即额外增加半个像素。如果一条从 `(1.5, 0)` 到 `(1.5, 4)` 的线穿过每个像素的中心，那么它的宽度正好为一个像素；并且由于它没有重叠任何额外空间，所以呈现纯粹的黑色。


    如果你想要一条两个像素宽的线呢？正确。你必须切换回整数坐标，否则它实际上会覆盖三个像素——中间一个实心像素，两侧各一个半透明像素。


    如此处理坐标可能有些令人困惑，但一旦你开始处理更复杂的形状，这就变得完全合理了。只要图形渲染得当且对用户来说看起来自然，你就不必过分关注构成图形的精确像素。平滑的颜色和柔和的边缘看起来自然；而像素非黑即白的锯齿状“阶梯”则不然。图
    2-7 展示了这两种情况的实际差异。上方一行显示了线和圆的锯齿版本（正常大小及放大片段），而下方一行则显示了与 2D 上下文绘制时相同的经过抗锯齿处理的图形。如你所见，下方的图像看起来美观得多。


    ![](img/index-58_1.jpg)


    **图 2-7.** 锯齿图形与平滑图形的对比

