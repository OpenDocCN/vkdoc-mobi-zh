- fmt: "Let’s add another input parameter. The type is `vec4`, since a color has four\
    \ components, and the storage qualifier is `varying` since the color changes from\
    \ vertex to vertex. The updated GLSL code for the shader is in Listing 9-14.\n\
    \n**Listing 9-14.** *The Fragment Shader That Supports Colors*\n\n```\nprecision\
    \ mediump float;\nvarying vec4 vColor;\nvoid main(void) {\n    gl_FragColor =\
    \ vColor;\n};\n```\n\nAs you see, the fragment shader does not do any kind of\
    \ processing. It simply assigns the received color to `gl_FragColor`; however,\
    \ this is enough to paint our rectangle.\n\nThe vertex shader in this case acts\
    \ like the entry point for the parameter: it cannot do anything with the information\
    \ about the vertex color since it is not its job to set the color of the pixel.\
    \ It silently passes the value to the fragment shader. To do this, create a new\
    \ attribute to receive the per-vertex values from the buffers. Then create a `varying`\
    \ to pass the data to the fragment shader. Finally, assign the value of the attribute\
    \ to `varying`. The color information ends up in the fragment shader. The code\
    \ for the vertex shader is shown in Listing 9-15.\n\n**Listing 9-15.** *The Vertex\
    \ Shader That Passes the Color Data to the Fragment Shader*\n\n```\nattribute\
    \ vec3 aPos;\nattribute vec4 aCol;\nuniform mat4 uMVMatrix;\nuniform mat4 uPMatrix;\n\
    varying vec4 vColor;\nvoid main(void) {\n    gl_Position = uPMatrix * uMVMatrix\
    \ * vec4(aPos, 1.0);\n    vColor = aCol;\n}\n```\n\nThis way, the color is available\
    \ to the fragment shader too. Think of `varying` variables as the output from\
    \ the vertex shader and, at the same time, the input of the fragment shader. Look\
    \ at Figure 9-4 once again if you are not quite comfortable with this principle.\n\
    \n![](index-388_1.jpg)\n\n## CHAPTER 9: Using WebGL\n\n### How Varyings Work\n\
    \nWhy make useless assignments to simply pass values within the same program?\
    \ Good question. The reason for this sort of complexity is that the fragment shader\
    \ doesn’t have access to the vertex data.\n\nThe fragment shader works with pixels,\
    \ and a pixel belongs to the whole face——not a single vertex. If all three vertices\
    \ of the face are the same color, every resulting pixel should be of that color\
    \ too. But what if vertices hold different colors? The resulting color of the\
    \ pixel depends on how close it is to each of the vertices. Hence the name `'varying'`——the\
    \ exact value that the fragment shader receives depends on the position of the\
    \ pixel within the face. Everything that you save in the `varying` variable in\
    \ the vertex shader is used as the value for interpolation. This concept works\
    \ not only with colors, but with other per-vertex values too: normals, texture\
    \ coordinates, and so forth.\n\nTo better understand this concept, look at Figure\
    \ 9-7, which shows how WebGL treats the values of `varying` variables. Each vertex\
    \ is assigned a color: pure red, pure green, and pure blue.\n\n**Figure 9-7.**\
    \ *The result of linear interpolation between three colors*\n\nThe color of each\
    \ pixel is the result of linear interpolation of per-vertex values. The color\
    \ in the middle is gray because it is a mix of all three colors: red, green, and\
    \ blue in the same proportion.\n\n### Passing Color Data to the Vertex Shader\n\
    \nThe final part is to update the main script. We need to create an extra buffer,\
    \ fill it with data, register a new variable location in the shader program, and\
    \ associate the new buffer with it. The code that does this doesn’t need any further\
    \ explanation.\n\nUse Listing 9-16 for reference, or use the full version that\
    \ comes with the source code for this chapter, the file named `03.color.html`.\
    \ The code in Listing 9-16 is trimmed to show only the changed lines.\n\n**Listing\
    \ 9-16.** *The Updated Version of the Demo That Uses Textures*\n\n```\nfunction\
    \ initShaders() {\n    // The shaders are initialized as usual, see Listing 9-12\
    \ for reference\n    vertexPositionAttribute = gl.getAttribLocation(shaderProgram,\
    \ \"aPos\");\n    gl.enableVertexAttribArray(vertexPositionAttribute);\n    vertexColorAttribute\
    \ = gl.getAttribLocation(shaderProgram, \"aCol\");\n    gl.enableVertexAttribArray(vertexColorAttribute);\n\
    ```"
