- fmt: "```javascript\nconsole.log(\"Got error \" + xhr.status + \" saying [\" + xhr.statusText\
    \ + \"]\");\n```\n\nThis version of the code is somewhat better. Before reporting\
    \ that the request was successful, it checks the HTTP status code returned by\
    \ server. `200` is the code for OK — the normal successful response. This way,\
    \ the XHR call treats all server-side problems as errors, so they won’t go completely\
    \ unnoticed. When the code from Listing 11-4 is launched with the default server\
    \ that doesn’t know how to treat the request for `/no.json`, for example, it prints\
    \ the following message to the console:\n\n`http://localhost/:27 Got error 404\
    \ saying [Not Found]`\n\nThis message has enough detail to describe and diagnose\
    \ the problem: the server sent the response code `404`, which indicates that the\
    \ given resource could not be found. Sometimes, however, this check is not enough.\
    \ If there’s a networking problem or if the user aborted the request by calling\
    \ `xhr.abort()`, the status line is less informative:\n\n`Got error 0 saying []`\n\
    \nIf the server had no chance to process the request, or even see it, both the\
    \ HTTP status code and the status text are undefined, making it impossible to\
    \ tell what exactly went wrong. There is no way to diagnose the root cause of\
    \ a problem programmatically from JavaScript. XHR API allows you to distinguish\
    \ between two types of errors: server error and any other error. Obviously, ‘any\
    \ other error’ is too broad a description to rely on — loss of network connection,\
    \ failed DNS lookup, too many redirects or programmatic aborts — any of these\
    \ and many other problems fall into the same category.\n\nThe chance of seeing\
    \ one of these problems is significantly lower than the usual `404` or `503` status\
    \ codes; if the browser could load the web page itself, it means that the web\
    \ server was available at that time and the bandwidth was strong enough for initial\
    \ content. Usually it means that Ajax requests will complete fine too. The chance\
    \ is slightly higher for mobile games though, mainly because of the quality of\
    \ mobile internet that highly depends on the environment (if the user runs down\
    \ to his concrete cellar, he’ll probably lose the signal).\n\n## Hint\n\nThere\
    \ are several ways to check how your application will work in low connectivity.\
    \ The simplest way to test the networking problems is to abort your requests randomly.\
    \ The second technique is to abort the connection from the server-side without\
    \ writing back any data, as follows:\n\n```javascript\napp.get(\"/no.json\", function(req,\
    \ res) {\n    req.socket.end();\n    req.socket.destroy();\n});\n```\n\nIn more\
    \ sophisticated cases (for example, when you want to test low-bandwidth connections,\
    \ packet loss, etc.), you should use special network emulation software.\n\n##\
    \ XMLHttpRequest Level 2\n\nThe new Level 2 specification has added some missing\
    \ features to XHR objects, including better event handlers, support for sending\
    \ and receiving binary data, support for file uploads, and tracking upload progress,\
    \ among others. In this section, we compare the old API with Level 2 by using\
    \ two examples: a regular HTTP request and a binary request. Both of these tasks\
    \ are extremely important for game development. Even though both tasks are doable\
    \ with the old API, Level 2 looks more convenient and doesn’t require any hacks.\n\
    \nLet’s look at the code, shown in Listing 11-5, of the same Hello World application\
    \ — but updated to use some features of the new version of XHR.\n\n**Listing 11-5.**\
    \ The Level 2 Version of the Hello World Request\n\n```javascript\nfunction init()\
    \ {\n    var xhr = new XMLHttpRequest();\n\n    xhr.onload = function(e) {\n \
    \       if (xhr.status == 200) {\n            console.log(\"Got response saying\
    \ [\" + xhr.responseText + \"]\");\n        } else {\n            console.log(\"\
    Got server error \" + xhr.status +\n                \" saying [\" + xhr.statusText\
    \ + \"]\");\n        }\n    };\n\n    xhr.onerror = function(e) {\n        console.log(\"\
    Got network error\");\n    };\n\n    xhr.onabort = function(e) {\n        console.log(\"\
    Request is explicitly aborted\");\n    };\n\n    xhr.open(\"GET\", \"data.json\"\
    );\n    xhr.send();\n}\n```"
