    \ is called bubbling — an event like air bubbles in a glass of water, which move\
    \ from the bottom to the surface. But instead of water layers, the event moves\
    \ through the levels of DOM hierarchy: from one level to another until it reaches\
    \ the top. Then the browser performs a “default action” for that event."
