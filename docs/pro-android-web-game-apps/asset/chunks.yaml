    ## CHAPTER 8: 3D in a Browser


    ### Summary


    This chapter was devoted to understanding the basics behind 3D engines. Calculating
    the position of vertices and applying perspective is just a first step that a
    real engine does for every frame in a game. The other steps might be more complex
    — for example, dropping polygons that are not visible to save resources, applying
    texture to the faces of the model, calculating the effects of lighting, and many
    others. 3D engines usually have more involved mathematics than 2D engines, and
    they constantly evolve. Developers and mathematicians work to bring better algorithms
    and make the rendered picture even more realistic.


    Even the most complex 3D math starts with the position of vertices in the world,
    and calculating the transformations of the model. If you had never worked with
    3D graphics before, then now you are one of very few 3D developers who actually
    understands what he is doing.


    In this chapter, we built the simplest possible 3D demo — a rotating cube. During
    the course, we learned several important aspects:


    - The in-memory representation of the model

    - How to use matrices to move, rotate, or scale models

    - How to render a wireframe

    - The projections and how to implement perspective on the scene


    Now we are ready to explore a more advanced topic: WebGL API.


    ## Chapter


    ### Using WebGL


    WebGL is a very promising initiative that has already conquered most of the desktop
    browser world. WebGL is an API that exposes the resources of the graphics card
    to your JavaScript application. With WebGL, you can create a 3D game and run it
    in the browser without having to implement all the 3D math yourself, as we did
    in Chapter 8. WebGL is based on `OpenGL ES 2.0` (OpenGL for Embedded Systems,
    a subset of the `OpenGL` API suitable for mobile devices).


    WebGL is only making its first steps in mobile web. It is not yet widely supported
    by Android devices. In fact, only Firefox Mobile supports this important API for
    game developers. The other early birds are Sony Ericsson Xperia phones — they
    also support WebGL in the native browser. At the time of writing, every major
    desktop browser except for IE supports WebGL.


    This chapter is devoted to WebGL. This technology is not yet ready for the mass
    market of Android web games, but it is getting more and more popular among game
    developers. The goal of this chapter is to introduce you to this bleeding-edge
    technology.'
