    \ should not be propagated. Modify the code for `RoundStateButton`, as in Listing\
    \ 7-50.\n\n**Listing 7-50.** *Stopping the Event Once the User Clicks the Button*\n\
    \n```\n_p._onUpEvent = function(e) {\n  this.nextFrame();\n  e.stopped = true;\n\
    };\n```\n\nThe final part of the solution is to update `LayerManager`—the class\
    \ that decides if the event should move to the next layer. The code modifications\
    \ are quite simple. They are shown in Listing 7-51.\n\n**Listing 7-51.** *Stopping\
    \ the Events in LayerManager*\n\n```\n_p._onUpEvent = function(e) {\n  for (var\
    \ i = this._layers.length - 1; i >= 0; i--) {\n    this._layers[i].emit(\"up\"\
    , e);\n    if (e.stopped)\n      return;\n  }\n};\n```\n\n**NOTE:** There is one\
    \ more way to mark an event as stopped: the return value from the event handler.\
    \ Usually, the returned value is `false`. If one of the handlers returns `false`,\
    \ the next layer will not receive the events.\n\n![](index-335_1.jpg)\n\nCHAPTER\
    \ 7: Making an Isometric Engine **331**\n\nRun the game once again—and enjoy your\
    \ fully controllable world! Figure 7-25 shows a screenshot of the game engine\
    \ running on a smartphone. You can navigate through the world, change the terrain,\
    \ and add and remove objects. These simple actions form the basics for the wide\
    \ variety of games that you can now build by yourself.\n\n**Figure 7-25.** *The\
    \ finished engine running on a smartphone*\n\nThe code is available in the `v1.0`\
    \ folder. Take it, and make a real game out of it!\n\nThe best thing that you\
    \ can do now is think about making your own isometric game. For example, add \"\
    resources\" to the game that replenish over time. Make controls to select the\
    \ type of structure to build and to allow construction only when there are enough\
    \ resources. Add animated units using what you learned in Chapter 4, build a gameplay\
    \ out of it, and assemble a game that you will enjoy.\n\n**Summary**\n\nCongratulations!\
    \ You’ve done a great job learning how isometric engines work! This was one of\
    \ the longest chapters in the entire book, and we learned many things during the\
    \ course:\n\n- A more in-depth insight into building isometric engines\n- Using\
    \ decorated tiles—working with resources from actual game artist Sergey Lesiuk\n\
    - Implementing a layer for an isometric terrain\n- Using offscreen buffers to\
    \ speed up the rendering\n\n- Using object layers—arranging game objects into\
    \ manageable data structures\n- Implementing clusters—a way to limit the set of\
    \ objects that rendering code has to deal with\n- Implementing dirty rectangles—the\
    \ strategy that allows us to mark certain areas of the screen as \"dirty\" to\
    \ repaint only those parts (this is an invaluable optimization for games with\
    \ only a few moving entities)\n- Building the user interface—a simple control\
    \ over the game state\n- Implementing `LayerManager`—a way to work with multiple\
    \ layers as a single object\n- Reacting to user input—propagation events and stopping\
    \ propagation\n\nNow that you have an isometric engine at your disposal, the next\
    \ step is to make an actual game with it! Don’t hesitate to try something out.\
