    methods that are useless for a building. The same happens if you try to add the


    ‘ Fighting Miner’’ or the ‘ Flying Mechanic.’’ In fact, this issue is a typical
    problem with inheritance. Multiple interchangeable qualities that do not depend
    on each


    other is the worst-case scenario for inheritance.


    The alternative is to use the ‘ composition’’ approach. Extract specific qualities


    like ‘ Fighter,’’ ‘ Healer,’’ ‘ Builder,’’ or ‘‘Flyer’’ into separate objects,
    as shown in Figure 14-5\. Crafty uses the term components to describe such qualities.
    Each


    component has methods and properties that are specific to the quality that it


    describes. For example, a Flyer can have properties like pitch, yaw, and


    flightSpeed, and have methods like doBarrelRoll() or land(). Whereas a


    Mechanic would have sparePartsLeft and startFixing().


    ![](index-548_1.jpg)


    ![](index-548_2.jpg)


    CHAPTER 14: JavaScript Game Engines


    **Figure 14-5.** *The “qualities” or “components” of the game entities*


    The components are then ‘ injected’’ into the objects, so that they describe the


    exact game unit that you want. Figure 14-6 shows some possible sets of


    qualities for units.


    **Figure 14-6.** *Combining components to describe the qualities of the unit*


    By using this approach, the Flying Mechanic is composed of three components:


    destroyable (since someone can shoot it), flying (because it can fly and has


    parameters like flight speed and flight distance), and mechanic (meaning that
    it


    can fix broken units). Similarly, the Healing Building and the Aggressive Miner


    are also composed of three components.


    In JavaScript, the implementation of such a system is very straightforward.


    Essentially, the component is a collection of functions and variables that you


    have to add to the object in order to describe certain qualities. For example,


    Flyer and Mechanic components could look as follows :


    var Flyer = {


    pitch: 0,


    yaw: 0.31,


    doBarrelRoll: function() {


    // code goes here


    }


    }


    var Mechanic = {


    sparePartsLeft: 10.


    startFixing: function() {


    // code goes here


    CHAPTER 14: JavaScript Game Engines


    **549


    }


    }


    If we need to create a Flying Mechanic unit, we have to combine the code from


    both components into a single object so that result looks as follows:


    var FlyingMechanic = {


    pitch: 0,


    yaw: 0.31,


    sparePartsLeft: 10,


    startFixing: function() {


    // code goes here


    },


    doBarrelRoll: function() {


    // code goes here


    }


    }


    Combining components programmatically is quite easy too. A sample


    implementation is presented in Listing 14-1\. Note that this is not a Crafty


    implementation, but rather a simplified model that shows how this system


    works.


    **Listing 14-1.** *Combining Components Programmatically*


    var flyingMechanic = {};'
  trans: "\n# 实体组件系统\n\n让我们来思考一个典型的游戏，其中包含许多具有不同属性的对象。策略游戏就是一个很好的例子。游戏实体主要分为两大类：由工程师建造并固定在地面上的建筑物，以及可以移动、射击、飞行、治疗其他单位、携带乘客并执行其他有用功能的单位。现在，请思考一下这类游戏的类层次结构。通用的“游戏实体”应位于层次结构的顶层。接着，我们有建筑和单位两种实体。每个单位又可以飞行或步行、造成伤害或进行治疗、运输或被运输，甚至同时具备多种功能。如果继续这样构建类树，你很快就会得到一个相当复杂且难以管理的架构。图\
    \ 14-4 展示了这样一个重量级层次结构的示例。\n\n![](img/index-547_1.jpg)\n\n**图 14-4.** *游戏实体继承的一个典型问题*\n\
    \n即使你设法将实体拆分到树的分支中，你很快也会面临一个问题：如何添加那些必须同时属于两个分支的新实体。如果有一个可以治疗附近单位的建筑呢？一方面，它属于“建筑”层次结构，但另一方面，它必须继承自\
    \ `Healer`。然而，`Healer` 属于“单位”分支。这意味着它具有许多对建筑来说无用的方法。当你尝试添加“战斗矿工”或“飞行机械师”时，同样的情况也会发生。事实上，这是继承中的一个典型问题。多个独立且可互换的属性是继承最不擅长处理的情况。\n\
    \n另一种方法是使用“组合”方法。将像 `Fighter`、`Healer`、`Builder` 或 `Flyer` 这样的特定属性提取到单独的对象中，如图\
    \ 14-5 所示。Crafty 使用术语“组件”来描述这些属性。每个组件都包含与其所描述属性特定的方法和属性。例如，一个 `Flyer` 可以拥有 `pitch`、`yaw`\
    \ 和 `flightSpeed` 等属性，以及 `doBarrelRoll()` 或 `land()` 等方法。而一个 `Mechanic` 则会有 `sparePartsLeft`\
    \ 和 `startFixing()`。\n\n![](img/index-548_1.jpg)\n![](img/index-548_2.jpg)\n\n\
    **图 14-5.** *游戏实体的“属性”或“组件”*\n\n然后，这些组件被“注入”到对象中，从而描述出你想要的确切游戏单位。图 14-6 展示了一些可能的单位属性组合。\n\
    \n**图 14-6.** *组合组件以描述单位的属性*\n\n通过使用这种方法，飞行机械师由三个组件组成：`destroyable`（因为有人可以射击它）、`flying`（因为它可以飞行，并且拥有飞行速度和飞行距离等参数）和\
    \ `mechanic`（意味着它可以修理损坏的单位）。类似地，治疗建筑和攻击型矿工也由三个组件组成。\n\n在 JavaScript 中，这种系统的实现非常直接。本质上，组件是为了描述特定属性而必须添加到对象中的函数和变量的集合。例如，`Flyer`\
    \ 和 `Mechanic` 组件可能如下所示：\n\n```\nvar Flyer = {\n  pitch: 0,\n  yaw: 0.31,\n  doBarrelRoll:\
    \ function() {\n    // code goes here\n  }\n}\n\nvar Mechanic = {\n  sparePartsLeft:\
    \ 10,\n  startFixing: function() {\n    // code goes here\n  }\n}\n```\n\n如果我们需要创建一个飞行机械师单位，我们必须将两个组件的代码合并到一个对象中，使结果如下所示：\n\
    \n```\nvar FlyingMechanic = {\n  pitch: 0,\n  yaw: 0.31,\n  sparePartsLeft: 10,\n\
    \  startFixing: function() {\n    // code goes here\n  },\n  doBarrelRoll: function()\
    \ {\n    // code goes here\n  }\n}\n```\n\n程序化地组合组件也非常容易。清单 14-1 给出了一个示例实现。请注意，这不是一个\
    \ Crafty 的实现，而是一个展示该系统工作原理的简化模型。\n\n**清单 14-1.** *程序化组合组件*\n\n```\nvar flyingMechanic\
    \ = {};\n```\n"
- fmt: "```javascript\n[Flying, Mechanic].forEach(function(component) {\n  for (var\
    \ prop in component) {\n    flyingMechanic[prop] = component[prop];\n  }\n});\n\
    ```\n\nThis code simply copies the components’ properties and functions to the\
    \ `flyingMechanic` object. The result will be exactly what we expect: an object\
    \ that combines the qualities of a flying unit and a mechanic.\n\nThe old OOP\
    \ principle expresses this way of organizing objects: “favor composition over\
    \ inheritance.” The practical implementation of this rule in game development\
    \ is often called the Entity Component System. A game entity is initially empty.\
    \ Then it is enriched with components, each one describing certain qualities of\
    \ that entity. Each component adds new parameters and methods to the object. This\
    \ is the main idea of Crafty, and in a minute, we will see how the code looks.\n\
    \n## CHAPTER 14: JavaScript Game Engines\n\n**NOTE:** There is another name for\
    \ Entity Component System that is used more widely: mixins. The name comes from\
    \ a type of ice cream that can be customized with tasty add-ons like raisins,\
    \ nuts, or candies. You can find a more in-depth review of mixins (in programming,\
    \ not ice cream) in a great blog post called “A Fresh Look at JavaScript Mixins,”\
    \ available at [http://bit.ly/lZVgQs](http://bit.ly/lZVgQs).\n\nNow that we know\
    \ Crafty’s core ideology, it is time to write a real game with it!\n\n### Crafty\
    \ Hello World\n\nStart by downloading the latest version of Crafty (it is version\
    \ 0.4.9 at the time of writing) from the official site ([http://craftyjs.com](http://craftyjs.com)).\
    \ A game made with Crafty typically starts with some small initialization code,\
    \ such as that in Listing 14-2.\n\n**Listing 14-2.** *Crafty Initialization*\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\"\
    \ />\n<meta name=\"viewport\"\ncontent=\"width=device-width, initial-scale=1.0,\
    \ maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi\"/>\n<style>\n\
    html, body {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\npadding:0;\n\
    border: 0;\n}\n</style>\n<script src=\"js/crafty.js\"></script>\n<script>\nwindow.onload\
    \ = function() {\n// Init crafty in full screen\nCrafty.init();\n// Init canvas\n\
    Crafty.canvas.init();\n// Rest of the game code goes here\n};\n</script>\n</head>\n\
    <body>\n</body>\n</html>\n```\n\nCrafty does not need any HTML elements to get\
    \ started: it creates the required DOM elements itself. Moreover, Crafty tries\
    \ to do its best to determine whether the user is running a desktop or mobile\
    \ browser. If the browser is mobile, Crafty makes the canvas element take up the\
    \ whole screen, listens to touch events for input, and adds an appropriate meta\
    \ attribute to set the properties of the viewport.\n\nThe next step is to define\
    \ one or more scenes. A scene is the game screen, like the loading screen, the\
    \ game board, the high score screen, and so forth. The Four Balls game from Chapter\
    \ 12 had two main states: “lobby” and “game”. Scenes in Crafty are a similar concept,\
    \ despite having a different name. The code in Listing 14-3 shows how to create\
    \ four scenes for a typical game workflow.\n\n**Listing 14-3.** *Setting the Scenes\
    \ of the Game: Loading, Game, Win, and GameOver*\n\n```javascript\nwindow.onload\
    \ = function() {\nCrafty.init();\nCrafty.canvas.init();\nCrafty.scene(\"loading\"\
    , function() {\n// Loading scene, show loading screen for example\n});\nCrafty.scene(\"\
    game\", function() {\n// Start of the scene\n}, function() {\n// End of the scene\n\
    } );\nCrafty.scene(\"win\", function() {\n// Win scene\n});\nCrafty.scene(\"gameover\"\
    , function() {\n// Gameover scene\n});\n// Start the \"loading\" scene\nCrafty.scene(\"\
    loading\");\n}\n```\n\n![Figure 14-7](index-552_1.jpg)\n\nThe game that we create\
    \ in this chapter follows a simple flow, shown in Figure 14-7.\n\n**Figure 14-7.**\
    \ *The flow of our example game*\n\nThe `Crafty.scene()` function either defines\
    \ or runs the scene. The two functions passed as parameters are intro (the code\
    \ that runs when the scene starts) and outro (the code that runs before the next\
    \ scene takes control). The first function is the “meat” of the game—it is the\
    \ place to show the visuals and run the logic."
