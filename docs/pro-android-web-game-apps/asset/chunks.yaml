- fmt: '# Graphical Libraries and Game Engines


    Much harder than they should be. Several graphical libraries make writing WebGL
    applications a real pleasure.


    Some graphical libraries are game-oriented, meaning that their focus is to solve
    typical game-development tasks. In Chapter 7, we created a set of classes to load
    the levels, draw isometric terrain, render objects, mark dirty rectangles, and
    so forth. In fact, we wrote a game-oriented library, ready for building games
    on top of it. Figure 14-2 shows the relation between graphical libraries and other
    components of the rendering system.


    **Figure 14-2.** *Graphical libraries are a set of tools that work on top of graphical
    APIs and provide typical solutions to typical graphics-related tasks.*


    The world is moving very fast, and it will not wait for you to make every tool
    by yourself. It is almost impossible to write a project without the help of the
    right tools. We’ve already used some of them throughout the pages of this book:
    `Node.js` and `Express` framework, `Socket.IO` and `Cordova`. Graphics are not
    different — if you know that there is a library that solves your problem, give
    it a shot before you invent your own wheel.


    ## Game Engines


    Game engines’ primary targets are games. Game engines solve a broad spectrum of
    problems specific to game development. They are much more complex than typical
    libraries and they are not limited to handling graphics.


    ![index-545_1.jpg](index-545_1.jpg)


    CHAPTER 14: JavaScript Game Engines **545


    Game engines usually provide the complete solution for building games, including
    components for physics, AI, sound, video playback, networking, social features,
    and level editors. Game engines can provide infrastructural solutions like chat
    rooms, high score tables, or social network integrations.


    A game engine is not only an API and not only a set of helper classes that a programmer
    uses to speed up development. It is a framework with its own architecture that
    helps the programmer build a well-thought-out application. If you want to get
    a feeling on how a big commercial game engine looks, try Unreal Engine ([www.unrealengine.com](http://www.unrealengine.com))
    or Unity3D ([http://unity3d.com](http://unity3d.com)).


    The relation between the game engine and the other layers of the system is shown
    in Figure 14-3.


    **Figure 14-3.** *Game engines provide complex solutions for game development;
    rendering is only a part of it.*


    **NOTE:** In this section, I am not advocating that you use (or not use) any sort
    of tools for your project. There are no silver bullets and no APIs that suit every
    case. Be pragmatic: think of what you will actually gain from the tool and what
    its tradeoffs are. Perhaps the API is designed for a version of Android more recent
    than the one you initially planned to support. Perhaps the tool is not free but
    requires some investment. Or perhaps it will save you half the development time
    and push your game to the market faster than the competition!


    CHAPTER 14: JavaScript Game Engines **Crafty


    `Crafty` ([http://craftyjs.com](http://craftyjs.com)) is a well-thought-out and
    lightweight 2D game engine. The core file is only 81K minified, yet it still supports
    many great features out of the box:


    - Custom event system

    - Sprite sheets, animations, and tile maps — including isometric maps

    - Collision detection and "gravity"

    - Input handling and audio playback


    This is a short list. The full set of features is described in the official documentation
    at [http://craftyjs.com/api/](http://craftyjs.com/api/). `Crafty` also supports
    modules, so if you are missing anything, you can look at the components page at
    [http://craftycomponents.com](http://craftycomponents.com).


    `Crafty` is built upon the idea of the "Entity Component Paradigm" (or Entity
    Component System) — a special way of treating game entities that perfectly fits
    game development. As the first step in our introduction to `Crafty`, let’s see
    how the entity component system is different from the traditional object-oriented
    approach, and what types of game-development problems you can solve with its help.'
