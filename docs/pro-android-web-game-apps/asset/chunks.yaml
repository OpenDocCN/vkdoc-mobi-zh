    # 第 15 章：构建原生应用程序


    它为第三方插件提供了一个平台，这是通过自定义功能扩展核心功能的标准方式。


    `Cordova` 并非只针对 Android 的项目；它也为 iOS、Symbian、Blackberry 及其他多个平台提供了类似的工具集。该项目的最终目标是让开发者能够将现有的
    HTML5 应用以原生应用的形式移植到不同的移动平台，通过应用商店进行分发，并访问设备特定的 API。这恰恰是我们所需要的。


    让我们从安装 `Cordova` 及其依赖项开始。


    ## 设置 Cordova


    `Cordova` 没有特殊的安装步骤——从官网 ([`phonegap.com`](http://phonegap.com)) 下载归档文件，然后解压出其中名为
    `lib/android` 的文件夹。无需设置任何环境变量之类的东西；只需记住解压的位置即可。


    ## 设置 Apache Ant


    Apache [Ant (http://ant.apache.org)](http://ant.apache.org) 是一个自动化构建系统，也是一种用于复杂构建脚本的基于
    XML 的语言。为了使用 Apache `Cordova` 并创建原生应用，我们首先需要安装 `Ant`。


    **注意：** 如果你使用的是 Mac，可能已经安装了 `Ant`。打开命令行并输入 `ant –version`。如果能看到版本号（比如 `1.8.2`），那么
    `Ant` 就已经准备好可以工作了；否则，请按照下面的描述进行安装。


    从官网 [`ant.apache.org/bindownload.cgi`](http://ant.apache.org/bindownload.cgi)
    下载最新版本的 `Ant` 发行版，并将归档文件的内容解压到你选择的文件夹中。创建环境变量 `ANT_HOME`，并将其指向你刚刚解压的文件夹。修改 `PATH`
    变量，将 `ANT_HOME\bin` 添加到路径中，这样命令行就能访问到可执行文件了。


    输入：

    ```

    ant –version

    ```


    你应该会看到包含构建信息（版本和日期）的输出：

    ```

    Apache Ant(TM) version 1.8.2 compiled on December 20 2010

    ```


    如果看到类似内容，说明 `Ant` 已成功安装在系统上。


    ## 构建原生应用


    此时，我们需要创建一个真正的原生 Android 项目。尽管我们需要编辑几个 Java 文件，但我们并不会进行大量的 Java 编程。如前所述，Android
    开发的细节不在本书的讨论范围之内。不过，如果你对我稍加信任，并跟着做下去，你就会对自己能做什么有一个清晰的认识。如果你更喜欢深入研究，可以随时查看官方的原生
    Android 开发 Hello World 教程 ([`developer.android.com/resources/tutorials/hello-world.html`](http://developer.android.com/resources/tutorials/hello-world.html))。


    ## 创建空白的 Android 项目


    第一步是创建一个空白的 Android 项目，并尝试在设备上启动它。导航到你想放置项目的文件夹，然后执行以下命令来显示可能的目标列表。目标就是你构建应用程序所基于的平台。


    ```

    android list targets

    ```


    可用的 Android 目标：

    ```

    id: 1 or "android-8"

    Name: Android 2.2

    Type: Platform

    API level: 8

    Revision: 3

    Skins: HVGA, QVGA, WQVGA400, WQVGA432, WVGA800 (default), WVGA854

    ABIs : armeabi


    id: 2 or "android-10"

    Name: Android 2.3.3

    Type: Platform

    API level: 10

    Revision: 2

    Skins: HVGA, QVGA, WQVGA400, WQVGA432, WVGA800 (default), WVGA854

    ABIs : armeabi

    …

    ```


    确定你计划支持的最低 Android 版本。我们将制作一个适用于 Android 2.2 及以上版本的应用。在我的电脑上，对应目标的 id 是 `1`。查看前面的输出：加粗的行显示了在哪里可以找到
    Android 版本及其 id。有了版本 id 后，在控制台中再执行一条命令：


    ```

    android create project --package com.juriy.fourballs --activity FourBalls --target
    1 --path fourballsnative

    ```


    这条命令会创建一个新的、空白的 Android 项目，可供编译。

