    **Figure 8-15.** *Different types of transformations written as matrices*


    ## Implementing Transformations


    Now we are fully prepared to draw the first version of our “cube-engine.” Let’s
    start with the good news. There’s a nice JavaScript library that does all the
    hard work of matrix manipulation for us; it’s called `gl-matrix` ([https://github.com/toji/gl-matrix](https://github.com/toji/gl-matrix)).
    Thanks to Brandon Jones, we have a wonderful and very fast tool at our disposal.
    Get a copy of the file called `gl-matrix.js` or `gl-matrix-min.js` and add it
    to your project. As the name suggests, the library is supposed to be used with
    WebGL, but since it implements the general matrix math that is the same all over
    the planet, we will use it for our project.


    The idea behind rendering the wireframe of the cube is to implement two simple
    steps:


    1. Transform each vertex the way we want (we want to rotate it).

    2. Draw a line between each of the two vertices that have an edge that joins them.


    The steps of this process are illustrated in Figure 8-16.


    **Figure 8-16.** *Steps to render the cube wireframe*


    Let’s start with the first part. We need to apply two transformations to our cube:
    rotation over the x axis and rotation over the y axis (feel free to apply any
    others if you want). `gl-matrix` has several convenient methods that hide the
    details of the matrices inside the library. The code that creates the transformation
    matrix is shown in Listing 8-3.


    **Listing 8-3.** *Creating the Transformation Matrix*


    ```

    var modelView = mat4.create();

    mat4.identity(modelView);

    mat4.rotateX(modelView, xRot);

    mat4.rotateY(modelView, yRot);

    ```


    In the first line, we create an empty matrix. The created matrix is filled with
    zeros, so we have to initialize it to the identity matrix before we can use it
    (otherwise it will transform any point to coordinates (0, 0, 0)). The third line
    adds the x axis rotation to our matrix. It is equivalent to first creating the
    rotation matrix, and then multiplying our identity matrix by it. The last line
    finishes the preparation, and we are now ready to spin the cube.


    **NOTE:** Why do we call the matrix variable a `modelView`? That’s the name that
    is used by OpenGL, and it means that the matrix represents… uh, the view of the
    model: all the transformations that are applied to the vertices to represent the
    model exactly as we want it. Why not just “matrix”? Because there are other matrices
    that are too involved in the process. For example, we will deal with the projection
    matrix that calculates the perspective later in this chapter.


    The process of “spinning” is very simple: we apply the matrix to every vertex
    one-by-one. We receive the transformed coordinates and project them to the camera
    surface by simply dropping the `z` coordinate. We also have to scale up the cube
    a little bit so that it fits the screen. The size of the cube is only 2 (from
    -1 to 1), and if we translate it straight to pixels, it will look tiny. Listing
    8-4 shows how to calculate the coordinates of a projection.


    **NOTE:** The size of two? Two what? Pixels, inches, meters, melons? In 3D graphics,
    it doesn’t matter. It is up to you to make some sort of convention in your project
    to define these numbers. The only rule is to keep your metric consistent over
    the project. If you decide that “two” means “two meters,” don’t forget it afterwards;
    otherwise, you may accidentally create a model of a rabbit that is the size of
    a small car. But that’s not a problem either: you can always scale it with the
    magic matrix to fit your scene. In this chapter, I use the word “units” when I
    need to refer to the sizes of a 3D scene.


    **Listing 8-4.** *Calculating the Coordinates for Projections of Each Point*'
