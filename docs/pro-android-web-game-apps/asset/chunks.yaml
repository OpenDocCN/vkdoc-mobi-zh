  trans: "\n# 第 4 章：动画与精灵\n\n上述方法的主要优势在于，设计单线程应用程序（每个 JavaScript 应用程序都是单线程的）比编写多线程代码要简单得多。像`Java`这样的语言充分利用了线程的强大功能，但代价是需要使用复杂且非常复杂的\
    \ API 来协调多个线程的执行。更糟的是，多线程环境中的错误可能会数月不被察觉，最终仅仅因为时间上的不凑巧而导致整个系统崩溃。对多线程代码进行单元测试是一种只有少数人才能掌握的“黑魔法”。\n\
    \n既然我们了解了这些陷阱，现在回到我们的问题：如何安排`repaint`函数在稍后执行？\n\n## 定时器\n\n如我所提，JavaScript 拥有所谓的定时器，这是一种用于安排任务稍后执行的内置机制。在本节中，我们将学习定时器如何帮助处理像动画这样的重复任务。\n\
    \n### 设置定时器\n\nJavaScript 有三个用于安排代码稍后执行的函数：`setInterval()`、`setTimeout()`和`requestAnimationFrame()`。这三个函数都做类似的事情——它们告诉浏览器：“嘿，请安排我给你的代码的执行。当你有空闲周期时，大约在\
    \ N 毫秒后调用我。”\n\nN 毫秒后，浏览器会将函数的执行排入队列，就像处理一个简单的事件监听器一样。如果队列为空，那你很幸运，你的函数会立即执行。如果队列中充满了其他任务——那么，无论你的函数多么重要，它都必须等待。\n\
    \n**注意：** 这是关于定时器的一个重要概念：它们并不能保证在你设定的时间精确触发。原因之一前面已经展示过；如果另一段代码正在执行，定时器就必须等待轮到它。即使在没有任何事件和用户活动的完全静止的页面中，定时器也无法保证准时运行。延迟可能发生，例如由于操作系统定时器的分辨率问题（但这远超本书的讨论范围）。\n\
    \n你只能依赖两件事：\n\n- 定时器绝不会在预定时间之前触发。\n- 浏览器会尽最大努力准时触发它。\n\n**提示：** 不用担心定时器延迟了一毫秒。通常用户不会注意到这个微小故障。不要追求完美，也不要试图让定时器变得完美。当我还在做\
    \ Java 游戏开发时，我花了很多时间试图让 Java 中的动画循环稍微好一点。Java 作为一个企业级平台，也存在同样的定时器问题——你不能依赖定时器的精度。这曾让我抓狂，我写了数十个测试、原生模块和变通方案，但效果几乎难以察觉。把这时间花在编写真正的游戏代码上要好得多。\n\
    \n现在让我们回到调度函数，看看它们有什么不同。\n\n`setInterval()` 每隔 N 毫秒安排一次函数的执行（参见代码清单 4-19）。\n\n\
    **代码清单 4-19.** `setInterval` 示例\n\n```javascript\nsetInterval(\n  function() {\n\
    \    console.log(\"Hello\")\n  }, 500);\n```\n\n代码清单 4-19 中的代码会每秒两次向控制台输出单词“Hello”。\n\
    \n`setTimeout()` 安排函数执行一次。当然，你也可以在函数末尾再次调用`setTimeout()`，从而模拟`setInterval()`的工作方式。调用`setTimeout`有两种不同的方式；代码清单\
    \ 4-20 展示了这两种方法。第一个调用安排单次执行，而第二个调用在每次循环后再次安排执行。\n\n**代码清单 4-20.** 调用 `setTimeout`\
    \ 的两种方式\n\n```javascript\n// 将触发一次\nsetTimeout(function() {\n  console.log(\"\
    Hello\")\n}, 500);\n\n// 几乎像 setInterval 一样工作，将永远触发\nsetTimeout(function() {\n\
    \  setTimeout(arguments.callee, 500);\n  console.log(\"Hello\")\n}, 500);\n```\n\
    \n`requestAnimationFrame()` 是最后一个定时器函数，也是最近才添加的。它受到绝大多数桌面浏览器的支持，但遗憾的是……\n"
- fmt: "# Chapter 4: Animation and Sprites\n\nNot by the stock Android browser (it\
    \ is supported by mobile Firefox). As the name suggests, it was created specifically\
    \ for handling animations. You can’t pass the timeout value into the `requestAnimationFrame`;\
    \ it is up to the browser to decide the best time for the next animation loop.\
    \ The browser synchronizes the `requestAnimationCallback` with the other animations\
    \ on the page — CSS transitions, DOM animations, SVG SMIL, and so forth — improving\
    \ overall performance of the page. Besides, `requestAnimationFrame()` will not\
    \ fire if the browser tab is invisible. If nobody is looking at the animation,\
    \ why waste precious cycles and battery power on it? This is the supposed method\
    \ to schedule animations in JavaScript games. Listing 4-21 shows the way to use\
    \ this function to schedule animation in JavaScript games (for browsers that support\
    \ it).\n\n**Listing 4-21.** *An Example of the Usage of `requestAnimationFrame`*\n\
    \n```\nfunction animate(timestamp){\n    console.log(\"Hello\");\n    requestAnimationFrame(animate);\n\
    }\n```\n\nAt the time of writing, this function is still implemented with vendor-specific\
    \ prefixes. In WebKit browsers, it is called `webkitRequestAnimationFrame()`;\
    \ in Opera, it is `oRequestAnimationFrame()`, and so forth. When the function\
    \ is standardized, browser vendors will eventually remove the prefix; but for\
    \ now, it is convenient to use the following shim layer in Listing 4-22, which\
    \ was implemented by Paul Irish.\n\n**Listing 4-22.** *Shim Layer for `requestAnimationFrame`*\n\
    \n```\nwindow.requestAnimationFrame = (function(){\n    //Check for each browser\n\
    \    //@paul_irish function\n    //Globalises this function to work on any browser\
    \ as each browser has a\n    //different namespace for this\n    return window.requestAnimationFrame\
    \ || //Chromium\n        window.webkitRequestAnimationFrame || //Webkit\n    \
    \    window.mozRequestAnimationFrame || //Mozilla Geko\n        window.oRequestAnimationFrame\
    \ || //Opera Presto\n        window.msRequestAnimationFrame || //IE Trident\n\
    \        function(callback, element){ //Fallback function\n            return\
    \ window.setTimeout(callback, 1000/60);\n        }\n})();\n```\n\nNote how this\
    \ code gracefully degrades to `setTimeout()`. Even if the browser doesn’t support\
    \ `requestAnimationFrame()`, your code will not break! Moreover, once the browser\
    \ adds support to this magical little feature, you do not need to change anything\
    \ to use it.\n\n**NOTE:** The construction that Paul used may look confusing at\
    \ first glance. Let’s take a minute to explain it. Paul created an anonymous function\
    \ that returns the function (remember, in JavaScript, the function acts just like\
    \ any other object and it can be returned from methods) and called it straightaway.\
    \ The function checks for the available implementation of `requestAnimationFrame`\
    \ and assigns it to the `window.requestAnimationFrame` property:\n\n```\nwindow.requestAnimationFrame\
    \ = (function(){\n    // actual shim code here\n})();\n```\n\nAdd this code to\
    \ `utils.js`, as we will need it in most of the chapters throughout the book.\n\
    \n## Stopping Timers\n\nSometimes you want to cancel the timer — for example,\
    \ when the game has ended and there’s no more need to animate anything, you might\
    \ want to stop `requestAnimationFrame()` or the other timer. Each function that\
    \ we described earlier has a counter-function that stops the timer and prevents\
    \ the next call from happening.\n\nTo stop the timer set with `setTimeout()`,\
    \ you call `clearTimeout()` like this:\n\n```\nvar handler = setTimeout(function()\
    \ {alert (\"Boom\");}, 1000);\nclearTimeout(handler);\n```\n\nEach timer function\
    \ returns the `handler` that identifies the timer. The handler is used to distinguish\
    \ between different timers in case you have many of them in your script. Intervals\
    \ follow exactly the same pattern, with the only difference being that the function\
    \ that stops the execution is called `clearInterval()`:\n\n```\nvar handler =\
    \ setInterval(function() {alert (\"Tick\");}, 1000);\nclearInterval(handler);\n\
    ```\n\nFinally, clearing the animationFrame is a little bit more involved because\
    \ of different naming conventions. We will need another shim layer to use."
