- fmt: "### 几个可能改变标志状态并切换离屏画布重置的函数\n\n例如，当画布尺寸改变时，内容会被销毁，我们需要重绘画布。当用户移出世界已渲染的部分时，我们需要渲染新的部分，就像我们在第6章中所做的那样。清单7-12中的代码总结了需要在离屏缓冲区需要重新渲染时更新以重新渲染它的函数。\n\
