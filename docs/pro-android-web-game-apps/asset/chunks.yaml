    A virtual joystick is a very nice tool, especially for mobile devices. It has
    usability issues with desktop browsers, however. The main problem is that you
    have to


    keep the mouse button pressed to move it. If your game is intended for both


    mobile and desktop platforms, make sure you think about usability, not only for


    touchscreens, but also for the good old mouse and keyboard. The final version


    of the joystick demo is available in a file called 07.joystick.html together with


    the source code for this chapter.


    **Summary**


    In this chapter, we took an in-depth look into browser event handling and user


    controls. We learned how the touch interfaces are different from the regular


    desktop browser input model. We discovered that dealing with browser events


    might be a cumbersome task. It is way better to create a suitable intermediate


    API layer that hides the details of the events and exposes the simple interface.


    We learned how to build custom event handlers to use inside the game. It often


    doesn’t make sense to utilize the heavyweight event model of the browser for


    simple tasks like emitting the event object to the direct subscribers.


    We developed advanced ways of interaction with the game through drag-and-


    drop and the pixel-perfect selection model. Finally, we created the custom


    component that simulates the joystick-----the hardware used for interacting with


    video games since they began.


    Now that we’ve completed this chapter, we are ready for the next challenge:


    rendering virtual worlds.


    Chapter


    **Rendering Virtual**


    **Worlds**


    In the previous chapters, we learned how to render the animation, control the


    timing, and react to the user’s input. The next interesting topic is rendering
    of


    the game world. This may be a trivial task if you are creating a game like chess,


    but what about role-playing games or strategies where the worlds are huge?


    Obviously, keeping the map and the game objects in your smartphone’s


    memory is not an option----too much data, too many bytes to send over the net


    and too slow to render.


    The next two chapters are dedicated to rendering of virtual worlds. First we will


    cover the basic techniques of drawing vast 2D spaces on the smartphone


    Download from Wow! eBook <www.wowebook.com>


    screen. We will explore several different approaches to optimize the rendering


    speed as well as volumes of data to transfer between the server and the client.


    We will try to focus on motivations behind each technique, discuss when and


    why you need to apply each of them. The material of this chapter will lay the


    solid ground for building the full-blown isometric engine that we will create
    in the next chapter.


    In this chapter, we will learn the following:


     Tile maps and how to present the world as a grid of tiles


     How to render tile maps on the canvas


     How to optimize rendering performance'
