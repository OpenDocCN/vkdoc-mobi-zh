  trans: "\n**注意：** 在本章中，我将展示如何直接从精灵表（sprite sheet）中绘制精灵。尽管这种技术比渲染单个图像稍慢，但一旦你知道如何绘制每一帧，调整代码来预渲染每一帧会相当容易。\n\
    \n锚点（anchor point）用于在屏幕上定位帧。当我们需要在坐标点（`x`, `y`）绘制一帧时，这意味着锚点应放置在该位置，而非图像的左上角或任何其他点（见图\
    \ 4-8）。\n\n**图 4-8.** 动画帧的锚点。在每一帧中，锚点可能具有不同的坐标。\n\n我们刚刚弄清了在给定坐标集下绘制动画角色之前需要了解的帧信息：帧的大小以及该帧内锚点的坐标。如果没有合适的\
    \ API，十几个精灵表（每个表多达上百帧）很快就会变得难以管理。所以，是时候创建一个新类了！`SpriteSheet` 这个名字听起来不错。\n\n到目前为止，`SpriteSheet`\
    \ 是本书中最简单的类之一。我在清单 4-15 中展示了代码。\n\n## 第 4 章：动画与精灵\n\n**清单 4-15.** 负责绘制单个帧的 `SpriteSheet`\
    \ 类\n\n```javascript\n/**\n*\n* @param image 用于绘制的图像对象\n* @param frames 描述精灵表帧的数组，格式如下：\n\
    * [\n*   [x, y, width, height, anchorX, anchorY] // - 帧 1\n*   [x, y, width, height,\
    \ anchorX, anchorY] // - 帧 2\n*   ...\n* ]\n*/\nfunction SpriteSheet(image, frames)\
    \ {\n    this._image = image;\n    this._frames = frames;\n}\n\nSpriteSheet.FRAME_X\
    \ = 0;\nSpriteSheet.FRAME_Y = 1;\nSpriteSheet.FRAME_WIDTH = 2;\nSpriteSheet.FRAME_HEIGHT\
    \ = 3;\nSpriteSheet.FRAME_ANCHOR_X = 4;\nSpriteSheet.FRAME_ANCHOR_Y = 5;\n\n/**\n\
    * 在画布（Context）的给定坐标处绘制精灵表的帧。\n* @param ctx 要绘制的画布\n* @param index 帧的索引\n* @param\
    \ x 锚点出现的 x 坐标\n* @param y 锚点出现的 y 坐标\n*/\n_p.drawFrame = function(ctx, index,\
    \ x, y) {\n    var frame = this._frames[index];\n    if (!frame)\n        return;\n\
    \    ctx.drawImage(this._image,\n        frame[SpriteSheet.FRAME_X], frame[SpriteSheet.FRAME_Y],\n\
    \        frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT],\n  \
    \      x - frame[SpriteSheet.FRAME_ANCHOR_X],\n        y - frame[SpriteSheet.FRAME_ANCHOR_Y],\n\
    \        frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT]);\n};\n\
    ```\n\n构造函数接受两个参数：一个图像和帧的描述信息。每个帧由一个包含六个元素的数组描述：其中四个用于描述帧在精灵表中的大小和位置，另外两个用于锚点的坐标。绘制函数也非常简单：它计算给定帧的偏移量，使锚点出现在\
    \ (`x`, `y`) 位置。\n\n**注意：** 你可能注意到我创建了几个常量来引用帧数组的索引。它们的唯一目的是让代码更具可读性。将清单中的代码与下面不使用常量重写的代码进行比较：\n\
    \n```javascript\nctx.drawImage(this._image, frame[0], frame[1], frame[2],\n  \
    \  frame[3], x - frame[5], y - frame[6], frame[2],\n    frame[3]);\n```\n\n这段代码看起来更紧凑一些，但如果以后你重读这段代码，我敢打赌你不会记得索引背后的含义。\n\
    \n现在我们可以将精灵表描述与绘制代码分离开来，如清单 4-16 所示。\n\n**清单 4-16.** 使用 `SpriteSheet` 绘制精灵\n\n\
    ```javascript\nvar frames = [\n    [9, 8, 38, 37, 10, 36],\n    [57, 8, 39, 37,\
    \ 10, 36],\n    [107, 8, 45, 37, 10, 36],\n    [163, 8, 45, 37, 10, 36]\n];\n\
    var spriteSheet = new SpriteSheet(imageManager.getImage(\"player\"), frames);\n\
    spriteSheet.drawFrame(ctx, current, 10, 40);\n```\n\n**提示：** 这些帧描述的数字从哪里来？通常由你的美术人员提供，但请务必在美术人员开始工作之前向他解释你需要帧的描述信息。否则，你将花费一个晚上的时间，用鼠标指针悬停在图像上，自己费力地找出坐标。\n"
- fmt: "# Favorite Graphical Editor Measuring Pixels\n\nThere’s another interesting\
    \ use for the sprite sheet——rendering in-game raster fonts. Games might use very\
    \ fancy fonts presented as bitmaps, with each sprite representing a letter or\
    \ character.\n\n## Raster Fonts\n\nThe task of building a class that can render\
    \ strings using bitmap fonts can be trivial or rather complex, depending on the\
    \ set of features that you need. If you need a one-line bitmap representation\
    \ of the string, it’ll take five minutes to build a class that can do it. On the\
    \ other hand, the advanced solution that takes into account line breaks, alignment,\
    \ and intervals can be very complex. Typography is a broad and interesting topic\
    \ that is beyond the scope of this book.\n\n## Basics of Animation\n\nWe’re getting\
    \ closer to one of the most exciting parts of game development: animation. When\
    \ pictures start to move, your game becomes ‘alive.’ It is a truly incredible\
    \ feeling to see your first animated sprite moving on the screen.\n\n### The Simplest\
    \ Animation\n\nNowadays everybody knows how animation works. There’s no mystery\
    \ behind it. When you change frames fast enough and update the picture on the\
    \ screen (change its shape, position, step to the next frame in the animation\
    \ sequence, or all of the above), the user experiences the illusion of movement.\
    \ The picture becomes alive——spaceships fly and shoot, Pac-Man runs away from\
    \ the chase, and tanks turn their turrets.\n\nTo create the animation, we have\
    \ to implement three steps:\n\n1. Update the state of the picture with time (move\
    \ it, change frames, etc).\n2. Draw the picture on the screen.\n3. Wait some time\
    \ and repeat the previous two steps, drawing the new frame (do not forget to clear\
    \ the contents of the previous frame).\n\nThe faster frames change, the smoother\
    \ the animation looks to the user. The speed of frame change is called the frame\
    \ rate and it is measured in frames per second, or FPS.\n\nImplementing the plan\
    \ that we just outlined, we should create a function that renders the frame and\
    \ call it every 30 to 50 milliseconds. Listing 4-17 shows the code that does the\
    \ trick.\n\n**Listing 4-17.** *The Simplest Possible Canvas Animation*\n\n```javascript\n\
    var currentFrame = -1;\n\nfunction animate(timestamp) {\n  ctx.fillStyle = \"\
    white\";\n  ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n  currentFrame\
    \ = ++currentFrame % 5;\n  spriteSheet.drawFrame(ctx, currentFrame, 10, 40);\n\
    \n  requestAnimationFrame(arguments.callee);\n}\n\nanimate();\n```\n\nLet’s look\
    \ closer at this code since it is the basis for the whole animation framework\
    \ that we’re going to make during this chapter. The first two lines of the function\
    \ are well known from Chapter 2: we’re clearing the whole canvas with a solid\
    \ white color. We have to clear the old frame before drawing the new one since\
    \ canvas doesn’t clear itself automatically and will draw the new content on top\
    \ of the old. The full example of this approach is available in a file called\
    \ `05.sprite_sheet_animation.html` together with the source code for this chapter.\n\
    \nThe variable called `current` holds the index of the current frame in the animation\
    \ sequence. The sequence has a total of five frames. The next line, `currentFrame\
    \ = ++currentFrame % 5`, increases the counter by one and performs a modulo operation\
    \ (returns the remainder from the division by five) to make sure that the number\
    \ is never greater than four. This line could be rewritten in the following, more\
    \ verbose way:\n\n```javascript\ncurrent++;\nif (current > 4)\n  current = 0;\n\
    ```\n\nIt does exactly the same as the line in Listing 4-17: after the counter\
    \ reaches 4, it drops back to 0 and continues from there. The next line draws\
    \ the frame, and the last line schedules the execution of the same function after\
    \ 50 milliseconds. The last line of the `animate()` function is a new and important\
    \ concept. JavaScript timers are a simple yet very powerful mechanism for scheduling\
    \ fragments of code for later execution. Redrawing the frame every few..."
