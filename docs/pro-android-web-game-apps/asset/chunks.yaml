    \ \"ready\");\n  });\n\n  socket.on(\"user-list\", function (data) {\n    for\
    \ (var userId in data.users) {\n      var user = data.users[userId];\n      userList.add(user.id,\
    \ user.name, user.status);\n    }\n  });\n\n  socket.on(\"info\", function (info)\
    \ {\n    console.log(info.text);\n  });\n\n  var listElement = document.getElementById(\"\
    online_users\");\n  userList = new LobbyUsersList(listElement, onChallenge);\n\
    }\n\nfunction onChallenge(userId, userName, status) {\n  alert(\"你向用户 \" + userName\
    \ + \" 发起了挑战，该用户当前状态为 \" + status);\n}\n</script>\n\n</head>\n<body onload=\"\
    init()\">\n<div id=\"lobby\">\n  <ul id=\"online_users\"></ul>\n</div>\n</body>\n\
    </html>\n```\n\n客户端代码知道如何响应六种服务器事件：\n\n- `\"user-joined\"`：当新用户加入大厅时发送\n- `\"\
    user-left\"`：当用户离开游戏时发送\n- `\"user-playing\"`：当用户开始新游戏时发送（该用户无法参与其他游戏，也不能被邀请）\n\
    - `\"user-ready\"`：当用户完成游戏并准备接受新的邀请时发送\n- `\"user-list\"`：房间内所有用户的列表（用于初始化大厅列表）\n\
    - `\"info\"`：在控制台中显示用于调试的通用消息\n\n目前，服务器仅知道如何发送`\"user-joined\"`、`\"user-left\"\
    `和`\"info\"`这三种消息。让我们增加一种消息类型——`\"user-list\"`，用于用已在线用户填充用户列表。为此，我们需要追踪每一位连接和断开的用户。幸运的是，这并不难实现。清单\
    \ 12-6 展示了具体做法。\n\n**清单 12-6.** *追踪连接和断开的用户*\n\n```javascript\nvar maxUserId =\
    \ 0;\nvar users = {};\n\nio.sockets.on(\"connection\", function (socket) {\n \
    \ var userId = addUser(socket);\n\n  socket.on(\"disconnect\", function () {\n\
    \    socket.broadcast.emit(\"user-left\", users[userId]);\n    delete users[userId];\n\
    \  });\n});\n\n/**\n * 在服务器上注册用户。通知所有人该用户已加入大厅，\n * 并向新连接的用户发送在线用户列表。\n * @param\
    \ socket 已连接客户端的套接字对象\n * @returns 新创建用户的 ID\n */\nfunction addUser(socket) {\n\
    \  var userId = maxUserId++;\n  var userName = \"User \" + userId;\n  var user\
    \ = {id: userId, name: userName, status: \"ready\"};\n  users[userId] = user;\n\
    \n  Object.defineProperty(user, \"socket\", {\n    value: socket,\n    enumerable:\
    \ false\n  });\n\n  socket.emit(\"info\", \"你已经连接成功\");\n  socket.emit(\"user-list\"\
    , { users: users });\n  socket.broadcast.emit(\"user-joined\", user);\n  return\
    \ userId;\n}\n```\n\n我们将添加用户的代码移到了独立函数`addUser()`中。这样管理起来更加方便。每个新用户都会获得一个唯一 ID、一个`userName`、一个状态以及一个套接字。我们通过一种不同寻常的方式——`Object.defineProperty()`——来分配套接字属性。如果按常规方式分配套接字，例如：\n\
    \n```javascript\nuser.socket = socket;\n```\n\n那么每次用户对象被发送到客户端时，套接字对象也会被一并发送。显然，应用程序中并不需要这些数据。修复此行为的最简单方法是将该属性声明为不可枚举。此类属性只有在你知道其名称时才能访问，不会出现在`for..in`循环中，并且在将\
    \ JSON 序列化为字符串时会被忽略。这正是代码中`Object.defineProperty()`所实现的功能。\n\n现在你可以测试代码了。尝试用你的设备连接服务器，打开几个浏览器窗口，观察新的列表项如何出现在屏幕上。然后关闭窗口，观察其中一个列表项是如何消失的。\n"
- fmt: "大厅（lobby）的样式相当简陋，不适合游戏。实际上，无论是在桌面浏览器还是手机上，HTML列表的基本样式都缺乏吸引力。图12-5展示了我们当前的工作成果。\n\
    \n**图12-5.** *未添加任何额外CSS的大厅渲染效果*\n\n这个结果看起来并不特别吸引人，但如果我们添加一些CSS魔法，列表会变得好得多。将清单12-7中的CSS代码添加到页面中。\n\
    \n**清单12-7.** *大厅的CSS样式*\n\n```css\n<style>\nhtml, body {\n  overflow: hidden;\n\
    \  width: 100%;\n  height: 100%;\n  margin: 0;\n  padding: 0;\n  border: 0;\n\
    }\n\n#online_users {\n  font-size: 2.5em;\n  cursor: pointer;\n  list-style: none;\n\
