    \n使用以下格式的 URL 访问应用页面：`https://play.google.com/store/apps/details?id=<package_name>`，其中`<package_name>`是你在本章开头设置的程序包名称。我新发布的游戏可通过`https://play.google.com/store/apps/details?id=com.juriy.fourballs`访问。如果你从\
    \ Android 设备点击此页面的链接，系统会提示你打开市场应用并安装“Four Balls”。这是该应用在 Android Market 中的“主页”。图\
    \ 15-15 显示了该页面在桌面浏览器中的样子，图 15-16 则显示了该页面在设备上市场应用中的样子。\n\n![图 15-15](img/index-596_1.jpg)\n\
