    \n**清单 5-8.** *自定义事件示例*\n\n```\n// \"on\" 是 \"addEventListener\" 的别名\n// 它读起来更自然\n\
    levelManager.on(\"loaded\", function(e) {\n  var coins = getCoins(e.levelNumber);\n\
