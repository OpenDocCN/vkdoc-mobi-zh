    \n如果你正在制作原生应用程序，你可以让声音默认开启，尽管我建议你友好一点，仍然询问用户是否想要声音。\n\n一款休闲游戏应该可以在没有任何声音的情况下进行游玩。以下是关于优秀声音设计的更多提示：\n\
