    \ : MouseInputHandler;\n```\n\n这是一个在 JavaScript 中偶尔会用到的小技巧。根据环境的不同，`InputHandler`\
    \ 要么是 `TouchInputHandler`，要么是 `MouseInputHandler`。这样，你就不必在核心游戏文件中纠结于选择正确的实现了。由于输入处理是一个独立的\
    \ API，我们将实现它的四个文件都放在一个名为 `input` 的独立文件夹中。\n\n# 第 5 章：事件处理与用户输入\n\n## 高级输入\n\n\
    构建输入层来向游戏核心逻辑隐藏浏览器 API，仅仅是拥有良好游戏控制的第一步。我们已经学会了如何处理“原子”输入动作（触摸、释放和移动），现在是时候看一些稍微高级一些的例子了。\n\
    \n### 拖放\n\n拖放是一种与为触摸屏设计的游戏进行交互的非常方便的方式。例如，在一个拥有大地图的游戏中，拖动地图是浏览世界的自然方式。此外，拖放还可以用于在英雄的仓库和背包之间移动物品，或者为孩子们构建拼图游戏。通过拖放移动拼图碎片是与它们交互的第二自然的方式（仅次于用手抓取）。这种输入方式用于我们下一个游戏实验——第\
    \ 7 章中的等距游戏。\n\n拖放非常容易实现。该方法包含以下三个步骤：\n\n1. 当用户开始交互时，检查他是否选中了一个可拖动的组件。如果没有，则中止该过程，因为没有东西可以拖动。如果有很多可拖动组件，请标记当前处于活动状态的那个。我们称这一步为**拾取**。\n\
    2. 监听移动事件并相应地调整组件的位置。我们称这一步为**移动**。\n3. 当用户完成交互时，完成拖动：执行拖放背后的游戏逻辑（例如，在背包中移动物品），然后取消标记“活动”组件。我们称这一步为**释放**。\n\
    \n让我们构建另一个演示来说明这个概念（参见清单 5-25）。我们将在屏幕上放置几个矩形，并允许用户拖动它们。所有这三个阶段都可以使用我们的 API 轻松实现（完整代码位于本章示例文件夹中的\
    \ `02.drag_and_drop.html` 文件中）。\n\n**清单 5-25.** *实现拖放*\n\n```javascript\n// 拾取阶段\n\
    input.on(\"down\", function(e) {\n    rectangles.forEach(function(rect, index)\
    \ {\n        if (insideRectangle(e, rect))\n            selectedIndex = index;\n\
    \    });\n});\n\n// 移动阶段\ninput.on(\"move\", function(e) {\n    if (selectedIndex\
    \ > -1) {\n        rectangles[selectedIndex].x += e.deltaX;\n        rectangles[selectedIndex].y\
    \ += e.deltaY;\n    }\n});\n\n// 释放阶段\ninput.on(\"up\", function(e) {\n    selectedIndex\
    \ = -1;\n});\n```\n\n移动阶段和释放阶段很简单；然而，拾取阶段有一些陷阱。通过坐标进行检查相当容易判断点"
- fmt: "### Falls inside a circle or square.  \nPolygons are a little harder, but\
    \ still doable. But what if the objects of the scene have shapes that are more\
    \ complex? What if you want to pick an image that has transparent areas that should\
    \ not be treated as “material”? Obviously, there are cases that are impossible\
    \ to implement using only simple mathematical algorithms. For cases like that,\
    \ there’s a “pixel perfect” selection approach described in the next section of\
    \ this chapter. The complete source code that implements drag and drop is available\
    \ in file `04.drag_and_drop.html`.\n\n**NOTE:** The games that we’ll create during\
    \ the course of the book do not require pixel-perfect picking. This kind of input,\
    \ however, is the common problem that many game developers face. So, I decided\
    \ to devote a separate section for this question. Puzzle-assembling games, for\
    \ example, are almost impossible to implement properly without it.\n\n## Pixel-Perfect\
    \ Picking and Image Masks\n\nThe smallest thing that the user can select is a\
    \ pixel. Unlike the canvas API, browser events do not deal with fractional parts\
    \ of pixels: it is impossible to select the “left side of the pixel” or the “bottom\
    \ corner of the pixel.” The task of picking complex shapes can be formulated in\
    \ a slightly different way: determine which figure of the scene the given pixel\
    \ belongs to. Obviously, if we could do that, we could pick any figure with perfect\
    \ accuracy. It turns out that it is possible to implement such an algorithm with\
    \ relatively little effort.\n\nEach pixel has a color. Let’s imagine that we make\
    \ a game where each shape has a unique solid color. For example, the triangle\
    \ is blue, the square is red, and the circle is green. When the user taps the\
    \ screen, we can instantly tell which figure is under his finger by getting the\
    \ color of the pixel and mapping it to the figure. This can be easily done with\
    \ the canvas API. First, we need to get the color of a pixel; if the user tapped\
    \ the screen in coordinates `(51, 73)`, the code for the value of the pixel looks\
    \ like the following:\n\n```javascript\nvar imageData = ctx.getImageData(51, 73,\
    \ 1, 1).data;\n```\n\nThe `imageData` is an array that has four elements: a red\
    \ value, a green value, a blue value, and an alpha value of the color. With this\
    \ raw pixel data, we can tell which image is selected:\n\n```javascript\nif (imageData[2]\
    \ == 255) {\n    console.log(\"Blue Triangle\");\n} else if (imageData[0] == 255)\
    \ {\n    console.log(\"Red Square\");\n} else if (imageData[1] == 255) {\n   \
    \ console.log(\"Green Circle\");\n} else {\n    console.log(\"Empty Space\");\n\
    }\n```\n\nBut most of the games we make have all kinds of shapes with all kinds\
    \ of colors. Most sprites have multiple colors! Does it mean that this technique\
    \ is useless? Not at all. Even though the images and shapes have different colors,\
    \ we can paint them in the way they are “covered” with the solid color. Before\
    \ going further, let’s look at what this means. Figure 5-6 illustrates the idea.\
    \ We have two cartoon house images, each having a palette of colors (left image).\
    \ To make our technique work, we have to paint the house images, giving each a\
    \ unique solid color (right image).\n\n**Figure 5-6.** *Original images (left)\
    \ and masks (right)*\n\nThis technique is called masking and the solid-colored\
    \ outline of the figure is often called a mask. In a minute, we’ll see how to\
    \ create masks; for now, let’s assume that it is possible.\n\nEach pixel has a\
    \ color. The color is represented by a 32-bit number, divided into four 8-bit\
    \ components: red, green, blue, and alpha. We can easily translate from the color\
    \ to its integer value and back. What happens if we give a unique ID to each figure\
    \ in the scene and then encode this ID as the color? That’s right. We get the\
    \ unique color for every figure on the scene. What if we draw the mask of each\
    \ figure with this unique color? The color of the pixel would then represent the\
    \ ID of the figure that occupies that pixel! When the user taps the screen, we..."
