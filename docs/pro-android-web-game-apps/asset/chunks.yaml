    # 等效于 C 中的`int`或`Float64Array`（双精度浮点类型）


    等效于 C 中的`double`。第二种二进制响应类型是`Blob`（[`dev.w3.org/2006/webapi/FileAPI/#blob`](http://dev.w3.org/2006/webapi/FileAPI/#blob)），这是来自
    File API 规范的数据结构，与`ArrayBuffer`非常相似，唯一的区别在于`Blob`保留了它所持有的数据类型信息——无论是 PNG 图像、ZIP
    压缩包还是 MD2 模型。


    **注意：** 本章编写时，所有三个规范——`XMLHttpRequest Level 2`、`File API`和类型化数组——均处于工作草案状态。这意味着它们可能在几个月内发生变化。然而，浏览器厂商已经在基于这些规范构建实现。目前，你仍然需要考虑不支持新功能的设备和浏览器；这样的设备和浏览器数量仍然很多。关于浏览器支持的最佳信息来源，通常可以访问[`caniuse.com/fileapi`](http://caniuse.com/fileapi)和[`caniuse.com/typedarrays`](http://caniuse.com/typedarrays)，以及通过模拟器和真实设备进行广泛测试。


    如果你想了解更多关于新 API 的激动人心的特性，请参阅 Eric Bidelman 撰写的精彩 HTML5 Rocks 文章《New Tricks in
    XMLHttpRequest2》([www.html5rocks.com/en/tutorials/file/xhr2/](http://www.html5rocks.com/en/tutorials/file/xhr2/))。另一个很好的灵感来源是
    W3C 规范——这些文档在本书中经常被引用，因为它们对开发者友好且编写良好。你应该阅读它们，以全面了解新特性应该如何工作以及 Web 的发展方向。


    # 反向 Ajax


    本节致力于探讨客户端与服务器之间的低延迟通信，其中双方都可以相互发送消息。`XHR`的典型用法假设客户端是唯一的事件源；例如，当用户填写表单时，他可能需要验证服务的响应，此时他向服务器请求执行某些操作并返回响应。如果我们有一个应用程序，其中服务器应该能够向客户端发送请求，该怎么办？例如，在聊天应用程序中，服务器可能想要向客户端发送新的聊天消息；换句话说，就是向客户端发送请求。


    允许服务器与客户端通信的技术集合通常被称为反向 Ajax。从技术上讲，服务器无法连接到网页并直接发送消息，因为能够建立连接的唯一一方是网页。然而，通过服务器与客户端之间的某种协作，可以实现这一结果。


    每种此类技术背后的思路是在页面与 Web 服务器之间建立某种持久连接，以便服务器在出现更新时能够使用该连接将消息推回给客户端。当没有活动时，连接保持空闲，但一旦服务器有要发布的新事件，它就可以利用打开的连接立即将其传递给客户端。这种模型与常规
    Ajax 不同，因为它允许服务器（而非客户端）成为通信的发起方。


    **注意：** 这种架构有几种名称，但都未标准化。最流行的名称是反向 Ajax、服务器推送和 Comet。除了 Comet 之外，所有这些名称都表明通信的主动权现在在服务器端：服务器现在可以*推送*消息给客户端，这种模型是常规
    Ajax 工作方式的*反向*。


    ## 问题


    任何在线游戏服务的大厅都是服务器推送架构至关重要的完美示例。假设用户已连接到游戏，他需要找出还有谁在玩。其他玩家的列表必须……

