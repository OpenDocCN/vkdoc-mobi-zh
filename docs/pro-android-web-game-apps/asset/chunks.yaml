    创建一个名为 `utils.js` 的新文件，并将该函数的代码放入其中。在接下来的章节中，我们将向此文件添加其他有用的函数。


    **注意：** JavaScript 中 OOP 的实现方式在过去几年中已经历过多次演变。解决同一任务有多种方法：有些方法更优，而另一些则略逊一筹或已过时。所描述的方法是迄今为止最简洁的一种。此外，`Node.js`（我们将在第
    10 章学习的服务器端 JavaScript 引擎）也使用了相同的对象扩展方法。采用此方法可使对象从客户端移植到服务器端变得更加容易。事实上，我略微取巧地使用了
    `Node` 核心模块中的函数来维持这种一致性。


    关于命名的最后一点说明。在本章中，我尽量避免了使用“类”这个词。然而，事实证明，`class` 是一个很好的词，用来描述可用于构造新对象的蓝图这一概念。使用“构造函数”和“原型链”这样的词非常不便。在接下来的章节中，我将使用“类”一词来指代任何构造函数及其原型。换句话说，即定义该对象的全部属性集。既然我们已经澄清了
    JavaScript OOP 背后的机制，这便不会引起任何误解。


    OOP 为你组织代码结构提供了极大的可能性。尽管 JavaScript 没有类，但它仍然是一种面向对象的语言。在很长一段时间里，JavaScript 仅用于编写简单的脚本，OOP
    方法似乎是一种不必要的复杂性。然而，当代码库规模增长时，OOP 便展现出了其全部潜力。


    ## 关于移动浏览器的一点说明


    Android 是一个开放且相对较新的平台——对每一家浏览器制造商来说都是一个诱人的目标。主要的浏览器市场参与者正竞相打造“终极移动 Android 浏览器”。在撰写本文时，用户已有众多替代品可供选择：Firefox、Dolphin
    HD、Dolphin Mini、Opera Mini 以及其他几款产品。看来我们很快将迎来另一场浏览器大战。


    这种热情确实很棒，因为竞争是提升产品质量的动力，尤其是在浏览器免费且质量是唯一区别的情况下。另一方面，这也让你的工作变得稍显艰难。作为 Web 应用程序开发者，你有责任编写能在所有选定平台上良好运行的代码。支持的浏览器越多，意味着满意的用户越多，但同时也意味着更多的不眠之夜、丑陋的补丁以及更长的开发时间。


    无论你或你的老板选择何种策略，关于浏览器家族的规则保持不变：若你为原生浏览器优化代码，请确保其在 Chrome 上表现良好；若针对移动版 Firefox，请确保应用在桌面版上也能正常工作。


    ## 总结


    在本章中，我们回顾了开始开发 Android Web 应用程序所需的一套工具。我们安装了 `JDK`（Java 开发工具包），并尝试了两种集成开发环境（IDE）来编写最简单的
    Hello World 应用程序。我们安装了 `nginx` Web 服务器，以使页面可供模拟器和/或设备访问，并配置了 `nginx`，将我们的 Hello
    World 应用程序文件夹作为静态文件的根目录。现在，当我们在 IDE 中更改文件时，只需刷新页面即可立即在浏览器中看到这些更改。


    我们安装了 Android SDK，并配置了模拟器来测试我们的页面。我们学习了如何创建新的模拟器，以及如何设置 API 版本和屏幕分辨率等各种选项。


    在本章的第二部分，我们回顾了编码的最佳实践。我们学习了如何利用 JavaScript 的优势，同时避免陷阱。我们确定了几条对 JavaScript 尤其重要的开发原则。


    我们学习了 OOP 在 JavaScript 中是如何工作的。这个话题曾引起很多困惑，理解我们日后将使用的基本原则至关重要。

