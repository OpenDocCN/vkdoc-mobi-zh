    Instead of navigating through the world, which can be incredibly complex, the
    character navigates through the set of predefined waypoints. Figure 13-2 illustrates
    this idea. As you see, once the waypoints are set, you only need to move between
    them.


    **Figure 13-2.** *The task of pathfinding simplified with the help of waypoints*


    As you see in Figure 13-2, the agent now has to move from his current location
    to point 0, then to points 1, 3, 6, and 7, and finally moves straight toward the
    destination point. The only remaining question is how to make our AI find the
    correct sequence of waypoints: 0-1-3-6-7? There are multiple ways to get from
    1 to 7. For example, an agent could go through point 5, or through point 2 and
    point 5, but these paths are longer than the correct one. To answer this question,
    we will take a step back and learn few basic facts from the mathematical apparatus
    called the graph theory.


    ## Graphs


    Many AI algorithms (not just pathfinding) take advantage of the graph theory.
    This section is a quick and informal introduction to graphs, mostly to get you
    familiar with the terms that we use in the following sections. If you are already
    familiar with graph theory and know straightaway what an ''acyclic weighted graph''
    is, feel free to skip this section and move straight to the algorithms.


    ### What Is a Graph?


    A graph is a set of objects connected to each other. The objects are called nodes
    or vertices and the connections are called edges. Do not let the names ''edge''
    and ''vertex'' confuse you—it has nothing to do with polygons and WebGL programming.
    Figure 13-3 shows an example of a graph.


    **Figure 13-3.** *An example of a graph*


    Many real-world entities lend themselves to being represented by graphs. Take
    the map of a country as an example. The cities would represent nodes, and roads
    would be edges. If there''s an edge between two nodes, then there''s a direct
    road connecting two cities. Computer networks, GSM cells covering a certain area,
    and social connections between you, your friends, and friends of your friends
    are also examples of graphs.


    Graphs prove themselves a good abstraction for many tasks: finding the shortest
    route between two cities; building an efficient network topology that handles
    high loads; and finding people in the social network that are likely to be the
    friends of the user. In games that involve movement and combat, it is common to
    represent a level as a graph of waypoints. This structure is much easier to analyze
    and to make decisions fast.


    The way the graph is drawn on the surface can be arbitrary: the only thing that
    is important about the graph is the nodes and the connections between them. The
    layout is merely the representation of the structure in a surface. The graphs
    in Figure 13-4 are equivalent: in fact, this is exactly the same graph but drawn
    slightly differently. To make it even clearer, the nodes are marked with numbers.


    **519**


    **Figure 13-4.** *The same graph drawn with the different layouts*


    A graphical representation is not convenient for development, of course. The usual
    way to represent a graph in script is to use a matrix—each row and each column
    stands for a node. If two nodes are connected, then the matrix element on the
    intersection of the corresponding row and column is 1, otherwise it''s 0. The
    matrix in Figure 13-5 represents the graph from Figure 13-4, without drawing it
    on the screen.


    **Figure 13-5.** *The matrix representation of the graph. If, for example, there
    is "1" on the intersection of the column i and row j, it means that vertexes i
    and j are connected with an edge.*


    The edges of the graph may have directions. In this case, the graph is called
    a directed graph. An example of a directed graph is shown in Figure 13-6.


    **Figure 13-6.** *A directed graph*'
