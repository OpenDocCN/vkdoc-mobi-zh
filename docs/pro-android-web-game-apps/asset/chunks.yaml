    \ currentFrame, 10, 40);`\n\n`requestAnimationFrame(arguments.callee);`\n\n}\n\
    \n`animate(0);`\n\nWhat if we have multiple sprites on the screen, each with its\
    \ own animation parameters—time per frame, number of frames, and so forth? Storing\
    \ this data as we did in the example will soon become messy. Sounds like a good\
    \ time to make another class.\n\n## Implementing `Animator`\n\nAnimation is not\
    \ limited to changing frames. In fact, any change of shape, position, color, or\
    \ any other visual property of an element that is performed in a smooth and progressive\
    \ way is an animation. We just looked at the simplest case: each frame stays on\
    \ the screen for the same fixed amount of time, changed by the next frame, and\
    \ so on, until the animation reaches its end. Once it is there, the next loop\
    \ starts from the first frame again.\n\nIf we apply the same approach to changing\
    \ the coordinates of the object, we get a different type of animation—movement\
    \ with a constant speed. There are a lot of examples of such movement in real\
    \ life: a car driving on an empty highway is one. Nevertheless, there are many\
    \ more examples of movement happening with either acceleration or deceleration\
    \ (an apple falling from a tree), changing its direction (a swinging pendulum),\
    \ or following even more complex laws.\n\nThese more complex animation cases are\
    \ often required in casual and arcade games. For example, when a character is\
    \ swinging on a rope, his speed is not constant; it accelerates while going down\
    \ and decelerates while going back up. There are many other examples of movement\
    \ that involve acceleration and deceleration, so it is worth implementing these\
    \ mechanics in the `Animator` class that we cover in this section.\n\n`Animator`\
    \ has two main use cases. The first is playing the animation with constant speed,\
    \ as we just did in the previous section. In this case, `Animator` acts solely\
    \ as a wrapper around the code that calculates the fraction of the animation loop.\
    \ The second case is updating animation with acceleration and deceleration.\n\n\
    We will start with looking at the code that uses `Animator`, and then we’ll discuss\
    \ the implementation. Listing 4-27 shows an example that uses `Animator` for simple\
    \ switching of frames. We create the `Animator` instance and set the parameters\
    \ for the animation—for now, only the duration of the sequence. After that, `Animator`\
    \ returns a fraction for the animation passed from the beginning.\n\n**Listing\
    \ 4-27.** *The Basic Usage of the Animator*\n\n```\n// Total number of frame in\
    \ the animation\nvar numFrames = 5;\n\n// Time per frame\nvar TIME_PER_FRAME =\
    \ 50;\n\nvar animator = new Animator(numFrames*TIME_PER_FRAME);\n\n// Start the\
    \ animation sequence\nanimator.start();\n\nfunction animate(t) {\n   var deltaTime\
    \ = getTimePassedFromLastFrame();\n\n   var fraction = animator.update(deltaTime);\n\
    \n   // Given the fraction and the total number of frames, get the current frame\n\
    \   var currentFrame = Math.floor(fraction*numFrames);\n\n   // Draw the actual\
    \ frame\n   drawFrame(currentFrame);\n\n   // Loop again\n   requestAnimationFrame(arguments.callee);\n\
    }\n\nanimate(0);\n```\n\n`drawFrame()` and `getTimePassedSinceLastFrame()` are\
    \ placeholder functions that are quite easy to implement. The main idea behind\
    \ the `Animator` class is to decouple the code that calculates the current fraction\
    \ of the animation from the code that updates the screen. If you need to animate\
    \ the position of the object, rather than the frame, the changes to the code are\
    \ minimal, as shown in Listing 4-28.\n\n**Listing 4-28.** *Updating the Position\
    \ of the Object. The Object Moves from (0, 0) to (300, 300) in 500 Milliseconds.*\n\
    \n```\n// Total time of the animation - half of a second\nvar animator = new Animator(500);\n\
    \n// Start the sequence\nanimator.start();\n\nfunction animate(t) {\n   var deltaTime\
    \ = getTimePassedFromLastFrame();\n\n   var fraction = animator.update(deltaTime);\n\
    \n   var pos = fraction*500;\n\n   drawToken(pos);\n\n   // Loop again\n   requestAnimationFrame(arguments.callee);\n\
    }\n\nanimate(0);\n```"
