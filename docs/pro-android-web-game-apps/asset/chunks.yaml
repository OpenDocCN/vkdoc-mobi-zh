    ![图 6-14](img/index-254_1.jpg)


    第 6 章：渲染虚拟世界 **249**


    **图 6-14.** *最小化绘制前需要检查的对象数量。世界被划分为网格。每个对象被分配到几个网格单元格中。在每一帧中，只检查单元格 (2,0) 到 (3,1)
    中的对象。*


    显然，游戏对象可能位于两个单元格的边界上，甚至位于两个边界相交的点上。在这种情况下，该对象会被分配到两个或四个网格单元格中。之后，我们会过滤这些对象，以免将它们绘制两次或四次。


    如果对象在移动怎么办？我们必须跟踪它，并确保当它离开某个网格单元格时取消注册，并在进入新单元格时进行注册。这就像带着手机在城市里旅行：它总是在寻找最好的 GSM
    发射器。当您离开一个发射器的范围时，您就会在另一个发射器上注册。


    确定网格单元格的最佳大小非常重要。最佳大小取决于您游戏的具体情况、游戏对象的密度，以及它们是静态的（不移动、不出现或消失）还是动态的（四处移动、出现新对象、旧对象消失）。如果单元格做得很大，意味着在每一动画帧中您都必须检查更多对象。例如，如果一个单元格是
    500×500 像素，而视口位于单元格的交汇处，这意味着您必须测试一个 1000×1000 像素区域内的对象，这相当大。如果把单元格做得太小，很快就会面临大量空单元格的问题。此外，一个移动的对象必须不断地在这些单元格中注册/取消注册。那么最佳大小是多少？这个问题最好通过在您的特定设置上运行一些基准测试来回答。

    '
- fmt: '# 第六章：渲染虚拟世界


    ## 等距视角


    在下一章中，我们将基于网格这一简单概念，构建更高级的对象渲染器。


    ![](index-255_1.jpg)


    ![](index-255_2.jpg)


    本章最后部分专门快速概述等距投影。到目前为止，我们一直使用的是俯视图，这意味着用户以90度角观察场景。图6-15展示了俯视图和等距投影之间的区别。


    **图6-15.** *左侧是任天堂于1986年发行的《塞尔达传说》，采用正交（俯视）视图。右侧是黑岛工作室制作、Interplay于1998年发行的《辐射2》，采用等距投影。*


    另一种有趣的观察方式是当摄像机轻微旋转时。当然，在2D世界中，我们无法旋转摄像机。对于2D游戏而言，等距视图意味着一种特殊的绘制和渲染对象的方式，它能营造出深度感。其定义是：等距投影是坐标轴之间角度相等（均为120度）的投影。


    图6-16展示了我们正在制作的立方体在俯视图投影和等距投影中的样子。


    **图6-16.** *左侧的立方体是俯视图投影——无论是俯视还是侧视，看起来都一样。右侧的立方体是等距投影。*


    ![](index-256_1.jpg)


    有许多游戏采用这种渲染世界的方法。与俯视图相比，等距视图对用户来说看起来更自然。当你玩棋盘游戏时，你不会直接从正上方看棋盘。当中世纪的将军率领军队作战时，他也不会从热气球上俯瞰战场。


    让我们看看在`canvas`上创建基于等距投影的引擎需要什么。最重要的是，我们在本章中介绍的优化方法并非俯视图游戏所独有。它同样适用于“等距游戏”。唯一的区别在于绘制瓦片的方式以及在坐标系之间转换的方式。


    在等距游戏中，瓦片是菱形的，其宽度是高度的两倍。因此，它们形成的网格不是矩形的；奇数行的瓦片相对于偶数行的瓦片会偏移半个宽度。所以，等距瓦片的渲染代码需要进行调整。**图6-17展示了一个等距网格的示例。**


    **图6-17.** *等距地图的左侧填充了“空”瓦片，以展示网格的样子。*


    等距瓦片的坐标系也与我们在通常的“方形”投影中使用的坐标系不同。在等距瓦片地图中，至少有两种设置瓦片坐标和渲染瓦片世界的方法。图6-18展示了第一种为瓦片分配坐标的方法。


    ![](index-257_1.jpg)


    ![](index-257_2.jpg)


    **图6-18.** *为等距网格分配坐标的一种方法*


    在这里，地图的坐标轴与`canvas`的坐标轴平行。第二种方法如图6-19所示：将坐标逆时针旋转45度。`x`轴现在指向屏幕的右下角，而`y`轴指向左下角。


    **图6-19.** *绘制瓦片地图的另一种方法*


    这段简短的介绍应该能让您对等距投影是什么以及等距游戏的外观有所了解。我们还没有探讨如何实现等距游戏，但这正是下一章的全部内容。您一定玩过至少几款等距游戏，即使不是在《辐射2》的时代，那么近些年在社交网络中也玩过。等距引擎在吸引人的外观与相对较低的复杂性（例如与3D引擎相比）之间取得了平衡。这就是等距游戏成为社交应用开发者主要目标的原因。


    ## 总结'
  raw: 'In the next chapter, we build the more advanced object renderer, based on
    this


    simple idea of grids.


    ![](index-255_1.jpg)


    ![](index-255_2.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **Isometric View**


    The final part of this chapter is devoted to a quick overview of the isometric


    projection. Until now, we’ve been working on a top-down view. It means that the


    user is looking at the scene from an angle of 90 degrees. Figure 6-15 illustrates


    the difference between top-down and isometric projections.


    **Figure 6-15.** *On the left,* The Legend of Zelda *, published by Nintendo in
    1986, uses an orthogonal (top-down) view. On the right,* Fallout 2 *, created
    by Black Isle Studios and published by Interplay in 1998,* *uses isometric projection.*


    The other interesting way of looking at things is when the camera is slightly


    rotated. Well, in a 2D world, we don’t have the camera to rotate, of course. For
    a


    2D game, an isometric view means a special way of drawing and rendering


    objects that creates the feeling of depth. The definition would be that isometric


    projection is the projection where the angles between axes are the same: 120


    degrees.


    Figure 6-16 shows how a cube looks in the top-down projection that we’re


    making, and the isometric projection.


    **Figure 6-16.** *The cube on the left is in top-down projection—either top view
    or side view, it looks the* *same. The cube on the right is in isometric projection.*


    ![](index-256_1.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **251


    There are a lot of games that use this approach to rendering the world. The


    isometric view looks more natural to the user than the top-down view. When you


    play a board game, you don’t look at the board straight from the top. When a


    medieval general leads his army into battle, he doesn’t look at the battlefield


    from a hot air balloon, either.


    Let’s see what it takes to create an isometric-based engine on canvas. The most


    important point is that the optimization that we introduced in this chapter is
    not


    unique to top-down games. It works almost the same way for ‘ iso-games’’ too.


    The only difference is the way you draw tiles and the way you translate between


    coordinate spaces.


    In isometric games, the tiles are diamond-shaped. They are twice as wide as


    they are tall. Because of that, the grid that they form is not rectangular; the
    tiles in odd rows are half-width shifted compared to the tiles in the even rows.
    So the


    rendering code for isometric tiles needs to be adjusted. **Figure 6-17 shows an
    example of the isometric grid.**


    ****Figure 6-17.** *The left part of the isometric map is filled with “empty”
    tiles to show how the grid looks.*


    The coordinate system for isometric tiles is also different from the coordinate


    system of the usual ‘ square’’ projection that we were working with. In isometric


    tile maps, there are at least two ways of setting the coordinates of tiles and


    rendering the tile world. Figure 6-18 shows the first way to assign coordinates
    to


    the tiles.


    ![](index-257_1.jpg)


    ![](index-257_2.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **Figure 6-18.** *One way to assign coordinates to the isometric grid*


    Here, the axis of the map goes parallel to the axis of the canvas. The second


    way, shown in Figure 6-19, is the following: rotate coordinates 45 degrees


    counterclockwise. The x axis now goes to the bottom-right of the screen, while


    y goes to the bottom left.


    **Figure 6-19.** *The other way to draw the tile map*


    This short introduction should give you a feeling for what isometric projection
    is


    and how isometric games look. We haven’t yet looked at how to implement the


    isometric game, but that’s why we have the entire next chapter. You have surely


    played at least few isometric games, if not in the age of Fallout 2, then recently


    in social networks. Isometric engines balance an appealing look with the


    relatively low complexity (compared to 3D engines, for example). That’s why


    isometric games became a prime target for the developers of social


    applications.


    CHAPTER 6: Rendering Virtual Worlds


    **253


    **Summary**'
