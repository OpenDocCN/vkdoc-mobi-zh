    version usage statistics from Adobe at


    CHAPTE[R 16: Addi](#index_split_000.html#p23)ng Sound


    **[607](#index_split_007.html#p607)


    [www.adobe.com/products/flashplatformruntimes/statistics.](http://www.adobe.com/products/flashplatformruntimes/statistics)


    displayTab3.html.


    The next line adds the onready event listener that fires once the soundManager
    is


    operational and ready to perform actual sound-related tasks. Finally, we load
    the


    sound from the MP3 file, and instruct soundManager to start playback once the


    sound is ready.


    Run the page in the browser, and enjoy the background music. Note that if you


    are using the emulator, you probably hear no sound at this point. This is


    because the emulator doesn’t have the Flash plug-in. If you are going to debug'
  trans: "\n# 第 16 章：添加声音\n\nFlash 组件。正如你所见，对于仍在追赶潮流的浏览器来说，小型 Flash 组件通常扮演着\"备选方案\"\
    的角色。\n\n`SoundManager2` 最大的优点在于其易用性。只需几行代码——你的游戏就能拥有音乐了！\n\n在本章中，我们将为现有游戏《逃亡骑士》添加音效——这个游戏是我们在第\
    \ 14 章测试 Crafty 游戏引擎时创建的。请从第 14 章的游戏中复制代码，或使用你自己的项目。\n\n**图 16-1.** *初始目录结构*\n\
    \n**605**\n\n## 使用 SoundManager2\n\n现在是时候为这个关于逃亡骑士的故事增添一些声音了。但首先，我们需要搭建项目环境。\n\
    \n### 初始设置\n\n第一步是从官方网站 [www.schillmania.com/projects/soundmanager2/doc/download/](http://www.schillmania.com/projects/soundmanager2/doc/download/)\
    \ 下载最新版本的 SoundManager（编写本章时版本为 2.97a）。\n\n然后，将压缩包解压到硬盘上的某个位置。该发行版包含许多演示和工具，但我们项目中只需要其中几个。请执行以下步骤：\n\
    \n1.  将发行版中的 `/script/soundmanager2.js` 文件复制到你的 `js` 文件夹。\n2.  将整个 `swf` 文件夹复制到项目根目录。\n\
    3.  在项目根目录创建一个名为 `sound` 的新文件夹。我们将把音效文件放在那里。\n4.  获取本书附带的 `theme.mp3` 文件，并将其复制到上一步创建的文件夹中。\n\
    \n你的目录结构应如图 16-1 所示。\n\n**注意：** `SoundManager2` 发行版的 `script` 文件夹包含多个文件。它们都具有完全相同的生产功能。带有\
    \ `nodebug` 后缀的文件具有不同的默认设置（所有调试功能均已关闭）；它们没有注释和调试方法。名称中包含 `jsmin` 的文件已用 JSMin（[www.crockford.com/javascript/jsmin.html](http://www.crockford.com/javascript/jsmin.html)）预处理过，JSMin\
    \ 是一种 JavaScript“代码压缩工具”，可以移除源代码中的所有多余空格，使文件更小、下载速度更快。在开发过程中，我们始终使用启用调试功能的原始未处理文件。一旦进入生产环境，请考虑将其替换为\
    \ `nodebug` 压缩版本。\n\n现在，我们准备为游戏添加一些美妙的音效。将清单 16-4 中的代码添加到页面中。\n\n**清单 16-4.**\
    \ *初始化 SoundManager2*\n\n```html\n<script src=\"js/soundmanager2.js\"></script>\n\
    <script>\nsoundManager.url = 'swf/';\nsoundManager.flashVersion = 9;\nsoundManager.onready(function()\
    \ {\n    soundManager.createSound({\n        id:'theme',\n        url:'sound/theme.mp3',\n\
    \        autoLoad:true,\n        onload:function() {\n            this.play();\n\
    \        }\n    });\n});\n</script>\n```\n\n一旦加载了 `soundmanager2.js` 文件，`soundManager`\
    \ 这个“神奇”的对象就会出现在全局命名空间中。前两行初始化基本设置——`swf` 文件夹的路径以及 `SoundManager` 将要使用的 `swf`\
    \ 版本。有两个选项——8 和 9，默认是 8。版本 9 解锁了一些炫酷的新功能，而且你的玩家设备上很可能已经安装了相应版本的 Flash Player。\n\
    \n**注意：** 如果你比较务实，想了解使用旧版本 Flash Player 的用户（不仅限于移动设备）所占的百分比，请参考 Adobe 的官方版本使用统计信息：[www.adobe.com/products/flashplatformruntimes/statistics.displayTab3.html](http://www.adobe.com/products/flashplatformruntimes/statistics.displayTab3.html)\n\
    \n**607**\n\n下一行添加了 `onready` 事件监听器，当 `soundManager` 开始运行并准备好执行实际的音频相关任务时，该监听器会被触发。最后，我们从\
    \ MP3 文件中加载声音，并指示 `soundManager` 在声音准备好后开始播放。\n\n在浏览器中运行该页面，然后享受背景音乐吧。请注意，如果你在使用模拟器，此时可能听不到声音。这是因为模拟器没有\
    \ Flash 插件。如果你要进行调试...\n"
- fmt: "在模拟器中使用声音时，你需要手动在模拟器上安装播放器。\n\n音乐主题只播放一次。通常背景主题应该重复并连续播放。让我们让音乐循环起来。\n\n###\
    \ 循环\n\n循环本身相当容易实现——你只需要设置循环次数（参见清单16-5）。\n\n**清单16-5.** *循环背景主题*\n\n```\nsoundManager.url\
    \ = 'swf/';\nsoundManager.flashVersion = 9;\nsoundManager.onready(function() {\n\
    \  soundManager.createSound({\n    id: 'loopTest',\n    url: 'sound/theme.mp3',\n\
    \    loops: 10000,\n    autoLoad: true,\n    onload:function() {\n      this.play();\n\
    \    }\n  });\n});\n```\n\n`SoundManager`不支持无限循环，所以当你需要无限播放时，只需使用一个像10000这样的大数字——对于一个五秒钟的声音样本，这将为你提供大约13小时的连续播放——对于休闲游戏来说已经足够了。\n\
    \n然而，音乐循环比这要棘手得多。就像图块必须与其相邻图块匹配以创建坚实地形的错觉一样，循环的结尾必须匹配开头。否则，玩家会清晰地听到乐曲在几毫秒后结束并重新开始。这将不是连续的环境背景音乐，而是一组令人厌烦的循环。\n\
    \n如果你将文件保存为`MP3`或类似的`有损格式`，你可能会发现另一个意外。即使声音在声音编辑器中完美循环，一旦在游戏中播放，每次迭代后你都会听到一声“咔哒”声。这是一个由有损压缩算法的特性导致的众所周知的问题。\n\
    \n看看图16-2，它显示了一个简单的波形——一个生成的声音（就像电视公司用来屏蔽粗俗语言的那种）。图像的顶部显示了原始波形，底部显示了保存为`MP3`的相同波形。\n\
    \n**图16-2.** *原始波形（顶部）和压缩后的MP3文件。由于压缩算法，前50毫秒几乎是静音的。*\n\n请注意，压缩后的波形以大约50毫秒的静音开始。`MP3`就是这样工作的：它无法像我们希望的那样保存声音的每一个比特，这导致了烦人的“咔哒”声。然而，这当然不是游戏开发的借口。我们希望背景主题播放流畅。\n\
    \n有两种方法可以解决这个问题。如果样本以相对安静的片段（甚至静音）开始和结束，那么“咔哒”声就听不到了。它仍然存在，但玩家会认为这是音乐作品中安静的部分，不会感到烦躁。\n\
    \n另一种方法是使用专门的编码软件，它可以重新编码`MP3`并使“咔哒”声稍微“轻”一些。这背后的确切机制超出了本章的范围。如果你对更深入的解释感兴趣，请参考以下有用的链接：\n\
    \n- [www.schillmania.com/projects/soundmanager2/demo/api/#looping](http://www.schillmania.com/projects/soundmanager2/demo/api/#looping)：`SoundManager`关于循环的文档。\n\
    - [www.flickr.com/photos/schill/4499319436/](http://www.flickr.com/photos/schill/4499319436/)：关于如何为`SoundManager`制作流畅声音循环的快速“指南”。\n\
    - [www.compuphase.com/mp3/mp3loops.htm](http://www.compuphase.com/mp3/mp3loops.htm)：一个名为`MP3Loop`的工具的主页。顾名思义，该工具用于创建“循环”的`MP3`文件。该页面很好地解释了为什么`MP3`编码器会这样表现以及如何修复它。\n\
    \n从现在开始，我们将假设你的`MP3`文件已经为你的游戏准备好了。\n\n### 为游戏添加声音\n\n现在我们已经准备好为游戏本身添加声音了。我们的游戏将包含三种声音：主主题、一个点击声和一个“游戏结束”声。主"
  raw: 'sound with the emulator, you need to install the player manually on the


    emulator.


    The music theme plays only once. Usually the background theme should repeat


    and play continuously. Let’s make the music loop.


    Looping


    Looping by itself is quite easy to implement-----all you need is to set the number


    of loops (see Listing 16-5).


    **Listing 16-5.** *Looping the Background Theme*


    soundManager.url = ''swf/'';


    [soundManager.flashVersion = 9;](#index_split_000.html#p16)


    soundManager.onready(function() {


    soundManager.createSound({


    id: ''loopTest'',


    url: ''sound/theme.mp3'',


    loops: 10000,


    autoLoad: true,


    onload:function() {


    this.play();


    }


    });


    });


    SoundManager doesn’t support infinite loops, so when you need infinite


    playback, just use a big number like 10000-----it will give you around [13 hou](#index_split_000.html#p20)rs
    of continuous playback for a five-second sound sample-----more than enough for
    a


    casual game.


    However, music looping is much trickier than this. Just as tiles must match their


    neighbors to create the illusion of solid terrain, the end of the loop must match


    ![](index-608_1.jpg)


    CHAPTER [16: Addi](#index_split_000.html#p23)ng Sound


    [608](#index_split_007.html#p608)


    the beginning. Otherwise, a gamer will clearly hear that the composition has


    ended and started again milliseconds later. It will not be continuous ambient


    background music, but a set of irritating loops.


    If you save your files in MP3 or a similar lossy format, you may find another


    surprise. Even though the sound loops perfectly in the sound editor, you hear
    a


    ‘ clank’’ after each iteration once the sound is played in the game. This is a
    well-


    known problem caused by the peculiarities of lossy compression algorithms.


    Take a look at Figure 16-2, which shows a simple waveform-----a generated tone


    (like the one that television companies use to censor harsh language). The top


    part of the image shows the original waveform, and the bottom part shows the


    same waveform saved as an MP3.


    **Figure 16-2.** *The original waveform (top) and the compressed MP3 file. The
    [first 50 m](#index_split_000.html#p56)* *illiseconds are* *almost silent because
    of the compression algorithm.*


    Notice that the compressed one starts [with 50 (or](#index_split_000.html#p56)
    so) milliseconds of silence.


    That’s how MP3 works: it simply can’t save every bit of the sound as we would


    like it to, and it results in an irritating ‘ clank’’ sound. However, this is
    not an excuse for game development, of course. We want smooth playback for our


    background theme.


    There are two ways to address this issue. If the sample starts and ends with a


    relatively quiet fragment, or even silence, the ‘‘clank’’ is not audible. It is
    still there, but the player thinks that this is a quiet part of the musical composition


    and it will not irritate him.


    The other way is to use specialized encoding software that can re-encode MP3


    and make the clank slightly ‘ lighter.’’ The exact mechanism behind this is


    CHAPTE[R 16: Addi](#index_split_000.html#p23)ng Sound


    **[609](#index_split_007.html#p609)


    beyond the scope of this chapter. If you are interested in a more in-depth


    explanation, follow these useful links:


     [www.schillmania.com/projects/soundmanager2/demo/api/#loo](http://www.schillmania.com/projects/soundmanager2/demo/api/#loo)


    ping: The SoundManager documentation on looping.


     [www.flickr.com/photos/schill/4499319436/: A quick ‘](http://www.flickr.com/photos/schill/4499319436/:)‘how
    to’’ on making smooth sound loops for SoundManager.


     [www.compuphase.com/mp3/mp3loops.htm: The](http://www.compuphase.com/mp3/mp3loops.htm:)
    home page of a utility called MP3Loop. As the name implies, this utility is used


    to create ‘‘looping’’ MP3 files. The page has a pretty good


    explanation of why the MP3 encoder behaves that way and


    how to fix it.


    From now on, we will assume that your MP3 files are already prepared for your


    game.


    Adding Sound to the Game


    Now we are ready to add the sound to the game itself. Our game will have three


    sounds: the main theme, a click sound, and a ‘‘game over’’ sound. The main'
