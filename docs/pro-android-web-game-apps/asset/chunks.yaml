  trans: "\n# 每个 Web 服务器都应实现的功能\n\n每个 Web 服务器都应具备的功能包括：日志记录、错误报告以及对不同环境的支持。在前一节中，你可能已经注意到了几个新的中间件：`logger`和`errorHandler`。现在我们来深入了解它们，以此结束对\
    \ Express 框架的初步认识。\n\n## 报告错误\n\n日志记录和错误报告都是非常重要的任务——无法想象一个运行在生产环境中的严肃 Web 服务器会忽视这两者中的任何一个。我们从错误报告系统开始，编写一些会产生错误并引发异常的代码（见清单\
    \ 10-28）。这是最简单的一步——引入错误可比解决错误容易多了！\n\n**清单 10-28.** 制造人为错误以展示服务器如何处理\n\n```\n\
    var express = require('express');\nvar app = express.createServer();\napp.set('views',\
    \ __dirname + '/views');\napp.set('view engine', 'ejs');\napp.use(express.cookieParser());\n\
    app.use(express.session({ secret: \"gameserversession\" }));\napp.use(app.router);\n\
    app.use(express.static(__dirname + '/public'));\napp.get('/', function(req, res)\
    \ {\n  var foo = {};\n  var bar = foo[\"bar\"].baz;\n  res.send(\"这行本不应可见\");\n\
    });\napp.listen(80);\n```\n\n显然，尝试访问未定义属性的某个属性必然会导致问题。启动服务器并发送请求，错误信息会同时输出到控制台和渲染在网页上。在我的环境中，堆栈跟踪信息如下所示：\n\
    \n```\nTypeError: Cannot read property 'baz' of undefined\n  at C:\\apps\\projects\\\
    jsbook\\chap10\\err.js:18:25\n  at callbacks (C:\\apps\\projects\\jsbook\\chap10\\\
    node_modules\\express\\lib\\router\\index.js:272:11)\n  at param (C:\\apps\\projects\\\
    jsbook\\chap10\\node_modules\\express\\lib\\router\\index.js:246:11)\n  at pass\
    \ (C:\\apps\\projects\\jsbook\\chap10\\node_modules\\express\\lib\\router\\index.js:253:5)\n\
    \  at Router._dispatch (C:\\apps\\projects\\jsbook\\chap10\\node_modules\\express\\\
    lib\\router\\index.js:280:4)\n  at Object.handle (C:\\apps\\projects\\jsbook\\\
    chap10\\node_modules\\express\\lib\\router\\index.js:45:10)\n  at next\n```\n\n\
    这样的错误信息对开发者来说或许还能接受，但绝对不适合生产环境，原因有两点。首先，错误报告显然不够用户友好。你的最终用户不需要知道具体出了什么问题，也不需要了解是哪些代码行导致服务器崩溃。用户真正需要知道的只是：发生了某些问题，你的应用程序无法处理该请求。他或许应该再试一次——毕竟错误可能是临时性的。\n\
    \n同时，最好告诉用户：\"当你看到这条信息时，我们的技术支持团队已经在调查这个错误，并且正在尽最大努力修复它。\" 关注这类小细节是让项目显得可靠的关键。浏览器窗口中的堆栈跟踪会让你的系统看起来完全崩溃了，仿佛内部电线和齿轮正通过船体上的一个洞盯着用户。而一个设计良好的自定义错误页面则会让用户觉得这个错误并不严重。嘿，我们是游戏开发者——我们必须制作有趣的错误页面！想找一些错误页面设计的灵感，可以看看\
    \ GitHub 的 404 页面（见图 10-12）[`github.com/404`](https://github.com/404)。\n\n![](img/index-442_1.jpg)\n\
    \n**图 10-12.** 一个优秀错误页面的示例，它具备一些动态特性。当你在页面周围移动鼠标时，由于简单的视差效果，页面会感觉\"活\"起来。\n\n\
    默认错误处理的第二个问题是，错误除了记录在日志中之外，不会在其他任何地方被报告。想象一下，你的朋友打电话给你说：\"嘿，我刚试玩了你那款很棒的新在线游戏，但当我进入精灵森林时，它显示了一个花哨的错误界面。\"\
    \ 如果你保留默认的错误处理，你甚至不会知道发生了什么——错误只会输出到控制台。这并非是报告此类重要错误的可靠方式。\n"
- fmt: "好的，这是根据您的要求和示例排版后的Markdown文档。\n\nSure, you can save the console output to\
    \ a log file, but you’ll have to read through it regularly in order to check if\
    \ everything is still fine. Trust me, you’ll be too lazy to do it sooner or later.\
    \ Programmers are lazy----this is one of our virtues. What if you can say to your\
    \ friend, ‘Thanks for reporting. I’m already looking into it. I got the report\
    \ on my e-mail.’ This all is doable with Express.\n\nThe first step is to add\
    \ the `errorHandler` middleware that can be configured to show a better-looking\
    \ (but still geek-friendly) error page in the browser. Add the following line\
    \ to the end of your middleware list:\n\n```javascript\napp.use(express.errorHandler());\n\
    ```\n\nThis middleware is only intended for the development phase. Figure 10-13\
    \ shows how the exception screen will look.\n\n![](index-443_1.jpg)\n\n**Figure\
    \ 10-13.** *A better-looking error report. Still scary for users since reading\
    \ stack traces makes them think their computer will explode.*\n\nFor the production\
    \ environment, we should provide a better error page. If you register an arbitrary\
    \ four-argument function to the `use()` method, it is treated as the error handler\
    \ and works as middleware. It is fully integrated into the life cycle and can\
    \ decide if it wants to handle a certain error itself or pass it to the next layer.\
    \ Listing 10-29 illustrates how multiple error-handling middleware might work\
    \ together.\n\n**Listing 10-29.** *Adding Custom Error-Handling Middleware*\n\n\
    ```javascript\napp.use(express.cookieParser());\napp.use(express.session({ secret:\
    \ \"gameserversession\" }));\napp.use(app.router);\napp.use(express.static(__dirname\
    \ + '/public'));\napp.use(function(err, req, res, next) {\n  if (canHandleMyself())\
    \ {\n    res.render(\"error\", {layout: false});\n  } else {\n    // Pass to the\
    \ standard errorHandler middleware defined below\n    next(err);\n  }\n});\napp.use(express.errorHandler());\n\
    ```\n\nThe code in the example is very simple, but it implements a useful functionality:\
    \ it hides the scary details of the error from the user and shows a fancy error\
    \ page. With the current setup, it looks for the `error.ejs` file in the `views`\
    \ folder and renders it instead of the default errors. I leave it up to you to\
    \ design the error page that you like. The `canHandleMyself()` is the function\
    \ that you implement yourself. If you don’t need several layers of error-handlers,\
    \ feel free to rewrite the code so that it returns the custom error page all the\
    \ time.\n\n```javascript\napp.use(function(err, req, res, next) {\n  res.render(\"\
    error\", {layout: false});\n});\n```\n\nNow we’re coming to the final task of\
    \ saving the error somewhere and notifying the support team about the error. I\
    \ show you how to write an exception to the log file in the next section of this\
    \ chapter, along with other logger-related issues. Let’s move to notifications\
    \ for the support team. The most obvious choice is to send an e-mail. As usual\
    \ for such a typical task, there’s a module that does it already. It is called\
    \ `nodemailer` (https://github.com/andris9/Nodemailer). You install it by running:\n\
    \n```bash\nnpm install nodemailer\n```\n\nand then use it like in Listing 10-30.\n\
    \n**Listing 10-30.** *Using Mailer to Notify Support Team About the Error*\n\n\
    ```javascript\nvar express = require(\"express\");\nvar email = require(\"nodemailer\"\
    );\nvar app = express.createServer();\n\napp.set('views', __dirname + '/views');\n\
    app.set('view engine', 'ejs');\n\napp.use(express.cookieParser());\napp.use(express.session({\
    \ secret: \"gameserversession\" }));\napp.use(app.router);\napp.use(express.static(__dirname\
    \ + '/public'));\n\n// Send the email to the team\napp.use(function(err, req,\
    \ res, next) {\n  res.render(\"error\", {layout: false});\n  var transport = nodemailer.createTransport(\"\
    SMTP\", {\n    service: \"Gmail\",\n    auth: {\n      user: \"juriy.bura@gmail.com\"\
    ,\n      pass: \"mysecretpass\" // No, this is not my real password\n    }\n \
    \ });\n\n  transport.sendMail({\n    from: \"node@juriy.com\", // from\n    to:\
    \ \"juriy.bura@gmail.com\", // to\n    subject: \"Error report\", // subject\n\
    \  });\n});\n```"
