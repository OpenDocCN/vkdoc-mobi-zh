- fmt: '# CHAPTER 15: Building Native Applications


    It provides a platform for third-party plug-ins, which is a standard way to extend
    the core functionality with custom features.


    `Cordova` is not an Android-specific project; it has a similar set of tools for
    iOS, Symbian, Blackberry, and several other platforms. The ultimate goal of this
    project is to provide a way for developers to port existing HTML5 applications
    to different mobile platforms as native apps, distribute them via markets, and
    access the device-specific APIs. This is exactly what we need.


    Let’s start by installing `Cordova` and its dependencies.


    ## Setting up Cordova


    There’s no special setup for `Cordova`—download the archive from the official
    site ([http://phonegap.com](http://phonegap.com)) and extract the folder called
    `lib/android` from the archive. There’s no need to set any environment variables
    and such; simply remember where you extracted it.


    ## Setting up Apache Ant


    Apache [Ant (http://ant.apache.org)](http://ant.apache.org) is the automated build
    system, and an XML-based language for complex build scripts. In order to use Apache
    `Cordova` and create native application, we first need to install `Ant`.


    **NOTE:** If you are using a Mac, you may already have `Ant` installed. Open the
    command line and type `ant –version`. If you see the version number (like `1.8.2`),
    then `Ant` is ready for work; otherwise, install it as described next.


    Download the latest version of the `Ant` distribution from the official web site
    at [http://ant.apache.org/bindownload.cgi](http://ant.apache.org/bindownload.cgi)
    and extract the contents of the archive into the folder of your choice. Create
    the environment variable `ANT_HOME` and point it to the folder that you just extracted.
    Modify the `PATH` variable and add `ANT_HOME\bin` to the path so that the executables
    are available from the command line.


    Type:

    ```

    ant –version

    ```


    You should see the output with the information about the build—the version and
    the date:

    ```

    Apache Ant(TM) version 1.8.2 compiled on December 20 2010

    ```


    If you see something similar, `Ant` is successfully installed on the system.


    ## Building Native Application


    At this point we need to create a real native Android project. We will not do
    a lot of Java programming, even though we have to edit a couple of Java files.
    As mentioned earlier, the details of Android development are outside the scope
    of this book. If you trust me a little, however, and follow along, you’ll have
    a good idea of what you can do. If you prefer to dig a little deeper, feel free
    to check out the official Hello World tutorial for native Android development
    ([http://developer.android.com/resources/tutorials/hello-world.html](http://developer.android.com/resources/tutorials/hello-world.html)).


    ## Creating an Empty Android Project


    The first step is to create an empty Android project and try to launch it on a
