    # `imageManager.loadImages();`


    现在我们已有足够的工具来实现事件处理 API，它能够隐藏基于触摸与基于鼠标输入之间的差异，让我们专注于编写游戏，而非处理事件的具体细节。


    # 第五章：事件处理与用户输入


    ## 自定义事件


    自定义事件 API 背后的理念是为触摸事件和鼠标事件提供"最小公分母"接口。有三对事件的工作方式几乎相同：`mousedown`-`touchstart`、`mousemove`-`touchmove`
    和 `mouseup`-`touchend`。正是"几乎"这个词让开发者的生活变得更加艰难。让我们从再次分析事件开始，找出它们的共同点和差异。


    第一个主要差异是 `targetTouches` 对象。它仅适用于触摸屏，但由于 Android 浏览器尚未广泛支持多点触控，这一差异可以安全地忽略。多点触控支持目前并不相关，但后续处理起来也很容易。


    以下是三个事件组：


    - **按下事件**：由 `mousedown` 和 `touchstart` 事件表示。它们标志着交互的开始：用户触摸了屏幕或按下了鼠标按钮。当用户处于此状态时，可以执行两种操作之一：开始移动控制器（鼠标或手指），或者立即释放并触发"点击"。


    - **抬起事件**：由 `mouseup` 和 `touchend` 表示。它们的工作方式相同，但 `touchend` 不提供用户手指抬起位置的坐标。此时不再有触摸，这意味着可能没有坐标（鼠标没有这个问题，因为光标停留在屏幕上，`mouseup`
    的坐标是有效的）。为了模拟与触摸事件相同的行为，我们必须跟踪触摸的最后已知坐标，并在用户抬起手指时提供这些坐标。


    - **移动事件**：由 `mousemove` 和 `touchmove` 表示。最重要的区别在于，鼠标可以有两种移动类型：悬停（在按钮未按下时移动光标）和拖动（在按钮按下时移动光标）。由于触摸屏没有对应的悬停操作，我们必须忽略悬停。同时，我们必须跟踪按钮的状态，以便在使用鼠标时区分悬停和拖动。


    移动事件值得更多关注。按下和抬起事件相对简单：它们由一对发生事件时的坐标 `x` 和 `y` 完全描述。移动具有稍复杂的性质。对于处理移动的客户端 API
    而言，通常仅了解光标的当前位置是不够的。你还需要知道增量（delta），即自上次移动事件以来位置的变化。这样，客户端 API 就可以计算出移动的速度，例如。我们的目标是构建一个便捷易用的
    API，使诸如增量之类的基本信息能够开箱即用。图 5-3 展示了增量值。


    **图 5-3.** *增量值：移动的实际"量"。该参数在游戏开发中经常使用。*


    另一个重要问题是，用户可能会在并不真正希望时意外触发"移动"。如果没有特殊处理，每一次微小的移动都会被当作"拖动"操作，而不是"点击"操作。我们的生理结构决定了手指会一直微微颤抖，即使你无法察觉，但高灵敏度的触摸界面常常会检测到移动而非点击。使用这样的界面相当困难且令人恼火，尤其当这两种操作在游戏中具有不同含义时。


    在实践中，微小移动的问题通过设定一个特殊的移动阈值来解决，即围绕用户最初点击屏幕位置的半径区域。此区域内的所有移动都被视为无意的

