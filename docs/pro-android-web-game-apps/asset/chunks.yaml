    CHAPTER 14: JavaScript Game Engines


    The first function creates the sprite objects for every loaded image.


    drawTerrain() and drawObjects() are rather self-explanatory: they use the same


    sprite-drawing technique as in the previous examples, the only difference is that


    the sprites are now arranged in an order suitable for isometric view.


    **NOTE:** Crafty has built-in support for an isometric view


    [(http://craftyjs.com/api/](http://craftyjs.com/api/Crafty-isometric.html)


    [Crafty-isometric.html](http://craftyjs.com/api/Crafty-isometric.html)). However,
    this chapter draws the terrain “by hand” just to keep things simple and straightforward.


    If you launch the application, you should see a rendered landscape with a


    couple of houses and an arch that appears right after the loading screen, as


    shown in Figure 14-10.


    **Figure 14-10.** *Isometric terrain and objects rendered with Crafty*


    **Animation**


    Animation in Crafty is a matter of a few lines of code. Not more than you just


    wrote to load the sprites. To define the animation, you need to assign the


    SpriteAnimation component to the entity and specify the frames of animation


    sequence. The following code shows how to define the animation for the knight:


    Crafty.e("2D, Canvas, knight, SpriteAnimation")


    .attr({x: 100, y: 280})


    .animate("move ", 0, 0, 15)


    This code says, ‘ grab the sprite sheet of the knight component and create an


    animation sequence called move.’’ The sequence starts at cell (0, 0)-----the top-


    left corner of the image-----and loops 15 frames to the right. If this concept


    sounds a little vague, Figure 14-11 should make it clear (the image is showing


    only 5 out of 15 frames).


    ![](index-559_1.jpg)


    CHAPTER 14: JavaScript Game Engines


    **559


    **Figure 14-11.** *The way Crafty treats animation sequences: the first parameter
    is the coordinates of the*


    *“anchor” frame, the last one is the number of frames in the sequence.*


    When the animation sequence is created, you can execute it straightaway, as


    shown in Listing 14-9.


    **Listing 14-9.** *Starting an Animation Sequence*


    Crafty.e("2D, Canvas, knight, SpriteAnimation, Mouse")


    .attr({x: 100, y: 280})


    .animate("move ", 0, 0, 15)


    .animate("move", 15, -1)


    The last line launches the sequence that we just defined. The first parameter
    is


    the name of the sequence ("move"), the second parameter is the duration of the
    animation, and the final one is the repeat count, where -1 stands for infinity.


    Reload the page and enjoy the knight running in the same place. If you want him


    to move somewhere, add the highlighted code in Listing 14-10.


    **Listing 14-10.** *Moving the Knight*


    Crafty.e("2D, Canvas, knight, SpriteAnimation, Mouse")


    .attr({x: 100, y: 280})


    .animate("move", 0, 0, 15)


    .animate("move_right", 15, -1)


    .bind("EnterFrame", function() {


    this.x += 0.8;


    this.y += 0.4;


    });


    The bind() function registers a listener to the EnterFrame event. EnterFrame is


    fired for every animation frame, giving you the chance to update the position
    of


    the sprite. Refresh the code, and see the knight running away! Time to catch


    him!


    CHAPTER 14: JavaScript Game Engines


    **Interaction with Entities and Event System**


    Crafty has a custom event system that might be a little confusing when you first


    start to work with this engine. Crafty supports two types of events: native


    browser events and custom Crafty events. For example, the following code


    adds a DOM event listener to the DOM component that backs up the entity (if


    there is one):


    Crafty.addEvent(this, entity._element, "mousedown", function() {


    alert(“hi”);


    });


    The code in Listing 14-11 creates a listener to the custom Crafty event.


    **Listing 14-11.** *Adding a Custom Crafty Event Listener to the Entity*


    Crafty.e("2D, Canvas, SpriteAnimation, Mouse")


    .attr({x: 100, y: 280})


    .bind("MouseDown", function() {


    alert(“hi”);


    });


    As we discussed in Chapter 5, browser events are often not enough for building


    complex games, which is why Crafty distinguishes between the two. Browser'
