- fmt: "# Markdown 排版结果\n\n`value`（如`\"application/x-custom-event-stream\"`），浏览器不会等待接收完整的响应体。相反，它会将服务器写入`XHR`对象的`responseText`的所有内容追加到末尾，并触发`onreadystatechange`（以及Level\
    \ 2中的`onprogress`），让您有机会从流中提取新消息。请查看列表11-10和11-11中更新的客户端和服务器代码。\n\n**列表11-10.**\
    \ *XHR Streaming Transport：示例客户端*\n\n```javascript\nfunction init() {\n  pollServer();\n\
    }\n\nfunction pollServer() {\n  var responseMarker = 0;\n  var xhr = new XMLHttpRequest();\n\
    \  console.log(\"Requesting\");\n  xhr.open('GET', 'lobby');\n\n  xhr.onload =\
    \ function(e) {\n    console.log(\"Server closed the stream, reconnect\");\n \
    \   setTimeout(pollServer, 4);\n  };\n\n  xhr.onprogress = function(e) {\n   \
    \ if (this.readyState == 3 && this.status == 200) {\n      var response = xhr.responseText.substr(responseMarker);\n\
    \      responseMarker = xhr.responseText.length;\n      console.log(response);\n\
    \    }\n  };\n\n  xhr.onerror = function(e) {\n    console.log(\"Error, retrying\"\
    );\n    setTimeout(pollServer, 4);\n  };\n\n  xhr.send();\n}\n```\n\n客户端的代码发生了显著变化。此版本的代码依赖`onprogress()`函数来获取新事件，而不是通常的`onload()`。此外，新消息被追加到`responseText`的末尾，因此要使用所描述的方法，必须从整个响应字符串中手动提取最新消息。\n\
    \n**列表11-11.** *XHR Streaming：示例服务器*\n\n```javascript\nvar clients = [];\n\n//\
    \ send notification with random intervals\n(function() {\n  notifyClients();\n\
    \  setTimeout(arguments.callee, Math.floor((Math.random() * 10000)));\n})();\n\
    \n/**\n * Sends the new event data to every connected client\n */\nfunction notifyClients()\
    \ {\n  clients.forEach(function(res) {\n    res.write(\"new event data\");\n \
    \ });\n  // clients = []; // Do not clean the array, clients stay connected\n\
    }\n\napp.get(\"/lobby\", function(req, res) {\n  res.contentType(\"application/x-custom-event-stream\"\
    );\n  clients.push(res);\n  console.log(\"Added client, now \" + clients.length\
    \ + \" connected\");\n});\n```\n\n服务器几乎保持不变。更改的部分已加粗。首先，服务器向浏览器发送自定义的`contentType`。然后，当新消息到达时，它会将新消息写入客户端流中。`write()`函数不会关闭底层连接，因此此时无需清除客户端数组（当客户端断开连接时仍需清除，否则数组会保留垃圾数据；但就这个简单的演示而言，它工作得很好）。流式传输的主要优势在于，在消息密集的环境中，客户端无需在每条消息后重新建立连接。\n\
    \n完整的XHR流式传输示例应用程序位于`03.streaming`文件夹中，与本章的其他代码一起提供。\n\n## 过时的解决方案\n\n本节介绍了一些以前使用过但已被其他API替代的传输方式，这些API以更好的方式解决了问题。这些传输方式包括：\n\
    \n- JSONP轮询\n- Flash Socket\n- Forever IFRAME\n\n### JSONP轮询\n\nJSONP轮询旨在解决从与客户端不同域的服务器加载数据的问题。例如，如果服务器位于`http://server.example.com`，而客户端HTML页面从`http://client.example.com`加载，由于同源策略的限制，它们无法通过`XHR`进行通信，这是一种安全限制，阻止了`XHR`向其他域发送请求。\n\
    \nJSONP背后的技术是创建新的`<script>`元素并将其附加到文档的`body`中。由于`script`元素可以从任何域加载脚本，因此没有安全限制阻止请求检索数据。\n\
    \nJSONP传输已过时，因为现在有一种新的API以标准方式规定域间资源共享：跨域资源共享（CORS）。"
