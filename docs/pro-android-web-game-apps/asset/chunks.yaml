    # 第 12 章：制作多人游戏


    ## 497


    不同的是 `Node.js` 与浏览器环境下类的发布方式。


    幸运的是，调整组件代码使其在两种环境下都能工作并不太难。我们先来看看代码清单 12-8 中的代码。


    **代码清单 12-8.** *为在浏览器和 Node.js 中使用而对类代码进行封装*


    ```

    (function(exports) {


    function BoardModel(cols, rows) {


    /* 此处为常规构造函数 */


    }


    /* BoardModel.js 的其余代码 */


    // 将 API 发布到外部世界


    exports.BoardModel = BoardModel;


    })(typeof global == "object" ? exports : window);

    ```


    从最后一行开始阅读代码。最后一行试图检测当前执行环境。如果当前作用域中定义了 `global` 对象，则代码由 `Node.js` 执行，否则由浏览器执行。


    **注意：** 当然，这种检测方式远非完美。例如，如果有人在浏览器中定义了 `window.global` 变量，这段代码就会失效。然而在撰写本文时，还没有更好的方法来检测
    JavaScript 模块的执行环境。


    代码清单的最后一行将 `exports` 或 `window` 对象作为参数传递给匿名函数。接下来的代码片段相当简单：构造函数及其他函数和变量照常定义，只是它们现在属于函数的内部作用域（而不是像之前那样属于全局作用域）。最后，我们必须让构造函数对外部世界可用：`exports.BoardModel
    = BoardModel` 正是实现这一目的。在 `Node.js` 中，构造函数之后像往常一样通过调用 `require()` 来获取；而在浏览器中，这段代码等同于
    `window.BoardModel = BoardModel`，这简单地将构造函数追加到浏览器的全局作用域中。


    这种技术远非完美，但比代码复制要好得多。要完成此任务，请将更新后的 `Board.js` 文件添加到 `public/js` 文件夹中。放在这个位置，客户端和
    `Node.js` 都可以访问到它。


    从第 10 章中获取旧版本的 `BoardModel.js` 文件。按照代码清单 12-8 所示进行更新，并保存到 `public/js/BoardModel.js`
    中。该文件


