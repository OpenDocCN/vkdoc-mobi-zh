    \ and look at the output. It should print this single line to the console:\n\n\
    ```\nGot 200 saying [{\"hello\":\"World\"}]\n```\n\nThe client-side function looks\
    \ quite similar to the code that we used to download the images from the server\
    \ (Chapter 4). The major difference is that we receive a textual response instead\
