    \n执行以下命令生成一个包含 2048 位 RSA 密钥的密钥库：\n\n```\nkeytool -genkey -v -keystore juriy-android.keystore\
    \ -alias android-release -keyalg RSA -keysize 2048 -validity 10000\n```\n\n`keytool`\
    \ 会提示您回答几个问题，如下方我的示例密钥创建输出所示。回答问题并非强制，因此您可以根据实际情况任意回答。\n\n```\n输入密钥库密码：\n再次输入新密码：\n\
    您的名字与姓氏是什么？\n  [未知]：Juriy Bura\n您的组织单位名称是什么？\n  [未知]：\n您的组织名称是什么？\n  [未知]：\n您所在的城市或地区名称是什么？\n\
    \  [未知]：Kiev\n您所在的州或省份名称是什么？\n  [未知]：\n该单位的双字母国家代码是什么？\n  [未知]：UA\nCN=Juriy Bura,\
    \ OU=Unknown, O=Unknown, L=Kiev, ST=Unknown, C=UA 是否正确？\n  [否]：是\n正在生成 2.048 位\
    \ RSA 密钥对和自签名证书 (SHA1withRSA)\n有效期为 10.000 天\n用于：CN=Juriy Bura, OU=Unknown, O=Unknown,\
    \ L=Kiev, ST=Unknown, C=UA\n输入 <android-release> 的密钥密码\n    （如果与密钥库密码相同，则按回车）：\n\
    [正在存储 juriy-android.keystore]\n```\n\n密钥库是一个简单的文件，包含一个或多个密钥和证书。密钥库中的每个密钥都由其自己的密码保护，并有一个别名——您用来引用该密钥的名称。文件创建后，应该如下所示，请检查它是否为有效的密钥库，并且其中包含别名为\
    \ `android-release` 的密钥：\n\n```\nkeytool -list -v -keystore juriy-android.keystore\n\
    输入密钥库密码：\n\n密钥库类型：JKS\n密钥库提供者：SUN\n\n您的密钥库包含 1 个条目\n\n别名名称：android-release\n创建日期：2012\
    \ 年 7 月 10 日\n条目类型：PrivateKeyEntry\n证书链长度：1\n证书[1]：\n所有者：CN=Juriy Bura, OU=Unknown,\
    \ O=Unknown, L=Kiev, ST=Unknown, C=UA\n签发者：CN=Juriy Bura, OU=Unknown, O=Unknown,\
    \ L=Kiev, ST=Unknown, C=UA\n序列号：4f357fb2\n有效期自：2012 年 2 月 10 日星期五 22:36:02 EET\
    \ 至：2039 年 6 月 28 日星期二 23:36:02 EEST\n证书指纹：\n         MD5：  EA:48:BE:09:AA:8A:05:20:AC:04:D6:13:B2:7A:09:05\n\
    \         SHA1：74:ED:15:74:98:D0:A2:1F:89:76:46:E2:B6:2A:48:37:D9:66:AD:5D\n \
    \        签名算法名称：SHA1withRSA\n         版本：3\n*******************************************\n\
    *******************************************\n```\n\n如果您看到类似上述信息，则说明密钥库已准备就绪。\n\
    \n# 签署应用程序\n\n下一步是构建应用程序的“发布”版本，并使用密钥对其进行签名。为此，您需要告诉 Ant 脚本密钥库的位置以及要使用的密钥（别名）。执行以下命令：\n\
    \n```\nant -Dkey.store=<密钥库路径>.keystore -Dkey.alias=<密钥别名> clean release\n```\n\
    \n在构建脚本的某个时刻，`Ant` 会提示您输入两个密码：一个用于密钥库，另一个用于密钥。密码会在您输入时显示在屏幕上，因此请确保无人偷看。\n\n或者，您可以在项目根目录的\
    \ `ant.properties` 文件中添加两行：\n\n```\nkey.store=../<密钥库路径>\nkey.alias=<密钥别名>\n```\n\
    \n如果这样做，您可以在命令行中省略额外参数，直接输入：\n\n```\nant clean release\n```\n\n**注意：** 如果您像我一样对密码过于敏感，可以手动签署软件包。该过程稍微复杂一些，因为它要求您先签名，然后“对齐”应用程序。有关详细信息，请参考官方\
    \ Android 教程 [(http://developer.android.com/guide/publishing/app-signing.html#signapp)](http://developer.android.com/guide/publishing/app-signing.html#signapp)。\n"
- fmt: 'The final step is to check that the signed application is really signed. Execute
    the following line in a console, and check that the output says `jar verified`,
    as in the following.


    > `jarsigner -verify bin/FourBalls-release-unsigned.apk`


    `jar verified.`


    If you did everything right and see this output, then you are ready for the market!


    After you have signed your application with the "production" key, you will not
    be able to install it on top of the "debug" version. If you see a message like
    the following during your build process:


    `[exec] Failure [INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES]`


    then uninstall the older version application:


    > `adb uninstall <package>`


    In my case, I type:


    > `adb uninstall com.juriy.fourballs`


    The reason is that Android will not reinstall the application silently if the
    certificates don’t match.


    ## Publishing on Google Play


    This step requires a small financial outlay. To create an account, you need to
    pay a registration fee, which is $25 at the time of writing.


    **NOTE:** If you are not yet ready to publish your app, I suggest you either skip
    this section, or just read over it quickly to get an idea of how to work with
    the market. You already know enough to create the application, publish it on your
    own site, and show it to your friends and business partners. The next few pages
    of the chapter are solely devoted to Google Play store.


    ![](index-592_1.jpg)


    Go to `https://play.google.com/apps/publish/`, login with your Google account,
    and follow the registration procedure. The first step of registration is shown
    in Figure 15-11.


    **Figure 15-11.** *The first step in registration on the Android Market*


    After you agree with the license agreement and pay the registration fee, you are
    ready for publishing. The initial web page will look like Figure 15-12. Click
    the `Upload Application` button and select the signed version of the file. It
    will not be immediately published, so don’t worry if you don’t feel 100 percent
    ready to go public.


    ![](index-593_1.jpg)


    ![](index-593_2.jpg)


    **Figure 15-12.** *The developer console when you first enter it. No published
    applications so far.*


    The screenshot in Figure 15-10 shows a page that already has one published application.
    If you have just started, you have an empty list of apps.


    When the file is uploaded, you see a quick summary of the APK, as shown in Figure
    15-13.


    **Figure 15-13.** *A new APK summary screen*


    Here you have a chance to review the list of permissions required by application.
    Click `Save` and proceed to the publication form. The form itself is rather long;
    most of the listed items are optional. Still Android Market guidelines recommend
    treating every field as required. For a new game, it is particularly important
    to show a few bright and colorful screenshots and to provide a good description
    of the product. Make people want to play your game!


    The only required images are screenshots and a high-res icon (512 × 512). Everything
    else is optional. However, it is highly recommended to provide as many promotional
    resources as possible. The more the user sees, the more he will like the application—and
    the better the chance that he will download it.


    **NOTE:** There are several ways to create screenshots for your application. The
    simplest way is to load the page in an emulator and create the screenshot with
    the usual screen-capturing tools. The other alternative is to connect to your
    device via a small utility called `DDMS` (Dalvik Debug Monitor Server), which
    is found in the `Tools` folder of your Android SDK. Connect the device with USB
    Debugging enabled, run the tool, select the device from the list, then select
    `Device Screen Capture`. Here you go! You have a screenshot exactly like on a
    real device screen.


