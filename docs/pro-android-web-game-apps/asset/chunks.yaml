- fmt: "### 游戏对象的渲染顺序\n\n游戏对象必须按正确的顺序渲染。图 6-13 展示了使用错误渲染顺序可能发生的情况。岩石本应位于树的后方，但由于渲染顺序错误，它出现在了树的前方。\n\
    \n![图 6-13：错误的渲染顺序](index-251_1.jpg)\n\n**图 6-13.** *错误的渲染顺序*\n\n为了解决这个问题，我们必须确保“更靠后”的对象在更靠近玩家的对象之前被渲染。在\
    \ 2D 世界中，这很容易实现。你可以根据对象底部的坐标对其排序，然后按从远到近的顺序绘制它们。为此，我们向 `SpriteSheet` 类添加了几行代码。我们需要知道帧的边界才能对世界对象进行排序。清单\
    \ 6-19 展示了具体做法。\n\n**清单 6-19.** *向 SpriteSheet 添加代码以获取帧的边界*\n\n```javascript\n\
    _p.getFrameBounds = function(index, x, y) {\n    var frame = this._frames[index];\n\
    \    if (!frame)\n        return;\n    return {\n        x: x - frame[SpriteSheet.FRAME_ANCHOR_X],\n\
    \        y: y - frame[SpriteSheet.FRAME_ANCHOR_Y],\n        w: frame[SpriteSheet.FRAME_WIDTH],\n\
    \        h: frame[SpriteSheet.FRAME_HEIGHT]\n    };\n};\n```\n\n接下来，更新 `WorldObject`\
    \ 自身，使其能向 `WorldObjectRenderer` 报告相对于世界对象位置的边界（参见清单 6-20）。\n\n**清单 6-20.** *更新\
    \ WorldObject 类，添加 getBounds() 函数*\n\n```javascript\n_p.getBounds = function()\
    \ {\n    return this._spriteSheet.getFrameBounds(this._frame, this._x, this._y);\n\
    };\n```\n\n最后，在 `WorldObjectRenderer` 的构造函数中添加排序代码，如清单 6-21 所示。\n\n**清单 6-21.**\
    \ *排序世界对象*\n\n```javascript\nfunction WorldObjectRenderer(objects, viewportWidth,\
    \ viewportHeight) {\n    this._objects = objects;\n    this._objects.sort(function(o1,\
    \ o2) {\n        var bounds1 = o1.getBounds();\n        var bounds2 = o2.getBounds();\n\
    \        return (bounds1.y + bounds1.h) - (bounds2.y + bounds2.h);\n    });\n\
    \    this._viewportWidth = viewportWidth;\n    this._viewportHeight = viewportHeight;\n\
    \    this._x = 0;\n    this._y = 0;\n}\n```\n\n完成对象的排序后，渲染就正确了。\n\n这个简单的问题很容易解决，但它带来了很多影响。在拥有大量世界对象且对象可能移动并打破已排序顺序的情况下，“每帧排序”不再是可行方案。目前，所有对象都是静态的——只有岩石和树木——但一旦你添加了移动的实体，情况就会变得有趣得多。在下一章中，我们将解决这个问题，并构建一个更高级的\
    \ `WorldObjectRenderer` 版本，它也能处理移动。\n\n### 优化\n\n从优化的角度来看，对象的处理方式与常规图块完全相同。规则依然不变：如果你不想浪费任何\
    \ CPU 周期，只绘制你真正需要绘制的内容。我们不会再重复从最简单的案例开始逐步改进的练习——同样的技巧没有必要做两次。让我们直接思考一种近乎最优的对象渲染方式。\n\
    \n我们无法轻易确定需要绘制哪些对象。游戏对象不构成网格，我们也不能像对待图块那样说“本轮我们绘制五号到八号对象”。因此，我们有两个选择。第一，我们可以检查世界中的每一个对象，并决定是否绘制它。是的，这确实是一个选项。例如，假设在你的游戏中，主要角色在房间之间移动；那么房间会逐个加载，并且每个房间相对于屏幕尺寸来说都比较小。这样一来，你可能需要绘制世界中至少\
    \ 50% 的对象。对于拥有较小世界的社交农场类游戏也是如此。在这种情况下，使用最简单的方案来节省编码时间其实是合理的：检查每个对象的边界框，并绘制那些落在可见区域内的对象。\n\
    \n然而，也存在其他情况，比如当你的世界非常大时，玩家……"
  raw: 'Game objects have to be rendered in order. Figure 6-13 illustrates what might


    happen if you use the wrong rendering order. The rock was meant to be behind


    the tree, but due to the wrong rendering order, it appears on top of it.


    ![](index-251_1.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **Figure 6-13.** *Wrong rendering order*


    To fix this issue, we must ensure that the objects that stand ‘ further behind’
    are rendered before the objects that are closer to the player. In a 2D world,
    this is


    quite simple to implement. You sort objects by the position of their bottoms and


    draw them in order from furthest to closest. To do that, we add a few lines of


    code to the SpriteSheet class. We need to know the bounds of the frame in


    order to sort world objects. Listing 6-19 shows how to do it.


    **Listing 6-19.** *Adding Code to SpriteSheet to Get the Bounds of the Frame*


    _p.getFrameBounds = function(index, x, y) {


    var frame = this._frames[index];


    if (!frame)


    return;


    return {


    x: x - frame[SpriteSheet.FRAME_ANCHOR_X],


    y: y - frame[SpriteSheet.FRAME_ANCHOR_Y],


    w: frame[SpriteSheet.FRAME_WIDTH],


    h: frame[SpriteSheet.FRAME_HEIGHT]


    };


    };


    Next, update the WorldObject itself to report the bounds to the


    WorldObjectRenderer with respect to the position of an object in the world (see


    Listing 6-20).


    CHAPTER 6: Rendering Virtual Worlds


    **247


    **Listing 6-20.** *Update the WorldObject Class, Add the getBounds() Function*
    _p.getBounds = function() {


    return this._spriteSheet.getFrameBounds(this._frame, this._x, this._y);


    };


    Finally, add the sorting code to the constructor of the WorldObjectRenderer, as


    in Listing 6-21.


    **Listing 6-21.** *Sorting World Objects*


    function WorldObjectRenderer(objects, viewportWidth, viewportHeight) {


    this._objects = objects;


    this._objects.sort(function(o1, o2) {


    var bounds1 = o1.getBounds();


    var bounds2 = o2.getBounds();


    return (bounds1.y + bounds1.h) - (bounds2.y + bounds2.h);


    });


    this._viewportWidth = viewportWidth;


    this._viewportHeight = viewportHeight;


    this._x = 0;


    this._y = 0;


    }


    Once you sort the objects this way, the rendering is correct.


    This simple issue was quite easy to solve, but it has a lot of implications. When
    it comes to the large world where the objects can move and break the presorted


    order, ‘ sort on every frame’ is no longer an option. Right now, all objects are


    static----just rocks and trees----but once you add moving entities, things start
    to


    get much more interesting. In the next chapter, we will address this issue and


    Download from Wow! eBook <www.wowebook.com>


    build a more advanced version of the WorldObjectRenderer that can also take


    care of movement.


    Optimizations


    From an optimization perspective, objects work exactly the same way as regular


    tiles. The rule for them stays the same: if you don’t want to lose any CPU cycles,


    draw only what you really need to draw. We will not go through the same


    exercise again by starting our implementation from the simplest case and


    gradually improving it----there’s no point in doing the same trick twice. Let’s
    think about a nearly optimal way of rendering objects straightaway.


    We can’t easily determine which objects we have to draw. Game objects do not


    form a grid, and we can’t say ‘ we’re drawing objects from number five to


    number eight this pass’’ as we did with tiles. So we have two options. First,
    we


    CHAPTER 6: Rendering Virtual Worlds


    can look at every object in the world and decide if we should draw it. Yes, this


    really is an option. Let’s say, for example, that in your game, the main character


    moves between rooms; so the rooms load one by one and each room is


    relatively small compared to the screen size. Then chances are that you will


    draw at least 50 percent of the objects in the world. The same is true for social


    farm-like games that have a small world. In this case, it actually makes sense
    to


    save coding time by using the simplest possible scenario: check the bounding


    box of every object and draw those that fall inside the visible area.


    However, there are other cases too, like if your world is so big that the player'
