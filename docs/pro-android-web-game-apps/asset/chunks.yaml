    var offCanvasY = -Math.floor(this._y) - this._offBounds.y*this._tileSize;


    var offCanvasW = Math.min(this._offCanvas.width - offCanvasX,


    this._viewportWidth);


    var offCanvasH = Math.min(this._offCanvas.height - offCanvasY,


    this._viewportHeight);


