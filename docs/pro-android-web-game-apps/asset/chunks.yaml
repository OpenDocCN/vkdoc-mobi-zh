    Resizing of the canvas is the trickiest part. Unfortunately, we can’t make it
    with


    pure CSS, so we’ll have to write few lines of JavaScript. The code in Listing
    3-4


    makes use of browser events that we cover in detail in the Chapter 5. For now,


    you should just believe that it works.


    **Listing 3-4.** *Listening to Browser Events to Resize the Canvas Once the Page
    Is Resized* function init() {


