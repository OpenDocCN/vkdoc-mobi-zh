  trans: "\n# 测量像素的图形编辑器\n\n精灵表的另一个有趣用途是渲染游戏中的光栅字体。游戏可能会使用以位图形式呈现的非常精美的字体，其中每个精灵代表一个字母或字符。\n\
    \n## 光栅字体\n\n构建一个能够使用位图字体渲染字符串的类，其复杂程度可能很简单，也可能相当复杂，具体取决于你所需的功能集。如果你只需要字符串的单行位图表示，那么花五分钟就能构建一个实现该功能的类。另一方面，如果考虑换行、对齐和间距等高级解决方案，则会变得非常复杂。排版是一个广阔而有趣的话题，超出了本书的讨论范围。\n\
    \n## 动画基础\n\n我们正逐渐接近游戏开发中最激动人心的部分之一：动画。当画面开始移动时，你的游戏就变得“活”了起来。看到你第一个动画精灵在屏幕上移动，这是一种令人难以置信的美妙感觉。\n\
    \n### 最简单的动画\n\n如今，人人都知道动画是如何工作的。这背后并没有什么神秘之处。当你足够快地更换帧，并更新屏幕上的画面（改变其形状、位置、切换到动画序列中的下一帧，或同时执行上述所有操作）时，用户就会体验到运动的错觉。画面变得栩栩如生——宇宙飞船飞行并射击，吃豆人逃离追击，坦克转动炮塔。\n\
    \n要创建动画，我们必须实现三个步骤：\n\n1.  随时间更新画面的状态（移动画面、更换帧等）。\n2.  在屏幕上绘制画面。\n3.  等待一段时间，重复前两个步骤，绘制新帧（不要忘记清除前一帧的内容）。\n\
    \n帧变化得越快，动画对用户来说就越流畅。帧变化的速度称为帧率，以每秒帧数（即 FPS）来衡量。\n\n按照我们刚才概述的方案，我们应该创建一个渲染帧的函数，并每隔\
    \ 30 到 50 毫秒调用一次。清单 4-17 展示了实现此功能的代码。\n\n**清单 4-17.** *最简单的画布动画*\n\n```javascript\n\
    var currentFrame = -1;\n\nfunction animate(timestamp) {\n  ctx.fillStyle = \"\
    white\";\n  ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n  currentFrame\
    \ = ++currentFrame % 5;\n  spriteSheet.drawFrame(ctx, currentFrame, 10, 40);\n\
    \n  requestAnimationFrame(arguments.callee);\n}\n\nanimate();\n```\n\n让我们仔细看看这段代码，因为它是本章将要构建的整个动画框架的基础。函数的前两行在第二章中已经熟知：我们用纯白色清空整个画布。在绘制新帧之前，我们必须清除旧帧，因为画布不会自动清除自身，它会将新内容绘制在旧内容之上。这种方法的完整示例可在名为`05.sprite_sheet_animation.html`的文件以及本章的源代码中找到。\n\
    \n名为`current`的变量保存了动画序列中当前帧的索引。该序列总共有五帧。下一行代码`currentFrame = ++currentFrame %\
    \ 5`将计数器加一，并执行取模运算（返回除以五的余数），以确保该数字永远不会大于四。这一行可以用以下更详细的方式重写：\n\n```javascript\n\
    current++;\nif (current > 4)\n  current = 0;\n```\n\n它的作用与清单 4-17 中的那一行完全相同：当计数器达到\
    \ 4 后，它会回到 0，并由此继续。下一行绘制帧，最后一行安排同一函数在 50 毫秒后执行。`animate()`函数的最后一行是一个重要且新颖的概念。JavaScript\
    \ 定时器是一种简单但非常强大的机制，用于安排代码片段稍后执行。每隔几毫秒重绘帧...\n"
- fmt: "`milliseconds`是我们在实现动画时需要处理的核心任务之一。现在我们就来着手处理。\n\n# 第四章：动画与精灵\n\n**注意：**`arguments.callee`是对函数自身的引用。例如，当我在名为`animate`的函数内部时，`arguments.callee`指向的就是这个函数——`animate()`。当你需要在函数内部引用自身时，这是最佳方式。按名称引用有其缺陷。例如，如果你重构代码，需要记得更新另一个引用。在JavaScript中，函数可能根本没有名称。在这种情况下，`arguments.callee`是函数被创建后访问它的唯一方式。最后一行可以理解为“在50毫秒后再次调用同一个函数”。\n\
    \n为了举例说明，让我们考虑另一种暂停脚本的方法。我们告诉JavaScript“等待五毫秒，然后继续执行”。最糟糕且通常不可接受的方式是向CPU抛出一个无用的任务，并在循环中重复执行。每次循环后，检查经过了多少时间，并决定是否继续（参见清单4-18）。请勿在家中尝试。\n\
    \n**清单4-18.** 让浏览器等待5秒再继续的原始方法\n\n```\nvar delay = 5000; // 五秒\nvar start = new\
    \ Date().getTime();\nwhile (true) {\n    // 找点事让CPU忙活，比如做点数学运算？\n    Math.sin(Math.random()*2*Math.PI)\
    \ + Math.cos(Math.random()*2*Math.PI);\n    var passed = new Date().getTime()\
    \ - start;\n    if (passed > delay)\n        break;\n}\n```\n\n为了理解如何以最佳方式组织动画，需要深入JavaScript的内部机制，了解为什么清单4-18中的代码是最糟糕的做法之一，如何避免长时间运行任务带来的陷阱，并正确调度动画循环。\n\
    \n## JavaScript线程模型\n\nJavaScript是一种单线程语言。这意味着在任何给定时刻，最多只有一段代码在执行。例如，如果在另一个函数执行时，一个图片恰好加载完成，回调函数不会立即并行运行。JavaScript会将那段代码的执行安排在当前函数结束后。如果有多个监听器，它们会被排队并逐一执行。\n\
    \n![图片](index-156_1.jpg)\n\n第四章：动画与精灵 **151**\n\n图片加载并非JavaScript中唯一使用回调的场景。用户输入处理代码（我们将在下一章详细讨论）也依赖类似的机制来响应触摸和鼠标点击。这意味着，当脚本执行一个长时间任务时，其余部分都会被冻结，直到任务完成。图4-9说明了这一点。\n\
    \n**图4-9.** JavaScript的线程模型。由于JavaScript是单线程的，同一时刻只能执行一段代码。长时间运行的任务会阻塞用户界面，导致应用无响应。\n\
    \n假设你正处于一个运行时间很长的重量级函数中。用户将鼠标光标移到用户界面组件上。这个操作会生成几十个事件，但在长时间运行的函数完成之前，这些事件都不会被处理。\n\
    \n从以上内容可以得出什么实际结论？有两点。\n\n- 你可以确信当前执行的代码是唯一正在运行的代码片段。如果你在一个监听器内部，不用担心在`animate()`恰好重绘场景时会发生什么；这种情况根本不可能发生。\n\
    - 任何长时间运行的函数都会阻塞输入。如果你的象棋AI需要5秒来计算最佳策略，这意味着用户至少需要等待5秒才能看到反馈。长时间运行的任务可以分解成较小的任务，这样就不会阻止其他部分的执行。\n\
    \n第二点听起来可能令人头疼。实际上，这完全不是问题。你只需要在设计包含长时间运行任务的应用程序时多花一点心思。"
  raw: 'milliseconds is one of the core tasks that we need to implement in order to


    create animation. That’s what we will do now.


    CHAPTER 4: Animation and Sprites


    **NOTE:** arguments.callee is the reference to the function itself. For example,


    when I’m inside the function called animate, then arguments.callee refers to


    this function—animate(). When you need to refer the function from within itself,
    it


    is the best way to do it. Referencing by name has its drawbacks. If you refactor
    your code, for example, you should remember to update another reference. In JavaScript
    it is common for a function not to have a name at all. In this case,


    arguments.callee is the only way to access it after it was created. The last line


    can be read as “call the same function again in 50 milliseconds”.


    For the sake of an example, let’s consider another approach to pausing the


    script. Let’s tell JavaScript to ‘‘wait five milliseconds, and then continue the


    execution.’’ The ugliest and usually unacceptable way to do it is to throw a


    useless task to the CPU, and ask to repeat it in a loop. After each cycle, you


    check how much time has passed and decide if you need to move on (see


    Listing 4-18). Don’t try this at home.


    **Listing 4-18\.** **The Naïve Way to Make Browser Wait for 5 Seconds Before Moving
    On**


    ***var delay = 5000; // Five seconds


    var start = new Date().getTime();


    while (true) {


    // Find something to occupy CPU with, how about some math?


    Math.sin(Math.random()*2*Math.PI) + Math.cos(Math.random()*2*Math.PI);


    var passed = new Date().getTime() - start;


    if (passed > delay)


    break;


    }


    To understand how to organize the animation in the best way, look deep into


    JavaScript’s internals to see why the code in the Listing 4-18 is one of the worst


    things that you can do, how to avoid the pitfalls of long-running tasks, and


    schedule the animation loops correctly.


    JavaScript Threading Model


    JavaScript is a single-threaded language. That means that at any given time


    there’s at most one piece of the code that is executing. For example, if an image


    has finished loading at the moment that another function was executing, the


    callback will not run immediately in parallel. JavaScript schedules the execution


    of that code after the end of the current function. If there are several listeners,


    they will be queued and executed one by one.


    ![](index-156_1.jpg)


    CHAPTER 4: Animation and Sprites


    **151


    Image loading is not the only part of JavaScript that uses callbacks. The user


    input handling code (which we’ll examine in detail in the next chapter) relies
    on a


    similar mechanism to react to touches and mouse clicks. This means that while


    a long task is executed by your script, the rest of the world is frozen until
    it is


    finished. Figure 4-9 illustrates this.


    **Figure 4-9.** *The threading model of JavaScript. Since JavaScript is single-threaded,
    only one piece of* *the code can be executed simultaneously. Long running tasks
    block UI and make the application* *unresponsive.*


    Let’s say that you’re in the middle of a heavyweight function that runs for a
    long


    time. The user moves the mouse cursor over the UI component. This action


    generates several dozen events, but neither of those are processed until the


    long-running function has completed.


    What is the practical conclusion from all of the preceding? There are two.


     You can be sure that the currently executed code is the only


    fragment of code that is running. If you are inside a listener,


    you should not worry about what will happen if the animate()


    is repainting the scene at this exact moment; it just can’t


    happen.


     Any long-running functions blocks the input. If your chess AI


    calculates the best strategy in 5 seconds, it means the user


    will not see the feedback for at least 5 seconds. The long-


    running tasks can be broken down into smaller ones that do


    not stop the rest of the world.


    The second point might sound like a headache. In practice, it is not a headache


    at all. You need to put just a little bit more effort into the design of an application
    with long-running tasks.'
