    \ Next, in `LayerManager`, send the same event to every layer in sequence (see\
    \ Listing 7-44).\n\n**Listing 7-44.** *LayerManager Sends the Event to Every Layer\
    \ It Controls*\n\n```\nfunction LayerManager() {\n    GameObject.call(this);\n\
    \    this._layers = [];\n    this.addListener(\"up\", this._onUpEvent.bind(this));\n\
    }\n\n_p._onUpEvent = function(e) {\n    for (var i = this._layers.length - 1;\
