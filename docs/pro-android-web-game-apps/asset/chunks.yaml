    var logoEntity = Crafty.e("2D, Canvas, logo");


    Download from Wow! eBook <www.wowebook.com>


    With the help of the Crafty.e() function, we create the new game entity. This


    entity is a combination of three components: 2D, canvas, and logo. The first two


    components are built into Crafty; they determine how exactly the entity is drawn.


    The third component---- the logo----is the one that we just created. Let’s place


