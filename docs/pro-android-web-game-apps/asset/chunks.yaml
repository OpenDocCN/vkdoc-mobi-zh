- fmt: "# CHAPTER 6: Rendering Virtual Worlds\n\n**223**\n\n```html\nfunction resizeCanvas(canvas)\
    \ {/* not changed */}\n```\n\n```html\n</script>\n```\n\nNow we need to get some\
    \ sample map data for our virtual world—the array that describes the level. It\
    \ is better to put such an array into a separate file, since it might get quite\
    \ big. Create the new file `js/world.js` with content shown in Listing 6-2. The\
    \ code in this listing is trimmed to fit the size of the book page; the full 40\
    \ × 40 version of this array can be found in the `world.js` file along with the\
    \ other source code for this chapter.\n\n**Listing 6-2.** *The `world.js` File\
    \ That Describes the World That We Will Render*\n\n```javascript\nvar world =\
    \ [\n  [3, 3, 3, 3, 3, 3, 3, 3, 3, 3, 3, 3, 3],\n  [3, 3, 3, 3, 3, 3, 3, 3, 3,\
    \ 3, 3, 3, 3],\n  [3, 3, 0, 1, 1, 1, 1, 2, 3, 3, 3, 3, 3],\n  [3, 3, 5, 6, 14,\
    \ 11, 13, 7, 3, 3, 3, 3, 3],\n  [3, 3, 5, 6, 9, 1, 8, 7, 3, 3, 3, 3, 3],\n  [3,\
    \ 3, 5, 6, 6, 6, 6, 7, 3, 3, 3, 3, 3],\n  [3, 3, 10, 11, 11, 11, 11, 12, 3, 3,\
    \ 3, 3, 3],\n];\n```\n\n## Rendering Tile Maps\n\nNow we are ready to draw the\
    \ tile map. To do that, we will create the separate class called `MapRenderer`.\
    \ The basic code for drawing a set of square tiles that form a grid is very simple.\
    \ To render the world out of tile map, we need to know three things:\n\n- the\
    \ map data (the array that we just saved in `world.js` file)\n- the image to take\
    \ tiles from\n- the size of a tile\n\nWe use rectangular tiles, so we don’t need\
    \ the width and height; it is enough to have only one parameter—`tileSize`. The\
    \ constructor of the `MapRenderer` class looks quite simple (see Listing 6-3).\n\
    \n**Listing 6-3.** *The Constructor of `MapRenderer`*\n\n```javascript\nfunction\
    \ MapRenderer(mapData, image, tileSize) {\n  this._mapData = mapData;\n  this._image\
    \ = image;\n  this._tileSize = tileSize;\n  // Coordinates of the map\n  this._x\
    \ = 0;\n  this._y = 0;\n  // The number of tiles in one row of the image\n  this._tilesPerRow\
    \ = image.width / tileSize;\n}\n```\n\nBesides saving the parameters, constructor\
    \ calculates the number of tiles in one row of the tile sheet. We will soon need\
    \ this value to get the coordinates of the tile inside the sheet. The `_x` and\
    \ `_y` variables are the coordinates of the map itself. When the user moves the\
    \ viewport, we will change these to render the map in a new place (see Listing\
    \ 6-4).\n\n**Listing 6-4.** *Rendering a Grid of Tiles on a Screen*\n\n```javascript\n\
