    \    for (i = 0; i < this._objects.length; i++) {\n        var obj = this._objects[i];\n\
    \        this._addToClusters(obj);\n    }\n};\n```\n\n要添加对象，首先需要找到重叠的集群（`Rect`\
    \ 类中已包含执行此操作的 `getOverlappingGridCells()` 函数）。然后，将对象推入数组，并将边界保存到 `_idToClusterBounds`\
    \ 中。清单 7-20 演示了如何实现。\n\n**清单 7-20.** 将对象添加到集群\n\n```javascript\n_p._addToClusters\
    \ = function(obj, clusterBounds) {\n    clusterBounds = clusterBounds || obj.getBounds().getOverlappingGridCells(\n\
    \        this._clusterSize, this._clusterSize,\n        this._clusters[0].length,\
    \ this._clusters.length);\n\n    var startY = clusterBounds.y;\n    var endY =\
    \ clusterBounds.y + clusterBounds.height;\n    \n    for (var clusterY = startY;\
    \ clusterY < endY; clusterY++) {\n        var startX = clusterBounds.x;\n    \
    \    var endX = clusterBounds.x + clusterBounds.width;\n        \n        for\
    \ (var clusterX = clusterBounds.x; clusterX < endX; clusterX++) {\n          \
    \  this._clusters[clusterY][clusterX].push(obj);\n        }\n    }\n\n    this._idToClusterBounds[obj.getId()]\
    \ = clusterBounds;\n    return clusterBounds;\n};\n```\n\n## 对象缓存\n\n一旦每个对象都被分配到了集群，我们就可以开始绘制它们。整个过程如下所示：\n\
    \n1. 确定当前哪些集群对用户可见。\n2. 获取所有这些集群中注册的对象。\n3. 移除重复的对象。\n4. 对对象进行排序。\n5. 绘制对象。\n\n\
    如果用户自上一帧以来没有跨越集群边界，那么步骤 2 到 4 将得到完全相同的结果。对于移动对象的情况，这一点可能不成立，但我们会在本节后面处理它们。现在，我们假设对象是静止的。利用这个事实，我们可以进一步优化对象的渲染。我们将步骤\
    \ 4 之后的结果保存到单独的 `cache` 中，并用于渲染。\n\n对象缓存与 `IsometricTileLayer` 的离屏画布有些相似，但它保存的不是图像，而是一个对象数组。它的工作方式非常直接。一旦我们知道当前可见的集群，我们就将每个对象添加到缓存中，并检查它是否已存在。然后对数组进行排序，以便在绘制代码中直接使用。清单\
    \ 7-21 展示了如何初始化对象缓存并准备渲染。将这段代码添加到你的 `ObjectLayer` 类中。\n\n**清单 7-21.** 重置对象缓存\n\
    \n```javascript\n_p._resetCache = function() {\n    var cache = this._cache =\
    \ [];\n\n    var startY = this._visibleClusterBounds.y;\n    var endY = this._visibleClusterBounds.y\
    \ + this._visibleClusterBounds.height;\n\n    for (var i = startY; i < endY; i++)\
    \ {\n        var startX = this._visibleClusterBounds.x;\n        var endX = this._visibleClusterBounds.x\
    \ + this._visibleClusterBounds.width;\n\n        for (var j = startX; j < endX;\
    \ j++) {\n            var cluster = this._clusters[i][j];\n            for (var\
    \ k = 0; k < cluster.length; k++) {\n                if (!Arrays.contains(cluster[k],\
    \ cache)) {\n                    cache.push(cluster[k]);\n                }\n\
    \            }\n        }\n    }\n\n    this._sortCache();\n    this._cacheDirty\
    \ = false;\n    this._cacheUnsorted = false;\n};\n\n_p._sortCache = function()\
    \ {\n    this._cache.sort(function(a, b) {\n        var aBounds = a.getBounds();\n\
    \        var bBounds = b.getBounds();\n        return (aBounds.y + aBounds.height)\
    \ - (bBounds.y + bBounds.height);\n    });\n\n    this._cacheUnsorted = false;\n\
    };\n```\n\n缓存是一个简单的、包含已排序且无重复对象的数组，可直接用于渲染。它可以处于以下三种状态之一：\n\n- **干净**：在这种情况下，可直接按原样使用。\n\
