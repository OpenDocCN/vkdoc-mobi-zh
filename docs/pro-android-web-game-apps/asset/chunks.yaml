    \           e.targetTouches[i].pageY, ctx);\n        }\n        e.stopPropagation();\n\
    \        e.preventDefault();\n      }, false);\n    }\n\n    function drawBullet(x,\
    \ y, ctx) {\n      ctx.fillStyle = \"darkred\";\n      ctx.strokeStyle = \"black\"\
    ;\n    }\n  </script>\n```\n\nThe listener function `onCanvasTouchStart()` will\
    \ receive the new listener. The type of the event is `touchstart`, and the event\
    \ listener is `onCanvasTouchStart()` — a function that prints a message to the\
    \ console. Now `onCanvasTouchStart()` will be called whenever there is a new `touchstart`\
    \ event triggered on `el`.\n\nNote that the listener function has an argument\
    \ too: it is called `e`. This is one of the cases when a single-letter parameter\
    \ name is just fine. Everybody knows that `e` means either exception or event,\
    \ and 99 percent of the time, it is quite obvious what it is from the context.\n\
    \nAfter the event is processed by the listeners registered on an element, it is\
