    ## CHAPTER 8: 3D in a Browser


    **355**


    1. We used vertex coordinates and edges as the input.

    2. We applied a transformation on vertices, rotating our model around two axes.

    3. We applied the perspective matrix to the result of the previous transformation.

    4. We normalized the coordinates.

    5. We translated the coordinates of the source vertices to the coordinates of
    the 2D canvas.

    6. We drew the edges to show the rotating cube.


    Of course, WebGL’s process is way more involved, but the main parts — the transformations
    of the vertices, the usage of matrices, perspective, and other concepts that we’ve
    highlighted in this chapter — stay the same. Now you have a solid basis for understanding
    the math behind basic WebGL operations.


