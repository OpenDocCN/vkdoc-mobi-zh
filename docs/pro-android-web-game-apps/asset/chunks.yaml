    The trick is to implement this technique now.


    **NOTE:** But won’t the screen flash with every color of the rainbow once the
    user taps it? We need to *render* those colors afterwards! That’s right, we need
    to render masks, but the canvas that holds them doesn’t have to be the same as
    your “main”


    canvas. In a real game, the canvas for the drawing mask is never visible to the
    user, and masks never appear on the screen. All rendering is done in memory, behind
    the


    scenes.


    Composite Operations


    Let’s start with a simple question: how do we draw an image mask? We need to


    change every opaque pixel of an image with the opaque pixel that has the color


    of the mask. To do it, we use a feature of 2D context called


    globalCompositeOperation. It defines the method of drawing the new pixels on


    top of existing ones. The default method is called source-over. The new


    nontransparent pixels are drawn on top of existing ones, like layers of paint


    applied one on top of the other. The pixels that are to be drawn are called the


    source and the pixels already on the scene are the destination. Source-over


    means ‘ put the source pixels on top of the destination.’’


    Figure 5-7 shows the components of the operation and the operation result----


    the one that you would expect. The house image is painted first; so, the moment


    the circle is painted, it is already on canvas. The house is the destination.
    The


    circle is painted second, so it is the source.


    ![](index-214_1.jpg)


    ![](index-214_2.jpg)


    CHAPTER 5: Event Handling and User Input


    **209


    **Figure 5-7.** *The default composite operation: source-over*


    This is the natural way of painting things. When you draw the image, you expect


    it to appear on top of any existing background images. This rule can easily be


    changed, however. If you set the globalCompositeOperation to ‘‘source-atop,’’


    the newly drawn pixels appear only where the background is opaque, like in


    Figure 5-8.


    **Figure 5-8.** *The source-atop composite operation. Source pixels appear over
    the background only if it* *is opaque; everything else is clipped.*


    That’s exactly what is required to make the image mask! But instead of a circle


    with a fancy pattern, we will use the solid-color rectangle that covers the entire


    image. We first draw the image (the destination), and then cover it with the color


    defined by the unique object ID. This concept is pretty easy yet very powerful.


    Figure 5-9 shows how to make the image mask with a source-atop operation.


    ![](index-215_1.jpg)


    CHAPTER 5: Event Handling and User Input


    **Figure 5-9.** *Image mask using the source-atop operation. The solid-colored
    rectangle covers only* *nontransparent parts of the image.*


    **NOTE:** There are several other composite operations available for the canvas
    API. If you are interested in an in-depth exploration of this topic, have a look
    at the demo, called 08.composites.html, which comes with the materials for the
    chapter. It


    shows the effects of every available composite operation. For a more formal


    description of the math behind color compositing, refer to the paper by Thomas


    Porter and Tom Duff, “Compositing Digital Images.” *Computer Graphics* 18, no.
    3


    (July 1984).


    Now let’s implement this technique in practice. Let’s start with the two functions


    in Listing 5-26.


    **Listing 5-26.** *Drawing the Image Mask with the Color Derived from Image ID*


    function numberToColor(n) {


    var hexString = n.toString(16);


    // Add padding


    return "#" + "000000".substr(0, 6 - hexString.length) + hexString;


    }


    function drawImageMask(image, x, y, maskColor, ctx) {


    var w = bufferCanvas.width = image.width;


    var h = bufferCanvas.height = image.height;


    var maskCtx = bufferCanvas.getContext("2d");


    // Original image painted first. It is dest


    maskCtx.drawImage(image, 0, 0);


    // set the composite operation


    maskCtx.globalCompositeOperation = "source-atop";


    maskCtx.fillStyle = maskColor;


    maskCtx.fillRect(0, 0, w, h);


