    \  this._addToClusters(obj, newClusters);\n  this._idToClusterBounds[obj.getId()]\
    \ = newClusters;\n  // 如果对象已离开屏幕，则从缓存中移除\n  if (newClusters.intersects(this._visibleClusterBounds))\
    \ {\n    Arrays.addIfAbsent(obj, this._cache);\n  } else {\n    Arrays.remove(obj,\
    \ this._cache);\n  }\n};\n```\n\n现在，`ObjectLayer`可以用于移动对象了！\n\n## 复合对象\n\n由于我们的渲染方式，复合对象不能表示为游戏世界中的一个精灵。以拱门为例。它应该允许角色从下方通过。但这里我们遇到了一个排序问题：我们先绘制什么？拱门还是角色？经过一些实验，你会发现两者都不对。图\
    \ 7-18 说明了这个问题。\n\n**图 7-18.** *像拱门这样的对象的问题：无论渲染顺序如何，结果在某些时候都会出错。*\n\n问题在于我们假设只有两种排序类型。\n"
- fmt: "# 处理后的 Markdown 文档\n\n`object` 位于另一个 `object` 之后，反之亦然。对于像这样的拱门，我们有一个对象的第三种状态——一个位于另一个对象之间的对象。我们的引擎无法处理这种情况，如果没有一点帮助，编写处理这种技巧的代码会相当困难。然而，我敢打赌你见过许多包含拱门和传送门的游戏。那么它们是如何解决这个问题的呢？\n\
    \n如果你查看过`resources`文件夹，那么你就已经知道答案了。拱门由两个不同的`Sprite`表示，并按通常方式排序。然后，它的渲染方式如图 7-19\
    \ 所示。\n\n**Figure 7-19.** *Representing an arch as two objects*\n\n你以这种方式解决问题，因为引擎现在会分别检查球相对于拱门左支柱和右支柱的位置，而不是将拱门作为一个整体来检查。随着球的移动，渲染顺序会发生变化，从而始终显示正确的画面。\n\
    \nListing 7-29 展示了这种解决方案在代码中的实现方式。将以下三个对象添加到你的`ObjectLayer`中，如 Listing 7-29 所示。\n\
    \n**Listing 7-29.** *Adding an Arch and a Moving Ball to the Game*\n\n```\nthis._archBall\
    \ = new StaticImage(im.get(\"ball\"), 300, 600);\nthis._objectLayer.addObject(this._archBall);\n\
    img = im.get(\"arch-left\");\nthis._objectLayer.addObject(new StaticImage(img,\
    \ 120, 470));\nimg = im.get(\"arch-right\");\nthis._objectLayer.addObject(new\
    \ StaticImage(img, 234, 462));\n```\n\n通过一个简单的运动规则让球穿过拱门（参见 Listing 7-30）。\n\n\
    CHAPTER 7: Making an Isometric Engine\n\n**Listing 7-30.** *Moving Ball Through\
    \ the Arch*\n\n```\n_p._updateWorld = function() {\n    // Update\n    this._ball1.move(0,\
    \ 2);\n    this._ball2.move(2, 0);\n    // Diagonal move through the arch\n  \
    \  this._archBall.move(2*this._archBallDirection, this._archBallDirection);\n\
    \    if (this._archBall.getBounds().x > 300 || this._archBall.getBounds().x <\n\
    \        100)\n        this._archBallDirection *= -1;\n};\n```\n\n`_archBallDirection`是一个变量，在`Game`类的构造函数中初始化为`1`（添加相应的代码行）。它会根据球的移动方向而改变。启动应用程序并观察移动。球应该能正确地穿过拱门。\n\
    \n## Object Layer: Next Steps\n\n像往常一样，还有很大的进一步优化空间，这里提供一些思路。\n\n- 使用数组来保持对象集合排序是最简单但也是最昂贵的方法；排序数组以及在其中搜索项的效率都相当低。如果你有很多对象，最好考虑使用专门的数据结构，比如二叉树，它可以保持对象排序并使得搜索操作非常高效。另一方面，如果你只有少量对象，那么这样做就不值得了。有一篇很棒的文章解释了二叉树的工作原理：'Computer\
    \ science in JavaScript: Binary search tree' (http://bit.ly/F4Dmc)。\n- `ObjectLayer`可以使用与`IsometricTileLayer`相同的离屏\
    \ canvas 缓存技巧。如果同一时间屏幕上有许多对象（例如一个拥有许多建筑的城市），那么缓存这个图层以节省一些 CPU 循环是很有意义的。\n- 还有更好的（尽管编码复杂）数据结构来跟踪空间对象。`R-Tree`是一个很好的例子。考虑使用它；它可能会真正提高你游戏的性能。\n\
    \n![index-307_1.jpg](index-307_1.jpg)\n\nCHAPTER 7: Making an Isometric Engine\n\
    \n**303**\n\n项目此时的状态被保存在一个名为`v0.2`的文件夹中。请随意将其用作参考，或直接从中获取代码并继续。\n\n## Dirty Rectangles\n\
    \n`Dirty Rectangles` 是我们将在引擎中实现的下一个主要渲染优化技术。该技术背后的思想是“只渲染屏幕中发生变化的区域”。\n\n假设我们有一个不会自行移动的世界，并且用户此刻也没有移动视口。可能有一两个移动的对象，但屏幕的大部分区域保持静态。换句话说，屏幕在两次重绘之间变化很小；大部分内容与上一帧相同，只有少数区域发生变化。"
