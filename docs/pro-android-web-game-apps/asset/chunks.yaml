    Decorated tiles are different. Look at Figure 7-7. The tile is bigger than the
    grid cell because it has regions that overlap neighboring tiles. The left picture
    shows how it might be positioned inside a rectangular sprite. Note that the area
    that will cover the grid cell is not necessarily in the center of the sprite.
    The exact position of the ‘diamond’ depends on the size of overlapping parts.
    The image on the right shows the individual tile, and the bottom picture is the
    set of tiles arranged into a grid.


    **Figure 7-7.** *Decorated isometric tiles: they are bigger than the grid cell
    and they overlap neighboring tiles*


    Obviously, when you deal with decorated tiles, the order of rendering does matter.
    Figure 7-8 shows the correct order of rendering — from top to bottom.


    ![](index-279_1.jpg)

    ![](index-279_2.jpg)


    CHAPTER 7: Making an Isometric Engine


    **275**


    **Figure 7-8.** *Overlapping tiles must be drawn in order from top to bottom.
    If the order is broken, the result will not look like terrain because the tiles
    will not fit each other.*


    Figure 7-9 shows the outcome of tile b being drawn first, instead of tile a. As
    you see, the resulting image doesn’t look like the terrain.


    **Figure 7-9.** *Incorrect rendering order*


    The rendering code needs to know the exact size of the “decorations” in order
    to arrange the tiles on the grid. Figure 7-10 shows the essential parameters of
    the tile. The tile width and the tile height are the size of the sprite that holds
    the tile — the size of the image that has both the tile and its decoration. The
    cell size of a single sprite in a sprite sheet is `tile width × tile height` in
    pixels. For example, our tiles are 128 pixels wide and 68 pixels high. The grid
    width and grid height is the size of the isometric grid cell; or in other words,
    the size of a perfect diamond that covers the cell. Our artist created our tiles
    for a cell size of 124 × 62 pixels. The final set of parameters is the margins,
    the distance from the edge of the sprite to the diamond. To render the tile, we
    need only the left margin and the top margin. In our case, they are 0 and 3 pixels,
    respectively (there is no left margin). However, this is not always the case;
    for example, the tile in Figure 7-10 shows the tile with both left and top margins.


    ![](index-280_1.jpg)

    ![](index-280_2.jpg)


    CHAPTER 7: Making an Isometric Engine


    **Figure 7-10.** *The parameters that identify the tile: tile size, grid size,
    and margins. These measurements are enough to render the terrain.*


    **NOTE:** When you work with the other tile sheets, these parameters will be different.
    The point is that these six numbers describe the geometry of a tile, and they
    are enough to render the terrain. The same numbers can describe simple tiles without
    overlapping areas. Such tiles have no margins (0px) and “tile size” is the same
    as “grid size.”


    Now we are ready to write the rendering code. The essence of the isometric map
    is a two-dimensional array, where the value refers to the location of the tile
    within the sheet. Since the width of the tile sheet is known, it is enough to
    use only one number to uniquely identify the tile. Figure 7-11 shows how tile
    indexing works.


    **Figure 7-11.** *Drawing the decorated sprite*


    The sprite should then be placed on the grid, so that the diamond area of the
    tile fits the position of the grid cell, as shown on the right in Figure 7-11.
    We need to find the grid anchor — the top-left corner of the grid cell — and then
    render the tile over it, shifting the position by the margin values. The code
    in Listing 7-6 does exactly that.


    CHAPTER 7: Making an Isometric Engine


    **277**


    **Listing 7-6.** *Drawing Decorated Tiles on Canvas*


    ```

    /* We start by getting the tile position within the tilesheet */

    var tileX = tileId%spritesInRow;

    var tileY = Math.floor(tileId/spritesInRow);

    var sx = tileX*tileWidth;

    var sy = tileY*tileHeight;

    ```'
