- fmt: "# `doctypes`, Explicit Declarations of Language in Script Blocks, and So Forth\n\
    \nSince all modern browsers already support HTML5, at least at its basic level,\
    \ this HTML page is empty, yet it has the entry point for JavaScript code: the\
    \ `init()` method. This method is executed once the HTML file is loaded, parsed,\
    \ and the document is fully available to JavaScript. This is the perfect place\
    \ to put your initialization logic: show the “loading” screen, initialize and\
    \ assign event listeners, or start loading the external resources. For now, the\
    \ method is empty, but we will soon add drawing code to it. The code for the basic\
    \ HTML skeleton is available in the `1.skeleton.html` file for this chapter.\n\
    \nNow we are ready to start the exploration of canvas.\n\n---\n\n## What Is Canvas?\n\
    \nCanvas is a relatively new HTML element. The concept of such an element was\
    \ introduced in 2004 by Apple. It allows you to draw arbitrary graphics such as\
    \ geometry primitives, shapes and images, gradients, strokes, and fills. It also\
    \ has a rich API to control the output that supports transformations like scaling,\
    \ rotation, and per-pixel image processing. With some extra effort, it can be\
    \ used for image-processing and applying advanced effects.\n\nThe canvas works\
    \ differently than regular HTML rendering. With HTML, you create elements and\
    \ attach them to the DOM tree. Once they are attached, you can change their look\
    \ and position with CSS. If you move a `div` 100 pixels left, the area where it\
    \ was before is magically empty and the `div` appears in the new position. Working\
    \ with HTML nodes is like having a dozen papers with images lying on your table;\
    \ you can move them around, put one on top of the other, or throw them away, as\
    \ shown in Figure 2-1.\n\n**Figure 2-1.** *When you move a `div` on an HTML page,\
    \ you don’t have to worry about clearing the content; you change coordinates,\
    \ and a `div` is rendered in a new location. Dotted borders show `div`s; dashed\
    \ borders show the div that is moving.*\n\nThe canvas is more like painting on\
    \ a … canvas. Yes, the real-life one that is made of fabric. Once you paint something,\
    \ it is there until you erase it or paint something else on top of it. To “move”\
    \ the image, you first need to erase the old image, restore all the other objects\
    \ that might have been affected by the move, and then paint the image again in\
    \ the new place. Look at Figure 2-2, which illustrates this idea.\n\n**Figure\
    \ 2-2.** *To change the position of an image, you first have to clear its original\
    \ position, restore other objects that might have been affected, and then paint\
    \ the image in a new location.*\n\nListing 2-2 is the example that demonstrates\
    \ the canvas API. Read through the code to get a feeling of the “canvas style”\
    \ of web development.\n\n**Listing 2-2.** *Canvas API Example*\n\n```html\n<!DOCTYPE\
    \ html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n<style>\n</style>\n\
    <script>\nfunction init() {\n    var canvas = document.getElementById('mainCanvas');\n\
    \    var ctx = canvas.getContext('2d');\n    ctx.clearRect(0, 0, 300, 300);\n\
    \    ctx.fillStyle = \"lightgray\";\n    ctx.fillRect(10, 10, 50, 50);\n}\n</script>\n\
    </head>\n<body onload=\"init()\">\n<canvas id=\"mainCanvas\" width=\"300px\" height=\"\
    300px\"></canvas>\n</body>\n</html>\n```\n\nAs you see, canvas is a regular DOM\
    \ element just like `div` or `table`. It behaves exactly the same way as the other\
    \ nodes: it can be created via `document.createElement()`, appended to parent,\
    \ or styled with CSS. It can have margins, paddings, borders, position, and so\
    \ on. The magic starts to happen after the line `var ctx = canvas.getContext('2d')`.\n\
    \n## The Context\n\nThe context (the `ctx` in Listing 2-2) determines the “drawing\
    \ mode” of the canvas. From a practical point of view, this is the object that\
    \ acts like the access point to the whole set of drawing methods. Look at the\
    \ listing once again."
