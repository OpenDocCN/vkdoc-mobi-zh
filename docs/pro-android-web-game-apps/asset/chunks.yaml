- fmt: "# Chapter 11: Talking to the Server\n\n**Figure 11-2.** *With XHR long polling,\
    \ the server holds the connection open until it has some data to send to the client.*\n\
    \nAs you can see, XHR long polling uses considerably fewer requests to keep the\
    \ connection with the server. The maximum latency overhead is the time that the\
    \ web page needs to reconnect to the server.\n\nLong polling has its own drawbacks,\
    \ however: the long-running XHR requests may be terminated by middleware proxy\
    \ servers or even by the browser itself. For example, Android 2.2 running on Samsung\
    \ Galaxy kills the XHR connection if it is idle for about 20 seconds. To make\
    \ matters worse, the rules for breaking 'stalled' connections may vary from browser\
    \ to browser and from proxy to proxy. The safe timeout is around 15 seconds. If\
    \ this time has passed and the server doesn't have anything to respond, it should\
    \ send the empty response and close the connection.\n\nThe second drawback is\
    \ that in message-intensive environments, long polling loses its advantage and\
    \ it is reduced to regular polling. This is one of the reasons why this technique\
    \ is not suitable for fast-action, real-time games like racing, online RPGs, or\
    \ strategy games. The client would spend a lot of time reconnecting to the server\
    \ (see Figure 11-3).\n\n**Figure 11-3.** *The problem with long polling in a message-intensive\
    \ environment. The long polling is reduced to simple polling: requests are sent\
    \ each second.*\n\nExample code for long polling is shown in Listings 11-8 (client)\
    \ and 11-9 (server).\n\n**Listing 11-8.** *The Example XHR Long Poll Client*\n\
    \n```javascript\nfunction init() {\n  pollServer();\n}\n\nfunction pollServer()\
    \ {\n  var xhr = new XMLHttpRequest();\n  console.log(\"Requesting\");\n  xhr.open('GET',\
    \ 'lobby');\n  xhr.onload = function(e) {\n    console.log(\"RESPONSE:\" + xhr.responseText);\n\
    \    setTimeout(pollServer, 4); // Poll server again after the response\n  };\n\
    \  xhr.onerror = function(e) {\n    console.log(\"Error, retrying\");\n    setTimeout(pollServer,\
    \ 4); // Poll server again in case of error\n  };\n  xhr.send();\n}\n```\n\n**Listing\
    \ 11-9.** *The Simplest Long-Poll Server*\n\n```javascript\nvar clients = [];\n\
    \n// send notification with random intervals\n(function() {\n  notifyClients();\n\
    \  setTimeout(arguments.callee, Math.floor((Math.random()*10000)));\n})();\n\n\
    /**\n * Sends the new event data to every connected client\n */\nfunction notifyClients()\
    \ {\n  clients.forEach(function(res) {\n    res.send(\"new event data\");\n  });\n\
    \  clients = []; // They will reconnect, empty the array\n}\n\napp.get(\"/lobby\"\
    , function(req, res) {\n  clients.push(res);\n  console.log(\"Added client, now\
    \ \" + clients.length + \" connected\");\n});\n```\n\nThis implementation should\
    \ not be used for production, of course; it only illustrates the basics of the\
    \ technique behind long-poll transports. As you can see, the server does not return\
    \ the response immediately. Instead, the response object is saved in the `clients`\
    \ array for later use. Once the data is available, the server broadcasts it to\
    \ clients and clears the array. The clients are now disconnected and they will\
    \ connect once again in a few milliseconds.\n\nThe real-world implementation would\
    \ be much more sophisticated. It should gracefully handle disconnects and errors,\
    \ save the messages for the clients in queues so that they are not lost while\
    \ the client is reconnecting, and so on. In the next chapter, we will use Socket.IO\
    \ — the library that has already implemented the hard part of transport handling.\n\
    \nThe complete source code for this simplistic long-poll implementation is available\
    \ in the `02.longpoll` folder along with the other sources for this chapter.\n\
    \n## XHR Streaming\n\nThere is a method to getting rid of one major long-poll\
    \ problem: reconnecting after each received message. The approach is called XHR\
    \ streaming.\n\nTechnically, it is not an entirely new transport, but a slight\
    \ modification of the long poll.\n\nHere's how it works: if you set the content\
    \ type of the response to a custom"
