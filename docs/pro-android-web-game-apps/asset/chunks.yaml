- fmt: '# CHAPTER 12: Making Multiplayer Games


    ## 497


    What is different is the method of publication of the class for `Node.js` and
    the browser environment.


    Luckily, it is not too hard to adjust the code for the component so that it works
    in both cases. Let’s first look at the code in Listing 12-8.


    **Listing 12-8.** *Wrapping the Code for the Class to Use in Browser and in Node.js*


    ```

    (function(exports) {


    function BoardModel(cols, rows) {


    /* regular constructor here */


    }


    /* the rest of the code from BoardModel.js */


    // Publish the API to the outter world


    exports.BoardModel = BoardModel;


    })(typeof global == "object" ? exports : window);

    ```


    Start reading the code from the last line. The last line tries to detect the current
    execution environment. If there is a `global` object defined in the current scope,
    then the code is executed by `Node.js`, otherwise by the browser.


    **NOTE:** This kind of check is far from perfect of course. For example, if someone
    defines the `window.global` variable in the browser, this code fails. At the time
    of writing, however, there is no better way to detect the execution environment
    for the JavaScript module.


    The last line of the listing passes either an `exports` or `window` object as
    the parameter to the anonymous function. The next fragment of the code is rather
    simple: the constructor and other functions and variables are defined as usual,
    except they now belong to the inner scope of the function (and not to the global
    scope as before). Finally, we have to make the constructor available to the outer
    world: `exports.BoardModel = BoardModel` does exactly this. With `Node.js`, the
    constructor is later available via a call to `require()` as usual; whereas in
    a browser, this code is equivalent to `window.BoardModel = BoardModel`, which
    simply appends the constructor to the global scope of the browser.


    This technique is far from perfect, but it is much better than code duplication.
    To finish the task, add the updated `Board.js` file to the `public/js` folder.
    From this location, it is available to both the client and `Node.js`.


    Take the old version of the `BoardModel.js` file from Chapter 10. Update it as
    shown in Listing 12-8 and save into `public/js/BoardModel.js`. This file is


    ![](index-499_1.jpg)


    required on both the client and the server. That’s why we put it in the location
    that is accessible to both. The client can read anything from `public` folder,
    while the server can read anything at all, including the `public` folder.


    ## Server-Side


    Given that we adopted the main logic-handling class for `Node.js`, the server
    is now ready to handle real game sessions! The player starts in a lobby where
    he can challenge other players or wait to be challenged (we implemented this functionality
    already). Once challenged, the player enters a new ‘mode of communication’’ with
    the server. He now can send and receive the game turns. Once the game is finished,
    the player is returned to the lobby.


    Let’s look at the protocol of communication between a client and a server, which
    we need to implement to support all these features. When a player selects an opponent
    from the list, he sends the challenge. In a real-world game, the player should
    have an option to accept or decline the challenge, but in this simple example,
    the challenge is always accepted. The server handles a few error cases at this
    point. For example, the player cannot challenge himself or another player who
    is in the middle of another match. If there were no errors, both players receive
    a message that indicates the start of the game. At this point, both clients should
    change the active screen and display the board instead of the lobby, allowing
    the players to take turns. Once the match is over, both players return to the
    lobby and can challenge new opponents.


    Figure 12-7 illustrates the main game flow.


    **Figure 12-7.** *The multiplayer game flow*


    Now, let’s start with the main server class. It has to handle a new type of message
    called `challenge`. Look at the code in Listing 12-9, which implements'
