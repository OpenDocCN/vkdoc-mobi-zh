- fmt: "# CHAPTER 12: Making Multiplayer Games\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \n```html\n<script>\nvar socket;\nvar userList;\n\nfunction init() {\n  socket\
    \ = io.connect();\n\n  socket.on(\"user-joined\", function (user) {\n    userList.add(user.id,\
    \ user.name, user.status);\n  });\n\n  socket.on(\"user-left\", function (user)\
    \ {\n    userList.remove(user.id);\n  });\n\n  socket.on(\"user-playing\", function\
    \ (user) {\n    userList.setStatus(user.id, \"playing\");\n  });\n\n  socket.on(\"\
    user-ready\", function (user) {\n    userList.setStatus(user.id, \"ready\");\n\
    \  });\n\n  socket.on(\"user-list\", function (data) {\n    for (var userId in\
    \ data.users) {\n      var user = data.users[userId];\n      userList.add(user.id,\
    \ user.name, user.status);\n    }\n  });\n\n  socket.on(\"info\", function (info)\
    \ {\n    console.log(info.text);\n  });\n\n  var listElement = document.getElementById(\"\
    online_users\");\n  userList = new LobbyUsersList(listElement, onChallenge);\n\
    }\n\nfunction onChallenge(userId, userName, status) {\n  alert(\"you challenge\
    \ user \" + userName + \" who is \" + status);\n}\n</script>\n\n</head>\n<body\
    \ onload=\"init()\">\n<div id=\"lobby\">\n  <ul id=\"online_users\"></ul>\n</div>\n\
    </body>\n</html>\n```\n\nThe client code knows how to react to six types of server\
    \ events:\n\n- `\"user-joined\"`: sent when a new user has joined the lobby\n\
    - `\"user-left\"`: sent when a user has left the game\n- `\"user-playing\"`: sent\
    \ when a user has started a new game (he is not available for other games and\
    \ cannot be invited)\n- `\"user-ready\"`: sent when a user has finished the game\
    \ and is ready for the new invitations\n- `\"user-list\"`: the list of all users\
    \ in the room (useful to initialize the lobby list)\n- `\"info\"`: generic message\
    \ to display in console for debugging\n\nRight now, the server knows how to send\
    \ only `\"user-joined\"`, `\"user-left\"`, and `\"info\"` messages. Let's add\
    \ one more message type — `\"user-list\"` to fill the list of users with those\
    \ already online. To do that, we need to track every connected and disconnected\
    \ user. Luckily, it is not hard to do at all. Listing 12-6 shows how to do it.\n\
    \n**Listing 12-6.** *Tracking Connected and Disconnected Users*\n\n```javascript\n\
    var maxUserId = 0;\nvar users = {};\n\nio.sockets.on(\"connection\", function\
    \ (socket) {\n  var userId = addUser(socket);\n\n  socket.on(\"disconnect\", function\
    \ () {\n    socket.broadcast.emit(\"user-left\", users[userId]);\n    delete users[userId];\n\
    \  });\n});\n\n/**\n * Registers the user on the server. Notifies everybody that\n\
    \ * he joined the lobby, sends the list of the online users\n * to the newly connected\
    \ one.\n * @param socket the socket object of the connected client\n * @returns\
    \ the ID of the newly created user\n */\nfunction addUser(socket) {\n  var userId\
    \ = maxUserId++;\n  var userName = \"User \" + userId;\n  var user = {id: userId,\
    \ name: userName, status: \"ready\"};\n  users[userId] = user;\n\n  Object.defineProperty(user,\
    \ \"socket\", {\n    value: socket,\n    enumerable: false\n  });\n\n  socket.emit(\"\
    info\", \"You have connected\");\n  socket.emit(\"user-list\", { users: users\
    \ });\n  socket.broadcast.emit(\"user-joined\", user);\n  return userId;\n}\n\
    ```\n\nWe moved the code for adding the user into the separate function — `addUser()`.\
    \ It is way easier to manage it that way. Each new user receives the unique id,\
    \ a `userName`, a status, and a socket. We assigned a socket property in a quite\
    \ unusual way — via `Object.defineProperty()`. If we assign the socket in a usual\
    \ way, like:\n\n```javascript\nuser.socket = socket;\n```\n\nthen every time the\
    \ user object is sent to the client, the socket object is sent too. Obviously,\
    \ we don't need that data in our application. The easiest way to fix this behavior\
    \ is to declare the property as non-enumerable. Such a property is accessible\
    \ only if you know its name, it will not appear in `for..in` loops, and is omitted\
    \ by the code that serializes JSON into the string. That's exactly what `Object.defineProperty()`\
    \ does in our code.\n\nNow you can test the code. Try connecting to the server\
    \ with your device, open a few browser windows, and see how new list items appear\
    \ on the screen. Then close the window and see how one of the items disappears."
