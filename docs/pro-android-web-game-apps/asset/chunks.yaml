    \ /* 显示横幅，如清单 14-4 所示 */ }\n```\n\n正如你所见，`Crafty` 是一个非常优秀且便捷的游戏引擎，能够轻松处理相当复杂的任务。凭借良好的起步和活跃的社区，毫无疑问，它很快就会成为一个成熟的游戏开发引擎。\n\
    \n## 总结\n\n在本章中，我们探讨了游戏引擎这一主题。首先描述了与图形系统交互的三个层级：图形 API、库和游戏引擎。我们了解了它们之间的区别、各自的用途和局限性。\n\
    \n我们在 `Crafty` 的帮助下构建了游戏——这是一个专注于为游戏开发者整合典型工具的 2D 游戏引擎，包括精灵表、动画、事件处理、游戏状态与转换以及许多其他功能。我们创建了一个相当完整的游戏（当然省略了玩法），它具备完整产品的绝大部分功能——而源代码总大小仅为约\
    \ 140 行 JavaScript 代码。\n\n尽管游戏引擎看起来像银弹，但它们并非如此。它们能为你节省大量时间和精力，但高效使用每个游戏引擎都需要了解其底层机制。即使你选择使用其中之一，通过本书各章节所学到的技能，也将让你更好地理解引擎的魔法。\n\
    \n# 第 15 章：构建原生应用\n\n人们在安卓设备上使用的大多数应用都是原生的——即用 Java 编写并与操作系统紧密集成的程序。游戏也不例外。大多数安卓游戏都是原生游戏。本书中创建的应用则属于不同类型——它们是网络应用。这些应用已经运行得相当不错，而且毫无疑问，经过一些额外的打磨，将网络应用提升到商业水平并非难事。然而，有几个理由可能让你想为游戏构建原生安卓版本。\n\
    \n为什么要从已有的网页版本构建原生应用？这是个好问题。确实，网络应用有很多优势：部署更方便、无需安装、支持更多平台、更新更容易……那么为什么还要花额外时间做原生应用呢？以下是让原生应用非常有吸引力的最重要特性总结：\n\
    \n- 通过应用市场分发\n- 访问原生 API\n- 全屏模式\n- 使用浏览器尚不支持的 HTML5 API\n- 原生应用不一定需要网络连接，用户可以离线玩游戏\n\
    \n在本章中，我们将讨论原生应用的优缺点。此外，我们还将学习如何：\n\n- 安装和配置 Apache Cordova（原 PhoneGap 和 Apache\
    \ Callback）\n- 将现有的网页游戏封装为原生应用\n- 访问手机资源（如电话簿或 GPS）\n"
- fmt: '# Building Native Applications


    ## Signing and Publishing


    - Sign the application and prepare it for market publishing

    - Register on Google Play

    - Publish the game and download it via a Google Play application

    - Update the application, and release a new version


    Creating an Android app from scratch is a rather complex task: it requires certain
    knowledge of Java and Android architecture. If you are not familiar with these
    technologies, it may take considerable time and effort to master them to a level
    when you can write a commercial-grade game. Fortunately, there is a way to gain
    the benefits of a native application without losing the familiar web environment,
    and this chapter is fully devoted to that subject.


    **NOTE:** This chapter is written in the form of a step-by-step guide. Certain
    steps are far from the usual web development tasks; they require some experience
    in other areas to understand them completely. I will try to give you a good general
    understanding of the process and provide the first step toward understanding how
    native applications work; however, Java programming falls outside of the scope
    of this book. If you want to learn more, feel free to read other sources. For
    an introduction to Java, try *Java 7 for Absolute Beginners* by Jay Bryant (Apress,
    2012). If you already have some Java under your belt, a good resource is *Beginning
    Android Games*, 2nd Edition, by Mario Zechner and Robert Green (Apress, 2012).
    Android development has become a very popular topic recently, so you will find
    it easy to locate good materials online.


    ## Native Applications


    Let’s start with very generic questions. What is a native application? What does
    it look like and what is it made of? Native Android apps are written in Java.
    A typical Android project consists of Java files, Java libraries, and resources
    and assets like images, XML configuration files, and media files. There’s one
    special file called `AndroidManifest.xml` that holds the information about the
    app. The application itself is distributed in the form of an APK file: a zip archive
    that has a certain internal structure.


    The process of building an APK is rather long; when the coding part is done, the
    developer has to complete the following steps to make a file that is ready for
    deployment on a device:


    - Run the tool to autogenerate several Java files

    - Compile Java sources

    - Transform compiled sources to Android byte code

    - Package everything into the APK file

    - Sign the APK with the key

    - Perform the alignment — the optimization of the APK archive


    As you can see, the process is rather complex, and it would be a huge waste of
    time to do everything manually every time you needed to test a tiny change to
    your application. Android developers use a tool called `Ant` ([http://ant.apache.org](http://ant.apache.org))
    to simplify the process. `Ant` is an automated build system; it can execute build
    scripts written in XML that describe every action required to build the app. It
    works like `.bat` files on Windows or `make` on Linux, but `Ant` is cross-platform
    and has many Java-specific extensions. With its help, an Android application can
    be created with a single command from the command line.


    **NOTE:** Most IDEs have plug-ins to support Android development and hide the
    details of the application-building process away from the developer. Both Eclipse
    and IntelliJ Idea have great support for Android development. If you think about
    diving deeper into the native Android development, start with setting up an IDE
    that you like, just as we did in Chapter 1. As for this chapter, command-line
    tools along with a text editor are quite enough to reach our goals.


    From a logical point of view, Android applications are made of various components
    and UI elements — buttons, progress bars, combo boxes, and so on. There are dozens
    of such components, both default and custom. One of them is the "browser," or
    `WebView` as it is called in Android. `WebView` is a regular'
