    approach to specifying the position of a point in space. Instead of x and y


    values, it uses the azimuth and radius. The point with the Cartesian coordinates


    (1, 1), for example, have a radius of approximately 1.414 and an azimuth of *π*
    /4


    in polar coordinates. The relation between these coordinate systems is


    illustrated in Figure 5-10.


    **Figure 5-10.** *Cartesian coordinates (x, y) and polar coordinates (azimuth,
    radius)* The joystick’s output is the perfect example of the case where polar
