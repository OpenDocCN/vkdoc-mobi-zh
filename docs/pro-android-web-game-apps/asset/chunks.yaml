    use the same port for its own needs. If you’re having problems starting nginx
    while


    Skype is in operation, open Skype, go to Tools  Options  Advanced  Connection


    and remove the checkmark from Use Ports 80 and 443 as Alternatives for Incoming


    Connections.


    Alternatively, you can configure nginx to use a different port, for example port
    8080.


    If you choose to do so, you should remember to add the port number to the address


    to view your pages. If nginx is configured to use port 80, for example, you can
    type


    [http://localhost in the browser to load the](http://localhost) page; otherwise,
    you should set the port correctly in the address bar as [http://localhost:8080.](http://localhost:8080)


    **Setting Up nginx**


    Download the latest version of nginx [from http://nginx.org/en/download.html.](http://nginx.org/en/download.html)


    The instal ation process of nginx is very easy----you just unzip it. This is enough


    to get it up and running, but it will only serve files from a predefined internal


    folder, and you will have to copy all of the project’s contents over and over


    again to test even the smallest edit. We will reconfigure nginx to point web root


    Download from Wow! eBook <www.wowebook.com>


    as the project directory instead.


    Go to the conf folder inside the nginx installation and open nginx.conf in a text


    editor. Find the following lines:


    location / {


    root html;


    index index.html index.htm;


    }


    and change the html to the path to your project as follows (I used


    c:\apps\projects\myproject):


    location / {


    root c:/apps/projects/myproject;


    index index.html index.htm;


    }


    CHAPTER 1: Getting Started


    **NOTE:** nginx uses the hash symbol (#) for commenting-out lines in config files.
    If you see a line starting with #, you can safely ignore it or even delete it
    to keep the config clean. The original purpose of the commented blocks is to show
    how to work with a


    certain aspect of configuration—a kind of inline help.


    The bolded code is the path to your project folder. If you decide to change the


    default port, find the following lines:


    server {


    listen 80;


    server_name localhost;


    and change 80 (bolded in the code) to whatever port you like.


    Save the changes and launch nginx. You will not see any UI or window with


    settings; this is OK. nginx is working in the background and doesn’t have a UI;


    you control it via commands, not buttons and menus.


    Open your favorite desktop browser once more and type [http://localhost.](http://localhost)
    You should see your Hello World web page up and running. If you see something
    like


    ‘ Welcome to nginx!’’ it means that the web server is using the wrong folder to


    read the HTML files. Make sure that you completed the instructions and set the


    root parameter in the nginx.conf appropriately.


    **Opening the Page on a Mobile Device**


