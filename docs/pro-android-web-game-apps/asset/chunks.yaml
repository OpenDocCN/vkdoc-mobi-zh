- fmt: '# AI in Games


    Interesting with only a few rules that describe the behavior of zombies: if no
    player around — wander; otherwise — chase player. Zombies do not need to be tactical
    geniuses to be fun, right?


    Of course, there are games where AI plays a quite important role. Here are few
    examples: a 3D shooter that presents the player with intelligent opponents, a
    rally game where AI has to predict the effects of physics on a car, and a tactical
    simulator where computer-controlled guards realistically react on an intrusion.
    For these games, AI is a major part of the gameplay.


    The rule of thumb is that the AI should be smart enough to look natural in the
    given game and under given circumstances. What exactly is “natural” depends on
    two factors. One is the game genre. A zombie standing with its face to the wall
    looks much more natural than the human guard doing the same thing. The second
    factor is the amount of time that the player observes the computer-controlled
    character. If the typical character appears on the screen only to vanish under
    a blast of bullets in the next second, he would not even have a chance to show
    how smart he is. On the other hand, if the player observes the character for a
    long time (like in *The Sims*), the unrealistic nonhuman behavior becomes much
    more obvious.


    In this chapter, I decided to present two types of algorithms that are most commonly
    implemented in games: one is pathfinding and the other is decision making. Decision-making
    answers the question “what to do,” while pathfinding tackles “how to reach the
    point in a world.” These algorithms are quite easy to master and they allow building
    a broad range of games.


    **NOTE:** The examples in this chapter are built with the small, open-source framework
    that I created for the AI experiments. You can grab your copy from [https://github.com/Juriy/gameai](https://github.com/Juriy/gameai).
    It is a set of tools to render a tiny, 2D world and perform common geometric calculations
    that are often required in AI. This chapter describes the algorithmic part of
    the AI, so the code doesn’t depend on a framework too much. The framework is only
    used to visualize the results: render walls, animate agents, and so forth.


    ## Introducing Pathfinding


    Pathfinding is the set of techniques that help a character to move from one point
    in the world to another. For example, when you order a unit to go to the tower,
    it must first find the path to the tower. Figure 13-1 illustrates a sample game
    world with a couple of buildings and obstacles. The goal of the pathfinding is
    to help agents navigate through the world.


    ![](index-516_1.jpg)


    **Figure 13-1.** *The task of pathfinding: find the path between two points in
    the game world.*


    The path should also be as short as possible. If a unit decides to take the long
    way when there is a short one, his behavior looks unnatural. So we should try
    to find the best path and not just any path.


    **NOTE:** Distance is not the only way to measure how good the path is. There
    are other options for path optimizations. For example, the fastest way for me
    to get out to the street to buy a bottle of soda is to jump out of the window
    from the third floor. Usually, however, I decide not to take this route. This
    is an extreme example, but in the game world, these kinds of cases are a lot more
    common. The character might decide to jump off a platform, losing some health
    but getting the ammo faster than his/her opponent. If health is low, however,
    it is more important to stay alive and take the slower way. These cases are more
    complex and they involve both pathfinding and decision making. In this chapter,
    we examine a case in which distance is the only criteria.


    Analyzing the complete world geometry to find the path between two points might
    be a very complex task. The much simpler solution is to place waypoints throughout
    the level, so that they are connected by the line of sight and a character can
    navigate between them. The task of pathfinding is much easier.'
