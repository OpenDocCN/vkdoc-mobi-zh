  trans: "\n# `ctx.fillRect(0, 0, canvas.width, canvas.height);`\n\n`spriteSheet.drawFrame(ctx,\
    \ currentFrame, 10, 40);`\n\n`requestAnimationFrame(arguments.callee);`\n\n}\n\
    \n`animate(0);`\n\n如果屏幕上有多个精灵，每个精灵都有自己的动画参数（如每帧时长、帧数等），该如何处理？像示例中那样存储数据很快就会变得混乱不堪。看来是时候再创建一个类了。\n\
    \n## 实现 `Animator`\n\n动画并非仅限于切换帧。事实上，任何对元素形状、位置、颜色或其他视觉属性进行的平滑渐进式改变，都属于动画范畴。我们刚才看到的只是最简单的情况：每一帧在屏幕上停留固定的时间，然后由下一帧替换，如此往复，直至动画结束。动画播放完毕后，下一轮循环会从第一帧重新开始。\n\
    \n如果将同样的方法应用于改变对象的坐标，就会得到另一种类型的动画——匀速运动。现实生活中有很多这样的例子：在空旷公路上行驶的汽车就是其中之一。然而，更多运动实例都伴随着加速或减速（如苹果从树上掉落）、方向变化（如摆动的钟摆），甚至遵循着更复杂的规律。\n\
    \n这些更复杂的动画场景在休闲游戏和街机游戏中经常出现。例如，当角色在绳索上摆动时，其速度并非恒定；向下摆动时会加速，向上摆回时会减速。还有许多涉及加速和减速的运动实例，因此在本节介绍的`Animator`类中实现这些机制是很有价值的。\n\
    \n`Animator`有两个主要用途。第一种是播放匀速动画，就像我们在上一节中做的那样。在这种情况下，`Animator`仅仅作为计算动画循环进度的代码的封装器。第二种用途是处理带加速和减速的动画更新。\n\
    \n我们将先查看使用`Animator`的代码，然后讨论其实现。清单 4-27 展示了一个使用`Animator`进行简单帧切换的示例。我们创建了`Animator`实例并设置了动画参数——目前仅设置了序列的总时长。之后，`Animator`会返回一个从动画开始时刻起算的进度比例值。\n\
    \n**清单 4-27.** *Animator 的基本使用方法*\n\n```\n// 动画总帧数\nvar numFrames = 5;\n\n// 每帧时长\n\
    var TIME_PER_FRAME = 50;\n\nvar animator = new Animator(numFrames*TIME_PER_FRAME);\n\
    \n// 启动动画序列\nanimator.start();\n\nfunction animate(t) {\n   var deltaTime = 获取从上一帧经过的时间();\n\
    \n   var fraction = animator.update(deltaTime);\n\n   // 根据进度比例和总帧数计算当前帧\n   var\
    \ currentFrame = Math.floor(fraction*numFrames);\n\n   // 绘制当前帧\n   drawFrame(currentFrame);\n\
    \n   // 循环执行\n   requestAnimationFrame(arguments.callee);\n}\n\nanimate(0);\n\
    ```\n\n`drawFrame()` 和 `获取从上一帧经过的时间()` 都是占位函数，实现起来相当容易。`Animator` 类的核心思想是将计算动画当前进度比例的代码与更新屏幕的代码分离开来。如果需要动画化对象的位置而不是帧，代码的改动量会非常小，如清单\
    \ 4-28 所示。\n\n**清单 4-28.** *更新对象位置。对象在 500 毫秒内从(0, 0)移动到(300, 300)。*\n\n```\n\
    // 动画总时长 - 半秒\nvar animator = new Animator(500);\n\n// 启动序列\nanimator.start();\n\
    \nfunction animate(t) {\n   var deltaTime = 获取从上一帧经过的时间();\n\n   var fraction\
    \ = animator.update(deltaTime);\n\n   var pos = fraction*500;\n\n   drawToken(pos);\n\
    \n   // 循环执行\n   requestAnimationFrame(arguments.callee);\n}\n\nanimate(0);\n\
    ```\n"
- fmt: "# 处理后的文本\n\nThe changed code is in bold. Simply a few lines changed, and we\
    \ moved from the frame animation to the position animation! What if we want to\
    \ add the acceleration and deceleration? This change should not affect the way\
    \ we rerender our screen; the only thing that changes is the algorithm that calculates\
    \ the new fraction. The actual code is hidden within the animator, so the client\
    \ code has only two extra lines, as shown in Listing 4-29.\n\n**Listing 4-29.**\
    \ *Setting Acceleration and Deceleration*\n\n```javascript\nvar animator = new\
    \ Animator(500);\nanimator.setAcceleration(0.5);\nanimator.setDeceleration(0.3);\n\
    ```\n\nThe rest of the code stays unchanged!\n\n**NOTE:** The overall solution\
    \ is inspired by the Timing Framework (http://java.net/projects/timingframework),\
    \ which was created to simplify the animation of user interface elements in Java\
    \ desktop programs. You may want to check it out for inspiration.\n\nBesides acceleration\
    \ and deceleration, `Animator` should allow setting the number of loops, and toggling\
    \ the direction of the animation. It should also have a way to notify the user\
    \ about interesting animation events, and provide simple controls like pause,\
    \ stop, reset, and so forth. It doesn’t make much sense to write this class step\
    \ by step, since the code doesn’t really have anything to do with gamedev-specific\
    \ algorithms. Let’s just look through it to understand how it works.\n\nThe full\
    \ code can be found with the other source code for this chapter in the `js/Animator.js`\
    \ file. In this chapter, we just review the most interesting parts of it. At first,\
    \ I wanted to put the whole thing here, but when I was finally happy with the\
    \ set of nice small features, fool-proof checks, and workarounds for corner-cases,\
    \ I realized that I needed six pages just to print the listing. So you better\
    \ grab the source code and try it out. You’ve already seen several basic usages\
    \ of `Animator`. Besides, the source code for this chapter contains a few completed\
    \ examples.\n\n`Animator` has several properties, each with a getter and setter.\
    \ Debugging code that doesn’t work well on an Android device might be a very tough\
    \ experience (read Appendix A to learn how to deal with it) with hours and hours\
    \ spent in `console.log` output. That’s why it makes a lot of sense to write a\
    \ foolproof code that checks that restrictions on the parameters are met. `Animator`\
    \ checks every parameter before assigning it to the field (see Listing 4-30).\n\
    \n**Listing 4-30.** *An Example of Setting the Parameter of* `Animator` — *It\
    \ Checks the Range*\n\n```javascript\n_p.setDuration = function(duration) {\n\
    \    // Do not allow to change the parameters\n    // if animation is running\n\
    \    this._throwIfStarted();\n    if (duration < 1) {\n        throw \"Duration\
    \ can't be < 1\";\n    }\n    this._duration = duration;\n};\n```\n\nNo one will\
    \ likely try to launch the `Animator` with an explicit duration of 0, but if the\
    \ value for the duration is somehow generated, or received via network, it is\
    \ technically possible to get to such a condition. The question is: what happens\
    \ next? Possibly the best way to deal with it in the code is to throw an exception\
    \ and notify the programmer about the problem. Allowing an unacceptable parameter\
    \ to pass might do no harm, but more often than not, it will cause unpredictable\
    \ bugs that are hard to track. This approach is called *fail fast*.\n\nNotice\
    \ the first line of the function. We don’t want the `Animator` to be reconfigured\
    \ on the go since it may cause errors as well. If the user is trying to set a\
    \ property while the animator is running, he will get an exception.\n\nFollowing\
    \ the same approach, we define setter and getter for other properties too.\n\n\
    - `duration`: The duration of one loop of animation.\n- `repeatCount`: The number\
    \ of loops; can be an integer or `-1` for infinite looping.\n- `repeatBehavior`:\
    \ Either `Animator.RepeatBehavior.LOOP` (default) or `Animator.RepeatBehavior.REVERSE`.\
    \ Default behavior means that after reaching the end of the animation, `Animator`\
    \ starts the next loop from 0 again and moves to 1."
