- fmt: 'Here’s how it works. First, you need to write the coordinates of the point
    in a form of matrix: `[x, y, z, 1]`. You must add the “1” coordinate to multiply
    the matrix and then apply the regular rules of matrix multiplication. Let’s see
    what happens when we take the first vertex of a cube and apply the second matrix
    from the example to it. Figure 8-11 shows the result of multiplication.


    ![](index-348_1.jpg)


    ![](index-348_2.jpg)


    **Figure 8-11.** *Applying transformation to the vertex coordinates*


    The point is moved by five on the x coordinate and by two on the y coordinate.
    That’s exactly what we wanted to get! If we repeat this process for every point
    of the cube, then every point is moved, and the cube itself ends up in a new position.
    Figure 8-12 shows schematically how it looks. Dotted edges mark the position of
    the cube when the transformation is applied to every vertex. The highlighted point
    is the point that we just transformed.


    **Figure 8-12.** *The “translate” transformation of cube. If every vertex is moved,
    then the cube itself is moved too.*


    Well, that’s not really an amazing result, since we could simply add five and
    two to the appropriate coordinates without dealing with matrices at all. The real
    use of matrices comes when you need to apply a bunch of transformations to the
    set of points. For example, if you have ten different transformations, one on
    top of the other, and a model with a lot of vertices, you either have to apply
    these transformations to the points of the model one-by-one, or create a single
    matrix that implements all the transformations and use it instead. Guess which
    is better.


    ![](index-349_1.jpg)


    **NOTE:** That humble “1” that we added as the fourth component of the point’s
    coordinates is not there just to make the multiplication valid. 3D engines strictly
    represent points in a slightly different coordinate system, called homogeneous
    coordinates. Why is it used in computer graphics? Because this type of coordinate
    is much easier to deal with when it comes to projections. If you want, you can
    easily find an in-depth explanation of this idea on the Internet and in mathematical
    literature, but you will not really need anything beyond this in your own 3D masterpieces.
    However, I do encourage you to learn how things work under the hood once you’re
    comfortable with the basic concepts.


    Creating a matrix that combines several transformations is as simple as multiplying
    the matrices that represent individual transformations. If you multiply the matrix
    that moves the vertex to the right by one that moves the vertex to the top, and
    then with one that rotates it around the x axis, you get a matrix that does all
    three in one pass: moves to the top-right and also rotates the model.


    There are two important points to know about matrices. First, the order of multiplication
    makes a difference. When you operate with numbers, the result is the same for
    (5 × 3) and (3 × 5), whereas with matrices it is not. To illustrate this, have
