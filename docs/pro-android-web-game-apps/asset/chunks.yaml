- fmt: '# CHAPTER 3: Creating the First Game


    `handling`, and `housekeeping`. Its task is to wire other components together
    and make them speak to each other. Think of it as the main "orchestration" class
    for the game.


    - **`BoardModel`**: The meat of the game. The class responsible for the mechanics.
    It holds the information about the state of the game: which cells are empty, which
    are occupied by red and green pieces, who is the current player, and what will
    happen if he drops a piece in a third column. This is where we implement the rules:
    validation of the turn and checking win conditions.

    - **`BoardRenderer`**: The class responsible for visuals and rendering the game
    interface on canvas. When `BoardRenderer` needs to render a cell, it asks the
    `BoardModel` about the state of that cell: is it empty, red, or green? `BoardModel`
    works like the data source for the renderer. Most of the code for this class was
    written in Chapter 2.


    To make the architecture even more clear, the following is an example of how classes
    interact with each other once the user taps the screen:


    1. The user taps the screen. The browser fires the event that has the coordinates
    of the click.

    2. The `Game` class receives the event and checks which column was under the user''s
    finger. It can translate from browser coordinates to the column coordinates because
    it knows the position of the board inside the canvas, as well as the width of
    the columns, so it can tell which column was just tapped.

    3. Having the column index, the `Game` asks `BoardModel` if it is OK to make a
    move. If the column is full, it will ignore the invalid input. A valid move updates
    the `BoardModel`: the new token appears in the internal board representation.

    4. Now the turn is made but the user doesn''t see any changes on the screen yet.
    We have updated the model but not the canvas——it still holds the old version of
    the board. `Game` uses `BoardRenderer` to redraw the cell that has the new token
    in it.

    5. To redraw the cell, `BoardRenderer` needs to know the color of the token in
    that cell. It gets the color ID from the `BoardModel` and renders the cute, gradient-filled
    ball.

    6. Now the canvas is updated and the player sees the new ball.

    7. Finally, when the match is over, the `Game` shows the alert box to notify the
    user about the result.

    8. The `Game` "resets" the state of `BoardModel`, uses `BoardRenderer` to redraw
    the empty board, and starts the new match.


