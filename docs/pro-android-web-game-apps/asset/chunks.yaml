    ## 排版后的内容


    在设备上进行打包和测试。我们来仔细看看这些参数；一旦你开始准备生产环境，它们就变得非常重要。


    - `--package` 是你的应用程序的“命名空间”。Java 开发者有一种惯例，即按照一定的规范部署他们的库，以便名称相同的类不会相互冲突。如果你有一个名为
    `Sprite` 的类，而项目中的另一个库也有一个同名类，只要它们的包不同，这两个类就能正常工作。包是一个由点分隔的单词列表；不过，通常的做法是拿你拥有的域名并倒序书写。例如，我拥有域名
    `juriy.com`；我可以使用包 `com.juriy`、`com.juriy.whatever`，甚至更长的 `com.juriy.game.client.utilites`。你需要为项目选择一个包名。


    - `--activity` 是主类的名称。选择任何你觉得合适的名字即可。`FourBalls`、`Main` 或其他任何名字都可以。


    - `--target` 是平台的版本 ID，如前所述。


    - `--path` 是你存放文件的文件夹。由于没有名为 `fourballsnative` 的文件夹，系统为我创建了一个。


    项目创建完成后，你会看到有不少新的文件和文件夹。请看图 15-1。你会看到一个类似的结构。如果你没有 Android 开发经验，不要试图去理解这些文件是做什么的。知道这是
    Android 项目的典型结构就足够了。


    ![图 15-1](img/index-573_1.jpg)

    ![图 15-2](img/index-573_2.jpg)


    **图 15-1.** *Android 项目的典型结构*


    现在你已经构建了一个空项目。它还没有包含 Cordova，但已经可以在设备或模拟器上进行编译和测试。


    ### 测试空的 Android 项目


    在开始添加 Cordova 库之前，我们先确保创建的项目确实能工作。启动模拟器或通过 USB 线连接设备。确保调试模式已开启（如果你不知道如何启用调试模式，请参考附录
    A）。确保你在项目文件夹的根目录下。执行以下命令：


    ```

    ant clean debug install

    ```


    `Ant` 使用一个名为 `build.xml` 的构建脚本来创建应用的调试版本。它会使用调试密钥对应用进行签名（每个 Android 应用都必须使用密钥签名——更多内容将在后面介绍），并将其安装到当前正在运行的模拟器或连接的设备上。如果它既没有找到模拟器也没有找到设备，构建将会失败。如果你操作正确，你应该能在已安装的应用列表中看到新创建的应用，并且能够运行它。这个应用看起来相当单调——一个黑色的屏幕上显示着灰色的“Hello
    World, `FourBalls`”文本，如图 15-2 所示。


    **图 15-2.** *空的 Hello World Android 项目*


    **注意：** 当你执行“install”命令时，需要确保设备或模拟器正在运行。如果两者都没有运行，构建脚本将会失败。如果即使模拟器已打开，脚本仍然失败，请依次执行以下两个命令：


    ```

    adb kill-server

    adb start-server

    ```


    ### 基本的 Cordova 项目


    现在我们需要完成构建“封装的原生应用”的主要工作。那就是将 Cordova 库添加到空项目中，修改 Java 文件，并将 Web 资源（HTML、脚本、CSS
    等）放到正确的位置。本章的这一部分包含了许多“黑魔法”步骤。我鼓励你深入研究原生 Android 应用开发，以便更好地理解这个过程。


    #### 为 Cordova 开发准备项目


    首先，我们需要复制几个文件，并提供一定的文件夹结构，以便为我们的应用添加 Cordova 支持。请按照以下步骤操作：


    1.  在你解压 Cordova 的文件夹中的 `/lib/android` 目录下找到 `cordova-2.0.0.jar`（当然，版本号可能不同）。

    2.  将其复制到你项目的 `libs` 文件夹中。

    3.  创建一个新文件夹 `assets`，并在其中创建另一个文件夹 `www`。

    '
