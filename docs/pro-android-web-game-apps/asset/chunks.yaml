    The bottom two images show the normal behavior of the page.


    General advice for the web games: if you can make your game work in both orientations—then
    do it. This way, you will not violate the standard behavior, and the user will
    stay happy. If you need to lock the orientation no matter what—use the least intrusive
    possible way of doing it. The rest of the code in this book relies on a standard
    browser behavior and does not force any particular orientation.


    **NOTE:** Locking the screen orientation in native Android games is a standard
    practice, so you should not avoid it if you design your game to be native. More
    about making native games out of a web application in Chapter 15.


    Most of the examples in this book use this basic skeleton, and the project in
    this chapter is no different. The fullscreen-canvas setup that we just implemented
    is not the only possible way of laying out a web page, of course. The game may
    have a smaller canvas and use the rest of the page space for the user interface
    elements—the in-game chat controls, for example. However, the approach described
    in this section is the most typical.


    The code of the skeleton is saved separately for your convenience in the file
    called `skeleton.html`. Once you start the new game experiment, you can use it
    as a template.


    ## Game Architecture


    The goal of this section is to think about the components that make up the Four
    Balls game. What are the functions of these components, and what are the relations
    between them? Games are relatively complex applications that might have dozens
    of different classes, each responsible for its own task: loading resources, rendering
    scene, game logic, networking, artificial intelligence, sound, and so forth. If
    all code is put into one huge class (or even worse, straight into the body of
    the HTML page), you will end up with a monstrous script that is impossible to
    understand or change.


    We want our project to be well-written: no global variables to hold states, no
    "smell" in the code, and a clean, object-oriented API with each class performing
    a clearly defined set of functions. If you feel uncomfortable with inheritance
    and prototypes in JavaScript, don’t hesitate to peek back to the first chapter
    of this book. Understanding these principles is very important for this chapter.


    **CHAPTER 3: Creating the First Game 99**


    Let’s start from the game flow and then think about how the game can be broken
    down into a set of independent components. Here’s what happens once the game is
    loaded:


    1. Initially, the user sees the empty board.

    2. The user taps the board to place the token. If the turn is invalid, then nothing
    happens.

    3. If the last turn was a "winning" turn, the game reports which player has won:
    red or green. If there are no more spaces left on the board, the game reports
    a draw. Otherwise, the next player has a chance to make his move.

    4. Once the game is over (either win or draw), the players should see an alert
    box with text that says like, "Red player wins."

    5. Finally, a new game starts. The board is empty and ready for the game.


    Quite simple, right? Now let’s take another step, thinking about what exactly
    the game should be able to do to implement the described flow:


    - Draw the board and tokens (rendering)

    - Check if the turn is valid and doesn’t break the game rules, and check whether
    the player has won or if the draw state was reached (logic)

    - React on user input and determine which column was clicked (event handling)

    - Wire components together: pass the events from the browser to the logic-processing,
    call-rendering routines; update the UI whenever the board changes; manage the
    game flow; report wins or draws; empty the board for the new game; and so forth
    (housekeeping).


    Now it is very easy to break the whole project into classes. They are as follows:


    - `Game`: The class that is responsible for starting the game, event'
