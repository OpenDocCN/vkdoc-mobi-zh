    **Adding the Gameplay**


    The goal of this section is to finish the implementation of the multiplayer version


    of Four Balls. We now have a working lobby, so that players can challenge each


    other to a game. Let’s add the game-handling itself.


    CHAPTER 12: Making Multiplayer Games


    Before diving into the code, let’s look at the shared components that are


    required on both the client and the server. This class is BoardModel-----it holds
    the logic of making turns, and it can check if the turn is legal.


    Sharing Logic Between the Client and the Server


    Right now, the game board works well in single-player mode. When the user


    tries to make a move, a BoardModel puts the new token on the field if the move


    was correct, or ignores the action otherwise. In a multiplayer game, tapping the


    screen is not enough to place the token on the board. The turn first goes to the


    server, and then the server checks that the valid player is making a valid turn,


    and only then will the server send back the turn result to the client.


    A well-designed game should perform the turn validation on the client too. Doing


    so improves usability: the wrong turns are reported straightaway without


    sending the response to the server. The algorithm for making the turn looks like


    the following:


    1\. User taps the game board.


    2\. The client detects the tap and calculates the number of the


    column under the tap.


    3\. The game client checks if the turn was valid (if it is not, the turn


    is simply ignored and algorithm terminates).


    4\. The turn is sent to the server and the server performs the same


    type of validation.


    5\. The turn result is sent to both players, and the next player can


    now take his turn (if the game is not over, of course).


    As you see, we have to reuse the validation logic in the client and the server----


    steps 3 and 4 are doing the same action: step 3 validates the turn on the client-


    side and step 4-----on the server side. Since both parts of the game are written
    in


    JavaScript, it is natural to try to reuse the same code and possibly the same
    file


    without useless code duplication.


    There is only one problem with this approach. The modules of Node.js are


    defined in a different way than regular browser-based classes. Node.js uses


    several ‘ magic’’ variables that do not exist in browser environment. For


    example, in Node.js you have to use exports in order to make parts of your


    module visible to the outer world, while in a browser, you simply declare new


    functions and they are appended to the global window object. In other words,'
