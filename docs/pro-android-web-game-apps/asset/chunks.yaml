    }


    The code in Listing 3-4 has two functions. The first one, init(), is already


    familiar to you: the browser executes it once the body has finished loading. The


    second function, initFullScreenCanvas(), makes canvas take all the available


    screen space, even when the window is resized or a device changes an


    orientation. It ‘‘listens’’ to the resize event, and every time such event is


    detected, it calls resizeCanvas(). Next, resizeCanvas() takes care of the


