    Next, add the following tag to the `index.html` file to load the script:


    ```html

    <script src="js/BoardRenderer.js"></script>

    ```


    Open the newly created file in your favorite IDE and prepare to write some code.


    **Note:** In this book, every example uses the same naming convention and almost
    the same project structure. When you need to create the new class and add it to
    the project, you start from creating the empty file in `<project_folder>/js`.
    The name of the file should be `<ClassName>.js`. For example, the code for `BoardModel`
    class should go to the file named `BoardModel.js`. This is a simple and very convenient
    way of organizing your code. It keeps your project folder clean and makes it easy
    to find the class you need. And don''t forget to include every script you create
    into the `index.html` page.


    ### Constructor


    Let''s start from the constructor. When you write the constructor of the class,'
