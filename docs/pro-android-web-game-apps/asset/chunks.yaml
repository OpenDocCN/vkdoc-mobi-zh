    We will start this chapter by taking a brief look into the evolution of networking:
    from historical APIs to cutting-edge technologies that will be available in the
    near future. Afterward, we will be ready for tasks that are more sophisticated:
    exploring different ways of communication between the client and the server, and
    building real-time solutions that support sending messages in both directions.


    ## CHAPTER 11: Talking to the Server


    ### The Evolution of Networking in Browsers


    Let’s take a (very) short history course to see how networking has helped web
    applications become what they are now, the kind of problems developers faced,
    and how most of these problems were solved.


    In the early years, web browsers were programs that could only render plain HTML
    pages, follow links, download and display images, and provide a few utility functions
    like searching and bookmarking. Nobody thought about a browser as an environment
    for building rich applications or games. The regular pattern of using the web
    was to:


    - Load a page

    - Read through its content

    - Click a link, type an address in the address bar, or reload the page if new
    content is desired


    Clearly, this model gave total control over the web page to the user; without
    his explicit action, the content remains the same. This model is perfect for passive
    surfing and exploring static data. For example, a web site that allows the user
    to read the chapters of a book can work without any dynamic features like JavaScript
    and Ajax; it remains readable and user-friendly.


    There are many examples when this model is not sufficient for comfortable surfing,
    however. Reloading the web page means reloading every bit of it; in some cases,
    this may be redundant and wasteful. Imagine a page that has a hierarchical menu
    on the left-hand side. If all pages were static, clicking the menu item to expand
    it would cause the whole page to reload. Even if traffic is not an issue, the
    process of rendering the page from scratch is distracting to the user—at the very
    least, the page blinks.


    This model had to "expire" eventually. Indeed, its practical use involved a lot
    of overhead, and even basic interactive applications like chat or web games were
    impossible to implement when there was no way to load new data from the server
    without reloading the page. Then Ajax appeared on the scene.


    Ajax is a technology that allows loading server data without reloading the web
    page. It was first implemented by Microsoft as a small component called `XMLHTTP`.
    Later, `XMLHttpRequest` made it possible to query the server, receive the response,
    and update only the part of the page that needs to be updated.


    Ajax felt like the natural evolution of the web—allowing a web page to execute
    HTTP requests without reloading allowed developers to create a whole new world
    of web applications; far more sophisticated web pages where the interaction between
    the user and the browser isn’t just a by-product of the surfing process. Of course,
    it was possible to make a dynamic web page even before Ajax appeared—for example,
    by loading the never-ending stream of content into the `IFRAME`—but these techniques
    were only hacks: they lacked reliability and good cross-browser support.


    **NOTE:** Strictly speaking, Ajax is an acronym for Asynchronous JavaScript and
    XML. Acronyms are typically spelled in uppercase. However, this word has become
    a common noun and most online media spell it as Ajax. In this book, I will use
    the second naming approach.


    Ajax is not a standard, an implementation, or the name of an API. It is a buzzword.'
