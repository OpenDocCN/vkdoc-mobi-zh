- fmt: "要启动模拟器，请从列表中选择AVD并点击 **Start…**。你将看到一些启动选项，可以放心保留默认值。模拟器加载时间较长，请耐心等待，至少需要几分钟。一旦看到Android主屏幕，你就可以导航到本章前面创建的HTML页面（如图1-10所示）。\n\
    \n**注意：** 模拟器启动需要相当长的时间，因此在整个开发会话期间保持其打开状态是有意义的，当你需要检查更改时，只需在浏览器中更新页面即可。\n\n![](index-28_1.jpg)\n\
    \n# 第1章：入门\n\n**21**\n\n**图1-10.** *为Android模拟器创建新设备配置文件*\n\n**注意：** 通常，当你想引用自己的机器时，你会输入\
