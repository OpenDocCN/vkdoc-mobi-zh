    ## CHAPTER 12: Making Multiplayer Games


    **479**


    **Figure 12-1.** *The relative proportions of effort in developing a good multiplayer
    game*


    Why so much time? The reason why multiplayer games are more involved is that they
    require a certain infrastructure to support the seamless online experience: lobbies,
    ratings, high scores, friend lists, avatars, chat rooms—these are only a few examples
    to begin with. Look through the advanced online gaming communities and you will
    find even more components. When users play online, they not only want to leverage
    their offline experience and waste some network traffic, but they want to meet
    new people, find the right opponents, see their achievements, progress, and prove
    that they are better than others—that’s what makes online games fun to play. The
    development of such infrastructural tools is often more challenging than implementing
    the core of the game: the logic and UI.


    **NOTE:** This chapter assumes basic knowledge of HTTP protocol. At the very least,
    it assumes that you know about request headers and how they are different from
    the request body; that you know about `GET` and `POST`, and the differences between
    them; that you know how a developer should serialize parameters when he wants
    to send them to the server; that you know what a server response code is, and
    other basic HTTP matters.


    ## CHAPTER 12: Making Multiplayer Games


    ### Game Architecture: Moving from Single Player to Multiplayer


    Let’s find out the optimal way to upgrade the single-player game that we created
    in Chapter 3 to a multiplayer version. First, a client-server solution involves
    two components that share responsibilities and logic: the client and the server.
    We need to analyze the best way to split the tasks between the two. Since we already
    have implemented some components, we want to re-use them where possible. There
    are two points to consider: first, the components designed for the single-player
    game often cannot be used without at least minor changes; and second, how to share
    the code for the component between the client and the server.


    When these two issues are addressed, we are ready to design the architecture of
    the game and implement it in code. The general process is as follows:


    1. Find out the responsibilities of client and server.

    2. Review the game components that we already have and think about how to re-use
    them.

    3. Design the architecture of the game.

    4. Implement it.


    ### The Job of Client and the Job of Server


    Splitting the set of responsibilities between the client and the server is not
    always a trivial task, but most of the time architects make their decision based
    on the game type, security requirements, requirements for responsiveness, and
    so forth. The major decision is where to put the logic of the game—for example,
    the verification of the turns. In this section, we look into the different types
    of games, not only Four Balls.


    The old rule of the web said, “Never trust the input of the client.” It means
    that everything that the client can send to the server can also be sent by a malicious
    user who wants to hack your system and access functionality that he is not supposed
    to. A simple example of the possible problem is the game that supports sending
    the resulting score to the worldwide record board. If the user has enough technical
    skills, he can easily hijack the process of transmitting the result to the server,
    and send any number that he wants. Usually, it is easier to do this with text-based
    protocols like HTTP and slightly harder for binary protocols, but in any case,
    it is doable if the hacker has enough time and patience. So any user can become
    the top in your leader board. In the best case, the cheater is recognized and
    banned.


    Taking security considerations into account, the solution seems obvious: put every
    possible bit of logic to the server, and do not allow the client to make any'
