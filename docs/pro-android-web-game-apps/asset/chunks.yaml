    \ of the document and puts in placeholders instead of actual dynamic data. Listing\
    \ 10-18 shows how the template might look.\n\n**Listing 10-18.** *An Example of\
    \ a Template*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"\
    utf-8\" />\n</head>\n<body>\n<% if (user) { %>\n<h1><%= user.name %></h1>\n<%\
    \ } %>\n</body>\n</html>\n```\n\nThis is the code for `EJS` (`https://github.com/visionmedia/ejs`),\
