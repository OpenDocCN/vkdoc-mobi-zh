  trans: "\n### 位于圆形或正方形内。  \n多边形稍微复杂一些，但仍然可以实现。但如果场景中的物体形状更复杂呢？如果你想选取一张图像，其中包含不应被视为\"\
    材质\"的透明区域呢？显然，有些情况仅使用简单的数学算法是无法实现的。针对此类情况，本章下一节将介绍一种\"像素级精确\"的选择方法。实现拖拽功能的完整源代码可在文件\
    \ `04.drag_and_drop.html` 中找到。\n\n**注意：** 我们在本书中创建的游戏不需要像素级精确的选取。然而，这类输入是许多游戏开发者面临的常见问题。因此，我决定专门用一节来讨论这个问题。例如，拼图类游戏如果没有这种技术几乎无法正确实现。\n\
    \n## 像素级精确选取与图像蒙版\n\n用户能够选择的最小单位是一个像素。与 Canvas API 不同，浏览器事件不处理像素的分数部分：无法选中\"像素的左侧\"\
    或\"像素的底部角落\"。选取复杂形状的任务可以用略微不同的方式表述：确定给定像素属于场景中的哪个图形。显然，如果我们能做到这一点，就能以完美的精度选取任何图形。事实证明，只需相对较少的努力就能实现这样的算法。\n\
    \n每个像素都有一种颜色。假设我们制作了一个游戏，其中每个形状都有一种独特的纯色。例如，三角形是蓝色，正方形是红色，圆形是绿色。当用户点击屏幕时，我们可以通过获取像素的颜色并将其映射到图形，立即知道用户手指下的是哪个图形。这可以通过\
    \ Canvas API 轻松实现。首先，我们需要获取一个像素的颜色；如果用户在坐标 `(51, 73)` 处点击了屏幕，获取该像素值的代码如下所示：\n\n\
    ```javascript\nvar imageData = ctx.getImageData(51, 73, 1, 1).data;\n```\n\n`imageData`\
    \ 是一个包含四个元素的数组：颜色的红色值、绿色值、蓝色值和 alpha 值。有了这个原始像素数据，我们可以判断选中了哪个图像：\n\n```javascript\n\
    if (imageData[2] == 255) {\n    console.log(\"蓝色三角形\");\n} else if (imageData[0]\
    \ == 255) {\n    console.log(\"红色正方形\");\n} else if (imageData[1] == 255) {\n\
    \    console.log(\"绿色圆形\");\n} else {\n    console.log(\"空白区域\");\n}\n```\n\n\
    但我们制作的大多数游戏都包含各种形状和多种颜色。大多数精灵都有多种颜色！这是否意味着这种技术毫无用处？绝非如此。即使图像和形状有不同的颜色，我们也可以将它们绘制成被纯色\"\
    覆盖\"的样子。在进一步讨论之前，让我们先看看这意味着什么。图 5-6 展示了这一概念。我们有两张卡通房屋图像，每张都有一个调色板（左图）。为了让我们的技术生效，我们必须重新绘制房屋图像，为每张赋予一种独特的纯色（右图）。\n\
    \n**图 5-6.** *原始图像（左）和蒙版（右）*\n\n这种技术被称为蒙版，而图形的纯色轮廓通常被称为蒙版。稍后我们将看到如何创建蒙版；现在，我们先假设这是可行的。\n\
    \n每个像素都有一种颜色。颜色由一个 32 位数字表示，分为四个 8 位分量：红色、绿色、蓝色和 alpha。我们可以轻松地将颜色转换为其整数值，反之亦然。如果我们为场景中的每个图形赋予一个唯一的\
    \ ID，然后将这个 ID 编码为颜色，会发生什么？没错。我们就能为场景中的每个图形获得唯一的颜色。如果我们用这种独特的颜色绘制每个图形的蒙版呢？那么像素的颜色就代表了占据该像素的图形的\
    \ ID！当用户点击屏幕时，我们…\n"
- fmt: "# 排版后的内容\n\n只需要将遮罩颜色的红色、绿色和蓝色值转换回来，就可以得到形状的整数ID。\n\n关键在于现在实现这一技术。\n\n**注意：**\
    \ 但用户点击后，屏幕难道不会闪过彩虹的每一种颜色吗？我们需要事后*渲染*那些颜色！没错，我们需要渲染遮罩，但承载它们的画布不必与你的“主”画布相同。在真实的游戏中，用于绘制遮罩的画布对用户永远不可见，遮罩也绝不会出现在屏幕上。所有渲染都在内存中幕后完成。\n\
    \n## 复合操作\n\n让我们从一个简单的问题开始：如何绘制图像遮罩？我们需要将图像的每个不透明像素替换为具有遮罩颜色的不透明像素。为此，我们使用2D上下文的一个特性，称为`globalCompositeOperation`。它定义了在现有像素之上绘制新像素的方法。默认方法称为`source-over`。新的非透明像素绘制在现有像素之上，就像一层层颜料叠加在一起。将要绘制的像素称为源，场景中已有的像素称为目标。`source-over`意味着“将源像素放在目标像素之上”。\n\
    \n图5-7展示了该操作的组成部分以及操作结果——也就是你预期会看到的结果。房子图像先被绘制；因此，在绘制圆形时，它已经在画布上了。房子是目标。圆形后绘制，所以它是源。\n\
    \n![](index-214_1.jpg)\n\n![](index-214_2.jpg)\n\n**图5-7.** *默认复合操作：source-over*\n\
    \n这是绘画的自然方式。当你绘制图像时，你期望它出现在任何现有背景图像之上。然而，这条规则可以很容易地改变。如果你将`globalCompositeOperation`设置为`\"\
    source-atop\"`，新绘制的像素只会出现在背景不透明的地方，如图5-8所示。\n\n**图5-8.** *source-atop复合操作。源像素仅当背景不透明时才出现在背景之上；其他所有部分都被裁剪。*\n\
    \n这正是制作图像遮罩所需要的！但我们将使用覆盖整个图像的纯色矩形，而不是带有花哨图案的圆形。我们首先绘制图像（目标），然后用由唯一对象ID定义的颜色覆盖它。这个概念非常简单但非常强大。图5-9展示了如何使用`source-atop`操作制作图像遮罩。\n\
    \n![](index-215_1.jpg)\n\n**图5-9.** *使用source-atop操作的图像遮罩。纯色矩形仅覆盖图像的非透明部分。*\n\n\
    **注意：** Canvas API还提供了其他几种复合操作。如果你对深入了解此主题感兴趣，请查看名为`08.composites.html`的演示，该演示随本章材料提供。它展示了每个可用复合操作的效果。关于颜色合成背后数学的更多正式描述，请参考Thomas\
    \ Porter和Tom Duff的论文《Compositing Digital Images》。*Computer Graphics* 18, no. 3\
    \ (July 1984)。\n\n现在让我们在实践中实现这一技术。我们从清单5-26中的两个函数开始。\n\n**清单5-26.** *使用从图像ID派生的颜色绘制图像遮罩*\n\
    \n```\nfunction numberToColor(n) {\n    var hexString = n.toString(16);\n    //\
    \ 添加填充\n    return \"#\" + \"000000\".substr(0, 6 - hexString.length) + hexString;\n\
    }\n\nfunction drawImageMask(image, x, y, maskColor, ctx) {\n    var w = bufferCanvas.width\
    \ = image.width;\n    var h = bufferCanvas.height = image.height;\n    var maskCtx\
    \ = bufferCanvas.getContext(\"2d\");\n    // 原始图像先绘制，它是目标\n    maskCtx.drawImage(image,\
    \ 0, 0);\n    // 设置复合操作\n    maskCtx.globalCompositeOperation = \"source-atop\"\
    ;\n    maskCtx.fillStyle = maskColor;\n    maskCtx.fillRect(0, 0, w, h);\n}\n\
    ```"
