- fmt: '## collision detection, and so forth.


    When it comes to drawing, the world coordinates have to be translated to screen
    coordinates.


    Look at the typical world-rendering task illustrated in Figure 7-4. Let’s say
    that we need to draw a hut that is located at `(700, 500)` world coordinates.
    `drawImage()` accepts canvas coordinates (or screen coordinates), so how do we
    find them? The position of the object on the screen depends on which part of the
    world is currently visible — or the viewport position. If the top-left corner
    of the viewport is located at `(480, 300)` world coordinates, then the screen
    coordinates of the object are `(700 – 480, 500 – 300) = (220, 200)`.


    ![](index-276_1.jpg)


    ## CHAPTER 7: Making an Isometric Engine


    The same is true for the reverse translation. When the user taps the screen, you
    get screen coordinates. For example, the `EventHandler` reports that the user
    tapped the `(50, 100)` point. Now you need to find which object was clicked. Objects
    are stored in world coordinates (in Chapter 6, we discussed why it is more convenient
    to store objects that way), so to find the object, you have to translate back
    to world coordinates. The world coordinates of the click are `(480 + 50, 300 +
    100) = (530, 400)`.


    Let’s continue the example and say that the user missed the object. This means
    that he hit one of the ground tiles. But which one exactly? To find that out,
    we need to translate from world coordinates to isometric grid coordinates. The
    formula to do that is a little more complex; we will explore it later in this
    chapter.


    The hut in Figure 7-4 has world coordinates `(700, 500)`, screen coordinates `(220,
    200)`, and it stands on tiles with coordinates `(0, 3)` and `(1, 2)`.


    **Figure 7-4.** *Three different coordinate systems: world, screen, and isometric
    grid*


    Once you understand how coordinates work and how to translate between different
    systems, you are ready to proceed to the next part — writing the game itself.
    The first step of our plan is to render the terrain.


    ## Rendering Tiles


    We start by carefully examining the resources that we have — the isometric tileset
    shown in Figure 7-5.


    ![](index-277_1.jpg)


    **CHAPTER 7: Making an Isometric Engine** **273**


    **Figure 7-5.** *The raw material for the rendering: a spriteset is shown on the
    left, a zoomed grass sprite is on the right*


    What is unusual about this terrain sprite is that the edges are not entirely straight;
    fragments of grass fall behind the bounds of the cell. This technique is often
    utilized by artists to add a feeling of depth to the image, making it more realistic.
    If you cut a rectangular piece of your lawn and then take a picture under an “isometric”
    angle, you’ll see that the edges are not straight at all. This is exactly how
    this kind of tile looks.


    Tiles like these are more than common in game development. To refer to them in
    the text, and to differentiate them from the perfect diamond tiles in the previous
    chapter, we will use the word **decorated** — because of extra decorations that
    you have to take into account. For the perfectly straight-edged tiles, we will
    use the words **flat** or **simple**.


    **NOTE:** These terms are not industry standards. We need to distinguish between
    the different types of tiles in this section, so I decided to invent my own names
    to classify them.


    The rendering technique for decorated tiles is slightly different compared to
    flat tiles. Since you might encounter both cases in your own games, we will look
    at the difference. Figure 7-6 illustrates a simple isometric tile case, one that
    has a shape of a perfect diamond. Drawing it is quite simple: the width and the
    height of the sprite is the same as the width of the cell in an isometric grid,
    and the rendering order doesn’t matter. You can draw it in whatever order you
    like — from top to bottom, from right to left — whatever is more convenient to
    you. Since tiles do not overlap, the result will always be the same.


    ![](index-278_1.jpg)

    ![](index-278_2.jpg)


    **CHAPTER 7: Making an Isometric Engine**'
