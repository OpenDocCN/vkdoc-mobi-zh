  trans: "\n```javascript\n// 现在 Car.prototype 被添加到了原型链中\n\nFireTruck.prototype.turnCannon\
    \ = function(direction) {\n  console.log(\"Cannon moves to the \" + direction);\n\
    };\n\nvar truck = new FireTruck();\n\n// 现在可以正常工作了，因为 Car.prototype 已位于 truck\
    \ 对象的原型链中\ntruck.move();\ntruck.turnCannon(\"right\");\n```\n\n示例现在可以运行了，但输出结果仍然有些问题。\n\
    \n```\ntrue\nundefined car moves\nCannon moves to the right\n```\n\n# 第 1 章：入门\n\
    \n汽车的颜色是在 `Car` 构造函数中设置的。由于构造函数本身并未执行，因此颜色变量为 `undefined`。这个问题也很容易解决。修改 `FireTruck`\
    \ 构造函数，并在其中添加对 `Car` 构造函数的调用。这样，我们就可以让 `Car` 初始化其自身的对象变量。\n\n```javascript\nfunction\
    \ FireTruck() {\n  Car.call(this, \"red\");\n}\n```\n\n重新运行代码，即可获得正确的输出结果。\n\n\
    尽管代码可以运行，但还存在一个小问题需要解决。当你创建新函数时，其 `prototype` 属性并非为空。它包含一个名为 `constructor` 的属性，该属性指向函数本身。当我们调用\n\
    \n```javascript\nFireTruck.prototype = Object.create(Car.prototype);\n```\n\n\
    时，这个属性会丢失，因为新创建的对象没有自己的属性。我们可以将缺失的属性作为第二个参数传递给 `create`。\n\n```javascript\nFireTruck.prototype\
    \ = Object.create(Car.prototype, {\n  constructor: {\n    value: FireTruck, //\
    \ 等同于 FireTruck.prototype.constructor\n    enumerable: false,\n    writable: true,\n\
    \    configurable: true\n  }\n});\n```\n\n`constructor` 并非普通属性。当你在对象的键中循环遍历时，它不会出现，但如果你通过名称直接访问，它是可用的。我们可以通过将属性描述符传递给\
    \ `create()` 的第二个参数来实现相同的结果。描述符包含以下几个字段：\n\n- `value`：初始值\n- `enumerable`：该属性是否应出现在对象属性列表中（例如\
    \ `for… in` 或 `Object.keys` 循环中）\n- `writable`：该属性是否可以被赋予不同的值\n- `configurable`：如果为\
    \ true，则可以更改描述符定义的规则，或删除该属性\n\n通过这种方式，我们模拟了真实构造函数的行为，保留了 ECMA（欧洲计算机制造商协会，负责 JavaScript\
    \ 背后标准的组织）规范所定义的原型结构。这是前面描述的编码原则的实际实现：保留对象的结构。即使你不知道为什么可能需要这个属性，你也必须保留它。\n\n让我们看看**清单\
    \ 1-8**，这是该示例的最终版本。它展示了如何实现继承以及构建自定义原型链。继承代码被移到了独立的函数中。这样做有几个好处：至少，我们消除了代码重复（如果应用程序中有几十个对象）。此外，如果你将游戏移植到较旧的浏览器，可能需要实现不同的继承策略，因为较旧的浏览器可能不支持上述特性。\n\
    \n**清单 1-8.** *继承示例的最终版本*\n\n```javascript\nfunction extend(subConstructor, superConstructor)\
    \ {\n  subConstructor.prototype = Object.create(superConstructor.prototype, {\n\
    \    constructor: {\n      value: subConstructor,\n      enumerable: false,\n\
    \      writable: true,\n      configurable: true\n    }\n  });\n}\n\nfunction\
    \ Car(color) {\n  this._color = color;\n}\n\nCar.prototype.move = function() {\n\
    \  console.log(this._color + \" car moves\");\n};\n\nCar.prototype.turn = function(direction)\
    \ {\n  console.log(this._color + \"car turns \" + direction);\n};\n\nCar.prototype.stop\
    \ = function() {\n  console.log(this._color + \" car stops\");\n};\n\nfunction\
    \ FireTruck() {\n  Car.call(this, \"red\");\n}\n\nextend(FireTruck, Car);\n\n\
    FireTruck.prototype.turnCannon = function(direction) {\n  console.log(\"Cannon\
    \ moves to the \" + direction);\n};\n\nvar truck = new FireTruck();\ntruck.move();\n\
    truck.turnCannon(\"right\");\n```\n\n`extend` 函数将在本书的每一个脚本中使用。\n"
- fmt: 'Create a new file called `utils.js` and put the code for the function there.
    In upcoming chapters, we will add other useful functions to this file.


    **NOTE:** The implementation of OOP in JavaScript has evolved several times during
    the last few years. There are multiple approaches to solving the same task: some
    are better, while others are a little worse or outdated. The described approach
    is the cleanest one so far. Also, `Node.js` (the server-side JavaScript engine
    that we learn in Chapter 10) uses the same method of extending objects. Using
    it makes porting objects from client to server a much easier task. In fact, I
    cheated a little and used the function from the `Node` core module to keep this
    sort of consistency.


    A final note on naming. In this chapter, I did my best to avoid using the word
    ‘ class’. It turns out, however, that `class` is a great word to describe the
    concept of the blueprint that you can use to construct new objects. Using words
    like ‘ constructor’ and the ‘ prototype chain’ is very inconvenient. In upcoming
    chapters, I use the word ‘ class’ to refer any constructor function together with
    the prototype. In other words, the whole set of properties that define the object.
    Since now we have clarified the mechanics behind JavaScript OOP, it will not cause
    any misunderstanding.


    OOP presents great possibilities for structuring your code. Even though JavaScript
    doesn’t have classes, it is still an object-oriented language. For a long time,
    JavaScript was used for simple scripts, and OOP approaches seemed like an unnecessary
    level of complexity. When the code base grew, however, OOP showed its full potential.


    ## A Word About Mobile Browsers


    Android is an open and relatively new platform—a sweet target for every company
    that makes browsers. Major browser-market players are competing to make ‘ the
    ultimate mobile Android browser.’ At the time of writing, there are a lot of alternatives
    available for the user: Firefox, Dolphin HD, Dolphin Mini, Opera Mini, and several
    other products. It seems that we’ll have another browser war really soon.


    This enthusiasm is really great since the competition is the force that improves
    the quality of the product, especially when browsers are free and quality is the
    only distinction. On the other hand, it makes your life a little harder. As a
    web application developer, you are responsible to write the code that runs fine
    on all the chosen platforms. More supported browsers means more happy users, but
    it also means more sleepless nights, ugly hacks, and longer development time.


    Whatever strategy you or your boss picks, the rule about browser families stays
    the same: if you are optimizing the code for a stock browser, make sure it looks
    good on Chrome. With mobile Firefox, make sure that the application works fine
    on the desktop version.


    ## Summary


    In this chapter, we reviewed the set of tools needed to start the development
    of Android web applications. We installed `JDK` (Java Development Kit) and tried
    out two IDEs to write the simplest possible Hello World application. We installed
    the `nginx` web server to make the page available to the emulator and/or device,
    and we configured `nginx` to use the folder of our Hello World application as
    the root for static files. Now when we change the file in the IDE, we can instantly
    see the changes in the browser by simply reloading the page.


    We installed Android SDK and configured the emulator to test our page with it.
    We learned how to create new emulators and how to set various options like API
    version and screen resolution.


    In the second part of the chapter, we reviewed the best practices for coding.
    We learned how to use the strengths of JavaScript while avoiding pitfalls. We
    determined several development principles that are especially important for JavaScript.


    We learned how OOP works in JavaScript. This topic causes a lot of confusion and
    it was important to understand the basic principles that we will use later.'
