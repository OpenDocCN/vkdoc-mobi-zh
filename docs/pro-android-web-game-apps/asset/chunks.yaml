    ## 实现注意事项


    该算法的具体实现可能差异很大，具体取决于你正在制作的游戏。例如，在战术游戏中，单位在方形网格内移动，你其实并不需要路点图。网格本身扮演了图的角色。每个瓦片恰好有四个连接：东、西、北、南（如果你允许对角线移动则是八个），并且很容易预测当前瓦片旁边的瓦片是哪个。如果某个瓦片被标记为“墙壁”，则那个方向就没有连接。图
    13-12 展示了一个此类游戏世界的示例。


    移动的代价通常也是恒定的。距离的计算方式有所不同：欧几里得距离不适用，因为你不允许角色笔直穿过瓦片移动。这种情况下使用的距离被称为曼哈顿距离。它代表了一种只能沿坐标轴移动的世界——就像在曼哈顿市区，你驾车行驶在由街道和林荫大道构成的网格中，但不会穿过摩天大楼。曼哈顿距离由公式
    `|x2 - x1| + |y2 - y1|` 计算得出。对于此类寻路，你可以坚持使用更简单的 A* 算法实现。


    **图 13-12.** *基于方形瓦片的游戏世界在寻路时可以无需图结构也能运作。*


    最后，实现中有一行代码在大图上可能成为性能杀手：


    ```

    var currentNode = openList.sort(function(a, b) {return a.estimatedCost - b.estimatedCost})[0];

    ```


    问题在于，在包含数千个节点的大图上，对开放节点数组进行排序可能会非常慢（在小地图上你不会注意到差异）。如果你需要一个高效的算法，应该寻找能够保持元素预排序的数据结构。例如，基于二叉树的优先队列实现。对这些算法的讨论超出了本章的范围，但你可以在互联网上轻松找到几种优秀的实现。`https://github.com/vadimg/js_bintrees`
    上的小型库是一个不错的起点。


    ## 构建寻路图的方法


    正确构建的寻路图是实现智能 AI 移动的关键。构建图的方法有很多种，本节将对其中一些进行简要概述。


    - 全手动图：由你自行设置节点和连接的坐标。

    - 视线方法：允许你仅设置节点位置，然后基于关卡几何体计算连接。

    - 导航网格：图的节点是多边形而非点。


    ### 全手动图


    手动创建图的第一种方法是逐个定义每个节点和连接，然后让角色选择离他最近的节点。对于拥有大型关卡的的游戏来说，这种方法可能相当低效，因为游戏设计师在放置节点时必须非常小心。图
    13-13 展示了一个可能的问题：角色选择了最近的节点，但中间有一堵墙挡路。


    **图 13-13.** *左侧是简单寻路图存在的问题：由于关卡设计师的失误，角色试图穿过墙壁到达节点。右侧是修正后的版本。*

