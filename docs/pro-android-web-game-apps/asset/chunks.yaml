  trans: "\n**注意：** Web 服务器通常使用端口 `80`。有时，像 Skype 这样的程序可能会出于自身需要占用该端口。如果你在 Skype 运行期间启动\
    \ `nginx` 时遇到问题，请打开 Skype，依次进入 **工具** → **选项** → **高级** → **连接**，然后取消选中 **使用端口\
    \ 80 和 443 作为传入连接的备用端口**。\n\n或者，你也可以将 `nginx` 配置为使用其他端口，例如端口 `8080`。如果选择这样做，请记住在访问页面时需要在地址中添加端口号。例如，如果将\
    \ `nginx` 配置为使用端口 `80`，你可以在浏览器中输入 `http://localhost` 来加载页面；否则，你需要在地址栏中正确设置端口，例如\
    \ `http://localhost:8080`。\n\n## 设置 nginx\n\n从 `http://nginx.org/en/download.html`\
    \ 下载最新版本的 `nginx`。\n\n`nginx` 的安装过程非常简单——你只需解压即可。这足以让它运行起来，但它只会从一个预定义的内部文件夹提供文件服务。这意味着，即使是最小的修改，你也需要反复复制整个项目的内容来进行测试。我们将重新配置\
    \ `nginx`，使其将项目目录作为 Web 根目录。\n\n进入 `nginx` 安装目录下的 `conf` 文件夹，用文本编辑器打开 `nginx.conf`。找到以下几行：\n\
    \n```\nlocation / {\n    root html;\n    index index.html index.htm;\n}\n```\n\
    \n并将 `html` 改为项目的路径，如下所示（我使用了 `c:\\apps\\projects\\myproject`）：\n\n```\nlocation\
    \ / {\n    root c:/apps/projects/myproject;\n    index index.html index.htm;\n\
    }\n```\n\n**注意：** `nginx` 使用井号 (`#`) 在配置文件中进行注释。如果看到以 `#` 开头的行，可以安全地忽略它，或者将其删除以保持配置整洁。注释块的最初用途是展示如何处理配置的某个方面——相当于内联帮助。\n\
    \n加粗的代码是项目文件夹的路径。如果你决定更改默认端口，请找到以下行：\n\n```\nserver {\n    listen 80;\n    server_name\
    \ localhost;\n```\n\n并将 `80`（代码中加粗的部分）改为你喜欢的任何端口。\n\n保存更改并启动 `nginx`。你不会看到任何界面或带有设置的窗口；这是正常的。`nginx`\
    \ 在后台运行，没有用户界面；你通过命令来控制它，而不是按钮和菜单。\n\n再次打开你常用的桌面浏览器，输入 `http://localhost`。你应该能看到你的\
    \ Hello World 网页正在运行。如果你看到类似于“欢迎使用 nginx！”的内容，说明 Web 服务器读取 HTML 文件时使用了错误的文件夹。请确保你已按照说明操作，并在\
    \ `nginx.conf` 中正确设置了 `root` 参数。\n\n## 在移动设备上打开页面\n\n现在，如果你手头有移动设备，可以打开同一个网页，看看它在你的\
    \ Android 设备上是什么样子！\n\n最简单的方法是将你的 Android 设备和 PC 通过 Wi-Fi 连接到同一网络。你需要找到你电脑的 IP\
    \ 地址，并在移动浏览器中输入该地址。例如，如果你的 PC 在本地网络中的 IP 地址是 `192.168.0.15`，你应该打开浏览器并在地址栏中输入 `http://192.168.0.15`。你就能看到你刚刚创建的页面了。\n\
    \n如果你没有移动设备，或者没有 Wi-Fi 接入点，无法将 PC 和 Android 设备连接到同一网络，那该怎么办？好吧，最好的选择是购买缺失的硬件。还有什么更简单的办法吗？但说正经的，你可以安装\
    \ Android 模拟器，并用它来测试你的 Web 应用。\n\n## Android SDK 和模拟器\n\n好消息是，你无需在众多产品中做出选择，也无需为市场上的每种设备下载单独的工具。你只需下载并安装\
    \ Android SDK，配置设备配置文件，然后使用给定的配置文件运行模拟器。然后，你就可以像使用真实设备一样使用模拟器了……\n"
- fmt: '### 移动设备测试


    在移动设备上操作：打开浏览器、输入地址、加载页面等等。


    尽管Android模拟器非常出色，但仍应尽快在真实设备上进行测试。真实设备可能具有其独特的供应商特定和硬件特定特性，这些特性会影响应用程序的行为方式。此外，由于真实设备的触感不同，你无法在模拟器上评估产品的可用性。在智能手机的虚拟副本内点击与手握真实手机或平板电脑是不一样的。


    模拟器在检查应用程序是否能在所有支持的Android版本和屏幕分辨率上正常运行方面非常有用。通常，你没有几十台备用的Android设备用于测试——模拟器要便宜得多（实际上是免费的）。


    **提示：** 即使一切在模拟器上按预期运行，真实设备可能仍会出现异常。在测试的后期阶段，在实际设备上测试你的产品会很有用。像`Perfecto Mobile`（[www.perfectomobile.com](http://www.perfectomobile.com)）这样的服务可以帮助你做到这一点，而无需购买或借用你想尝试的每一台设备。它允许你远程控制几乎任何型号的移动设备；你只需按在它们上面测试所花费的时间付费。


    ### 安装SDK


    Android模拟器是Android SDK（一套用于Android开发的工具）的一部分，就像Java SDK是Java开发工具一样。


    从[http://developer.android.com/sdk/index](http://developer.android.com/sdk/index.html)下载Android
    SDK并安装它。在安装向导的最后一步，保留勾选标记以启动SDK Manager。


    SDK本身附带了一些基本工具（因此安装程序的大小仅为40 MB）。其余组件需要单独下载。SDK Manager会检查可用组件的列表，并允许你选择要下载的内容（见图1-7）。


    ![图1-7](index-25_1.jpg)


    **图1-7.** *在SDK Manager上安装可选包*


    选择你计划使用的组件，然后点击`Install`。如果你使用模拟器进行测试，你应该对所有计划支持的平台都打上勾。同时，标记`Tools` → `Android
    SDK Platform-Tools`和`Extras`。请参考图1-7。现在是个泡杯咖啡的好时机，因为这个过程并不快，而且文件也不小。


    ### 设置AVD


    下载完成后，你就可以配置并启动模拟器了。启动AVD Manager；它位于你安装SDK的文件夹中。AVD代表Android虚拟设备；它是将被模拟的平台配置文件。当你首次打开该应用程序时，它没有任何预配置的AVD。设备列表将为空，窗口将如图1-8所示。


    ![图1-8](index-26_1.jpg)


    **图1-8.** *尚未配置任何AVD的Android虚拟设备管理器窗口*


    点击`New`按钮来创建第一个AVD。在对话框中，设置模拟器参数（见图1-9）。`Device Name`是标识此配置的标签；输入任何你觉得合适的名称。`Target`是模拟器将使用的Android
    API版本。在本书中，我们将使用Android 2.2及以上版本，因此为第一个设备选择`Android 2.2`——`API Level 8`。你可以将SD卡的大小留空或设置为某个值。最后一个选项允许你设置皮肤。皮肤决定了模拟器的分辨率；任选一个，但确保皮肤适合你的PC屏幕尺寸，否则使用起来会很困难。当你按下`Create
    AVD`按钮时，设备配置文件就会出现在列表中。对于你计划使用的每个配置，重复此过程。


    ![图1-9](index-27_1.jpg)


    **图1-9.** *创建一个新的AVD*'
  raw: 'would with a mobile device: open browser, enter address, load page, and so
    on.


    Even though Android emulators are really good, you should perform testing on


    real devices as soon as possible. A real device might have its own vendor-


    specific and hardware-specific peculiarities that will affect the way the


    application behaves. You also can’t evaluate the usability of your product on
    the


    emulator since the real device feels different. Clicking inside the virtual copy
    of a smartphone is not the same as holding the real phone or tablet in your hands.


    Emulators are useful when it comes to checking if an application runs fine on
    all


    supported Android versions and screen resolutions. Usually, you don’t have a


    few dozen spare Android devices for testing-----emulators are way cheaper


    (actually, they are free).


    **TIP:** Even if everything is working as expected on the emulator, the real device
    might still behave oddly. In the later phases of testing, it is useful to actually
    test your product on lots of devices. A service like Perfecto Mobile


    [(www.perfectomobile.com)](http://www.perfectomobile.com) helps you to do that
    without having to buy or borrow every device that you want to try. It allows you
    to remotely control almost any model of mobile device; you pay for the time that
    you’ve spent testing on them.


    **Installing the SDK**


    The Android emulator is a part of the Android SDK----a set of tools for Android


    development, just as the Java SDK is a set of tools for Java.


    Download the Android SDK from [http://developer.android.com/sdk/index](http://developer.android.com/sdk/index)


    .html and install it. On the last step of the install wizard, leave the checkmark


    checked to launch the SDK Manager.


    The SDK itself comes with a couple of essential tools (hence, the size of the


    installer is only 40 MB). The rest of the components are to be downloaded


    separately. The SDK Manager checks the list of available components and


    allows you to choose what to download (see Figure 1-7).


    ![](index-25_1.jpg)


    CHAPTER 1: Getting Started


    **Figure 1-7.** *Installing optional packageson the SDK Manager*


    Choose the components that you are planning to work with and then click


    Install. If you use emulators for testing, you should put checkmarks against all


    platforms that you are going to support. Also, mark the Tools  Android SDK


    Platform-Tools and Extras. Take a look at Figure 1-7 for reference. Now is a


    good time to brew some coffee since the process is not that fast and the files


    are not that small.


    **Setting Up AVDs**


    Once the download is finished, you are ready to configure and launch the


    emulator. Launch AVD Manager; it is located in the folder where you installed


    the SDK. AVD stands for Android Virtual Device; it is the profile of the platform


    that will be emulated. When you first open the application, it doesn’t have any


    preconfigured AVDs. The list of devices will be empty and the window will look


    like that shown in Figure 1-8.


    ![](index-26_1.jpg)


    CHAPTER 1: Getting Started


    **19


    **Figure 1-8.** *The Android Virtual Device Manager window, which has no configured
    AVDs yet* Click the New button to create the first AVD. In the dialog box, set
    the emulator


    parameters (see Figure 1-9). Device Name is a label that identifies this


    configuration; enter whatever sounds good to you. Target is the version of the


    Android API that the emulator will use. In this book, we will work with Android


    2.2 and above, so select Android 2.2---API Level 8 for the first device. You may


    leave the size of the SD card blank or set it to some value. The last option allows


    you to set the skin. The skin determines the resolution of the emulator; pick
    any,


    but make sure that the skin fits your PC screen size, otherwise it will be hard
    to


    use. When you press the Create AVD button, the device profile appears in the


    list. Repeat the process for every configuration that you plan to work with.


    ![](index-27_1.jpg)


    CHAPTER 1: Getting Started


    **Figure 1-9.** *Creating a new AVD*'
