- fmt: "## 排版结果\n\nNot overlap the selected pixel. Besides, we keep the full-size\
    \ canvas object for drawing masks while we need only a single pixel. We could\
    \ instead have a one-pixel-sized canvas and save some CPU time and memory. These\
    \ kinds of optimizations are pretty obvious and they are not hard to implement\
    \ if you need them in your projects. Most likely, however, there will not be that\
    \ many draggable objects to choose from, and the solution described here will\
    \ show decent speed.\n\n![](index-218_1.jpg)\n\n## CHAPTER 5: Event Handling and\
    \ User Input\n\n### **Simulating Joystick**\n\nThe final part of this chapter\
    \ is devoted to the simulation of real-world game controls. This is the usual\
    \ practice for mobile games: trying to make a virtual version of hardware that\
    \ is used for input.\n\nJoysticks are used for all kind of games, from space simulators\
    \ to third-person shooters. Whenever you need direct control over the game character,\
    \ a joystick is probably the best option for a device that lacks multitouch. A\
    \ virtual joystick is a circle that is sensitive to touches and moves. There’s\
    \ a small ‘stick’ inside it that shows its current position. The player can alter\
    \ the direction (angle) and the power (the distance from the center).\n\nThe joystick\
    \ utilizes a polar coordinate system. It doesn’t make much sense to use Cartesian\
    \ coordinates for it. The polar coordinate system uses a different approach to\
    \ specifying the position of a point in space. Instead of `x` and `y` values,\
    \ it uses the azimuth and radius. The point with the Cartesian coordinates (`1`,\
    \ `1`), for example, have a radius of approximately `1.414` and an azimuth of\
    \ `Math.PI / 4` in polar coordinates. The relation between these coordinate systems\
    \ is illustrated in Figure 5-10.\n\n**Figure 5-10.** *Cartesian coordinates (x,\
    \ y) and polar coordinates (azimuth, radius)*\n\nThe joystick’s output is the\
    \ perfect example of the case where polar coordinates are way more useful than\
    \ the regular system. The “direction” is the azimuth, while the ‘power’ (the distance\
    \ from the center) is the radius. This representation suits the controller tasks\
    \ much better.\n\nThe idea behind the joystick implementation is quite simple:\
    \ track the touches and moves of the user and calculate the azimuth and radius\
    \ of the stick position.\n\n![](index-219_1.jpg)\n\nIf the user taps outside of\
    \ the “active” joystick area, the touch is ignored. Figure 5-11 shows how the\
    \ simple joystick UI might look on the web page.\n\n**Figure 5-11.** *The simplistic\
    \ virtual joystick. The outer circle is the “active” area that the user taps to\
    \ control the position of the object. The circle inside it indicates the current\
    \ position of the stick.*\n\nThe code is relatively simple; the most important\
    \ functions are shown in Listing 5-29. The complete implementation is found with\
    \ the book’s other materials.\n\n**Listing 5-29.** *Implementing Virtual Joystick\
    \ Control*\n\n```\n_p._onDownOrMove = function(coords) {\n    // When we receive\
    \ the \"down\" or \"move\" events we save current\n    // deltas and update radius\
    \ and azimuth\n    var deltaX = coords.x - this._x;\n    var deltaY = coords.y\
    \ - this._y;\n    this._updateJoystickValues(deltaX, deltaY);\n};\n\n_p._onUp\
    \ = function(x, y) {\n    // If there's no interaction, restore the idle state\n\
    \    this._updateJoystickValues(0, 0);\n};\n\n_p._updateJoystickValues = function(deltaX,\
    \ deltaY) {\n    var newAzimuth = 0;\n    var newRadius = 0;\n    // In case if\
    \ the joystick is idle, we don't need to proceed with calculations\n    if (deltaX\
    \ != 0 || deltaY != 0) {\n        newRadius = Math.sqrt(deltaX*deltaX + deltaY*deltaY)/this._controllerRadius;\n\
    \        // User slid too far away, joystick is returned to idle state\n     \
    \   if (newRadius > 1) {\n            deltaX = 0;\n            deltaY = 0;\n \
    \           newRadius = 0;\n        } else {\n            newAzimuth = Math.atan2(deltaY,\
    \ deltaX);\n        }\n    }\n    // If the values have actually changed, notify\
    \ listeners\n    if (this._azimuth != newAzimuth || this._radius != newRadius)\
    \ {\n        this._azimuth = newAzimuth;\n        this._radius = newRadius;\n\
    \        this._deltaX = deltaX;\n        this._deltaY = deltaY;\n        this.emit(\"\
    joystickchange\", {\n            azimuth: newAzimuth,\n            radius: newRadius\n\
    \        });\n    }\n};\n```"
