- fmt: "游戏模式：移动、建造或地形。图7-23展示了本节结束时UI的外观。左上角的圆圈同时充当“模式指示器”和按钮。目前，它显示用户处于建造模式，点击屏幕会添加或移除新的建筑。如果用户点击该按钮，模式会切换到“地形”，再点击一次，则切换到“移动”。\n\
    \n**图7-23.** *游戏的简单UI：左上角的圆形按钮* 目前，这个按钮没什么用，因为我们还没有实现交互功能，但让我们尝试将它放置到屏幕上，为项目下一阶段做好准备。`RoundStateButton`类在屏幕上渲染按钮并返回按钮的当前状态。清单7-41展示了这个类的简单实现。\n\
    \n**清单7-41.** *`RoundStateButton`的实现*\n\n```\n/*\n * RoundStateButton构造函数接受包含三个帧的图像：\n\
    \ * 每帧对应一个状态。frameWidth和frameHeight是单帧的尺寸。\n */\nfunction RoundStateButton(image,\
    \ frameWidth, frameHeight) {\n    GameObject.call(this);\n    this._bounds = new\
    \ Rect(0, 0, frameWidth, frameHeight || image.height);\n    this._image = image;\n\
    \    this._frame = 2;\n}\nextend(RoundStateButton, GameObject);\n\n// 用于引用状态的常量\n\
    RoundStateButton.TERRAIN = \"terrain\";\nRoundStateButton.OBJECTS = \"objects\"\
    ;\nRoundStateButton.MOVE = \"move\";\n\nvar _p = RoundStateButton.prototype;\n\
    \n/**\n * 在画布上渲染当前帧。\n */\n_p.draw = function(ctx, dirtyRect, viewportX, viewportY)\
    \ {\n    ctx.drawImage(\n        this._image,\n        this._bounds.width * this._frame,\n\
    \        0,\n        this._bounds.width,\n        this._bounds.height,\n     \
    \   this._bounds.x - viewportX || 0,\n        this._bounds.y - viewportY || 0,\n\
    \        this._bounds.width,\n        this._bounds.height);\n};\n\n/**\n * 将当前按钮状态设置为给定值。\n\
    \ */\n_p.setFrame = function(frame) {\n    this._frame = frame;\n};\n\n/**\n *\
    \ 切换到下一个状态。当用户点击按钮时执行此函数。\n * 发出事件通知外部世界状态的变化。\n */\n_p.nextFrame = function()\
    \ {\n    this._frame = (this._frame + 1) % 3;\n    this.emit(\"change\", {object:\
