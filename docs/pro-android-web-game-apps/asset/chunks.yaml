    Each call associates a certain color with the point on the gradient line. The
    first argument is the offset: 0 means the start of the line; 1 means the end of
    the line. In this example, we add three colors. The gradient starts blue. One-third
    into the line, it changes to pure green, and then ends as red. The areas before
    the start and after the end of the gradient line is a solid color. In our example,
    the gradient starts at (10, 10); the point (5, 5) is blue since it lies before
    the start, and (70, 80) is red because it lies beyond the end of the gradient.


    When the gradient is ready, you need to set it as fill or stroke:


    ```

    ctx.fillStyle = gradient; // set gradient as fill

    ctx.strokeStyle = gradient; // set gradient as stroke

    ```


    It is much easier to understand if you try this code yourself: color gradients
    don’t look that good on a book page. LED displays render them much better. Still,
    the result of applying the simple linear gradient to the background of our board
