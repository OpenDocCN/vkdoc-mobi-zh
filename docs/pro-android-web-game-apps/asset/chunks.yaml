    };


    The line


    var self = this;


    is the typical pattern that you use when you need to work with callbacks. Inside


    the callback body, the this keyword refers to the image that changed the state,


    not the ImageManager object. To save the reference to the instance of


    ImageManager, we introduced the extra variable called self. Without the self


    variable, it would be impossible to refer the ImageManager functions from within


    the callback code. Another way to address this issue is by using the bind()


    function, which we’ll explore later in this book.


    The rest of the code in _loadItem() function is quite easy to understand. For


    every image in the queue, it registers the onload and onerror listeners. If the


    image was loaded fine, it is added to internal store with the appropriate key.


    The _onItemLoaded() function simply calls the listeners passed to the original


    load function. Take a look at the code in Listing 4-8.


