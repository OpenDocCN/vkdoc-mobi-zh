    \ [www.khronos.org/registry/gles/specs/2.0/GLSL_ES_Specification_1.0.17.pdf](http://www.khronos.org/registry/gles/specs/2.0/GLSL_ES_Specification_1.0.17.pdf)。\n\
    \nGLSL 是一种编程语言，就像 JavaScript、PHP 或 C 一样，但与你见过的大多数语言不同，它不是为编写 Web 服务器或数据库等通用任务而设计的。GLSL\
    \ 专门用于 3D 图形操作。我们需要它的基础知识来编写 WebGL 程序，所以让我们从每种语言中最小的构建块开始：变量和数据类型。\n\n### 数据类型\n\
    \n与 JavaScript 不同，GLSL 是一种强类型的静态语言。这意味着每个变量都有自己的类型，该类型在程序执行期间不会改变。例如，以下代码行：\n\n\
