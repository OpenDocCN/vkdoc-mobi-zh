    Now that we have a RoundStateButton, we need to decide how to place it on the


    screen. The difference between the button and the other entities that we worked


    with so far is that the button is not bound to world coordinates, but rather


    screen coordinates. When the user scrolls the map, the button stays in place.


    One option is to treat it as a special entity and manage it separately from the


    other objects. A much better choice would be to add it to one of the layers and


    let LayerManager do the rest. None of the existing layers will handle the task


    correctly because the ObjectLayer and the IsometricTileLayer are both


    designed to work in world coordinates; the layer that we need for a button


    should not move once the map is moved. Let’s create a new layer class and call


    it UiLayer. Listing 7-42 shows this simple class.


    **Listing 7-42.** *The UiLayer Class*


    /**


    * UiLayer – the layer that operates in screen coordinates and doesn’t move


    * when the user scrolls the map. This layer is “bound” to the screen, so it can


    * safely ignore the calls to move() and setPosition().


    */


    function UiLayer(objects) {


    GameObject.call(this);


    // The array of the objects to render


    this._objects = objects;


