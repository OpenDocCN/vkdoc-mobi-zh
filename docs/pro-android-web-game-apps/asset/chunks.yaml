  trans: '

    到目前为止，我们已经拥有了将在第三章游戏项目中使用的棋盘背景、网格和棋子。


    ## 曲线


    除了直线和弧线之外，二维上下文还支持另外两种复杂的路径类型：二次曲线和贝塞尔曲线。它们背后的数学原理比绘制矩形或圆形的数学原理要复杂一些，但我会尽量在不过度深入细节的前提下进行解释。


    这两种曲线都使用“控制点”来确定曲线的形状。第一个和最后一个控制点是锚点，它们分别是曲线的起点和终点。其他控制点并不属于曲线本身，它们更像是可以弯曲和扭转曲线的磁铁。二次曲线使用三个控制点，而贝塞尔曲线则使用四个。我们先从二次曲线开始。一旦你理解了其中的原理，贝塞尔曲线的机制也就显而易见了。绘制曲线的
    API 非常简单，只有一行代码：


    `ctx.bezierCurveTo(0, 100, 60, 200, 30, 300);`


    为了正确使用它，我们首先需要了解其背后的数学原理。


    ### 二次曲线


    曲线是逐点绘制的。曲线上每个点的位置都由控制点的位置决定。假设我们要绘制属于曲线的五个点：第一个点是曲线的起点，最后一个点是曲线的终点，其他三个是中间的点。我们使用参数
    `t` 来指代曲线上的点。当曲线从起点绘制到终点时，`t` 会从 0 变化到 1。第一个点的 `t` 为 0，第二个点为 0.25，第三个点为 0.50，第四个点为
    0.75，最后一个点为 1。现在我们开始构建曲线。


    首先，我们有三个控制点：A、B 和 C。初始设置如图 2-14 中的图像 1 所示。


    **图 2-14.** *曲线背后的数学原理*


    曲线的起点（当 `t` 为 0 时）是点 A。现在来处理第二个点（`t = 0.25`）。测量 AB 线段的四分之一（0.25）和 BC 线段的四分之一，然后在这两个点之间画一条线，如图像
    2 所示。现在我们得到了一条虚线的“辅助线”。取这条新线的四分之一，你就得到了曲线上的一个点！图像 3 中用小十字标记了这个点。


    对第三个点重复这些步骤。`t` 的值是 0.5（即 ½），因此你需要取线段的一半，而不是四分之一。在 AB 的中点和 BC 的中点之间画一条虚线的辅助线。找到这条虚线线的中点，这就是第三个点。结果如图
    2-14 中的图像 4 所示。


    再计算第四个点（`t = 0.75`），最后一个点就是点 C（见图 2-15）。现在你有五个点来构建一条曲线！用平滑的曲线将它们连接起来，如图 2-15 所示，一条二次曲线就准备好了。


    **图 2-15.** *逐点构建的二次曲线*


    这种机制非常强大。只需使用三个控制点，你就可以构建出最适合你需求的曲线！图 2-16 展示了更多的二次曲线示例。


    **图 2-16.** *更多的二次曲线*


    ### 贝塞尔曲线


    贝塞尔曲线的工作方式与二次曲线相同，不同之处在于它使用四个控制点而不是三个，并且需要三条辅助线而不是一条。


    **注意：** 实际上，从数学角度来看，`Context2D` API 中的二次曲线和贝塞尔曲线*都*是贝塞尔曲线。称它们为“三次”曲线会更直观，因为贝塞尔曲线可以是任意阶的。还有四阶和五阶的贝塞尔曲线，但
    Canvas API 不支持它们。


    看一下图 2-17 中的贝塞尔曲线示例。要找到一个点的位置，你首先需要在 AB 和 BC 之间构建一条辅助线段，然后在 BC 和 CD 之间构建一条。构建这些线段的算法完全遵循与二次曲线相同的工作原理。

