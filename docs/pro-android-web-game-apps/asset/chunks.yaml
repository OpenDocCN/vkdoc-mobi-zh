- fmt: "# 排版后的内容\n\n`chapter`或参考第3章。我将保留函数名以提醒你关于`BoardModel`的接口。我们新增了一个名为`toString()`的方法，它返回棋盘状态的人类可读字符串表示。\n\
    \n**清单10-15.** *作为Node.js模块的BoardModel*\n\n```\nfunction BoardModel(cols, rows)\
    \ {\n\nthis._cols = cols || 7;\n\nthis._rows = rows || 6;\n\nthis._data = [];\n\
    \nthis._currentPlayer = BoardModel.RED;\n\nthis._totalTokens = 0;\n\nthis.reset();\n\
    \n}\n\nBoardModel.EMPTY = 0;\n\nBoardModel.RED = 1;\n\nBoardModel.GREEN = 2;\n\
    \nBoardModel.NONE = 0;\n\nBoardModel.WIN = 1;\n\nBoardModel.DRAW = 2;\n\nBoardModel.ILLEGAL_TURN\
    \ = 3;\n\n_p = BoardModel.prototype;\n\n_p.reset = function() { … };\n\n_p.getCols\
    \ = function() { … };\n\n_p.getRows = function() { … };\n\n_p.makeTurn = function(column)\
    \ { … };\n\n_p.getPiece = function(col, row) { … };\n\n/**\n * Few more private\
    \ methods go here\n */\n\n/**\n * This method is added in the most recent version\
    \ to build the\n * simple string representation of the BoardModel.\n */\n\n_p.toString\
    \ = function() {\n    var value = \"\";\n    for (var row = 0; row < this._rows;\
    \ row++) {\n        for (var col = 0; col < this._cols; col++) {\n           \
    \ value += \"[\" + this._cellToString(this._data[row][col]) + \"]\";\n       \
    \ }\n        value += \"\\n\";\n    }\n    return value;\n};\n\n_p._cellToString\
    \ = function(value) {\n    switch (value) {\n        case 0:\n            return\
    \ \" \";\n        case BoardModel.GREEN:\n            return \"X\";\n        case\
    \ BoardModel.RED:\n            return \"O\";\n    }\n};\n\nexports = module.exports\
    \ = BoardModel;\n```\n\n现在让我们更新主脚本以显示棋盘，而不是\"Hello World\"。清单10-16展示了如何实现这一点。\n\
    \n**清单10-16.** *在网站主页显示棋盘*\n\n```\nvar app = require('express').createServer();\n\
    var BoardModel = require(\"./BoardModel\");\nvar board = new BoardModel();\n\n\
    board.makeTurn(2);\nboard.makeTurn(3);\n\napp.get('/', function(req, res){\n \
    \   res.setHeader('Content-Type', 'text/plain');\n    res.send(board.toString());\n\
    });\n\napp.listen(80);\n```\n\n现在代码的功能应该非常明显了。唯一不同的是我们在响应中额外发送了一个`Content-Type`头。在清单10-14中，我们传递的文本是随`Content-Type:\
    \ text/html`（这是Express在未明确指定`Content-Type`时使用的默认值）一起发送到浏览器的。如果我们在这里也这样做，浏览器会将棋盘显示为一行方括号。HTML不会将`\\\
    n`符号视为新行，这就是为什么我们需要将`Content-Type`显式设置为`text/plain`。我们还放了几枚棋子以确保页面渲染出有意义的内容。图10-8展示了Chrome如何渲染我们刚刚创建的网页。\n\
    \n**图10-8.** *渲染后的棋盘*\n\n这显然是正确的，但……它看起来一点都不美观。此外，你无法点击任何东西，因为这不是HTML，而是纯文本。尽管我们决定在服务器端工作时不在乎美观与否，但我们仍然需要某种方式与棋盘进行交互。\n\
    \n不要急于更新你的代码使其看起来像HTML。如果你在JavaScript代码内部编写页面标记，这意味着方法从根本上出了问题。UI应该保存在漂亮的HTML文件中，你可以将其交给设计师进行样式设计。想象一下，如果你给他发送几百行JavaScript代码，他会说什么。\n\
    \n**注意：** 项目当前阶段完整的代码可以在`03.board_model`文件夹中找到。\n\n## 渲染网页\n\n本节的目标是向浏览器输出HTML而不是纯文本。虽然调整`toString()`函数的代码相当容易，但我们不想这样做。`BoardModel`是代表游戏状态和游戏逻辑的类；渲染HTML显然超出了它的职责范围。\n\
    \n我们将从学习如何向客户端浏览器发送静态文件（HTML、CSS和JavaScript文件）开始。之后，我们将探索模板——一种将应用程序逻辑与渲染逻辑分离的机制。"
