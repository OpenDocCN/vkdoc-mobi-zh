    ctx.fill();


    ctx.stroke();


    The last parameter in the arc function is the ‘‘direction’’ of the arc: if it
    is true, then the arc will move between angles in a counterclockwise direction
    (by


    default, it will move in a clockwise direction). When we draw a complete circle,


    the direction doesn’t matter, so we leave the default.


