    Now we have enough instruments to implement the event handling API that will hide
    the differences between touch and mouse-based input and allow us to focus on writing
    the game, rather than dealing with the specifics of the events.


    # CHAPTER 5: Event Handling and User Input


    ## Custom Events


    The idea behind the custom event API is to provide the ''least common denominator''
    interface to touch and mouse events. There are three pairs of events that work
    almost the same way: `mousedown`-`touchstart`, `mousemove`-`touchmove`, and `mouseup`-`touchend`.
    The word ''almost'' is what makes the developer''s life harder. Let''s start by
    analyzing events once again to discover what they have in common and what the
    differences are.


    The first major difference is the `targetTouches` object. It is only available
    for touchscreens, but since Android browsers do not support multitouch widely
    yet, this difference can safely be ignored. Multitouch support is not relevant
    now, but later it is easy to deal with.


    The following are three event groups:


    - **down events**: Represented by the `mousedown` and `touchdown` events. They
    mark the start of an interaction: the user touched the screen or pressed the mouse
    button. When the user is in this state, he can perform one of two actions: start
    to move the controller (a mouse or a finger) or release it instantly with a "click."


    - **up events**: Represented by `mouseup` and `touchend`. They work the same way,
    except that `touchend` doesn''t provide the coordinates of the place where the
    user released her finger. There is no touch anymore; it means that there can be
    no coordinates (mice don''t have this problem, since the cursor remains on the
    screen and the coordinates of `mouseup` make perfect sense). To simulate the same
    behavior as for the touch events, we have to track the last known coordinates
    of the touch, and provide them when the user releases his finger.


    - **move events**: Represented by `mousemove` and `touchmove`. The most important
    difference is that a mouse can have two types of movement: hovering (moving the
    cursor while the button is not pressed) and dragging (moving the cursor when the
    button is pressed). We have to ignore hovering since there''s no analog for touchscreens.
    We also have to track the state of the button in order to distinguish between
    hover and drag when using a mouse.


    Move events deserve a little bit more attention. Down and up events are relatively
    simple: they are fully described by a pair of coordinates: `x` and `y`, where
    the event happened. Movement has a slightly more complex nature. For the client
