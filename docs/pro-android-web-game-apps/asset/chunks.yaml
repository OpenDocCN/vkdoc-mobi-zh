    Implementation


    Implementation of the dirty rectangles algorithm is not hard, but it requires


    careful attention: you must remember to pass the dimensions of the dirty area
    to


    every layer of our engine and let every layer update the set of dirty rectangles.


    The usual practice is to introduce a special ‘ dirty area threshold’’ that signals


    that the dirty area is too big. Once the threshold is reached, we simply mark
    the


    entire screen as dirty and do not perform any checks for dirtiness until the next


    frame. This little trick allows you to save a little CPU time. For example, if
    75


    percent of the area is already dirty, there is no big difference in terms of CPU


    cycles between painting a huge portion of the screen and repainting the entire


    frame from scratch. At this point, we can stop dirty rectangle checks and render


    the frame as we did in previous sections.


    The central class for this optimization is called a DirtyRectangleManager. Its
    job


    is to keep track of dirty regions, join them into one rectangle, and keep track
    of


    the threshold. The class operates in screen space. Indeed, dirty rectangles is
    a


    pure rendering optimization that has nothing to do with higher-level entities
    such


    as the game world. The area that the DirtyRectangleManager tracks is always


    the same as the viewport.


    **NOTE:** The same approach is applicable not only for games, but for any GUI


    applications. For example, Swing—the Java toolkit for building user interfaces—has


    the same functionality. It renders only the part of interface that has changed
