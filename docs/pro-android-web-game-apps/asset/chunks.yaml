    ([www.html5rocks.com/en/tutorials/eventsource/basics/](http://www.html5rocks.com/en/tutorials/eventsource/basics/)):


    “……像 WebSockets 这样的 API 提供了更丰富的协议，可以实现双向、全双工通信。对于游戏、即时通讯应用以及需要在两个方向上获得近乎实时更新的场景而言，双向通道更具吸引力。然而，在某些场景下，客户端无需发送数据，你只需要从某个服务器动作中获取更新即可。


    ……SSE 通过传统 HTTP 协议发送。这意味着它们不需要特殊的协议或服务器实现就能工作。另一方面，WebSockets 则需要全双工连接，并且需要新的
    WebSocket 服务器来处理该协议。此外，服务器推送事件具有 WebSockets 在设计上所缺乏的一系列特性，例如自动重连、事件 ID 以及发送任意事件的能力。”


    （此片段经 Eric Bidelman 许可发布。）


    本节中描述的解决方案可用于针对移动设备和桌面设备的项目。然而，为了在安卓智能手机上实现相同效果，应提供一个可靠的降级方案。下一节将专门介绍此类降级传输方案。它们虽不如本节中的“最佳”方案那样完美，但已被证明是行之有效的。


    **注意：** 不要被本节名称所误导：*最佳*并不意味着*完美无缺*。WebSocket API 和 SSE 都有各自的缺点和陷阱。“最佳”一词是指这些 API
    的语义比 XHR 等其他 API 更契合此任务。


    ## 可接受的解决方案


    “可接受”的解决方案是在依赖尖端技术的优雅代码与经过数百万用户多年实地检验的稳定方案之间寻求的折中。


    首先，我们来看看用 XHR 模拟服务器到客户端通信的最简单方法。客户端每隔几秒轮询服务器，询问“有我的新事件吗？”如果存在新事件，则将其传输给客户端；否则，服务器仅返回空响应。这种情况下的客户端与服务器通信如图
    11-1 所示。那些未给客户端或服务器带来任何信息的“无用”请求以灰色显示。如你所见，为了仅接收一个事件，客户端和服务器都需要处理许多连接，只为给服务器一个响应的机会。


    ![](img/index-468_1.jpg)


    **图 11-1.** *最简单的轮询技术需要服务器和客户端执行大量不必要的工作。*


    在简单轮询方法中，即使没有新事件，也会写入响应并关闭连接。然后客户端会等待一定时间（称为“轮询间隔”），并再次重新连接。这种方法的缺点是，在最坏情况下，延迟等于轮询间隔时间。缩短间隔值也不可取：大量带宽将被浪费在仅发送头部信息上。服务器会在巨大负载下不堪重负（处理一个
    HTTP 请求本身就有少量 CPU 和内存开销）。更多的客户端意味着更多浪费的 CPU 时间。


    HTTP 协议有一个有趣的特点：它不要求服务器立即响应客户端请求。事实上，服务器可以根据需要保持 HTTP 连接长时间打开。本节中的第一个技术正是利用这一事实来减少无用的调用次数。


    ## XHR 长轮询


    XHR 长轮询的工作原理与传统轮询几乎相同。唯一的区别在于，当服务器没有新事件时，它会保持连接打开。一旦有客户端的新事件，服务器就会响应并在之后关闭连接。这样，客户端连接可能会保持打开数秒钟，等待新数据。图
    11-2 说明了这一思路。


    ![](img/index-469_1.jpg)


    ![](img/index-469_2.jpg)

