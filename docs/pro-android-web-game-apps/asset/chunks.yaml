    \ 1 章中描述）或 `Node.js`（在第 10 章中描述）将页面提供给浏览器。以下输出与我们预期的并不完全一致：\n\n```\n2\n4\nundefined\n\
    ```\n\n页面没有显示三个数字，而是只显示了两个，然后出现了难看的 `undefined`。显然，该函数有一个 bug！是时候来解决它了。\n\n##\
    \ 在桌面浏览器中调试\n\n遇到 bug 时，首先要做的是检查它是否能在桌面浏览器中重现。如果可以，那么你就可以使用全套开发工具来查找并修复有问题的代码行。\n\
    \n打开 Google Chrome 并加载该页面。然后按 `F12` 打开开发者工具窗口。欢迎来到你的终极调试工具。点击顶行的 **脚本** 按钮。现在你应该能看到我们刚刚创建的有\
    \ bug 的页面的代码。如果代码没有立即显示出来，你可能需要从下拉列表中选择包含脚本的正确文件，如图 A-1 所示。\n\n**图 A-1.** *脚本标签页，显示页面代码以及一个包含已加载文件列表的下拉菜单*\n\
    \n调试 JavaScript 的思路与其他任何语言相同：定位看起来可疑的代码，在代码片段开头设置断点，然后逐行执行脚本，确保每一步中变量都具有正确的值。\n\
    \n在代码窗口左侧有一个带行号的面板。找到 `getMax()` 函数中的第一条指令：`if (a > b)`，然后点击左侧面板上对应的行（图 A-1 中的第\
    \ 7 行）。现在你应该看到一个小蓝色箭头，表示断点已设置。然后重新加载页面。你刚才标记的那一行会以蓝色背景高亮显示（见图 A-2）。执行已暂停，你可以检查脚本的状态。\n\
    \n**图 A-2.** *在 Google Chrome 中调试 JavaScript*\n\n图 A-2 右侧的面板可帮助你进行检查。例如，调用堆栈允许你检查当前正在执行的函数堆栈。看一下：第一个函数是\
    \ `onload`，它是事件处理程序，然后 `onload` 调用了一个名为 **\"匿名函数\"** 的东西——这是我们写在 body 标签的 `onload`\
    \ 参数中的代码：`onload=\"init()\"`。接着，它调用了 `init()` 函数，然后执行传递给了 `getMax()`。该函数将从 `init()`\
    \ 中被调用三次，每次的结果会追加到前一个结果下方。如你所见，有问题的调用是最后一次，传入的参数是 `(1, 1)`。\n\n接下来，检查 **作用域变量**\
    \ 部分：一组从当前代码行可访问的变量。当你需要追踪某个表达式的结果时，打开 **监视表达式** 块，点击小的加号，然后输入要计算的表达式。例如，如果你输入\
    \ `Math.max(a, b)`，你将看到我们期望从自定义函数中得到的结果（见图 A-3）。如果变量在当前作用域中无法访问，你将看到 `ReferenceError`，而不是表达式的结果。\n\
    \n**图 A-3.** *近距离查看脚本标签页右侧面板，该面板允许你检查当前执行状态并管理断点*\n\n按 `F10` 进入下一条指令，按 `F11` **\"\
    单步进入\"** 函数。逐步遍历代码，直到你到达出错的代码处——在本例中，是第三次调用：`writeToDiv(getMax(1, 1))`。当参数相等时，似乎一切都会出错。没错，`if`\
    \ 检查没有通过，`return` 语句根本没有被调用：这就是为什么我们得到了 `undefined` 值。好了，既然你知道问题出在哪里了——你就可以轻松修复它了！\n\
    \n**注意：** 这是典型的动态语言问题的另一个例子。在 JavaScript 中，同一个函数可以返回不同类型的值：字符串、数字、对象或 `undefined`。静态语言会在编译时检查函数的返回类型，像这样的错误永远不会进入生产环境。在\
    \ JavaScript 中，这段代码是完全合法的。\n\n这很简单，对吧？也许甚至太简单了。这个 bug 不用调试器，仅通过阅读四行代码就能追踪到。但情况并非总是如此。有时你需要更多手段来调试一个就是不能按预期工作的函数。Chrome\
    \ 的调试器功能远不止这些。详细的调试教程超出了本书的范围，但你可以在 `http://code.google.com/chrome/devtools/docs/overview.html`\
    \ 找到更多关于 Chrome 开发者工具的信息。\n\n## 在移动设备上调试\n\n现在让我们考虑最坏的情况：你必须在设备（或模拟器）上调试代码。你唯一真正可行的选择是写入控制台，然后读取日志。这是一种繁琐且低效的技术，但不幸的是，当桌面浏览器不可用时，这是我们唯一的方法。\n\
    \n如果你打算用模拟器调试，运行它并打开页面。如果你使用的是真实设备，你首先需要启用 USB 调试；否则，你将无法访问设备日志。进入 **设置 ➤ 应用程序\
    \ ➤ 开发**，确保 **USB 调试** 已激活。之后，用数据线将你的智能手机或平板电脑连接到 PC，然后继续。\n\n打开命令行并输入以下内容：\n\n\
    ```\n> adb logcat -v raw browser:I *:S\n```\n\n这会实时显示设备（或模拟器）的日志，并过滤它们，只显示你实际感兴趣的消息；在本例中，是来自浏览器的控制台输出。\n\
    \n**注意：** 你不相信魔法，想要一个更好的解释来说明这一切是如何工作的？好吧，`adb`（Android 设备桥）是用于从 PC 与 Android\
    \ 设备或模拟器进行通信的工具。使用这个工具，你可以直接向设备发出命令，或使用设备的服务。除了检查日志，你还可以安装或卸载程序、重启设备，甚至访问你的 Android\
    \ 设备的 shell。\n\n我们刚才发出的命令（`logcat`）用于查看日志。第二个参数 `-v raw` 告诉 `logcat` 省略额外的日志信息，比如正在写入日志的进程\
    \ ID 或日志级别。最后一个参数是过滤器。默认情况下，`logcat` 非常冗长：每一个 Android 组件都倾向于记录周围发生的任何有趣的事情。没有过滤器，`logcat`\
    \ 几乎毫无用处。尝试不带最后一个参数运行它，你自己就会看到。\n"
- fmt: "# Android 日志调试\n\n每个 Android 日志条目都有一个日志级别和一个标签。日志级别表示消息的严重程度：`Verbose`、`Debug`、`Info`、`Warn`、`Error`。标签通常表示写入日志的组件。\n\
    \n我们传递给 `logcat` 的最后一个参数包含两个过滤器：\n\n`browser:I`\n\n这意味着：为标签 `browser` 写入所有日志级别为\
    \ `Info` 及更高的输出（不显示 `Verbose`）。\n\n第二个过滤器：\n\n`*:S`\n\n告诉它除了我们在其他过滤器中指定显示的内容之外，不要显示任何其他内容。星号（`*`）代表“所有其他标签”。`S`\
    \ 表示 `Silent` —— 无日志记录。\n\n使用这些选项运行 `logcat` 将只显示我们正在查找的输出。\n\n现在让我们向应用程序添加一些调试输出，以了解其工作原理。\n\
    \n清单 [A-2] 是代码的更新版本，它打印出我们正在调试的函数的参数和返回值。\n\n**清单 A-2.** 使用日志语句调试的更新示例（使用 logcat）\n\
    \n```javascript\nfunction getMax(a, b) {\n  console.log(\"getMax a=\" + a + \"\
    \ b=\" + b);\n  if (a > b)\n    return a;\n  if (b > a)\n    return b;\n}\n\n\
    function init() {\n  var result;\n  writeToDiv(result = getMax(1, 2));\n  console.log(result);\n\
    \  writeToDiv(result = getMax(4, 1));\n  console.log(result);\n  writeToDiv(result\
    \ = getMax(1, 1));\n  console.log(result);\n}\n```\n\n附录：调试客户端 JavaScript（[622]）\n\
    \n现在在设备浏览器中重新加载页面并查看 `logcat` 输出。每条消息后，`console.log` 会打印页面地址和行号。\n\n```\n> adb\
    \ -d logcat -v raw browser:I *:S\n--------- beginning of /dev/log/main\n---------\
    \ beginning of /dev/log/system\nConsole: getMax a=1 b=2 http://192.168.1.142/:19\n\
    Console: 2 http://192.168.1.142/:29\nConsole: getMax a=4 b=1 http://192.168.1.142/:19\n\
    Console: 4 http://192.168.1.142/:31\nConsole: getMax a=1 b=1 http://192.168.1.142/:19\n\
    Console: undefined http://192.168.1.142/:33\n```\n\n你可能已经猜到了，这就是所谓的“用勺子砍木头”。这种方法极其缓慢且效率低下，但嘿，总比没有好。此外，你必须更改应用程序代码来添加日志记录，这可能会引入更多错误。底线是：只要能用桌面浏览器调试，就用它来调试。\n\
    \n## 几乎无需更改代码的日志记录\n\n日志记录的一个缺点是必须更改代码才能使其工作。你必须在各处放置日志语句，只是为了调试有问题的片段。有时你只需要记录函数名称、输入参数和结果。所以这里在清单\
    \ A-3 中有一个技巧，可以向任何给定函数添加适度的日志记录功能，而无需显著影响其代码。\n\n**清单 A-3.** 便捷日志包装器\n\n```javascript\n\
    function getMax(a, b) {\n  if (a > b)\n    return a;\n  if (b > a)\n    return\
    \ b;\n}\n\n/**\n * 创建\"日志记录\"包装器，记录每个函数调用：\n * 传递的参数和结果。\n * @param tag 日志标签（通常是函数名称）\n\
    \ * @param fun 函数。确保传递函数本身，而不是函数结果！\n */\nfunction wrapWithLogging(tag, fun) {\n\
    \  return function() {\n    var result = fun.apply(this, arguments);\n    var\
    \ argumentsString = Array.prototype.join.call(arguments, \"|\");\n    console.error(tag\
    \ + \"(\" + argumentsString + \") = \" + result);\n    return result;\n  };\n\
    }\n\nfunction init() {\n  getMax = wrapWithLogging(\"getMax\", getMax);\n  writeToDiv(getMax(1,\
    \ 2));\n  writeToDiv(getMax(4, 1));\n  writeToDiv(getMax(1, 1));\n}\n```\n\n附录：调试客户端\
    \ JavaScript（[623]）"
