- fmt: "# Custom Event Listeners and Emitters\n\nBuilding a custom event handling\
    \ system is usually not a hard task. There are certain architectural decisions\
    \ that you need to make before doing it, but even in the most complex cases, the\
    \ task is not too challenging. In this section, we will build such a system. Let’s\
    \ start with `EventEmitter`, the base class for every entity that can fire events.\n\
    \n## EventEmitter: The Base Class\n\nStart by thinking about the architecture\
    \ of the future solution. The design of the event system determines how natural\
    \ it looks in your code, how easy it is to write, and the number of extra features\
    \ it has. The following are few decisions to make:\n\n- Implement event bubbling\
    \ or use the “plain” subscription model?\n- Should listeners have only one argument\
    \ (the event object) or allow any number of arguments?\n- Should memory leaks\
    \ protection be implemented or not?\n\nLet’s examine this list. The first point\
    \ makes sense when your game components form complex hierarchies (like the DOM\
    \ tree of the browser) and events from the lower levels of hierarchy must “bubble”\
    \ up to the higher levels. The second point is more a matter of personal preference:\
    \ do you want to allow event listeners like `onNewCoin(x, y, coinType)` instead\
    \ of `onNewCoin(newCoinEvent)`? The multiarguments approach looks better, since\
    \ it specifies the parameter names right in the declaration of the listener, but\
    \ it has its own drawbacks. If the listener is only interested in the last argument,\
    \ it still needs to declare all of them. Besides, you add a little extra bit of\
    \ coupling; the components that emit events must know the number and the order\
    \ of arguments that listeners expect. This author’s personal preference is to\
    \ use the single-argument approach.\n\nThe last point is inspired by Node.js (we\
    \ will look at this wonderful tool in Chapter 10). The `EventEmitter` implementation\
    \ of Node has a listener threshold, or the maximum number of listeners that is\
    \ considered “safe.” If the number is exceeded, it looks like a memory leak, and\
    \ `EventEmitter` throws an exception. Sometimes this technique is useful for detecting\
    \ programming errors; more than ten listeners is likely a cleanup problem that\
    \ leads to memory leaks.\n\nThe code in Listing 5-9 shows how to implement the\
    \ basic `EventEmitter` class without any of the extra features. If your project\
    \ requires more functionality, you can always add it on top of this class. `EventEmitter`\
    \ holds the array of listeners for each event type and calls them in order whenever\
    \ the `emit` is fired. The class allows you to add listeners and remove a single\
    \ listener, all listeners for a given event type, or all listeners. The code is\
    \ quite straightforward and well-commented. I’m sure you’ll find your way through\
    \ it.\n\n### Listing 5-9. EventEmitter, the Base Class for the Event-Firing Objects\n\
    \n```javascript\n/**\n * EventEmitter is the class responsible\n * for holding\
    \ the registry of listeners\n * and notifying them about the new events\n */\n\
    function EventEmitter() {\n  this._listeners = {};\n}\n\n_p = EventEmitter.prototype;\n\
    \n/**\n * Registers the function as the listener to receive the notifications\n\
    \ * about the events of the given type\n * @param type the type of the event\n\
    \ * @param listener the function to add to the list of listeners\n */\n_p.addListener\
    \ = _p.on = function(type, listener) {\n  if (typeof listener !== \"function\"\
