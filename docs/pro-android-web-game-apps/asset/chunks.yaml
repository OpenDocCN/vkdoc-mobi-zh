- fmt: "# GLSL 存储限定符\n\n## 常量\n\n`Constants`，其值不会改变。\n\n## uniform\n\n`uniform mat4\
    \ uMVMatrix;` —— 从 JavaScript 传递到着色器。`uniform` 值在不同顶点之间不会改变；例如，由于投影矩阵对每个顶点都相同，因此它是统一的。另一个\
    \ `uniform` 的例子是光照颜色。`uniform` 不会在着色器内部初始化，因为它们的值来自 JavaScript。\n\n## attribute\n\
    \n`attribute vec3 aPos;` —— 逐顶点数据，可以在不同顶点之间变化；例如，顶点坐标或颜色可能对每个顶点不同。`attribute`\
    \ 是将数据从 JavaScript 传递到顶点着色器的方式。\n\n`attribute vec3 aNormal;`  \n`attribute vec3\
    \ aColor;`\n\n## varying\n\n`varying vec2 vTexCoord;` —— 变量提供了一种将数据从顶点着色器传递到片段着色器的方式。通过\
    \ `varying` 传递的值在到达片段着色器之前会被插值（本章后续将详细介绍）。\n\n`varying vec3 vColor;`\n\n为了更好地理解存储限定符如何影响变量的行为，图\
    \ 9-4 展示了数据如何注入着色器，以及它们之后如何交换数据。如您所见，JavaScript 只能设置 `attribute`（当需要逐顶点数据时）和 `uniform`（当数据对整个顶点集合相同时）。顶点着色器可以使用\
    \ `attribute` 和 `uniform` 将数据传递给片段着色器。片段着色器可以有它自己的 `uniform`，但没有 `attribute`，因为它不需要关于特定顶点的信息。\n\
    \n`![](index-374_1.jpg)`\n\n**第九章：使用 WebGL**\n\n**图 9-4.** *GLSL 变量的存储限定符以及它们在\
    \ WebGL 各层之间的传输方式：JavaScript、顶点着色器和片段着色器。*\n\n现在您可以阅读完整的顶点着色器。让我们再次查看代码。\n\n```\n\
    attribute vec3 aPos;\nuniform mat4 uMVMatrix;\nuniform mat4 uPMatrix;\n\nvoid\
    \ main(void) {\n    gl_Position = uPMatrix * uMVMatrix * vec4(aPos, 1.0);\n}\n\
    ```\n\n该着色器定义了一个 `attribute` —— `aPos`，它存储当前顶点的位置。它还有两个矩阵 `uniform` —— 一个用于模型视图矩阵，一个用于投影矩阵。该着色器没有任何\
    \ `varying`，因此它不会向片段着色器传递任何数据。\n\n## 操作与函数\n\n在操作方面，GLSL 的工作原理与大多数编程语言类似。以下是一些典型结构的例子。\n\
    \n`if-else`:\n\n```\nif (shininess != 0.0) {\n    // 对光亮表面进行计算\n} else {\n   \
    \ // 否则\n}\n```\n\n`for` 循环:\n\n```\nfor (int i = 0; i < limit; i++) {\n    //\
    \ 在循环中执行操作\n}\n```\n\n`while` 和 `do-while` 循环:\n\n```\nwhile (value < limit) {\n\
    \    // 循环体\n}\n\ndo {\n    // 循环体\n} while (value > 0);\n```\n\n着色器的入口点是一个名为\
    \ `main()` 的函数。它不接受任何参数，也不返回任何值。每个着色器都必须有一个像示例代码中那样声明的 `main()` 函数。函数的结果被写入一个魔法变量。在片段着色器中，它被称为\
    \ `gl_Position`。\n\n对于像本章中这样的简单示例，我们将所有代码放在 `main` 函数中。但是，为了方便起见，您可以定义自己的函数。关于函数语法的深入解释，请参考本章前面提到的\
    \ GLSL 规范的第 6.1.1 节。以下是一个简单函数的示例：\n\n```\nfloat transform(float t) {\n    return\
    \ sin(t * t);\n}\n```\n\nGLSL 拥有大量用于几何和矩阵计算的内置函数。表 9-3 展示了最常用的 GLSL 函数。\n\n**表\
    \ 9-3.** *GLSL 程序中最常用的函数*\n\n| 函数名 | 描述 |\n| :--- | :--- |\n| `sin`，`cos`，`tan`，`asin`，`acos`，`atan`，`radians`，`degrees`\
    \ | 通用三角函数。 |\n| `abs`，`sign`，`floor`，`ceil`，`fract`，`mod`，`min`，`max`，`clamp`，`pow`，`exp`，`log`，`exp2`，`log2`，`sqrt`，`mix`\
