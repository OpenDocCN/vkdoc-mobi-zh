    Chapter 13


    **AI in Games**


    Artificial intelligence (or AI for short) is what makes the computer-controlled


    characters behave like real creatures: chase prey, find their way through the


    level, plan assaults, expose emotions, or even learn from the player. In other


    words, AI is a term that refers to a set of algorithms that make the game agents,


    look intelligent.


    This chapter is a gentle introduction to several of the most commonly used AI


    algorithms and the approaches behind them. The topic itself is rather broad and


    it is impossible to fit an extensive overview of AI into the bounds of a single


    chapter, but I will try to give you a good starting point for further exploration
    of this wonderful subject. Once you master the basics, feel free to explore more-advanced
    AI algorithms.


    In this chapter, we will learn about the following:


     AI and the type of AI needed for your game


     Types of graphs, their uses in real life, and how to implement a


    graph in JavaScript


     Building a waypoint graph


     Pathfinding


     A popular pathfinding algorithm called A*


     Decision making with a decision tree


    I find AI to be one of the most interesting parts of game development. You can


    build an exciting game world without sound, 3D effects, networking, and even


    without traditional graphics. Look at NetHack, ADOM, and Dwarf Fortress. I


    know these examples are somewhat geeky, but these games are extremely


    addictive once you’ve learned how to play them. They all are built around an AI


    CHAPTER 13: AI in Games


    that creates a random virtual world, inhabits it with creatures, and makes up
    the


    gameplay.


    **NOTE:** The term AI is used in a much broader sense than game development.


    Artificial Intelligence presents a huge scientific interest in solving practical
    tasks—


    like natural language recognition and synthesis, financial analysis and prediction,


    image processing, and face recognition—and exploring the mechanisms behind the


    human thinking, such as memory, learning, decision making, and so on. In this
    book,


    the word “AI” is used solely in the context of game development. For more


    information, refer to the wonderful article “What is Artificial Intelligence”
    (www-


    formal.stanford.edu/jmc/whatisai/whatisai.html) by John McCarthy, a


    prominent scientist and the inventor of the term “AI”.


    **Do I Need AI in My Game?**


    ‘ Do I need AI in my game, and if so, how smart should it be’’? This is the first


    question that you have to ask yourself before you spend too much time


    implementing algorithms. The real need for AI highly depends on the type of


    game that you are making, and the gameplay that you try to build. For example,


    solitaire-type games do not need an AI, and neither do online F1 simulators


    where players compete only with each other and not with computer-controlled


    bots.


    The second part of the question is harder to answer. So how smart should your


    AI be? The truth is----a ‘ smarter’’ AI doesn’t always mean better gameplay. In


    some cases, simple and straightforward algorithms do a much better job than


    complex approaches. The zombie-invasion game, for instance, can be quite'
