- fmt: "# For longer delays, users will want to perform other tasks while waiting\
    \ for the computer to finish, so they should be given feedback indicating when\
    \ the computer expects to be done. Feedback during the delay is especially important\
    \ if the response time is likely to be highly variable and users won’t know what\
    \ to expect.\n\n## Don’t Think That Resources Are Always There\n\nResources—such\
    \ as images for textures, sounds, or XMLs—are essential parts of the application.\
    \ Usually, you defer the loading of these types of dependencies. The usual mistake\
    \ is to assume that the resource will always be where you expected it to be—in\
    \ your favorite `res` folder, for example. Yet there are at least two reasons\
    \ why a resource may become unavailable:\n\n1. **Connectivity.** You can simply\
    \ lose the connection to the server. This will give you an ugly error instead\
    \ of a nice picture.\n2. **Simple coding errors** like typos or different conventions.\
    \ You can type `casle.png` instead of `castle.png`, while the real file is called\
    \ `castle_big.png`.\n\nUsually, losing the resource in that way means that the\
    \ user will not see or hear something, or a 3D model will appear solid black.\
    \ A good solution is to log those kinds of errors and to use the `no-image` images\
    \ to make it obvious that something is wrong. Sometimes the missing image is not\
    \ a good reason to show the critical error dialog, since the game might still\
    \ be playable.\n\n## Chapter 1: Getting Started\n\n### Quick Summary: Writing\
    \ Good Code\n\nWriting good code in JavaScript is not that hard if you follow\
    \ simple rules. Good code must be:\n\n- **Clear.** The person who reads it should\
    \ quickly understand what it does.\n- **Predictable.** Variables should not change\
    \ their type and structure when they are not expected to.\n- **Freeze-tolerant\
    \ and fault-tolerant.** Real-world mobile data connections are far from perfect,\
    \ so make sure that the user knows how long he has to wait to download. Expect\
