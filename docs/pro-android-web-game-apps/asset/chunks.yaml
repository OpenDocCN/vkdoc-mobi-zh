- fmt: "# Forced Orientation\n\nThe skeleton in Listing 3-6 doesn’t force the screen\
    \ orientation, but merely rerenders the canvas once it detects that the size of\
    \ the window has changed. As you know, many native Android games lock the screen\
    \ in a fixed position—either portrait or landscape—depending on which is best\
    \ for the game. In a browser environment, forcing orientation is not possible.\
    \ This practice is considered to be too intrusive and may harm the user’s experience.\
    \ Without doubt, games are very different from the typical web pages that show\
    \ news or weather forecasts, so what is bad for one type of site might sound like\
    \ a good idea for others.\n\nThe web game is essentially a web page that renders\
    \ inside the browser, and the user expects certain behaviors from it. If the device\
    \ is rotated, the browser should reorient. If you change this behavior, you better\
    \ have a very good reason for it. But wait, I just said that it is impossible\
    \ to lock the orientation. How we going to change that behavior, then?\n\nThe\
    \ Android browser uses the event called `'orientationchange'` to notify the page\
    \ that the device has changed its orientation. The current orientation value is\
    \ stored in the `window.orientation` property. Combining the two, you can build\
    \ a mechanism that gently hints to the user that the game looks better with the\
    \ other screen orientation. For example, you can create a dialog (preferably not\
    \ an alert box, but a dialog styled as the game UI element) that outputs some\
    \ text in the form of advice: ‘Hint: Four Balls is best played in portrait mode.’\
    \ Make sure to add a ‘Do not show again’ check box or something similar to unsubscribe\
    \ the user from this notification.\n\nThe other possible solution is to mimic\
    \ the locked orientation. With the help of context transformation, you can rotate\
    \ the coordinates of the canvas whenever the user is rotating his screen so that\
    \ game elements always preserve the correct orientation. The code in Listing 3-7\
    \ shows how to update the skeleton to lock the game orientation that way.\n\n\
    ## Listing 3-7. Locking the Game’s Orientation\n\n```\n<script>\nvar canvas;\n\
    var ctx;\n\nfunction init() {\n    canvas = initFullScreenCanvas(\"mainCanvas\"\
    );\n    ctx = canvas.getContext(\"2d\");\n    repaint();\n}\n\nfunction initFullScreenCanvas(canvasId)\
    \ {\n    var canvas = document.getElementById(canvasId);\n    resizeCanvas(canvas);\n\
    \    window.addEventListener(\"resize\", function() {\n        resizeCanvas(canvas);\n\
    \    });\n    return canvas;\n}\n\nfunction resizeCanvas(canvas) {\n    canvas.width\
    \ = document.width || document.body.clientWidth;\n    canvas.height = document.height\
    \ || document.body.clientHeight;\n    // Paint something to see the effect of\
    \ changed orientation\n    repaint();\n}\n\nfunction repaint() {\n    if (!ctx)\n\
    \        return;\n    // Clear background\n    ctx.fillStyle = \"white\";\n  \
    \  ctx.fillRect(0, 0, canvas.width, canvas.height);\n    reorient();\n    ctx.fillStyle\
    \ = \"darkgreen\";\n    ctx.fillRect(10, 10, 250, 30);\n}\n\nfunction reorient()\
    \ {\n    var angle = window.orientation;\n    if (angle) {\n        var rot =\
    \ -Math.PI*(angle/180);\n        ctx.translate(angle == -90 ? canvas.width : 0,\n\
    \                      angle == 90 ? canvas.height : 0);\n        ctx.rotate(rot);\n\
    \    }\n}\n</script>\n```\n\nThe new code is in bold. We added a `repaint()` function,\
    \ which draws a green figure that looks like the letter T. Before executing the\
    \ drawing code, it calls `reorient()`, a function that changes the coordinate\
    \ system of context once the device changed the orientation. The effect of this\
    \ is that the screen looks ‘locked’ in a portrait mode, no matter how the user\
    \ rotates the smartphone. The green ‘T’ is glued to the top of the device. Figure\
    \ 3-2 shows the normal behavior of the browser vs. the ‘locked’ behavior.\n\n\
    ## Figure 3-2. The behavior of the portrait-locked page (top) vs. a normal page\
    \ (bottom)\n\nThe image at the left of Figure 3-2 shows the initial state of the\
    \ page, in the portrait screen orientation. The top two images show the rotation\
    \ behavior of the locked version. As you see, the only element that actually follows\
    \ the change of"
