    ## 第 8 章：浏览器中的 3D


    ### 总结


    本章致力于理解 3D 引擎背后的基础。计算顶点位置和应用透视只是一个真实的引擎在游戏中为每一帧所做的第一步。其他步骤可能更复杂——例如，丢弃不可见的多边形以节省资源、为模型表面应用纹理、计算光照效果等等。3D
    引擎通常比 2D 引擎涉及更复杂的数学运算，并且它们在不断发展。开发者和数学家们致力于带来更好的算法，让渲染出的画面更加逼真。


    即使是最复杂的 3D 数学运算，也是从世界中顶点的位置以及模型变换的计算开始的。如果你以前从未接触过 3D 图形，那么现在你已经是为数不多的真正理解自己在做什么的
    3D 开发者之一了。


    在本章中，我们构建了最简单的 3D 演示——一个旋转的立方体。在此过程中，我们学到了几个重要的方面：


    -   模型在内存中的表示方式

    -   如何使用矩阵来移动、旋转或缩放模型

    -   如何渲染线框

    -   投影以及如何在场景中实现透视


    现在，我们准备探索一个更高级的主题：WebGL API。


    ## 第 9 章


    ### 使用 WebGL


    WebGL 是一项非常有前景的倡议，它已经征服了大部分桌面浏览器世界。WebGL 是一个 API，它将显卡的资源暴露给你的 JavaScript 应用程序。有了
    WebGL，你可以创建 3D 游戏并在浏览器中运行，而无需像我们在第 8 章中那样自己实现所有 3D 数学运算。WebGL 基于 `OpenGL ES 2.0`（嵌入式系统
    OpenGL，一个适用于移动设备的 `OpenGL` API 子集）。


    WebGL 在移动端网页中才刚刚起步。它尚未获得 Android 设备的广泛支持。事实上，只有 Firefox Mobile 支持这一对游戏开发者至关重要的
    API。其他先行者包括索尼爱立信的 Xperia 手机——它们也在原生浏览器中支持 WebGL。在撰写本文时，除 IE 外，所有主要的桌面浏览器都支持 WebGL。


    本章专门介绍 WebGL。这项技术尚未为 Android 网页游戏的大众市场做好准备，但它正变得越来越受游戏开发者欢迎。本章的目标是向你介绍这项尖端技术。

