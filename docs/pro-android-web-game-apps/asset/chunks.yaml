    **NOTE:** There’s no magic behind the data URL. The format is very simple:


    data:[<MIME-type>][;charset=<encoding>][;base64],<data>. In our


    case, MIME-type is image/png and the charset/encoding part is skipped. There’s


    no binary image encoding, and the charset/encoding part makes sense only for


    textual information. Then, after base64 comes the Base64-encoded PNG data.


    Base64 is the format for encoding binary data in the form of a text string. Base64
    is used to store binary data in systems that work with text. There’s no way to
    put an


    image in an XML node, for example, since the image file has a binary format; while


    an XML node may contain only text. Since Base64 is a text format, you can encode


    the image in Base64 and store in an XML node. Data URI is another example. URI
    is a


    text and it can’t have any attached binary data in its original form, but Base64


    encoding solves this issue and allows storing image data within the valid URI.


    Essentially, the data URL is a string representation of some binary data with


    metadata in front of it. This URL, for instance, represents a small 50 × 50 pixel


    image with two gray rectangles on a white background----the one that I use as
    a


    ‘ no image’’ placeholder (see Figure 4-4).


    **Figure 4-4.** *A no-image placeholder*


