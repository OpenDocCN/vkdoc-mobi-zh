- fmt: '**NOTE:** The 2D context is anti-aliased by default. That’s why those semitransparent
    pixels appear. What if you want the old, jaggy pixel-art style? Can you turn the
    anti-aliasing off? The simple answer would be no. If you still want to get full
    control over the pixels, you’ll have go to the lower level and work directly with
    the bitmap image data. We’ll show how to do it in upcoming chapters (Chapter 5
    explains the basics of this technique).


    Now that we know how coordinate system works, we can start drawing actual graphics.


    ## Drawing Shapes


    The 2D context defines two types of shapes: simple shapes and complex shapes.
    Simple shapes is a geeky name for rectangles. Everything that is not a rectangle
    is a complex shape, even a line. We’ll start the drawing experiments with the
    simplest possible figure, a rectangle. Then we’ll look into more complex shapes
    and paths.


    As I promised at the start of the chapter, we will prepare some code for our first
    big project, a Four Balls game. Now that we know the tricky coordinate system
    of the context, we can handle the first task: drawing a background for the game
    board. The board is rectangular, so we’ll start by learning how to draw a rectangle
    outline and fill it with some color. The default white background is a little
    dull, so we’ll change it to something better!


    ![](index-59_1.jpg)


    **CHAPTER 2: Graphics in the Browser: The Canvas Element**


    **53**


    ### Rectangles


    Drawing a rectangle is a straightforward task (see Listing 2-3). There are two
    functions for it: `drawRect()` and `fillRect()`. The first function draws only
    the outline of the rectangle, which we will use for the border. The second draws
    a filled shape, which is suitable for the background. Both methods take four arguments:
    `x` and `y` of the top-left corner of the rectangle, and its size: `width` and
    `height`.


    ***Listing 2-3.** Drawing a Rectangle*


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <style>

    </style>

    <script>

    function init() {

    var canvas = document.getElementById("mainCanvas");

    var ctx = canvas. getContext("2d");

    ctx.fillStyle = "gray";

    ctx.strokeStyle = "blue";

    ctx.lineWidth = 3;

    ctx.fillRect(50, 50, 100, 120);

    ctx.strokeRect(4.5, 30.5, 70, 70);

    }

    </script>

    </head>

    <body onload="init()">

    <canvas id="mainCanvas" width="300px" height="300px"></canvas>

    </body>

    </html>

    ```


    The output looks like what is shown in Figure 2-8.


    **Figure 2-8.** *Drawing rectangles with `drawRect` and `fillRect`*


    **CHAPTER 2: Graphics in the Browser: The Canvas Element**


    Insert the code from Listing 2-3 into the HTML template from the beginning of
    the chapter. In the following listings, I omit the HTML wrapper since it usually
    doesn’t change. You have to write your code straight into the `init()` method
    and give it a try.


    **NOTE:** This copy/paste approach is only used for short, hands-on examples because
    now we learn how to draw things. In the next chapter, when we are done with the
    basics, we will create a good object-oriented architecture for the game.


    Don’t forget to use the coordinate guidelines from the previous section. The stroke
    is a line; use the half-pixel coordinates when the stroke width is odd and the
    integer coordinates when it is even, otherwise the line will be blurry and semitransparent.
    For the `fillRect` operation, you can use the integer coordinates all the time
    since you usually want to fill the whole pixel, not half of it.


    **NOTE:** I didn’t mention how to use these strokes and fills. I explain them
    in detail in the next sections. For now, think of a fill as the “paint bucket”
    tool in a graphical editor and a stroke as the “border” of a shape.


    To fill the whole available space, you can use `canvas.width` and `canvas.height`
    properties. Listing 2-4 shows how to fill the background with a very light-yellow
    color (like old paper) and how to draw a two-pixel border afterwards.


    **Listing 2-4.** *Drawing the Board Background*


    ```

    var canvas = document.getElementById("mainCanvas");

    var ctx = canvas.getContext("2d");

    ctx.fillStyle = "#fffbb3";

    ctx.strokeStyle = "#989681";

    ctx.lineWidth = 2;

    ```'
