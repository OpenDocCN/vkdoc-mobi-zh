    # 注意

    演示转换用法的代码可随本章源码一同找到，文件名为`transform-demo.html`。该代码相当庞大，除了几行转换代码外并无其他有价值的新内容，因此本节中不再重复。该代码使用了一个略有不同的
    HTML 框架：它包含多个`canvas`元素，而非只有一个。第一个元素显示原始场景，其余元素显示变换后的版本。你可以将其用作实验场：尝试不同的转换，以不同顺序应用于不同形状。该演示使用形状而非图像。


    ![](img/index-82_1.jpg)


    **第 2 章：浏览器中的图形：Canvas 元素**


    本节中的图展示了两件重要的事情：坐标轴如何变换，以及形状如何变化。初始场景示意性地呈现在图 2-27 中。


    **图 2-27.** *无变换，原始场景*


    默认情况下，未应用任何变换时，坐标系如图 2-27 所示：x 轴向右递增，y 轴向下递增，原点`(0, 0)`位于画布的左上角。初始状态下，坐标空间中只有
    x 和 y 值均为正的部分是可见的。


    从 Wow! eBook 下载：<www.wowebook.com>


    ## 平移


    平移是一种将每个对象移动给定距离的变换。要应用此变换，请调用：


    ```

    ctx.translate(50, 100)

    ```


    这段代码将坐标轴（以及所有图形）向右移动 50 像素，向下移动 100 像素（见图 2-28）。画布的左上角现在位于点`(-50, -100)`处。


    ![](img/index-83_1.jpg)


    **第 2 章：浏览器中的图形：Canvas 元素**


    **77**


    **图 2-28.** *使用`translate`函数移动场景中的形状*


    此变换常用于需要更改组件位置而又不修改其代码的情况。本章后续部分将介绍如何利用此变换来改进令牌渲染代码，使其更清晰、更易理解。


    ## 缩放


    缩放是一种对场景中的形状进行“拉伸”或“收缩”的变换。x 轴和 y 轴的缩放值可独立设置。初始正常缩放值为两轴均为 1，简称`(1, 1)`（在本小节中，此写法表示缩放值而非坐标；数字分别代表
    x 和 y 方向的缩放值）。


    以下三个简单示例有助于你更好地理解缩放：


    - 缩放值大于 1 会使每个图形变大。例如，`(2, 2)`使形状变为两倍大。

    - 缩放值介于 0 和 1 之间会缩小图形。例如，`(0.5, 0.5)`使每个形状变为正常大小的一半。

    - 负数缩放值会改变坐标轴方向并翻转形状。例如，`(-1, 1)`会使每个形状水平翻转。


    以下代码展示了缩放的常见用法：


    ```

    ctx.scale(2, 2) // 使所有形状放大两倍

    ctx.scale(1, 2) // 仅沿 Y 轴缩放（宽高比将改变）

    ctx.scale(1, 1) // 不做任何操作，保持坐标不变

    ctx.scale(-1, 1) // 沿 X 轴翻转

    ```


    ![](img/index-84_1.jpg)


    **第 2 章：浏览器中的图形：Canvas 元素**


    当使用负数缩放值时，缩放会改变轴的方向，效果如同翻转图形。x 轴上的`-1`导致水平翻转；y 轴上的`-1`导致垂直翻转。当然，你也可以将其与尺寸变化结合使用；例如，`ctx.scale(0.5,
    -0.5)`会使所有图形缩小两倍，同时翻转 y 轴。


    翻转对于创建图像的镜像版本非常有用。例如，如果你有一张骑士面朝左的图像，你可以直接在浏览器中轻松创建其镜像版本（骑士面朝右），而无需从服务器额外下载图像。图
    2-29 展示了缩放和翻转的效果。


    **图 2-29.** *缩放。左侧图像沿 x 轴缩放；右侧图像显示翻转后的场景。*

