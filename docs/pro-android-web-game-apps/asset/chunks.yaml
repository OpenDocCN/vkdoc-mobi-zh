  trans: "\n# 第 4 章：动画与精灵\n\n不是通过安卓原生浏览器实现的（移动版火狐浏览器支持）。顾名思义，这个函数是专门为处理动画而创建的。你不能向`requestAnimationFrame`传递超时值；由浏览器自行决定下一次动画循环的最佳时机。浏览器会将`requestAnimationCallback`与页面上的其他动画（如\
    \ CSS 过渡、DOM 动画、SVG 的 SMIL 等）进行同步，从而提升页面的整体性能。此外，如果浏览器标签页不可见，`requestAnimationFrame()`将不会触发。既然没人观看动画，何必浪费宝贵的\
    \ CPU 周期和电池电量呢？这应是 JavaScript 游戏中用于调度动画的标准方法。列表 4-21 展示了如何在 JavaScript 游戏中使用该函数来调度动画（适用于支持该功能的浏览器）。\n\
    \n**列表 4-21.** *`requestAnimationFrame`使用示例*\n\n```\nfunction animate(timestamp){\n\
    \    console.log(\"Hello\");\n    requestAnimationFrame(animate);\n}\n```\n\n\
    在撰写本文时，此函数仍需要使用厂商特定的前缀。在 WebKit 浏览器中，它被称为`webkitRequestAnimationFrame()`；在 Opera\
    \ 中，则为`oRequestAnimationFrame()`，依此类推。当该函数标准化后，浏览器厂商最终会移除前缀；但目前，使用以下由 Paul Irish\
    \ 实现的填充层（列表 4-22）会更为便利。\n\n**列表 4-22.** *`requestAnimationFrame`的填充层*\n\n```\n\
    window.requestAnimationFrame = (function(){\n    //检查每种浏览器\n    //@paul_irish\
    \ 函数\n    //将此函数全局化，使其能在任何浏览器上运行，\n    //因为每种浏览器对此有不同的命名空间\n    return window.requestAnimationFrame\
    \ || //Chromium\n        window.webkitRequestAnimationFrame || //Webkit\n    \
    \    window.mozRequestAnimationFrame || //Mozilla Geko\n        window.oRequestAnimationFrame\
    \ || //Opera Presto\n        window.msRequestAnimationFrame || //IE Trident\n\
    \        function(callback, element){ //后备函数\n            return window.setTimeout(callback,\
    \ 1000/60);\n        }\n})();\n```\n\n请注意这段代码是如何优雅地降级到`setTimeout()`的。即使浏览器不支持`requestAnimationFrame()`，你的代码也不会崩溃！而且，一旦浏览器增加了对这个神奇小功能的支持，你无需做任何更改就能使用它。\n\
    \n**注意：** Paul 使用的这种构造方式乍看可能令人困惑。让我们花点时间解释一下。Paul 创建了一个匿名函数，该函数返回另一个函数（记住，在 JavaScript\
    \ 中，函数像任何其他对象一样，可以被方法返回），并立即调用了它。这个函数会检查可用的`requestAnimationFrame`实现，并将其赋值给`window.requestAnimationFrame`属性：\n\
    \n```\nwindow.requestAnimationFrame = (function(){\n    // 实际的填充代码在此\n})();\n\
    ```\n\n将这段代码添加到`utils.js`文件中，因为我们在本书的大部分章节中都会用到它。\n\n## 停止定时器\n\n有时你需要取消定时器——例如，当游戏结束，不再需要任何动画时，你可能想要停止`requestAnimationFrame()`或其他定时器。我们之前描述的每个函数都有一个对应的反函数，用于停止定时器并阻止下一次调用。\n\
    \n要停止通过`setTimeout()`设置的定时器，你可以像下面这样调用`clearTimeout()`：\n\n```\nvar handler =\
    \ setTimeout(function() {alert (\"Boom\");}, 1000);\nclearTimeout(handler);\n\
    ```\n\n每个定时器函数都会返回一个用于标识该定时器的`handler`。当你的脚本中有多个定时器时，这个处理程序用于区分它们。间隔定时器遵循完全相同的模式，唯一的区别是用于停止执行的函数叫做`clearInterval()`：\n\
    \n```\nvar handler = setInterval(function() {alert (\"Tick\");}, 1000);\nclearInterval(handler);\n\
    ```\n\n最后，清除动画帧（animationFrame）会稍微复杂一些，因为存在不同的命名约定。我们需要另一个填充层来实现。\n"
- fmt: "# `cancelRequestAnimationFrame()` in a browser-agnostic way and, of course,\
    \ provide the fallback to the standard `clearTimeout()` implementation (see Listing\
    \ 4-23).\n\n## CHAPTER 4: Animation and Sprites\n\n**Listing 4-23.** *Cancelling\
    \ `requestAnimationFrame`*\n\n```javascript\nwindow.cancelRequestAnimFrame = (\
    \ function() {\n    return window.cancelAnimationFrame ||\n        window.webkitCancelRequestAnimationFrame\
    \ ||\n        window.mozCancelRequestAnimationFrame ||\n        window.oCancelRequestAnimationFrame\
    \ ||\n        window.msCancelRequestAnimationFrame ||\n        clearTimeout\n\
    } )();\n```\n\n## Improving Animation\n\nNow that we know how to organize the\
    \ animation sequence, it is time to think about ways to improve the simple solution.\
    \ Take into account that the current frame rate can be far below the desired 60\
    \ FPS and deal with the possible glitches, for example. The end of this section\
    \ introduces the `Animator` class — the class for handling the more complex animation\
    \ strategies.\n\n### Frame Rate and the Time Between Frames\n\nLet’s review the\
    \ animation example from the start of the section once again. This version of\
    \ the code (see Listing 4-24) doesn’t take the frame rate into account. The animation\
    \ renders faster on faster devices.\n\n**Listing 4-24.** *Basic Implementation\
    \ of Animation*\n\n```javascript\nvar currentFrame = -1;\nfunction animate(timestamp)\
    \ {\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0, 0, canvas.width, canvas.height);\n\
    \    currentFrame = ++currentFrame%5;\n    spriteSheet.drawFrame(ctx, current,\
    \ 10, 40);\n    requestAnimationFrame(arguments.callee);\n}\nanimate();\n```\n\
    \nIf you add more sprites and try it out on different devices, you will notice\
    \ that the speed of the animation heavily depends on CPU and frame rate (just\
    \ make sure to add enough sprites). The animation doesn’t take time into account,\
    \ and it will look inconsistent over different browsers and hardware.\n\nIf you\
    \ build the graphics-intensive game with the animation approach shown in Listing\
    \ 4-24, you soon notice that the speed of animation depends on the device hardware:\
    \ it runs slower on less powerful devices that can’t hold a steady 60 FPS or faster\
    \ rate on newer multicore smartphones. This is not the behavior that a user expects\
    \ from a game. The speed of the animation should stay constant and should not\
    \ depend on the frame rate. Let's fix this.\n\nWe need to keep the frame on the\
    \ screen for a certain fixed amount of time, like 50 milliseconds, before switching\
    \ to the next one. This way, we make the game slightly more consistent. The second\
    \ version of the code, shown in Listing 4-25, implements this idea.\n\n**Listing\
    \ 4-25.** *The Improved Version of the Code That Checks the Time Elapsed Between\
    \ the Frames*\n\n```javascript\nfunction animate(t) {\n    var now = t || new\
    \ Date().getTime();\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0, 0, canvas.width,\
    \ canvas.height);\n    var timeSinceFrameStart = now - currentFrameStart;\n  \
    \  if (timeSinceFrameStart > timePerFrame) {\n        currentFrame = ++currentFrame%5;\n\
    \        console.log(currentFrame);\n        currentFrameStart = now;\n    }\n\
    \    spriteSheet.drawFrame(ctx, currentFrame, 10, 40);\n    requestAnimationFrame(arguments.callee);\n\
    }\nanimate(0);\n```\n\nIf you try to run the script, you’ll notice the result\
    \ is roughly the same for both the desktop browser and the Android browser.\n\n\
    **NOTE:** The `requestAnimationFrame()` should pass the timestamp parameter to\
    \ the listener function, but since we are using a trick described in a previous\
    \ section, any browser that doesn’t support the new timer will fall back to `setTimeout()`.\
    \ In this case, we need to determine the current time ourselves (luckily, this\
    \ is not a heavyweight operation). That’s where that extra line comes from:\n\n\
    ```javascript\nvar now = t || new Date().getTime();\n```\n\nThis approach has\
    \ its drawbacks, however. Look at Figures 4-10 and 4-11, which show the animation\
    \ flow. We’ll start with Figure 4-10, which shows the perfect case. In a perfect\
    \ world, the timer hits exactly when we need it to hit — every 50 milliseconds\
    \ — giving a very predictable interval between the frames.\n\n![](index-163_1.jpg)\n\
    \n![](index-163_2.jpg)\n\n## CHAPTER 4: Animation and Sprites"
