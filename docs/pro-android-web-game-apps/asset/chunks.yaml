    \ the left shows orthographic projection. The image on the right shows perspective\
    \ projection.*\n\nAs you see, the picture on the right that shows the same cube\
    \ with perspective projection looks far more realistic than what we have now on\
    \ the left. How do we fix our engine so that it takes perspective into account?\
    \ That's right. We add another matrix.\n\nI will not go into any more mathematical\
    \ detail on how the projection matrix is actually implemented. You only need to\
    \ know two things to make cool 3D games. First, if you multiply the result of\
    \ the `modelView` transformation by this matrix, you get the projection transformation—which\
    \ takes perspective into account. Second, Brandon is a nice guy who included a\
    \ convenient method in his library that creates a perspective matrix when given\
    \ a set of human-readable parameters.\n\nListing 8-6 shows how we create the matrix.\n\
    \n**Listing 8-6.** *Creating the Projection Matrix*\n\n```\nvar persp = mat4.create();\n\
    mat4.perspective(45, canvas.width/canvas.height, 0.1, 100, persp);\n```\n\nThe\
    \ parameters are vertical angle of view, aspect ratio, distance to the \"near\
    \ plane,\" and distance to the \"far plane,\" respectively. The near plane and\
    \ far plane are the bounds of the scene. It is saying, \"I don't want to see anything\
    \ closer than 0.1 and anything that is beyond 100.\" The last parameter is the\
    \ matrix that is initiated with these values (see Listing 8-7). Figure 8-18 illustrates\
    \ how the perspective parameters affect the resulting frame.\n\n**Listing 8-7.**\
    \ *Using the Projection Matrix*\n\n```\nfor (var i = 0; i < vertices.length; i++)\
    \ {\n    var point = [vertices[i][X], vertices[i][Y], vertices[i][Z], 1];\n  \
    \  mat4.multiplyVec4(modelView, point);\n    mat4.multiplyVec4(persp, point);\n\
    \    ...\n}\n```\n\n![](index-357_1.jpg)\n\n**Figure 8-18.** *Defining scene bounds\
    \ with perspective*\n\nThe coordinates that we receive after applying the perspective\
    \ matrix have to be normalized before we can draw vertices onto the screen. Without\
    \ overcomplicating matters, we translate the homogeneous coordinates (those with\
    \ one extra component) to the usual screen coordinates that have only two axes:\
    \ `x` and `y` (see Listing 8-8).\n\n**Listing 8-8.** *Normalizing the Coordinates*\n\
    \n```\nvar ndcPoint = [\n    point[X]/point[W],\n    point[Y]/point[W]\n];\n```\n\
    \nThe resulting `x` and `y` fall between -1 and 1. The NDC in `ndcPoint` stands\
    \ for normalized device coordinates. Now the only thing we have to do is \"stretch\"\
    \ them to fill the whole canvas, as shown in Listing 8-9. The full complete demo\
    \ of perspective projection is available in a file called `02.perspective.html`\
    \ included with the source code for this chapter.\n\n**Listing 8-9.** *Translating\
    \ to Window Coordinates*\n\n```\npoints[i] = [\n    Math.round(canvas.width/2*(1\
    \ + ndcPoint[0])),\n    Math.round(canvas.height/2*(1 - ndcPoint[1]))\n];\n```\n\
    \nListing 8-10 shows the full code for the `renderCube()` function, which is aware\
    \ of perspective (the new code is in bold).\n\n**Listing 8-10.** *Final Version\
    \ of renderCube*\n\n```\nfunction renderCube() {\n    var modelView = mat4.create();\n\
