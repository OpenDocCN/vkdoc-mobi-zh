    CHAPTER 4: Animation and Sprites


    **127


    **Listing 4-1\.** **Loading an Image, the Simplest Example**


    *var img = new Image(); // Create the new Image object. Loading hasn’t started
    yet.


    img.onload = function() { // This function is called when loading is done


    alert ("Image is loaded"); // At this point you know that image is ready


    };


    img.src = "img/knight.png"; // When you assign the src property the browser starts


    // to download the file.


    The image loading is an asynchronous operation: once you assign the src


    property, the browser starts loading the bytes, but the script continues to run.


    When loading is done, the browser uses one of the registered callbacks to notify


    your script about the result of the operation.


    You can load several images simultaneously, but the browser will not guarantee


    any particular order of loading. For example, a small image that started to load


    last might finish loading first. In practice, it means that you always have to
    check the state of every image that you queued for loading, and assumptions like
    ‘ if


    b.png is loaded then a.png is probably loaded too’’ are not reliable.


    **NOTE:** Another important rule of working with all resources (not only images):
    you should never rely on good networking or assume that the resource that you’re
    waiting for is available 100 percent of the time. When you create a game, you’re
    usually


    working with a local environment that works like clockwork. In the real world,


    internet connections can be interrupted when you least expect it. You should be


    prepared for it and either retry to download the resource, notify the user about
    the problem, and quit or continue without it. Continuing without the resource
    doesn’t


    Download from Wow! eBook <www.wowebook.com>


    mean that you have to ignore the accident. With images, you might use a placeholder


    image instead of the proper one if the image wasn’t important (OK, we failed to
    load the texture for the wizard’s hat, but the rest of the game loaded, so why
    should we


    end the world?).


    Listing 4-2 shows how you handle problems with the image. Notice the bold


    lines.


    **Listing 4-2.** *Using Error Callbacks*


    var img = new Image();


    img.onload = function() {


    alert("Image loaded");


    };


    CHAPTER 4: Animation and Sprites


    img.onerror = function() { // This callback is invoked when something went wrong.


    alert("Failed to load the image");


    };


    img.src = "img/knight.png";


    The bolded lines show the second callback that you should register on the Image


    object ----onerror. This function is called when the image could not be loaded,


    and gives you the chance to run the fallback mechanisms.


    **NOTE:** Why do we use PNG images? The PNG has become the de facto standard for


    game development. It is a *lossless* format, meaning that even after compression
    it stays pixel-perfect (unlike JPEG). It is open and free to use. Besides, it
    supports


    transparency and translucency. What else might one want for his sprites?


    **Loading Multiple Images**


    Usually you need more than one image for your game. You’ve got to track the


    loading of each sprite, react to problems, and do other small housekeeping


    tasks. It is a good idea to create a utility class that is responsible for tasks
    like these. We want to simplify the image loading even more!


    We need to manage the loading of multiple images, firing a single callback when


    the loading is done. We need some sort of progress indication since image


    loading is a relatively slow operation. Given that we’re making a user-friendly


    interface, we want to show a progress bar. The final task that we want to


    achieve is to give each image an alias: a string to identify the image in the


    project. Using an alias is way more convenient than using file names. File names


    change often, while aliases stay the same.


    Let’s start from the end. Listing 4-3 shows how we use the ImageManager to


    preload the image that we will need for the game.'
