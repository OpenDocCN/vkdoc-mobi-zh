    \ (don’t worry if `Socket.IO` reported that it can’t compile native extensions,\
    \ the project still works):\n\n```\n> npm install socket.io\n```\n\nNext, initialize\
    \ the `Socket.IO` server. It can work standalone but it is more useful as the\
