- fmt: "```javascript\nif (typeof easingFunction != \"function\") {\n  throw \"easingFunction\
    \ must be a function\";\n}\n\nthis._easingFunction = easingFunction;\n};\n```\n\
    \nDon’t forget to call the `_throwIfStarted()` from the parent class—we must be\
    \ sure that we don’t break things in the middle of the animation loop.\n\nThat\
    \ was the easy stuff. Now we need to do two things:\n- Apply the new easing function\
    \ on top of the acceleration/deceleration.\n- When the fraction is calculated,\
    \ pass it to the setters of objects.\n\nA piece of cake with our hook functions\
    \ (see Listing 4-36). The one for preprocessing values, `_timingEventPreprocessor()`,\
    \ is the best place to apply custom easing. And the other one, called `_onUpdate()`,\
    \ lets us perform custom actions before finishing the update.\n\n**Listing 4-36.**\
    \ Providing Custom Hook Functions to Add New Features to the Animator\n\n```javascript\n\
    // Called before returning the fraction value, redefining this function we\n//\
    \ set the custom easing behavior instead of default one\n_p._timingEventPreprocessor\
    \ = function(fraction) {\n  fraction = Animator.prototype._timingEventPreprocessor.call(this,\
    \ fraction);\n  if (this._easingFunction) {\n    fraction = this._easingFunction.call(this,\
    \ fraction);\n    // In case if easing function returns the value more than 1\
    \ or less\n    // than 0, trim it to fit the allowed interval\n    if (fraction\
    \ > 1) fraction = 1;\n    if (fraction < 0) fraction = 0;\n  }\n  return fraction;\n\
    };\n\n// Called after the fraction is calculated, at the end of update function.\
    \ This\n// hook allows to perform few extra actions before returning the fraction\
    \ value.\n// In our case, we call setters of the object\n_p._onUpdate = function(fraction)\
    \ {\n  this._props.forEach(function(item) {\n    item.setter.call(this, (1 - fraction)\
    \ * item.start + fraction * item.end);\n  }, this);\n};\n```\n\nThat was easy\
    \ enough. Now it is your turn. Think of a cool animation effect and try to implement\
    \ it. Play with the different easing functions. What if you use `Math.sin` or\
    \ `Math.cos`, or both? It might look cool, you know! There are two examples of\
    \ using `Animator` available together with the other source code for this chapter.\
    \ The first example, `06.animator.html`, shows the simple movement between two\
    \ points. The second example, `07.swinging_axe.html`, shows how to combine the\
    \ change of position, angle, and size of the sprite to get the effect of a swinging\
    \ axe.\n\nCongratulations! Now you know not only the basics of animation, but\
    \ also some advanced features too. But animation is not yet a game; the user needs\
    \ a way to interact with the game world. And that’s exactly what we’ll do in the\
    \ next chapter!\n\n## Summary\n\nIn this chapter, we learned the basics of image\
    \ loading and animation. We started with loading the image. We learned two ways\
    \ of getting image data to the browser—from the file and from the data URI. We\
    \ learned how to handle the possible loading errors that may happen in real life,\
    \ like breaks in connection or the absence of the file on the server. We learned\
    \ how to organize the sprite sheet and how to render the image on canvas.\n\n\
    The next step was to master the animation from the very simple change of frames\
    \ on the screen to the more complex subjects, such as optimizing the consistency\
    \ of animation, dealing with the acceleration and deceleration, and custom easing\
    \ functions.\n\nWe briefly overviewed the class that supports most of the techniques\
    \ described in this chapter—the `Animator` (the full source code comes with the\
    \ other materials for this chapter). We learned how to use `Animator` to decouple\
    \ the code that updates the state of the animation (the fraction) from the code\
    \ that renders the new state on the screen, which changes the frame or the position\
    \ of the element.\n\nKnowing how to handle the animation is still not quite enough\
    \ to make the completed game—but we’re almost there! The essential part of the\
    \ game is the interaction between the player and the game world. In the next chapter,\
    \ we learn how to react to user input and let the player control the characters\
    \ on the screen.\n\n**Event Handling and**"
