    # 第 2 章：浏览器中的图形：Canvas 元素


    在本章中，我们将学习如何在网页上“绘制”——具体来说，就是使用 `canvas` 元素显示任意形状。我们将尝试使用绘图 API，尝试最常见的操作，例如绘制线条以及使用渐变填充来填充矩形。本章中的代码是我们将在第
