  raw: 'filesystem). The second way is where the magic happens----when you refer the


    module only by its name, like require("http").


    In the latter case, Node.js looks into the directory with the name node_modules


    inside the directory of the current module (or the main file). Node looks for
    one


    of three files that describe the module, in the following order:


    1\. the node_modules/<module-name>.js file


    2\. the node_modules/<module-name>/package.json file


    3\. the node_modules/<module-name>/index.js file


    CHAPTER 10: Going Server-Side


    package.json is the json file that must have at least one attribute called name


    that points to the main file of the module. Listing 10-13 shows the example of


    the simplest possible package.json file.


    **Listing 10-13.** *Simplest Module Descriptor*


    {


    "main": "hamster"


    }


    The main file may, in turn, require other modules and provide an interface to
    the


    complex functionality. In big modules, the main files usually don’t implement
    any


    specific functionality, but rather do housekeeping tasks: loading dependant files,


    adding keys to exports, and so forth. This form of discovery allows it to


    distribute complex modules as a folder that can be checked out from the


    version control system, for example.


    If none of the three is found in the folder, Node goes to the parent folder and


    repeats the whole process there. If the requested module is still not found, it


    goes up one more level until it reaches the root of the filesystem. This approach


    allows you to set up the default versions of the modules somewhere at the top


    of the filesystem, which is available to all your Node projects. However, if the


    specific project needs a version of the library that is different from the default,


    you can easily override it in the project’s own node_modules folder. You can also


    add an arbitrary folder to the search process by defining the NODE_PATH


    environment variable.


    Sometimes you need to know where exactly the module was loaded from


    (typically when something doesn’t work as you expected). There’s a way to do it


    in Node.js:


    > node


    > require.resolve("hamster");


    ''c:\\apps\\projects\\jsbook\\chap10\\node_modules\\hamster\\hamster.js''


    This last listing shows the so-called REPL mode (read-eval-print loop). If you


    start Node without specifying the js file, you can type commands right into the


    terminal. This is a quick way to check something if you are too lazy to create


    and save a text file.


    The scope of this book doesn’t cover the building and distribution of the


    complex Node modules, but if you’re interested in this topic and want to explore


    more, the official documentation on modules ([http://nodejs.org/api/modules](http://nodejs.org/api/modules.html)


    [.html)](http://nodejs.org/api/modules.html) is the good place to start.


    ![](index-420_1.jpg)


    CHAPTER 10: Going Server-Side


    **417


    Using NPM


    NPM is the standard package management in Node.js. It is not a simple


    download-and-extract type of software but a complete toolset that allows you to


    install and manage modules, create your own, search for them in the online


    registry by keyword, and do a lot more. NPM itself is a Node application, even


    though you call it from the command line like a regular Windows program. NPM


    is developed and maintained by Isaac Z. Schlueter.


    Instead of writing more about what NPM can do, let’s issue a couple of


    commands and see how the real action looks. We’ve learned enough theory


    about Node.js; now we need to pick a nice framework to build our multiplayer


    application. We want a web framework that follows the REST style


    ([https://www.ibm.com/developerworks/webservices/library/ws-restful/](https://www.ibm.com/developerworks/webservices/library/ws-restful/)).


    Let’s ask NPM if he knows such a framework:


    > npm search web rest framework


    The output is a nice list of search results that highlight the keywords with


    different colors. Figure 10-5 shows how the output looks on my machine.


    **Figure 10-5.** *The results of NPM search*


    Now you can read through the results and choose the framework that you like.'
  trans: "\n第十章：迈向服务器端\n\n`filesystem`)。第二种方式才是真正神奇的地方——当你仅通过模块名称来引用它时，例如 `require(\"\
    http\")`。\n\n在后一种情况下，Node.js 会在当前模块（或主文件）所在目录下的 `node_modules` 目录中进行查找。Node 会按以下顺序查找描述该模块的三个文件之一：\n\
    \n1.  `node_modules/<module-name>.js` 文件\n2.  `node_modules/<module-name>/package.json`\
    \ 文件\n3.  `node_modules/<module-name>/index.js` 文件\n\n`package.json` 是一个 JSON\
    \ 文件，它必须至少包含一个名为 `name` 的属性，该属性指向模块的主文件。清单 10-13 展示了一个最简单的 `package.json` 文件示例。\n\
    \n**清单 10-13.** *最简单的模块描述文件*\n\n```\n{\n  \"main\": \"hamster\"\n}\n```\n\n主文件可能会依次引用其他模块，并为复杂功能提供接口。在大型模块中，主文件通常不实现特定功能，而是执行一些内务处理任务：例如加载依赖文件、向导出对象添加键等。这种发现机制允许将复杂的模块作为一个文件夹来分发，例如可以从版本控制系统中检出这个文件夹。\n\
    \n如果在当前文件夹中未找到这三个文件中的任何一个，Node 就会进入父文件夹并重复整个过程。如果仍然找不到请求的模块，它就会继续向上查找，直到到达文件系统的根目录。这种方法允许你在文件系统的某个顶层位置设置模块的默认版本，使其对你所有的\
    \ Node 项目都可用。然而，如果某个特定项目需要与默认版本不同的库版本，你可以很容易地在项目自身的 `node_modules` 文件夹中覆盖它。你还可以通过定义\
    \ `NODE_PATH` 环境变量，将任意文件夹添加到搜索过程中。\n\n有时你需要知道模块是从哪里被加载的（通常是在某些行为不符合预期时）。在 Node.js\
    \ 中，有一种方法可以做到这一点：\n\n```\n> node\n> require.resolve(\"hamster\");\n'c:\\\\apps\\\
    \\projects\\\\jsbook\\\\chap10\\\\node_modules\\\\hamster\\\\hamster.js'\n```\n\
    \n最后这个清单展示的是所谓的 REPL 模式（读取-求值-输出循环）。如果你启动 Node 时没有指定 `.js` 文件，就可以直接在终端中输入命令。当你懒得创建和保存文本文件时，这是一种快速检查某些内容的方法。\n\
    \n本书的范畴不涵盖构建和分发复杂 Node 模块的内容，但如果你对这个主题感兴趣并且想要深入了解，官方关于模块的文档（http://nodejs.org/api/modules.html）是一个不错的起点。\n\
    \n![index-420_1.jpg](img/index-420_1.jpg)\n\n## 使用 NPM\n\nNPM 是 Node.js 中的标准包管理器。它不仅仅是一个简单的下载和解压类型的软件，而是一套完整的工具集，允许你安装和管理模块、创建自己的模块、通过关键词在在线注册表中搜索模块，以及做更多事情。NPM\
    \ 本身是一个 Node 应用程序，尽管你像调用普通 Windows 程序一样从命令行调用它。NPM 由 Isaac Z. Schlueter 开发和维护。\n\
    \n与其继续写 NPM 能做什么，不如让我们执行几个命令，看看实际操作是什么样子。关于 Node.js 我们已经学习了足够多的理论；现在我们需要挑选一个合适的框架来构建我们的多人应用。我们希望一个遵循\
    \ REST 风格（https://www.ibm.com/developerworks/webservices/library/ws-restful/）的\
    \ Web 框架。\n\n让我们问问 NPM 是否知道这样的框架：\n\n```\n> npm search web rest framework\n```\n\
    \n输出是一个漂亮的搜索结果列表，其中关键词会用不同的颜色高亮显示。图 10-5 展示了我机器上的输出效果。\n\n**图 10-5.** *NPM 搜索的结果*\n\
    \n现在你可以浏览这些结果，并选择你喜欢的框架。\n"
- fmt: "当然，你通常会在网上先搜索相关框架，阅读论坛和邮件列表，然后才会选择要使用的工具。在本书中，我选择了`Express`（[http://expressjs.com](http://expressjs.com)）——市场上最流行的框架之一。现在我们来安装它。\n\
    \n> `npm install express`\n\n在几行显示进度的输出后，你会看到`NPM`报告该模块及其所需依赖已安装完毕：\n\n![](index-421_1.jpg)\n\
    \n```\nCHAPTER 10: Going Server-Side\n[express@3.0.0beta7 node_modules\\express](mailto:express@3.0.0beta7)\n\
    ├── [methods@0.0.1](mailto:methods@0.0.1)\n├── [fresh@0.1.0](mailto:fresh@0.1.0)\n\
    ├── [range-parser@0.0.4](mailto:range-parser@0.0.4)\n├── [cookie@0.0.3](mailto:cookie@0.0.3)\n\
    ├── [commander@0.6.1](mailto:commander@0.6.1)\n├── [debug@0.7.0](mailto:debug@0.7.0)\n\
    ├── [mkdirp@0.3.3](mailto:mkdirp@0.3.3)\n├── [response-send@0.0.1 (crc@0.2.0)](mailto:response-send@0.0.1)\n\
    ├── [send@0.0.3 (mime@1.2.6)](mailto:send@0.0.3)\n└── [connect@2.3.9 (bytes@0.1.0,\
    \ cookie@0.0.4, crc@0.2.0, qs@0.4.2,](mailto:connect@2.3.9)\n    [formidable@1.0.11)](mailto:formidable@1.0.11)\n\
    ```\n\n安装过程需要一点时间——`NPM`需要先下载包及其依赖，然后将其安装到系统中。打开项目文件夹，查看我们执行这两条命令后出现的文件结构。你应该会看到类似图10-6所示的结构。\n\
    \n**图10-6.** *安装Express后创建的文件夹结构*\n\n如你所见，`NPM`创建了`node_modules`文件夹，其中现在包含`express`文件夹。由于`Express`作为模块依赖其他几个模块，其依赖也位于自身的`node_modules`中。\n\
    \n让我们验证模块是否已安装，并输出每个模块更详细的信息。输出如图10-7所示（在我的Windows机器上）。\n\n![](index-422_1.jpg)\n\
    \n**图10-7.** *每个已安装模块的详细信息*\n\n现在你不仅可以看到可用包的名称和版本，还能看到简短描述、模块文件夹路径以及模块的来源——指向`Git`仓库的链接。现在我们知道了`Express`是一个“受`Sinatra`启发的Web开发框架”，并且该模块的源代码可以在`git://github.com/visionmedia/express.git`处检出。信息真不少！你还可以使用`list`命令的同义词：`ll`、`ls`和`la`（`ll`和`la`显示“长”版本，`ls`显示短版本）。\n\
    \n如果由于某种原因你忘记了命令的详细信息，请使用：\n\n`npm <command> help`\n\n它会打开浏览器窗口，并从本地文件系统打开文档部分。\n\
    \n关于入门`Node`需要了解的`NPM`知识，这几乎就是全部了。我们现在已经完成了`Node.js`的学习曲线——我们已经准备好编写我们的服务器了。\n\
    \n## 第10章：走向服务端\n\n### 实战：为游戏构建一个服务器\n\n现在我们了解了很多关于`Node.js`的知识：如何编写简单的脚本，如何调试它们，如何安装额外的模块，以及如何编写我们自己的模块。是时候应用我们的知识，构建一个更高级的应用程序了——多人版本的“四球”游戏。我们将从头开始，创建一个简单的纯文本页面，允许两名玩家轮流操作。\n\
    \n本节将介绍如何使用我们刚刚安装的`Express`框架来完成此任务。让我们从学习`Express`开始。为了确保我们从干净的环境开始，请删除文件夹中的所有文件，然后重新安装`Express`。\n\
    \n#### Node的Web开发框架\n\n什么是`Express`（[http://expressjs.com](http://expressjs.com)）？为什么我们会在游戏中使用它？正如我们在上一节中学到的，`Express`是一个“受`Sinatra`启发的Web开发框架”。`Sinatra`是一个用于`Ruby`的Web开发框架。"
