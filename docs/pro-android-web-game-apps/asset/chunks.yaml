    code illustrates how to draw it:


    var x = 90;


    var y = 70;


    var radius = 50


    ctx.beginPath();


    ctx.arc(x, y, radius, 0, 2*Math.PI, false);


    // Setting stroke and fill style


    ctx.fillStyle="darkgoldenrod";


    ctx.lineWidth=5;


    ctx.strokeStyle="black";


