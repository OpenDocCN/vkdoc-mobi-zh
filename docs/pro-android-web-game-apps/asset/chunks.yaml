- fmt: "# why I picked Socket.IO and not Faye for this chapter\n\nI picked `Socket.IO`\
    \ and not `Faye` for this chapter, and neither reason is technical or quality-based.\
    \ First, `Faye` implements a higher-level communication protocol called `Bayeux`\
    \ (http://svn.cometd.org/trunk/bayeux/bayeux.html), and trying to keep things\
    \ simple, I did not want to spend a couple more pages explaining the protocol\
    \ itself. The second reason is purely social: `Socket.IO` has a larger community\
    \ around it, and it is growing continuously. In the time that I have spent writing\
    \ this chapter, about 50 more members have joined the mailing list. Nevertheless,\
    \ I encourage you to go and check `Faye` yourself to form your own opinion about\
    \ this little gem.\n\n`Socket.IO` is based on the idea of sockets. `Socket.IO`\
    \ sockets have nothing to do with the real TCP Sockets or Unix Sockets. It is\
    \ no more than the abstraction layer on top of the transport that a particular\
    \ client uses. Take a look at Figure 12-4 to see how this works. The server can\
    \ hold the connection with multiple clients, and each client would use the suitable\
    \ transport. Neither client nor server performs any transport-specific actions,\
    \ like creating XHR objects and sending requests. The single interface of communication\
    \ is `Socket`—the rest is handled by the library. I’m sure that you are anxious\
