    Strokes and fills are really easy to understand. Stroke describes the outline
    of a shape, while fill describes the internal area. Stroke is the ‘border’ of
    a path, and fill is its color. Both `fillStyle()` and `strokeStyle()` accept the
    same types of values: solid colors, gradients, and patterns.


    **Solid Colors**


    CSS colors are the simplest way to define the style. You can use any format you
    like: color name, color code, or `rgb` and `rgba` functions (see Listing 2-9).


    **Listing 2-9.** *Several Ways to Define a Color for Strokes and Fills*


    ```

    ctx.fillStyle = "#987654";              // Using the code of the color

    ctx.strokeStyle = "blue";               // Using predefined CSS color name

    ctx.fillStyle = "rgb(255, 0, 0)";       // using the rgb function

    ctx.strokeStyle = "rgba(255, 0, 0, 0.5)"; // using the rgba function

    ```


    The context ‘remembers’ the fill and stroke settings. It will use the latest values
    until you override them explicitly.


    Now let’s try gradients!


    **Gradients**


    Gradient is a smooth transition between two or more colors, or between shades
    of the same color. The sky at sunset, changing from blue to red or a rainbow,
