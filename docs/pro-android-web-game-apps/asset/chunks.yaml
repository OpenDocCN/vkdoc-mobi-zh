- fmt: '# Vector Graphics vs. Raster Graphics


    `Vector graphics` are stored as formulas and coordinates. For example, the circle
    can be stored as the coordinates of its center and the value of the radius. If
    you want to scale a circle and make it 30 percent bigger, you just multiply the
    radius by `1.3` and rerender the figure. The same concept applies to any other
    graphical primitive—lines, curves, and rectangles. That’s why vector graphics
    are easily scaled up or down. Try to run our Four Balls game on different devices
    with different screens, and you will see that it looks fairly good everywhere.


    `Sprites` are an example of a *bitmap* or *raster* graphics. Raster graphics don’t
    have any brain-killing math underneath. You can think of it as a two-dimensional
    array of pixels. Raster graphics look perfect only in their original size. Once
    you start scaling them up or down, they don’t look very good anymore. Besides
    the poor look, scaling images hits performance. There is more about that later
    on in this chapter.


    The main difference between the graphical primitives that we used in the previous
    chapter and the raster images that we’ll try out soon is the way they are represented.
    Primitives are represented by the parameters that define the shape, while a raster
    image is a two-dimensional array of pixel colors. Images require much more memory,
    but grant a certain performance boost, especially when it comes to complex graphics.
    Rendering sprites is a matter of copying pixels from the image to the screen—no
    math means fewer calculations and faster rendering. The main advantage of sprites
    is that you can make significantly more complex and attractive graphics. But a
    sprite is essentially a set of pixels, which means they don’t scale well.


    The Four Balls game that we made in the previous chapter will look fine at any
    resolution since every element is described by one or many "formulae." The circle
    is defined by its center and radius, for example. If you make a circle twice as
    big, it will still look nice—just bigger. The graphics API does its best to draw
    a smooth figure. Sprites are images; if you increase the size of a sprite, the
    graphics API tries to increase every pixel. So when the sprite is twice as big,
    it looks choppy or blurry, depending on your scaling approach. Take a look at
    Figure 4-3 to see what happens with a sprite once you start scaling it.


    ![Figure 4-3](index-131_1.jpg)


    ## Chapter 4: Animation and Sprites


    **Figure 4-3.** Scaling works badly with sprites. The more you scale it, the more
    it looks like a big mess of pixels.


    This means that you have to put in some extra effort if you want to make your
    game look nice on each and every screen resolution and density. The good news
    is that canvas does a reasonably good job with scaling sprites. So if you don’t
    scale them too much, they still look fairly good. The rule of thumb is "avoid
    scaling raster images if you can."


    You have a `PNG` on your server, now we have to load it and draw it!


    # Loading Images


    The first step that you need to take before rendering images is to load them:
    transfer the image bytes from the server or provide them straight in the JavaScript
    code; let the browser parse data; store the image in the internal format; and
    make sure that the result was successful. The description of this process is much
    longer than the actual code that performs all these steps. In this section, we
    learn how to load an image and how to organize the loading process for multiple
    images. We will look at two approaches: loading an image from the file and loading
    an image from the data URL—the string that encodes the pixel data.


    ## Loading Images from Files


    Loading an image in JavaScript is a very simple task. You don’t have to care about
    parsing the image format, networking, or caching: the browser does the hard part
    for you. All you have to do is create an `Image` object and assign the `src` property
    to it. Once you’ve done that, the browser starts to load the image from the server
    or from its cache. Once the image is loaded, the browser notifies the...'
