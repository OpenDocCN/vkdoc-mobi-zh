  trans: "[sophisticated full-blown Web Audio API](https://dvcs.w3.org/hg/audio/raw-file/tip/webaudio/specification.html)\n\
    \n## 音频标签\n\n音频标签是在网页中播放声音的最简单方式。其 API 直观且简洁，如清单 16-1 所示。\n\n**清单 16-1.** *在网页中使用音频元素*\n\
    \n```html\n<head>\n<script>\nvar audio;\n\nfunction init() {\n    audio = new\
    \ Audio(\"sound/theme.mp3\");\n}\n\nfunction play() {\n    audio.play();\n   \
    \ setInterval(function() {\n        audio.volume -= 0.1;\n    }, 200);\n}\n\n\
    function pause() {\n    audio.pause();\n}\n\nfunction changeVolume(deltaVolume)\
    \ {\n    audio.volume += deltaVolume;\n}\n</script>\n</head>\n\n<body onload=\"\
    init()\">\n<div>\n    <button onclick=\"play()\">播放</button>\n    <button onclick=\"\
    pause()\">暂停</button>\n    <button onclick=\"changeVolume(0.2)\">音量+</button>\n\
    \    <button onclick=\"changeVolume(-0.2)\">音量-</button>\n</div>\n</body>\n```\n\
    \n`new Audio(\"sound/theme.mp3\")`这行代码是一个便捷构造函数，用于动态创建音频标签。\n\n清单 16-2 中的代码会产生相同效果。\n\
    \n**清单 16-2.** *通过向页面添加 audio 标签来初始化声音的替代方法*\n\n```html\n<script>\nvar audio;\n\
    \nfunction init() {\n    audio = document.getElementById(\"player\");\n}\n/* 其余代码保持不变\
    \ */\n</script>\n</head>\n\n<body onload=\"init()\">\n<div>\n    <audio id=\"\
    player\" src=\"sound/theme.mp3\"></audio>\n    <button onclick=\"play()\">播放</button>\n\
    \    <button onclick=\"pause()\">暂停</button>\n    <button onclick=\"changeVolume(0.2)\"\
    >音量+</button>\n    <button onclick=\"changeVolume(-0.2)\">音量-</button>\n</div>\n\
    </body>\n```\n\n`audio`标签实现了音频功能的最基本功能：加载文件、播放/暂停音轨、调节播放音量。它也可以在网页上显示简单的播放控件（在游戏中很少需要）。尽管很难想象比这更简单的\
    \ API，但对于休闲游戏来说，这些功能通常已经足够：加载背景音乐、设置音量、循环播放，偶尔为各种游戏事件播放其他音效。\n\n## Web Audio API\n\
    \nWeb Audio API 是面向 Web 的下一代音频处理 API。它不仅允许你播放音频，还能实时处理音频，操控原始音频数据——即波形。为了更好地理解该\
    \ API 的功能，不妨想想我们通过 Canvas API 实现的实时图像处理——面对成千上万的原始像素，我们可以做出真正令人惊叹的事情：动态渲染世界、创建\
    \ 3D 模型、实现闪电和火焰等特效、用\"战争迷雾\"覆盖地图部分区域等等。之所以能够实现这一切，是因为我们可以操控原始像素数据，而不仅仅是静态的预渲染图像。\n\
    \n声音并不比图像简单，有时甚至更加复杂。想象一款 3D 冒险游戏：玩家进入一个房间，看到两个 NPC（非玩家角色）正在互相交谈并与玩家交流。最终产生的声音波形取决于许多不同的参数：\n\
    - 每个 NPC 相对于玩家的位置（离玩家越近，声音越响亮）\n- 玩家面朝的方向（左右声道需要接收不同的声音才能营造真实感）\n- 房间的大小和材质：洞穴中的声音与音乐厅或街道上的声音截然不同\n\
    \n由此可见，为这种复杂场景预渲染声音几乎是不可能的。Web Audio API 允许你获取声音的\"源\"并在播放前对其进行实时处理：混合多个音轨、应用洞穴回声或无线电静电等特效、添加滤波器，最后将处理结果发送到音频设备。\n\
    \n遗憾的是，该 API 目前仅适用于少数桌面浏览器，距离普及到大众市场的 Android 设备仍有相当距离。不过，为了内容的完整性，清单 16-3 提供了示例代码来展示如何实现这一功能。"
- fmt: "# API Works\n\n**Listing 16-3.** Playing Sound with Web Audio API\n\n```javascript\n\
    var context;\nvar buffer;\n\nfunction init() {\n    try {\n        context = new\
    \ webkitAudioContext();\n    } catch(e) {\n        alert('Web Audio API not supported');\n\
    \        return;\n    }\n\n    // Load the binary data from music file\n    var\
    \ request = new XMLHttpRequest();\n    request.open('GET', \"sound/theme.mp3\"\
    , true);\n    request.responseType = 'arraybuffer';\n    request.onload = function()\
    \ {\n        // Decode data and play sound\n        context.decodeAudioData(request.response,\
    \ function(buff) {\n            buffer = buff;\n            var source = context.createBufferSource();\n\
    \            source.buffer = buffer;\n            source.connect(context.destination);\n\
    \            source.noteOn(0);\n        });\n    };\n    request.send(null);\n\
    }\n```\n\n**NOTE:** An audio API doesn’t need a source file. Just as you can draw\
    \ a line on a blank canvas, you can generate sound data on the fly and play it.\
    \ You can create applications such as a “virtual piano” without having a separate\
    \ sound file for each key, or make something even more sophisticated, like “realistic”\
    \ alien speech syntheses based on certain pronunciation parameters.\n\nThe difference\
    \ between the Web Audio API and HTML5 audio tag is roughly the same as the difference\
    \ between the canvas API and the `IMG` tag. The latter gives you a simple way\
    \ to render static media, while the Web Audio API gives you full control over\
    \ the process (at the cost of more complex code, of course).\n\n## Sound in Android\
    \ Browser\n\nSadly, the Android browser has rather poor support for sound APIs.\
    \ The Web Audio API is still cutting-edge technology, and it has yet to make its\
    \ way onto mobile platforms. However, even basic support for the `audio` tag is\
    \ somewhat buggy and limited in Android. The situation with native applications\
    \ is much better, but the standard browser still has a lot of space for improvement.\n\
    \nThe first version of Android to support the `Audio` element was Android 2.2,\
    \ and that 'support' was rather… specific. Even though the element itself was\
    \ recognized by the browser, it couldn’t play any audio files. It looked more\
    \ like a dummy for future expansion. So, real support for audio wasn’t released\
    \ until Android 2.3 Gingerbread. It was still very far from perfect, however.\n\
    \nSpeaking of audio files, the 'support' for playing audio doesn’t automatically\
    \ mean that every possible audio format is recognized by the browser. Just as\
    \ the `IMG` tag can display only a few file formats——PNG, JPEG, GIF, and a couple\
    \ more——the `audio` tag is limited to specific file formats. To make matters slightly\
    \ worse, there is no single opinion on which formats browsers should support.\
    \ Some vendors insist on using open-source and free formats such as OGG, while\
    \ others push closed, proprietary formats like MP3 and h.264. In other words,\
    \ there is no single file format supported by every browser. That’s why the `audio`\
    \ tag allows you to set several alternative files as the audio source. The browser\
    \ chooses the one that it 'knows.'\n\nPre-Gingerbread devices form a massive 23\
    \ percent of the market at the time of writing. Simply dropping the support for\
    \ sound for every fourth customer is not an option, of course. Luckily, there\
    \ is a library that solves most of Android’s sound problems. `SoundManager2` ([www.schillmania.com/projects/soundmanager2/](http://www.schillmania.com/projects/soundmanager2/))\
    \ utilizes a simple approach: if the browser is too silly to play audio, we let\
    \ Flash do the heavy part. Rich out-of-the-box media support was one of the reasons\
    \ why Flash became so popular——Flash Player knows how to deal with playback.\n\
    \n**NOTE:** `SoundManager2` is not an Android-specific solution. Its mission is\
    \ to bring seamless sound capabilities to a broad range of browsers, starting\
    \ with the oldest ones. The idea of using Flash is not entirely new, either. `Socket.IO`,\
    \ the networking API that we used in Chapter 12, also has an option of falling\
    \ to `Flash Sockets`——the Flash-based implementation of the persistent connection\
    \ between the web page and the server."
