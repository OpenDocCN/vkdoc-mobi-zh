    点击事件的坐标或按钮的状态——具体取决于场景和事件类型。


    **图 5-2.** 事件机制解析：发射器将名为“事件”的特殊对象发送给已注册的监听器，这样监听器就能获知重要事件的发生。


    **注意：** 多年来，跨浏览器事件处理一直是令人头疼的问题。各浏览器采用完全不同的处理模型。过去，JavaScript 书籍通常需要专门用一两章来讲解如何通过已知的"hack
    技巧"和变通方案，搭建通往完美跨浏览器事件处理的康庄大道。如今情况已大为改善。


    Download from Wow! eBook <www.wowebook.com>


    首先，市面上有许多高质量库已经实现了完善的事件处理机制。事实上，所有定位为"开发者必备工具集"的严肃库都具备此功能。


    其次，浏览器厂商也终于开始统一标准化进程。


    尽管如此，问题仍未完全解决。即便是本章创建的简单应用程序中，我们仍需实现一个小 hack 来支持移动端 Firefox（第 9 章我们将使用 Firefox
    测试 WebGL）。


    事件对象还包含多个用于控制事件行为的方法（稍后详述）。


    ## 注册事件：DOM 属性


    现在让我们编写代码，看看事件处理的实际运作。清单 5-1 展示了一种事件处理方式。


    **清单 5-1.** 事件处理：传统方式


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <meta name="viewport"

    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,

    user-scalable=no, target-densitydpi=device-dpi"/>

    <style>

    html, body {

    overflow: hidden;

    width: 100%;

    height: 100%;

    margin:0;

    padding:0;

    border: 0;

    }

    </style>

    <script src="js/utils.js"></script>

    <script>

    function init() {

    console.log("document is loaded");

    }

    </script>

    </head>

    <body onload="init()">

    <canvas id="mainCanvas" width="20px" height="20px"></canvas>

    </body>

    </html>

    ```


    等等！这不就是我们从第 2 章开始一直使用的代码吗？！没错！完全脱离事件处理来编写实用 JavaScript 程序几乎不可能——我不得不在正式介绍前就先使用事件，实属汗颜。


    让我们回顾这段代码：我们在 HTML 文档的`body`标签中添加了`onload`参数，其值是一个 JavaScript 代码片段。虽然可以在此放置多个用分号分隔的函数调用，但我们只调用了`init()`函数。这种技术可以（但不应该）用于大多数
    DOM 元素：找到事件名称，在其前面加上`on`，然后输入所需代码：


    ```javascript

    onclick="alert(''bad style'')";

    ```


    为什么说这是不好的编码风格？开发者总是力求结构化与分离。HTML 本质是标记语言，负责描述文档的语义和结构，不应承担其他职责：动态行为（应由 JavaScript
    负责）或样式（应由 CSS 负责）。将事件处理代码直接嵌入 HTML 违反了这一原则，代码会很快变得混乱且难以维护。


    从纯实践角度而言，这种方式的主要局限是无法添加多个事件处理器——DOM 树不允许存在两个同名属性。


    ## 注册事件：事件监听器


    现在我们来学习更好的事件订阅方式，如清单 5-2 所示。


    **清单 5-2.** 正确的事件处理方式


    ```javascript

    var el = document.getElementById("mainCanvas");


    function onCanvasTouchStart(e) {

    console.log("touch");

    }


    el.addEventListener("touchstart", onCanvasTouchStart, false);

    ```


    每个 DOM 元素都具有`addEventListener()`函数，其功能正如其名：将第二个参数传入的函数注册为该 DOM 元素的事件监听器。在清单 5-2
    中，`el`代表 canvas 元素。

