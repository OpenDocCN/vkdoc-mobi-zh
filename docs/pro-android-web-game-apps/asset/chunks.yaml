    每次调用都会将某种颜色与渐变线上的点关联起来。第一个参数是偏移量：0 表示线的起点；1 表示线的终点。在这个例子中，我们添加了三种颜色。渐变以蓝色开始。在线的三分之一处，变为纯绿色，然后以红色结束。渐变线起点之前和终点之后的区域是纯色。在我们的示例中，渐变从
    (10, 10) 开始；点 (5, 5) 是蓝色的，因为它位于起点之前，而点 (70, 80) 是红色的，因为它位于渐变终点之外。


    当渐变准备好后，你需要将其设置为填充或描边：


    ```

    ctx.fillStyle = gradient; // 设置渐变作为填充

    ctx.strokeStyle = gradient; // 设置渐变作为描边

    ```


    如果你亲自尝试这段代码，理解起来会容易得多：颜色渐变在书页上的效果并不好。LED 显示屏能更好地渲染它们。尽管如此，将简单的线性渐变应用到我们棋盘背景上的结果如图
