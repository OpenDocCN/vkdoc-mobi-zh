  raw: 'browser JavaScript engines can’t deal with it out-of-the-box. There’s no regular


    way to load something like an MD2 model from the server and parse it on the


    client-side. XHR (XMLHttpRequest) is expecting to receive text, not a stream of


    bytes.


    **NOTE:** There is support for binary data in XHR Level 2 calls; however, it is
    not yet widely supported by mobile browsers. Read more about it in Chapter 11\.
    If you are


    unfamiliar with XHR, you might want to read Chapter 11, and then return to this


    section afterward.


    There is an ugly hack that developers often use to overcome this limitation. Take


    a look at the code in Listing 9-23.


    **Listing 9-23.** *Receiving the Unchanged Binary Data with Ajax Call*


    var req = new XMLHttpRequest();


    req.open(''GET'', "models/marine.md2", false);


    // Override Mime, such charset will prevent browser from messing with bytes


    req.overrideMimeType(''text/plain; charset=x-user-defined'');


    req.send(null);


    var data = req.responseText;


    This charset prevents the browser from treating the response as plain text and


    converting it to a regular JavaScript string. Next, it is not hard to get the
    byte


    data out of such a string:


    var byteValue = data.charCodeAt(offset) & 0xff;


    The last part of this line strips garbage out of the character code to leave only


    the original number as received from the server. Some numbers might have


    more than one byte; for example, the two-byte integer (usually called a ‘‘short’’)


    CHAPTER 9: Using WebGL


    or four-byte float. To read such numbers, you simply combine bytes with binary


    shift operations, as shown in Listing 9-24.


    **Listing 9-24.** *Reading Numbers That Have More Than One Byte*


    var b0 = buf.charCodeAt(off) & 0xff;


    var b1 = buf.charCodeAt(off+1) & 0xff;


    var short = b0 + (b1 << 8);


    There are several small libraries that can handle all the dirty byte-swapping
    work


    for you. The one that I used for my MD2 converter is BinaryFile.js by Brandon


    Jones. BinaryFile takes the Ajax response as the input and hides the details of


    the calculations. Your client code looks like the code in Listing 9-25.


    **Listing 9-25.** *Reading Binary Data with BinaryFile.js*


    for (var i = 0; i < model.header.num_tris; i++) {


    vert.push([bf.readShort(), bf.readShort(), bf.readShort()]);


    tex.push([bf.readFloat(), bf.readFloat(), bf.readFloat()]);


    }


    Using this technique, you can request the model from the server, take the


    specification of the format, and read the model information byte-by-byte.


    The result: you can use custom binary models in your WebGL applications and


    save some network traffic at the expense of a slightly longer loading time. The


    time to load several megabytes over mobile internet is, however, usually more


    than the time required to process the model.


    **Summary**


    In this chapter, we learned how to create WebGL applications. WebGL is a very


    powerful tool that allows you to bring real accelerated (where possible) 3D on


    web pages.


    WebGL is a rather low-level and complex API. It requires a good understanding


    of 3D mechanics and the mathematical principles of 3D visualization. Another


    point of complexity is that to create a WebGL page, you need to write two


    programs in GLSL language called shaders. The language of shaders has a C-


    like syntax and is math-oriented (there are no functions to work with strings
    or


    user input, but there are many functions to work with vectors and matrices).


    WebGL is still not widespread on mobile devices, so this chapter gives only a


    very brief introduction to the subject. There are still a lot of topics to master
    to make full-blown WebGL applications with animation, lights, materials, physics


    CHAPTER 9: Using WebGL


    **395


    simulations, environmental effects like fog or rain, and the many other


    possibilities available with this rich API.


    In this chapter, we learned how to initialize WebGL, load the basic geometry,


    write shaders, use color and textures, and work with models and binary data.


    Since WebGL has a steep learning curve, the most important advice is to get


    started and make your first demo work. After you are comfortable with the basic


    principles, the other topics become much easier to understand.


    There are several higher-level 3D engines that simplify typical tasks like loading


    models, adding lights, adding textures, and so forth.


    WebGL is a vast topic to explore. If you would like to learn more about this API,


    you will find the following websites useful:


     [http://learningwebgl.com: Collections](http://learningwebgl.com:) of WebGL
    lessons and tutorials, along with WebGL news and links to cool


    experiments.


     [www.khronos.org: Th](http://www.khronos.org:)e official website of Khronos
    Group.


     [http://mrdoob.github.com/three.js: Th](http://mrdoob.github.com/three.js:)e
    home page of Three.js, the WebGL-based 3D engine with many advanced


    features.


    Chapter10


    **Going Server-Side**


    Do you want to know if your friend is a lucky game developer? Ask him what his


    favorite programming language or platform is. Java fans are lucky: they can


    create their masterpieces using only the tool and language that they know----


    Java. They don’t need to learn something beyond it to start working over the


    game. PHP developers have a little bit less luck----their favorite language is


    intended only for server scripting, so they need to learn something else in order


    to make a shiny game client. They also have an option to pair with an


    ActionScript developer who has the opposite problem: they can’t write efficient


    server code with their favorite tool.


    Until recently, JavaScript developers were completely out of luck----not only
    did


    they have to learn the server-side languages in order to build even the simplest


    network game, but they also had to deal with the different implementations of


    DOM engines in browsers. The learning curve and the amount of workarounds


    that one had to implement in a production-quality product were daunting.


    That was the dark age of JavaScript game development. Now it is gone and


    JavaScript developers are the luckiest guys in town. First, when canvas


    appeared, we got rid of most of the problems that were caused by the DOM


    bugs in browsers. It turns out that a line drawn in canvas inside IE looks the


    same in Chrome and Firefox. Moreover, we can now write the server code in our


    favorite language thanks to Ryan Dahl, the creator of Node.js-----the tool that
    has


    completely changed the way of thinking about JavaScript.


    In this chapter, we will learn how to efficiently use Node.js to create full-blown


    server-side support for our applications. There are a lot of cases when you need


    networking. Even the smallest game feature that involves sharing data with the


    world requires networking: a high score board or a simple in-game chat is a


    good example of a JavaScript application that requires something beyond


    canvas.


    CHAPTER 10: Going Server-Side


    We will write a minimum amount of client-side JavaScript in this chapter; it is


    fully devoted to server development. Also, the material in it is obviously not


    limited to smartphones or tablets. You can use this knowledge for regular


    desktop web sites and applications too.


    In this chapter, we will learn the following:


     How to install Node.js, and write and debug simple scripts that


    can be executed in server environment


     How the Node.js program is organized


     How to use NPM to discover and install Node.js modules


     How to build a simple server for the Four Balls game with the


    Express framework


    **NOTE:** In this chapter, I use the word “Node” for Node.js, and for convenience,
    I sometimes refer to the JavaScript files written specifically for Node.js as
    “node


    scripts.” Also, sometimes I use such phrasing as “reading the file with Node.js,”


    meaning “reading the file with JavaScript that runs on Node.js.”'
  trans: "\n浏览器 JavaScript 引擎无法直接处理这类数据。目前还没有常规的方法可以从服务器加载类似 MD2 模型的数据并在客户端进行解析。`XHR（XMLHttpRequest）`\
    \ 期望接收的是文本，而非字节流。\n\n**注意：** XHR Level 2 调用支持二进制数据，但移动端浏览器尚未广泛支持。更多信息请参阅第 11 章。如果您不熟悉\
    \ `XHR`，建议先阅读第 11 章，然后再回到本节。\n\n开发者经常使用一种笨拙的变通方法来克服这个限制。请查看代码清单 9-23。\n\n**代码清单\
    \ 9-23.** *通过 Ajax 调用接收未修改的二进制数据*\n```javascript\nvar req = new XMLHttpRequest();\n\
    req.open('GET', \"models/marine.md2\", false);\n// 覆盖 MIME 类型，此类字符集将阻止浏览器干扰字节\n\
    req.overrideMimeType('text/plain; charset=x-user-defined');\nreq.send(null);\n\
    var data = req.responseText;\n```\n这个字符集阻止了浏览器将响应视为纯文本并转换为常规 JavaScript 字符串。接下来，从这个字符串中提取字节数据并不困难：\n\
    ```javascript\nvar byteValue = data.charCodeAt(offset) & 0xff;\n```\n这行代码的最后部分从字符编码中剥离了多余信息，仅保留从服务器接收的原始数字。某些数字可能包含多个字节；例如，两字节整数（通常称为“short”）或四字节浮点数。要读取此类数字，只需像代码清单\
    \ 9-24 所示的那样，通过二进制移位操作组合字节即可。\n\n**代码清单 9-24.** *读取包含多个字节的数字*\n```javascript\n\
    var b0 = buf.charCodeAt(off) & 0xff;\nvar b1 = buf.charCodeAt(off+1) & 0xff;\n\
    var short = b0 + (b1 << 8);\n```\n有几个小型库可以为您处理所有繁琐的字节交换工作。我在 MD2 转换器中使用的库是 Brandon\
    \ Jones 的 `BinaryFile.js`。`BinaryFile` 将 Ajax 响应作为输入，并隐藏了计算的细节。您的客户端代码类似于代码清单\
    \ 9-25。\n\n**代码清单 9-25.** *使用 BinaryFile.js 读取二进制数据*\n```javascript\nfor (var\
    \ i = 0; i < model.header.num_tris; i++) {\n  vert.push([bf.readShort(), bf.readShort(),\
    \ bf.readShort()]);\n  tex.push([bf.readFloat(), bf.readFloat(), bf.readFloat()]);\n\
    }\n```\n使用这种技术，您可以向服务器请求模型，获取格式规范，并逐字节读取模型信息。\n\n最终结果是：您可以在 WebGL 应用程序中使用自定义的二进制模型，并通过稍长的加载时间换取网络流量的节省。然而，通过移动网络加载数兆字节所花费的时间通常比处理模型所需的时间要多。\n\
    \n**总结**\n\n在本章中，我们学习了如何创建 WebGL 应用程序。WebGL 是一个非常强大的工具，它允许您在网页上实现真正的（在可能的情况下）加速\
    \ 3D 图形。\n\nWebGL 是一个相对底层且复杂的 API。它需要对 3D 机制和 3D 可视化的数学原理有深入的理解。另一个复杂之处在于，要创建\
    \ WebGL 页面，您需要用 GLSL 语言编写两个称为着色器的程序。着色器的语言具有类似 C 的语法，并且是面向数学的（没有用于处理字符串或用户输入的函数，但有许多用于处理向量和矩阵的函数）。\n\
    \nWebGL 在移动设备上仍然不普及，因此本章仅对这个主题进行了非常简要的介绍。要制作包含动画、光照、材质、物理模拟、环境效果（如雾或雨）以及这个丰富 API\
    \ 提供的众多其他可能性的完整 WebGL 应用程序，还有很多主题需要掌握。\n\n在本章中，我们学习了如何初始化 WebGL、加载基本几何体、编写着色器、使用颜色和纹理、以及处理模型和二进制数据。由于\
    \ WebGL 学习曲线陡峭，最重要的建议是开始动手并让您的第一个演示程序运行起来。在您熟悉了基本原理之后，其他主题就会变得容易理解得多。\n\n有几个更高级的\
    \ 3D 引擎可以简化常见任务，例如加载模型、添加光照、添加纹理等。\n\nWebGL 是一个广阔的话题。如果您想了解更多关于这个 API 的信息，以下网站将会非常有用：\n\
    \n*   [`learningwebgl.com`](http://learningwebgl.com): WebGL 课程和教程的集合，以及 WebGL\
    \ 新闻和精彩实验的链接。\n*   [www.khronos.org](http://www.khronos.org): Khronos Group 的官方网站。\n\
    *   [`mrdoob.github.com/three.js`](http://mrdoob.github.com/three.js): Three.js\
    \ 的主页，这是一个基于 WebGL 的 3D 引擎，具有许多高级功能。\n\n# 第 10 章 走向服务器端\n\n你想知道你的朋友是不是一个幸运的游戏开发者吗？问问他最喜欢的编程语言或平台是什么。Java\
    \ 爱好者很幸运：他们可以仅使用他们熟知的语言和工具（即 Java）来创作他们的杰作。他们不需要学习额外的知识就可以开始游戏开发工作。PHP 开发者的运气则稍差一些——他们喜欢的语言仅用于服务器端脚本，因此他们需要学习其他东西才能制作出出色的游戏客户端。他们也可以选择与\
    \ ActionScript 开发者合作，而后者则面临相反的问题：无法用他们喜欢的工具编写高效的服务器代码。\n\n直到最近，JavaScript 开发者还完全不走运——他们不仅要学习服务器端语言来构建哪怕是最简单的网络游戏，还要处理浏览器中\
    \ DOM 引擎的不同实现。要在生产级产品中实现各项功能，所需的学习曲线和需要实施的变通方案数量令人望而生畏。\n\n那是 JavaScript 游戏开发的黑暗时代。如今，那个时代已经过去，JavaScript\
    \ 开发者成了最幸运的人。首先，当 canvas 出现后，我们摆脱了大多数由浏览器 DOM 错误引起的问题。事实证明，在 canvas 中绘制的一条线，在\
    \ IE、Chrome 和 Firefox 中的显示效果相同。此外，我们现在可以用我们最喜欢的语言编写服务器代码，这要归功于 Ryan Dahl，Node.js\
    \ 的创造者——这个工具彻底改变了人们对 JavaScript 的思考方式。\n\n在本章中，我们将学习如何高效地使用 Node.js 为我们的应用程序创建全面的服务器端支持。有很多情况都需要网络功能。即使是涉及与世界共享数据的最小的游戏功能也需要网络：高分榜或简单的游戏内聊天就是一个很好的例子，它说明了一个\
    \ JavaScript 应用程序需要超越 canvas 的功能。\n\n在本章中，我们将编写最少的客户端 JavaScript；本章完全致力于服务器开发。此外，其中的内容显然不限于智能手机或平板电脑。您也可以将这些知识用于普通的桌面网站和应用程序。\n\
    \n在本章中，我们将学习以下内容：\n\n*   如何安装 Node.js，以及如何编写和调试可以在服务器环境中执行的简单脚本\n*   Node.js 程序是如何组织的\n\
    *   如何使用 NPM 发现和安装 Node.js 模块\n*   如何使用 Express 框架为“四个球”游戏构建一个简单的服务器\n\n**注意：**\
    \ 在本章中，我将用“Node”指代 Node.js，为方便起见，我有时会将专门为 Node.js 编写的 JavaScript 文件称为“Node 脚本”。另外，我有时会使用“用\
    \ Node.js 读取文件”这样的表述，意思是指“用运行在 Node.js 上的 JavaScript 读取文件”。\n"
- fmt: "# A Word of Caution\n\nBefore we start, a note: Node.js is a fast-evolving\
    \ software, and so are the open-source libraries built for it. They improve every\
    \ day to bring better, more friendly, and more efficient software to developers.\
    \ APIs change very fast. In the time that passed between the initial draft of\
    \ this chapter and its final version, several parts of the frameworks described\
    \ here have changed. The e-mail-sending framework was deprecated in favor of a\
    \ more powerful one, and the installation procedure of Node itself became way\
    \ simpler.\n\nMost of the code in this chapter should work just fine; however,\
    \ if something is not working straight away for you, visit the online documentation\
    \ of the library that doesn’t work in the way you want it to. Also, you might\
    \ want to visit the author’s [page from time to time](http://juriy.com) to look\
    \ for updates there, as well as the source code hosted on the Apress site. I will\
    \ try to keep the code as up-to-date as possible and list all the changes that\
    \ you need to implement to make your code work with the latest versions of libraries.\n\
    \n# Chapter 10: Going Server-Side\n\n## Node.js Basics\n\nThe idea behind Node.js\
    \ ([http://nodejs.org](http://nodejs.org)) is to bring the awesomeness of JavaScript\
    \ to the server. As I mentioned already, Node.js is a tool that allows you, as\
    \ a web developer, to write code in a language that is familiar to you. But of\
    \ course, that’s not the only reason that makes Node.js a good choice for online\
    \ gaming needs. In this section, we cover the basics of Node.js. We start with\
    \ looking at the Hello World program, and then install Node and get ready to write\
    \ our own scripts.\n\n### Introducing Node.js\n\nBefore diving into the internals\
    \ of Node.js, let’s look at what it really is and how you work with it. Essentially,\
    \ Node.js is a small command-line tool that can run code written in JavaScript.\
    \ To do so, it uses an extremely efficient JavaScript engine — V8 ([http://code.google.com/p/v8/](http://code.google.com/p/v8/)),\
    \ but instead of working in the browser, it works directly with the operating\
    \ system, exposing its resources to the programmer. No more moving divs and changing\
    \ the backgrounds of buttons. With Node.js, you can do everything that you can\
    \ do with a regular desktop programming language: open and read files, use sockets,\
    \ build HTTP servers, download images, parse XML, stream sound — whatever you\
    \ want.\n\nNode.js is definitely not a web server. It works more like a JavaScript-driven\
    \ virtual machine that has HTTP as the first-class protocol — meaning that it\
    \ comes out of the box and is fully supported by Node.js. You can write a web\
    \ server in Node.js if you want, but it doesn’t mean that you have to. You could\
    \ also write a tool that finds duplicated photos in your media library and doesn’t\
    \ have a single networking-related instruction. Still, in the vast majority of\
    \ cases, you use Node for processing network requests (either HTTP or TCP/IP)\
    \ since this is where it shows its full potential.\n\nIf you’re like me, you’re\
    \ eager to see how the code looks, so here it is. The famous Hello World written\
    \ for Node.js:\n\n```\nconsole.log(\"Hello World\");\n```\n\nHey, what did you\
    \ expect? It’s supposed to be simple! I know that you’re not excited about this\
    \ example, but I didn’t want to break the old-school Hello World traditions. We\
    \ will learn how to run this script in a minute.\n\nIn Listing 10-1, let’s look\
    \ at something more complex: writing a web server that returns data to the user.\n\
    \n**Listing 10-1.** *Slightly More Advanced Example of Node.js Script*\n\n```\n\
    var http = require('http');\n\nhttp.createServer(function (req, res) {\n  res.writeHead(200,\
    \ {'Content-Type': 'text/plain'});\n  res.end('Hello World\\n');\n}).listen(1337,\
    \ \"127.0.0.1\");\n```\n\nDon’t worry if you don’t fully understand this code;\
    \ we have the rest of the chapter to make it familiar. The main point you should\
    \ notice is that this is regular JavaScript code, and if you think about it for\
    \ a second, you can..."
