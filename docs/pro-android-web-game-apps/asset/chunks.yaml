  trans: "\n# 添加声音\n\n即使在相当老旧的浏览器上也能实现。\n\n我们学习了如何播放单个音效和循环音效，如何处理有损音频格式的问题，以及如何实现无缝循环播放。还了解了\
    \ Apache Cordova 的声音功能，以便为原生应用添加音效。\n\n我们为《逃离骑士》——即第 14 章用 Crafty 引擎创建的游戏——添加了声音功能。使用了三种音效：一个背景循环音效、一个“点击”音效，以及一个“游戏结束”音效。\n\
    \n## 进一步探索\n\n本书中，我们学习了 Android 网页游戏开发的基础技术。现在，你已经清楚地了解如何从零开始制作自己的 Android 网页游戏：2D\
    \ 或 3D、单人或多人在线、带声音、动画和 AI 功能。但游戏开发远不止于此。\n\n移动娱乐世界是一个发展极其迅速的世界。即便是几年前听起来还很神奇的东西，如今已成为现实：GPS、3D\
    \ 图形、富媒体、网络、语音识别、增强现实——所有这些都融合在崭新智能手机闪亮的屏幕之下。无限的可能性为你打开了大门，等你探索那些根本不同的游戏。\n\n\
    未来令人兴奋，随时准备好接纳你最疯狂的想法。\n\n# 附录 A：调试客户端 JavaScript\n\n我曾有位朋友告诉我：“在 Android 上调试\
    \ JavaScript 代码就像用勺子砍柴。”默认情况下，Android 浏览器没有任何调试器。我们无法实现典型的调试场景：设置断点、添加监视变量，然后以“逐步”模式执行，直到在代码中找到问题所在。因此，我们唯一能用的就是\
    \ `console.log`——将一些值写入设备日志，然后再读取。\n\n不过，仍然有好几种工具和技巧，希望能让你的调试体验——即便谈不上愉快——至少变得稍微轻松一些。\n\
    \n本附录将专门介绍这些调试工具。调试是开发过程中最重要的环节。代码中的错误是不可避免的，而我们能做的，就是尽量快速、省力地修复它们。\n\n好消息是，你通常可以在常规浏览器中完成\
    \ 90% 的工作，只在设备上进行最后 10% 的打磨。通常，如果你在智能手机上发现了一个 bug，在桌面浏览器中也存在完全相同的 bug，而桌面浏览器拥有大量非常好用的工具来定位并修复问题。\n\
    \nAndroid 的默认浏览器基于 WebKit。显然，你用于早期测试和调试的主要桌面浏览器也应该来自同一家族。最流行的基于 WebKit 的浏览器是 Safari\
    \ 和 Google Chrome。两者都拥有强大的“开发者工具”。如果你已经习惯在其中一种浏览器中进行调试，那么切换到另一种浏览器时也能轻松上手。\n\n\
    在本附录中，我们将学习如何执行以下操作：\n\n- 使用桌面浏览器调试常见问题\n- 使用 Android 提供的默认工具\n- 使用 weinre 简化部分调试任务\n\
    \n## 调试示例\n\n在本附录中，我们采用基于实操示例的方法。让我们尝试为我们的网页进行最简单的调试过程。我们需要一些 JavaScript 代码来操作（参见代码清单\
    \ A-1）。\n\n### 代码清单 A-1. 存在 Bug 的 JavaScript 代码示例\n\n```html\n<!DOCTYPE html>\n\
    <html lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n<script>\nfunction getMax(a,\
    \ b) {\n    if (a > b)\n        return a;\n    if (b > a)\n        return b;\n\
    }\n\nfunction init() {\n    writeToDiv(getMax(1, 2));\n    writeToDiv(getMax(4,\
    \ 1));\n    writeToDiv(getMax(1, 1));\n}\n</script>\n```\n"
- fmt: "```html\nfunction writeToDiv(value) {\n    document.getElementById(\"result\"\
    ).innerHTML += value + \"<br/>\";\n}\n</script>\n</head>\n<body onload=\"init()\"\
    >\n<div id=\"result\"></div>\n</body>\n</html>\n```\n\nThe main function — `getMax()`\
    \ from Listing A-1 — is meant to return the larger of two numbers. Given numerical\
    \ input, it should always return a number. Copy the listing into a new HTML file\
    \ and load it into the browser: use either `nginx` (described in Chapter 1) or\
    \ `Node.js` (described in Chapter 10) to serve the page to the browser. The following\
    \ output is not quite as we expected:\n\n```\n2\n4\nundefined\n```\n\nInstead\
    \ of three numbers, the page is showing two, and then the ugly `undefined`. Obviously,\
    \ the function has a bug! Time to fight it.\n\n## Debugging in a Desktop Browser\n\
    \nThe first thing to do when you encounter a bug is to check if it can be reproduced\
    \ in the desktop browser. If it does, then you can use the full set of development\
    \ instruments to find and fix the problematic line.\n\nOpen Google Chrome and\
    \ load the page. Then press `F12` to open the Developer Tools window. Welcome\
    \ to your ultimate debugging tool. Click the **Scripts** button in the top row.\
    \ Now you should see the code for the buggy page that we just created. If the\
    \ code doesn’t show up immediately, you might need to select the correct file\
    \ with the script from the drop-down list, as shown on Figure A-1.\n\n**Figure\
    \ A-1.** *The Scripts tab with the page code and a drop-down with a list of the\
    \ loaded files*\n\nThe idea behind debugging JavaScript is the same as for every\
    \ other language: to locate the code that looks suspicious, to put the breakpoint\
    \ at the start of the code fragment, and then execute the script line-by-line,\
    \ making sure that variables have the correct values in each step.\n\nThere’s\
    \ the panel with the line numbers to the left from the window with the code. Find\
    \ the first instruction in `getMax()` function: `if (a > b)` and click the corresponding\
    \ line on the left panel (line number 7 in Figure A-1). You should now see the\
    \ small blue arrow that indicates the breakpoint. Now reload the page. The line\
    \ that you just marked is highlighted with a blue background (see Figure A-2).\
    \ The execution is stopped and you can examine the state of the script.\n\n**Figure\
    \ A-2.** *Debugging JavaScript in Google Chrome*\n\nThe panel to the right in\
    \ Figure A-2 is what helps you to examine it. For example, the call stack allows\
    \ you to examine the stack of functions that are currently executing. Look at\
    \ it: the first function was `onload`, which is the event handler, and then `onload`\
    \ called something called **\"anonymous function\"** — it is our code in the `onload`\
    \ parameter of the body tag: `onload=\"init()\"`. In turn, it called the `init()`\
    \ function and then execution passed to the `getMax()`. This function will be\
    \ called three times from the `init()`, each result is appended below the previous\
    \ ones. As you see, the problematic call is the last one with `(1, 1)` passed\
    \ as parameters.\n\nNext, examine the **Scope Variables** section: a set of variables\
    \ that are currently reachable from the current line of code. When you need to\
    \ trace the result of an expression, you open the **Watch Expressions** block,\
    \ click the small plus sign, and type the expression to evaluate. For example,\
    \ if you type `Math.max(a, b)`, you will see what we expect from our custom function\
    \ (see Figure A-3). If variables are not accessible in the current scope, you\
    \ will see `ReferenceError` instead of the expression result.\n\n**Figure A-3.**\
    \ *A closer look at the Scripts tab right panel, which allows you to inspect the\
    \ current execution state and manage breakpoints*\n\nPress `F10` to go to the\
    \ next instruction and press `F11` to **\"step into\"** the function. Walk through\
    \ the code step-by-step until you reach the broken code — in this case, the third\
    \ call: `writeToDiv(getMax(1, 1))`. Looks like everything is breaking up when\
    \ the parameters are equal. That’s right, the `if` checks do not pass, and the\
    \ `return` statement is not called at all: that’s why we have the `undefined`\
    \ value. Well, now that you know where the problem is — you can easily fix it!\n\
    \n**NOTE:** This is another example of a typical dynamic language problem. In\
    \ JavaScript, the same function can return values of different types: strings,\
    \ numbers, objects, or `undefined`. A static language would check for the return\
    \ type of the function at the time of compilation, and an error like this would\
    \ never make it to production. In JavaScript, this code is perfectly valid.\n\n\
    That’s easy, right? Maybe even too easy. This bug can be traced by reading four\
    \ lines of the code without a debugger. But that’s not always the case. Sometimes\
    \ you need much more to debug the function that just doesn’t want to work the\
    \ way it should. Chrome’s debugger can do much more. The detailed debugging tutorial\
    \ is outside the scope of this book, but you can find more information about Chrome\
    \ Developer Tools at `http://code.google.com/chrome/devtools/docs/overview.html`.\n\
    \n## Debugging on a Mobile Device\n\nNow let’s consider the worst-case scenario:\
    \ you have to debug the code on the device (or emulator). The only real option\
    \ that you have is writing to the console and reading the logs afterward. This\
    \ is a cumbersome and ineffective technique, but unfortunately the only one that\
    \ we have when a desktop browser is not an option.\n\nIf you are going to debug\
    \ with the emulator, run it and open the page. If you’re working with a real device,\
    \ you will first have to enable USB debugging; otherwise, you will not access\
    \ device logs. Go to **Settings ➤ Applications ➤ Development** and make sure that\
    \ **USB Debugging** is active. Afterward, connect your smartphone or tablet to\
    \ your PC with the cable, and proceed.\n\nOpen the command line and type the following:\n\
    \n```\n> adb logcat -v raw browser:I *:S\n```\n\nThis shows the logs of the device\
    \ (or the emulator) in real time, filtering them to display only the messages\
    \ that you’re actually interested in; in this case, the console output from the\
    \ browser.\n\n**NOTE:** You don’t believe in magic and want a better explanation\
    \ of how this all works? Okay, `adb` (Android Device Bridge) is the tool that\
    \ you use to communicate with your Android device or emulator from your PC. With\
    \ this tool, you can issue commands directly to the device or use the device’s\
    \ services. Besides examining logs, you can install or uninstall programs, reboot\
    \ devices, or even access the shell of your Android device.\n\nThe command that\
    \ we just issued (`logcat`) is used to view logs. The second parameter, `-v raw`,\
    \ tells `logcat` to omit the extra logging information like the id of the process\
    \ that is writing to the log, or the log level. The last parameter is the filter.\
    \ By default, `logcat` is extremely verbose: each and every Android component\
    \ tends to write logs about anything interesting that is happening around. Without\
    \ a filter, `logcat` is almost useless. Try to run it without the last parameter\
    \ to see it yourself."
