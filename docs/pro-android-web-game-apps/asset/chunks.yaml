    The InputHandlerBase class defines the common flow for the API. When the


    user starts the interaction (doesn’t matter how exactly, either clicking the mouse


    CHAPTER 5: Event Handling and User Input


    or touching the interface) the down event is fired. While the user is holding
    the


    controller, the class ignores all move actions that fall inside the threshold
    radius, since most likely these actions are not intentional. If the user reaches
    the


    threshold, the action is qualified as ‘‘movement’’ and InputHandler starts to
    fire


    move events. Finally, when the user ends his interaction, the up event is fired.


    As you see, the custom events that we use do not expose any unnecessary


    platform details. Moreover, the class supports a little bit of extra functionality:


    _moveThreshold and tracking deltas for move events.


    Given this common base, the implementation of concrete handlers is not hard at


    all. Let’s start with the MouseInputHandler. The only way it is different from
    the


    default behavior is that you have to track whether the button is pressed before


    firing move events (we will ignore mouse movements without the pressed button


    since there is no direct analog in a touch interface).


    Creating MouseInputHandler


    Start with the constructor. The MouseInputHandler should use the custom


    listeners that we just build to keep track of browser events. The code is shown


    in Listing 5-19.


    **Listing 5-19.** *Initializing MouseInputHandler: Custom Listeners Keep Track
    of Mouse Events*


    /**


    * The implementation of the InputHandler for the desktop


    * browser based on the mouse events.


    */


    function MouseInputHandler(element) {


    InputHandlerBase.call(this, element);


    this._attachDomListeners();


    }


    extend(MouseInputHandler, InputHandlerBase);


    _p = MouseInputHandler.prototype;


    /**


    * Attach the listeners to the mouseXXX DOM events


    */


    _p._attachDomListeners = function() {


    var el = this._element;


    el.addEventListener("mousedown", this._onDownDomEvent.bind(this), false);


    el.addEventListener("mouseup", this._onUpDomEvent.bind(this), false);


    el.addEventListener("mousemove", this._onMoveDomEvent.bind(this));


    };


    CHAPTER 5: Event Handling and User Input


    **201


    Now the MouseInputHandler can be used; it transforms every mouse event into


    the custom form. But it doesn’t work quite right. It fires the move event for
    every


    mouse movement, no matter if the button is pressed or not. We agreed that


    mouse fires move events only when the button is down, because the touchmove


    in Android is most closely represented by the drag action in a mouse interface.


    Start by adding the flag that tracks the button state to the constructor (see


    Listing 5-20).


    **Listing 5-20.** *Adding the Flag to Track the Button State*


    function MouseInputHandler(element) {


    InputHandlerBase.call(this, element);


    // We need additional property to track if the


    // mouse is down.


    this._mouseDown = false;


    this._attachDomListeners();


    }


    Now override all event listeners, as shown in Listing 5-21. _onDownDomEvent()


    sets the _mouseDown flag to true, _onUpDomEvent() sets the flag to false, and


    _onMoveDomEvent() checks the flag before firing event.


    **Listing 5-21.** *Tracking the Mouse Button State and Firing the move Event Only
    When the Button Is* *Pressed*


    /**


    * This method (and the next one) is overridden,


    * because we have to track the state of the mouse.


    * This could also be done in the separate listener.


    */


    _p._onDownDomEvent = function(e) {


    this._mouseDown = true;


    InputHandlerBase.prototype._onDownDomEvent.call(this, e);


    };


    _p._onUpDomEvent = function(e) {


    this._mouseDown = false;


    InputHandlerBase.prototype._onUpDomEvent.call(this, e);


    };


    /**


    * We process the move event only if the mouse button is


    * pressed, otherwise the DOM event is ignored.


    */


    _p._onMoveDomEvent = function(e) {


    if (this._mouseDown) {


    InputHandlerBase.prototype._onMoveDomEvent.call(this, e);


    }


    };


