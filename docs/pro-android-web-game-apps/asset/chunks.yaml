    ## Curves


    Besides the straight lines and arcs, the 2D context supports two other complex
    types of paths: quadratic curves and Bézier curves. The math behind them is somewhat
    more complex than the math for drawing a rectangle or circle, but I’ll try to
    explain it without going too deep into the details.


    Both types of curves use the ‘control points’ to set the shape of the curve. The
    first and the last control points are the anchors. They are the start and the
    end of the curve itself. Other control points don’t belong to the curve, they
    rather act like magnets that can twist and twirl it. Quadratic curves use three
    control points, whereas Bézier curves use four. Let’s start with quadratic curves.
    Once you get the idea, the mechanics behind the Bézier curve will be obvious.
    The API to draw a curve is very simple, just one line of the code:


    `ctx.bezierCurveTo(0, 100, 60, 200, 30, 300);`


    To use it wisely, we’ll first take a step into the math.


    ### Quadratic Curves


    The curve is painted point-by-point. The position of each point of the curve is
    defined by the position of control points. Let’s say we want to draw five points
    that belong to the curve; the first point is the start of the curve, the last
    point is the end of the curve, and the other three are points in the middle. Let’s
    use the parameter `t` to refer to the points of the curve. It will “move” from
    0 to 1 as the curve is drawn from the start to the end. `t` will be 0 for the
    first point, 0.25 for the second point, 0.50 for the third point, 0.75 for the
    fourth, and 1 for the last. Now we build a curve.


    First, we have the control points: A, B, and C. The initial setup is shown in
    image 1 of Figure 2-14.


    **Figure 2-14.** *The math behind the curves*


    The start of the curve (when `t` is 0) is the point A. Now let’s deal with the
    second point (`t = 0.25`). Measure one quarter (0.25) of the AB segment and one
    quarter of the BC segment, and then draw the line between these two points, as
    shown on image 2. Now we have a dotted ‘supporting line.’ Take one quarter of
    this new line and you’ll have the point of a curve! Image 3 shows this point marked
    with a small cross.


    Repeat these steps for the third point. The value of `t` is 0.5 (which is ½),
    so instead of taking the quarters of segments, you have to measure the halves.
    Draw the supporting dotted line between the middle of AB and the middle of BC.
    Find the middle of the dotted line; this is the third point. The result is shown
    in image 4 of Figure 2-14.


    One more step for the fourth point, (`t = 0.75`), and the final point is point
    C (see Figure 2-15). Now you have five points to build a curve! Join them with
    the smooth curve, as shown on Figure 2-15, and the quadratic curve is ready.


    **Figure 2-15.** *The quadratic curve built point-by-point*


    This mechanism is very powerful. With only three control points at your disposal,
    you can build a curve that best suits your needs! Figure 2-16 shows more examples
    of quadratic curves.


    **Figure 2-16.** *More quadratic curves*


    ### Bézier Curves


    Bézier curves work the same way as quadratic curves, except that they use four
    control points instead of three and they need three supporting lines instead of
    one.


    **NOTE:** Actually, both quadratic and Bézier curves in `Context2D` API *are*
    Bézier curves from a mathematical point of view. It would be more intuitive if
    they were called “cubic” curves since Bézier curves can be of any order. There
    are fourth and fifth order Bézier curves too, but they are not supported by the
    canvas API.


    Look at the example of a Bézier curve in Figure 2-17. To find the position of
    the point, you first need to build a helper segment between AB and BC, then between
    BC and CD. The algorithm of building these segments is absolutely the'
