    Updating Your Application


    Once your application gets popular, you probably want to update it with some


    new features to attract even more users. The final section of this chapter is


    devoted to pushing the updates to Google Play store. Let’s look at a simple


    scenario: you decided that a white background doesn’t look good on a device


    and you want to change it to black. You fixed a line of JavaScript code in a


    minute, and now you are eager to publish a new version. Before you create a


    new signed build, open the AndroidManifest.xml file once again and update the


    bolded lines in Listing 15-11.


    **Listing 15-11.** *Updating the Application Version in Android Manifest*


    <?xml version="1.0" encoding="utf-8"?>


    [<manifest](http://schemas.android.com/apk/res/android)


    package="com.juriy.fourballs"


    android:versionCode="2"


    android:versionName="1.0.1">


    …


    The versionCode parameter must be an integer and is required for the market to


    compare between the version that is installed on the user’s device and the


    newest available version on the market. The second parameter, versionName, is


    what the user the sees. Save the file and rebuild the application.


    Once it is packed and signed, open the Google Play store developer’s console,


