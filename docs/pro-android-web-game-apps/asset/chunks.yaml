    a few


    lines of code. Listing 10-7 shows how to isolate two APIs from each other.


    **Listing 10-7.** *Isolating API from the Global Scope*


    <script>


    // The class defined in old String API


    var oldApi = (function () {


    function Utils() {


    }


    Utils.prototype.add = function(x, y) {


    return x + "" + y;


    };


    return Utils;


    })();


    // The class defined in new String API


    var newApi = (function () {


    function Utils() {


    }


    Utils.prototype.add = function(x, y) {


    return x + "!THIS IS COOL TO JOIN STRINGS!" + y;


    };


    return Utils;


    })();


    console.log(new oldApi().add("foo", "bar"));


    console.log(new newApi().add("foo", "bar"));


    </script>


    As you can see, both the old API and the new one define the object with the


    same name----Utils-----but they don’t clash because they are isolated from the


    global scope by the wrapper. In JavaScript, a new function creates a new


    CHAPTER 10: Going Server-Side


    scope----you can define any new variables inside it without being afraid of


    overwriting something that was already defined.


    This approach is very similar to what Node does. When you call


    var foobarApi = require(''foobar'');


    Node looks for a file called foobar.js, executes the content of the file in the


    separate scope, and returns whatever the code in that file decided to share with


    the outer world.


    The foobar in the example is called a module. Module is a reusable API that you


    can use in your application. As I mentioned earlier, every major platform has
    a


    similar concept of reusable components----some call them libraries, other call


    them extensions, and yet others call them plug-ins. Node calls them modules.


    Every platform uses its own rules for packaging and distribution of such


    components, as wel as the rules of discovery----where to look for them when


    one needs them. Node.js has its own rules, of course, that we will explore right


    after writing our first Node.js module!


    Writing the First Module


    Writing a module for Node is not hard at all. In fact, it is not too different
    from


    writing plain script for the browser, with two major differences: you don’t have
    to


    worry about the global scope and you have to explicitly state which variables
    or


    constructors you want to share with the rest of the world.


    Create a new file called animal.js and copy the code from Listing 10-8 into the


    new file.


    **Listing 10-8.** *Creating Own Module*


    function Animal() {


    console.log("New animal is born");


    }


    var _p = Animal.prototype;


    _p.sayHello = function() {


    console.log("Hello, I''m a humble animal");


    };


    function makeNewAnimal() {


    return new Animal();


    }


    exports.Animal = Animal;


    CHAPTER 10: Going Server-Side


    **413


    You don’t need to explicitly wrap the module into the function call because


    Node does the scope isolation for you. exports is the ‘‘pseudo-global’’ variable


    that is available to every module. By assigning properties to exports, you share


    them with the rest of the system. As you see, we’ve exported only the


    constructor. The function makeNewAnimal is not exported, so it stays private for


    this module.


    We can access the newly created module, as shown in Listing 10-9.


    **Listing 10-9.** *Accessing the Module*


    var animalApi = require("./animal");


    var animal = new animalApi.Animal(); // Creates the new instance of animal


    console.log(typeof animalApi.makeNewAnimal); // Undefined, method is not visible


    animal.sayHello(); // Prints greeting


    The require function loads the animal.js file from the current folder, executes


    the code there, and returns the object that has all the ‘ exported’’ fields. After


    this is done, you can access whatever you exported-----call functions, create


    objects from constructors, and so forth. The third line shows that the function


    that is defined inside the module----but not exported-----stays inaccessible.


    The syntax is a little unusual. Some people would prefer to export the function


    itself and not an object that has the function as one of the values. The syntax


    would be a tad clearer then:


    var Animal = require("./animal");


    var hamster = new Animal();'
  trans: "\n# 定义 API 的作用域\n\n使用 JavaScript 闭包，只需几行代码即可实现 API 的作用域隔离。清单 10-7 展示了如何将两个\
    \ API 彼此隔离。\n\n**清单 10-7.** *将 API 与全局作用域隔离*\n\n```html\n<script>\n// The class\
