    \ browser normally does with the input; for example, the default action when clicking\
    \ the `<a>` tag is navigating to a new page. The default action for the `Tab`\
    \ key is moving focus to the next focusable element. For regular web pages, these\
    \ actions are what the user wants; however, not for a web game. A tap on the canvas\
    \ highlights the whole element; for example, it marks it with a border and plays\
    \ a “click” sound with a rather noticeable and annoying delay. This is not what\
    \ the user wants when he plays Four Balls.\n\nA browser has two functions to control\
    \ the normal event flow:\n\n- `stopPropagation()` stops the event from going to\
    \ the next levels of DOM hierarchy\n- `preventDefault()` makes sure that browser\
    \ will not do the default action. It is simply saying to ignore the event.\n\n\
    The code that calls both of these functions looks like the following snippet:\n\
    \n```javascript\na.addEventListener(\"click\", function(e) {\n  e.stopPropagation();\n\
    \  e.preventDefault();\n}, false);\n```\n\nIf a variable is an `<a>` DOM node,\
    \ then the browser will never navigate that link because of `preventDefault()`.\
    \ The parent of `<a>` will not receive the click events that happened on `<a>`\
    \ because of `stopPropagation()`. We will use this technique in our API to restrict\
    \ the normal flow of events that are intended solely for the main canvas element.\n\
    \n## Getting More from Events\n\nMany interesting things are hidden inside this\
    \ little `e` that is passed as the parameter to every event listener. For the\
    \ `touchstart` event, `e` has the array called `targetTouches`. In turn, every\
    \ element of `targetTouches` has parameters called `pageX` and `pageY`, the coordinates\
    \ of the touch relative to the top-left corner of the page.\n\nLet’s use this\
    \ knowledge now and create a simple app that draws a bullet on a canvas when the\
