    simulate light effects like flare, glow, or soft shadows. Figure 2-21 shows several
    uses of gradients.


    **Figure 2-21.** **Gradients.** The image on the left is a screenshot from the
    game *Commander Keen*; a jaggy gradient is used on the sky background. On the
    right, multiple radial gradients are used to simulate inner glow and shiny gloss.


    Canvas supports two types of gradients: **linear gradients** and **radial gradients**.


    **Linear Gradients**


    To make a linear gradient, you first need to create the gradient object:


    ```

    var gradient = ctx.createLinearGradient(10, 10, 50, 50);

