    DOM 元素，而`context`则是用于在其上绘制的入口点，是一系列用于绘制内容的函数集合。


    **注意：** 此时，你可能会问：为什么我要调用`canvas.getContext(''2d'')`？为什么是`''2d''`？也许还有其他类型的`context`，比如`''3d''`？W3C
    规范定义：`getContext`“返回一个对象，该对象暴露了用于在`canvas`上绘图的 API。第一个参数指定了所需的 API。后续参数由该 API
    处理。”


    这基本上意味着你可以从`canvas`中获取不同的`context`，它们会暴露不同的 API 集合，例如 3D API。具体能获取到什么取决于浏览器。2D
    `context`的结果由 W3C 规范明确定义。


    2007 年，Opera 发布了首个支持自定义 3D canvas 的实验性构建版本；你需要通过获取`"opera-3d"` `context`来访问它。2011
    年 3 月 3 日发布的 WebGL[规范](https://www.khronos.org/registry/webgl/specs/1.0/)定义了名为`"webgl"`的`context`，用于访问标准化的
    3D `context`。（我们将在第 9 章深入探讨 WebGL。）


    因此，`''2d''`并非一个可以省略的随意术语。


    这一解释应当能清楚地说明，“canvas 可以绘制曲线”这种说法为何不完全正确。能够或不能够进行绘制的并非`canvas`本身，而是图形`context`（即
    API）。在一个`context`中完全合理的操作（如 2D 中的曲线），在另一个`context`中（如 WebGL 中的曲线）可能无法实现。


    ![](img/index-54_1.jpg)


    ## 第 2 章：浏览器中的图形：Canvas 元素


    ### 坐标系


    坐标定义了你要将某个图形绘制在哪个确切位置，或者图形的大小。几乎每次调用`canvas` API 都会涉及坐标。如果要绘制一个矩形，你必须设置其左上角坐标、宽度和高度。对于圆形，你需要圆心和半径。这些坐标具体是什么？它们又是如何工作的？


    2D `context`定义了一个矩形的位图区域。该`context`使用经典的笛卡尔坐标系来引用其中的各个点。有两个轴：水平轴称为`x`，垂直轴称为`y`。`x`轴向右增加，`y`轴向下增加。`x`和`y`都设置为
    0 的点称为原点；它位于位图的左上角。图 2-3 显示了四个点，其中一个是原点。每个点旁边都用括号标出了其坐标。


    **图 2-3.** *2D context 的坐标系*


    在 2D 空间中，每个点都由一对坐标`(x, y)`来引用。在本书中，我使用常规的数学表示法：`(x, y)`；例如，`(10, 2)`表示点的`x`坐标为
    10，`y`坐标为 2。原点的坐标是`(0, 0)`。在图形`context`中，点`(10, 8)`将位于点`(15, 8)`的左侧，以及点`(10, 2)`的下方。


    这里还有一个值得提及的重要规则。有时，图形 API 和软件不区分坐标网格上的点和屏幕上的像素，并将这两个术语互换使用。2D `context`的工作方式则不同，且有些反直觉（至少对于刚开始编写`canvas`代码的人来说是反直觉的）。


    坐标不是像素。坐标是像素内部或像素之间的小点；例如，`(0, 0)`坐标位于左上角像素的左上角。


    ![](img/index-55_1.jpg)


    **第 2 章：浏览器中的图形：Canvas 元素**


    **49**


    同一个像素的中心点坐标是小数坐标`(0.5, 0.5)`。

