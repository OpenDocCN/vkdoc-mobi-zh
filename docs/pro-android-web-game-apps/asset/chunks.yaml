    substituted by the other API that solved the problem in a better way. These


    transports are


     JSONP polling


     Flash Socket


     Forever IFRAME


    **JSONP Polling**


    JSONP polling was meant to solve the problem of loading the data from the


    server that is located on a different domain from the client’s. For example, if
    the


    server is [at http://server.example.com and th](http://server.example.com)e client
    HTML page was loaded


    [from http://client.example.com,](http://client.example.com) they could not communicate
    via XHR


    because of the limits of the same origin policy, a security restriction that


    prevented XHR from sending requests to other domains.


    The technique behind JSONP was to create the new <script> element and


    append it to the body of the document. Since the script element can load scripts


    from any domain, there are no security restrictions that could prevent the


    request from retrieving the data.


    The JSONP transport is obsolete because there is a new API that regulates the


    sharing of resources between domains in a standard way: cross-origin resource'
  trans: "\n# Markdown 排版结果\n\n`value`（如`\"application/x-custom-event-stream\"`），浏览器不会等待接收完整的响应体。相反，它会将服务器写入`XHR`对象的`responseText`的所有内容追加到末尾，并触发`onreadystatechange`（以及\
    \ Level 2 中的`onprogress`），让您有机会从流中提取新消息。请查看列表 11-10 和 11-11 中更新的客户端和服务器代码。\n\n\
    **列表 11-10.** *XHR Streaming Transport：示例客户端*\n\n```javascript\nfunction init()\
    \ {\n  pollServer();\n}\n\nfunction pollServer() {\n  var responseMarker = 0;\n\
    \  var xhr = new XMLHttpRequest();\n  console.log(\"Requesting\");\n  xhr.open('GET',\
    \ 'lobby');\n\n  xhr.onload = function(e) {\n    console.log(\"Server closed the\
    \ stream, reconnect\");\n    setTimeout(pollServer, 4);\n  };\n\n  xhr.onprogress\
    \ = function(e) {\n    if (this.readyState == 3 && this.status == 200) {\n   \
    \   var response = xhr.responseText.substr(responseMarker);\n      responseMarker\
    \ = xhr.responseText.length;\n      console.log(response);\n    }\n  };\n\n  xhr.onerror\
    \ = function(e) {\n    console.log(\"Error, retrying\");\n    setTimeout(pollServer,\
    \ 4);\n  };\n\n  xhr.send();\n}\n```\n\n客户端的代码发生了显著变化。此版本的代码依赖`onprogress()`函数来获取新事件，而不是通常的`onload()`。此外，新消息被追加到`responseText`的末尾，因此要使用所描述的方法，必须从整个响应字符串中手动提取最新消息。\n\
    \n**列表 11-11.** *XHR Streaming：示例服务器*\n\n```javascript\nvar clients = [];\n\n\
    // send notification with random intervals\n(function() {\n  notifyClients();\n\
    \  setTimeout(arguments.callee, Math.floor((Math.random() * 10000)));\n})();\n\
    \n/**\n * Sends the new event data to every connected client\n */\nfunction notifyClients()\
    \ {\n  clients.forEach(function(res) {\n    res.write(\"new event data\");\n \
    \ });\n  // clients = []; // Do not clean the array, clients stay connected\n\
    }\n\napp.get(\"/lobby\", function(req, res) {\n  res.contentType(\"application/x-custom-event-stream\"\
    );\n  clients.push(res);\n  console.log(\"Added client, now \" + clients.length\
    \ + \" connected\");\n});\n```\n\n服务器几乎保持不变。更改的部分已加粗。首先，服务器向浏览器发送自定义的`contentType`。然后，当新消息到达时，它会将新消息写入客户端流中。`write()`函数不会关闭底层连接，因此此时无需清除客户端数组（当客户端断开连接时仍需清除，否则数组会保留垃圾数据；但就这个简单的演示而言，它工作得很好）。流式传输的主要优势在于，在消息密集的环境中，客户端无需在每条消息后重新建立连接。\n\
    \n完整的 XHR 流式传输示例应用程序位于`03.streaming`文件夹中，与本章的其他代码一起提供。\n\n## 过时的解决方案\n\n本节介绍了一些以前使用过但已被其他\
    \ API 替代的传输方式，这些 API 以更好的方式解决了问题。这些传输方式包括：\n\n- JSONP 轮询\n- Flash Socket\n- Forever\
    \ IFRAME\n\n### JSONP 轮询\n\nJSONP 轮询旨在解决从与客户端不同域的服务器加载数据的问题。例如，如果服务器位于`http://server.example.com`，而客户端\
    \ HTML 页面从`http://client.example.com`加载，由于同源策略的限制，它们无法通过`XHR`进行通信，这是一种安全限制，阻止了`XHR`向其他域发送请求。\n\
    \nJSONP 背后的技术是创建新的`<script>`元素并将其附加到文档的`body`中。由于`script`元素可以从任何域加载脚本，因此没有安全限制阻止请求检索数据。\n\
    \nJSONP 传输已过时，因为现在有一种新的 API 以标准方式规定域间资源共享：跨域资源共享（CORS）。\n"
- fmt: '# CHAPTER 11: Talking to the Server


    ## Sharing or CORS


    CORS (Cross-Origin Resource Sharing) is a specification described at [www.w3.org/TR/cors/](http://www.w3.org/TR/cors/).
    The specification describes special headers that the server must send to the client
    in order to allow access to its resources. Using CORS is preferable since JSONP
    provides significantly less control over the life cycle of the request (for example,
    you can''t cancel it once started) and error handling. The last important reason
    to use CORS is because it is a supported standard and not a hack like JSONP.


    ## Flash Socket


    Flash Socket is the transport that relies on the Flash plug-in to handle the communication
    with the server. The Flash component notifies JavaScript of new events. Flash
    handles notification, while JavaScript handles the processing logic. Many people
    would disagree that this transport is obsolete; indeed, Flash does a really good
    job handling persistent low-latency connections, much like WebSocket does. However,
    Adobe dropped support of Flash Player for mobile devices—and that is the reason
    why this transport cannot be relied on anymore (at least not on smartphones).


    This transport is obsolete not because the communication technology was substituted
    by a better API, but because the core component that the transport relies on is
    now at the end of its life.


    ## Forever IFRAME


    Forever IFRAME is the oldest of transports: it relies on a feature of HTTP/1.1
    and its chunked encoding that was introduced to handle very large documents. The
    IFRAME opens a connection to the server that is never closed. The task of the
    server is to feed new chunks of data—script elements with commands to handle new
    events. Each time the server needs to send an event, it appends another `<script>`
    block into the endless page. The script is immediately evaluated by the client,
    and that is how the transport provides low-latency communication.


    This transport is obsolete because it was substituted by several better solutions
    described earlier in this section. Two major drawbacks of Forever IFRAME were
    inconsistent behavior across browsers and poor error handling.


    ## Testing Transports in the Field


    One of the main requirements of a good transport is reliability. We live in an
    imperfect world where mobile data connections can break from time to time. As
    a developer, you cannot do anything about it. Your goal here is to make sure that
    a temporary loss of connection does not kick the player out of the game, and when
    the connection is restored, he can continue to play. Moreover, the messages that
    the game tried to send during the period of low connectivity should not be lost.
    They should be saved somewhere for sending and delivering to the server once the
    device is back online.


    The best way to test your game is to start a server and try to play on your way
    from home to office. Start with the Wi-Fi connection in your home, and then switch
    to 3G once you are on the street. Take a bus and ride couple of stops, then move
    to the subway and continue your experiment from there. Finally, grab a coffee
    and go to the park. Don''t forget to answer incoming calls or to send a few text
    messages when you have a spare minute.


    Now, honestly answer the following questions:


    - How was your online gaming experience?

    - Were there any freezes or crashes?

    - Did you lose any data, turns, or server updates?

    - Was the game engine able to restore synchronization once the server became available?

    - Did your game show some sort of message to warn you that you''re not connected?

    - How did it look from your opponent''s side? Did he know that you''re losing
    your connection? Should he? Did he have a chance to end the match when he saw
    that you''re not responding for several minutes?


    If you are satisfied with every answer after conducting this kind of experiment
    for the first time, send me a postcard. I want to live in a city that has perfect
    mobile data coverage.


    Running around the city is not the best way to debug networking, but how do'
