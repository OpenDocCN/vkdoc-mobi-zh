    \ are always a little more complicated than regular desktop projects. When it\
    \ comes to Android and JavaScript in a single application, the right tools in\
    \ the right place can make a huge difference. But a workspace is not only about\
    \ tools. It is also very important to set up coding standards and best practices\
    \ to follow during the development process. Coding conventions and basic architectural\
    \ decisions are also discussed in this chapter.\n\nBeing a seasoned developer,\
    \ you already have certain preferences in tools and coding approaches. For example,\
    \ every web programmer has his favorite integrated development environment (IDE)\
    \ and browser for basic testing. You probably also have your own vision on writing\
    \ good and maintainable JavaScript code. If you are comfortable with your preferences,\
    \ use them. At the very least, I encourage you to try the tools and techniques\
    \ that are described in this chapter. You might find some of them more convenient.\n\
    \nThis chapter is divided into two parts—tools and techniques—each describing\
    \ its own important aspect of development. In this chapter, we will do the following:\n\
