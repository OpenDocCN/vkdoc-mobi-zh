    Dan York found a good metaphor to describe the difference between the traditional
    and asynchronous IO (`http://tinyurl.com/49wl5lk`). He compares the traditional
    IO with a fast-food restaurant line. When it is your turn, you give your order,
    and you wait until your order is done. Even though the cashier is doing nothing
    useful at the moment, he’s just waiting for the order to arrive from the kitchen,
    he is blocked. While you and the cashier are waiting for the order to come, the
    other customers have to wait until you are done. Spawning a lot of threads is
    like adding more cashiers: it definitely makes things happen faster, but this
    solution is not scalable since you are limited by space and budget. Besides, the
    problem itself is not actually solved—the cashiers are standing there, wasting
    their time while they wait for the kitchen people to do their job.


    In an asynchronous model, the cashier asks you to step aside once you made your
    order, and he serves another customer in the meantime. It may well happen that
    the next customer wants something very simple, like a muffin, which is already
    baked so the cashier serves that customer instantly. Eventually, the cashier is
    notified by the kitchen that your order is ready. He finishes serving his current
    customer and returns to you. Now he’s got what you need and he gives it to you.


    See the difference? In the second example, the cashier is utilizing his time to
    the maximum: he doesn’t waste time standing and staring at you while the kitchen
    staff is making a burger—every second is used to satisfy the needs of the clients.
    Obviously, in this metaphor, the client is the request from the browser, the cashier
    is the web server thread, and the kitchen is the IO operation that might be quick,
    but may take some time to finish.


    If you already have experience working with the server-side stack, it might be
    hard for you to change your way of thinking about the structure of the code—you
    got used to the synchronous model, where operations are executed one by one. Hopefully
    this small explanation has clarified things for you a little. Now let’s move on
    to installing Node.js. It’s time to try this amazing stuff.


    ## Installing Node.js


    Before writing any real Node.js code, we have to install it. There are two pieces
    of software that are important for development, the first being Node.js itself.
    This is an executable that does the hard job of running scripts and doing all
    the complicated low-level OS stuff. The second part is NPM, the package manager
    for Node.js. It is the de facto standard for downloading and installing additional
    packages for Node, such as the frameworks, tools, and utilities that you require
    during the development.


    **NOTE:** Node.js has a very active community and there are a lot of *modules*—extensions
    that you can use to simplify development so that you don’t have to reinvent the
    wheel every time. There are hundreds of them, from FTP servers and command-line
    parsers, to PDF generation and image processing. In this chapter, we use a few
    of them too.


    Installation of Node.js is fairly simple: select the installer package from `http://nodejs.org/#download`
    (choosing the Windows or Mac version, depending on your OS) and follow the installation
    instructions. Update the `PATH` environment variable to point to the destination
    directory (if you don’t remember how to set environment variables, refer to Chapter
    1’s “Installing Java Development Kit’’). I prefer to create an extra variable
    called `NODE_HOME` and to refer to it in `PATH` afterward.


    **NOTE:** On my own system, I use the path `c:\apps` for all development-related
    applications, tools, and utilities. For example, Node.js resides in `c:\apps\node`.'
