    xii


    ****About the Authors**


     **Juriy Bura** is an independent consultant living between Kiev, Ukraine, and
    Zurich, Switzerland.


    His main area of expertise is games and real-time web applications for both desktop
    and mobile platforms. He is a co-owner of Deadline Solutions [(http://deadline-solutions.com/about.html](http://deadline-solutions.com/about.html)).


    Juriy is also a leader of the JavaScript User Group in Ukraine, a frequent conference
    speaker, and a passionate web developer seeking how to push the browser to its
    limits. Having more than seven years of experience in Java and JavaScript, he
    is sure that game development is the area with the most fun concentrated within
    a line of code.


    Juriy spends his spare time with his family and playing board games in a small
    “geek”


    club. Juriy blogs at [http://juriy.com an](http://juriy.com)d tweets as @juriy.


     **Paul Coates** is a freelance copy editor and EFL teacher, based in Burton
    Upon Trent, UK, and Kyiv, Ukraine. He made sure that Juriy’s ingredients had the
    right touch of English flavor for publication. When not teaching students of all
    ages how to speak his native tongue, Paul provides copy editing and proofreading
    for foreign works in English, as well as Russian and Ukrainian translations. Paul
    enjoys video gaming, cinema, and traveling.


    Paul occasionally blogs at [http://psykspopcornjungle.blogspot.com an](http://psykspopcornjungle.blogspot.com)d
    occasionally tweets at @Psyklax.


    xiii


    ****Acknowledgments**


    This book would be impossible without the help and support from many great people.
    I’m most grateful to my wife, Elena, whose love gave me inspiration when I needed
    it most, and my parents, Alexander and Vera Bura.


    I’m grateful to my good friends: Vadim Voituk for his brilliant ideas and technical


    expertise; Alexey Kondratov, who was the first to explain to me how a book is
    different from a 600-page blog; and Artyom Volkhonskiy. I’m so glad that you guys
    have always been there when I needed your support and opinion. Your help has improved
    this book tremendously.


    [A very special thanks to a brilliant artist—Sergey Lesiuk (http://nitro-](http://nitro-killer.deviantart.com)'
