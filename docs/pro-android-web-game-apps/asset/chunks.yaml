    \ 0 到 100 之间），如清单 16-7 所示。\n\n**清单 16-7.** *设置声音音量*\n\n`soundManager.createSound({`\n\
    \n`id: 'gameover',`\n\n`url: 'sound/gameover.mp3',`\n\n`volume: 40,`\n\n`autoLoad:\
