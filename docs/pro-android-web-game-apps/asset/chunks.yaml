- fmt: '# The Plan


    The project we’re going to accomplish is a rather big one when compared with other
    projects in this book, both in terms of lines of code and the number of features.
    We need a solid plan in order to keep track of progress and understand why we
    take a certain path to reach the goal. The goal is to make an isometric engine
    that can render terrain and objects, and interact with the user. We’re omitting
    the gameplay details for now, but are focusing instead on architecture, rendering
    mechanics, optimizations, and player interaction. We will load the level, let
    the user scroll through it, click the ground tiles to change the terrain type
    (e.g. “build road”), add new objects to the map, and remove existing ones. This
    is the typical flow for many strategy games; the rest is just the details of gameplay
    (for example “do not allow building stables if wood is less than 300”).


    ## Modes of Interaction


    The user will have three “modes” of interaction with the game world: movement,
    editing terrain, and editing objects. The user can switch between the modes at
    any time—we will create a small UI element for that. Look at Figure 7-1 again,
    the small circle with the ‘house’ icon on the top left shows the current mode.
    When the user taps the circle, the mode switches.


    ## Rendering Layers


    The rendering is organized in layers (we discussed that technique in Chapter 6),
    and each layer is responsible for a certain type of object. We will have three
    types of layers in this project: one for isometric tiles, one for world objects,
    and one for UI elements. They are called `IsometricTileLayer`, `ObjectLayer`,
    and `UiLayer`, respectively. They are shown in Figure 7-2. To simplify the treating
    of the multiple layers, we will create the `LayerManager`.


    **Figure 7-2.** *The rendering layers of the engine*


    ## Building the Skeleton


    We start by building the skeleton of the game—the HTML file and the main `Game`
    class—initiating the event handling and creating an animation loop much like we
    did in the previous chapter. At this point, we will have something “working” to
    start with. The next step is to add the isometric terrain.


    The isometric terrain by itself is not a very hard task, but there are a few things
    to worry about, and a few optimizations to implement. The second part of this
    chapter is devoted to isometric terrain: rendering tiles, implementing an offscreen
    cache, scrolling the map, and other matters. The result is an empty, scrollable
    terrain with no objects.


    ## Adding Objects


    The next obvious step is to add objects to the map. We will need the `ObjectLayer`,
    which is somewhat easier to build than `IsometricTileLayer`. We will introduce
    one more optimization briefly mentioned in the previous chapter—the object clusters
    (to limit the number of “active” objects and not to deal with the objects far
    away from the viewport). Finally, we will look at complex objects like arcs and
    portals—there is a small trick in how to implement them correctly. At this point,
    we will have the objects rendered on top of isometric ground. Some of them will
    move, to illustrate that movement is handled correctly.


    ## Dirty Rectangles Algorithm


    The next major topic is to build the dirty rectangles algorithm—marking certain
    areas of the screen “dirty” in order to render only these areas in the next frame.
    For example, if there is a one small moving object on the screen, it doesn’t make
    sense to repaint the whole area—just the bits covered by that object. Both isometric
    and object layers are affected by this change, and in the end of this section,
    the game will not waste any cycles on rendering the parts of the screen that are
    not changed anyway.


    ## LayerManager


    Next, we will introduce the `LayerManager`—the class that simplifies the handling
    of multiple layers—since at this point we already have two layers (terrain and
    objects) and we’re about to add a third (UI elements). The more layers we add,
    the more complex the management becomes.'
