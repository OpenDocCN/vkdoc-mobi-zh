    \n## The Audio Tag\n\nThe audio tag is the simplest possible way to play sound\
    \ within a web page. The API is straightforward and unsophisticated, as shown\
    \ on Listing 16-1.\n\n**Listing 16-1.** *Using the Audio Element on a Web Page*\n\
    \n```html\n<head>\n<script>\nvar audio;\n\nfunction init() {\n    audio = new\
    \ Audio(\"sound/theme.mp3\");\n}\n\nfunction play() {\n    audio.play();\n   \
    \ setInterval(function() {\n        audio.volume -= 0.1;\n    }, 200);\n}\n\n\
    function pause() {\n    audio.pause();\n}\n\nfunction changeVolume(deltaVolume)\
    \ {\n    audio.volume += deltaVolume;\n}\n</script>\n</head>\n\n<body onload=\"\
    init()\">\n<div>\n    <button onclick=\"play()\">Play</button>\n    <button onclick=\"\
    pause()\">Pause</button>\n    <button onclick=\"changeVolume(0.2)\">Vol. Up</button>\n\
    \    <button onclick=\"changeVolume(-0.2)\">Vol. Down</button>\n</div>\n</body>\n\
    ```\n\nThe `new Audio(\"sound/theme.mp3\")` line is a convenience constructor\
    \ that creates the tag on the fly.\n\nThe code in Listing 16-2 gives the same\
    \ result.\n\n**Listing 16-2.** *The Alternate Way to Initialize Sound by Adding\
    \ the audio Tag to the Page*\n\n```html\n<script>\nvar audio;\n\nfunction init()\
    \ {\n    audio = document.getElementById(\"player\");\n}\n/* rest of the code\
    \ is unchanged*/\n</script>\n</head>\n\n<body onload=\"init()\">\n<div>\n    <audio\
    \ id=\"player\" src=\"sound/theme.mp3\"></audio>\n    <button onclick=\"play()\"\
    >Play</button>\n    <button onclick=\"pause()\">Pause</button>\n    <button onclick=\"\
    changeVolume(0.2)\">Vol. Up</button>\n    <button onclick=\"changeVolume(-0.2)\"\
    >Vol. Down</button>\n</div>\n</body>\n```\n\nThe `audio` tag implements the bare\
    \ minimum of audio functionality: load the file, play/pause the track, change\
    \ playback volume. It can also show simple player controls on the web page (rarely\
    \ required for games). Even though it is hard to imagine a simpler API, this functionality\
    \ is often enough for casual games: load the background music, set the volume,\
    \ start the playback in a loop, and occasionally play other sounds for various\
    \ game events.\n\n## The Web Audio API\n\nThe Web Audio API is the next-generation\
    \ audio processing API for the web. It allows you not only to play audio, but\
    \ also to process it in real time, playing with the raw audio data——the waveform.\
    \ To better understand the function of the API, think about the real-time image\
    \ processing that we can do with the canvas API. Given thousands of raw pixels,\
    \ we can do truly amazing things——dynamically render worlds; create 3D figures;\
    \ provide effects like lightning and fire; cover parts of the map with a \"fog\
