  trans: "\n```javascript\n[Flying, Mechanic].forEach(function(component) {\n  for\
    \ (var prop in component) {\n    flyingMechanic[prop] = component[prop];\n  }\n\
    });\n```\n\n这段代码简单地将各组件的属性和函数复制到 `flyingMechanic` 对象中。最终结果正如我们所期望：一个兼具飞行单位与机械师特质的对象。\n\
    \n古老的面向对象编程原则曾这样描述对象的组织方式：“组合优于继承”。在游戏开发中，这一原则的实践常被称为**实体组件系统**。游戏实体最初为空，随后通过组件不断丰富，每个组件描述了该实体的特定属性。每个组件都为对象添加新的参数和方法。这正是\
    \ Crafty 的核心思想，稍后我们将看到具体代码实现。\n\n## 第 14 章：JavaScript 游戏引擎\n\n**注意：** 实体组件系统还有另一个更常用的名称：**混入**。这个名称的灵感来源于一种可添加葡萄干、坚果或糖果等美味配料的冰淇淋。关于混入（这里指编程概念，而非冰淇淋）的深度探讨，可以参阅一篇精彩博文《重新审视\
    \ JavaScript 混入》，地址为 [`bit.ly/lZVgQs`](http://bit.ly/lZVgQs)。\n\n既然我们已经了解了 Crafty\
    \ 的核心思想，现在就开始用它编写一个真正的游戏吧！\n\n### Crafty 入门\n\n首先，从官方网站（[`craftyjs.com`](http://craftyjs.com)）下载最新版\
    \ Crafty（截至撰写本文时为 0.4.9 版本）。使用 Crafty 制作的游戏通常以一段简单的初始化代码开始，如清单 14-2 所示。\n\n**清单\
    \ 14-2.** *Crafty 初始化*\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n\
    <meta charset=\"utf-8\" />\n<meta name=\"viewport\"\ncontent=\"width=device-width,\
    \ initial-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi\"\
    />\n<style>\nhtml, body {\noverflow: hidden;\nwidth: 100%;\nheight: 100%;\nmargin:0;\n\
    padding:0;\nborder: 0;\n}\n</style>\n<script src=\"js/crafty.js\"></script>\n\
    <script>\nwindow.onload = function() {\n// 全屏初始化 Crafty\nCrafty.init();\n// 初始化画布\n\
    Crafty.canvas.init();\n// 其余游戏代码写在这里\n};\n</script>\n</head>\n<body>\n</body>\n\
    </html>\n```\n\nCrafty 无需任何 HTML 元素即可启动：它会自行创建所需的 DOM 元素。此外，Crafty 还会尽力判断用户使用的是桌面浏览器还是移动浏览器。如果是移动浏览器，Crafty\
    \ 会让画布元素占满整个屏幕，监听触摸事件作为输入，并添加适当的 meta 属性来设置视口属性。\n\n下一步是定义一个或多个场景。场景即游戏画面，例如加载画面、游戏棋盘、高分榜等。第\
    \ 12 章中的“四球游戏”有两个主要状态：“大厅”和“游戏”。尽管名称不同，Crafty 中的场景概念与之类似。清单 14-3 中的代码展示了如何为典型游戏流程创建四个场景。\n\
    \n**清单 14-3.** *设置游戏场景：加载、游戏、胜利和游戏结束*\n\n```javascript\nwindow.onload = function()\
    \ {\nCrafty.init();\nCrafty.canvas.init();\nCrafty.scene(\"loading\", function()\
    \ {\n// 加载场景，例如显示加载画面\n});\nCrafty.scene(\"game\", function() {\n// 场景开始\n}, function()\
    \ {\n// 场景结束\n} );\nCrafty.scene(\"win\", function() {\n// 胜利场景\n});\nCrafty.scene(\"\
    gameover\", function() {\n// 游戏结束场景\n});\n// 启动\"加载\"场景\nCrafty.scene(\"loading\"\
    );\n}\n```\n\n![图 14-7](img/index-552_1.jpg)\n\n我们在本章中创建的游戏遵循一个简单流程，如图 14-7 所示。\n\
    \n**图 14-7.** *示例游戏的流程*\n\n`Crafty.scene()` 函数用于定义或运行场景。传入的两个参数函数分别是 intro（场景启动时运行的代码）和\
    \ outro（下一个场景接管前运行的代码）。第一个函数是游戏的“核心”——在此处展示视觉效果并运行逻辑。\n"
- fmt: "让我们给游戏添加一个简单的加载画面。为游戏创建一个漂亮的标志，并将其放入`img/logo.png`文件。或者，直接使用本章提供的标志文件。第一步是根据文件创建精灵：\n\
    \n```\nCrafty.sprite(420, 75, \"img/logo.png\", { logo: [0,0] });\n```\n\n这行代码告诉`Crafty`，我们要从`\"\
    img/logo.png\"`图片加载一个精灵。我们的精灵有一帧，其尺寸为 420 × 75 像素，帧名为`logo`，在精灵表中的位置为 (0, 0)。`Crafty`将会创建一个名为`logo`的新组件。现在，让我们创建使用这个新组件的实体：\n\
    \n```\nvar logoEntity = Crafty.e(\"2D, Canvas, logo\");\n```\n\n借助`Crafty.e()`函数，我们创建了新的游戏实体。这个实体是三个组件的组合：`2D`、`canvas`和`logo`。前两个组件是`Crafty`的内置组件，它们决定了实体被绘制的方式。第三个组件`logo`，是我们刚刚创建的。让我们将新实体放置在屏幕中央。以下几行代码正是实现此目的：\n\
    \n```\nlogoEntity.attr({\n  x: (Crafty.DOM.window.width - 420)/2,\n  y: (Crafty.DOM.window.height\
    \ - 75)/2\n});\n```\n\n清单 14-4 展示了经过优化的代码版本。粗体行表示标志的新代码。\n\n**清单 14-4.** *在游戏开始时显示标志*\n\
    \n```\nvar logo = { sprite: \"img/logo.png\", width: 420, height: 75 };\n\nwindow.onload\
    \ = function() {\n  Crafty.init();\n  Crafty.canvas.init();\n  Crafty.scene(\"\
    loading\", function() {\n    showLogo();\n  });\n  Crafty.scene(\"game\",\n  \
    \  function() { /* 场景开始 */ },\n    function() { /* 场景结束 */ } );\n  Crafty.scene(\"\
    win\", function() {});\n  Crafty.scene(\"gameover\", function() {});\n  // 启动\
    \ \"loading\" 场景\n  Crafty.scene(\"loading\");\n};\n\nfunction showLogo() {\n\
    \  Crafty.background(\"#000\");\n  Crafty.sprite(logo.width, logo.height, logo.sprite,\
    \ { logo: [0,0] });\n  Crafty.e(\"2D, Canvas, logo\").attr({\n    x: (Crafty.DOM.window.width\
    \ - logo.width)/2,\n    y: (Crafty.DOM.window.height - logo.height)/2\n  });\n\
    }\n```\n\n如果你运行应用程序，将会看到未来游戏的启动画面，如图 14-8 所示。\n\n**图 14-8.** *未来游戏的标志*\n\n## Crafty\
