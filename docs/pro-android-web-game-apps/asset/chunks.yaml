    与二次曲线相同。我们选取一个从`0`到`1`的值，为了方便称其为`t`，并找到每条线段上与该值成比例的部分。（`t = 0`）是线段的起点，（`t = 1/3`）是线段的三分之一处，依此类推。在贝塞尔曲线上完成这些步骤后，我们构建三个支撑点。将它们视为二次曲线的控制点进行处理。


