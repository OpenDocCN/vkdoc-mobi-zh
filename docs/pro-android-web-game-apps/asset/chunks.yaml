    The first function, numberToColor(), is a small utility that translates the numerical
    ID of the object to the color representation suitable for setting the fill style.
    The second function uses the invisible bufferCanvas to create the mask for the


    image. The solid-color mask is then painted from the bufferCanvas onto the


    context passed as a parameter. Instead of painting the image, you can insert


    any complex rendering code here since once the pixels are on the context, it no


    longer matters what the original source was, whether a PNG image or a


    JavaScript routine.


    If you paint each image that way, it is fairly easy to grab the color of the selected
    pixel and to find the selected shape (see Listing 5-27). The demo that shows


    how to render the image mask can be found in the 05.mask.html file together


    with the other source code for this chapter.


    **Listing 5-27.** *Translating from Color to Figure ID*


    var imageData = pixelContext.getImageData(x, y, 1, 1).data;


    // The black color is default, so we have to draw masks starting from


    // color “1” (or take alpha values into the account). To return back


    // from color to array index we have to subtract 1 back.


    var index = (imageData[0] << 16 | imageData[1] << 8 | imageData[2]) - 1; console.log(“User
    selected index “ + index.toString(16));


    The bolded bitwise operation might require a little explanation. It restores the


    integer number from three-color components. The bits representation of the


    color is RRRRRRRRGGGGGGGGBBBBBBBB (the R block is 8 bits for red, the G block
    is 8


    bits for green, and the B block is 8 bits for blue).


    The << operation adds the given number of bits to the right of the number, filling
    the extra space with zeros. For example, the number 3 in binary form is 11\. 3
    << 1 means ‘‘add one 0 to the right,’’ resulting in (110 which is 6) in decimal
    form.


    The whole expression means ‘ take the 8 bits from the element 0 of the array


    and put it into the R block; next, take the 8 bits from the element 1 and fill
    the G


    block; and finally, fill the rest with the B block.’’ This yields the numerical


    representation of the value, the operation opposite to what we’ve done in


    numberToColor().


    The masking operation works only with images that do not have


    semitransparent pixels. If the image has translucent areas, the mask will not


    retain its original color; instead, it is affected by the transparency of the


    destination. To work with such images, they have to be preprocessed in


    runtime; the alpha value greater than 0 must be set to 1.


    CHAPTER 5: Event Handling and User Input


    If you are going to deal with semitransparent pixels, you will have to modify
    the


    code a little and remove the alpha value from the image before applying the


    mask. Otherwise, the original color will not be saved and you will not be able
    to


    find the shape index that you are looking for. We can change the values of the


    pixels the same way as we read them (see Listing 5-28).


    **Listing 5-28.** *Changing the Pixel Data of the Context on the Fly*


    function drawImageMask (image, x, y, maskColor, ctx) {


    …


    maskCtx.drawImage(image, 0, 0);


    filterAlpha(maskCtx, w, h);


    maskCtx.globalCompositeOperation = "source-atop";


    maskCtx.fillStyle = maskColor;


    maskCtx.fillRect(0, 0, w, h);


    ctx.drawImage(bufferCanvas, x, y);


    }


    function filterAlpha(ctx, width, height) {


    var imageData = ctx.getImageData(0, 0, width, height);


    var pixels = imageData.data;


    // Pixels are stored as RGBA. Alpha values are in every


    // fourth cell of the array


    for (var i = 0; i < width*height; i++) {


    pixels[i*4 + 3] = pixels[i*4 + 3] == 0 ? 0 : 255;


    }


    ctx.putImageData(imageData, 0, 0);


    }


    The code in this section explains only the crucial points of using masks for


    picking the object. You can find the full demo in the 06.pixel_picking.html file


    with the source code supplied with the book.


    **NOTE:** The technique described here can be optimized in many ways; for example,
    we can check for the size and position of each image and throw away those that
    do'
