    **121**


    ...two and manages the game lifecycle. The logic of the game is separated from
    its UI and from user input handling and lifecycle management.


    The components of our game are independent of each other. We can change the look
    of the board without touching the code in `BoardModel` or `Game`. We can modify
    the game rules—for example, we can make the random player take the first move,
    and this change will not affect the other components. The bigger your project,
    the more important it is to think about architecture and maintainability.


    All the graphics in this game are rendered at runtime. There are no static images
    at all. We designed the game interface in a way that it supports various screen
    sizes and densities. The game looks fine on mobile devices, tablets, and PCs.
    To do this, we had to implement the proper handling of orientation change and
    resizing of a browser window.


    The completed game is the first and most important step. Now we can add new exciting
    features or explore different types of games that are much more complex, with
    animated characters, large worlds, and multiplayer capabilities. All of this would
    be impossible, however, without understanding the material from the first three
    chapters: the object-oriented approach in JavaScript, the canvas API, and the
    basics of game architecture.


    ![](index-128_1.jpg)


    # Chapter 4: Animation and Sprites


    In the previous chapter, we created our first web game: a two-player version of
    Four Balls. This game is very simple. We only used graphical primitives to display
    the board: lines, circles, and gradients. Of course, there are a lot of other
    games that can be created with exactly the same set of tools, but what if we want
    to do something more exciting? A 2D platform shooter, perhaps?


    Platform shooters usually have much richer graphics than puzzle games (see Figure
    4-1). These games have a main character that can run, jump, and, obviously, shoot.
    Shooters also have enemies, items, terrain, and a lot of other elements to entertain
    the player. In other words, you need something more than circles and squares.
    You need to use custom graphics and animations, usually created by a graphics
    artist.


    **Figure 4-1.** *A screenshot from* Contra*, a platform shooter (or run-and-gun
    game) released by Konami in the late ''80s. As you see, it is pretty hard to draw
    complex elements like these with lines and circles.*


    Let''s say that you already have an experienced artist: someone who will bring
    some life into the heap of pixels, and make outstanding graphics for your game.


    ![](index-129_1.jpg)


    You explain to your artist an idea for a game—you need a character that can run,
    jump, and shoot. You also need a couple of backgrounds, world elements, and several
    "bad guys." After a week or two, the artist gives you several PNG files that look
    like those in Figure 4-2. Now your job is to make a game out of it.


    **Figure 4-2.** *Graphical resources that you might receive from your artist*


    In this chapter, we will learn three crucial game development concepts: working
    with bitmap graphics, making an animation out of set of frames, and implementing
    user input.


    **NOTE:** The fabulous animated knight that is used throughout this chapter was
    kindly provided by MarcusFilm ([www.marcusstudio.com.ua](http://www.marcusstudio.com.ua)).
    You may use the knight for free in your own projects—hobby or commercial. Visit
    the MarcusFilm home page for more art.


    ## Sprites


    In game development, a raster image is often called a sprite. It might be a static
    image or a frame of an animation sequence, like in Figure 4-2. When a lot of sprites
    are placed in a single file, it is called a sprite sheet. Figure 4-2 is a fragment
    of the sprite sheet that has 18 images. Each one is a single frame of a character
    animation jumping, running, or walking.


    **125**


    **NOTE:** There are two opposite concepts in 2D graphics: vector and raster graphics.'
