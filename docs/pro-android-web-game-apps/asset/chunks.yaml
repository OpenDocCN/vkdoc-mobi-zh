- fmt: "# enrich req and resp variables for the next middleware\n\nAlmost everything\
    \ you do in Express happens in one of these nice little modules. To better understand\
    \ them, it is useful to think about them as layers (see Figure 10-11).\n\n**Figure\
    \ 10-11.** *Layers of middleware. Requests go through each \"layer\" that does\
    \ a specific task.*  \n*Request processing can stop on a certain layer or go through\
    \ all of them.*\n\nEach new request is passed to the first level. It can stop\
    \ and return there, or pass to the next level, and so forth. As you have seen,\
    \ middleware sometimes relies on the result of the previous layers. For example,\
    \ our `get` handler needed a session to work correctly. If we put it above the\
    \ sessions, we will not have session data available at the time when it is called.\
    \ The same is true for sessions themselves. Sessions need cookies to be parsed.\
    \ Cookies store the session ID of the current user, and without it, we can't load\
    \ the user's session data. Sessions can't work without cookies being parsed by\
    \ one of the previous layers. This means that the `cookieParser` middleware must\
    \ be placed before the `session` middleware.\n\nThe typical middleware stack looks\
    \ like Listing 10-26.\n\n**Listing 10-26.** *A Typical Middleware Stack of a node.js\
    \ Server*\n\n```javascript\napp.use(express.logger(...)); // Similar to access\
    \ log of Apache HTTP server.\napp.use(express.bodyParser(...)); // Extracts whatever\
    \ useful is stored in the request\n//body (usually POST requests)\napp.use(express.cookieParser(...));\
    \ // Parses cookies and populate req.cookies\napp.use(express.session(...)); //\
    \ Enables session support and\n//populates session and sessionStore\n\nCHAPTER\
    \ 10: Going Server-Side\n\napp.use(app.router); // Executes router functions\n\
    app.use(express.static(...)); // Serves static files\napp.use(express.errorHandler(...));\
    \ // Reports exceptions if any\n```\n\nYou have a certain amount of control over\
    \ the execution of other layers of middleware. This control is given to you via\
    \ the `next()` function, which is usually passed as the third parameter to your\
    \ callbacks. Before this point, we were ignoring the third parameter:\n\n```javascript\n\
    app.get('/', function(req, res) {\n  …\n});\n```\n\nTo receive the callback, simply\
    \ add a parameter like this:\n\n```javascript\napp.get('/', function(req, res,\
    \ next) {\n  …\n});\n```\n\nThe execution of the request stops on the middleware\
    \ that decided not to call `next()`. Ignoring `next()` means that the middleware\
    \ decided to return the result, and it doesn't want to pass the execution to lower\
    \ levels.\n\nTake a look at Listing 10-27, which demonstrates how this trick can\
    \ be used to implement some crazy content filtering. Let's say that there's a\
    \ very special static page that we will show only to the user who has taken at\
    \ least ten turns. We could add a route to match that page address and check the\
    \ security restriction in it.\n\n**Listing 10-27.** *Passing Control Through Layers*\n\
    \n```javascript\napp.get('/prize.html', function(req, res, next) {\n  if (req.session.totalTurns\
    \ && req.session.totalTurns > 10) {\n    next();\n  } else {\n    res.send(\"\
    Not enough clicks yet!\");\n  }\n});\n```\n\nWhen the router receives a request\
    \ to `/prize.html`, it checks for the number of turns that the user made. This\
    \ value is stored in the session. If the value is more than ten, we simply call\
    \ `next()`. By doing so, we allow other middleware to do its work. Otherwise,\
    \ if the number of clicks is not enough, we simply handle the request ourselves.\
    \ Since we don't call `next()`, the request processing stops here and static middleware\
    \ will not even know that the user was trying to get the page. This trick is only\
    \ possible when your router stands above static in the stack. Otherwise, you will\
    \ not be able to filter requests, since static serves the content before you do\
    \ it.\n\nIf you encounter an error in your layer of middleware and decide to let\
    \ it go, you should pass the error as an argument to the `next()` function. The\
    \ error is then caught and processed by one of the registered error handlers.\
    \ Read on to learn how it works.\n\n## Housekeeping\n\nThe final part of this\
    \ chapter is devoted to the small but useful housekeeping."
