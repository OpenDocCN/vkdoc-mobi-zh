    });\n\napp.listen(80);\n```\n\n现在代码的功能应该非常明显了。唯一不同的是我们在响应中额外发送了一个 `Content-Type`\
    \ 头。在清单 10-14 中，我们传递的文本是随 `Content-Type: text/html`（这是 Express 在未明确指定 `Content-Type`\
