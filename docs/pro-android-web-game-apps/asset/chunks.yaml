    .animate(\"move \", 0, 0, 15)\n```\n\n这段代码表示：“获取骑士组件的精灵表，并创建一个名为`move`的动画序列。”该序列从单元格`(0,\
    \ 0)`（图像的左上角）开始，向右循环15帧。如果这个概念听起来有点模糊，图14-11应该能使其清晰（图像仅显示15帧中的5帧）。\n\n**图14-11.**\
    \ *Crafty 处理动画序列的方式：第一个参数是“锚点”帧的坐标，最后一个参数是序列中的帧数。*\n\n创建动画序列后，您可以立即执行它，如清单14-9所示。\n\
