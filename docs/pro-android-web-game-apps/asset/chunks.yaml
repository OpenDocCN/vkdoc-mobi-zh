    \ WebGL 如何处理这些数据。`Buffer` 是在脚本与管线之间传递信息的主要方式，因此理解其工作原理至关重要。\n\n你需要做的第一件事是声明新的缓冲：\n\
    \n```javascript\nvar vertexBuffer = gl.createBuffer();\n```\n\n`vertexBuffer`\
    \ 就像一个指向其他地方（例如显卡内存中）实际创建的缓冲的指针。在 WebGL 中，所有与缓冲相关的操作都是针对当前活动缓冲执行的。例如，要上传几何数据，我们首先必须激活一个缓冲：\n\
    \n```javascript\ngl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);\n```\n\n第一个参数是缓冲类型。WebGL\
