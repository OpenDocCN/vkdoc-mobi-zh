  trans: "\n让我们回到之前提到的钩子函数。在 `Animator` 的默认实现中，这些函数是空的，但它们的主要用途是让你有机会通过自己的酷炫功能对其进行扩展。\n\
    \n让我们再次利用精灵对象，创建一个 `Animator` 的扩展版本，使其能够自动设置对象的某些属性；例如，将任意对象的高度从 30 像素更改为 150\
