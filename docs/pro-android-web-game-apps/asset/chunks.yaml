    // 代码未修改\n\n// 为纹理坐标初始化一个额外的缓冲区\n\nmodel.textureCoordsBuffer = gl.createBuffer();\n\
    \ngl.bindBuffer(gl.ARRAY_BUFFER, model.textureCoordsBuffer);\n\ngl.bufferData(gl.ARRAY_BUFFER,\
    \ new Float32Array(model.textureCoords),\n\ngl.STATIC_DRAW);\n\n}\n```\n\n纹理坐标是介于\
    \ 0 和 1 之间的值，并非精确的像素坐标。这是一种相当便捷的方式——坐标不依赖于纹理的大小。你可以使用任意大小的纹理（例如 256×256、512×512、1024×1024\
    \ 或任意尺寸），而无需修改代码。查找纹理中匹配像素的具体工作由 WebGL 负责。\n\n## 更新着色器\n\n现在该更新着色器了。与颜色类似，纹理坐标是与顶点关联的值。你需要创建一个额外的\
    \ `varying` 变量，并将坐标传递给片段着色器（参见清单 9-20）。\n\n**清单 9-20.** *将纹理坐标传递给片段着色器的顶点着色器*\n\
    \n```\nattribute vec3 pos;\n\nattribute vec2 aTex;\n\nuniform mat4 uMVMatrix;\n\
    \nuniform mat4 uPMatrix;\n\nvarying vec2 vTex;\n\nvoid main(void) {\n\ngl_Position\
    \ = uPMatrix * uMVMatrix * vec4(pos, 1.0);\n\nvTex = aTex;\n\n}\n```\n\n片段着色器接收坐标，但同时还需要图像数据来获取颜色。在\
    \ `GLSL` 中，有几个称为“`sampler`（采样器）”的特殊对象，它们类似于像素信息存储单元。你可以将采样器视为 `GLSL` 内部的图像。纹理不会随顶点变化，因此采样器是\
    \ `uniform` 类型的（参见清单 9-21）。\n\n**清单 9-21.** *从纹理为像素分配颜色*\n\n```\nprecision mediump\
    \ float;\n\nvarying vec2 vTex;\n\nuniform sampler2D uSampler;\n\nvoid main(void)\
    \ {\n\ngl_FragColor = texture2D(uSampler, vTex);\n\n}\n```\n\n如你所见，从纹理分配颜色非常简单。有一个内建函数\
    \ ——`texture2D()`—— 它接收采样器和纹理坐标，并返回匹配的颜色。\n\n## 将纹理数据传递给片段着色器\n\n最后一步是注册新的属性（`aTex`）和新的\
    \ `uniform` 变量（`uSampler`），并将纹理数据传递给着色器程序（参见清单 9-22）。\n\n**清单 9-22.** *将纹理数据传递给顶点着色器*\n\
    \n```\ngl.activeTexture(gl.TEXTURE0);\n\ngl.bindTexture(gl.TEXTURE_2D, model.texture);\n\
    \ngl.uniform1i(samplerUniform, 0);\n```\n\n最终呈现的是一个漂亮的纹理立方体，如图 9-10 所示。\n\n![](img/index-395_1.jpg)\n\
    \n**图 9-10.** *带纹理的立方体*\n\n文件 `04.texture.html` 是展示纹理立方体的代码最终版本。\n"
