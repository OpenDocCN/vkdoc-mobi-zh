    \ 的独立类。绘制形成网格的一组方形瓦片的基本代码非常简单。要基于瓦片地图渲染世界，我们需要知道三件事：\n\n-   地图数据（刚刚保存在 `world.js`\
    \ 文件中的数组）\n-   用于提取瓦片的图像\n-   瓦片的大小\n\n我们使用矩形瓦片，因此不需要宽度和高度；仅需一个参数就足够了——`tileSize`。`MapRenderer`\
    \ 类的构造函数看起来相当简单（见代码清单 6-3）。\n\n**代码清单 6-3.** `MapRenderer` 的构造函数\n\n```javascript\n\
