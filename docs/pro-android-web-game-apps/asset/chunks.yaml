    ## Loading Models


    The cube is a basic 3D shape that has been used like the Hello World example for
    ages. In a real 3D demo or game, however, the cube has somewhat limited use. Let’s
    learn how to use other 3D models within the WebGL application. We will start with
    looking at different types of 3D models and the tools to work with them. Then
    we’ll learn how to load the model to your application.


    ### 3D Models Overview


    There are two types of 3D models: high-polygon (`hi-poly`) models and low-polygon
    (`low-poly`) models. Generally, `hi-poly` models are used for static rendering.
    For example, a model of an ancient vase that has 10,000 triangles looks gorgeous,
    but a mobile processor will never render it fast enough to use in a game. `Low-poly`
    models are the models for games. They have significantly fewer polygons, and they
    are created specifically for real-time 3D applications. So what you need, obviously,
    is a `low-poly` model.


    To display an arbitrary 3D model in WebGL, you need at least the coordinates of
    vertices and an array of faces. If the model is textured, you also need the coordinates
    of the texture for each vertex. The best option is to convert the existing model
    into the JSON format and use it in your script, just as we used the model of the
    cube. Since WebGL is gaining popularity, there are several tools to do this. Most
    of them convert models from the Wavefront (`.obj`) or Collada (`.dae`) format
    to JSON because these formats are among the simplest for parsing. `OBJ` files
    store data as plain text with a minimum amount of meta information. `DAE` files
    are XMLs, so it is not hard to convert them to another text format, such as JSON.
    Some game engines load `DAE` models straightaway, without the intermediate step
    of converting them.


    What if your model is not in OBJ or DAE format? You can use a 3D editing tool
    to convert between formats. `Blender` [(www.blender.org)](http://www.blender.org)
    is a free 3D editor that has many custom plug-ins to work with 3D models. Figure
    9-11 shows a screenshot of one of the free models loaded in Blender.


    **Figure 9-11.** *A space frigate loaded in Blender*


    On Blender’s official tutorial page at [www.blender.org/education-help/](http://www.blender.org/education-help/),
    you can find more information about Blender and how to use it to load and convert
    a 3D model.


    Sometimes, instead of creating a JSON representation, it is much more convenient
    to load the model in the original format. One of the reasons is the size of the
    resulting file. A model of a character saved in the binary format (`MD2`) is only
    around 218 KB, while the same model converted to JSON is 6 MB. Even zipping the
    model doesn’t help a lot; a zipped JSON is still ten times bigger than the original
    binary model.


    On the other hand, parsing binary data on the client side is a rather heavyweight
    operation, both in terms of processing and in terms of coding. The task is considered
    ‘ advanced’’ since the data that is fed to WebGL must still be in the form of
    JavaScript arrays; so to load the 3D model in a custom format, you must write
    your own parser.


    ### Working with Binary Data


    In this section, I show you some very basic techniques on dealing with binary
    data. Binary files can store all kinds of information: music, pictures, databases,
    and so forth. Sometimes it is quite useful to be able to parse them in JavaScript.


    We will look at the example of the `MD2` file parser — an old format for animated
    characters that was used in Quake II [(http://en.wikipedia.org/wiki/MD2_file_format)](http://en.wikipedia.org/wiki/MD2_file_format).
    The goal is not to dive deep into the specifics of the format, but to learn the
    general principles of parsing such files. If you are curious about the whole implementation,
    the source code for the `MD2` parser is included with the source code for this
    chapter.


    The main problem with working with binary data is that our target devices’ in-'
