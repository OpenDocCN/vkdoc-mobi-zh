  raw: 'Uncomment the commented line, rebuild the application, and run it. Don’t forget


    to start the Node server before you start the app! The multiplayer version of
    Four


    Balls is now a native application too.


    Final Touches: Name, Icon, and Fullscreen Mode


    The native application is almost ready for distribution. Let’s add a couple final


    touches to make it look even better. First, the name of the game that shows in


    the application list doesn’t look nice----it is the name of the main activity----


    FourBal s----camel case and no spaces (it was automatically generated for us).


    To change the name, find the res/values/strings.xml file and add a space in


    the "app_name" (see Listing 15-6).


    **Listing 15-6.** *Adding a Human-Readable Name for the Application*


    <?xml version="1.0" encoding="utf-8"?>


    <resources>


    <string name="app_name">Four Balls</string>


    </resources>


    If you rebuild and install the app, the name looks much better.


    Now let’s deal with the icon. The default Android app icon is a humble


    placeholder that should be used only during early development. In production,


    the app must have its own attractive icon. Android has its own guidelines on


    how to style it [at http://developer.android.com/guide/practices/](http://developer.android.com/guide/practices/)


    ui_guidelines/icon_design_launcher.html. It is a good idea to give this link to


    your designer before asking him to make a set of icons.


    The icon must be a 32-bit PNG with an alpha channel. Android runs on a large


    variety of different devices that have different screens in terms of size and


    density. That’s why an icon for a production-level game should be created in


    several resolutions: 36 × 36, 48 × 48, 72 × 72, and 96 × 96 for extra-high-density


    screens (only if your target is Android 2.3 or higher). Create a simple image
    on a


    transparent background and save it for each resolution, or use the one that


    comes along with the chapter materials. Now create four new subfolders in res


    and put the corresponding icon file in each one:


     res/drawable: 48 × 48 (the default; you can leave only this


    folder, but in this case, the icon is resized to match a particular


    density and may not look good for all resolutions)


     res/drawable-hdpi: 72 × 72 (high)


     res/drawable-mdpi: 48 × 48 (middle)


    ![](index-582_1.jpg)


    ![](index-582_2.jpg)


    CHAPTER 15: Building Native Applications


     res/drawable-ldpi: 36 × 36 (low)


    Also, if you are going to publish your application on Google Play, create a high-


    res 512 × 512 icon and save it in a project folder for now. We will use it in
    the


    next section. The res folder should now look like Figure 15-6.


    **Figure 15-6.** *Icons of different sizes are placed into the appropriate folders*
    Modify the following line in the AndroidManifest.xml:


    <application android:label="@string/app_name" android:icon="@drawable/icon"> Android
    automatically uses the correct icon depending on the screen density.


    Rebuild the application and enjoy the new look, shown in Figure 15-7!


    Download from Wow! eBook <www.wowebook.com>


    **Figure 15-7.** *A custom icon makes the application look better*


    CHAPTER 15: Building Native Applications


    **583


    The final improvement is to hide the standard Android status bar. Game


    applications usually work in fullscreen mode. We already got rid of the browser


    address bar, and the next step is to gain a few more pixels by hiding the status


    bar too. Open FourBalls.java and add the lines shown in bold in Listing 15-7.


    **Listing 15-7.** *Enabling Fullscreen Mode for the Application*


    package com.juriy.fourballs;


    import android.app.Activity;


    import android.os.Bundle;


    import org.apache.cordova.*;


    import android.view.WindowManager;


    public class FourBalls extends DroidGap {


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    [super.loadUrl("file:///android_asset/www/index.html");](file:///android_asset/www/index.html)


    getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,


    WindowManager.LayoutParams.FLAG_FULLSCREEN |


    WindowManager.LayoutParams.FLAG_FORCE_NOT_FULLSCREEN);


    }


    }'
