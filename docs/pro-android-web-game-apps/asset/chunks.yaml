    ctx.fillStyle = "green";


    break;


    }


    ctx.beginPath();


    ctx.arc((j+0.5)*cellSize, (i+0.5)*cellSize, cellSize/2 - 5, 0,


    2*Math.PI, false);


    ctx.fill();


    ctx.stroke();


    }


