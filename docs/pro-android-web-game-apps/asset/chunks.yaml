    production\", function() {\n    loggerStream = fs.createWriteStream(__dirname\
    \ + \"/node.log\", { flags: 'a'});\n    app.use(express.logger({\n        format:\
    \ \"default\",\n        stream: loggerStream\n    }));\n});\n\n// For development,\
