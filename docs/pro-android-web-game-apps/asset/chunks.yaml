    The second line listens to the "connection" event that is triggered for every
    newly established connection. Note that the Socket.IO connection has nothing


    to do with Express sessions. For example, if you open two tabs in Google


    Chrome and access the same page, they share the same Express session (since


    they share a session ID stored in cookies) but Socket.IO recognizes them as two


    different sockets. The API passes the socket object as the parameter to the


    function.


    The next two lines make a new object with some user information to have a


    human-readable way of identifying users. Each user has an ID and a unique


    default name. If your game has the authentication and authorization algorithms,


    you would probably get the user name from the database, or from the social


    networking API, but in this simple example, all users are called User 1, User
    2,


    and so on.


    The most interesting parts of the code are two calls to emit() and broadcast().


    In the first line, we send the message to the user who just connected (or, in


    terms of Socket.IO, we emit the event) with the "info" type and some object with
    the greeting text. The second line ‘ broadcasts’ the event-----or sends the


    message to all other users, except the connected one. The final part listens to


    the "disconnect" event and once again, broadcasts the message to notify the other
    players about the change in the lobby.


    Let’s build the client now. Look at Listing 12-3 for the client-side code. As
    usual, this is a simple web page; however, it has a little bit of Socket.IO magic.


    CHAPTER 12: Making Multiplayer Games


    **Listing 12-3.** *The Client for Socket.IO Server*


    <!DOCTYPE html>


    <html lang="en">


    <head>


    <meta charset="utf-8" />


    <meta name="viewport"


    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,


    user-scalable=no, target-densitydpi=device-dpi"/>


    <style>


    html, body {


    overflow: hidden;


    width: 100%;


    height: 100%;


    margin:0;


    padding:0;


    border: 0;


    }


    </style>


    <script src="js/utils.js"></script>


    <script src="/socket.io/socket.io.js"></script>


    <script>


    var socket;


    function init() {


    socket = io.connect();


    socket.on("user-joined", function (user) {


    console.log (user.name + " joined");


    });


    socket.on("user-left", function (user) {


    console.log (user.name + " left");


    });


    socket.on("info", function (info) {


    console.log (info.text);


    });


    }


    </script>


    </head>


    <body onload="init()">


    </body>


    </html>


    The code in Listing 12-3 uses exactly the same approach as the server. It


    retrieves the socket object and uses it as the single entry point of


    CHAPTER 12: Making Multiplayer Games


    **489


    communication with the server. The socket is then used to listen to messages,


    or to emit new ones (more about this later). Note that there’s no file called


    "/socket.io/socket.io.js" on the server. Socket.IO server handles the


    requests to this script and returns the file itself, so you don’t have to worry


    about it. That code looks incredibly simple and clean!


    **NOTE:** A few years ago, I had to implement a custom browser-networking library
    that relied only on two transport implementations: XHR long-polling and XHR streaming.
    It took me about three weeks to build the server and the reliable client that
    did exactly the same trick as we just built in three minutes.


    Now you can try this code out. It doesn’t have any UI elements so far, but the


    expected console output proves that you’ve done everything right, and you have


    a very basic Hello World application working.


    The code for the application at the current state is available along with the
    other


    materials for this chapter is a folder called 01.basic_io.


    Adding the Lobby Screen to the Game


    We have established the basic communication, now we should make a lobby


    screen. Writing messages to the console is not a particularly good way to notify


    users about game events.'
