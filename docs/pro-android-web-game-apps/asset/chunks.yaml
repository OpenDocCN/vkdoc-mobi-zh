    \ gNode) {\n    this._name = name;\n    this._threshold = threshold;\n    this._leNode\
    \ = leNode;\n    this._gNode = gNode;\n}\n\nNumericDecision.prototype.execute\
    \ = function(agent) {\n    var node = agent[this._name] > this._threshold ? this._gNode\
