- fmt: '# Chapter 4. They are rendered in a different way than tiled terrain. Terrain
    tiles are uniform—they all have the same size. World objects can have different
    sizes—some of them are bigger, others are smaller. That’s why world objects cannot
    be aligned into the grid as easily as tiles. In this section, we learn the basics
    of rendering the object of a game world. We cover only the basic topics; the next
    chapter presents a more advanced solution.


    ## Coordinate Systems


    When we work with objects, it doesn''t make much sense to treat them in terms
    of screen coordinates as we did for the map. It is much more convenient to speak
    about objects in terms of world coordinates. For example, it is natural to say
    that the object has moved when it moved inside of the world and changed its position
    relative to the map, rather than moved as the result of scrolling. But world coordinates
    are not enough to render the object. We need to pass the screen coordinates to
    the rendering function to display the sprite in a proper position. This way, a
    game object "lives" in several coordinate systems at a time. Two coordinate systems
    that we just described are the coordinates of the world and the coordinates of
    the screen. Figure 6-11 illustrates this concept.


    **Figure 6-11.** The two coordinate systems for the game object: dashed arrows
    are screen coordinates; solid arrows are world coordinates.


    We need to use several different coordinate systems and be able to quickly translate
    the coordinates from one system to another one. If the tree is in (1270, 930)
    of the world coordinates, where should we draw it on the screen? Is it visible
    at all? This is an example of translating world coordinates to screen coordinates.
    The opposite example—when the user tapped the screen at (50, 120) and we need
    to tell if there is a tree under the tap. In this case, we need to translate from
    screen coordinates to the world coordinates, and check if there is a tree in a
    given world position.


    The top-down view, like the one that we are exploring right now, is the easiest
    view for translating between coordinates. For example, to transform from screen
    coordinates to world coordinates, we can write:


    ```

    worldX = screenX - mapX;

    worldY = screenY - mapY,

    ```


    Where `mapX` and `mapY` are the current position of the map on the screen. `MapRenderer`
    for example, stores them as `this._x` and `this._y`.


    The reverse translation, from world coordinates to screen coordinates, is easy
    too:


    ```

    screenX = worldX + mapX;

    screenY = worldY + mapY,

    ```


    Sometimes you also need to get the position of the tile in the world array given
    the click coordinates or world coordinates. For example, a user clicks a map to
    build a barracks and the game needs to check the type of the terrain under the
    click. If the user clicked a water tile, we shouldn''t allow him to build something
    there. This third coordinate system that is often used is called tile coordinates.
    The translation formula is very simple too:


    ```

    tileX = Math.floor((screenX - mapX) / tileSize);

    tileY = Math.floor((screenY - mapY) / tileSize);

    ```


    As you see, these calculations are not hard at all. That''s because the world
    space is very similar to the screen space. This is not always true, however. For
    example, the calculations for isometric worlds, constructed from diamond or hex
    tiles, are somewhat more involved.


    **NOTE:** The coordinate systems are often called *spaces* in game development.
    For example, the rather wordy phrase "translating from the system of coordinates
    of the screen to the system of coordinates of the world" is often called simply
    "translating from the screen space to the world space." We will use these terms
    interchangeably.


    ## Implementing `WorldObjectRenderer`


    Now we are ready to implement the `WorldObjectRenderer` class that handles the
    drawing of the objects on the screen. Let''s start with the helper class called
    `WorldObject` that represents the simple drawable entity like a tree or a rock.
    The code is shown in Listing 6-16.'
  raw: 'Chapter 4\. They are rendered in a different way than tiled terrain. Terrain
    tiles are uniform----they al have the same size. World objects can have different
    sizes----


    some of them are bigger, others are smaller. That’s why world objects cannot be


    aligned into the grid as easily as tiles. In this section, we learn the basics
    of


    rendering the object of a game world. We cover only the basic topics; the next


    chapter presents a more advanced solution.


    Coordinate Systems


    When we work with objects, it doesn’t make much sense to treat them in terms


    of screen coordinates as we did for the map. It is much more convenient to


    speak about objects in terms of world coordinates. For example, it is natural
    to


    say that the object has moved when it moved inside of the world and changed


    its position relative to the map, rather than moved as the result of scrolling.
    But


    world coordinates are not enough to render the object. We need to pass the


    screen coordinates to the rendering function to display the sprite in a proper


    position. This way, a game object ‘‘lives’ in several coordinate systems at a


    time. Two coordinate systems that we just described are the coordinates of the


    world and the coordinates of the screen. Figure 6-11 illustrates this concept.


    **Figure 6-11.** *The two coordinate systems for the game object: dashed arrows
    are screen coordinates;* *solid arrows are world coordinates.*


    CHAPTER 6: Rendering Virtual Worlds


    **241


    We need to use several different coordinate systems and be able to quickly


    translate the coordinates from one system to another one. If the tree is in (1270,


    930) of the world coordinates, where should we draw it on the screen? Is it


    visible at all? This is an example of translating world coordinates to screen


    coordinates. The opposite example----when the user tapped the screen at (50,


    120) and we need to tell if there is a tree under the tap. In this case, we need
    to


    translate from screen coordinates to the world coordinates, and check if there
    is


    a tree in a given world position.


    The top-down view, like the one that we are exploring right now, is the easiest


    view for translating between coordinates. For example, to transform from screen


    coordinates to world coordinates, we can write:


    worldX = screenX – mapX;


    worldY = screenY - mapY,


    Where mapX and mapY are the current position of the map on the screen.


    MapRenderer for example, stores them as this._x and this._y.


    The reverse translation, from world coordinates to screen coordinates, is easy


    too:


    screenX = worldX + mapX;


    screenY = worldY + mapY,


    Sometimes you also need to get the position of the tile in the world array given


    the click coordinates or world coordinates. For example, a user clicks a map to


    build a barracks and the game needs to check the type of the terrain under the


    click. If the user clicked a water tile, we shouldn’t allow him to build something


    there. This third coordinate system that is often used is called tile coordinates.


    The translation formula is very simple too:


    tileX = Math.floor((screenX - mapX) / tileSize);


    tileY = Math.floor((screenY - mapY) / tileSize);


    As you see, these calculations are not hard at all. That’s because the world


    space is very similar to the screen space. This is not always true, however. For


    example, the calculations for isometric worlds, constructed from diamond or hex


    tiles, are somewhat more involved.


    **NOTE:** The coordinate systems are often called *spaces* in game development.
    For example, the rather wordy phrase “translating from the system of coordinates
    of the


    screen to the system of coordinates of the world” is often called simply “translating
    from the screen space to the world space.” We will use these terms interchangeably.


    CHAPTER 6: Rendering Virtual Worlds


    Implementing WorldObjectRenderer


    Now we are ready to implement the WorldObjectRenderer class that handles the


    drawing of the objects on the screen. Let’s start with the helper class called


    WorldObject that represents the simple drawable entity like a tree or a rock.
    The


    code is shown in Listing 6-16.'
