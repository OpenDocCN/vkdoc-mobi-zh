    ## Notes on Implementation


    The exact implementation of the algorithm might vary a lot, depending on the game
    that you are building. For example, in tactic games, where units move within a
    square grid, you do not really need a waypoint graph. The grid itself plays the
    role of the graph. Every tile has exactly four connections: east, west, north,
    and south (or eight if you allow moving diagonally), and it is easy to predict
    which tile is next to the current one. If the tile is marked as a ''wall'', there
    is no connection in that direction. Figure 13-12 shows an example of such a game
    world.


    The weight of the move is usually constant too. The distance is calculated differently:
    Euclidian distance doesn''t work because you do not allow the character to move
    straight through the tiles. The distance that is used in this case is called a
    Manhattan distance. It represents the world where you can only move along an axis
    — like in the city of Manhattan, where you drive through a grid of streets and
    avenues but not through the skyscrapers. Manhattan distance is calculated by the
    formula `|x2 - x1| + |y2 - y1|`. For that kind of pathfinding, you can stick with
    the much easier implementation of the A* algorithm.


    **Figure 13-12.** *A game world based on square tiles can survive without graphs
    for pathfinding.*


    Lastly, the implementation has a line that can be a performance killer on large
    graphs:


    ```

    var currentNode = openList.sort(function(a, b) {return a.estimatedCost - b.estimatedCost})[0];

    ```


    The problem is that sorting an array of open nodes may be terribly slow on large
    graphs with thousands of nodes (on small maps you will not notice the difference).
    If you need an efficient algorithm, you should look for the data structure that
    holds the elements presorted. For example, the priority queue implementation based
    on the binary tree. The discussion of these algorithms is out of the scope of
    this chapter, but you can easily find several nice implementations on the Internet.
    The small library at `https://github.com/vadimg/js_bintrees` is a good place to
    start.


    ## Methods of Building the Pathfinding Graph


    The correctly built pathfinding graph is the key to intelligent AI movement. There
    are many approaches to building a graph, and this section is a brief overview
    of some of them.


    - Full manual graph: You set the coordinates of the nodes and connections yourself.

    - The line-of-sight approach: Allows you to set only node positions and calculate
    the connections based on the level geometry.

    - The navmesh: The nodes of the graph are polygons rather than points.


    ### Full Manual Graph


    The first way of creating a graph manually is to define every node and connection
    by hand and then let the character pick the node that is closest to him. For a
    game with large levels, this approach can be rather inefficient, since the game
    designer must be very careful while placing nodes. Figure 13-13 shows a possible
    problem: the character picks the closest node, but there is a wall in the way.


    **Figure 13-13.** *On the left, the problem with a naïve pathfinding graph: due
    to the mistake of the level designer, the character attempts to move through the
    wall to reach the node. The corrected version is on the right.*'
