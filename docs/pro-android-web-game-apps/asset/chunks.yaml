  trans: '

    # 第 8 章：浏览器中的 3D 技术


    本章将涵盖以下主题：


    - 3D 渲染的基础知识：如何在平面屏幕上呈现立体图形

    - 矩阵代数基础：3D 技术背后的主要机制

    - 透视与投影：让场景看起来更自然


    本章的目标是构建一个能够渲染 3D 模型线框的简单演示。我们将从最简单的形状——立方体开始。


    ## 认识 3D 渲染


    那么，究竟什么是 3D？它与我们前几章看到的常规 2D 图形有何不同？3D 图形和动画一样，都是一种幻觉。当你渲染动画时，你是在快速切换帧，从而产生物体在移动的感觉。但实际上，这个过程并不涉及物理移动。像素停留在各自的位置，只是改变颜色，然而屏幕上的图形看起来却在移动。


    渲染 3D 场景的工作原理与此类似。显示器本身是平面的，但我们通过一种渲染方式，让用户感觉自己正通过一扇窗户观察一个 3D 世界。现在，你肯定会问一个常见问题：如果
    3D 本质上是 2D 的一个特例，而且我们已经知道如何处理 2D 场景，为什么不直接用 Canvas 2D 上下文来绘制 3D 场景呢？这是个很合理的问题。事实上，我们可以仅使用
    Canvas 构建一个非常简单的 3D 引擎，但我们会面临两个主要问题。


    首先是此类项目涉及的工作量和数学计算量。3D 引擎和 2D 引擎背后的数学原理和优化方法有着数量级的差异。但即使你花上几年的时间学习 3D 相关知识并将其实现为一个
    3D 引擎，你还会遇到第二个关键问题：实现自定义 3D 渲染所需的处理能力。


    自从玩家、游戏开发商和硬件制造商意识到 3D 很酷以来，他们也明白 CPU 并不擅长渲染 3D。因此，他们决定添加专门负责 3D 计算的显卡芯片。这些硬件通常比
    CPU 更昂贵，并且专注于 3D 图形。在浏览器的 JavaScript 中，你无法直接访问 GPU（图形处理器）并发送渲染指令。


    自然进化过程旨在让游戏看起来尽可能逼真。目前唯一限制我们在智能手机上运行《上古卷轴：天际》的因素，当然是便携式硬件的处理能力。与常规 2D 引擎相比，3D
    引擎需要更多的处理时间。在 2D 引擎中，渲染工作相对简单：从图像中获取像素，复制到 Canvas；如果涉及透明度，则计算合成颜色。而对于 3D 引擎来说，难度就大得多，其底层数学计算也更复杂。这就是直到最近浏览器（无论是桌面端还是移动端）才原生支持
    3D 的原因之一。


    本章专门讨论在浏览器中开发 3D 应用。有一个被称为`WebGL`的 API，旨在成为浏览器中 3D 的“标准”实现。目前，`WebGL`在移动市场才刚刚起步。支持它的
    Android 智能手机和平板电脑的浏览器只有 Firefox Mobile（至少在撰写本文时是如此）。索尼 Xperia PLAY 的原生浏览器支持`WebGL`。由于`WebGL`在桌面浏览器中大规模普及，很明显，很快我们将在许多移动设备上看到这个出色的
    API。


    当更多设备能够在良好水平上处理 3D 时，毫无疑问，我们的浏览器中将出现 3D 游戏。这就是为什么对于游戏开发者来说，了解 3D 渲染的工作原理以及在自己的项目中实现它所需的条件至关重要。本章致力于介绍
    3D 背后的通用概念，并作为进入第 9 章的温和铺垫，在第 9 章中我们将学习`WebGL`的基础知识。

