    that the user clicked a certain tile, while ObjectLayer can emit objectClicked----


    an event specific to its domain.


    Each game object has a unique ID. This ID is useful for many things-----from


    network synchronization (determine exactly which one of ten buildings is now


    destroyed) to small but important things like debugging. The code for the


    GameObject class uses a global counter to keep track of the maximum ID issued


    to the game objects, and increments it for every subsequent constructor call.


    **Arrays**


    The final utility class groups a small set of tools to make working with arrays
    at


    least a little easier. JavaScript has very poor support for array operations;
    even


    such simple functions like contains() and remove() that are typically present


    out of the box in other languages are absent in JavaScript. We will need only


    three helper methods. This class, shown in Listing 7-5, is so tiny that I put
    it


    straight into the utils.js.


    **Listing 7-5.** *The Array Class: The Tiny Collection of Helper Methods to Make
    Array Operations Easier* var Arrays = {


    remove: function(obj, arr) {


    var index = arr.indexOf(obj);


    if (index != -1)


    arr.splice(index, 1);


    },


    contains: function(obj, arr) {


    return arr.indexOf(obj) > -1;


    },


    addIfAbsent: function(obj, arr) {


    if (!Arrays.contains(obj, arr)) {


    arr.push(obj);


    }


    }


    };


