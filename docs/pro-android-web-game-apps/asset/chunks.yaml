    \n继承是面向对象编程的核心概念之一。它允许复用定义在“父”对象中的通用功能，并通过“子”对象的特定功能进行扩展。让我们看一个操作多种不同类型汽车的应用示例：消防车、赛车和冰淇淋车。所有这些汽车都有共同特征：它们都能移动、转弯和停止。但每类汽车都有其专属的特殊功能：消防车可以旋转水炮，赛车可以漂移，冰淇淋车可以播放旋律。图\
    \ 1-14 展示了这一架构。\n\n![](img/index-41_1.jpg)\n\n第 1 章：入门指南\n\n**图 1-14.** *继承的概念。“父类”（`Car`）定义了通用方法，而“子类”（`FireTruck`、`RacingCar`\
    \ 和 `IceCreamVan`）仅定义特定的扩展功能。*\n\n如你所见，原型链的作用完全相同：它允许你复用上层原型中的方法和变量。\n\n让我们从两个构造函数的代码开始，它们定义了所需的方法（见清单\
    \ 1-6）。\n\n**清单 1-6.** *继承的基本设置*\n\n```javascript\nfunction Car(color) {\n  this._color\
    \ = color;\n}\n\nCar.prototype.move = function() {\n  console.log(this._color\
    \ + \" car moves\");\n};\n\nCar.prototype.turn = function(direction) {\n  console.log(this._color\
    \ + \" car turns \" + direction);\n};\n\nCar.prototype.stop = function() {\n \
    \ console.log(this._color + \" car stops\");\n};\n\nfunction FireTruck() {}\n\n\
    FireTruck.prototype.turnCannon = function(direction) {\n  console.log(\"Cannon\
    \ moves to the \" + direction);\n};\n\n// 以某种方式将 FireTruck 和 Car 的原型链接到原型链中\n\
    var truck = new FireTruck();\n\n// 这将不会生效，因为 Car.prototype 尚未出现在 truck 对象的原型链中，\n\
    // 所以方法 move() 不可用\ntruck.move();\ntruck.turnCannon(\"right\");\n```\n\n**注意：**\
    \ 如你所见，代码使用 `console.log` 来追踪执行过程。要了解如何在移动端和桌面浏览器中捕获控制台输出，请参考附录 A。\n\n这段代码将无法运行。`truck.move()`\
    \ 调用会导致错误，因为 `move` 方法对 `FireTruck` 不可用。修复这段代码并将 `Car` 加入原型链出奇地简单。JavaScript 中有一个特殊方法叫做\
    \ `Object.create(proto, properties)`。它会创建一个新的空对象，并将其原型设置为函数的第一个参数 `proto`。清单 1-7\
    \ 展示了如何修复代码。\n\n**清单 1-7.** *修正后的继承*\n\n```javascript\nfunction FireTruck() {}\n\
    \nFireTruck.prototype = Object.create(Car.prototype);\n\n// 为了保险起见做一下检查\nconsole.log(Object.getPrototypeOf(FireTruck.prototype)\
    \ === Car.prototype);\n// true\n```\n\n下载自 Wow! eBook <www.wowebook.com>\n```"
- fmt: "```javascript\n// Now the Car.prototype is added to the chain\n\nFireTruck.prototype.turnCannon\
    \ = function(direction) {\n  console.log(\"Cannon moves to the \" + direction);\n\
    };\n\nvar truck = new FireTruck();\n\n// Will now work, because the Car.prototype\
    \ is in the prototype chain\n// of the truck object\ntruck.move();\ntruck.turnCannon(\"\
    right\");\n```\n\nThe example now runs, but the output is still somewhat wrong.\n\
    \n```\ntrue\nundefined car moves\nCannon moves to the right\n```\n\n# CHAPTER\
    \ 1: Getting Started\n\nThe color of the car is set in the `Car` constructor.\
    \ The constructor itself was not executed, and the color left `undefined`. This\
    \ issue is easy to fix too. Alter the `FireTruck` constructor and add the call\
    \ to the `Car` constructor in it. This way we allow the `Car` to initialize its\
    \ own variables of the object.\n\n```javascript\nfunction FireTruck() {\n  Car.call(this,\
    \ \"red\");\n}\n```\n\nRun the code again and enjoy the correct output.\n\nEven\
    \ though the code works, it has a tiny issue that needs solving. When you create\
    \ the new function, its `prototype` property is not empty. It has one property\
    \ called `constructor` that refers back to the function itself. When we call\n\
    \n```javascript\nFireTruck.prototype = Object.create(Car.prototype);\n```\n\n\
    this property is lost since the newly created object doesn't have its own properties.\
    \ We can pass the missing property as the second argument to `create`.\n\n```javascript\n\
    FireTruck.prototype = Object.create(Car.prototype, {\n  constructor: {\n    value:\
    \ FireTruck, // the same as FireTruck.prototype.constructor\n    enumerable: false,\n\
    \    writable: true,\n    configurable: true\n  }\n});\n```\n\nThe `constructor`\
    \ is not the usual property. It doesn't appear when you loop through the keys\
    \ of the object, but it is available if you access it directly by name. We can\
    \ achieve the same result by passing the property descriptor to the second argument\
    \ of `create()`. Descriptor has several fields, as follows:\n\n- `value`: The\
    \ initial value\n- `enumerable`: If property should appear in the list of object\
    \ properties; in loops like `for… in` or `Object.keys`\n- `writable`: If property\
    \ can be assigned a different value\n- `configurable`: True if the rules described\
    \ with the descriptor can be changed or the property can be deleted\n\nThis way\
    \ we mimic the behavior of the real constructor, preserving the structure of the\
    \ prototype that ECMA (European Computer Manufacturers Association, an organization\
    \ responsible for the standards behind JavaScript) specification defines. This\
    \ is the practical implementation of the coding principle described earlier: preserve\
    \ the structure of the object. Even if you don't know why this property might\
    \ ever be required, you must keep it.\n\nLet's look at **Listing 1-8**, the final\
    \ version of the example. It shows how to implement inheritance and build custom\
    \ prototype chains. The code for inheritance is moved into the separate function.\
    \ Doing so has several benefits: at the very least, we eliminate code duplication\
    \ (in case we have a dozen objects in the application). Besides, if you back-port\
    \ your game to an older browser, you might need to implement a different strategy\
    \ of inheritance since older browsers might not support the described features.\n\
    \n**Listing 1-8.** *The Final Version of the Inheritance Example*\n\n```javascript\n\
    function extend(subConstructor, superConstructor) {\n  subConstructor.prototype\
    \ = Object.create(superConstructor.prototype, {\n    constructor: {\n      value:\
    \ subConstructor,\n      enumerable: false,\n      writable: true,\n      configurable:\
    \ true\n    }\n  });\n}\n\nfunction Car(color) {\n  this._color = color;\n}\n\n\
    Car.prototype.move = function() {\n  console.log(this._color + \" car moves\"\
    );\n};\n\nCar.prototype.turn = function(direction) {\n  console.log(this._color\
    \ + \"car turns \" + direction);\n};\n\nCar.prototype.stop = function() {\n  console.log(this._color\
    \ + \" car stops\");\n};\n\nfunction FireTruck() {\n  Car.call(this, \"red\");\n\
    }\n\nextend(FireTruck, Car);\n\nFireTruck.prototype.turnCannon = function(direction)\
    \ {\n  console.log(\"Cannon moves to the \" + direction);\n};\n\nvar truck = new\
    \ FireTruck();\ntruck.move();\ntruck.turnCannon(\"right\");\n```\n\nThe `extend`\
    \ function is used in each and every script throughout this book."
