- fmt: "# How to Render World Objects Like Buildings and Characters\n\n## Chapter\
    \ 6: Rendering Virtual Worlds\n\n### Tile Maps\n\n`Tile maps` are a very powerful\
    \ technique that allows building big and complex levels using small images called\
    \ `tiles`. Imagine that you’re making a massive multiplayer strategy game that\
    \ has a huge map of the world with rivers, plains, forests, and mountains, totaling\
    \ 100,000 × 100,000 pixels. Good enough for a massive game. Obviously, we can’t\
    \ use an image to bring it to the user: there’s simply not enough RAM to hold\
    \ a super-map like that either on a mobile device or on your PC.\n\nIt turns out\
    \ that the vast areas of the map are composed of very similar patterns. Snow looks\
    \ almost the same everywhere—it is white and shiny. The same is also true for\
    \ desert, grass, water, and similar natural areas. Perhaps we can use that to\
    \ optimize our map?\n\n#### The Idea Behind Tile Maps\n\n`Tiles` are small images\
    \ of the same size that are designed to fit each other without breaking the pattern—that’s\
    \ how they make up a piece of the map. Look at Figure 6-1 and you see this concept\
    \ in action.\n\n**Figure 6-1.** *Tile map in* Warcraft 2\n\nThis is a screenshot\
    \ of the map editor from Warcraft 2. White lines show the borders of tiles that\
    \ compose a solid picture. Note that the tiles are aligned to the grid. If you\
    \ look closer, you see that tiles are not unique. In fact, they repeat pretty\
    \ often. For example, there are only three or four different tiles for forest,\
    \ a couple of tiles for dirt, and about a dozen tiles for the border region, where\
    \ forest transforms into dirt.\n\nTiles are designed in a way that the user doesn’t\
    \ see the borders that separate one tile from another. Look at the right side\
    \ of the screenshot that is not covered by a helper grid, and you’ll see that\
    \ the forest looks quite natural. Even though almost all the trees look the same,\
    \ you don’t recognize the tiled nature of this image straightaway. Neither will\
    \ the player.\n\nHow does it help us with the super-map problem? Well, let’s use\
    \ some simple math. Let’s say we have four types of terrain: snow, forest, plains,\
    \ and mountains. Our designer has created four tiles for each, totaling 16 tiles.\
    \ In addition, we have around 40 border tiles to render areas where one type of\
    \ terrain transforms into the other, making the overall number of tiles 56.\n\n\
    If the size of each tile is 64 pixels, we can fit the entire tile set into a 512\
    \ × 512 image. So instead of having a monstrous 100,000 × 100,000 map image, we\
    \ have a 512 × 512 tile set, which can be easily downloaded by any modern device.\n\
    \nThe next step is to present the world as a grid of tiles. Usually, a level designer\
    \ has a special tool for editing the tile maps. Break the world map into 64 ×\
    \ 64 cells and select the appropriate tile for each of them. Now the whole world\
    \ can be described by a two-dimensional array. Here is an example of how such\
    \ array might look:\n\n```javascript\nvar world = [\n  [2, 2, 2, 8, 2, 2],\n \
    \ [5, 4, 7, 3, 4, 3],\n  [5, 4, 3, 3, 4, 7]\n];\n```\n\nThe real array would be\
    \ much bigger, of course. The index of the array element is the coordinates of\
    \ the cell in the world map (x and y), and the value is the number of the tile\
    \ in the tile set. For example, in the array, the value of `world[1][2]` is 7.\
    \ This means that the world map in coordinates (x=2, y=1) is rendered with the\
    \ tile number 7 from the tile set. Which tile that is depends on the concrete\
    \ set. It can be snow, sand, or forest. Figure 6-2 shows the same screenshot from\
    \ the Warcraft 2 map editor; the tile indexes are written over each cell. This\
    \ is an example of a world fragment that can be described by our array.\n\n**Figure\
    \ 6-2.** *Tile map fragment with the marked tiles*\n\nThere’s one more advantage\
    \ to this method: you don’t need to download the array that describes the whole\
    \ world map in one piece. Remember the example that we started with—a huge map\
    \ for a massive online game?"
