    queueItem.key, queueItem.path, success);


    if (itemCounter.loaded == itemCounter.total) {


    onDone && onDone();


    }


    };


    Since the image has finished loading (successfully or not), this function


    increases the counter and calls onProgress with the appropriate parameters. If


