    \ = require(\"./animal\");\nvar hamster = new Animal();\n```\n"
- fmt: "To do that, you have to use `module.exports`, which refers to the object that\
    \ is actually available outside of the module. Listing 10-10 shows the common\
    \ pattern, when your module needs to export only one variable (usually it is the\
    \ constructor).\n\n**Listing 10-10.** Exporting the Single Variable\n\n```\n//\
    \ Export constructor only\nexports = module.exports = Animal;\n\nfunction Animal()\
    \ {\n  console.log(\"New animal is born\");\n}\n// The rest of the code goes here\n\
    ```\n\nOne module can have as many classes, functions, and variables in it as\
    \ you want, but you can have only one module in a file. The other important point\
    \ is inheritance. It works exactly the same way as the inheritance in a browser.\
    \ To make a 'clean' experiment, make another file named `hamster.js` and save\
    \ it near `animal.js`. Copy the code from Listing 10-11 into the new file.\n\n\
    **Listing 10-11.** Inheritance in Node Modules\n\n```\nvar Animal = require(\"\
    ./animal\");\nvar util = require(\"util\");\n\nfunction Hamster() {\n  Animal.call(this);\n\
    \  console.log(\"It's the hamster\");\n}\n\nutil.inherits(Hamster, Animal);\n\
    var _p = Hamster.prototype;\n\n_p.sayHello = function() {\n  console.log(\"(chewing\
    \ carrot)\");\n};\n\nexports = module.exports = Hamster;\n```\n\nIn the second\
    \ line, we load one of Node's core modules—`util`. Even though there's no `util.js`\
    \ file around, it is still loaded correctly. This module is compiled straight\
    \ into the Node's binary and doesn't require any extra files.\n\nNow let's get\
    \ back to the inheritance problem. The first part looks exactly the same as in\
    \ our browser code. We call the super constructor as usual. The second part, the\
    \ call to the `inherits()` function of the `util` module, is very similar to our\
    \ own implementation (called `extend()`).\n\nUpdate the main script to use `Hamster`\
    \ instead of `Animal` and check the output. The sample code is shown in Listing\
    \ 10-12. Note that we import only the module that we actually use, not its dependencies.\n\
    \n**Listing 10-12.** Updated Main Script\n\n```\nvar Hamster = require(\"./hamster\"\
    );\n\nvar animal = new Hamster();\nanimal.sayHello();\n```\n\nHere's the output:\n\
    \n```\nC:\\apps\\node\\node.exe C:/apps/projects/jsbook/chap10/02.writing_modules/main.js\n\
    New animal is born\nIt's the hamster\n(chewing carrot)\n```\n\nThat's it. Now\
    \ the hamster is a happy descendant of the animal. Note that the main script doesn't\
    \ need to load the `animal` module anymore. It is enough to call it from `hamster`.\
    \ When you create a Node.js script, you require only those modules that you actually\
    \ need. All dependant modules are loaded automagically.\n\nThe complete code example\
    \ for this section that shows how to organize your own modules can be found in\
    \ the `02.writing_modules` folder.\n\n**NOTE:** The architecture behind the Node.js\
    \ modules is the implementation of the [CommonJS (www.commonjs.org) specification](http://www.commonjs.org).\
    \ The goal of CommonJS is to create a common set of rules on how to write modules\
    \ for JavaScript. Theoretically, modules following the predefined pattern should\
    \ run fine on different environments: Rhino, Node, Browser, and so forth. In practice,\
    \ however, the server-side JavaScript is very different from the browser JavaScript,\
    \ and this makes the implementation of the CommonJS less usable for the browser\
    \ environment.\n\nThe tradeoffs are described in detail in a nice post by James\
    \ Burke—the creator of RequireJS (CommonJS-style modules for the browser) at [http://tagneto.blogspot.com/2010/03/commonjs-module-trade-offs.html](http://tagneto.blogspot.com/2010/03/commonjs-module-trade-offs.html).\
    \ Basically, CommonJS doesn't play well with the browser environment, which is\
    \ why we don't use it straight from the start of the book.\n\n## Discovering Modules\n\
    \nThere are two main ways to refer a module in Node.js, and we've seen both already.\
    \ The first is by specifying the path to the module file, either absolute or relative.\
    \ For example, `require(\"./hamster\")` loads the module by specifying a relative\
    \ path (the absolute path starts with `/` and refers to the root of the filesystem)."
