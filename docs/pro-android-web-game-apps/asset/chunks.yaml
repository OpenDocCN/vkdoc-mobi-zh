- fmt: "# 处理后的文档\n\n服务端流程中处理连接的部分。`onConnection()` 函数的代码大部分你已经熟悉，新的部分是处理挑战（即开始游戏的邀请）。我们首先检查挑战是否有效；如果有效，则在用户之间启动游戏。游戏在\
    \ `startGame()` 函数内部启动，我们稍后会查看它。\n\n**列表 12-9.** *主服务端文件*\n\n```javascript\n/*\
    \ set up express and socket.io as usual */\n\nio.sockets.on(\"connection\", onConnection);\n\
    \n/**\n * Global counters and user registry\n */\n\nvar maxUserId = 0;\nvar maxGameId\
    \ = 0;\nvar users = {};\n\n/**\n * The connection handler, the \"main\" function\
    \ of the multiplayer\n * server\n * @param socket\n */\n\nfunction onConnection(socket)\
    \ {\n  var userId = addUser(socket);\n\n  // Handling challenges, check the validity\
    \ of challenge, and\n  // if valid, set two users (the challenger and his opponent)\
    \ into\n  // the \"playing\" mode with the help of startGame()\n  socket.on('challenge',\
    \ function (challengedUserId, respond) {\n    if (userId == challengedUserId)\
    \ {\n      respond({ error: \"Cannot challenge self\" });\n    } else if (!users[challengedUserId])\
    \ {\n      respond({ error: \"Cannot find user \" + challengedUserId });\n   \
    \ } else if (users[challengedUserId].status != \"ready\") {\n      respond({ error:\
    \ \"User is not ready to play\" });\n    } else {\n      startGame(users[userId],\
    \ users[challengedUserId], respond)\n    }\n  });\n\n  socket.on('disconnect',\
    \ function () {\n    console.log(users[userId].name + \" disconnected\");\n  \
    \  socket.broadcast.emit('user-left', users[userId]);\n    delete users[userId];\n\
    \  });\n}\n\n/**\n * Registers the user on the server. Notifies everybody that\n\
    \ * he joined the lobby, sends the list of the online users\n * to the newly connected\
    \ one.\n * @param socket the socket object of the connected client\n * @returns\
    \ the ID of the newly created user\n */\n\nfunction addUser(socket) {\n  var userId\
    \ = maxUserId++;\n  var userName = \"User \" + userId;\n  var user = {id: userId,\
    \ name: userName, status: \"ready\"};\n  Object.defineProperty(user, \"socket\"\
    , {\n    value : socket,\n    enumerable : false}\n  );\n  users[userId] = user;\n\
    \  socket.emit('info', {text: \"You have connected\"});\n  socket.emit('user-list',\
    \ { users: users });\n  socket.broadcast.emit('user-joined', user);\n  return\
    \ userId;\n}\n```\n\n服务端的第二部分是 `startGame()` 函数。游戏在两个玩家之间启动：“发起者”（在游戏大厅中选择对手的一方）和他的对手“目标”。该函数创建特殊的\
