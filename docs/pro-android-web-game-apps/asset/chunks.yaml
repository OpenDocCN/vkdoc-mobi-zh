    we have


    a third state of an object-----an object that is in between another one. Our engine


    can’t handle this situation, and it would be rather hard to write something that


    handles this trick without a little help. However, I bet you’ve seen many games


    with arches and portals. So how did they solve this problem?


    If you looked at the resources folder, then you already know the answer. The


    arch is represented by two different sprites that are ordered as usual. Then it
    is


    rendered as shown in Figure 7-19.


