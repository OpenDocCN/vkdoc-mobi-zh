    将`/path/to/xxx`用作 Web 应用文件的根目录：HTML 文件、JavaScript 文件等。


    4. 在第一步中与 jar 文件相同的位置找到`cordova-2.0.0.js`文件，并将其复制到新创建的`www`文件夹中。

    5. 创建一个`index.html`文件——一个包含一些文本的纯 HTML 文件。稍后我们将用它来测试一切是否正常工作。我使用了清单 15-1 中的虚拟内容。

    6. 将 Cordova 发行版中的`xml`文件夹复制到项目的`res`文件夹中。


    **清单 15-1.** *用于测试 Cordova 项目是否正常工作的虚拟 HTML*


    ```html

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <meta name="viewport"

    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,

    user-scalable=no, target-densitydpi=device-dpi"/>

    <style>

    html, body {

    overflow: hidden;

    width: 100%;

    height: 100%;

    margin:0;

    padding:0;

    border: 0;

    }

    #main {

    font-size: 20px;

    }

    </style>

    </head>

    <body>

    <div id="main">

    Cordova is working!

    </div>

    </body>

    </html>

    ```


    完成这些步骤后，项目的结构应如图 15-3 所示。请仔细检查以确保一切正确。


    ![图 15-3](index-576_1.jpg)


    **图 15-3.** *更新后的项目结构*


    ### 更新 Java 文件和 Android 清单


    现在我们需要稍微修改 Java 文件。在`src`子文件夹中找到唯一的`.java`文件，名为`FourBalls.java`。该文件在图 15-3 中已高亮显示。按照清单
    15-2 所示修改文本。


    **清单 15-2.** *主 Java 类*


    ```java

    package com.juriy.fourballs;


    import android.app.Activity;

    import android.os.Bundle;


    import org.apache.cordova.*;


    public class FourBalls extends DroidGap {

    @Override

    public void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    super.loadUrl("file:///android_asset/www/index.html");

    }

    }

    ```


    确保在文件的第一行设置了包名。其余部分保持不变——Cordova 会处理其余一切。最后要做的就是编辑位于项目根目录的`AndroidManifest.xml`文件。清单
    15-3 中的粗体行是您需要添加的行。


