- fmt: '# Chapter 2: Graphics in the Browser: The Canvas Element


    **Summary**


    In this chapter, we learned the basics of rendering graphics in a browser. To
    do that, we used the `canvas` object, a relatively new HTML5 element that pushes
    the limits of browser graphics and allows us to make browser games that are more
    advanced.


    We had the practical goal of preparing the code for the Four Balls game that we
    will make in Chapter 3. We created the game board: a grid, tokens, and a background
    filled with a linear gradient and decorated with Bézier curves. To do all that,
    we learned the `canvas` API. Specifically, we learned how to:


    - Draw shapes (simple and complex)

    - Use fills (colors, patterns, and gradients)

    - Apply transformations (`translate()`, `moveTo()`, and `fill()`)

    - Save and restore the state of the context


    The code to render the game is almost ready, but it is not a game yet. A game
    must have certain logic and it must handle user input. The chapters that follow
    are devoted to covering these topics.


    # Chapter 3: Creating the First Game


    The goal of this chapter is to make a simple 2D web game. We have already learned
    the essentials of the `canvas` API, the powerful mechanism for rendering arbitrary
    shapes or images inside the web page. Now it is time to use this knowledge in
    practice and create a real game project.


    We will call our game "Four Balls." This is the web version of the popular logical
    game that has been known under several names, including "Four in a Row," "Four
    in a Line," and "Plot Four," and has had several rule variations. According to
    rumors, the game was played as early as the 18th century by Captain James Cook.
    He loved the game so much, that his crew called it "The Captain''s Mistress."
    A popular commercial version of the game, Connect Four, was first sold in 1974
    by the Milton Bradley Company. In 1988, Connect Four was "mathematically solved."
    It turned out that the first player can force victory by following a particular
    optimal strategy. Nevertheless, the game is still very popular in both real-life
    and electronic versions.


    The rules are very simple. The game is played on a vertical seven-column, six-row
    board. Players drop different colored pieces that fall straight down the board.
    The player who first makes a line of four pieces of the same color is the winner.
    The project is quite easy to accomplish, yet it shows several important aspects
    of game development.


    Before getting our hands dirty with the code, we will need a good plan. We''ll
    start from reviewing the HTML5 skeleton. The version that we used in Chapter 2
    needs to be adjusted to fit the game development needs.


    The game architecture is another issue to address. Adding more and more code to
    the same file will soon make the project rather hard to improve and maintain.
    We have to develop a better "logical" structure for it: divide the functionality
    of the game between several classes so that each one is responsible for its own
    small task.


    Finally, we will have to add user input handling and implement the game logic.
    User input and browser events are covered in greater detail in Chapter 5; however,
    we still need to add a little bit of code, without going into the details of how
    or why it works, because otherwise we can''t have a working game.


    In this chapter, we will learn how to do the following:


    - Update HTML5 skeleton for mobile game development needs

    - Create game architecture and separate the code responsible for game logic from
    the rendering code

    - Implement game mechanics: validation of turns, game state, win/lose conditions

    - Add the basic input handling to the project


    Before we start, take a look at Figure 3-1. It shows what the final version of
    the game looks like launched in a browser.


    **Figure 3-1.** *The Four Balls game*


    ## HTML5 Game Skeleton


    Games are different from regular web pages and they require a different HTML skeleton.
    This section is devoted to making such a skeleton. We start'
