    this idea. The grayed-out part of the screen is not changing between the frames;


    repainting it is a waste of CPU cycles. The only part that really needs to be


    repainted is the waving knight character.


    **Figure 7-20.** *The area that changes between frames is much smaller than the
    screen; still, we repaint* *it al on every frame.*


    ![](index-308_1.jpg)


    CHAPTER 7: Making an Isometric Engine


    Let’s think about how we can optimize the repainting process once again to


    make it draw only the part of the screen that has really changed.


    Right now, the IsometricTileLayer repaints its buffer every frame, even if


    nothing has changed at all, and that’s where we lose cycles. We have to mark


    the changed areas on the screen and draw only those. This is exactly the idea


    behind the technique called dirty rectangles.


    How It Works


    This section presents an informal description of the dirty rectangles algorithm.


    Once we understand how it works, we will implement it in the next section and


    make our engine even better.


    Let’s say that we are in the middle of the game. We rendered the previous frame


    on the screen, and now it is a time to replace it with a new one. The screen,
    at


    this point, is considered ‘ clean.’’


    Start to update the logic of the game. If the object has moved, or the animation


    sequence has switched to the next frame, it means that part of the screen must


    be updated in order to display the changes correctly.


    Figure 7-21 shows the typical game scene: a frame that has a moving character


    and a static background. The game engine doesn’t need to re-render the whole


    scene to reflect the changes. It needs to repaint only two rectangles: one for
    the


    former position of the character and one for its new position. The user sees no


    difference between this technique and repainting the whole frame; and you will


    save some precious cycles.


    **Figure 7-21.** *The idea behind dirty rectangles*


    ![](index-309_1.jpg)


    CHAPTER 7: Making an Isometric Engine


    **305


    The idea behind the algorithm is to mark certain areas of the screen as ‘‘dirty’’


    and repaint only them. The rest of the picture remains the same since canvas


    doesn’t perform the cleanup of the content between frames. If we don’t clean


    the old content ourselves, it remains exactly the same as before, and we can


    paint on top of it.


    For the sake of simplicity, the areas that we mark dirty are always rectangular.


    There is no sense in building the finer-grained selection since rectangles are
    the


    fastest way to deal with calculating of the area to be repainted. So how do we


    decide if the area has to be marked dirty? The set of rules is quite simple:


     If a sprite has changed the animation frame, mark the


    rectangle that fully covers the old and the new frames as dirty.


     If an object has moved, mark the rectangle that wraps both


    the old position and new position.


     If an entity is added to the scene or removed from the scene,


    mark the boundaries of the entity as dirty.


     If the user moved the screen or changed the size of the


    canvas, mark the entire viewport as dirty.


    Once you apply these rules during the world update phase, you end up with a


    set of dirty rectangles marking the changed areas of the game map. Now you


    have to decide how to use them to repaint the world.


    The simplest and (usually) most efficient way is to find the smallest-size


    rectangle that covers all dirty areas and treat it as the repaint region. Figure
    7-22


    shows this technique. The left image represents a normal case: multiple dirty


    rectangles encompassed by one bigger rectangle. The right image shows the


    worst case: two moving objects will cause the entire screen to be repainted.


    **Figure 7-22.** *We have a small dirty rectangle in a regular case, but the worst
    case results in repainting* *the entire area.*


    CHAPTER 7: Making an Isometric Engine


    This approach might look inefficient, but in most cases, it is quite enough to
    gain


    a performance boost. Now that you know how dirty rectangles work, it’s time to'
