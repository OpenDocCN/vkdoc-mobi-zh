    XMLHttpRequest2’’ [(www.html5rocks.com/en/tutorials/file/xhr2/). Anoth](http://www.html5rocks.com/en/tutorials/file/xhr2/)er
    good source of inspiration is the W3C specifications-----documents that are


    referred to throughout this book----since they are developer-friendly and wel


    written. You should read them to get the big picture of how the new features are


    supposed to work, and where the web is moving.


    **Reverse Ajax**


    This section is devoted to the low-latency communication between the client


    and the server, where both parties can send messages to each other. The


    typical use of XHR assumes that the client is the only source of new events; for


    example, when the user fills out a form, he might require a response from a


    validation service, and at that moment, he requests the server to perform certain


    actions and to return the response. What if we have an application where the


    server should be capable of sending requests to the client? For example, in a


    chat application, the server may want to send the new chat messages to the


    client; or, in other words, to send the request to the client.


    The set of techniques that allow server to speak to the client is often referred
    to


    as reverse Ajax. Technically, it is impossible for the server to connect to the
    web


    page and send the message directly, since the only party that can establish a


    CHAPTER 11: Talking to the Server


    connection is the web page. However, with a certain level of collaboration


    between the server and the client, it is possible to achieve this result.


    The idea behind every such technique is to establish some sort of persistent


    connection between a page and a web server so that the server can use it to


    push the message back to the client once there is an update. When there is no


    activity, the connection sits idle, but once the server has a new event to publish,


    it can use the open connection to deliver it to the client straightaway. This
    model


    is different from regular Ajax since it allows the server (and not the client)
    to be the initiator of communication.


    **NOTE:** There are several names for this architecture, and neither is standardized.
    The most popular names are reverse Ajax, server push, and comet. All these names,


    except comet, suggest that the initiative for communication is now on the server
    side: the server can now *push* the messages to the client and this model is the
    *reverse* of how regular Ajax works.


    The Problem


    The lobby of any online game service is the perfect example of a situation when


    server-push architecture is essential. Imagine that the user has connected to
