  trans: "\n为此，你必须使用 `module.exports`，它指向模块外部实际可访问的对象。列表 10-10 展示了一种常见模式，即当你的模块只需要导出一个变量时（通常该变量是构造函数）。\n\
    \n**列表 10-10.** 导出单个变量\n\n```\n// 仅导出构造函数\nexports = module.exports = Animal;\n\
    \nfunction Animal() {\n  console.log(\"新动物出生了\");\n}\n// 其余代码写在这里\n```\n\n一个模块可以包含任意数量的类、函数和变量，但一个文件只能包含一个模块。另一个重要点是继承。它的工作方式与浏览器中的继承完全相同。为了进行“干净”的实验，创建另一个名为\
    \ `hamster.js` 的文件，并将其保存在 `animal.js` 旁边。将列表 10-11 中的代码复制到新文件中。\n\n**列表 10-11.**\
    \ Node 模块中的继承\n\n```\nvar Animal = require(\"./animal\");\nvar util = require(\"\
    util\");\n\nfunction Hamster() {\n  Animal.call(this);\n  console.log(\"这是仓鼠\"\
    );\n}\n\nutil.inherits(Hamster, Animal);\nvar _p = Hamster.prototype;\n\n_p.sayHello\
    \ = function() {\n  console.log(\"(咀嚼胡萝卜)\");\n};\n\nexports = module.exports\
    \ = Hamster;\n```\n\n在第二行，我们加载了 Node 的一个核心模块——`util`。尽管附近没有 `util.js` 文件，它仍然能被正确加载。这个模块被直接编译到\
    \ Node 的二进制文件中，不需要任何额外的文件。\n\n现在让我们回到继承问题。第一部分看起来与我们的浏览器代码完全相同。我们像往常一样调用父构造函数。第二部分，调用\
    \ `util` 模块的 `inherits()` 函数，与我们的实现（称为 `extend()`）非常相似。\n\n更新主脚本，使用 `Hamster`\
    \ 替代 `Animal`，并检查输出。示例代码如列表 10-12 所示。请注意，我们只导入实际使用的模块，而不是其依赖项。\n\n**列表 10-12.**\
    \ 更新后的主脚本\n\n```\nvar Hamster = require(\"./hamster\");\n\nvar animal = new Hamster();\n\
    animal.sayHello();\n```\n\n以下是输出结果：\n\n```\nC:\\apps\\node\\node.exe C:/apps/projects/jsbook/chap10/02.writing_modules/main.js\n\
    新动物出生了\n这是仓鼠\n(咀嚼胡萝卜)\n```\n\n就是这样。现在仓鼠是动物的快乐后代。请注意，主脚本不再需要加载 `animal` 模块。从 `hamster`\
    \ 中调用它就足够了。当你创建 Node.js 脚本时，你只需要那些实际需要的模块。所有依赖模块都会自动加载。\n\n本节展示如何组织自己的模块的完整代码示例可以在\
    \ `02.writing_modules` 文件夹中找到。\n\n**注意：** Node.js 模块背后的架构是 [CommonJS (www.commonjs.org)\
    \ 规范](http://www.commonjs.org) 的实现。CommonJS 的目标是为如何编写 JavaScript 模块创建一套通用规则。理论上，遵循预定义模式的模块应该能在不同环境中正常运行：Rhino、Node、浏览器等。然而，在实践中，服务器端\
    \ JavaScript 与浏览器 JavaScript 差异很大，这使得 CommonJS 在浏览器环境中的实用性降低。\n\n这些权衡在 RequireJS（用于浏览器的\
    \ CommonJS 风格模块）的创建者 James Burke 的一篇精彩文章中有详细描述，文章地址为 [`tagneto.blogspot.com/2010/03/commonjs-module-trade-offs.html`](http://tagneto.blogspot.com/2010/03/commonjs-module-trade-offs.html)。基本上，CommonJS\
    \ 与浏览器环境配合得并不好，这就是为什么我们没有从本书开头就直接使用它的原因。\n\n## 发现模块\n\n在 Node.js 中，有两种主要方式引用模块，我们都已见过。第一种是指定模块文件的路径，可以是绝对路径，也可以是相对路径。例如，`require(\"\
    ./hamster\")` 通过指定相对路径来加载模块（绝对路径以 `/` 开头，指向文件系统的根目录）。\n"
- fmt: "CHAPTER 10: Going Server-Side\n\n`filesystem`). The second way is where the\
    \ magic happens—when you refer the module only by its name, like `require(\"http\"\
    )`.\n\nIn the latter case, Node.js looks into the directory with the name `node_modules`\
    \ inside the directory of the current module (or the main file). Node looks for\
    \ one of three files that describe the module, in the following order:\n\n1. the\
    \ `node_modules/<module-name>.js` file\n2. the `node_modules/<module-name>/package.json`\
    \ file\n3. the `node_modules/<module-name>/index.js` file\n\n`package.json` is\
    \ the JSON file that must have at least one attribute called `name` that points\
    \ to the main file of the module. Listing 10-13 shows the example of the simplest\
    \ possible `package.json` file.\n\n**Listing 10-13.** *Simplest Module Descriptor*\n\
    \n```\n{\n  \"main\": \"hamster\"\n}\n```\n\nThe main file may, in turn, require\
    \ other modules and provide an interface to the complex functionality. In big\
    \ modules, the main files usually don’t implement any specific functionality,\
    \ but rather do housekeeping tasks: loading dependent files, adding keys to exports,\
    \ and so forth. This form of discovery allows it to distribute complex modules\
    \ as a folder that can be checked out from the version control system, for example.\n\
    \nIf none of the three is found in the folder, Node goes to the parent folder\
    \ and repeats the whole process there. If the requested module is still not found,\
    \ it goes up one more level until it reaches the root of the filesystem. This\
    \ approach allows you to set up the default versions of the modules somewhere\
    \ at the top of the filesystem, which is available to all your Node projects.\
    \ However, if the specific project needs a version of the library that is different\
    \ from the default, you can easily override it in the project’s own `node_modules`\
    \ folder. You can also add an arbitrary folder to the search process by defining\
    \ the `NODE_PATH` environment variable.\n\nSometimes you need to know where exactly\
