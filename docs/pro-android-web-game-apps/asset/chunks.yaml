    \n重新加载页面，欣赏骑士在原地奔跑。如果您希望他移动到某个地方，请添加清单14-10中突出显示的代码。\n\n**清单14-10.** *移动骑士*\n\n\
    ```\nCrafty.e(\"2D, Canvas, knight, SpriteAnimation, Mouse\")\n.attr({x: 100,\
    \ y: 280})\n.animate(\"move\", 0, 0, 15)\n.animate(\"move_right\", 15, -1)\n.bind(\"\
