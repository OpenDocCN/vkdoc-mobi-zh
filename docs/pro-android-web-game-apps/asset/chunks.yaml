- fmt: '# CHAPTER 8: 3D in a Browser


    In this chapter, we will cover the following topics:


    - The essentials of 3D rendering: how to present a volumetric figure on a flat
    screen

    - Basics of matrix algebra: the main mechanism behind 3D

    - Perspective and projections: making a scene look more natural


    The goal of this chapter is to build a simple demo that can render the wireframes
    of a 3D model. We will start with the simplest shape—a cube.


    ## Introducing 3D Rendering


    So what is 3D essentially? How does it differ from the regular 2D graphics that
    we’ve seen in previous chapters? 3D graphics is an illusion, just like animations.
    When you’re rendering an animation, you are switching frames fast enough to create
    the feeling that an object moves. But in reality, there’s no physical movement
    involved in this process. Pixels stay in their positions, they just change color,
    and nevertheless it looks like the figure on the screen is moving.


    Rendering a 3D scene works in a similar way. The display itself is flat, but we
    render the scene in a way that makes the user feel like he is looking at a 3D
    world through a window. Now, you must be asking the usual question: If 3D is basically
    a special case of 2D, and we already know how to work with 2D scenes, why don’t
    we just use the canvas 2D context and draw a 3D scene there? That’s a fair question.
    In fact, we can build a very simple 3D engine using only canvas, but we will face
    two major problems.


    First is the amount of work and math involved in such a project. The math and
    optimizations behind 3D engines and 2D engines is different by an order of magnitude.
    But even if you have a couple spare years to learn everything you need to know
    about 3D and implementing it as a 3D engine, you’ll come up against the second
    crucial problem: the processing power that you will need to implement custom 3D
    rendering.


    Ever since gamers, game developers, and hardware manufacturers understood that
    3D is cool, they also understood that the CPU is not that great in rendering 3D.
    So they decided to add video card chips that are solely responsible for 3D calculations.
    Often more expensive than CPUs, these pieces of hardware are laser-focused on
    3D graphics. In JavaScript in browsers, you can’t directly access the GPU (graphics
    processing unit) and send rendering instructions.


    Natural evolution process that aims to make the game look as realistic as possible.
    The only limiting factor that doesn''t allow us to run Skyrim on a smartphone
    is, of course, the processing capabilities of portable hardware. 3D engines require
    much more processing time compared to regular 2D engines. In a 2D engine, the
    rendering job is relatively simple: take pixels from image, copy them to canvas;
    if there is transparency involved, calculate the composite color. For a 3D engine,
    on the other hand, it is a lot harder, and the underlying math is much more complex.
    That''s one of the reasons why browsers (neither desktop nor mobile) didn''t have
    native support for 3D until recently.


    This chapter is devoted to the development of 3D applications in a browser. There
    is an API that was created to be the ‘standard’ implementation of 3D in a browser
    called `WebGL`. Right now, `WebGL` is only making its first baby steps in the
    mobile market. The only browser available for Android smartphones and tablets
    that supports it is Firefox Mobile (at least at the time of writing). Sony Xperia
    PLAY supports `WebGL` in the stock browser. Due to the massive expansion of `WebGL`
    in desktop browsers, it is obvious that soon we will have this wonderful API in
    many mobile devices.


    When more devices are capable of handling 3D at a good level, without doubt we
    will have 3D games in our browsers. That’s why it is important for a game developer
    to know how 3D rendering works and what it takes to implement it in your own project.
    This chapter is devoted to the general concepts behind 3D and acts as a gentle
    preparation for Chapter 9, where we learn the basics of `WebGL`.'
