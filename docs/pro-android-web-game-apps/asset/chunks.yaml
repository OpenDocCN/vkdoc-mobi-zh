    # 关于请求 1


    **图 10-2.** *Node.js 流程。当长时间运行的请求在后台处理时，Node.js 会处理其他请求。*


    丹·约克（Dan York）找到了一个很好的比喻来描述传统 IO 与异步 IO 之间的区别（`http://tinyurl.com/49wl5lk`）。他将传统
    IO 比作快餐店的排队队伍。轮到你时，你点餐并等待订单完成。即使收银员此刻无事可做，只是等待厨房的订单送达，他也会被阻塞。当你和收银员都在等待订单时，其他顾客只能等你的订单处理完毕才能继续。创建大量线程就像增加更多收银员：这确实能加快处理速度，但这种解决方案不具备可扩展性，因为空间和预算有限。此外，问题本身并未真正解决——收银员站在原地，在等待厨房工作人员完成工作的过程中浪费时间。


    在异步模型中，收银员会在你点餐后请你站到一旁，同时为另一位顾客服务。很可能下一位顾客想要一些非常简单的东西，比如一块已经烤好的松饼，这样收银员就能立即为这位顾客服务。最终，厨房会通知收银员你的订单已准备好。他完成当前顾客的服务后，再回头为你服务。此时他拿到了你所需的东西，并将其交给你。


    看出区别了吗？在第二个例子中，收银员高效利用了每一分钟时间：当厨房工作人员制作汉堡时，他不会站在那里盯着你浪费时间——每一秒都被用来满足客户的需求。显然，在这个比喻中，客户是来自浏览器的请求，收银员是
    Web 服务器线程，而厨房则是可能很快但需要花些时间完成的 IO 操作。


    如果你已有服务端技术栈的编程经验，可能会觉得改变对代码结构的思维方式很困难——你习惯了同步模型，即操作按顺序依次执行。希望这个简要的解释能让你对概念更清晰一些。现在，让我们进入
    Node.js 的安装环节。是时候尝试这个令人惊叹的工具了。


    ## 安装 Node.js


    在编写任何实际 Node.js 代码之前，我们必须先安装它。有两个软件对开发至关重要，第一个就是 Node.js 本身。这是一个可执行文件，负责运行脚本并处理所有底层操作系统的复杂事务。第二部分是
    NPM，即 Node.js 的包管理器。它是下载和安装 Node 附加包（如开发过程中所需的框架、工具和实用程序）的事实标准。


    **注意：** Node.js 拥有非常活跃的社区，并且有大量的*模块*——你可以使用这些扩展来简化开发，从而不必每次都重新发明轮子。从 FTP 服务器和命令行解析器，到
    PDF 生成和图像处理，这样的模块有数百个。本章中，我们也会用到其中一些模块。


    Node.js 的安装相当简单：从 `http://nodejs.org/#download` 选择安装包（根据操作系统选择 Windows 或 Mac 版本），然后按照安装说明进行操作。更新
    `PATH` 环境变量以指向目标目录（如果你不记得如何设置环境变量，请参考第 1 章的“安装 Java 开发工具包”）。我更喜欢创建一个名为 `NODE_HOME`
    的额外变量，并在之后的 `PATH` 中引用它。


    **注意：** 在我自己的系统中，我使用路径 `c:\apps` 来存放所有与开发相关的应用程序、工具和实用程序。例如，Node.js 位于 `c:\apps\node`。

