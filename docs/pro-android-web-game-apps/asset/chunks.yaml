  trans: "\n## 排版结果\n\n不要与选中像素重叠。此外，我们保留了全尺寸的画布对象用于绘制遮罩，但实际只需要单个像素。我们可以改用单像素大小的画布，从而节省一些\
    \ CPU 时间和内存。这类优化显而易见，且在你的项目中如需实现也并不困难。不过，大多数情况下，可供选择的拖拽对象并不会太多，此处描述的方案仍能展现出不错的性能。\n\
    \n![](img/index-218_1.jpg)\n\n## 第 5 章：事件处理与用户输入\n\n### **模拟摇杆**\n\n本章的最后部分致力于模拟真实世界的游戏控制方式。这是移动游戏的常见做法：尝试制作用于输入的虚拟硬件版本。\n\
    \n从太空模拟游戏到第三人称射击游戏，各类游戏都会使用摇杆。当你需要对游戏角色进行直接控制时，对于缺乏多点触控的设备而言，摇杆可能是最佳选择。虚拟摇杆是一个对触摸和移动敏感的区域。其内部有一个小“摇杆柄”来显示当前位置。玩家可以改变方向（角度）和力度（距中心的距离）。\n\
    \n摇杆采用极坐标系。使用笛卡尔坐标系对其而言意义不大。极坐标系采用不同的方法来指定空间中的点位置。它不使用`x`和`y`值，而是使用方位角和半径。例如，笛卡尔坐标为\
    \ (`1`, `1`) 的点，在极坐标中半径约为 `1.414`，方位角为 `Math.PI / 4`。这两种坐标系之间的关系如图 5-10 所示。\n\n\
    **图 5-10.** *笛卡尔坐标系 (x, y) 与极坐标系 (方位角, 半径)*\n\n摇杆的输出是极坐标比常规坐标系更有用的绝佳例子。“方向”即方位角，而“力度”（距中心的距离）即半径。这种表示方式更适合控制任务。\n\
    \n摇杆的实现思路相当简单：追踪用户的触摸和移动，并计算摇杆位置的方位角和半径。\n\n![](img/index-219_1.jpg)\n\n如果用户点击了“活动”摇杆区域之外，该触摸将被忽略。图\
    \ 5-11 展示了该简易摇杆界面在网页上的可能外观。\n\n**图 5-11.** *简易虚拟摇杆。外圆是用户点击以控制物体位置的“活动”区域。内部的圆表示摇杆的当前位置。*\n\
    \n代码相对简单；最重要的函数如代码清单 5-29 所示。完整实现可在本书的其他材料中找到。\n\n**代码清单 5-29.** *实现虚拟摇杆控制*\n\n\
    ```\n_p._onDownOrMove = function(coords) {\n    // 当收到“按下”或“移动”事件时，保存当前\n    //\
    \ 偏移量并更新半径和方位角\n    var deltaX = coords.x - this._x;\n    var deltaY = coords.y\
    \ - this._y;\n    this._updateJoystickValues(deltaX, deltaY);\n};\n\n_p._onUp\
    \ = function(x, y) {\n    // 如果没有交互，则恢复空闲状态\n    this._updateJoystickValues(0,\
    \ 0);\n};\n\n_p._updateJoystickValues = function(deltaX, deltaY) {\n    var newAzimuth\
    \ = 0;\n    var newRadius = 0;\n    // 如果摇杆处于空闲状态，则无需进行计算\n    if (deltaX != 0\
    \ || deltaY != 0) {\n        newRadius = Math.sqrt(deltaX*deltaX + deltaY*deltaY)/this._controllerRadius;\n\
    \        // 用户滑动距离过远，摇杆返回空闲状态\n        if (newRadius > 1) {\n            deltaX\
    \ = 0;\n            deltaY = 0;\n            newRadius = 0;\n        } else {\n\
    \            newAzimuth = Math.atan2(deltaY, deltaX);\n        }\n    }\n    //\
    \ 如果值实际发生了变化，通知监听器\n    if (this._azimuth != newAzimuth || this._radius != newRadius)\
    \ {\n        this._azimuth = newAzimuth;\n        this._radius = newRadius;\n\
    \        this._deltaX = deltaX;\n        this._deltaY = deltaY;\n        this.emit(\"\
    joystickchange\", {\n            azimuth: newAzimuth,\n            radius: newRadius\n\
    \        });\n    }\n};\n```\n"
- fmt: "# 第1章：事件处理与用户输入\n\n当`InputHandler`检测到交互（点击、触摸或移动）时，会调用第一个函数。它会计算增量（即控制器中心与触摸坐标之间的\
    \ x 和 y 距离）。\n\n接下来，使用几个简单的三角函数公式计算半径和方位角的值。最后，如果位置自上次以来发生了变化，则会通知用户。从游戏代码中使用摇杆甚至更加简单（参见清单5-30）。\n\
    \n**清单5-30.** *将摇杆添加到游戏中*\n\n```\nfunction init() {\n    canvas = initFullScreenCanvas(\"\
    mainCanvas\");\n    ctx = canvas.getContext(\"2d\");\n    joystick = new Joystick(canvas);\n\
    \    var r = joystick.getControllerRadius();\n    joystick.setPosition(r + 50,\
    \ canvas.height - r - 50);\n    animateCanvas();\n}\n\nfunction animateCanvas()\
    \ {\n    var speed = 20;\n    var joystickRadius = joystick.getRadius();\n   \
    \ if (joystickRadius > 0) {\n        var joystickAzimuth = joystick.getAzimuth();\n\
    \        var xSpeed = joystickRadius * Math.cos(joystickAzimuth) * speed;\n  \
    \      var ySpeed = joystickRadius * Math.sin(joystickAzimuth) * speed;\n    \
    \    controlledObject.x += xSpeed;\n        controlledObject.y += ySpeed;\n  \
    \  }\n    // ... the rest of animation code goes here\n}\n```\n\n虚拟摇杆是一个非常棒的工具，尤其适用于移动设备。然而，在桌面浏览器上存在可用性问题。主要问题是您必须按住鼠标按钮才能移动它。如果您的游戏同时面向移动和桌面平台，请确保考虑可用性，不仅针对触摸屏，也要考虑传统的鼠标和键盘。摇杆演示的最终版本位于名为`07.joystick.html`的文件中，该文件随本章的源代码一起提供。\n\
    \n## 总结\n\n在本章中，我们深入探讨了浏览器事件处理和用户控制。我们了解了触摸界面与常规桌面浏览器输入模型的不同之处。我们发现处理浏览器事件可能是一项繁琐的任务。更好的方法是创建一个合适的中间\
    \ API 层，该层隐藏事件细节并公开简单的接口。\n\n我们学习了如何构建在游戏内部使用的自定义事件处理程序。对于像将事件对象发送给直接订阅者这样的简单任务，使用浏览器重量级的事件模型通常没有意义。\n\
    \n我们通过拖放和像素完美选择模型开发了与游戏交互的高级方式。最后，我们创建了模拟摇杆的自定义组件——摇杆自电子游戏诞生以来一直用于与视频游戏交互的硬件。\n\
    \n完成本章后，我们已准备好迎接下一个挑战：渲染虚拟世界。\n\n# 渲染虚拟世界\n\n在前几章中，我们学习了如何渲染动画、控制时序以及响应用户输入。下一个有趣的主题是游戏世界的渲染。如果您正在创建像国际象棋这样的游戏，这可能是一项简单的任务，但如果是角色扮演游戏或策略游戏，其中的世界非常巨大呢？显然，将地图和游戏对象存储在智能手机的内存中不是一个好选择——数据太多，通过网络传输的字节太多，渲染速度也太慢。\n\
    \n接下来的两章专门介绍虚拟世界的渲染。首先，我们将介绍在智能手机屏幕上绘制广阔 2D 空间的基本技术。我们将探讨几种不同的方法来优化渲染速度以及服务器和客户端之间传输的数据量。\n\
    \n我们将尝试关注每种技术背后的动机，讨论何时以及为何需要应用它们。本章的内容将为在下一章中构建成熟的等距引擎奠定坚实的基础。\n\n在本章中，我们将学习以下内容：\n\
    \n- 瓦片地图以及如何将世界表示为瓦片网格\n- 如何在画布上渲染瓦片地图\n- 如何优化渲染性能"
