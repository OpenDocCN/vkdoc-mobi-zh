- fmt: 'Imagine that you want to draw a thin vertical line from `(1, 0)` to `(1, 4)`.
    You want it to be one pixel wide and have a black color. The context will treat
    it as a line that lies between the first and the second pixel of the screen. Figure
    2-4 shows how 2D API treats such a call.


    **Figure 2-4.** Context treats the line with integer coordinates as if it lies
    between pixels.


    The width of the line is one pixel, so the context should paint half of the left
    pixel and half of the right pixel to make a total of one. Obviously, a device
    display can’t handle this task since the pixel is the atomic element—it cannot
    be painted with two different colors at the same time. So the line will overlap
    both left and right pixels. To compensate for the increased width of the line,
    the context renders both pixels semitransparent, making the line look lighter
    in color. Figure 2-5 shows the model of such a one-pixel line that is positioned
    on the boundary between real, physical pixels.


    ![](index-56_1.jpg)


    **Figure 2-5.** The line is one pixel wide; it overlaps half of two pixels since
    it is positioned over their boundary.


    A context works like a painter with just enough paint in his bucket to cover a
    wall. Suddenly, he realizes that there are two walls that have to be painted.
    He decides to dilute his paint with water to get the job done (no extra money
    for another bucket of paint—that’s life). Now both walls have a new color, but
    since the layer of the paint is so thin, you can see the old wallpaper through
    it. That is how the context draws the line: the stroke color is “divided” between
    the left and the right pixel. The resulting color that the user sees will not
    be black; it will be light gray. The resulting color also depends on the color
    of the background since it is visible through a translucent line. Also, the resulting
    line will be two pixels wide since both the left and right pixels are “covered”
    by the original line. Figure 2-6 shows the result of such a call on 2D context.
    The white dashed line is the line that was meant to be drawn. It lies between
    the pixels. The resulting line is painted with 50 percent transparency; because
    of that, the background affects the resulting color of the line. It is dark red
    on the top and dark gray on the bottom.


    ![](index-57_1.jpg)


    **Figure 2-6.** The result of using integer coordinates to draw the vertical one-pixel
    line


    To draw the one-pixel black line, you have to set the decimal coordinates by adding
    an extra half of a pixel. If a line from `(1.5, 0)` to `(1.5, 4)` goes through
    the center of every pixel, it is exactly one pixel wide; and since it doesn’t
    overlap any extra space, it has the pure black color.


    What if you want a two-pixels-wide line? Correct. You have to switch back to integer
    coordinates, otherwise it will effectively cover three pixels—one solid pixel
    at the center and two semitransparent pixels on the sides.


    Treating coordinates like that may be a little confusing, but it makes perfect
    sense once you start to deal with shapes that are more complex. You shouldn’t
    care a lot about the exact pixels that make up a figure if the figure is nicely
    rendered and looks natural to the user. Smooth colors and soft edges look natural;
    aliased “ladders,” where pixels are either black or white, do not. Figure 2-7
    shows the practical difference between the two. The top row shows the aliased
    version of the line and the circle (the normal size and zoomed fragments), while
    the bottom row shows the same figures drawn with anti-aliasing, as 2D context
    draws them. As you can see, the bottom images look much nicer.


    ![](index-58_1.jpg)


    **Figure 2-7.** Comparing aliased figures with smoothed figures'
