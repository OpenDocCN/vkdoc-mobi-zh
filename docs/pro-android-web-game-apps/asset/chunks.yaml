    \ 500 毫秒）；然后以恒定速度从 500 毫秒运行到 700 毫秒；最后减速回到 0。\n\n动画器的核心是一个名为 `update()` 的函数。我们会跟踪场景重绘之间经过的时间，并将该值传递给\
    \ `update` 函数。该函数返回一个分数，我们已经知道如何使用它了。让我们看看这个函数的代码。它是 `Animator` 最重要的部分，如清单 4-31\
    \ 所示。\n\n**第 4 章：动画与精灵**\n**165**\n\n**清单 4-31.** *更新函数：动画器的心脏*\n\n```javascript\n\
    /**\n * 此函数应由外部定时器调用来更新动画器的状态。\n * @param deltaTime - 自上次更新以来经过的时间。0 是有效值。\n */\n\
