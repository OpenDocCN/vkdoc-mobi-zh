    将对象向左移动五个单位，然后绕`z`轴旋转`3.14`弧度，最后在`x`轴上缩放三倍。编写代码实现这种逻辑会是一个不错的数学练习，但我们不要操之过急，而是先看看已被证明高效的机制。


    ## 渲染


    现在我们已经定义了模型的坐标并将其存储在数组中，是时候在屏幕上渲染立方体了。但我们如何将这些点转换为线框呢？在本节中，我们将学习3D渲染在非常基础层面上的工作原理。要渲染3D图形，我们必须找到其顶点在屏幕上的投影。一旦找到投影，我们就可以在每个由边连接的两点之间绘制线条——这就足以渲染线框了！


    ![](index-346_1.jpg)

    ![](index-346_2.jpg)


    ## 第8章：浏览器中的3D


    用于寻找投影和进行3D渲染的数学工具被称为矩阵理论。让我们从一个非常基础的要素——矩阵开始。一旦我们了解了矩阵的工作原理，我们将把这些知识应用到我们的任务中。我们将渲染立方体，旋转它，然后应用透视投影，使立方体看起来更自然。


    ## 矩阵


    那么，什么是矩阵？不，它不仅仅是尼奥与特工史密斯战斗的那个平行现实。矩阵也是一种基础数据结构，对于每个3D程序都至关重要。图8-6展示了一个矩阵的外观。


    **图8-6.** *一个矩阵的示例*


    本质上，矩阵是一个由行和列组成的网格。当然，矩阵可以有不同的大小。图8-6是一个4×4矩阵。在JavaScript中表示矩阵的自然方式是使用二维数组。真正令人兴奋的是，一个4×4矩阵可以按任意顺序容纳你应用于场景的任意数量的变换。这是如何做到的呢？每个矩阵代表一个特定的变换：旋转、缩放、平移，或者这些操作的任意组合。图8-7展示了一些示例。


    **图8-7.** *代表不同变换的矩阵。从左到右：在x轴上缩小50%，沿x轴移动五个单位并沿y轴移动两个单位，绕z轴旋转大约45度。*


    如果你从未使用过矩阵，图8-7可能看起来像三个由无意义数字组成的网格。然而，当你知道了如何将矩阵相乘，事情就变得清晰多了。这些规则有些反直觉，但在2×2矩阵上展示它们要容易得多。假设我们想要将矩阵`A`乘以矩阵`B`。


    矩阵乘法的一般规则如下：要得到结果矩阵中第`m`行第`n`列的元素，你必须取左侧矩阵的第`m`行和右侧矩阵的第`n`列，将它们对应的元素相乘，再相加。要得到第一个单元格（第1行，第1列）中的数字，你必须取左侧矩阵的第一行和右侧矩阵的第一列，逐元素相乘，然后将结果相加。此操作如图8-8所示。


    **图8-8.** *矩阵相乘以得到第一个元素*


    对于第一行第二列的单元格，你必须取左侧矩阵的第一行和右侧矩阵的第二列，并执行相同操作：逐元素相乘，然后将结果相加。图8-9展示了如何操作。


    **图8-9.** *乘法的下一步：第一行中的第二个元素*


    图8-10展示了如何计算结果矩阵的最后两个单元格。


    **图8-10.** *矩阵相乘的最终结果*


    现在来看期待已久的功能。要应用矩阵所代表的变换，你必须将点的坐标与矩阵相乘。你会得到新的坐标——即变换后的坐标。如果你对立方体的每个顶点应用相同的变换，立方体本身就会被变换：旋转、缩放，或移动到场景中的特定位置。'
