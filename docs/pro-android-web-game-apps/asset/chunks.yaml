    CHAPTER 14: JavaScript Game Engines


    **Summary**


    In this chapter, we explored the topic of game engines. We started by


    describing three layers of interaction with the graphical system: the graphical


    APIs, libraries, and game engines. We learned the differences between them,


    and their purposes and limitations.


    We built the game with the help of Crafty----a 2D game engine that focuses on


    bringing together typical tools for game developers, including sprite sheets,


    animation, event handling, game states and transitions, and many other


    features. We created a rather complete game (omitting the gameplay, of course)


    that has the majority of the features of a completed product-----and the total
    size


    of the source code was only about 140 lines of JavaScript.


    Even though game engines might look like a silver bullet, they are not. They save


    you a lot of time and effort, but the efficient use of every game engine requires


    knowledge of the mechanics underneath. Even if you choose to use one of


    these, the skills that you gain throughout the chapters of this book will bring
    you


    a better understanding of the engine’s black art.


    Chapter 15


    **Building Native**


    **Applications**


    Most applications that people use on their Android devices are native----


    programs written in Java and tightly integrated with the OS. Games are no


    exception. Most games for Android are native games. Applications created


    throughout this book are of a different type----they are web applications. They


    already work pretty well, and there’s no doubt that with some extra polishing,
    it


    would be simple to bring the web app to the commercial level. However, there


    are a few reasons why you might want to build a native Android version of your


    game.


    Why build a native application out of a working web version? That is a good


    question. Indeed, web applications have many advantages. They are easier to


    deploy, you don’t have to install them, they support more platforms, they are


    much easier to update… so why spend extra time for native apps? The following


    is a summary of the most important features that make native apps very


    attractive:


     Distribution via markets


     Access to the native API


     Fullscreen mode


     Using HTML5 APIs that are not yet available to the browser


     Native apps don’t necessarily need to have an internet


    connection, and the user may be able play the game offline.


    CHAPTER 15: Building Native Applications


    In this chapter, we will discuss the advantages and disadvantages of native


    applications. In addition, we will learn how to:


     Install and configure Apache Cordova (formerly PhoneGap and


    Apache Callback)


     Wrap the existing web game as a native application


     Access the phone resources (such as the phonebook or GPS)'
