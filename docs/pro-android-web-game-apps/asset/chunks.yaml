- fmt: '## 排版后的内容


    Packaging, and testing on the device. Let’s take a closer look at the parameters;
    they become important once you start to prepare for production.


    - `--package` is the "namespace" of your application. Java developers have a convention
    of deploying their libraries so that classes with the same name don’t clash with
    each other. If you have a class called `Sprite` and so does the other library
    in the project, both classes work fine as long as their packages are different.
    A package is any dot-separated list of words; however, the usual practice is to
    take the domain name that you own and write it in reverse order. For example,
    I have the domain `juriy.com`; I can use package `com.juriy`, `com.juriy.whatever`,
    or even a longer `com.juriy.game.client.utilites`. You have to choose the name
    of the package to make a project.


    - `--activity` is the name of the main class. Choose whatever sounds best to you.
    `FourBalls`, `Main`, or anything else will do.


    - `--target` is the version id of the platform, as described earlier.


    - `--path` is the folder where you put your files. Since there is no folder called
    `fourballsnative`, mine was created for me.


    Once the project is created, you see that there are quite a lot of new files and
    folders. Look at Figure 15-1. You see a similar structure. If you don’t have experience
    in Android development, don’t try to understand what these files are for. It is
    enough to know that this is the typical structure of an Android project.


    ![Figure 15-1](index-573_1.jpg)

    ![Figure 15-2](index-573_2.jpg)


    **Figure 15-1.** *The typical structure of Android project*


    Now you have built the empty project. It doesn’t yet have Cordova, but it can
    be compiled and tested on a device or emulator.


    ### Testing the Empty Android Project


    Before we start to add Cordova libraries, let’s make sure that the project we
    created actually works. Start the emulator or connect the device with a USB cable.
    Make sure that the debug mode is on (if you don’t know how to enable the debug
    mode, refer to Appendix A). Make sure that you are in the project folder’s root.
    Execute the following command:


    ```

    ant clean debug install

    ```


    `Ant` uses a build script called `build.xml` to create a debug version of the
    app. It signs the app with a debug key (every Android application must be signed
    with a key—more about that later) and installs it on the currently running emulator
    or connected device. If it finds neither an emulator nor a device, the build will
    fail. If you did everything right, you should see the newly created application
    in the list of installed apps and be able to run it. The application looks rather
    dull—a black screen with gray "Hello World, `FourBalls`" text, as shown in Figure
    15-2.


    **Figure 15-2.** *The empty Hello World Android project*


    **NOTE:** You need to have either the device or the emulator running when you
    execute the "install." If neither is running, the build script will fail. If your
    script is failing even though the emulator is open, execute the following two
    commands in sequence:


    ```

    adb kill-server

    adb start-server

    ```


    ### Basic Cordova Project


    Now we have to do the main work toward building the "wrapped native app." That
    is add the Cordova libraries to the empty project, modify Java files, and put
    the web resources (HTML, scripts, CSS, etc.) into the correct places. This part
    of the chapter contains many "dark magic" steps. I encourage you to dive deeper
    into native Android app development to gain a better understanding of this process.


    #### Preparing the Project for Cordova Development


    First, we need to copy several files and provide a certain folder structure to
    add Cordova support to our application. Follow these steps:


    1.  Find the `cordova-2.0.0.jar` (the version number might differ, of course)
    in the folder where you extracted Cordova under `/lib/android`.

    2.  Copy it to the `libs` folder of your project.

    3.  Create a new folder, `assets`, and another folder, `www`, inside it.'
