    WebGL uses the two shaders that we’ve created to render the geometry. The


    first shader calculates the projections of the vertices on the screen, and the


    second fills every pixel of the cube with a solid white color. The next step is
    to


    get the location of parameters inside the program to insert them later from the


    JavaScript code:


    var pMatrixUniform = gl.getUniformLocation(shaderProgram, "uPMatrix");


    var mvMatrixUniform = gl.getUniformLocation(shaderProgram, "uMVMatrix");


    Finally, tell WebGL that the shader program has the attribute for vertex data
    (see


    Listing 9-10). The variable is used later to set the value for the attribute.


    **Listing 9-10.** *Working with Attributes of Shaders*


    var vertexPositionAttribute = gl.getAttribLocation(shaderProgram, "aPos"); gl.enableVertexAttribArray(vertexPositionAttribute);


    ![](index-379_1.jpg)


    CHAPTER 9: Using WebGL


    **375


    Before moving forward, let’s review the components of the WebGL program.


    They are shown in Figure 9-5.


    **Figure 9-5.** *The transformations of data from JavaScript to WebGL*


    Now, both WebGL and the program are ready to receive geometry and render it


    on the screen.


    Rendering Hello World


    Now every component is in place and we are ready to start the rendering. The


    function that renders the screen is called drawScene() (see Listing 9-11). Its
    job


    is to use the prepared components and pass it to WebGL. This function doesn’t


    perform the actual rendering; it only passes the data into the pipeline. The


    rendering is performed by the WebGL implementation-----either by the graphics


    card or by the software emulator when a graphics card is not present.


    **Listing 9-11.** *Drawing the Cube: drawScene is the Main Function That Does
    the Rendering* function drawScene() {


    gl.viewport(0, 0, width, height);


    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);


    mat4.perspective(45, width / height, 0.1, 100.0, projectionMatrix);


    // Reset the modelView matrix


    mat4.identity(modelViewMatrix);


    CHAPTER 9: Using WebGL


    // Update the modelView matrix, "move" the model to the correct position


    mat4.translate(modelViewMatrix, [model.x, model.y, model.z]);


    // Update rotation


    if (model.rx)


    mat4.rotateX(modelViewMatrix, model.rx);


    if (model.ry)


    mat4.rotateY(modelViewMatrix, model.ry);


    if (model.rz)


    mat4.rotateZ(modelViewMatrix, model.rz);


    // Pass the projection matrix as the uniform to the program


    gl.uniformMatrix4fv(pMatrixUniform, false, projectionMatrix);


    // Pass the modelView matrix as the uniform to the program


    gl.uniformMatrix4fv(mvMatrixUniform, false, modelViewMatrix);


    // Tell WebGL that the active buffer is vertexBuffer


    gl.bindBuffer(gl.ARRAY_BUFFER, model.vertexBuffer);


    // Pass the elements of the active buffer as the values of "aPos" attribute gl.vertexAttribPointer(vertexPositionAttribute,
    3, gl.FLOAT, false, 0, 0);


    // "Activate" faceBuffer


    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, model.faceBuffer);


    // Use the faceBuffer to draw total of model.faces.length triangles


    // each element of the buffer pointing to the vertex in the vertexBuffer


    gl.drawElements(gl.TRIANGLES, model.faces.length, gl.UNSIGNED_SHORT, 0);


    // The pipeline has started, it will render the cube now.


    }


    Now you have everything to launch Hello World. Let’s review the steps that you


    have to take in a typical WebGL application:


    1\. Load the geometry and related data like vertex color, normals,


    and so forth.


    2\. Pass the geometry data to WebGL and receive buffer objects.'
