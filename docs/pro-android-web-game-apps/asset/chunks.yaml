    \n有两种选择。第一种是将事件制作为构造对象，为它们创建一个单独的类层次结构，并添加两个方法，类似于 DOM API 的方法：`stopPropagation()`\
    \ 和 `isPropagationStopped()`。另一种方法是选择简单的路径，约定在事件上设置某个标志，以标记它不应再继续传递。对于这样的项目，采用更简单的方法是有意义的；我们希望事件保持小巧、简单和轻量。\n\
    \n让我们将这个标志称为“stopped”。因此，每当你编写\n\n```\ne.stopped = true;\n```\n\n你就在说：“这个事件我已处理完毕。不要让游戏中的任何其他组件对此作出反应。”\n\
