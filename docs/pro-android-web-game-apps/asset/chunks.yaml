    \n## 纹理坐标\n\n我们需要为模型的每个顶点分配纹理坐标，并创建并初始化相应的缓冲区，以将这些数据传输到着色器。你已经知道如何操作（参见清单 9-19）。\n\
    \n**清单 9-19.** *为模型添加纹理坐标*\n\n```\nvar cube = {\n\n// 顶点和面的定义保持不变\n\ntextureCoords:\
    \ [\n\n// 正面\n\n0.0, 0.0,\n\n1.0, 0.0,\n\n1.0, 1.0,\n\n0.0, 1.0,\n\n// 背面\n\n\
    1.0, 0.0,\n\n1.0, 1.0,\n\n0.0, 1.0,\n\n0.0, 0.0,\n\n// 为每个顶点设置纹理坐标\n\n],\n\nvertexBuffer:\
    \ null,\n\nfaceBuffer: null,\n\ncolorBuffer: null,\n\ntextureCoordsBuffer: null,\n\
    \ntexture: null,\n\n// 位置、旋转及其他参数与之前相同\n\n};\n\nfunction initModel(model) {\n\n\
    // 代码未修改\n\n// 为纹理坐标初始化一个额外的缓冲区\n\nmodel.textureCoordsBuffer = gl.createBuffer();\n\
    \ngl.bindBuffer(gl.ARRAY_BUFFER, model.textureCoordsBuffer);\n\ngl.bufferData(gl.ARRAY_BUFFER,\
    \ new Float32Array(model.textureCoords),\n\ngl.STATIC_DRAW);\n\n}\n```\n\n纹理坐标是介于\
    \ 0 和 1 之间的值，并非精确的像素坐标。这是一种相当便捷的方式——坐标不依赖于纹理的大小。你可以使用任意大小的纹理（例如 256×256、512×512、1024×1024\
    \ 或任意尺寸），而无需修改代码。查找纹理中匹配像素的具体工作由 WebGL 负责。\n\n## 更新着色器\n\n现在该更新着色器了。与颜色类似，纹理坐标是与顶点关联的值。你需要创建一个额外的\
    \ `varying` 变量，并将坐标传递给片段着色器（参见清单 9-20）。\n\n**清单 9-20.** *将纹理坐标传递给片段着色器的顶点着色器*\n\
    \n```\nattribute vec3 pos;\n\nattribute vec2 aTex;\n\nuniform mat4 uMVMatrix;\n\
    \nuniform mat4 uPMatrix;\n\nvarying vec2 vTex;\n\nvoid main(void) {\n\ngl_Position\
    \ = uPMatrix * uMVMatrix * vec4(pos, 1.0);\n\nvTex = aTex;\n\n}\n```\n\n片段着色器接收坐标，但同时还需要图像数据来获取颜色。在\
    \ `GLSL` 中，有几个称为“`sampler`（采样器）”的特殊对象，它们类似于像素信息存储单元。你可以将采样器视为 `GLSL` 内部的图像。纹理不会随顶点变化，因此采样器是\
    \ `uniform` 类型的（参见清单 9-21）。\n\n**清单 9-21.** *从纹理为像素分配颜色*\n\n```\nprecision mediump\
    \ float;\n\nvarying vec2 vTex;\n\nuniform sampler2D uSampler;\n\nvoid main(void)\
    \ {\n\ngl_FragColor = texture2D(uSampler, vTex);\n\n}\n```\n\n如你所见，从纹理分配颜色非常简单。有一个内建函数\
    \ ——`texture2D()`—— 它接收采样器和纹理坐标，并返回匹配的颜色。\n\n## 将纹理数据传递给片段着色器\n\n最后一步是注册新的属性（`aTex`）和新的\
    \ `uniform` 变量（`uSampler`），并将纹理数据传递给着色器程序（参见清单 9-22）。\n\n**清单 9-22.** *将纹理数据传递给顶点着色器*\n\
    \n```\ngl.activeTexture(gl.TEXTURE0);\n\ngl.bindTexture(gl.TEXTURE_2D, model.texture);\n\
    \ngl.uniform1i(samplerUniform, 0);\n```\n\n最终呈现的是一个漂亮的纹理立方体，如图 9-10 所示。\n\n![](index-395_1.jpg)\n\
    \n**图 9-10.** *带纹理的立方体*\n\n文件 `04.texture.html` 是展示纹理立方体的代码最终版本。"
  raw: 'The texture is created, then it is marked as ‘‘currently active’’ and all
    the texture-related operations that follow are performed against this specific
    resource. The


    third line normalizes the coordinates by flipping the y axis. This is required


    because of the differences in coordinate systems in WebGL and the image. The


    third line feeds the data from the image to the texture. Finally, the last two
    lines set the strategy of rendering the texture when there are either multiple
    texture


    pixels matching a single fragment, or vice versa. In other words, the last two


    lines tell what to do when the texture is too big or too small. gl.LINEAR tells
    it to use the weighted average of the four closest texture elements.


    **Texture Coordinates**


    Download from Wow! eBook <www.wowebook.com>


    We need to assign the texture coordinate to each vertex of the model, and


    create and initialize the appropriate buffer to transfer this data to the shader.


    You already know how to do that (see Listing 9-19).


    **Listing 9-19.** *Adding Texture Coordinates to the Model*


    var cube = {


    // Definitions for vertices and faces stay the same


    textureCoords: [


    // Front face


    0.0, 0.0,


    1.0, 0.0,


    1.0, 1.0,


    0.0, 1.0,


    CHAPTER 9: Using WebGL


    **389


    // Back face


    1.0, 0.0,


    1.0, 1.0,


    0.0, 1.0,


    0.0, 0.0,


    // Texture coordinate is set for each vertex


    ],


    vertexBuffer: null,


    faceBuffer: null,


    colorBuffer: null,


    textureCoordsBuffer: null,


    texture: null,


    // Position, rotation and other parameters as before


    };


    function initModel(model) {


    // code not changed


    // Initialize one more buffer for texture coordinates


    model.textureCoordsBuffer = gl.createBuffer();


    gl.bindBuffer(gl.ARRAY_BUFFER, model.textureCoordsBuffer);


    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(model.textureCoords),


    gl.STATIC_DRAW);


    }


    The texture coordinates are a value between 0 and 1; they are not the exact


    pixel coordinates. This is a rather convenient approach-----the coordinates don’t


    depend on the size of the texture. You can use a texture of any size (256 × 256,


    512 × 512, 1024 × 1024, or whatever) without changing the code. It is WebGL’s


    job to find the exact matching pixel of the texture.


    **Updating Shaders**


    Now it’s time to update the shaders. Just like with the color, the texture


    coordinates are the value associated with the vertex. You have to create one


    extra varying variable and pass the coordinates to the fragment shader (see


    Listing 9-20).


    **Listing 9-20.** *The Vertex Shader That Passes the Texture Coordinates to the
    Fragment Shader* attribute vec3 pos;


    attribute vec2 aTex;


    CHAPTER 9: Using WebGL


    uniform mat4 uMVMatrix;


    uniform mat4 uPMatrix;


    varying vec2 vTex;


    void main(void) {


    gl_Position = uPMatrix * uMVMatrix * vec4(pos, 1.0);


    vTex = aTex;


    }


    The fragment shader receives the coordinates, but it also needs the image data


    to get the color. In GLSL there are several special objects called ‘ samplers’
    that act like a store of pixel information. You can think of samplers as images
    inside


    GLSL. The texture doesn’t change from vertex to vertex, so the sampler is


    uniform (see Listing 9-21).


    **Listing 9-21.** *Assigning the Color from the Texture to the Pixel*


    precision mediump float;


    varying vec2 vTex;


    uniform sampler2D uSampler;


    void main(void) {


    gl_FragColor = texture2D(uSampler, vTex);


    }


    As you can see, assigning the color from the texture is very simple. There’s a


    built-in function----texture2D()----that takes the sampler and texture coordinates,


    and returns the matching color.


    **Passing Texture Data to the Fragment Shader**


    The final step is to register the new attribute aTex and new uniform uSampler,


    and pass the texture data to the shader program (see Listing 9-22).


    **Listing 9-22.** *Passing the Texture Data to the Vertex Shader*


    gl.activeTexture(gl.TEXTURE0);


    gl.bindTexture(gl.TEXTURE_2D, model.texture);


    gl.uniform1i(samplerUniform, 0);


    The result is a nice textured cube, as shown in Figure 9-10.


    ![](index-395_1.jpg)


    CHAPTER 9: Using WebGL


    **391


    **Figure 9-10.** *The textured cube*


