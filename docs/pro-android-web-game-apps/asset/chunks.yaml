    Console: 4 http://192.168.1.142/:31\nConsole: getMax a=1 b=1 http://192.168.1.142/:19\n\
    Console: undefined http://192.168.1.142/:33\n```\n\n你可能已经猜到了，这就是所谓的“用勺子砍木头”。这种方法极其缓慢且效率低下，但嘿，总比没有好。此外，你必须更改应用程序代码来添加日志记录，这可能会引入更多错误。底线是：只要能用桌面浏览器调试，就用它来调试。\n\
    \n## 几乎无需更改代码的日志记录\n\n日志记录的一个缺点是必须更改代码才能使其工作。你必须在各处放置日志语句，只是为了调试有问题的片段。有时你只需要记录函数名称、输入参数和结果。所以这里在清单\
    \ A-3 中有一个技巧，可以向任何给定函数添加适度的日志记录功能，而无需显著影响其代码。\n\n**清单 A-3.** 便捷日志包装器\n\n```javascript\n\
    function getMax(a, b) {\n  if (a > b)\n    return a;\n  if (b > a)\n    return\
    \ b;\n}\n\n/**\n * 创建\"日志记录\"包装器，记录每个函数调用：\n * 传递的参数和结果。\n * @param tag 日志标签（通常是函数名称）\n\
    \ * @param fun 函数。确保传递函数本身，而不是函数结果！\n */\nfunction wrapWithLogging(tag, fun) {\n\
    \  return function() {\n    var result = fun.apply(this, arguments);\n    var\
    \ argumentsString = Array.prototype.join.call(arguments, \"|\");\n    console.error(tag\
    \ + \"(\" + argumentsString + \") = \" + result);\n    return result;\n  };\n\
    }\n\nfunction init() {\n  getMax = wrapWithLogging(\"getMax\", getMax);\n  writeToDiv(getMax(1,\
    \ 2));\n  writeToDiv(getMax(4, 1));\n  writeToDiv(getMax(1, 1));\n}\n```\n\n附录：调试客户端\
    \ JavaScript（[623]）\n"
- fmt: "可以看到，`wrapWithLogging` 将目标函数作为参数，并将其包裹在一个匿名函数中，该匿名函数执行目标函数，然后将参数和返回值写入控制台。让我们更仔细地看一下代码。\n\
    \n```javascript\nreturn function() {\n  var result = fun.apply(this, arguments);\n\
    \  var argumentsString = Array.prototype.join.call(arguments, \"|\");\n  console.error(tag\
    \ + \"(\" + argumentsString + \") = \" + result);\n  return result;\n};\n```\n\
    \n在第一行中，我们使用传递给它的任意参数执行原始函数。然后，我们创建函数参数的简单字符串表示，将消息写入控制台，并返回原始调用的结果。\n\n接着，在下面的代码中，我们将原始函数替换为包装后的函数，并保持其余代码不变：\n\
    \n```javascript\ngetMax = wrapWithLogging(\"getMax\", getMax);\n```\n\n[writeToDiv(getMax(1,\
    \ 2));](#index_split_000.html#p8)\n\n[writeToDiv(getMax(4, 1));](#index_split_000.html#p11)\n\
    \n[writeToDiv(getMax(1, 1));](#index_split_000.html#p8)\n\n**注意：** 这种函数技巧可能看起来像黑魔法。好消息是，它实际上并非如此。只需要了解一些关于\
    \ JavaScript 的知识就能弄清楚。在 JavaScript 中，一切都是对象，甚至函数也是对象。\n\n所以，如果你有如下代码：\n\n```javascript\n\
    function foo() {\n  return 1;\n}\n```\n\n那么 `foo()`（带括号）会执行函数并返回结果，而 `foo`（不带括号）则引用函数本身，而不是它的结果。按照同样的逻辑，函数的返回类型可以是另一个函数——就像我们这里的例子一样。\n\
    \n第二个可能不那么明显的部分是 `arguments` 变量。它是一个可以从任何 JavaScript 函数内部访问的变量。它的行为类似于数组：你可以使用括号语法\
    \ `arguments[0]` 访问单个参数，或者获取 `arguments.length`，但不能对其使用数组方法，因为它*不是*真正的数组。因此，这里使用了\
    \ `join` 的技巧：\n\n```javascript\nArray.prototype.join.call(arguments, \"|\");\n\
    ```\n\n我们必须使用 `Array` 中的函数，因为 `arguments` 对象没有自己的 `join()` 方法。\n\n控制台输出正是我们所需要的，如下所示：\n\
    \n[Console: getMax(1|2) = 2 http://192.168.1.142/:25](#index_split_000.html#p32)\n\
    \n[Console: getMax(4|1) = 4 http://192.168.1.142/:25](#index_split_000.html#p32)\n\
    \n[Console: getMax(1|1) = undefined http://192.168.1.142/:25](#index_split_000.html#p32)\n\
    \n这个辅助函数有些局限性。例如，对于接受对象作为参数的函数来说，它的作用有限：我的简单包装器不知道如何获取对象的属性并清晰地打印它们。当函数参数是对象时，它无法避免需要在函数体内放置日志语句的情况。\n\
    \n## weinre\n\n`weinre`（[http://people.apache.org/~pmuellr/weinre/](http://people.apache.org/%7Epmuellr/weinre/isagreattoolthataimstofillthegapofremotedebuggingbetweenthePCandAndroidstockbrowser.Itdoesn%E2%80%99thavethewh)）是一个很棒的工具，旨在填补\
    \ PC 和 Android 原生浏览器之间远程调试的空白。它不具备桌面调试器的全部功能，但仍然非常有用。尽管它不允许你设置断点并分析变量，但它拥有一套丰富的工具，可用于\
    \ DOM 操作、跟踪脚本时间线以及直接在设备上即时执行 JavaScript。\n\n下载最新版本的 `weinre-jar` 压缩包，请访问："
  raw: 'As you can see, the wrapWithLogging takes the target function as an argument


    and wraps it in the anonymous function that executes the target, and then writes


    the parameters and a return value to the console. Let’s have a closer look at
    the


    code.


    return function() {


    var result = fun.apply(this, arguments);


    var argumentsString = Array.prototype.join.call(arguments, "|");


    console.error(tag + "(" + argumentsString + ") = " + result);


    return result;


    };


    In the first line, we execute the original function with whatever arguments were


    passed to it. Then we form a simple string representation of the function’s


    arguments, write the message to the console, and return the result of the


    original call.


    Then, in the following code, we substitute the original function with the wrapped


    one and leave the rest of the code intact:


    getMax = wrapWithLogging("getMax", getMax);


    [writeToDiv(getMax(1, 2));](#index_split_000.html#p8)


    [writeToDiv(getMax(4, 1));](#index_split_000.html#p11)


    [writeToDiv(getMax(1, 1));](#index_split_000.html#p8)


    **NOTE:** This trick with the function might look like black magic. The good news
    is that it really isn’t. There are just a few things that you should know about
    JavaScript to make it all clear. In JavaScript, everything is an object. Even
    a function is an object.


    So if you have code like this:


    APPENDIX: Debugging Client-side JavaScript


    [624](#index_split_007.html#p624)


    function foo() {


    return [1;](#index_split_000.html#p8)


    }


    then foo() (with parentheses) will execute the function and return the result,
    while foo (without parentheses) will refer to the function itself and not its
    result. Following the same logic, the return type of the function can be another
    function—just like in our case.


    The second part that may not be so obvious is the arguments variable. It is the


    variable that is available from within any JavaScript function. It behaves like
    an array: you can access individual arguments with the bracket syntax arguments[0]
    or get


    the arguments.length, but you can’t use the array methods on it since it is *not*
    an array. Hence, the following trick with join:


    Array.prototype.join.call(arguments, "|");


    We have to use the function from Array since the arguments object doesn’t have


    own join() function.


    The console output is just what we need, as follows:


    [Console: getMax(1|2) = 2 http://192.168.1.142/:25](#index_split_000.html#p32)


    [Console: getMax(4|1) = 4 http://192.168.1.142/:25](#index_split_000.html#p32)


    [Console: getMax(1|1) = undefined http://192.168.1.142/:25](#index_split_000.html#p32)


    This helper is somewhat limited. For example, it will not be that useful for the


    functions that take objects as arguments: my simple wrapper doesn’t know how


    to fetch an object’s properties and print them neatly. It will not save you from


    having to put the log statements inside the function body, when needed, if the


    function arguments are objects.


    **weinre**


    weinre [(http://people.apache.org/~pmuellr/weinre/ is a great tool that aims to
    fill](http://people.apache.org/%7Epmuellr/weinre/isagreattoolthataimstofillthegapofremotedebuggingbetweenthePCandAndroidstockbrowser.Itdoesn%E2%80%99thavethewh)


    [the gap of remote debugging between the PC and Android stock browser. It](http://people.apache.org/%7Epmuellr/weinre/isagreattoolthataimstofillthegapofremotedebuggingbetweenthePCandAndroidstockbrowser.Itdoesn%E2%80%99thavethewh)


    [doesn’t have the whole set of capabilities that a desktop debugger does, but
    it](http://people.apache.org/%7Epmuellr/weinre/isagreattoolthataimstofillthegapofremotedebuggingbetweenthePCandAndroidstockbrowser.Itdoesn%E2%80%99thavethewh)


    is still very useful. Even though it doesn’t allow you to place breakpoints and


    analyze the variables, it has a rich set of tools for DOM manipulations, tracking


    the timeline of the script, and executing JavaScript on the fly, straight on the


    device.


    APPENDIX: Debugging Client-side JavaScript


    **[625](#index_split_007.html#p625)


    Download the latest version of weinre-jar zip from'
