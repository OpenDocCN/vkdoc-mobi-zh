  trans: "\n# 以浏览器无关的方式实现 `cancelRequestAnimationFrame()`，并自然提供标准 `clearTimeout()`\
    \ 实现作为回退方案（参见清单 4-23）。\n\n## 第 4 章：动画与精灵\n\n**清单 4-23.** *取消 `requestAnimationFrame`*\n\
    \n```javascript\nwindow.cancelRequestAnimFrame = ( function() {\n    return window.cancelAnimationFrame\
    \ ||\n        window.webkitCancelRequestAnimationFrame ||\n        window.mozCancelRequestAnimationFrame\
    \ ||\n        window.oCancelRequestAnimationFrame ||\n        window.msCancelRequestAnimationFrame\
    \ ||\n        clearTimeout\n} )();\n```\n\n## 改进动画\n\n既然我们已经知道了如何组织动画序列，接下来就该思考如何改进这个简单的方案了。例如，要考虑到当前帧率可能远低于理想的\
    \ 60 FPS，并处理可能出现的画面异常。本节末尾将介绍 `Animator` 类——一个用于处理更复杂动画策略的类。\n\n### 帧率与帧间时间\n\n\
    让我们再次回顾本节开头的动画示例。这个版本的代码（见清单 4-24）并未考虑帧率因素。动画在性能更强的设备上会渲染得更快。\n\n**清单 4-24.**\
    \ *动画的基本实现*\n\n```javascript\nvar currentFrame = -1;\nfunction animate(timestamp)\
    \ {\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0, 0, canvas.width, canvas.height);\n\
    \    currentFrame = ++currentFrame%5;\n    spriteSheet.drawFrame(ctx, current,\
    \ 10, 40);\n    requestAnimationFrame(arguments.callee);\n}\nanimate();\n```\n\
    \n如果你添加更多精灵并在不同设备上测试，会发现动画速度严重依赖于 CPU 和帧率（只需确保添加足够多的精灵即可）。该动画没有考虑时间因素，因此在不同的浏览器和硬件上表现会不一致。\n\
    \n如果用清单 4-24 所示的动画方法构建图形密集型游戏，你很快会发现动画速度取决于设备硬件：在无法保持稳定 60 FPS 的低性能设备上运行较慢，而在新款多核智能手机上则较快。这并不是用户对游戏的预期表现。动画速度应保持恒定，不应依赖于帧率。让我们来解决这个问题。\n\
    \n我们需要让每一帧在屏幕上停留固定的时间（例如 50 毫秒），然后再切换到下一帧。这样一来，游戏的连贯性会稍有提升。清单 4-25 所示的第二个代码版本实现了这一思路。\n\
    \n**清单 4-25.** *检查帧间经过时间的改进版代码*\n\n```javascript\nfunction animate(t) {\n    var\
    \ now = t || new Date().getTime();\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0,\
    \ 0, canvas.width, canvas.height);\n    var timeSinceFrameStart = now - currentFrameStart;\n\
    \    if (timeSinceFrameStart > timePerFrame) {\n        currentFrame = ++currentFrame%5;\n\
    \        console.log(currentFrame);\n        currentFrameStart = now;\n    }\n\
    \    spriteSheet.drawFrame(ctx, currentFrame, 10, 40);\n    requestAnimationFrame(arguments.callee);\n\
    }\nanimate(0);\n```\n\n如果你尝试运行此脚本，会发现在桌面浏览器和 Android 浏览器上的结果大致相同。\n\n**注意：** `requestAnimationFrame()`\
    \ 应将时间戳参数传递给监听函数，但由于我们使用了前一节中描述的小技巧，任何不支持新定时器的浏览器都会回退到 `setTimeout()`。在这种情况下，我们需要自己计算当前时间（幸运的是，这并非重量级操作）。这就是额外那行代码的由来：\n\
    \n```javascript\nvar now = t || new Date().getTime();\n```\n\n然而，这种方法也有其缺点。请看图\
    \ 4-10 和图 4-11，它们展示了动画流程。我们先看图 4-10，它展示了理想情况。在完美世界中，定时器恰好在我们需要的时刻触发——每隔 50 毫秒——从而提供非常可预测的帧间间隔。\n\
    \n![](img/index-163_1.jpg)\n\n![](img/index-163_2.jpg)\n\n## 第 4 章：动画与精灵\n"
- fmt: "# 排版后内容\n\n**Figure 4-10.** *In a perfect world, timers are never late and\
    \ all animations finish in time.*\n\nIn the real world, it looks somewhat different.\
    \ We planned to keep the frame on the screen for 50 milliseconds. A timer running\
    \ at 60 FPS hits our function approximately every 16 milliseconds (60 frames per\
    \ second = 1000 ÷ 60 milliseconds per frame). It means that timer will not hit\
    \ at exactly 50 milliseconds after the start of the animation sequence. The first\
    \ time the function is executed at 16 milliseconds, then at 32, 48, and 64. When\
    \ will the frame change? Right after 64 milliseconds (instead of 50, as planned).\
    \ Figure 4-11 illustrates this idea.\n\nFollowing the same logic, the next frame\
    \ is rendered at the next hit, after 64 + 50 (the current frame time plus the\
    \ time between frames), which is 128 milliseconds from the start. And so on, until\
    \ the end of the animation.\n\n**Figure 4-11.** *In the real world, timers are\
    \ inaccurate and animations are running late.*\n\nIf the animation has six frames,\
    \ one may think that it will end in 300 milliseconds (50 milliseconds per frame),\
    \ but since we are 14 milliseconds late each frame (spending 64 instead of 50),\
    \ the animation will instead last 384 milliseconds.\n\nThe problem with this approach\
    \ is that we calculate the time from the start of the last frame to decide if\
    \ we need to render a new one. Since the timer is inaccurate, each frame introduces\
    \ inaccuracy into the calculation. The more frames we have, the bigger the difference\
    \ between what we expect and what we get.\n\nLet’s try a different model. Instead\
    \ of using the time from the start of the frame, we will use the time from the\
    \ start of the animation. Since we know the amount of time the animation lasts,\
    \ we can determine what fraction of the time has passed. When 100 milliseconds\
    \ have passed since the start of an animation that takes 300 milliseconds to complete,\
    \ the completed fraction is 100 ÷ 300 = 1/3, or one-third. At this point, we should\
    \ be drawing frame 2—no matter how much time has passed since the last frame.\n\
    \nThis way we eliminate the increase of inaccuracy and keep the animation as close\
    \ to the timing as probably possible. To understand the idea better, let’s look\
    \ at Figure 4-12, which illustrates our final approach. The middle axis is the\
    \ fraction of time passed since the start of the animation. The first frame renders\
    \ exactly the same way: it stays on the screen for as long as 64 milliseconds.\
    \ The first frame must be changed when we reach one-sixth of the total time. One-sixth\
    \ is approximately 0.167; it takes four iterations to reach this threshold. The\
    \ third iteration starts at 0.16—very close to the next frame, but still not enough.\
    \ The fourth iteration is at 64 milliseconds or 0.21; that’s when the frame actually\
    \ changes. The second frame should finish at 0.333, so it takes only three more\
    \ iterations to reach it (from fractions 0.21 to 0.37). The second frame stays\
    \ on the screen for 48 milliseconds—2 milliseconds less than it should. However,\
    \ this number is much closer to the desired 50 milliseconds than it was in the\
    \ first frame.\n\n**Figure 4-12.** *A better approach. We are not relying on the\
    \ time since the last frame, but rather on the time fraction passed since the\
    \ start of the animation sequence.*\n\nIn this case, the overall animation finishes\
    \ only 4 milliseconds late—much better than 84. Let’s implement this approach\
    \ and finally make a good version of the animation function. The code is shown\
    \ in Listing 4-26.\n\n**Listing 4-26.** *The Final Version of the Animation Function*\n\
    \n```javascript\nvar numFrames = 6;\nvar duration = numFrames*50;\nvar animationStartTime\
    \ = new Date().getTime();\n\nfunction animate(t) {\n    var now = t || new Date().getTime();\n\
    \    // Make sure that we don't run out of bounds\n    var timePassed = (now -\
    \ animationStartTime)%duration;\n    var fraction = timePassed/duration;\n   \
    \ var currentFrame = Math.floor(fraction*numFrames);\n    ctx.fillStyle = \"white\"\
    ;\n```"
