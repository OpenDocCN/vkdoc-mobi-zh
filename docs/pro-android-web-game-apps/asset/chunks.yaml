    # 排版后的文本


    构建人工智能有许多其他方法：模糊逻辑、面向目标的设计、状态机、规则系统及其组合。虽然涉及的内容很多，但对于许多休闲游戏而言，仅需具备寻路和基于决策树的 AI
    引擎就足够了。如果你对进一步研究感兴趣，可以阅读伊恩·米林顿（Ian Millington）和约翰·芬格（John Funge）合著的优秀著作《游戏人工智能（第二版）》（Morgan
    Kaufmann，2009 年）。书中包含一系列讲解清晰的 AI 算法，若能明智运用，可使你的游戏机器人表现得非常聪明。


    结合了寻路与决策技术的代码可在名为`04.decisions.html`的文件中找到，该文件与本章节的其他源码一同提供。别忘了时常访问 GitHub 上的
    JavaScript AI 沙盒项目（<https://github.com/Juriy/gameai>）。你可能会在那里找到对自己游戏有用的内容。


    ## 总结


    本章是深入探索 AI 主题的起点。人工智能在游戏开发中扮演着重要角色，但你应仔细评估特定游戏所需的 AI 水平。有时最有趣的游戏恰恰使用了最简单的 AI 技术。AI
    执行的最基本且最常见的任务就是寻路——在关卡中两点之间找到一条路径。A*寻路算法依赖于航点图——即游戏世界中可到达区域的数学表示。


    ## 第 13 章：游戏中的 AI


    我们学习了构建图的多种方法，并强调了每种技术的常见陷阱。我们还初步了解了为关卡表示导航数据的不同方式，即导航网格。


    我们还探讨了决策树——一种帮助智能体选择下一步行动的简单算法。这可能是该系列中最简单的算法，但它能让我们实现非常有趣且逼真的行为。


    ## 第 14 章：JavaScript 游戏引擎


    本章致力于介绍第三方工具：专为网页浏览器设计的游戏引擎和图形库。游戏引擎提供了制作游戏所需的高级功能，极大简化了开发者工作。例如，如果从头开始制作游戏，你必须亲自处理每个细节：加载图片、将其分解为帧和精灵、渲染世界、检测点击等。我们在第
    7 章已经做过这些工作，你可能还记得需要操心相当多的方面。一个好的 2D 游戏引擎能直接为你提供所有这些功能。


    此时常见的问题是：“既然可以直接选择游戏引擎并开始制作游戏，为什么还要花大量时间学习基础知识？”原因很简单：游戏引擎并非万能灵药，若不理解其背后的基本原理，就无法以最高效率使用它们。此外，当你找到适合需求的引擎时，可能仍需要为其添加一些游戏特需的功能。既然你已经掌握了这些知识，让我们看看一些旨在让游戏开发者工作更轻松的领先开源工具。


    本章将专注于游戏引擎和图形库。我们将探讨以下主题：


    - 游戏引擎及其与图形 API 的区别

    - 实体组件系统


    ## 第 14 章：JavaScript 游戏引擎（续）


    - 如何使用 2D 游戏引擎 Crafty.js 编写游戏


    **注意：** 2D 和 3D 图形领域都有相当多的产品，所以如果你想知道我为什么选择介绍 Crafty 而不是引擎 X，我将解释我的决策依据。首先，工具必须免费且开源。阅读引擎代码以了解其内部工作原理是很有益处的。研究成熟引擎的代码是学习新技巧的好方法。其次，该项目应至少

