    to


    play, playing, away from keyboard). He also wants the list to be updated in real


    time.


    In this case, the server works as the dispatcher of events: when two players


    decide to start a match, the server should notify all other subscribed users that


    the status of the ones who are playing has changed and they are not available


    for new game requests until they finish their game (the usual practice for match-


    based online games).


    The Solutions


    Now we should find a way to show the lobby updates to every user who is


    viewing the page. Every available approach for solving this task falls into one
    of


    three categories:


     Best solutions: APIs designed specifically to solve a task like


    this.


    CHAPTER 11: Talking to the Server


    **463


     Acceptable solutions: Solutions that are merely ‘ good


    enough,’’ taking into account available APIs and limitations.


     Obsolete solutions: Approaches that are generally no longer


    used, but may still be available in some libraries..


    In this section, I pay most attention to the second group, acceptable solutions.


    Best solutions are described only briefly because they cannot be used in the


    Android browser. Obsolete solutions are not illustrated in the code: they are


    present in this chapter only for the sake of ‘‘completeness’’ of the review of


    transports.


    **NOTE:** As mentioned earlier in the chapter. different approaches to the


    implementation of server push are commonly called *transports*.


    The Best Solutions


    There are two APIs specifically designed to handle real-time communications


    and sending events from the client to the server:


     WebSocket: spec [(www.w3.org/TR/websockets/)](http://www.w3.org/TR/websockets/)


    support [(http://caniuse.com/websockets)](http://caniuse.com/websockets)


     Server-Sent Events (SSE): spec


    ([www.w3.org/TR/eventsource/)](http://www.w3.org/TR/eventsource/)


    support [(http://caniuse.com/eventsource)](http://caniuse.com/eventsource)


    Unfortunately, neither of these is available to the stock Android browser.


    However, since both APIs are making their way to the desktop browsers,


    chances are that the Android platform will eventually support them too (for


    example, WebSocket is supported by Chrome for Android). This small section


    gives a very brief overview of the client-side code for both. It is highly possible


    that either WebSocket or SSE is available for the new Android release at the


    time you read this chapter.


    **WebSocket**


    WebSocket provides the API and a lightweight protocol over TCP to keep the


    connection between the client and the server. If Android supported it, the task


    would be relatively simple. Each client would initialize the connection to the


    server, which stays open for the lifetime of the application. When the player


    CHAPTER 11: Talking to the Server


    changes his state, the server would send the message to all open WebSocket


    connections. The hypothetical WebSocket client code would look like this:


    var webSocket = new WebSocket(''ws://example.com/lobby'');


    webSocket.onmessage = function (e) {


    // e.data holds the response from the server,


    // update the UI or log it to the console


    console.log(''Server: '' + e.data);


    };


    The difference between the WebSocket and XHR is that both client and server


    can send messages to each other, and the connection stays open after the


    message is sent.


    **Server-Sent Events**


    Server-Sent Events (SSE) is the API that defines the new DOM element called


    EventSource. When this object is constructed, it connects to the server and


    starts listening for new events. The following shows how the client code would


    look if supported by Android:


    var es = new EventSource(''lobby'');


    source.addEventListener(''message'', function(e) {


    // now you can manipulate the event data


    console.log(e.data);


    }, false);


    SSE and WebSocket look quite similar from the client’s perspective; however,


    they have major technical differences. Eric Bidelman did a really good job


    explaining the nuances of using APIs in his post on HTML 5 Rocks, ‘ Stream


    Updates with Server-Sent Events’'
