  trans: "\n# 为下一个中间件丰富请求和响应变量\n\n在 Express 中，你几乎所有的操作都在这些小巧精良的模块中完成。为了更好地理解它们，不妨将其视为层级（参见图\
    \ 10-11）。\n\n**图 10-11.** *中间件层级。请求会依次通过每个执行特定任务的\"层级\"。*  \n*请求处理可以在某个层级停止并返回，也可以继续传递到下一层级，如此类推。*\n\
    \n每个新请求都会先传递到第一层。它可以在该层停止并返回结果，也可以传递到下一层，以此类推。正如你所见，中间件有时依赖于前几层的处理结果。例如，我们的`get`处理器需要会话才能正常工作。如果将其放在会话中间件之上，那么调用时就不会有可用的会话数据。会话本身也是如此。会话需要先解析\
    \ Cookie。Cookie 存储着当前用户的会话 ID，没有它，我们就无法加载用户的会话数据。如果前一层没有解析 Cookie，会话就无法工作。这意味着`cookieParser`中间件必须放在`session`中间件之前。\n\
    \n典型的中间件堆栈如代码清单 10-26 所示。\n\n**代码清单 10-26.** *一个典型的 Node.js 服务器中间件堆栈*\n\n```javascript\n\
    app.use(express.logger(...)); // 类似于 Apache HTTP 服务器的访问日志\napp.use(express.bodyParser(...));\
    \ // 提取请求体中存储的有用数据（通常是 POST 请求）\napp.use(express.cookieParser(...)); // 解析 Cookie\
    \ 并填充 req.cookies\napp.use(express.session(...)); // 启用会话支持，并填充 session 和 sessionStore\n\
    \n第 10 章：转向服务端\n\napp.use(app.router); // 执行路由函数\napp.use(express.static(...));\
    \ // 提供静态文件服务\napp.use(express.errorHandler(...)); // 报告任何异常\n```\n\n你可以对中间件其他层级的执行进行一定程度的控制。这种控制通过`next()`函数赋予你，它通常作为第三个参数传递给回调函数。在此之前，我们一直忽略第三个参数：\n\
    \n```javascript\napp.get('/', function(req, res) {\n  …\n});\n```\n\n要接收这个回调，只需像这样添加一个参数：\n\
    \n```javascript\napp.get('/', function(req, res, next) {\n  …\n});\n```\n\n请求的执行会在决定不调用`next()`的中间件处停止。忽略`next()`意味着该中间件决定返回结果，并且不希望将执行传递到更低层级。\n\
    \n请看代码清单 10-27，它演示了如何利用这个技巧实现一些疯狂的内容过滤。假设有一个非常特殊的静态页面，只对至少完成了十次操作的用户显示。我们可以添加一个路由来匹配该页面地址，并在其中检查安全限制。\n\
    \n**代码清单 10-27.** *通过层级传递控制权*\n\n```javascript\napp.get('/prize.html', function(req,\
    \ res, next) {\n  if (req.session.totalTurns && req.session.totalTurns > 10) {\n\
    \    next();\n  } else {\n    res.send(\"点击次数还不够哦！\");\n  }\n});\n```\n\n当路由器收到对`/prize.html`的请求时，它会检查用户的操作次数。该值存储在会话中。如果值大于十，我们只需调用`next()`。这样做可以让其他中间件继续工作。反之，如果点击次数不够，我们就自己处理请求。由于我们没有调用`next()`，请求处理在此停止，静态中间件甚至不会知道用户曾试图访问该页面。只有当你的路由器在堆栈中位于静态中间件之上时，这个技巧才有效。否则，你将无法过滤请求，因为静态中间件会先于你提供内容。\n\
    \n如果在中间件层级中遇到错误并决定让它继续传递，你应该将错误作为参数传递给`next()`函数。然后错误会被注册的错误处理器捕获并处理。请继续阅读以了解其工作方式。\n\
    \n## 内务整理\n\n本章的最后一部分将致力于那些虽小但实用的内务管理任务。\n"
- fmt: "# Tasks That Every Web Server Should Do\n\nTasks that every web server should\
    \ do: logging, error reporting, and support for different environments. You probably\
    \ noticed a couple of new bits of middleware in the previous section: `logger`\
    \ and `errorHandler`. Let’s look at them to finalize our acquaintance with the\
    \ Express framework.\n\n## Reporting Errors\n\nBoth logging and reporting are\
    \ pretty important tasks—it is impossible to imagine a serious web server that\
    \ is running in a production environment and ignores at least one of the two.\
    \ We start with the error reporting system and write some code that will do something\
    \ wrong and produce the error (see Listing 10-28). That’s the easy part—introducing\
    \ bugs are so much easier than solving them!\n\n**Listing 10-28.** Creating Artificial\
    \ Error to Show How It Is Handled by the Server\n\n```\nvar express = require('express');\n\
    var app = express.createServer();\napp.set('views', __dirname + '/views');\napp.set('view\
    \ engine', 'ejs');\napp.use(express.cookieParser());\napp.use(express.session({\
    \ secret: \"gameserversession\" }));\napp.use(app.router);\napp.use(express.static(__dirname\
    \ + '/public'));\napp.get('/', function(req, res) {\n  var foo = {};\n  var bar\
    \ = foo[\"bar\"].baz;\n  res.send(\"This shouldn't be visible\");\n});\napp.listen(80);\n\
    ```\n\nObviously, trying to access the property of undefined must break something.\
    \ Run the server and run the request. The error message is passed to the console\
    \ as well as rendered on the web page. For my environment, the stack trace looks\
    \ like the following:\n\n```\nTypeError: Cannot read property 'baz' of undefined\n\
    \  at C:\\apps\\projects\\jsbook\\chap10\\err.js:18:25\n  at callbacks (C:\\apps\\\
    projects\\jsbook\\chap10\\node_modules\\express\\lib\\router\\index.js:272:11)\n\
