    -   不要使用过于响亮或扰人的声音，或带来负面情绪的声音。例如，游戏结束事件播放逼真的婴儿哭声，并不会激励你的玩家再试一次。\n\n遵循这些简单的建议，你的游戏音频将顺利且自然地融入到游戏进程中。\n\
    \n## 总结\n\n在本章中，我们学习了如何在浏览器中处理声音。声音 API 仍然远非完美，尤其是在移动设备上。像 `SoundManager2` 这样的库旨在使声音能够轻松地从\
    \ JavaScript 访问。当浏览器无法播放某些声音格式时，`SoundManager` 会使用 Flash 插件，并允许你在任何地方播放媒体。\n\n"
- fmt: "# Adding Sound\n\nEven on rather outdated browsers.\n\nWe learned how to play\
    \ individual sounds and sound loops, how to deal with lossy sound format problems,\
    \ and how to play seamless loops. We also looked at the sound capabilities of\
    \ Apache Cordova to add sound to native applications.\n\nWe added sound capabilities\
    \ to Escaping Knight — the game created with the Crafty engine in Chapter 14.\
    \ We used three sounds — a background loop, a “click” effect, and a “game over”\
    \ tune.\n\n## Going Further\n\nIn this book, we learned the fundamental techniques\
    \ of Android web game development. Now you have a clear understanding how to make\
    \ your own Android web game from scratch: 2D or 3D, single-player or multiplayer,\
    \ with sound, animations, and AI. But game development doesn’t end here.\n\nThe\
    \ world of mobile entertainment is a world that moves extremely fast. Things that\
    \ sounded fantastic even a few years ago are now a reality: GPS, 3D graphics,\
    \ rich media, networking, voice recognition, augmented reality — all brewed together\
    \ under a shiny screen of the brand new smartphone. The endless possibilities\
    \ for fundamentally different games are now open to you and ready to be explored.\n\
    \nThe future is exciting and ready for your craziest ideas.\n\n# Appendix A: Debugging\
    \ Client-side JavaScript\n\nOne of my friends once told me that “debugging JavaScript\
    \ code in Android is like chopping wood with a spoon.” The Android browser doesn’t\
    \ have any sort of debugger by default. There’s no way to follow the typical debugging\
    \ scenario: place a breakpoint, add some watches, and then proceed in “step-by-step”\
    \ mode until you find the problem in the code. So the only thing that you have\
    \ is `console.log` — writing some values to the device’s log and reading it afterwards.\n\
    \nStill, there are several tools and tips that will hopefully make your debugging\
    \ experience, if not enjoyable, then at least somewhat easier.\n\nThis appendix\
    \ is devoted to those debugging tools. Debugging is the most important part of\
    \ the development process. Errors in the code are unavoidable and the best that\
    \ we can do is to try to fix them fast and without much effort.\n\nThe good news\
    \ is that you usually perform 90 percent of the work in your regular browser,\
    \ and only the final 10 percent of polishing on the device. Usually if you have\
    \ a bug that shows up on your smartphone, you have exactly the same bug in the\
    \ desktop browser, and desktop browsers have a lot of very nice tools to locate\
    \ the problem and fix it.\n\nAndroid’s default browser is based on WebKit. Obviously,\
    \ your primary desktop equivalent that you’ll use for early testing and debugging\
    \ should be from the same family. The most popular WebKit-based browsers are Safari\
    \ and Google Chrome. Both have a powerful set of “developer’s tools.” If you find\
    \ yourself comfortable with debugging in one of these browsers, you will surely\
    \ be able to do the same with another.\n\nIn this appendix, we will learn how\
    \ to do the following:\n\n- Use the desktop browser to debug common problems\n\
    - Use default instruments available in Android\n- Work with weinre to simplify\
    \ some of the debugging tasks\n\n## Debug Example\n\nIn this appendix, we use\
    \ an approach based on a hands-on example. Let’s try to do the simplest possible\
    \ debugging session for our web page. We will need some JavaScript code to work\
    \ with (see Listing A-1).\n\n### Listing A-1. Buggy JavaScript Code Sample\n\n\
    ```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\"\
    \ />\n<script>\nfunction getMax(a, b) {\n    if (a > b)\n        return a;\n \
    \   if (b > a)\n        return b;\n}\n\nfunction init() {\n    writeToDiv(getMax(1,\
    \ 2));\n    writeToDiv(getMax(4, 1));\n    writeToDiv(getMax(1, 1));\n}\n</script>\n\
    ```"
