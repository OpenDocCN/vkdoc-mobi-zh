- fmt: "# Entity Component System\n\nLet’s think about a typical game with many different\
    \ objects that have different qualities. A strategy game is a good example. There\
    \ are two main categories of game entities: buildings that are constructed by\
    \ engineers and that stand still on the ground, and units that can move, shoot,\
    \ fly, heal other units, carry passengers, and do other useful things. Now think\
    \ about the hierarchy of classes for such a game. The generic ‘game entity’ should\
    \ be on the top of the hierarchy. Then we have two types of entities: buildings\
    \ and units. Each unit, in turn, can fly or walk, damage or heal, transport or\
    \ be transported, or even both. If you continue building the class tree like that,\
    \ you soon end up with a rather complex architecture that is hard to manage. An\
    \ example of such a heavyweight hierarchy is shown in Figure 14-4.\n\n![](index-547_1.jpg)\n\
    \n**Figure 14-4.** *A typical problem with inheritance of game entities*\n\nEven\
    \ if you manage to break entities into branches of a tree, you soon face the problem\
    \ of adding new entities that must belong to two branches at once. What if there\
    \ is a building that can heal nearby units? On the one hand, it belongs to the\
    \ ‘building’ hierarchy, but on the other hand, it must be inherited from `Healer`.\
    \ `Healer` belongs to ‘units’, however. This means that it has many methods that\
    \ are useless for a building. The same happens if you try to add the ‘Fighting\
    \ Miner’ or the ‘Flying Mechanic’. In fact, this issue is a typical problem with\
    \ inheritance. Multiple interchangeable qualities that do not depend on each other\
    \ is the worst-case scenario for inheritance.\n\nThe alternative is to use the\
    \ ‘composition’ approach. Extract specific qualities like `Fighter`, `Healer`,\
    \ `Builder`, or `Flyer` into separate objects, as shown in Figure 14-5. Crafty\
    \ uses the term components to describe such qualities. Each component has methods\
    \ and properties that are specific to the quality that it describes. For example,\
    \ a `Flyer` can have properties like `pitch`, `yaw`, and `flightSpeed`, and have\
    \ methods like `doBarrelRoll()` or `land()`. Whereas a `Mechanic` would have `sparePartsLeft`\
    \ and `startFixing()`.\n\n![](index-548_1.jpg)\n![](index-548_2.jpg)\n\n**Figure\
    \ 14-5.** *The “qualities” or “components” of the game entities*\n\nThe components\
    \ are then ‘injected’ into the objects, so that they describe the exact game unit\
    \ that you want. Figure 14-6 shows some possible sets of qualities for units.\n\
    \n**Figure 14-6.** *Combining components to describe the qualities of the unit*\n\
    \nBy using this approach, the Flying Mechanic is composed of three components:\
    \ `destroyable` (since someone can shoot it), `flying` (because it can fly and\
    \ has parameters like flight speed and flight distance), and `mechanic` (meaning\
    \ that it can fix broken units). Similarly, the Healing Building and the Aggressive\
    \ Miner are also composed of three components.\n\nIn JavaScript, the implementation\
    \ of such a system is very straightforward. Essentially, the component is a collection\
    \ of functions and variables that you have to add to the object in order to describe\
    \ certain qualities. For example, `Flyer` and `Mechanic` components could look\
    \ as follows:\n\n```\nvar Flyer = {\n  pitch: 0,\n  yaw: 0.31,\n  doBarrelRoll:\
    \ function() {\n    // code goes here\n  }\n}\n\nvar Mechanic = {\n  sparePartsLeft:\
    \ 10,\n  startFixing: function() {\n    // code goes here\n  }\n}\n```\n\nIf we\
    \ need to create a Flying Mechanic unit, we have to combine the code from both\
    \ components into a single object so that result looks as follows:\n\n```\nvar\
    \ FlyingMechanic = {\n  pitch: 0,\n  yaw: 0.31,\n  sparePartsLeft: 10,\n  startFixing:\
    \ function() {\n    // code goes here\n  },\n  doBarrelRoll: function() {\n  \
    \  // code goes here\n  }\n}\n```\n\nCombining components programmatically is\
    \ quite easy too. A sample implementation is presented in Listing 14-1. Note that\
    \ this is not a Crafty implementation, but rather a simplified model that shows\
    \ how this system works.\n\n**Listing 14-1.** *Combining Components Programmatically*\n\
    \n```\nvar flyingMechanic = {};\n```"
