  trans: '

    # 第 11 章：与服务器通信


    ## 共享或 CORS


    CORS（跨域资源共享）是一种在 [www.w3.org/TR/cors/](http://www.w3.org/TR/cors/) 中描述的规范。该规范描述了服务器必须发送给客户端以允许访问其资源的特殊标头。使用
    CORS 更为可取，因为 JSONP 对请求生命周期（例如，一旦启动就无法取消）和错误处理的控制能力要弱得多。使用 CORS 的最后一个重要原因是它是一个受支持的标准，而不是像
    JSONP 那样的权宜之计。


    ## Flash Socket


    Flash Socket 是一种依赖 Flash 插件来处理与服务器通信的传输方式。Flash 组件通知 JavaScript 新事件的发生。Flash 负责通知，而
    JavaScript 负责处理逻辑。许多人不同意这种传输方式已经过时；事实上，Flash 在处理持久的低延迟连接方面做得非常好，非常类似于 WebSocket。然而，Adobe
    停止了对移动设备上 Flash Player 的支持——这就是为什么不能再依赖这种传输方式的原因（至少不能在智能手机上）。


    这种传输方式过时，并不是因为通信技术被更好的 API 取代，而是因为它所依赖的核心组件现在已走到生命周期的尽头。


    ## 永久 IFRAME


    永久 IFRAME 是最古老的传输方式：它依赖于 HTTP/1.1 的一个特性及其分块编码，该编码最初是为了处理非常大的文档而引入的。IFRAME 与服务器建立一个永不关闭的连接。服务器的任务是不断提供新的数据块——即包含处理新事件命令的
    script 元素。每当服务器需要发送事件时，它就会向这个无限页面中追加另一个 `<script>` 块。该脚本会被客户端立即执行，这就是这种传输方式提供低延迟通信的原理。


    这种传输方式已经过时，因为它已被本节前面描述的几种更好的解决方案所取代。永久 IFRAME 的两个主要缺点是在不同浏览器之间行为不一致以及错误处理能力差。


    ## 在现场测试传输方式


    一个好的传输方式的主要要求之一是可靠性。我们生活在一个不完美的世界，移动数据连接有时可能会中断。作为开发者，你对此无能为力。你的目标是确保连接的暂时中断不会将玩家踢出游戏，并且当连接恢复后，他可以继续游戏。此外，在连接不畅期间游戏尝试发送的消息不应丢失。这些消息应该被保存在某个地方，以便在设备重新上线后发送并传递到服务器。


    测试游戏的最佳方式是启动一个服务器，然后尝试在从家到办公室的路上进行游戏。从家里的 Wi-Fi 连接开始，然后当你走到街上时切换到 3G。坐几站公交车，然后换乘地铁，继续在那里进行你的实验。最后，去买杯咖啡，然后去公园。别忘了在有空闲时间时接听来电或发送几条短信。


    现在，请诚实地回答以下问题：


    -   你的在线游戏体验如何？

    -   是否有任何卡顿或崩溃？

    -   你是否丢失了任何数据、回合或服务器更新？

    -   一旦服务器变得可用，游戏引擎是否能够恢复同步？

    -   你的游戏是否显示某种消息来警告你未连接？

    -   从你的对手的角度看情况如何？他是否知道你正在失去连接？他应该知道吗？当他看到你几分钟没有响应时，他是否有机会结束比赛？


    如果你在第一次进行此类实验后对所有答案都感到满意，请给我寄张明信片。我想生活在一个拥有完美移动数据覆盖的城市。


    跑遍全城并不是调试网络的最佳方式，但是如何

    '
- fmt: '### Debugging Network Issues


    You debug it if your office Wi-Fi works perfectly? There are a few tools that
    simulate a bad network; they are designed specifically for these cases.


    #### `DDMS` (Dalvik Debug Monitor Server)


    The simplest tool for simulating a bad network is an Android emulator along with
    a standard utility called the Dalvik Debug Monitor Server, or `DDMS`. It is located
    in the `Tools` folder of your emulator installation. Run the application and find
    the `Emulator Control` tab on the right (see Figure 11-4). It has a few options
    to control the behavior of the data, the bandwidth, and the delay.


    ![](index-476_1.jpg)


    **CHAPTER 11: Talking to the Server**


    **Figure 11-4.** *The DDMS window shows several options to simulate a realistic
    network* There’s also an option to completely kill the emulator’s connectivity,
    but it’s not a good idea to select it: `DDMS` and `ADB` (Android Debug Bridge)
    communicate with the emulator via the network. If you turn networking off, you
    will not be able to turn it on again the same way since the emulator will not
    respond anymore.


    The `Telephony Actions` section allows you to simulate an incoming voice call
    or SMS.


    #### Specialized Software That Simulates a Bad Network


    `DDMS` is somewhat limited since it can only simulate low bandwidth and network
    delays. It can’t simulate loss of packets and temporary disconnects.


    Fortunately, there are several solutions available to simulate a poor network,
    although most of them require some knowledge of networking.


    Unfortunately, an in-depth discussion of network configurations and setting up
    a system that will help you to simulate realistic mobile traffic are outside the
    scope of this book. However, I will give you information on `DummyNet` and `WANem`,
    which are good software to start with.


    `DummyNet` ([http://info.iet.unipi.it/~luigi/dummynet/](http://info.iet.unipi.it/~luigi/dummynet/))
    is a tool for traffic shaping and low-connectivity simulation. It was originally
    developed for FreeBSD, but later ported to all major platforms, including Windows
    and Linux.


    **CHAPTER 11: Talking to the Server**


    **475**


    You can find a tutorial on setting rules for `DummyNet` at [http://cs.baylor.edu/~donahoo/tools/dummy/tutorial.htm](http://cs.baylor.edu/~donahoo/tools/dummy/tutorial.htm).


    The `WANem` project ([http://wanem.sourceforge.net](http://wanem.sourceforge.net))
    is a tool based on a custom Knoppix distribution. Basically, `WANem` is a separate
    OS that should be loaded either from a live CD or inside a virtual box so that
    it can run on every modern OS. `WANem` has an intuitive web interface that allows
    people who just want to test web game connectivity to set up the environment for
    testing without having to dive deep into the networking details. There are other
    tools out there, but `DummyNet` and `WANem` seem to be the most popular.


    ### Summary


    In this chapter, we reviewed the broad range of techniques available for loading
    data from the server. There are two major types of communication:


    - **Ajax**: The "classical" model in which the client is the only party that can
    initiate the communication.

    - **Reverse Ajax**: The "inverted" model, also known as server push and comet,
    in which the server can push the messages to the client.


    We learned that there are multiple available APIs for both techniques, but most
    of the devices in the market do not support newer APIs at a good level. For Ajax,
    we learned how to request data from the server via plain `XMLHttpRequest`, as
    well as a better version of the same API—`XMLHttpRequest Level 2`. We also studied
    the problem of loading binary data and parsing it on the side of the client.


    Reverse Ajax allows us to build a relatively reliable and low-latency communication
    channel between the server and the web page for communication that is close to
    real time.


    In order to do that, the client and server have to establish a connection and
    keep it open as long as possible. The server can then use this connection to send
    updates. There are several ways to establish this kind of communication and support
    the connection, and these approaches are called transports.'
