    \            }\n        }\n    }\n\n    this._sortCache();\n    this._cacheDirty\
    \ = false;\n    this._cacheUnsorted = false;\n};\n\n_p._sortCache = function()\
    \ {\n    this._cache.sort(function(a, b) {\n        var aBounds = a.getBounds();\n\
