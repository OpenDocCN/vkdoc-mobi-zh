  trans: '

    # 第八章：浏览器中的 3D 世界


    你受限于在 CPU 中执行每条指令的 **JavaScript** 引擎。由于 CPU 并非为此类运算而优化，因此与使用 GPU 渲染相比，渲染所需的时间要多得多。


    事实上，在 **WebGL** 出现之前，构建完全自定义的 3D 渲染器是在浏览器中创建 3D 效果（且无需 Flash 或 Java）的唯一途径。人们曾发明过自己的
    3D 引擎，其中一些实验令人印象深刻。但遗憾的是，归根结底，你无法在 2D 环境中编写出质量过硬的 3D 游戏。**WebGL** 的工作方式截然不同——它允许你将所有最繁重的
    3D 计算交给 GPU 处理。


    目前市场上的大多数手机尚未配备独立的 GPU，但这只是时间问题。如果在这样的手机上启动 **WebGL** 会发生什么？它还能工作吗？快速回答：是的，能工作。但它仍然使用
    CPU 来渲染场景，在这种配置下你无法获得很高的帧率。当 3D 场景由 GPU 渲染时，称为**硬件渲染**，这意味着数学运算和繁重计算都由专门针对此类任务优化的
    GPU 完成。相反的情况称为**软件渲染**，即使用 CPU 渲染场景，例如在不使用 WebGL 的 JavaScript 中，或者在不支持其所需硬件的设备上进行渲染。


    **注意：** 即使在你台式机上，也可能遇到 WebGL 加速问题。有一份特殊的“黑名单”，列出了已知会导致 WebGL 问题的硬件-驱动-操作系统组合。如果你的电脑属于黑名单类别，你的
    WebGL 上下文将无法加速，或者 WebGL 会被完全禁用。如果你仍想自担风险启用它，每个浏览器都有一个启动参数可以强制忽略黑名单。在 Chrome 中，使用选项
    `--ignore-gpu-blacklist` 启动浏览器。在 Firefox 中，转到 `about:config` 并设置 `webgl.force-enabled=true`。


    ## 3D 渲染的工作原理


    这是整本书中最难写的章节之一。3D 渲染确实是一个复杂的主题，完全有可能单独写上一两本名为《3D 渲染是如何工作的》的书。我试图只解释 3D 渲染的重要核心内容，并为你后续理解其背后更高级的算法打下良好基础。我也会尽量减少数学公式的复杂度，但某些地方仍然需要写一些公式。


    ### 数学部分


    我们先来说说关于 3D 的好消息。你在平面二维空间中使用的数学在 3D 中同样适用。3D 中的所有东西都只是 2D 加上一个额外维度，称为 `z`。在 2D
    中，线段中点的计算如下：


    ```

    x = (x1 + x2) ÷ 2, y = (y1 + y2) ÷ 2

    ```


    再增加一个维度，就得到了 3D 版本：


    ```

    x = (x1 + x2) ÷ 2, y = (y1 + y2) ÷ 2, z = (z1 + z2) ÷ 2

    ```


    两点之间的距离也是如此。在二维空间中，公式是：


    ```

    d = sqrt((x1 - x2)² + (y1 - y2)²)

    ```


    增加第三个维度后，公式变为：


    ```

    d = sqrt((x1 - x2)² + (y1 - y2)² + (z1 - z2)²)

    ```


    为什么现在要强调这个？因为有时理解 2D 中的运作方式要比 3D 容易得多。理解 2D 图形和公式更简单，一旦你掌握了它们，转向 3D 就一点也不难了。如果你在理解
    3D 的某些概念时遇到困难，无论是在本章还是其他地方，试着用 2D 空间中的相同概念来思考。如果能找到类似的例子，你很快就能理解 3D。


    当然，任何规则都有例外。例如，在 2D 中，直线要么平行，要么在某处相交。而在 3D 中，直线完全可能既不平行也不相交。


    ### 一个 3D 示例


    让我们从一个非常基本的现实生活例子开始。在 2D 表面上进行 3D 渲染最常见的例子是什么？没错——就是用相机拍照或录像。


    `![](img/index-340_1.jpg)`

