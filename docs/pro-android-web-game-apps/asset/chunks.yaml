  trans: "\n# 第七章：制作等距引擎\n\n当然，如果函数绑定到某个对象，那么 `apply()` 和 `call()` 都无法改变这一行为。\n\n\
    **注意：** 严格来说，`apply()` 和 `call()` *确实* 会改变“绑定”函数中 `this` 关键字的值，但不会改变原始函数中的值。不过这种改变不会产生任何效果，因为绑定函数并不依赖\
    \ `this`。\n\n## 数学函数与 `Rect` 类\n\n自然，编写 2D 引擎需要一些 2D 数学知识。等距引擎也不例外。最常见的数学运算包括矩形操作——判断两个矩形是否相等，测试对象是否可见（对象矩形与视口矩形相交），测试用户是否点击了对象（点击位置在对象矩形内），以及找出需要重绘以覆盖所有脏区域的最小矩形（寻找矩形凸包）。\n\
    \n由于函数数量众多，若将它们分散在代码中会显得杂乱。更好的方法是创建一个类，并在其中实现所有矩形处理相关的数学运算。我们将这个类命名为 `Rect`（`Rectangle`\
    \ 输入起来太长了）。这些函数的代码实际上属于大家在学校学过的基础数学课程内容，因此在此不再赘述。完整源代码随本章资料一起提供，位于 `js/Rect.js`\
    \ 文件中。这里我们仅列出函数声明，以便了解我们依赖的工具：\n\n```\nfunction Rect(x, y, width, height) {\n\
    \    this.x = x; this.y = y;\n    this.width = width; this.height = height;\n\
    }\n\n_p = Rect.prototype;\n\n/* 创建一个与给定矩形大小和位置完全相同的新矩形 */\n_p.copy = function()\
    \ {...}\n\n/* 如果两个矩形相等则返回 true（大小和位置相同） */\n_p.equals = function(r2) {...};\n\n\
    /* 返回矩形的字符串表示，便于调试 */\n_p.toString = function() {...};\n\n/* 将 toString() 的值输出到控制台\
    \ */\n_p.print = function() {...};\n\n/**\n * 所有接受 4 个参数（坐标）的函数\n * 也可以接受单个参数（矩形）\n\
    \ */\n\n/* 如果两个矩形相交（共享部分区域）则返回 true */\n_p.intersects = function(x2, y2, w2, h2)\
    \ { ... };\n\n/* 如果该矩形完全覆盖另一个矩形则返回 true。 */\n_p.covers = function(x2, y2, w2,\
    \ h2) { ... };\n\n/* 返回当前矩形与作为参数传入的矩形的凸包。\n * 换句话说，返回能够覆盖两者的最小可能矩形。\n */\n_p.convexHull\
    \ = function(x2, y2, w2, h2) { ... };\n\n/* 返回两个矩形的交集 */\n_p.intersection = function(x2,\
    \ y2, w2, h2) { ... };\n\n/* 如果该矩形包含坐标 (x, y) 的点，则返回 true */\n_p.containsPoint\
    \ = function(x, y) { ... };\n\n/**\n * 给定一个矩形单元格网格，单元格大小为 (cellW, cellH)，\n *\
    \ 测试该矩形重叠了哪些单元格。\n * cellsInRow 和 cellsInColumn 仅用于限制坐标，\n * 以防止例如数组访问越界。\n */\n\
    _p.getOverlappingGridCells = function(cellW, cellH, cellsInRow, cellsInColumn)\
    \ {\n    ... };\n```\n\n## `GameObject` 类\n\n在编写引擎本身之前，我们需要创建的另一个重要类是 `GameObject`。这个类是游戏中所有实体的根类：对象、图层、UI\
    \ 小部件等。我们放在屏幕上、渲染、移动或调整大小的所有东西都属于这个类。清单 7-4 是 `GameObject.js` 的代码。清单中最有趣的部分是 `setPosition()`。一旦\
    \ `GameObject` 确认新位置与旧位置确实不同，它就会触发 `move` 事件。其他实体（如图层）可以订阅此事件并相应地更新世界（例如，`ObjectLayer`\
    \ 的聚类算法需要追踪每个对象的移动以保持聚类的一致性）。\n"
- fmt: "### **Listing 7-4.** The `GameObject` Class: The Root of Game Objects Hierarchy\n\
    \n```javascript\nfunction GameObject() {\n  EventEmitter.call(this);\n  this._id\
    \ = GameObject._maxId++;\n  this._bounds = new Rect(0, 0, 100, 100);\n}\n\nextend(GameObject,\
    \ EventEmitter);\n\nvar _p = GameObject.prototype;\nGameObject._maxId = 1;\n\n\
    _p.draw = function(ctx) {\n  // To implement\n};\n\n_p.setSize = function(width,\
    \ height) {\n  this._bounds.width = width;\n  this._bounds.height = height;\n\
    };\n\n_p.move = function(deltaX, deltaY) {\n  this.setPosition(this._bounds.x\
    \ + deltaX, this._bounds.y + deltaY);\n};\n\n_p.setPosition = function(x, y) {\n\
    \  if (this._bounds.x != x || this._bounds.y != y) {\n    var evendData = {\n\
    \      oldX: this._bounds.x,\n      oldY: this._bounds.y,\n      x: x,\n     \
    \ y: y,\n      object: this\n    };\n    this._bounds.x = x;\n    this._bounds.y\
    \ = y;\n    this.emit(\"move\", evendData);\n  }\n};\n\n_p.getBounds = function()\
    \ {\n  return this._bounds;\n};\n\n_p.getId = function() {\n  return this._id;\n\
    };\n```\n\nThe `GameObject` extends `EventEmitter`, so every game object can send\
    \ custom events. This is a rather handy feature. For example, the `IsometricTileLayer`\
    \ can emit a `tileClicked` event with some extra parameters to notify the outer\
    \ world that the user clicked a certain tile, while `ObjectLayer` can emit `objectClicked`——an\
    \ event specific to its domain.\n\nEach game object has a unique ID. This ID is\
    \ useful for many things——from network synchronization (determine exactly which\
    \ one of ten buildings is now destroyed) to small but important things like debugging.\
    \ The code for the `GameObject` class uses a global counter to keep track of the\
    \ maximum ID issued to the game objects, and increments it for every subsequent\
    \ constructor call.\n\n### **Arrays**\n\nThe final utility class groups a small\
    \ set of tools to make working with arrays at least a little easier. JavaScript\
    \ has very poor support for array operations; even such simple functions like\
    \ `contains()` and `remove()` that are typically present out of the box in other\
    \ languages are absent in JavaScript. We will need only three helper methods.\
    \ This class, shown in **Listing 7-5**, is so tiny that I put it straight into\
    \ the `utils.js`.\n\n### **Listing 7-5.** The `Array` Class: The Tiny Collection\
    \ of Helper Methods to Make Array Operations Easier\n\n```javascript\nvar Arrays\
    \ = {\n  remove: function(obj, arr) {\n    var index = arr.indexOf(obj);\n   \
    \ if (index != -1)\n      arr.splice(index, 1);\n  },\n  contains: function(obj,\
    \ arr) {\n    return arr.indexOf(obj) > -1;\n  },\n  addIfAbsent: function(obj,\
    \ arr) {\n    if (!Arrays.contains(obj, arr)) {\n      arr.push(obj);\n    }\n\
    \  }\n};\n```\n\n**NOTE:** There is a very nice library called `Underscore.js`\
    \ that has implemented most of the missing data-manipulation functions of core\
    \ JavaScript. Check it out at [http://underscorejs.org](http://underscorejs.org).\
    \ You might find it quite convenient for your projects.\n\nNow we have several\
    \ useful utility functions at our disposal. The game skeleton is ready, and we\
    \ can start adding the components of the engine——terrain, objects, UI controls,\
    \ and events. We will start with terrain.\n\n## Isometric Terrain\n\nThe first\
    \ step of the project is to render an isometric terrain. We’ve already had a fair\
    \ amount of theory in Chapter 6, so now it is time to implement it in practice.\
    \ Let’s start with refreshing our knowledge about the coordinate systems of the\
    \ game engine.\n\n### Coordinate Systems\n\nThere are at least several systems\
    \ of coordinates for games like these: screen coordinates, world coordinates,\
    \ and isometric grid coordinates. It is important to understand the difference\
    \ between them, as well as how to translate coordinates from one system to another.\
    \ Make sure that you are familiar with the material in this section before you\
    \ move on; otherwise, most of the formulas in this chapter might look scary.\n\
    \nThe game world is a vast area that has many different objects. Each object has\
    \ coordinates within the world space. If you think about the world as a huge image,\
    \ say 5000 × 5000 pixels, then the world coordinates are the coordinates within\
    \ that image. The world coordinates are useful for in-game mechanics: AI,"
