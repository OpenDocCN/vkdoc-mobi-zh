  trans: "\n### 关于 GLSL 的简介\n\n与 C 语言相比，JavaScript 更像 C，并且 (2) 调试它们相当困难。让我们从查看最简单的顶点着色器代码开始，该代码计算点到屏幕的投影（参见清单\
    \ 9-5）。\n\n**清单 9-5.** *最简单的顶点着色器*\n\n```glsl\nattribute vec3 aPos;\nuniform mat4\
    \ uMVMatrix;\nuniform mat4 uPMatrix;\n\nvoid main(void) {\n    gl_Position = uPMatrix\
    \ * uMVMatrix * vec4(aPos, 1.0);\n}\n```\n\n直观地看，这个程序的工作原理很清晰：\n\n- 着色器从外部世界接收三个参数：`aPos`、`uMVMatrix`\
