    on


    a still image, we get significantly better results for the moving map! My Galaxy
    S


    now holds a steady 45 fps for this demo. The version of the code at its current


    state is saved into the v.04 folder along with other code for this chapter.


    The same type of optimization can be applied to loading the blocks of the map


    from the server. We have divided the map into few virtual zones: the viewport----


    what the user currently sees; the offscreen buffer----what is pre-rendered; and


    the rest of the world. The rules are simple: when the user is reaching the end
    of


    a zone, the zone is recalculated (in our case, the offscreen buffer is re-rendered).


    But what if we add one zone between the offscreen buffer and the rest of the


    world like in Figure 6-10? We store the map data that has already transferred
    to


    the browser in that new zone, and once the user reaches the border, we load


    the new data from the server. This is an expansion of the idea that we already


    implemented.


