    本章开头，我们将简要回顾网络通信的演进历程：从历史 API 到即将面世的尖端技术。随后，我们将准备应对更复杂的任务：探索客户端与服务器之间的不同通信方式，并构建支持双向消息发送的实时解决方案。


    ## 第 11 章：与服务器对话


    ### 浏览器中网络功能的演进


    让我们上一堂（非常）简短的历史课，看看网络技术如何帮助 Web 应用发展到今天的样子，开发者曾面临哪些问题，以及这些问题中大部分是如何被解决的。


    早期，浏览器只能渲染纯 HTML 页面、点击链接、下载和显示图片，并提供搜索、书签等少数实用功能。没有人将浏览器视为构建丰富应用或游戏的平台。当时使用 Web
    的常规模式是：


    - 加载页面

    - 阅读页面内容

    - 点击链接，在地址栏输入地址，或需要新内容时重新加载页面


    显然，这种模式将网页的完全控制权交给了用户；没有用户的明确操作，内容将保持不变。这种模式非常适合被动浏览和探索静态数据。例如，允许用户阅读书籍章节的网站可以完全不依赖
    JavaScript 和 Ajax 等动态功能运行，仍然保持可读性和用户友好性。


    然而，有许多情况下这种模式不足以支持舒适的浏览体验。重新加载网页意味着重新加载其每个部分；在某些情况下，这可能是冗余且浪费的。想象一个左侧有分层菜单的页面。如果所有页面都是静态的，点击菜单项展开将导致整个页面重新加载。即使流量不是问题，从头开始渲染页面的过程也会分散用户的注意力——至少页面会闪烁。


    这种模式最终必然"终结"。事实上，它的实际使用存在大量开销，甚至像聊天或 Web 游戏这样的基本交互式应用也无法在无法在不重新加载页面的情况下从服务器加载新数据时实现。然后
    Ajax 登场了。


    Ajax 是一种无需重新加载网页即可加载服务器数据的技术。它最初由微软实现为名为`XMLHTTP`的小组件。后来，`XMLHttpRequest`使得查询服务器、接收响应并仅更新需要更新的页面部分成为可能。


    Ajax 感觉像是 Web 的自然演进——允许网页在不重新加载的情况下执行 HTTP 请求，使开发者能够创建一个全新的 Web 应用世界；更复杂的网页中，用户与浏览器之间的交互不再仅仅是浏览过程的副产品。当然，即使在
    Ajax 出现之前也有可能制作动态网页——例如，通过将永不间断的内容流加载到`IFRAME`中——但这些技术只是权宜之计：它们缺乏可靠性和良好的跨浏览器支持。


    **注意：** 严格来说，Ajax 是 Asynchronous JavaScript and XML（异步 JavaScript 和 XML）的缩写。缩写词通常使用大写字母拼写。然而，这个词已成为一个普通名词，大多数在线媒体将其拼写为
    Ajax。在本书中，我将采用第二种命名方式。


    Ajax 既不是标准，也不是实现方案或 API 名称。它只是一个流行术语。

    '
- fmt: 'Ajax is a technique that developers use for any approach that involves loading
    data from the server without reloading the page. We look at an example of an Ajax
    call later in this chapter.


    Ajax has its own limitations, and the main one is HTTP itself. HTTP is the request-response
    protocol where the communication between the client and the server follow a predefined
    order:


    1. The client sends a request describing exactly what it wants to read or update.

    2. The server analyzes the request, forms a response, and sends it back to the
    client.

    3. The connection is closed.

    4. To send another fragment of data, the client has to initiate a new connection.


    The server cannot send the message to the client by itself: this model of communication
    assumes that the server only responds to the requests from the page. The weaknesses
    of plain old Ajax is easy to understand when you use an example. Imagine that
    you are writing a multiplayer game that has an internal mail system. At some point,
    the server receives a new mail message that it needs to deliver to the user: we
    want to show a blinking ‘new mail’ icon in the corner of the screen. Even though
    the server now has the new data for the user, it cannot do anything with it because
    the server cannot initiate the new connection with the page. Instead, the server
    has to wait patiently for the new Ajax request, and only then respond with the
    new update. The obvious drawback of this model is that clients have to constantly
    poll the server to check whether there is a new message for them (more about this
    model and its problems in the next section of the chapter).


    Rich applications, especially games, often require better networking. They need
    a connection that works like TCP/IP: once the page opens it, it stays open, and
    either party (client and server) can send their messages at any time and in any
    order. Using a connection like that, the server could instantly send the mail
    notification to the client and not have to wait for a new request from the page.


    The next logical step of evolution was WebSocket, a technology to fill the gap
    of real-time, two-way communication between the web page and the server. WebSocket
    allows you to open a real TCP connection and send data without any HTTP overhead.
    Technologies like this one are pushing the whole area of HTML5 game development
    forward, opening possibilities that were unthinkable just a few years ago.


    **NOTE:** On the Android platform, WebSocket is only available in Chrome for Android.
    The absence of WebSocket in the standard browser is the reason for thousands of
    complaints coming from Android web developers. To make matters worse, iOS, Android’s
    main competitor, already supports it. There is no doubt that the Android stock
    browser *will* support it eventually, but for now, we just have to wait.


    WebSocket is exactly what web application developers wanted from the very start:
    a persistent two-way connection that is capable of sending messages with minimal
    overhead and latency. Games need it more than any other application since gaming
    is where latency is critical. If you have a chat application and the chat message
    arrives with a 200-millisecond delay, you are running a perfect chat, and your
    users will love it! If you’re about to make a real-time 3D shooter, that kind
    of latency is far too long—the game will appear inaccurate or choppy since 200
    milliseconds is the difference between hitting your target and hitting the wall
    behind him.


    Web developers and browser vendors have invented many different techniques to
    build a reliable solution for client-server communication. These techniques are
    called transports. WebSocket and Ajax polling are two different transports, both
    of them serving the same goal: to get the updates from the server back to the
    client as soon as possible. Many libraries hide the details of transports under
    an abstraction layer, so that developers don’t have to worry about implementation
    details like error handling or restoring broken connections.'
