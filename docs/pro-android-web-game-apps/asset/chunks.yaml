- fmt: '# 图像优化策略


    你有一个巨大的单张图像，即使是小更新也会强制客户端重新下载所有游戏内容。换句话说，这非常令人烦恼。


    一般的推荐做法是将精灵图按类别拆分；例如，主角一张图，敌人一张图，关卡物品一张图，等等。如果你决定更新某个物品，只需要重新下载一张图。


    你还应该考虑到，在游戏开始的第一分钟内，你几乎不可能需要所有游戏图形。例如，平台射击游戏通常有多个关卡。每个关卡可能有独特的图形——比如独特的背景或独特的敌人——这些图形在其他关卡中并不需要。显然，你不应该在用户到达某个关卡之前就下载这些图形。那将是浪费时间和带宽。


    ## 文件与数据URL


    `Data URL`并不是处理图像的常见方式。尽管`Data URL`有很多优点，但它们也有缺点。


    第一个也是最明显的缺点是`Data URL`难以管理。你可以在查看器应用程序中遍历图像，轻松找到你需要的图像。而`Data URL`是一堆字母；你无法区分编码为`Data
    URL`的汽车图像和同样方式编码的仓鼠图像（除非你是机器人，或者拥有特殊超能力可以即时解码`Base64`）。


    图像以二进制文件存储时占用空间更小。`Data URL`的大小比同一图像作为文件的大小大约大30%。如果你使用的网页服务器正在压缩内容，这个比率会略好一些，但二进制文件仍然更优。


    使用`Data URL`会将脚本与资源“耦合”，这是一种不好的做法。一旦你修改了其中任何一个，客户端就必须重新下载整个文件。编辑图像后，你必须重新生成`Data
    URL`。每次设计师改动一个像素，你就必须更新代码。


    `Data URL`的好处在于它们是文本。它们可以通过只接受文本的系统传输。它们可以嵌入到代码中，但这并不意味着它们应该被嵌入到代码中。上一节中的例子——占位图像——是`Data
    URL`的正确用法。我们想确保图像始终对脚本可用，这就是我们使用`Data URL`的原因。


    `![](index-144_1.jpg)`


    第四章：动画与精灵图


    **139**


    ## 那么策略是什么？


    检查你的游戏是否需要在启动时加载所有图形，或者某些文件可以等到玩家到达游戏中的某个节点再加载。如果是这种情况，你应该将可以延迟加载的图形分开，并在需要时才加载它们。


    一张合适的图像大小应该在`50 KB`到`250 KB`之间。如果小于这个范围，会产生大量请求，因此你应该将几个小文件合并成一个大文件（包含多个小精灵图的大图像被称为精灵表，我们将在本章后面讨论）。如果你的文件明显更大，它们会卡住进度指示器。此外，如果你修改了其中哪怕一个像素，你就必须从服务器重新下载它。


    在有充分理由时使用`Data URL`；否则，就使用传统的图像文件。


    ## 绘制图像


    加载图像本身并不有趣，但一旦你知道如何加载它，你就可以在画布上绘制它了。让我们继续我们的绘制实验。


    ### 如何绘制图像


    `Context2D API`中有一个专门的函数用于绘制图像，它叫做`drawImage()`。其思路是从图像（源）中获取一个矩形像素区域，并将其适配到画布（目标）中的矩形区域，如图4-5所示。


    ***图4-5.** 在画布上绘制图像*


    `![](index-145_1.jpg)`


    第四章：动画与精灵图


    该函数接受八个参数：


    ```

    drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)

    ```'
  raw: 'you have a single huge image, you’ll force the client to redownload all the
    game


    content, even after a small update. In other words, it’s really annoying.


    The general recommended way is to break sprites into categories; for example,


    one image for the main character, one image for the bad guys, an image for the


    level items, and so forth. If you decide to update an item, there’ll be only one


    image to redownload.


    You should also take into account that it is highly unlikely that you will need
    all


    the game’s graphics in the first minute of the game. Platform shooters usually


    have levels, for example. Each level might have unique graphics-----such as


    unique backgrounds or unique enemies-----that are not required for other levels.


    Obviously, you should not download these graphics before the user reaches a


    level. It’d be a waste of time and bandwidth.


    Files vs. Data URLs


    Data URLs are not a common way to work with images. Even though data URLs


    have a lot of advantages, they have disadvantages too.


    The first and most obvious disadvantage is that data URLs are not manageable.


    You can loop through the images in the viewer application and easily find the


    image you need. A data URL is a heap of letters; you cannot distinguish


    between a car image encoded as the data URL and a hamster image encoded


    the same way (unless you’re a robot or you have special super powers that let


    you decode Base64 on the fly).


    Images take up less space when they are stored as binary files. The size of a


    data URL is around 30 percent bigger than the size of the same image as a file.


    If the web server that you’re using is zipping the content, this ratio is slightly


    better, but binary files still win.


    By using data URLs, you ‘‘couple’ the script with the resources, which is a bad


    thing to do. Once you change either of them, you have to redownload the whole


    file on the client. After editing an image, you have to regenerate the data URL.


    Each time the designer changes a single pixel, you must update your code.


    The good thing about data URLs is that they are text. They can be transferred


    via systems that accept only text. They can be embedded into the code, but that


    doesn’t mean that they should be embedded in the code. The example in the


    previous section----the placeholder image-----is the correct usage of data URL.
    We


    want to guarantee that the image is always available to the script, and that’s


    why we’re using the data URL.


    ![](index-144_1.jpg)


    CHAPTER 4: Animation and Sprites


    **139


    So What’s the Strategy?


    Check that your game needs all the graphics on startup, or some of the files


    might wait until the player reaches some point in the game. If that’s the case,


    you should separate the graphics that can be loaded later, and load them only


    when they are needed.


    A good size for an image is something between 50 KB and 250 KB. Anything


    less is going to generate a lot of requests, so you should combine several files


    into a bigger one (the big image that holds multiple small sprites is known as
    the


    sprite sheet, which we discuss later in this chapter). If your files are considerably
    bigger, they will lock up the progress indicator. Besides, if you change even
    a


    single pixel in it, you’ll have to download it from the server again.


    Use data URLs when there’s a good reason to use them; otherwise, use good


    old image files.


    Drawing an Image


    Loading an image is not very fun by itself, but once you know how to load it,
    you


    can draw it on canvas. Let’s proceed with our drawing experiments.


    **How to Draw an Image**


    There’s a single function in Context2D API responsible for drawing an image; it’s


    called drawImage(). The idea behind it is to take a rectangular area of pixels


    from the image (the source) and fit it into the rectangular area in the canvas
    (the


    destination), as shown in Figure 4-5.


    ***Figure 4-5.** Drawing an image on the canvas*


    ![](index-145_1.jpg)


    CHAPTER 4: Animation and Sprites


    The function takes eight parameters:


    drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)'
