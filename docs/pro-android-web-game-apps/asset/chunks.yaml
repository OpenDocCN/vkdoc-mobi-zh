    ## 游戏的构成


    你玩过游戏吗？我相信你玩过。让我们从一个简单的问题开始：电子游戏到底是关于什么的？主要是为了获得乐趣，对吧？每个游戏都为玩家呈现一个虚拟世界，这个世界由其自身的规则和机制支配。这个世界可以像俄罗斯方块一样简单——一个屏幕，上面有砖块从上方落下——也可以像现代网络游戏那样复杂，里面有骑士和巫师、公会和政治。


    玩家试图完成一个目标：得分、将点连成一条线，或征服一两个星系。游戏本身是玩家与游戏世界之间的互动。玩家通过某种方式感知游戏状态：阅读文本、查看 3D 场景或浏览网页。玩家接收所有这些信息并采取行动。然后世界会更新，再次轮到玩家行动。他采取另一个行动，如此循环，直到游戏结束。


    那么，游戏实现这一切的关键组成部分是什么？如今，游戏强烈侧重于图形内容。实际上，游戏图形可能是吸引玩家并让他们尝试你的产品的唯一机会。玩家希望游戏漂亮，Web
    应用程序游戏也不例外。大多数游戏都有一个在屏幕上绘制世界的图形引擎。有些复杂，有些简单，但几乎没有完全没有任何图形的游戏。


    图形并非游戏的全部，它们只是视觉效果。游戏的核心是交互。玩家希望移动屏幕上的星际飞船，并将它们送入战斗。每个游戏开发项目的第二个关键部分是用户输入处理。


    我们已经习惯了控制器、鼠标和键盘，但移动平台提供了完全不同的交互方式：触摸屏、加速度计、陀螺仪和其他传感器。用户无法执行“鼠标右键单击”，但他们可以点击、滑动、摇晃或旋转他们的设备。直观的操作听起来可能很容易实现，至少在你开始编写实际代码之前是这样的。'
  raw: 'We learned what a prototype is and where it comes from. We also learned what


    a prototype chain is and how the JavaScript engine resolves the property of the


    object when it needs to access it.


    We built a simple example to test the advantages of OOP and created a simple


    function to ‘‘chain’’ the prototypes of the constructor functions.


    The environment is now prepared and you are ready to start the development of


    real applications. Read on to the next chapter to make your first game.


    Chapter


    **Graphics in the**


    **Browser: The Canvas**


    **Element**


    In this chapter, we will learn how to ‘ draw’’ on a web page-----or specifically,


    display arbitrary shapes using the canvas element. We will experiment with the


    drawing API, trying the most common things, such as drawing a line and filling
    a


    rectangle with the gradient fill. The code from this chapter serves as the basis


    for the complete game that we create in Chapter 3: Four Balls, a web version of


    a popular logical game where players try to arrange a line of four, same-colored


    tokens to win. (If you’re eager to take a peek at the final result, look at the
    first page of the next chapter.) We learn how to create the game’s visuals-----the


    board and the tokens-----in this chapter.


    We’ll cover the following topics:


     A bird’s-eye view of the typical video game structure


     Different approaches to rendering graphics on the web page


     The canvas element and its contexts


     Context2D API


     Coordinate system, fractional coordinates, and anti-


    aliasing


     Drawing basic shapes


    CHAPTER 2: Graphics in the Browser: The Canvas Element


     Rendering paths


     Curves


     Fills, types of gradients, and gradient-based effects


     Canvas transformations and states


    These topics act like small building blocks that allow you to make a broad range


    of applications: from simple 2D games (Chapter 3) to the complex isometric


    engines (Chapters 6 and 7), or even 3D engines (Chapter 8).


    **The Anatomy of the Game**


    Have you ever played games? I’m sure you have. Let’s start with a simple


    question: what are video games all about? Mostly about having fun, right? Each


    game presents the player with a virtual world ruled by its own laws and


    mechanics. The world may be as simple as Tetris-----a screen with bricks falling


    from above-----or as sophisticated as modern online games with knights and


    wizards, clans and politics.


    The player is trying to accomplish a goal: score points, connect dots in a line,
    or


    conquer a galaxy or two. The game itself is the interaction between the gamer


    and the game world. The player perceives the state of the game in some way:


    by reading text, looking at a 3D landscape, or examining a web page. The player


    takes all of this in and takes action. The world is then updated, and it is the


    player’s turn again. He takes another action, and so on, until the end of the


    game.


    So what are the essential components of a game that make it all happen?


    Nowadays, games are strongly focused on graphical content. Actually, game


    graphics might be the only chance to attract the player and make him try your


    product. Players want the game to be beautiful, and web application games are


    no exception. Most games have a graphical engine that draws the world on the


    screen. Some are complex, others are simple, but there are almost no games


    that have no graphics at all.


    Graphics aren’t the whole game; they are just the visuals. Games are all about


    interaction. Players want to move those starships on a screen and send them


    into a battle. The second essential part of every game development project is


    user input processing.


    We got used to controllers, mice, and keyboards, but mobile platforms offer


    completely different ways of interaction: touchscreens, accelerometers,


    gyroscopes, and other sensors. Users can’t perform a ‘‘right mouse-click’’ but


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    **43


    they can tap, slide, shake, or rotate their devices. Intuitive controls might
    sound


    like an easy task to implement, at least before you start to write the real code.'
