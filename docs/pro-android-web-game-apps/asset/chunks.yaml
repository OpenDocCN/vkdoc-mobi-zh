    **Figure 15-4.** *Basic Cordova-enabled project*


    Congratulations! The project is working! Porting the Four Balls game is now a


    piece of cake. Just copy the files from Chapter 3 to the www folder and rebuild


    the app. The resulting application doesn’t look like a web page anymore; it


    doesn’t have the address bar or browser menus, and the user will not guess that


    you created this game (almost) without writing Java code. Once you’re finished,


