- fmt: '只能同时看到屏幕上不到 1% 的对象。很有可能！在这种情况下，我们不能像那样检查对象，因为这会立刻拖垮游戏性能。唯一的解决方案是将游戏对象组织成某种空间结构，该结构可以决定哪些对象“现在”最有可能可见。


    **注意：** 这个问题并非游戏开发所独有。还有许多其他类型的应用程序也面临同样的问题。例如，“用户能看到哪些精灵？”这个问题与“列出距离我家不超过3英里的加油站”非常相似，后者常见于地图和导航领域。加油站就是精灵，“3英里”是视口的大小，“我的家”是视口的当前位置。因此，这个问题被认真研究过也就不足为奇了。


    有各种算法可以解决这个问题（大多数基于树），它们通过将实体分组到边界矩形中，并在下一级将边界矩形分组到更大的边界矩形中（尝试搜索“`R-Tree`”以获取关于此方法如何工作的好例子）。然而，其背后的数学原理相当复杂，在此解释会占用太多篇幅，而且对大多数读者来说也不有趣。


    有一种更简单的方法适用于游戏开发（至少在客户端），实现起来不需要火箭科学学位。我们喜欢使用网格。网格很简单，因为它们有整齐的方形单元格，并且很容易找到与当前视口相交的单元格。我们之前在瓦片网格中使用过这个技巧，那么让我们再用一次！我们可以将整个游戏对象集合分解为一个均匀的网格，并且只检查落在可见单元格中的对象。


    看一下图 6-14 中的图片，它展示了这个想法。在图片所示的例子中，只有四个对象会被检查是否与视口相交：位于网格单元格 (2,0)、(3,0)、(2,1)
    和 (3,1) 中的对象。其中只有两个实际与视口相交的对象会被渲染。这样，我们就能消除无用的检查，只绘制真正重要的内容。


    ![图 6-14](index-254_1.jpg)


    第 6 章：渲染虚拟世界 **249**


    **图 6-14.** *最小化绘制前需要检查的对象数量。世界被划分为网格。每个对象被分配到几个网格单元格中。在每一帧中，只检查单元格 (2,0) 到 (3,1)
    中的对象。*


    显然，游戏对象可能位于两个单元格的边界上，甚至位于两个边界相交的点上。在这种情况下，该对象会被分配到两个或四个网格单元格中。之后，我们会过滤这些对象，以免将它们绘制两次或四次。


    如果对象在移动怎么办？我们必须跟踪它，并确保当它离开某个网格单元格时取消注册，并在进入新单元格时进行注册。这就像带着手机在城市里旅行：它总是在寻找最好的 GSM
    发射器。当您离开一个发射器的范围时，您就会在另一个发射器上注册。


    确定网格单元格的最佳大小非常重要。最佳大小取决于您游戏的具体情况、游戏对象的密度，以及它们是静态的（不移动、不出现或消失）还是动态的（四处移动、出现新对象、旧对象消失）。如果单元格做得很大，意味着在每一动画帧中您都必须检查更多对象。例如，如果一个单元格是
    500×500 像素，而视口位于单元格的交汇处，这意味着您必须测试一个 1000×1000 像素区域内的对象，这相当大。如果把单元格做得太小，很快就会面临大量空单元格的问题。此外，一个移动的对象必须不断地在这些单元格中注册/取消注册。那么最佳大小是多少？这个问题最好通过在您的特定设置上运行一些基准测试来回答。'
  raw: 'can only see less than 1 percent of objects on the screen at a time. Quite


    possible! In this case, we can’t afford checking objects like that because it


    instantly kills the performance of the game. The only solution is to organize


    game objects into some sort of spatial structure that decides which objects are


    most likely visible ‘ right now.’


    **NOTE:** This problem is not unique for game development. There are many other
    types of applications that face the same issue. As an example, the question “which
    sprites can the user see?” is very close to “list the gas stations no more than
    3 miles away from my home,” which is encountered in the mapping and navigation
    domain. Gas


    stations are sprites, “3 miles away” is the size of the viewport, and “my home”
    is the current position of the viewport. So it’s not a surprise that the problem
    has been


    seriously researched.


    There are various algorithms to address this issue (most of them based on trees)


    by grouping entities into bounding rectangles and grouping bounding rectangles


    into bigger bounding rectangles on the next level (try Googling ‘‘R-Tree’’ for
    a


    good example on how this approach works). However, the math behind these is


    pretty complex, and explaining it here would take too many pages and not be


    interesting to most readers.


    There is a much easier approach that is suitable for game development (at least


    on the client-side); one that doesn’t require a degree in rocket science to


    implement. We like working with grids. Grids are simple because they have nice


    square cells and it is very easy to find cells that intersect the current viewport.


    We’ve used this trick with a grid of tiles, so let’s use it once more! We can
    break


    the whole set of game objects into a uniform grid and check only the objects


    that fall into the cells that are visible.


    Take a look at the image in Figure 6-14 that illustrates this idea. In the example


    that is shown in the picture, only four objects will be checked for the intersection
    with the viewport: in grid cells (2, 0), (3,0), (2, 1), and (3, 1). Only the two


    ![](index-254_1.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **249


    of them that actually intersect the viewport will be rendered. This way, we


    eliminate useless checks and draw only what is actually important.


    **Figure 6-14.** *Minimizing the amount of objects to check before drawing. The
    world is divided into the* *grid. Each object is assigned to several grid cells.
    Only the objects in cells from (2:0) to (3:1) are* *checked in each frame.*


    Obviously, the game object may be placed in the border between two cells or


    even at the point where two such borders intersect. In this case, the object is


    assigned to two or four grid cells. Later, we filter such objects so that we don’t


    draw them twice or four times.


    What if the object is moving? We have to track it and make sure that it is


    deregistered from the grid cells when it leaves them, and registered in the new


    ones when it arrives. It’s like traveling around the city with your cell phone:
    it is always looking for the best GSM transmitter to use. When you leave the range
    of


    one transmitter, you are registered in another one.


    It is quite important to determine the optimal size of the grid cell. The best
    size


    depends on the specifics of your game and on the density of the game objects,


    if they are static (don’t move, don’t appear or disappear) or they are dynamic


    (move around, new ones appear, older ones disappear). If you make big cells, it


    means that you have to check more objects on each animation frame. For


    example, if one cell is 500 × 500 pixels and the viewport is located in the


    intersection of cells, it means that you have to test objects in a 1000 × 1000


    pixel area, which is pretty big. If you make your cells too small, you’ll soon
    face


    the problem of having a lot of empty cells. Besides, a moving object constantly


    has to register/unregister itself in these cells. So what is the optimal size?
    This


    questioned is best answered with some benchmarks that run on your specific


    setup.'
