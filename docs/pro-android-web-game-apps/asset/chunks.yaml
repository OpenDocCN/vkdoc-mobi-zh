    network is 192.168.0.15, you should open the browser and enter


    [http://192.168.0.15 in the add](http://192.168.0.15)ress bar. You will see the
    page that you have just created.


    What if you don’t have a mobile device or you don’t have a Wi-Fi access point


    and you can’t connect your PC and Android to the same network? Well, the best


