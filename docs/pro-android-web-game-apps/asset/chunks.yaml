    `Node` supports several template engines — `Haml`, `Jade`, `EJS`, `CoffeeCup`,
    and `jQuery Templates`. If you have a couple of spare hours, look through them
    and find the one that you like best.


    **NOTE:** The author of this book prefers templates that don’t create a whole
    new language just to make a good old HTML file. There are two reasons for that:
    HTML is plain, simple, and here to stay; if you give an exotic template to a designer,
    nine out of ten will ask, “Hey, what’s this?” It is important that people other
    than programmers be able to easily read and modify the file. The second reason
    is that we know JavaScript already and we like it; we can use it for templates
    and there is no good reason not to use it.


    ## Creating a Template


    Let''s apply the knowledge about the template to our project. Let''s create a
    template that renders the game board. First, you need to install `EJS`, the templating
    engine.


    ```

    >npm install ejs

    [ejs@0.4.3 ./node_modules/ejs](mailto:ejs@0.4.3)

    ```


    Now create a folder called `views` and put a file called `board.ejs` there. The
    file itself is the `EJS` template. Listing 10-20 shows the complete code for the
    template. The most important parts are highlighted in bold.


    **Listing 10-20.** *Rendering the Game Board with EJS Templates*


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <meta name="viewport"

    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,

    user-scalable=no, target-densitydpi=device-dpi"/>

    <style>

    .cell {

    display: inline;

    font-family: monospace;

    font-size: 2em;

    cursor: pointer;

    }

    h1 {

    font-family: monospace;

    }

    </style>

    </head>

    <body>

    <h1>Welcome to the Four Balls!</h1>

    <div class="board">

    <% for (var i = 0; i < board.getRows(); i++) {

    for (var j = 0; j < board.getCols(); j++) {

    %><div class="cell"><%

    switch(board.getPiece(j, i)) {

    case BoardModel.GREEN: %>X<% break;

    case BoardModel.RED: %>O<% break;

    default: %>-<% break;

    }

    %></div><%

    }

    %><br /><%

    } %>

    </div>

    <a href="about.html">About</a>

    </body>

    </html>

    ```


    The bolded JavaScript does not appear on the page that goes to the browser.


    Download from Wow! eBook <www.wowebook.com>


    This script is used by the `EJS` engine to generate HTML content only. The resulting
    document is in plain old HTML. To distinguish between the normal HTML markup and
    the script, `EJS` uses `<% %>` symbols. Everything between them is interpreted;
    everything outside these symbols stays on the page as is.


    The final part is to update our main script: we use our newly created template
    instead of plain text representation. We need to pass the correct data to the
    template to make it work, of course. Listing 10-21 shows the updated `main.js`
    file.


    **Listing 10-21.** *The Updated Server Code That Takes Templates into Account*


    ```

    var express = require(''express'');

    var BoardModel = require("./BoardModel");

    var app = express.createServer();


    app.set(''views'', __dirname + ''/views'');

    app.set(''view engine'', ''ejs'');


    app.use(app.router);

    app.use(express.static(__dirname + ''/public''));


    var board = new BoardModel();

    board.makeTurn(2);

    board.makeTurn(3);


    app.get(''/'', function(req, res){

    res.render(''board'', {

    BoardModel: BoardModel,

    board: board,

    layout: false

    });

    });


    app.listen(80);

    ```


    A lot of changes here! First of all, there are two new lines that set two values.
    The method `set()` assigns the value to the application-level setting. This setting
    can be then used by various modules in order to adjust their behavior. The first
    bolded line sets the directory to look for templates. The second line tells `Express`
    that we are using the `ejs` engine to render templates. The next two lines...'
