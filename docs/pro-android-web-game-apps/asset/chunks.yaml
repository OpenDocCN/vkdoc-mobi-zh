- fmt: '# Chapter 12: Making Multiplayer Games


    At the time of writing, there is no transport that works like a silver bullet
    for game development purposes. Each available transport is a trade-off between
    browser support, latency, reliability, CPU cycles, and traffic.


    In the next chapter, we will apply our knowledge to a practical task: building
    the client-server implementation for our Four Balls game.


    ## Making Multiplayer Games


    This chapter is devoted to the practical application of the skills that we have
    learned in the previous two chapters. The goal is to make a fully functional multiplayer
    Four Balls game out of the single-player version that we developed in Chapter
    3. After reading this chapter, you will know how to:


    - Implement the basic multiplayer architecture

    - Distribute the game logic between the client and the server

    - Share the JavaScript components between the browser and `Node.js`

    - Use `Socket.IO` for handling the real-time communications


    We will start by looking at the anatomy of the networking game, from the challenges
    of a typical casual online game to the more advanced fast-action, real-time games
    that are likely to show up on the mobile web in the near future.


    The next section is devoted to the essential components of the multiplayer game
    that support the online experience.


    We then discuss `Socket.IO` — the module for `Node.js` that takes the burden of
    providing the best available transport for real-time networking. The last section
    is devoted to the implementation of the game: we will take the code for the single-player
    version and add support for lobby and multiplayer matches. The code will show
    the common patterns of `Socket.IO`; once you learn them, you can add more advanced
    features to the project yourself.


    ## The Anatomy of a Network Game


    Network applications always consist of two components: the client and the server.
    In the PC game development industry, server-side logic is often embedded into
    the game. For example, when two users want to play Diablo 2, they don’t have to
    set up the separate dedicated server software; instead, they launch the game and
    select the LAN Game mode. Then one of the launched applications takes the role
    of server and allows other people to connect and play together, handling transmission
    of data packets, voice communication, in-game chats, and other usual multiplayer
    functions. In such cases, there might be no separate server application, like
    a `server.exe` file somewhere in the game folder. Nevertheless, these two components
    — client and server — are present in every game that supports networking.


    Web games work in a different manner: a game client is usually a web page with
    some amount of logic embedded as JavaScript. The page is prepared and served by
    the web server, and then it is loaded and rendered by the browser. From this point,
    it can work as a standalone application (like ones described in detail in previous
    chapters), or as a "client" that can "speak" to the same or different server and
    allow the user to play with other people like himself.


    The task for this chapter is to make a more advanced version of the Four Balls
    game. We will add very basic support for networking — a lobby and a multiplayer
    version of the game. The materials in this chapter allow you to build a working
    skeleton of a network-enabled web application that you can extend further to suit
    real-world requirements.


    For someone who has never developed a simple online multiplayer game, this might
    sound like a very easy task. Indeed, we have already implemented the hardest parts
    of the game — the graphical engine and the logic — so we can reuse the pieces
    of the code and assemble a server in no time. In practice, however, this is not
    true. As a rule of thumb, take the effort that you’ve spent to make a good single-player
    game, multiply it by ten, and you’ll get the effort that you need to make a good
    multiplayer version of the same game. Figure 12-1 shows the amount of work required
    to complete the network version of the game.'
