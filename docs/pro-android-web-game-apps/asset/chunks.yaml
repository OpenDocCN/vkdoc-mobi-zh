    - 着色器将两个矩阵相乘，然后将结果与向量相乘。这看起来很像点到屏幕的投影。从数学角度来看，这与第 8 章中的代码完全相同。\n- 结果随后被赋值给 `gl_Position`。\n\
    \n如果你之前用过 C 语言，这段代码应该让你感觉更熟悉。当然，你不能仅凭直觉编写自己的着色器。然而，在本章中，我们将只描述该语言的基本概念。如果你对更深入的细节感兴趣，请参考\
    \ GLSL 规范或更高级的着色器示例。\n\n**注意：** 用于 WebGL 的 GLSL 语言完整规范可在 Khronos Group 网站上获取，网址为\
    \ [www.khronos.org/registry/gles/specs/2.0/GLSL_ES_Specification_1.0.17.pdf](http://www.khronos.org/registry/gles/specs/2.0/GLSL_ES_Specification_1.0.17.pdf)。\n\
    \nGLSL 是一种编程语言，就像 JavaScript、PHP 或 C 一样，但与你见过的大多数语言不同，它不是为编写 Web 服务器或数据库等通用任务而设计的。GLSL\
    \ 专门用于 3D 图形操作。我们需要它的基础知识来编写 WebGL 程序，所以让我们从每种语言中最小的构建块开始：变量和数据类型。\n\n### 数据类型\n\
    \n与 JavaScript 不同，GLSL 是一种强类型的静态语言。这意味着每个变量都有自己的类型，该类型在程序执行期间不会改变。例如，以下代码行：\n\n\
    ```glsl\nint x = 1;\n```\n\n声明了整型变量 `x` 的初始值为 `1`。在下一行或程序的任何其他位置，不可能将浮点值赋给 `x`。一旦声明，变量的类型就不能改变。严格类型的概念对于使用过\
    \ C 或 Java 等语言的人来说应该很熟悉。表 9-1 显示了最常见的 GLSL 类型。\n\n**表 9-1.** GLSL 中的类型\n\n| 类型\
    \ | 示例值 | 描述 |\n| --- | --- | --- |\n| `void` | -- | 通常是函数的返回值。意思是“没有返回任何内容。”\
