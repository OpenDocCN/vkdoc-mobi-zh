    **关于作者**


    - **Juriy Bura** 是一位独立顾问，常居地介于乌克兰基辅与瑞士苏黎世之间。他的主要专业领域是针对桌面与移动平台的游戏及实时网络应用。他是 Deadline
    Solutions（`http://deadline-solutions.com/about.html`）的联合所有人。Juriy 还是乌克兰 JavaScript
    用户组的领导者、频繁的会议演讲者，以及热衷于探索浏览器极限的充满激情的网络开发者。凭借七年以上的 Java 与 JavaScript 开发经验，他确信游戏开发是最能在一行代码中浓缩乐趣的领域。闲暇时，Juriy
    会陪伴家人，或在一个小型“极客”俱乐部里玩桌游。他在 `http://juriy.com` 上写博客，并在 Twitter 上以 `@juriy` 身份发布推文。


    - **Paul Coates** 是一位自由职业的文稿编辑与英语教师，常居地介于英国特伦特河畔伯顿与乌克兰基辅。他确保了 Juriy 的素材在出版时拥有恰到好处的英语风味。在不向各年龄段学生教授他的母语时，Paul
    会为外语作品的英文版、俄语及乌克兰语译作提供文稿编辑与校对服务。Paul 热爱电子游戏、电影和旅行。他偶尔在 `http://psykspopcornjungle.blogspot.com`
    写博客，并偶尔在 Twitter 上以 `@Psyklax` 身份发布推文。


    xiii


    **致谢**


    本书的完成离不开许多优秀人士的帮助与支持。我最感激我的妻子 Elena，在我最需要时，她的爱给予了我灵感；以及我的父母 Alexander 与 Vera Bura。我还要感谢我的好友们：Vadim
    Voituk，感谢他卓越的想法与专业技术；Alexey Kondratov，是他第一个向我阐明了一本书与一本 600 页的博客有何不同；以及 Artyom
    Volkhonskiy。在我需要你们的支持与意见时，你们始终在我身边，我对此非常感激。你们的帮助极大地提升了本书的质量。特别感谢才华横溢的艺术家 Sergey
    Lesiuk（`http://nitro-killer.deviantart.com`）。

