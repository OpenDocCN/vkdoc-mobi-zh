  trans: "\n# 格式化后的文档\n\n填写描述和推广文字，列出变更内容（在提交应用程序更新版本时使用），并选择分类。由于我要发布的应用程序远非真正的商业游戏，我将其归入“应用、库和演示”类别。\n\
