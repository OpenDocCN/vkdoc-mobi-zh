- fmt: "# Making an Isometric Engine\n\n`zone` has the same smallest visible x coordinate\
    \ of the tile. To make it even easier, write the x coordinate on every cell of\
    \ the grid. Then, do the same for y coordinates and divide the grid into horizontal\
    \ zones. I sketched an example for you in Figure 7-13. In the vertical grid (on\
    \ the left), zone -1 is where the tile’s smallest visible x the tile (-1) is located.\
    \ The horizontal grid (located on the right) for y coordinates follows the same\
    \ idea: zone 2 contains the smallest y coordinate of the visible tile, which is\
    \ 2.\n\n**Figure 7-13.** *Dividing the grid into vertical and horizontal zones*\n\
    \nOur goal is to write the code that finds the ID of a zone when given a world\
    \ coordinate. The values that we find are the x and y values of the map bounds:\
    \ the top-left corner. Looking at the vertical zone (on the left) in Figure 7-13,\
    \ you find that the zones are exactly `cellWidth`-sized and they start with `cellWidth/2`.\
    \ The 0 zone has x values from `0.5*cellWidth` to `1.5*cellWidth`, the 1 zone\
    \ has x values from `1.5*cellWidth` to `2.5*cellWidth`, and so on. The following\
    \ code formalizes the dependency:\n\n```\nvar x = Math.floor((this._bounds.x -\
    \ this._cellWidth/2)/this._cellWidth);\n```\n\nDo the same for y: the zone size\
    \ is `cellHeight/2` and zones from -1. The next fragment of code is now clear\
    \ too:\n\n```\nvar y = Math.floor(this._bounds.y/(this._cellHeight/2)) - 1;\n\
    ```\n\nNow we have the coordinates of the top-left corner of the bounding rectangle.\
    \ The values for width and height are even easier to get. For the width, take\
    \ the minimum number of zones required to cover the viewport—that is `Math.ceil(this._bounds.width/this._cellWidth)`.\
    \ Since the rows are shifted in the isometric view, we need to add 2 to this value\
    \ to cover the next and previous column:\n\n```\nvar width = Math.ceil(this._bounds.width/this._cellWidth)\
    \ + 2;\n```\n\nThe height formula works the same way:\n\n```\nvar height = Math.ceil((this._bounds.height)/(this._cellHeight/2))\
    \ + 2;\n```\n\nThe hardest part is now over. Since you know what the player sees\
    \ and you know how to render it on the offscreen canvas, the only thing left to\
    \ do is to show the content to the user and make sure to invalidate and repaint\
    \ it once the user scrolls away.\n\n## Managing Offscreen Canvas\n\nThe isometric\
    \ offscreen image has to be checked each frame to make sure that it is still valid.\
    \ If it is not, repaint it to make it valid again. The correct image is then painted\
    \ on the canvas. The code that implements this is shown in Listing 7-10. The pattern\
    \ is the same as in Chapter 6. The only thing that has really changed is the way\
    \ we calculate the bounding rectangle.\n\n**Listing 7-10.** *The `draw()` Function\
    \ of the `IsometricTileLayer`*\n\n```\n_p.draw = function(ctx, dirtyRect) {\n\
    \    if (this._offDirty) {\n        this._redrawOffscreen();\n    }\n    var offscreenImageWorldX\
    \ = this._offRect.x*this._cellWidth;\n    var offscreenImageWorldY = this._offRect.y*this._cellHeight/2;\n\
    \    ctx.drawImage(this._offCanvas, offscreenImageWorldX - this._bounds.x,\n \
    \                 offscreenImageWorldY - this._bounds.y);\n};\n```\n\nThe next\
    \ function: `_redrawOffscreen()` is also straightforward; it simply calls the\
    \ `_drawMapRegion()` for the offscreen context. The `_drawMapRegion()`, in turn,\
    \ knows how to paint the part of the map on a given context. The code is shown\
    \ in Listing 7-11.\n\n**Listing 7-11.** *Refreshing the Offscreen Buffer: The\
    \ `_redrawOffscreen()` Function*\n\n```\n_p._redrawOffscreen = function() {\n\
    \    var ctx = this._offContext;\n    ctx.fillStyle = \"darkgreen\";\n    ctx.fillRect(0,\
    \ 0, this._offCanvas.width, this._offCanvas.height);\n    this._drawMapRegion(ctx,\
    \ this._offRect);\n    this._offDirty = false;\n};\n```\n\nThe variable `_offRect`\
    \ that we use in both listings holds current map bounds that are \"valid.\" We\
    \ have the offscreen image covering that map region. When the user navigates far\
    \ enough and crosses the region, the `_offRect` changes, and the `_offDirty` flag\
    \ becomes `true`. This flag notifies the rendering code that the offscreen image\
    \ is not valid anymore, and has to be re-rendered. There are"
