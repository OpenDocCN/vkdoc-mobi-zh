- fmt: '# CHAPTER 12: Making Multiplayer Games


    that look for opponents and are ready to play. It means that besides the components
    that we already have, we need to create at least two more: the lobby UI to render
    it on the client and the server-side support for notification about new users.


    The very important change in the game architecture is that the client now has
    multiple screens (or states): the lobby and the game. Before this point, our games
    were rendered on a big canvas and the only state of the game was ‘playing.’ When
    you create a commercial game, however, it has several different screens that render
    in a completely different manner and support a completely different set of user
    actions. For example, the following are a few screens for an online strategy game:


    - Main menu

    - World map

    - City screen

    - Building & Trading screen

    - Battlefield screen

    - In-game Help screen

    - Settings screen


    These screens act like sub-modules of the game: they provide access to the different
    aspects of the game and you should treat them as independent software components.
    If you decide to update the Battlefield screen, it means that only this module
    is updated, not the whole project. The game that we are going to implement is
    very simple: it has only two screens (lobby and game board), but we still need
    to think of a good way to show the correct one to the user and process the input
    according to the current state of the application. This last task is very easy
    in HTML touch interfaces: the touch is always dispatched to the component that
    you touched, so invisible components will not receive any events.


    The only important piece that we are missing is the choice of the transport. For
    this chapter, we will use the `Socket.IO` library. We’ll start learning it right
    after we discuss the project structure.


    ## Project Structure


    The folder structure of the project is usual for the typical Node project. Let’s
    review it to make sure that the structure of folders is clear. Figure 12-3 shows
    how the project looks when it is finished.


    ![](index-485_1.jpg)


    **Figure 12-3.** *The structure of the project*


    The `main.js` file is the entry point of the Node.js application. Files intended
    for browser HTML files and client-side JavaScript files reside in the `public`
    folder. Create the structure of the folders described, and put the code for the
    offline game that we created in Chapter 3 into the `public` folder. I renamed
    the old `index.html` file `offline.html` to keep the single-player version accessible.
    The new `index.html` file is the entry point to the multiplayer version.


    ## Game Lobby with Socket.IO


    `Socket.IO` is the project created by Guillermo Rauch ([http://devthought.com](http://devthought.com))
    and available at GitHub ([https://github.com/LearnBoost/socket.io](https://github.com/LearnBoost/socket.io))
    or as an NPM module. The goal of this project is to "blur the differences between
    the different transport mechanisms" as the official project page says ([http://socket.io/](http://socket.io/)).
    More formally, `Socket.IO` is the convenient client-server library that allows
    you to implement in-page networking without thinking about the transport details.
    Allow `Socket.IO` to answer low-level questions like "What is the best transport
    to use on this device?" or "How can I deal with the messages that might come while
    the client is reconnecting?" or "How can I keep track of all clients and broadcast
    them a message when needed?" The saved time is better spent building a better
    game.


    ![](index-486_1.jpg)


    **NOTE:** It would be unfair to say that `Socket.IO` is the only available browser-networking
    library. There is another nice project called Faye ([https://github.com/faye/faye](https://github.com/faye/faye))
    by James Coglan ([http://jcoglan.com](http://jcoglan.com)). It provides a similar
    solution and has some good feedback from the developers.'
