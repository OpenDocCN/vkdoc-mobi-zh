    ## Radial Gradients


    Radial gradients work exactly the same way, with the only exception that they
    use circles instead of lines to define the start and the end of the gradient.
    The start of the gradient is inner circle, and the end is the other outer circle.
    To set them both, you specify their center and radius, which are a total of six
    parameters:


    ```

    c.createRadialGradient(x0, y0, r0, x1, y1, r1);

    ```


    The parameters are as follows:


    - `x0` and `y0`: the center of the first circle

    - `r0`: the radius of the first circle

    - `x1`, `y1`: the center of the second circle

    - `r1`: the radius of the second circle


    The radial gradient makes a smooth color transition between the inner and outer
    circles. Listing 2-10 shows the whole code.


    **Listing 2-10.** *Using Radial Gradients*


    ```

    var gradient = ctx.createRadialGradient(30, 30, 5, 45, 30, 60);

    gradient.addColorStop(0, "blue");

    gradient.addColorStop(0.3, "green");

    gradient.addColorStop(1, "red");

    ctx.fillStyle = gradient;

    ctx.lineWidth = 10;

    ctx.fillRect(0, 0, 80, 80);

    ```


    Now let’s apply this new knowledge in practice and draw better pieces for the
    game. The radial gradients work perfectly when it comes to simulating light and
    fake volume. We will add the light-like flare and a tiny soft outline to the pieces
    with the help of a single radial gradient (see Listing 2-11).


