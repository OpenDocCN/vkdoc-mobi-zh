    ## CHAPTER 9: Using WebGL


    ### OpenGL ES 2.0 Rendering Pipeline


    The OpenGL rendering pipeline (just "pipeline" for short) is the process of transforming
    input data into a rendered 2D picture that you can see on the display. Each time
    you need to render the model, you go through the same set of steps — some are
    "fixed" and some are "programmable."


    The understanding of this process is extremely important, not only for WebGL,
    but also for overall 3D graphics programming since it is one of the most basic
    concepts. First, look at Figure 9-1, which illustrates the stages of the pipeline.
    It is a somewhat simplified representation of what is really happening behind
    the scenes, but this figure should give you a bird''s-eye view of the process.


    **Figure 9-1.** *The OpenGL ES 2.0 pipeline*


    The input to the pipeline is everything required to render a model — the vertex
    positions of the original model, colors, location and properties of light sources,
    textures, orientation, scale, viewport properties, and so on. This data inputs
    into a program called the vertex shader.


    A vertex shader runs for every vertex. Its task is to determine the projection
    of the vertex to the screen (remember, in Chapter 8 we did it manually by multiplying
    matrices). In other words, its main task is to return the coordinates for every
    vertex it receives. Besides this simple task, it can do all kinds of other useful
    calculations — for example, determine the resulting light color and intensity
    when given several light sources of different types. A vertex shader can also
    transform the geometry itself, doing things such as creating a waving banner out
    of a plain wireframe, or implementing a simulation of liquid physics.


    ![](index-368_1.jpg)


    ![](index-368_2.jpg)


    The possibilities are endless, and what is very important about shaders is that
    they are executed on the GPU (where available) that is optimized for that kind
    of math. In other words, shaders work much faster than JavaScript transformations.
    We learn how to write simple shaders in the next section of this chapter. Figure
    9-2 shows the first step of the WebGL rendering process — passing the data to
    the shader.


    **Figure 9-2.** *In the first step of a WebGL program, the data required to render
    the model is passed to the vertex shader. The vertex shader transforms the vertices
    and returns the coordinates.*


    Next, the coordinates of the vertices are assembled into primitives — the triangles.
    As I mentioned before, there are other primitive types too, but in this chapter,
    we only work with triangles. Each triangle is then presented as a set of pixels.
    This process is called rasterization. You do not control these steps.


    The array of pixels is then passed into the fragment shader, which you must write
    on your own. The fragment shader is executed for each pixel of the triangle and
    the job of this shader is to indicate the resulting color of the pixel. With the
    color and depth, the pixel goes through a few more transformations and finally
    ends up on the screen. The second part of the process is shown in Figure 9-3.


    **Figure 9-3.** *In the second part of rendering process, data received from the
    vertex shader is interpolated and passed to the fragment shader. The fragment
    shader outputs the pixel color.*


