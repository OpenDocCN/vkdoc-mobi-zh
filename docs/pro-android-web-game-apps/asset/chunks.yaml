    最后，我想提及一个非常重要的一点。请记住使用权限的基本规则：只申请你真正需要的权限。你申请的权限越多，用户相信你的应用程序是无害的游戏、而非想要窃取其隐私数据的恶意软件的可能性就越小。例如，申请\
    \ `INTERNET` 权限或 `READ_CONTACTS` 权限都是可以的。然而，如果一个应用同时申请了这两项权限，它就具备了将你的整个通讯录上传到任意网站所需的一切条件。这绝对不是用户想要的。在接下来的章节中，我们将恢复读取通讯录的权限，使我们的游戏再次成为一个无害、清白的应用程序。\n\
    \n## **为发布到市场做准备**\n\n现在原生应用程序已经准备就绪，是时候将其发布到市场上了。这通常是“转向原生”的主要动力。该过程包含以下几个步骤：\n\
