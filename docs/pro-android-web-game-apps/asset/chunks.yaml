  raw: 'This part of the book is devoted to 2D graphics and the Canvas element. It
    also gets you started in Chapter 1, “Preparing the Environment,” by setting up
    required tools: the IDE, the web server, Java SDK, and the Android emulator. Once
    all of these are set, you are ready for action.


    Chapter 2, “Graphics in the Browser: The Canvas Element,” is where the magic starts.


    You will learn how to render shapes on HTML5 Canvas, how to use paths and curves,
    gradients and fills, transformations, and states of the 2D context.


    In Chapter 3, “Creating the First Game,” you create your first project—the Four
    Balls game. This small project uses elements you created in Chapter 2 and illustrates
    important, basic game development concepts, such as game state, mechanics, turn
    validation, and win/lose conditions.


    Modern games are impossible without colorful animations. Chapter 4, “Animation
    and


    Sprites,” guides you through the process of loading the images and drawing a running
    character frame by frame. You will also learn more advanced animation effects,
    such as interpolation, acceleration, deceleration, and easing functions.


    Chapter 5, “Event Handling and User Input,” will introduce you to the methods
    of


    working with input in your game. You’ll learn how to capture browser events and
    build a high-level API for complex input models. We’ll explore drag-and-drop and
    pixel-perfect picking with color masks.


    xvii


    At this point, you will be able to create your own simple games, as you will have
    all the


    “starter tools” under your belt. So it is time to move to the more advanced topics—rendering
    game worlds.


    In Chapter 6, “Rendering Virtual Worlds,” you''ll learn how to render Really Big
    Worlds.


    We start with the simplest tile-map technique and gradually optimize it. You learn
    how to cache the fragments of the map, how to use the offscreen buffer, and render
    the world objects such as trees and rocks.


    Chapter 7, “Making an Isometric Game,” is the longest chapter of the book. It
    is devoted to isometric 2D game engines. The isometric view is the most popular
    way to represent the game world in strategy games, RPGs, tactics, and many other
    popular genres. You will learn about isometric projection, the shape of tiles,
    and the ways to render them. In addition to techniques described in Chapter 6,
    we’ll introduce more rendering optimizations—the dirty rectangles algorithm and
    clustering of world objects. The result of this chapter is our second big project—an
    isometric engine ready to be used in the next strategy game or RPG.


    3D Worlds


    The “3D Worlds” part introduces 3D graphics—from the basic rendering concepts
    to WebGL.


    In Chapter 8, “3D in a Browser,” we learn what 3D is, how it works, and the math


    behind it.


    Chapter 9, “Using WebGL,” is devoted to WebGL—a very promising web standard that
    is


    making its way into the mobile world. You’ll learn how to initialize WebGL, write
    shaders, work with geometry data, load textures, and work with 3D models.


    Connecting Worlds


    “Connecting Worlds” is all about communication and talking to the server. We start
    with learning Node.js and the Express framework in Chapter 10, “Going Server-Side.”
    This chapter ranges from Node installation to a simple game server with proper
    templates, session handling, logging, error handling, and notifications.


    In Chapter 11, “Talking to the Server,” we move back to the client-side and learn
    how to connect to a server from a web page and exchange data with other players.
    We will look at different ways of communication, often called transports, and
    learn their pros and cons.


    In Chapter 12, “Making Multiplayer Games,” you make your third big project—the


    multiplayer version of Four Balls—with Node.js, Express, and Socket.IO.


    Improving Worlds


    The final part is devoted to various small aspects of game development.


    Chapter 13, “AI in Games,” is about artificial intelligence—breathing life into
    computer-controlled opponents. You will learn basic approaches to pathfinding
    and decision making—a good start to making bots look intelligent.


    Chapter 14, “JavaScript Game Engines,” discusses game engines and introduces


    Crafty.js—a small yet quite powerful game engine written in JavaScript. Here’s
    where you complete a fourth project—an Escaping Knight game.


    Chapter 15, “Building Native Applications,” explains what it takes to publish
    an HTML5


    game as the native application to the Android Market. We will go through all steps
    of the process—packaging the game, signing it with the key, preparing it for market,
    and publishing—


    and then update the game to the next version.


    xviii


    INTRODUCTION


    Chapter 16, “Adding Sound,” adds the final touch to the game—sound. In this chapter,
    you’ll use SoundManager2 to load and play sounds in the Escaping Knight game.
    You will learn how to loop background MP3s, play “click sounds,” and notify the
    user about game events.


    Appendix


    Appendix A, “Debugging Web Applications,” explains how to debug JavaScript games.
    We try hard to write good code, but we’re all human—mistakes are unavoidable.
    This appendix will give you a good understanding of how to find bugs and quickly
    eliminate them, saving more time for development.


    Contacting the Author


    If you have any questions, suggestions, comments, or ideas regarding this book
    or HTML5 game development in general, I’d be happy to receive your feedback via
    e-mail at


    [juriy.bura@gmail.com,](mailto:juriy.bura@gmail.com) my web site at [http://juriy.com,](http://juriy.com)
    or on Twitter at @juriy.


