- fmt: '`unchecked input`. Such a paranoid approach works very well when you deal
    with a turn-based game where the whole verification logic is done on the server.
    The server is the arbiter that does not allow the client to cheat, no matter what.
    However, this is not always possible.


    The legitimacy of single-player game clients that contact the server only to send
    the high score are impossible to verify, because the client is not sending any
    evidence that he took the valid actions to achieve that score. The server acts
    like the university professor who tells his students, ‘If you did the assignment,
    raise your hand.’ If he does not check if the students who claim it actually did
    it, they soon start to cheat to get bonuses or good marks.


    Another broad category of games that are very hard to restrict from cheats are
    fast-action multiplayer games like online shooters. They often have to sacrifice
    the verification for better playability and lower complexity of the server. There
    are at least two reasons why perfect verification of the users’ actions is impossible:
    volumes of data, and lags that make verification inaccurate.


    If the volume of data to send for verification is too big, then verification becomes
    too expensive, both in terms of traffic and in terms of required processing power.
    The rate of fire for the Heckler & Koch MP5K series is about 900 rounds per minute
    (15 rounds per second). How much traffic and CPU cycles would it take to verify
    every fired bullet? Not to mention when there are ten people firing simultaneously
    on a multiplayer map. This problem is solvable of course: you can send the direction
    for every tenth bullet in a burst, and interpolate the rest, for example.


    The second issue that makes server-side verification less attractive for real-time
    action games is network delays, or lag. Figure 12-2 illustrates the problem. This
    is the top-down view of a virtual game battlefield where the player tries to fire
    at a fast-moving target with a projectile weapon. The client sees that the player
    hit the target, but due to the lag, the server version of the game is different
    from the client version, and the server thinks that player missed. Needless to
    say, the player will be very unhappy as he watches the enemy that he just shot
    happily running away.


    ![](index-483_1.jpg)


    **Figure 12-2.** Due to the lag, the server receives a different result of a shot
    than the client.


    There are a lot of sophisticated algorithms to solve the problems of lag, which
    are often called lag compensation techniques. For example, if the networking delay
    for the particular client is 300 milliseconds, then when the server receives the
    event, it tries to step 300 milliseconds back and look at the game world as the
    player saw it at the moment of shooting. Unfortunately, these techniques open
    possibilities for a whole different kind of network protocol exploits that allow
    a malicious player to get an unfair advantage in the game.


    **NOTE:** As I mentioned, Android games are not yet ready for problems of this
    kind, since fast-action online games are impossible without good support from
    the networking layer. Until `WebSockets` or any other similar API is available
    to the default Android browser, the games where milliseconds matter are not possible
    to implement with acceptable quality.


    Getting back to the Four Balls game, the task of bringing logic to the server
    is not too hard: there are no lags to compensate for as in 3D shooters, there
    is no physics or such to replicate on the server, and the rules are quite easy.
    We will make our server validate every turn that players make — and this is the
    strategy for our verification solution. If the turn is valid, the server broadcasts
    it to both players; otherwise, it sends an error to the player who tried to send
    the wrong move.


    ## Game Components


    At the very least, the multiplayer game should have a lobby, the list of players.'
