    chapters: build the basis for the multiplayer implementation of the Four Balls


    game from the beginning of the book. We will make a multiplayer game out of it:


    players invite each other to play a game and exchange turns via network.


    Global Namespace and Node Modules


    Node.js has a very active community of developers who create extensions and


    tools for it. Such an ecosystem can’t exist without good support for structuring


    and sandboxing contributors’ API. Just imagine a case when two programmers


    (let’s call them John and Frank) are making their frameworks. John defines a


    global variable called count that he uses to hold the number of image files


    loaded from the server. Frank doesn’t know anything about John’s code, and


    creates his own variable with the same name; but he uses it to keep track of the


    number of mousedown events. Let’s say that you want to use both frameworks


    together. What if these variables clash? Obviously, if we don’t take special care,


    we will have a big mess to clean up. Most likely, one of the frameworks will


    break, or maybe both of them will.


    Before looking at how Node solves this issue, let’s try to think about the


    solution. In the previous parts of the book, we broke down the functionality of


    our program into classes, and put each class into a separate file. This approach


    works fine for applications, but fails when it comes to distributable APIs. The


    root cause of all problems is JavaScript’s global scope, which is the same for
    all


    files. Any careless use of global scope brings in errors.


    But what if we promise to be very careful and we do not rely on the global scope


    at all? We will not create or read global variables, only define them in classes


