    # WebStorm


    在 `WebStorm` 中创建并运行新项目所需的步骤更为简单。转到 `File  New Project`，输入名称和路径。项目创建后，您可以像使用 `Idea`
    一样，以完全相同的方式对其进行操作。


    现在，我们来比较一下 `Idea` 和 `Aptana Studio`。


    ## Aptana Studio


    首先，从 [www.aptana.com](http://www.aptana.com) 下载 `Aptana` 的最新版本。选择独立版本，等待下载完成，然后将
    IDE 安装到您选择的文件夹中。当安装完成并启动 IDE 后，您会看到起始页面，其中包含新功能和已修复错误的摘要，以及指向论坛、文档和 Bug 数据库的链接（参见图
    1-4）。


    ![](img/index-19_1.jpg)


    **图 1-4.** *Aptana Studio 中的起始页面*


    `Aptana` 采用了略有不同的命名方式。 `Aptana` 中的项目类似于 `IntelliJ` 中的模块，而一组项目则称为一个工作区。使用上一节的示例，如果您在
    `Aptana` 中开发一个聊天应用程序，您将拥有一个单独的工作区，其中包含多个项目：`Server`、`Android Client` 和 `Desktop
    Client`。`Aptana` 使用了相同的概念，但用不同的词语来描述。与 `IntelliJ` 一样，它允许您清晰地将应用程序的各个组件分开，并在需要时以不同的方式处理它们。


    让我们创建与上一节相同的 `Hello World` 页面。要创建一个新项目，请选择 `File  New  Web Project`。在第一个屏幕上，输入项目文件夹的名称和路径（如果要输入自定义路径，请取消勾选
    `Use Default Location`）。下一个屏幕会提供多个模板供您选择（参见图 1-5）。项目模板就像是针对不同场景预构建的 `Hello World`
    骨架。如果 `Create Project with One of the Templates` 已勾选，请取消勾选，然后点击 `Finish`。


    ![](img/index-20_1.jpg)


    **图 1-5.** *Aptana Studio 中的新 Web 项目向导*


    此时对话框关闭，`Project Explorer`（屏幕左上角区域）中会出现一个名为 `Hello World` 的新文件夹。右键单击该文件夹，从上下文菜单中选择
    `New…  File`。在打开的窗口中输入 `index.html`。将代码清单 1-1 中的代码粘贴到该文件中。结果应如图 1-6 所示。保存文件并在桌面浏览器中打开它。页面应显示
    `It Works!`。


    ![](img/index-21_1.jpg)


    **图 1-6.** *代码已粘贴到 Aptana Studio 中新创建的文件中*


    选择适合您的 IDE 是编写优秀代码的第一步。页面就绪后，应在尽可能接近生产环境的环境中进行测试。在本例中，这可以是真实设备或模拟器。为此，我们需要安装一个
    Web 服务器。


    ## Web 服务器


    您的设备无法直接访问 PC 上的文件系统并从文件夹中加载网页。因此，我们需要一个 Web 服务器，这是一种能够通过 HTTP 提供网页服务的工具。在您安装并配置好
    Web 服务器后，就可以像访问互联网上的常规网站一样访问项目文件：在浏览器中输入地址，即可看到渲染后的 HTML 页面。


    至少有十几种流行的商业级产品可以胜任这项工作。我们将使用最小的一个：`nginx` ([`nginx.com`](http://nginx.com))。它压缩后仅有
    800 KB，却自豪地占据着全球最流行 Web 服务器排行榜第三的位置，仅次于 `Apache` ([`httpd.apache.org`](http://httpd.apache.org))
    和 `IIS` ([www.iis.net](http://www.iis.net))。全球排名前百万的网站中有 12% 使用 `nginx`，并且根据 `W3Techs`
    ([`w3techs.com/technologies/cross/web_server/ranking`](http://w3techs.com/technologies/cross/web_server/ranking))
    的数据，这个数字还在增长。


    为什么我们不使用 “世界上最流行的 Web 服务器” `Apache` 呢？如果您愿意，当然可以使用它，但对于提供静态页面这么简单的任务来说，它有点过于复杂了。

