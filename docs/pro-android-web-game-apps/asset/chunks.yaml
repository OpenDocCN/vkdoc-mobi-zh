    ![](index-427_1.jpg)


    CHAPTER 10: Going Server-Side


    app.listen(80);


    It should now be pretty obvious what the code is doing. The only thing that is


    different is that we send an additional Content-Type header with the response.


    In Listing 10-14 the text that we passed was sent to the browser with the


    Content-Type text/html (this is the default value that Express uses when there


    is no explicit Content-Type specified). If we did the same here, the browser


    would display the board as one line of square braces. HTML doesn’t treat the \n


    symbol as a new line; that’s why we need to set Content-Type explicitly to


    text/plain. We have also dropped a couple of pieces to make sure that the


    page renders something meaningful. Figure 10-8 shows how Chrome renders


    the web page that we just created.


    **Figure 10-8.** *The rendered board*


    That’s obviously correct, but… it doesn’t look nice at all. Besides, you can’t


    click anything because it is not HTML, it is plain text. Even though we decided


    that we don’t care about what looks nice while we are on the server, we still


    need the ability to interact with the board somehow.


    Don’t rush updating your code to make it HTML-like. If you’re writing the page


    markup inside the JavaScript code, it means that something is fundamentally


    wrong with the approach. The UI should be saved in nice HTML files that you


    can give to your designer for styling. Imagine what he’ll say if you send him
    a


    couple hundred lines of JavaScript.


    CHAPTER 10: Going Server-Side


    **425


    **NOTE:** The complete code as it looks on the current stage of the project can
    be found in the 03.board_model folder.


    Rendering Web Pages


    The goal of this section is to output HTML to the browser instead of plain text.


    While it is quite easy to adjust the code for toString() function, we don’t want


    to do that. The BoardModel is the class that represents the state of the game
    and


    the game logic; rendering HTML is clearly out of its responsibilities.


    We will start with learning how to send static files-----HTML, CSS, and JavaScript


    files-----to the client browser. Afterward, we will explore templates-----the


    mechanism that separates the application logic from rendering logic. At the end,'
