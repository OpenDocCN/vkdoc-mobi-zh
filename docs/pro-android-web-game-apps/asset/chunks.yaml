    \ parts.\n\n**Serving Static Files**\n\nIt is fairly easy to send the plain HTML\
    \ or CSS to the user. You need to tell `Express` that you want to use 'static\
    \ middleware' — a module for serving static files — and then just put the files\
    \ into the folder that you pointed out as the root for your static files. Listing\
    \ 10-17 shows how to do it. Once you update the code as shown in the listing,\
    \ `Express` will serve any files from the `public` folder upon the request of\
    \ the browser.\n\n**Listing 10-17.** *Serving Static Files*\n\n```\nvar express\
    \ = require('express');\nvar BoardModel = require(\"./BoardModel\");\nvar app\
    \ = express.createServer();\napp.use(express.static(__dirname + '/public'));\n\
    var board = new BoardModel();\nboard.makeTurn(2);\nboard.makeTurn(3);\napp.get('/',\
    \ function(req, res){\n    res.setHeader('Content-Type', 'text/plain');\n    res.send(board.toString());\n\
    });\napp.listen(80);\n```\n\n`__dirname` is one of the global variables of `Node`.\
    \ It holds the path to the directory where the script resides (be careful, it\
    \ depends on the script; if it is used from the module, then it refers the directory\
    \ of the module, and not the initial file). Now if you put the file called `about.html`\
    \ into the `public` folder inside your project, it is accessible via `http://localhost/about.html`.\
    \ Create this file and try it out. Make a small page and make sure that `Node`\
    \ serves it correctly.\n\n**NOTE:** Why do we use a special folder here and not\
    \ the root of the project? There's a good security reason for that. Since your\
    \ server is written in JavaScript, and JavaScript files are just another type\
    \ of static content, `Node` happily serves the sources of the server and all its\
    \ modules if you do so. Besides, it is always better to separate client scripts\
    \ from the server scripts.\n\nNow we know how to serve static files, but it still\
    \ doesn't solve the problem of rendering the board. We need to pass the current\
    \ board data to HTML somehow. That's where templates come in handy.\n\n**What\
