    # 第 1 章：入门指南


    两者之间的选择通常取决于个人偏好。有一大批 Eclipse 的粉丝，也有一大批 IntelliJ 的粉丝，每当一方发布新版本时，他们往往会引发一场“圣战”。如果你犹豫不决，不妨两种都试试，然后选择你最喜欢的
    IDE。接下来，我将简要介绍这些 IDE，并通过在每个 IDE 中创建一个 Hello World 项目来演示它们的使用方法。


    ## IntelliJ Idea


    从官方网站（[www.jetbrains.com/idea/download/index.html](http://www.jetbrains.com/idea/download/index.html)）下载安装程序并启动它。按照常规安装流程进行（这里没有奇怪的问题；IntelliJ
    Idea 只需你指定一个安装文件夹位置）。


    安装完成后，当你首次启动 IntelliJ Idea 时，你需要选择启用哪些插件。如果你打算将 IntelliJ 作为你的 IDE，最好仔细查看列表，只选择你真正会使用的插件。启用的插件数量越少，启动速度就越快。否则，只需保留所有勾选为默认值即可。最后，你会看到如图
    1-1 所示的欢迎界面；它有几行按钮。点击 `Create New Project` 打开“新建项目”窗口，然后选择 `Create Project from
    Scratch`。


    **图 1-1.** *IntelliJ Idea 欢迎界面*


    ![](img/index-16_1.jpg)


    IntelliJ Idea 将一个“项目”视为一个或多个模块的集合。例如，如果你编写一个聊天应用程序，那么“聊天应用”整体就是一个项目。该项目的模块可以是服务器端、安卓客户端、桌面客户端等。模块背后的理念是将项目中的不同组件分开，因为它们可能有不同的依赖关系或构建步骤，或者可能使用不同的编程语言。当然，项目不必使用多个模块。对于简单的应用程序，一个模块就足够了。


    每个模块都有一个类型：Java、J2ME、Android、Grails，以及本书中最重要的模块类型——Web 模块。从左侧列表中选择它，如图 1-2 所示。如果你决定将
    IntelliJ Idea 作为你的主要 IDE，请在你创建的每个新项目中都遵循这些步骤。


    **图 1-2.** *创建新项目*


    输入项目名称以及你希望用于项目文件的存储位置，然后点击 `Finish`。项目创建完成，你将看到一个空白工作区，如图 1-3 所示。


    ![](img/index-17_1.jpg)


    **图 1-3.** *空白新项目的外观*


    现在你可以编写 Hello World 页面了。在我们的简单示例中，只有一个模块——HelloWorld。在 IDE 中右键单击带有此名称的文件夹图标，然后选择
    `New File`。在对话框中输入 `index.html` 并按 `Enter`。Idea 会创建一个新的空文件，你可以立即开始输入。输入清单 1-1
    中的代码。


    **清单 1-1.** *基础 HTML5 页面*


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <title>Hello World</title>

    </head>

    <body>

    It Works!

    </body>

    </html>

    ```


    在你喜欢的桌面浏览器中打开新创建的文件，确保它能正确渲染页面。我们仍然无法通过移动设备或模拟器打开此文件，因为两者都需要文件能通过 HTTP 访问。设备和模拟器都无法直接访问你电脑上的文件系统，因此我们需要一个
    Web 服务器。我将在本章后面解释如何在移动设备中启动该页面。


    IntelliJ Idea 是一个非常强大的工具，但仍需要一些时间来适应并开始发挥其全部潜力。请务必查看默认快捷键参考文档：`Help → Default
    Keymap Reference`。这是一个单页的 PDF 文件，列出了按类别分组的最常用快捷键。


    如果你只打算使用标准的 Web 技术栈（CSS、HTML、JavaScript 等），那么你可以使用更轻量级（也更便宜）的 Idea 版本，即

