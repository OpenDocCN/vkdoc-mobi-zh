    “… APIs, like WebSockets, provide a richer protocol to perform bi-directional,
    full-duplex communication. Having a two-way channel is more attractive for things
    like games, messaging apps, and for cases where you need near real-time updates
    in both directions. However, in some scenarios data doesn''t need to be sent from
    the client. You simply need updates from some server action.


    … SSEs are sent over traditional HTTP. That means they do not require a special
    protocol or server implementation to get working. WebSockets on the other hand,
    require full-duplex connections and new WebSocket servers to handle the protocol.
    In addition, Server-Sent Events have a variety of features that WebSockets lack
    by design such as automatic reconnection, event IDs, and the ability to send arbitrary
    events.”


    (This fragment is published with the kind permission of Eric Bidelman.)


    The solutions described in this section can be used in projects that target mobile
    devices and desktops. There should be a reliable fallback, however, to achieve
    the same result on Android smartphones. The next section is dedicated to such
    fallback transports. They are not as beautiful as the ‘best’ solutions from this
    section, but they are proven to work.


    **NOTE:** Don’t be misguided by the name of this section: *best* doesn’t mean
    *flawless*. Both WebSocket API and SSEs have their own drawbacks and pitfalls.
    The word “best” means that the semantics of these APIs suit this task better than
    other APIs, like XHR.


    ## The Acceptable Solutions


    ‘Acceptable’ solutions are the trade-off between beautiful code that relies on
    cutting-edge technology and stable hacks that have been field-tested by millions
    of users over the last few years.


    First, let’s look at the simplest way to simulate the server-to-client communication
    with XHR. The client polls the server every few seconds by asking, ‘Any new events
    for me?’ If there are new events, they are transferred to the client; otherwise,
    the server just returns the empty response. The communication between the client
    and the server in this case is illustrated in Figure 11-1. The ‘useless’ requests
    that did not bring any information to the client or to the server are shown in
    gray. As you can see, to receive only one event, both the client and the server
    need to process many connections just to give the server a chance to respond.


    ![](index-468_1.jpg)


    **Figure 11-1.** *The simplest polling technique requires the server and client
    to perform a lot of unnecessary work.*


    With the simple polling approach, the response is written and the connection is
    closed even if there are no new events. Then the client waits for a certain amount
    of time (called a ‘polling interval’) and reconnects again. The drawback to this
    approach is that the latency is equal to the polling interval in the worst case.
    Decreasing the interval value is also not an option: a lot of bandwidth will be
    wasted just to send headers. The server will starve under the enormous load (processing
    an HTTP request has its own small CPU and memory overhead). More clients means
    more wasted CPU time.


    HTTP protocol has one interesting feature: it doesn’t require the server to respond
    immediately to the client’s request. In fact, the server can keep the HTTP connection
    open for as long as needed. The first technique in this section relies on this
    fact to reduce the number of useless calls.


    ## XHR Long Polling


    XHR long polling works almost like the traditional polling. The only difference
    is that the server keeps the connection open when it doesn’t have any new events.
    Once there is a new event for the client, the server responds and closes the connection
    afterward. This way, the client connection may stay open for several seconds,
    waiting for new data. Figure 11-2 illustrates this idea.


    ![](index-469_1.jpg)


    ![](index-469_2.jpg)'
