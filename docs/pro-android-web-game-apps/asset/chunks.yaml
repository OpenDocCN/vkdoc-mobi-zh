    \ Define the Object\n\n```\nvar car = {\n  color: \"red\",\n  drive: function()\
    \ {\n    console.log(this.color + \" car moved\");\n  }\n};\ncar.drive();\n```\n\
    \nThis method is not very useful since you create one individual object that does\
    \ not relate in any way to any common data structure. To create a second instance\
    \ of the car, you will have to describe its structure once again.\n\nIn object-oriented\
    \ languages like Java, we got used to the idea of classes that describe the common\
    \ structure of the objects and that can be used to construct any number of them.\n\
    \nIn JavaScript, there are no classes. But there is a similar mechanism to describe\
    \ the common blueprint: functions and objects. In fact, any function or object\
    \ can be used to create a new object. Listing 1-3 shows an example that creates\
