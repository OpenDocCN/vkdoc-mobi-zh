    \ 11-2.** *Sending XHR Request To Retrieve Textual Data from the Server*\n\n```\n\
    function init() {\n  var xhr = new XMLHttpRequest();\n  xhr.onreadystatechange\
    \ = function (e) {\n    if (xhr.readyState == 4) {\n      console.log(\"Got \"\
    \ + xhr.status +\n        \" saying [\" + xhr.responseText + \"]\");\n    }\n\
    \  };\n  xhr.open(\"GET\", \"data.json\");\n  xhr.send();\n}\n```\n\n**Listing\
