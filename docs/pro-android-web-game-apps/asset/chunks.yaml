    Networking


    Let’s continue our experiments with Cordova and create a native version of the


    multiplayer game. In this case, it is not enough to copy the app’s code to


    assets/[www.](http://www.First)


    [First,](http://www.First) you have to rewrite the lines that use relative URLs
    to access server-side resources. When you launch a Cordova application, it loads
    the page directly


    from the filesystem. This means that every relative URL refers to the filesystem


    too, and not the server as is usual. For example, consider the typical XHR call:


    var xhr = new XMLHttpRequest();


    xhr.open("GET", "user/182.json", true);


    xhr.send(null);


    Usually, the request ends up on the server, which loads the required info from


    the database and forms the dynamical response. With the Cordova application,


    the request tries to load the data from the /assets/www/user/182.json file, and


    obviously fails. Fixing this problem is a straightforward task; use absolute URLs


    instead of relative ones:


    xhr.open("GET", ["http://myserver.com/user/182.json", true);](http://myserver.com/user/182.json)


    But what about the same-origin policy of the browser? Usually, you can’t access


    anything but your own server! Good [news: there’s no](news:there%E2%80%99s) such
    policy restriction for Cordova-loaded pages. You just enter any URL you like,
    and receive the


    response.


    CHAPTER 15: Building Native Applications


    Copy the code from Chapter 12’s multiplayer game application and adjust the


    absolute URLs, as shown in Listing 15-4.


    **Listing 15-4.** *Fixing URLs for the Multiplayer Version of Four Balls*


    <!DOCTYPE html>


    <html lang="en">


    <head>


    ...


    <script src="js/OnlineGame.js"></script>


    <script src=" [http://10.0.2.2/socket.io/socket.io.js"></script>](http://10.0.2.2/socket.io/socket.io.js)


    <!-- Events -->


    <script src="js/EventEmitter.js"></script>


    ...


    function init() {


    socket = io[.connect("http://10.0.2.2");](http://10.0.2.2)


    ...


    After this change, the resources load correctly. Of course, you have to adjust
    the


    URL to fit your own system setup. The code in Listing 15-4 was used for testing


    on the emulator.


    Second, we need to adjust the set of permissions for the application. By default,


    an Android native app is not allowed to use internet connections. To gain this


    privilege, an application has to explicitly state that connectivity is required.
    Then the user has to approve the list of permissions when he first installs the
    app. The


    security model of Android is much better than the restrictive security model of


    the browser. If the user trusts your app, he may allow almost unlimited access
    to


    the device: filesystem, sensors, phonebook, and so forth (but it is always better


    to ask for only the permissions you need and nothing else).


    To add the permission, modify the AndroidManifest.xml once again, as shown


    in Listing 15-5.


    **Listing 15-5.** *Requesting Permissions to Connect to the Internet from the
    Native Android App*


    <?xml version="1.0" encoding="utf-8"?>


    [<manifest](http://schemas.android.com/apk/res/android)


    package="com.juriy.connectfour"


    android:versionCode="1"


    android:versionName="1.0">


    ...


    <!-- Uncomment this line if your page will interact with the server -->


    <uses-permission android:name="android.permission.INTERNET" />


