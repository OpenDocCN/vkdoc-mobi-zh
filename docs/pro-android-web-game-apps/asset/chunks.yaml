- fmt: '# WebStorm


    The steps required to create and run a new project in `WebStorm` are simpler.
    Go to `File  New Project`, and enter the name and the path. When the project
    is created, you work with it in exactly the same way as you would work with `Idea`.


    Now let’s compare `Idea` to `Aptana Studio`.


    ## Aptana Studio


    Start by downloading the latest release of `Aptana` from [www.aptana.com](http://www.aptana.com).
    Select the standalone version, wait until the download is complete, and install
    the IDE to the folder of your choice. When the installation is completed and you
    launch the IDE, you will see the Start page, which has a summary of new features
    and fixed bugs, as well as links to the forums, documentation, and bugs database
    (see Figure 1-4).


    ![](index-19_1.jpg)


    **Figure 1-4.** *The Start page in Aptana Studio*


    `Aptana` utilizes a slightly different approach to naming. The project in `Aptana`
    is similar to module in `IntelliJ`, and a set of projects is called a workspace.
    Using the example from the previous section, if you make a chat application in
    `Aptana`, you will have a separate workspace that contains several projects: `Server`,
    `Android Client`, and `Desktop Client`. `Aptana` uses the same concept, but different
    words to describe it. Like `IntelliJ`, it allows you to clearly separate the components
    of the application and treat them in a different way when required.


    Let’s create the same `Hello World` page as in the previous section. To create
    a new project, select `File  New  Web Project`. On the first screen, enter the
    name and the path to the project folder (uncheck `Use Default Location` if you
    want to enter the custom path). The next screen presents you with several templates
    (see Figure 1-5). Project templates work like prebuilt `Hello World` skeletons
    for different cases. Uncheck the `Create Project with One of the Templates` if
    it is checked, and then click `Finish`.


    ![](index-20_1.jpg)


    **Figure 1-5.** *The new web project wizard in Aptana Studio*


    The dialog is now closed and the new folder called `Hello World` appears in the
    `Project Explorer` (the area in the top-left section of the screen). Right-click
    the folder and select `New…  File` from the context menu. Enter `index.html`
    in the opened window. Paste the code from Listing 1-1 in the file. The result
    should look like Figure 1-6. Save the file and open it in the desktop browser.
    The page should say `It Works!`


    ![](index-21_1.jpg)


    **Figure 1-6.** *The code is pasted into the newly created file in Aptana Studio*


    Choosing the IDE that fits you is the first step to writing good code. Once the
    page is ready, it should be tested in an environment that is as close to production
    as possible. In our case, this is either a real device or an emulator. To do this,
    we will need to install a web server.


    ## Web Server


    Your device cannot access the filesystem on your PC and load the web page directly
    from a folder. That’s why we will need a web server, a tool that can serve web
    pages via HTTP. After you install a web server and configure it, you access the
    project files the same way as you access regular web sites on the Internet: type
    the address in the browser to see the rendered HTML pages.


    There are at least a dozen popular commercial-grade products that can do the job.
    We’ll use the smallest one, `nginx` ([http://nginx.com](http://nginx.com)). At
    only 800 KB when compressed, it proudly holds third-place on the list of the most
    popular web servers in the world, ranking after `Apache` ([http://httpd.apache.org](http://httpd.apache.org))
    and `IIS` ([www.iis.net](http://www.iis.net)). 12 percent of the world’s top-million
    web sites use `nginx`, and this number is increasing according to `W3Techs` ([http://w3techs.com/technologies/cross/web_server/ranking](http://w3techs.com/technologies/cross/web_server/ranking)).


    Why don’t we use `Apache`, “the world’s most popular web server”? You can if you
    want, but it is a little too complex for the simple task of serving static pages.'
