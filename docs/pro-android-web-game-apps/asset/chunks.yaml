- fmt: '用户偏好不透明背景的图像，而非同一图像的纯色背景。Safari 浏览器则偏好透明图像。


    几乎不可能给出适用于所有浏览器的优化建议：有些浏览器渲染图形更快，有些则稍慢。不过，仍有一些相对恒定的行为可被用于优化。


    **注意：** `jsperf.com` 测试的结果是每秒迭代次数。换句话说，它告诉你一秒钟内可以执行某个任务多少次——次数越多越好。这些数字不应被视为衡量某个操作速度的绝对数值。测试结果用于比较一个操作比另一个操作快多少。哪个操作更快：将数字乘以`0.5`还是除以`2`？这正是`jsperf.com`旨在回答的问题。如果你对某种方法相对于另一种方法的有效性有任何疑问，请毫不犹豫地使用这个小巧实用的工具。


    较小的图像通常比较大的图像绘制得更快。这听起来像是一个显而易见的观察，但有趣的一点是，绘制一张大图比用几张小图覆盖相同区域要“更便宜”。我测试了一组`25`个精灵。一组`64
    × 64`的精灵每秒执行了`306`次重绘，而一组`32 × 32`的精灵则达到了`506`次（记住，次数越多越好）。要覆盖与大精灵相同的面积，我需要绘制`100`个小精灵，因为一个`64
    × 64`的精灵覆盖的面积是一个`32 × 32`精灵的四倍。考虑到面积因素的相对数字是：大精灵覆盖面积时为`306`，而小精灵覆盖面积时为`127`（`506
    ÷ 4 = 127`）。大精灵完成工作的速度几乎快了`三倍`！


    缩放是魔鬼。当我测试图像缩放行为时，几乎所有浏览器都出现了极端的性能下降。在标准的 Android 2.2 浏览器中，将一个`32 × 32`的图像缩放到`64
    × 64`的大小所需的时间是绘制未缩放的`64 × 64`图像的两倍。Firefox Mobile 绘制它的速度慢了`九倍`（在撰写本文时）。结论：如果你想支持不同尺寸的精灵，最好创建不同的资源集——一套用于低分辨率，一套用于高分辨率。如果你试图在运行时进行缩放，CPU
    是不会感激你的。


    ![图 4-7](index-148_1.jpg)


    **第 4 章：动画和精灵**


    **143**


    精灵图集比单个图像工作得稍慢一些。等等！但你刚才说精灵图集很好！是的，它们很好——尤其是在通过 3G 网络传输图像时；但当你需要绘制它时，单个图像会赢得比赛。性能损失有多严重？没那么严重：单个图像每秒`306`次操作，而同一图像从精灵图集中裁剪出来则为`267`次操作。在一个精灵密集型的游戏中，尽可能榨取每个
    CPU 周期仍然很重要，但逐帧加载图像是不可行的。你已经看到了如何使用数据 URL 从`canvas`对象构建图像。你可以在此处使用相同的方法：将图像作为精灵图集传输，但在浏览器中将其转换为一组单独的图像。在加载时间上多花几秒钟通常是换取性能提升的好代价。


    小数像素会扼杀性能。在大多数浏览器上，使用小数坐标（如`(1.5, 1.5)`）绘制精灵比在`(1, 1)`或`(2, 2)`上绘制同一图像要慢得多。性能损失的程度与缩放图像相当。还记得第
    1 章中描述的模糊线条吗？精灵的工作方式相同：浏览器使用抗锯齿来绘制小数坐标处的精灵，从而带来图像预处理和边界上的半透明像素，这两者都倾向于消耗 CPU（见图
    4-7）。解决方案很简单：在绘制前对坐标执行`Math.round()`。没有小数部分，就不会有问题。'
  raw: 'preferred the image with an opaque background to the same image with a solid


    background. Safari preferred the transparent image.


    It is virtually impossible to give optimization advice in a way that suits every


    browser: some browsers render graphics faster, some work slightly slower.


    There are a few relatively constant behaviors that should be used for the


    optimizations, however.


    **NOTE:** The result of the jsperf.com test is the number of iterations per second.
    In other words, it tells you how many times you can run a certain task during
    one


    second—more is better. These numbers should not be treated as some absolute


    values to determine how fast a certain operation is. The results of the tests
    are used to compare how much faster one operation is than another. Which operation
    is faster: multiplying the number by 0.5 or dividing it by 2? This is exactly
    the type of question that jsperf.com aims to answer.


    If you ever have any doubt about the effectiveness of a certain approach versus


    another one, don’t hesitate to use this small and very useful tool.


    Smaller images are usually painted faster than bigger ones. This sounds like an


    obvious observation, but the interesting point is that it is ‘‘cheaper’ to paint
    one large image rather than cover the same area with several small pictures. I
    tested


    sets of 25 sprites. A set of 64 × 64 sprites did 306 repaints per second while
    a


    32 × 32 set managed 506 (bigger is better, remember). I’d need to paint 100


    small sprites to cover the same area that I covered with the big ones because


    the 64 × 64 sprite covers an area four times larger than that of the 32 × 32 sprite.


    The relative numbers that take the area into account would be 306 (big sprites


    covering the area) versus 127 (506 ÷ 4 = 127) small sprites covering the area.


    Big sprites do the job almost three times faster!


    Scaling is evil. Almost every browser showed an extreme drop in performance


    when I tested how the scaling of the image behaves. Drawing a 32 × 32 image


    scaled to the size of 64 × 64 takes twice the time as drawing the big (64 × 64)


    unscaled image in a standard Android 2.2 browser. Firefox Mobile draws it nine


    times slower (at the time of writing). Conclusion: if you want to support the


    different sizes of sprites, it is best to create different sets of resources-----one
    for Low Res, one for High Res. If you try to scale at runtime, the CPU will not
    thank


    you.


    ![](index-148_1.jpg)


    CHAPTER 4: Animation and Sprites


    **143


    Sprite sheets work a little slower than the individual images. Wait! But you just


    said that sprite sheets are good! Yes, they are----especially when it comes to


    transferring the image via 3G networks; but when you need to draw it, an


    individual image wins the race. How bad is the loss of performance? Not that


    bad: 306 operations per second for the individual image versus 267 operations


    for the same image cut out from the sprite. In a sprite-intensive game, it is
    still


    important to squeeze every CPU cycle you can, but loading images frame by


    frame is not an option. You’ve seen already how to build an image out of the


    canvas object using the data URL. You can use the same approach here:


    transfer the image as a sprite sheet, but transform it to a set of individual
    images right in the browser. A couple of extra seconds in loading time is usually
    a good


    price for the boost of the performance.


    Decimal pixels kill performance. On most browsers, drawing the sprite in


    decimal coordinates like (1.5, 1.5) is significantly slower than drawing the


    same image in either (1, 1) or (2, 2). The loss of performance is the same


    order as with the scaled image. Remember the blurry lines described in Chapter


    1? Sprites work the same way: the browser uses anti-aliasing to draw the sprite


    in a decimal coordinate, bringing up image preprocessing and semitransparent


    pixels on the border, both of which tend to like eating the CPU (see Figure 4-7).


    The solution is simple: do Math.round() on the coordinates before drawing. No


    decimal part, no problem.'
