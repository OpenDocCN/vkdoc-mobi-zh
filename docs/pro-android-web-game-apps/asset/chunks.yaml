    There are many other approaches to building AI: fuzzy logic, goal-oriented designs,
    state machines, rule systems, and their combinations. There’s a lot of material
    to cover, but for many casual games, it is quite enough to have only pathfinding
    and a decision-tree-based AI engine. If you are interested in further research,
    read the wonderful book by Ian Millington and John Funge, *Artificial Intelligence
    for Games, Second Edition* (Morgan Kaufmann, 2009). It has a set of well-explained
    AI algorithms, which if used wisely can make your game bots act very smart.


    The code that combines both pathfinding and decision-making techniques can be
    found in a file called `04.decisions.html` along with the other sources for this
    chapter. Don’t forget to visit the JavaScript AI playground project on GitHub
    (<https://github.com/Juriy/gameai>) from time to time. You might find something
    useful for your own game there.


    ## Summary


    This chapter is the starting point for an in-depth exploration of AI topics. Artificial
    intelligence plays an important role in game development, but you should carefully
    evaluate the level of AI required in your particular game. Sometimes the most
    interesting game uses the simplest AI techniques. The most basic and usual task
    that AI performs is pathfinding—finding a path between two points in the level.
    The A* pathfinding algorithm works with the waypoint graph—a mathematical representation
    of the reachable area of the game world.


    ## Chapter 13: AI in Games


    We learned about the different ways to construct the graph and highlighted the
    common pitfalls of each technique. We also peeked at the different ways to represent
    the navigation data for a level, called the navmesh.


    We also looked at a decision tree—the simple algorithm that helps an agent pick
    the next action. This is probably the simplest algorithm out of the family, yet
    it allows us to implement very interesting and natural-looking behaviors.


    ## Chapter 14: JavaScript Game Engines


    This chapter is devoted to the review of the third-party tools: game engines and
    graphic libraries made for web browsers. Game engines make the life of developers
    easier since they provide higher-level facilities for making games. For example,
    if you are making a game from scratch, you have to deal with every detail yourself:
    loading images, breaking them up into frames and sprites, rendering world, detecting
    clicks, and so forth. We have done it already in Chapter 7, and you probably remember
    that there are quite a lot of aspects to take care of. A good 2D game engine would
    give you all these facilities right out of the box.


    The usual question at this point is "why have we wasted so much time learning
    the basic stuff if we could just pick the game engine and start making games?"
    The reason is quite simple: game engines are not a silver bullet, and they can’t
    be used at maximum efficiency without understanding the basic principles behind
    them. Besides, when you find an engine that suits your needs, you might still
    want to extend it with a few features that are required specifically for your
    game. Now that you have that knowledge under your belt, let’s take a look at some
    leading open-source tools that aim to make your life as a game developer easier.


    This chapter is devoted to game engines and graphic libraries. We will explore
    the following subjects:


    - A game engine and how it is different from a graphical API

    - The Entity Component System


    ## Chapter 14: JavaScript Game Engines (continued)


    - How to write a game with the 2D game engine Crafty.js


    **NOTE:** There are quite a few products for both 2D and 3D graphics, so if you
    are wondering why I have chosen to cover Crafty and not Engine X, I’ll explain
    how I made the decision. First, the tool must be free and open source. It is useful
    to read through the engine’s code to see how it works under the hood. Examining
    a mature engine’s code is a good way to learn new tricks. Second, the project
    should have at'
