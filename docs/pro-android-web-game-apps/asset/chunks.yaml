  trans: "\n# 排版后的内容\n\n比靠近摄像机的物体要小。图 8-17 展示了这两种投影之间的区别。\n\n**图 8-17.** *左图显示的是正交投影，右图显示的是透视投影。*\n\
    \n如你所见，右图中使用透视投影渲染的同一个立方体，看起来比左图现在呈现的效果要逼真得多。我们如何修复引擎以使其考虑到透视效果呢？没错，我们需要再添加一个矩阵。\n\
    \n我不会深入讲解投影矩阵的具体数学实现细节。要制作酷炫的 3D 游戏，你只需知道两件事。第一，将`modelView`变换的结果乘以这个矩阵，就能得到考虑了透视效果的投影变换。第二，Brandon\
    \ 是个好人，他在自己的库中加入了一个便捷的方法，只需给定一组人类可读的参数，就能创建一个透视矩阵。\n\n清单 8-6 展示了我们如何创建这个矩阵。\n\n\
    **清单 8-6.** *创建投影矩阵*\n\n```\nvar persp = mat4.create();\nmat4.perspective(45,\
    \ canvas.width/canvas.height, 0.1, 100, persp);\n```\n\n这些参数分别代表：垂直视角、宽高比、到“近平面”的距离以及到“远平面”的距离。近平面和远平面定义了场景的边界。这相当于在说：“我不想看到任何比\
    \ 0.1 更近或超过 100 距离的物体。”最后一个参数是由这些值初始化的矩阵（参见清单 8-7）。图 8-18 说明了透视参数如何影响最终生成的画面。\n\
    \n**清单 8-7.** *使用投影矩阵*\n\n```\nfor (var i = 0; i < vertices.length; i++) {\n \
    \   var point = [vertices[i][X], vertices[i][Y], vertices[i][Z], 1];\n    mat4.multiplyVec4(modelView,\
    \ point);\n    mat4.multiplyVec4(persp, point);\n    ...\n}\n```\n\n![](img/index-357_1.jpg)\n\
    \n**图 8-18.** *使用透视定义场景边界*\n\n在应用透视矩阵后得到的坐标，必须先经过归一化处理，才能将顶点绘制到屏幕上。简单来说，我们就是将齐次坐标（即多了一个分量的坐标）转换为只有`x`和`y`两个轴的标准屏幕坐标（参见清单\
