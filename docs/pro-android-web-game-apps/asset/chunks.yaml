- fmt: "**NOTE:** Web servers usually work on port `80`. Sometimes programs like Skype\
    \ may use the same port for its own needs. If you’re having problems starting\
    \ `nginx` while Skype is in operation, open Skype, go to **Tools** → **Options**\
    \ → **Advanced** → **Connection** and remove the checkmark from **Use Ports 80\
    \ and 443 as Alternatives for Incoming Connections**.\n\nAlternatively, you can\
    \ configure `nginx` to use a different port, for example port `8080`. If you choose\
    \ to do so, you should remember to add the port number to the address to view\
    \ your pages. If `nginx` is configured to use port `80`, for example, you can\
    \ type `http://localhost` in the browser to load the page; otherwise, you should\
    \ set the port correctly in the address bar as `http://localhost:8080`.\n\n##\
    \ Setting Up nginx\n\nDownload the latest version of `nginx` from `http://nginx.org/en/download.html`.\n\
    \nThe installation process of `nginx` is very easy—you just unzip it. This is\
    \ enough to get it up and running, but it will only serve files from a predefined\
    \ internal folder, and you will have to copy all of the project’s contents over\
    \ and over again to test even the smallest edit. We will reconfigure `nginx` to\
    \ point web root as the project directory instead.\n\nGo to the `conf` folder\
    \ inside the `nginx` installation and open `nginx.conf` in a text editor. Find\
    \ the following lines:\n\n```\nlocation / {\n    root html;\n    index index.html\
    \ index.htm;\n}\n```\n\nand change the `html` to the path to your project as follows\
    \ (I used `c:\\apps\\projects\\myproject`):\n\n```\nlocation / {\n    root c:/apps/projects/myproject;\n\
    \    index index.html index.htm;\n}\n```\n\n**NOTE:** `nginx` uses the hash symbol\
    \ (`#`) for commenting-out lines in config files. If you see a line starting with\
