    \ 404 saying [Not Found]`\n\n这条消息提供了足够的细节来描述和诊断问题：服务器发送了状态码 `404`，表明无法找到给定的资源。然而，有时这种检查还不够。如果存在网络问题，或者用户通过调用\
    \ `xhr.abort()` 中止了请求，状态行的信息量会较少：\n\n`Got error 0 saying []`\n\n如果服务器没有机会处理请求，甚至没有看到请求，那么\
    \ HTTP 状态码和状态文本都是未定义的，从而无法判断到底出了什么问题。无法通过 JavaScript 以编程方式诊断问题的根本原因。XHR API 允许你区分两种类型的错误：服务器错误和任何其他错误。显然，“任何其他错误”这个描述过于宽泛，难以依赖——网络连接丢失、DNS\
    \ 查找失败、重定向过多或程序性中止——这些以及许多其他问题都属于同一类别。\n\n看到这些问题的几率远低于常见的 `404` 或 `503` 状态码；如果浏览器能够加载网页本身，则意味着当时\
    \ Web 服务器是可用的，并且带宽足以承载初始内容。这通常也意味着 Ajax 请求能够顺利完成。然而，对于移动游戏来说，概率会稍高一些，主要是因为移动互联网的质量高度依赖于环境（如果用户跑到他家的水泥地下室，他可能会失去信号）。\n\
    \n## 提示\n\n有几种方法可以检查你的应用程序在低连接性下的工作情况。测试网络问题最简单的方法是随机中止你的请求。第二种技术是从服务器端中止连接，不写回任何数据，如下所示：\n\
    \n```javascript\napp.get(\"/no.json\", function(req, res) {\n    req.socket.end();\n\
    \    req.socket.destroy();\n});\n```\n\n在更复杂的情况下（例如，当你想要测试低带宽连接、数据包丢失等时），你应该使用专门的网络模拟软件。\n\
    \n## XMLHttpRequest Level 2\n\n新的 Level 2 规范为 XHR 对象增加了一些缺失的功能，包括更好的事件处理器、支持发送和接收二进制数据、支持文件上传以及跟踪上传进度等。在本节中，我们通过两个示例来比较旧\
    \ API 与 Level 2：一个常规 HTTP 请求和一个二进制请求。这两个任务对于游戏开发都至关重要。尽管这两个任务使用旧 API 也能完成，但 Level\
    \ 2 看起来更方便，并且不需要任何 hack。\n\n让我们来看一下清单 11-5 中同一个“Hello World”应用程序的代码——但已更新为使用新版本\
    \ XHR 的某些功能。\n\n**清单 11-5.** Level 2 版本的 Hello World 请求\n\n```javascript\nfunction\
    \ init() {\n    var xhr = new XMLHttpRequest();\n\n    xhr.onload = function(e)\
    \ {\n        if (xhr.status == 200) {\n            console.log(\"Got response\
    \ saying [\" + xhr.responseText + \"]\");\n        } else {\n            console.log(\"\
    Got server error \" + xhr.status +\n                \" saying [\" + xhr.statusText\
    \ + \"]\");\n        }\n    };\n\n    xhr.onerror = function(e) {\n        console.log(\"\
    Got network error\");\n    };\n\n    xhr.onabort = function(e) {\n        console.log(\"\
    Request is explicitly aborted\");\n    };\n\n    xhr.open(\"GET\", \"data.json\"\
    );\n    xhr.send();\n}\n```\n"
- fmt: "# 排版后的内容\n\nThis solution is certainly better than the original version. There\
    \ are three different callbacks for handling the outcomes of the HTTP request:\n\
    \n- `onload`, for the regular outcome when the HTTP call is completed normally\
    \ (the response code is not taken into the account, so both 200 and 503 codes\
    \ are treated as normal);\n- `onabort`, when the user aborts the request; and\n\
    - `onerror`, when a network error occurs.\n\nThe main advantage of this code is\
    \ that it is easier to read and it’s the first step toward better-quality error\
    \ reporting. In `XMLHttpRequest` Level 2, `abort` is treated as a separate event.\n\
    \nLevel 2 has a lot more to give than fine-grained callbacks, and one of the most\
    \ important new features is the ability to handle binary data.\n\n## Working with\
    \ Binary Data\n\nBeing able to handle binary data is extremely useful for game\
    \ development. Game resources such as 3D models are often saved in binary formats\
    \ either for historical reasons or to save traffic and keep the size of the assets\
    \ small. Before XHR Level 2, there was no standard way to do it. The only possible\
    \ solution relied on the custom function `overrideMimeType()`. This approach is\
    \ illustrated in Listing 11-6.\n\n**Listing 11-6.** *Loading Binary Data with\
    \ the Original XMLHttpRequest (Custom charset Hack)*\n\n```\nfunction init() {\n\
    \  var xhr = new XMLHttpRequest();\n  xhr.open('GET', 'bin/marine.md2');\n  xhr.overrideMimeType('text/plain;\
    \ charset=x-user-defined');\n  xhr.onreadystatechange = function(e) {\n    if\
    \ (this.readyState == 4 && this.status == 200) {\n      for (var i = 0; i < this.responseText.length;\
    \ i++) {\n        var byte = this.responseText.charCodeAt(i) & 0xff;\n       \
    \ // process byte here\n      }\n    }\n  };\n  xhr.send();\n}\n```\n\nThe code\
    \ in the Listing 11-6 overrides the MIME type returned by the server, and forces\
    \ the browser to interpret the binary response as if it is text with an unknown\
    \ charset: `x-user-defined`. This is a way to ensure that the browser does not\
    \ process the response, and bytes that were sent by the server remain intact.\n\
    \nThe XHR Level 2 specification added explicit support for binary communications.\
    \ A browser that supports new features can send and receive arbitrary binary data\
    \ without the need to implement workarounds, like in Listing 11-6. Take a look\
    \ at the code in Listing 11-7 to see how it works.\n\n**Listing 11-7.** *The Support\
    \ for Binary Data Exchange in XHR Level 2*\n\n```\nfunction init() {\n  var xhr\
    \ = new XMLHttpRequest();\n  xhr.open('GET', 'bin/marine.md2');\n  xhr.responseType\
    \ = 'arraybuffer';\n  xhr.onload = function(e) {\n    var byteArray = new Uint8Array(xhr.response);\n\
    \    for (var i = 0; i < byteArray.length; i++) {\n      var byte = byteArray[i];\n\
    \      // process byte here\n    }\n  };\n  xhr.send();\n}\n```\n\nThe code in\
    \ Listing 11-7 doesn’t use any hacks, thus it is far easier to read and work with.\
    \ To enable it, you have to set the `responseType` property of the XHR object\
    \ to `ArrayBuffer` or `Blob`. In this case, the browser treats the response from\
    \ the server as binary data, and you have access to the bytes without applying\
    \ any hacks. The other possible values of `responseType` are `document` for DOM\
    \ object and `text` for plain text responses. The default is `text`. Note that\
    \ in Listing 11-7, we use a different property of XHR to access the response data:\
    \ `response` instead of `responseText` as before.\n\nThe binary data support in\
    \ XHR Level 2 relies on the other specifications: typed arrays (www.khronos.org/registry/typedarray/specs/latest/)\
    \ and File API (www.w3.org/TR/FileAPI/). Typed arrays added the standard way of\
    \ manipulation with the binary data. Before typed arrays, developers had to handle\
    \ data types themselves: create bytes, floats, integers, and other atomic types\
    \ out of byte sequences. In Listing 11-7, the response from the server is treated\
    \ as an array of “unsigned 8-bit integers” or, in other words, bytes.\n\nThere\
    \ are other types too, for example: `Int32Array` for 32-bit signed integers."
