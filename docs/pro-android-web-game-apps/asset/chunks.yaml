- fmt: "# Event Handling and User Input\n\n## Listener for Normal DOM Events\n\n`listener`\
    \ for the normal DOM event: `touchstart` or `mousedown`. It transforms the browser\
    \ event to the custom `down` event and instantly fires it. It also saves the coordinates\
    \ of the start of interaction. We need them later to check whether the user passed\
    \ the move threshold.\n\n## Chapter 5: Event Handling and User Input\n\n### Listing\
    \ 5-15. `_onDownDomEvent`: Transforming “Start of Interaction” Events to the Custom\
    \ Form\n\n```javascript\n/**\n * Listens to the \"down\" DOM events: mousedown\
    \ and touchstart.\n * @param e DOM Event\n */\n_p._onDownDomEvent = function(e)\
    \ {\n    // We must save this coordinates to support the moveThreshold - this\n\
    \    // may be the starting point of the movement, we can't simply\n    var coords\
    \ = this._lastMoveCoordinates = this._getInputCoordinates(e);\n\n    // Emit \"\
    down\" event - all coordinates together with the\n    // original DOM event are\
    \ passed to listeners\n    this.emit(\"down\", {x: coords.x, y: coords.y, domEvent:\
    \ e});\n\n    // Usually we want to stop original the DOM events from further\
    \ browser processing.\n    this._stopEventIfRequired(e);\n};\n```\n\nNext comes\
    \ the `_onUpDomeEvent()` function shown in Listing 5-16. It is slightly more complex.\
    \ As the name implies, it works with the movement events: `touchmove` and `mousemove`.\
    \ `_onUpDomeEvent`'s main task is to keep track of deltas and threshold. If the\
    \ distance from the `down` event to the current point is more than threshold,\
    \ then this is not a micromovement. Once the break of threshold occurs, we don't\
    \ need to check against it anymore. The `_moving` flag is reset once movement\
    \ is over.\n\n### Listing 5-16. `_onMoveDomEvent` Keeps Track of Movement and\
    \ Checks If Threshold Is Breached\n\n```javascript\n/**\n * Listens to the \"\
    move\" DOM events: mousemove and touchmove. This function\n * is slightly more\
    \ complex. It keeps track of the distance travelled since the last\n * \"move\"\
    \ action, besides it ignores the movement and swallows the event if we are\n *\
    \ still within the _moveThreshold\n * @param e DOM event\n */\n_p._onMoveDomEvent\
    \ = function(e) {\n    var coords = this._getInputCoordinates(e);\n\n    // Calculate\
    \ deltas\n    var deltaX = coords.x - this._lastMoveCoordinates.x;\n    var deltaY\
    \ = coords.y - this._lastMoveCoordinates.y;\n\n    // Check threshold, if the\
    \ distance from the initial tap to the current position\n    // is more than the\
    \ threshold value - qualify it as a real movement\n    if (!this._moving && Math.sqrt(deltaX*deltaX\
    \ + deltaY*deltaY) > this._moveThreshold) {\n        this._moving = true;\n  \
