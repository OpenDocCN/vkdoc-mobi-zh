    Working with Sessions


    Right now, any user can join the game and start clicking the board because


    there is a single shared board for the whole server. Once you start making the


    real game, you need to separate the users from the games. In other words, for


    each playing user, you need to store the reference to the board that he’s playing


    on. This is an easy task once you know how to work with sessions.


    Sessions are a way to identify users and keep track of their actions. If you


    haven’t worked with them before, then you should think about the session as an


    object that is associated with the user’s browser. This object resides on the


    server, so the user can’t change it. For example, we can keep track of how


    many pages the user has visited by adding a counter to the user session, and


    increasing it each time we serve a page for that user.


    To add session support to our server, we need to use another piece of


    middleware: I think you’re starting to see a pattern. Listing 10-24 shows the


    required configuration.


    **Listing 10-24.** *Adding Session Support to the Server*


    app.use(express.cookieParser());


    app.use(express.session({ secret: "gameserversession" }));


    app.use(app.router);


    app.use(express.static(__dirname + ''/public''));


    That’s all you need to track your users. After you add these lines, your request


    object that is passed to the handler function is enriched with a new field called


    session. You can add new properties and read properties that you have set


    before, and pass them to the templates. The example in Listing 10-25 shows


    how to create a new session parameter, totalTurns, which is increased each


    time the user makes a turn.


    CHAPTER 10: Going Server-Side


    **Listing 10-25\.** **Working with Session Parameters**


    *app.get(''/'', function(req, res) {


    if (!req.session.totalTurns) {


    req.session.totalTurns = 0;


    }


    var turn = req.query["turn"];


    if (!isNaN(turn)) {


    board.makeTurn(turn);


    req.session.totalTurns++;


    }


    res.render(''test'', {


    BoardModel: boardApi.BoardModel,


    board: board,


    totalTurns: req.session.totalTurns,


    layout: false


    });


    });


    The typical use of sessions is to distinguish between users: to support


    authentication and authorization when needed. The most popular use case is to


    check if the session has the userID property, and if it does, it means that the


    user is logged in and can see the restricted area of your web site. If there’s
    no


    such property, it means that the user is anonymous and he should proceed to


    the sign-in form. When the user enters a correct login and password, his session


    is updated and the userID is set.


    We use session to associate the user with the progress. Obviously, a real


    multiplayer solution must support multiple simultaneous games, and not just one


    as we did. So we’ll use sessions to keep track of which game instance out of the


    many running on the server is the correct one for him. We add this feature to
    our


    game in Chapter 12.


    The last important notice about the sessions: by default, session data is stored


    in memory, so sessions will not survive a server restart. If you want to have
    a


    more reliable solution, you should consult the Express documentation at


    [http://expressjs.com/guide.html#session-support.](http://expressjs.com/guide.html#session-support)


    The source code for the project on its current state is available in the


    05.sessions folder.


