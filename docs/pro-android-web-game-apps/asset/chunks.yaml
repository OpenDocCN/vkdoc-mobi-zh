- fmt: "**TIP:** You often have to combine “flips” with `translate` calls, since after\
    \ the flip, the part of the scene can appear out of the visible canvas area, like\
    \ on the right image on Figure 2-29.\n\nThe scaling transformation is often used\
    \ to show the ‘liveness’ of the game objects: the “extra life” icon that shows\
    \ the beating heart, the deformations of the ball that hits the floor, or the\
    \ cartoon-style bomb that is anxious to explode. All these effects can be achieved\
    \ with just a few `scale` calls.\n\n![](index-85_1.jpg)\n\n## Rotate\n\nRotate\
    \ transformation, as the name implies, rotates the scene around the origin `(0,\
    \ 0)`. The angle is passed in radians, as in the rest of the API.\n\n```\n// rotate\
    \ around point (0, 0)\nctx.rotate(Math.PI/4);\n```\n\nYou will often need to rotate\
    \ the object around an arbitrary point, not just `(0, 0)`; for example, the turret\
    \ of a tank should turn around its axis, not the origin of the coordinates. In\
    \ this case, you need to use the simple trick shown in the following code:\n\n\
    ```\n// Rotate around arbitrary point (150, 150)\nctx.translate(150, 150);\nctx.rotate(Math.PI/4);\n\
    ctx.translate(-150, -150);\n```\n\nThe result looks like the right image in Figure\
    \ 2-30, compared with rotating around the origin.\n\n**Figure 2-30.** *Rotating.\
    \ The left image shows the effect of rotating around the origin; the image on\
    \ the right shows the effect of rotation around point (150, 150)*\n\nAs you can\
    \ see, we had to use three transformations in order to rotate the scene around\
    \ `(150, 150)`: `translate`, `rotate`, and then `translate` back. This approach\
    \ is possible because the modifications of the context stack one on top of another.\
    \ Let’s look how multiple applied transformations affect the scene.\n\n![](index-86_1.jpg)\n\
    \n## Stacking Transformations\n\nYou are not limited to a single transformation\
    \ per context. In fact, you can apply as many transformations as you want; each\
    \ one will change the rendering rules. The order of transformations is very important;\
    \ for example, if we have two transformations (say, rotate by π/2 and scale by\
    \ 2 on X axis), the result depends on the order of calling corresponding functions.\n\
    \nLook at Figure 2-31. It shows the same scene with two transformations applied\
    \ in different orders.\n\n**Figure 2-31.** *The order of transformations affects\
    \ the result. On the left, scale is applied before rotate; on the right, scale\
    \ is applied after the rotate.*\n\nContext applies its transformations to the\
    \ shape in the reverse order. If you called `rotate` then `scale`, the shape will\
    \ look like it was first scaled and then rotated.\n\nInternally, transformations\
    \ are stored as the matrix: a two-dimensional 3 × 3 array of numbers. When you\
    \ apply the transformation, you implicitly change this array. A side effect is\
    \ that you can apply as many transformations as you want without affecting the\
    \ performance. Context with 100 applied transformations will not work any slower\
    \ than the context with two transformations.\n\nIf you really know what you are\
    \ doing, you can pass the transformation matrix to the context manually. There\
    \ are two methods for this: `transform()`, which applies the transformation on\
    \ top of the existing, and `setTransform()`, which completely resets the matrix.\n\
    \n**TIP:** Don’t worry if you don’t understand what the matrix is or how it changes\
    \ the coordinates of the shapes on the scene. In Chapter 8, we will have an in-depth\
    \ look into this topic.\n\n## Context State\n\nContext state is the collection\
    \ of different settings that affect the rendering: transformations, fills, strokes,\
    \ and so forth. Sometimes it is useful to save the state in order to restore it\
    \ later. Let’s look at a simple scenario: a tank game where each of the tanks\
    \ can change their orientation and can also rotate their cannons.\n\nThe code\
    \ to draw the tank is shown in Listing 2-15.\n\n**Listing 2-15.** *Transforming\
    \ a Context State*\n\n```\nfunction drawTank(ctx, x, y, tankRotation, cannonRotation)\
    \ {\n    ctx.translate(x, y);\n```"
