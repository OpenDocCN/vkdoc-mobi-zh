  trans: "\n此问题可通过在选中最近节点前检查其是否可见来解决。虽然编码通常不难，但该算法在运行时执行代价可能相当高昂。\n\n手动放置节点也是一项相当繁琐的任务。有几种方法能让关卡设计师的工作更轻松。\n\
    \n## 射线投射（视线检测）\n\n在许多 2D 游戏中，如果从一个节点能看到另一个节点，则两者可达。利用这一简单规则，我们可以自动生成路径点图的边：放置顶点就变得容易得多。请看图\
    \ 13-14，它展示了这一思想。节点由关卡设计师放置。然后我们在每对节点之间投射虚拟射线，检查中间是否有障碍物。如果视线清晰，则将该边添加到图中：\n\n\
    ![](img/index-534_1.jpg)\n\n![](img/index-534_2.jpg)\n\n**图 13-14.** *利用视线自动生成路径点图的边。*\n\
    \n## 导航网格\n\n现代游戏开发中最流行的技术是导航网格，通常简称为 navmesh。其背后的思想是让关卡设计师准备图形，但不是放置单个节点，而是绘制多边形来标记“可移动”区域（见图\
    \ 13-15）。\n\n**图 13-15.** *导航网格及其构建的导航图示例*\n\n使用这种方法有很多优点。角色不再需要选择最近的路径点，因此不会试图穿过墙壁到达那里。关卡设计师习惯于移动多边形，也会很快适应导航网格。导航网格的最后一个重要特性是，角色应该能够从其所在多边形的任意点移动到任意相邻多边形的任意点。换句话说，角色不需要遵循可能看起来像轨道的路径。借助导航网格，角色可以实现更智能、更自然的移动算法。\n\
    \n一旦构建了寻路图并实现了寻路算法，就可以让角色在关卡中实际移动。使用第 4 章中描述的技术来构建角色从一个路径点移动到另一个路径点的动画。\n\n##\
    \ 决策制定\n\n现在智能体可以在关卡中移动了，但其行为仍然不够智能。角色下一步应该做什么？奔跑、追击敌人、寻找食物，还是休息一下？这是决策型 AI 通常要回答的问题。在日常生活中，每个人都需要某种信息来做决定。例如，如果我有点饿，而桌上正好有三明治，我就会吃掉它。如果我非常饿，桌上没有三明治，但厨房里有一个，我就会去拿来吃。为了做决定，我需要观察自己的内部状态（我饿不饿？）和周围的世界（三明治在哪里？）。\n\
    \n在最简单的情况下，决策型 AI 的工作方式几乎相同。然而，内部和外部条件以更形式化的方式呈现：\n\n```\nmakeDecision() {\n \
    \ if (!isHungry()) {\n    workMore();\n  } else if (isLittleHungry()) {\n    if\
    \ (isSandwichOnTheDesk()) {\n      eat();\n    } else {\n      workMore();\n \
    \   }\n  } else if (isVeryHungry()) {\n    if (isSandwichOnTheDesk() || isSandwichInTheKitchen())\
    \ {\n      eat();\n    } else {\n      workMore();\n    }\n  }\n}\n```\n\n这种表示方式称为决策树，因为它很容易以树的形式表示和配置（见图\
    \ 13-16）。\n\n![](img/index-536_1.jpg)\n\n![](img/index-536_2.jpg)\n\n**图 13-16.**\
    \ *决策树示例*\n\n当每个节点都是一个独立的 JavaScript 对象，可以检查条件并返回一个决策或另一个节点时，由此产生的系统可以配置成实现相当有趣的\
    \ AI 行为。\n\n决策树有许多不同类型。例如，树分支不一定只有“是/否”。它可以有多个分支，或概率条件，如图 13-17 所示。\n"
- fmt: "### **Figure 13-17.** Multiple branches and probabilistic conditions on a\
    \ decision tree\n\nThe code in **Listings 13-6** to **13-8** shows the JavaScript\
    \ implementation of such a decision-making agent. It has just two ‘needs’ — to\
    \ eat and to sleep. It sleeps whenever it wants to, but the chance of it eating\
    \ is only 30 percent. The listings are rather self-explanatory. The code is based\
    \ on two types of decision nodes.\n\nThe `NumericDecision` checks the parameter\
    \ of the object; it then delegates to the `leNode` if it is ‘lesser or equals’\
    \ than the threshold, or to the `gNode` if it is greater than the threshold. The\
    \ numeric decision is used to trigger the hunger behavior. If the hunger level\
    \ is above 50, the agent will think about finding food (with 30 percent chance).\
    \ The second type of node that we need is `ProbabilisticNode` — it chooses the\
    \ action depending on the value of the random number.\n\n### **Listing 13-6.**\
    \ The Decision Tree Nodes\n\n```javascript\n/**\n * Numeric decision is based\
    \ on the value of the certain agent parameter.\n * If value is lesser or equal\
    \ than the threshold, the leNode is executed\n * otherwise - gNode.\n */\nfunction\
    \ NumericDecision(name, threshold, leNode, gNode) {\n    this._name = name;\n\
    \    this._threshold = threshold;\n    this._leNode = leNode;\n    this._gNode\
    \ = gNode;\n}\n\nNumericDecision.prototype.execute = function(agent) {\n    var\
    \ node = agent[this._name] > this._threshold ? this._gNode : this._leNode;\n \
    \   node.execute(agent);\n};\n\n/**\n * Probabilistic decision is executed depending\
    \ on the chance value\n * 0 - never\n * 1 - always\n * between 0-1 with the\n\
    \ */\nfunction ProbabilisticDecision(chance, trueNode, falseNode) {\n    this._chance\
    \ = chance;\n    this._trueNode = trueNode;\n    this._falseNode = falseNode;\n\
    }\n\nProbabilisticDecision.prototype.execute = function(agent) {\n    var node\
    \ = Math.random() < this._chance ? this._trueNode : this._falseNode;\n    node.execute(agent);\n\
    };\n```\n\nNow that we have the nodes, we can add some actions too. The `EatAction`\
    \ makes the agent go to a predefined point where the food source is located, and\
    \ start eating. The `SleepAction` makes the agent sleep wherever he is, and finally,\
    \ the `WanderAroundAction` makes the agent select a random point on the map and\
    \ navigate there.\n\n### **Listing 13-7.** Actions: The Leafs of Decision Tree\n\
    \n```javascript\n/**\n * Eat - reduce hunger\n */\nfunction EatAction() { }\n\n\
    EatAction.prototype.execute = function(agent) {\n    console.log(\"Decided to\
    \ eat\");\n    navigateTo(220, 70);\n    eat();\n};\n\n/**\n * Sleep - increase\
    \ energy\n */\nfunction SleepAction() {}\n\nSleepAction.prototype.execute = function(agent)\
    \ {\n    console.log(\"Decided to sleep\");\n    sleep();\n};\n\n/**\n * Do nothing\n\
    \ */\nfunction WanderAroundAction() {}\n\nWanderAroundAction.prototype.execute\
    \ = function(agent) {\n    console.log(\"Wandering around...\")\n    goToRandomPoint();\n\
    };\n```\n\nFinally, we need to create the tree and let it make the decision. **Listing\
    \ 13-8** shows how to do it.\n\n### **Listing 13-8.** Initializing the Decision\
    \ Tree\n\n```javascript\n/**\n * Initialize the tree\n */\nfunction buildDecisionTree()\
    \ {\n    var wander = new WanderAroundAction();\n    var sleep = new SleepAction();\n\
    \    var eat = new EatAction();\n    return new NumericDecision(\"hunger\", 50,\n\
    \        new NumericDecision(\"energy\", 30,\n            sleep,\n           \
    \ wander),\n        new ProbabilisticDecision(0.3,\n            eat,\n       \
    \     new NumericDecision(\"energy\", 30,\n                sleep,\n          \
    \      wander)));\n}\n```\n\nOnce the decision tree is initialized, you can call\
    \ `tree.execute()` whenever an agent needs to make a decision. It is worth mentioning\
    \ that decision making should not happen on every frame of the game. The decision-making\
    \ logic happens only when the character needs to reconsider what he is doing.\
    \ In the simple example that comes along with the source code for this chapter,\
    \ the character makes the decision when he finishes the action sequence and needs\
