    `};`\n\n前两行代码用于检查动画是否正在运行。若动画器处于暂停状态，我们仅需通过将 `deltaTime` 设置为零来重新计算上次结果。对于暂停的动画器而言，时间已经停滞。这种做法看似浪费资源（因为可以将上次的值缓存后直接返回），但实际中你很少需要暂停单个动画器。如果整个游戏被暂停，通常你不会进行任何更新。因此，在常规情况下牺牲少量\
    \ CPU 循环以节省几次操作是可行的。\n\n接下来， `Animator` 会检查自循环开始以来经过的时间量。若该数值超过循环持续时间，`Animator`\
