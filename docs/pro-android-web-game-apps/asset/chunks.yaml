    \ = function(e) {\n    this.nextFrame();\n};\n```\n\n添加这段代码并尝试运行应用程序。你很快就会发现，这段代码执行了过多的操作。点击按钮不仅会改变按钮状态，还会进入下一层并修改地形或改变对象。对象删除也看起来有问题：一旦对象被删除，事件会传递到\
    \ `IsometricTileLayer`，在那里对象又会被重新创建！\n\n**停止事件传播**\n\n在某些情况下，我们不希望事件继续在层之间传递。上一节中有几个这样的例子。一旦按钮被点击，你不希望任何底层接收相同的事件。事件应该在\
