- fmt: '# Graphics in the Browser: The Canvas Element


    A gamer can excuse flaws in graphics, but he will never tolerate poorly designed
    controls. Imagine how unhappy the user who accidentally tapped `All In` instead
    of `Fold` in the middle of a poker round would be.


    The last component, but certainly not the least, is the game logic: the rules
    and laws of the game world. It is responsible for a wide range of tasks: artificial
    intelligence, physics engines, generation of random game content, and many, many
    others. The code that handles logic may be distributed between the client and
    the server, or completely client-side. For simple games, like the one that we
    are going to make in the next chapter, there will be no server at all; everything
    that the game needs will be on a web page. We will add some server-side logic
    to the game in Chapter 12 when we create the multiplayer version of `Four Balls`.


    You might have noticed that I didn’t mention networking. Even though network communication
    plays an extremely important role in game development, I believe that it is not
    a part of the game itself. It is the function, the tool that helps to bring bytes
    of data from your shiny Android device to the gray box, far away in the datacenter,
    and back. The magic is happening elsewhere. Nevertheless, it is an extremely important
    and typically complex component that we learn in-depth in Chapters 10 through
    12.


    We start our exploration of web game development with the most basic and essential
    feature of the games, the graphics. The following sections cover the simple, yet
    very powerful canvas API: the HTML5 DOM (Document Object Model) element that introduced
    the biggest change in web gaming since Ajax.


    ## Drawing Inside the Browser


    The task of drawing inside the browser is not entirely new or unique to game development.
    Once browsers started to show their full power, the capability of displaying arbitrary
    dynamic graphics became essential for a broad range of rich web applications.
    There are three ways to display graphics in the browser:


    - arrange `div`s with CSS image backgrounds

    - use Scalable Vector Graphics (SVG)

    - use the `canvas` element


    The first approach, sometimes referred to as "floating divs," is considered outdated.
    It was used to make games in the browsers that did not support `canvas`. The idea
    behind it is to create a `div` element for every object on the scene. The `div`
    is then styled with the `background-image` CSS property; that’s how it renders
    the image. This approach has an obvious drawback: it doesn’t allow you to draw
    arbitrary graphics; only static images. If a developer wants to draw a line between
    two points, it is not possible unless there is an image with that line somewhere
    on the server. This method is just a workaround that web game developers had to
    use before `canvas` appeared.


    The second approach is to use SVG, an XML-based vector graphics standard. SVG
    has somewhat limited use for Android game development; this standard is not supported
    by stock Android 2.x browsers. Even if a browser did support it, SVG is somewhat
    hard to use due to its XML nature. Any action, even drawing a simple line or filling
    a rectangle, involves the manipulation of XML nodes, which is not as intuitive
    as using the canvas API.


    The best option for game development is to use the `canvas` element, which is
    well-supported by modern devices and also has an intuitive drawing API. The rest
    of this chapter focuses on it.


    ## The Basic HTML Setup


    Before turning to `canvas`, we first need an HTML page. For this book, we will
    use the simple setup shown in Listing 2-1.


    **Listing 2-1.** *The HTML Skeleton*


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <style>

    </style>

    <script>

    function init() {

    }

    </script>

    </head>

    <body onload="init()">

    </body>

    </html>

    ```


    As you see, this is a standard HTML5 boilerplate. Android perfectly understands
    this style. There’s no need to follow outdated HTML4 guidelines—long'
