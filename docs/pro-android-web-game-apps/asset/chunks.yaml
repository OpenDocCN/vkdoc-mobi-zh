    Dirty rectangles is the next major rendering-optimization that we will implement


    in our engine. The idea behind this technique is to ‘ render only the areas of
    the


    screen that have changed.’


    Let’s assume that we have a world that doesn’t move by itself and the user is


    not moving the viewport at the moment. There might be few moving objects, but


    most of the screen remains static. In other words, the screen changes very little


    between repaints; most of the content remains the same as a frame ago, with'
