    }


    Intuitively, it is clear how this program works.


     The shader somehow receives three parameters from the


    outer world: aPos, uMVMatrix, and uPMatrix.


     The type of matrix is a 4 × 4 matrix and the type of aPos is a


    three-element vector.


     We create a four-element vector out of a three-element vector


    by adding 1.0.


     Shader multiplies two matrices, and then multiplies the result


    by the vector. It looks much like the projection of a point to the


    screen. From a mathematical point of view, this is exactly the


    same code as in Chapter 8.


     The result is then assigned to the gl_Position.


    If you previously worked in C, this code should look more familiar to you. Of


    course, you can’t write your own shaders based solely on intuition. In this


    chapter, however, we will describe only the basic concepts of the language. If


    you are interested in more in-depth details, refer to the GLSL specification or


    more advanced shader examples.


    **NOTE:** The complete specification of the GLSL language used in WebGL is available
