  trans: "\n# 为何本章选择 Socket.IO 而非 Faye\n\n我选择在教程中使用 `Socket.IO` 而非 `Faye`，理由与技术或质量无关。首先，`Faye`\
    \ 实现了一种名为 `Bayeux` 的高级通信协议（http://svn.cometd.org/trunk/bayeux/bayeux.html），为保持内容简洁，我不打算花费额外篇幅来详述该协议。第二个原因则纯粹出于社交层面：`Socket.IO`\
    \ 拥有更庞大的开源社区，且规模持续增长。在我撰写本章期间，其邮件列表又新增了约 50 名成员。不过，我仍鼓励你亲自去了解 `Faye`，从而对这个精巧项目形成自己的判断。\n\
    \n`Socket.IO` 基于套接字（Socket）理念构建。`Socket.IO` 中的套接字与真正的 TCP 套接字或 Unix 套接字并无关联，它仅仅是针对不同客户端所使用的传输层协议之上的抽象层。请参考图\
    \ 12-4 了解其工作原理：服务器可同时维持与多个客户端的连接，每个客户端会选用最适合的传输方式。无论是客户端还是服务器，都不需要执行任何传输层相关的具体操作（例如创建\
    \ XHR 对象或发送请求）。统一的通信接口就是 `Socket`——其余细节均由库自行处理。我相信你已经迫不及待想看到实际案例了。\n\n**图 12-4.**\
    \ *Socket.IO 隐藏了底层传输的细节，为客户端与服务器之间的通信提供了简单可靠的 API。*\n\n## 客户端-服务器通信\n\n让我们先迈出实现大厅功能的第一步。当第一个客户端连接到服务器时，应收到“你已连接”的消息；后续客户端则应收到“新用户加入”的消息。\n\
    \n首先，你需要安装 `Socket.IO`（即使 `Socket.IO` 报告无法编译原生扩展也无需担心，项目依然能正常运行）：\n\n```\n> npm\
    \ install socket.io\n```\n\n接着，初始化 `Socket.IO` 服务器。它可独立运行，但更常见的是作为 `Express` 服务器的包装器（参见代码清单\
    \ 12-1）。专用于 `Socket.IO` 的请求会被拦截，并与主流网站流程分开独立处理。`Express` 与 `Socket.IO` 的集成相得益彰，过程简洁流畅。\n\
    \n**代码清单 12-1.** *为 Express 服务器添加 Socket.IO 支持*\n\n```\nvar express = require(\"\
    express\");\nvar http = require(\"http\");\nvar app = express();\nvar server =\
    \ http.createServer(app);\nvar io = require(\"socket.io\").listen(server, {\n\
    \  \"polling duration\": 10\n});\n…\n// 接下来是常规的 Express 设置\nserver.listen(80);\n\
    ```\n\n你可能已经猜到，新对象 `io` 包装了现有的服务器。`listen` 的第二个参数是可选的服务器配置项列表。`\"polling duration\"\
    ` 控制长轮询模式下保持打开请求的最大时长，此处已从默认值调低，因为某些移动设备会提前强制断开连接。新创建的 `io` 对象就是准备就绪的 `Socket.IO`\
    \ 服务器，可以监听连接并与客户端交换消息。事不宜迟，让我们为服务器添加用户跟踪功能吧。\n\n从现在开始，通信流程变得十分直接。每当有新客户端连接时，服务器会创建一个名为\
    \ `socket` 的新对象——这是隐藏传输细节的抽象层。你可以监听客户端可能通过 `emit()` 发出的各种套接字事件，也可以自行使用 `emit()`\
    \ 发送消息。若需要向多个客户端通知特定事件，可调用 `broadcast()`。代码清单 12-2 实现了基本的大厅功能，是展示 `Socket.IO`\
    \ 基础知识的良好示例。\n\n**代码清单 12-2.** *为服务器添加基本大厅功能*\n\n```\nvar maxUserId = 0;\nio.sockets.on(\"\
    connection\", function (socket) {\n  var userId = maxUserId++;\n  var userName\
    \ = \"User \" + userId;\n  var user = {id: userId, name: userName};\n  socket.emit(\"\
    info\", { text: \"You have connected\" });\n}\n```\n"
- fmt: "`socket.broadcast.emit(\"user-joined\", user);`\n\n`socket.on(\"disconnect\"\
    , function () {`\n\n`    socket.broadcast.emit(\"user-left\", user);`\n\n`});`\n\
    \n`});`\n\n第二行监听了为每个新建立的连接触发的`\"connection\"`事件。请注意，`Socket.IO`连接与`Express`会话无关。例如，如果您在谷歌浏览器中打开两个选项卡并访问同一个页面，它们共享同一个`Express`会话（因为它们共享存储在Cookie中的会话ID），但`Socket.IO`将它们识别为两个不同的套接字。API将`socket`对象作为参数传递给该函数。\n\
    \n接下来的两行创建了一个包含某些用户信息的新对象，以便用一种人类可读的方式识别用户。每个用户都有一个ID和一个唯一的默认名称。如果您的游戏具有身份验证和授权算法，您可能会从数据库或社交网络API获取用户名，但在这个简单的示例中，所有用户都称为`User\
    \ 1`、`User 2`，依此类推。\n\n代码中最有趣的部分是对`emit()`和`broadcast()`的两次调用。在第一行中，我们向刚刚连接的用户发送消息（或者，用`Socket.IO`的术语来说，我们触发了该事件），消息类型为`\"\
    info\"`，并附带一个包含问候文本的对象。第二行“广播”了这个事件——即向除已连接用户之外的所有其他用户发送消息。最后一部分监听了`\"disconnect\"\
    `事件，并再次广播消息，以通知其他玩家大厅内发生的变化。\n\n现在让我们构建客户端。请查看列表12-3中的客户端代码。和往常一样，这是一个简单的网页；不过，它带有一些`Socket.IO`的魔法。\n\
    \n**第12章：制作多玩家游戏**\n\n**列表12-3.** *用于Socket.IO服务器的客户端*\n\n```\n<!DOCTYPE html>\n\
    <html lang=\"en\">\n<head>\n    <meta charset=\"utf-8\" />\n    <meta name=\"\
    viewport\"\n          content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0,\n\
    \          user-scalable=no, target-densitydpi=device-dpi\"/>\n    <style>\n \
    \       html, body {\n            overflow: hidden;\n            width: 100%;\n\
    \            height: 100%;\n            margin:0;\n            padding:0;\n  \
    \          border: 0;\n        }\n    </style>\n    <script src=\"js/utils.js\"\
    ></script>\n    <script src=\"/socket.io/socket.io.js\"></script>\n    <script>\n\
    \        var socket;\n        function init() {\n            socket = io.connect();\n\
    \            socket.on(\"user-joined\", function (user) {\n                console.log\
    \ (user.name + \" joined\");\n            });\n            socket.on(\"user-left\"\
    , function (user) {\n                console.log (user.name + \" left\");\n  \
    \          });\n            socket.on(\"info\", function (info) {\n          \
    \      console.log (info.text);\n            });\n        }\n    </script>\n</head>\n\
    <body onload=\"init()\">\n</body>\n</html>\n```\n\n列表12-3中的代码使用了与服务器完全相同的方法。它获取`socket`对象，并将其用作与服务器通信的唯一入口点。然后使用该`socket`来监听消息，或触发新的事件（稍后会详细介绍）。请注意，服务器上并没有名为`\"\
    /socket.io/socket.io.js\"`的文件。`Socket.IO`服务器会处理对此脚本的请求，并返回该文件本身，因此您无需为此担心。这段代码看起来异常简单和清晰！\n\
    \n**注意：**几年前，我必须实现一个自定义的浏览器网络库，该库仅依赖于两种传输实现：`XHR`长轮询和`XHR`流式传输。我花了大约三周的时间来构建服务器和可靠的客户端，而它们完成的功能与我们刚才在三分钟内构建的完全相同。\n\
    \n现在您可以尝试运行此代码。到目前为止，它没有任何用户界面元素，但预期的控制台输出可以证明您所做的一切都是正确的，并且您已经让一个非常基本的`Hello\
    \ World`应用程序运行起来了。\n\n当前状态下的应用程序代码以及本章的其他资料位于名为`01.basic_io`的文件夹中。\n\n**添加游戏大厅屏幕**\n\
    \n我们已经建立了基本的通信，现在我们应该制作一个游戏大厅屏幕。将消息写入控制台并不是通知用户游戏事件的好方法。"
