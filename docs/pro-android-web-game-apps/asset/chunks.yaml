    \ 正确，但它却在对象上创建了一个意想不到的字段。这个被“额外加持”的 `Date` 对象随后可能会被传递到应用程序的不同层级，另一位程序员可能会认为这个额外字段是可以依赖的标准功能。他会编写使用这个新字段的代码，如下所示：\n\
    \n```javascript\n// 太酷了，我喜欢这个额外字段，它可能是个新标准\nconsole.log(\"日期是 \" + date.niceFormat.substr(4))\n\
    ```\n\n到了某个时候，原作者决定改变这个自定义字段的格式、将其删除或重命名。他认为这个新字段是他自己的属性——它不是标准属性，可能甚至没有在文档中提及，而且是由他引入的：这意味着他可以随意处理这个自定义字段。\n\
    \n如果他决定删除这个字段，项目就会出问题。使用了 `niceFormat` 的代码将无法再运行。两位程序员都会在调试和恢复原始流程上浪费大量时间。总结：如果你真的、真的需要自定义字段，请确保它们不会泄露出去。\n\
    \n即使你是一个在自己的车库里独立工作的“独行侠”，你仍然需要考虑团队协作的问题。\n"
- fmt: '`members`: yourself in a month or two. Trust me, you’ll forget most of your
    undocumented conventions after a while, even if they look perfectly logical right
    now.


    **NOTE:** Recent versions of JavaScript introduce the way to formally protect
    the state of the object with `Object.freeze`, `Object.seal`, and `Object.preventExtensions`.
    If you need stronger guarantees of object immutability, you can use one of these
    methods.


    The opposite case is also important. You should not delete any properties from
    the object unless you know what you are doing. The structure of the object must
    remain predictable at all times.


    There is an exception to this rule. If the dynamically added methods and properties
    are part of the framework design, it is perfectly fine to use them. For example,
    the `Crafty.js` framework that we will try in Chapter 14 implements the Entity
    Component System, an approach that works best by customizing particular objects
    at runtime.


    ## Use It As If It Is (Almost) Static-Typed


    No need to explain this rule. It is always good to know that if the variable is
    boolean at the start of the script, it will stay boolean until the end.


    ## Whenever Possible, Use Asynchronous Calls


    JavaScript is single-threaded, meaning the application is “frozen” when it executes
    the code. Avoid using blocking long-running operations inside this single thread
    because they can grind your application to a halt. The UI becomes unresponsive,
    which leads to a terrible user experience.


    This is especially important for the XHR requests; synchronous calls might look
    really fast when you work with a local server, but almost certainly become a problem
    in the wild. You should never use the synchronous XHR.


    Using an asynchronous API is even more important on the server. Writing a dozen
    bytes to a file on the hard drive might sound like an operation that can’t slow
    anything down; it’s just too fast. It might be true if you’re testing the server
    alone. When you have 30,000 visitors, each requiring your server to write a dozen
    bytes, this code fragment will become a bottleneck if not written properly.


    ## The Environment


    Development and production environments differ in many ways. When you have everything
    on your local PC, your project lives in a small and unrealistic paradise. In the
    real world, network packets take much more time to deliver: sometimes they are
    lost, connections are broken, and resources are not available all the time.


    ## Notify the User About Long Operations


    So you do everything right: your code is asynchronous and the UI is never unresponsive.
    But let’s say you need to load a large set of sprites for the next level, load
    level data, generate random terrain, or calculate the optimal strategy for artificial
    intelligence. Or maybe you have to do it all together. In such cases, users sometimes
    have to wait a considerable amount of time before something interesting happens.


    Don’t leave your user sitting in front of an empty screen and wondering, “How
    long will it actually take—a minute, five minutes, more?!”


    Use some sort of progress bar or “liveness” indicator whenever you suspect that
    an operation will take more than a second.


    **NOTE:** The following is a very good metric of *a long operation* described
    by Jakob Nielsen, an expert in web usability, at [www.useit.com/papers/responsetime.html](http://www.useit.com/papers/responsetime.html):


    - **0.1 second** is about the limit for having the user feel that the system is
    reacting instantaneously, meaning that no special feedback is necessary except
    to display the result.

    - **1.0 second** is about the limit for the user’s flow of thought to stay uninterrupted,
    even though the user will notice the delay. Normally, no special feedback is necessary
    during delays of more than 0.1 but less than 1.0 second, yet the user loses the
    feeling of operating directly on the data.

    - **10 seconds** is about the limit for keeping the user’s attention focused on
    the dialog.'
