  raw: 'client-side HTML. We’ve already started to make it; we have the working lobby


    and components from the single-player version.


    **NOTE:** The current implementation doesn’t cover situations such as one of the


    players being disconnected from the game or not making a move for a long time.
    We


    leave it as an exercise for the reader. It is quite easy to implement with a


    "disconnect" listener and a setTimeout() to track the stalled player.


    CHAPTER 12: Making Multiplayer Games


    Client-Side


    The client needs some adjustments too. Right now, the client code can only


    handle the lobby, not the game itself. Copy the scripts from Chapter 3: the


    Game.js and BoardRenderer.js to the public/js folder of your project.


    BoardRenderer.js doesn’t need to change at all, but the Game.js becomes


    slightly different.


    Let’s quickly review the single-player architecture of Four Balls.


     The BoardModel class is responsible for keeping the game


    state and validating the turns. In a multiplayer version, it is


    slightly changed to use it in both the browser environment and


    Node.js (see Listing 12-8).


     The BoardRenderer class is responsible for rendering the


    board on canvas. It will not change at all, because it is a pure


    client-side class. You may leave it as it is.


     The Game class is responsible for running the game and in


    particular for reacting on clicks. This class has the most


    changes in the multiplayer version because the game flow is


    now completely different. Instead of putting the token on


    board right after the click, we now have to wait for the server-


    side approval of the turn.


    The most important change is in the Game class, the way the client reacts to the


    player tapping the screen. In the single-player version of the game, the client


    could decide if the turn is valid by itself, without asking the server. In the


    multiplayer game, the server is the mastermind, responsible for the flow of the


    game. Therefore, instead of placing the new token straight on the board, the


    Game class should now send the turn message to the server, and show the token


    only when the server confirms that the turn was valid.


    The new implementation is quite different from the original one, so rename your


    file and constructor to OnlineGame.js. Look at the code in Listing 12-13, which


    illustrates the changes (set in bold) to this class. If the code doesn’t look
    familiar to you, feel free to refer to ‘ Wiring Components Together: The Game
    Class’’ in


    Chapter 3 to see the original version of the Game class.


