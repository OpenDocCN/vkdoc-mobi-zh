  trans: "\n# 处理后的文本\n\n改动后的代码以**粗体**标出。仅需修改几行代码，我们就从帧动画切换到了位置动画！如果要添加加速和减速效果该怎么办？这一改动不应影响屏幕的重新渲染方式，唯一变化的是计算新进度比的算法。实际代码隐藏在动画器内部，因此客户端代码只需增加两行，如清单\
    \ 4-29 所示。\n\n**清单 4-29.** *设置加速与减速*\n\n```javascript\nvar animator = new Animator(500);\n\
    animator.setAcceleration(0.5);\nanimator.setDeceleration(0.3);\n```\n\n其余代码保持不变！\n\
    \n**注意：** 整体解决方案的灵感来源于 Timing Framework (http://java.net/projects/timingframework)，该框架旨在简化\
    \ Java 桌面程序中用户界面元素的动画处理。您可以查阅该框架获取灵感。\n\n除了加速和减速功能，`Animator` 还应支持设置循环次数、切换动画方向，以及提供动画事件通知功能，并具备暂停、停止、重置等简单控制。由于这部分代码与游戏开发特有算法无关，逐步编写该类意义不大。我们只需通览代码了解其工作原理即可。\n\
    \n完整代码可与本章其他源代码一同在 `js/Animator.js` 文件中找到。本章仅回顾其中最有趣的部分。起初我本想将全部代码放在此处，但当我最终完成了一组精巧的小功能、防错检查以及边缘情况处理方案后，发现仅打印清单就需要六页篇幅。因此，您最好直接获取源代码并亲身体验。您已经看到了\
    \ `Animator` 的几种基本用法。此外，本章源代码中还包含几个完整的示例。\n\n`Animator` 拥有多个属性，每个属性都配有 getter\
    \ 和 setter。在 Android 设备上调试运行不佳的代码可能会非常痛苦（请阅读附录 A 了解应对方法），常常需要在 `console.log` 输出上耗费数小时。因此，编写能检查参数限制的防错代码非常有意义。`Animator`\
    \ 在将每个参数赋值给字段前都会进行检查（参见清单 4-30）。\n\n**清单 4-30.** *设置 `Animator` 参数的示例——检查参数范围*\n\
    \n```javascript\n_p.setDuration = function(duration) {\n    // 如果动画正在运行，不允许更改参数\n\
    \    this._throwIfStarted();\n    if (duration < 1) {\n        throw \"Duration\
    \ can't be < 1\";\n    }\n    this._duration = duration;\n};\n```\n\n虽然不太可能有人试图以显式设置的\
    \ 0 时长启动 `Animator`，但如果时长值是通过某种方式生成或通过网络接收的，从技术上讲仍有可能出现这种状况。那么接下来会发生什么？代码处理此问题的最佳方式可能是抛出异常并通知程序员。允许不可接受的参数传递可能不会造成直接危害，但往往会导致难以追踪的不可预测错误。这种方法称为*快速失败*。\n\
    \n请注意函数的第一行。我们不希望 `Animator` 在运行时被重新配置，因为这同样可能引发错误。如果用户试图在动画运行时设置属性，他将会收到一个异常。\n\
    \n采用相同的方法，我们为其他属性也定义了 setter 和 getter。\n\n- `duration`：单次动画循环的时长。\n- `repeatCount`：循环次数；可以是整数，或设置为\
    \ `-1` 表示无限循环。\n- `repeatBehavior`：可设置为 `Animator.RepeatBehavior.LOOP`（默认）或 `Animator.RepeatBehavior.REVERSE`。默认行为表示动画到达终点后，`Animator`\
    \ 从 0 重新开始下一次循环并逐步运动到 1。\n"
