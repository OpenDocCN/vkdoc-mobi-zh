    the vertex to the screen (remember, in Chapter 8 we did it manually by


    multiplying matrices). In other words, its main task is to return the coordinates


    for every vertex it receives. Besides this simple task, it can do all kinds of
    other useful calculations-----for example, determine the resulting light color
