  trans: "\n# 第 11 章：与服务器通信\n\n**图 11-2.** *通过 XHR 长轮询，服务器会保持连接打开，直到有数据需要发送给客户端。*\n\
    \n如您所见，XHR 长轮询使用较少的请求来维持与服务器的连接。最大延迟开销是网页重新连接服务器所需的时间。\n\n然而，长轮询也有其缺点：长时间运行的 XHR\
    \ 请求可能会被中间代理服务器甚至浏览器本身终止。例如，运行在三星 Galaxy 上的 Android 2.2 如果空闲约 20 秒，就会终止 XHR 连接。更糟糕的是，中断\"\
    挂起\"连接的规则可能因浏览器和代理而异。安全超时时间约为 15 秒。如果超过此时间且服务器没有响应内容，它应发送空响应并关闭连接。\n\n第二个缺点是，在消息密集型环境中，长轮询会失去优势并退化为常规轮询。这是该技术不适用于竞速类、在线\
    \ RPG 或策略游戏等快节奏实时游戏的原因之一。客户端会花费大量时间重新连接服务器（见图 11-3）。\n\n**图 11-3.** *消息密集型环境中的长轮询问题。长轮询退化为简单轮询：每秒发送一次请求。*\n\
    \n长轮询的示例代码如清单 11-8（客户端）和 11-9（服务器）所示。\n\n**清单 11-8.** *XHR 长轮询客户端示例*\n\n```javascript\n\
    function init() {\n  pollServer();\n}\n\nfunction pollServer() {\n  var xhr =\
    \ new XMLHttpRequest();\n  console.log(\"Requesting\");\n  xhr.open('GET', 'lobby');\n\
    \  xhr.onload = function(e) {\n    console.log(\"RESPONSE:\" + xhr.responseText);\n\
    \    setTimeout(pollServer, 4); // 收到响应后再次轮询服务器\n  };\n  xhr.onerror = function(e)\
    \ {\n    console.log(\"Error, retrying\");\n    setTimeout(pollServer, 4); //\
    \ 发生错误时再次轮询服务器\n  };\n  xhr.send();\n}\n```\n\n**清单 11-9.** *最简单的长轮询服务器*\n\n```javascript\n\
    var clients = [];\n\n// 以随机间隔发送通知\n(function() {\n  notifyClients();\n  setTimeout(arguments.callee,\
    \ Math.floor((Math.random()*10000)));\n})();\n\n/**\n * 向每个已连接客户端发送新事件数据\n */\n\
    function notifyClients() {\n  clients.forEach(function(res) {\n    res.send(\"\
    new event data\");\n  });\n  clients = []; // 客户端将重新连接，清空数组\n}\n\napp.get(\"/lobby\"\
    , function(req, res) {\n  clients.push(res);\n  console.log(\"Added client, now\
    \ \" + clients.length + \" connected\");\n});\n```\n\n当然，这种实现不应用于生产环境；它仅说明长轮询传输背后的基本技术。如您所见，服务器不会立即返回响应。相反，响应对象会保存在`clients`数组中供后续使用。一旦有可用数据，服务器会将其广播给客户端并清空数组。此时客户端断开连接，并在几毫秒后重新连接。\n\
