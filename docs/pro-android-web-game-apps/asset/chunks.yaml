    /2.0/GLSL_ES_Specification_1.0.17.pdf.


    GLSL is a programming language, just like JavaScript, PHP, or C, but unlike


    most languages that you’ve seen, it is not intended for general-purpose tasks


    like writing a web server or database. GLSL is intended solely for manipulations


    with 3D graphics. We need its basics to write WebGL programs, so let’s start


    with the smallest building block of every language: variables and data types.


    CHAPTER 9: Using WebGL


    **Data Types**


    Unlike JavaScript, GLSL is a strongly-typed static language. This means that


    every variable has its own type, which doesn’t change during the execution of


    the program. The following line, for example:


    int x = 1;


    declares that the integer variable x has an initial value of 1\. It is impossible
    to


    assign a floating-point value to x in the next line or in any other place of the


    program. Once declared, the type of variable cannot change. The concept of


    strict types should be familiar to those of you who worked with languages like
    C


    or Java. Table 9-1 shows the most common GLSL types.


    **Table 9-1\.** **Types in GLSL**


    *****Type**


    **Example Values**


    **Description**


