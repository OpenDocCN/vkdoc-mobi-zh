    e.targetTouches[i].pageY - canvas.offsetTop, ctx);


    }


    e.stopPropagation();


    e.preventDefault();


    }, false);


    } else {


    canvas.addEventListener("mousedown", function(e) {


    drawBullet(e.pageX - canvas.offsetLeft, e.pageY - canvas.offsetTop, ctx);


    e.stopPropagation();


    e.preventDefault();


    }, false);


    }


    The new code takes into account the position of canvas on the page:


    offsetLeft and offsetTop are the parameters that hold the position of the


    element relative to the page. Now the demo will run fine ... on the stock browser.


    On mobile Firefox, it doesn’t work. Why? Because Firefox doesn’t have pageX


    and pageY properties. It has a completely useless pair of clientX and clientY


    coordinates that hold the position of an event relative to the current browser


    viewport. If a page is scrolled, the demo is broken once again. That’s where


    browser-specific hacks come into play. The final version of our demo looks like


    Listing 5-7\. To demonstrate that scrolling doesn’t break the coordinates, I had
    to


    switch back from the game page skeleton used in Chapter 3 (see Listing 3-3) to


    the plain HTML5 skeleton that doesn’t restrict scrolls and doesn’t force the


    fullscreen canvas (like in Listing 3-1).


    CHAPTER 5: Event Handling and User Input


    **185


    **Listing 5-7.** *The Final Version of the Input Demo*


    <!DOCTYPE html>


    <html lang="en">


    <head>


    <meta charset="utf-8" />


    <script src="js/utils.js"></script>


    <script>


    function init() {


    var canvas = document.getElementById("mainCanvas");


    var ctx = canvas.getContext("2d");


    // Fill canvas, to see where it is


    ctx.fillStyle = "lightgray";


    ctx.fillRect(0, 0, canvas.width, canvas.height);


    if (isTouchDevice()) {


    canvas.addEventListener("touchstart", function(e) {


    for (var i = 0; i < e.targetTouches.length; i++) {


    var coords = getInputCoordinates(e.targetTouches[i],


    canvas);


    drawBullet(coords.x, coords.y, ctx);


    }


    e.stopPropagation();


    e.preventDefault();


    }, false);


    } else {


    canvas.addEventListener("mousedown", function(e) {


    var coords = getInputCoordinates(e, canvas);


    drawBullet(coords.x, coords.y, ctx);


    e.stopPropagation();


    e.preventDefault();


    }, false);


    }


    }


    function getInputCoordinates(e, element) {


    return {


    x: (e.pageX || e.clientX + document.body.scrollLeft) -


    element.offsetLeft,


    y: (e.pageY || e.clientY + document.body.scrollTop) -


    element.offsetTop


    }


    }


    function drawBullet(x, y, ctx) {


    ctx.fillStyle = "darkred";


    ctx.strokeStyle = "black";


    ctx.lineWidth = 4;


    ctx.beginPath();


    CHAPTER 5: Event Handling and User Input


    ctx.arc(x, y, 15, 0, 2*Math.PI, false);


    ctx.fill();


    ctx.stroke();


    }


    </script>


    </head>


    <body onload="init()">


    <div style="height: 250px"></div>


    <canvas id="mainCanvas" width="400" height="400"></canvas>


    </body>


    </html>


    As you see, we have created a special function to extract the click coordinates


    from the event object. In the case of the desktop browser, it uses the event


    itself, while for a touch interface, it uses one of the targetTouches. The code
    for


    this example is included in the 03.click_coordinates.html file with the sources


    for this chapter.'
  trans: "\n# 第 5 章：事件处理与用户输入\n\n鼠标事件每个事件只关联一对坐标。这就是为什么它们没有像 `targetTouches` 这样的特殊对象。坐标直接存储在事件对象中。\n\
    \n`pageX` 和 `pageY` 是事件相对于页面（而非画布）的坐标。只要画布位于页面左上角（大多数情况如此），这种方法就能正常工作。如果你添加了其他元素（如调试用\
    \ div、FPS 计数器或简单的边距），我们的演示就会出问题。我们需要额外做一些工作来计算画布在页面中的正确坐标。\n\n清单 5-6 展示了实现这一功能的代码。\n\
    \n**清单 5-6.** *获取画布不在屏幕左上角时的事件坐标*\n\n```\nif (isTouchDevice()) {\n    canvas.addEventListener(\"\
    touchstart\", function(e) {\n        for (var i = 0; i < e.targetTouches.length;\
    \ i++) {\n            drawBullet(e.targetTouches[i].pageX - canvas.offsetLeft,\n\
    \                        e.targetTouches[i].pageY - canvas.offsetTop, ctx);\n\
    \        }\n        e.stopPropagation();\n        e.preventDefault();\n    },\
    \ false);\n} else {\n    canvas.addEventListener(\"mousedown\", function(e) {\n\
    \        drawBullet(e.pageX - canvas.offsetLeft, e.pageY - canvas.offsetTop, ctx);\n\
    \        e.stopPropagation();\n        e.preventDefault();\n    }, false);\n}\n\
    ```\n\n新代码考虑了画布在页面上的位置：`offsetLeft` 和 `offsetTop` 是保存元素相对于页面位置的参数。现在演示在原生浏览器上可以正常运行……但在移动版\
    \ Firefox 上却不行。为什么？因为 Firefox 没有 `pageX` 和 `pageY` 属性。它有一对完全无用的 `clientX` 和 `clientY`\
    \ 坐标，保存的是事件相对于当前浏览器视口的位置。如果页面发生滚动，演示就会再次失效。这时就需要使用特定浏览器的 hack 技巧。我们演示的最终版本如清单\
    \ 5-7 所示。为了证明滚动不会破坏坐标，我必须从第 3 章使用的游戏页面骨架（见清单 3-3）切换回普通的 HTML5 骨架，后者不限制滚动，也不强制全屏画布（如清单\
    \ 3-1 所示）。\n\n**清单 5-7.** *输入演示的最终版本*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\
    >\n<head>\n    <meta charset=\"utf-8\" />\n    <script src=\"js/utils.js\"></script>\n\
    \    <script>\n        function init() {\n            var canvas = document.getElementById(\"\
    mainCanvas\");\n            var ctx = canvas.getContext(\"2d\");\n           \
    \ // 填充画布以便查看其位置\n            ctx.fillStyle = \"lightgray\";\n            ctx.fillRect(0,\
    \ 0, canvas.width, canvas.height);\n\n            if (isTouchDevice()) {\n   \
    \             canvas.addEventListener(\"touchstart\", function(e) {\n        \
    \            for (var i = 0; i < e.targetTouches.length; i++) {\n            \
    \            var coords = getInputCoordinates(e.targetTouches[i], canvas);\n \
    \                       drawBullet(coords.x, coords.y, ctx);\n               \
    \     }\n                    e.stopPropagation();\n                    e.preventDefault();\n\
    \                }, false);\n            } else {\n                canvas.addEventListener(\"\
    mousedown\", function(e) {\n                    var coords = getInputCoordinates(e,\
    \ canvas);\n                    drawBullet(coords.x, coords.y, ctx);\n       \
    \             e.stopPropagation();\n                    e.preventDefault();\n\
    \                }, false);\n            }\n        }\n\n        function getInputCoordinates(e,\
    \ element) {\n            return {\n                x: (e.pageX || e.clientX +\
    \ document.body.scrollLeft) - element.offsetLeft,\n                y: (e.pageY\
    \ || e.clientY + document.body.scrollTop) - element.offsetTop\n            }\n\
    \        }\n\n        function drawBullet(x, y, ctx) {\n            ctx.fillStyle\
    \ = \"darkred\";\n            ctx.strokeStyle = \"black\";\n            ctx.lineWidth\
    \ = 4;\n            ctx.beginPath();\n            ctx.arc(x, y, 15, 0, 2*Math.PI,\
    \ false);\n            ctx.fill();\n            ctx.stroke();\n        }\n   \
    \ </script>\n</head>\n<body onload=\"init()\">\n    <div style=\"height: 250px\"\
    ></div>\n    <canvas id=\"mainCanvas\" width=\"400\" height=\"400\"></canvas>\n\
    </body>\n</html>\n```\n\n如你所见，我们创建了一个专用函数来从事件对象中提取点击坐标。在桌面浏览器的情况下，它使用事件本身；而对于触摸界面，则使用\
    \ `targetTouches` 中的一个。此示例的代码包含在本章源码的 `03.click_coordinates.html` 文件中。\n"
- fmt: "**NOTE:** 在第3章中，我提到游戏最典型的HTML页面结构是一个占据所有可用空间的`canvas`。在这种页面中出现滚动条的情况相当罕见，尤其是在移动设备上。不过，拥有一个也能处理这些情况的更“可靠”的代码是很好的，尤其是当只需要添加几行代码时。\n\
    \n上一个清单中的代码看起来并不美观：其中有大量样板代码，应该被隐藏在一个良好的API之下。除此之外，触摸事件和鼠标事件看起来非常相似，但它们的处理方式不同。例如，`touchstart`的工作原理与`mousedown`完全相同。从语义上讲，它们都表示“交互开始”。其他事件也是相关的：`mouseup`类似于`touchend`，因为它们都表示“交互结束”；`mousemove`类似于`touchmove`，它们都表示“拖拽”。如果我们能消除这些差异，并创建一个仅包含三个事件——`up`、`down`和`move`——的API，那么事件处理代码将缩减到只有几行，例如：\n\
    \n```\ninput.on(\"down\", function(e) {\n  drawBullet(e.x, e.y, ctx);\n});\n```\n\
    \n为此，我们需要引入我们自己的事件，不同于浏览器默认提供的事件。\n\n## 自定义事件\n\n具有复杂内部逻辑的应用程序通常需要单独的机制来处理其自定义事件。想象一个典型的休闲游戏：角色在关卡中跳跃，躲避敌人并收集硬币以获得更多分数。这种系统可能使用的事件类型包括`coin_collected`、`level_completed`或`level_restarted`。这些事件在游戏引擎之外没有价值；它们与`mousemove`或`touchstart`事件无关。它们不必传播到其他DOM组件或以任何其他方式由浏览器处理。\n\
    \n**NOTE:** 有两个不同的概念共享“自定义事件”这个名称。第一个概念是`CustomEvent`，即DOM Level 3 Events规范中描述的接口（[www.w3.org/TR/DOM-Level-3-Events/#interface-CustomEvent](http://www.w3.org/TR/DOM-Level-3-Events/#interface-CustomEvent)）。它用于向DOM添加新类型的事件。这个术语的另一个含义是“完全独立于DOM的事件API”。在本节中，我们讨论的是第二种事件类型，尽管我们的目标可以通过两种方法实现。从纯粹的架构角度来看，使用`CustomEvent`会稍微好一些，但为了解释这个重要的概念，我选择了第二种方法。\n\
    \n让我们看看清单5-8中的代码，它展示了我们如何在游戏中使用自定义事件（支持该功能的功能将在本章下一节中实现）。`levelManager`是一个加载关卡并跟踪玩家何时完成关卡的对象。它有两个自定义事件：`loaded`和`finished`。客户端API利用这些事件来执行特殊操作，例如在关卡中放置硬币和报告关卡进度。一个对象可以为单一事件类型拥有多个监听器。在清单5-8中，有两个`loaded`事件的监听器。一个放置硬币，另一个将一些调试输出打印到控制台。\n\
    \n**清单5-8.** *自定义事件示例*\n\n```\n// \"on\" 是 \"addEventListener\" 的别名\n// 它读起来更自然\n\
    levelManager.on(\"loaded\", function(e) {\n  var coins = getCoins(e.levelNumber);\n\
    \  placeCoins(coins);\n});\n\nlevelManager.on(\"loaded\", function(e) {\n  console.log(\"\
    level \" + e.levelName + \" started\");\n});\n\nlevelManager.on(\"finished\",\
    \ function(e) {\n  var numCoins = getCoins(e.coinsCollected);\n  console.log(\"\
    You have found \" + numCoins + \" coins\");\n});\n```\n\n显然，您的自定义事件不必代表用户输入或以某种方式与浏览器事件相关联。现在，让我们编写代码来支持这个功能。"
  raw: '**NOTE:** In Chapter 3, I mentioned that the most typical HTML page structure
    for a game is a canvas that takes all available space. Cases when you have the
    scrollbars


    in such page are quite rare, especially on mobile devices. It is good, however,
    to have a more “bulletproof” code that handles these cases too, especially when
    it is a


    matter of adding only couple of lines.


    The code in the last listing doesn’t look all that nice: there are a lot of boilerplate
    lines there that should be hidden under a nice API. Besides that, touch and


    mouse events look very similar, but they are handled in a different manner. For


    example, touchstart works exactly like mousedown. Semantically they both mean


    the ‘ start of interaction.’’ Other events are related also: mouseup works like


    touchend since they both mean ‘ end of interaction;’’ mousemove is like touchmove,


    they both represent ‘‘dragging.’’ If we could get rid of differences and make
    the


    API with just three events----up, down, and move-----then the event handling code


    would shrink to just a few lines, such as:


    input.on("down", function(e) {


    drawBullet(e.x, e.y, ctx);


    });


    To do that, we need to introduce our own events, different from what the


    browser proposes by default.


    CHAPTER 5: Event Handling and User Input


    **187


    **Custom Events**


    Applications with complex internal logic usual y need separate mechanisms for


    handling their custom events. Imagine a typical casual game: the character


    jumps around the level, avoiding enemies and collecting coins to gain more


    points. The types of events that such a system may use are coin_collected,


    level_completed, or level_restarted. These events are not valuable outside of


    the game engine; they have nothing to do with mousemove or touchstart events.


    They do not have to be propagated to the other DOM components or processed


    by the browser in any other way.


    **NOTE:** There are two different concepts that share the name Custom Events.
    The first concept is the CustomEvent, the interface described in the DOM Level
    3 Events


    Specification ([www.w3.org/TR/DOM-Level-3-Events/#interface-](http://www.w3.org/TR/DOM-Level-3-Events/#interface-CustomEvent)


    [CustomEven](http://www.w3.org/TR/DOM-Level-3-Events/#interface-CustomEvent)t).
    It is used to add new types of events to the DOM. The other meaning of this term
    is “completely DOM-independent event API.” In this section, we are


    speaking about the second type of events, even though our goal can be reached
    with


    both approaches. From a purely architectural point of view, it would be slightly
    better to use the CustomEvent, but for the sake of explaining the important concept,
    I


    chose the second path.


    Let’s look at the code in Listing 5-8, which shows how we might use custom


    events in the game (the functionality that supports it is implemented in the next


    section of this chapter). The levelManager is some object that loads the level


    and tracks when it is completed by the player. It has two custom events: loaded


    Download from Wow! eBook <www.wowebook.com>


    and finished. The client API makes use of these events to perform the special


    actions of placing the coins throughout the level and reporting level progress.
    An


    object can have many listeners for the single type of event. In Listing 5-8, there


    are two listeners for loaded event. One places the coins and the other prints


    some debug output to the console.


    **Listing 5-8.** *An Example of Custom Events*


    // "on" is the alias for "addEventListener"


    // it reads more natural


    levelManager.on("loaded ", function(e) {


    var coins = getCoins(e.levelNumber);


    placeCoins(coins);


    });


    levelManager.on("loaded", function(e) {


    console.log("level " + e.levelName + " started");


    CHAPTER 5: Event Handling and User Input


    });


    levelManager.on("finished", function(e) {


    var numCoins = getCoins(e.coinsCollected);


    console.log("You have found " + numCoins + " coins");


    });


    Obviously, your custom events don’t have to represent user input or relate


    somehow to the browser events. Now let’s write the code to support this


    functionality.'
