    With an overview of the reasons why we should change it, and then we will look
    at how to implement the new skeleton with `HTML`, `CSS`, and `JavaScript`. In
    this section, we will first build our skeleton with the basic features we want
    for our example. One of those features involves enabling graceful screen reorientation.
    However, sometime you may prefer a specific orientation—either portrait or landscape—so
    we will look at ways to manage ''forced orientation.''


    ## The Standard Skeleton


    A regular web page can have many elements, and if there is not enough space to
    display them all, a browser will add scrollbars. Game-oriented mobile web pages
    often have only one `HTML` element: the `canvas` that takes all the available
    screen space.


    The mobile game should do its best to prevent the browser from showing the scrollbars.
    Scrollbars take precious space and they also ''steal'' the move event from the
    game. In a strategy game, for example, the move can be treated as ''scroll the
    world map''—which is what the user wants when he swipes the screen. If the page
    doesn''t fit the single screen, however, the same event must be treated as ''scroll
    the browser page.'' In this situation, the game engine cannot use the move event
    for its needs because it is already used for the needs of the browser.


    The mobile web game should not allow scaling by the user or the browser. Nowadays,
    there is a wide variety of mobile devices that have different pixel densities
    and resolutions. Mobile browsers try to be smart and scale the web page to look
    best on the given device. This makes perfect sense for regular pages: the fonts
    will neither be microscopic nor giant, and the page will look roughly the same
    on old and new devices, smartphones and tablets. Game engines are different. They
    don''t need the browser to be ''smart'' because they are smart themselves. Games
    are often made of raster images that do not scale well no matter how hard a browser
    tries. That''s why it is better to turn this feature off from the very beginning.


    **NOTE:** Learn more about the reasons and effects of this browser behavior in
    the great blog post “A Pixel Is [Not a Pixel” at `www.quirksmode.org/blog/archives/2010/04/a_pixel_is_not.html`](http://www.quirksmode.org/blog/archives/2010/04/a_pixel_is_not.html).


    The skeleton should gracefully handle the change of orientation. Once the user
    rotates the device, the `canvas` is resized to fit the new proportions of the
    screen, and the game rerenders itself, taking the new size into the account.


    Let''s take the `HTML5` skeleton from Chapter 2 and add a few more lines of code
    to it to implement the features described earlier. Listing 3-1 shows the initial
    skeleton.


    **Listing 3-1.** *The Initial HTML5 Skeleton*


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <style>

    </style>

    <script>

    function init() {

    }

    </script>

    </head>

    <body onload="init()">

    </body>

    </html>

    ```


    First, let''s restrict the resize behavior. Add one more meta tag right after
    the `meta charset`, like in Listing 3-2.


    **Listing 3-2.** *Viewport Meta Tag: Setting Zooming Options for a Web Page*


    ```

    ...

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
    user-scalable=no, target-densitydpi=device-dpi"/>

    <style>

    ...

    ```


    This code sets the parameters of the viewport; in other words, it gives the browser
    several hints on how to render the page. We instruct the browser to set the initial
    and maximum scale to `1.0` (which means no scaling), ignore the user''s attempts
    to scale the page (`user-scalable=no`), and finally, give us the real pixels,
    so that `1px` is exactly what it sounds like—one physical pixel of the device
    screen (`target-densitydpi=device-dpi`).


    The page, however, might still have scrollbars. To prevent them from appearing,
    add the style declaration in Listing 3-3.


    **Listing 3-3.** *CSS for the Page: No Scrollbars, Margins, Paddings, or Borders*


    ```

    <style>

    html, body {

    overflow: hidden;

    width: 100%;

    height: 100%;

    margin:0;

    padding:0;

    border: 0;

    ```'
