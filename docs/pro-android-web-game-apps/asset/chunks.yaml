    ![](index-526_1.jpg)


    **Figure 13-9.** *The route between nodes `0` and `3`; the cost of this route
    is `485`.*


    If we need to find the path between nodes `0` and `7`, the first two steps are
    obvious. We move to node `1`, and then to node `3`, because we don’t have any
    choice here — there is only one possible path. But at node `3`, we have an option
    to explore four other nodes: `2`, `4`, `5`, and `6`. The question is which one
    to choose first.


    A* chooses the path that is likely to be the shortest. To find which one that
    is, we need to calculate the estimated cost of the route. To estimate the cost
    of the route without knowing the number of additional nodes we need to visit,
    we divide the route into two parts. The first part is the “known” part — the nodes
    that we have already visited before the current one. The cost of this part is
    easy to calculate — just add the weights of the connections that led to the current
    point. The second part of the route, from the current point to the destination,
    is unknown, but we still need to estimate it. To do that, we pretend that there
    is a direct connection from the current node to the destination. The weight of
    such connection would be the distance between these two points. Add it to the
    first part and you get a rough estimate of what the route might cost.


    This is an optimistic estimate of the route length — you know that the route will
    be at least that long, maybe more, but never less. It turns out that this heuristic
    gives rather good results.


    Now let’s try to pick the best route from node `3`. Table 13-1 summarizes the
    calculations that we need to perform for each of the four possible routes.


    **Table 13-1.** *Calculating the Estimated Cost for the Routes*


    | Route | Cost | Distance to Goal | Estimated Cost |

    |---|---|---|---|

    | `0-1-3-2` | `485 + 248 = 706` | | |

    | `0-1-3-4` | `485 + 325 = 810` | | |

    | `0-1-3-5` | `485 + 189 = 674` | | `901` |

    | `0-1-3-6` | `485 + 394 = 879` | | |


    The most promising route is the route that has the smallest estimated cost, which
    is route `0-1-3-5`. As you see, this route is not the correct one, but the next
    step of the algorithm fixes that.


    On the next step, A* goes to node `5` and calculates the cost of the route `0-1-3-5-6`.
    This route is longer than `0-1-3-6`, which we tried on the previous step. Even
    though the route `0-1-3-6` was not selected that time, it is chosen as the most
    promising route now.


    The process is repeated: pick the best node, mark it as “current,” find adjacent
    nodes, check which is the best, mark it as current, and so on until we reach the
    destination node. The algorithm guarantees that if the path exists, it will be
    found.


    When a node is visited, we keep track of the connection that led to the node:
    we will use this information once we have found the target and need to build the
    whole route. Each node tracks the total cost of the route and the estimated total
    cost of the route. So each visited node has three numbers associated with it:


    - The previously visited node that led to this one

    - The cost of the route (so far)

    - The estimated cost of the route to the destination


