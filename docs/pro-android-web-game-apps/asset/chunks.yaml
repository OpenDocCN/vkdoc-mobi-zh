    \      gradientX, gradientY, cellSize*0.1, // 内圆（高光）\n      gradientX, gradientY,\
    \ radius*1.2); // 外圆\n    gradient.addColorStop(0, \"yellow\"); // “光照”的颜色\n \
    \   gradient.addColorStop(1, color); // 棋子的颜色\n    ctx.fillStyle = gradient;\n\
    \    ctx.beginPath();\n    ctx.arc(x, y, cellSize/2 - 5, 0, 2*Math.PI, false);\n\
    \    ctx.fill();\n  }\n}\n```\n\n如您所见，径向渐变使用了两种颜色：黄色用于高光效果，红色或绿色用于棋子的主色。再次注意，我们没有硬编码任何坐标；它们都根据棋子的位置和单元格大小进行计算。这种方法允许在同一代码中适配各种屏幕尺寸。只要`cellSize`保存了正确的值，我们就不关心实际的屏幕尺寸。结果是值得努力的。请查看图\
    \ 2-24，它展示了应用径向渐变后棋子的效果。\n\n`![](img/index-78_1.jpg)`\n\n`![](img/index-78_2.jpg)`\n\
    \n**图 2-24.** *对棋子应用径向渐变填充*\n\n## 图案\n\n图案是最后一种描边和填充类型。图案不处理颜色。图案获取一张图像，并用它覆盖图形的空间，就像厨房地板上的瓷砖一样。图案的工作方式如图\
    \ 2-25 所示。\n\n**图 2-25.** *使用图案作为填充*\n\n要创建图案，您需要一张图像——JPEG、PNG 或任何浏览器可以处理的其他网页兼容格式。我们的场景只在页面加载后重绘一次。这意味着在开始绘制任何内容之前，我们需要一张完全加载好的图像。\n\
    \n问题在于浏览器以异步方式加载图像；除非您专门跟踪，否则永远无法确定它是否已在内存中。幸运的是，实现这个逻辑并不难；我们只需要对初始 HTML 框架进行一些小的调整。首先，我们想从服务器下载一个漂亮的\
    \ Android Logo 图像（见清单 2-13）。\n\n***清单 2-13.** 预加载图像*\n\n```\nvar logo = new Image();\n\
    logo.onload = function() {\n  // 一旦图像加载完成，浏览器将调用此函数\n};\nlogo.onerror = function()\
    \ {\n  // 始终添加错误处理代码，你永远不知道它何时能为你节省调试时间\n  alert(\"Could not load the image!\"\
    );\n};\nlogo.src = \"img/logo.png\";\n```\n\n当您为图像对象分配`src`参数时，浏览器开始加载图像。\n"
- fmt: "从给定路径加载图像。我们的`onload`代码将在加载完成后触发常规的重绘流程。这样，我们就能保证当上下文方法执行时，图像是可用的。\n\n**注意：**\
    \ 在真实游戏中，创建一个`ImageManager`通常很有用，这是一个单独的类，可以处理多个图像并将所有实现细节从游戏逻辑中隐藏起来。此外，如果你有大量图像需要预加载，你将需要向用户显示某种进度条，让他知道你的游戏没有卡住。就我们的目的而言，清单2-13足以完成任务，但我们将在第4章回到这个主题，并制作一个更好的图像加载代码版本。现在，让我们回到图案。\n\
    \n图案比渐变更容易。你可以使用`createPattern()`方法创建图案。它接受两个参数：一个图像和一个重复策略，该策略告诉上下文如果图像小于要填充的区域应该怎么做。它的工作方式与CSS属性`background-repeat`完全相同，并接受以下相同的选项集：\n\
    \n- `repeat`: 在两个方向上重复图像（默认）\n- `repeat-x`: 仅在水平方向重复\n- `repeat-y`: 仅在垂直方向重复\n\
    - `no-repeat`: 不重复图像\n\n清单2-14是图案的示例。为了让代码更有趣和更简洁，我将图像加载代码包装成一个单独的函数，该函数在加载完成后执行回调。这里的`logo`变量是全局的；在生产环境中，保留这些“神奇全局变量”是一个非常糟糕的主意。你迟早会发现它们难以管理和记忆。但对于这个例子来说，这是可以的。\n\
    \n**清单 2-14\\. 使用图案**\n\n```\nvar logo;\n\nfunction init() {\n    loadImage(\"\
    img/logo.png\", function(loadedImg) {\n        logo = loadedImg;\n        drawScene();\n\
    \    });\n}\n\nfunction loadImage(imageUrl, callback) {\n    var image = new Image();\n\
    \    image.onload = function() {\n        callback(image);\n    };\n    image.onerror\
    \ = function() {\n        alert(\"Could not load the image!\");\n    };\n    image.src\
    \ = imageUrl;\n}\n\nfunction drawScene() {\n    var canvas = document.getElementById(\"\
    mainCanvas\");\n    var ctx = canvas.getContext('2d');\n    var pattern = ctx.createPattern(logo,\
    \ \"repeat\");\n    ctx.fillStyle = pattern;\n    ctx.lineWidth = 10;\n    ctx.fillRect(0,\
    \ 0, 800, 600);\n}\n```\n\n粗体行演示了如何创建图案并将其用作填充。让我们再次回顾这段代码，因为它的结构与最初的HTML5骨架相比发生了变化。现在我们有了三个方法：`init()`、`loadImage()`和`drawScene()`。第一个方法在页面加载完成后立即执行。它是应用程序的入口点。它开始加载稍后将用作图案的图像。当`loadImage()`完成时，它会调用匿名回调函数并将加载的`Image`对象作为参数传递。回调执行`drawScene()`，图像被用于图案，图案被用作默认填充。图2-26展示了结果，一个由Android\
    \ logo拼接而成的漂亮平铺背景。\n\n![图2-26](index-81_1.jpg)\n\n**图 2-26\\. 使用图案**\n\n如果你愿意，你可以为游戏板的背景使用图案（我试过，但我最后还是更喜欢渐变）。确保图像的颜色不要太亮，否则会分散玩家对游戏本身的注意力。\n\
    \n## 上下文状态与变换\n\n本章的最后一部分专门讨论二维上下文的变换。非正式地说，变换是应用于上下文中任何绘图函数的规则。例如，如果你调用`ctx.scale(2,\
    \ 2)`，那么之后你绘制的所有内容都会显得大一倍。上下文支持三种类型的变换：平移（`translate`）、缩放（`scale`）和旋转（`rotate`）。\n\
    \n更正式地说，变换会改变上下文的坐标系；例如，在`scale(2, 2)`之后，坐标空间的每个“单位”对应两个像素。因此，坐标为`(10, 10, 5,\
    \ 5)`的矩形实际上会被绘制成`(20, 20, 10, 10)`的样子。"
  raw: 'load an image from the given path. Our onload code will trigger the usual
    repaint


    routine, right after the loading is completed. This way, we guarantee that the


    image is available for context’s methods when they get executed.


    **NOTE:** In a real-world game, it is often useful to create an ImageManager,
    a


    separate class that can handle multiple images and hide all the implementation


    details away from the game logic. Besides, if you have a lot of images to preload,
    you will need to show some kind of progress bar to the user and let him know that
    your


    game isn’t stalled. For our purposes, Listing 2-13 is enough to do the job, but
    we will return to this subject in Chapter 4 and make a better version of the image
    loading


    code. Now let’s get back to patterns.


    Patterns are easier than gradients. You create the pattern with createPattern()


    method. It accepts two parameters: an image and a repetition strategy that tells


    the context what to do if an image is smaller than the area to fill. It works
    exactly the same way as background-repeat CSS property and accepts the following


    same set of options:


     repeat: repeat image in both directions (default)


     repeat-x: repeat only horizontally


     repeat-y: repeat only vertically, no-repeat-----do not repeat the


    image


    Listing 2-14 is the example of patterns. To make the code a little more


    interesting and clean, I’ve wrapped the image-loading code into a separate


    function that executes the callback once the loading is done. The logo variable


    is global here; in a production environment, it is a rather bad idea to keep these


    ‘ magic globals.’’ You will find them hard to manage and remember sooner or


    later. But for this example, it is OK.


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    **Listing 2-14\.** **Using Patterns**


    *var logo;


    function init() {


    loadImage("img/logo.png", function(loadedImg) {


    logo = loadedImg;


    drawScene();


    });


    }


    function loadImage(imageUrl, callback) {


    var image = new Image();


    image.onload = function() {


    callback(image);


    };


    image.onerror = function() {


    alert("Could not load the image!");


    };


    image.src = imageUrl;


    }


    function drawScene() {


    var canvas = document.getElementById("mainCanvas");


    var ctx = canvas.getContext(''2d'');


    var pattern = ctx.createPattern(logo, "repeat");


    ctx.fillStyle = pattern;


    ctx.lineWidth = 10;


    ctx.fillRect(0, 0, 800, 600);


    }


    The bolded lines demonstrate how to create a pattern and use it as a fill. Let’s


    review this code once again, since its structure has changed from the initial


    HTML5 skeleton. Now we have 3 methods: init(), loadImage(), and


    drawScene(). The first of these is executed right after the page has finished


    loading. It is the entry point of the application. It starts the loading of the
    image that will become a pattern later. When loadImage() is done, it calls the


    anonymous callback function and passes the loaded Image object as the


    parameter. Callback executes the drawScene(), the image is used for the pattern


    and the pattern is used as the default fill. Figure 2-26 shows the result, a nice


    tiled set of Android logos.


    ![](index-81_1.jpg)


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    **75


    **Figure 2-26\.** **Using patterns**


    *If you want, you can use a pattern for the board’s background (I tried, but I
    liked


    gradients better after all). Make sure that the color of the image is not too
    bright, otherwise you will distract the user from the game itself.


    **Context State and Transformations**


    The final part of this chapter is devoted to the transformations of the 2D context.


    Informally, transformation is the rule that is applied to any drawing functions


    executed on context. If you call ctx.scale(2, 2), for example, everything that


    you draw afterward will appear twice as big. Context supports the three types
    of


    transformations: translate, scale, and rotate.


    More formally, transformation changes the coordinate system of the context; for


    example, after scale(2, 2) each ‘‘unit’’ of coordinate space corresponds to two


    pixels. So a rectangle with coordinates (10, 10, 5, 5) are drawn as if it is (20,
    20, 10, 10).'
