- fmt: "# CHAPTER 5: Event Handling and User Input\n\nMouse events have only one pair\
    \ of coordinates associated with each event. That’s why they don’t have a special\
    \ object like `targetTouches`. The coordinates are stored straight in the event\
    \ object.\n\n`pageX` and `pageY` are the coordinates of the event relative to\
    \ the page, and not the canvas. This approach works well as long as canvas is\
    \ in the top-left corner of the page (which it is in most of cases). If you add\
    \ other elements (debug divs, FPS counters, or a simple margin), our demo will\
    \ break. We need to do a little bit of extra work to calculate the correct canvas\
    \ coordinates within the page.\n\nListing 5-6 shows the code that does that.\n\
    \n**Listing 5-6.** *Getting the Coordinates of Event When Canvas Is Not in the\
    \ Top-Left Corner of a Screen*\n\n```\nif (isTouchDevice()) {\n    canvas.addEventListener(\"\
    touchstart\", function(e) {\n        for (var i = 0; i < e.targetTouches.length;\
    \ i++) {\n            drawBullet(e.targetTouches[i].pageX - canvas.offsetLeft,\n\
    \                        e.targetTouches[i].pageY - canvas.offsetTop, ctx);\n\
    \        }\n        e.stopPropagation();\n        e.preventDefault();\n    },\
    \ false);\n} else {\n    canvas.addEventListener(\"mousedown\", function(e) {\n\
    \        drawBullet(e.pageX - canvas.offsetLeft, e.pageY - canvas.offsetTop, ctx);\n\
    \        e.stopPropagation();\n        e.preventDefault();\n    }, false);\n}\n\
    ```\n\nThe new code takes into account the position of canvas on the page: `offsetLeft`\
    \ and `offsetTop` are the parameters that hold the position of the element relative\
    \ to the page. Now the demo will run fine ... on the stock browser. On mobile\
    \ Firefox, it doesn’t work. Why? Because Firefox doesn’t have `pageX` and `pageY`\
    \ properties. It has a completely useless pair of `clientX` and `clientY` coordinates\
    \ that hold the position of an event relative to the current browser viewport.\
    \ If a page is scrolled, the demo is broken once again. That’s where browser-specific\
    \ hacks come into play. The final version of our demo looks like Listing 5-7.\
    \ To demonstrate that scrolling doesn’t break the coordinates, I had to switch\
    \ back from the game page skeleton used in Chapter 3 (see Listing 3-3) to the\
    \ plain HTML5 skeleton that doesn’t restrict scrolls and doesn’t force the fullscreen\
    \ canvas (like in Listing 3-1).\n\n**Listing 5-7.** *The Final Version of the\
    \ Input Demo*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    utf-8\" />\n    <script src=\"js/utils.js\"></script>\n    <script>\n        function\
    \ init() {\n            var canvas = document.getElementById(\"mainCanvas\");\n\
    \            var ctx = canvas.getContext(\"2d\");\n            // Fill canvas,\
    \ to see where it is\n            ctx.fillStyle = \"lightgray\";\n           \
    \ ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n            if (isTouchDevice())\
    \ {\n                canvas.addEventListener(\"touchstart\", function(e) {\n \
    \                   for (var i = 0; i < e.targetTouches.length; i++) {\n     \
    \                   var coords = getInputCoordinates(e.targetTouches[i], canvas);\n\
    \                        drawBullet(coords.x, coords.y, ctx);\n              \
    \      }\n                    e.stopPropagation();\n                    e.preventDefault();\n\
    \                }, false);\n            } else {\n                canvas.addEventListener(\"\
    mousedown\", function(e) {\n                    var coords = getInputCoordinates(e,\
    \ canvas);\n                    drawBullet(coords.x, coords.y, ctx);\n       \
    \             e.stopPropagation();\n                    e.preventDefault();\n\
    \                }, false);\n            }\n        }\n\n        function getInputCoordinates(e,\
    \ element) {\n            return {\n                x: (e.pageX || e.clientX +\
    \ document.body.scrollLeft) - element.offsetLeft,\n                y: (e.pageY\
    \ || e.clientY + document.body.scrollTop) - element.offsetTop\n            }\n\
    \        }\n\n        function drawBullet(x, y, ctx) {\n            ctx.fillStyle\
    \ = \"darkred\";\n            ctx.strokeStyle = \"black\";\n            ctx.lineWidth\
    \ = 4;\n            ctx.beginPath();\n            ctx.arc(x, y, 15, 0, 2*Math.PI,\
    \ false);\n            ctx.fill();\n            ctx.stroke();\n        }\n   \
    \ </script>\n</head>\n<body onload=\"init()\">\n    <div style=\"height: 250px\"\
    ></div>\n    <canvas id=\"mainCanvas\" width=\"400\" height=\"400\"></canvas>\n\
    </body>\n</html>\n```\n\nAs you see, we have created a special function to extract\
    \ the click coordinates from the event object. In the case of the desktop browser,\
    \ it uses the event itself, while for a touch interface, it uses one of the `targetTouches`.\
    \ The code for this example is included in the `03.click_coordinates.html` file\
    \ with the sources for this chapter."
