    case, the third call: writeToDiv(getMa[x(1, 1)).](#index_split_000.html#p8) Looks
    like everything is breaking up when the parameters are equal. That’s right, the
    if checks do not pass, and


    the return statement is not called at all: that’s why we have the undefined value.


    Wel , now that you know where the problem is----you can easily fix it!


    **NOTE:** This is another example of a typical dynamic language problem. In JavaScript,
    the same function can return values of different types: strings, numbers, objects,
    or undefined. A static language would check for the return type of the function
    at the


    time of compilation, and an error like this would never make it to production.
    In


    JavaScript, this code is perfectly valid.


    That’s easy, right? Maybe even too easy. This bug can be traced by reading


    four lines of the code without a debugger. But that’s not always the case.


    Sometimes you need much more to debug the function that just doesn’t want to


    APPENDIX: Debugging Client-side JavaScript


    [620](#index_split_007.html#p620)


    work the way it should. Chrome’s debugger can do much more. The detailed


    debugging tutorial is outside the scope of this book, but you can find more


    information about Chrome Developer Tools at


    [http://code.google.com/chrome/devtools/docs/overview.html.](http://code.google.com/chrome/devtools/docs/overview.html)


    **Debugging on a Mobile Device**


    Now let’s consider the worst-case scenario: you have to debug the code on the


    device (or emulator). The only real option that you have is writing to the console


    and reading the logs afterward. This is a cumbersome and ineffective technique,


    but unfortunately the only one that we have when a desktop browser is not an


    option.


    If you are going to debug with the emulator, run it and open the page. If you’re


    working with a real device, you will first have to enable USB debugging;


    otherwise, you will not access device logs. Go to Settings ➤ Applications ➤


    Development and make sure that USB Debugging is active. Afterward, connect


    your smartphone or tablet to your PC with the cable, and proceed.


    Open the command line and type the following:


    [> adb logcat -v raw browser:I *:S](#index_split_007.html#p647)


    This shows the logs of the device (or the emulator) in real time, filtering them
    to


    display only the messages that you’re actually interested in; in this case, the


    console output from the browser.


    **NOTE:** You don’t believe in magic and want a better explanation of how this
    all works? Okay, adb (Android Device Bridge) is the tool that you use to communicate


    with your Android device or emulator from your PC. With this tool, you can issue


    commands directly to the device or use the device’s services. Besides examining


    logs, you can install or uninstall programs, reboot devices, or even access the
    shell of your Android device.


    The command that we just issued (logcat) is used to view logs. The second


    parameter, [-v](#index_split_007.html#p647) raw, tells logcat to omit the extra
    logging information like the id of the process that is writing to the log, or
    the log level. The last parameter is the filter.


    By default, logcat is extremely verbose: each and every Android component tends


    to write logs about anything interesting that is happening around. Without a filter,
    logcat is almost useless. Try to run it without the last parameter to see it yourself.


