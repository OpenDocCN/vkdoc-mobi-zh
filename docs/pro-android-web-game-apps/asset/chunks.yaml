    \n原生应用已接近分发状态。让我们添加一些最终润色，让它看起来更棒。首先，应用列表中显示的游戏名称看起来不太美观——它是主活动的名称`FourBal s`——驼峰式且没有空格（这是自动生成的）。\n\
    \n要更改名称，找到`res/values/strings.xml`文件，并在`\"app_name\"`中添加一个空格（见清单 15-6）。\n\n**清单\
    \ 15-6.** *为应用添加人类可读的名称*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <resources>\n    <string name=\"app_name\">Four Balls</string>\n</resources>\n\
    ```\n\n如果你重建并安装应用，名称看起来会好得多。\n\n现在来处理图标。默认的 Android 应用图标是一个简陋的占位符，仅应在早期开发阶段使用。在生产环境中，应用必须拥有自己吸引人的图标。Android\
    \ 有自己的样式指南，访问 [http://developer.android.com/guide/practices/ui_guidelines/icon_design_launcher.html](http://developer.android.com/guide/practices/ui_guidelines/icon_design_launcher.html)\
    \ 可以查看。在要求设计师制作一套图标之前，最好把此链接发给他。\n\n图标必须是带透明通道的 32 位 PNG。Android 运行在各种不同尺寸和密度的屏幕设备上。因此，生产级游戏的图标应创建为多种分辨率：36×36、48×48、72×72，以及用于超高清屏幕的\
    \ 96×96（仅当目标为 Android 2.3 或更高版本时）。在透明背景上创建一个简单的图像，并为每种分辨率保存，或者使用随本章材料附带的图标。现在在`res`中创建四个新的子文件夹，并将对应的图标文件放入其中：\n\
    \n- `res/drawable`：48×48（默认值；你可以只保留这个文件夹，但这样图标会根据特定密度进行缩放，可能无法在所有分辨率下都显示良好）\n\
    - `res/drawable-hdpi`：72×72（高密度）\n- `res/drawable-mdpi`：48×48（中密度）\n\n![图标示例](index-582_1.jpg)\n\
