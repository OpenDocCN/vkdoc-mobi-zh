    0。图 13-5 中的矩阵表示的就是图 13-4 中的图，无需在屏幕上绘制出来。


    **图 13-5.** *图的矩阵表示。例如，如果列 i 与行 j 的交点处为“1”，则表示顶点 i 和顶点 j 通过一条边相连。*


    图的边可以有方向。在这种情况下，该图称为有向图。有向图的一个示例如图 13-6 所示。


    **图 13-6.** *一个有向图*

