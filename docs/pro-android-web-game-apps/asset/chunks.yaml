- fmt: '# CHAPTER 8: 3D in a Browser


    You are limited to the JavaScript engine that executes every instruction in a
    CPU. Since a CPU isn’t optimized for this type of operation, rendering takes far
    more time compared to rendering with a GPU.


    In fact, before WebGL appeared, building fully custom 3D renderers was the only
    way of creating 3D in a browser without Flash or Java. People were inventing their
    own 3D engines, and some of these experiments were really impressive. But sadly,
    the bottom line is that you will not be able to write a decent-quality 3D game
    inside a 2D context. WebGL works very differently—it allows you to send all of
    the heaviest 3D calculations to the GPU.


    Most cell phones in the market do not have a separate GPU yet, but that’s really
    a question of time. What happens if you launch WebGL in such a phone? Will it
    work at all? Quick answer: yes, it will. But it still uses the CPU to render a
    scene and you won’t get many frames per second on such a setup. When a 3D scene
    is rendered by the GPU, it is called hardware rendering, which means that the
    math and heavyweight calculations are done with a GPU that is optimized specifically
    for this kind of task. The opposite is called software rendering. It is when you
    render your scene with a CPU, for example, from JavaScript without WebGL, or on
    a device that doesn’t have hardware that is supported by it.


    **NOTE:** Even on your desktop PC, you might have problems with WebGL acceleration.
    There is a special "blacklist" of hardware-driver-OS combinations that are known
    to cause issues with WebGL. If your PC falls into the blacklisted category, your
    WebGL context will not be accelerated, or WebGL will be disabled completely. If
    you still want to enable it at your own risk, there''s a launch parameter on every
    browser that forces it to ignore blacklists. On Chrome, launch the browser with
    the option `--ignore-gpu-blacklist`. On Firefox, go to `about:config` and set
    `webgl.force-enabled=true`.


    ## How 3D Rendering Works


    This was one of the hardest sections to write in the entire book. 3D rendering
    is really a complex topic and it is quite possible to write a separate book or
    two with the title "How 3D Rendering Works." I try to explain just the important
    essentials of 3D rendering and later give you a good basis to understand the more
    advanced algorithms behind it. I will also try to make the math as lightweight
    as I can, but I still need to write some formulas here and there.


    ### The Math


    Let''s start with the good news about 3D. The math that you are using in flat,
    two-coordinate 2D space works just fine in 3D. Everything in 3D is just 2D with
    one extra dimension, called `z`. In 2D, the middle of the segment is calculated
    as:


    ```

    x = (x1 + x2) ÷ 2, y = (y1 + y2) ÷ 2

    ```


    Add one more dimension, and you''ve got your 3D version:


    ```

    x = (x1 + x2) ÷ 2, y = (y1 + y2) ÷ 2, z = (z1 + z2) ÷ 2

    ```


    The same is true for the distance between two points. In two dimensions, the formula
    is:


    ```

    d = sqrt((x1 - x2)^2 + (y1 - y2)^2)

    ```


    Add the third dimension, and your formula will become:


    ```

    d = sqrt((x1 - x2)^2 + (y1 - y2)^2 + (z1 - z2)^2)

    ```


    Why is that important right now? Because sometimes it is way easier to understand
    how things work in 2D than in 3D. It is easier to understand 2D drawings and formulas,
    but once you get the hang of them, switching to 3D is not hard at all. If you
    find it hard to understand something about 3D, either in this chapter or anywhere
    else, try to think about the same concept in a 2D space. If you can find a similar
    case, you''ll get the 3D in no time.


    Of course, every rule has its exceptions. In 2D, for example, lines are either
    parallel or they cross somewhere. In 3D, it is quite possible that lines are neither
    parallel nor do they cross.


    ### A 3D Example


