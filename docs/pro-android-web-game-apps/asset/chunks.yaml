    \ 毫秒的静音开始。`MP3`就是这样工作的：它无法像我们希望的那样保存声音的每一个比特，这导致了烦人的“咔哒”声。然而，这当然不是游戏开发的借口。我们希望背景主题播放流畅。\n\
