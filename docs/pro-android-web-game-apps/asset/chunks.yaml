  trans: "\n# 温馨提示\n\n在开始之前，有一点需要说明：Node.js 是一款快速演进的软件，其开源库也是如此。它们每天都在改进，为开发者带来更强大、更友好、更高效的软件。API\
    \ 变化非常迅速。在撰写本章初稿到最终定稿的这段时间里，本文所述框架的多个部分已发生改变。原先的邮件发送框架已被弃用，取而代之的是更强大的框架，而 Node\
    \ 本身的安装流程也简单了许多。\n\n本章中的大部分代码仍能正常运行；但如果某些代码未能立即按预期工作，请查阅相关库的在线文档，特别是那些不符合你使用预期的库。此外，建议你时常访问作者的[页面](http://juriy.com)查看更新，并关注\
    \ Apress 网站上托管的源代码。我会尽力使代码保持最新，并列出所有必要的修改，以确保你的代码能与最新版本的库兼容。\n\n# 第 10 章：走向服务器端\n\
    \n## Node.js 基础\n\nNode.js ([`nodejs.org`](http://nodejs.org)) 的理念是将 JavaScript\
    \ 的强大能力引入服务器端。正如我此前所述，Node.js 是一种工具，能让身为 Web 开发者的你，使用自己熟悉的语言编写代码。当然，这并非 Node.js\
    \ 成为在线游戏开发首选的全部原因。在本节中，我们将介绍 Node.js 的基础知识。先从经典的 Hello World 程序开始，然后安装 Node，为编写自己的脚本做好准备。\n\
    \n### 认识 Node.js\n\n在深入探讨 Node.js 的内部机制之前，我们先来看看它究竟是什么，以及如何使用。本质上，Node.js 是一个小巧的命令行工具，能够运行\
    \ JavaScript 代码。为此，它使用了极其高效的 JavaScript 引擎——V8 ([`code.google.com/p/v8/`](http://code.google.com/p/v8/))，但与浏览器运行环境不同，它直接与操作系统交互，将其资源暴露给程序员。不再有移动\
    \ div 或改变按钮背景的操作。借助 Node.js，你可以完成所有常规桌面编程语言能做到的事情：打开和读取文件、使用套接字、构建 HTTP 服务器、下载图片、解析\
    \ XML、流式播放音频——一切皆有可能。\n\nNode.js 绝对不是一个 Web 服务器。它更像一个以 JavaScript 为驱动的虚拟机，并将 HTTP\
    \ 作为一等协议——这意味着它开箱即用，并得到 Node.js 的全面支持。如果你愿意，可以用 Node.js 编写一个 Web 服务器，但这并不代表你必须这么做。你也可以编写一个在媒体库中查找重复照片的工具，其中甚至不包含任何网络相关的指令。不过，在绝大多数情况下，你会使用\
    \ Node 来处理网络请求（无论是 HTTP 还是 TCP/IP），因为这才是其展现全部潜力的领域。\n\n如果你和我一样，一定很想看看代码长什么样。那么，请看下面使用\
    \ Node.js 编写的著名 Hello World：\n\n```\nconsole.log(\"Hello World\");\n```\n\n嘿，你还期待什么呢？它本就该如此简单！我知道这个例子不会让你兴奋，但我不想打破\
    \ Hello World 的老派传统。稍后我们将学习如何运行这个脚本。\n\n接下来，在代码清单 10-1 中，我们来看一个更复杂的例子：编写一个向用户返回数据的\
    \ Web 服务器。\n\n**代码清单 10-1.** *Node.js 脚本稍高级示例*\n\n```\nvar http = require('http');\n\
    \nhttp.createServer(function (req, res) {\n  res.writeHead(200, {'Content-Type':\
    \ 'text/plain'});\n  res.end('Hello World\\n');\n}).listen(1337, \"127.0.0.1\"\
    );\n```\n\n如果你不能完全理解这段代码，不必担心；本章剩余部分会带你熟悉它。你需要注意的核心点是，这是常规的 JavaScript 代码，如果你稍加思考，就能...\n"
- fmt: "了解其工作原理。在第一行中，我们接收到`http`对象，然后在其上调用`createServer()`，并将函数作为参数传递。该函数的作用类似于常规浏览器中的事件监听器：它在某个特定事件发生时被调用。在这种情况下，触发调用的时间是用户发起的HTTP连接。\n\
    \n## 编程模型\n\nNode.js的哲学是尽可能在I/O操作中使用异步方式。这正是Node能够如此快速的原因：它节省了每微秒的时间，而常规服务器往往认为这种损耗是不可避免的。如果你有其他服务器端语言的经验，Node脚本完全由回调组成，这可能会看起来有些奇怪。\n\
    \n最好通过一个代码示例来解释。清单10-2展示了一个Node脚本的代码，该脚本从文件系统读取文件并将输出打印到控制台：\n\n```js\nvar fs\
    \ = require('fs');\n\nfs.readFile('some/file/here', function (err, data) {\n \
    \ if (err)\n    throw err;\n  console.log(data);\n});\n```\n\n其理念与清单10-1完全相同。你请求Node.js为你检索文件内容，并在操作完成时通知你的回调函数。\n\
    \n现在，将这段代码与清单10-3中执行完全相同任务的PHP片段进行比较。\n\n**清单10-3.** *执行相同文件读取及内容输出任务的PHP示例代码*\n\
    \n```php\n<?php\n$content = file_get_contents('some/file/here');\necho $content;\n\
    ?>\n```\n\n当然，清单10-3看起来更简单一些。但这种简单性代价高昂。PHP代码在读取文件时会阻塞脚本的执行：它会等待文件完全读取后，才继续执行第二行。那么，其他想要同时访问服务器的用户会怎样呢？他们会一直等待，直到文件读取操作完成。当然，在实际应用中，Web服务器会创建大量线程，以便用户不必等待单个可用线程就绪。但这种模式有其局限性：创建和支持线程并非廉价操作。当更多用户向服务器请求页面时，它会创建更多线程，直到达到线程限制，或者服务器耗尽内存和CPU资源。\n\
    \nNode.js的工作方式不同。一旦你请求文件数据，你就让脚本继续执行。你提供一个回调，当I/O操作完成时执行该回调，并释放服务器以处理下一个用户。换句话说，服务器线程在读取操作期间不会被阻塞。当文件被某个外部进程读取时，服务器同时还会服务另一个或两个用户的请求。一旦文件完全读取完毕，它会完成当前任务并调用你提供的回调。\n\
    \n图10-1展示了阻塞型服务器的典型流程。在此示例中，第一个请求导致服务器执行一个长时间运行的操作，例如读取大文件或查询数据库以获取复杂数据。该操作需要相当长的时间才能完成。其他请求——请求2和3——处理速度非常快，它们的结果几乎立即返回给浏览器。\n\
    \n在图10-1所示的阻塞型服务器情况下，请求2和3必须等待服务器忙于执行长时间运行的操作，即使实际工作在别处完成（例如，在数据库软件中）。服务器只能在长时间运行的操作完成后才能响应，即使在此期间它处于空闲状态，没有执行任何有用的工作。\n\
    \n**图10-1.** *阻塞型服务器流程*\n\nNode.js采用了不同的方法，如图10-2所示。当长时间运行的操作正在进行时，Node.js可以服务其他请求。例如，它可以返回请求2和3的响应。当长时间运行的任务完成时，Node.js调用注册的回调，脚本就可以服务结果了。"
  raw: 'understand how it works. In the first line, we receive the object http, and
    then


    we call the createServer() on it, passing the function as an argument. The


    function acts like an event listener in a regular browser: it is invoked when
    a


    certain event happens. In this case, the event that triggers a call is the HTTP


    connection initiated by the user.


    Programming Model


    The philosophy of Node.js is to use asynchronous operations for IO whenever it


    is possible. That’s what allows Node to be so fast: it saves every microsecond


    where regular servers tend to think about it as an unavoidable loss. Node scripts


    are entirely made of callbacks that might look slightly strange if you already
    have


    experience with other server-side languages.


    It is better to explain with a code example. Listing 10-2 shows the code for a


    Node script that reads the file from the file system and prints the output to
    the


    console:


    **Listing 10-2.** *Reading the Content of the File with Node.js*


    var fs = require(''fs'');


    fs.readFile(''some/file/here'', function (err, data) {


    if (err)


    throw err;


    console.log(data);


    });


    The idea is just the same as in Listing 10-1\. You are asking Node.js to retrieve


    the content of the file for you, and let your callback know when this is done.


    Now compare this code to the fragment of PHP in Listing 10-3 that performs


    exactly the same task.


    CHAPTER 10: Going Server-Side


    **401


    **Listing 10-3.** *Example Code in PHP That Performs the Same Task of Reading
    the File and Outputting Its* *Content*


    <?php


    $content = file_get_contents(''some/file/here'');


    echo $content;


    ?>


    Listing 10-3 looks somewhat simpler, of course. But this kind of simplicity has
    a


    very high cost. PHP code blocks the execution of the script while it reads the


    file: it waits until the file is fully read before moving to the second line.
    What


    happens to the other users who want to access the server at the same time?


    They wait until the execution of the file-read operation is done. In practice,
    of


    course, a web server spawns a lot of threads so that users don’t have to wait


    until a single available thread is ready. But this model has its limits: spawning


    and supporting a thread is not a cheap operation. When more users request the


    page from the server, it spawns more threads until it hits the thread limit or
    the


    server runs out of memory and CPU resources.


    Node.js works in a different way. Once you have requested the file data, you’re


    letting the script go. You provide the callback that is executed when the IO


    operation is done, and free the server to work with the next user. In other words,


    a server thread is not blocked during the reading operation. While the file is


    being read by some external process, a server also serves the request of


    another user or two. Once the file is fully read, it finishes the current job
    and


    calls the callback that you’ve provided.


    Figure 10-1 illustrates the typical flow for a blocking server. In this example,
    the first request causes the execution of a long-running operation on the server,
    like


    reading the big file or querying database for the complex data. The operation


    takes considerable time to finish. The other requests----2 and 3-----are very
    fast to process. Their results are returned to the browser almost immediately.


    In the case of the blocking server shown in Figure 10-1, requests 2 and 3 have


    to wait while the server is busy performing a long-running operation, even if
    the


    actual job is done elsewhere (for example, in the database software). The server


    can respond only when the long-running operation is finished, even if during that


    time it sits idly, performing no useful job.


    ![](index-405_1.jpg)


    ![](index-405_2.jpg)


    CHAPTER 10: Going Server-Side


    **Figure 10-1.** *Blocking server flow*


    Node.js uses a different approach, as shown in Figure 10-2\. While the long-


    running operation is in progress, Node.js can serve other requests. For example,


    it can return the responses for requests 2 and 3\. When the long-running task
    is


    finished, Node.js calls the registered callback and the script can serve the result'
