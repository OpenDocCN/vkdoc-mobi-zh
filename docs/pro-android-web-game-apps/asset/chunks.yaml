    # 第 12 章：制作多人游戏


    等待对手并准备开始游戏。这意味着除了我们已经拥有的组件外，还需要至少再创建两个：用于在客户端渲染的大厅 UI，以及用于通知新用户的服务器端支持。


    游戏架构中一个非常重要的变化是，客户端现在拥有多个屏幕（或状态）：大厅和游戏。在此之前，我们的游戏是在一个大画布上渲染的，唯一的游戏状态就是“游玩中”。然而，当你制作一款商业游戏时，它会有几个完全不同的屏幕，以完全不同的方式渲染，并支持一套完全不同的用户操作。例如，以下是一款在线策略游戏的几个屏幕：


    - 主菜单

    - 世界地图

    - 城市界面

    - 建筑与交易界面

    - 战场界面

    - 游戏内帮助界面

    - 设置界面


    这些屏幕充当游戏的子模块：它们提供了访问游戏不同方面的途径，你应该将它们视为独立的软件组件。如果你决定更新战场界面，那意味着只更新这个模块，而不是整个项目。我们即将实现的游戏非常简单：它只有两个屏幕（大厅和游戏板），但我们仍然需要思考一种好的方法，向用户显示正确的屏幕，并根据应用程序的当前状态处理输入。最后这项任务在
    HTML 触摸界面中非常简单：触摸事件总是分发给你触摸的组件，因此不可见的组件不会接收到任何事件。


    我们唯一缺少的重要部分就是传输方式的选择。在本章中，我们将使用`Socket.IO`库。在讨论完项目结构之后，我们将立即开始学习它。


    ## 项目结构


    这个项目的文件夹结构与典型的 Node 项目结构相同。我们来回顾一下，确保文件夹结构清晰。图 12-3 展示了项目完成时的样子。


    ![](img/index-485_1.jpg)


    **图 12-3.** *项目的结构*


    `main.js`文件是 Node.js 应用程序的入口点。用于浏览器 HTML 文件和客户端 JavaScript 文件的文件存放在`public`文件夹中。创建所描述的文件夹结构，并将我们在第
    3 章中创建的离线游戏代码放入`public`文件夹中。我将旧的`index.html`文件重命名为`offline.html`，以保持单人游戏版本可访问。新的`index.html`文件是多人游戏版本的入口点。


    ## 使用 Socket.IO 的游戏大厅


    `Socket.IO`是由 Guillermo Rauch（[`devthought.com`](http://devthought.com)）创建的项目，可在
    GitHub（[`github.com/LearnBoost/socket.io`](https://github.com/LearnBoost/socket.io)）或作为
    NPM 模块获取。该项目的目标是“模糊不同传输机制之间的差异”，正如官方项目页面（[`socket.io/`](http://socket.io/)）所述。更正式地说，`Socket.IO`是一个便捷的客户端-服务器库，它允许你在不考虑传输细节的情况下实现页面内网络连接。让`Socket.IO`回答一些底层问题，比如“在这个设备上使用哪种传输方式最好？”或“如何处理客户端重新连接时可能到来的消息？”或“如何跟踪所有客户端并在需要时向他们广播消息？”节省下来的时间可以用来构建更好的游戏。


    ![](img/index-486_1.jpg)


    **注意：** 如果说`Socket.IO`是唯一可用的浏览器网络库，那是不公平的。还有另一个不错的项目叫 Faye（[`github.com/faye/faye`](https://github.com/faye/faye)），由
    James Coglan（[`jcoglan.com`](http://jcoglan.com)）创建。它提供了类似的解决方案，并获得了开发者们的一些好评。

