    \ JavaScript 实现。该代理只有两个“需求”——进食与睡眠。它会在需要时随时睡觉，但进食的概率仅为 30%。这些清单本身相当不言自明，代码基于两种类型的决策节点。\n\
    \n`NumericDecision` 检查对象的参数；如果参数值“小于或等于”阈值，则将执行委托给 `leNode`，若大于阈值则委托给 `gNode`。该数值决策用于触发饥饿行为。当饥饿值高于\
    \ 50 时，代理会考虑寻找食物（有 30% 的概率）。我们需要的第二种节点是 `ProbabilisticNode`——它会根据随机数的值选择相应动作。\n\
    \n### **清单 13-6.** 决策树节点\n\n```javascript\n/**\n * 数值决策基于特定代理参数的值。\n * 若数值小于或等于阈值，执行\
