- fmt: "# 排版后的 Markdown 文档\n\nLet’s look at the following case: the user taps the\
    \ screen to add an object. That object ends up in the cache because it is added\
    \ to one of the visible clusters. It must be inserted into the correct place in\
    \ the cache, however, and not simply appended to the end. To preserve the order,\
    \ we mark the cache `'unsorted'`.\n\nThe code in Listing 7-22 shows this flow.\
    \ The `addObject()` function should be updated to take the cache into account.\n\
    \n## CHAPTER 7: Making an Isometric Engine\n\n**Listing 7-22.** *Updating `addObject()`\
    \ Function So That It Takes the Cache into Account*\n\n```\n_p.addObject = function(obj)\
    \ {\n    this._objects.push(obj);\n    var clusters = this._addToClusters(obj);\n\
    \    if (clusters.intersects(this._visibleClusterBounds)) {\n        this._cache.push(obj);\n\
    \        this._cacheUnsorted = true;\n    }\n};\n```\n\nThe second scenario: the\
    \ user removes an existing object. The order of other cached objects is preserved,\
    \ and the cache stays clean. The code in Listing 7-23 shows how to remove the\
    \ object from the layer; we have to update both the cache and the clusters.\n\n\
    **Listing 7-23.** *Removing Object from the Layer*\n\n```\n_p.removeObject = function(obj)\
    \ {\n    if (!Arrays.contains(obj, this._objects)) {\n        return;\n    }\n\
    \    this._removeFromClusters(obj);\n    Arrays.remove(obj, this._cache);\n};\n\
    \n_p._removeFromClusters = function(obj, clusterBounds) {\n    clusterBounds =\
    \ clusterBounds || this._idToClusterBounds[obj.getId()];\n    var startY = clusterBounds.y;\n\
    \    var endY = clusterBounds.y + clusterBounds.height;\n    for (var clusterY\
    \ = startY; clusterY < endY; clusterY++) {\n        var startX = clusterBounds.x;\n\
    \        var endX = clusterBounds.x + clusterBounds.width;\n        for (var clusterX\
    \ = startX; clusterX < endX; clusterX++) {\n            Arrays.remove(obj, this._clusters[clusterY][clusterX]);\n\
    \        }\n    }\n    delete this._idToClusterBounds[obj.getId()];\n};\n```\n\
    \nThe final use for the cache: the user scrolls away, the viewport intersects\
    \ new clusters, and the cache becomes invalid (or `'dirty'`). Some objects must\
    \ be added and some removed. The check for cache validity happens in every `setPosition()`\
    \ and `setSize()` call. Listing 7-24 shows the updated `setSize()` and `setPosition()`\
    \ functions; they can potentially change the clusters that the user sees, so they\
