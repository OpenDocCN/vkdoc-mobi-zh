    **Listing 4-7.** *The _loadItem Function That Initiates the Loading and Sets onload
    and onerror Callbacks* *for Every Image in the Queue*


    _p._loadItem = function(queueItem, itemCounter, onDone, onProgress) {


    var self = this;


    var img = new Image();


    img.onload = function() {


