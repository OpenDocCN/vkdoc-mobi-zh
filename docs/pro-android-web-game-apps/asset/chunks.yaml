    \ Web Audio API 则让你对整个处理过程拥有完全的控制权（当然，代价是代码更加复杂）。\n\n## Android 浏览器中的声音\n\n遗憾的是，Android\
    \ 浏览器对声音 API 的支持相当差。Web Audio API 仍属于尖端技术，尚未完全普及到移动平台。然而，即使是基本的 `audio` 标签支持，在\
    \ Android 中也有不少 bug 和局限性。原生应用的情况要好得多，但标准浏览器仍有很大的改进空间。\n\n第一个支持 `Audio` 元素的 Android\
    \ 版本是 Android 2.2，而那种“支持”相当……特殊。尽管浏览器能识别该元素本身，但它无法播放任何音频文件。这看起来更像是为未来扩展预留的一个空壳。因此，直到\
    \ Android 2.3 Gingerbread 版本才真正支持音频播放。不过，这距离完美依然非常遥远。\n\n说到音频文件，对播放音频的“支持”并不自动意味着浏览器能识别所有可能的音频格式。就像\
