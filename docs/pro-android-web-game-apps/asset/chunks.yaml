- fmt: "This problem can be fixed by checking if the closest node is visible before\
    \ selecting it. While it is usually not hard to code it, the algorithm might be\
    \ rather expensive to execute at runtime.\n\nManual placing of the nodes is quite\
    \ a cumbersome task too. There are a few ways to make the life of level designer\
    \ easier.\n\n## Raycasting (Line of Sight)\n\nIn many 2D games, if the node is\
    \ visible from the other node, then it is reachable. Using this simple rule, we\
    \ can generate the edges of the waypoint graph automatically: it’s much easier\
    \ to place vertices. Take a look at Figure 13-14, which shows this idea. The nodes\
    \ are placed by the level designer. Then we cast a virtual ray between every pair\
    \ of nodes and check if there are any obstacles in between. If the line of sight\
    \ is clear, the edge is added to the graph:\n\n![](index-534_1.jpg)\n\n![](index-534_2.jpg)\n\
    \n**Figure 13-14.** *Line of sight is used to generate edges of the waypoint graph\
    \ automatically.*\n\n## Navigation Meshes\n\nThe most popular technique in modern\
    \ game development is navigation meshes, or simply navmeshes. The idea behind\
    \ it is to let the level designer prepare the graph, but instead of putting individual\
    \ nodes, he draws polygons to mark a ‘movable’ area (see Figure 13-15).\n\n**Figure\
    \ 13-15.** *An example of the navmesh and a navigation graph built with it*\n\n\
    There are many advantages of using this approach. The character doesn’t need to\
    \ pick the closest waypoint anymore, so he will not try to step through the wall\
    \ to get there. A level designer is comfortable with moving polygons around and\
    \ he will be comfortable with navmeshes too. The last important property of a\
    \ navmesh is that the character should be able to move from any point on his polygon\
    \ to any point on any adjacent polygon. In other words, the character does not\
    \ need to follow paths that might look like rails. With navmeshes, the character\
    \ can implement smarter and more natural movement algorithms.\n\nOnce you build\
    \ the pathfinding graph and implement the pathfinding algorithm, you can build\
    \ the actual movement of the character through the level. Use the techniques described\
    \ in Chapter 4 to build the animation of the character that moves from one waypoint\
    \ to the other.\n\n## Decision Making\n\nNow the agent can move through the level,\
    \ but the behavior is not quite intelligent yet. What should the character do\
    \ next? Run, chase the enemy, find food, or take some rest? This is the usual\
    \ question for the decision-making AI. In everyday life, every human being needs\
    \ information of some sort in order to make a decision. For example, if I am a\
    \ little hungry, and there is a sandwich on my desk, I will eat it. If I am really\
    \ hungry, and there is no sandwich on the table, but there is a sandwich in a\
    \ kitchen, I will go and grab that one. To make a decision, I had to observe my\
    \ internal state (am I hungry or not?) and the world around me (where is the sandwich?).\n\
    \nIn the simplest case, a decision-making AI acts almost the same way. However,\
    \ the internal and external conditions are presented in a more formal way:\n\n\
    ```\nmakeDecision() {\n  if (!isHungry()) {\n    workMore();\n  } else if (isLittleHungry())\
    \ {\n    if (isSandwichOnTheDesk()) {\n      eat();\n    } else {\n      workMore();\n\
    \    }\n  } else if (isVeryHungry()) {\n    if (isSandwichOnTheDesk() || isSandwichInTheKitchen())\
    \ {\n      eat();\n    } else {\n      workMore();\n    }\n  }\n}\n```\n\nThis\
    \ type of the presentation is called a decision tree, because it is easy to represent\
    \ and configure in the form of a tree (see Figure 13-16).\n\n![](index-536_1.jpg)\n\
    \n![](index-536_2.jpg)\n\n**Figure 13-16.** *An example of a decision tree*\n\n\
    When each node is a separate JavaScript object that can check the condition and\
    \ return either a decision or another node, the resulting system can be configured\
    \ to implement rather interesting AI behaviors.\n\nThere are many different types\
    \ of decision trees. For example, the tree doesn’t have to contain only yes/no\
    \ branches. It can have multiple branches, or probabilistic conditions, as shown\
    \ in Figure 13-17."
