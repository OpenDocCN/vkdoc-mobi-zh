- fmt: "第一个参数是我们加载的`Image`对象。接下来的四个参数：`sx`、`sy`、`sWidth`和`sHeight`定义了要绘制的图像部分，此矩形外的所有内容将被忽略。参数名中的小写‘`s`’代表“`source`”（源）。最后四个参数定义画布上的一个矩形，用于将图像部分绘制进去。参数名中的小写‘`d`’代表“`destination`”（目标）。\n\
    \n如果目标矩形与源矩形不同（更大、更小或边长比例不同），图像将被缩放以适应目标区域（见图4-6）。栅格图像在未缩放时效果最佳，因此应尽量保持源矩形和目标矩形的大小一致。不过，这种效果可用于制作精美的动画。\n\
    \n**图4-6.** 如果源矩形与目标矩形不同，图像将被缩放以适应目标区域。此示例显示了一个不成比例的变化，导致图像在宽度方向上的缩放程度大于高度方向。\n\
    \n*回想一下，精灵图缩放效果不佳。过度缩放或不成比例缩放会使精灵图看起来相当糟糕。*\n\n现在，让我们加载精灵图表并在画布上绘制一个精灵。第一步是使用`ImageManager`加载图像。完成后，我们就可以继续绘制实际的精灵图。清单4-13中的函数绘制了一个单独的动画帧。\n\
    \n**第4章：动画与精灵**\n\n**141**\n\n**清单4-13.** 从精灵图表绘制单个精灵的函数\n```javascript\nfunction\
    \ drawPlayer() {\n    var canvas = document.getElementById(\"mainCanvas\");\n\
    \    var ctx = canvas.getContext(\"2d\");\n    var playerImage = imageManager.getImage(\"\
    player\");\n    ctx.drawImage(playerImage, 8, 8, 40, 40, 50, 50, 40, 40);\n}\n\
    ```\n\n如你所见，我们限定了图像区域——第一个矩形`(8, 8, 40, 40)`覆盖了一个动画帧。源矩形的大小与目标矩形相同，因此图像不会被缩放。这是从精灵图表绘制精灵的常用方法。关于如何在画布上绘制图像的完整示例，可在本章源代码的`03.drawing_image.html`文件中找到。\n\
    \n还有另外两种绘制图像的方式，如清单4-14所示。\n\n**清单4-14.** `drawImage`的简写版本\n```javascript\n//\
    \ 在画布的 (dx, dy) 点绘制整个图像，不进行缩放。\nctx.drawImage(image, dx, dy);\n// 这是以下完整版本的简写\n\
    ctx.drawImage(im, 0, 0, im.width, im.height, dx, dy, im.width, im.height);\n\n\
    // 缩放图像以适应矩形 (dw, dh) 并在 (dx, dy) 处绘制\ndrawImage(image, dx, dy, dw, dh)\n// 这是以下完整版本的简写\n\
    ctx.drawImage(im, 0, 0, im.width, im.height, dx, dy, dw, dh);\n```\n\n这些版本的绘图函数参数数量较少。但它们都作用于整个源图像，不允许从精灵图表中选取精确的帧。这就是为什么它们在游戏开发中不太有用。\n\
    \n**绘制性能**\n\n在基于精灵的游戏中，每个人都会问同样的问题：每帧实际能绘制多少个精灵？绘制四个小的`32 × 32`图像效果好，还是使用一个大的`64\
    \ × 64`图像更好？答案很大程度上取决于三个参数：硬件、软件以及你正在使用的图像。我在[http://jsperf.com/draw-image](http://jsperf.com/draw-image)上编写了几个测试，来观察它在不同浏览器和硬件上的实际表现。我检查了`PNG`透明度、图像大小、图像内容和缩放如何影响绘制性能。\n\
    \n当我第一次执行这些测试时，我对结果感到惊讶。不同的浏览器似乎针对不同类型的图像渲染进行了优化。\n\n**第4章：动画与精灵**\n\n例如，谷歌`Chrome`以几乎相同的速度渲染每种类型的图像：无论大小、是否透明、是从精灵图表中截取的还是原样绘制的。其他浏览器的表现则完全不同。"
  raw: 'The first parameter is the Image object that we loaded. The next four parameters:


    sx, sy, sWidth, and sHeight define the part of the image to draw; everything


    outside of this rectangle is ignored. The small ‘ s’’ in the parameter name stands


    for ‘ source.’’ The last four parameters define the rectangle on a canvas to draw


    the part of the image into. The lowercase ‘ d’’ in the name of parameters stands


    for ‘‘destination.’’


    If the destination rectangle is different from the source rectangle (it’s bigger,


    smaller, or has a different proportion of the sides), the image is resized to
    fit the destination area (see Figure 4-6). Raster graphics look best when they
    are not


    resized, so you should attempt to keep the size of the source and destination


    rectangles the same. This effect can be used for nice-looking animations,


    however.


    **Figure 4-6\.** **If the source rectangle is different from the destination rectangle,
    the image will be resized* *to fit it. This example shows a disproportional change
    that causes the image to scale more in width* *than height.**


    *As you recall, sprites do not scale well. Scaling too much or disproportionately


    can make sprites look quite bad.


    Now let’s load the sprite sheet and draw a sprite on the canvas. The first step
    is


    to use the ImageManager to load the image. Once this is done, we can proceed


    to drawing the actual sprite. The function in Listing 4-13 draws a single


    animation frame.


    CHAPTER 4: Animation and Sprites


    **141


    **Listing 4-13\.** **The Function That Draws a Single Sprite from the Sprite Sheet*
    function drawPlayer() {*


    *var canvas = document.getElementById("mainCanvas");


    var ctx = canvas.getContext("2d");


    var playerImage = imageManager.getImage("player");


    ctx.drawImage(playerImage, 8, 8, 40, 40, 50, 50, 40, 40);


    }


    As you see, we limit the area of the image-----the first rectangle (8, 8, 40,
    40)


    covers one animation frame. The size of the source rectangle is the same as the


    size of the destination rectangle, so the image is not resized. This is the usual


    way to draw sprites from a sprite sheet. The complete example of how to draw


    an image on the canvas is available in the 03.drawing_image.html file with the


    source code for this chapter.


    There are two other ways to draw an image, as shown in Listing 4-14.


    **Listing 4-14.** *Shorthand Versions of the drawImage*


    // Draws the whole image without scaling at (dx, dy) point of the canvas.


    ctx.drawImage(image, dx, dy);


    // This is a shorthand version of


    ctx.drawImage(im, 0, 0, im.width, im.height, dx, dy, im.width, im.height);


    // Scales the image to fit the rectangle (dw, dh) and draws at (dx, dy)


    drawImage(image, dx, dy, dw, dh)


    // This is a shorthand version of


    ctx.drawImage(im, 0, 0, im.width, im.height, dx, dy, dw, dh);


    These versions of the drawing function have a smaller numbers of parameters.


    But they both work with the whole source image and do not allow picking the


    exact frame from the sprite sheet. That’s why they are less useful for game


    development.


    **Drawing Performance**


    When it comes to a sprite-based game, everybody asks the same questions:


    how many sprites can I actually draw per frame? Is it better to draw four small


    32 × 32 images or use one big 64 × 64 instead? The answer very much depends


    on three parameters: hardware, software, and the image that you are using. I’ve


    written several tests [on http://jsperf.com/draw-image to](http://jsperf.com/draw-image)
    see how it really works on different browsers and hardware. I checked how PNG
    transparency,


    image size, image content, and scaling affect drawing performance.


    When I first executed these tests, I was surprised by the results. It looks like


    different browsers are optimized for the rendering of different types of images.


    CHAPTER 4: Animation and Sprites


    Google Chrome, for example, rendered every type of image with almost the


    same speed: big or small, transparent or not, cut from the sprite sheet or


    painted as is. Other browsers performed in a totally different manner. Opera'
