    };\n```\n\n别忘了从父类调用 `_throwIfStarted()` 方法——我们必须确保在动画循环中不会破坏正在执行的操作。\n\n以上是简单部分。现在我们需要做两件事：\n\
    - 在加速/减速的基础上应用新的缓动函数。\n- 当计算出进度值后，将其传递给对象的 setter。\n\n利用我们的钩子函数（见列表 4-36）可以轻松实现。用于预处理值的\
    \ `_timingEventPreprocessor()` 是应用自定义缓动的最佳位置。另一个名为 `_onUpdate()` 的函数则允许我们在完成更新前执行自定义操作。\n\
    \n**列表 4-36.** 为动画器添加新功能的自定义钩子函数\n\n```javascript\n// 在返回进度值前调用，重定义此函数可设置自定义缓动行为替代默认行为\n\
    _p._timingEventPreprocessor = function(fraction) {\n  fraction = Animator.prototype._timingEventPreprocessor.call(this,\
    \ fraction);\n  if (this._easingFunction) {\n    fraction = this._easingFunction.call(this,\
    \ fraction);\n    // 如果缓动函数返回值大于 1 或小于 0，则将其修剪到允许区间内\n    if (fraction > 1) fraction\
    \ = 1;\n    if (fraction < 0) fraction = 0;\n  }\n  return fraction;\n};\n\n//\
    \ 在进度值计算完成后、更新函数末尾调用。此钩子允许在返回进度值前执行额外操作。\n// 在本例中，我们调用对象的 setter\n_p._onUpdate\
    \ = function(fraction) {\n  this._props.forEach(function(item) {\n    item.setter.call(this,\
    \ (1 - fraction) * item.start + fraction * item.end);\n  }, this);\n};\n```\n\n\
    这很容易实现。现在轮到你了。想一个炫酷的动画效果并尝试实现它。试试不同的缓动函数。如果使用 `Math.sin` 或 `Math.cos`，或者两者结合会怎样？你知道的，看起来可能很酷！本章提供的其他源代码中包含两个使用\
    \ `Animator` 的示例。第一个示例 `06.animator.html` 展示了两点之间的简单移动。第二个示例 `07.swinging_axe.html`\
    \ 展示了如何结合精灵的位置、角度和大小变化来实现挥斧头的效果。\n\n恭喜！现在你不仅掌握了动画的基础知识，还了解了一些高级特性。但动画还不是游戏，用户需要一种与游戏世界互动的方式。而这正是我们下一章要学习的内容！\n\
    \n## 总结\n\n在本章中，我们学习了图像加载和动画的基础知识。我们从加载图像开始，了解了两种将图像数据传入浏览器的方式——从文件加载和从数据 URI\
    \ 加载。我们学习了如何处理实际开发中可能出现的加载错误，比如连接中断或服务器上文件缺失。我们还学习了如何组织精灵表以及如何在画布上渲染图像。\n\n下一步是掌握动画技术，从简单的屏幕帧切换，到更复杂的主题，例如优化动画一致性、处理加速与减速，以及自定义缓动函数。\n\
    \n我们简要概述了支持本章所述大部分技术的类——`Animator`（完整源代码随本章其他材料一同提供）。我们学习了如何使用 `Animator` 将更新动画状态（进度值）的代码与在屏幕上渲染新状态（即改变帧或元素位置）的代码解耦。\n\
    \n掌握动画处理技巧仍不足以制作完整的游戏——但我们已接近目标！游戏的核心在于玩家与游戏世界的交互。在下一章中，我们将学习如何响应用户输入，让玩家控制屏幕上的角色。\n\
    \n**事件处理与**\n"
- fmt: '# Chapter 5: Event Handling and User Input


    ## User Input


    This chapter is devoted to several important topics: handling user input, implementing
    custom event handlers, and building comfortable game controls. The main goal is
    to provide you with some solid knowledge of available input mechanisms and inspire
    you to create a seamless and natural interface between the player and the game
    world.


    The patterns of input are quite different between mobile devices and desktop browsers.
    Touchscreens provide a more intuitive way to control the interface, not only in
    games but also in regular applications. It is more natural to touch a button with
    your finger, even if the button itself is just a rectangle of glowing pixels on
    the screen. It is more natural to point to the place on the game map where your
    new building should appear, or to send your troops into battle, drawing the direction
    of the attack straight on the battlefield.


    Touch interfaces have made huge progress towards intuitive and user-friendly controls,
    since they provide a direct interaction between the user and the UI. Even a two-year-old
    kid can deal with touchscreens, whereas the mouse and keyboard require more skill.


    The browser input API is built around events, event emitters, and event listeners.
    The idea of passing small messages (or ''events'') to the listeners whenever something
    important happens with the object is not unique to input handling. For example,
    the `JavaScript` class responsible for communication with the server may use events
    to notify other classes that a new message has just been posted to a certain chatroom.
    The chat UI that listens to events would then update itself and show the new message
    to the user. In this chapter, we will look into the details of this architecture
    and learn how to build our own implementation suitable for most game development
    purposes.


    The knowledge of the basics allows us to build more-advanced input models like
    drag-and-drop, joystick emulation, and so on. We will learn how to implement ''picking,''
    the selection of a complex shape with a mouse or touch action.


    In summary, our goal is to learn the following:


    - How to build the custom event emitter

    - The differences between the mouse and touch interfaces

    - How to build the abstraction layer to hide the details of the underlying input
    system (mouse or touch) and use the lowest common denominator

    - How to implement drag-and-drop

    - How to find a suitable solution for pixel-perfect object picking

    - How to simulate a joystick on a web page


    ## Browser Events


    Touch devices give the user a completely different interaction experience than
    regular desktop computers, which are controlled with the mouse and keyboard. It
    should come as no surprise that the browser events are different too. In this
    section, we will learn the strengths and weaknesses of both types of controls.
    Afterwards, we will try to build a common input handling interface to hide the
    details of the underlying system from the rest of the game.


    ### Desktop Browser vs. Android Browser Input


    Whereas a desktop user is limited to the mouse and keyboard (which act like ''mediators''
    between the person and the computer), the mobile gamer can do much more: rotate
    and shake the device, touch and slide the screen, move along the streets of the
    real world in order to complete the game objectives, take photos, and stream video.


    Of course, mobile controls are not perfect either: they fail fast when it comes
    to activities that are common to the keyboard. A good example is the input for
    e-mail; typing text is easier to accomplish with a physical keyboard. Let''s review
    the pros and cons of mobile controls to know how to use its strengths and avoid
    its weaknesses.


    #### Strengths of mobile controls:


    - Mobile controls feel more natural. The user points with his finger rather than
    a mouse cursor; he feels more like he''s interacting with the objects of the game
    world.

    - Mobile devices support multitouch. It is like having 10 mouse pointers!'
