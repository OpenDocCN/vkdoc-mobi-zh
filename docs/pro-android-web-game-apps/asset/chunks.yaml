  trans: "\n# 事件处理与用户输入\n\n## 常规 DOM 事件监听器\n\n常规 DOM 事件（如 `touchstart` 或 `mousedown`）的\
    \ `listener`，会将浏览器事件转换为自定义的 `down` 事件并立即触发。同时还会保存交互起始点的坐标，后续需要这些坐标来检查用户是否超过了移动阈值。\n\
    \n## 第 5 章：事件处理与用户输入\n\n### 清单 5-15. `_onDownDomEvent`：将“交互起始”事件转换为自定义格式\n\n```javascript\n\
    /**\n * 监听“down”类型的 DOM 事件：mousedown 和 touchstart。\n * @param e DOM 事件\n */\n\
    _p._onDownDomEvent = function(e) {\n    // 必须保存这些坐标以支持 moveThreshold——这\n    //\
    \ 可能是移动的起始点，不能简单地\n    var coords = this._lastMoveCoordinates = this._getInputCoordinates(e);\n\
    \n    // 触发“down”事件——所有坐标以及\n    // 原始 DOM 事件都会传递给监听器\n    this.emit(\"down\"\
    , {x: coords.x, y: coords.y, domEvent: e});\n\n    // 通常我们希望阻止浏览器对原始 DOM 事件的进一步处理。\n\
    \    this._stopEventIfRequired(e);\n};\n```\n\n接下来是清单 5-16 所示的 `_onUpDomeEvent()`\
    \ 函数。它稍微复杂一些。顾名思义，它处理移动事件：`touchmove` 和 `mousemove`。`_onUpDomeEvent` 的主要任务是跟踪位移增量和阈值。如果从\
    \ `down` 事件到当前点的距离超过阈值，则这不是微移动。一旦突破阈值，我们就不再需要检查它。`_moving` 标志会在移动结束后重置。\n\n###\
    \ 清单 5-16. `_onMoveDomEvent` 跟踪移动并检查阈值是否被突破\n\n```javascript\n/**\n * 监听“move”类型的\
    \ DOM 事件：mousemove 和 touchmove。该函数\n * 略微复杂。它会跟踪自上次“move”动作以来移动的距离，\n * 此外，如果仍处于\
    \ _moveThreshold 范围内，则忽略移动并吞掉事件。\n * @param e DOM 事件\n */\n_p._onMoveDomEvent\
    \ = function(e) {\n    var coords = this._getInputCoordinates(e);\n\n    // 计算位移增量\n\
    \    var deltaX = coords.x - this._lastMoveCoordinates.x;\n    var deltaY = coords.y\
    \ - this._lastMoveCoordinates.y;\n\n    // 检查阈值，如果从初始点击到当前位置的距离\n    // 大于阈值，则将其判定为真实移动\n\
    \    if (!this._moving && Math.sqrt(deltaX*deltaX + deltaY*deltaY) > this._moveThreshold)\
    \ {\n        this._moving = true;\n    }\n\n    // 如果当前交互正在“移动”中（已经越过了阈值）\n  \
    \  // 则触发事件，否则忽略该交互。\n    if (this._moving) {\n        this.emit(\"move\", {x:\
    \ coords.x, y: coords.y, deltaX: deltaX, deltaY: deltaY, domEvent: e});\n    \
    \    this._lastMoveCoordinates = coords;\n    }\n\n    this._stopEventIfRequired(e);\n\
    };\n```\n\n## 第 5 章：事件处理与用户输入（续）\n\n下一个函数是 `_onUpEvent`，即监听 `touchend` 和 `mouseup`\
    \ 事件的监听器，如清单 5-17 所示。它的工作非常简单：将事件转换为自定义格式并重置 `_moving` 标志。移动结束，下一次移动将再次跟踪阈值。\n\
    \n### 清单 5-17. `_onUpDomEvent`：处理交互结束并清除 `_moving` 标志的函数\n\n```javascript\n/**\n\
    \ * 监听“up”类型的 DOM 事件：mouseup 和 touchend。Touchend\n * 不包含关联的坐标，因此该函数\n * 会在 TouchInputHandler\
    \ 中被重写\n * @param e DOM 事件\n */\n_p._onUpDomEvent = function(e) {\n    // 工作方式与\
    \ _onDownDomEvent 完全相同\n    var coords = this._getInputCoordinates(e);\n\n   \
    \ this.emit(\"up\", {x: coords.x, y: coords.y, moved: this._moving, domEvent:\
    \ e});\n    this._stopEventIfRequired(e);\n\n    // 交互结束。重置标志\n    this._moving\
    \ = false;\n};\n```\n\n该类中最后一个工具函数 `_stopEventIfRequired()` 的代码非常直观（见清单 5-18）。正如我们讨论过的，它会阻止浏览器事件的传播并阻止默认操作。\n\
    \n### 清单 5-18. 阻止事件：通常用户除了游戏行为外，不希望浏览器默认行为同时发生\n\n```javascript\n_p._stopEventIfRequired\
    \ = function(e) {\n    if (this._stopDomEvents) {\n        e.stopPropagation();\n\
    \    }\n};\n```\n"
