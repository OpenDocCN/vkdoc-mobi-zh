    };\n```\n\nTo add the object, we first need to find the overlapping clusters (the\
    \ `getOverlappingGridCells()` function that does exactly that is already present\
    \ in the `Rect` class). Then we push the object to the arrays and save the bounds\
    \ into the `_idToClusterBounds`. Listing 7-20 shows how to do it.\n\n**Listing\
    \ 7-20.** Adding Objects to Clusters\n\n```javascript\n_p._addToClusters = function(obj,\
    \ clusterBounds) {\n    clusterBounds = clusterBounds || obj.getBounds().getOverlappingGridCells(\n\
    \        this._clusterSize, this._clusterSize,\n        this._clusters[0].length,\
    \ this._clusters.length);\n\n    var startY = clusterBounds.y;\n    var endY =\
    \ clusterBounds.y + clusterBounds.height;\n    \n    for (var clusterY = startY;\
    \ clusterY < endY; clusterY++) {\n        var startX = clusterBounds.x;\n    \
    \    var endX = clusterBounds.x + clusterBounds.width;\n        \n        for\
    \ (var clusterX = clusterBounds.x; clusterX < endX; clusterX++) {\n          \
    \  this._clusters[clusterY][clusterX].push(obj);\n        }\n    }\n\n    this._idToClusterBounds[obj.getId()]\
    \ = clusterBounds;\n    return clusterBounds;\n};\n```\n\n## Object Cache\n\n\
    Once every object is assigned to the cluster, we can start drawing them. The process\
    \ would look like the following:\n\n1. Determine which clusters are currently\
    \ visible to the user.\n2. Get all the objects registered in those clusters.\n\
    3. Remove duplicate objects.\n4. Sort objects.\n5. Draw objects.\n\nIf the user\
    \ has not crossed the cluster bounds since the last frame, steps 2 to 4 will give\
    \ exactly the same result. This might not be true in the case of moving objects,\
    \ but we will deal with them later in this section. For now, let’s assume that\
    \ objects are not moving. Let’s use this fact to optimize the rendering of objects\
