    ## Implementing Object Clusters\n\nThe next step is to optimize the object rendering\
    \ process. Right now, no matter how big or small the world is, every single object\
    \ is checked against the viewport, and what’s worse is that if objects are moving,\
    \ the whole collection must be sorted to keep the consistent order of drawing.\n\
    \nIt is wise to work only with a small number of objects near the viewport, and\
    \ ignore other objects until they are close enough. To do that, we break the world\
    \ space into several areas, or clusters, and assign each object to one or several\
    \ such clusters. When we need to render the frame, we check only those clusters\
    \ that intersect the current viewport. Figure 7-16 illustrates this idea.\n\n\
    The figure shows the example breakdown of the world into square clusters. Each\
    \ cluster except for `(2,0)` holds one object. The hut between `(1, 1)` and `(2,\
    \ 1)` belongs to both of these clusters since it overlaps both of them. The viewport\
    \ intersects with four clusters (highlighted on the image), so only two objects\
    \ participate in rendering.\n\n**Figure 7-16.** *An example of cluster layout.\
    \ The viewport intersects four clusters. Only two objects participate in rendering.*\n\
    \nTo break down the world into a grid, we need to know the parameters of the grid:\
    \ the size of the cell and the size of the world. Update the constructor and add\
    \ these parameters to the class.\n\nThe next step is to create the data structure\
    \ to store the objects within the clusters. A three-dimensional array is the obvious\
    \ choice: two dimensions for the grid and a third dimension for storing objects.\
    \ An array is the fast way to answer the question of which objects belong to a\
    \ given cluster. For the reverse question, we need another data structure. The\
    \ map from the object’s ID to the rectangular set of clusters will do. After you\
