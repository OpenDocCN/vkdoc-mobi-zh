- fmt: "Let’s get back to the hook functions that I mentioned. They are empty in the\
    \ default implementation of `Animator`, but their main use is to give you the\
    \ chance to extend it with your own cool features.\n\nLet’s utilize our sprite\
    \ once more and create an extended version of `Animator` that can automatically\
    \ set certain properties of an object; for example, change the height of an arbitrary\
    \ object from 30 to 150 pixels, hiding the formulas inside. Wouldn’t it be nice\
    \ to write some code like this? We will use the hook functions to plug the custom\
    \ logic into the default `Animator` implementation without changing the code for\
    \ the class.\n\nWhen you design the API for other developers, it is usually a\
    \ good idea to think about the ways to customize your logic. Each developer has\
    \ his own vision of what kind of trickery your class should perform. Instead of\
    \ trying to predict every possible use case, add a few extension points as `Animator`\
    \ does, and allow other developers to implement their own ideas while leaving\
    \ your class consistent. Listing 4-33 shows the code from a client’s perspective.\n\
    \n**Listing 4-33.** *`PropertyAnimator`: The Class That Can Set Any Property of\
    \ the Class Within the Animation*\n\n```js\nanimator = new PropertyAnimator(1000,\
    \ [{\n  \"setter\": setHeight,\n  \"start\": 30,\n  \"end\": 100\n}, {\n  \"setter\"\
    : setTransparency,\n  \"start\": 50,\n  \"end\": 255\n}]);\nanimator.setEasingFunction(function(fraction)\
    \ {\n  return fraction*fraction*fraction;\n});\nanimator.setRepeatCount(Animator.INFINITE);\n\
    animator.setRepeatBehavior(Animator.RepeatBehavior.REVERSE);\nanimator.setAcceleration(0.8);\n\
    animator.setDeceleration(0.15);\nanimator.start();\n```\n\nFor each property that\
    \ animator has to change, you pass the name of the setter function, the starting\
    \ value of the property, and the end value. The rest of the work is left for a\
    \ framework. (What? Aren’t two classes enough to call it a framework?)\n\nLet’s\
    \ make the task even harder and add a support for custom functions to alter the\
    \ value of the fraction before passing it to the setter. The usual animation rules\
    \ just aren’t enough for this exceptional object and I demand it to grow with\
    \ a quadratic, nay, cubic increase!\n\n**NOTE:** The function that does preprocessing\
    \ of the fraction value is often called an *easing function*. You can achieve\
    \ a lot of very exciting animation effects even with the simplest easing functions.\
    \ The code that applies acceleration and deceleration is a type of easing function\
    \ too. Have a look at jQuery UI Effects ([http://jqueryui.com/demos/effect/easing.html](http://jqueryui.com/demos/effect/easing.html))\
    \ for some inspiration on using easing functions. The pictures are interactive,\
    \ so click to see different animation effects.\n\nUnfortunately, there are not\
    \ enough pages in this book to cover everything I’d like to. And since easing\
    \ functions are a bit of a geeky topic, I leave it to your independent exploration.\n\
    \nLet’s try to extend our `Animator` to match these requirements. Of course, we\
    \ don’t want to touch the base class and add more and more code there — it will\
    \ eventually become too big and slow. That’s why we create a new class called\
    \ `PropertyAnimator`.\n\nThe constructor goes first, as usual. We need just two\
    \ parameters and two extra properties to support the new features (see Listing\
    \ 4-34).\n\n**Listing 4-34.** *The Constructor of `PropertyAnimator`*\n\n```js\n\
    function PropertyAnimator(duration, props) {\n  Animator.call(this, duration);\n\
    \  this._props = props;\n  this._easingFunction = null;\n}\n```\n\nNext, we need\
    \ the setter for the easing function. You should check if the parameter that is\
    \ passed to your setter is valid. The restrictions for the easing function are\
    \ (1) it should be a function that takes one parameter as the argument, and (2)\
    \ it returns a number between 0 and 1. The only restriction that we can test in\
    \ the setter is that the new value is a function, as shown in Listing 4-35.\n\n\
    **Listing 4-35.** *Setter for Easing Function*\n\n```js\n_p.setEasingFunction\
    \ = function(easingFunction) {\n  this._throwIfStarted();\n```"
