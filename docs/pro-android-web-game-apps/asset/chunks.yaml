  trans: "\n# `doctypes`、脚本块中语言的显式声明等\n\n由于所有现代浏览器都已支持 HTML5，至少是在其基本层面，这个 HTML 页面虽然是空的，但它包含了\
    \ JavaScript 代码的入口点：`init()` 方法。这个方法在 HTML 文件加载、解析完毕，并且文档对 JavaScript 完全可用后执行。这是放置初始化逻辑的理想位置：显示“加载”屏幕、初始化并分配事件监听器，或开始加载外部资源。目前，该方法为空，但我们很快会向其中添加绘图代码。基本\
    \ HTML 骨架的代码可在本章的 `1.skeleton.html` 文件中找到。\n\n现在，我们已准备好开始探索 canvas 了。\n\n---\n\
    \n## 什么是 Canvas？\n\nCanvas 是一种相对较新的 HTML 元素。这类元素的概念由苹果公司在 2004 年引入。它允许你绘制任意图形，例如几何图元、形状和图像、渐变、描边和填充。它还拥有丰富的\
    \ API 来控制输出，支持缩放、旋转等变换以及逐像素图像处理。通过额外的工作，它还可以用于图像处理和应用高级效果。\n\nCanvas 的工作方式与常规\
    \ HTML 渲染不同。使用 HTML 时，你创建元素并将其附加到 DOM 树中。一旦附加，你就可以通过 CSS 改变它们的外观和位置。如果你将一个 `div`\
    \ 向左移动 100 像素，它之前的区域会神奇地变为空白，而 `div` 出现在新位置。操作 HTML 节点就像桌子上放着十几张带图像的纸张；你可以将它们移动、叠放或丢弃，如图\
    \ 2-1 所示。\n\n**图 2-1.** *当你在 HTML 页面中移动一个 `div` 时，无需担心清除内容；你只需改变坐标，`div` 就会在新位置渲染。虚线边框表示\
    \ `div`；虚线边框表示正在移动的 `div`。*\n\nCanvas 更像是在……画布上作画。没错，就是那种真实世界中由织物制成的画布。一旦你画上了什么，它就会一直存在，直到你将其擦除或在上面画上别的东西。要“移动”图像，你首先需要擦除旧图像，恢复所有可能受移动影响的其他对象，然后再在新位置重新绘制图像。请看图\
    \ 2-2，它说明了这一概念。\n\n**图 2-2.** *要改变图像的位置，你首先必须清除其原始位置，恢复可能受影响的其它对象，然后将图像绘制到新位置。*\n\
    \n清单 2-2 是一个演示 Canvas API 的示例。通读代码，感受一下 Web 开发的“canvas 风格”。\n\n**清单 2-2.** *Canvas\
    \ API 示例*\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"\
    utf-8\" />\n<style>\n</style>\n<script>\nfunction init() {\n    var canvas = document.getElementById('mainCanvas');\n\
    \    var ctx = canvas.getContext('2d');\n    ctx.clearRect(0, 0, 300, 300);\n\
    \    ctx.fillStyle = \"lightgray\";\n    ctx.fillRect(10, 10, 50, 50);\n}\n</script>\n\
    </head>\n<body onload=\"init()\">\n<canvas id=\"mainCanvas\" width=\"300px\" height=\"\
    300px\"></canvas>\n</body>\n</html>\n```\n\n如你所见，canvas 是一个常规的 DOM 元素，就像 `div`\
    \ 或 `table` 一样。它的行为方式与其他节点完全相同：可以通过 `document.createElement()` 创建，附加到父节点，或使用 CSS\
    \ 设置样式。它可以有外边距、内边距、边框、位置等等。在 `var ctx = canvas.getContext('2d')` 这一行之后，神奇的事情就开始发生了。\n\
    \n## 上下文\n\n上下文（清单 2-2 中的 `ctx`）决定了 canvas 的“绘图模式”。从实际角度来看，这个对象就像是访问整个绘图方法集的接入点。再次查看这个清单。\n"
- fmt: '`Context`是负责设置绘制颜色和绘制形状的对象。`ctx`的类型是`CanvasRenderingContext2D`，但为简单起见，我们将其简称为`context`。如果你仍然对`canvas`及其`context`之间的关系感到困惑，可以将`canvas`视为一个看起来像透明矩形的普通DOM元素，而`context`则是用于在其上绘制的入口点，是一系列用于绘制内容的函数集合。


    **注意：** 此时，你可能会问：为什么我要调用`canvas.getContext(''2d'')`？为什么是`''2d''`？也许还有其他类型的`context`，比如`''3d''`？W3C规范定义：`getContext`“返回一个对象，该对象暴露了用于在`canvas`上绘图的API。第一个参数指定了所需的API。后续参数由该API处理。”


    这基本上意味着你可以从`canvas`中获取不同的`context`，它们会暴露不同的API集合，例如3D API。具体能获取到什么取决于浏览器。2D `context`的结果由W3C规范明确定义。


    2007年，Opera发布了首个支持自定义3D canvas的实验性构建版本；你需要通过获取`"opera-3d"` `context`来访问它。2011年3月3日发布的WebGL[规范](https://www.khronos.org/registry/webgl/specs/1.0/)定义了名为`"webgl"`的`context`，用于访问标准化的3D
    `context`。（我们将在第9章深入探讨WebGL。）


    因此，`''2d''`并非一个可以省略的随意术语。


    这一解释应当能清楚地说明，“canvas可以绘制曲线”这种说法为何不完全正确。能够或不能够进行绘制的并非`canvas`本身，而是图形`context`（即API）。在一个`context`中完全合理的操作（如2D中的曲线），在另一个`context`中（如WebGL中的曲线）可能无法实现。


    ![](index-54_1.jpg)


    ## 第2章：浏览器中的图形：Canvas元素


    ### 坐标系


    坐标定义了你要将某个图形绘制在哪个确切位置，或者图形的大小。几乎每次调用`canvas` API都会涉及坐标。如果要绘制一个矩形，你必须设置其左上角坐标、宽度和高度。对于圆形，你需要圆心和半径。这些坐标具体是什么？它们又是如何工作的？


    2D `context`定义了一个矩形的位图区域。该`context`使用经典的笛卡尔坐标系来引用其中的各个点。有两个轴：水平轴称为`x`，垂直轴称为`y`。`x`轴向右增加，`y`轴向下增加。`x`和`y`都设置为0的点称为原点；它位于位图的左上角。图2-3显示了四个点，其中一个是原点。每个点旁边都用括号标出了其坐标。


    **图2-3.** *2D context的坐标系*


    在2D空间中，每个点都由一对坐标`(x, y)`来引用。在本书中，我使用常规的数学表示法：`(x, y)`；例如，`(10, 2)`表示点的`x`坐标为10，`y`坐标为2。原点的坐标是`(0,
    0)`。在图形`context`中，点`(10, 8)`将位于点`(15, 8)`的左侧，以及点`(10, 2)`的下方。


    这里还有一个值得提及的重要规则。有时，图形API和软件不区分坐标网格上的点和屏幕上的像素，并将这两个术语互换使用。2D `context`的工作方式则不同，且有些反直觉（至少对于刚开始编写`canvas`代码的人来说是反直觉的）。


    坐标不是像素。坐标是像素内部或像素之间的小点；例如，`(0, 0)`坐标位于左上角像素的左上角。


    ![](index-55_1.jpg)


    **第2章：浏览器中的图形：Canvas元素**


    **49**


    同一个像素的中心点坐标是小数坐标`(0.5, 0.5)`。'
  raw: 'Context is the object that is responsible for setting paint colors and for
    drawing


    shapes. The type of ctx is CanvasRenderingContext2D, but we’ll call it just


    context for simplicity. If you are still confused about the relationship between


    canvas and its context, think of canvas as the dull DOM element that looks like


    the transparent rectangle. The context is the entry point to draw on it; a


    collection of functions that you use to paint something.


    **NOTE:** At this point, one might ask: Why do I call canvas.getContext(''2d'')?


    Why ''2d''? Maybe there are other types of context like ''3d''? The W3C specification


    defines that getContext “returns an object that exposes an API for drawing on
    the


    canvas. The first argument specifies the desired API. Subsequent arguments are


    handled by that API.”


    *It basically means that you can get the different context out of the canvas,
    which


    exposes the different set of API, like 3D API. What exactly you will get depends
    on the browser. The result for 2D context is clearly defined by the W3C specification.


    In 2007, Opera published the first experimental build that had a support for custom


    3D canvas; you had to get the "opera-3d" context to access it. The WebGL


    [specification (https://www.khronos.org/registry/webgl/specs/1.0](https://www.khronos.org/registry/webgl/specs/1.0/)/),
    released on March 3, 2011, defines its own context called "webgl" to access the
    standardized 3D context. (We will take a deeper look into WebGL in Chapter 9.)


    So ''2d'' is not just an arbitrary term that can be omitted.


    This explanation should make it obvious why it is not completely correct to say


    ‘‘the canvas can draw a curve.’ It is not the canvas that can or can’t draw, it
    is


    the graphical context, the API, that is responsible for drawing. What makes


    perfect sense in one context (like curves in 2D), can be impossible to


    accomplish in the other context (like curves in WebGL).


    ![](index-54_1.jpg)


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    The Coordinate System


    Coordinates define where exactly you want a certain figure to be painted or how


    big it will be. Almost every call to the canvas API involves the coordinates.
    If you want to draw a rectangle, you have to set the top-left corner, width, and
    height.


    For the circle, you need the center point and radius. What exactly are those


    coordinates and how do they work?


    The 2D context defines the rectangular bitmap area. The context uses a classic


    Cartesian coordinate system to refer to individual points inside it. There are
    two


    axes: the horizontal axis is called x and vertical is y. The x axis increases
    when


    going to the right; and the y axis increases when going down. The point with


    both x and y set to 0 is called an origin; it is located in the top-left corner
    of a bitmap. Figure 2-3 shows four points, one of which is the origin. Each point
    has


    the coordinates near it written in parentheses.


    **Figure 2-3.** *The coordinate system of 2D context*


    In 2D space, each point is referred to by the pair of coordinates: x and y. In
    this


    book, I use the regular mathematical notation: (x, y); for example, (10, 2)


    means that the x coordinate of a point is 10 and the y coordinate is 2\. The


    coordinates of origin are (0, 0). In a graphical context the point (10, 8) will
    be


    to the left of (15, 8), and to the bottom of (10, 2).


    There is one more important rule that is worth mentioning here. Sometimes the


    graphics APIs and software do not distinguish between the points of the


    coordinate grid and pixels of the screen, and use these terms interchangeably.


    The 2D context works in a different and somewhat unintuitive way (at least it
    is


    unintuitive for people when they start to write the code for the canvas).


    Coordinates are not pixels. Coordinates are small points inside of the pixels
    or


    between them; for example, the (0, 0) coordinate is a top-left corner of a top-


    ![](index-55_1.jpg)


    CHAPTER 2: Graphics in the Browser: The Canvas Element


    **49


    left pixel. The center of the same pixel will have the decimal coordinates


    (0.5, 0.5).'
