    [http://craftycomponents.com.](http://craftycomponents.com)


    Crafty is built upon the idea of the ‘‘Entity Component Paradigm’ (or Entity


    Component System)-----a special way of treating game entities that perfectly fits


    game development. As the first step in our introduction to Crafty, let’s see how


    the entity component system is different from the traditional object-oriented


