    \n```\n<script src=\"http://10.0.2.2:8000/target/target-script-min.js#anonymous\"\
    ></script>\n```\n\n这行代码指示 HTML 页面加载由调试服务器提供的特殊脚本，然后开始通信。根据您的环境更改 IP 地址和端口。例如，上述行用于从模拟器启动页面，该页面通过`10.0.2.2`引用主机操作系统。端口\
    \ 8000 是通过`weinre.jar`启动选项配置的。\n\n在设备上加载该页面。现在，在桌面 Chrome 浏览器中访问`http://localhost:8000/client`（该界面在\
    \ Safari 中也可用，但在 Chrome 上显示效果略好）。图 A-4 显示了打开的调试会话。背景中的浏览器窗口显示调试界面。如您所见，它看起来与我们在本附录第一节中尝试的\
    \ Chrome 开发者工具完全一样。\n\n![图 A-4](img/index-626_1.jpg)\n\n**附录：调试客户端 JavaScript**\n\
    \n**图 A-4** *weinre 调试会话。打开的“元素”选项卡允许您探索和修改设备 DOM 树的内容。*\n\n有关 weinre 的更多信息，请参考其主页：`http://people.apache.org/~pmuellr/weinre/`。Chrome\
    \ 开发者工具文档页面位于：`http://code.google.com/chrome/devtools/docs/overview.html`。\n\n\
    ## 总结\n\nAndroid 缺乏对浏览器中全功能调试的支持，这会使调试变得极其困难。幸运的是，大多数问题并非设备特定，可以在桌面浏览器上进行调试。基于\
    \ WebKit 的浏览器（Chrome 和 Safari）提供了一套出色的“开发工具”，专注于解决各种问题：布局、逻辑或时序。\n\n在本附录中，我们学习了如何执行以下操作：\n\
    \n- 在基于 WebKit 的浏览器中调试网页\n- 使用标准的 Android 工具：`console.log`和`logcat`来追踪问题\n- 设置`weinre`以调试网页可能存在的布局或时序问题\n\
    \n## 索引\n\n- **A**\n  - 动画与精灵。*另请参阅* A*算法\n    - 形式化描述，528-529\n    - 实现，529-531\n\
    \    - 非形式化描述，525-527\n  - arguments.callee，150\n  - browser，150\n  - canvas，148\n\
