- fmt: '# Chapter: Making an Isometric Engine


    In this chapter, we looked into rendering virtual worlds. We learned that implementing
    various approaches to the optimization of rendering is crucial for game performance,
    especially when it comes to mobile devices. We started from the simple implementation
    of the tiled engine that showed only around 20 fps, and gradually improved it
    to a steady 45 fps at the end. We learned how to add objects to the game world
    and how to render them correctly.


    We looked into two different projections: top-down and isometric. The first projection
    is good for platform shooters and top-down is best for old-school games. Isometric
    projection looks more natural to the user, however, it requires more effort to
    implement—both in terms of math and in terms of processing power. The next chapter
    of the book is fully devoted to making an isometric game engine.


    ## Making an Isometric Engine


    The isometric view was once the most popular mechanic for rendering virtual worlds.
    It perfectly suited RPGs, strategy games, and tactical games, and it looked much
    better than a simple orthogonal top-down view. Many masterpieces of game development
    used isometric engines, such as Fallout, XCOM, SimCity, and many, many others.
    Kids of the ’80s still remember how advanced and cutting-edge those games looked
    compared to simple "flat" engines.


    Nowadays desktops use 3D for almost everything—from AAA-class games to small indie
    projects. Browsers, however, are still quite far from widely adopting 3D (especially
    mobile browsers). That’s why isometric engines are still very attractive for the
    casual player. This type of engine can look very appealing in the browser (especially
    if you hire a good artist).


    Social networks also factor in the popularity of isometric games. Gardens of Time,
    The Sims Social, and CityVille—the most popular Facebook games of 2011—are isometric!
    Indeed, numerous farms, tower defenses, and small strategies look best when implemented
    with an isometric view. Isometric graphics are among the most attractive engine
    mechanics available for mass market, and it is perfect for casual strategy projects.
    That’s why we decided to devote an entire chapter to isometric game engines and
    show you how to create one from scratch.


    This chapter is devoted to making a skeleton for isometric games. We will not
    touch the gameplay, but rather the engine that can render a big isometric world
    that allows the player to interact with it. This is a very solid basis for your
    own game project.


    In this chapter, we will learn how to:


    - Render the isometric terrain using a set of isometric sprites

    - Optimize rendering—implement the image caching strategies described in the previous
    chapter for the isometric terrain

    - Render game objects like buildings and characters, implementing the techniques
    described in Chapter 6 in practice

    - Implement dirty rectangles—a strategy to minimize the redraw region and save
    CPU cycles

    - Deal with interaction—clicking elements, dragging viewport

    - Create simple UI controls


    The resulting engine will look like Figure 7-1.


    **Figure 7-1.** *The result: an isometric game engine*


    As a bonus, and a boost for your own start-up, this chapter comes with a set of
    isometric art, created specifically for this book by a fantastic concept artist,
    Sergey Lesiuk ([http://nitro-killer.deviantart.com](http://nitro-killer.deviantart.com)).
    You are free to use these sprites for your own project, as long as you have purchased
    the electronic or paper version of this book (Choose electronic, save trees. Seriously.).


    **NOTE:** Throughout this chapter, I say "simple as farm games". In fact, popular
    social projects are not simple at all. They have rather complex server-side logic
    and infrastructure to support the gazillions of players gathering their crops
    every day. However, the rendering on the client side is relatively simple.


    ## Setup'
