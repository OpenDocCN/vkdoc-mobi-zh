    ## Registering for Events: DOM Attributes


    Now let’s write some code and see how event handling works. Listing 5-1 shows
    one approach to event handling.


    **Listing 5-1.** Event Handling: The Old Way


    ```

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <meta name="viewport"

    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,

    user-scalable=no, target-densitydpi=device-dpi"/>

    <style>

    html, body {

    overflow: hidden;

    width: 100%;

    height: 100%;

    margin:0;

    padding:0;

    border: 0;

    }

    </style>

    <script src="js/utils.js"></script>

    <script>

    function init() {

    console.log("document is loaded");

    }

    </script>

    </head>

    <body onload="init()">

    <canvas id="mainCanvas" width="20px" height="20px"></canvas>

    </body>

    </html>

    ```


    Wait! But isn’t that the code from Chapter 2 that we use all the time?! Exactly!
    It is extremely hard to write a useful JavaScript program without dealing with
    events at all. I had to use them before introducing them. Shame on me.


    Let’s review the code. We added the `onload` parameter to the `body` tag of our
    HTML document. The value of the parameter is a fragment of JavaScript code. We
    could put several calls there, separated by a semicolon. However, we put just
    a single call to the `init()` function. This technique can (but really shouldn’t)
    be used on most DOM elements. Find the event name, put `on` before it, and type
    the code that you need:


    ```javascript

    onclick="alert(''bad style'')";

    ```


    Why is it considered bad style? Developers always try to structure and separate
    things. HTML is meant to be the language of markup. It describes the semantics
    and the structure of the document. HTML should not be responsible for anything
    else: dynamic behavior (we have JavaScript for it) or styles (we have CSS for
    it). By putting the event handling code straight into HTML, you violate this rule.
    The code will soon become messy and harder to maintain.


    From a purely practical point of view, the main limitation of this approach is
    that you can’t put multiple event handlers this way. The DOM tree can’t have two
    attributes with the same name.


    ## Registering for Events: Event Listeners


    Now let’s look at a better way of subscribing to events, shown in Listing 5-2.


    **Listing 5-2.** The Correct Way to Work with Events


    ```javascript

    var el = document.getElementById("mainCanvas");


    function onCanvasTouchStart(e) {

    console.log("touch");

    }


    el.addEventListener("touchstart", onCanvasTouchStart, false);

    ```


    Each DOM element has the `addEventListener()` function, which does exactly what
    it says. It registers the function passed as the second argument as the event
    listener of the DOM element. In Listing 5-2, `el` is the canvas element.'
