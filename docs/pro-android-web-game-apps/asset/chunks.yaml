    renders the button on the screen and returns the current state of the button.


    Listing 7-41 shows the simple implementation of this class.


    **Listing 7-41.** *Implementation of the RoundStateButton*


    /*


    * The RoundStateButton constructor accepts the image with three frames:


    * one frame for each state. frameWidth and frameHeight are the dimensions


    * of the single frame


    */


    function RoundStateButton(image, frameWidth, frameHeight) {


    GameObject.call(this);


    this._bounds = new Rect(0, 0, frameWidth, frameHeight || image.height);


    this._image = image;


    this._frame = 2;


    }


    extend(RoundStateButton, GameObject);


    // Constants to reference states


    RoundStateButton.TERRAIN = "terrain";


    RoundStateButton.OBJECTS = "objects";


    RoundStateButton.MOVE = "move";


    var _p = RoundStateButton.prototype;


    /**


    * Render the current frame on the canvas.


    */


    _p.draw = function(ctx, dirtyRect, viewportX, viewportY) {


    ctx.drawImage(


    this._image,


    this._bounds.width*this._frame,


    0,


    this._bounds.width,


    this._bounds.height,


    this._bounds.x - viewportX || 0,


    this._bounds.y - viewportY || 0,


    this._bounds.width,


    this._bounds.height);


    };


