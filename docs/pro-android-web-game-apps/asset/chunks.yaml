    \ 从不执行\n * 1 - 始终执行\n * 介于 0-1 之间\n */\nfunction ProbabilisticDecision(chance,\
    \ trueNode, falseNode) {\n    this._chance = chance;\n    this._trueNode = trueNode;\n\
    \    this._falseNode = falseNode;\n}\n\nProbabilisticDecision.prototype.execute\
    \ = function(agent) {\n    var node = Math.random() < this._chance ? this._trueNode\
