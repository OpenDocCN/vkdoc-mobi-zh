  trans: "\n# 制作等距引擎\n\n`zone` 具有瓦片的最小可见 x 坐标。为更简便起见，请在网格的每个单元格上写出 x 坐标。然后，对 y 坐标执行相同操作，并将网格划分为水平区域。我在图\
    \ 7-13 中为你绘制了一个示例。在垂直网格（左侧）中，区域 -1 是瓦片最小可见 x 坐标（-1）所在的位置。用于 y 坐标的水平网格（位于右侧）遵循相同的思路：区域\
    \ 2 包含可见瓦片的最小 y 坐标，即 2。\n\n**图 7-13.** *将网格划分为垂直和水平区域*\n\n我们的目标是编写代码，当给定世界坐标时，能够找到区域的\
    \ ID。我们找到的值是贴图边界的 x 和 y 值：即左上角。观察图 7-13 中的垂直区域（左侧），你会发现这些区域的大小恰好是 `cellWidth`，并且从\
    \ `cellWidth/2` 开始。0 区域的 x 值范围是从 `0.5*cellWidth` 到 `1.5*cellWidth`，1 区域的 x 值范围是从\
    \ `1.5*cellWidth` 到 `2.5*cellWidth`，依此类推。以下代码形式化了这种依赖关系：\n\n```\nvar x = Math.floor((this._bounds.x\
    \ - this._cellWidth/2)/this._cellWidth);\n```\n\n对 y 执行相同操作：区域大小为 `cellHeight/2`，区域从\
    \ -1 开始。接下来的代码片段现在也很清晰：\n\n```\nvar y = Math.floor(this._bounds.y/(this._cellHeight/2))\
    \ - 1;\n```\n\n现在我们得到了边界矩形的左上角坐标。宽度和高度值的获取则更为简单。对于宽度，取覆盖视口所需的最小区域数，即 `Math.ceil(this._bounds.width/this._cellWidth)`。由于等距视图中的行是错位排列的，我们需要在此值上加\
    \ 2，以覆盖下一列和前一列：\n\n```\nvar width = Math.ceil(this._bounds.width/this._cellWidth)\
    \ + 2;\n```\n\n高度公式的工作原理相同：\n\n```\nvar height = Math.ceil((this._bounds.height)/(this._cellHeight/2))\
    \ + 2;\n```\n\n最难的部分已经过去了。既然你知道了玩家看到的内容，并且知道如何在离屏画布上渲染它，剩下唯一要做的事情就是将内容展示给用户，并确保当用户滚动离开时，使其失效并重新绘制。\n\
    \n## 管理离屏画布\n\n每帧都需要检查等距离屏图像，以确保它仍然有效。如果无效，则重新绘制使其再次有效。然后将正确的图像绘制到画布上。实现此功能的代码如清单\
    \ 7-10 所示。其模式与第 6 章相同。唯一真正改变的是我们计算边界矩形的方式。\n\n**清单 7-10.** *`IsometricTileLayer`\
    \ 的 `draw()` 函数*\n\n```\n_p.draw = function(ctx, dirtyRect) {\n    if (this._offDirty)\
    \ {\n        this._redrawOffscreen();\n    }\n    var offscreenImageWorldX = this._offRect.x*this._cellWidth;\n\
    \    var offscreenImageWorldY = this._offRect.y*this._cellHeight/2;\n    ctx.drawImage(this._offCanvas,\
    \ offscreenImageWorldX - this._bounds.x,\n                  offscreenImageWorldY\
    \ - this._bounds.y);\n};\n```\n\n下一个函数 `_redrawOffscreen()` 也同样直观；它仅仅是对离屏上下文调用\
    \ `_drawMapRegion()`。而 `_drawMapRegion()` 函数则知道如何在给定的上下文上绘制地图的部分内容。代码如清单 7-11\
    \ 所示。\n\n**清单 7-11.** *刷新离屏缓冲区：`_redrawOffscreen()` 函数*\n\n```\n_p._redrawOffscreen\
    \ = function() {\n    var ctx = this._offContext;\n    ctx.fillStyle = \"darkgreen\"\
    ;\n    ctx.fillRect(0, 0, this._offCanvas.width, this._offCanvas.height);\n  \
    \  this._drawMapRegion(ctx, this._offRect);\n    this._offDirty = false;\n};\n\
    ```\n\n我们在两个代码清单中使用的变量 `_offRect` 保存了当前“有效”的地图边界。我们拥有覆盖该地图区域的离屏图像。当用户导航足够远并跨越该区域时，`_offRect`\
