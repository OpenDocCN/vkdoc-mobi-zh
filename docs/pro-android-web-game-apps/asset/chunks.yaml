- fmt: "# CHAPTER 3: Creating the First Game\n\n- **93**\n\n`overflow: hidden`指令让浏览器“切掉”超出视觉页面边界的所有内容，从而从不显示滚动条。其他行确保页面主体使用每一个可用的像素：宽度和高度各为`100%`，没有边距、边框或内边距。\n\
    \nCanvas的缩放是最棘手的部分。不幸的是，我们不能用纯CSS来实现，因此必须编写几行JavaScript。清单3-4中的代码使用了浏览器事件，我们将在第5章详细讨论这些事件。目前，你只需要相信它能工作就行。\n\
    \n**清单3-4.** *监听浏览器事件，在页面缩放后调整Canvas大小*\n\n```javascript\nfunction init() {\n\
    \    var canvas = initFullScreenCanvas(\"mainCanvas\");\n}\n\n/**\n * Resizes\
    \ the canvas element once the window is resized.\n * @param canvasId – string\
    \ id of the canvas element\n */\nfunction initFullScreenCanvas(canvasId) {\n \
    \   var canvas = document.getElementById(canvasId);\n    resizeCanvas(canvas);\n\
    \    window.addEventListener(\"resize\", function() {\n        resizeCanvas(canvas);\n\
    \    });\n    return canvas;\n}\n```\n\n清单3-4中的代码包含两个函数。第一个函数`init()`你已经熟悉了：浏览器在页面主体加载完毕后执行它。第二个函数`initFullScreenCanvas()`让Canvas占据所有可用的屏幕空间，即使窗口被缩放或设备更改了方向也是如此。它会“监听”`resize`事件，每次检测到该事件时，就调用`resizeCanvas()`。接下来，`resizeCanvas()`负责具体的缩放：它找出页面的新尺寸，并相应地更新Canvas的大小。这个函数的代码如清单3-5所示，同样相当简单。\n\
    \n**清单3-5.** *resizeCanvas函数，用于找出页面的新尺寸并将Canvas适配到该尺寸*\n\n```javascript\n/**\n\
    \ * Does the actual resize\n */\nfunction resizeCanvas(canvas) {\n    canvas.width\
