  trans: '

    Ajax 是一种开发者用于从服务器加载数据而无需重新加载页面的技术。我们将在本章后续部分看到一个 Ajax 调用的示例。


    Ajax 有其自身的局限性，其中最主要的就是 HTTP 本身。HTTP 是一种请求-响应协议，客户端与服务器之间的通信遵循预定顺序：


    1. 客户端发送一个请求，精确描述它想要读取或更新的内容。

    2. 服务器分析请求、形成响应并将其发送回客户端。

    3. 连接被关闭。

    4. 要发送另一段数据，客户端必须发起一个新连接。


    服务器无法自行向客户端发送消息：这种通信模型假设服务器仅响应来自页面的请求。当你用一个例子来思考时，传统 Ajax 的弱点就很容易理解了。想象一下，你正在编写一个带有内部邮件系统的多人在线游戏。在某个时刻，服务器收到一封需要传递给用户的新邮件：我们希望在屏幕角落显示一个闪烁的“新邮件”图标。即使服务器现在有了该用户的新数据，它也无法对其进行任何处理，因为服务器无法与页面建立新连接。相反，服务器必须耐心等待新的
    Ajax 请求，然后才能用新更新进行响应。这种模式的明显缺点是，客户端必须不断轮询服务器，以检查是否有新消息（本章下一节将详细介绍这种模式及其问题）。


    丰富的应用程序，尤其是游戏，通常需要更好的网络连接。它们需要一种像 TCP/IP 那样工作的连接：一旦页面打开它，它就保持打开状态，并且任何一方（客户端和服务器）都可以随时、以任意顺序发送各自的消息。使用这样的连接，服务器可以立即将邮件通知发送给客户端，而无需等待页面的新请求。


    进化的下一个合乎逻辑的步骤是 WebSocket，它是一种填补网页与服务器之间实时双向通信空白的**技术**。WebSocket 允许你打开一个真正的 TCP
    连接并传输数据，而无需任何 HTTP 开销。类似这样的技术正在推动整个 HTML5 游戏开发领域向前发展，开启了几年前还无法想象的可能性。


    **注意：** 在 Android 平台上，WebSocket 仅在 Android 版 Chrome 中可用。标准浏览器中缺少 WebSocket 是 Android
    网络开发者成千上万投诉的原因。更糟糕的是，Android 的主要竞争对手 iOS 已经支持它了。毫无疑问，Android 原生浏览器*最终*会支持它，但就目前而言，我们只能等待。


    WebSocket 正是 Web 应用开发者从一开始就想要的：一种能够以最小开销和延迟发送消息的持久双向连接。游戏比任何其他应用都更需要它，因为在游戏中，延迟至关重要。如果你有一个聊天应用，聊天消息到达时延迟了
    200 毫秒，那你运行的是一个完美的聊天应用，你的用户会喜欢它！如果你要制作一款实时 3D 射击游戏，这种延迟就太长了——游戏会显得不精确或卡顿，因为 200
    毫秒就是击中目标与击中他身后墙壁之间的差异。


    Web 开发者和浏览器厂商发明了许多不同的技术来构建可靠的客户端-服务器通信解决方案。这些技术被称为传输方式。WebSocket 和 Ajax 轮询是两种不同的传输方式，它们都服务于同一个目标：尽快将服务器的更新传回客户端。许多库将传输方式的细节隐藏在抽象层之下，这样开发者就不必担心错误处理或恢复断开的连接等实现细节。

    '
- fmt: "# CHAPTER 11: Talking to the Server\n\n## Server Setup\n\nMost examples from\
    \ this chapter and the next require a server to run. Feel free to take the server\
    \ code from the previous chapter as your starting point for the examples, or write\
    \ a ten-line express application from scratch. We will omit the code from the\
    \ housekeeping section of the previous chapter. Instead, we will concentrate on\
    \ the actual functionality, and keep listings small. Remember that this is not\
    \ an option for a production environment: you should return to Chapter 10 before\
    \ bringing your project to the public and reviewing it once again. Listing 11-1\
    \ is the starting point for the server.\n\n**Listing 11-1.** *Basic Server Code\
    \ Used in This Chapter*\n\n```\nvar express = require(\"express\");\nvar app =\
    \ express.createServer();\napp.set('views', __dirname + '/views');\napp.set('view\
    \ engine', 'ejs');\napp.use(express.bodyParser());\napp.use(express.cookieParser());\n\
    app.use(express.session({ secret: \"gameserversession\" }));\napp.use(app.router);\n\
    app.use(express.static(__dirname + '/public'));\napp.use(express.errorHandler());\n\
    app.get('/', function(req, res) {\n    res.sendfile(__dirname + \"/public/index.html\"\
    );\n});\napp.listen(80);\n```\n\n## Using `XMLHttpRequest` API for Basic HTTP\
    \ Requests\n\nAll major browsers provide the `XMLHttpRequest` object as the supposed\
    \ and standard way of making HTTP requests from the web page to the server. You\
    \ have most likely used it already: either directly creating a new instance yourself,\
    \ or indirectly via the abstraction layers provided by JavaScript libraries like\
    \ `jQuery` or `Prototype.js`.\n\n**NOTE:** As W3C admits, the name of this object\
    \ is rather misleading: *\"First, the object supports any text-based format, including\
    \ XML. Second, it can be used to make requests over both HTTP and HTTPS (...)\
    \ Finally, it supports 'requests' in a broad sense of the term as it pertains\
    \ to HTTP; namely all activity involved with HTTP requests or responses for the\
    \ defined HTTP methods.\"*\n\n[—www.w3.org/TR/XMLHttpRequest/](http://www.w3.org/TR/XMLHttpRequest/)\n\
    \nThe `XMLHttpRequest` API comes in two versions: the regular older version that\
    \ most browsers provide, and the new `XMLHttpRequest Level 2` version that adds\
    \ plenty of new and very useful features to the original API.\n\n**NOTE:** `XMLHttpRequest`\
    \ is often shortened to `XHR`. I use both names in this book interchangeably.\
    \ `XMLHttpRequest Level 2` is another, very long name for the API, which is why\
    \ it is often shortened to `Level 2`, `XHR Level 2`, or even `XHR2`. The last\
    \ name is somewhat misleading since it looks like we're speaking about a different\
    \ object, so I use the other two versions.\n\nThe `Level 2` specification ([www.w3.org/TR/XMLHttpRequest2](http://www.w3.org/TR/XMLHttpRequest2))\
    \ doesn't define a completely different interface, but rather extends the existing\
    \ one by adding support for transferring files to the server, sending and receiving\
    \ binary data, tracking the upload progress, and adding better life-cycle notifications.\
    \ This means that all code written for the \"original\" `XMLHttpRequest` also\
    \ works in the `Level 2` version.\n\nEven though the specification has been in\
    \ a \"working draft\" state since 2008 (the earliest and least-mature state of\
    \ the document according to the W3C process), most browsers have already implemented\
    \ the new features ([http://caniuse.com/xhr2](http://caniuse.com/xhr2)). The Android\
    \ stock browser is among them, starting with Android 3.0. At the time of writing,\
    \ the market share of devices that have Android 3.0 or higher is not enough to\
    \ safely drop the old API and move to `Level 2`, but it is only a matter of time.\
    \ I highlight both old and new API in this section so that you can shift to a\
    \ new implementation once the market is ready for it.\n\n### HTTP Request with\
    \ Plain Old `XHR`\n\n`XMLHttpRequest` object is the basis of most methods to add\
    \ networking to a web page. Nowadays, it is hard to find a web page that doesn't\
    \ use it for dynamically checking forms, loading pieces of UI on demand, or implementing\
    \ other kinds of functionality."
