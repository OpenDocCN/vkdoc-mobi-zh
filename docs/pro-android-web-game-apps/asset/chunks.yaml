    When a player clicks the button, the game should start. The rule of thumb that
    you


    should never forget is: do not try to reproduce a rich user interface by the means


    of raster graphics of canvas. The regular mistake that people make at this point


    is to start reinventing the wheel and rendering the buttons in the 2D context.


    Sometimes this approach makes sense, but 99 percent of the time, it is a huge


    waste of your efforts and browser resources. Modern browsers have spent


    years gradual y improving the rendering algorithms for typical UI elements. I


    cannot believe that somebody can do the same on canvas in a rather limited


    time frame that you usually have for a game development. Don’t try to do a


    slider, or button, or drop-down list on the canvas yourself. Use HTML facilities


    until you have a really good reason not to use them.


    We implement the user list for the lobby as a separate class called


    LobbyUsersList. It wraps the UI element and uses it as the placeholder for the


    list of users. The code for this class is rather simple: it does nothing but DOM


    manipulation. The smal trick that I used here----the class of the list item is
    same as the name of the user’s state in lobby: playing or ready. This way, we
    can


    CHAPTER 12: Making Multiplayer Games


    easily change the visual style of the button depending on the readiness of the


    person to play. Listing 12-4 shows the code for this class.


    **Listing 12-4.** *LobbyUsersList Class: The Client-Side Component for Displaying
    Currently Available Users* function LobbyUsersList(listElement, clickCallback)
    {


    this._users = {};


    this._listElement = listElement;


    this._clickCallback = clickCallback;


    }


    var _p = LobbyUsersList.prototype;


    _p.add = function(userId, username, status) {


    // If the user is already present for some reason,


    // just update the information about him


    if (this._users[userId]) {


    this.setStatus(userId, status);


    this.setName(userId, username);


    } else {


    // Otherwise, create new element and append it to DOM tree


    var el = this._getUserListElement(userId, username, status);


    this._users[userId] = el;


    this._listElement.appendChild(el);


    // When the list item is clicked, it extracts the current


    // data about the user, and executes the callback


    el.addEventListener("click", (function(e) {


    var userId = el.getAttribute("data-userid");


    var userName = el.innerHTML;


    var state = el.className;


    this._clickCallback.call(this, userId, userName, status);


    }).bind(this));


    }


    };


    _p.setStatus = function(userId, status) {


    // Setting "status" means just updating the class name


    if (this._users[userId]) {


    this._users[userId].className = status;


    }


    };


    _p.setName = function(userId, name) {


    // Name is innerHTML


    if (this._users[userId]) {


    this._users[userId].innerHTML = name;


    }


    };


