  trans: '

    **图 4-7.** *使用整数坐标（左图）与小数坐标（右图）绘制的效果。右图输出耗时是左图的九倍，且视觉效果并不理想。*


    在撰写本书时，Android 2.2 的标准浏览器会忽略子像素值，以完全相同的效果绘制图像。这就是为何在整数坐标与小数坐标下绘制效果相同的原因。然而，即使你只针对
    Android 平台开发，也不应忽视此问题——因为你永远无法预知玩家设备系统中默认的浏览器会是哪一款。它可能是 Firefox Mobile，而这款浏览器并不会自动修剪坐标。


    不过，问题仍未得到解答：每秒能绘制多少精灵图？精确答案自然是“这取决于诸多因素……”，但我想各位从政治类电视节目中听到的类似回答已经够多了。为此我编写了一个简单测试用例，用于评估手机浏览器与桌面浏览器的性能表现。我假设游戏需要约
    30 FPS 才能保证流畅体验，并测试了在不低于此帧率上限前提下，可绘制的 32×32 像素精灵图数量。在我看来，使用更小的精灵图毫无意义——在当今屏幕密度下，32×32
    像素的图案已经显得非常渺小了。


    我的 Galaxy S 手机在 Dolphin HD 浏览器上可稳定承载约 370 个精灵图，而自带浏览器及 Fennec 则停留在 100 个左右。


    桌面 PC 在处理简单精灵图方面表现更佳：Safari 可渲染约 2200 个；Google Chrome 15 与 Opera 11 轻松达到 3200
    个；IE9 达到 4500 个；Firefox 7 则管理着 5500 个。要完全铺满全高清屏幕，大约需要 2000 个精灵图。


    **注：** 在每个测试用例中，我都会检查浏览器是否能覆盖游戏屏幕区域。若你每帧都能用全新精灵图重新渲染整个屏幕，那游戏运行应当流畅。这是一个非常粗略的衡量标准，因为它基于最坏情况。实际上
    99% 的情况下你无需更新整个屏幕。有许多技术可优化此流程，仅渲染画布中真正需要更新的部分。


    此外，我未将可能相当复杂的游戏逻辑纳入考量。在《愤怒的小鸟》这类游戏中，计算真实物理效果所消耗的 CPU 时间远超渲染几个方块的耗时。关于优化渲染速度的具体技术，将在第
    7 章详细论述。


    即使处理能力不足以用瓦片铺满屏幕，也并不意味着游戏无法运行，而是需要进行更精确的基准测试，并很可能需要构建原型在目标设备上运行。每开发一款新游戏都进行此类测试是良好实践。你永远无法预知这个小实验会暴露出哪些问题。


    ## 精灵图集


    让我们更仔细地观察角色图像。它包含一组构成十几种动画的动画帧。每个帧在精灵图集上都有独立位置且互不重叠。各帧尺寸不同：角色静止站立时的帧比挥手时的帧要小，因为举手动作需要占据更多空间。


    角色在帧内的位置也会随帧变化。该位置取决于角色的姿势或动作：静止站立时大致位于帧中央；蹲下时可能略微右移；挥动武器时可能左移，以此类推。


    当渲染流畅动画时，我们需要知道这个位置（即锚点）。当角色鞠躬时，其双脚必须固定在游戏世界的某个位置，且不随帧尺寸改变。“角色中心点”就是该帧的锚点。

    '
- fmt: "**NOTE:** In this chapter, I show how to draw sprites straight from the sprite\
    \ sheet. Even though this technique is a little slower than rendering individual\
    \ images, it is fairly easy to adjust the code to prerender each frame once you\
    \ know how to draw it.\n\nThe anchor point is used to position the frame on the\
    \ screen. When we need to draw a frame in point (`x`, `y`), it means that the\
    \ anchor point should go there, not the top-left corner or any other point on\
    \ the image (see Figure 4-8).\n\n**Figure 4-8.** The anchor points of animation\
    \ frames. In each frame, the anchor point may have different coordinates.\n\n\
    We just figured out what we need to know about the frame before drawing an animated\
    \ character in a given set of coordinates: the size of the frame and the coordinates\
    \ of the anchor point within that frame. A dozen sprite sheets—each having up\
    \ to a hundred frames—soon becomes unmanageable without the proper API. So it’s\
    \ time to make a new class! `SpriteSheet` sounds good enough.\n\nSo far, `SpriteSheet`\
    \ is one of the simplest classes in the book. I’m showing the code in Listing\
    \ 4-15.\n\n## CHAPTER 4: Animation and Sprites\n\n**Listing 4-15.** The `SpriteSheet`\
    \ Class Responsible for Drawing Individual Frames\n\n```javascript\n/**\n*\n*\
    \ @param image the image object to use for drawing\n* @param frames the array\
    \ describing the frames of the sprite sheet in a\n* format:\n* [\n*   [x, y, width,\
    \ height, anchorX, anchorY] // - frame 1\n*   [x, y, width, height, anchorX, anchorY]\
    \ // - frame 2\n*   ...\n* ]\n*/\nfunction SpriteSheet(image, frames) {\n    this._image\
    \ = image;\n    this._frames = frames;\n}\n\nSpriteSheet.FRAME_X = 0;\nSpriteSheet.FRAME_Y\
    \ = 1;\nSpriteSheet.FRAME_WIDTH = 2;\nSpriteSheet.FRAME_HEIGHT = 3;\nSpriteSheet.FRAME_ANCHOR_X\
    \ = 4;\nSpriteSheet.FRAME_ANCHOR_Y = 5;\n\n/**\n* Draws the frame of the sprite\
    \ sheet in the given coordinates of the\n* Context.\n* @param ctx the context\
    \ to draw at\n* @param index the index of the frame\n* @param x x coordinate where\
    \ the anchor will appear\n* @param y y coordinate where the anchor will appear\n\
    */\n_p.drawFrame = function(ctx, index, x, y) {\n    var frame = this._frames[index];\n\
    \    if (!frame)\n        return;\n    ctx.drawImage(this._image,\n        frame[SpriteSheet.FRAME_X],\
    \ frame[SpriteSheet.FRAME_Y],\n        frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT],\n\
    \        x - frame[SpriteSheet.FRAME_ANCHOR_X],\n        y - frame[SpriteSheet.FRAME_ANCHOR_Y],\n\
    \        frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT]);\n};\n\
    ```\n\nThe constructor accepts two parameters: an image and the description of\
    \ the frames. Each frame is described by an array that has six elements: four\
    \ to describe the frame size and position within the sheet, and two for the coordinates\
    \ of the anchor point. The drawing function is very simple too: it calculates\
    \ the offset for the given frame so that the anchor point appears in the (`x`,\
    \ `y`) position.\n\n**NOTE:** You might have noticed that I created several constants\
    \ to refer to the indices of the frame array. Their only purpose is to make code\
    \ more readable. Compare the code in the listing with the same code rewritten\
    \ without constants:\n\n```javascript\nctx.drawImage(this._image, frame[0], frame[1],\
    \ frame[2],\n    frame[3], x - frame[5], y - frame[6], frame[2],\n    frame[3]);\n\
    ```\n\nThis code looks a little more compact, but if you read it later, I bet\
    \ you won’t remember the meaning behind the indices.\n\nNow we can separate the\
    \ sprite sheet description from the drawing code, as shown in Listing 4-16.\n\n\
    **Listing 4-16.** Using `SpriteSheet` to Draw Sprites\n\n```javascript\nvar frames\
    \ = [\n    [9, 8, 38, 37, 10, 36],\n    [57, 8, 39, 37, 10, 36],\n    [107, 8,\
    \ 45, 37, 10, 36],\n    [163, 8, 45, 37, 10, 36]\n];\nvar spriteSheet = new SpriteSheet(imageManager.getImage(\"\
    player\"), frames);\nspriteSheet.drawFrame(ctx, current, 10, 40);\n```\n\n**TIP:**\
    \ Where do these frame-description numbers come from? Usually your artist gives\
    \ them to you, but make sure to explain to him that you need the description of\
    \ the frames before he starts working. Otherwise, you will spend an evening with\
    \ your mouse pointer over an image, trying to figure out the coordinates yourself."
  raw: '**NOTE:** In this chapter, I show how to draw sprites straight from the sprite
    sheet. Even though this technique is a little slower than rendering individual
    images, it is fairly easy to adjust the code to prerender each frame once you
    know how to draw it.


    The anchor point is used to position the frame on the screen. When we need to


    draw a frame in point (x, y), it means that the anchor point should go there,
    not


    the top-left corner or any other point on the image (see Figure 4-8).


    **Figure 4-8\.** **The anchor points of animation frames. In each frame, the anchor
    point may have different* *coordinates.**


    *We just figured out what we need to know about the frame before drawing an


    animated character in a given set of coordinates: the size of the frame and the


    coordinates of the anchor point within that frame. A dozen sprite sheets-----each


    having up to a hundred frames-----soon becomes unmanageable without the


    proper API. So it’s time to make a new class! SpriteSheet sounds good enough.


    So far, SpriteSheet is one of the simplest classes in the book. I’m showing the


    code in Listing 4-15.


    CHAPTER 4: Animation and Sprites


    **Listing 4-15.** *The SpriteSheet Class Responsible for Drawing Individual Frames*


    /**


    *


    * @param image the image object to use for drawing


    * @param frames the array describing the frames of the sprite sheet in a


    format:


    * [


    * [x, y, width, height, anchorX, anchorY] // - frame 1


    * [x, y, width, height, anchorX, anchorY] // - frame 2


    * ...


    * ]


    */


    function SpriteSheet(image, frames) {


    this._image = image;


    this._frames = frames;


    }


    SpriteSheet.FRAME_X = 0;


    SpriteSheet.FRAME_Y = 1;


    SpriteSheet.FRAME_WIDTH = 2;


    SpriteSheet.FRAME_HEIGHT = 3;


    SpriteSheet.FRAME_ANCHOR_X = 4;


    SpriteSheet.FRAME_ANCHOR_Y = 5;


    /**


    * Draws the frame of the sprite sheet in the given coordinates of the


    * Context.


    * @param ctx the context to draw at


    * @param index the index of the frame


    * @param x x coordinate where the anchor will appear


    * @param y y coordinate where the anchor will appear


    */


    _p.drawFrame = function(ctx, index, x, y) {


    var frame = this._frames[index];


    if (!frame)


    return;


    ctx.drawImage(this._image,


    frame[SpriteSheet.FRAME_X], frame[SpriteSheet.FRAME_Y],


    frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT],


    x - frame[SpriteSheet.FRAME_ANCHOR_X],


    y - frame[SpriteSheet.FRAME_ANCHOR_Y],


    frame[SpriteSheet.FRAME_WIDTH], frame[SpriteSheet.FRAME_HEIGHT]);


    };


