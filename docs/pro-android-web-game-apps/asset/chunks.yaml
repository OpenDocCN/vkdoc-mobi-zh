    **Using a Data URL As an Image**


    Remember that I mentioned it might be a good idea to create a placeholder


    image that will be used when one of the noncritical images is not loaded. In 3D


    applications, for example, the loss of a single texture is not reason enough to


    stop the game with an error.


    Now let’s consider a couple of questions. What should we do if we can’t load


    the placeholder image? Is there a way to make sure that the image is loaded, no


    matter what? It turns out that there is a way. An image is a set of bytes after
    all, so what if we store these bytes right in the JavaScript code and transfer
    them


    straight into the image object?


    There’s a way to do it. The src property of the Image object supports so-called


    data URLs. A data URL looks like the following:


    data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAAm0lEQVRoQ+


    3YMRWAMBQEwcRT/Cv4nuAhYYtQDQaAyXIFe2aedfk65+zLt1jbiwRiJxKwpBWwlrSClrQClrQKlrSKlt


    UKWtIKWFarYEmraFmtoCWtgGW1Cpa0ipbVClrXf5x9z/LHvzMvEk7diRQsaRUtH3vQklbAsloFS1pFy2


    oFLWkFLKtVsKRVtKxW0JJWwLJaBUtaRctqBa0X1+W43qGn25cAAAAASUVORK5CYII=


