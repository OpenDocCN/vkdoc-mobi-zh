- fmt: "# CHAPTER 16: Adding Sound\n\nThe server. As you can see, small Flash components\
    \ often work like a “Plan B” for browsers that are still catching up.\n\nThe best\
    \ feature of `SoundManager2` is its ease of use. Just a couple lines of code—and\
    \ your game has music!\n\nIn this chapter, we add sound to an existing game—Escaping\
    \ Knight—the one that we created in Chapter 14 while testing the Crafty game engine.\
    \ Copy the code from the Chapter 14 game, or use your own project.\n\n**Figure\
    \ 16-1.** *The starting directory structure*\n\n**605**\n\n## Using SoundManager2\n\
    \nNow it is a time to add some sound to the tale about the escaping knight. But\
    \ first, we need to set up the project.\n\n### Initial Setup\n\nThe first step\
    \ is to download the latest version of SoundManager (2.97a at the time of writing)\
    \ from the official site at [www.schillmania.com/projects/soundmanager2/doc/download/](http://www.schillmania.com/projects/soundmanager2/doc/download/).\n\
    \nThen, unpack the archive somewhere on your hard drive. The distribution contains\
    \ many demos and tools, but we need only a few of them in our project. Perform\
    \ the following steps:\n\n1. Copy the `/script/soundmanager2.js` file from the\
    \ distribution to your `js` folder.\n2. Copy the entire `swf` folder to the root\
    \ of your project.\n3. Create a new folder called `sound` in the root of the project.\
    \ We will put our sound files there.\n4. Take the `theme.mp3` file, distributed\
    \ with this book, and copy it to the folder created in the previous step.\n\n\
    Your directory structure should look like Figure 16-1.\n\n**NOTE:** The `script`\
    \ folder of the `SoundManager2` distribution contains several files. They all\
    \ have exactly the same production functionality. Files with the `nodebug` suffix\
    \ have different defaults (all debugging is turned off); they have no comments\
    \ and no debugging methods. Files that have `jsmin` in their name are preprocessed\
    \ with JSMin ([www.crockford.com/javascript/jsmin.html](http://www.crockford.com/javascript/jsmin.html)),\
    \ the JavaScript “code minifier” that removes all extra spaces in the source code,\
    \ making the file much smaller and faster to download. During development, we\
    \ always use the original unprocessed file with debugging enabled. Once you go\
    \ to production, consider replacing it with a `nodebug`-minified version.\n\n\
    Now we are ready to add some nice sound to the game. Add the code in Listing 16-4\
    \ to the page.\n\n**Listing 16-4.** *Initializing SoundManager2*\n\n```html\n\
    <script src=\"js/soundmanager2.js\"></script>\n<script>\nsoundManager.url = 'swf/';\n\
    soundManager.flashVersion = 9;\nsoundManager.onready(function() {\n    soundManager.createSound({\n\
    \        id:'theme',\n        url:'sound/theme.mp3',\n        autoLoad:true,\n\
    \        onload:function() {\n            this.play();\n        }\n    });\n});\n\
    </script>\n```\n\nThe `soundManager` is the ‘magic’ object that appears on the\
    \ global namespace once you load the `soundmanager2.js` file. The first two lines\
    \ initialize the basic settings—the path to the `swf` folder and the version of\
    \ `swf` that `SoundManager` will use. There are two options—8 and 9—and the default\
    \ is 8. Version 9 unlocks some fancy new features, and your players will most\
    \ likely have the appropriate version of Flash Player on their devices.\n\n**NOTE:**\
    \ If you are pragmatic and you want to know the percentage of customers (not only\
    \ mobile) that have older versions of Flash Player, refer to the official version\
    \ usage statistics from Adobe at [www.adobe.com/products/flashplatformruntimes/statistics.displayTab3.html](http://www.adobe.com/products/flashplatformruntimes/statistics.displayTab3.html).\n\
    \n**607**\n\nThe next line adds the `onready` event listener that fires once the\
    \ `soundManager` is operational and ready to perform actual sound-related tasks.\
    \ Finally, we load the sound from the MP3 file, and instruct `soundManager` to\
    \ start playback once the sound is ready.\n\nRun the page in the browser, and\
    \ enjoy the background music. Note that if you are using the emulator, you probably\
    \ hear no sound at this point. This is because the emulator doesn’t have the Flash\
    \ plug-in. If you are going to debug..."
