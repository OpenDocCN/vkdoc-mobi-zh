    CHAPTER 7: Making an Isometric Engine


    **287


    We have completed the first stage of the project: we have the isometric terrain


    that the user can scroll through. The result of our efforts is shown in Figure
    7-14.


    **Figure 7-14.** *Isometric terrain rendered on the screen of a Samsung Galaxy
    S*


    The next step is to add objects into the game.


    **Rendering Objects**


    Good [news: rendering obje](news:rendering)cts is easier than rendering terrain,
    especially in small games without thousands of objects moving around. A game object
    is simply a


    sprite----static or animated-----placed on the layer above the terrain. The ‘‘hard’’


    part is to render only those objects that are required for the frame, and ignore


    the rest. The tiles are easier to deal with since the tile map is a grid, and
    it is


    quite easy to figure out which cells are currently visible.


    For arbitrarily placed objects, it is slightly harder to find every object that


    intersects the viewport. The straightforward approach-----to check if the viewport


    intersects every object----will fail fast if the size of the world is significantly
    bigger than the screen, and the number of objects is at least a couple of hundred.


    However, this approach works for many games with small worlds, like social


    farms.


    The usual solution for this problem is to divide the world into big regions


    (clusters), and assign objects to them. You can then check against the region----


    if it doesn’t overlap the viewport, then none of its objects does. The region
    itself can have smaller subregions and so on, forming a tree-like structure. Spatial


    trees work that way. Alternatively, the clusters can be arranged in a grid-----a


    simple yet very often suitable approach for client-side rendering. The goal of
    this


    section is to implement this approach in the code and wrap it into the


    ObjectLayer-----the class for rendering objects.


    CHAPTER 7: Making an Isometric Engine


    Start with the bare version of the ObjectLayer, which checks the bounds of


    every object. The code in Listing 7-16 shows how to do it. Essentially, the code'
