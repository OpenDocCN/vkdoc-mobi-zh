    \n表单的最后一部分是关于语言和分发区域的。填写完成后，打开“APK 文件”标签页，点击已上传的唯一 APK 文件旁边的“激活”按钮。当 APK 变为激活状态后，点击“发布”。几秒钟后，应用程序就发布成功并可下载了！此时你应已返回到应用列表，并看到新发布的应用。图\
    \ 15-14 展示了开发者控制台此时的样子。\n\n![图 15-14](img/index-595_1.jpg)\n\n**第 15 章：构建原生应用\
