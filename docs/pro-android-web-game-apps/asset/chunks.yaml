  trans: "\n# 第 11 章：与服务器对话\n\n## **455\n\n`XMLHttpRequest` 于 2006 年标准化，但自那时起，Web\
    \ 应用程序已变得更为复杂且要求更高。基于以往经验，W3C 正在制定旨在解决原始实现问题的新标准（XMLHttpRequest Level 2）。\n\n\
    让我们从一个非常基础的 Hello World 示例开始。我们将向服务器发送 GET 请求，并将响应打印到控制台。在本节中，我们将使用旧方法（Level 2\
    \ 之前）。请查看清单 11-2 中的网页代码，以及清单 11-3 中提供数据的服务器端代码。\n\n**清单 11-2.** *发送 XHR 请求以从服务器检索文本数据*\n\
    \n```\nfunction init() {\n  var xhr = new XMLHttpRequest();\n  xhr.onreadystatechange\
    \ = function (e) {\n    if (xhr.readyState == 4) {\n      console.log(\"Got \"\
    \ + xhr.status +\n        \" saying [\" + xhr.responseText + \"]\");\n    }\n\
    \  };\n  xhr.open(\"GET\", \"data.json\");\n  xhr.send();\n}\n```\n\n**清单 11-3.**\
    \ *为清单 11-2 的请求提供数据的服务器代码*\n\n```\napp.get(\"/data.json\", function(req, res)\
    \ {\n  res.contentType(\"application/json\");\n  res.send(JSON.stringify({hello:\
    \ \"World\"}));\n});\n```\n\n启动示例并查看输出。它应该在控制台打印这一行：\n\n```\nGot 200 saying [{\"\
    hello\":\"World\"}]\n```\n\n客户端函数与我们之前用于从服务器下载图像的代码（第 4 章）非常相似。主要区别在于我们收到的是文本响应而非图像。此外，`onreadystatechange`\
    \ 包含一些额外代码，用于检查请求的当前状态：只有当 XHR 对象的`readyState`为 4 时，该函数才会执行实际的数据处理；否则，它会直接返回，忽略本次调用。\n\
    \n与仅指示图像是否已成功加载或是否发生错误的 Image 对象相比，`XMLHttpRequest`（即使是旧版本）支持对 HTTP 请求的生命周期进行更细粒度的控制。浏览器的`XMLHttpRequest`每次状态变化都会调用`onreadystatechange`。状态本身存储在名为`readyState`的属性中，我们在函数体内进行检查。\n\
    \n状态'4'表示完成。当对象状态为完成时，意味着 XHR 已到达其生命周期的最后阶段，并且响应文本已完全可用（在成功调用的情况下）。状态如下所示：\n\n\
    - UNSENT (0)：对象已构建，但尚未调用`open()`方法。此时尚未进行任何网络活动。\n- OPENED (1)：在调用`open`方法之后，但在调用`send`之前。网络通信尚未开始。\n\
    - HEADERS_RECEIVED (2)：在调用`send`之后，重定向已解析，且服务器已发送其标头。网络通信正在进行中，但响应尚不可用。\n- LOADING\
    \ (3)：正在从服务器下载响应主体。\n- DONE (4)：响应主体已下载完毕并可用。\n\n在大多数情况下，您唯一检查的状态是状态 4。使用清单 11-2\
