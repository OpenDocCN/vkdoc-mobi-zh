    \ is resized\n}\n```\n\n当你给`canvas.width`或`canvas.height`赋值时，Canvas会清除所有内容并变为空白，即使新值与之前的相同且实际上没有发生缩放也是如此。在这种情况下，游戏必须立即重新绘制场景。这就是最后一行注释的由来。一旦我们有了知道如何重新绘制场景的类，我们就通知它每次缩放事件，以便它有机会重绘棋盘。目前，我们将在这里保留注释，以提醒我们此函数尚未完成。\n\
