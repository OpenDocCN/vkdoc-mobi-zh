    \ [0, 0, -10]);\n    mat4.rotateX(modelView, xRot);\n    mat4.rotateY(modelView,\
    \ yRot);\n\n    var persp = mat4.create();\n    mat4.perspective(45, canvas.width/canvas.height,\
    \ 0.1, 100, persp);\n\n    var points = [];\n    for (var i = 0; i < vertices.length;\
    \ i++) {\n        var point = [vertices[i][X], vertices[i][Y], vertices[i][Z],\
    \ 1];\n        mat4.multiplyVec4(modelView, point);\n        mat4.multiplyVec4(persp,\
    \ point);\n        var ndcPoint = [\n            point[X]/point[W], // W = 3,\
    \ the position of fourth coordinate\n            point[Y]/point[W]  // in an array\n\
    \        ];\n        points[i] = [\n            Math.round(canvas.width/2*(1 +\
