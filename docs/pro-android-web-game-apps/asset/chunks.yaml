    # 第三章：创建第一个游戏


    **121**


    ……两个部分，并管理游戏生命周期。游戏逻辑与用户界面、用户输入处理及生命周期管理相分离。


    我们游戏的各个组件相互独立。我们可以改变棋盘的外观而无需修改`BoardModel`或`Game`中的代码。我们可以修改游戏规则——例如，让随机玩家先走，这一改动不会影响其他组件。项目规模越大，思考架构和可维护性就越重要。


    本游戏中的所有图形均在运行时渲染，完全没有静态图像。我们设计的游戏界面支持各种屏幕尺寸和分辨率。该游戏在移动设备、平板电脑和个人电脑上都能呈现良好效果。为此，我们必须正确处理方向变化和浏览器窗口大小调整。


    完成第一个游戏是最重要的一步。现在我们就可以添加激动人心的新功能，或探索更复杂的游戏类型，比如包含动画角色、广阔世界和多人游戏功能的游戏。然而，如果不理解前三章的内容（JavaScript
    面向对象方法、Canvas API 以及游戏架构基础），这一切都将无从谈起。


    ![](img/index-128_1.jpg)


    # 第四章：动画与精灵


    在上一章中，我们创建了第一个网页游戏：双人版四球游戏。这个游戏非常简单，我们仅使用了基本图形（线条、圆形和渐变）来显示棋盘。当然，很多其他游戏也可以用完全相同的工具集创建，但如果我们想做更酷的事情呢？比如，一款二维平台射击游戏？


    平台射击游戏通常比益智游戏拥有更丰富的图形（见图 4-1）。这类游戏有一个主角，可以跑、跳，当然还有射击。射击游戏中还有敌人、物品、地形以及许多其他元素来娱乐玩家。换句话说，你需要的不只是圆形和方块，还需要使用通常由图形艺术家创建的自定义图形和动画。


    **图 4-1.** *科乐美（Konami）在 80 年代末发布的平台射击游戏（或称跑轰游戏）《魂斗罗》的截图。如你所见，用线条和圆形很难绘制出这类复杂元素。*


    假设你已经有了一位经验丰富的艺术家：有人能为你的游戏注入生机，创造出出色的图形。


    ![](img/index-129_1.jpg)


    你向艺术家解释了一个游戏创意——你需要一个能跑、能跳、能射击的角色，还需要几个背景、世界元素和几个“坏蛋”。一两周后，艺术家给了你几个像图 4-2 那样的
    PNG 文件。现在你的工作就是用它来制作游戏。


    **图 4-2.** *你可能从艺术家那里获得的图形资源*


    在本章中，我们将学习三个关键的游戏开发概念：处理位图图形、利用帧序列制作动画以及实现用户输入。


    **注意：** 本章中使用的精彩动画骑士由 MarcusFilm（[www.marcusstudio.com.ua](http://www.marcusstudio.com.ua)）慷慨提供。您可以在自己的项目（业余或商业）中免费使用该骑士。更多艺术资源请访问
    MarcusFilm 主页。


    ## 精灵


    在游戏开发中，光栅图像通常被称为精灵。它可以是静态图像，也可以是动画序列的一帧，如图 4-2 所示。当多个精灵被放置在一个文件中时，就称为精灵表（Sprite
    Sheet）。图 4-2 是包含 18 张图像的精灵表的一部分，每张图像都是角色动画（跳跃、奔跑或行走）的一帧。


    **125**


    **注意：** 二维图形中有两个对立的概念：矢量图形和光栅图形。

