    The _archBallDirection is a variable that is initialized to 1 in the constructor
    of


    the Game class (add the appropriate line). It changes depending on where the ball


    is moving. Launch the application and look at the movement. The ball should


    cross the arch correctly.


    Object Layer: Next Steps


    As usual, there is a lot of space for further optimization, so here are a few
    ideas.


     Using arrays to keep the collection of objects sorted is the


    simplest and most expensive approach; sorting an array is


    rather inefficient, as is searching for an item in it. If you have


    many objects, it is better to think about a specialized data


    structure like a binary tree that keeps objects sorted and


    makes it quite CPU-efficient to search for one. On the other


    hand, if you have only a few objects, it isn’t worth the effort.


    There is a great article that explains how binary trees work:


    ‘ Computer science in JavaScript: Binary search tree’


    ([http://bit.ly/F4Dmc](http://bit.ly/F4Dmc)).


     The ObjectLayer can use the same offscreen canvas caching


    trick as IsometricTileLayer. If you have many objects on the


    screen at the same time (like a city with many buildings), it


    makes sense to save a few CPU loops by caching this layer as


    well.


     There are much better (although complicated to code) data


    structures to keep track of spatial objects. R-Tree is a good


    example. Consider using it; it might actually improve the


    performance of your game.


    ![](index-307_1.jpg)


