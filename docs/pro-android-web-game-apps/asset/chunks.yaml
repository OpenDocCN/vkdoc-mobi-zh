    \ [RoundStateButton.TERRAIN, RoundStateButton.OBJECTS,\n            RoundStateButton.MOVE][this._frame];\n\
    };\n```\n\n现在我们已经有了`RoundStateButton`，需要决定如何将其放置到屏幕上。按钮与我们之前处理的其他实体之间的区别在于，按钮不绑定到世界坐标，而是绑定到屏幕坐标。当用户滚动地图时，按钮保持原位不动。一种选择是将其视为特殊实体，并与其他对象分开管理。更好的选择是将其添加到某个图层中，让`LayerManager`来处理其余工作。现有的图层都无法正确处理此任务，因为`ObjectLayer`和`IsometricTileLayer`都是为在世界坐标下工作而设计的；我们需要的按钮图层在移动地图时不应移动。让我们创建一个新的图层类，并命名为`UiLayer`。清单7-42展示了这个简单的类。\n\
