  trans: '

    # 构建原生应用


    ## 签名与发布


    - 为应用签名，并准备将其发布到市场

    - 在 Google Play 上注册

    - 发布游戏，并通过 Google Play 应用下载

    - 更新应用，并发布新版本


    从头开始创建一个 Android 应用是一项相当复杂的任务：需要具备 Java 和 Android 架构方面的特定知识。如果你不熟悉这些技术，可能需要花费大量时间和精力才能掌握到能编写商业级游戏的程度。幸运的是，有一种方法可以在不失去熟悉的网页环境的前提下获得原生应用的优势，本章将专门探讨这个主题。


    **注意：** 本章以逐步指南的形式编写。其中某些步骤与常规的网页开发任务相去甚远；要完全理解它们，需要具备其他领域的一些经验。我将尽力让你对整体流程有良好的了解，并为你理解原生应用的工作原理提供初步指引；然而，Java
    编程超出了本书的讨论范围。如果你想了解更多，请自由查阅其他资料。关于 Java 入门，可以尝试阅读 Jay Bryant 所著的 *《Java 7 入门经典》*（Apress，2012）。如果你已有一定的
    Java 基础，Mario Zechner 和 Robert Green 合著的 *《Android 游戏开发入门》* 第二版（Apress，2012）则是一本很好的资料。Android
    开发近期已成为非常热门的话题，因此你很容易在网上找到优质的学习材料。


    ## 原生应用


    让我们从一些非常基础的问题开始。什么是原生应用？它长什么样？又由什么构成？原生 Android 应用是用 Java 编写的。一个典型的 Android 项目包含
    Java 文件、Java 库，以及资源和素材，例如图片、XML 配置文件和媒体文件。有一个名为 `AndroidManifest.xml` 的特殊文件，它保存着应用的相关信息。应用本身以
    APK 文件的形式分发：一种具有特定内部结构的 zip 压缩包。


    构建 APK 的过程相当漫长；当编码部分完成后，开发者需要完成以下步骤才能生成一个可在设备上部署的文件：


    - 运行工具以自动生成几个 Java 文件

    - 编译 Java 源代码

    - 将编译后的源代码转换为 Android 字节码

    - 将所有内容打包到 APK 文件中

    - 使用密钥对 APK 进行签名

    - 执行对齐操作——优化 APK 压缩包


    如你所见，这个过程相当复杂。如果每次测试应用的一个微小改动都需要手动完成所有步骤，那将是对时间的巨大浪费。Android 开发者使用一个名为 `Ant`（[`ant.apache.org`](http://ant.apache.org)）的工具来简化流程。`Ant`
    是一个自动化构建系统；它可以执行用 XML 编写的构建脚本，这些脚本描述了构建应用所需的每一步操作。它的工作方式类似于 Windows 上的 `.bat`
    文件或 Linux 上的 `make`，但 `Ant` 是跨平台的，并且拥有许多 Java 相关的扩展。借助它，只需在命令行中执行一条命令就能创建一个 Android
    应用。


    **注意：** 大多数集成开发环境（IDE）都有支持 Android 开发的插件，能将应用构建过程的细节对开发者隐藏起来。Eclipse 和 IntelliJ
    Idea 都对 Android 开发有很好的支持。如果你考虑更深入地学习原生 Android 开发，可以先设置一个你喜欢的 IDE，就像我们在第 1 章中所做的那样。至于本章，使用命令行工具搭配文本编辑器就足以达成我们的目标。


    从逻辑角度来看，Android 应用由各种组件和 UI 元素组成——按钮、进度条、组合框等等。这类组件有数十种，既有默认的也有自定义的。其中之一是“浏览器”，在
    Android 中被称为 `WebView`。`WebView` 是一个常规的

    '
- fmt: '组件（如按钮或进度条）；任何应用程序都可以使用它来像普通浏览器一样渲染 HTML 页面。


    制作一个占用整个可用空间、包含 `WebView` 的单屏应用程序，并用它来渲染包含游戏的 HTML 文件并不困难。尽管页面渲染方式与往常一样，但它不再是一个“简单”的页面。它是一个真正的原生应用程序，可以访问通常禁止网页使用的系统资源。这样的应用程序结合了两个世界的优势：网页的简单性和原生应用的行为。


    让我们更仔细地审视这种方法的优势：


    - **市场**。像 Google Play 这样的应用市场是极其重要的分发渠道。与发布在市场上的原生应用相比，网页本身更难推广。在使用市场时，可以轻松收集社区反馈并通知用户新版本的功能。最后，但同样重要的是，如果你决定向用户收费，市场是处理账单的最佳方式。


    - **访问原生 API**。普通应用可以访问的一切，你的网页也可以访问。例如，你可以访问文件系统、SQLite 数据库、连接设施、传感器以及普通 Android
    应用可以访问的其他一切。有时你需要编写一些 Java 代码或使用现有的第三方组件来实现这一点。然而，这种无限制的资源访问为你构建完全不同的、更复杂的解决方案提供了途径。


    **注意：** 当然，当我说“无限制访问”时，并不意味着你可以入侵用户的设备并为所欲为。Android 原生应用使用与网页不同的权限方案。用户安装应用时，系统会提示他确认“允许”某些类型的操作：访问网络、发送短信、读取通讯录等。之后，应用就可以使用这些设备资源。主要区别在于网页没有请求此类权限的选项。


    - **全屏模式**。此功能对于游戏开发极其重要。在手持设备上，每一寸屏幕都很宝贵。地址栏和任务栏占用了大量有用空间！游戏可以利用全屏显示更大的地图部分，或显示自己的状态栏或
    HUD（抬头显示器）。此外，全屏游戏给用户带来不同的感受。它更像他们过去常玩的普通 Java 游戏。


    - **使用浏览器尚未支持的 API**。Android 浏览器（尤其是旧版 Android 上的浏览器）缺乏对某些优秀 HTML5 规范的实现。其中一些
    API 可以借助原生资源来实现。`WebSocket` 和 `FileSystem API` 无法在普通网页中通过 shim 模拟——它们缺乏在所需级别与操作系统交互的权限。使用原生页面，可以实现一个符合标准的
    shim，并将其用作真实 API 的替代品。


    你可以看到，使用这种方法有很多理由。那么，让我们利用这项技术将我们的“四球”游戏（Four Balls game）准备好发布到 Android 市场——并发布它！


    **设置 Apache Cordova（PhoneGap）**


    毫不意外，已经有工具可以简化网页的包装过程。这个工具就是 Apache Cordova（[http://phonegap.com](http://phonegap.com)）。


    **注意：** Cordova 最初名为 PhoneGap。后来它被移至 Apache Incubator，并更名为 Apache Callback。几个月后，它再次更名，现在被称为
    Apache Cordova。在搜索博文、示例和教程时，最好使用最老的名称作为搜索词，因为 PhoneGap 是该项目在其大部分生命周期中为人所知的名字。在本章中，我们使用当前的名字——Cordova。


    Cordova 是一个解决多个任务的工具。


    - 它简化了“网页到原生”的包装过程。

    - 它提供了对原生资源的访问：通讯录、相机等。'
  raw: 'component like a button or a progress bar; any application can use it to render


    HTML pages like a normal browser does.


    It is not hard to make a one-screen application that has WebView occupying the


    entire available space and use it to render an HTML file with the game. Even


    though the page is rendered as usual, it is not a ‘‘simple’’ page anymore. It
    is a


    real native application, and it has access to system resources otherwise


    forbidden for a web page. An application like this combines the best of both


    worlds: the simplicity of a web page and the behavior of a native app.


    Let’s look closer at the advantages of this approach:


     The markets. Application markets like Google Play are an


    extremely important channel of distribution. A web page by


    itself is harder to promote compared to a native application


    published on the market. When you work with the markets, it


    is easy to gather community feedback and notify the users


    about the features in new versions. Finally, yet importantly, if


    you decide to ask users to pay for the application, markets are


    the optimal way to handle billing.


     Access to the native API. Everything available to a regular


    application is available for your web page too. For example,


    you can access the filesystem, SQLite databases, connectivity


    facilities, sensors, and everything else that a regular Android


    application can. Sometimes you have to do some Java coding


    in order to do that or use existing third-party components.


    However, this kind of unrestricted resource access gives you a


    way to build completely different, more sophisticated


    solutions.


    **NOTE:** Of course, when I say “unrestricted access,” I do not mean that you
    can hack into the user’s device and do whatever you like. Android native applications
    use a


    different permission scheme than web pages. When a user installs an application,
    he


    is prompted to confirm that he “allows” certain types of actions: access network,


    send SMS, read the phonebook, and so forth. Afterward, the application can use
    the


    device’s resources. The main difference is that a web page doesn’t have an option
    to request such permissions.


    CHAPTER 15: Building Native Applications


    **569


     Fullscreen mode. This feature is extremely important for game


    development. On handheld devices, every inch of screen


    counts. The address bar and taskbar take away lots of useful


    space! A game could use it to show a bigger part of the map,


    or to display its own status bar or HUD (heads-up display).


    Besides, the fullscreen game feels different to the user. It feels


    more like the usual Java games that they used to play.


     Using APIs that are not yet available to the browser. The


    Android browser (especially on older Android versions) lacks


    the implementation of some very nice HTML5 specifications.


    Some of these APIs could be implemented with the help of


    native resources. WebSockets and FileSystem API cannot be


    shimmed in a regular web page----they lack the permissions to


    work with the OS on the required level. With a native page,


    one can implement a standards-compliant shim and use it


    instead of a real API.


    You can see that there are many reasons to use such an approach. So let’s use


    this technique to prepare our Four Bal s game for the Android Market-----and


    publish it!


    **Setting up Apache Cordova (PhoneGap)**


    No surprise that there’s already a tool that simplifies the wrapping of a web


    page. This tool is Apache Cordova [(http://phonegap.com](http://phonegap.com)).


    **NOTE:** Cordova was originally known as PhoneGap. Later it moved to Apache


    Incubator and became Apache Callback. A few months later, it was renamed once


    again and now it is known as Apache Cordova. When searching for blog posts,


    examples, and tutorials, it is better to use the oldest name in search terms,
    since


    PhoneGap is how the project was known for most of its lifetime. In this chapter
    we


    use the most current name—Cordova.


    Cordova is a tool that solves several tasks.


     It simplifies the ‘ web to native’’ wrapping process.


     It gives access to native resources: phonebook, camera, and


    so forth.'
