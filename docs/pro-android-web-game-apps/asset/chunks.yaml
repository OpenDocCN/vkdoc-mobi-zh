- fmt: "`respond`对象作为第二个参数传递给监听器函数，允许服务器对来自客户端的特定消息发送响应。以下是相应的客户端代码：\n\n```javascript\n\
    // Client-side code. data is the\nsocket.emit('challenge', userId, function (data)\
    \ {\n    if (data.error) {\n        // Something bad has happened, maybe the other\
    \ party has left\n    } else {\n        // The game has started\n    }\n}\n```\n\
    \n如你所见，`Socket.IO`将响应传递给回调方法。这相当方便，尤其是当客户端发送多个相同类型的消息时；否则，在没有额外编码工作的情况下，无法将特定的请求消息与特定的接收响应匹配。\n\
    \n最后，我们需要创建一个`GameSession`类，它负责运行两个玩家之间的游戏。让我们从清单12-11中的构造函数开始。一切都相当简单：游戏会话以默认值初始化：当前玩家为0，以及空的`BoardModel`。然后，我们向`socket`添加特定于游戏的监听器，这些监听器将监听`\"\
    turn\"`事件。\n\n**清单12-11.** `GameSession`类\n\n```javascript\nexports = module.exports\
    \ = GameSession;\n\nvar board = require(\"public/js/BoardModel\");\nvar BoardModel\
    \ = board.BoardModel;\n\nfunction GameSession(id, player1, player2, onEndGame)\
    \ {\n    this._roomName = \"game\" + id;\n    this._players = [player1, player2];\n\
    \    this._currentPlayer = 0;\n    this._boardModel = new BoardModel();\n    this._onEndGame\
    \ = onEndGame;\n    for (var i = 0; i < this._players.length; i++) {\n       \
    \ this._setupGameListeners(i);\n    }\n}\n```\n\n此时唯一不完全清晰的代码片段是`_roomName`变量。为什么我们需要它？`Socket.IO`有一个非常实用的概念，称为房间。房间是一个便捷的API，允许你在需要时对套接字进行分组，并快速向房间成员发送特定消息。这类似于聊天应用中的房间或更高级消息API中的“主题订阅”。一旦你向房间发送了某些内容，每个订阅的套接字都会收到该消息。\n\
    \n清单12-12展示了`GameSession`代码的最后一部分，即实现主要游戏流程的`_setupGameListeners()`函数。在这个简化模型中，玩家在比赛过程中唯一能做的就是走一步。最终，一名玩家获胜或游戏进入平局状态。当这种情况发生时，监听器会被注销。\n\
    \n**清单12-12.** 响应玩家走棋并结束游戏\n\n```javascript\nvar _p = GameSession.prototype;\n\
    _p._setupGameListeners = function(playerIndex) {\n    var socket = this._players[playerIndex].socket;\n\
    \    socket.join(this._roomName);\n    socket.on(\"turn\", (function(column) {\n\
    \        if (playerIndex != this._currentPlayer) {\n            // For some reason,\
    \ the wrong player is trying to make a turn\n            socket.emit(\"error\"\
    , {\n                cause: \"It is not your turn now\"\n            });\n   \
    \         return;\n        }\n        // Let's try to make a turn and see what\
    \ happens\n        var turn = this._boardModel.makeTurn(column);\n        // Check\
    \ if that was illegal turn\n        if (turn.status == BoardModel.ILLEGAL_TURN)\
    \ {\n            socket.emit(\"error\", {\n                cause: \"This turn\
    \ is illegal\"\n            });\n            return;\n        }\n        // The\
    \ turn is legal, we can broadcast it to both parties\n        socket.manager.sockets.to(this._roomName).emit(\"\
    turn\", turn);\n        // Next player is the \"current\" now\n        this._currentPlayer\
