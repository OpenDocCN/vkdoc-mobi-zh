  trans: '

    # 第 1 段


    需要编写更多代码来处理它们（对`move`、`resize`和`render`进行相应操作）。`LayerManager`是一个对象，它对外部 API 隐藏了层数或层序等细节。它提供了一个简单的接口，其本身就像是一个独立图层。


    # 第 2 段


    处理好图层和`LayerManager`后，我们将创建用户界面——用于切换游戏状态的圆形按钮。目前它仍无法正常工作，因为事件系统尚未就绪。


    # 第 3 段


    最后一部分是处理用户输入——追踪点击和拖拽事件，将事件传播到正确的图层，并执行更改地形或添加对象等操作。我们将再次审视事件架构，构建一个不引人注目的通知系统，使引擎的各组件尽可能地相互独立。事件系统就位后，我们将为项目添加最后润色——实现核心游戏机制（更改地形、添加和移除对象、改变游戏状态）。


    ## 准备工作


    我们需要使用前几章创建的几个类：`ImageManager`、`utils.js`、`EventEmitter`以及与用户输入相关的所有内容。请从之前的章节复制这些文件，或从本章素材中获取。接下来，将图片复制到`img`文件夹，并创建一个名为`Game.js`的空文件——我们很快会将游戏逻辑放入其中。完成这些步骤后，目录结构应如图
    7-3 所示。


    **图 7-3.** *项目初始结构*


    ## 基础代码


    `index.html`文件的代码与前几章的初始代码相比变化不大。为完整起见，清单 7-1 展示了该代码。页面加载完成后，`Game`类获取控制权（缩放行为除外，它被保留在外部，因为`Game`不应知道底层画布缩放的原因和时机）。


    **清单 7-1.** *`index.html`文件：游戏入口*


    ```html

    <!DOCTYPE html>

    <html lang="en">

    <head>

    <meta charset="utf-8" />

    <meta name="viewport"

    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,
    target-densitydpi=device-dpi"/>

    <style>

    html, body {

    overflow: hidden;

    width: 100%;

    height: 100%;

    margin:0;

    padding:0;

    border: 0;

    }

    </style>

    <script src="js/utils.js"></script>

    <script src="js/ImageManager.js"></script>

    <script src="js/EventEmitter.js"></script>

