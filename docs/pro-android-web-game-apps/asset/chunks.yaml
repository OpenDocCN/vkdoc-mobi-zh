    area that the user taps to* *control the position of the object. The circle inside
    it indicates the current position of the stick).*


    The code is relatively simple; the most important functions are shown in Listing


    5-29\. The complete implementation is found with the book’s other materials.


    **Listing 5-29.** *Implementing Virtual Joystick Control)*


    _p._onDownOrMove = function(coords) {


    // When we receive the "down" or "move" events we save current


    // deltas and update radius and azimuth


    var deltaX = coords.x - this._x;


    var deltaY = coords.y - this._y;


    this._updateJoystickValues(deltaX, deltaY);


    };


    _p._onUp = function(x, y) {


    // If there''s no interaction, restore the idle state


    this._updateJoystickValues(0, 0);


    };


    _p._updateJoystickValues = function(deltaX, deltaY) {


    var newAzimuth = 0;


    var newRadius = 0;


    // In case if the joystick is idle, we don''t need to proceed with


    calculations


    if (deltaX != 0 || deltaY != 0) {


    newRadius = Math.sqrt(deltaX*deltaX +


    deltaY*deltaY)/this._controllerRadius;


    CHAPTER 5: Event Handling and User Input


    **215


    // User slid too far away, joystick is returned to idle state


    if (newRadius > 1) {


    deltaX = 0;


    deltaY = 0;


    newRadius = 0;


    } else {


    newAzimuth = Math.atan2(deltaY, deltaX);


    }


    }


    // If the values have actually changed, notify listeners


    if (this._azimuth != newAzimuth || this._radius != newRadius) {


    this._azimuth = newAzimuth;


    this._radius = newRadius;


    this._deltaX = deltaX;


    this._deltaY = deltaY;


    this.emit("joystickchange", {


    azimuth: newAzimuth,


