    complete without looking at two extremely useful functions, apply() and call(),


    which allow you to execute an arbitrary function with the arbitrary value of this,


    without even assigning the function to the object.


    var a = {


    name: "a",


    }


    var b = {


    name: "b"


    }


    f: function() {


    console.log(this.name);


    }


    f.call(a); // Execute f, this will refer to object a


    f.apply(b, []); // Execute f, this will refer to object


    call() and apply() let you explicitly provide the object for this keyword. The


    only difference between the two is the way they accept the arguments for the


    function----apply() accepts the array of arguments, while call()accepts them as


    its own arguments one by one:


    fun.apply(newThis, [arg1, arg2, arg3]);


    fun.call(newThis, arg1, arg2, arg3);'
  trans: "\n`assigned`给`Image`对象，一旦图片加载完成，它将会从该对象中被调用。因此，`this`的值将是`img`，而不是`ImageManager`实例。\n\
    \n但如果我们希望`this`始终指向某个特定对象，无论函数如何被调用，该怎么办？JavaScript 提供了一种方法：`bind()`函数正是为此而生。请看以下代码：\n\
    \n```\nvar a = {\n  name: \"a\",\n}\n\nvar b = {\n  name: \"b\"\n}\n\nf = (function()\
    \ {\n  console.log(this.name);\n}).bind(a);\n\na.f = b.f = f;\n\na.f(); // 输出\
    \ \"a\"\nb.f(); // 输出 \"a\"! 因为我们使用了\"绑定\"函数\nf(); // 即使不通过任何对象调用，仍然输出 \"a\"\n\
    ```\n\n`bind()`返回一个新函数，其行为与原函数完全相同，但`this`关键字被绑定到给定的对象。在上述代码中，函数`f`被绑定到了对象`a`，因此无论以何种方式调用——`a.f()`、`b.f()`，甚至不通过对象直接调用`f()`——它始终输出相同的值：`\"\
    a\"`。\n\n需要理解的是，`bind()`不会以任何方式修改原函数；它只是创建了函数的一个新版本并返回给调用者。请看以下代码：\n\n```\nvar\
    \ f = function() {\n  console.log(this.name);\n};\n\nvar boundF = f.bind(a);\n\
    ```\n\n只有名为`boundF()`的函数将`this`关键字绑定到了某个对象。原函数`f()`的行为保持不变，因为它在`bind()`调用之后并未发生改变。\n\
    \n**注意：** `this`关键字背后的机制在以下 MDN 文章中有详细描述：\n[`developer.mozilla.org/en/JavaScript/Reference/Operators/this`](https://developer.mozilla.org/en/JavaScript/Reference/Operators/this)\n\
    \n`bind()`函数是在 ECMAScript 第 5 版中引入的，目前尚无法在所有移动浏览器中使用。为保证代码的跨浏览器兼容性，请将以下 shim（见清单\
    \ 7-3）添加到您的`utils.js`文件中。\n\n**清单 7-3.** *确保旧版浏览器也能使用`bind()`函数的 shim*\n\n```\n\
    if (!Function.prototype.bind) {\n  Function.prototype.bind = function (oThis)\
    \ {\n    if (typeof this !== \"function\") {\n      // 最接近 ECMAScript 5\n    \
    \  // 内部 IsCallable 函数的实现\n      throw new TypeError(\"Function.prototype.bind\
    \ – \" +\n        \"what is trying to be bound is not callable\");\n    }\n\n\
    \    var fSlice = Array.prototype.slice,\n        aArgs = fSlice.call(arguments,\
    \ 1),\n        fToBind = this,\n        fNOP = function () {},\n        fBound\
    \ = function () {\n          return fToBind.apply(this instanceof fNOP\n     \
    \       ? this\n            : oThis || window,\n            aArgs.concat(fSlice.call(arguments)));\n\
    \        };\n\n    fNOP.prototype = this.prototype;\n    fBound.prototype = new\
    \ fNOP();\n\n    return fBound;\n  };\n}\n```\n\n**注意：** 上述 shim 代码来自 MDN 的以下文章：\n\
    [`developer.mozilla.org/en/JavaScript/Reference/Global_Objects/Function/bind`](https://developer.mozilla.org/en/JavaScript/Reference/Global_Objects/Function/bind)\n\
    \n现在应该很容易理解为什么我们在清单 7-2 中使用了下面这行代码：\n`this._boundAnimate = this._animate.bind(this);`\n\
    \n`animate()`函数是作为`requestAnimationFrame()`的回调被调用的。直接使用它时，会在第一次调用后丢失`this`的值。使用`_boundAnimate()`代替`_animate()`可以确保`this`始终指向`Game`的实例。\n\
    \n关于`this`关键字和执行上下文的讨论，如果不涉及两个极其有用的函数——`apply()`和`call()`——就不算完整。这两个函数允许你用任意的`this`值执行任意函数，甚至无需将函数赋值给该对象。\n\
    \n```\nvar a = {\n  name: \"a\",\n}\n\nvar b = {\n  name: \"b\"\n}\n\nf: function()\
    \ {\n  console.log(this.name);\n}\n\nf.call(a); // 执行 f，this 将指向对象 a\nf.apply(b,\
    \ []); // 执行 f，this 将指向对象 b\n```\n\n`call()`和`apply()`让你显式地提供`this`关键字所需的对象。两者唯一的区别在于接受函数参数的方式——`apply()`接受参数数组，而`call()`则将参数作为自身参数逐个接收：\n\
    \n```\nfun.apply(newThis, [arg1, arg2, arg3]);\nfun.call(newThis, arg1, arg2,\
    \ arg3);\n```\n"
- fmt: "# CHAPTER 7: Making an Isometric Engine\n\nOf course, if the function is bound\
    \ to some object, then neither `apply()` nor `call()` will change that behavior.\n\
    \n**NOTE:** Strictly speaking, `apply()` and `call()` *will* still change the\
    \ value of `this` keyword for the “bound” function, but not for the original one.\
    \ The change will not have any effect though, because the bounded function does\
    \ not rely on `this`.\n\n## Mathematical Functions and `Rect` Class\n\nNaturally,\
    \ writing a 2D engine requires some 2D math. An isometric engine is no exception.\
    \ The most common math operations are the operations over rectangles—check if\
    \ two rectangles are equal, test if the object is visible (object rectangle intersects\
    \ with viewport rectangle), test if the user clicked the object (click is within\
    \ the object rectangle), and find the minimal rectangle that should be repainted\
    \ to cover all dirty areas (find rectangular convex hull).\n\nThere are too many\
    \ small functions to keep them separated over the code. A far better approach\
    \ is to create a class and implement all the rectangle-handling math there. Let’s\
    \ call this class `Rect` (`Rectangle` is too long to type). The code for the functions\
    \ is really a part of the basic math course that everyone studied in school, so\
    \ it doesn’t make much sense to reprint it here. The whole source code is distributed\
    \ with the materials for this chapter in the `js/Rect.js` file. Here we only list\
    \ the function declarations, to know the instrument that we rely on:\n\n```\n\
    function Rect(x, y, width, height) {\n    this.x = x; this.y = y;\n    this.width\
    \ = width; this.height = height;\n}\n\n_p = Rect.prototype;\n\n/* Create the new\
    \ rectangle with exactly the\n * same size and position as the given one\n */\n\
    _p.copy = function() {...}\n\n/* Return true if two rectangles are equal\n * (the\
    \ size and position are the same)\n */\n_p.equals = function(r2) {...};\n\n/*\
    \ Returns the string representation of the rectangle,\n * useful for debugging\n\
    \ */\n_p.toString = function() {...};\n\n/* print toString() value to the console\
    \ */\n_p.print = function() {...};\n\n/**\n * All functions accepting 4 args (coordinates)\n\
    \ * can also accept the single arg (rectangle)\n */\n\n/* returns true if two\
    \ rectangles intersect (share some area in common) */\n_p.intersects = function(x2,\
    \ y2, w2, h2) { ... };\n\n/* returns true if the rectangle completely covers the\
    \ other rectangle. */\n_p.covers = function(x2, y2, w2, h2) { ... };\n\n/* Returns\
    \ the rectangle that is a convex hull for\n * the this rectangle and the one passed\
    \ as the parameter.\n * In other words – returns the smallest possible rectangle\n\
    \ * that covers both\n */\n_p.convexHull = function(x2, y2, w2, h2) { ... };\n\
    \n/* Returns the intersection of two rectangles */\n_p.intersection = function(x2,\
    \ y2, w2, h2) { ... };\n\n/* Returns true if this rectangle contains the point\n\
    \ * with coordinates x and y\n */\n_p.containsPoint = function(x, y) { ... };\n\
    \n/**\n * Given a grid of rectangular cells, cell size - (cellW, cellH)\n * tests\
    \ which cells are overlapped by the rectangle.\n * cellsInRow and cellsInColumn\
    \ are used only to limit the\n * coordinates to prevent going out of bounds in\
    \ arrays for example.\n */\n_p.getOverlappingGridCells = function(cellW, cellH,\
    \ cellsInRow, cellsInColumn) {\n    ... };\n```\n\n## `GameObject` Class\n\nThe\
    \ next important class that we need to create before writing the engine itself\
    \ is the `GameObject`. This class is the root for all in-game entities: objects,\
    \ layers, UI widgets, and so on. Everything that we put on the screen, render,\
    \ move, or resize, is in this class. Listing 7-4 is the code for `GameObject.js`.\
    \ The most interesting part of the listing is the `setPosition()`. Once `GameObject`\
    \ makes sure that the new position is actually different from the old one, it\
    \ emits the `move` event. Other entities, like layers, can subscribe to this event\
    \ and update the world appropriately (for example, the clustering algorithm of\
    \ `ObjectLayer` needs to track the movement of every object to keep the clusters\
    \ consistent)."
