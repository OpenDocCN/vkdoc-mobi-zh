    \n![](img/index-85_1.jpg)\n\n## 旋转\n\n旋转变换，顾名思义，就是围绕原点 `(0, 0)` 旋转场景。与 API 的其他部分一样，角度以弧度为单位传入。\n\
    \n```\n// 围绕点 (0, 0) 旋转\nctx.rotate(Math.PI/4);\n```\n\n你通常需要围绕任意点旋转对象，而不仅仅是 `(0,\
