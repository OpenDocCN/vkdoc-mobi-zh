- fmt: "`this._onUpdate(fraction, this._loopsDone);`\n\n`return fraction;`\n\n`};`\n\
    \nThe first two lines check that the animation is running. If the animator is\
    \ paused, then we just recalculate the last result by setting `deltaTime` to zero.\
    \ For the paused animator, time has stopped. It might look like a waste of resources\
    \ since the last value can be cached and returned straightaway, but you rarely\
    \ need to pause a single animator. If the whole game is paused, usually you will\
    \ not update at all. So it is OK to waste some CPU cycles here and save a couple\
    \ of cycles for a regular case.\n\nNext, the `Animator` looks at the amount of\
    \ time that has passed since the start of the loop. If this number exceeds the\
    \ duration of the loop, the `Animator` goes to the next loop (or ends the animation).\
    \ Note that we pay special attention to the case of skipping more than one loop.\
    \ This case is not as impossible as it looks. Remember, when the browser tab is\
    \ inactive, the `requestAnimationFrame()` doesn’t execute its callbacks. Also,\
    \ the Android stock browser pauses timer activities when you hide the browser\
    \ window. It is quite possible to get an update after several seconds of inactivity,\
    \ and skip a few dozen animator loops. If the game is not paused for the time\
    \ of inactivity, it must do its best to show the consistent state.\n\n**NOTE:**\
    \ This side effect is very useful. It allows us to identify when a long time has\
    \ passed since the last update and treat it as an “auto pause.” If `deltaTime`\
    \ in our `animate` function is greater than 1000 milliseconds, for example, it\
    \ means that the user switched to a different tab or he had to hide the browser\
    \ window in his Android device. For action games where the user can lose because\
    \ of inactivity, it might be a good idea to enter a pause mode instead of allowing\
    \ him to taste bitter defeat.\n\nWhen we know the number of loops that we’ve skipped,\
    \ we can check if the animation has finished working, check if the current loop\
    \ is going forward or backwards, and perform other housekeeping tasks. After that,\
    \ we are ready to calculate and return the `fraction` value.\n\nHave you noticed\
    \ these four functions: `_onLoopEnd()`, `_onAnimationEnd()`, `_timingEventPreprocessor()`,\
    \ and `_onUpdate()`? All of them, except for `_timingEventPreprocessor()`, do\
    \ nothing. These are hook functions that are inserted to allow you to extend the\
    \ functionality of `Animator` without breaking into its code. We will speak about\
    \ extending `Animator` in a minute.\n\nNow here’s a slightly more advanced example\
    \ useful for testing motion. The code in Listing 4-32 draws a bullet (a filled\
    \ and stroked circle) and animates the movement from point `(50, 50)` to point\
    \ `(300, 50)`. You can play with the different animator parameters here to determine\
    \ what works best for you.\n\n**Listing 4-32.** *Moving a Bullet with the Animator,\
    \ More Custom Properties*\n\n```\nanimator = new Animator(1000);\nanimator.setRepeatCount(Animator.INFINITE);\n\
    animator.setRepeatBehavior(Animator.RepeatBehavior.REVERSE);\nanimator.setAcceleration(0.8);\n\
    animator.setDeceleration(0.15);\nanimator.start();\nvar lastUpdate = new Date();\n\
    var startX = 50;\nvar endX = 300;\nfunction animate(t) {\n    var now = t || new\
    \ Date().getTime();\n    var deltaTime = now - lastUpdate;\n    lastUpdate = now;\n\
    \    var fraction = animator.update(deltaTime);\n    var x = (1 - fraction)*startX\
    \ + fraction*endX;\n    ctx.fillStyle = \"white\";\n    ctx.fillRect(0, 0, canvas.width,\
    \ canvas.height);\n    drawBullet(x, 50, ctx);\n    requestAnimationFrame(arguments.callee);\n\
    }\nanimate(0);\nfunction drawBullet(x, y, ctx) {\n    ctx.fillStyle = \"darkred\"\
    ;\n    ctx.strokeStyle = \"black\";\n    ctx.lineWidth = 4;\n    ctx.beginPath();\n\
    \    ctx.arc(x, y, 15, 0, 2*Math.PI, false);\n    ctx.fill();\n    ctx.stroke();\n\
    }\n```\n\nSee how easy it is! Take some time to play more with it. Try changing\
    \ the size and create a pulsating effect. Or change the size and color at the\
    \ same time. Draw and try to animate a cartoon-like bomb that’s anxious to explode\
    \ or a spaceship that shoots missiles. Use your imagination.\n\n**Extending Animator**"
