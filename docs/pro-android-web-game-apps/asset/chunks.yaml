- fmt: "事件被视为“低级”机制——当你需要指定非标准行为或处理棘手的边缘情况时，才应使用它们。否则，`Crafty`事件是大多数情况下以一致方式处理问题的最佳途径。\n\
    \n要触发你自己的事件，请调用`trigger`方法。我们来更新那段渲染角色并使其通知外部世界输赢条件的代码。当用户点击骑士时，用户获胜；如果骑士到达安全区，则用户失败。代码清单\
    \ 14-12 展示了如何在代码中实现这一想法。\n\n**代码清单 14-12.** *触发胜利与游戏结束事件*\n\n```  \nfunction drawPrincess()\
    \ {\n    Crafty.e(\"2D, Canvas, knight, SpriteAnimation, Mouse\")\n        .attr({x:\
    \ 100, y: 280})\n        .animate(\"move \", 0, 0, 15)\n        .animate(\"move\
    \ \", 15, -1)\n        .bind(\"EnterFrame\", function() {\n            this.x\
    \ += 0.8;\n            this.y += 0.4;\n            if (this.x > 500) {\n     \
    \           Crafty.trigger(\"GameOver\");\n            }\n        }).bind(\"MouseDown\"\
    , function() {\n            Crafty.trigger(\"Win\");\n        });\n}\n```\n\n\
    一旦你在代码的某处调用了`trigger`，就可以通过为特定事件类型添加监听器来响应事件：\n\n```  \nCrafty.bind(\"Win\", function()\
    \ {\n    Crafty.scene(\"win\");\n});\n```\n\n请注意，该事件名为`MouseDown`。尽管 Android 设备上没有鼠标，但`Crafty`会模拟`MouseDown`事件，将`touchstart`浏览器事件包装起来，这与我们在前几章中的做法非常相似。\n\
    \n**注意：** 不要忘记为添加到每个游戏实体的每一项功能指定正确的组件。没有`SpriteAnimation`组件，骑士实体将“不知道”与动画相关的方法。同样，为了使用鼠标，我们必须向实体添加`Mouse`组件，使其能够感知输入事件。\n\
    \n## 最终版本\n\n游戏现在几乎完成了，但我们还需要添加两个用于显示“Game Over”和“You Win”信息的横幅。显示它们与显示标志（如代码清单\
    \ 14-4 所示）并无区别。\n\n我们这款用`Crafty`编写的简单游戏的源代码如代码清单 14-13 所示。（部分代码已被精简以便缩短篇幅。你可以在本章提供的配套资料中找到完整版本，文件名为`01.crafty.html`。）\n\
    \n**代码清单 14-13.** *一个完成的 Crafty 游戏的鸟瞰视图*\n\n```  \nvar images = [\"img/terrain.png\"\
    , \"img/house-1.png\", \"img/house-2.png\",\n              \"img/arch-left.png\"\
    , \"img/arch-right.png\", \"img/knight.png\"];\n\n// The level\nvar ground = [\n\
    \    [\"grass\", \"grass\", \"roadNW\", \"grass\", \"roadNS\", \"grass\", \"grass\"\
    , \"grass\"],\n    /* ... more tiles here */\n];\n\n/* Location of sprites */\n\
    var objects = [\n    { sprite: \"house2\", x: 290, y: 198 }, { sprite: \"house1\"\
    , x: 476, y: 282 },\n    { sprite: \"archRight\", x: 553, y: 85}, { sprite: \"\
    archLeft\", x: 440, y: 92 }\n];\n\n/* Banners - images and sizes */\nvar logo\
    \ = { sprite: \"img/logo.png\", width: 420, height: 75 };\nvar winBanner = { sprite:\
    \ \"img/win.png\", width: 420, height: 90 };\nvar gameOverBanner = { sprite: \"\
    img/gameover.png\", width: 420, height: 90 };\n\nwindow.onload = function() {\n\
    \    Crafty.init();\n    Crafty.canvas.init();\n    Crafty.scene(\"loading\",\
    \ function() {\n        Crafty.background(\"#000\");\n        showLogo();\n  \
    \      Crafty.load(images, function() { Crafty.scene(\"game\"); });\n    });\n\
    });\n\nCrafty.scene(\"game\", function() {\n    createSprites();\n    drawTerrain();\n\
    \    drawObjects();\n    drawKnight();\n    // Once we get events - go to the\
    \ appropriate scene\n    Crafty.bind(\"Win\", function() { Crafty.scene(\"win\"\
    ); });\n    Crafty.bind(\"GameOver\", function() { Crafty.scene(\"gameover\");\
    \ });\n});\n\n// These scenes only show banners\nCrafty.scene(\"gameover\", showGameOverBanner);\n\
    Crafty.scene(\"win\", showWinBanner);\n\n// Start the \"loading\" scene\nCrafty.scene(\"\
    loading\");\n};\n\n/* Create sprite entities */\nfunction createSprites() {\n\
    \    Crafty.sprite(128, 68, \"img/terrain.png\", {\n        grass: [0,0], grass2:\
    \ [1,0], roadNW: [2,0],\n        /* Other terrain tiles are described in a same\
    \ way*/\n    });\n    Crafty.sprite(159, 148, \"img/knight.png\", { knight: [0,0]\
    \ });\n    Crafty.sprite(128, 106, \"img/house-1.png\", { house1: [0,0] });\n\
