    drawn in order: from top rows to bottom rows. When you repaint the tile, you


    automatically need to repaint two tiles above it and two tiles below it; those
    tiles, in turn, require more rows to be repainted, and so on. We assume that the


    terrain doesn’t change a lot, so it is not worth optimizing this aspect too much.
    If you are interested in making this code perfect, read on to the ‘ Dirty Rectangles’


    section of this chapter, which explains how to set clip and limit the repainting


    area to a single rectangle. With the help of clip, you only need to redraw five


    tiles: the changed tile itself, two adjacent tiles in the row above it, and two


    adjacent tiles in the row below it.


    **NOTE:** In fact, it is better to implement a much more useful optimization.
    When the user moves the map and we need to draw a new region, the number of new
    tiles is


    rather small (compared to the overall number of visible tiles). We have most of
    the


    image already rendered on the offscreen canvas, but we have to draw every single


    tile again. What a waste! It is much better to reuse the existing offscreen image,


    repaint the unchanged part to a second offscreen buffer, and then draw the few


    remaining new tiles. This technique is not too hard to implement, but requires
    one


    more offscreen canvas because you can’t safely copy pixels to and from the same


