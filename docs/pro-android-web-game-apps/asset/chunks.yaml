    Every object of the Van type has the same strictly defined interface. No surprises


    here.


    Dynamic languages like JavaScript allow adding, removing, or changing the


    structure of any class or object at runtime. So, tricks like the following are


    possible and valid:


    var van = getTheRandomVan();


    van.drive = racingCar.makeUTurn; // valid assignment of the new property


    Just like that, you can take the method from the object of a different class and


    use it instead of the existing method. In this case, only one instance of van
    is


    affected, the rest of the objects stay intact!


    As you can see, a lot of things can happen with the JavaScript data structures
    at


    runtime: the variables can change their types, and existing objects can be


    extended with the new methods using the local code or the code that was


    downloaded from the remote server via Ajax call.


    The dynamic behavior gives extreme power to the language, but makes it way


    harder for tools like IDEs to predict the structure of the objects and their types.


    The dynamic nature of JavaScript prevents code analyzers from helping you in


    the same way they help with the ‘ classic’’ static-typed languages.


    CHAPTER 1: Getting Started


    **3


    What We’ll Need


    Since we are going to make games for the web, we need to set up a small web-


    like infrastructure that mimics a real environment. As a bare minimum, we need


    the following three components:


     An integrated development environment (IDE)


     A web server to serve static files: HTML pages, JavaScript


    files, images, and others


     A device emulator or a real device to test the product


    This list is far from complete, of course, but it’s a good start.


    The goal of this section is to create a plain ‘ Hello World’’ HTML page that can


    be viewed with an emulator, a real device, and a desktop browser. Once you


    see that this setup works, you can forget about the environment and focus on


    writing applications.


    Almost every tool, except for the emulator, gives you some options. For


    example, there’s no ‘‘best’’ IDE for JavaScript and there are around a dozen


    popular web servers that are good at serving static files. Once you get a basic


    setup going, feel free to experiment with individual components, and fine-tune


    them.


    **NOTE:** When I write about software products, I often mention prices and versions.
    I think this information is useful. It is nice to know upfront how much you are
    expected to invest in a tool. This kind of information is, of course, subject
    to change and should be read as the “price at the time of writing.” For the most
    up-to-date information,


    please refer to the respective companies’ web sites.


    **NOTE:** Everybody who writes code makes mistakes. No matter how experienced
    you are, if you are human, you will eventually introduce bugs in your program.
    Debugging is part of the process, just like development, and not the easiest part
    I must admit.


    Debugging tools are also very important to set and use. But this topic is outside
    the scope of this chapter. A more in-depth discussion about hunting bugs in mobile-oriented
    code is found in Appendix A.


    CHAPTER 1: Getting Started


    **Environment Variables**


    Most tools that we use in this book follow the same installation pattern:


     Install the tool or extract archive


     Set environment variable TOOL_HOME, for example, JAVA_HOME or


    ANT_HOME


     Add the folder with executables, usually TOOL_HOME/bin to the


    PATH so that you can call the tool straight from the console or


    terminal without typing the whole path


    Setting and changing environment variables depends on your OS.


    Windows 7


    In Windows 7, right-click My Computer and select Properties from the drop-


    down menu. In the opened window, click Advanced System Settings 


    Environment Variables. Under System Variables, click New. Enter a variable


    name (for example, JAVA_HOME), the variable value, and then click OK. Note that


    you have to reopen any opened console windows to make them ‘ see’’ the


    changes.'
