    \n我们几乎完成了维护工作，但还剩下一项小任务：支持不同的服务器配置。通常，企业级服务器会拥有多个配置文件，用以描述十几种不同的环境：开发环境、测试环境、预上线环境、生产环境等等。其动机非常简单：你希望在不同配置下启用不同的服务器特性。\n\
    \n## 服务器配置\n\n我们决定对用户隐藏错误信息，但不想对自己隐藏。当你编写大量代码并每分钟都在测试变更时，你希望立即看到错误追踪信息，而无需查看控制台。换句话说，你希望在生产环境中启用“友好错误页面”功能，但在开发环境中则不需要。很可能，你也不想让自己的邮箱塞满通知邮件，而且同样不需要日志。\n\
    \n显然，你希望在不编写一行代码的情况下切换服务器模式（我们都很懒，记得吧）。这个任务通常通过添加配置文件支持来解决，但 Express 提供了一种更轻量级的机制。Node\
    \ 预留了一个叫`NODE_ENV`的特殊环境变量，用于保存环境标识符。它有两个“魔法”值：`development`（默认使用的值）和`production`（启用“生产模式”）。\n\
    \nExpress 有一个名为`configure`的函数，它允许你定义仅在特定环境中执行的配置部分。列表 10-33 展示了针对`production`配置的代码片段。\n\
    \n**列表 10-33.** *环境特定配置的示例*\n\n```javascript\n// For production we want logs to\
    \ be written to the file and have the verbose format\napp.configure(\"production\"\
    , function() {\n    loggerStream = fs.createWriteStream(__dirname + \"/node.log\"\
    , { flags: 'a'});\n    app.use(express.logger({\n        format: \"default\",\n\
    \        stream: loggerStream\n    }));\n});\n```\n\n这样，初始化日志的代码仅在`production`环境中执行——即当你明确将`NODE_ENV`设置为`production`时。默认情况下，Express\
    \ 会忽略这一部分。如果`configure`函数不带参数调用，它会在任何可用环境中执行。\n\n现在你已经拥有了为不同运行模式定义服务器不同行为的工具。请看以下完整代码，它阐释了这一思路（为了节省篇幅，我删去了冗长的函数）：\n\
    \n```javascript\nvar express = require(\"express\");\nvar BoardModel = require(\"\
    ./BoardModel\");\nvar nodemailer = require(\"nodemailer\");\nvar fs = require(\"\
    fs\");\nvar loggerStream;\nvar app = express.createServer();\n\n// Every environment\
    \ has the same settings for views\napp.configure(function() {\n    app.set('views',\
    \ __dirname + '/views');\n    app.set('view engine', 'ejs');\n});\n\n// For production\
