    \ 确保浏览器不执行默认行为，相当于直接忽略该事件\n\n同时调用这两个函数的代码示例如下：\n\n```javascript\na.addEventListener(\"\
    click\", function(e) {\n  e.stopPropagation();\n  e.preventDefault();\n}, false);\n\
    ```\n\n如果某个变量是一个 `<a>` DOM 节点，那么浏览器将永远不会因 `preventDefault()` 而跳转该链接。同时，由于 `stopPropagation()`，`<a>`\
    \ 的父节点将不会接收到发生在 `<a>` 上的点击事件。我们将在 API 中使用这种技术来限制那些仅针对主画布元素的事件的正常流程。\n\n## 从事件中获取更多信息\n\
    \n这个作为参数传递给每个事件监听器的小小 `e` 中隐藏着许多有趣的信息。对于 `touchstart` 事件，`e` 包含一个名为 `targetTouches`\
    \ 的数组。而 `targetTouches` 中的每个元素又包含 `pageX` 和 `pageY` 这两个参数，分别表示触摸点相对于页面左上角的坐标。\n\
    \n现在让我们运用这一知识，创建一个简单的应用：当用户点击画布时，在上面绘制一个弹孔（见清单 5-3）。这是一个简单但相当有用的练习；你可以立即看到事件处理是否正常工作，以及能从中获得什么：你手中的设备是否支持多点触控，如果支持，它最多能同时处理多少个触摸点？\n\
    \n## 清单 5-3. 检测 DOM 元素上的触摸事件\n\n```html\n<!DOCTYPE html>\n<html lang=\"zh\">\n\
    <head>\n  <meta charset=\"utf-8\" />\n  <meta name=\"viewport\"\n        content=\"\
    width=device-width, initial-scale=1.0, maximum-scale=1.0,\n                 user-scalable=no,\
    \ target-densitydpi=device-dpi\"/>\n  <style>\n    html, body {\n      overflow:\
    \ hidden;\n      width: 100%;\n      height: 100%;\n      margin:0;\n      padding:0;\n\
    \      border: 0;\n    }\n  </style>\n  <script>\n    function init() {\n    \
    \  var canvas = initFullScreenCanvas(\"mainCanvas\");\n      var ctx = canvas.getContext(\"\
    2d\");\n      canvas.addEventListener(\"touchstart\", function(e) {\n        for\
    \ (var i = 0; i < e.targetTouches.length; i++) {\n          drawBullet(\n    \
    \          e.targetTouches[i].pageX,\n              e.targetTouches[i].pageY,\
    \ ctx);\n        }\n        e.stopPropagation();\n        e.preventDefault();\n\
    \      }, false);\n    }\n\n    function drawBullet(x, y, ctx) {\n      ctx.fillStyle\
    \ = \"darkred\";\n      ctx.strokeStyle = \"black\";\n    }\n  </script>\n```\n\
    \n监听函数 `onCanvasTouchStart()` 将接收新的监听器。事件类型为 `touchstart`，事件监听器是 `onCanvasTouchStart()`\
    \ —— 一个向控制台输出消息的函数。现在，每当在 `el` 上触发新的 `touchstart` 事件时，就会调用 `onCanvasTouchStart()`。\n\
    \n请注意，监听函数也有一个参数：它被称为 `e`。这是单个字母作为参数名完全没问题的情况之一。每个人都知道 `e` 代表异常或事件，而且 99% 的情况下，根据上下文就能明确其含义。\n\
    \n事件被注册在元素上的监听器处理之后，会被发送到其直接父节点。然后该事件会触发父节点上注册的相应类型的所有监听器。接着事件会继续向上传递到父节点的父节点，以此类推，直到到达\
    \ DOM 层次结构的顶部。这种行为被称为 **冒泡** —— 事件就像一杯水中的气泡，从底部移动到表面。但不同的是，事件不是穿过水层，而是穿过 DOM 层次结构的层级：从一层到另一层，直到到达顶部。然后浏览器会为这个事件执行“默认行为”。\n"
