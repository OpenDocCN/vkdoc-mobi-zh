  trans: "\n# 排版后的内容\n\n此方案显然优于原始版本。针对 HTTP 请求的结果，有三种不同的回调函数进行处理：\n\n- `onload`，用于处理\
    \ HTTP 调用正常完成时的常规情况（不区分响应状态码，因此 200 和 503 状态码均视为正常）；\n- `onabort`，当用户中断请求时触发；\n\
    - `onerror`，当发生网络错误时触发。\n\n此代码的主要优势在于更易阅读，并且它是迈向更高质量错误报告的第一步。在 `XMLHttpRequest`\
    \ Level 2 中，`abort` 被视作独立事件处理。\n\nLevel 2 带来的改进远不止细粒度的回调函数，其中最重要的新特性之一是对二进制数据的处理能力。\n\
    \n## 处理二进制数据\n\n能够处理二进制数据对于游戏开发而言极为重要。无论是出于历史原因，还是为了节省流量并保持资源体积小巧，3D 模型等游戏资源通常以二进制格式保存。在\
    \ XHR Level 2 之前，并没有标准方法来实现这一需求。唯一可行的方案依赖于自定义函数 `overrideMimeType()`。清单 11-6 展示了这一方法。\n\
    \n**清单 11-6.** *使用原始 XMLHttpRequest 加载二进制数据（自定义字符集 Hack）*\n\n```\nfunction init()\
    \ {\n  var xhr = new XMLHttpRequest();\n  xhr.open('GET', 'bin/marine.md2');\n\
    \  xhr.overrideMimeType('text/plain; charset=x-user-defined');\n  xhr.onreadystatechange\
    \ = function(e) {\n    if (this.readyState == 4 && this.status == 200) {\n   \
    \   for (var i = 0; i < this.responseText.length; i++) {\n        var byte = this.responseText.charCodeAt(i)\
    \ & 0xff;\n        // 在此处处理字节\n      }\n    }\n  };\n  xhr.send();\n}\n```\n\n\
    清单 11-6 中的代码覆盖了服务器返回的 MIME 类型，强制浏览器将二进制响应解释为带有未知字符集 `x-user-defined` 的文本。这种方式旨在确保浏览器不对响应进行处理，从而保持服务器发送的字节数据不变。\n\
    \nXHR Level 2 规范明确增加了对二进制通信的支持。支持新特性的浏览器可以发送和接收任意二进制数据，而无需像清单 11-6 那样采用变通方法。查看清单\
    \ 11-7 中的代码，了解其工作原理。\n\n**清单 11-7.** *XHR Level 2 中对二进制数据交换的支持*\n\n```\nfunction\
    \ init() {\n  var xhr = new XMLHttpRequest();\n  xhr.open('GET', 'bin/marine.md2');\n\
    \  xhr.responseType = 'arraybuffer';\n  xhr.onload = function(e) {\n    var byteArray\
    \ = new Uint8Array(xhr.response);\n    for (var i = 0; i < byteArray.length; i++)\
    \ {\n      var byte = byteArray[i];\n      // 在此处处理字节\n    }\n  };\n  xhr.send();\n\
    }\n```\n\n清单 11-7 中的代码未使用任何 Hack 手段，因此更易于阅读和使用。要启用此功能，你需要将 XHR 对象的 `responseType`\
    \ 属性设置为 `ArrayBuffer` 或 `Blob`。在这种情况下，浏览器会将服务器的响应视为二进制数据，你无需任何变通即可访问字节。`responseType`\
    \ 的其他可能值包括 `document`（用于 DOM 对象）和 `text`（用于纯文本响应），默认值为 `text`。注意，在清单 11-7 中，我们使用了\
    \ XHR 的不同属性来访问响应数据：即 `response` 而非之前的 `responseText`。\n\nXHR Level 2 中的二进制数据支持依赖于其他规范：类型化数组（www.khronos.org/registry/typedarray/specs/latest/）和文件\
    \ API（www.w3.org/TR/FileAPI/）。类型化数组增加了操作二进制数据的标准方式。在类型化数组出现之前，开发者必须自行处理数据类型：从字节序列中创建字节、浮点数、整数及其他原子类型。在清单\
    \ 11-7 中，服务器的响应被视为“无符号 8 位整数”数组，换言之，即字节数组。\n\n还有其他类型，例如：`Int32Array` 用于表示 32 位有符号整数。\n"
- fmt: '# 等效于C中的`int`或`Float64Array`（双精度浮点类型）


    等效于C中的`double`。第二种二进制响应类型是`Blob`（[http://dev.w3.org/2006/webapi/FileAPI/#blob](http://dev.w3.org/2006/webapi/FileAPI/#blob)），这是来自File
    API规范的数据结构，与`ArrayBuffer`非常相似，唯一的区别在于`Blob`保留了它所持有的数据类型信息——无论是PNG图像、ZIP压缩包还是MD2模型。


    **注意：** 本章编写时，所有三个规范——`XMLHttpRequest Level 2`、`File API`和类型化数组——均处于工作草案状态。这意味着它们可能在几个月内发生变化。然而，浏览器厂商已经在基于这些规范构建实现。目前，你仍然需要考虑不支持新功能的设备和浏览器；这样的设备和浏览器数量仍然很多。关于浏览器支持的最佳信息来源，通常可以访问[http://caniuse.com/fileapi](http://caniuse.com/fileapi)和[http://caniuse.com/typedarrays](http://caniuse.com/typedarrays)，以及通过模拟器和真实设备进行广泛测试。


    如果你想了解更多关于新API的激动人心的特性，请参阅Eric Bidelman撰写的精彩HTML5 Rocks文章《New Tricks in XMLHttpRequest2》([www.html5rocks.com/en/tutorials/file/xhr2/](http://www.html5rocks.com/en/tutorials/file/xhr2/))。另一个很好的灵感来源是W3C规范——这些文档在本书中经常被引用，因为它们对开发者友好且编写良好。你应该阅读它们，以全面了解新特性应该如何工作以及Web的发展方向。


    # 反向Ajax


    本节致力于探讨客户端与服务器之间的低延迟通信，其中双方都可以相互发送消息。`XHR`的典型用法假设客户端是唯一的事件源；例如，当用户填写表单时，他可能需要验证服务的响应，此时他向服务器请求执行某些操作并返回响应。如果我们有一个应用程序，其中服务器应该能够向客户端发送请求，该怎么办？例如，在聊天应用程序中，服务器可能想要向客户端发送新的聊天消息；换句话说，就是向客户端发送请求。


    允许服务器与客户端通信的技术集合通常被称为反向Ajax。从技术上讲，服务器无法连接到网页并直接发送消息，因为能够建立连接的唯一一方是网页。然而，通过服务器与客户端之间的某种协作，可以实现这一结果。


    每种此类技术背后的思路是在页面与Web服务器之间建立某种持久连接，以便服务器在出现更新时能够使用该连接将消息推回给客户端。当没有活动时，连接保持空闲，但一旦服务器有要发布的新事件，它就可以利用打开的连接立即将其传递给客户端。这种模型与常规Ajax不同，因为它允许服务器（而非客户端）成为通信的发起方。


    **注意：** 这种架构有几种名称，但都未标准化。最流行的名称是反向Ajax、服务器推送和Comet。除了Comet之外，所有这些名称都表明通信的主动权现在在服务器端：服务器现在可以*推送*消息给客户端，这种模型是常规Ajax工作方式的*反向*。


    ## 问题


    任何在线游戏服务的大厅都是服务器推送架构至关重要的完美示例。假设用户已连接到游戏，他需要找出还有谁在玩。其他玩家的列表必须……'
