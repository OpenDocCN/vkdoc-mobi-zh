    \n## 更新你的应用程序\n\n一旦你的应用程序变得流行，你可能希望更新一些新功能来吸引更多用户。本章的最后部分专门讨论如何将更新推送到 Google Play\
    \ 商店。让我们看一个简单的场景：你发现白色背景在设备上看起来不好看，想将其改为黑色。你在一分钟内修复了一行 JavaScript 代码，现在急于发布新版本。在创建新的签名构建之前，再次打开`AndroidManifest.xml`文件，并更新清单\
