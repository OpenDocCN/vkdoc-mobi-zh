    forests, and mountains, totaling 100,000 × 100,000 pixels. Good enough for a


    massive game. Obviously, we can’t use an image to bring it to the user: there’s


    simply not enough RAM to hold a super-map like that either on a mobile device


    or on your PC.


    It turns out that the vast areas of the map are composed of very similar patterns.


    Snow looks almost the same everywhere-----it is white and shiny. The same is


    also true for desert, grass, water, and similar natural areas. Perhaps we can
    use


    that to optimize our map?


    The Idea Behind Tile Maps


    Tiles are small images of the same size that are designed to fit each other


    without breaking the pattern----that’s how they make up a piece of the map.


    Look at Figure 6-1 and you see this concept in action.


    **Figure 6-1.** *Tile map in* Warcraft 2


    *CHAPTER 6: Rendering Virtual Worlds


    **219


    This is a screenshot of the map editor from Warcraft 2\. White lines show the


    borders of tiles that compose a solid picture. Note that the tiles are aligned
    to


    the grid. If you look closer, you see that tiles are not unique. In fact, they
    repeat pretty often. For example, there are only three or four different tiles
    for forest, a couple of tiles for dirt, and about a dozen tiles for the border
    region, where


    forest transforms into dirt.


    Tiles are designed in a way that the user doesn’t see the borders that separate


    one tile from another. Look at the right side of the screenshot that is not covered


    by a helper grid, and you’ll see that the forest looks quite natural. Even though


    almost all the trees look the same, you don’t recognize the tiled nature of this


    image straightaway. Neither will the player.


    How does it help us with the super-map problem? Well, let’s use some simple


    math. Let’s say we have four types of terrain: snow, forest, plains, and


    mountains. Our designer has created four tiles for each, totaling 16 tiles. In


    addition, we have around 40 ‘ border tiles’’ to render areas where one type of


    terrain transforms into the other, making the overall number of tiles 56.


    If the size of each tile is 64 pixels, we can fit the entire tile set into a 512
    × 512


    image. So instead of having a monstrous 100,000 × 100,000 map image, we


    have a 512 × 512 tile set, which can be easily downloaded by any modern


    device.


    The next step is to present the world as a grid of tiles. Usually, a level designer


    has a special tool for editing the tile maps. Break the world map into 64 × 64


    cells and select the appropriate tile for each of them. Now the whole world can


    be described by a two-dimensional array. Here is an example of how such array


    might look:


    var world = [


    [2, 2, 2, 8, 2, 2],


    [5, 4, 7, 3, 4, 3],


    [5, 4, 3, 3, 4, 7]


    ];


    The real array would be much bigger, of course. The index of the array element


    is the coordinates of the cell in the world map (x and y), and the value is the


    number of the tile in the tile set. For example, in the array, the value of


    world[1][2] is 7\. This means that the world map in coordinates (x=2, y=1) is


    rendered with the tile number 7 from the tile set. Which tile that is depends
    on


    the concrete set. It can be snow, sand, or forest. Figure 6-2 shows the same


    screenshot from the Warcraft 2 map editor; the tile indexes are written over each


    cell. This is an example of a world fragment that can be described by our array.


    ![](index-225_1.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **Figure 6-2.** *Tile map fragment with the marked tiles*


    There’s one more advantage to this method: you don’t need to download the


    array that describes the whole world map in one piece. Remember the example


    that we started with----a huge map for a massive online game? To describe the'
  trans: "\n# 如何渲染建筑物和角色等世界对象\n\n## 第 6 章：渲染虚拟世界\n\n### 瓦片地图\n\n`Tile maps`（瓦片地图）是一种非常强大的技术，它允许使用名为`tiles`（瓦片）的小图像来构建庞大而复杂的关卡。想象一下，你正在制作一款大型多人在线策略游戏，其中包含一张巨大的世界地图，拥有河流、平原、森林和山脉，总尺寸为\
    \ 100,000 × 100,000 像素。这对大型游戏来说绰绰有余。显然，我们无法直接使用一张图像将其展示给用户：无论是移动设备还是个人电脑，都没有足够的\
    \ RAM 来容纳如此巨大的地图。\n\n事实证明，地图的广阔区域由非常相似的图案组成。雪地几乎到处都一样——洁白而闪亮。沙漠、草地、水域和类似的自然区域也是如此。也许我们可以利用这一点来优化我们的地图？\n\
    \n#### 瓦片地图背后的理念\n\n`Tiles`是相同尺寸的小图像，设计成彼此无缝衔接而不破坏图案——它们就是这样拼凑出地图的一部分的。请看图 6-1，你会看到这一概念的实际应用。\n\
    \n**图 6-1.** *《魔兽争霸 2》中的*瓦片地图\n\n这是《魔兽争霸 2》地图编辑器的截图。白线显示了构成一幅完整图像的瓦片边界。注意，瓦片是对齐到网格上的。如果仔细观察，你会发现瓦片并非独一无二。事实上，它们重复出现的频率相当高。例如，森林只有三四种不同的瓦片，泥土有几种瓦片，而森林向泥土过渡的边界区域大约有十二种瓦片。\n\
    \n瓦片的设计方式使得用户看不出分隔瓦片的边界。查看截图中未被辅助网格覆盖的右侧部分，你会发现森林看起来相当自然。尽管几乎所有的树木看起来都一样，但你不会立刻意识到这张图像的瓦片本质。玩家也同样不会意识到。\n\
    \n那么，这如何帮助我们解决超大尺寸地图的问题呢？让我们进行一些简单的计算。假设我们有四种地形类型：雪地、森林、平原和山脉。我们的设计师为每种地形创建了四个瓦片，共计\
    \ 16 个瓦片。此外，我们还有大约 40 个边界瓦片，用于渲染一种地形向另一种地形过渡的区域，使得瓦片总数达到 56 个。\n\n如果每个瓦片的尺寸是 64\
    \ 像素，我们可以将整个瓦片集放入一张 512 × 512 像素的图像中。因此，我们不再需要一张庞大的 100,000 × 100,000 像素的地图图像，取而代之的是一张\
    \ 512 × 512 像素的瓦片集，任何现代设备都能轻松下载。\n\n下一步是将世界表示为一个瓦片网格。通常，关卡设计师会使用专门编辑瓦片地图的工具。将世界地图划分为\
    \ 64 × 64 的单元格，并为每个单元格选择合适的瓦片。现在，整个世界都可以用一个二维数组来描述。以下是这样一个数组可能的示例：\n\n```javascript\n\
    var world = [\n  [2, 2, 2, 8, 2, 2],\n  [5, 4, 7, 3, 4, 3],\n  [5, 4, 3, 3, 4,\
    \ 7]\n];\n```\n\n当然，实际的数组会大得多。数组元素的索引是世界地图中单元格的坐标（x 和 y），而值则是瓦片集中的瓦片编号。例如，在该数组中，`world[1][2]`\
    \ 的值是 7。这意味着世界地图中坐标（x=2, y=1）处的单元格使用瓦片集中的 7 号瓦片来渲染。具体是哪个瓦片取决于实际的瓦片集，可能是雪地、沙子或森林。图\
    \ 6-2 展示了与《魔兽争霸 2》地图编辑器相同的截图；每个单元格上都标有瓦片索引。这是一个世界片段的示例，可以用我们的数组来描述。\n\n**图 6-2.**\
    \ *带有标记瓦片的瓦片地图片段*\n\n这种方法还有一个优势：你无需一次性下载描述整个世界地图的数组。还记得我们一开始举的例子吗——一个用于大型多人在线游戏的巨大地图？\n"
- fmt: "为了进一步优化地图加载，我们最初只需要加载玩家周围`50 × 50`个瓦片的区域。假设这片地图区域最有可能满足玩家当前的探索需求。剩余的瓦片可以在玩家开始移动或滚动地图时，从服务器加载。我将在本章稍后部分展示如何实现此技术。\n\
    \n通过合理的内存管理，“世界地图”的大小实际上可以是无限的，因为它不存储在浏览器中；只有当前“最重要”的那块地图区域才会被缓存在客户端。其余部分则保留在服务器上。\n\
    \n## 实现瓦片地图\n\n在本节中，我们将学习如何使用JavaScript实现瓦片地图。我们将从最简单的实现开始，然后逐步改进。在本章中，我们使用方形瓦片，但当然，其他形状也是可以的。例如，等距游戏使用菱形瓦片。回合制策略游戏可能会使用六边形瓦片，因为六边形瓦片之间距离的计算更为“公平”。一旦我们为方形瓦片创建了引擎，实现相同思路的其他几何形状就会相当容易，但其背后的数学原理可能稍微复杂一些。图6-3展示了不同形状的瓦片。\n\
    \n![](index-226_1.jpg)\n\n![](index-226_2.jpg)\n\n**Figure 6-3.***瓦片可能有不同的大小和形状。*\n\
    \n在本章中，我们使用一个名为`img/tiles.png`的文件中的瓦片集，该文件随本章的源代码一起提供。这个瓦片集有14个`40 × 40`的瓦片，这正好满足我们的需求。这些瓦片来自[www.lostgarden.com](http://www.lostgarden.com)的免费瓦片集，并得到了Daniel\
    \ Cook的许可。为了让您了解我们的资源是什么样的，它们展示在图6-4中。\n\n**Figure 6-4.***本章所使用的资源。左侧是用于渲染背景的瓦片。右侧是世界对象。*\n\
    \n## 设置\n\n让我们从在屏幕上绘制瓦片开始，不进行任何优化。现在我们正在处理一个由`40 × 40`数组描述的相当小的世界。该代码基于第3章的骨架（清单3-6），并增加了第4章动画的支持（清单4-24）和第5章的事件处理（“自定义事件”部分）。清单6-1显示了\
    \ `<script>` 块，它是进行虚拟世界实验的基础。该代码建立了一个典型的游戏开发试验场：它初始化了图像加载、输入处理和动画循环。为了方便起见，这个更高级的骨架与本章节的其他源代码一起保存在一个名为`setup`的文件夹中。\n\
    \n**清单6-1.***本章的设置*\n\n```javascript\n<script>\nvar canvas;\nvar ctx;\nvar imageManager;\n\
    var inputHandler;\nvar images = {\n  \"tiles\": \"img/tiles.png\"\n};\n\nfunction\
    \ init() {\n  // Start image loading\n  imageManager = new ImageManager();\n \
    \ imageManager.load(images, onLoaded);\n  \n  // Init canvas\n  canvas = initFullScreenCanvas(\"\
    mainCanvas\");\n  ctx = canvas.getContext(\"2d\");\n  \n  // Init input and listen\
    \ to move events\n  inputHandler = new InputHandler(canvas);\n  inputHandler.on(\"\
    move\", onMove);\n}\n\n/** Once all images are loaded - starts the animation loop\
    \ */\nfunction onLoaded() {\n  animate(0);\n}\n\n/** Perform rendering here */\n\
    function animate(t) {\n  clear();\n  requestAnimationFrame(arguments.callee);\n\
    }\n\n/** Handle map move */\nfunction onMove(e) {\n}\n\n/* Clears the canvas with\
    \ the solid black color */\nfunction clear() {\n  ctx.fillStyle = \"black\";\n\
    \  ctx.fillRect(0, 0, canvas.width, canvas.height);\n}\n\nfunction initFullScreenCanvas(canvasId)\
    \ {/* not changed */}\n```"
  raw: 'map we would need an array of 1500 × 1500 elements. Even though this is way


    better than having a monster-size image, it is still considerable traffic and


    memory loss. A typical player is not interested in the entire map. He usually


    needs to see only the area that surrounds his location; most likely, he will not


    move too far away from there. Even if he does start to explore, he receives


    portions of the map as he moves forward.


    To optimize the map loading even more, we could initially load the area of 50
    ×


    50 tiles around the player. We assume that this piece of map will most likely


    satisfy the immediate exploration needs. The rest can be loaded from the server


    when the player starts to move or scroll the map. I show how to implement this


    technique later in the chapter.


    With proper memory management, the size of the ‘‘world map’’ can be virtually


    unlimited since it is not stored on the browser; only the piece of map that is


    ‘ most important’’ right now is cached in the client. The rest stays on the server.


    Implementing a Tile Map


    In this section, we learn how to implement the tile map with JavaScript. We will


    start with the simplest possible implementation and then gradually make it


    better. In this chapter, we work with square tiles, but, of course, other shapes


    are also possible. For example, isometric games use diamond-shaped tiles.


    Turn-based tactics games might use hexagon tiles because the calculation of


    the distance between hex tiles is more ‘‘fair.’’ Once we created the engine for


    square tiles, it is fairly easy to implement the same idea for other geometry,
    but


    the math behind it might be slightly more complex. Figure 6-3 shows the


    different shapes of the tiles.


    ![](index-226_1.jpg)


    ![](index-226_2.jpg)


    CHAPTER 6: Rendering Virtual Worlds


    **221


    **Figure 6-3.** *The tiles may have different sizes and shapes.*


    In this chapter, we use a tile-set that you can find in a file called img/tiles.png


    that comes along with the source code for this chapter. This tile set has fourteen


    40 × 40 tiles which is just fine for our needs. The tiles are taken from the free
    tile set from [www.lostgarden.com with](http://www.lostgarden.com) the kind permission
    of Daniel Cook. To give you an idea of how our resources look, they are presented
    in Figure 6-4.


    **Figure 6-4.** *Assets used in this chapter. On the left are tiles for rendering
    background. On the right are* *world objects.*


    **Setup**


    Let’s start with drawing tiles on the screen without optimizations of any kind.


    Right now we are working with a rather small world that is described by the 40
    ×


    40 array. The code is based on the skeleton from Chapter 3 (Listing 3-6), with


    the added support of animation from Chapter 4 (Listing 4-24) and event handling


    from Chapter 5 (the ‘‘Custom Events’ section). Listing 6-1 shows the <script>
    block-----a base for experiments with virtual worlds. The code sets up a typical


    game-dev playground: it initiates the image loading, input handling, and


    animation loop. For your convenience, this more advanced skeleton is saved in


    a folder called setup along with the other sources for this chapter.


    CHAPTER 6: Rendering Virtual Worlds


    **Listing 6-1.** *Setup for This Chapter*


    <script>


    var canvas;


    var ctx;


    var imageManager;


    var inputHandler;


    var images = {


    "tiles": "img/tiles.png"


    };


    function init() {


    // Start image loading


    imageManager = new ImageManager();


    imageManager.load(images, onLoaded);


    // Init canvas


    canvas = initFullScreenCanvas("mainCanvas");


    ctx = canvas.getContext("2d");


    // Init input and listen to move events


    inputHandler = new InputHandler(canvas);


    inputHandler.on("move", onMove);


    }


    /** Once all images are loaded - starts the animation loop */


    function onLoaded() {


    animate(0);


    }


    /** Perform rendering here */


    function animate(t) {


    clear();


    requestAnimationFrame(arguments.callee);


    }


    /** Handle map move */


    function onMove(e) {


    }


    /* Clears the canvas with the solid black color */


    function clear() {


    ctx.fillStyle = "black";


    ctx.fillRect(0, 0, canvas.width, canvas.height);


    }


    function initFullScreenCanvas(canvasId) {/* not changed */}'
