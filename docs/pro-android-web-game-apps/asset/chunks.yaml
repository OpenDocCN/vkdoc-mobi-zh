    exports = module.exports = BoardModel;


    Now let’s update our main script to show the board instead of Hello World.


    Listing 10-16 shows how this can be done.


    **Listing 10-16.** *Displaying the Board at the Main Page of the Site*


    var app = require(''express'').createServer();


    var BoardModel = require("./BoardModel");


    var board = new BoardModel();


    board.makeTurn(2);


    board.makeTurn(3);


    app.get(''/'', function(req, res){


    res.setHeader(''Content-Type'', ''text/plain'');


    res.send(board.toString());


