    You solve the problem this way since the engine now checks the ball position


    against the left and the right leg of the arch separately, and not the arch as
    a


    whole. As the ball moves, the rendering order changes, showing the correct


    picture all the time.


    Listing 7-29 shows how this solution looks in the code. Add the following three


