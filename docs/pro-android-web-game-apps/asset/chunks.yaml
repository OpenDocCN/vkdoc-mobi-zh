  raw: '**Figure 13-17.** *Multiple branches and probabilistic conditions on a decision
    tree* The code in Listings 13-6 to 13-8 shows the JavaScript implementation of
    such


    a decision-making agent. It has just two ‘ needs’ ----to eat and to sleep. It
    sleeps whenever it wants to, but the chance of it eating is only 30 percent. The
    listings


    are rather self-explanatory. The code is based on two types of decision nodes.


    The NumericDecision checks the parameter of the object; it then delegates to


    the leNode if it is ‘‘lesser or equals’ than the threshold, or to the gNode if
    it is greater than the threshold. The numeric decision is used to trigger the
    hunger


    behavior. If the hunger level is above 50, the agent will think about finding
    food


    CHAPTER 13: AI in Games


    **537


    (with 30 percent chance). The second type of node that we need is


    ProbabilisticNode----it chooses the action depending on the value of the


    random number.


    **Listing 13-6.** *The Decision Tree Nodes*


    /**


    * Numeric decision is based on the value of the certain agent parameter.


    * If value is lesser or equal than the threshold, the leNode is executed


    * otherwise - gNode.


    */


    function NumericDecision(name, threshold, leNode, gNode) {


    this._name = name;


    this._threshold = threshold;


    this._leNode = leNode;


    this._gNode = gNode;


    }


    NumericDecision.prototype.execute = function(agent) {


    var node = agent[this._name] > this._threshold ? this._gNode : this._leNode;


    node.execute(agent);


    };


    /**


    * Probabilistic decision is executed depending on the chance value


    * 0 - never


    * 1 - always


    * between 0-1 with the


    */


    function ProbabilisticDecision(chance, trueNode, falseNode) {


    this._chance = chance;


    this._trueNode = trueNode;


    this._falseNode = falseNode;


    }


    ProbabilisticDecision.prototype.execute = function(agent) {


    var node = Math.random() < this._chance ? this._trueNode : this._falseNode;


    node.execute(agent);


    };


    Now that we have the nodes, we can add some actions too. The EatAction


    makes the agent go to a predefined point where the food source is located, and


    start eating. The SleepAction makes the agent sleep wherever he is, and finally,


    the WanderAroundAction makes the agent select a random point on the map and


    navigate there.


    CHAPTER 13: AI in Games


    **Listing 13-7.** *Actions: The Leafs of Decision Tree*


    /**


    * Eat - reduce hunger


    */


    function EatAction() { }


    EatAction.prototype.execute = function(agent) {


    console.log("Decided to eat");


    navigateTo(220, 70);


    eat();


    };


    /**


    * Sleep - increase energy


    */


    function SleepAction() {}


    SleepAction.prototype.execute = function(agent) {


    console.log("Decided to sleep");


    sleep();


    };


    /**


    * Do nothing


    */


    function WanderAroundAction() {}


    WanderAroundAction.prototype.execute = function(agent) {


    console.log("Wandering around...")


    goToRandomPoint();


    };


    Finally, we need to create the tree and let it make the decision. Listing 13-8


    shows how to do it.


    **Listing 13-8.** *Initializing the Decision Tree*


    /**


    * Initialize the tree


    */


    function buildDecisionTree() {


    var wander = new WanderAroundAction();


    var sleep = new SleepAction();


    var eat = new EatAction();


    return new NumericDecision("hunger", 50,


    new NumericDecision("energy", 30,


    sleep,


    wander),


    new ProbabilisticDecision(0.3,


    eat,


    new NumericDecision("energy", 30,


    CHAPTER 13: AI in Games


    **539


    sleep,


    wander)));


    }


    Once the decision tree is initialized, you can call tree.execute() whenever an


    agent needs to make a decision. It is worth mentioning that decision making


    should not happen on every frame of the game. The decision-making logic


    happens only when the character needs to reconsider what he is doing. In the


    simple example that comes along with the source code for this chapter, the


    character makes the decision when he finishes the action sequence and needs


    to do something new.


    The decision itself might require a complex action. For example, the decision
    to


    recharge a weapon might involve finding the ammo location, moving there (with


    the help of a pathfinding algorithm), taking the ammo and recharging, and finally


    returning to the front line. Such a set of complex actions is usually referred
    to as behavior.'
