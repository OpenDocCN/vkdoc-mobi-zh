- fmt: "[http://people.apache.org/~pmuellr/weinre/builds/.](http://people.apache.org/~pmuellr/weinre/builds/)\
    \ Unpack the zip file and run the following from the command line:\n\n```\njava\
    \ -jar weinre.jar --httpPort 8000 --boundHost -all-\n```\n\n`weinre.jar`文件是一个可执行的Java程序，用于启动调试服务器，该服务器充当设备和PC之间的中介。\n\
    \n它为连接到它的WebKit浏览器提供调试接口，并与调试目标（在设备或模拟器上运行的网页）交换命令。上述命令会在端口8000上启动服务器。\n\n要完成设置，请将要调试的网页中添加以下一行代码：\n\
    \n```\n<script src=\"http://10.0.2.2:8000/target/target-script-min.js#anonymous\"\
    ></script>\n```\n\n这行代码指示HTML页面加载由调试服务器提供的特殊脚本，然后开始通信。根据您的环境更改IP地址和端口。例如，上述行用于从模拟器启动页面，该页面通过`10.0.2.2`引用主机操作系统。端口8000是通过`weinre.jar`启动选项配置的。\n\
    \n在设备上加载该页面。现在，在桌面Chrome浏览器中访问`http://localhost:8000/client`（该界面在Safari中也可用，但在Chrome上显示效果略好）。图A-4显示了打开的调试会话。背景中的浏览器窗口显示调试界面。如您所见，它看起来与我们在本附录第一节中尝试的Chrome开发者工具完全一样。\n\
    \n![图A-4](index-626_1.jpg)\n\n**附录：调试客户端JavaScript**\n\n**图A-4** *weinre调试会话。打开的“元素”选项卡允许您探索和修改设备DOM树的内容。*\n\
    \n有关weinre的更多信息，请参考其主页：`http://people.apache.org/~pmuellr/weinre/`。Chrome开发者工具文档页面位于：`http://code.google.com/chrome/devtools/docs/overview.html`。\n\
    \n## 总结\n\nAndroid缺乏对浏览器中全功能调试的支持，这会使调试变得极其困难。幸运的是，大多数问题并非设备特定，可以在桌面浏览器上进行调试。基于WebKit的浏览器（Chrome和Safari）提供了一套出色的“开发工具”，专注于解决各种问题：布局、逻辑或时序。\n\
    \n在本附录中，我们学习了如何执行以下操作：\n\n- 在基于WebKit的浏览器中调试网页\n- 使用标准的Android工具：`console.log`和`logcat`来追踪问题\n\
    - 设置`weinre`以调试网页可能存在的布局或时序问题\n\n## 索引\n\n- **A**\n  - Animation and sprites.\
    \ *另请参阅* A*算法\n    - 形式化描述，528-529\n    - 实现，529-531\n    - 非形式化描述，525-527\n \
    \ - arguments.callee，150\n  - browser，150\n  - canvas，148\n  - 扩展版本\n    - 预估成本，526\n\
    \    - 数字，527\n    - 路径，525-526\n  - 缓动函数，170\n  - 特性，171\n  - 节点列表，527-528\n\
    \  - 函数，168\n  - 注记，531-532\n  - 钩子函数，170-171\n  - 构造函数，169-170"
  raw: '[http://people.apache.org/~pmuellr/weinre/builds/.](http://people.apache.org/~pmuellr/weinre/builds/)
    Unpack the zip file and run the following from the command line:


    java -jar weinre.jar --httpPort 8000 --boundHost -all-


    The weinre.jar file is an executable Java program that starts the debug server,


    which acts like a mediator between the device and PC. It provides a debug


    interface to the WebKit browser that connects to it and exchanges commands


    with the debug target-----the web page running on the device or the emulator.
    The


    preceding command starts the server on port 8000.


    To finish the setup, add the following line to the web page that you’re going
    to


    debug:


    [<script src="http://10.0.2.2:8000/target/target-script-](http://10.0.2.2:8000/target/target-script-min.js#anonymous)


    [min.js#anonymous"></script>](http://10.0.2.2:8000/target/target-script-min.js#anonymous)


    It instructs the HTML page to load the special script served by debug server,


    and then start the communication. Change the IP address and the port


    according to what you have in your environment. For example, the preceding


    line is used to launch the page from the emulator that refers to the host OS via


    10.0.2.2\. Port 8000 is configured via weinre.jar startup options.


    Load the page on the device. Now go to [http://localhost:8000/client in](http://localhost:8000/client)


    desktop Chrome (the interface is usable in Safari too, but looks slightly better
    on


    Chrome). Figure A-[4](#index_split_000.html#p11) shows the opened debugging session.
    The browser window in the background shows the debug interface. As you see, it
    looks


    exactly like the Chrome dev tools that we tried in the first section of this


    appendix.


    ![](index-626_1.jpg)


    APPENDIX: Debugging Client-side JavaScript


    [626](#index_split_007.html#p626)


    **Figure [A-4.](#index_split_000.html#p11)** *The weinre debugging session. The
    opened Elements tab allows you to explore and modify* *the content of a device’s
    DOM tree.*


    For more information on weinre, refer to its home page at


    [http://people.apache.org/~pmuellr/weinre/.](http://people.apache.org/~pmuellr/weinre/)
    The Chrome Dev tools documentation page is at


    [http://code.google.com/chrome/devtools/docs/overview.html.](http://code.google.com/chrome/devtools/docs/overview.html)


    **Summary**


    Android lacks support for full-scale debugging in browsers, and that can make


    debugging an extremely hard task. Luckily, most of the problems that you will


    face are not device-specific and can be debugged on a desktop browser.


    WebKit-based browsers (Chrome and Safari) provide an excellent set of


    ‘ development tools’’ that are laser-focused on solving all kinds of problems:


    layout, logic, or timing.


    In this appendix, we learned how to do the following:


     Debug a web page in a WebKit-based browser


    APPENDIX: Debugging Client-side JavaScript


    **[627](#index_split_007.html#p627)


     Use standard Android facilities: console.log and logcat to


    trace the problem


     Set up weinre to debug the possible layout or timing issues of


    the web page


    **Index**


     **A**


    Animation and sprites. *See also*


    A* algorithm


    Sprites


