- fmt: "# 排版后的文本\n\n注册的回调函数，当操作完成时被调用。\n\n让我们来看一下代码，如列表4-1所示。\n\n## 第4章：动画与精灵\n\n\
    **127**\n\n**列表 4-1\\.** **加载图像，最简单的示例**\n\n```\nvar img = new Image(); // 创建新的\
    \ Image 对象。加载尚未开始。\nimg.onload = function() { // 当加载完成时调用此函数\n    alert(\"Image\
    \ is loaded\"); // 此时你知道图像已就绪\n};\nimg.src = \"img/knight.png\"; // 当你设置 src 属性时，浏览器开始下载文件。\n\
    ```\n\n图像加载是一个异步操作：一旦你设置了`src`属性，浏览器就开始加载字节数据，但脚本会继续运行。当加载完成时，浏览器会调用一个已注册的回调函数来通知你的脚本操作的结果。\n\
    \n你可以同时加载多个图像，但浏览器不保证任何特定的加载顺序。例如，一个最后开始加载的小图像可能最先加载完成。实际上，这意味着你始终需要检查每个已加入加载队列的图像的状态，而像“如果\
    \ `b.png` 已加载，那么 `a.png` 可能也加载完了”这样的假设是不可靠的。\n\n**注意：** 另一个处理所有资源（不仅仅是图像）的重要规则：你绝不应依赖良好的网络状况，或假设你等待的资源100%可用。当你创建游戏时，你通常是在一个运行如钟表般精确的本地环境中工作。在现实世界中，互联网连接可能在你最意想不到的时候中断。你应该为此做好准备，要么重试下载资源，要么通知用户问题并退出，要么在没有资源的情况下继续。在没有资源的情况下继续运行并不意味着你可以忽略事故。对于图像，如果不重要的图像加载失败，你可以使用占位图像来代替正确的图像（好吧，我们没能加载巫师帽子的纹理，但游戏的其他部分已加载完成，所以我们为什么要结束这个世界呢？）。\n\
    \n列表4-2展示了如何处理图像问题。请注意加粗的行。\n\n**列表 4-2\\.** **使用错误回调**\n\n```\nvar img = new\
    \ Image();\nimg.onload = function() {\n    alert(\"Image loaded\");\n};\nimg.onerror\
    \ = function() { // 当出现问题时调用此回调\n    alert(\"Failed to load the image\");\n};\n\
    img.src = \"img/knight.png\";\n```\n\n加粗的行显示了你应该在`Image`对象上注册的第二个回调函数——`onerror`。当图像无法加载时，此函数被调用，并给你运行后备机制的机会。\n\
    \n**注意：** 为什么我们使用 PNG 图像？PNG 已成为游戏开发的事实标准。它是一种*无损*格式，意味着即使在压缩后它也能保持像素完美（与JPEG不同）。它是开放的并且免费使用。此外，它支持透明度和半透明度。对于精灵来说，还需要什么呢？\n\
    \n## 加载多个图像\n\n通常你的游戏需要不止一个图像。你必须跟踪每个精灵的加载状态，对问题做出反应，并执行其他小的维护任务。创建一个负责此类任务的工具类是个好主意。我们想进一步简化图像加载！\n\
    \n我们需要管理多个图像的加载，当加载完成时触发一个单一的回调。由于图像加载是一个相对较慢的操作，我们需要某种进度指示。考虑到我们在创建一个用户友好的界面，我们想显示一个进度条。我们想要实现的最终任务是给每个图像一个别名：一个用于在项目中标识图像的字符串。使用别名比使用文件名要方便得多。文件名经常变化，而别名保持不变。\n\
    \n让我们从结果开始。列表4-3展示了我们如何使用`ImageManager`来预加载游戏所需的图像。"
