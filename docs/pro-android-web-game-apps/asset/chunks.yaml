- fmt: "# CHAPTER 7: Making an Isometric Engine\n\nImplementation of the `DirtyRectangleManager`\
    \ might output an array of dirty rectangles that will require multiple calls to\
    \ `draw()`. The job of the layer is very simple: render the content to the given\
    \ rectangle. Then why do we pass the `DirtyRectangleManager` if all we need is\
    \ a rectangle? Because layers like `ObjectLayer` need a way to mark areas as dirty.\n\
    \nBoth layers should obey the new rules and render only the parts of content within\
    \ the dirty rectangle. The code is quite simple: instead of checking against the\
    \ viewport, check against the bounds of the dirty rectangle. So the `draw()` method\
    \ of `ObjectLayer` is updated, as in Listing 7-35.\n\n**Listing 7-35.** *Updating\
    \ `ObjectLayer` to Re-Render Only the Dirty Parts of the Screen*\n\n```\n_p.draw\
    \ = function(ctx, dirtyRect) {\n  if (this._cacheDirty) {\n    this._resetCache();\n\
    \  } else if (this._cacheUnsorted) {\n    this._sortCache();\n  }\n  // If there\
    \ is no dirty rectangle – repaint all and use the _bounds\n  // instead of dirty\
    \ rectangle\n  dirtyRect = dirtyRect || new Rect(0, 0, this._bounds.width,\n \
    \                                   this._bounds.height);\n  for (var i = 0; i\
    \ < this._cache.length; i++) {\n    var obj = this._cache[i];\n    // Draw object\
    \ only if it intersects the dirty rectangle\n    if (this._getScreenBounds(obj).intersects(dirtyRect))\
    \ {\n      obj.draw(ctx, dirtyRect, this._bounds.x, this._bounds.y);\n    }\n\
    \  }\n};\n\n/*\n * Returns the screen bounds of the given object\n */\n_p._getScreenBounds\
    \ = function(obj) {\n  var worldBounds = obj.getBounds();\n  return new Rect(worldBounds.x\
    \ - this._bounds.x, worldBounds.y -\n                  this._bounds.y,\n     \
    \             worldBounds.width, worldBounds.height);\n};\n```\n\n`DirtyRectangleManager`\
    \ operates within screen coordinates, so we first translate the object coordinates\
    \ to screen space, and then check if the object intersects the dirty area.\n\n\
    The next step is to update the `IsometricTileLayer`. It uses the offscreen image\
    \ to repaint the frame. Let’s change it so that only the dirty part is repainted\
    \ (since most of the code is added, I will not mark the new lines bold this time).\
    \ Listing 7-36 shows the updated code for the `draw()` function.\n\n**Listing\
    \ 7-36.** *Updating `IsometricTileLayer` to Make It Honor Dirty Rectangles*\n\n\
    ```\n_p.draw = function(ctx, dirtyRect) {\n  if (this._offDirty) {\n    this._redrawOffscreen();\n\
    \  }\n  var offscreenImageWorldX = this._offRect.x * this._cellWidth;\n  var offscreenImageWorldY\
    \ = this._offRect.y * this._cellHeight / 2;\n  // If there is a dirty rectangle,\n\
    \  // calculate the intersection of the offscreen\n  // image and the dirty rectangle.\
    \ Then draw only the part\n  // of offscreen buffer\n  // that is covered by the\
    \ dirtyRect\n  if (dirtyRect) {\n    var sx = this._bounds.x - offscreenImageWorldX\
    \ + dirtyRect.x;\n    var sy = this._bounds.y - offscreenImageWorldY + dirtyRect.y;\n\
    \    var sw = dirtyRect.width;\n    var sh = dirtyRect.height;\n    var dx = dirtyRect.x;\n\
    \    var dy = dirtyRect.y;\n    var dw = dirtyRect.width;\n    var dh = dirtyRect.height;\n\
    \    ctx.drawImage(this._offCanvas, sx, sy, sw, sh, dx, dy, dw, dh);\n  } else\
    \ {\n    // If there is no dirtyRect, redraw the whole viewport as we did before.\n\
    \    ctx.drawImage(this._offCanvas, offscreenImageWorldX - this._bounds.x,\n \
    \                 offscreenImageWorldY - this._bounds.y);\n  }\n};\n```\n\nNote\
    \ that we try to keep both layer implementations independent of the dirty rectangle\
