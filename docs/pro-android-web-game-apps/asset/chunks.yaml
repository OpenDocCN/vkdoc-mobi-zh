    \ - start;\n    if (passed > delay)\n        break;\n}\n```\n\n为了理解如何以最佳方式组织动画，需要深入\
    \ JavaScript 的内部机制，了解为什么清单 4-18 中的代码是最糟糕的做法之一，如何避免长时间运行任务带来的陷阱，并正确调度动画循环。\n\n\
    ## JavaScript 线程模型\n\nJavaScript 是一种单线程语言。这意味着在任何给定时刻，最多只有一段代码在执行。例如，如果在另一个函数执行时，一个图片恰好加载完成，回调函数不会立即并行运行。JavaScript\
    \ 会将那段代码的执行安排在当前函数结束后。如果有多个监听器，它们会被排队并逐一执行。\n\n![图片](img/index-156_1.jpg)\n\n\
    第四章：动画与精灵 **151**\n\n图片加载并非 JavaScript 中唯一使用回调的场景。用户输入处理代码（我们将在下一章详细讨论）也依赖类似的机制来响应触摸和鼠标点击。这意味着，当脚本执行一个长时间任务时，其余部分都会被冻结，直到任务完成。图\
    \ 4-9 说明了这一点。\n\n**图 4-9.** JavaScript 的线程模型。由于 JavaScript 是单线程的，同一时刻只能执行一段代码。长时间运行的任务会阻塞用户界面，导致应用无响应。\n\
    \n假设你正处于一个运行时间很长的重量级函数中。用户将鼠标光标移到用户界面组件上。这个操作会生成几十个事件，但在长时间运行的函数完成之前，这些事件都不会被处理。\n\
    \n从以上内容可以得出什么实际结论？有两点。\n\n- 你可以确信当前执行的代码是唯一正在运行的代码片段。如果你在一个监听器内部，不用担心在`animate()`恰好重绘场景时会发生什么；这种情况根本不可能发生。\n\
    - 任何长时间运行的函数都会阻塞输入。如果你的象棋 AI 需要 5 秒来计算最佳策略，这意味着用户至少需要等待 5 秒才能看到反馈。长时间运行的任务可以分解成较小的任务，这样就不会阻止其他部分的执行。\n\
    \n第二点听起来可能令人头疼。实际上，这完全不是问题。你只需要在设计包含长时间运行任务的应用程序时多花一点心思。\n"
- fmt: "# Chapter 4: Animation and Sprites\n\nThe main advantage of the described\
    \ approach is that designing a single-threaded application (and every JavaScript\
    \ application is single-threaded) is way simpler than writing multi-threaded code.\
    \ Languages like `Java` utilize the full power of threading for the price of complex\
    \ and very complex APIs that coordinate the execution of multiple threads. To\
    \ make matters worse, bugs in multi-threaded environments can stay unnoticed for\
    \ months and eventually crash the whole system simply due to unlucky timing. Unit\
    \ testing multi-threaded code is a black magic that only chosen ones can master.\n\
    \nNow that we know the pitfalls, let’s get back to our question. How can we schedule\
    \ the `repaint` function for later execution?\n\n## Timers\n\nAs I mentioned,\
    \ JavaScript has what is known as timers, a built-in mechanism for scheduling\
    \ a task for later execution. In this section, we learn how timers help with repeating\
    \ tasks like animation.\n\n### Setting Timers\n\nJavaScript has three functions\
    \ for scheduling the code for later execution: `setInterval()`, `setTimeout()`,\
    \ and `requestAnimationFrame()`. All three functions do similar things — they\
    \ tell the browser: “Hey, please schedule the execution of the code that I’m giving\
    \ to you. Call in around N milliseconds when you have some free cycles.”\n\nAfter\
    \ N milliseconds, the browser queues the execution of the function as if it is\
    \ a simple event listener. If the queue is empty, then you’re lucky and your function\
    \ is executed immediately. If the queue is full of other tasks — well, your function\
    \ will have to wait, no matter how important it is.\n\n**NOTE:** This is an important\
    \ concept about the timers: they are not guaranteed to fire exactly at the time\
    \ when they are scheduled to fire. One of the reasons was shown earlier; if another\
    \ piece of code is executing, the timer waits for its turn. Even when timers work\
    \ in a perfectly dull page without any events and user activities, they are not\
    \ guaranteed to run in time. The delay might happen because of the resolution\
    \ of the OS timer, for example (but this is far outside the scope of this book).\n\
    \nThere are only two things that you can rely on:\n\n- The timer will never fire\
    \ before its scheduled time.\n- The browser will do its best to fire it on time.\n\
    \n**TIP:** Don’t worry that the timer fires a millisecond later. Usually, the\
    \ user won’t notice the glitch. Don’t be a perfectionist and don’t try to make\
    \ the timer perfect. When I was working as a Java game developer, I spent a huge\
    \ amount of time trying to make the animation loop in Java a little better. Java,\
    \ being an enterprise platform, had the same timer issues — you couldn’t rely\
    \ on timer accuracy. It was making me crazy and I wrote dozens of tests, native\
    \ modules, and workarounds. The effect was hardly noticeable. It is way better\
    \ to spend this time writing real gaming code.\n\nNow let’s get back to the scheduling\
    \ functions and see how they differ.\n\n`setInterval()` schedules the execution\
    \ of the function every N milliseconds (see Listing 4-19).\n\n**Listing 4-19.**\
    \ An Example of `setInterval`\n\n```javascript\nsetInterval(\n  function() {\n\
    \    console.log(\"Hello\")\n  }, 500);\n```\n\nThe code in Listing 4-19 outputs\
    \ the word ‘Hello’ into the console twice a second.\n\n`setTimeout()` schedules\
    \ the single execution of the function. Of course, you can call `setTimeout()`\
    \ at the end of your function once again, thus imitating the work of `setInterval()`.\
    \ You have two different ways to call `setTimeout`; both are shown in Listing\
    \ 4-20. The first call schedules a single execution, whereas the second call schedules\
    \ the execution again after each loop.\n\n**Listing 4-20.** Two Ways of Calling\
    \ `setTimeout`\n\n```javascript\n// Will fire once\nsetTimeout(function() {\n\
    \  console.log(\"Hello\")\n}, 500);\n\n// Will work almost like setInterval, will\
    \ fire forever\nsetTimeout(function() {\n  setTimeout(arguments.callee, 500);\n\
    \  console.log(\"Hello\")\n}, 500);\n```\n\n`requestAnimationFrame()` is the last\
    \ timer function, and the most recently added one. It is supported by the vast\
    \ majority of desktop browsers, but unfortunately..."
