    implement this kind of logic, but let’s not get ahead of ourselves, and instead


    take a look at the mechanism that proved its efficiency.


    Rendering


    Now that we have defined the coordinates of the model and stored them in the


    array, it is time to render the cube on the screen. But how do we transform


    those points into the wireframe? In this section, we learn how 3D rendering


    works on a very basic level. To render a 3D figure, we must find the projection
    of


    its vertices on the screen. Once the projections are found, we can draw the line


    between each two points connected by the edge-----and this is enough to render


    the wireframe!


    ![](index-346_1.jpg)


    ![](index-346_2.jpg)


    CHAPTER 8: 3D in a Browser


    The mathematical apparatus for finding projections and 3D rendering is called
    a


    matrix theory. Let’s start with a very basic element-----the matrix. Once we know


    how matrices work, we will apply this knowledge to our task. We will render the


    cube, rotate it, and then apply the perspective projection so that the cube looks


    more natural.


    **Matrices**


    So, what is the matrix? No, it’s not only the parallel reality where Neo fights


    Agent Smith. The matrix is also a fundamental data structure that is essential
    for


    every 3D program. Figure 8-6 shows how a matrix looks.


    **Figure 8-6.** *An example of the matrix*


    Essentially, the matrix is a grid that has rows and columns. A matrix can have


    different sizes, of course. Figure 8-6 is a 4 × 4 matrix. The natural way to


    represent matrices in JavaScript is by using the two-dimensional arrays. What
    is


    really exciting about them is that a 4 × 4 matrix can hold any number of


    transformations in any order that you apply to your scene. How? Each matrix


    represents a certain transformation: a rotation, scaling, translation, or any


    combination of these. Figure 8-7 shows some examples.


    **Figure 8-7.** *Matrices representing different transformations. From left to
    right: shrinking for 50% on x* *axis, moving to five units by x axis and two units
    by y axis, rotation around z axis approximately 45*


    *degrees.*


    If you have never worked with matrices, Figure 8-7 probably looks like three


    grids of meaningless numbers. Things become much clearer when you know


    how to multiply matrices, however. The rules are somewhat unintuitive and it is


    way easier to show them on 2 × 2 matrices. Let’s say, we want to multiply matrix


    A by matrix B.


    The general rule of matrix multiplication is as follows: to get the cell that
    stands in mth row and nth column of the result matrix, you must take the mth row
    of the


    ![](index-347_1.jpg)


    ![](index-347_2.jpg)


    ![](index-347_3.jpg)


    CHAPTER 8: 3D in a Browser


    **343


    left matrix and the nth column of the right matrix, multiply their elements, and


    add them. To get the number in the first cell (row 1, column 1), you must take


    the first row of the left matrix and the first column of the right matrix, multiply


    them element-by-element, and add the results. This operation is illustrated in


    Figure 8-8.


    **Figure 8-8.** *Multiplying matrices to get the first element*


    For the cell in the first row and the second column, you must take the first row
    of


    the left matrix and the second column of the right matrix, and do the same:


    multiply them element-by-element, and add the results. Figure 8-9 shows how


    to do it.


    **Figure 8-9.** *The next step of multiplication: second element in first row*
    Figure 8-10 shows how to calculate the last two cells of the resulting matrix.


    **Figure 8-10.** *The final result of multiplying matrices*


    Now for the long-awaited feature. To apply the transformation that is


    represented by the matrix, you must multiply the coordinates of the point by the


    matrix. You get the new coordinates----the coordinates after the transformation.


    If you apply the same transformation to each vertex of the cube, the cube itself


    is transformed: rotated, scaled, or moved to a certain location on the scene.'
