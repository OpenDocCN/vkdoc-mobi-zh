  </ScrollView>\n\n我将从前面的代码清单中摘取几行具体代码，并在接下来的章节中解释其作用。请记住，你尚未为组成这个屏幕的元素定义任何位置。但由于使用了`LinearLayout`对象，每个后续元素都会依次附加在前一个元素的底部。\n\
  \n# Android 基础\n\n**53**\n\n![](img/index-60_1.png)\n\n### 滚动\n\n当视图尺寸超出设备屏幕大小时，只需将布局对象包裹在`ScrollView`中即可实现滚动。要启用垂直滚动条，你的`ScrollView`必须设置参数`android:scrollbars=\"\
  vertical\"`，这样只有在向下翻页时才会显示滚动条。为了让视图足够长以演示此对象，我在线性布局末尾添加了一个带有虚假免责声明的`TextView`。你会注意到，如果将之前的\
  \ XML 设置为活动视图，焦点会沿着对象下移，直到到达按钮，此时滚动条将处理向下键，并将用户移至文本底部。\n\n### 深入解析 TextView\n\n\
  在前面的 XML 中，有两个主要的“小部件”在起作用。\n\n**注意** Android 中的*小部件*指的是`View`对象的任何自包含子类。\n\n对于标题和文本输入标签，你使用了`TextView`对象。对于用户控制的文本输入，你使用了`EditText`对象。最值得详细讲解的是最后的“状态”文本：\n\
  \n```\n<TextView\nandroid:id=\"@+id/status\"\nandroid:layout_width=\"fill_parent\"\
  \nandroid:layout_height=\"wrap_content\"\nandroid:textAlign=\"center\"\nandroid:text=\"\
  输入用户名和密码\"\n/>\n```\n\n首先，由于这个文本元素稍后会在运行时被源代码修改，因此你需要为其分配一个 ID。这样你就可以在之后使用`findViewById`方法来获取它的句柄。\n\
  \n**54**\n\n**Android 基础**\n\n![](img/index-61_1.png)\n\n如果`R.java`文件中尚不存在 ID `status`，`@+id/status`将会添加此\
  \ ID。当你首次在代码中引用它时，IDE 可能会报错。不过不用担心，因为第一次编译时一切都会解决。\n\n接下来，你告诉`TextView`将其宽度设置为父容器的宽度，在本例中即`LinearLayout`对象。你通过为`layout_height`参数使用`wrap_content`来让高度由文本大小决定。你希望文本位于屏幕中央，因此使用了`textAlign`，因为你已将宽度设置为整个屏幕。最后，你为它提供了一些简单的文本，使其在\
  \ Activity 启动时显示。稍后，你将更改此文本以反映当前状态。\n\n要查看这一成果，只需创建一个 Activity，并将此 XML 布局设置为主内容视图。你应该能够看到屏幕、在文本输入字段中键入内容并选中该框。然而，这些操作不会产生任何结果。要将它们与程序关联并使其可交互，你需要继续阅读。\n\
  \n### XML 布局\n\n这里要传达的关键信息是，XML 布局方案既简单又强大。它为移动屏幕布局和设计提供了非编程接口。它还为开发者提供了在运行时动态打开并修改这些值的工具，接下来你将通过探索如何与\
  \ Android 的内置小部件交互来实践这一点。\n\n## 唤醒小部件\n\n我已经演示了如何使用 Android 的`TextView`、`Button`和`EditText`小部件。但如果无法获取用户输入的内容，文本输入字段又有何用呢？这是个反问句；无需回答——我也听不到（但愿如此）。答案显而易见：没有目的或结果的文本输入毫无用处。要访问你之前定义的`EditText`小部件的内容，你需要做两件事：\n\
  \n1.  获取你在 XML 中定义的小部件的对象句柄。\n\n**55**\n\n**Android 基础**\n\n![](img/index-62_1.png)\n\
  \n\n\n2.  监听登录按钮 widget 上的点击或选择事件。\n\n### 获取句柄（Getting a Handle on Things）\n\n首要任务是获取\
  \ XML 布局文件中定义的元素指针。为此，你需要确保每个想要访问的 XML widget 都包含 `android:id` 参数。如之前简要提到的，使用 `@+id/-id_name_here-`\
  \ 这种表示法可以确保你的 `R.java` 文件包含所需的 ID。以下是一个示例，演示如何在应用程序启动时获取 `View` 对象的指针。这是添加到 `GetSplashy`\
  \ 示例应用中的新登录 Activity 的 `onCreate` 方法：\n\n```java\nButton btn = null;\n\npublic void\
  \ onCreate(Bundle args)\n{\n    super.onCreate(args);\n    setContentView(R.layout.login);\n\
  \    btn = (Button) findViewById(R.id.loginbutton);\n}\n```\n\n这里你通过调用 `findViewById`\
  \ 获取了登录按钮的指针。这允许你添加一个点击监听器，以便在按钮被选中（在触摸屏上使用触控笔）或通过中心软键选中时收到通知。你将以内联方式扩展 `ClickListener`\
  \ 类，如下所示：\n\n```java\npublic class loginScreen extends Activity\n{\n    private\
  \ OnClickListener buttonListener =\n        new OnClickListener()\n        {\n \
  \           public void onClick(View v)\n            {\n                grabEnteredText();\n\
  \            }\n        };\n    ...\n}\n```\n\n上述内联定义在接收到选中通知时，会调用 `grabEnteredText`\
  \ 方法。现在你已经定义了点击监听器，可以在 `onCreate` 方法中使用 `btn` 引用了：\n\n```java\npublic void onCreate(Bundle\
  \ args)\n{\n    //...\n    btn = (Button) findViewById(R.id.loginbutton);\n    btn.setOnClickListener(buttonListener);\n\
  }\n```\n\n如果你在按钮监听器的 `onClick` 方法中设置断点，那么当你将焦点移动到登录按钮并选中它，或在模拟器中用鼠标点击它时，该断点都应该会触发。\n\
  \n### 获取文本（Reeling in the Text）\n\n剩下的工作就是定义 `grabEnteredText` 方法，使其名副其实。在登录界面的最终生产版本中，你需要提取输入的文本，发起网络登录调用，并启动一个加载对话框。现在，我们只展示一个包含登录和密码字段输入内容的对话框。以下是更新后的登录\
  \ Activity 中 `grabEnteredText` 的实现：\n\n```java\npublic void grabEnteredText()\n\
  {\n    // 获取状态文本的指针\n    TextView status = (TextView) findViewById(R.id.status);\n\
  \n    // 获取两个文本输入字段的句柄\n    EditText username = (EditText) findViewById(R.id.username);\n\
  \    EditText pwd = (EditText) findViewById(R.id.password);\n\n    // 从 EditText\
  \ 对象中提取字符串并格式化为字符串\n    String usrTxt = username.getText().toString();\n    String\
  \ pwdTxt = pwd.getText().toString();\n\n    // HTTP 事务会在这里启动一个新线程\n    status.setText(\"\
  Login\" + usrTxt + \" : \" + pwdTxt);\n\n    // 显示最终会转变为\n    this.showAlert(\"\
  Login Data\", 0, \"Login\"\n        + usrTxt + \" : \" + pwdTxt, \"ok!\", false);\n\
  }\n```\n\n首先，使用 `findViewById` 获取 `status`、`username` 和 `password` widget 的 `TextView`\
  \ 和 `EditText` 指针。接着，通过获取 `TextEntry` 对象并将其转换为 `String` 类来提取文本输入 widget 的内容。最后，将两个字段的内容合并，添加到状态文本对象中，并弹出一个同样包含这两个字符串的对话框。\n\
  \n就是这样——你现在已经允许用户输入文本，并且完成了获取、操作甚至显示包含这些信息的对话框。\n\n干得漂亮！花点时间拍拍自己的背，或者拍拍任何一个在你手臂可及范围内的人。\n\
  \n到目前为止，你已经了解了如何仅使用 XML 进行屏幕布局（“社交尴尬”的闪屏），以及刚刚在登录界面中如何使用两者的混合方式。Android widget 快车的最后一站将要求仅使用代码来构建屏幕布局。\n\
  \n### Java 中的 Widget\n\n\n\n# 深入剖析\n\n现在，你将深入剖析 Android 控件，亲自动手实践。我们将初步了解一些核心组件，其中许多你已在\
  \ XML 形式中探索过。与之前的示例一样，为了便于解释，我会保持基础性。你应该能够轻松地将这里讨论的内容应用于更复杂的 UI 布局场景。在后续更高级的示例中，你将更深入地接触其他\
  \ Android 控件。\n\n当你看到我仅为了生成一个简单可选菜单所编写的代码量时，你可能会像我一样感到有些震惊。在掌握了 XML 屏幕布局之后，再尝试用\
  \ Java 手动完成所有工作，感觉就像用一双磨损的保龄球在钢琴上演奏古典音乐。请注意——这涉及大量代码输入，可能还会带来不少挫败感。\n\n另一方面，UI 布局中可能有一些特定元素你需要**在运行时**动态调整。正如我之前提到的，由于应用运行时无法编辑\
  \ XML 布局文件，因此掌握在代码中随时修改用户界面任何部分所需的工具至关重要。Android 赋予了你这种能力，前提是你得习惯以闪电般的速度输入代码。\n\n\
  在接下来的示例中，我费尽心思确保你几乎不会用到之前依赖的 XML 元素。这应该能让你很好地掌握非 XML 布局，但请记住，实际上，你要疯狂到用这种方式实现所有用户界面屏幕，那才会出问题。\n\
  \n## 主菜单\n\n几乎所有移动应用程序（至少在本节撰写时）都是从图形主菜单开始的。这个图形界面将用户引导至移动应用的各项功能。由于\"主菜单\"的概念在移动应用体验中如此普遍，因此它成为了一个绝佳且实用的案例研究。在本示例中，你的目标是构建一个简单且功能齐全的主菜单。为了便于对比，我们将使用另一个线性布局来整合所有内容。该示例将分三个主要阶段构建：\n\
  \n1.  **布局**：你将正确地在屏幕上排列主菜单的所有条目。当然，这只会用到 Android 巨大屏幕空间的一小部分。但大多数应用程序菜单会使用大图片，并占用显著更多的空间。\n\
  2.  **焦点**：你需要设置一个焦点结构，以便用户能够在元素之间移动。当焦点变化时，你必须调整每个菜单元素的颜色。\n3.  **选择事件**：最后，你需要设置一个监听器，以便在元素被选中或点击时，能够获知信息并根据所选项目执行相应操作。\n\
  \n当你完成这三项任务后，应该就拥有了构建约 80% 移动应用主入口屏幕的框架。虽然这不完全实用（因为我完全没用 XML），但它极好地演示了如何以自定义的、运行时驱动的方式完成工作。随着你为\"\
  社交窘迫\"应用添加更多功能，你将逐步完善这个主菜单。\n\n### 布局，Java 风格\n\n简单主菜单的第一步是将所有菜单元素放到屏幕上。正如我之前提到的，你将使用线性布局来实现。这一切都必须在应用首次绘制之前完成，因此必须放在新\
  \ `MainMenu` 活动的 `onCreate` 方法中。（如果你忘记了如何创建并接入一个新活动，请参考第 1 章。）代码清单 3-2 展示了其实例化和配置的样子。\n\
  \n**代码清单 3-2. 在 `onCreate` 方法中创建布局对象**\n\n```\nLinearLayout layout = new LinearLayout(this);\n\
  layout.setBackground(R.drawable.general_bg);\nlayout.setOrientation(LinearLayout.VERTICAL);\n\
  layout.setLayoutParams(\n    new LayoutParams(LayoutParams.FILL_PARENT,\n      \
  \               LayoutParams.FILL_PARENT));\nsetContentView(layout);\n```\n\n根据你目前所学的知识，这概念上应该很熟悉。你将使用\
  \ `/res/drawable/` 文件夹中的图片设置背景，将线性布局方向设置为垂直，并将 `LayoutParams` 设置为填充父容器。（这里的父容器是控制全屏的活动。）布局参数从根本上必须定义给定控件的高度和宽度。你之后可能会发现，在未设置布局参数的情况下尝试将控件放入\
  \ `ViewGroup` 会抛出异常。不过，既然现在有了一个要填充的布局对象，你就可以开始构建屏幕了。\n\n### 添加标题\n\n接下来，添加一个简单的标题，它将居中显示在主菜单屏幕的顶部。代码清单\
  \ 3-3 展示了所需代码块。\n\n**代码清单 3-3. 添加标题**\n\n```\nTextView title = new TextView(this);\n\
  title.setText(R.string.man_menu_title);\ntitle.setLayoutParams(\n    new LinearLayout.LayoutParams(\n\
  \        LinearLayout.LayoutParams.FILL_PARENT,\n        LayoutParams.WRAP_CONTENT));\n\
  title.setAlignment(Alignment.ALIGN_CENTER);\nlayout.addView(title);\n```\n\n创建文本对象，并从\
  \ `/res/values/strings.xml` 中设置文本。我知道我说过不会使用任何 XML，但恐怕在这点上我撒了点小谎。在实际产品中，你会希望将所有字符串移到这个位置，而不是在代码中定义。如果你的客户和我的类似，你总不希望每次他们想更改某个屏幕上的措辞时，你都要拿出源码编辑器重新编译吧。\n\
  \n现在有了标题，是时候添加更有趣、更活跃的菜单元素了。\n\n### 布局菜单条目\n\n接下来，你将添加各个菜单元素。因为第一个之后会变得相当重复，所以我将插入并解释第一个元素，剩下的就交给你自己处理了。欢迎前往\
  \ Apress 网站获取完整项目，查看其余菜单项。再次提醒，你在后续学习 Android 基础内容的过程中，将会逐步填充更多菜单项。代码清单 3-4 展示了添加单个菜单项的代码。\n\
  \n**代码清单 3-4. 添加菜单项**\n\n```\nTextView ItemOne = new TextView(this);\nItemOne.setFocusable(true);\n\
  ItemOne.setText(\"Login Screen\");\nItemOne.setTextColor(Color.WHITE);\nItemOne.setLayoutParams(\n\
  \    new LinearLayout.LayoutParams(\n        LinearLayout.LayoutParams.FILL_PARENT,\n\
  \        LayoutParams.WRAP_CONTENT));\n\n//给菜单项一个 ID 以便跟踪。\n//ID 是在类中本地定义的一个静态 int\n\
  ItemOne.setId(IdOne);\n\n//将其添加到我们的线性布局中\nlayout.addView(ItemOne);\n```\n\n天哪，仔细阅读代码后，你可能会认为这看起来几乎和你已经添加的标题一模一样。你说得完全正确，真聪明。标记对象何时获得焦点、何时被选中这类繁重工作还没开始，所以先别太得意。上述菜单项与之前列出的标题文本有两个区别：\n\
  \n-   你需要通过调用 `setFocusable` 方法告知 `TextView` 它可以接受焦点。\n-   菜单列表项需要一个 ID，以便你能够在选择处理程序中将其与其余菜单元素区分开来。\n\
  \n正如我简要提到的，每当向 `ViewGroup` 添加控件时，`LayoutParams` 对象必须明确是在该视图组内部定义的对象。例如，在上面的 `setLayoutParams`\
  \ 方法调用中，你必须传入一个 `LinearLayout.LayoutParams` 对象。你必须传入正确的子类布局参数，否则 Android 会在运行时向你抛出异常。\n\
  \n\n\n### Android 基础：创建带焦点和选择功能的菜单\n\n如前所述，为了制作菜单，我将再添加两个几乎与上一段代码完全相同的文本元素。为简洁起见，此处不再罗列。若想满足好奇心，请务必参考完整项目。现在所有菜单项已就绪，接下来需要在其获得或失去焦点时进行修改。\n\
  \n**聚焦吧，年轻学徒…**\n\n要处理焦点变化事件，必须创建 `OnFocusChangeListener` 抽象类的一个实现。示例中在 `MainMenu`\
  \ 活动类内部本地定义的版本，如代码清单 3-5 所示。\n\n***代码清单 3-5：创建焦点监听器***\n\n```\nOnFocusChangeListener\
  \ focusListener =\n    new OnFocusChangeListener()\n    {\n        public void onFocusChanged(View\
  \ v, boolean hasFocus)\n        {\n            adjustTextColor(v, hasFocus);\n \
  \       }\n    };\n\nprivate void adjustTextColor(View v, boolean hasFocus)\n{\n\
  \    //危险的类型转换。请确保你只监听 TextView 的焦点变化，\n    //否则可能导致严重错误。\n    TextView t = (TextView)v;\n\
  \    if(hasFocus)\n        t.setTextColor(Color.RED);\n    else\n        t.setTextColor(Color.WHITE);\n\
  }\n```\n\n此外，你需要为菜单中每个可选元素添加以下代码行，以附加焦点变化监听器对象：`ItemOne.setOnFocusChangeListener(focusListener);`\n\
  \n监听器就位后，每当菜单元素获得或失去焦点时，你都会收到通知。在更高级的主菜单中，此方法可用来添加图像切换、动画、3D 爆炸效果或其他花哨的图形特效。在本例中，我们仅通过改变文字颜色来实现。现在用户可以通过颜色变化得知哪个菜单项被高亮，接下来需要响应他们按下中间键选择菜单项的操作。\n\
