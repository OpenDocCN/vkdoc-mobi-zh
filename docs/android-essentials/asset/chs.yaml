  \n正确地渲染一个叠加层比你最初想象的要复杂一些。它需要两个主要组件：`OverlayController` 对象和扩展的 `Overlay` 对象。叠加控制器管理每个叠加层，并确保在\
  \ `MapView` 重绘自身后调用其 `draw` 函数。如果您还记得，我在这里插入一下，因为您可能不想回头翻，您必须在 `onCreate` 方法中创建一个叠加控制器。代码如下：\n\
  \n```java\nm_overlayController = m_mapView.createOverlayController();\n```\n\n每个可绘制的\
  \ `Overlay` 都必须添加到 `OverlayController` 中。同样，这是您在之前的示例中使用的代码行：\n\n```java\nm_overlayController.add(new\
  \ TackOverlay(this), true);\n```\n\n`TackOverlay` 是 `Overlay` 对象的一个扩展。任何时候您想绘制自己的“图钉”，都必须扩展\
  \ `Overlay` 对象。当然，只要有一点高效的创造性编程，一个自定义的 `Overlay` 对象就能绘制所有叠加层。出于本示例的目的，您将扩展 `Overlay`\
  \ 对象并添加必需的 `draw` 方法。`draw` 方法将在地图重绘自身后被调用。以下是 `TackOverlay` 的声明、类变量和构造函数；您将在 `MapActivity`\
  \ 内部内联声明它，以便它可以访问您 `MapActivity` 的变量和函数：\n\n```java\nclass TackOverlay extends Overlay\n\
  {\n    MapExampleActivity ctx;\n    Bitmap tack;\n\n    TackOverlay(MapExampleActivity\
  \ c)\n    {\n        super();\n        BitmapDrawable b = (BitmapDrawable)\n   \
  \         c.getResources().\n            getDrawable(R.drawable.tack);\n       \
  \ tack = b.getBitmap();\n    }\n```\n\n正如您所见，`TackOverlay` 看起来就像任何其他 Android 对象扩展一样。使用上下文指针，您将保存图钉位图资源，这样在绘制时就不必每次都加载它。当您深入研究\
  \ `draw` 方法时，代码会变得更有趣一些。\n\n```java\npublic void draw(Canvas canvas, PixelCalculator\
  \ calculator,\n                 boolean shadow)\n{\n    super.draw(canvas, calculator,\
  \ shadow);\n    int xy[] = new int[2];\n    try{\n        // 将中心点转换为 XY 坐标。\n  \
  \      // 我们可以硬编码这个，\n        // 但那样有什么乐趣呢？\n        if(m_curLocation == null)\n\
  \            return;\n        calculator.getPointXY(m_curLocation, xy);\n      \
  \  int tackX = xy[0] - (tack.getWidth()/2);\n        int tackY = xy[1] - (tack.getHeight());\n\
  \        canvas.drawBitmap(tack, tackX, tackY, new Paint());\n    }\n    catch (Exception\
  \ e)\n    {\n        Log.e(\"Crap!\");\n    }\n}\n```\n\n前面的代码中没有什么令人费解的地方。唯一需要记住的技巧是，您需要将存储在\
  \ `m_curLocation` Point 对象中的经纬度坐标转换成屏幕上的 XY 坐标。为此，`Overlay` 对象会随着 `draw` 方法传入一个\
  \ `PixelCalculator` 对象。这个对象负责提供与经纬度位置相对应的 XY 坐标。因为 `TackOverlay` 对象是在 `MapExampleActivity`\
  \ 内部内联定义的，所以它可以访问 `m_curLocation` 点变量。您将把这个点转换为 XY 位置。因为图钉状物体的点位于图像的底部和中间，所以您必须将它向上移动图钉资源的高度，并向左移动一半宽度。这应该会使图钉的尖端与计算出的\
  \ XY 位置对齐。\n\n同样值得注意的是 `shadow` 布尔值的存在，尽管我尚未实现它。它会告诉您的叠加层是否应该绘制阴影。忽略它或不忽略它，由您决定。\n\
