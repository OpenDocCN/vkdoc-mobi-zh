  # 第 4 章：位置，位置，还是位置\n\n在本章中，我们将探讨基于位置服务这一非常热门的话题。Android 的主要卖点之一是其对 Google Maps 基础设施的原生访问。虽然这是一个可选功能，但哪个运营商会不包含这个强大的软件包呢？我想，在接下来的一年左右时间里，我们就会知道答案了。本章将分两个主要部分深入探讨这个主题。首先，你将学习如何使用\
  \ Android 的 `LocationManager` 对象，它能够利用底层多种系统来测定你的纬度和经度。其次，你将学会如何驱使 Google Maps API\
  \ 为你所用。值得注意的是，Android 对 GPS 和基站定位系统的支持尚未完全实现。在本书撰写时，你可以通过使用默认的模拟 GPS 数据（在加州湾区行驶的路线）或构建自己的伪造\
  \ GPS 数据来模拟 GPS 数据。我的示例将采用第一种方法，但我也会包含最终能够在正式手机上运行的代码。你可以在 Android 文档中找到更多关于构建自定义\
  \ GPS 路线以及基于位置服务（LBS）的详细信息，网址为 [`code.google.com/android/toolbox/apis/lbs.html`](http://code.google.com/android/toolbox/apis/lbs.html)。\n\
  \n通过示例，你将实现一个应用程序，该程序从示例 GPS 模块获取手机位置，启动一个 `MapActivity` 对象，将屏幕中心对准该位置，然后使用覆盖图在其上绘制一个图钉。\n\
  \n### 我在哪里？\n\n总的来说，Android 的基于位置服务的工作方式与你的预期基本一致，只有一个小小的例外。Android 允许开发者指定使用哪种位置查询方法。这使你能够根据应用程序的具体用途，自定义功耗、成本和精度。\n\
  \n### 构建 LocationManager 对象\n\n第一个任务是获取 `LocationManager` 对象的处理器，这是用于查找手机位置的高级对象。`LocationManager`\
  \ 可以使用任意数量的 `LocationProvider` 对象来执行 GPS（或基站）定位。以下是相关的类变量声明以及后续的 `buildGPS` 方法，该方法将为稍后的位置检索做好准备：\n\
  \n```java\nPoint m_curLocation;\nLocationProvider m_locationProvider;\nLocationManager\
  \ m_locationMgr;\n\nprivate void buildGPS()\n{\n    List<LocationProvider> providorList\
  \ = null;\n    Criteria c = new Criteria();\n    c.setAccuracy(50);\n    c.setAltitudeRequired(false);\n\
  \    c.setCostAllowed(false);\n    c.setSpeedRequired(false);\n    // 以下代码行已被注释掉，因为它会导致\n\
  \    // android 陷入无限循环。\n    //c.setPowerRequirement(c.POWER_LOW);\n    m_locationMgr\
  \ =\n        (LocationManager)\n        getSystemService(LOCATION_SERVICE);\n  \
  \  m_locationProvider = m_locationMgr.getBestProvider(c);\n    if(m_locationProvider\
  \ != null)\n        return;\n    providorList = m_locationMgr.getProviders();\n\
  \    if(providorList.size() > 0)\n        m_locationProvider = providorList.get(0);\n\
  }\n```\n\n你会注意到，你不能简单地实例化一个新的 `LocationManager`。\n\n\n\n\n`object`。必须通过`Activity`类的公共成员`getSystemService`方法来获取它。\n\
  \n### 一项必备标准\n\n声明相关变量后，您将构建一个（至少在 Android 设备问世前）毫无用处的`Criteria`对象。`Criteria`允许您指定所需查找方法的功能特性。\n\
