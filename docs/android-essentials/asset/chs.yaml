  \ 应用总得有个起点。\n\n## 结束语\n\n\n# 排版后内容\n\n本章的目标并非详尽无遗漏地介绍 Android 版 Google Maps 的所有功能。我希望为你提供一个框架，让你能够自行探索这些内容。我介绍了如何通过`LocationManager`获取手机位置，以及如何将这些数值转换为\
