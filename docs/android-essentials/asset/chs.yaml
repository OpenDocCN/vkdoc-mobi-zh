- "# 布局类型\n\n所有元素按从上到下或从左到右的降序排列。每个元素可以具有 `gravity` 和 `weight` 属性，这些属性表示它们如何动态增长和收缩以填充空间。元素根据\
  \ `android:orientation` 参数按行或列排列。例如（见图 3-1）：\n\n```\n<LinearLayout xmlns:android=\n\
  [\"http://schemas.android.com/apk/res/android\"](http://schemas.android.com/apk/res/android)\n\
  android:orientation=\"vertical\"\nandroid:layout_width=\"fill_parent\"\nandroid:layout_height=\"\
  fill_parent\"\n>\n<TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"\
  wrap_content\"\nandroid:text=\"元素一\"\n/>\n<TextView\nandroid:layout_width=\"wrap_content\"\
  \nandroid:layout_height=\"wrap_content\"\nandroid:text=\"元素二\"\n/>\n<TextView\n\
  android:layout_width=\"wrap_content\"\nandroid:layout_height=\"wrap_content\"\n\
  android:text=\"元素三\"\n/>\n</LinearLayout>\n```\n\n**图 3-1. 线性布局示例**\n\n`RelativeLayout`\n\
  \n每个子元素都相对于其他子元素进行布局。可以建立关联关系，使子元素从一个前一个子元素结束的位置开始。子元素只能关联到在其之前列出的元素。因此，请从 XML 文件的起始位置到末尾构建依赖关系。注意，需要指定\
  \ ID，以便控件可以相互引用。例如（见图 3-2）：\n\n```\n<RelativeLayout xmlns:android=\n[\"http://schemas.android.com/apk/res/android\"\
  ](http://schemas.android.com/apk/res/android)\nandroid:layout_width=\"fill_parent\"\
  \nandroid:layout_height=\"fill_parent\"\n>\n<TextView\nandroid:id=\"@+id/EL01\"\n\
  android:layout_width=\"wrap_content\"\nandroid:layout_height=\"wrap_content\"\n\
  android:text=\"元素一\"\n/>\n<TextView\nandroid:id=\"@+id/EL02\"\nandroid:layout_width=\"\
  wrap_content\"\nandroid:layout_height=\"wrap_content\"\nandroid:text=\"元素二\"\nandroid:layout_below=\"\
  @id/EL01\"\n/>\n<TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"\
  wrap_content\"\nandroid:text=\"元素三\"\nandroid:layout_toRight=\"@id/EL02\"\n/>\n\
  </RelativeLayout>\n```\n\n**图 3-2. 相对布局示例**\n\n`AbsoluteLayout`\n\n每个子元素必须在父布局对象的边界内指定一个特定位置。`AbsoluteLayout`\
  \ 对象可能最容易构建和可视化，但最难迁移到新的设备或屏幕尺寸。例如（见图 3-3）：\n\n```\n<AbsoluteLayout xmlns:android=\n\
  [\"http://schemas.android.com/apk/res/android\"](http://schemas.android.com/apk/res/android)\n\
  android:layout_width=\"fill_parent\"\nandroid:layout_height=\"fill_parent\"\n>\n\
  <TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"wrap_content\"\
  \nandroid:text=\"元素一\"\n/>\n<TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"\
  wrap_content\"\nandroid:text=\"元素二\"\nandroid:layout_x=\"30px\"\nandroid:layout_y=\"\
  30px\"\n/>\n<TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"\
  wrap_content\"\nandroid:text=\"元素三\"\nandroid:layout_x=\"50px\"\nandroid:layout_y=\"\
  50px\"\n/>\n</AbsoluteLayout>\n```\n\n**图 3-3. 绝对布局示例**\n\n`TableLayout`\n\n`TableLayout`\
  \ 是一种布局对象，允许你指定表格行。Android 会尝试将每个子元素安排到正确的行和列中。例如（见图 3-4）：\n\n```\n<TableLayout\
  \ xmlns:android=\n[\"http://schemas.android.com/apk/res/android\"](http://schemas.android.com/apk/res/android)\n\
