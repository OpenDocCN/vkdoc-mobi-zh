  \ Intent、Intent 接收器和 Intent 过滤器进行通信。为此，你需要另一个示例应用程序。\n\n### **创建 Intent 接收器**\n\n\
  *Intent 接收器* 是 Android 中为数不多的几个名副其实的东西之一。它的作用是等待注册过的 Intent 动作（Android 版的 BREW 风格通知）。我将使用一个不太具有生产价值的应用程序来演示\
  \ Intent 接收器的一个较为棘手的任务：接收并响应传入的短信。\n\n#### **设置场景**\n\n让我为你描绘一个场景。一天下午，你回到办公桌前，发现自己遭遇了一场“Hello\
  \ Kitty”袭击。你的办公桌从地毯到天花板，到处都贴满了这个人类已知最令人厌烦的 icon 的可爱粉色图案。你知道是谁干的，复仇的时候到了。你还知道，你们工程副总裁对某首歌深恶痛绝，那种炽热的仇恨无与伦比。那首歌就是《La\
  \ Bamba》。你决定通过在你同事的 Android 手机上安装一个潜伏应用程序来报复他。我将向你展示如何制作一个 Android 应用程序，它能对特定短信做出响应，播放一个音频文件，以达到最大的羞辱效果。\n\
  \n**Android 核心要点**\n\n**19**\n\n![index-26_1.png](img/index-26_1.png)\n\n这将使你新结下的仇敌成为你们副总裁强烈愤怒的对象。同时，你也要让你的受害者知道他中招了……并给他一个关闭声音的机会。这个恶作剧应用程序需要一个\
  \ Intent 接收器、一个 Activity、一个服务，以及这三者之间通信的方式。想象一下，当你同事的手机开始播放你们工程副总裁最痛恨的那首歌时，他会多么惊讶。\n\
  \n##### **这有什么实际用途吗？**\n\n这是个很好的问题。虽然表面上这看起来可能不是最实用的应用程序，但我相信，只要稍加想象，你就能为这个小小的恶作剧应用程序找到各种重要的实际用途，从推送邮件通知到内部应用通信。此外，到目前为止内容一直过于严肃。我们将分四个阶段进行。在每个阶段，你都会学到更多关于\
  \ Intent 接收器、服务以及所有这些应用程序组件之间交互的知识：\n\n-   在短信到达时接收通知\n-   打开短信内容并查找特定的有效载荷\n- \
  \  在短信到达时启动一个 Activity，并意识到这次启动是由 Intent 接收器发起的\n-   启动一个播放音频文件的新服务\n\n##### **使用\
  \ Intent 接收器**\n\n\n\n在开始构建意图接收器之前，你需要花一点时间了解为何要使用它。意图接收器几乎不占用内存、不需要链接或额外开销。当活动（Activity）必须在启动时加载所有繁重的导入类时，意图接收器则没有这些负担。由于某些类型的意图可能会以极高的频率到达（例如网络状态更新），一个轻量级的\
  \ **Android 基础** 对象必须首先对数据进行解析。如果此时适合唤醒一个更大的用户界面进程或繁重的后台服务，意图接收器就应该采取这样的行动。\n\n\
  **提示**  \n意图接收器可能会被频繁地启动和关闭（取决于它们监听的内容）；请尽量让它们保持轻量，并尽可能少地使用库。如果你在处理某个特定事件时插入了过多开销，导致手机运行缓慢，用户是不会高兴的。\n\
  \n### 构建意图接收器\n\n首先，你需要为这个恶作剧小应用创建一个新项目。在源码目录中，创建一个新类，它将作为新的意图接收器。初步来看，它应该像这样：\n\
  \n```\npublic class PrankSMSReceiver extends IntentReceiver\n{\n    public void\
  \ onReceiveIntent\n    (Context context, Intent intent)\n    {\n        return;\n\
  \    }\n}\n```\n\n现在你已经设置好了这个类，接下来需要告诉 Android 你希望接收短信事件。你需要修改 `AndroidManifest.xml`\
  \ 文件，以获取权限并注册 `RECEIVE_SMS` 意图动作。\n\n### 权限\n\n运营商、用户甚至开发者可能都不希望让 Android 应用随意访问手机和网络的特权层。因此，Google\
  \ 在 Android 中引入了 **Android 基础** 权限的概念（所有有移动开发经验的开发者都应该认识它）。要能够接收短信，你需要通知手机你已经获得接收权限。\n\
  \n由于在 Android 中，权限是针对特定清单中的所有元素声明的，你需要在 `<manifest>` 声明标签之后添加权限行（代码清单 2-2）。示例应用将命名为\
  \ `PrankApp`，其主活动称为 `PrankActivity`。对于原创性，笔者不指望获得任何命名奖项。\n\n**代码清单 2-2. 添加接收短信的权限**\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
  http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.book.PrankApp\"\
  >\n    <uses-permission android:name=\"android.permission.RECEIVE_SMS\" />\n```\n\
  \n如果没有权限标记，Android 在收到短信时就不会启动你的应用。后面我还会介绍其他需要涉及的权限。与此同时，你可以在 [Android 官方文档：http://code.google.com/android/reference/android/Manifest.permission.html](http://code.google.com/android/reference/android/Manifest.permission.html)\
  \ 中找到所有权限的列表。\n\n### 也把短信发给我！\n\n现在你已经获得了与手机短信层交互的权限，接下来需要告诉手机在收到新短信时该做什么。为此，你必须像之前一样打开\
  \ `AndroidManifest.xml` 文件。你需要在现有活动旁边添加一个新的意图接收器。代码清单 2-3 展示了需要插入的内容（为了便于参考，我保留了\
  \ `</activity>` 标签）。**Android 基础**\n\n**代码清单 2-3. 注册新的意图接收器以接收传入短信**\n\n```xml\n\
  </activity>\n<receiver android:name=\"PrankSMSReceiver\" android:enabled=\"true\"\
  >\n    <intent-filter>\n        <action android:name=\"android.provider.Telephony.SMS_RECEIVED\"\
  \ />\n        <category android:name=\"android.intent.category.DEFAULT\" />\n  \
  \  </intent-filter>\n</receiver>\n```\n\n每当手机收到一条传入短信时，这就是你接收意图通知所需的一切。\n\n\n\n\
  ## 一窥意图接收器的实际运行\n\n实现这一点比听起来要困难一些。必须有进程正在运行，DDMS（调试器应用程序）才能附加到它。但在大多数情况下，除非有新事件触发，否则你不希望应用程序运行。解决方法是利用\
  \ Eclipse IDE 玩一点“花招”。\n\n随着你进入后续步骤，这个过程可能会变得稍微复杂一些。\n\n在你的 `onReceiveIntent()`\
  \ 方法内部设置一个断点。开始调试应用程序，让模拟器停留在“Hello World, PrankActivity”屏幕上。\n\n在 Eclipse 中，切换到\
  \ DDMS 视图。你可以按几次 Command+F8 或选择菜单 `Window` → `Open Perspective` → `DDMS` 来完成此操作。\n\
  \n图 2-1 展示了它的样子。\n\n"
- "# Android 要点\n\n*图 2-1. DDMS 透视图*\n\n在左侧窗口的“设备”(Devices) 标签页中，你应该会看到你的应用程序旁边有一个绿色的小虫子图标高亮显示。这是\
  \ DDMS 在告诉你，调试器已附加到你的 `PrankApp` 进程。再往下一点是“模拟器控制”(Emulator Control) 标签页。你将在这里发送短信。首先输入任意电话号码，选择“发送短信”(SMS)，输入一条测试消息，然后点击“发送”(Send)。\n\
  \n如果你的清单文件配置正确，你应该会看到 Eclipse 切换回“调试”(Debug) 透视图，并在你新设置的断点处暂停。\n\n**注意**\n\n如果没有任何反应，首先请确保你已正确设置权限。如果权限不正确，你应该会在\
  \ DDMS 屏幕底部的 LogCat 标签页上看到一条权限失败的消息。此外，请确保你的应用程序正在运行，并且在“设备”(Devices) 标签页上旁边有绿色的调试图标。如果其他方法都失败了，请将你的项目与我随书附带的示例项目进行比较。\n\
  \n如果你到目前为止正确地遵循了步骤，那么每当有短信发送到手机时，你的意图的 `onReceiveIntent()` 函数就会被调用。接下来，你需要弄清楚如何检索短信的内容。\n\
  \n### 短信里有什么？\n\n遗憾的是，到目前为止，Android 关于接收和过滤短信的文档充其量只是令人困惑。我怀疑这并不是一个需要优先告知开发者的特性。虽然我不同意这种优先级安排，但这给了我一个填补空白的机会。\n\
  \n以下是你正在监听新短信时的 `onReceiveIntent()` 方法现在的样子：\n\n```java\npublic void onReceiveIntent(Context\
  \ context, Intent intent)\n{\n    SmsMessage msg[] = Telephony.Sms.Intents.getMessagesFromIntent(intent);\n\
  \    for (int i = 0; i < msg.length; i++)\n    {\n        String msgTxt = msg[i].getMessageBody();\n\
  \        if (msgTxt.equals(\"0xBADCAT0_Fire_The_Missiles!\"))\n        {\n     \
  \       //在这里开始恶作剧\n        }\n    }\n    return;\n}\n```\n\n你还需要导入两个库才能使其工作：\n\n\
  ```java\nimport android.telephony.gsm.SmsMessage;\nimport android.provider.Telephony;\n\
  ```\n\n在 `Telephony` 库中隐藏着 `getMessagesFromIntent()` 调用，它将返回一个短信息数组。剩下要做的就是提取这些短信中的有效载荷。你要寻找用于触发恶作剧活动的特殊代码是文本\
  \ `\"0xBADCAT0_Fire_The_Missiles!\"`。它必须是一个足够独特的组合，以免被意外触发。你肯定不希望你的恶作剧出差错，过早地惊动“受害者”。\n\
  \n**注意**\n\n在 Android 中，那些文档记录不完善的功能很可能尚未完成。由于接收短信息的文档几乎不存在，你应该预料到短信处理方式会有所变化。很可能整体方法会类似，但可以确定的是，在\
  \ SDK 达到最终版本之前，某些细节将会改变。这个示例更多的是关于学习如何使用意图接收器，而不是关于文本消息通信的细节。\n\n## 触发 Activity\n\
  \n\n\n### Android 核心要点\n\n请务必记住，intent 接收器的生命周期仅限于 `onReceiveIntent` 方法调用的持续时间。一旦离开该函数，Android\
  \ 系统就可以随时终止运行你应用的进程。任何异步功能若在此之后启动，都将以混乱的方式消亡。如果你想在该方法内执行除简单处理以外的任何操作，就需要启动一个服务（service）或活动（activity）。由于你既要播放音乐，又要提醒受害者他们已中招，因此需要启动一个活动。实现方式如下：\n\
  \n```\nif (msgTxt.equals(\"0xBADCAT0_Fire_The_Missiles!\"))\n{\n    //启动 Activity\n\
  \    Intent startActivity = new Intent();\n    startActivity.setLaunchFlags(Intent.NEW_TASK_LAUNCH);\n\
  \    startActivity.setAction(\"com.apress.START_THE_MUSIC\");\n    context.startActivity(startActivity);\n\
  }\n```\n\n你在这里看到的唯一陌生代码是 `setLaunchFlags` 中新增的 `NEW_TASK_LAUNCH`。每当你想要发送一个 intent\
  \ action 来启动一个新的 activity 时，都需要这样做。\n\n此外，正如你在闪屏示例应用中所做的那样，你必须在 activity 的 intent\
  \ 过滤器中添加一个新的 action。这个过程看起来应该很熟悉：\n\n```\n<intent-filter>\n    <action android:name=\"\
  android.intent.action.MAIN\" />\n    <action android:name=\"com.apress.START_THE_MUSIC\"\
  \ />\n    <category android:name=\"android.intent.category.LAUNCHER\" />\n    <category\
  \ android:name=\"android.intent.category.DEFAULT\" />\n</intent-filter>\n```\n\n\
  现在，如果你已将前面的代码正确添加到位，当从 DDMS 透视图发送一条 SMS 消息时，你应该会看到你的应用出现在前台，并且屏幕上自豪地显示着“Hello World,\
  \ PrankActivity”文本。\n\n### 设置活动\n\n在进入更邪恶的音乐播放服务之前，还有最后一部分需要添加：将 activity 设置为能正确响应由你的\
  \ SMS intent 接收器发送的 action。如果应用是正常启动的，你需要立即将其关闭。同样，你不能让恶作剧的受害者从菜单中启动它而过早发现你的计划。为此，你需要检索启动\
  \ intent，并调用 `getAction` 方法来找出它是在何种情况下启动的。`PrankActivity` 的 `onCreate` 方法现在应如代码清单\
  \ 2-4 所示。\n\n#### 代码清单 2-4. 针对特定 Intent Action 启动\n\n```\npublic void onCreate(Bundle\
  \ icicle)\n{\n    super.onCreate(icicle);\n    Intent i = getIntent();\n    String\
  \ action = i.getAction();\n    if (action != null &&\n        action.equals(\"com.apress.START_THE_MUSIC\"\
  ))\n    {\n        setContentView(R.layout.pranked);\n        //此处我们需要启动音乐服务\n \
  \   }\n    else\n        finish();\n}\n```\n\n首先，你获取启动了你的 activity 的 intent。拿到 intent\
  \ 后，你可以通过 `getAction` 方法检索调用 action。这将返回一个包含启动事件的字符串，你可以将其与你之前在 XML 中列出的已知音乐 action\
  \ 进行比对。如果你的 activity 是通过正常方式（从菜单或启动调试器）启动的，action 字符串将为 `null`。如果是这种情况，你需要立即使用 `finish`\
  \ 方法关闭 activity。\n\n**注意**：`onCreate` 方法仅在应用首次启动时被调用。如果你启动了应用然后退出（使用返回键），应用仍将在后台运行。此时，如果你发送\
  \ SMS 消息，你的 activity 会回到前台，但其 `onStart` 方法会被调用，而 `onCreate` 不会被调用。如果你正在跟着做，可以随意将你自己示例中的功能移到\
  \ `onStart` 方法中。\n\n## 今天你想羞辱谁？\n\n尽管可能有点大材小用，但你还是会使用 Android 的 `Service` 对象之一来处理音乐播放。我这样做有两个原因：\n\
  \n\n这是一个绝佳的机会，可以在简单、不复杂的环境中演示某项服务的使用。\n\n它可能会让你在不显示应用界面的情况下启动音乐，从而使你的恶作剧应用更加“阴险”。\n\
  \n## 对服务的疑虑\n\n为什么要使用服务？本质上，它是一个独立于用户界面、作为分离进程运行的对象。当开发者希望某项功能（无论是网络相关还是多媒体相关）能够独立运行时，它是最理想的选择。例如音频播放、后台网络事务，以及邪恶的恶作剧应用。\n\
  \n尽管服务允许多个应用绑定（即建立通信通道），但你这里将把它作为一个简单的后台进程来使用。再次强调，服务的用途远不止你在此处应用的简单场景。\n\n**Android\
  \ 要点**\n\n**29**\n\n![](img/index-36_1.png)\n\n### 创建服务\n\n在源包中添加一个新类。我再次将其命名为 `PrankService`（原创性方面就不加分了）。在最基本层面，服务必须重写\
  \ `onBind` 方法。要使服务类能够编译，它至少需要像代码清单 2-5 所示。\n\n#### 代码清单 2-5. 精简版服务\n\n```java\n\
  public class PrankService extends Service\n{\n    public IBinder onBind(Intent intent)\n\
  \    {\n        return null;\n    }\n}\n```\n\n在这个示例中，你不会使用服务交互中的 `onBind` 方法，而只是从主\
  \ Activity 中启动和停止服务。为此，你需要在 `Service` 类中再重写两个方法：\n\n- `onStart(int startId, Bundle\
  \ arguments)`\n- `onDestroy()`\n\n当 `onStart` 被调用时，你将开始播放示例媒体文件。当服务被销毁时，你将显式地停止它。这并非绝对必要，但为了便于解释，稍后我们会进一步说明。\n\
  \n### 启动服务\n\n启动一个新服务应该与启动一个 Activity 类似。由于你之前已经接触过几次，这里就直接给出代码，让你自行理解。\n\n**30**\n\
  \n**Android Essentials**\n\n![](img/index-37_1.png)\n\n回想一下之前列出的 `PrankActivity`\
  \ 中的 `onCreate` 方法。只需用下面这行代码替换注释“我们需要在此处启动音乐服务”：\n\n```java\nstartService(new Intent\n\
  (\"com.apress.START_AUDIO_SERVICE\"), null);\n```\n\n同样，这段代码应该看起来很熟悉。启动 Activity\
  \ 与启动服务之间的唯一区别（除了方法调用不同）在于，可以随 Intent 传递一个 *Bundle*（本质上是一个映射或哈希表）参数。该 Bundle 将被传递给服务的\
  \ `onCreate` 方法。\n\n### 启动音乐\n\n与 BREW 和 Java ME 一样，Android 使媒体播放（至少是简单的播放/停止操作）变得非常简单易用。当服务的\
  \ `onStart` 函数被调用时，你将加载并播放来自 `/res/raw` 目录的测试音频文件。首要任务是复制一个示例音频文件到 `/res/raw` 目录（如果你没有这个目录，请自行创建）。\n\
  \n接下来，将你准备好的、尊重版权的音频文件放入 `raw` 文件夹。如果你使用 Eclipse，应该向 `R.raw` 添加一个对应元素。在你的案例中，它是\
  \ `R.raw.test`。\n\n现在你有了可引用的音乐文件，可以按如下方式向 `PrankService` 添加过程调用：\n\n```java\npublic\
  \ void onStart(int startId, Bundle arguments)\n{\n    MediaPlayer p;\n    super.onStart(startId,\
  \ arguments);\n    player = MediaPlayer.create(this, R.raw.test);\n    player.start();\n\
  }\n```\n\n请记住，`onStart` 是一个被重写的方法，因此你需要首先调用父类的同名函数，否则 Android 会报错。此时，你将使用 `MediaPlayer`\
  \ 静态类\n\n**Android Essentials**\n\n**31**\n\n![](img/index-38_1.png)\n\n创建一个新的媒体播放器对象。由于服务是\
  \ Activity 的子类，\n\n\n\n## 上下文类\n\n你需要传递一个指向当前上下文的指针，以及代表测试媒体的静态变量。此时，你可以调用 `play`，然后一切便已就绪。通过这项服务，音频应在后台持续播放，直到你的主\
  \ Activity 调用了 `stopService` 方法。\n\n当 `stopService` 被调用时，将触发以下方法：\n\n```java\npublic\
  \ void onDestroy()\n{\n    super.onDestroy();\n    player.stop();\n}\n```\n\n###\
  \ 仁慈之举\n\n既然你是一个善良的恶作剧者，你会给受害者留一条出路。正如你之前所见，Activity 是由意图接收器触发的，而 Activity 随后会启动服务。正如你刚刚看到的，服务负责播放那段会让你的虚拟工程副总裁恼火的噪音。同样，因为你执行报复时心怀仁慈，所以你必须构建一种让受害者关掉音乐的方式。\n\
  \n在你的 `PrankActivity` 中添加以下方法即可实现你的仁爱之举：\n\n```java\npublic boolean onKeyDown(int\
  \ keyCode, KeyEvent event)\n{\n    stopService(new Intent(\n        \"com.apress.START_AUDIO_SERVICE\"\
  ));\n    finish();\n    return true;\n}\n```\n\n### 清单配置\n\n以下是清单文件的内容：\n\n```xml\n\
  <service android:name=\".PrankService\">\n    <intent-filter>\n        <action android:name=\n\
  \            \"com.apress.START_AUDIO_SERVICE\" />\n        <category android:name=\n\
  \            \"android.intent.category.DEFAULT\" />\n    </intent-filter>\n</service>\n\
  ```\n\n### 报复的禅意与艺术\n\n通过使用一个狡黠的小型恶作剧应用程序，我们探索了意图、意图接收器、服务和 Activity 如何在一个高级的、主要运行在后台的应用程序中协同工作。下面我将逐步介绍你做了什么以及是如何实现的。\n\
  \n#### 实施步骤\n\n你做了以下几件事：\n\n1.  你使用了一个具有适当权限的意图接收器，以及一个系统级的短信意图，使得每当手机收到短信时，你的 `PrankSMSReciever`\
  \ 对象就会被实例化。如果你的意图接收器检测到一个非常特定的短信内容，它就会通过发送一个意图来启动你的 Activity 作为响应。\n\n2.  这个名为 `PrankActivity`\
  \ 的 Activity 会监听由 `PrankSMSReceiver` 发送的特定意图动作。当它接收到那个精确的意图动作时，你的 Activity 会向受害者显示一条“逮到你了”的消息。同时，该\
  \ Activity 会发送一个意图来启动一项服务。如果在任何时候受害者/用户按下了手机上的某个按键，应用程序将退出，音乐服务也会终止。\n\n3.  名为 `PrankService`\
  \ 的服务类会监听 `PrankActivity` 的意图，一旦收到即开始播放一个令人讨厌的、预定义的音频文件。它会持续播放，直到被 `PrankActivity`\
  \ 对 `stopService` 方法的调用所终止。\n\n**注意**  \n此示例应用程序不处理手机自带的短信应用程序。由于所有意图接收器都会收到传入意图的通知，你的应用程序将与\
  \ Android 的短信收件箱应用程序争夺用户注意力。在实际产品中，这可能需要一个可观的计时器，以及一个更微妙的触发文本内容，而不是像 `“0xBADCAT0_Fire_The_Missiles!”`\
  \ 这样直白。\n\n## 更多恶作剧思路\n\n以下是你可以自行探索和扩展这个恶作剧应用程序的几种方法：\n\n-   将 Activity 从循环中移除，变得更“邪恶”。直接从意图接收器启动\
  \ `PrankService`。不要给受害者关闭音乐的任何途径。\n\n-   添加一个不同的文本内容来停止音乐。这个练习与上一个练习结合进行会非常棒。\n\n\
  -   自定义你的“讨回公道”消息。创建一个触发服务的前缀，以及一个由主应用 Activity 展示的消息内容。使用意图内的额外数据将此内容从意图接收器传递给\
  \ Activity。嘲弄，有时需要精准微调。\n\n这些只是一些让你更好地学习 Android 各个组件的方式。\n\n\n"
- "# 在 Android 中移动数据\n\n最后，为了完善你关于 Android 应用程序构建模块的知识，你需要重点关注内容解析器。Android 并没有像 Brew\
  \ 那样为 SDK 提供访问手机文件系统的特定权限，也不像 Java ME 那样提供 `RecordStore`。在 Activity、Intent 接收器和服务之间传递数据的主要方法，是通过\
  \ `ContentResolver` 超类来实现的。尽管你可以通过文件、偏好设置和其他数据库来存储数据，但内容解析器可以有多种形式，而且 Android 内置了几个重要的内容解析器。以下是本书出版时，你可能需要经常与之交互的主要\
  \ Android 内容解析器列表：\n\n- 浏览器\n  - 书签\n  - 搜索历史\n- 电话\n  - 通话记录\n  - 最近通话\n- 联系人\n\
  - 系统设置\n  - 硬件设置（蓝牙、网络设置）\n  - 软件设置\n\nAndroid 官方文档在此处提供了关于使用联系人内容解析器的优秀演练：[`code.google.com/android/devel/data/contentproviders.html#usingacp`](http://code.google.com/android/devel/data/contentproviders.html#usingacp)。\n\
  \n接下来，我将快速带你了解如何向手机浏览器的书签列表中添加一个书签。首先，你需要搜索当前的书签列表，以确认你的链接是否已存在。其次，如果书签不存在，你就添加它。\n\
  \n> **注意**  \n> 你可以创建自己的内容提供器，将 Android 的 SQLite 实现封装起来以提供通用访问。你将在后续章节中学习如何实现这一点。现在，你只需处理这个内容解析器交互的“客户端”部分。\n\
  \nAndroid 使用自定义的 SQLite 实现来在本地存储信息。如果你不熟悉 SQL 的基础知识，现在可能是复习的好时机。为了便于讲解，我将假设你理解基本的\
  \ SQL 搜索命令。如果你需要复习，Apress 在此处有一个很棒的资源：[`apress.com/book/catalog?category=145`](http://apress.com/book/catalog?category=145)。\n\
  \n## 毫不掩饰的自我推销\n\n假设在你的应用的“关于”部分中，你想要一个按钮，可以将你的商业软件页面添加到用户的网页书签中。你需要确保，如果用户不小心再次点击了该按钮，书签不会被添加两次。为了这个简单的演示，当用户按下某个键时，你将在示例应用中触发这个事件。\n\
  \n> **注意**  \n> 有趣的是，如果你需要一个证据来证明 Android 作为一个开发平台仍未完全成熟，你只需查看 `android.content.ContentResolver`\
  \ 中 `getDataFilePath` 方法的文档即可，该方法写着：“不要使用这个函数！！有人添加了它，但他们不该这么做。你无法直接访问内容提供器内部的任何文件。别碰这个。走开。”很高兴看到，即使是\
  \ Android 官方文档的技术作家也有幽默感。\n\n### 获取用户的书签\n\n此时，应该很明显，开发者如果能够访问用户的书签，就可以做相当不道德的事情。目前尚不清楚\
  \ Android 将采取什么措施来防止此类事情发生。我想这取决于运营商来锁定或监控这种行为。无论如何，你将调用 `managedQuery` 方法，该方法将返回用户的书签列表：\n\
  \n```java\nCursor bookmarks = android.provider.Browser.getAllBookmarks(getContentResolver());\n\
  int urlColumn = bookmarks.getColumnIndex(android.provider.Browser.BookmarkColumns.URL);\n\
  \nCursor results;\nString[] proj = new String[]\n{\n    android.provider.BaseColumns._ID,\n\
  \    android.provider.Browser.BookmarkColumns.URL,\n    android.provider.Browser.BookmarkColumns.TITLE\n\
  };\n\nresults = managedQuery(android.provider.Browser.BOOKMARKS_URI, proj, null,\
  \ android.provider.Browser.BookmarkColumns.URL + \" ASC\");\n```\n\n我现在来分解一下发生了什么。你首先获取书签\
  \ URL 的列索引。再次强调，由于 Android 以 SQL 格式提供对其大部分内部数据的访问，你应该习惯于以数据库为中心的方式来引用已保存的信息。接下来，你将设置游标（一个类似于\
  \ Java ME 中 `RecordStore` 枚举器的对象）并设置你的投影字符串数组。因为你只对包含 URL 的列感兴趣，所以可以保持非常简单。`managedQuery`\
  \ 方法的调用将返回你的数据。你将传入书签存储的 URI 字符串，提供简单的投影数组，将 where 部分留空，并告诉它按降序对 URL 进行排序。\n\n###\
  \ 搜索结果\n\n搜索结果非常简单：只需迭代 `Cursor` 对象，并从之前获取的 URL 列 ID 中提取字符串即可：\n\n```java\nCursor\
  \ results = android.provider.Browser.getAllBookmarks(getContentResolver());\nint\
  \ urlColumn = results.getColumnIndex(android.provider.Browser.BookmarkColumns.URL);\n\
  \nresults.first();\ndo\n{\n    //url 是一个方法参数，包含我们要寻找的内容\n    if(results.getString(urlColumn).equals(url))\n\
  \        return false;\n} while(results.next());\n```\n\n你可以根据 URL 的内容做更多事情，但这里我们只查找\
  \ [www.apress.com](http://www.apress.com) 这个链接。显然，如果用上述 Apress 的 URL 运行这段代码，你是找不到它的。由于用户想在你的虚构的“关于”部分中添加你公司的\
  \ URL，你就需要满足他们的要求。\n\n## 使用内容解析器添加“邪恶”的公司 URL\n\n也许它们并不邪恶，但你还是要添加它们。既然 Apress 可能是世界上最少邪恶的公司之一（请注意，不是我偏心），你就破例一次，允许它们这样做。以下是添加书签记录的奇妙的\
  \ `ContentReceiver` 方式：\n\n```java\nContentValues inputValues = new ContentValues();\n\
  inputValues.put(android.provider.Browser.BookmarkColumns.BOOKMARK, \"1\");\ninputValues.put(android.provider.Browser.BookmarkColumns.URL,\
  \ \"http://www.apress.com/\");\ninputValues.put(android.provider.Browser.BookmarkColumns.TITLE,\
  \ \"Apress，不那么邪恶的公司\");\n\nContentResolver cr = getContentResolver();\nUri uri =\
  \ cr.insert(android.provider.Browser.BOOKMARKS_URI, inputValues);\n```\n\n与大多数 SDK\
  \ 一样，完成同一任务的方法不止一种。之前，我们有一种更复杂的方式来添加书签。这种方法很有用，因为它为你提供了如何通过一个没有辅助函数的 `ContentResolver`\
  \ 来添加元素的参考。现在，这是简单的方法：\n\n```java\nandroid.provider.Browser.saveBookmark(this, \"\
  Apress\", url);\n```\n\n这个辅助函数将激活一个对话框，询问用户确认添加书签。这可能是最友好的添加书签的方式——除非你想控制对话框的外观。\n\
  \n## 均衡早餐的一部分\n\n在前三个示例中，你探索了 Android 的所有主要构建模块。你首先研究了一个功能性的启动画面。这让你探索了启动、维护以及在不同\
  \ Activity 对象间跳转的基本原理。它让你初步了解了 Intent 以及进程间/对象间的通信。在 Activity、服务、内容处理程序和 Intent\
  \ 接收器之间使用和传递 Intent，很可能是使 Android 与其他移动环境区别开来的最重要特性之一。\n\n掌握了 Activity 和通信基础知识后，你接着学习了服务（Service）和\
  \ Intent 接收器。要使用这两个构建模块，你需要...\n\n\n\n"
- '# 用户界面


  你设计了一个恶作剧般的应用程序，强制你使用了所有三个组件（Activity、Service 和 Intent Receiver），并让它们三者相互通信。几乎作为附带内容，你探索了当短信到达手机时如何被通知。


  最后，你探索了如何检索和写入设备原生内容解析器：浏览器书签数据库。事实证明事情并不总是一帆风顺，Android 拒绝了你通过传统内容解析器方法添加新书签的尝试，这迫使你回退到一个旨在完成相同任务的辅助函数。既然我已经介绍了基础知识，是时候让手机用户多参与一些了。


