  \ 方法调用感到好奇。这意味着是时候在这个有限的上下文中，简要地谈谈 Intent 了。*Intent* 是一个对象，它充当两个或多个 Activity、内容处理器、Intent\
  \ 接收器或服务之间的通信事件。在本例中，你将使用 Intent `com.google.app.splashy.CLEARSPLASH` 来调用 `startActivity`。当调用\
  \ `startActivity` 时，Android 会搜索其所有清单文件，查找已注册了上述 `CLEARSPLASH` Intent 动作的节点。恰好，你将添加一个名为\
