  <TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"wrap_content\"\
  \nandroid:text=\"元素一 A\"\n/>\n<TextView\nandroid:layout_width=\"wrap_content\"\n\
  android:layout_height=\"wrap_content\"\nandroid:text=\"元素一 B\"\n/>\n</TableRow>\n\
  <TableRow>\n<TextView\nandroid:layout_width=\"wrap_content\"\nandroid:layout_height=\"\
  wrap_content\"\nandroid:text=\"元素二 A\"\n/>\n</TableRow>\n</TableLayout>\n```\n\n\
  \n\n```xml\n<TableLayout>\n  <TableRow>\n    <TextView\n      android:layout_height=\"\
  wrap_content\"\n      android:text=\"元素二 A\"\n      />\n    <TextView\n      android:layout_height=\"\
  wrap_content\"\n      android:text=\"元素二 B\"\n      />\n  </TableRow>\n</TableLayout>\n\
  \n**Android 基础**\n\n**49**\n\n![index-56_1.png](img/index-56_1.png)\n\n![index-56_2.png](img/index-56_2.png)\n\
  \n***图 3-4：表格布局示例***\n\n**50**\n\n**Android 基础**\n\n![index-57_1.png](img/index-57_1.png)\n\
  \n这些是你往后会用到的主要布局对象。每个示例都包含几个简单的 `TextView` 元素，用以展示每种布局类型下布局的呈现效果，并附有一张屏幕截图，显示每个\
  \ XML 文件将如何渲染。你可以在 Android 文档 [`code.google.com/android/`](http://code.google.com/android)\
  \ 的 samples/ApiDemos/src/com/google/android/samples/view/ 中找到更详尽的示例。\n\n**注意**\n\
  \n如果你是移动开发新手，在决定如何布局你的应用时，必须在脑海中重复一句格言：“移植，移植，再移植。”理想情况下，可以设置一种适用于所有可能设备的布局。但现实中，这永远行不通。如果你计划在不止一部手机上运行你的应用（正如大多数运营商要求的那样），请将重点放在动态和相对布局结构上。我保证，你使用的屏幕尺寸之后会发生显著变化。尽量减少绝对\
  \ X/Y 值的数量，并将你确实使用的值放在容易找到的位置。\n\n接下来的任务是找到一份可以放置在布局内部的所有相关子元素的列表。该资源以令人困惑的文档形式存在于\
  \ [`code.google.com/android/`](http://code.google.com/android) refrence/android/R.styleable.html#Menu。\n\
  \n从那里，你可以着手处理第一个 UI 任务：为“社交尴尬”应用制作一个登录屏幕。这个登录屏幕将成为 `getSplashy` 示例应用的一部分。\n\n**滚动、文本输入、按钮以及生活中所有简单的事情**\n\
  \n现在是时候使用其中一个布局类了。XML 布局非常适合用户输入、信息传递以及几乎所有屏幕内容相对静态的场景。你将向上文提到的“社交尴尬”应用添加一个简单的登录屏幕（见代码清单\
  \ 3-1）。第一个任务是描述这个新视图中的屏幕外观。你将使用线性布局，这样只需垂直添加控件即可。（注意，这个 XML 需要在 `res` 文件夹中定义 `general_bg`\
  \ 图片和 `disclaimer` 字符串。请从 Apress 网站下载本章的项目以获取更多信息。）\n\n**代码清单 3-1 `/res/layout/login.xml`**\n\
  \n```xml\n<ScrollView xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n  android:layout_width=\"fill_parent\"\n  android:layout_height=\"wrap_content\"\
