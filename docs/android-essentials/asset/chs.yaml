  \n### 创建列表并验证功能\n\n要让列表菜单正确运行需要几个步骤：首先需要将 Activity 转换为`ListActivity`并完成相关切换工作；接着将之前构建的向量中的元素插入列表；最后响应选择事件并开始播放理论上的音频流。同样，在生产版本中你可能需要多个\
  \ Activity，但为简单起见，此处将所有功能集中在一个 Activity 中实现。\n\n#### 准备工作：拥抱列表\n\n要显示可选择的电台列表，首要任务是将普通\
  \ Activity 升级为全新的`ListActivity`。以下是全新的类声明形式：\n\n```\npublic class StationPicker\
  \ extends ListActivity\n```\n\n这种转换带来了一些重要职责。若不履行这些义务，Android 会抛出大量异常。首先需要在默认布局文件中添加`ListView`，因为每个`ListActivity`都必须关联一个`ListView`。以下是示例`main.xml`的内容：\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"\
  http://schemas.android.com/apk/res/android\"\n    android:orientation=\"vertical\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n>\n    <TextView\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"正在加载电台...\"\n        android:id=\"@+id/loadingStatus\"\
  \n    />\n    <ListView android:id=\"@+id/android:list\"\n        android:layout_width=\"\
  wrap_content\"\n        android:layout_height=\"wrap_content\"\n    />\n</LinearLayout>\n\
  ```\n\n#### 添加适配器\n\n\n\n其次，你需要在列表部件中添加一个适配器。你需要定义每个元素的外观。我们将创建一个包含单个文本元素的简单 XML\
  \ 文件，并将其命名为 `list_element.xml`，其内容如代码清单 5-6 所示。\n\n***代码清单 5-6. `res/layout/list_element.xml`***\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<TextView id=\"@+id/textElement\"\
  \n          android:layout_width=\"fill_parent\"\n          android:layout_height=\"\
  wrap_content\"/>\n```\n\n这个 `TextView` 向 Android 系统描述了列表中每个元素应呈现的外观。这里也是设置字体、彩色文本和背景资源的地方。虽然可以实现更复杂的列表元素，但稍后我才会深入探讨这些变体。\n\
  \n还记得我之前让你先存根的 `initList` 方法吗？代码清单 5-7 展示了它应有的实现，而不是仅仅返回 `null`。\n\n***代码清单 5-7.\
  \ 必做事项：为 `ListView` 添加适配器***\n\n```java\nprivate void initList()\n{\n    adapter\
  \ = new ArrayAdapter<StationData>(\n        StationPicker.this, R.layout.list_element);\n\
  \    setListAdapter(adapter);\n}\n```\n\n每个 `ListView` 都必须有一个对应的适配器。适配器有多种类型和风格。表\
  \ 5-1 简要介绍了其中最重要的几种。\n\n***表 5-1. 列表适配器***\n\n| **列表适配器** | **描述** |\n|---|---|\n\
  | 游标适配器 | 一种简单的适配器，非常适合列出 SQL 数据库的内容、搜索结果或其他通常以游标格式存储的数据。事实上，Google 文档中有一个使用游标适配器的优秀示例：`http://code.google.com/android/intro/tutorial-ex1.html`。\
  \ |\n| 资源游标适配器 | 用于从静态 XML 文件构建可选列表的理想适配器。如果你的菜单/列表是已知元素的列表（例如主菜单、帮助主题列表或其他熟悉的目录信息），那么这款适配器就是你的不二之选。\
  \ |\n| 数组适配器 | 我们在此示例中使用的适配器。如果你在编译时不确定列表中会包含什么内容（因为你事先不知道站点列表会是什么），那么这是将 XML 元素列表转换为可选列表的最简单方法。\
  \ |\n\n目前，你已拥有一个功能完备但外观极其简陋的菜单列表，随时可以使用。现在你只需要添加一些数据！\n\n### 向适配器中填充数据\n\n将数据放入适配器很简单，但有一个前提：必须在\
  \ UI 线程中完成。你可能会问，我在说什么？UI 线程是一个特定的执行线程，它控制着重绘循环。\n\n你会注意到，如果你启动一个新的普通 Java 线程，然后尝试更改当前视图、向列表适配器添加数据元素，或执行任何其他\
  \ UI 任务，Android 都会对你“大发雷霆”。所谓“大发雷霆”，是指它要么无法工作，要么会向你抛出一堆异常。\n\n#### 重新获取 UI 线程\n\n\
  由于你启动了一个新的内联 Java 线程来处理阻塞的网络连接，现在你需要定义另一个“可运行”对象，以重新获得 UI 线程的“青睐”。幸运的是，Activity\
  \ 包含一个用于为 UI 线程调度代码的方法。你将其添加到网络代码的末尾（参见代码清单 5-8）。为了上下文，我会重复最后几行。\n\n***代码清单 5-8.\
