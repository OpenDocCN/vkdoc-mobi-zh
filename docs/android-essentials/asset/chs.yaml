  \n**18**\n\n**Android 核心要点**\n\n![index-25_1.png](img/index-25_1.png)\n\n将是任何传统应用程序的核心构建块；它们让你能够控制屏幕并接收用户输入。后续章节将更深入地探讨用户交互。\n\
