  \n### 回顾\n\n在本章中，你有机会让 Android 小试牛刀。我涵盖了基本的网络通信、一些更深入的 UI 布局，以及一些 XML 解析入门知识。\n\n\
  HTTP 层直截了当，使用起来也很方便，尽管有些繁琐和缓慢（至少在 OS X 模拟器上如此）。Android 显然具备深入研究代理、cookies、套接字级别连接以及更高级网络技术的能力。你已经学会了下载数据、使用\
  \ XML 数据，并通过 SAX 解析器将其填充到向量中。从这个`向量`中，你构建了一个列表，当点击列表项时，\n\n\n# Android 开发核心知识\n\n\
  # 第 6 章：收尾工作\n\n现在差不多该放下书本，开始动手编写你的 Android 应用了。在放你离开之前，我将快速回顾一下你走过的路以及你是如何走到这一步的。\n\
  \n## 应用的构建\n\n我的首要任务是介绍 Android 应用的基本构建块。我还必须讲解如何创建新项目，以及构建和运行它的具体流程。正如我所讨论的，一个应用由一系列活动、意图接收器、服务以及内容解析器组成。我使用闪屏实现来演示活动，使用一个由短信触发的恶作剧应用来探索意图接收器和服务，最后通过一些简单的书签代码来深入内容解析器。\n\
  \n值得庆幸的是，Android 提供了一系列清晰简单的构建块，供您创建应用。活动构成了任何 Android 应用的骨干，而意图和意图接收器则充当着通信官的角色。服务和内容解析器则服务于非常特定的需求，例如后台进程和格式化数据传输。将所有这些部分组合在一起，你就拥有了一个强大的系统，能够快速开发出移动应用。\n\
  \n## 外表并非一切，但有时外表就是一切\n\n一旦你开发了一个可运行的应用平台，你就可以让它看起来像是用户可能愿意付费的东西——当然，这取决于你的选择。在\
  \ Android 中，你可以通过两种主要方式来构建用户界面。你可以使用内置的小部件或视图，结合视图组，来创建一个分层的 UI 元素层级结构。或者，你也可以抛开这些现成的工具，仅使用画布以及一些简单的线条、圆形和位图渲染工具来自行绘制。Android\
  \ 提供了 XML 布局，你可以用它来构建 UI 小部件的层次结构。此外，你还可以在代码中构建、操作和微调这些相同的视图和视图组。\n\n通过结合使用这两种方法，你可以预先设计所有静态部分（预格式化的菜单、背景、帮助屏幕），同时在代码中添加和操作这些元素，以响应网络和动态数据。最后，你可以在代码和\
  \ XML 中指定画布区域，数据可以在这些区域中手动绘制。尽管 Android 的视图和视图组一开始可能过于复杂且难以使用，但在某些少数情况下，它们赋予开发者比我所知的任何其他平台更多的能力和灵活性。\n\
  \n为了探索这种原始的机会和灵活性，你编写了一个简单的登录/密码屏幕，仅使用原始 Java 代码和 `TextView` 对象创建了一个主菜单，最后还使用原始画布捣鼓了一些听觉错觉效果。\n\
  \n## 位置信息没那么重要，除非你凌晨 4 点想吃披萨\n\n一旦你掌握了应用逻辑和用户界面的坚实基础，就可以转向更有趣、更激动人心的主题了。你可以探索诸如\
  \ Android 的 GPS 和 Google Maps 服务之类的主题。Android 为你提供了多种访问手机位置信息的方式。虽然模拟器上的实现相当粗糙，但文档表明，在最终的运行版本中可以实现更多功能。为了体验这两项强大的移动功能，你制作了一个功能稍弱的定位跟踪示例。一个蓝色的图钉——假设你做对了所有事情——会跟随模拟器假想的硅谷之旅。当在实际手机上运行时，该示例应该会选择一种更高效的定位方法，并使用那个同样烦人的图钉来跟踪用户。\n\
  \n## 解开 Android 的束缚，让它畅游互联网\n\n最后，你抓住机会让 Android 自由地漫游互联网。你下载了一个简单的 XML 文件，解析它，将其内容推入一个列表，然后——由于\
  \ Android 不完整的网络层——在尝试让 Android 通过网络流式传输音频时失败了。在此过程中，你发现了适配器和列表视图在其原始和稍复杂形式下的乐趣。\n\
  \n## 总结\n\n在所有这些章节中，我一直试图为你装备一个通用的基础，让你能够创建自己的移动应用。在我们短暂的相处时间里，要传达和解释所有可供你（Android\
  \ 开发者）使用的选项，是不可能的。相反，我试图让你掌握基础知识、核心构建块，以及创造下一个 killer 应用所需的理解。\n\n## 其他信息来源\n\n\
  随着 Android 越来越受欢迎，我相信你会看到越来越多的信息来源涌现出来。目前已经有不少博客、网站、维基、论坛和其他信息资源。进行几次有效的谷歌搜索就能让你入门。现在，请务必收藏好\
  \ Android 在线文档，地址如下：\n[`code.google.com/android/documentation.html`](http://code.google.com/android/documentation.html)\n\
  \n还有一个团队正在将 Android 文档构建成 Javadoc 格式：\n[`www.androidjavadoc.com/`](http://www.androidjavadoc.com/)\n\
  \n你可以在谷歌的“入门指南”中找到更多信息：\n[`code.google.com/android/intro/index.html`](http://code.google.com/android/intro/index.html)\n\
  \n最后，教程中的一些更高级的主题（既然你已经基本掌握了基础）可以进一步帮助你。请务必在这里查看它们：\n[`code.google.com/android/intro/tutorial.html`](http://code.google.com/android/intro/tutorial.html)\n\
  \n## 获取帮助\n\n当你遇到困难时，谷歌也提供了一些有用的资源。这里是 Android 初学者论坛的链接：\n[`groups.google.com/group/android-beginners`](http://groups.google.com/group/android-beginners)\n\
  \n此外，作为开发者，你的主要活动区域将是在更通用的论坛区：\n[`groups.google.com/group/android-developers`](http://groups.google.com/group/android-developers)\n\
  \n也请务必查看其他的谷歌讨论组。它们可能是非常宝贵的资源。\n\n## 是时候停止阅读，开始做出贡献了\n\n说真的，我们作为移动开发者社区，需要帮助。目前，我们的成就包括发送彩信、下载\
  \ MP3 铃声，以及浏览一个封闭的小型网络花园。我们需要你，需要你的能力、你的干劲和你的创造力，来让这辆传说中的公交车掉头。裂缝已经开始显现。Verizon\
  \ 和 AT&T 正在争夺“最开放网络”的头衔。人们在破解 iPhone SDK，而事实上，苹果也推出了自己的官方 SDK，尽管它充满了限制和约束。\n\n极客们开始对移动世界做他们当年对桌面计算世界做过的事情。他们开始在重重阻碍下进行创新。在我看来，Android\
  \ 代表了手机访问的最高级别，仅次于高通公司的 BREW SDK。这是我同意写这本书的主要原因之一（嗯，这个原因，以及我不想学习 Objective-C）。\n\
  \n如果设备制造商和运营商允许 Android 蓬勃发展，它代表着我们移动开发者所期待的突破性潜力。请站出来，利用开放手机联盟和谷歌给予我们的工具，用它创造出令人惊叹的东西。我们指望着你。祝你好运。\n\
