  你将从一个示例登录屏幕开始，然后转变为在代码中操作和布局控件与视图，最后使用自定义视图渲染一个交互式动画。


  ## 简单快速的 XML 布局


  一开始，使用 XML 布局可能看起来很简单，但它很快就会变得复杂。你将先从布局开始，然后逐步深入到各个元素。


  ### 布局


  大多数 XML 屏幕会被包裹在一个布局对象中。布局对象有许多不同的类型，你将快速了解每一种，然后在接下来的章节中通过一个简单示例进行验证。


  **注意**：在编译时，这些 XML 布局文件会被 Android 解析并打包成紧凑的二进制格式。这节省了启动时大量的解析时间。然而，这意味着在运行时你的代码不能更改这些
  XML 文件。更具体地说，你也许可以在执行期间更改这些 XML 文件，但这对你的应用程序布局完全没有影响。此外，从 XML 中填充一个视图或视图组需要付出一定的性能代价。具体影响取决于
  CPU 负载和 UI 复杂度。


