    \n    CustomView(Context c)\n    {\n        super(c);\n        player = MediaPlayer.create(c,\
    \ R.raw.bounce);\n        BitmapDrawable d = (BitmapDrawable) getResources().getDrawable(R.drawable.theball);\n\
    \        ball = d.getBitmap();\n        ctx = c;\n    }\n    ...\n}\n```\n\n在构造函数中，你通过\
