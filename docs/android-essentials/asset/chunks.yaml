    \ 方法调用感到好奇。这意味着是时候在这个有限的上下文中，简要地谈谈 Intent 了。*Intent* 是一个对象，它充当两个或多个 Activity、内容处理器、Intent\
    \ 接收器或服务之间的通信事件。在本例中，你将使用 Intent `com.google.app.splashy.CLEARSPLASH` 来调用 `startActivity`。当调用\
    \ `startActivity` 时，Android 会搜索其所有清单文件，查找已注册了上述 `CLEARSPLASH` Intent 动作的节点。恰好，你将添加一个名为\
    \ `MainMenu` 的 Activity，它就会注册处理这样一个 Intent。\n\n为了创建将成为主菜单的 Activity，在你的现有源码包中添加一个名为\
    \ `MainMenu` 的新类。接下来，确保它继承 `Activity` 类，实现 `onCreate` 方法，并在 `R.layout.main` 布局上调用\
    \ `setContentView`。此时，你需要打开 `AndroidManifest.xml` 并向其中添加一个新的 Activity 元素。在\n\n\
    **16**\n\n**Android 核心要点**\n\n![index-23_1.png](img/index-23_1.png)\n\n启动屏的 `</activity>`\
    \ 结束标签之后，你应该插入以下内容：\n\n```xml\n<activity android:name=\".MainMenu\"\n        \
    \  android:label=\"@string/app_name\">\n    <intent-filter>\n        <action android:name=\"\
    com.google.app.splashy.CLEARSPLASH\"/>\n        <category android:name=\"android.intent.category.DEFAULT\"\
    />\n    </intent-filter>\n</activity>\n```\n\n将 Activity 的名称定义为 `.MainMenu`。这将会告诉\
    \ Android 加载并运行哪个 Java 类。在 `intent-filter` 标签内，注册 `com.apress.splash.CLEARSPLASH`\
    \ Intent 动作。实际上，这个 Intent 的名称可以是 `beef.funkporium.swizzle`，只要该名称在 `startActivity`\
    \ 调用和前面列出的 Android 清单片段中保持一致，一切就会正常运转。\n\n#### **运行应用**\n\n如果你到目前为止已经认真学习了，那么此时运行你的应用程序，结果应该是启动屏会显示几秒钟，然后由你新创建的主菜单\
    \ Activity 获取焦点。并且，一旦应用程序进入主菜单，就不应该再能回到启动屏。如果遇到问题，请确保你的新主菜单已列在清单文件和 `R.java` 中。同时，确保你在新的\
    \ Intent 中绘制了正确的布局文件。\n\n#### **Activity 的生命周期**\n\nActivity 的生命周期在谷歌文档中有详尽的介绍。不过，既然我在回顾构成一个\
    \ Activity 的基本要素，就不能错过这个重要信息。现在，有了你的启动屏，你应该已经准备好继续前进了。\n\n**Android 核心要点**\n\n\
    **17**\n\n![index-24_1.png](img/index-24_1.png)\n\n为了便于解释，我还向启动屏 Activity 中添加了以下函数：\n\
    \n```java\nprotected void onStop()\n{\n    super.onStop();\n}\n\nprotected void\
    \ onDestroy()\n{\n    super.onDestroy();\n}\n```\n\n如果你在新创建的启动 Activity 中的所有函数内设置断点，并以调试模式运行它，你会看到断点按以下顺序被触发：\n\
    \n1.  `onCreate`\n2.  `onStart`\n3.  `onResume`\n4.  此时，你的 Activity 正在运行。三秒钟后，计时器线程结束，并使用清除启动屏的\
    \ Intent 调用 `startActivity`。接下来，它会调用 `finish`，这告诉 Android 关闭启动屏 Activity。\n5.\
    \  `onPause`\n6.  `onStop`\n7.  `onDestroy`\n\n这是一个 Activity 从开始到结束的通用生命周期。你可以在谷歌文档\
    \ [`code.google.com/android/reference/android/app/Activity.html`](http://code.google.com/android/reference/android/app/Activity.html)\
    \ 中找到关于 Android Activity 生命周期和时间的更全面阐述。你甚至还会看到一个漂亮的图表。本质上，手机利用上述函数的组合来向你提示应用中可能发生的重大事件：启动、关闭、暂停和恢复。正如我之前提到的，Activity\n\
    \n**18**\n\n**Android 核心要点**\n\n![index-25_1.png](img/index-25_1.png)\n\n将是任何传统应用程序的核心构建块；它们让你能够控制屏幕并接收用户输入。后续章节将更深入地探讨用户交互。\n\
    \n#### **迄今为止**\n\n到目前为止，我探讨了 Activity 如何集成到手机中，它们如何启动和停止，以及它们如何在基本层面上进行通信。我演示了如何显示一个简单的\
    \ XML 视图屏幕，以及如何通过在按键事件发生时或设定的时间结束时，在两个 Activity 之间进行切换。短期内，你需要进一步了解 Android 如何使用\
    \ Intent、Intent 接收器和 Intent 过滤器进行通信。为此，你需要另一个示例应用程序。\n\n### **创建 Intent 接收器**\n\
    \n*Intent 接收器* 是 Android 中为数不多的几个名副其实的东西之一。它的作用是等待注册过的 Intent 动作（Android 版的 BREW\
    \ 风格通知）。我将使用一个不太具有生产价值的应用程序来演示 Intent 接收器的一个较为棘手的任务：接收并响应传入的短信。\n\n#### **设置场景**\n\
    \n让我为你描绘一个场景。一天下午，你回到办公桌前，发现自己遭遇了一场“Hello Kitty”袭击。你的办公桌从地毯到天花板，到处都贴满了这个人类已知最令人厌烦的\
    \ icon 的可爱粉色图案。你知道是谁干的，复仇的时候到了。你还知道，你们工程副总裁对某首歌深恶痛绝，那种炽热的仇恨无与伦比。那首歌就是《La Bamba》。你决定通过在你同事的\
    \ Android 手机上安装一个潜伏应用程序来报复他。我将向你展示如何制作一个 Android 应用程序，它能对特定短信做出响应，播放一个音频文件，以达到最大的羞辱效果。\n\
    \n**Android 核心要点**\n\n**19**\n\n![index-26_1.png](img/index-26_1.png)\n\n这将使你新结下的仇敌成为你们副总裁强烈愤怒的对象。同时，你也要让你的受害者知道他中招了……并给他一个关闭声音的机会。这个恶作剧应用程序需要一个\
    \ Intent 接收器、一个 Activity、一个服务，以及这三者之间通信的方式。想象一下，当你同事的手机开始播放你们工程副总裁最痛恨的那首歌时，他会多么惊讶。\n\
    \n##### **这有什么实际用途吗？**\n\n这是个很好的问题。虽然表面上这看起来可能不是最实用的应用程序，但我相信，只要稍加想象，你就能为这个小小的恶作剧应用程序找到各种重要的实际用途，从推送邮件通知到内部应用通信。此外，到目前为止内容一直过于严肃。我们将分四个阶段进行。在每个阶段，你都会学到更多关于\
    \ Intent 接收器、服务以及所有这些应用程序组件之间交互的知识：\n\n-   在短信到达时接收通知\n-   打开短信内容并查找特定的有效载荷\n\
    -   在短信到达时启动一个 Activity，并意识到这次启动是由 Intent 接收器发起的\n-   启动一个播放音频文件的新服务\n\n#####\
    \ **使用 Intent 接收器**\n"
- fmt: "Before you get into building the intent receiver, you need to take a quick\
    \ moment to learn why you would use one. Intent receivers have little to no memory\
    \ footprint, linkage, or overhead. Where an activity has to load all of its heavy\
    \ imported classes on startup, an intent receiver has none of these obligations.\
    \ Because new intents of a certain type could arrive with crushing frequency (network\
    \ status updates, for example), a lightweight **20** **Android Essentials** object\
    \ must take the first pass at parsing the data. If it is an appropriate time to\
    \ awaken a larger UI process or hefty background service, the intent receiver\
    \ should take such an action.\n\n**Tip**  \nIntent receivers can be started and\
    \ closed frequently (depending on what they listen for); try to make them lightweight\
    \ and use as few libraries as you can get away with. Your users will not be happy\
    \ if their phone is slowed to a crawl because you’ve inserted too much overhead\
    \ into the processing of any particular event.\n\n### Building the Intent Receiver\n\
    \nFirst things first—you’ll need to create a new project for the little prank\
    \ application. In the source directory, create a new class that will become the\
    \ new intent receiver. At first pass, it should look like this:\n\n```\npublic\
    \ class PrankSMSReceiver extends IntentReceiver\n{\n    public void onReceiveIntent\n\
    \    (Context context, Intent intent)\n    {\n        return;\n    }\n}\n```\n\
    \nNow that you have the class set up, you’ll need to tell Android you’d like to\
    \ receive SMS events. You do this by modifying the `AndroidManifest.xml` file\
    \ to give you permission and to register for the `RECEIVE_SMS` intent action.\n\
    \n### Permissions\n\nCarriers, users, and even developers may not want to give\
    \ Android applications free reign to run through the privileged layers of their\
    \ handsets and networks. Consequently, Google has introduced a notion of **21**\
    \ **Android Essentials** permissions in Android (something all developers with\
    \ previous mobile experience should recognize). To be able to receive SMS messages,\
    \ you’ll need to notify the handset that you’re allowed to receive them.\n\nBecause\
    \ permissions, in Android, are declared for all elements within a particular manifest,\
    \ you’ll add the permissions line after the `<manifest>` declaration tag (Code\
    \ Listing 2-2). The sample app will be called `PrankApp`. Its main activity is\
    \ called `PrankActivity`. No namespace prizes should be given to this writer for\
    \ originality.\n\n**Code Listing 2-2. Adding Permissions to Receive SMS Messages**\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.book.PrankApp\"\
    >\n    <uses-permission android:name=\"android.permission.RECEIVE_SMS\" />\n```\n\
    \nWithout the permissions flag, Android will not launch your application when\
    \ it receives an SMS. There are other permissions I’ll need to cover as you move\
    \ along. In the meantime, you can find a list of all permissions in [Android’s\
    \ documentation at http://code.google.com/android/reference/android/Manifest.permission.html](http://code.google.com/android/reference/android/Manifest.permission.html).\n\
    \n### Send Me SMS Too!\n\nNow that you have permission to interact with the SMS\
    \ layer of the handset, you have to tell the handset what to do when a new text\
    \ message arrives. To accomplish this, you must open the `AndroidManifest.xml`\
    \ file as you’ve done before. You’ll add a new intent receiver alongside the existing\
    \ activity. Code Listing 2-3 shows what to insert (I’ve left the `</activity>`\
    \ tag in place for reference). **22** **Android Essentials**\n\n**Code Listing\
    \ 2-3. Registering the New Intent Receiver for Incoming SMSs**\n\n```xml\n</activity>\n\
    <receiver android:name=\"PrankSMSReceiver\" android:enabled=\"true\">\n    <intent-filter>\n\
    \        <action android:name=\"android.provider.Telephony.SMS_RECEIVED\" />\n\
    \        <category android:name=\"android.intent.category.DEFAULT\" />\n    </intent-filter>\n\
    </receiver>\n```\n\nThat’s all you should need to receive an intent notification\
    \ each time the handset gets an incoming SMS."
