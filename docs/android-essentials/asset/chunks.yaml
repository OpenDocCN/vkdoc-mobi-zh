- fmt: "Second, you’ll need to add an adapter to the list widget. You need to define\
    \ what each element is going to look like. You’ll make a simple XML file containing\
    \ a single text element. Call it `list_element.xml`; it should look like Code\
    \ Listing 5-6.\n\n***Code Listing 5-6. `res/layout/list_element.xml`***\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<TextView id=\"@+id/textElement\"\n\
    \          android:layout_width=\"fill_parent\"\n          android:layout_height=\"\
    wrap_content\"/>\n```\n\nThis `TextView` describes, to Android, what each element\
    \ in the list should look like. This is the place for fonts, colored texts, and\
    \ background resources. More complicated list elements are possible, but I’ll\
    \ get into that variation a little bit later.\n\nRemember that `initList` method\
    \ I told you to stub out earlier? Rather than just returning `null`, Code Listing\
    \ 5-7 is what it should look like.\n\n***Code Listing 5-7. Must Do: Adding an\
    \ Adapter to the `ListView`***\n\n```java\nprivate void initList()\n{\n    adapter\
    \ = new ArrayAdapter<StationData>(\n        StationPicker.this, R.layout.list_element);\n\
    \    setListAdapter(adapter);\n}\n```\n\nEvery `ListView` must have a corresponding\
    \ adapter. Adapters come in a few sizes and flavors. Table 5-1 gives a brief description\
    \ of the most important among them.\n\n***Table 5-1. List Adapters***\n\n| **LIST\
    \ ADAPTER** | **DESCRIPTION** |\n|---|---|\n| Cursor adapter | A simple adapter\
    \ that is perfect for listing the contents of SQL databases, search results, or\
    \ any other data that is commonly formatted in a cursor. In fact, the Google documentation\
    \ has an excellent example of using a cursor adapter: `http://code.google.com/android/intro/tutorial-ex1.html`.\
    \ |\n| Resource cursor adapter | The perfect adapter for building a selectable\
    \ list from a static XML file. If your menu/list is a list of known elements,\
    \ such as a main menu, list of help topics, or other well-known catalog of information,\
    \ this is the adapter for you. |\n| Array adapter | The adapter we’re using in\
    \ this example. If you don’t know what’s going to be in your list at compile time,\
    \ because you won’t know what your station list will be, then this is the easiest\
    \ way to convert a list of XML elements into a selectable list. |\n\nFor now,\
    \ you have a fully functioning, while extremely ugly, menu list ready to go. Now\
    \ all you need is some data!\n\n## Stuffing Data into the Adapter\n\nPlacing the\
    \ data in the adapter is simple but for one thing: it must take place inside the\
    \ UI thread. What, you may ask, am I talking about? The UI thread is a specific\
    \ thread of execution, which controls the redraw loop.\n\nYou’ll notice that if\
    \ you start a new generic Java thread and then try to change the current view,\
    \ add data elements to a list adapter, or any other UI task, Android will get\
    \ really grumpy with you. By grumpy, I mean it won’t work, or it’ll throw a stack\
    \ of exceptions at you.\n\n### Reclaiming the UI Thread\n\nSince you started a\
