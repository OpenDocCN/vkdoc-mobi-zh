    ## Android Essentials


    **53**


    ![](index-60_1.png)


    ### Scrolling


    To scroll through a view that’s grown larger than the size of your device’s screen,
    simply wrap your layout object in a `ScrollView`. To enable scroll bars vertically,
    your `ScrollView` must set the parameter `android:scrollbars="vertical"`, which
    will display a scroll bar only as you page down the screen. To make the view long
    enough to demonstrate this object, I’ve added a `TextView` with a phony disclaimer
    to the end of the linear layout. You’ll notice that if you set the previous XML
    as the active view, that focus will shift down the objects until you reach the
    button, at which point the scroll bar will handle the down key and move the user
    to the bottom of the text.


    ### Prying Open the TextView


    Two major “widgets” are at work in the previous XML.


    **Note** A *widget* in Android refers to any self-contained subclass of the `View`
    object.


    For the titles and text-entry labels, you use the `TextView` object. For user-controlled
    text entry, you use the `EditText` object. Most notable, and therefore the one
    worth going over in more detail, is the final “status” text:


    ```

    <TextView

    android:id="@+id/status"

    android:layout_width="fill_parent"

    android:layout_height="wrap_content"

    android:textAlign="center"

    android:text=”Enter Username and Password”

    />

    ```


    First, because this text element is going to be modified at some point by your
    source code at runtime, you need to give it an ID. This allows you to use the
    `findViewById` method later to get a handler for it.


    **54**


    **Android Essentials**


    ![](index-61_1.png)


    The `@+id/status` will add the ID `status` to your `R.java` file if it doesn’t
    exist already. This might bug out your IDE when you reference it in your code
    for the first time. Never fear, though, because the first time you compile, all
    will be sorted out.


    Next, you tell the `TextView` to set its width to the width of its parent, in
    this case, the `LinearLayout` object. You tell it to let its height be bounded
    by the size of the text by using `wrap_content` for the `layout_height` parameter.
    You want the text to reside in the center of the screen, so you’ll use `textAlign`
    because you’ve set its width to be the entire screen. Lastly, you’ll give it some
    simple text to display when the activity starts up. Later, you’ll change this
    text to reflect the current status.


    To see the results of this handiwork, simply create an activity, and set this
    XML layout to be the main content view. You should be able to see the screen,
    type in the text entry field, and select the box. These actions, however, will
    have no results. To tie them into the program and make them interactive, you’ll
    have to keep reading.


    ### XML Layout


    The take-home message here is that the XML layout scheme is both simple and powerful.
    It provides a nonprogrammer interface for mobile screen layout and design. It
    also gives developers the tools to crack open and modify these values on the fly
    during runtime, as you’ll do now by exploring how to interact with Android’s built-in
    widgets.


