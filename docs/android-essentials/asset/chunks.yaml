    **Installing Eclipse**


    Again, because Eclipse will be used in the book’s examples, download the full
    version at [http://www.eclipse.org/downloads/.](http://www.eclipse.org/downloads)


    Be sure to get the Java EE version. It includes frameworks for a few editors that
    the full Google Eclipse plug-in will use. Install Eclipse; the default configurations
    should work just fine.


    **Note**


    With Windows and with the Mac, it’s a good idea to keep your


    files and SDK installation out of folders that contain spaces. Many tools such
    as Ant, among others, can be confused by spaces in folder names.


    **Getting the Android SDK**


    You can find the Android SDK on Google’s website at


    [http://code.google.com/android/download.html.](http://code.google.com/android/download.html)


    Grab it, download it somewhere handy, and then unpack it. I’ve put mine in my
    Development folder at /Developer/AndroidSDK.


    You can just as easily put the ZIP file anywhere on your filesystem. Just remember
    where you’ve stashed it, because you’ll need to tell Eclipse


    **Android Essentials**


    **3**


    ![](index-10_1.png)


    where it is later. It’s also a good idea, if you’re a Windows or Linux user, to
    add the location of the Android tools to your Path variable.


    **Installing the Eclipse Plug-In**


    I like graphical user interfaces (GUIs), provided they have hotkeys like the Eclipse
    IDE, when working with Android. To get more than basic


    functionally out of the process, you’ll need to download the Android


    Developer Tools. To install it from within Eclipse, follow the directions outlined
    by Google at [http://code.google.com/android/intro/](http://code.google.com/android/intro)


    installing.html#installingplugin.


    If you’ve already installed the older version of the SDK and the Eclipse plug-in,
    I recommend you go back and update it to M5-RC15 (or the latest version) now using
    the previously mentioned links. Enough has changed


    between the older version and the latest that the changing details could be confusing.
    If you correctly follow the directions but get an error when trying to install
    the Android editors, go back and install the full version of Java EE Eclipse.
    The basic Java SDK doesn’t include all the correct


    packages used by the Android plug-in.


    Don’t forget to point the Android plug-in to where you unpacked your copy of the
    SDK. It’ll be in Windows/Preferences/Android on the Android


    tab.


    Create a new project by selecting File New Android Project. Give the project and
    activity a pithy name of your choosing. You’ll also have to insert into your source
    package name at least one dot (.), such as apress.


    book.sample or crazy.flyingmonkey.application.


    Eclipse gives a fairly unhelpful error message if you forget to give it more than
    one name separated by dots. I can personally testify that this can be fairly frustrating
    if your brain is fried and you’re, say, trying to get a book done on a deadline.


    **4**


    **Android Essentials**


    ![](index-11_1.png)


    **The Android Project**


    So, you’re now the proud owner of your own basic Android application. If this
    isn’t the case, because you skipped the previous section, create a new project
    right now. New projects, by default, have an implementation of


    “Hello, World.” Books and articles that start by explaining “Hello, World”


    aren’t particularly useful in my humble opinion. Consequently, I’m not


    going to take your time breaking down the functionality of the most basic Android
    application. What is worth taking some time to look into,


    however, are the contents, layout, and files of your new project. Let me briefly
    explain how each file and directory contributes to a functioning Android project
    (see Table 1-1).


    ***Table 1-1\. Files in a Basic Android Project***


    **FILE NAME**


    **PURPOSE**


    YourActivity.java


    File for your default launch activity; more on


    this to follow.


    R.java


    File containing an ID for all asset constants.


    Android Library/


    Folder containing all Android’s SDK files.


