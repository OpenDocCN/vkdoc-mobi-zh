  trans: "\n这是一个绝佳的机会，可以在简单、不复杂的环境中演示某项服务的使用。\n\n它可能会让你在不显示应用界面的情况下启动音乐，从而使你的恶作剧应用更加“阴险”。\n\
    \n## 对服务的疑虑\n\n为什么要使用服务？本质上，它是一个独立于用户界面、作为分离进程运行的对象。当开发者希望某项功能（无论是网络相关还是多媒体相关）能够独立运行时，它是最理想的选择。例如音频播放、后台网络事务，以及邪恶的恶作剧应用。\n\
    \n尽管服务允许多个应用绑定（即建立通信通道），但你这里将把它作为一个简单的后台进程来使用。再次强调，服务的用途远不止你在此处应用的简单场景。\n\n**Android\
    \ 要点**\n\n**29**\n\n![](img/index-36_1.png)\n\n### 创建服务\n\n在源包中添加一个新类。我再次将其命名为\
    \ `PrankService`（原创性方面就不加分了）。在最基本层面，服务必须重写 `onBind` 方法。要使服务类能够编译，它至少需要像代码清单 2-5\
    \ 所示。\n\n#### 代码清单 2-5. 精简版服务\n\n```java\npublic class PrankService extends Service\n\
    {\n    public IBinder onBind(Intent intent)\n    {\n        return null;\n   \
    \ }\n}\n```\n\n在这个示例中，你不会使用服务交互中的 `onBind` 方法，而只是从主 Activity 中启动和停止服务。为此，你需要在\
    \ `Service` 类中再重写两个方法：\n\n- `onStart(int startId, Bundle arguments)`\n- `onDestroy()`\n\
    \n当 `onStart` 被调用时，你将开始播放示例媒体文件。当服务被销毁时，你将显式地停止它。这并非绝对必要，但为了便于解释，稍后我们会进一步说明。\n\
    \n### 启动服务\n\n启动一个新服务应该与启动一个 Activity 类似。由于你之前已经接触过几次，这里就直接给出代码，让你自行理解。\n\n**30**\n\
    \n**Android Essentials**\n\n![](img/index-37_1.png)\n\n回想一下之前列出的 `PrankActivity`\
    \ 中的 `onCreate` 方法。只需用下面这行代码替换注释“我们需要在此处启动音乐服务”：\n\n```java\nstartService(new\
    \ Intent\n(\"com.apress.START_AUDIO_SERVICE\"), null);\n```\n\n同样，这段代码应该看起来很熟悉。启动\
    \ Activity 与启动服务之间的唯一区别（除了方法调用不同）在于，可以随 Intent 传递一个 *Bundle*（本质上是一个映射或哈希表）参数。该\
    \ Bundle 将被传递给服务的 `onCreate` 方法。\n\n### 启动音乐\n\n与 BREW 和 Java ME 一样，Android 使媒体播放（至少是简单的播放/停止操作）变得非常简单易用。当服务的\
    \ `onStart` 函数被调用时，你将加载并播放来自 `/res/raw` 目录的测试音频文件。首要任务是复制一个示例音频文件到 `/res/raw`\
    \ 目录（如果你没有这个目录，请自行创建）。\n\n接下来，将你准备好的、尊重版权的音频文件放入 `raw` 文件夹。如果你使用 Eclipse，应该向 `R.raw`\
    \ 添加一个对应元素。在你的案例中，它是 `R.raw.test`。\n\n现在你有了可引用的音乐文件，可以按如下方式向 `PrankService` 添加过程调用：\n\
    \n```java\npublic void onStart(int startId, Bundle arguments)\n{\n    MediaPlayer\
    \ p;\n    super.onStart(startId, arguments);\n    player = MediaPlayer.create(this,\
    \ R.raw.test);\n    player.start();\n}\n```\n\n请记住，`onStart` 是一个被重写的方法，因此你需要首先调用父类的同名函数，否则\
    \ Android 会报错。此时，你将使用 `MediaPlayer` 静态类\n\n**Android Essentials**\n\n**31**\n\n\
    ![](img/index-38_1.png)\n\n创建一个新的媒体播放器对象。由于服务是 Activity 的子类，\n"
- fmt: "# Context Class\n\nYou’ll pass a pointer to your current context and the static\
    \ variable representing your test media. At this point, you can call `play`, and\
    \ you’re off to the races. Playback should continue in the background with this\
    \ service until the `stopService` method is called by your main activity.\n\n\
    When `stopService` is called, the following method will be called:\n\n```java\n\
    public void onDestroy()\n{\n    super.onDestroy();\n    player.stop();\n}\n```\n\
    \n## An Act of Mercy\n\nSince you’re being a nice prankster, you’ll give your\
    \ victim a way out. As you’ve seen before, the activity is triggered by the intent\
    \ receiver at which point the activity starts the service. As you’ve just seen,\
    \ the service is responsible for playing the noise that will so irritate your\
    \ fictional VP of engineering. Again, because you’re being merciful in your execution\
    \ of payback, you’ll have to build in a way for the victim to turn off the music.\n\
    \nAdding the following method in your `PrankActivity` can accomplish your act\
    \ of grace:\n\n```java\npublic boolean onKeyDown(int keyCode, KeyEvent event)\n\
    {\n    stopService(new Intent(\n        \"com.apress.START_AUDIO_SERVICE\"));\n\
    \    finish();\n    return true;\n}\n```\n\n## Manifestation\n\nHere’s what the\
    \ manifestation looks like:\n\n```xml\n<service android:name=\".PrankService\"\
    >\n    <intent-filter>\n        <action android:name=\n            \"com.apress.START_AUDIO_SERVICE\"\
    \ />\n        <category android:name=\n            \"android.intent.category.DEFAULT\"\
    \ />\n    </intent-filter>\n</service>\n```\n\n## Zen and the Art of Getting Even\n\
    \nThrough the use of a devious little prank application, you’ve explored how intents,\
    \ intent receivers, services, and activities work together in an advanced, mostly\
    \ background, application. I’ll now go over, step by step, what you did and how\
    \ you accomplished it.\n\n### Getting It Done\n\nYou did the following:\n\n1.\
    \ You used an intent receiver with the right permissions and a system-level SMS\
    \ intent to arrange for your `PrankSMSReciever` object to be instantiated each\
    \ time an SMS arrives on the phone. If your intent receiver detected a very specific\
    \ SMS payload, it would respond by sending an intent that would start your activity.\n\
    \n2. This activity, named `PrankActivity`, would listen for the specific intent\
    \ action sent by the `PrankSMSReceiver`. When it received that precise intent\
    \ action, your activity would display a “gotcha” message to the victim. At the\
    \ same time, the activity would send out an intent meant to start up a service.\
    \ If, at any point the victim/user pressed a key on the phone, the application\
    \ would exit, and the music service would be terminated.\n\n3. The service class,\
    \ called `PrankService`, listening for the `PrankActivity`’s intent, would start\
    \ and begin to play an obnoxious, predefined audio file. It would continue to\
    \ play until it was told to stop by the `PrankActivity`’s call to the method `stopService`.\n\
    \n**Note**  \nThis sample application does not deal with the handset’s native\
    \ SMS application. Because all intent receivers are notified of an incoming intent,\
    \ your application will be competing for user attention with Android’s SMS inbox\
    \ application. In production, this may require a substantial timer and perhaps\
    \ a trigger text payload, which is a little more subtle than `“0xBADCAT0_Fire_The_Missiles!”`\n\
    \n## Further Deviousness\n\nHere are a few ways you can explore and extend the\
    \ prank application on your own:\n\n- Get more evil by taking the activity out\
    \ of the loop. Launch the `PrankService` directly from the intent receiver. Do\
    \ not give the victim a way of shutting off the music.\n\n- Add a different text\
    \ payload to stop the music. This exercise would be an excellent one to combine\
    \ with the previous one.\n\n- Customize your “get even” message. Create a prefix\
    \ that triggers the service and a payload, which is displayed by the main app\
    \ activity. Pass this payload from the intent receiver to the activity using a\
    \ payload within the intent. Taunting, sometimes, needs fine-tuning.\n\nThese\
    \ are just a few ways you can better learn the pieces of Android."
