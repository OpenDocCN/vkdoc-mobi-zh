  trans: "\n其次，你需要在列表部件中添加一个适配器。你需要定义每个元素的外观。我们将创建一个包含单个文本元素的简单 XML 文件，并将其命名为 `list_element.xml`，其内容如代码清单\
    \ 5-6 所示。\n\n***代码清单 5-6. `res/layout/list_element.xml`***\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<TextView id=\"@+id/textElement\"\n          android:layout_width=\"\
    fill_parent\"\n          android:layout_height=\"wrap_content\"/>\n```\n\n这个 `TextView`\
    \ 向 Android 系统描述了列表中每个元素应呈现的外观。这里也是设置字体、彩色文本和背景资源的地方。虽然可以实现更复杂的列表元素，但稍后我才会深入探讨这些变体。\n\
    \n还记得我之前让你先存根的 `initList` 方法吗？代码清单 5-7 展示了它应有的实现，而不是仅仅返回 `null`。\n\n***代码清单 5-7.\
    \ 必做事项：为 `ListView` 添加适配器***\n\n```java\nprivate void initList()\n{\n    adapter\
    \ = new ArrayAdapter<StationData>(\n        StationPicker.this, R.layout.list_element);\n\
    \    setListAdapter(adapter);\n}\n```\n\n每个 `ListView` 都必须有一个对应的适配器。适配器有多种类型和风格。表\
