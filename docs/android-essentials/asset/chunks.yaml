- fmt: '好的，这是根据您的要求排版后的 Markdown 文档。


    You understand Java; you can write it, read it, and grok it. Because this book
    is about the Android platform and not the language, I will be writing large amounts
    of Java code inline and assuming you can follow along. If your Java skills are
    rusty, I recommend checking out Apress’s wealth of Java information on its site
    ([http://java.apress.com/](http://java.apress.com)).


    Some familiarity with other mobile platforms will help you. As you move through
    the book, I’ll make comparisons between Android and other mobile software development
    kits (SDKs). You don’t need to be a professional mobile developer to follow along
    by any means.


    You have superior hacker skills. OK, not really, but if you’re comfortable rolling
    up your proverbial sleeves and digging into the heart of a problem, you should
    feel right at home with this book.


    I will assume you have exactly zero experience developing for Android. If you’ve
    already mastered the basics, you may want to skip the first chapter and focus
    on the more advanced topics that follow.


    That wasn’t a big list, but it contained a few things that will help you follow
    the book with your sanity intact.


    Ideally, I want this book to be useful and valuable to anyone interested in developing
    applications for Android. Hobbyists will find a foundation here for their dream
    application. Mobile game developers will find the nuts and bolts of graphical
    output and user input. Multimedia and application developers will find all the
    tricks, tips, and core functionality they need to put together the next major
    killer app. If you’re a business-oriented person looking into porting your existing
    applications to Android, you’ll find invaluable information on how to accomplish
    exactly that. In short, this book has a lot to offer you no matter your desired
    outcome, experience, time, or interest.


    ## How to Best Use This Book


    The simple answer is to read it, but this may mean different things to different
    people. If you’re new to mobile development and Android, it would be best for
    you to treat this book as a tutorial. Follow along, chapter by chapter, until
    you have all the basics you need to get working.


    If you’re a more experienced Java and mobile programmer but are inexperienced
    with Android, you might want to treat this book as more of a reference manual
    after going through the first chapter to get a feel for things.


    Throughout this work, I will primarily use real-world examples as a means to get
    you comfortable with Android. This book may not have a huge appeal to those who
    are already established veteran Android developers. As I said before, I will start
    from a place that assumes no prior experience with this SDK. This book will start
    simple: a splash screen, a main menu, and some simple multimedia. I’ll then get
    into the more advanced concepts of Bluetooth, location-based services, background
    applications, and the other exciting features Android has to offer.


    Enough talking, it’s time to start.


    ## Getting Started


    It begins with installing the SDK. On a personal note, I’m doing all my development
    on Mac OS X with Eclipse. All screenshots, IDE information, tips, and tricks will
    be geared toward the Eclipse IDE. It seems the Android developers had the open
    source IDE Eclipse in mind, because they’ve released a plug-in that eases setup
    and debugging. For the sake of simplicity, I use Eclipse and the Open Handset
    Alliance’s Android. I do not endorse this setup over any other. I will, however,
    take a little bit of time to walk through downloading and configuring Eclipse
    to integrate it with Android. If you’re already up and running on the SDK, skip
    to “The Android Project” section. Additionally, you can find a much more in-depth
    install guide on Google’s [SDK installation page](http://code.google.com/android/intro/installing.html#installingplugin).'
