    ## Android 基础


    **53**


    ![](img/index-60_1.png)


    ### 滚动


    当视图尺寸超出设备屏幕大小时，只需将布局对象包裹在`ScrollView`中即可实现滚动。要启用垂直滚动条，你的`ScrollView`必须设置参数`android:scrollbars="vertical"`，这样只有在向下翻页时才会显示滚动条。为了让视图足够长以演示此对象，我在线性布局末尾添加了一个带有虚假免责声明的`TextView`。你会注意到，如果将之前的
    XML 设置为活动视图，焦点会沿着对象下移，直到到达按钮，此时滚动条将处理向下键，并将用户移至文本底部。


    ### 深入解析 TextView


    在前面的 XML 中，有两个主要的“小部件”在起作用。


    **注意** Android 中的*小部件*指的是`View`对象的任何自包含子类。


    对于标题和文本输入标签，你使用了`TextView`对象。对于用户控制的文本输入，你使用了`EditText`对象。最值得详细讲解的是最后的“状态”文本：


    ```

    <TextView

    android:id="@+id/status"

    android:layout_width="fill_parent"

    android:layout_height="wrap_content"

    android:textAlign="center"

    android:text="输入用户名和密码"

    />

    ```


    首先，由于这个文本元素稍后会在运行时被源代码修改，因此你需要为其分配一个 ID。这样你就可以在之后使用`findViewById`方法来获取它的句柄。


    **54**


    **Android 基础**


    ![](img/index-61_1.png)


    如果`R.java`文件中尚不存在 ID `status`，`@+id/status`将会添加此 ID。当你首次在代码中引用它时，IDE 可能会报错。不过不用担心，因为第一次编译时一切都会解决。


    接下来，你告诉`TextView`将其宽度设置为父容器的宽度，在本例中即`LinearLayout`对象。你通过为`layout_height`参数使用`wrap_content`来让高度由文本大小决定。你希望文本位于屏幕中央，因此使用了`textAlign`，因为你已将宽度设置为整个屏幕。最后，你为它提供了一些简单的文本，使其在
    Activity 启动时显示。稍后，你将更改此文本以反映当前状态。


    要查看这一成果，只需创建一个 Activity，并将此 XML 布局设置为主内容视图。你应该能够看到屏幕、在文本输入字段中键入内容并选中该框。然而，这些操作不会产生任何结果。要将它们与程序关联并使其可交互，你需要继续阅读。


    ### XML 布局


    这里要传达的关键信息是，XML 布局方案既简单又强大。它为移动屏幕布局和设计提供了非编程接口。它还为开发者提供了在运行时动态打开并修改这些值的工具，接下来你将通过探索如何与
    Android 的内置小部件交互来实践这一点。


    ## 唤醒小部件


    我已经演示了如何使用 Android 的`TextView`、`Button`和`EditText`小部件。但如果无法获取用户输入的内容，文本输入字段又有何用呢？这是个反问句；无需回答——我也听不到（但愿如此）。答案显而易见：没有目的或结果的文本输入毫无用处。要访问你之前定义的`EditText`小部件的内容，你需要做两件事：


    1.  获取你在 XML 中定义的小部件的对象句柄。


