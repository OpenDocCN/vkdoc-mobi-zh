    \    //此处省略大量代码\n\n    reader.parse(new InputSource(is));\n    //在 UI 线程上运行我们的代码。\n\
    \    UIThreadUtilities.runOnUIThread(\n        StationPicker.this, r);\n}\n```\n\
    \n**注意**  \n现在不要试图将上述代码粘贴到你的项目中并编译。你需要先定义那个可运行的 `r` 对象。请耐心等待几分钟，或者根据你的阅读速度，读完几段文字。\n\
    \n`UIThreadUtilities` 对象主要是一个静态类，它是一个\n"
