    \ You can find more information on the museum and the relevant exhibit at [http://www.exploratorium.edu/listen/index.php](http://www.exploratorium.edu/listen/index.php).\
    \ You can purchase the scientific white paper at [http://www.nature.com/neuro/journal/v7/n7/full/nn1268.html](http://www.nature.com/neuro/journal/v7/n7/full/nn1268.html).\n\
    \nThe example will animate two balls traveling toward each other and then either\
    \ passing by or bouncing and moving away. The example is meant to show that the\
    \ sound of a bounce can make the difference between a person seeing the objects\
