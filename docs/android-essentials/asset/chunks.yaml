  trans: "\n# 多媒体及其他必需文件\n\n## `res/`\n\nUI 所用资源的基础目录。\n\n### `res/drawable`\n\n存放\
    \ UI 层需要渲染的图像文件的目录。\n\n### `res/layout`\n\n所有 XML 格式的视图布局文件都存放在这里，后续将详细介绍。\n\n\
