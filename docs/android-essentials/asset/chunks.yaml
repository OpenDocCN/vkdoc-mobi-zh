    **Chapter 5: Taking Android Out for a Walk**


    In this chapter, you’ll move past the basics, loosen the leash, and let Android
    stretch its legs a little bit. More and more as the mobile software field progresses,
    it’s become less and less possible to make an application that doesn’t rely heavily
    on the Web. In many ways, fully featured Internet access has become one of the
    essentials in the mobile world. The depth and breadth of Android’s network layer
    makes it impossible to cram into one small chapter of one small book. With this
    in mind, I’ll try to, as I have before, arm you with the basics you’ll need to
    make production-level


    applications. Along the way, as in previous examples, you’ll explore a few tangential
    pieces of Android’s technology.


    Starting with the essentials, you’ll learn how to use a simple HTTP


    connection to download, parse, and list the elements of a remote XML file.


    These elements, in your sample application, will be Internet radio stations contained
    in a basic XML file. Indeed, your entire sample application will be focused on
    building a simple Internet radio player. Sadly, the state of Android’s streaming
    audio does not live up to its documentation. So, this chapter will be more of
    an exercise and less of a fully functioning


    application.


    **Loading a List from the Web**


    To make your snazzy example application, you’ll have to fetch, parse, and display
    a simple list of radio stations. Doing this will require me to cover a range of
    subjects from HTTP transactions to ListViews. Pulling down a


    list down from the Web and displaying them onscreen is something I find myself,
    as an engineer on many mobile projects, doing nearly constantly.


    From pulling down a “friends list” on a social network to a “high score list”


    from an online game element, there’s something universal about


    downloading, parsing, and displaying a list.


    **Android Essentials**


