    \    {\n        x_1 = 0;\n        y_1 = 0;\n    }\n\n    //绘制球 1\n    drawSprint(x_1,\
    \ y_1, canvas);\n\n    //绘制球 2\n    drawSprint(canvas.getBitmapWidth() - x_1,\
    \ y_1, canvas);\n\n    if(running)\n        invalidate();\n}\n```\n\n从顶部开始，你首先使用一个绘画样式对象和\
    \ `canvas.drawRect` 调用将背景涂白。这个绘画对象与 `Rectangle` 对象结合，会告诉画布绘制一个\n"
- fmt: "white box that covers the entire screen. Next, you’ll increment the `x` and\
    \ `y` values for your ball sprites. You’ll then need to reset them if they’ve\
    \ drifted\n\n**Android Essentials**\n\n**71**\n\n![](index-78_1.png)\n\npast the\
    \ bounds of the screen and, finally, draw them with your own `drawSprite` call.\
    \ Code Listing 3-11 shows the contents of that function.\n\n**Code Listing 3-11\\\
    . Drawing a Bitmap**\n\n```java\nprotected void drawSprint(int x, int y, Canvas\
    \ canvas)\n{\n    canvas.drawBitmap(ball, x, y, lPaint);\n}\n```\n\nThis function,\
    \ right now, is simply a straightforward call to the `drawBitmap` method. I’ve\
    \ separated out this method only because drawing the sprite in another context\
    \ might require more functionality than in this simple example. Finally, returning\
    \ to the `onDraw` function, you’ll call `invalidate` only if your `running` flag\
    \ is `true`. Calling `invalidate` on a view is Android’s preferred way of forcing\
    \ a redraw. In this case, you’ll invalidate yourself, which will call `onDraw`,\
    \ and the whole process starts over once again. If you simply set the `running`\
    \ flag to `false` on pause or exit and invalidate it again when resuming, the\
    \ animation should stay in step with the focus of its parent activity.\n\n**Adding\
    \ and Controlling Sound**\n\nSince the auditory illusion requires the ability\
    \ to turn on and off the sound of the two objects bouncing off each other, you’ll\
    \ need to set up the audio to play as they hit and then build a mechanism for\
    \ the user to turn that audio on and off.\n\nTo play the audio, add the code in\
    \ Code Listing 3-12 to the previous `onDraw` function since it is also, in effect,\
    \ the game control loop. When I say “game loop,” I’m referring to the `invalidate`\
    \ call at the end of `onDraw`, which will place a redraw in Android’s UI event\
    \ loop. Keep in mind that `playSound` is a boolean declared just inside the custom\
    \ view.\n\n**72**\n\n**Android Essentials**\n\n![](index-79_1.png)\n\n**Code Listing\
    \ 3-12\\. Playing and Reloading Audio**\n\n```java\nif(playSound && canvas.getBitmapWidth()\
    \ - x_1 -16 == x_1 + 16)\n    player.start();\nif(x_1 >= canvas.getBitmapWidth())\n\
    {\n    x_1 = 0;\n    y_1 = 0;\n    player.stop();\n    player.release();\n   \
    \ player = MediaPlayer.create(ctx, R.raw.bounce);\n}\n```\n\nAs you might have\
    \ noticed, you’re starting the audio playback when the sprites are 16 pixels away\
    \ from each other. This is a little slush time to let the audio get started. I\
    \ should note that it speaks more to my inability to edit audio files than it\
    \ does to a lack of efficiency in audio load and playback times in Android. You\
    \ also must be sure to play the audio only if the `playSound` boolean is `true`.\
    \ This variable is a member of the `Activity` class in which the custom view is\
    \ defined. Using this boolean, you’ll get control over the custom view class from\
    \ within the screen activity. To turn on and off the audio, you now simply implement\
    \ the method in Code Listing 3-13 in the activity.\n\n**Code Listing 3-13\\. Reacting\
    \ to Key Events**\n\n```java\npublic boolean onKeyDown(int key, KeyEvent kc)\n\
    {\n    if(key == KeyEvent.KEYCODE_DPAD_CENTER)\n    {\n        playSound = !playSound;\n\
    \        return true;\n    }\n    return super.onKeyDown(key, kc);\n}\n```\n\n\
    **Android Essentials**\n\n**73**\n\n![](index-80_1.png)\n\nThis code should look\
    \ similar to how you dismissed the prank application in Chapter 2.\n\n**Bringing\
    \ It All Together**\n\nIf you’ve followed along closely (or cheated and simply\
    \ downloaded the finished project), you should be able to run the application\
    \ and watch the illusion. Press the center directional key to turn on and off\
    \ the audio. With the audio off, it should look like they pass each other; with\
    \ it on, it looks like they bounce off and go their separate ways.\n\nIn this\
    \ example, I’ve demonstrated how to create your own View subclass, how use it\
    \ to draw on the screen, how to set up a game-rendering loop, and how to control\
    \ that simple loop using key events.\n\n**Using the User Interface**\n\nIn this\
    \ chapter, you’ve learned, in detail, how to lay out screens using Android’s XML\
    \ schema and how to interact and modify that schema at runtime with some Java\
    \ code."
