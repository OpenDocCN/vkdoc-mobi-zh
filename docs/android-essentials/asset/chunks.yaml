  trans: "\n# Android UI 与游戏循环的进阶探索\n\n接下来，你学习了如何仅通过源代码来布局 UI 控件和视图组。这种方法虽然在实际运用 Android\
    \ 用户界面工具时不太实用，但为了深入理解其原理，仍然值得尝试。最后，你探索了构建游戏渲染循环的核心工具。你还将一些简单的多媒体和用户控制功能融入其中，创建了一个简单的听觉幻觉效果，足以让你的极客朋友们印象深刻。\n\
    \n**提示**\n\n运用本章学到的所有知识，请使用 XML 为这个幻觉效果构建一个框架，其中包含一些解释性文本和一个边框。当活动启动时，渲染 XML 内容，并将自定义视图插入到正确的位置。对于这个任务，我建议使用一个\
    \ `RelativeLayout` 来布局，一个 `TextView` 来显示解释文本，以及一个 `Rectangle` 来绘制边框。\n\n---\n\n\
    ## 第 4 章：位置，位置，还是位置\n\n在本章中，我们将探讨基于位置服务这一非常热门的话题。Android 的主要卖点之一是其对 Google Maps\
    \ 基础设施的原生访问。虽然这是一个可选功能，但哪个运营商会不包含这个强大的软件包呢？我想，在接下来的一年左右时间里，我们就会知道答案了。本章将分两个主要部分深入探讨这个主题。首先，你将学习如何使用\
    \ Android 的 `LocationManager` 对象，它能够利用底层多种系统来测定你的纬度和经度。其次，你将学会如何驱使 Google Maps\
    \ API 为你所用。值得注意的是，Android 对 GPS 和基站定位系统的支持尚未完全实现。在本书撰写时，你可以通过使用默认的模拟 GPS 数据（在加州湾区行驶的路线）或构建自己的伪造\
    \ GPS 数据来模拟 GPS 数据。我的示例将采用第一种方法，但我也会包含最终能够在正式手机上运行的代码。你可以在 Android 文档中找到更多关于构建自定义\
    \ GPS 路线以及基于位置服务（LBS）的详细信息，网址为 [`code.google.com/android/toolbox/apis/lbs.html`](http://code.google.com/android/toolbox/apis/lbs.html)。\n\
    \n通过示例，你将实现一个应用程序，该程序从示例 GPS 模块获取手机位置，启动一个 `MapActivity` 对象，将屏幕中心对准该位置，然后使用覆盖图在其上绘制一个图钉。\n\
    \n### 我在哪里？\n\n总的来说，Android 的基于位置服务的工作方式与你的预期基本一致，只有一个小小的例外。Android 允许开发者指定使用哪种位置查询方法。这使你能够根据应用程序的具体用途，自定义功耗、成本和精度。\n\
    \n### 构建 LocationManager 对象\n\n第一个任务是获取 `LocationManager` 对象的处理器，这是用于查找手机位置的高级对象。`LocationManager`\
    \ 可以使用任意数量的 `LocationProvider` 对象来执行 GPS（或基站）定位。以下是相关的类变量声明以及后续的 `buildGPS` 方法，该方法将为稍后的位置检索做好准备：\n\
    \n```java\nPoint m_curLocation;\nLocationProvider m_locationProvider;\nLocationManager\
    \ m_locationMgr;\n\nprivate void buildGPS()\n{\n    List<LocationProvider> providorList\
    \ = null;\n    Criteria c = new Criteria();\n    c.setAccuracy(50);\n    c.setAltitudeRequired(false);\n\
    \    c.setCostAllowed(false);\n    c.setSpeedRequired(false);\n    // 以下代码行已被注释掉，因为它会导致\n\
    \    // android 陷入无限循环。\n    //c.setPowerRequirement(c.POWER_LOW);\n    m_locationMgr\
    \ =\n        (LocationManager)\n        getSystemService(LOCATION_SERVICE);\n\
    \    m_locationProvider = m_locationMgr.getBestProvider(c);\n    if(m_locationProvider\
    \ != null)\n        return;\n    providorList = m_locationMgr.getProviders();\n\
    \    if(providorList.size() > 0)\n        m_locationProvider = providorList.get(0);\n\
    }\n```\n\n你会注意到，你不能简单地实例化一个新的 `LocationManager`。\n"
- fmt: "\n`object`. It must be retrieved through the `getSystemService` method, a\
    \ public member of the `Activity` class.\n\n### One Must-Have Standard\n\nOnce\
    \ you’ve declared the relevant variables, you’ll build a useless (at least until\
    \ Android arrives on devices) `Criteria` object. The `Criteria` allows you to\
    \ specify features for the lookup method you want to use.\n\nIn this example,\
    \ since you’ll be tracking the user constantly in an urban environment, you want\
    \ something low-cost, low-power, and accurate. You won’t need speed or altitude\
    \ because you’re just going to be pushing this information to the Google Maps\
    \ screen. You’ll specify all these variables by making calls to the `Criteria`\
    \ object, which will eventually be passed into the `LocationManager` object.\n\
    \nWith these criteria set, you can request the best provider that meets your needs.\
    \ Again, because the Android emulator supports only one example GPS stub, you’ll\
    \ get a `null` object back from the `getBestProvider` call.\n\nLater, with real\
    \ hardware, these criteria will be more effective, even essential. Since the LBS\
    \ criteria were rejected, you’ll just grab the first element of the provider list,\
    \ which will be named, at least in this version of the Android software, `gps`.\n\
    \nNote, also, that the low-power requirement is commented out. At time of publication,\
    \ including this setting causes Android to spiral into some kind of infinite loop.\
    \ Android engineers, heads up!\n\n### Look Up, Wave, the Satellites Are Watching…\n\
    \nNow that I’ve laid the groundwork for your location service, you can move on\
    \ to the lookup itself. The application will request its coordinates every five\
    \ seconds and move the containing `MapActivity` to the correct place (something\
    \ I’ll get into at length later in the chapter). Code Listing 4-1 shows the code\
    \ to start the operation. It won’t compile until you include the code that comes\
    \ in the next block after this one, because you’ll have to define the `LocationUpdater`\
    \ object.\n\n#### Code Listing 4-1. Registering for Location Updates\n\n```\n\
    boolean running = true;\n\nprivate void startLocationThread()\n{\n    try\n  \
    \  {\n        LocationUpdater l = new LocationUpdater();\n        registerReceiver(l,\n\
    \            new IntentFilter(\"GPS_UPDATE\"));\n        m_locationMgr.requestUpdates(\n\
    \            m_locationProvider, 5000,\n            50, new Intent(\"GPS_UPDATE\"\
    ));\n    } catch (Exception e){}\n}\n```\n\nTo download the location at five-second\
    \ intervals, you’ll request updates from the location manager. First, you’ll have\
    \ to register a new `LocationUpdater` for the `GPS_UPDATE` intent. This is the\
    \ intent that will be fired each time the `LocationManager` has an update for\
    \ you.\n\n**Tip:** It’s a good idea to request updates in the `onResume` activity\
    \ method and to stop the updates when `onPause` is called. This keeps your application\
    \ from consuming resources while your application is not the topmost visible application.\n\
    \nYou can specify which provider (on the emulator it’ll be `gps`, but on the handset\
    \ it’ll be the closest location provider to your specifications) and specify the\
    \ time interval as `5000` and max distance change as `50` meters. Remember, both\
    \ of these qualifications need to be met for a `GPS_UPDATE` intent to be fired.\n\
    \nOf course, for this code to work, you’ll have to define what a `LocationUpdater`\
    \ is. You’ll define it within the example activity so it has access to the activity’s\
    \ private members; see Code Listing 4-2.\n\n#### Code Listing 4-2. Defining the\
    \ Intent Receiver\n\n```\nclass LocationUpdater extends IntentReceiver\n{\n  \
    \  public void onReceiveIntent(\n        Context context, Intent intent)\n   \
    \ {\n        Location here;\n        if (m_locationProvider == null)\n       \
    \     here =\n                m_locationMgr.\n                getCurrentLocation(\"\
    gps\");\n        else\n            here =\n                m_locationMgr.\n  \
    \              getCurrentLocation(\n                    m_locationProvider.getName());\n\
    \        setMapLocationCenter(\n            here.getLatitude(),\n            here.getLongitude());\n\
    \    }\n};\n```\n\nIn the previous code, the `onReceiveIntent` function is called\
    \ when the `LocationManager` sends out a `GPS_UPDATE` intent. When you’re notified\
    \ of a five-second interval (or a 500-meter location change), you’ll acquire a\
    \ new location and call `setMapLocationCenter` to update the location of the phone\
    \ on the Google Maps object.\n\nSo, you now have the latitude and longitude of\
    \ the handset coming in every five seconds. You have the location, so let’s write\
    \ some code to display that information on a map.\n\n**Note:** Don’t forget to\
    \ add the correct permissions to your manifest file when requesting LBS data.\
    \ You’ll want to add `ACCESS_LOCATION`, `ACCESS_GPS`, `ACCESS_CELL_ID`, and `ACCESS_ASSISTED_GPS`.\
    \ The top-level one will give you access to location services in general. Each\
    \ of the other permissions will let you access a particular method of location\
    \ tracking. Be sure to include the `ACCESS_LOCATION` and at least one other type\
    \ in your manifest, or your `LocationProvider` will always come back as `null`.\n\
    \n### Google Maps\n\nIt is impossible to write a book about Android without tackling\
    \ this subject. Developers everywhere salivate at the possibilities made available\
    \ with a GPS-enabled handset and a native implementation of Google Maps. The fact\
    \ that you’ve probably flipped to this chapter and are reading it first should\
    \ say something about what we’re all excited about.\n\n#### A Metric Ton of Map\
    \ Objects\n\nYou have several players to deal with when displaying a Google Maps\
    \ screen. It’s good to have a quick introduction to all the major players. You’ll\
    \ need to coordinate them all in a delicate ballet of complexity in order to make\
    \ the map screen behave itself.\n\n- `MapActivity` is the grand poobah of the\
    \ Google Maps family. `MapActivity` takes care of all the low-level thread management,\
    \ networking, and basic gesture/key handling.\n- `MapView` is the view that supports\
    \ and displays the map. This must be contained by a `MapActivity`.\n- `MapController`\
    \ is the object used to move the map around the screen.\n- `OverlayController`\
    \ is the superobject to manage all the individual overlay graphics.\n- `Overlay`\
    \ is a single drawable object to be painted overtop the `MapView`.\n- `Point`\
    \ is a single latitude-longitude position. This is the object you’ll use to keep\
    \ track of where the handset is.\n\nEach of the objects listed (yes, there are\
    \ a lot of them, and no, there will not be a quiz later) plays a significant role\
    \ in drawing the map and indicating the user’s location. Obviously, you’ll need\
    \ to start with the `MapActivity`, because it’s the baseline that contains all\
    \ the rest. Here’s the declaration and classwide variable list:\n\n```\npublic\
    \ class MapExampleActivity extends MapActivity\n{\n    MapView m_mapView;\n  \
    \  MapController m_mapController;\n    Point m_curLocation;\n    LocationProvider\
    \ m_locationProvider;\n    LocationManager m_locationMgr;\n    OverlayController\
    \ m_overlayController;\n    boolean m_locationLoopActive = false;\n}\n```\n\n\
    Some of these variables should look familiar from the code in the previous location\
    \ example. I’ve listed them here just so that you’ll have some context for what’s\
    \ to come. Here’s the `onCreate` method that will initialize the metric ton of\
    \ mapping objects:\n\n```\npublic void onCreate(Bundle ice)\n{\n    super.onCreate(ice);\n\
    \    m_mapView = new MapView(this);\n    m_mapController = m_mapView.getController();\n\
    \    m_overlayController =\n        m_mapView.createOverlayController();\n   \
    \ m_overlayController.add(new TackOverlay(this), true);\n    m_mapController.zoomTo(9);\n\
    \    buildGPS();\n    setContentView(m_mapView);\n}\n```\n\nCreating a `MapView`,\
    \ as you can see, requires nothing more than a context pointer. However, if you\
    \ try to set it as the content view in something other than a `MapActivity`, you’ll\
    \ find yourself in exception land. The `MapController`, which is what you’ll use\
    \ to move the map to your GPS locations, is retrieved from the `MapView` object.\
    \ You’ll create an `OverlayController` with the `MapView` and add a new instance\
    \ of your `TackOverlay` object to it.\n"
