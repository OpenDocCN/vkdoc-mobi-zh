- fmt: "# Android Essentials\n\n## Chapter 6: Tying on a Bow\n\nIt’s almost time to\
    \ stop reading and start writing your Android application. Before I let you go,\
    \ I’ll quickly run through where you went and how you got there.\n\n## The Making\
    \ of an Application\n\nMy first task was to cover the basic building blocks of\
    \ an Android application. I also had to cover creating a new project and the logistics\
    \ of building and running it. As I discussed, an application consists of a series\
    \ of activities, intent receivers, services, and content resolvers. I used a splash\
    \ screen implementation to demonstrate activities, an SMS-triggered prank application\
    \ to explore intent receivers and services, and finally some simple bookmaking\
    \ code to get into content resolvers.\n\nThankfully, Android provides a series\
    \ of clear and simple building blocks with which to create your application. Activities\
    \ form the backbone of any Android app, with intents and intent receivers acting\
    \ as the communication officers. Services and content resolvers cater to very\
    \ specific needs such as background processes and formatted data transmission.\
    \ Put all these pieces together, and you’re left with a robust system for quickly\
    \ turning around mobile applications.\n\n## Looks Aren’t Everything, Except, of\
    \ Course, When They Are\n\nOnce you’ve developed a working application platform,\
    \ you can make it look like something users might be interested in actually paying\
    \ for, or not, as you choose. You can build a UI in Android in two general ways.\
    \ You can use the built-in widgets or views in combination with view groups to\
    \ create a tiered hierarchy of UI elements. Or, you can toss these custom-built\
    \ tools aside and do it yourself using nothing but a canvas and some simple line,\
    \ circle, and bitmap image-rendering tools. Android provides an XML layout with\
    \ which you can build your UI widget hierarchy. Additionally, you can build, manipulate,\
    \ and tweak these very same views and view groups inside your code.\n\nBy using\
    \ these two methods in combination, you can predesign all your static pieces (preformatted\
    \ menus, backgrounds, help screens) while adding and manipulating these elements\
    \ within the code to react to network and dynamic data. Lastly, you can specify\
    \ canvas areas both in code and in XML where data can be drawn by hand. Although\
    \ Android’s views and view groups can be overcomplicated and difficult to use\
    \ at first, in some rare cases it mostly leaves us developers with more power\
    \ and flexibility than any other platform I’ve known.\n\nTo explore this raw opportunity\
    \ and flexibility, you wrote a simple login/password screen, created a main menu\
    \ using only raw Java code and `TextView` objects, and finally fiddled with some\
    \ auditory illusions using the raw canvas.\n\n## Location Isn’t Too Important,\
    \ Except When You Need Pizza at 4 a.m.\n\nOnce you have the solid foundations\
    \ of the application logic and the user interface, you can move on to much more\
    \ interesting and exciting topics. You can explore subjects such as Android’s\
    \ GPS and Google Maps service. Android gives you multiple ways to access the location\
    \ of the handset. Although the emulated implementation is rather crude, the documentation\
    \ suggests that much more is possible with the final running version. To get a\
    \ taste for these two powerful mobile functions, you made a slightly less powerful\
    \ location-tracking example. A blue tack would, assuming you got everything right,\
    \ follow along with the emulator’s imaginary tromp through Silicon Valley. The\
    \ example should, when run on an actual handset, choose a rather more efficient\
    \ method of position determination and follow the user with that same annoying\
    \ tack.\n\n## Taking Off Android’s Leash and Letting It Romp Around the Internet\n\
    \nLast, you took the opportunity to let Android roam the Internet at large. You\
    \ pulled down a simple XML file, parsed it, pushed its contents into a list, and\
    \ then failed, thanks to Android’s incomplete networking layer, at making Android\
    \ stream audio over the network. Along the way, you discovered the joys of adapters\
    \ and list views in both their primitive and somewhat more complex forms.\n\n\
    ## Overall\n\nOver the course of all these chapters, I’ve tried to arm you with\
    \ a general foundation from which to create your own mobile application. It’s\
    \ simply impossible, in the short time we have together, to convey and explain\
    \ every option available to you, the Android developer. Instead, I’ve tried to\
    \ give you a grasp of the fundamentals and the essential building blocks and understanding\
    \ required to create your next killer application.\n\n## Other Sources of Information\n\
    \nAs Android gains popularity, I’m sure you’ll see more sources of information\
    \ begin to spring up. There are already several blogs, websites, wikis, forums,\
    \ and other information resources out there. A few good Google searches should\
    \ get you on your way. For now, make sure you bookmark the Android online documentation\
    \ found here:  \n[http://code.google.com/android/documentation.html](http://code.google.com/android/documentation.html)\n\
    \nThere’s also a team building the Android documentation into Javadoc format here:\
    \  \n[http://www.androidjavadoc.com/](http://www.androidjavadoc.com/)\n\nYou can\
    \ find more information in Google’s “Getting Started Guide” here:  \n[http://code.google.com/android/intro/index.html](http://code.google.com/android/intro/index.html)\n\
    \nLast, a few more advanced (now that you’ve mostly covered the basics) topics\
    \ in the tutorials can further help you on your way. Be sure to check them out\
    \ here:  \n[http://code.google.com/android/intro/tutorial.html](http://code.google.com/android/intro/tutorial.html)\n\
    \n## Getting Help\n\nGoogle also provides a few helpful resources for when you\
    \ get stuck. Here’s a link to the Android beginners forum:  \n[http://groups.google.com/group/android-beginners](http://groups.google.com/group/android-beginners)\n\
    \nAlso, as a developer, your main stomping grounds will be over in the more general\
    \ form area:  \n[http://groups.google.com/group/android-developers](http://groups.google.com/group/android-developers)\n\
    \nBe sure to check the other Google groups as well. They can be an invaluable\
    \ resource.\n\n## It’s Time to Stop Reading and Start Helping\n\nSeriously, we,\
    \ as a community of mobile developers, need help. Currently, our achievements\
    \ include sending picture messages, downloading MP3 ringtones, and browsing a\
    \ small, walled garden of the Web. We need you, your abilities, your gumption,\
    \ and your creativity to turn this proverbial bus around. The cracks are beginning\
    \ to show. Verizon and AT&T are now vying for the title of “Most Open Network.”\
    \ People are hacking the iPhone SDK, and indeed, Apple is making its own official\
    \ SDK available, as limited and confining as it is.\n\nGeeks are starting to do\
    \ to the mobile world what they did for the desktop computing one. They’re starting\
    \ to innovate in spite of the blocks put up to prevent them from doing so. Android,\
    \ in my opinion, represents the highest level of access to a handset second only\
    \ to Qualcomm’s BREW SDK. This is one of the major reasons I agreed to write this\
    \ book (well, that and I didn’t want to learn Objective-C).\n\nAndroid, if allowed\
    \ to flourish by OEMs and carriers, represents the potential for a breakthrough\
    \ we mobile developers have waited for. Please, step up, and take the tools the\
    \ Open Handset Alliance and Google have given us and make something amazing with\
    \ it. We’re counting on you. Good luck.\n\n---\n\n**Copyright**\n\nAndroid Essentials\n\
    \n© 2008 by Chris Haseman"
