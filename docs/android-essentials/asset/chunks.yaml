    你了解 Java；你能编写、阅读并理解它。由于本书关注的是 Android 平台而非语言本身，我会在文中大量内联 Java 代码，并假设你能跟上进度。如果你的
    Java 技能有些生疏，我建议你查阅 Apress 网站上丰富的 Java 资料（[`java.apress.com/`](http://java.apress.com)）。


    熟悉其他移动平台会对你有所帮助。在阅读本书的过程中，我会将 Android 与其他移动软件开发工具包（SDK）进行对比。你完全不必是一名专业的移动开发者也能跟上节奏。


    你需要具备出色的黑客技能。其实也不尽然，但如果你习惯于撸起袖子深入问题核心，那么读这本书时你会感到得心应手。


    我将假设你在 Android 开发方面**毫无经验**。如果你已掌握基础知识，可以跳过第一章，直接关注后面更高级的主题。


    这个要求列表并不长，但其中包含的几点内容能帮助你轻松地阅读本书而不至于抓狂。


    理想情况下，我希望这本书对任何有兴趣为 Android 开发应用的人都能派上用场且富有价值。业余爱好者可以在这里为自己的梦想应用找到基础。移动游戏开发者能找到图形输出和用户输入的核心细节。多媒体和应用开发者能找到构建下一个杀手级应用所需的所有技巧、窍门和核心功能。如果你是一位商界人士，正考虑将现有应用移植到
    Android 平台，你会在这里找到如何实现这一目标的无价信息。简而言之，无论你的目标、经验、时间或兴趣如何，这本书都能为你提供丰富的内容。


    ## 如何最好地利用本书


    简单的答案是阅读它，但这对于不同的人可能意味着不同的方式。如果你是移动开发或 Android 的新手，最好把本书当作教程来读。逐章跟随，直到掌握所有入门所需的基础知识。


    如果你是一位经验丰富的 Java 和移动开发者，但对 Android 不太熟悉，那么你可以在通读第一章了解概况后，把本书更多地当作参考手册来使用。


    在整本书中，我将主要使用真实世界的示例来帮助你熟悉 Android。对于已经是资深 Android 开发者的人来说，本书可能吸引力不大。如我之前所说，我将从零基础开始，假设你对这个
    SDK 毫无经验。本书将从简单的内容开始：闪屏、主菜单和一些简单的多媒体。随后我会深入讲解更高级的概念，如蓝牙、基于位置的服务、后台应用以及 Android
    提供的其他令人兴奋的功能。


    话不多说，现在就开始吧。


    ## 入门指南


    首先需要安装 SDK。就我个人而言，我是在 Mac OS X 上使用 Eclipse 进行开发。所有屏幕截图、IDE 信息、技巧和窍门都将针对 Eclipse
    IDE。Android 开发者似乎考虑到了开源 IDE Eclipse，因为他们发布了简化设置和调试的插件。为简单起见，我使用 Eclipse 和开放手机联盟的
    Android。我并不特别推崇这一组合。不过，我会花一点时间讲解如何下载和配置 Eclipse 以使其与 Android 集成。如果你已经可以运行 SDK，请直接跳到“Android
    项目”部分。此外，你也可以在谷歌的 [SDK 安装页面](http://code.google.com/android/intro/installing.html#installingplugin)找到更详细的安装指南。

    '
- fmt: '# Installing Eclipse


    Again, because Eclipse will be used in the book’s examples, download the full
    version at [http://www.eclipse.org/downloads/](http://www.eclipse.org/downloads).


    Be sure to get the Java EE version. It includes frameworks for a few editors that
    the full Google Eclipse plug-in will use. Install Eclipse; the default configurations
    should work just fine.


    ## Note


    With Windows and with the Mac, it’s a good idea to keep your files and SDK installation
    out of folders that contain spaces. Many tools such as Ant, among others, can
    be confused by spaces in folder names.


    # Getting the Android SDK


    You can find the Android SDK on Google’s website at [http://code.google.com/android/download.html](http://code.google.com/android/download.html).


    Grab it, download it somewhere handy, and then unpack it. I’ve put mine in my
    Development folder at `/Developer/AndroidSDK`. You can just as easily put the
    ZIP file anywhere on your filesystem. Just remember where you’ve stashed it, because
    you’ll need to tell Eclipse where it is later. It’s also a good idea, if you’re
    a Windows or Linux user, to add the location of the Android tools to your `Path`
    variable.


    # Installing the Eclipse Plug-In


    I like graphical user interfaces (GUIs), provided they have hotkeys like the Eclipse
    IDE, when working with Android. To get more than basic functionally out of the
    process, you’ll need to download the Android Developer Tools. To install it from
    within Eclipse, follow the directions outlined by Google at [http://code.google.com/android/intro/installing.html#installingplugin](http://code.google.com/android/intro/installing.html#installingplugin).


    If you’ve already installed the older version of the SDK and the Eclipse plug-in,
    I recommend you go back and update it to M5-RC15 (or the latest version) now using
    the previously mentioned links. Enough has changed between the older version and
    the latest that the changing details could be confusing. If you correctly follow
    the directions but get an error when trying to install the Android editors, go
    back and install the full version of Java EE Eclipse. The basic Java SDK doesn’t
    include all the correct packages used by the Android plug-in.


    Don’t forget to point the Android plug-in to where you unpacked your copy of the
    SDK. It’ll be in `Windows/Preferences/Android` on the Android tab.


    Create a new project by selecting `File` -> `New` -> `Android Project`. Give the
    project and activity a pithy name of your choosing. You’ll also have to insert
    into your source package name at least one dot (`.`), such as `apress.book.sample`
    or `crazy.flyingmonkey.application`.


    Eclipse gives a fairly unhelpful error message if you forget to give it more than
    one name separated by dots. I can personally testify that this can be fairly frustrating
    if your brain is fried and you’re, say, trying to get a book done on a deadline.


    # The Android Project


    So, you’re now the proud owner of your own basic Android application. If this
    isn’t the case, because you skipped the previous section, create a new project
    right now. New projects, by default, have an implementation of “Hello, World.”
    Books and articles that start by explaining “Hello, World” aren’t particularly
    useful in my humble opinion. Consequently, I’m not going to take your time breaking
    down the functionality of the most basic Android application. What is worth taking
    some time to look into, however, are the contents, layout, and files of your new
    project. Let me briefly explain how each file and directory contributes to a functioning
    Android project (see Table 1-1).


    **Table 1-1. Files in a Basic Android Project**


    | FILE NAME | PURPOSE |

    |---|---|

    | `YourActivity.java` | File for your default launch activity; more on this to
    follow. |

    | `R.java` | File containing an ID for all asset constants. |

    | `Android Library/` | Folder containing all Android’s SDK files. |

    | `assets/` | |'
