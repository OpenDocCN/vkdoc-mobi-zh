- fmt: '# Layout Types


    All elements are arranged in a descending column from top to bottom or left to
    right. Each element can have `gravity` and `weight` properties that denote how
    they dynamically grow and shrink to fill space. Elements arrange themselves in
    a row or column notation based on the `android:orientation` parameter. For example
    (see Figure 3-1):


    ```

    <LinearLayout xmlns:android=

    ["http://schemas.android.com/apk/res/android"](http://schemas.android.com/apk/res/android)

    android:orientation="vertical"

    android:layout_width="fill_parent"

    android:layout_height="fill_parent"

    >

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element One"

    />

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Two"

    />

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Three"

    />

    </LinearLayout>

    ```


    **Figure 3-1. Linear layout example**


    `RelativeLayout`


    Each child element is laid out in relation to other child elements. Relationships
    can be established so that children will start themselves where a previous child
    ends. Children can relate only to elements that are listed before them. So, build
    your dependency from the beginning of the XML file to the end. Note that IDs are
    required so that widgets can reference each other. For example (see Figure 3-2):


    ```

    <RelativeLayout xmlns:android=

    ["http://schemas.android.com/apk/res/android"](http://schemas.android.com/apk/res/android)

    android:layout_width="fill_parent"

    android:layout_height="fill_parent"

    >

    <TextView

    android:id="@+id/EL01"

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element One"

    />

    <TextView

    android:id="@+id/EL02"

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Two"

    android:layout_below="@id/EL01"

    />

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Three"

    android:layout_toRight="@id/EL02"

    />

    </RelativeLayout>

    ```


    **Figure 3-2. Relative layout example**


    `AbsoluteLayout`


    Each child must be given a specific location within the bounds of the parent layout
    object. The `AbsoluteLayout` object is probably the easiest to build and visualize
    but the hardest to migrate to a new device or screen size. For example (see Figure
    3-3):


    ```

    <AbsoluteLayout xmlns:android=

    ["http://schemas.android.com/apk/res/android"](http://schemas.android.com/apk/res/android)

    android:layout_width="fill_parent"

    android:layout_height="fill_parent"

    >

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element One"

    />

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Two"

    android:layout_x="30px"

    android:layout_y="30px"

    />

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Three"

    android:layout_x="50px"

    android:layout_y="50px"

    />

    </AbsoluteLayout>

    ```


    **Figure 3-3. Absolute layout example**


    `TableLayout`


    `TableLayout` is a layout object that allows you to specify table rows. Android
    tries to arrange each of the child elements into the correct row and columns.
    For example (see Figure 3-4):


    ```

    <TableLayout xmlns:android=

    ["http://schemas.android.com/apk/res/android"](http://schemas.android.com/apk/res/android)

    android:layout_width="fill_parent"

    android:layout_height="fill_parent">

    <TableRow>

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element One A"

    />

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element One B"

    />

    </TableRow>

    <TableRow>

    <TextView

    android:layout_width="wrap_content"

    android:layout_height="wrap_content"

    android:text="Element Two A"

    />

    </TableRow>

    </TableLayout>

    ```'
