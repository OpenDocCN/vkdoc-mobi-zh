  trans: "\n一个覆盖整个屏幕的白色方块。接下来，你需要增加球精灵的 `x` 和 `y` 值。然后，如果它们漂移出了屏幕边界，你需要将它们复位，最后通过你自己的\
    \ `drawSprite` 调用来绘制它们。代码清单 3-11 展示了该函数的内容。\n\n**Android 精要**\n\n**71**\n\n![](img/index-78_1.png)\n\
    \n**代码清单 3-11. 绘制位图**\n\n```java\nprotected void drawSprint(int x, int y, Canvas\
    \ canvas)\n{\n    canvas.drawBitmap(ball, x, y, lPaint);\n}\n```\n\n目前这个函数只是对\
    \ `drawBitmap` 方法的直接调用。我将这个方法单独提取出来，仅仅是因为在其他上下文中绘制精灵可能需要比这个简单示例更多的功能。最后，回到 `onDraw`\
    \ 函数，只有当你的 `running` 标志为 `true` 时，才调用 `invalidate`。在 View 上调用 `invalidate` 是 Android\
    \ 强制重绘的首选方式。在这里，你将使自身失效，这会调用 `onDraw`，然后整个过程重新开始。如果你在暂停或退出时简单地将 `running` 标志设为\
    \ `false`，并在恢复时再次使其失效，那么动画应该会与其父 Activity 的焦点保持同步。\n\n**添加和控制声音**\n\n由于听觉错觉需要能够打开和关闭两个物体相互碰撞的声音，你需要设置好撞击时播放的音频，然后构建一个让用户开启或关闭该音频的机制。\n\
    \n为了播放音频，将代码清单 3-12 中的代码添加到之前的 `onDraw` 函数中，因为它实际上也是游戏控制循环。当我提到“游戏循环”时，我指的是 `onDraw`\
    \ 末尾的 `invalidate` 调用，它会在 Android 的 UI 事件循环中放置一个重绘请求。请记住，`playSound` 是一个在自定义 View\
    \ 内部声明的布尔变量。\n\n**72**\n\n**Android 精要**\n\n![](img/index-79_1.png)\n\n**代码清单\
    \ 3-12. 播放和重载音频**\n\n```java\nif(playSound && canvas.getBitmapWidth() - x_1 -16\
    \ == x_1 + 16)\n    player.start();\nif(x_1 >= canvas.getBitmapWidth())\n{\n \
    \   x_1 = 0;\n    y_1 = 0;\n    player.stop();\n    player.release();\n    player\
    \ = MediaPlayer.create(ctx, R.raw.bounce);\n}\n```\n\n你可能已经注意到，当两个精灵相距 16 像素时，你开始播放音频。这是为了让音频开始播放而预留的一点缓冲时间。我应该说明，这更多反映了我编辑音频文件能力的不足，而非\
    \ Android 音频加载和播放时效率低下。你还必须确保仅在 `playSound` 布尔值为 `true` 时才播放音频。这个变量是定义自定义 View\
    \ 的那个 `Activity` 类的成员。通过使用这个布尔变量，你可以在屏幕 Activity 中控制自定义 View 类。要开启或关闭音频，你只需在 Activity\
    \ 中实现代码清单 3-13 中的方法。\n\n**代码清单 3-13. 响应按键事件**\n\n```java\npublic boolean onKeyDown(int\
    \ key, KeyEvent kc)\n{\n    if(key == KeyEvent.KEYCODE_DPAD_CENTER)\n    {\n \
    \       playSound = !playSound;\n        return true;\n    }\n    return super.onKeyDown(key,\
    \ kc);\n}\n```\n\n**Android 精要**\n\n**73**\n\n![](img/index-80_1.png)\n\n这段代码看起来应该与你如何关闭第\
    \ 2 章中的恶作剧应用程序类似。\n\n**整合所有内容**\n\n如果你一直紧跟步骤（或者耍了点小聪明，直接下载了完成的项目），你应该能够运行该应用程序并观看这个错觉效果。按下中间的导航键可以开启或关闭音频。关闭音频时，看起来它们会穿过彼此；开启音频时，看起来它们会相互弹开，然后各奔东西。\n\
    \n在这个例子中，我演示了如何创建你自己的 View 子类，如何使用它在屏幕上绘制，如何设置游戏渲染循环，以及如何使用按键事件来控制这个简单的循环。\n\n\
    **使用用户界面**\n\n在本章中，你详细学习了如何使用 Android 的 XML 模式来布局屏幕，以及如何通过一些 Java 代码在运行时与该模式进行交互和修改。\n"
- fmt: "# Next Steps with Android UI and Game Loops\n\nNext, you learned how lay out\
    \ UI widgets and view groups using source code alone. It’s a not-so-practical\
    \ application of Android user interface tools, but it’s important to go through\
    \ for the sake of understanding nonetheless. Last, you explored the essential\
    \ tools for building a game-rendering loop. You added some simple multimedia and\
    \ user control into the mix and created a simple auditory illusion that should\
    \ impress your very nerdy friends.\n\n**Tip**\n\nUsing all that you’ve learned\
    \ in this chapter, build a frame for this illusion that contains some explanatory\
    \ text and a border using XML. When the activity starts up, render the XML but\
    \ insert the custom view into the proper place. For this task, I suggest using\
    \ a `RelativeLayout`, a `TextView` for the explanation, and a `Rectangle` for\
    \ the border.\n\n---\n\n## Chapter 4: Location, Location, Location\n\nIn this\
    \ chapter, we’ll tackle the very trendy subject of location-based services. One\
    \ of Android’s major selling points is its native access to the Google Maps infrastructure.\
    \ Although it is an optional feature, what carrier wouldn’t include this powerful\
    \ package? I suppose that, in the coming year or so, we’ll find out. You’ll delve\
    \ into this subject in two major parts in this chapter. First, you’ll take on\
    \ Android’s `LocationManager` object, which allows you to determine your latitude\
    \ and longitude, ostensibly, using a variety of systems under the hood. Next,\
    \ you’ll get into making the Google Maps API do your bidding. It’s important to\
    \ note that Android’s support for GPS and tower-based location systems is not\
    \ fully implemented. At press time, it’s possible to emulate GPS data either by\
    \ using the default, which is a drive around the Bay Area in California, or by\
    \ building your own fake GPS data. My example will use the first method, but I’ll\
    \ include code that should eventually work with shipping handsets. You can find\
    \ more information about building a custom GPS route and the ins and outs of location-based\
    \ services (LBSs) in the Android documentation at [http://code.google.com/android/toolbox/apis/lbs.html](http://code.google.com/android/toolbox/apis/lbs.html).\n\
    \nBy means of example, you’ll implement an application that retrieves the handset’s\
    \ location from the sample GPS module, starts a `MapActivity` object, centers\
    \ the screen on the location, and then uses an overlay to draw a tack on top of\
    \ it.\n\n### Where Am I?\n\nFor the most part, location-based services with Android\
    \ work exactly as you would expect them to with one minor exception. Android allows\
    \ for developers to specify which location lookup method to use. This allows you\
    \ to customize the power consumption, cost, and accuracy based on the specific\
    \ use you have in mind for your application.\n\n### Building the LocationManager\
    \ Object\n\nThe first task will be to get a handler to the `LocationManager` object,\
    \ the high-level object used to find the handset’s location. The `LocationManager`\
    \ can use any number of `LocationProvider` objects to do the GPS (or tower-based)\
    \ lookup. Here are the relevant class variable declarations and subsequent `buildGPS`\
    \ method that will prime the pump for later location retrieval:\n\n```java\nPoint\
    \ m_curLocation;\nLocationProvider m_locationProvider;\nLocationManager m_locationMgr;\n\
    \nprivate void buildGPS()\n{\n    List<LocationProvider> providorList = null;\n\
    \    Criteria c = new Criteria();\n    c.setAccuracy(50);\n    c.setAltitudeRequired(false);\n\
    \    c.setCostAllowed(false);\n    c.setSpeedRequired(false);\n    //Following\
    \ line is commented out because it drops\n    //android into an infinite loop.\n\
    \    //c.setPowerRequirement(c.POWER_LOW);\n    m_locationMgr =\n        (LocationManager)\n\
    \        getSystemService(LOCATION_SERVICE);\n    m_locationProvider = m_locationMgr.getBestProvider(c);\n\
    \    if(m_locationProvider != null)\n        return;\n    providorList = m_locationMgr.getProviders();\n\
    \    if(providorList.size() > 0)\n        m_locationProvider = providorList.get(0);\n\
    }\n```\n\nYou’ll notice that you can’t simply instantiate a new `LocationManager`."
