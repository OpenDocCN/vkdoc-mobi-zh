  trans: "\n# Android 开发核心要素\n\n## 启动画面计时\n\n烦人的应用程序，所以你需要进入主菜单。你将使用一个简单内联定义的线程来完成计时。在线程之前初始化了几个常量，我已经包含在内。为了完整性，我包含了`onCreate`方法的全部内容。代码清单\
    \ 2-1 展示了我的带计时线程的代码。\n\n***代码清单 2-1. 为启动画面计时***\n\n```java\nlong m_dwSplashTime\
    \ = 3000;\nboolean m_bPaused = false;\n```\n\n**Android 开发核心要素**\n\n![图](img/index-19_1.png)\n\
    \n```java\nboolean m_bSplashActive = true;\n\npublic void onCreate(Bundle icicle)\n\
    {\n    super.onCreate(icicle);\n    // 绘制启动画面\n    setContentView(R.layout.splash);\n\
    \n    // 非常简单的计时器线程\n    Thread splashTimer = new Thread()\n    {\n        public\
    \ void run()\n        {\n            try\n            {\n                // 等待循环\n\
    \                long ms = 0;\n                while(m_bSplashActive && ms < m_dwSplashTime)\n\
    \                {\n                    sleep(100);\n                    // 仅当程序运行时推进计时器\n\
    \                    if(!m_bPaused)\n                        ms += 100;\n    \
    \            }\n                // 前进到下一个屏幕\n                startActivity(new\
    \ Intent(\n                    \"com.google.app.splashy.CLEARSPLASH\"));\n   \
    \         }\n            catch(Exception e)\n            {\n                Log.e(\"\
    Splash\", e.toString());\n            }\n            finally\n            {\n\
    \                finish();\n            }\n        }\n    };\n    splashTimer.start();\n\
    }\n```\n\n**Android 开发核心要素**\n\n**13**\n\n![图](img/index-20_1.png)\n\n终于要进入 Java\
    \ 代码部分了。这个简单线程将运行直到时间计数器超过`m_dwSplashTime`。虽然还有其他实现计时器的方法，但我喜欢这个方法的两个原因：它可以被暂停。计时器仅当`m_bPaused`标志为`false`时才会推进。正如你稍后将看到的，如果你的活动的`onPause`方法被调用，挂起计时器很容易。这对启动画面来说并不总是必需的，但对于其他基于定时的操作却很重要。\n\
    \n移动到下一个屏幕就像将`m_bSplashActive`标志设置为`false`一样简单。如果按这种方式实现，前进到下一个屏幕不需要先移动再取消更传统的计时器。\n\
    \n有了这段代码，你应该会看到启动画面持续你以毫秒为单位设置的`m_dwSplashTime`时间。当时间到了或者用户通过按键中断启动画面时，`startActivity`将被调用（我稍后会解释）。这个函数会将用户移动到下一个章节中将成为主菜单的界面。`finish`会关闭启动活动，这样用户从主菜单按返回键时就不会回到它。你需要实现一个接受`CLEARSPLASH`意图动作的活动。同时，让我们回顾一些你想要重写的其他重要活动方法。\n\
    \n## 暂停、恢复、冲洗、重复\n\n当你的活动被来电、短信或其他中断挂起时，暂停启动计时器非常简单，如下所示：\n\n```java\nprotected\
    \ void onPause()\n{\n    super.onPause();\n    m_bPaused = true;\n}\n```\n\n**Android\
    \ 开发核心要素**\n\n**14**\n\n![图](img/index-21_1.png)\n\n与大多数这些重写的方法一样，你需要在做其他任何事情之前调用超类。如果你回顾计时器线程，你会看到负责跟踪经过时间的`ms`计数器在`m_bPaused`为`true`时不会推进。此时，我相信你已经能猜到`onResume`会是什么样子：\n\
    \n```java\nprotected void onResume()\n{\n    super.onResume();\n    m_bPaused\
    \ = false;\n}\n```\n\n这里毫无意外。当你的应用程序恢复时，计时器线程将恢复向`ms`计数器添加时间。\n\n## 基本按键处理\n\n\
    活动中的按键处理通过重写`onKeyDown`方法来实现。我们将使用这个函数允许用户取消你初生的启动画面。正如你在本节开头计时器线程中看到的，你已经通过`m_bSplashActive`变量在计时器循环中设置了一个退出条件。为了退出，你只需重写`onKeyDown`方法，将启动标志设置为`false`。以下是需要添加的代码：\n\
    \n```java\npublic boolean onKeyDown(int keyCode, KeyEvent event)\n{\n    // 如果按下任何键，清除启动画面\n\
    \    super.onKeyDown(keyCode, event);\n    m_bSplashActive = false;\n    return\
    \ true;\n}\n```\n"
- fmt: "### **Android Essentials**\n\n**15**\n\n![index-22_1.png](index-22_1.png)\n\
    \n#### **ADDITIONAL EXERCISES**\n\nIf you want to make this a fully functional\
    \ splash screen, you’ll need to add two elements. This gives me a great excuse\
    \ to assign you some homework. Try to add two bits of functionality:\n\n- Allow\
    \ the user to skip the splash screen only when clicking the OK or center key.\n\
    - Make the Back key exit the application rather than putting it in the background.\n\
    \nAs a hint, you’ll want to look up the key-code mapping in the Android SDK documentation\
    \ to accomplish these tasks.\n\n#### **Clear Intent**\n\nThere’s one more thing\
    \ you’ll need to do before you’re done with the splash screen. I’m sure you’re\
    \ wondering about that `startActivity` method call earlier. This means it’s time\
    \ to talk briefly, in this limited context, about the intent. An *intent* is an\
    \ object that functions as a communication event between two or more activities,\
    \ content handlers, intent receivers, or services. In this case, you will call\
    \ `startActivity` with the intent `com.google.app.splashy.CLEARSPLASH`. When `startActivity`\
    \ is called, Android searches all its manifests for the node that has registered\
    \ for the aforementioned `CLEARSPLASH` intent action. It just so happens that\
    \ you’ll add your own activity called `MainMenu` that will register for just such\
    \ an intent.\n\nTo create what will become the main menu activity, add a new class\
    \ to your existing source package called `MainMenu`. Next, make sure it extends\
    \ the `Activity` class, implements `onCreate`, and calls `setContentView` on `R.layout.main`.\
    \ At this point, you’ll want to open `AndroidManifest.xml` and add a new activity\
    \ element to it. After the\n\n**16**\n\n**Android Essentials**\n\n![index-23_1.png](index-23_1.png)\n\
    \n`</activity>` closing tag of the splash screen, you should insert the following:\n\
    \n```xml\n<activity android:name=\".MainMenu\"\n          android:label=\"@string/app_name\"\
    >\n    <intent-filter>\n        <action android:name=\"com.google.app.splashy.CLEARSPLASH\"\
    />\n        <category android:name=\"android.intent.category.DEFAULT\"/>\n   \
    \ </intent-filter>\n</activity>\n```\n\nDefine the activity’s name as `.MainMenu`.\
    \ This will tell Android which Java class to load and run. Register, within the\
    \ `intent-filter` tag, for the `com.apress.splash.CLEARSPLASH` intent action.\
    \ In reality, the name of the intent could be `beef.funkporium.swizzle`, and as\
    \ long as the name is consistent between the `startActivity` call and the snippet\
    \ of the Android manifest listed earlier, all the right things should continue\
    \ to happen.\n\n#### **Running It**\n\nRunning your application at this point\
    \ should result, if you’ve paid attention thus far, in your splash screen being\
    \ drawn for a few seconds, followed by your new main menu activity taking focus.\
    \ It should also be impossible to get back to the splash screen once your application\
    \ has advanced to the main menu. If you’re having trouble, make sure your new\
    \ main menu is listed in the manifest and in `R.java`. Also, make sure you’re\
    \ drawing the correct layout file within your new intent.\n\n#### **The Life Cycle\
    \ of an Activity**\n\nThe life cycle of an activity is covered extensively in\
    \ the Google documentation. However, if I’m reviewing the nuts and bolts of what\
    \ makes an activity, I cannot pass by this important information. At this point,\
    \ with your splash screen, you should be ready to roll.\n\n**Android Essentials**\n\
    \n**17**\n\n![index-24_1.png](index-24_1.png)\n\nFor explanation’s sake, I’ve\
    \ also added the following functions to the splash screen activity:\n\n```java\n\
    protected void onStop()\n{\n    super.onStop();\n}\n\nprotected void onDestroy()\n\
    {\n    super.onDestroy();\n}\n```\n\nIf you place breakpoints in all the functions\
    \ within your new splash activity and run it in debug mode, you’ll see the breakpoints\
    \ hit in the following order:\n\n1. `onCreate`\n2. `onStart`\n3. `onResume`\n\
    4. At this point, your activity is now running. Three seconds in, the timer thread\
    \ will reach its end and call `startActivity` with the splash clearing intent.\
    \ Next, it will call `finish`, which tells Android to shut down the splash screen\
    \ activity.\n5. `onPause`\n6. `onStop`\n7. `onDestroy`\n\nThis is the general\
    \ life cycle of an activity from start to finish. You can find a much more comprehensive\
    \ exposé on the life and times of an Android activity in Google’s documentation\
    \ at [http://code.google.com/android/reference/android/app/Activity.html](http://code.google.com/android/reference/android/app/Activity.html).\
    \ You’ll even find a spiffy graph. In essence, the handset uses a combination\
    \ of the previous functions to alert you to the major events that can occur in\
    \ your application: starting, closing, suspending, and resuming. Activities, as\
    \ I’ve\n\n**18**\n\n**Android Essentials**\n\n![index-25_1.png](index-25_1.png)\n\
    \ncovered before, are going to be the core building block of any traditional application;\
    \ they give you control over the screen and the ability to receive user inputs.\
    \ You’ll get more into user interaction in later chapters.\n\n#### **Thus Far**\n\
    \nSo far I’ve explored how activities are integrated within the phone, how they\
    \ are started and stopped, and how they communicate on a basic level. I’ve demonstrated\
    \ how to display a simple XML view screen and how to switch between two actives\
    \ both in reaction to a key event and at the end of a set amount of time. In the\
    \ short-term, you’ll need to learn more about how Android uses intents, intent\
    \ receivers, and intent filters to communicate. To do this, you’ll need another\
    \ sample application.\n\n### **Creating the Intent Receiver**\n\nAn *intent receiver*\
    \ is one of the few things in Android that does exactly what its name implies.\
    \ Its role is to hang around waiting for registered intent actions, Android’s\
    \ version of BREW-style notifications. I’ll use a somewhat less production-worthy\
    \ application to demonstrate one of the trickier tasks of an intent receiver:\
    \ receiving and reacting to incoming text messages.\n\n#### **Setting It Up**\n\
    \nLet me paint you a picture. You’ve returned to your desk one afternoon to discover\
    \ that you’ve fallen victim to a Hello Kitty attack. Your office desk is covered,\
    \ from carpet to ceiling, with cute pink images of the most annoying icon known\
    \ to humankind. You know who’s done it, and it’s payback time. You also know that\
    \ your VP of engineering hates a particular song with a fiery passion matched\
    \ by nothing else. That song is “La Bamba.” You decide to get even by rigging\
    \ your co-worker’s Android phone with a sleeper application. I’ll show you how\
    \ to make an Android application that will respond to a specific SMS message by\
    \ playing an\n\n**Android Essentials**\n\n**19**\n\n![index-26_1.png](index-26_1.png)\n\
    \naudio file for maximum humiliation effect. This will make your newfound enemy\
    \ the subject of intense anger from your VP. At the same time, you’ll want your\
    \ victim to know he’s been had…and give him a chance to shut the sound off. This\
    \ prank application requires an intent receiver, an activity, a service, and the\
    \ means for all three to communicate. Imagine your co-worker’s surprise when his\
    \ phone starts spouting the very song your VP of engineering hates most in the\
    \ world.\n\n##### **What Practical Use Could This Possibly Have?**\n\nThis is\
    \ an excellent question. Although on the surface this may not seem to be the most\
    \ practical of applications, I’m sure, with a little imagination, you can come\
    \ up with a variety of important realistic uses for this little prank application,\
    \ from push e-mail notifications to interphone application communication. Besides,\
    \ things have been far too serious thus far. You’ll move forward in four stages.\
    \ In each phase, you’ll learn more about intent receivers, services, and the interactions\
    \ between all these application pieces:\n\n- Being notified on arrival of an SMS\n\
    - Opening the contents of an SMS and looking for a specific payload\n- Starting\
    \ an activity when the SMS arrives and being aware that the startup has occurred\
    \ at the behest of the intent receiver\n- Starting a new service that will play\
    \ an audio file\n\n##### **Using Intent Receivers**"
