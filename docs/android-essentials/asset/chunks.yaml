- fmt: "# Getting Under the Hood\n\nYou’ll now tinker under the hood and kick the\
    \ tires of Android’s widgets. You’ll take a basic look at some of the core pieces,\
    \ many of which you’ve explored in XML form. As in previous examples, for the\
    \ sake of explanation, I’ll keep it basic. It should be easy to apply what I’ve\
    \ discussed here to the more complicated aspects of UI layout. In later, more\
    \ advanced examples, you’ll get more into other Android widgets.\n\nWhen you see\
    \ the amount of code I’ve written to produce even a small selectable menu, you’ll\
    \ probably be, like I was, somewhat aghast. After getting the hang of screen layout\
    \ in XML, trying to do it all by hand in Java will feel like playing classical\
    \ music on the piano with a pair of scuffed-up bowling balls. Be warned—it involves\
    \ a lot of typing and probably more than a little frustration.\n\nOn the other\
    \ hand, there may be some specific elements of a UI layout you want to adjust\
    \ dynamically at runtime. Since, as I’ve mentioned earlier, you cannot edit the\
    \ layout XML files when the application is run, it’s essential to have the tools\
    \ required to modify every possible piece of the user interface in code at runtime.\
    \ Android gives you that power, provided you’re comfortable typing at blazing\
    \ speeds.\n\nIn the following example, I’ve taken pains to make sure you use little\
    \ to none of the XML elements you relied on previously. It should give you a chance\
    \ to get a good handle on non-XML layout, but keep in mind, practically, you’d\
    \ have to be crazy to do all your user interface screens this way.\n\n## The Main\
    \ Menu\n\nNearly all mobile applications, at least at the time of publication,\
    \ begin with a graphical main menu. This graphical screen directs users to the\
    \ various functionality of the mobile application. Because the concept of a \"\
    main menu\" is so universal to the mobile application experience, it makes for\
    \ an excellent and practical case study. Your objective, in this example, is to\
    \ put together a simple and functional main menu. For the sake of comparison,\
    \ you’ll use another linear layout to put everything together. The example will\
    \ be built in three major stages:\n\n1. **Layout**: You’ll arrange all the entries\
    \ of your main menu correctly on the screen. Granted, this will use only a fraction\
    \ of Android’s massive screen real estate. But most application menus will use\
    \ large graphics and take up significantly more space.\n2. **Focus**: You’ll need\
    \ to set up a focus structure so that users can move through the elements. As\
    \ the focus shifts, you’ll have to adjust the colors of each menu element.\n3.\
    \ **Select events**: Finally, you’ll need to set up a listener so that when an\
    \ element is selected or clicked, you’re informed and can take the appropriate\
    \ action based on the item selected.\n\nWhen you’ve finished all three of these\
    \ tasks, you should have the framework to build the primary entry screen of about\
    \ 80 percent of all mobile applications. Although not entirely practical (being\
    \ that I’ve used exactly zero XML), it is an excellent demonstration of how to\
    \ get things done in a custom runtime-driven way. As you add more functionality\
    \ to your \"socially awkward\" application, you’ll fill out this main menu more\
    \ completely.\n\n### Laying Out, Java-Style\n\nThe first step in the simple main\
    \ menu is getting all your menu elements on the screen. As I mentioned earlier,\
    \ you’ll be using a linear layout to accomplish it. You’ll need to do all this\
    \ before the application draws for the first time, so it’ll have to be in the\
    \ `onCreate` method of the new `MainMenu` activity. (Refer to Chapter 1 if you’ve\
    \ lost track of how to create and plug in a new activity.) Code Listing 3-2 shows\
    \ what its instantiation and configuration looks like.\n\n**Code Listing 3-2.\
    \ Creating a Layout Object in the `onCreate` Method**\n\n```\nLinearLayout layout\
    \ = new LinearLayout(this);\nlayout.setBackground(R.drawable.general_bg);\nlayout.setOrientation(LinearLayout.VERTICAL);\n\
    layout.setLayoutParams(\n    new LayoutParams(LayoutParams.FILL_PARENT,\n    \
    \                 LayoutParams.FILL_PARENT));\nsetContentView(layout);\n```\n\n\
    After what you’ve been through thus far, this, conceptually, should seem familiar.\
    \ You’ll set the background using an image in the `/res/drawable/` folder, set\
    \ the linear layout orientation to vertical, and set the `LayoutParams` to fill\
    \ the parent. (The parent, in this case, is the activity, which controls the full\
    \ screen.) Layout parameters, at their base, must define the height and width\
    \ of a given widget. As you’ll probably find out later, trying to place a widget\
    \ into a `ViewGroup` before its layout parameters are set will throw an exception.\
    \ However, now that you have a layout object to fill, you can start building out\
    \ the screen.\n\n### Adding a Title\n\nNext, add a simple title, which will be\
    \ centered, at the top of your main menu screen. Code Listing 3-3 shows the block\
    \ of code you’ll need for it.\n\n**Code Listing 3-3. Adding the Title**\n\n```\n\
    TextView title = new TextView(this);\ntitle.setText(R.string.man_menu_title);\n\
    title.setLayoutParams(\n    new LinearLayout.LayoutParams(\n        LinearLayout.LayoutParams.FILL_PARENT,\n\
    \        LayoutParams.WRAP_CONTENT));\ntitle.setAlignment(Alignment.ALIGN_CENTER);\n\
    layout.addView(title);\n```\n\nCreate the text object, and set the text from the\
    \ `/res/values/strings.xml`. I know I said I wouldn’t use any XML, but I’m afraid\
    \ I may have fibbed about that bit. In production, you’ll want to move all your\
    \ strings to this location rather than defining them in code. If your clients\
    \ are like mine, you won’t want to pull out your source editor and recompile every\
    \ time they want to change the wording on one of the screens.\n\nNow that you\
    \ have a title, it’s time to add the more interesting and active menu elements.\n\
    \n### Laying Out Menu Entries\n\nNow you’ll add the individual menu elements.\
    \ Because this is going to be fairly repetitive after the first one, I’ll insert\
    \ and explain the first element but leave you to your own devices for the rest.\
    \ Feel free to grab the full project at the Apress site to see the rest of the\
    \ menu items. Again, you’ll fill in more of them as you progress through the rest\
    \ of the Android essentials. Code Listing 3-4 shows the code to add an individual\
    \ menu item.\n\n**Code Listing 3-4. Adding a Menu Item**\n\n```\nTextView ItemOne\
    \ = new TextView(this);\nItemOne.setFocusable(true);\nItemOne.setText(\"Login\
    \ Screen\");\nItemOne.setTextColor(Color.WHITE);\nItemOne.setLayoutParams(\n \
    \   new LinearLayout.LayoutParams(\n        LinearLayout.LayoutParams.FILL_PARENT,\n\
    \        LayoutParams.WRAP_CONTENT));\n\n//Give the menu item an ID for tracking\
    \ reasons.\n//The ID is a static int defined locally to the class\nItemOne.setId(IdOne);\n\
    \n//Add it to our linear layout\nlayout.addView(ItemOne);\n```\n\nGosh, you probably\
    \ think after reading the code carefully, this looks almost like the title you’ve\
    \ already added. You’re exactly right, how clever of you. The heavy lifting of\
    \ denoting when an object is in focus and when it’s been selected has yet to come,\
    \ so don’t get too cocky yet. Here are the two differences between the previous\
    \ menu item and previously listed title text:\n\n- You need to tell the `TextView`\
    \ that it can accept focus by calling the `setFocusable` method.\n- The menu listing\
    \ item will need an ID so you can distinguish it from the rest of the menu elements\
    \ in your selection handler.\n\nAs I mentioned briefly, whenever adding a widget\
    \ to a `ViewGroup`, the `LayoutParams` object must specifically be the object\
    \ defined within that view group. For example, in the previous `setLayoutParams`\
    \ method call, you must pass in a `LinearLayout.LayoutParams` object. You must\
    \ pass in the correct subclassed layout parameter, or Android will throw an exception\
    \ at you during runtime."
