    \ Android 在启动你的应用程序时应该激活哪个 Activity。\n\n这就是最简形式的清单文件的所有内容。为了节省篇幅，我尽量不再重复写出整个清单文件。如果后续插入新元素时你需要回顾上下文，请折起本页，以便随时查阅。\n\
