    \n现在您已将 GPS 输出转换为 Map 的 `Point`，您可以将屏幕上的地图移动到以该点为中心。您可以通过地图控制器调用 `animateTo` 来实现这一点。\n\
    \n本节的最后一步是当用户按下中心键时启动位置循环。到现在，您应该已经是这方面的专家了；事实上，我敢打赌您已经很擅长了，我甚至不需要解释下面的代码：\n\n\
    ```java\npublic boolean onKeyDown(int KeyCode, KeyEvent evt)\n{\n    super.onKeyDown(KeyCode,\
    \ evt);\n    switch(KeyCode)\n    {\n        case KeyEvent.KEYCODE_DPAD_CENTER:\n\
    \            if(!m_locationLoopActive)\n            {\n                m_locationLoopActive\
    \ = true;\n                startLocationThread();\n            }\n           \
    \ return true;\n            break;\n    }\n    return false;\n}\n```\n\n## 阶段性总结\n\
    \n如果您一直按此操作，当您按下中心键时，应该会看到地图移动到旧金山湾区的某个位置。此外，随着时间的推移，地图将随着模拟手机的运动而平行移动。恭喜您——如果您的应用程序运行在真实的手机上，您将低头看到自己的头顶……打个比方。\n\
    \n如果您作弊并下载了示例代码，那么您的聪明才智得 5 分，但因为缺乏创造力要扣 20 分。作弊者会注意到，在手机当前所在位置（如果您没有通过点击鼠标移动地图，则为屏幕中心）会绘制一个蓝色的图钉。这个蓝色的、黏糊糊的东西，除了证明我糟糕的\
    \ Photoshop 技能之外，还是 Google 地图示例的最后一部分。显示地图的一半乐趣在于在地图上标记东西。因为这个例子，以及本书的书名是《Android\
    \ 基础》而不是《我来为你写手机应用，好吗？》，所以它会直截了当且简单。您将在当前用户的位置上绘制一个图钉叠加层。\n\n## 是鸟，是飞机……不，是糟糕的\
    \ Photoshop\n\n正确地渲染一个叠加层比你最初想象的要复杂一些。它需要两个主要组件：`OverlayController` 对象和扩展的 `Overlay`\
    \ 对象。叠加控制器管理每个叠加层，并确保在 `MapView` 重绘自身后调用其 `draw` 函数。如果您还记得，我在这里插入一下，因为您可能不想回头翻，您必须在\
    \ `onCreate` 方法中创建一个叠加控制器。代码如下：\n\n```java\nm_overlayController = m_mapView.createOverlayController();\n\
    ```\n\n每个可绘制的 `Overlay` 都必须添加到 `OverlayController` 中。同样，这是您在之前的示例中使用的代码行：\n\n\
    ```java\nm_overlayController.add(new TackOverlay(this), true);\n```\n\n`TackOverlay`\
    \ 是 `Overlay` 对象的一个扩展。任何时候您想绘制自己的“图钉”，都必须扩展 `Overlay` 对象。当然，只要有一点高效的创造性编程，一个自定义的\
    \ `Overlay` 对象就能绘制所有叠加层。出于本示例的目的，您将扩展 `Overlay` 对象并添加必需的 `draw` 方法。`draw` 方法将在地图重绘自身后被调用。以下是\
    \ `TackOverlay` 的声明、类变量和构造函数；您将在 `MapActivity` 内部内联声明它，以便它可以访问您 `MapActivity`\
    \ 的变量和函数：\n\n```java\nclass TackOverlay extends Overlay\n{\n    MapExampleActivity\
    \ ctx;\n    Bitmap tack;\n\n    TackOverlay(MapExampleActivity c)\n    {\n   \
    \     super();\n        BitmapDrawable b = (BitmapDrawable)\n            c.getResources().\n\
    \            getDrawable(R.drawable.tack);\n        tack = b.getBitmap();\n  \
    \  }\n```\n\n正如您所见，`TackOverlay` 看起来就像任何其他 Android 对象扩展一样。使用上下文指针，您将保存图钉位图资源，这样在绘制时就不必每次都加载它。当您深入研究\
    \ `draw` 方法时，代码会变得更有趣一些。\n\n```java\npublic void draw(Canvas canvas, PixelCalculator\
    \ calculator,\n                 boolean shadow)\n{\n    super.draw(canvas, calculator,\
    \ shadow);\n    int xy[] = new int[2];\n    try{\n        // 将中心点转换为 XY 坐标。\n\
    \        // 我们可以硬编码这个，\n        // 但那样有什么乐趣呢？\n        if(m_curLocation == null)\n\
    \            return;\n        calculator.getPointXY(m_curLocation, xy);\n    \
    \    int tackX = xy[0] - (tack.getWidth()/2);\n        int tackY = xy[1] - (tack.getHeight());\n\
    \        canvas.drawBitmap(tack, tackX, tackY, new Paint());\n    }\n    catch\
    \ (Exception e)\n    {\n        Log.e(\"Crap!\");\n    }\n}\n```\n\n前面的代码中没有什么令人费解的地方。唯一需要记住的技巧是，您需要将存储在\
    \ `m_curLocation` Point 对象中的经纬度坐标转换成屏幕上的 XY 坐标。为此，`Overlay` 对象会随着 `draw` 方法传入一个\
    \ `PixelCalculator` 对象。这个对象负责提供与经纬度位置相对应的 XY 坐标。因为 `TackOverlay` 对象是在 `MapExampleActivity`\
    \ 内部内联定义的，所以它可以访问 `m_curLocation` 点变量。您将把这个点转换为 XY 位置。因为图钉状物体的点位于图像的底部和中间，所以您必须将它向上移动图钉资源的高度，并向左移动一半宽度。这应该会使图钉的尖端与计算出的\
    \ XY 位置对齐。\n\n同样值得注意的是 `shadow` 布尔值的存在，尽管我尚未实现它。它会告诉您的叠加层是否应该绘制阴影。忽略它或不忽略它，由您决定。\n\
    \n至此，您已经完成了这个示例。您现在可以在手机 GPS 位置的地图上绘制一个有些变形的图钉。当然，您绘制的是一个伪造的模拟 GPS 位置，但您新的前沿 LBS\
    \ 应用总得有个起点。\n\n## 结束语"
- fmt: "# 排版后内容\n\nMy goal in this chapter was not to provide a soup-to-nuts explanation\
    \ of all that's available in Google Maps for Android. My hope was to provide you\
    \ with a framework that will let you explore all those things on your own. I covered\
    \ how to get the handset's location from the `LocationManager` and how to take\
    \ those values and convert them into a Google Maps location.\n\nThen, I covered\
    \ how to start up a `MapActivity` and draw a map onscreen. Last, you learned how\
    \ to animate the map around the country and how to draw an overlay, or tack object.\n\
    \nThis should give you a solid foundation for what you might want to do next.\
    \ I recommend exploring the searching capabilities, drawing multiple overlays,\
    \ and installing the Google map view inside a frame (possibly with explanations,\
    \ graphics, or control indicators).\n\n**Android Essentials**\n\n**87**\n\n![](index-95_1.png)\n\
    \n## Chapter 5: Taking Android Out for a Walk\n\nIn this chapter, you'll move\
    \ past the basics, loosen the leash, and let Android stretch its legs a little\
    \ bit. More and more as the mobile software field progresses, it's become less\
    \ and less possible to make an application that doesn't rely heavily on the Web.\
    \ In many ways, fully featured Internet access has become one of the essentials\
    \ in the mobile world. The depth and breadth of Android's network layer makes\
    \ it impossible to cram into one small chapter of one small book. With this in\
    \ mind, I'll try to, as I have before, arm you with the basics you'll need to\
    \ make production-level applications. Along the way, as in previous examples,\
    \ you'll explore a few tangential pieces of Android's technology.\n\nStarting\
    \ with the essentials, you'll learn how to use a simple HTTP connection to download,\
    \ parse, and list the elements of a remote XML file. These elements, in your sample\
    \ application, will be Internet radio stations contained in a basic XML file.\
    \ Indeed, your entire sample application will be focused on building a simple\
    \ Internet radio player. Sadly, the state of Android's streaming audio does not\
    \ live up to its documentation. So, this chapter will be more of an exercise and\
    \ less of a fully functioning application.\n\n### Loading a List from the Web\n\
    \nTo make your snazzy example application, you'll have to fetch, parse, and display\
    \ a simple list of radio stations. Doing this will require me to cover a range\
    \ of subjects from HTTP transactions to `ListView`s. Pulling down a list down\
    \ from the Web and displaying them onscreen is something I find myself, as an\
    \ engineer on many mobile projects, doing nearly constantly. From pulling down\
    \ a \"friends list\" on a social network to a \"high score list\" from an online\
    \ game element, there's something universal about downloading, parsing, and displaying\
    \ a list.\n\n**Android Essentials**\n\n**89**\n\n![](index-96_1.png)\n\nAlthough\
    \ I realize you might not be making a streaming music application anytime soon,\
    \ this example is general enough that it should serve as a guide for both basic\
    \ network operations and handling selection menus. Also of note is that you're\
    \ performing almost the same task you did with the custom widget work back in\
    \ Chapter 3. Frankly, I'm not sure this method is a whole lot easier, but perhaps\
    \ that's because I'm using it in a fairly rudimentary way and have missed some\
    \ of the more complicated bits it would help with. In any case, enough gabbing—let's\
    \ get into the basics of network connectivity.\n\n### First Things...First?\n\n\
    Your first task will be to pull the XML file off the server. I've made a simple\
    \ XML example file (which, in your final application, would be provided by a PHP\
    \ script or a Java servlet) and hosted it on my web site. Before we get any further,\
    \ I'll list a few variable declarations you're going to need later. Both for network\
    \ connectivity and for our eventual selectable list, Code Listing 5-1 shows the\
    \ class declaration and variable dump.\n\n***Code Listing 5-1. Essential Class\
    \ Variables***\n\n```\npublic class StationPicker extends Activity {\n    //Uncomment\
    \ the next lines after we've\n    //defined the StationData class\n```"
