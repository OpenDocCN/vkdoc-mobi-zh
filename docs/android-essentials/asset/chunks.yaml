    **Chapter 6: Tying on a Bow**


    It’s almost time to stop reading and start writing your Android application.


    Before I let you go, I’ll quickly run through where you went and how you got there.


    **The Making of an Application**


    My first task was to cover the basic building blocks of an Android


    application. I also had to cover creating a new project and the logistics of building
    and running it. As I discussed, an application consists of a series of activities,
    intent receivers, services, and content resolvers. I used a splash screen implementation
    to demonstrate activities, an SMS-triggered prank application to explore intent
    receivers and services, and finally some simple bookmaking code to get into content
    resolvers.


    Thankfully, Android provides a series of clear and simple building blocks with
    which to create your application. Activities form the backbone of any Android
    app, with intents and intent receivers acting as the communication officers. Services
    and content resolvers cater to very specific needs such as background processes
    and formatted data transmission. Put all these pieces together, and you’re left
    with a robust system for quickly turning around mobile applications.


    **Looks Aren’t Everything, Except, of Course, When They Are**


    Once you’ve developed a working application platform, you can make it


    look like something users might be interested in actually paying for, or not,
    as you choose. You can build a UI in Android in two general ways. You


    can use the built-in widgets or views in combination with view groups to create
    a tiered hierarchy of UI elements. Or, you can toss these custom-built tools aside
    and do it yourself using nothing but a canvas and some simple line, circle, and
    bitmap image-rendering tools. Android provides an **Android Essentials**


