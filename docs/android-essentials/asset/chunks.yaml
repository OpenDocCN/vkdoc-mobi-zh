    widgets. But how useful is a text-entry field if you can’t ingest what your users
    have entered? That’s a rhetorical question; don’t answer it—I won’t be able to
    hear you (I hope). The answer is obvious: text entry with no purpose or result
    is not useful at all. To access the contents of the `EditText` widgets you defined
    earlier, you’ll have to do two things:


    1. Get an object handle to the widget you defined in the XML.


