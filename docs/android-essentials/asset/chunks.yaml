- fmt: 'This will keep the menu elements from changing size element by element, which,
    I think you can agree, looks pretty horrendous. Setting a list view layout width
    or height to `wrap_content` causes it to wrap each menu item individually. Go
    figure.


    ## Dressing Up the Menu


    There is one more major change you can make to the menu that will give you a little
    more control over rendering it.


    Android allows you, when defining the UI elements for the adapter, to specify
    a large menu item object and then point to a `TextView` inside that you’d like
    edited. Before, you would point to a single, predefined `TextView`. Code Listing
    5-11 shows what your new list element layout file will look like.


    ***Code Listing 5-11\. The New and Improved `list_element.xml`***


    ```xml

    <?xml version="1.0" encoding="utf-8"?>


    <LinearLayout xmlns:android=

    ["http://schemas.android.com/apk/res/android"](http://schemas.android.com/apk/res/android)

    android:orientation="vertical"

    android:layout_width="fill_parent"

    android:layout_height="22dip”

    android:background="@drawable/listbg"

    >


    <TextView android:id="@+id/textElement"

    xmlns:android=

    ["http://schemas.android.com/apk/res/android"](http://schemas.android.com/apk/res/android)

    android:layout_width="fill_parent"

    android:layout_height="fill_parent"

    android:textAlign="center"

    />


    </LinearLayout>

    ```


    In this code, you’ve added a linear layout with some specific dimensions. You’ve
    also given it the background `listbg.png`. Interestingly enough, Android will
    rescale your background image to fit the space of the calculated background size.
    You may wonder, if you’ve done your homework, why you’re using a linear layout
    instead of just adding a background and dimensions to the previous text view.
    You’re doing this simply for demonstrative reasons. I want you, when you make
