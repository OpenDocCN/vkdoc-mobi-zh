    to it in just a minute. Last, you set the zoom level to something that will let
    you see highways and cites. You’ll also need to set up the GPS


    variables that were covered and listed in the previous section. After all that,
    you can finally set the MapView as the activeContent view.


    **Note** A


    MapActivity can contain more than just a MapView object.


    You can define it and other widgets by hand or through XML, as discussed in Chapter
    3\. For the most part, the MapActivity is exactly like an


    Activity class…aside from its extra resource and thread handling for the MapView
    object.


    If you run your MapActivity as it stands thus far, you’ll see Google Maps start
    up and center you somewhere in Tulsa, Oklahoma. You’ll need to


    refer to the Android engineers for why it happens that way; I’m frankly at a loss
    for why you’d want to start your map there, but maybe I just haven’t spent enough
    time in Tulsa.


    **Moving the Map**


    Let’s look at the code that will move the map to the appropriate location. If
    you remember your location lookup loop (say that five times fast!), you’ll remember
    the method call:


    **82**


    **Android Essentials**


    ![](index-89_1.png)


    "setMapLocationCenter(


    here.getLatitude(), here.getLongitude());"


    Since this is the next step in the application, let’s take a look at the contents
    of this simple method:


    **public void** setMapLocationCenter(**double** lat, **double** lon)


    {


    m_curLocation = **new** Point((**int**)(lat * 1E6),


    (**int**) (lon * 1E6));


    m_mapController.animateTo(m_curLocation);


    }


    Now you see the use of the illustrious com.google.android.maps.Point


    object, not to be confused with the android.graphics.Point object,


    which is, clearly, difficult to do, because their names are so distinct. The map
    Point object allows you to set its location with the constructor in 1E6


    notation (which, if you’re not a mapping/GPS buff, means multiplying the stuff
    returned from the GPS module by 1E6 to avoid looking like you’re


    somewhere off the coast of Africa).


    Now that you’ve converted the GPS output into a map Point, you can


    move the onscreen map to center on it. You accomplish this through the


    map controller by calling animateTo.


    The final step in this section is to start the location loop when the user presses
    the center key. By now, you should be a pro at this sort of thing; in fact, I’ll
    bet you’re so good I don’t even have to explain the following code:


    **public boolean** onKeyDown(**int** KeyCode, KeyEvent evt)


    {


    **super**.onKeyDown(KeyCode, evt);


    **switch**(KeyCode)


    {


    **case** KeyEvent.KEYCODE_DPAD_CENTER:


    **if**(!m_locationLoopActive)


    {


    m_locationLoopActive = **true**;


    **Android Essentials**


    **83**


    ![](index-90_1.png)


    startLocationThread();


    }


    return true;


    break;


    }


    return false;


    }


    **Taking Stock**


    If you’ve followed along thus far, you should see, when you press the


    center key, that the map moves to a location in the Bay Area near San


    Francisco. Additionally, over time, the map will move in parallel with the movement
    of the fictional handset. Congratulations—if your application


    were running on a real phone, you’d be looking down at the top of your


    head…figuratively.


    If you cheated and downloaded the example code, 5 points for ingenuity


    but 20 points off for lack of creativity. You cheaters will notice that a blue
    tack is drawn at the current location of the handset (the center of the screen
    if you haven’t moved the map around by clicking your mouse). This blue


    tacky-blobby thing, aside from being a testament to my poor Photoshop


    skills, is the final part of the Google Maps example. Half the fun of


    displaying a map is marking things on it. This example, because this book is called
    *Android Essentials* and not *I’ll Write Your Mobile Application for* *You, OK?*
    , will be straightforward and simple. You’ll draw a tack overlay on the current
    user’s position.


    **It’s a Bird, It’s a Plane...Nope, It’s Bad Photoshoping**


    Correctly rendering an overlay is a little more complicated than you might think
    at first. It requires two major components, the OverlayController object and an
    extended Overlay object. The overlay controller manages


    each overlay and ensures that its draw function is called after the MapView redraws
    itself. If you’ll recall, and I’ll insert it here because you probably **84**


    **Android Essentials**


    ![](index-91_1.png)


    don’t want to, you had to create an overlay controller in the onCreate


    method. Here’s the line:


    m_overlayController =


    m_mapView.createOverlayController();


    Each drawable Overlay must be added to the OverlayController.


    Again, here’s the line you used earlier in the example:


    m_overlayController.add(new TackOverlay(this), true);


    The TackOverlay is an extension of the Overlay object. Anytime you


    want to draw your own “tack,” you’ll have to extend the Overlay object.


    Granted, one custom Overlay with a little efficient creative programming could
    draw all your overlays. For the purpose of this example, you’ll


    extend the Overlay object and add the required draw method. The draw


    method will be called after the map redraws itself. Here’s the


    TackOverlay declaration, class variables, and constructor; you’ll declare it inline
    within the MapActivity so it has access to your MapActivity’s


    variables and functions:


    **class**TackOverlay **extends** Overlay


    {


    MapExampleActivity ctx;


    Bitmap tack;


    TackOverlay(MapExampleActivity c)


    {


    **super**();


    BitmapDrawable b = (BitmapDrawable)


    c.getResources().


    getDrawable(R.drawable. *tack*);


    tack = b.getBitmap();


    }


    As you can see, the TackOverlay looks like just about any other Android object
    extension. Using the context pointer, you’ll stash aside the tack bitmap resource
    so you won’t have to load it every time when drawing. The code gets a little more
    interesting when you crack into the draw method.


    **Android Essentials**


    **85**


    ![](index-92_1.png)


    **public void** draw(Canvas canvas, PixelCalculator calculator,


    **boolean** shadow)


    {


    **super**.draw(canvas, calculator, shadow);


    **int**xy[] = **newint**[2];


    try{


    //Convert the center point to an XY coordinate.


    //We could hard-code this,


    //but where''s the fun in that?


    **if**(m_curLocation == **null**)


    return;


    calculator.getPointXY(m_curLocation, xy);


    **int**tackX = xy[0] - (tack.getWidth()/2);


    **int**tackY = xy[1] - (tack.getHeight());


    canvas.drawBitmap(tack ,tackX, tackY, **new** Paint());


    }


    **catch** (Exception e)


    {


    Log.e("Crap!");


    }


    }


    There’s nothing mind-bending in the previous code. The only tricky bit to keep
    in mind is that you’ll need to translate the latitude/longitude


    coordinates stored in the m_curLocation Point object into an XY


    coordinate to draw onscreen. To do this, the Overlay object passes in a PixelCalculator
    object with the draw method. This object is responsible for giving you an XY coordinate
    that maps to the latitude/longitude


    position. Because the TackOverlay object is defined inline within the


    MapExampleActivity, it has access to the m_curLocation point variable.


    You’ll convert that point into an XY location. Because the tack-blob-


    thingy’s point is at the bottom and middle of the image, you’ll have to move it
    up by the height of the tack resource and left by half the width.


    **86**


    **Android Essentials**


    ![](index-93_1.png)


    This should put the point of the tack in line with the XY calculated


    location.


    Also worth noting, even though I haven’t implemented it, is the existence of the
    shadow boolean. This will tell you whether your overlay should


    draw a shadow. Ignore it or not; it’s up to you.


    With that, you’ve completed the example. You can now draw a somewhat


    misshapen tack on the map at the GPS location of the phone. Granted,


    you’re drawing a faked stub GPS location, but your new cutting-edge LBS


    application has to start somewhere.


    **Wrapping Up**'
