  raw: 'It’s a great chance to demonstrate the use of a service in a simple,


    uncomplicated environment.


    Potentially, it will let you start up the music without a visible application
    presence, making your prank application that much more dastardly.


    **Nervous with the Service**


    Why would you want to use a service? Essentially, it’s meant to be an


    object that runs as a separated process from the user interface. It’s perfect
    for cases when a developer wants functionality (be it network or


    multimedia related) to be able to run independently. Examples include


    audio playback, background web transactions, and evil prank applications.


    Although services allow multiple applications to bind (to open a


    communications channel), with them you’ll be using it as a simple


    background process. Again, services have a wealth of uses beyond the


    simple one you’re putting them to here.


    **Android Essentials**


    **29**


    ![](index-36_1.png)


    ***Creating a Service***


    Add a new class to your source package. I’ve called my PrankService


    again (no points for originality). At its most basic level, a service must override
    the onBind method. To get a service class to compile, it must


    look, at least a little bit, like Code Listing 2-5.


    ***Code Listing 2-5\. A Stripped-Down Service***


    **public class** PrankService **extends** Service


    {


    **public** IBinder onBind(Intent intent)


    {


    return null;


    }


    }


    For this example, you won’t be using the onBind method of the service


    interaction. You’ll simply be starting and stopping the service from within your
    main activity. To do this, you’ll have to override two more methods within the
    Service class:


    onStart(int startId, Bundle arguments)


    onDestroy()


    When onStart is called, you’ll begin playing your sample media file.


    When the service is destroyed, you’ll explicitly stop it. This is not


    necessarily required, but you’ll spell it out a little more later for the sake
    of explanation.


    ***Starting the Service***


    Starting a new service should look similar to starting an activity. Since you’ve
    already been exposed to this a few times before, I’ll just drop in the code and
    let you sort it out yourself.


    **30**


    **Android Essentials**


    ![](index-37_1.png)


    Recall the onCreate method within PrankActivity listed earlier. Simply


    replace the comment “We’ll need to start the music service here” with the following
    line of code:


    startService(**new** Intent


    ("com.apress.START_AUDIO_SERVICE"), **null**);


    Again, this should look familiar. The only difference between starting an activity
    and starting a service (aside from the different method call) is the ability to
    pass a *bundle* (essentially a map or hash table) of parameters along with the
    intent. That bundle will be passed to the onCreate method of the service.


    ***Starting the Music***


    Like BREW and Java ME, Android has made media playback (at least on a


    simple play/stop basis) very simple and easy to use. When your service’s onStart
    function is called, you’ll load and play a test audio file from the


