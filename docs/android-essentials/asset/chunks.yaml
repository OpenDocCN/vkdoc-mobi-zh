  trans: "\n在开始构建意图接收器之前，你需要花一点时间了解为何要使用它。意图接收器几乎不占用内存、不需要链接或额外开销。当活动（Activity）必须在启动时加载所有繁重的导入类时，意图接收器则没有这些负担。由于某些类型的意图可能会以极高的频率到达（例如网络状态更新），一个轻量级的\
    \ **Android 基础** 对象必须首先对数据进行解析。如果此时适合唤醒一个更大的用户界面进程或繁重的后台服务，意图接收器就应该采取这样的行动。\n\n\
    **提示**  \n意图接收器可能会被频繁地启动和关闭（取决于它们监听的内容）；请尽量让它们保持轻量，并尽可能少地使用库。如果你在处理某个特定事件时插入了过多开销，导致手机运行缓慢，用户是不会高兴的。\n\
    \n### 构建意图接收器\n\n首先，你需要为这个恶作剧小应用创建一个新项目。在源码目录中，创建一个新类，它将作为新的意图接收器。初步来看，它应该像这样：\n\
    \n```\npublic class PrankSMSReceiver extends IntentReceiver\n{\n    public void\
    \ onReceiveIntent\n    (Context context, Intent intent)\n    {\n        return;\n\
    \    }\n}\n```\n\n现在你已经设置好了这个类，接下来需要告诉 Android 你希望接收短信事件。你需要修改 `AndroidManifest.xml`\
    \ 文件，以获取权限并注册 `RECEIVE_SMS` 意图动作。\n\n### 权限\n\n运营商、用户甚至开发者可能都不希望让 Android 应用随意访问手机和网络的特权层。因此，Google\
    \ 在 Android 中引入了 **Android 基础** 权限的概念（所有有移动开发经验的开发者都应该认识它）。要能够接收短信，你需要通知手机你已经获得接收权限。\n\
    \n由于在 Android 中，权限是针对特定清单中的所有元素声明的，你需要在 `<manifest>` 声明标签之后添加权限行（代码清单 2-2）。示例应用将命名为\
    \ `PrankApp`，其主活动称为 `PrankActivity`。对于原创性，笔者不指望获得任何命名奖项。\n\n**代码清单 2-2. 添加接收短信的权限**\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n    package=\"com.apress.book.PrankApp\"\
    >\n    <uses-permission android:name=\"android.permission.RECEIVE_SMS\" />\n```\n\
    \n如果没有权限标记，Android 在收到短信时就不会启动你的应用。后面我还会介绍其他需要涉及的权限。与此同时，你可以在 [Android 官方文档：http://code.google.com/android/reference/android/Manifest.permission.html](http://code.google.com/android/reference/android/Manifest.permission.html)\
    \ 中找到所有权限的列表。\n\n### 也把短信发给我！\n\n现在你已经获得了与手机短信层交互的权限，接下来需要告诉手机在收到新短信时该做什么。为此，你必须像之前一样打开\
    \ `AndroidManifest.xml` 文件。你需要在现有活动旁边添加一个新的意图接收器。代码清单 2-3 展示了需要插入的内容（为了便于参考，我保留了\
    \ `</activity>` 标签）。**Android 基础**\n\n**代码清单 2-3. 注册新的意图接收器以接收传入短信**\n\n```xml\n\
    </activity>\n<receiver android:name=\"PrankSMSReceiver\" android:enabled=\"true\"\
    >\n    <intent-filter>\n        <action android:name=\"android.provider.Telephony.SMS_RECEIVED\"\
    \ />\n        <category android:name=\"android.intent.category.DEFAULT\" />\n\
    \    </intent-filter>\n</receiver>\n```\n\n每当手机收到一条传入短信时，这就是你接收意图通知所需的一切。\n"
- fmt: "# Seeing the Intent Receiver in Action\n\nThis is a little more difficult\
    \ to pull off than it sounds. A process must be running for the DDMS (the debugger\
    \ application) to attach to it. But in most cases you don’t want the application\
    \ to run except when a new event triggers it. The solution is a little bit of\
    \ a shell game with the Eclipse IDE.\n\nThis may get a little more complicated\
    \ as you advance to the later steps.\n\nPlace a breakpoint inside your `onReceiveIntent()`\
    \ method. Start debugging the application, and let the emulator sit on the “Hello\
    \ World, PrankActivity” screen.\n\nIn Eclipse, switch views to the DDMS. You can\
    \ do this by pressing Command+F8 a few times or by selecting the menu `Window`\
    \ → `Open Perspective` → `DDMS`.\n\nFigure 2-1 shows what it looks like.\n\n##\
    \ Android Essentials\n\n*Figure 2-1. The DDMS perspective*\n\nAlong the left window,\
    \ on the Devices tab, you should now see your application highlighted with a little\
    \ green bug next to it. This is the DDMS telling you that the debugger is attached\
    \ to your `PrankApp` process. A little further down is the Emulator Control tab.\
    \ This is where you’ll send the SMS message. Enter any phone number first, select\
    \ SMS, type a test message, and hit Send.\n\nYou should, if you’ve set up your\
    \ manifest correctly, see Eclipse switch back to the Debug perspective and halt\
    \ on your newly set breakpoint.\n\n**Note**\n\nIf nothing is happening, first\
    \ make sure you’ve set the permissions correctly. If they’re not correct, you\
    \ should see a failed permissions message go by on the bottom of the DDMS screen\
    \ on the LogCat tab. Also, make sure your application is already running and has\
    \ the green debugging icon next to it on the Devices tab. If all else fails, compare\
    \ your project with the sample one I’ve included with this book.\n\nIf you’ve\
    \ correctly followed along so far, your intent’s `onReceiveIntent()` function\
    \ will now be called each time an SMS message is sent to the handset. Next, you’ll\
    \ have to figure out how to retrieve the contents of an SMS message.\n\n### What’s\
    \ in an SMS?\n\nSadly, to date, Android’s documentation on receiving and filtering\
    \ SMS messages is confusing at best. I suspect it’s not a feature that’s high\
    \ on the list of things to tell developers about. Although I disagree with these\
    \ priorities, it gives me a chance to fill the gap.\n\nHere’s what the method\
    \ `onReceiveIntent()` looks like now that you’re listening for new SMS messages:\n\
    \n```java\npublic void onReceiveIntent(Context context, Intent intent)\n{\n  \
    \  SmsMessage msg[] = Telephony.Sms.Intents.getMessagesFromIntent(intent);\n \
    \   for (int i = 0; i < msg.length; i++)\n    {\n        String msgTxt = msg[i].getMessageBody();\n\
    \        if (msgTxt.equals(\"0xBADCAT0_Fire_The_Missiles!\"))\n        {\n   \
    \         //Start the pranking here\n        }\n    }\n    return;\n}\n```\n\n\
    You’ll also need to import two libraries to make this work:\n\n```java\nimport\
    \ android.telephony.gsm.SmsMessage;\nimport android.provider.Telephony;\n```\n\
    \nBuried in the `Telephony` library is the call `getMessagesFromIntent()`, which\
    \ will return an array of SMS messages. All that’s left is pulling the payload\
    \ out of the SMS messages in question. The special code you’ll be looking for\
    \ to trigger your prank activity is the text `\"0xBADCAT0_Fire_The_Missiles!\"\
    `. It must be a combination suitably unique so that it will not be triggered by\
    \ accident. You wouldn’t want your prank to misfire and alert the victim too early.\n\
    \n**Note**\n\nIn Android, features that are not documented well are very likely\
    \ not finished. Because the documentation for receiving SMS messages is nearly\
    \ nonexistent, you should expect some changes in how SMSs are processed. More\
    \ than likely, the overall method should be similar, but it’s safe to assume that\
    \ some of the details will change before the SDK reaches its final version. This\
    \ example is more about learning how to use an intent receiver than it is about\
    \ the particulars of text message communication.\n\n## Triggering the Activity"
  raw: '**Seeing the Intent Receiver in Action**


    This is a little more difficult to pull off than it sounds. A process must be
    running for the DDMS (the debugger application) to attach to it. But in most cases
    you don’t want the application to run except when a new event triggers it. The
    solution is a little bit of a shell game with the Eclipse IDE.


    This may get a little more complicated as you advance to the later steps.


    Place a breakpoint inside your onReceiveIntent method. Start debugging


    the application, and let the emulator sit on the “Hello World,


    PrankActivity” screen.


    In Eclipse, switch views to the DDMS. You can do this by pressing


    Command+F8 a few times or by selecting the menu Window Open


    Perspective DDMS.


    Figure 2-1 shows what it looks like.


    **Android Essentials**


    **23**


    ![](index-30_1.png)


    ![](index-30_2.png)


    ***Figure 2-1\. The DDMS perspective***


    Along the left window, on the Devices tab, you should now see your


    application highlighted with a little green bug next to it. This is the DDMS


    telling you that the debugger is attached to your PrankApp process. A little further
    down is Emulator Control tab. This is where you’ll send the SMS


    message. Enter any phone number first, select SMS, type a test message, and hit
    Send.


    **24**


    **Android Essentials**


    ![](index-31_1.png)


    You should, if you’ve set up your manifest correctly, see Eclipse switch back
    to the Debug perspective and halt on your newly set breakpoint.


    **Note**


    If nothing is happening, first make sure you’ve set the


    permissions correctly. If they’re not correct, you should see a failed


    permissions message go by on the bottom of the DDMS screen on the


    LogCat tab. Also, make sure your application is already running and has the green
    debugging icon next to it on the Devices tab. If all else fails, compare your
    project with the sample one I’ve included with this book.


    If you’ve correctly followed along so far, your intent’s onReceiveIntent function
    will now be called each time an SMS message is sent to the


    handset. Next, you’ll have to figure out how to retrieve the contents of an SMS
    message.


    ***What’s in an SMS?***


    Sadly, to date, Android’s documentation on receiving and filtering SMS


    messages is confusing at best. I suspect it’s not a feature that’s high on the
    list of things to tell developers about. Although I disagree with these priorities,
    it gives me a chance to fill the gap.


    Here’s what the methodonReceiveIntent looks like now that you’re


    listening for new SMS messages:


    **public void** onReceiveIntent


    (Context context, Intent intent)


    {


    SmsMessage msg[] =


    Telephony.Sms.Intents.getMessagesFromIntent(intent);


    **for**(**int** i = 0; i < msg.length; i++)


    {


    String msgTxt = msg[i].getMessageBody();


    **if** (msgTxt.equals("0xBADCAT0_Fire_The_Missiles!"))


    {


    **Android Essentials**


    **25**


    ![](index-32_1.png)


    //Start the pranking here


    }


    }


    return;


    }


    You’ll also need to import two libraries to make this work:


    **import** android.telephony.gsm.SmsMessage;


    **import** android.provider.Telephony;


    Buried in the Telephony library is the call getMessageFromIntent, which will return
    an array of SMS messages. All that’s left is pulling the payload out of the SMS
    messages in question. The special code you’ll be looking for to trigger your prank
    activity is the text


    “0xBADCAT0_Fire_The_Missiles!”


    It must be a combination suitably unique so that it will not be triggered by accident.
    You wouldn’t want your prank to misfire and alert the victim too early.


    **Note**


    In Android, features that are not documented well are very likely


    not finished. Because the documentation for receiving SMS messages is


    nearly nonexistent, you should expect some changes in how SMSs are


    processed. More than likely, the overall method should be similar, but it’s safe
    to assume that some of the details will change before the SDK reaches its final
    version. This example is more about learning how to use an intent receiver than
    it is about the particulars of text message communication.


    **Triggering the Activity**'
  trans: "\n# 一窥意图接收器的实际运行\n\n实现这一点比听起来要困难一些。必须有进程正在运行，DDMS（调试器应用程序）才能附加到它。但在大多数情况下，除非有新事件触发，否则你不希望应用程序运行。解决方法是利用\
    \ Eclipse IDE 玩一点“花招”。\n\n随着你进入后续步骤，这个过程可能会变得稍微复杂一些。\n\n在你的 `onReceiveIntent()`\
    \ 方法内部设置一个断点。开始调试应用程序，让模拟器停留在“Hello World, PrankActivity”屏幕上。\n\n在 Eclipse 中，切换到\
    \ DDMS 视图。你可以按几次 Command+F8 或选择菜单 `Window` → `Open Perspective` → `DDMS` 来完成此操作。\n\
    \n图 2-1 展示了它的样子。\n\n## Android 要点\n\n*图 2-1. DDMS 透视图*\n\n在左侧窗口的“设备”(Devices)\
    \ 标签页中，你应该会看到你的应用程序旁边有一个绿色的小虫子图标高亮显示。这是 DDMS 在告诉你，调试器已附加到你的 `PrankApp` 进程。再往下一点是“模拟器控制”(Emulator\
    \ Control) 标签页。你将在这里发送短信。首先输入任意电话号码，选择“发送短信”(SMS)，输入一条测试消息，然后点击“发送”(Send)。\n\n\
    如果你的清单文件配置正确，你应该会看到 Eclipse 切换回“调试”(Debug) 透视图，并在你新设置的断点处暂停。\n\n**注意**\n\n如果没有任何反应，首先请确保你已正确设置权限。如果权限不正确，你应该会在\
    \ DDMS 屏幕底部的 LogCat 标签页上看到一条权限失败的消息。此外，请确保你的应用程序正在运行，并且在“设备”(Devices) 标签页上旁边有绿色的调试图标。如果其他方法都失败了，请将你的项目与我随书附带的示例项目进行比较。\n\
    \n如果你到目前为止正确地遵循了步骤，那么每当有短信发送到手机时，你的意图的 `onReceiveIntent()` 函数就会被调用。接下来，你需要弄清楚如何检索短信的内容。\n\
    \n### 短信里有什么？\n\n遗憾的是，到目前为止，Android 关于接收和过滤短信的文档充其量只是令人困惑。我怀疑这并不是一个需要优先告知开发者的特性。虽然我不同意这种优先级安排，但这给了我一个填补空白的机会。\n\
    \n以下是你正在监听新短信时的 `onReceiveIntent()` 方法现在的样子：\n\n```java\npublic void onReceiveIntent(Context\
    \ context, Intent intent)\n{\n    SmsMessage msg[] = Telephony.Sms.Intents.getMessagesFromIntent(intent);\n\
    \    for (int i = 0; i < msg.length; i++)\n    {\n        String msgTxt = msg[i].getMessageBody();\n\
    \        if (msgTxt.equals(\"0xBADCAT0_Fire_The_Missiles!\"))\n        {\n   \
    \         //在这里开始恶作剧\n        }\n    }\n    return;\n}\n```\n\n你还需要导入两个库才能使其工作：\n\
    \n```java\nimport android.telephony.gsm.SmsMessage;\nimport android.provider.Telephony;\n\
    ```\n\n在 `Telephony` 库中隐藏着 `getMessagesFromIntent()` 调用，它将返回一个短信息数组。剩下要做的就是提取这些短信中的有效载荷。你要寻找用于触发恶作剧活动的特殊代码是文本\
    \ `\"0xBADCAT0_Fire_The_Missiles!\"`。它必须是一个足够独特的组合，以免被意外触发。你肯定不希望你的恶作剧出差错，过早地惊动“受害者”。\n\
    \n**注意**\n\n在 Android 中，那些文档记录不完善的功能很可能尚未完成。由于接收短信息的文档几乎不存在，你应该预料到短信处理方式会有所变化。很可能整体方法会类似，但可以确定的是，在\
    \ SDK 达到最终版本之前，某些细节将会改变。这个示例更多的是关于学习如何使用意图接收器，而不是关于文本消息通信的细节。\n\n## 触发 Activity\n"
- fmt: "# Android Essentials\n\nIt’s important to remember that the life cycle of\
    \ an intent receiver lasts only as long as the method call `onReceiveIntent`.\
    \ Once out of that function, Android is free to kill the process running your\
    \ application. Any asynchronous functionality will die a messy death if started.\
    \ If you want to do anything beyond simple processing within the method, you’ll\
    \ need to start a service or an activity. Since you want to both play music and\
    \ alert your victim that they’ve been had, you’ll need to start up an activity.\
    \ You accomplish this as follows:\n\n```\nif (msgTxt.equals(\"0xBADCAT0_Fire_The_Missiles!\"\
    ))\n{\n    //Start the Activity\n    Intent startActivity = new Intent();\n  \
    \  startActivity.setLaunchFlags(Intent.NEW_TASK_LAUNCH);\n    startActivity.setAction(\"\
    com.apress.START_THE_MUSIC\");\n    context.startActivity(startActivity);\n}\n\
    ```\n\nThe only unrecognizable code you’ll see here is the addition of `NEW_TASK_LAUNCH`\
    \ in `setLaunchFlags`. You’ll need to do this any time you want to send out an\
    \ intent action that will start a new activity.\n\nAdditionally, just as you did\
    \ in the splash screen example application, you’ll have to add a new action to\
    \ the intent filter of your activity. The process should look familiar:\n\n```\n\
    <intent-filter>\n    <action android:name=\"android.intent.action.MAIN\" />\n\
    \    <action android:name=\"com.apress.START_THE_MUSIC\" />\n    <category android:name=\"\
    android.intent.category.LAUNCHER\" />\n    <category android:name=\"android.intent.category.DEFAULT\"\
    \ />\n</intent-filter>\n```\n\nNow, if you’ve correctly added the earlier code\
    \ in place, when you send an SMS message from the DDMS perspective, you should\
    \ see your application come to the foreground and the “Hello World, PrankActivity”\
    \ text display proudly on the screen.\n\n## Rigging the Activity\n\nThere is one\
    \ last piece you’ll need to add before getting into the more dastardly music playback\
    \ service: rigging up the activity to correctly respond to the action sent by\
    \ your SMS intent receiver. If the application is started normally, you’ll want\
    \ to immediately close it down. Again, you can’t have the victim of your prank\
    \ launching it from the menus and clueing in to your plan too early. To do this,\
    \ you’ll have to retrieve the launching intent and call the `getAction` method\
    \ to figure out under what case it has been launched. The `PrankActivity`’s `onCreate`\
    \ method should now look like Code Listing 2-4.\n\n### Code Listing 2-4. Launching\
    \ on a Specific Intent Action\n\n```\npublic void onCreate(Bundle icicle)\n{\n\
    \    super.onCreate(icicle);\n    Intent i = getIntent();\n    String action =\
    \ i.getAction();\n    if (action != null &&\n        action.equals(\"com.apress.START_THE_MUSIC\"\
    ))\n    {\n        setContentView(R.layout.pranked);\n        //We'll need to\
    \ start the music service here\n    }\n    else\n        finish();\n}\n```\n\n\
    First you’ll get the intent that launched your activity. With the intent in hand,\
    \ you can retrieve the calling action with the `getAction` method. This will return\
    \ a string containing the launching event that you’ll check against your known\
    \ music action listed in the previous XML. If the launch event for your activity\
    \ comes from normal means (from the menu or from starting the debugger), the action\
    \ string will be `null`. If this is the case, you’ll want to shut down the activity\
    \ immediately using the `finish` method.\n\n**Note**: The `onCreate` method is\
    \ called only when your application is started for the first time. If you’ve launched\
    \ your application and then exited it (using the Back key), the application will\
    \ still be running in the background. If, at that point, you send the SMS message,\
    \ your activity will come back to the foreground, but its `onStart` method will\
    \ be called but not `onCreate`. Feel free to move the functionality of your own\
    \ sample (if you’re following along) to the `onStart` method.\n\n## Who Do You\
    \ Want to Humiliate Today?\n\nAlthough it might be a little overkill, you’ll use\
    \ one of Android’s `Service` objects to handle music playback. I’m going to do\
    \ it this way for two reasons:"
