    XML layout with which you can build your UI widget hierarchy.


    Additionally, you can build, manipulate, and tweak these very same views and view
    groups inside your code.


    By using these two methods in combination, you can predesign all your


    static pieces (preformatted menus, backgrounds, help screens) while adding and
    manipulating these elements within the code to react to network and dynamic data.
    Lastly, you can specify canvas areas both in code and in


    XML where data can be drawn by hand. Although Android’s views and


    view groups can be overcomplicated and difficult to use at first, in some rare
    cases it mostly leaves us developers with more power and flexibility than any
    other platform I’ve known.


    To explore this raw opportunity and flexibility, you wrote a simple


    login/password screen, created a main menu using only raw Java code and TextView
    objects, and finally fiddled with some auditory illusions using the raw canvas.


    **Location Isn’t Too Important, Except When You Need Pizza**


    **at 4 a.m.**


    Once you have the solid foundations of the application logic and the user interface,
    you can move on to much more interesting and exciting topics.


    You can explore subjects such as Android’s GPS and Google Maps service.


    Android gives you multiple ways to access the location of the handset.


    Although the emulated implementation is rather crude, the documentation suggests
    that much more is possible with the final running version. To get a taste for
    these two powerful mobile functions, you made a slightly less powerful location-tracking
    example. A blue tack would, assuming you got everything right, follow along with
    the emulator’s imaginary tromp through Silicon Valley. The example should, when
    run on an actual handset, choose a rather more efficient method of position determination
    and follow the user with that same annoying tack.


    **108**


    **Android Essentials**


    ![](index-115_1.png)


    **Taking Off Android’s Leash and Letting It Romp Around the**


    **Internet**


    Last, you took the opportunity to let Android roam the Internet at large.


    You pulled down a simple XML file, parsed it, pushed its contents into a list,
    and then failed, thanks to Android’s incomplete networking layer, at making Android
    stream audio over the network. Along the way, you


    discovered the joys of adapters and list views in both their primitive and somewhat
    more complex forms.


    **Overall**


    Over the course of all these chapters, I’ve tried to arm you with a general foundation
    from which to create your own mobile application. It’s simply impossible, in the
    short time we have together, to convey and explain every option available to you,
    the Android developer. Instead, I’ve tried to give you a grasp of the fundamentals
    and the essential building blocks and


    understanding required to create your next killer application.


    **Other Sources of Information**


    As Android gains popularity, I’m sure you’ll see more sources of


    information begin to spring up. There are already several blogs, websites, wikis,
    forums, and other information resources out there. A few good


    Google searches should get you on your way. For now, make sure you


    bookmark the Android online documentation found here:


    [http://code.google.com/android/documentation.html](http://code.google.com/android/documentation.html)


