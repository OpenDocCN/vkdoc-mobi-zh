  trans: "\n# Android 核心要点\n\n请务必记住，intent 接收器的生命周期仅限于 `onReceiveIntent` 方法调用的持续时间。一旦离开该函数，Android\
    \ 系统就可以随时终止运行你应用的进程。任何异步功能若在此之后启动，都将以混乱的方式消亡。如果你想在该方法内执行除简单处理以外的任何操作，就需要启动一个服务（service）或活动（activity）。由于你既要播放音乐，又要提醒受害者他们已中招，因此需要启动一个活动。实现方式如下：\n\
    \n```\nif (msgTxt.equals(\"0xBADCAT0_Fire_The_Missiles!\"))\n{\n    //启动 Activity\n\
    \    Intent startActivity = new Intent();\n    startActivity.setLaunchFlags(Intent.NEW_TASK_LAUNCH);\n\
    \    startActivity.setAction(\"com.apress.START_THE_MUSIC\");\n    context.startActivity(startActivity);\n\
    }\n```\n\n你在这里看到的唯一陌生代码是 `setLaunchFlags` 中新增的 `NEW_TASK_LAUNCH`。每当你想要发送一个 intent\
    \ action 来启动一个新的 activity 时，都需要这样做。\n\n此外，正如你在闪屏示例应用中所做的那样，你必须在 activity 的 intent\
    \ 过滤器中添加一个新的 action。这个过程看起来应该很熟悉：\n\n```\n<intent-filter>\n    <action android:name=\"\
    android.intent.action.MAIN\" />\n    <action android:name=\"com.apress.START_THE_MUSIC\"\
    \ />\n    <category android:name=\"android.intent.category.LAUNCHER\" />\n   \
    \ <category android:name=\"android.intent.category.DEFAULT\" />\n</intent-filter>\n\
    ```\n\n现在，如果你已将前面的代码正确添加到位，当从 DDMS 透视图发送一条 SMS 消息时，你应该会看到你的应用出现在前台，并且屏幕上自豪地显示着“Hello\
    \ World, PrankActivity”文本。\n\n## 设置活动\n\n在进入更邪恶的音乐播放服务之前，还有最后一部分需要添加：将 activity\
    \ 设置为能正确响应由你的 SMS intent 接收器发送的 action。如果应用是正常启动的，你需要立即将其关闭。同样，你不能让恶作剧的受害者从菜单中启动它而过早发现你的计划。为此，你需要检索启动\
    \ intent，并调用 `getAction` 方法来找出它是在何种情况下启动的。`PrankActivity` 的 `onCreate` 方法现在应如代码清单\
    \ 2-4 所示。\n\n### 代码清单 2-4. 针对特定 Intent Action 启动\n\n```\npublic void onCreate(Bundle\
    \ icicle)\n{\n    super.onCreate(icicle);\n    Intent i = getIntent();\n    String\
    \ action = i.getAction();\n    if (action != null &&\n        action.equals(\"\
    com.apress.START_THE_MUSIC\"))\n    {\n        setContentView(R.layout.pranked);\n\
    \        //此处我们需要启动音乐服务\n    }\n    else\n        finish();\n}\n```\n\n首先，你获取启动了你的\
    \ activity 的 intent。拿到 intent 后，你可以通过 `getAction` 方法检索调用 action。这将返回一个包含启动事件的字符串，你可以将其与你之前在\
    \ XML 中列出的已知音乐 action 进行比对。如果你的 activity 是通过正常方式（从菜单或启动调试器）启动的，action 字符串将为 `null`。如果是这种情况，你需要立即使用\
    \ `finish` 方法关闭 activity。\n\n**注意**：`onCreate` 方法仅在应用首次启动时被调用。如果你启动了应用然后退出（使用返回键），应用仍将在后台运行。此时，如果你发送\
    \ SMS 消息，你的 activity 会回到前台，但其 `onStart` 方法会被调用，而 `onCreate` 不会被调用。如果你正在跟着做，可以随意将你自己示例中的功能移到\
    \ `onStart` 方法中。\n\n## 今天你想羞辱谁？\n\n尽管可能有点大材小用，但你还是会使用 Android 的 `Service` 对象之一来处理音乐播放。我这样做有两个原因："
- fmt: "It's a great chance to demonstrate the use of a service in a simple, uncomplicated\
    \ environment.\n\nPotentially, it will let you start up the music without a visible\
    \ application presence, making your prank application that much more dastardly.\n\
    \n## Nervous with the Service\n\nWhy would you want to use a service? Essentially,\
    \ it's meant to be an object that runs as a separated process from the user interface.\
    \ It's perfect for cases when a developer wants functionality (be it network or\
    \ multimedia related) to be able to run independently. Examples include audio\
    \ playback, background web transactions, and evil prank applications.\n\nAlthough\
    \ services allow multiple applications to bind (to open a communications channel),\
    \ with them you'll be using it as a simple background process. Again, services\
    \ have a wealth of uses beyond the simple one you're putting them to here.\n\n\
    **Android Essentials**\n\n**29**\n\n![](index-36_1.png)\n\n### Creating a Service\n\
    \nAdd a new class to your source package. I've called my `PrankService` again\
    \ (no points for originality). At its most basic level, a service must override\
    \ the `onBind` method. To get a service class to compile, it must look, at least\
    \ a little bit, like Code Listing 2-5.\n\n#### Code Listing 2-5. A Stripped-Down\
    \ Service\n\n```java\npublic class PrankService extends Service\n{\n    public\
    \ IBinder onBind(Intent intent)\n    {\n        return null;\n    }\n}\n```\n\n\
    For this example, you won't be using the `onBind` method of the service interaction.\
    \ You'll simply be starting and stopping the service from within your main activity.\
    \ To do this, you'll have to override two more methods within the `Service` class:\n\
    \n- `onStart(int startId, Bundle arguments)`\n- `onDestroy()`\n\nWhen `onStart`\
    \ is called, you'll begin playing your sample media file. When the service is\
    \ destroyed, you'll explicitly stop it. This is not necessarily required, but\
    \ you'll spell it out a little more later for the sake of explanation.\n\n###\
    \ Starting the Service\n\nStarting a new service should look similar to starting\
    \ an activity. Since you've already been exposed to this a few times before, I'll\
    \ just drop in the code and let you sort it out yourself.\n\n**30**\n\n**Android\
    \ Essentials**\n\n![](index-37_1.png)\n\nRecall the `onCreate` method within `PrankActivity`\
    \ listed earlier. Simply replace the comment \"We'll need to start the music service\
    \ here\" with the following line of code:\n\n```java\nstartService(new Intent\n\
    (\"com.apress.START_AUDIO_SERVICE\"), null);\n```\n\nAgain, this should look familiar.\
    \ The only difference between starting an activity and starting a service (aside\
    \ from the different method call) is the ability to pass a *bundle* (essentially\
    \ a map or hash table) of parameters along with the intent. That bundle will be\
    \ passed to the `onCreate` method of the service.\n\n### Starting the Music\n\n\
    Like BREW and Java ME, Android has made media playback (at least on a simple play/stop\
    \ basis) very simple and easy to use. When your service's `onStart` function is\
    \ called, you'll load and play a test audio file from the `/res/raw` directory.\
    \ The first order of business is to copy a sample audio file into `/res/raw` (if\
    \ you don't have this directory, go ahead and create it).\n\nNext, drop your humiliating,\
    \ and copy-write respecting, audio file into the `raw` folder. If you're using\
    \ Eclipse, you should add a corresponding element to `R.raw`. In your case, it's\
