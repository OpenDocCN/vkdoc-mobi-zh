    \n| 文件名 | 用途 |\n|---|---|\n| `res/values` | 存放字符串和配置文件的位置。 |\n| `AndroidManifest.xml`\
    \ | 向外部操作系统描述应用程序的文件。 |\n\n显然，你早已超越了`Hello_World.c`的时代。随着学习的深入，我会在文中提及这些文件。如果你在阅读后续章节时遇到困难，请参考此表。接下来，我将花几分钟时间解析几个关键点。\n\
    \n在各种文件中，最核心且可能最令人困惑的就是 Android 清单文件。它是你的应用程序与外部世界之间的桥梁。在这个文件中，你需要为 Activity 注册\
    \ intent（下一章我会详细介绍 intents 和 activities 及其工作原理）。为了让你具备进一步开发的基础，代码清单 1-1 展示了创建第一个项目时的\
    \ Android 清单文件内容。\n\n### 代码清单 1-1. `AndroidManifest.xml`\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n          package=\"apress.book.sample\">\n    <application android:icon=\"\
    @drawable/icon\">\n        <activity android:name=\".SampleApp\"\n           \
    \       android:label=\"@string/app_name\">\n            <intent-filter>\n   \
    \             <action android:name=\"android.intent.action.MAIN\" />\n       \
    \         <category android:name=\"android.intent.category.LAUNCHER\" />\n   \
    \         </intent-filter>\n        </activity>\n    </application>\n</manifest>\n\
    ```\n\n**6**\n\n**Android 基础**\n\n![](img/index-13_1.png)\n\nXML 声明之后是带有 schema\
    \ URL 的`<manifest>`标签。其属性之一是你的源包名称。在这个示例中，它是`apress.book.sample`。\n\n接下来是应用程序声明以及应用图标的路径。`@drawable`表示法表明该项目可以在`res/drawable`文件夹中找到。此时，该应用程序仅包含一个\
    \ Activity：`SampleApp`。Activity 名称是硬编码的，但其标签（即用户在 Android 应用程序菜单中看到的内容）定义在`res/values/strings.xml`文件中。`@string`表示法则从上述\
