    \n你会注意到，如果你启动一个新的普通 Java 线程，然后尝试更改当前视图、向列表适配器添加数据元素，或执行任何其他 UI 任务，Android 都会对你“大发雷霆”。所谓“大发雷霆”，是指它要么无法工作，要么会向你抛出一堆异常。\n\
    \n### 重新获取 UI 线程\n\n由于你启动了一个新的内联 Java 线程来处理阻塞的网络连接，现在你需要定义另一个“可运行”对象，以重新获得 UI\
    \ 线程的“青睐”。幸运的是，Activity 包含一个用于为 UI 线程调度代码的方法。你将其添加到网络代码的末尾（参见代码清单 5-8）。为了上下文，我会重复最后几行。\n\
