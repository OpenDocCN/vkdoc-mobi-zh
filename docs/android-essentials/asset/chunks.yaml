    \ action based on that selection.\n\nAgain, looking over all the code required\
    \ to lay widgets out on the screen by hand is fairly prohibitive, but using the\
    \ tools you’ve just learned, you could modify, enhance, and customize how a menu\
    \ or list works based on data and user preference while the app is running. If,\
    \ however, you need to get even more specialized with how you draw to the screen,\
    \ you’ll need a less subtle and more code-heavy approach.\n\n## Custom UI Rendering\
