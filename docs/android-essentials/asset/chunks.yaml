    \n**Android 基础**\n\n**7**\n\n![](img/index-14_1.png)\n\n接下来在重要文件列表中，是`R.java`。这个文件存放了所有资源（包括图形资源和可绘制资源）的引用标识号。向`res/drawable`中添加新图形应该会\n"
- fmt: "# Android Essentials\n\n`corresponding identifier in the R.java class`. References\
    \ can then be made to these IDs rather than the items on the filesystem. This\
    \ allows you to swap out strings for localization, screen size, and other errata\
    \ that are guaranteed to change between devices.\n\nYou’ll get into the other\
    \ files as you add functionality to your repertoire.\n\nLet’s get your application\
    \ up and running.\n\n## Running, Debugging, and Causing General Mayhem\n\nRunning\
    \ and debugging are, thankfully, extremely straightforward with Android. From\
    \ within Eclipse, pull down the Run menu and select…wait for it…Run. This launches\
    \ the Android emulator.\n\n**Tip**: Once you’ve started the emulator for the first\
    \ time, you don’t need to quit or close it down. The latest version of the SDK\
    \ ships with an emulator that can take minutes to “boot up.” While the emulator\
    \ is running, each subsequent Run or Debug execution will build and deploy your\
    \ latest code to the emulator. The emulator will accept the changes and automatically\
    \ launch your new project. This is the opposite of BREW or J2ME, which must relaunch\
    \ after each change in your source base.\n\nOnce the Android emulator is up and\
    \ running, you should see the “Hello World, *YourApplicationName*” message.\n\n\
    Again, “Hello, World” as a programming example is, for lack of a better term,\
    \ emphatically lame, so I’ll skip it and move on to a more practical example:\
    \ a simple splash screen. Along the way, you should come to understand activities,\
    \ intents, intent filters, services, and content providers.\n\n## Chapter 2: The\
    \ Application\n\nAn application in Android is defined by the contents of its manifest.\
    \ Each Android application declares all its activities, entry points, communication\
    \ layers, permissions, and intents through `AndroidManifest.xml`. Four basic building\
    \ blocks, when combined, comprise a rich Android application:\n\n- **Activity**:\
    \ The most basic building block of an Android application\n- **Intent receiver**:\
    \ A reactive object launched to handle a specific task\n- **Service**: A background\
    \ process with no user interface\n- **Content provider**: A basic superclass framework\
    \ for handling and storing data\n\nIn this chapter, I’ll break down each specific\
    \ piece with a concrete functional example. First up is the activity, the core\
    \ building block of a stand-alone Android application.\n\n### Getting Active\n\
    \nAll Android mobile applications, at least in the traditional sense, will revolve\
    \ around an activity. If you’ve had any experience with other mobile platforms,\
    \ Android’s activity is quite similar to BREW’s applet or Java ME’s midlet. There\
    \ are, however, a few very important differences.\n\n#### Android vs. Java ME\
    \ vs. BREW\n\nA BREW application will, in the vast majority of all cases, consist\
    \ of a single applet. That applet communicates with the rest of the handset through\
    \ receiving and sending events. You can think of a Java ME application, on the\
    \ other hand, as an extension of the `Midlet` class. The midlet has functions\
    \ for starting, stopping, pausing, key handling, and performing any other interaction\
    \ between the handset and application. A Java ME application usually consists\
    \ of a single midlet.\n\nAndroid applications can have any number of activities\
    \ registered with the handset through the `AndroidManifest.xml` file. Android’s\
    \ multiactivity architecture is probably the major difference between developing\
    \ for Android and developing for other handset SDKs. This single fact makes it\
    \ much easier to write modular, compartmentalized code. In BREW and Java ME, a\
    \ developer will implement most functionality within the confines of the midlet\
    \ or the applet. In Android, you can write an activity, content handler, intent\
    \ receiver, or service to handle nearly anything. Once you’ve written an activity\
    \ to edit a text file, you can refer to this activity in all future applications\
    \ you write by sending and receiving intent actions. This isn’t to say that such\
    \ architecture isn’t possible within BREW or Java ME. It just has to be done at\
    \ the Java, C, or C++ level or, in Brew, with cumbersome extensions instead of\
    \ being built smoothly into the application framework.\n\n#### Functionality\n\
    \nJust like the midlet, an activity uses a series of functions to interact with\
    \ the outside world. At its base, your activity must override the method `onCreate`.\
    \ Other functions you’ll want to override are `onStop`, `onPause`, `onResume`,\
    \ and `onKeyDown`. These few functions are what will let you tie your activity\
    \ into the Android handset at large.\n\nBy default, new Android applications created\
    \ within Eclipse will implement a “Hello, World” application. I’ll show you how\
    \ to go from this basic application to a fully functional splash screen.\n\n###\
    \ Getting Splashy\n\nYou can download the packaged version of this splash screen\
    \ example from the downloads section of `www.apress.com` if you want to use it\
    \ as a starting point for your own Android application or you want to follow along\
    \ in a more passive fashion. In this example, because it is your first, I will\
    \ go through it in a series of small steps. I’ll break down exactly what needs\
    \ to be written, from adding a new image resource to modifying XML layout files.\
