    Thread splashTimer = **new** Thread()


    {


    public void run()


    {


    try


    {


    //Wait loop


    **long** ms = 0;


    **while**(m_bSplashActive && ms < m_dwSplashTime)


    {


    sleep(100);


    //Advance the timer only if we''re running.


    **if**(!m_bPaused)


    ms += 100;


    }


    //Advance to the next screen.


    startActivity(**new** Intent(


    "com.google.app.splashy.CLEARSPLASH"));


    }


    **catch**(Exception e)


    {


    Log.e("Splash", e.toString());


    }


    finally


    {


    finish();


    }


    }


    };


    splashTimer.start();


    }


    **Android Essentials**


    **13**


    ![](index-20_1.png)


    At long last, you’re getting into some Java code. This simple thread will run
    until the time counter exceeds m_dwSplashTime. Although there are


    other methods for implementing a timer, I like this one for two reasons: It can
    be paused. The timer will advance only if the m_bPaused flag is


    false. As you’ll see in a minute, it’s easy to suspend the timer if your activity’s
    onPause method is called. This is not always a requirement for a splash screen,
    but it is important for other timing-based operations.


    Moving to the next screen is as simple as flipping the m_bSplashActive


    flag to false. Advancing to the next screen, if you implement it in this fashion,
    does not require you to make the move and then cancel a more


    traditional timer.


    With this code in place, you should see the splash screen for as long as you set
    m_dwSplashTime in milliseconds. When that time is up or the user


    interrupts the splash screen with a key press, startActivity will be


    called (I’ll explain this shortly). This function will move the user to what will
    become the main menu in the next chapter. finish closes down the


    splash activity so the user does not return to it when they press Back from the
    main menu. You’ll need to implement an activity that accepts the


    CLEARSPLASH intent action. In the meantime, let’s review a few other


    important activity methods you’ll want to override.


    ***Pause, Resume, Rinse, Repeat***


    Pausing the splash timer when your activity is suspended by an incoming call,
    SMS message, or other interruption is as easy as the following:


    protected void onPause()


    {


    super.onPause();


    m_bPaused = true;


    }


    **14**


    **Android Essentials**


    ![](index-21_1.png)


    As with most of these overridden methods, you’ll need to invoke the


    superclass before doing anything else. If you review the timer thread,


    you’ll see that the ms counter responsible for keeping track of time passed doesn’t
    advance if m_bPaused is true. At this point, I’m sure you can


    guess what onResume will look like:


    protected void onResume()


    {


    super.onResume();


    m_bPaused = false;


    }


    No surprises here. When your application is resumed, the timer thread will resume
    adding time to the ms counter.


    ***Basic Key Handling***


    Key handling within the activity is handled by overriding the onKeyDown method.
    We’ll use this function to allow a user to cancel your fledgling splash screen.
    As you can see in the timer thread at the start of this section, you’ve set up
    an escape clause in the timer loop by the name of


    m_bSplashActive. To escape, you’ll just override the onKeyDown method


    so that it flips the splash flag to false. Here’s the code you’ll need to add:
    **public boolean** onKeyDown(**int** keyCode, KeyEvent event)


    {


    //if we get any key, clear the splash screen


    **super**.onKeyDown(keyCode, event);


    m_bSplashActive = **false**;


    return true;


