    LayoutParams to fill the parent. (The parent, in this case, is the activity, which
    controls the full screen.) Layout parameters, at their base, must define the height
    and width of a given widget. As you’ll probably find out later, trying to place
    a widget into a ViewGroup before its layout


    parameters are set will throw an exception. However, now that you have a layout
    object to fill, you can start building out the screen.


    ***Adding a Title***


    Next, add a simple title, which will be centered, at the top of your main menu
    screen. Code Listing 3-3 shows the block of code you’ll need for it.


    ***Code Listing 3-3\. Adding the Title***


    TextView title = **new** TextView(**this**);


    title.setText(R.string. *man_menu_title*);


    title.setLayoutParams(


    **new** LinearLayout.LayoutParams(


    **LinearLayout.LayoutParams. *FILL_PARENT*,**


    **LayoutParams. *WRAP_CONTENT*));


    title.setAlignment(Alignment. *ALIGN_CENTER*);


    layout.addView(title);


    Create the text object, and set the text from the


    /res/values/strings.xml. I know I said I wouldn’t use any XML, but


    **Android Essentials**


    **61**


    ![](index-68_1.png)


    I’m afraid I may have fibbed about that bit. In production, you’ll want to move
    all your strings to this location rather than defining them in code. If your clients
    are like mine, you won’t want to pull out your source editor and recompile every
    time they want to change the wording on one of the


    screens.


    Now that you have a title, it’s time to add the more interesting and active menu
    elements.


    ***Laying Out Menu Entries***


    Now you’ll add the individual menu elements. Because this is going to be fairly
    repetitive after the first one, I’ll insert and explain the first element but
    leave you to your own devices for the rest. Feel free to grab the full project
    at the Apress site to see the rest of the menu items. Again, you’ll fill in more
    of them as you progress through the rest of the Android essentials.


    Code Listing 3-4 shows the code to add an individual menu item.


    ***Code Listing 3-4\. Adding a Menu Item***


    TextView ItemOne = **new** TextView(**this**);


    ItemOne.setFocusable(**true**);


    ItemOne.setText("Login Screen");


    ItemOne.setTextColor(Color. *WHITE*);


    ItemOne.setLayoutParams(


    **new** LinearLayout.LayoutParams(


    LinearLayout.LayoutParams. *FILL_PARENT*,


    LayoutParams. *WRAP_CONTENT*));


    //Give the menu item an ID for tracking reasons.


    //The ID is a static int defined locally to the class


    ItemOne.setId( *IdOne*);


    //Add it to our linear layout


    layout.addView(ItemOne);


    Gosh, you probably think after reading the code carefully, this looks almost like
    the title you’ve already added. You’re exactly right, how clever of you.


    The heavy lifting of denoting when an object is in focus and when it’s been **62**


    **Android Essentials**


    ![](index-69_1.png)


    selected has yet to come, so don’t get too cocky yet. Here are the two


    differences between the previous menu item and previously listed title text: You
    need to tell the TextView that it can accept focus by calling the


    setFocusable method.


    The menu listing item will need an ID so you can distinguish it from the rest
    of the menu elements in your selection handler.


    As I mentioned briefly, whenever adding a widget to a ViewGroup, the


    LayoutParams object must specifically be the object defined within that view group.
    For example, in the previous setLayoutParams method call,


    you must pass in a LinearLayout.LayoutParams object. You must pass


    in the correct subclassed layout parameter, or Android will throw an


    exception at you during runtime.'
  trans: "\n# 深入剖析\n\n现在，你将深入剖析 Android 控件，亲自动手实践。我们将初步了解一些核心组件，其中许多你已在 XML 形式中探索过。与之前的示例一样，为了便于解释，我会保持基础性。你应该能够轻松地将这里讨论的内容应用于更复杂的\
    \ UI 布局场景。在后续更高级的示例中，你将更深入地接触其他 Android 控件。\n\n当你看到我仅为了生成一个简单可选菜单所编写的代码量时，你可能会像我一样感到有些震惊。在掌握了\
    \ XML 屏幕布局之后，再尝试用 Java 手动完成所有工作，感觉就像用一双磨损的保龄球在钢琴上演奏古典音乐。请注意——这涉及大量代码输入，可能还会带来不少挫败感。\n\
    \n另一方面，UI 布局中可能有一些特定元素你需要**在运行时**动态调整。正如我之前提到的，由于应用运行时无法编辑 XML 布局文件，因此掌握在代码中随时修改用户界面任何部分所需的工具至关重要。Android\
    \ 赋予了你这种能力，前提是你得习惯以闪电般的速度输入代码。\n\n在接下来的示例中，我费尽心思确保你几乎不会用到之前依赖的 XML 元素。这应该能让你很好地掌握非\
    \ XML 布局，但请记住，实际上，你要疯狂到用这种方式实现所有用户界面屏幕，那才会出问题。\n\n## 主菜单\n\n几乎所有移动应用程序（至少在本节撰写时）都是从图形主菜单开始的。这个图形界面将用户引导至移动应用的各项功能。由于\"\
    主菜单\"的概念在移动应用体验中如此普遍，因此它成为了一个绝佳且实用的案例研究。在本示例中，你的目标是构建一个简单且功能齐全的主菜单。为了便于对比，我们将使用另一个线性布局来整合所有内容。该示例将分三个主要阶段构建：\n\
    \n1.  **布局**：你将正确地在屏幕上排列主菜单的所有条目。当然，这只会用到 Android 巨大屏幕空间的一小部分。但大多数应用程序菜单会使用大图片，并占用显著更多的空间。\n\
    2.  **焦点**：你需要设置一个焦点结构，以便用户能够在元素之间移动。当焦点变化时，你必须调整每个菜单元素的颜色。\n3.  **选择事件**：最后，你需要设置一个监听器，以便在元素被选中或点击时，能够获知信息并根据所选项目执行相应操作。\n\
    \n当你完成这三项任务后，应该就拥有了构建约 80% 移动应用主入口屏幕的框架。虽然这不完全实用（因为我完全没用 XML），但它极好地演示了如何以自定义的、运行时驱动的方式完成工作。随着你为\"\
    社交窘迫\"应用添加更多功能，你将逐步完善这个主菜单。\n\n### 布局，Java 风格\n\n简单主菜单的第一步是将所有菜单元素放到屏幕上。正如我之前提到的，你将使用线性布局来实现。这一切都必须在应用首次绘制之前完成，因此必须放在新\
    \ `MainMenu` 活动的 `onCreate` 方法中。（如果你忘记了如何创建并接入一个新活动，请参考第 1 章。）代码清单 3-2 展示了其实例化和配置的样子。\n\
    \n**代码清单 3-2. 在 `onCreate` 方法中创建布局对象**\n\n```\nLinearLayout layout = new LinearLayout(this);\n\
    layout.setBackground(R.drawable.general_bg);\nlayout.setOrientation(LinearLayout.VERTICAL);\n\
    layout.setLayoutParams(\n    new LayoutParams(LayoutParams.FILL_PARENT,\n    \
    \                 LayoutParams.FILL_PARENT));\nsetContentView(layout);\n```\n\n\
    根据你目前所学的知识，这概念上应该很熟悉。你将使用 `/res/drawable/` 文件夹中的图片设置背景，将线性布局方向设置为垂直，并将 `LayoutParams`\
    \ 设置为填充父容器。（这里的父容器是控制全屏的活动。）布局参数从根本上必须定义给定控件的高度和宽度。你之后可能会发现，在未设置布局参数的情况下尝试将控件放入\
    \ `ViewGroup` 会抛出异常。不过，既然现在有了一个要填充的布局对象，你就可以开始构建屏幕了。\n\n### 添加标题\n\n接下来，添加一个简单的标题，它将居中显示在主菜单屏幕的顶部。代码清单\
    \ 3-3 展示了所需代码块。\n\n**代码清单 3-3. 添加标题**\n\n```\nTextView title = new TextView(this);\n\
    title.setText(R.string.man_menu_title);\ntitle.setLayoutParams(\n    new LinearLayout.LayoutParams(\n\
    \        LinearLayout.LayoutParams.FILL_PARENT,\n        LayoutParams.WRAP_CONTENT));\n\
    title.setAlignment(Alignment.ALIGN_CENTER);\nlayout.addView(title);\n```\n\n创建文本对象，并从\
    \ `/res/values/strings.xml` 中设置文本。我知道我说过不会使用任何 XML，但恐怕在这点上我撒了点小谎。在实际产品中，你会希望将所有字符串移到这个位置，而不是在代码中定义。如果你的客户和我的类似，你总不希望每次他们想更改某个屏幕上的措辞时，你都要拿出源码编辑器重新编译吧。\n\
    \n现在有了标题，是时候添加更有趣、更活跃的菜单元素了。\n\n### 布局菜单条目\n\n接下来，你将添加各个菜单元素。因为第一个之后会变得相当重复，所以我将插入并解释第一个元素，剩下的就交给你自己处理了。欢迎前往\
    \ Apress 网站获取完整项目，查看其余菜单项。再次提醒，你在后续学习 Android 基础内容的过程中，将会逐步填充更多菜单项。代码清单 3-4 展示了添加单个菜单项的代码。\n\
    \n**代码清单 3-4. 添加菜单项**\n\n```\nTextView ItemOne = new TextView(this);\nItemOne.setFocusable(true);\n\
    ItemOne.setText(\"Login Screen\");\nItemOne.setTextColor(Color.WHITE);\nItemOne.setLayoutParams(\n\
    \    new LinearLayout.LayoutParams(\n        LinearLayout.LayoutParams.FILL_PARENT,\n\
    \        LayoutParams.WRAP_CONTENT));\n\n//给菜单项一个 ID 以便跟踪。\n//ID 是在类中本地定义的一个静态\
    \ int\nItemOne.setId(IdOne);\n\n//将其添加到我们的线性布局中\nlayout.addView(ItemOne);\n```\n\
    \n天哪，仔细阅读代码后，你可能会认为这看起来几乎和你已经添加的标题一模一样。你说得完全正确，真聪明。标记对象何时获得焦点、何时被选中这类繁重工作还没开始，所以先别太得意。上述菜单项与之前列出的标题文本有两个区别：\n\
    \n-   你需要通过调用 `setFocusable` 方法告知 `TextView` 它可以接受焦点。\n-   菜单列表项需要一个 ID，以便你能够在选择处理程序中将其与其余菜单元素区分开来。\n\
    \n正如我简要提到的，每当向 `ViewGroup` 添加控件时，`LayoutParams` 对象必须明确是在该视图组内部定义的对象。例如，在上面的 `setLayoutParams`\
    \ 方法调用中，你必须传入一个 `LinearLayout.LayoutParams` 对象。你必须传入正确的子类布局参数，否则 Android 会在运行时向你抛出异常。\n"
- fmt: "# Android Essentials: Creating a Menu with Focus and Selection\n\nAs I said\
    \ before, to make the menu, I’ll add two more text elements almost exactly like\
    \ the previous listing. For the sake of expediency, I won’t list them here. Be\
    \ sure to refer to the full project to satisfy your curiosity. Now that you have\
    \ all your menu items in place, it’s time to modify them when they receive or\
    \ lose focus.\n\n**Focus Young Grasshopper….**\n\nTo handle focus change events,\
    \ you have to create an implementation of the `OnFocusChangeListener` abstract\
    \ class. The example’s version, defined locally within the `MainMenu` activity\
    \ class, will look like Code Listing 3-5.\n\n***Code Listing 3-5\\. Creating a\
    \ Focus Listener***\n\n```\nOnFocusChangeListener focusListener =\n    new OnFocusChangeListener()\n\
    \    {\n        public void onFocusChanged(View v, boolean hasFocus)\n       \
    \ {\n            adjustTextColor(v, hasFocus);\n        }\n    };\n\nprivate void\
    \ adjustTextColor(View v, boolean hasFocus)\n{\n    //Dangerous cast. Be sure\
    \ you are\n    //listening only to TextView focus changes\n    // or this could\
    \ go horribly wrong.\n    TextView t = (TextView)v;\n    if(hasFocus)\n      \
    \  t.setTextColor(Color.RED);\n    else\n        t.setTextColor(Color.WHITE);\n\
    }\n```\n\nIn addition, you have to add the following line corresponding to each\
    \ selectable element in the menu to attach the focus change listener object: `ItemOne.setOnFocusChangeListener(focusListener);`\n\
    \nWith the listener in place, you’ll now be notified each time one of your menu\
    \ elements gains or loses focus. In more advanced main menus, this method would\
    \ be the place to add image shifts, animations, 3D explosions, or other whiz-bang\
    \ graphical effects. In this example, you’ll have to settle for just changing\
    \ the text color. Now that the user can tell, through the color change, which\
    \ menu item is highlighted, you’ll need to react when they press the center key\
    \ to select an item.\n\n**Tip**\n\nIt’s possible to set the focused, unfocused,\
    \ and selected color of a `TextView` by using the `setTextColor(ColorStateList\
    \ colors)` method, which is a simpler way of implementing a text-based main menu.\n\
    \nThere are always many ways to accomplish a goal in a good IDE; I’ve simply selected\
    \ the more versatile (because I hope your applications move beyond text menus).\
    \ For more information on using `setTextColor`, see the Android documentation\
    \ at [http://code.google.com/android/reference/android/widget/TextView.html#setTextColor(int)](http://code.google.com/android/reference/android/widget/TextView.html#setTextColor(int)).\n\
    \n**Click and Select Events**\n\nYou’ve already seen how to register for `onClick`\
    \ events in the login screen, so you should be able to breeze through this section\
    \ without trouble. Code Listing 3-6 shows the example code to grab select events.\n\
    \n***Code Listing 3-6\\. Adding a Selection Listener***\n\n```\nOnClickListener\
    \ clickListener = new OnClickListener()\n{\n    public void onClick(View v)\n\
    \    {\n        String text = \"You selected Item: \";\n        switch(v.getId())\n\
    \        {\n            case IdOne:\n                text += \"1\";\n        \
    \        startActivity(\n                    new Intent(MainMenu.this, Login.class));\n\
    \                break;\n            case IdTwo:\n                text += \"2\"\
    ;\n                startActivity(\n                    new Intent(\n         \
    \               \"com.apress.example.CUSTOM_VIEW\"));\n                break;\n\
    \            case IdThree:\n                text += \"3\";\n                break;\n\
    \        }\n        //We'll get to the following line in a bit\n        status.setText(text);\n\
    \    }\n};\n```\n\nThe previous `switch` statement is the reason for calling `setID`\
    \ back when you were originally creating and laying out the `TextView` widgets.\
    \ When a menu item is selected or clicked by the pointer, the `onClick` function\
    \ is called, and the corresponding view is passed in as a parameter. You will\
    \ examine the ID of the view passed in to determine which menu item was selected.\
    \ This allows you to take the appropriate action for the menu selected. In this\
    \ way, you can switch to the previously defined login screen and your soon-to-be-written\
    \ custom view with the `startActivity` method call.\n\nThere’s still one small\
    \ step left, and if you look at the bottom of the `onCreate` function in the sample\
    \ code, you’ll spot it. You need to add a click listener to the view. Here’s the\
    \ line that should be run while you build up the widget list:"
