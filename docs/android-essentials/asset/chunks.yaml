  trans: "\n# Android 基础：创建带焦点和选择功能的菜单\n\n如前所述，为了制作菜单，我将再添加两个几乎与上一段代码完全相同的文本元素。为简洁起见，此处不再罗列。若想满足好奇心，请务必参考完整项目。现在所有菜单项已就绪，接下来需要在其获得或失去焦点时进行修改。\n\
    \n**聚焦吧，年轻学徒…**\n\n要处理焦点变化事件，必须创建 `OnFocusChangeListener` 抽象类的一个实现。示例中在 `MainMenu`\
    \ 活动类内部本地定义的版本，如代码清单 3-5 所示。\n\n***代码清单 3-5：创建焦点监听器***\n\n```\nOnFocusChangeListener\
    \ focusListener =\n    new OnFocusChangeListener()\n    {\n        public void\
    \ onFocusChanged(View v, boolean hasFocus)\n        {\n            adjustTextColor(v,\
    \ hasFocus);\n        }\n    };\n\nprivate void adjustTextColor(View v, boolean\
    \ hasFocus)\n{\n    //危险的类型转换。请确保你只监听 TextView 的焦点变化，\n    //否则可能导致严重错误。\n   \
    \ TextView t = (TextView)v;\n    if(hasFocus)\n        t.setTextColor(Color.RED);\n\
    \    else\n        t.setTextColor(Color.WHITE);\n}\n```\n\n此外，你需要为菜单中每个可选元素添加以下代码行，以附加焦点变化监听器对象：`ItemOne.setOnFocusChangeListener(focusListener);`\n\
    \n监听器就位后，每当菜单元素获得或失去焦点时，你都会收到通知。在更高级的主菜单中，此方法可用来添加图像切换、动画、3D 爆炸效果或其他花哨的图形特效。在本例中，我们仅通过改变文字颜色来实现。现在用户可以通过颜色变化得知哪个菜单项被高亮，接下来需要响应他们按下中间键选择菜单项的操作。\n\
    \n**提示**\n\n还可以使用 `setTextColor(ColorStateList colors)` 方法设置 `TextView` 的获得焦点、失去焦点和选中颜色，这是实现文本型主菜单的更简单方式。\n\
    \n在优秀的 IDE 中，达成目标的方法往往不止一种；我只是选择了更通用的方式（因为我希望你开发的应用程序能超越文本菜单）。关于 `setTextColor`\
    \ 的更多信息，请参阅 Android 文档：[`code.google.com/android/reference/android/widget/TextView.html#setTextColor(int)`](http://code.google.com/android/reference/android/widget/TextView.html#setTextColor(int))。\n\
    \n**点击与选择事件**\n\n你已经在前面的登录屏幕中学会了如何注册 `onClick` 事件，因此这部分内容应该能轻松掌握。代码清单 3-6 展示了捕获选择事件的示例代码。\n\
    \n***代码清单 3-6：添加选择监听器***\n\n```\nOnClickListener clickListener = new OnClickListener()\n\
    {\n    public void onClick(View v)\n    {\n        String text = \"你选择了菜单项：\"\
    ;\n        switch(v.getId())\n        {\n            case IdOne:\n           \
    \     text += \"1\";\n                startActivity(\n                    new\
    \ Intent(MainMenu.this, Login.class));\n                break;\n            case\
    \ IdTwo:\n                text += \"2\";\n                startActivity(\n   \
    \                 new Intent(\n                        \"com.apress.example.CUSTOM_VIEW\"\
    ));\n                break;\n            case IdThree:\n                text +=\
