    **Chapter 3: User Interface**


    **In Soviet Google, the Interface Renders You**


    In the scrum of mobile UI development architectures, Android’s rises to the top.
    If you have some mobile experience, you’ll find it to be a happy union of Java
    ME’s Canvas/Screen object and the BREW widget hierarchy, with


    some XML layout tools to boot. Each activity, as it’s launched from within your
    application, is placed on a screen stack. Android is already configured to handle
    closing down the top activity and activating the one under it when you ask or
    when the user presses Back. This setup allows you to


    think of every activity as the base for a single screen.


    Each activity may contain different views and view groups in a hierarchical tree.
    You can visualize this tree with the view groups and layout objects as the trunk
    and branches (because view group objects can be cast into views) and with the
    views or widgets as the leaves. A single *view*, in its most basic format, is
    a drawable rectangle. A *view group*, in its most basic format, is an object containing
    one or more views. This object hierarchy allows you to lay out complex user interfaces
    without having to go through the error-prone process of calculating view rectangles
    and widget overlap maps. If, on the other hand, that sort of thing is your bag,
    Android will stay out of the way and let you render in the style of Java ME’s
    hand-drawn game


    canvas.


    In this chapter, you’ll start with basic XML-based screen layouts and move toward
    the more complex custom canvas drawing. For the sake of this


    book, I’ll break down and discuss views as three major food groups:


    *XML-defined widgets/views and view groups*: Good for basic information display
    and menus


    *Android native views*: TextViews, LayoutGroups, ScrollBars, and text entry


    *Custom views*: The game programmer’s best friend


    **Android Essentials**


    **41**


    ![](index-48_1.png)


    You’ll start with a sample login screen, move into manipulating and laying out
    widgets and views in code, and finally render an interactive animation with a
    custom view.


    **Easy and Fast, the XML Layout**


    Getting started with XML layouts might seem simple at first, but it’s going to
    get complicated really quickly. You’ll start with the layouts and work your way
    down to the individual elements.


    **Laying Out**


    Most XML screens will be wrapped in a layout object. Layout objects


    come in many different flavors, each of which you’ll look at really quickly and
    then check out with a simple example in the following sections.


    **Caution** At compile time, these XML layout files are parsed and packed by Android
    into a tight binary format. This saves monstrous amounts of


    parsing time on startup. However, it means that the XML files cannot be changed
    by your code during runtime. More specifically, you may be able to change these
    XML files during execution, but it will do absolutely nothing to the layout of
    your application. Additionally, you have to pay a small


    performance price for inflating a view or view group from XML. Your mileage may
    vary depending on CPU load and UI complexity.


