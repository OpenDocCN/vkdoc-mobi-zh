    **Zen and the Art of Getting Even**


    Through the use of a devious little prank application, you’ve explored how intents,
    intent receivers, services, and activities work together in an advanced, mostly
    background, application. I’ll now go over, step by step, what you did and how
    you accomplished it.


    ***Getting It Done***


    You did the following:


    1\. You used an intent receiver with the right permissions and a system-level
    SMS intent to arrange for your PrankSMSReciever object to be


    instantiated each time an SMS arrives on the phone. If your intent receiver detected
    a very specific SMS payload, it would respond by sending an


    intent that would start your activity.


    2\. This activity, named PrankActivity, would listen for the specific intent action
    sent by the PrankSMSReceiver. When it received that precise


    intent action, your activity would display a “gotcha” message to the


    victim. At the same time, the activity would send out an intent meant to start
    up a service. If, at any point the victim/user pressed a key on the phone, the
    application would exit, and the music service would be


    terminated.


    3\. The service class, called PrankService, listening for the


    PrankActivity’s intent, would start and begin to play an obnoxious,


    predefined audio file. It would continue to play until it was told to stop by
    the PrankActivity’s call to the method stopService.


    **Android Essentials**


    **33**


    ![](index-40_1.png)


    **Note**


    This sample application does not deal with the handset’s native


    SMS application. Because all intent receivers are notified of an incoming intent,
    your application will be competing for user attention with Android’s SMS inbox
    application. In production, this may require a substantial timer and perhaps a
    trigger text payload, which is a little more subtle than


    “0xBADCAT0_Fire_The_Missiles!”


    FURTHER DEVIOUSNESS


    Here are a few ways you can explore and extend the prank


    application on your own:


    ▪ Get more evil by taking the activity out of the loop. Launch the


    PrankService directly from the intent receiver. Do not give the


    victim a way of shutting off the music.


    ▪ Add a different text payload to stop the music. This exercise


    would be an excellent one to combine with the previous one.


    ▪ Customize your “get even” message. Create a prefix that triggers


    the service and a payload, which is displayed by the main app


    activity. Pass this payload from the intent receiver to the activity


    using a payload within the intent. Taunting, sometimes, needs fine-


    tuning.


    These are just a few ways you can better learn the pieces of Android'
  trans: "\n# 上下文类\n\n你需要传递一个指向当前上下文的指针，以及代表测试媒体的静态变量。此时，你可以调用 `play`，然后一切便已就绪。通过这项服务，音频应在后台持续播放，直到你的主\
    \ Activity 调用了 `stopService` 方法。\n\n当 `stopService` 被调用时，将触发以下方法：\n\n```java\n\
    public void onDestroy()\n{\n    super.onDestroy();\n    player.stop();\n}\n```\n\
    \n## 仁慈之举\n\n既然你是一个善良的恶作剧者，你会给受害者留一条出路。正如你之前所见，Activity 是由意图接收器触发的，而 Activity\
    \ 随后会启动服务。正如你刚刚看到的，服务负责播放那段会让你的虚拟工程副总裁恼火的噪音。同样，因为你执行报复时心怀仁慈，所以你必须构建一种让受害者关掉音乐的方式。\n\
    \n在你的 `PrankActivity` 中添加以下方法即可实现你的仁爱之举：\n\n```java\npublic boolean onKeyDown(int\
    \ keyCode, KeyEvent event)\n{\n    stopService(new Intent(\n        \"com.apress.START_AUDIO_SERVICE\"\
    ));\n    finish();\n    return true;\n}\n```\n\n## 清单配置\n\n以下是清单文件的内容：\n\n```xml\n\
    <service android:name=\".PrankService\">\n    <intent-filter>\n        <action\
    \ android:name=\n            \"com.apress.START_AUDIO_SERVICE\" />\n        <category\
    \ android:name=\n            \"android.intent.category.DEFAULT\" />\n    </intent-filter>\n\
    </service>\n```\n\n## 报复的禅意与艺术\n\n通过使用一个狡黠的小型恶作剧应用程序，我们探索了意图、意图接收器、服务和 Activity\
    \ 如何在一个高级的、主要运行在后台的应用程序中协同工作。下面我将逐步介绍你做了什么以及是如何实现的。\n\n### 实施步骤\n\n你做了以下几件事：\n\
    \n1.  你使用了一个具有适当权限的意图接收器，以及一个系统级的短信意图，使得每当手机收到短信时，你的 `PrankSMSReciever` 对象就会被实例化。如果你的意图接收器检测到一个非常特定的短信内容，它就会通过发送一个意图来启动你的\
    \ Activity 作为响应。\n\n2.  这个名为 `PrankActivity` 的 Activity 会监听由 `PrankSMSReceiver`\
    \ 发送的特定意图动作。当它接收到那个精确的意图动作时，你的 Activity 会向受害者显示一条“逮到你了”的消息。同时，该 Activity 会发送一个意图来启动一项服务。如果在任何时候受害者/用户按下了手机上的某个按键，应用程序将退出，音乐服务也会终止。\n\
    \n3.  名为 `PrankService` 的服务类会监听 `PrankActivity` 的意图，一旦收到即开始播放一个令人讨厌的、预定义的音频文件。它会持续播放，直到被\
    \ `PrankActivity` 对 `stopService` 方法的调用所终止。\n\n**注意**  \n此示例应用程序不处理手机自带的短信应用程序。由于所有意图接收器都会收到传入意图的通知，你的应用程序将与\
    \ Android 的短信收件箱应用程序争夺用户注意力。在实际产品中，这可能需要一个可观的计时器，以及一个更微妙的触发文本内容，而不是像 `“0xBADCAT0_Fire_The_Missiles!”`\
    \ 这样直白。\n\n## 更多恶作剧思路\n\n以下是你可以自行探索和扩展这个恶作剧应用程序的几种方法：\n\n-   将 Activity 从循环中移除，变得更“邪恶”。直接从意图接收器启动\
    \ `PrankService`。不要给受害者关闭音乐的任何途径。\n\n-   添加一个不同的文本内容来停止音乐。这个练习与上一个练习结合进行会非常棒。\n\
    \n-   自定义你的“讨回公道”消息。创建一个触发服务的前缀，以及一个由主应用 Activity 展示的消息内容。使用意图内的额外数据将此内容从意图接收器传递给\
    \ Activity。嘲弄，有时需要精准微调。\n\n这些只是一些让你更好地学习 Android 各个组件的方式。"
- fmt: "# Moving Data in Android\n\nFinally, to round your knowledge about Android's\
    \ application building blocks, you need to focus on the content resolver. Android\
    \ does not give the SDK particular access to the phone's filesystem, as Brew does.\
    \ Nor does it offer a `RecordStore`, as does Java ME. Your primary method for\
    \ passing data between your activities, intent receivers, and services is going\
    \ to be through the `ContentResolver` superclass. Though you can store data through\
    \ files, preferences, and other databases, content resolvers can take many forms,\
    \ and Android ships with a few important content resolvers built in. Here's a\
    \ list, at time of publication, of the major Android content resolvers you'll\
    \ probably want to interact with on a regular basis:\n\n- Browser\n  - Bookmarks\n\
    \  - Search history\n- Phone calls\n  - Call log\n  - Recent calls\n- Contacts\n\
    - System settings\n  - Hardware settings (Bluetooth, networking settings)\n  -\
    \ Software settings\n\nAndroid's documentation gives an excellent walk-through\
    \ of using the contacts content resolver here: [http://code.google.com/android/devel/data/contentproviders.html#usingacp](http://code.google.com/android/devel/data/contentproviders.html#usingacp).\n\
    \nQuickly, I'll walk you through adding a bookmark to the phone browser's bookmark\
    \ list. First, you'll want to search the current list of bookmarks to see whether\
    \ your link is in place. Second, you'll add your bookmark if it isn't there.\n\
    \n> **Note**  \n> It is possible to create your own content providers as a way\
    \ to wrap Android's SQLite implementation for universal access. You'll get into\
    \ how to do this in later chapters. For now you're just going to handle the \"\
    client\" side of this content resolver interaction.\n\nAndroid uses a custom implementation\
    \ of SQLite to store information locally. If you're not familiar with the basics\
    \ of SQL, now might be a good time to brush up. I'm going to assume, for the sake\
    \ of expediency, that you understand basic SQL searching commands. If you need\
    \ to brush up, Apress has an excellent resource at [http://apress.com/book/catalog?category=145](http://apress.com/book/catalog?category=145).\n\
    \n## Shameless Self-Promotion\n\nLet's say in the \"About\" section of your application\
    \ that you want to have a button that adds your commercial software page to the\
    \ user's web bookmarks. You want to make sure it isn't added twice if your user\
    \ has clicked the button again by accident. For the sake of this simple demonstration,\
    \ you'll trigger this event in your sample application when the user presses a\
    \ key.\n\n> **Note**  \n> On an amusing note, if you need proof, as a developer,\
    \ that Android is still not quite fully baked, you need look no further than the\
    \ documentation for `android.content.ContentResolver` under the method `getDataFilePath`,\
    \ which states \"DO NOT USE THIS FUNCTION!! Someone added this, and they shouldn't\
    \ have. You do not have direct access to files inside of a content provider. Don't\
    \ touch this. Go away.\" It's good to know that even the technical writers for\
