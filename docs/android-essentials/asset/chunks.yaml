    You’ll get into the other files as you add functionality to your repertoire.


    Let’s get your application up and running.


    **Running, Debugging, and Causing General Mayhem**


    Running and debugging are, thankfully, extremely straightforward with


    Android. From within Eclipse, pull down the Run menu and select…wait


    for it…Run. This launches the Android emulator.


    **Tip**


    Once you’ve started the emulator for the first time, you don’t


    need to quit or close it down. The latest version of the SDK ships with an emulator
    that can take minutes to “boot up.” While the emulator is running, each subsequent
    Run or Debug execution will build and deploy your latest code to the emulator.
    The emulator will accept the changes and


    automatically launch your new project. This is the opposite of BREW or


    J2ME, which must relaunch after each change in your source base.


    Once the Android emulator is up and running, you should see the “Hello


    World, *YourApplicationName*” message.


    Again, “Hello, World” as a programming example is, for lack of a better term,
    emphatically lame, so I’ll skip it and move on to a more practical example: a
    simple splash screen. Along the way, you should come to


    understand activities, intents, intent filters, services, and content providers.


    **8**


    **Android Essentials**


    ![](index-15_1.png)


    **Chapter 2: The Application**


    An application in Android is defined by the contents of its manifest. Each Android
    application declares all its activities, entry points, communication layers, permissions,
    and intents through AndroidManifest.xml. Four


    basic building blocks, when combined, comprise a rich Android


    application:


    *Activity*: The most basic building block of an Android application *Intent receiver*:
    A reactive object launched to handle a specific task *Service*: A background process
    with no user interface


    *Content provider*: A basic superclass framework for handling and storing data
    In this chapter, I’ll break down each specific piece with a concrete


    functional example. First up is the activity, the core building block of a stand-alone
    Android application.


    **Getting Active**


    All Android mobile applications, at least in the traditional sense, will revolve
    around an activity. If you’ve had any experience with other mobile platforms,
    Android’s activity is quite similar to BREW’s applet or Java ME’s midlet. There
    are, however, a few very important differences.


    ***Android vs. Java ME vs. BREW***


    A BREW application will, in the vast majority of all cases, consist of a single
    applet. That applet communicates with the rest of the handset


    through receiving and sending events. You can think of a Java ME


    application, on the other hand, as an extension of the Midlet class. The midlet
    has functions for starting, stopping, pausing, key handling, and performing any
    other interaction between the handset and application. A Java ME application usually
    consists of a single midlet.


    **Android Essentials**


    **9**


    ![](index-16_1.png)


    Android applications can have any number of activities registered with the handset
    through the AndroidManifest.xml file. Android’s multiactivity


    architecture is probably the major difference between developing for


    Android and developing for other handset SDKs. This single fact makes it much
    easier to write modular, compartmentalized code. In BREW and Java


    ME, a developer will implement most functionality within the confines of the midlet
    or the applet. In Android, you can write an activity, content handler, intent
    receiver, or service to handle nearly anything. Once you’ve written an activity
    to edit a text file, you can refer to this activity in all future applications
    you write by sending and receiving intent actions. This isn’t to say that such
    architecture isn’t possible within BREW or Java ME.


    It just has to be done at the Java, C, or C++ level or, in Brew, with


    cumbersome extensions instead of being built smoothly into the application framework.


    ***Functionality***


    Just like the midlet, an activity uses a series of functions to interact with
    the outside world. At its base, your activity must override the method


    onCreate. Other functions you’ll want to override are onStop, onPause,


    onResume, and onKeyDown. These few functions are what will let you tie


    your activity into the Android handset at large.


    By default, new Android applications created within Eclipse will


    implement a “Hello, World” application. I’ll show you how to go from this basic
    application to a fully functional splash screen.


    **Getting Splashy**


    You can download the packaged version of this splash screen example


    from the do[wnloads section of www.apress.com if you want to use it as a](http://www.apress.com)


    starting point for your own Android application or you want to follow


    along in a more passive fashion. In this example, because it is your first, I
    will go through it in a series of small steps. I’ll break down exactly what **10**


    **Android Essentials**


    ![](index-17_1.png)


    needs to be written, from adding a new image resource to modifying XML


    layout files. Down the road, examples will not parse out into such minute detail.
    This should be the only chapter that will read like a tutorial for beginners.


    ***Adding the Image Resource***


    First you’ll need a sample splash screen image. The “socially awkward”


    splash screen I’ve included is not going to win any awards, but it is a good poke
    at the rash of social networking applications that seem to keep


    cropping up in the mobile space right now.


    To add this new resource, I’ve placed menu_background.jpg inside


    res/drawable. Make sure a new ID is added to R.java. It should look


    something like this:


    **public static final int** menu_background=0x7f020001;


    This is now your means of loading and drawing the image from within


    your code. You’ll return to this concept in the next chapter on user


    interaction.


    ***Creating an XML Layout File***


    Now that you have an image resource, you can add it to your XML layout


    file. These files are kept in res/layout/, and you should currently have one called
    main.xml. Add a new XML file called splash.xml, and copy


    the contents of the main.xml file into it. Next, modify the file by removing the
    <TextView> tag and add an <ImageView> tag that looks like the following:


    <ImageView android:src="@drawable/menu_background"


    android:layout_width="fill_parent"


    android:layout_height="fill_parent">


    </ImageView>


    Using Android’s XML layout objects is simple and straightforward. As I


    mentioned, files in the /res directories can be referenced with the @


    **Android Essentials**


    **11**


    ![](index-18_1.png)


    symbol as shown earlier, for example,


    android:src="@drawable/menu_background". Further, layout_width and layout_height
    dictate the size of the image view. Look to make sure your new layout file has
    been added to R.java. It should appear as


    follows:


    public static final int splash=0x7f030001;


    ***Drawing the Splash Screen***


    Now that your splash screen is defined, it’s time to activate and paint it.


    Your existing Android activity is already drawing main.xml, so you’ll


    shift to your new splash layout. To make the switch, change this code:


    setContentView(R.layout.main);


    in the method onCreate to this code:


    setContentView(R.layout.splash);


    Run the application, and watch your newly created splash screen come to life.
    If you’ve gotten errors thus far, check to make sure your names for everything
    match up. If the image isn’t drawing, make sure it’s been


    correctly placed in the res/drawable folder and that splash.xml refers


    to the correct name and file.


    ***Timing Is Almost Everything***


