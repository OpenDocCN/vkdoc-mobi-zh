    # 用户界面


    你设计了一个恶作剧般的应用程序，强制你使用了所有三个组件（Activity、Service 和 Intent Receiver），并让它们三者相互通信。几乎作为附带内容，你探索了当短信到达手机时如何被通知。


    最后，你探索了如何检索和写入设备原生内容解析器：浏览器书签数据库。事实证明事情并不总是一帆风顺，Android 拒绝了你通过传统内容解析器方法添加新书签的尝试，这迫使你回退到一个旨在完成相同任务的辅助函数。既然我已经介绍了基础知识，是时候让手机用户多参与一些了。


    ---


    # 第 3 章：用户界面


    ## 在苏维埃谷歌中，界面渲染你


    在移动 UI 开发架构的混战中，Android 的架构脱颖而出。如果你有一些移动开发经验，你会发现它是 Java ME 的 Canvas/Screen 对象与
    BREW 控件层次结构的完美结合，并辅以一些 XML 布局工具。每个 Activity 从你的应用程序中启动时，会被放置在一个屏幕栈中。当你要求或用户按下返回键时，Android
    已经配置好如何处理关闭顶部 Activity 并激活其下方的 Activity。这种设置让你可以将每个 Activity 视为单个屏幕的基础。


    每个 Activity 可以包含一个层次树结构中的不同视图和视图组。你可以将视图组和布局对象想象为树干和树枝（因为视图组对象可以转换为视图），而视图或控件则是树叶。一个基本的**视图**是一个可绘制的矩形。一个基础的**视图组**是一个包含一个或多个视图的对象。这种对象层次结构允许你布置复杂的用户界面，而无需经历计算视图矩形和控件重叠图的易出错过程。另一方面，如果你喜欢那种方式，Android
    也不会干涉，让你以 Java ME 的手绘游戏画布风格进行渲染。


    在本章中，你将从基本的基于 XML 的屏幕布局开始，然后转向更复杂的自定义画布绘制。为了本书的叙述，我将把视图分为三大类：


    - **XML 定义的控件/视图和视图组**：适用于基本信息显示和菜单

    - **Android 原生视图**：`TextView`、`LayoutGroup`、`ScrollBar` 和文本输入

    - **自定义视图**：游戏程序员的最佳朋友


