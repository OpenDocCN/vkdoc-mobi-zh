    player = MediaPlayer.create(**this**, R.raw.test);


    player.start();


    }


    Remember, onStart is an overridden method, so you’ll have to call the


    superclass version of the same function first, or Android will get cranky with
    you. At that point, you’ll just have the MediaPlayer static class


