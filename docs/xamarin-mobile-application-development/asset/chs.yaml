- "# 前置要求\n\n如果你主要使用 `Xamarin.Forms`，除了需要具备一定的 C# 基础外，应该能够轻松掌握本书内容。然而，如果你想深入研究 `Xamarin.Android`、`Xamarin.iOS`\
  \ 或 `Xamarin.Forms` 的自定义渲染器，请注意以下事项：\n\n本书并非 iOS 入门教程。虽然它对关键主题进行了初步介绍，然后进入“进阶”内容，但你仍需参考其他资料来全面掌握\
  \ iOS 和 `Xamarin.iOS` 的基础知识。请查阅 `Xamarin.iOS` 入门指南，了解以下主题：\n- 使用 `Xamarin Studio`\
  \ 或 `Visual Studio` 创建 `Xamarin.iOS` 解决方案\n- `Xcode` 界面生成器或 `Xamarin Designer for\
  \ iOS`\n- 故事板（Storyboard）和跳转（Segue）\n- `UIView` 和 `UIViewController`\n- 基本 UI 控件：`UILabel`、`UITextField`、`UIButton`\
  \ 和 `UIImageView`\n- 图片与屏幕尺寸\n- 本地资源\n- 手势操作\n\n本书也并非 Android 入门教程。虽然它对关键主题进行了初步介绍，然后进入“进阶”内容，但你仍需参考其他资料来全面掌握\
  \ Android 和 `Xamarin.Android` 的基础知识。请查阅 `Xamarin.Android` 入门指南，了解以下主题：\n- 使用 `Xamarin\
  \ Studio` 或 `Visual Studio` 创建 `Xamarin.Android` 解决方案\n- `Xamarin Designer for Android`\n\
  - 活动（Activity）、XML 布局和视图（View）\n- 活动生命周期\n- 基本 UI 控件：`TextView`、`EditText`、`Button`\
  \ 和 `ImageView`\n- 片段（Fragment）\n- 图片与屏幕尺寸\n- 本地资源\n- 手势操作\n\n## 本书未涵盖的内容\n\nXamarin\
  \ 平台是一个庞大的项目，涵盖了多个操作系统的技术和 API。若要详尽地阐述所有这些内容至足够实用的程度，需要数千页而非数百页的篇幅，这意味着一本书无法面面俱到。以下内容不在本书的讨论范围之内：\n\
  - 本书正文未涉及 `Xamarin.Forms` 的可扩展应用程序标记语言（XAML），但提供了完整的、可下载的 XAML 代码示例。\n- 集成开发环境（IDE），包括\
  \ `Visual Studio` 和 `Xamarin Studio`。\n- UI 设计器工具，包括 `Xcode` 界面生成器、`Xamarin Designer\
  \ for iOS` 和 `Xamarin Designer for Android`。\n- 部分关于 `Xamarin.Android` 的入门主题（参见“前置要求”）\n\
  - 部分关于 `Xamarin.iOS` 的入门主题（参见“前置要求”）\n\n## Windows Phone\n\n`Xamarin.Forms` 应用程序可以在\
  \ Windows Phone 上运行。Windows Phone 项目可以构建为支持 Silverlight 或 WinRT。本书是为 Windows Phone\
  \ Silverlight 实现编写的，但书中大部分内容也适用于 WinRT（并且指出了部分 WinRT 的差异）。\n\n## 系统需求\n\n无论你是在 Mac\
  \ 还是 Windows 工作站上进行开发，都需要下载并运行 Xamarin 统一安装程序，网址为 `http://xamarin.com/download`。这将使你能够安装和配置\
  \ Xamarin 平台，包括 Xamarin Android SDK、Xamarin iOS SDK、`Xamarin Studio`，以及适用于 `Visual\
  \ Studio` 的 Xamarin 插件。\n\n以下是在 Xamarin 开发中的操作系统和软件要求。\n\n### Mac\n\n要在 Mac 上构建\
  \ Xamarin 应用程序，必须满足以下要求。\n- 在 OS X 上使用 `Xamarin.Forms` 需要 `Xamarin Studio 5+`。\n\
  - 开发 iOS 应用程序：\n  - 最新版本的 `Xcode`\n  - Mac OS X 10.9.3+（Mavericks）或 10.10+\n- 无法在\
  \ Mac 上开发 Windows Phone 应用程序。\n\n### Windows\n\n要在 Windows 工作站上构建 Xamarin 应用程序，必须满足以下要求。\n\
  - 最新版本的 `Xamarin Studio` 或 `Visual Studio 2012+`（非 Express 版）\n- Windows 7+\n- 对于\
  \ iOS 开发，需要一台联网的 Mac。\n- 对于 Windows Phone 开发，你需要 Windows Phone SDK。\n- 要使用 PCL（可移植类库），你需要\
  \ `Visual Studio 2013+` 或可移植参考库程序集 4.6。若要在不使用 `Visual Studio` 的情况下通过 `Xamarin Studio`\
  \ 使用 PCL，请下载可移植库工具 2。\n\n### Xamarin.Forms\n\n要使用 `Xamarin.Forms`，你的应用程序构建必须面向以下平台。\n\
  - iOS 6.1+\n- Android 4.0+\n- Windows Phone 8（在撰写本文时，以及之后的更新版本）\n\n## 勘误\n\n作者、技术审阅者以及\
  \ Apress 的众多工作人员已尽最大努力查找并消除本书文本和代码中的所有错误。即便如此，仍难免会留下一两处瑕疵。为了让你及时了解情况，Apress 的书籍页面（`www.apress.com/9781484202159`）上有一个“勘误”选项卡。如果你发现任何尚未报告的错别字或错误代码，请通过电子邮件\
  \ `support@apress.com` 告知我们。\n\n## 客户支持\n\nApress 希望听取你的意见——你喜欢什么、不喜欢什么，以及你认为下次可以做得更好的地方。你可以将意见发送至\
  \ `feedback@apress.com`。请务必在邮件中注明书名。\n\n## 联系作者\n\n你可以在 Twitter 上关注我（`@lexiconsystems`）、阅读我的博客（`www.mobilecsharpcafe.com`），或发送电子邮件至\
  \ `dan@lexiconsystemsinc.com` 联系我。\n\n如果你需要 Xamarin 产品的常规技术支持，请访问 Xamarin 支持页面 `http://xamarin.com/support`\
  \ 或 Xamarin 论坛 `http://forums.xamarin.com/`。\n\n\n\n"
- '# 摘要


  以上就是开始阅读本书所需了解的全部内容：目录、预备知识、免责声明、学习路径、地图和路标。如果你刚接触 Xamarin 平台，欢迎加入社区！如果你对 Xamarin
  已有经验，感谢你的阅读，本书同样会为你提供丰富的内容。


  我向你保证，阅读本书、理解其中的概念并练习书中的代码技巧，将提升你对 Xamarin 的领悟力，并将你的编程技能推向新的高度。我也希望让你对 Xamarin 平台这一令人惊叹的成就产生更深刻的理解。


  ## 致谢


  组建一群聪明且专注的人，是完成大事的好方法。有人称之为集体或智囊团，也有人称之为开源精神。在此，我想与大家分享本书的创作团队，并公开感谢他们。


  James DeWolf，我在 Apress 出版社的高级编辑，是我所见过的任何领域中最杰出的领导者之一。感谢你，Jim，感谢你给予我这次机会，以及你始终如一且恰到好处的跟进。Anne
  Marie Walker，你的每一次内容编辑不仅让本书变得更好，也教会了我如何写作。Melissa Maldonado，感谢你对我众多特殊要求的耐心，感谢你确保一切按时推进，并最终让本书顺利出版。同时，也感谢
  Apress 出版社所有其他编辑、排版人员及工作人员。


  特别感谢技术审阅者兼 Xamarin MVP 的 Ed Snider，感谢你仔细审阅了每一个代码示例并提出了睿智的建议。正因为有你，本书才变得好得多。如果书中仍有任何错误，那一定是我在你审阅之后偷偷加进去的。


  本书包含 200 多个 C# 代码示例。所有 UI 示例也均用 XAML 构建，并提供下载。非常感谢 XAML 开发者 Jason Awbrey 和 Alex
  Blount 促成了这一切。


  Xamarin 团队的成员们积极乐观、才华横溢，并且在各个方面都给予了极大的帮助。他们不仅为我们带来了出色的产品套件，也每天都向我们传递积极向上的态度。感谢 Mike
  Bluestein，你强调了 Xamarin.iOS 和 Xamarin.Android 的重要性；感谢 Bryan Costanich，你指出 Xamarin.Forms
  是未来的方向——我采纳了你们二人的建议。Jason Smith，作为 Xamarin.Forms 的技术负责人，与你在亚特兰大 Evolve 大会共进午餐的经历，为本书提供了明确的焦点和扎实的基础。感谢
  Joseph Hill 的建议和鼓励。感谢 Spencer Montgomery、Erik Polzin 和 Matt Mason 作为合作伙伴的支持。感谢 James
  Montemagno、Mark Smith、Pierce Boggan 以及许多其他人。


  此外，还要感谢 Miguel de Icaza，感谢你联合创立了 Xamarin，并成就了才华横溢的自己。我很荣幸能成为你集体中的一员。


  优秀的博主们为我们提供了指导和幽默。本书的成书离不开这些优秀博主和 Xamarin 论坛贡献者，他们帮助确立了方向并确认了许多主题的细节：来自 `motzcod.es`
  的 James Montemagno、来自 `syntaxismyui.com` 的 Adam Wolf（又名 AdamKemp）、来自 `jimbobbennett.io`
  的 Jim Bennett、Tomasz Cielecki（又名 Cheesebaron）、来自 `magenic.com` 的 Kevin Ford、来自 `jesseliberty.com`
  的 Jesse Liberty，以及许多其他人。


  许多才华横溢的人士审阅了这些章节并提出了宝贵意见，让本书变得更好。其中包括：Mike Bluestein、Jim Bennett、Mark Allan、Adam
  Wolf、David Ortineau、Jesse Liberty、William Grand、Michael Lant 和 Ed Hubbell。


  在微软，我要感谢 Dan Stolts、Mark Eisenberg、Donna Malayeri 和 Michael Cummings，感谢他们让我厘清了 Azure
  与 Xamarin 的集成。


  在 IBM，感谢 Craig Porter 和 Philip Sacchitella，让我正确理解了 IBM MobileFirst。


  在 iTexico，感谢 Abhijeet Pradhan 和 Mathieu Clerici，感谢你们一流的 Xamarin 开发工作。


  感谢 Lexicon Systems 的所有人！包括 Jonathan LaMaster、Tom Ruane，以及所有为此付出努力的人。感谢 Margo Chevers，坚定了我完成本书的决心。还要感谢
  David Alexander 的编辑和排版，直到有出版社接手让你得以休息。


  感谢我的父母和家人始终如一、充满热情的 support。


  最要感谢的是我的爱人 Kristina。你为支持这项工作付出了超乎寻常的努力，我心存感激。


  还有，差点忘了，特别感谢分号。如果没有你在几乎每一行末尾坚定的分隔，本书中（以及我们所有解决方案中）的 C# 代码将只是一堆无法解析的命令、关键字、符号和对象的模糊混合。谢谢你，分号。


  最后，感谢所有未在此列出的、为本书提供帮助、建议或支持的人！



