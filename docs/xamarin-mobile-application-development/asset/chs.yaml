- '# 使用 Xamarin 进行移动开发


  用 C# 进行移动开发与以往大多数人使用该语言的方式截然不同。我们用它来开发非 Windows 平台的应用，即 Android 和 iOS。这既是机遇也是挑战。机遇在于，我们能接触到构成由不同平台和尺寸的手机与平板电脑组成的新业务应用生态系统的丰富技术。挑战在于，这些设备和平台的许多方面对我们来说都是崭新的，需要学习很多知识。当然，我们也可以用
  C# 构建 Windows Phone 和平板电脑应用。跨平台开发的本质是构建能在多个移动操作系统上运行的应用：例如，在 Android 和 iOS 上；或在
  iOS 和 Windows Phone 上；亦或在 iOS、Android 和 Windows Phone 上。通过运用本书涵盖的跨平台技术，你将具备为所有主流移动平台进行开发的能力！


  这段旅程中最令人兴奋/畏惧的部分是掌握多个操作系统的来龙去脉。幸运的是，Xamarin 为我们屏蔽了许多细节，封装了平台特定的 API，并通过 C# 展示了熟悉的
  .NET 框架。反过来，我们得以详细了解每个平台由 C# 封装的用户界面（UI）API，从而精确控制应用的可视化设计。关键在于弄清楚在开发过程中，每个操作系统的哪些方面是重要的，哪些可以交由
  Xamarin 处理。虽然深入理解总是有益的，但时间有限，最重要的是，我们需要交付可运行的软件。


  关键问题如下：我们应如何着手开发跨平台移动应用？鉴于我们在 C# 开发方面已有的经验和背景，如何将这些知识传承并在移动领域加以利用？最后，鉴于需要学习这么多关于这些操作系统的知识，我们需要掌握哪些内容才能入门并帮助解决重要挑战？


  在编写跨平台应用时，一个关键目标是代码重用。重用的越多，项目就越快、成本越低，维护成本也越低。Xamarin 将此称为移动开发的独角兽：一次编写，到处部署。任何寻找独角兽的旅程都始于一位能吸引它出现的美丽少女。我们的美丽少女就是跨平台设计。


  让我们探索 Xamarin 如何在追求跨平台设计的同时帮助我们解决移动开发难题。


  ## 什么是 Xamarin？


  Xamarin 是一个开发平台，允许我们用 C# 编写原生的、跨平台的 iOS、Android 和 Windows Phone 应用。


  它是如何做到的呢？请继续阅读。


  ### 封装的原生 API


  Xamarin 平台源自将 .NET 引入 Linux 的开源 Mono 项目，它将 .NET 移植到 iOS 和 Android 操作系统，并支持 Windows
  Phone（见图 1-1）。`Xamarin.Android` 底层是 Mono for Android，而 `Xamarin.iOS` 底层是 `MonoTouch`。这些是原生
  Android 和 iOS API 的 C# 绑定，用于移动设备和平板电脑的开发。这赋予我们使用 Android 和 iOS 用户界面、通知、图形、动画以及位置和摄像头等电话功能的能力——全部通过
  C# 实现。每次 Android 和 iOS 操作系统发布新版本，都会伴随一个包含新 API 绑定的 Xamarin 新版本。Xamarin 的 .NET 端口包含数据类型、泛型、垃圾回收、语言集成查询（LINQ）、异步编程模式、委托以及
  Windows Communication Foundation（WCF）子集等功能。库通过链接器进行管理，只包含引用的组件。`Xamarin.Forms` 是构建在其他
  UI 绑定和 Windows Phone API 之上的一层，提供了一个完全跨平台的 UI 库。


  ![A978-1-4842-0214-2_1_Fig1_HTML.jpg](img/A978-1-4842-0214-2_1_Fig1_HTML.jpg)


  图 1-1. Xamarin C# 库绑定到原生 OS SDK 以及 .NET


  因此，我们拥有了一个包含 iOS 和 Android C# 绑定库并支持 Windows Phone 的 .NET 环境，可运行在我们选择的移动操作系统上。太棒了。那么，我们如何使用这些库构建
  UI 并编写代码来创建移动应用呢？当然是使用开发环境和 UI 设计器。


  ### 开发环境


  Xamarin 提供了开发环境和设计器，帮助我们在 Windows 或 Mac 上构建移动应用。Xamarin 开发环境的两个主要选择是：Mac 或 Windows
  上的 Xamarin Studio，或者 Windows 上安装了 Xamarin for Windows 插件的 Visual Studio。即使使用 Visual
  Studio 作为开发环境，编译 iOS 应用也始终需要一台 Mac。


  ### UI 设计器


  用于创建移动用户界面的工具称为设计器。它们会以其各自的专有文件格式生成可扩展标记语言（XML）文件。Xamarin 提供两种设计器：


  - Xamarin Designer for Android

  - Xamarin Designer for iOS


  有了这些设计器，对原始原生 XML 编辑器的需求就降低了。构建 Android 或 iOS UI 所需的任何东西都可以在 Xamarin 的工具中找到。然而，iOS
  开发者仍然经常使用 Xcode Interface Builder，而 Android 开发者（较少地）使用诸如 Eclipse 的 Android Development
  Tools（ADT）插件等 XML 编辑器。XML 布局始终就是 XML 布局，选择何种工具很大程度上取决于品味和个人偏好，甚至是否使用设计器工具本身也是如此。一些
  Xamarin 开发者选择完全不用设计器，而是手动用 C# 为所有平台编写 UI 代码。我建议使用设计器来帮助学习文件格式、UI 元素及其属性。至少，像使用辅助轮一样使用设计器工具，直到你准备好自由骑行。


  > **注意：** 本书侧重于代码而非工具。有关设计器和开发环境的更多信息，请参考 Xamarin 在线文档：[`developer.xamarin.com`](http://developer.xamarin.com)。


  ## 熟悉的部分：熟悉的 C# 和 .NET 技术


  Xamarin 开发使我们能够利用许多已经了解的 C# 开发知识。我们可以运用以下方面的顶层知识：


  - 基于 HTML 的页面

  - 可扩展应用程序标记语言（XAML）

  - UI 控件

  - 事件驱动逻辑

  - 视图生命周期

  - 状态管理

  - 数据绑定

  - Web 服务


  我们也可以直接、即时地使用许多 .NET 特定的技术，包括：


  - .NET 数据类型

  - C# 类、方法和属性

  - Lambda 表达式

  - WCF（子集）

  - 泛型（子集）

  - 本地文件访问

  - 流

  - Async/Await

  - ADO.NET（子集）


  我只列举了一小部分，所以你可以看到，对于 C# 开发者来说，这里有大量熟悉的基础，可以帮助我们成功跨入这个新领域。




  '
- '# 新特性：移动开发技术


  在本书中，你将探索移动开发中常见的 C# 技术与模式。其中一些与我们习惯的传统 .NET 开发方法完全相同，一些则略有变化，而少数则发生了较大的改变。以下是关键主题：


  - 移动 UI 是 C# 移动开发中最大的一块全新学习领域。`Xamarin.Forms` 提供了一个跨平台 UI 工具包，包含现成的表单、页面、布局、视图和控件。`Xamarin.iOS`
  和 `Xamarin.Android` 则提供了各自原生 UI 的绑定。（参见第 2 章至第 6 章以及第 8 章。）

  - 移动应用中的数据访问层通常将控件和页面绑定到数据模型上，这些数据模型由本地数据库填充，并通过 Web 服务与远程数据服务器同步。（参见第 7 章。）

  - 通过 SQLite 访问本地数据库与通常的数据库供应商有所不同，不过 ADO.NET 访问提供了一条熟悉的途径，而 `SQLite.NET` 组件则是一个功能丰富的选择。（参见第
  7 章。）

  - 数据绑定是 `Xamarin.Forms` 开发的核心，通常通过模型-视图-视图模型（MVVM）模式来实现。（参见第 7 章。）

  - 跨平台架构是一系列代码共享策略的集合，旨在进一步实现我们“编写一次，随处运行”的目标。这些策略包括可移植类库结合依赖注入、共享文件和项目，以及条件编译。（参见第
  9 章。）


  让我们逐一探讨这些主题。


  ## 移动 UI


  从 Web 开发转向跨平台移动开发时，你需要吸收大量新知识，主要集中在用户界面领域。首先面临的是新操作系统 UI API 的问题。Xamarin 通过提供针对主流操作系统的平台特定
  C# 绑定（即 `Xamarin.Android` 和 `Xamarin.iOS`）来帮助解决这一问题，而 `Xamarin.Forms` 则提供了针对这两个平台以及
  Windows Phone 的跨平台绑定。另一组挑战则涉及 Web 应用与移动应用之间的设计差异。紧凑的屏幕、触控灵敏度以及手持设备的外形因素共同造就了一种全新的用户体验。这需要采用根本性的新设计和开发方法，促使我们探索移动
  UI 设计。


  ### Xamarin.Forms 与平台特定 UI


  使用 C# 进行移动 UI 开发主要有两种方法，我们可以分开、互换或结合使用：


  - `Xamarin.Forms` 是一个面向 Android、iOS 和 Windows Phone 的跨平台 UI 工具包。

  - 平台特定 UI 则使用 `Xamarin.Android`、`Xamarin.iOS` 和 Windows Phone SDK。


  `Xamarin.Forms` 包含一个完全跨平台的工具包，提供了一套统一的 UI 控件、布局和页面，这些元素能巧妙地映射到 iOS、Android 和 Windows
  Phone 上各自的原生 UI 绑定。由于 `Xamarin.Forms` 比平台特定库更新，其功能也相对较少。每个版本都让我们更接近功能完备的跨平台完美体验，但有时我们需要超越开箱即用的
  `Xamarin.Forms` 类所提供的功能。在这些情况下，我们使用平台特定库，要么针对整个页面，要么仅针对页面的某一部分，通过使用 `Xamarin.Forms`
  中名为 `PageRenderers` 的自定义渲染器来实现。


  平台特定的方法更为古老且更成熟，因此也更为详细且功能丰富。这涉及直接绑定到平台特定 UI API 的库：`Xamarin.Android` 用于 Android，`Xamarin.iOS`
  用于 iOS。对于 Windows Phone，我们使用 Windows Phone SDK，这是一个原生 API，无需 Xamarin 绑定。这些平台特定的库使我们能够深入访问原生
  UI，以提供视觉惊艳、交互丰富的用户体验。但这也是有代价的：平台特定的代码需要为每个平台设立独立的 UI 项目，且代码重用性极低。


  注意


  `Xamarin.Forms` 是本书的重点，并由使用平台特定 UI 的自定义渲染器加以补充。然而，使用 `Xamarin.iOS` 和 `Xamarin.Android`
  而不使用 `Xamarin.Forms` 来创建平台特定 UI 项目的开发者，可以充分利用第 2 章至第 7 章中关于 iOS 和 Android 的章节。如果你采用平台特定的方法，请务必查阅其他资料（例如
  Xamarin 在线文档）以了解 `Xamarin.Android` 和 `Xamarin.iOS` 的解决方案设置及基础知识。


  ### 移动 UI 设计


  UI 技术是大多数移动软件开发的核心。小型设备当前的硬件限制促使我们将繁重的计算任务交由 Web 服务远端的 PC 和服务器处理。在移动业务应用中运行的大多数组件都是为了支持可见的用户界面。移动业务层和数据访问层通常是其服务器端对应部分的简化版本。这意味着我们最常需要的是
  UI 组件，用于帮助我们使用布局设计屏幕、实现数据输入和选择的控件、构建用于数据显示和编辑的列表和表格、创建用户导航，以及使用图像作为背景和图标。本书中的 UI
  主题涵盖了移动应用开发中最常用的功能。在每一章中，我们都从最简单、最跨平台的方法开始，然后深入探讨平台特定的细节和粒度。以下是本书涵盖的移动 UI 主题：


  - 屏幕、视图或页面类似于 C# 中 Web 和桌面的对应部分，使用带有方法和属性的控件，并触发我们在控制器中处理的事件。（参见第 2 章。）

  - 布局帮助我们组织控件的位置和格式，使我们能够构建和设计移动应用的屏幕。（参见第 3 章。）

  - 控件促进用户交互和数据输入，这是移动用户界面所特有的，并且与 PC/鼠标界面有显著不同，这很大程度上归因于手势的使用。（参见第 4 章。）

  - 列表是移动应用中最强大的数据显示和选择方法之一。（参见第 5 章。）

  - 导航让用户能够遍历应用、在屏幕之间切换以及访问功能。分层导航、模态屏幕、导航抽屉、警报、下钻列表和其他关键模式构成了移动 UI 导航的核心。（参见第 6 章。）

  - 状态管理是在用户浏览应用时，处理屏幕之间传递的数据。（参见第 6 章。）

  - 图像在移动体验中至关重要，广泛应用于菜单、列表、网格、轮播图和其他布局中。（参见第 2 章、第 4 章、第 6 章。）




  #### Xamarin.Forms 自定义渲染器


  `自定义渲染器`使我们能够超越 Xamarin.Forms 开箱即用的 UI 控件，在保持跨平台方法的同时，利用特定于平台的 UI 功能集。Xamarin.Forms
  应用本质上是跨平台的，使用相同的代码库在三个主要平台上运行。这对于基本设计和使用某些控件来说效果很好。然而，许多项目会需要更深入地处理 UI，例如单个控件上的设计细微差别、原生模态对话框、页面上的额外图形或动画，或者任何超出当前版本
  Xamarin.Forms 所提供范围的需求。这可以通过子类化原生控件并实现 `PageRenderers` 来创建自定义控件来实现，这些控件允许使用 Xamarin.iOS
  和 Xamarin.Android 完全访问特定于平台的 UI 功能。这些特定于平台的控件可以在 Xamarin.Forms 页面中使用，以帮助维护跨平台架构。


  ### 数据访问层


  移动端数据访问层不同于我们在 Web 应用中所习惯的设计，更接近于桌面应用中的设计。其方法从流行的 MVVM 模式到模型-视图-控制器 (MVC)，再到基本的
  CRUD（创建/插入/更新/删除），复杂度不一而足。数据绑定页面通常将数据输入设备上的本地数据库，该数据库通过 Web 服务与远程数据服务器同步。


  C# 移动开发中的 Web 服务是代码复用的基础方面。对于移动应用，许多这些服务模式与我们构建 Web 应用时所习惯的保持一致。然而，移动 Web 服务更接近于桌面应用中的服务，与
  Web 应用服务的主要区别在于数据同步和离线使用的重要性。创建、更新和删除接口在线公开，供来自多种平台和设备的 RESTful 调用使用。移动 Web 服务模式是跨平台、一次编写代码的绝佳之地。


  与我们在 Web 应用中所习惯的相比，移动应用的 Web 服务端组件保持不变——除了增加了与本地移动数据存储的数据同步功能，以支持在线和离线使用。离线使用需要在本地数据库中保留一份基本数据集，并在有连接时进行同步。并非所有应用都支持离线使用。


  回顾我们在旧版相关技术中使用数据访问层的经验，我们将探讨 C# 移动应用中数据访问层的架构选项。


  ### 使用 SQLite 进行本地数据访问


  SQLite 被誉为移动开发中最稳定、最可靠的跨平台数据库产品，是一个在 iOS、Android 和 Windows 设备上运行的开源项目。Xamarin 推荐它而不是其他许多第三方项目，并且它是本书涵盖的内容。Xamarin
  在开发环境中提供对 SQLite 数据库的访问和创建，并为 ADO.NET 提供对 SQLite 的支持。还有一个 SQLite.NET Xamarin 组件，它是一个围绕基于
  C 的 SQLite 数据层的 C# 包装器，提供对 SQLite 数据库的低级访问，包括异步事务。所有这些使得连接数据库、创建和索引表以及读写行变得简单且无痛。


  ### 数据绑定


  使用 Xamarin.Forms 时，数据绑定是跨平台且一致的。它模仿了 Windows Presentation Foundation (WPF) 中的数据绑定，MVVM
  模式是其实现的核心。在代码中，我们将控件字段绑定到数据模型，绑定机制是自动的。手动实现 `PropertyChanged` 事件允许你的代码与数据源保持同步。绑定可以在代码中或可扩展应用程序标记语言
  XAML 中完成，并且可以是单向或双向的。控件、列表和文本被绑定到数据源或彼此属性上。越来越多的第三方供应商提供 Xamarin.Forms 控件套件，其中包括数据绑定的图表和网格，例如
  Telerik、Infragistics、Syncfusion 和 DevExpress。


  数据绑定并未内置于 Xamarin.Android 和 Xamarin.iOS 中。特定于平台的数据绑定实现通常使用开源第三方库（如 MvvmCross 和 MVVM
  Light）来实现。


  ### 跨平台开发


  正如 .NET 提供了跨越众多操作系统和语言的统一基础设施一样，Xamarin 弥合了移动操作系统及其各自开发语言之间的差距：iOS 和 Objective-C、Android
  和 Java、Windows Phone 和 Windows 平板以及 C#。通过这种方式，Xamarin 将 .NET 扩展到移动领域，远远超出了 Windows
  操作系统。除了这非常酷之外，真正的价值在于有机会在项目和平台之间共享和复用代码。Xamarin 工具的最大优势在于跨平台代码；因此，采用跨平台方法进行移动模式开发将产生最高的效益。Xamarin
  工具为我们提供了一窥“一次编写，随处部署”这一独角兽级目标的方法。


  在我们追求跨平台实现的过程中，最大的敌人是特定于平台的代码。这些代码必须根据平台（无论是 iOS、Android 还是 Windows Phone）进行不同的实现。跨平台模式与操作系统无关。跨平台代码有时被称为共享代码或核心代码，因为它是在不同移动操作系统的项目之间共享的。


  Xamarin.Forms 解决了最棘手的跨平台挑战：用户界面。使用 Xamarin 的开发人员拥有一个完全跨平台的数据解决方案，即使用 ADO.NET 或 SQLite.NET
  与 SQLite 进行本地数据访问，然后再通过 Web 服务进行访问。即便如此，始终会存在特定于平台的代码，如下所示：


  * 在 UI 中

  * 设备特定功能，例如相机和位置

  * 图形和动画

  * 安全性、文件和设备权限


  一旦我们识别了特定于平台的代码和跨平台代码，问题就变成了如何将它们组织到一个跨平台架构中。


  我们有很多选择，从 PCL、共享项目、链接文件、接口、抽象到条件编译。PCL 提供了一种方法，可以使用有限制的、针对特定平台的 .NET 库子集来构建 C# 组件，并将其编译为动态链接库
  (DLL)，该 DLL 可用于由 PCL 配置文件指定的任何平台的 Xamarin 项目中。数据访问层、客户端 Web 服务以及独立于平台的业务逻辑可以在此很好地共存。通过使用带有接口的依赖注入，仍然可以将特定于平台的功能引入这些库中。一种更松散、更灵活的方法是使用共享文件或项目，其中包含为每个平台重新编译的核心文件。条件编译是一种古老的技术，非常适合较小的特定于平台的自定义，它允许共享文件中的代码块仅在特定平台的编译中包含进来。


  我们将深入研究这些技术及其相关模式，因为它们带有独角兽的印记，有助于我们最大化代码的跨平台覆盖范围。




  '
- '# 摘要


  商业应用正经历着硬件转型的巨大变革；自个人电脑商业化以来，我们从未见过如此规模的变化。消费级移动设备的势头已达到临界点，这影响着商业应用现在必须在其上运行的设备。随着移动操作系统之间的竞争持续激烈，仅仅让一款移动应用在单一平台上运行并正常工作已经不够了。


  我们必须从一开始就考虑跨平台。


  在 .NET 的世界里，Xamarin 为我们提供了工具，使跨平台开发成为常态而非特例，因此我们没有任何借口。如果采用恰当的方法，业务逻辑、数据访问层，甚至越来越多的
  UI，都基本上是平台无关的。因此，无论你是构建 Android、Windows Phone 还是 iOS 应用，其许多组件的开发方法在很大程度上可以是相同的。


  让我们来看看代码！


  '
- '# 构建移动用户界面


  在使用 Xamarin 进行移动 UI 开发时，我们的屏幕及其控件、图像、动画和用户交互都在手持设备上原生运行。移动 UI 屏幕有多种同义词，例如视图和页面，这里会互换使用。视图可以指一个屏幕，但在某些上下文中也可以指代一个控件。


  使用 Xamarin 构建移动 UI 有两种标准方法：


  - Xamarin.Forms 是一个适用于 Android、iOS 和 Windows Phone 的跨平台 UI 库。

  - 平台特定（或原生）UI 方法则使用 Xamarin.Android、Xamarin.iOS 和 Windows Phone SDK。


  本章将涵盖这两种方法，并定义构成每种方法的平台特定组件。我们将讨论何时使用 Xamarin.Forms 有用，以及何时更平台特定的方法可能更合适。然后，我们将深入探讨如何使用页面、布局和视图来构建
  Xamarin.Forms UI。我们将创建一个包含共享项目和平台特定项目的 Xamarin.Forms 解决方案。在向项目添加 Xamarin.Forms 控件时，我们将接触基本的
  UI 概念，例如图像处理和在布局中格式化控件。


  让我们从讨论 Xamarin.Forms 开始。


  ## 理解 Xamarin.Forms


  Xamarin.Forms 是一套跨平台 UI 类的工具包，构建在更基础的平台特定 UI 类：Xamarin.Android 和 Xamarin.iOS 之上。Xamarin.Android
  和 Xamarin.iOS 提供了映射到各自原生 UI SDK（iOS UIKit 和 Android SDK）的类。Xamarin.Forms 也直接绑定到原生的
  Windows Phone SDK。这提供了一套跨平台的 UI 组件，可以在三个原生操作系统中各自渲染（见图 2-1）。


  ![A978-1-4842-0214-2_2_Fig1_HTML.jpg](img/A978-1-4842-0214-2_2_Fig1_HTML.jpg)


  图 2-1. Xamarin 库绑定到原生操作系统库


  Xamarin.Forms 提供了一套跨平台的页面、布局和控件工具包，是开始快速构建应用的良好起点。这些 Xamarin.Forms 元素是使用可扩展应用程序标记语言（XAML）构建的，或者使用
  C# 编码，利用 `Page`、`Layout` 和 `View` 类。该 API 提供了广泛的、内置的跨平台移动 UI 模式。从最高层次的 `Page` 对象开始，它提供了熟悉的菜单页面，例如用于分层级联菜单的
  `NavigationPage`、用于选项卡菜单的 `TabbedPage`、用于制作导航抽屉的 `MasterDetailPage`、用于滚动图像页面的 `CarouselPage`，以及用于创建自定义页面的基类
  `ContentPage`。布局涵盖了我们在各种平台上使用的标准格式，包括 `StackLayout`、`AbsoluteLayout`、`RelativeLayout`、`Grid`、`ScrollView`，以及作为基础布局类的
  `ContentView`。在这些布局中，使用了几十个熟悉的控件或视图，例如 `ListView`、`Button`、`DatePicker` 和 `TableView`。其中许多视图都内置了数据绑定选项。


  Xamarin.Forms 包含平台无关的类，这些类会绑定到其原生的平台特定对应物。这意味着我们几乎可以在不了解 iOS 和 Android UI 的情况下，为所有三个平台开发基本的原生
  UI。值得庆幸，但也需警惕！纯粹主义者警告说，在不了解原生 API 的情况下尝试为这些平台构建应用是鲁莽之举。让我们注意他们担忧的本质。我们必须对 Android
  和 iOS 平台、它们的演变、特性、特质以及版本更新保持浓厚的兴趣。同时，我们也可以尽情享受 Xamarin.Forms 这个令人惊叹的跨平台抽象所带来的便利与天才设计！


  > **注意：** 在撰写本文时，像登录屏幕、简单列表和某些业务应用这样的基本页面非常适合直接使用 Xamarin.Forms。可以在 Xamarin.Forms
  项目中利用平台特定代码来增加功能，但该库的每个后续版本都将允许我们构建更复杂的屏幕，而无需使用平台特定代码。


  ### Xamarin.Forms 解决方案架构


  Xamarin.Forms 最大的优势之一是它使我们能够同时为多个平台开发原生移动应用。图 2-2 显示了一个为 iOS、Android 和 Windows Phone
  开发的跨平台 Xamarin.Forms 应用的解决方案架构。本着良好架构和可重用性的精神，Xamarin.Forms 跨平台解决方案通常使用包含业务逻辑和数据访问层的共享
  C# 应用程序代码，如图中底层所示。这通常被称为核心库。跨平台 Xamarin.Forms UI 层同样是 C#，在图中被描绘为中间层。顶部的薄虚线层是平台特定项目中极少量的平台特定
  C# UI 代码，用于在每个原生操作系统中初始化和运行应用。


  ![A978-1-4842-0214-2_2_Fig2_HTML.jpg](img/A978-1-4842-0214-2_2_Fig2_HTML.jpg)


  图 2-2. Xamarin.Forms 解决方案架构：一个应用，三个平台


  图 2-2 经过简化，以传达 Xamarin.Forms 的基本原理。现实情况是，Xamarin.Forms 和平台特定代码之间的混合是可能的、有用的，并且是受到鼓励的。它可以在多个层面上发生。首先，在
  Xamarin.Forms 自定义渲染器中，这是一个用于在 Xamarin.Forms 页面上渲染平台特定功能的平台特定类。混合也可以发生在与 Xamarin.Forms
  页面并行运行的平台特定 Android Activity 和 iOS 视图控制器中，或者发生在按需调用的平台特定类中，以处理原生功能，例如位置、相机、图形或动画。这种复杂的方法可能导致更复杂的架构，如图
  2-3 所示，必须小心处理。注意已添加的平台特定 UI 层。


  ![A978-1-4842-0214-2_2_Fig3_HTML.jpg](img/A978-1-4842-0214-2_2_Fig3_HTML.jpg)


  图 2-3. 带有自定义渲染器的 Xamarin.Forms 架构


