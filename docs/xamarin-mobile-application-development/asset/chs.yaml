- '# 前言


  Dan Hermes 的这本非凡之作是我见过的关于跨平台移动开发最睿智的著作。他专注于 Xamarin.Forms，同时也为 Xamarin.Android 和
  Xamarin.iOS 提供了全面的指南。这使 Xamarin.Forms 置于恰当的背景中，并为那些不仅想知道如何用 Xamarin.Forms 编写代码，还想了解其运作原理及底层机制的人解释了底层的原生代码。我从这本优秀著作的这些部分中学到了很多。


  Dan 决定用 C# 编写所有示例。虽然我更喜欢用可扩展应用程序标记语言 (XAML) 来编写大部分 UI，但他的方法确实清楚地说明了实际创建的内容。最重要的是，你可以下载所有
  C# 和 XAML 的示例，所有代码示例都是完整的、注释清晰的，并且随时可以运行。


  另一个有用的特点是，插图展示了在三个平台（iOS、Android 和 Windows Phone）上运行示例代码的情况。我一直对那些过于复杂、旨在展示作者聪明才智而非将问题阐述得一清二楚的示例感到不满和批评。谢天谢地，Dan
  理解这一点，他的示例解释充分且重点突出。


  本书从简单入手，但带你了解基础知识，然后进入更高级的主题，例如自定义控件渲染以扩展 Xamarin.Forms 的功能。


  代码模式可以帮助你避免重复造轮子，Dan 详细使用并解释了移动开发中一些最重要的模式，包括分层窗口和模态窗口、下钻列表、选项卡、创建导航抽屉以及更多内容。


  接着，他处理了移动开发中一个棘手但极其重要的主题：持久化。Dan 涵盖了三种最重要的方法：使用 SQLite、使用 ADO.NET 以及使用带数据访问层 (DAL)
  的仓储模式。他深入探讨了数据绑定，并讨论了模型-视图-视图模型 (MVVM)，这可能是移动开发中最重要的模式。


  通过对 Xamarin.iOS、Xamarin.Android 和 Xamarin.Forms 的深入覆盖，你将能够很好地决定为你的特定项目使用哪种技术。


  Xamarin 新手将从本书中受益匪浅，但也不要低估它对 Xamarin 老手的价值。


  —Jesse Liberty


  '
- '# 额外前言


  我第一次看到 Xamarin.Forms 时，它几乎还难以看出如今这个强大的跨平台框架的影子。我当时正在拜访我们旧金山的办公室，夜深了，Jason Smith（Xamarin.Forms
  的创建者）正在忙碌地编写代码，而我正在收拾一些东西准备下班。我突然听到 Jason 发出一声惊呼，脸上露出灿烂的笑容：“想看点真正酷的东西吗？”他问道。“当然想，”我回答。我绕过办公桌去看他想给我展示什么。他的屏幕上是一个
  iOS 模拟器，上面显示着一个方框。


  我不想打击他对这个显然非常令人印象深刻的壮举的热情——我的意思是，我们说的可是高级东西，一个方框（注：讽刺）——我回答了一些诸如“太棒了。我在看什么？”之类的话。我知道
  Jason 的项目；Nat Friedman 和我曾绞尽脑汁试图解决跨平台移动开发的一个基本挑战——UI 层，而 Jason 正在进行一些原型工作，以研究以正确方式实现跨平台
  UI 框架的可行性。



  '
- "# Xamarin.Forms：全面指南\n\nXamarin 本来就已经非常出色了。我非常热爱 MonoTouch（`Xamarin.iOS` 的前身产品名称），以至于在\
  \ Xamarin 成为一家公司之前（后来，我与 Nat、Miguel de Icaza 以及 Joseph Hill 共同推动其发展，并成为了执行团队的一员），我就已经为此写了一本书。能用同一种语言\
  \ `C#`（这个星球上我最喜欢的语言）来为 iOS 和 Android（当时的 Windows Mobile 还处于起步阶段）构建原生移动应用，并共享所有后端和逻辑代码，这一切还能在\
  \ Mac（我那时钟爱的操作系统）上完成，这难道不酷吗？这非常酷。但这也意味着一个巨大的机遇：虽然你可以用 Xamarin 共享大量代码，但即便使用了 MVVM\
  \ 框架，统一 UI 代码仍然是一个巨大的挑战。\n\n“这是一张画布，它使用 iOS 和 Android 上的原生 UI 工具包绘制了一个方框；这是代码，”Jason\
  \ 说。果然，同一个 iOS 和 Android 项目都使用相同的代码来渲染这个方框。于是，`Xamarin.Forms` 诞生了。在确定 `Xamarin.Forms`\
  \ 这个品牌之前，我们使用了 Duplo 这个代号，当时这很贴切：`Xamarin.Forms` 就像一个儿童积木玩具。你可以用它搭建一些基础的玩具应用，谈不上复杂，但即便如此，Jason\
  \ 所创造的价值已显而易见。`Xamarin.Forms` 迅速演进，如今已几乎找不到两年前那个深夜 Jason 向我展示的原型框架的影子。\n\n如今，`Xamarin.Forms`\
  \ 是一个极其强大的框架。通过自定义渲染器扩展它，以提供原生、平台特定的功能，在 UI 层面几乎没有什么是你做不到的。\n\n现在，你手中（无论是实体书还是电子书）拿着的是第一本非\
  \ Xamarin 官方出版的关于 `Xamarin.Forms` 的书（别担心，它也涵盖了 `Xamarin.iOS` 和 `Xamarin.Android`，让你可以深入接触原生的底层\
  \ UI）。\n\n我对这本书感到非常兴奋。一年前 Dan 第一次联系我谈及这本书时，他告诉了我他的愿景：一本内容详尽、深入，并且叙事质量上乘的书，其精神与我那本（现在已严重过时的）MonoTouch\
  \ 处女作一脉相承。一本能公正地展现这个平台的书。在阅读完本书后，我相信你会认同 Dan 独特的视角和对平台清晰的理解，以一种非常实用的方式呈现出来；他创建了一本关于使用\
  \ Xamarin 的可靠手册，我相信，无论你是 Xamarin 开发新手还是老手，都会欣赏它。\n\n这本厚重的书提供了清晰的指导，将帮助你构建高质量的应用程序，从架构考量开始，然后深入到实用的代码策略。它以\
  \ `Xamarin.Forms` 为主导，但也教你如何穿透到原生 UI 工具包，并且不仅解释了事情如何做，还解释了为什么这样做。\n\n那么，我将你交到能干的作者手中，并祝你在\
  \ Dan 的得力指导下，通过 Xamarin 构建应用的旅程愉快。\n\n> ——Bryan Costanich  \n> Xamarin 公司副总裁\n\n\
  ## 简介\n\n本书是一本实用的 `Xamarin.Forms` 入门指南，也是使用 `C#` 和 .NET 构建原生 Android、iOS 和 Windows\
  \ Phone 应用的跨平台参考书。\n\n如果你将 Xamarin 平台视为一个金字塔，`Xamarin.Android` 和 `Xamarin.iOS` 是它的基座，`Xamarin.Forms`\
  \ 在其顶端，那么这正是本书使用 `C#` 所涵盖的内容。移动 UI 占据了金字塔的绝大部分，本书探索了使用 Xamarin 布局、控件和列表的重要概念、元素和实用方案。\n\
  \n许多新 Xamarin 项目面临的燃眉之问是：`Xamarin.Forms` 适合我的项目吗？本书涵盖了在选择 `Xamarin.Forms` 方案与使用\
  \ `Xamarin.Android` 或 `Xamarin.iOS` 的平台特定方案进行对比时，需要考虑的关键因素。\n\n当你遇到了 `Xamarin.Forms`\
  \ 开箱即用功能的限制时，你将希望通过使用自定义渲染器来定制 `Xamarin.Forms` 控件，从而利用平台特定的功能。\n\n你还会学习所有关键的 Xamarin\
  \ UI 导航模式：分层导航和模态导航、下钻列表、选项卡、导航抽屉等。你可以使用提供的导航代码，为几乎任何业务应用搭建出基本骨架。\n\n本书是一本 SQLite\
  \ 数据访问指南。我们将介绍在 Xamarin 应用中访问 SQLite 数据库的最常见方法，以及如何构建数据访问层（DAL）。一旦建立了数据库，你将希望将数据绑定到\
  \ UI。你可以手动绑定，或者使用 `Xamarin.Forms` 的数据绑定将 UI 元素绑定到数据源。我们将介绍多种读写数据绑定的技术，既包括绑定到数据模型，也包括为模型-视图-视图模型（MVVM）架构绑定到视图模型。\n\
  \n构建一个应用不仅仅需要 UI 和数据访问；你还需要将代码组织成专业级的架构。我们将探索从入门级到企业级的解决方案构建技术，以帮助你解耦功能层、管理平台特定代码，并共享跨平台类，以实现最佳的代码复用性、可测试性和可维护性。\n\
  \n## 本书面向的读者\n\n如果你是能够阅读 `C#` 示例，并希望学习使用 Xamarin 平台进行跨平台移动开发的开发者、架构师或技术经理，那么本书就是为你准备的。`C#`\
  \ 开发者可能会对本书感到最亲切，因为我自己就是 `C#` 开发者，但我也努力在书中指出何时使用了 Microsoft 或 .NET 的行话。Xamarin 平台能够将来自不同背景的技术人员汇聚一堂。\n\
  \n## 如何下载代码示例\n\n本书的所有代码，即 `C#` 和可扩展应用程序标记语言（XAML）解决方案，可以在网上的两个地方找到：\n\n- 本书在 Apress\
  \ 网站上的“源代码/下载”选项卡页面（[`www.apress.com/9781484202159`](http://www.apress.com/9781484202159)）\n\
  - GitHub 仓库：[`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)\n\
  \n## XAML\n\n本书的编写方式与 Xamarin 平台的构建方式相同，即以 `C#` 代码优先，因此书中的所有示例都是用 `C#` 编写的。所有 `C#`\
  \ UI 示例也同样移植到了 XAML，并在可下载的代码中提供。请留意书中 XAML 提示框，了解在哪里可以找到它们。\n\nXAML\n\n本示例的 XAML\
  \ 版本可以在 Apress 网站（[`www.apress.com`](http://www.apress.com/)）或 GitHub（[`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)）找到。本章的\
  \ `Xamarin.Forms` 解决方案是 `ThisChapterSolution.Xaml`。\n\n在写这本书时，我做出的最艰难的决定是没有在书中直接包含\
  \ XAML 示例。包含 XAML 将意味着不得不削减甚至完全放弃关于 `Xamarin.Android` 和 `Xamarin.iOS` 的内容，而这些主题对于全面理解\
  \ Xamarin 平台是必不可少的。我选择坚持本书的使命：以跨平台 `C#` 代码优先的方式，全面介绍 Xamarin 平台的基础知识。话虽如此，我理解市场上对优质\
  \ XAML 文档和示例的强烈需求。因此，尽管我希望有足够的时间和篇幅在书中文本里包含 XAML 示例，但我很自豪地说，我们为所有 `C#` UI 示例都提供了可下载的\
  \ XAML 对应版本。\n\n## 立即开始使用 Xamarin.Forms 吧！\n\n没时间阅读？花十分钟浏览第 2 章，然后下载第 6 章的导航代码。直接从我的第\
  \ 6 章中选取一些导航模式立刻用到你的应用中，并立即开始编码。同时把书翻开到第 3 章，这样你就可以在你的导航页面内构建一些布局。祝你好运！\n\n\n\n\
  ## 章节内容\n\n本书所有章节均跨平台，但内容侧重于 Xamarin.Forms。UI 章节（第 3 章至第 6 章）在章节开头以小型索引的形式并列展示了\
  \ Xamarin.Forms、Xamarin.Android 和 Xamarin.iOS 的元素，以便于理解跨平台概念，并在需要时更容易考虑自定义渲染器。这些\
  \ UI 章节的第一部分为 Xamarin.Forms，第二部分为 Xamarin.Android，第三部分为 Xamarin.iOS。\n\n第 1 章 —\
  \ 使用 Xamarin 进行移动开发\n\n介绍 Xamarin 平台，涵盖本书所有关键主题。\n\n第 2 章 — 构建移动用户界面（Xamarin.Forms\
  \ 入门）\n\nXamarin.Forms 入门指南，并对比 Xamarin.Forms 与特定平台方法（如 Xamarin.iOS 和 Xamarin.Android）。涵盖\
  \ Xamarin.Forms 的页面、布局和视图。\n\n第 3 章 — 使用布局进行 UI 设计\n\n布局帮助我们组织控件的位置和格式，使我们能够构建和设计移动应用的屏幕。\n\
  \n第 4 章 — 使用控件（视图）进行用户交互\n\n选择器、滑块、开关和其他移动 UI 控件可促进用户交互和数据输入，这些交互和输入对于移动用户界面来说是独特的，并且由于手势的使用而与\
  \ PC/鼠标界面不同。\n\n第 5 章 — 创建可滚动列表\n\n列表是移动应用中最简单、最强大的数据显示和选择方法之一。\n\n第 6 章 — 导航\n\n\
  导航允许用户遍历应用、在不同屏幕之间切换以及访问功能。分层导航、模态导航、导航抽屉、向下钻取列表和其他关键模式构成了移动 UI 导航的核心。状态管理是指在用户导航应用时处理屏幕之间传递的数据。\n\
  \n第 7 章 — 使用 SQLite 和数据绑定进行数据访问\n\n`SQLite` 是许多 Xamarin 开发人员的首选数据库。使用 `SQLite.NET`\
  \ 或 `ADO.NET` 在本地存储和检索数据。使用 Xamarin.Forms 数据绑定，将 UI 元素与数据模型融合。通过绑定到视图模型来使用 MVVM\
  \ 模式。\n\n第 8 章 — 自定义渲染器\n\n扩展标准的 Xamarin.Forms 控件，利用特定平台的 UI 功能集，同时通过自定义渲染器保持跨平台方法。\n\
  \n第 9 章 — 跨平台架构\n\n通过管理特定平台的代码来构建跨平台应用的架构。Xamarin 中的项目级别选项包括可移植类库 (PCL) 和共享项目。跨平台编码技术包括条件编译、依赖注入\
  \ (DI) 和文件链接。\n\n## 如何阅读本书\n\n本书涵盖了相当广泛的内容，并且有几种阅读方法。以下是本书内置的主要导航路径及其使用方法。如果您对以下内容感兴趣：\n\
  \n*   **跨平台开发：Xamarin.Forms、Xamarin.Android 和 Xamarin.iOS**：从头到尾阅读本书。本书中的每一个字都是为您而写。读完第\
  \ 1 章和第 2 章后，浏览第 3 章至第 6 章的前几页，以了解本书涵盖的 UI 材料。\n*   **Xamarin.Forms**：阅读第 1 章和第\
  \ 2 章，然后阅读第 3 章至第 6 章的前三分之一部分，这些内容涵盖了 Xamarin.Forms UI。然后阅读第 7 章、第 8 章和第 9 章，了解数据访问、自定义渲染器和架构。\n\
  *   **Xamarin.Android**：首先，确保您已掌握 Android 基础知识。请参阅本引言后面的“先决条件”。然后阅读第 1 章和第 2 章的前半部分。阅读第\
  \ 3 章至第 6 章的中间部分，这些内容涵盖了 Android UI。然后阅读第 7 章和第 9 章，了解数据访问和架构。\n*   **Xamarin.iOS**：首先，确保您已掌握\
  \ iOS 基础知识。请参阅本引言后面的“先决条件”。然后阅读第 1 章和第 2 章的前半部分。阅读第 3 章至第 6 章的结尾部分，这些内容涵盖了 iOS UI。然后阅读第\
  \ 7 章和第 9 章，了解数据访问和架构。\n*   **通用参考**：阅读第 1 章和第 2 章的前半部分以便入门。然后浏览第 3 章至第 6 章的前几页，了解本书涵盖的\
  \ UI 材料及其组织方式。使用每个 UI 章节的开头部分作为交叉参考。\n\n有这么多路径可供选择。这是一本让您自行选择冒险旅程的书。\n\n## 完整代码\n\
  \n本书也提供了一条“捷径”导航路径。如果您只想要一个主题的要点，请找到您感兴趣的部分，直接跳到“完整代码”部分。这是许多（但不是全部）主要主题末尾的一个完整代码清单。很多时候我们只想要一个关于某个主题的快速代码配方，这就是本书中获取它的方法。如果您需要代码解释，请回到该部分的开头，逐步了解该代码的详细构建过程。\n\
  \n## 我现在读的是哪个平台？\n\n在阅读不同平台的内容时，请使用主要主题标题下方的平台标题来保持方向感。以下是标题的样式：\n\nXamarin.Forms\n\
  \n此标题表示 Xamarin.Forms 主题。\n\nAndroid\n\n此标题表示 Xamarin.Android 主题。\n\niOS\n\n此标题表示\
  \ Xamarin.iOS 主题。\n\nWindows Phone\n\n此标题表示 Xamarin.Forms Windows Phone 主题。\n\n\
  跨平台\n\n此标题表示对 Xamarin.Forms、Xamarin.iOS 和 Xamarin.Android 都有用的主题。\n\n寻找主要主题标题下方的平台标题，您就能随时知道自己在阅读哪个平台。\n\
