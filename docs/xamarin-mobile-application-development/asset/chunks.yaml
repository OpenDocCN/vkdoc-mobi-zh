    = new UITableViewCell (UITableViewCellStyle.Default,В В CellId);`    В В В В В В В В В В В В `cell.TextLabel.Text
    = listItems[indexPath.Row];`    В В В В В В В В В В В В `return cell;`    В В В В В В В В `}`    В В В В `}`    Cell
    reuse in `GetCell` improves performance, thereby making scrolling faster with
    fewer skipped frames. As each row is retrieved, the `DequeueReusableCell` method
    checks to see if a cell (memory location for a row) already exists for that `CellId`.
    If it comes back null then instantiate a new cell, otherwise use it. When a list
    is scrolled, this method is called to create more rows to display on the screen,
    recycling cells when possible. Type `NSIndexPath` comes from the `Foundation`
    library in the `using`.  Note  There are two ways to handle list row cell reuse
