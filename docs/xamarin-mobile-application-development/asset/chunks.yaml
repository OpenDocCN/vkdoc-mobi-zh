    Using TableView for Grouping Pages    xamarin.forms    Perfect for multicategory
    lists of navigation items, this variation of the drill-down list pattern displays
    a static list by using a view called `TableView`. When an item is tapped, a detail
    screen is shown. It also uses the hierarchical pattern, which provides an option
    to use Back buttons. This hierarchical/drill-down list pattern is used in many
    of the Xamarin.Forms downloadable code projects throughout the book as the solution
    home page, allowing selection of the code examples in each chapter.    This recipe
    looks best when there are multiple categories of items to choose from, because
    at least one `TableSection` is required, even if multiple categories arenвҖҷt needed,
    as shown in Figure [6-11](#A978-1-4842-0214-2_6_Chapter.html#Fig11).    ![A978-1-4842-0214-2_6_Fig11_HTML.jpg](A978-1-4842-0214-2_6_Fig11_HTML.jpg)    Figure
    6-11.  Grouping a list by using TableView  If you donвҖҷt want to use categories,
    you can keep the `TableSection` title blank, but that leaves a rather large gap
    at the top of the list. If you donвҖҷt need categories, consider using `ListView`
    by page, as described in the previous section.    `TableView` isnвҖҷt technically
    a layout but works much like one. This view is made up of `ViewCells` arranged
    in sections. Each `TableSection` denotes a different category of item, as shown
    in Listing [6-12](#A978-1-4842-0214-2_6_Chapter.html#FPar24).  Listing 6-12\.
