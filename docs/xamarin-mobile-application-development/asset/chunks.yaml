    Methods to the Repository.вҖқ    LetвҖҷs get back to the database connection.    ####
    Managing the Repository    In Xamarin apps using SQLite, the database connection
    is often kept in memory so it can be reused throughout the user session. Because
    static classes remain in memory, they are a likely candidate for helping to build
    a repository and store the connection. You can also open and close the connection
    for each transaction, but because SQLite is a serverless database, there is less
    of a need, and keeping a single connection open is common practice.    The connection
    is typically handled in one of two ways, either encapsulated in the repository,
    or passed in as a parameter. In these examples, the SQLite database connection
    is encapsulated in the repository. (You may want to move the connection out of
    the repository and pass it in as a parameter if you wish to have more control
    over the connection instance, for testability, for instance.) Since the connection
    resides in our repository in this example, we need to keep the repository in memory.    A
    common location to maintain a repository is in a static property on the `Application`
    class, as shown in Listing [7-20](#A978-1-4842-0214-2_7_Chapter.html#FPar41).
    The following code references the earlier `ItemDatabaseBasic` repository in Listing
    [7-19](#A978-1-4842-0214-2_7_Chapter.html#FPar39).  Listing 7-20\. Static Database
    Property Declared in the Application Object  В В В В `public class App : Application`    В В В В `{`    В В В В В В В В `static
    ItemDatabaseBasic database;`    В В В В В В В В `public static ItemDatabaseBasic Database
