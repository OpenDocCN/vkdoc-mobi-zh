  trans: '

    #### Xamarin.Forms иҮӘе®ҡд№үжёІжҹ“еҷЁ


    `иҮӘе®ҡд№үжёІжҹ“еҷЁ`дҪҝжҲ‘д»¬иғҪеӨҹи¶…и¶Ҡ Xamarin.Forms ејҖз®ұеҚіз”Ёзҡ„ UI жҺ§д»¶пјҢеңЁдҝқжҢҒи·Ёе№іеҸ°ж–№жі•зҡ„еҗҢж—¶пјҢеҲ©з”Ёзү№е®ҡдәҺе№іеҸ°зҡ„ UI еҠҹиғҪйӣҶгҖӮXamarin.Forms
    еә”з”Ёжң¬иҙЁдёҠжҳҜи·Ёе№іеҸ°зҡ„пјҢдҪҝз”ЁзӣёеҗҢзҡ„д»Јз Ғеә“еңЁдёүдёӘдё»иҰҒе№іеҸ°дёҠиҝҗиЎҢгҖӮиҝҷеҜ№дәҺеҹәжң¬и®ҫи®Ўе’ҢдҪҝз”ЁжҹҗдәӣжҺ§д»¶жқҘиҜҙж•ҲжһңеҫҲеҘҪгҖӮз„¶иҖҢпјҢи®ёеӨҡйЎ№зӣ®дјҡйңҖиҰҒжӣҙж·ұе…Ҙең°еӨ„зҗҶ UIпјҢдҫӢеҰӮеҚ•дёӘжҺ§д»¶дёҠзҡ„и®ҫи®Ўз»Ҷеҫ®е·®еҲ«гҖҒеҺҹз”ҹжЁЎжҖҒеҜ№иҜқжЎҶгҖҒйЎөйқўдёҠзҡ„йўқеӨ–еӣҫеҪўжҲ–еҠЁз”»пјҢжҲ–иҖ…д»»дҪ•и¶…еҮәеҪ“еүҚзүҲжң¬
    Xamarin.Forms жүҖжҸҗдҫӣиҢғеӣҙзҡ„йңҖжұӮгҖӮиҝҷеҸҜд»ҘйҖҡиҝҮеӯҗзұ»еҢ–еҺҹз”ҹжҺ§д»¶е№¶е®һзҺ° `PageRenderers` жқҘеҲӣе»әиҮӘе®ҡд№үжҺ§д»¶жқҘе®һзҺ°пјҢиҝҷдәӣжҺ§д»¶е…Ғи®ёдҪҝз”Ё Xamarin.iOS
    е’Ң Xamarin.Android е®Ңе…Ёи®ҝй—®зү№е®ҡдәҺе№іеҸ°зҡ„ UI еҠҹиғҪгҖӮиҝҷдәӣзү№е®ҡдәҺе№іеҸ°зҡ„жҺ§д»¶еҸҜд»ҘеңЁ Xamarin.Forms йЎөйқўдёӯдҪҝз”ЁпјҢд»Ҙеё®еҠ©з»ҙжҠӨи·Ёе№іеҸ°жһ¶жһ„гҖӮ


    ### ж•°жҚ®и®ҝй—®еұӮ


    з§»еҠЁз«Ҝж•°жҚ®и®ҝй—®еұӮдёҚеҗҢдәҺжҲ‘д»¬еңЁ Web еә”з”ЁдёӯжүҖд№ жғҜзҡ„и®ҫи®ЎпјҢжӣҙжҺҘиҝ‘дәҺжЎҢйқўеә”з”Ёдёӯзҡ„и®ҫи®ЎгҖӮе…¶ж–№жі•д»ҺжөҒиЎҢзҡ„ MVVM жЁЎејҸеҲ°жЁЎеһӢ-и§Ҷеӣҫ-жҺ§еҲ¶еҷЁ (MVC)пјҢеҶҚеҲ°еҹәжң¬зҡ„
    CRUDпјҲеҲӣе»ә/жҸ’е…Ҙ/жӣҙж–°/еҲ йҷӨпјүпјҢеӨҚжқӮеәҰдёҚдёҖиҖҢи¶ігҖӮж•°жҚ®з»‘е®ҡйЎөйқўйҖҡеёёе°Ҷж•°жҚ®иҫ“е…Ҙи®ҫеӨҮдёҠзҡ„жң¬ең°ж•°жҚ®еә“пјҢиҜҘж•°жҚ®еә“йҖҡиҝҮ Web жңҚеҠЎдёҺиҝңзЁӢж•°жҚ®жңҚеҠЎеҷЁеҗҢжӯҘгҖӮ


    C# з§»еҠЁејҖеҸ‘дёӯзҡ„ Web жңҚеҠЎжҳҜд»Јз ҒеӨҚз”Ёзҡ„еҹәзЎҖж–№йқўгҖӮеҜ№дәҺз§»еҠЁеә”з”ЁпјҢи®ёеӨҡиҝҷдәӣжңҚеҠЎжЁЎејҸдёҺжҲ‘д»¬жһ„е»ә Web еә”з”Ёж—¶жүҖд№ жғҜзҡ„дҝқжҢҒдёҖиҮҙгҖӮз„¶иҖҢпјҢз§»еҠЁ Web жңҚеҠЎжӣҙжҺҘиҝ‘дәҺжЎҢйқўеә”з”Ёдёӯзҡ„жңҚеҠЎпјҢдёҺ
    Web еә”з”ЁжңҚеҠЎзҡ„дё»иҰҒеҢәеҲ«еңЁдәҺж•°жҚ®еҗҢжӯҘе’ҢзҰ»зәҝдҪҝз”Ёзҡ„йҮҚиҰҒжҖ§гҖӮеҲӣе»әгҖҒжӣҙж–°е’ҢеҲ йҷӨжҺҘеҸЈеңЁзәҝе…¬ејҖпјҢдҫӣжқҘиҮӘеӨҡз§Қе№іеҸ°е’Ңи®ҫеӨҮзҡ„ RESTful и°ғз”ЁдҪҝз”ЁгҖӮз§»еҠЁ Web жңҚеҠЎжЁЎејҸжҳҜи·Ёе№іеҸ°гҖҒдёҖж¬Ўзј–еҶҷд»Јз Ғзҡ„з»қдҪід№Ӣең°гҖӮ


    дёҺжҲ‘д»¬еңЁ Web еә”з”ЁдёӯжүҖд№ жғҜзҡ„зӣёжҜ”пјҢз§»еҠЁеә”з”Ёзҡ„ Web жңҚеҠЎз«Ҝз»„д»¶дҝқжҢҒдёҚеҸҳвҖ”вҖ”йҷӨдәҶеўһеҠ дәҶдёҺжң¬ең°з§»еҠЁж•°жҚ®еӯҳеӮЁзҡ„ж•°жҚ®еҗҢжӯҘеҠҹиғҪпјҢд»Ҙж”ҜжҢҒеңЁзәҝе’ҢзҰ»зәҝдҪҝз”ЁгҖӮзҰ»зәҝдҪҝз”ЁйңҖиҰҒеңЁжң¬ең°ж•°жҚ®еә“дёӯдҝқз•ҷдёҖд»Ҫеҹәжң¬ж•°жҚ®йӣҶпјҢе№¶еңЁжңүиҝһжҺҘж—¶иҝӣиЎҢеҗҢжӯҘгҖӮе№¶йқһжүҖжңүеә”з”ЁйғҪж”ҜжҢҒзҰ»зәҝдҪҝз”ЁгҖӮ


    еӣһйЎҫжҲ‘д»¬еңЁж—§зүҲзӣёе…іжҠҖжңҜдёӯдҪҝз”Ёж•°жҚ®и®ҝй—®еұӮзҡ„з»ҸйӘҢпјҢжҲ‘д»¬е°ҶжҺўи®Ё C# з§»еҠЁеә”з”Ёдёӯж•°жҚ®и®ҝй—®еұӮзҡ„жһ¶жһ„йҖүйЎ№гҖӮ


    ### дҪҝз”Ё SQLite иҝӣиЎҢжң¬ең°ж•°жҚ®и®ҝй—®


    SQLite иў«иӘүдёәз§»еҠЁејҖеҸ‘дёӯжңҖзЁіе®ҡгҖҒжңҖеҸҜйқ зҡ„и·Ёе№іеҸ°ж•°жҚ®еә“дә§е“ҒпјҢжҳҜдёҖдёӘеңЁ iOSгҖҒAndroid е’Ң Windows и®ҫеӨҮдёҠиҝҗиЎҢзҡ„ејҖжәҗйЎ№зӣ®гҖӮXamarin
    жҺЁиҚҗе®ғиҖҢдёҚжҳҜе…¶д»–и®ёеӨҡз¬¬дёүж–№йЎ№зӣ®пјҢе№¶дё”е®ғжҳҜжң¬д№Ұж¶өзӣ–зҡ„еҶ…е®№гҖӮXamarin еңЁејҖеҸ‘зҺҜеўғдёӯжҸҗдҫӣеҜ№ SQLite ж•°жҚ®еә“зҡ„и®ҝй—®е’ҢеҲӣе»әпјҢе№¶дёә ADO.NET жҸҗдҫӣеҜ№
    SQLite зҡ„ж”ҜжҢҒгҖӮиҝҳжңүдёҖдёӘ SQLite.NET Xamarin з»„д»¶пјҢе®ғжҳҜдёҖдёӘеӣҙз»•еҹәдәҺ C зҡ„ SQLite ж•°жҚ®еұӮзҡ„ C# еҢ…иЈ…еҷЁпјҢжҸҗдҫӣеҜ№ SQLite
    ж•°жҚ®еә“зҡ„дҪҺзә§и®ҝй—®пјҢеҢ…жӢ¬ејӮжӯҘдәӢеҠЎгҖӮжүҖжңүиҝҷдәӣдҪҝеҫ—иҝһжҺҘж•°жҚ®еә“гҖҒеҲӣе»әе’Ңзҙўеј•иЎЁд»ҘеҸҠиҜ»еҶҷиЎҢеҸҳеҫ—з®ҖеҚ•дё”ж— з—ӣгҖӮ


