    approach using Xamarin.Android and Xamarin.iOS, then read on!    LetвҖҷs start with
    the Xamarin.Android controls before moving on to iOS. You can use the following
    controls when building Xamarin.Android platform-specific solutions or when creating
    Android custom renderers inside Xamarin.Forms solutions, as described in [Chapter
    8](#A978-1-4842-0214-2_8_Chapter.html).    ## Android Controls    ANDROID    Some
    of the selection widgets used most often on Android are `Spinner`, `DatePicker`,
    `TimePicker`, `SeekBar`, `CheckBox`, `Switch`, and `RadioButton`. The `Spinner`
    is a simple drop-down selection picker, the `SeekBar` is a slider, and the rest
    of these controls are exactly what they sound like.    Unlike many Xamarin.Forms
    controls, Android views donвҖҷt produce a modal dialog box by default, but produce
    only an inline dialog. Use the techniques described in the following sections
    or roll your own modals by using `DialogFragments` (see [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html)).    Create
    a new Android solution of type Blank App (Android) called `ControlExamplesAndroid`.    ###
    Spinner    A `Spinner` is an Android widget that provides a simple drop-down list
    of items to choose from.    Making a `Spinner` requires a few steps. You place
    a `Spinner` in your layout XML, and then create another layout that contains a
    `TextView` for binding to an `Adapter` to create a list to display. Next you instantiate
    the spinner in an activity, populate the list, and then bind the list to the `Spinner.Adapter`
    property and handle selection using the `Spinner.ItemSelected` event.    First,
    place a `Spinner` on a `LinearLayout` either using a designer or coded by hand
    in XML and call the layout `Spinner.axml` in the `Resources/layout` folder:    В В В В В В В В В `<Spinner`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В `android:id="@+id/spinner"
    />`    A `Spinner` is populated from an `Adapter`. In this example, an `ArrayAdapter`
    based on a hand-coded string array. An `ArrayAdapter` populates a list with strings,
    using a `TextView` for each list item.    Create a new layout to contain a `TextView`
    (also in the `Resources/layout` folder) that is used as a cell in the `Spinner`вҖҷs
    list. Name this layout `TextViewForSpinner.axml`:    В В В В В В В В `<?xml version="1.0"
    encoding="UTF-8"?>`    В В В В В В В В `<TextView ExternalRef"> http://schemas.android.com/apk/res/android``"`    В В В В В В В В В В В В `android:id="@+id/textItem"`    В В В В В В В В В В В В `android:textSize="44sp"`    В В В В В В В В В В В В `android:layout_width="fill_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"
    />`    Create a new activity called `SpinnerActivity.cs`. In the `OnCreate` method,
    point to the spinner layout by using `SetContentView`, and find the spinner in
    the layout by using `FindViewById`:    В В В В В В В В В В `SetContentView (Resource.Layout.Spinner);`    В В В В В В В В В В `Spinner
    spinner = FindViewById<Spinner> (Resource.Id.spinner);`    Populate a string array
    with selectable options and construct the `ArrayAdapter`:    В В В В В В В В В В `string[]
    options = {"one", "two", "three", "four", "five"} ;`    В В В В В В В В В В `ArrayAdapter
    adapter = new ArrayAdapter (this, Resource.Layout.TextViewForSpinner, options);`    В В В В В В В В В В `spinner.Adapter
    = adapter;`    Note how the `ArrayAdapter` constructor uses the `TextView` and
    the string array as parameters. The `ArrayAdapter` is assigned to the `Adapter`
    property of the spinner.  Tip  Use the default resource, `SimpleSpinnerItem`,
    instead of manually creating `TextViewForSpinner.axml` in the `Adapter` declaration:    `ArrayAdapter
    adapter = new ArrayAdapter (this, Resource.Layout.SimpleSpinnerItem, options);`  Tip  You
    can also set a default drop-down style by using `SetDropDownViewResource`:    `adapter.SetDropDownViewResource
    (Android.Resource.Layout.SimpleSpinnerDropDownItem);`    The spinner looks like
    an `Entry` view at first (Figure [4-12](#A978-1-4842-0214-2_4_Chapter.html#Fig12)).    ![A978-1-4842-0214-2_4_Fig12_HTML.jpg](A978-1-4842-0214-2_4_Fig12_HTML.jpg)    Figure
    4-12.  Spinner anxiously awaiting a tap  Tap it to display the drop-down list
    (Figure [4-13](#A978-1-4842-0214-2_4_Chapter.html#Fig13)).    ![A978-1-4842-0214-2_4_Fig13_HTML.jpg](A978-1-4842-0214-2_4_Fig13_HTML.jpg)    Figure
    4-13.  Spinner is a dialog box  Selecting an item fires the `ItemSelected` event,
    which can be handled inline or in a handler method like this:    `spinner.ItemSelected
    += new EventHandler<AdapterView.ItemSelectedEventArgs> (spinner_ItemSelected);`    Here
    is the handler method that creates a toast to display the selected item:    В В В В В В В В `private
    void spinner_ItemSelected (object sender, AdapterView.ItemSelectedEventArgs e)`    В В В В В В В В `{`    В В В В В В В В В В В В `Spinner
    spinner = (Spinner)sender;`    В В В В В В В В В В В В `string toast = string.Format ("Selection:
    {0}", spinner.GetItemAtPosition (e.Position));`    В В В В В В В В В В В В `Toast.MakeText
    (this, toast, ToastLength.Long).Show ();`    В В В В В В В В `}`    Selecting an item
    pops up the toast, displaying the selected item shown in Figure [4-14](#A978-1-4842-0214-2_4_Chapter.html#Fig14).    ![A978-1-4842-0214-2_4_Fig14_HTML.jpg](A978-1-4842-0214-2_4_Fig14_HTML.jpg)    Figure
