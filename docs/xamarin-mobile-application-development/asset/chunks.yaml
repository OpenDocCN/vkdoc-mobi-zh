  trans: "\n# еүҚзҪ®иҰҒжұӮ\n\nеҰӮжһңдҪ дё»иҰҒдҪҝз”Ё `Xamarin.Forms`пјҢйҷӨдәҶйңҖиҰҒе…·еӨҮдёҖе®ҡзҡ„ C# еҹәзЎҖеӨ–пјҢеә”иҜҘиғҪеӨҹиҪ»жқҫжҺҢжҸЎжң¬д№ҰеҶ…е®№гҖӮз„¶иҖҢпјҢеҰӮжһңдҪ жғіж·ұе…Ҙз ”з©¶\
    \ `Xamarin.Android`гҖҒ`Xamarin.iOS` жҲ– `Xamarin.Forms` зҡ„иҮӘе®ҡд№үжёІжҹ“еҷЁпјҢиҜ·жіЁж„Ҹд»ҘдёӢдәӢйЎ№пјҡ\n\nжң¬д№Ұе№¶йқһ iOS\
