    `LeftMargin`, `RightMargin, TopMargin`, `BottomMargin`, and others.    ### Add
    Constraints by Using Visual Format Language    Another way to add constraints
    in code is to use Visual Format Language (VFL), a declarative iOS syntax for representing
    common constraints, including standard spacing and dimensions, vertical layout,
    and constraints with different priorities. This concise, human-readable grammar
    can be used in the `AddConstraints` method. Here are some code snippets to give
    you the flavor of VFL syntax.    This example sets a minimum width of 50 points
    on the text field:    В В В В `var viewsDictionary = NSDictionary.FromObjectsAndKeys(new
    NSObject[]`    В В В В В В В В `{textView}, new NSObject[] { new NSString("textView")});`    В В В В `textView.AddConstraints(NSLayoutConstraint.FromVisualFormat`    В В В В В В В В `("H:|[textView(>=50)]|",
    0, null, viewsDictionary));`    The `H:` specifies the horizontal orientation.
    For vertical constraints, add `V:` to the start of the VFL string. The colon specifies
    the controlвҖҷs relationship to the superview (the top-level view). This button
    is 50.0 points high and the standard spacing from the top of the superview.    В В В В `var
    viewsDictionary = NSDictionary.FromObjectsAndKeys(new NSObject[]`    В В В В В В В В `{button},
    new NSObject[] { new NSString("button")});`    В В В В `textView.AddConstraints(NSLayoutConstraint.FromVisualFormat`    В В В В В В В В `("V:|-[button(50.0)]",
    0, null, viewsDictionary));`    VFL also allows the creation of constraints between
    views. The following example creates four buttons, setting the width of each to
    be the same as the width of the next by using parentheses, so they are all the
    width of `buttonFourth`:    В В В В `var viewsDictionary = NSDictionary.FromObjectsAndKeys(new
    NSObject[]`    В В В В В В В В `{buttonFirst, buttonSecond, buttonThird, buttonFourth},`    В В В В В В В В `new
    NSObject[] { new NSString("buttonFirst"),`    В В В В В В В В `new NSString("buttonSecond"),
    new NSString("buttonThird"),`    В В В В В В В В `new NSString("buttonFourth ")});`    В В В В `this.View.AddConstraints(
    NSLayoutConstraint.FromVisualFormat`    В В В В В В В В `("H:|-[buttonFirst(buttonSecond)]-[
    buttonSecond(buttonThird)]-[ " +`    В В В В В В В В `"buttonThird(buttonFourth)]-[buttonFourth]-|",`    В В В В В В В В `NSLayoutFormatOptions.AlignAllTop
    |`    В В В В В В В В `NSLayoutFormatOptions.AlignAllBottom,`    В В В В В В В В `height, viewsDictionary));`    The
    dashes indicate a standard amount of space between views, which can also have
    point values to specify the exact space value. For example, `[buttonFirst]-10-[buttonSecond]`
    places 10 points between the buttons. The syntax with brackets and dashes is meant
    to visually represent how the controls look on the screen.  Tip  These examples
    are just snippets to give you the gist of VFL. The iOS Developer Guide contains
    a full VFL definition.    ### Using Frames    i OS    An absolute approach to
    iOS layout involves the specification of the bounds and center location of an
    iOS view by a `RectangleF` assigned to the `Frame` property of the superview.  Note  Note
