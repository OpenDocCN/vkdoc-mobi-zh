    `DatePicker` is a spinner and/or calendar used for selecting the month, date,
    and year.  Note  Modal dialogs are not a built-in function of Android pickers
    such as the `DatePicker`. Android pickers are inline dialogs by default. Modals
    must be coded by hand, in this case by using `DatePickerDialog`. YouвҖҷll do this
    in the next section.    Add a `DatePicker` to your main layout by either using
    a designer or coding by hand in XML:    В В В В В В В В `<DatePicker`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В `android:id="@+id/datePicker"
    />`    Instantiate a `DatePicker` in your activity. Match the widget ID name between
    the layout and activity:    В В В В В В В В `DatePicker datePicker = FindViewById<DatePicker>
    (Resource.Id.datePicker);`    The default `DatePicker` looks like Figure [4-15](#A978-1-4842-0214-2_4_Chapter.html#Fig15).    ![A978-1-4842-0214-2_4_Fig15_HTML.jpg](A978-1-4842-0214-2_4_Fig15_HTML.jpg)    Figure
    4-15.  The default DatePicker is a spinner and calendar  Month and day columns
    can be scrolled and can accept a typed entry, enabling the user to search for
    a month or to enter the date. The calendar at right is scrollable, and the day
    is selectable.    This example creates an inline `DatePicker`, which consumes
    real estate and remains on the page even after the user is done with it. Typically,
    `DatePickers` are implemented as modal dialogs that allow the user to select a
    date value to fill a particular text field, then the dialog disappears after the
    selection is made.    #### Creating a Modal DatePicker by Using DatePickerDialog    The
