    containing your data access layer, and `using` statements (or direct namespace
    references) are needed when referring to those libraries. Once in a while, Visual
    Studio appears to fail when adding new libraries, and itвҖҷs then helpful to close
    and reopen the solution.    The rest of this chapter uses a PCL instead of a shared
    project, for simplicity of demonstration only, but the code is basically the same
    between these approaches except for the database path and initial connection.
    If you want to understand the basic differences in a SQLite.NET implementation
    between PCL and shared project, refer back to the section вҖңBuilding the Database
    Path.вҖқ    Once the connection to your SQLite database is made, you can add tables
    to our new database and start inserting, getting, updating, and deleting rows.    ###
    Creating a Table    Create a new table in a database by defining the table in
    a data model and then using the databaseвҖҷs `CreateTable` method. Use attributes
    such as `[PrimaryKey, AutoIncrement]` to specify keys, max lengths, and other
    properties of the table and its fields (Listing [7-17](#A978-1-4842-0214-2_7_Chapter.html#FPar33)).    Define
    the `Item` data model. Using the `PrimaryKey` and `AutoIncrement` attributes,
    specify an integer primary key to help facilitate queries. Unless specified otherwise
    (using attributes), SQLite will use the class name as the table name and the property
    names as column names.  Listing 7-17\. Table Class Declaration Using SQLite Attributes
    (Item.cs)  В В В В `public class Item {`    В В В В В В В В `[PrimaryKey, AutoIncrement]`    В В В В В В В В `public
    int ID { get; set; }`    В В В В В В В В `[MaxLength(15)]`    В В В В В В В В `public string Name
    { get; set; }`    В В В В В В В В `[MaxLength(50)]`    В В В В В В В В `public string Description
    { get; set; }`    В В В В `}`    Create the table by using the `CreateTable` method:    В В В В `database.CreateTable<Item>();`    The
    table now exists and is ready for rows to be inserted. `CreateTable` wonвҖҷt overwrite
    an existing table (use `DropTable` to drop a table).    The bracketed attributes
    tell SQLite.NET how to regard the properties in the data model in relation to
    the database table.    #### Using Attributes    The following commonly used attributes
    for SQLite data models help you define the table in the database:    *   `[Primary
    Key]`: Specifies the tableвҖҷs primary key when applied to an integer property (no
    composite keys). *   `[AutoIncrement]`: Automatically increments an integer property
    when each object is inserted into the database. *   `[Column(name)]`: Specifies
    the column name. Useful for when it should differ from the property name. *   `[Table(name)]`:
    Specifies the table name. Useful for when it should differ from the data model
    class name. *   `[Ignore]`: SQLite.NET will disregard this property. Useful for
    properties that cannot be stored in the database. *   `[MaxLength(value)]`:Limit
    the size of a text field on inserts and updates by rejecting longer text objects.
    Remember to validate the length before committing text to this field.    Once
    the table is created and fields defined, you can add data to the database.    ####
    Inserting and Deleting Rows    Insert a new row into a table by populating the
    data model and then calling the `Insert` method.    Populate the `Item` data model
    with data:    В В В В `var item = new Item { Name = "First", Description = "This is
    the first item"};`    Call the database connectionвҖҷs `Insert` method to attempt
    to add a row to the table:    В В В В `database.Insert (item);`    Delete rows by
    using the `Delete` method:    В В В В `database.Delete<Item>(id);`  Tip  SQLite supports
    transactions using the `SQLiteTransaction` object with the `BeginTransaction`,
    `Commit`, and `Rollback` methods.    #### Getting Rows    Retrieve rows from a
    table by using the `Get`, `Table`, or `Query` methods. `Get` returns a single
    row, `Table` returns the entire table, and `Query` returns multiple rows using
    SQL.    Pass the integer key ID into the `Get` method to return a row from the
    `Item` table:    В В В В `var item = database.Get<Item>(1);`    Return the entire
    table by using the `Table` method:    В В В В `var itemList = database.Table<Item>();`    Use
    SQL to filter the tableвҖҷs contents by using the `Query` method:    В В В В `var firstItem
    = database.Query<Item>("SELECT * FROM Item WHERE Name = ''First'' ");`    Use
    LINQ to filter the tableвҖҷs contents:    В В В В `var firstItem = from i in database.Table<Item>()`    В В В В В В В В `where
    i.Name == "First"`    В В В В В В В В `select i;`    Or to specify parameters in the `FirstOrDefault`
    method to filter:    В В В В `var itemList = database.Table<Item>().FirstOrDefault(x
    => x.ID == id);`    #### Updating Rows    Update rows in the table by using the
    `Update` method. This changes data on an existing row.    First populate the `Item`
    data model with data:    В В В В `var item = new Item { Name = "First", Description
    = "This is the first item"};`    Call the `Update` method to populate the new
    data in the existing row:    В В В В `database.Update(item);`    Check whether the
    ID exists so you know whether you should update or insert a new row:    В В В В `if
    (item.ID != 0) {`    В В В В В В В В `database.Update(item);`    В В В В В В В В `return item.ID;`    В В В В `}
    else {`    В В В В В В В В `return database.Insert(item);`    В В В В `}`    If youвҖҷre not
    sure that the row exists, use a combination `Insert`/`Update`. The `Insert` method
    will return a nonzero value if it fails, allowing the `Update` to proceed.    В В В В `if
    (database.Insert(item) != 0)`    В В В В В В В В `database.Update(item);`    #### Locking
    Rows    To avoid database collisions, all transactions should be locked. Use the
    `lock` keyword against a static object.    HereвҖҷs a locking example using the
    `Delete` method:    В В В В `static object locker = new object ();`    В В В В `lock (locker)
    {`    В В В В В В В В `database.Delete<Item>(id);`    В В В В `}`    To avoid a deadlock,
    do not lock a method that calls another method that creates a lock.    Those are
    all the basic techniques you need to use the SQLite.NET ORM! Now youвҖҷre ready
    to build a data access layer (DAL) for your app by using these techniques. Since
    itвҖҷs not good architectural form to use SQLite.NET inside your UI layer, you can
    encapsulate SQLite.NET calls in the repository pattern to create a more elegant
    and decoupled architecture.    ### Creating the Data Access Layer    The data
    access layer (DAL) is an industry-standard architecture for data access in a C#
    app. This group of classes encapsulates the data layer, and includes the database
    connection, the database path, and the CRUD transactions, exposing data access
    methods that reflect the specific data in a particular app (for example, `GetItem`,
    `SaveItem` methods). Depending on the level of architectural rigor, the data access
    layer can offer a simple group of loosely arrayed access classes and methods to
    a highly structured and decoupled layer with limited access points (which often
    uses the repository pattern). This approach decouples the data layer implementation
    from the business and presentation layer of your app.  Note  Create, read, update,
    and delete (CRUD) transactions running against a local database typically make
    up the foundation of mobile application data. Some apps donвҖҷt require local database
    access and run entirely using web services, but IвҖҷm not covering those in this
    book.    #### Creating a Repository    At the heart of many enterprise-grade Xamarin
    data access layers is an implementation of the repository pattern. This abstraction
    placed between the business layer and the data layer (the SQLite.NET ORM) provides
    app-specific CRUD methods using object collections, without exposing details of
    data source implementations (databases, XML, JSON, flat files, and so forth).
    Use this pattern to abstract away the details of SQLite implementation, including
    locking. Later you can couple your repository with the singleton pattern to maintain
    the database connection.  Note  The definition of the repository pattern has evolved
    since its inception. It was originally intended as an abstraction to decouple
    the data layer implementation (for example, SQLite) from the rest of the app with
    the added benefit of providing in-memory data-object collections. Over the years,
    many C# apps needed the decoupling but not the in-memory data objects, so those
    collections have evolved to become data objects returned by methods in many cases,
    not kept in repository properties. This is true in most Xamarin apps as well.    Create
    table-specific data access methods (`GetItems`, `SaveItem`, and so forth) that
    encapsulate and employ the generalized SQLite CRUD methods described earlier (`Get`,
    `Insert`, `Update`, and so forth.):    В В В В `public IEnumerable<Item> GetItems
    ()`    В В В В `public IEnumerable<Item> GetFirstItems ()`    В В В В `public Item GetItem(int
    id)`    В В В В `public int SaveItem(Item item)`    В В В В `public int DeleteItem(int
    id)`    В В В В `public void DeleteAllItems()`    Make methods that are specific to
    the kind of data youвҖҷre using, the `Item` table in this case. Avoid generic methods
    like `Get` and `Insert` and instead employ data-specific methods like `GetItem`
    and `InsertItem` (generic-sounding but specific to your `Item` table). There is
    a place for generic repository components, and weвҖҷll get to that soon.    A basic
