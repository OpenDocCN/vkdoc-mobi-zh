    Optimizing Performance    android    When building a list adapter, it is important
    to code for performance which means reusing cells whenever possible. A cell is
    a memory location that holds a list row. The common technique used in Xamarin.Android
    apps is the null cell check, which attempts to reuse an existing cell (if it exists
    in memory) or creates it anew if it doesnвҖҷt exist. Either way, the cell is populated
    with new data. This is so that cells can be recycled in memory as rows scroll
    off of the screen rather than be thrown away.    HereвҖҷs how the null cell check
    works. The `GetView` method of the adapter constructs each row of the list as
    needed, producing new rows for display when the list is scrolled. The `View` parameter
    contains an existing row, if one exists. If it is null, a new row is created using
    the `Inflate` method. Then the row is populated with current data. We did this
    earlier when creating the list item adapter in Listing [5-11](#A978-1-4842-0214-2_5_Chapter.html#FPar31).    В В В В `public
    override View GetView(int position, View convertView, ViewGroup parent)`    В В В В `{`    В В В В В В В В `View
    view = convertView;`    В В В В В В В В `if (view == null)`    В В В В В В В В В В В В `view = context.LayoutInflater.Inflate(`    В В В В В В В В В В В В В В В `Android.Resource.Layout.SimpleListItem1,
    null);`    В В В В В В В В В В В В `view.FindViewById<TextView>(Android.Resource.Id.Text1).Text
    =`    В В В В В В В В В В В В В В В В В `itemList[position].Title;`    В В В В В В В В `return view;`    В В В В `}`  Tip  Further
    optimization can be attained using `ViewHolder`. See James MontemagnoвҖҷs (pronounced
    mahn-teh-mahn-yo) blog post on the topic at [`http://blog.xamarin.com/creating-highly-performant-smooth-scrolling-android-listviews/`](http://blog.xamarin.com/creating-highly-performant-smooth-scrolling-android-listviews/)
