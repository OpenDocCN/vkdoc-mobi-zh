    ### йҖҡиҝҮиҮӘе®ҡд№үжёІжҹ“еҷЁеҗҢж—¶дҪҝз”ЁдёӨз§Қж–№жі•


    иҮӘе®ҡд№үжёІжҹ“еҷЁе…Ғи®ёи®ҝй—®еә•еұӮгҖҒе№іеҸ°зү№е®ҡзҡ„еұҸе№•жёІжҹ“зұ»пјҲз§°дёәжёІжҹ“еҷЁпјүпјҢиҝҷдәӣзұ»дҪҝз”Ёе№іеҸ°зү№е®ҡжҺ§д»¶жқҘеҲӣе»әжүҖжңү Xamarin.Forms еұҸе№•гҖӮдҪҝз”Ёиҝҷз§Қж–№жі•пјҢд»»дҪ• Xamarin.Forms
    еұҸе№•йғҪеҸҜд»ҘеҲҶи§Јдёәе№іеҸ°зү№е®ҡзҡ„еұҸе№•е’Ңзұ»гҖӮиҝҷж„Ҹе‘ізқҖжҲ‘д»¬еҸҜд»Ҙзј–еҶҷдёҖдёӘ Xamarin.Forms йЎөйқўжҲ–еә”з”ЁпјҢе№¶еңЁеҝ…иҰҒж—¶жҢүе№іеҸ°иҝӣиЎҢиҮӘе®ҡд№үгҖӮжӣҙеӨҡеҶ…е®№иҜ·еҸӮи§Ғз¬¬ 8 з« гҖӮ


    и°Ёж…ҺдҪҝз”ЁиҮӘе®ҡд№үжёІжҹ“еҷЁпјҢеҗҰеҲҷеҸҜиғҪеҜјиҮҙ UI д»Јз Ғеә“зўҺзүҮеҢ–пјҢиҖҢиҝҷз§ҚзўҺзүҮеҢ–еҫҲеҸҜиғҪеҪ“еҲқе°ұеә”иҜҘе®Ңе…Ёд»Ҙе№іеҸ°зү№е®ҡ UI зҡ„ж–№ејҸзј–еҶҷгҖӮ


    еңЁжҺҘдёӢжқҘзҡ„жҜҸдёҖз« дёӯпјҢжҲ‘д»¬е°ҶжҺўз©¶ Xamarin.Forms зҡ„йҖүйЎ№пјҢз„¶еҗҺжЈҖжҹҘзӣёеҗҢеҠҹиғҪзҡ„е№іеҸ°зү№е®ҡе®һзҺ°гҖӮдҪ е°ҶиғҪеӨҹзңӢеҲ°е®ғд»¬еңЁж’°еҶҷжң¬ж–Үж—¶зҡ„еҜ№жҜ”жғ…еҶөпјҢд»ҘеҸҠеҰӮдҪ•дҪҝз”ЁиҮӘе®ҡд№үжёІжҹ“еҷЁе°Ҷе®ғд»¬з»“еҗҲиө·жқҘгҖӮйҡҸзқҖж—¶й—ҙзҡ„жҺЁз§»пјҢXamarin.Forms
    еҸҜиғҪдјҡд»ҺдёҖз§ҚжЎҶжһ¶жҗӯе»әжҠҖжңҜеҸ‘еұ•дёәеҠҹиғҪе…Ёйқўзҡ„и·Ёе№іеҸ°еә”з”Ёжһ„е»әжЁЎеқ—гҖӮеҰӮжһңжІЎжңүпјҲжҲ–иҖ…еңЁжӯӨд№ӢеүҚпјүпјҢе№іеҸ°зү№е®ҡзҡ„ж–№жі•д»Қз„¶жҳҜжһ„е»әй«ҳеҠҹиғҪеә”з”ЁжүҖеҝ…йңҖзҡ„пјҢиҖҢж— йңҖдёҘйҮҚдҫқиө– Xamarin.Forms
    зҡ„иҮӘе®ҡд№үжёІжҹ“еҷЁгҖӮ


    иҝҮеҺ»иҺ·еҘ–зҡ„ Xamarin еә”з”ЁйғҪжҳҜдҪҝз”Ёе№іеҸ°зү№е®ҡж–№жі•еҲӣе»әзҡ„пјҢдҪҶе…ій”®й—®йўҳжҳҜпјҢдҪ д»ҠеӨ©е°ҶеҲӣе»әд»Җд№Ҳпјҹ


    и®©жҲ‘д»¬жҺўзҙў C# з§»еҠЁз”ЁжҲ·з•Ңйқўзҡ„жһ„е»әжЁЎеқ—гҖӮ


    ## жҺўзҙўз§»еҠЁ UI зҡ„жһ„жҲҗе…ғзҙ 


    Xamarin жҳҜдёҖдёӘз»ҹдёҖеӨҡдёӘе№іеҸ°зҡ„е·Ҙе…·пјҢиҝҷдәӣе№іеҸ°еҜ№еҗҢдёҖдәӢзү©зҡ„е‘ҪеҗҚеҸҜиғҪдёҚеҗҢгҖӮд»ҘдёӢжҳҜеҹәдәҺ Xamarin.Forms и§Ҷи§’зҡ„з»ҹдёҖжңҜиҜӯпјҡ


    *   **еұҸе№•гҖҒи§ҶеӣҫжҲ–йЎөйқў** еңЁз§»еҠЁеә”з”Ёдёӯз”ұеҮ дёӘеҹәжң¬з»„д»¶з»„жһ„жҲҗпјҡйЎөйқўгҖҒеёғеұҖе’ҢжҺ§д»¶гҖӮйЎөйқўеҸҜд»ҘжҳҜе®Ңж•ҙжҲ–йғЁеҲҶеұҸе№•пјҢд№ҹеҸҜд»ҘжҳҜжҺ§д»¶з»„гҖӮеңЁ Xamarin.Forms
    дёӯпјҢе®ғд»¬иў«з§°дёәйЎөйқўпјҲеӣ жҙҫз”ҹиҮӘ `Page` зұ»пјүгҖӮеңЁ iOS дёӯпјҢе®ғд»¬жҳҜи§ҶеӣҫпјӣеңЁ Android дёӯпјҢе®ғд»¬жҳҜеұҸе№•гҖҒеёғеұҖпјҢжҲ–иҖ…жңүж—¶иў«з¬јз»ҹең°з§°дёәжҙ»еҠЁпјҲActivityпјүгҖӮ

    *   **жҺ§д»¶** жҳҜзӢ¬з«Ӣзҡ„ UI е…ғзҙ пјҢжҲ‘д»¬з”ЁжқҘжҳҫзӨәдҝЎжҒҜжҲ–жҸҗдҫӣйҖүжӢ©жҲ–еҜјиҲӘгҖӮXamarin.Forms з§°е…¶дёәи§ҶеӣҫпјҲViewsпјүпјҢеӣ дёәжҺ§д»¶з»§жүҝиҮӘ `View`
    зұ»гҖӮжҹҗдәӣжҺ§д»¶еңЁ Android дёӯиў«з§°дёәйғЁд»¶пјҲWidgetsпјүгҖӮжӣҙеӨҡеҶ…е®№е°ҶеңЁзЁҚеҗҺеҸҠз¬¬ 4 з« дёӯд»Ӣз»ҚгҖӮ

    *   **еёғеұҖ** жҳҜжҺ§д»¶зҡ„е®№еҷЁпјҢеҶіе®ҡе®ғд»¬зҡ„еӨ§е°ҸгҖҒдҪҚзҪ®еҸҠзӣёдә’е…ізі»гҖӮXamarin.Forms е’Ң Android дҪҝз”ЁиҝҷдёӘжңҜиҜӯпјҢиҖҢеңЁ iOS дёӯжүҖжңүдёңиҘҝйғҪжҳҜи§ҶеӣҫгҖӮжӣҙеӨҡеҶ…е®№иҜ·и§Ғз¬¬
    3 з« гҖӮ

    *   **еҲ—иЎЁ**пјҢйҖҡеёёеҸҜж»ҡеҠЁдё”еҸҜйҖүжӢ©пјҢжҳҜз§»еҠЁ UI дёӯжңҖйҮҚиҰҒзҡ„ж•°жҚ®жҳҫзӨәе’ҢйҖүжӢ©е·Ҙе…·д№ӢдёҖгҖӮжӣҙеӨҡеҶ…е®№иҜ·и§Ғз¬¬ 5 з« гҖӮ

    *   **еҜјиҲӘ** дёәз”ЁжҲ·жҸҗдҫӣйҒҚеҺҶеә”з”Ёзҡ„ж–№ејҸпјҢйҖҡиҝҮдҪҝз”ЁиҸңеҚ•гҖҒйҖүйЎ№еҚЎгҖҒе·Ҙе…·ж ҸгҖҒеҲ—иЎЁгҖҒеҸҜзӮ№еҮ»еӣҫж Үд»ҘеҸҠеҗ‘дёҠе’Ңиҝ”еӣһжҢүй’®е®һзҺ°гҖӮжӣҙеӨҡеҶ…е®№иҜ·и§Ғз¬¬ 6 з« гҖӮ

    *   **жЁЎжҖҒжЎҶгҖҒеҜ№иҜқжЎҶе’ҢжҸҗзӨә** йҖҡеёёжҳҜеј№еҮәеұҸе№•пјҢз”ЁдәҺжҸҗдҫӣдҝЎжҒҜе№¶иҰҒжұӮз”ЁжҲ·еҒҡеҮәжҹҗз§Қе“Қеә”гҖӮжӣҙеӨҡеҶ…е®№иҜ·и§Ғз¬¬ 6 з« гҖӮ


    зҺ°еңЁжҲ‘д»¬е·Із»ҸжңүдәҶзӣёе…ізҡ„иғҢжҷҜзҹҘиҜҶе’ҢжңҜиҜӯпјҢи®©жҲ‘д»¬дёҖиө·ејҖе§ӢдҪҝз”Ё Xamarin.Forms еҗ§пјҒ

