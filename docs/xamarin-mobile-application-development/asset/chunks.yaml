    navigation on Android is created by using a range of techniques, including the
    `DialogFragment`, `AlertDialog`, and `PopupMenu` class. `DialogFragment` is a
    specialized type of fragment that creates a pop-up modal that can contain a layout
    or wrap an `AlertDialog` (a dialog box containing text and/or controls). Pop-up
    menus are made by using the `PopupMenu` class.    #### Creating Modals Using DialogFragment    `DialogFragment`
    is used to create many types of modal dialog boxes. `DialogFragment` has largely
    replaced `AlertDialog` as the primary modal technique since Google deprecated
    the `ShowDialog` method. Create a layout XML to comprise the modal, and then build
    a `DialogFragment` subclass that inflates this layout in the `OnCreateView` method.    Create
    a layout XML called `Modal` that allows the entry of a name, using a `TextView`,
