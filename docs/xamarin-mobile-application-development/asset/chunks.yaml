    += (sender, ea) => {`    В В В В В В В В `PageTwo pageTwo = this.Storyboard.InstantiateViewController`    В В В В В В В В В В В В `("PageTwo")
    as PageTwo;`    В В В В В В В В `NavigationController.PushViewController(pageTwo,true);`    В В В В `};`    This
    code instantiates the second view controller by using `Storyboard.InstantiateViewController`
    and then pushes the second page on the stack by using `NavigationController.PushViewController`.
    Tap the `buttonGoToTwo` on the first page and navigate to page 2, as shown in
    Figure [6-38](#A978-1-4842-0214-2_6_Chapter.html#Fig38).    ![A978-1-4842-0214-2_6_Fig38_HTML.jpg](A978-1-4842-0214-2_6_Fig38_HTML.jpg)    Figure
    6-38.  Navigate to the second page by using UINavigationController  `UINavigationController`
    allows the user to tap the left arrow and/or the PageOne text to return to the
    first page.  Tip  Back (or pop) can be coded manually with the Unwind segue or
    the `DismissViewController` method.    #### Customizing UINavigationController    Customizations
    can be made to `UINavigationController` directly (`navController`, in this case)
    or by referencing the navigation controller instance in `UIViewController` via
    the `UIViewController.NavigationController` property. The following customizations
    are made in `navController` directly.    The title used in the navigation bar
    comes from the `Title` property of each view controller:    В В В В `navController.Title
    = "Page Title";`    Change the style color of the navigation bar by using the
    `BarStyle` property:    В В В В `navController.NavigationBar.BarStyle = UIBarStyle.Black;`    Set
    the style back to the default:    В В В В `navController.NavigationBar.BarStyle =
    UIBarStyle.Default;`    Hide the navigation bar by using the `SetNavigationBarHidden`
    method:    В В В В `navController.SetNavigationBarHidden (true, true);`    Show the
    navigation bar:    В В В В `navController.SetNavigationBarHidden (false, true);`  Note  The
    navigation bar has options for a customizable Back button icon, a right button,
    and a second toolbar at the bottom of the screen. For these and other options,
    consult the Xamarin online documentation for the iOS navigation controller.    ###
    Modal Navigation    i OS    There are two types of modals in iOS: full screen
    and pop-ups. Full-screen modals are created by using the Modal segue or the view
    controllerвҖҷs `PresentViewController` method. Pop-up modals, which include dialog
    boxes, user alerts, notifications, and pop-up menus, are created using `UIAlertController.
    UIAlertController` is a subclass of `ViewController`, and is displayed as a modal
    alert or action sheet, a pop-up menu.  Tip  `UIAlertController` replaced both
    `UAlertView` and `UIActionSheet` in iOS 8\. For tips on how to handle OS versioning,
    see [Chapter 9](#A978-1-4842-0214-2_9_Chapter.html).    #### Using the Modal Segue
    or PresentViewController    The Modal segue creates a relationship between two
    view controllers with an option for animation between the screens. The child screen
    will fill the entire visible page but will not provide a Back button. The Modal
    segue is functionally the same as using the `UIViewController.PresentViewController`
    method.    Add a scene to your storyboard by using your designer tool to drop
    a view controller into it, and give it a class name and view controller title
    of `PageModalView`. Also add a `UIViewController` by clicking the bottom of the
    `PageModalView` scene, and give the view controller a name and storyboard ID of
    `PageModal`.    If youвҖҷre using the designer to build storyboards, create a Modal
    segue in your designer by Ctrl-clicking inside a button on the source scene and
