- fmt: '# Understanding the Platform-Specific UI Approach


    Before Xamarin.Forms, there were the platform-specific (or native) UI options,
    which consist of the Xamarin.Android, Xamarin.iOS, and Windows Phone SDK libraries.
    Building screens using platform-specific UIs requires some understanding of the
    native UIs exposed by these libraries. We donвҖҷt need to code directly in iOS UIKit
    or Android SDK, as weвҖҷre one layer removed when using Xamarin bindings in C#.
    Using the Windows Phone SDK is, of course, coding natively in C# against the Windows
    Phone SDK, a C# library. The advantage of using XamarinвҖҷs platform-specific UIs
    is that these libraries are established and full-featured. Each native control
    and container class has a great many properties and methods, and the Xamarin bindings
    expose many of them out-of-the-box.


    **Note:** WeвҖҷre not talking about native UI development using Objective-C or Java
    here but use of Xamarin C# platform-specific bindings to native UI libraries.
    To avoid such confusion, this book favors the term *platform-specific* over *native*
    when referring to Xamarin libraries but Xamarin developers will sometimes use
    the term *native* to refer to the use of platform-specific libraries `Xamarin.iOS`
    and `Xamarin.Android`.


    ## Platform-specific UI Solution Architecture


    Figure [2-4](#A978-1-4842-0214-2_2_Chapter.html#Fig4) shows how a platform-specific
    solution designed to be cross-platform shares C# application code containing the
    business logic and data access layer, just like a Xamarin.Forms solution. The
    UI layer is another story: ItвҖҷs all platform-specific. UI C# code in these projects
    uses classes that are bound directly to the native API: iOS, Android, or the Windows
    Phone API directly sans binding.


    ![A978-1-4842-0214-2_2_Fig4_HTML.jpg](A978-1-4842-0214-2_2_Fig4_HTML.jpg)


    *Figure 2-4. Platform-specific UI solution architecture*


    If you compare this diagram to the Xamarin.Forms diagram in Figure [2-2](#A978-1-4842-0214-2_2_Chapter.html#Fig2),
    youвҖҷll see that thereвҖҷs a lot more coding to be done here: a UI for every platform
    as opposed to one for all. Why would anyone bother to do it this way? There are
    quite a few good reasons why some or even all of the code might be done better
    this way. To address the burning question *Which do I use, Xamarin.Forms or Xamarin
    platform-specific UIs?*, see the section вҖңChoosing Xamarin.Forms or a Platform-Specific
    UIвҖқ later in this chapter.


    But first letвҖҷs delve into the Android and iOS bindings and then look at the Windows
    Phone SDK.


    ## Xamarin.Android


    The Xamarin.Android C# bindings tie us into the Android API. Android apps are
    made up of layouts and activities, roughly translated as views and controllers.
    Layouts are typically XML files (`.axml`) edited using a UI designer that define
    the controls displayed on a screen. An `Activity` is a class that typically manages
    the life cycle of a single layout, although smaller layouts, called fragments,
    can be combined to comprise a screen.


    Controls are called views in Android-ese: `Buttons`, `TextViews`, `ListViews`,
    and so forth. We place these on another kind of layout, controls that contain
    controls, which work like `<div>` in HTML: `LinearLayout`, `RelativeLayout`, `FrameLayout`,
    and `WebViews`. These layouts, inherited from the `ViewGroup` class, are assembled
    manually or generated dynamically using data-binding classes called adapters.
    Inheriting from `AdapterView`, widgets such as `ListView` and `GridView` are populated
    by data-binding.


    **Note:** Android parlance uses вҖңlayoutвҖқ to mean two different things: an XML
    file containing a UI screen (`.axml`) and a container control that houses and
    formats other controls, such as `LinearLayout`.


    There are two ways to build Android layouts: using XML resource files or coding
    them in C# by hand. XML files (`.axml`) are highly readable and elegant, which
    encourages direct editing of the XML code, even when also using the Xamarin Designer
    for Android, the XML resource file editor. Most mobile developers prefer Android
    XML resource files (`.axml`) to hand-coding the UI in C#. Coding Android UI by
    hand in C# is not as comfortable, because the necessary methods and parameters
    have been deemed by the developer community to be clumsy and difficult to use.
    Additionally, most online examples of Android UI use XML resource files, even
    in the Xamarin online documentation. Those are the reasons that most of the Android
    development community is using XML for UI development. This practice has extended
    to the Xamarin development community, not to mention that using XML resource files
    is the Xamarin-recommended method.


    ## Xamarin.iOS


    The Xamarin.iOS C# bindings hook us up with the iOS native UI API, called UIKit.
    `Views` and `ViewControllers` are the equivalent of views and controllers in iOS.
    Views are typically constructed using a designer tool and result in an XML file
    (`.xib` or `.storyboard`). `ViewController` is a controller class that manages
    the views. In iOS we work with layers: tab bar view, navigation view, and images
    overlaying our main view, all nested inside a [`UIWindow`](https://developer.apple.com/library/ios/documentation/UIKit/Reference/UIWindow_Class/UIWindowClassReference/UIWindowClassReference.html#//apple_ref/occ/cl/UIWindow%23_self).
    Controls include `UILabel`, `UIButton`, `UITextField`, and `UISlider`. These controls
    reside in a view class called `UIView`, which is inherited to create useful data-bound
    views such as `UITableView` for lists and `UICollectionView` for grids and groupings.
    iOS layouts are built using a technique called AutoLayout, based on constraints
    between views that move and size dynamically depending on the display context.
    The older layout approach, AutoSizing, involves creating frames and masking them,
    also called springs and struts. This is all part of UIKit, the development framework
    of the iOS user interface.


    **Tip:** Why the `UI` in `UILabel`, `UIButton`, `UIThis`, and `UIThat`? iOSвҖҷs
    Objective-C has no namespaces, so they are concatenated with the class name.


    There are two ways to build screens in iOS: the first is using a designer tool,
    such as the Xamarin Designer for iOS or the Xcode Interface Builder, and the second
    is hand-coding in C#. The designer tools create a storyboard XML file or `.xib`
    (pronounced and written: nib), and hand-coding is done straight in the iOS view-controller
    C# classes (these are then called nib-less views). Storyboards and nibs are sometimes
    difficult to read. This tightly couples them to the tools we use to construct
    them and discourages manual editing. Nibs are useful for simple forms such as
    modals and login pages, and the storyboard is the workhorse for prototyping, complex
    transitions, and multiple interconnected pages. Dynamic data-binding, data flow
    between pages, and visual effects and complexity are often best accomplished with
    hand-coded C#.


    **Important Tip:** The focus of this book is Xamarin.Forms and cross-platform
    code-first development with some of the most useful platform-specific techniques
    available. ThatвҖҷs a lot to cover in one book, so the discussion of some Android
    and iOS basics and all designer tools is out of scope. If youвҖҷre doing platform-specific
    development on Android or iOS for the first time, youвҖҷll need to consult additional
    sources. See the Introduction of this book for Prerequisites and consult the Xamarin,
    Google, and Apple online docs or one of the many fine platform-specific books
    to fill you in.'
