    В В В В В В В В `}`


    В В В В В В В В `protected override void OnStart()`


    В В В В В В В В `{`


    В В В В В В В В `}`


    В В В В В В В В `protected override void OnSleep()`


    В В В В В В В В `{`


    В В В В В В В В `}`


    В В В В В В В В `protected override void OnResume()`


    В В В В В В В В `{`


    В В В В В В В В `}`


    В В В В `}`


    `}`


    Each platform-specific project creates an instance of `App` to set the main page,
    in this case a `ContentPage` object with its `Content` property populated with
    a friendly `Label`, centered horizontally and vertically. The `Content` property
    only holds one child view. Multiple views must be contained within a child `Layout`,
    a container for views, or using a `ContentPage`. The `MainPage` property is set
    to the root page of the application using an inline `ContentPage` class.


    Soon we will replace this `ContentPage` with our own `ContentPage` class and place
    controls on it.


    Tip


    A static `Application.Current` property references the current application object
    anywhere in your app.


    The `OnStart`, `OnSleep`, and `OnResume` method overrides created for us are used
    to manage our app when it is moved to and from the background.


    #### Application Lifecycle Methods: OnStart, OnSleep, and OnResume


    When the user clicks the `Back` or `Home` (or `App Switcher`) buttons on their
    device, an app moves into the background. When they reselect the app again, it
    resumes and moves back into the foreground. The starting of an app, the progression
    of the app from the foreground into a background state then back into the foreground
    again, until termination, is called the application lifecycle. The `Application`
    class includes three virtual methods to handle lifecycle events:


    *   OnStart вҖ“ Called when the app is first started

    *   OnSleep вҖ“ Called each time the app is moved into the background

    *   OnResume вҖ“ Called when the app is resumed after being in the background


    `OnSleep` is also used for normal application termination (not a crash). Any time
    an app moves into a background state, it must be assumed that it may never return
    from that state.


    Tip


    Use the `Properties` dictionary for disk persistence in these methods when an
    app is backgrounded. See [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html) for more
    on State Management.


    #### Building Pages Using ContentPage


    The `ContentPage` class in `App.cs` (Listing [2-1](#A978-1-4842-0214-2_2_Chapter.html#FPar12)),
    inherited from `Xamarin.Forms.Page`, is the generic page used in Xamarin.Forms
    when a page is custom-built. It contains one child, assigned to its `Content`
    property, such as the preceding `Label`. Placing multiple controls on a `ContentPage`
    requires the use of a custom class inherited from `ContentPage`, which contains
    a container such as a `Layout`.


    `ContentPage` has properties that affect the appearance of the page. The `Padding`
    property creates space around the margins of the page to improve readability and
    design. `BackgroundImage` can contain an image that is displayed on the background
    of the page.


    Several of `ContentPage''s` members are useful for navigation and state management.
    The `Title` property contains text and the `Icon` property contains an image that
    display at the top of the page when `NavigationPage` is implemented. Lifecycle
    methods `OnAppearing` and `OnDisappearing` can be overridden to handle initialization
    and finalization of a `ContentPage`. The `ToolBarItems` property is useful for
    creating a drop-down menu. All of these navigation-related members are covered
    in [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).


    ### Xamarin.Android


    android


    The Android project contains a startup file called `MainActivity.cs`, which defines
    an activity class inherited from `Xamarin.Forms.Platform.Android.FormsApplicationActivity`
    as seen in Listing [2-2](#A978-1-4842-0214-2_2_Chapter.html#FPar16).


