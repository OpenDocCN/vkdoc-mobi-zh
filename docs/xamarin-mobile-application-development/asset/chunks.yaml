    \ = LayoutOptions.CenterAndExpand\n};\n```\n\nеҪ“ж–Үжң¬и¶іеӨҹеӨҡд»ҘиҮідәҺйңҖиҰҒжҚўиЎҢж—¶пјҢжҲ–иҖ…йҖҡиҝҮ `\\n` жҳҫејҸжҢҮе®ҡжҚўиЎҢж—¶пјҢеӨҡиЎҢж–Үжң¬е°ұдјҡйҡҗејҸдә§з”ҹгҖӮ\n\
    \nдёҖдёӘ `Label` и§ҶеӣҫжңүдёӨз§ҚеҜ№йҪҗзұ»еһӢпјҡи§ҶеӣҫеҜ№йҪҗе’Ңж–Үжң¬еҜ№йҪҗгҖӮж•ҙдёӘи§ҶеӣҫеңЁеёғеұҖдёӯдҪҝз”Ё `HorizontalOptions` е’Ң `VerticalOptions`\
    \ еұһжҖ§пјҲйҖҡиҝҮ `LayoutOptions` иөӢеҖјпјүиҝӣиЎҢеҜ№йҪҗгҖӮ`Label` ж–Үжң¬еңЁ `Label` еҶ…йғЁдҪҝз”Ё `Label` зҡ„ `XAlign` е’Ң\
    \ `YAlign` еұһжҖ§иҝӣиЎҢеҜ№йҪҗпјҢе…¶дёӯ `XAlign` и®ҫзҪ®ж–Үжң¬зҡ„ж°ҙе№іеҜ№йҪҗпјҢ`YAlign` и®ҫзҪ®ж–Үжң¬зҡ„еһӮзӣҙеҜ№йҪҗгҖӮ\n\n```\nXAlign = TextAlignment.End\n\
    ```\n\n`TextAlignment` жһҡдёҫжңүдёүдёӘеҖјпјҡ`Start`гҖҒ`Center` е’Ң `End`гҖӮеңЁиҝҷдёӘдҫӢеӯҗдёӯжҲ‘д»¬дҪҝз”Ёй»ҳи®ӨеҖјгҖӮ\n\nжҺҘдёӢжқҘпјҢеҝ…йЎ»е°Ҷж ҮзӯҫеҲҶй…ҚеҲ°дёҖдёӘеёғеұҖдёӯпјҢд»ҘдҫҝеңЁйЎөйқўдёҠиҝӣиЎҢж”ҫзҪ®гҖӮ\n\
    \n### дҪҝз”Ё `StackLayout` ж”ҫзҪ®и§Ҷеӣҫ\n\nдёҖдёӘ `Layout` и§Ҷеӣҫе……еҪ“е…¶д»–и§Ҷеӣҫзҡ„е®№еҷЁгҖӮз”ұдәҺдёҖдёӘ `ContentPage` еҸӘиғҪжңүдёҖдёӘеӯҗе…ғзҙ пјҢжҲ‘д»¬йЎөйқўдёҠзҡ„жүҖжңүи§ҶеӣҫйғҪеҝ…йЎ»ж”ҫеңЁдёҖдёӘе®№еҷЁдёӯпјҢе№¶е°ҶиҜҘе®№еҷЁдҪңдёә\
    \ `ContentPage` зҡ„еӯҗе…ғзҙ гҖӮиҝҷйҮҢжҲ‘д»¬дҪҝз”Ё `StackLayout`пјҢе®ғжҳҜ `Layout` зҡ„дёҖдёӘеӯҗзұ»пјҢеҸҜд»ҘеһӮзӣҙвҖңе ҶеҸ вҖқеӯҗи§Ҷеӣҫпјҡ\n\n```\n\
    StackLayout stackLayout = new StackLayout\n{\n        Children =\n        {\n\
    \            labelLarge,\n            labelSmall\n        },\n        HeightRequest\
    \ = 1500\n};\n```\n\nжҲ‘д»¬йҖҡиҝҮдҪҝз”Ё `StackLayout` зҡ„ `Children` еұһжҖ§е°ҶжүҖжңүеӯҗи§Ҷеӣҫж”ҫзҪ®еҲ°зҲ¶и§ҶеӣҫдёҠпјҢе№¶дҪҝз”Ё `HeightRequest`\
    \ и®ҫзҪ®иҜ·жұӮзҡ„й«ҳеәҰгҖӮ`HeightRequest` иў«и®ҫзҪ®дёәжҜ”еҸҜи§ҒйЎөйқўжӣҙеӨ§пјҢиҝҷж ·жҲ‘д»¬зЁҚеҗҺеҸҜд»ҘдҪҝе…¶ж»ҡеҠЁгҖӮ\n\n> **жіЁж„Ҹ** йҷӨйқһдҪҝз”Ё `Orientation\
    \ = StackOrientation.Vertical` жҢҮе®ҡдәҶж°ҙе№ійЎәеәҸпјҢеҗҰеҲҷ `StackLayout` зҡ„еӯҗи§ҶеӣҫжҳҜеһӮзӣҙе ҶеҸ зҡ„гҖӮ\n\nдёәдәҶи®© `StackLayout`\
    \ еңЁжҲ‘д»¬зҡ„йЎөйқўдёҠжҳҫзӨәпјҢжҲ‘д»¬еҝ…йЎ»е°Ҷе…¶иөӢеҖјз»ҷ `ContentPage` зҡ„ `Content` еұһжҖ§пјҡ\n\n```\nthis.Content = stackLayout;\n\
    ```\n\nзј–иҜ‘е№¶иҝҗиЎҢд»Јз ҒгҖӮеӣҫ 2-7 еҲҶеҲ«еұ•зӨәдәҶеңЁ iOSгҖҒAndroid е’Ң Windows Phone дёҠпјҢжҲ‘д»¬зҡ„ж ҮзӯҫдҪҚдәҺ `StackLayout`\
    \ дёӯзҡ„жғ…еҶөгҖӮ\n\n![A978-1-4842-0214-2_2_Fig7_HTML.jpg](img/A978-1-4842-0214-2_2_Fig7_HTML.jpg)\n\
    \n**еӣҫ 2-7.** `StackLayout` дёҠзҡ„ Xamarin.Forms `Label`\n\nеҰӮжһңдҪ дҪҝз”Ёзҡ„жҳҜ iOSпјҢе№¶еёҢжңӣдҪ зҡ„ Xamarin.Forms\
    \ йЎ№зӣ®зңӢиө·жқҘжӣҙеғҸжң¬д№Ұдёӯзҡ„зӨәдҫӢпјҲй»‘иүІиғҢжҷҜе’ҢзҷҪиүІж–Үжң¬пјүпјҢжҲ–иҖ…дҪ дҪҝз”Ёе…¶д»–е№іеҸ°е№¶еёҢжңӣзңӢиө·жқҘжӣҙеғҸ iOSпјҢйӮЈд№Ҳи®ҫзҪ®иғҢжҷҜйўңиүІе’Ңеӯ—дҪ“йўңиүІдјҡжңүжүҖеё®еҠ©гҖӮ\n\n### иғҢжҷҜйўңиүІе’Ңеӯ—дҪ“йўңиүІ\n\
    \nйЎөйқўиғҢжҷҜйўңиүІе’Ңи§Ҷеӣҫеӯ—дҪ“йўңиүІеҸҜд»ҘйҖҡиҝҮ `ContentPage` зҡ„ `BackgroundColor` еұһжҖ§е’ҢеҹәдәҺж–Үжң¬зҡ„ `Views` дёҠзҡ„ `TextColor`\
    \ еұһжҖ§жқҘжӣҙж”№гҖӮ\n\nеҰӮжһңдҪ жӯЈеңЁеӨ„зҗҶ iOS йЎ№зӣ®пјҢе№¶еёҢжңӣдҪ зҡ„е·ҘдҪңзңӢиө·жқҘжӣҙеғҸе…·жңүй»‘иүІиғҢжҷҜзҡ„д№ҰзұҚзӨәдҫӢпјҢиҜ·е°ҶиҝҷдёҖиЎҢж·»еҠ еҲ°дҪ зҡ„йЎөйқўдёӯпјҡ\n\n```\nthis.BackgroundColor\
    \ = Color.Black;\n```\n\nеҰӮжһңдҪ еёҢжңӣе®ғзңӢиө·жқҘжӣҙз»Ҹе…ёзҡ„ iOS йЈҺж јпјҢеҲҷе°Ҷе…¶и®ҫзҪ®дёә `Color.White`гҖӮ\n\nж–Үжң¬йўңиүІйҡҸеҗҺдјҡиҮӘеҠЁи®ҫзҪ®дёәиҫғжө…зҡ„йўңиүІгҖӮдҪҶжҳҜпјҢдҪ еҸҜд»ҘдҪҝз”Ё\
    \ `TextColor` еұһжҖ§еңЁж–Үжң¬жҺ§д»¶дёҠжүӢеҠЁжҺ§еҲ¶ж–Үжң¬йўңиүІгҖӮ\n\n```\nTextColor =  Color.White,\n```\n\nжҲ‘д»¬еңЁи®ёеӨҡжҺ§д»¶дёӯдҪҝз”Ёеӯ—дҪ“пјҢжүҖд»ҘжҲ‘д»¬еҝ«йҖҹжөҸи§ҲдёҖдёӢе®ғд»¬гҖӮ\n\
    \n### дҪҝз”Ёеӯ—дҪ“\n\nйҖҡиҝҮдҪҝз”Ёд»ҘдёӢеұһжҖ§жқҘж јејҸеҢ–жҺ§д»¶дёҠзҡ„ж–Үжң¬пјҡ\n\n*   `FontFamily`пјҡеңЁ `FontFamily` еұһжҖ§дёӯи®ҫзҪ®еӯ—дҪ“зҡ„еҗҚз§°пјҢеҗҰеҲҷе°ҶдҪҝз”Ёй»ҳи®Өзҡ„зі»з»ҹеӯ—дҪ“гҖӮдҫӢеҰӮпјҢ`label.FontFamily\
    \ = \"Courier\";`\n*   `FontSize`пјҡеӯ—дҪ“еӨ§е°Ҹе’ҢзІ—з»ҶйҖҡиҝҮдҪҝз”ЁеҸҢзІҫеәҰеҖјжҲ– `NamedSize` жһҡдёҫеңЁ `FontSize`\
    \ еұһжҖ§дёӯжҢҮе®ҡгҖӮиҝҷжҳҜдёҖдёӘдҪҝз”ЁеҸҢзІҫеәҰеҖјзҡ„зӨәдҫӢпјҡ`label.FontSize = 40;`гҖӮйҖҡиҝҮдҪҝз”Ё `NamedSize` еҖјпјҲдҫӢеҰӮ `NamedSize.Large`пјүжқҘи®ҫзҪ®зӣёеҜ№еӨ§е°ҸпјҢдҪҝз”Ё\
    \ `NamedSize` жҲҗе‘ҳ `Large`гҖҒ`Medium`гҖҒ`Small` е’Ң `Micro`гҖӮдҫӢеҰӮпјҢ`button.FontSize = Device.GetNamedSize\
    \ (NamedSize.Large, typeof(Button));`\n*   `FontAttributes`пјҡеӯ—дҪ“ж ·ејҸпјҲеҰӮзІ—дҪ“е’Ңж–ңдҪ“пјүдҪҝз”Ё `FontAttributes`\
    \ еұһжҖ§жҢҮе®ҡгҖӮеҚ•дёӘеұһжҖ§зҡ„и®ҫзҪ®ж–№ејҸеҰӮдёӢпјҡ`label.FontAttributes = FontAttributes.Bold`гҖӮ`FontAttributes`\
    \ йҖүйЎ№жңү `None`гҖҒ`Bold` е’Ң `Italic`гҖӮеӨҡдёӘеұһжҖ§дҪҝз”ЁвҖң|вҖқиҝһжҺҘпјҢдҫӢеҰӮпјҢ`label.FontAttributes = FontAttributes.Bold\
    \ | FontAttributes.Italic;`\n\n> **жҸҗзӨә** дёҖдәӣжҺ§д»¶ж”ҜжҢҒдҪҝз”Ё `FormattedString` зұ»еңЁеӯ—з¬ҰдёІзҡ„дёҚеҗҢйғЁеҲҶеә”з”ЁдёҚеҗҢзҡ„\
    \ `FontAttributes`гҖӮ\n\n> **жіЁж„Ҹ** дҪҝз”Ё `NamedSize` зҡ„ `FontSize` еұһжҖ§еҸҜд»ҘйҖҡиҝҮдёӨз§Қж–№ејҸеЈ°жҳҺпјҡ\n\n\
    > `button.FontSize = Device.GetNamedSize (NamedSize.Large, button);`\n\n> `button.FontSize\
    \ = Device.GetNamedSize (NamedSize.Large, typeof(Button));`\n\n> еҜ№дәҺеҶ…иҒ”еЈ°жҳҺпјҢдҪҝз”Ёз¬¬дәҢз§Қж–№ејҸгҖӮ\n\
    \n### дҪҝз”Ёзү№е®ҡе№іеҸ°зҡ„еӯ—дҪ“\n\nзЎ®дҝқдҪ зҡ„еӯ—дҪ“еҗҚз§°еңЁдҪ жүҖжңүзҡ„зӣ®ж Үе№іеҸ°дёҠйғҪжңүж•ҲпјҢеҗҰеҲҷдҪ зҡ„йЎөйқўеҸҜиғҪдјҡиҺ«еҗҚе…¶еҰҷең°еӨұиҙҘгҖӮеҰӮжһңдҪ йңҖиҰҒжҜҸдёӘе№іеҸ°дҪҝз”ЁдёҚеҗҢзҡ„еӯ—дҪ“еҗҚз§°пјҢеҸҜд»ҘдҪҝз”Ё\
    \ `Device.OnPlatform` ж–№жі•пјҢиҜҘж–№жі•ж №жҚ®е№іеҸ°и®ҫзҪ®дёҖдёӘеҖјпјҢеҰӮдёӢжүҖзӨәпјҡ\n\n```\nlabel.FontFamily = Device.OnPlatform\
    \ (\n        iOS:      \"Courier\",\n        Android:  \"Droid Sans Mono\",\n\
    \        WinPhone: \"Courier New\"\n);\nlabel.FontSize = Device.OnPlatform (\n\
    \        30,\n        Device.GetNamedSize (NamedSize.Medium, label),\n       \
    \ Device.GetNamedSize (NamedSize.Large, label)\n);\n```\n\n> **жҸҗзӨә** дҪҝз”Ё `Device.OnPlatform`\
    \ жҳҜдёҖдёӘж–№дҫҝзҡ„и·Ёе№іеҸ°жҠҖе·§пјҢе®ғиҝ”еӣһдёҖдёӘзү№е®ҡе№іеҸ°зҡ„еҖјгҖӮ\n\nиҝҗиЎҢж—¶еҠ иҪҪзҡ„иҮӘе®ҡд№үеӯ—дҪ“д№ҹеҸҜд»ҘдҪҝз”ЁпјҢдҪҶиҝҷйңҖиҰҒзү№е®ҡе№іеҸ°зҡ„зј–з ҒпјҢиҝҷеңЁ Xamarin.Forms еңЁзәҝж–ҮжЎЈзҡ„\
    \ \"Working With... вһӨ Fonts(1.3)\" йғЁеҲҶжңүжүҖд»Ӣз»ҚгҖӮ\n\n### жҢүй’®и§Ҷеӣҫ\n\nXamarin.Forms жҢүй’®жҳҜзҹ©еҪўзҡ„е№¶дё”еҸҜд»ҘзӮ№еҮ»гҖӮ\n\
    \nи®©жҲ‘д»¬ж·»еҠ дёҖдёӘжҷ®йҖҡзҡ„жҢүй’®пјҡ\n\n```\nButton button = new Button\n{\n        Text = \"жү§иЎҢе®ғ\"\
    ,\n        FontSize = Device.GetNamedSize(NamedSize.Large, typeof(Button)),\n\
    \        HorizontalOptions = LayoutOptions.Center,\n        VerticalOptions =\
    \ LayoutOptions.Fill\n};\n```\n\n`Text` еұһжҖ§еҢ…еҗ«жҢүй’®дёҠеҸҜи§Ғзҡ„ж–Үжң¬гҖӮ`HorizontalOptions` е’Ң `VerticalOptions`пјҲе°ҶеңЁдёӢдёҖиҠӮи®Ёи®әпјүеҶіе®ҡжҺ§д»¶зҡ„еҜ№йҪҗе’ҢеӨ§е°ҸгҖӮиҝҷдёӘ\
    \ `NamedSize` еӯ—дҪ“и®ҫзҪ®дҪҝеӯ—дҪ“еҸҳдёә `Large`гҖӮ\n\n> **жҸҗзӨә** жҢүй’®еҸҜд»ҘйҖҡиҝҮ `BorderColor`гҖҒ`BorderWidth`\
    \ е’Ң `TextColor` еұһжҖ§иҝӣиЎҢиҮӘе®ҡд№үгҖӮеңЁ iOS дёҠпјҢ`BorderWidth` й»ҳи®Өдёәйӣ¶гҖӮ\n\nе°ҶжҢүй’®ж·»еҠ еҲ°жҲ‘д»¬зҡ„ `StackLayout`\
    \ дёӯгҖӮ\n\n```\nStackLayout stackLayout = new StackLayout\n{\n        Children =\n\
    \        {\n            labelLarge,\n            labelSmall,\n            button\n\
    \        },\n        HeightRequest = 1500\n};\n```\n\nеӣҫ 2-8 еұ•зӨәдәҶж–°жҢүй’®гҖӮ\n\n![A978-1-4842-0214-2_2_Fig8_HTML.jpg](img/A978-1-4842-0214-2_2_Fig8_HTML.jpg)\n\
    \n**еӣҫ 2-8.** Xamarin.Forms жҢүй’®\n\nзҺ°еңЁи®©жҲ‘д»¬еҲҶй…ҚдёҖдёӘдәӢд»¶еӨ„зҗҶеҷЁпјҢеҸҜд»ҘеҶ…иҒ”зј–еҶҷпјҡ\n\n```\nbutton.Clicked\
    \ += (sender, args) =>\n{\n       button.Text = \"е·Іжү§иЎҢпјҒ\";\n};\n```\n\nжҲ–иҖ…йҖҡиҝҮеҲҶй…ҚдёҖдёӘж–№жі•пјҡ\n\
    \n```\nbutton.Clicked += OnButtonClicked;\n```\n\n...иҜҘж–№жі•еңЁйЎөйқўжһ„йҖ еҮҪж•°еӨ–йғЁи°ғз”Ёпјҡ\n\n```\n\
    void OnButtonClicked(object sender, EventArgs e)\n        {\n            button.Text\
    \ = \"е·Іжү§иЎҢпјҒ\";\n        };\n```\n\nеҪ“дҪ зӮ№еҮ»жҢүй’®ж—¶пјҢжҢүй’®ж–Үжң¬дјҡж”№еҸҳпјҢеҰӮеӣҫ 2-9 жүҖзӨәгҖӮ\n\n![A978-1-4842-0214-2_2_Fig9_HTML.jpg](img/A978-1-4842-0214-2_2_Fig9_HTML.jpg)\n\
    \n**еӣҫ 2-9.** `button.Clicked` дәӢд»¶иў«и§ҰеҸ‘\n\n> **жҸҗзӨә** еҰӮжһңдҪ еңЁйЎөйқўжһ„йҖ еҮҪж•°еӨ–йғЁеҲҶй…ҚдәӢд»¶еӨ„зҗҶеҷЁпјҢиҜ·зЎ®дҝқд№ҹеңЁжһ„йҖ еҮҪж•°еӨ–йғЁе®ҡд№үдҪ зҡ„жҢүй’®пјҢд»ҘйҒҝе…ҚеҮәзҺ°еҸҳйҮҸжңӘе®ҡд№үзҡ„й”ҷиҜҜгҖӮ\n\
    \n`BorderWidth` еҲҶй…Қз»ҳеҲ¶жҢүй’®зҡ„зәҝжқЎзҡ„зІ—з»ҶгҖӮ\n\n### и®ҫзҪ®и§ҶеӣҫеҜ№йҪҗе’ҢеӨ§е°Ҹпјҡ`HorizontalOptions` е’Ң `VerticalOptions`\n\
    \nж°ҙе№іе’ҢеһӮзӣҙеҜ№йҪҗпјҢд»ҘеҸҠеңЁжҹҗз§ҚзЁӢеәҰдёҠжҺ§д»¶зҡ„еӨ§е°ҸпјҢжҳҜйҖҡиҝҮе°Ҷ `HorizontalOptions` е’Ң/жҲ– `VerticalOptions` еұһжҖ§и®ҫзҪ®дёә `LayoutOptions`\
    \ зұ»зҡ„еҖјжқҘз®ЎзҗҶзҡ„пјҢдҫӢеҰӮпјҡ\n\n```\nButton button = new Button\n{\n    HorizontalOptions = LayoutOptions.Center,\n\
    \        VerticalOptions = LayoutOptions.Fill\n}\n```\n\nи§ҶеӣҫеёғеұҖдёӯйңҖиҰҒиҖғиҷ‘зҡ„еӣ зҙ еҢ…жӢ¬еёғеұҖе’Ңе‘Ёеӣҙе…ғзҙ жҸҗдҫӣз»ҷи§Ҷеӣҫзҡ„з©әй—ҙгҖҒи§Ҷеӣҫе‘Ёеӣҙзҡ„еЎ«е……з©әй—ҙд»ҘеҸҠи§Ҷеӣҫжң¬иә«зҡ„еӨ§е°ҸгҖӮиҝҷдәӣзұ»еһӢзҡ„ж јејҸеҢ–жҳҜйҖҡиҝҮдҪҝз”Ё\
    \ `LayoutOptions` е’Ң `AndExpand` е®ҢжҲҗзҡ„гҖӮ\n\n#### дҪҝз”Ё `LayoutOptions` иҝӣиЎҢеҜ№йҪҗ\n\nйҖҡиҝҮе°Ҷ `HorizontalOptions`\
    \ жҲ– `VerticalOptions` еұһжҖ§и®ҫзҪ®дёә `LayoutOptions` зұ»д№ӢдёҖпјҢеҸҜд»ҘжІҝеҚ•дёӘиҪҙе®ҡд№үжҺ§д»¶еёғеұҖпјҡ\n\n*   `Start` е°ҶжҺ§д»¶еҗ‘е·ҰжҲ–йЎ¶йғЁеҜ№йҪҗпјҲеҸ–еҶідәҺеёғеұҖзҡ„\
    \ `Orientation`пјү\n*   `Center` е°ҶжҺ§д»¶еұ…дёӯгҖӮ\n*   `End` е°ҶжҺ§д»¶еҗ‘еҸіжҲ–еә•йғЁеҜ№йҪҗгҖӮ\n*   `Fill` жү©еұ•жҺ§д»¶зҡ„еӨ§е°Ҹд»ҘеЎ«е……жҸҗдҫӣзҡ„з©әй—ҙгҖӮ\n\
    \nдҫӢеҰӮпјҡ\n\n```\nHorizontalOptions = LayoutOptions.Start,\n```\n\n#### `AndExpand`\
    \ з”Ёз©әй—ҙеЎ«е……\n\nе°Ҷ `HorizontalOptions` жҲ– `VerticalOptions` и®ҫзҪ®дёәиҝҷдәӣ `LayoutOptions` зұ»еҸҜд»Ҙдёәи§Ҷеӣҫе‘ЁеӣҙжҸҗдҫӣеЎ«е……з©әй—ҙпјҡ\n\
    \n*   `StartAndExpand` е°ҶжҺ§д»¶еҗ‘е·ҰжҲ–йЎ¶йғЁеҜ№йҪҗпјҢе№¶еңЁжҺ§д»¶е‘ЁеӣҙеЎ«е……з©әй—ҙгҖӮ\n*   `CenterAndExpand` е°ҶжҺ§д»¶еұ…дёӯпјҢе№¶еңЁжҺ§д»¶е‘ЁеӣҙеЎ«е……з©әй—ҙгҖӮ\n\
    *   `EndAndExpand` е°ҶжҺ§д»¶еҗ‘еҸіжҲ–еә•йғЁеҜ№йҪҗпјҢе№¶еңЁжҺ§д»¶е‘ЁеӣҙеЎ«е……з©әй—ҙгҖӮ\n*   `FillAndExpand` жү©еұ•жҺ§д»¶зҡ„еӨ§е°ҸпјҢе№¶еңЁжҺ§д»¶е‘ЁеӣҙеЎ«е……з©әй—ҙгҖӮ\n\
    \nдҫӢеҰӮпјҡ\n\n```\nHorizontalOptions = LayoutOptions.StartAndExpand\n```\n\n> **жҸҗзӨә**\
    \ еҪ“еҲ—дёӯеҸӘжңүдёҖдёӘжҺ§д»¶ж—¶пјҢ`HorizontalOptions` и®ҫзҪ®дёә `Fill` е’Ң `FillAndExpand` зңӢиө·жқҘжҳҜдёҖж ·зҡ„гҖӮ\n\n> **жҸҗзӨә**\
    \ еҸӘжңүеҪ“еһӮзӣҙз©әй—ҙиў«жҳҫејҸжҸҗдҫӣж—¶пјҢ`VerticalOptions` и®ҫзҪ®дёә `Center` жҲ– `Fill` жүҚжңүз”ЁгҖӮеҗҰеҲҷпјҢиҝҷдәӣйҖүйЎ№еҸҜиғҪзңӢиө·жқҘжІЎжңүд»»дҪ•дҪңз”ЁгҖӮеҰӮжһңжІЎжңүз©әй—ҙеҸҜд»Ҙеўһй•ҝпјҢ`LayoutOptions.Fill`\
    \ дёҚдјҡи®©жҺ§д»¶еҸҳеҫ—жӣҙй«ҳгҖӮ\n\n> **жҸҗзӨә** `VerticalOptions` и®ҫзҪ®дёә `Expand` е’Ң `CenterAndExpand` дјҡеңЁ\
    \ `StackLayout` дёӯзҡ„жҺ§д»¶е‘Ёеӣҙж–ҪеҠ еЎ«е……з©әй—ҙгҖӮ\n\nжң¬з« еҗҺйқўиҝҳжңүжӣҙеӨҡж јејҸеҢ–зӨәдҫӢпјҢе…ідәҺжҺ§д»¶еёғеұҖе’ҢеҜ№йҪҗзҡ„жӣҙеӨҡеҶ…е®№иҜ·еҸӮйҳ…[з¬¬ 3 з« ](http://www.apress.com/9781484202159?gtmf=s)гҖӮжҺҘдёӢжқҘи®©жҲ‘д»¬еҲӣе»әдёҖдәӣз”ЁжҲ·иҫ“е…ҘгҖӮ\n\
    \n### з”ЁдәҺж–Үжң¬иҫ“е…Ҙзҡ„ `Entry` и§Ҷеӣҫ\n\nд»ҘдёӢд»Јз ҒеҲӣе»әдәҶдёҖдёӘж–Үжң¬жЎҶпјҢз”ЁдәҺз”ЁжҲ·иҫ“е…ҘеҚ•иЎҢж–Үжң¬гҖӮ`Entry` з»§жүҝиҮӘ `InputView` зұ»пјҢеҗҺиҖ…жҳҜ\
    \ `View` зұ»зҡ„жҙҫз”ҹзұ»гҖӮ\n\n```\nEntry entry = new Entry\n{\n        Placeholder = \"з”ЁжҲ·еҗҚ\"\
    ,\n        VerticalOptions = LayoutOptions.Center,\n        Keyboard = Keyboard.Text\n\
    };\n```\n\nз”ЁжҲ·иҫ“е…ҘдҪңдёә `String` зұ»еһӢиҝӣе…Ҙ `Text` еұһжҖ§гҖӮ\n\nжіЁж„Ҹ `Placeholder` еұһжҖ§зҡ„дҪҝз”ЁпјҢе®ғжҳҜеӯ—ж®өеҗҚз§°зҡ„еҶ…иҒ”ж ҮзӯҫпјҢд№ҹжҳҜз§»еҠЁ\
    \ UI дёӯеёёз”Ёзҡ„дёҖз§ҚжҠҖжңҜпјҢйҖҡеёёдјҳдәҺж”ҫзҪ®еңЁиҫ“е…ҘжҺ§д»¶дёҠж–№жҲ–ж—Ғиҫ№зҡ„еҚ з”Ёз©әй—ҙзҡ„ж ҮзӯҫгҖӮ`Keyboard` еұһжҖ§жҳҜ `InputView` зҡ„дёҖдёӘжҲҗе‘ҳпјҢдёәеҮәзҺ°зҡ„з”ЁдәҺиҫ“е…Ҙзҡ„еұҸе№•й”®зӣҳжҸҗдҫӣдёҖзі»еҲ—йҖүйЎ№пјҢеҢ…жӢ¬\
    \ `Text`гҖҒ`Numeric`гҖҒ`Telephone`гҖҒ`URL` е’Ң `Email`гҖӮи®°еҫ—е°Ҷиҫ“е…ҘжқЎзӣ®ж·»еҠ еҲ°жҲ‘д»¬зҡ„ `StackLayout` дёӯпјҲиҜ·еҸӮи§Ғжң¬з« еҗҺйқўзҡ„жё…еҚ•\
    \ 2-5пјүгҖӮеӣҫ 2-10 жҳҫзӨәдәҶж–°зҡ„з”ЁжҲ·еҗҚиҫ“е…ҘжҺ§д»¶гҖӮ\n\n![A978-1-4842-0214-2_2_Fig10_HTML.jpg](img/A978-1-4842-0214-2_2_Fig10_HTML.jpg)\n\
    \n**еӣҫ 2-10.** Xamarin.Forms з”ЁжҲ· `Entry` и§Ҷеӣҫ\n\n> **жҸҗзӨә** дҪҝз”Ё `IsPassword` еұһжҖ§еҸҜд»Ҙе°Ҷиҫ“е…Ҙзҡ„ж–Үжң¬еӯ—жҜҚжӣҝжҚўдёәеңҶзӮ№гҖӮ\n\
    \nеҜ№дәҺеӨҡиЎҢиҫ“е…ҘпјҢиҜ·дҪҝз”Ё `Editor` жҺ§д»¶гҖӮ\n\n### `BoxView`\n\n`BoxView` жҺ§д»¶еҲӣе»әдёҖдёӘеҪ©иүІзҡ„еӣҫеҪўзҹ©еҪўпјҢйқһеёёйҖӮеҗҲз”ЁдҪңеҚ дҪҚз¬ҰпјҢд№ӢеҗҺеҸҜд»Ҙз”ЁеӣҫеғҸжҲ–е…¶д»–жӣҙеӨҚжқӮзҡ„жҺ§д»¶жҲ–жҺ§д»¶з»„жӣҝжҚўгҖӮеҪ“дҪ зӯүеҫ…и®ҫи®ЎеёҲзҗҶжё…жҖқи·Ҝж—¶пјҢиҝҷдёӘжҺ§д»¶йқһеёёжңүз”ЁгҖӮ\n\
    \n```\nBoxView boxView = new BoxView\n{\n        Color = Color.Silver,\n     \
    \   WidthRequest = 150,\n        HeightRequest = 150,\n        HorizontalOptions\
    \ = LayoutOptions.StartAndExpand,\n        VerticalOptions = LayoutOptions.Fill\n\
    };\n```\n\n`Color` еұһжҖ§еҸҜд»Ҙи®ҫзҪ®дёәд»»дҪ• `Color` жҲҗе‘ҳеҖјгҖӮй»ҳи®Өе°әеҜёжҳҜ 40Г—40 еғҸзҙ пјҢеҸҜд»ҘдҪҝз”Ё `WidthRequest` е’Ң\
    \ `HeightRequest` еұһжҖ§иҝӣиЎҢжӣҙж”№гҖӮ\n\n> **жҸҗзӨә** е°Ҹеҝғе°Ҷ `HorizontalOptions` е’Ң `VerticalOptions`\
    \ и®ҫзҪ®дёә `LayoutOptions.Fill` е’Ң `LayoutOptions.FillAndExpand`пјҢеӣ дёәиҝҷеҸҜиғҪдјҡиҰҶзӣ–дҪ зҡ„ `HeightRequest`\
    \ е’Ң `WidthRequest` е°әеҜёгҖӮ\n\nе°Ҷ `BoxView` ж·»еҠ еҲ°дҪ зҡ„ `StackLayout` дёӯпјҲиҜ·еҸӮи§Ғжң¬з« еҗҺйқўзҡ„жё…еҚ• 2-5пјүпјҢе№¶еңЁеӣҫ\
    \ 2-11 дёӯжҹҘзңӢз»“жһңгҖӮ\n\n![A978-1-4842-0214-2_2_Fig11_HTML.jpg](img/A978-1-4842-0214-2_2_Fig11_HTML.jpg)\n\
    \n**еӣҫ 2-11.** Xamarin.Forms `BoxView`\n\nжңҖз»ҲдҪ зҡ„и®ҫи®ЎеёҲдјҡз»ҷдҪ жүҝиҜәзҡ„йӮЈдәӣеӣҫж ҮпјҢз„¶еҗҺдҪ е°ұеҸҜд»Ҙз”ЁзңҹжӯЈзҡ„еӣҫеғҸжӣҝжҚўдҪ зҡ„ `BoxViews`\
    \ дәҶгҖӮ\n\n### Image и§Ҷеӣҫ\n\n`Image` и§ҶеӣҫеҢ…еҗ«дёҖдёӘжқҘиҮӘжң¬ең°жҲ–еңЁзәҝж–Үд»¶зҡ„еӣҫеғҸпјҢз”ЁдәҺеңЁдҪ зҡ„йЎөйқўдёҠжҳҫзӨәпјҡ\n\n```\nImage image\
    \ = new Image\n{\n        Source = \"monkey.png\",\n        Aspect = Aspect.AspectFit,\n\
    \        HorizontalOptions = LayoutOptions.End,\n        VerticalOptions = LayoutOptions.Fill\n\
    };\n```\n\nеӣҫ 2-12 жҳҫзӨәдәҶеҸідёӢи§’зҡ„зҢҙеӯҗеӣҫеғҸгҖӮ\n\n![A978-1-4842-0214-2_2_Fig12_HTML.jpg](img/A978-1-4842-0214-2_2_Fig12_HTML.jpg)\n\
    \n**еӣҫ 2-12.** еӣҫеғҸи§Ҷеӣҫ\n\nи®©жҲ‘д»¬дәҶи§ЈдёҖдёӢеӣҫеғҸжҳҜеҰӮдҪ•еӨ„зҗҶзҡ„гҖӮ\n\n#### `Source` еұһжҖ§\n\n`Source` еұһжҖ§йҖҡиҝҮдҪҝз”Ёд»ҘдёӢ\
    \ `ImageSource` зұ»жҲҗе‘ҳжқҘжҢҮзӨәеӣҫеғҸзҡ„дҪҚзҪ®пјҡ\n\n*   `FromFile`пјҡжң¬ең°еӣҫеғҸж–Үд»¶пјҢдҫӢеҰӮпјҢ`ImageSource.FromFile(\"\
    monkey.png\")`гҖӮеңЁеҲҶй…Қ `Source` ж—¶пјҢиҝҷдёӘж–№жі•зҡ„еҝ«жҚ·ж–№ејҸжҳҜе®Ңе…ЁзңҒз•ҘиҜҘж–№жі•пјҡ`Source = \"monkey.png\"`\n* \
    \  `FromResource`пјҡжҢҮеҗ‘еә”з”ЁжҲ– PCL дёӯ `EmbeddedResource` зҡ„иө„жәҗ IDпјҢдҫӢеҰӮпјҢ`ImageSource.FromResource(\"\
    monkey.png\")`гҖӮ\n*   `FromUri`пјҡеңЁзәҝеӣҫеғҸзҡ„ URIпјҢдҫӢеҰӮпјҢ`ImageSource.FromUri(new Uri(\"http://yourdomain.com/image.png\"\
    ))`\n\n> **жҸҗзӨә** дҪ еҸҜд»ҘдҪҝз”Ё `FromFile` еҝ«жҚ·ж–№ејҸжқҘеҲҶй…Қжң¬ең°еӣҫеғҸпјҡ`Source = \"monkey.png\"`\n\n####\
    \ жң¬ең°еӣҫеғҸ\n\nжң¬ең°еӣҫеғҸж–Үд»¶еңЁе…¶еҗ„иҮӘзҡ„йЎ№зӣ®дёӯжңүзү№е®ҡе№іеҸ°зҡ„еӣҫеғҸж–Үд»¶еӨ№пјҡ\n\n*   AndroidпјҡеңЁ `Resources/drawable` ж–Үд»¶еӨ№дёӯгҖӮдёҚиҰҒеңЁж–Үд»¶еҗҚдёӯдҪҝз”Ёзү№ж®Ҡеӯ—з¬ҰгҖӮз”ҹжҲҗж“ҚдҪңеҝ…йЎ»и®ҫзҪ®дёә\
    \ `AndroidResource`гҖӮ\n*   iOSпјҡеңЁ `/Resources` ж–Үд»¶еӨ№дёӯгҖӮеҗҢж—¶дёә Retina жҳҫзӨәеұҸжҸҗдҫӣеӣҫеғҸпјҢеңЁж–Үд»¶еҗҚзҡ„жү©еұ•еҗҚд№ӢеүҚдҪҝз”Ё\
    \ @2x еҗҺзјҖзҡ„еҸҢеҖҚеҲҶиҫЁзҺҮгҖӮз”ҹжҲҗж“ҚдҪңеҝ…йЎ»и®ҫзҪ®дёә `BundleResource`гҖӮ\n*   Windows PhoneпјҡеңЁ Windows Phone\
    \ йЎ№зӣ®зҡ„ж №зӣ®еҪ•дёӯгҖӮз”ҹжҲҗж“ҚдҪңеҝ…йЎ»и®ҫзҪ®дёә `Content`гҖӮ\n\nйҖҡиҝҮеңЁйЎ№зӣ®дёӯеҸій”®еҚ•еҮ»еӣҫеғҸж–Үд»¶жқҘи®ҫзҪ®з”ҹжҲҗж“ҚдҪңпјҢд»Ҙй…ҚзҪ®еӣҫеғҸжӯЈзЎ®зј–иҜ‘гҖӮ\n\n#### еӣҫеғҸеӨ§е°Ҹи®ҫзҪ®пјҡ`Aspect`\
    \ еұһжҖ§\n\n`Image.Aspect` еұһжҖ§еҶіе®ҡеӣҫеғҸеӨ§е°ҸпјҢе№¶йҖҡиҝҮдҪҝз”Ё `Aspect` жһҡдёҫеҷЁжқҘи®ҫзҪ®вҖ”вҖ”дҫӢеҰӮпјҢ`image.Aspect = Aspect.AspectFit`гҖӮд»ҘдёӢжҳҜ\
    \ `Aspect` жҲҗе‘ҳпјҡ\n\n*   `AspectFill`пјҡзј©ж”ҫеӣҫеғҸд»ҘеЎ«е……и§ҶеӣҫпјҢеҝ…иҰҒж—¶иҝӣиЎҢиЈҒеүӘгҖӮ\n*   `AspectFit`пјҡзј©ж”ҫеӣҫеғҸд»ҘйҖӮеә”и§ҶеӣҫеҶ…пјҢдҝқжҢҒе®Ҫй«ҳжҜ”пјҢдёҚдә§з”ҹеҸҳеҪўпјҢеҝ…иҰҒж—¶з•ҷеҮәз©әй—ҙпјҲletterboxingпјүгҖӮ\n\
    *   `Fill`пјҡзј©ж”ҫеӣҫеғҸд»Ҙе®Ңе…Ёдё”зІҫзЎ®ең°еЎ«е……и§ҶеӣҫпјҢеҸҜиғҪдјҡжүӯжӣІеӣҫеғҸгҖӮ\n\nд»ҘдёҠе°ұжҳҜеӣҫеғҸж јејҸеҢ–йҖүйЎ№гҖӮжҺҘдёӢжқҘжҲ‘д»¬е°ҶдҪҝжҲ‘д»¬зҡ„еӣҫеғҸеҸҜзӮ№еҮ»гҖӮ\n\n#### дҪҝз”Ё\
    \ `GestureRecognizer` дҪҝеӣҫеғҸеҸҜзӮ№еҮ»\n\nеңЁз§»еҠЁеә”з”ЁдёӯпјҢеҸҜзӮ№еҮ»зҡ„еӣҫеғҸе’Ңеӣҫж Үеёёз”ЁдәҺж“ҚдҪңе’ҢеҜјиҲӘгҖӮдёҺи®ёеӨҡ Xamarin.Forms и§ҶеӣҫдёҖж ·пјҢ`Image`\
    \ жІЎжңүзӮ№еҮ»жҲ–иҪ»и§ҰдәӢд»¶пјҢеҝ…йЎ»дҪҝз”Ё `GestureRecognizer` зұ»иҝӣиЎҢиҝһжҺҘгҖӮжүӢеҠҝиҜҶеҲ«еҷЁжҳҜдёҖдёӘеҸҜд»Ҙж·»еҠ еҲ°и®ёеӨҡи§Ҷеӣҫдёӯзҡ„зұ»пјҢз”ЁдәҺе“Қеә”з”ЁжҲ·дәӨдә’гҖӮе®ғзӣ®еүҚд»…ж”ҜжҢҒиҪ»и§ҰжүӢеҠҝгҖӮеңЁз§»еҠЁ\
    \ UI ејҖеҸ‘дёӯпјҢжңҜиҜӯвҖңзӮ№еҮ»вҖқе’ҢвҖңиҪ»и§ҰвҖқеҸҜд»Ҙдә’жҚўдҪҝз”ЁгҖӮ\n\nж ҮеҮҶзҡ„ gesture recognizer иў«еЈ°жҳҺпјҢе№¶еҲӣе»әдёҖдёӘеӨ„зҗҶеҷЁжқҘз®ЎзҗҶ `Tapped`\
    \ дәӢд»¶пјҢз„¶еҗҺе°Ҷ gesture recognizer ж·»еҠ еҲ°зӣ®ж Үи§ҶеӣҫдёӯпјҢиҝҷйҮҢжҳҜдёҖдёӘеӣҫеғҸгҖӮеңЁеӨ„зҗҶзЁӢеәҸдёӯе°ҶеӣҫеғҸзҡ„ `Opacity` жӣҙж”№дёә 0.5пјҢеҪ“иҪ»и§Ұж—¶еӣҫеғҸдјҡзЁҚеҫ®еҸҳж·ЎгҖӮ\n\
    \n```\nvar tapGestureRecognizer = new TapGestureRecognizer();\ntapGestureRecognizer.Tapped\
    \ += (s, e) => {\n        image.Opacity = .5;\n};\nimage.GestureRecognizers.Add(tapGestureRecognizer);\n\
    ```\n\nе°қиҜ•дёҖдёӢпјҢи®©дҪ зҡ„зҢҙеӯҗеҸҳж·ЎпјҢиҝҷж ·дҪ е°ұеҸҜд»ҘзңӢеҲ°жүӢеҠҝиҜҶеҲ«еҷЁеңЁе·ҘдҪңгҖӮ\n\n> **жҸҗзӨә** `GestureRecognizer` зҡ„еҸҰдёҖз§Қе®һзҺ°жҳҜдҪҝз”Ё\
    \ `Command` еұһжҖ§гҖӮ\n\n```\nimage.GestureRecognizers.Add (new TapGestureRecognizer\
    \ {\n       Command = new Command (()=> { /*еӨ„зҗҶзӮ№еҮ»*/ }),\n});\n```\n\nз”ЁжҲ·еҸҚйҰҲжҳҜз§»еҠЁ UI\
    \ ејҖеҸ‘дёӯдёҖдёӘиҮіе…ійҮҚиҰҒзҡ„жҰӮеҝөгҖӮжҜҸеҪ“з”ЁжҲ·еңЁ UI дёӯжү§иЎҢж“ҚдҪңж—¶пјҢеә”з”ЁйғҪеә”иҜҘжңүдёҖдәӣеҫ®еҰҷзҡ„зЎ®и®ӨгҖӮдҫӢеҰӮпјҢдёҖж¬ЎиҪ»и§Ұеә”иҜҘйҖҡиҝҮеҸҜи§Ғзҡ„еҸҚйҰҲжқҘе“Қеә”з”ЁжҲ·гҖӮйҖҡеёёпјҢдёҖдёӘеӣҫеғҸеңЁиў«и§Ұж‘ёж—¶дјҡеҸҳзҒ°жҲ–зҹӯжҡӮжҳҫзӨәзҷҪиүІиғҢжҷҜгҖӮи®©жҲ‘д»¬дё“дёҡең°дҪҝз”ЁеӣҫеғҸзҡ„\
    \ `Opacity` еұһжҖ§жқҘе®һзҺ°иҝҷдёҖзӮ№пјҢдҪҶйҖҡиҝҮж·»еҠ  `async/await` жқҘеңЁжҲ‘д»¬зҡ„ж·Ўе…Ҙж·ЎеҮәдёӯеҲӣе»әдёҖдёӘиҪ»еҫ®зҡ„е»¶иҝҹпјҢиҖҢдёҚдјҡеҪұе“Қеә”з”Ёзҡ„жҖ§иғҪгҖӮ\n\nз”ЁдёӢйқўиҝҷдёӘеӨ„зҗҶеҷЁжӣҝжҚў\
    \ `Tapped` еӨ„зҗҶеҷЁпјҢе®ғдјҡдҪҝеӣҫеғҸиҪ»еҫ®еҸҳж·Ўе№¶жҢҒз»ӯеҮ еҲҶд№ӢдёҖз§’гҖӮи®°еҫ—еңЁдҪ зҡ„ж–Үд»¶йЎ¶йғЁж·»еҠ  `using System.Threading.Tasks;` д»ҘдҪҝз”Ё\
    \ `async/await`гҖӮ\n\n```\ntapGestureRecognizer.Tapped +=  async (sender, e) =>\n\
    {\n        image.Opacity = .5;\n        await Task.Delay(200);\n        image.Opacity\
    \ = 1;\n};\n```\n\nзҺ°еңЁиҪ»и§ҰеӣҫеғҸдјҡдҪҝеӣҫеғҸиҪ»еҫ®еҸҳж·ЎпјҢз„¶еҗҺжҒўеӨҚжӯЈеёёпјҢжҸҗдҫӣе“Қеә”ејҸзҡ„з”ЁжҲ·дҪ“йӘҢгҖӮ\n\nеңЁдҪ иҮӘе·ұзҡ„йЎ№зӣ®дёӯпјҢдҪ е°ҶдҪҝз”ЁжүӢеҠҝиҜҶеҲ«еҷЁпјҲе’Ң `async/await`пјүеңЁеӣҫеғҸиў«иҪ»и§Ұж—¶е®һйҷ…жү§иЎҢжҹҗдәӣж“ҚдҪңгҖӮеҰӮжһңдҪ жғіеңЁиҝҷдёӘзӨәдҫӢдёӯзңӢеҲ°\
    \ `async/await` зҡ„е®һйҷ…ж•ҲжһңпјҢеҸҜд»Ҙе°Ҷ `Delay` жҸҗй«ҳеҲ° 2000пјҢз„¶еҗҺеңЁе®ғ `await` ж—¶зӮ№еҮ»вҖңжү§иЎҢе®ғвҖқжҢүй’®пјҢдҪ дјҡзңӢеҲ°еә”з”Ёд»Қз„¶иғҪеӨҹе“Қеә”гҖӮдҪ еҸҜд»ҘеңЁиҝҷдёӘ\
    \ `Tapped` еӨ„зҗҶеҷЁдёӯеҒҡеҫҲеӨҡдәӢжғ…пјҢиҖҢдёҚдјҡдёӯж–ӯеә”з”Ёзҡ„жөҒзЁӢпјҒйҖҡеёёпјҢеҪ“жҢүдёӢжҢүй’®жҲ–еӣҫеғҸж—¶пјҢз»“жһңеә”иҜҘдҪҝз”Ё `async/await` еңЁеҗҺеҸ°иҝӣиЎҢпјҢд»ҘиҺ·еҫ—жңҖдҪіз”ЁжҲ·дҪ“йӘҢгҖӮ\n\
    \n> **жҸҗзӨә** `Async/await` жҳҜдёҖз§Қж ҮеҮҶзҡ„ C# жҠҖжңҜпјҢз”ЁдәҺдҪҝз”Ёд»»еҠЎе№¶иЎҢеә“пјҲTPLпјүеңЁеҗҺеҸ°жҺ’йҳҹжҙ»еҠЁд»ҘиҝӣиЎҢе№¶еҸ‘ж“ҚдҪңгҖӮи®ёеӨҡ Xamarin\
    \ ж–№жі•е’ҢеҮҪж•°йғҪй…ҚеӨҮдәҶдҪҝз”Ё `async/await` иҝӣиЎҢеҗҺеҸ°еӨ„зҗҶзҡ„еҠҹиғҪгҖӮ\n\n### жңҖз»ҲзЎ®е®ҡ `StackLayout`\n\nзҺ°еңЁжҲ‘д»¬жүҖжңүзҡ„жҺ§д»¶йғҪе·Іе°ұдҪҚпјҢи®©жҲ‘д»¬е°Ҷж•ҙдёӘйЎөйқўж•ҙеҗҲеңЁдёҖиө·гҖӮжЈҖжҹҘ\
    \ `stackLayout` жҳҜеҗҰеҢ…еҗ«дәҶжүҖжңүи§ҶеӣҫпјҢеҰӮжё…еҚ• 2-5 жүҖзӨәгҖӮ\n\n**жё…еҚ• 2-5.** жң¬з«  Xamarin.Forms зӨәдҫӢеңЁ `ContentPageExample.cs`\
    \ дёӯзҡ„жңҖз»Ҳ `StackLayout`\n\n```\nStackLayout stackLayout = new StackLayout\n{\n  \
    \      Children =\n        {\n            labelLarge,\n            labelSmall,\n\
    \            button,\n            entry,\n            boxView,\n            image\n\
    \        },\n        HeightRequest = 1500\n};\n```\n\nзҺ°еңЁпјҢжҲ‘д»¬еҸҜд»Ҙе°Ҷ `stackLayout` иөӢеҖјз»ҷ\
    \ `ContentPageExample.Content` е№¶е°Ҷе…¶з§°дёәдёҖдёӘйЎөйқўпјҢдҪҶжҲ‘д»¬иҝҳиҰҒеҶҚж·»еҠ дёҖдёӘи§ҶеӣҫпјҢдёҖдёӘе…Ғи®ёжҲ‘д»¬зҡ„и§Ҷеӣҫж»ҡеҠЁзҡ„е®№еҷЁзұ»гҖӮ\n\n###\
    \ `ScrollView`\n\n`ScrollView` еёғеұҖеҢ…еҗ«дёҖдёӘеҚ•зӢ¬зҡ„еӯҗе…ғзҙ пјҢе№¶дҪҝе…¶еҶ…е®№еҸҜж»ҡеҠЁпјҡ\n\n```\nScrollView scrollView\
    \ = new ScrollView\n{\n        VerticalOptions = LayoutOptions.FillAndExpand,\n\
    \        Content = stackLayout\n};\n```\n\nиҝҷйҮҢжҲ‘д»¬е°Ҷ `stackLayout` иөӢеҖјз»ҷиҝҷдёӘ `ScrollView`\
    \ зҡ„ `Content` еұһжҖ§пјҢиҝҷж ·жҲ‘д»¬зҡ„е®Ңж•ҙзҡ„и§ҶеӣҫеёғеұҖзҺ°еңЁе°ұеҸҜд»Ҙж»ҡеҠЁдәҶгҖӮ\n\n> **жҸҗзӨә** `ScrollView` й»ҳи®ӨеһӮзӣҙж»ҡеҠЁпјҢдҪҶд№ҹеҸҜд»ҘдҪҝз”Ё\
    \ `Orientation` еұһжҖ§жЁӘеҗ‘ж»ҡеҠЁгҖӮдҫӢеҰӮпјҢ`Orientation = ScrollOrientation.Horizontal`\n\nйЎөйқўдёҠзҡ„и§Ҷеӣҫе°ұжҳҜиҝҷдәӣдәҶгҖӮзҺ°еңЁи®©жҲ‘д»¬еңЁйЎөйқўзә§еҲ«иҝӣиЎҢиҝһжҺҘгҖӮ\n\
    \n### еҲҶй…Қ `ContentPage.Content` еұһжҖ§\n\nеңЁ `ContentPage` дёҠпјҢжҲ‘д»¬еҝ…йЎ»е°Ҷ `Content` еұһжҖ§иөӢеҖјж”№дёәж–°зҡ„е®№еҷЁи§Ҷеӣҫ\
    \ `scrollView`гҖӮ\n\n```\nthis.Content = scrollView;\n```\n\nжңҖеҗҺдёҖжӯҘжҳҜеңЁж•ҙдёӘйЎөйқўе‘Ёеӣҙж·»еҠ иҫ№и·қпјҢд»ҘйҒҝе…Қи§Ҷеӣҫзҙ§иҙҙеұҸе№•иҫ№зјҳгҖӮ\n\
    \n### ж•ҙдёӘйЎөйқўе‘Ёеӣҙзҡ„иҫ№и·қ\n\n`ContentPage` зҡ„ `Padding` еұһжҖ§еңЁж•ҙдёӘйЎөйқўе‘ЁеӣҙеҲӣе»әз©әй—ҙгҖӮд»ҘдёӢжҳҜеұһжҖ§иөӢеҖјпјҡ\n\n```\nthis.Padding\
    \ = new Thickness(left, top, right, bottom);\n```\n\nиҝҷдёӘдҫӢеӯҗе°ҶеңЁе·Ұиҫ№гҖҒеҸіиҫ№е’Ңеә•йғЁж”ҫзҪ®иҫ№и·қпјҢдҪҶйЎ¶йғЁжІЎжңүпјҡ\n\
    \n```\nthis.Padding = new Thickness(10, 0, 10, 5);\n```\n\nиҝҷе°ҶеңЁжүҖжңүеӣӣиҫ№ж”ҫзҪ®зӣёзӯүзҡ„з©әй—ҙпјҡ\n\n\
    ```\nthis.Padding = new Thickness(10);\n```\n\nиҝҷдёӘдҫӢеӯҗе°ҶдҪҝйЎөйқўеҲҡеҘҪдҪҚдәҺ iOS зҠ¶жҖҒж ҸдёӢж–№пјҢеҗҢж—¶еҜ№дәҺе…¶д»–ж“ҚдҪңзі»з»ҹеҲҷдҝқжҢҒйЎөйқўдёҺеұҸе№•йЎ¶йғЁйҪҗе№ігҖӮ`Device.OnPlatform`\
    \ ж–№жі•ж №жҚ®еҺҹз”ҹж“ҚдҪңзі»з»ҹпјҲiOSгҖҒAndroidгҖҒWinPhoneпјүжҸҗдҫӣдёҚеҗҢзҡ„еҖјжҲ–ж“ҚдҪңпјҡ\n\n```\nthis.Padding = new Thickness(10,\
    \ Device.OnPlatform(20, 0, 0), 10, 5);\n```\n\nиҝҷжңҖеҗҺдёҖдёӘ `Padding` иЎЁиҫҫејҸжҳҜжҲ‘д»¬еңЁиҝҷдёӘйЎ№зӣ®д»ҘеҸҠжң¬д№ҰеӨ§еӨҡж•°йЎ№зӣ®дёӯдҪҝз”Ёзҡ„еҶ…е®№гҖӮ\n\
    \nеӣҫ 2-13 еұ•зӨәдәҶеңЁжүҖжңүдёүдёӘе№іеҸ°дёҠзҡ„жңҖз»Ҳжһ„е»әе’ҢиҝҗиЎҢз»“жһңгҖӮ\n\n![A978-1-4842-0214-2_2_Fig13_HTML.jpg](img/A978-1-4842-0214-2_2_Fig13_HTML.jpg)\n\
    \n**еӣҫ 2-13.** `FormsExample` и§ЈеҶіж–№жЎҲзҡ„жңҖз»Ҳжһ„е»әе’ҢиҝҗиЎҢ\n\n### д»Јз Ғе®ҢжҲҗпјҡж·»еҠ  Xamarin.Forms и§Ҷеӣҫ\n\n\
    жё…еҚ• 2-6 жҸҗдҫӣдәҶеңЁ `FormsExample` и§ЈеҶіж–№жЎҲдёӯж·»еҠ зҡ„ Xamarin.Forms и§Ҷеӣҫзҡ„е®Ңж•ҙ C# д»Јз ҒгҖӮ\n\n> **XAML** жӯӨзӨәдҫӢзҡ„\
