    жҲ‘д»¬жңүеҫҲеӨҡйҖүжӢ©пјҢд»Һ PCLгҖҒе…ұдә«йЎ№зӣ®гҖҒй“ҫжҺҘж–Үд»¶гҖҒжҺҘеҸЈгҖҒжҠҪиұЎеҲ°жқЎд»¶зј–иҜ‘гҖӮPCL жҸҗдҫӣдәҶдёҖз§Қж–№жі•пјҢеҸҜд»ҘдҪҝз”ЁжңүйҷҗеҲ¶зҡ„гҖҒй’ҲеҜ№зү№е®ҡе№іеҸ°зҡ„ .NET еә“еӯҗйӣҶжқҘжһ„е»ә C#
    з»„д»¶пјҢе№¶е°Ҷе…¶зј–иҜ‘дёәеҠЁжҖҒй“ҫжҺҘеә“ (DLL)пјҢиҜҘ DLL еҸҜз”ЁдәҺз”ұ PCL й…ҚзҪ®ж–Үд»¶жҢҮе®ҡзҡ„д»»дҪ•е№іеҸ°зҡ„ Xamarin йЎ№зӣ®дёӯгҖӮж•°жҚ®и®ҝй—®еұӮгҖҒе®ўжҲ·з«Ҝ Web жңҚеҠЎд»ҘеҸҠзӢ¬з«ӢдәҺе№іеҸ°зҡ„дёҡеҠЎйҖ»иҫ‘еҸҜд»ҘеңЁжӯӨеҫҲеҘҪең°е…ұеӯҳгҖӮйҖҡиҝҮдҪҝз”ЁеёҰжңүжҺҘеҸЈзҡ„дҫқиө–жіЁе…ҘпјҢд»Қз„¶еҸҜд»Ҙе°Ҷзү№е®ҡдәҺе№іеҸ°зҡ„еҠҹиғҪеј•е…Ҙиҝҷдәӣеә“дёӯгҖӮдёҖз§Қжӣҙжқҫж•ЈгҖҒжӣҙзҒөжҙ»зҡ„ж–№жі•жҳҜдҪҝз”Ёе…ұдә«ж–Үд»¶жҲ–йЎ№зӣ®пјҢе…¶дёӯеҢ…еҗ«дёәжҜҸдёӘе№іеҸ°йҮҚж–°зј–иҜ‘зҡ„ж ёеҝғж–Үд»¶гҖӮжқЎд»¶зј–иҜ‘жҳҜдёҖз§ҚеҸӨиҖҒзҡ„жҠҖжңҜпјҢйқһеёёйҖӮеҗҲиҫғе°Ҹзҡ„зү№е®ҡдәҺе№іеҸ°зҡ„иҮӘе®ҡд№үпјҢе®ғе…Ғи®ёе…ұдә«ж–Үд»¶дёӯзҡ„д»Јз Ғеқ—д»…еңЁзү№е®ҡе№іеҸ°зҡ„зј–иҜ‘дёӯеҢ…еҗ«иҝӣжқҘгҖӮ


