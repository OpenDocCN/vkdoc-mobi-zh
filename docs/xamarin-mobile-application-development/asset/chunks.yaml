    tab by setting the `Image` and `Title` properties. This image must be an alpha-channeled
    outline of an icon.    В В В В `tabSecond = new UIViewController ();`    В В В В `tabSecond.TabBarItem
    = new UITabBarItem ();`    В В В В `tabSecond.TabBarItem.Image = UIImage.FromFile
    ("second.png");`    В В В В `tabSecond.TabBarItem.Title = "Second";`  Important  Add
    `second.png` to the `Resources` folder of the project in Xamarin Studio, along
    with the high-resolution image named `second@2x.png`.    Badges are often used
    to reflect new content to be read in a tab screen. Badges may also be added to
    tabs by using the `BadgeValue` property:    В В В В `tabThird.TabBarItem.BadgeValue
    = "New";`    Make the badge disappear by setting it to `null`:    В В В В `tabThird.TabBarItem.BadgeValue
    = null;`    ## Summary    Congratulations! You have reached the end of the longest
    chapter in this book.    Navigation is a key topic in the creation of mobile apps.
    In web and desktop apps, single screens are so large and hold so much of the user
    workflow that navigation is often a small part of the user experience and is even
    sometimes added as an afterthought. Because of the economy of screen real estate
    in mobile apps, we must enable users to easily get around in an app in as short
    a time as possible. Consumer apps can engage a user for a long period of time,
    but success in business apps is not measured in the amount of time a user spends
    in the app but in the answer to this question: Did they find the information they
    were looking for? Menus canвҖҷt be a catchall parking lot of drop-downs at the top
    of the page or (just as bad) a navigation drawer bursting with disorganized features.    The
    criticality of navigation in mobile apps leads us to this tenet: Mobile navigation
    must closely match the user workflow. If it doesnвҖҷt, we risk confused and frustrated
    users.    In most of our apps, especially business apps, it is useful to try and
    match our user stories and use cases with these key navigation patterns: hierarchical,
    modal, drill-down list, navigation drawer, and tabs.    Hopefully, this chapter
    provides you with the ideas and patterns to map out the skeleton of just about
    any app you can imagine. The downloadable code samples can be mixed and matched
    to help you sketch out your app.    Now itвҖҷs time for the foundation beneath all
    of our UI technique: the data. LetвҖҷs explore data access and data binding in depth.    Please
    navigate to the next chapter.    # 7.В Data Access with SQLite and Data Binding    Data
    access in Xamarin apps often involves a local database and a remote data server
    accessed via web services. Local data access can be handled in many ways with
    many products, both open source and proprietary, but the Xamarin-recommended mobile
    database is SQLite, which is built into iOS and Android. Data can be queried from
    a SQLite database and manually populated into the UI, but a more sophisticated
    approach is to use data binding to transfer information automatically between
    the UI and your data models. In this chapter, youвҖҷll learn how to employ SQLite
    in your Xamarin apps as well as how to use data binding in your Xamarin.Forms
    apps.    ## What Is SQLite?    SQLite is a C-based relational database designed
    in the spring of 2000 by D. Richard Hipp for use in US Navy guided-missile warships.
    It is now a standby database engine included in many operating systems, including
    iOS and Android (but not in Windows Phone, so it must be shipped manually). SQLite
    implements most of the SQL standard and has no stand-alone database server process
    but instead is linked as a library-accessed datastore, providing an on-demand,
    app-specific database.    You will typically use SQLite with Xamarin in one of
    three ways:    *   SQLite.NET: Using SQLite.NET to form CRUD transactions with
    `Insert`, `Get`, `Delete`, `Table`, and `Query` *   ADO.NET: Using a minimal ADO.NET
    implementation of SQLite to execute SQL statements with `Command` objects *   Third-party
    MVVM libraries: Data binding views to fields in the SQLite database by using a
    third-party MVVM framework such as MvvmCross or MVVM Light Toolkit    Third-party
    MVVM libraries are beyond the scope of this book. ADO.NET is covered at the end
    of the chapter, and SQLite.NET is a popular choice with developers.    ## What
    Is SQLite.NET?    To use C-based SQLite in C#, a binding library is required,
    which is why Frank Krueger founded SQLite.NET, an open source SQLite library in
    C#. SQLite.NET is an object-relational mapping (ORM) library. ORMs allow you to
    manipulate database objects instead of working with fields and tables. SQLite.NET
    provides both options. We can do data-object manipulations by using methods such
    as `Insert`, `Get`, and `Delete` acting on data classes that map to tables. We
    can also use SQL to query a table with the `Query` method and use LINQ to operate
    on a tableвҖҷs contents using the `Table` method. SQLite using SQLite.NET gives
    you everything you need from a local mobile database to build consumer, business,
    and enterprise native mobile apps.  Data Storage Options  Many successful mobile
    apps use nondatabase storage options. You can use file-based data storage in addition
    to or even instead of using a SQLite database for data storage. This can involve
    serialized data in XML or JSON, HTML, or comma-delimited fields in text files
    stored in local folders on the device. Preferences is another data storage option.
    iOS, Android, and Windows Phone provide ways to store preferences as key-value
    pairs typically used to record user settings or other small bits of data. This
    chapter focuses on local database access and does not explore these or other nondatabase
    data storage techniques, but I encourage you to do so in the Xamarin online docs.
    Also, [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html) touches on disk storage
    techniques involving XML serialization in the вҖңManaging StateвҖқ sections.    ##
    Data Binding    Keeping your UI in sync with your data model can be a lot of work
    if you do it by hand in code. Every time the user makes a change in the UI, you
    can implement event handlers (such as `TextChanged`) that update the contents
    of the data model, and each time the data model changes in code, you can notify
    the UI to refresh (by implementing `PropertyChanged`).    Data binding handles
    all of that for you by providing a framework to sync the views with a data model.
    Data binding manages views that need to modify the contents of their accompanying
    data model and the refresh of the UI from changes in the data model.    Data binding
    is built into Xamarin.Forms.    This real-time connection between the data layer
    and presentation layer is available to us in mobile development, because the presentation
    layer and data layer reside together on a single physical tier, the mobile device.
    Many similarities exist with the development of Windows Presentation Foundation
    (WPF) desktop apps. The design pattern used frequently in WPF development is MVVM
    (Model-View-ViewModel). MVVM and data binding involve the coupling of the presentation
    and data layers to create a rich, responsive user experience.    Xamarin apps
    can use third-party data-binding libraries such as MvvmCross or MVVM Light. A
    range of platform-specific techniques are also available. Android provides the
    data-binding adapter approaches discussed in [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html),
    such as subclassing `BaseAdapter`. Android also provides adapter classes for data
    binding to SQLite databases by using `SimpleCursorAdapter` and `CursorAdapter`,
    which are beyond the scope of this book. iOS provides adapters such as `UITableViewSource`,
    which was also covered in [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html).  Important
    Note  This chapter covers cross-platform SQLite techniques such as SQLite.NET
    and ADO.NET, as well as Xamarin.Forms data binding. If you need a SQLite solution
    set up with Xamarin.Android or Xamarin.iOS, refer to the Xamarin online docs and
    recipes.    This chapter does not focus on platform-specific data access techniques,
    but delves into cross-platform SQLite techniques and data binding using Xamarin.Forms.    ##
    Xamarin.Forms Data Binding    xamarin.forms    Xamarin.Forms has data binding
    built in, allowing you to bind views to models easily and elegantly. XAML is often
    used to implement data binding in Xamarin.Forms. This chapter covers the C# approach,
    and you can follow the XAML in the downloadable code examples. Xamarin.Forms data
    binding supports the binding of one view to another as well as a view to a variable.
    This section focuses primarily on the most common business app use case: binding
    a view to a data model.    Xamarin.Forms data binding is done by binding a data
    source property to a target UI element property. The target property must be a
    bindable property (derived from `BindableObject`), which can be specified by using
    the viewвҖҷs `SetBinding` method. Bindable properties are indicated in the online
    Xamarin.Forms API documentation for each class. The data source can be a variable
    or data model class property and may be set by using the `BindingContext` property
    on a page or view.    ItвҖҷs worth noting that data binding can be done manually
    by using a viewвҖҷs `PropertyChanged` or `TextChanged` event to synchronize with
    the source.    However, Xamarin.Forms data binding is largely automatic after
    the setup is complete. You need to create and configure the target view and pair
    it with a source. You also need to prepare that source by implementing the `INotifyPropertyChanged`
    interface to make changes to that source observable via `PropertyChanged` event
    handlers. Xamarin.Forms lays in the remaining event handlers under the covers
    to carry out the transfer of data to and from the source and target. The following
    examples focus on this automatic approach, using the `BindingContext` property
    and `SetBinding` method.    Trivial data binding involves views that contain initial
    values from the data model (source), and changes to the UI (target) are reflected
    in the model. However, no refresh of the UI occurs to reflect changes to the data
    model. Refreshing of the UI requires nontrivial data binding, covered later, in
    вҖңUsing INotifyPropertyChanged.вҖқ    LetвҖҷs walk through a few examples of automatic
    data binding in Xamarin.Forms. You will begin with a trivial example, in which
    the UI updates a data model. Next youвҖҷll proceed into nontrivial examples, in
    which changes to the data model are refreshed in the view. YouвҖҷll explore the
    MVVM design pattern, wrapping your data model in a view model (or ViewModel).
    Then you will revisit data-bound lists, except you will make them editable instead
    of read-only.    In trivial, automatic data binding, changes to the UI are reflected
    in the data model in real time. Here is a common way (but not the only way) to
    approach trivial data binding in C#:  Specify the source data model by using the
    `BindingContext` page (or view) property: В   В В В В В В В В В В `Ex. this.BindingContext
    = listItem;`  Pair the source property with the target view property by using
    the `SetBinding` method: В   В В В В В В В В В В `Ex. titleEntry.SetBinding(Entry.TextProperty,
    "Title");`    These two steps bind the `Entry` view to the `Title` property of
    the `Item` model (`listItem` is an instance of `Item`).    Nontrivial data binding,
    in which the target must be refreshed to reflect changes made to the contents
    of the source in real time, requires an implementation of the `INotifyPropertyChanged`
    interfaceвҖҷs observer event called `PropertyChanged`, which fires when the view
    model detects a change to the data (in a propertyвҖҷs `Set` accessor method).  Tip  Do
    you want to data bind using Xamarin.iOS or Xamarin.Android? Check out the third-party
    MVVM data-binding libraries such as MvvmCross or MVVM Light. More-traditional
    data binding techniques include `BaseAdapter`, `SimpleCursorAdapter`, and `CursorAdapter`
    on Android, and `UITableViewSource` on iOS. Refer to [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html)
    to get started with Android `BaseAdapter` and iOS `UITableViewSource`.    LetвҖҷs
    look at a trivial Xamarin.Forms data-binding example.    ### Binding to a Data
    Model    xamarin.forms    Using the two-step data-binding approach in the preceding
    section, bind an `Entry` view to the `Title` property of a data model called `Item`.
    This is trivial binding: changes to the view result in an update to the data model.    Create
    a data model called `Item` with a `Title` and `Description` string property, as
