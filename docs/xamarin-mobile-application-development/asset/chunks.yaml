    Android layouts? Then read on. *   Are you wondering about iOS layouts? Jump down
    to the iOS section in this chapter.    Now letвҖҷs cover platform-specific layouts,
    starting with Android.    ### Using Android Layouts    android    Android layouts
    contain and format controls, and inherit from the Android `ViewGroup` class, which
    is similar to the Xamarin.Forms `Layout` class. You can format simple pages with
    a few controls quickly and easily by using `LinearLayout. RelativeLayout` is useful
    when you know the relationships between controls. `TableLayout` provides a table-like
    container to assign views to specific rows and columns. `GridLayout` is similar
    to `TableLayout` but provides features to flow views into the table more loosely.
    `ContentView` is a base class for building custom layout views that can contain
    multiple layouts and other views, useful as a reusable component. `Fragments`
    are a layout-related topic but not technically layouts. Developers use fragments
    as advanced layouts (with their own state and life cycle) to combine to build
    complex, interchangeable UIs.  Note  The term layout can mean two things in Android.
    It can be a layout XML (`.axml`) file in the `Resources` folder or it can be one
    of the control containers (used therein) to format controls, such as `LinearLayout`.
    This book distinguishes between them by using the terms layout XML and layout.    Android
    layouts are similar to their Xamarin.Forms counterparts, as shown in Table [3-1](#A978-1-4842-0214-2_3_Chapter.html#Tab1).    Table
    3-1.  Comparison of Android and Xamarin.Forms Layouts   | Android | Xamarin.Forms
    | | --- | --- | | `LinearLayout` | `StackLayout` | | `RelativeLayout` | `RelativeLayout`
    | | `TableLayout` | `Grid` | | `GridLayout` | `Grid` | | `FrameLayout` | `StackLayout`,
    `ContentLayout` |    Though the Android `FrameLayout` was originally designed
    to house and frame a single view, it is often used as a panel-like element for
    multiple views where z-order can be specified, giving control over layers. It
    also serves as a container to dynamically swap in and swap out fragments.    Fragments
    inherit from `Android.App.Fragment` and are not technically layouts. Mini-layouts
    with code-behinds and rules of their own, fragments are often used as the foundation
    of an appвҖҷs layout architecture, like custom controls, as well as in tandem with
    other layouts. They are a mainstay of Android mobile app responsive design, especially
    when a phone app needs to look great on a tablet. We use them as componentized
    UI building blocks for creating a screen, both statically in layout XML and swapping
    them in and out dynamically in real time using code.  Note  The Android `AbsoluteLayout`
    option was deprecated in favor of `RelativeLayout`.    ### LinearLayout    android    `LinearLayout`
