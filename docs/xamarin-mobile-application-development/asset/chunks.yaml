    iOS Controls    i OS    Some of most common iOS selection controls are `UIPickerView`,
    `UIDatePicker`, `UIStepper`, `UISlider`, and `UISwitch. UIPickerView` supplies
    a drop-down list, `UIStepper` gives a plus/minus button for changing numeric values,
    and the rest are self-explanatory.    Similar to Android, iOS controls donвҖҷt produce
    a modal dialog box by default, but produce only an inline dialog. Use the `UITextField.InputView`
    modal dialog technique described in the following sections.    ### UIPickerView    The
    `UIPickerView` control provides a drop-down list for selection of a single item,
    typically from a short list of items obtained from a data model.    The `UIPickerView`
    is generally linked to a `UITextField` which, when tapped, pops up the picker.
    The picker is data-bound to a specialized view-model class called `UIPickerViewModel`,
    which returns rows from its contained data model and has a `ValueChanged` method
    and `SelectedItem` property that returns the selected value.    LetвҖҷs build a
    drop-down that allows the user to pick a color.    Using the designer of your
    choice, add a `UITextField` to your layout (storyboard) and name it `color`. Then
    prepare the data model as a class `PickerModel` (Listing [4-5](#A978-1-4842-0214-2_4_Chapter.html#FPar22)).
    Place it below the `ViewDidLoad` method in a `UIViewController` called `DatePickerViewController`.  Listing
