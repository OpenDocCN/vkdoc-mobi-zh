    ListView    xamarin.forms    The standard ways that a user can edit a list are
    to add or delete list rows, or modify properties of list rows. These types of
    list edits require nontrivial data binding, when list rows are added or deleted
    from an array or collection, or when changes to list properties take place in
    code. We need those data model changes to be reflected in the UI.    Nontrivial
    list binding requires the implementation of an `INotify` interface to notify the
    UI to refresh when changes to the model take place. There are two ways to do this:
    using a manual implementation of `INotifyPropertyChanged` or using an `ObservableCollection`.
    `ObservableCollection` already implements the `INotifyCollectionChanged` interface.
    Which approach you use (either or both) should depend on the types of changes
    to the list that you want to reflect in the list UI.    Here are the two main
    list-editing scenarios and a standard way to handle them:    *   Adding and deleting
    rows: Use an `ObservableCollection` as the list data source. *   Editing properties
    in the `ListView`: Create a view model implementing `INotifyPropertyChanged` that
    exposes the editable properties in the list data model (such as `Title`).  Tip  If
    you need to replace the entire list, youвҖҷll likely need to rebind the list by
    reassigning ItemsSource to get the UI to refresh.    LetвҖҷs begin with adding and
    deleting rows.    #### Adding and Deleting Rows    xamarin.forms    Nontrivial
    data binding while adding and deleting rows from `ListView` can be handled using
    `ObservableCollection`, which has a built-in implementation of `INotifyCollectionChanged`.
    A `ListView` bound to an `ObservableCollection` will automatically install a handler
    for the `CollectionChanged` event.    Using `ObservableCollection` as the bound
    data type for `ListItem` ensures that changes to the list rows are reflected in
    the UI in real time.    Create and populate `ObservableCollection`, as shown in
    Listing [7-9](#A978-1-4842-0214-2_7_Chapter.html#FPar16). Set the `ItemsSource`
    property of `ListView` to the collection.  Listing 7-9\. List Binding Using an
    ObservableCollection (ListObservablePage.cs)  В В В В `var items = new ObservableCollection<Item>
