    styles and can be turned off using the `UITableView SeparatorStyle` property.
    Color can also be set using the `SeparatorColor` property.    В В В В `table.SeparatorColor
    = UIColor.Blue;`    В В В В `table.SeparatorStyle = UITableViewCellSeparatorStyle.DoubleLineEtched;`    These
    are the four `SeparatorStyle` settings:    *   None: Turn off the separator line
    *   SingleLine: Default single line *   SingleLineEtched: Grouped-style line made
