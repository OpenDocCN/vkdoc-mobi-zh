    6-5.  ToolbarItems drop-down menu  ### Modal    xamarin.forms    Xamarin.Forms
    provides three options for modal navigation:    *   `NavigationPage` for full-page
    modals *   Alerts for user notifications *   Action sheets for pop-up menus    ####
    Full-Page Modal Using NavigationPage    Modal full-screen pages can be created
    that break the hierarchical pattern. When modal pages are raised, the hierarchy
    is interrupted and the navigation bar goes away. The navigation bar comes back
    when the modal is popped off the stack. These two methods are used to move between
    pages modally:    `PushModalAsync` pushes a page on the stack and goes there:    В В В В `Navigation.PushModalAsync(new
    nextPage());`    `PopModalAsync` pops a page off the stack and goes to the previous
    page:    В В В В `Navigation.PopModalAsync();`  Tip  Four events on the `Application`
    object can help you manage your modal pagesвҖҷ life cycles: `ModalPushing`, `ModalPushed`,
    `ModalPopping`, and `ModalPopped`.    #### User Notification Using Alerts    The
    `DisplayAlert` method of the `ContentPage` displays a pop-up alert, as shown in
    Figure [6-6](#A978-1-4842-0214-2_6_Chapter.html#Fig6). This is typically used
    with async/await so execution will halt until the pop-up is cleared (Listing [6-4](#A978-1-4842-0214-2_6_Chapter.html#FPar13)).    ![A978-1-4842-0214-2_6_Fig6_HTML.jpg](A978-1-4842-0214-2_6_Fig6_HTML.jpg)    Figure
    6-6.  DisplayAlert pop-up with title, message, and action button Listing 6-4\.
    Using DisplayAlert, from Alerts.cs  В В В В `Button button = new Button { Text = "Show
    Alert" };`    В В В В `button.Clicked += async (sender, e) =>`    В В В В `{`    В В В В В В В В `await
    DisplayAlert("Hey", "You really should know about this.", "OK");`    В В В В `};`    User
