    and set `IsRefreshing` to `false` (it was `true` before).    ### Optimizing Performance    xamarin.forms    Cell
    reuse is built-in with Xamarin.Forms, giving you a leg up over iOS and Android
    lists. Even so, scrolling lists can become slow, laggy, or janky. This is annoying
    to the user and makes the app feel unprofessional.    When building `ListViews`,
    a few things to watch out for are custom template `ViewCells` with many views,
    using images on older devices, and using layouts that require a large amount of
    measurement calculations.    Here are some recommendations for optimizing `ListView`
    performance:    *   Use the built-in cells whenever you can: `TextCell` and `ImageCell`.
    *   Use custom template `ViewCells` only when you have to. *   Use images only
    when necessary and keep images as small as possible. *   Use as few elements as
    possible. For example, consider using a single `FormattedString` label instead
    of multiple labels. *   Use `AbsoluteLayout` when you can, as it does no measurements.
    *   `RelativeLayout` can work well if constraints are passed directly. *   Avoid
    deeply nested layout hierarchies. Use `AbsoluteLayout` or `Grid` to help reduce
    nesting. *   Avoid specific `LayoutOptions` except `Fill` (`Fill` is the cheapest
    to compute).    As a last resort, with a complex list, use custom renderers to
    create the list natively (see [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html)).    ThatвҖҷs
    it for `ListView` in Xamarin.Forms! At this point, you are faced with your choice.
    If youвҖҷre finished reading about Xamarin.Forms, you can continue reading about
    lists in the other OSs (Android and iOS) or you can turn to the next chapter to
    learn more about Xamarin.Forms, where youвҖҷll read about navigation.    If youвҖҷre
    staying with this chapter, youвҖҷll now learn about platform-specific layouts, starting
    with Android.    ## Android ListView    android    `ListView` is a view group
    that displays a scrollable list of items. `ListViews` are bound to an `Array`,
    `List`, or data model using an `Adapter`. They contain several built-in views
    containing one or two lines of text and an image. Custom views can be constructed
    using `LinearLayout` at the expense of performance. Used in its basic form, `ListView`
    is simple and fast.    These are the two most common ways to build a `ListView`:    *   Use
    the `ListActivity` class, which is an `Activity` containing a `ListView`. *   Use
    the `ListView` tag in a layout XML, often used for customizing a list.    WeвҖҷll
    start with the first one, `ListActivity`, and then talk about the second one in
    the вҖңCustomizing List RowsвҖқ section.    ### Using ListActivity    Android provides
    a class called `ListActivity` specifically designed for displaying a list. The
    `ListActivity` class inherits from the `Activity` class and contains a `ListView`.
    This is a convenient way to create a `ListView` programatically and populate it
    using an `Adapter` class. In the following example, you will code a `ListView`
    using `ListActivity`.    ### Binding to an Array of Strings    Bind a `ListActivity`
    to an array of strings to create a list.    Create an Android `Activity`, then
    change the class to inherit from `ListActivity` instead of `Activity`. Declare
    and assign a `listItems` string array, as shown in Listing [5-9](#A978-1-4842-0214-2_5_Chapter.html#FPar29).  Listing
