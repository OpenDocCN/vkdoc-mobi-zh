    = LayoutOptions.Center,`    В В В В В В В В В В В В `VerticalOptions = LayoutOptions.CenterAndExpand`    В В В В В В В В `};`    Figure
    [4-9](#A978-1-4842-0214-2_4_Chapter.html#Fig9) shows what the `Switch` view looks
