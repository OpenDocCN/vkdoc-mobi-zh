    Handling the Up Button    android    Popping pages off the stack can be accomplished
    by either the Up or the Back button. Up is the less-than sign (<) in the top-left
    corner of the toolbar, and the Back button is on the bottom navigation bar. There
    are a few ways to handle the clicking of the Up or Home button: finish the activity
    and return to the previous one, return to a specified parent activity, or spawn
    a new intent and go to a specified activity. LetвҖҷs cover all three.    ##### Finish()
    the Activity    An easy way to back-navigate is to handle the Up button click
    by overriding `OnOptionsItemSelected` to call the `Finish()` method, which closes
    the current activity and returns to the previous activity (Listing [6-28](#A978-1-4842-0214-2_6_Chapter.html#FPar50)).  Listing
    6-28\. Finish Method in ToolbarActivitySecond.cs  В В В В `public override bool OnOptionsItemSelected
    (IMenuItem item)`    В В В В `{`    В В В В В В В В `if (item.ItemId == Android.Resource.Id.Home)`    В В В В В В В В В В В В `Finish();`    В В В В В В В В `return
    base.OnOptionsItemSelected (item);`    В В В В `}`    Other clickable options are
    available, but in this case weвҖҷre concerned only with the Up button, identified
    by `Android.Resource.Id.Home`.    ##### Using parentActivityName in AndroidManifest.xml    Specify
    the page that the Up button will travel to by declaring the parent of each activity
    in the `android:parentActivityName` attribute on the `<activity>` element of `AndroidManifest.xml`
