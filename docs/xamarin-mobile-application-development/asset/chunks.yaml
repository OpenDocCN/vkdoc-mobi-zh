    your code here`    В В В В В В В В `base.OnBackPressed();`    В В В В `}`    ### Fragments    android    The
    building blocks of mature Android apps, fragments are used for everything from
    alerts, to modal pop-up screens, to portions of screens, to views that can fill
    entire screens. Introduced in Android 3.0, fragments work like mini-layouts or
    custom controls, each with their own code-behind called a `Fragment` class. Just
    like regular Android layouts, they can be built with the UI designer and saved
    as `.axml` files. Fragment layouts can then be included within other layout files,
    allowing a nesting of layout files.  Tip  Swap fragments in and out of a page
    dynamically by using `FrameLayout` in your main layout along with the `FragmentTransaction
