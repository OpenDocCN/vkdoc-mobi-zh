    еңЁзј–еҶҷи·Ёе№іеҸ°еә”з”Ёж—¶пјҢдёҖдёӘе…ій”®зӣ®ж ҮжҳҜд»Јз ҒйҮҚз”ЁгҖӮйҮҚз”Ёзҡ„и¶ҠеӨҡпјҢйЎ№зӣ®е°ұи¶Ҡеҝ«гҖҒжҲҗжң¬и¶ҠдҪҺпјҢз»ҙжҠӨжҲҗжң¬д№ҹи¶ҠдҪҺгҖӮXamarin е°ҶжӯӨз§°дёәз§»еҠЁејҖеҸ‘зҡ„зӢ¬и§’е…ҪпјҡдёҖж¬Ўзј–еҶҷпјҢеҲ°еӨ„йғЁзҪІгҖӮд»»дҪ•еҜ»жүҫзӢ¬и§’е…Ҫзҡ„ж—…зЁӢйғҪе§ӢдәҺдёҖдҪҚиғҪеҗёеј•е®ғеҮәзҺ°зҡ„зҫҺдёҪе°‘еҘігҖӮжҲ‘д»¬зҡ„зҫҺдёҪе°‘еҘіе°ұжҳҜи·Ёе№іеҸ°и®ҫи®ЎгҖӮ


    и®©жҲ‘д»¬жҺўзҙў Xamarin еҰӮдҪ•еңЁиҝҪжұӮи·Ёе№іеҸ°и®ҫи®Ўзҡ„еҗҢж—¶её®еҠ©жҲ‘д»¬и§ЈеҶіз§»еҠЁејҖеҸ‘йҡҫйўҳгҖӮ


    ## д»Җд№ҲжҳҜ Xamarinпјҹ


    Xamarin жҳҜдёҖдёӘејҖеҸ‘е№іеҸ°пјҢе…Ғи®ёжҲ‘д»¬з”Ё C# зј–еҶҷеҺҹз”ҹзҡ„гҖҒи·Ёе№іеҸ°зҡ„ iOSгҖҒAndroid е’Ң Windows Phone еә”з”ЁгҖӮ


