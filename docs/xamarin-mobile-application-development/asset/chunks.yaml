    \ и§ҶеӣҫпјҲиҜ·еҸӮйҳ…з¬¬ 8 з« пјүгҖӮеҚідҫҝеҰӮжӯӨпјҢејҖеҸ‘иҖ…жңүж—¶д№ҹдјҡе°ҶеҚ•дёӘиҮӘе®ҡд№үеҢ–жҺ§д»¶з§°дёәиҮӘе®ҡд№үжҺ§д»¶гҖӮжӯӨеӨ–пјҢиҮӘе®ҡд№үеҢ–жҺ§д»¶жңүиғҪеҠӣеҢ…еҗ«еӨҡдёӘжҺ§д»¶пјҢиҝҷж—¶е®ғе®һйҷ…дёҠеҸҜиғҪжҲҗдёәдёҖдёӘиҮӘе®ҡд№үжҺ§д»¶гҖӮ\n\
    \nеңЁ Android дёӯпјҢжҲ‘д»¬жңүдёӨдёӘйҖүйЎ№з”ЁдәҺеҲӣе»әиҮӘе®ҡд№үжҺ§д»¶пјҡеӯҗзұ»еҢ–и§Ҷеӣҫе’ҢзүҮж®өгҖӮеӯҗзұ»еҢ–и§Ҷеӣҫе…Ғи®ёжҲ‘д»¬еҲӣе»әеҸҜд»ҘдҪңдёәеӯҗи§Ҷеӣҫж·»еҠ еҲ° `ViewGroups`пјҲдҫӢеҰӮеёғеұҖпјүзҡ„иҮӘе®ҡд№үи§ҶеӣҫгҖӮеӯҗзұ»еҢ–и§ҶеӣҫиҪ»йҮҸзә§дё”жҳ“дәҺе®һзҺ°гҖӮз„¶иҖҢпјҢжңүж—¶жҲ‘д»¬йңҖиҰҒеңЁжҲ‘д»¬зҡ„иҮӘе®ҡд№үжҺ§д»¶дёӯи®ҝй—®жҙ»еҠЁеҠҹиғҪпјҢдҫӢеҰӮеҜјиҲӘе Ҷж Ҳе’Ңз”ҹе‘Ҫе‘ЁжңҹдәӢд»¶гҖӮзүҮж®өжҳҜеҠЁжҖҒзҡ„е°ҸеһӢеёғеұҖпјҢе…·жңүдҪҝз”Ёеҹәзұ»\
    \ `Android.App.Fragment` жһ„е»әзҡ„жҙ»еҠЁзү№жҖ§гҖӮз”ұдәҺе®ғд»¬дҪңдёәжһ„е»әеқ— UI зұ»зҡ„ејәеәҰе’ҢеӨҡеҠҹиғҪжҖ§пјҢи®ёеӨҡ Android еә”з”Ёе®Ңе…ЁдҪҝз”ЁзүҮж®өжһ„е»әгҖӮе®ғд»¬йҖҡеёёз”ЁдәҺжһ„е»әеҝ…йЎ»еңЁжүӢжңәе’Ңе№іжқҝз”өи„‘дёҠйғҪиғҪиүҜеҘҪиҝҗиЎҢзҡ„еә”з”ЁпјҢеӣ дёәе®ғд»¬жңүеҠ©дәҺж №жҚ®еұҸе№•е°әеҜёиҮӘе®ҡд№үеёғеұҖгҖӮ\n\
