- fmt: "## Using the Xamarin.Forms UI\n\nPages, layouts, and views make up the core\
    \ of the Xamarin.Forms UI (Figure [2-5](#A978-1-4842-0214-2_2_Chapter.html#Fig5)).\
    \ Pages are the primary container, and each screen is populated by a single `Page`\
    \ class. A page may contain variations of the `Layout` class, which may then hold\
    \ other layouts, used for placing and sizing their contents. The purpose of pages\
    \ and layouts is to contain and present views, which are controls inherited from\
    \ class `View`.\n\n![A978-1-4842-0214-2_2_Fig5_HTML.jpg](A978-1-4842-0214-2_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5. Page, layouts, and views on a Xamarin.Forms screen\n\n### Page\n\
    \nThe `Page` class is the primary container of each main screen in the app. Derived\
    \ from `Xamarin.Forms.VisualElement`, `Page` is a base class for the creation\
    \ of other top-level UI classes. Here are the primary pages:\n\n- `ContentPage`\n\
    - `MasterDetailPage`\n- `NavigationPage`\n- `TabbedPage`\n- `CarouselPage`\n\n\
    In addition to serving as containers for layouts and views, pages provide a rich\
    \ menu of prefabricated screens with useful functionality that includes navigation\
    \ and gesture responsiveness. More on these in [Chapters 6](#A978-1-4842-0214-2_6_Chapter.html).\n\
    \n### Layout\n\nViews are placed and sized by their container class, `Layout`.\
    \ Layouts come in a variety of flavors with different features for formatting\
    \ their views. These containers allow views to be formatted precisely, loosely,\
    \ absolute to the coordinate system, or relative to one another. Layouts are the\
    \ soft tissue of the page, the cartilage that holds together the solid, visible\
    \ aspects of the page (views). Here are the main layouts:\n\n- `StackLayout`\n\
    - `AbsoluteLayout`\n- `RelativeLayout`\n- `Grid`\n- `ScrollView`\n- `Frame`\n\
    - `ContentView`\n\nThe layoutвҖҷs `Content` and/or `Children` properties contain\
    \ other layouts and views. Horizontal and vertical alignment is set by the properties\
    \ `HorizontalOptions` and `VerticalOptions`. Rows, columns, and cells within a\
    \ layout can be padded with space, sized to expand to fill available space, or\
    \ shrunk to fit their content. More on layouts in the next chapter.\n\n> **Tip:**\
    \ Xamarin.Forms layouts are derived from the `View` class, so everything contained\
    \ by a page is actually some form of a view.\n\n### View\n\nViews are controls,\
    \ the visible and interactive elements on a page. These range from the basic views\
    \ like buttons, labels, and text boxes to the more advanced views like lists and\
    \ navigation. Views contain properties that determine their content, font, color,\
    \ and alignment. Horizontal and vertical alignment is set by properties `HorizontalOptions`\
    \ and `VerticalOptions`. Like layouts, views can be padded with space, sized to\
    \ expand to fill available space, or shrunk to fit their content. Later in this\
    \ chapter, weвҖҷll code some views, then visit them again in [Chapter 4](#A978-1-4842-0214-2_4_Chapter.html)\
    \ and throughout the book. These are the primary views grouped by function:\n\n\
    - **Basic вҖ“ fundamental views**\n  - `Label`\n  - `Image`\n  - `Button`\n  - `BoxView`\n\
    - **List вҖ“ make a scrollable, selectable list**\n  - `ListView`\n- **Text Entry\
    \ вҖ“ user entry of text strings using a keyboard**\n  - `Entry`\n  - `Editor`\n\
    - **Selection вҖ“ user choice of a wide range of fields**\n  - `Picker`\n  - `DatePicker`\n\
    \  - `TimePicker`\n  - `Stepper`\n  - `Slider`\n  - `Switch`\n- **User Feedback\
    \ вҖ“ notify the user of app processing status**\n  - `ActivityIndicator`\n  - `ProgressBar`\n\
    \n> **Tip:** Be careful not to confuse the Xamarin.Forms `View` class with a view\
    \ meaning screen or presentation layer. Also, iOS refers to screens as views.\n\
    \n## Creating a Xamarin.Forms Solution\n\nXamarin provides templates that contain\
    \ the necessary projects to create a Xamarin.Forms app. A cross-platform solution\
    \ usually contains these projects:\n\n- **Xamarin.Forms**: Cross-platform UI code\
    \ called by one of the platform-specific projects. This can be accomplished using\
    \ a shared project, Portable Class Library (PCL), or shared files. The example\
    \ weвҖҷll be creating in this chapter uses a PCL.\n- **Xamarin.Android**: Android-specific\
    \ code, including Android project startup.\n- **Xamarin.iOS**: iOS-specific code,\
    \ including iOS project startup.\n- **Windows Phone application**: Windows PhoneвҖ“specific\
    \ code, including Windows Phone project startup.\n- **Core Library**: Shared app\
    \ logic such as business logic and data access layer using a PCL, or a shared\
    \ project.\n\nFigure [2-6](#A978-1-4842-0214-2_2_Chapter.html#Fig6) shows the\
    \ main projects usually found in a Xamarin.Forms solution.\n\n![A978-1-4842-0214-2_2_Fig6_HTML.jpg](A978-1-4842-0214-2_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6. Xamarin.Forms solution\n\n> **Tip:** The Core Library project is\
    \ not added by solution templates and must be created manually, either as a shared\
    \ project or PCL. If you are just getting started with Xamarin.Forms you can skip\
    \ the core library for now and put all your shared files in the Xamarin.Forms\
    \ project.\n\nLetвҖҷs create a simple demo app to help us explore the foundations\
    \ of Xamarin.Forms and many of its commonly-used features.\n\nCreate a Xamarin.Forms\
    \ solution. In Visual Studio, create a New Solution and select project type C#\
    \ вһӨ Mobile Apps вһӨ Blank App (Xamarin.Forms Portable). In Xamarin Studio, select\
    \ project type C# вһӨ Mobile Apps вһӨ Blank App (Xamarin.Forms Portable). Name it\
    \ `FormsExample`.\n\nThis will create multiple projects: one for Xamarin.Forms\
    \ code, and then platform-specific projects including Android, iOS, and/or Windows\
    \ Phone. The platform-specific projects available depend on whether you're on\
    \ a PC or a Mac, whether you're in Visual Studio or Xamarin Studio, and the licenses\
    \ you own. A Mac with Xamarin Studio will give you an iOS project and an Android\
    \ project. A PC with Xamarin Studio will give you Android. Solutions created in\
    \ Xamarin Studio do not include a Windows Phone project, as Visual Studio is required\
    \ to create that project, though projects created in Visual Studio can be browsed\
    \ in Xamarin Studio without being compiled there. A PC with Visual Studio with\
    \ both iOS and Android licenses activated will create four projects: one PCL and\
    \ one for each of the three platforms.\n\n> **Tip:** Xamarin.Forms is currently\
    \ available with all licenses except the Starter license. YouвҖҷll need an Indie\
    \ or higher-level purchased license or trial license to use Xamarin.Forms.\n\n\
    More on PCLs, shared projects, and other cross-platform solution architecture\
    \ options in [Chapter 9](#A978-1-4842-0214-2_9_Chapter.html).\n\nThe following\
    \ sections provide each of the projects in the solution and the code they contain."
