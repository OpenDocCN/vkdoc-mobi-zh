    renderers complete the Xamarin.Forms picture, extending the reach of Xamarin.Forms
    deep into the platform-specific APIs using Xamarin.iOS, Xamarin.Android, and the
    Windows Phone SDK. The Xamarin.Forms abstraction provides immeasurable value as
    a cross-platform tool, but the platforms do differ, and developers need a way
    to bridge the gap. The custom renderer is that bridge.    It is time that the
    design of the book you are reading be laid bare (although IвҖҷm fairly certain you
    had this figured out already):    This entire book is architected around Xamarin.Forms
    and how to extend it using custom renderers. That is partly why so many of the
    chapters begin with the Xamarin.Forms approach, and then continue with the Android
    and iOS equivalents.    For that reason, this chapter on custom renderers is the
    bow on your present. A big orange bow. Hopefully youвҖҷve found this gift to be
    useful, as it is drawing to its end.    If you recall the Xamarin.Forms versus
    platform-specific implementation discussion in [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html),
    you should now have a thorough understanding of the decisions to be made when
    setting out to build a Xamarin app and the options available to help you do it
    using Xamarin.Forms, Xamarin.Android, and Xamarin.iOS.    Custom renderers are
    the main approach used in platform-specific UI in Xamarin.Forms apps. There are,
    however, a number of other ways to slice and dice platform-specific bits of code
    in the data access layer, business logic, and other non-UI functionality. This
    brings you to Xamarin application architecture.    In the next and final chapter,
    youвҖҷll look at how to architect cross-platform apps.    # 9.В Cross-Platform Architecture    At
    the outset of this book, I mentioned the unicorn of mobile development: write
    once, deploy anywhere. In the quest for this unicorn, the fair maiden that might
    entice this beast to appear is cross-platform design.    The entirety of the Xamarin
    platform already provides a foundation of cross-platform design, but you can further
    the cause by understanding and thoughtfully implementing cross-platform architecture.    What
    is cross-platform architecture?    It begins with two kinds of code.    ## Shared
    Code and Platform-Specific Code    A Xamarin app can be broken down into the two
    types of code found in it:    *   Shared code: Used by all platforms in the app
    solution; also called cross-platform code. *   Platform-specific code: Used by
    one OS platform in the app solution, such as iOS or Android, but not both.    There
    are a number of ways to divide an application solution between shared and platform-specific
    code. It can be done top-down by project, or bottom-up using individual lines
    of code; then there are middle ways using specific files or classes. Many good
    apps are divided into shared and platform-specific code at all these levels.    The
    options available for slicing and dicing an application top-down are Portable
    Class Libraries (PCL), projects compilable into a single DLL used by multiple
    platforms, and Shared Projects, which are recompiled in different platform contexts.
    Bottom-up options include conditional compilation, which is a platform-specific
    compilation demarcation around small blocks of code in a Shared Project. Conditional
    compilation is not available in a PCL, since the DLL is pre-compiled, so Dependency
    Injection (DI) can be used instead to create platform-specific classes against
    a common interface. Custom renderers, covered in [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html),
    use DI to split out platform-specific UI classes in a Xamarin.Forms solution.
    File linking is used to share specific files between projects.    All of these
    techniques are used to solve the problem of platform-specific differences in a
    cross platform app, which is called divergence.    ## Handling Divergence    Divergence
    describes the need for platform-specific implementations in a cross-platform app
    because platform-specific differences cause their implementations to diverge from
    the main code in a solution. Examples include custom renderers in Xamarin.Forms
    apps where platform-specific UI diverges from the cross-platform approach, and
    when networking or push notifications implemented in a core library reach a point
    where they require local OS API access.    The following are the primary techniques
    for handling divergence in a cross-platform application at different levels of
    granularity.    *   At the project level, use platform-specific projects. *   At
    the file level, use file linking, sometimes with partial classes or methods. *   At
    the class level, use dependency injection in PCLs. In Shared Projects you have
    more options, including DI, partial classes, and conditional compilation. *   At
    the method level, use partial methods. *   At the code level, use conditional
    compilation for individual lines of platform-specific code.    Due to their encapsulated
    nature, PCLs can only use a couple of the preceding techniques without recompiling
    a new DLL for each platform: platform-specific projects and dependency injection.
    Recompiling a cross-platform PCL DLL for each platform implementation is not recommended.
    If you must recompile, consider using a Shared Project. Shared Projects can use
    all of the previously mentioned techniques as they are designed to be recompiled
    for each platform. IвҖҷll say more about PCLs and Shared Projects shortly.  Tip  There
    is also divergence within single platforms due to variations between platform
    versions, such as Android API or iOS release versions, for example. Version divergence
    may include divergence between screen sizes or features in APIs that are added
    or deprecated.    These techniques lead to a few standard architectures for Xamarin
    cross-platform apps that youвҖҷll look at now. With the acknowledgment that architecture
    overlaps but isnвҖҷt the same as solution structure, letвҖҷs begin with the Xamarin.Forms
    solution.    ## Xamarin.Forms Solution Architecture    Xamarin.Forms apps have
    a base solution pattern that was mentioned in [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html).
    These are the main projects.    *   Xamarin.Forms: Cross-platform UI code in a
    PCL or Shared Project, which is called by one of the platform-specific projects.
    *   Xamarin.Android: Android-specific code, including Android project startup.
    *   Xamarin.iOS: iOS-specific code, including iOS project startup. *   Windows
    Phone application: Windows PhoneвҖ“specific code, including Windows Phone project
    startup. *   Core Library: Shared code such as Business Logic Layer (BLL) and
    DAL using a PCL or Shared Project. (A core library may not be necessary in a small
    or prototype app since shared code can reside in the Xamarin.Forms project.)    All
    these projects can be created automatically by the project template except the
    core library, which must be added manually when needed. Figure [9-1](#A978-1-4842-0214-2_9_Chapter.html#Fig1)
    shows the projects in question.    ![A978-1-4842-0214-2_9_Fig1_HTML.jpg](A978-1-4842-0214-2_9_Fig1_HTML.jpg)    Figure
    9-1.  Xamarin.Forms solution projects  Figure [9-2](#A978-1-4842-0214-2_9_Chapter.html#Fig2)
    shows another way of looking at the Xamarin.Forms solution that includes the app
    and architecture layer axes.    ![A978-1-4842-0214-2_9_Fig2_HTML.jpg](A978-1-4842-0214-2_9_Fig2_HTML.jpg)    Figure
    9-2.  Xamarin.Forms solution architecture of iOS, Android, and Windows Phone apps  There
    are two types of shared code in a Xamarin.Forms solution: the shared UI code in
    the Xamarin.Forms project and the DAL and BLL in the Core Library project.    The
    platform-specific projects (Xamarin.Android, Xamarin.iOS, and Windows Phone) house
    startup code, custom renderers, and other platform-specific functionality such
    as services, notification, sensors, or networking. In a Xamarin.Forms solution,
    most of the UI is housed in the Xamarin.Forms project and only in platform-specific
    projects when there are custom renderers. Platform-specific projects handle divergence
    at the project level.  Note on Windows Phone Projects  Creating a Xamarin.Forms
    Solution on Windows will not create a Windows Phone project without having the
    Windows Phone SDK installed. Windows Phone apps cannot be developed using a Mac.
    Xamarin Studio does not support the creation of Windows Phone projects and these
    must be created in Visual Studio.    Note on iOS ProjectsВ В Creating a Xamarin.Forms
    Solution on a Windows machine will create an iOS project, but it will not be usable
    without a Mac build host.    Entirely platform-specific solutions keep most or
    all of the UI in platform-specific projects.    ## Platform-Specific Solution
    Architecture    Platform-specific apps have a base solution that looks similar
    to a Xamarin.Forms solution, minus the Xamarin.Forms project, and all the platform-specific
    projects contain a lot more code. Here are the projects in a typical platform-specific
    solution.    *   Xamarin.Android: Android-specific code. *   Xamarin.iOS: iOS-specific
    code. *   Windows Phone application: Windows PhoneвҖ“specific code. *   Core Library:
    Shared app logic such as BLL and DAL using a PCL or a Shared Project. (For a lighter-weight
    solution without a core library, you can use file linking to connect shared code
    that resides in a single platformвҖҷs project to each of the other platformвҖҷs projects.)    Figure
    [9-3](#A978-1-4842-0214-2_9_Chapter.html#Fig3) shows the Xamarin projects for
    a platform-specific solution.    ![A978-1-4842-0214-2_9_Fig3_HTML.jpg](A978-1-4842-0214-2_9_Fig3_HTML.jpg)    Figure
    9-3.  Xamarin projects in a platform-specific solution  Figure [9-4](#A978-1-4842-0214-2_9_Chapter.html#Fig4)
    shows another way of looking at the platform-specific solution that includes the
    app and architecture layer axes.    ![A978-1-4842-0214-2_9_Fig4_HTML.jpg](A978-1-4842-0214-2_9_Fig4_HTML.jpg)    Figure
    9-4.  Xamarin solution architecture for Xamarin.iOS, Xamarin.Android, and Windows
    Phone apps  The platform-specific projects here (all projects except Core Library)
    handle divergence at the project level. In many situations, these are created
    one at a time. For example, first the iOS version of an app is written, then the
    Android version. This is a useful way to build an app because the core library
    can be tested with a single platform and the UI can be worked out entirely on
    one platform before adding a second or third platform.  MVVM and MVC  Xamarin.Forms
    is strongly modeled after the MVVM pattern with built-in data binding (as discussed
    in [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html)). For MVVM with platform-specific
    apps, there are open source options such as MvvmCross and MVVM Light. Both MvvmCross
    and MVVM Light can be used with Xamarin.Forms. However, many features of MvvmCross
    overlap with Xamarin.Forms, providing diminishing returns on using them together.    Regarding
    MVC in platform-specific solutions, Xamarin apps are largely MVC-ish. You create
    data models by-hand (M in MVC), which are bound as data sources to fields and
    lists. XML layouts make up the View (the V in MVC), and Android `Activities` and
    iOS `UIViewControllers` can act as controllers; however, due to native OS UI architectures,
    the lines between the View and Controller can be somewhat blurry. Although iOS
    is touted as MVC-based, if you are accustomed to the strict separation of concerns
    (SOC) found in an ASP.NET MVC solution, you may find iOSвҖҷs idea of MVC to be diluted.
    Since storyboard-generated `UIViews` define mainly static aspects of the screen,
    the logic defining dynamic content is pushed down into the `UIViewController`(the
    Controller, or C, in MVC). Much of the storyboard-generated `UIView` is about
    as View-like as .aspx files were before the release of ASP.NET MVC, that is, not
    very View-like at all. There isnвҖҷt an equivalent of Razor in native mobile development
    (building HTML templates in Xamarin using Razor notwithstanding). The same is
    true of Android development. Layout XML files create largely static layouts and
    leave the job of populating the dynamic content into the page to the `Activity`,
    which can become enmeshed with business logic. XamarinвҖҷs mission is to provide
    direct access to these APIs, not to change their fundamental pattern. So, for
    a lot of us, iOS and Android development will be a step back architecturally from
    stricter MVC.    Having this knowledge, however, is power. It is up to you to
    impose SOC in your own apps. You can use your `UIViewControllers` and `Activities`
    to hold primarily view-related logic, and separate out business logic into true
    controllers of your own construction. DonвҖҷt let the toolset hold you back. ThatвҖҷs
    what classes are for, after all. This is the advantage of getting to do all this
    in C#!    ## Core Library    The core library is a dedicated project in your solution
    where the DAL, BLL, and other non-UI platform-independent code can reside. Enterprises
    use the core library for professional-grade code separation, decoupling the presentation
    layer from the BLL and DAL, and to facilitate team development. The core library
    isnвҖҷt necessary for some prototype apps, small projects, or small teams. All of
    the content in the core library project could instead be placed in the Xamarin.Forms
    project to simplify the solution.  Tip  If youвҖҷre just starting out with Xamarin.Forms,
    consider putting your data access, business logic, and shared code in the Xamarin.Forms
    UI project, and hold off on using a core library for now. You can use folders
    inside the Xamarin.Forms project to organize your non-UI code (for example, /data,
    /utilities, etc.) If youвҖҷre just starting out with platform-specific apps, you
    can use file linking (explained later in this chapter) as a lightweight alternative
    to a core library.    In large-scale and/or enterprise-grade apps, non-UI shared
    code should go into a core library project, separate from the UI projects. Core
    libraries are typically implemented using PCLs or Shared Projects. HereвҖҷs what
    you might put in the core library:    *   DAL: Data access layer that may include
    SQLite access, data models, view models, repositories, cloud data access, and
    web services. See [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html). *   BLL: Business
    logic that cuts across and is independent of platforms. *   Miscellaneous: Utilities,
    interfaces, cross-platform resources, and sundry necessities. The core library
    is a cross-platform catch-all for non-UI files, folders, and classes.    In a
    nutshell, put platform-independent, non-UI code in your core library.    It is
    natural for core library components to be moved into platform-specific projects
    if it becomes clear that they are not sharable. There are quite a few functions,
    such as certain types of local file access or OS services, which are platform-specific
    functions that must be placed in the platform-specific projects. If only a few
    lines of code in the core library need to be platform-specific, then conditional
    compilation can be employed in Shared Projects or dependency injection in PCLs.
    File linking is also a useful option in Shared Projects for creating partial classes
    with platform-specific files. More on these shortly.    Core libraries are sometimes
    created using shared libraries or, less commonly, using file linking in platform-specific
    apps instead of creating a dedicated core library project (usually by sharing
    BLL or DAL files from a platform-specific project to all the other platform-specific
    projects). An increasing number of core libraries and Xamarin.Forms projects use
    PCLs.    ## Portable Class Libraries (PCL)    PCLs are code projects that provide
    a built-in subset of the .NET Framework based on the selection of target platforms,
    such as Xamarin.Android and Xamarin.iOS (or .NET 4.5 or even Xbox!). PCLs can
    be compiled into a DLL once and then run on all target platforms, so they are
    ideal for cross-platform code sharing.    Shared code in a solutionвҖ”such as a
    Xamarin.Forms project, business logic, or data access codeвҖ”can be compiled into
    a PCL DLL for use with platform-specific projects or in other solutions altogether.
    Because of its decoupled nature, the PCL is particularly useful when it is distributed
    to other developers rather than used by a single developer.    Create a PCL in
    Visual Studio while on the Add New Project screen by selecting the Portable Class
    Library option. In Xamarin Studio, on the New Project screen, select the Portable
    Library option.    PCLs are configured at compile-time in Visual Studio or Xamarin
    Studio to target particular platforms using a profile. Profiles are configured
    to allow a PCL to run with Xamarin.iOS, Xamarin.Android, or Windows phone, as
    well as with other platforms. PCLs allow you to target these platforms:    *   Microsoft
    .NET Framework *   Silverlight *   Windows Phone *   .NET for Windows Store apps
    *   Xamarin.Android *   Xamarin.iOS *   Xbox    PCLs provide a convenient, decoupled
    component for holding shared code in a solution. The cost of using a PCL is that
    once the DLL is compiled, platform-specific customization requires a bit of extra
    work.  Important Note  In a PCL, you cannot add or link files nor use partial
    classes, partial methods, or conditional compilation for platform-specific implementations.    Because
    PCLs are constructed to avoid recompiling, platform-specific customization is
    usually done outside of the PCL in the platform-specific projects using dependency
    injection.    ## Dependency Injection    Dependency Injection (DI) is a design
    principle that helps developers include platform-specific functionality into an
    otherwise cross-platform class using Inversion of Control (IoC). IoC patterns
    are framework calls to specific implementations of general classes provided by
    the application. DI does this by passing the implementation into a constructor/setter.    DI
    is useful for platform-specific functions such as custom renderers, file handling,
    background services, and sensors. In your shared code (usually a PCL, but this
    will also work in a Shared Project or file), create an interface to define the
    methods and patterns to be implemented in each platform. Implement platform-specific
    subclasses of the base class in each respective platform-specific project. Then
    you can inject these platform-specific implementations into your shared code.
    DI handles divergence at the class level.    There are a few ways to implement
    the DI design principle, including interfaces, abstract classes, and inheritance.
    Built into Xamarin.Forms is a DI implementation called `DependencyService`, which
    implements DI using interfaces.  Note  DI is a way to implement the Gang of Four
    (GoF) Strategy and/or Bridge patterns. Microsoft added to this in Windows Presentation
    Foundation (WPF) and called it the Provider pattern. Xamarin.Forms implements
    a variation of the Provider pattern in `DependencyService`.    ### Using DependencyService    Xamarin.Forms
    provides a built-in DI implementation called `DependencyService` that allows you
    to create a base interface, and then build platform-specific implementation classes
    to be invoked in shared code. This involves three steps:  Interface: An interface
    in the shared code declares the class for platform-specific implementation. В 
    Implementation: Platform-specific implementations of the interface are registered
    using [assembly] tags. В  Invocation: The platform-specific code is invoked from
    the shared code using `DependencyService.Get<InterfaceName>.MethodName`. В   LetвҖҷs
    look at an example that passes a simple string into a custom class, concatenates
    the name of the OS onto the beginning, and returns the string to the shared code
    caller.    IвҖҷll begin with the interface.    #### Creating an Interface    Using
    `DependencyService` first requires an interface of the functionality you want
    to implement. Interfaces help to create a consistent architecture for specifying
    cross-platform feature sets with platform-specific implementations.    Create
    an interface for your cross-platform class, `ICustomClass`, with a `GoNative`
    method.    В В В В `public interface ICustomClass`    В В В В `{`    В В В В В В В В `string GoNative(string
    param);`    В В В В `}`    The second step is to create platform-specific implementations.  Important
    Note  Remember to provide an implementation of your interface in all platform-specific
