    В В В В В В В В В В В В `base.OnCreate(bundle);`


    В В В В В В В В В В В В `global::Xamarin.Forms.Forms.Init(this, bundle);`


    В В В В В В В В В В В В `LoadApplication(new App());`


    В В В В В В В В `}`


