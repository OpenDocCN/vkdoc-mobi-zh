    them is important to formatting.    ### Expanding and Padding Views by Using LayoutOptions    xamarin.forms    Use
    the `Expand` layout option to cause views to expand or to pad the available area
    with space. `FillAndExpand` causes views to grow without creating padding space
    around them. All other expand options pad around the view with space.  Tip  These
    features are easier to see if you set a background color for the view by using
    the `BackgroundColor` property.    The following are `HorizontalOptions` left-to-right
    formatting options:    *   `FillAndExpand` expands the view to the right:    В В В В `HorizontalOptions
    = LayoutOptions.FillAndExpand;`    *   `StartAndExpand`В В pads to the right with
    space:    В В В В `HorizontalOptions = LayoutOptions.StartAndExpand;`    *   `EndAndExpand`
    - pads to the left with space:    В В В В `HorizontalOptions = LayoutOptions.EndAndExpand;`    *   `CenterAndExpand`В В pads
    to the left and right with space:    В В В В `HorizontalOptions = LayoutOptions.CenterAndExpand;`    The
    following top-to-bottom formatting options are available for `VerticalOptions`:    *   `FillAndExpand`
    - expands the view to the bottom:    В В В В `VerticalOptions = LayoutOptions.FillAndExpand;`    *   `StartAndExpand`
    - pads to the bottom with space:    В В В В `VerticalOptions = LayoutOptions.StartAndExpand;`    *   `EndAndExpand`
    - pads to the top with space:    В В В В `VerticalOptions = LayoutOptions.EndAndExpand`    *   `CenterAndExpand`
    - pads to the top and bottom with space:    В В В В В `VerticalOptions = LayoutOptions.CenterAndExpand;`  Note  `Expand`
    layout options are only useful only if there are sibling views in the layout.    ###
