    navigation drawer is the sliding side menu triggered by tapping an icon (usually
    the hamburger) at the top of the screen. Unlike Xamarin.Forms and Android, Apple
    provides no out-of-the-box navigation drawer component at the time of this writing;
    it must be developed by hand. I suggest trying these components from the Xamarin
    Component Store:    *   Flyout Navigation by James Clancey *   Sidebar Navigation
    by Jack Dehlin    GitHub also has options:    *   MonoTouch.SlideoutNavigation
    by Dillon Buchanan    These include MVVM-friendly menus:    *   MonoTouch.SlidingControls
    by Jonathan Stoneman *   MvxSlidingPanels.Touch by Big Frank *   SlidingPanels.Touch
    by Patrick Laplante    ### Tabs Using UITabBarController    i OS    Tabs are a
