- fmt: '### Windows Phone SDK


    The Windows Phone SDK is a C# library with a built-in .NET API. Screens are defined
    by `Frame` classes that handle navigation and contain pages, loaded and unloaded
    like conventional views. Within these are layout containers called panels, such
    as `Canvas` for absolute positioning, and `StackPanel` and `Grid` for relative
    layout with autosizing. There are familiar controls such as `TextBox` for editing
    and `TextBlock` for labels, and `Button`, `Image`, and `MediaElement` for videos
    and music. For lists there is `LongListSelector` and the older `ListBox`. We build
    the UI using C#, XAML, Blend, and/or the Visual Studio UI designer.


    **Tip**


    Because the Windows Phone SDK is already using C# and .NET, the Xamarin platform
    is not necessary to code a Windows Phone app in C#. Cross-platform development
    is the primary consideration that brings Xamarin together with Windows Phone:
    A Xamarin.Forms app can run on a Windows Phone.


    Xamarin.Forms currently supports Windows Phone Silverlight, WinRT and Windows
    Store support have been announced.


    ## Choosing Xamarin.Forms or a Platform-Specific UI


    As developers, we are faced with this decision:


    Which do I use, Xamarin.Forms or a Xamarin platform-specific UI?


    The trade-off is portability of Xamarin.Forms versus the full-featured functionality
    of XamarinвҖҷs platform-specific UIs, namely Xamarin.Android and Xamarin.iOS. At
    the time of this writing, the platform-specific Xamarin APIs have considerably
    more features than Xamarin.Forms. The answer to our question will range from one,
    to the other, to both, depending on your needs. Here are suggested guidelines:


    **Use Xamarin.Forms for the following:**


    *   **Learning Xamarin:** If youвҖҷre new to mobile development using C# then Xamarin.Forms
    is a great way to get started!

    *   **Cross-platform scaffolding:** When building cross-platform apps, Xamarin.Forms
    is useful to build out the scaffolding of your app, as a rapid-application development
    toolset.

    *   **Basic Business Apps:** Xamarin.Forms does these things well: basic data
    display, navigation, and data entry. This is a good fit for many business apps.

    *   **Basic design:** Xamarin.Forms provides controls with baseline design features,
    facilitating basic visual formatting.

    *   **Simple cross-platform screens:** Xamarin.Forms is great for creating fully
    functional basic screens. For more complex screens, leverage Xamarin.Forms custom
    renderers for platform-specific details.


    **Use a platform-specific UI (Xamarin.iOS or Xamarin.Android) for:**


    *   **Complex screens:** When an entire screen (or an entire app) requires a nuanced
    and complex design and UI approach, and Xamarin.Forms isnвҖҷt quite up to the task,
    go with a platform-specific UI using Xamarin.Android and Xamarin.iOS.

    *   **Consumer Apps:** Platform-specific UI has everything a developer needs to
    create a consumer app with complex visual design, nuanced gesture sensitivity,
    and high-end graphics and animation.

    *   **High-design:** This approach provides complete native UI APIs with low-level
    access to design properties on each control, allowing for a high visual standard
    of design. Native animation and graphics are also available with this approach.

    *   **Single-platform apps:** If youвҖҷre building for only one platform, and a
    cross-platform approach for your app is not important in the foreseeable future
    (a rare case even if youвҖҷre starting with one platform), consider using a platform-specific
    UI.

    *   **Unsupported platforms:** Mac OS X, Windows Store, and WinRT apps are not
    currently supported by Xamarin.Forms at this time.


    However, Xamarin moves fast, and these recommendations are likely to change. HereвҖҷs
    how: With each new release of Xamarin.Forms, more properties and methods will
    be included in the bindings, bringing this library closer to the platform-specific
    ones and giving us increased control over our cross-platform UI. Also, third-party
    vendors and open source projects such as Xamarin Forms Labs are swiftly extending
    the options available with added controls, charts, and datagrids. Currently, there
    is no visual designer for Xamarin.Forms, but I expect there will be one soon.


    When complex tasks or high design are required by Xamarin.Forms, virtually anything
    is possible using Custom Renderers.


    ### Use Both Approaches with Custom Renderers


    Custom Renderers provide access to the lower-level, platform-specific, screen-rendering
    classes called Renderers, which use platform-specific controls to create all Xamarin.Forms
    screens. Any Xamarin.Forms screen can be broken into platform-specific screens
    and classes using this approach. This means we can write a Xamarin.Forms page
    or app, and customize it by platform whenever necessary. More about this in [Chapter
    8](#A978-1-4842-0214-2_8_Chapter.html).


    Use Custom Renderers sparingly, or risk a fragmented UI code base that probably
    should have been written entirely as a platform-specific UI.


    In each of the following chapters, we will explore the Xamarin.Forms options and
    then examine platform-specific implementations of the same functionality. You
    will be able to see how they compare at the time of this writing and how to use
    them together using custom renderers. As time marches on, Xamarin.Forms may progress
    from a scaffolding technology to fully featured building blocks for cross-platform
    apps. If it does not, or until it does, the platform-specific approach will remain
    necessary to build highly functional apps without heavy reliance on Xamarin.Forms
    custom renderers.


    YesterdayвҖҷs award-winning Xamarin apps were created using the platform-specific
    approach, but the key question is, What will you create today?


    LetвҖҷs explore the building blocks of the C# mobile user interface.


    ## Exploring the Elements of Mobile UIs


    Xamarin is a unifying tool serving several platforms, many of which can have different
    names for the same things. Here are some unifying terms, weighted heavily in the
    direction of Xamarin.Forms:


    *   **Screens, views, or pages** in mobile apps are made up of several basic groups
    of components: pages, layouts, and controls. Pages can be full or partial screens
    or groups of controls. In Xamarin.Forms, these are called pages because they derive
    from the `Page` class. In iOS, they are views; and in Android, theyвҖҷre screens,
    layouts, or sometimes loosely referred to as activities.

    *   **Controls** are the individual UI elements we use to display information
    or provide selection or navigation. Xamarin.Forms calls these views, because a
    `View` is the class that controls inherit from. Certain controls are called widgets
    in Android. More on these shortly and in [Chapter 4](#A978-1-4842-0214-2_4_Chapter.html).

    *   **Layouts** are containers for controls that determine their size, placement,
    and relationship to one another. Xamarin.Forms and Android use this term, while
    in iOS everything is a view. More on this in [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html).

    *   **Lists**, typically scrollable and selectable, are one of the most important
    data display and selection tools in the mobile UI. More on these in [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html).

    *   **Navigation** provides the user with a way to traverse the app by using menus,
    tabs, toolbars, lists, tappable icons, and the up and back buttons. More on this
    in [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).

    *   **Modals, dialog boxes, and alerts** are usually popup screens that provide
    information and require some response from the user. More on these in [Chapter
    6](#A978-1-4842-0214-2_6_Chapter.html).


    Now that we have context and some terminology to work with, letвҖҷs get started
    with Xamarin.Forms!'
  raw: '### Windows Phone SDK


    The Windows Phone SDK is a C# library with a built-in .NET API. Screens are defined
    by `Frame` classes that handle navigation and contain pages, loaded and unloaded
    like conventional views. Within these are layout containers called panels, such
    as `Canvas` for absolute positioning, and `StackPanel` and `Grid` for relative
    layout with autosizing. There are familiar controls such as `TextBox` for editing
    and `TextBlock` for labels, and `Button`, `Image`, and `MediaElement` for videos
    and music. For lists there is `LongListSelector` and the older `ListBox`. We build
    the UI using C#, XAML, Blend, and/or the Visual Studio UI designer.


    Tip


    Because the Windows Phone SDK is already using C# and .NET, the Xamarin platform
    is not necessary to code a Windows Phone app in C#. Cross-platform development
    is the primary consideration that brings Xamarin together with Windows Phone:
    A Xamarin.Forms app can run on a Windows Phone.


    Xamarin.Forms currently supports Windows Phone Silverlight, WinRT and Windows
    Store support have been announced.


    ## Choosing Xamarin.Forms or a Platform-Specific UI


    As developers, we are faced with this decision:


    Which do I use, Xamarin.Forms or a Xamarin platform-specific UI?


    The trade-off is portability of Xamarin.Forms versus the full-featured functionality
    of XamarinвҖҷs platform-specific UIs, namely Xamarin.Android and Xamarin.iOS. At
    the time of this writing, the platform-specific Xamarin APIs have considerably
    more features than Xamarin.Forms. The answer to our question will range from one,
    to the other, to both, depending on your needs. Here are suggested guidelines:


    Use Xamarin.Forms for the following:


    *   Learning Xamarin: If youвҖҷre new to mobile development using C# then Xamarin.Forms
    is a great way to get started!

    *   Cross-platform scaffolding: When building cross-platform apps, Xamarin.Forms
    is useful to build out the scaffolding of your app, as a rapid-application development
    toolset.

    *   Basic Business Apps: Xamarin.Forms does these things well: basic data display,
    navigation, and data entry. This is a good fit for many business apps.

    *   Basic design: Xamarin.Forms provides controls with baseline design features,
    facilitating basic visual formatting.

    *   Simple cross-platform screens: Xamarin.Forms is great for creating fully functional
    basic screens. For more complex screens, leverage Xamarin.Forms custom renderers
    for platform-specific details.


    Use a platform-specific UI (Xamarin.iOS or Xamarin.Android) for:


    *   Complex screens: When an entire screen (or an entire app) requires a nuanced
    and complex design and UI approach, and Xamarin.Forms isnвҖҷt quite up to the task,
    go with a platform-specific UI using Xamarin.Android and Xamarin.iOS.

    *   Consumer Apps: Platform-specific UI has everything a developer needs to create
    a consumer app with complex visual design, nuanced gesture sensitivity, and high-end
    graphics and animation.

    *   High-design: This approach provides complete native UI APIs with low-level
    access to design properties on each control, allowing for a high visual standard
    of design. Native animation and graphics are also available with this approach.

    *   Single-platform apps: If youвҖҷre building for only one platform, and a cross-platform
    approach for your app is not important in the foreseeable future (a rare case
    even if youвҖҷre starting with one platform), consider using a platform-specific
    UI.

    *   Unsupported platforms: Mac OS X, Windows Store, and WinRT apps are not currently
    supported by Xamarin.Forms at this time.


    However, Xamarin moves fast, and these recommendations are likely to change. HereвҖҷs
    how: With each new release of Xamarin.Forms, more properties and methods will
    be included in the bindings, bringing this library closer to the platform-specific
    ones and giving us increased control over our cross-platform UI. Also, third-party
    vendors and open source projects such as Xamarin Forms Labs are swiftly extending
    the options available with added controls, charts, and datagrids. Currently, there
    is no visual designer for Xamarin.Forms, but I expect there will be one soon.


    When complex tasks or high design are required by Xamarin.Forms, virtually anything
    is possible using Custom Renderers.


    ### Use Both Approaches with Custom Renderers


    Custom Renderers provide access to the lower-level, platform-specific, screen-rendering
    classes called Renderers, which use platform-specific controls to create all Xamarin.Forms
    screens. Any Xamarin.Forms screen can be broken into platform-specific screens
    and classes using this approach. This means we can write a Xamarin.Forms page
    or app, and customize it by platform whenever necessary. More about this in [Chapter
    8](#A978-1-4842-0214-2_8_Chapter.html).


    Use Custom Renderers sparingly, or risk a fragmented UI code base that probably
    should have been written entirely as a platform-specific UI.


    In each of the following chapters, we will explore the Xamarin.Forms options and
    then examine platform-specific implementations of the same functionality. You
    will be able to see how they compare at the time of this writing and how to use
    them together using custom renderers. As time marches on, Xamarin.Forms may progress
    from a scaffolding technology to fully featured building blocks for cross-platform
    apps. If it does not, or until it does, the platform-specific approach will remain
    necessary to build highly functional apps without heavy reliance on Xamarin.Forms
    custom renderers.


    YesterdayвҖҷs award-winning Xamarin apps were created using the platform-specific
    approach, but the key question is, What will you create today?


    LetвҖҷs explore the building blocks of the C# mobile user interface.


    ## Exploring the Elements of Mobile UIs


