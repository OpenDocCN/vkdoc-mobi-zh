- fmt: '# Mobile Development Using Xamarin


    Mobile development in C# is unlike anything most of us have done with the language
    before. We are using it to develop apps for non-Windows platforms, namely Android
    and iOS. This is both an opportunity and a challenge. The opportunity is to expose
    ourselves to the rich breadth of technology that comprises the new business application
    ecosystem made up of phones and tablets of different platforms and sizes. The
    challenge is that so much about these devices and platforms is new to many of
    us, and there is much to learn. Of course, we can build Windows Phone and tablet
    apps in C# also. The essence of cross-platform development is building apps that
    will work on more than one mobile operating system: for example, on Android and
    iOS; or on iOS and Windows Phone; or on iOS, Android, and Windows Phone. Using
    the cross-platform techniques covered in this book, you will be equipped to develop
    for all the major mobile platforms!


    The most exciting/terrifying part of this journey is learning the ins and outs
    of several operating systems. Lucky for us, Xamarin shields us from many of the
    details, wrapping platform-specific APIs and exposing familiar .NET using C#.
    Conversely, exposed to us in detail are C#-wrapped user interface (UI) APIs for
    each platform, giving us precise control over the visual design of our app. The
    trick is to understand which aspects of each operating system are important during
    development and which can be left up to Xamarin. Although it never hurts to delve
    deeper in our understanding, there are only so many hours in a day, and the bottom
    line is that we need to ship working software.


    These are the key questions: How do we approach the development of a cross-platform
    mobile application? Given the history and background that we already have in C#
    development, how do we carry forward this knowledge and leverage it in the mobile
    space? Finally, given the multitude of things to learn about these operating systems,
    what do we need to get started and help solve the important challenges?


    While writing apps for more than one platform, a key goal is the reuse of code.
    The more we reuse, the quicker and cheaper our projects become, and the more we
    lower our maintenance costs. Xamarin refers to this as the unicorn of mobile development:
    write once, deploy anywhere. Any quest for a unicorn begins with a fair maiden
    to entice it to appear. Our fair maiden is cross-platform design.


    LetвҖҷs explore how Xamarin helps us solve our mobile puzzles while pursuing cross-platform
    design.


    ## What Is Xamarin?


    Xamarin is a development platform that allows us to code native, cross-platform
    iOS, Android, and Windows Phone apps in C#.


    How does it do that? Read on.


    ### Wrapped Native APIs


    Descended from the open source Mono Project that brought .NET to Linux, the Xamarin
    platform is a port of .NET to the iOS and Android operating systems with support
    for Windows Phone (see Figure 1-1). Underlying `Xamarin.Android` is Mono for Android,
    and beneath `Xamarin.iOS` is `MonoTouch`. These are C# bindings to the native
    Android and iOS APIs for development on mobile and tablet devices. This gives
    us the power of the Android and iOS user interface, notifications, graphics, animation,
    and phone features such as location and cameraвҖ”all using C#. Each new release
    of the Android and iOS operating systems are matched by a new Xamarin release
    that includes bindings to their new APIs. XamarinвҖҷs port of .NET includes features
    such as data types, generics, garbage collection, Language-Integrated Query (LINQ),
    asynchronous programming patterns, delegates, and a subset of Windows Communication
    Foundation (WCF). Libraries are managed with a linker to include only the referenced
    components. `Xamarin.Forms` is a layer on top of the other UI bindings and the
    Windows Phone API, which provides a fully cross-platform UI library.


    ![A978-1-4842-0214-2_1_Fig1_HTML.jpg](A978-1-4842-0214-2_1_Fig1_HTML.jpg)


    Figure 1-1. Xamarin C# libraries bind to native OS SDKs as well as .NET


    So we have a .NET environment with iOS and Android C#-bound libraries with support
    for Windows Phone running on the mobile OS of our choice. Fantastic. Now how do
    we build UIs and write code using these libraries to build mobile apps? By using
    development environments and UI designers, of course.


    ### Development Environments


    Xamarin provides development environments and designers to help us build mobile
    apps on Windows or Mac. The two main choices for Xamarin development environments
    are Xamarin Studio on Mac or Windows, or Visual Studio on Windows with the Xamarin
    for Windows plug-in. A Mac is always required for the compilation of iOS apps,
    even if Visual Studio is used as the development environment.


    ### UI Designers


    The tools we use to create mobile user interfaces are called designers. These
    generate Extensible Markup Language (XML) files in their respective proprietary
    file formats. Two designers are available from Xamarin:


    - Xamarin Designer for Android

    - Xamarin Designer for iOS


    With the availability of these designers, the need for the original, native XML
    editors has diminished. Anything you might need to build Android or iOS UIs can
    be found in XamarinвҖҷs tools. However, iOS developers still frequently use the
    Xcode Interface Builder, and Android developers (less frequently) use XML editors
    such as the Android Development Tools (ADT) plug-in for Eclipse. An XML layout
    is an XML layout, and the tool is largely a matter of taste and personal preference,
    even the decision to use a designer tool at all. Some Xamarin developers are opting
    to code UIs by hand in C# for all platforms with no designer use whatsoever. I
    recommend the designers to help learn the file formats, UI elements, and their
    properties. At the very least, use a designer tool like training wheels until
    youвҖҷre ready to ride freestyle.


    > **Note:** This book focuses on code rather than tools. Refer to the Xamarin
    online docs for more information on the designers and development environments
    at [http://developer.xamarin.com](http://developer.xamarin.com).


    ## WhatвҖҷs Old: Familiar C# and .NET Techniques


    Xamarin development allows us to leverage many things that we already know about
    C# development. We can use our high-level knowledge of the following:


    - HTML-based pages

    - Extensible Application Markup Language (XAML)

    - UI controls

    - Event-driven logic

    - View life cycles

    - State management

    - Data binding

    - Web services


    We also can use many .NET-specific techniques directly and immediately, including
    these:


    - .NET data types

    - C# classes, methods, and properties

    - Lambda expressions

    - WCF (a subset)

    - Generics (a subset)

    - Local file access

    - Streams

    - Async/Await

    - ADO.NET (a subset)


    IвҖҷve named just a few, so you can see thereвҖҷs plenty of familiar ground for the
    C# developer to help us make the leap into this new territory.'
