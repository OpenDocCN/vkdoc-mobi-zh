    {"First","Second","Third"};`    В В В В В В В В В В В В `var listView = new ListView();`    В В В В В В В В В В В В `listView.ItemsSource
    = items;`    В В В В В В В В В В В В `listView.ItemTapped += async (sender, e) =>`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `await
    DisplayAlert("Tapped", e.Item.ToString() + " was selected.", "OK");`    В В В В В В В В В В В В В В В В `((ListView)sender).SelectedItem
    = null;`    В В В В В В В В В В В В `};`    В В В В В В В В В В В В `this.Padding = new Thickness(0, Device.OnPlatform(20,
    0, 0), 0, 0);`    В В В В В В В В В В В В `this.Content = listView;`    В В В В В В В В `}`    В В В В `}`  Tip  Multiple
    row selection must be coded manually and is not covered here.    A `List<String>`
    is useful for demonstration, but in many real-world scenarios we bind to a data
    model.    ### Binding to a Data Model    xamarin.forms    Binding `ListView` to
    a data model is made easy in Xamarin.Forms through the use of `ListView''s` built-in
    adapter called `ItemTemplate`. Prepare your data model class and assign it to
    the `ListView.``ItemsSource` property. Then bind each property of your model to
    the list using the `ItemTemplate.SetBinding` method.    Create a data model, or
    custom class, containing the list items. Call it `ListItem`.    В В В В `public class
    ListItem {`    В В В В В В В В `public string Title { get; set; }`    В В В В В В В В `public
    string Description { get; set; }`    В В В В `}`    Populate it and point the `ListView`вҖҷs
    `ItemsSource` property to it.    В В В В `listView.ItemsSource = new ListItem [] {`    В В В В В В В В `new
    ListItem {Title = "First", Description="1st item"},`    В В В В В В В В `new ListItem
    {Title = "Second", Description="2nd item"},`    В В В В В В В В `new ListItem {Title =
    "Third", Description="3rd item"}`    В В В В `};`    Format list rows using `ItemTemplate`.
    Create a `DataTemplate` class and pass in the cell type to display. The standard
    cell type is `TextCell`, which will display a title for each row plus some detail
    text which youвҖҷll add in a minute. Specify the property to display as the main
    row text by assigning it to the `TextProperty` of the list, in this case `Title`.    В В В В `listView.ItemTemplate
    = new DataTemplate (typeof(TextCell));`    В В В В `listView.ItemTemplate.SetBinding(TextCell.TextProperty,
