    \ Xamarin.Forms и§ЈеҶіж–№жЎҲйҖҡеёёдёәиҝҷдёүдёӘе№іеҸ°пјҲAndroidгҖҒiOS е’Ң Windows PhoneпјүеҲҶеҲ«жҸҗдҫӣдёҖдёӘеҚ•зӢ¬зҡ„йЎ№зӣ®гҖӮXamarin.Forms\
    \ йЎ№зӣ®йҖӮз”ЁдәҺе®№зәіи·Ёе№іеҸ° UIпјҢиҖҢж ёеҝғеә“йЎ№зӣ®еҲҷеҢ…еҗ«дёҡеҠЎйҖ»иҫ‘е’Ңж•°жҚ®еұӮпјҲйғҪеҸҜд»ҘжҳҜе…ұдә«йЎ№зӣ®жҲ– PCLпјүгҖӮ\n\nејҖеҸ‘иҖ…йқўдёҙзқҖ Xamarin.Forms дёҺдҪҝз”Ё\
