    for more on editable list data binding.    Among the views that can be added to
    a list row, `Buttons` require special attention due to their prevalence and unique
    qualities.    ### Adding Buttons    xamarin.forms    Buttons can be added to a
    list in one of two ways: as button views and as Context Actions. Button views
    are added to the custom template, while Context Actions appear when a row is swiped
    or long-pressed, such as for buttons hiding behind each row, which are often used
    for operations on the selected row such as deletion.  Note  `Image Views` paired
    with gesture recognizers (manually-coded image buttons) donвҖҷt return a property
    containing their list row so they arenвҖҷt useful as buttons.    #### Using Button
    Views    Add button views to your custom template during the customization of
    a `ListView`. Add the `Button View` onto a layout in a custom `ViewCell` and it
    will display on the list in every row, as shown in Figure [5-7](#A978-1-4842-0214-2_5_Chapter.html#Fig7).
    Set up a `Button.Clicked` handler using the `CommandParameter` property to determine
    which button was clicked.    ![A978-1-4842-0214-2_5_Fig7_HTML.jpg](A978-1-4842-0214-2_5_Fig7_HTML.jpg)    Figure
    5-7.  Add a Button View to a ListView  Declare a `Button` view in your custom
    `ViewCell`. Bind a period (.) to the buttonвҖҷs `CommandParameter` property to retrieve
    the clicked row.    В В В В `var button = new Button`    В В В В `{`    В В В В В В В В `Text
    = "Buy Now",`    В В В В В В В В `BackgroundColor = Color.Teal,`    В В В В В В В В `HorizontalOptions
    = LayoutOptions.EndAndExpand`    В В В В `};`    В В В В `button.SetBinding(Button.CommandParameterProperty,
    new Binding("."));`    Remember to add the Button to your custom template layout
    as discussed in the previous section.    Handling the `Clicked` event requires
