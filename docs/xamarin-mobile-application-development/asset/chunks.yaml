    Images    The Android `GridView` is a two-dimensional, scrollable, grid layout
    useful for the display and selection of images. All cells are the same size, and
    their contents are populated dynamically from an `Adapter`, like a list in grid
    form. [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html) provides more detail.    ###
    FrameLayout    android    `FrameLayout` is often used to create layered screens,
    because it allows the front-to-back ordering of views. It can also swap in and
    swap out parts of a layout dynamically by using fragments, which are explained
    in the next section.    `FrameLayout` was originally designed to create a single
    rectangular area to display a single view. However, it is typically used to achieve
    complex, layered screens because `FrameLayout` will accept multiple children and
    gives control over the view z-order (front-to-back order), placing recently added
    children on top. This is useful for effects such as HUD-like elements, sliding
    panels, and more-complex animated transitions.    Listing [3-22](#A978-1-4842-0214-2_3_Chapter.html#FPar58)
    is a simple example of a declared `FrameLayout` containing a `TextView`.  Listing
