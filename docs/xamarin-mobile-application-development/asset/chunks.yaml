- fmt: "# Prerequisites\n\nIf youвҖҷre mainly using `Xamarin.Forms`, you should be able\
    \ to pick up this book without much else in the way of background, besides some\
    \ C#. However, if you want to get serious about using `Xamarin.Android`, `Xamarin.iOS`,\
    \ or `Xamarin.Forms` custom renderers, please note the following:\n\nThis book\
    \ is not an iOS 101 primer. Although it provides some introduction to key topics\
    \ and then moves on to \"202\" material, youвҖҷll need to consult other sources\
    \ for mastery of iOS and `Xamarin.iOS` fundamentals. Consult a `Xamarin.iOS` primer\
    \ on topics such as the following:\n- Creating a `Xamarin.iOS` solution using\
    \ `Xamarin Studio` or `Visual Studio`\n- `Xcode` Interface Builder or `Xamarin\
    \ Designer for iOS`\n- Storyboards and segues\n- `UIView` and `UIViewController`\n\
    - The basic UI controls: `UILabel`, `UITextField`, `UIButton`, and `UIImageView`\n\
    - Images and screen sizes\n- Local resources\n- Gestures\n\nThis is not an Android\
    \ 101 primer. Although it provides some introduction to key topics and then moves\
    \ on to \"202\" material, youвҖҷll need to consult other sources for mastery of\
    \ Android and `Xamarin.Android` fundamentals. Consult a `Xamarin.Android` primer\
    \ on topics such as the following:\n- Creating a `Xamarin.Android` solution using\
    \ `Xamarin Studio` or `Visual Studio`\n- `Xamarin Designer for Android`\n- Activities,\
    \ XML layouts, and views\n- The activity life cycle\n- The basic UI controls:\
    \ `TextView`, `EditText`, `Button`, and `ImageView`\n- Fragments\n- Images and\
    \ screen sizes\n- Local resources\n- Gestures\n\n## WhatвҖҷs Not In This Book\n\n\
    The Xamarin platform is a monumental project, spanning technologies and APIs of\
    \ several operating systems. Writing about all of it in enough detail to be useful\
    \ would require not hundreds but thousands of pages, which means that not everything\
    \ could be addressed in one book. There is no coverage of the following:\n- Extensible\
    \ Application Markup Language (XAML) for `Xamarin.Forms` in the book proper, but\
    \ there are complete, downloadable XAML code examples.\n- Integrated development\
    \ environments (IDEs) including `Visual Studio` and `Xamarin Studio`.\n- UI Designer\
    \ tools including `Xcode` Interface Builder, `Xamarin Designer for iOS`, and `Xamarin\
    \ Designer for Android`.\n- Some introductory `Xamarin.Android` topics (see \"\
    Prerequisites\")\n- Some introductory `Xamarin.iOS` topics (see \"Prerequisites\"\
    )\n\n## Windows Phone\n\n`Xamarin.Forms` apps will run on Windows Phone. Windows\
    \ Phone projects can be built to support Silverlight or WinRT. This book was written\
    \ for Windows Phone Silverlight implementations, but much of what is written here\
    \ applies to WinRT as well (and some WinRT differences are pointed out).\n\n##\
    \ System Requirements\n\nWhether youвҖҷre developing on a Mac or Windows workstation,\
    \ you will need to download and run the Xamarin unified installer at `http://xamarin.com/download`.\
    \ This will allow you to install and configure the Xamarin platform including\
    \ the Xamarin Android SDK, Xamarin iOS SDK, `Xamarin Studio`, and XamarinвҖҷs plug-in\
    \ for `Visual Studio`, as appropriate.\n\nHere are the OS and software requirements\
    \ for Xamarin development.\n\n### Mac\n\nThese requirements must be met to build\
    \ Xamarin apps on a Mac.\n- `Xamarin Studio 5+` is required to use `Xamarin.Forms`\
    \ on OS X.\n- To develop iOS apps:\n  - Latest `Xcode` version\n  - Mac OS X 10.9.3+\
    \ (Mavericks) or 10.10+\n- Windows Phone apps cannot be developed on a Mac.\n\n\
    ### Windows\n\nThese requirements must be met to build Xamarin apps on a Windows\
    \ workstation.\n- Latest `Xamarin Studio` or `Visual Studio 2012+` (not Express)\n\
    - Windows 7+\n- For iOS development, a networked Mac is required.\n- For Windows\
    \ Phone development, youвҖҷll need the Windows Phone SDK.\n- To use PCLs, youвҖҷll\
    \ need `Visual Studio 2013+` or the Portable Reference Library Assemblies 4.6.\
    \ For PCLs using `Xamarin Studio` without `Visual Studio`, download the Portable\
    \ Library Tools 2.\n\n### Xamarin.Forms\n\nTo use `Xamarin.Forms`, your app builds\
    \ must target the following platforms.\n- iOS 6.1+\n- Android 4.0+\n- Windows\
    \ Phone 8 (at the time of this writing, and newer versions later)\n\n## Errata\n\
    \nThe author, the technical reviewers, and many Apress staff have made every effort\
    \ to find and eliminate all errors from this bookвҖҷs text and code. Even so, there\
    \ are bound to be one or two glitches left. To keep you informed, thereвҖҷs an Errata\
    \ tab on the Apress book page (`www.apress.com/9781484202159`). If you find any\
    \ errors that havenвҖҷt already been reported, such as misspellings or faulty code,\
    \ please let us know by e-mailing `support@apress.com`.\n\n## Customer Support\n\
    \nApress wants to hear what you thinkвҖ”what you liked, what you didnвҖҷt like, and\
    \ what you think could be done better next time. You can send comments to `feedback@apress.com`.\
    \ Be sure to mention the book title in your message.\n\n## Contacting the Author\n\
    \nYou can follow me on Twitter at `@lexiconsystems`, read my blog at `www.mobilecsharpcafe.com`,\
    \ or e-mail me at `dan@lexiconsystemsinc.com`.\n\nIf you are seeking general Xamarin\
    \ product support, please use the Xamarin support page at `http://xamarin.com/support`\
    \ or the Xamarin forums at `http://forums.xamarin.com/`."
