    third-party alternatives to using `DependencyService` and to coding your own DI
    implementation.    ### Third-Party and Open Source DI Containers    A number of
    useful third-party and open source DI containers exist to help you do Dependency
    Injection. Here are a few of them used by many developers:    *   [TinyIoC](https://github.com/grumpydev/TinyIoC)
    : Simple open source IoC solution *   Unity : MicrosoftвҖҷs DI solution *   [AutoFac](http://autofac.org/)
    : Another useful open source IoC solution  Tip  Dependency Injection (DI) is a
    subset of the Inversion of Control (IoC) design principle.    When more flexibility
    is required in the shared code than a PCL affords, a Shared Project can be useful.    ##
    Shared Projects    Shared Projects contain shared code that can be recompiled
    into different applications (in the same solution or in different ones). Like
    the PCL, this is where a core library or Xamarin.Forms project can be housed for
    use in different platform contexts. The Shared Project is particularly useful
    when it is used by a single developer, as it produces only a shareable code project,
    not a DLL.    Create a Shared Project in Visual Studio by navigating to File вһӨ
    New Solution and choosing a name for the project and solution. In Xamarin Studio,
    navigate to File вһӨ New Solution and choose a name.  Tip  The [Shared Project](http://developer.xamarin.com/guides/cross-platform/application_fundamentals/shared_projects/)
    solution template requires Visual Studio 2013 Update 2 (or Xamarin Studio).    There
    are many techniques available for handling divergence in Shared Projects: Dependency
    Injection (DI), conditional compilation, file linking, partial classes, and partial
    methods. IвҖҷve already discussed DI, so letвҖҷs look at the rest of these common
    approaches:    *   Conditional compilation: Compiler directives for small, code-level
    amounts of divergence *   File linking: Project file include for file or class-sized
    levels of divergence *   Partial classes: Using the `partial` keyword for class
    divergence *   Partial method: Using the `partial` keyword for method divergence    These
    approaches can be used loosely, as needed, without much structure. Use them carefully,
    because implementations of any of them can become an anti-pattern, tightly linking
    cross-platform and platform-specific classes without proper organization.    An
    architecturally disciplined approach might instead use the Strategy pattern with
    the Bridge pattern. The Strategy pattern encapsulates the various platform behaviors
    in a class to abstract away the platform-specific implementations. The Bridge
    pattern is used to decouple the class or method declarations in the shared code
    from the platform-specific implementations using an interface, abstract classes,
    or inheritance. You can also use DI, as discussed earlier.    LetвҖҷs look at each
    of the techniques in turn, starting with conditional compilation. The Shared Project
    is an ideal place to put code that requires slight variations between platforms
    using conditional compilation.    ### Conditional Compilation    When shared code
    requires slight platform-specific variations (that cannot be accounted for using
    the Xamarin.Forms `OnDevice` command), you can create compiler directives that
    compile code conditionally by platform. This is a useful way to inject small pieces
    of platform code into an otherwise shared block of code. This is a way to handle
    divergence at the smallest granularity: line-by-line.    Xamarin solution templates
    predefine three compilation symbols: `__IOS__`, `__ANDROID__`, and `__MOBILE__`
    (two underscores before and after each term). Use these compilation symbols with
    the `#if/#endif` compiler directives to include and exclude code based on the
    project platform.    Specify an iOS-specific block of code using `#if __IOS__`.    В В В В `#if
    __IOS__`    В В В В `// iOS-specific code`    В В В В `#endif`    Specify Android using
    `#if __ANDROID__`.    В В В В `#if __ANDROID__`    В В В В `// Android-specific code`    В В В В `#endif`    Specify
    either iOS or Android using `#if __MOBILE__`.    В В В В `#if __MOBILE__`    В В В В `//
    iOS or Android-specific code`    В В В В `#endif`    Android API level can also be
    specified in the conditional. This is a way to manage platform-version divergence.    В В В В `#if
    __ANDROID_22__`    В В В В `// code for Android API 22 or newer`    В В В В `#endif`    Conditional
    compilation is useful for platform-specific exceptions in a cross-platform class.
    If there are too many exceptions, you should divide your features into platform-specific
    implementations and put them into their respective projects, that is, in the Xamarin.iOS
    project. You can do this in an architecturally sound manner by using interfaces
    to define the feature set before creating platform-specific implementations using
    the Strategy and/or Bridge pattern (or DI).    ### File Linking    You can bring
    individual files into projects from other projects using file linking. This can
    be used to bring platform-specific implementations into Shared Projects or shared
    code into platform-specific projects.    Simply right-click a project and choose
    Add (in Xamarin Studio) or Add Files (in Visual Studio). Pick the desired file
    or folder and choose Link when prompted to virtually include it in your current
    project.    A common use of file linking is for small or prototype platform-specific
    apps where a lightweight alternative to a core library is needed. You can put
    all of your shared files (business logic, data access, utilities, and so on) into
    a single project (such as the Android or Xamarin.Forms projects), and then link
    to those files from the other platform-specific projects (such as the iOS and/or
    Windows Phone projects). File linking instead of a core library is a quick and
    dirty approach that probably shouldnвҖҷt be used on enterprise-grade or team projects.  Tip  Overuse
    of bottom-up, fine-grained approaches such as file linking and conditional compilation
    can lead to architecturally undisciplined code, so consider your top-down alternatives
    first (like PCLs and Shared Projects).    ### Partial Classes and Methods    Partial
    classes are useful for extending a shared, cross-platform class with platform-specific
    functionality. Partial methods are useful for implementing platform-specific functionality
    at the method level, though without a base cross-platform implementation. These
    techniques work in Shared Projects and linked files, but not PCLs.    Create a
    partial class in your Shared Project.    В В В В `public partial class Utility`    В В В В `{`    В В В В В В В В `public
    void DoCrossPlatformThing()`    В В В В В В В В `{`    В В В В В В В В `}`    В В В В `}`    Then
    extend that class in your platform-specific project.    В В В В `public partial class
    Utility`    В В В В `{`    В В В В В В В В `public void DoPlatformSpecificThing()`    В В В В В В В В `{`    В В В В В В В В `}`    В В В В В `}`    Partial
    methods are similar to partial classes, although they donвҖҷt provide a cross-platform
    implementation, only a platform-specific one.    Define a partial method in your
    Shared Project, but do not provide an implementation.    В В В В `partial void DoThing();`    Then
    implement that method in your platform-specific projects.    В В В В `partial void
    DoThing()`    В В В В `{`    В В В В `}`    Partial classes are a common method for architecting
    for divergence in Shared Projects and linked files. Divergence isnвҖҷt just for
    platforms, though; it happens with OS versions as well.    ## Handling Version
    Divergence    As new releases of mobile OSs take place and new devices are released,
    changes such as screen size and feature deprecation must be accounted for. Old
    features must be gracefully deprecated and new features are eagerly embraced.
    All this can happen on a single platform, such as iOS or Android, creating a process
    called version divergence.    In order to account for this type of divergence,
    your apps must be aware of the active OS version in certain situations and respond
    accordingly. This requires version detection. Here are a few ways to do that.    On
    Android, you can use the following:    В В В В `if (((int)Android.OS.Build.Version.SdkInt)
    >= 22)`    В В В В `{`    В В В В В В `// code for Android API 22 or newer`    В В В В `}`    And
    when using conditional compilation, there is an option on Android.    В В В В `#if
    __ANDROID_22__`    В В В В В В `// code for Android API 22 or newer`    В В В В `#endif`    On
    iOS, you use `CheckSystemVersion`.    В В В В `if (UIDevice.CurrentDevice.CheckSystemVersion(8,
    0))`    В В В В `{`    В В В В В В `// code for iOS version 8.0 or newer`    В В В В `}`    Those
    are some techniques for handling OS version divergence. Remember to gracefully
    degrade deprecated functions and provide a lowest-common denominator functionality
    when necessary.    ## Summary    After youвҖҷve decided whether youвҖҷre going with
    Xamarin.Forms or a platform-specific approach, you need to craft an architecture.
    Split your cross-platform apps into two types of code: shared and platform-specific.
    Divide your app into these two groups starting with the largest divisions and
    working down toward the smaller ones.    A core library is useful in a professional-grade
    Xamarin app for holding your BLL, DAL, utilities, interfaces, and other back-end,
    non-UI, cross-platform classes.    Platform-specific code should go into its respective
    platform-specific projectsвҖ”into a Xamarin.Android project, for example. Custom
    renderers in Xamarin.Forms projects are placed in these platform-specific projects.    Cross-platform
    projects include Xamarin.Forms projects and core libraries. These are typically
    built using Portable Class Libraries (PCL) or Shared Projects. PCLs result in
    pre-compiled cross-platform DLLs, which are ideal for sharing between developers.
    Shared Projects produce shared code projects designed to be recompiled for each
    platform and are generally more useful for a single developer.    Plenty of cross-platform
    classes call for platform-specific code and the decision must be made as to how
    to handle these exceptions. Granularities that are smaller than an entire project
    require special treatment in the handling of shared versus platform-specific code.
    Useful design principles include Dependency Injection (DI) and Inversion of Control
    (IoC). Useful design patterns include the Provider, Strategy, and Bridge patterns.    When
    using cross-platform PCLs, Dependency Injection (DI) is the platform-specific
    weapon of choice, and Xamarin.Forms provides a handy `DependencyService` class
    for easy DI implementation. Because Shared Projects are more tightly coupled to
    platform-specific projects than PCLs and must be recompiled per platform, they
    afford more options, including DI, conditional compilation, partial classes and
    methods, and file linking. These techniques can be used to create loosely-constructed
    explicit implementations of platform-specific tasks, so be on the lookout for
    anti-patterns when using Shared Projects.    Those are the fundamental principles,
    patterns, and divergence-handling techniques in Xamarin mobile app architecture.
    I hope you find everything you need here to go forth and build!    # The Art of
    Xamarin App Development    вҖңThe Latin phrase Gradus ad Parnassum means вҖңSteps
    to Parnassus.вҖқ The name Parnassus was used to denote the loftiest part of a mountain
    range in central Greece, a few miles north of Delphi, of which the two summits,
    in Classical times, were called Tithorea and Lycoreia. In Greek mythology, one
    of the peaks was sacred to Apollo and the nine Muses, the inspiring deities of
    the arts, and the other to Dionysus. The phrase has often been used to refer to
    various books of instruction, or guides, in which gradual progress in literature,
    language instruction, music, or the arts in general, is sought.вҖқ    Wikipedia
    entry for вҖңGradus ad ParnassumвҖқ    For many of us, software development is a calling
    as well as a vocation. We labor to create things of beauty even as we deliver
    functional code. In this way, Xamarin mobile application development is an art
    form.    Respectable art forms require tremendous dedication and skill to master.
    Step-by-step, we practice each little technique and seek to comprehend minor concepts
    until we incorporate them into our repertoire, then on to more complex techniques
    and loftier concepts, and on and on as we ascend each step up the mountain of
    mastery.    The notion that we are pursuing knowledge and skill in our ascent
    toward mist-veiled peaks is a very old one, as evidenced by the reference to Parnassus,
    the home of the Muses. While climbing, we might not expect to reach the summit,
    but along the way we become more knowledgeable and more skilled developers and
    architects, and we afford ourselves the opportunity to build better mobile apps.
    There is also the simple pleasure of the climb, and the stopping now and again
    to enjoy the view.    The first steps toward mastery of the Xamarin platform involve
    creating basic solutions in Xamarin.Forms, Xamarin.iOS, and Xamarin.Android. Next,
    we must explore the mobile UI using layouts, building screens using views, and
    placing them in relation to one another. Data-bound lists are the mainstay of
    the mobile app data UI, so we need to understand how to bind lists to our data
    models and customize the look and feel of the list. Our users must move between
    screens and this requires navigation, during which we must manage state. Displaying
    and editing data is the purpose of many apps, so data access and binding are a
    necessity. The catalyzing technique in Xamarin.Forms UI is the custom renderer,
    which allows us to customize our cross-platform views by using the platform-specific
    libraries. Lastly, we must understand cross-platform architecture in order to
    manage the use of shared and platform-specific code.    Those are the steps in
    this book, which was crafted with the intent of giving you most of what you require
    most of the time while building your apps, with emphasis on C# and the mobile
    UI.    I sincerely hope that I have helped you to climb just a bit closer to the
    peaks most important to you and to write your next Xamarin killer app.  Index
