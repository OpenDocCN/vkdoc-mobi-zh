    ## ж‘ҳиҰҒ


    д»ҘдёҠе°ұжҳҜејҖе§Ӣйҳ…иҜ»жң¬д№ҰжүҖйңҖдәҶи§Јзҡ„е…ЁйғЁеҶ…е®№пјҡзӣ®еҪ•гҖҒйў„еӨҮзҹҘиҜҶгҖҒе…ҚиҙЈеЈ°жҳҺгҖҒеӯҰд№ и·Ҝеҫ„гҖҒең°еӣҫе’Ңи·Ҝж ҮгҖӮеҰӮжһңдҪ еҲҡжҺҘи§Ұ Xamarin е№іеҸ°пјҢж¬ўиҝҺеҠ е…ҘзӨҫеҢәпјҒеҰӮжһңдҪ еҜ№ Xamarin
    е·Іжңүз»ҸйӘҢпјҢж„ҹи°ўдҪ зҡ„йҳ…иҜ»пјҢжң¬д№ҰеҗҢж ·дјҡдёәдҪ жҸҗдҫӣдё°еҜҢзҡ„еҶ…е®№гҖӮ


    жҲ‘еҗ‘дҪ дҝқиҜҒпјҢйҳ…иҜ»жң¬д№ҰгҖҒзҗҶи§Је…¶дёӯзҡ„жҰӮеҝөе№¶з»ғд№ д№Ұдёӯзҡ„д»Јз ҒжҠҖе·§пјҢе°ҶжҸҗеҚҮдҪ еҜ№ Xamarin зҡ„йўҶжӮҹеҠӣпјҢе№¶е°ҶдҪ зҡ„зј–зЁӢжҠҖиғҪжҺЁеҗ‘ж–°зҡ„й«ҳеәҰгҖӮжҲ‘д№ҹеёҢжңӣи®©дҪ еҜ№ Xamarin
    е№іеҸ°иҝҷдёҖд»ӨдәәжғҠеҸ№зҡ„жҲҗе°ұдә§з”ҹжӣҙж·ұеҲ»зҡ„зҗҶи§ЈгҖӮ


    ## иҮҙи°ў


    з»„е»әдёҖзҫӨиҒӘжҳҺдё”дё“жіЁзҡ„дәәпјҢжҳҜе®ҢжҲҗеӨ§дәӢзҡ„еҘҪж–№жі•гҖӮжңүдәәз§°д№ӢдёәйӣҶдҪ“жҲ–жҷәеӣҠеӣўпјҢд№ҹжңүдәәз§°д№ӢдёәејҖжәҗзІҫзҘһгҖӮеңЁжӯӨпјҢжҲ‘жғідёҺеӨ§е®¶еҲҶдә«жң¬д№Ұзҡ„еҲӣдҪңеӣўйҳҹпјҢе№¶е…¬ејҖж„ҹи°ўд»–д»¬гҖӮ


    James DeWolfпјҢжҲ‘еңЁ Apress еҮәзүҲзӨҫзҡ„й«ҳзә§зј–иҫ‘пјҢжҳҜжҲ‘жүҖи§ҒиҝҮзҡ„д»»дҪ•йўҶеҹҹдёӯжңҖжқ°еҮәзҡ„йўҶеҜјиҖ…д№ӢдёҖгҖӮж„ҹи°ўдҪ пјҢJimпјҢж„ҹи°ўдҪ з»ҷдәҲжҲ‘иҝҷж¬ЎжңәдјҡпјҢд»ҘеҸҠдҪ е§Ӣз»ҲеҰӮдёҖдё”жҒ°еҲ°еҘҪеӨ„зҡ„и·ҹиҝӣгҖӮAnne
    Marie WalkerпјҢдҪ зҡ„жҜҸдёҖж¬ЎеҶ…е®№зј–иҫ‘дёҚд»…и®©жң¬д№ҰеҸҳеҫ—жӣҙеҘҪпјҢд№ҹж•ҷдјҡдәҶжҲ‘еҰӮдҪ•еҶҷдҪңгҖӮMelissa MaldonadoпјҢж„ҹи°ўдҪ еҜ№жҲ‘дј—еӨҡзү№ж®ҠиҰҒжұӮзҡ„иҖҗеҝғпјҢж„ҹи°ўдҪ зЎ®дҝқдёҖеҲҮжҢүж—¶жҺЁиҝӣпјҢе№¶жңҖз»Ҳи®©жң¬д№ҰйЎәеҲ©еҮәзүҲгҖӮеҗҢж—¶пјҢд№ҹж„ҹи°ў
    Apress еҮәзүҲзӨҫжүҖжңүе…¶д»–зј–иҫ‘гҖҒжҺ’зүҲдәәе‘ҳеҸҠе·ҘдҪңдәәе‘ҳгҖӮ


    зү№еҲ«ж„ҹи°ўжҠҖжңҜе®Ўйҳ…иҖ…е…ј Xamarin MVP зҡ„ Ed SniderпјҢж„ҹи°ўдҪ д»”з»Ҷе®Ўйҳ…дәҶжҜҸдёҖдёӘд»Јз ҒзӨәдҫӢе№¶жҸҗеҮәдәҶзқҝжҷәзҡ„е»әи®®гҖӮжӯЈеӣ дёәжңүдҪ пјҢжң¬д№ҰжүҚеҸҳеҫ—еҘҪеҫ—еӨҡгҖӮеҰӮжһңд№Ұдёӯд»Қжңүд»»дҪ•й”ҷиҜҜпјҢйӮЈдёҖе®ҡжҳҜжҲ‘еңЁдҪ е®Ўйҳ…д№ӢеҗҺеҒ·еҒ·еҠ иҝӣеҺ»зҡ„гҖӮ


    жң¬д№ҰеҢ…еҗ« 200 еӨҡдёӘ C# д»Јз ҒзӨәдҫӢгҖӮжүҖжңү UI зӨәдҫӢд№ҹеқҮз”Ё XAML жһ„е»әпјҢе№¶жҸҗдҫӣдёӢиҪҪгҖӮйқһеёёж„ҹи°ў XAML ејҖеҸ‘иҖ… Jason Awbrey е’Ң Alex
    Blount дҝғжҲҗдәҶиҝҷдёҖеҲҮгҖӮ


    Xamarin еӣўйҳҹзҡ„жҲҗе‘ҳд»¬з§ҜжһҒд№җи§ӮгҖҒжүҚеҚҺжЁӘжәўпјҢе№¶дё”еңЁеҗ„дёӘж–№йқўйғҪз»ҷдәҲдәҶжһҒеӨ§зҡ„её®еҠ©гҖӮд»–д»¬дёҚд»…дёәжҲ‘д»¬еёҰжқҘдәҶеҮәиүІзҡ„дә§е“ҒеҘ—д»¶пјҢд№ҹжҜҸеӨ©йғҪеҗ‘жҲ‘д»¬дј йҖ’з§ҜжһҒеҗ‘дёҠзҡ„жҖҒеәҰгҖӮж„ҹи°ў
    Mike BluesteinпјҢдҪ ејәи°ғдәҶ Xamarin.iOS е’Ң Xamarin.Android зҡ„йҮҚиҰҒжҖ§пјӣж„ҹи°ў Bryan CostanichпјҢдҪ жҢҮеҮә
    Xamarin.Forms жҳҜжңӘжқҘзҡ„ж–№еҗ‘вҖ”вҖ”жҲ‘йҮҮзәідәҶдҪ д»¬дәҢдәәзҡ„е»әи®®гҖӮJason SmithпјҢдҪңдёә Xamarin.Forms зҡ„жҠҖжңҜиҙҹиҙЈдәәпјҢдёҺдҪ еңЁдәҡзү№е…°еӨ§
    Evolve еӨ§дјҡе…ұиҝӣеҚҲйӨҗзҡ„з»ҸеҺҶпјҢдёәжң¬д№ҰжҸҗдҫӣдәҶжҳҺзЎ®зҡ„з„ҰзӮ№е’ҢжүҺе®һзҡ„еҹәзЎҖгҖӮж„ҹи°ў Joseph Hill зҡ„е»әи®®е’Ңйј“еҠұгҖӮж„ҹи°ў Spencer MontgomeryгҖҒErik
    Polzin е’Ң Matt Mason дҪңдёәеҗҲдҪңдјҷдјҙзҡ„ж”ҜжҢҒгҖӮж„ҹи°ў James MontemagnoгҖҒMark SmithгҖҒPierce Boggan д»ҘеҸҠи®ёеӨҡе…¶д»–дәәгҖӮ


