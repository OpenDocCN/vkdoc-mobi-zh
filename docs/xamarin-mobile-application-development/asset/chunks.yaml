    your implementation of `INotifyPropertyChanged`, your app can now notify the UI
    when data has changed, and Xamarin.Forms will refresh the UI. By creating a class
    that serves data to a particular view (`TitleViewModel`), you have just created
    a view model.    ### Understanding ViewModels and MVVM    A ViewModel (the VM
    in MVVM) is a class built to serve data to a particular screen by using one or
    more models (the M in MVVM, or data models). The ViewModel is decorated with view-specific
    properties and bound to the view (the V in MVVM, referring to the presentation
    layer, or UI, not to be confused with a Xamarin.Forms `View` class). A ViewModel
    is like a data model except that it is customized to a particular view (or screen)
    by using helper classes and handler events necessary to populate the data on that
    page or manage changes to the data model. In a traditional MVVM app, you create
    a view model for each view (screen), imbuing your view model with the constructors
    and helper methods needed to serve up and save data on each screen.    MVVM apps
    typically use data models (not just a few variables added as properties to a view
    model). This requires wrapping the data models within the view models with the
    notion that views should not use models directly but should interact only with
    view models.    ### Binding to ViewModels and Data Models    ViewModels can implement
    `INotifyPropertyChanged`, as discussed earlier, but data models can also implement
    `INotifyPropertyChanged`. These are the two standard approaches for implementing
    `INotifyPropertyChanged` for nontrivial data binding, in order of popularity.
    There are heated arguments for why one or the other is the only way to do things,
    but IвҖҷll show you both ways and let you decide. IвҖҷll also show a third way that
    avoids some of the problems of the other two:    *   Create a view model that
    implements `INotifyPropertyChanged`. Inherit from `INotifyPropertyChanged` and
    encapsulate the necessary variables and data models within your view model class
    and, within each editable property `Set` accessor, raise the `OnPropertyChanged`
    event. This approach is strict MVVM. *   Implement `INotifyPropertyChanged` in
    your data model. Every time you use your model in a data-binding context, it will
    be ready for nontrivial binding and provide notifications to the bound UI via
    its `OnPropertyChanged` events. *   Wrap your data model in an observable class.
    More on this in a moment.    The first two approaches are functionally similar
    but architecturally different.    The first approach, creating a view model that
    implements `INotifyPropertyChanged`, means including an instance of the data model
    in the view model and wrapping the top-level model class as a property as well
    as all of the data modelвҖҷs properties that must be exposed in the view model.
    This gives complete control to the view for instantiating, assigning, and changing
    the encapsulated data model and all of its relevant properties. If the view model
    implements `INotifyPropertyChanged`, and `OnPropertyChanged` is called in the
    `Set` method of each public property, this class can provide nontrivial binding.
    (See Listing [7-6](#A978-1-4842-0214-2_7_Chapter.html#FPar12).)    The second
    approach to implementing `INotifyPropertyChanged` happens in your data model even
    before you use it in the view model. See Listing [7-7](#A978-1-4842-0214-2_7_Chapter.html#FPar13)
    for an example of implementing `INotifyPropertyChanged` in the `Item` class to
    create an observable collection of items. For MVVM apps, this approach still requires
    the extra step of embedding the resulting data model in a view model.    Some
    developers donвҖҷt like the first approach because it can lead to code duplication
    with multiple `INotifyPropertyChanged` implementations of the same properties
    in different view models, and some developers donвҖҷt like the second approach because
    it clutters up the data model.    A third approach avoids both of those problems,
    and that is to wrap your data model in a class that implements `INotifyPropertyChanged`
    to make it observable (at the cost of creating yet another subclass). This is
    done for us in .NET for classes such as `ObservableCollection`, and youвҖҷll do
    it in a moment for your `Item` model to create an `ObservableItem`. ItвҖҷs a little
    extra work but keeps your models clean. WeвҖҷll get to the third approach in the
    section вҖңBinding an Editable `ListView`,вҖқ in Listing [7-10](#A978-1-4842-0214-2_7_Chapter.html#FPar18).    Here
    are examples of each of the first two approaches:    #### Create a ViewModel That
