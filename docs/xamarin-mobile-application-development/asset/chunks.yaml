- fmt: '# Xamarin.Forms: A Comprehensive Guide


    Xamarin was already awesome. I loved MonoTouch (the former product name of `Xamarin.iOS`)
    so much that before Xamarin was a company (and consequently, I was part of the
    executive team, driving it along with Nat, Miguel de Icaza, and Joseph Hill),
    I had penned the book on it. How cool was it that you could use the same language,
    `C#` (my favorite language on the planet), to build native mobile apps for iOS
    and Android (Windows Mobile was still in its infancy at that point), share all
    of your back-end and logic code, and do it all from a Mac (my OS of choice by
    then)? It was super awesome. But it wasnвҖҷt without a huge opportunity; you could
    share a lot of code with Xamarin, but even with the MVVM frameworks, unifying
    your UI code was still a big challenge.


    вҖңThis is a canvas drawing a box using the native UI toolkits on both iOS and Android;
    hereвҖҷs the code,вҖқ said Jason. Sure enough, the same code was being used by both
    an iOS and an Android project to render the box. And thus `Xamarin.Forms` was
    born. We used the code name Duplo before settling on the `Xamarin.Forms` brand,
    and at the time it was fitting; `Xamarin.Forms` was a childвҖҷs building-block toy.
    You could build some basic toy apps, nothing sophisticated, but even then, the
    value of what Jason had created was apparent. `Xamarin.Forms` quickly evolved
    to the frame that now barely resembles the prototype framework Jason showed me
    late that evening nearly two years ago.


    Today `Xamarin.Forms` is an incredibly powerful framework. By extending it via
    custom renderers to provide native, platform-specific functionality, thereвҖҷs very
    little you canвҖҷt do at a UI level.


    And now, you hold in your hands (either physically or virtually), the first non-Xamarin
    book on `Xamarin.Forms` (donвҖҷt worry, it also covers `Xamarin.iOS` and `Xamarin.Android`
    so you can get down and dirty with a bare-metal native UI).


    IвҖҷm really excited about this book. When Dan first contacted me a year ago about
    the book, he told me his vision for it: a thorough, deep dive with a quality narrative
    in the same spirit of my original (and now woefully outdated) MonoTouch book.
    Something that did the platform justice. And after reading it, I think youвҖҷll
    agree that DanвҖҷs unique voice and clear appreciation for the platform has come
    through in a practical way; heвҖҷs created a solid handbook for working with Xamarin
    that I think youвҖҷll come to appreciate, whether youвҖҷre a brand-new Xamarin developer
    or an old hat at it.


    This weighty book gives clear guidance that will help you build quality apps,
    starting with architectural considerations, and then jumping into practical code
    strategies. It leads with `Xamarin.Forms`, but it also teaches you how to punch
    through into the native UI toolkits, and explains not just the how of things,
    but the why.


    And with that, I leave you in adept hands and wish you a fun journey through building
    apps with Xamarin via DanвҖҷs competent guidance.


    > вҖ”Bryan Costanich Vice President Xamarin


    ## Introduction


    This book is a hands-on `Xamarin.Forms` primer and a cross-platform reference
    for building native Android, iOS, and Windows Phone apps using `C#` and .NET.


    If you think of the Xamarin platform as a pyramid with `Xamarin.Android` and `Xamarin.iOS`
    at its base and `Xamarin.Forms` on top, thatвҖҷs what this book covers with `C#`.
    Mobile UI makes up the lionвҖҷs share of the pyramid, and this book explores the
    important concepts, elements, and recipes using Xamarin layouts, controls, and
    lists.


    The burning question in many new Xamarin projects is this: is `Xamarin.Forms`
    right for my project? This book covers the salient considerations in the comparison
    of the `Xamarin.Forms` option vs. a platform-specific approach with `Xamarin.Android`
    or `Xamarin.iOS`.


    When youвҖҷve reached the limits of what `Xamarin.Forms` can do out of the box,
    youвҖҷll want to customize your `Xamarin.Forms` controls by using custom renderers
    to leverage platform-specific features.


    YouвҖҷll also learn all of the key Xamarin UI navigation patterns: hierarchical
    and modal, drill-down lists, tabs, navigation drawer, and others. You can use
    the provided navigation code to build out the skeleton of just about any business
    app.


    This book is a guide to SQLite data access. WeвҖҷll cover the most common ways to
    access a SQLite database in a Xamarin app and how to build a data access layer
    (DAL). Once you have a database set up, youвҖҷll want to bind your data to your
    UI. You can do this by hand or use `Xamarin.Forms` data binding to bind UI elements
    to data sources. WeвҖҷll cover many techniques for read and write data binding to
    both data models and to view models for a Model-View-ViewModel (MVVM) architecture.


    Building an app requires more than a UI and data access; youвҖҷll also need to organize
    your code into a professional-grade architecture. WeвҖҷll explore solution-building
    techniques from starter to enterprise to help you decouple your functional layers,
    manage your platform-specific code, and share your cross-platform classes for
    optimal code reuse, testability, and maintainability.


    ## Who This Book Is For


    If youвҖҷre a developer, architect, or technical manager who can read `C#` examples
    to learn about cross-platform mobile development using the Xamarin platform, then
    this book is for you. `C#` developers will probably be most at home with this
    book because thatвҖҷs what I am, but IвҖҷve made an effort to point out when Microsoft
    or .NET lingo is in use. The Xamarin platform has a way of bringing technologists
    from different backgrounds together.


    ## How to Download Code Examples


    All of the code for this book, the `C#` and Extensible Application Markup Language
    (XAML) solutions, can be found in two places online:


    - Apress web page for this book, on the Source Code/Downloads tab ([`www.apress.com/9781484202159`](http://www.apress.com/9781484202159))

    - GitHub at [`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)


    ## XAML


    This book was written in the same way that the Xamarin platform is built, code-first
    in `C#`, so all of the book examples are in `C#`. All of the `C#` UI examples
    were ported to XAML as well, and made available in the downloadable code. Look
    for the XAML boxes for tips on where to find them.


    XAML


    The XAML version of this example can be found at the Apress web site ([`www.apress.com`](http://www.apress.com/)),
    or on GitHub at [`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples).
    The `Xamarin.Forms` solution for this chapter is `ThisChapterSolution.Xaml`.


    The hardest decision I made in writing this book was not including XAML examples
    in the book proper. Including XAML would have meant doing away with much or all
    of the material on `Xamarin.Android` and `Xamarin.iOS`, topics that are indispensible
    for a complete understanding of the Xamarin platform. I chose to adhere to my
    mission for this book: cross-platform `C#` code-first coverage of the foundations
    of the Xamarin platform. That said, I understand that there is a strong need for
    good XAML documentation and examples. So although I wish that there had been enough
    time and room to include XAML examples in the text of the book, IвҖҷm proud to say
    that we were able to provide downloadable XAML equivalents for all of the `C#`
    UI examples.


    ## Get Started with Xamarin.Forms Right Now!


    No time for reading? Browse [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html) for
    ten minutes, and then download the navigation code for [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).
    Rip off some of my [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html) navigation
    patterns to use immediately in your app and get started coding right now. Leave
    the book open to [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html) so you can build
    some layouts inside your navigation pages. Good luck!'
  raw: 'Xamarin was already awesome. I loved MonoTouch (the former product name of
    Xamarin.iOS) so much that before Xamarin was a company (and consequently, I was
    part of the executive team, driving it along with Nat, Miguel de Icaza, and Joseph
    Hill), I had penned the book on it. How cool was it that you could use the same
    language, C# (my favorite language on the planet), to build native mobile apps
    for iOS and Android (Windows Mobile was still in its infancy at that point), share
    all of your back-end and logic code, and do it all from a Mac (my OS of choice
    by then)? It was super awesome. But it wasnвҖҷt without a huge opportunity; you
    could share a lot of code with Xamarin, but even with the MVVM frameworks, unifying
    your UI code was still a big challenge.


    вҖңThis is a canvas drawing a box using the native UI toolkits on both iOS and Android;
    hereвҖҷs the code,вҖқ said Jason. Sure enough, the same code was being used by both
    an iOS and an Android project to render the box. And thus Xamarin.Forms was born.
    We used the code name Duplo before settling on the Xamarin.Forms brand, and at
    the time it was fitting; Xamarin.Forms was a childвҖҷs building-block toy. You could
    build some basic toy apps, nothing sophisticated, but even then, the value of
    what Jason had created was apparent. Xamarin.Forms quickly evolved to the frame
    that now barely resembles the prototype framework Jason showed me late that evening
    nearly two years ago.


    Today Xamarin.Forms is an incredibly powerful framework. By extending it via custom
    renderers to provide native, platform-specific functionality, thereвҖҷs very little
    you canвҖҷt do at a UI level.


    And now, you hold in your hands (either physically or virtually), the first non-Xamarin
    book on Xamarin.Forms (donвҖҷt worry, it also covers Xamarin.iOS and Xamarin.Android
    so you can get down and dirty with a bare-metal native UI).


    IвҖҷm really excited about this book. When Dan first contacted me a year ago about
    the book, he told me his vision for it: a thorough, deep dive with a quality narrative
    in the same spirit of my original (and now woefully outdated) MonoTouch book.
    Something that did the platform justice. And after reading it, I think youвҖҷll
    agree that DanвҖҷs unique voice and clear appreciation for the platform has come
    through in a practical way; heвҖҷs created a solid handbook for working with Xamarin
    that I think youвҖҷll come to appreciate, whether youвҖҷre a brand-new Xamarin developer
    or an old hat at it.


    This weighty book gives clear guidance that will help you build quality apps,
    starting with architectural considerations, and then jumping into practical code
    strategies. It leads with Xamarin.Forms, but it also teaches you how to punch
    through into the native UI toolkits, and explains not just the how of things,
    but the why.


    And with that, I leave you in adept hands and wish you a fun journey through building
    apps with Xamarin via DanвҖҷs competent guidance.


    > вҖ”Bryan Costanich Vice President Xamarin


    Introduction


    This book is a hands-on Xamarin.Forms primer and a cross-platform reference for
    building native Android, iOS, and Windows Phone apps using C# and .NET.


    If you think of the Xamarin platform as a pyramid with Xamarin.Android and Xamarin.iOS
    at its base and Xamarin.Forms on top, thatвҖҷs what this book covers with C#. Mobile
    UI makes up the lionвҖҷs share of the pyramid, and this book explores the important
    concepts, elements, and recipes using Xamarin layouts, controls, and lists.


    The burning question in many new Xamarin projects is this: is Xamarin.Forms right
    for my project? This book covers the salient considerations in the comparison
    of the Xamarin.Forms option vs. a platform-specific approach with Xamarin.Android
    or Xamarin.iOS.


    When youвҖҷve reached the limits of what Xamarin.Forms can do out of the box, youвҖҷll
    want to customize your Xamarin.Forms controls by using custom renderers to leverage
    platform-specific features.


    YouвҖҷll also learn all of the key Xamarin UI navigation patterns: hierarchical
    and modal, drill-down lists, tabs, navigation drawer, and others. You can use
    the provided navigation code to build out the skeleton of just about any business
    app.


    This book is a guide to SQLite data access. WeвҖҷll cover the most common ways to
    access a SQLite database in a Xamarin app and how to build a data access layer
    (DAL). Once you have a database set up, youвҖҷll want to bind your data to your
    UI. You can do this by hand or use Xamarin.Forms data binding to bind UI elements
    to data sources. WeвҖҷll cover many techniques for read and write data binding to
    both data models and to view models for a Model-View-ViewModel (MVVM) architecture.


    Building an app requires more than a UI and data access; youвҖҷll also need to organize
    your code into a professional-grade architecture. WeвҖҷll explore solution-building
    techniques from starter to enterprise to help you decouple your functional layers,
    manage your platform-specific code, and share your cross-platform classes for
    optimal code reuse, testability, and maintainability.


    ## Who This Book Is For


    If youвҖҷre a developer, architect, or technical manager who can read C# examples
    to learn about cross-platform mobile development using the Xamarin platform, then
    this book is for you. C# developers will probably be most at home with this book
    because thatвҖҷs what I am, but IвҖҷve made an effort to point out when Microsoft
    or .NET lingo is in use. The Xamarin platform has a way of bringing technologists
    from different backgrounds together.


    ## How to Download Code Examples


    All of the code for this book, the C# and Extensible Application Markup Language
    (XAML) solutions, can be found in two places online:


    Apress web page for this book, on the Source Code/Downloads tab ( [`www.apress.com/9781484202159`](http://www.apress.com/9781484202159)
    )


    GitHub at [`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)


    ## XAML


    This book was written in the same way that the Xamarin platform is built, code-first
    in C#, so all of the book examples are in C#. All of the C# UI examples were ported
    to XAML as well, and made available in the downloadable code. Look for the XAML
    boxes for tips on where to find them.


    XAML


    The XAML version of this example can be found at the Apress web site ( [`www.apress.com`](http://www.apress.com/)
    ), or on GitHub at [`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)
    . The Xamarin.Forms solution for this chapter is `ThisChapterSolution.Xaml`.


    The hardest decision I made in writing this book was not including XAML examples
    in the book proper. Including XAML would have meant doing away with much or all
    of the material on Xamarin.Android and Xamarin.iOS, topics that are indispensible
    for a complete understanding of the Xamarin platform. I chose to adhere to my
    mission for this book: cross-platform C# code-first coverage of the foundations
    of the Xamarin platform. That said, I understand that there is a strong need for
    good XAML documentation and examples. So although I wish that there had been enough
    time and room to include XAML examples in the text of the book, IвҖҷm proud to say
    that we were able to provide downloadable XAML equivalents for all of the C# UI
    examples.


    ## Get Started with Xamarin.Forms Right Now!


    No time for reading? Browse [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html) for
    ten minutes, and then download the navigation code for [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).
    Rip off some of my [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html) navigation
    patterns to use immediately in your app and get started coding right now. Leave
    the book open to [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html) so you can build
    some layouts inside your navigation pages. Good luck!'
