    ## дҪҝз”Ё Xamarin.Forms еёғеұҖ\n\nXamarin.Forms дёӯзҡ„еёғеұҖжҳҜе®№зәіе’Ңж јејҸеҢ–и§Ҷеӣҫзҡ„е®№еҷЁгҖӮжҜҸдёӘеёғеұҖ\n"
