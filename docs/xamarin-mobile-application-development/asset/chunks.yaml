    the Android navigation patterns weвҖҷve covered, you should be able to build the
    skeleton of your app. If youвҖҷre ready to learn more about Android, turn to [Chapter
    7](#A978-1-4842-0214-2_7_Chapter.html), which covers data binding and data access.    If
    youвҖҷre ready for iOS navigation patterns, read on!    ## iOS Navigation    i OS    iOS
    pages are built using `UIView` and `UIViewController`, the views and controllers
    in the MVC pattern. While `UIView` can be constructed by hand using code, itвҖҷs
    typically built using iOS designer tools such as the Xamarin Designer for iOS
    or the Xcode Interface Builder in one of two ways: storyboards or nibs.    Storyboards
    are groups of `UIView` classes represented by XML layout files strung together
    into an application by using a designer tool. Each storyboard screen, called a
    scene, is made up of a `UIView` and a code-behind `UIViewController`. Each XML
    layout is typically instantiated into a `UIView` automatically without requiring
    code in the `UIViewController` to do that. Storyboard constructs called segues
    handle transitions to other layouts, also without code. When using storyboards,
    you donвҖҷt need to do much C# coding for basic navigation in iOS.    An older method
    of constructing apps is using nibs (`.xib` files). A nib is a single XML layout
    file that is used separately from other nibs and instantiated into a `UIView`
    by its accompanying `UIViewController`. Nibs are typically constructed using the
    Xcode Interface Builder, and then a little C# coding is done to string them together.  Important
    Note  Most navigation in iOS development today is done using storyboards built
    with a designer tool, without much C#, leaving key aspects of iOS navigation beyond
    the scope of this code-first, non-tool-oriented book. Be certain to study appropriate
    designer tool resources, such as the Xamarin online docs, to learn about how that
    is done using Xcode Interface Builder or Xamarin Designer for iOS. This is absolutely
    Вӯnecessary for learning best-practice Xamarin.iOS development.    You will explore
    how to code navigation by hand to give you an idea of what is happening behind
    the scenes and for the cases when you want more control. Use this chapter as a
    way to understand the underpinnings of iOS UI navigation and to help you out of
    tricky situations, but a tool-first approach is typically best practice here,
    and this is a code-first book. IвҖҷll cover code-first navigation approaches useful
    with both storyboards and nibs, but will mostly assume that you are using storyboards.    Now
    letвҖҷs dive into the basics of iOS navigation. For each example, IвҖҷll first mention
    the standard approach using the designer, and then provide detail on the code-based
    approach.    ### Using Storyboards, Scenes, and Segues    Storyboards are constructed
    of scenes and the transitions between them, called segues. Scenes are made up
    of `View` and `ViewController` pairs, effectively single screens. iPhone scenes
    typically correspond to screens one-to-one. However, on an iPad multiple scenes
    may appear on one screen. Also, modal scenes can appear on top of other scenes.
    Segues define the navigation pattern, hierarchical or modal, and can handle animation
    and data passed between scenes.    Use storyboards to manage events for controls
    in the Properties Pad in the iOS Designer. Add the event handlers there and complete
    them in partial methods in the `UIViewController` class. Storyboards are stored
    as XML files. During the build, `.storyboard` files are compiled into nibs, screen-specific
    binary files. At runtime, nibs are initialized and instantiated to create new
    views.    In storyboard solution templates, storyboards are wired up to a project
    automatically via Options вһӨ iOS Application вһӨ Main Interface, which is set to
    the storyboard name.    Storyboard screens can also be instantiated programmatically
    within `AppDelegate`, as shown in Listing [6-61](#A978-1-4842-0214-2_6_Chapter.html#FPar100),
    where we instantiate the `NavigationStory` storyboard.  Listing 6-61\. Instantiate
    a Storyboard in AppDelegate.cs  В В В В `public partial class AppDelegate : UIApplicationDelegate`    В В В В `{`    В В В В В В В В `UIWindow
    window;`    В В В В В В В В `public static UIStoryboard Storyboard = UIStoryboard`    В В В В В В В В В В В В `.FromName
    ("NavigationStory", null);`    В В В В В В В В `public static UIViewController firstViewController;`    В В В В В В В В `public
    override bool FinishedLaunching (UIApplication app,`    В В В В В В В В В В В В `NSDictionary
    options)`    В В В В В В В В `{`    В В В В В В В В В В В В `window = new UIWindow (UIScreen.MainScreen.Bounds);`    В В В В В В В В В В В В `firstViewController
    = Storyboard`    В В В В В В В В В В В В В В В В `.InstantiateInitialViewController () as UIViewController;`    В В В В В В В В В В В В `window.RootViewController
    = firstViewController;`    В В В В В В В В В В В В `window.MakeKeyAndVisible ();`    В В В В В В В В В В В В `return
    true;`    В В В В В В В В `}`    В В В В `}`    This `AppDelegate` initializes the first scene
    (view/view controller) in the storyboard as the first visible page, placed into
    the windowвҖҷs `RootViewController` as `firstViewController`.    Segues define the
    navigation type, animation details, and data passed between scenes. Storyboard
    projects begin, by default, with a `Sourceless` segue, the вҖңlead-inвҖқ to the first
    scene that indicates which view the user will see first. The most common segues
    are Push, Modal, and Unwind:    *   Hierarchical navigation is accomplished by
    using the Push segue or by-hand using the `UINavigationController`вҖҷs `PushViewController`
    method. *   Modals are created with the Modal segue or the `UIViewController`вҖҷs
    `PresentViewController` method. *   Back navigation can be accomplished using
    the Unwind segue or the `DismissViewController` method.    Create a segue by holding
    down the Ctrl key inside a button control and click-dragging from one scene to
    another; then define the segue type by choosing Root, Push, Modal, or Custom from
    the pop-up menu. Unwind segues are created by using the Segue Exit button at the
    bottom of the scene.  Note  Right-click for segues on VMware for your Windows
    virtual machine, or change your keyboard preferences to left-click.    ### Using
    Nibs    Before storyboards, there were nibs (`.xib` files): XML files representing
    a single screenвҖҷs layout. YouвҖҷll find many apps still using nibs. You may find
    occasion to use one yourself, as sometimes a storyboard is overkill. Whereas storyboards
    are groups of layouts, nibs are single XML layout files that are instantiated
    into `UIViews` by their accompanying `UIViewControllers`, often in the declaration
    of the `UIViewController` as part of the base class in quotes. `ThisScreen.xib`
    is loaded onto the screen in the `UIViewController` called `ThisScreen.cs`.    В В В В `public
    ThisScreen () : base ("ThisScreen", null)`    Nibs are typically constructed using
    the Xcode Interface Builder, and then strung together into applications using
    outlets or events in a designer tool or programmatically in their `UIViewControllers`.    ###
    Hierarchical Navigation    i OS    Hierarchical navigation in iOS uses the navigation
    controller, `UINavigationController`. Popping new pages onto the stack is achieved
    by using the navigation controllerвҖҷs `PushViewController` method and popped back
    off using `DismissViewController`. This is accomplished in storyboards by dropping
    a navigation controller onto the canvas and using the Push segue to add scenes,
    and then the Unwind segue to pop scenes off the stack (with Scene Exit).    ####
    Using UINavigationController    i OS    The primary navigation component in iOS
    is the navigation controller, or `UINavigationControlle``r`. This view controller
    provides a call stack and a fully customizable navigation bar with a screen title
    and navigation controls (Figure [6-36](#A978-1-4842-0214-2_6_Chapter.html#Fig36)).
    A navigation controller object manages the currently displayed screens by using
    the navigation stack, which is represented by an array of view controllers. The
    first view controller in the array is the root view controller. The last view
    controller in the array is the view controller currently displayed.    ![A978-1-4842-0214-2_6_Fig36_HTML.jpg](A978-1-4842-0214-2_6_Fig36_HTML.jpg)    Figure
    6-36.  UINavigationController provides up navigation and titles for context  First
    use your designer tool to create an initial page. Assign a view controller by
    clicking the bottom bar of that page in the designer and entering both the class
    name and view controller title as `PageOne`.    `UINavigationController` can be
    dragged and dropped onto a storyboard by using the designer or can be added manually
    by wrapping it around another view controller.    Manually add a navigation controller
    in your `AppDelegate.cs`, as in Listing [6-62](#A978-1-4842-0214-2_6_Chapter.html#FPar102),
    by wrapping it around the first view controller in your storyboard, which you
    can find using `Storyboard.InstantiateInitialViewController()`.  Listing 6-62\.
    Instantiate the Storyboard in AppDelegate.cs FinishedLaunching Method  В В В В `firstViewController
    = Storyboard`    В В В В В В В В `.InstantiateInitialViewController () as UIViewController;`    В В В В `UINavigationController
    navController = new UINavigationController`    В В В В В В В В `(firstViewController);`    Then
    assign the navigation controller as the root controller of the main window by
    using `window.RootViewController`:    В В В В `window.RootViewController = navController;`    Figure
    [6-37](#A978-1-4842-0214-2_6_Chapter.html#Fig37) shows page 1, which was created
