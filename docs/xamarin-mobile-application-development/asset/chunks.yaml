    \ Device.OnPlatform(20, 0, 0), 10, 5);\n                this.Content = scrollView;\n\
    \            }\n        }\n}\n```\n\n## Summary\n\nXamarin.Forms provides a jumping-off\
    \ point for cross-platform mobile app UI development, fully loaded with stock\
    \ and customizable pages, layouts, and views. A Xamarin.Forms solution typically\
    \ has a separate project for each of these three platforms: Android, iOS, and\
    \ Windows Phone. A Xamarin.Forms project is useful for housing cross-platform\
    \ UIs and a core library project contains the business logic and data layer (either\
    \ can be Shared Projects or PCLs).\n\nDevelopers are faced with a decision of\
    \ Xamarin.Forms vs. a platform-specific UI approach with Xamarin.Android, Xamarin.iOS,\
    \ and the Windows Phone SDK. The more Xamarin.Forms releases that come out, the\
    \ less of a decision this may be, as Xamarin.Forms approaches the functionality\
    \ of native UI APIs. For now, we need to master all the options on the table and\
    \ weigh our choices carefully for each page of our app, to make sure the toolset\
    \ will support our requirements. Xamarin.Forms custom renderers help us combine\
    \ the two approaches.\n\nThe platform-specific UI option provides a full-featured\
    \ toolset for detailed and nuanced native UI development. This is not a cross-platform\
    \ approach to the presentation layer and requires the UI to be completely separated\
    \ into platform-specific projects with no shared UI components. Xamarin.iOS provides\
    \ bindings to the iOS UI API called UIKit. Xamarin.Android binds to the Android\
    \ SDK, exposing the most important classes and their members, offering a native\
    \ UI experience to the developer and user.\n\nView is the Xamarin.Forms term for\
    \ control, and we delved into a few of the most frequently used views: `Label`,\
    \ `Entry`, `BoxView`, `Image`, `StackLayout`, and `ScrollView`.\n\nBecause layouts\
    \ are some of the most powerful tools at a developerвҖҷs disposal for crafting the\
    \ design of an app, letвҖҷs explore mobile UI layouts next.\n\n# UI Design Using\
    \ Layouts\n\nA layout is a container for controls, images, text, and other layouts.\
    \ Central to the creation of the mobile UIs, layouts help us to design our pages\
    \ by using the placement of views and as well as nested layouts (for more views).\
    \ If youвҖҷve worked with HTML `<div>`, `<table>`, or `<form>` elements then layouts\
    \ should feel familiar to you. The purpose of a layout is to indicate the location\
    \ and size of each of its child elements. This is typically done three ways: relative\
    \ to the individual controls in the layout, relative to the origin of the layout,\
    \ or using an overlaid structure such as a grid. Each layout type has a mechanism\
    \ for placing child views within it, specifying the size and location of each\
    \ view, and creating space between and around the views.\n\nIn this chapter, you\
    \ will build small projects to work with each of the layout types and their features.\
    \ First youвҖҷll learn about the various types of layouts and explore custom controls.\
    \ Xamarin.Forms, Xamarin.Android, and Xamarin.iOS use different types of layouts.\
    \ Here is an overview of these types.\n\n### Xamarin.Forms Layouts\n\nXamarin.Forms\
    \ layouts inherit from the `View` class and can contain views or other layouts.\
    \ Xamarin.Forms layouts include the following:\n\n*   `StackLayout`: Stacks child\
    \ views vertically or horizontally\n*   `RelativeLayout`: Uses constraints that\
    \ create relationships between the elements to define the location and size of\
    \ child views\n*   `AbsoluteLayout`: Sets the child viewвҖҷs location and size by\
    \ using bounding rectangles or proportions to the overall layout\n*   `Grid`:\
    \ Creates a table-like container with rows and columns to hold views\n*   `Frame`:\
    \ Draws a frame-like border around the container\n\n### Android Layouts\n\nAndroid\
    \ layouts inherit from the `ViewGroup` class and can contain views or other layouts.\
    \ Android layouts include the following:\n\n*   `LinearLayout`: Arranges child\
    \ views vertically or horizontally\n*   `RelativeLayout`: Uses constraints that\
    \ create relationships between the elements to define the location and size of\
    \ child views\n*   `TableLayout`: Creates a table-like container with rows and\
    \ columns to hold views\n*   `GridLayout`: Creates another table-like container\
    \ with rows and columns to hold views with several options for view flow: row\
    \ first, column first, or specific row/column assignment\n*   `FrameLayout`: Arranges\
    \ child views vertically and provides nesting, swapping, sliding, and padding,\
    \ much like a traditional .NET panel, as well as control over z-order (layer depth)\n\
    \n### iOS Layouts\n\nMost iOS layouts are created with designer tools such as\
    \ the Xcode Interface Builder and Xamarin Designer for iOS. iOS layouts use a\
    \ simple approach from a class standpoint, using a single class called `UIView`\
    \ with two techniques. iOS layout techniques include the following:\n\n*   AutoLayout:\
    \ Uses constraints that create flexible, relative relationships between the elements\
    \ to define the location and size of child views\n*   Frames: Uses bounding rectangles\
    \ called frames to indicate absolute placement and size of child views (which\
    \ can be sized according to context using masks, a technique called AutoSizing)\n\
    \nWhen building layouts, a related topic that arises is the creation of custom\
    \ controls, used as components for building layouts.\n\n## Understanding Custom\
    \ Controls\n\nCustom controls in Xamarin are partial layouts that can be included\
    \ in larger layouts on an as-needed basis, that can be created on all platforms,\
    \ and that can be made to function like user controls, custom controls, or panels\
    \ in .NET. Custom controls are barely touched upon in this book, but the topic\
    \ bears mentioning in the context of constructing professional-grade layouts.\n\
    \nIn Xamarin.Forms, `ContentView` is a base class for creating custom views for\
    \ nesting, padding, and reuse. Custom controls should not be confused with customized\
    \ controls, which are usually individual Xamarin.Forms views with enhanced platform-specific\
    \ functionality that are built using a custom renderer (see [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html)).\
    \ Even so, developers will sometimes refer to a single customized control as a\
    \ custom control. Also, a customized control has the capacity to contain multiple\
    \ controls and might then actually become a custom control.\n\nIn Android, we\
    \ have two options for creating custom controls: subclassed views and fragments.\
    \ Subclassing views allows us to create custom views that can be added as child\
    \ views to `ViewGroups` such as layouts. Subclassed views are lightweight and\
    \ simple to implement. Sometimes we need access to activity features in our custom\
    \ control, however, such as the navigation stack and life-cycle events. Fragments\
    \ are dynamic mini-layouts with features of activities that are built using the\
    \ base class `Android.App.Fragment`. Because of their strength and versatility\
    \ as building-block UI classes, many Android apps are created entirely using fragments.\
    \ They are commonly used to build apps that must work well on both phones and\
    \ tablets as they help to customize the layout according to screen size.\n\nIn\
    \ iOS, custom controls are often created using a designer tool, though subclassing\
    \ `UIView` also works.\n\n> **Note** This chapter explores a static, manual approach\
    \ to layouts. Many of these layouts, such as the Xamarin.Forms ones, contain bindable\
    \ properties and can be bound to data sources and constructed dynamically at run-time.\
    \ YouвҖҷll learn about data binding in later chapters ([Chapter 5](#A978-1-4842-0214-2_5_Chapter.html)\
    \ and [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html)).\n\n## Using Xamarin.Forms\
    \ Layouts\n\nLayouts in Xamarin.Forms are containers that hold and format views.\
    \ Each layout"
