    textView = new UITextField`    В В В В В В В В `{`    В В В В В В В В В В В В `Placeholder = "Your
    name",`    В В В В В В В В В В В В `BorderStyle = UITextBorderStyle.RoundedRect,`    В В В В В В В В В В В В `Frame
    = new RectangleF(10, 30, 200, 50)`    В В В В В В В В `};`    В В В В В В В В `Add (textView);`    В В В В `}`    Figure
    [3-29](#A978-1-4842-0214-2_3_Chapter.html#Fig29) shows the result.    ![A978-1-4842-0214-2_3_Fig29_HTML.jpg](A978-1-4842-0214-2_3_Fig29_HTML.jpg)    Figure
    3-29.  UITextField using AutoSizing Tip  HereвҖҷs a shorthand view constructor that
    assigns the `Frame` property inline:    В В В В `var textView = new UITextField(new
    RectangleF(10, 30, 200, 50));`    ## Summary    Layouts are a fine example of
    just how similar these different platforms can be. Names change, but concepts
    donвҖҷt, and for added continuity, Xamarin strives to incorporate the most useful
    aspects of these various platforms into Xamarin.Forms. Here are some of the universal
    terms related to layouts:    *   Stacked layouts are the simplest, great for easy
    pages and quick prototyping and wireframing, like Xamarin.Forms `StackLayout`
    and Android `LinearLayout`. *   Rectangles frame views and their size and coordinate
    location. *   Constraints bind views together like elastic that contextually determines
    size and location. *   Relative placement gives us responsiveness to screen size
    at the cost of precision, and is the norm in mobile UIs. *   Layout options handle
    alignment and formatting across platforms with `HorizontalOptions` and `VerticalOptions`
    in Xamarin.Forms, Android `LayoutOptions`, and iOS constraints. *   The custom
    control persists as a concept in mobile development, though it is achieved and
    named differently across platforms, such as Xamarin.Forms `ContentView` and Android
    `Fragment`. *   iOS rolls many of the previous concepts into one class: `UIView`.
    *   Tables yield relativity, precision, and versatility. They are found in Xamarin.Forms
    `GridLayout` and Android `TableLayout` and `GridLayout`. YouвҖҷll learn more about
    iOS tables in [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html).    Those are some
    of the fundamentals of mobile screen layout on all platforms. But enough design
    and layout, already. LetвҖҷs move on to user interaction!    # 4.В User Interaction
    Using Controls    Users choose dates, times, text, integers, doubles, and other
    values on mobile devices by using tactile controls. Touch-sensitive screens have
    user interaction that differs slightly from mouse-driven UIs: most is done with
    the thumbs and forefingers on the touchscreen. From the userвҖҷs standpoint, this
    results in a hands-on control-panel interface with switches, icons, sliders, keyboards,
    and pickers that sometimes lookвҖ”but more important, feelвҖ”like physical mechanisms.    [Chapter
    2](#A978-1-4842-0214-2_2_Chapter.html) covered some of the basic Xamarin.Forms
    views such as the `Label`, `Button`, and `Image`. In this chapter, youвҖҷll explore
    additional controls available on each platform, the gestures and events that make
    them work, and their outputs.    Many of the controls in this chapter are picker-style
    (pick a date, pick an option, pick a time, and so forth). These controls tend
    to look and work better when displayed in a modal dialog box, a pop-up box that
    overlays the app and maintains focus until dismissed by the user. Xamarin.Forms
    handles this for you by automatically placing pickers in modals. For Android and
    iOS, this chapter covers platform-specific ways to build modal picker dialog boxes.    This
    chapter is a gallery and a reference of the most commonly used selection controls.    Xamarin.Forms
    Views    Xamarin.Forms views can perform these basic input functions:    *   `Picker`
    : A pop-up to select a value from a simple list *   `DatePicker`: A pop-up for
    selecting month, date, and year *   `TimePicker`: A pop-up for selecting hour,
    minute, and AM/PM *   `Stepper`: Increment/decrement buttons for discrete values
    *   `Slider`: Sliding input lever for continuous values *   `Switch`: Boolean
    on/off control    Android Controls    These are some of the primary Android selection
    widgets:    *   `Spinner`: A simple drop-down list *   `DatePicker`: A control
    for selecting month, date, and year *   `TimePicker`: A control for selecting
    hour, minute, and AM/PM *   `SeekBar`: Sliding input lever for continuous values
    *   `CheckBox`: A standard Boolean check-box control *   `Switch`: A Boolean on/off
    switch *   `RadioButton`: Button groups for single or multiple selection    iOS
    Controls    iOS controls perform a range of user interactions:    *   `UIPickerView`:
    A simple drop-down list in a spinner *   `UIDatePicker`: A date and/or time spinner
    *   `UIStepper`: Increment/decrement buttons for discrete values *   `UISlider`:
    Sliding input lever for continuous values *   `UISwitch`: Boolean on/off control  Note  The
    iOS and Android controls for label, text view, button, scroll view, and image
    are out of scope for this book. Please consult an iOS or Android primer for those.    ##
    Xamarin.Forms Views    xamarin.forms    Xamarin.Forms views provide a range of
    controls that mimic and extend their iOS and Android counterparts. All of the
    views covered here allow selection and populate at least one property with a data
    value specified by the user, sometimes more. LetвҖҷs look at each view in turn.    Xamarin.Forms
    views often provide the selected value in two places: a handler event property
    (for example, `e.NewValue`) provides the most recent value, and a general-use
    property on the view provides the selected value for use throughout the page.
    You will create two labels to display both of those values: `eventValue` and `pageValue`.    Create
    a new `ContentPage` called `Controls` and declare two `Label` views to hold the
    results of control selection:    В В В В В В В В `public partial class Controls : ContentPage`    В В В В В В В В `{`    В В В В В В В В В В В В `Label
    eventValue;`    В В В В В В В В В В В В `Label pageValue;`    В В В В В В В В В В В В `public Controls()`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `eventValue=
    new Label();`    В В В В В В В В В В В В В В В В `eventValue.Text = "Value in Handler";`    В В В В В В В В В В В В В В В В `pageValue
    = new Label();`    В В В В В В В В В В В В В В В В `pageValue.Text = "Value in Page";`    Create
    a `StackLayout` at the end of your `Controls()` constructor to assign to your
    pageвҖҷs `Content` property. Center all of the controls in the `StackLayout` by
    using `HorizontalOptions = LayoutOptions.Center`. All of the Xamarin.Forms examples
    in this chapter can be found in the source listing `Controls.cs` in the `ControlExamples`
    solution, shown in Listing [4-1](#A978-1-4842-0214-2_4_Chapter.html#FPar2) at
    the end of this section.    Remember to add each view to your `StackLayout` as
    you go!  Tip  All example code solutions, including the XAML versions of these
    C# examples, can be found at the Apress web site ( [`www.apress.com`](http://www.apress.com/)
    ) or on GitHub at [`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)
    .    ### Picker    The `Picker` view provides a pop-up to select a value from
    a simple list.  Note  The `Picker` view is used for quick selection of short words,
    phrases, or numbers. Complex lists with composite cells containing multiple strings
    and images are covered in the next chapter.    First, create the picker and give
    it a title:    В В В В В В В В `Picker picker = new Picker`    В В В В В В В В `{`    В В В В В В В В В В В В `Title
    = "Option",`    В В В В В В В В В В В В `VerticalOptions = LayoutOptions.CenterAndExpand`    В В В В В В В В `};`    Next,
    populate the list:    В В В В В В В В `var options = new List<string> { "First", "Second",
    "Third", "Fourth" };`    В В В В В В В В `foreach (string optionName in options)`    В В В В В В В В `{`    В В В В В В В В В В В В `picker.Items.Add(optionName);`    В В В В В В В В `}`    Option
    names are placed into the list and then added to the `Items` collection in the
    picker.    The `Entry` view in Figure [4-1](#A978-1-4842-0214-2_4_Chapter.html#Fig1)
    starts as a data entry field, similar to `Xamarin.Forms.Entry` displaying the
    value of the `Title` property.    ![A978-1-4842-0214-2_4_Fig1_HTML.jpg](A978-1-4842-0214-2_4_Fig1_HTML.jpg)    Figure
    4-1.  Entry views often have inline labels instead of side labels  When this field
    is tapped, a modal dialog appears, containing the list of items (Figure [4-2](#A978-1-4842-0214-2_4_Chapter.html#Fig2)).    ![A978-1-4842-0214-2_4_Fig2_HTML.jpg](A978-1-4842-0214-2_4_Fig2_HTML.jpg)    Figure
    4-2.  Each picker looks a bit different, depending on the platform  The list spins
    when swiped, and the highlighted value becomes the selected value. The selection
    is automatically populated into the original entry field so the user can see the
    effect of the change. The `SelectedIndexChanged` event also fires, which can be
    assigned a handler method or handled inline like this:    В В В В В В В В `picker.SelectedIndexChanged
    += (sender, args) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `pageValue.Text = picker.Items[picker.SelectedIndex];`    В В В В В В В В `};`    This
    implementation assigns the selected string to the `Text` property of the `pageValue`
    label.  Tip  The selected index in the `Picker.SelectedIndex` property is a zero-based
    integer index. If Cancel is selected, the `SelectedIndex` remains unchanged.    ###
    DatePicker    xamarin.forms    The `DatePicker` view creates a pop-up for selection
    of month, date, and year. Create a `DatePicker` view like this:    В В В В В В В В `DatePicker
    datePicker = new DatePicker`    В В В В В В В В `{`    В В В В В В В В В В В В `Format = "D",`    В В В В В В В В В В В В `VerticalOptions
    = LayoutOptions.CenterAndExpand`    В В В В В В В В `};`    The `Format` property is set
    to `D` for the full month/day/year display. More date formats are provided later
    in this section.    The `DatePicker` view starts as a data entry field (Figure
    [4-3](#A978-1-4842-0214-2_4_Chapter.html#Fig3)), similar to `Xamarin.Forms.Entry`
    displaying the value of the `Date` property.    ![A978-1-4842-0214-2_4_Fig3_HTML.jpg](A978-1-4842-0214-2_4_Fig3_HTML.jpg)    Figure
    4-3.  DatePicker begins as an Entry view waiting for a tap  When the date field
    is tapped, a modal dialog appears (Figure [4-4](#A978-1-4842-0214-2_4_Chapter.html#Fig4)).    ![A978-1-4842-0214-2_4_Fig4_HTML.jpg](A978-1-4842-0214-2_4_Fig4_HTML.jpg)    Figure
    4-4.  DatePicker is a modal dialog  Each column spins individually when swiped,
    and the highlighted values become the selected values. When Done is tapped, the
    selected date is automatically populated into the original entry field so the
    user can see the effect of the change. The `DateSelected` event also fires, which
    can be assigned a handler method or handled inline like this:    В В В В В В В В В `datePicker.DateSelected
    += (object sender, DateChangedEventArgs e) =>`    В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `eventValue.Text
    = e.NewDate.ToString();`    В В В В В В В В В В В В В В В В `pageValue.Text = datePicker.Date.ToString();`    В В В В В В В В В В `};`    The
    properties `e.OldDate` and `e.NewDate` are available within this event to provide
    the old and new selected date values. In general cases, however, the value entered
    by the user is stored in the `Date` property. All of these properties use type
    `DateTime`.    The format of the `Date` field is customizable with the `Format`
    propertyвҖ”for example, `myDate.Format = "D"`. Other values are as follows:    *   `D`:
    Full month, day, and year (Monday, March 5, 2018) *   `d`: Month, day, and year
    (3/5/2018) *   `M`: Month and day (March 5) *   `Y`: Month and year (March 2018)
    *   `yy`: Last two digits of the year (18) *   `yyyy`: Full year (2018) *   `MM`:
    Two-digit month (03) *   `MMMM`: Month (March) *   `dd`: Two-digit day (05) *   `ddd`:
    Abbreviated day of the week (Mon) *   `dddd`: Full day of the week (Monday)    You
    set a date range for selection by using `MaximumDate` and `MinimumDate`:    В В В В В В В В `datePicker.MaximumDate
    = Convert.ToDateTime("1/1/2019");`    В В В В В В В В `datePicker.MinimumDate = Convert.ToDateTime("1/1/2014");`  Tip  On
    Android, the `Format` and `MaximumDate/MinimumDate` properties affect the `DatePicker`
    entry field but not the modal selection dialog at the time of this writing.    ###
    TimePicker    xamarin.forms    The `TimePicker` view creates a pop-up for selecting
    hour, minute, and AM/PM. Create a `TimePicker` view like this:    В В В В В В В В `TimePicker
    timePicker = new TimePicker`    В В В В В В В В `{`    В В В В В В В В В В В В `Format = "T",`    В В В В В В В В В В В В `VerticalOptions
    = LayoutOptions.CenterAndExpand`    В В В В В В В В `};`    The `Format` property set
    to `T` displays the full time. More time formats follow.    The `TimePicker` view
    starts as a data entry field similar to `Xamarin.Forms.Entry`, displaying the
    value of the `Time` property (Figure [4-5](#A978-1-4842-0214-2_4_Chapter.html#Fig5)).    ![A978-1-4842-0214-2_4_Fig5_HTML.jpg](A978-1-4842-0214-2_4_Fig5_HTML.jpg)    Figure
    4-5.  TimePicker waits for a tap  When the time field is tapped, a modal dialog
    appears (Figure [4-6](#A978-1-4842-0214-2_4_Chapter.html#Fig6)).    ![A978-1-4842-0214-2_4_Fig6_HTML.jpg](A978-1-4842-0214-2_4_Fig6_HTML.jpg)    Figure
    4-6.  TimePicker is a dialog box  Each column spins individually when swiped,
    and the highlighted values become the selected values. When Done is tapped, the
    selected time is automatically populated into the original entry field so the
    user can see the effect of the change.    There is no TimeSelected event that
    triggers when a value is selected. Instead, use the `PropertyChanged` event in
    Xamarin.Forms data-binding to track changes to this view:    В В В В В В В В `timePicker.PropertyChanged
    += (sender, e) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `if (e.PropertyName == TimePicker.TimeProperty.PropertyName)`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `pageValue.Text
    = timePicker.Time.ToString();`    В В В В В В В В В В В В `}`    В В В В В В В В `};`    The `timePicker.Time`
    property is set with the selected value as type `TimeSpan`.    The format of the
    `Time` field is customizable with the `Format` property (for example, `Format
    = "T"`). Other values are as follows:    *   `T`: Full time with hours, minutes,
    seconds, and AM/PM (9:30:25 AM) *   `t`: Full time with hours, minutes, and AM/PM
    (9:30 AM) *   `hh`: Two-digit hours (09) *   `mm`: Two-digit minutes (30) *   `ss`:
    Two-digit seconds (25); seconds are not selectable in the dialog box *   `tt`:
    AM/PM designator (AM)  Tip  `Format` affects the `TimePicker` entry field but
    not the dialog box at the time of this writing.    ### Stepper    xamarin.forms    The
    `Stepper` view creates increment and decrement buttons for discrete adjustments
    to the values:    В В В В В В В В `Stepper stepper = new Stepper`    В В В В В В В В `{`    В В В В В В В В В В В В `Minimum
    = 0,`    В В В В В В В В В В В В `Maximum = 10,`    В В В В В В В В В В В В `Increment = 1,`    В В В В В В В В В В В В `HorizontalOptions
    = LayoutOptions.Center,`    В В В В В В В В В В В В `VerticalOptions = LayoutOptions.CenterAndExpand`    В В В В В В В В `};`    `Minimum`,
    `Maximum`, and `Increment` properties are set for the steppable value. The start
    value can be set in the `Stepper.Value` property. Here is a shortcut constructor:    В В В В В В В В `public
    Stepper (Double Minimum, DoubleВ В Maximum, DoubleВ В StartValue,В В Double Increment)`    This
    constructor can be implemented like this:    В В В В В В В В `Stepper stepper = new Stepper(0,10,0,
    1);`    Figure [4-7](#A978-1-4842-0214-2_4_Chapter.html#Fig7) shows what the `Stepper`
    view looks like.    ![A978-1-4842-0214-2_4_Fig7_HTML.jpg](A978-1-4842-0214-2_4_Fig7_HTML.jpg)    Figure
    4-7.  Plus and minus for increment and decrement  Tapping a plus or minus button
    changes the adjustable value and fires the `Stepper.ValueChanged` event. It can
    be handled in a method or inline, like so:    В В В В В В В В `stepper.ValueChanged +=
    (sender, e) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `eventValue.Text = String.Format("Stepper
    value is {0:F1}", e.NewValue);`    В В В В В В В В В В В В `pageValue.Text = stepper.Value.ToString();`    В В В В В В В В `};`    The
    properties `e.OldValue` and `e. NewValue` are available within this event to provide
    the old and new selected values. In general cases, however, the value entered
    by the user is stored in the `Stepper''s Value` property. All these properties
    are type `Double`.    ### Slider    xamarin.forms    The `Slider` view is a sliding
    input control providing a continuum of selection:    В В В В В В В В `Slider slider =
    new Slider`    В В В В В В В В `{`    В В В В В В В В В В В В `Minimum = 0,`    В В В В В В В В В В В В `Maximum
    = 100,`    В В В В В В В В В В В В `Value = 50,`    В В В В В В В В В В В В `VerticalOptions = LayoutOptions.CenterAndExpand,`    В В В В В В В В В В В В `WidthRequest
    = 300`    В В В В В В В В `};`    `Minimum` and `Maximum` properties are set for the slidable
    value. The start value can be set in the `Slider.Value` property. The value changes
