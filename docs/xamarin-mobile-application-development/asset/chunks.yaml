    \ project. A PC with Xamarin Studio will give you Android. Solutions created in\
    \ Xamarin Studio do not include a Windows Phone project, as Visual Studio is required\
    \ to create that project, though projects created in Visual Studio can be browsed\
    \ in Xamarin Studio without being compiled there. A PC with Visual Studio with\
    \ both iOS and Android licenses activated will create four projects: one PCL and\
    \ one for each of the three platforms.\n\nTip\n\nXamarin.Forms is currently available\
    \ with all licenses except the Starter license. YouвҖҷll need an Indie or higher-level\
    \ purchased license or trial license to use Xamarin.Forms.\n\nMore on PCLs, shared\
    \ projects, and other cross-platform solution architecture options in [Chapter\
    \ 9](#A978-1-4842-0214-2_9_Chapter.html).\n\nThe following sections provide each\
    \ of the projects in the solution and the code they contain."
  trans: "\n## дҪҝз”Ё Xamarin.Forms UI\n\nйЎөйқўгҖҒеёғеұҖе’Ңи§Ҷеӣҫжһ„жҲҗдәҶ Xamarin.Forms UI зҡ„ж ёеҝғпјҲеӣҫ 2-5пјүгҖӮйЎөйқўжҳҜдё»иҰҒзҡ„е®№еҷЁпјҢжҜҸдёӘеұҸе№•йғҪз”ұдёҖдёӘеҚ•зӢ¬зҡ„\
    \ `Page` зұ»еЎ«е……гҖӮдёҖдёӘйЎөйқўеҸҜиғҪеҢ…еҗ« `Layout` зұ»зҡ„еӨҡз§ҚеҸҳдҪ“пјҢиҝҷдәӣеҸҳдҪ“еҸҲеҸҜд»Ҙе®№зәіе…¶д»–еёғеұҖпјҢз”ЁдәҺж”ҫзҪ®е’Ңи°ғж•ҙе…¶еҶ…е®№зҡ„еӨ§е°ҸгҖӮйЎөйқўе’ҢеёғеұҖзҡ„зӣ®зҡ„жҳҜе®№зәіе№¶е‘ҲзҺ°и§ҶеӣҫпјҢиҝҷдәӣи§ҶеӣҫжҳҜз»§жүҝиҮӘ\
    \ `View` зұ»зҡ„жҺ§д»¶гҖӮ\n\n![A978-1-4842-0214-2_2_Fig5_HTML.jpg](img/A978-1-4842-0214-2_2_Fig5_HTML.jpg)\n\
    \nеӣҫ 2-5. Xamarin.Forms еұҸе№•дёҠзҡ„йЎөйқўгҖҒеёғеұҖе’Ңи§Ҷеӣҫ\n\n### йЎөйқў\n\n`Page` зұ»жҳҜеә”з”ЁдёӯжҜҸдёӘдё»еұҸе№•зҡ„дё»иҰҒе®№еҷЁгҖӮ`Page`\
    \ жҙҫз”ҹиҮӘ `Xamarin.Forms.VisualElement`пјҢжҳҜеҲӣе»әе…¶д»–йЎ¶зә§ UI зұ»зҡ„еҹәзұ»гҖӮд»ҘдёӢжҳҜдё»иҰҒзҡ„йЎөйқўзұ»еһӢпјҡ\n\n- `ContentPage`\n\
    - `MasterDetailPage`\n- `NavigationPage`\n- `TabbedPage`\n- `CarouselPage`\n\n\
    йҷӨдәҶдҪңдёәеёғеұҖе’Ңи§Ҷеӣҫзҡ„е®№еҷЁеӨ–пјҢйЎөйқўиҝҳжҸҗдҫӣдәҶдё°еҜҢзҡ„йў„еҲ¶еұҸе№•иҸңеҚ•пјҢе…·еӨҮеҢ…жӢ¬еҜјиҲӘе’ҢжүӢеҠҝе“Қеә”еңЁеҶ…зҡ„жңүз”ЁеҠҹиғҪгҖӮжӣҙеӨҡеҶ…е®№иҜ·еҸӮи§Ғз¬¬ 6 з« гҖӮ\n\n### еёғеұҖ\n\nи§Ҷеӣҫз”ұе…¶е®№еҷЁзұ»\
    \ `Layout` ж”ҫзҪ®е’Ңи°ғж•ҙеӨ§е°ҸгҖӮеёғеұҖжңүеӨҡз§Қзұ»еһӢпјҢе…·жңүдёҚеҗҢзҡ„и§Ҷеӣҫж јејҸеҢ–зү№жҖ§гҖӮиҝҷдәӣе®№еҷЁе…Ғи®ёи§ҶеӣҫиҝӣиЎҢзІҫзЎ®жҲ–жқҫж•Јзҡ„ж јејҸеҢ–пјҢеҸҜд»ҘеҹәдәҺеқҗж Үзі»з»қеҜ№е®ҡдҪҚпјҢд№ҹеҸҜд»ҘзӣёеҜ№дәҺеҪјжӯӨе®ҡдҪҚгҖӮеёғеұҖжҳҜйЎөйқўзҡ„иҪҜз»„з»ҮпјҢжҳҜе°ҶйЎөйқўдёӯеҸҜи§Ғзҡ„е®һдҪ“йғЁеҲҶпјҲи§Ҷеӣҫпјүз»“еҗҲеңЁдёҖиө·зҡ„вҖңиҪҜйӘЁвҖқгҖӮд»ҘдёӢжҳҜдё»иҰҒзҡ„еёғеұҖзұ»еһӢпјҡ\n\
    \n- `StackLayout`\n- `AbsoluteLayout`\n- `RelativeLayout`\n- `Grid`\n- `ScrollView`\n\
    - `Frame`\n- `ContentView`\n\nеёғеұҖзҡ„ `Content` е’Ң/жҲ– `Children` еұһжҖ§еҢ…еҗ«е…¶д»–еёғеұҖе’Ңи§ҶеӣҫгҖӮж°ҙе№іе’ҢеһӮзӣҙеҜ№йҪҗйҖҡиҝҮ\
    \ `HorizontalOptions` е’Ң `VerticalOptions` еұһжҖ§и®ҫзҪ®гҖӮеёғеұҖдёӯзҡ„иЎҢгҖҒеҲ—е’ҢеҚ•е…ғж јеҸҜд»Ҙж·»еҠ й—ҙи·қпјҢеҸҜд»Ҙжү©еұ•д»ҘеЎ«е……еҸҜз”Ёз©әй—ҙпјҢд№ҹеҸҜд»Ҙж”¶зј©д»ҘйҖӮеә”е…¶еҶ…е®№гҖӮдёӢдёҖз« е°ҶиҜҰз»Ҷд»Ӣз»ҚеёғеұҖгҖӮ\n\
    \n> **жҸҗзӨәпјҡ** Xamarin.Forms зҡ„еёғеұҖз»§жүҝиҮӘ `View` зұ»пјҢеӣ жӯӨйЎөйқўдёӯеҢ…еҗ«зҡ„жүҖжңүеҶ…е®№е®һйҷ…дёҠйғҪжҳҜжҹҗз§ҚеҪўејҸзҡ„и§ҶеӣҫгҖӮ\n\n### и§Ҷеӣҫ\n\
    \nи§ҶеӣҫжҳҜжҺ§д»¶пјҢжҳҜйЎөйқўдёҠеҸҜи§Ғдё”еҸҜдәӨдә’зҡ„е…ғзҙ гҖӮиҢғеӣҙж¶өзӣ–д»ҺжҢүй’®гҖҒж Үзӯҫе’Ңж–Үжң¬жЎҶзӯүеҹәжң¬и§ҶеӣҫпјҢеҲ°еҲ—иЎЁе’ҢеҜјиҲӘзӯүжӣҙй«ҳзә§зҡ„и§ҶеӣҫгҖӮи§ҶеӣҫеҢ…еҗ«еҶіе®ҡе…¶еҶ…е®№гҖҒеӯ—дҪ“гҖҒйўңиүІе’ҢеҜ№йҪҗж–№ејҸзҡ„еұһжҖ§гҖӮж°ҙе№іе’ҢеһӮзӣҙеҜ№йҪҗйҖҡиҝҮ\
    \ `HorizontalOptions` е’Ң `VerticalOptions` еұһжҖ§и®ҫзҪ®гҖӮдёҺеёғеұҖзұ»дјјпјҢи§ҶеӣҫеҸҜд»Ҙж·»еҠ й—ҙи·қпјҢеҸҜд»Ҙжү©еұ•д»ҘеЎ«е……еҸҜз”Ёз©әй—ҙпјҢд№ҹеҸҜд»Ҙж”¶зј©д»ҘйҖӮеә”е…¶еҶ…е®№гҖӮжң¬з« зЁҚеҗҺжҲ‘д»¬е°Ҷзј–еҶҷдёҖдәӣи§Ҷеӣҫзҡ„д»Јз ҒпјҢз„¶еҗҺеңЁз¬¬\
    \ 4 з« еҸҠе…Ёд№ҰеҗҺз»ӯз« иҠӮдёӯеҶҚж¬Ўд»Ӣз»Қе®ғд»¬гҖӮд»ҘдёӢжҳҜжҢүеҠҹиғҪеҲҶз»„зҡ„дё»иҰҒи§Ҷеӣҫпјҡ\n\n- **еҹәжң¬и§Ҷеӣҫ вҖ“ еҹәзЎҖи§Ҷеӣҫ**\n  - `Label`\n  - `Image`\n\
    \  - `Button`\n  - `BoxView`\n- **еҲ—иЎЁ вҖ“ еҲӣе»әеҸҜж»ҡеҠЁгҖҒеҸҜйҖүжӢ©зҡ„еҲ—иЎЁ**\n  - `ListView`\n- **ж–Үжң¬иҫ“е…Ҙ\
    \ вҖ“ з”ЁжҲ·йҖҡиҝҮй”®зӣҳиҫ“е…Ҙж–Үжң¬еӯ—з¬ҰдёІ**\n  - `Entry`\n  - `Editor`\n- **йҖүжӢ© вҖ“ з”ЁжҲ·д»ҺеӨҡз§Қеӯ—ж®өдёӯйҖүжӢ©**\n  - `Picker`\n\
    \  - `DatePicker`\n  - `TimePicker`\n  - `Stepper`\n  - `Slider`\n  - `Switch`\n\
    - **з”ЁжҲ·еҸҚйҰҲ вҖ“ йҖҡзҹҘз”ЁжҲ·еә”з”ЁеӨ„зҗҶзҠ¶жҖҒ**\n  - `ActivityIndicator`\n  - `ProgressBar`\n\n> **жҸҗзӨәпјҡ**\
    \ жіЁж„ҸдёҚиҰҒе°Ҷ Xamarin.Forms зҡ„ `View` зұ»дёҺиЎЁзӨәеұҸе№•жҲ–иЎЁзӨәеұӮзҡ„ view ж··ж·ҶгҖӮжӯӨеӨ–пјҢiOS е°ҶеұҸе№•з§°дёә viewsгҖӮ\n\n## еҲӣе»ә\
    \ Xamarin.Forms и§ЈеҶіж–№жЎҲ\n\nXamarin жҸҗдҫӣдәҶеҢ…еҗ«еҲӣе»ә Xamarin.Forms еә”з”ЁжүҖйңҖйЎ№зӣ®зҡ„жЁЎжқҝгҖӮдёҖдёӘи·Ёе№іеҸ°и§ЈеҶіж–№жЎҲйҖҡеёёеҢ…еҗ«д»ҘдёӢйЎ№зӣ®пјҡ\n\
    \n- **Xamarin.Forms**пјҡз”ұе№іеҸ°зү№е®ҡйЎ№зӣ®и°ғз”Ёзҡ„и·Ёе№іеҸ° UI д»Јз ҒгҖӮиҝҷеҸҜд»ҘйҖҡиҝҮдҪҝз”Ёе…ұдә«йЎ№зӣ®гҖҒеҸҜз§»жӨҚзұ»еә“ (PCL) жҲ–е…ұдә«ж–Үд»¶жқҘе®һзҺ°гҖӮжң¬з« жҲ‘д»¬е°ҶеҲӣе»әзҡ„зӨәдҫӢдҪҝз”Ё\
    \ PCLгҖӮ\n- **Xamarin.Android**пјҡAndroid зү№е®ҡд»Јз ҒпјҢеҢ…жӢ¬ Android йЎ№зӣ®еҗҜеҠЁгҖӮ\n- **Xamarin.iOS**пјҡiOS\
    \ зү№е®ҡд»Јз ҒпјҢеҢ…жӢ¬ iOS йЎ№зӣ®еҗҜеҠЁгҖӮ\n- **Windows Phone еә”з”ЁзЁӢеәҸ**пјҡWindows Phone зү№е®ҡд»Јз ҒпјҢеҢ…жӢ¬ Windows Phone\
    \ йЎ№зӣ®еҗҜеҠЁгҖӮ\n- **ж ёеҝғеә“**пјҡе…ұдә«зҡ„еә”з”ЁйҖ»иҫ‘пјҢеҰӮдёҡеҠЎйҖ»иҫ‘е’Ңж•°жҚ®и®ҝй—®еұӮпјҢдҪҝз”Ё PCL жҲ–е…ұдә«йЎ№зӣ®гҖӮ\n\nеӣҫ 2-6 жҳҫзӨәдәҶ Xamarin.Forms\
    \ и§ЈеҶіж–№жЎҲдёӯйҖҡеёёеҢ…еҗ«зҡ„дё»иҰҒйЎ№зӣ®гҖӮ\n\n![A978-1-4842-0214-2_2_Fig6_HTML.jpg](img/A978-1-4842-0214-2_2_Fig6_HTML.jpg)\n\
    \nеӣҫ 2-6. Xamarin.Forms и§ЈеҶіж–№жЎҲ\n\n> **жҸҗзӨәпјҡ** ж ёеҝғеә“йЎ№зӣ®дёҚдјҡз”ұи§ЈеҶіж–№жЎҲжЁЎжқҝиҮӘеҠЁж·»еҠ пјҢеҝ…йЎ»жүӢеҠЁеҲӣе»әпјҢеҸҜд»ҘжҳҜе…ұдә«йЎ№зӣ®жҲ– PCLгҖӮеҰӮжһңжӮЁеҲҡејҖе§ӢжҺҘи§Ұ\
    \ Xamarin.FormsпјҢеҸҜд»ҘжҡӮж—¶и·іиҝҮж ёеҝғеә“пјҢе°ҶжүҖжңүе…ұдә«ж–Үд»¶ж”ҫеңЁ Xamarin.Forms йЎ№зӣ®дёӯгҖӮ\n\nи®©жҲ‘д»¬еҲӣе»әдёҖдёӘз®ҖеҚ•зҡ„жј”зӨәеә”з”ЁпјҢд»Ҙеё®еҠ©жҲ‘д»¬жҺўзҙў\
    \ Xamarin.Forms зҡ„еҹәзЎҖеҸҠе…¶и®ёеӨҡеёёз”ЁеҠҹиғҪгҖӮ\n\nеҲӣе»әдёҖдёӘ Xamarin.Forms и§ЈеҶіж–№жЎҲгҖӮеңЁ Visual Studio дёӯпјҢеҲӣе»әж–°и§ЈеҶіж–№жЎҲе№¶йҖүжӢ©йЎ№зӣ®зұ»еһӢ\
    \ C# вһӨ Mobile Apps вһӨ Blank App (Xamarin.Forms Portable)гҖӮеңЁ Xamarin Studio дёӯпјҢйҖүжӢ©йЎ№зӣ®зұ»еһӢ\
    \ C# вһӨ Mobile Apps вһӨ Blank App (Xamarin.Forms Portable)гҖӮе°Ҷе…¶е‘ҪеҗҚдёә `FormsExample`гҖӮ\n\
    \nиҝҷе°ҶеҲӣе»әеӨҡдёӘйЎ№зӣ®пјҡдёҖдёӘз”ЁдәҺ Xamarin.Forms д»Јз ҒпјҢд»ҘеҸҠе№іеҸ°зү№е®ҡйЎ№зӣ®пјҢеҢ…жӢ¬ AndroidгҖҒiOS е’Ң/жҲ– Windows PhoneгҖӮеҸҜз”Ёзҡ„е№іеҸ°зү№е®ҡйЎ№зӣ®еҸ–еҶідәҺжӮЁдҪҝз”Ёзҡ„жҳҜ\
    \ PC иҝҳжҳҜ MacгҖҒдҪҝз”Ёзҡ„жҳҜ Visual Studio иҝҳжҳҜ Xamarin StudioпјҢд»ҘеҸҠжӮЁжӢҘжңүзҡ„и®ёеҸҜиҜҒгҖӮдҪҝз”Ё Xamarin Studio зҡ„\
    \ Mac дјҡз”ҹжҲҗдёҖдёӘ iOS йЎ№зӣ®е’ҢдёҖдёӘ Android йЎ№зӣ®гҖӮдҪҝз”Ё Xamarin Studio зҡ„ PC дјҡз”ҹжҲҗ Android йЎ№зӣ®гҖӮеңЁ Xamarin\
    \ Studio дёӯеҲӣе»әзҡ„и§ЈеҶіж–№жЎҲдёҚеҢ…еҗ« Windows Phone йЎ№зӣ®пјҢеӣ дёәеҲӣе»әиҜҘйЎ№зӣ®йңҖиҰҒ Visual StudioпјҢе°Ҫз®ЎеңЁ Visual Studio\
    \ дёӯеҲӣе»әзҡ„йЎ№зӣ®еҸҜд»ҘеңЁ Xamarin Studio дёӯжөҸи§ҲдҪҶж— жі•еңЁжӯӨзј–иҜ‘гҖӮеҰӮжһң PC дёҠе®үиЈ…дәҶ Visual Studio е№¶дё”еҗҢж—¶жҝҖжҙ»дәҶ iOS е’Ң Android\
    \ и®ёеҸҜиҜҒпјҢеҲҷдјҡеҲӣе»әеӣӣдёӘйЎ№зӣ®пјҡдёҖдёӘ PCL е’ҢдёүдёӘе№іеҸ°еҗ„дёҖдёӘйЎ№зӣ®гҖӮ\n\n> **жҸҗзӨәпјҡ** Xamarin.Forms зӣ®еүҚйҖӮз”ЁдәҺйҷӨ Starter и®ёеҸҜиҜҒеӨ–зҡ„жүҖжңүи®ёеҸҜиҜҒгҖӮжӮЁйңҖиҰҒиҙӯд№°\
    \ Indie жҲ–жӣҙй«ҳзә§еҲ«зҡ„и®ёеҸҜиҜҒпјҢжҲ–дҪҝз”ЁиҜ•з”Ёи®ёеҸҜиҜҒжүҚиғҪдҪҝз”Ё Xamarin.FormsгҖӮ\n\nжӣҙеӨҡе…ідәҺ PCLгҖҒе…ұдә«йЎ№зӣ®е’Ңе…¶д»–и·Ёе№іеҸ°и§ЈеҶіж–№жЎҲжһ¶жһ„йҖүйЎ№зҡ„еҶ…е®№пјҢиҜ·еҸӮи§Ғз¬¬\
    \ 9 з« гҖӮ\n\nд»ҘдёӢеҗ„иҠӮд»Ӣз»ҚдәҶи§ЈеҶіж–№жЎҲдёӯзҡ„жҜҸдёӘйЎ№зӣ®еҸҠе…¶еҢ…еҗ«зҡ„д»Јз ҒгҖӮ\n"
- fmt: "### Xamarin.Forms Shared Code\n\nWhen using Visual Studio, the Xamarin.Forms\
    \ shared code project contains `App.cs` (Listing [2-1](#A978-1-4842-0214-2_2_Chapter.html#FPar12)),\
    \ which defines and returns the main page of the app. Xamarin.Forms 1.3 introduced\
    \ the `Application` object which serves as the base class of `App` and provides\
    \ the `MainPage` property as well as life cycle events `OnStart`, `OnSleep`, and\
    \ `OnResume`.\n\n**Tip:** When using Xamarin Studio, the name of the file in Listing\
    \ [2-1](#A978-1-4842-0214-2_2_Chapter.html#FPar12) is the same as your project\
    \ name, `FormsExample.cs` in this case.\n\n**Listing 2-1.** `App.cs` in the FormsExample\
    \ project\n\n```\nnamespace FormsExample\n{\n    public class App : Application\n\
    \    {\n        public App()\n        {\n            MainPage = new ContentPage\n\
    \            {\n                Content = new StackLayout\n                {\n\
    \                    VerticalOptions = LayoutOptions.Center,\n               \
    \     Children = {\n                        new Label {\n                    \
    \        XAlign = TextAlignment.Center,\n                            Text = \"\
    Welcome to Xamarin Forms!\"\n                        }\n                    }\n\
    \                }\n            };\n        }\n\n        protected override void\
    \ OnStart()\n        {\n        }\n\n        protected override void OnSleep()\n\
    \        {\n        }\n\n        protected override void OnResume()\n        {\n\
    \        }\n    }\n}\n```\n\nEach platform-specific project creates an instance\
    \ of `App` to set the main page, in this case a `ContentPage` object with its\
    \ `Content` property populated with a friendly `Label`, centered horizontally\
    \ and vertically. The `Content` property only holds one child view. Multiple views\
    \ must be contained within a child `Layout`, a container for views, or using a\
    \ `ContentPage`. The `MainPage` property is set to the root page of the application\
    \ using an inline `ContentPage` class.\n\nSoon we will replace this `ContentPage`\
    \ with our own `ContentPage` class and place controls on it.\n\n**Tip:** A static\
    \ `Application.Current` property references the current application object anywhere\
    \ in your app.\n\nThe `OnStart`, `OnSleep`, and `OnResume` method overrides created\
    \ for us are used to manage our app when it is moved to and from the background.\n\
    \n#### Application Lifecycle Methods: `OnStart`, `OnSleep`, and `OnResume`\n\n\
    When the user clicks the `Back` or `Home` (or `App Switcher`) buttons on their\
    \ device, an app moves into the background. When they reselect the app again,\
    \ it resumes and moves back into the foreground. The starting of an app, the progression\
    \ of the app from the foreground into a background state then back into the foreground\
    \ again, until termination, is called the application lifecycle. The `Application`\
    \ class includes three virtual methods to handle lifecycle events:\n\n* `OnStart`\
    \ вҖ“ Called when the app is first started\n* `OnSleep` вҖ“ Called each time the app\
    \ is moved into the background\n* `OnResume` вҖ“ Called when the app is resumed\
    \ after being in the background\n\n`OnSleep` is also used for normal application\
    \ termination (not a crash). Any time an app moves into a background state, it\
    \ must be assumed that it may never return from that state.\n\n**Tip:** Use the\
    \ `Properties` dictionary for disk persistence in these methods when an app is\
    \ backgrounded. See [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html) for more on\
    \ State Management.\n\n#### Building Pages Using `ContentPage`\n\nThe `ContentPage`\
    \ class in `App.cs` (Listing [2-1](#A978-1-4842-0214-2_2_Chapter.html#FPar12)),\
    \ inherited from `Xamarin.Forms.Page`, is the generic page used in Xamarin.Forms\
    \ when a page is custom-built. It contains one child, assigned to its `Content`\
    \ property, such as the preceding `Label`. Placing multiple controls on a `ContentPage`\
    \ requires the use of a custom class inherited from `ContentPage`, which contains\
    \ a container such as a `Layout`.\n\n`ContentPage` has properties that affect\
    \ the appearance of the page. The `Padding` property creates space around the\
    \ margins of the page to improve readability and design. `BackgroundImage` can\
    \ contain an image that is displayed on the background of the page.\n\nSeveral\
    \ of `ContentPage`'s members are useful for navigation and state management. The\
    \ `Title` property contains text and the `Icon` property contains an image that\
    \ display at the top of the page when `NavigationPage` is implemented. Lifecycle\
    \ methods `OnAppearing` and `OnDisappearing` can be overridden to handle initialization\
    \ and finalization of a `ContentPage`. The `ToolBarItems` property is useful for\
    \ creating a drop-down menu. All of these navigation-related members are covered\
    \ in [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).\n\n### Xamarin.Android\n\
    \nandroid\n\nThe Android project contains a startup file called `MainActivity.cs`,\
    \ which defines an activity class inherited from `Xamarin.Forms.Platform.Android.FormsApplicationActivity`\
    \ as seen in Listing [2-2](#A978-1-4842-0214-2_2_Chapter.html#FPar16).\n\n**Listing\
    \ 2-2.** `MainActivity.cs` in the FormsExample.Droid project\n\n```\nnamespace\
    \ FormsExample.Droid\n{\n    [Activity(Label = \"FormsExample\", Icon = \"@drawable/icon\"\
    , MainLauncher = true, ConfigurationChanges = ConfigChanges.ScreenSize | ConfigChanges.Orientation)]\n\
    \    public class MainActivity : global::Xamarin.Forms.Platform.Android.FormsApplicationActivity\n\
    \    {\n        protected override void OnCreate(Bundle bundle)\n        {\n \
    \           base.OnCreate(bundle);\n            global::Xamarin.Forms.Forms.Init(this,\
    \ bundle);\n            LoadApplication(new App());\n        }\n    }\n}\n```\n\
    \nIn the `OnCreate` method, Xamarin.Forms is initialized and `LoadApplication`\
    \ sets `App` as the current page.\n\n### Xamarin.iOS\n\ni OS\n\nThe iOS project\
    \ contains a startup file called `AppDelegate` (Listing [2-3](#A978-1-4842-0214-2_2_Chapter.html#FPar17))\
    \ which inherits from `Xamarin.Forms.Platform.iOS.FormsApplicationDelegate`.\n\
    \n**Listing 2-3.** `AppDelegate.cs` in the FormsExample.iOS project\n\n```\nnamespace\
    \ FormsExample.iOS\n{\n        [Register(\"AppDelegate\")]\n        public partial\
    \ class AppDelegate : global::Xamarin.Forms.Platform.iOS.FormsApplicationDelegate\n\
    \        {\n            public override bool FinishedLaunching(UIApplication app,\
    \ NSDictionary options)\n            {\n                global::Xamarin.Forms.Forms.Init();\n\
    \                LoadApplication(new App());\n                return base.FinishedLaunching(app,\
    \ options);\n            }\n        }\n}\n```\n\nXamarin.Forms is initialized\
    \ in the `Init()` method and `LoadApplication` sets `App` as the current page.\n\
    \n### Windows Phone Application\n\nwindows\n\nThe Windows Phone project contains\
    \ a `Mainpage.xaml.cs` class (Listing [2-4](#A978-1-4842-0214-2_2_Chapter.html#FPar20))\
    \ which inherits from `Xamarin.Forms.Platform.WinPhone.FormsApplicationPage`:\n\
    \n**Listing 2-4.** `MainPage.xaml.cs` in the WinPhone project\n\n```\nnamespace\
    \ FormsExample.WinPhone\n{\npublic partial class MainPage : global::Xamarin.Forms.Platform.WinPhone.FormsApplicationPage\n\
    {\npublic MainPage()\n{\nInitializeComponent();\nSupportedOrientations = SupportedPageOrientation.PortraitOrLandscape;\n\
    global::Xamarin.Forms.Forms.Init();\nLoadApplication(new FormsExample.App());\n\
    }\n}\n}\n```\n\nXamarin.Forms is initialized in the `Init()` method and `LoadApplication`\
    \ sets Xamarin.Forms `App` as the current page.\n\n**Note:** Since Windows Phone\
    \ applications have their own `App` class, use of the application namespace is\
    \ good practice when referencing the Xamarin.Forms `App` object.\n\nWindows Phone\
    \ apps also require a reference in the `MainPage.xaml`.\n\n```\n<winPhone:FormsApplicationPage\n\
    ...\n```"
  raw: '### Xamarin.Forms Shared Code


    When using Visual Studio, the Xamarin.Forms shared code project contains `App.cs`
    (Listing [2-1](#A978-1-4842-0214-2_2_Chapter.html#FPar12)), which defines and
    returns the main page of the app. Xamarin.Forms 1.3 introduced the `Application`
    object which serves as the base class of `App` and provides the `MainPage` property
    as well as life cycle events `OnStart`, `OnSleep`, and `OnResume`.


    Tip


    When using Xamarin Studio, the name of the file in Listing [2-1](#A978-1-4842-0214-2_2_Chapter.html#FPar12)
    is the same as your project name, `FormsExample.cs` in this case.


    Listing 2-1\. App.cs in the FormsExample project


    `namespace FormsExample`


    `{`


    В В В В `public class App : Application`


    В В В В `{`


    В В В В В В В В `public App()`


    В В В В В В В В `{`


    В В В В В В В В В В В В `MainPage = new ContentPage`


    В В В В В В В В В В В В `{`


    В В В В В В В В В В В В В В В В `Content = new StackLayout`


    В В В В В В В В В В В В В В В В `{`


    В В В В В В В В В В В В В В В В В В В В `VerticalOptions = LayoutOptions.Center,`


    В В В В В В В В В В В В В В В В В В В В `Children = {`


    В В В В В В В В В В В В В В В В В В В В В В В В `new Label {`


    В В В В В В В В В В В В В В В В В В В В В В В В В В В В `XAlign = TextAlignment.Center,`


    В В В В В В В В В В В В В В В В В В В В В В В В В В В В `Text = "Welcome to Xamarin Forms!"`


    В В В В В В В В В В В В В В В В В В В В В В В В `}`


    В В В В В В В В В В В В В В В В В В В В `}`


