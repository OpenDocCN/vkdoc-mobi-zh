    7-1.  Trivial data binding populates the target with an initial source value  Change
    the entry value to something else and click the button to see the data binding
    in action, as shown in Figure [7-2](#A978-1-4842-0214-2_7_Chapter.html#Fig2).    ![A978-1-4842-0214-2_7_Fig2_HTML.jpg](A978-1-4842-0214-2_7_Fig2_HTML.jpg)    Figure
    7-2.  The data-bound Entry view changes the Item property when edited  The data
    model was automatically updated by the userвҖҷs change to the `Entry` viewвҖҷs `Text`
    property.    The `BindingContext` used here is at the page level. This could just
    as easily have been set at the view level:    В В В В `titleEntry.BindingContext =
    item;`    On pages with multiple views that require separate bindings, set `BindingContext`
    at the view level.  Tip  If you want to see the limitations of trivial binding
    firsthand (not using `INotifyPropertyChanged`), put the following line of code
    into your `button.Clicked` event. When you click the button, youвҖҷll see that the
    UI is not updated by this change to the data model.    В В В В `item.Title = "Trivial
    binding";`    All of the previous examples are trivial data-binding examples;
    the data model and variables will reflect changes to the UI. In order for the
    UI to be refreshed from the data model, you will need to use the `INotifyPropertyChanged`
    interface to implement nontrivial data binding.    ### Using INotifyPropertyChanged    xamarin.forms    `INotifyPropertyChanged`
    is a .NET interface used to notify binding clients that a property value has changed.
    Use `INotifyPropertyChanged` when your data-bound UI must refresh to reflect changes
    to the data model in real time (above and beyond just displaying the initial data
    in the UI).    Here is the definition of the `INotifyPropertyChanged` interface:    В В В В `public
    interface INotifyPropertyChanged`    В В В В `{`    В В В В В В В В `event PropertyChangedEventHandler
    PropertyChanged;`    В В В В `}`    Implement `INotifyPropertyChanged` in a view model
    (or ViewModel), a class built to serve data to a particular screen. The `INotifyPropertyChanged`
    interface is found in the `System.ComponentModel` namespace, and the `CallerMemberName`
    attribute resides in the `System.Runtime.CompilerServices` namespace, so remember
    to add them to your class:    В В В В `using System.ComponentModel;`    В В В В `using
    System.Runtime.CompilerServices;`    Implement `INotifyPropertyChanged` to create
    a simple view model with one property called `Title`, as shown in Listing [7-4](#A978-1-4842-0214-2_7_Chapter.html#FPar8).
    The `Set` accessor on the `Title` property invokes the `OnPropertyChanged` event
    to notify the UI of a data change so it can refresh.  Listing 7-4. INotifyPropertyChanged
    Implementation in a View Model in TitleViewModel.cs  В В В В `public class TitleViewModel
    : INotifyPropertyChanged`    В В В В `{`    В В В В В В В В `public event PropertyChangedEventHandler
    PropertyChanged;`    В В В В В В В В `String title;`    В В В В В В В В `public string Title`    В В В В В В В В `{`    В В В В В В В В В В В В `set`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `if
    (!value.Equals(title, StringComparison.Ordinal))`    В В В В В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В В В В В `title
    = value;`    В В В В В В В В В В В В В В В В В В В В `OnPropertyChanged("Title");`    В В В В В В В В В В В В В В В В `}`    В В В В В В В В В В В В `}`    В В В В В В В В В В В В `get`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `return
    title;`    В В В В В В В В В В В В `}`    В В В В В В В В `}`    В В В В В В В В `void OnPropertyChanged([CallerMemberName]
    string propertyName = null)`    В В В В В В В В `{`    В В В В В В В В В В В В `var handler = PropertyChanged;`    В В В В В В В В В В В В `if
    (handler != null)`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `handler(this, new PropertyChangedEventArgs(propertyName));`    В В В В В В В В В В В В `}`    В В В В В В В В `}`    В В В В `}`    When
    the `Title` property is set, a call is made to the `OnPropertyChanged` event to
    fire, with the calling property passed in by the `[CallerMemberName]` attribute.
    The `PropertyChangedEventHandler` event is the Xamarin.Forms mechanism for notifying
    the view that is bound to that property to refresh and reflect the updated data
    model.    Note that this simplified approach does not use the `Item` data model.
    YouвҖҷll do that soon.    Back in your `ContentPage`, update the binding:    В В В В `var
    titleViewModel = new TitleViewModel();`    В В В В `titleViewModel.Title = "First";`    В В В В `this.BindingContext
    = titleViewModel;`    Since the property name (`Title`) hasnвҖҷt changed, `SetBinding`
    remains basically the same as the previous example. So you can see how the method
    is working, here I use an alternative overload of `SetBinding`, which takes a
    `Binding` object, `new Binding("Title")`, instead of just a `"Title"` string.    В В В В `titleEntry.SetBinding(Entry.TextProperty,
    new Binding("Title"));`    In your `buttonDisplay.Clicked` event, change the display
    property to `titleViewModel.Title`.    Add a button to modify the data modelвҖҷs
    property and demonstrate the nontrivial data binding:    В В В В `Button buttonUpdate
    = new Button`    В В В В `{`    В В В В В В В В `Text = "Update the Data Model",`    В В В В В В В В `FontSize
    = Device.GetNamedSize(NamedSize.Large, typeof(Button)),`    В В В В В В В В `HorizontalOptions
    = LayoutOptions.Center,`    В В В В В В В В `VerticalOptions = LayoutOptions.Fill`    В В В В `};`    В В В В `buttonUpdate.Clicked
    += async (sender, args) =>`    В В В В `{`    В В В В В В В В `titleViewModel.Title = "Data
    Model Updated";`    В В В В В В В В `await DisplayAlert("Item Object", "Title property:"
    + titleViewModel.Title.ToString(), "OK");`    В В В В `};`    Remember to add the
    new button to `StackLayout`:    В В В В `Content = new StackLayout`    В В В В `{`    В В В В В В В В `Children
    = { titleEntry, buttonDisplay, buttonUpdate }`    В В В В `};`    Figure [7-3](#A978-1-4842-0214-2_7_Chapter.html#Fig3)
    shows the updated `ContentPage`.    ![A978-1-4842-0214-2_7_Fig3_HTML.jpg](A978-1-4842-0214-2_7_Fig3_HTML.jpg)    Figure
    7-3.  ContentPage for nontrivial data binding  Click `buttonUpdate` to change
    the `Title` property and see that change propagated back into the `Entry` view
    (Figure [7-4](#A978-1-4842-0214-2_7_Chapter.html#Fig4)).    ![A978-1-4842-0214-2_7_Fig4_HTML.jpg](A978-1-4842-0214-2_7_Fig4_HTML.jpg)    Figure
    7-4.  The Entry view has refreshed to match the model.  ### CODE COMPLETE: Using
