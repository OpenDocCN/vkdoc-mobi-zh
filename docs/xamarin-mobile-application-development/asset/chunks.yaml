    # зҗҶи§Је№іеҸ°зү№е®ҡ UI ж–№жі•


    еңЁ Xamarin.Forms еҮәзҺ°д№ӢеүҚпјҢеӯҳеңЁе№іеҸ°зү№е®ҡпјҲжҲ–з§°еҺҹз”ҹпјүUI йҖүйЎ№пјҢе…¶дёӯеҢ…жӢ¬ Xamarin.AndroidгҖҒXamarin.iOS е’Ң Windows
    Phone SDK еә“гҖӮдҪҝз”Ёе№іеҸ°зү№е®ҡ UI жһ„е»әеұҸе№•йңҖиҰҒеҜ№иҝҷдәӣеә“жүҖжҡҙйңІзҡ„еҺҹз”ҹ UI жңүдёҖе®ҡдәҶи§ЈгҖӮжҲ‘д»¬ж— йңҖзӣҙжҺҘдҪҝз”Ё iOS UIKit жҲ– Android SDK
    иҝӣиЎҢзј–з ҒпјҢеӣ дёәйҖҡиҝҮ Xamarin еңЁ C# дёӯзҡ„з»‘е®ҡжңәеҲ¶пјҢжҲ‘д»¬дҪҚдәҺе…¶дёҠеұӮгҖӮиҖҢдҪҝз”Ё Windows Phone SDK еҲҷжҳҜеңЁ C# дёӯзӣҙжҺҘй’ҲеҜ№ Windows
    Phone SDKпјҲдёҖдёӘ C# еә“пјүиҝӣиЎҢеҺҹз”ҹзј–з ҒгҖӮдҪҝз”Ё Xamarin е№іеҸ°зү№е®ҡ UI зҡ„дјҳеҠҝеңЁдәҺпјҢиҝҷдәӣеә“жҲҗзҶҹдё”еҠҹиғҪе®Ңе–„гҖӮжҜҸдёӘеҺҹз”ҹжҺ§д»¶е’Ңе®№еҷЁзұ»йғҪжӢҘжңүеӨ§йҮҸеұһжҖ§е’Ңж–№жі•пјҢиҖҢ
    Xamarin зҡ„з»‘е®ҡжңәеҲ¶зӣҙжҺҘжҡҙйңІдәҶе…¶дёӯи®ёеӨҡеҠҹиғҪгҖӮ


    **жіЁж„Ҹпјҡ** жӯӨеӨ„и®Ёи®әзҡ„дёҚжҳҜзӣҙжҺҘдҪҝз”Ё Objective-C жҲ– Java иҝӣиЎҢеҺҹз”ҹ UI ејҖеҸ‘пјҢиҖҢжҳҜйҖҡиҝҮ Xamarin C# е№іеҸ°зү№е®ҡз»‘е®ҡжқҘдҪҝз”ЁеҺҹз”ҹ
    UI еә“гҖӮдёәйҒҝе…Қж··ж·ҶпјҢжң¬д№ҰеңЁжҢҮд»Ј Xamarin еә“ж—¶еҒҸеҘҪдҪҝз”ЁжңҜиҜӯ*е№іеҸ°зү№е®ҡ*иҖҢйқһ*еҺҹз”ҹ*пјҢдҪҶ Xamarin ејҖеҸ‘иҖ…жңүж—¶д№ҹдјҡз”Ё*еҺҹз”ҹ*жқҘжҢҮд»ЈдҪҝз”Ё `Xamarin.iOS`
