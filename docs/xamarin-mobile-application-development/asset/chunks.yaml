    = listItems[indexPath.Row].Title;`    В В В В `cell.DetailTextLabel.Text = listItems[indexPath.Row].Description;`    В В В В `cell.ImageView.Image
    = UIImage.FromFile("Images/" + listItems[indexPath.Row].ImageName);`    An `ImageName`
    string field must be added to the `ListItems` data model and populated in order
