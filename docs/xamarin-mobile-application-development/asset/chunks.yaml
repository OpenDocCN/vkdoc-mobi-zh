    \ еёғеұҖ\n\nAndroid еёғеұҖз»§жүҝиҮӘ `ViewGroup` зұ»пјҢе№¶дё”еҸҜд»ҘеҢ…еҗ«и§ҶеӣҫжҲ–е…¶д»–еёғеұҖгҖӮAndroid еёғеұҖеҢ…жӢ¬д»ҘдёӢеҶ…е®№пјҡ\n\n*   `LinearLayout`пјҡеһӮзӣҙжҲ–ж°ҙе№іжҺ’еҲ—еӯҗи§Ҷеӣҫ\n\
    *   `RelativeLayout`пјҡдҪҝз”ЁеңЁе…ғзҙ д№Ӣй—ҙеҲӣе»әе…ізі»зҡ„зәҰжқҹжқҘе®ҡд№үеӯҗи§Ҷеӣҫзҡ„дҪҚзҪ®е’ҢеӨ§е°Ҹ\n*   `TableLayout`пјҡеҲӣе»әдёҖдёӘзұ»дјјиЎЁж јзҡ„е®№еҷЁпјҢе…·жңүиЎҢе’ҢеҲ—жқҘе®№зәіи§Ҷеӣҫ\n\
    *   `GridLayout`пјҡеҲӣе»әеҸҰдёҖдёӘзұ»дјјиЎЁж јзҡ„е®№еҷЁпјҢе…·жңүиЎҢе’ҢеҲ—жқҘе®№зәіи§ҶеӣҫпјҢе№¶жҸҗдҫӣеҮ дёӘз”ЁдәҺи§ҶеӣҫжөҒзҡ„йҖүйЎ№пјҡиЎҢдјҳе…ҲгҖҒеҲ—дјҳе…ҲжҲ–зү№е®ҡиЎҢ/еҲ—еҲҶй…Қ\n*   `FrameLayout`пјҡеһӮзӣҙжҺ’еҲ—еӯҗи§ҶеӣҫпјҢе№¶жҸҗдҫӣеөҢеҘ—гҖҒдәӨжҚўгҖҒж»‘еҠЁе’ҢеЎ«е……еҠҹиғҪпјҢеҫҲеғҸдј з»ҹзҡ„\
