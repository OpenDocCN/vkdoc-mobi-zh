    6-37.  Page 1 wrapped in UINavigationController  #### Using the Push Segue or
    PushViewController    i OS    The Push segue adds a view controller onto the navigation
    stack within the same navigation controller. This presents a navigation bar with
    a Back button. The Push segue is functionally the same as using the `UIViewController.PushViewController`
    method. The `UIViewController` method `PushViewController` pushes a new view controller
    onto the stack.    First, use your designer tool to add a destination scene to
    your storyboard to navigate to and give it a name (`PageTwoView`, in this case).
    Also add a `UIViewController` by clicking the bottom of the `PageTwoView` scene
    and give the view controller a name, `PageTwo`. Set the Storyboard ID to `PageTwo`.    If
    youвҖҷre building storyboards using the designer, create a Push segue in your designer
    by Ctrl-clicking inside a button on the source scene and then dragging the blue
    line to the scene to navigate to. Then pick the Push option from the pop-up menu.    To
    do the same thing by hand, add the code in Listing [6-63](#A978-1-4842-0214-2_6_Chapter.html#FPar103)
    to the `PageOne` view controller to navigate to this second page, in the button
    event in this case.  Listing 6-63\. Navigate Using PushViewController in the ViewDidLoad
    Method of PageOne.cs  В В В В `PageTwo pageTwo = this.Storyboard.InstantiateViewController
    ("PageTwo") as PageTwo;`    В В В В `NavigationController.PushViewController(pageTwo,true);`    Listing
    [6-64](#A978-1-4842-0214-2_6_Chapter.html#FPar104) shows the entire button event
