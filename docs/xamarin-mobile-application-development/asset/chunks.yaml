    implementation is for concise demo purposes only. The mingling of a presentation
    layer with a data access layer is not recommended in a professional-grade app.    ##
    Database Creation Options    The three most common options for creating your SQLite
    database are as follows:    *   Use SQLite.NET: Use the SQLite.NET API to create
    the database and tables as described in вҖңCreating a DatabaseвҖқ in the section вҖңUsing
    SQLite.NET.вҖқ Use SQL for features not covered in the ORM, such as foreign keys
    and indexes. *   Use SQL: Create your database and tables when the app first runs,
    using SQL as described in вҖңCreating a DatabaseвҖқ in the section вҖңUsing ADO.NET.вҖқ
    *   Include a database: You can include a fully created database with your app,
    a good option if you want complete control over details of the tables and their
    relationships. Use a tool such as the MonoDevelop database editor or the SQLite
    Manager Firefox extension. Then remember to have your app copy the database into
    a writable directory before using it with code like this:    В В В В В В В В В В В `if (!File.Exists
    (databasePath))`    В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В `File.Copy (dbName, databasePath);`    В В В В В В В В В В В `}`    SQLite
    provides a local database to help you maintain state between user sessions and
    have important data on demand. Many apps also require interaction with a server-side
    data source, such as a SQL server or other data source on a remote data server.    ##
    Web Services    Web services facilitate communication with a remote data store
    and synchronization with the local SQLite database. They allow the Xamarin app
    to pull down data from the remote data source and push it back up when needed.    Many
    options are available for building web services when using the Xamarin platform,
    but here are a few of the most common:    *   REST: A common approach, RESTful
    services can use `HttpWebRequest`, `WebClient`, or one of many third-party libraries,
    including RestSharp, Hammock, or ServiceStack often coupled with JSON or LINQ.
    *   Windows Communication Framework (WCF): The standard Microsoft web service
    approach is supported in a limited fashion by using `BasicHttpBinding` in the
    Silverlight library. *   SOAP: An older, standards-based approach for data transmission
    over the Web, Xamarin supports SOAP 1.1, MicrosoftвҖҷs SOAP implementation, and
    ASP.NET Web Services (ASMX), albeit with an incomplete implementation.    Detailed
    exploration of web services is beyond the scope of this book, but the fundamentals
    are similar to web services used in web, and especially desktop, apps. If youвҖҷre
    interested in how the data access layer fits into mobile app architecture, youвҖҷll
    find more on that topic in [Chapter 9](#A978-1-4842-0214-2_9_Chapter.html).    There
    are heavier-weight options that provide out-of-the box data solutions, handle
    the fine points of security, and can save on development time. These enterprise
    cloud data solutions are the industrial-grade platforms for remote data integration.    ##
    Enterprise Cloud Data Solutions    A range of enterprise solutions provide authentication,
    security, cloud storage, data synchronization, push notifications and a host of
    other features. Here are a few of the most popular.    ### Microsoft Azure    The
    Azure Mobile Services Xamarin component provides a way to get started with MicrosoftвҖҷs
    premiere cloud platform for mobile data storage, authentication, and push notifications.
    Mobile Services, including the SQL Database and Push Notifications, are configurable
    on the Azure portal without any coding. Authentication, including Single Sign-On
    (SSO), is available using Azure Active Directory (AAD). Offline data sync saves
    changes locally and then uploads them to the cloud database when the app is back
    online. These features are accessible using the `Microsoft.WindowsAzure.MobileServices`
    namespace in the Azure Mobile Services Xamarin component. Azure services can also
    be coded by hand on the server to give greater control and broaden the features
    available. Consume REST or Web API cloud services and use `OAuth` authentication
    and authorization to access any required functionality in an Azure service. The
    newer Azure App Services provide an additional platform for configuring services
    for use in Xamarin apps and includes Mobile Apps (in preview at the time of this
    writing). You can find more information at [`azure.microsoft.com/mobile`](http://azure.microsoft.com/mobile)
    .    ### IBM MobileFirst Platform Foundation    The IBM MobileFirst SDK in the
    Xamarin Component Store provides a bridge into IBMвҖҷs enterprise-grade mobile application
    platform product as part of a suite of enterprise mobile solutions. IBM MobileFirst
    Platform Foundation (formerly IBM Worklight) provides a range of mobile app development
    features including security, cloud data access, enterprise integration, and application
    management. MobileFirst Platform Foundation security offerings include secure
    authentication using SSO and multi-factors. Transactions can use SSL encryption,
    local data can be encrypted, and there is some protection against reverse-engineering.
    The platform''s cloud data access feature set provides remote data access, storing
    user preferences, and data synchronization. Enterprise integration features include
    unified push, SMS notifications, and optimized access to enterprise services,
    such as Web Services, REST Services, SAP, and more. Application management functionality
    provides a full range of app release management features including distribution,
    versioning, analytics, push notifications, remote disabling of apps, and error
    logging. These are some of these features available using the `WL.Client` namespace
    in the IBM MobileFirst SDK. You can find more information at [`xamarin.com/ibm`](http://xamarin.com/ibm)
    .    ### Amazon Web Services (AWS)    Use Amazon services for authentication (Amazon
    Cognito), cloud storage (Amazon S3), and other features. Get started with AWS
    Mobile SDK at AWSLabs (in beta at the time of this writing). The SDK provides
    access to features such as authentication, Amazon S3 cloud data storage, user
    preference persistence, NoSQL database service, push notifications, and encryption.
    You can find more information at [`aws.amazon.com`](http://aws.amazon.com/) .    Those
    are a few of the enterprise-grade options available for cloud data services in
    Xamarin apps. Other popular options include Couchbase and Parse.    ## Summary    Xamarin.Forms
    data binding was built upon the foundation and experience of the third-party MVVM
    libraries used with Mono for years, MvvmCross and MVVM Light Toolkit, and was
    also inspired by WPF XAML data binding. Although itвҖҷs a relatively young product,
    in this way, Xamarin.Forms is an advanced and mature API.    Data binding gets
    data into and out of your data model through your views. Moving that data into
    and out of your database can be accomplished with SQLite.NET or ADO.NET. Some
    Xamarin developers prefer SQLite.NET because of the ease of the built-in ORM.
    The SQLite.NET ORM wraps all the standard CRUD transactions in handy LINQ-friendly
    methods. The ADO.NET approach is bare-bones but functional. Neither option supports
    foreign keys, and those have to be done in SQL or in an included database.    ThatвҖҷs
    everything youвҖҷll need to populate your data models and couple them with a local
    SQLite database.    In the next chapter, we will return to the mobile UI for the
    final and catalyzing topic in Xamarin.Forms development: custom renderers. Custom
    renderers allow you to use almost all of the UI functionality covered in this
    book (and more) within the context of a Xamarin.Forms app. You can include platform-specific
    code, which employs Xamarin.iOS and Xamarin.Android, in your Xamarin.Forms pages
    by using custom renderers.    Turn to [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html)
    to see how to use custom renderers.    # 8.В Custom Renderers    When youвҖҷre ready
    to extend the capability of Xamarin.Forms views beyond their out-of-the-box functionality,
    then itвҖҷs time to start customizing them using custom renderers. Platform-specific
    controls and layouts have scores of features unavailable using only the Xamarin.Forms
    abstraction. Fortunately, Xamarin.Forms exposes the mechanism whereby cross-platform
    views are made into platform-specific views, called renderers. By creating your
    own custom renderers, you get full access to platform-specific features buried
    deep within each view!    Custom renderers are a bridge between Xamarin.Forms
    and Xamarin platform-specific libraries, Xamarin.iOS, Xamarin.Android, as well
    as the Windows Phone SDK.    Xamarin.Forms `controls` are drawn on the screen
    using two primary components: elements and renderers. Throughout this book youвҖҷve
    been working with the elements: views, pages, or cells defined within Xamarin.Forms.
    The renderers take a cross-platform element and draw it on the screen using the
    platform-specific UI library. All Xamarin screens use renderers! For example,
    if you create a `Label` view using Xamarin.Forms, this element is rendered in
    iOS using `UILabel`, in Android using `TextView`, and in Windows Phone using `TextBlock`.
    However, Xamarin.Forms provides only a partial binding to these platform-specific
    views. If you want to gain access to all of the properties and methods within
    platform-specific elements (such as `UILabel`, `TextView`, and `TextBlock`), then
    you need to create a custom renderer.    Think of a custom renderer as a way to
    access and extend the binding between Xamarin.Forms and the platform-specific
    elements.  Tip  You can create custom renderers for these elements: `Views`, `Cells`,
    and `Pages`.    At the end of this chapter IвҖҷll list most of the Xamarin.Forms
    elements covered in this book, their platform-specific equivalents, and which
    renderers to use when customizing them.    ## When to Use a Custom Renderer    When
    might you want to use a custom renderer?    You may want to make a slight change
    to a view and Xamarin.Forms isnвҖҷt obliging you. For example, you know for a fact
    that iOS does text decorations or shadows on a particular view and this isnвҖҷt
    available in Xamarin.Forms, so you create a custom renderer to access a Xamarin.iOS
    control. Use a custom control when you need direct access to an elementвҖҷs platform-specific
    properties and methods or when you need to replace a Xamarin.Forms element with
    your own custom platform-specific element.  Note  A Xamarin.Forms customized control
    uses a custom renderer to access native functionality in a single control. A custom
    control is typically a group of controls composited into a single reusable component
    using `ContentView` ([Chapter 3](#A978-1-4842-0214-2_3_Chapter.html)) (but you
    can also create a custom control using a custom renderer and replace the view
    with a group of views). Sometimes developers will say вҖңcustom controlвҖқ to refer
    to a customized control.    LetвҖҷs explore how to create a custom renderer for
    Android, iOS, and Windows Phone.    ## Creating and Using a Custom Renderer    xamarin.forms    A
    custom renderer is created to implement the visual representation of a custom
    element. You create a custom element class that inherits from a standard Xamarin.Forms
    element, such as `Button`. Then you use that custom element in the UI. You can
    implement the custom renderer for each platform to use platform-specific members
    of that element, such as AndroidвҖҷs `SetBackgroundColor` method, or the iOS `BackgroundColor`
    property.    There are several steps in the creation and implementation of a custom
    renderer, but IвҖҷll break them into two tasks: preparing the custom element in
    the Xamarin.Forms project and creating a custom renderer in each platform-specific
    project.    Prepare the custom element in your Xamarin.Forms project by creating
    an element subclass and then using it in your UI. The following steps only happen
    once.  Use the element. Use the subclassed element, such as this `CustomButton`,
    in a layout in your Xamarin.Forms project. В  Create an element subclass. Create
    an empty subclass of the element you want to customize, such as `Button`, in your
    Xamarin.Forms project. В В В В В В В В В В В `public class CustomButton : Button {}` В   Create
    a custom renderer in each of your platform-specific projects (iOS, Android, Windows
    Phone) using these three steps. The following steps occur once for each platform.  Add
    `[assembly]`. Add the `[assembly]` attribute outside of the namespace declaration
    to declare the new renderer. В  Add `using`. Add `using` statements to the renderer
    class so that the renderer types are resolved. В  Create a custom renderer. Add
    a custom renderer class to each platform-specific project where you want to make
    customizations. В В В В В В В В В В В `public class CustomButtonRenderer : ButtonRenderer`
    В   ThatвҖҷs the upshot for creating a custom renderer.    In the next example, you
    will create a custom button that has custom renderers for each platform. Start
    by preparing your custom view in the Xamarin.Forms project before moving onto
    the renderers.    ## Preparing the Custom Element    xamarin.forms    A custom
    renderer first requires a custom Xamarin.Forms element, which can be a `View`,
