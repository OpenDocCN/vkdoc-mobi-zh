    ## е№іеҸ°зү№е®ҡ UI и§ЈеҶіж–№жЎҲжһ¶жһ„


    еӣҫ 2-4 еұ•зӨәдәҶж—ЁеңЁи·Ёе№іеҸ°зҡ„е№іеҸ°зү№е®ҡи§ЈеҶіж–№жЎҲеҰӮдҪ•е…ұдә«еҢ…еҗ«дёҡеҠЎйҖ»иҫ‘е’Ңж•°жҚ®и®ҝй—®еұӮзҡ„ C# еә”з”ЁзЁӢеәҸд»Јз ҒпјҢиҝҷдёҺ Xamarin.Forms и§ЈеҶіж–№жЎҲзұ»дјјгҖӮдҪҶ UI
    еұӮеҲҷе®Ңе…ЁдёҚеҗҢпјҡе®ғе®Ңе…ЁжҳҜе№іеҸ°зү№е®ҡзҡ„гҖӮиҝҷдәӣйЎ№зӣ®дёӯзҡ„ UI C# д»Јз ҒжүҖдҪҝз”Ёзҡ„зұ»йғҪзӣҙжҺҘз»‘е®ҡеҲ°еҺҹз”ҹ APIпјҡеҚізӣҙжҺҘпјҲж— йңҖйўқеӨ–з»‘е®ҡеұӮең°пјүеҜ№жҺҘ iOSгҖҒAndroid
    жҲ– Windows Phone APIгҖӮ


