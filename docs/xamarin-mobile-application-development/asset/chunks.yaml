    \n- жң¬д№ҰеңЁ Apress зҪ‘з«ҷдёҠзҡ„вҖңжәҗд»Јз Ғ/дёӢиҪҪвҖқйҖүйЎ№еҚЎйЎөйқўпјҲ[`www.apress.com/9781484202159`](http://www.apress.com/9781484202159)пјү\n\
    - GitHub д»“еә“пјҡ[`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)\n\
    \n## XAML\n\nжң¬д№Ұзҡ„зј–еҶҷж–№ејҸдёҺ Xamarin е№іеҸ°зҡ„жһ„е»әж–№ејҸзӣёеҗҢпјҢеҚід»Ҙ `C#` д»Јз Ғдјҳе…ҲпјҢеӣ жӯӨд№Ұдёӯзҡ„жүҖжңүзӨәдҫӢйғҪжҳҜз”Ё `C#` зј–еҶҷзҡ„гҖӮжүҖжңү\
    \ `C#` UI зӨәдҫӢд№ҹеҗҢж ·з§»жӨҚеҲ°дәҶ XAMLпјҢе№¶еңЁеҸҜдёӢиҪҪзҡ„д»Јз ҒдёӯжҸҗдҫӣгҖӮиҜ·з•ҷж„Ҹд№Ұдёӯ XAML жҸҗзӨәжЎҶпјҢдәҶи§ЈеңЁе“ӘйҮҢеҸҜд»ҘжүҫеҲ°е®ғд»¬гҖӮ\n\nXAML\n\nжң¬зӨәдҫӢзҡ„\
    \ XAML зүҲжң¬еҸҜд»ҘеңЁ Apress зҪ‘з«ҷпјҲ[`www.apress.com`](http://www.apress.com/)пјүжҲ– GitHubпјҲ[`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)пјүжүҫеҲ°гҖӮжң¬з« зҡ„\
    \ `Xamarin.Forms` и§ЈеҶіж–№жЎҲжҳҜ `ThisChapterSolution.Xaml`гҖӮ\n\nеңЁеҶҷиҝҷжң¬д№Ұж—¶пјҢжҲ‘еҒҡеҮәзҡ„жңҖиү°йҡҫзҡ„еҶіе®ҡжҳҜжІЎжңүеңЁд№ҰдёӯзӣҙжҺҘеҢ…еҗ«\
    \ XAML зӨәдҫӢгҖӮеҢ…еҗ« XAML е°Ҷж„Ҹе‘ізқҖдёҚеҫ—дёҚеүҠеҮҸз”ҡиҮіе®Ңе…Ёж”ҫејғе…ідәҺ `Xamarin.Android` е’Ң `Xamarin.iOS` зҡ„еҶ…е®№пјҢиҖҢиҝҷдәӣдё»йўҳеҜ№дәҺе…ЁйқўзҗҶи§Ј\
    \ Xamarin е№іеҸ°жҳҜеҝ…дёҚеҸҜе°‘зҡ„гҖӮжҲ‘йҖүжӢ©еқҡжҢҒжң¬д№Ұзҡ„дҪҝе‘Ҫпјҡд»Ҙи·Ёе№іеҸ° `C#` д»Јз Ғдјҳе…Ҳзҡ„ж–№ејҸпјҢе…Ёйқўд»Ӣз»Қ Xamarin е№іеҸ°зҡ„еҹәзЎҖзҹҘиҜҶгҖӮиҜқиҷҪеҰӮжӯӨпјҢжҲ‘зҗҶи§ЈеёӮеңәдёҠеҜ№дјҳиҙЁ\
    \ XAML ж–ҮжЎЈе’ҢзӨәдҫӢзҡ„ејәзғҲйңҖжұӮгҖӮеӣ жӯӨпјҢе°Ҫз®ЎжҲ‘еёҢжңӣжңүи¶іеӨҹзҡ„ж—¶й—ҙе’ҢзҜҮе№…еңЁд№Ұдёӯж–Үжң¬йҮҢеҢ…еҗ« XAML зӨәдҫӢпјҢдҪҶжҲ‘еҫҲиҮӘиұӘең°иҜҙпјҢжҲ‘д»¬дёәжүҖжңү `C#` UI зӨәдҫӢйғҪжҸҗдҫӣдәҶеҸҜдёӢиҪҪзҡ„\
    \ XAML еҜ№еә”зүҲжң¬гҖӮ\n\n## з«ӢеҚіејҖе§ӢдҪҝз”Ё Xamarin.Forms еҗ§пјҒ\n\nжІЎж—¶й—ҙйҳ…иҜ»пјҹиҠұеҚҒеҲҶй’ҹжөҸи§Ҳз¬¬ 2 з« пјҢз„¶еҗҺдёӢиҪҪз¬¬ 6 з« зҡ„еҜјиҲӘд»Јз ҒгҖӮзӣҙжҺҘд»ҺжҲ‘зҡ„з¬¬\
    \ 6 з« дёӯйҖүеҸ–дёҖдәӣеҜјиҲӘжЁЎејҸз«ӢеҲ»з”ЁеҲ°дҪ зҡ„еә”з”ЁдёӯпјҢе№¶з«ӢеҚіејҖе§Ӣзј–з ҒгҖӮеҗҢж—¶жҠҠд№Ұзҝ»ејҖеҲ°з¬¬ 3 з« пјҢиҝҷж ·дҪ е°ұеҸҜд»ҘеңЁдҪ зҡ„еҜјиҲӘйЎөйқўеҶ…жһ„е»әдёҖдәӣеёғеұҖгҖӮзҘқдҪ еҘҪиҝҗпјҒ\n"
- fmt: '## Chapter Contents


    All of the chapters in this book are cross-platform, weighted in favor of Xamarin.Forms.
    The UI chapters ([Chapters 3](#A978-1-4842-0214-2_3_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html))
    are written with Xamarin.Forms, Xamarin.Android, and Xamarin.iOS elements side
    by side in a mini-index at the beginning of the chapter to facilitate understanding
    of concepts across platforms, and to make it easier to consider custom renderers
    when you need them. The first part of those UI chapters is Xamarin.Forms, the
    second part is Xamarin.Android, and the third is Xamarin.iOS.


    [Chapter 1](#A978-1-4842-0214-2_1_Chapter.html) вҖ”Mobile Development Using Xamarin


    An introduction to the Xamarin platform covering all the key topics in this book.


    [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html) вҖ”Building Mobile User Interfaces
    (Xamarin.Forms Intro)


    A Xamarin.Forms primer and a comparison of Xamarin.Forms vs. platform-specific
    approaches, such as Xamarin.iOS and Xamarin.Android. Covers Xamarin.Forms pages,
    layouts, and views.


    [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html) вҖ”UI Design Using Layouts


    Layouts help us organize the positioning and formatting of controls, allowing
    us to structure and design the screens of our mobile app.


    [Chapter 4](#A978-1-4842-0214-2_4_Chapter.html) вҖ”User Interaction Using Controls
    (Views)


    Pickers, sliders, switches, and other mobile UI controls facilitate user interaction
    and data entry that is unique to the mobile user interface and differs from the
    PC/mouse interface, largely because of the use of gestures.


    [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html) вҖ”Making a Scrollable List


    Lists are one of the simplest and most powerful methods of data display and selection
    in mobile apps.


    [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html) вҖ”Navigation


    Navigation lets a user traverse an app, move from screen to screen, and access
    features. Hierarchical, modal, navigation drawers, drill-down lists, and other
    key patterns make up the core of mobile UI navigation. State management is the
    handling of data passed between screens as the user navigates through the app.


    [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html) вҖ”Data Access with SQLite and Data
    Binding


    `SQLite` is the database of choice for many Xamarin developers. Store and retrieve
    data locally by using `SQLite.NET` or `ADO.NET`. Using Xamarin.Forms data binding,
    fuse UI elements to your data models. Use the MVVM pattern by binding to a view
    model.


    [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html) вҖ”Custom Renderers


    Extend the stock Xamarin.Forms controls and take advantage of platform-specific
    UI feature sets while maintaining a cross-platform approach using custom renderers.


    [Chapter 9](#A978-1-4842-0214-2_9_Chapter.html) вҖ”Cross-platform Architecture


    Architect your cross-platform application by managing platform-specific code.
    Project-level options in Xamarin include Portable Class Libraries (PCLs) and shared
    projects. Cross-platform coding techniques include conditional compilation, dependency
    injection (DI), and file linking.


    ## How to Read This Book


    This book covers quite a breadth of material, and there are a few ways to approach
    it. Here are the main navigation paths built into this book and how to use them.
    If you are interested in


    *   Cross-platform Development: Xamarin.Forms, Xamarin.Android, and Xamarin.iOS
    Read the book from cover to cover. Every word in this book was written for you.
    After you read [Chapters 1](#A978-1-4842-0214-2_1_Chapter.html) and [2](#A978-1-4842-0214-2_2_Chapter.html),
    peruse the first few pages of [Chapters 3](#A978-1-4842-0214-2_3_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html)
    to understand the UI material covered in the book.

    *   Xamarin.Forms Read [Chapters 1](#A978-1-4842-0214-2_1_Chapter.html) and [2](#A978-1-4842-0214-2_2_Chapter.html),
    and then read the first third of [Chapters 3](#A978-1-4842-0214-2_3_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html),
    which covers Xamarin.Forms UI. Then read [Chapters 7](#A978-1-4842-0214-2_7_Chapter.html),
    [8](#A978-1-4842-0214-2_8_Chapter.html), and [9](#A978-1-4842-0214-2_9_Chapter.html)
    for data access, custom renderers, and architecture.

    *   Xamarin.Android First, make sure you are up to speed on Android basics. See
    "Prerequisites" later in this Introduction. Then read [Chapter 1](#A978-1-4842-0214-2_1_Chapter.html)
    and the first half of [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html). Read the
    middle section of [Chapters 3](#A978-1-4842-0214-2_3_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html),
    which covers the Android UI. Then read [Chapters 7](#A978-1-4842-0214-2_7_Chapter.html)
    and [9](#A978-1-4842-0214-2_9_Chapter.html) for data access and architecture.

    *   Xamarin.iOS First, make sure you are up to speed on iOS basics. See "Prerequisites"
    later in this Introduction. Then read [Chapter 1](#A978-1-4842-0214-2_1_Chapter.html)
    and the first half of [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html). Read the
    end section of [Chapters 3](#A978-1-4842-0214-2_3_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html),
    which covers the iOS UI. Then read [Chapters 7](#A978-1-4842-0214-2_7_Chapter.html)
    and [9](#A978-1-4842-0214-2_9_Chapter.html) for data access and architecture.

    *   General Reference Read [Chapter 1](#A978-1-4842-0214-2_1_Chapter.html) and
    the first half of [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html) to get oriented.
    Then peruse the first few pages of [Chapters 3](#A978-1-4842-0214-2_3_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html)
    to understand the UI material covered in the book and how it is organized. Use
    the beginning of each of these UI chapters as a cross-reference.


    So many paths to pick from. This is a choose-your-own-adventure book.


    ## Code Complete


    There is a "CliffвҖҷs Notes" navigation path through this book too. If you just
    want the bottom line on a topic, find the section youвҖҷre interested in and jump
    right to the Code Complete section. This is a complete code listing at the end
    of many (but not all) major topics. Many times all we want is a quick code recipe
    on a topic, and thatвҖҷs how to get it here in this book. If you need explanation
    about the code, turn back to the beginning of the section and step through the
    detailed construction of that code.


    ## What Platform Am I Reading About Now?


    Stay oriented while reading about different platforms by using the platform headings
    beneath major topic headings. HereвҖҷs what the headings look like:


    Xamarin.Forms


    This heading denotes Xamarin.Forms topics.


    Android


    This heading denotes Xamarin.Android topics.


    iOS


    This heading denotes Xamarin.iOS topics.


    Windows Phone


    This heading denotes Xamarin.Forms Windows Phone topics.


    Cross-Platform


    This heading denotes topics that are useful for Xamarin.Forms, Xamarin.iOS, and
    Xamarin.Android.


    Look for the platform headings beneath the major topic headings and youвҖҷll always
    know what platform youвҖҷre reading about.'
