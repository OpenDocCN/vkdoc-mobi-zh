    a view model that implements `INotifyPropertyChanged`. *   Implement `INotifyPropertyChanged`
    in your data model. *   Wrap your data model in a class that implements `INotifyPropertyChanged`.    The
    first approach is a popular choice, but since you already saw that earlier in
    Listing [7-6](#A978-1-4842-0214-2_7_Chapter.html#FPar12), and the second approach
    in Listing [7-7](#A978-1-4842-0214-2_7_Chapter.html#FPar13), here youвҖҷll use the
    third approach: wrapping your data model in an observable item class using `INotifyPropertyChanged`.
    Then bind this observable class to your list (directly or via a view model).    Create
    a class called `ObservableItem.cs`, as shown in Listing [7-10](#A978-1-4842-0214-2_7_Chapter.html#FPar18).
    Implementing the `OnPropertyChanged` event and calling it in the `Set` method
    of `ListItems` ensures that changes to the list data are reflected in the UI in
    real time. Note that this class alone isnвҖҷt MVVM unless you encapsulate it in
    a view model, which youвҖҷll do in a moment.  Listing 7-10\. Wrap Your Data Model
