    described earlier, couples frames with `UIViewAutoResizingMasks` to create responsive
    вҖҳsprings and strutsвҖҷ. AutoSizing is not covered here because Apple has replaced
    it with AutoLayout using constraints. Some iOS developers feel that AutoSizing
    is still preferable for simple layouts.    HereвҖҷs an example of absolute layout
