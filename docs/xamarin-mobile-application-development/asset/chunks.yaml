    - е№іеҸ°зү№е®ҡ UI еҲҷдҪҝз”Ё `Xamarin.Android`гҖҒ`Xamarin.iOS` е’Ң Windows Phone SDKгҖӮ


    `Xamarin.Forms` еҢ…еҗ«дёҖдёӘе®Ңе…Ёи·Ёе№іеҸ°зҡ„е·Ҙе…·еҢ…пјҢжҸҗдҫӣдәҶдёҖеҘ—з»ҹдёҖзҡ„ UI жҺ§д»¶гҖҒеёғеұҖе’ҢйЎөйқўпјҢиҝҷдәӣе…ғзҙ иғҪе·§еҰҷең°жҳ е°„еҲ° iOSгҖҒAndroid е’Ң Windows
    Phone дёҠеҗ„иҮӘзҡ„еҺҹз”ҹ UI з»‘е®ҡгҖӮз”ұдәҺ `Xamarin.Forms` жҜ”е№іеҸ°зү№е®ҡеә“жӣҙж–°пјҢе…¶еҠҹиғҪд№ҹзӣёеҜ№иҫғе°‘гҖӮжҜҸдёӘзүҲжң¬йғҪи®©жҲ‘д»¬жӣҙжҺҘиҝ‘еҠҹиғҪе®ҢеӨҮзҡ„и·Ёе№іеҸ°е®ҢзҫҺдҪ“йӘҢпјҢдҪҶжңүж—¶жҲ‘д»¬йңҖиҰҒи¶…и¶ҠејҖз®ұеҚіз”Ёзҡ„
    `Xamarin.Forms` зұ»жүҖжҸҗдҫӣзҡ„еҠҹиғҪгҖӮеңЁиҝҷдәӣжғ…еҶөдёӢпјҢжҲ‘д»¬дҪҝз”Ёе№іеҸ°зү№е®ҡеә“пјҢиҰҒд№Ҳй’ҲеҜ№ж•ҙдёӘйЎөйқўпјҢиҰҒд№Ҳд»…й’ҲеҜ№йЎөйқўзҡ„жҹҗдёҖйғЁеҲҶпјҢйҖҡиҝҮдҪҝз”Ё `Xamarin.Forms`
    дёӯеҗҚдёә `PageRenderers` зҡ„иҮӘе®ҡд№үжёІжҹ“еҷЁжқҘе®һзҺ°гҖӮ


    е№іеҸ°зү№е®ҡзҡ„ж–№жі•жӣҙдёәеҸӨиҖҒдё”жӣҙжҲҗзҶҹпјҢеӣ жӯӨд№ҹжӣҙдёәиҜҰз»Ҷдё”еҠҹиғҪдё°еҜҢгҖӮиҝҷж¶үеҸҠзӣҙжҺҘз»‘е®ҡеҲ°е№іеҸ°зү№е®ҡ UI API зҡ„еә“пјҡ`Xamarin.Android` з”ЁдәҺ AndroidпјҢ`Xamarin.iOS`
    з”ЁдәҺ iOSгҖӮеҜ№дәҺ Windows PhoneпјҢжҲ‘д»¬дҪҝз”Ё Windows Phone SDKпјҢиҝҷжҳҜдёҖдёӘеҺҹз”ҹ APIпјҢж— йңҖ Xamarin з»‘е®ҡгҖӮиҝҷдәӣе№іеҸ°зү№е®ҡзҡ„еә“дҪҝжҲ‘д»¬иғҪеӨҹж·ұе…Ҙи®ҝй—®еҺҹз”ҹ
    UIпјҢд»ҘжҸҗдҫӣи§Ҷи§үжғҠиүігҖҒдәӨдә’дё°еҜҢзҡ„з”ЁжҲ·дҪ“йӘҢгҖӮдҪҶиҝҷд№ҹжҳҜжңүд»Јд»·зҡ„пјҡе№іеҸ°зү№е®ҡзҡ„д»Јз ҒйңҖиҰҒдёәжҜҸдёӘе№іеҸ°и®ҫз«ӢзӢ¬з«Ӣзҡ„ UI йЎ№зӣ®пјҢдё”д»Јз ҒйҮҚз”ЁжҖ§жһҒдҪҺгҖӮ


    жіЁж„Ҹ


    `Xamarin.Forms` жҳҜжң¬д№Ұзҡ„йҮҚзӮ№пјҢе№¶з”ұдҪҝз”Ёе№іеҸ°зү№е®ҡ UI зҡ„иҮӘе®ҡд№үжёІжҹ“еҷЁеҠ д»ҘиЎҘе……гҖӮз„¶иҖҢпјҢдҪҝз”Ё `Xamarin.iOS` е’Ң `Xamarin.Android`
    иҖҢдёҚдҪҝз”Ё `Xamarin.Forms` жқҘеҲӣе»әе№іеҸ°зү№е®ҡ UI йЎ№зӣ®зҡ„ејҖеҸ‘иҖ…пјҢеҸҜд»Ҙе……еҲҶеҲ©з”Ёз¬¬ 2 з« иҮіз¬¬ 7 з« дёӯе…ідәҺ iOS е’Ң Android зҡ„з« иҠӮгҖӮеҰӮжһңдҪ йҮҮз”Ёе№іеҸ°зү№е®ҡзҡ„ж–№жі•пјҢиҜ·еҠЎеҝ…жҹҘйҳ…е…¶д»–иө„ж–ҷпјҲдҫӢеҰӮ
    Xamarin еңЁзәҝж–ҮжЎЈпјүд»ҘдәҶи§Ј `Xamarin.Android` е’Ң `Xamarin.iOS` зҡ„и§ЈеҶіж–№жЎҲи®ҫзҪ®еҸҠеҹәзЎҖзҹҘиҜҶгҖӮ


    ### з§»еҠЁ UI и®ҫи®Ў


    UI жҠҖжңҜжҳҜеӨ§еӨҡж•°з§»еҠЁиҪҜд»¶ејҖеҸ‘зҡ„ж ёеҝғгҖӮе°ҸеһӢи®ҫеӨҮеҪ“еүҚзҡ„зЎ¬д»¶йҷҗеҲ¶дҝғдҪҝжҲ‘д»¬е°Ҷз№ҒйҮҚзҡ„и®Ўз®—д»»еҠЎдәӨз”ұ Web жңҚеҠЎиҝңз«Ҝзҡ„ PC е’ҢжңҚеҠЎеҷЁеӨ„зҗҶгҖӮеңЁз§»еҠЁдёҡеҠЎеә”з”ЁдёӯиҝҗиЎҢзҡ„еӨ§еӨҡж•°з»„д»¶йғҪжҳҜдёәдәҶж”ҜжҢҒеҸҜи§Ғзҡ„з”ЁжҲ·з•ҢйқўгҖӮз§»еҠЁдёҡеҠЎеұӮе’Ңж•°жҚ®и®ҝй—®еұӮйҖҡеёёжҳҜе…¶жңҚеҠЎеҷЁз«ҜеҜ№еә”йғЁеҲҶзҡ„з®ҖеҢ–зүҲжң¬гҖӮиҝҷж„Ҹе‘ізқҖжҲ‘д»¬жңҖеёёйңҖиҰҒзҡ„жҳҜ
    UI з»„д»¶пјҢз”ЁдәҺеё®еҠ©жҲ‘д»¬дҪҝз”ЁеёғеұҖи®ҫи®ЎеұҸе№•гҖҒе®һзҺ°ж•°жҚ®иҫ“е…Ҙе’ҢйҖүжӢ©зҡ„жҺ§д»¶гҖҒжһ„е»әз”ЁдәҺж•°жҚ®жҳҫзӨәе’Ңзј–иҫ‘зҡ„еҲ—иЎЁе’ҢиЎЁж јгҖҒеҲӣе»әз”ЁжҲ·еҜјиҲӘпјҢд»ҘеҸҠдҪҝз”ЁеӣҫеғҸдҪңдёәиғҢжҷҜе’Ңеӣҫж ҮгҖӮжң¬д№Ұдёӯзҡ„
    UI дё»йўҳж¶өзӣ–дәҶз§»еҠЁеә”з”ЁејҖеҸ‘дёӯжңҖеёёз”Ёзҡ„еҠҹиғҪгҖӮеңЁжҜҸдёҖз« дёӯпјҢжҲ‘д»¬йғҪд»ҺжңҖз®ҖеҚ•гҖҒжңҖи·Ёе№іеҸ°зҡ„ж–№жі•ејҖе§ӢпјҢз„¶еҗҺж·ұе…ҘжҺўи®Ёе№іеҸ°зү№е®ҡзҡ„з»ҶиҠӮе’ҢзІ’еәҰгҖӮд»ҘдёӢжҳҜжң¬д№Ұж¶өзӣ–зҡ„з§»еҠЁ UI дё»йўҳпјҡ


    - еұҸе№•гҖҒи§ҶеӣҫжҲ–йЎөйқўзұ»дјјдәҺ C# дёӯ Web е’ҢжЎҢйқўзҡ„еҜ№еә”йғЁеҲҶпјҢдҪҝз”ЁеёҰжңүж–№жі•е’ҢеұһжҖ§зҡ„жҺ§д»¶пјҢе№¶и§ҰеҸ‘жҲ‘д»¬еңЁжҺ§еҲ¶еҷЁдёӯеӨ„зҗҶзҡ„дәӢд»¶гҖӮпјҲеҸӮи§Ғз¬¬ 2 з« гҖӮпјү

    - еёғеұҖеё®еҠ©жҲ‘д»¬з»„з»ҮжҺ§д»¶зҡ„дҪҚзҪ®е’Ңж јејҸпјҢдҪҝжҲ‘д»¬иғҪеӨҹжһ„е»әе’Ңи®ҫи®Ўз§»еҠЁеә”з”Ёзҡ„еұҸе№•гҖӮпјҲеҸӮи§Ғз¬¬ 3 з« гҖӮпјү

    - жҺ§д»¶дҝғиҝӣз”ЁжҲ·дәӨдә’е’Ңж•°жҚ®иҫ“е…ҘпјҢиҝҷжҳҜз§»еҠЁз”ЁжҲ·з•ҢйқўжүҖзү№жңүзҡ„пјҢе№¶дё”дёҺ PC/йј ж Үз•Ңйқўжңүжҳҫи‘—дёҚеҗҢпјҢиҝҷеҫҲеӨ§зЁӢеәҰдёҠеҪ’еӣ дәҺжүӢеҠҝзҡ„дҪҝз”ЁгҖӮпјҲеҸӮи§Ғз¬¬ 4 з« гҖӮпјү

    - еҲ—иЎЁжҳҜз§»еҠЁеә”з”ЁдёӯжңҖејәеӨ§зҡ„ж•°жҚ®жҳҫзӨәе’ҢйҖүжӢ©ж–№жі•д№ӢдёҖгҖӮпјҲеҸӮи§Ғз¬¬ 5 з« гҖӮпјү

    - еҜјиҲӘи®©з”ЁжҲ·иғҪеӨҹйҒҚеҺҶеә”з”ЁгҖҒеңЁеұҸе№•д№Ӣй—ҙеҲҮжҚўд»ҘеҸҠи®ҝй—®еҠҹиғҪгҖӮеҲҶеұӮеҜјиҲӘгҖҒжЁЎжҖҒеұҸе№•гҖҒеҜјиҲӘжҠҪеұүгҖҒиӯҰжҠҘгҖҒдёӢй’»еҲ—иЎЁе’Ңе…¶д»–е…ій”®жЁЎејҸжһ„жҲҗдәҶз§»еҠЁ UI еҜјиҲӘзҡ„ж ёеҝғгҖӮпјҲеҸӮи§Ғз¬¬ 6
    з« гҖӮпјү

