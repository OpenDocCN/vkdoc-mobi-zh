    \nTo Kristina, for her unwavering love, dedication, and support\n\n## Foreword\n\
    \nDan HermesвҖҷ extraordinary book is the most intelligent work on cross-platform\
    \ mobile development IвҖҷve seen. He focuses on Xamarin.Forms but provides a comprehensive\
    \ guide as well to Xamarin.Android and Xamarin.iOS. This puts Xamarin.Forms in\
    \ context, and explains the underlying native code for those who want to know\
    \ not only how to write with Xamarin.Forms but why it works and whatвҖҷs under the\
    \ hood. I learned a lot from these parts of this excellent book.\n\nDan made the\
    \ decision to write all the examples in C#. While I prefer writing much of the\
    \ UI in Extensible Application Markup Language (XAML), his approach does make\
    \ clear what is actually being created. Most important, you can download all the\
    \ examples in both C# and XAML, and all the code samples are complete, well commented,\
    \ and ready to run.\n\nAnother helpful feature is that the illustrations show\
    \ the running example code on all three platforms (iOS, Android, and Windows Phone).\
    \ I have railed and ranted against samples that are overly complex and designed\
    \ to show how clever the author is, rather than making the issue crystal clear.\
    \ Dan, thank goodness, gets it, and his examples are well explained and focused.\n\
    \nThe book starts out simple, but he takes you through the fundamentals and then\
    \ on to more-advanced topics such as custom control rendering to extend the Xamarin.Forms\
    \ capabilities.\n\nCode patterns can help you avoid reinventing the wheel, and\
    \ Dan uses and explains in detail some of the most important patterns for mobile\
    \ development, including hierarchical and modal windows, drill-down lists, tabs,\
    \ creating a navigation drawer, and a good deal more.\n\nHe then tackles one of\
    \ the trickier but extremely important topics in mobile development: persistence.\
    \ Dan covers the three most important approaches: using SQLite, using ADO.NET,\
    \ and using the repository pattern with a data access Layer (DAL). He dives into\
    \ data binding and discusses Model-View-ViewModel (MVVM), perhaps the most important\
    \ pattern in mobile development.\n\nWith the depth of coverage of Xamarin.iOS,\
    \ Xamarin.Android, and Xamarin.Forms, you will be well placed to decide which\
    \ technology to use for your particular project.\n\nXamarin novices will benefit\
    \ greatly from this book, but donвҖҷt underestimate how useful it will be for Xamarin\
    \ veterans as well.\n\nвҖ”Jesse Liberty\n\n## Additional Foreword\n\nThe first time\
    \ I saw Xamarin.Forms, it was hardly recognizable as the powerful cross-platform\
    \ framework it is today. I was visiting our San Francisco office, it was late\
    \ at night, Jason Smith (the creator of Xamarin.Forms) was busily coding away,\
    \ and I was packing some stuff up for the evening. I heard a sudden exclamation\
    \ from Jason, and a huge grin was pasted on his face: вҖңWanna see something really\
    \ cool?вҖқ he queried. вҖңAbsolutely,вҖқ I responded. I walked around the desk to see\
    \ what he wanted to show me. On his screen was an iOS simulator with a box displayed\
    \ on it.\n\nNot wanting to dampen his enthusiasm for what was obviously a really\
    \ impressive featвҖ”I mean, weвҖҷre talking advanced stuff here, a box (note: sarcasm)вҖ”I\
    \ replied something to the effect of, вҖңFantastic. What am I looking at?вҖқ I knew\
    \ of JasonвҖҷs project; Nat Friedman and I had knocked our heads about to solve\
    \ a fundamental challenge to cross-platform mobile development, the UI layer,\
    \ and Jason was doing some prototyping work to investigate the feasibility of\
    \ doing a cross-platform UI framework the right way."
