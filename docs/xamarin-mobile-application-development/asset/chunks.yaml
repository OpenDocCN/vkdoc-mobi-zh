- fmt: '#### Xamarin.Forms Custom Renderers


    `Custom Renderers` allow us to go deeper than the out-of-the-box Xamarin.Forms
    UI controls and take advantage of platform-specific UI feature sets while keeping
    a cross-platform approach. Xamarin.Forms applications are inherently cross-platform,
    running on all three major platforms using the same code base. This works well
    for basic designs and using certain controls. However, many projects will develop
    a need to go deeper with the UI, such as design nuances on a single control, native
    modal dialog boxes, additional graphics or animations on a page, or any requirements
    that go beyond the scope of what Xamarin.Forms provides in the current release.
    This is accomplished by subclassing native controls and implementing `PageRenderers`
    to create custom controls that give full access to platform-specific UI functionality
    using Xamarin.iOS and Xamarin.Android. These platform-specific controls can be
    employed within Xamarin.Forms pages to help maintain a cross-platform architecture.


    ### Data Access Layer


    The mobile data access layer departs from the designs we are accustomed to in
    web apps and more closely resembles those found in desktop apps. Approaches range
    in sophistication from the popular MVVM pattern to Model-View-Controller (MVC)
    to basic CRUD (Create/Insert/Update/Delete). Data-bound pages typically feed into
    a local database on the device, which syncs with a remote data server using web
    services.


    Web services in C# mobile development are a foundational aspect of code reuse.
    Many of these service patterns remain the same for mobile applications as what
    we are accustomed to when building web apps. However, mobile web services more
    closely resemble those found in desktop applications, differing from web app services
    primarily in the importance of data synchronization and offline use. Create, Update,
    and Delete interfaces are exposed online for RESTful calls from a multitude of
    platforms and devices. The fairest of maidens dwell here in mobile web service
    patterns, a perfect place for cross-platform, write-once code.


    The server-side component of web services remains the same for mobile applications,
    compared to what we are accustomed to with web appsвҖ”except for the addition of
    data synchronization with local mobile data stores for both online and offline
    use. Offline use requires a basic data set to be kept on hand in the local database
    and synced when a connection is available. Not all apps support offline use.


    Recounting our experiences with data access layers in older, related technologies,
    we will explore the architectural options for the data access layer in C# mobile
    apps.


    ### Local Data Access Using SQLite


    SQLite holds the title as the most stable and reliable cross-platform database
    product for mobile development, an open source project that works on iOS, Android,
    and Windows devices. Xamarin recommends it over a number of other third-party
    projects, and it is the one covered in this book. Xamarin provides access to and
    creation of SQLite databases within the development environment, provisions ADO.NET
    with support for SQLite. There is also a SQLite.NET Xamarin component, a C# wrapper
    around the C-based SQLite data layer offering low-level access to a SQLite database
    which includes async transactions. All this makes it easy and painless to connect
    to the database, create and index tables, and read and write rows.


    ### Data Binding


    Data binding is consistent and cross-platform when using Xamarin.Forms. Modeled
    after data binding in Windows Presentation Foundation (WPF), the MVVM pattern
    is central to its implementation. In code we bind control fields to our data model
    and the binding mechanism is automatic. A manual implementation of a `PropertyChanged`
    event allows your code to stay in sync with the data source. Binding is done in
    code or in Extensible Application Markup Language XAML and can be one- or two-way.
    Controls, lists, and text are tethered to a data source or to one another''s properties.
    A growing number of third party vendors are providing Xamarin.Forms control suites
    which include data-bound charts and grids, such as Telerik, Infragistics, Syncfusion,
    and DevExpress.


    Data-binding is not built into Xamarin.Android and Xamarin.iOS. Platform-specific
    implementations of data binding are typically achieved using open-source third
    party libraries such as MvvmCross and MVVM Light.


    ### Cross-platform Development


    In the same way that .NET provided a unifying infrastructure spanning many operating
    systems and languages, Xamarin bridges the gaps between mobile operating systems
    and their respective development languages: iOS and Objective-C, Android and Java,
    and Windows Phone and tablets and C#. In this way, Xamarin extends .NET into the
    mobile realm, far beyond Windows operating systems. Aside from the fact that this
    is eminently cool, the real value here is the opportunity to share and reuse code
    between and across projects and platforms. The greatest benefits of Xamarin tools
    are found in the cross-platform code; therefore, a cross-platform approach to
    mobile patterns will produce the highest yield. Xamarin tools have provided us
    with the means to catch a glimpse of the unicorn of write once, deploy anywhere.


    The greatest foe we face in our quest for cross-platform implementation is platform-specific
    code. This code must be implemented differently depending on the platform, whether
    iOS, Android, or Windows Phone. Cross-platform patterns are the same regardless
    of operating system. Cross-platform code is sometimes referred to as shared code,
    or core code, as it is shared between projects for different mobile operating
    systems.


    Xamarin.Forms addresses the thorniest cross-platform challenge: the user interface.
    Developers using Xamarin have a fully cross-platform data solution, which is local
    data access using ADO.NET or SQLite.NET with SQLite and then web services. Even
    so, there will always be platform-specific code, as follows:


    * In the UI

    * Device-specific functionality, such as camera and location

    * Graphics and animations

    * Security, file, and device permissions


    Once weвҖҷve identified the platform-specific and cross-platform code, the question
    is then how to organize it into a cross-platform architecture.


    We have quite a few options, ranging from PCLs, shared projects, and linked files,
    interfaces, abstraction, and conditional compilation. PCLs provide the means for
    a C# component to be built with a limited, platform-specific subset of the .NET
    library to be compiled into a Dynamic Link Library (DLL) that can be used in a
    Xamarin project for any platform specified by the PCLвҖҷs profile. Data access layers,
    client-side web services, and platform-independent business logic live happily
    here. Platform-specific functionality can still be introduced into these libraries
    by using dependency injection with interfaces. A looser, more flexible approach
    is to use shared files or projects that contain core files recompiled for each
    platform. Conditional compilation, an ancient technique well-suited to small platform-specific
    customizations, permits blocks of code within a shared file to be included in
    a platform-specific compile.


    We will delve into these techniques and their related patterns as they bear the
    mark of the unicorn, helping us to maximize our code''s cross-platform footprint.'
