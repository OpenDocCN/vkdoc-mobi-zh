    controls share a common goal: allowing the user to pick a value. Simple selection
    controls require us to specify minimum and maximum values and set a default value.
    Pickers/spinners work best inside a modal dialog, and we use them to select from
    a list or choose dates and times. Xamarin.Forms handles the modal pop-ups for
    you, whereas Android and iOS require you to roll your own. Android provides some
    helpful out-of-the-box components such as `DatePickerDialog` and `TimePickerDialog`,
    but `DialogFragment` also makes a great modal. For modals in iOS, use the `UITextField.InputView`
    property (no more `ActionSheets`).    The selection controls in this chapter typically
    provide a value changed or click event of some kind to allow your code to respond
    to changes in values. While indispensable, the controls in this chapter are simple
    ones. In the next chapter, youвҖҷll dive deeper into the heart of mobile UI selection,
    where both the data and the selection can be richer and more complex when using
    lists and tables.    # 5.В Making a Scrollable List    Choosing quickly from a
    long list of items is one of the key offerings of the mobile UI. The limited real
    estate on mobile phone screens makes data grids a challenge and leads to extensive
    and creative use of lists. Grouping of items, scrolling, gesture-sensitivity,
    and images make lists one of the most versatile and reuseable data-bound tools
    available. Lists are to mobile development what the data grid is to web development.    This
    chapter covers the list classes available in each library to make a scrollable,
    selectable list. The primary considerations include binding to a data model, handling
    item selection, customizing the look of rows, grouping headers, and perhaps most
    importantly: performance.    These are the options available for creating scrollable
    lists on each platform:    Xamarin.Forms ListView    `ListView` is bound to an
    array or data model.    Android ListView    `ListView` is bound to an array or
    to a data model using an `Adapter`.    iOS UITableView    `UITableView` is bound
    to an array or to a data model using `UITableViewSource`.    ## Data Adapters    Android
    and iOS lists require separate adapters for data binding. In Android, we use `BaseAdapter`
    and in iOS there is `UITableViewSource`. In Xamarin.Forms, no additional adapter
    class is needed. We can bind directly to a list of `Strings` using the `ItemsSource`
    property with the default list template. We can also bind to data models and use
    custom lists with the `ListView''s` built-in adapter class called `ItemTemplate`,
    which is configured using the `SetBinding` method.    ## Xamarin.Forms ListView    xamarin.forms    Lists
    in Xamarin.Forms are created using the `ListView` control bound to an array or
    data model. The Xamarin.Forms `ListView` class provides a scrollable, selectable
    list. List rows are customizable using layouts, images, and views such as buttons.
    `ListView` supports grouping, headers, footers, jump lists, and pull-to-refresh.
    Deleting and applying operations to list rows are supported using Context Actions.    The
    lists in this chapter are read-only, which means that they are bound to a data
    source for viewing and selecting, but the rows are not edited, deleted, or added.
    We touch on some editable list UI techniques in the вҖңContext Actions and Customizing
    List RowsвҖқ section, but do not cover changes to the data model or two-way data
    binding so that these changes can be reflected in the list. For editable `ListView`
    data binding, see [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html).    The starting
    point with a `ListView` is data binding it to a data source.    ### Binding to
    a List of Strings    The simplest `ListView` implementation is binding to a `List`
    of `Strings`.    Instantiate a `ListView` class on your page and point it to a
    data source using the `ItemsSource` property, in this case a `List` of `Strings`.
    Using the default layout, each item in a `ListView` will be a single cell using
    the `TextCell` template displaying a single line of text.    В В В В `class ListViewStrings
    : ContentPage`    В В В В `{`    В В В В В В `public ListViewStrings()`    В В В В В В `{`    В В В В В В В В `ListView
    listView = new ListView();`    В В В В В В В В `List<String> items = new List<String>()
    {"First","Second","Third"};`    В В В В В В В В `listView.ItemsSource = items;`    В В В В В В В В `this.Content
    = listView;`    В В В В В В `}`    В В В В `}`    HereвҖҷs the list in Figure [5-1](#A978-1-4842-0214-2_5_Chapter.html#Fig1).    ![A978-1-4842-0214-2_5_Fig1_HTML.jpg](A978-1-4842-0214-2_5_Fig1_HTML.jpg)    Figure
    5-1.  ListView in iOS, Android, and Windows Phone Tip  Create space around the
    edges of your list using the layout `Padding` property mentioned in [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html).    `Padding
    = new Thickness (0, Device.OnPlatform (20, 0, 0), 0, 0);`    Selecting a list
    item fires the `ItemSelected` event.    ### Selecting an Item    xamarin.forms    There
    are two events for use in item selection: `ItemTapped` and `ItemSelected`. Both
    can happen when a user taps a cell in the `ListView`. The difference between them
    is apparent when a list permits more than just tapping and items can be selected
    and unselected. In simple lists where there is no unselection of rows (like the
    example here), there is little difference between them.    `ItemTapped` is the
    simplest. It fires as a motion event when a list row is clicked.    В В В В `listView.ItemTapped
    += async (sender, e) =>`    В В В В `{`    В В В В В В В В `await DisplayAlert("Tapped", e.Item.ToString()
    + " was selected.", "OK");`    В В В В `};`    The `ItemSelected` event responds to
    a change in the state of row selection and happens when a row is selected or unselected.    В В В В `listView.ItemSelected
    += async (sender, e) =>`    В В В В `{`    В В В В В В В В `await DisplayAlert("Selected",
    e.SelectedItem.ToString()+ " was selected.", "OK");`    В В В В `};`    Using `async/await`
    isnвҖҷt mandatory on these event handlers, but it is a good habit when any processing
    is done, to avoid tying up the UI thread. Using either `ItemTapped` or `ItemSelected`
    to select the First item results in Figure [5-2](#A978-1-4842-0214-2_5_Chapter.html#Fig2).    ![A978-1-4842-0214-2_5_Fig2_HTML.jpg](A978-1-4842-0214-2_5_Fig2_HTML.jpg)    Figure
    5-2.  The alert displays the selected item Tip  The `DisplayAlert` method is more
    informative than an Android toast. It provides a title and requires interaction
    to clear it.    Clear the selected row (removing the row highlight) by setting
    the `ListView''s SelectedItem` property to null. The easiest place to do this
    is inside the `ItemTapped` handler.    В В В В `listView.ItemTapped += async (sender,
    e) =>`    В В В В `{`    В В В В В В В В `await DisplayAlert("Tapped", e.Item.ToString() +
    " was selected.", "OK");`    В В В В В В В В `((ListView)sender).SelectedItem = null``;`    В В В В `};`    If
    youвҖҷre using the `ItemSelected` event, be aware that changing the `SelectedItem`
    value fires the `ItemSelected` event again. You therefore need to check if `e.SelectedItem`
    is null prior to responding to the event.    В В В В `listView.ItemSelected += async
    (sender, e) =>`    В В В В `{`    В В В В В В В В `if (e.SelectedItem == null) return;`    В В В В В В В В `await
    DisplayAlert("Selected", e.SelectedItem.ToString() + " was selected.", "OK");`    В В В В В В В В `((ListView)sender).SelectedItem
    = null;`    В В В В `};`    Listing [5-1](#A978-1-4842-0214-2_5_Chapter.html#FPar3)
    shows the complete `ListView` example for binding to a `List` of `Strings`, selecting
    an item using `async/await` for backgrounding the `ItemTapped` event handler,
    and then clearing the selected row when youвҖҷre done.  Listing 5-1\. Binding to
    a List of Strings in ListViewStrings.cs  `class ListViewStrings: ContentPage`    В В В В `{`    В В В В В В В В `public
