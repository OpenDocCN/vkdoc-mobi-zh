    to provide a Cancel option.    ### Managing State    i OS    State is typically
    managed in iOS by passing data directly into `UIViewController`. This is usually
    done by using custom public properties on the destination view controller. When
    using segues, override the `PrepareForSegue` method to populate these properties
    before the segue, similar to coding transitions by hand by using `PushViewController`.
    Less commonly, values are passed through the view controllerвҖҷs constructor. All
    the approaches covered here scope data to a single view controller at a time,
    which is ideal from an architecture and memory use standpoint.  Tip  Static global
    classes can be used to share object instances instead of passing values and were
    discussed in the Xamarin.Forms вҖңUsing a Static Global ClassвҖқ section earlier.    ####
    Using the PrepareForSegue Method    You can use segues on your storyboard to pass
