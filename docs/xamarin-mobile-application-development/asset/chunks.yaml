    \ `Xamarin.iOS` е…Ҙй—ЁжҢҮеҚ—пјҢдәҶи§Јд»ҘдёӢдё»йўҳпјҡ\n- дҪҝз”Ё `Xamarin Studio` жҲ– `Visual Studio` еҲӣе»ә `Xamarin.iOS`\
    \ и§ЈеҶіж–№жЎҲ\n- `Xcode` з•Ңйқўз”ҹжҲҗеҷЁжҲ– `Xamarin Designer for iOS`\n- ж•…дәӢжқҝпјҲStoryboardпјүе’Ңи·іиҪ¬пјҲSegueпјү\n\
    - `UIView` е’Ң `UIViewController`\n- еҹәжң¬ UI жҺ§д»¶пјҡ`UILabel`гҖҒ`UITextField`гҖҒ`UIButton`\
