    з”Ё C# иҝӣиЎҢз§»еҠЁејҖеҸ‘дёҺд»ҘеҫҖеӨ§еӨҡж•°дәәдҪҝз”ЁиҜҘиҜӯиЁҖзҡ„ж–№ејҸжҲӘз„¶дёҚеҗҢгҖӮжҲ‘д»¬з”Ёе®ғжқҘејҖеҸ‘йқһ Windows е№іеҸ°зҡ„еә”з”ЁпјҢеҚі Android е’Ң iOSгҖӮиҝҷж—ўжҳҜжңәйҒҮд№ҹжҳҜжҢ‘жҲҳгҖӮжңәйҒҮеңЁдәҺпјҢжҲ‘д»¬иғҪжҺҘи§ҰеҲ°жһ„жҲҗз”ұдёҚеҗҢе№іеҸ°е’Ңе°әеҜёзҡ„жүӢжңәдёҺе№іжқҝз”өи„‘з»„жҲҗзҡ„ж–°дёҡеҠЎеә”з”Ёз”ҹжҖҒзі»з»ҹзҡ„дё°еҜҢжҠҖжңҜгҖӮжҢ‘жҲҳеңЁдәҺпјҢиҝҷдәӣи®ҫеӨҮе’Ңе№іеҸ°зҡ„и®ёеӨҡж–№йқўеҜ№жҲ‘д»¬жқҘиҜҙйғҪжҳҜеҙӯж–°зҡ„пјҢйңҖиҰҒеӯҰд№ еҫҲеӨҡзҹҘиҜҶгҖӮеҪ“з„¶пјҢжҲ‘д»¬д№ҹеҸҜд»Ҙз”Ё
    C# жһ„е»ә Windows Phone е’Ңе№іжқҝз”өи„‘еә”з”ЁгҖӮи·Ёе№іеҸ°ејҖеҸ‘зҡ„жң¬иҙЁжҳҜжһ„е»әиғҪеңЁеӨҡдёӘз§»еҠЁж“ҚдҪңзі»з»ҹдёҠиҝҗиЎҢзҡ„еә”з”ЁпјҡдҫӢеҰӮпјҢеңЁ Android е’Ң iOS дёҠпјӣжҲ–еңЁ
    iOS е’Ң Windows Phone дёҠпјӣдәҰжҲ–еңЁ iOSгҖҒAndroid е’Ң Windows Phone дёҠгҖӮйҖҡиҝҮиҝҗз”Ёжң¬д№Ұж¶өзӣ–зҡ„и·Ёе№іеҸ°жҠҖжңҜпјҢдҪ е°Ҷе…·еӨҮдёәжүҖжңүдё»жөҒз§»еҠЁе№іеҸ°иҝӣиЎҢејҖеҸ‘зҡ„иғҪеҠӣпјҒ


