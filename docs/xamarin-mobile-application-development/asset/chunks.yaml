    \ Xamarin иҖҒжүӢзҡ„д»·еҖјгҖӮ\n\nвҖ”Jesse Liberty\n\n## йўқеӨ–еүҚиЁҖ\n\nжҲ‘з¬¬дёҖж¬ЎзңӢеҲ° Xamarin.Forms ж—¶пјҢе®ғеҮ д№Һиҝҳйҡҫд»ҘзңӢеҮәеҰӮд»ҠиҝҷдёӘејәеӨ§зҡ„и·Ёе№іеҸ°жЎҶжһ¶зҡ„еҪұеӯҗгҖӮжҲ‘еҪ“ж—¶жӯЈеңЁжӢңи®ҝжҲ‘д»¬ж—§йҮ‘еұұзҡ„еҠһе…¬е®ӨпјҢеӨңж·ұдәҶпјҢJason\
