    = new ListCustomAdapter(this, listItems);`    ### Navigation Drawer    android    The
    navigation drawer is the sliding side menu triggered by tapping an icon (usually
    the hamburger) at the top of the screen. Like the toolbar, the drawer layout is
    used as part of the Support Library to support older APIs (`android.support.v4.widget.DrawerLayout`).
    The available implementation solutions are too lengthy to include here. The following
    are some recommended sources for navigation drawer implementations:    *   Effective
    Navigation in Xamarin.Android: Part 1вҖ”Navigation Drawer at MotzCod.es by James
    Montemagno *   And his GitHub example at [`https://github.com/jamesmontemagno/Xam.NavDrawer`](https://github.com/jamesmontemagno/Xam.NavDrawer)    ###
    Tabs Using ActionBar    android    Tabbed menus at the top of the screen allow
    switching screen content between different pages (Figure [6-33](#A978-1-4842-0214-2_6_Chapter.html#Fig33)).    ![A978-1-4842-0214-2_6_Fig33_HTML.jpg](A978-1-4842-0214-2_6_Fig33_HTML.jpg)    Figure
    6-33.  Action bar tabs  Android provides this functionality in the action bar,
    which handles tabs, but the page flipping must be coded manually by using fragments.
    There are a few steps to make this work:  Add a `FrameLayout` to the main layout
    XML to contain the tab fragments. В  Create a fragment class and layout XML for
    each tab. В  In the main activity, instantiate `ActionBar` and set its `NavigationMode`
    to `Tabs`. В  Add tabs to the action bar by using `AddTab`. В  Add event handlers
    for `TabSelected` and `TabUnselected` that invoke and destroy the tab fragments.
    В   LetвҖҷs go through the steps in detail.    Add a `FrameLayout` called `fragmentContainer`
    to the main layout XML, as in Listing [6-55](#A978-1-4842-0214-2_6_Chapter.html#FPar88),
    which will contain the dynamically loaded tab layout XML.  Listing 6-55\. Main
    Layout in TabMain.axml  В В В В `<LinearLayout ExternalRef"> http://schemas.android.com/apk/res/android``"`    В В В В В В В В `android:orientation="vertical"`    В В В В В В В В `android:layout_width="fill_parent"`    В В В В В В В В `android:layout_height="fill_parent">`    В В В В В В В В `<``FrameLayout`    В В В В В В В В В В В В `android:id="@+id/fragmentContainer"`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="0dip"`    В В В В В В В В В В В В `android:layout_weight="1"
    />`    В В В В `</LinearLayout>`    Create a fragment class for each tab. The first
    one is shown in Listing [6-56](#A978-1-4842-0214-2_6_Chapter.html#FPar89).  Listing
    6-56\. Tab Fragment in TabFirstFragment.cs  В В В В `class TabFirstFragment : Fragment`    В В В В `{`    В В В В В В В В `public
    override View OnCreateView(LayoutInflater inflater,`    В В В В В В В В В В В В `ViewGroup
    container, Bundle savedInstanceState)`    В В В В В В В В `{`    В В В В В В В В В В В В `base.OnCreateView(inflater,
