    using `GridUnitType.Absolute` works in a manner similar to the `Height` assignment:    В В В В `new
    RowDefinition { Width = new GridLength(200, GridUnitType.Absolute) }`    ### Expanding
    Views to Fit Available Space    xamarin.forms    `GridUnitType.Star`, the default
    setting for both `Height` and `Width`, expands a view within rows or columns to
    fill the available space. This is useful for filling the screen horizontally with
    columns or vertically with rows to the edge of the screen, especially when views
    are small. It behaves similarly to the `FillAndExpand` layout option, inserting
    padding space into the specified row or column.    Expand vertically by setting
    the `Height` of a `RowDefinition`. Change the third `RowDefinition` to use `GridUnitType.Star`:    В В В В `RowDefinitions
    =`    В В В В `{`    В В В В В В В В `new RowDefinition { Height = GridLength.Auto },`    В В В В В В В В `new
    RowDefinition { Height = new GridLength(200, GridUnitType.Absolute) },`    В В В В В В В В `new
    RowDefinition { Height = new GridLength(1,``GridUnitType.Star``) },`    В В В В В В В В `new
    RowDefinition { Height = GridLength.Auto }`    В В В В `},`    `GridUnitType.Star`
    expands to push the row beneath it all the way to the bottom of the screen, as
    shown in Figure [3-15](#A978-1-4842-0214-2_3_Chapter.html#Fig15). Remember that
    in many of these examples, the `Padding` property is being used to create space
