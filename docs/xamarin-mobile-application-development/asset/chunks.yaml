    up our `ContentPageExample` constructor with controls.    ## Adding Xamarin.Forms
    Views    xamarin.forms    View is the term for control in Xamarin.Forms, the smallest
    unit of UI construction. Most views inherit from the `View` class and provide
    basic UI functions, such as a label or a button. From this point on, we will use
    the terms view and control interchangeably.  Tip  All example code solutions,
    including the XAML versions of these C# examples, can be found under the title
    of this book on [Apress.вҖӢcom](http://www.apress.com/9781484202159?gtmf=s) in the
    Source Code/Downloads tab, or on GitHub at [https://вҖӢgithub.вҖӢcom/вҖӢdanhermes/вҖӢxamarin-book-examples](https://github.com/danhermes/xamarin-book-examples).    LetвҖҷs
    start simply and put some views into the `ContentPageExample` class.    ### Label
    View    Labels display single or multiline text. Here are some examples:    `Label
    labelLarge = new Label`    `{`    В В В В В В В В `Text = "Label",`    В В В В В В В В `FontSize
    = 40,`    В В В В В В В В `HorizontalOptions = LayoutOptions.Center`    `};`    `Label
    labelSmall = new Label`    `{`    В В В В В В В В `Text = "This control is great for\n"
    +`    В В В В В В В В В В В В В В В В `"displaying one or more\n" +`    В В В В В В В В В В В В В В В В `"lines
    of text.",`    В В В В В В В В `FontSize = 20,`    В В В В В В В В `HorizontalOptions = LayoutOptions.CenterAndExpand`    `};`    Multiline
    text happens implicitly when enough text is used that it wraps, or explicitly
    when specifying line breaks with `\n`.    A `Label` view has two types of alignment,
    view-justification and text-justification. The entire view is justified within
    a layout using the `HorizonalOptions` and `VerticalOptions` properties assigned
    using `LayoutOptions. Label` text is justified within a `Label` using LabelвҖҷs
    `XAlign` and `YAlign` properties, where `XAlign` sets the horizontal and `YAlign`
    sets the vertical justification of text.    `XAlign = TextAlignment.End`    The
    `TextAlignment` enumeration has three values: `Start`, `Center`, and `End`. In
    this example we use the defaults.    Next, the labels must be assigned to a layout
    for placement on the page.    ### Placing Views Using StackLayout    xamarin.forms    A
    `Layout` view acts as a container for other views. Since a `ContentPage` can have
    only one child, all the views on our page must be placed in a single container
    that is made the child of the `ContentPage`. Here we employ `StackLayout`, a subclass
    of `Layout` that can вҖңstackвҖқ child views vertically:    `StackLayout stackLayout
    = new StackLayout`    `{`    В В В В В В В В `Children =`    В В В В В В В В `{`    В В В В В В В В В В В В `labelLarge,`    В В В В В В В В В В В В `labelSmall`    В В В В В В В В `},`    В В В В В В В В `HeightRequest
    = 1500`    `};`    We place all the child views onto the parent view by using
    the `Children` property of this `StackLayout` and set the requested height with
    `HeightRequest. HeightRequest` has been set larger than the visible page so later
    we can make it scroll.  Note  `StackLayout` child views are laid vertically unless
    horizontal order is specified using `Orientation = StackOrientation.Vertical`.    To
    get the `StackLayout` to display on our page, we must assign it to the `Content`
    property of the `ContentPage`:    `this.Content = stackLayout;`    Compile and
    run the code. Figure [2-7](#A978-1-4842-0214-2_2_Chapter.html#Fig7) shows our
    labels on the StackLayout for iOS, Android, and Windows Phone, respectively.    ![A978-1-4842-0214-2_2_Fig7_HTML.jpg](A978-1-4842-0214-2_2_Fig7_HTML.jpg)    Figure
    2-7.  Xamarin.Forms `Labels` on a `StackLayout`  If youвҖҷre using iOS and want
    your Xamarin.Forms projects to look more like examples in this book that have
    a black background and white text, or youвҖҷre using another platform and want more
    of an iOS look, setting background color and font color can help you.    ### Background
    Color and Font Color    xamarin.forms    Page background color and view font color
    can be changed using the `ContentPage''s BackgroundColor` property and the `TextColor`
    property found on text-based `Views`.    If you are working on an iOS project
    and want your work to look more like the book examples with black backgrounds,
    add this line to your page:    `this.BackgroundColor = Color.Black;`    If you
    want it to look more classically iOS then set it to `Color.White`.    Text color
    will then be set automatically to a lighter color. However, you can control text
    color manually on text controls with the `TextColor` property.    `TextColor =В В Color.White,`    We
    use fonts in many controls, so letвҖҷs do a quick overview of those.    ### Using
    Fonts    xamarin.forms    Format text on controls by using these properties:    *   FontFamily:
    Set the name of the font in the `FontFamily` property, otherwise, the default
    system font will be used. For example, `label.FontFamily = "Courier";` *   FontSize:
    The font size and weight are specified in the `FontSize` property using a double
    value or a `NamedSize` enumeration. Here is an example using a double: `label.FontSize
    = 40;`. Set a relative size by using `NamedSize` values such as `NamedSize.Large`,
    using `NamedSize` members `Large`, `Medium`, `Small`, and `Micro`. For example,
    `button.FontSize = Device.GetNamedSize (NamedSize.Large, typeof(Button));` *   FontAttributes:
    Font styles such as bold and italics are specified using the FontAttributes property.
    Single attributes are set like this: `label.FontAttributes = FontAttributes.Bold.
    FontAttribute` options are `None, Bold, and Italic`. Multiple attributes are concatenated
    using the вҖң|вҖқ, for example, `label.FontAttributes = FontAttributes.Bold | FontAttributes.Italic;`  Tip  Some
    controls support the use of different `FontAttributes` on different parts of a
    string using the `FormattedString` class.  Note  The `FontSize` property using
    `NamedSize0` can be declared two ways:  `button.FontSize = Device.GetNamedSize
    (NamedSize.Large,` `button` `);` В  `button.FontSize = Device.GetNamedSize (NamedSize.Large,`
    `typeof(Button)` `);` В   Use the second one for inline declarations.    ### Using
    Platform-Specific Fonts    xamarin.forms    Make sure your font name will work
    for all your target platforms, or your page may fail mysteriously. If you need
    different font names per platform, use the `Device.OnPlatform` method, which sets
    the a value according to the platform, like this:    `label.FontFamily = Device.OnPlatform
    (`    В В В В В В В В `iOS:В В В В В В " Courier",`    В В В В В В В В `Android:В В "Droid Sans Mono",`    В В В В В В В В `WinPhone:
    " Courier New"`    `);`    `label.FontSize = Device.OnPlatform (`    В В В В В В В В `30,`    В В В В В В В В `Device.GetNamedSize
    (NamedSize.Medium, label),`    В В В В В В В В `Device.GetNamedSize (NamedSize.Large,
    label)`    `);`  Tip  Using `Device.OnPlatform` is a handy cross-platform trick
    that returns a platform-specific value.    Custom fonts loaded at runtime can
    also be used but this requires platform-specific coding covered in the Xamarin.Forms
    online docs in section Working With... вһӨ Fonts(1.3).    ### Button View    xamarin.forms    Xamarin.Forms
    buttons are rectangular and clickable.    LetвҖҷs add a plain ole button:    `Button
    button = new Button`    `{`    В В В В В В В В `Text = "Make It So",`    В В В В В В В В `FontSize
    = Device.GetNamedSize(NamedSize.Large, typeof(Button)),`    В В В В В В В В `HorizontalOptions
    = LayoutOptions.Center,`    В В В В В В В В `VerticalOptions = LayoutOptions.Fill`    `};`    The
    `Text` property contains the text visible on the button. `HorizontalOptions` and
    `VerticalOptions` (discussed in the next section) determine the controlвҖҷs alignment
    and size. This `NamedSize` font setting makes the font `Large`.  Tip  Buttons
    can be customized using the `BorderColor`, `BorderWidth`, and `TextColor` properties.
    The `BorderWidth` is defaulted to zero on iOS.    Add the button to our StackLayout.    `StackLayout
    stackLayout = new StackLayout`    `{`    В В В В В В В В `Children =`    В В В В В В В В `{`    В В В В В В В В В В В В `labelLarge,`    В В В В В В В В В В В В `labelSmall,`    В В В В В В В В В В В В `button`    В В В В В В В В `},`    В В В В В В В В `HeightRequest
    = 1500`    `};`    Figure [2-8](#A978-1-4842-0214-2_2_Chapter.html#Fig8) shows
    the new button.    ![A978-1-4842-0214-2_2_Fig8_HTML.jpg](A978-1-4842-0214-2_2_Fig8_HTML.jpg)    Figure
    2-8.  Xamarin.Forms Button  Now letвҖҷs assign an event handler, either inline:    `button.Clicked
    += (sender, args) =>`    `{`    В В В В В В В `button.Text = "It is so!";`    `};`    Or
    by assigning a method:    `button.Clicked += OnButtonClicked;`    . . . ;which
    is called outside the page constructor:    `void OnButtonClicked(object sender,
    EventArgs e)`    В В В В В В В В `{`    В В В В В В В В В В В В `button.Text = "It is so!";`    В В В В В В В В `};`    `When
    you click the button the button text changes, as in Figure` [2-9](#A978-1-4842-0214-2_2_Chapter.html#Fig9).    ![A978-1-4842-0214-2_2_Fig9_HTML.jpg](A978-1-4842-0214-2_2_Fig9_HTML.jpg)    Figure
    2-9.  `button.Clicked` event fired Tip  If you assign an event handler outside
    the page constructor, be sure to also define your button outside the constructor
    to avoid a variable undefined error.    `BorderWidth` assigns the weight of the
    line that draws the button.    ### Setting View Alignment and Size: HorizontalOptions
    and VerticalOptions    xamarin.forms    Horizontal and vertical alignment and,
    to a certain degree, the size of controls are managed by setting the `HorizontalOptions`
    and/or `VerticalOptions` properties to a value of the `LayoutOptions` class, for
    example:    `Button button = new Button`    `{`    `HorizontalOptions = LayoutOptions.Center,`    В В В В В В В В `VerticalOptions
    = LayoutOptions.Fill`    `}`    Considerations in view layout are the space provided
    to the view by the layout and surrounding elements, the padding space around the
    view, and the size of the view itself. These types of formatting are accomplished
    using `LayoutOptions` and `AndExpand`.    #### Justification with LayoutOptions    Individual
    control layout is defined along a single axis by setting the `HorizontalOptions`
    or `VerticalOptions` property to one of the `LayoutOptions` classes:    *   `Start`
    left or top-justifies the control (depending upon layout `Orientation`) *   `Center`
    centers the control. *   `End` right or bottom-justifies the control. *   `Fill`
    expands the size of the control to fill the space provided.    For example:    `HorizontalOptions
    = LayoutOptions.Start,`    #### AndExpand Pads with Space    Setting `HorizontalOptions`
    or `VerticalOptions` to these `LayoutOptions` classes provides padding space around
    the view:    *   `StartAndExpand` left or top-justifies the control and pads around
    the control with space. *   `CenterAndExpand` centers the control and pads around
    the control with space. *   `EndAndExpand` right or bottom-justifies the control
    and pads around the control with space. *   `FillAndExpand` expands the size of
    the control and pads around the control with space.    For example:    `HorizontalOptions
    = LayoutOptions.StartAndExpand`  Tip  `HorizontalOptions` set to `Fill` and `FillandExpand`
    look the same with a single control in a column.  Tip  `VerticalOptions` set to
    `Center` or `Fill` is useful only if vertical space has been explicitly provided.
    Otherwise, these options can appear to do nothing. `LayoutOptions.Fill` wonвҖҷt
    make your control taller if thereвҖҷs no space to grow.  Tip  `VerticalOptions`
    set to `Expand` and `CenterAndExpand` imposes padding space around a control in
    a `StackLayout`.    There are more formatting examples later in this chapter and
    a lot more on the topic of control layout and alignment in [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html).
    Next letвҖҷs create some user input.    ### Entry View for Text Input    xamarin.forms    The
    following code creates a text box for user entry of a single line of text. `Entry`
    inherits from the `InputView` class, a derivative of the `View` class.    `Entry
    entry = new Entry`    `{`    В В В В В В В В `Placeholder = "Username",`    В В В В В В В В `VerticalOptions
    = LayoutOptions.Center,`    В В В В В В В В `Keyboard = Keyboard.Text`    `};`    User
    input goes into the `Text` property as a `String`.    Note the use of the `Placeholder`
    property, an inline label for the name of the field and a common technique in
    the mobile UI often preferable to space-consuming labels placed above or beside
    the entry control. The `Keyboard` property is a member of `InputView` and provides
    a range of options for the onscreen keyboard that appears for input, including
    `Text`, `Numeric`, `Telephone`, `URL`, and `Email`. Remember to add the entry
    to our `StackLayout` (see Listing [2-5](#A978-1-4842-0214-2_2_Chapter.html#FPar21)
    later in the chapter). Figure [2-10](#A978-1-4842-0214-2_2_Chapter.html#Fig10)
    shows the new entry control for username.    ![A978-1-4842-0214-2_2_Fig10_HTML.jpg](A978-1-4842-0214-2_2_Fig10_HTML.jpg)    Figure
    2-10.  Xamarin.Forms User Entry view Tip  Use the `IsPassword` property to replace
    entered text letters with dots.    For multiline entry, use the `Editor` control.    ###
    BoxView    xamarin.forms    The `BoxView` control creates a colored graphical
    rectangle, useful as a placeholder that can be later replaced by an image or other
    more complex control or group of controls. This control is useful when youвҖҷre
    waiting on the designer to get his/her act together.    `BoxView boxView = new
    BoxView`    `{`    В В В В В В В В `Color = Color.Silver,`    В В В В В В В В `WidthRequest =
    150,`    В В В В В В В В `HeightRequest = 150,`    В В В В В В В В `HorizontalOptions = LayoutOptions.StartAndExpand,`    В В В В В В В В `VerticalOptions
    = LayoutOptions.Fill`    `};`    The `Color` property can be set to any `Color`
    member value. The default dimensions are 40Г—40 pixels, which can be changed using
    the `WidthRequest` and `HeightRequest` properties.  Tip  Be careful when setting
    `HorizontalOptions` and `VerticalOptions` to `LayoutOptions.Fill` and `LayoutOptions.FillAndExpand`,
    as this can override your `HeightRequest` and `WidthRequest` dimensions.    Add
    the BoxView to your StackLayout (see Listing [2-5](#A978-1-4842-0214-2_2_Chapter.html#FPar21)
    later in the chapter) and see the result here in Figure [2-11](#A978-1-4842-0214-2_2_Chapter.html#Fig11).    ![A978-1-4842-0214-2_2_Fig11_HTML.jpg](A978-1-4842-0214-2_2_Fig11_HTML.jpg)    Figure
    2-11.  Xamarin.Forms BoxView  Eventually your designer will give you those promised
    icons and you can replace your `BoxViews` with real images.    ### Image View    xamarin.forms    The
    `Image` view holds an image for display on your page from a local or online file:    `Image
    image = new Image`    `{`    В В В В В В В В `Source = "monkey.png",`    В В В В В В В В `Aspect
    = Aspect.AspectFit,`    В В В В В В В В `HorizontalOptions = LayoutOptions.End,`    В В В В В В В В `VerticalOptions
    = LayoutOptions.Fill`    `};`    Figure [2-12](#A978-1-4842-0214-2_2_Chapter.html#Fig12)
    shows the monkey image at the bottom right.    ![A978-1-4842-0214-2_2_Fig12_HTML.jpg](A978-1-4842-0214-2_2_Fig12_HTML.jpg)    Figure
    2-12.  Image view  LetвҖҷs look at how an image is handled.    #### Source Property    The
    `Source` property denotes the location of the image by using these `ImageSource`
    class members:    *   `FromFile`: Local image file, for example, `ImageSource.FromFile("monkey.png").`
    The shortcut for this method when assigning the Source is to leave off the method
    altogether: `Source = "monkey.png"` *   `FromResource`: Resource ID to an `EmbeddedResource`
    in the app or PCL, for example, `ImageSource.FromResource("monkey.png").` *   `FromUri`:
    Online imageвҖҷs URI, for example, `ImageSource.FromUri((new Uri(` [`http://yourdomain.com/image.png`](http://yourdomain.com/image.png))
    `))`  Tip  You can use a `FromFile` shortcut to assign a local image: `Source
    = "monkey.png"`    #### Local Images    Local image files have platform-specific
    image folders in their respective projects:    *   Android: In the `Resources/drawable`
    folder. DonвҖҷt use special characters in the filename. The Build Action must be
    set to `Android Resource`. *   iOS: In the `/Resources` folder. Provide images
    for Retina displays as well, double resolution with @2x suffix on the filename
    before the extension. The Build Action must be set to `BundleResource`. *   Windows
    Phone: In the Windows Phone project root directory. The Build Action must be set
    to `Content`.    Set Build Actions to configure images to compile properly by
    right-clicking image files in the project.    #### Image Sizing: Aspect Property    The
    `Image.Aspect` property determines image sizing and is set by using the `Aspect`
    enumeratorвҖ”for example, `image.Aspect = Aspect.AspectFit`. These are the `Aspect`
    members:    *   `AspectFill`: Scale the image to fill the view, clipping if necessary.
    *   `AspectFit`: Scale the image to fit within the view maintaining the aspect
    ratio with no distortion and leaving space if necessary (letterboxing). *   `Fill`:
    Scale the image to fill the view entirely and exactly, possibly distorting the
    image. *   Those are the image formatting options. Next we will make our image
    clickable.    #### Making an Image Clickable with a GestureRecognizer    Tappable
    images and icons are common in mobile applications for actions and navigation.
    Like many Xamarin.Forms views, the `Image` doesnвҖҷt have a click or tap event and
    must be wired up using the `GestureRecognizer` class. A gesture recognizer is
    a class that can be added to many views to respond to user interaction. It currently
    supports just the tap gesture. The terms click and tap are used interchangeably
    in mobile UI development.    The standard gesture recognizer is declared and a
    handler is created to manage the `Tapped` event, then the gesture recognizer is
    added to the target view, an image in this case. Change the imageвҖҷs `Opacity`
    to .5 in the handler, which will fade the image slightly when tapped.    `var
    tapGestureRecognizer = new TapGestureRecognizer();`    `tapGestureRecognizer.Tapped
    += (s, e) => {`    В В В В В В В В `image.Opacity = .5;`    `};`    `image.GestureRecognizers.Add(tapGestureRecognizer);`    Give
    that a try and make your monkey fade so you can see that the gesture recoginizer
    works.  Tip  An alternative implementation of `GestureRecognizer` uses the `Command`
    property.    `image.GestureRecognizers.Add (new TapGestureRecognizer {`    В В В В В В В `Command
    = new Command (()=> { /*handle tap*/ }),`    `});`    User feedback is a crucial
    concept in mobile UI development. Any time a user does something in the UI there
    should be some subtle acknowledgment by the app. A tap, for instance, should respond
    to the user with visible feedback. Usually an image will gray out or have a white
    background for a sec when touched. LetвҖҷs do that professionally using the imageвҖҷs
    `Opacity` property but adding `async/await` to create a slight delay in our fade
    without affecting the appвҖҷs performance.    Replace the `Tapped` handler with
    this one that will cause the image to fade slightly for a fraction of a second.
    Remember to add `using System.Threading.Tasks`; to the top of your file for `async/await`.    `tapGestureRecognizer.Tapped
    +=В В async (sender, e) =>`    `{`    В В В В В В В В `image.Opacity = .5;`    В В В В В В В В `await
    Task.Delay(200);`    В В В В В В В В `image.Opacity = 1;`    `};`    Tapping on the image
    will now fade the image slightly, then back to normal, providing a responsive
    user experience.    In your own projects youвҖҷll use gesture recognizers (and async/await)
    to actually do something when an image is tapped. If you want to see `async/await`
    in action in this example, bump up the `Delay` to 2000, then click the вҖңMake It
    SoвҖқ button while itвҖҷs `await`ing and youвҖҷll see that the app is still responsive.
    You could do many things in this `Tapped` handler without interrupting the flow
    of the app! Often when a button or image is pressed, the result should be backgrounded
    using `async/await` for an optimal user experience.  Tip  `Async/await` is a standard
    C# technique for queuing up activities in the background for simultaneous activity
    using the Task Parallel Library (TPL). Many Xamarin methods and functions are
    provisioned for background processing using `async/await`.    ### Finalizing the
    StackLayout    xamarin.forms    Now that we have our controls in place, letвҖҷs
