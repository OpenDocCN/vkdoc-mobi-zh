    Sizing Rows and Columns    xamarin.forms    The size of rows and columns is determined
    by `GridLength`. You can autosize, expand, or set specific heights and widths
    on rows or columns. `GridLength` is defined by its `GridUnitType`, of which there
    are three:    *   `Auto` sizes the dimension of a row or column to its content.
    *   `Absolute` indicates a numeric dimension of the row or column. *   `Star`
    is the default setting, which expands the dimension of a row or column as much
    as possible, pushing subsequent rows or columns to the edge.    Assign a `GridLength`
    object to `Height` in `RowDefinitions`:    В В В В `new RowDefinition { Height = new
    GridLength(200, GridUnitType.Absolute)`    or to `Width` in `ColumnDefinition`:    В В В В `new
    ColumnDefinition { Width = GridLength.Auto }`    ### Sizing to Fit Views    xamarin.forms    The
    `Auto` value of `GridUnitType` sizes the row or column to the size of the contained
    views. Our `Grid` example is made up entirely of `Auto` sized rows, which we assign
    using a shorthand `GridLength` constructor:    В В В В `GridLength.Auto`    That returns
    a `GridLength` of type `GridUnitType.Auto`. Here is the longhand method:    В В В В `new
    GridLength(1,``GridUnitType.Auto``)`    The first parameter, with double value
    1, is ignored for `GridUnitType.Auto`. Now letвҖҷs add `Absolute` and `Star`, which
    use the longhand `GridLength` method.  Tip  Small views used with `UnitType.Auto`
    can make it seem like rows or columns are missing. `GridUnitType.Star` is used
    to expand the grid to its proper proportions. See вҖңExpanding Views ProportionallyвҖқ
    later in this chapter.    ### Setting Exact Size    xamarin.forms    `The Absolute`
    value of `GridUnitType` sets the exact height or width of a row or column. This
    is the general- case method:    В В В В `new GridLength(unitSize, GridUnitType.Absolute)`    Change
    the second `RowDefinition Height` to an absolute size of 200 units:    В В В В `RowDefinitions
    =`    В В В В `{`    В В В В В В В В `new RowDefinition { Height = GridLength.Auto },`    В В В В В В В В `new
    RowDefinition { Height = new GridLength(200,`    В В В В В В В В В В В В `GridUnitType.Absolute)
    },`    В В В В В В В В `new RowDefinition { Height = GridLength.Auto },`    В В В В В В В В `new
    RowDefinition { Height = GridLength.Auto }`    В В В В `},`    The second row is set
    to an absolute height of units, stretching it vertically, as shown in Figure [3-14](#A978-1-4842-0214-2_3_Chapter.html#Fig14).
    This code is found in `GridExample2.cs`.    ![A978-1-4842-0214-2_3_Fig14_HTML.jpg](A978-1-4842-0214-2_3_Fig14_HTML.jpg)    Figure
