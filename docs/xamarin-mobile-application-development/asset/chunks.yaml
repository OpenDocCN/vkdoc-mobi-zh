    control used to select the date and time (Figure [4-32](#A978-1-4842-0214-2_4_Chapter.html#Fig32)).    ![A978-1-4842-0214-2_4_Fig32_HTML.jpg](A978-1-4842-0214-2_4_Fig32_HTML.jpg)    Figure
    4-32.  UIDatePicker has columns of spinners  The `UIDatePicker` is typically linked
    to a `UITextField` which, when tapped, pops up the picker.    Using the designer
    of your choice, create a `UITextField` on the layout and name it `textView`. Enter
    the name of the field in the `Text` property, in this case `Your Birthday`.    In
    the `ViewControllerвҖҷs``ViewDidLoad` method, code the `UIDatePicker` and set the
    `Mode` property to `Date`, to allow date-only selection:    В В В В В В В В `UIDatePicker
    datePicker = new UIDatePicker ();`    В В В В В В В В `datePicker.Mode = UIDatePickerMode.Date;`    В В В В В В В В `datePicker.BackgroundColor
    = UIColor.White;`  Tip  WeвҖҷll cover other modes, such as `Time`, `DateAndTime`,
    and `CountDownTimer`, in the upcoming вҖңSpecify Which Fields to DisplayвҖқ subsection.    Restrict
    the range of entries by using the `MinimumDate` and `MaximumDate` properties:    В В В В В В В В `datePicker.MinimumDate
    = (NSDate)DateTime.Today.AddDays(-7);`    В В В В В В В В `datePicker.MaximumDate = (NSDate)DateTime.Today.AddDays(7);`    This
    example limits the date to a two-week range centered on todayвҖҷs date. Dates outside
    this range can be selected with the spinner, but the spinner will then spin back
    within the allowable range.    Next you need to make the date picker into a pop-up.    ####
    Making a UIDatePicker into a Pop-up    Like `UIPickerView`, a modal dialog box
    can be created several ways, the most common using `UITextField.InputView`. The
    `InputView` property of the `UITextField` supports the assignment of an alternative
    вҖңkeyboardвҖқ that is, in this case, a `UIDatePicker`. This keyboard can be decorated
    with additional controls, such as a toolbar with a Done button. Create a `UIToolbar`
    and add the Done button, which populates the `textField` with the date when tapped:    В В В В В В В В `UIToolbar
    toolbar = new UIToolbar();`    В В В В В В В В `toolbar.BarStyle = UIBarStyle.Default;`    В В В В В В В В `toolbar.Translucent
