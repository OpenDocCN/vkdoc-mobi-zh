    3-12.  secondLabel placed at the bottom of the screen with y set to 1  #### Setting
    Location and Size by Using Rectangles    Rectangles provide `AbsoluteLayout` with
    the location and size of a bounded area in which to place a view. This is the
    constructor of `Xamarin.Forms.Rectangle`:    В В В В `Rectangle (double locationX,
    double locationY, double width, double height)`    All parameters are doubles
    ranging from 0 to 1\. Here are a few examples of instantiated rectangles and how
    the parameters affect location:    *   Located at the origin with maximum width
    and height: `new Rectangle (0, 0, 1, 1)` *   Horizontally centered in the space
    provided: `new Rectangle (.5, 0, 1, 1)` *   Vertically centered in the space provided:
    `new Rectangle (0, .5, 1, 1)` *   Horizontally and vertically centered in the
    space provided: `new Rectangle (.5, .5, 1, 1)`    The following are examples of
    parameters affecting size:    *   Located at the origin with maximum width and
    height: `new Rectangle (0, 0, 1, 1)` *   Located at the origin at 20% width: `new
    Rectangle (0, 0, .2, 1)` *   Located at the origin at 20% height: `new Rectangle
    (0, 0, 1, .2)` *   Located at the origin at 20% width and height: `new Rectangle
    (0, 0, .2, .2)`  Tip  The `AbsoluteLayout` examples in this chapter show relative
    units because that is the generally Вӯrecommended cross-platform approach. `AbsoluteLayout`
    can also use device-specific units. Be certain you know what youвҖҷre doing, as
    device-specific units can cause inconsistent results across different platforms
    and devices. Specify `AbsoluteLayoutFlags.None` and then use device-specific units
    with float values greater than 1:    `AbsoluteLayout.SetLayoutFlags(secondLabel,AbsoluteLayoutFlags.None);`    `AbsoluteLayout.SetLayoutBounds(secondLabel,`    `new
    Rectangle (250f, 250f, 200f, 50f));`    #### Setting Location by Using Points    Points
    can specify the location of a view when the size is not needed. Views can be added
    to `AbsoluteLayout` very simply by using a point:    В В В В `absoluteLayout.Children.Add
    (firstLabel, new Point(0,0));`    Points work just like the location portion of
    a rectangle, defining the x and y position by using doubles ranging from 0 to
    1\. HereвҖҷs the `Point` constructor:    В В В В `Point( double locationX, double locationY)`    Points
    and rectangles are just geometric objects until theyвҖҷre bound to a viewвҖҷs location
    or size by using `SetLayoutFlags`.    ### Binding to the Bounding Object by Using
    SetLayoutFlags    xamarin.forms    Layout flags describe the relationship between
    the view and the bounding object in regards to location and size. The definition
    of a bounding object has no impact on the associated view unless a relationship
    is created using layout flags. This relationship creates a correlation between
    the child view and the bound rectangle or point. The following line of code associates
    the `firstLabel` view with the location of its bounding object:    В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В `AbsoluteLayoutFlags.PositionProportional);`    Relationships
    between views and bounding objects are made by `AbsoluteLayoutFlags` in the second
    parameter of `SetLayoutFlags`. This can be done by location, by size, or by both
    location and size.  Tip  The most commonly used layout flags are `PositionProportional`
    and `All` because we are usually either placing a view or both placing and sizing
    it.  Tip  Images size well this way:    В В В В В `absoluteLayout.Add (image, new Rectangle
    (0, 0, 1, 1),`    В В В В В В В В В `AbsoluteLayoutFlags.All);`    #### Binding Location    Bind
    the x/y location of the bounding object to the view by using these flags:    *   `PositionProportional`
    associates a rectangle or a pointвҖҷs x/y location with the location of the view:    В В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В В `AbsoluteLayoutFlags.PositionProportional);`    If
    the rectangle or point is at 0,0, the view will be at 0,0.    *   `XProportional`
    associates a rectangle or a pointвҖҷs x coordinate with the location of the view:    В В В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В В В `AbsoluteLayoutFlags.XProportional);`    *   `YProportional`
    associates a rectangle or pointвҖҷs y coordinate with the location of the view:    В В В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В В В В `AbsoluteLayoutFlags.YProportional);`    ####
    Binding Size    Bind the size of the bounding object to the view by using these
    flags:    *   `SizeProportional` associates the rectangle size with the size of
    the view:    В В В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В В В В В `AbsoluteLayoutFlags.SizeProportional);`    If
    the rectangle is size .2,.5, the view will be sized to .2, .5.    *   `WidthProportional`
    associates the rectangle width with the width of the view:    В В В В В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В В В В В В В В В В В В `AbsoluteLayoutFlags.WidthProportional);`    *   `HeightProportional`
    - associates the rectangle height with the height of the view:    В В В В В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В В В В В `AbsoluteLayoutFlags.HeightProportional);`    ####
    Binding Both Location and Size    Connect (or disconnect) both location and size
    with a rectangle or point by using `All` or `None`.    *   `All` associates the
    rectangle or pointвҖҷs x/y location and size with the location and size of the view:    В В В В В В В В В В `AbsoluteLayout.SetLayoutFlags(firstLabel,`    В В В В В В В В В В В В В В `AbsoluteLayoutFlags.All);`    *   `None`
