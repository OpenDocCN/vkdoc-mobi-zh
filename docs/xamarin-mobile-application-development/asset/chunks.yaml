    Alerts and User Notifications Using UIAlertController    Alerts and user notifications
    are typically small modal pop-up dialog boxes containing real-time feedback to
    the user and one or more buttons to allow the user to dismiss or choose an option
    in response. Using `UIAlertController`, a title and message are included in the
    alert with the `Create` method, and buttons are added with the `AddAction` method.    Create
