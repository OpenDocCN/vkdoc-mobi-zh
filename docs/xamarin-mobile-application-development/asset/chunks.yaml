    Here is a shortcut constructor:    В В В В В В В В `public Slider (Double Minimum, DoubleВ В Maximum,
    DoubleВ В StartValue)`    This constructor can be implemented like this:    В В В В В В В В `SliderВ В slider
    = new SliderВ В (0,100,50);`    Figure [4-8](#A978-1-4842-0214-2_4_Chapter.html#Fig8)
    shows what the `Slider` view looks like (with `Value = 100`).    ![A978-1-4842-0214-2_4_Fig8_HTML.jpg](A978-1-4842-0214-2_4_Fig8_HTML.jpg)    Figure
    4-8.  Slider view at its max value  Sliding the slider changes the adjustable
    value and fires the `slider.ValueChanged` event. It can be handled inline or as
    a method, like so:    В В В В В В В В `slider.ValueChanged += (sender, e) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `eventValue.Text
    = String.Format("Slider value is {0:F1}", e.NewValue);`    В В В В В В В В В В В В `pageValue.Text
    = slider.Value.ToString();`    В В В В В В В В `};`    The properties `e.OldValue` and
    `e.NewValue` are available within this event to provide the old and new selected
