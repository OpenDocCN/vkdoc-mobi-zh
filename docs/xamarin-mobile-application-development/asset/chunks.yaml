    e) => {`    В В В В В В В В В В В В В В В В `DateTime dateTime = DateTime.SpecifyKind((DateTime)datePicker.Date,
    DateTimeKind.Unspecified);`    В В В В В В В В В В В В В В В В `this.textField.Text = dateTime.ToString("MM-dd-yyyy");`    В В В В В В В В В В В В В В В В `this.textField.ResignFirstResponder();`    В В В В В В В В В В В В `}
