    Rows    xamarin.forms    Customize the list rows by creating a custom row template,
    which is basically a custom cell containing a `Layout` with `Views`. It begins
    with a custom class inherited from `ViewCell`. Then we place a layout on it and
    add our views. `Views` are more versatile than the built-in cells like `TextCell`
    and expose more properties for layout and design.    With a custom row template,
    you can customize your labels and add more views to your list, as shown in Figure
    [5-6](#A978-1-4842-0214-2_5_Chapter.html#Fig6). These three labels have their
    positions, font sizes, attributes, and colors customized.    ![A978-1-4842-0214-2_5_Fig6_HTML.jpg](A978-1-4842-0214-2_5_Fig6_HTML.jpg)    Figure
    5-6.  Custom row template  LetвҖҷs walk through the code for this multi-line custom
    row example using three `Label Views` to display the title, description, and price.
    Figure [5-6](#A978-1-4842-0214-2_5_Chapter.html#Fig6) is an example where more
    control was needed over fonts and formatting than is provided for by the built-in
    cells.    Add `Price` to your `ListItem` data model.    В В В В `public class ListItem`    В В В В `{`    В В В В В В В В `public
