    6-8.  DisplayActionSheet is a method that can return a value  ### Managing State    xamarin.forms    state
    management is the handling and passing of data between pages as the user navigates
    through the app. There are four main approaches: passing data values directly
    into a pageвҖҷs constructor, using the static `Properties` dictionary on the `Application`
    object to persist key/value pairs to disk, a static data instance (global) available
    to all pages, and static properties on the `Application` object. Both the global
    and `Application` object techniques use the singleton pattern, and are useful
    for app-wide classes such as data access or business objects.    Pass data directly
    into pages whenever possible to keep the scope of variables narrow and manage
    memory prudently. The `Properties` dictionary persists when your app is backgrounded
    and even after your app has restarted!    LetвҖҷs start with the simplest technique,
    passing data directly into a page.    #### Passing Data into Page Parameters    State
    is typically managed in Xamarin.Forms by passing data directly into a `Page` using
    its constructor. This approach scopes data objects to a single page, which is
    ideal from an architecture and memory use standpoint.    When calling a new page,
    simply pass in whatever variables were defined in your pageвҖҷs constructor. Define
    a detail page with a `ListItem` class as a constructor parameter:    В В В В `class
    DetailPage : ContentPage`    В В В В `{`    В В В В В В В В `public DetailPage(ListItem item)`    В В В В В В В В `{`    Then
    pass instances of the `ListItem` class directly into `DetailPage`:    В В В В `Navigation.PushAsync
    (new detailPage(item));`    Add all the parameters in your page constructors needed
    to pass in data from other pages. More detail on this example can be found in
    Listing [6-8](#A978-1-4842-0214-2_6_Chapter.html#FPar20) and Listing [6-10](#A978-1-4842-0214-2_6_Chapter.html#FPar22).    Data
    elements are sometimes used on many pages across an entire application, and passing
    them individually can become cumbersome. Frequently used data elements can be
    placed into a static global class so they are available app-wide.    #### Disk
    Persistence Using the Properties Dictionary    The most persistent state feature
    built into Xamarin.Forms is the `Properties` dictionary. Name/value pairs are
    stored as objects to disk and retrieved on demand from anywhere within the app,
    even after the app has restarted. `Properties` works a bit like cookies for your
    app.    Save a value to the `Properties` dictionary by using a key value, such
    as `id`:    В В В В `Application.Current.Properties["id"] = 12345;`    Retrieve the
    value by using a cast from the `Properties` object type:    В В В В `var id = (int)Application.Current.Properties["id"];`  Tip  Properties
    are handy in the `Application`вҖҷs `OnStart`, `OnSleep`, and `OnResume` methods
    for saving data between user sessions. They can also be used in a `Page`вҖҷs `OnAppearing`
    and `OnDisappearing` events, which fire when a page is created or right before
    it is destroyed.    #### Using a Static Global Class    A static global class,
    a C# implementation of the Singleton pattern, can be used to store data across
    an entire application.  Important Note  Implementing a Singleton is a standard
    C# technique that can be used across all platforms: Xamarin.Forms, Xamarin.Android,
    Xamarin.iOS, and Windows Phone.    Create a static class called `Global` and place
    properties within it that you desire to use across your app, such as `myData`,
    as shown in Listing [6-6](#A978-1-4842-0214-2_6_Chapter.html#FPar17).  Listing
    6-6\. Static Global Class in Global.cs  В В В В `public class Global`    В В В В `{`    В В В В В В В В `private
    Global ()`    В В В В В В В В `{`    В В В В В В В В `}`    В В В В В В В В `private static Global _instance;`    В В В В В В В В `public
    static Global Instance`    В В В В В В В В `{`    В В В В В В В В В В В В В `get`    В В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В В `if
    (_instance == null)`    В В В В В В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В В В В В В `_instance
    = new Global ();`    В В В В В В В В В В В В В В В В В `}`    В В В В В В В В В В В В В В В В В `return _instance;`    В В В В В В В В В В В В В `}`    В В В В В В В В `}`    В В В В В В В В `public
    String myData { get; set; }`    В В В В `}`    Assign values to your static global
    class:    В В В В `Global.Instance.myData = "12345";`    Access the global properties
    from anywhere in your application:    В В В В `MyData myData = Global.Instance.myData;`  Caution  Overuse
    of static global classes can tax memory and affect performance. Pass variables
    directly between pages whenever you can so they go out of scope when no longer
    needed.    #### Using a Static Property on the Application Object    A singleton
    can be created by using a static property on the `Application` object:    В В В В `public
    class App : Application`    В В В В `{`    В В В В В В В В `static Database database;`    В В В В В В В В `public
    static Database MyDatabase {`    В В В В В В В В В В В В `get {`    В В В В В В В В В В В В В В В В `if (database
    == null) {`    В В В В В В В В В В В В В В В В В В В В `database = new Database ();`    В В В В В В В В В В В В В В В В `}`    В В В В В В В В В В В В В В В В `return
    database;`    В В В В В В В В В В В В `}`    В В В В В В В В `}`    Reference this database object
    anywhere in your app:    В В В В `App.MyDatabase.DBConnect();`    YouвҖҷll use this
    approach in [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html) for maintaining a
    database connection. (`DBConnect` is just an example method on the `Database`
    object.)    ### Drill-down Lists    xamarin.forms    A drill-down list is a list
    of tappable items selected to navigate to a new page. There are many ways to build
    them using Xamarin.Forms, and the following recipes cover the three most common
    types of drill-down lists: by item, by page, and grouped. A drill-down list by
    item has rows that can be selected to display more information about each item:
    the traditional master-detail pattern. A drill-down list by page is a menu of
    pages that can be selected to navigate to different `ContentPages`. Both of these
    recipes use a `ListView` to bind to a data model to provide a dynamic list of
    tappable items. A grouped drill-down list built using `TableView` is useful for
    creating categorized static menu items.    `ListView` is one of the most versatile
    tools for creating drill-down lists. Short lists can, of course, be constructed
    by hand by using any of the layouts filled with buttons or labels paired with
    gesture recognizers to handle taps. Longer lists lend themselves to data binding
    using `ListView`.    Grouping is the same as it was in the previous chapter using
    `ListView` grouping. Both items and pages can be grouped by using the `IsGroupingEnabled`
    and `GroupDisplayBinding` properties of `ListView`.    Lists of pages that require
    grouping can also be built by using `TableView`. This manual alternative to `ListView`
    uses the `TextCell Command` and `CommandParameter` properties instead of data
    binding.    WeвҖҷll begin with the data-bound `ListView` menus.    #### Using ListView
    by Item    xamarin.forms    Many lists contain a bunch of items that a user wants
    to drill down into to reach details about each item. Use `ListView` to display
    a list of items data-bound to a data model, and then show a detail page by using
    `PushAsync`, all wrapped in `NavigationPage` so the user can get back to the list.    You
    can create your `ListView` by using any of the approaches discussed in [Chapter
    5](#A978-1-4842-0214-2_5_Chapter.html). This implementation uses our list item
    class called `DrilldownListViewByItem` (see the full Listing [6-8](#A978-1-4842-0214-2_6_Chapter.html#FPar20)).
    Instantiate that page in the `Application` classвҖҷs constructor wrapped in `NavigationPage`
    (see the full Listing [6-9](#A978-1-4842-0214-2_6_Chapter.html#FPar21)).    В В В В `public
    class App : Application`    В В В В `{`    В В В В В В В В `public App()`    В В В В В В В В `{`    В В В В В В В В В В В В `MainPage
    = new NavigationPage(new DrilldownListViewByItem ());`    В В В В В В В В `}`    В В В В `}`    This
    creates the list shown in Figure [6-9](#A978-1-4842-0214-2_6_Chapter.html#Fig9),
    with a navigation bar on iOS and Android. Windows Phone doesnвҖҷt display the navigation
    bar.    ![A978-1-4842-0214-2_6_Fig9_HTML.jpg](A978-1-4842-0214-2_6_Fig9_HTML.jpg)    Figure
    6-9.  ListView on a page with a navigation bar  Create a detail page called `detailPage`
    whose constructor takes `ListItem` as a parameter (see the full Listing [6-10](#A978-1-4842-0214-2_6_Chapter.html#FPar22)).
    `ListItem` must contain either a list item ID for a detailed lookup query or all
    the fields needed to display on the detail page. This detail page displays a title
    and description.    В В В В `class DetailPage: ContentPage`    В В В В `{`    В В В В В В В В `public
    detailPage(ListItem listID) { // display detail }`    В В В В `}`    Back on the list
    page, when an item row is tapped, pass `ListItem` into the detail page, which
    displays the detail of that particular item.    В В В В `listView.ItemTapped += (sender,
    args) => {`    В В В В В В `var item = args.Item as ListItem;`    В В В В В В `if (item ==
    null) return;`    В В В В В В `Navigation.PushAsync (new detailPage(item) );`    В В В В В В `listView.SelectedItem
    = null;`    В В В В `};`    Tapping a list item row triggers the `ItemTapped` event,
    and the `PushAsync` call instantiates a `detailPage` and passes in `ListItem`
    to display, as shown in Figure [6-10](#A978-1-4842-0214-2_6_Chapter.html#Fig10).    ![A978-1-4842-0214-2_6_Fig10_HTML.jpg](A978-1-4842-0214-2_6_Fig10_HTML.jpg)    Figure
    6-10.  Detail page displaying title and description  #### CODE COMPLETE: Drill-down
    List    That was a quick summary of a drill-down list by item. Listings [6-7](#A978-1-4842-0214-2_6_Chapter.html#FPar19),
