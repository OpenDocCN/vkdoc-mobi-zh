    second parameter can be added to specify whether the navigation is animated:    В В В В `Navigation.PushAsync(new
    nextPage(), bool animated);`    *   `PopAsync` pops a page off the stack and goes
    to the previous page:    `Navigation.PopAsync();`    *   `PopToRootAsync` pops
    all pages off the stack and goes to the root page:    `Navigation.PopToRootAsync();`  Tip  Two
    more methods, `RemovePage` and `InsertPageBefore`, which are for changing the
    stack without pushing and popping.    `RemovePage` removes the specified page
    off the stack:    В В В В `Navigation.RemovePage(page);`    `InsertPageBefore` inserts
    a page into the stack before the specified page:    В В В В `Navigation.InsertPageBefore(insertPage,
    beforePage);`    All of these methods are generally executed inside the events
    of tapped icons or links, either inline, such as on our home page in Listing [6-1](#A978-1-4842-0214-2_6_Chapter.html#FPar4):    В В В В `homeButton.Clicked
    += async (sender, args) =>`    В В В В В В В `await Navigation.PushAsync(new secondPage());`    Or
    in delegated events:    В В В В `private async void OnButtonClicked(object sender,
    EventArgs e)`    В В В В `{`    В В В В В В В В `await Navigation.PushAsync(new nextPage());`    В В В В `}`    ####
    Setting the Page Title    The `Page.Title` property displays a title in the navigation
    bar:    В В В В `Title = "Home";`  Tip  `ContentPage` inherits from the `Page` class,
    where a lot of the Xamarin.Forms properties discussed in this chapter reside.    ####
    Customizing the Navigation Bar    `NavigationPage` has several properties accessible
    from any child page, all of which give access to the navigation barвҖҷs elements.
    Navigation bar properties such as `Title` and `Icon` are set in the child page
    and not in the page that initiated `NavigationPage`. This is in keeping with native
    platform architectures.    In most of these Xamarin.Forms navigation examples,
    the `icon.png` file has been replaced with a blank image, so no icon is visible.
    This is a lean and contemporary look. The `icon.png` file can also be replaced
    with an appropriate graphic used to reflect the app, as shown in Figure [6-4](#A978-1-4842-0214-2_6_Chapter.html#Fig4).    ![A978-1-4842-0214-2_6_Fig4_HTML.jpg](A978-1-4842-0214-2_6_Fig4_HTML.jpg)    Figure
    6-4.  The icon can be changed on the navigation bar Tip  The `icon.png` file is
    platform-specific and resides in each respective platform project. See [Chapter
    2](#A978-1-4842-0214-2_2_Chapter.html) for details on images.    The navigation
    icon can also be set dynamically to reflect the page or user context, by using
    `SetTitleIcon` and the `Page.Icon` property:    В В В В `var image = "icon.png";`    В В В В `NavigationPage.SetTitleIcon
    (this, image);`    Further customization of the navigation bar at the top of the
    screen is accomplished by using these `NavigationPage` methods:    *   `SetHasNavigationBar`
    shows/hides the navigation bar on the current page:    `Ex. NavigationPage.SetHasNavigationBar(this,
    false);`    *   `SetTitleIcon` changes the title icon (`Page.Icon` property).
    *   `SetHasBackButton` shows/hides the Back button. *   `SetBackButtonTitle` changes
    the navigation title (the `Page.Title` property set on the calling page). *   `BarBackgroundColor`
    changes the navigation barвҖҷs color. *   `BarTextColor` changes the navigation
    barвҖҷs text color.    #### Handling the Back Button    Popping pages off the stack
    can be accomplished by either the Up or the Back button. Up is the less-than symbol
    (<) in the top-left corner of the navigation page, and the Back button is on the
    bottom navigation bar.    The Back button click event can be explicitly handled
