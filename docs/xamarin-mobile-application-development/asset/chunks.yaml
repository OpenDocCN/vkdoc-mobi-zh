    ### Xamarin.Forms и§ЈеҶіж–№жЎҲжһ¶жһ„


    Xamarin.Forms жңҖеӨ§зҡ„дјҳеҠҝд№ӢдёҖжҳҜе®ғдҪҝжҲ‘д»¬иғҪеӨҹеҗҢж—¶дёәеӨҡдёӘе№іеҸ°ејҖеҸ‘еҺҹз”ҹз§»еҠЁеә”з”ЁгҖӮеӣҫ 2-2 жҳҫзӨәдәҶдёҖдёӘдёә iOSгҖҒAndroid е’Ң Windows
    Phone ејҖеҸ‘зҡ„и·Ёе№іеҸ° Xamarin.Forms еә”з”Ёзҡ„и§ЈеҶіж–№жЎҲжһ¶жһ„гҖӮжң¬зқҖиүҜеҘҪжһ¶жһ„е’ҢеҸҜйҮҚз”ЁжҖ§зҡ„зІҫзҘһпјҢXamarin.Forms и·Ёе№іеҸ°и§ЈеҶіж–№жЎҲйҖҡеёёдҪҝз”ЁеҢ…еҗ«дёҡеҠЎйҖ»иҫ‘е’Ңж•°жҚ®и®ҝй—®еұӮзҡ„е…ұдә«
    C# еә”з”ЁзЁӢеәҸд»Јз ҒпјҢеҰӮеӣҫдёӯеә•еұӮжүҖзӨәгҖӮиҝҷйҖҡеёёиў«з§°дёәж ёеҝғеә“гҖӮи·Ёе№іеҸ° Xamarin.Forms UI еұӮеҗҢж ·жҳҜ C#пјҢеңЁеӣҫдёӯиў«жҸҸз»ҳдёәдёӯй—ҙеұӮгҖӮйЎ¶йғЁзҡ„и–„иҷҡзәҝеұӮжҳҜе№іеҸ°зү№е®ҡйЎ№зӣ®дёӯжһҒе°‘йҮҸзҡ„е№іеҸ°зү№е®ҡ
    C# UI д»Јз ҒпјҢз”ЁдәҺеңЁжҜҸдёӘеҺҹз”ҹж“ҚдҪңзі»з»ҹдёӯеҲқе§ӢеҢ–е’ҢиҝҗиЎҢеә”з”ЁгҖӮ


