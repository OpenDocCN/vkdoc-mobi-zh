    RelativeLayout    xamarin.forms    `RelativeLayout` auto-scales its elements to
    different screen sizes. Made up of the parent layout view and its child views,
    this layout is defined by the relationships between views. Each child view is
    tied to its sibling views or to the parent layout view by using constraints. A
    constraint can bind view locations and sizes: x/y coordinates and width/height
    dimensions. `RelativeLayout` allows us to create an interconnected web of views
    that stretch like rubber bands to fit the screen, providing built-in responsive
    design or auto-layout.  Tip  `RelativeLayout` is useful for apps that must present
    well on widely varying resolutions, such as on phones and tablets.    LetвҖҷs start
    with a fresh `ContentPage`, create a `RelativeLayout` instance, and place a label
    at 0,0 in the upper-left corner of the layout, as shown in Listing [3-6](#A978-1-4842-0214-2_3_Chapter.html#FPar15).  Listing
    3-6\. Starting RelativeLayoutExample.cs  В В В В `public class RelativeLayoutExampleВ В :
    ContentPage`    В В В В В В В В `{`    В В В В В В В В В В В В `public RelativeLayoutExample ()`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `RelativeLayout
    relativeLayout = new RelativeLayout();`    В В В В В В В В В В В В В В В В `Label upperLeft =
    new Label`    В В В В В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В В В В В `Text = "Upper Left",`    В В В В В В В В В В В В В В В В В В В В `FontSize
    = 20`    В В В В В В В В В В В В В В В В `};`    В В В В В В В В В В В В В В В В `relativeLayout.Children.Add
    (upperLeft,`    В В В В В В В В В В В В В В В В В В В В `Constraint.Constant (0),`    В В В В В В В В В В В В В В В В В В В В `Constraint.Constant
