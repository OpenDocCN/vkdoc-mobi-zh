    \ Xamarin е®ҳж–№еҮәзүҲзҡ„е…ідәҺ `Xamarin.Forms` зҡ„д№ҰпјҲеҲ«жӢ…еҝғпјҢе®ғд№ҹж¶өзӣ–дәҶ `Xamarin.iOS` е’Ң `Xamarin.Android`пјҢи®©дҪ еҸҜд»Ҙж·ұе…ҘжҺҘи§ҰеҺҹз”ҹзҡ„еә•еұӮ\
    \ UIпјүгҖӮ\n\nжҲ‘еҜ№иҝҷжң¬д№Ұж„ҹеҲ°йқһеёёе…ҙеҘӢгҖӮдёҖе№ҙеүҚ Dan з¬¬дёҖж¬ЎиҒ”зі»жҲ‘и°ҲеҸҠиҝҷжң¬д№Ұж—¶пјҢд»–е‘ҠиҜүдәҶжҲ‘д»–зҡ„ж„ҝжҷҜпјҡдёҖжң¬еҶ…е®№иҜҰе°ҪгҖҒж·ұе…ҘпјҢе№¶дё”еҸҷдәӢиҙЁйҮҸдёҠд№ҳзҡ„д№ҰпјҢе…¶зІҫзҘһдёҺжҲ‘йӮЈжң¬пјҲзҺ°еңЁе·ІдёҘйҮҚиҝҮж—¶зҡ„пјүMonoTouch\
    \ еӨ„еҘідҪңдёҖи„үзӣёжүҝгҖӮдёҖжң¬иғҪе…¬жӯЈең°еұ•зҺ°иҝҷдёӘе№іеҸ°зҡ„д№ҰгҖӮеңЁйҳ…иҜ»е®Ңжң¬д№ҰеҗҺпјҢжҲ‘зӣёдҝЎдҪ дјҡи®ӨеҗҢ Dan зӢ¬зү№зҡ„и§Ҷи§’е’ҢеҜ№е№іеҸ°жё…жҷ°зҡ„зҗҶи§ЈпјҢд»ҘдёҖз§Қйқһеёёе®һз”Ёзҡ„ж–№ејҸе‘ҲзҺ°еҮәжқҘпјӣд»–еҲӣе»әдәҶдёҖжң¬е…ідәҺдҪҝз”Ё\
    \ Xamarin зҡ„еҸҜйқ жүӢеҶҢпјҢжҲ‘зӣёдҝЎпјҢж— и®әдҪ жҳҜ Xamarin ејҖеҸ‘ж–°жүӢиҝҳжҳҜиҖҒжүӢпјҢйғҪдјҡж¬ЈиөҸе®ғгҖӮ\n\nиҝҷжң¬еҺҡйҮҚзҡ„д№ҰжҸҗдҫӣдәҶжё…жҷ°зҡ„жҢҮеҜјпјҢе°Ҷеё®еҠ©дҪ жһ„е»әй«ҳиҙЁйҮҸзҡ„еә”з”ЁзЁӢеәҸпјҢд»Һжһ¶жһ„иҖғйҮҸејҖе§ӢпјҢз„¶еҗҺж·ұе…ҘеҲ°е®һз”Ёзҡ„д»Јз Ғзӯ–з•ҘгҖӮе®ғд»Ҙ\
    \ `Xamarin.Forms` дёәдё»еҜјпјҢдҪҶд№ҹж•ҷдҪ еҰӮдҪ•з©ҝйҖҸеҲ°еҺҹз”ҹ UI е·Ҙе…·еҢ…пјҢе№¶дё”дёҚд»…и§ЈйҮҠдәҶдәӢжғ…еҰӮдҪ•еҒҡпјҢиҝҳи§ЈйҮҠдәҶдёәд»Җд№Ҳиҝҷж ·еҒҡгҖӮ\n\nйӮЈд№ҲпјҢжҲ‘е°ҶдҪ дәӨеҲ°иғҪе№Ізҡ„дҪңиҖ…жүӢдёӯпјҢе№¶зҘқдҪ еңЁ\
    \ Dan зҡ„еҫ—еҠӣжҢҮеҜјдёӢпјҢйҖҡиҝҮ Xamarin жһ„е»әеә”з”Ёзҡ„ж—…зЁӢж„үеҝ«гҖӮ\n\n> вҖ”вҖ”Bryan Costanich  \n> Xamarin е…¬еҸёеүҜжҖ»иЈҒ\n\
    \n## з®Җд»Ӣ\n\nжң¬д№ҰжҳҜдёҖжң¬е®һз”Ёзҡ„ `Xamarin.Forms` е…Ҙй—ЁжҢҮеҚ—пјҢд№ҹжҳҜдҪҝз”Ё `C#` е’Ң .NET жһ„е»әеҺҹз”ҹ AndroidгҖҒiOS е’Ң Windows\
    \ Phone еә”з”Ёзҡ„и·Ёе№іеҸ°еҸӮиҖғд№ҰгҖӮ\n\nеҰӮжһңдҪ е°Ҷ Xamarin е№іеҸ°и§ҶдёәдёҖдёӘйҮ‘еӯ—еЎ”пјҢ`Xamarin.Android` е’Ң `Xamarin.iOS`\
    \ жҳҜе®ғзҡ„еҹәеә§пјҢ`Xamarin.Forms` еңЁе…¶йЎ¶з«ҜпјҢйӮЈд№ҲиҝҷжӯЈжҳҜжң¬д№ҰдҪҝз”Ё `C#` жүҖж¶өзӣ–зҡ„еҶ…е®№гҖӮз§»еҠЁ UI еҚ жҚ®дәҶйҮ‘еӯ—еЎ”зҡ„з»қеӨ§йғЁеҲҶпјҢжң¬д№ҰжҺўзҙўдәҶдҪҝз”Ё Xamarin\
    \ еёғеұҖгҖҒжҺ§д»¶е’ҢеҲ—иЎЁзҡ„йҮҚиҰҒжҰӮеҝөгҖҒе…ғзҙ е’Ңе®һз”Ёж–№жЎҲгҖӮ\n\nи®ёеӨҡж–° Xamarin йЎ№зӣ®йқўдёҙзҡ„зҮғзңүд№Ӣй—®жҳҜпјҡ`Xamarin.Forms` йҖӮеҗҲжҲ‘зҡ„йЎ№зӣ®еҗ—пјҹжң¬д№Ұж¶өзӣ–дәҶеңЁйҖүжӢ©\
    \ `Xamarin.Forms` ж–№жЎҲдёҺдҪҝз”Ё `Xamarin.Android` жҲ– `Xamarin.iOS` зҡ„е№іеҸ°зү№е®ҡж–№жЎҲиҝӣиЎҢеҜ№жҜ”ж—¶пјҢйңҖиҰҒиҖғиҷ‘зҡ„е…ій”®еӣ зҙ гҖӮ\n\
    \nеҪ“дҪ йҒҮеҲ°дәҶ `Xamarin.Forms` ејҖз®ұеҚіз”ЁеҠҹиғҪзҡ„йҷҗеҲ¶ж—¶пјҢдҪ е°ҶеёҢжңӣйҖҡиҝҮдҪҝз”ЁиҮӘе®ҡд№үжёІжҹ“еҷЁжқҘе®ҡеҲ¶ `Xamarin.Forms` жҺ§д»¶пјҢд»ҺиҖҢеҲ©з”Ёе№іеҸ°зү№е®ҡзҡ„еҠҹиғҪгҖӮ\n\
    \nдҪ иҝҳдјҡеӯҰд№ жүҖжңүе…ій”®зҡ„ Xamarin UI еҜјиҲӘжЁЎејҸпјҡеҲҶеұӮеҜјиҲӘе’ҢжЁЎжҖҒеҜјиҲӘгҖҒдёӢй’»еҲ—иЎЁгҖҒйҖүйЎ№еҚЎгҖҒеҜјиҲӘжҠҪеұүзӯүгҖӮдҪ еҸҜд»ҘдҪҝз”ЁжҸҗдҫӣзҡ„еҜјиҲӘд»Јз ҒпјҢдёәеҮ д№Һд»»дҪ•дёҡеҠЎеә”з”Ёжҗӯе»әеҮәеҹәжң¬йӘЁжһ¶гҖӮ\n\
    \nжң¬д№ҰжҳҜдёҖжң¬ SQLite ж•°жҚ®и®ҝй—®жҢҮеҚ—гҖӮжҲ‘д»¬е°Ҷд»Ӣз»ҚеңЁ Xamarin еә”з”Ёдёӯи®ҝй—® SQLite ж•°жҚ®еә“зҡ„жңҖеёёи§Ғж–№жі•пјҢд»ҘеҸҠеҰӮдҪ•жһ„е»әж•°жҚ®и®ҝй—®еұӮпјҲDALпјүгҖӮдёҖж—Ұе»әз«ӢдәҶж•°жҚ®еә“пјҢдҪ е°ҶеёҢжңӣе°Ҷж•°жҚ®з»‘е®ҡеҲ°\
    \ UIгҖӮдҪ еҸҜд»ҘжүӢеҠЁз»‘е®ҡпјҢжҲ–иҖ…дҪҝз”Ё `Xamarin.Forms` зҡ„ж•°жҚ®з»‘е®ҡе°Ҷ UI е…ғзҙ з»‘е®ҡеҲ°ж•°жҚ®жәҗгҖӮжҲ‘д»¬е°Ҷд»Ӣз»ҚеӨҡз§ҚиҜ»еҶҷж•°жҚ®з»‘е®ҡзҡ„жҠҖжңҜпјҢж—ўеҢ…жӢ¬з»‘е®ҡеҲ°ж•°жҚ®жЁЎеһӢпјҢд№ҹеҢ…жӢ¬дёәжЁЎеһӢ-и§Ҷеӣҫ-и§ҶеӣҫжЁЎеһӢпјҲMVVMпјүжһ¶жһ„з»‘е®ҡеҲ°и§ҶеӣҫжЁЎеһӢгҖӮ\n\
    \nжһ„е»әдёҖдёӘеә”з”ЁдёҚд»…д»…йңҖиҰҒ UI е’Ңж•°жҚ®и®ҝй—®пјӣдҪ иҝҳйңҖиҰҒе°Ҷд»Јз Ғз»„з»ҮжҲҗдё“дёҡзә§зҡ„жһ¶жһ„гҖӮжҲ‘д»¬е°ҶжҺўзҙўд»Һе…Ҙй—Ёзә§еҲ°дјҒдёҡзә§зҡ„и§ЈеҶіж–№жЎҲжһ„е»әжҠҖжңҜпјҢд»Ҙеё®еҠ©дҪ и§ЈиҖҰеҠҹиғҪеұӮгҖҒз®ЎзҗҶе№іеҸ°зү№е®ҡд»Јз ҒпјҢе№¶е…ұдә«и·Ёе№іеҸ°зұ»пјҢд»Ҙе®һзҺ°жңҖдҪізҡ„д»Јз ҒеӨҚз”ЁжҖ§гҖҒеҸҜжөӢиҜ•жҖ§е’ҢеҸҜз»ҙжҠӨжҖ§гҖӮ\n\
    \n## жң¬д№Ұйқўеҗ‘зҡ„иҜ»иҖ…\n\nеҰӮжһңдҪ жҳҜиғҪеӨҹйҳ…иҜ» `C#` зӨәдҫӢпјҢе№¶еёҢжңӣеӯҰд№ дҪҝз”Ё Xamarin е№іеҸ°иҝӣиЎҢи·Ёе№іеҸ°з§»еҠЁејҖеҸ‘зҡ„ејҖеҸ‘иҖ…гҖҒжһ¶жһ„еёҲжҲ–жҠҖжңҜз»ҸзҗҶпјҢйӮЈд№Ҳжң¬д№Ұе°ұжҳҜдёәдҪ еҮҶеӨҮзҡ„гҖӮ`C#`\
    \ ејҖеҸ‘иҖ…еҸҜиғҪдјҡеҜ№жң¬д№Ұж„ҹеҲ°жңҖдәІеҲҮпјҢеӣ дёәжҲ‘иҮӘе·ұе°ұжҳҜ `C#` ејҖеҸ‘иҖ…пјҢдҪҶжҲ‘д№ҹеҠӘеҠӣеңЁд№ҰдёӯжҢҮеҮәдҪ•ж—¶дҪҝз”ЁдәҶ Microsoft жҲ– .NET зҡ„иЎҢиҜқгҖӮXamarin\
