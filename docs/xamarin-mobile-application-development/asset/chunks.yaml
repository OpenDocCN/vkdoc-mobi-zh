    the changes.    Views can also be bound to other views.    ### Binding a View
    to Another View    xamarin.forms    The focus of this book is data-driven applications,
    which means binding views to models and view models. However, views can be bound
    to one another. A slider can be bound to a label. A switch can be bound to an
    entry view, and so forth.    The target of a data binding must be backed by a
    `BindableProperty` object, and most Xamarin.Forms views have many properties that
    fit this requirement. Explore the Xamarin API documentation to learn about these.
    Many view properties are also bindable as sources.    Single views are easily
    bound, as each view must have one `BindingContext`. Multiple views require mapping
    using the `BindingModes`: `OneWayToSource` and `TwoWay`, which are beyond the
    scope of this book. Refer to the Xamarin online docs for details.    Although
    data binding is platform-specific, database access is truly cross-platform in
    Xamarin development. Using SQLite is basically the same regardless of what platform
    youвҖҷre developing for.    ## Using SQLite.NET    cross platform    Data models
    are often populated from and synchronized with a local database. SQLite.NET is
    the mobile, cross-platform database library of choice for many Xamarin developers
    using Xamarin.Forms, Xamarin.Android, or Xamarin.iOS.    Xamarin.Forms is used
    in the UI portion of the following SQLite.NET examples for the sake of demonstration,
    but these techniques can be used equally well in Xamarin.Android and Xamarin.iOS
    apps. SQLite.NET is a cross-platform technology.    How you install SQLite.NET
    in your solution depends on the solution type. A PCL setup differs from a shared
    project setup:    *   PCL Setup: The best option for using SQLite.NET with PCLs
    is the NuGet package called SQLite.NET PCL. There are a few of these with similar
    names, so be certain to use the package with these attributes:    *   Name: SQLite-Net
    PCL *   Created by: Frank A. Krueger *   ID: sqlite-net-pcl *   NuGet link: sqlite-net-pcl    *   Install
    SQLite-Net PCL in the projects where youвҖҷll need it, usually most if not all of
    them in your solution. Do not manually add the `SQLite.cs` file to your project(s).
    See the downloadable code solution `SQLiteNetPCL`. *   Shared project setup: Add
    a file to your shared project called `SQLite.cs` from the sqlite-net GitHub project
    by downloading it and then clicking your application solution and selecting Add
    File. See the downloadable code solution `SQLiteNETSharedProject`.    Many of
    the SQLite.NET examples in this section use a PCL because itвҖҷs clearer in a demonstration,
    but IвҖҷll cover shared projects too. PCL and shared project SQLite.NET implementations
    are similar except for how they handle platform-specific implementations of the
    database path and connection. More about that in the section вҖңBuilding the Database
    Path.вҖқ    Now that you have SQLite.NET installed in your solution, reference the
    library in your data access layer classes with a `using` statement:    В В В В `using
    SQLite;`    Constructing a data access layer using SQLite.NET requires the creation
    of a database connection, a locking object, and CRUD transaction methods (get,
    insert, update, and delete) that are specific to your table data.  Important Note  Inserting,
    getting, updating, and deleting rows should be done using locks in order to avoid
    conflicts. The following examples exclude the lock for simplicity until the section
    вҖңLocking Rows.вҖқ Review the code with locks in Listing [7-19](#A978-1-4842-0214-2_7_Chapter.html#FPar39)
    or Listing [7-22](#A978-1-4842-0214-2_7_Chapter.html#FPar43).    ### Installing
    SQLite on Windows Phone    windows phone    The SQLite database engine ships with
    iOS and Android but not with Windows Phone, so you must ship it with your own
    app. Download the Precompiled Binaries for Windows Phone 8 (`sqlite-wp80-winrt-xxxxxx.vsix)`
    from sqlite.org. Install this Visual Studio extension and restart Visual Studio.
    Add this reference to your project: the Windows Phone Extension called SQLite
    for Windows Phone.    Now that SQLite.NET is installed, letвҖҷs create a SQLite
    database.    ### Creating a Database    Create a new SQLite database by establishing
    a database connection to a database filename that includes the folder path. You
    can open a SQLite connection and use it throughout your app without closing it.    First
    locate the folder that the database should go into and create the database folder
    path:    В В В В `string folder = Environment.GetFolderPath (Environment.SpecialFolder.Personal);`    В В В В `databasePath
    = Path.Combine(documents, "ItemsSQLite.db3");`    Create a database connection
    by specifying the database path and name:    В В В В `var database = new SQLite.SQLiteConnection(databasePath);`    No
    check is needed to see if the file already exists. It will be created if it does
    not yet exist; otherwise, it will simply be opened.  Tip  Avoid using a single
    connection on different threads. Using locks helps avoid conflicts, as described
    in the section вҖңLocking Rows.вҖқ    In real apps, building database paths is often
    the only platform-specific code in the data access layer.    ### Building the
    Database Path    The database path is typically platform-specific, requiring an
    implementation for each platform to retrieve it.    The implementation of the
    database path and database connection is the primary difference between the PCL
    approach and shared project approach to building a data access layer. In PCLs,
    use dependency Injection (DI) to create platform-specific implementations of the
    database path and connection. In shared projects, create the database path by
    using conditional compilation, which is a way to implement platform-specific code
    at compile-time.  Tip  For more detail on cross-platform architecture approaches
    such as conditional compilation and DI, see [Chapter 9](#A978-1-4842-0214-2_9_Chapter.html).    LetвҖҷs
    begin with the shared projects database connection implementation before moving
    on to PCLs.    #### Connect by Using Shared Projects    The trick with SQLite
    database connections in Xamarin apps is that the database path is usually platform-specific.
    For example, iOS iCloud requirements specify that files not created by the user
