    components are in this more advanced repository: the generic database instance,
    the item methods, and the person methods. `Item` objects are passed into the item
    methods, and `Person` objects appear in the person methods. The generic database
    class resolves all of its SQLite.NET methods by using those data types via generics,
    deciding which tables to read and write to/from.    That is how to refactor your
    basic repository into an advanced repository, using generics and a data model
    interface.    If youвҖҷre looking at the repositories in this chapter and asking
    where the model properties and caching mechanisms are, youвҖҷre asking the right
    questions. Using a repository to maintain in-memory data models is a common technique
    in web development, but it can be risky given the limited memory of mobile devices
    and is beyond the scope of this book. The repositories shown here are basic ones
    designed only to create an app-specific abstraction around the SQLite ORM.  Note  A
    third option exists for adding methods to a repository: create a generic repository.
    This is similar to the second option, the generic database class, but without
    the encapsulating repository class. This exposes a generic DAL interface to your
    views and view models and is considered by many to be lazy coding and a leaky
    abstraction.    ### CODE COMPLETE: Creating a DAL by Using SQLite.NET    Listings
