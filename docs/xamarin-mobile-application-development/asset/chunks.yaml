    Nontrivial, editable list binding means that the initial values of the data model
    are displayed in the list, and controls are provided to allow the user to add
    or delete rows or change row properties displayed in the list.    IвҖҷll begin with
    a review of trivial binding to a `ListView` before moving on to nontrivial binding.    In
