    a list can result in a beautiful, highly-functional UI feature. Is it also one
    of the best ways to destroy a listвҖҷs performance, so customize with caution. Use
    `TextCell` or `ImageCell` as well as you can before deciding to customize. Images
    and nested layouts are a challenge to optimize in Xamarin.Forms, particularly
    on older devices. If youвҖҷre having difficulty with performance as you test your
    customized list, try the performance tips in the (Xamarin.Forms) Optimizing Performance
    section. If those donвҖҷt work for you then consider using a custom renderer with
    platform-specific controls instead. (See the list views in the Android and iOS
    sections of this chapter and then turn to [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html)
    to read about custom renderers.)  Tip  `ListView` row separator lines are customizable
    using its `SeparatorVisibility` and `SeparatorColor` properties. Set the `ListView`вҖҷs
    `SeparatorVisibility` property to `None` to hide the lines (the default value
    is `Default`). Set the color of the separator using `SeparatorColor`. Remember
    to define these before the `ListView` is loaded on Android to avoid a performance
    penalty.  Tip  Headers and footers are supported by `ListView`. Use the `Header`
    and `Footer` properties for a simple text or view. For more complex layouts, use
