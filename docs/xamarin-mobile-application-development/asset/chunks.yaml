    Android, input views like buttons have been problematic and not always selectable
    on Xamarin.Forms `ListViews` due to a focus conflict between the input view and
    the row. Hopefully, this bug will be fixed by the time this book hits the shelves.
    If not, the workaround requires creating a custom renderer for the input control
