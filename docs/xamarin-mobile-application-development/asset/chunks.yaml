    ## з§»еҠЁ UI


    д»Һ Web ејҖеҸ‘иҪ¬еҗ‘и·Ёе№іеҸ°з§»еҠЁејҖеҸ‘ж—¶пјҢдҪ йңҖиҰҒеҗёж”¶еӨ§йҮҸж–°зҹҘиҜҶпјҢдё»иҰҒйӣҶдёӯеңЁз”ЁжҲ·з•ҢйқўйўҶеҹҹгҖӮйҰ–е…Ҳйқўдёҙзҡ„жҳҜж–°ж“ҚдҪңзі»з»ҹ UI API зҡ„й—®йўҳгҖӮXamarin йҖҡиҝҮжҸҗдҫӣй’ҲеҜ№дё»жөҒж“ҚдҪңзі»з»ҹзҡ„е№іеҸ°зү№е®ҡ
    C# з»‘е®ҡпјҲеҚі `Xamarin.Android` е’Ң `Xamarin.iOS`пјүжқҘеё®еҠ©и§ЈеҶіиҝҷдёҖй—®йўҳпјҢиҖҢ `Xamarin.Forms` еҲҷжҸҗдҫӣдәҶй’ҲеҜ№иҝҷдёӨдёӘе№іеҸ°д»ҘеҸҠ
