    = relativeLayout;`    В В В В В В В В В В В В `}`    В В В В В В В В `}`    `}`    ### AbsoluteLayout    xamarin.forms    `AbsoluteLayout`
    is a collection of views placed at x/y coordinates ranging from 0 to 1 and bounded
    in size. Positions are not typically absolute, because we seldom use device-dependent
    x or y coordinates. Positions are usually relative to 0 being at the origin and
    1 at the furthest point along a single axis. The layout is absolute in that views
    will go exactly where you put them, even on top of other views, so this can be
    useful for layering.    Using `SetLayoutBounds`, views in `AbsoluteLayout` are
    each bound to a bounding object, which can be a point or a rectangle. Using `SetLayoutFlags`,
    bounding points can determine location, while bounding rectangles can determine
    location and size.    Listing [3-8](#A978-1-4842-0214-2_3_Chapter.html#FPar20)
    provides an example of `AbsoluteLayout`.  Listing 3-8\. Starting AbsoluteLayoutExample.cs  В В В В `AbsoluteLayout
    absoluteLayout = new AbsoluteLayout`    В В В В `{`    В В В В В В В В `VerticalOptions =
    LayoutOptions.FillAndExpand`    В В В В `};`    В В В В `// Add Views here`    В В В В `this.Content
    = absoluteLayout;`    Now weвҖҷll add some views. First, a `Label` control.    В В В В `Label
    firstLabel = new Label`    В В В В `{`    В В В В В В В В `Text = "FirstLabel"`    В В В В `};`    In
    order to assign a view to `AbsoluteLayout`, the control is added to the `AbsoluteLayout`
    collection and then `LayoutFlags` and `LayoutBounds` are set to define the position
    and size of the view. A single statement can accomplish all of these things. Here
    is the method and parameter to do it:    В В В В `absoluteLayout.Children.Add (firstLabel,
