    adventure time.    *   More Xamarin.Forms? Turn to [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html)
    to read about data binding and data access. *   Ready for Android navigation?
    Then read on. *   Wondering about iOS navigation? Jump down to the iOS section
    in this chapter.    Now letвҖҷs cover platform-specific navigation, starting with
    Android.    ## Android Navigation    Activities paired with XML layouts are the
    building blocks of Android apps. Using the MVC pattern, the layouts are the views,
    while the activities are the controllers that provide a code back end to each
    view. Activities instantiate their respective layouts (in the `Resources/layout`
    project folder) using `SetContentView`:    В В В В `SetContentView(Resource.Layout.Main);`    Building
    apps larger than one screen requires stringing activities together. This is typically
    done using `Intent`, a class that can create and navigate to new activities.    Hierarchical
    navigation is done using the toolbar, which is gradually replacing the action
    bar at GoogleвҖҷs encouragement. Navigation buttons include the Up (or Home) button
    on the toolbar, at the top of the screen, and the Back button on the navigation
    bar, at the bottom of the screen. Values are passed between activities by using
    the `Bundle` class passed using `Intent`. A specialized layout called a fragment
    is used to create modals.    Here are the key Android navigation concepts covered
    in this section:    *   Intent: An abstract description of an operation to be
    performed, used to instantiate and display a new screen *   Toolbar/action bar:
    Top-of-screen navigation controls that can include a page title, an Up button,
    and a pop-up menu *   Navigation bar: Bottom-of-screen buttons that include the
    Back button *   Bundle: A dictionary within an intent that maintains state between
    screens *   Fragment: A mini-layout `.axml` with a code-behind class that is useful
    as a component to make modals, and can be combined to make larger layouts    LetвҖҷs
    explore each concept in the context of UI navigation patterns.    ### Starting
    New Activities Using Intents    Intents create and navigate to new screens on
    Android. Instantiate an intent with the parameter of the desired new activity,
    such as `IntentToActivity`, and then call the `Activity.StartActivity` method,
    passing in the intent, as shown in Listing [6-21](#A978-1-4842-0214-2_6_Chapter.html#FPar38).  Listing
    6-21\. From IntentActivity.cs  В В В В `Intent intent = new Intent(this, typeof(IntentToActivity));`    В В В В `StartActivity
    (intent);`    This can be shortened to the following:    В В В В `StartActivity(typeof(IntentToActivity));`    `StartActivity`
    instantiates the specified new activity class (`IntentToActivity`) and loads it
    onto the screen, unloading the old activity.    New activities, such as `IntentToActivity`,
    are often spawned in response to a user action within an event handler. Here,
    `IntentToActivity` is created and called upon the click of a button:    В В В В `Button
    button = FindViewById<Button> (Resource.Id.myButton);`    В В В В `button.Click +=
    delegate {`    В В В В В В В В В В В В `StartActivity(typeof(IntentToActivity));`    В В В В `};`  Tip  The
    screen can be also changed without creating a new activity by using `SetContentView`.    ###
    Hierarchical Navigation Using the Toolbar    android    Hierarchical navigation
    on Android is now done using the toolbar, a featureful navigation bar with an
    Up button, icon, and current page name. The first page containing a toolbar usually
    displays a title and sometimes a pop-up menu icon used for choosing actions, as
    shown in Figure [6-18](#A978-1-4842-0214-2_6_Chapter.html#Fig18).    ![A978-1-4842-0214-2_6_Fig18_HTML.jpg](A978-1-4842-0214-2_6_Fig18_HTML.jpg)    Figure
    6-18.  Toolbar on a home page  Deeper in the navigation tree, the toolbar generally
    sports an Up (or Home) button (<), as shown in Figure [6-19](#A978-1-4842-0214-2_6_Chapter.html#Fig19).    ![A978-1-4842-0214-2_6_Fig19_HTML.jpg](A978-1-4842-0214-2_6_Fig19_HTML.jpg)    Figure
    6-19.  Toolbar on a second page  The toolbar was introduced in Android 5.0 Lollipop
    (API level 21) and replaced the action bar. Although the action bar still works
    on newer APIs, Google encourages the use of the toolbar. The toolbar can be found
    in the Android DesignerвҖҷs toolbox and can be dragged and dropped onto your layout.
    It can be used anywhere on the screen but is most often used at the top and, less
    often, at the bottom.    But thereвҖҷs a catch: the new`Toolbar` class works only
    for API 21+. So, IвҖҷll cover a backward-compatible approach to implement the toolbar
    using the `Android.Support.V7.AppCompat` library available as a NuGet. This allows
    us to target a range of API versions prior to Lollipop up to the present.    To
    recap, there are three ways to achieve up-and-back when using hierarchical navigation
    in Android:    *   `Toolbar`: The new class for API 21+ (Lollipop) *   `ActionBar`:
    The older class replaced by `Toolbar` *   `Toolbar` using the `Android.Support.V7.AppCompat`
    library: `Toolbar` that is backward-compatible to API 4    For backward compatibility,
    IвҖҷll cover the third approach, `Toolbar` using the `Android.Support.V7.AppCompat`
    library, in the following example.  Tip  If youвҖҷre making an app with a minimum
    API of 21 or later, donвҖҷt use the following approach with the `Android.Support.V7.AppCompat`
    library. Use the regular `android.widget.Toolbar` class covered in James MontemagnoвҖҷs
    blog post at [`http://blog.xamarin.com/android-tips-hello-toolbar-goodbye-action-bar/`](http://blog.xamarin.com/android-tips-hello-toolbar-goodbye-action-bar/)
    .  Tool bar vs. Action bar  The action bar has been the standby navigation bar
    for some time now, and is built into an activity without the need for tagging
    in the XML layout. Google is encouraging us to upgrade to the more versatile,
    mature toolbar, which has a more focused feature set and supports the modern navigation
    aesthetic: a visually distinct color scheme for the top bar rather than leaning
    on the application icon as the main design element. The use of an application
    icon plus a title as a standard layout is discouraged on API 21 devices and later.
    Now it''s about the styling of the toolbar, using `style.xml` coupled with liberal
    use of the Up button, page title, and action menu.    A couple of inconveniences
    are associated with the toolbar, however. First, it''s not built into the activity
    and must be declared in the XML layout, generally as an include of a separate
    toolbar layout. Second, the standard new toolbar library works only on API 21
    and later, so we''re often required to use the backward-compatible `Android.Support.V7.AppCompat`
    library and its associated `Support-`prefixed keywords and methods in order to
    use the toolbar pre-Lollipop. If you want to heed Google''s advice and start using
    the toolbar rather than the action bar, but you want your app to work on older
    APIs, then the `Android.Support.V7.AppCompat` approach is the way to go (available
    as a NuGet package or in the Xamarin Component Store).    Create an XML layout
    containing the toolbar, as shown in Listing [6-22](#A978-1-4842-0214-2_6_Chapter.html#FPar42).  Listing
    6-22\. Toolbar.axml  В В В В `<?xml version="1.0" encoding="utf-8"?>`    В В В В `<android.support.v7.widget.Toolbar`    В В В В В В В `xmlns:android="`
