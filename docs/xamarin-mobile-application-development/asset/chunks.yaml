- fmt: '# Summary


    Business applications are undergoing a sea change in hardware transformation;
    we have not seen this magnitude of change since the commercialization of the personal
    computer. The momentum of consumer mobile devices has reached a tipping point,
    affecting the devices upon which business applications must now function. With
    the battle continuing to rage between mobile operating systems, it is no longer
    enough to just get a mobile app up and working on a single platform.


    We must think cross-platform from the get-go.


    Within the world of .NET, Xamarin has provided us with the tools to make cross-platform
    development the norm instead of a special case, so we have no excuse. If the proper
    approach is taken, business logic, data access layer, and, increasingly, even
    the UI are mostly platform-independent. So whether you are building an Android,
    Windows Phone, or iOS app, the approach can be largely the same for many components
    of the app.


    Let''s take a look at the code!


    # Building Mobile User Interfaces


    In mobile UI development using Xamarin, our screens and their controls, images,
    animations, and user interactions run natively on a handheld device. Various synonyms
    for mobile UI screens exist, such as views and pages, and these are used interchangeably
    here. A view can mean a screen but can also refer to a control in certain contexts.


    Two standard approaches apply to building mobile UIs with Xamarin:


    - Xamarin.Forms is a cross-platform UI library for Android, iOS, and Windows Phone.

    - A platform-specific (or native) UI approach uses Xamarin.Android, Xamarin.iOS,
    and the Windows Phone SDK.


    This chapter covers both approaches and defines the platform-specific components
    that make up each of them. We will talk about when Xamarin.Forms is useful and
    when a more platform-specific approach might be better. Then weвҖҷll delve into
    building a Xamarin.Forms UI using pages, layouts, and views. We will create a
    Xamarin.Forms solution containing shared projects and platform-specific ones.
    While adding Xamarin.Forms controls to a project, we will touch upon basic UI
    concepts such as image handling and formatting controls in a layout.


    LetвҖҷs start by discussing Xamarin.Forms.


    ## Understanding Xamarin.Forms


    Xamarin.Forms is a toolkit of cross-platform UI classes built atop the more foundational
    platform-specific UI classes: Xamarin.Android and Xamarin.iOS. Xamarin.Android
    and Xamarin.iOS provide mapped classes to their respective native UI SDKs: iOS
    UIKit and Android SDK. Xamarin.Forms also binds directly to the native Windows
    Phone SDK. This provides a cross-platform set of UI components that render in
    each of the three native operative systems (see Figure 2-1).


    ![A978-1-4842-0214-2_2_Fig1_HTML.jpg](A978-1-4842-0214-2_2_Fig1_HTML.jpg)


    Figure 2-1. Xamarin libraries bind to native OS libraries


    Xamarin.Forms provides a cross-platform toolkit of pages, layouts, and controls
    and is a great place to start to begin building an app quickly. These Xamarin.Forms
    elements are built with Extensible Application Markup Language (XAML) or coded
    in C#, using `Page`, `Layout`, and `View` classes. This API provides a broad range
    of built-in cross-platform mobile UI patterns. Beginning with the highest-level
    `Page` objects, it provides familiar menu pages such as `NavigationPage` for hierarchical
    drilldown menus, and `TabbedPage` for tab menus, a `MasterDetailPage` for making
    navigation drawers, a `CarouselPage` for scrolling image pages, and a `ContentPage`,
    a base class for creating custom pages. Layouts span the standard formats we use
    on various platforms including `StackLayout`, `AbsoluteLayout`, `RelativeLayout`,
    `Grid`, `ScrollView`, and `ContentView`, the base layout class. Used within those
    layouts are dozens of familiar controls, or views, such as `ListView`, `Button`,
    `DatePicker`, and `TableView`. Many of these views have built-in data binding
    options.


    Xamarin.Forms comprises platform-independent classes that are bound to their native
    platform-specific counterparts. This means we can develop basic, native UIs for
    all three platforms with almost no knowledge of iOS and Android UIs. Rejoice but
    beware! Purists warn that trying to build apps for these platforms without an
    understanding of the native APIs is a reckless undertaking. LetвҖҷs heed the spirit
    of their concerns. We must take a keen interest in Android and iOS platforms,
    their evolution, features, idiosyncrasies, and releases. We can also wallow in
    the convenience and genius of the amazing cross-platform abstraction that is Xamarin.Forms!


    > **Note:** Basic pages such as login screens, simple lists, and some business
    apps are well-suited to out-of-the-box Xamarin.Forms at the time of this writing.
    Platform-specific code can be utilized in Xamarin.Forms projects for added functionality
    but each subsequent release of this library will allow us to build more complex
    screens without utilizing platform-specific code.


    ### Xamarin.Forms Solution Architecture


    One of the greatest benefits of Xamarin.Forms is that it gives us the ability
    to develop native mobile apps for several platforms simultaneously. Figure 2-2
    shows the solution architecture for a cross-platform Xamarin.Forms app developed
    for iOS, Android, and Windows Phone. In the spirit of good architecture and reusability,
    a Xamarin.Forms cross-platform solution often uses shared C# application code
    containing the business logic and data access layer, shown as the bottom level
    of the diagram. This is frequently referred to as the Core Library. The cross-platform
    Xamarin.Forms UI layer is also C# and is depicted as the middle layer in the figure.
    The thin, broken layer at the top is a tiny amount of platform-specific C# UI
    code in platform-specific projects required to initialize and run the app in each
    native OS.


    ![A978-1-4842-0214-2_2_Fig2_HTML.jpg](A978-1-4842-0214-2_2_Fig2_HTML.jpg)


    Figure 2-2. Xamarin.Forms solution architecture: One app for three platforms


    Figure 2-2 is simplified to communicate the fundamentals of Xamarin.Forms. The
    reality is that hybridization between Xamarin.Forms and platform-specific code
    is possible, useful, and encouraged. It can happen at a number of levels. First,
    within a Xamarin.Forms Custom Renderer, which is a platform-specific class for
    rendering platform-specific features on a Xamarin.Forms page. Hybridization can
    also happen within platform-specific Android activities and iOS view controllers
    that run alongside Xamarin.Forms pages, or within platform-specific classes that
    are called as-needed to handle native functionality such as location, camera,
    graphics, or animation. This sophisticated approach can lead to a more complex
    architecture, such as Figure 2-3, and must be handled carefully. Note the addition
    of the Platform-specific UI Layer.


    ![A978-1-4842-0214-2_2_Fig3_HTML.jpg](A978-1-4842-0214-2_2_Fig3_HTML.jpg)


    Figure 2-3. Xamarin.Forms architecture with custom renderers


    > **Note:** Chapter 8 provides more on the use of custom renderers and platform-specific
    code in Xamarin.Forms solutions.


    When are Xamarin.Forms appropriate to use and when do we consider other Xamarin
    options? IвҖҷll address this key question a bit later in the chapter, but first
    letвҖҷs define XamarinвҖҷs platform-specific UI options.'
