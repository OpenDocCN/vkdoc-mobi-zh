    database;`    В В В В В В В В В В В В `}`    В В В В В В В В `}`    В В В В В В В В `...`    В В В В `}`    Use
    this self-instantiating repository by referring to it via the `Application` object:    В В В В `App.Database.SaveItem
    (item);`    The `ContentPage` UI is found in downloadable code files `App.cs`
    and `DataAccessPageDatabase.cs`.    Often, you have to access more than one table
    in your database, or you have multiple data sources, such as files, XML, JSON,
    or multiple databases. These situations warrant a more advanced repository approach.    ####
    Adding Methods to the Repository    Accessing multiple tables or multiple data
    sources requires some thinking about how the DAL architecture should grow to accommodate
    that. Here are the two common options for multisource repositories:    *   Add
    data access methods directly to your repository class. *   Refactor your repository
    into a repository class and a generic database access class.    The first option
    is quick and dirty, whereas the second option is more suitable for enterprise-grade
    business apps. LetвҖҷs look at each option.    Add data access methods directly
    to your repository class. If you want to access a new table, a `Person` table,
    for example, you need to create `GetPerson` and `SavePerson` methods somewhere.
    You could just add these methods to your repository.    В В В В `public Person GetPerson
    (int id) { ... }`    В В В В `public IEnumerable<Person> GetPeople () { ... }`    В В В В `public
    int SavePerson(Person person) { ... }`    В В В В `public int DeletePerson(int id)
    { ... }`    В В В В `public int DeleteAllPeople() { ... }`    That will work just
    fine. ItвҖҷs even moderately testable. Use it if it works for you.    The problem
    with this approach is all the code thatвҖҷs not shown: the implementation of these
    methods is virtually identical for every table. This approach smells of code duplication.
    If you need to access a third or fourth table, youвҖҷll wind up with dozens of methods
    that look more or less like this:    В В В В `public int GetOrSaveOrDeleteSomething(int
    id)`    В В В В `{`    В В В В В В В В `lock (locker) {`    В В В В В В В В В В В В `return database.GetOrSaveOrDelete<TableName>(id);`    В В В В В В В В `}`    В В В В `}`    Very
    smelly, indeed. If youвҖҷre lucky, thatвҖҷs all that will be in there. In some cases,
    a mash-up of table-specific logic and SQLite implementation will provide additional
    smells. ItвҖҷs time for a refactoring, and the second option is the obvious choice.    Refactor
    your repository into a repository class and a generic database access class.    A
    more advanced approach to the repository pattern separates the repository class
    from the DAL implementations. This approach is useful if you have multiple tables,
    or mixed types of data access, such as file-based, XML, and JSON, as well as a
    SQLite data layer, or multiple databases (rare). Each data source can have its
    own implementation; then the repository ties them all together with one interface.
    SQLite implementations can all be encapsulated into a single generic database
    class.    Create a generic database class that handles the SQLite data layer and
    then create an advanced repository class that handles all the data access calls
    to that generic database and to other sources.    Begin with the generic database
    class, as shown in Listing [7-21](#A978-1-4842-0214-2_7_Chapter.html#FPar42).
