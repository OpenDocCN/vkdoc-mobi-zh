    when building a list adapter, it is important to code for performance which means
    reusing cells whenever possible. A cell is a memory location that holds a list
    row. You want cells to be recycled in memory as rows scroll off of the screen
    rather than be thrown away.    A common technique used in Xamarin.iOS apps is
    the null cell check, like this one used in the `UITableViewSource.GetCell` method
    in the previous examples:    `if (cell == null) cell = new UITableViewCell (UITableViewCellStyle.Default,
    CellId);`    A new cell reuse pattern was introduced in iOS 6, doing away with
    the traditional null cell check. The cell reuse examples used previously are all
    backward and forward compatible, but the newer technique shown next is more efficient.
    This new technique is not backward compatible before iOS 6.  Note  The new cell
    reuse pattern works best with custom cells. For built-in row styles like `Default,
    Subtitle`, and `Value1`, I recommend using the older null cell check approach.
    At the time of this writing there is no straightforward way to use the newer pattern
    with built-in row styles.    To implement the new cell reuse approach, declare
    a `CellId` variable as a static variable at the top of your view controller.    В В В В `public
    static NSString CellId = new NSString ("CellId");`    After declaring your `UITableView`,
    register the class or layout file containing the cell definition using the `UITableView`
    methods `RegisterClassForCellReuse` or `RegisterNibForCellReuse`.    В В В В `table.RegisterClassForCellReuse
    (typeof(CustomCell), CellId);`    Save this new `UIViewController` as `ListModelViewControllerCellReuse.cs`
    and change the class and constructor name to `ListModelViewControllerCellReuse`.
    Next, make a change to your `UITableViewSource` subclass.    When coding `GetCell`
    in `UITableViewSource`, skip the null cell check. That check is now done automatically
    by `DequeueReusableCell`. Refer to the static `CellId` back in your view controller.    В В В В `public
    override UITableViewCell GetCell (UITableView tableView,`    В В В В В В В В `NSIndexPath
    indexPath)`    В В В В `{`    В В В В В В В В `var cell = tableView.DequeueReusableCell`    В В В В В В В В В В В В `(``ListModelViewControllerCellReuse.CellId``)
    as CustomCell;`    В В В В В В В В `cell.UpdateCell (listItems [indexPath.Row].Title`    В В В В В В В В В В В В `,
    listItems [indexPath.Row].Description);`    В В В В В В В В `return cell;`    В В В В `}`    Note
    that the view controller class is called `ListModelViewControllerCellReuse` in
    this example.    Lastly, in your custom `UITableViewCell`, `CustomCell.cs`, replace
    the custom cell constructor declaration with one that uses a pointer parameter
    instead of a string. Keep the rest of the constructor the same.    В В В В `public
    CustomCell (IntPtr p):base(p)`    These changes will implement the new cell reuse
    pattern and display the same list used in earlier data model bindings with the
    custom list rows. The entire code example is available for download in `ListModelViewControllerCellReus``e.cs`,
    `ListSourceFromModelCellReuse.cs`, and `CustomCell.cs`.    ### An Alternative
    Approach to Lists: UITableViewController    i OS    The `UIViewController`, `UITableView`,
    and `UITableViewSource` classes are combined into a single class called `UITableViewController`.
    This table mega-class handles display and data logic in a single class, with many
    of the techniques familiar to developers such as `GetCell`. Developers disagree
    about the usefulness of this class. Many use it without difficulty or complaint,
    while others are bothered by the violation of Separation of Concerns (SOC), the
    unwieldiness of the class, and several minor design limitations over the older,
    more modular approach. A `UITableViewController` can be used to create scrolling
    lists with all of the features demonstrated in this chapter.    ## Summary    In
    mobile development, lists are the new data grid.    List views are bound to arrays,
    `Lists`, or data models and allow scrolling when there are more items than will
    fit on the screen. They usually contain text string rows but some contain images
    or entire layouts of controls.    Selection can be accomplished with a single
    row or multiple rows. Multiple-row selection must be done by hand in Xamarin.Forms.
    In Android, you can use `ChoiceMode` and iOS provides accessories like `Checkmark`.    Cell
    reuse is a common theme in performant lists and involves the economic use of already
    populated list rows whenever possible. In Xamarin.Forms, this is built-in but
    is manually coded in Android and iOS.    Grouping is often required for long lists,
    with grouping headings to help guide a user to find what theyвҖҷre looking for.    Built-in
    list row views give you layout options without having to build them from scratch.
    These provide a range of control layouts for list rows providing titles, descriptions,
    and images as well as accessories such as checkboxes and radio buttons.    Custom
    list rows provide versatility at the risk of slower performance. Beware when creating
    these, as there are often performance trade-offs. Test for performance and follow
    the rules of performant customization for each platform when using long lists.    Lists
    help us navigate an app. LetвҖҷs now explore other types of navigation in [Chapter
    6](#A978-1-4842-0214-2_6_Chapter.html).    # 6.В Navigation    Navigation gives
    users what they need to get around an app quickly, moving from screen to screen
    with confidence and ease. This may include menus, tappable icons, buttons, tabs,
    and list items, as well as many types of gesture-sensitive screens to display
    data, information, and options to the user.    ## Navigation Patterns    Navigation
    patterns are industry-standard templates for tying an appвҖҷs screens together in
    an elegant and usable way. The two most common visual design patterns in mobile
    navigation are hierarchical and modal. An entire family of derivative patterns
    combine, enhance, and decorate these base navigation patterns to create the full
    range of mobile UI patterns. Here is an exhaustive list of the most common mobile
    UI navigation patterns used in Xamarin development:    *   Hierarchical: A stack-based
    navigation pattern enabling users to move deeper into a screen hierarchy and then
    back out again, one screen at a time, by using the Up or Back buttons. *   Modal:
    A screen that interrupts hierarchical navigation, often a pop-up screen with an
    alert or menu that the user can complete or cancel. *   Drill-down list: A list
    of tappable items selected to display item detail. *   Navigation drawer: A navigation
    menu that slides over from the left side at the tap of an icon, typically three
    horizontal lines known as the hamburger in the upper-left corner of the screen.
    *   Tabs: A bar containing several folder-like buttons at the top or bottom of
    the screen, each with tappable icons or text invoking new pages. *   Springboard:
    Also referred to as a dashboard, this is a grid of tappable icons invoking new
    pages. *   Carousel: Screen-sized panels that slide horizontally and sometimes
    contain large images.    LetвҖҷs explore the two most common navigation patterns,
    hierarchical and modal.    ### Hierarchical    Hierarchical is a stack-based pattern
    that allows users to move down into a stack of screens and then pop back out again,
    one screen at a time. This pattern typically uses a toolbar at the top of the
    screen to display an Up button in the upper-left corner when a page is selected
    or вҖңdrilled down intoвҖқ by any means. As the user drills deeper into the menu structure,
    a stack is maintained, with each page pushed onto it. Two buttonsвҖ”the Back and
    the Up buttonвҖ”are used in tandem to navigate backward, popping pages off the stack.
    The Back button is the curved arrow icon at the bottom of the screen (iOS doesnвҖҷt
    have one). The Up button is the less-than icon in the upper-left corner. Deep
    navigational stacks can be traversed in this manner, with page selection requiring
    the use of additional UI navigation patterns such as the navigation drawer, drill-down
    list, or pop-up menu.    ### Modal    A modal is a single, interruptive pop-up
    or screen that comes in two flavors. The most common type floats on top of the
    main page and is usually an alert, dialog box, or menu that the user can respond
    to or cancel. Navigation reverts back to the originating page when the modal is
    dismissed. A modal informs users of an important event, such as a saved record,
    or gives them the opportunity to provide input or direction, such as a menu or
    whether to commit or cancel a transaction. The second, less common, type of modal
    replaces the main page entirely, interrupting the hierarchical navigation stack.    The
    two most common modal menus in the mobile UI are the navigation drawer and the
    action menu. The navigation drawer typically slides in from the left and is triggered
    by the tapping of an icon (usually the hamburger) in the upper-left corner of
    the screen and displays a list of pages to navigate to. The action menu typically
    slides in or pops up on the right side of the screen, and is invoked by tapping
    an icon (usually three vertical dots) in the upper-right corner of the screen
    and contains mostly operations (for example, Favorite This), though less frequently
    some navigation pages as well. To follow this established UI pattern, remember
    this rule: Nav on the left, action on the right.    Hierarchical and modal UI
    navigation patterns are typically used as complementary techniques, with hierarchical
    providing the skeleton of the navigational structure and modals giving the user
    choices for what they want to do and where they want to go within the app as well
    as informational updates along the way.    In this chapter, you will explore hierarchical,
    modal, and the rest of the navigation patterns on each platform.    #### Xamarin.Forms
    Navigation    Xamarin.Forms provides most of the primary navigation patterns out
    of the box:    *   Hierarchical navigation using `NavigationPage` *   Modal using
    `NavigationPage`, alerts, and `ActionSheets` *   Drill-down lists using `NavigationPage`,
    `ListView`, and `TableView` *   Navigation drawer using `MasterDetailPage` *   Tabs
    using `TabbedPage` *   Springboard using images with gesture recognizers *   Carousel
    using `CarouselPage`    #### Android Navigation    Android provides many of the
    primary navigation patterns out of the box:    *   Hierarchical navigation using
    `Toolbar` or `ActionBar` *   Modal using `DialogFragment`, `AlertDialog`, and
    `PopupMenu` *   Drill-down list using `ListView` *   Navigation drawer using `DrawerLayout`
    *   Tabs using `ActionBar`    #### iOS Navigation    iOS navigation is usually
    created by using designer tools, but navigation patterns can also be coded by
    hand.    *   Hierarchical navigation using `UINavigationController`, the push
    segue, or the `PushViewController` *   Modal using the modal segue, the `PresentViewController`,
    and `UIAlertAcontroller` *   Drill-down list using `UINavigationController` *   Navigation
    drawer using components *   Tabs using `UITabBarController`  Note  The topic of
    Xamarin UI navigation could fill an entire book. This chapter covers many important
    navigation patterns on all platforms, exhaustively in the case of Xamarin.Forms,
    providing code examples when possible as well as additional resources.    Before
    you dive into the patterns, one cross-cutting navigation topic needs to be addressed:
    state management. As a user navigates through an app, separate screens must appear
    to be part of the unified whole application, even though each screen is a separate
    UI with a separate controller.    ### State Management    State helps us maintain
    the illusion of consistency and continuity while the user navigates among screens,
    through the sharing of data on those screens. WeвҖҷre no longer in the world of
    query strings, cookies, and `Session` variables, but we must still maintain state
    in mobile apps. Most variables are scoped to a particular screen, so state management
    usually involves the explicit passing of data back and forth between screens.
    Parameter passing between screens is the encouraged method of state management
    on all mobile platforms, to minimize the risk of memory abuse and to maximize
    app performance.    Xamarin.Forms allows us to pass parameters into a `ContentPage`
    constructor. Android uses a class called `Bundle`, which is a dictionary that
    contains passed values, housed inside a class called `Intent`, which we use to
    call new activities. iOS developers favor public properties on the destination
    view controller, but iOS supports passing parameters into the destination pageвҖҷs
    constructor.    The static global class is a C# implementation of the Singleton
    pattern. It is available on all platforms but must be used with caution; be mindful
    of mobile-device memory limitations. Disk persistence is built into Xamarin.Forms
    by using the `Application` objectsвҖҷ `Properties`, a dictionary using ID/object
    pairs.    Now that you have a way to pass values between pages, letвҖҷs begin with
    Xamarin.Forms navigation.    ## Xamarin.Forms Navigation    Navigation in Xamarin.Forms
    is based on the two primary navigation patterns: hierarchical and modal.    The
    hierarchical pattern allows the user to move down through a stack of pages, and
    then pop back up through them by using the Up or Back button. This is sometimes
    called drill-down or breadcrumb navigation.    The modal pattern is an interruptive
    screen that requires a particular action from the user but can usually be dismissed
    with a Cancel button. Examples include notifications, alerts, dialog boxes, and
    edit or new record pages.    The most common Xamarin.Forms navigation component
    is `NavigationPage`, which is based on the hierarchical pattern but also provides
    modal functionality.  XAML  The XAML version of all Xamarin.Forms examples can
    be found at the Apress web site ( [`www.apress.com`](http://www.apress.com/) )
    or on GitHub at [`https://github.com/danhermes/xamarin-book-examples`](https://github.com/danhermes/xamarin-book-examples)
    . The Xamarin.Forms solution for [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html)
