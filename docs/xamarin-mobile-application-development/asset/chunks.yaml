    Android `Fragment` is a dynamic, reusable layout built to be used on demand in
    our pages, much like .NET custom controls. Inherited from `Android.App.Fragment`,
    so not technically a layout, itвҖҷs more like a layout on steroids because it has
    its own state and its own life cycle. Entire apps can be built effectively by
    using fragments.    Fragments are AndroidвҖҷs solution to the variable form factor
    problem. We develop for devices of hundreds of different sizes, which sometimes
    work best with completely different layouts. Instead of building with static views
    and layouts on a page, fragments give us componentized, movable, and reusable
    elements. They are often used in apps that must look good and work well on both
    phones and tablets.    Fragments is a core Android UI topic, but a full exploration
    is beyond the scope of this book. If you think you need reusable, dynamic, custom
    UI components on Android, especially for phone/tablet apps, seek out more info
    in the Xamarin and Android online docs. Also see [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html)
    for a good example of fragments.    Those are the Xamarin.Android layout basics.
    If you want to learn more about Android (or Xamarin.Forms), turn to [Chapter 4](#A978-1-4842-0214-2_4_Chapter.html),
    which covers user interaction via controls.    If youвҖҷre ready for iOS layouts,
    read on.    ## Using iOS Layouts    i OS    Static layouts in iOS are primarily
    accomplished using the `UIView` class, the base container class for iOS controls
    and the V in iOSвҖҷs MVC pattern. `UIViews` are typically paired with a controller
    class, called `UIViewController`, which acts like an Android activity or a Xamarin.Forms
    `ContentPage`.  Tip  Most developers create iOS layouts by using designer tools
    such as [Xcode Interface Builder](https://developer.apple.com/library/mac/recipes/xcode_help-interface_builder/_index.html)
    and [Xamarin Designer for iOS](http://developer.xamarin.com/guides/ios/user_interface/designer/).
    Since this is a code-first book and not a tool guide, there isnвҖҷt much to cover
    here on this topic. I will touch on the fundamental concepts in code and refer
    you to the Xamarin online docs ( [`http://developer.xamarin.com/guides/ios/user_interface/designer/`](http://developer.xamarin.com/guides/ios/user_interface/designer/)
    ) and Apple docs for detail on how to use the designer tools to build iOS layouts.    Views
    are added as subviews to `UIView` by using one of two techniques: AutoLayout and
    Frames. The AutoLayout technique uses constraints to create relative horizontal
    and vertical relationships between views. The Frames technique uses rectangles
    to bound the view, assigning them to the `Frame` property of the view. Location
    and size are absolute when using Frames and relative when using AutoLayout.    Table
    [3-2](#A978-1-4842-0214-2_3_Chapter.html#Tab2) compares the iOS layout approaches
    to those of the other platforms.    Table 3-2.  Layout Techniques and Classes
    by Platform   | iOS | Android | Xamarin.Forms | | --- | --- | --- | | `UIView`
    | `LinearLayout` | `StackLayout` | | AutoLayout | `RelativeLayout` | `RelativeLayout`
    | | Frames | (deprecated) | `AbsoluteLayout` |  Tip  A UI designer tool is strongly
    recommended for getting started with layouts in nibs and storyboards, the iOS
    XML layout file formats. Use the Xcode Interface Builder or the Xamarin Designer
    for iOS. When you become familiar with the iOS UI, the hand-coding of iOS XML
    files is still not recommended because o the unreadbility of the files, built
    for configuration by design tools, not human eyes. However, I can recommend the
    hand-coding of C# iOS UI and skipping the XML altogether for advanced users who
    prefer to go without a designer tool.    ### Using AutoLayout    i OS    AutoLayout
    is a responsive layout technique, adapting to different screen sizes automatically.
    Within a `UIViewController`, views are assigned as subviews. Their placement and
    size can be determined by constraints, which are flexible, relative relationships
    between views.  Note  As mentioned earlier, this book is a Xamarin.Forms primer
    and cross-platform guide. It is not an iOS primer and, although it introduces
    some basic concepts, youвҖҷll need additional sources for the iOS and/or Xamarin.iOS
    fundamentals. If you need an intro to Xamarin.iOS, consult the Xamarin online
    docs.    In your `UIViewController`вҖҷs `ViewDidLoad` method, in Listing [3-23](#A978-1-4842-0214-2_3_Chapter.html#FPar63),
    instantiate a text box by using `UITextField`. Then add size and location constraints
    to it before adding it to the parent view.  Listing 3-23. iOSLayoutExample2ViewController.cs
