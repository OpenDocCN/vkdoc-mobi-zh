    4-34.  The textField populated with a formatted date  Various fields can appear
    in the `UIDatePicker` selection. LetвҖҷs look at those next.    #### Specify Which
    Fields to Display    Specify the fields used in `UIDatePicker` with the `Mode`
    property, which uses the `UIDatePickerMode` enumerator. For example, `datePicker.Mode
    = UIDatePickerMode.``Date``;`    Use these `UIDatePickerMode`s to specify the
