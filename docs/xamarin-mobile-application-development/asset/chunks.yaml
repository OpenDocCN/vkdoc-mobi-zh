    .NET жЎҶжһ¶гҖӮеҸҚиҝҮжқҘпјҢжҲ‘д»¬еҫ—д»ҘиҜҰз»ҶдәҶи§ЈжҜҸдёӘе№іеҸ°з”ұ C# е°ҒиЈ…зҡ„з”ЁжҲ·з•ҢйқўпјҲUIпјүAPIпјҢд»ҺиҖҢзІҫзЎ®жҺ§еҲ¶еә”з”Ёзҡ„еҸҜи§ҶеҢ–и®ҫи®ЎгҖӮе…ій”®еңЁдәҺеј„жё…жҘҡеңЁејҖеҸ‘иҝҮзЁӢдёӯпјҢжҜҸдёӘж“ҚдҪңзі»з»ҹзҡ„е“Әдәӣж–№йқўжҳҜйҮҚиҰҒзҡ„пјҢе“ӘдәӣеҸҜд»ҘдәӨз”ұ
    Xamarin еӨ„зҗҶгҖӮиҷҪз„¶ж·ұе…ҘзҗҶи§ЈжҖ»жҳҜжңүзӣҠзҡ„пјҢдҪҶж—¶й—ҙжңүйҷҗпјҢжңҖйҮҚиҰҒзҡ„жҳҜпјҢжҲ‘д»¬йңҖиҰҒдәӨд»ҳеҸҜиҝҗиЎҢзҡ„иҪҜд»¶гҖӮ


