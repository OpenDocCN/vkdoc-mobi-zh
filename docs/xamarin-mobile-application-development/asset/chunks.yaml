    .    Those are the salient points about Android `ListView`. Now weвҖҷll examine
    the main list class on iOS, called `UITableView`.    ## iOS UITableView    i OS    Lists
    in iOS are created using the `UITableView` control bound to an array or a data
    model. `UITableView` provides groupings, headers, footers, images, and indexes.
    Each list requires a `UITableView` for the view, an adapter subclassed from `UITableSource`
    and assigned to the `UITableView.Source` property, and a data source, such as
    an array or data model.    ### Binding to an Array of Strings    Bind `UITableView`
    to an array of strings to create a list.    Create a new file of type `iPhone
    View Controller` called `ListArrayViewController.cs`. In this file, instantiate
