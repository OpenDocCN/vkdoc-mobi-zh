    \        {\n        }\n\n        protected override void OnResume()\n        {\n\
    \        }\n    }\n}\n```\n\nжҜҸдёӘзү№е®ҡдәҺе№іеҸ°зҡ„йЎ№зӣ®йғҪдјҡеҲӣе»әдёҖдёӘ `App` е®һдҫӢжқҘи®ҫзҪ®дё»йЎөпјҢеңЁжң¬дҫӢдёӯжҳҜдёҖдёӘ `ContentPage`\
    \ еҜ№иұЎпјҢе…¶ `Content` еұһжҖ§еЎ«е……дәҶдёҖдёӘеҸӢеҘҪзҡ„ `Label`пјҢе№¶еңЁж°ҙе№іе’ҢеһӮзӣҙж–№еҗ‘дёҠеұ…дёӯгҖӮ`Content` еұһжҖ§еҸӘиғҪеҢ…еҗ«дёҖдёӘеӯҗи§ҶеӣҫгҖӮеӨҡдёӘи§Ҷеӣҫеҝ…йЎ»еҢ…еҗ«еңЁеӯҗ\
    \ `Layout`пјҲдёҖдёӘи§Ҷеӣҫе®№еҷЁпјүдёӯпјҢжҲ–иҖ…дҪҝз”Ё `ContentPage`гҖӮ`MainPage` еұһжҖ§йҖҡиҝҮеҶ…иҒ”зҡ„ `ContentPage` зұ»иў«и®ҫзҪ®дёәеә”з”Ёзҡ„ж №йЎөйқўгҖӮ\n\
