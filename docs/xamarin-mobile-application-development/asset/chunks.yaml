- fmt: '## Summary


    That is everything you need to get started with this book: contents, prerequisites,
    disclaimers, trailheads, maps, and signposts. If youвҖҷre new to the Xamarin platform,
    welcome to the community! If youвҖҷre experienced with Xamarin, thanks for reading,
    and there is plenty in here for you as well.


    I promise you that reading this book, understanding the concepts, and practicing
    the code techniques herein will enrich your Xamarin acumen and raise your coding
    skills to greater heights. I also hope to give you a deeper appreciation for the
    amazing accomplishment that is the Xamarin platform.


    ## Acknowledgments


    Forming a group of smart, dedicated people is a good way to get a big thing done.
    Some call it a collective or a mastermind, and others call it open sourcing. I
    want to share with you our collective for this book and thank them publicly.


    James DeWolf, my senior editor at Apress, is one of the most accomplished leaders
    IвҖҷve seen in any field. Thank you, Jim, for this opportunity and for your unfailing
    and well-calibrated follow-through. Anne Marie Walker, each of your developmental
    edits not only helped make this a better book, but also helped teach me how to
    write. Melissa Maldonado, thank you for your patience with my copious special
    requests, for keeping the trains running on time, and for herding this book home
    to publication. And to all the rest of the Apress editors, formatters, and staff,
    thank you!


    Thank you thrice Ed Snider, tech reviewer and Xamarin MVP, for combing through
    every one of these code examples and offering your sage advice. ItвҖҷs a worlds-better
    book for it. If any errors are left in here, itвҖҷs because I snuck them in after
    your review.


    There are over 200 C# code examples in this book. All of the UI examples were
    also built in XAML and are available for download. Many, many thanks to the XAML
    developers Jason Awbrey and Alex Blount for making this possible.


    The folks at Xamarin are upbeat, brilliant, and incredibly helpful in every way.
    They brought us a great product suite and also bring us a positive and inspiring
    attitude, every day. Thank you, Mike Bluestein, for stressing the importance of
    Xamarin.iOS and Xamarin.Android; and thank you, Bryan Costanich, for saying that
    Xamarin.Forms was the way forwardвҖ”I followed both of your advice. Jason Smith,
    tech lead of Xamarin.Forms, having lunch with you at Evolve in Atlanta gave this
    book focus and grounding. Joseph Hill, thank you for your advice and encouragement.
    Thank you, Spencer Montgomery, Erik Polzin, and Matt Mason for your partner support.
    Thank you, James Montemagno, Mark Smith, Pierce Boggan, and many others.


    And thank you, Miguel de Icaza, for cofounding Xamarin and for being your brilliant
    self. I am honored to be part of your collective.


    Great bloggers give us guidance and humor. This book owes a debt to the great
    bloggers and Xamarin forum contributors who help set direction and confirm details
    on many topics: James Montemagno at `motzcod.es`, Adam Wolf (a.k.a. AdamKemp)
    at `syntaxismyui.com`, Jim Bennett at `jimbobbennett.io`, Tomasz Cielecki (a.k.a.
    Cheesebaron), Kevin Ford at `magenic.com`, Jesse Liberty at `jesseliberty.com`,
    and many others.


    So many brilliant people looked at these chapters and offered their thoughts to
    make this a better book. Here are a few of them: Mike Bluestein, Jim Bennett,
    Mark Allan, Adam Wolf, David Ortineau, Jesse Liberty, William Grand, Michael Lant,
    and Ed Hubbell.


    At Microsoft, I want to thank Dan Stolts, Mark Eisenberg, Donna Malayeri, and
    Michael Cummings for bringing me clarity regarding the Azure integration with
    Xamarin.


    At IBM, thank you, Craig Porter and Philip Sacchitella, for setting me straight
    on IBM MobileFirst.


    At iTexico, thank you, Abhijeet Pradhan and Mathieu Clerici, for your top-notch
    Xamarin development.


    Thanks to everyone here at Lexicon Systems! That means you, Jonathan LaMaster,
    Tom Ruane, and everyone else whoвҖҷs had a hand in this. Thank you, Margo Chevers,
    for steeling my resolve to make this book possible. And thanks to David Alexander
    for editing and formatting until a publisher stepped in to give you a rest.


    Thanks to my parents and family for your steady and enthusiastic support.


    Thanks most of all to my sweetheart, Kristina. You went above and beyond in your
    support of this effort, and I am grateful.


    And lest I forget, a special thanks to the semicolon. Without your stalwart delimitation
    at the end of almost every line, the C# in this book, and, indeed, in all of our
    solutions, would be an unparseable blur of commands, keywords, symbols, and objects;
    Thank you, semicolon.


    Last, thanks to all of you not listed here who had a hand in or offered a word
    of advice or support for this book!'
