- fmt: '# WhatвҖҷs New: Mobile Development Techniques


    Throughout this book, you will explore common C# techniques and patterns in mobile
    development. Some of them are exactly the same as the approaches we are accustomed
    to in traditional .NET development, some changed a little, and a few changed a
    lot. Here are the key topics:


    - Mobile UI is the largest area of new learning for C# mobile development. `Xamarin.Forms`
    provides a cross-platform UI toolkit containing ready-to-use forms, pages, layouts,
    views, and controls. `Xamarin.iOS` and `Xamarin.Android` provide bindings to their
    respective native UIs. (See [Chapters 2](#A978-1-4842-0214-2_2_Chapter.html)вҖ“[6](#A978-1-4842-0214-2_6_Chapter.html)
    and [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html).)

    - The Data Access Layer in a mobile app typically binds controls and pages to
    data models populated from a local database that is synced with a remote data
    server using web services. (See [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html).)

    - Local database access via SQLite is a change from the usual database vendors,
    though ADO.NET access provides a familiar inroad and the `SQLite.NET` component
    is a featureful option. (See [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html).)

    - Data binding is central to `Xamarin.Forms` development and is often accomplished
    using the Model-View-ViewModel (MVVM) pattern. (See [Chapter 7](#A978-1-4842-0214-2_7_Chapter.html).)

    - Cross-platform architecture is a collection of code-sharing strategies to further
    our goal of write once, run anywhere. These include Portable Class Libraries (PCLs)
    with dependency injection, shared files and projects, and conditional compilation.
    (See [Chapter 9](#A978-1-4842-0214-2_9_Chapter.html).)


    LetвҖҷs touch on each of these topics.


    ## Mobile UI


    You have a formidable amount of new material to absorb when moving from web development
    to cross-platform mobile development, mostly in the area of the user interface.
    There is first the issue of new operating system UI APIs. Xamarin helps with this
    by providing platform-specific C# bindings to the major OSs with `Xamarin.Android`
    and `Xamarin.iOS`, while `Xamarin.Forms` provides cross-platform bindings to both
    of these plus Windows Phone. The other set of challenges involves the design differences
    between web apps and mobile apps. The compact screen, touch sensitivity, and handheld
    form factor team up to offer a fundamentally novel user experience (UX). This
    requires a fundamentally novel approach to design and development, leading us
    to explore mobile UI design.


    ### Xamarin.Forms and Platform-Specific UI


    There are two main approaches to mobile UI development using C#, which we can
    use separately, interchangeably, or in tandem:


    - `Xamarin.Forms` is a cross-platform UI toolkit for Android, iOS, and Windows
    Phone.

    - Platform-specific UI uses `Xamarin.Android`, `Xamarin.iOS`, and Windows Phone
    SDK.


    `Xamarin.Forms` contains a fully cross-platform toolkit providing a single set
    of UI controls, layouts, and pages that map cleverly to respective native UI bindings
    on iOS, Android, and Windows Phone. Since `Xamarin.Forms` is newer than platform-specific
    libraries, it is also less full-featured. Each release brings us closer to full-featured
    cross-platform goodness, but sometimes we need more than the out-of-the-box `Xamarin.Forms`
    classes have to offer. In those cases, we use the platform-specific libraries,
    either for the entire page or for just parts of a page using `Xamarin.Forms` custom
    renderers called `PageRenderers`.


    The platform-specific approach is older and more established and therefore quite
    detailed and full-featured. This involves libraries that bind directly to platform-specific
    UI APIs: `Xamarin.Android` for Android, and `Xamarin.iOS` for iOS. For Windows
    Phone, we use the Windows Phone SDK, a native API requiring no Xamarin bindings.
    These platform-specific libraries give us deep access to native UIs for providing
    a visually stunning, interactively rich user experience. This comes at a cost:
    platform-specific code requiring a separate UI project for each platform with
    little code reusability.


    Note


    `Xamarin.Forms` is the thrust of this book, augmented by custom renderers, which
    use platform-specific UI. However, developers creating platform-specific UI projects
    using `Xamarin.iOS` and `Xamarin.Android` without `Xamarin.Forms` can make excellent
    use of the iOS and Android sections in [Chapters 2](#A978-1-4842-0214-2_2_Chapter.html)вҖ“[7](#A978-1-4842-0214-2_7_Chapter.html).
    If you are taking the platform-specific approach, be sure to consult other sources
    (such as the Xamarin online documentation) for `Xamarin.Android` and `Xamarin.iOS`
    solution setup and fundamentals.


    ### Mobile UI Design


    UI techniques make up the core of most mobile software development. Current hardware
    limitations of small devices encourage us to leave the heavy lifting to the PCs
    and servers on the far end of our web services. Most of the components running
    in a mobile business application are there to support the visible user interface.
    Mobile business and data access layers are often abbreviated versions of their
    server-side brethren. That means that what we need most often are UI components
    to help us design screens using layouts, implement controls for data entry and
    selection, build lists and tables for data display and editing, create user navigation,
    and use images for backgrounds and icons. The UI topics in this book cover the
    functions used most frequently in mobile app development. In each chapter, we
    start with the simplest, most cross-platform approaches available, and then delve
    into platform-specifics for granularity and detail. These are the mobile UI topics
    covered in this book:


    - Screens, views, or pages are similar to the web and desktop equivalents in C#,
    using controls with methods and properties and firing events that we handle in
    our controllers. (See [Chapter 2](#A978-1-4842-0214-2_2_Chapter.html).)

    - Layouts help us organize the positioning and formatting of controls, allowing
    us to structure and design the screens of our mobile app. (See [Chapter 3](#A978-1-4842-0214-2_3_Chapter.html).)

    - Controls facilitate user interaction and data entry which is unique to the mobile
    user interface and differs substantially from the PC/mouse interface, largely
    due to the use of gestures. (See [Chapter 4](#A978-1-4842-0214-2_4_Chapter.html).)

    - Lists are one of the most powerful methods of data display and selection in
    mobile apps. (See [Chapter 5](#A978-1-4842-0214-2_5_Chapter.html).)

    - Navigation lets a user traverse an app, move from screen to screen, and access
    features. Hierarchical navigation, modal screens, navigation drawers, alerts,
    drilldown lists, and other key patterns make up the core of mobile UI navigation.
    (See [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).)

    - State Management is the handling of data passed between screens as the user
    navigates through the app. (See [Chapter 6](#A978-1-4842-0214-2_6_Chapter.html).)

    - Images are central to the mobile experience, in menus, lists, grids, carousels,
    and other layouts. (See [Chapters 2](#A978-1-4842-0214-2_2_Chapter.html), [4](#A978-1-4842-0214-2_4_Chapter.html),
    [6](#A978-1-4842-0214-2_6_Chapter.html).)'
