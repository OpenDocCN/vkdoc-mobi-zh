    \n#### еә”з”ЁзЁӢеәҸз”ҹе‘Ҫе‘Ёжңҹж–№жі•пјҡ`OnStart`гҖҒ`OnSleep` е’Ң `OnResume`\n\nеҪ“з”ЁжҲ·зӮ№еҮ»и®ҫеӨҮдёҠзҡ„ `Back` жҲ– `Home`пјҲжҲ–\
    \ `App Switcher`пјүжҢүй’®ж—¶пјҢеә”з”Ёдјҡиҝӣе…ҘеҗҺеҸ°гҖӮеҪ“д»–д»¬йҮҚж–°йҖүжӢ©еә”з”Ёж—¶пјҢе®ғдјҡжҒўеӨҚе№¶еӣһеҲ°еүҚеҸ°гҖӮеә”з”Ёзҡ„еҗҜеҠЁгҖҒд»ҺеүҚжҷҜзҠ¶жҖҒиҝӣе…ҘеҗҺеҸ°зҠ¶жҖҒз„¶еҗҺеҶҚж¬ЎеӣһеҲ°еүҚжҷҜпјҢзӣҙеҲ°з»ҲжӯўпјҢиҝҷдёӘиҝҮзЁӢиў«з§°дёәеә”з”Ёз”ҹе‘Ҫе‘ЁжңҹгҖӮ`Application`\
    \ зұ»еҢ…еҗ«дёүдёӘз”ЁдәҺеӨ„зҗҶз”ҹе‘Ҫе‘ЁжңҹдәӢд»¶зҡ„иҷҡж–№жі•пјҡ\n\n* `OnStart` вҖ“ еңЁеә”з”ЁйҰ–ж¬ЎеҗҜеҠЁж—¶и°ғз”Ё\n* `OnSleep` вҖ“ еңЁеә”з”ЁжҜҸж¬Ўиҝӣе…ҘеҗҺеҸ°ж—¶и°ғз”Ё\n\
    * `OnResume` вҖ“ еңЁеә”з”Ёд»ҺеҗҺеҸ°жҒўеӨҚж—¶и°ғз”Ё\n\n`OnSleep` д№ҹз”ЁдәҺжӯЈеёёзҡ„еә”з”Ёз»ҲжӯўпјҲйқһеҙ©жәғпјүгҖӮд»»дҪ•еә”з”Ёиҝӣе…ҘеҗҺеҸ°зҠ¶жҖҒж—¶пјҢйғҪеҝ…йЎ»еҒҮи®ҫе®ғеҸҜиғҪж°ёиҝңдёҚдјҡд»ҺиҜҘзҠ¶жҖҒиҝ”еӣһгҖӮ\n\
    \n**жҸҗзӨәпјҡ** еҪ“еә”з”Ёиҝӣе…ҘеҗҺеҸ°ж—¶пјҢеңЁиҝҷдәӣж–№жі•дёӯдҪҝз”Ё `Properties` еӯ—е…ёиҝӣиЎҢзЈҒзӣҳжҢҒд№…еҢ–гҖӮе…ідәҺзҠ¶жҖҒз®ЎзҗҶзҡ„жӣҙеӨҡдҝЎжҒҜпјҢиҜ·еҸӮйҳ…з¬¬ 6 з« гҖӮ\n\n####\
    \ дҪҝз”Ё `ContentPage` жһ„е»әйЎөйқў\n\n`App.cs`пјҲеҲ—иЎЁ 2-1пјүдёӯзҡ„ `ContentPage` зұ»з»§жүҝиҮӘ `Xamarin.Forms.Page`пјҢжҳҜ\
    \ Xamarin.Forms дёӯз”ЁдәҺиҮӘе®ҡд№үжһ„е»әйЎөйқўзҡ„йҖҡз”ЁйЎөйқўгҖӮе®ғеҢ…еҗ«дёҖдёӘеӯҗе…ғзҙ пјҢеҲҶй…Қз»ҷе…¶ `Content` еұһжҖ§пјҢдҫӢеҰӮеүҚйқўзҡ„ `Label`гҖӮеңЁ `ContentPage`\
    \ дёҠж”ҫзҪ®еӨҡдёӘжҺ§д»¶йңҖиҰҒдҪҝз”Ёз»§жүҝиҮӘ `ContentPage` зҡ„иҮӘе®ҡд№үзұ»пјҢиҜҘзұ»еҢ…еҗ«дёҖдёӘе®№еҷЁпјҢдҫӢеҰӮ `Layout`гҖӮ\n\n`ContentPage` е…·жңүеҪұе“ҚйЎөйқўеӨ–и§Ӯзҡ„еұһжҖ§гҖӮ`Padding`\
    \ еұһжҖ§еҸҜд»ҘеңЁйЎөйқўзҡ„иҫ№зјҳеҲӣе»әй—ҙи·қпјҢд»ҘжҸҗй«ҳеҸҜиҜ»жҖ§е’Ңи®ҫи®Ўж„ҹгҖӮ`BackgroundImage` еҸҜд»ҘеҢ…еҗ«дёҖдёӘжҳҫзӨәеңЁйЎөйқўиғҢжҷҜдёҠзҡ„еӣҫеғҸгҖӮ\n\n`ContentPage`\
    \ зҡ„еӨҡдёӘжҲҗе‘ҳеҜ№дәҺеҜјиҲӘе’ҢзҠ¶жҖҒз®ЎзҗҶйқһеёёжңүз”ЁгҖӮ`Title` еұһжҖ§еҢ…еҗ«ж–Үжң¬пјҢ`Icon` еұһжҖ§еҢ…еҗ«дёҖдёӘеӣҫеғҸпјҢеҪ“е®һзҺ° `NavigationPage` ж—¶пјҢе®ғд»¬дјҡжҳҫзӨәеңЁйЎөйқўйЎ¶йғЁгҖӮеҸҜд»ҘйҮҚеҶҷз”ҹе‘Ҫе‘Ёжңҹж–№жі•\
    \ `OnAppearing` е’Ң `OnDisappearing` жқҘеӨ„зҗҶ `ContentPage` зҡ„еҲқе§ӢеҢ–е’Ңз»“жқҹж“ҚдҪңгҖӮ`ToolBarItems`\
    \ еұһжҖ§еҜ№дәҺеҲӣе»әдёӢжӢүиҸңеҚ•еҫҲжңүз”ЁгҖӮжүҖжңүиҝҷдәӣеҜјиҲӘзӣёе…іжҲҗе‘ҳе°ҶеңЁз¬¬ 6 з« дёӯд»Ӣз»ҚгҖӮ\n\n### Xamarin.Android\n\nandroid\n\nAndroid\
    \ йЎ№зӣ®еҢ…еҗ«дёҖдёӘеҗҚдёә `MainActivity.cs` зҡ„еҗҜеҠЁж–Үд»¶пјҢе®ғе®ҡд№үдәҶдёҖдёӘз»§жүҝиҮӘ `Xamarin.Forms.Platform.Android.FormsApplicationActivity`\
    \ зҡ„жҙ»еҠЁзұ»пјҢеҰӮеҲ—иЎЁ 2-2 жүҖзӨәгҖӮ\n\n**еҲ—иЎЁ 2-2.** FormsExample.Droid йЎ№зӣ®дёӯзҡ„ `MainActivity.cs`\n\n\
    ```\nnamespace FormsExample.Droid\n{\n    [Activity(Label = \"FormsExample\",\
    \ Icon = \"@drawable/icon\", MainLauncher = true, ConfigurationChanges = ConfigChanges.ScreenSize\
    \ | ConfigChanges.Orientation)]\n    public class MainActivity : global::Xamarin.Forms.Platform.Android.FormsApplicationActivity\n\
    \    {\n        protected override void OnCreate(Bundle bundle)\n        {\n \
    \           base.OnCreate(bundle);\n            global::Xamarin.Forms.Forms.Init(this,\
    \ bundle);\n            LoadApplication(new App());\n        }\n    }\n}\n```\n\
    \nеңЁ `OnCreate` ж–№жі•дёӯпјҢXamarin.Forms иў«еҲқе§ӢеҢ–пјҢе№¶дё” `LoadApplication` е°Ҷ `App` и®ҫзҪ®дёәеҪ“еүҚйЎөйқўгҖӮ\n\n\
    ### Xamarin.iOS\n\ni OS\n\niOS йЎ№зӣ®еҢ…еҗ«дёҖдёӘеҗҚдёә `AppDelegate` зҡ„еҗҜеҠЁж–Үд»¶пјҲеҲ—иЎЁ 2-3пјүпјҢе®ғз»§жүҝиҮӘ `Xamarin.Forms.Platform.iOS.FormsApplicationDelegate`гҖӮ\n\
    \n**еҲ—иЎЁ 2-3.** FormsExample.iOS йЎ№зӣ®дёӯзҡ„ `AppDelegate.cs`\n\n```\nnamespace FormsExample.iOS\n\
    {\n        [Register(\"AppDelegate\")]\n        public partial class AppDelegate\
    \ : global::Xamarin.Forms.Platform.iOS.FormsApplicationDelegate\n        {\n \
    \           public override bool FinishedLaunching(UIApplication app, NSDictionary\
    \ options)\n            {\n                global::Xamarin.Forms.Forms.Init();\n\
    \                LoadApplication(new App());\n                return base.FinishedLaunching(app,\
    \ options);\n            }\n        }\n}\n```\n\nXamarin.Forms еңЁ `Init()` ж–№жі•дёӯиў«еҲқе§ӢеҢ–пјҢе№¶дё”\
    \ `LoadApplication` е°Ҷ `App` и®ҫзҪ®дёәеҪ“еүҚйЎөйқўгҖӮ\n\n### Windows Phone еә”з”ЁзЁӢеәҸ\n\nwindows\n\n\
    Windows Phone йЎ№зӣ®еҢ…еҗ«дёҖдёӘ `Mainpage.xaml.cs` зұ»пјҲеҲ—иЎЁ 2-4пјүпјҢе®ғз»§жүҝиҮӘ `Xamarin.Forms.Platform.WinPhone.FormsApplicationPage`пјҡ\n\
    \n**еҲ—иЎЁ 2-4.** WinPhone йЎ№зӣ®дёӯзҡ„ `MainPage.xaml.cs`\n\n```\nnamespace FormsExample.WinPhone\n\
    {\npublic partial class MainPage : global::Xamarin.Forms.Platform.WinPhone.FormsApplicationPage\n\
    {\npublic MainPage()\n{\nInitializeComponent();\nSupportedOrientations = SupportedPageOrientation.PortraitOrLandscape;\n\
    global::Xamarin.Forms.Forms.Init();\nLoadApplication(new FormsExample.App());\n\
    }\n}\n}\n```\n\nXamarin.Forms еңЁ `Init()` ж–№жі•дёӯиў«еҲқе§ӢеҢ–пјҢе№¶дё” `LoadApplication` е°Ҷ Xamarin.Forms\
    \ зҡ„ `App` и®ҫзҪ®дёәеҪ“еүҚйЎөйқўгҖӮ\n\n**жіЁж„Ҹпјҡ** з”ұдәҺ Windows Phone еә”з”ЁзЁӢеәҸжңүиҮӘе·ұзҡ„ `App` зұ»пјҢеңЁеј•з”Ё Xamarin.Forms\
    \ зҡ„ `App` еҜ№иұЎж—¶пјҢдҪҝз”Ёеә”з”ЁзЁӢеәҸе‘ҪеҗҚз©әй—ҙжҳҜдёҖз§ҚиүҜеҘҪе®һи·өгҖӮ\n\nWindows Phone еә”з”ЁиҝҳйңҖиҰҒеңЁ `MainPage.xaml` дёӯж·»еҠ дёҖдёӘеј•з”ЁгҖӮ\n\
    \n```\n<winPhone:FormsApplicationPage\n...\n```\n"
- fmt: "```\n`<winPhone:FormsApplicationPage>`  \nAll three of our platform-specific\
    \ initializers, the Android `MainActivity` the iOS `AppDelegate`, and the Windows\
    \ Phone `MainPage` get the starting page from the Xamarin.Forms `App` class, which,\
    \ by default, returns a stubbed demo page.\n\n### Core Library\n\nThe core library\
    \ is a project in a Xamarin.Forms solution for the business and/or data layer\
    \ of an app which should be largely platform independent. Although not explicitly\
    \ created as part of the Xamarin.Forms solution templates, a core library project\
    \ is standard practice. Create one yourself and add it to your solution. This\
    \ can contain data models, shared files or resources, data access, business logic,\
    \ or references to PCLs. This is the place for platform-independent middle-tier\
    \ or back-end non-UI code. It is referenced by any or all of the other projects\
    \ in the solution. Use it to optimize code reuse and to decouple the UI projects\
    \ from the data source and business logic.\n\nNow we need to build out the pages\
    \ of our app. Time to code!\n\n### Setting the AppвҖҷs Main Page\n\nFirst we create\
    \ a custom page in the Xamarin.Forms core project and set it to be the appвҖҷs main\
    \ page. Create a class inherited from `ContentPage` and call it `ContentPageExample`:\n\
    \n```\nnamespace FormsExample\n{\n        class ContentPageExample : ContentPage\n\
    \        {\n            public ContentPageExample()\n            {\n         \
    \   // views/controls will go here\n```\n\nThen back in the Xamarin.Forms `App.cs`,\
    \ we update the `App` constructor to set an instance of our new `ContentPageExample`\
    \ class as the `MainPage`:\n\n```\nnamespace FormsExample\n{\n        public class\
    \ App : Application\n        {\n            public App()\n            {\n    \
    \            MainPage = new ContentPageExample ();\n            }\n```\n\nNow\
    \ we have the custom page class ready and can load up our `ContentPageExample`\
    \ constructor with controls.\n\n## Adding Xamarin.Forms Views\n\n`View` is the\
    \ term for control in Xamarin.Forms, the smallest unit of UI construction. Most\
    \ views inherit from the `View` class and provide basic UI functions, such as\
    \ a label or a button. From this point on, we will use the terms view and control\
    \ interchangeably.\n\n> **Tip** All example code solutions, including the XAML\
    \ versions of these C# examples, can be found under the title of this book on\
    \ [Apress.com](http://www.apress.com/9781484202159?gtmf=s) in the Source Code/Downloads\
    \ tab, or on GitHub at [https://github.com/danhermes/xamarin-book-examples](https://github.com/danhermes/xamarin-book-examples).\n\
    \nLetвҖҷs start simply and put some views into the `ContentPageExample` class.\n\
    \n### Label View\n\nLabels display single or multiline text. Here are some examples:\n\
    \n```\nLabel labelLarge = new Label\n{\n        Text = \"Label\",\n        FontSize\
    \ = 40,\n        HorizontalOptions = LayoutOptions.Center\n};\nLabel labelSmall\
    \ = new Label\n{\n        Text = \"This control is great for\\n\" +\n        \
    \        \"displaying one or more\\n\" +\n                \"lines of text.\",\n\
    \        FontSize = 20,\n        HorizontalOptions = LayoutOptions.CenterAndExpand\n\
    };\n```\n\nMultiline text happens implicitly when enough text is used that it\
    \ wraps, or explicitly when specifying line breaks with `\\n`.\n\nA `Label` view\
    \ has two types of alignment, view-justification and text-justification. The entire\
    \ view is justified within a layout using the `HorizontalOptions` and `VerticalOptions`\
    \ properties assigned using `LayoutOptions`. `Label` text is justified within\
    \ a `Label` using `Label`вҖҷs `XAlign` and `YAlign` properties, where `XAlign` sets\
    \ the horizontal and `YAlign` sets the vertical justification of text.\n\n```\n\
    XAlign = TextAlignment.End\n```\n\nThe `TextAlignment` enumeration has three values:\
    \ `Start`, `Center`, and `End`. In this example we use the defaults.\n\nNext,\
    \ the labels must be assigned to a layout for placement on the page.\n\n### Placing\
    \ Views Using `StackLayout`\n\nA `Layout` view acts as a container for other views.\
    \ Since a `ContentPage` can have only one child, all the views on our page must\
    \ be placed in a single container that is made the child of the `ContentPage`.\
    \ Here we employ `StackLayout`, a subclass of `Layout` that can \"stack\" child\
    \ views vertically:\n\n```\nStackLayout stackLayout = new StackLayout\n{\n   \
    \     Children =\n        {\n            labelLarge,\n            labelSmall\n\
    \        },\n        HeightRequest = 1500\n};\n```\n\nWe place all the child views\
    \ onto the parent view by using the `Children` property of this `StackLayout`\
    \ and set the requested height with `HeightRequest`. `HeightRequest` has been\
    \ set larger than the visible page so later we can make it scroll.\n\n> **Note**\
    \ `StackLayout` child views are laid vertically unless horizontal order is specified\
    \ using `Orientation = StackOrientation.Vertical`.\n\nTo get the `StackLayout`\
    \ to display on our page, we must assign it to the `Content` property of the `ContentPage`:\n\
    \n```\nthis.Content = stackLayout;\n```\n\nCompile and run the code. Figure [2-7](#A978-1-4842-0214-2_2_Chapter.html#Fig7)\
    \ shows our labels on the `StackLayout` for iOS, Android, and Windows Phone, respectively.\n\
    \n![A978-1-4842-0214-2_2_Fig7_HTML.jpg](A978-1-4842-0214-2_2_Fig7_HTML.jpg)\n\n\
    **Figure 2-7.** Xamarin.Forms `Label`s on a `StackLayout`\n\nIf youвҖҷre using iOS\
    \ and want your Xamarin.Forms projects to look more like examples in this book\
    \ that have a black background and white text, or youвҖҷre using another platform\
    \ and want more of an iOS look, setting background color and font color can help\
    \ you.\n\n### Background Color and Font Color\n\nPage background color and view\
    \ font color can be changed using the `ContentPage`вҖҳs `BackgroundColor` property\
    \ and the `TextColor` property found on text-based `Views`.\n\nIf you are working\
    \ on an iOS project and want your work to look more like the book examples with\
    \ black backgrounds, add this line to your page:\n\n```\nthis.BackgroundColor\
    \ = Color.Black;\n```\n\nIf you want it to look more classically iOS then set\
    \ it to `Color.White`.\n\nText color will then be set automatically to a lighter\
    \ color. However, you can control text color manually on text controls with the\
    \ `TextColor` property.\n\n```\nTextColor =  Color.White,\n```\n\nWe use fonts\
    \ in many controls, so letвҖҷs do a quick overview of those.\n\n### Using Fonts\n\
    \nFormat text on controls by using these properties:\n\n*   `FontFamily`: Set\
    \ the name of the font in the `FontFamily` property, otherwise, the default system\
    \ font will be used. For example, `label.FontFamily = \"Courier\";`\n*   `FontSize`:\
    \ The font size and weight are specified in the `FontSize` property using a double\
    \ value or a `NamedSize` enumeration. Here is an example using a double: `label.FontSize\
    \ = 40;`. Set a relative size by using `NamedSize` values such as `NamedSize.Large`,\
    \ using `NamedSize` members `Large`, `Medium`, `Small`, and `Micro`. For example,\
    \ `button.FontSize = Device.GetNamedSize (NamedSize.Large, typeof(Button));`\n\
    *   `FontAttributes`: Font styles such as bold and italics are specified using\
    \ the `FontAttributes` property. Single attributes are set like this: `label.FontAttributes\
    \ = FontAttributes.Bold`. `FontAttributes` options are `None`, `Bold`, and `Italic`.\
    \ Multiple attributes are concatenated using the \"|\", for example, `label.FontAttributes\
    \ = FontAttributes.Bold | FontAttributes.Italic;`\n\n> **Tip** Some controls support\
    \ the use of different `FontAttributes` on different parts of a string using the\
    \ `FormattedString` class.\n\n> **Note** The `FontSize` property using `NamedSize`\
    \ can be declared two ways:\n\n> `button.FontSize = Device.GetNamedSize (NamedSize.Large,\
    \ button);`\n\n> `button.FontSize = Device.GetNamedSize (NamedSize.Large, typeof(Button));`\n\
    \n> Use the second one for inline declarations.\n\n### Using Platform-Specific\
    \ Fonts\n\nMake sure your font name will work for all your target platforms, or\
    \ your page may fail mysteriously. If you need different font names per platform,\
    \ use the `Device.OnPlatform` method, which sets a value according to the platform,\
    \ like this:\n\n```\nlabel.FontFamily = Device.OnPlatform (\n        iOS:    \
    \  \"Courier\",\n        Android:  \"Droid Sans Mono\",\n        WinPhone: \"\
    Courier New\"\n);\nlabel.FontSize = Device.OnPlatform (\n        30,\n       \
    \ Device.GetNamedSize (NamedSize.Medium, label),\n        Device.GetNamedSize\
    \ (NamedSize.Large, label)\n);\n```\n\n> **Tip** Using `Device.OnPlatform` is\
    \ a handy cross-platform trick that returns a platform-specific value.\n\nCustom\
    \ fonts loaded at runtime can also be used but this requires platform-specific\
    \ coding covered in the Xamarin.Forms online docs in section Working With... вһӨ\
    \ Fonts(1.3).\n\n### Button View\n\nXamarin.Forms buttons are rectangular and\
    \ clickable.\n\nLetвҖҷs add a plain ole button:\n\n```\nButton button = new Button\n\
    {\n        Text = \"Make It So\",\n        FontSize = Device.GetNamedSize(NamedSize.Large,\
    \ typeof(Button)),\n        HorizontalOptions = LayoutOptions.Center,\n      \
    \  VerticalOptions = LayoutOptions.Fill\n};\n```\n\nThe `Text` property contains\
    \ the text visible on the button. `HorizontalOptions` and `VerticalOptions` (discussed\
    \ in the next section) determine the controlвҖҷs alignment and size. This `NamedSize`\
    \ font setting makes the font `Large`.\n\n> **Tip** Buttons can be customized\
    \ using the `BorderColor`, `BorderWidth`, and `TextColor` properties. The `BorderWidth`\
    \ is defaulted to zero on iOS.\n\nAdd the button to our `StackLayout`.\n\n```\n\
    StackLayout stackLayout = new StackLayout\n{\n        Children =\n        {\n\
    \            labelLarge,\n            labelSmall,\n            button\n      \
    \  },\n        HeightRequest = 1500\n};\n```\n\nFigure [2-8](#A978-1-4842-0214-2_2_Chapter.html#Fig8)\
    \ shows the new button.\n\n![A978-1-4842-0214-2_2_Fig8_HTML.jpg](A978-1-4842-0214-2_2_Fig8_HTML.jpg)\n\
    \n**Figure 2-8.** Xamarin.Forms Button\n\nNow letвҖҷs assign an event handler, either\
    \ inline:\n\n```\nbutton.Clicked += (sender, args) =>\n{\n       button.Text =\
    \ \"It is so!\";\n};\n```\n\nOr by assigning a method:\n\n```\nbutton.Clicked\
    \ += OnButtonClicked;\n```\n\n...which is called outside the page constructor:\n\
    \n```\nvoid OnButtonClicked(object sender, EventArgs e)\n        {\n         \
    \   button.Text = \"It is so!\";\n        };\n```\n\nWhen you click the button\
    \ the button text changes, as in Figure [2-9](#A978-1-4842-0214-2_2_Chapter.html#Fig9).\n\
    \n![A978-1-4842-0214-2_2_Fig9_HTML.jpg](A978-1-4842-0214-2_2_Fig9_HTML.jpg)\n\n\
    **Figure 2-9.** `button.Clicked` event fired\n\n> **Tip** If you assign an event\
    \ handler outside the page constructor, be sure to also define your button outside\
    \ the constructor to avoid a variable undefined error.\n\n`BorderWidth` assigns\
    \ the weight of the line that draws the button.\n\n### Setting View Alignment\
    \ and Size: `HorizontalOptions` and `VerticalOptions`\n\nHorizontal and vertical\
    \ alignment and, to a certain degree, the size of controls are managed by setting\
    \ the `HorizontalOptions` and/or `VerticalOptions` properties to a value of the\
    \ `LayoutOptions` class, for example:\n\n```\nButton button = new Button\n{\n\
    \    HorizontalOptions = LayoutOptions.Center,\n        VerticalOptions = LayoutOptions.Fill\n\
    }\n```\n\nConsiderations in view layout are the space provided to the view by\
    \ the layout and surrounding elements, the padding space around the view, and\
    \ the size of the view itself. These types of formatting are accomplished using\
    \ `LayoutOptions` and `AndExpand`.\n\n#### Justification with `LayoutOptions`\n\
    \nIndividual control layout is defined along a single axis by setting the `HorizontalOptions`\
    \ or `VerticalOptions` property to one of the `LayoutOptions` classes:\n\n*  \
    \ `Start` left or top-justifies the control (depending upon layout `Orientation`)\n\
    *   `Center` centers the control.\n*   `End` right or bottom-justifies the control.\n\
    *   `Fill` expands the size of the control to fill the space provided.\n\nFor\
    \ example:\n\n```\nHorizontalOptions = LayoutOptions.Start,\n```\n\n#### `AndExpand`\
    \ Pads with Space\n\nSetting `HorizontalOptions` or `VerticalOptions` to these\
    \ `LayoutOptions` classes provides padding space around the view:\n\n*   `StartAndExpand`\
    \ left or top-justifies the control and pads around the control with space.\n\
    *   `CenterAndExpand` centers the control and pads around the control with space.\n\
    *   `EndAndExpand` right or bottom-justifies the control and pads around the control\
    \ with space.\n*   `FillAndExpand` expands the size of the control and pads around\
    \ the control with space.\n\nFor example:\n\n```\nHorizontalOptions = LayoutOptions.StartAndExpand\n\
    ```\n\n> **Tip** `HorizontalOptions` set to `Fill` and `FillAndExpand` look the\
    \ same with a single control in a column.\n\n> **Tip** `VerticalOptions` set to\
    \ `Center` or `Fill` is useful only if vertical space has been explicitly provided.\
    \ Otherwise, these options can appear to do nothing. `LayoutOptions.Fill` wonвҖҷt\
    \ make your control taller if thereвҖҷs no space to grow.\n\n> **Tip** `VerticalOptions`\
    \ set to `Expand` and `CenterAndExpand` imposes padding space around a control\
    \ in a `StackLayout`.\n\nThere are more formatting examples later in this chapter\
    \ and a lot more on the topic of control layout and alignment in [Chapter 3](http://www.apress.com/9781484202159?gtmf=s).\
    \ Next letвҖҷs create some user input.\n\n### `Entry` View for Text Input\n\nThe\
    \ following code creates a text box for user entry of a single line of text. `Entry`\
    \ inherits from the `InputView` class, a derivative of the `View` class.\n\n```\n\
    Entry entry = new Entry\n{\n        Placeholder = \"Username\",\n        VerticalOptions\
    \ = LayoutOptions.Center,\n        Keyboard = Keyboard.Text\n};\n```\n\nUser input\
    \ goes into the `Text` property as a `String`.\n\nNote the use of the `Placeholder`\
    \ property, an inline label for the name of the field and a common technique in\
    \ the mobile UI often preferable to space-consuming labels placed above or beside\
    \ the entry control. The `Keyboard` property is a member of `InputView` and provides\
    \ a range of options for the onscreen keyboard that appears for input, including\
    \ `Text`, `Numeric`, `Telephone`, `URL`, and `Email`. Remember to add the entry\
    \ to our `StackLayout` (see Listing [2-5](#A978-1-4842-0214-2_2_Chapter.html#FPar21)\
    \ later in the chapter). Figure [2-10](#A978-1-4842-0214-2_2_Chapter.html#Fig10)\
    \ shows the new entry control for username.\n\n![A978-1-4842-0214-2_2_Fig10_HTML.jpg](A978-1-4842-0214-2_2_Fig10_HTML.jpg)\n\
    \n**Figure 2-10.** Xamarin.Forms User `Entry` view\n\n> **Tip** Use the `IsPassword`\
    \ property to replace entered text letters with dots.\n\nFor multiline entry,\
    \ use the `Editor` control.\n\n### `BoxView`\n\nThe `BoxView` control creates\
    \ a colored graphical rectangle, useful as a placeholder that can be later replaced\
    \ by an image or other more complex control or group of controls. This control\
    \ is useful when youвҖҷre waiting on the designer to get his/her act together.\n\
    \n```\nBoxView boxView = new BoxView\n{\n        Color = Color.Silver,\n     \
    \   WidthRequest = 150,\n        HeightRequest = 150,\n        HorizontalOptions\
    \ = LayoutOptions.StartAndExpand,\n        VerticalOptions = LayoutOptions.Fill\n\
    };\n```\n\nThe `Color` property can be set to any `Color` member value. The default\
    \ dimensions are 40Г—40 pixels, which can be changed using the `WidthRequest` and\
    \ `HeightRequest` properties.\n\n> **Tip** Be careful when setting `HorizontalOptions`\
    \ and `VerticalOptions` to `LayoutOptions.Fill` and `LayoutOptions.FillAndExpand`,\
    \ as this can override your `HeightRequest` and `WidthRequest` dimensions.\n\n\
    Add the `BoxView` to your `StackLayout` (see Listing [2-5](#A978-1-4842-0214-2_2_Chapter.html#FPar21)\
    \ later in the chapter) and see the result here in Figure [2-11](#A978-1-4842-0214-2_2_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0214-2_2_Fig11_HTML.jpg](A978-1-4842-0214-2_2_Fig11_HTML.jpg)\n\
    \n**Figure 2-11.** Xamarin.Forms `BoxView`\n\nEventually your designer will give\
    \ you those promised icons and you can replace your `BoxViews` with real images.\n\
    \n### Image View\n\nThe `Image` view holds an image for display on your page from\
    \ a local or online file:\n\n```\nImage image = new Image\n{\n        Source =\
    \ \"monkey.png\",\n        Aspect = Aspect.AspectFit,\n        HorizontalOptions\
    \ = LayoutOptions.End,\n        VerticalOptions = LayoutOptions.Fill\n};\n```\n\
    \nFigure [2-12](#A978-1-4842-0214-2_2_Chapter.html#Fig12) shows the monkey image\
    \ at the bottom right.\n\n![A978-1-4842-0214-2_2_Fig12_HTML.jpg](A978-1-4842-0214-2_2_Fig12_HTML.jpg)\n\
    \n**Figure 2-12.** Image view\n\nLetвҖҷs look at how an image is handled.\n\n####\
    \ `Source` Property\n\nThe `Source` property denotes the location of the image\
    \ by using these `ImageSource` class members:\n\n*   `FromFile`: Local image file,\
    \ for example, `ImageSource.FromFile(\"monkey.png\")`. The shortcut for this method\
    \ when assigning the `Source` is to leave off the method altogether: `Source =\
    \ \"monkey.png\"`\n*   `FromResource`: Resource ID to an `EmbeddedResource` in\
    \ the app or PCL, for example, `ImageSource.FromResource(\"monkey.png\")`.\n*\
    \   `FromUri`: Online imageвҖҷs URI, for example, `ImageSource.FromUri(new Uri(\"\
    http://yourdomain.com/image.png\"))`\n\n> **Tip** You can use a `FromFile` shortcut\
    \ to assign a local image: `Source = \"monkey.png\"`\n\n#### Local Images\n\n\
    Local image files have platform-specific image folders in their respective projects:\n\
    \n*   Android: In the `Resources/drawable` folder. DonвҖҷt use special characters\
    \ in the filename. The Build Action must be set to `AndroidResource`.\n*   iOS:\
    \ In the `/Resources` folder. Provide images for Retina displays as well, double\
    \ resolution with @2x suffix on the filename before the extension. The Build Action\
    \ must be set to `BundleResource`.\n*   Windows Phone: In the Windows Phone project\
    \ root directory. The Build Action must be set to `Content`.\n\nSet Build Actions\
    \ to configure images to compile properly by right-clicking image files in the\
    \ project.\n\n#### Image Sizing: `Aspect` Property\n\nThe `Image.Aspect` property\
    \ determines image sizing and is set by using the `Aspect` enumeratorвҖ”for example,\
    \ `image.Aspect = Aspect.AspectFit`. These are the `Aspect` members:\n\n*   `AspectFill`:\
    \ Scale the image to fill the view, clipping if necessary.\n*   `AspectFit`: Scale\
    \ the image to fit within the view maintaining the aspect ratio with no distortion\
    \ and leaving space if necessary (letterboxing).\n*   `Fill`: Scale the image\
    \ to fill the view entirely and exactly, possibly distorting the image.\n\nThose\
    \ are the image formatting options. Next we will make our image clickable.\n\n\
    #### Making an Image Clickable with a `GestureRecognizer`\n\nTappable images and\
    \ icons are common in mobile applications for actions and navigation. Like many\
    \ Xamarin.Forms views, the `Image` doesnвҖҷt have a click or tap event and must\
    \ be wired up using the `GestureRecognizer` class. A gesture recognizer is a class\
    \ that can be added to many views to respond to user interaction. It currently\
    \ supports just the tap gesture. The terms click and tap are used interchangeably\
    \ in mobile UI development.\n\nThe standard gesture recognizer is declared and\
    \ a handler is created to manage the `Tapped` event, then the gesture recognizer\
    \ is added to the target view, an image in this case. Change the imageвҖҷs `Opacity`\
    \ to .5 in the handler, which will fade the image slightly when tapped.\n\n```\n\
    var tapGestureRecognizer = new TapGestureRecognizer();\ntapGestureRecognizer.Tapped\
    \ += (s, e) => {\n        image.Opacity = .5;\n};\nimage.GestureRecognizers.Add(tapGestureRecognizer);\n\
    ```\n\nGive that a try and make your monkey fade so you can see that the gesture\
    \ recognizer works.\n\n> **Tip** An alternative implementation of `GestureRecognizer`\
    \ uses the `Command` property.\n\n```\nimage.GestureRecognizers.Add (new TapGestureRecognizer\
    \ {\n       Command = new Command (()=> { /*handle tap*/ }),\n});\n```\n\nUser\
    \ feedback is a crucial concept in mobile UI development. Any time a user does\
    \ something in the UI there should be some subtle acknowledgment by the app. A\
    \ tap, for instance, should respond to the user with visible feedback. Usually\
    \ an image will gray out or have a white background for a sec when touched. LetвҖҷs\
    \ do that professionally using the imageвҖҷs `Opacity` property but adding `async/await`\
    \ to create a slight delay in our fade without affecting the appвҖҷs performance.\n\
    \nReplace the `Tapped` handler with this one that will cause the image to fade\
    \ slightly for a fraction of a second. Remember to add `using System.Threading.Tasks;`\
    \ to the top of your file for `async/await`.\n\n```\ntapGestureRecognizer.Tapped\
    \ +=  async (sender, e) =>\n{\n        image.Opacity = .5;\n        await Task.Delay(200);\n\
    \        image.Opacity = 1;\n};\n```\n\nTapping on the image will now fade the\
    \ image slightly, then back to normal, providing a responsive user experience.\n\
    \nIn your own projects youвҖҷll use gesture recognizers (and `async/await`) to actually\
    \ do something when an image is tapped. If you want to see `async/await` in action\
    \ in this example, bump up the `Delay` to 2000, then click the \"Make It So\"\
    \ button while itвҖҷs `await`ing and youвҖҷll see that the app is still responsive.\
    \ You could do many things in this `Tapped` handler without interrupting the flow\
    \ of the app! Often when a button or image is pressed, the result should be backgrounded\
    \ using `async/await` for an optimal user experience.\n\n> **Tip** `Async/await`\
    \ is a standard C# technique for queuing up activities in the background for simultaneous\
    \ activity using the Task Parallel Library (TPL). Many Xamarin methods and functions\
    \ are provisioned for background processing using `async/await`.\n\n### Finalizing\
    \ the `StackLayout`\n\nNow that we have our controls in place, letвҖҷs pull this\
    \ entire page together. Check that the `stackLayout` has all the views in it,\
    \ as shown in Listing [2-5](#A978-1-4842-0214-2_2_Chapter.html#FPar21).\n\n**Listing\
    \ 2-5.** Final `StackLayout` for this chapterвҖҷs Xamarin.Forms example in `ContentPageExample.cs`\n\
    \n```\nStackLayout stackLayout = new StackLayout\n{\n        Children =\n    \
    \    {\n            labelLarge,\n            labelSmall,\n            button,\n\
    \            entry,\n            boxView,\n            image\n        },\n   \
    \     HeightRequest = 1500\n};\n```\n\nNow, we could keep our `stackLayout` assigned\
    \ to `ContentPageExample.Content` and call that a page, but we have one more view\
    \ to add, a container class to permit scrolling of our views.\n\n### `ScrollView`\n\
    \nThe `ScrollView` layout contains a single child and imparts scrollability to\
    \ its contents:\n\n```\nScrollView scrollView = new ScrollView\n{\n        VerticalOptions\
    \ = LayoutOptions.FillAndExpand,\n        Content = stackLayout\n};\n```\n\nHere\
    \ we assign `stackLayout` to the `Content` property of this `ScrollView` so our\
    \ entire layout of views will now be scrollable.\n\n> **Tip** `ScrollView` scrolls\
    \ vertically by default but can also scroll sideways using the `Orientation` property.\
    \ Ex. `Orientation = ScrollOrientation.Horizontal`\n\nThatвҖҷs it for the views\
    \ on this page. Now letвҖҷs wire it up at the page level.\n\n### Assigning the `ContentPage.Content`\
    \ Property\n\nOn the `ContentPage`, we must change the `Content` property assignment\
    \ to the new container view, `scrollView`.\n\n```\nthis.Content = scrollView;\n\
    ```\n\nThe final touch will be padding around the entire page so views wonвҖҷt be\
    \ mashed up against the sides of the screen.\n\n### Padding Around the Entire\
    \ Page\n\nThe `ContentPage`вҖҳs `Padding` property creates space around the entire\
    \ page. HereвҖҷs the property assignment:\n\n```\nthis.Padding = new Thickness(left,\
    \ top, right, bottom);\n```\n\nThis example will place padding left, right, and\
    \ bottom, but not top:\n\n```\nthis.Padding = new Thickness(10, 0, 10, 5);\n```\n\
    \nThis will place equal space on all four sides:\n\n```\nthis.Padding = new Thickness(10);\n\
    ```\n\nThis example will slide a page just below the iOS status bar while keeping\
    \ the page flush to the top of the screen for other OSes. The `Device.OnPlatform`\
    \ method supplies different values or actions depending on the native OS (iOS,\
    \ Android, WinPhone):\n\n```\nthis.Padding = new Thickness(10, Device.OnPlatform(20,\
    \ 0, 0), 10, 5);\n```\n\nThis last `Padding` expression is what we use in this\
    \ project and in most projects in this book.\n\nFigure [2-13](#A978-1-4842-0214-2_2_Chapter.html#Fig13)\
    \ shows a final build and run on all three platforms.\n\n![A978-1-4842-0214-2_2_Fig13_HTML.jpg](A978-1-4842-0214-2_2_Fig13_HTML.jpg)\n\
    \n**Figure 2-13.** Final build and run of the `FormsExample` solution\n\n### CODE\
