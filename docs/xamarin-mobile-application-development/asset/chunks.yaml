    drilldown menus, and `TabbedPage` for tab menus, a `MasterDetailPage` for making
    navigation drawers, a `CarouselPage` for scrolling image pages, and a `ContentPage`,
    a base class for creating custom pages. Layouts span the standard formats we use
    on various platforms including `StackLayout`, `AbsoluteLayout`, `RelativeLayout`,
    `Grid`, `ScrollView`, and `ContentView`, the base layout class. Used within those
    layouts are dozens of familiar controls, or views, such as `ListView`, `Button`,
    `DatePicker`, and `TableView`. Many of these views have built-in data binding
    options.


    Xamarin.Forms comprises platform-independent classes that are bound to their native
    platform-specific counterparts. This means we can develop basic, native UIs for
    all three platforms with almost no knowledge of iOS and Android UIs. Rejoice but
    beware! Purists warn that trying to build apps for these platforms without an
    understanding of the native APIs is a reckless undertaking. LetвҖҷs heed the spirit
    of their concerns. We must take a keen interest in Android and iOS platforms,
    their evolution, features, idiosyncrasies, and releases. We can also wallow in
    the convenience and genius of the amazing cross-platform abstraction that is Xamarin.Forms!


    Note


    Basic pages such as login screens, simple lists, and some business apps are well-suited
    to out-of-the-box Xamarin.Forms at the time of this writing. Platform-specific
    code can be utilized in Xamarin.Forms projects for added functionality but each
    subsequent release of this library will allow us to build more complex screens
    without utilizing platform-specific code.


    ### Xamarin.Forms Solution Architecture


    One of the greatest benefits of Xamarin.Forms is that it gives us the ability
    to develop native mobile apps for several platforms simultaneously. Figure [2-2](#A978-1-4842-0214-2_2_Chapter.html#Fig2)
    shows the solution architecture for a cross-platform Xamarin.Forms app developed
    for iOS, Android, and Windows Phone. In the spirit of good architecture and reusability,
    a Xamarin.Forms cross-platform solution often uses shared C# application code
    containing the business logic and data access layer, shown as the bottom level
    of the diagram. This is frequently referred to as the Core Library. The cross-platform
    Xamarin.Forms UI layer is also C# and is depicted as the middle layer in the figure.
    The thin, broken layer at the top is a tiny amount of platform-specific C# UI
    code in platform-specific projects required to initialize and run the app in each
    native OS.


    ![A978-1-4842-0214-2_2_Fig2_HTML.jpg](A978-1-4842-0214-2_2_Fig2_HTML.jpg)


    Figure 2-2.


    Xamarin.Forms solution architecture: One app for three platforms


    Figure [2-2](#A978-1-4842-0214-2_2_Chapter.html#Fig2) is simplified to communicate
    the fundamentals of Xamarin.Forms. The reality is that hybridization between Xamarin.Forms
    and platform-specific code is possible, useful, and encouraged. It can happen
    at a number of levels. First, within a Xamarin.Forms Custom Renderer, which is
    a platform-specific class for rendering platform-specific features on a Xamarin.Forms
    page. Hybridization can also happen within platform-specific Android activities
    and iOS view controllers that run alongside Xamarin.Forms pages, or within platform-specific
    classes that are called as-needed to handle native functionality such as location,
    camera, graphics, or animation. This sophisticated approach can lead to a more
    complex architecture, such as Figure [2-3](#A978-1-4842-0214-2_2_Chapter.html#Fig3),
    and must be handled carefully. Note the addition of the Platform-specific UI Layer.


    ![A978-1-4842-0214-2_2_Fig3_HTML.jpg](A978-1-4842-0214-2_2_Fig3_HTML.jpg)


    Figure 2-3.


    Xamarin.Forms architecture with custom renderers Note


    [Chapter 8](#A978-1-4842-0214-2_8_Chapter.html) provides more on the use of custom
    renderers and platform-specific code in Xamarin.Forms solutions.


    When are Xamarin.Forms appropriate to use and when do we consider other Xamarin
    options? IвҖҷll address this key question a bit later in the chapter, but first
    letвҖҷs define XamarinвҖҷs platform-specific UI options.'
