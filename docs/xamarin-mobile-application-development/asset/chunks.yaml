    = relativeLayout;`    В В В В В В В В В В В В `}`    В В В В В В В В `}`    The Upper Left label is
    added with a location constraint to the parent layout; using `Constraint.Constant(0)`
    for both x and y places the label in the upper-left corner, at the origin: 0,0\.
    Next we want to add more views in relation to the existing parent and child views.    ###
    Setting View Location and Size    xamarin.forms    Each time we add a view to
    `RelativeLayout`, we ask: Do we want to set the location of the view, the size
    of the view, or both?    Specify location with this `Add` method:    В В В В `relativeLayout.Children.Add(view,
    xLocationConstraint,`    В В В В В В В В `yLocationConstraint)`    Specify both size and
    location with this one:    В В В В `relativeLayout.Children.Add(view, xLocationConstraint,`    В В В В В В В В `yLocationConstraint,
    widthConstraint, heightConstraint)`    All these x/y coordinates, widths, and
    heights ultimately become absolute values. Data typing, however, restricts us
    to the use of `Constraint` classes. This encourages calculations based on the
    values of sibling and parent views, keeping things relative.    ### Using Constraints    xamarin.forms    Size
    and location are specified by using constraints. The `Constraint` object has three
    enumerations:    *   `Constant`, for absolute x/y assignments of location and/or
    size *   `RelativeToParent`, for relative x/y calculations of location and/or
    size to the parent layout *   `RelativeToView`, for relative x/y calculations
    of location and/or size between child(sibling) views    The following sections
    discuss each in more detail.    #### Absolute Location and Size    `Constant`
    is used for absolute location or size.    Here is a location example, which places
    the `upperLeft` label at coordinates 0,0 within the layout:    В В В В `relativeLayout.Children.Add
    (upperLeft,`    В В В В В В В В В В В В В В В В В В В В В В В В В В В В В В В В `Constraint.Constant (0),`    В В В В В В В В В В В В В В В В В В В В В В В В В В В В В В В В `Constraint.Constant
    (0));`    This is a size example, creating a view at 100,100 with dimensions 50
    units wide and 200 units high:    В В В В `Label constantLabel = new Label`    В В В В `{`    В В В В В В В В `Text
    = "Constants are Absolute",`    В В В В В В В В `FontSize = 20`    В В В В `};`    В В В В `relativeLayout.Children.Add
    (constantLabel,`    В В В В В В В В `Constraint.Constant (100),`    В В В В В В В В `Constraint.Constant
    (100),`    В В В В В В В В `Constraint.Constant (50),`    В В В В В В В В `Constraint.Constant
    (200));`  Tip  The numeric screen units used in many Xamarin.Forms views are relative
    units of measure that do not represent pixels, and their results vary according
    to screen size.    This new label is shown in Figure [3-6](#A978-1-4842-0214-2_3_Chapter.html#Fig6),
    with the text wrapping at 50 units wide.    ![A978-1-4842-0214-2_3_Fig6_HTML.jpg](A978-1-4842-0214-2_3_Fig6_HTML.jpg)    Figure
    3-6.  Label with a Constant contraint  #### RelativeToParent Constraint    The
    `RelativeToParent` constraint ties a viewвҖҷs location/size to the parent `RelativeLayout`
    view. This is useful for placing and sizing views in relation to the entire page
    or section.    Instantiate another child view, such as `Label`, and add that to
    the child collection by using a `RelativeToParent` constraint. This example places
    the location of the new child view halfway down the length and width of the parent
    layout:    В В В В `Label halfwayDown = new Label`    В В В В `{`    В В В В В В В В `Text = "Halfway
    down and across",`    В В В В В В В В `FontSize = 15`    В В В В `};`    В В В В `relativeLayout.Children.Add
    (halfwayDown,`    В В В В В В В В `Constraint.RelativeToParent((parent) =>`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `return
    parent.Width / 2;`    В В В В В В В В В В В В `}),`    В В В В В В В В `Constraint.RelativeToParent((parent)
    =>`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `return parent.Height / 2;`    В В В В В В В В В В В В `})`    В В В В `);`    These
    calls to `RelativetoParent` pass the parent view, `RelativeLayout`, into the lambda
    parameter, returning an x coordinate equal to half the width of the parent layout
    and a y coordinate equal to half of the height of the layout (see Figure [3-7](#A978-1-4842-0214-2_3_Chapter.html#Fig7)).    ![A978-1-4842-0214-2_3_Fig7_HTML.jpg](A978-1-4842-0214-2_3_Fig7_HTML.jpg)    Figure
    3-7.  RelativeToParent with a Height and Width calculation  HereвҖҷs the `Constraint.RelativeToParent`
    method in the general case:    В В В В `Constraint.RelativeToParent ((parent) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `return
    calculatedValue`    В В В В В В В В `})`    Use parent properties `X`, `Y`, `Width`, and
    `Height` to calculate the returned value.    Here are examples of useful calculated
    values to return for location:    *   `parent.X + parent.Width;` locates the view
    to the right of the parent. *   `parent.X + parent.Width /2;` locates the view
    halfway across the width of the parent. *   `parent.Y + parent.Height;` locates
    the view below the parent. *   `parent.Y + parent.Height/2;` locates the view
    halfway down the height of the parent.    The following are values for size:    *   `parent.Width;`
    makes the width the same as that of the parent layout. *   `parent.Width / 2;`
    makes the width half that of the parent layout. *   `parent.Height;` makes the
    height the same as that of the parent layout. *   `parent.Height / 2;` makes the
    height half that of the parent layout.    `Create a BoxView halfway down the page
    that is half the height and half the width of the parent view by passing RelativeToParent
    calculations into the Add parameters:`    В В В В `BoxView boxView = new BoxView {`    В В В В В В В В `Color
    = Color.Accent,`    В В В В В В В В `WidthRequest = 150,`    В В В В В В В В `HeightRequest =
    150,`    В В В В В В В В `HorizontalOptions = LayoutOptions.Center,`    В В В В В В В В `VerticalOptions
    = LayoutOptions.CenterAndExpand`    В В В В `};`    В В В В `relativeLayout.Children.Add
    (boxView,`    В В В В В В В В `Constraint.Constant (0),`    В В В В В В В В `Constraint.RelativeToParent((parent)
    =>`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `return parent.Height / 2;`    В В В В В В В В В В В В `}),`    В В В В В В В В `Constraint.RelativeToParent((parent)
    =>`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `return parent.Width / 2;`    В В В В В В В В В В В В `}),`    В В В В В В В В `Constraint.RelativeToParent((parent)
    =>`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В В В `return parent.Height / 2;`    В В В В В В В В В В В В `})`    В В В В `);`    The
    result looks like Figure [3-8](#A978-1-4842-0214-2_3_Chapter.html#Fig8).    ![A978-1-4842-0214-2_3_Fig8_HTML.jpg](A978-1-4842-0214-2_3_Fig8_HTML.jpg)    Figure
    3-8.  A BoxView placed using RelativeToParent  #### RelativeToView Constraint    `RelativeToView`
    constrains a viewвҖҷs location/size to that of another view. Instantiate another
    child view, such as a `Label`, and add that to the child collection by using a
    `RelativeToView` constraint. This example places the location of the new child
    view beneath the sibling view:    В В В В `Label below = new Label`    В В В В `{`    В В В В В В В В `Text
    = "Below Upper Left",`    В В В В В В В В `FontSize = 15`    В В В В `};`    В В В В `relativeLayout.Children.Add
    (below,`    В В В В В В В В `Constraint.Constant (0),`    В В В В В В В В `Constraint.RelativeToView(upperLeft,
    (parent, sibling) =>`    В В В В В В В В В В `{`    В В В В В В В В В В В В В В В `return sibling.Y + sibling.Height;`    В В В В В В В В В В `})`    В В В В В В В В `);`    This
    call to `RelativetoView` passes the sibling view in the first parameter, `upperLeft`,
    and then passes the parent and sibling into the lambda parameter, returning a
    calculated y coordinate equal to the y value below the sibling, as shown in Figure
    [3-9](#A978-1-4842-0214-2_3_Chapter.html#Fig9) (for Android).    ![A978-1-4842-0214-2_3_Fig9_HTML.jpg](A978-1-4842-0214-2_3_Fig9_HTML.jpg)    Figure
    3-9.  Place one label below another by using `RelativetoView`  HereвҖҷs the `Constraint.RelativeToView`
    method in the general case:    В В В В `Constraint.RelativeToView(siblingView, (parent,
    sibling) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `return calculatedValue`    В В В В В В В В `})`    You
    now have three views: the new child view, the anchoring sibling view, and the
    parent view, or layout. Use parent or sibling properties `X`, `Y`, `Width`, and
    `Height` to calculate the returned value to assign to the child. Here are examples
    of useful calculated values to return for location:    *   `sibling.X + sibling.Width;`
    locates the view to the right of the sibling. *   `sibling.X + sibling.Width /2;`
    locates the view halfway across the width of the sibling. *   `sibling.Y + sibling.Height;`
    locates the view below the sibling. *   `sibling.Y + sibling.Height/2;` locates
    the view halfway across the height of the sibling.    Here are similar values
    for size:    *   `sibling.Width;` makes the width the same as the sibling. *   `sibling.Width
    / 2;` makes the width half that of the sibling. *   `sibling.Height;` makes the
    height the same as the sibling. *   `sibling.Height / 2;` makes the height half
    that of the sibling.  Tip  The `sibling` and `parent` objects contain all of the
    properties available in these views. Properties other than those mentioned here
    may come in handy for your calculations, so be certain to explore.    ### CODE
