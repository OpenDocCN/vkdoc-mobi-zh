    += (sender, e) =>`    В В В В В В В В `{`    В В В В В В В В В В В В `eventValue.Text = String.Format("Switch
    is now {0}", e.Value);`    В В В В В В В В В В В В `pageValue.Text = switcher.IsToggled.ToString();`    В В В В В В В В `};`    The
    property `e.Value` is available within this event to provide the new switch value.
    In general cases, the value is also stored in the `Switch.IsToggled` property.
    These properties are of type `Boolean`.    ### Scale, Rotation, Opacity, Visibility,
    and Focus    xamarin.forms    You can alter the appearance and behavior of Xamarin.Forms
    views by using members of the `View` superclass, `VisualElement`.    You give
    focus to a view by using the `Focus()` method, which returns `true` if successful.
    This example sets focus on an `Entry` view (which pops up the keyboard):    В В В В В В В В `var
    gotFocus = entry.Focus();`    Here are some key properties that can be set on
    a view:    *   `Scale`: Change the size of a view without affecting the views
    around it. The default value is 1.0. В В В В В В В В `switcher.Scale = 0.7;` *   `IsVisible`:
    Make a view invisible, or visible again. В В В В В В В В `label.IsVisible = false;` *   `IsEnabled`:
    Disable and reenable a view. В В В В В В В В `label.IsEnabled = false;` *   `Opacity`:
    Fade a view in and out. The default value is 1.0. В В В В В В В В `label.Opacity = 0.5;`
    *   `Rotation`: View rotation can be achieved on all axes by using the `Rotation`,
    `RotationX`, and `RotationY` properties. These rotate the view around the point
    set by `AnchorX` and `AnchorY`.    ### CODE COMPLETE: Xamarin.Forms Controls    xamarin.forms    Listing
