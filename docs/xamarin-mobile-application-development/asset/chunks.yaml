  trans: "\n### Xamarin.Forms е…ұдә«д»Јз Ғ\n\nеңЁдҪҝз”Ё Visual Studio ж—¶пјҢXamarin.Forms е…ұдә«д»Јз ҒйЎ№зӣ®еҢ…еҗ« `App.cs`пјҲеҲ—иЎЁ\
