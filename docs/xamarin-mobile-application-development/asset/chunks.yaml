    4-9.  Switch off  And Figure [4-10](#A978-1-4842-0214-2_4_Chapter.html#Fig10)
    shows what the same view looks like on.    ![A978-1-4842-0214-2_4_Fig10_HTML.jpg](A978-1-4842-0214-2_4_Fig10_HTML.jpg)    Figure
