    Creating the Custom Renderer    Now that you have created a custom element and
    used it in your UI, youвҖҷll need to create the custom renderer. YouвҖҷll need to
    determine the name of the renderer for your element, and IвҖҷll show you how to
    do that later in this chapter in the section вҖңWhich Renderer and View Do You Customize?вҖқ
    In this example, youвҖҷll use `ButtonRenderer`.    There are two main ways to customize
    a control: by property or by replacing the entire control. Customizing a controlвҖҷs
    properties involves accessing platform-specific properties unavailable via the
    Xamarin.Forms view (such as a buttonвҖҷs background color). A Xamarin.Forms control
    can also be completely replaced by a platform-specific control of the developerвҖҷs
    choice. IвҖҷll cover property customization in depth in this chapter and touch upon
    control replacement in the notes.    Here are the custom rendererвҖҷs key methods:    *   `OnElementChanged`:
    This main method fires upon changes to the element and is used for control initialization.
    Set the initial control value and its properties. *   `OnElementPropertyChanged`:
    This method fires upon changes to element properties and is useful for data binding.
    *   `SetNativeControl`: Call this method manually to replace the entire element
    with a custom platform-specific control. (such as `SetNativeControl(new YourCustomizedControl());`)    Here
    are the custom rendererвҖҷs important properties:    *   Control: A reference to
    the platform-specific element (such as `UIButton`) displayed by the renderer.
    Platform-specific properties are available here. This object can also be replaced
    with an entirely new (and customized) platform-specific control. *   Element:
    A reference to the Xamarin.Forms subclassed element (such as `CustomButton`).
    Xamarin.Forms element properties are available here.    Customize controls and
    their properties by using the `Control` property within the `OnElementChanged`
    method.    Implement data-bound customized controls by assigning `Control` properties
    from their corresponding `Element` properties in the `OnElementPropertyChanged`
    method.    Now create a custom renderer on each platform. Begin with the Android
    platform, then do iOS and Windows Phone.    ## Android Custom Renderer    android    Renderers
