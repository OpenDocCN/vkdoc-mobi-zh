    { get; set; }`    `}`    ## Using ADO.NET    cross platform    Xamarin provides
    an ADO.NET implementation of SQLite that provides all of the necessary SQL transactions
    using the familiar ADO.NET `Command` and `DataReader` objects (mapped to `SqliteCommand`
    and `SQLiteDataReader)`.    Create an ADO.NET database by using the `SqliteConnection`
    object. Take care to open and close the connection for every use, just as youвҖҷre
    used to with ADO.NET. Use ADO.NET `Command` objects for the creation and execution
    of SQL statements. Create `Command` objects by using the connectionвҖҷs `CreateCommand`
    method, and then assign SQL to the command by using its `CommandText` property.    First,
    add these references to your platform-specific project and to your database class:    В В В В `using
    System.Data;`    В В В В `using Mono.Data.Sqlite;`  Important Note  A Xamarin ADO.NET
    implementation is not supported by PCLs, as they do not offer `System.Data` or
    `Mono.Data.Sqlite`. The Xamarin project options available with ADO.NET are using
    a shared project or using a PCL, but implement the data layer almost entirely
    in platform-specific projects (for example, Android and iOS), which is a less-than-ideal
    architecture. Certain third-party libraries, such as MvvmCross, provide these
    missing libraries for use in a PCL.    Determine the database path by using techniques
    described earlier in this chapter. Here is the shared projects approach again:    В В В В `var
    dbName = "ItemsSQLite.db3";`    В В В В `#if __IOS__`    В В В В `string folder = Environment.GetFolderPath
    (Environment.SpecialFolder.Personal);`    В В В В `folder = Path.Combine (folder,
    "..", "Library");`    В В В В `var databasePath = Path.Combine(folder, dbName);`    В В В В `#else`    В В В В `#if
    __ANDROID__`    В В В В `string folder = Environment.GetFolderPath (Environment.SpecialFolder.Personal);`    В В В В `var
    databasePath = Path.Combine(folder, dbName);`    В В В В `#else // Windows Phone`    В В В В `var
    databasePath = Path.Combine(Windows.Storage.ApplicationData.Current.LocalFolder.Path,
    dbName);`    В В В В `#endif`    В В В В `#endif`    Next, create the database.    ###
    Creating a Database    Create a new database by using the `CreateFile` method.
    You may need to check whether the file exists first (using `File.Exists`) because
    this statement will overwrite an existing database.    В В В В `Mono.Data.Sqlite.SqliteConnection.CreateFile
    (databasePath);`    Once the database is created, youвҖҷll need to establish a connection
    to it. Instantiate a `SqliteConnection` object and call the `Open` method:    В В В В `var
    connection = new SqliteConnection ("Data Source=" + databasePath);`    В В В В `connection.Open();`    Conduct
    your SQL operations and then close the connection:    В В В В `connection.Close();`    As
    mentioned earlier, a connection should never be reused across threads.    Now
    you can use SQL to create tables, insert and delete their rows, and query the
    data.    ### Creating a Table    Create a new table by using ADO.NET with SQLite;
    use the `CREATE TABLE` statement in SQL with a command object and call its `ExecuteNonQuery`
    method.    Create a `Command` object by using the connectionвҖҷs `CreateCommand`
    method, and then assign the `CREATE TABLE` SQL to the command by using its `CommandText`
    property. Create an `Items` table containing Name and Description fields. Use
    the commandвҖҷs `ExecuteNonQuery` to execute the SQL, because you donвҖҷt want a data
    result.    В В В В `using (var command = connection.CreateCommand ()) {`    В В В В В В В В `command.CommandText
    = "CREATE TABLE [Items] ([ID] INTEGER" +`    В В В В В В В В В В В В `" PRIMARY KEY AUTOINCREMENT,
    [Name] ntext, [Description] ntext)";`    В В В В В В В В `var rowcount = command.ExecuteNonQuery
    ();`    В В В В `}`    The ID field is created to `AUTOINCREMENT` so SQLite can create
    and maintain this value.    Populate your table with data by creating an array
    of SQL `INSERT` statements. Loop through them with a `foreach`, creating a `Command`
    object for each one:    В В В В `var sqlStatements = new [] {`    В В В В В В В В `"INSERT
    INTO [Items] ([Name], [Description]) VALUES (''First'', ''The first row'')",`    В В В В В В В В `"INSERT
    INTO [Items] ([Name], [Description]) VALUES (''Second'', ''the second row'')",`    В В В В В В В В `"INSERT
    INTO [Items] ([Name], [Description]) VALUES (''Third'', ''the third row'')"`    В В В В `};`    В В В В `foreach
    (var sqlStatement in sqlStatements) {`    В В В В В В В В `using (var command = connection.CreateCommand
    ()) {`    В В В В В В В В В В В В `command.CommandText = sqlStatement;`    В В В В В В В В В В В В `var
    rowcount = command.ExecuteNonQuery ();`    В В В В В В В В `}`    В В В В `}`    Now that
    there is data in the table, you can query it by using `SELECT` statements.    ###
    Executing SQL Statements    Execute SQL statements by assigning them to the commandвҖҷs
    `CommandText` property and calling one of three methods: `ExecuteNonQuery` for
    nondata results, `ExecuteReader` for queries, and `ExecuteScalar` to return a
    single numeric value.    Create a command object and populate it with a SQL query.
    This `SELECT` statement queries the Items table for `ID`, `Name`, and `Description`:    В В В В `using
    (var command = connection.CreateCommand ()) {`    В В В В В В В В `command.CommandText
    = "SELECT [ID], [Name], [Description] from [Items]";`    В В В В В В В В `var results
    = command.ExecuteReader();`    В В В В В В В В `while (results.Read ())`    В В В В В В В В В В В В `rows
    += String.Format ("\t ID={0}\t Name={1}\t Desc={2}\n",`    В В В В В В В В В В В В В В В В `results
    ["ID"].ToString (),`    В В В В В В В В В В В В В В В В `results ["Name"].ToString (),`    В В В В В В В В В В В В В В В В `results
    ["Description"].ToString ());`    В В В В `}`    The `command.ExecuteReader()` call
    returns a `SqliteDataReader` populated with data in the `results` variable. `rows`
    is a string containing the results for display.    The `using` statement keeps
    the scope of the `Command` object brief and on an as-needed basis. This approach
    encourages good data access layer design and cuts down on memory-hogging data
    classes.    Here are the three ways to execute ADO.NET commands containing SQL.
    Which you use will depend on the nature of your SQL and what you want to return:    *   `ExecuteNonQuery`:
    Writes operations to the table, such as `CREATE`, `INSERT`, or `DELETE`, and returns
    a count of the number of rows affected:    В В В В В В В В В В `using (var command = connection.CreateCommand
    ()) {`    В В В В В В В В В В В В В В `command.CommandText = "CREATE TABLE [Items] ([ID] INTEGER"
    +`    В В В В В В В В В В В В В В В В В В `" PRIMARY KEY AUTOINCREMENT, [Name] ntext, [Description]
    ntext)";`    В В В В В В В В В В В В В В `var rowcount = command.ExecuteNonQuery ();`    В В В В В В В В В В `}`    *   `ExecuteReader`:
    Executes read-only SQL statements, such as `SELECT`, and returns a `SqliteDataReader`
    object populated with data:    В В В В В В В В В В `command.CommandText = "SELECT [ID],
    [Name], [Description] from [Items]";`    В В В В В В В В В В `var dataReader = command.ExecuteReader
    ();`    Other useful properties of the `SqliteDataReader` include `RowsAffected`,
    a count of affected rows, and `HasRows`, a Boolean specifying whether any results
    were returned.    *   `ExecuteScalar`: Reads a single value of type `object` from
    a SQL statement, such as a row count or a single field value:    В В В В В В В В В В `command.CommandText
    = "SELECT COUNT(*) FROM [Items]";`    В В В В В В В В В В `count = "There are " + command.ExecuteScalar().ToString()
    + " rows.";`    The following section contains all the ADO.NET examples deployed
