    TimePicker    android    The `TimePicker` is a spinner for selecting hour, minute,
    and AM/PM.  Note  Modal dialog boxes are not a built-in function of pickers such
    as the `TimePicker` and must be coded manually, in this case using the `TimePickerDialog`
    class. Use the modal technique described for `DatePickerDialog` in the previous
    section. See the full code in `TimePickerActivity.cs` in the `ControlExamplesAndroid`
    solution.    Add a `TimePicker` called `timePicker` to your layout:    В В В В В В В В `<TimePicker`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В `android:id="@+id/timePicker"
    />`    Create a `TimePicker` class in your activity. Match the widget ID name
    between the layout and activity:    В В В В В В В В В В В `TimePicker timePicker = FindViewById<TimePicker>
    (Resource.Id.timePicker);`    Default time values can be set in the properties
    `CurrentHour` and `CurrentMinute`:    В В В В В В В В `timePicker.CurrentHour = (Java.Lang.Integer)
    17;`    В В В В В В В В `timePicker.CurrentMinute = (Java.Lang.Integer) 30;`    The `TimePicker`
    looks like Figure [4-19](#A978-1-4842-0214-2_4_Chapter.html#Fig19).    ![A978-1-4842-0214-2_4_Fig19_HTML.jpg](A978-1-4842-0214-2_4_Fig19_HTML.jpg)    Figure
    4-19.  TimePicker has columns of spinners  All rows are scrollable. Changes to
    the control fire the `TimeChanged` event, which can be handled inline like this:    В В В В В В В В `timePicker.TimeChanged
    += delegate(object sender, TimePicker.TimeChangedEventArgs e)`    В В В В В В В В `{`    В В В В В В В В `Toast.MakeText
    (this, "Hour: " + e.HourOfDay + " Minute: " + e.Minute, ToastLength.Short).Show();`    В В В В В В В В `};`    `e.HourOfDay`
    and `e.Minute` contain the selected time values. Figure [4-20](#A978-1-4842-0214-2_4_Chapter.html#Fig20)
    shows the toast.    ![A978-1-4842-0214-2_4_Fig20_HTML.jpg](A978-1-4842-0214-2_4_Fig20_HTML.jpg)    Figure
    4-20.  Cheers! ItвҖҷs that time  ### SeekBar    android    A `SeekBar` is a sliding
    input lever for continuous values.    Add a `SeekBar` to your layout:    В В В В В В В В `<SeekBar`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В `android:id="@+id/seekBar"/>`    Create
    a `SeekBar` class in your activity:    В В В В В В В В `SeekBar seekBar = FindViewById<SeekBar>
    (Resource.Id.seekBar);`    The `SeekBar` looks like Figure [4-21](#A978-1-4842-0214-2_4_Chapter.html#Fig21).    ![A978-1-4842-0214-2_4_Fig21_HTML.jpg](A978-1-4842-0214-2_4_Fig21_HTML.jpg)    Figure
    4-21.  SeekBar is a slider. Tip  The minimum value of the `SeekBar` is zero.    When
    the `SeekBar` value is changed, the `ProgressChanged` event is fired, which can
    be handled inline like this:    В В В В В В В В `seekBar.ProgressChanged += (object sender,
    SeekBar.ProgressChangedEventArgs e) => {`    В В В В В В В В В В В В `if (e.FromUser)`    В В В В В В В В В В В В `{`    В В В В В В В В В В В В В В `Toast.MakeText
    (this, "Value: " + e.Progress, ToastLength.Short).Show ();`    В В В В В В В В В В В В В `}`    В В В В В В В В `};`    The
    selection value is found in the `e.Progress` property. The `e.FromUser` property
    is `true` if the change was initiated by the user (not programmatically). Figure
    [4-22](#A978-1-4842-0214-2_4_Chapter.html#Fig22) shows the toast.    ![A978-1-4842-0214-2_4_Fig22_HTML.jpg](A978-1-4842-0214-2_4_Fig22_HTML.jpg)    Figure
    4-22.  The toast memorializes the value Tip  The `SeekBar` can also be tracked
    with listeners by implementing the `SeekBar.IOnSeekBarChangeListener` interface.
    See [`http://developer.xamarin.com/recipes/android/controls/seekbar/`](http://developer.xamarin.com/recipes/android/controls/seekbar/)
    for details.  Tip  The default `SeekBar` range can be changed using `SeekBar.Max`.
    The default value is 100.    ### CheckBox    android    `CheckBox` is a standard
    Boolean check-box control, often deployed in groups.    Add `CheckBoxes` to your
    layout:    В В В В В В В В `<CheckBox`    В В В В В В В В В В В В `android:text="Option1"`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В `android:id="@+id/checkBox1"
    />`    В В В В В В В В `<CheckBox`    В В В В В В В В В В В В `android:text="Option2"`    В В В В В В В В В В В В `android:layout_width="match_parent"`    В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В `android:id="@+id/checkBox2"
    />`    These have the IDs `checkBox1` and `checkBox2`. The `Text` property contains
    the displayed text string.    Create `CheckBox` classes in your activity (usually
    in `OnCreate`()):    В В В В В В В В `CheckBox checkBox1 = FindViewById<CheckBox> (Resource.Id.checkBox1);`    В В В В В В В В `CheckBox
    checkBox2 = FindViewById<CheckBox> (Resource.Id.checkBox2);`    Check boxes look
    like Figure [4-23](#A978-1-4842-0214-2_4_Chapter.html#Fig23).    ![A978-1-4842-0214-2_4_Fig23_HTML.jpg](A978-1-4842-0214-2_4_Fig23_HTML.jpg)    Figure
    4-23.  Two separate, unconnected check boxes  The `Boolean` selection value is
    stored in the `CheckBox.Checked` property of each `CheckBox`.    A `Click` event
    fires when a check box is tapped, which can be handled inline like this in the
    `OnCreate()` method:    В В В В В В В В `checkBox1.Click += (o, e) => {`    В В В В В В В В В В В В `if
    (checkBox1.Checked)`    В В В В В В В В В В В В В В В В `Toast.MakeText (this, "Checked", ToastLength.Short).Show
    ();`    В В В В В В В В В В В В `else`    В В В В В В В В В В В В В В В В `Toast.MakeText (this, "Not checked",
    ToastLength.Short).Show ();`    В В В В В В В В `};`    This handler displays a toast
    reflecting the value of `checkBox1`. See the rest of the code in Listing [4-4](#A978-1-4842-0214-2_4_Chapter.html#FPar21).  Tip  For
    `CheckBoxes` to behave as a group (so only one can be selected at a time, for
    example) they must be coded by hand, by using each `CheckBox`вҖҷs `Click` event
    and setting the value of each manually. For these situations, you should probably
    be considering `RadioButtons`, covered shortly.    ### Switch    android    A
    `Switch` is a Boolean on/off widget, often used to turn features on or off.    Add
    a `Switch` to your layout:    В В В В В В В В `<Switch`    В В В В В В В В В В В В В В В В `android:layout_width="wrap_content"`    В В В В В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В В В В В `android:id="@+id/switch1"`    В В В В В В В В В В В В В В В В `android:layout_gravity="center_horizontal"
    />`    Instantiate a `Switch` class in your activity:    В В В В В В В В `Switch switch1
    = FindViewById<Switch> (Resource.Id.switch1);`    A `Switch` looks like Figure
    [4-24](#A978-1-4842-0214-2_4_Chapter.html#Fig24).    ![A978-1-4842-0214-2_4_Fig24_HTML.jpg](A978-1-4842-0214-2_4_Fig24_HTML.jpg)    Figure
    4-24.  Switch is on, waiting for a tap  The Boolean value is stored in the `Switch.IsChecked`
    property. Tapping the control fires the `CheckedChange` event, which can be handled
    like this:    В В В В В В В В `switch1.CheckedChange += delegate(object sender, CompoundButton.CheckedChangeEventArgs
    e)`    В В В В В В В В `{`    В В В В В В В В В В В В `var toast = Toast.MakeText (this, "Selection:"
    + (e.IsChecked ?В В "On" : "Off"), ToastLength.Short);`    В В В В В В В В В В В В `toast.Show
    ();`    В В В В В В В В `};`    This pops up a toast with the switch value (Figure [4-25](#A978-1-4842-0214-2_4_Chapter.html#Fig25)).    ![A978-1-4842-0214-2_4_Fig25_HTML.jpg](A978-1-4842-0214-2_4_Fig25_HTML.jpg)    Figure
    4-25.  Toast displaying Switch state  #### Customizing with a Title, Switch Text,
    and State    A text title that appears before the switch, usually a feature or
    question, can be added in the `text` property. Default text on the switch itself
    can be changed by using the `textOn` and `textOff` properties (for example, to
    indicate Yes/No instead of On/Off). The default switch on/off state can be changed
    with the `checked` property:    В В В В В В В В `<Switch android:text="Feature activated?"`    В В В В В В В В В В В В В В В В `android:id="@+id/switch1"`    В В В В В В В В В В В В В В В В `android:layout_width="wrap_content"`    В В В В В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В В В В В `android:checked="true"`    В В В В В В В В В В В В В В В В `android:textOn="YES"`    В В В В В В В В В В В В В В В В `android:textOff="NO"
    />`    This results in a customized switch (Figure [4-26](#A978-1-4842-0214-2_4_Chapter.html#Fig26)).    ![A978-1-4842-0214-2_4_Fig26_HTML.jpg](A978-1-4842-0214-2_4_Fig26_HTML.jpg)    Figure
    4-26.  The text property shows a label, and On/Off is now Yes/No  ### RadioButton    android    A
    `RadioButton` is a selectable button widget that can be grouped with other `RadioButtons`
    by using a `RadioGroup`. This grouping makes selection mutually exclusive, so
    only one button can be selected at a time.    Create a `RadioGroup` containing
    `RadioButtons` in your layout:    В В В В В В В В `<RadioGroup`    В В В В В В В В В В `android:layout_width="fill_parent"`    В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В `android:orientation="vertical">`    В В В В В В В В В В `<RadioButton
    android:id="@+id/radio1"`    В В В В В В В В В В В В В В `android:layout_width="wrap_content"`    В В В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В В В `android:text="First"
    />`    В В В В В В В В В В `<RadioButton android:id="@+id/radio2"`    В В В В В В В В В В В В В В `android:layout_width="wrap_content"`    В В В В В В В В В В В В В В `android:layout_height="wrap_content"`    В В В В В В В В В В В В В В `android:text="Second"
    />`    В В В В В В В В `</RadioGroup>`    Here we have two `RadioButtons` with the IDs
    `radio1` and `radio2`. Their text properties are set to First and Second, respectively,
    and that is the text that will appear next to the buttons.    Create `RadioButtons`
    at the top of your activity outside `OnCreate`:    В В В В В В В В В В `RadioButton radio1;`    В В В В В В В В В В `RadioButton
    radio2;`    Inside `OnCreate`, find the buttons:    В В В В В В В В `radio1 = FindViewById<RadioButton>(Resource.Id.radio1);`    В В В В В В В В `radio2
    = FindViewById<RadioButton>(Resource.Id.radio2);`    Figure [4-27](#A978-1-4842-0214-2_4_Chapter.html#Fig27)
    shows the result.    ![A978-1-4842-0214-2_4_Fig27_HTML.jpg](A978-1-4842-0214-2_4_Fig27_HTML.jpg)    Figure
    4-27.  RadioGroup of two RadioButtons  Tapping a `RadioButton` fires a `Click`
    event that can be handled like this:    В В В В В В В В `radio1.Click += RadioButtonClick;`    В В В В В В В В `radio2.Click
    += RadioButtonClick;`    Place the handler method outside the `OnCreate` method:    В В В В В В В В `private
    void RadioButtonClick (object sender, EventArgs e)`    В В В В В В В В `{`    В В В В В В В В В В В В `RadioButton
    rb = (RadioButton)sender;`    В В В В В В В В В В В В `Toast.MakeText (this, rb.Text, ToastLength.Short).Show
    ();`    В В В В В В В В `}`    This will toast the `text` property of the `RadioButton`
    when tapped (Figure [4-28](#A978-1-4842-0214-2_4_Chapter.html#Fig28)).    ![A978-1-4842-0214-2_4_Fig28_HTML.jpg](A978-1-4842-0214-2_4_Fig28_HTML.jpg)    Figure
