    6-30.  Context menus using PopupMenu Note  The `DismissEvent` event fires when
    the menu closes.    ### Managing State Using Bundles    android    Android uses
    a dictionary called a bundle, attached to an intent in the `Extras` property,
    to save object values and pass them between pages. Activities may not directly
    reference properties within one another. Bundles are passed between activities
    in two ways: either populated as individual fields by using `PutExtra` and `GetExtra`
    methods on the intent to pack and unpack the bundle, or as an entire bundle that
    is created stand-alone and then copied onto the intentвҖҷs bundle by using `putExtras`.
    `PutExtra` is handy when passing a field or two, and bundle creation is useful
    when many fields must be managed. Objects from custom classes can be passed but
    must be serialized into strings.    #### Passing Strings    Pass strings to the
    new activity by using the `PutExtra` method on the second activity. In the first
    activity, declare the intent and pass in the string of data, as shown in Listing
    [6-49](#A978-1-4842-0214-2_6_Chapter.html#FPar80).  Listing 6-49\. Pass String
    by Using PutExtra in PassStringActivity.cs  В В В В `var intent = new Intent (this,
    typeof(DetailActivity));`    В В В В `intent.PutExtra ("MyData", "A string of data");`    In
    the destination activity, retrieve the string by using `GetStringExtra`:    В В В В `String
    text = Intent.GetStringExtra ("MyData") ?? "No Data";`  Tip  More than 20 `PutExtra`
    overloads and a similar number of `GetExtra` methods exist to handle different
    data types.    #### Passing Objects    Objects can be passed in the same manner
    as strings but must be serialized before passing with `PutExtra`. This can be
    done most easily with JavaScript Object Notation (JSON) and XML serialization.
    `System.Runtime.Serialization` and `IParcelable` are other options that are not
    covered here.    JSON is the easiest and more versatile approach, particularly
    using the Json.NET component in the Xamarin Component Store (or NuGet). This allows
    objects such as `object` of type `ObjectClass` to be serialized into JSON with
    the `SerializeObject` method. See Listing [6-50](#A978-1-4842-0214-2_6_Chapter.html#FPar82).  Listing
    6-50\. Pass Object Using PutExtra in PassObjectActivity.cs  `String json = Newtonsoft.Json.JsonConvert.SerializeObject
    (data);`    `var intent = new Intent(this, typeof(PassToActivity));`    `intent.PutExtra("MyData",
    json);`    `StartActivity(intent);`    And the objects can be deserialized with
    `DeserializeObject` in the activity called `PassToActivity`:    `String json =
    Intent.GetStringExtra("MyData") ?? "No Data";`    `DataModel data =`    В В В В В В В В `Newtonsoft.Json.JsonConvert.DeserializeObject<DataModel>(json);`    XML
    serialization is another simple way to pass an object using the standard .NET
    `System.Xml.Serialization` library. WeвҖҷre not going to cover that here because
    itвҖҷs a well-documented .NET technique. After serializing your object into a string
    via XML serialization, pass the string by using `putExtra/ GetStringExtra` in
    the same manner as a JSON string.    `System.Runtime.Serialization` and `IParcelable`
    are not covered here because the `[Serializable]` attribute is not supported in
    Portable Class Libraries (PCLs), making it unsuitable for many Xamarin architectures.
    `Java.IO.ISerializable` is a Xamarin-recommended alternative, and examples can
    be found on the Xamarin forums.    If youвҖҷre not using a PCL, `System.Runtime.Serializable`
    can be implemented by using standard .NET practice, but `IParcelable` implementations
    run many times faster. `Serializable` uses reflection, which is slow and can produce
    many temporary objects, leading to more garbage collection. Use `IParcelable`
    (if you must) when handling a large number of objects (hundreds or more) or when
    youвҖҷre concerned about performance. The `IParcelable` implementation is also beyond
    the scope of this book but is a useful option when performance is key and other
    options arenвҖҷt working.    #### Creating a Bundle    When you have many fields
    to pass to another activity and need a way to manage them, creating a bundle can
    be useful. The `PutExtra` method used previously adds fields to a bundle that
    already exists on the intent. A bundle can be created explicitly, however, and
    overwritten onto the intentвҖҷs bundle. It is useful to prepare them first and then
    write to the intent in one step.    Create the intent and the bundle, populate
    the bundle, and then copy it onto the intent by using `putExtras` before starting
    the new activity (Listing [6-51](#A978-1-4842-0214-2_6_Chapter.html#FPar83)).  Listing
    6-51\. Build and Assign a Bundle in PassBundleActivity.cs  `Bundle thisBundle
    = new Bundle();`    `thisBundle.PutString("MyData", "A string of data.");`    `thisBundle.PutString("MyData2",
    "Another string of data.");`    `var intent = new Intent(this, typeof(PassToBundleActivity));`    `intent.PutExtras(thisBundle);`    `StartActivity(intent);`    Retrieving
    the bundle is exactly the same as retrieving data from `PutExtra` methods, using
    the `GetExtra` methods. This happens in the destination activity, as in Listing
    [6-52](#A978-1-4842-0214-2_6_Chapter.html#FPar84).  Listing 6-52\. Get Fields
    from a Bundle in PassToBundleActivity.cs  В В В В `String text = Intent.GetStringExtra
    ("MyData") ?? "No Data";`    В В В В `String text2 = Intent.GetStringExtra ("MyData2")
    ?? "No Data";`  Tip  Leverage the activity events `OnSaveInstanceState` and `OnRestoreInstanceState`
    to populate and read from the bundle when an activity is stopped and started.    ####
    Using Static Global Classes and StartActivityForResult    There are also a couple
    of other ways to pass data between activities:    *   Static global classes can
    be used to share object instances instead of passing values, and were discussed
    in the вҖңUsing a Static Global ClassвҖқ in the Xamarin.Forms section earlier. *   `StartActivityForResult`
    can be used to call an activity when return values are needed; then `SetResult`
    is used in the called activity, and `OnActivityResult` is overridden in the calling
    activity to handle the returned values.    ### Drill-down List    android    A
    drill-down list is a list of tappable items selected to navigate to a new page.
    The following recipes cover the two most common types of lists: by page and by
    item. Lists by page contain rows of menu pages that can be selected to navigate
    to different activities. Both of these recipes use `ListView` to bind to a data
    model to provide a dynamic list of tappable items. Lists by item can be viewed
    and selected to display more information about that item: the traditional master-detail
    pattern. In the interest of space, IвҖҷll provide details on implementing the first
    recipe and then general direction on the second one.    Drill-down lists often
    also have a toolbar at the top of the screen for back navigation, displaying the
    current screen title and action menus.    #### Using ListView by Page    A drill-down
    list in Android can be created using a `ListView` that binds to a data model containing
    the activity page types that you want to list and navigate to. This example covers
    navigation to a new activity.    Create a `ListItem` class that contains a `PageType`
    property, as shown in Listing [6-53](#A978-1-4842-0214-2_6_Chapter.html#FPar86).
    `PageType` will contain the activity type to navigate to.  Listing 6-53\. List
    Data Model in ListItem.cs  В В В В `public class ListItem`    В В В В `{`    В В В В В В В В `public
