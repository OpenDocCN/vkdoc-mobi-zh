    This completes the code in `GridExample2.cs`.    ![A978-1-4842-0214-2_3_Fig15_HTML.jpg](A978-1-4842-0214-2_3_Fig15_HTML.jpg)    Figure
    3-15.  Filling available vertical space by using GridUnitType.Star in the Height  Expand
    horizontally by setting the width of `ColumnDefinition. Width` assigned using
    `GridUnitType.Star` works in a manner similar to the `Height` assignment, expanding
    the column to the right, pressing the grid to the right edge of the screen:    В В В В `new
    ColumnDefinition { Width = new GridLength(1, GridUnitType.Star) }`    ### `Expanding
    Views Proportionally`    You can control the proportions of cell sizes to one
    another in `GridUnitType.Star` cells by using the first parameter in `GridLength`.
    This technique is particularly useful with small views.    In this first example,
    the first parameters in all rows add up to 3 (1 + 2), breaking the row into three
    equal parts. This results in the first row expanding to one-third of the space
    and the second row expanding to two-thirds of the space:    В В В В `new RowDefinition
    { Height = new GridLength(``1``, GridUnitType.Star) },`    В В В В `new RowDefinition
    { Height = new GridLength(``2``, GridUnitType.Star) },`    In this next example,
    the first parameters in all rows add up to 4 (1 + 3), breaking the row into four
    equal parts. This results in the first row expanding to one-quarter of the space
    and the second row expanding to three-quarters of the space:    В В В В `new RowDefinition
    { Height = new GridLength(``1``, GridUnitType.Star) },`    В В В В `new RowDefinition
    { Height = new GridLength(``3``, GridUnitType.Star) },`    The first parameter
    represents a share of the total space among the `Star` rows or columns. If all
    of these parameters are specified as `1`, the space will be evenly divided.  Tip  Large
    grids can run off the visible screen. Consider using `GridLengthType.Star` to
    expand only to the available screen width paired with a vertical `ScrollView`.
    Scrolling grids vertically is commonplace, but scrolling horizontally is rare
    in mobile apps without a visible indicator of offscreen content (page dots, arrows,
    and so forth).    ### Creating Multicell Views    xamarin.forms    Single views
    can be sized to span multiple cells in the grid by using the `Add` method:    В В В В `grid.Children.Add(
    view, indexLeftColumn, indexRightColumn,`    В В В В В В В В `indexTopRow, indexBottomRow)`    Still
    using a zero-based index, span columns with a view by specifying the leftmost
    and rightmost column indexes. Span rows by using the top and bottom row indexes.    ####
    Spanning Columns    Expand a view from left to right across multiple columns by
    using the second and third parameters of the `Add` method, `indexLeftColumn` and
    `indexRightColumn`, to specify the columns to span.    To follow along with the
    online examples, save your current example, `GridExample2.cs`, and then create
    a new class called `GridExample3.cs`. Copy the constructor from `GridExample2.cs`
    into `GridExample3.cs` and continue with `GridExample3.cs`. Remember to update
    `App.cs` with the new `MainPage` reference to `GridExample3`.    LetвҖҷs expand
    our (1,1) view into the column to the right and the (2,2) cell down into the row
    below it. Add a `Star`-typed `GridLength` to the second column so it will expand
    horizontally:    В В В `ColumnDefinitions =`    В В В В `{`    В В В В В В В В `new ColumnDefinition
    { Width = GridLength.Auto },`    В В В В В В В В `new ColumnDefinition { Width = new GridLength(1,
    GridUnitType.Star) },`    В В В В В В В В `new ColumnDefinition { Width = GridLength.Auto
    }`    В В В В `}`    Change both views to use the multicell `Add` method. Start with
    the view at (1,1):    В В В В `grid.Children.Add(new Label {`    В В В В В В В В В В В В `Text
    = "Me? 1, 1",`    В В В В В В В В В В В В `FontSize = 30,`    В В В В В В В В В В В В `FontAttributes
    = FontAttributes.Bold,`    В В В В В В В В В В В В `TextColor = Color.Black,`    В В В В В В В В В В В В `BackgroundColor
    = Color.Lime`    В В В В В В В В `}``, 1, 3,``1, 2);`    From left to right, this view
    spans the left side of column 1 to the left side of column 3 - a distance of two
    columns. (Yes, itвҖҷs a little strange that there is no visible column 3, but the
    notation requires an endpoint, and that happens to be the beginning of the column
    or row we are expanding to.) See the result in Figure [3-16](#A978-1-4842-0214-2_3_Chapter.html#Fig16).    ![A978-1-4842-0214-2_3_Fig16_HTML.jpg](A978-1-4842-0214-2_3_Fig16_HTML.jpg)    Figure
    3-16.  The cell at 1,1 spans columns, and 2,2 spans rows  From top to bottom,
    this view spans from the top of row 1 to the top of row 2 (a distance of only
    one row).    #### Spanning Rows    Expand a view from a cell down through multiple
    rows by specifying rows to span in the `Add` methodвҖҷs last two parameters: `indexTopRow`
    and `indexBottomRow`.    Now change the view at (2,2):    В В В В В `grid.Children.Add(new
    Label {`    В В В В В В В В В В В В `Text = "2, 2 here",`    В В В В В В В В В В В В `FontSize = 25,`    В В В В В В В В В В В В `FontAttributes
    = FontAttributes.Bold,`    В В В В В В В В В В В В `TextColor = Color.White,`    В В В В В В В В В В В В `BackgroundColor
    = Color.Red`    В В В В В В В В `}``, 2, 3,``2, 4``);`    From left to right, this view
    spans the left side of column 2 to the left side of column 3\. From top to bottom,
