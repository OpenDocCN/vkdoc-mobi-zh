  \n最后，你需要两个方法来在每个新帧中移动玩家挡板和球。首先，在`moveBall()`方法中，你会注意到后台执行了一些基本的轨迹数学运算，仅仅是为了将球从其随机起点移动到屏幕外。这些数学运算没有考虑任何碰撞检测或角度偏转；这些内容将在下一章中介绍。\n\
