  \    gl.glPopMatrix();\n    gl.glLoadIdentity();\n}\n```\n\n在先前的代码示例中，变量`playerAction`决定了玩家是否想要向左或向右移动挡板。在现实世界中，玩家通过触摸设备屏幕的左侧或右侧来移动挡板。为了检测屏幕触摸并设置适当的变量，请在`PBGame`文件中添加以下加粗的代码：\n\
