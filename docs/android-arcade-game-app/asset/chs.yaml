  \n## 总结\n\n\n在本章中，你创建了一面随机颜色的砖墙、一个可移动的玩家挡板和一个球。这些代码为游戏增加了大量内容，使《越狱》游戏接近完成。你还学习了如何使用精灵表（`spritesheet`），并创建了一个优秀的辅助类（`helper\
  \ class`），用于构建指定行数的砖墙。\n\n使用辅助类来完成游戏中一些更繁琐的设置工作是一项宝贵的技能，你会发现自己在开发中越来越频繁地使用它。试着在游戏中寻找可以使用辅助类来处理角色或对象设置的地方。\n\
  \n在下一章中，你将创建碰撞检测逻辑，从而完成游戏可玩的物理部分。\n\n第 6 章\n\n碰撞检测\n\n在上一章中，你将所有游戏元素添加到了游戏世界中：砖块、玩家挡板和球。然而，运行代码后，你发现虽然可以移动玩家挡板，但对游戏玩法没有影响。球从一个随机位置开始，最终从屏幕底部掉落。原因是你的游戏中明显缺少碰撞检测。\n\
  \n在本章中，你将向游戏添加碰撞检测。\n\n碰撞检测的目的\n\n碰撞检测的严格定义是：检测屏幕上的元素何时发生碰撞。然而，它的重要性远不止于此。一个良好的碰撞检测系统会测试并评估游戏世界中的元素何时相互接触，并为你提供对这些碰撞做出反应的方法。\n\
  \n《越狱》的碰撞检测系统将是基础的，但它会向你展示碰撞检测的工作原理，并允许你在此基础上根据需要进行扩展。\n\n请记住，`OpenGL` 没有任何内置的碰撞检测或顶点测试功能；它并非为此而设计。作为游戏开发者，你有责任为游戏提供这种机制。\n\
  \n《越狱》中的碰撞检测\n\n在开始为《越狱》编写碰撞检测系统之前，我们需要讨论它需要做什么。在开始编码之前，最好对系统的运作方式有一个清晰的概念。\n\n\
  以下是《越狱》碰撞检测系统需要测试的项目列表：\n\n- ![bullet.jpg](img/bullet.jpg) 球是否击中了挡板？\n- ![bullet.jpg](img/bullet.jpg)\
  \ 球是否击中了砖块？\n- ![bullet.jpg](img/bullet.jpg) 球是否击中了屏幕的右“墙”或边缘？\n- ![bullet.jpg](img/bullet.jpg)\
  \ 球是否击中了屏幕的左“墙”或边缘？\n- ![bullet.jpg](img/bullet.jpg) 球是否离开了游戏的上边界？\n- ![bullet.jpg](img/bullet.jpg)\
  \ 球是否离开了游戏的下边界？\n\n除了这些测试，碰撞检测系统还必须执行以下操作：\n\n- ![bullet.jpg](img/bullet.jpg) “销毁”被球击中的任何砖块。\n\
  - ![bullet.jpg](img/bullet.jpg) 计算偏转角（angle of deflection），如果球击中挡板或游戏屏幕的左右边缘，则移动球。\n\
  \n虽然这看起来很多，但对于你的游戏来说，这是一个相当基础的碰撞检测系统。有些碰撞检测系统非常复杂。\n\n创建碰撞检测系统\n\n你不需要为碰撞检测系统创建一个新类；相反，它将位于`PBGameRenderer`的一个方法中。重要的是，碰撞检测系统必须在游戏渲染器的每一帧上运行。因此，该方法将在`onDrawFrame()`中被调用。\n\
  \n在你的`PBGameRenderer`中创建一个新方法，命名为`detectCollisions()`。让我们逐步查看`detectCollisions()`中的代码。然后我会提供`PBGameRenderer`的完整代码，以便你了解其上下文。\n\
  \n该方法首先测试球是否在屏幕底部边缘之外。如果是，则表示游戏结束场景。要确定球是否在屏幕边缘之外，只需测试其 `y` 轴位置是否小于 0。\n\n```\n\
  if(ball.posY < = 0){\n  //GameOver\n}\n```\n\n**注意**：当你在《越狱》中测试屏幕上任何元素的 `x` 或 `y`\
  \ 坐标位置时，给定的坐标表示纹理映射到的顶点（vertex）的左上角位置。这一点很重要，因为在测试某些碰撞时，你可能需要考虑顶点的宽度或高度。\n\n接下来，你测试每个砖块，看球是否与其接触。\n\
  \n```\nfor (int x = 0; x < wall.rows.length; x++)\n{\n  for(int y = 0; y < wall.rows[x].bricks.length;\
  \ y++)\n  {\n    if(!wall.rows[x].bricks[y].isDestroyed)\n    {\n      if (((ball.posY\
  \ > wall.rows[x].bricks[y]. posY - .25f)\n        && (ball.posY < wall.rows[x].bricks[y].posY)\n\
  \        && (ball.posX + .25f > wall.rows[x].bricks[y].posX)\n        && (ball.posX\
  \ < wall.rows[x].bricks[y]. posX + 1.50f)))\n      {\n        wall.rows[x].bricks[y].isDestroyed\
  \ = true;\n        PBGameVars.ballTargetY = PBGameVars. ballTargetY * -1f;\n   \
  \     if(PBGameVars.ballTargetX == −2f){\n          PBGameVars.ballTargetX = 5f;\n\
  \        }else{\n          PBGameVars.ballTargetX = −2f;\n        }\n      }\n \
  \   }\n  }\n}\n```\n\n注意测试球是否碰到砖块的 `if` 语句。首先，它测试球的 `y` 轴位置（左上角）是否大于砖块的 `y` 轴位置减去\
  \ 0.25。这是因为砖块的 `y` 轴位置是其左上角；但我们要判断球是否击中了砖块的底部，所以从砖块的 `y` 轴位置减去其高度，得到底部的 `y` 轴位置。\n\
  \n如果球击中砖块，砖块的 `isDestroyed` 标志将被设置为 `true`。正如你从 `drawBricks()` 方法中看到的，任何 `isDestroyed`\
  \ 标志为 `true` 的砖块都不会被绘制。因此，在游戏循环的下一次迭代中，被击中的砖块将不会被绘制，并从游戏屏幕中消失。\n\n砖块被销毁后，球会弹开。因此，你现在需要计算球的偏转角。幸运的是，所有砖块都呈\
  \ 90 度角，而球的攻击角（angle of attack）总是（大约）45 度。这为你提供了一个非常清晰且一致的偏转角。事实上，要正确偏转球，你只需将 `y`\
  \ 轴值设置为其自身的相反符号。\n\n**提示**：攻击角是球从物体上弹开并继续在游戏屏幕上前进的角度。在现实物理中，球以一个逆于其接近角度的角度，从呈 90\
  \ 度角的平坦物体上弹开。因此，以一个 30 度角接近平坦、90 度物体的球，会以 60 度角弹开。为了避免进行完整的物理课教学，《越狱》中的球始终以 45 度角移动，并且所有表面都将呈\
  \ 90 度角。这样，每次球被偏转时，都会以 45 度角进行。\n\n最后，你需要为球设置目标。这在上章中没有讨论，但你在让球移动时稍微取巧了。通过使用`ballTargetX`变量，你为球提供了一个“瞄准”的\
  \ `x` 轴值。这让你可以轻松地保持其航向。如果球向右移动，目标在 `x` 轴的正侧；如果球向左移动，目标在 `x` 轴的负侧。\n\n当球发生碰撞时，它会弹开；因此，目标需要翻转，使球向相反方向移动。\n\
  \n碰撞检测方法的最后一部分测试球是否击中了玩家挡板。你会注意到，针对砖块进行的测试以及偏转处理，同样适用于挡板。\n\n\n\n```  \nif((ball.posY\
  \ - .25f < = .5f)  \n&& (ball.posX + .25f > PBGameVars.playerBankPosX )  \n&& (ball.posX\
  \ < PBGameVars.playerBankPosX + 1.50f)){  \n   PBGameVars.ballTargetY = PBGameVars.ballTargetY\
  \ * -1f;  \n   if(PBGameVars.ballTargetX == −2f){  \n      PBGameVars.ballTargetX\
  \ = 5f;  \n   }else{  \n      PBGameVars.ballTargetX = −2f;  \n   }  \n}  \nif(ball.posX\
  \ < 0 || ball.posX + .25f > 3.75f)  \n{  \n   PBGameVars.ballTargetX = PBGameVars.ballTargetX\
  \ * -1f;  \n}  \n```  \n\n让我们在上下文中看一下完整的方法。  \n\n**提示** 如果你想调整碰撞检测系统，可以将球的 y 轴位置检测改为使用\
  \ y 坐标减去 0.125。这样会得到一个更接近球顶部的检测点。在前面的代码中，我使用了球的角来同时摧毁更多砖块，从而更快清空屏幕。  \n\n## 完整的\
