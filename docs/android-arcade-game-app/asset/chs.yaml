- "# 第 3 章：创建菜单\n\n在本章中，您将为《越狱》游戏创建一个由两部分组成的菜单屏幕。菜单屏幕（如图 3-1 所示）由两个不同的“屏幕”组成，总共包含五个不同的图像。\n\
  \n![9781430245452_Fig03-01.jpg](img/9781430245452_Fig03-01.jpg)\n\n图 3-1. 《越狱》菜单屏幕\n\
  \n在下一节中，您将了解为本章提供的代码需要做哪些准备。\n\n## 准备工作\n\n在开始应用本章的代码之前，您需要做两件事来准备。首先，创建一个名为 `prisonbreak`\
  \ 的新 Android 项目。该项目将保存本书中使用的所有代码和图像。\n\n其次，为您的《越狱》游戏收集或创建一些图像。在本章中，您总共需要五个图像：一个启动画面、两个不同的开始按钮状态和两个不同的退出按钮状态。我使用的图像如图\
  \ 3-2 至图 3-6 所示。\n\n![9781430245452_Fig03-02.jpg](img/9781430245452_Fig03-02.jpg)\n\
  \n图 3-2. prisonbreaksplash.png\n\n![9781430245452_Fig03-03.jpg](img/9781430245452_Fig03-03.jpg)\n\
  \n图 3-3. startbtn.png\n\n\n\n![9781430245452_Fig03-04.jpg](img/9781430245452_Fig03-04.jpg)\n\
  \n图 3-4. `startbtndown.png`\n\n![9781430245452_Fig03-05.jpg](img/9781430245452_Fig03-05.jpg)\n\
  \n图 3-5. `exitbtn.png`\n\n![9781430245452_Fig03-06.jpg](img/9781430245452_Fig03-06.jpg)\n\
  \n图 3-6. `exitbtndown.png`\n\n如果你从未在 Android 中处理过图形或图像，我有几个宝贵的建议。首先，图像处理有两种方式：通过\
  \ Android SDK 原生方式（本章介绍），或使用 OpenGL ES（后续章节介绍）。这两种方法在图像的存储和处理方式上略有不同。\n\n另一个重要提示是：图像名称必须全部小写，这是处理\
  \ Android 图像时的通用规则。如果在图像名称中使用大写字母或驼峰式命名，Android 将无法识别这些图像。\n\n**注意** 凡事都有例外，这条规则也不例外。只有当图像存储在给定的\
  \ Android 项目结构内（即 `res` 文件夹）时，才必须使用小写名称。如果将图像存储在 Android 项目结构外部的压缩文件中，并通过自定义文件读取器进行读取，则可以随意使用大小写命名。不过，这个问题超出了本书的讨论范围。\n\
  \n本章中的五张图像应保存在 `res/drawable-hdpi` 文件夹中，因为它们将通过标准的 Android SDK 方法读取。\n\n在下一节中，你将创建显示主菜单所需的文件。\n\
  \n## 创建启动画面和主菜单\n\n《越狱》的主菜单由一个淡出至菜单画面的启动画面组成。菜单画面包含“开始”和“退出”按钮。\n\n对于《越狱》，启动画面和主菜单背景将使用同一张图像（参见图\
  \ 3-2）。这样会产生按钮淡入背景的效果。这是一种比静态画面更棒的视觉效果。\n\n### `PrisonbreakActivity`\n\n你需要处理的第一个文件是\
  \ `PrisonbreakActivity`。这是创建项目时生成的主活动。清单 3-1 展示了 `PrisonbreakActivity.java` 的代码。\n\
  \n`清单 3-1. PrisonbreakActivity.java`\n\n```\npackage com.jfdimarzio;\n\nimport android.app.Activity;\n\
  import android.content.Context;\nimport android.content.Intent;\nimport android.os.Bundle;\n\
  import android.os.Handler;\nimport android.view.WindowManager;\n\npublic class PrisonbreakActivity\
  \ extends Activity {\n    /** 当活动首次创建时调用 */\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        PBGameVars.display = ((WindowManager) getSystemService(Context.WINDOW_SERVICE)).getDefaultDisplay();\n\
  \        super.onCreate(savedInstanceState);\n        /*显示启动画面图像*/\n        setContentView(R.layout.splashscreen);\n\
  \        /*在延迟线程中启动启动画面和主菜单*/\n        PBGameVars.context = this;\n        new Handler().postDelayed(new\
  \ Thread() {\n            @Override\n            public void run() {\n         \
  \       Intent mainMenu = new Intent(PrisonbreakActivity.this, PBMainMenu.class);\n\
  \                PrisonbreakActivity.this.startActivity(mainMenu);\n           \
  \     PrisonbreakActivity.this.finish();\n                overridePendingTransition(R.layout.fadein,\
  \ R.layout.fadeout);\n            }\n        }, PBGameVars.GAME_THREAD_DELAY);\n\
  \    }\n}\n```\n\n查看 `PrisonbreakActivity` 的代码，你会发现它引用了其他几个文件。第一个是位于 `PBGameVars.java`\
  \ 类中的多个共享变量。在你的项目中创建一个同名的新类，并添加以下公共变量。（请注意，随着本书内容的深入，你还需要多次向这个类中添加内容。）\n\n```\n\
  public static Display display;\npublic static Context context;\npublic static final\
  \ int GAME_THREAD_DELAY = 3000;\npublic static final int MENU_BUTTON_ALPHA = 0;\n\
  public static final boolean HAPTIC_BUTTON_FEEDBACK = true;\n```\n\n接下来，`PrisonbreakActivity`\
  \ 引用了一个位于 `res/layouts/splashscreen` 的布局文件。清单 3-2 展示了 `splashscreen.xml` 的内容。\n\n\
  `清单 3-2. splashscreen.xml`\n\n\n```xml\n\n<?xml version = \"1.0\" encoding = \"\
  utf-8\"?>\n\n<FrameLayout\n    xmlns:android = \"http://schemas.android.com/apk/res/android\"\
  \n    android:layout_width = \"match_parent\"\n    android:layout_height = \"match_parent\"\
  >\n\n    <ImageView\n        android:id = \"@+id/splashScreenImage\"\n        android:src\
  \ = \"@drawable/prisonbreaksplash\"\n        android:layout_width = \"match_parent\"\
  \n        android:layout_height = \"match_parent\">\n    </ImageView>\n\n    <TextView\n\
  \        android:text = \"game by: j.f.dimarzio graphics by: ben eagel\"\n     \
  \   android:id = \"@+id/creditsText\"\n        android:layout_gravity = \"center_horizontal|bottom\"\
  \n        android:layout_height = \"wrap_content\"\n        android:layout_width\
  \ = \"wrap_content\">\n    </TextView>\n\n</FrameLayout>\n```\n\n下一个由`PrisonbreakActivity`调用的文件是`PBMainMenu.java`。我们暂时跳过这个文件，稍后再回来处理。首先，让我们看看`PrisonbreakActivity.java`中使用的另外两个布局。\n\
  \n查看主活动中调用的`overridePendingTransition()`。这个调用接收两个过渡布局。第一个布局定义了启动画面的淡入效果，第二个定义了淡出到菜单屏幕的效果。清单\
  \ 3-3 和清单 3-4 分别包含了`fadein.xml`和`fadeout.xml`的代码。虽然它们乍看起来相同，但存在一些关键差异。\n\n根本区别在于：淡入时使用了加速插值器，而淡出时使用了减速插值器。\n\
  \n**清单 3-3. fadein.xml**\n\n```xml\n<?xml version = \"1.0\" encoding = \"utf-8\"\
  ?>\n<alpha xmlns:android = \"http://schemas.android.com/apk/res/android\"\n    android:interpolator\
  \ = \"@android:anim/accelerate_interpolator\"\n    android:fromAlpha = \"0.0\"\n\
  \    android:toAlpha = \"1.0\"\n    android:duration = \"1000\" />\n```\n\n**清单\
  \ 3-4. fadeout.xml**\n\n```xml\n<?xml version = \"1.0\" encoding = \"utf-8\"?>\n\
  <alpha xmlns:android = \"http://schemas.android.com/apk/res/android\"\n    android:interpolator\
  \ = \"@android:anim/decelerate_interpolator\"\n    android:fromAlpha = \"1.0\"\n\
  \    android:toAlpha = \"0.0\"\n    android:duration = \"1000\" />\n```\n\n`PrisonbreakActivity`显示启动画面图像，然后将该图像淡入到`PBMainMenu.java`调用中。让我们看看`PBMainMenu.java`中的内容。\n\
  \n## PBMainMenu\n\n`PBMainMenu`控制主游戏循环的启动和退出；因此，它需要显示两个按钮：开始按钮和退出按钮。清单 3-5 展示了`PBMainMenu.java`的当前代码（你将在下一章中向此代码添加内容）。\n\
  \n请注意，`PBMainMenu`是一个新的活动，必须在项目的`AndroidManifest`中将其定义为活动。\n\n**清单 3-5. PBMainMenu.java**\n\
  \n```java\npublic static Display display;\npublic static Context context;\npublic\
  \ static final int GAME_THREAD_DELAY = 3000;\n\npackage com.jfdimarzio;\n\nimport\
  \ android.app.Activity;\nimport android.content.Intent;\nimport android.os.Bundle;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.ImageButton;\n\
  \npublic class PBMainMenu extends Activity {\n    /** Called when the activity is\
  \ first created. */\n    final PBGameVars engine = new PBGameVars();\n\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n        PBGameVars.context = getApplicationContext();\n\
  \n        /** Set menu button options */\n        ImageButton start = (ImageButton)findViewById(R.id.btnStart);\n\
  \        ImageButton exit = (ImageButton)findViewById(R.id.btnExit);\n        start.getBackground().setAlpha(PBGameVars.MENU_BUTTON_ALPHA);\n\
  \        start.setHapticFeedbackEnabled(PBGameVars.HAPTIC_BUTTON_FEEDBACK);\n  \
  \      exit.getBackground().setAlpha(PBGameVars.MENU_BUTTON_ALPHA);\n        exit.setHapticFeedbackEnabled(PBGameVars.HAPTIC_BUTTON_FEEDBACK);\n\
  \        exit.setOnClickListener(new OnClickListener(){\n            @Override\n\
  \            public void onClick(View v) {\n                int pid = android.os.Process.myPid();\n\
  \                android.os.Process.killProcess(pid);\n            }\n        });\n\
  \    }\n}\n```\n\n与`PrisonbreakActivity`类似，`PBMainMenu`也使用了三个不同的布局文件。第一个是`main.xml`。这个布局定义了玩家看到的主菜单屏幕，其中包含开始按钮和退出按钮。清单\
  \ 3-6 展示了`main.xml`布局。\n\n**清单 3-6. main.xml**\n\n```\n\n\n```xml\n<?xml version\
  \ = \"1.0\" encoding = \"utf-8\"?>\n\n<RelativeLayout xmlns:android = \"http://schemas.android.com/apk/res/android\"\
  \n    android:orientation = \"vertical\"\n    android:layout_width = \"match_parent\"\
  \n    android:layout_height = \"match_parent\"\n    >\n    <ImageView android:id\
  \ = \"@ + id/mainMenuImage\"\n        android:src = \"@drawable/prisonbreaksplash\"\
  \n        android:layout_width = \"match_parent\"\n        android:layout_height\
  \ = \"match_parent\">\n    </ImageView>\n    <RelativeLayout\n        android:id\
  \ = \"@ + id/buttons\"\n        android:layout_width = \"match_parent\"\n      \
  \  android:layout_height = \"wrap_content\"\n        android:orientation = \"horizontal\"\
  \n        android:layout_alignParentBottom = \"true\"\n        android:layout_marginBottom\
  \ = \"20dp\">\n        <ImageButton\n            android:id = \"@ + id/btnStart\"\
  \n            android:clickable = \"true\"\n            android:layout_alignParentLeft\
  \ = \"true\"\n            android:layout_width = \"wrap_content\"\n            android:src\
  \ = \"@drawable/startselector\"\n            android:layout_height = \"wrap_content\"\
  \ >\n        </ImageButton>\n        <ImageButton\n            android:id = \"@\
  \ + id/btnExit\"\n            android:layout_width = \"wrap_content\"\n        \
  \    android:src = \"@drawable/exitselector\"\n            android:layout_height\
  \ = \"wrap_content\"\n            android:layout_alignParentRight = \"true\"\n \
  \           android:clickable = \"true\" >\n        </ImageButton>\n    </RelativeLayout>\n\
  </RelativeLayout>\n```\n\n`PBMainMenu` 还调用了两个名为选择器的布局文件。这些文件定义了当玩家选择“开始”按钮或“退出”按钮时的行为。对于《越狱》游戏，你希望将可见的“开始”和“退出”按钮替换为看起来像是玩家用手指按下的按钮。选择器布局负责处理这些图像的切换。`清单\
  \ 3-7` 显示了退出选择器的内容，`清单 3-8` 显示了开始选择器的内容。\n\n`清单 3-7. exitselector.xml`\n\n```xml\n\
  <?xml version = \"1.0\" encoding = \"utf-8\"?>\n<selector\n    xmlns:android = \"\
  http://schemas.android.com/apk/res/android\">\n    <item android:state_pressed =\
