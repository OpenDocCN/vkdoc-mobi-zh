    ```


    请注意，`onCreate()` 方法将 `Activity` 的内容视图设置为 `PBGameView` 的新实例。`PBGameView` 是一个扩展了
    `GLSurfaceView` 的新类。本章下一节将在你创建 `PBGameView` 时介绍 `GLSurfaceView`。


    ## 创建 SurfaceView 和 Renderer


    在本节中，你将创建游戏的 `SurfaceView` 和 `Renderer`。`PBGameView` 是一个简单的 Android 类，扩展了 OpenGL
    的 `GLSurfaceView`。


    如果你从未使用过 OpenGL ES 进行开发，可以将 `GLSurfaceView` 视为 OpenGL 绘制游戏的画布。`GLSurfaceView`
    是 Android 显示在屏幕上的内容。但它无法单独工作。`GLSurfaceView` 需要一个对应的 `GLSurfaceView Renderer`
    来将游戏渲染到该表面上。

    '
- fmt: "```markdown\nStarting with the `GLSurfaceView`, create a new class named `PBGameView`,\
    \ and extend `GLSurfaceView`, as shown in Listing 4-3.\n\n`Listing 4-3. PBGameView.java`\n\
    \n```\npackage com.jfdimarzio;\n\nimport android.content.Context;\nimport android.opengl.GLSurfaceView;\n\
    \npublic class PBGameView extends GLSurfaceView {\n\n    private PBGameRenderer\
    \ renderer;\n\n    public PBGameView(Context context) {\n        super(context);\n\
    \        renderer = new PBGameRenderer();\n        this.setRenderer(renderer);\n\
    \    }\n}\n```\n\nThis is a rather small class. You can see that the purpose of\
    \ the only constructor in the class is to create an instance of a renderer (`PBGameRenderer`).\
    \ There is nothing fancy here, so let’s move on to creating the renderer.\n\n\
    **Note** Before creating the `PBGameRenderer`, add the following to your `PBGameVars`:\
    \ `public static final int GAME_THREAD_FPS_SLEEP = (1000/60);`\n\nCreate a new\
    \ class called `PBGameRenderer` in your Prison Break project. This class needs\
    \ to extend `GLSurfaceView.Renderer`, as shown in Listing 4-4.\n\n`Listing 4-4.\
    \ PBGameRenderer.java`\n\n```\npackage com.jfdimarzio;\n\nimport javax.microedition.khronos.egl.EGLConfig;\n\
    import javax.microedition.khronos.opengles.GL10;\nimport android.opengl.GLSurfaceView.Renderer;\n\
    \npublic class PBGameRenderer implements Renderer{\n\n    private long loopStart\
    \ = 0;\n    private long loopEnd = 0;\n    private long loopRunTime = 0 ;\n\n\
    \    @Override\n    public void onDrawFrame(GL10 gl) {\n        // TODO Auto-generated\
    \ method stub\n        loopStart = System.currentTimeMillis();\n        // TODO\
