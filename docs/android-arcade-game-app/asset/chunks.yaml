    \        PBGameVars.ballTargetY = PBGameVars. ballTargetY * -1f;\n        if(PBGameVars.ballTargetX\
    \ == −2f){\n          PBGameVars.ballTargetX = 5f;\n        }else{\n         \
    \ PBGameVars.ballTargetX = −2f;\n        }\n      }\n    }\n  }\n}\n```\n\n注意测试球是否碰到砖块的\
    \ `if` 语句。首先，它测试球的 `y` 轴位置（左上角）是否大于砖块的 `y` 轴位置减去 0.25。这是因为砖块的 `y` 轴位置是其左上角；但我们要判断球是否击中了砖块的底部，所以从砖块的\
    \ `y` 轴位置减去其高度，得到底部的 `y` 轴位置。\n\n如果球击中砖块，砖块的 `isDestroyed` 标志将被设置为 `true`。正如你从\
    \ `drawBricks()` 方法中看到的，任何 `isDestroyed` 标志为 `true` 的砖块都不会被绘制。因此，在游戏循环的下一次迭代中，被击中的砖块将不会被绘制，并从游戏屏幕中消失。\n\
    \n砖块被销毁后，球会弹开。因此，你现在需要计算球的偏转角。幸运的是，所有砖块都呈 90 度角，而球的攻击角（angle of attack）总是（大约）45\
    \ 度。这为你提供了一个非常清晰且一致的偏转角。事实上，要正确偏转球，你只需将 `y` 轴值设置为其自身的相反符号。\n\n**提示**：攻击角是球从物体上弹开并继续在游戏屏幕上前进的角度。在现实物理中，球以一个逆于其接近角度的角度，从呈\
    \ 90 度角的平坦物体上弹开。因此，以一个 30 度角接近平坦、90 度物体的球，会以 60 度角弹开。为了避免进行完整的物理课教学，《越狱》中的球始终以\
