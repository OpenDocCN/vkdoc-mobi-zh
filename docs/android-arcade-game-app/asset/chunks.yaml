    \ 混淆。绘制一帧并不构成表面变化。表面变化更像是屏幕方向改变或类似的破坏性事件。`onSurfaceChanged()` 方法也会在渲染器首次被调用时（完成设置后）执行。\n\
    \n在 `onSurfaceChanged()` 中，你需要设置游戏视口，并调用 OpenGL 的渲染管线来绘制对象。游戏视口是游戏世界中被绘制到屏幕上的区域。可以把视口想象成相机的取景器。当你将相机对准某个方向时，你只能看到整个世界的一小部分。同样地，使用\
