    Summary


    In this chapter, you added nine code files and five images to your first game
    project. These files, when put together, created a compelling and professional
    menu screen. You now have a working splash screen and a basic menu system with
    two options.


    In the next chapter, you add code to the Start button to kick off the main game
    loop. You will also add the game’s background image to the screen.


    Chapter    4


    Drawing the Background


    In the last chapter, you created and finalized the main menu to Prison Break.
    You should have compiled and run your code on either the Android emulator or an
    Android-based phone in debug mode, and seen a functioning main menu screen. The
    Exit button of the main menu is wired to kill the game process. As of right now,
    however, the Start button is not wired to any code.


    In this chapter, you will write the code for the Start button and create the background
    for Prison Break. To draw the game’s background to the screen, you will use calls
    to OpenGL ES. In the previous chapters, you used Android SDK methods to display
    graphics like the menu screen and the buttons. Moving forward, you will work in
    the realm of OpenGL ES.


    Let’s start by writing the code that is activated by the Start button on the main
    menu.


