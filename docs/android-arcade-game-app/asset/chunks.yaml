    # About the Author


    **J. F. DiMarzio** is a game developer and web professional. He has more than
    twenty years of experience in technology and design. Having authored eleven books,
    he is a leading resource in Android and Android game development.


    Currently, Mr. DiMarzio is a developer for the Walt Disney Company. He resides
    in Central Florida with his wife, Suzannah, and three children. Suzannah''s blog
    is at `zannaland.com`.


    # About the Technical Reviewer


    **Tony Hillerson** is a mobile developer and cofounder at Tack Mobile. He graduated
    from Ambassador University with a bachelor''s degree in Management Information
    Systems. On any given day, he may be working with `Objective-C`, `Java`, `Ruby`,
    `CoffeeScript`, `JavaScript`, `HTML`, or shell scripts. Tony has spoken at RailsConf,
    AnDevCon, and 360|Flex. He is the creator of the popular O''Reilly Android screencasts.


    In his free time, Tony enjoys playing the bass and Warr Guitar, and making electronic
    music. Tony lives outside Denver, Colorado, with his wife, Lori, and sons, Titus
    and Lincoln.


    # About the Game Graphics Designer


    **Ben Eagle** has been working with computer graphics and web development for
    14 years, which he learned while serving in the Marine Corps. While working with
    various companies, Ben has designed hundreds of sites, company signs, logos, commercials,
    and marketing graphics. Currently he works as a senior programmer, living in Davenport
    Florida. At the age of 34 he continues to pursue his career and teaches graphics
    to students on the side. He has acquired two associate''s degrees in digital media
    and web development. Ben also has his MCP and `C++`/`Java` certification. In his
    leisure he continues his passion in computer arts and programming and performs
    in a band.


    # Acknowledgments


    The author would like to acknowledge his agent, Neil Salkind, as well as Steve,
    Katie, Tom, Tony, Kim, and the gang at Apress.


    # Chapter 1: Introduction to Android Gaming


    Welcome to *Android Arcade Game App*. In this book, you will learn how to create
    an Android arcade-style game "from project to publish." While I will walk you
    through solutions to some gaming development problems, this book is not necessarily
    for beginner developers.


    You chose this book because you are passionate about Android as a platform and
    you want to develop arcade-style, Android-based games. By the time you have finished
    reading this book, you will have the knowledge you need to create a fun and compelling
    game on Android''s latest flavor: Ice Cream Sandwich. The advantage of this is
    that the games you build in this book will run on both Android-based phones and
    Android tablets.


    It is hugely satisfying to sit down and play a game that you wrote. This is especially
    true of arcade games, which lend themselves perfectly to the casual mobile gamer
    experience.


    ## What You Should Know


    Before reading this book, you should have a good working knowledge of Android
    development. This means that you are well-versed in Java and the Android SDK,
    and you have tried your hand at building projects and applications in Android.


    You should also be familiar with the Eclipse IDE (integrated development environment).
    While Android games can be developed in many different IDEs, all of the examples
    in this book use Eclipse Indigo. If you do not have a current version of Eclipse,
    download it from `http://eclipse.org`.


    **Note** While it is possible to debug your code using the emulator, get an Android
    device if you are serious about game development. I have found that the emulator
    does not always render as accurately or run as fast as a mobile device running
    a comparable SDK level. And when you are writing a game, accuracy is key.


    Finally, you should have at least beginner-level knowledge of game development
    to get the most out of this book. You may never have written a game on your own,
    but you should know what it takes to develop one. What this means, in practice,
    is that you should have a basic knowledge of `OpenGL ES` and how it is used in
    Android gaming.


    In creating the Prison Break game in this book, you will use `glOrthof()`, `GLSurfaceView`,
    textures, vertices, and other `OpenGL ES` concepts. If none of these sound familiar
    to you, I suggest you start with a more entry-level book, such as *Practical Android
    4 Game Development* by J. F. DiMarzio (Apress, 2011).


    ## What You Will Learn


    In this book, you will learn how to use your knowledge of Android development
    and `OpenGL ES` to create an entertaining, interesting game. You will build a
    game that follows the conventions of the arcade style. The game, Prison Break,
    includes many of the elements of more complicated games—thus making it a good
    learning tool.


    By the end of this book, you will have learned key programming skills for developing
    arcade-style Android games. The following is a list (in no particular order) of
    some of the skills that you will pick up as you progress through this book:


    ![bullet.jpg](images/bullet.jpg)   Displaying and manipulating graphics with OpenGL


    ![bullet.jpg](images/bullet.jpg)   Working with resources such as bitmaps


    ![bullet.jpg](images/bullet.jpg)   Spawning and killing Android threads


    ![bullet.jpg](images/bullet.jpg)   Creating a splash screen, a menu system, and
    a game engine


    ## A Brief History of Gaming


    While mobile games have been around for hundreds of years in one form or another
    (everything from card games to dice), the genesis of modern, popular, mobile video
    gaming can be traced back to the Nintendo Game Boy. The Game Boy may not have
    been the first and it may not have been the best, but it did make every kid, teenager,
    and some adults want to walk around playing *Tetris* and *Super Mario*; feats
    that until then could only be accomplished on large consoles that still had the
    stigma of being "a child''s toy."


    **Note** It is generally accepted that the first mobile gaming device was actually
    the Microvision, which was released in 1979. Nintendo''s Game Boy, however, brought
    mobile gaming to the masses, and popularized it as a viable gaming platform.


    The Nintendo Game Boy featured a small, gray-scale screen and interchangeable
    games. Until this time, the majority of portable "video games" were single-function
    devices that played either one or a small set of preinstalled games. But people
    could finally take their video games, albeit scaled-downed versions, anywhere
    they wanted to. This put mobile games in the hands of the masses, but what about
    the developers?'
