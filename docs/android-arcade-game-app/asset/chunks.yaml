    # 关于作者


    **J. F. DiMarzio** 是一名游戏开发者和网络专家。他在技术和设计领域拥有超过二十年的经验。他已撰写十一本书，是 Android 及 Android
    游戏开发领域的领军人物。


    目前，DiMarzio 先生是华特迪士尼公司的开发者。他与妻子 Suzannah 以及三个孩子居住在佛罗里达州中部。Suzannah 的博客位于`zannaland.com`。


    # 关于技术审阅者


    **Tony Hillerson** 是一名移动开发者，也是 Tack Mobile 的联合创始人。他毕业于大使大学，获得管理信息系统学士学位。在日常工作中，他可能会用到`Objective-C`、`Java`、`Ruby`、`CoffeeScript`、`JavaScript`、`HTML`或
    Shell 脚本。Tony 曾在 RailsConf、AnDevCon 和 360|Flex 大会上发表演讲。他是广受欢迎的 O''Reilly Android
    视频教程的创作者。


    在业余时间，Tony 喜欢弹奏贝斯和 Warr Guitar，并制作电子音乐。Tony 与妻子 Lori 以及儿子 Titus 和 Lincoln 居住在科罗拉多州丹佛市郊外。


    # 关于游戏美术设计师


    **Ben Eagle** 从事计算机图形学和网页开发已有 14 年，这些技能是在海军陆战队服役期间学到的。在与多家公司合作的过程中，Ben 设计了数百个网站、公司标志、标识、广告和营销图形。目前他是一名高级程序员，居住在佛罗里达州达文波特。34
    岁的他仍在追求自己的职业生涯，并兼职教授学生图形学知识。他拥有数字媒体和网页开发两个副学士学位。Ben 还获得了 MCP 认证以及`C++`/`Java`认证。闲暇时，他继续沉浸在计算机艺术和编程的热情中，并在一支乐队中演出。


    # 致谢


    作者要感谢他的经纪人 Neil Salkind，以及 Apress 出版社的 Steve、Katie、Tom、Tony、Kim 和所有团队成员。


    # 第 1 章：Android 游戏开发入门


    欢迎阅读《Android 街机游戏开发》。在本书中，你将学习如何“从项目到发布”创建一款 Android 街机风格的游戏。虽然我会带你了解一些游戏开发问题的解决方案，但本书并不适合初级开发者。


    你选择这本书，是因为你对 Android 平台充满热情，并且希望开发街机风格的 Android 游戏。读完本书后，你将掌握在 Android 最新版本 Ice
    Cream Sandwich 上创建一款有趣且引人入胜的游戏所需的知识。这样做的好处是，你在本书中构建的游戏将同时在 Android 手机和 Android
    平板电脑上运行。


    坐下来玩自己写的游戏，那种满足感是无与伦比的。这对于街机游戏尤其如此，因为它们完美契合了休闲移动游戏玩家的体验需求。


    ## 你需要了解的知识


    在阅读本书之前，你应当具备良好的 Android 开发实践知识。这意味着你精通 Java 和 Android SDK，并且已经尝试过在 Android 上构建项目和应用程序。


    你还应熟悉 Eclipse IDE（集成开发环境）。虽然 Android 游戏可以在许多不同的 IDE 中开发，但本书中的所有示例都使用 Eclipse Indigo。如果你没有当前版本的
    Eclipse，请从`http://eclipse.org`下载。


    **注意** 虽然可以使用模拟器调试代码，但如果你认真对待游戏开发，还是建议获取一台 Android 设备。我发现模拟器在渲染精度和运行速度上并不总是能与运行同等
    SDK 版本的移动设备相比。而当你编写游戏时，精度至关重要。


    最后，为了从本书中获得最大收益，你至少应具备初级的游戏开发知识。你可能从未独立编写过游戏，但应当了解开发一款游戏需要什么。在实践中，这意味着你应具备`OpenGL
    ES`的基础知识，并了解它如何在 Android 游戏开发中使用。


    在本书创建《越狱》游戏的过程中，你将使用`glOrthof()`、`GLSurfaceView`、纹理、顶点以及其他`OpenGL ES`概念。如果这些术语对你来说都很陌生，我建议你先从一本更入门的书籍开始，例如
    J. F. DiMarzio 所著的《实用 Android 4 游戏开发》（Apress 出版社，2011 年）。


    ## 你将学到什么


    在本书中，你将学习如何运用 Android 开发和`OpenGL ES`的知识来创建一款有趣且吸引人的游戏。你将构建一款遵循街机风格惯例的游戏。这款名为《越狱》的游戏包含了更复杂游戏中的许多元素——因此它是一个很好的学习工具。


    到本书结束时，你将掌握开发街机风格 Android 游戏的关键编程技能。以下是你在学习本书过程中将获得的部分技能（排名不分先后）：


    ![bullet.jpg](img/bullet.jpg)   使用 OpenGL 显示和操作图形


    ![bullet.jpg](img/bullet.jpg)   处理位图等资源


    ![bullet.jpg](img/bullet.jpg)   生成和终止 Android 线程


    ![bullet.jpg](img/bullet.jpg)   创建闪屏、菜单系统和游戏引擎


    ## 游戏发展简史


    尽管移动游戏以这种或那种形式（从纸牌游戏到骰子游戏）存在了数百年，但现代流行的移动视频游戏的起源可以追溯到任天堂 Game Boy。Game Boy 可能不是第一个，也可能不是最好的，但它确实让每个孩子、青少年，甚至是一些成年人都想随身玩着*俄罗斯方块*和*超级马里奥*；在此之前，这些游戏成就只能在那些仍带有“儿童玩具”标签的大型游戏机上实现。


    **注意** 普遍认为，第一款移动游戏设备实际上是 1979 年发布的 Microvision。然而，是任天堂的 Game Boy 将移动游戏带给了大众，并将其推广为一个可行的游戏平台。


    任天堂 Game Boy 配备了一个小型灰度屏幕和可互换的游戏卡带。在此之前，大多数便携式“视频游戏”都是单一功能的设备，只能玩一个或一小部分预装游戏。但人们终于可以随时随地玩他们的视频游戏了，尽管是缩水版。这使移动游戏进入了大众手中，但开发者们呢？

    '
- fmt: 'While there was an established base of casual or independent computer game
    developers at the time, the `Game Boy` was not a practical platform for them because
    it was still considered a gaming console. Games were developed using proprietary
    `C` libraries and required the use of expensive, licensed, development hardware.
    This put development out of reach of the casual game developers, relegating them
    to PCs if they wanted to express themselves.


    Around the same time the `Game Boy` was hitting its stride, two more revolutions
    began to take form; revolutions that would lead us to Android as a gaming platform.
    Cell phones and the Internet began to become widely used and accepted by the late
    1980s, just as portable gaming took off.


    Early mobile phones were expensive to make and expensive to use. They were toys
    for the rich and famous, and tools for the successful who wanted to show off.
    The screens on these devices consisted of a single line of LCD text; just enough
    to display the phone number being dialed. The idea of a business tycoon or Hollywood
    producer sitting down to play *Tetris* on a single-line display at anywhere from
    $15 to $25 per minute was simply not practical. It would take a few more years
    before mobile-phone displays and per-minute rates would allow for gaming.


    It wasn’t long after cell phones and the Internet became popular that the two
    collided. At first, the marriage of the two produced crude, scaled-down versions
    of web-like content that could easily run on the cell phone’s slow processors
    and limited—mostly textual—displays. Slowly, mobile Java-based content and applications
    began to pop up on cell phones everywhere. Although this added the overhead of
    a Java virtual machine, it was definitely a good start. The first Java-based games
    followed shortly thereafter.


    Nokia finally attempted to fully merge cell phones with mobile gaming devices
    with its `N*Gage` phone in 2003. The `N*Gage`, while generally viewed as a commercial
    failure, opened the door to cell phone gaming as a true multiplatform activity.
    Developers soon realized that games built specifically to run on mobile phones
    could actually compete with those built for gaming-specific handheld systems like
    the `Game Boy`, `PSP`, and `DS`.


    Mobile gaming finally found consumer acceptance with the `iPhone`. There is no
    denying that the `iPhone` did not just open the door for mobile phone–based games,
    it blew the door away. This does not mean that the `iPhone` is without fault.
    Developing `iPhone` games requires two things that not every casual developer
    may possess: a Mac and a very good understanding of `Objective-C`.


    This is where Android picks up the story.


    ## The Introduction of Android


    I began developing on the Android beta platform in early 2008. At the time, no
    phones were announced for the new operating system and we—as developers—genuinely
    felt as though we were in at the start of something exciting. Android captured
    all of the energy and excitement of the early days of open-source development.
    Developing for the platform was very reminiscent of sitting around an empty student
    lounge at 2:00 am with a Jolt Cola, waiting for VAX time to run our latest code.
    It was an exciting platform. I am glad I was there to see it materialize and take
    off.


    As Android began to grow, and as Google released more updates to solidify the
    final architecture, one thing became apparent: Android, based on Java and including
    many well-known Java packages, would be an easy transition for the casual game
    developer. Most of the knowledge that an existing Java developer already had could
    be recycled on this new platform. The very large base of Java game developers
    could use that knowledge to move fairly smoothly onto Android.


    So how does one begin developing games on Android? What tools are required? The
    next section of this chapter aims to answer these questions.


    ## Android Game Programming


    Developing games on Android has its pros and cons. You should be aware of these
    before you begin. First, Android games are developed in Java, but it is not full
    Java. Many of the packages that you may have used for `OpenGL` and other graphic
    blandishments are included in the Android SDK. Many does not mean *all*, however,
    and some packages that are very helpful to game developers, especially 3D game
    developers, are not included. So not every package that you may have relied on
    to build your previous games will be available to you in Android.


    With each release of new Android SDKs, more and more packages become available.
    You will need to be aware of just which packages you have to work with. We will
    cover these as we progress through the chapters.


    Another pro (and a corresponding con) have to do with Android’s familiarity versus
    its lack of power. What Android gains in familiarity and ease of programming,
    it may lack in speed and power. Most video games, like those written for PCs or
    consoles, are developed in low-level languages such as C and even Assembly. This
    gives the developers the most control over how the code is executed by the processor
    and the environment in which the code is run. Processors, of course, only understand
    machine code, and the closer you can get to their native language, the fewer interpreters
    you need to jump through to get your game running. Android, while it does offer
    some limited ability to code at a low level, interprets and threads your Java
    code through its own execution system. This gives the developer less control over
    the environment the game is run in.


    This book is not going to take you through the low-level approaches to game development.
    Why not? Because Java, especially as it is presented for general Android development,
    is widely known, easy to use, and can make some very engaging and rewarding games.


    In essence, if you are already an experienced Java developer, you will find that
    your skills are not lost in translation when applied to Android. If you are not
    already a seasoned Java developer, do not fear. Java is a great language to start
    your learning. For this reason, I have chosen to stick with Android’s native Java
    development environment to write our games.


    We have discussed a couple of pros and a couple of cons to developing games on
    Android. One of the best reasons for independent and casual game developers to
    create and publish games on the Android platform is the freedom granted in releasing
    your games. While some app stores have very stringent rules about what can be
    sold on them—and for how much—the Android Market does not. Anyone is free to list
    and sell just about anything he or she wants. This gives developers more creative
    freedom.


    Now that we have quickly reviewed the history of mobile gaming and discussed some
    of the reasons why you might want to put your valuable time and effort into developing
    games on the Android network, it’s time to take a look at the tools you need to
    be a successful Android game developer.


    ## Summary


    In this chapter, you discovered what you will learn in this book. You were introduced
    to the history of mobile gaming and the Android gaming platform. In the next chapter,
    you learn what constitutes an arcade-style game and what makes these games so
    playable on Android devices.


    ## Chapter 2: What Is an Arcade Game?


    In this chapter, you will learn what defines a game as an arcade-style game. You
    will also form an operational definition of arcade-style gaming.


    As the chapter comes to a close, you discover more about `Prison Break`, the game
    that you will create in the remaining chapters of the book.


    ### Where Did Arcade-Style Games Originate?


    There are many styles of games in the gaming world today. From first-person shooters
    to puzzle games to multigame hybrids, there are arguably as many styles as there
    are games to play. Games such as *N.O.V.A. 2* and *Words with Friends* are great
    examples of these mobile games.'
  raw: 'While there was an established base of casual or independent computer game
    developers at the time, the Game Boy was not a practical platform for them because
    it was still considered a gaming console. Games were developed using proprietary
    C libraries and required the use of expensive, licensed, development hardware.
    This put development out of reach of the casual game developers, relegating them
    to PCs if they wanted to express themselves.


    Around the same time the Game Boy was hitting its stride, two more revolutions
    began to take form; revolutions that would lead us to Android as a gaming platform.
    Cell phones and the Internet began to become widely used and accepted by the late
    1980s, just as portable gaming took off.


    Early mobile phones were expensive to make and expensive to use. They were toys
    for the rich and famous, and tools for the successful who wanted to show off.
    The screens on these devices consisted of a single line of LCD text; just enough
    to display the phone number being dialed. The idea of a business tycoon or Hollywood
    producer sitting down to play *Tetris* on a single-line display at anywhere from
    $15 to $25 per minute was simply not practical. It would take a few more years
    before mobile-phone displays and per-minute rates would allow for gaming.


    It wasn’t long after cell phones and the Internet became popular that the two
    collided. At first, the marriage of the two produced crude, scaled-down versions
    of web-like content that could easily run on the cell phone’s slow processors
    and limited—mostly textual—displays. Slowly, mobile Java-based content and applications
    began to pop up on cell phones everywhere. Although this added the overhead of
    a Java virtual machine, it was definitely a good start. The first Java-based games
    followed shortly thereafter.


    Nokia finally attempted to fully merge cell phones with mobile gaming devices
    with its N*Gage phone in 2003\. The N*Gage, while generally viewed as a commercial
    failure, opened the door to cell phone gaming as a true multiplatform activity.
    Developers soon realized that games built specifically to run on mobile phones
    could actually compete with those built for gaming-specific handheld systems like
    the Game Boy, PSP, and DS.


    Mobile gaming finally found consumer acceptance with the iPhone. There is no denying
    that the iPhone did not just open the door for mobile phone–based games, it blew
    the door away. This does not mean that the iPhone is without fault. Developing
    iPhone games requires two things that not every casual developer may possess:
    a Mac and a very good understanding of Objective-C.


    This is where Android picks up the story.


    The Introduction of Android


    I began developing on the Android beta platform in early 2008\. At the time, no
    phones were announced for the new operating system and we—as developers—genuinely
    felt as though we were in at the start of something exciting. Android captured
    all of the energy and excitement of the early days of open-source development.
    Developing for the platform was very reminiscent of sitting around an empty student
    lounge at 2:00 am with a Jolt Cola, waiting for VAX time to run our latest code.
    It was an exciting platform. I am glad I was there to see it materialize and take
    off.


    As Android began to grow, and as Google released more updates to solidify the
    final architecture, one thing became apparent: Android, based on Java and including
    many well-known Java packages, would be an easy transition for the casual game
    developer. Most of the knowledge that an existing Java developer already had could
    be recycled on this new platform. The very large base of Java game developers
    could use that knowledge to move fairly smoothly onto Android.


    So how does one begin developing games on Android? What tools are required? The
    next section of this chapter aims to answer these questions.


    Android Game Programming


    Developing games on Android has its pros and cons. You should be aware of these
    before you begin. First, Android games are developed in Java, but it is not full
    Java. Many of the packages that you may have used for OpenGL and other graphic
    blandishments are included in the Android SDK. Many does not mean *all*, however,
    and some packages that are very helpful to game developers, especially 3D game
    developers, are not included. So not every package that you may have relied on
    to build your previous games will be available to you in Android.


    With each release of new Android SDKs, more and more packages become available.
    You will need to be aware of just which packages you have to work with. We will
    cover these as we progress through the chapters.


    Another pro (and a corresponding con) have to do with Android’s familiarity versus
    its lack of power. What Android gains in familiarity and ease of programming,
    it may lack in speed and power. Most video games, like those written for PCs or
    consoles, are developed in low-level languages such as C and even Assembly. This
    gives the developers the most control over how the code is executed by the processor
    and the environment in which the code is run. Processors, of course, only understand
    machine code, and the closer you can get to their native language, the fewer interpreters
    you need to jump through to get your game running. Android, while it does offer
    some limited ability to code at a low level, interprets and threads your Java
    code through its own execution system. This gives the developer less control over
    the environment the game is run in.


    This book is not going to take you through the low-level approaches to game development.
    Why not? Because Java, especially as it is presented for general Android development,
    is widely known, easy to use, and can make some very engaging and rewarding games.


    In essence, if you are already an experienced Java developer, you will find that
    your skills are not lost in translation when applied to Android. If you are not
    already a seasoned Java developer, do not fear. Java is a great language to start
    your learning. For this reason, I have chosen to stick with Android’s native Java
    development environment to write our games.


    We have discussed a couple of pros and a couple of cons to developing games on
    Android. One of the best reasons for independent and casual game developers to
    create and publish games on the Android platform is the freedom granted in releasing
    your games. While some app stores have very stringent rules about what can be
    sold on them—and for how much—the Android Market does not. Anyone is free to list
    and sell just about anything he or she wants. This gives developers more creative
    freedom.


    Now that we have quickly reviewed the history of mobile gaming and discussed some
    of the reasons why you might want to put your valuable time and effort into developing
    games on the Android network, it’s time to take a look at the tools you need to
    be a successful Android game developer.


    Summary


    In this chapter, you discovered what you will learn in this book. You were introduced
    to the history of mobile gaming and the Android gaming platform. In the next chapter,
    you learn what constitutes an arcade-style game and what makes these games so
    playable on Android devices.


    Chapter    2


    What Is an Arcade Game?


    In this chapter, you will learn what defines a game as an arcade-style game. You
    will also form an operational definition of arcade-style gaming.


    As the chapter comes to a close, you discover more about Prison Break, the game
    that you will create in the remaining chapters of the book.


    Where Did Arcade-Style Games Originate?


    There are many styles of games in the gaming world today. From first-person shooters
    to puzzle games to multigame hybrids, there are arguably as many styles as there
    are games to play. Games such as *N.O.V.A. 2* and *Words with Friends* are great
    examples of these mobile games.'
