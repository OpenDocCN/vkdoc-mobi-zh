    # 街机风格游戏


    当下最流行的游戏风格之一便是街机风格。街机游戏作为一种风格，实际上是融合了多种不同游戏类型的混合体。要理解什么是街机风格的游戏，让我们先简要回顾一下街机游戏的历史。


    毫无疑问，你曾亲眼或在网上见过像《*吃豆人*》或《*蜈蚣*》这样的老式街机游戏柜。在早期，游戏硬件价格昂贵，而且通常是为每款游戏专门定制的。开发者与硬件创造者紧密合作，由此诞生了体积庞大、像家具一样的游戏机柜。


    这些大型的一体式机柜通常包含显示器、控制器以及运行游戏所需的所有内部电子元件。然而，由于这些设备价格高得令人望而却步，普通人根本负担不起；因此它们通常只出现在游戏厅里。机柜上装有投币器，人们急切地投入硬币来玩最新的游戏。因此，“街机”游戏风格这一名称的根源，就来自于最初玩这些游戏的场所。


    街机老板们很快明白了一件事：为了收回购买游戏机的高昂成本，他们需要尽可能多的玩家来玩每一款游戏。如今，人们可以一次连续玩一款游戏几个小时。我就曾在《*最终幻想*》游戏上投入过
    10 小时、20 小时甚至 30 小时。这种硬核游戏玩法对每次只收 0.25 美元的街机老板来说，无疑是灭顶之灾。


    街机老板和游戏开发者迅速意识到，三分钟是黄金时长。在平均三分钟的游戏时间里，玩家觉得自己的投入物有所值，而街机老板也能让大量玩家轮番体验游戏。


    于是，游戏开发者必须创造出这样一种游戏：玩家可以随时上手，无需任何指导就能理解玩法和目标，并且能在三分钟后停止游玩。由此，开发那些令人上瘾、目标明确且能在相对短时间内玩完的游戏便应运而生。这就是街机风格游戏的起源。


    在本章的下一节中，我们将讨论你将在本书中开发的游戏。


    ## 你的游戏：越狱


    在本书剩余的章节中，你将学习如何创建一款名为“越狱”的街机风格游戏。“越狱”是一款球拍游戏，涉及将球的轨迹偏转并击向一堵砖墙，以击碎它们。该游戏大致基于 Atari
    公司的游戏《*打砖块*》。《*打砖块*》在街机游戏早期极具影响力，其令人上瘾的玩法和易于理解的概念使其成为本书的完美范例。


    “越狱”包含了构建良好游戏开发知识库所需的所有元素。你将学习多边形和纹理渲染、基本游戏物理以及碰撞检测。毫无疑问，你会在其他游戏中使用到所有这些概念。


    本书将按照自然顺序，从头到尾引导你完成“越狱”游戏的开发过程。你将获得创建游戏并在 Android 设备上运行它的代码示例和解释。到本书结束时，你将掌握所需的知识，能够轻松地基于相同概念创建其他游戏。图
    2-1 展示了完成版“越狱”的一个游戏场景。


    ![9781430245452_Fig02-01.jpg](img/9781430245452_Fig02-01.jpg)


    图 2-1。完成版“越狱”的截图


    为了让你清楚了解后续内容，下一节将列出剩余章节的内容和目标。


    ## 本书内容……


    本书共有八章。虽然整本书看起来篇幅可能不长，但它将包含大量有用信息。每一章都旨在让你掌握完成“越狱”游戏所需的一项关键技能。以下是对我们剩余六章目标的简要概述。

    '
- fmt: '## Chapter 3: Creating a Menu


    In this chapter, you learn how to create the menu system for Prison Break. The
    menu of the game is the main entry point, which guides the player into and out
    of Prison Break. You will create options for starting and exiting the game using
    the Android SDK.


    ## Chapter 4: Drawing the Background


    [Chapter 4](#9781430245452_Ch04.xhtml) teaches you how to create a background
    for the game and draw that background to the screen. In the process, you are introduced
    to many aspects of OpenGL ES, including rendering, texture mapping, and vertices.
    The background, while static for the Prison Break game, sets the theme for each
    game you create, and is, therefore, very important.


    ## Chapter 5: Creating the Player Paddle and Bricks


    In [Chapter 5](#9781430245452_Ch05.xhtml), you learn how to create a paddle that
    is moved across the screen based on where the player directs the character. You
    also add the ball that is used to break the bricks. This involves the use of touch
    listeners and custom classes in Android.


    To finish this chapter, you create the bricks that the player character needs
    to bust through to advance through the game. You will learn how to use Android
    code loops to place multiple blocks on the screen without having to draw them
    manually.


    ## Chapter 6: Collision Detection and In-Game Physics


    [Chapter 6](#9781430245452_Ch06.xhtml) walks you through the critical concept
    of collision detection. The physics of collision detection is used to tell if
    the brick-breaking ball has hit a brick (or the paddle). You then use physics
    and mathematics to either bounce the ball in a new direction or destroy a brick.
    It is this in-game physics that adds realism to your game and makes it enjoyable
    to play.


    ## Chapter 7: Keeping Score


    While it can be overlooked and considered simplistic, the ability to keep score
    is very important to many arcade-style games. [Chapter 7](#9781430245452_Ch07.xhtml)
    teaches you how to keep track of the current game score and how to save the score
    to one of Android’s built-in MySQL databases.


    ## Chapter 8: Adding More Levels


    In [Chapter 8](#9781430245452_Ch08.xhtml), you learn how to add levels to the
    game. An exciting aspect of designing arcade-style games is that you can add many
    levels—sometimes hundreds of them—quickly and easily. You will apply the knowledge
    you gained from previous chapters to create multiple levels for your game.


    ## Summary


    In this chapter, you learned what defines an arcade game; you discovered more
    about Prison Break, the game that you will create; and you got a brief overview
    of the remaining chapters of this book.


    In [Chapter 3](#9781430245452_Ch03.xhtml), you begin coding your game’s main menu
    screen.


    ## Chapter 3: Creating a Menu


    In this chapter, you will create a two-part menu screen for your Prison Break
    game. The menu screen, shown in [Figure 3-1](#9781430245452_Ch03.xhtml#Fig1),
    is made up of two different “screens” containing a total of five different images.


    ![9781430245452_Fig03-01.jpg](images/9781430245452_Fig03-01.jpg)


    [Figure 3-1](#9781430245452_Ch03.xhtml#_Fig1). Prison Break menu screen


    In the next section, you will learn what you need to do to prepare for the code
    provided in this chapter.


    ### Before You Begin


    Before you begin to apply the code in this chapter, there are two things you need
    to do to prepare. First, create a new Android project named `prisonbreak`. This
    project will hold all of the code and images used in this book.


    Second, gather or create some images for your Prison Break game. In this chapter,
    you need a total of five images: a splash screen, two different Start button states,
    and two different Exit button states. The images that I used are shown in [Figures
    3-2](#9781430245452_Ch03.xhtml#Fig2) through [3-6](#9781430245452_Ch03.xhtml#Fig6).


    ![9781430245452_Fig03-02.jpg](images/9781430245452_Fig03-02.jpg)


    [Figure 3-2](#9781430245452_Ch03.xhtml#_Fig2). prisonbreaksplash.png


    ![9781430245452_Fig03-03.jpg](images/9781430245452_Fig03-03.jpg)


    Figure 3-3. startbtn.png'
