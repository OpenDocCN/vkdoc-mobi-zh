    \    gl.glPopMatrix();\n    gl.glLoadIdentity();\n}\n```\n\n在模拟器或设备上编译并运行你的游戏。现在你将看到一堵待摧毁的砖墙、一个响应灵敏的玩家挡板，以及一个快速移出屏幕的球。\n\
