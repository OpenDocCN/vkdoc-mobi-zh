  raw: 'Starting with the `GLSurfaceView`, create a new class named `PBGameView,`
    and extend `GLSurfaceView`, as shown in Listing 4-3.


    `Listing 4-3\. PBGameView.java`


    package com.jfdimarzio;


    import android.content.Context;


    import android.opengl.GLSurfaceView;


    public class PBGameView extends GLSurfaceView {


    private PBGameRenderer renderer;


    public PBGameView(Context context) {


    super(context);


    renderer = new PBGameRenderer();


    this.setRenderer(renderer);


    }


    }


    This is a rather small class. You can see that the purpose of the only constructor
    in the class is to create an instance of a renderer (`PBGameRenderer`). There
    is nothing fancy here, so let’s move on to creating the renderer.


    **Note**  Before creating the `PBGameRenderer`, add the following to your `PBGameVars`:
    `public static final int GAME_THREAD_FPS_SLEEP = (1000/60)` ;


    Create a new class called `PBGameRenderer` in your Prison Break project. This
    class needs to extend `GLSurfaceView.Renderer`, as shown in Listing 4-4.


    `Listing 4-4\. PBGameRenderer.java`


    package com.jfdimarzio;


    import javax.microedition.khronos.egl.EGLConfig;


    import javax.microedition.khronos.opengles.GL10;


    import android.opengl.GLSurfaceView.Renderer;


    public class PBGameRenderer implements Renderer{


    private long loopStart = 0;


    private long loopEnd = 0;


    private long loopRunTime = 0 ;


    @Override


    public void onDrawFrame(GL10 gl) {


    // TODO Auto-generated method stub


    loopStart = System.currentTimeMillis();


    // TODO Auto-generated method stub


    try {


    if (loopRunTime < PBGameVars.GAME_THREAD_FPS_SLEEP){


    Thread.sleep(PBGameVars.GAME_THREAD_FPS_SLEEP - loopRunTime);


    }


    } catch (InterruptedException e) {


    // TODO Auto-generated catch block


    e.printStackTrace();


    }


    gl.glClear(GL10.GL_COLOR_BUFFER_BIT | GL10.GL_DEPTH_BUFFER_BIT);


    loopEnd = System.currentTimeMillis();


    loopRunTime = ((loopEnd - loopStart));


    }


    @Override


    public void onSurfaceChanged(GL10 gl, int width, int height) {


    // TODO Auto-generated method stub


    gl.glViewport(0, 0, width,height);


    gl.glMatrixMode(GL10.GL_PROJECTION);


    gl.glLoadIdentity();


    gl.glOrthof(0f, 1f, 0f, 1f, -1f, 1f);


    }


    @Override


    public void onSurfaceCreated(GL10 gl, EGLConfig arg1) {


    // TODO Auto-generated method stub


    gl.glEnable(GL10.GL_TEXTURE_2D);


    gl.glClearDepthf(1.0f);


    gl.glEnable(GL10.GL_DEPTH_TEST);


    gl.glDepthFunc(GL10.GL_LEQUAL);


    }


    }


    The renderer has three methods that you need to override: `onSurfaceCreated()`,
    `onSurfaceChanged()`, and `onDrawFrame()`. As a developer, you will not call any
    of these methods in your code. The `GLSurfaceView` is responsible for calling
    all of these methods at the correct times.


    In short, the `onSurfaceCreated()` acts as the constructor for the renderer and
    is called when the renderer is created. If everything is running smoothly, this
    should only be called once; so all of your setup code goes into this method. Right
    now, the only code that you are calling in your setup routine is OpenGL functions,
    to set up the texture and depth buffers.


    The `onSurfaceChanged()` method is called whenever the surface is changed. Do
    not confuse this with `onDrawFrame()`, however. Drawing a frame does not constitute
    a surface change. A surface change is more on the lines of a change in screen
    orientation or a similar destructive event. The `onSurfaceChanged()` method is
    also called the first time the renderer is called, after the setup.


    In `onSurfaceChanged()`, you want to set up your game’s view port and call OpenGL’s
    rendering pipeline to draw your objects. The game’s view port is the area of the
    game world that is drawn on the screen. Think of the view port as the display
    on a camera. When you point the camera in a specific direction, you only see a
    small portion of the entire world. So too, when you create a game using OpenGL:
    you may create more “objects” in your world than you can see at one time. The
    view port tells OpenGL what you expect to see rendered to your display.


    **Caution**  Be careful when you are using the width and height variables that
    are passed into `onSurfaceChanged()`. When `GLSurfaceView` calls `onSurfaceChanged()`,
    the width and height that are passed in are not necessarily the true width and
    height of the screen. To get the full width and height of the screen, use the
    `context.display.width` and `context.display.height`.


    You want to put all of the code that is called on every frame in the `onDrawFrame()`.
    This includes frame-rate calculators, the code for drawing all of the objects
    in the game, collision detection, and cleanup. The only code that is running on
    each frame in Listing 4-4 is the thread marshal for the frame rate, as well as
    an OpenGL method for clearing the buffers.


    In the next section, you will create the class that draws the background; and
    then, you will call that class from the `onDrawFrame()` and draw the background
    to the screen.


    Creating the Background Class


    In Prison Break, you are going to create a class that handles the setup of the
    indexes, vertices, and textures used to draw the background for your game. Each
    new element that we add to this game follows the format of this class. The background
    image that you use should be copied to the `res/drawable-nodpi` folder in your
    project and named `bg1.png`. Add the following variable to your `PBGameVars` file
    to help you reference the image later.


    public static final int BACKGROUND = R.drawable.bg1;


    The image that I am using is shown in [Figure 4-1](#9781430245452_Ch04.xhtml#Fig1).


    ![9781430245452_Fig04-01.jpg](images/9781430245452_Fig04-01.jpg)


    [Figure 4-1](#9781430245452_Ch04.xhtml#_Fig1).  bg1.png, the background image
    for Prison Break


    Now it is time to set up the class to create your background. Create a new class
    in your Prison Break project called `PBBackground.java`. You need three methods
    in this class: a constructor, a `draw()` method, and a `loadTexture()` method.


    The constructor loads up the vertex, index, and texture arrays into buffers. Since
    this is the most important step in determining what your background looks like
    when it is rendered to the screen, let’s take a little time now to discuss what
    these arrays are and how they are used.


    The vertex array is used to define the corners of the polygon that your background
    image is mapped to. The corners are defined using their x-, y-, and z-axes on
    the Cartesian coordinate system. Therefore, in creating a square, you would supply
    the x-, y-, and z-coordinates of the lower-left corner, upper-left corner, upper-right
    corner, and lower-right corner, respectively.


    Now, I need to clear up some potential confusion in the last paragraph. While
    in the end, the polygon you draw is a square (or rectangle), OpenGL actually draws
    in right-angled triangles. Two triangles placed next to each other create a square.
    The purpose of the index buffer is to tell OpenGL the index order of the triangle’s
    edges, thus telling OpenGL which order the corners in the vertex buffer are drawn.
    In other words, if the index buffer is 0, 1, 2, 0, 2, 3—like the triangles in
    [Figure 4-2](#9781430245452_Ch04.xhtml#Fig2), then the corners in the vertex buffer
    are the lower-left corner, upper-left corner, upper-right corner, and lower-right
    corner.


    ![9781430245452_Fig04-02.jpg](images/9781430245452_Fig04-02.jpg)


    [Figure 4-2](#9781430245452_Ch04.xhtml#_Fig2).  Index triangles


    Finally, the texture array tells OpenGL which corners of your texture (or image)
    map to the particular corners of your vertices. Because there is no depth in texture
    mapping, the texture array only has x- and y-coordinates.'
