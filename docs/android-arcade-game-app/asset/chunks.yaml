    `PBMainMenu` controls the starting and exiting of your main game loop; therefore,
    it needs to display two buttons: the Start button and the Exit button. Listing
    3-5 shows the current code for `PBMainMenu.java` (you will add to this code in
    the next chapter).


    Take notice that `PBMainMenu` is a new activity and must be defined as such in
    the `AndroidManifest` for your project.


    `Listing 3-5.  PBMainMenu.java`


    public static Display display;


    public static Context context;


    public static final int GAME_THREAD_DELAY = 3000;


    package com.jfdimarzio;


