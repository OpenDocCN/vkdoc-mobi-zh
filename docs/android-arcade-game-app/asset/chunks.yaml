    \       gl.glDepthFunc(GL10.GL_LEQUAL);\n    }\n}\n```\n\n渲染器有三个需要重写的方法：`onSurfaceCreated()`、`onSurfaceChanged()`\
    \ 和 `onDrawFrame()`。作为开发者，你不会在代码中直接调用这些方法。`GLSurfaceView` 负责在正确的时间调用所有这些方法。\n\n\
    简而言之，`onSurfaceCreated()` 充当渲染器的构造函数，在渲染器创建时被调用。如果一切运行顺利，这个方法应该只被调用一次；因此，所有初始化设置代码都应放在这个方法中。目前，在初始化例程中只调用了\
