  trans: '

    游戏作为另一个 `Activity` 启动，这样作为游戏开发者的你便能更灵活地控制游戏的执行方式。如果你想在主菜单中添加与游戏无直接关联的其他功能（例如配置器或计分板），这种方法可以有效避免游戏因冗余代码而变得臃肿。


    `清单 4-1` 展示了你之前在第 3 章开始编写的 `PBMainMenu` 代码。其中加粗的代码是新添加的，用于启动 `PBGame Activity`。请将此代码添加到你的
    `PBMainMenu` 中。接下来你将创建 `PBGame Activity`。


    ```

