    private void moveBall(GL10 gl){


    gl.glMatrixMode(GL10.GL_MODELVIEW);


    gl.glLoadIdentity();


    gl.glPushMatrix();


    gl.glScalef(.25f, .25f, 1f);


    ball.posX += (float) ((PBGameVars.ballTargetX - ball.posX )/ (ball.posY /(PBGameVars.ballTargetY
    )));


    ball.posY -= PBGameVars.ballTargetY * 3;


    gl.glTranslatef(ball.posX, ball.posY, 0f);


    gl.glMatrixMode(GL10.GL_TEXTURE);


    gl.glLoadIdentity();


    gl.glTranslatef(0.0f,0.0f, 0.0f);


    ball.draw(gl,spriteSheets);


    gl.glPopMatrix();


    gl.glLoadIdentity();


    }


    private void movePlayer1(GL10 gl){


    gl.glMatrixMode(GL10.GL_MODELVIEW);


    gl.glLoadIdentity();


    gl.glPushMatrix();


    gl.glScalef(.25f, .25f, 1f);


    if (PBGameVars.playerAction == PBGameVars.PLAYER_MOVE_LEFT_1 &&PBGameVars.playerBankPosX
    > 0)


    {


    PBGameVars.playerBankPosX = PBGameVars.playerBankPosX - PBGameVars.PLAYER_MOVE_SPEED;


    }


    else if(PBGameVars.playerAction == PBGameVars.PLAYER_MOVE_RIGHT_1 &&PBGameVars.playerBankPosX
    < 2.5)


    {


    PBGameVars.playerBankPosX = PBGameVars.playerBankPosX + PBGameVars.PLAYER_MOVE_SPEED;


    }


    gl.glTranslatef(PBGameVars.playerBankPosX, .5f, 0f);


    gl.glMatrixMode(GL10.GL_TEXTURE);


    gl.glLoadIdentity();


    gl.glTranslatef(0.0f,0.0f, 0.0f);


    player1.draw(gl);


    gl.glPopMatrix();


    gl.glLoadIdentity();


    }


