    \nYou should now be able to compile and run your code. When you do, you should\
    \ see a splash screen that fades out to a menu. Touching the Exit button kills\
    \ the main activity and exits the game. Right now, however, touching the Start\
    \ button does nothing.\n\n# Summary\n\nIn this chapter, you added nine code files\
    \ and five images to your first game project. These files, when put together,\
    \ created a compelling and professional menu screen. You now have a working splash\
    \ screen and a basic menu system with two options.\n\nIn the next chapter, you\
    \ add code to the Start button to kick off the main game loop. You will also add\
    \ the game’s background image to the screen.\n\n# Chapter 4: Drawing the Background\n\
    \nIn the last chapter, you created and finalized the main menu to Prison Break.\
    \ You should have compiled and run your code on either the Android emulator or\
    \ an Android-based phone in debug mode, and seen a functioning main menu screen.\
    \ The Exit button of the main menu is wired to kill the game process. As of right\
    \ now, however, the Start button is not wired to any code.\n\nIn this chapter,\
    \ you will write the code for the Start button and create the background for Prison\
