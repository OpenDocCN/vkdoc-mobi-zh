    Chapter    7


    Keeping Score


    In the last chapter, you learned how to implement a basic collision detection
    system in your Prison Break game. This collision detection system allowed you
    to test for any collisions between the game ball and the bricks or the paddle.
    It is now time to add the finishing touch to the game.


    Most arcade-style games feature a scoring component. Whether it is a direct score
    or a ranking that correlates to how a level was finished, the score is what lets
    the player know how he played compared to other players.


    In this chapter, you take a look at two possible ways to keep score in Prison
    Break. The first method adds a specific number of points to the player’s score
    for each brick broken. The second method awards the player a number of points
    for each complete row of bricks eliminated.


    Creating the Scoring Method


    To keep score, you first need to add a new method to the `PBGameRenderer()` that
    will track the player’s score. This method advances the score as you call it.


    How will the score be written out to the screen? You create three small vertices
    following the methods outlined in [Chapter 4](#9781430245452_Ch04.xhtml) and [Chapter
    5](#9781430245452_Ch05.xhtml) for making the background, bricks, ball, and paddle.
    Because we have gone through this procedure four times already, it will not be
    repeated again here.


