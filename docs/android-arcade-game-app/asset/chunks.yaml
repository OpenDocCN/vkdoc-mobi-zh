    if(ball.posY < = 0){\n  //GameOver\n}\n```\n\n**注意**：当你在《越狱》中测试屏幕上任何元素的 `x` 或\
    \ `y` 坐标位置时，给定的坐标表示纹理映射到的顶点（vertex）的左上角位置。这一点很重要，因为在测试某些碰撞时，你可能需要考虑顶点的宽度或高度。\n\
    \n接下来，你测试每个砖块，看球是否与其接触。\n\n```\nfor (int x = 0; x < wall.rows.length; x++)\n{\n\
