    \ com.jfdimarzio;\n\npublic class PBWall {\n\n    public PBRow[] rows;\n\n   \
    \ public PBWall(int numberOfRows){\n        rows = new PBRow[numberOfRows];\n\
    \        for(int x = 0; x <= numberOfRows - 1; x++)\n        {\n            rows[x]\
    \ = new PBRow(x);\n        }\n    }\n}\n```\n\n接下来，在你的项目中创建一个名为`PBRow`的新类。`PBRow`的代码如清单\
    \ 5-6 所示。\n\n```\nListing 5-6\\. PBRow\n\npackage com.jfdimarzio;\n\nimport java.util.Random;\n\
    \npublic class PBRow {\n\n    public PBBrick[] bricks;\n    private Random brickType\
    \ = new Random();\n    private boolean isRowOdd = false;\n    private int numberOfBricks\
    \ = 0;\n\n    public PBRow(int rowNumber){\n        if(rowNumber % 2 > 0)\n  \
