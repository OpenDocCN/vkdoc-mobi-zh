- fmt: "在本章中，你创建了一面随机颜色的砖墙、一个可移动的玩家挡板和一个球。这些代码为游戏增加了大量内容，使《越狱》游戏接近完成。你还学习了如何使用精灵表（`spritesheet`），并创建了一个优秀的辅助类（`helper\
    \ class`），用于构建指定行数的砖墙。\n\n使用辅助类来完成游戏中一些更繁琐的设置工作是一项宝贵的技能，你会发现自己在开发中越来越频繁地使用它。试着在游戏中寻找可以使用辅助类来处理角色或对象设置的地方。\n\
    \n在下一章中，你将创建碰撞检测逻辑，从而完成游戏可玩的物理部分。\n\nChapter 6\n\nCollision Detection\n\n在上一章中，你将所有游戏元素添加到了游戏世界中：砖块、玩家挡板和球。然而，运行代码后，你发现虽然可以移动玩家挡板，但对游戏玩法没有影响。球从一个随机位置开始，最终从屏幕底部掉落。原因是你的游戏中明显缺少碰撞检测。\n\
    \n在本章中，你将向游戏添加碰撞检测。\n\n碰撞检测的目的\n\n碰撞检测的严格定义是：检测屏幕上的元素何时发生碰撞。然而，它的重要性远不止于此。一个良好的碰撞检测系统会测试并评估游戏世界中的元素何时相互接触，并为你提供对这些碰撞做出反应的方法。\n\
    \n《越狱》的碰撞检测系统将是基础的，但它会向你展示碰撞检测的工作原理，并允许你在此基础上根据需要进行扩展。\n\n请记住，`OpenGL` 没有任何内置的碰撞检测或顶点测试功能；它并非为此而设计。作为游戏开发者，你有责任为游戏提供这种机制。\n\
    \n《越狱》中的碰撞检测\n\n在开始为《越狱》编写碰撞检测系统之前，我们需要讨论它需要做什么。在开始编码之前，最好对系统的运作方式有一个清晰的概念。\n\n\
    以下是《越狱》碰撞检测系统需要测试的项目列表：\n\n- ![bullet.jpg](images/bullet.jpg) 球是否击中了挡板？\n- ![bullet.jpg](images/bullet.jpg)\
    \ 球是否击中了砖块？\n- ![bullet.jpg](images/bullet.jpg) 球是否击中了屏幕的右“墙”或边缘？\n- ![bullet.jpg](images/bullet.jpg)\
    \ 球是否击中了屏幕的左“墙”或边缘？\n- ![bullet.jpg](images/bullet.jpg) 球是否离开了游戏的上边界？\n- ![bullet.jpg](images/bullet.jpg)\
    \ 球是否离开了游戏的下边界？\n\n除了这些测试，碰撞检测系统还必须执行以下操作：\n\n- ![bullet.jpg](images/bullet.jpg)\
    \ “销毁”被球击中的任何砖块。\n- ![bullet.jpg](images/bullet.jpg) 计算偏转角（angle of deflection），如果球击中挡板或游戏屏幕的左右边缘，则移动球。\n\
    \n虽然这看起来很多，但对于你的游戏来说，这是一个相当基础的碰撞检测系统。有些碰撞检测系统非常复杂。\n\n创建碰撞检测系统\n\n你不需要为碰撞检测系统创建一个新类；相反，它将位于`PBGameRenderer`的一个方法中。重要的是，碰撞检测系统必须在游戏渲染器的每一帧上运行。因此，该方法将在`onDrawFrame()`中被调用。\n\
    \n在你的`PBGameRenderer`中创建一个新方法，命名为`detectCollisions()`。让我们逐步查看`detectCollisions()`中的代码。然后我会提供`PBGameRenderer`的完整代码，以便你了解其上下文。\n\
    \n该方法首先测试球是否在屏幕底部边缘之外。如果是，则表示游戏结束场景。要确定球是否在屏幕边缘之外，只需测试其 `y` 轴位置是否小于 0。\n\n```\n\
    if(ball.posY < = 0){\n  //GameOver\n}\n```\n\n**注意**：当你在《越狱》中测试屏幕上任何元素的 `x` 或\
    \ `y` 坐标位置时，给定的坐标表示纹理映射到的顶点（vertex）的左上角位置。这一点很重要，因为在测试某些碰撞时，你可能需要考虑顶点的宽度或高度。\n\
    \n接下来，你测试每个砖块，看球是否与其接触。\n\n```\nfor (int x = 0; x < wall.rows.length; x++)\n{\n\
    \  for(int y = 0; y < wall.rows[x].bricks.length; y++)\n  {\n    if(!wall.rows[x].bricks[y].isDestroyed)\n\
    \    {\n      if (((ball.posY > wall.rows[x].bricks[y]. posY - .25f)\n       \
    \ && (ball.posY < wall.rows[x].bricks[y].posY)\n        && (ball.posX + .25f >\
    \ wall.rows[x].bricks[y].posX)\n        && (ball.posX < wall.rows[x].bricks[y].\
    \ posX + 1.50f)))\n      {\n        wall.rows[x].bricks[y].isDestroyed = true;\n\
    \        PBGameVars.ballTargetY = PBGameVars. ballTargetY * -1f;\n        if(PBGameVars.ballTargetX\
    \ == −2f){\n          PBGameVars.ballTargetX = 5f;\n        }else{\n         \
    \ PBGameVars.ballTargetX = −2f;\n        }\n      }\n    }\n  }\n}\n```\n\n注意测试球是否碰到砖块的\
    \ `if` 语句。首先，它测试球的 `y` 轴位置（左上角）是否大于砖块的 `y` 轴位置减去 0.25。这是因为砖块的 `y` 轴位置是其左上角；但我们要判断球是否击中了砖块的底部，所以从砖块的\
    \ `y` 轴位置减去其高度，得到底部的 `y` 轴位置。\n\n如果球击中砖块，砖块的 `isDestroyed` 标志将被设置为 `true`。正如你从\
    \ `drawBricks()` 方法中看到的，任何 `isDestroyed` 标志为 `true` 的砖块都不会被绘制。因此，在游戏循环的下一次迭代中，被击中的砖块将不会被绘制，并从游戏屏幕中消失。\n\
    \n砖块被销毁后，球会弹开。因此，你现在需要计算球的偏转角。幸运的是，所有砖块都呈 90 度角，而球的攻击角（angle of attack）总是（大约）45\
    \ 度。这为你提供了一个非常清晰且一致的偏转角。事实上，要正确偏转球，你只需将 `y` 轴值设置为其自身的相反符号。\n\n**提示**：攻击角是球从物体上弹开并继续在游戏屏幕上前进的角度。在现实物理中，球以一个逆于其接近角度的角度，从呈\
    \ 90 度角的平坦物体上弹开。因此，以一个 30 度角接近平坦、90 度物体的球，会以 60 度角弹开。为了避免进行完整的物理课教学，《越狱》中的球始终以\
    \ 45 度角移动，并且所有表面都将呈 90 度角。这样，每次球被偏转时，都会以 45 度角进行。\n\n最后，你需要为球设置目标。这在上章中没有讨论，但你在让球移动时稍微取巧了。通过使用`ballTargetX`变量，你为球提供了一个“瞄准”的\
    \ `x` 轴值。这让你可以轻松地保持其航向。如果球向右移动，目标在 `x` 轴的正侧；如果球向左移动，目标在 `x` 轴的负侧。\n\n当球发生碰撞时，它会弹开；因此，目标需要翻转，使球向相反方向移动。\n\
    \n碰撞检测方法的最后一部分测试球是否击中了玩家挡板。你会注意到，针对砖块进行的测试以及偏转处理，同样适用于挡板。"
  raw: 'In this chapter, you created a wall of randomly colored bricks, a movable
    player paddle, and a ball. This is a lot of code to add to the game, and it brings
    you very close to completing the Prison Break game. You also learned how to use
    a spritesheet, and you created a great helper class that builds a wall of bricks
    with a specified number of rows.


    The ability to use helper classes to do some of the more tedious setup work in
    a game is a valuable skill that you find yourself using more and more. Try to
    look for places where you can use helper classes to handle character or object
    setup in your games.


    In the next chapter, you will create the collision detection logic that finishes
    the playable physics of the game.


    Chapter    6


    Collision Detection


    In the last chapter, you added all of the game elements to the game world: bricks,
    a player paddle, and the ball. After running your code, however, you found that
    although you could move the player paddle, it had no effect on the gameplay. The
    ball starts in a random position and ends up falling off the bottom of the screen.
    The reason for this is the distinct lack of collision detection in your game.


    In this chapter, you will add collision detection to the game.


    The Purpose of Collision Detection


    The strict definition of collision detection is, well, detecting when elements
    on the screen have collided. It is much more crucial than that, however. A good
    collision detection system tests for and evaluates when elements in the game world
    come into contact with one another. It also provides you with a method by which
    to react to those collisions.


    The collision detection system for Prison Break is going to be basic, but it will
    show you how collision detection works and it will allow you to expand upon it
    as you see fit.


    Keep in mind, OpenGL does not have any built-in collision detection or vertex
    testing capabilities; it just isn’t built for that. It is your responsibility
    as a game developer to provide that mechanism to the game.


    Collision Detection in Prison Break


    Before we begin to write the collision detection system for Prison Break, we need
    to discuss what it needs to do. It is always best to have a good idea of how you
    want a system to work before you begin to code it.


    The following is a list of the items that we need to test in the collision detection
    system for Prison Break:


    ![bullet.jpg](images/bullet.jpg)   Has the ball hit the paddle?


    ![bullet.jpg](images/bullet.jpg)   Has the ball hit a brick?


    ![bullet.jpg](images/bullet.jpg)   Has the ball hit the right “wall” or edge of
    the screen?


    ![bullet.jpg](images/bullet.jpg)   Has the ball hit the left “wall” or edge of
    the screen?


    ![bullet.jpg](images/bullet.jpg)   Has the ball exited the upper boundary of the
    game?


    ![bullet.jpg](images/bullet.jpg)   Has the ball exited the lower boundary of the
    game?


    In addition to these tests, the collision detection system has to perform the
    following actions:


    ![bullet.jpg](images/bullet.jpg)   “Destroy” any brick that is hit by the ball.


    ![bullet.jpg](images/bullet.jpg)   Calculate the angle of deflection and move
    the ball along if it hits the paddle or the right or left edges of the game screen.


    While this seems like a lot, this is a surprisingly basic collision detection
    system for your game. Some collision detection systems are incredibly complex.


    Creating the Collision Detection System


    You will not need to create a new class for the collision detection system; rather,
    it will reside in a method of the PBGameRenderer. It is important that the collision
    detection system run on every frame of the game renderer. Therefore, the method
    will be called from the onDrawFrame().


    Create a new method in your PBGameRenderer called detectCollisions(). Let’s take
    a step-by-step look at the code in detectCollisions(). Then I will give you the
    full code of the PBGameRenderer so that you can see it in context.


    The first thing the method does is test to see if the ball is off the bottom edge
    of the screen. If it is, this indicates a game-over scenario. To determine if
    the ball is off the edge of the screen, simply test its y-axis position to see
    if it is less than 0.


    if(ball.posY < = 0){


    //GameOver


    }


    **Note**    When you are testing the x- or y-coordinate positions of anything
    on the screen in Prison Break, the coordinate given represents the position of
    the upper left-hand corner of the vertex that the texture is mapped on to. This
    is important to note because you may need to take into account the width or height
    of the vertex when testing certain collisions.


    Next, you test each brick to see whether or not the ball has contacted it.


    for (int x = 0; x < wall.rows.length; x++)


    {


    for(int y = 0; y < wall.rows[x].bricks.length; y++)


    {


    if(!wall.rows[x].bricks[y].isDestroyed)


    {


    if (((ball.posY > wall.rows[x].bricks[y]. posY - .25f)


    && (ball.posY < wall.rows[x].bricks[y].posY)


    && (ball.posX + .25f > wall.rows[x].bricks[y].posX)


    && (ball.posX < wall.rows[x].bricks[y]. posX + 1.50f)))


    {


    wall.rows[x].bricks[y].isDestroyed = true;


    PBGameVars.ballTargetY = PBGameVars. ballTargetY * -1f;


    if(PBGameVars.ballTargetX == −2f){


    PBGameVars.ballTargetX = 5f;


    }else{


    PBGameVars.ballTargetX = −2f;


    }


    }


    }


    }


    }


    Notice the if statement that tests if the ball has touched a brick. First, it
    tests if the y-axis position of the ball (the upper-left corner) is greater than
    the y-axis position of the brick minus 0.25. This is because the y-axis position
    of the brick is the upper-left corner of the brick; but we want to see if the
    ball has hit the bottom of the brick, so we subtract the height of the brick from
    its y-axis position to get the y-axis position of the bottom.


    If the ball hits a brick, the isDestroyed flag of the brick is set to true. As
    you have seen from the drawBricks() method, any brick that has the isDestroyed
    flag set to true is not drawn. Therefore, on the next iteration of the game loop,
    the brick that has been hit will not be drawn and it will disappear from the game
    screen.


    After the brick is destroyed, the ball bounces off of it. Therefore, you now need
    to calculate the ball’s angle of deflection. Luckily for you, all of the bricks
    lie at 90-degree angles and the angle of attack for the ball is always going to
    be (roughly) 45 degrees. This gives you a very clean and consistent angle of deflection.
    In fact, all you have to do to deflect the ball correctly is set the y-axis value
    to the inverse sign of itself.


    **Tip**    The angle of attack is the angle at which the ball bounces off of an
    object and continues on the game screen. In real-world physics, a ball bounces
    off a flat object set to a 90-degree angle at an angle inverse to the angle at
    which it approached the object. Therefore, a ball approaching a flat, 90-degree
    angle object at a 30-degree angle would bounce off of it at a 60-degree angle.
    To avoid the need for having to conduct a full physics lesson, the ball in Prison
    Break is always going to travel at a 45-degree angle, and every surface is going
    to be at a 90-degree angle. This way, every time the ball is deflected, it does
    so at a 45-degree angle.


    Finally, you need to set the target for the ball. This was not discussed in the
    last chapter, but you are cheating a little to get the ball moving. By using the
    ballTargetX variable, you are giving the ball an x-axis value to “aim for” as
    it moves. This allows you to easily keep it on course. If the ball is moving right,
    the target is on the positive side of the x-axis; if the ball is moving left,
    the target is on the negative side of the x-axis.


    When the ball has a collision, it is going to bounce; therefore, the target needs
    to flip to get the ball moving in the opposite direction.


    The final section of the collision detection method tests to see if the ball has
    hit the player paddle. You will notice that the tests performed against the bricks,
    as well as the deflections, are also applied to the paddle.'
