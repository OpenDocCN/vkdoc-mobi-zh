    If you have never worked with graphics or images in Android, I have a couple of
    valuable tips. First, you can work with images in two different ways: natively
    through the Android SDK (in this chapter) or by using OpenGL ES (in the remaining
    chapters). Each method requires slightly different ways of storing and treating
    the images.


    The other important tip is that the image names must be all lowercase; this is
    common with any method of dealing with Android images. If you use capitalization
    or camel casing in the image names, Android will not recognize the images.


    **Note**  As with everything, there are exceptions, and this is no exception.
    Image names only need to be lowercase if they are stored within the given Android
    project structure (i.e. the res folder). If you store your images in a compressed
    file outside of the Android project structure, and read it using a custom-made
    file reader, you should be able to get away with casing your file names however
    you like. This issue, though, is outside the scope of this book.


    The five images in this chapter should be kept in the `res/drawable-hdpi` folder
    because they will be read using common Android SDK methods.


    In the next section, you will create the files needed to display your main menu.


    Creating the Splash Screen and Main Menu


    The main menu of Prison Break consists of a splash screen that fades out to the
    menu screen. The menu screen contains the Start and Exit buttons.


    For Prison Break, both the splash screen and the main menu background will be
    the same image (see [Figure 3-2](#9781430245452_Ch03.xhtml#Fig2)). This gives
    the effect that the buttons are fading into the background. It is a nice effect
    that looks better than a static screen.


    PrisonbreakActivity


    The first file you work with is PrisonbreakActivity. This is the main activity
    that is created when you created the project. Listing 3-1 shows the code for PrisonbreakActivity.java.


    `Listing 3-1.  PrisonbreakActivity.java`


    package com.jfdimarzio;


    import android.app.Activity;


    import android.content.Context;


    import android.content.Intent;


    import android.os.Bundle;


    import android.os.Handler;


    import android.view.WindowManager;


    public class PrisonbreakActivity extends Activity {


    /** Called when the activity is first created. */


    @Override


    public void onCreate(Bundle savedInstanceState) {


    PBGameVars.display = ((WindowManager) getSystemService(Context.WINDOW_SERVICE)).getDefaultDisplay();


    super.onCreate(savedInstanceState);


    /*display the splash screen image*/


    setContentView(R.layout.splashscreen);


    /*start up the splash screen and main menu in a time delayed thread*/


    PBGameVars.context = this;


    new Handler().postDelayed(new Thread() {


    @Override


    public void run() {


    Intent mainMenu = new Intent(PrisonbreakActivity.this, PBMainMenu.class);


    PrisonbreakActivity.this.startActivity(mainMenu);


    PrisonbreakActivity.this.finish();


    overridePendingTransition(R.layout.fadein,R.layout.fadeout);


    }


    }, PBGameVars.GAME_THREAD_DELAY);


    }


    }


    Looking at the code for `PrisonbreakActivity`, you can see that it references
    a few other files. The first is multiple, shared variables in a class called `PBGameVars.java`.
    Create a new class in your project with this name and add the following public
