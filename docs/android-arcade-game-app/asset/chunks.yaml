- fmt: '# Arcade-Style Games


    One of the most popular game styles right now is arcade. Arcade games, as a style,
    are really hybrids that encompass many different game styles. To understand what
    an arcade-style game is, let’s take a quick look at the history of arcade gaming.


    No doubt, you have seen—either in person or online—an old arcade game cabinet
    like *Pac-Man* or *Centipede*. In the early days, gaming hardware was expensive
    and was typically customized for every game. Developers worked hand in hand with
    hardware creators, which resulted in very large, furniture-like, game cabinets.


    These large, all-in-one cabinets typically contained a monitor, a controller,
    and all of the internal electronics needed to run the game. Because these units
    were prohibitively expensive, however, the average person could not afford to
    buy one; so they were usually found only in video-game arcades. The cabinets were
    fitted with coin acceptors and people eagerly fed quarters into them to play the
    latest titles. Therefore, the root of the name for the “arcade” game style comes
    from the place where the games were originally played.


    Arcade owners quickly learned one thing: in order to recoup the high costs of
    buying the game machines, they needed as many players as possible to play each
    game. Today, people can play a single game for hours at a time. I have been known
    to log 10, 20, or even 30 hours into a *Final Fantasy* game. This type of hardcore
    gaming would have spelled doom for arcade owners at $0.25 per play.


    Arcade owners and game developers quickly realized that three minutes was the
    magic number. At an average game-time of three minutes, gamers felt they got their
    quarter’s worth, and arcade owners could move a lot of players through the game.


    Game developers now had to create games that a player could walk up to, understand
    the gameplay and objectives without any instruction, and stop playing after three
    minutes. Thus began the development of games that were addictive, had a clearly
    defined objective, and could be played in a relatively short amount of time. These
    are the origins of the arcade-style game.


    In the next section of this chapter, we discuss the game that you will develop
    in this book.


    ## Your Game: Prison Break


    In the book’s remaining chapters, you learn how to create an arcade-style game
    called Prison Break. Prison Break is a paddle game that involves deflecting the
    trajectory of a ball into a wall of bricks in order to break them. The game is
    loosely based on the game *Breakout* by Atari. *Breakout* was a very influential
    game in the early days of arcade gaming, and its addictive gameplay and easy-to-understand
    concept makes it a perfect example for this book.


    Prison Break contains all of the elements needed to build a good, game development
    knowledge base. You will learn about polygon and texture rendering, basic game
    physics, and collision detection. These are all concepts that you will undoubtedly
    use in other games.


    This book will walk you through the development of Prison Break in a natural order,
    from beginning to end. You will be provided with code samples and explanations
    for creating the game and playing it on your Android device. By the end of the
    book, you will have gained the knowledge you need to easily create other games
    based on the same concepts. [Figure 2-1](#9781430245452_Ch02.xhtml#Fig1) illustrates
    a scene from the completed Prison Break.


    ![9781430245452_Fig02-01.jpg](images/9781430245452_Fig02-01.jpg)


    [Figure 2-1](#9781430245452_Ch02.xhtml#_Fig1). A screenshot from the completed
    Prison Break


    To give you a clear idea of what lies ahead, the next section lays out the content
    and goals of the remaining chapters.


    ## In This Book…


    There are eight chapters in this book. And while the overall book may seem short
    in length, it is going to be packed with a lot of useful information. Each chapter
    aims to equip you with one key skill needed to complete the Prison Break game.
    What follows is a brief overview of the goals of our six remaining chapters.'
