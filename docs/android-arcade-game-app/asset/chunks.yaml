    ## 开始游戏\n\n玩家通过主菜单上的“开始”按钮来启动游戏。启动游戏时，会启动一个新的 Android Activity，该 Activity 控制所有游戏功能。为什么游戏要作为另一个新的\
    \ Activity 启动？\n"
- fmt: 'The game is launched as another `Activity` so that you, the game developer,
    have more flexibility in controlling the way your game is executed. If you want
    to add to your main menu other functions that are not tied directly to your game—for
    example, a configurator or tally board—this is a good way to keep your game from
    getting weighed down with superfluous code.


    `Listing 4-1` shows the `PBMainMenu` code that you started writing in [Chapter
    3](#9781430245452_Ch03.xhtml). The bolded code has been added to launch the `PBGame
    Activity`. Add this code to your `PBMainMenu`. You will create the `PBGame Activity`
    next.


    ```

    Listing 4-1\. PBMainMenu.java

    package com.jfdimarzio;

    import android.app.Activity;

    import android.content.Intent;

    import android.os.Bundle;

    import android.view.View;

    import android.view.View.OnClickListener;

    import android.widget.ImageButton;

    public class PBMainMenu extends Activity {

    /** Called when the activity is first created. */

    final PBGameVars engine = new PBGameVars();

    @Override

    public void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.main);

    PBGameVars.context = getApplicationContext();

    /** Set menu button options */

    ImageButton start = (ImageButton)findViewById(R.id.btnStart);

    ImageButton exit = (ImageButton)findViewById(R.id.btnExit);

    start.getBackground().setAlpha(PBGameVars.MENU_BUTTON_ALPHA);

    start.setHapticFeedbackEnabled(PBGameVars.HAPTIC_BUTTON_FEEDBACK);

    exit.getBackground().setAlpha(PBGameVars.MENU_BUTTON_ALPHA);

    exit.setHapticFeedbackEnabled(PBGameVars.HAPTIC_BUTTON_FEEDBACK);

    start.setOnClickListener(new OnClickListener(){

    @Override

    public void onClick(View v) {

    /** Start Game!!!! */

    Intent game = new Intent(getApplicationContext(),PBGame.class);

    PBMainMenu.this.startActivity(game);

    }

    });

    exit.setOnClickListener(new OnClickListener(){

    @Override

    public void onClick(View v) {

    int pid= android.os.Process.myPid();

    android.os.Process.killProcess(pid);

    }

    });

    }

    }

    ```


    Notice that when you click the `Start` button now, the code is telling `PBMainMenu`
    to launch the `PBGame Activity`. You do not have a `PBGame` yet. Let’s create
    one.


    Create a new `Activity` named `PBGame` in your `Prison Break` project. The `PBGame`
    is fairly simple as far as code is concerned. `PBGame` is going to set the content
    view of the `Activity` to the game renderer, and control the `onPause` and `onResume`
    events.


    **Note** Keep in mind that when I talk about `onPause` and `onResume`, these are
    not game functions; rather they are Android methods that are called when Android
    pauses or resumes your `Activity`.


    The code in your new `PBGame Activity` should look like that in `Listing 4-2`.


    ```

    Listing 4-2\. PBGame.java

    package com.jfdimarzio;

    import android.app.Activity;

    import android.os.Bundle;

    import android.view.MotionEvent;

    public class PBGame extends Activity {

    final PBGameVars gameEngine = new PBGameVars();

    private PBGameView gameView;

    @Override

    public void onCreate(Bundle savedInstanceState) {

    superonCreate(savedInstanceState);

    gameView = new PBGameView(this);

    setContentView(gameView);

    }

    @Override

    protected void onResume() {

    superonResume();

    gameView.onResume();

    }

    @Override

    protected void onPause() {

    superonPause();

    gameView.onPause();

    }

    }

    ```


    Notice that the `onCreate()` method sets the content view of the `Activity` to
    a new instance of `PBGameView`. `PBGameView` is a new class that extends `GLSurfaceView`.
    The next section of this chapter introduces you to the `GLSurfaceView` as you
    create the `PBGameView`.


    ## Creating the SurfaceView and Renderer


    In this section, you will create the `SurfaceView` and `Renderer` for your game.
    `PBGameView` is a simple Android class that extends the OpenGL `GLSurfaceView`.


    If you have never developed in OpenGL ES before, think of the `GLSurfaceView`
    as the canvas on which OpenGL draws your game. The `GLSurfaceView` is what Android
    displays to the screen. It cannot act alone, however. The `GLSurfaceView` needs
    a corresponding `GLSurfaceView Renderer` to render the game onto the surface.'
