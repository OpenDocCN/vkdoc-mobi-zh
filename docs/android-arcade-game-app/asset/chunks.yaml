  trans: "\n这会首先将行中剩余的砖块数量设置为该行的砖块总数。接着，在遍历碰撞检测方法的过程中，每检测到一个被销毁的砖块，就从该属性中减去 1。一旦该属性值达到\
    \ 0，就调用计分方法。\n\n```\nprivate void detectCollisions(){\n\nif(ball.posY <= 0){\n\
    \n//游戏结束\n\n}\n\nfor (int x = 0; x < wall.rows.length; x++)\n\n{\n\nfor(int y\
    \ = 0; y < wall.rows[x].bricks.length; y++)\n\n{\n\nif(!wall.rows[x].bricks[y].isDestroyed)\n\
    \n{\n\nif (((ball.posY > wall.rows[x].bricks[y].posY- .25f)\n\n&& (ball.posY <\
    \ wall.rows[x].bricks[y].posY)\n\n&& (ball.posX + .25f > wall.rows[x].bricks[y].posX)\n\
    \n&& (ball.posX < wall.rows[x].bricks[y].posX + 1.50f)))\n\n{\n\nwall.rows[x].bricks[y].isDestroyed\
    \ = true;\n\nwall.rows[x].numberOfBricksRemaining -=;\n\nPBGameVars.ballTargetY\
    \ = PBGameVars. ballTargetY * -1f;\n\nif(PBGameVars.ballTargetX == -2f){\n\nPBGameVars.ballTargetX\
    \ = 5f;\n\n}else{\n\nPBGameVars.ballTargetX = -2f;\n\n}\n\n}\n\n}\n\n}\n\nif(wall.rows[x].\
    \ numberOfBricksRemaining = 0 && wall. rows[x].rowIsScored == false){\n\nadvanceScore();\n\
    \nwall.rows[x].rowIsScored = true;\n\n}\n\n}\n\n...\n\n}\n```\n\n以上就是创建几种不同计分机制所需的全部内容。我相信，稍加思考，你就能实现一个更具创意的计分机制。\n\
    \n## 总结\n\n在本章中，你学习了如何创建三种不同的方式，让玩家能够追踪自己的得分并与其他玩家比较。这对于街机游戏至关重要，因为它能带给玩家更强的成就感。\n\
    \n在本书的下一章（也是最后一章）中，你将学习如何为《越狱》添加新的关卡。\n\n## 第 8 章：添加新关卡\n\n至此，你已经创建了一款功能完整的街机游戏。《越狱》可以作为许多其他游戏的模板，并且你在本简短的案例研究中所积累的知识将帮助你创建引人入胜的街机风格游戏。\n\
    \n然而，就目前而言，《越狱》仍然是一款相当简短的游戏。本章将带你了解为游戏添加关卡的理论。对于《越狱》——以及大多数街机游戏而言——有两种添加新关卡的方法。你可以将每个关卡硬编码到游戏中（*静态关卡*）；或者，你也可以编写游戏代码，使其从外部、可变的数据源读取关卡信息（*动态关卡*）。\n\
    \n让我们首先看看为游戏添加静态关卡背后的理论。\n\n### 添加静态关卡\n\n如果你为《越狱》添加有限数量的关卡（在已有的基础上），你就是在创建静态关卡。创建额外《越狱》关卡所需的大部分功能已经内置于游戏中。\n\
    \n首先，你应该为你的《越狱》项目创建并添加多个背景。这样，你就可以根据玩家选择的关卡调用相应的新背景。为了简化工作，请在 `PBGameVars` 中创建新的变量，以便调用新的背景图片。\n\
    \n接下来，在你的菜单上为关卡创建一个新按钮。以 第 3 章 为指南，添加一个新按钮及其监听器。然后，当玩家选择对应于他想玩的关卡的按钮时，像“开始”按钮现在所做的那样调用游戏活动；但同时，在\
    \ `PBGameVars` 中设置一个变量，类似于：\n\n```\nPBGameVars.levelSelected = 5;\n```\n\n现在，在\
    \ `PBGameRenderer` 中，你可以根据玩家选择的关卡来改变游戏加载。在游戏渲染器的加载方法中，你可以切换背景图片、加载不同数量的行、或者改变小球以对应不同的关卡。\n\
    \n### 添加动态关卡\n\n第二种选择，也是更耗费精力的方法，是修改游戏代码以支持动态创建关卡。修改代码以使用动态关卡将为玩家提供更丰富的体验，因为他们可以持续为游戏添加内容。实现这一点的关键在于使用基于\
    \ XML 的关卡定义文件。你创建一个类似于`代码清单 8-1` 所示的关卡定义文件，它告诉你的代码如何加载关卡。然后，利用这个定义文件，你就能创建出无限数量的关卡。\n\
    \n**代码清单 8-1. 关卡 XML**\n\n```\n<prisonbreaklevel>\n\n<levelnumber>5</levelnumber>\n\
    \n<levelbackground>background5.png</levelbackground>\n\n<levelwall>\n\n<numberofrows>6</numberofrows>\n\
    \n<levelwall>\n\n<levelball>\n\n<type>normal</type>\n\n</ prisonbreaklevel >\n\
    ```\n\n这个文件可以存储在网页服务器上，或者通过更新下载到游戏中并存储在 Android 数据库中。查看文件中的信息后，应该可以清楚地知道代码需要如何修改才能使用它。\n\
    \n在加载 `PBGameRenderer` 时，你的代码现在会打开并读取与玩家选择的关卡相对应的定义文件。然后将相应的定义文件选项加载到游戏中，并创建关卡。\n\
    \n## 总结\n\n在本章，也就是这本 Android 街机游戏专家案例研究的最后一章中，你学习了如何修改《越狱》的代码以支持创建多个关卡。\n\n我真诚地希望你享受本书，并希望它让你对使用\
    \ Android 平台创建游戏有了更深入的见解。\n\n## 索引\n\n![square1.jpg](img/square1.jpg) **A**\n\n\
    - Android 游戏开发\n- 街机游戏\n  - 开发\n  - 历史\n  - 集成开发环境 (IDE)\n  - 任天堂 Game Boy\n \
    \ - OpenGL ES\n  - 编程技能\n  - 优缺点\n- Android SDK\n- 街机游戏 (Arcade game)\n  - 起源\n\
    - 越狱 (Prison Break)\n  - 背景着色\n  - 碰撞检测与游戏内物理\n  - 游戏描述\n  - 游戏得分\n  - 添加关卡\n\
    \  - 创建菜单\n  - 创建玩家挡板和砖块\n  - 屏幕截图\n\n![square1.jpg](img/square1.jpg) **B**\n\n\
    - 背景 (Background)\n  - bg1.png\n  - 绘制代码\n  - 构造函数\n  - draw() 方法\n  - loadTexture()\n\
    \  - PBBackground 类代码\n  - 渲染后的背景\n  - 渲染器 (见 渲染器)\n  - 绘制步骤\n  - SurfaceView\n\
    - Ball 类\n- Brick 类\n\n![square1.jpg](img/square1.jpg) **C**\n\n- 碰撞检测 (Collision\
    \ detection)\n  - 创建\n    - ballTargetX 变量\n    - drawBricks() 方法\n    - 游戏结束场景，小球测试\n\
    \    - PBGameRenderer\n    - 完成的 PBGameRenderer\n  - 《越狱》中的碰撞检测\n  - 目的\n\n![square1.jpg](img/square1.jpg)\
    \ **D, E, F**\n\n- detectCollisions() 方法\n"
