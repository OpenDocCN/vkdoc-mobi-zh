  trans: '

    ## 第 3 章：创建菜单


    在本章中，您将学习如何为《越狱》游戏创建菜单系统。游戏菜单是主要入口点，负责引导玩家进入和退出《越狱》游戏。您将使用 Android SDK 创建用于开始和退出游戏的选项。


    ## 第 4 章：绘制背景


    第 4 章将教您如何为游戏创建背景并将其绘制到屏幕上。在此过程中，您将接触到 OpenGL ES 的诸多方面，包括渲染、纹理映射和顶点。虽然《越狱》游戏的背景是静态的，但它为您制作的每款游戏设定了主题，因此非常重要。


    ## 第 5 章：创建玩家挡板和砖块


    在第 5 章中，您将学习如何创建一个挡板，该挡板会根据玩家控制角色的方向在屏幕上移动。您还将添加用于击碎砖块的球。这涉及到在 Android 中使用触摸监听器和自定义类。


    在本章末尾，您将创建玩家角色需要冲破才能推进游戏的砖块。您将学习如何使用 Android 代码循环在屏幕上放置多个砖块，而无需手动绘制它们。


    ## 第 6 章：碰撞检测与游戏内物理


    第 6 章将引导您理解碰撞检测这一关键概念。碰撞检测的物理原理用于判断破砖球是否击中了砖块（或挡板）。然后，您将运用物理和数学知识，让球朝新的方向弹回，或者摧毁砖块。正是这种游戏内物理为您的游戏增添了真实感，使其玩起来趣味十足。


    ## 第 7 章：计分


    虽然计分功能可能被忽视并被认为是简单的，但对于许多街机风格的游戏来说，它非常重要。第 7 章将教您如何跟踪当前游戏分数，以及如何将分数保存到 Android
    内置的 MySQL 数据库中。


    ## 第 8 章：添加更多关卡


    在第 8 章中，您将学习如何为游戏添加关卡。设计街机风格游戏的一个激动人心的方面在于，您可以快速轻松地添加许多关卡——有时甚至数百个。您将应用前几章学到的知识来为您的游戏创建多个关卡。


    ## 本章小结


    在本章中，您了解了街机游戏的定义；对您将要创建的《越狱》游戏有了更多了解；并对本书剩余章节做了简要概述。


    在第 3 章中，您将开始编写游戏主菜单屏幕的代码。


    ## 第 3 章：创建菜单


    在本章中，您将为《越狱》游戏创建一个由两部分组成的菜单屏幕。菜单屏幕（如图 3-1 所示）由两个不同的“屏幕”组成，总共包含五个不同的图像。


    ![9781430245452_Fig03-01.jpg](img/9781430245452_Fig03-01.jpg)


    图 3-1. 《越狱》菜单屏幕


    在下一节中，您将了解为本章提供的代码需要做哪些准备。


    ### 准备工作


    在开始应用本章的代码之前，您需要做两件事来准备。首先，创建一个名为 `prisonbreak` 的新 Android 项目。该项目将保存本书中使用的所有代码和图像。


    其次，为您的《越狱》游戏收集或创建一些图像。在本章中，您总共需要五个图像：一个启动画面、两个不同的开始按钮状态和两个不同的退出按钮状态。我使用的图像如图 3-2
    至图 3-6 所示。


    ![9781430245452_Fig03-02.jpg](img/9781430245452_Fig03-02.jpg)


    图 3-2. prisonbreaksplash.png


    ![9781430245452_Fig03-03.jpg](img/9781430245452_Fig03-03.jpg)


    图 3-3. startbtn.png

