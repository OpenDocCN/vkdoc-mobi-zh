    your bricks. The class for the bricks is going to be a little different, however.
    Because you are going to use a spritesheet with the bricks class, you will not
    call `loadTexture()` the same way that you would with the background and the player
    paddle. Just to give you some perspective on how flexible the code can be, you
    are going to load all of the spritesheets into an array and pass them together.
