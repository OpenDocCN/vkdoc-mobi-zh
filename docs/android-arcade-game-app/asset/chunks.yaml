    Summary


    In this chapter, you learned how to create three different ways to let your player
    track and compare his score with that of other players. This is vital to arcade
    games because it gives your player a greater sense of accomplishment.


    In the next (and final) chapter of this book, you will learn how to add new levels
    to Prison Break.


    Chapter    8


    Adding New Levels


    At this point in the book, you have created a functional arcade game. Prison Break
    can be used as a template for many other games, and the knowledge that you built
    in this short case study will help you create compelling arcade-style games.


    As it stands, however, Prison Break is a rather short game. This chapter takes
    you through the theory of adding levels to the game. There are two ways you can
    add new levels to Prison Break—and most arcade games for that matter. You can
    hardcode each level into the game (*static leveling*); or you can write the game
    code in such a way that it reads the level information from an outside, changing
    source (*dynamic leveling*).


    Let’s first take a look at the theory behind adding static levels to your game.


    Adding Static Levels


    If you add a finite number of levels to Prison Break—beyond the one already supplied—you
    are creating static levels. Much of what you need to create additional Prison
    Break levels is already built into the game.


    First, you should create and add multiple backgrounds to your Prison Break project.
    This will allow you to call a new background corresponding to the level that the
    player chooses. To make your life easier, create new variables in the PBGameVars
    to help call the new background images.


    Next, create a new button for levels on your menu. Using [Chapter 3](#9781430245452_Ch03.xhtml)
    as a guide, add a new button and the listener for it. Then, when the player selects
    the button corresponding to the level he wants to play, call the game activity
    as the Start button does now; but also set a variable in the PBGameVars similar
    to


    PBGameVars.levelSelected = 5;


    In the PBGameRenderer, you can now change your game load based on the level the
    player selected. In the loading methods of the game renderer, you can swap out
    the background image, load a different number of rows, or change the ball to correspond
    to a different level.


    Adding Dynamic Levels


    A second option, and a far more labor-intensive one, is to modify the game code
    to accept the dynamic creation of levels. Modifying the code to use dynamic levels
    will give your players a more enhanced experience because they can continually
    add to the game. The key to doing something like this is to use an XML-based level
    definition sheet. You create a level definition sheet, like that shown in Listing
    8-1, which tells your code how to load up your level. Then, using this definition
    sheet, you are able to create an endless number of levels.


    `Listing 8-1\. Level XML`


    <prisonbreaklevel>


    <levelnumber>5</levelnumber>


    <levelbackground>background5.png</levelbackground>


    <levelwall>


    <numberofrows>6</numberofrows>


    <levelwall>


    <levelball>


    <type>normal</type>


    </ prisonbreaklevel >


    This sheet can be stored on a web server, or downloaded to the game via an update
    and stored in the Android database. Looking at the information in the sheet, it
    should be apparent how the code would need to be modified to use it.


    When loading the PBGameRenderer, your code now opens and reads the definition
    sheet that corresponds to the level that the player selected. The appropriate
    definition sheet options are then loaded into game, and the level is created.


    Summary


    In this, the final chapter of an expert case study on Android arcade games, you
    learned how to change the Prison Break code to accept the creation of multiple
    levels.


    I sincerely hope you enjoyed this book and that it gave you further insight into
    the creation of games using the Android platform.


