    `private ByteBuffer indexBuffer;`


    `private int[] textures` = `new int[1];`


    `private float vertices[]` = `{`


    `0.0f, 0.0f, 0.0f,`


    `1.5f, 0.0f, 0.0f,`


    `1.5f, .25f, 0.0f,`


