    \n## Chapter 7: Keeping Score\n\nIn the last chapter, you learned how to implement\
    \ a basic collision detection system in your Prison Break game. This collision\
    \ detection system allowed you to test for any collisions between the game ball\
    \ and the bricks or the paddle. It is now time to add the finishing touch to the\
    \ game.\n\nMost arcade-style games feature a scoring component. Whether it is\
    \ a direct score or a ranking that correlates to how a level was finished, the\
    \ score is what lets the player know how he played compared to other players.\n\
    \nIn this chapter, you take a look at two possible ways to keep score in Prison\
    \ Break. The first method adds a specific number of points to the player’s score\
    \ for each brick broken. The second method awards the player a number of points\
    \ for each complete row of bricks eliminated.\n\n### Creating the Scoring Method\n\
    \nTo keep score, you first need to add a new method to the `PBGameRenderer()`\
    \ that will track the player’s score. This method advances the score as you call\
    \ it.\n\nHow will the score be written out to the screen? You create three small\
    \ vertices following the methods outlined in [Chapter 4](#9781430245452_Ch04.xhtml)\
    \ and [Chapter 5](#9781430245452_Ch05.xhtml) for making the background, bricks,\
    \ ball, and paddle. Because we have gone through this procedure four times already,\
    \ it will not be repeated again here.\n\nCreate a new class called `PBScoreTile`\
    \ and place instances of it in the upper right-hand corner of your game screen.\
    \ Next, add to your project a new spritesheet that contains all of the numbers\
    \ needed to build a score. This spritesheet is shown in [Figure 7-1](#9781430245452_Ch07.xhtml#Fig1).\n\
    \n![9781430245452_Fig07-01.jpg](images/9781430245452_Fig07-01.jpg)\n\n[Figure\
    \ 7-1](#9781430245452_Ch07.xhtml#_Fig1).  ScoreNumbers Spritesheet\n\nEach tile\
    \ should default to the 0 when drawn. This is accomplished by performing a `glTranslatef()`\
    \ to the coordinates of 0,0,0 in the texture matrix.\n\n```java\ngl.glMatrixMode(GL10.GL_TEXTURE);\n\
    gl.glLoadIdentity();\ngl.glTranslatef(0.0f, 0.0f, 0.0f);\n```\n\nFor each point\
    \ scored, use `glTranslatef()` to move the spritesheet to the corresponding number.\
    \ This is best achieved in a loop that continues to add 1 to the current score,\
    \ move a 9 back to a 0 when needed, and advance to the next scoring tile. Therefore,\
    \ advance your score to the next number each time the method is called by using\
    \ `glTranslatef()` to move to the next 0.25 increment in the spritesheet.\n\n\
    The following is an example in pseudocode:\n\n```java\nprivate void advanceScore(){\n\
    ...\n//advance glTranslatef() to the next image in the sprite sheet\ngl.glMatrixMode(GL10.GL_TEXTURE);\n\
    gl.glLoadIdentity();\ngl.glTranslatef(0.0f, 0.0f, 0.0f);\n...\n}\n```\n\nWhen\
    \ you have your scoring method finished, it is time to call it.\n\nIn the next\
    \ section, you learn how to call it per brick.\n\n### Scoring per Brick\n\nIt\
