    请注意，现在当你点击 `Start` 按钮时，代码指示 `PBMainMenu` 启动 `PBGame Activity`。你目前还没有 `PBGame`，让我们创建一个。


    在你的 `Prison Break` 项目中创建一个名为 `PBGame` 的新 `Activity`。就代码而言，`PBGame` 相当简单。`PBGame`
    会将 `Activity` 的内容视图设置为游戏渲染器，并控制 `onPause` 和 `onResume` 事件。


    **注意** 请记住，当我提到 `onPause` 和 `onResume` 时，这些并非游戏功能函数，而是 Android 在暂停或恢复你的 `Activity`
    时调用的方法。


    你的新 `PBGame Activity` 中的代码应类似于 `清单 4-2` 所示。


    ```

    Listing 4-2\. PBGame.java

    package com.jfdimarzio;

    import android.app.Activity;

    import android.os.Bundle;

    import android.view.MotionEvent;

