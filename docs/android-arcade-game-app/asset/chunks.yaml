    \n**提示：** `rowIsScored`属性让你能够追踪是否已经为已清除的行奖励了分数。"
- fmt: "This will initially set the number of bricks remaining in the row to the total\
    \ number of bricks in the row. Then, as you iterate through your collision detection\
    \ method, you subtract 1 from this property for every destroyed brick. Once the\
    \ property reaches 0, you call your scoring method.\n\n```\nprivate void detectCollisions(){\n\
    \nif(ball.posY <= 0){\n\n//GameOver\n\n}\n\nfor (int x = 0; x < wall.rows.length;\
    \ x++)\n\n{\n\nfor(int y = 0; y < wall.rows[x].bricks.length; y++)\n\n{\n\nif(!wall.rows[x].bricks[y].isDestroyed)\n\
    \n{\n\nif (((ball.posY > wall.rows[x].bricks[y].posY- .25f)\n\n&& (ball.posY <\
    \ wall.rows[x].bricks[y].posY)\n\n&& (ball.posX + .25f > wall.rows[x].bricks[y].posX)\n\
    \n&& (ball.posX < wall.rows[x].bricks[y].posX + 1.50f)))\n\n{\n\nwall.rows[x].bricks[y].isDestroyed\
    \ = true;\n\nwall.rows[x].numberOfBricksRemaining -=;\n\nPBGameVars.ballTargetY\
    \ = PBGameVars. ballTargetY * -1f;\n\nif(PBGameVars.ballTargetX == -2f){\n\nPBGameVars.ballTargetX\
    \ = 5f;\n\n}else{\n\nPBGameVars.ballTargetX = -2f;\n\n}\n\n}\n\n}\n\n}\n\nif(wall.rows[x].\
    \ numberOfBricksRemaining = 0 && wall. rows[x].rowIsScored == false){\n\nadvanceScore();\n\
    \nwall.rows[x].rowIsScored = true;\n\n}\n\n}\n\n...\n\n}\n```\n\nThis is all that\
    \ is required to create a few different score-taking mechanisms. I am sure that,\
    \ with a little time, you can implement one that is even more creative.\n\n##\
    \ Summary\n\nIn this chapter, you learned how to create three different ways to\
    \ let your player track and compare his score with that of other players. This\
    \ is vital to arcade games because it gives your player a greater sense of accomplishment.\n\
    \nIn the next (and final) chapter of this book, you will learn how to add new\
    \ levels to Prison Break.\n\n## Chapter 8: Adding New Levels\n\nAt this point\
    \ in the book, you have created a functional arcade game. Prison Break can be\
    \ used as a template for many other games, and the knowledge that you built in\
    \ this short case study will help you create compelling arcade-style games.\n\n\
    As it stands, however, Prison Break is a rather short game. This chapter takes\
    \ you through the theory of adding levels to the game. There are two ways you\
    \ can add new levels to Prison Break—and most arcade games for that matter. You\
    \ can hardcode each level into the game (*static leveling*); or you can write\
    \ the game code in such a way that it reads the level information from an outside,\
    \ changing source (*dynamic leveling*).\n\nLet’s first take a look at the theory\
    \ behind adding static levels to your game.\n\n### Adding Static Levels\n\nIf\
    \ you add a finite number of levels to Prison Break—beyond the one already supplied—you\
    \ are creating static levels. Much of what you need to create additional Prison\
    \ Break levels is already built into the game.\n\nFirst, you should create and\
    \ add multiple backgrounds to your Prison Break project. This will allow you to\
    \ call a new background corresponding to the level that the player chooses. To\
    \ make your life easier, create new variables in the `PBGameVars` to help call\
    \ the new background images.\n\nNext, create a new button for levels on your menu.\
    \ Using [Chapter 3](#9781430245452_Ch03.xhtml) as a guide, add a new button and\
    \ the listener for it. Then, when the player selects the button corresponding\
    \ to the level he wants to play, call the game activity as the Start button does\
    \ now; but also set a variable in the `PBGameVars` similar to\n\n```\nPBGameVars.levelSelected\
    \ = 5;\n```\n\nIn the `PBGameRenderer`, you can now change your game load based\
    \ on the level the player selected. In the loading methods of the game renderer,\
    \ you can swap out the background image, load a different number of rows, or change\
    \ the ball to correspond to a different level.\n\n### Adding Dynamic Levels\n\n\
    A second option, and a far more labor-intensive one, is to modify the game code\
    \ to accept the dynamic creation of levels. Modifying the code to use dynamic\
    \ levels will give your players a more enhanced experience because they can continually\
    \ add to the game. The key to doing something like this is to use an XML-based\
    \ level definition sheet. You create a level definition sheet, like that shown\
    \ in `Listing 8-1`, which tells your code how to load up your level. Then, using\
    \ this definition sheet, you are able to create an endless number of levels.\n\
    \n**Listing 8-1. Level XML**\n\n```\n<prisonbreaklevel>\n\n<levelnumber>5</levelnumber>\n\
    \n<levelbackground>background5.png</levelbackground>\n\n<levelwall>\n\n<numberofrows>6</numberofrows>\n\
    \n<levelwall>\n\n<levelball>\n\n<type>normal</type>\n\n</ prisonbreaklevel >\n\
    ```\n\nThis sheet can be stored on a web server, or downloaded to the game via\
    \ an update and stored in the Android database. Looking at the information in\
    \ the sheet, it should be apparent how the code would need to be modified to use\
    \ it.\n\nWhen loading the `PBGameRenderer`, your code now opens and reads the\
    \ definition sheet that corresponds to the level that the player selected. The\
    \ appropriate definition sheet options are then loaded into game, and the level\
    \ is created.\n\n## Summary\n\nIn this, the final chapter of an expert case study\
    \ on Android arcade games, you learned how to change the Prison Break code to\
    \ accept the creation of multiple levels.\n\nI sincerely hope you enjoyed this\
    \ book and that it gave you further insight into the creation of games using the\
    \ Android platform.\n\n## Index\n\n![square1.jpg](images/square1.jpg) **A**\n\n\
