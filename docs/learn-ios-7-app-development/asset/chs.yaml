  \ 12-6 所示。选择 `Tab Bar Item - First` 对象，并使用属性检查器将其标题更改为“Welcome”，并将其图像设置为 `tab-info`。\n\
  \n![A978-1-4302-5063-0_12_Fig6_HTML.jpg](img/A978-1-4302-5063-0_12_Fig6_HTML.jpg)\n\
  \n*图 12-6. 配置一个标签栏项*\n\n> **注意：**  \n> 标签栏按钮的图像不会“原样”显示。你提供的图像用作模板，从图像的不透明像素创建一个轮廓。因此，不必费心为标签栏按钮图像设计漂亮的颜色，只有透明度才重要。\n\
  \n对于添加到标签栏的每个内容视图，你都将重复这些步骤。现在继续处理第一个标签的内容。\n\n## 第一个内容视图控制器\n\n第一个标签展示了一个基于 `UIViewController`\
  \ 的简单内容视图控制器。Xcode 模板已经创建了一个自定义视图控制器（`WLFirstViewController`）并将其附加为第一个标签的内容。这几乎完全符合你的要求，所以清空它并打造成你自己的。\n\
  \n选择 `Main_iPad.storyboard`（或 `_iPhone`）文件。双击画布中的第一个视图控制器（右上角）以使其成为焦点。视图中已经包含一些标签和文本视图对象。选择它们并删除。\n\
  \n> **注意：**  \n> 你将先从编辑 iPad 版本的界面开始，主要是为了演示一些 iPad 独有的功能。稍后我将切换到 iPhone 版本，因为它更容易查看。开发两个界面的步骤是相同的。因此，除了少数\
  \ iPad 特有的部分外，请按照步骤使用 iPad 或 iPhone 界面进行开发。要开发另一个版本，请返回并再次执行相同的步骤。\n\n使用对象库，添加两个标签和一个图像视图对象。使用属性检查器和尺寸检查器，按如下方式设置它们的属性：\n\
  \n- **第一个标签**  \n  文本：`Alice’s Adventures in Wonderland`  \n  字体：`System 30.0` (iPad),\
  \ `System 16.0` (iPhone)\n- **第二个标签**  \n  文本：`by Lewis Carroll`  \n  字体：`System\
  \ 20.0` (iPad), `System 13.0` (iPhone)\n- **图像视图**  \n  图像：`info-alice`  \n  模式：`Aspect\
  \ Fit`  \n  尺寸：`480` x `480` (iPad), `320` x `320` (iPhone)\n\n> **提示：**  \n> 更改对象的文本、字体或图像后，如果其内容不再完全适合其尺寸，请选中它，并使用\
  \ **Editor** ➤ **Size to Fit Contents**（**编辑器** ➤ **使内容适配尺寸**）命令。它会调整对象的大小，使其与其包含的图像或文本尺寸完全一致。\n\
  \n排列这些视图，使其看起来类似于图 12-7 中的样子。你将添加一个“信息”按钮，并让它呈现一个模态视图控制器。首先添加按钮。将一个 `Button` 对象拖入你的界面。使用属性检查器将类型更改为\
  \ `Info Dark`，并将其定位在“by Lewis Carroll”标签的右侧，如图 12-7 所示。\n\n![A978-1-4302-5063-0_12_Fig7_HTML.jpg](img/A978-1-4302-5063-0_12_Fig7_HTML.jpg)\n\
  \n*图 12-7. 创建第一个视图控制器界面*\n\n\n\n### 呈现模态视图控制器\n\n要呈现一个视图控制器，你需要一个视图控制器来呈现它。从对象库中，拖拽一个普通视图控制器对象，将其放置在第一个视图控制器的右侧。\n\
  \n通过右键/按住 Control 键点击深灰色信息按钮，然后拖拽到你刚刚添加的视图控制器上，即可创建一个模态过渡，如图 12-8 所示。松开鼠标后，从样式列表中选择\
  \ `modal`。\n\n![A978-1-4302-5063-0_12_Fig8_HTML.jpg](img/A978-1-4302-5063-0_12_Fig8_HTML.jpg)\n\
  \n图 12-8. 创建模态转场\n\n刚才发生的事情是这样的：Interface Builder 已将按钮连接到一个为此目的创建的 Storyboard 转场。该转场被配置为执行模态过渡。如果通过编程方式实现，你需要将按钮连接到自己的操作方法，该方法会向第一个视图控制器发送一条\
  \ `-presentViewController:animated:completed:` 消息。使用 Storyboard 转场可以省去创建操作和编写代码的步骤。\n\
  \n点击转场连线或连线中间的圆圈来选中该 Storyboard 转场，如图 12-9 所示。使用属性检查器，将呈现样式更改为 `Form Sheet`，过渡样式更改为\
  \ `Flip Horizontal`。\n\n![A978-1-4302-5063-0_12_Fig9_HTML.jpg](img/A978-1-4302-5063-0_12_Fig9_HTML.jpg)\n\
  \n图 12-9. 编辑转场\n\n现在，在新视图控制器中添加一些内容。从对象库中拖入一个图像视图和一个文本视图对象。将文本视图的文本（使用 Option+Return\
  \ 插入回车符）设置为：\n\n> 刘易斯·卡罗尔，又名查尔斯·路特维奇·道奇森，1832 年 1 月 27 日 – 1898 年 1 月 14 日\n\n将字段的对齐方式设置为居中（中间按钮），并取消勾选\
  \ `Editable` 行为。然后选择图像视图，将其图片属性更改为 `info-charles`。选择文本字段对象，然后选择 编辑器 ➤ 适应内容大小。对图片对象重复此操作。（如果你正在开发\
  \ iPhone 版本，请选择图像视图并将其大小设置为 `164`x`244`。）将两者都放置在视图底部附近，如图 12-10 所示。\n\n![A978-1-4302-5063-0_12_Fig10_HTML.jpg](img/A978-1-4302-5063-0_12_Fig10_HTML.jpg)\n\
  \n图 12-10. 创建作者信息视图\n\n将项目的 Scheme 设置为使用 iPad 模拟器并运行项目。第一个视图控制器会在你应用的第一个标签页中显示。点击灰色信息按钮会触发到你刚刚创建的视图控制器的过渡，使其以悬浮在屏幕上的“表单页面”形式出现。是不是很酷？\n\
  \n如果应用现在不被卡住，那就更酷了。当模态呈现一个视图控制器时，你有责任提供能将用户返回到上一个视图控制器的界面。现在就添加这个功能。\n\n### 关闭视图控制器\n\
  \n呈现视图控制器的控制器通常负责关闭它。你在 DrumDub 和 MyStuff 应用中已经做过这个操作。你呈现了一个模态选择器视图控制器，允许用户选择图片或歌曲。当操作完成后，它会通过代理消息将选择结果发送给你的视图控制器。该方法获取图片/歌曲后，向自身发送一条\
  \ `-dismissViewControllerAnimated:completion:` 消息，导致选择器界面收起。\n\n如果你的模态视图控制器执行类似的操作（例如，让用户选择要入侵的行星，或保龄球的图案），你可以创建一个代理协议——我在第\
  \ 20 章中解释了如何操作——并在模态视图控制器完成时发送一条完成消息。然后，呈现视图控制器会将其关闭。\n\n然而，这听起来工作量很大，而我很喜欢少干活。在这种情况下，没有需要回传给呈现控制器的信息。你只希望模态视图控制器消失。对此，有一个简单的解决方案。\n\
  \n在项目导航器中，创建一个新的 Objective-C 源文件（文件 ➤ 新建文件...）。基于 Objective-C 类模板。将其命名为 `WLAuthorInfoViewController`。使其成为\
  \ `UIViewController` 的子类。确保未勾选`附带 XIB 用户界面`选项。创建新文件。\n\n注意\n\n你不需要为你的新类创建 XIB（Interface\
  \ Builder）文件，因为你已经在 Storyboard 文件中为它创建了一个。\n\n选择 `WLAuthorInfoViewController.h`\
  \ 接口文件。在 `@interface` 部分，添加一个操作方法声明：\n\n```\n- (IBAction)done:(id)sender;\n```\n\
  \n在 `WLAuthorInfoViewController.m` 实现文件中，将方法添加到 `@implementation` 部分：\n\n```\n-\
  \ (IBAction)done:(id)sender\n{\n  [self.presentingViewController dismissViewControllerAnimated:YES\n\
  \   completion:nil];\n}\n```\n\n返回 `Main_iPad.storyboard` 文件。选择你刚创建的视图控制器场景中的视图控制器（通过点击大纲视图或场景底部\
  \ Dock 中的视图控制器对象），并使用身份检查器将其类从 `UIViewController` 更改为 `WLAuthorInfoViewController`。向界面添加一个按钮，并将其标题更改为“Done”。（对于\
  \ iPhone 界面，你可能需要稍微重新排列视图。）右键/按住 Control 键从按钮拖拽到视图控制器的占位符对象，如图 12-11 所示。将按钮连接到 `-done:`\
  \ 操作。使用 Storyboard 时，每个场景的关键视图控制器对象方便地位于该场景下方以及大纲视图中。\n\n![A978-1-4302-5063-0_12_Fig11_HTML.jpg](img/A978-1-4302-5063-0_12_Fig11_HTML.jpg)\n\
  \n图 12-11. 连接“Done”按钮\n\n再次运行项目。点击信息按钮，模态视图控制器出现。点击“done”按钮，它又会消失。它是如何工作的？很简单。\n\
  \n当一个视图控制器呈现另一个视图控制器时，会形成一种关系。初始视图控制器的 `presentedViewController` 属性被设置为其刚刚呈现的视图控制器。被呈现视图控制器的\
  \ `presentingViewController` 属性则被反射性地设置为其呈现视图控制器。`-done:` 方法只是从其 `presentingViewController`\
  \ 属性中获取呈现它的视图控制器，并代表该对象发送一条 `-dismissViewControllerAnimated:completed:` 消息。\n\n\
  “表单页面”呈现样式仅适用于 iPad。iPhone 版本的转场甚至没有呈现属性。由于这是一个关于书籍的应用，并且你希望两个版本（iPhone 和 iPad）都能类似工作，请选择一种在两个设备上都有效且更具主题性的模态呈现样式。\n\
  \n\n\n返回`Main_iPad.storyboard`文件，并选择信息按钮与作者信息视图控制器之间的故事板转场。使用属性检查器，将呈现方式改为`Default`，转场方式改为`Partial\
  \ Curl`。如果你在 iPhone 界面中，只需将转场设置为`Partial Curl`。\n\n注意\n\n当你更改转场的呈现样式时，Interface\
  \ Builder 会调整视图控制器的布局大小，以匹配其对呈现时界面大小的最佳预估。你可能需要重新排列视图对象，使其仍位于视图底部。使用`Editor` ➤ `Pin`\
  \ ➤ `Height/Width`命令固定图像视图的大小，使用`Editor` ➤ `Pin` ➤ `Height`命令固定文本视图的高度。添加这些约束后，在作者信息视图控制器中选择`Editor`\
  \ ➤ `Resolve Auto Layout Issues` ➤ `Add Missing Constraints`，以建立其余的布局。\n\n再次运行应用。现在点击信息按钮，观察效果，如图\
  \ 12-12 所示。效果相当炫酷！这个效果同时适用于 iPad 和 iPhone，如图 12-12 右侧所示。\n\n![A978-1-4302-5063-0_12_Fig12_HTML.jpg](img/A978-1-4302-5063-0_12_Fig12_HTML.jpg)\n\
  \n图 12-12. iPad 和 iPhone 的`Partial Curl`转场\n\n恭喜！你的 Wonderland 应用的前三分之一已经完成。你创建了一个自定义视图控制器，用于模态呈现第二个视图控制器，并编写了必要的代码，在视图控制器完成时将其关闭。有许多不同的转场样式可供选择，但模态呈现和关闭视图控制器的基本公式保持不变。现在你可以继续处理第二个标签页了。\n\
  \n## 创建可导航的表格视图\n\nWonderland 应用的第二个标签页在表格视图中显示一个角色列表。点击某行会导航到一个包含角色详细信息的屏幕。这听起来熟悉吗？确实如此。你已经在第\
  \ 5 章中构建过这个应用。好吧，你将再次构建它。但这次的重点是导航。\n\n从第 5 章可知，你需要：\n\n*   一个导航视图控制器\n*   一个`UITableViewController`的自定义子类（用于表格视图）\n\
  *   一个数据模型\n*   一个表格视图代理对象\n*   一个数据源对象\n*   一个表格视图单元格对象\n*   一个`UIViewController`的自定义子类（用于详细视图）\n\
  *   用于显示详细视图的视图对象\n\n从导航视图控制器开始。导航视图控制器是一个容器视图控制器。它初始显示的视图是其根视图控制器。这个视图是它的主基地；所有导航都从这里开始，并最终返回这里。为了让\
  \ Wonderland 应用的第二个标签页呈现一个可导航的表格视图，你需要在标签栏中安装一个导航控制器作为第二个视图控制器，然后在导航控制器中安装一个表格视图控制器作为根视图控制器。这比听起来要简单。\n\
  \n首先，清理一些空间。选择`Main_iPhone.storyboard`（或`_iPad`）文件。一个`WLSecondViewController`已经占据了第二个标签页。你不需要它。在\
  \ Interface Builder 画布中选择第二个视图控制器场景并删除它。然后删除`WLSecondViewController.h`和`WLSecondViewController.m`文件。\n\
  \n注意\n\n此时我将切换到 iPhone 界面，以便插图更清晰。如果你想继续开发 iPad 界面，也可以。或者，你可以在 iPhone 故事板中重复 iPad\
  \ 界面的更改并继续使用。由你决定。\n\n从对象库中，拖入一个导航控制器，并将其放置在第一个视图控制器的下方，如图 12-13 所示。一个新的导航控制器已经预装了一个表格视图控制器，这正是你所需要的。（看，我告诉过你这不会太难。）你还需要一个详细视图，因此再往表格视图旁边拖入一个视图控制器对象。\n\
  \n![A978-1-4302-5063-0_12_Fig13_HTML.jpg](img/A978-1-4302-5063-0_12_Fig13_HTML.jpg)\n\
  \n图 12-13. 添加导航控制器、表格视图控制器和视图控制器\n\n要将导航控制器添加到标签栏，请右键/按住 Control 键从标签栏控制器拖动到导航控制器，如图\
  \ 12-14 所示。当弹出菜单出现时，找到`Relationship Segue`类别并选择`view controllers`。这个特殊连接会将该视图控制器添加到容器视图控制器管理的控制器集合中。标签视图中会出现第二个标签页，并且一个配套的标签栏项对象会被添加到导航控制器的场景中。\n\
  \n![A978-1-4302-5063-0_12_Fig14_HTML.jpg](img/A978-1-4302-5063-0_12_Fig14_HTML.jpg)\n\
  \n图 12-14. 将导航控制器设为第二个标签页\n\n展开导航控制器大纲中的`Navigation Controller`组，选择标签栏项。使用属性检查器将标题设置为“Characters”，图像设置为`tab-chars`。\n\
  \n现在，你已向标签栏（容器视图）控制器添加了一个可导航的表格视图。它是第二个标签页，拥有标题和图标。点击它将呈现导航（容器视图）控制器内部的表格（内容）视图控制器。听起来很复杂，但故事板使组织变得简单易懂。\n\
  \n### 为表格视图注入数据\n\n你现在可以运行应用，点击`Characters`标签页，然后惊叹于表格视图的空旷。从第 5 章可知，如果没有数据源和一些数据，表格视图将无内容可显示。现在我们来处理这个问题。\n\
  \n你将需要一个`UITableViewController`的自定义子类，因此创建一个。你也知道需要为详细视图创建一个`UIViewController`的自定义子类。既然在操作，不妨也创建它：\n\
  \n在项目的 Wonderland 组中，添加一个新文件。使用 iOS ➤ Cocoa Touch ➤ Objective-C 类模板。将类命名为`WLCharacterTableViewController`，设为`UITableViewController`的子类，不要为新控制器创建\
  \ XIB 文件。\n\n再添加一个新文件：使用 Objective-C 类模板。将类命名为`WLCharacterDetailViewController`，设为`UIViewController`的子类，不要为新控制器创建\
  \ XIB 文件。\n\n注意\n\n视图控制器可以从单独的 XIB 文件或故事板文件中的场景加载其界面，但不能同时从两者加载。对于本项目，你使用的是故事板文件。\n\
  \n回顾一下让表格视图工作所需完成的任务列表，你现在有了导航控制器以及表格视图控制器和视图控制器的自定义子类。但界面中的对象还不是你的自定义子类。选择`Main_iPhone.storyboard`（或`_iPad`）文件，选择表格视图控制器，使用身份检查器将其类更改为`WLCharacterTableViewController`。对详细视图控制器执行相同操作，将其类更改为`WLCharacterDetailViewController`。\n\
  \n\n\n### 创建详情视图\n\n由于您已经在角色详情视图控制器中，请继续创建其界面。使用对象库向角色详情视图控制器添加一个标签、一个图像视图和一个文本视图，操作如下：\n\
