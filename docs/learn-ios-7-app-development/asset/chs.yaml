  \ 和 `WLSecondViewController`。\n\n![A978-1-4302-5063-0_12_Fig3_HTML.jpg](img/A978-1-4302-5063-0_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 起始标签栏配置\n\n要使用标签栏，你必须为每个标签提供一对对象：一个要显示的视图控制器和一个标签栏项（`UITabBarItem`），后者用于配置屏幕底部该标签的按钮。每个标签栏项定义了一个标题和一个图标。图标听起来很像资源文件，所以我们就从这里开始。\n\
  \n\n好的，身为高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，将以下英文文本翻译成中文。\n\n\n### 添加仙境项目的资源\n\n我将让你“稍微”偷个懒，一次性添加本项目所需的所有资源。这样可以避免在开发本章中的每个界面时重复执行这些步骤。现在先全部添加进来，后续用到时我再逐一解释。\n\
  \n在之前的项目中，我让你将单个资源文件添加到项目导航器中的主顶层组（文件夹图标）或`Images.xcasset`资源目录中。本项目的资源文件数量较多，我将让你创建子组，以便管理。组织项目源文件有三种方式：\n\
  \n*   创建一个子组，然后在该组中创建或添加新文件\n*   导入源文件的文件夹，并让 Xcode 为每个文件夹创建组\n*   等到导航器中文件过多、杂乱不堪时再决定整理它们\n\
  \n若要使用第一种或最后一种方法，请使用 **File** ➤ **New Group**（**文件** ➤ **新建组**）命令（或在项目导航器中右键/按住\
  \ Control 键点击）创建一个新的子组。命名新组，然后导入资源文件、创建新源文件或将现有文件拖入其中。开发人员通常按文件类型（所有数据文件放在一个组，类源文件放在另一个组）或按功能单元（一个表格的所有源文件和资源文件放在一个组）来组织组。这取决于个人风格和偏好。\n\
  \n> **提示：**  \n> 如果你决定使用最后一种方法（这也是我个人最喜欢的方法），请使用 **File** ➤ **New Group from Selection**（**文件**\
  \ ➤ **从所选内容新建组**）命令。选择要组织到一个组中的文件，然后选择 **New Group from Selection**（**从所选内容新建组**）。它会创建一个新的子组，并一步将所有选定项移入其中。\n\
  \n当你一次导入大量资源文件时，中间那种方法会很方便。找到 `Learn iOS Development Projects` ➤ `Ch 12` ➤ `Wonderland\
  \ (Resources)` 文件夹。这些资源文件已被组织到子文件夹中：`Data Resources`、`Character Images`、`Info Images`\
  \ 和 `Tab Images`。与其将单个文件拖入项目导航器，不如将文件夹拖入项目，一次性导入所有资源文件。先从 `Data Resources` 文件夹中的数据（非图像）文件开始。将该文件夹拖放到\
  \ `Wonderland` 组中，如图 12-4 所示。\n\n![A978-1-4302-5063-0_12_Fig4_HTML.jpg](img/A978-1-4302-5063-0_12_Fig4_HTML.jpg)\n\
  \n*图 12-4. 添加一个资源文件文件夹*\n\n当导入对话框出现时，确保选中了 `Create groups for any added folders`（为添加的文件夹创建组）选项。这会将每个文件夹中的资源文件变成一个组，如图\
  \ 12-4 右侧所示。\n\n要对你的图像执行类似操作，请选择 `Images.xcassets` 资源目录项，然后将所有三个图像文件夹（`Character\
  \ Images`、`Info Images` 和 `Tab Images`）拖入目录的组列中，如图 12-5 所示。这将自动创建三个图像组，如图 12-5 右侧所示。\n\
  \n![A978-1-4302-5063-0_12_Fig5_HTML.jpg](img/A978-1-4302-5063-0_12_Fig5_HTML.jpg)\n\
  \n*图 12-5. 导入图像文件组*\n\n为了保持整洁，让我们丢弃一些不需要的残留文件。在资源目录中选择 `first` 和 `second` 图像集。按住\
  \ Command 键的同时按下 Delete 键（或选择 **Edit** ➤ **Delete**（**编辑** ➤ **删除**））将这些项从项目中移除。\n\
  \n> **注意：**  \n> 你还会在 `Wonderland (Icons)` 文件夹中找到一些应用图标。如果你愿意，可以将它们拖入 `AppIcon`\
  \ 图像集。\n\n### 配置标签栏项\n\n现在你已拥有所有资源，可以为第一个标签配置标签栏了。标签栏中的每个标签按钮都是通过与其视图控制器关联的 `UITabBarItem`\
