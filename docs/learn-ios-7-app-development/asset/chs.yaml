  \ Outlet 将出现在检查器中。将 `shortenButton` Outlet 连接到左侧按钮，将 `shortLabel` Outlet 连接到中间按钮，将\
  \ `clipboardButton` Outlet 连接到右侧按钮，如图 3-24 所示。\n\n![A978-1-4302-5063-0_3_Fig24_HTML.jpg](img/A978-1-4302-5063-0_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 将 Outlet 连接到工具栏按钮\n\n## 设计 URL 缩短代码\n\n界面完成后，是时候卷起袖子编写代码来实现这个功能了。以下是你的应用应有的行为方式：\n\
  \n*   用户在文本字段中输入一个 URL 并点击 `Go`。网页视图加载该 URL 对应的网页并进行显示。\n*   当页面成功加载后，会发生两件事：\n\
  *   URL 字段会更新，以反映实际加载的 URL。\n*   “缩短 URL”按钮变为可用，允许用户点击它。\n*   当用户点击“缩短 URL”按钮时，会向\
  \ URL 缩短服务发送一个请求。\n*   当 URL 缩短服务发送其响应后，会发生两件事：\n*   缩短后的 URL 会显示在工具栏中。\n*   “复制到剪贴板”按钮变为可用，允许用户点击它。\n\
  *   当用户点击“复制到剪贴板”按钮时，短 URL 会被复制到 iOS 剪贴板。\n\n你已经可以大致看出大部分功能是如何工作的。“缩短 URL”和“复制到剪贴板”按钮对象将连接到执行这些功能的\
  \ Action。你刚才创建的 Outlet 将允许你的代码改变它们的状态，例如在它们准备就绪时启用这些按钮。\n\n这些步骤之间的环节稍微有些神秘。“当页面成功加载后”这一点可以理解，但你的应用如何知道网页何时加载完毕，或者是否加载成功？同样的问题也适用于“当\
  \ URL 缩短服务发送其响应时”。这是什么时候发生的？这些问题的答案可以在多任务处理和委托中找到。\n\n你可能会问“多什么”？多任务处理就是同时做多件事。通常，你编写的代码一次只做一件事，在第一件事完成之前不会执行下一件事。然而，有一些技术可以让你的应用触发一个代码块并行执行，从而使两个代码块或多或少地同时运行。这在第\
  \ 24 章中有更详细的解释。在你的应用中已经用到了这一点，你可能没有意识到：\n\n```\n[self.webView loadRequest:[NSURLRequest\
  \ requestWithURL:url]];\n```\n\n你发送给网页视图对象的 `-loadRequest:` 消息并没有加载 URL；它只是启动了加载\
  \ URL 的过程。这个方法的调用会立即返回，你的代码会继续执行其他操作。这被称为异步方法。你想要持续执行的操作之一就是响应用户的触摸事件——这在第 4 章中会介绍。这一点很重要，因为它能保持应用的响应性。\n\
  \n与此同时，属于 `UIWebView` 类的代码开始独立运行，悄悄地向网络服务器发送请求，收集并解释响应，最终在网页视图中显示渲染好的页面。这通常被称为后台线程或后台任务，因为它在你的主应用（称为前台线程）之外，安静且独立地完成工作。\n\
  \n\n\n### 成为 Web 视图委托\n\n所有这些多任务处理理论都很有价值，但仍然没有回答你的应用如何知道网页是否加载完成的问题。任务之间有多种通信方式，其中之一便是使用委托。委托是一个对象，它同意为另一个对象承担某些决策或任务，或者在特定事件发生时希望收到通知。本应用将用到委托的最后一个特性——事件通知。\n\
  \nWeb 视图类有一个 `delegate` 出口，你需要将其连接到将要成为其委托的对象上。委托是 iOS 中一种常用的编程模式。如果你翻阅 Cocoa Touch\
  \ 库，会发现很多类都包含 `delegate` 出口。第 6 章 将详细讨论委托。\n\n成为委托需要三个步骤：\n\n- 在自定义类中，采用委托的协议（protocol）。\n\
  - 实现相应的协议方法。\n- 将对象的 `delegate` 出口连接到你的委托对象上。\n\n协议是一种契约或承诺，声明你的类将实现特定的方法。这可以让其他对象知道你的对象已同意承担某些责任。协议可以声明两种方法：必需（required）方法和可选（optional）方法。所有必需方法都必须包含在你的类实现中。如果遗漏了任何一个，你就违反了契约，项目将无法编译。\n\
  \n你可以自行决定实现哪些可选方法。如果实现了某个可选方法，你的对象就会收到该消息；如果没有实现，则不会收到。就是这么简单。大多数委托方法都是可选的。\n\n\
  **提示**\n\n一些较旧的类依赖于所谓的非正式协议（informal protocol）。它实际上并不是真正的协议，而是一组文档化的方法，期望你的委托去实现。类的文档会说明你应该使用哪些方法。使用非正式协议的所有步骤与正式协议相同，只是没有正式的协议名称需要添加到你的类中。\n\
  \n第一步是决定哪个对象将充当委托，并采用相应的协议。选择你的 `SUViewController.h` 文件，修改声明类的代码行，使其如下所示：\n\n`@interface\
  \ SUViewController : UIViewController <UIWebViewDelegate>`\n\n修改的内容是在类声明的末尾添加了 `<UIWebViewDelegate>`，放在小于号和大于号之间，有时也称为“尖括号”。将此内容添加到你的类定义中，意味着你的类同意处理\
  \ `UIWebViewDelegate` 协议中列出的消息，并准备连接到 `UIWebView` 的 `delegate` 出口。\n\n查阅 `UIWebViewDelegate`\
  \ 协议，你会发现它列出了四个方法，全部都是可选的：\n\n```\n- (BOOL)webView:(UIWebView *)webView shouldStartLoadWithRequest:(NSURLRequest\
  \ *)request navigationType:(UIWebViewNavigationType)navigationType;\n- (void)webViewDidStartLoad:(UIWebView\
  \ *)webView;\n- (void)webViewDidFinishLoad:(UIWebView *)webView;\n- (void)webView:(UIWebView\
  \ *)webView didFailLoadWithError:(NSError *)error;\n```\n\n第一个方法 `-webView:shouldStartLoadingWithRequest:navigationType:`\
  \ 会在用户点击链接时发送给委托。它允许你的委托决定是否应该加载该链接。例如，你可以创建一个让用户始终停留在特定网站（如学校日历）的浏览器。你的委托可以阻止任何跳转到其他网站的链接，或者至少警告用户即将离开当前站点。本应用不需要做类似的事情，因此可以忽略这个方法。如果不实现此方法，Web\
  \ 视图将允许用户点击并跟踪他们想要的任何链接。\n\n接下来的三个方法才是你感兴趣的。`-webViewDidStartLoad:` 在网页开始加载时发送给委托。`-webViewDidFinishLoad:`\
  \ 在加载完成时发送。最后，`-webView:didFailLoadWithError:` 在页面因某种原因无法加载时发送。\n\n你需要实现这三个方法。先从第一个开始。选择你的\
  \ `SUViewController.m`（实现）文件，找一个位置添加此方法：\n\n```\n- (void)webViewDidStartLoad:(UIWebView\
  \ *)webView\n{\n    self.shortenButton.enabled = NO;\n}\n```\n\n当网页开始加载时，此方法会禁用（通过将\
  \ `enabled` 属性设置为 `NO`）缩短 URL 的按钮。这样做只是为了防止短 URL 按钮在页面切换过程中被触发，同时也是因为我们还不确定页面能否成功加载。你希望将\
  \ URL 缩短功能仅限于已知有效的 URL。\n\n在该方法下方，添加此方法：\n\n```\n- (void)webViewDidFinishLoad:(UIWebView\
  \ *)webView\n{\n    self.shortenButton.enabled = YES;\n    self.urlField.text =\
  \ webView.request.URL.absoluteString;\n}\n```\n\n此方法在网页加载完成后被调用。第一行使用你之前创建的 `shortenButton`\
  \ 出口来启用“缩短 URL”按钮。因此，一旦网页加载完成，将其转换为短 URL 的按钮就会变为可用状态。\n\n第二行解决了我在前面“调试”部分提到的一个问题。你希望屏幕顶部文本字段中的\
  \ URL 能够反映用户在 Web 视图中查看的页面。这段代码使两者保持同步。网页加载完成后，此行代码深入 `webView` 对象，找到实际加载的 URL。`request`\
  \ 属性（一个 `NSURLRequest` 对象）包含一个 `URL` 属性（一个 `NSURL` 对象），该属性又有一个名为 `absoluteString`\
  \ 的属性。该属性返回一个描述完整 URL 的纯字符串对象（`NSString`）。简而言之，它将 URL 转换为字符串，这与你在 `-loadLocation:`\
  \ 中所做的操作相反。剩下要做的就是将其赋值给 `urlField` 对象的 `text` 属性，于是新的 URL 就会出现在文本字段中。\n\n最后一个方法仅在网页无法加载时被调用。讽刺的是，这是最复杂的方法，因为我们希望花时间告诉用户页面无法加载的原因，而不是让他们去猜测。代码如下：\n\
  \n```\n- (void)webView:(UIWebView *)webView didFailLoadWithError:(NSError *)error\n\
  {\n    NSString *message = [NSString stringWithFormat:\n        @\"尝试加载此页面时出现问题：%@\"\
  ,\n        error.localizedDescription];\n    UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"无法加载 URL\"\n        message:message\n        delegate:nil\n\
  \        cancelButtonTitle:@\"真遗憾\"\n        otherButtonTitles:nil];\n    [alert\
  \ show];\n}\n```\n\n第一条语句创建了一条消息，内容为“尝试加载此页面时出现问题：”，并包含了 Web 视图随此消息发送的 `error` 对象中的问题描述。接下来两条语句创建了一个警告视图（一个弹出对话框），向用户呈现该消息。\n\
  \n至此，你已经完成了将 `SUViewController` 对象变成 Web 视图委托所需的所有操作，但它还不是真正的委托。最后一步是将 Web 视图连接到它。选择\
  \ `Main_iPhone.storyboard` 文件。按住 Control 键，从 Web 视图对象拖拽到视图控制器。松开鼠标按钮时，选择 `delegate`\
  \ 出口，如图 3-25 所示。\n\n![A978-1-4302-5063-0_3_Fig25_HTML.jpg](img/A978-1-4302-5063-0_3_Fig25_HTML.jpg)\n\
  \n**图 3-25. 连接 Web 视图委托**\n\n\n\n`SUViewController` 对象现在是 Web 视图的委托对象。当 Web 视图执行操作时，你的委托会收到关于其进度的消息。你可以在模拟器中看到这一运作过程。运行你的应用，访问一个\
  \ URL（图 3-26 中的示例使用了 `http://developer.apple.com`），然后在 Web 视图中点击一两个链接。每加载一个页面，文本字段中的\
  \ URL 都会更新。\n\n![A978-1-4302-5063-0_3_Fig26_HTML.jpg](img/A978-1-4302-5063-0_3_Fig26_HTML.jpg)\n\
  \n图 3-26. 跟随链接时的 URL 字段\n\n**提示**\n\n也可以尝试输入一个无效的域名或不存在的路径来加载无法加载的 URL，如图 3-26 所示。测试你的应用如何处理失败情况同样很重要。\n\
  \n### 缩短 URL\n\n你终于来到了关键时刻：编写用于缩短 URL 的代码。但首先，让我们回顾一下到目前为止发生的事情：\n\n*   用户输入了 URL\
  \ 并将其加载到了 Web 视图中。\n*   当 Web 视图加载完毕后，它向你的 `SUViewController` 对象发送了一条 `-webViewDidFinishLoad:`\
  \ 消息，你的代码在该消息中启用了“缩短 URL”按钮。\n\n接下来你希望用户点击“缩短 URL”按钮，并将长 URL 神奇地转换为短 URL。这听起来像是一个动作。再次选择你的\
  \ `SUViewController.m` 文件，并添加这个新方法：\n\n```\n- (IBAction)shortenURL:\n(id)sender\n\
  {\n    NSString *urlToShorten = self.webView.request.URL.absoluteString;\n    NSString\
  \ *urlString = [NSString\n  stringWithFormat:@\"http://api.x.co/Squeeze.svc/text/%@?url=%@\"\
  ,\n                           kGoDaddyAccountKey,\n                           [urlToShorten\n\
  \  stringByAddingPercentEscapesUsingEncoding:NSUTF8StringEncoding]];\n    shortURLData\
  \ = [NSMutableData new];\n    NSURLRequest *request = [NSURLRequest requestWithURL:[NSURL\n\
  URLWithString:urlString]];\n    shortenURLConnection = [NSURLConnection connectionWithRequest:request\n\
  \                                                         delegate:self];\n    self.shortenButton.enabled\
  \ = NO;\n}\n```\n\n在 `SUViewController.h` 中，也添加这一行（紧跟在 `@end` 语句之前）：\n\n```\n- (IBAction)shortenURL:(id)sender;\n\
  ```\n\n这一行声明 `-shortURL:` 方法为一个动作，并让 Interface Builder 知道它可以连接对象到该方法。\n\n`-shortenURL:`\
  \ 方法向 X.co URL 缩短服务发送一个请求。iOS 包含许多类，它们使得复杂的事情——比如向 Web 服务器发送和接收 HTTP 请求——编写起来相对容易。\n\
  \n**X.CO URL 缩短服务**\n\n我选择在这个项目中使用 X.co URL 缩短服务有几个原因。首先，该服务是免费的。其次，它拥有良好文档且直接的\
  \ API（应用程序接口），可以通过执行简单的 HTTP 请求来使用。最后，它还有一些调试和管理功能。该服务允许你登录并查看你的应用缩短了哪些 URL，这在调试时非常有用。\n\
  \nX.co 服务由 GoDaddy 提供。要使用 X.co，请访问 X.co 网页，并创建一个免费账户，或者使用你现有的 GoDaddy 账户登录（如果你已经是客户）。在你的\
  \ X.co 账户设置中，你会找到一个账户密钥——一个 32 字符的十六进制字符串——它用于向 X.co 服务唯一标识你。该密钥必须包含在你的请求中。获得密钥后，将以下行添加到你的\
  \ `SUViewController.m` 文件开头（紧跟在 `@implementation` 语句之前），将引号之间的示例密钥替换为你的账户密钥：\n\n\
  ```\n#define kGoDaddyAccountKey @\"0123456789abcdef0123456789abcdef\"\n```\n\n还有其他\
  \ URL 缩短服务存在，你可以轻松地调整此应用以使用几乎任何其中一种。有些服务，如 bitly，甚至提供 iOS SDK，你可以下载并包含到你的项目中！\n\n\
  X.co 服务将接受一个包含要缩短的 URL 的 HTTP GET 请求，并回复一个缩短后的 URL。就是这么简单。GET 请求特别容易构造，因为所有需要的信息都包含在\
  \ URL 中。\n\n\n\n### 编写 `-shortenURL:`\n\n首先构建 URL。你需要三部分信息：\n\n* 服务请求 URL\n* 你的\
  \ GoDaddy 账户密钥\n* 需要缩短的长 URL\n\n第一部分信息记录在 X.co 网站上。要将长 URL 转换为短 URL，并让服务以纯文本形式返回缩短后的\
  \ URL，请提交以下格式的 URL：\n\n[`http://api.x.co/Squeeze.svc/text/<YourAccountKey>?url=<LongURL>`](http://api.x.co/Squeeze.svc/text/%3cYourAccountKey%3e?url=%3cLongURL%3e%0d)\n\
  \n要构建此 URL，你需要两个占位符 `<YourAccountKey>` 和 `<LongURL>` 的值。从 GoDaddy 获取账户密钥，并使用它来定义\
  \ `kGoDaddyAccountKey` 预处理器宏（请参阅 X.co URL 缩短服务边栏）。\n\n你需要的最后一部分信息是要缩短的 URL。就像在 `-webViewDidFinishLoad:`\
  \ 方法中所做的那样，从该 URL 开始，并将其赋值给 `urlToShorten` 变量：\n\n```\nNSString *urlToShorten =\
  \ self.webView.request.URL.absoluteString;\n```\n\n第二行代码是应用程序中最复杂的语句。它使用 `NSString`\
  \ 的 `+stringWithFormat:` 方法构建完整的 URL。第一个参数是最终字符串对象的格式字符串（即模板）。格式中的两个 `%@` 序列会被替换为接下来两个参数的值。第一个参数是你之前定义的\
  \ `kGoDaddyAccountKey` 常量，第二个参数是你想要缩短的 URL，当前存储在 `urlToShorten` 变量中。\n\n注意，`urlToShorten`\
  \ 的值并非直接使用。相反，它会被发送 `-stringByAddingPercentEscapesUsingEncoding:` 消息。该消息会将 URL 中具有特殊含义的任何字符替换为不会与重要内容混淆的字符序列。边栏“URL\
  \ 字符串编码”解释了这样做的原因及工作原理。\n\n### URL 字符串编码\n\n计算机（以及计算机程序员）经常处理字符串。字符串是一系列字符。通常，字符串中的某些字符具有特殊含义。URL\
  \ 可以表示为字符串。特殊字符分隔 URL 的各个部分。下面是一个通用 URL，特殊字符以粗体显示：\n\n`scheme://some.domain.net/path?param1=value1&param2=value2#anchor`\n\
  \n冒号、正斜杠、问号、与号、等号和井号（哈希）字符在 URL 中都具有特殊含义：它们用于标识 URL 的各个部分。问号后面的所有字符都是 URL 的查询字符串部分。与号字符分隔多个名称/值对。片段标识符位于井号字符之后，以此类推。\n\
  \n那么，如何编写一个在路径中包含问号字符，或在某个查询字符串值中包含与号字符的 URL 呢？你不能像下面这样写，这样毫无意义：\n\n[`http://server.net/what?artcl?param=red&white`](http://server.net/what?artcl?param=red&white)\n\
  \n这就是向 X.co 服务发送 URL 时遇到的问题。你的 URL 的查询字符串中包含另一个 URL——其中充满了特殊字符，所有这些字符都必须被忽略。你需要一种方法来编写通常具有特殊含义的字符，但又不让其发挥特殊含义。你需要的是一个转义序列。\n\
  \n转义序列是一种特殊的字符序列，用于表示单个字符，使其像其他普通字符一样被对待，而不是作为特殊字符。（请重新阅读这句话直到理解为止。）URL 使用百分号（`%`）后跟两个十六进制数字。当\
  \ URL 遇到百分号后跟两个十六进制数字（如 `%63`）时，它会将其视为由这两个数字的值确定的单个字符。将字符转换为转义序列以保留其值，称为编码字符串。\n\
  \n序列 `%63` 表示单个问号字符（`?`），而 `%38` 表示单个与号字符（`&`）。现在你可以对该麻烦的 URL 进行编码，接收方就能理解其含义了：\n\
  \n[`http://server.net/what%63artcl?param=red%38white`](http://server.net/what%2563artcl?param=red%2538white)\n\
  \n`-stringByAddingPercentEscapesUsingEncoding:` 方法会转换任何可能混淆 URL 的字符，并将其替换为表示相同字符但无特殊含义的转义序列。现在，你拥有一个可以安全追加到\
  \ URL 查询部分而不会造成混淆的字符串。\n\n```\nshortURLData = [NSMutableData new];\n```\n\n第三行代码可能看起来有点神秘。它将一个名为\
  \ `shortURLData` 的实例变量设置为一个新的、空的 `NSMutableData` 对象。现在无需担心，稍后你会明白其含义。\n\n下一行代码与之前加载网页时使用的代码非常相似：\n\
  \n```\nNSURLRequest *request = [NSURLRequest requestWithURL:\n[NSURL URLWithString:urlString]];\n\
  ```\n\n就像网页视图一样，`NSURLConnection` 类（为我们发送 URL 的类）需要 `NSURLRequest`。而 `NSURLRequest`\
  \ 需要 `NSURL`。逆向工作，这行代码从你刚构建的 URL 字符串创建一个 `NSURL`，并用它来创建一个新的 `NSURLRequest` 对象，将最终结果保存在\
  \ `request` 变量中。\n\n下一条语句完成了（几乎）所有工作：\n\n```\nshortenURLConnection = [NSURLConnection\
  \ connectionWithRequest:request\ndelegate:self];\n```\n\n`NSURLConnection` 的 `+connectionWithRequest:`\
  \ 方法创建一个新的 `NSURLConnection` 对象，并立即开始发送请求的 URL 的过程。就像网页视图的 `-loadRequest:` 方法一样，这是一个异步消息——它只是启动一个后台任务并立即返回。同样，与网页视图类似，你需要提供一个委托对象，以便在发生进度事件时接收相关消息。\n\
  \n与网页视图不同的是，`NSURLConnection` 的委托是在发出请求时（通过编程方式）传递的。这就是消息中 `delegate:self` 部分的作用；它告诉\
  \ `NSURLConnection` 使用此对象（`self`）作为委托。\n\n你刚才说什么？你还没有将 `SUViewController` 类设置为 URL\
  \ 连接委托？完全正确，但这还不是你唯一的问题。Xcode 还会报错，指出变量 `shortURLData` 和 `shortenURLConnection`\
  \ 也不存在，如图 3-27 所示。首先修复缺少的变量。\n\n![A978-1-4302-5063-0_3_Fig27_HTML.jpg](img/A978-1-4302-5063-0_3_Fig27_HTML.jpg)\n\
  \n**图 3-27.** `-shortenURL:` 中的编译器错误\n\n### 添加私有实例变量\n\n需要将缺少的变量添加到 `SUViewController`\
  \ 类中。当从远程服务接收信息时，必须维护一些信息片段。这些信息包括正在执行工作的 `NSURLConnection` 对象，以及一个用于收集 Web 服务器返回数据的\
  \ `NSMutableData` 对象。\n\n然而，这些变量不供公共使用；它们不需要被其他对象访问，也无需在 Interface Builder 中连接。简单来说，这些是私有变量。通过在\
  \ `SUViewController` 的私有接口中声明它们来创建私有变量。滚动到 `SUViewController.m` 文件的开头，找到 `@interface\
  \ SUViewController ()` 部分。将其修改为如下所示（新代码以粗体显示）：\n\n```\n@interface SUViewController\
  \ ()\n{\n    NSURLConnection *shortenURLConnection;\n    NSMutableData *shortURLData;\n\
  }\n@end\n```\n\n添加完这些代码后，你在 `-shortenURL:` 中看到的警告就会消失。\n\n> **提示**\n> \n> 创建私有变量的另一种方法是将其添加到\
  \ `SUViewController.h` 的公共 `@interface SUViewController` 部分，但在其前面加上 `@private` 指令。有关\
  \ `@private` 和私有接口的详细介绍，请阅读第 20 章。\n\n\n\n### 成为 `NSURLConnection` 的委托\n\n现在，你可以按照之前让\
  \ `SUViewController` 成为 Web 视图委托的相同步骤，将其也转变为 `NSURLConnection` 的委托。你的对象可以成为多少个对象的委托，实际上没有限制。\n\
  \n第一步是采纳那些让你的类成为委托的协议。`NSURLConnection` 声明了几种不同的委托协议，你可以自由采纳那些对你的应用有意义的协议。在这种情况下，你需要采纳\
  \ `NSURLConnectionDelegate` 和 `NSURLConnectionDataDelegate` 协议。通过在 `SUViewController.h`\
  \ 文件中，将这些协议名称添加到 `SUViewController` 类中来实现，如下所示：\n\n```\n@interface SUViewController\
  \ : UIViewController <UIWebViewDelegate,\nNSURLConnectionDelegate,\nNSURLConnectionDataDelegate>\n\
  ```\n\n`NSURLConnectionDelegate` 定义了在关键事件发生时发送给你的委托的方法。有一系列消息涉及你的应用如何响应经过身份验证的内容（由账号和密码保护的\
  \ Web 服务器上的文件）。这些都不适用于本应用。你唯一感兴趣的消息是 `-connection:didFailWithError:`。如果请求因某种原因失败，就会发送该消息。打开你的\
  \ `SUViewController.m` 文件并添加这个新方法：\n\n```\n- (void)connection:(NSURLConnection *)connection\n\
  didFailWithError:(NSError *)error\n{\n    self.shortLabel.title = @\"failed\";\n\
  \    self.clipboardButton.enabled = NO;\n    self.shortenButton.enabled = YES;\n\
  }\n```\n\nURL 缩短请求失败的可能性不大。唯一可能的原因是你的 iPhone 暂时失去了互联网连接。尽管如此，你希望你的应用在任何情况下都能表现良好，并做出一些智能的处理。此方法通过执行以下三件事来处理失败情况：\n\
  \n- 将短 URL 标签设置为 “failed”，表示出现了问题\n- 禁用“复制到剪贴板”按钮，因为没有什么可复制的\n- 重新启用“缩短 URL”按钮，以便用户可以重试\n\
  \n处理完这些不太可能发生的情况后，让我们来看看发送请求时应该发生什么。`NSURLConnectionDataDelegate` 协议的方法主要关注你的应用如何获取从服务器返回的数据。它也定义了许多你并不关心的其他方法。你感兴趣的两个方法是\
  \ `-connection:didReceiveData:` 和 `-connectionDidFinishLoading:`。首先，将这个 `-connection:didReceiveData:`\
  \ 方法添加到你的实现中：\n\n```\n- (void)connection:(NSURLConnection *)connection didReceiveData:(NSData\
  \ *)data\n{\n    [shortURLData appendData:data];\n}\n```\n\nX.co 服务将缩短后的 URL 作为\
  \ HTTP 响应体中的一部分返回，是一个简单的 ASCII 字符字符串。每当从服务器接收到新的响应体数据时，你的委托对象都会收到一条 `-connection:didReceiveData:`\
  \ 消息。在这个应用中，这可能只会发生一次，因为你请求的数据量非常小。如果你的应用请求了大量数据（比如整个网页），这条消息会被发送多次。\n\n这个方法唯一做的事情就是接收到的数据（在\
  \ `data` 参数中）追加到你保存在 `shortURLData` 中的缓冲区里。还记得之前 `-shortenURL:` 方法中的 `shortURLData\
  \ = [NSMutableData new];` 语句吗？该语句在请求启动前建立了一个空缓冲区（`NSMutableData`）。当你收到该请求的答案时，它会累积在你的\
  \ `shortURLData` 变量中。这些都能理解吗？让我们继续看最后一个方法。\n\n最后一个方法现在应该不言自明了。当事务完成时，会发送 `-connectionDidFinishLoading:`\
  \ 消息：你已经发送了 URL 请求，接收了所有数据，并且整个过程成功完成。将这个方法添加到你的实现中：\n\n```\n- (void)connectionDidFinishLoading:(NSURLConnection\
  \ *)connection\n{\n    NSString *shortURLString = [[NSString alloc] initWithData:shortURLData\n\
  \                                                      encoding:NSUTF8StringEncoding];\n\
  \    self.shortLabel.title = shortURLString;\n    self.clipboardButton.enabled =\
  \ YES;\n}\n```\n\n第一条语句将你在 `-connection:didReceiveData:` 中收到的 ASCII 字节转换为字符串对象。字符串对象使用\
  \ Unicode 字符值，因此将字节字符串转换为字符串需要一点转换。\n\n**提示：** 如果你需要将 `NSString` 对象与其他形式（如 C 字符串或字节数组）相互转换，学习一点\
  \ Unicode 字符相关知识会很有帮助。Joel Spolsky 在 [`http://joelonsoftware.com/articles/Unicode.html`](http://joelonsoftware.com/articles/Unicode.html)\
  \ 上发表了一篇面向初学者的精彩文章，标题是 “每个软件开发人员绝对、绝对必须了解的关于 Unicode 和字符集的最低限度知识（毫无借口！）”。\n\n第二行将\
  \ `shortLabel` 工具栏按钮的标题设置为你刚刚接收（并转换）的短 URL。这使得短 URL 显示在屏幕底部。\n\n最后一步是启用“复制到剪贴板”按钮。既然你的应用有了一个有效的短\
  \ URL，它就有了可以复制的内容。\n\n### 测试服务\n\n你差不多准备好测试你的应用了，不过首先还有一个微小的细节需要注意。你已经编写了向 X.co\
  \ 服务发送请求的代码，设置了用于收集返回数据的委托方法，并且编写了处理任何问题的代码。唯一剩下的事情就是将界面中的“缩短 URL”按钮连接到你的 `-shortenURL:`\
  \ 操作，这样点击按钮时一切才会发生。\n\n选择 `Main_iPhone.storyboard` 文件。按住 Control 键，点击“缩短 URL”按钮，并将其操作连接到\
  \ File’s Owner。松开鼠标按钮，选择 `-shortenURL:` 方法，如图 3-28 所示。\n\n![A978-1-4302-5063-0_3_Fig28_HTML.jpg](img/A978-1-4302-5063-0_3_Fig28_HTML.jpg)\n\
  \n**图 3-28.** 连接“缩短 URL”按钮\n\n运行你的应用并输入一个 URL。在图 3-25 所示的示例中，我输入了 [`http://www.apple.com`](http://www.apple.com/)。当页面加载完成后，“缩短\
  \ URL”按钮变为可用。点击它，一两秒钟之内，该页面的短 URL 就会出现在工具栏中（图 3-29 中的右侧）。\n\n![A978-1-4302-5063-0_3_Fig29_HTML.jpg](img/A978-1-4302-5063-0_3_Fig29_HTML.jpg)\n\
  \n**图 3-29.** Shorty 应用正在运行\n\n这值得庆祝一下！通过利用现有 iOS 类的强大功能，明智地将正确的对象连接在一起，并编写操作和委托方法来处理细节，你创建了一个相当复杂的应用。\n\
  \n\n\n### 收尾工作\n\n你还没有完全完成。还需要编写一个操作，将短 URL 复制到系统剪贴板。幸运的是，代码实现也并不困难。在你的 `SUViewController.m`\
  \ 文件中添加以下方法：\n\n```\n- (IBAction)clipboardURL:(id)sender\n{\n    NSString *shortURLString\
  \ = self.shortLabel.title;\n    NSURL *shortURL = [NSURL URLWithString:shortURLString];\n\
  \    [[UIPasteboard generalPasteboard] setURL:shortURL];\n}\n```\n\n第一行代码从 `shortLabel`\
  \ 按钮获取 URL 的文本，该按钮由 `-connectionDidFinishLoading:` 方法设置。第二行代码将短 URL 的文本转换为一个 URL\
  \ 对象，就像你在本章开头编写的 `-loadLocation:` 方法中所做的那样。最后，`[UIPasteboard generalPasteboard]`\
  \ 方法返回用于“通用”数据的系统级粘贴板——也就是大多数人所认为的剪贴板。你向该粘贴板对象发送 `-setURL:` 消息，并传入刚刚创建的 URL 对象。几乎像变魔术一样，短\
  \ URL 现在就已经在剪贴板中了。\n\n在你的 `SUViewController.h` 文件中添加以下行：\n\n```\n- (IBAction)clipboardURL:(id)sender;\n\
  ```\n\n现在你可以使用 Interface Builder 将“复制到剪贴板”按钮连接到 `-clipboardURL:` 方法。操作方式与你连接“缩短\
  \ URL”按钮相同（参见图 3-24）。\n\n所有连接完成后，再次运行你的应用程序。你应该养成边编写边运行应用程序的习惯，在开发过程中测试每个新特性和功能。在模拟器中，访问一个\
  \ URL 并生成一个短链接，如图 3-30 左侧所示。生成短 URL 后，点击“复制”按钮。\n\n![A978-1-4302-5063-0_3_Fig30_HTML.jpg](img/A978-1-4302-5063-0_3_Fig30_HTML.jpg)\n\
  \n图 3-30. 测试剪贴板\n\n再次点击文本字段，清空内容。按住鼠标（模拟手指）不放，直到出现“粘贴”弹出按钮（图 3-30 中间）。点击粘贴按钮，短 URL\
  \ 将会被粘贴到字段中，如图 3-30 右侧所示。这在任何其他允许粘贴文本的应用中同样适用。\n\n作为最终测试，点击“前往”按钮。短 URL 将被发送到 x.co\
  \ 服务器，服务器会将你的浏览器重定向回原始 URL，你最初访问的网页将重新出现在浏览器中，同时文本字段中会显示原始 URL。\n\n### 清理界面\n\n\
  你的应用功能已完备，但界面仍有一些小问题。保持模拟器运行，选择 `硬件` ➤ `向左旋转` 命令。这会模拟将设备逆时针旋转 90°，如图 3-31 所示。大部分内容看起来还好，但底部工具栏中的按钮被挤到左边，显得很粗糙。\n\
  \n![A978-1-4302-5063-0_3_Fig31_HTML.jpg](img/A978-1-4302-5063-0_3_Fig31_HTML.jpg)\n\
  \n图 3-31. 测试设备旋转\n\n退出模拟器，将工具栏中的项目目标更改为 iPad 模拟器，然后再次运行你的应用，这次在模拟的 iPad 上运行（图 3-31\
  \ 右侧）。太糟糕了！iPad 版本完全不显示任何界面！\n\n这是因为你还没有创建 iPad 的界面。所有的界面对象都是在 `Main_iPhone.storyboard`\
  \ 文件中创建和连接的。你肯定已经意识到，这是你的应用在 iPhone 上运行时加载的 Interface Builder 文件。而 `Main_iPad.storyboard`\
  \ 文件仍然是空的。你马上会解决这两个问题。\n\n注意\n\niOS 资源加载器 (`NSBundle`) 会识别一些标准文件后缀（`∼ipad`、`∼iphone`\
  \ 和 `@2x`）。你可以使用这些后缀为任何资源文件创建多个变体，这些变体针对特定平台（`∼ipad`/`∼iphone`）或视网膜屏幕（`@2x`）进行了优化。不过，`Main_iPhone.storyboard`\
  \ 和 `Main_iPad.storyboard` 的情况并非如此。应用启动时加载的 storyboard 是由项目设置决定的。在导航器中选择项目，选择应用目标，切换到“通用”选项卡。在“部署信息”部分，你会找到\
  \ iPhone 或 iPad 在应用启动时加载的 storyboard 名称。这些可以是任何你选择的 storyboard 文件；甚至可以是同一个 storyboard\
  \ 文件。\n\n首先修复工具栏的布局。退出模拟器，或者点击 Xcode 中的停止按钮。选择 `Main_iPhone.storyboard` 文件。在库中找到`弹性间距栏按钮项`。这个对象名字长得离谱，但它充当一个“弹簧”，可以填充工具栏中的可用空间，从而将两侧的按钮对象推到屏幕边缘。\n\
  \n将一个弹性间距项对象拖放到“缩短 URL”按钮和短 URL 字段之间。再拖放第二个弹性间距项到 URL 字段和“复制到剪贴板”按钮之间，如图 3-32 所示。\n\
  \n![A978-1-4302-5063-0_3_Fig32_HTML.jpg](img/A978-1-4302-5063-0_3_Fig32_HTML.jpg)\n\
  \n图 3-32. 添加弹性间距栏按钮项\n\n使用两个弹性项后，“弹簧”会平分空白空间，使得中间的标签居中，而复制按钮则移至最右侧。在竖屏方向下效果不明显，但如果你将设备旋转到横屏，效果就完美了。切换回\
  \ iPhone 模拟器，运行你的应用（见图 3-33），并将设备向左（或向右）旋转。现在工具栏看起来好多了（图 3-33 右侧）。\n\n![A978-1-4302-5063-0_3_Fig33_HTML.jpg](img/A978-1-4302-5063-0_3_Fig33_HTML.jpg)\n\
  \n图 3-33. 测试 iPhone 旋转\n\n\n\n### 创建 iPad 版本\n\n最后一步是为你的 App 创建 iPad 版本。你可能会叹气，想着又要从头开始。别担心；其实离完成已经非常接近了。首先，这个\
  \ App 的大部分工作都是代码，而你已经写好了。其次，就像你在那个超现实主义 App 中做的一样，你可以复制粘贴已经创建好的对象。\n\n选择 `Main_iPhone.storyboard`\
  \ 文件。使用大纲视图，选中视图中的所有顶层对象并复制它们，如图 3-34 所示。\n\n![A978-1-4302-5063-0_3_Fig34_HTML.jpg](img/A978-1-4302-5063-0_3_Fig34_HTML.jpg)\n\
  \n图 3-34. 复制 iPhone 界面\n\n选择 `Main_iPad.storyboard` 文件。在大纲视图中选中视图对象，然后粘贴你刚刚复制的所有对象，如图\
  \ 3-35 所示。\n\n![A978-1-4302-5063-0_3_Fig35_HTML.jpg](img/A978-1-4302-5063-0_3_Fig35_HTML.jpg)\n\
  \n图 3-35. 将对象粘贴到 iPad 界面中\n\n剪贴板会复制你为 iPhone 版本创建的所有对象及其属性。但它不会复制它们的位置、大多数约束，以及任何连接关系。\n\
  \n首先，从 **Resolve Auto Layout Issues** 按钮中选择 **Clear All Constraints in View Controller**。就像你为\
  \ iPhone 界面所做的那样（参考图 3-4），从工具栏和 `Top Layout Guide` 添加一个 **垂直间距** 约束，并将其值设置为 0。排列\
  \ iPad 界面中剩余的对象，使其看起来像 iPhone 界面一样。所有内容都会比 iPhone 版本更大，包括导航栏中更宽的文本字段。完成后，在 **Resolve\
  \ Auto Layout Issues** 按钮中选择 **Add Missing Constraints** 项。\n\n使用连接检查器，或通过 **Control\
  \ + 拖拽**，建立你之前在 iPhone 上建立的相同连接。这包括：\n\n- 将每个 File's Owner 的 `outlet` 连接到正确的界面对象\n\
  - 将 `urlField` 连接到文本字段\n- 将 `webView` 连接到网页视图\n- 将 `shortenButton` 连接到工具栏中的“缩短 URL”（左）按钮\n\
  - 将 `shortLabel` 连接到工具栏中的普通（中间）按钮\n- 将 `clipboardButton` 连接到工具栏中的“复制到剪贴板”（右）按钮\n\
  - 将文本字段和每个按钮的发送事件连接到它们各自的操作：\n  - 文本字段的 **Did End On Exit** 事件连接到 `-loadLocation:`\n\
  \  - 刷新按钮连接到 `-loadLocation:`\n  - “缩短 URL”（左）按钮连接到 `-shortenURL:`\n  - “复制到剪贴板”（右）按钮连接到\
  \ `-clipboardURL:`\n- 不要忘记设置网页视图的 `delegate` 出口\n\n> **提示：** 在使用 **Control + 拖拽**\
  \ 快捷方式在 Interface Builder 中建立连接时，方向很重要。要连接一个 `outlet`，请从具有该 `outlet` 的对象拖拽到你希望它连接到的对象。要连接一个\
  \ `action`，请从发送事件的对象拖拽到定义该操作的对象。\n\n完成后，你将拥有一个完整的 iPad 版 App。切换到 iPad 模拟器并进行测试，如图\
  \ 3-36 所示。\n\n![A978-1-4302-5063-0_3_Fig36_HTML.jpg](img/A978-1-4302-5063-0_3_Fig36_HTML.jpg)\n\
  \n图 3-36. 测试 iPad 版本\n\n## 总结\n\n这是一个非常重要的章节，你成功地完成了它。你学到了很多关于 iOS App 开发的基础知识和\
  \ Xcode 的工作流程。这些技能几乎会在你开发的每一个 App 中用到。\n\n你学会了如何快速搭建一个网页浏览器，这个功能用途广泛，不仅仅是显示网页。例如，你可以通过向\
  \ App 添加 `.html` 资源文件来创建静态网页内容，并让网页视图加载这些文件。网页视图类还允许你通过 JavaScript 与其内容进行交互，这开启了各种可能性。\n\
  \n学习创建和连接 `outlet` 是一项关键的 iOS 技能。正如你所发现的，一个 iOS App 是一个对象网络，而 `outlet` 就是连接这个网络的线索。\n\
  \n最重要的是，你学会了如何编写操作方法以及创建委托。这两种模式在 iOS 中反复出现。\n\n在下一章中，我将解释事件如何将一次手指触摸转化为一个操作。\n\n\
  ## 4. 即将发生的事件\n\n**摘要**\n\n既然你已目睹了一个 iOS App 的运行，你可能会好奇是什么让你的 App 保持“活力”。在 Shorty\
  \ 这个 App 中，你创建了操作方法，当用户点击按钮或键盘上的 `Go` 键时，这些方法会被调用。你创建了委托对象，当达到某些里程碑时，例如网页加载出现问题或\
  \ URL 缩短服务响应时，它们会接收消息。你从未编写任何代码来检查用户是否触摸了某个东西，或检查网页是否已加载完成。换句话说，你并非主动去获取这些信息；你的\
  \ App 是在等待这些信息自己找上门来。\n\niOS App 是事件驱动的应用。事件驱动的应用不会（也不应该！）在一个循环中旋转以检查是否发生了什么事情。事件驱动的应用程序会设置它们想要响应的事件条件（例如用户的触摸、设备方向的改变、网络事务的完成）。然后\
  \ App 会静静地待着，什么都不做，直到其中一件事发生。所有这些事情统称为事件，这正是本章要讨论的全部内容。\n\n在本章中，你将学习以下内容：\n\n- 事件\n\
  - 运行循环\n- 事件传递\n- 事件处理\n- 第一响应者和响应者链\n- 在真实的 iOS 设备上运行你的 App\n\n我将从一些基础理论开始，讲解事件是如何从设备硬件进入你的应用程序的。你将了解不同类型的事件以及它们在\
  \ App 对象中的传递方式。最后，你将创建两个 App：一个处理高级事件，另一个处理低级事件。\n\n\n\n"
- "# 运行循环\n\niOS 应用会静止不动，等待某些事件的发生。这是应用设计的一个非常重要的特性，因为它能使应用保持高效：你的应用代码仅在需要处理重要事务时才会运行。\n\
  \n这种看似无害的机制，对于保持用户满意度至关重要。运行计算机代码需要消耗电量，而移动设备中的电量是一种宝贵资源。防止代码在不必要时运行，可以让 iOS 节省电力。具体做法是，在\
  \ CPU 和其他硬件配件未被使用时，关闭或最小化它们的耗电量。这种电源管理每秒会发生数百次，但它对移动设备的电池续航至关重要，而用户热爱电池续航持久的移动设备。\n\
  \n你的应用代码位于两种机制的最末端：运行循环和事件队列。运行循环在事件发生时执行应用代码，在无事可做时则让应用停止运行。事件队列是一种数据结构，其中包含有待处理的事件列表。只要队列中有事件，运行循环就会依次将它们发送给应用。一旦所有事件处理完毕，事件队列为空，应用就会停止执行代码。\n\
  \n从概念上讲，应用运行循环的结构如下所示：\n\n```\nwhile ( true ) {\n    UIEvent *event = [iOS waitForNextEvent];\n\
  \    [yourApp processEvent:event];\n}\n```\n\n其精髓在于 `-waitForNextEvent` 消息（这是个虚构方法，并不真实存在）。如果有事件等待处理，该事件会从队列中取出并返回。运行循环将其传递给应用进行处理。如果没有事件，该函数就不会返回；应用会挂起，直到有事可做。现在，我们来探讨这些事件是什么以及它们来自何处。\n\
  \n## 事件队列\n\n待处理的事件会被添加到一个先进先出（FIFO）缓冲区中，这个缓冲区称为事件队列。事件有多种类型，并来自不同的来源，如图 4-1 所示。\n\
  \n![A978-1-4302-5063-0_4_Fig1_HTML.jpg](img/A978-1-4302-5063-0_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 事件队列\n\n我们追踪一个事件在应用中的完整路径。当你的手指触摸 iOS 设备的屏幕时，会发生以下步骤：\n\n- 屏幕硬件检测触摸的位置。\n\
  - 利用这些信息创建一个触摸事件对象，该对象记录了触摸的位置、发生的时间及其他信息。\n- 触摸事件对象被放入应用的事件队列中。\n- 运行循环从队列中取出触摸事件对象，并将其传递给应用对象。\n\
  - 应用对象利用应用中活跃视图的几何信息，确定你的手指“触摸”了哪个视图。\n- 一条包含触摸事件的消息被发送给该视图对象。\n- 视图对象决定该触摸事件的含义以及它将执行的操作。它可能高亮一个按钮，或发送一条操作消息。\n\
  \n当你在第 3 章的 Shorty 应用中点击“缩短链接”按钮时，正是通过上述过程，触摸屏幕的物理行为才转化为视图控制器接收到的 `-shortenURL:`\
  \ 消息。\n\n不同类型的事件走不同的路径。接下来几个小节将介绍不同的传递方式，以及每种方式所对应的事件类型。\n\n## 事件传递\n\n事件传递是指事件如何从事件队列到达应用中的某个对象。不同类型的事件根据其用途，遵循不同的路径。实际的传递机制是\
  \ Cocoa Touch 框架、应用对象以及应用对象定义的各种方法中逻辑的组合。\n\n大致来说，有三种传递方式：\n\n- 直接传递\n- 命中测试\n-\
  \ 第一响应者\n\n接下来几个小节将分别描述这三种方式，以及通过每种方式传递的事件。\n\n### 直接传递\n\n直接传递是最简单的事件传递形式。许多事件类型会指定目标对象。这些事件知道哪些对象将接收它们，因此除了它们是由运行循环分派这一事实外，关于这些事件如何传递，并没有太多需要了解的。\n\
  \n例如，一个 Objective-C 消息可以被放入事件队列。当该事件从队列中取出时，消息会被发送给其目标对象。网页视图就是这样告诉你的 Shorty 应用网页已加载完成的。当网络通信代码（在其自己的线程中运行）确定页面加载完毕时，它会将一条\
  \ `-webViewDidFinishLoad:` 消息推送到主线程的事件队列中。当主线程从事件队列中取出事件时，其中一个事件会将该消息发送给你的网页视图代理对象，告知页面已加载完成。\n\
  \n**注意：** 这并非异步代理消息传递的确切方式。但对于你——应用开发者而言，从概念上讲是准确的；具体细节并不重要。\n\n其他发送给特定对象或对象组的事件包括通知、定时器事件和用户界面更新。所有这些事件都直接或间接地知道它们将被发送给哪些对象。作为应用开发者，你只需知道：当这些事件在事件队列中排到队首时，运行循环会向一个或多个对象发送一条\
  \ Objective-C 消息。\n\n\n\n### 命中测试\n\n命中测试基于用户界面的几何形状来传递事件，并且仅适用于触摸事件。当触摸事件发生时，`UIWindow`和`UIView`对象会协同工作，以确定哪个视图对象对应于触摸的位置。然后，消息会被发送到该视图对象，该对象可以按照自己的方式解释这些事件；它可能翻转开关、滚动购物清单或炸毁宇宙飞船。让我们快速了解一下命中测试的工作原理。\n\
  \n当一个触摸事件从事件队列中取出时，它包含触摸发生时的绝对硬件坐标，如图 4-2 左侧所示。此示例将使用上一章中 Shorty 应用程序的程式化表示。\n\n\
  ![A978-1-4302-5063-0_4_Fig2_HTML.jpg](img/A978-1-4302-5063-0_4_Fig2_HTML.jpg)\n\n\
  **图 4-2.** 对触摸事件进行命中测试\n\n您的 `UIApplication` 对象使用事件坐标来确定负责屏幕该部分的 `UIWindow` 对象。该\
  \ `UIWindow` 对象会收到一条包含待处理触摸事件对象的 `-sendEvent:` 消息。\n\n然后，`UIWindow` 对象执行命中测试。从其视图层次结构的顶部开始，它向其顶层视图对象发送一条\
  \ `-hitTest:withEvent:` 消息，如图 4-2 的第二个面板所示。\n\n顶层视图首先判断事件是否在其边界内。确实如此，于是它开始寻找包含触摸坐标的任何子视图。顶层视图包含三个子视图：顶部的导航工具栏、中间的网页视图和底部的工具栏。触摸点在工具栏的边界内，因此它将该\
  \ `-hitTest:withEvent:` 消息传递给工具栏。\n\n工具栏重复此过程，寻找包含该位置的子视图，如图 4-2 的第三帧所示。工具栏对象发现触摸发生在其最左侧的栏按钮项边界内。该栏按钮项被作为“命中”对象返回，这导致\
  \ `UIWindow` 开始向其发送低级触摸事件消息。\n\n作为一个“按钮”，栏按钮项对象会检查事件以确定用户是否点击了该按钮（而不是滑动它或其他无关手势）。如果是，按钮会发送其操作消息，在此例中是\
  \ `-shortenURL:`，发送给它所连接的对象。\n\n**提示：** 如果您有需要，命中测试是高度可定制的。通过重写视图对象的 `-pointInside:withEvent:`\
  \ 和 `-hitTest:withEvent:` 方法，您可以真正重写确定触摸事件如何找到将要发送到的视图对象的规则。有关详细信息，请参阅 iOS 事件处理指南，该指南位于\
  \ Xcode 的文档和 API 指南中。\n\n### 第一响应者\n\n第一响应者是活跃界面（一个可见窗口）中的视图、视图控制器或窗口对象。可以将其视为未由命中测试确定的事件的指定接收者。我将在本章后面讨论一个对象如何成为第一响应者。现在，只需知道每个活跃界面都有一个第一响应者。\n\
  \n传递给第一响应者的事件包括：\n\n- 摇动动作事件\n- 远程控制事件\n- 按键事件\n\n摇动动作事件告诉您的应用用户正在摇晃他们的设备（来回快速移动）。此信息来自加速度计硬件。\n\
  \n所谓的远程控制事件在用户按下任何多媒体控件时生成，这些控件包括：\n\n- 播放\n- 暂停\n- 停止\n- 跳至下一曲\n- 跳至上一曲\n- 快进\n\
  - 快退\n\n这些被称为“远程”事件，因为它们可能源自外部配件，例如许多耳机线材上的播放/暂停按钮。实际上，它们最常见的是来自您在屏幕上看到的播放/暂停按钮。\n\
  \n按键事件来自点击虚拟键盘，或通过蓝牙连接的硬件键盘。\n\n回顾一下，直接传递将事件对象或 Objective-C 消息直接发送给它们的目标对象。触摸事件使用命中测试来确定哪个视图对象将接收它们，而所有其他事件都被发送给第一响应者。现在是处理这些事件的时候了。\n\
  \n## 事件处理\n\n您现在进入了事件处理之旅的后半部分：事件处理。简单来说，如果一个对象包含解释该事件并决定如何处理它的代码，那么这个对象就处理或响应了该事件。\n\
  \n我首先处理直接传递的事件。接收直接传递事件的对象必须有一个方法来处理该事件、消息或通知。这是必须的。如果对象没有实现发送给它的消息，您的应用程序将出现故障并可能崩溃。这就是您需要了解的有关直接传递事件的全部内容。\n\
  \n**注意：** 当请求定时器、消息或通知事件时，请确保接收它们的对象实现了正确的方法。\n\n其他事件类型则宽容得多。就像可选的委托方法一样，如果您的对象实现了处理事件的方法，它就会接收这些事件。如果它不感兴趣处理该类事件，您只需从实现中省略这些方法，iOS\
  \ 就会寻找另一个想要处理它们的对象。\n\n例如，要处理触摸事件，您需要在类的实现中添加以下方法：\n\n```\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent\
  \ *)event\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n- (void)touchesCancelled:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n```\n\n如果命中测试确定您的对象应该接收触摸事件，那么当硬件检测到您的视图中有物理触摸时，它将收到\
  \ `-touchesBegan:withEvent:` 消息；当位置发生变化（拖动手势）时，将收到 `-touchesMoved:withEvent:` 消息；当与屏幕的接触被移除时，将收到\
  \ `-touchesEnded:withEvent:` 消息。当用户点击并在屏幕上拖动手指时，您的对象可能会收到许多这样的消息，而且常常是连续快速的。\n\n\
  **注意：** `-touchesCancelled:withEvent:` 消息是这组方法中的特例。如果某些事情中断了触摸事件序列（例如，在点击手势过程中您的应用切换到另一个屏幕），此消息会发送给您的对象。仅当不完整的触摸事件序列（例如，收到了“开始”消息但没有收到“结束”消息）会使您的对象混淆时，您才需要处理取消事件。\n\
  \n如果您从类中省略所有这些方法，您的对象将不会处理任何触摸事件。\n\n所有用于处理事件的方法都继承自 `UIResponder` 类，并且每种类型的事件都有一个或多个方法，如果您想处理该事件，就必须实现这些方法。`UIResponder`\
  \ 类文档提供了事件处理方法的完整列表。\n\n那么，如果命中测试或第一响应者对象忽略了该事件会发生什么？这是一个好问题，答案可以在响应者链中找到。\n\n\n"
- "# 响应者链\n\n响应者链是一个代表用户界面\"焦点\"的对象序列。这里所说的\"焦点\"指的是那些控制当前可见界面的对象，以及那些与用户当前操作最相关的视图对象。通过一张图并结合\
  \ iOS 创建及使用响应者链的说明，一切将变得清晰。\n\n响应者链始于初始响应者（见图 4-3）。在传递运动事件、按键事件和远程控制事件时，第一响应者就是初始响应者对象。对于触摸事件，初始响应者则是由命中测试确定的视图对象。\n\
  \n> **注：** 响应者链中的所有对象都是`UIResponder`的子类。因此，从技术上讲，响应者链由`UIResponder`对象组成。`UIApplication`、`UIWindow`、`UIView`和`UIViewController`都是`UIResponder`的子类。由此推论，初始响应者（第一响应者或命中测试结果）始终是一个`UIResponder`对象。\n\
  \niOS 首先尝试将该事件传递给初始响应者。\"尝试\"是这里的关键词。如果该对象含有处理该事件的方法，它就会处理。如果没有，iOS 就会转向链中的下一个对象，直到找到一个愿意处理该事件的对象，或者放弃并将该事件丢弃。\n\
  \n图 4-3 展示了一个包含两个屏幕的应用中视图对象的概念性组织结构。当前向用户显示的是第二个屏幕。它由一个视图控制器对象、多个子视图（其中一些嵌套在其他子视图中）、甚至还有一个子视图控制器组成。在这个例子中，一个次级子视图被指定为初始响应者，这在命中测试确定用户触摸了该视图后是合适的。\n\
  \n![A978-1-4302-5063-0_4_Fig3_HTML.jpg](img/A978-1-4302-5063-0_4_Fig3_HTML.jpg)\n\
  \n*图 4-3. 第一响应者链*\n\niOS 会尝试将触摸事件传递给初始响应者（即那个次级子视图）。如果该对象不处理触摸事件，iOS 会检查该视图是否关联了视图控制器对象（本例中没有），并尝试将事件发送给其控制器。如果视图及其控制器都不处理触摸事件，iOS\
  \ 会找到包含该视图的父视图，并重复整个过程，直到尝试完所有视图和视图控制器为止。\n\n在所有视图和视图控制器对象都有机会处理事件之后，事件传递会转向该屏幕的窗口对象，最终到达唯一的应用对象。\n\
  \n响应者链之所以如此优雅，在于其动态特性和有序的事件处理机制。响应者链是自动创建的，因此你的对象无需做任何事就能成为响应者链的一部分，只需确保它自己或其附属视图是初始响应者即可。当你的界面部分处于活动状态时，你的对象会接收到事件消息；当它不活动时，则不会收到事件。\n\
  \n另一个方面是响应者链事件处理的\"由特定到通用\"特性。该链始终从与用户最相关的视图开始：他们触摸的按钮、活跃的文本输入框或列表中的某一行。该对象总是最先接收事件。如果事件对这些视图有特定含义，它就会被相应地处理。同时，你的视图控制器或`UIApplication`对象也可以响应这些事件，但如果某个子视图首先处理了它，那么这些对象就不会收到该事件。\n\
  \n如果用户切换到另一个屏幕，如图 4-4 所示，并按下耳机上的\"暂停\"按钮，则会建立一个新的响应者链。这个链从第一响应者开始，在本例中它是一个视图控制器。该链完全不包含任何视图对象，因为顶级视图控制器对象就是第一响应者。\n\
  \n![A978-1-4302-5063-0_4_Fig4_HTML.jpg](img/A978-1-4302-5063-0_4_Fig4_HTML.jpg)\n\
  \n*图 4-4. 第二响应者链*\n\n如果视图控制器处理了\"暂停\"事件，它就会处理。其他界面中的视图控制器永远不会看到这个事件。通过在不同控制器中实现不同的\"\
  暂停\"事件处理代码，你的应用对\"暂停\"事件的响应将根据当前处于活动状态的屏幕而有所不同。\n\n你的应用对象也可以处理\"暂停\"事件。如果没有视图控制器处理\"\
  暂停\"事件，那么所有\"暂停\"事件都将向下传递到应用对象。如果你希望所有\"暂停\"事件都以相同方式处理，无论用户正在查看哪个屏幕，那么这就是你应该采用的安排。\n\
  \n最后，你可以混合使用这些方案。应用中的\"暂停\"事件处理器可以以通用方式处理事件，然后特定的视图控制器可以在按下\"暂停\"按钮对该屏幕有特殊含义时截获该事件。\n\
  \n> **提示：** 创建`UIApplication`的自定义子类很少见，而创建`UIWindow`的子类则更为罕见。在典型的应用中，你所有的 event\
  \ 处理代码都将位于自定义视图和视图控制器对象中。\n\n## 有条件地处理事件\n\n实际操作中，你可以实现一个事件处理方法（例如`-touchesBegan:withEvent:`）来处理该事件类型，或者省略实现以忽略它。但实际上，情况要更微妙一些。\n\
  \n事件通过接收特定的 Objective-C 消息（如`-touchesBegan:withEvent:`）来处理。你的对象从`UIResponder`基类继承这些方法。因此，每个`UIResponder`对象都有一个`-touchesBegan:withEvent:`方法，并将通过此消息接收触摸事件对象。那么，对象是如何忽略事件的呢？\n\
  \n秘密在于`UIResponder`对这些消息的实现。所有事件处理消息的继承基类实现只是简单地将事件沿着响应者链向上传递。因此，更精确的描述是这样的：要处理事件，你需要重写`UIResponder`的事件处理方法并处理该事件。要忽略事件，你只需让事件进入`UIResponder`的方法，该方法会忽略事件并将其传递给响应者链中的下一个对象。\n\
  \n这就引出了一个有趣的功能：有条件地处理事件。你可以编写一个事件处理器，让它决定是否要处理某个事件。它可以任意选择自己处理事件，或者将其传递给响应者链中的下一个对象。将其传递下去是通过将事件转发给基类的实现来完成的，如下所示：\n\
  \n```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n\n{\n\n\
  if ( [self iWantToHandleTheseTouches:touches] )\n\n    // 处理事件\n    [self doSomethingWithTheseTouches:touches];\n\
  \nelse\n\n    // 忽略事件并将其沿响应者链向上传递\n    [super touchesBegan:touches withEvent:event];\n\
  \n}\n```\n\n使用这种技术，你的对象可以动态地决定它想要处理哪些事件，以及哪些事件将传递给响应者链中的其他对象。\n\n现在你已经了解了事件是如何传递和处理的，接下来就可以构建一个直接使用事件的应用了。为此，你需要考虑你想要处理什么样的事件以及为什么要处理它们。\n\
  \n\n## 高级事件与低级事件\n\n程序员总是习惯给事物贴上“高级”或“低级”的标签。应用中的对象形成了一种金字塔结构：顶层的少数复杂对象由中层的更原始对象构建而成，而中层对象本身又由更底层的原始对象构成。顶层的复杂对象被称为“高级”对象（`UIApplication`、`UIWebView`），底层的简单对象则被称为“低级”对象（`NSNumber`、`NSString`）。类似地，程序员也会谈论高级与低级的框架、接口、通信路径等。\n\
  \n事件同样存在不同层级。低级事件是指那些细微的、实时发生的具体细节。触摸事件就是低级事件的例子。另一个例子是从加速计和陀螺仪硬件中请求的瞬时力向量值。\n\n\
  而在另一端的则是高级事件，例如摇动运动事件。另一个例子是 `UIGestureRecognizer` 对象，它能解读复杂的触摸事件模式，并将其转化为单个高级事件，比如“捏合”或“轻扫”。\n\
  \n在设计应用时，你必须决定要处理哪个层级的事件。在下一个应用中，你将使用摇动运动事件来触发应用内的操作。\n\n为此，你可以请求并处理低级的加速计事件。你需要创建变量来跟踪三个运动轴（X、Y、Z）的力向量。当你检测到设备正在向某个特定方向加速时，你会记录该方向并启动一个计时器。如果在合理角度范围内、且在短时间内，运动方向发生反转，并再反转两三次，你就可以断定用户正在摇动设备。\n\
  \n或者，你也可以让 iOS 替你完成所有这些计算，只需处理 Cocoa Touch 框架生成的摇动运动事件即可。当用户开始摇动设备时，你的第一响应者会收到一条\
  \ `-motionBegan:withEvent:` 消息。当用户停止摇动时，你的对象会收到一条 `-motionEnded:withEvent:` 消息。就这么简单。\n\
  \n但这并不意味着你永远不需要低级事件。如果你正在编写一款游戏应用，用户通过左右倾斜设备来引导一只星鼻鼹鼠穿越魔法花园的土壤，那么解读低级的加速计事件将是正确的解决方案。你将在第\
  \ 16 章中使用低级加速计事件。\n\n决定你需要从事件中获取什么信息，然后处理能提供这些信息的最高层级的事件。现在，你已准备好开始设计你的应用了。\n\n\
  ## 八球\n\n你将创建的应用仿照了 20 世纪 50 年代著名的神奇八球玩具（ [`http://en.wikipedia.org/wiki/Magic_Eight_Ball`](http://en.wikipedia.org/wiki/Magic_Eight_Ball)\
  \ ）。该应用的工作方式是：每当你摇动 iOS 设备时，它就会显示一条预言般精准的消息。首先，为你的应用勾勒出一个快速设计草图。\n\n### 设计\n\n这个应用的设计到目前为止是最简单的：一个包含消息的屏幕显示在“球”的中央，如图\
  \ 4-5 所示。当你摇动设备时，当前消息会消失；当你停止摇动时，一条新消息会出现。\n\n![A978-1-4302-5063-0_4_Fig5_HTML.jpg](img/A978-1-4302-5063-0_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 八球应用设计\n\n### 创建项目\n\n启动 Xcode，选择“文件 ➤ 新建项目”。选择“单视图 iOS 应用”模板。在下一个表单中，将应用命名为\
  \ `EightBall`，设置类前缀为 `EB`，并为设备选择 `iPhone`，如图 4-6 所示。\n\n![A978-1-4302-5063-0_4_Fig6_HTML.jpg](img/A978-1-4302-5063-0_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 创建 EightBall 项目\n\n选择一个位置保存新项目并创建它。在项目导航器中，选择该项目，从弹出菜单中选择 EightBall 目标（如果需要），选择“通用”标签页，然后在“支持的界面方向”部分关闭两个横向方向，仅保留纵向方向。\n\
  \n\n\n### 创建界面\n\n选择 `Main.storyboard` 界面构建器文件，并选中单个视图对象。使用属性检查器将背景颜色设置为 `Black`，如图\
  \ 4-7 所示。\n\n![A978-1-4302-5063-0_4_Fig7_HTML.jpg](img/A978-1-4302-5063-0_4_Fig7_HTML.jpg)\n\
  \n图 4-7.\n\n设置主视图背景颜色\n\n从库中拖拽一个图像视图对象到界面中。使用尺寸检查器将其高度和宽度设置为 `320` 像素。拖拽图像对象，使其吸附到垂直和水平居中参考线，如图\
  \ 4-8 所示。\n\n![A978-1-4302-5063-0_4_Fig8_HTML.jpg](img/A978-1-4302-5063-0_4_Fig8_HTML.jpg)\n\
  \n图 4-8.\n\n将图像视图居中\n\n通过 Control+单击/右键单击图像视图并向下拖动一点来设置第一个约束。松开鼠标并选择高度约束（Height\
  \ constraint）。这将固定图像视图的高度。在解决自动布局问题（Resolve Auto Layout Issues）控件中，选择“在视图控制器中添加缺失的约束”（Add\
  \ Missing Constraints in View Controller）。Xcode 将添加足够的约束以使其完备。由于视图已在屏幕中居中，Xcode\
  \ 将添加约束以使其保持居中。\n\n正如你在第 2 章中所做的那样，你将向项目中添加一些资源图像文件。在项目导航器中，选择 `Images.xcassets`\
  \ 素材目录。在访达中，找到你在第 1 章中下载的 `Learn iOS Development Projects` 文件夹。在 `Ch 4` 文件夹内，你将找到\
  \ `EightBall (Resources)` 文件夹，其中包含五个图像文件。选择文件 `eight-ball.png` 和 `eight-ball@2x.png`。确保这些文件和你的工作区窗口可见，然后将这两个图像文件拖入素材目录，如图\
  \ 4-9 所示。\n\n![A978-1-4302-5063-0_4_Fig9_HTML.jpg](img/A978-1-4302-5063-0_4_Fig9_HTML.jpg)\n\
  \n图 4-9.\n\n将八号球图像添加到素材目录\n\n返回你的项目，选择 `Main.storyboard`，然后选中图像视图对象。使用属性检查器将图像属性设置为\
  \ `eight-ball`，如图 4-10 所示。\n\n![A978-1-4302-5063-0_4_Fig10_HTML.jpg](img/A978-1-4302-5063-0_4_Fig10_HTML.jpg)\n\
  \n图 4-10.\n\n设置图像\n\n现在你需要添加一个文本视图来显示神奇消息。从对象库中拖入一个新的文本视图（不是文本字段）对象，将其放置在八号球中间的“窗口”上。使用尺寸检查器将文本视图的宽度设置为\
  \ `160` 像素，高度设置为 `112`。使用居中参考线将文本视图居中，如图 4-11 所示。\n\n![A978-1-4302-5063-0_4_Fig11_HTML.jpg](img/A978-1-4302-5063-0_4_Fig11_HTML.jpg)\n\
  \n图 4-11.\n\n将文本视图居中\n\n再次使用 Control+单击/右键单击手势，添加以下约束：\n\n*   在文本视图内部向上（或向下）拖动，松开，然后选择一个高度约束（Height\
  \ constraint）。\n*   在文本视图内部向右（或向左）拖动，松开，然后选择一个宽度约束（Width constraint）。\n*   从文本视图向上（或向下）拖动到图像视图。选择中心\
  \ Y 轴约束（Center Y constraint）。\n*   从文本视图向右（或向左）拖动到图像视图。选择中心 X 轴约束（Center X constraint）。\n\
  \n现在文本视图有了固定大小，并将始终在图像视图上居中。\n\n选中文本视图。使用属性检查器设置以下属性：\n\n*   将文本设置为 `SHAKE FOR ANSWER`，共三行（见图\
  \ 4-12）。按住 Option 键的同时按回车键，可以在文本属性字段中插入字面意义的“回车”字符。\n*   将文本视图颜色设为 `white`。\n* \
  \  点击字体属性中的向上箭头，直到显示为 `System 24.0`。\n*   选择居中对齐（中间的对齐方式）。\n*   取消选中 `Editable`\
  \ 行为属性。\n*   再往下，找到背景属性并将其设置为 `default`（无背景）。\n\n你的界面设计已完成，应该类似于图 4-12 所示。现在可以继续编写代码了。\n\
  \n![A978-1-4302-5063-0_4_Fig12_HTML.jpg](img/A978-1-4302-5063-0_4_Fig12_HTML.jpg)\n\
  \n图 4-12.\n\n完成的八号球界面\n\n\n\n### 编写代码\n\n你的 `EBViewController` 对象需要与文本视图对象建立连接。选择\
  \ `EBViewController.h` 文件，并添加以下属性：\n\n`@property (weak,nonatomic) IBOutlet UITextView\
  \ *answerView;`\n\n现在，该编写显示消息的代码了。切换到你的实现文件（`EBViewController.m`）。在 `@implementation`\
  \ 行上方，添加以下代码：\n\n```\nstatic NSString* gAnswers[] = {\n\n@\"\\rYES\",\n\n@\"\\rNO\"\
  ,\n\n@\"\\rMAYBE\",\n\n@\"I\\rDON'T\\rKNOW\",\n\n@\"TRY\\rAGAIN\\rSOON\",\n\n@\"\
  READ\\rTHE\\rMANUAL\"\n\n};\n\n#define kNumberOfAnswers (sizeof(gAnswers)/sizeof(NSString*))\n\
  \n@interface EBViewController ()\n\n- (void)fadeFortune;\n\n- (void)newFortune;\n\
  \n@end\n```\n\n第一条语句创建了一个 `NSString` 字符串对象的静态数组。每个对象都是八球中可能出现的答案之一。`\\r` 字符被称为转义序列。它们由一个反斜杠（左斜杠）字符后跟一个代码组成，该代码告诉编译器将序列替换为特殊字符。在本例中，`\\\
  r` 被替换为字面意义上的“回车”字符——这是你在源代码中无法通过直接换行输入的内容。\n\n`#define` 创建了一个常量 `kNumberOfAnswers`，它会计算\
  \ `gAnswers` 数组中字符串对象的数量。这是通过将数组的总大小（`sizeof(gAnswers)`）除以数组中单个元素的大小（`sizeof(NSString*)`）来实现的。这样做是为了避免手动跟踪\
  \ `gAnswers` 数组中的字符串数量。如果你想添加更多答案，只需向数组中添加新元素即可。`kNumberOfAnswers` 宏会自动更新以反映实际数量。\n\
  \n`@interface EBViewController ()` 语句声明了用于更新消息显示的两个方法：`-fadeFortune` 和 `-newFortune`。它们在这里声明，而非在\
  \ `EBViewController.h` 中，因为这些是私有方法——不供 `EBViewController` 以外的对象使用。\n\n通过将以下代码添加到你的实现中（即在\
  \ `@implementation` 和 `@end` 语句之间），创建你刚刚承诺的两个方法：\n\n```\n- (void)fadeFortune\n\n\
  {\n\n[UIView animateWithDuration:0.75 animations:^{\n\nself.answerView.alpha = 0.0;\n\
  \n}];\n\n}\n\n- (void)newFortune\n\n{\n\nself.answerView.text = gAnswers[arc4random_uniform(kNumberOfAnswers)];\n\
  \n[UIView animateWithDuration:2.0 animations:^{\n\nself.answerView.alpha = 1.0;\n\
  \n}];\n\n}\n```\n\n`-fadeFortune` 方法使用 iOS 动画将 `answerView` 文本视图对象的 alpha 属性更改为\
  \ `0`。视图的 alpha 属性指的是视图显示的不透明度。值为 `1` 表示完全不透明，`0.5` 使其 50% 透明，而值为 `0` 使其完全不可见。`-fadeFortune`\
  \ 使文本视图对象在 ¾ 秒内逐渐淡出直至消失。\n\n注意\n\n动画的更多细节请参阅第 1 章 11。\n\n`-newFortune` 方法是所有乐趣所在。第一条语句做了三件事：\n\
  \n- 调用 `arc4random_uniform()` 函数，随机选取一个介于 0 到小于 `kNumberOfAnswers` 之间的数字。因此，如果 `kNumberOfAnswers`\
  \ 是 6，该函数将返回一个介于 0 到 5（含）之间的随机数。\n- 使用该随机数作为索引，从 `gAnswers` 数组中选取一个常量 `NSString`\
  \ 对象。\n- 用随机选中的答案设置文本视图对象的文本属性。设置完成后，文本视图对象将在你的界面中显示该文本。\n\n最后，再次使用 iOS 动画，将 alpha\
  \ 属性在 2 秒内逐渐变回 `1`，从不可见变为不透明，使新消息逐渐显现。\n\n还剩一个小细节：将 `answerView` 输出口连接到界面中的文本视图对象。切换到\
  \ `Main.storyboard` 界面构建器文件。选择视图控制器对象，使用连接检查器连接 `answerView` 输出口，如图 4-13 所示。\n\n\
  ![A978-1-4302-5063-0_4_Fig13_HTML.jpg](img/A978-1-4302-5063-0_4_Fig13_HTML.jpg)\n\
  \n图 4-13. 连接 `answerView` 输出口\n\n### 处理摇动事件\n\n你的应用现在已具备运行所需的一切，唯独缺少触发运行的事件处理。在\
  \ Xcode 文档（帮助 ➤ 文档和 API 参考）中，查看 `UIResponder` 的文档。在其中，你将找到三个方法的文档：\n\n```\n- (void)motionBegan:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n\n- (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent\
  \ *)event\n\n- (void)motionCancelled:(UIEventSubtype)motion withEvent:(UIEvent *)event\n\
  ```\n\n每个消息会在运动事件的不同阶段发送。运动事件非常简单——请记住这些都是“高层”事件。运动事件开始，然后结束。如果运动被中断或从未完成，你的对象会收到一个运动取消消息。\n\
  \n要在你的视图控制器中处理运动事件，请将这三个事件处理方法添加到 `EBViewController` 的实现中：\n\n```\n- (void)motionBegan:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n\n{\n\n    if (motion==UIEventSubtypeMotionShake)\n\
  \n        [self fadeFortune];\n\n}\n\n- (void)motionEnded:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n\n{\n\n    if (motion==UIEventSubtypeMotionShake)\n\
  \n        [self newFortune];\n\n}\n\n- (void)motionCancelled:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n\n{\n\n    if (motion==UIEventSubtypeMotionShake)\n\
  \n        [self newFortune];\n\n}\n```\n\n每个方法首先检查 motion 参数，判断收到的运动事件是否是你感兴趣的那个（摇动运动）。如果不是，就忽略该事件。这很重要。未来版本的\
  \ iOS 可能会添加新的运动事件；你的对象应该只关注它设计用来处理的事件。\n\n`-motionBegan:withEvent:` 处理方法发送一条 `-fadeFortune`\
  \ 消息。当用户开始摇动设备时，当前消息会淡出。\n\n`-motionEnded:withEvent:` 处理方法发送 `-newFortune` 消息。当摇动停止时，一条新的命运消息会出现。\n\
  \n最后，`-motionCancelled:withEvent:` 处理方法确保如果运动被中断或被解释为其他手势，仍然有一条消息可见。\n\n\n\n###\
  \ 测试你的八球应用\n\n请确保在方案中选择了 iPhone 模拟器，然后运行你的应用。它将会在模拟器中显示，如图 4-14 所示。\n\n![A978-1-4302-5063-0_4_Fig14_HTML.jpg](img/A978-1-4302-5063-0_4_Fig14_HTML.jpg)\n\
  \n图 4-14. 测试八球应用\n\n在模拟器中选择 `硬件` ➤ `摇动手势` 命令。该命令会模拟用户摇晃设备，从而向你的应用发送摇动动作事件。\n\n恭喜，你已成功创建了一个摇动动作事件处理器！每当你摇动模拟设备时，都会出现一条新消息，如图\
  \ 4-15 所示。\n\n![A978-1-4302-5063-0_4_Fig15_HTML.jpg](img/A978-1-4302-5063-0_4_Fig15_HTML.jpg)\n\
  \n图 4-15. 运行中的八球应用\n\n### 第一响应者与响应者链\n\n从技术上讲，你的视图控制器并不需要成为第一响应者。真正需要的是你的视图控制器能够处于响应者链中。如果你界面中的某个视图或子视图是第一响应者，那么你的视图控制器就会出现在响应者链中，并接收动作事件——除非这些其他视图中的一个先截获并处理了该事件。\n\
  \n默认情况下，你的视图控制器不是第一响应者，也无法成为第一响应者。一个希望成为第一响应者的对象，在收到 `-canBecomeFirstResponder`\
  \ 消息时必须返回 `YES`。`UIResponder` 的基类实现默认返回 `NO`。因此，任何 `UIResponder` 的子类，除非重写了 `-canBecomeFirstResponder`\
  \ 方法，否则都没有资格成为第一响应者。\n\n在让你的对象有资格成为第一响应者之后，下一步就是明确请求成为第一响应者。这通常在你的 `-viewDidAppear:`\
  \ 方法中完成，使用的代码如下：\n\n```\n[self becomeFirstResponder];\n```\n\n特定的 Cocoa Touch 类——最值得注意的是文本视图和文本字段类——被设计为第一响应者，它们在收到\
  \ `-canBecomeFirstResponder` 消息时返回 `YES`。这些对象在触摸或激活时将自己设为第一响应者。作为第一响应者，它们处理键盘事件、复制和粘贴请求等。\n\
  \n此时你可能会疑惑，如果你的视图控制器不是第一响应者，也不在响应者链中，它为何能接收到动作事件？这要归功于 iOS 7。iOS 近期的一些改动使得当没有第一响应者或窗口本身就是第一响应者时，动作事件会被传递给活动的视图控制器。如果你希望你的应用也能在更早版本的\
  \ iOS 上运行，那么你需要确保你的视图控制器能够成为第一响应者（通过重写 `-canBecomeFirstResponder`），然后在视图加载时请求成为第一响应者（`[self\
  \ becomeFirstResponder]`）。\n\n以下是一个演示响应者链如何工作的实验。在 `Main.storyboard` 文件中，选择 `UITextView`，并使用属性检查器勾选“可编辑”行为。运行应用，点击并长按文本字段，待键盘弹出后编辑预言文本。现在选择模拟器的\
  \ `硬件` ➤ `摇动手势` 命令。会发生什么？字段中的文本会按照你的程序设定发生变化。\n\n返回 `EBViewController.m` 文件，注释掉所有三个动作事件处理方法。为此，选中这三个方法的文本，然后选择\
  \ `编辑器` ➤ `结构` ➤ `注释所选内容`（`Command+/`）。现在再次运行你的应用，选中文本，修改它，然后摇动模拟器。会发生什么？这次你会看到一个“撤销”对话框，询问你是否要撤销对文本所做的修改。\n\
  \n动作事件最初会发送给第一响应者（文本字段），随后经过视图控制器，最终到达 `UIApplication` 对象。`UIApplication` 对象将摇动事件解释为“撤销输入”。通过在视图控制器中拦截这些动作事件，你覆盖了\
  \ `UIApplication` 对象提供的默认行为。\n\n通过返回 `EBViewController.m` 并选择 `编辑` ➤ `撤销`，将你的应用恢复原样。对\
  \ `Main.storyboard` 也执行相同的操作。\n\n### 最后的润色\n\n用一个精美的图标为你的应用增添光彩。好吧，至少是用你在 `EightBall\
  \ (资源)` 文件夹中找到的图标。在你的项目导航器中，选择 `images.xcassets` 文件，然后选择 `AppIcon` 组。在 `EightBall\
  \ (资源)` 文件夹可见的情况下，将三个图标图片文件拖入 `AppIcon` 预览区域，如图 4-16 所示。Xcode 会根据大小自动将合适的图片文件分配给每个图标资源。\n\
  \n![A978-1-4302-5063-0_4_Fig16_HTML.jpg](img/A978-1-4302-5063-0_4_Fig16_HTML.jpg)\n\
  \n图 4-16. 导入应用图标\n\n**注意：** iOS 7 引入了一套与之前版本 iOS 不同的图标尺寸。如果你打算让应用运行在更早版本的 iOS 上，请查阅\
  \ iOS 人机界面指南中的“应用图标”部分，以获取所需图标资源的完整列表及其尺寸。\n\n处理好这个细节之后，让我们通过在实际的 iOS 设备上运行你的应用，来真正地“摇动”一下局面。\n\
  \n\n"
- '# 在实体 iOS 设备上测试


  你可以使用 Xcode 的 iPhone 和 iPad 模拟器来测试应用程序的很多功能，但模拟器无法模拟某些特性。其中两项是多次触摸（超过两次）和真正的加速计事件。要测试这些，你需要一台拥有真实加速计硬件且可以用真实手指触摸的实体
  iOS 设备。


  第一步是将 Xcode 连接到你的 iOS 开发者账户。选择 Xcode ➤ 偏好设置...，然后切换到 `Accounts` 标签页。点击窗口底部的 + 按钮，选择添加
  Apple ID...，如图 4-17 所示。


  ![A978-1-4302-5063-0_4_Fig17_HTML.jpg](img/A978-1-4302-5063-0_4_Fig17_HTML.jpg)


  图 4-17. 向 Xcode 添加新的 Apple ID


  输入你的 Apple ID 和密码，然后点击添加按钮。如果你还不是 iOS 开发者计划的成员，有一个方便的“加入计划...”按钮，点击后会跳转到苹果官网。


  **注意：** 在设备上运行应用程序之前，你必须是 iOS 开发者计划的成员。请访问 [`http://developer.apple.com/programs/ios`](http://developer.apple.com/programs/ios)
  了解如何成为成员。成为成员后，Xcode 将使用你的 Apple ID 下载并安装配置设备所需的安全证书。


  将 iPhone、iPad 或 iPod Touch 连接到电脑的 USB 端口。打开 Xcode 组织者窗口（Window ➤ Organizer）。在工具栏中，切换到设备标签页。你连接的
  iOS 设备会出现在左侧，如图 4-18 所示。如果设备上出现“信任”对话框，如图 4-18 右侧所示，你需要授予 Xcode 访问设备的权限。


  ![A978-1-4302-5063-0_4_Fig18_HTML.jpg](img/A978-1-4302-5063-0_4_Fig18_HTML.jpg)


  图 4-18. 设备管理


  选择你的 iOS 设备，然后点击“用于开发”按钮。Xcode 会为你的设备做好开发准备，这一过程称为配置。这允许你直接通过 Xcode 构建、安装和运行大多数
  iOS 项目。


  一旦设备配置完成，返回你的项目工作区窗口。将方案设置从某个模拟器更改为你的实际设备。我配置了一台 iPhone，因此 iPhone 会作为运行目标之一出现在图
  4-19 中。


  ![A978-1-4302-5063-0_4_Fig19_HTML.jpg](img/A978-1-4302-5063-0_4_Fig19_HTML.jpg)


  图 4-19. 选择用于测试的 iOS 设备


  再次运行 EightBall 应用程序。这次，你的应用程序会被构建，复制到你的 iOS 设备上，并开始运行。很酷，不是吗？


  神奇的是，Xcode 仍然处于控制之中——所以暂时不要拔掉 USB 连接！你可以设置断点、冻结应用、检查变量，以及执行在模拟器中可以做的任何事情。


  当 EightBall 应用运行时，摇晃你的设备，看看会发生什么。完成后，点击 Xcode 工具栏中的停止按钮。你会注意到你的 EightBall 应用现在已经安装在了设备上。你可以自由拔掉
  USB 连接并将其带走；毕竟，这是你的应用程序。


  '
- '# 响应者链的其他用途


  趁你对响应者链的概念还记忆犹新，在深入了解底层事件之前，我想提一下响应者链的其他几个用途。响应者链不仅用于处理事件，它还在动作、编辑和其他服务中扮演着重要角色。


  在之前的项目中，你将按钮和文本字段的动作连接到了特定对象。在 Interface Builder 中连接一个动作会设置两部分信息：


  - 将接收该动作的对象 (`SUViewController`)

  - 要发送的动作消息 (`-shortenURL:`)


  也可以将动作发送到响应者链，而不是特定对象。在 Interface Builder 中，你可以通过将动作连接到“第一响应者”占位对象来实现，如图 4-20 所示。


  ![A978-1-4302-5063-0_4_Fig20_HTML.jpg](img/A978-1-4302-5063-0_4_Fig20_HTML.jpg)


  图 4-20. 将动作连接到响应者链


  当按钮的动作被发送时，它首先会发送给第一响应者对象——无论该对象是什么。对于动作，iOS 会检查该对象是否实现了预期的消息（在此例中为 `-loadLocation:`）。如果实现了，该对象就会收到该消息。如果没有实现，iOS
  就会沿着响应者链向上查找，直到找到一个实现了该消息的对象为止。


  这在更复杂的应用中尤其有用，当动作消息的接收者超出了 Interface Builder 文件的范围时。你只能连接同一场景中的对象。如果你需要一个按钮向另一个视图控制器或应用对象本身发送动作，你无法在
  Interface Builder 中直接建立连接。但你可以将你的按钮连接到第一响应者。只要当按钮触发其动作时，预期的接收者位于响应者链中，你的对象就能接收到它。


  编辑功能也严重依赖于响应者链。当你在 iOS 中开始编辑文本时（比如 Shorty 应用中的 URL 字段），该对象会成为第一响应者。当用户在虚拟或实体键盘上输入时，这些按键事件会被发送给第一响应者。你可以在同一个屏幕上有多个文本字段，但只有一个会成为第一响应者。所有的按键事件、复制粘贴命令等，都会发送给当前激活的文本字段。


  '
- "# Touchy\n\n你已经学到了很多关于所谓的高层事件、初始响应者和响应者链的知识。现在是时候深入研究底层事件处理了，我们将从最常用的底层事件开始：触控事件。\n\
  \nTouchy 应用是一个演示应用。它的作用仅仅是向你展示你在屏幕上的触摸位置。通过实际操作观察这一点，并探索触控事件处理的一些细微之处，是非常有用的。你还会学到一项新的、非常重要的\
  \ Interface Builder 技能：在你的界面中创建自定义对象。\n\n### 设计\n\nTouchy 应用也有一个超级简单的界面，如图 4-21\
  \ 所示。Touchy 会显示你触摸视图对象的一个或多个位置。为了不让应用过于乏味，我们会添加一些额外的图形来增色，但这并非本次任务的重点。\n\n![A978-1-4302-5063-0_4_Fig21_HTML.jpg](img/A978-1-4302-5063-0_4_Fig21_HTML.jpg)\n\
  \n图 4-21. Touchy 应用的草图\n\n该应用通过使用一个自定义视图对象来拦截触摸事件。这个自定义视图对象会提取每个活动触摸点的坐标，并用这些坐标来绘制它们的位置。\n\
  \n### 创建项目\n\n像你之前做过多次的那样，首先创建一个基于“Single View iOS 应用模板”的新 Xcode 项目。将项目命名为 `Touchy`，设置类前缀为\
  \ `TY`，并选择设备为 `Universal`，如图 4-22 所示。\n\n![A978-1-4302-5063-0_4_Fig22_HTML.jpg](img/A978-1-4302-5063-0_4_Fig22_HTML.jpg)\n\
  \n图 4-22. 创建 Touchy 项目\n\n选择一个位置保存新项目并创建它。在项目导航器中，选择项目，选择 EightBall 目标，选择摘要标签页，然后在支持的界面方向部分关闭两个横向方向，这样只启用纵向方向。\n\
  \n\n\n### 创建自定义视图\n\n你将脱离之前在应用中使用过的开发模式。你不会将代码添加到 `TYTouchViewController` 类中，而是创建一个\
  \ `UIView` 的新自定义子类。关于“为什么”这么做，已在第 1 章中解释。“如何做”现在就来讲解。\n\n在项目导航器中选择 Touchy 组（而非项目）。从\
  \ `File` 菜单中，或者通过右键/Control+单击 Touchy 组，选择 `New File...` 命令，如图 4-23 所示。\n\n![A978-1-4302-5063-0_4_Fig23_HTML.jpg](img/A978-1-4302-5063-0_4_Fig23_HTML.jpg)\n\
  \n图 4-23. 创建新源文件\n\n与项目模板助手类似，Xcode 也为创建单个文件提供了模板。你将创建一个新的 Objective-C 类，因此在 iOS\
  \ Cocoa Touch 分组中选择 `Objective-C Class` 模板，如图 4-24 所示。\n\n![A978-1-4302-5063-0_4_Fig24_HTML.jpg](img/A978-1-4302-5063-0_4_Fig24_HTML.jpg)\n\
  \n图 4-24. 选择新文件模板\n\n将新文件命名为 `TYTouchyView`，并将其子类更改为 `UIView`，如图 4-25 所示。点击 Next，Xcode\
  \ 将询问你希望将文件保存在何处。确保勾选了 Touchy 目标。接受默认位置（项目文件夹内），然后点击 Create。这会将两个新文件添加到你的项目中：`TYTouchView.h`\
  \ 和 `TYTouchyView.m`。\n\n![A978-1-4302-5063-0_4_Fig25_HTML.jpg](img/A978-1-4302-5063-0_4_Fig25_HTML.jpg)\n\
  \n图 4-25. 命名新的 Objective-C 类\n\n你已经成功创建了一个新的 Objective-C 类！该类是 `UIView` 的子类，因此它继承了\
  \ `UIView` 对象的所有行为和特性，并且可以在任何可以使用 `UIView` 对象的地方使用。\n\n### 处理触摸事件\n\n现在，你将自定义 `UIView`\
  \ 对象以处理触摸事件。请记住，基类 `UIResponder` 和 `UIView` 本身并不处理触摸事件，它们只是将事件沿着响应链向上传递。通过实现你自己的触摸事件处理方法，你将改变这一行为，使你的视图直接响应触摸。\n\
  \n如你所知，触摸事件会被传递到它们所发生的视图对象。如果你还不知道这一点，请返回并阅读“命中测试”部分。你所要做的就是在你的类中添加适当的事件处理方法。将以下代码添加到\
  \ `TYTouchyView.m` 实现文件中，放在 `@end` 语句之前：\n\n```\n- (void)touchesBegan:(NSSet *)touches\
  \ withEvent:(UIEvent *)event\n{\n    [self updateTouches:event.allTouches];\n}\n\
  \n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event\n{\n    [self\
  \ updateTouches:event.allTouches];\n}\n\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
  \ *)event\n{\n    [self updateTouches:event.allTouches];\n}\n\n- (void)touchesCancelled:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n{\n    [self updateTouches:event.allTouches];\n\
  }\n```\n\n**注意：** Xcode 会在你的源代码中显示一些错误。暂时忽略它们；当你添加 `-updateTouches:` 方法时，你会修复这些错误。\n\
  \n每个触摸事件消息都包含两个对象。一个 `NSSet` 对象，包含相关的触摸对象；以及一个 `UIEvent` 对象，它概括了导致该消息被发送的事件。\n\n\
  在典型的应用中，你的方法会关注 `touches` 集合。这个集合（或无序集合）中的对象包含一个 `UITouch` 对象，用于与该事件相关的每个触摸。每个 `UITouch`\
  \ 对象描述一个触摸位置：其坐标、相位、发生时间、点击次数等。\n\n对于“开始”事件，`touches` 集合将包含刚刚开始的触摸对应的 `UITouch`\
  \ 对象。对于“移动”事件，它将仅包含那些发生移动的触摸点。对于“结束”事件，它将仅包含那些从屏幕上移除的触摸对象。从编程角度来看，这非常方便，因为大多数视图对象只关注与该事件相关的\
  \ `UITouch` 对象。\n\n然而，Touchy 应用略有不同。Touchy 希望始终跟踪所有活动的触摸。你实际上并不关心刚刚发生了什么，而是想要“全局视图”：当前与屏幕接触的所有触摸点的列表。为此，转向使用\
  \ `event` 对象。\n\n`UIEvent` 对象的主要目的是描述刚刚发生的单个事件；或者更准确地说，是刚刚从事件队列中取出的单个事件。但 `UIEvent`\
  \ 还携带一些其他有趣的信息。其中之一是 `allTouches` 属性，它包含设备上所有触摸点的当前状态，无论它们与哪个视图相关联。\n\n因此，现在我可以解释你所有的事件处理方法的作用了。它们在等待设备触摸状态的任何变化。它们忽略具体的更改，深入查看\
  \ `event` 对象以查找所有活动触摸对象的状态，并将其传递给你的 `-updateTouches:` 方法。该方法将记录所有活动触摸的位置，并利用这些信息在屏幕上绘制这些位置。\n\
  \n那么，我想你需要编写那个方法了！紧挨着你在 `TYTouchyView.m` 中刚添加的触摸事件处理方法的上方，将以下方法添加到你的实现中：\n\n```\n\
  - (void)updateTouches:(NSSet*)set\n{\n    NSMutableArray *array = [NSMutableArray\
  \ array];\n    for ( UITouch *touch in set )\n    {\n        switch (touch.phase)\
  \ {\n            case UITouchPhaseBegan:\n            case UITouchPhaseMoved:\n\
  \            case UITouchPhaseStationary:\n                [array addObject:[NSValue\
  \ valueWithCGPoint:\n                    [touch locationInView:self]]];\n      \
  \          break;\n            default:\n                break;\n        }\n   \
  \ }\n    touchPoints = array;\n    [self setNeedsDisplay];\n}\n```\n\n你还应在 `@implementation`\
  \ 语句之前，在一个私有接口中声明该方法，并且还需要定义一个变量来存储活动的触摸点：\n\n```\n@interface TYTouchyView ()\n\
  {\n    NSArray* touchPoints;\n}\n- (void)updateTouches:(NSSet*)set;\n@end\n```\n\
  \n现在，回到 `-updateTouches:` 方法。它首先创建一个空数组对象。这是你将存储所感兴趣信息的地方。`-updateTouches:` 然后遍历集合中的每个\
  \ `UITouch` 对象，并检查其相位。触摸的相位是其当前状态：“开始”、“移动”、“静止”、“结束”或“取消”。Touchy 只关心代表手指仍触摸屏幕的状态（“开始”、“移动”和“静止”）。`switch`\
  \ 语句匹配这三个状态，获取相对于该视图对象的触摸坐标，并将其转换为 `NSValue` 对象（适合添加到集合中）。然后，该 `NSValue` 对象被添加到集合中。\n\
  \n当所有活动触摸坐标都收集完毕后，新的集合被保存在对象的私有 `touchPoints` 变量中。最后，你的视图对象向自身发送 `-setNeedsDisplay`\
  \ 消息。该消息告诉你的视图对象，它需要重新绘制自身。\n\n\n\n### 绘制你的视图\n\n到目前为止，你还没有编写任何绘制内容的代码。你只是拦截了发送给视图的触摸事件，并提取了你想要获取的设备触摸状态信息。在\
  \ iOS 中，你并非在事件发生时立即进行绘制。你只是记下需要绘制的内容，然后等待 iOS 通知你的对象何时进行绘制。绘制操作由本章开头提到的用户界面更新事件触发。\n\
  \n关于绘制的工作原理，第 1 章中已有描述，因此这里不再赘述细节。你只需要知道，当 iOS 希望你的视图进行自我绘制时，你的对象会收到一个 `-drawRect:`\
  \ 消息。将以下 `-drawRect:` 消息添加到你的实现中：\n\n```objective-c\n- (void)drawRect:(CGRect)rect\n\
  {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    [[UIColor blackColor]\
  \ set];\n    CGContextFillRect(context,rect);\n\n    UIBezierPath *path = nil;\n\
  \    if (touchPoints.count>1)\n        {\n        path = [UIBezierPath bezierPath];\n\
  \        NSValue* firstLocation = nil;\n        for ( NSValue *location in touchPoints\
  \ )\n            {\n            if (firstLocation==nil)\n                {\n   \
  \             firstLocation = location;\n                [path moveToPoint:location.CGPointValue];\n\
  \                }\n            else\n                {\n                [path addLineToPoint:location.CGPointValue];\n\
  \                }\n            }\n        if (touchPoints.count>2)\n          \
  \  [path addLineToPoint:firstLocation.CGPointValue];\n\n        [[UIColor lightGrayColor]\
  \ set];\n        path.lineWidth = 6;\n        path.lineCapStyle = kCGLineCapRound;\n\
  \        path.lineJoinStyle = kCGLineJoinRound;\n        [path stroke];\n      \
  \  }\n\n    unsigned int touchNumber = 1;\n    NSDictionary* fontAttrs = @{\n  \
  \      NSFontAttributeName: [UIFont boldSystemFontOfSize:180],\n        NSForegroundColorAttributeName:\
  \ [UIColor yellowColor]\n        };\n\n    for ( NSValue *location in touchPoints\
  \ )\n        {\n        NSString *text = [NSString stringWithFormat:@\"%u\",touchNumber++];\n\
  \        CGSize size = [text sizeWithAttributes:fontAttrs];\n        CGPoint touchPoint\
  \ = location.CGPointValue;\n        CGPoint textCorner = CGPointMake(touchPoint.x-size.width/2,\n\
  \                                         touchPoint.y-size.height/2);\n       \
  \ [text drawAtPoint:textCorner withAttributes:fontAttrs];\n        }\n}\n```\n\n\
  哇，这代码量真不少。同样，细节并不重要，但你可以自由研究这段代码，感受一下它的作用。我仅对其功能进行简要总结。\n\n第一部分用黑色填充了整个视图。\n\n中间部分是一个大循环，用于创建一个贝塞尔路径（以法国工程师皮埃尔·贝塞尔命名）。贝塞尔路径几乎可以表示任何线条、多边形、曲线、椭圆或这些元素的任意组合。基本上，只要是形状，贝塞尔路径就能绘制出来。你将在第\
