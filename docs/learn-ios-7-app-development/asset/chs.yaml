  \n\n\n### 绘制 `CMColorView`\n\n现在切换到 `CMColorView.m` 实现文件。你需要添加一个 `-drawRect:` 方法，该方法会在当前亮度级别绘制一个二维的色相/饱和度色板。在色板中代表当前色相/饱和度的位置，视图会绘制一个填充了该颜色的圆形。\n\
  \n这段代码量不小，而且并非本章重点，因此我会简要掠过细节。你需要添加到 `CMColorView.m` 中的代码见代码清单 8-1 和 8-2。如果你正在边阅读本章边编写这个应用，我为你鼓掌。不过，我建议你省去大量打字时间，直接从\
