- "# 复杂视图对象\n\n到目前为止，你在 ColorModel 中使用的视图对象显示的都是相对简单的（`NSString` 或 `UIColor`）值。有时视图对象会显示更复杂的数据类型。复杂的视图对象保持对数据模型的引用并不罕见。这使得它们能够直接访问所需的所有信息。\n\
  \n为了让 ColorModel 更有趣一点，你将用一个自定义视图对象替换简单的 `UIView` 对象，该对象除了显示色相/饱和度颜色图表外，还会标识出色相、饱和度和亮度滑块所选的具体颜色。修改你的设计后，新应用应该看起来像图\
  \ 8-23 所示。\n\n![A978-1-4302-5063-0_8_Fig23_HTML.jpg](img/A978-1-4302-5063-0_8_Fig23_HTML.jpg)\n\
  \n图 8-23. 更新后的 ColorModel 设计\n\n## 用 CMColorView 替换 UIView\n\n你的新设计将用你自定义的 `CMColorView`\
  \ 对象替换当前设计中的 `UIView` 对象。首先，向项目中添加一个新的 Objective-C 类。在项目导航器中选择 `ColorModel` 组（文件夹），然后选择“文件”\
  \ ➤ “新建” ➤ “文件...”命令（或右键/Control+单击该组，然后选择“新建文件...”）。选择 Objective-C 类模板，将其命名为 `CMColorView`，作为\
  \ `UIView` 的子类，并将其添加到项目中。\n\n将界面中的普通视图从 `UIImage` 对象升级为新的 `CMColorView` 对象。在 `Main.storyboard`\
  \ 中，选择 `UIImage` 视图对象。使用身份检查器将对象的类从 `UIView` 更改为 `CMColorView`，如图 8-24 所示。\n\n![A978-1-4302-5063-0_8_Fig24_HTML.jpg](img/A978-1-4302-5063-0_8_Fig24_HTML.jpg)\n\
  \n图 8-24. 将 UIView 更改为 CMColorView\n\n在你的 `CMViewController.h` 接口文件中，找到引用此对象的 `colorView`\
  \ 属性。在文件顶部附近添加一条 `#include` 语句，以便 `CMViewController` 了解 `CMColorView` 对象：\n\n```\n\
  #import \"CMColorView.h\"\n```\n\n现在将 `colorView` 属性的类型从 `UIView` 更改为 `CMColorView`（修改后的代码以粗体显示）。这样你的控制器就连接到了一个\
  \ `CMColorView` 对象：\n\n`@property (weak,nonatomic) IBOutlet CMColorView *colorView;`\n\
  \n## 将视图连接到数据模型\n\n与你迄今为止使用的视图对象不同，你的 `CMColorView` 对象将理解并引用你的 `CMColor` 数据模型。为了使其理解\
  \ `CMColor`，在新建的 `CMColorView.h` 接口文件顶部附近添加以下 `#include` 语句：\n\n```\n#include \"\
