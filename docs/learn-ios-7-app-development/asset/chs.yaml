- '# 1. 准备好了吗？


  ## 摘要


  如果你想构建什么东西，你可能需要一些工具：锤子、钉子、激光、起重机，以及宜家那套内六角扳手中的一个。构建 iOS 应用需要一套名为 `Xcode` 的工具。


  本章将展示如何获取并安装 `Xcode`，并带你简要浏览其界面，以便你熟悉它。如果你已经安装并使用了 `Xcode`，请查看“要求”部分以确认你拥有所需的一切，但你可以跳过本章的大部分内容。


  ## 要求


  在本书中，你将创建运行于 iOS 7 版本的应用。为 iOS 7 创建应用需要 `Xcode` 5 版本。`Xcode` 5 需要 OS X 10.8 版本（又名
  Mountain Lion），而后者需要 Intel 架构的 Mac。都明白了吗？这是你的完整清单：


  *   Intel 架构的 Mac

  *   OS X 10.8（或更高版本）

  *   几 GB 的可用磁盘空间

  *   互联网连接

  *   至少一个运行 iOS 7.0（或更高版本）的 iOS 设备（`iPod Touch`、`iPhone` 或 `iPad`）


  请确保你拥有安装了 OS X 10.8（Mountain Lion）或更高版本的 Intel 架构 Mac 电脑、足够的磁盘空间以及互联网连接。你可以在 Mac
  上完成所有初始应用开发，但某个时刻你会希望在真实的 iOS 设备（`iPhone`、`iPod Touch` 或 `iPad`）上运行你的应用，为此你需要一台这样的设备。


  注意


  通常来说，版本越新越好。本书中的示例是在 OS X 10.8.5（Mountain Lion）上，使用 `Xcode` 5.0 构建，针对 iOS 7.0 开发的。当你读到本书时，所有这些可能都有更新的版本，这没问题。


  ## 安装 Xcode


  苹果公司已尽可能简化 `Xcode` 的安装过程。在你的 Mac 上，启动 App Store 应用并搜索 `Xcode`，如图 1-1 所示。


  ![A978-1-4302-5063-0_1_Fig1_HTML.jpg](img/A978-1-4302-5063-0_1_Fig1_HTML.jpg)


  图 1-1. App Store 中的 Xcode


  点击安装按钮开始下载 `Xcode`。这需要一些时间（见图 1-2）。你可以从 App Store 的“已购项目”标签页监控其进度。请耐心等待。`Xcode`
  非常庞大，即使互联网连接很快，下载也需要一些时间。


  ![A978-1-4302-5063-0_1_Fig2_HTML.jpg](img/A978-1-4302-5063-0_1_Fig2_HTML.jpg)


  图 1-2. 正在下载 Xcode


  在 `Xcode` 下载的同时，让我们来聊聊它以及一些相关话题。


  ## 什么是 Xcode？


  那么你正在下载的这个庞大应用到底是什么？


  `Xcode` 是一个集成开发环境（IDE）。现代软件开发需要数量惊人的不同程序。为了构建和测试一个 iOS 应用，你将需要编辑器、编译器、链接器、语法检查器、加密签名器、资源编译器、调试器、模拟器、性能分析器等等。但你不必担心这些；`Xcode`
  为你协调所有这些独立的工具。你只需使用 `Xcode` 界面来设计你的应用，`Xcode` 就会决定需要运行哪些工具，以及何时运行。换句话说，`Xcode` 让
  IDE 名副其实。


  除了包含你需要的所有工具，`Xcode` 还可以承载多个软件开发工具包（SDK）。一个 SDK 是一系列文件的集合，它为 `Xcode` 提供构建针对特定操作系统（如
  iOS 7）的应用所需的内容。`Xcode` 自带了用于构建 iOS 应用和 OS X 应用的 SDK，分别对应两者的最新版本。你可以根据需要下载额外的 SDK。


  一个 SDK 由一个或多个框架组成。一个框架精确地告诉 `Xcode` 你的应用如何使用某个 iOS 服务。这被称为应用程序编程接口（API）。虽然你可以编写代码让你的应用做任何事情，但应用大部分工作将是向
  iOS 请求那些已经为你编写好的服务：显示一个警告、在字典中查找一个词、拍照、播放一首歌等等。本书的大部分内容将教你如何请求这些内置服务。


  注意


  框架是文件夹中的一组文件，很像你将在本书中创建的应用包。不过，框架不包含应用，而是包含你的应用使用操作系统特定部分所需的文件。例如，在屏幕上绘制内容所需的所有函数、常量、类和资源都位于
  `Core Graphics` 框架中。`AVFoundation` 框架包含让你录制和播放音频的类。想知道你在哪里？你需要 `CoreLocation` 框架中的函数。这样的独立框架有几十个。


  哇，缩写真多！让我们回顾一下：


  *   IDE：集成开发环境。`Xcode` 就是一个 IDE。

  *   SDK：软件开发工具包。支持文件集，让你能够为特定操作系统（如 iOS 7）构建应用。

  *   API：应用程序编程接口。一组发布的函数、类和定义，描述你的应用如何使用特定服务。


  你不需要记住这些。只是当你听到它们，或与其他程序员交流时，知道它们是什么意思会很有好处。




  '
- '# 成为 iOS 开发者


  你正在阅读本书这一事实，就已经让你在精神上成为一名 iOS 开发者了。要成为正式的 iOS 开发者，你需要加入苹果的 iOS 开发者计划。


  如果你想要做以下任何一件事，就必须成为一名 iOS 开发者：


  *   通过苹果的 App Store 销售或赠送你的应用。

  *   获得苹果开发者论坛及其他资源的访问权限。

  *   直接将你的应用（在 App Store 之外）分发给他人。

  *   开发使用 `Game Kit`、应用内购买、推送通知或类似技术的应用。

  *   在真实的 iOS 设备上测试你的应用。


  第一个原因是促使大多数开发者加入该计划的原因，也很可能是你加入的原因。然而，你并非必须加入才能在 Xcode 的模拟器中构建、测试和运行你的应用。如果你从未打算通过
  App Store 分发你的应用，或者在你的 iOS 设备上运行应用，你可能永远都不需要成为 iOS 开发者。即使不加入，你也可以完成本书的大部分内容。


  另一个加入的原因是获得 iOS 开发者社区和支持计划的访问权限。苹果的在线论坛蕴藏着丰富的信息。如果你遇到问题并且找不到答案，很可能其他人已经遇到过同样的问题。快速搜索开发者论坛通常就能找到答案。如果找不到，发布你的问题，也许有人会为你解答。


  即使你不打算在 App Store 上销售或赠送你的杰作，也还有其他几个加入的理由。如果你想要将应用安装到设备上，苹果要求你必须成为注册开发者。然后，苹果会生成特殊的文件，允许你的应用安装到
  iOS 设备上。


  作为注册开发者，苹果还允许你直接将你的应用安装到其他人的设备上（即不通过 App Store）。这被称为即席分发。虽然可分发的人数有限制，但这是可行的。


  最后，某些技术需要你的应用与苹果的服务器通信。在被允许之前，你必须先在苹果注册你本人以及你的应用，即使只是为了测试。例如，如果你计划在你的应用中使用 `Game
  Kit`——本书包含一个 `Game Kit` 示例——你就需要成为 iOS 开发者。


  将此网址加入书签：[`http://developer.apple.com/`](http://developer.apple.com/)


  在我撰写本书时，成为 iOS 开发者的费用是 99 美元（美国）。这是年度订阅制，所以直到你需要时才加入。点击该链接可获取关于苹果开发者计划的更多信息。


  那么[`developer.apple.com`](http://developer.apple.com)上有没有免费的内容？实际上，免费内容相当多。你可以搜索所有苹果已发布的文档、下载示例项目、阅读技术指南、技术笔记等等——这些都不要求你必须是
  iOS 开发者。有些活动需要你使用 Apple ID 登录（你的 iTunes 或 iCloud 帐户即可），或者你可以创建一个新的 Apple ID。


  付费注册还能让你有机会购买苹果每年举办的全球开发者大会（WWDC）的门票。那是一个盛大的聚会，专为苹果开发者举办。


  '
- '# 获取项目文件


  现在正是下载本书项目文件的好时机。本书中使用了大量项目。许多项目都可以通过遵循每章的步骤重新创建，我鼓励你尽可能这样做，这样你就能体会到从头开始构建应用的感觉。然而，有些项目并未解释每一个细节，还有一些项目包含了无法在印刷品中重现的二进制资源（图片和声音文件）。


  前往本书在[`http://www.apress.com`](http://www.apress.com/)上的页面（你可以通过书名、ISBN 或作者姓名进行搜索）。在书的描述下方，你会看到一些文件夹标签，其中一个标有“源代码/下载”。点击该标签。现在找到下载本书项目的链接。点击该链接，一个名为`Learn
  iOS Development Projects.zip`的文件将下载到你的硬盘上。


  在你的“下载”文件夹（或浏览器保存的位置）中找到`Learn iOS Development Projects.zip`文件。双击该文件解压内容，你会得到一个名为`Learn
  iOS Development Projects`的文件夹。将这个文件夹移动到任何你喜欢的位置。




  '
- '# 首次启动 Xcode


  `Xcode` 应用下载完成后，你会在 `Applications` 文件夹中找到它。通过双击、使用 `Launchpad` 或任何你喜欢的方式打开 `Xcode`
  应用。我建议将 `Xcode` 添加到 `Dock` 以便快速访问。


  `Xcode` 将显示一份许可协议（见图 1-3），建议你至少浏览一遍，但必须同意后才能继续。


  ![A978-1-4302-5063-0_1_Fig3_HTML.jpg](img/A978-1-4302-5063-0_1_Fig3_HTML.jpg)


  图 1-3. 许可协议


  完成所有初始步骤后，你将看到 `Xcode` 的启动窗口，如图 1-4 所示。


  ![A978-1-4302-5063-0_1_Fig4_HTML.jpg](img/A978-1-4302-5063-0_1_Fig4_HTML.jpg)


  图 1-4. Xcode 的启动窗口


  启动窗口有几个自解释的按钮，可帮助你快速上手。它还列出了你最近打开的项目。


  `Xcode` 的有趣功能只有在打开项目时才会显现，因此请先创建一个新项目。点击启动窗口中的 `Create a new Xcode project` 按钮（或从菜单中选择
  `File` ➤ `New` ➤ `Project...`）。`Xcode` 首先会询问你想创建哪种类型的项目，如图 1-5 所示。


  ![A978-1-4302-5063-0_1_Fig5_HTML.jpg](img/A978-1-4302-5063-0_1_Fig5_HTML.jpg)


  图 1-5. 项目模板浏览器


  模板浏览器允许你选择一个项目模板。每个模板都会创建一个预配置的新项目，用于为特定平台（`iOS` 或 `OS X`）构建特定内容（应用、库、插件等）。虽然也可以手动配置任何项目以生成你想要的内容，但这既技术性强又繁琐；通过选择尽可能接近你应用最终“形态”的模板，可以省去大量工作。


  在本书中，你只会创建 `iOS` 应用，因此选择 `iOS` 部分下的 `Application` 类别——但也可以随意查看其他部分。如你所见，`Xcode`
  的用途远不止 `iOS` 开发。


  选中 `Application` 部分后，点击 `Single View Application` 模板，然后点击 `Next` 按钮。在下一个界面中，`Xcode`
  需要你提供新项目的详细信息，如图 1-6 所示。你在此处看到的选项会根据所选模板而有所不同。


  ![A978-1-4302-5063-0_1_Fig6_HTML.jpg](img/A978-1-4302-5063-0_1_Fig6_HTML.jpg)


  图 1-6. 新项目选项


  对于这个简单演示，请在 `Product Name` 字段中为新项目命名。名称可以任意——我在此示例中使用了 `MyFirstApp`——但我建议名称保持简洁。`Organization
  Name` 是可选项，但我建议填写你的名字（或你所在公司的名称，如果你将为其开发应用的话）。


  `Company Identifier` 和 `Product Name` 共同构成一个唯一标识你应用的 `Bundle Identifier`。`Company
  Identifier` 是一个反向域名，应由你（或你公司）拥有。目前它并不重要，因为你仅为自己构建此应用，所以使用任何你喜欢的域名即可。当你构建计划通过 `App
  Store` 分发的应用时，这些值必须是合法的。


  其余选项对于本演示无关紧要，因此点击 `Next` 按钮。`Xcode` 最后会询问新项目的存储位置（见图 1-7）。每个项目都会创建一个以项目命名的文件夹。用于创建应用的所有文档都将存储在该项目文件夹中。你可以将项目文件夹放在任何位置（甚至
  `Desktop` 上）。在此示例中，我创建了一个新的 `iOS Development` 文件夹，以便将所有项目文件夹集中存放。


  ![A978-1-4302-5063-0_1_Fig7_HTML.jpg](img/A978-1-4302-5063-0_1_Fig7_HTML.jpg)


  图 1-7. 创建新项目


