  选择视图控制器（通过点击视图下方的对象停靠区或大纲中的`View Controller`对象），然后从“Resolve Auto Layout Issues”按钮中选择“Add
  Missing Constraints in View Controller”。Interface Builder 会使用你已建立的那一个约束，并填充所有设备上建立此布局所需的任何其他约束。


