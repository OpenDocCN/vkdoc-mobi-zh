- "# 11. 为我画一幅画\n\n## 摘要\n\n你已经到达了掌握 iOS 开发的一个关键节点。你在应用中添加现有视图对象方面已经积累了相当丰富的经验。你已经让它们显示数据，将它们连接到你的自定义控制器逻辑，并自定义了它们的外观与感受。但你仍然受限于苹果为你撰写的视图类。没有什么能替代创建你自己的视图对象——一个能够绘制出他人未曾想象过的东西的对象。\n\
  \n好吧，这并不完全正确。你确实创建过自定义视图对象，但在这两次实践中，我都忽略了它们的工作原理，而是在旁边附上了一条小注释：“请忽略幕后的视图；一切将在第 11\
  \ 章中解释。”欢迎来到第 11 章！在本章中，你将（更多地）了解到：\n\n* 创建视图子类\n* 视图几何\n* 视图的绘制方式与时机\n* Core Graphics\n\
  * 贝塞尔路径\n* 动画\n* 手势识别器\n* 位图与图像\n\n本章会涉及一些技术细节，但我认为你已经准备好了。\n\n## 创建自定义视图类\n\n你可以通过继承\
  \ `UIView` 或 `UIControl` 来创建自定义视图，这取决于你的目标是创建一个显示对象，还是类似控件（如一种新型开关）的东西。在本章中，你将只继承\
  \ `UIView`。\n\n> **警告**  \n> 不要为了“摆弄”具体视图类（如 `UIButton` 或 `UISwitch`）的功能而去继承它们。这是灾难的根源。它们的内部工作机制并非公开，并且经常随\
  \ iOS 版本而改变，这意味着你的类可能在不久的将来就无法工作。那些设计用于被继承的视图类（如 `UIControl`）都有清晰的文档说明，通常会在文档中包含“子类化说明”一节。\n\
  \n要创建你自己的视图类，你需要理解三件事：\n\n* 视图坐标系\n* 用户界面更新事件\n* 如何在 Core Graphics 上下文中进行绘制\n\n\
  让我们从顶点开始——字面意义上的顶点。\n\n### 视图坐标\n\n设备的屏幕、窗口和视图都拥有一个图形坐标系。这个坐标系确立了你在设备上看到的一切（屏幕、窗口、视图、图像和形状）的位置和大小。每个视图对象都有其自己的坐标系。坐标系统的原点位于其左上角，坐标为\
  \ `(0,0)`，如图 11-1 所示。\n\n![A978-1-4302-5063-0_11_Fig1_HTML.jpg](img/A978-1-4302-5063-0_11_Fig1_HTML.jpg)\n\
  \n**图 11-1.** 图形坐标系\n\nX 坐标向右递增，Y 坐标向下递增。Y 轴与你上学时学到的笛卡尔坐标系，或者你可能在业余时间阅读几何书时了解到的坐标系是上下颠倒的。对于计算机程序而言，这种布局更为方便；大多数内容都从左上角开始“流动”，因此从左上角进行计算通常比从左下角更简单。\n\
  \n> **注意**  \n> 如果你做过任何 OS X 编程，你会发现 iOS 和 OS X 的视图对象有很多相似之处。然而，从 OS X 的角度来看，iOS\
  \ 中不存在“翻转坐标”——它们始终是翻转的。\n\niOS 中有四种用于描述坐标、位置、大小和区域的关键变量类型，均列于表 11-1 中。\n\n**表 11-1.**\
  \ 坐标值类型\n\n| 类型 | 描述 |\n| --- | --- |\n| `CGFloat` | 基本的标量值。`CGFloat` 是浮点类型，用于表示单个坐标或距离。\
  \ |\n| `CGPoint` | 一对 `CGFloat` 值，用于指定坐标系中的一个点 (`x`,`y`)。 |\n| `CGSize` | 一对 `CGFloat`\
  \ 值，用于描述某物体的尺寸 (`width`,`height`)。 |\n| `CGRect` | 由一个点 (`CGPoint`) 和一个尺寸 (`CGSize`)\
  \ 组合而成，共同描述一个矩形区域。 |\n\n\n\n"
- "# Frame 与 Bounds\n\n视图对象有两个矩形（`CGRect`）属性：`bounds` 和 `frame`。`bounds` 属性描述了对象自身的坐标系。视图的所有图形内容（包括任何子视图）都使用这个坐标系。需要理解的关键是，视图内容的所有绘制操作都由该视图本身执行，并且使用的是视图自身的坐标系——通常被称为其本地坐标。\n\
  \n在父视图中移动视图并不会改变视图自身的坐标系。视图内的所有图形相对于该视图对象的原点（左上角）保持不变。在图 11-1 中，子视图宽 160 像素，高 50\
  \ 像素。因此，它的 bounds 矩形为 `((0,0),(160,50))`；其原点 (x,y) 为 `(0,0)`，尺寸 (width,height) 为\
  \ `(160,50)`。当子视图绘制自身时，它是在该矩形范围内进行绘制的。\n\n`frame` 属性则在其父视图的坐标系中描述该视图。换句话说，frame\
  \ 是子视图在另一个视图中的位置——通常被称为其父视图坐标。在图 11-1 中，子视图的原点是 `(20,60)`。该视图的尺寸为 `(160,50)`，因此其\
  \ frame 为 `((20,60),(160,50))`。如果视图向下移动 10 像素，其 frame 将变为 `((20,70),(160,50))`。视图绘制的一切内容都会向下移动\
  \ 10 像素，但这不会改变视图的 `bounds` 或视图内部绘制内容的相对坐标。\n\n`bounds` 和 `frame` 的尺寸是相互关联的。改变 `frame`\
  \ 的尺寸会改变 `bounds` 的尺寸，反之亦然。如果将图 11-1 中子视图的 `frame` 宽度减少 60 像素，其 frame 将变为 `((20,60),(100,50))`。这一改变会改变其\
  \ `bounds`，使其变为 `((0,0),(100,50))`。类似地，如果将 `bounds` 从 `((0,0),(160,50))` 改为 `((0,0),(100,40))`，则\
  \ `frame` 会自动变为 `((20,60),(100,40))`。\n\n注意\n\n“frame 的尺寸始终等于 bounds 的尺寸”这条规则有几个例外。你已经遇到了其中一个例外：滚动视图。滚动视图内容（`bounds`）的尺寸由其独立于\
  \ frame 尺寸的 `contentSize` 属性控制，后者决定屏幕上显示的部分。其他例外情况发生在应用变换时，我稍后会讨论。\n\n`UIView` 还提供了一个合成的\
  \ `center` 属性。该属性返回视图 `frame` 矩形的中心点。从技术上讲，`center` 始终等于 `(CGRectGetMidX(frame),CGRectGetMidY(frame))`。如果你更改\
  \ `center` 属性，视图的 `frame` 将会移动，使其中心对准该点。`center` 属性使得在无需调整子视图尺寸的情况下，既能移动又能居中子视图变得简单。\n\
  \n## 在坐标系之间转换\n\n你可能需要一段时间——我也花了很长时间——才能掌握不同的坐标系，并学会何时使用 `bounds`、何时使用 `frame`，以及何时在它们之间进行转换。以下是一些需要记住的快速实用规则：\n\
  \n*   `bounds` 是视图的内部坐标：该视图内部所有内容的坐标。\n*   `frame` 是视图的外部坐标：该视图在其父视图中的位置。\n\n如果需要，有多种方法可以在视图的坐标系之间进行转换。表\
  \ 11-2 列出了 `UIView` 方法中最常见的四种。举个例子，假设你在图 11-1 子视图的本地坐标系中拥有其右下角的坐标 `(160,50)`。如果你想知道同一点在父视图坐标系中的坐标，请发送消息\
  \ `[superview convertPoint:CGPointMake(160,50) fromView:subview]`。该语句将返回点 `(180,110)`，这是同一点，但位于父视图的坐标系中。\n\
  \n**表 11-2. UIView 中的坐标转换方法**\n\n| UIView 方法 | 描述 |\n| --- | --- |\n| `-convertPoint:toView:`\
  \ | 将接收器本地坐标系中的一个点转换到另一个视图的本地坐标系中对应的点。 |\n| `-convertPoint:fromView:` | 将另一个视图坐标系中的一个点转换到接收器的本地坐标系中。\
  \ |\n| `-convertRect:toView:` | 将接收器本地坐标系中的一个矩形转换到另一个视图的本地坐标系中对应的矩形。 |\n| `-convertRect:fromView:`\
  \ | 将另一个视图坐标系中的一个点转换到接收器的本地坐标系中。 |\n\n此外，所有传递坐标的与事件相关的类，都会在特定视图的坐标系中报告这些坐标。例如，`UITouch`\
  \ 类没有 `location` 属性。相反，它有一个 `-locationInView:` 方法，可以将触摸点转换为你正在操作的视图的本地坐标。\n\n##\
  \ 视图何时被绘制\n\n在第四章中，你了解到 iOS 应用是事件驱动的程序。刷新用户界面（程序员术语，即在屏幕上绘制内容）也是由事件循环触发的。当视图有内容要绘制时，它并不会直接绘制。相反，它会记住要绘制的内容，然后请求一个绘制事件消息。当你的应用的事件循环决定更新显示时，它会向所有需要重绘的视图发送用户界面更新消息。因此，视图的绘制生命周期会重复以下模式：\n\
  \n更改要绘制的数据。  \n向你的视图对象发送 `-setNeedsDisplay` 消息。这会将视图标记为需要重绘。  \n当事件循环准备好更新显示时，你的视图将收到\
  \ `-drawRect:` 消息。\n\n你很少需要向其他视图发送 `-setNeedsDisplay` 消息。大多数视图在发生需要重绘自身的变化时，都会自行发送该消息。例如，当你设置\
  \ `UILabel` 对象的 text 属性时，标签对象会向自身发送 `-setNeedsDisplay`，以便新标签能够显示出来。类似地，如果视图以需要重绘自身的方式发生改变（例如被添加到新的父视图），它会自动接收到\
  \ `-setNeedsDisplay`。\n\n但这并不意味着对视图的每一次更改都会触发另一个 `-drawRect:` 消息。当视图绘制自身时，结果图像会被\
  \ iOS 保存或缓存——就像拍快照一样。不影响该图像的更改，例如在屏幕上移动视图（不调整其大小），不会导致另一个 `-drawRect:` 消息；iOS 会简单地重用已有的视图快照。\n\
  \n注意\n\n传递给 `-drawRect:` 方法的 `rect` 参数是视图中需要重绘的部分。大多数情况下，它与 `bounds` 相同，这意味着你需要重绘所有内容。在极少数情况下，它可能是一个更小的部分。大多数\
  \ `-drawRect:` 方法不太关注它，只会绘制整个视图。绘制超出所需内容并无大碍，但绝不能绘制少于所需的内容。如果你的绘制代码非常复杂且耗时，你可以尝试只更新\
  \ `rect` 参数指定的区域来节省时间。\n\n所以现在你知道了视图何时以及为何要绘制自身，接下来你只需要知道如何绘制了。\n\n\n### 绘制一个 `View`\n\
  \n当视图对象收到 `-drawRect:` 消息时，它必须绘制自身。简单来说，iOS 会准备一块“画布”，你的视图对象需要在这块画布上“作画”。最终完成的杰作会被\
  \ iOS 用来在屏幕上呈现你的视图——直到需要重新绘制为止。\n\n你的“画布”是一个**核心图形上下文**（Core Graphics Context），也称为当前上下文，或简称为上下文。它本身不是一个对象，而是一个绘图环境，在你的对象收到\
  \ `-drawRect:` 消息之前就已经准备好了。当你的 `-drawRect:` 方法执行时，你的代码可以使用任何核心图形绘图例程，在已准备好的上下文中“作画”。该上下文在\
  \ `-drawRect:` 方法返回之前一直有效，之后便会消失。\n\n> **警告**\n>\n> 你的视图的核心图形上下文仅在 iOS 调用你的 `-drawRect:`\
  \ 方法时才存在。因此，你永远不应该向你的视图发送 `-drawRect:` 消息，也永远不应在 `-drawRect:` 方法之外使用任何核心图形绘图函数（“离屏绘制”除外，我将在本章末尾介绍）。\n\
  \n对于大多数面向对象的绘图方法，当前上下文是隐含的。也就是说，你执行某项绘制操作（`[myShape fill]`），`-fill` 方法就会在当前的上下文中绘制。如果你使用任何\
  \ C 语言的绘图函数，则需要获取当前上下文的引用，并将其作为调用的第一个参数传递，如下所示：\n\n```\nCGContextRef currentContextRef\
  \ = UIGraphicsGetCurrentContext();\nCGContextSetAlpha(currentContextRef,0.5f);\n\
  ```\n\n绘图的许多细节都由当前上下文的状态隐含决定。图形上下文状态包含了在该上下文中绘图时将使用的所有设置和属性，包括填充形状的颜色、线条的颜色、线条宽度、混合模式等等。\n\
  \n你无需为每个操作（比如画一条线）都指定所有这些变量，而是先为每个单独的属性设置好状态。假设你想绘制一个形状（`myShape`），用红色填充，并用黑色绘制其轮廓：\n\
  \n```\n[redColor setFill];\n[blackColor setStroke];\n[myShape fill];\n[myShape stroke];\n\
  ```\n\n`-fill` 消息会使用上下文的当前填充颜色，而 `-stroke` 则使用当前的描边颜色。这种设计使得使用相同或相似的参数绘制多个形状或效果时非常高效。\n\
  \n现在唯一剩下的问题是，你有哪些绘图工具可用。你最基本的绘制工具有：\n\n* 简单的填充和描边\n* 贝塞尔曲线（填充和描边）\n* 图片\n\n听起来不多，但综合起来，它们具有非凡的灵活性。让我们从最简单的开始，即填充函数。\n\
  \n### 填充函数与描边函数\n\n核心图形框架包含一些用于用颜色填充上下文区域的函数。两个主要的函数是 `CGContextFillRect` 和 `CGContextFillEllipseInRect`。前者用当前的填充颜色填充一个矩形。后者则填充一个正好适合给定矩形内部的椭圆（如果矩形是正方形，则椭圆会变成圆形）。\n\
  \n`CGContextFillRect` 通常用于在绘制视图细节之前，先填充整个视图的背景。`-drawRect:` 方法以类似下面的方式开头是很常见的：\n\
  \n```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \    [self.backgroundColor setFill];\n    CGContextFillRect(context,rect);\n}\n\
  ```\n\n这段代码首先获取当前的图形上下文（`CGContextFillRect` 调用需要用到它）。然后获取此视图的背景颜色（`self.backgroundColor`），并将该颜色设置为当前的填充颜色。接着，用该颜色填充视图。之后绘制的所有内容都将覆盖在用\
  \ `backgroundColor` 绘制的背景之上。\n\n> **提示**\n>\n> 在核心图形上下文中绘图，很像在真实的画布上作画。每当你绘制一些东西时，你都是在覆盖之前绘制的内容。因此，就像绘画一样，你通常先会用一种中性色覆盖整个表面——艺术家称之为底色。然后，你在此基础上绘制不同的颜色和形状，直到完成所有绘制。\n\
  \n函数 `CGContextStrokeRect` 和 `CGContextStrokeEllipseInRect` 执行类似的功能，但它们不是填充矩形或椭圆的内部，而是使用当前的线条颜色、线条宽度和线条连接样式，在矩形或椭圆的轮廓上绘制一条线。描边是用于描述绘制线条动作的术语。\n\
  \n### 贝塞尔曲线\n\n你会注意到，核心图形框架中几乎没有用于绘制非常简单的形状（例如线条）的函数。那么，又该如何处理你在 iOS 中随处可见的圆角矩形、三角形或任何其他形状呢？iOS\
  \ 之神没有为你提供无数种绘制各种形状的函数，而是提供了一个近乎神奇的工​​具，让你能够绘制所有这些形状甚至更多：那就是贝塞尔曲线。\n\n贝塞尔曲线以法国工程师皮埃尔·贝塞尔命名，可以表示直线或曲线的任意组合，如图\
  \ 11-2 所示。它可以简单得像一个正方形，也可以复杂得如加拿大的海岸线。贝塞尔曲线可以是封闭的（圆形、三角形、饼图），也可以是开放的（一条线、一段弧、字母“W”）。\n\
  \n![A978-1-4302-5063-0_11_Fig2_HTML.jpg](img/A978-1-4302-5063-0_11_Fig2_HTML.jpg)\n\
  \n*图 11-2.* 贝塞尔曲线\n\n你通过首先创建一个 `UIBezierPath` 对象来定义一条贝塞尔曲线。然后通过添加直线和曲线线段来构建路径。完成后，你可以使用该路径对象通过填充其内部、绘制其轮廓（描边）或同时进行这两种操作，在图形上下文中进行绘制。你可以根据需要重复使用同一个路径。\n\
  \n> **提示**\n>\n> 对于常见的形状，如正方形、矩形、圆形、椭圆、圆角矩形和弧线，`UIBezierPath` 类提供了类方法，可以用单个语句生成相应形状的贝塞尔曲线。\n\
  \n为了向你展示创建路径是多么容易，你将编写一个在视图中绘制贝塞尔曲线的应用程序。但在那之前，让我们简要谈谈视图内容的最后一个主要来源。\n\n### 图片\n\
  \n图片就是一幅图画，不需要过多解释。从第二章开始，你就一直在使用图片（`UIImage`）对象。到目前为止，你一直将它们分配给为你绘制图片的 `UIImageView`\
  \ 对象（和其他控件）中。但是，`UIImage` 对象也很容易绘制到你自己的视图上下文中。两个最常用的 `UIImage` 绘图方法是 `-drawAtPoint:`\
  \ 和 `-drawInRect:`。第一个方法以原始大小、原点（左上角）位于给定坐标的方式，将图片绘制到你的上下文中。第二个方法将图片绘制到给定的矩形中，并根据需要缩放和拉伸图片。\n\
  \n当我说图片被“绘制”到你的图形上下文中时，我真正意思是它被复制了。图片是一个二维像素数组，而你的图形上下文画布也是一个二维像素数组。所以实际上，“绘制”一幅图片只不过是用图片中的像素覆盖视图中部分像素。例外情况是包含透明像素的图片，或者你使用了非典型的混合模式，这两点我稍后会提到。\n\
  \n在本章后面，我将在你已编写的一个应用程序基础上进行改造，详细讲解如何在自定义视图中创建、转换和绘制图片。但在此之前，让我们先绘制一些贝塞尔曲线。\n\n\n\
  \n"
- "# Shapely\n\n你将创建一个应用程序，该应用使用贝塞尔路径在自定义视图中绘制简单图形。通过多次迭代，你将扩展其功能以支持移动和调整大小的手势，并学习变换与动画——同时掌握大量\
  \ `UIView` 和贝塞尔路径的精华。应用设计简洁，如图 11-3 所示。\n\n![A978-1-4302-5063-0_11_Fig3_HTML.jpg](img/A978-1-4302-5063-0_11_Fig3_HTML.jpg)\n\
  \n图 11-3. Shapely 应用设计\n\n应用底部将有一行按钮，用于创建新图形。图形会出现在中间区域，你可以移动、调整大小和重新排列它们。首先创建一个新项目。在\
  \ Xcode 中：\n\n- 基于**单视图应用**模板创建一个新项目。\n- 将项目命名为 `Shapely`。\n- 使用 `SY` 作为类前缀。\n-\
  \ 将设备设置为 `Universal`。\n\n接下来需要创建自定义视图类。这一步你已操作多次。在项目导航器中选择 `Shapely` 组，然后选择 **New\
  \ File...**（从文件菜单或右键/按住 Control 键点击该组）。然后：\n\n- 从 iOS 组中选择 **Objective-C 类模板**。\n\
  - 将类命名为 `SYShapeView`。\n- 使其继承自 `UIView`。\n- 将其添加到项目中。\n\n## 以编程方式创建视图\n\n在本应用中，你将通过编程方式创建视图对象，而不是使用\
  \ Interface Builder。实际上，几乎所有内容都将以编程方式创建。到本章结束时，你应该能熟练掌握这一技能。\n\n创建任何对象时，都必须先进行初始化。这是通过向新实例发送\
  \ `init` 消息来完成的。某些类（如 `NSString`）提供了多种 init 方法，以便以不同方式初始化：`-initWithString:`、`-initWithFormat:`、`-initWithData:`、`-initWithCharacters:length:`\
  \ 等。\n\n然而，`UIView` 类具有所谓的**指定初始化方法**。对于新的 `UIView` 对象，你只能发送一条 `init` 消息来使其准备好使用，即\
  \ `-initWithFrame:`。如果使用其他 init 消息进行初始化，它可能无法正常工作——因此请不要这样做。你的子类可以自由定义自己的 init 方法，但必须发送\
  \ `[super initWithFrame:]`，以确保 `UIView` 类正确初始化。\n\n> **注意**  \n> 在 Interface Builder\
  \ 文件中定义的视图对象使用不同的初始化消息，第 15 章将对此进行说明。\n\n你的 init 方法将创建一个新的 `SYShapeView` 对象，该对象以预定的\
  \ frame 大小绘制特定形状（正方形、圆形等）。因此，你需要一个自定义的 init 方法，告知新对象应绘制哪种形状。视图将以特定颜色绘制其形状，因此你还需要一个用于颜色的属性。首先编辑\
  \ `SYShapeView.h` 接口文件。将其修改为如下所示（新代码以粗体显示）：\n\n```\ntypedef enum {\n\nkSquareShape\
  \ = 1,\n\nkRectangleShape,\n\nkCircleShape,\n\nkOvalShape,\n\nkTriangleShape,\n\n\
  kStarShape,\n\n} ShapeSelector;\n\n@interface SYShapeView : UIView\n\n- (id)initWithShape:(ShapeSelector)theShape;\n\
  \n@property (strong,nonatomic) UIColor *color;\n\n@end\n```\n\n`enum` 语句创建了一个枚举。枚举是一组分配给名称的常量整数值。你列出名称，编译器为每个名称分配一个数字。通常数字从零开始，但对于此应用，你希望它们从\
  \ 1 开始（`kSquareShape` = `1`，`kRectangleShape` = `2`，`kCircleShape` = `3`，以此类推）。视图将使用这些值来确定绘制哪个形状。\n\
  \n`-initWithShape:` 方法将成为此类的初始化方法。它将创建对象并确定其将绘制的形状。最后，一个 `UIColor` 对象属性将决定形状的颜色。一切都很简单。接下来转到\
  \ `SYShapeView.m` 实现文件，编写 init 方法。\n\n首先删除文件模板中自带的 `-initWithFrame:` 方法。你正在定义自己的\
  \ init 方法，因此不会使用默认方法。在 `@implementation SYShapeView` 部分之前，添加以下代码：\n\n```\n#define\
  \ kInitialDimension       100.0f\n\n#define kInitialAlternateHeight (kInitialDimension/2)\n\
  \n#define kStrokeWidth            8.0f\n\n@interface SYShapeView ()\n\n{\n\nShapeSelector\
  \   shape;\n\n}\n\n@property (readonly,nonatomic) UIBezierPath *path;\n\n@end\n\
  ```\n\n`#define` 语句定义了三个常量：大多数新图形视图的初始尺寸（高度和宽度）、不适合正方形的图形的备用高度，以及用于绘制图形的线条厚度。\n\n\
  接下来，添加一个私有接口部分，在其中定义一个 `ShapeSelector` 实例变量。该变量将决定此视图绘制哪种形状。`readonly path` 属性将返回一个包含该形状的贝塞尔路径对象，随时可进行绘制。\n\
  \n第一个要编写的方法是 init 方法。在 `@implementation SYShapeView` 部分中，添加以下代码：\n\n```\n- (id)initWithShape:(ShapeSelector)theShape\n\
  \n{\n\nCGRect initRect = CGRectMake(0,0,kInitialDimension,kInitialDimension);\n\n\
  if (theShape==kRectangleShape || theShape==kOvalShape)\n\ninitRect.size.height =\
  \ kInitialAlternateHeight;\n\nself = [super initWithFrame:initRect];\n\nif (self!=nil)\n\
  \n{\n\nshape = theShape;\n\nself.opaque = NO;\n\nself.backgroundColor = nil;\n\n\
  self.clearsContextBeforeDrawing = YES;\n\n}\n\nreturn self;\n\n}\n```\n\n该方法首先定义一个默认的\
  \ frame，其原点为 `(0,0)`，宽度和高度均为 `kInitialDimension`。然后检查 `theShape` 参数。如果正在创建的图形是矩形或椭圆形，它将\
  \ frame 的高度更改为 `kInitialAlternateHeight`。正方形和矩形的唯一区别在于视图的宽高比。对于矩形和椭圆形，这会改变宽高比，使其不再为\
  \ 1:1。\n\n现在，你的方法有了足够的信息来调用父类的 `-initWithFrame:`。如果父类初始化成功，你的对象就可以进行自身初始化了。首要任务是记住此视图将绘制哪种图形。接下来，修改\
  \ `UIView` 的若干标准属性。\n\n其中最重要的是重置 `opaque` 属性。如果视图对象包含透明区域，你必须声明该视图不是不透明的。稍后我将解释\
  \ `clearsContextBeforeDrawing` 属性。\n\n> **警告**  \n> 如果视图的任何部分保持透明或半透明，你必须将视图的 `opaque`\
  \ 属性设置为 `NO`，否则它可能无法在屏幕上正确显示。\n\n\n\n### `-drawRect:` 方法\n\n我认为是时候编写你的 `-drawRect:`\
  \ 方法了。这是任何自定义视图类的核心。将此方法添加到你的 `SYShapeView.m` 实现文件中（替换文件模板提供的任何 `-drawRect:` 方法）：\n\
  \n```\n- (void)drawRect:(CGRect)rect\n{\n    UIBezierPath *path = self.path;\n \
  \   [self.color setStroke];\n    [path stroke];\n}\n```\n\n哇！就这些？是的，这就是你的类绘制其形状所需的全部代码。它从\
  \ `path` 属性中获取贝塞尔路径对象。贝塞尔路径定义了该视图将要绘制的形状的轮廓。然后设置绘图颜色，并描边（绘制形状的轮廓）。线条绘制方式的细节——其宽度、连接点形状等——都是路径对象的属性。\n\
  \n你还会注意到，你不必先清除上下文（正如我在“填充与描边”部分所解释的那样）。这是因为你设置了视图的 `clearsContextBeforeDrawing`\
  \ 属性。将其设置为 `YES`，iOS 在发送 `-drawRect:` 消息之前，会用（黑色）透明像素预填充你的上下文。对于那些需要以透明“画布”开始的视图（就像本视图一样），何不让\
  \ iOS 来替你完成这项工作呢？如果你的视图总是用图像或颜色填充其上下文，请将 `clearsContextBeforeDrawing` 设置为 `NO`；将其保留为\
  \ `YES` 会毫无意义地将上下文填充两次，从而降低应用速度并浪费 CPU 资源。\n\n#### 创建贝塞尔路径\n\n显然，繁重的工作在于创建那个贝塞尔路径对象。现在开始创建。在你的\
  \ `@implementation` 中添加这个方法：\n\n```\n- (UIBezierPath*)path\n{\n    CGRect bounds\
  \ = self.bounds;\n    CGRect rect = CGRectInset(bounds,kStrokeWidth/2+1,kStrokeWidth/2+1);\n\
  \    UIBezierPath *path;\n\n    switch (shape) {\n        case kSquareShape:\n \
  \       case kRectangleShape:\n            path = [UIBezierPath bezierPathWithRect:rect];\n\
  \            break;\n        default:\n            // TODO: 添加剩余形状的情况\n        \
  \    break;\n    }\n\n    path.lineWidth = kStrokeWidth;\n    path.lineJoinStyle\
  \ = kCGLineJoinRound;\n    return path;\n}\n```\n\n这个方法实现了对象 `path` 属性的 getter。它的任务是返回一个\
  \ `UIBezierPath` 对象，该对象描述了此视图绘制的形状（正方形、矩形、圆形等），并精确匹配其当前大小（`bounds`）。\n\n前两行代码创建了一个\
  \ `CGRect` 变量，用于描述形状的外部尺寸。它比边框要小 `kStrokeWidth/2+1` 像素的原因在“避免像素炎”边栏中解释。\n\n### 避免像素炎：坐标与像素\n\
  \nCore Graphics 中的所有坐标都是空间中的数学点；它们并不对应单个像素。这是一个需要理解的重要概念。将坐标视为显示或图像像素之间无限细的线条。这会产生三个影响：\n\
  \n*   点或坐标并非像素。\n*   绘制发生在线条上及其内部，而非像素上或像素内部。\n*   一个点可能不代表一个像素。\n\n当你填充一个形状时，你填充的是定义该形状的无限细线条内部的像素。在下图中，一个矩形\
  \ `((2,1),(5,2))` 被填充了深色。较低分辨率的显示器每个坐标空间对应一个物理像素，如左图所示。右侧是“视网膜”显示器，每个坐标空间对应四个物理像素。\n\
  \n![A978-1-4302-5063-0_11_Fig1a_HTML.jpg](img/A978-1-4302-5063-0_11_Fig1a_HTML.jpg)\n\
  \n该矩形定义了一个数学上精确的区域，落在该区域内的像素被填充了颜色。这种精确性避免了程序员常见的一种病症——像素炎：即不确定特定绘图操作会影响哪些像素而产生的焦虑，这在许多其他图形库中很常见。\n\
  \n这种数学精确性可能会产生意想不到的副作用。一种常见的伪影出现在绘制奇数宽度线条时——“奇数”意味着“不能被 2 整除”。线条的描边以数学线条或曲线为中心。在下图中，在两个坐标之间绘制了一条水平线段，描边宽度为\
  \ `1.0`。下方图中的上一条线在较低分辨率的显示器上无法绘制成实线，因为描边只覆盖了线条两侧各 ½ 的像素。Core Graphics 使用抗锯齿技术绘制部分像素，这意味着这些像素的颜色会使用描边颜色值的一半进行调整。在视网膜显示器上，这种情况不会发生，因为每个像素是坐标值的\
  \ ½。\n\n![A978-1-4302-5063-0_11_Fig2a_HTML.jpg](img/A978-1-4302-5063-0_11_Fig2a_HTML.jpg)\n\
  \n下图中较低的那条线通过将线条居中于两个坐标之间来避免“半像素”问题。现在，宽度为 `1.0` 的线条正好填满了坐标边界之间的空间，整齐地覆盖了像素，对用户来说显示为一条清晰、实心的线条。\n\
  \n如果像素完美对齐对你的应用很重要，你可能需要查阅 `UIView` 的 `contentScaleFactor` 属性。它揭示了两个整数值坐标之间的物理屏幕像素数量。在撰写本文时，它可以是两个值之一：`1.0`（用于较低分辨率显示器）和\
  \ `2.0`（用于视网膜显示器）。\n\n接下来的代码块创建了一个 `UIBezierPath` 变量，然后根据 `shape` 变量进行切换以构建所需的形状。目前，case\
  \ 语句仅为正方形和矩形形状创建路径，如图 11-4 所示。稍后你会补充其他情况。\n\n![A978-1-4302-5063-0_11_Fig4_HTML.jpg](img/A978-1-4302-5063-0_11_Fig4_HTML.jpg)\n\
  \n图 11-4. 未完成的 `-path` 方法\n\n提示\n\n如果以 `TODO:` 或 `!!!:` 开头编写 `//` 样式的注释，该注释将自动出现在编辑区顶部的文件导航菜单中，如图\
  \ 11-4 所示。这是对需要稍后处理的事情做记录的非常方便的方法，因为它会突出显示在你的文件导航菜单中，直到你将其移除。\n\n眼尖的读者会注意到，创建正方形形状和矩形形状的代码是相同的。这是因为这些形状之间的区别在于视图的宽高比，而这在创建对象时已经通过\
  \ `-initWithShape:` 确定了。如果你回头查看 `-initWithShape:`，你会看到这两行代码：\n\n```\nif (theShape==kRectangleShape\
  \ || theShape==kOvalShape)\ninitRect.size.height = kInitialAlternateHeight;\n```\n\
  \n当视图的 frame 被初始化时，如果形状是矩形或椭圆形，其高度会被设为一半。所有其他形状的视图在创建时都使用正方形 frame。\n\n最后，形状的线宽被设置为\
  \ `kStrokeWidth`，连接点样式被设置为 `kCGLineJoinRound`。这最后一个属性决定了如何绘制连接点（一条线段结束、下一条线段开始的那个点）。将其设置为\
  \ `kCGLineJoinRound` 会绘制带有圆角“弯头”的形状。\n\n\n\n### 测试方形\n\n绘制一个方形视图的代码已经足够了，现在让我们将其连接到某个组件上进行测试。`Shapely`\
  \ 应用会在用户点击按钮时创建新的形状，因此先定义一个按钮来测试它。这些按钮使用了自定义图像，所以首先要将这些图像资源添加到你的项目中。在导航器中选中 `Images.xcassets`\
  \ 资源目录项。找到 `Learn iOS Development Projects` ➤ `Ch 11` ➤ `Shapely (Resources)` 文件夹，然后将全部\
  \ 12 个图像文件（`addcircle.png`、`addcircle@2x.png`、`addoval.png`、`addoval@2x.png`、`addrect.png`、`addrect@2x.png`、`addsquare.png`、`addsquare@2x.png`、`addstar.png`、`addstar@2x.png`、`addtriangle.png`\
  \ 和 `addtriangle@2x.png`）拖入资源目录中，如图 11-5 所示。`Shapely (Icons)` 文件夹中还包含一些应用图标，你可以随意将它们放入\
  \ `AppIcon` 组中。\n\n![A978-1-4302-5063-0_11_Fig5_HTML.jpg](img/A978-1-4302-5063-0_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 添加按钮图像资源\n\n这次我将从 iPad 界面开始，之后再将完成的工作复制到 iPhone 界面。如果你有一台 iPhone/iPod\
  \ 并希望在开发时就在设备上运行此应用，也可以直接以 iPhone 界面开始——操作步骤是相同的。\n\n选中 `Main_iPad.storyboard`（或\
  \ `_iPhone.xib`）文件。切换到辅助编辑器（View ➤ Assistant Editor ➤ Show Assistant Editor）。界面视图控制器（`SYViewController.h`）的界面应出现在右侧面板中。如果没有出现，请从右侧编辑器面板上方的导航栏中选中\
  \ `SYViewController.h` 文件。调出对象库（View ➤ Utilities ➤ Show Object Library），然后将一个新的\
  \ `Button` 对象拖入你的界面中，如图 11-6 所示。\n\n![A978-1-4302-5063-0_11_Fig6_HTML.jpg](img/A978-1-4302-5063-0_11_Fig6_HTML.jpg)\n\
  \n图 11-6. 添加第一个按钮\n\n切换到属性检查器，选中根视图对象，并将其背景属性改为 `Black Color`。再次选中这个新按钮，并进行以下修改：\n\
  \n- 在属性检查器中\n  - 将其类型改为 `Custom`\n  - 清除其标题（将“Button”替换为空）\n  - 将其图像改为 `addsquare`\n\
  - 使用尺寸检查器\n  - 将其宽度和高度改为 `44` 像素\n\n在 `SYViewController.h` 文件中（位于右侧编辑面板），添加一个新的操作：\n\
  \n`- (IBAction)addShape:(id)sender;`\n\n通过将 `-addShape:` 声明旁边的连接插座拖拽到新按钮上，将按钮连接到该操作，如图\
  \ 11-7 所示。\n\n![A978-1-4302-5063-0_11_Fig7_HTML.jpg](img/A978-1-4302-5063-0_11_Fig7_HTML.jpg)\n\
  \n图 11-7. 连接第一个按钮\n\n切换到 `SYViewController.m` 实现文件，并添加该操作方法。首先在其他导入语句之后立即添加一条导入语句，以便本模块了解\
  \ `SYShapeView` 类：\n\n`#import \"SYShapeView.h\"`\n\n在 `@implementation` 段落的末尾附近，添加新的操作方法：\n\
  \n```\n- (IBAction)addShape:(id)sender\n{\n  SYShapeView *shapeView = [[SYShapeView\
  \ alloc] initWithShape:kSquareShape];\n  shapeView.color = [UIColor whiteColor];\n\
  \  [self.view addSubview:shapeView];\n  CGRect shapeFrame = shapeView.frame;\n \
  \ CGRect safeRect = CGRectInset(self.view.bounds,\n                            \
  \    shapeFrame.size.width,\n                                shapeFrame.size.height);\n\
  \  CGPoint newLoc = CGPointMake(safeRect.origin.x\n                            \
  \   +arc4random_uniform(safeRect.size.width),\n                               safeRect.origin.y\n\
  \                               +arc4random_uniform(safeRect.size.height));\n  shapeView.center\
  \ = newLoc;\n}\n```\n\n你的形状视图现在可以测试了。`-addShape:` 操作会创建一个绘制方形的新 `SYShapeView` 对象。它将其\
  \ `color` 属性设为白色，并将其添加为根视图的新子视图。\n\n在本书中，到目前为止你一直使用 Interface Builder 来创建和添加视图对象。这段代码演示了如何通过编程方式实现。你在\
  \ Interface Builder 中添加到视图的任何内容都可以通过编程方式创建和添加，并且你可以用代码创建那些在 Interface Builder 中无法创建的内容。\n\
  \n注意\n\n`-addSubview:` 方法会将一个视图作为接收者的子视图。该视图将以其框架的坐标出现在接收者（父视图）的局部坐标系中。你一次只能将一个视图添加到一个父视图中；一个视图不能同时出现在两个父视图中。若要移除该视图，需向该视图发送\
  \ `-removeFromSuperview` 消息。\n\n`-addShape:` 中其余的代码只是为新视图随机选取一个位置，确保它不会太靠近显示边缘。请记住，`SYShapeView`\
  \ 的 `-initWithShape:` 方法设置了视图的框架，但其原点仍然为 `(0,0)`。除非你更改这一点，否则所有新的形状视图都将出现在视图的左上角。\n\
  \n启动 iPad 模拟器并运行你的应用，如图 11-8 所示。多次点击按钮以创建一些形状视图对象，如图 11-8 右侧所示。\n\n![A978-1-4302-5063-0_11_Fig8_HTML.jpg](img/A978-1-4302-5063-0_11_Fig8_HTML.jpg)\n\
  \n图 11-8. 可正常工作的方形形状视图\n\n到目前为止，你已经设计了一个自定义的 `UIView` 对象，它使用贝塞尔路径绘制形状。你创建了一个操作，通过编程方式创建新的视图对象并将其添加到视图中。这是一个很好的开始，但你仍然希望绘制不同颜色、不同形状的图形，因此需要扩展应用来实现这一功能。\n\
  \n\n\n### 更多形状，更多色彩\n\n回到 Xcode，停止运行应用，再次切换到 `Main_iPad.storyboard`（或 `_iPhone.xib`）文件。你的应用将绘制六种不同的形状，因此需要再创建五个按钮。我通过按住\
  \ Option 键并拖拽复制第一个 `UIButton` 对象来实现，如图 11-9 所示。当然，你也可以复制并粘贴第一个按钮。如果你是受虐狂，可以手动从库中拖入新的按钮对象，然后逐一修改使其与第一个按钮一致。这些选择权交给你。\n\
  \n![A978-1-4302-5063-0_11_Fig9_HTML.jpg](img/A978-1-4302-5063-0_11_Fig9_HTML.jpg)\
  \  \n*图 11-9. 复制第一个按钮*\n\n就像在 DrumDub 中一样，你将使用按钮的 `tag` 属性来标识它将创建的形状。由于你复制了第一个按钮，所有按钮都连接到\
  \ `SYViewController` 中同一个 `-addShape:` 动作。（如果没有连接，请立即连接它们。）从左到右，使用属性检查器根据表 11-3\
  \ 设置按钮的 `tag` 和 `image` 属性。\n\n**表 11-3. 新形状按钮属性**\n\n| Tag | Image |\n| --- | ---\
  \ |\n| 1 | `addsquare` |\n| 2 | `addrect` |\n| 3 | `addcircle` |\n| 4 | `addoval`\
  \ |\n| 5 | `addtriangle` |\n| 6 | `addstar` |\n\n> **注意:** 你注意到自己没添加任何约束了吗？这是因为这个界面并不需要约束。这些按钮永远不会调整大小，也无需根据其他元素（如导航栏）或不同屏幕尺寸重新定位。\n\
  \n你会注意到，这些 tag 值巧妙地与你之前在 `SYShapeView.h` 中定义的 `enum` 常量对应。为了让每个按钮创建其对应的形状，将 `-addShape:`（位于\
  \ `SYViewController.m` 中）的第一行改为使用按钮的 tag 值，而非 `kSquareShape` 常量：\n\n`SYShapeView\
  \ *shapeView = [[SYShapeView alloc] initWithShape:` `[sender tag]` `];`\n\n当然，`SYShapeView`\
  \ 中的 `path` 属性目前仍然只知道如何为正方形和矩形创建形状，所以你的工作尚未完成。但在离开 `SYViewController.m` 之前，让我们让界面更丰富多彩一些。在私有的\
  \ `@interface SYViewController ()` 部分，添加一个数组实例变量和一个 `readonly colors` 属性：\n\n```objectivec\n\
  @interface SYViewController ()\n{\n    NSArray *colors;\n}\n@property (readonly,nonatomic)\
  \ NSArray *colors;\n@end\n```\n\n在 `@implementation` 部分，为 `colors` 数组添加一个（懒加载）属性获取方法：\n\
  \n```objectivec\n- (NSArray*)colors\n{\n    if (colors==nil)\n    {\n        colors\
  \ = @[ UIColor.redColor, UIColor.greenColor,\n                    UIColor.blueColor,\
  \ UIColor.yellowColor,\n                    UIColor.purpleColor, UIColor.orangeColor,\n\
  \                    UIColor.grayColor, UIColor.whiteColor ];\n    }\n    return\
  \ colors;\n}\n```\n\n该方法创建了一个 `UIColor` 对象数组，用于为图形分配不同的颜色。它仅在第一次被调用时创建一次该数组。现在再次修改\
  \ `-addShape:`，使其为每个新图形视图分配随机颜色：\n\n```objectivec\n- (IBAction)addShape:(id)sender\n\
  {\n    SYShapeView *shapeView = [[SYShapeView alloc] initWithShape:[sender tag]];\n\
  \    shapeView.color = [self.colors objectAtIndex:arc4random_uniform(self.colors.count)];\n\
  }\n```\n\n为了绘制这些形状，你的 `SYShapeView` 对象仍需完善。切换到 `SYShapeView.m` 文件，找到 `-path` 属性获取方法，并用清单\
  \ 11-1 中加粗显示的代码完成它。哦，对了，顺便从未完成的版本中移除 `default:` 分支；不再需要它了。\n\n**清单 11-1. 完成的路径属性获取方法**\n\
  \n```objectivec\n- (UIBezierPath*)path\n{\n    CGRect bounds = self.bounds;\n  \
  \  CGRect rect = CGRectInset(bounds, kStrokeWidth/2+1, kStrokeWidth/2+1);\n    UIBezierPath\
  \ *path;\n    switch (shape) {\n        case kSquareShape:\n        case kRectangleShape:\n\
  \            path = [UIBezierPath bezierPathWithRect:rect];\n            break;\n\
  \        case kCircleShape:\n        case kOvalShape:\n            path = [UIBezierPath\
  \ bezierPathWithOvalInRect:rect];\n            break;\n        case kTriangleShape:\n\
  \            path = [UIBezierPath bezierPath];\n            CGPoint point = CGPointMake(CGRectGetMidX(rect),\
  \ CGRectGetMinY(rect));\n            [path moveToPoint:point];\n            point\
  \ = CGPointMake(CGRectGetMaxX(rect), CGRectGetMaxY(rect));\n            [path addLineToPoint:point];\n\
  \            point = CGPointMake(CGRectGetMinX(rect), CGRectGetMaxY(rect));\n  \
  \          [path addLineToPoint:point];\n            [path closePath];\n       \
  \     break;\n        case kStarShape:\n            path = [UIBezierPath bezierPath];\n\
  \            point = CGPointMake(CGRectGetMidX(rect), CGRectGetMinY(rect));\n  \
  \          float angle = M_PI*2/5;\n            float distance = rect.size.width*0.38f;\n\
  \            [path moveToPoint:point];\n            for ( NSUInteger arm=0; arm<5;\
  \ arm++ )\n            {\n                point.x += cosf(angle)*distance;\n   \
  \             point.y += sinf(angle)*distance;\n                [path addLineToPoint:point];\n\
  \                angle -= M_PI*2/5;\n                point.x += cosf(angle)*distance;\n\
  \                point.y += sinf(angle)*distance;\n                [path addLineToPoint:point];\n\
  \                angle += M_PI*4/5;\n            }\n            [path closePath];\n\
  \            break;\n    }\n    path.lineWidth = kStrokeWidth;\n    path.lineJoinStyle\
  \ = kCGLineJoinRound;\n    return path;\n}\n```\n\n`kCircleShape` 和 `kOvalShape`\
  \ 分支使用了另一个 `UIBezierPath` 便捷方法，用于创建一个完整的路径对象，该路径描绘一个完全贴合在给定矩形内部的椭圆。\n\n`kTriangleShape`\
  \ 分支则变得有趣起来。它展示了贝塞尔路径如何逐线段创建。你通过向贝塞尔路径发送 `-moveToPoint:` 消息来设定形状的第一个点。之后，通过发送一系列\
  \ `-addLineToPoint:` 消息来添加线段。每条消息都为形状添加一条边，就像玩“连点成线”游戏。最后一条边通过 `-closePath:` 消息创建，该消息完成两件事：将最后一个点连接到第一个点，并使路径闭合——从而描述一个实心形状。\n\
  \n> **注意:** 此应用仅使用直线创建贝塞尔路径，但你也可以混合使用 `-addArcWithCenter:radius:startAngle:endAngle:clockwise:`、`-addCurveToPoint:controlPoint1:controlPoint2:`\
  \ 和 `-addQuadCurveToPoint:controlPoint:` 等消息，以任意组合方式为路径添加曲线段。\n\n`kStarCase` 创建了更复杂的形状。如果你对细节好奇，请阅读已完成的\
  \ Shapely 项目代码中的注释，你可以在 `Learn iOS Development Projects` ➤ `Ch 11` ➤ `Shapely` 文件夹中找到。简而言之，该代码创建了一个路径，从视图的顶部中心（星星的顶部顶点）开始，添加一条向下倾斜到星星内部顶点的线，然后再添加一条（水平）线回到星星的右侧顶点。接着旋转\
  \ 72°，再重复这些步骤四次，从而形成一个五角星。\n\n> **提示:** 三角函数使用弧度进行计算。如果你的三角学基础有点生疏了，弧度角表示为常数 π 的分数，π\
  \ 等于 180°。iOS 数学库包含 π（`M_PI` 或 180°）、π/2（`M_PI_2` 或 90°）和 π/4（`M_PI_4` 或 45°）等常量，以及其他常用常量（e、2\
  \ 的平方根等）。\n\n再次运行你的应用（见图 11-10），然后创建一大堆图形吧！\n\n![A978-1-4302-5063-0_11_Fig10_HTML.jpg](img/A978-1-4302-5063-0_11_Fig10_HTML.jpg)\
  \  \n*图 11-10. 多彩的图形*\n\n\n\n### 变换\n\n接下来，应用的下一个功能是拖动和调整形状大小。为此，你需要重新审视手势识别器，并学习一些全新的内容。先从手势识别器说起。\n\
  \n与视图对象类似，你可以通过编程方式创建、配置和连接手势识别器。iOS 提供的具体手势识别器类（如点击、捏合、旋转、滑动、平移和长按）包含了识别这些常见手势所需的所有逻辑。你只需实例化一个手势识别器，进行少量配置，然后将它们连接起来即可。\n\
  \n回到 `SYViewController.m` 文件中的 `-addShape:` 操作方法。在 `-addShape:` 方法的末尾，添加以下代码：\n\n\
  ```\nUIPanGestureRecognizer *panRecognizer;\npanRecognizer = [[UIPanGestureRecognizer\
  \ alloc] initWithTarget:self\n                                                 \
  \      action:@selector(moveShape:)];\npanRecognizer.maximumNumberOfTouches = 1;\n\
  [shapeView addGestureRecognizer:panRecognizer];\n```\n\n前三个语句创建了一个新的平移（拖动）手势识别器对象。该识别器将把其操作消息（`-moveShape:`）发送给你的\
  \ `SYViewController` 对象（`self`）。`maximumNumberOfTouches` 属性被设置为 `1`，这配置了该对象仅识别单指拖动手势；它将忽略任何两指或三指的拖动。最后，识别器对象被附加到刚刚创建并添加到父视图的形状视图上。\n\
  \n**注意**：这段代码相当于在 Interface Builder 文件中，将一个“平移手势识别器”拖入 `SYShapeView` 对象中，选中它，将其“最大触摸数”属性改为\
  \ `1`，然后将识别器连接到控制器的 `-moveShape:` 操作。当我说“相当于”时，我的意思是“完全等同”。\n\n现在你只需要一个 `-moveShape:`\
  \ 操作。在 `SYViewController.m` 文件的开头，找到私有的 `@interface SYViewController ()` 部分，并添加这个方法声明：\n\
  \n```\n- (IBAction)moveShape:(UIPanGestureRecognizer *)gesture\n```\n\n滚动到 `@implementation`\
  \ 部分的末尾，并添加方法：\n\n```\n- (IBAction)moveShape:(UIPanGestureRecognizer *)gesture\n\
  {\n    SYShapeView *shapeView = (SYShapeView*)gesture.view;\n    CGPoint dragDelta\
  \ = [gesture translationInView:shapeView.superview];\n    CGAffineTransform move;\n\
  \    switch (gesture.state) {\n        case UIGestureRecognizerStateBegan:\n   \
  \     case UIGestureRecognizerStateChanged:\n            move = CGAffineTransformMakeTranslation(dragDelta.x,dragDelta.y);\n\
  \            shapeView.transform = move;\n            break;\n        case UIGestureRecognizerStateEnded:\n\
  \            shapeView.transform = CGAffineTransformIdentity;\n            shapeView.frame\
  \ = CGRectOffset(shapeView.frame,dragDelta.x,dragDelta.y);\n            break;\n\
  \        default:\n            shapeView.transform = CGAffineTransformIdentity;\n\
  \            break;\n    }\n}\n```\n\n手势识别器会分析并吸收发送到视图对象的底层触摸事件，并将其转化为高级手势事件。与许多高级事件一样，它们具有不同的阶段。连续手势（如拖动）的阶段会按可预测的顺序进行：可能、开始、改变，最后是结束或取消。\n\
  \n你的 `-moveShape:` 方法首先获取触发手势动作的视图；这将是用户触摸的视图，也是你要移动的视图。然后，它获取用户拖动的距离以及手势状态的信息。只要手势处于“开始”或“改变”状态，就意味着用户触摸了视图并在屏幕上拖动手指。当用户松开手指时，状态将变为“结束”。在极少数情况下，状态可能会变为“取消”或“失败”，在这种情况下，你会忽略该手势。\n\
  \n当用户拖动手指时，你希望将形状视图的原点调整相同的屏幕距离，从而给用户一种正在物理拖动屏幕上视图的错觉。（我希望你没想过真能在 iPhone 里通过触摸移动实物。）实现这一点的方法利用了\
  \ `UIView` 类的一个显著特性：`transform` 属性。\n\n### 应用平移变换\n\niOS 以多种不同的方式使用仿射变换。仿射变换是一个\
  \ 3x3 矩阵，用于描述坐标系变换。通俗地说，它是一组（看似）神奇的数值数组，可以描述各种复杂的坐标转换。它能够移动、调整大小、倾斜、翻转和旋转任意点集。而且由于几乎所有东西（视图对象、图像和贝塞尔路径）都是“点集”，因此仿射变换可用于移动、翻转、缩放、缩小和旋转它们中的任何一个。更令人惊叹的是，单个仿射变换可以在一次操作中完成所有这些变换。\n\
  \n**仿射变换**  \niOS 提供了创建和组合三种常见变换的函数：平移（位移）、缩放和旋转。这些变换如下图所示。灰色形状表示原始形状，深色图形代表其变换结果：\n\
  \n![A978-1-4302-5063-0_11_Fig3a_HTML.jpg](img/A978-1-4302-5063-0_11_Fig3a_HTML.jpg)\n\
  \n你可以使用函数 `CGAffineTransformMakeTranslation`、`CGAffineTransformMakeScale` 或 `CGAffineTransformMakeRotation`\
  \ 创建基本变换。如果你是个数学高手，也可以使用 `CGAffineTransformMake` 创建任意变换。\n\n特殊的单位变换（`CGAffineTransformIdentity`）不执行任何平移操作。这是\
  \ `transform` 属性的默认值，也是你不想进行任何变换时使用的常量。\n\n变换可以组合。其效果如下图所示：\n\n![A978-1-4302-5063-0_11_Fig4a_HTML.jpg](img/A978-1-4302-5063-0_11_Fig4a_HTML.jpg)\n\
  \n要将变换组合在一起，可以使用函数 `CGAffineTransformTranslate`、`CGAffineTransformScale`、`CGAffineTransformRotate`\
  \ 和 `CGAffineTransformConcat`。这些函数接受一个变换（可能已经是其他变换的组合），应用额外的变换，并返回组合后的变换。然后，你可以使用这个组合变换值，在一次操作中执行所有单独的变换。\n\
  \n`-moveShape:` 方法中处理“开始”和“改变”状态的手势情况时，会获取用户拖动手指的距离，并据此创建一个平移变换。试着快速说三遍“平移变换”。`transform`\
  \ 属性被设置为这个值，这样就完成了。但是，这个神奇的属性到底做了什么？\n\n当你设置视图的 `transform` 属性时，该视图在其父视图中占据的所有坐标在显示到屏幕之前都会被变换。视图的内容和位置（即其\
  \ frame）并不会改变。改变的是视图图像在父视图中的显示位置。我喜欢把 `UIView transform` 想象成一个“投影”视图的透镜，让它显示在其他位置或以不同的方式显示。如果你应用了平移变换，就像你在\
  \ `-moveShape:` 中所做的那样，那么视图将出现在一组不同的坐标上。\n\n**注意**：如果你将 `transform` 属性设置为除单位变换之外的任何值，`frame`\
  \ 属性的值将变得没有意义。它并非完全无意义，但在大多数实际用途中已不可用。请记住这一点：在将 `transform` 设置为除单位变换之外的任何值后，不要使用\
  \ `frame`。\n\n如果你将 `transform` 属性重置为单位变换（`CGAffineTransformIdentity`），视图将重新出现在其原始位置。程序员将\
  \ `transform` 属性称为非破坏性变换，因为设置它不会改变对象的任何其他属性。将其重置，一切就会恢复原状。在 `default:` 情况下，这正是所发生的事情。`default:`\
  \ 情况通过将 `transform` 属性重置为单位变换来处理“取消”和“失败”状态。\n\n\n\n"
- "# 手势处理与变换\n\n手势的“结束”状态是核心工作发生的时机。首先，视图的 `transform` 属性会被重置回单位矩阵。然后，根据用户拖动视图的总距离更新视图的\
  \ `frame` 原点。更新后的 `frame` 会将视图对象永久地重新定位到新位置。\n\n> **注意**  \n> 在使用 `frame` 属性更改视图位置之前，视图的\
  \ `transform` 属性会被设置为单位矩阵。\n\n运行你的项目并尝试一下。我没有提供图示，因为（正如我的出版人向我解释的那样）书中的插图是不会动的。创建几个形状并拖拽它们，这非常有趣。玩够了之后，准备好为应用添加缩放和捏合功能吧。\n\
  \n不过在此之前，让我分享一些关于仿射变换的知识。变换可以在多种场景下使用，而不仅仅是扭曲视图的 frame。它可以在你绘制视图时，用来变换当前图形上下文的坐标系。本质上，这种用法是对视图的\
  \ bounds 应用变换，从而改变你在视图中绘制内容的效果，而不是对视图的最终结果进行平移。例如，你可能有一个复杂的绘图，希望将其在视图中上下移动，或者将其倒置绘制。与其重新计算所有想要绘制的坐标，不如使用\
  \ `CGContextTranslateCTM`、`CGContextRotateCTM` 或 `CGContextScaleCM` 函数来平移、旋转或缩放所有的绘图操作。你将在第\
  \ 16 章中使用这些函数。\n\n> **提示**  \n> 你也可以通过更改 `bounds` 属性的 `origin` 来平移视图的绘图坐标。\n\n变换还可以用来改变贝塞尔路径中的点。创建所需的变换，然后向路径发送\
  \ `-applyTransform:` 消息。路径中的所有点都将被该变换修改。这是一种破坏性的变换；曲线中的原始点将丢失。\n\n## 应用缩放变换\n\n\
  如果一个手势识别器很有趣，那么两个就能开派对了。这次，你将添加一个捏合/缩放手势来调整你的形状视图的大小。和之前一样，首先在 `-addShape:` 方法（`CYViewController.m`）的末尾创建并添加第二个手势识别器对象：\n\
  \n```\nUIPinchGestureRecognizer *pinchGesture;\npinchGesture = [[UIPinchGestureRecognizer\
  \ alloc] initWithTarget:self\n                                          action:@selector(resizeShape:)];\n\
  [shapeView addGestureRecognizer:pinchGesture];\n```\n\n捏合手势识别器对象不需要任何配置，因为捏合/缩放始终是双指手势。在文件顶部的私有\
  \ `@interface SYViewController ()` 部分中，为新的动作方法添加原型：\n\n```\n- (IBAction)resizeShape:(UIPinchGestureRecognizer*)gesture;\n\
  ```\n\n最后，将该方法添加到 `@implementation` 部分：\n\n```\n- (IBAction)resizeShape:(UIPinchGestureRecognizer*)gesture\n\
  {\n    SYShapeView *shapeView = (SYShapeView*)gesture.view;\n    CGFloat pinchScale\
  \ = gesture.scale;\n    CGAffineTransform zoom;\n    switch (gesture.state) {\n\
  \        case UIGestureRecognizerStateBegan:\n        case UIGestureRecognizerStateChanged:\n\
  \            zoom = CGAffineTransformMakeScale(pinchScale,pinchScale);\n       \
  \     shapeView.transform = zoom;\n            break;\n        case UIGestureRecognizerStateEnded:\n\
  \            shapeView.transform = CGAffineTransformIdentity;\n            CGRect\
  \ frame = shapeView.frame;\n            CGFloat xDelta = frame.size.width*pinchScale-frame.size.width;\n\
  \            CGFloat yDelta = frame.size.height*pinchScale-frame.size.height;\n\
  \            frame.size.width += xDelta;\n            frame.size.height += yDelta;\n\
  \            frame.origin.x -= xDelta/2;\n            frame.origin.y -= yDelta/2;\n\
  \            shapeView.frame = frame;\n            [shapeView setNeedsDisplay];\n\
  \            break;\n        default:\n            shapeView.transform = CGAffineTransformIdentity;\n\
  \            break;\n    }\n}\n```\n\n此方法遵循与 `-moveShape:` 相同的模式。唯一显著的区别在于调整视图最终大小和位置的代码，这比拖动方法需要更多的数学计算。\n\
  \n运行项目并尝试一下。创建一个形状，然后用两根手指调整其大小，如图 11-11 左侧所示。\n\n![A978-1-4302-5063-0_11_Fig11_HTML.jpg](img/A978-1-4302-5063-0_11_Fig11_HTML.jpg)\n\
  \n**图 11-11.** 使用变换进行缩放\n\n> **提示**  \n> 如果你在使用模拟器，请按住 Option 键来模拟双指捏合手势。你首先需要将形状放置在视图中央，因为模拟器中的第二个“手指”总是相对于显示屏中心点镜像，并且你需要在视图中同时拥有两个“手指”才能被识别为捏合手势。\n\
  \n你会注意到，当将形状放大很多时，其图像会出现“锯齿”：这是由于放大较小图像而产生的锯齿伪影。原因是在捏合手势期间，你并没有调整视图的大小，只是对原始视图的图像应用了变换。贝塞尔路径是分辨率无关的，在任何尺寸下都能平滑绘制。但变换只能处理视图当前图像的像素。在捏合手势结束时，形状视图的大小会被调整并重绘。这将在新尺寸下创建一个新的贝塞尔路径，一切再次变得平滑，如图\
  \ 11-11 右侧所示。\n\n你的应用看起来已经很生动了，但我认为它可以再增加一些活力。你觉得添加一些动画怎么样？\n\n"
- "# 动画：不仅仅是漫画的专利\n\n动画已经成为现代应用中不可或缺且备受期待的特性。没有动画，你的应用会显得枯燥乏味，即使它完成了一切你期望的功能。幸运的是，iOS\
  \ 的设计者们深知这一点，他们为此做了大量令人惊叹的工作，让你可以轻松地为应用添加动画。有四种方法可以为你的应用增添动感：\n\n*   内置功能\n*   自己动手（DIY）\n\
  *   核心动画\n*   OpenGL\n\n“内置功能”是指 iOS API 中那些会自动为你完成动画的地方。从视图控制器到表格视图，无数方法都包含一个布尔类型的\
  \ `animated` 参数。如果你想让视图控制器滑入、页面翻起、工具栏按钮平滑调整大小、表格视图行灵动地跳到新位置，或者进度指示器平稳地变为新值，你只需为\
  \ `animated` 参数传递 `YES`，iOS 类就会完成所有工作。因此，请留意那些 `animated` 参数，并善用它们。\n\n> **提示**\
  \  \n> 某些视图属性有两个设置器：一个从不支持动画，另一个支持动画。例如，`UIProgressView` 类有 `-setProgress:` 方法（从不支持动画）和\
  \ `-setProgress:animated:` 方法（可选择动画）。如果你在使用不支持动画的属性设置器，请查阅文档，看看是否有支持动画的替代方案。\n\n\
  在“自己动手（DIY）”动画方案中，你的代码会逐帧执行更改，以实现界面动画。这通常包含以下步骤：\n\n1. 创建一个每秒触发 30 次的计时器。\n2. 当计时器触发时，更新视图的位置、外观、大小或内容。\n\
  3. 将视图标记为需要重绘。\n4. 重复步骤 2 和 3，直到动画结束。\n\n具有讽刺意味的是，DIY 方案恰恰是业余爱好者最常滥用的方法。它在少数情况下可能表现尚可，但大多数时候，它会遭遇许多不可避免的性能陷阱。最大的问题是时机。要平衡动画的速度，使其看起来流畅，但又不会运行过快以至于浪费\
  \ CPU 资源、消耗电池寿命，并拖累应用的其他部分以及 iOS 系统本身，这真的很难做到。\n\n\n\n### 使用 Core Animation\n\n\
  聪明的 iOS 开发者——既然你在读这本书，那就是你——都会使用 Core Animation。Core Animation 已经为你解决了所有棘手的性能、负载均衡、后台线程和效率问题。你所要做的就是告诉它你想让什么动起来，然后让它施展魔法。\n\
  \n动画内容绘制在一个图层 (`CALayer`) 对象中。图层对象就像一个 `UIView`；它是你可以使用 Core Graphics 进行绘制的画布。一旦绘制完成，该图层就可以使用\
  \ Core Animation 进行动画处理。简而言之，你告诉 Core Animation 你想要图层如何变化（移动、缩小、旋转、卷曲、翻转等），在什么时间段内完成，以及速度多快。然后你就不用管了，让\
  \ Core Animation 来完成所有工作。Core Animation 甚至不会打扰你应用的事件循环；它在后台安静地工作，用可用的 CPU 资源来平衡动画工作，从而不会干扰你的应用需要执行的其他任何任务。这真是一个了不起的系统。\n\
  \n请记住，Core Animation 不会改变图层对象的内容。它只是临时对图层的一个副本进行动画处理，一旦动画结束，这个副本就会消失。我喜欢把 Core Animation\
  \ 看作是“实时”变换；它临时投射出一个你图层的扭曲、动画版本，但从不改变图层本身。\n\n哦，我说过“图层对象就像一个 `UIView` 吗？”我应该说“图层对象，就像\
  \ `UIView` 中的那个一样”，因为 `UIView` 就是基于 Core Animation 图层的。当你通过 `-drawRect:` 方法绘制视图时，你实际上是在一个\
  \ `CALayer` 对象上绘图。如果你需要直接操作图层对象，可以通过 `layer` 属性获取你的 `UIView` 的图层对象。这里要记住的重点是：所有\
  \ `UIView` 对象都可以使用 Core Animation 进行动画处理。现在，你已经真正入门了！\n\n### 为 Shapely 添加动画\n\n\
  有三种方法可以让 Core Animation 为你工作。我已经描述了第一种：所有那些“内置”的动画参数都基于 Core Animation——这并不意外。第二种传统的\
  \ Core Animation 技术是创建一个动画 (`CAAnimation`) 对象。一个动画对象控制一个动画序列。它决定动画何时开始、何时停止、动画的速度（称为动画曲线）、动画做什么、是否重复、重复多少次等等。`CAAnimation`\
  \ 还有一些子类，可以动画化视图的特定属性，或者动画化过渡效果（视图对象的添加、移除或交换）。甚至还有一个动画类 (`CAAnimationGroup`) 可以同步多个动画对象。\n\
  \n说实话，创建 `CAAnimation` 对象并不容易。因为它可能非常复杂，所以有大量的便利构造器和方法试图让这个过程尽可能无痛——但这仍然是一项艰巨的任务。你必须定义被动画化属性的起始值和结束值。你必须定义时间和动画曲线，然后你必须启动动画并在适当的时间更改实际的属性值。请记住，动画不会改变原始视图，所以如果你希望视图从左向右滑动，你必须创建一个从左侧开始并在右侧结束的动画，然后你必须将原始视图的位置设置为右侧，否则动画结束后视图会重新出现在左侧。这很繁琐。\n\
  \n幸运的是，iOS 之神感受到了你的痛苦，并创建了一种非常简单的方法来创建基本动画，称为基于块的动画方法。这些 `UIView` 方法让你只需编写几行代码，就能告诉\
  \ Core Animation 你想如何改变视图的属性。然后 Core Animation 会处理创建、配置和启动 `CAAnimation` 对象的工作。它甚至会更新你的视图属性，这样当动画结束时，你的属性将处于动画的结束值——这正是你想要的。\n\
  \n那么这些基于块的动画方法用起来有多简单呢？你来评判。在你的 `SYViewController.m` 文件中找到 `-addShape:` 方法。在该方法的末尾，添加以下代码：\n\
  \n```\nshapeFrame = shapeView.frame;\n\nCGRect buttonFrame = ((UIView*)sender).frame;\n\
  \nshapeView.frame = buttonFrame;\n\n[UIView animateWithDuration:0.5\n\ndelay:0\n\
  \noptions:UIViewAnimationOptionCurveEaseOut\n\nanimations:^{ shapeView.frame = shapeFrame;\
  \ }\n\ncompletion:nil];\n```\n\n这段新代码首先获取新形状视图更新后的 `frame`。请记住，当它的 `center` 属性被放置在屏幕上的随机位置时，它的\
  \ `frame` 已经被调整过了。这就是你希望该视图最终定位的位置。\n\n第二行代码获取创建新形状的按钮的 frame，第三行代码重新定位你的新形状视图（再次），使其正好位于按钮的正上方，并且与按钮大小相同。如果你在此处停止，你的形状视图将正好出现在你点击的按钮之上，覆盖住它。\n\
  \n最后一个语句就是魔法。它启动一个动画，持续半秒钟（`duration:0.5`），立即开始（`delay:0`），并使用“缓出”动画曲线（`options:UIViewAnimationOptionCurveEaseOut`）。有四种预设曲线可供选择：缓出（想想飞机降落）、缓入（飞机起飞）、缓入-缓出（起飞和降落）和线性（飞机以恒定速度飞行）。\n\
  \n该方法有两个代码块参数。第一个是描述你想要动画化什么的块，这里说的“描述”是指你只需编写代码来设置那些你想平滑改变的属性。`UIView` 会自动动画化以下七个属性中的任何一个：\n\
  \n- `frame`\n- `bounds`\n- `center`\n- `transform`\n- `alpha`\n- `backgroundColor`\n\
  - `contentStretch`\n\n如果你希望一个视图移动或改变大小，那就动画化它的 `center` 或 `frame`。希望它淡出？将它的 `alpha`\
  \ 属性从 `1.0` 动画化到 `0.0`。希望它平滑地向右旋转？将它的 `transform` 从恒等变换动画化为一个旋转变换。你可以执行其中任何一个操作，甚至可以同时执行多个操作（同时改变\
  \ `alpha` 和 `center`）。就这么简单。\n\n**注意**\n\nObjective‑C 块是包含一段可执行代码的值。你可以在 `^{` 和\
  \ `}` 之间编写一个代码块，就像它是一个值（比如数字）一样。该块可以保存在变量中，或者作为参数传递。之后，接收者可以像执行其方法的一部分一样执行该代码块。块非常强大。你可以在《块简短实用指南》中阅读所有相关内容，该指南位于\
  \ Xcode 的“文档和 API 参考”中。\n\n完成参数是另一个代码块，它在动画结束时执行。在 Shapely 中，没有其他事情要做，因为你唯一的目标就是将视图从\
  \ `buttonFrame` 移动到 `shapeFrame`。如果有的话，只需传递一个执行动画后清理工作的代码块即可。你甚至还可以启动另一个动画！\n\n\
  再次运行你的应用并创建几个形状。相当酷，对吧？（同样，没有配图。）每当你点击每个添加形状按钮时，新的形状就会从你的手指下方飞入你的视野，就像某种疯狂的街机游戏。如果你手速够快，你可以让几个形状同时动起来。而这仅仅花费了你四行代码。\n\
  \n如果你想要对除这七个属性之外的其他属性进行动画化，创建循环运行的动画、沿弧线移动的动画或反向运行的动画，该怎么办？为此，你需要深入研究 Core Animation\
  \ 并创建你自己的动画对象；我将在第 14 章中向你展示如何操作。你可以在 Xcode 的“文档和 API 参考”中找到的《Core Animation 编程指南》中阅读相关内容。\n\
  \n\n\n### OpenGL\n\n哎呀，差点忘了最后一项动画技术：OpenGL。OpenGL 是开放图形库（Open Graphics Library）的缩写。它是一个跨语言、跨平台的\
  \ API，用于 2D 和 3D 动画。iOS 中包含的 OpenGL 版本是 OpenGL ES（嵌入式系统 OpenGL），它是 OpenGL 的精简版本，适用于在非常小型的计算机系统（如\
  \ iOS 设备）上运行。\n\n坦白说，OpenGL 是另一个世界。OpenGL 视图使用一种名为 GLSL（OpenGL 着色语言）的特殊类 C 语言进行编程。要使用它，你需要编写顶点着色器和片段着色器程序。这些小程序在你的设备\
  \ GPU（图形处理单元）中运行，与你之前编写的在 CPU（中央处理单元）中运行的代码不同。GPU 是一种大规模并行处理器，可能同时运行着你的着色器程序的数百个副本，每个副本都在计算不同像素的值。\n\
  \n其效果绝对令人惊叹。如果你曾玩过 3D 飞行模拟器、射击游戏或冒险游戏，你看到的很可能就是一个 OpenGL 视图。即使是带有旋转云层、星星或各种特效的 2D\
  \ 游戏，也是用 OpenGL 编写的。\n\n如果你想充分发挥设备图形处理单元的全部性能，OpenGL 是必经之路——但你需要学习很多知识。你需要一本关于 OpenGL\
  \ 的好书。是的，关于 OpenGL 的书籍整本都有，比这本书还厚。你的内容出现在一个特殊的 Core Animation 层（`CAEAGLLayer`）对象中，该对象专门设计用于显示\
  \ OpenGL 上下文。要将其添加到你的应用中，请在界面中创建一个`GLKView`（OpenGL 工具包视图）对象。`GLKView`是`UIView`的子类，它托管了一个`CAEAGLLayer`对象。如果你需要，还有一个方便的`GLKViewController`类。\n\
  \n不用说，我不会在这本书中展示任何 OpenGL 示例。（如果你迫不及待想一探究竟，Xcode 项目模板中有一个 OpenGL 游戏模板。）如果这正是你希望为应用驾驭的那种强大功能，至少你知道该往哪个方向努力。从你可以在\
  \ Xcode 的“文档与 API 参考”中找到的《iOS OpenGL ES 编程指南》开始吧。但请注意，你需要学习大量 OpenGL 基础知识，之后才能理解该文档的大部分内容。\n\
  \n## 层次顺序\n\n趁你还打开着 Shapely 项目，我想让你稍微摆弄一下视图对象的顺序。子视图有一个特定的顺序，称为它们的 Z 轴顺序，它决定了重叠视图的绘制方式。这并不复杂。后视图先绘制，后续视图绘制在它之上（如果它们重叠）。如果重叠的视图是不透明的，它会遮挡住它后面的视图。如果它的一部分是透明的，那么它后面的视图就会从缝隙中“露出来”。\n\
  \n这说起来比演示更简单，所以给 Shapely 再添加两个手势识别器。再次回到`SYViewController.m`文件中的`-addShape:`操作方法。紧接着添加其他两个手势识别器的代码之后（在你刚刚添加的动画代码之前），插入以下内容：\n\
  \n```\nUITapGestureRecognizer *dblTapGesture;\ndblTapGesture = [[UITapGestureRecognizer\
  \ alloc] initWithTarget:self\naction:@selector(changeColor:)];\ndblTapGesture.numberOfTapsRequired\
  \ = 2;\n[shapeView addGestureRecognizer:dblTapGesture];\nUITapGestureRecognizer\
  \ *trplTapGesture;\ntrplTapGesture = [[UITapGestureRecognizer alloc] initWithTarget:self\n\
  action:@selector(sendShapeToBack:)];\ntrplTapGesture.numberOfTapsRequired = 3;\n\
  [shapeView addGestureRecognizer:trplTapGesture];\n```\n\n这段代码添加了双击和三击手势识别器，它们分别发送`-changeColor:`和`-sendShapeToBack:`消息。向上滚动到`@interface\
  \ SYViewController ()`私有接口部分，声明新方法：\n\n```\n- (IBAction)changeColor:(UITapGestureRecognizer*)gesture;\n\
  - (IBAction)sendShapeToBack:(UITapGestureRecognizer*)gesture;\n```\n\n现在将这两个新方法添加到`@implementation`部分：\n\
  \n```\n- (IBAction)changeColor:(UITapGestureRecognizer*)gesture\n{\nSYShapeView\
  \ *shapeView = (SYShapeView*)gesture.view;\nUIColor *color = shapeView.color;\n\
  NSUInteger colorIndex = [self.colors indexOfObject:color];\nNSUInteger newIndex;\n\
  do {\n    newIndex = arc4random_uniform(self.colors.count);\n} while (colorIndex==newIndex);\n\
  shapeView.color = [self.colors objectAtIndex:newIndex];\n}\n\n- (IBAction)sendShapeToBack:(UITapGestureRecognizer*)gesture\n\
  {\nUIView *shapeView = gesture.view;\n[self.view sendSubviewToBack:shapeView];\n\
  }\n```\n\n`-changeColor:`方法主要是为了好玩。它能识别形状当前的颜色，并为其随机选取一个新颜色。\n\n`-sendShapeToBack:`操作则展示了视图如何重叠。当你向一个视图添加子视图时（使用`UIView`的`-addSubview:`消息），新视图会放在最上面。但这并非你唯一的选择。如果视图顺序很重要，有许多方法可以将子视图插入到特定索引处，或者紧贴另一个（已知）视图的下方或上方。你也可以使用`-bringSubviewToFront:`和`-sendSubviewToBack:`调整现有视图的顺序，你将在这里用到后者。你的三击手势会将该子视图“推”到最底层，位于所有其他形状之后。\n\
  \n为了使这个效果更明显，请对`SYShapeView.m`中的`-drawRect:`方法做一个小的修改，插入以下两行代码（以粗体标记）：\n\n```\n\
  - (void)drawRect:(CGRect)rect\n{\nUIBezierPath *path = self.path;\n[[[UIColor blackColor]\
  \ colorWithAlphaComponent:0.3] setFill];\n[path fill];\n[self.color setStroke];\n\
  [path stroke];\n}\n```\n\n新代码用 30%不透明（即 70%透明）的黑色填充形状。它会使得形状看起来有一个“烟雾状”的中心，从而加深绘制在其后面的任何形状的颜色。这将使形状是如何重叠的变得一目了然。\n\
  \n运行你的应用，创建几个形状，调整它们的大小，然后移动它们使其重叠，如图 11-12 所示。\n\n![A978-1-4302-5063-0_11_Fig12_HTML.jpg](img/A978-1-4302-5063-0_11_Fig12_HTML.jpg)\n\
  \n图 11-12. 使用半透明填充的重叠形状\n\n你最后添加的形状位于你最先添加的形状“之上”。现在尝试双击一个形状来改变它的颜色。我会等你。\n\n我还在等。\n\
  \n\n### 排查双击颜色变化问题\n\n遇到问题了？双击似乎没有改变形状的颜色？可能有两个原因：`-changeColor:`方法没有被接收到（你可以通过在\
  \ Xcode 中设置断点来测试），或者它被接收到了但颜色变化没有显示出来（你可以通过调整形状大小来测试）。如果你双击一个形状然后调整它的大小，就会看到颜色变化。好吧，是后者。花点时间修复这个问题。\n\
  \n问题是`SYShapeView`对象不知道在它的`color`属性发生变化时应该重新绘制自身。你可以在`-changeColor:`中添加`[shapeView\
  \ setNeedsDisplay]`语句，但这有点取巧。我坚信，当任何改变视图外观的属性被修改时，视图对象应该触发自身的重绘。这样一来，客户端代码就不必担心是否要发送`-setNeedsDisplay`消息；视图会自动处理这一切。\n\
  \n### 修复方法\n\n返回`SYShapeView.m`并添加以下方法：\n\n```\n- (void)setColor:(UIColor *)color\n\
  {\n    _color = color;\n    [self setNeedsDisplay];\n}\n```\n\n这个方法替换了由`color`属性创建的默认设置方法。新方法更新了`_color`实例变量（这是旧设置方法所做的全部工作），同时也向自身发送`-setNeedsDisplay`消息。现在，每当你更改视图的颜色时，它会立即重新绘制自身。\n\
  \n运行应用并再次尝试双击。效果好多了！\n\n### 处理手势识别器冲突\n\n最后，你需要进入演示中重新排列视图的部分。重叠一些视图，然后三击其中一个顶层视图。你看到视图被推到底层时的区别了吗？\n\
  \n你说什么？三击时颜色也变了？\n\n哦，天哪，这些手势识别器难道没有一个能正常工作吗？好吧，实际上它们能工作，但你造成了一个无解的局面。你将双击和三击手势识别器都附加到了同一个视图上。问题在于两者之间没有协调。实际情况是，双击识别器在第二次点击时就会触发，而三击识别器根本没有机会处理第三次点击。\n\
  \n有很多方法可以修复这个错误，但最常见的手势冲突问题只需一行代码就能解决。返回`SYViewController.m`文件，找到`-addShape:`方法，定位添加双击和三击识别器的代码。紧接着添加这一行：\n\
  \n`[dblTapGesture requireGestureRecognizerToFail:trplTapGesture];`\n\n这条消息在两个识别器之间建立了依赖关系。现在，双击识别器只有在三击识别器失败时才会触发。当你点击两次时，三击识别器会失败（它看到了两次点击，但从未得到第三次）。这创建了双击识别器触发所需的所有条件。然而，如果你三击，三击识别器成功，这就会阻止双击识别器触发。简单吗？\n\
  \n现在最后一次运行你的应用。调整大小并重叠一些形状。三击一个顶层形状将其推到底层，惊叹于结果，如图 11-13 所示。\n\n![A978-1-4302-5063-0_11_Fig13_HTML.jpg](img/A978-1-4302-5063-0_11_Fig13_HTML.jpg)\n\
  \n**图 11-13.** 正常工作的 Shapely 应用\n\n### 重要提示\n\n命中测试对视图的透明部分一无所知。所以，即使你能在顶层视图的中间或边缘附近看到某个视图的一部分，你也无法与它交互，因为触摸事件会传递给顶层视图。通过重写视图的`-hitTest:withEvent:`和`-pointInside:withEvent:`方法可以改变这一点，但这比我想演示的内容更复杂。\n\
  \n## 总结\n\n现在你应该对视图对象如何、何时以及为什么被绘制有了扎实的理解。你了解了图形上下文、贝塞尔路径、坐标系、颜色、透明度相关基础、2D 变换，甚至如何创建简单动画。内容很多。\n\
  \n你还没有深入探索的一件事是图像。让我们通过回顾过去来开始这一部分。\n\n### 图像与位图\n\n当你在图形上下文中绘制时，你无法访问自己创建的单个像素。所以你可以用颜色填充视图，但你不能询问上下文某个特定像素被设置成了什么颜色。原因是封装——又是这个词。你的代码无法假设事物实际如何绘制，甚至何时绘制。很可能是你的视图由\
  \ GPU 绘制到你的程序甚至无法访问的显示内存中。\n\n当你想处理图像的单个像素时，这可能会很棘手。如果你需要这样做，你必须为这些像素分配内存。然后你可以直接操作这些像素，或者使用图形绘制函数“绘制”到你的像素数组中。\n\
  \n\n\n### 从位图创建图像\n\n你在第 8 章编写的`ColorModel`应用中，其实已经使用过第一种方法了。在该应用中，`CMColorView`类最终被重写为显示色相/饱和度颜色场。它通过使用一个公式为每个像素计算颜色值来构建图像对象。我已经提取了该代码的核心部分，你可以在代码清单\
  \ 11-2 中找到它。\n\n代码清单 11-2. 来自 ColorModel 的图像创建代码\n\n```\n@interface CMColorView\
  \ ()\n{\n    CGImageRef hsImageRef;\n    float brightness;\n}\n@end\n\n...\n\n-\
  \ (void)drawRect:(CGRect)rect\n{\n    CGRect bounds = self.bounds;\n    CGContextRef\
  \ context = UIGraphicsGetCurrentContext();\n\n    if (hsImageRef!=NULL &&\n    \
  \    ( brightness!=_colorModel.brightness ||\n          bounds.size.width!=CGImageGetWidth(hsImageRef)\
  \ ||\n          bounds.size.height!=CGImageGetHeight(hsImageRef) ) )\n    {\n  \
  \      CGImageRelease(hsImageRef);\n        hsImageRef = NULL;\n    }\n\n    if\
  \ (hsImageRef==NULL)\n    {\n        brightness = _colorModel.brightness;\n    \
  \    NSUInteger width = bounds.size.width;\n        NSUInteger height = bounds.size.height;\n\
  \n        typedef struct {\n            uint8_t red;\n            uint8_t green;\n\
  \            uint8_t blue;\n            uint8_t alpha;\n        } Pixel;\n\n   \
  \     NSMutableData *bitmapData = [NSMutableData dataWithLength:sizeof(Pixel)\n\
  \                                                         *width*height];\n\n  \
  \      for ( NSUInteger y=0; y<height; y++ )\n        {\n            for ( NSUInteger\
  \ x=0; x<width; x++ )\n            {\n                UIColor *color = [UIColor\
  \ colorWithHue:(float)x/(float)width\n                                         \
  \  saturation:1.0f-(float)y/(float)height\n                                    \
  \       brightness:brightness\n                                                alpha:1];\n\
  \                float red,green,blue,alpha;\n                [color getRed:&red\
  \ green:&green blue:&blue alpha:&alpha];\n                Pixel *pixel = ((Pixel*)bitmapData.bytes)+x+y*width;\n\
  \                pixel->red = red*255;\n                pixel->green = green*255;\n\
  \                pixel->blue = blue*255;\n                pixel->alpha = 255;\n\
  \            }\n        }\n\n        CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
  \        CGDataProviderRef provider = CGDataProviderCreateWithCFData(\n        \
  \    (__bridge CFDataRef)bitmapData);\n        hsImageRef = CGImageCreate(width,height,\n\
  \                                   8,32,width*4,colorSpace,\n                 \
  \                  kCGBitmapByteOrderDefault,provider,NULL,\n                  \
  \                 false,kCGRenderingIntentDefault);\n        CGColorSpaceRelease(colorSpace);\n\
  \        CGDataProviderRelease(provider);\n    }\n\n    CGContextDrawImage(context,bounds,hsImageRef);\n\
  \    ...\n}\n```\n\n`CMColorView`对象将最终生成的图像保存在其`hsImageRef`变量中（这是一个 Core Graphics\
  \ 图像引用，相当于 Objective-C 中的图像对象引用）。它通过`CGContextDrawImage`函数（代码清单 11-2 中的最后一条语句）使用该图像来绘制视图的背景。之所以这样做，是因为创建图像需要大量计算。为了避免不必要的重复计算，生成的图像会存储在对象中，并在可能的情况下重复使用。这种技术被称为**缓存**。\n\
  \n只有在以下两种情况下，图像才无法被使用：(a) 视图首次被绘制时，以及 (b) 视图的任何属性发生变化，导致已保存的图像不再适用时。这正是第一个代码块要处理的问题。它判断视图是否已经存在图像，以及该图像是否仍然有效。如果任一条件不满足，则创建新的图像。\n\
  \n真正的工作从`if (hsImageRef==NULL)`语句开始。这个代码块从一系列单个像素值中创建新的图像。为此，你必须按照 Core Graphics\
  \ 能够理解的格式在内存中排列像素。Core Graphics 支持多种格式，但最常见的是红-绿-蓝-透明度（RGBA）格式。\n\nRGBA 图像是一个由像素值组成的二维数组。每个像素用四个（8\
  \ 位）字节表示。每个字节是一个介于 0 到 255 之间的无符号整数值。第一个字节是像素的红色值（或分量），接下来是绿色值，然后是蓝色值，最后是透明度值。前三个分量共同定义了像素的颜色，最后一个分量决定了其透明度：0\
  \ 表示完全透明，255 表示完全不透明。\n\n一张 100 像素高、100 像素宽的图像，需要一个 40,000（100·100·4）字节的数组。这就是创建`NSMutableData`对象（`bitmapData`）之前那段代码所做的工作。它计算了图像所占用的像素数量，然后为每个像素分配四个字节（`sizeof(Pixel)*width*height`）。\n\
  \n接下来的代码块进入循环，计算每个像素的值。当数组中所有像素都设置完毕后，就需要将这个庞大的数值数组转换成图像。这需要三个步骤：\n\n1. 获取一个颜色模型。\n\
  2. 创建一个图像数据提供器。\n3. 使用颜色模型，从数据提供器创建图像。\n\n这个过程之所以如此复杂，是因为图像数据的来源很多（内存、资源文件、网络连接等），并且\
  \ iOS 需要知道颜色模型是什么（RGB、HSL、CMYK 等）。对于你的应用，请使用默认的 RGB 颜色模型。图像数据的来源就是你刚刚填充好的数组中的字节。\n\
  \n执行这项工作的函数是`CGImageCreate`。其参数描述了图像中的像素数量、数组每行中的像素数量（可能不相同）、表示每个像素的字节数（`4`）、数据提供器、颜色模型，以及一个关于你希望如何渲染图像的提示。如果你对此没有特殊要求，可以传递`kCGRenderingIntentDefault`。\n\
  \n就是这样！现在你已经拥有了一个`CGImageRef`，它是由数组中的像素值堆叠而成的图像对象。\n\n> **提示：** 如果你想将这个`CGImageRef`转换为`UIImage`对象，可以使用`[UIImage\
  \ imageWithCGImage:myImageRef]`。\n\n\n\n"
- '# 从绘图创建位图


  你也可以反向操作——将图像或绘图转化为一堆像素——这有两种技术，具体取决于你希望如何处理结果。


  最简单且推荐的技术是调用`UIGraphicsBeginImageContext`函数，通过一块内存（它会方便地为你分配）创建图形上下文。你只需指定所需的绘图区域大小。


  然后你可以立即开始在该上下文中绘图，就像响应`-drawRect:`消息一样。所有绘图函数都有效，其结果会被写入临时内存缓冲区。完成绘图后，调用`UIGraphicsGetImageFromCurrentImageContext`，iOS
  将返回一个新的`UIImage`对象，其中包含你刚刚绘制的内容。你将在第 13 章中使用此技术。


  > **注意：** 此技术称为**离屏绘制**，因为你是在一个不会显示在屏幕上、或非响应`-drawRect:`消息的图形上下文中绘图。你可以在任何时候启动离屏绘制来渲染任何内容，然后将其保存到`UIImage`对象中。甚至可以在后台线程中执行绘制。


  完成后，调用`UIGraphicsEndImageContext`来销毁上下文并丢弃临时缓冲区。


  虽然此技术对于将任何绘图转换为图像很有用，但它仍然无法让你访问绘制内容的单个像素；你无法从上下文或`UIImage`对象中获取这些信息。如果你要追踪像素，就需要使用更低级的函数`CGBitmapContextCreate`。


  `CGBitmapContextCreate`创建一个绘图上下文（就像`UIGraphicsBeginImageContext`一样），但缓冲区是你提供的字节数组，正如之前在`CMColorView`中所做的那样。上下文创建后，你执行的任何绘图都会直接写入该数组。绘制完成后，你可以对生成的像素进行任何操作：统计黑色像素的数量、查找最暗和最亮的像素，你能想到的都可以。


  所有这些技术以及支持的众多像素格式，都在 *Quartz 2D 编程指南* 中有所描述，你可以在 Xcode 的文档和 API 参考中找到。


  ## 高级图形


  哦，还有更多。在你被这些图形话题搞得头晕目眩之前，请允许我简要介绍几个可能派上用场的技巧。


  ### 文本


  你也可以直接在自定义视图中绘制文本。基本技巧如下：


  1. 创建一个描述文本字体、样式和大小的`UIFont`对象。

  2. 设置绘制颜色。

  3. 向`NSString`对象发送其任一`-drawAtPoint:...`或`-drawInRect:...`消息。


  你还可以使用各种`-sizeWithFont:...`方法获取字符串绘制时的大小（以便计算其占用的空间）。


  在第 4 章中编写的 Touchy 应用以及之后第 12 章中的 Wonderland 应用里，都能找到相关示例。`-drawAtPoint:...`和`-drawInRect:...`方法只是底层文本绘制函数的封装，这些函数在
  *Quartz 2D 编程指南* 的“文本”章节中有所描述。如果你需要对文本进行精确控制，请阅读 *Core Text 编程指南*。


  ### 阴影、渐变和图案


  你已经学会了绘制实心形状和实线。Core Graphics 还能实现更多功能。它可以绘制图案和渐变，还可以在你绘制的形状背后自动绘制“阴影”。


  你可以通过创建各种图案、渐变和阴影对象，然后像设置颜色一样将它们设置到当前图形上下文中来实现这一点。在 *Quartz 2D 编程指南* 中可以找到丰富的示例和样例代码。


  ### 混合模式


  图形上下文以及许多绘图函数的另一个属性是混合模式。混合模式决定了正在绘制的像素如何影响上下文中已有的像素。通常，混合模式为`kCGBlendModeNormal`。这种模式绘制不透明像素，忽略透明像素，并混合半透明像素的颜色。


  还有大约二十多种其他混合模式。你可以执行“乘法”和“加法”，仅在现有图像的不透明部分绘制，仅在现有图像的透明部分绘制，使用“硬光”或“软光”绘制，仅影响亮度或饱和度——列表很长。你可以使用`CGContextSetBlendMode`函数设置当前混合模式。某些绘图方法接受一个混合模式参数。


  可用的混合模式在 *Quartz 2D 编程指南* 的两个地方都有文档记录和示例。对于绘图操作（形状和填充），请参考“路径”章节中的“设置混合模式”部分。对于图像混合的示例，请查找“位图图像和图像蒙版”章节中的“将混合模式用于图像”部分。


  ### 上下文堆栈


  所有这些设置可能会让你的图形上下文难以处理。假设你需要绘制一个复杂形状，包含渐变、投影、旋转，并带有特殊混合模式。在设置所有这些属性并绘制完形状后，你现在只想绘制一条简单的线。天哪！你是否需要重置每一个设置（投影、变换、混合模式等）？


  别慌，这是常见情况，有一个简单的机制可以处理。在进行大量更改之前，调用`CGContextSaveGState`函数来保存当前图形上下文几乎所有的状态。它会拍摄你当前上下文设置的快照，并将其推入堆栈。然后，你可以更改所需的任何绘图属性（裁剪区域、线宽、描边颜色等），并绘制你想要的任何内容。


  完成后，调用`CGContextRestoreGState`，上下文的所有设置将立即恢复到你调用`CGContextSaveGState`时的状态。你可以根据需要任意嵌套这些调用：保存、更改、绘制、保存、更改、绘制、恢复、绘制、恢复、绘制。在复杂的绘制方法中，以调用`CGContextSaveGState`开始并不罕见，这样方法的后续部分可以获取到一个未修改的图形上下文。




  ## 摘要


  我觉得是时候小小庆祝一下了。你在本章学到的不仅仅是某些绘图机制。创建自己的视图、绘制自己的图形、制作自己的动画，这就像是用一台车床换掉了你的拼装玩具。你刚刚从使用他人制作的部件构建应用，毕业为能够创造出你能想象到的任何东西。


  我只希望接下来的章节在所有这些自由奔放的图形讨论之后不会显得太无聊。无论你的自定义视图多么酷炫，用户仍然需要浏览你的应用。下一章将全部是关于导航的内容。


  '
- '# 练习


  如果 Shapely 的界面有一个重大缺陷，那就是它允许用户创建大到覆盖整个界面的形状，并且允许他们将形状移动到屏幕边缘之外，或者覆盖按钮视图。如果 Shapely
  能够温和地滑动或缩小用户拖动的形状，从而避免这种情况发生，那岂不是很棒？我也这么认为。


  你的挑战是：向 Shapely 添加代码，使得形状无法被移动到屏幕边缘之外，也无法覆盖添加形状的按钮。解决这个问题有多种方法。你可以简单地阻止用户在拖拽或捏合手势期间过度移动或调整形状大小。另一种解决方案是允许他们将形状移动到任何位置，然后在之后温和地“纠正”它。无论你选择哪种解决方案，都要让用户清楚地了解正在发生的事情，这样用户就不会仅仅认为你的应用出了故障。


  你可以在 `Learn iOS Development Projects` ➤ `Ch 11` ➤ `Shapely E1` 文件夹中找到我的解决方案。（提示：我在
  `SYViewController.m` 中添加了一个 `-corralShape:` 方法。）


