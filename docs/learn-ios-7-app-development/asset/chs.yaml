- '# 3. 转动网络


  **摘要**


  活动一下你的编码手指。本章将向你介绍 iOS 应用开发的一些核心技能，以及大量的 Objective-C 代码。你在本章创建的应用以及采取的步骤，非常典型地反映了
  iOS 应用的构建方式。从这个角度看，这将是你第一个“真正的”iOS 应用。


  你已经学会了使用 Interface Builder 向应用添加库对象、自定义它们以及连接它们。在本章中，你还将学习：


  *   自定义 Objective-C 类

  *   使用 Objective-C 为自定义类添加输出口和操作

  *   使用 Interface Builder 将这些输出口连接到对象

  *   使用 Interface Builder 将对象连接到自定义操作

  *   通过将库对象连接到委托来改变其行为


  你要构建的是一个 URL 缩短应用。该应用依赖于众多可用的 URL 缩短服务之一。这些服务会获取任意长度的 URL 并生成一个更短的 URL，后者在阅读、电话口述和推文中使用起来要方便得多。URL
  缩短服务通过记住原始 URL 来工作。当世界上任何人尝试加载短 URL 的网页时，该服务会返回一个重定向响应，将浏览器导向原始 URL。


  为了制作这个应用，你将学习如何在其中嵌入一个网页浏览器——这是一个有许多应用场景的技巧。它还将向你展示如何以编程方式从你的应用发送和接收 HTTP 请求，这是创建使用互联网服务的应用的有用工具。


  **注意**


  对计算机程序员来说，“以编程方式”一词意味着“通过编写计算机代码”。它表示你通过用某种计算机语言（如 Objective-C）编写指令来完成某事，而非通过其他方式。例如，Interface
  Builder 允许你通过在对象之间拖拽一条线来连接两个对象。你也可以编写 Objective-C 代码来连接同样的两个对象。如果你使用了后一种方法，就可以说你是“以编程方式设置连接”的。




  ### 设计


  本应用需要一些基础元素。用户需要一个输入和编辑 URL 的字段。如果能内置一个网页浏览器，让用户能查看该 URL 对应的页面，并通过点击链接跳转到其他 URL，那就更好了。还需要一个按钮，用于将长
  URL 转换为短 URL，以及一个显示缩短后 URL 的区域。


  这个设计并不特别复杂，所有内容应该能轻松地放在一个屏幕上，如图 3-1 的草图所示。让我们再添加一个额外功能：一个用于将缩短后的 URL 复制到 iOS 剪贴板的按钮。这样用户就能方便地将缩短后的
  URL 粘贴到其他应用中。


  ![A978-1-4302-5063-0_3_Fig1_HTML.jpg](img/A978-1-4302-5063-0_3_Fig1_HTML.jpg)


  图 3-1. Shorty 应用草图


  你的应用将在所有 iOS 设备上运行，并同时支持竖屏和横屏方向。既然已经有了基本设计，是时候启动 Xcode 开始动手了。


  ### 创建项目


  与任何应用一样，首先在 Xcode 中创建一个新项目。这是一个单屏幕应用，因此最明显的选择是`Single View Application`模板。


  填写项目详细信息，如图 3-2 所示。将项目命名为`Shorty`，将类前缀设置为`SU`（代表“Short URL”），并将设备设置为`Universal`。


  ![A978-1-4302-5063-0_3_Fig2_HTML.jpg](img/A978-1-4302-5063-0_3_Fig2_HTML.jpg)


  图 3-2. Shorty 项目详细信息


  点击“Next”按钮。选择一个位置保存你的新项目，然后点击“Save”。


  ## 构建网页浏览器


  首先构建应用的网页浏览器部分。这将包括一个文本字段（用户在此输入想要访问/转换的 URL）和一个用于显示该页面的网页视图。我们再添加一个刷新按钮，用于重新加载当前
  URL 的页面。


  在导航器中选中`Main_iPhone.storyboard`文件。首先为 iPhone 开发应用。稍后在本章中，你将创建 iPad 版本。


  在对象库中，找到`Navigation Bar`对象并将其拖入视图中，靠近顶部，如图 3-3 所示。导航栏对象通常由导航控制器创建，用于显示标题、返回按钮等。你在
  Surrealist 应用中已经见过。不过，在这里，你将单独使用它。


