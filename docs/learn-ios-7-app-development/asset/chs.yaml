  图 3-10. 为场景选择视图控制器对象


  在大多数情况下，iOS 中的屏幕最初只是一个单一的视图控制器对象。当该视图需要在屏幕上显示时，视图控制器会从一个 Interface Builder 文件中加载其视图对象——该文件可以是
  `.storyboard` 文件中的一个场景，也可以是一个 `.xib` 文件。在此应用中，你的 `SUViewController` 对象将从 `Main_iPhone.storyboard`
  文件加载 `SUViewController` 场景，并创建其中的所有对象和连接。对象与视图控制器之间的连接将在新对象与现有控制器对象之间建立。一旦场景文件加载完毕，控制器中已连接的属性便会引用由
  Interface Builder 文件创建的对象。


  **注意：** 如果暂时不理解这个概念，不必担心。Interface Builder 非常优雅且简单，但大多数人需要一段时间才能完全理解其工作原理。请查阅第 15
