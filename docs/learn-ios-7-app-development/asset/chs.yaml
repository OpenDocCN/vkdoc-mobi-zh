  \n献给黛博拉和道格，永远是最好的朋友\n\n## 关于作者\n\n![A978-1-4302-5063-0_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4302-5063-0_BookFrontmatter_Fig1_HTML.jpg)\n\
  \n詹姆斯·布卡内克在过去 30 年间一直从事微处理器系统的编程和开发工作。他拥有广泛的计算机硬件和软件经验，涵盖从嵌入式消费产品到工业机器人等多个领域。他的开发项目包括\
  \ Apple II 的首个局域网、分布式空调控制系统、钢琴教学系统、数字示波器、硅晶圆沉积炉以及 K-12 教育的协作写作工具。\n\n詹姆斯拥有 Sun Microsystems\
  \ 颁发的 Java 开发人员认证，并因优化局域网而获得一项专利。他目前专注于 OS X 和 iOS 软件开发，能够将他对 UNIX 和面向对象语言的深厚知识与对优雅设计的热爱相结合。詹姆斯拥有皇家舞蹈学院古典芭蕾副学士学位，偶尔可以在亚当斯芭蕾学院任教。\n\
  \n## 关于技术审校\n\n![A978-1-4302-5063-0_BookFrontmatter_Fig2_HTML.jpg](img/A978-1-4302-5063-0_BookFrontmatter_Fig2_HTML.jpg)\n\
  \n查尔斯·克鲁兹是 iOS、Android 和 Windows Phone 平台的移动应用开发者。他毕业于斯坦福大学，获得工程学学士和硕士学位。他住在南加州，并与妻子共同经营一家摄影工作室（[`www.facebook.com/BellaLenteStudios`](http://www.facebook.com/BellaLenteStudios)）。在不从事技术工作时，他在一支原创金属乐队中担任主音吉他手（[`www.taintedsociety.com`](http://www.taintedsociety.com/)）。\n\
  \n可以通过 `codingandpicking@gmail.com` 或在 Twitter 上 @CodingNPicking 联系查尔斯。\n\n## 引言\n\
  \n我站在旧金山的一个街角，这是一座我去得太少了的城市。我手里拿着一个电子设备。这个设备正在实时接收关于该市公共交通系统的状态更新。它告诉我，F 线列车将在 7\
  \ 分钟后到达市场街与第五大街站。它显示了一张城市地图，并通过计时从外太空接收的无线电波，进行三角定位，在地图上显示我的确切位置。一个磁力计确定我手持设备的方向，并利用该信息指示我应步行前往赶乘列车并上车的时间方向。朋友们打电话来，想知道我何时到达。我边走边用一个微小的视频摄像头和麦克风与他们分享我的影像和声音。我要去一个画廊开幕式与他们会合。那是一个新艺术作品展，作品来自世界各地的艺术家，完全使用类似于我手中拿着的设备创作而成。到达后，我用我的设备创建一个聚会的交互式虚拟现实体验，与家乡的朋友和家人分享我的经历，与遇到的人交换联系方式，并查找我们稍后可以去哪里吃饭的餐厅推荐。\n\
  \n这是一个真实的故事。几十年前，这还只是科幻小说。\n\n我们生活在一个个人电子产品正在真正改变我们工作、旅行、交流和体验世界的方式的时代。几乎每天都会有人发现它们的新用途。虽然我相信你喜欢从这项新技术中受益，但你阅读这本书是因为你想参与到这场革命中来。你想创建应用。\n\
  \n你来对地方了。\n\n\n\n"
- '# 本书适合哪些读者？


  本书适合所有希望学习基本工具与技术，为搭载 iOS 操作系统的 Apple 产品（包括 iPad、iPhone 和 iPod Touch）打造精彩动态应用的人。在撰写本书时，这些设备均涵盖在内。


  本书假定你是 iOS 应用开发的新手，且编程经验有限。如果你正在学习 `Objective‑C`，那再好不过。如果你熟悉 `C`、`Java`、`C#` 或 `C++`，理解本书内容也不会有太大困难，此外还有一章
  `Objective‑C` 入门指南供你阅读。如果你对计算机编程毫无经验，我建议先阅读一本基础的 `Objective‑C` 编程书籍——比如 Gary Bennett、Mitchell
  Fisher 和 Brad Lees 合著的 `《Objective-C 零基础入门》`——作为起步或同步学习。所有 iOS 应用开发均使用 `Objective‑C`
  语言。


  本书将阐述 iOS 应用设计、构建和部署的基本原理。你将养成一些良好的设计习惯，掌握核心编程技能，并熟悉用于创建应用的开发工具。


  本书并非针对某一技术的深度专著。它的设计初衷是通过让你抢先一步构建应用来激发想象力，这些应用将利用多种设备功能，例如在地图上定位、使用加速计、通过内置摄像头拍照、与其他设备实时通信、接入社交网络，以及将信息存储于云端。在此基础上，你可以超越这些示例，去创造下一款伟大的
  iOS 应用！


  '
- '# 老派风格 vs. 潮到没朋友


  我是一名老派程序员。我是从最底层（字面意义上）开始学习编程的。我写的第一段程序是在一个 4 位微控制器上，通过拨动开关输入机器指令。因此，在我开始使用 `BASIC`
  和 `C` 这类“高级”语言编程之前，我几乎已经掌握了关于机器代码的一切。在涉足 `C++` 之前，我对 `C` 语言了如指掌；而在为（革命性的）Macintosh
  计算机编写第一个图形用户界面（GUI）应用之前，我已是 `C++` 专家。


  尽管我珍视这些积累的知识，且其中大部分仍然有用，但我认识到，如今要开发优秀的 iOS 应用，并不需要这种“自底向上”的方法。过去几十年软件开发领域的许多进步，都在于将开发者——也就是你——从
  CPU 指令、硬件接口和软件设计的繁琐细节中解放出来。这让你能够专注于利用这些技术将想法变为现实，而不是把所有时间都花在操心寄存器分配和内存管理上。


  所以，令人振奋的消息是，你只需具备最基础的计算机编程知识，或是对底层技术有最起码的了解，就能直接上手创建功能完备的 iOS 应用。这正是本书前几章要做的事情——教你如何无需任何传统的编程方式就能创建一个
  iOS 应用。


  这并非意味着你不需要这些技能就能掌握 iOS 开发。恰恰相反，你的编程技能越强，你的开发效率就会越高。变化在于，这些技能不再是过去那种必须事先掌握的先决条件了。现在，你可以在探索
  iOS 开发新路径的同时，并行学习它们。


  '
- '# 如何使用本书


  本书秉持“边探索边学习”的理念。有些章节会带你一步步创建一个使用摄像头或播放音乐的 iOS 应用。这些章节可能会略过许多细节。在章节之间，你会看到关于基础软件开发技能的章节。其中有关于良好软件设计、内存管理和
  `Objective-C` 编程语言的章节。


  因此，与传统的一开始就学习所有基础技能，然后再用这些技能构建应用的顺序不同，本书一开始就着手构建应用，然后再探讨其中的具体细节。


  你可以按任意顺序阅读各章节，根据需要跳过或回头重读。如果你在早期章节中想深入了解对象，可以跳到后面阅读关于对象的章节。如果你已经了解了 `Objective‑C`
  的内存管理，遇到相关章节时直接跳过即可。将本书视为一个可供学习的技能集合，而非必须按顺序完成的系列课程。


  以下是各章节的预览：


  - **工欲善其事**：指导你如何下载和安装 Xcode 开发工具。你需要它们。

  - **应用初登场**：带你走一遍创建 iOS 应用的核心步骤——无需编程。

  - **网页旋涡**：创建一个利用 iOS 内置网页浏览器强大功能的应用。

  - **事件来临**：讨论事件（触摸、手势、运动）如何从设备进入你的应用，以及如何利用它们使应用对用户做出响应。

  - **表格礼仪**：向你展示数据如何在应用中显示以及如何被编辑。

  - **对象一课**：直截了当地讲解对象与面向对象编程。

  - **笑一个！**：教你如何将摄像头和照片库集成到你的应用中。

  - **模范公民**：解释被软件工程师称为“模型-视图-控制器”的神奇咒语。

  - **甜美音乐**：通过教你如何向应用添加音乐和 iTunes 来为你的应用增色。

  - **再谈工具**：简要介绍 Cocoa Touch 框架中可用的工具（视图、控件和对象）。这样当你需要某个工具时，就知道如何找到它。

  - **画幅画给我**：教你如何创建自定义视图，释放绘制 iOS 应用中几乎任何内容的能力。

  - **去而复返**：阐述应用导航的基本原理：用户如何从一个屏幕切换到另一个屏幕，以及如何返回。

  - **社交网络**：让你的应用接入 Facebook、Twitter、电子邮件等。

  - **极客网络**：演示如何使用 Game Kit 在多个 iOS 设备之间进行实时通信。

  - **你若打造**：解释 Interface Builder 背后的部分魔法。

  - **动感应用**：利用加速计和指南针让你的应用动起来。

  - **你在哪里？**：字面意思——为你绘制一张地图。

  - **记住我吗？**：展示如何设置和保存用户偏好，以及如何通过 iCloud 与其他 iOS 设备共享。

  - **文档储存**：解释应用文档如何存储、交换和同步。

  - **Objective 速成**：`Objective-C` 编程语言的速成课程。

  - **房间里的大象**：探讨内存管理的技术、技巧和陷阱。

  - **您会多国语言吗？**：教你如何创建支持多种语言的应用。

  - **再快一点！**：讲解性能分析与优化的基础知识，让你的应用跑得像兔子一样快。

  - **好事成双**：通过多任务处理提升你的应用能力，展示你的应用如何同时做两件、三件甚至四件事。


  致谢




  克莱·安德里斯（Clay Andres）将我引荐给 Apress 出版社，从而推动了整个项目的启动。史蒂夫·安格林（Steve Anglin）在很大程度上决定了
  Apress 的出版方向，当他邀请我撰写本书时，我深感荣幸。我的编辑汤姆·威尔士（Tom Welsh）对每一个段落都审慎把关，确保内容清晰易懂。与汤姆共事非常愉快，他极大地提升了本书的质量。查尔斯·克鲁兹（Charles
  Cruz）逐一核对了每一行代码和符号，以确保完全准确。任何技术错误最终都由我本人负责，但多亏查尔斯，书中这类错误已大幅减少。洛丽·卡瓦诺（Lori Cavanaugh）为我点上了`i`上的点、划上了`t`上的横，并纠正了我（离谱的）拼写错误。如果您觉得本书易于阅读，那要感谢洛丽的蓝笔修订。


  整个项目由一支协调编辑团队共同管理。阿纳米卡·潘楚（Anamika Panchoo）、凯蒂·沙利文（Katie Sullivan）和克里斯汀·里基茨（Christine
  Ricketts）统筹安排进度、在编辑之间联络沟通、追踪制作流程，并引导所有人朝着共同目标迈进。致 Apress 的所有同仁，感谢你们，由衷感谢！


  最后，我要向苹果公司的 Xcode 开发团队大声说一声“谢谢”，感谢他们创造了世界上最先进的移动应用开发工具。没有它，iOS 开发几乎寸步难行。




