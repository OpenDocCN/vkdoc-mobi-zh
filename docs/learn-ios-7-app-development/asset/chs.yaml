  ### 为 SUViewController 添加操作


  那么，你为什么要做所有这些（创建出口属性并在 Interface Builder 中连接它们）？你的控制器对象需要获取用户输入的 URL 值，并将其传达给 Web
  视图对象，以便 Web 视图知道要加载哪个 URL。你的 `SUViewController` 就像一个联络人或管理器，从一个对象（文本字段）获取数据，并将任务分配给另一个对象（Web
  视图）。现在你明白为什么它被称为控制器了吧？


  这是一个简单的任务，但必须有相应的代码来实现它。在项目导航器中选择 `SUViewController.m` 文件，并切换到助理编辑器视图，如图 3-13 所示。


  ![A978-1-4302-5063-0_3_Fig13_HTML.jpg](img/A978-1-4302-5063-0_3_Fig13_HTML.jpg)


  图 3-13. `SUViewController.m` 和 `SUViewController.h` 的助理视图


  助理编辑器视图显示了你的 `SUViewController` 类的两个方面。左侧是它的 `@implementation`（在 `.m` 文件中），右侧是它的
  `@interface`（在 `.h` 文件中）。类的接口描述了对象做什么，而其实现定义了它是如何做的。


  **提示：** 如果助理编辑器的右侧没有显示 `SUViewController.h` 文件，请从编辑窗格上方的导航菜单中选择 **配对文件**，如图 3-13
  所示。


  你编写的用于实现功能的代码放在 `.m`（实现）文件中，你在这里为每个任务指定一个方法名称。然后在 `.h`（接口）文件中，你声明那些其他对象需要使用你的对象的方法和属性的名称。这就是对象封装或隐藏其内部实现细节的方式。这使得它们更易于使用，就像一个复杂的设备（如
  iPod）将工作原理的细节隐藏在易用的界面背后一样。整个 iOS 都是这样编写的。事实上，Cocoa Touch 软件开发工具包（SDK）大部分是苹果为让 iOS
  运行而编写的 `.h` 文件。苹果提供了 `.h` 文件，因此你知道如何使用 iOS 中的任何对象，而 `.m` 文件（包含实际代码的部分）则被锁藏在库比蒂诺。


  在 `SUViewController.m` 文件中，你会看到已经存在两个方法（`-viewDidLoad` 和 `-didReceiveMemoryWarning`）。在这两个方法和
  `@end` 语句之间，添加这个新方法：


  ```

  - (IBAction)loadLocation:(id)sender


  {


  NSString *urlText = self.urlField.text;


  if (![urlText hasPrefix:@"http:"] && ![urlText hasPrefix:@"https:"]) {


  if (![urlText hasPrefix:@"//"])


  urlText = [@"//" stringByAppendingString:urlText];


  urlText = [@"http:" stringByAppendingString:urlText];


  }


  NSURL *url = [NSURL URLWithString:urlText];


  [self.webView loadRequest:[NSURLRequest requestWithURL:url]];


  }

  ```


  这个方法完成一个简单的任务：加载用户输入的 URL 对应的网页。这需要三个基本步骤：


  - 获取用户在文本字段中输入的字符串

  - 将该字符串转换为一个 URL 对象

  - 请求 Web 视图对象加载该 URL 的页面


  以下是这段代码的分解说明。


  ```

  NSString *urlText = self.urlField.text;

  ```


  第一行声明了一个名为 `urlText` 的新字符串对象变量，并将其赋值为该对象的 `urlField` 属性的 `text` 属性值。`self` 关键字指的是这个对象（`SUViewController`）。`urlField`
  属性是你刚刚添加到这个类中的。你的 `urlField` 引用了一个 `UITextField` 对象，而 `UITextField` 对象有一个 `text`
  属性，其中包含了当前字段中的字符——可以是用户输入的，也可以是你在程序中设置的。（看，我又用了“程序中”这个词。）


  **提示：** 要查看任何类或常量的文档，请按住 Option 键并单击（快速查看）或双击（完整文档）其名称。要查看 `UITextField` 类的属性和方法，请按住
  Option 键并双击 `.h` 文件中的词 `UITextField`。


  你任务的第一部分已经完成；你使用定义并连接的 `urlField` 属性检索了 URL 的文本。接下来的几行可能看起来有点奇怪。


  ```

  if (![urlText hasPrefix:@"http:"] && ![urlText hasPrefix:@"https:"]) {


  if (![urlText hasPrefix:@"//"])


  urlText = [@"//" stringByAppendingString:urlText];


  urlText = [@"http:" stringByAppendingString:urlText];


  }

  ```


  如果你熟悉 Objective-C，请仔细看看这段代码。它对你的应用来说并不关键；你可以省略它，你的应用仍然可以工作。不过，它确实为你的用户提供了一些便利。它检查用户输入的字符串是否以
  `http://` 或 `https://` 开头（这是网页的标准协议）。如果这些标准 URL 元素缺失，这段代码会自动插入一个。


  计算机往往非常刻板，但你想让你的应用更加宽容和友好。上述代码允许用户只输入 `www.apple.com`（例如），而不是正确的 `http://www.apple.com`，页面仍然可以加载。这有道理吗？我们继续。


  面向对象编程的核心在于将事物的复杂性封装在对象中。虽然字符串对象可以表示 URL 的字符，但它仍然只是一个字符串（字符数组）。大多数处理 URL 的方法都期望一个
  URL 对象。在 Cocoa Touch 中，URL 对象的类是 `NSURL`。你如何将从文本字段中得到的 `NSString` 对象转换为可以与 Web 视图一起使用的
  `NSURL` 对象？我想你正想问这个问题。


  ```

  NSURL *url = [NSURL URLWithString:urlText];

  ```


  这行代码要求 `NSURL` 类根据一个字符串对象创建一个新的 URL 对象。你传递给 `+URLWithString` 方法的字符串对象是你第一行代码中得到的
  `urlText` 引用。新 URL 对象的引用被返回并存储在新建的 `url` 变量中。正如你所看到的，将字符串对象转换为 URL 对象非常容易，也有方法可以实现反向转换，你将在本章后面用到它们。


  完成第二步后，最后要做的就是在这个 URL 对应的网页显示在 Web 视图中。这可以通过你方法中的最后一行代码实现：


  ```

  [self.webView loadRequest:[NSURLRequest requestWithURL:url]];

  ```


  `self.webView` 是你之前创建的 `webView` 属性，它连接到屏幕上的 Web 视图对象。你向该对象发送一条 `-loadRequest:`
  消息来加载页面。然而，事实证明，Web 视图需要一个 URL 请求（`NSURLRequest`）对象，而不仅仅是一个简单的 URL 对象。URL 请求不仅代表一个
  URL，还描述了该 URL 应如何通过网络传输。对于你的目的来说，一个普通的 HTTP GET 请求就足够了，而表达式 `[NSURLRequest requestWithURL:url]`
  要求 `NSURLRequest` 类根据给定的 URL 创建一个简单的 URL 请求，然后你将其传递给 `-loadRequest:`。剩下的工作就由 Web
  视图来完成。




