  在库中找到`Text Field`（不是`Text View`！）对象，并将一个拖入导航栏的中间。此对象会替换掉通常显示的默认标题。抓住右侧或左侧的调整大小手柄，并拉伸该字段，使其填满导航栏中的大部分空闲空间，如图
  3-8 所示。


