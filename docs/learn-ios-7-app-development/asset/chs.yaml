  \ 中的代码以使用新方法。编辑 `-observeValueForKeyPath:ofObject:change:context:` 的结尾，使其看起来如下所示（替换代码以粗体显示）：\n\
  \n```\n    else if ([keyPath isEqualToString:@\"color\"])\n\n        {\n\n     \
  \   [self.colorView setNeedsDisplay];\n\n        self.webLabel.text = [self.colorModel\
  \ rgbCodeWithPrefix:@\"#\"];\n\n        }\n```\n\n> **注意：** 我已经提过一次，但值得重申。如果你在重复自己（在多个地方编写相同的代码），请停下来思考如何整合这段逻辑。\n\
