- "# 欢迎使用 Xcode\n\n完成新项目的所有详细信息后，点击 `Create` 按钮。`Xcode` 将创建你的项目，并在工作区窗口中打开它。工作区窗口的展开视图如图\
  \ 1-8 所示。这就是奇迹发生的地方，也是你在本书中绝大部分时间花费的地方。\n\n![A978-1-4302-5063-0_1_Fig8_HTML.jpg](img/A978-1-4302-5063-0_1_Fig8_HTML.jpg)\n\
  \n图 1-8. Xcode 工作区窗口\n\n工作区窗口有五个主要部分：\n\n*   导航区（左侧）\n*   编辑器区（中央）\n*   工具区（右侧）\n\
  *   调试区（底部）\n*   工具栏（顶部）\n\n你可以有选择地隐藏除编辑器区之外的所有部分，因此你可能不会同时看到所有这些部分。让我们逐一简要浏览，以便你熟悉环境。\n\
  \n## 导航区\n\n导航器位于工作区窗口的左侧。共有八个导航器：\n\n*   项目\n*   符号\n*   查找\n*   问题\n*   测试\n*\
  \   调试\n*   断点\n*   日志\n\n通过点击窗格顶部的图标，或从 `View` ➤ `Navigator` 子菜单切换导航器。你可以使用 `View`\
  \ ➤ `Navigator` ➤ `Hide Navigator` 命令（`Command+0`）或点击工具栏中 `View` 按钮的左侧（见图 1-9）来隐藏导航器。这将为编辑器腾出一点额外的屏幕空间。\n\
  \n![A978-1-4302-5063-0_1_Fig9_HTML.jpg](img/A978-1-4302-5063-0_1_Fig9_HTML.jpg)\n\
  \n图 1-9. 导航器视图控件\n\n项目导航器（见图 1-8）是你的主基地，也是你使用最多的一个。项目中所有的源文件都组织在项目导航器中，并且通过它来选择要编辑的文件。\n\
  \n注意\n\n源文件是创建应用时使用的任何原始文档。大多数项目都有多个源文件。该术语用于将它们与中间文件（在构建过程中创建的临时文件）和产品文件（最终应用的文件）区分开来。你的产品文件出现在项目导航器底部的\
  \ `Products` 文件夹中。\n\n符号导航器会持续列出你在项目中定义的符号。搜索导航器可以在多个文件中查找文本。问题、调试、断点和日志导航器在你准备构建和测试应用时发挥作用。\n\
  \n\n\n### 编辑器区域\n\n编辑器区域是您实际创建应用的地方——名副其实。在项目导航器中选择一个源文件，它就会出现在编辑器区域中。编辑器的外观取决于文件的类型。\n\
  \n**注意**：并非所有文件都能在 Xcode 中编辑。例如，图像和声音文件无法在 Xcode 中编辑，但 Xcode 会在编辑器区域中显示它们的预览。\n\n\
  您最常编辑的是程序源文件（您可以像编辑任何文本文件一样编辑它们，参见图 1-8）和 Interface Builder 文件（它们以对象图表的形式呈现，参见图\
  \ 1-11），您可以对这些对象进行连接和配置。\n\n编辑器区域有三种模式：\n\n-   标准编辑器\n-   助理编辑器\n-   版本编辑器\n\n标准编辑器用于编辑所选文件。助理编辑器会将编辑器区域分割开来，并（通常）在右侧加载一个对应的文件。例如，在编辑\
  \ Objective-C 源文件时（如图 1-10 所示），助理编辑器会自动在右侧加载其对应的文件——即包含该文件定义的头文件。当编辑 Interface Builder\
  \ 文件时，它可能会显示正在编辑的对象所对应的 Objective-C 源文件，以此类推。\n\n![A978-1-4302-5063-0_1_Fig10_HTML.jpg](img/A978-1-4302-5063-0_1_Fig10_HTML.jpg)\
  \  \n图 1-10. 助理编辑器\n\n**提示**：助理编辑器非常灵活，可用于编辑您选择的几乎任何第二个文件。如果助理编辑器停止在右侧窗格中自动加载对应文件，请从右侧窗格上方的功能区中选择\
  \ `Counterparts` 以恢复该功能。\n\n版本编辑器用于比较源文件与早期版本。Xcode 支持多种版本控制系统。您可以“签入”或为项目拍摄“快照”，稍后可以将您编写的内容与同一文件的早期版本进行比较。本书不会深入介绍版本控制。如果您感兴趣，请阅读\
  \ Xcode 用户指南中的*保存和还原项目更改*部分。\n\n要更改编辑器模式，请点击工具栏中的编辑器控件，或使用 `View` 菜单中的命令。您无法隐藏编辑器区域。\n\
  \n### 实用工具区域\n\n工作区窗口的右侧是实用工具区域。顾名思义，它提供了各种有用的工具，如图 1-11 所示。\n\n![A978-1-4302-5063-0_1_Fig11_HTML.jpg](img/A978-1-4302-5063-0_1_Fig11_HTML.jpg)\
  \  \n图 1-11. 编辑 Interface Builder 文件\n\n实用工具区域的顶部是检查器。这些检查器会根据正在编辑的文件类型以及您所选择的内容而变化。与导航器类似，您可以通过点击窗格顶部的图标，或通过\
  \ `View` ➤ `Utilities` 子菜单（参见图 1-12）在不同的检查器之间切换。您可以使用 `View` ➤ `Utilities` ➤ `Hide\
  \ Utilities` 命令，或点击工具栏中视图控件右侧部分（参见图 1-12）来隐藏实用工具区域。\n\n![A978-1-4302-5063-0_1_Fig12_HTML.jpg](img/A978-1-4302-5063-0_1_Fig12_HTML.jpg)\
  \  \n图 1-12. 实用工具视图控件\n\n实用工具区域的底部是库。在这里您可以找到现成的对象、资源和代码片段，您可以将它们拖入到项目中。\n\n###\
  \ 调试区域\n\n调试区域用于测试您的应用并解决任何问题。它通常直到您运行应用时才会出现。要显示或隐藏它，可以使用 `View` ➤ `Debug Area`\
  \ ➤ `Show/Hide Debug Area` 命令。您也可以点击调试窗格左上角的关闭抽屉图标。\n\n### 工具栏\n\n工具栏包含许多有用的快捷键和状态信息，如图\
  \ 1-13 所示。\n\n![A978-1-4302-5063-0_1_Fig13_HTML.jpg](img/A978-1-4302-5063-0_1_Fig13_HTML.jpg)\
  \  \n图 1-13. 工作区窗口工具栏\n\n您已经看到了右侧的编辑器和视图按钮。左侧是用于运行（测试）和停止应用的按钮。在开发过程中，您将使用这些按钮来启动和停止您的应用。\n\
  \n在运行和停止按钮旁边是方案控件。这个多部分弹出菜单允许您选择项目的构建方式（称为方案）以及应用的目标位置（模拟器、实际设备、App Store 等）。\n\n\
  工具栏的中间是项目的状态。它将显示当前正在进行的活动，或最近完成的活动，例如构建、索引等。如果您刚刚安装 Xcode，它可能正在后台下载额外的文档，状态会显示这一点。\n\
  \n如果您愿意，可以使用 `View` ➤ `Show/Hide Toolbar` 命令隐藏工具栏。工具栏中的所有按钮和控件都只是菜单命令的快捷方式，因此没有它也可以正常工作。不过，本书会假设该工具栏是可见的。\n\
  \n如果您想了解更多关于工作区窗口、导航器、编辑器和检查器的信息，可以在 `Help` 菜单下的 Xcode 概述中找到所有这些内容（以及更多）。\n\n##\
  \ 运行您的第一个应用\n\n打开您的工作区窗口后，点击方案控件，并从子菜单中选择一个 iPhone 选项，如图 1-14 所示。这会告诉 Xcode，当您点击\
  \ `Run` 按钮时，希望此应用在何处运行。\n\n![A978-1-4302-5063-0_1_Fig14_HTML.jpg](img/A978-1-4302-5063-0_1_Fig14_HTML.jpg)\
  \  \n图 1-14. 选择方案和目标\n\n点击 `Run` 按钮。好的，可能还需要完成一道手续。在测试应用程序之前，Xcode 需要被授予一些特殊权限。当您第一次尝试运行应用时，Xcode\
  \ 会询问是否可以（参见图 1-15）。点击 `Enable` 并提供您的账户名和密码。\n\n![A978-1-4302-5063-0_1_Fig15_HTML.jpg](img/A978-1-4302-5063-0_1_Fig15_HTML.jpg)\
  \  \n图 1-15. 启用开发者模式\n\n一旦您完成了这些初步步骤，Xcode 就会从您项目中的所有部件组装您的应用——这个过程称为构建——然后使用其内置的\
  \ iPhone 模拟器运行您的应用，如图 1-16 左侧所示。\n\n![A978-1-4302-5063-0_1_Fig16_HTML.jpg](img/A978-1-4302-5063-0_1_Fig16_HTML.jpg)\
  \  \n图 1-16. iPhone 模拟器\n\n模拟器正如其名。它是一个尽可能逼真地模拟真实 iPhone、iPad 或 iPod Touch 的程序。模拟器允许您直接在\
  \ Mac 上进行大部分 iOS 应用测试，而无需将应用加载到真实的 iOS 设备上。它还允许您在不同类型的设备上测试您的应用，因此您不必每种都买一个。\n\n\
  恭喜您，您刚刚在（模拟的）iPhone 上创建、构建并运行了一个 iOS 应用！之所以能成功，是因为 Xcode 项目模板总是创建一个可运行的项目；所缺少的是让您的应用实现某些精彩功能的部分。这正是本书其余部分要介绍的内容。\n\
  \n现在，您可以随意在 iPhone 模拟器中探索。虽然您创建的应用没有任何功能——除了一个拙劣的“手电筒”应用之外——但您会注意到，您可以使用 `Hardware`\
  \ ➤ `Home` 命令模拟按下主页按钮，并返回到主屏幕（图 1-16 的中部和右侧）。在那里，您会找到您的应用、设置应用、Game Center 等，就好像这是一个真正的\
  \ iPhone 一样。抱歉，它不能拨打电话。\n\n完成后，切换回工作区窗口，并点击工具栏中的 `Stop` 按钮。\n\n\n\n## 总结\n\n你现在已经掌握了开发并运行\
  \ iOS 应用所需的全部工具。你了解了 Xcode 的基本组织结构，以及如何在模拟器中运行你的应用。\n\n下一步就是为你的应用添加一些内容。\n\n"
- "# 第二章：Boom！应用\n\n## 摘要\n\n在本章中，你将创建一个能够真正做些事情的 iOS 应用。虽然功能不多——毕竟还处于早期阶段——但足以称得上实用。在这个过程中，你将：\n\
  \n-   使用 Xcode 的 **Interface Builder** 设计你的应用\n-   为你的应用添加对象\n-   将对象连接在一起\n-  \
  \ 自定义对象以提供内容\n-   向项目添加资源文件\n-   使用 **storyboard** 创建**转场**\n-   使用**约束**控制视觉元素的布局\n\
  \n令人惊讶的是，你将在不编写一行代码的情况下创建这个应用。这并不常见，但这将展示 Xcode 的灵活性。\n\n你将创建的这个应用会展示一些关于二十世纪女性超现实主义者的有趣事实。让我们开始吧。\n\
  \n### 设计\n\n在启动 Xcode 并疯狂敲击键盘之前，你需要有一个计划。这是应用开发的设计阶段。在你的应用生命周期中，随着不断改进，你可能会多次修改设计，但在开始之前，你需要对应用的外观和工作方式有一个基本构想。\n\
  \n你的设计可以是正式写出来的，也可以是画在餐巾纸上的草图，甚至可以只是存在脑子里。只要你有设计就行，形式并不重要。你至少需要能够回答一些基本问题：你的应用将在哪些设备上运行（iPhone/iPod、iPad，还是两者都支持）？应用是竖屏运行、横屏运行，还是两者都支持？用户会看到什么？用户如何导航？他们将如何与应用互动？\n\
  \n本应用的一个粗略草图如图 2-1 所示。这个应用非常简单，因此初始设计不需要太多内容。这个超现实主义者应用将有一个包含著名女性超现实主义者肖像的启动画面。点击其中一张肖像，画面将过渡到第二个屏幕，该屏幕会展示一幅代表性画作以及一个包含艺术家生平信息的可滚动文本字段。你已决定此应用仅能在\
  \ iPhone 或 iPod Touch 上运行，并且仅支持竖屏方向。这将简化你的设计和开发工作。\n\n![A978-1-4302-5063-0_2_Fig1_HTML.jpg](img/A978-1-4302-5063-0_2_Fig1_HTML.jpg)\n\
  \n图 2-1. 超现实主义者应用草图\n\n### 创建项目\n\n第一步是创建你的项目。点击启动窗口上的 `New Project` 按钮，或选择 `New\
  \ ➤ New Project…` 命令。查看可用的模板，如图 2-2 所示。\n\n![A978-1-4302-5063-0_2_Fig2_HTML.jpg](img/A978-1-4302-5063-0_2_Fig2_HTML.jpg)\n\
  \n图 2-2. iOS 项目模板\n\n你的设计为你提供了应用工作方式的基本概念，这应该能提示你选择哪个 Xcode 项目模板作为起点。你的应用设计与这些模板中的任何一个都不是完全吻合，因此选择\
  \ `Single View Application` 模板——这是最简单的模板，并且已经包含了一个视图。点击 `Next` 按钮。\n\n下一步是填写项目的详细信息（见图\
  \ 2-3）。将项目命名为 `Surrealists`，并填写你的组织名称和标识符。为了与你的设计选择保持一致，将 `Devices` 选项从 `Universal`\
  \ 更改为 `iPhone`，如图 2-3 所示。\n\n> **注意**：为 iPhone 开发与为 iPod Touch 开发是相同的（除非你的应用使用了\
  \ iPhone 独有的功能）。从现在开始，我将只提及 iPhone，但请记住这也包括 iPod Touch。\n\n![A978-1-4302-5063-0_2_Fig3_HTML.jpg](img/A978-1-4302-5063-0_2_Fig3_HTML.jpg)\n\
  \n图 2-3. 设置项目详细信息\n\n还有一个 `Class Prefix` 设置。此选项设置一个非常短的字符串，它将用于一致地命名你添加到项目中的所有新类。传统上是两个大写字母，但也可以是任何内容。你应该避免使用\
  \ iOS 已使用的两个字符前缀，特别是 `NS` 和 `UI`。对于这个项目，请将其留空——你不会创建任何类。\n\n点击 `Next` 按钮。在你的硬盘上选择一个位置来保存新项目，然后点击\
  \ `Create`。\n\n## 设置项目属性\n\n你现在有了一个空的 Xcode 项目；是时候开始自定义它了。从项目设置开始，点击项目导航器中的项目名称（`Surrealists`），如图\
  \ 2-4 左上角所示。编辑区域将显示此项目的所有设置。从编辑器左上角的弹出菜单中选择 `Surrealist` target（见图 2-4），然后选择中间的\
  \ `General` 选项卡。\n\n![A978-1-4302-5063-0_2_Fig4_HTML.jpg](img/A978-1-4302-5063-0_2_Fig4_HTML.jpg)\n\
  \n图 2-4. target 设置\n\n向下滚动 target 设置，直到找到 `Deployment Info` 区域。取消选中 `Device Orientation`\
  \ 中的 `Landscape Left` 和 `Landscape Right` 复选框，这样仅选中 `Portrait` 方向。\n\n回顾一下，你已经创建了一个仅限\
  \ iPhone 的应用项目，并且它只能以竖屏方向运行。现在你已经准备好设计界面了。\n\n## 构建界面\n\n点击项目导航器中的 `Main.storyboard`\
  \ 文件。Xcode 的 **Interface Builder** 编辑器会出现在编辑区域，如图 2-5 所示。\n\nInterface Builder 是\
  \ Apple 应用厨房中的**秘密武器**。简而言之，它是一个用于在应用内添加、配置和互连对象的工具——无需编写任何代码。你可以在 Interface Builder\
  \ 中定义应用的大部分视觉元素。Interface Builder 编辑 `storyboard`、`xib` 和（旧版）`nib` 文件。\n\n![A978-1-4302-5063-0_2_Fig5_HTML.jpg](img/A978-1-4302-5063-0_2_Fig5_HTML.jpg)\n\
  \n图 2-5. Interface Builder\n\n> **注意**：现代 Interface Builder 文件的扩展名为 `xib` 或 `storyboard`。旧版\
  \ Interface Builder 文件的扩展名为 `nib`（读作“nib”），你仍然会听到程序员将它们统称为“nib”文件。Nib 这个缩写代表 **N**ext\
  \ **I**nterface **B**uilder，因为 Xcode、Interface Builder 和 Cocoa Touch 框架的根源都可以追溯到\
  \ Steve Jobs 的“另一家”公司——NeXT。在本书后面，你会看到很多以 `NS` 开头的类名，这是 `NeXTStep` 的缩写，即 NeXT 操作系统的名称。\n\
  \nInterface Builder 在两种视图中显示文件中的对象。左侧（见图 2-5）是组织成层级列表的对象，称为**大纲**。一些对象可以包含其他对象，就像文件夹可以包含其他文件夹一样，大纲反映了这一点。使用展开三角形来显示包含的对象。\n\
  \n右侧的视图称为**画布**。在这里你可以找到 Interface Builder 文件中的可视化对象。只有可视化对象（如按钮、标签、图像等）才会出现在画布上。没有可视化方面的对象只会在大纲中列出。如果一个对象同时出现在两者中，你使用哪一个都没关系——它们是同一个对象。\n\
  \n> **注意**：如果你一直在学习面向对象编程语言，那么你就知道什么是“对象”。如果你不知道什么是“对象”，不要惊慌。现在，只需将对象视为乐高®积木；它是一个离散的模块，在你的应用中执行特定任务，并且可以与其他模块连接起来组成更大的部分。如果你想立即了解对象，可以跳到第\
  \ 6 章。\n\n\n\n### 添加对象\n\n从库中获取新对象。选择 `View ➤ Utilities ➤ Show Object Library` 命令。这将会同时使右侧的工具区域变为可见，并切换到对象库（小立方体），如图\
  \ 2-6 所示。\n\n![A978-1-4302-5063-0_2_Fig6_HTML.jpg](img/A978-1-4302-5063-0_2_Fig6_HTML.jpg)\n\
  \n图 2-6. 对象库\n\n要向你的应用添加对象，请将其从库中拖拽并放入 Interface Builder 编辑器中。你的应用需要一个导航控制器对象，因此向下滚动对象列表，直到找到`导航控制器`。你可以通过在库面板底部的搜索字段中输入关键字来简化搜索（见图\
  \ 2-7）。\n\n如图 2-7 所示，将导航控制器对象从库中拖拽到画布上，然后将其放到空白区域的任意位置。你刚刚为你的应用添加了一个对象——实际上，是几个对象。\n\
  \n![A978-1-4302-5063-0_2_Fig7_HTML.jpg](img/A978-1-4302-5063-0_2_Fig7_HTML.jpg)\n\
  \n图 2-7. 添加导航控制器\n\n### 删除和连接对象\n\n库中的导航控制器对象实际上是一组对象的集合。顾名思义，导航控制器管理用户如何在多个屏幕之间移动，每个屏幕都由一个单独的视图控制器对象控制。导航控制器连接到将显示的第一个屏幕的视图控制器，这个屏幕被称为其根视图控制器。不必担心细节；你将在第\
  \ 12 章中全面了解导航控制器。\n\n为了方便起见，库中的导航控制器会同时创建一个导航控制器对象以及它初始化时附带的根视图控制器。这个根视图控制器恰好是一个表视图控制器。你不需要表视图控制器。相反，你希望这个导航控制器使用你已经拥有的、没有多余功能的普通视图控制器。\n\
  \n首先，丢弃多余的表格视图控制器。如图 2-8 所示，只选中连接到导航控制器的那个表视图控制器。按 `Delete` 键，或选择 `Edit ➤ Delete`。\n\
  \n![A978-1-4302-5063-0_2_Fig8_HTML.jpg](img/A978-1-4302-5063-0_2_Fig8_HTML.jpg)\n\
  \n图 2-8. 删除表视图控制器\n\n现在，你需要将新的导航控制器连接到你的项目自带的那个普通视图控制器。拖拽视图控制器并将其放置在导航控制器的右侧（见图\
  \ 2-9）。\n\n附加在视图控制器上的未连接箭头表示你应用的初始视图控制器。你想让导航控制器成为第一个控制器，因此，如图 2-9 所示，将该箭头从简单的视图控制器上拖离，并放到导航视图控制器上。\n\
  \n![A978-1-4302-5063-0_2_Fig9_HTML.jpg](img/A978-1-4302-5063-0_2_Fig9_HTML.jpg)\n\
  \n图 2-9. 指定初始视图控制器\n\n最后一步是重新建立导航控制器与其根视图控制器的连接。在 Interface Builder 中有多种建立连接的方法。我将向你展示两种最常用的方法。按住\
  \ `control` 键，点击导航控制器，然后从它上面拖出一条线连接到视图控制器，如图 2-10 所示。\n\n![A978-1-4302-5063-0_2_Fig10_HTML.jpg](img/A978-1-4302-5063-0_2_Fig10_HTML.jpg)\n\
  \n图 2-10. 设置根视图控制器连接\n\n松开鼠标时，会弹出一个菜单，列出了这两个对象之间所有可能的连接。点击 `根视图控制器` 连接。现在，当你的应用启动时，导航控制器将把此视图控制器显示为第一个屏幕。\n\
  \n我确实答应过要教你两种连接对象的方法。第二种方法是使用工具区域中的连接检查器。选择 `View ➤ Utilities ➤ Show Connections\
  \ Inspector`，或点击工具面板中的小箭头图标，如图 2-11 所示。\n\n![A978-1-4302-5063-0_2_Fig11_HTML.jpg](img/A978-1-4302-5063-0_2_Fig11_HTML.jpg)\n\
  \n图 2-11. 使用连接检查器\n\n要使用检查器，首先选择一个对象。在此例中，选择导航控制器。连接检查器将显示该对象的所有连接。找到标记为`根视图控制器`的连接。每个连接的右侧都有一个小圆圈。要设置连接，请点击并将该圆圈拖拽到你想连接的另一个对象上——在此例中，是视图控制器。要清除（或“断开”）连接，请点击连接字段中的小“x”。\n\
  \n到目前为止，你已经创建了一个新项目。项目模板包含了一个简单的视图控制器。你为你的应用添加了一个新的导航控制器对象（以及一个不需要的、被你丢弃的表视图控制器）。你已将导航控制器指定为应用启动时接管控制的那个控制器，并将该控制器连接到了那个空的视图控制器。现在，是时候往那个空的视图中放入一些内容了。\n\
  \n\n\n### 向视图中添加视图\n\n现在进入这个项目最有趣的部分：创建应用的内容。首先，在启动画面中添加四个按钮，稍后你将对其进行个性化设置。为此，你需要在初始屏幕的视图对象中进行操作。\n\
  \n视图控制器对象并非单一对象，而是一个对象的集合。我之前提到过，有些对象可能包含其他对象；视图控制器和视图就是这样的两个对象。首先，选择视图对象。在 `Interface\
  \ Builder` 中有两种方法可以做到这一点。你可以在左侧的大纲中找到该对象（见图 2-12），然后选中它。另一种方法是“深入”到你想要的对象。点击视图控制器对象的中心位置（见图\
  \ 2-12 的中间部分）。这将选中视图控制器对象。再次点击，你就会选中该对象中包含的视图对象。如果那个视图中还包含另一个对象，再次点击就会选中它，以此类推。\n\
  \n![A978-1-4302-5063-0_2_Fig12_HTML.jpg](img/A978-1-4302-5063-0_2_Fig12_HTML.jpg)\n\
  \n图 2-12. 选中视图对象\n\n既然你已经知道如何查找和选中嵌入的视图对象，那么是时候向其中添加一些新的视图对象了。在对象库中，找到 `Button`\
  \ 对象——在搜索栏中输入“button”可以更方便地找到它。抓取一个 `Button` 对象并将其拖入视图对象中，如图 2-13 所示。\n\n**注意：**视图所包含的视图对象被称为它的子视图。包含某个视图的视图被称为它的父视图。\n\
  \n![A978-1-4302-5063-0_2_Fig13_HTML.jpg](img/A978-1-4302-5063-0_2_Fig13_HTML.jpg)\n\
  \n图 2-13. 添加按钮对象\n\n重复此操作三次，这样视图中就有四个按钮对象，大致如图 2-14 所示。现在，你需要调整这些按钮的大小，使它们填满整个屏幕。为了帮助你均匀布局，可以添加一些参考线。点击父视图内部，确保没有选中任何按钮对象，然后选择\
  \ `Editor` ➤ `Add Vertical Guide`。默认情况下，会在视图中间创建一条新的参考线，这正是你所需要的。\n\n使用参考线，调整每个按钮的位置和大小，使其占据视图的四分之一。首先，将按钮拖到一个象限的左下角。视图会自动“吸附”到最近的布局参考线上。抓住对角的大小调整手柄并将其拖出，以填满整个象限，如图\
  \ 2-14 所示。在这个阶段不需要做到完美；稍后在本章中你会对其进行整理。\n\n![A978-1-4302-5063-0_2_Fig14_HTML.jpg](img/A978-1-4302-5063-0_2_Fig14_HTML.jpg)\n\
  \n图 2-14. 定位按钮\n\n全部完成后，你将得到四个填满屏幕的按钮（见图 2-15）。\n\n### 编辑对象属性\n\n现在是时候自定义你的按钮了。选中所有四个按钮——点击其中一个按钮，然后按住\
  \ shift 键，依次点击其他三个按钮。选择 `View` ➤ `Utilities` ➤ `Show Attributes Inspector`，或者点击检查器面板中的小控制图标，如图\
  \ 2-15 所示。\n\n![A978-1-4302-5063-0_2_Fig15_HTML.jpg](img/A978-1-4302-5063-0_2_Fig15_HTML.jpg)\n\
  \n图 2-15. 自定义按钮对象\n\n属性检查器用于修改一个或多个对象的各种属性。检查器中的属性会根据你选中的对象类型而变化。如果你选中了多个对象，检查器将只显示这些对象共有的属性。\n\
  \n选中四个按钮后，使用属性检查器进行以下更改：\n\n*   将 Type 更改为 `Custom`\n*   点击字体属性旁边的向上箭头，直到显示为 `System\
  \ Bold 18.0`\n*   点击 Text Color 下拉箭头，选择 `white`\n*   找到 Control 组，并选择底部垂直对齐图标\n\n\
  全部完成后，你的视图应该看起来像图 2-16 中所示。下一步是分别为每个按钮添加图像和标签。为此，你需要向项目中添加一些资源。\n\n![A978-1-4302-5063-0_2_Fig16_HTML.jpg](img/A978-1-4302-5063-0_2_Fig16_HTML.jpg)\n\
  \n图 2-16. 自定义后的按钮\n\n### 添加资源\n\n应用运行所需的一切都必须是你所构建应用的一部分。如果你的应用需要一张图片，那么该图片必须包含在其资源中。图片文件、`Interface\
  \ Builder` 文件、声音文件，以及其他任何非计算机代码的东西，统称为资源。\n\n你几乎可以将任何文件作为资源添加到你的应用中。资源文件在构建时会被复制到应用的\
  \ bundle 中，并在应用运行时可供其使用。\n\n`Xcode` 有一种特殊的方式来组织常用资源（如图片），将它们整合成一个称为资源目录的单一资源。要向资源目录添加新图片，请在项目导航器中选中该目录，如图\
  \ 2-17 所示。在 `Finder` 中找到你想要添加的资源文件。找到你在第 1 章中下载的 `Learn iOS Development Projects`\
  \ 文件夹。在 `Ch 2` 文件夹内，你会找到 `Surrealists (Resources)` 文件夹，其中包含八个图片文件。让你的文件和项目窗口都可见，然后将这些图片文件拖拽到资源目录的组列表（左侧）中，如图\
  \ 2-17 所示。\n\n![A978-1-4302-5063-0_2_Fig17_HTML.jpg](img/A978-1-4302-5063-0_2_Fig17_HTML.jpg)\n\
  \n图 2-17. 将资源文件拖入资源目录\n\n这些文件将被复制到你的项目文件夹中，添加到项目导航器，并作为资源添加到你的应用中。资源目录使你可以轻松组织同一张图片的多个分辨率版本，尽管在这个例子中只添加了低分辨率图片。像你刚才那样将图片拖入组列表，会在目录中创建新的分组。你稍后可以通过将图片拖入分组的预览窗格（图\
  \ 2-18 右侧所示），来添加同张图片的其他版本（高分辨率或特定平台）。`Xcode` 无法编辑这些文件，但预览窗格（见图 2-18）允许你查看它们的缩略图。\n\
  \n![A978-1-4302-5063-0_2_Fig18_HTML.jpg](img/A978-1-4302-5063-0_2_Fig18_HTML.jpg)\n\
  \n图 2-18. 预览图片文件\n\n\n\n### 自定义按钮\n\n在添加了必要的资源文件后，就可以开始自定义按钮了。再次选择 `Main.storyboard`\
  \ 文件，然后选择左上角的按钮。打开属性检查器（视图 ➤ 工具 ➤ 显示属性检查器），将其标题属性更改为 `Remedios Varo`，背景属性更改为 `RemediosVaro1`，如图\
  \ 2-19 所示。\n\n![A978-1-4302-5063-0_2_Fig19_HTML.jpg](img/A978-1-4302-5063-0_2_Fig19_HTML.jpg)\n\
  \n图 2-19. 自定义第一个按钮\n\n背景属性是你希望按钮用作其背景的图片资源名称。你可以手动输入，但 Xcode 能识别常见的图片类型，并将你刚刚添加的图片资源包含在下拉列表中。只需从该列表中选择文件名即可。\n\
  \n自定义剩余的三个按钮（按顺时针方向操作），按照如下方式设置它们的标题和背景图片：\n\n* `Kay Sage`，`KaySage1`\n* `Leonora\
  \ Carrington`，`LeonoraCarrington1`\n* `Frida Kahlo`，`FridaKahlo1`\n\n作为收尾工作，选择 Kay\
  \ Sage 的按钮，并将其文本颜色改为 `black`（以便更易于阅读）。全部完成后，你的界面应该如图 2-20 所示。\n\n![A978-1-4302-5063-0_2_Fig20_HTML.jpg](img/A978-1-4302-5063-0_2_Fig20_HTML.jpg)\n\
  \n图 2-20. 完成后的按钮\n\n## 使用故事板\n\n故事板允许你在界面生成器中规划应用的各种屏幕，并定义用户如何在它们之间导航，从而简化了应用开发过程。在故事板出现之前，你可以布局每个屏幕，但必须编写代码来实现屏幕间的切换。这些代码量不大，也不复杂，但很繁琐。借助故事板，你可以在界面生成器中完成大部分工作——完全无需编写任何代码。\n\
  \n**顺畅开发的体验**\n\n重复的代码会拖慢开发进度。将时间花费在反复编写相同代码上，就意味着你没有时间去开发炫酷的新功能。你需要的是一个顺畅无阻的开发环境，由它为你处理简单的任务，让你能专注于开发那些让你的应用与众不同的内容。\n\
  \n苹果公司致力于让 iOS 和 Xcode 尽可能流畅无阻。每个新版本都会添加新的类和开发工具，使开发高质量的应用变得更加容易。例如，在手势识别器引入之前，编写代码来检测多点触控手势（比如捏合或三指轻扫）是一项复杂的任务，通常需要一页或更多页的代码。而如今——你可能已经猜到了——你的应用只需将一个手势识别器对象拖放到设计中，并将其连接到一个操作，就能检测到这些手势。\n\
  \n接下来，让我们使用故事板来定义应用的其余屏幕，以及用户如何在这些屏幕之间导航。\n\n### 添加新屏幕\n\n在创建两个屏幕之间的过渡（称为 segue，发音为“seg-way”）之前，你必须先创建另一个屏幕（在故事板的术语中称为场景）。返回对象库，将一个全新的视图控制器对象拖入你的\
  \ `Main.storyboard` 文件中，如图 2-21 所示。\n\n![A978-1-4302-5063-0_2_Fig21_HTML.jpg](img/A978-1-4302-5063-0_2_Fig21_HTML.jpg)\n\
  \n图 2-21. 添加一个新的视图控制器\n\n在图 2-21 中，我进行了缩小操作（使用编辑器面板右下角的放大控件），以便看到整个故事板。然而，要编辑视图的内容，界面生成器需要放大到该视图。有几种方法可以实现这一点：\n\
  \n*   双击画布进行缩小/放大。\n*   点击画布右下角的缩放切换按钮 (=) 或放大镜 (+)，然后滚动以居中视图。\n\n在库中找到`图像视图`对象。将一个图像视图拖入空视图，如图\
  \ 2-22 所示。\n\n![A978-1-4302-5063-0_2_Fig22_HTML.jpg](img/A978-1-4302-5063-0_2_Fig22_HTML.jpg)\n\
  \n图 2-22. 添加一个图像视图对象\n\n如果图像视图对象没有自动吸附填满整个视图，请拖动它直到填满。保持新图像视图对象的选中状态，切换到属性检查器。将图像属性更改为\
  \ `RemediosVaro2`，并将图像模式更改为 `Aspect Fill`，如图 2-23 所示。\n\n![A978-1-4302-5063-0_2_Fig23_HTML.jpg](img/A978-1-4302-5063-0_2_Fig23_HTML.jpg)\n\
  \n图 2-23. 自定义背景图像视图\n\n现在，向此屏幕添加一个可滚动的文本字段。在库中找到`文本视图`（注意不是`文本字段`！）对象。将一个新的文本视图拖入窗口，并利用自动用户界面参考线将其定位在屏幕的右上角，如图\
  \ 2-24 所示。\n\n![A978-1-4302-5063-0_2_Fig24_HTML.jpg](img/A978-1-4302-5063-0_2_Fig24_HTML.jpg)\n\
  \n图 2-24. 添加一个文本视图\n\n选中文本视图后，使用属性检查器更改以下属性：\n\n![A978-1-4302-5063-0_2_Fig25_HTML.jpg](img/A978-1-4302-5063-0_2_Fig25_HTML.jpg)\n\
  \n图 2-25. 设置半透明背景色\n\n*   将文本颜色设置为 `white`\n*   将字号减小到 `12.0`\n*   取消勾选 `editable`（可编辑）选项\n\
  *   在下方，取消勾选 `Shows Horizontal Scrollers`（显示水平滚动条）\n*   点击 `background`（背景）颜色，在颜色选择器中使用灰色滑块选择\
  \ 50% 灰色，并设置 33% 的 Alpha 值或不透明度（参见图 2-25）\n\n此对象的文本可以在你找到图片文件的 `Surrealists (Resources)`（超现实主义画家（资源））文件夹中找到。不过，你无需将这些文件添加到你的项目中。相反，请打开名为\
  \ `Prose - Remedios Varo` 的文件，复制其中的文本，切换回 Xcode，并将其粘贴到属性检查器的文本属性中，如图 2-26 所示。\n\n\
  ![A978-1-4302-5063-0_2_Fig26_HTML.jpg](img/A978-1-4302-5063-0_2_Fig26_HTML.jpg)\n\
  \n图 2-26. 将文本粘贴到文本字段对象中\n\n### 创建 Segue\n\n你的屏幕设置完成后，就可以定义主屏幕与此屏幕之间的 segue 了。你希望当用户点击\
  \ Remedios Varo 按钮时，此屏幕出现。要创建这个 segue，请按住 Control 键，点击 Remedios Varo 按钮，将连接线拖到这个新的视图控制器上，然后释放鼠标，如图\
  \ 2-27 所示。\n\n![A978-1-4302-5063-0_2_Fig27_HTML.jpg](img/A978-1-4302-5063-0_2_Fig27_HTML.jpg)\n\
  \n图 2-27. 创建 Segue\n\n释放鼠标按钮时，会弹出一个菜单，显示可能的 segue 类型。选择 `push`（见图 2-27）。当用户点击 Remedios\
  \ Varo 按钮时，你的应用将执行一个“推送”过渡（将新屏幕滑入视图），并呈现新的视图。\n\n\n\n### 设置导航标题\n\n初始视图控制器本身是由你一开始创建的导航控制器对象所管理的。导航控制器的工作是在导航栏下方呈现一系列视图。你已见过无数次的导航栏会显示当前屏幕的标题，并且可以选择性地提供一个返回按钮，让你能回到之前的屏幕。导航控制器负责处理所有这些细节。\n\
  \n当你向第二个屏幕添加一个推送（push）跳转时，第二个屏幕也归入了导航控制器的管理之下。顺便提一下，推送跳转——它只能与导航控制器配合使用——会将一个视图替换为另一个视图，并使原始视图成为新视图中返回按钮的目标。\n\
  \n为了让用户觉得有意义，你需要为每个屏幕设置标题。这会使导航栏清晰易懂。\n\n在初始视图控制器中选中导航栏，并调出属性检查器。将导航栏的标题更改为 `Woman\
  \ Surrealists`，并将返回按钮属性设置为 `Surrealists`。大多数在画布上带有标题的 Interface Builder 对象都可以通过双击标题直接进行编辑，如图\
  \ 2-28 所示。或者，你也可以选中该对象，并在属性检查器中编辑其标题属性。设置可选的返回按钮属性，将为返回到此屏幕的屏幕上的返回按钮指定一个更简洁的标题。\n\
  \n![A978-1-4302-5063-0_2_Fig28_HTML.jpg](img/A978-1-4302-5063-0_2_Fig28_HTML.jpg)\n\
  \n图 2-28. 编辑导航栏标题\n\n最后，在你创建的第二个屏幕中选中导航栏，并将其标题更改为 `Remedios Varo`。你可能需要调整文本字段的大小或位置，以免被导航栏遮挡。\n\
  \n## 测试你的界面\n\n现在，你的应用已经构建了足够多的部分，可以一睹其运行风采了！确保运行目标设置为其中一个 iPhone 模拟器，如图 2-29 所示。\n\
  \n![A978-1-4302-5063-0_2_Fig29_HTML.jpg](img/A978-1-4302-5063-0_2_Fig29_HTML.jpg)\n\
  \n图 2-29. 选择运行目标\n\n点击 `Run` 按钮。Xcode 将会构建你的应用，并在模拟器中启动它。如果由于某些意外原因，构建应用时出现问题，可以在问题导航器（`View`\
  \ ➤ `Navigator` ➤ `Show Issue Navigator`）中找到描述这些问题的消息。\n\n你的应用将出现在 iPhone 模拟器中，应该看起来像图\
  \ 2-30 左侧所示。\n\n![A978-1-4302-5063-0_2_Fig30_HTML.jpg](img/A978-1-4302-5063-0_2_Fig30_HTML.jpg)\n\
  \n图 2-30. 你的应用的首次测试\n\n点击左上角的按钮，第二个屏幕便会平滑地滑入视野。（如果按钮位置不理想，不用担心——你很快就会修复它。）通过鼠标拖动来滚动文本（请记住，鼠标相当于你模拟的手指）。点击返回按钮返回初始屏幕。你的应用具备了\
  \ iOS 应用的所有标准行为：触摸界面、标题栏、动画、导航，一切都如预期般完美运行。\n\n## 完善你的应用\n\n返回 Xcode 工作区窗口，并点击工具栏中的停止按钮来停止你的应用。通过重复（大部分）“添加新屏幕”部分中的步骤来完成你的应用。首先，添加另外三个视图控制器，如图\
  \ 2-31 所示。\n\n![A978-1-4302-5063-0_2_Fig31_HTML.jpg](img/A978-1-4302-5063-0_2_Fig31_HTML.jpg)\n\
  \n图 2-31. 添加剩余的视图控制器\n\n在每个新的视图控制器中，添加一个图像视图对象，并将其图像资源名称设置为以下之一（按顺时针方向）：`KaySage2`、`LeonoraCarrington2`\
  \ 和 `FridaKahlo2`。\n\n你可以重复所有步骤来为三个新图像分别添加和自定义新的文本视图，或者你也可以复制已完成的工作来节省大量精力。按住 Option\
  \ 键，将 `UITextView` 对象从 Remedios Varo 场景拖放到 Kay Sage 场景中，如图 2-32 所示。此操作可以复制一个对象。\n\
  \n![A978-1-4302-5063-0_2_Fig32_HTML.jpg](img/A978-1-4302-5063-0_2_Fig32_HTML.jpg)\n\
  \n图 2-32. 复制文本视图对象\n\n在 Interface Builder 中复制对象会创建一个具有原始对象所有属性的新对象。剩下唯一要做的就是将其定位到视图中并更改其文本。你可以在\
  \ `Surrealists (Resources)` 文件夹中找到其他三个屏幕的文本。当你处理 Frida Kahlo 的文本视图时，将文本颜色更改为 `black`，以便于阅读。\n\
  \n最后一步，是为每个按钮创建一个指向相应视图的推送跳转，并设置其导航栏的标题。完成后，你将得到一个看起来像图 2-33 那样的故事板。\n\n![A978-1-4302-5063-0_2_Fig33_HTML.jpg](img/A978-1-4302-5063-0_2_Fig33_HTML.jpg)\n\
  \n图 2-33. 完成的超现实主义应用故事板\n\n## 调试你的应用\n\n运行你的新应用。点击一个按钮来查看该艺术家的详细信息。浏览文本并使用导航栏返回初始屏幕。返回\
  \ Xcode。停止应用并将模拟器更改为 iPhone Retina（3.5 英寸），然后再次运行。是否感觉有些不对劲？\n\n初始屏幕上的按钮存在奇怪的间隙，并且在\
  \ 3.5 英寸的 iPhone 上会被截断。在其他场景中，图像和文本视图也会被裁剪，如图 2-34 所示。这是一个问题。程序员称之为 bug（缺陷）。\n\n\
  ![A978-1-4302-5063-0_2_Fig34_HTML.jpg](img/A978-1-4302-5063-0_2_Fig34_HTML.jpg)\n\
  \n图 2-34. 超现实主义应用的初次测试\n\n“Bug”通常用来描述计算机代码中的缺陷，但你的应用行为或操作中的任何缺陷都是 bug，你需要修复它。追踪和修复\
  \ bug 的过程称为调试。\n\n> **注意**  \n> “Bug”这个术语源于一只飞蛾在一台最早的数字计算机中死亡，导致其发生故障。我不是在开玩笑。格蕾丝·赫柏的维基百科页面上有一张那只飞蛾的照片（[`http://en.wikipedia.org/wiki/Grace_hopper`](http://en.wikipedia.org/wiki/Grace_hopper)）。\n\
  \n在这种情况下，问题涉及按钮如何针对不同设备进行大小调整或重新定位。不同型号的 iPhone 有不同的屏幕尺寸和分辨率。iOS 会调整屏幕视图的大小以适应其正在运行的型号，这可能会改变你在\
  \ Interface Builder 中看到的布局。\n\n\n\n### 添加约束\n\n当视图大小发生变化时，一个名为 `auto-layout` 的功能会重新定位其子视图。这些子视图根据一组约束进行重新定位。约束仅仅是关于某个对象的规则。以下是一些约束示例：\n\
  \n- 对象的高度必须至少为 40 像素\n- 对象的底部边缘应距离其父视图底部边缘 20 像素\n- 对象应水平居中\n\n单个视图通常会有多个这样的约束。`iOS`\
  \ 会评估所有约束，以确定应如何调整每个视图，从而满足所有约束。\n\n您可以在 Interface Builder 中定义单个约束，或要求 `Xcode` 为您生成部分或全部约束。`Xcode`\
  \ 根据您定位视图的方式以及视图与附近视图的关系来创建约束。通常，`Xcode` 的猜测正是您想要的。如果不是，您可以自行定义。\n\n您的 `Surrealist`\
  \ 应用需要约束，以便四位艺术家场景中的文本和图像能在不同设备上正确调整大小；并且您希望初始场景中的四个按钮能均匀地填满屏幕。先处理前者，因为这些是最简单的。\n\
  \n返回到 `Xcode` 和 `Main.storyboard` 文件。通过点击场景下方视图控制器对象停靠区来选择 `Kay Sage` 场景，如图 2-35\
  \ 所示。在编辑器窗格的右下角，点击 `Resolve Auto Layout Issues` 按钮（中间带点的那个），并选择 `Reset to Suggested\
  \ Constraints in View Controller` 项，如图 2-35 所示。\n\n![A978-1-4302-5063-0_2_Fig35_HTML.jpg](img/A978-1-4302-5063-0_2_Fig35_HTML.jpg)\n\
  \n图 2-35. 使用建议的约束\n\n`Xcode` 会分析场景中视图的布局，并向每个视图添加其推荐的约束。选择文本视图，Interface Builder\
  \ 会显示现在附加到该视图的约束，如图 2-36 所示。`Xcode` 添加了垂直和水平约束，使文本视图与父视图的顶部、左侧和底部边缘保持一个合适的距离，以及一个决定其宽度的宽度约束。点击某个约束，即可在属性检查器中查看或编辑其属性，如图\
  \ 2-36 右侧所示。\n\n![A978-1-4302-5063-0_2_Fig36_HTML.jpg](img/A978-1-4302-5063-0_2_Fig36_HTML.jpg)\n\
  \n图 2-36. Xcode 的推荐约束\n\n这组约束被称为“完整的”。总的来说，这四条规则明确地决定了文本视图的高度、宽度和位置。如果省略了其中一些约束，`iOS`\
  \ 将使用视图的原始高度、宽度和/或位置。正如您所见，这可能导致视图重叠或超出其父视图边缘。\n\n对其他三个场景重复此过程：选择场景的视图控制器，然后从 `Resolve\
  \ Auto Layout Issues` 按钮中选择 `Reset to Suggested Constraints in View Controller`\
  \ 项。\n\n然而，初始场景中四个按钮的位置和大小并不符合 `iOS` 中按钮对象的典型尺寸或放置方式。因此，`Xcode` 的建议约束作用不大。您需要自行设计这些约束。思考您希望这些按钮具有怎样的尺寸和位置，然后制定出能够向\
