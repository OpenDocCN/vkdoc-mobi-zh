- "# 17. 你在哪？\n\n## 摘要\n\n如果你觉得加速度计、陀螺仪和磁力计很酷，那么你会喜欢这一章的。除了这些仪器，许多 iOS 设备还包含无线电接收器，使其能够通过计时从卫星网络接收到的无线电信号来三角定位自己的位置——这些卫星网络要么是全球定位系统（GPS），要么是俄罗斯的全球导航卫星系统（GLONASS）。这项技术统称为\
  \ GPS。\n\n这对你意味着什么？作为用户，这意味着你的 iOS 设备知道它在地球上的位置。作为开发者，这意味着你的应用可以获取设备位置信息，并利用它向用户展示他们所在的位置、周围有什么、他们从哪里来，或者如何到达他们想去的地方。在本章中，你将：\n\
  \n- 收集位置信息\n- 显示显示用户当前位置的地图\n- 向地图添加自定义标注\n- 监控用户的移动并提供方向指引\n- 创建用于更改地图选项的界面\n\n\
  本章将使用两种 iOS 技术：Core Location 和 Map Kit。Core Location 提供了与 GPS 卫星接收器的接口，并向你的应用提供关于设备位置的各种形式的数据。Map\
  \ Kit 提供了显示、标注和动画化地图的视图对象和工具。这两者可以分开使用，也可以结合使用。\n\n\n\n## 创建 Pigeon 应用\n\n本章的应用名为\
  \ Pigeon。它是一个实用工具，让你能在地图上记住当前位置。之后它会显示你当前所在位置以及标记位置，这样你就能轻松导航回去。Pigeon 的设计如图 17-1\
  \ 所示。\n\n![A978-1-4302-5063-0_17_Fig1_HTML.jpg](img/A978-1-4302-5063-0_17_Fig1_HTML.jpg)\n\
  \n图 17-1. Pigeon 设计图\n\n该应用包含一个地图和三个按钮。中间的按钮用于记住当前位置，并在地图上放置一个图钉进行标记。当你离开该位置时，地图会同时显示你的当前位置、已保存的位置以及一个指向返回方向的箭头。垃圾桶按钮用于清除已保存的位置，信息按钮则允许用户更改地图显示选项。现在让我们开始吧。\n\
  \n首先创建项目并布局界面。在 Xcode 中，按如下方式创建一个新项目：\n\n使用 `Single View Application` 模板。将项目命名为\
  \ `Pigeon`。使用类前缀 `HP`。将设备设置为 `Universal`。\n\n选择 `Main_iPhone.storyboard` 文件（你可以选择开发\
  \ iPhone 界面、iPad 界面或两者都开发，操作步骤相同）。在界面底部添加一个工具栏。按如下方式添加并配置工具栏按钮项（从左到右）：\n\n`Bar Button\
  \ Item`：将其标识符设置为 `Trash`\n`Flexible Space Bar Button Item`\n`Bar Button Item`：将其标题设置为\
  \ `Remember Location`\n`Flexible Space Bar Button Item`\n`Button`（非 `Bar Button\
  \ Item`）：将其类型设置为 `Info Light`\n\n从对象库中，添加一个 `Map View` 对象来填充界面的其余部分。为地图视图对象设置以下属性：\n\
  \n*   勾选 `Shows User Location`\n*   勾选 `Allows Zooming`\n*   取消勾选 `Allows Scrolling`\n\
  *   取消勾选 `3D Perspective`\n\n通过选择 `Add Missing Constraints to View Controller` 命令完成布局，该命令位于\
  \ `Editor ➤ Resolve Auto Layout Issues` 子菜单或编辑器窗格底部的 `Resolve Auto Layout Issues`\
  \ 按钮中。完成后的界面应如图 17-2 所示。\n\n![A978-1-4302-5063-0_17_Fig2_HTML.jpg](img/A978-1-4302-5063-0_17_Fig2_HTML.jpg)\n\
  \n图 17-2. Pigeon 界面\n\n接下来你需要将这些视图连接到控制器。切换到辅助编辑器，并确保右窗格中显示的是 `HPViewController.h`。紧跟在\
  \ `#import <UIKit/UIKit.h>` 语句之后，添加一条 `#import` 语句以引入 Map Kit 声明：\n\n```\n#import\
  \ <MapKit/MapKit.h>\n```\n\n在 `@interface` 部分添加以下连接：\n\n```\n@property (weak,nonatomic)\
  \ IBOutlet MKMapView *mapView;\n\n- (IBAction)dropPin:(id)sender;\n\n- (IBAction)clearPin:(id)sender;\n\
  ```\n\n将 `mapView` 输出口连接到地图视图对象。将左侧和中间工具栏按钮的操作分别连接到 `-clearPin:` 和 `-dropPin:` 动作。现在你可以开始编写这些动作的代码了。\n\
  \n## 收集位置数据\n\n获取位置数据的流程与第 16 章中获取陀螺仪和磁力计数据的模式相同，只需稍作修改。基本步骤如下：\n\n*   创建 `CLLocationManager`\
  \ 的实例。\n*   如果你的应用需要精准（GPS）位置信息，请将 `gps` 值添加到应用的 `Required Device Capabilities`\
  \ 属性中。\n*   使用 `+locationServicesAvailable` 或 `+authorizationStatus` 方法检查定位服务是否可用。\n\
  *   指定一个对象作为 `CLLocationManager` 的委托。采用 `CLLocationManagerDelegate` 协议，并将该对象设为委托。\n\
  *   发送 `-startUpdatingLocation` 开始收集位置数据。\n*   当设备位置发生变化时，委托对象将收到消息。\n*   当你的应用不再需要位置数据时，发送\
  \ `-stopUpdatingLocation`。\n\n使用 `CLLocationManager` 和 `CMMotionManager` 之间唯一显著的区别在于：你可以创建多个\
  \ `CLLocationManager` 对象，并且数据会被传递到其委托对象（而不是要求应用主动拉取数据或将其推送到操作队列）。\n\n另一个区别是，即使设备具备\
  \ GPS 硬件，位置数据也可能不可用。这可能由多种原因导致。用户可能已关闭定位服务。他们可能处于无法接收卫星信号的区域。设备可能处于“飞行模式”，该模式不允许\
  \ GPS 接收器通电。或者你的应用被明确拒绝访问位置信息。具体原因并不重要。你需要检查位置数据的可用性，并处理无法获取数据的情况。\n\n最后，根据数据的精度和交付速度，有多种获取位置数据的方法。知道用户向左移动了\
  \ 20 英尺与知道他们何时到达工作地点是不同的问题。我将在本章末尾介绍不同类型的位置监控方式。\n\nPigeon 需要只有 GPS 硬件才能提供的精确定位信息。在项目导航器中选择\
  \ Pigeon 项目，选中 `Pigeon` 目标（左上角弹出菜单，如图 17-3 所示），切换到 `Info` 标签页，在 `Custom iOS Target\
  \ Properties` 组中找到 `Required device capabilities`。点击 + 按钮并添加 `gps` 需求，如图 17-3 所示。\n\
  \n![A978-1-4302-5063-0_17_Fig3_HTML.jpg](img/A978-1-4302-5063-0_17_Fig3_HTML.jpg)\n\
  \n图 17-3. 添加 GPS 设备需求\n\n现在你可能以为我会让你添加一些代码来：\n\n*   让 `HPViewController` 采用 `CLLocationManagerDelegate`\
  \ 协议\n*   实现 `-locationManager:didUpdateLocations:` 委托方法来处理位置更新\n*   创建 `CLLocationManager`\
  \ 的实例\n*   将 `HPViewController` 设为位置管理器的委托\n*   发送 `-startUpdatingLocation` 开始收集位置数据\n\
  \n但你实际上不需要做这些工作。\n\n现在你一定好奇为什么，让我解释一下。Pigeon 同时使用了定位服务和 Map Kit。Map Kit 包含了 `MKMapView`\
  \ 对象，用于显示地图。在其众多功能中，它能够监控设备的当前位置并在地图上显示。当用户位置发生变化时，它甚至会通知其委托。\n\n对于这个特定的应用，`MKMapView`\
  \ 已经为你完成了所有工作。当你要求它显示用户位置时，它会创建自己的 `CLLocationManager` 实例，并开始监控位置变化，同时更新地图及其委托。最终结果是\
  \ `MKMapView` 拥有了 Pigeon 工作所需的所有信息。\n\n**注意：** Pigeon 稍微有些特殊；你将配置地图视图，使其始终追踪用户位置，并且地图视图始终处于活动状态。如果不是这样，那么依赖地图视图来定位用户就不是一个解决方案，你就必须采用通常的方式使用\
  \ `CLLocationManager`。\n\n这是个好消息。所有那些 `CLLocationManager` 代码看起来会和你第 16 章编写的代码非常相似，这会让这个应用显得有些无聊，我当然不想让你感到无聊。或者你还没有阅读第\
  \ 16 章，那么你还有值得期待的内容。\n\n无论如何，你只需要正确设置 `MKMapView` 即可。现在让我们来做这件事。\n\n\n\n## 使用地图视图\n\
  \n你的地图视图对象已经添加到界面中，并连接到了 `mapView` 输出口。你还使用了属性检查器来配置地图视图，使其显示（并跟踪）用户的位置，并且禁止了用户滚动。还有一个设置需要你完成，而它无法通过属性检查器进行设置。\n\
  \n选择 `HPViewController.m` 文件，找到 `-viewDidLoad` 方法。在方法末尾添加以下语句：\n\n```\n[_mapView\
  \ setUserTrackingMode:MKUserTrackingModeFollow];\n```\n\n这会将地图的跟踪模式设置为“跟随用户”。共有三种跟踪模式——相信你在苹果地图等应用中已经见过——如表\
  \ 17-1 所示。\n\n**表 17-1.** 用户跟踪模式\n\n| 跟踪模式 | 描述 |\n| --- | --- |\n| `MKUserTrackingModeNone`\
  \ | 地图不跟随用户的位置。 |\n| `MKUserTrackingModeFollow` | 地图以用户当前所在位置为中心，并在用户移动时随之移动。 |\n\
  | `MKUserTrackingModeFollowWithHeading` | 地图跟踪用户的当前位置，并且地图的方向会旋转以指示用户的行驶方向。 |\n\n\
  你添加到 `-viewDidLoad:` 中的代码将跟踪模式设置为跟随用户。`showsUserLocation` 属性与跟踪模式的结合，强制地图视图开始收集位置数据，这正是你所需要的。\n\
  \n如果你用过地图应用，就会知道通过手动平移地图可以“打破”跟踪模式。你已禁用了地图视图的平移功能，但在某些情况下，跟踪模式仍会恢复为 `MKUserTrackingModeNone`。为解决这个问题，你需要添加代码来捕获跟踪模式发生变化的情况，并在必要时进行“纠正”。\n\
  \n这些信息会提供给地图视图的委托。如果你的 `MPViewController` 对象是地图视图的委托，那岂不是很好？我也这么觉得。\n\n切换到 `HPViewController.h`，并遵循\
  \ `MKMapViewDelegate` 协议（新代码以粗体显示）：\n\n```\n@interface HPViewController : UIViewController\
  \ <MKMapViewDelegate>\n```\n\n返回到 `HPViewController.m`，并在 `@implementation` 中添加以下地图视图委托方法：\n\
  \n```\n- (void)            mapView:(MKMapView *)mapView\ndidChangeUserTrackingMode:(MKUserTrackingMode)mode\n\
  animated:(BOOL)animated\n{\n    if (mode==MKUserTrackingModeNone)\n        [mapView\
  \ setUserTrackingMode:MKUserTrackingModeFollow];\n}\n```\n\n每当地图的跟踪模式发生变化时，都会收到这条消息。它只是检查模式是否已变为“无”，并将其重新设置为跟踪用户。\n\
  \n当然，只有当你的 `HPViewController` 对象是地图视图的委托对象时，才会收到这条消息。选择 `Main_iPhone.storyboard`（或\
  \ `_iPad`）文件。选择地图视图对象，并使用连接检查器将地图视图的 `delegate` 输出口连接到视图控制器，如图 17-4 所示。\n\n![A978-1-4302-5063-0_17_Fig4_HTML.jpg](img/A978-1-4302-5063-0_17_Fig4_HTML.jpg)\n\
  \n**图 17-4.** 连接地图视图的委托输出口\n\n你已经完成了所有必要步骤，可以查看地图视图的实际效果了，所以启动它吧。在模拟器或已配置的设备上运行你的应用。你可能会看到构建警告，提示你尚未实现\
  \ `-dropPin:` 和 `-clearPin:` 方法；暂时忽略它们。\n\n遇到问题了吗？也许你的应用还没有准备好运行。如果你的应用崩溃，出现空白屏幕并在控制台窗格中显示一条错误信息，那是因为你的应用没有链接到\
  \ MapKit 框架。大多数情况下，Xcode 会自动将你的应用链接到所需的框架，但在某些情况下，你需要显式地进行链接。别担心，这很容易修复。\n\n选择 `Pigeon`\
  \ 项目，确保选中了 `Pigeon` 目标，然后切换到 `General` 选项卡。找到 `Linked Frameworks and Libraries`\
  \ 部分，如图 17-5 左侧所示。点击 + 按钮，选择一个新的库或框架进行链接，如图 17-5 右侧所示。\n\n![A978-1-4302-5063-0_17_Fig5_HTML.jpg](img/A978-1-4302-5063-0_17_Fig5_HTML.jpg)\n\
  \n**图 17-5.** 向项目添加框架\n\n**提示：** 使用“添加库”对话框中的搜索字段可以快速找到你需要的库或框架。\n\n你实际上并没有向项目中添加任何内容。你的应用使用的每个\
  \ iOS 符号在运行时最终都必须转换为该变量或类的内存地址。这个过程称为动态链接，是启动应用机制的一部分。在开发过程中你“链接到”的库和框架，不过是一系列 iOS\
  \ 提供的符号名称列表，以及你的应用在运行时如何连接到这些符号的说明。添加 MapKit 框架可使你的应用访问 Map Kit 服务中的所有类、变量和常量。\n\
  \n解决了这个恼人的细节之后，再次运行你的应用。这一次，你应该会看到如图 17-6 所示的内容。\n\n![A978-1-4302-5063-0_17_Fig6_HTML.jpg](img/A978-1-4302-5063-0_17_Fig6_HTML.jpg)\n\
  \n**图 17-6.** 测试地图视图\n\n当你的应用首次运行时，iOS 会询问用户是否允许你的应用收集位置数据。点击 `OK`，否则这次测试将非常短暂。一旦获得许可，地图会定位你的设备，并以你的位置为中心显示地图（如图\
  \ 17-6 中的第二个截图所示）。\n\niOS 模拟器会模拟位置数据，允许你测试基于位置的应用。在 Debug 菜单的 Location 子菜单中，你会找到多个选项（如图\
  \ 17-6 中的第三个截图所示）。选择 `Custom Location...` 项，输入模拟位置的经度和纬度。还有一些预先编程的位置，例如 Apple 项，也在图\
  \ 17-6 中显示。\n\n其中一些选项会回放一段录制的行程。目前的选项包括 `City Bicycle Ride`（城市骑行）、`City Run`（城市跑步）和\
  \ `Freeway Drive`（高速公路驾驶）。选择其中一个，便会启动一系列位置变化，地图会跟踪这些变化，就好像设备在自行车上、伴随慢跑者或在汽车中一样。试试看；你肯定想试一下。\n\
  \n地图还可以通过捏合或双击来进行缩放，如图 17-6 右侧所示。你不能滚动地图，因为你在 Interface Builder 中禁用了该选项。\n\n在回放“高速公路驾驶”时，添加代码以在地图上标记你的位置。\n\
  \n\n\n"
- "# 装饰你的地图\n\n有三种方式可以为地图添加视觉元素：标注、覆盖层和子视图。\n\n**标注**标识地图上的单个点。它可以按你喜欢的任何方式显示，但 iOS\
  \ 提供了使用可识别的\"图钉\"图像来标记位置的类。标注可以选择显示一个包含标题、副标题和辅助视图的标注框。选中（点击）时，标注框会出现在图钉上方。\n\n\
  **覆盖层**标识地图上的路径或区域。你将在 Pigeon 应用中不会使用覆盖层，但它是用于绘制线条（如行车路线）和突出显示任意区域（如城市公园）的方法。\n\n\
  **子视图**与其他子视图类似。`MKMapView`是`UIView`的子类，你可以自由地向其中添加自定义的`UIView`对象。使用子视图可以为地图添加额外的控件或指示器。\n\
  \n标注和覆盖层是附着在地图上的。它们使用地图坐标（稍后会讲到）来描述，并且会随地图移动而移动。子视图则位于`MKMapView`对象的本地图形坐标系中，不会随地图移动。\n\
  \n你的 Pigeon 应用将在用户点击\"记住位置\"按钮时，在其当前位置创建一个标注——即\"放置一个图钉\"。垃圾按钮则会丢弃该图钉。对我来说，这听起来像是两个操作方法。\n\
  \n## 添加标注\n\n当用户点击\"记住位置\"按钮时，你将捕获他们的当前位置，并向地图添加一个标注。我认为如果用户能为该位置选择一个标签会更好，这样更容易记住他们想要记住的内容。为实现这一切，你需要一个实例变量来存储标注对象，并且你的`HPViewController`需要成为警告视图的代理。将这两项添加到`HPViewController.m`中的私有`@interface`段（新代码以粗体显示）：\n\
  \n```objectivec\n@interface HPViewController () <UIAlertViewDelegate>\n{\n    MKPointAnnotation\
  \   *savedAnnotation;\n}\n@end\n```\n\n下一步是编写`-dropPin:`方法。它首先显示一个警告视图，以便用户可以输入标签。将此方法添加到`@implementation`段：\n\
  \n```objectivec\n- (IBAction)dropPin:(id)sender\n{\n    UIAlertView *alert = [[UIAlertView\
  \ alloc]\n        initWithTitle:@\"这里有什么？\"\n        message:@\"为此位置输入一个标签。\"\n\
  \        delegate:self\n        cancelButtonTitle:@\"取消\"\n        otherButtonTitles:@\"\
  记住\", nil];\n    alert.alertViewStyle = UIAlertViewStylePlainTextInput;\n    alert.delegate\
  \ = self;\n    [alert show];\n}\n```\n\n此方法创建一个警告框，并将其样式设置为`UIAlertViewStylePlainTextInput`。这会显示一个带有常规文本字段的警告视图，用户可以在其中输入内容。`-dropPin:`操作的功能部分在用户输入标签并点击\"\
  记住\"按钮后执行。在`-dropPin:`方法之后添加以下代码：\n\n```objectivec\n- (void)    alertView:(UIAlertView\
  \ *)alertView\nclickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    CLLocation *location\
  \ = _mapView.userLocation.location;\n    if (location==nil)\n        return;\n\n\
  \    NSString *name = [[alertView textFieldAtIndex:0] text];\n    name = [name stringByTrimmingCharactersInSet:\n\
  \        [NSCharacterSet whitespaceAndNewlineCharacterSet]];\n\n    if (name.length==0)\n\
  \        name = @\"在这里!\";\n\n    [self clearPin:self];\n    savedAnnotation = [MKPointAnnotation\
  \ new];\n    savedAnnotation.title = name;\n    savedAnnotation.coordinate = location.coordinate;\n\
  \    [_mapView addAnnotation:savedAnnotation];\n    [_mapView selectAnnotation:savedAnnotation\
  \ animated:YES];\n}\n```\n\n第一步是获取用户的当前位置。请记住，自从应用启动以来，地图视图一直在跟踪用户的位置，因此它现在应该对用户的位置有相当准确的了解。但是，你必须考虑到地图视图可能不知道位置的情况（`location==nil`）。用户可能禁用了定位服务、在\"\
  飞行模式\"下运行，或者正在洞穴探险。无论如何，如果没有位置信息，就没有任何操作可做。\n\n接下来的代码清理用户输入的内容。它会去除所有前导或尾随的空白字符（也就是空格），并在用户未输入内容时提供一个可读的标签。\n\
  \n现在该方法开始执行核心功能。它清除任何现有的图钉；Pigeon 一次只记住一个位置。它创建一个新的标注对象，设置其`title`和`coordinates`，将标注添加到地图，然后选中该标注。由于你尚未进行任何特殊设置，地图视图将使用标准的红色图钉标注视图来指示地图上的位置。通过编程方式选中新的标注会使其标注框弹出，就像用户点击了图钉一样。\n\
  \n当你仍在`HPViewController.m`中时，添加`-clearPin:`方法，该方法无需太多解释：\n\n```objectivec\n- (IBAction)clearPin:(id)sender\n\
  {\n    if (savedAnnotation!=nil)\n    {\n        [_mapView removeAnnotation:savedAnnotation];\n\
  \        savedAnnotation = nil;\n    }\n}\n```\n\n运行应用并尝试一下。点击\"记住位置\"按钮，输入一个标签，一个图钉就会出现在你的当前位置，如图\
  \ 17-7 所示。\n\n![A978-1-4302-5063-0_17_Fig7_HTML.jpg](img/A978-1-4302-5063-0_17_Fig7_HTML.jpg)\n\
  \n**图 17-7.** 测试标注\n\n## 地图坐标\n\n标注对象的坐标被设置为用户位置的坐标（由地图视图提供）。但这些\"坐标\"是什么呢？Map Kit\
  \ 使用三种坐标系，如表格 17-2 所示。\n\n**表 17-2.** 地图坐标系\n\n| 坐标系 | 描述 |\n| --- | --- |\n| 纬度和经度\
  \ | 地球上某个位置的纬度、经度，有时还包括海拔。这些被称为地图坐标。 |\n| 墨卡托 | 地球墨卡托地图上的位置（x,y）。墨卡托地图是将地球表面投影到平面地图上的圆柱投影。你在地图视图中看到的就是墨卡托地图。墨卡托地图上的位置称为地图点。\
  \ |\n| 图形 | 界面中的图形坐标，由`UIView`使用。这些简称为点。 |\n\n地图坐标（经度和纬度）是用于标识地图上位置的主要值，存储在`CLLocationCoordinate2D`结构中。它们不是\
  \ XY 坐标，因此计算两个坐标之间的距离和方位是一项不易完成的工作，最好交给定位服务和 Map Kit 来处理。标注位于地图坐标上。\n\n地图点是墨卡托地图投影中的\
  \ XY 位置。由于是平面上的 XY 坐标，计算角度和距离要简单得多。地图点用于绘制覆盖层。这简化了绘图并减少了涉及的数学计算。\n\n> **注：** 墨卡托投影对于导航特别方便，因为墨卡托地图上任意两点之间的直线描述了用户可以从一点到达另一点的方位。其缺点是东西方向的距离和南北方向的距离比例不一致——赤道除外。\n\
  \n地图点最终会被转换为图形坐标，以便显示在屏幕上的某个位置。有一些方法可以将地图坐标转换为图形坐标，还有另外的方法进行反向转换。在本项目的后续部分，你将使用这些方法以及一些用于计算坐标之间距离的实用方法。\n\
  \n\n\n### 添加一点弹跳效果\n\n你的地图标记会显示在地图上，并随着地图移动。你可以轻点它以显示或隐藏其标注框。考虑到只需几行代码就能创建它，这已经相当令人印象深刻了。不过，我们确实热爱动画，而且我敢肯定你见过那种“掉落”到指定位置的地图标记。而你的标记只是直接出现，并不会掉落。那么，如何让地图标记呈现动画效果、改变颜色或以其他方式进行自定义呢？答案是使用自定义标注视图。\n\
  \n地图中的标注实际上由一对对象组成：标注对象和标注视图对象。标注对象将信息与地图上的坐标关联起来——这是数据模型。标注视图对象则负责标注的外观——这是视图。如果你想要自定义标注的显示方式，就必须提供自己的标注视图对象。\n\
  \n你可以通过实现 `-mapView:viewForAnnotation:` 委托方法来做到这一点。当地图视图想要显示一个标注时，它会向委托发送此消息，并附带标注对象。该方法的工作是返回一个代表该标注的标注视图对象。如果你没有实现这个方法，或者决定对某个标注返回\
  \ `nil`，地图视图就会使用默认的标注视图，也就是一个普通的地图标记。\n\n将此方法添加到 `HPViewController.m` 中：\n\n```\n\
  - (MKAnnotationView *)mapView:(MKMapView *)mapView\nviewForAnnotation:(id<MKAnnotation>)annotation\n\
  {\n    if (annotation == self.mapView.userLocation)\n        return nil;\n\n   \
  \ NSString *pinID = @\"Save\";\n    MKPinAnnotationView *view = (MKPinAnnotationView*)\n\
  \        [self.mapView dequeueReusableAnnotationViewWithIdentifier:pinID];\n\n \
  \   if (view == nil)\n    {\n        view = [[MKPinAnnotationView alloc] initWithAnnotation:annotation\n\
  \                                               reuseIdentifier:pinID];\n      \
  \  view.canShowCallout = YES;\n        view.animatesDrop = YES;\n    }\n\n    return\
  \ view;\n}\n```\n\n第一条语句将标注与地图视图的用户标注对象进行比较。用户标注对象与任何其他标注对象一样，代表用户在地图上的位置。当你要求地图视图显示用户位置时，它会自动添加这个标注。这个自动标注可以通过地图视图的\
  \ `userLocation` 属性获取。如果你对此标注返回 `nil`，地图视图将使用其默认的用户标注视图——我们都熟悉的那个脉冲蓝色圆点。如果你想用其他方式表示用户位置，就需要在此处提供那个视图。\n\
  \n其余代码的工作方式与第 4 章中的表格视图单元格代码完全相同。地图视图维护着一个可重用的 `MKAnnotationView` 对象缓存，你可以通过标识符来回收利用它们。你的地图只使用一种标注视图：由\
  \ `MKPinAnnotationView` 类提供的标准地图标记视图。该标记被配置为可以显示标注框，并且在添加到地图时播放动画（“掉落”）。\n\n**提示**\n\
  \n如果你想赋予用户移动刚放置的标记的能力，只需将标注视图对象的 `draggable` 属性设置为 `YES` 即可。\n\n再次运行应用。现在当你保存位置时，标记会以动画方式插入到地图中，这看起来要有趣得多。\n\
  \n你的 `-mapView:viewForAnnotation:` 委托方法可以返回内置标注视图类的自定义版本，就像你在这里所做的那样。`MKPinAnnotationView`\
  \ 可以显示不同颜色的标记，可以允许或禁止显示标注框，可以在其标注框中添加自定义辅助视图，等等。或者，你也可以继承 `MKAnnotationView` 并创建自己的标注视图，随意添加你想要的任何自定义图形和动画。你甚至可以用一只摇摇摆摆的鸭子来表示用户的位置。尽情发挥你的想象力吧。\n\
  \n**注意**\n\n叠加对象和叠加视图对象的工作方式与标注几乎完全相同。主要区别在于，叠加物占据的是地图上的一个区域，而不仅仅是一个点。\n\n\n\n##\
  \ 指引方向\n\n另一种增强地图视图的方法是添加你自己的子视图。这些子视图可以显示额外信息（行进方向、已耗时行程距离等），或者你可以添加控制对象（开关、音乐播放按钮等）。\n\
  \n`Pigeon` 将添加一个显示箭头的图像视图。箭头将从用户当前位置指向他们在地图上标记的位置。其工作方式如下：\n\n*   当地图视图委托收到用户位置变化的通知时。\n\
  *   该委托方法将计算用户位置和已保存位置在屏幕上的坐标，以及两者之间的实际距离。\n*   如果实际距离超过 50 米，则将图像视图（箭头）定位到用户屏幕坐标位置，并旋转使其指向已保存位置。\n\
  *   否则，隐藏箭头。\n\n为实现此功能，你需要一个箭头图像、一个图像视图实例变量、一个隐藏箭头的方法，以及一个显示箭头并将其指向正确方向的方法。首先，将\
  \ `arrow.png` 资源文件添加到你的 `Images.xcassets` 图像目录中，该文件位于 `Learn iOS Development Projects`\
  \ ➤ `Ch 17` ➤ `Pigeon (Resources)` 文件夹。在添加图像的同时，`Pigeon (Icons)` 文件夹中有一套应用图标，你可以将其拖入\
  \ `AppIcons` 组。\n\n在 `HPViewController.m` 文件中，找到私有的 `@interface` 部分。定义阈值距离常量，添加一个实例变量，并声明几个方法，如下所示（新增代码以粗体显示）：\n\
  \n```\n#define kArrowDisplayDistanceMin    50.0\n\n@interface HPViewController ()\
  \ <UIAlertViewDelegate>\n\n{\n    MKPointAnnotation   *savedAnnotation;\n    UIImageView\
  \         *arrowView;\n}\n\n- (void)hideReturnArrow;\n- (void)showReturnArrowAtPoint:(CGPoint)userPoint\
  \ towards:(CGPoint)returnPoint;\n\n@end\n```\n\n下一步是捕捉用户位置的变化。当用户移动时，用户与已保存位置之间的距离会改变，地图会随之移动，并改变两者之间的角度。你的\
  \ `HPViewController` 已经是地图视图的委托。你只需实现以下方法：\n\n```\n- (void)        mapView:(MKMapView\
  \ *)mapView\n    didUpdateUserLocation:(MKUserLocation *)userLocation\n{\n    if\
  \ (savedAnnotation!=nil)\n    {\n        CLLocationCoordinate2D coord = savedAnnotation.coordinate;\n\
  \        CLLocation *toLoc = [[CLLocation alloc] initWithLatitude:coord.latitude\n\
  \                                                       longitude:coord.longitude];\n\
  \        CLLocationDistance distance =\n            [userLocation.location distanceFromLocation:toLoc];\n\
  \        if (distance>=kArrowDisplayDistanceMin)\n        {\n            CGPoint\
  \ userPoint = [mapView convertCoordinate:userLocation.coordinate\n             \
  \                              toPointToView:self.mapView];\n            CGPoint\
  \ savePoint = [mapView convertCoordinate:coord\n                               \
  \            toPointToView:self.mapView];\n            [self showReturnArrowAtPoint:userPoint\
  \ towards:savePoint];\n            return;\n        }\n    }\n    [self hideReturnArrow];\n\
  }\n```\n\n只有当存在已保存位置，且该位置与用户之间的实际距离超过 50 米时，箭头才会显示。前两个条件用于检查这些前提。`-distanceFromLocation:`\
  \ 方法特别方便，因为它处理了计算两个地图坐标之间距离所涉及的数学运算。\n\n要定位箭头，你需要知道它在屏幕上的位置以及已保存位置的位置。`-convertCoordinate:toPointToView:`\
  \ 方法执行此转换。你向该方法传入地图坐标，它会返回该点在地图上的视图坐标。这些坐标随后被传入你的 `-showReturnArrowAtPoint:towards:`\
  \ 方法。在所有其他情况下，箭头视图都将被隐藏。\n\n最后一步是实现 `-hideReturnArrow` 和 `-showReturnArrowAtPoint:towards:`\
  \ 方法：\n\n```\n- (void)hideReturnArrow\n{\n    arrowView.hidden = YES;\n}\n\n- (void)showReturnArrowAtPoint:(CGPoint)userPoint\
  \ towards:(CGPoint)returnPoint\n{\n    if (arrowView==nil)\n    {\n        UIImage\
  \ *arrowImage = [UIImage imageNamed:@\"arrow\"];\n        arrowView = [[UIImageView\
  \ alloc] initWithImage:arrowImage];\n        arrowView.opaque = NO;\n        arrowView.alpha\
  \ = 0.6;\n        [self.mapView addSubview:arrowView];\n        arrowView.hidden\
  \ = YES;\n    }\n\n    CGFloat angle = atan2f(returnPoint.x-userPoint.x,userPoint.y-returnPoint.y);\n\
  \    CGAffineTransform rotation = CGAffineTransformMakeRotation(angle);\n    void\
  \ (^updateArrow)(void) = ^{\n        arrowView.center = userPoint;\n        arrowView.transform\
  \ = rotation;\n    };\n\n    if (arrowView.hidden)\n    {\n        updateArrow();\n\
  \        arrowView.hidden = NO;\n    }\n    else\n    {\n        [UIView animateWithDuration:0.5\
  \ animations:updateArrow];\n    }\n}\n```\n\n`-hideReturnArrow` 方法的作用应该显而易见。\n\n\
  `-showReturnArrowAtPoint:towards:` 方法首先惰性创建图像视图对象（如果是第一次显示的话）。接下来几条语句计算用户点与已保存点之间的角度，并创建一个旋转变换，使箭头从一点指向另一点。\n\
  \n其余代码变得稍显花哨——但这是好事。如果箭头之前是隐藏的，你希望它立即出现在正确的位置，不带动画。如果它当前正在显示，你希望它能平滑动画到新位置。这里的解决方案是将定位和旋转箭头视图的代码捕获到一个代码块变量\
  \ (`updateArrow`) 中。随后的 `if` 语句要么立即执行该代码块（无动画）并显示视图，要么将该代码块传递给 `UIView` 进行动画处理。你看，这并不太难。\n\
  \n运行应用并测试。点击“记住位置”按钮在地图上放置一个大头针，然后使用 iOS 模拟器的调试菜单移动模拟位置。如果你使用的是真实设备，只需向任意方向移动 50\
  \ 米，如图 17-8 所示。\n\n![A978-1-4302-5063-0_17_Fig8_HTML.jpg](img/A978-1-4302-5063-0_17_Fig8_HTML.jpg)\n\
  \n**图 17-8.** 测试方向箭头 注意\n\n这种技术之所以有效，很大程度上是因为用户位置不断被更新，从而逐步精细化箭头视图的位置和角度。这更像是一个向地图视图添加子视图以及将地图坐标转换为图形坐标的练习，而非提供地图内导航方向的推荐做法。如果我要“真正地”编写这个应用，我会使用覆盖层和自定义覆盖视图来绘制从用户位置返回已保存位置的路径。\n\
  \n你还在好奇工具栏中的信息按钮是做什么用的吗？我把它留作本章末尾的练习了。在你开始练习之前，让我们简要了解一下你尚未探索过的一些定位服务和地图功能。\n\n\n\
  \n"
- '# 位置监控


  Pigeon 是一款需要即时、精确（尽可能）且持续监控用户位置的应用程序。因此，它需要一台具备 GPS 功能的 iOS 设备，并持续收集位置数据。并非所有应用都如此。许多应用并不需要精确的位置信息、持续监控，或立即收到移动通知。


  对于位置需求不那么高的应用，Core Location 框架提供了多种信息和传递方法。每种方法都涉及不同级别的硬件和 CPU 参与，这意味着它们会以不同方式影响
  iOS 设备的电池续航和性能。


  作为一条原则，你应只收集应用运行所需的最少位置信息。假设你正在编写一个旅行应用，需要知道用户何时离开一个城市并到达下一个城市。不要启动 GPS 硬件（像 Pigeon
  那样）并开始监控他们的一举一动。为什么？因为你的应用永远收不到用户到达目的城市的通知——因为用户的电池早就耗尽了！而用户充电后要做的第一件事，就是删除你的应用。来看一些不需要那么多电量就能获取位置信息的方法。


  ## 近似位置与非 GPS 设备


  没有 GPS 硬件的 iOS 设备也能获取位置信息。这些设备利用从 Wi-Fi 基站、手机信号塔及其他来源收集的位置数据。精度可能很粗略——有时是公里级而非米级——但足以将用户定位到一个城镇。这对于推荐附近的餐厅或正在上映的电影来说，信息已经绰绰有余。


  因此，即使你的应用没有`gps`硬件要求，你仍然可以请求位置信息，并且有可能获取到。请查看`CLLocation`对象的`horizontalAccuracy`属性，了解所报告位置的不确定性（以米为单位）。如果该值很大，那么设备可能没有使用
  GPS，或者处于 GPS 不准确的环境中。


  **注意**


  配备 GPS 的 iOS 设备也会使用这些替代位置信息来提高 GPS 三角定位的速度（GPS 三角定位本身相当慢）并降低功耗。该系统称为辅助 GPS（Assisted
  GPS）。


  如果你的应用只需要近似位置信息，请通过向`CLLocationManager`发送`-startMonitoringSignificantLocationChanges`消息（而非`-startUpdatingLocation`消息）来收集位置数据。这种方法仅获取用户位置的粗略估计，并且只在位置发生重大变化时通知你的应用，从而节省大量的处理能力和电池续航。


  ## 监控区域


  回到那个旅行应用，某些 iOS 设备能够监控位置的重大变化，即使设备处于待机状态。这是通过区域监控实现的。区域监控允许你在地图上定义一个区域，并在用户进入或离开该区域时收到通知。这是一种极其高效（低功耗）的确定用户是否移动的方法。


  例如，你可以创建两个`CLRegion`对象：一个环绕用户当前所在城市，另一个环绕他们下一个要前往的城市。然后为每个区域（最多 20 个）向位置管理器对象发送`-startMonitoringForRegion:`消息。这样，你的应用只需等待，直到委托对象收到`-locationManager:didEnterRegion:`或`-locationManager:DidExitRegion:`消息。


  使用区域监控，当用户到达工作地点或家庭聚会时，你的应用会收到通知。要了解更多关于区域监控的信息，请查阅 Xcode 的“文档与 API 参考”窗口中“位置感知编程指南”的“监控基于形状的区域”一节。“位置感知编程指南”还描述了如何在后台接收位置数据——即当你的应用不是前台活跃应用时，这是本书尚未讨论的内容。


  ## 减少位置变化消息


  延长电池续航的另一种方法是减少应用接收到的位置信息量。我已经讨论过仅接收重大变化或监控区域，但在这两种极端情况之间，还有既非极端又不用每秒更新用户位置的方法。


  第一种方法是设置位置管理器的`distanceFilter`和`desiredAccuracy`属性。`distanceFilter`减少了应用接收的位置更新次数。它会等待设备移动了设定的距离后，才再次更新你的应用。`desiredAccuracy`属性告诉
  iOS 应该花费多大努力来确定用户的精确位置。放宽该属性意味着定位硬件不必那么辛苦工作。


  你可以提供的另一个提示是`activityType`属性。这告诉管理器你的应用用于汽车导航，而非个人健身应用。位置管理器将利用这个提示来优化硬件使用。例如，如果用户在较长时间内没有移动，汽车导航应用可能会暂时关闭
  GPS 接收器。


  ## 移动与方向


  你的应用可能更关心用户移动的方向和速度，而非具体位置。如果方向是你关注的重点，请查看从`CLLocationManager`的`location`属性中获取的`CLLocation`对象的`speed`和`course`属性。


  如果你只想知道用户的方向，可以通过向位置管理器发送`-startUpdatingHeading`消息（而不是`-startUpdatingLocation`消息）来仅获取该信息。确定用户方向比确定其精确位置更为高效。


  要了解更多关于方向信息的内容，请阅读“位置感知编程指南”中的“获取与方向相关的事件”章节。


  ## 地理编码


  如果你的应用对地图上的地点感兴趣怎么办？它可能想知道某个商家的位置。或者它有一个地图坐标，想知道那里有什么。


  将关于地点的信息（商家名称、地址、城市、邮政编码）转换为地图坐标，以及反向转换的过程，称为地理编码。地理编码是苹果提供的一项网络服务，它能够将地点的信息字典（例如一个地址）尽可能准确地转换为经纬度，反之亦然。将地点信息转换为地图坐标称为正向地理编码。将地图坐标转换为对该位置的描述称为反向地理编码。


  地理编码通过`CLGeocoder`对象执行。`CLGeocoder`会将描述性信息字典或地图坐标转换为`CLPlacemark`对象。地标对象是地图坐标与该坐标位置描述的集合。这些信息将包括坐标所在的国家、地区、城市、街道地址、邮政编码（如果适用），甚至包括它是否是一片水域。




  '
- '# 获取路线指引


  你的应用可以调用的另一个资源是“地图”应用。没错，就是 iOS 自带的那个标准地图应用。有一些方法可以让你的应用启动地图应用来协助用户。这是一种简单的方式，可以为你的用户提供地图、位置、路线和导航服务，而无需将这些功能集成到你的应用中。


  你通过 `MKMapItem` 对象来使用地图应用。你可以从当前位置（`+mapItemForCurrentLocation`）或地理编码地标对象（`-initWithPlacemark:`）创建一个或多个
  `MKMapItem` 对象。


  创建完成后，向地图项对象发送 `-openInMapsWithLaunchOptions:` 消息（针对单个地图项），或者将一个地图项数组传递给 `+openMapItems:launchOptions:`。启动选项是一个字典，可以用来告诉地图应用要显示地球的哪个区域、要在地图上高亮显示哪个区域、是否需要提供前往指定地点的驾车或步行路线、使用哪种模式（地图、卫星、混合）、是否显示交通信息等等。


  使用 `MKMapItem` 的代码示例位于《位置感知编程指南》的“提供路线指引”一章中。


  ## 总结


  在掌握 iOS 应用开发的旅程中，你已经走了很长的路。你跨越了许多里程碑，而学会使用位置服务是其中重要的一步。你现在知道如何出于各种目的获取用户的位置，并将其显示在地图上。


  说到地图，你还学到了很多关于地图的知识。你现在知道如何在你的应用中展示地图，用兴趣点进行标注，以及自定义这些标注的外观。你学会了如何跟踪并在地图上显示用户的位置，以及如何向界面添加你自己的视图控件。


  但你知道吗？Pigeon 仍然和 MyStuff 有着相同的问题。一个本应能记住东西的应用，如果在你退出时忘记了一切，那它还有什么用呢？应该要有某种方法将它的数据存储在某处，这样当你回到应用时，它就不会丢失所有内容。不出所料，有好几种用于保存数据的技术，接下来的两章将专门讨论这个问题。


  '
- '# 练习


  `MKMapView` 可以显示图形地图、卫星图像或两者的组合。它可以以真北为方向定位地图，也可以根据设备的方向旋转地图。不让你的用户选择他们想使用这些选项中的哪一个是不礼貌的。Pigeon
  锁定了地图视图的方向和显示模式。你的练习就是修复这个问题。


  地图显示的这两个方面由两个属性控制：`mapType` 和 `userTrackingMode`。地图类型可以设置为显示图形（`MKMapTypeStandard`）、卫星图像（`MKMapTypeStellite`）或两者的组合（`MKMapTypeHybrid`）。用户的跟踪模式可以是跟随用户（`MKUserTrackingModeFollow`），或者跟随用户并显示方向（`MKUserTrackingModeFollowWithHeading`）。


  你添加到界面的控件由你决定。有些应用会在地图界面上添加一个按钮，用于在不同地图类型和跟踪模式之间切换。对于 Pigeon，我决定将设置放在一个单独的视图控制器上，并使用页面卷曲转场来展示它们。


  你可以在 `Learn iOS Development Projects` > `Ch 17` > `Pigeon E1` 文件夹中找到完成的项目。基本上，我是这样做的：


  - 创建了一个名为 `HPMapOptionsViewController` 的 `UIViewController` 子类。

  - 在故事板中添加了一个视图控制器对象，并将其类更改为 `HPMapOptionsViewController`。

  - 在 `HPMapOptionsViewController` 中，我创建了一个 `mapView` 属性和两个 `UISegmentControl` 插座：`mapStyleControl`
  和 `headingControl`。

  - 我定义了三个操作方法：`-changeMapStyle:`、`-changeHeading:` 和 `-done:`。

  - 在新的视图控制器中，我创建了一个包含三个选项（地图、卫星和混合）的分段控件，将其连接到 `mapStyleControl` 插座，并将其“值已更改”操作连接到
  `-changeMapStyle:`。

  - 我在第一个分段控件下方创建了第二个分段控件，包含两个选项（正北和方向），将其连接到 `headingControl` 插座，并将其“值已更改”操作连接到 `-changeHeading:`。

  - 我将下方的分段控件约束到“底部布局指南”（`标准`），将上方的分段控件约束到下方的控件，然后将两者在容器视图中居中。

  - 在 `HPMapOptionViewController` 的实现中，我使用 `mapView` 属性获取当前地图类型和跟踪模式，并在 `-viewWillAppear:`
  中设置两个分段控件。

  - `-changeMapStyle:` 操作更改地图的类型。

  - `-changeHeading:` 操作更改地图的跟踪模式。

  - `-done:` 方法取消视图控制器。

  - 在 `HPViewController` 中，我添加了一个 `-prepareForSegue:` 方法，当转场标识为 `"mapOptions"` 时，设置
  `HPMapOptionsViewController` 的 `mapView` 属性。

  - 在故事板中，我从工具栏中的信息按钮创建了一个模态转场，连接到新的视图控制器，将其转场设置为“部分卷曲”，并为其分配标识符 `"mapOptions"`。


  > **注意**：创建转场时，请确保选中了嵌入在工具栏按钮项内部的按钮（`UIButton`）对象；发送操作消息的是这个嵌入的控件，而不是工具栏按钮项。


  最后，我向 `HPMapOptionsViewController` 的根视图对象添加了一个点击手势识别器，并将其连接到 `-done:` 操作，并将视图的背景颜色设置为非常浅（90%）的灰色。


  这些都是你在第 10 章和第 12 章中学到的内容。以下是最终界面的效果图：


