  \ 时为 `localPlayer` 参数传递 `YES`。\n  - `-willCaptureSunAtIndex:gameTime:localPlayer:`\
  \ 方法设置将被捕获的太阳的 `localPlayer` 属性。这决定了被捕获太阳的图像以及获得分数的玩家。\n- `STGameViewController.h`\n\
