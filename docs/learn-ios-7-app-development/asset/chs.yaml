  图 3-3. 添加导航栏


  将导航栏定位为视图的完整宽度。按住 Control 键并点击/右键点击导航栏，然后向上拖动，直到出现`Top Layout Guide`，如图 3-4 所示。松开鼠标并选择“Vertical
  Space”约束。


