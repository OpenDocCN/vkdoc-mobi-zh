  \  - 在 `-viewDidLoad` 方法中，使用 `twoPlayer` 属性来配置单人或双人游戏视图。对于单人游戏，`opponentGameView`\
  \ 将被移除（删除），因为它未被使用，并且本地游戏视图的 `opaque` 属性设为 `YES`。对于双人游戏，两个游戏视图均被使用，本地游戏视图的 `opaque`\
  \ 属性设为 `NO`，允许其拥有透明区域，从而显示背后的对手游戏视图。\n  - 在 `-finishGame` 方法中，`twoPlayer` 属性用于选择游戏结束时的提示信息。双人游戏的提示会告知本地玩家是获胜（还是落败），以及双方的分数。双人游戏的分数会被提交到\
  \ `kTwoPlayerLeaderboardID` 排行榜。\n- `STMainViewController.m`\n  - 在 `-prepareForSegue:sender:`\
  \ 方法中，游戏视图控制器的 `twoPlayer` 属性在呈现之前，会根据 segue 的标识符（`\"singlePlayer\"` 或 `\"twoPlayer\"\
  `）被设为 `YES` 或 `NO`。将此属性设为 `YES` 将触发一系列事件，从而创建并运行双人游戏。\n- `Main_iPhone.storyboard`\
  \ / `Main_iPad.storyboard`\n  - 从“双人游戏”按钮创建一个模态转场（modal segue）连接到游戏视图控制器。将该转场的标识符属性设为\
  \ `twoPlayer`。\n\n至此，你的双人游戏前端部分已完成。接下来是网络通信部分，它将使你的游戏与另一台 iOS 设备上的另一位玩家连接起来。\n\n\
  ## 匹配机制\n\n实时的点对点游戏通信大致可分为两个阶段：匹配机制和实时通信。到目前为止，匹配机制是最复杂的，所以 `GameKit` 能替你完成这部分工作真是太好了。\n\
  \n匹配机制是指在另一台 iOS 设备上发现你的应用的另一个实例并与之建立连接的过程。它对你的应用设计最大的影响在于，它从根本上改变了游戏的启动方式。在单人版中，`STGameViewController`\
  \ 创建一个 `STGame` 对象并向其发送 `-startSinglePlayer` 消息，游戏便立即开始。\n\n启动双人版则是一个多步骤过程：\n\n\
  `STGameViewController` 创建一个 `GKMatchRequest` 对象。  \n该匹配请求用于创建并呈现一个 `GKMatchmakerViewController`。\
  \  \n应用等待 `GKMatchmakerViewController` 定位并连接到另一位玩家。  \n如果成功，`-matchmakerViewController:didFindMatch:`\
  \ 委托方法会创建一个 `STGame` 对象并向其发送 `-startMultiplayerWithMatch:` 消息。  \n`STGame` 对象向远端应用发送“游戏开始”数据。当它接收到来自远端应用的相应“游戏开始”数据时，游戏开始。\n\
  \n接下来的几个小节将把这些代码添加到你的应用中。一旦匹配代码就位，你将进入实际通信代码的编写。\n\n\n\n"
- "# 请求匹配\n\n你的游戏通过请求与运行相同应用的其他用户匹配（连接）来开始。这是通过`GKMatchRequest`对象实现的。你可以请求三种类型的匹配：点对点、托管和回合制。\n\
  \n- **点对点**会与其他所有设备建立直接通信链路。所有参与者都是可以自由相互通信的\"对等方\"。SunTouch 将使用点对点通信。\n- **托管匹配**要求你的应用提供自己的网络连接和通信。它适用于使用集中式服务器（如\
  \ MMORPG）的游戏，或你已经编写了自定义通信的游戏。\n- **回合制游戏**不需要与其他玩家建立直接连接。不频繁的通信会通过 Game Center 服务器中继给其他玩家，使得在互联网可达范围内的任何距离都能进行休闲游戏。这意味着你甚至可以与正在国际空间站上的人进行回合制游戏，因为他们现在也有网络了。\n\
  \n游戏开始时，通过请求匹配来启动流程。选择`STGameViewController.m`文件，找到`-startGame`方法，并添加粗体所示的新代码：\n\
  \n```\n- (void)startGame\n\n{\n\n    if (self.game==nil)\n\n        {\n\n      \
  \  STGame *game = [STGame new];\n\n        self.game = game;\n\n        [self.gameView\
  \ reset];\n\n        [self.opponentGameView reset];\n\n        if (self.twoPlayer)\n\
  \n            {\n\n            GKMatchRequest *request = [GKMatchRequest new];\n\
  \n            request.minPlayers = 2;\n\n            request.maxPlayers = 2;\n\n\
  \            request.defaultNumberOfPlayers = 2;\n\n            GKMatchmakerViewController\
  \ *mmvc;\n\n            mmvc = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];\n\
  \n            mmvc.matchmakerDelegate = self;\n\n            [self presentViewController:mmvc\
  \ animated:YES completion:nil];\n\n            }\n\n        else\n\n           \
  \ {\n\n            [self.gameView observeNotificationsFromGame:game];\n\n      \
  \      [game startSinglePlayer];\n\n            [self startStrikeGrowAnimation];\n\
  \n            }\n\n        }\n\n}\n```\n\n修改后的`-startGame`方法会立即启动单人游戏。当`twoPlayer`为`YES`时，它会启动匹配流程。匹配请求被配置为限制最小、最大和默认的参与者数量。由于\
  \ SunTouch 严格来说是一款一对一游戏，因此唯一的选择是 2 名玩家。\n\n使用`GKMatchmakerViewController`来建立点对点匹配。其代码很简单：创建视图控制器，将你的对象设置为其委托，并将其呈现给用户。\n\
  \n**注意**：你没有指定匹配类型（点对点、托管或回合制）。这是因为所使用的匹配视图控制器隐含了类型。`GKMatchmakerViewController`创建点对点匹配。使用`GKTurnBasedMatchmakerViewController`来创建回合制匹配。对于托管游戏，或提供自定义界面，请使用`GKMatchmaker`或`GKTurnBasedMatch`类。\n\
  \n要使此功能生效，你的匹配委托对象必须遵循`GKMatchmakerViewControllerDelegate`协议，因此请跳转到`STGameViewController.h`并添加该协议（粗体所示的新代码）：\n\
  \n```\n@interface STGameViewController : UIViewController <UIAlertViewDelegate ,\n\
  \n                                      GKMatchmakerViewControllerDelegate >\n```\n\
  \n## 完成匹配\n\n你的应用通过实现`GKMatchmakerViewControllerDelegate`方法来处理匹配的成功或失败。首先在`STGameViewController.m`中添加成功方法：\n\
  \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
  \                    didFindMatch:(GKMatch *)match\n\n{\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n\n    if (match.expectedPlayerCount==0)\n\n        {\n\n   \
  \     [self.game startMultiPlayerWithMatch:match started:^{\n\n            [self.gameView\
  \ observeNotificationsFromGame:self.game];\n\n            [self.opponentGameView\
  \ observeNotificationsFromGame:self.game];\n\n            [self startStrikeGrowAnimation];\n\
  \n            }];\n\n        }\n\n}\n```\n\n当匹配建立时，匹配视图控制器会创建一个`GKMatch`对象，你的委托会收到一条`-matchmakerViewController:didFindMatch:`消息。匹配对象是你将与远程玩家通信所使用的对象。\n\
  \n所有玩家连接可能需要一段时间，并且你可能会多次收到此消息。你应该检查匹配对象的`expectedPlayerCount`属性。它会报告你仍在等待（期望）连接的玩家数量。一旦该值为`0`，所有玩家都已连接。此时\
  \ SunTouch 会启动游戏引擎。\n\n但游戏尚未开始！在 SunTouch 比赛开始之前，游戏引擎必须首先与另一位玩家通信，以确立游戏参数（太阳隐藏的位置）。这部分稍后再处理。现在，只需知道`-startMultiplayerWithMatch:`方法启动了一个与远程应用交换变量并同步游戏开始的进程。这被称为握手。当握手完成时，游戏启动，并且你在`started:`参数中传入的代码块会被执行，使得`STGameViewController`能够同时执行其游戏启动时的内务处理。\n\
  \n最后，添加两个失败委托方法：\n\n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController\
  \ *)controller\n\n{\n    [[NSNotificationCenter defaultCenter] postNotificationName:kGameDidEndNotifcation\n\
  \                                                        object:self];\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
  \ *)controller\n                didFailWithError:(NSError *)error\n\n{\n    [self\
  \ matchmakerViewControllerWasCancelled:controller];\n}\n```\n\n如果玩家决定不想与另一位玩家连接，则会收到`-matchmakerViewControllerWasCancelled:`消息。如果出现错误，则会收到`-matchmakerViewController:didFailWithError:`消息。两者都会结束游戏，关闭游戏视图控制器，并返回初始屏幕。\n\
  \n\n\n### 与另一台设备交换数据\n\n可以说，这是关键所在。配对器返回的 `GKMatch` 对象是你与其他 iOS 设备通信的通道。其核心用法非常简单。它有一个\
  \ delegate 属性和一些 `-sendData...` 方法。`-sendData...` 方法用于向其他设备发送数据。当其他设备向你的应用发送数据时，你的\
  \ delegate 对象会收到一条 `-match:didReceiveData:fromPlayer:` 消息。听起来很简单，对吧？细节之处才是魔鬼。\n\n\
  作为应用设计者，你必须决定要发送哪些信息、信息的格式如何、接收方如何解读这些信息、要将数据发送给哪些玩家、何时发送数据，以及确保数据被接收的重要性。\n\n在设计通信时，有多种组织方式。有些方法可以向所有其他参与者发送数据，也可以只向其中一位发送。这让你可以选择向所有其他玩家发送更新，或向特定玩家发送特定更新。你的游戏可能需要将某个设备指定为主机或主控（例如《龙与地下城》这类游戏结构）。`GKMatch`\
  \ 类有一个 `-chooseBestHostPlayerWithCompletionHandler:` 方法，用于协助设备选择一个“领头羊”。\n\n在这方面，`SunTouch`\
  \ 很简单。因为对手永远不会多于一个，所以通信拓扑不是问题。唯一棘手的部分是决定哪个应用来随机生成太阳的位置。两个玩家必须使用同一组太阳位置，否则游戏将毫无意义——至少比现在更没意义。（你怎么在太空中挖个洞，又为什么要这么做？）\n\
  \n请记住，你在两台不同的设备上同时运行着两个完全相同的程序版本。除非你指定一个，否则没有“领导者”。对于 `SunTouch`，解决方案是两个应用各自生成一组随机太阳位置。然后它们“抛硬币”——或电子等价物——并选出一个胜者。两个应用都将使用胜者选定的那组太阳。之后，你的应用会向远程应用发送描述打击和捕获太阳的数据。同时，远程应用也会向你的应用发送对手玩家的打击和捕获太阳信息。`SunTouch`\
  \ 的通信可以总结如下：\n\n*   向远程应用发送“游戏开始”数据，其中包含一组随机太阳位置以及一个随机数（即“硬币”）。\n*   收到“游戏开始”数据后，将远程应用的随机数与我们的进行比较。这决定了谁赢得抛硬币，以及使用哪组太阳位置。\n\
  *   当用户发起一次打击时，向远程应用发送“打击”数据，其中包含打击的位置和半径。\n*   当从远程应用收到“打击”数据时，在对手的游戏视图中动画显示一次打击。\n\
  *   当本地玩家捕获一个太阳时，向远程应用发送“太阳已捕获”数据，其中包含太阳将被捕获的时间。\n*   当从远程应用收到“太阳已捕获”数据时，动画显示被捕获的太阳，并为对手玩家加分。如果两个玩家同时发现同一个太阳，则最早捕获者获胜。\n\
  \n所有通信代码都将放在 `STGame` 中。是两个游戏引擎对象之间相互通信。你的控制器对象只关心与本地玩家的交互，而视图对象仅响应通知。你将通过充实 `-startMultiPlayerWithMatch:started:`\
  \ 方法开始实现，然后构建各个发送/接收数据的方法。\n\n### 开始游戏\n\n点击 `STGame.h` 接口文件。你将添加一些变量和一个多人游戏开始方法。从变量开始。编辑\
  \ `@interface` 的实例变量部分，使其如下所示（新代码以粗体显示）：\n\n```\n@interface STGame : NSObject\n\
  {\n    NSArray*            suns;\n    NSTimeInterval      startTime;\n    GKMatch\
  \             *multiPlayerMatch;\n    void                (^multiPlayStarted)(void);\n\
  \    uint32_t            coinToss;\n}\n```\n\n`multiPlayerMatch` 变量保存了对 `GKMatch`\
  \ 对象的引用，你需要用它来与其他应用通信。其后那个看起来奇怪的声明定义了 `multiPlayerStarted` 变量。它是一个代码块变量；保存了对一段代码块的引用，`STGame`\
  \ 稍后可以执行这段代码。这是 `-startMultiPlayerWithMatch:started:` 方法的一个参数。说到这个，在 `-startSinglePlayer`\
  \ 之后为其添加一个方法声明：\n\n```\n- (void)startSinglePlayer;\n- (void)startMultiPlayerWithMatch:(GKMatch*)match\n\
  \                          started:(void(^)(void))started;\n```\n\n切换到 `STGame.m`\
  \ 并编写新方法：\n\n```\n- (void)startMultiPlayerWithMatch:(GKMatch*)match started:(void(^)(void))started\n\
  {\n    multiPlayerMatch = match;\n    multiPlayStarted = started;\n    suns = [STGame\
  \ randomSuns];\n    coinToss = arc4random();\n    match.delegate = self;\n    [self\
  \ sendGameStart];\n}\n```\n\n用于与其他应用通信的 `GKMatch` 对象被保存下来，同时保存的还有在游戏实际开始时执行的代码块引用。接着，生成一组随机太阳位置和一个用作抛硬币结果的随机数。选取最大随机数的应用将决定太阳位置。\n\
  \n`STGame` 对象被设置为 `GKMatch` 对象的 `delegate`。匹配对象接收到的数据现在将发送给 `STGame`。最后，“游戏开始”数据被发送到远程应用。可以推测，远程应用也在几乎同一时间执行着完全相同的代码，选择一组太阳、一个随机数，并向此应用发送其“游戏开始”数据。\n\
  \n**注意**\n\n你可能已经注意到 `STGame` 并不遵循 `GKMatchDelegate` 协议。这将在接下来的一个分类中处理。\n\n### 创建数据消息传递分类\n\
  \n你将把所有的远程通信逻辑整合到 `STGame` 的一个名为 `STDataMessaging` 的分类中。在项目导航器中选中 `STGame.m` 文件，然后从\
  \ File 菜单或通过右键单击 `STGame.m` 文件选择 New File . . . 命令。\n\n**注意**\n\n分类会为类添加额外的方法。这些方法在一个单独的模块中声明和实现，但在其他方面与类的其他方法无法区分。我将在第\
  \ 20 章中详细解释分类。\n\n选择 Objective‑C 分类模板。将分类命名为 `STDataMessaging`，并使其成为 `STGame` 的分类，如图\
  \ 14-20 所示。\n\n![A978-1-4302-5063-0_14_Fig20_HTML.jpg](img/A978-1-4302-5063-0_14_Fig20_HTML.jpg)\n\
  \n**图 14-20.** 创建 `STDataMessaging` 分类\n\n该分类将实现三个向其他玩家发送游戏信息的方法：`-sendGameStart`、`-sendStrike:`\
  \ 和 `-sendCaptureForSunIndex:`。该分类还实现了 `GKMatchDelegate` 方法，用于接收来自其他玩家的数据。在新的 `STGame+STDataMessaging.h`\
  \ 接口文件中，编辑分类声明，使其如下所示（新代码以粗体显示）：\n\n```\n@interface STGame (STDataMessaging) <GKMatchDelegate>\n\
  - (void)sendGameStart;\n- (void)sendStrike:(STStrike*)strike;\n- (void)sendCaptureForSunIndex:(NSUInteger)index;;\n\
  @end\n```\n\n分类声明需要 `STStrike` 类的定义以及一些常量，因此请在文件开头添加以下内容：\n\n```\n#import \"STGameDefs.h\"\
  \n@class STStrike;\n```\n\n**注意**\n\n`@class` 指令用于声明一个类，而不向编译器透露该类的任何信息。换句话说，它告知编译器存在这样一个类，但仅此而已。它主要用在接口文件中，当声明引用一个类名（`-(void)sendStrike:(\
  \ STStrike* )strike;`）时，但不需要或希望包含该类的完整定义（`#import \"STStrike.h\"`）。\n\n\n\n####\
  \ 定义数据格式\n\n我先前概述的设计任务之一，是决定“你的数据格式如何”。这是通信设计的关键部分。`GKMatch` 对象会将一个字节数组从你的应用传输到另一台设备（可能位于半个地球之外），但这个字节数组的内容完全由你决定。它必须包含你想要与另一应用通信的信息，并且必须以接收方能够理解的方式组织。边栏“序列化与跨平台通信”描述了其中涉及的一些挑战。\n\
  \n> **注意**  \n> 在计算机工程中，“序列化”（serialization）一词通常用于描述将对象和值编码为可传输格式的过程。不幸的是，在 Cocoa\
  \ 中，“序列化”有非常特定的含义，详见第 18 章。在 Cocoa 中，“归档”（archiving）更接近通用的“序列化”概念。归档将在第 19 章中解释。\n\
  \n### 序列化与跨平台通信\n\n将信息（数字、对象、属性等）转换为可传输的格式，通常被称为序列化、编组或压缩。当你与另一个计算机系统或进程交换信息时（包括将信息存储在文件中），都必须进行此操作。Cocoa\
  \ 和 Objective‑C 提供了多种工具来帮助你序列化数据，然后将序列化后的数据恢复为应用可以使用的对象和属性——这个过程称为反序列化、解组或解压缩。\n\
  \n你的应用中的信息在与其他应用或设备交换时，可能面临三个障碍：内存地址、字长和字节顺序。\n\n最大的问题是内存地址。Objective‑C 中的对象是动态\
  \ RAM 的一小块区域，用于存储该实例的属性。在你的应用中，你通过对象的地址来引用它。对象的内存地址对于另一个进程或计算机系统来说毫无意义。另一台设备无法访问你应用的内存——至少我希望它不能。将对象的地址交给另一个进程，就像把你的电话号码给平行宇宙中的某个人一样；他们根本无法使用。\n\
  \n解决办法是将对象属性转换为一串字节，接收方可用这些字节组装出等效的对象。假设你有一个 `Person` 对象，包含 `name`（字符串）和 `age`（整数）属性。你不能将\
  \ `Person` 或字符串对象的地址传递给另一个进程。相反，你可以通过创建一个字节数组，并将人的 `name` 字符和 `age` 的二进制值填充到这些字节中，来实现对象的序列化。接收这些字节的计算机可以利用这些数据构造一个新的字符串对象和具有相同属性的新\
  \ `Person` 对象。\n\n在交换这个人的 `age` 时，还需要处理两个额外问题。不同的计算机系统，甚至不同的编译器，使用不同的字长。计算机体系结构中的“字”是用于存储单个数字（如\
  \ `int`）的字节序列。一个 `int` 在某个计算机系统上可能是 16 位（2 字节），在另一个系统上可能是 64 位（8 字节）。因此，你不能简单地编写代码将一个\
  \ `int` 复制到字节数组中，再在另一个系统上提取出来，因为在一台计算机上这意味着 2 字节，而在另一台上则意味着 8 字节。\n\n字长不匹配通常通过使用\
  \ C 和 Objective‑C 中的固定大小变量类型来解决。例如，`int32_t` 是一个变量类型（就像 `int` 和 `char` 一样），它定义了一个始终为\
  \ 32 位（4 字节）长的整数。无论你在何种计算机系统上编译，或者运行何种 CPU，`int32_t` 变量始终是 32 位长。\n\n最后一个问题是字节顺序。不同的\
  \ CPU 架构以不同的顺序存储单个整数的字节。将整数的最低有效位存储在内存的第一个（最低）字节中的 CPU 称为小端序（little-endian）机器。如果第一个字节包含整数的最高有效位，则称为大端序（big-endian）机器。如果你将整数值的最低有效字节先发送给一个期望第一个字节为最高有效位的系统，整数值将因顺序错乱而无法正确解析。\n\
  \n对于 SunTouch 而言，字节顺序目前不是问题。截至本文写作时，所有 iOS 设备都采用类似的 CPU 架构，且都使用相同的小端序字节顺序。但需注意，这将来可能会发生变化。\n\
  \n然而，字长并非在所有 iOS 设备上都相同。随着 A7 处理器的引入，部分 iOS 设备采用 32 位 CPU，而另一些则采用 64 位 CPU。这意味着\
  \ `NSInteger` 变量在 iPhone 4S 上运行时占用 4 字节（32 位），但在 iPhone 5S 上运行时则占用 8 字节（64 位）。（这一陈述假设你已将应用编译为同时支持\
  \ 32 位和 64 位架构，这是 Xcode 的默认构建设置。）所有指针和 `CGFloat` 变量的长度也会不同。你在 iOS 设备之间交换的任何整数或浮点数值，必须就一致的字节长度达成一致。\n\
  \n如果你的应用想要与运行不同操作系统的其他类型计算机系统通信，就需要同时考虑字长和字节顺序的差异。\n\n第 18 章和第 19 章解释了用于序列化对象的内置\
  \ Objective‑C 工具。这些工具会为你处理所有字长、字节顺序和对象解压的问题。\n\n当 SunTouch 应用接收数据时，它必须能够确定数据块包含何种信息。最直接的做法（如果自行实现）是让每个数据块以一个整数开头，描述剩余数据块所包含的信息类型。在\
  \ `STGame+STDataMessaging.h` 中，添加以下声明：\n\n```objc\ntypedef uint32_t STMessage;\n\
  \nenum {\n    kSTStartGameMessage,\n    kSTStrikeMessage,\n    kSTCaptureMessage\n\
  };\n```\n\n这段代码定义了一个新的整数变量类型（`STMessage`），该类型保证始终为 32 位长，无论编译时针对何种计算机系统。然后，它定义了三个常量，分别对应\
  \ SunTouch 发送的每种数据消息类型。\n\n`STGame+STDataMessaging.h` 中的其余声明定义了用于在游戏之间交换数据的结构体：\n\
  \n```objc\ntypedef float STFloat;\n\ntypedef struct {\n    STFloat x;\n    STFloat\
  \ y;\n} __attribute__((aligned(4), packed)) STMessagePoint;\n\nstruct STStartGameMessage\
  \ {\n    STMessage       message;\n    uint32_t        coinToss;\n    STMessagePoint\
  \  sun[kSunCount];\n} __attribute__((aligned(4), packed));\n\nstruct STStrikeMessage\
  \ {\n    STMessage       message;\n    STMessagePoint  location;\n    STFloat  \
  \       radius;\n} __attribute__((aligned(4), packed));\n\nstruct STCaptureMessage\
  \ {\n    STMessage       message;\n    uint32_t        sunIndex;\n    STFloat  \
  \       gameTime;\n} __attribute__((aligned(4), packed));\n```\n\n前两个声明创建了两个新的变量类型：`STFloat`\
  \ 和 `STMessagePoint`。`STFloat` 定义单个坐标或距离变量，`STMessagePoint` 定义了一对用于描述坐标的 `STFloat`\
  \ 值。\n\n> **注意**  \n> 为什么不直接使用 `CGFloat` 和 `CGPoint`？因为 `CGFloat` 的长度在 32 位和 64\
  \ 位 CPU 架构中不同，且 `CGPoint` 结构的默认对齐方式将来可能改变。通过定义你自己且可传输的变量类型，可以确保这些结构中的变量在 SunTouch\
  \ 可能运行的任何 iOS 设备上都具有相同的大小、顺序和位置。\n\n\n\n以下三个结构体（`STStartGameMessage`、`STStrikeMessage`和`STCaptureMessage`）定义了将要交换的数据块的组织方式。请注意，每个结构体都以一个`STMessage`整数字段开头，该字段包含相应的消息类型常量。当你的应用从其他玩家处接收数据块时，你已知消息的前\
  \ 32 位将包含一个数字。你将检查该数字以确定数据内容。\n\n其余字段的含义应显而易见。`__attribute__((aligned(4),packed))`这一“乱码”是一条特殊指令，用于告知编译器如何精确地对齐和打包结构体中的字段。正如字长和字节顺序在不同计算机上有所变化，结构体中字段的字节对齐方式亦会不同。通过明确指定对齐方式，`SunTouch`确保——即使未来编译器的结构体对齐规则发生改变——所有版本的`SunTouch`仍能相互通信。\n\
  \n以上就是你需要的所有声明。现在你可以编写用于从远程应用发送和接收数据的方法了。\n\n## 向玩家发送数据\n\n切换到`STGame+STDataMessaging.m`实现文件。首先`#import`\
  \ `STStrike`和`STSun`类的定义，稍后将用到它们。\n\n```objective-c\n#import \"STStrike.h\"\n#import\
  \ \"STSun.h\"\n```\n\n实现`-sendGameStart`方法：\n\n```objective-c\n- (void)sendGameStart\n\
  {\n    struct STStartGameMessage message;\n    message.message = kSTStartGameMessage;\n\
  \    message.coinToss = coinToss;\n    for ( NSUInteger i=0; i<kSunCount; i++ )\n\
  \        {\n        STSun *sun = suns[i];\n        message.sun[i].x = sun.location.x;\n\
  \        message.sun[i].y = sun.location.y;\n        }\n    NSData *data = [NSData\
  \ dataWithBytes:&message length:sizeof(message)];\n    [multiPlayerMatch sendDataToAllPlayers:data\n\
  \                              withDataMode:GKMatchSendDataReliable\n          \
  \                           error:NULL];\n}\n```\n\n所有向其他玩家发送数据的方法都将遵循相同的模式。方法首先分配适当的数据结构（此处为`STStartGameMessage`），然后将`message`字段设置为标识其包含数据类型的常量（`kSTStartGameMessage`），接着填充结构体的其余值。\n\
  \n> **注意**：传统上，所有整数值在网络传输中均采用大端序。由于目前所有 iOS 设备均使用小端序整数，此处省略了字节序转换步骤。若需要翻转整数的字节序，请使用\
  \ Core Foundation 字节交换函数。在 Xcode 文档中搜索“byte swapping”即可。\n\n最后一步是将填充完成的结构体发送给其他玩家。`NSData`类将结构体的字节转换为`NSData`对象——该对象本质上只是一个包含字节数组的对象。然后你向`GKMatch`对象发送`-sendDataToAllPlayers:withDataMode:error:`消息。该方法将这些字节传输给所有其他参与的玩家。由于`SunTouch`仅是一款双人游戏，唯一接收方是对手的应用。\n\
  \n`GKMatchSendDataReliable`模式告知`GKMatch`确保这些数据必须到达。这听起来似乎是理所当然的要求——难道你不希望所有数据都到达吗？但并非所有游戏数据都重要到需要担心其是否安全抵达。无线通信可能不稳定且不可靠，数据可能因干扰而丢失。如果消息的到达并非关键，可传递`GKMatchSendDataUnreliable`。这样发送速度快，但不保证送达。这适用于连续发生的状态更新。丢失少数几条消息不会造成太大影响；下一条更新会将游戏状态拉回正轨。传递关键信息（例如象棋走法）的消息应使用`GKMatchSendDataReliable`发送。如果发送消息时出现问题，`GKMatch`会重试直至成功。这会增加开销，且消息可能需要一段时间才能送达，但最终一定会到达。\n\
  \n至此，你已实现了向其他玩家发送“游戏开始”数据的代码。现在编写从其他玩家接收“游戏开始”数据的代码。\n\n## 从玩家处接收数据\n\n当从远程玩家处接收到数据块时，你的`STGame`对象会收到`-match:didReceiveData:fromPlayer:`消息。这将是处理所有接收数据的中心位置：\n\
  \n```objective-c\n- (void) match:(GKMatch*)match\ndidReceiveData:(NSData*)data\n\
  \    fromPlayer:(NSString*)playerID\n{\n    STMessage message = *((STMessage*)data.bytes);\n\
  \    switch (message) {\n        case kSTStartGameMessage: {\n            const\
  \ struct STStartGameMessage *message = data.bytes;\n            if (message->coinToss>coinToss)\n\
  \                {\n                STSun *otherSuns[kSunCount];\n             \
  \   for ( NSUInteger i=0; i<kSunCount; i++ )\n                    otherSuns[i] =\
  \ [STSun sunAt:message->sun[i].x\n                                             \
  \  :message->sun[i].y];\n                suns = [NSArray arrayWithObjects:otherSuns\
  \ count:kSunCount];\n                }\n            else if (message->coinToss==coinToss)\n\
  \                {\n                coinToss = arc4random();\n                [self\
  \ sendGameStart];\n                return;\n                }\n            startTime\
  \ = [NSDate timeIntervalSinceReferenceDate];\n            multiPlayStarted();\n\
  \            }\n            break;\n    }\n}\n```\n\n第一步是检查接收数据块前四个字节中的 32 位整数值。C\
  \ 语法`*((STMessage*)`将接收数据的前四个字节视为一个`STMessage`整数，然后获取该值并存入`message`变量。现在方法已知刚刚接收的是何种数据。其余工作只是针对每种类型进行处理。\n\
  \n`kSTStartGameMessage`分支将接收的数据字节视为（强制转换）`STStartGameMessages`结构体——而它确实正是该结构体。\n\
  \n当你的游戏收到“游戏开始”数据时，它会将其他玩家选择的`coinToss`值与你的游戏引擎在`-startMultiplayerWithMatch:started:`中选择的值进行比较。如果对手的`coinToss`更大，则对手赢得了抛硬币。丢弃我们选择的太阳位置，替换为对手选择的位置。这样，两个游戏便拥有了相同的太阳位置。\n\
  \n如果你的游戏选择了更大的`coinToss`值，则无需执行任何操作，因为你已拥有正确的太阳位置。然而，存在十亿分之一的可能性两个应用选择了相同的`coinToss`值。若发生这种情况，两个应用都选择一个新的随机数并重试。\n\
  \n一旦抛硬币结束且两个游戏使用相同的太阳位置，游戏即开始。\n\n如果你在寻找名为`multiPlayStarted`的函数，可以不用找了。它并非函数，而是`STGameViewController`在最初发送`-startMultiplayerWithMatch:started:`消息时传给`STGame`的代码块变量的名称。它看起来像\
  \ C 函数调用，但实际上是在执行保存在`multiPlayStarted`实例变量中的代码块。\n\n执行“游戏已开始”代码块是启动游戏的最后一步。至此游戏已运行，且双方玩家使用相同的隐藏太阳位置列表。接下来发生的事将是：其中一名（很可能双方）玩家触摸界面，从而引发一次击打。\n\
  \n\n\n#### 发送打击数据\n\n当玩家触摸游戏视图时，会发起一次打击。但这一信息必须传达给另一位玩家，以便其对手的游戏视图能呈现动画效果。将发送打击数据的方法添加到\
  \ `STGame+STDataMessaging.m` 实现文件中：\n\n```\n- (void)sendStrike:(STStrike*)strike\n\
  {\n    if (multiPlayerMatch==nil)\n        return;\n    struct STStrikeMessage message;\n\
  \    message.message = kSTStrikeMessage;\n    message.location.x = strike.location.x;\n\
  \    message.location.y = strike.location.y;\n    message.radius = strike.radius;\n\
  \    NSData *data = [NSData dataWithBytes:&message length:sizeof(message)];\n  \
  \  [multiPlayerMatch sendDataToAllPlayers:data\n                              withDataMode:GKMatchSendDataReliable\n\
  \                                     error:NULL];\n}\n```\n\n第一个语句在 `multiPlayerMatch`\
  \ 属性为 `nil` 时不执行任何操作，这表明当前是单人游戏，没有远程玩家需要发送数据。该方法的其余部分与 `-sendGameStart` 类似，区别在于数据包含打击的位置和半径。\n\
  \n每当本地用户进行打击时，都必须调用此方法。切换到 `STGame.m` 实现文件，找到 `-strike:radius:inView:` 方法，并将其开头修改为如下所示（新代码以粗体显示）：\n\
  \n```\n- (void)strike:(CGPoint)viewLocation\n        radius:(CGFloat)viewRadius\n\
  \        inView:(STGameView*)gameView\n{\n    STStrike* strike = [STStrike new];\n\
  \    strike.location = [gameView unitPointFromPoint:viewLocation];\n    strike.radius\
  \ = [gameView unitRadiusFromRadius:viewRadius];\n    [self sendStrike:strike];\n\
  }\n```\n\n现在，每当游戏引擎收到 `-strike:radius:inView:` 消息时，它都会将此次打击报告给对手玩家（假设是双人游戏）。`-sendStrike:`\
  \ 方法是 `STDataMessaging` 类别的一部分。在文件开头添加以下 `#import`，以便 `STGame.m` 能识别新方法：\n\n```\n\
  #import \"STGame+STDataMessaging.h\"\n```\n\n你发送给对手玩家的任何信息，都必须做好接收的准备。\n\n#### 接收打击数据\n\
  \n返回 `STGame+STDataMessaging.m`，找到 `-match:didReceiveData:fromPlayer:` 方法，并在 switch\
  \ 语句中添加一个新的 case：\n\n```\ncase kSTStrikeMessage: {\n    const struct STStrikeMessage\
  \ *message = data.bytes;\n    STStrike *strike = [STStrike new];\n    strike.location\
  \ = CGPointMake(message->location.x,message->location.y);\n    strike.radius = message->radius;\n\
  \    NSDictionary *strikeInfo = @{ kGameInfoStrike: strike,\n                  \
  \                kGameInfoOpponent: @YES };\n    [[NSNotificationCenter defaultCenter]\
  \ postNotificationName:kGameStrikeNotification\n                               \
  \                         object:self\n                                        \
  \              userInfo:strikeInfo];\n    }\n    break;\n```\n\n当接收到一个标识自身为 `kSTStrikeMessage`\
  \ 值的数据块时，会根据数据中的位置和半径信息构造一个 `STStrike` 对象。然后将其作为打击通知发布，并将 `kGameInfoOpponent` 属性设置为\
  \ `YES`。游戏视图会监听此通知，从而让对手游戏视图在后台视图中播放打击动画。\n\n游戏引擎对对手的打击不感兴趣；由对手捕获的太阳会另行通知。而且，现在正是编写这部分代码的最佳时机。\n\
  \n#### 发送太阳捕获数据\n\n这开始变得有些单调，但你已经快完成了。仍在 `STGame+STDataMessaging.m` 中，添加 `-sendCaptureForSunIndex:`\
  \ 方法：\n\n```\n- (void)sendCaptureForSunIndex:(NSUInteger)index\n{\n    if (multiPlayerMatch==nil)\n\
  \        return;\n    struct STCaptureMessage message;\n    STSun *sun = suns[index];\n\
  \    message.message = kSTCaptureMessage;\n    message.sunIndex = (uint32_t)index;\n\
  \    message.gameTime = sun.time;\n    NSData *data = [NSData dataWithBytes:&message\
  \ length:sizeof(message)];\n    [multiPlayerMatch sendDataToAllPlayers:data\n  \
  \                            withDataMode:GKMatchSendDataReliable\n            \
  \                         error:NULL];\n}\n```\n\n这个流程你已经掌握了：检查 `multiPlayerMatch`，填充\
  \ `STCaptureMessage` 结构体，将其转换为 `NSData`，然后将数据发送给其他玩家。完成。\n\n这会在什么时候发生？当 `-strike:radius:inView:`\
  \ 方法判定一次打击将捕获一个太阳时。切换到 `STGame.m`，找到 `-strike:radius:inView:`，找到判定太阳被捕获的 `if` 块，并将其修改为如下所示（新代码以粗体显示）：\n\
  \n```\nif (sunDistance<=viewRadius)\n    {\n    NSTimeInterval strikeTime = self.gameTime+kStrikeAnimationDuration/2\n\
  \                                               *(sunDistance/viewRadius);\n   \
  \ [self willCaptureSunAtIndex:i gameTime:strikeTime localPlayer:YES];\n    [self\
  \ sendCaptureForSunIndex:i];\n    }\n```\n\n#### 接收太阳捕获数据\n\n回到 `STGame+STDataMessaging.m`\
  \ 文件，在 `-match:didReceiveData:fromPlayer:` 方法的 switch 语句中添加最后一个 case：\n\n```\ncase\
  \ kSTCaptureMessage: {\n    const struct STCaptureMessage *message = data.bytes;\n\
  \    [self willCaptureSunAtIndex:message->sunIndex\n                       gameTime:message->gameTime\n\
  \                    localPlayer:NO];\n    }\n    break;\n```\n\n这是目前最简单的部分。从对手处捕获的太阳信息被传递给游戏引擎。请记住，你已经向\
  \ `-willCaptureSunAtIndex:gameTime:localPlayer:` 方法添加了一个额外参数，以便该方法能够区分本地玩家捕获的太阳和对手捕获的太阳。当从远程游戏接收到太阳捕获数据时，你发送相同的消息，但这次将\
  \ `localPlayer` 参数设为 `NO`。\n\n注意\n\n网络通信需要时间。虽然时间不长，但足以让双方玩家在收到对方捕获数据之前，都认为自己是捕获同一个太阳。这被称为竞态条件，是实时编程中一个臭名昭著的问题。请仔细阅读\
  \ `-willCaptureSunAtIndex:gameTime:localPlayer:` 和 `STGameView` 的 `-captureNotification:`\
  \ 方法中的逻辑和注释，了解 SunTouch 是如何处理这一问题的。\n\n\n\n#### 处理比赛中断\n\n你的所有通信逻辑已经完成，但还需要实现一些额外的\
  \ `GKMatchDelegate` 方法。将它们添加到你的 `STGame+STDataMessaging.m` 文件中：\n\n```\n- (void)\
  \ match:(GKMatch*)match\n        player:(NSString*)playerID\ndidChangeState:(GKPlayerConnectionState)state\n\
  {\n}\n\n- (void)match:(GKMatch*)match didFailWithError:(NSError*)error\n{\n    [[NSNotificationCenter\
  \ defaultCenter] postNotificationName:kGameDidEndNotifcation\n                 \
  \                                       object:self];\n}\n\n- (BOOL)match:(GKMatch\
  \ *)match shouldReinvitePlayer:(NSString*)playerID\n{\n    return YES;\n}\n```\n\
  \n如前所述，无线通信的服务质量会有所波动（用技术术语来说就是“不稳定”）。当 iOS 与另一玩家失去或重新建立连接时，你的委托方法会收到一条 `-match:player:didChangeState:`\
  \ 消息。具体如何处理取决于游戏类型。SunTouch 对此不采取任何操作（虽然遗憾地导致对方无法采集你的太阳，但也就仅此而已）。如果这是一款双人对战的机器人游戏，则可能需要暂停游戏，直到连接恢复。\n\
  \n当严重的网络问题导致游戏无法维持或重新建立与一个或多个玩家的连接时，会收到更严重的 `-match:didFailWithError:` 消息。在这种情况下，与其他玩家的连接很可能已经中断。SunTouch\
  \ 的做法是结束游戏。\n\n最后，当双人游戏与另一玩家失去连接时，会收到 `-match:shouldReinvitePlayer:` 方法。如果此方法返回\
  \ `YES`，则 `GKMatch` 对象会自动尝试与另一玩家重新建立连接。如果返回 `NO`，或玩家数量超过两人，则需要你在自己的 `-match:player:didChangeState:`\
  \ 方法中自行重新连接断开的玩家。\n\n#### 测试双人游戏\n\n如果我说在测试双人版 SunTouch 之前还有一个步骤，请别把这本书扔到房间另一头，但确实在测试双人版\
  \ SunTouch 之前还有一个步骤。\n\n**注意**\n\n请记住，你必须拥有两台已配置好的 iOS 设备，才能测试使用点对点网络的、支持 Game Center\
  \ 的双人应用。iOS 模拟器无法连接到真实的 iOS 设备，反之亦然。\n\n你首先需要让 SunTouch 在两台 iOS 设备上运行。将两台 iOS 设备都插入\
  \ Mac。在 Xcode 中，将方案的运行目标设置为第一台设备，然后点击“运行”按钮，就像本书中你做过无数次的那样。在第一个应用仍在运行时，将方案的目标更改为第二台\
  \ iOS 设备，并再次点击“运行”按钮。现在，Xcode 同时在两台 iOS 设备上运行同一个应用。\n\n**提示**\n\n有些游戏在设备通过 USB 端口连接时操作起来不太方便。如果你没有使用\
  \ Xcode 调试其中一个或两个应用，可以先运行项目将应用复制到设备，然后停止应用，拔掉设备，再从桌面重新启动应用。\n\n最后一步是创建第二个沙盒玩家。要玩双人游戏，你必须拥有两个\
  \ Game Center 玩家账户，并且由于这两个应用都使用沙盒服务器，因此两个玩家都必须是沙盒玩家。在你的第二台 iOS 设备上，按照你在单人版本中“创建测试玩家”部分的相同步骤操作。一旦你拥有两个沙盒玩家账户，就可以开始双人游戏了。\n\
  \n在两个应用都运行的情况下，在两台设备上都点击“双人游戏”按钮。两台设备都会显示比赛匹配视图控制器，如图 14-21 所示。在两台设备上都点击“立即游戏”按钮。这会使用\
  \ Game Center 的“自动匹配”功能，该功能会连接到它能找到的第一个本地玩家。\n\n![A978-1-4302-5063-0_14_Fig21_HTML.jpg](img/A978-1-4302-5063-0_14_Fig21_HTML.jpg)\n\
  \n图 14-21. 与第二个 SunTouch 玩家连接\n\n一旦两台设备连接成功，SunTouch 就会开始运行，如图 14-22 所示。\n\n![A978-1-4302-5063-0_14_Fig22_HTML.jpg](img/A978-1-4302-5063-0_14_Fig22_HTML.jpg)\n\
  \n图 14-22. 双人 SunTouch 通过本地 Wi-Fi 通信\n\n游戏结束后，你可以在 Xcode 中停止应用。如果需要，可以拔掉设备，然后从桌面重新启动\
  \ SunTouch。\n\n**提示**\n\n当 Xcode 运行你的应用的多个实例时，“停止”按钮会变成一个下拉菜单。点击它并选择要停止的应用。\n\n\
  ## 高级网络\n\nGameKit 是用于点对点网络的绝佳资源，但它并非唯一的网络通信解决方案——只是最容易使用的而已。\n\n如果你想创建更通用的网络解决方案，比如连接并与几乎任何类型的计算机上运行的自定义应用进行通信，那么有很多资源和可能的方案可供选择。最佳起点是在\
  \ Xcode 的“文档与 API 参考”窗口中找到的《网络概述》文档。你最可能想探索的三个网络通信领域是：\n\n*   用于与互联网服务器通信的高级 HTTP/URL\
  \ 服务，就像你在 Shorty 中使用的一样。这些包括 `NSURLRequest` 和 `NSURLConnection` 类。\n*   用于与几乎所有联网设备或服务直接连接的低级\
  \ TCP/IP 套接字 API。请从《使用套接字和套接字流》文档开始。\n*   用于广告和发现本地服务的 Bonjour 服务。如果你想自行进行比赛匹配，让你的用户能轻松连接到另一台本地计算机，Bonjour\
  \ 是首选工具（GameKit 就使用了 Bonjour）。在 iOS 上，Bonjour 服务还支持蓝牙，用于无线点对点蓝牙发现。请从《Bonjour 概述》文档开始。\n\
  \n\n\n## 最后一点细节\n\n关于 `SunTouch` 还有一个方面（并非双关语）让我困扰。项目设置允许 `SunTouch` 在 iPhone 和\
  \ iPad 上以竖屏或横屏模式运行。虽然在我宣布这个应用准备好发布之前，有很多界面问题需要处理，但有一个相当明显的问题：如果玩家以一种方向开始玩游戏，然后转向另一个方向，游戏就会变得有些混乱。这是游戏引擎使用的单位空间坐标系的副作用。它会导致异常行为，例如隐藏的太阳出现在已经被摧毁的屏幕区域。\n\
  \n项目设置决定了整个应用允许的方向。各个视图控制器也可以动态地规定它们支持哪些方向。你将利用后一个特性来阻止用户在游戏中途翻转设备。\n\n视图控制器愿意支持的方向集通过其\
  \ `-supportedInterfaceOrientations` 方法返回的位来声明。iOS 在呈现视图控制器时会查询此信息。如果视图控制器不支持当前方向，界面方向就会更改为支持的方向。你的\
  \ `STFlipsideViewController` 可以受益于此功能。游戏说明是垂直布局的，在横屏模式下显得很难看。\n\n修改 `STFlipsideViewController`，使其视图仅以竖屏方向出现。找到\
  \ `STFlipsideViewController.m` 实现文件并添加此方法（或在 `Learn iOS Development Projects` ➤\
  \ `Ch 14` ➤ `SunTouch-5` 文件夹中查看完成的项目）：\n\n```\n- (NSUInteger)supportedInterfaceOrientations\n\
  \n{\n\nreturn UIInterfaceOrientationMaskPortrait;\n\n}\n```\n\n这会覆盖继承的 `-supportedInterfaceOrientations`\
  \ 方法，后者在 iPad 上返回 `UIInterfaceOrientationMaskAll`，在 iPhone 上返回 `UIInterfaceOrientationMaskAllButUpsideDown`。如果你运行应用，旋转设备，并呈现翻转视图控制器，它仍然会以竖屏方向显示，如图\
  \ 14-23 所示，因为这是它现在唯一支持的方向。\n\n![A978-1-4302-5063-0_14_Fig23_HTML.jpg](img/A978-1-4302-5063-0_14_Fig23_HTML.jpg)\n\
  \n图 14-23. 将视图控制器限制为竖屏方向\n\n如果你的视图控制器支持多种方向的组合，要么返回一个组合常量（例如 `UIInterfaceOrientationMaskAll`），要么通过按位或运算将单个方向组合起来（例如\
  \ `UIInterfaceOrientationMaskPortrait|UIInterfaceOrientationMaskPortraitUpsideDown`）。\n\
  \n**注意：** 许多容器视图控制器会聚合其子视图控制器所支持的方向。例如，标签栏控制器只有在其所有子视图控制器都支持横屏方向时，才会从竖屏旋转到横屏方向。\n\
  \n对于 `STGameViewController`，问题略有不同。你希望允许横屏甚至倒置方向，但又不希望游戏开始后方向改变。解决方案是创建一个“智能”的 `-supportedInterfaceOrientations`\
  \ 方法，该方法仅支持它启动时的方向。\n\n在 `STGameViewController.h` 接口文件中，向类添加一个 `lockedOrientation`\
  \ 属性：\n\n`@property (nonatomic) UIInterfaceOrientation lockedOrientation;`\n\n切换到\
  \ `STMainViewController.m` 实现文件，找到 `-prepareForSegue:sender:` 方法。在转到 `STGameViewController`\
  \ 的 `if` 代码块中，添加一行用于捕获设备当前方向的代码（新代码以粗体显示）：\n\n```\ngameViewController.twoPlayer\
  \ = [segue.identifier isEqualToString:@\"twoPlayer\"];\ngameViewController.lockedOrientation\
  \ = self.interfaceOrientation;\n}\n```\n\n最后，切换到 `STGameViewController.m` 文件并覆盖\
  \ `-supportedInterfaceOrientation` 方法：\n\n```\n- (NSUInteger)supportedInterfaceOrientations\n\
  \n{\n\nswitch (self.lockedOrientation)\n\n{\n\ncase UIInterfaceOrientationPortrait:\n\
  \nreturn UIInterfaceOrientationMaskPortrait;\n\ncase UIInterfaceOrientationPortraitUpsideDown:\n\
  \nreturn UIInterfaceOrientationMaskPortraitUpsideDown;\n\ncase UIInterfaceOrientationLandscapeLeft:\n\
  \nreturn UIInterfaceOrientationMaskLandscapeLeft;\n\ncase UIInterfaceOrientationLandscapeRight:\n\
  \nreturn UIInterfaceOrientationMaskLandscapeRight;\n\n}\n\nreturn UIInterfaceOrientationMaskAll;\n\
  \n}\n```\n\n这个新方法只允许与 `lockedOrientation` 中设置的方向相匹配的方向。现在，你可以以任何方向开始 SunTouch 游戏，但一旦开始，在游戏结束前，它不会响应设备方向的改变。这很简单，不是吗？\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n## 总结\n\n在本章中，你涉猎了众多不同的领域。你创建了一个支持\
  \ Game Center 的应用，为其分配了唯一的 App ID，向 Apple 注册了该 ID 和应用，使用 iTunes Connect 为应用启用和配置了\
  \ Game Center，实现了各种 GameKit 要求，创建了一个沙盒玩家，在应用中获取了本地玩家，并向全球排行榜提交了分数。\n\n而所有这些工作，仅仅是为你应用添加实时网络通信功能所做的前奏！你使用了\
  \ Game Center 的匹配功能来连接另一台 iOS 设备，向其他玩家发送实时状态更新，并处理从其他玩家接收到的远程消息——所有这一切都是实时完成的。你还学习了一些关于序列化信息，以及构建和解释进程间数据的基础知识。\n\
  \n这值得庆祝，也值得祝贺。到目前为止，这是本书中最复杂、最困难的项目，而你出色地完成了它。凭借你积累的势头，诚实地说，你可以轻松地完成本书剩余的部分。后续章节将向你介绍更多的\
  \ iOS 服务，例如地图，并且包含大量关于 Objective‑C 和多任务的实用信息，但与你迄今为止所取得的成就相比，这一切都会显得简单。\n\n说到实用信息，下一章将重点介绍\
  \ Interface Builder。重点不在于如何使用它，而在于它是如何工作的；如果你想成为一名 iOS 开发大师，理解这一点非常重要。\n\n"
- '# 练习


  你认为，将 SunTouch 变成一个可以同时由三个甚至四个玩家玩的游戏会有多复杂？令人惊讶的是，工作量并没有那么大。或者，也许正因为它不难，才说明 SunTouch
  是一个设计精良的软件。


  如果你愿意从朋友或家人那里再借一台 iOS 设备，本章的练习就是让 SunTouch 能够支持最多四个玩家同时游玩。


  应用中需要修改的部分，可能不是你立刻就能想到的那些。如果你将所有来自任何远程玩家的攻击和捕获的太阳都视为“对手”，那么发送攻击和处理来自远程玩家捕获太阳的逻辑只需稍作调整。视图类根本不需要修改——这设计得有多精良？


  复杂的问题在游戏的开头和结尾。你现在需要在最多四组太阳位置之间进行仲裁，并且所有玩家都得到相同的一组位置。但即使这样，也可以用几行代码解决。真正复杂的问题是，现在有不止一个对手的分数，所以单一的
  `-opponentScore` 方法就没有意义了。


  我想过几种将 SunTouch 演变成多人游戏的不同方法。我最终编写的解决方案可以在 `Learn iOS Development Projects` ➤ `Ch
  14` ➤ `SunTouch E1` 文件夹中找到。它为 `STSun` 对象添加了一个新的 `playerID` 属性。该属性记录了捕获该太阳的玩家。一个新的
  `-scoreForPlayer:` 方法用于计算任何单个玩家的分数。如果你想让游戏更加丰富多彩，可以修改 `STGameView` 为每个玩家分配不同颜色的太阳。在项目中搜索字符串
  `*Multi-Player*` 可以找到这些以及其他更改。


  在这么多玩家的情况下，挑选一个领头者来开始游戏并就一组太阳达成一致听起来会很棘手，但这只需要一些小的代码更改。仍然通过最高的投掷硬币结果来决定要使用的太阳组，唯一的区别是每个应用都会等待，直到它收到来自所有其他玩家的“开始游戏”消息。另一种方法是使用
  `GKMatch` 的 `-chooseBestHostPlayerWithCompletionHandler:` 方法，让 GameKit 选择其中一个设备作为主机。一旦选定，主机设备将选择一组太阳位置，并通过单条消息将其传达给所有其他玩家，从而开始游戏并消除了对投掷硬币的需求。（`-chooseBestHostPlayerWithCompletionHandler:`
  唯一的问题是不保证能选出一个主机，所以你仍然必须提供一个备用机制。）


  我尝试了几种不同的解决方案来完成这个练习，其中一种方案增加了一条新的“分数”消息，每当本地分数改变时就广播该消息。你能想到其他解决方案吗？虽然通常有很多糟糕的解决方案，但编写软件并没有唯一正确的方法。


