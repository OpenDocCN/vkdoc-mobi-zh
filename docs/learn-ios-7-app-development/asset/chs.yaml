  图 3-4. 为导航栏添加垂直约束


  就像你在上一章中所做的那样，选中该约束并将其值设置为 0，如图 3-5 所示。这指示 iOS 将导航栏定位在屏幕顶部的推荐位置，即系统状态栏的正下方。


