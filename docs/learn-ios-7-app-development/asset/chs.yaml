- "# 深入探究 LRDialView\n\n你刚刚添加的源文件中包含一个自定义 `UIView` 对象的代码，该对象用于绘制一个圆形“刻度盘”。阅读完第 11\
  \ 章后，你应该能轻松理解其工作原理。其中最有趣的部分是在图形上下文中使用了仿射变换。在第 11 章中，你将仿射变换应用于视图对象，使其看起来偏离实际框架或缩放。而在\
  \ `LRDialView` 中，仿射变换是在绘制前应用于图形上下文的。此后绘制的所有内容都会使用该变换进行平移。\n\n在 `LRDialView` 中，这项技术用于在“刻度盘”内侧绘制刻度线和角度标签。如果你感兴趣，可以找到\
  \ `LRDialView.m` 文件中的 `-drawRect:` 方法。关键代码以粗体显示，无关代码已用省略号替换：\n\n```\n#define kCircleDegrees\
  \      360\n#define kMinorTickDegrees   3\n...\n- (void)drawRect:(CGRect)rect\n\
  {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    CGRect bounds\
  \ = self.bounds;\n    CGFloat radius = bounds.size.height/2;\n    ...\n    CGContextTranslateCTM(context,radius,radius);\n\
  \    for ( NSUInteger angle=0; angle<kCircleDegrees; angle+=kMinorTickDegrees )\n\
  \        {\n        ... 绘制一条垂直刻度线和水平标签 ...\n        CGContextConcatCTM(context,\
  \ ↩︎\n                    CGAffineTransformMakeRotation(kMinorTickDegrees*M_PI/180));\n\
  \        }\n}\n```\n\n`-drawRect:` 方法首先对上下文应用平移变换。这会偏移绘制坐标，实际上是将视图本地坐标系的原点移动到视图的中心。（如你稍后所见，该视图始终为正方形。）应用此变换后，如果你在\
  \ `(0,0)` 处绘制图形，它现在会绘制在视图中心，而不是左上角。\n\n循环绘制一条垂直刻度线及其下方的可选文本标签。在循环结束时，上下文的绘制坐标会旋转\
  \ 3°。第二次循环时，刻度线和标签将旋转 3°。第三次循环时，所有绘制内容将旋转 6°，依此类推，直到整个刻度盘绘制完成。上下文变换是累加的。\n\n需要理解的关键概念是，应用于绘制上下文的变换会影响正在绘制到视图中的内容坐标系，如图\
  \ 16-2 所示。上下文变换不会改变视图的框架、边界或其在其父视图中的位置。\n\n![A978-1-4302-5063-0_16_Fig2_HTML.jpg](img/A978-1-4302-5063-0_16_Fig2_HTML.jpg)\n\
  \n*图 16-2. 图形上下文变换*\n\n要改变视图在其父视图中的显示方式，你需要像在 Shapely 应用中那样设置视图的 `transform` 属性。这正是视图控制器（稍后）将在屏幕上旋转刻度盘时所做的工作。这凸显了在绘制过程中使用仿射变换与使用变换来改变最终视图外观之间的区别。\n\
  \n另请注意，该视图只绘制一次。`-drawRect:` 中所有这些复杂的代码仅在视图首次绘制或调整大小时执行。视图绘制完成后，刻度盘的缓存图像会显示在屏幕上，并通过视图的\
  \ `transform` 属性进行旋转。这第二次使用变换只是转录缓存图像中的像素；它不会导致视图以新角度重新绘制自身。从这个角度来说，绘制效率非常高。这一点很重要，因为你稍后还要对它进行动画处理。\n\
  \n"
- "# 创建视图\n\n你将在 Interface Builder 文件中添加一个标签对象，然后在 `LRViewController` 中编写代码，以编程方式创建\
  \ `LRDialView` 和用于显示刻度盘后方“指针”的图像视图。从 `Main_iPhone.storyboard`（或 `_iPad`）文件开始。\n\n\
  将一个标签对象拖入界面。使用属性检查器，进行以下更改：\n\n- 文本：`360°`（按住 Option+Shift+8 输入度符号）\n- 颜色：`白色`\n\
  - 字体：`System 60.0`（iPhone）或 `System 90.0`（iPad）\n- 对齐方式：居中\n\n选中标签对象，然后选择 Editor\
  \ ➤ Size to Fit Content。将对象定位在界面顶部居中。选择根视图对象，将其背景颜色更改为 `黑色`。\n\n选中标签，并添加以下约束：\n\n\
  固定其宽度（Editor ➤ Pin ➤ Width）  \n固定其高度（Editor ➤ Pin ➤ Height）  \n居中（Editor ➤ Align\
  \ ➤ Horizontal Center in Container）  \n按住 Control/右键拖拽到 `Top Layout Guide`，创建垂直间距约束\
  \  \n使用属性检查器选中该约束，并勾选其 `Standard` 选项\n\n完成后的界面应类似于图 16-3。\n\n![A978-1-4302-5063-0_16_Fig3_HTML.jpg](img/A978-1-4302-5063-0_16_Fig3_HTML.jpg)\n\
  \n*图 16-3. 水平仪 Interface Builder 布局*\n\n切换到助理编辑器。在右侧窗格中打开 `LRViewController.h` 文件，添加以下输出口属性：\n\
  \n```\n@property (weak,nonatomic) IBOutlet UILabel *angleLabel;\n```\n\n将输出口连接到界面中的标签视图，如图\
  \ 16-4 所示。\n\n![A978-1-4302-5063-0_16_Fig4_HTML.jpg](img/A978-1-4302-5063-0_16_Fig4_HTML.jpg)\n\
  \n*图 16-4. 连接角度标签输出口*\n\n你将通过编程方式创建并定位另外两个视图。切换回标准编辑器，选择 `LRViewController.m` 文件。你需要\
  \ `LRDialView` 类的定义以及图像资源文件的名称，因此在现有的 `#import` 指令之后立即添加以下 `#import` 和 `#define`\
  \ 声明：\n\n```\n#import \"LRDialView.h\"\n#define kHandImageName      @\"hand\"\n\
  ```\n\n你还需要一些实例变量来保留对刻度盘和图像视图对象的引用，以及一个定位它们的方法。将这些添加到私有的 `@interface` 部分（新代码以粗体显示）：\n\
  \n```\n@interface LRViewController ()\n{\n    LRDialView      *dialView;\n    UIImageView\
  \     *needleView;\n}\n- (void)positionDialViews;\n@end\n```\n\n当视图控制器加载其视图时创建这两个视图。由于这是应用中唯一的视图控制器，因此这只会发生一次。找到\
  \ `-viewDidLoad` 方法，并添加以下粗体代码：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    dialView = [[LRDialView alloc] initWithFrame:CGRectMake(0,0,100,100)];\n  \
  \  [self.view addSubview:dialView];\n    needleView = [[UIImageView alloc]\n   \
  \                 initWithImage:[UIImage imageNamed:kHandImageName]];\n    needleView.contentMode\
  \ = UIViewContentModeScaleAspectFit;\n    [self.view insertSubview:needleView belowSubview:dialView];\n\
  }\n```\n\n加载视图时，附加代码会创建新的 `LRDialView` 和 `UIImageView` 对象，并将两者添加到视图中。请注意，`needleView`\
  \ 被特意放置在 `dialView` 之后。刻度盘视图是部分透明的，可以让 `needleView` 透过它显示。\n\n这些视图没有进行大小或位置的设定。这会在视图显示或旋转时发生。通过添加以下两个方法来捕获这些事件：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self positionDialViews];\n\
  }\n\n- (void)didRotateFromInterfaceOrientation:(UIInterfaceOrientation)fromOrientation\n\
  {\n    [self positionDialViews];\n}\n```\n\n在视图首次显示之前，以及每当视图旋转到新的方向时，重新定位 `dialView`\
  \ 和 `needleView` 对象。你还需要为 iPhone 版本添加此方法：\n\n```\n- (NSUInteger)supportedInterfaceOrientations\n\
  {\n    return UIInterfaceOrientationMaskAll;\n}\n```\n\n\n\n"
- "# 排版后内容\n\n当你编辑了应用支持的屏幕方向时，请记住（从第 14 章中可知），每个视图控制器决定其支持哪些方向。默认情况下，iPhone 的`UIViewController`不支持倒置方向。这段代码覆盖了该默认设置，允许所有方向。\n\
  \n最后，你将需要`-positionDialView`的代码：\n\n```\n- (void)positionDialViews\n{\n    CGRect\
  \ viewBounds = self.view.bounds;\n    CGRect labelFrame = self.angleLabel.frame;\n\
  \    CGFloat topEdge = CGRectGetMaxY(labelFrame)+labelFrame.size.height/3;\n   \
  \ CGFloat dialHeight = ceilf((CGRectGetMaxY(viewBounds)-topEdge)*2);\n    dialView.transform\
  \ = CGAffineTransformIdentity;\n    dialView.frame = CGRectMake(0, 0, dialHeight,\
  \ dialHeight);\n    dialView.center = CGPointMake(CGRectGetMidX(viewBounds),\n \
  \                                    CGRectGetMaxY(viewBounds));\n    [dialView\
  \ setNeedsDisplay];\n    CGSize needleSize = needleView.image.size;\n    CGFloat\
  \ needleScale = (dialHeight/2)/needleSize.height;\n    CGRect needleFrame = CGRectMake(0,0,\n\
  \                         needleSize.width*needleScale,\n                      \
  \   needleSize.height*needleScale);\n    needleFrame.origin.x = CGRectGetMidX(viewBounds)-needleFrame.size.width/2;\n\
  \    needleFrame.origin.y = CGRectGetMaxY(viewBounds)-needleFrame.size.height;\n\
  \    needleView.frame = CGRectIntegral(needleFrame);\n}\n```\n\n这段代码看起来很多，但它所做的只是将`dialView`设置为正方形，将其中心定位在视图的底部中央，并将其放大，使其顶部边缘刚好位于标签视图底部边缘的下方。然后定位`needleView`，使其居中并锚定在底部边缘，并按比例缩放，使其高度等于刻度盘的可见高度。描述起来比实际看到要困难得多，所以直接运行应用，看看图\
  \ 16-5 中的效果就明白了。\n\n![A978-1-4302-5063-0_16_Fig5_HTML.jpg](img/A978-1-4302-5063-0_16_Fig5_HTML.jpg)\n\
  \n图 16-5.\n\n刻度盘与指针视图定位\n\n至此，视图设计和布局基本完成。现在你需要获取加速度计信息，让应用真正动起来。\n\n## 获取运动数据\n\
  \n所有 iOS 设备（在撰写本文时）都配有加速度计硬件。加速度计感应沿三个轴（X、Y、Z）的加速力。如果你以竖屏方向手持 iPhone 或 iPad 屏幕，X\
  \ 轴是水平方向，Y 轴是垂直方向，Z 轴是从你出发，穿过设备中心，垂直于屏幕表面的那条线。\n\n你可以利用加速度计信息来判断设备何时改变速度以及改变的方向。假设设备没有（大幅度）加速，你也可以利用这些信息推断重力的方向，因为重力对静止物体施加恒定的力。iOS\
  \ 正是利用这些信息来判断你何时将 iPad 翻转至侧边，或是否在摇晃 iPhone。\n\n除了加速度计，最新的 iOS 设备还包含了陀螺仪和磁力计。前者检测绕三个轴（俯仰、横滚、偏航）的旋转变化，后者检测磁场的方位。在没有磁场干扰的情况下，它会告诉你设备相对于磁北的方向（通俗地说，就是它有一个指南针）。\n\
  \n你的应用通过一个单一的网关类`CMMotionManager`获取所有这些信息。`CMMotionManager`类负责收集、解释并向你的应用传递运动和姿态信息。你可以告诉它需要哪种信息（加速度计、陀螺仪、指南针）、希望以多高的频率接收更新，以及这些更新如何传递给应用。你的水平仪应用将只使用加速度计信息，但所有类型运动数据的通用模式是相同的：\n\
  \n- 创建一个`CMMotionManager`实例\n- 设置更新频率\n- 选择你想获取的信息以及应用获取方式（拉取或推送）\n- 准备好后，开始信息传递\n\
  - 处理实时发生的运动数据\n- 完成后，停止信息传递\n\n没有比从第一步开始更好的地方了。\n\n### 创建 CMMotionManager\n\n在`LRViewController.m`中所有其他`#import`语句之前，引入\
  \ CoreMotion 框架定义：\n\n```\n#import <CoreMotion/CoreMotion.h>\n```\n\n你需要指定运动数据更新的速度。为整洁起见，在`#import`语句之后立即将其定义为一个常量：\n\
  \n```\n#define kAccelerometerPollingInterval   (1.0/15.0)\n```\n\n你需要一个实例变量来存储`CMMotionManager`对象引用，以及处理运动数据和旋转刻度盘的方法。将这些添加到你的私有接口中（新代码以粗体显示）：\n\
  \n```\n@interface LRViewController ()\n{\n    CMMotionManager *motionManager;\n\
  \    LRDialView      *dialView;\n    UIImageView     *needleView;\n}\n\n- (void)positionDialViews;\n\
  - (void)updateAccelerometerTime:(NSTimer*)timer;\n- (void)rotateDialView:(double)rotation;\n\
  @end\n```\n\n找到`-viewDidLoad:`方法，并将这段代码添加到方法末尾：\n\n```\nmotionManager = [CMMotionManager\
  \ new];\nmotionManager.accelerometerUpdateInterval = kAccelerometerPollingInterval;\n\
  ```\n\n你已经完成了使用运动数据的前两个步骤。第一条语句创建了一个新的`CMMotionManager`对象，并将其保存在`motionManager`实例变量中。\n\
  \n**注意**\n\n不要创建`CMMotionManager`的多个实例。如果你的应用有两个或更多需要运动数据的控制器，它们应共享同一个`CMMotionManager`实例。我建议在你的应用委托类中创建一个`readonly`属性，返回一个单例`CMMotionManager`对象。任何代码都可以通过`[UIApplication.sharedApplication.delegate\
  \ motionManager]`来获取它。\n\n下一条语句告诉管理器在两次测量之间等待多长时间。该属性以秒为单位表示。对于大多数应用来说，每秒 10 到 30\
  \ 次就足够了，但对某些极端应用可能需要每秒 100 次更新。对于这个应用，你将通过将`accelerometerUpdateInterval`属性设置为 1/15\
  \ 秒，从每秒 15 次更新开始。\n\n### 启动和停止更新\n\n为了执行获取运动数据的第三步和第四步，找到`-viewWillAppear:`方法并添加此语句（新代码以粗体显示）：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self positionDialViews];\n\
  \    [motionManager startAccelerometerUpdates];\n}\n```\n\n就在视图即将显示之前，你请求运动管理器开始收集加速度计数据。在启动更新过程之前，`CMMotionManager`报告的加速度计信息不会准确，甚至不会改变。一旦启动，运动管理器代码会在后台不知疲倦地工作，监测加速度的任何变化，并向你的应用报告。\n\
  \n**提示**\n\n为了节省电池电量，你的应用应仅在需要时才向运动管理器请求更新。对于这个应用，运动事件在整个应用生命周期中都使用，因此没有停止它们的代码。但是，如果你添加了第二个不使用加速度计的视图控制器，你需要在`-viewWillDisappear:`中添加代码来发送`-stopAccelerometerUpdates`。\n\
  \n\n\n"
- '# 推拉之间


  你可能觉得自己还没有完成获取运动数据的第三步，但实际上你已经完成了。当你发送 `-startAccelerometerUpdates` 消息时，这一步骤就已经隐含在内。这个方法会开始收集运动数据，但需要由你的应用定期去查询这些数值。这被称为拉取模式；`CMMotionManager`
  对象会持续更新运动数据，而你的应用则按需从中拉取数据。


  另一种方式是推送模式。要使用这种方式，请发送 `-startAccelerometerUpdatesToQueue:withHandler:` 消息。你需要传入一个操作队列（我将在第
  24 章中解释）以及一个在运动数据更新时立即执行的代码块。这种实现方式要复杂得多，因为代码块会在单独的线程上执行，因此你所有处理运动数据的代码都必须保证线程安全。只有当你的应用必须绝对、立即处理最新的运动数据时，才真正需要这种模式。属于这类情况的应用非常少。


  '
- "# 时机决定一切\n\n现在你可能会好奇，你的应用是如何“定期”拉取它所关心的运动数据的呢？运动管理器不会发送任何通知，也不会向你的对象发送任何代理消息。你需要的是一个能够定期提醒你的应用执行某些操作的对象。这被称为定时器，而\
  \ iOS 恰好提供了这样的功能。在 `-viewWillAppear:` 方法的末尾，添加如下语句：\n\n```\n[NSTimer scheduledTimerWithTimeInterval:kAccelerometerPollingInterval\n\
  target:self\nselector:@selector(updateAccelerometerTime:)\nuserInfo:nil\nrepeats:YES];\n\
  ```\n\n`NSTimer` 对象为你的应用提供了一个定时器。它是我在第 4 章中提到但一直没来得及细说的事件源之一。\n\n**注意**  \n创建一个可用的定时器需要两步：首先创建定时器对象，然后将其添加到运行循环中。`-scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:`\
  \ 方法可以同时完成这两步。如果你使用其他方法创建定时器，则必须在向运行循环对象发送 `-addTimer:forMode:` 消息后，定时器才会生效。\n\n\
  定时器分为两种：单次触发和重复触发。一个定时器具有 `timeInterval` 属性，以及一条它将发送给某个对象的消息。当 `timeInterval` 属性指定的时间过去后，定时器就会触发。在下一个机会到来时，事件循环会将定时器的消息发送给目标对象。如果是单次定时器，触发后即失效并停止。如果是重复定时器，它会持续运行，等待另一个\
  \ `timeInterval` 时间过去后再次触发。重复定时器会持续发送消息，直到你向其发送 `-invalidate` 消息。\n\n**警告**  \n\
  不要使用定时器来轮询那些本可以通过事件消息、代理方法、通知或代码块来确定的事件（例如等待网页加载）。定时器应仅用于与时间相关的事件和周期性更新。\n\n你在 `-viewWillAppear:`\
  \ 中添加的代码创建并调度了一个定时器，该定时器会以大约每秒 15 次的频率向你的视图控制器对象发送 `-updateAccelerometerTime:` 消息。这与运动管理器更新其加速度计信息的频率相同。没有必要以比\
  \ `CMMotionManager` 对象收集数据更快或更慢的频率来检查更新。\n\n现在万事俱备，只欠 `-updateAccelerometerTime:`\
  \ 和 `-rotateDialView:` 这两个方法。仍在 `LRViewController.m` 文件中，添加第一个方法：\n\n```\n- (void)updateAccelerometerTime:(NSTimer\
  \ *)timer\n{\n    CMAcceleration acceleration = motionManager.accelerometerData.acceleration;\n\
  \    double rotation = atan2(-acceleration.x,-acceleration.y);\n    [self rotateDialView:rotation];\n\
  }\n```\n\n第一条语句获取了运动管理器的 `accelerometerData` 属性。由于你只启动了加速度计信息的收集，因此这是唯一有效的运动数据属性。该属性是一个\
  \ `CMAccelerometerData` 对象，而这个对象只有一个属性：`acceleration`。`acceleration` 属性（它是一个结构体，而非对象）包含三个数值：`x`、`y`\
  \ 和 `z`。每个值都是沿该轴瞬时施加的力，以 G 为单位。³ 假设设备没有被移动，这些测量值可以组合起来确定重力矢量；换句话说，你可以确定哪个方向是下方。\n\
  \n你的应用不需要全部三个值。你只需要确定 X-Y 平面中哪个方向是上方即可，因为转盘就存在于这个平面中。忽略沿 Z 轴的力，反正切函数可以计算出重力矢量在 X-Y\
  \ 平面中的角度。计算结果用于将 `dialView` 旋转相同的角度。很简单，对吧？\n\n**注意**  \n你可能会质疑为什么反正切函数使用的是 x 和\
  \ y 的负值。这是因为转盘指向的是上方，而不是下方。将力的方向取反后，计算出的就是偏离重力的角度。\n\n通过编写 `-rotateDialView:` 方法来完善这个应用：\n\
  \n```\n- (void)rotateDialView:(double)rotation\n{\n    dialView.transform = CGAffineTransformMakeRotation(rotation);\n\
  \    NSInteger degrees = round(-rotation*180.0/M_PI);\n    if (degrees<0)\n    \
  \    degrees+=360;\n    _angleLabel.text = [NSString stringWithFormat:@\"%u\\u00b0\"\
  ,(unsigned)degrees];\n}\n```\n\n此方法将旋转参数转换为一个仿射变换，用于旋转 `dialView`。最后一段代码将 `rotation`\
  \ 值从弧度转换为角度，确保其不为负数，并用该值更新标签视图。\n\n现在，插入你已配置好的 iOS 设备，运行应用，然后摆弄一下看效果，如图 16-6 所示。注意当你旋转设备时，应用如何切换方向。如果你锁定了设备的方向，它就不会切换方向，但转盘仍然可以正常工作。\n\
  \n![A978-1-4302-5063-0_16_Fig6_HTML.jpg](img/A978-1-4302-5063-0_16_Fig6_HTML.jpg)\n\
  \n**图 16-6.** 运行中的水平仪应用\n\n\n\n### 抖动问题\n\n你的应用能运行，编写起来也很简单，但看起来实在费劲。如果它在我设备上的表现类似，那么表盘就会持续抖动。除非设备完全静止，否则几乎无法读取读数。\n\
  \n如果表盘能更平滑地移动——平滑得多——那就太好了。这听起来像是动画的任务。你需要的是一种让表盘看起来具有质量的动画，它会轻柔地飘向硬件报告的那一瞬间的倾斜角度。\n\
  \n那么有哪些选择呢？过去，你曾使用 Core Animation 来平滑地移动视图。但 Core Animation 就像一只信鸽；你把它带到起点，告诉它终点在哪里，然后放手让它飞。一旦开始，它就无法在终点改变时进行中途路线修正。而当新的加速计数据到达时，这正是会发生的情况。\n\
  \n你可以尝试通过限制视图旋转的速率来自行平滑更新。为了让它看起来非常美观，你甚至可能进一步创建一个简单的物理引擎，为表盘模拟质量、加速度、阻力等属性。但正如我在第\
  \ 11 章中提到的，自行实现动画的方法充满了复杂性，通常需要大量工作，而且往往导致性能不佳。\n\n幸运的是，iOS 7 引入了视图动力学（View Dynamics）。视图动力学是一项新的动画服务，它为你的视图赋予模拟的物理特性，模拟质量、重力、加速度、阻力、碰撞等效果。视图动力学采用了截然不同的动画方法。你不需要描述你希望动画做什么——移动这么多像素、旋转这么多度等等——而是描述作用于视图上的“力”，然后让动态动画器（Dynamic\
  \ Animator）创建一个模拟视图对这些力作出反应的动画。\n\n### 使用动态动画\n\n动态动画涉及三个角色：\n\n- 动态动画器对象\n- 一个或多个行为对象\n\
  - 一个或多个视图对象\n\n动态动画器是执行动画的对象。它包含一个非常智能的复杂物理引擎。你需要创建一个动态动画器的单一实例。\n\n当你创建行为对象并将其添加到动态动画器中时，动画就会发生。一个行为描述了视图的单个驱动力或属性。iOS\
  \ 包括用于重力、加速度、摩擦、碰撞、连接等效果的预定义行为，你也可以自由地创建自己的行为。一个行为与一个或多个视图（`UIView`）对象相关联，并将该特定行为赋予其所有视图。动态动画器负责为单个视图组合多个行为——例如加速度、重力加上摩擦——来构建该视图的动画。\n\
  \n因此，动态动画的基本公式是：\n\n1. 创建一个 `UIDynamicAnimator` 的实例\n2. 创建一个或多个 `UIDynamicBehavior`\
  \ 对象，并将其附加到 `UIView` 对象上\n3. 将 `UIDynamicBehavior` 对象添加到 `UIDynamicAnimator` 中\n\
  4. 坐享其成\n\n现在你已经准备好将视图动力学添加到水平仪应用中。\n\n### 创建动态动画器\n\n你需要创建一个动态动画器对象，为此需要一个实例变量来保存它。找到\
  \ `LRViewController.m` 中私有的 `@interface LRViewController ()` 声明。为你的动画器添加一个实例变量（新代码以粗体显示）。同时，添加一些常量和一个用于包含附着行为的变量，这些内容稍后将解释：\n\
  \n```\n#define kSpringAnchorDistance       4.0\n#define kSpringDamping         \
  \     0.7\n#define kSpringFrequency            0.5\n\n@interface LRViewController\
  \ ()\n{\n    CMMotionManager         *motionManager;\n    LRDialView           \
  \   *dialView;\n    UIImageView             *needleView;\n    UIDynamicAnimator\
  \       *animator;\n    UIAttachmentBehavior    *springBehavior;\n}\n```\n\n你需要创建动态动画器，创建所需的行为对象，并将它们连接到你的视图。完成这三个步骤的理想位置是在\
  \ `-positionDialViews` 方法中。找到 `-positionDialViews` 方法，并在最开头添加以下代码（新代码以粗体显示）：\n\n\
  ```\n- (void)positionDialViews\n{\n    if (animator != nil)\n        [animator removeAllBehaviors];\n\
  \    else\n        animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  ```\n\n这段代码简单地判断是否已经创建了 `UIDynamicAnimator` 对象。如果已创建，它会通过移除所有活动行为来重置它。如果尚未创建，则会创建一个新的动态动画器。\n\
  \n当你创建动态动画器时，必须指定一个视图，该视图将用于建立动态动画器将使用的坐标系。动态动画器使用自己的坐标系，称为参考坐标系，这样处于不同视图层次结构（每个都有自己的坐标系）中的视图对象可以在统一的坐标空间中相互交互。例如，使用参考坐标系，你可以让内容视图控制器中的某个视图与工具栏中的按钮发生碰撞，即使该按钮位于一个无关的父视图中。\n\
  \n对于你的应用，将参考坐标系设置为视图控制器根视图的坐标系。这使得所有动态动画器的坐标与你的本地视图坐标一致。这难道不很方便吗？（是的，确实很方便。）\n\n\
  \n\n"
- "# 定义行为\n\n那么，你认为拨号视图应该具备哪些行为？如果你浏览 iOS 提供的行为，你不会找到“旋转”行为。但如果作用在视图上的力会导致其旋转，动态动画器就会旋转该视图。因此，旋转拨号视图并不比旋转唱片转盘、旋转木马、餐台转盘或任何类似物体更难：只需固定物体中心，并对一个边缘施以斜向的力。\n\
  \n你将通过两个附着行为来实现这一点。附着行为可以将视图中的一个点与另一个视图中的某个点或空间中的固定点（称为锚点）连接起来。附着的长度可以是刚性的，从而创建一种“牵引杆”关系，使附着点保持固定距离；也可以是弹性的，从而创建一种“弹簧”关系，当附着的另一端移动时，会对视图产生拉力。要旋转拨号视图，你将分别使用这两种附着行为，如图\
  \ 16-7 所示。\n\n![A978-1-4302-5063-0_16_Fig7_HTML.jpg](img/A978-1-4302-5063-0_16_Fig7_HTML.jpg)\n\
  \n图 16-7. `dialView` 附着行为\n\n通过将以下代码添加到 `-positionDialViews` 方法的末尾来创建第一个行为：\n\n\
  ```\nCGPoint dialCenter = dialView.center;\n\nUIAttachmentBehavior *pinBehavior;\n\
  \npinBehavior = [[UIAttachmentBehavior alloc] initWithItem:dialView\n          \
  \                              attachedToAnchor:dialCenter];\n\n[animator addBehavior:pinBehavior];\n\
  ```\n\n该附着行为定义了一个从拨号视图中心到同一位置固定锚点的刚性附着。当你创建附着行为时，两个附着点之间的距离定义了其初始长度，在本例中为 0。由于附着是刚性的且长度为\
  \ 0，最终效果是将视图的中心固定在该坐标处。视图的中心无法从该位置移动。\n\n**注意**\n\n大多数动态行为可以与任意数量的视图对象关联。例如，重力可以均匀地作用于多个视图对象。然而，附着行为在两个附着点之间创建关系，因此仅与一个或两个视图对象关联。\n\
  \n剩下的工作就是将这个行为添加到动态动画器中。单独来看，这除了防止视图被移动到新位置外，并没有太多作用。当你使用以下代码添加第二个附着行为时，事情就变得有趣了：\n\
  \n```\nCGRect dialRect = dialView.frame;\n\nCGPoint topCenter = CGPointMake(CGRectGetMidX(dialRect),\n\
  \                                CGRectGetMinY(dialRect));\n\nspringBehavior = [[UIAttachmentBehavior\
  \ alloc]\n                          initWithItem:dialView\n                    \
  \  offsetFromCenter:UIOffsetMake(0,topCenter.y-dialCenter.y)\n                 \
  \     attachedToAnchor:topCenter];\n\nspringBehavior.damping = kSpringDamping;\n\
  springBehavior.frequency = kSpringFrequency;\n\n[animator addBehavior:springBehavior];\n\
  ```\n\n前两个语句计算视图顶部中心的点。然后创建了第二个附着行为。这一次附着点不再位于视图中心，而是其顶部中心（表示为相对于其中心的偏移量）。\n\n同样，锚点与附着点位置相同，形成了一个零长度的附着。不同之处在于，`damping`\
  \ 和 `frequency` 属性被设置为非默认值。这就在锚点和附着点之间创建了一个“弹性”连接。但由于锚点和附着点当前相同（尚未施加任何力），因此不会产生力。\n\
  \n"
- "# 动画化拨号盘\n\n舞台已经搭好，所有演员都已就位。你定义了一个将拨号盘中心固定到特定位置的行为，以及第二个将顶部中心点“拉向”第二个锚点的行为。当你移动第二个锚点时，动作就开始了，如图\
  \ 16-7 所示。\n\n找到 `-rotateDialView:` 方法，并删除第一条语句，即创建仿射变换并将其应用于视图的那条语句。将该代码替换为以下内容（新代码以粗体显示）：\n\
  \n```\n- (void)rotateDialView:(double)rotation\n{\n    CGPoint center = dialView.center;\n\
  \    CGFloat radius = dialView.frame.size.height/2 + kSpringAnchorDistance;\n  \
  \  CGPoint springPoint = CGPointMake(center.x+sin(rotation)*radius,\n          \
  \                            center.y-cos(rotation)*radius);\n    springBehavior.anchorPoint\
  \ = springPoint;\n}\n```\n\n这里没有采用传统方式告诉图形系统你想要什么样的变化（比如将视图旋转一定角度），而是描述了对物理环境的改变，并让动态动画器模拟其结果。在此应用中，你移动了附着在视图顶部中心点的锚点。移动锚点会在新锚点和视图中的附着点之间产生吸引力。由于视图中心被第一个行为固定，视图顶部点要靠近新锚点的唯一方式就是旋转视图——而这正是实际发生的情况。\n\
  \n运行应用并查看效果。拨号盘的行为更像一个“真正的”拨号盘。有加速、减速，甚至振荡。这些效果都归功于动态动画器中的物理引擎。\n\n尝试修改 `kSpringAnchorDistance`、`kSpringDamping`\
  \ 和 `kSpringFrequency` 的值，观察它们如何影响拨号盘。作为额外练习，添加第三个行为来为拨号盘增加一些“阻力”。创建一个 `UIDynamicItemBehavior`\
  \ 对象，将其与拨号视图关联，并将其 `angularResistance` 属性设置为非 `0` 的值；建议从 `2.0` 开始尝试。不要忘记将完成后的行为添加到动态动画器中。\n\
  \n现在你拥有一个炫酷的倾斜仪，它运行流畅且观察起来很有趣。既然你已经知道向应用添加运动数据以及使用视图动力学模拟运动是多么简单，让我们来看看其他一些运动数据的来源。\n\
  \n## 获取其他类型的运动数据\n\n截至撰写本文时，你的应用还可以使用其他三种运动数据。你可以收集和使用这些其他类型的数据，以替代或补充加速度计数据。以下是\
  \ iOS 提供的运动数据类型：\n\n- **陀螺仪**：测量设备绕其三个轴的旋转速率\n- **磁力计**：测量周围磁场的方位\n- **设备运动**：结合来自加速度计、磁力计和陀螺仪的信息，生成关于设备运动和空间位置的有用值\n\
  \n使用其他类型的运动数据与使用加速度计数据的方法完全相同，但有一点例外。并非所有 iOS 设备都配备陀螺仪或磁力计。你必须决定你的应用是必须拥有这些功能，还是可以在没有它们的情况下运行。这个决定将决定你如何配置应用的项目和编写代码。让我们从陀螺仪开始。\n\
  \n\n\n### 陀螺仪数据\n\n若你关注设备旋转的瞬时速率——逻辑上等同于加速计数据，但针对的是角力——则需收集陀螺仪数据。收集陀螺仪数据的方式与加速计数据几乎完全相同。首先设置运动管理对象的\
  \ `gyroUpdateInterval` 属性，然后向其发送 `-startGyroUpdates` 或 `-startGyroUpdatesToQueue:withHandler:`\
  \ 消息。\n\n`gyroData` 属性返回一个 `CMGyroData` 对象，该对象包含一个 `rotationRate` 属性值。此属性是一个结构体（与\
  \ `CMAcceleration` 类似），包含三个值：`x`、`y` 和 `z`。每个值代表绕该轴的旋转速率，单位为弧度/秒。\n\n你必须考虑用户设备可能没有陀螺仪的情况。有两种处理方式：\n\
  \n- 如果你的应用必须依赖陀螺仪硬件才能运行，请在应用的属性列表中将 `gyroscope` 值添加到 `Required Device Capabilities`\
  \ （必需设备功能）集合中。\n- 如果你的应用无论有无陀螺仪均可运行，请检测运动管理对象的 `gyroAvailable` 属性。\n\n第一种方法将陀螺仪硬件设为应用运行的必要条件。若添加到应用属性列表中，iOS\
  \ 将不允许该应用安装在缺少陀螺仪的设备上。App Store 可能会对缺少陀螺仪的用户隐藏该应用，或提醒他们该应用可能无法在其设备上运行。\n\n如果你的应用可以使用陀螺仪数据，但没有也能正常运行，请通过读取运动管理对象的\
  \ `gyroAvailable` 属性来检测陀螺仪是否存在。若值为 `YES`，则可放心启动并使用陀螺仪数据。若值为 `NO`，则需另行安排。\n\n###\
  \ 磁力计数据\n\n通过磁力计数据可以获取设备周围磁场的强度和方向。现在，这些内容听起来可能像老生常谈：\n\n- 使用 `magnetometerUpdateInterval`\
  \ 属性设置磁力计更新的频率。\n- 使用 `-startMagnetometerUpdates` 或 `-startMagnetometerUpdatesToQueue:withHandler:`\
  \ 消息启动磁力计测量。\n- `magnetometerData` 属性返回一个包含当前读数的 `CMMagnetometerData` 对象。\n- `CMMagnetometerData`\
  \ 对象的唯一属性是 `magneticField` 属性，这是一个包含三个值的结构体：`x`、`y` 和 `z`。每个值代表沿该轴的磁场方向和强度，单位为 μT（微特斯拉）。\n\
  - 要么将 `magnetometer` 值添加到应用的 `Required Device Capabilities` 属性中，要么检查 `magnetometerAvailable`\
  \ 属性以确定设备是否具有磁力计。\n\n与加速计和陀螺仪数据类似，`magnetometerData` 属性返回原始、未经滤波的磁场信息。这将是地球磁场、设备自身磁偏、任何环境磁场、磁干扰等的组合。\n\
  \n从这些数据中分离出磁北方向有一定难度。看起来像北方的方向可能来自微波炉。同样，加速计数据可能因设备倾斜、在移动的车辆中或两者同时发生而改变。你可以通过收集并关联多个仪器的数据来理清一些相互矛盾的指标。例如，通过检查加速计和陀螺仪的变化，可以区分倾斜和水平移动；倾斜会同时改变两者，但水平移动仅会记录在加速计上。\n\
  \n如果你开始感到不安，觉得当初应该在物理和数学课上更用心，那大可放心；iOS 已为你考虑周全。\n\n### 设备运动与姿态\n\n`CMMotionManager`\
  \ 还通过其设备运动接口提供设备物理位置和运动的统一视图。设备运动的属性和方法结合了来自加速计、陀螺仪以及有时是磁力计的信息。它整合所有这些数据，并生成一个经过滤波、统一且校准的设备在空间中的运动与位置图像。\n\
  \n你使用设备运动的方式与使用前述三种仪器非常相似：\n\n- 使用 `deviceMotionUpdateInterval` 属性设置设备运动更新的频率。\n\
  - 通过发送 `-startDeviceUpdates`、`-startDeviceMotionUpdatesToQueue:withHandler:`、`-startDeviceMotionUpdatesUsingReferenceFrame:`\
  \ 或 `-startDeviceMotionUpdatesUsingReferenceFrame:toQueue:withHandler:` 消息启动设备运动更新。\n\
  - `deviceMotion` 属性返回一个包含当前运动与姿态信息的 `CMDeviceMotion` 对象。\n- 使用 `deviceMotionAvailable`\
  \ 属性确定设备运动数据是否可用。\n\n设备运动与先前接口有两个主要区别。启动更新时，你可以选择提供一个 `CMAttitudeReferenceFrame`\
  \ 常量，该常量为设备选择参考系。有四种选择：\n\n- 设备方向任意\n- 方向任意，但使用磁力计消除“偏航漂移”\n- 方向校准至磁北\n- 方向校准至真北（需要定位服务）\n\
  \n设备的自然参考位置可以想象为将 iPhone 或 iPad 平放在面前的桌子上，屏幕朝上，主屏幕按钮朝向自己。从主屏幕按钮到设备顶部的连线为 Y 轴。X 轴从左到右水平延伸。Z\
  \ 轴垂直穿过设备，上下方向。\n\n设备仍在桌面上旋转时，会改变其方向。参考系关注的就是这个方向。如果方向无关紧要，你可以使用任意一种参考系。如果需要知道相对于真北或磁北的方向，请使用其中一种校准参考系。\n\
  \n注意\n\n并非所有姿态参考系在每款设备上都可用。请使用 `+availableAttitudeReferenceFrames` 方法确定设备支持哪些参考系。\n\
  \n第二个主要区别是 `CMDeviceMotion` 对象。与其他运动数据对象不同，该对象包含多个属性，如表 16-1 所示。\n\n**表 16-1.**\
  \ 关键 `CMDeviceMotion` 属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `attitude` | 一个 `CMAttitude`\
  \ 对象，描述设备的实际姿态（空间位置），表示为一组三个属性值（`pitch`（俯仰角）、`roll`（翻滚角）和 `yaw`（偏航角））。其他属性以数学上等价的形式（旋转矩阵和四元数）描述相同的信息。\
  \ |\n| `rotationRate` | 一个包含三个值（`x`、`y` 和 `z`）的结构体，描述绕这些轴的旋转速率。 |\n| `userAcceleration`\
  \ | 一个 `CMAcceleration` 结构体（`x`、`y` 和 `z`），描述设备的运动。 |\n| `magneticField` | 一个 `CMCalibratedMagneticField`\
  \ 结构体（`x`、`y`、`z` 和 `accuracy`（精度）），描述地球磁场的方向。 |\n\n乍一看，所有这些信息似乎与来自加速计、陀螺仪和磁力计的数据相同——只是重新包装了一下。实际上并非如此。`CMDeviceMotion`\
  \ 对象结合了来自多个仪器的信息，以更全面地解读设备的运行状态。具体来说：\n\n\n\n"
- '# 初识设备运动接口


  `attitude`属性结合了陀螺仪的角度变化信息、加速度计的重力方向信息，并且可能还会使用磁力计来校准方向（绕 Z 轴旋转）并防止漂移。


  `userAcceleration`属性关联了加速度计和陀螺仪的数据，排除了重力和姿态变化的影响，以提供精确的加速度测量值。


  `magneticField`属性会调整设备偏差，并尝试补偿磁干扰。


  总之，设备运动接口（Device Motion Interface）信息更丰富、更智能。如果说它有缺点，那就是它需要更多的处理能力，这会消耗应用性能并缩短电池寿命。如果你的应用只需要了解运动或旋转的大致情况，那么加速度计或陀螺仪的原始数据就足够了。但如果你真的想了解设备的位置、方向或朝向，那么设备运动接口已经为你计算好了。


  > **注意**

  > 设备可能需要以“8”字形移动来帮助校准磁力计。如果你将`CMMotionManager`的`showsDeviceMovementDisplay`属性设置为`YES`，iOS
  会自动显示一个提示用户进行此操作的界面。


  ## 测量变化


  如果你的应用需要了解任何运动测量值的变化率，它就需要时间信息。例如，要测量角度旋转的变化，你需要用当前速率减去上一次速率，再除以两个样本之间的时间差。


  但你在哪里能找到这些测量的时间呢？在前面的章节中，我写道：“`CMAccelerometerData`唯一的属性是`acceleration`”，以及关于`CMGyroData`和`CMMagnetometerData`的类似陈述。这并不完全正确。


  `CMAccelerometerData`、`CMGyroData`、`CMMagnetometerData`和`CMDeviceMotion`类都是`CMLogItem`的子类。`CMLogItem`类定义了一个`timestamp`属性，上述所有类都继承了该属性。


  `timestamp`属性记录了测量发生的精确时间，允许你的应用精确地比较样本、计算变化率、为后续记录或任何你想到的其他目的。


  > **提示**

  > 如果你需要计算姿态变化（减去两个`CMAttitude`对象的值），`-multiplyByInverseOfAttitude:`方法可以为你完成计算。


  ## 总结


  在本章中，你已经接触到了设备加速度计、陀螺仪和磁力计的未经过滤的原始数据。你知道了如何配置你想要收集的数据、如何解读这些数据，并学会了如何使用定时器来采集数据。你还学会了如何利用设备运动数据来更全面地了解设备在空间中的位置。几乎没有任何运动或移动是你的应用无法检测和响应的。


  嗯，差不多。尽管关于设备方向及其如何移动的信息非常详尽，但仍然缺少一项信息：设备的位置。你将在下一章中解开这个剩下的谜题。


  **脚注**


  [1] 韦恩·萨林斯基（Wayne Szalinski）是电影《亲爱的，我把孩子缩小了》中那位倒霉的发明家。


  [2] 查阅“leveler”这个词，可以了解一段有趣的英国历史。


  [3] G 是重力单位，等于大约每秒每秒 9.81 米的加速度。


