- "# 通过示例学习\n\n软件开发很像烹饪。阅读菜谱、谈论烹饪过程、享受成果是一回事，实际动手操作则是另一回事。学习烹饪的最佳方法之一，就是观察一位经验丰富的厨师，并模仿他们的手法。\n\
  \nApple 提供了许多示例项目——这些都是完整编写、可直接运行的应用程序——来演示 iOS 中各种技术的使用。你只需下载一个项目，构建、运行它，然后深入挖掘其中的所有奥秘。这些示例项目是开始使用或至少理解如何使用\
  \ iOS 中众多框架和功能的绝佳途径。\n\nApple 不仅免费提供这些示例项目，而且让下载过程变得异常简单。只需点击一个按钮，Xcode 就会搜索、下载并打开示例代码项目。从\
  \ Xcode 的文档管理器（`帮助 ➤ 文档和 API 参考`）窗口开始，如图 10-1 所示。\n\n![A978-1-4302-5063-0_10_Fig1_HTML.jpg](img/A978-1-4302-5063-0_10_Fig1_HTML.jpg)\n\
  \n图 10-1. 搜索示例代码\n\n搜索 `UICatalog` 项目，如图 10-1 所示。它将出现在“示例代码”类别下。点击它，项目的文档页面便会显示。页面顶部有一个“打开项目”按钮。点击它。Xcode\
  \ 会下载该项目的 ZIP 文件，解压，并在一个新的工作区窗口中打开项目，如图 10-2 所示。是不是非常简单？\n\n![A978-1-4302-5063-0_10_Fig2_HTML.jpg](img/A978-1-4302-5063-0_10_Fig2_HTML.jpg)\n\
  \n图 10-2. `UICatalog` 项目 注\n\n示例项目并非 Xcode 安装包的一部分，需要连接互联网才能下载。\n\n你会注意到，许多类的文档都包含指向示例项目的链接，这使得下载展示这些类实际用法的代码变得非常容易。\n\
  \n**提示**\n\n尽管 Apple 所谓的“围墙花园”将大多数 iOS 应用项目限制在开发者社区内——毕竟，你必须是开发者才能在 iOS 设备上构建和运行应用——但这并未阻止开源社区的发展。外面存在各种各样的开源\
  \ iOS 项目，可供开发者（像你一样）以及那些“越狱”了设备的勇敢人士使用。快速搜索一下互联网，你就能找到开源应用，以及可以在自己项目中使用的框架和代码库。\n\
  \n`UICatalog` 项目尤其特别。它是一个 iPhone 应用，演示了 iOS 提供的所有主要视图对象。因此，它不仅是一个便捷的视觉参考，展示了 iOS\
  \ 提供了哪些类型的视图对象，还能让你精确地看到这些对象在应用中是如何创建和使用的。\n\n在 iPhone 模拟器（或者如果你愿意，也可以在你自己的设备上）运行\
  \ `UICatalog` 应用。列表中的第一项是按钮，如图 10-3 所示，这是一个极佳的起点。\n\n![A978-1-4302-5063-0_10_Fig3_HTML.jpg](img/A978-1-4302-5063-0_10_Fig3_HTML.jpg)\n\
  \n图 10-3. `UICatalog` 应用\n\n## 按钮\n\n按钮是一个非常直接的视图对象；它的行为就像物理按钮。`UIButton` 类负责绘制按钮并观察触摸事件，以确定用户如何与其交互。它将用户的操作转化为动作事件，例如“用户在按钮内触摸”、“用户将手指移动到按钮外”、“用户将手指移回按钮内”以及“用户仍在按钮内时松开了手指”。它的功能大致如此。\n\
  \n我知道你在想什么。好吧，也许我不确定。但我希望你在想，“但按钮的功能远不止这些！它还会向其他对象发送动作消息，它能记住自己的状态，它可以被禁用，并且可以附加手势识别器。这可就多了！”\n\
  \n确实很多，但 `UIButton` 类本身并不做这些事情。`UIButton` 位于一个类链的末端，每个类负责一组紧密相关的行为。软件工程师称每个类都扮演着一个角色。`UIButton`\
  \ 对象的角色就是像一个按钮一样工作。其他类则负责所有那些额外的工作。为了让你更清楚地了解发生了什么，我认为是时候剖析一下 `UIButton` 了。这不仅会帮助你理解\
  \ `UIButton` 是如何构建的，还能让你了解所有控件视图的构造方式。\n\n**注**\n\n在撰写本书的过程中，没有 `UIButton` 对象受到损害。\n\
  \n### 响应者与视图类\n\n`UIButton` 是 `UIControl` 的子类，`UIControl` 是 `UIView` 的子类，而 `UIView`\
  \ 又是 `UIResponder` 的子类。每个类都增加了一层功能，所有这些功能组合在一起，构成了一个按钮。\n\n`UIResponder` 类定义了对象所有与事件相关的功能，其中最值得注意的是处理触摸事件的方法。你已经在第\
  \ 4 章中了解到了关于 `UIResponder` 的所有内容，并且你创建了一个自定义的 `UIView` 对象，用自己的代码覆盖了触摸事件处理方法，因此我在此不再赘述。\n\
  \n`UIButton` 继承的下一层是 `UIView`。`UIView` 是一个庞大而复杂的类。它拥有数十个属性和一百多个方法。它之所以如此庞大，是因为它负责\
  \ iOS 世界中每个可见对象在屏幕上显示的所有方面。它处理视图的几何形状、坐标系、变换（如旋转、缩放和倾斜）、动画、屏幕尺寸变化时视图的重新定位，以及命中测试。它还负责绘制自身、绘制其子视图、决定何时需要重绘这些视图，等等。\n\
  \n`UIView` 一个看似不相关的属性是它的 `gestureRecognizers` 属性。`UIView` 类并不直接处理手势识别器。但由于 `UIView`\
  \ 定义了屏幕上一个可视区域，而任何可视区域都可以附加一个手势识别器，因此这个属性存在于 `UIView` 中。\n\n**手势识别器如何获取事件**\n\n\
  在触摸事件传递过程中，`UIWindow` 对象将事件提供给手势识别器。在第 4 章中，我解释了如何使用命中测试来确定将接收触摸事件的视图。该描述在某种程度上过于简化了流程。\n\
  \n从 iOS 3.2 开始，`UIWindow` 首先查看初始（命中测试）视图，看它是否附加了任何手势识别器对象。如果是，触摸事件会首先发送给这些手势识别器对象，而不是直接传递给视图对象。如果手势识别器不感兴趣，那么事件最终会到达视图对象。\n\
  \n如果需要，有多种方法可以改变这种行为，但这会有点复杂。所有详细信息，请阅读 iOS 事件处理指南中的“手势识别器”章节，你可以在 Xcode 的文档和 API\
  \ 参考中找到它。\n\n因此，关于按钮的所有视觉内容都是在 `UIView` 类中定义的。现在进入下一层，即 `UIControl` 类。\n\n\n\n###\
  \ 控件类\n\n`UIControl` 是一个抽象类，它定义了所有控件对象共有的属性，包括按钮、滑块、开关、步进器等。一个控件对象：\n\n*   向目标对象发送动作消息\n\
  *   可以启用或禁用\n*   可以被选中\n*   可以高亮显示\n*   设定内容如何对齐\n\n上述列表中的第一项最为重要。`UIControl` 类定义了向接收者（通常是控制器对象）传递动作消息的机制。每个\
  \ `UIControl` 对象都维护一个事件表，其中包含触发动作的事件、将接收该动作的对象以及它将发送的动作消息。当你在编辑 Interface Builder\
  \ 文件并将一个事件连接到另一个对象中的动作方法时，你就是在向该对象的事件调度表中添加一个条目。\n\n注意\n\n回想一下第 4 章的内容，一个事件可以关联一个发送给第一响应者的动作消息。你通过指定要发送的消息并将\
  \ `nil` 作为该消息的目标对象来实现这一点。\n\n其他属性（`enabled`、`selected` 和 `highlighted`）是控件外观和行为的通用指示器。`UIControl`\
  \ 的子类会具体定义这些属性的含义（如果有的话）。\n\n`enabled` 属性是最一致的。一个启用的控件对象可以与用户交互，而禁用的控件（`control.enabled=NO`）则会忽略触摸事件。大多数控件类通过使图像变暗或变灰来表明它们处于禁用状态，从而向用户显示该控件是无效的。\n\
  \n`highlighted` 属性用于指示用户当前正在触摸该控件。许多控件在被触摸时会“点亮”，此属性就反映了这一点。\n\n`selected` 属性适用于可以“打开”或“关闭”的控件，例如\
  \ `UISwitch` 类。而那些不会切换状态的控件（如按钮）则会忽略此属性。\n\n`UIControl` 类还通过 `contentVerticalAlignment`\
  \ 和 `contentHorizontalAlignment` 属性引入了对齐（垂直和水平）的概念。大多数控件对象都有某种标题或图像，并使用这些属性将其定位在视图中。\n\
  \n### 按钮类型\n\n现在你已经回到了 `UIButton` 类。正是这个类实现了控件+视图+响应者对象的按钮特定行为。`UIButton` 类提供了一些预定义的按钮外观，以及大量的自定义选项，因此你可以让它看起来几乎是你想要的任何样式。\n\
  \n按钮最重要的属性是其类型。一个按钮可以是以下类型之一：\n\n*   圆角矩形\n*   自定义\n*   “披露详情”箭头\n*   “信息”按钮（浅色或深色）\n\
  *   “添加联系人”加号符号\n\n除了自定义类型外，所有这些按钮类型都在 UICatalog 应用中显示，如图 10-4 所示。要记住的重要一点是，按钮的类型是在创建时确定的。与所有其他属性不同，之后无法更改它。圆角矩形按钮终生都是圆角矩形按钮。\n\
  \n![A978-1-4302-5063-0_10_Fig4_HTML.jpg](img/A978-1-4302-5063-0_10_Fig4_HTML.jpg)\n\
  \n图 10-4.\n\n按钮\n\n圆角矩形按钮是 iOS 的主力。它是 iOS 界面中使用的标准、默认按钮样式。你还会注意到，圆角按钮（图 10-4 中左中位置）并没有什么“圆角”之处。iOS\
  \ 7 引入了一种新的、精简的 UI 设计，摒弃了早期版本的拟物化按钮设计。然而，类和常量名称并未改变。当你希望为用户正在运行的 iOS 版本呈现标准按钮设计时，请选择“圆角”按钮。\n\
  \n自定义按钮样式则是一块空白画布。iOS（所有版本）不会对自定义按钮的外观做任何添加，让你完全控制其外观。你在第 2 章的超现实主义应用中使用了自定义按钮样式。\n\
  \n你可以通过调整按钮的颜色、文本、文本样式，甚至为按钮的标题和背景提供你自己的图像，来极大地改变按钮的基本外观。\n\n注意\n\n在撰写本书时，UICatalog\
  \ 项目尚未完全针对 iOS 7 的新 UI 设计进行更新。我完全期望它会被修订，因此你应用中的控件可能会与这里看到的有所不同。\n\n调整按钮外观的主要属性包括：\n\
  \n*   色调颜色\n*   标题文本（纯文本或属性文本）及其颜色\n*   前景图像\n*   背景图像或颜色\n\n`tintColor` 属性设置圆角矩形按钮的高亮和强调色。标准颜色是蓝色。其他按钮类型会忽略此属性。\n\
  \n按钮的标题可以是一个简单的字符串值（到目前为止你在项目中使用的），也可以是一个属性字符串。属性字符串是包含文本属性的字符串：字体、大小、斜体、粗体、下标偏移等。创建属性字符串有点复杂，但允许你创建具有系统能够支持的任何字体和样式的按钮。我将在第\
  \ 20 章中描述属性字符串。\n\n你也可以通过设置图像属性，使用图像而不是文本来作为按钮的标签。类似地，背景可以设置为图像或纯色。你还可以以任意组合方式混合使用它们：文本标题在图像背景之上，图像在纯色背景之上，图像没有背景（通过将背景色设置为\
  \ `UIColor` 的 `clearColor` 对象），等等。\n\n那些具有圆角矩形外观的按钮（图 10-4 左上角）在此例中使用了它们自己的背景图像\
  \ `whiteButton.png`。用于按钮背景的图像可以利用内边距（`capInsets`）属性来定义图像边缘的边距，当图像被拉伸以适合按钮大小时，这些边缘不会被缩放。此功能允许你设计单个图形图像，它可以填充任何按钮大小，而不会使边缘变形。将\
  \ Xcode 中的 `whiteButton.png` 资源图像与应用运行时它在按钮中的显示效果进行比较。\n\n提示\n\n尽管我将教你自定义按钮、滑块等外观的主要方法，但我还是鼓励你三思而后行。不要仅仅因为你能改变按钮的外观就去改变它。用户之所以知道按钮是做什么的，是因为它看起来像一个按钮。仅仅为了与众不同而改变它，只会让你的应用更难使用。只有当控件的标准外观与设计的其他部分在美学上发生冲突时，我才会考虑自定义控件的外观。\n\
  \n其余按钮类型（详情披露、信息、添加联系人等）是预定义的按钮，自定义选项很少。当你的应用提供这些确切功能时，请使用这些类型，你的用户将会确切理解它们的含义。\n\
  \n\n### 控制状态\n\n在创建和配置按钮的标题、图像、背景图像和背景颜色时，必须考虑按钮（控件）可能处于的各种状态。`UIControl` 的 `enabled`、`highlighted`\
  \ 和 `selected` 属性组合起来，为该控件形成一个单一的 `state` 值（`UIControlState`）。状态始终为以下之一：正常、高亮、禁用或选中。\n\
  \n当按钮正常显示时，其状态为 `UIControlStateNormal`。当用户触摸它时，其状态变为 `UIControlStateHighlighted`。当它被禁用时，其状态变为\
  \ `UIControlStateDisabled`。\n\n当你设置按钮的标题、图像、背景或颜色时，你是针对特定状态进行设置的。这允许你为按钮启用时设置一个按钮图像，并为禁用、高亮或选中时设置备用按钮图像。你可以在设置这些属性的方法中看到这一点：\n\
  \n`- (void)setTitle:(NSString *)title forState:(UIControlState)state`\n\n`- (void)setTitleColor:(UIColor\
  \ *)color forState:(UIControlState)state`\n\n`- (void)setImage:(UIImage *)image\
  \ forState:(UIControlState)state`\n\n`- (void)setBackgroundImage:(UIImage *)image\
  \ forState:(UIControlState)state`\n\n你无需为每个状态都设置值。至少，你应该为正常（`UIControlStateNormal`）状态设置值。如果你只设置了这些，那么该值将用于所有其他状态。如果你随后希望它在其他某个状态下具有不同的标题、图像、背景或颜色，也请进行相应设置。\n\
  \n还有许多其他更微妙的属性可用于微调按钮的外观和感觉。例如，你可以控制标题文本投下的阴影，或更改标题、图像和背景图像的位置（内边距）。请通读 `UIButton`\
  \ 的文档以了解所有可用的属性。\n\n最后四种按钮类型——披露箭头、信息（浅色）、信息（深色）和添加联系人——是预定义用户界面按钮的便捷类型。这些按钮的外观或行为几乎没有任何可以自定义的部分。\n\
  \n### 按钮代码\n\n现在你已经对按钮属性有了足够的了解，可以看一下 UICatalog 中的按钮构建代码了。到目前为止，你一直在使用 Interface\
  \ Builder 创建按钮对象——这很好，没有任何问题。但你也可以像处理数组和图像等其他对象一样，以编程方式创建任何 iOS 对象。\n\nUICatalog\
  \ 应用程序以编程方式创建了其大部分对象，它甚至提供了这些创建发生位置的提示，以便你可以找到相关代码。在图 10-4 中，按钮下方的文字显示为“ButtonsViewController.m:\
  \ (UIButton*)roundedButtonType”。切换回 Xcode，找到 `ButtonsViewController.m` 文件。点击它，找到\
  \ `-roundedButtonType` 方法。它应该看起来像这样：\n\n```\n- (UIButton *)roundedButtonType\n{\n\
  \    if (roundedButtonType == nil)\n    {\n        roundedButtonType = [[UIButton\
  \ buttonWithType:UIButtonTypeRoundedRect] retain];\n        roundedButtonType.frame\
  \ = CGRectMake(182.0, 5.0,\n                                             kStdButtonWidth,\
  \ kStdButtonHeight);\n        [roundedButtonType setTitle:@\"Rounded\" forState:UIControlStateNormal];\n\
  \        roundedButtonType.backgroundColor = [UIColor clearColor];\n        [roundedButtonType\
  \ addTarget:self action:@selector(action:)\n                    forControlEvents:UIControlEventTouchUpInside];\n\
  \        roundedButtonType.tag = kViewTag;\n    }\n    return roundedButtonType;\n\
  }\n```\n\n这个方法延迟创建了在 UICatalog 应用程序中显示为“Rounded Button”的按钮。如果你想尝试不同的圆角矩形按钮属性以查看其效果，可以修改此代码并重新运行应用程序。\n\
  \n## 开关和滑块\n\n接下来要介绍的是开关和滑块。两者都是输入设备。与按钮不同，开关和滑块会保留一个值。开关如图 10-5 所示。它呈现一个滑动按钮，可以通过点击或用手指滑动在“开”和“关”值之间切换。你在\
  \ iOS 中随处可见它们，如图 10-5 右侧所示。\n\n![A978-1-4302-5063-0_10_Fig5_HTML.jpg](img/A978-1-4302-5063-0_10_Fig5_HTML.jpg)\n\
  \n图 10-5. 开关、滑块和“设置”应用\n\n一个 `UISwitch` 对象具有一个名为 `on` 的布尔值属性，命名非常贴切。获取该属性会告诉你开关处于哪个位置。设置该属性会改变它。你可以通过向其发送\
  \ `-setOn:animated:` 消息并将 `animated` 参数设置为 `YES`，来请求 `UISwitch` 在以编程方式更改其值时执行一些动画特效。\n\
  \n有许多属性可以让你自定义开关的外观：\n\n- `tintColor`、`onTintColor` 和 `thumbTintColor`：前两个设置开关关闭和打开时使用的颜色。`thumbTintColor`\
  \ 使开关的“拇指”（你拖动的圆圈）的颜色与 `tintColor` 不同。\n- `onImage` 和 `offImage`：通常，开关会在拇指旁边显示（本地化的）“开”或“关”文本标题。你可以用自己选择的图像替换它们。这里有重要的尺寸限制，因此请阅读文档。\n\
  \n与大多数具有值的控件一样，开关在用户更改其值时会发送一个“值已更改”事件（`UIControlEventValueChanged`）。将此事件连接到你的控制器，以便在开关被翻转时接收操作消息。\n\
  \n同样在图 10-5 中显示的滑块是另一种输入控件，允许用户通过将滑块拖动到预定范围内的某个位置来选择值。开关的值是布尔值，而滑块的值属性是一个浮点值，表示一个连续的数字范围。\n\
  \n滑块的值属性被限制在由 `minimumValue` 和 `maximumValue` 属性设置的范围内。这两个属性的默认值分别为 `0` 和 `1`。除非你更改它们，否则\
  \ `value` 将是介于 0 和 1 之间（含端点）的小数。\n\n关键的视觉自定义属性包括：\n\n- `minimumTrackTintColor`、`maximumTrackTintColor`\
  \ 和 `thumbTintColor`：更改轨道（拇指左侧和右侧）以及拇指本身的颜色。有关示例以及实现代码，请参见 UICatalog 中的“Customized\
  \ Slider”（图 10-4）。\n- `minimumValueImage`、`maximumValueImage`、`thumbImage`（按 `state`\
  \ 设置）：与滑块类似，你可以更改用于绘制滑块轨道以及拇指本身的图像。拇指图像的工作原理与 `UIButton` 的图像类似，你可以为不同的状态（正常、高亮和禁用）提供不同的图像。\n\
  \n当用户移动滑块时，滑块会发送一个单一的“值已更改”事件，除非你将 `continuous` 属性设置为 `YES`。如果设置了 `continuous`，则当用户拖动滑块时，控件会持续发送一系列“值已更改”消息。你在第\
  \ 8 章的 ColorModel 应用程序中使用了此设置，以便在拖动滑块时颜色变化能够“实时”发生。\n\n\n\n"
- '# 页面控件


  页面控件（`UIPageControl`）对象，如图 10-6 所示，可视为一种离散的滑块控件。顾名思义，它用于指示用户在少量（最多 20 个）页面或项目中的当前位置。苹果的天气应用便使用它来指示用户当前正在查看的位置，如图
  10-6 右侧所示。


  ![A978-1-4302-5063-0_10_Fig6_HTML.jpg](img/A978-1-4302-5063-0_10_Fig6_HTML.jpg)


  **图 10-6.** 页面控件与天气应用


  `UIPageControl`的整型属性`currentPage`表示其当前值，而`numberOfPages`属性则决定了前者的取值范围以及显示圆点的数量。其外观可通过以下属性进行微调：


  -   `pageIndicatorTintColor`：设置页面指示器的颜色。

  -   `hidesForSinglePage`：若设为`YES`，当只有一页时（即`numberOfPages <= 1`），该控件将不绘制任何内容。


  在页面控件的当前页面左侧或右侧点击，会使`currentPage`属性值减一或加一（即向前或向后翻一页），并发送一个“值已更改”事件。


  '
- '# 步进器


  步进器（`UIStepper`）拥有`UIButton`的外观和`UIPageControl`的核心功能，如图 10-7 所示。它并排显示两个按钮。当用户需要逐步增加或减少某个值（具体增减什么由你决定，步进器本身不显示数值）时，可使用步进器。


  ![A978-1-4302-5063-0_10_Fig7_HTML.jpg](img/A978-1-4302-5063-0_10_Fig7_HTML.jpg)


  **图 10-7.** 步进器


  与滑块类似，步进器的`minimumValue`和`maximumValue`属性用于设定其`value`属性的范围。`stepValue`属性则定义了“一步”的具体含义。例如，表
  10-1 展示了一个取值范围在`1.0`到`6.0`之间、共 11 个可能取值的步进器所需设置的属性值。


  **表 10-1.** 具有 11 个可能取值（含 1.0 至 6.0）的步进器的属性值


  | 属性 | 值 |

  | --- | --- |

  | `minimumValue` | `1.0` |

  | `maximumValue` | `6.0` |

  | `stepValue` | `0.5` |


  步进器的视觉外观可通过设置递增、递减和背景图像进行自定义，其设置方式与按钮相同。此外，还有一个类似`UIButton`的`tintColor`属性。


  每当用户点击递增或递减按钮时，步进器都会发送一个“值已更改”的操作事件。有以下三个属性可以改变这一行为：


  -   `continuous`：`continuous`属性的工作方式与滑块中的完全相同。

  -   `autorepeat`：将`autorepeat`设置为`YES`，允许用户通过长按其中一个按钮来持续改变（一次一步）数值。

  -   `wraps`：此属性允许数值在范围内“循环”。以表 10-1 为例，当值已经是`6.0`时点击加号，数值会变回`1.0`。当`wraps`为`YES`时，数值达到范围起点或终点时，按钮不会失效。


  '
- '# 分段控件


  `UISegmentedControl`类与步进器密切相关。分段控件显示多个分段，每个分段作为一个选择按钮，如图 10-8 所示。当希望用户在少量互斥选项中进行选择时，可使用分段控件。


  ![A978-1-4302-5063-0_10_Fig8_HTML.jpg](img/A978-1-4302-5063-0_10_Fig8_HTML.jpg)


  **图 10-8.** 分段控件


  分段控件有四种风格：普通、带边框、工具栏样式和带边框样式。`UICatalog`示例应用演示了前三种风格。工具栏样式和带边框样式可以通过设置`tintColor`属性来着色，这在`UICatalog`中也有演示。


  要使用分段控件，首先需要通过设置`numberOfSegments`属性来告知其分段的个数。然后，你可以使用以下方法之一，将每个分段的标签设置为字符串标题或图像：


  ```

  - (void)setTitle:(NSString *)title forSegmentAtIndex:(NSUInteger)segment

  - (void)setImage:(UIImage *)image forSegmentAtIndex:(NSUInteger)segment

  ```


  或者，你也可以选择逐个插入（或移除）分段。使用这些方法时，你可以选择让视图为更改添加动画效果，滑动并调整其他分段的大小以腾出空间：


  ```

  - (void)insertSegmentWithTitle:(NSString *)title atIndex:(NSUInteger)segment animated:(BOOL)animated

  - (void)insertSegmentWithImage:(UIImage *)image atIndex:(NSUInteger)segment animated:(BOOL)animated

  ```


  当用户更改分段控件时，它会发送一个“值已更改”事件（`UIControlEventValueChanged`）。其`selectedSegmentIndex`属性用于告知哪个分段被选中，或可用于更改选中状态。特殊值`UISegmentedControlNoSegment`表示没有分段被选中。


  通常情况下，分段控件中的按钮具有“粘滞”特性——它们会保持按下状态以指示当前选中的分段。如果你将`momentary`属性设置为`YES`，按钮将不会保持按下状态，并且当用户抬起手指时，`selectedSegmentIndex`会恢复为`UISegmentedControlNoSegment`。


  '
- '# 进度指示器


  iOS 提供了两个进度指示器：`UIActivityIndicatorView`和`UIProgressView`。它们在耗时操作期间为用户提供反馈，或用于显示相对数量（例如已使用的存储空间），如图
  10-9 所示。使用它们可以让用户知道你的应用正在努力工作；他们应该保持冷静，坐在座位上，并系好安全带。


  ![A978-1-4302-5063-0_10_Fig9_HTML.jpg](img/A978-1-4302-5063-0_10_Fig9_HTML.jpg)


  **图 10-9.** 活动指示器与进度条


  `UIActivityIndicatorView`通常被称为“旋转齿轮”或“菊花转”。当空间有限或操作持续时间不确定或未知时，可以使用它。有三种旋转风格可供选择：小灰色（`UIActivityIndicatorViewStyleGray`）、小白色（`UIActivityIndicatorViewStyleWhite`）和大白色（`UIActivityIndicatorViewStyleWhiteLarge`）。


  使用旋转齿轮很简单。向其发送`-startAnimating`消息即可开始旋转，发送`-stopAnimating`消息即可停止。其`hidesWhenStopped`和`color`属性意义自明。


  第二个指示器是进度条（`UIProgressView`）。它呈现一个进度指示器，任何曾耗费生命等待电脑完成某些任务的人都对它很熟悉。该视图有两种外观：


  -   `UIProgressViewStyleDefault`：常规样式的进度条。

  -   `UIProgressViewStyleBar`：专为工具栏设计的样式。


  你通过定期将其`progress`属性设置为`0`（空）到`1`（满）之间的值来控制视图。设置`progress`属性会使指示器直接跳转到该位置。通过发送`-setProgress:animated:`消息，你可以让指示器平滑地动画过渡到新设置，这对于大幅度变化来说不那么突兀。


  使用`trackImage`或`trackTintColor`属性自定义视图未完成部分的外观，使用`progressImage`和`progressTintColor`属性调整已完成部分。`UICatalog`示例应用的工具栏中有一个“Tint”按钮，演示了当`progressTintColor`和`trackTintColor`设置为蓝色时的效果。


  '
- "# 文本视图\n\n文本视图有三种类型：标签、文本字段和文本视图。标签是最简单的，用于在界面中放置单行文本，通常位于其他字段或视图旁边以说明其用途，这也是其名称的由来。文本字段是一个通用输入字段，为单行文本提供功能全面的编辑能力。文本视图则可以显示和编辑多行文本。让我们从简单的开始讲起。\n\
  \n\n\n### 标签\n\n你在 iOS 中随处可见标签（请参见本书中几乎所有图示），并且在你的项目中也多次使用过它们。无论出于何种目的，只要你只想显示一些文本，就该使用`UILabel`对象。通过在\
  \ Interface Builder 中设置标签的文本，并将标签对象作为标签使用，而无需建立连接。如果将标签连接到插座变量，你的控制器就能更新文本，就像你在\
  \ ColorModel 应用中所做的那样。\n\n标签有一些可选属性，可以让你改变文本字符串的显示方式，如表 10-2 所示。\n\n表 10-2. 标签显示属性\n\
  \n| 属性 | 描述 |\n| --- | --- |\n| `numberOfLines` | 标签将显示的最大行数，通常为`1`。设置为`0`可根据需要显示任意多行。\
  \ |\n| `font` | 文本的字体（字型、大小和样式） |\n| `textColor` | 用于绘制文本的颜色 |\n| `textAlignment`\
  \ | 可选值：左对齐、居中、右对齐、两端对齐或自然对齐。自然对齐采用字体的原生对齐方式。 |\n| `attributedText` | 绘制属性字符串，而非简单的文本属性。用于显示混合了不同字体、大小、样式和颜色的文本。字符串中的文本属性会覆盖其他文本样式属性（`font`、`textColor`、`shadowOffset`等）。\
  \ |\n| `lineBreakMode` | 决定如何让过长的字符串适应视图的可用空间。 |\n| `adjustsFontSizeToFitWidth`\
  \ | 作为缩短字符串的替代方案，它会使文本变小，以便整个字符串能够适应。 |\n| `adjustLetterSpacingToFitWidth` | 让字符串适应给定空间的第三种选项。\
  \ |\n\n如果你打算显示可变数量的文本，请注意那些控制字符串过大无法适应视图时如何处理文本的属性。首先是`numberOfLines`和`lineBreakMode`属性。换行模式控制字符串如何在多行中拆分。对于多行标签（`numberOfLines\
  \ != 1`），可选择在最近字符处换行（`NSLineBreakByCharWrapping`）或在最近单词处换行（`NSLineBreakByWordWrapping`）。\n\
  \n对于单行标签（`numberOfLines == 1`），无法适应视图的文本要么被直接截断（`NSLineBreakByClipping`），要么将字符串开头（`NSLineBreakByTruncatingHead`）、中间（`NSLineBreakByTruncatingMiddle`）或末尾（`NSLineBreakByTruncatingTail`）的一部分替换为省略号（`...`）字符。\n\
  \n让文本适应视图的另一种方法是设置`adjustsFontSizeToFitWidth`或`adjustLetterSpacingToFitWidth`属性为`YES`。这些选项会导致词间距或字体大小——你也可以同时设置两者——被缩小，试图让字符串适应可用空间。词间距绝不会缩小为零，字体大小也绝不会低于`minimumScaleFactor`属性。如果文本仍然无法适应，则会应用`lineBreakMode`。\n\
  \n> **警告**  \n> 请不要为多行（`numberOfLines != 1`）标签设置`adjustsFontSizeToFitWidth`或`adjustsLetterSpacingToFitWidth`，也不要与多行换行模式（字符或单词换行）结合使用。这样做属于编程错误，视图的行为将不可预测。\n\
  \n### 文本字段\n\n当你希望用户输入或编辑一行文本时，请使用文本字段（`UITextField`）。Shorty 应用使用文本字段来获取用户输入的 URL。\n\
  \nUICatalog 应用展示了四个文本字段，如图 10-10 所示。\n\n![A978-1-4302-5063-0_10_Fig10_HTML.jpg](img/A978-1-4302-5063-0_10_Fig10_HTML.jpg)\n\
  \n图 10-10. 文本字段\n\n我们从字段的外观开始。有四种基本样式可供选择，由`borderStyle`属性控制：\n\n*   `UITextBorderStyleBezel`：用凿刻边框环绕字段，营造出字段内凹的视觉效果。\n\
  *   `UITextBorderStyleRoundedRect`：在字段周围绘制一个简单的圆角矩形。\n*   `UITextBorderStyleLine`：在字段周围绘制一个细灰色矩形。\n\
  *   `UITextBorderStyleNone`：不绘制边框。\n\nUICatalog 应用仅演示了凿刻边框和圆角矩形样式，但另外两种不难想象。你可以通过将背景属性设置为你自己的`UIImage`来提供更引人注目的外观。背景属性会覆盖`borderStyle`属性。换句话说，你无法为凿刻边框提供背景图像；如果你想要那种外观，你的图像需要包含凿刻边框。\n\
  \n`placeholder`属性在字段为空时显示一个字符串（浅灰色）。使用此属性来提示用户（例如“在此输入您的姓名”），或者可能显示一个默认值。如果你希望在用户开始输入前自动清除字段中的文本，请将`clearsOnBeginEditing`设置为`YES`。\n\
  \n字段中文本的字体、大小、样式和颜色可以通过设置`font`和`textColor`属性来控制，或者使用属性文本字符串。后者要复杂得多，也要灵活得多。\n\n\
  你还可以在三个不同位置插入附属视图。使用这些可以添加额外的控件或指示器，例如弹出字段选项集的按钮，或进度指示器。附属视图属性包括：\n\n*   `leftView`\
  \ 和 `leftViewMode`\n*   `rightView` 和 `rightViewMode`\n*   `inputAccessoryView`\n\
  \n左视图和右视图可以是任何能放入文本字段的`UIView`对象。UICatalog 应用通过向文本字段添加`UIImageView`来演示这一点。右视图和左视图的显示由其对应的`rightViewMode`和`leftViewMode`属性控制。每个都可以设置为：从不显示视图、始终显示视图、仅在编辑时显示视图，或仅在不编辑时显示视图。\n\
  \n输入辅助视图并不附加到文本字段上。相反，它附加到用户开始编辑时出现的虚拟键盘顶部。你可以使用输入辅助视图来添加特殊控件、预设、选项等。\n\n文本字段会发送各种事件。最有用的是“编辑结束时退出”事件（`UIControlEventEditingDidEndOnExit`），当用户停止编辑字段时发送；以及“值已更改”事件（`UIControlEventValueChanged`），每当字段中的文本被修改时发送。你在\
  \ MyStuff 应用中将操作连接到了这两个事件。要接收更多与编辑相关的消息，并对编辑施加一些控制，请为文本字段创建一个委托对象（`UITextFieldDelegate`）。委托会在编辑开始和结束时收到消息，并且还可以控制是否允许开始编辑、是否允许结束编辑，或是否允许进行特定的更改。\n\
  \n\n\n"
- '# 文本编辑行为


  影响文本字段内编辑方式的属性多如牛毛。如果你在`UITextField`的文档中查找，会发现找不到任何与编辑相关的属性。这是因为这些属性都定义在`UITextInput`和`UITextInputTraits`协议中，而`UITextField`和`UITextView`都遵循了这两个协议。这些属性和选项的数量几乎令人眼花缭乱，因此我将其要点整理在表
  10-3 中。


  表 10-3. 重要的文本编辑属性


  | 属性 | 说明 |

  | --- | --- |

  | `autocapitalizationType` | 控制自动大写模式：关闭，或对句子、单词、字符进行大写 |

  | `autocorrectionType` | 开启或关闭自动纠正 |

  | `spellCheckingType` | 开启或关闭拼写检查、建议和字典查询 |

  | `keyboardType` | 选择使用的虚拟键盘（标准、URL、纯数字、电话拨号、电子邮件地址、Twitter 等） |

  | `returnKeyType` | 如果键盘带有“执行”键，该属性决定其标签文字：前往、Google、加入、下一步、路线、搜索、发送、Yahoo!、完成或紧急呼叫。
  |

  | `secureEntry` | 用户输入时隐藏字符，防止旁人看到内容。对密码等敏感信息应开启此选项。 |


  '
- '# 文本视图


  文本视图（`UITextView`）对象是标签和文本字段的结合体。它并非两者的子类，但本质上继承了两者的功能，并添加了一些额外特性。文本视图是否可编辑，由其`editable`属性控制。


  当`editable`设置为`NO`时，文本视图的行为类似于多行标签。它能够以多种字体、字号和样式显示多行文本，并控制换行方式。在此基础上，它还增加了一些额外功能：滚动、选择和**数据检测器**。


  与标签不同，如果文本超出视图的垂直空间，用户可以通过滚动文本视图来查看剩余内容。你在 Surrealist 应用中就使用过这一功能。


  用户可以在文本视图中选择文本（通过长按文字）。选中的文本可以复制到剪贴板，或用于在字典中查询单词。此外，你还可以启用数据检测器。数据检测器是一种技术，能够识别特定文本的用途（例如电话号码或某人的电子邮件地址）。用户随后可以点击该文本执行相关操作（拨打电话、撰写新邮件等）。


  当`editable`属性设置为`YES`时，文本视图会变成一个（迷你）文字处理软件。用户可以随心所欲地输入、选择、剪切、复制和粘贴。所有在“文本字段”一节中描述的编辑功能和选项都适用于文本视图。唯一缺少的可能是边框；文本视图不会绘制边框。


  文本视图还能够编辑带样式（属性字符串）的文本，但你需要提供额外的用户界面元素，让用户能够选择字体、字号、样式、颜色等。文本视图会处理将这些样式应用到用户输入内容的机制，但你的控制器必须告知文本视图具体是哪些样式。


  在以下情况中，应使用文本视图，而非标签或文本字段：


  - 用户需要编辑多行文本

  - 文本内容超出视图范围，且希望实现滚动

  - 希望用户能够选择、复制文本，或查询定义

  - 希望使用数据检测器


  '
- '# 选择器


  在 iOS 中，“选择器”是一种用户界面，让用户从预定义的集合中进行选择。你在 MyStuff 中使用了**图像选择器**从照片库中选取图片，在 DrumDub
  中使用了**媒体选择器**从 iTunes 库中选取歌曲。这些都是占据整个用户体验的大型界面。


  iOS 还提供了几个较小的选择器视图对象：有专门用于选择日期和时间的`UIDatePicker`，以及可自定义的`UIPickerView`，用于处理其他所有选择。两者都显示一个包含多个垂直“滚轮”的视图，用户通过旋转滚轮来选择所需的值或项目，如图
  10-11 所示。


  ![A978-1-4302-5063-0_10_Fig11_HTML.jpg](img/A978-1-4302-5063-0_10_Fig11_HTML.jpg)


  图 10-11. 选择器视图


  ## 日期选择器


  当你希望用户选择日期、时间或时长时，请使用日期选择器。日期选择器有四种不同的界面，由其`datePickerMode`属性控制。该属性可设置为表 10-4 中列出的四个值之一。这四种不同的模式如图
  10-12 所示。


  ![A978-1-4302-5063-0_10_Fig12_HTML.jpg](img/A978-1-4302-5063-0_10_Fig12_HTML.jpg)


  图 10-12. 日期选择器模式


  表 10-4. 日期选择器模式


  | 模式 | 说明 |

  | --- | --- |

  | `UIDatePickerModeTime` | 选择一天中的某个时间 |

  | `UIDatePickerModeDate` | 选择一个日历日期 |

  | `UIDatePickerModeDateAndTime` | 选择日期和时间 |

  | `UIDatePickerModeCountDownTimer` | 选择时长（小时和分钟） |


  选择器的`date`属性报告用户已选定的值。设置该属性会改变视图中的日期/时间。如果你想设置`date`并让“滚轮”旋转到新位置，请发送`-setDate:animated:`消息。使用纯日期界面时，日期属性中的时间部分为`0:00`。同样，使用纯时间或时长界面时，日期属性中的日历日是无效的。


  如果你想限制用户可选值的范围，请设置`minimumDate`和/或`maximumDate`属性。例如，要强制用户选择未来的某一天，可将`minimumDate`设置为明天。


  你还可以通过`minuteInterval`属性减少时间选择的粒度。当设置为`1`时，用户能够以 1 分钟为增量选择任何时间或时长（2:30、2:31、2:32
  等）。将`minuteInterval`设置为`5`会将用户的选择限制为 5 分钟间隔（2:30、2:35、2:40、2:45 等）。


  > **注意：** `minuteInterval`的值必须能整除 60，且不能大于 30。


  如果你计划使用日期选择器，并且界面会随时间推移让选择器保持可见，Apple 建议实时更新选择器。例如，如果你的界面使用时长选择器和开始按钮，按下开始按钮可能会触发应用中的某个计时器开始倒计时。在此期间，你的应用应定期更新选择器，使其随时间倒计时至零而缓慢（每分钟一次）变化。




  ### 任意选择器


  如果你不需要选择日期或时间呢？如果你需要选择冰淇淋口味、汽车型号或宿敌呢？`UIPicker`对象就是一个通用的选择器视图。它的外观和功能与日期选择器类似，但区别在于你可以自定义滚轮及其内容（参见图
  10-11）。


  `UIPicker`使用委托和数据源机制，这与表视图（第 5 章）惊人地相似。`UIPicker`需要委托对象（`UIPickerDelegate`）和数据源对象（`UIPickerDataSource`）。选择器的数据源决定了滚轮的数量（称为组件）以及每个滚轮上的选项数量（称为行）。委托对象则提供每个选项的标签。至少，你必须实现以下`UIPickerDataSource`方法：


  ```objc

  - (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView


  - (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component

  ```


  以及以下任一`UIPickerDelegate`方法：


  ```objc

  - (NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component


  - (NSAttributedString *)pickerView:(UIPickerView *)pickerView attributedTitleForRow:(NSInteger)row
  forComponent:(NSInteger)component


  - (UIView *)pickerView:(UIPickerView *)pickerView viewForRow:(NSInteger)row forComponent:(NSInteger)component
  reusingView:(UIView *)view

  ```


  > **提示**：大多数情况下，单个对象同时作为选择器的委托和数据源，因此两个协议之间的方法划分并不重要。


  第一个数据源方法告诉选择器有多少个滚轮。第二个方法会针对每个滚轮调用一次，返回该滚轮中的行数。


  最后（与表视图数据源非常类似），委托方法返回每个滚轮中每行的标签。根据你希望每行内容的复杂程度，你可以选择实现以下三种方法之一：


  - 实现`-pickerView:titleForRow:forComponent:`以显示纯文本标签。该方法返回每行的简单字符串值，这是最常见的方式。参见图
  10-11 中间部分。

  - 实现`-pickerView:attributedTitleForRow:forComponent:`以显示包含特殊字体或样式的标签。该方法返回每行的属性字符串。UICatalog
  中没有包含属性字符串的示例，但这意味着标签可以混合多种字体、大小和样式。

  - 实现`-pickerView:viewForRow:forComponent:reusingView:`以在行中显示任意内容。该方法返回一个`UIView`对象，用于绘制该行。参见图
  10-11 右侧部分。


  最后一种方法最类似于表视图对单元格对象的使用。对于选择器，你可以为每一行提供不同的`UIView`对象，或者反复使用单个`UIView`对象。与表视图不同，这里没有行单元格对象缓存。相反，上一次返回的`UIView`对象会在下一次发送`-pickerView:viewForRow:forComponent:reusingView:`时传回给你的委托。如果你要重用单个`UIView`对象，则修改该视图并再次返回。如果不重用（或者`view`参数为`nil`），则返回一个新的视图对象。


  如果你想控制每个滚轮的宽度或行高，可以分别实现可选的`-pickerView:widthForComponent:`或`-pickerView:rowHeightForComponent:`方法。


  查看 UICatalog 应用程序中实现简单选择器的代码（图 10-11 中间部分），你可以在`PickerViewController.m`文件中找到它。使用自定义视图对象实现选择器的代码（图
  10-11 右侧部分）位于`CustomPickerDataSource.m`文件中。用作每行橡皮图章的视图对象在`CustomView.m`中定义。


  `UIPickerView`对象不是控件对象，它们不是`UIControl`的子类，也不会发送动作消息。相反，当用户更改某个滚轮时，选择器的委托会收到`-pickerView:didSelectRow:inComponent:`消息。


  ### 图像视图


  你已经使用过足够多的图像视图，对其用法已相当熟悉。不过，仍有几个属性值得一提。第一个是`contentMode`。此属性控制图像（可能与视图大小不同）的排列方式。选项列于表
  10-5 中。


  **表 10-5. 视图内容模式**


  | 模式 | 描述 |

  | --- | --- |

  | `UIViewContentModeScaleToFill` | 拉伸或压缩图像以完全填充视图。如果视图的宽高比与图像不同，可能会使图像变形。 |

  | `UIViewContentModeScaleAspectFit` | 缩放图像（不使其变形）以恰好适配视图内部。视图的某些部分可能不包含任何图像（类似宽银幕模式）。
  |

  | `UIViewContentModeScaleAspectFill` | 缩放图像（不使其变形）以完全填充视图。图像的部分内容可能会被裁剪。 |

  | `UIViewContentModeCenter` | 居中显示图像，不进行缩放。 |

  | `UIViewContentModeTop`、`UIViewContentModeBottom`、`UIViewContentModeLeft` 或 `UIViewContentModeRight`
  | 图像一条边的中点与视图的对应边对齐。图像不缩放。在其他三个方向上，图像可能未填充或会被裁剪。 |

  | `UIViewContentModeTopLeft`、`UIViewContentModeTopRight`、`UIViewContentModeBottomLeft`
  或 `UIViewContentModeBottomRight` | 图像的一个角与视图的同一角对齐。图像不缩放。图像可能未完全填充视图，若超出则会被裁剪。 |


  > **注意**：`contentMode`属性实际上是在`UIView`类中定义的，但它对`UIImageView`尤其重要。


  `UIImageView`还有一个独特的功能：它可以快速（如同翻页动画或超短视频）或慢速（如同幻灯片）显示一系列图像。将你想要显示的图像放入数组（`NSArray`），并用该数组设置`animationImages`属性。设置`animationDuration`属性，并可选择设置`animationRepeatCount`来控制每帧的速度以及整个序列的播放次数（将`animationRepeatCount`设置为`0`可无限循环）。


  设置完成后，向该视图发送`-startAnimation`消息开始播放，发送`-stopAnimation`消息停止播放。演示此功能的代码位于 UICatalog
  项目的`ImagesViewController.m`文件中。


  ### 分组表格


  第 5 章提到，你可以创建分组样式的表格视图，就像“设置”应用中使用的那些。不过，我并未实际演示如何实现。虽然你已经掌握了所有基础知识，但如果你想要一个具体的例子，不妨看看
  UICatalog 项目。大多数示例视图（按钮、控件、文本字段和分段控件）都以分组表格视图的形式呈现。每个分组代表一个示例。


  先以按钮示例为例。它的视图控制器是`ButtonsViewController`类，它是`UITableViewController`的子类。表格视图控制器是专门用于管理表格视图的`UIViewController`。`UITableViewController`同时充当`UITableViewDelegate`和`UITableViewDataSource`。找到定义表格内容的这些委托方法，看看它们的工作方式：


  ```objc

  - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView


  - (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section


  - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section


  - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
  *)indexPath

  ```




  '
- '# 你从未见过的视图


  以上内容涵盖了 iOS 中大部分重要的视图对象。我将在第 12 章中稍微介绍工具栏，并在第 11 章中更深入地讨论 `UIView`。但我还想提一个非常特殊的视图——它使用频繁，但你却从未亲眼见过。


  它就是 `UIScrollView` 类。滚动视图为你的界面增添了动态滚动的能力。你永远看不到滚动视图本身，你看到的是它产生的效果。滚动视图的工作原理是在一个较小的视图中展示一个较大的视图。这种效果就像拥有一个通向那个较大视图的窗口。当你在窗口内拖动时，你实际上是在"滑动"窗口背后的视图，以便看到它的不同部分，如图
  10-13 所示。


  ![A978-1-4302-5063-0_10_Fig13_HTML.jpg](img/A978-1-4302-5063-0_10_Fig13_HTML.jpg)


  图 10-13. 滚动视图的概念布局


  将滚动视图理解为"合二为一"的两个视图，是理解它最简单的方式。对于大多数视图对象来说，其内容的大小（称为 bounds）和它在界面中占据的大小（称为 frame）是相同的。因此，一个
  30x100 像素的视图（例如按钮）会在界面中占据一个 30x100 像素的区域。


  滚动视图打破了这种关系。滚动视图有一个特殊的 `contentSize` 属性，它与自身的 frame 大小是分离的。它的 frame 变成了你在界面中看到的"窗口"。而
  `contentSize` 定义了视图的逻辑大小，只有其中的一部分通过窗口可见。


  `contentOffset` 属性决定了具体哪一部分可见。这个属性表示内容区域中出现在 frame 左上角（即用户可见部分）的点。`contentOffset`
  初始值为 `0,0`，这使得内容的左上角位于 frame 的左上角。随着 `contentOffset` 向下移动，内容看起来向上滚动，同时保持 `contentOffset`
  点始终位于 frame 的左上角。


  表格视图、网页视图和文本视图都提供了滚动功能，并且它们都是 `UIScrollView` 的子类。你可以自己创建 `UIScrollView` 的子类，以生成支持滚动的自定义视图，也可以通过简单地将你喜欢的任何子视图填充到其内容视图中，来独立使用一个
  `UIScrollView` 对象。你甚至可以在一个滚动视图内部再放一个滚动视图；这听起来有点奇怪，但 iOS 的滚动视图编程指南中确实有关于如何实现这一点的说明。


  要开始学习滚动视图，PhotoScroller 示例项目是个绝佳起点。在 Xcode 的文档和 API 参考中搜索 PhotoScroller 示例代码项目，然后点击"打开项目"按钮。PhotoScroller
  项目定义了一个 `UIScrollView` 的子类，用于显示、平移和缩放图像。该项目演示了滚动视图三大主要能力中的两项：


  - 在较小视图内滚动较大的内容视图

  - 捏合与缩放内容视图

  - 按"页面"滚动


  第一种是其基本功能。滚动视图最常用于此能力，这包括表格视图、网页视图和文本视图。要以这种方式使用滚动视图，你无需创建子类或使用委托。只需将你想要显示的视图填充并设置好内容视图的大小，滚动视图就会让用户自由拖动它。


  滚动视图的第二种能力是对其内容视图进行捏合与缩放，因此它不仅能滚动，还能放大和缩小内容，如图 10-14 所示。此功能需要使用滚动视图委托（`UIScrollViewDelegate`）对象。在
  PhotoScroll 项目中，自定义的 `ImageScrollView` 是 `UIScrollView` 的子类，同时也是它自己的委托——这是一种完全合理（尽管有点不寻常）的设计。`UIScrollView`
  会为你处理触摸事件，并负责大部分平移和缩放的细节。


  ![A978-1-4302-5063-0_10_Fig14_HTML.jpg](img/A978-1-4302-5063-0_10_Fig14_HTML.jpg)


  图 10-14. PhotoScroller 应用


  你还可以通过编程方式滚动视图，只需将其 `contentOffset` 属性设置到内容视图中的任意位置即可。如果你希望视图以动画方式跳转至新位置，可以发送 `-setContentOffset:animate:`
  消息给它。


  ## 滚动视图与键盘


  滚动视图可以包含文本字段——通常是间接实现的，例如在表格视图（如你所知，它本身也是一个滚动视图）中放置一个文本字段。当键盘出现时，它可能会遮挡住用户想要编辑的文本字段。解决方案是让滚动视图向上滚动，使得文本字段在键盘上方可见。


  为此，你的控制器需要监听键盘通知（例如 `UIKeyboardDidShowNotification`）。这些通知包含了虚拟键盘在屏幕上的坐标信息。你可以利用这些信息来判断键盘是否遮挡了你的文本字段。如果是，则向滚动视图发送一条
  `-setContentOffset:animate:` 消息，使文本字段滚动到虚拟键盘上方的位置。


  关于此机制的具体描述，请参阅 iOS 的文本、网页与编辑编程指南，你可以在 Xcode 的文档中找到它。请查找"管理键盘"章节中那个恰如其分的标题："移动位于键盘下方的内容"。


  PhotoScroller 项目还演示了一项名为"平铺"的高级技术。在第 5 章的开头，我解释过 iOS 设备没有足够的内存或 CPU 能力为表格创建数千个独立的行对象。相反，它只在用户滚动列表时，绘制表格中用户可见的部分。


  一个异常大的内容视图也可能面临同样的问题。PhotoScroller 项目演示了如何动态地仅准备那些当前通过滚动视图"窗口"可见的视图对象。而表格视图（如你所记，它基于
  `UIScrollView`）已经为你做了这件事，它只准备表格中那些可见行的视图对象。


  滚动视图一个不太常见的用途是按"页面"浏览内容。这通过将 `pagingEnabled` 属性设置为 `YES` 来实现。当你这样做时，滚动视图会强制内容视图（确切地说是它的
  `contentOffset` 属性）以离散的距离移动，这些距离是其 frame 大小的整数倍。从概念上讲，它将你的内容视图划分成一个网格（大小与窗口完全一致），任何滚动最终都会停留在其中一个分段上。有一个名为
  PageControl 的示例项目演示了此功能。


  > **注意**

  > PhotoScroller 项目允许你通过滑动在图像间切换，但它并没有使用 `UIScrollView` 的分页功能。相反，它使用了 `UIPageViewController`。你将在第
  12 章中使用 `UIPageViewController` 来创建类似的界面。


  滚动视图的高级使用对胆小鬼来说并不合适。这确实可能非常复杂，但正是这些复杂功能造就了真正酷炫的应用。如今已成为 iOS 应用主流的"下拉刷新"手势，完全是借助滚动视图和滚动视图委托实现的。如果你在表格视图中需要此功能，大部分工作已经为你完成：创建一个
  `UIRefreshControl` 对象，并将其连接到表格视图控制器的 `refreshControl` 属性。现在，用户就可以通过向下拖动来刷新表格了。要深入探究滚动视图的强大功能，请从
  iOS 的滚动视图编程指南开始。




  ## 摘要


  你对 iOS 这门“语言”的掌握正在日益精进。你从 iOS 的语法和句法起步，学习了如何创建对象、连接对象以及发送消息。在这一章中，你拓展了自己的词汇量，掌握了大量可添加并自定义的视图与控制对象。你还了解了分组表格的制作方式，并一窥滚动效果背后的魔法。在此过程中，你学会了如何下载示例代码并解锁其中的奥秘。


  使用预制的视图和控制对象，你可以走得很远。但总有一些限制，到了某个时刻，你会想要一个尚未有人创建过的视图。创建自己的视图，正是你旅程的下一步，也是本书下一章的内容。


