  \ `Standard` 选项\n\n![A978-1-4302-5063-0_12_Fig15_HTML.jpg](img/A978-1-4302-5063-0_12_Fig15_HTML.jpg)\n\
  \n**图 12-15.** 详情视图的粗略位置\n\n**标签**\n\n-   将宽度设为 `420`（iPad）或 `280`（iPhone）\n-  \
  \ 将对齐方式设为居中对齐（中间的按钮）\n-   固定高度（`Editor ➤ Pin ➤ Height`）\n\n**图像视图**\n\n-   将尺寸设为\
  \ `420` x `420`（iPad）或 `280` x `280`（iPhone）\n-   将模式设为 `Aspect Fit`\n-   固定高度（`Editor\
  \ ➤ Pin ➤ Height`）\n\n**文本视图**\n\n-   将尺寸设为 `420` x `100`（iPad）或 `280` x `100`（iPhone）\n\
  \n**约束条件（通用）**\n\n-   将三个视图定位在视图中，使其居中且垂直堆叠，大致如图 12-15 所示。\n-   使用 Shift 键或拖拽选择矩形选中所有三个视图对象（标签、图像视图和文本视图）\n\
  -   选择 `Editor ➤ Pin ➤ Width`\n-   选中所有三个视图对象\n-   选择 `Editor ➤ Align ➤ Horizontal\
  \ Center in Container`（注意不是 `Horizontal Center`！）\n\n在 iPhone 上，标签将位于容器顶部，文本视图位于底部，图像视图将调整大小以填充两者之间的空间。在\
  \ iPad 上，这三个视图会组合在一起，并在根视图中居中。\n\n这看起来需要很多约束，但它精确描述了当容器视图大小改变时，视图应如何适应。影响该大小有两个因素：不同设备的尺寸，以及您即将引入（在下一节中）的导航栏和标签栏。\n\
  \n您需要为这些视图对象创建插口。切换到辅助编辑器；`WLCharacterDetailViewController.h` 接口文件将显示在右侧。（如果没有显示，请从导航栏中选择\
  \ `Automatic ➤ WLCharacterDetailViewController.h`。）\n\n将以下插口声明添加到 `@interface` 部分：\n\
  \n```objectivec\n@property (weak,nonatomic) IBOutlet UILabel *nameLabel;\n@property\
  \ (weak,nonatomic) IBOutlet UIImageView *imageView;\n@property (weak,nonatomic)\
  \ IBOutlet UITextView *descriptionView;\n```\n\n使用现在出现在属性声明旁边的插口连接器，将它们连接到界面中对应的对象，如图\
  \ 12-17 所示。\n\n![A978-1-4302-5063-0_12_Fig17_HTML.jpg](img/A978-1-4302-5063-0_12_Fig17_HTML.jpg)\n\
  \n**图 12-17.** 连接角色详情视图插口\n\n### 添加数据模型\n\n还剩下什么？您仍需创建一个数据模型，并为表格视图提供数据源和表格视图单元格对象。从数据模型开始。\n\
  \n我有个惊喜给您。我为您创建了一个数据模型。我是不是很贴心？角色详情信息存储在一个对象数组（`NSArray`）中。数组的每个元素包含一个字典（`NSDictionary`）。每个字典包含角色名称、其图像的文件名以及一段简短描述。所有这些信息都存储在\
  \ `Characters.nsarray` 文件中，这是您在本章前面添加的资源文件之一。\n\n**注意：** `Characters.nsarray` 文件是一个序列化的属性列表\
  \ XML 文件。您可以在几乎任何纯文本编辑器中打开查看它。我是通过编写一个 OS X 命令行程序来创建此文件的，该程序创建所有字典，将它们组装成一个数组，并将数组写入（序列化）到一个文件中。执行此操作的项目位于\
  \ `Learn iOS Development Projects ➤ Ch 12 ➤ WLCharacterMaker` 文件夹中。属性列表和序列化将在第 18\
  \ 章中解释。\n\n通过创建属性将数据模型添加到您的表格视图控制器，以将数组存储在 `WLCharacterTableViewController.h` 接口文件中：\n\
  \n```objectivec\n@property (strong,nonatomic) NSArray *tableData;\n```\n\n切换到 `WLCharacterTableViewController.m`，并将以下代码添加到\
  \ `-viewDidLoad` 中：\n\n```objectivec\nNSURL *dataURL = [[NSBundle mainBundle] URLForResource:@\"\
  Characters\"\n                                         withExtension:@\"nsarray\"\
  ];\nself.tableData = [NSArray arrayWithContentsOfURL:dataURL];\n```\n\n此代码定位应用资源中的\
  \ `Characters.nsdata` 文件，将其作为 `NSArray` 对象读取，并存储在您的 `tableData` 属性中。现在您有了一个数据模型！\n\
  \n### 实现数据源\n\n现在，您需要通过数据源对象将这些信息提供给表格视图。表格视图控制器文件模板包含了所有关键数据源和委托方法的虚拟实现；只需稍作调整。\n\
  \n仍在 `WLCharacterTableViewController.m` 文件中，找到 `-numberOfSectionsInTableView:` 方法并将其删除。您不需要它。您的表格只有一个分区，这是默认设置。\n\
  \n找到 `-tableView:numberOfRowsInSection:` 方法，并将其代码替换为以下内容（以粗体显示）：\n\n```objectivec\n\
  - (NSInteger)tableView:(UITableView*)table numberOfRowsInSection:(NSInteger)sec\n\
  {\n    return self.tableData.count;\n}\n```\n\n此方法向表格视图提供列表中的行数，即数组中的对象数量。\n\n**注意：**\
  \ 您可能已经注意到，您尚未将表格视图的 `delegate` 或 `dataSource` 插口连接到表格视图控制器。这是因为您的控制器是 `UITableViewController`\
  \ 的子类，而该类专为管理表格视图而设计。如果您自己未连接 `delegate` 或 `dataSource` 插口，控制器会自动将自身设置为表格的委托和数据源。这难道不方便吗？\n\
  \n\n\n### 定义表格视图单元格对象\n\n最后一块拼图是为表格视图的每一行提供一个表格单元格对象——这相当于表格视图的“橡皮图章”。找到`-tableView:cellForRowAtIndexPath:`方法并编辑它，使其看起来像下面这样（新代码以粗体显示）：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellId = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellId\n                \
  \                                           forIndexPath:indexPath];\n    NSDictionary\
  \ *characterInfo = _tableData[indexPath.row];\n    cell.textLabel.text = characterInfo[kNameKey];\n\
  \    return cell;\n}\n```\n\n这段代码应该看起来很眼熟——除非你跳过了第 5 章。单元格的外观由故事板中的单元格原型定义。切换回`Main_iPhone.storyboard`（或`_iPad`）文件，找到表格视图控制器。\n\
  \n在表格视图的顶部，你会看到一个标注为`Prototype Cells`的区域，如图 12-18 所示。选中第一个空白单元格，使用属性检查器将样式改为`Basic`，将其标识符设置为`Cell`，并将其附件改为`Disclosure\
  \ Indicator`（见图 12-18）。\n\n![A978-1-4302-5063-0_12_Fig18_HTML.jpg](img/A978-1-4302-5063-0_12_Fig18_HTML.jpg)\n\
  \n图 12-18. 定义表格单元格\n\n现在，当你的`-tableView:cellForRowAtIndexPath:`方法请求“Cell”表格单元格对象时，它已经就绪。你的代码只需配置单元格的文本即可完成。\n\
  \n`-tableView:cellForRowAtIndexPath:`中的代码仍然显示错误，因为你尚未定义用于从字典中检索值的键。在`WLCharacterTableViewController.h`中，紧跟在`#import`语句之后添加以下代码：\n\
  \n```\n#define kImageKey       @\"image\"\n#define kNameKey        @\"name\"\n#define\
  \ kDescriptionKey @\"description\"\n```\n\n现在你的表格视图已经完成。在模拟器中运行应用，点击第二个标签页，这次你的表格将显示数据模型中的名称，如图\
  \ 12-19 所示。\n\n![A978-1-4302-5063-0_12_Fig19_HTML.jpg](img/A978-1-4302-5063-0_12_Fig19_HTML.jpg)\n\
  \n图 12-19. 工作中的表格视图\n\n### 推送详细视图控制器\n\n然而，点击表格中的某一行并没有产生什么效果（见图 12-19 右侧）。这是因为你还没有定义呈现详细视图的动作。另外，表格的标题是`Root\
  \ View Controller`，这有点“过于直白”。解决第二个问题：选择`Main_iPhone.storyboard`（或`_iPad`）文件，找到角色表格视图控制器，双击导航栏中的标题，将其改为“Characters”，如图\
  \ 12-20 所示。\n\n![A978-1-4302-5063-0_12_Fig20_HTML.jpg](img/A978-1-4302-5063-0_12_Fig20_HTML.jpg)\n\
  \n图 12-20. 为表格单元格创建跳转\n\n从原型单元格对象右键/按住 Control 键拖动到角色详细视图控制器（也显示在图 12-20 中）。松开鼠标后，从`Selection\
  \ Segue`组中选择`push`选项。这将配置所有使用此单元格对象的行，将角色详细视图控制器“推入”导航控制器的堆栈中，并将其作为活动视图控制器呈现。\n\n\
  就像你在第 5 章中所做的那样，你需要一些代码来根据用户点击的行准备详细视图。返回`WLCharacterTableViewController.m`文件。将以下方法添加到你的`@implementation`中：\n\
  \n```\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n\
  WLCharacterDetailViewController *detailsController = segue.destinationViewController;\n\
  detailsController.characterInfo = _tableData[self.tableView.indexPathForSelectedRow.row];\n\
  }\n```\n\n跳转对象包含所涉及的视图控制器的信息（包括来源和目标）。利用它可以获取故事板刚刚创建并加载的详细视图控制器对象。然后，你使用`tableView`对象获取当前选中行的行号——即用户点击的那一行——并据此从数据模型中获取角色详细信息，并通过设置`characterInfo`来配置新的视图控制器。\n\
  \n仍然还有一些未完成事项。列表视图控制器对`WLCharacterDetailViewController`一无所知，并且该控制器还没有一个`characterInfo`属性。这些都是非常简单的任务。首先，紧跟在其他`#import`语句之后添加这个`#import`语句：\n\
  \n```\n#import \"WLCharacterDetailViewController.h\"\n```\n\n切换到你的`WLCharacterDetailViewController.h`接口文件，添加一个属性声明来保存单个角色的详细信息：\n\
  \n```\n@property (strong,nonatomic) NSDictionary *characterInfo;\n```\n\n选择`WLCharacterDetailViewController.m`实现文件。在现有的`#import`语句之后，添加一个新的语句来引入你之前编写的字典键常量（`kNameKey`等）：\n\
  \n```\n#import \"WLCharacterTableViewController.h\"\n```\n\n最后，将以下方法添加到`@implementation`中：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n[super viewWillAppear:animated];\n\
  self.nameLabel.text = _characterInfo[kNameKey];\nself.imageView.image = [UIImage\
  \ imageNamed:_characterInfo[kImageKey]];\nself.descriptionView.text = _characterInfo[kDescriptionKey];\n\
  }\n```\n\n当视图控制器即将在屏幕上显示时，此代码将用`characterInfo`中的详细信息填充视图对象。在模拟器中运行应用并尝试一下，如图 12-21\
  \ 所示。\n\n![A978-1-4302-5063-0_12_Fig21_HTML.jpg](img/A978-1-4302-5063-0_12_Fig21_HTML.jpg)\n\
  \n图 12-21. 完成后的角色表格\n\n你的应用现在已完成三分之二。在本节中，你通过将一个表格（内容）视图控制器嵌套在导航（容器视图）控制器中，创建了一个可导航的表格视图。你使用故事板配置了表格的单元格对象，并为其创建了到详细视图控制器的跳转。\n\
  \n到现在为止，你应该对内容视图控制器和容器视图控制器、如何将它们连接在一起，以及如何创建跳转来定义应用的导航感到相当熟悉了。本章的最后部分将向你展示如何使用页面视图控制器。\n\
  \n\n\n"
- "# 创建页面视图控制器\n\n现在你已经进入了 Wonderland 应用的第三个也是最后一个标签页。该标签页将逐页显示书籍文本。这个标签页使用页面视图控制器（`UIPageViewController`）对象。它是一个容器视图控制器，管理着一组（可能非常庞大的）内容视图控制器。每个“页面”由一个或两个内容视图控制器组成。页面视图控制器提供手势识别器，用于执行并动画展示集合中页面之间的导航。\n\
  \n向设计中添加页面视图控制器相当简单。但让它正常工作则是另一回事。页面视图控制器通常需要大量的代码，这个应用也不例外。更刺激的是，你必须先让大部分代码正常工作，页面视图才会有所表现。所以请做好准备，这将是一段漫长的旅程。\n\
  \n你需要创建多个新类，现在就把它们全部创建好。使用“新建文件...”命令在项目的 Wonderland 组中创建新的 Objective-C 类文件。表 12-2\
  \ 列出了你需要创建的新类、每个类的父类及其角色。创建新的视图控制器类时，请勿创建 XIB 文件。\n\n**表 12-2.** 页面视图类\n\n| 类 |\
  \ 父类 | 描述 |\n|---|---|---|\n| `WLBookViewController` | `UIPageViewController` |\
  \ 你的自定义页面视图控制器版本，负责管理页面视图 |\n| `WLBookDataSource` | `NSObject` | 数据源对象，为页面视图控制器提供其所包含的内容视图控制器\
  \ |\n| `WLPaginator` | `NSObject` | 一个工具对象，封装了确定一页能容纳多少文本的逻辑 |\n| `WLOnePageViewController`\
  \ | `UIViewController` | 内容视图控制器 |\n| `WLOnePageView` | `UIView` | 用于显示文本的自定义视图对象\
  \ |\n\n正如表格视图和选择器视图需要数据源对象一样，页面视图控制器也是如此。不过，页面视图控制器的数据源并非提供滚轮上的一个值或表格中的一行，而是按需提供它想要显示的视图控制器。\n\
  \n## 添加页面视图控制器\n\n并非全是代码。使用 Interface Builder 创建这两个视图控制器。选择 `Main_Phone.storyboard`（或\
  \ `_iPad`）文件。从对象库中拖拽一个新的“页面视图控制器”并将其添加到你的设计中。同时添加一个新的“视图控制器”对象，如图 12-22 所示。将它们排列在其他场景下方。\n\
  \n![A978-1-4302-5063-0_12_Fig22_HTML.jpg](img/A978-1-4302-5063-0_12_Fig22_HTML.jpg)\n\
  \n**图 12-22.** 添加页面视图控制器和单页视图控制器\n\n通过从标签栏控制器向右/按住 Control 键拖拽到新的页面视图控制器，将其添加到标签栏，如图\
  \ 12-23 所示。选择 `view controllers` 关系。\n\n![A978-1-4302-5063-0_12_Fig23_HTML.jpg](img/A978-1-4302-5063-0_12_Fig23_HTML.jpg)\n\
  \n**图 12-23.** 将页面视图控制器添加到标签栏\n\n与其他标签页的操作一样，选择页面视图控制器场景中的标签栏项。使用属性检查器将其标题设置为“书籍”，标签图标设置为\
  \ `tab-book`。\n\n现在配置页面视图控制器本身。选择页面视图控制器对象，使用标识检查器将其类更改为 `WLBookViewController`。切换到属性检查器，仔细检查以下属性是否已设置：\n\
  \n*   导航：`水平`\n*   过渡样式：`翻页效果`\n*   书脊位置：`最小值`\n\n这些设置定义了一个类似“书籍”的界面，用户可以在视图控制器集合中水平移动，每页显示一个控制器。（如果将书脊位置设置为`中间`，则每页会显示两个视图控制器。）控制器之间的过渡模拟了纸质页面的翻动效果。\n\
  \n## 设计原型页面\n\n现在转向你刚刚添加的普通视图控制器。使用标识检查器将其类更改为 `WLOnePageViewController`。同时，将其“故事板\
  \ ID”更改为“OnePage”。最后这一步很重要。此控制器不会在 Interface Builder 中建立连接；你将通过编程方式创建它的实例。为此，你需要一种引用它的方式，而你将使用其故事板\
  \ ID 来实现这一点。（这相当于 `UIView` 的 tag 属性。）\n\n完成准备工作后，为单页视图控制器创建界面。从对象库中添加三个视图对象，具体如下：\n\
  \n*   **标签** 字体：`System 15.0` 文本：`爱丽丝梦游仙境` 将其放置在顶部居中（iPhone）或顶部右侧（iPad）\n*   **标签**\
  \ 字体：`System 11.0`（iPhone）或 `13.0`（iPad）对齐方式：居中（中间按钮）放置在底部居中\n*   **视图** 放置在两个标签之间，以填充可用空间\n\
  \n**约束条件**\n\n*   选择两个标签对象。固定其高度（编辑器 ➤ 固定 ➤ 高度）。\n*   选择两个标签对象。将其居中（编辑器 ➤ 对齐 ➤ 容器中水平居中）。\n\
  *   为顶部标签添加一个到顶部布局指南的约束（参考图 12-16）。\n*   选择新创建的约束，并使用属性检查器勾选`标准`选项。\n*   为底部标签添加一个到底部布局指南的约束。\n\
  *   选择新添加的约束（见图 12-24），并将其`常量`设置为 `60`（为屏幕底部的标签栏留出空间）。\n*   填充其余约束（编辑器 ➤ 解决自动布局问题\
  \ ➤ 在单页视图控制器中添加缺失的约束）。\n\n选择 `UIView` 对象，使用标识检查器将其类更改为 `WLOnePageView`。完成的界面应如图\
  \ 12-24 所示。\n\n![A978-1-4302-5063-0_12_Fig24_HTML.jpg](img/A978-1-4302-5063-0_12_Fig24_HTML.jpg)\n\
  \n**图 12-24.** 单页视图控制器界面\n\n切换到助理编辑器，在右侧窗格中显示 `WLOnePageViewController.h` 文件，添加两个\
  \ `#import` 语句：\n\n```\n#import \"WLOnePageView.h\"\n#import \"WLPaginator.h\"\n\
  ```\n\n然后在 `@interface` 中添加四个属性：\n\n```\n@property (nonatomic) NSUInteger pageNumber;\n\
  @property (strong,nonatomic) WLPaginator *paginator;\n@property (weak,nonatomic)\
  \ IBOutlet WLOnePageView *textView;\n@property (weak,nonatomic) IBOutlet UILabel\
  \ *pageLabel;\n```\n\n将最后两个属性的输出口连接到屏幕中间的 `WLOnePageView` 对象和底部的小标签对象，如图 12-25 所示。后者将显示页码。\n\
  \n![A978-1-4302-5063-0_12_Fig25_HTML.jpg](img/A978-1-4302-5063-0_12_Fig25_HTML.jpg)\n\
  \n**图 12-25.** 连接页面视图中的输出口\n\n另外两个属性让这个视图控制器知道它正在显示书籍的哪一页，以及一个指向“分页器”对象的引用，该对象决定了该页上的文本内容。综合起来，这就是该视图控制器确定要显示的文本和页码所需的全部信息。\n\
  \n\n\n### 编写单页视图\n\n现在，你在 Interface Builder 中能做的几乎都做了。是时候撸起袖子开始编写代码了。这次，从设计的“尾部”开始，逐步向上回溯到页面视图控制器，并在此过程中填充细节。链条中的最后一个对象是\
  \ `WLOnePageView`，这个自定义视图负责显示一页的文本。选择 `WLOnePageView.h` 文件。在 `@interface` 中添加两个属性：\n\
  \n```\n@property (strong,nonatomic) NSString *text;\n@property (strong,nonatomic)\
  \ NSDictionary *fontAttrs;\n```\n\n切换到 `WLOnePageView.m` 实现文件，并编写它的 `-drawRect:`\
  \ 方法：\n\n```\n- (void)drawRect:(CGRect)rect\n{\n    [super drawRect:rect];\n   \
  \ [_text drawInRect:self.bounds withAttributes:_fontAttrs];\n}\n```\n\n阅读过第 11 章后，你应该能理解这段代码。当需要绘制自身时，它会用背景色填充视图（`[super\
  \ drawRect:rect]` 已为你完成了这一步），然后使用存储在 `fontAttrs` 属性中的属性来绘制其 `text` 文本。\n\n这个类的工作就完成了。接下来，我们继续看视图控制器。你已经定义了\
  \ `WLOnePageViewController` 类的接口（在 `WLOnePageViewController.h` 中）。选择它的实现文件（`WLOnePageViewController.m`）并填补缺失的代码。\n\
  \n在文件顶部，找到私有的 `@interface WLOnePageViewController ()` 部分，并为 `-loadPageContent` 方法添加一个原型（新代码以粗体显示）：\n\
  \n```\n@interface WLOnePageViewController ()\n- (void)loadPageContent;\n@end\n```\n\
  \n`–loadPageContent` 方法负责准备 `WLOnePageView` 对象，以便显示当前控制器页面的文本。现在添加这个方法：\n\n```\n\
  - (void)loadPageContent\n{\n    _paginator.viewSize = _textView.bounds.size;\n \
  \   if (![_paginator availablePage:_pageNumber])\n        _pageNumber = _paginator.lastKnownPage;\n\
  \    _textView.fontAttrs = _paginator.fontAttrs;\n    _textView.text = [_paginator\
  \ textForPage:_pageNumber];\n    [_textView setNeedsDisplay];\n    _pageLabel.text\
  \ = [NSString stringWithFormat:@\"Page %u\",\n                                 \
  \                   (unsigned int)_pageNumber];\n}\n```\n\n此方法加载视图的内容。它使用文本视图对象的大小来配置分页器对象。它配置文本视图使用与分页器相同的字体属性，然后向分页器请求当前页面应显示的文本。它还会更新视图底部的页码标签。\n\
  \n其中还包含一点逻辑，用于处理待显示页面已不存在的情况。如果你旋转设备，就会发生这种情况；视图的尺寸会改变，每页的文本会发生变化，书的页数也会改变。在这种情况下，视图会切换到最后一个可用的页面并显示它。\n\
  \n那么，`-loadPageContent` 在什么时候被调用呢？在大多数情况下，这类首次视图设置的代码会从你的 `-viewDidLoad` 方法中调用。但是，每当文本视图的大小发生变化时，都需要调用\
  \ `-loadPageContent`，而这种情况随时都可能发生，尤其是在用户改变显示方向时。通过添加 `-viewDidLayoutSubviews` 方法并在控制器的视图布局调整时发送\
  \ `-loadPageContent` 消息来解决此问题：\n\n```\n- (void)viewDidLayoutSubviews\n{\n    [super\
  \ viewDidLayoutSubviews];\n    [self loadPageContent];\n}\n```\n\n你会看到许多编译错误，因为你还没有实现分页器对象。现在来做这件事。\n\
  \n### 分页器\n\n`WLPaginator.h` 的代码在代码清单 12-1 中，`WLPaginator.m` 的代码在代码清单 12-2 中。如果你想复制粘贴解决方案，可以在\
  \ `Learn iOS Development Projects` ➤ `Ch 12` ➤ `Wonderland` 项目文件夹中找到已完成代码的源文件。\n\
  \n#### 代码清单 12-1. WLPaginator.h\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ WLPaginator : NSObject\n\n@property (strong,nonatomic) NSString *bookText;\n@property\
  \ (strong,nonatomic) UIFont *font;\n@property (readonly,nonatomic) NSDictionary\
  \ *fontAttrs;\n@property (nonatomic) CGSize viewSize;\n@property (readonly,nonatomic)\
  \ NSUInteger lastKnownPage;\n\n- (BOOL)availablePage:(NSUInteger)page;\n- (NSString*)textForPage:(NSUInteger)page;\n\
  \n@end\n```\n\n#### 代码清单 12-2. WLPaginator.m\n\n```\n#import \"WLPaginator.h\"\n\
  \n@interface WLPaginator ()\n{\n    NSMutableArray  *ranges;\n    NSUInteger   \
  \   lastPageWithContent;\n    NSDictionary    *fontAttrs;\n}\n\n- (NSRange)rangeOfTextForPage:(NSUInteger)page;\n\
  \n@end\n\n@implementation WLPaginator\n\n- (void)resetPageData\n{\n    ranges =\
  \ [NSMutableArray array];\n    lastPageWithContent = 1;\n}\n\n- (void)setBookText:(NSString\
  \ *)bookData\n{\n    _bookText = bookData;\n    [self resetPageData];\n}\n\n- (void)setFont:(UIFont\
  \ *)font\n{\n    if ([_font isEqual:font])\n        return;\n    _font = font;\n\
  \    _fontAttrs = nil;\n    [self resetPageData];\n}\n\n- (NSDictionary*)fontAttrs\n\
  {\n    if (fontAttrs==nil)\n    {\n        NSMutableParagraphStyle *style = [NSMutableParagraphStyle\
  \ new];\n        style.lineBreakMode = NSLineBreakByWordWrapping;\n        fontAttrs\
  \ = @{\n            NSFontAttributeName: self.font,\n            NSParagraphStyleAttributeName:\
  \ style\n        };\n    }\n    return fontAttrs;\n}\n\n- (void)setViewSize:(CGSize)viewSize\n\
  {\n    if (CGSizeEqualToSize(_viewSize,viewSize))\n        return;\n    _viewSize\
  \ = viewSize;\n    [self resetPageData];\n}\n\n- (NSUInteger)lastKnownPage\n{\n\
  \    return lastPageWithContent;\n}\n\n#define SpanRange(LOCATION,LENGTH) \\\n({\
  \ NSUInteger loc_=(LOCATION); NSMakeRange(loc_,(LENGTH)-loc_); })\n\n- (NSRange)rangeOfTextForPage:(NSUInteger)page\n\
  {\n    if (ranges.count>=page)\n        return [ranges[page-1] rangeValue];\n\n\
  \    CGSize constraintSize = _viewSize;\n    CGFloat targetHeight = constraintSize.height;\n\
  \    constraintSize.height = 32000;\n\n    NSRange textRange = NSMakeRange(0,0);\n\
  \    if (page!=1)\n        textRange.location = NSMaxRange([self rangeOfTextForPage:page-1]);\n\
  \n    NSCharacterSet *wordBreakCharSet = [NSCharacterSet whitespaceAndNewlineCharacterSet];\n\
  \n    while (textRange.location<_bookText.length &&\n        [wordBreakCharSet characterIsMember:[_bookText\
  \ characterAtIndex:textRange.location]])\n    {\n        textRange.location += 1;\n\
  \    }\n\n    CGSize textSize = CGSizeMake(0,0);\n    CGRect textBounds;\n    NSCharacterSet\
  \ *paraCharSet = [NSCharacterSet characterSetWithCharactersInString:@\"\\r\"];\n\
  \n    while (textSize.height<targetHeight)\n    {\n        NSRange paraRange = [_bookText\
  \ rangeOfCharacterFromSet:paraCharSet\n            options:NSLiteralSearch\n   \
  \         range:SpanRange(NSMaxRange(textRange),_bookText.length)];\n        if\
  \ (paraRange.location==NSNotFound)\n            break;\n        textRange.length\
  \ = NSMaxRange(paraRange)-textRange.location;\n\n        NSString *testText = [_bookText\
  \ substringWithRange:textRange];\n        textBounds = [testText boundingRectWithSize:constraintSize\n\
  \            options:NSStringDrawingUsesLineFragmentOrigin\n            attributes:self.fontAttrs\n\
  \            context:[NSStringDrawingContext new]];\n        textSize = textBounds.size;\n\
  \    }\n\n    while (textSize.height>targetHeight)\n    {\n        NSRange wordRange\
  \ = [_bookText rangeOfCharacterFromSet:wordBreakCharSet\n            options:NSBackwardsSearch\n\
  \            range:textRange];\n        if (wordRange.location==NSNotFound)\n  \
  \          break;\n        textRange.length = wordRange.location-textRange.location;\n\
  \n        NSString *testText = [_bookText substringWithRange:textRange];\n     \
  \   textBounds = [testText boundingRectWithSize:constraintSize\n            options:NSStringDrawingUsesLineFragmentOrigin\n\
  \            attributes:self.fontAttrs\n            context:[NSStringDrawingContext\
  \ new]];\n        textSize = textBounds.size;\n    }\n\n    if (textRange.length!=0)\n\
  \        lastPageWithContent = page;\n    [ranges addObject:[NSValue valueWithRange:textRange]];\n\
  \    return textRange;\n}\n\n- (BOOL)availablePage:(NSUInteger)page\n{\n    if (page==1)\n\
  \        return YES;\n    // （注：原文至此结束，但提供的源码中此方法不完整。）\n}\n```\n\n\n\n`NSRange textRange\
  \ = [self rangeOfTextForPage:page];`\n\n`return (textRange.length!=0);`\n\n`}`\n\
  \n`- (NSString*)textForPage:(NSUInteger)page`\n\n`{`\n\n`return [_bookText substringWithRange:[self\
  \ rangeOfTextForPage:page]];`\n\n`}`\n\n`@end`\n\n`WLPaginator` 的具体工作原理并非本章重点，但若你感兴趣，可阅读已完成项目中的注释。从概念上讲，它非常简单。分页器对象通过三部分信息进行配置：书籍的完整文本、绘制文本所用的字体以及显示页面的文本视图尺寸。然后，该对象将书籍文本分割成多个范围，每个范围填充一页。任何视图控制器对象都可以向分页器请求适合其页面显示的文本。\n\
  \n**注意**  \n这并非实现分页器最复杂的方式，但足以满足此应用的需求。\n\n### 编写页面视图数据源\n\n你终于接触到了页面视图控制器的核心：页面视图数据源。一个页面视图控制器数据源必须遵循\
  \ `UIPageViewControllerDataSource` 协议，并实现以下两个必需方法：\n\n- `pageViewController:viewControllerBeforeViewController:`\
  \  \n- `pageViewController:viewControllerAfterViewController:`\n\n页面视图最初会显示一个初始视图控制器。当用户向左或向右“翻页”时，页面视图控制器会根据翻页方向向数据源对象发送其中一条消息。数据源以当前视图控制器为参考，检索或创建用于显示下一页（或上一页）的视图控制器。如果没有页面，则返回\
  \ `nil`。\n\n你的数据源必须实现这些方法。它还需要一个 `readonly` 属性，该属性返回所有单个视图控制器共用的分页器对象，以及一个用于为任意页面创建视图控制器的方法。因此，你的\
  \ `WLBookDataSource.h` 文件应如下所示：\n\n```\n#import \"WLPaginator.h\"\n#import \"WLOnePageViewController.h\"\
  \n\n@interface WLBookDataSource : NSObject <UIPageViewControllerDataSource>\n\n\
  @property (readonly,nonatomic) WLPaginator *paginator;\n\n- (WLOnePageViewController*)pageViewController:pageViewController\
  \ loadPage:(NSUInteger)page;\n\n@end\n```\n\n现在切换到 `WLBookDataSource.m` 实现文件。你需要一个实例变量来存储唯一的分页器对象，因此在\
  \ `@implementation` 部分之前添加如下代码：\n\n```\n@interface WLBookDataSource ()\n\n{\n  \
  \  WLPaginator *paginator;\n}\n\n@end\n```\n\n在 `@implementation` 部分，为 `paginator`\
  \ 属性编写一个 getter 方法，用于懒加载创建该对象：\n\n```\n- (WLPaginator*)paginator\n{\n    if (paginator==nil)\n\
  \    {\n        paginator = [WLPaginator new];\n        paginator.font = [UIFont\
  \ fontWithName:@\"Times New Roman\" size:18];\n    }\n    return paginator;\n}\n\
  ```\n\n`pageViewController:loadPage:` 方法是该数据源的核心方法。现在添加它：\n\n```\n- (WLOnePageViewController*)pageViewController:(UIPageViewController*)pageViewController\
  \ loadPage:(NSUInteger)page\n{\n    if (page<1 || ![paginator availablePage:page])\n\
  \        return nil;\n    \n    WLOnePageViewController *controller;\n    controller\
  \ = [pageViewController.storyboard\n                  instantiateViewControllerWithIdentifier:@\"\
  OnePage\"];\n    controller.paginator = self.paginator;\n    controller.pageNumber\
  \ = page;\n    return controller;\n}\n```\n\n该方法为书中的任意页面返回一个已配置好的 `WLOnePageViewController`。它首先检查请求的页码是否在书中，如果不在，则返回\
  \ `nil`。\n\n然后，它请求故事板对象创建标识符为“OnePage”的场景中包含的控制器和视图。这样做的原因是，在页面视图中，视图控制器之间的导航不使用\
  \ Segue 和操作。数据源负责在收到请求时创建它们。\n\n**注意**  \n请记住，之前你在故事板中将视图控制器场景的标识符设置为“OnePage”。这就是原因。如果你需要以编程方式从故事板场景加载视图控制器及其视图对象，`instantiateViewControllerWithIdentifier:`\
  \ 消息就是实现方式。\n\n一旦获得了新的单页视图控制器对象，就将其连接到分页器，并设置它应显示的页码。\n\n剩下要做的就是实现两个必需的数据源协议方法。这些方法也放在你的\
  \ `WLBookDataSource.m` 文件中：\n\n```\n- (UIViewController *)pageViewController:(UIPageViewController\
  \ *)pageViewController viewControllerAfterViewController:(UIViewController *)viewController\n\
  {\n    NSUInteger currentPageNumber = ((WLOnePageViewController*)viewController).pageNumber;\n\
  \    return [self pageViewController:pageViewController loadPage:currentPageNumber+1];\n\
  }\n\n- (UIViewController *)pageViewController:(UIPageViewController *)pageViewController\
  \ viewControllerBeforeViewController:(UIViewController *)viewController\n{\n   \
  \ NSUInteger currentPageNumber = ((WLOnePageViewController*)viewController).pageNumber;\n\
  \    return [self pageViewController:pageViewController loadPage:currentPageNumber-1];\n\
  }\n```\n\n由于每个单页视图控制器都存储了它显示的页码，因此这两个方法只需请求当前页之后或之前的页面即可。\n\n\n\n### 初始化页面视图控制器\n\
  \n你的书籍应用实现已接近完成。剩下的唯一工作是在页面视图控制器创建时，对其和数据模型进行一些初始设置。切换到 `WLBookViewController.m`\
  \ 实现文件。首先，创建一个实例变量来存储数据源对象，在文件头部的私有 `@interface WLBookViewController ()` 部分添加以下\
  \ `#import` 语句和实例变量（新代码以粗体显示）：\n\n```\n#import \"WLBookDataSource.h\"\n\n@interface\
  \ WLBookViewController ()\n{\n    WLBookDataSource *bookSource;\n}\n\n@end\n```\n\
  \n> **注意：** 之所以需要创建 `bookSource` 实例变量，与自动引用计数（ARC）内存管理系统的一个特殊行为有关。请阅读完成项目中的注释以及第\
  \ 21 章来了解详细解释。\n\n找到 `-viewDidLoad` 方法，并添加本章节剩余的代码，从以下内容开始：\n\n```\nself.dataSource\
  \ = bookSource = [WLBookDataSource new];\n```\n\n此行代码创建并持有数据源对象，并将其设置为该页面视图控制器的数据源。\n\
  \n```\nNSURL *bookURL = [[NSBundle mainBundle] URLForResource:@\"Alice\"\n     \
  \                                    withExtension:@\"txt\"];\nNSString *text =\
  \ [NSString stringWithContentsOfURL:bookURL\n                                  \
  \        encoding:NSUTF8StringEncoding\n                                       \
  \      error:NULL];\nbookSource.paginator.bookText = text;\n```\n\n接下来这段代码读取书籍的文本，该文本存储在你在开始时添加的资源文件\
  \ `Alice.txt` 中。该文件是一个 UTF-8 编码的文本文件，每行由一个回车符（`U+000d`）分隔。这种格式正是分页器所期望的。整个文本被读入一个字符串并存储在分页器中，分页器将使用该字符串将文本分配到各个页面。\n\
  \n```\n[self setViewControllers:@[[bookSource pageViewController:self loadPage:1]]\n\
  \               direction:UIPageViewControllerNavigationDirectionForward\n     \
  \           animated:NO\n              completion:nil];\n```\n\n最后一条语句可能是最重要的。它创建了页面视图控制器将要呈现的第一个视图控制器。必须在页面视图控制器出现之前，通过编程方式完成此操作。\n\
  \n> **警告：** 页面视图控制器的初始视图控制器是一个数组。视图控制器的数量必须与页面视图控制器一次性呈现的视图控制器数量完全匹配。如果你将页面视图控制器的书脊位置设置为\
  \ `Mid`，则必须提供两个初始视图控制器：一个用于左侧页面，另一个用于右侧页面。\n\n代码量不少，但你已经完成了！运行你的应用并测试第三个标签页，如图 12-26\
  \ 所示。\n\n![A978-1-4302-5063-0_12_Fig26_HTML.jpg](img/A978-1-4302-5063-0_12_Fig26_HTML.jpg)\n\
  \n**图 12-26.** 正常工作的页面视图界面\n\n你创建了一个真正复杂的应用。部分功劳得益于故事板，它让你能够在单个文件中规划和定义应用的导航结构。但你也学会了如何在需要时以编程方式加载故事板场景。\n\
  \n我建议你稍作停留，回顾一下故事板文件中的场景以及你为支持它们所创建的类。一旦你确信自己理解了视图控制器的组织结构、它们如何协同工作，以及你创建的各个类所扮演的角色，你就可以将自己视为一名一流的\
  \ iOS 导航工程师了。\n\n### 使用弹出控制器\n\n有一个特殊的导航类——弹出控制器（`UIPopoverController`）。弹出控制器本身不是一个视图控制器，而是一个工具类，用于在现有视图控制器之上，以浮动窗口的形式呈现另一个视图控制器。第一个视图控制器不会被移除，但在弹出控制器的视图控制器处于活跃状态时，它会被停用。从这个意义上说，它的工作方式与其他任何模态视图控制器类似。\n\
  \n编写弹出控制器并不困难。你在第 7 章中已经做过。既然你现在对视图控制器有了更多了解，你也许想回头复习一下添加的用于在 iPad 上呈现媒体选择器界面的代码。\n\
  \n你也可以使用故事板的 Segue 来创建弹出过渡。当你在 iPad 故事板中创建模态 Segue 时，会获得额外的 `popover` 选项。只需选择此 Segue\
  \ 类型，故事板就会将你的视图控制器包裹在弹出控制器中进行呈现。\n\n### 高级导航\n\n你已经深入探索了 iOS 导航的海洋，但还没有涵盖所有内容。要更进一步，我建议从两个关键文档开始：Xcode\
  \ 文档和 API 参考中的 *View Controller Programming Guide for iOS* 和 *View Controller Catalog\
  \ for iOS*。前者详细解释了视图控制器和导航的基本细节，后者则描述了各个单独的视图控制器子类及其使用方法。\n\n## 总结\n\n你在掌握 iOS 应用开发的征途中已经走了很远。除了最简单的应用，导航都是设计中的重要组成部分，其重要性不亚于应用本身的功能。\n\
  \n在本章中，你获得了使用所有主要视图控制器类的经验：`UIViewController`、`UITableViewController`、`UINavigationController`、`UITabBarController`\
  \ 和 `UIPageViewController`。更重要的是，你学会了内容视图控制器和容器视图控制器之间的区别，以及如何使用故事板组装和连接它们。你还学习了呈现模态视图控制器的基本原理。你为自己的表格视图技能增添了一些新技巧；你学会了如何使用故事板创建表格视图、配置其单元格对象、创建行选择\
  \ Segue，以及使用故事板方法来准备详情视图控制器。你以编程方式创建了存储在故事板文件中的视图控制器，并用它来创建页面视图控制器的数据源。\n\n这是一个巨大的成就。它如此令人兴奋，你应该与朋友们分享。下一章将教你如何做到这一点。\n\
  \n\n\n"
- "# 13. 网络社交\n\n## 摘要\n\n近年来，社交网络呈爆炸式发展，而移动应用在这场革命中扮演了重要角色。不久之前，在应用中加入社交网络功能还相当困难。如今，iOS\
  \ 的最新更新让这一过程变得极为简单——基于你对视图控制器的了解，完全可以用\"微不足道\"来形容。在这本篇幅较短的章节中，你将学会如何：\n\n- 通过 Facebook、Twitter、新浪微博、腾讯微博、Flickr、Vimeo、电子邮件、短信等平台分享内容\n\
  - 为不同服务定制内容\n- 在屏幕外绘制图像\n- 在 Xcode 中重构代码\n\n选择修改哪个应用可能是本章最困难的决定。你认识的人想了解第 2 章中关于超现实主义者的趣闻吗？你当然会想分享第\
  \ 3 章中的短链接。你的朋友想知道第 4 章中你的 Magic Eight Ball 预测结果吗？你在第 7 章中拍摄了酷炫物品的照片；如果有人想看看呢？为所有这些应用添加分享功能都很容易。最后，我选择扩展第\
  \ 8 章中的 ColorModel 应用。你花费了大量时间和精力挑选最合适的颜色，我相信你的朋友会感激你与他们分享。\n\n## 色彩（社交）世界\n\n从第\
  \ 8 章中最终的 ColorModel 应用开始。你将添加一个按钮，用于与外界分享所选颜色。iOS 为此提供了一个标准的\"活动\"工具栏项，因此直接使用它即可。在\
