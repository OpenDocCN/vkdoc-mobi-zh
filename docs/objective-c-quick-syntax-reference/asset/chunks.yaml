    Matthew Campbell is a professional software developer, entrepreneur, author, and
    trainer. He works for Mobile App Mastery, a web-based software development training
    company he founded in 2008\. Before building Mobile App Mastery, Matt studied
    psychology, worked as a mental health counselor, and supported psychometric research
    as a data analyst at the Educational Testing Service in Princeton. The books and
    trainings that he creates are designed to remove the obstacles that stop developers
    from mastering their craft.


    About the Technical Reviewer


    ![A978-1-4302-6488-0_BookFrontmatter_Fig2_HTML.jpg](A978-1-4302-6488-0_BookFrontmatter_Fig2_HTML.jpg)
    Charles Cruz is a mobile application developer for the iOS, Android, and Windows
    Phone platforms. He graduated from Stanford University with B.S. and M.S. degrees
    in engineering. He lives in Southern California and runs a photography business
    with his wife ( [`www.facebook.com/BellaLenteStudios`](http://www.facebook.com/BellaLenteStudios)
    ). When not doing technical things, he plays lead guitar in an original metal
    band ( [`www.taintedsociety.com`](http://www.taintedsociety.com/) ). Charles can
    be reached at `codingandpicking@gmail.com` and `@CodingNPicking` on Twitter.


    Introduction


    Objective-C is a tool that you can use to create stunning applications for the
    Mac, iPhone, and iPad. This unique programming language traces its linage back
    to the C programming language. Objective-C is C with object-oriented programming.


    Today, learning programming is about learning how to shape our world. Objective-C
    programmers are in a unique position to create mobile applications that people
    all over the world can use in their daily lives.


    Objective-C is a delight to use. While other programming languages can feel clumsy
    at times, Objective-C will show you its power and reach with grace. Problems that
    seem intractable in other programming languages melt away in Objective-C.


    At its core, this book is about laying out, without any fuss, what Objective-C
    can do. When you know what you want to do, but you just need to know the Objective-C
    way to do it, use this book to get help.'
