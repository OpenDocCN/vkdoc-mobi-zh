    Apps destined to be distributed to Mac and iPhone users require other resources
    in addition to the compiled code. This includes content like pictures, movies,
    music, and databases.


    These resources, along with an app directory structure, are all packed into a
    special file called a Bundle. You will use Xcode to compile your source code and
    then package everything into the bundle that you need for you app. This process
    is called Building in Xcode.


    If you look under the Project menu item in your Xcode menu bar (Figure [2-1](#A978-1-4302-6488-0_2_Chapter.html#Fig1)),
    you will see options for building your program. Usually you will just use the
    Build and Run feature of Xcode to creating compile and test your code.


    ![A978-1-4302-6488-0_2_Fig1_HTML.jpg](A978-1-4302-6488-0_2_Fig1_HTML.jpg)


    Figure 2-1.


    Product build options


    ## Build and Run


    Use the Build and Run button (see Figure [2-2](#A978-1-4302-6488-0_2_Chapter.html#Fig2))
    located in the upper left-hand area of your Xcode screen (this is an arrow that
    looks like a play button) to build your app.


    ![A978-1-4302-6488-0_2_Fig2_HTML.jpg](A978-1-4302-6488-0_2_Fig2_HTML.jpg)


    Figure 2-2.


    Build and Run button


    Xcode will not only build your app, but execute the code as well. If you click
    the Build and Run button for the current program, you should see the following
    text appear in your console log (also shown in Figure [2-3](#A978-1-4302-6488-0_2_Chapter.html#Fig3)):


    `2014-01-12 06:22:48.382`


    `Ch01_source_code[13018:303] Hello, World!`


    `Program ended with exit code: 0`


    ![A978-1-4302-6488-0_2_Fig3_HTML.jpg](A978-1-4302-6488-0_2_Fig3_HTML.jpg)


    Figure 2-3.


    Console log’s Hello World output


    Your output won’t match mine exactly, but you should see the words Hello World!
    and the name of your project on the screen.


    Note


    While most apps will get a bundle along with the compiled machine code included,
    I don’t need that for the apps I am using to demonstrate the code used in this
    book. If you locate your compiled code file, you will only find one Unix Executable
    File that you can run with the Mac Terminal app.


    # 3. Variables


    Abstract


    Objective-C stores information in variables. These are divided into two types:
    primitive types and composite types. Primitive variables store one piece of information,
    such as a number or a character. Composite variables store a set of information,
    such as three related numbers and a character.


    ## Variables Defined


    Objective-C stores information in variables. These are divided into two types:
    primitive types and composite types. Primitive variables store one piece of information,
    such as a number or a character. Composite variables store a set of information,
    such as three related numbers and a character.


    ### Data Types


    Table [3-1](#A978-1-4302-6488-0_3_Chapter.html#Tab1) shows the most common primitive
    data types that you will see in Objective-C.


    Table 3-1.


    Objective-C Data Types


    | Data Type | Format Specifier | Description |

    | --- | --- | --- |

    | `NSInteger` | `%li` | Signed integer |

    | `NSUInteger` | `%lu` | Unsigned integer |

    | `BOOL` | `%i` | Boolean (YES/NO) |

    | `CGFloat` | `%f` | Floating point |


    Note


    Objective-C programs can use C data types like `int`, `long`, `float`, `double`,
    and `char` in addition to the Objective-C data types listed in Table [3-1](#A978-1-4302-6488-0_3_Chapter.html#Tab1).
    This is because Objective-C is based on the C programming language and so inherits
    all of C’s functionality in addition to the Objective-C syntax that we are discussing
    here.


    ### Declaring Variables


    Variables are declared in Objective-C with their data type first, followed by
    a variable name. You must declare a variable before using it. Variable names should
    be meaningful, but you can name a variable anything that you want.


    Here is how you would declare an integer in Objective-C:


    `NSUInteger numberOfPeople;`


    ### Assigning Values


    You can use the assignment operator (`=)` to assign a value to a variable, like
    so:


    `numberOfPeople = 100;`


    Once you have assigned a value, you can retrieve and use that value by referencing
    the variable name.


    `NSLog(@"The number of people is %lu", numberOfPeople);`


    Note


    You may have noticed that the `NSLog` statement required the `%lu` symbol. This
    symbol is called a format specifier and `NSLog` will use it as a placeholder to
    insert values in the comma-separated list that appears right after the string.
    See Table [3-1](#A978-1-4302-6488-0_3_Chapter.html#Tab1) for a list of the format
    specifiers that you must use with Objective-C data types.


    You can also declare variables and assign values on the same line if you like.


    `NSUInteger numberOfGroups = 20;`


    ### Integer Types


    Integers are whole numbers, so any number that doesn’t need a decimal point is
    an integer. In Objective-C, integers are expressed with the data types `NSInteger`
    and `NSUInteger`.


    `NSUInteger`s are unsigned integers, which means that they can only be positive
    numbers. The maximum value that an `NSUInteger` can take depends on the system
    for which the Objective-C code is compiled. If you compile for a 64-bit Mac, the
    maximum value will be 18,446,744,073,709,551,615.


    For 32-bit platforms like the iPhone 5 and below, the maximum value is 4,294,967,295\.
    You can check these numbers yourself using the `NSUIntegerMax` constant.


    `NSLog(@"NSUIntegerMax is %lu", NSUIntegerMax);`


    `NSInteger`s are signed integers, which means that they can be either positive
    or negative. The maximum value of an `NSInteger` is half of the `NSUInteger` value
    because `NSInteger` must support both positive and negative numbers.


    So, if you need huge numbers, you may need to stick to `NSUInteger`, but if you
    need to handle both positive and negative numbers, you will need `NSInteger`.
    You can check the minimum and maximum value of `NSInteger` on your system with
    the `NSIntegerMin` and `NSIntegerMax` constants.


    `NSLog(@"NSIntegerMin is %li", NSIntegerMin);`


    `NSLog(@"NSIntegerMax is %li", NSIntegerMax);`


    ### Boolean Types


    Boolean date types are used when values can either be true or false. In Objective-C,
    this data type is declared as a `BOOL` type. `BOOL` types have values that are
    either `YES` or `NO`.


    `BOOL success = YES;`


    Since Objective-C stores `BOOL` values as `1` for `YES` and `0` for `NO`, you
    must use the `%i` format specifier print out a `BOOL` value. `%i` is another format
    specifier for integers.


    `NSLog(@"success is %i", success);`


    The `NSLog` statement above will print out `1` for `YES` and `0` for `NO`, but
    some people prefer to see the `YES` or `NO` strings printed out to the log. You
    can do so using this alternate statement:


    `NSLog(@"success: %@", success ? @"YES" : @"NO");`


    Here the variable `success` was replaced with a statement that has to be evaluated.
    This statement will return either the string `YES` or the string `NO` depending
    on the value of the variable `success`. If `success` is zero, then whatever is
    in the last position of the statement is returned, and if success is any other
    value then whatever is in the first position is returned. The ternary operator
    (`?)` tells the compiler to evaluate the statement.'
  trans: "\n# 编译\n\nObjective-C 代码需要转换成能在 iOS 设备或 Mac 上运行的机器码。这个过程称为编译，Xcode 使用 LLVM\
