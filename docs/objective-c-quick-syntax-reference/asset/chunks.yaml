    \ = NSNumberFormatterSpellOutStyle;\nNSNumber *num5 = [formatter numberFromString:@\"\
    two point two five\"];\n```\n\n# 8. Arrays\n\n**Abstract:** `NSArray` is a class\
    \ used to organize objects in lists. `NSArray` can maintain an index of objects,\
    \ search for objects, and enumerate through the list. Enumeration is the process\
    \ of moving through a list one item at a time and performing an action on each\
