    \ each number. You can use a `for` loop as an alternative to the enumeration method.\n\
    \n```\nfor (NSNumber *num in numbers){\n    NSLog(@\"num ^ 2= %f\", [num floatValue]\
    \ * [num floatValue]);\n}\n```\n\nThis loop starts with the `for` keyword before\
    \ a specification in parentheses. The specification starts with an object type\
    \ (`NSNumber`) and a variable that will give you a reference to the current object\
    \ in the list, (`*num`).\n\nNext, you can see the keyword `in` followed by the\
    \ array (`numbers`). Taken all together, you can read this as “for each number\
    \ num in the array `numbers`, do something.” The something here is defined in\
    \ the code block that comes right after the first part of the loop. It will go\
    \ through the entire array and square each number, producing the following output:\n\
    \n```\nnum ^ 2= 4.000000\nnum ^ 2= 1.000000\nnum ^ 2= 0.000000\nnum ^ 2= 1.000000\n\
    num ^ 2= 4.000000\n```\n\n### For Loops with NSDictionary\n\nDictionaries are\
    \ a little bit more complicated than arrays because dictionaries maintain a list\
    \ of keys and objects. You might expect that a `for` each loop used on a dictionary\
    \ would yield a list of objects; however it turns out that you will just get a\
