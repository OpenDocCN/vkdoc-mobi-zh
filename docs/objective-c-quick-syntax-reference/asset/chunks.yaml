    \n献给我的女儿凯拉\n\n## 关于作者\n\n![A978-1-4302-6488-0_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4302-6488-0_BookFrontmatter_Fig1_HTML.jpg)\
    \  \n马修·坎贝尔是一名专业软件开发人员、企业家、作者和培训师。他就职于 Mobile App Mastery，这是他于 2008 年创立的一家基于网络的软件开发培训公司。在创建\
    \ Mobile App Mastery 之前，马修学习了心理学，曾担任心理健康顾问，并在普林斯顿的教育考试服务中心担任数据分析师，支持心理测量研究。他创作的书籍和培训课程旨在消除阻碍开发者精通技艺的障碍。\n\
    \n## 关于技术审校\n\n![A978-1-4302-6488-0_BookFrontmatter_Fig2_HTML.jpg](img/A978-1-4302-6488-0_BookFrontmatter_Fig2_HTML.jpg)\
    \  \n查尔斯·克鲁兹是一名面向 iOS、Android 和 Windows Phone 平台的移动应用开发人员。他毕业于斯坦福大学，获得工程学学士和硕士学位。他住在南加州，并与妻子共同经营一家摄影业务（[`www.facebook.com/BellaLenteStudios`](http://www.facebook.com/BellaLenteStudios)）。在不从事技术工作时，他在一支原创金属乐队担任主音吉他手（[`www.taintedsociety.com`](http://www.taintedsociety.com/)）。可以通过\
    \ `codingandpicking@gmail.com` 或在 Twitter 上通过 `@CodingNPicking` 联系查尔斯。\n\n## 引言\n\
    \nObjective-C 是一种工具，可用于为 Mac、iPhone 和 iPad 创建出色的应用程序。这种独特的编程语言源于 C 编程语言。Objective-C\
    \ 是增加了面向对象编程特性的 C 语言。\n\n如今，学习编程就是学习如何塑造我们的世界。Objective-C 程序员处于一个独特的位置，可以创建全球人们在日常生活中都能使用的移动应用程序。\n\
    \n使用 Objective-C 是一种愉悦的体验。当其他编程语言有时显得笨拙时，Objective-C 会以优雅的方式展示其力量和影响范围。在其他编程语言中看似棘手的问题，在\
    \ Objective-C 中会迎刃而解。\n\n本书的核心在于，毫不赘述地阐明 Objective-C 能够做什么。当您知道想要做什么，但只需要了解 Objective-C\
    \ 的实现方式时，请使用本书获取帮助。"
