    ## Do While Loops Defined


    `Do while` loops are used for the same reasons as `for` loops and `while` loops.
    The syntax is different, and `do while` loops are notable because the code in
    the block will execute at least once. This is because the ending condition is
    not evaluated until the end of the loop. Here is how you would code a `do while`
    loop to count to 10:


    `int i = 0;`


    `do{`


        `NSLog(@"i = %i", i);`


        `i++;`


    `}while (i <10);`


    This `do while` loop will produce this output:


    `i = 0`


    `i = 1`


    `i = 2`


    `i = 3`


    `i = 4`


    `i = 5`


    `i = 6`


    `i = 7`


    `i = 8`


    `i = 9`


    The loop above does the same thing as the `for` loop from [Chapter 10](#A978-1-4302-6488-0_10_Chapter.html)
    and the `while` loop in [Chapter 11](#A978-1-4302-6488-0_11_Chapter.html). The
    specifications for the `do while` loop are similar to the `while` loop but they
    are located in different lines of code.


    Like the `while` loop, you need to have a counter variable on hand.


    `int i = 0;`


    Then you have the `do while` loop itself that is started with the `do` keyword.
    Immediately after the `do` keyword you have a code block defined by curly brackets.
    The code contained in these curly brackets will execute each time you go through
    the loop. You have one line of code, `NSLog(@"i = %i", i);`, to write to the log.
    You also increment the counter variable in this code block, `i++;`.


    The condition `(i < 10)` is after the `while` keyword right after the code block.
    This means that the loop will go on as long as the value of `i` is less than 10.


    Note


    It’s important to remember to increment the counter variable here. If you don’t
    do this, then `i` will never go beyond 10, and the loop will never end, which
    will effectively cause your program to hang until a user terminates it.


    ### Do While Loops and Arrays


    Now let’s go ahead and repeat the example from [Chapter 10](#A978-1-4302-6488-0_10_Chapter.html)
    and [Chapter 11](#A978-1-4302-6488-0_11_Chapter.html) where you formatted a list
    of numbers in an array with a loop. This is the array and other objects that you
    worked with in [Chapter 10](#A978-1-4302-6488-0_10_Chapter.html) and [Chapter
    11](#A978-1-4302-6488-0_11_Chapter.html):


    `NSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];`


    `NSMutableString *report = [[NSMutableString alloc] init];`


    `NSNumberFormatter *formatter = [[NSNumberFormatter alloc] init];`


    `formatter.numberStyle = NSNumberFormatterSpellOutStyle;`


    You are going to use the `do while` loop instead.


    `int i = 0;`


    `do {`


        `NSNumber *num = [list objectAtIndex:i];`


        `NSString *spelledOutNum = [formatter stringFromNumber:num];`


        `[report appendString:spelledOutNum];`


        `[report appendString:@", "];`


        `i++;`


    `}while(i < list.count);`


    `NSLog(@"report = %@", report);`


    You will end up with a mutablable string that you can write out to the console
    log. The output will look like this:


    `report = minus two, minus one, zero, one, two,`


    # 13. For-Each Loops


    Abstract


    `For-each` loops are a more specific type of loop that can only be used with collection
    objects like `NSArray` and `NSDictionary`. You can use a `for` loop when you want
    to move through a list of objects to perform an action on each object in the list.


    ## For-Each Loops Defined


    `For-each` loops are a more specific type of loop that can only be used with collection
    objects like `NSArray` and `NSDictionary`. You can use a `for` loop when you want
    to move through a list of objects to perform an action on each object in the list.


    For example, let’s take the array example from [Chapter 8](#A978-1-4302-6488-0_8_Chapter.html).


    `NSArray *numbers = @[@-2, @-1, @0, @1, @2];`


    In [Chapter 8](#A978-1-4302-6488-0_8_Chapter.html), you used the enumeration method
    with a block to go through the list and square each number. You can use a `for`
    loop as an alternative to the enumeration method.


    `for (NSNumber *num in numbers){`


        `NSLog(@"num ^ 2= %f", [num floatValue] * [num floatValue]);`


    `}`


    This loop starts with the `for` keyword before a specification in parentheses.
    The specification starts with an object type (`NSNumber`) and a variable that
    will give you a reference to the current object in the list, (`*num`).


    Next, you can see the keyword `in` followed by the array (`numbers`). Taken all
    together, you can read this as “for each number num in the array `numbers`, do
    something.” The something here is defined in the code block that comes right after
    the first part of the loop. It will go through the entire array and square each
    number, producing the following output:


    `num ^ 2= 4.000000`


    `num ^ 2= 1.000000`


    `num ^ 2= 0.000000`


    `num ^ 2= 1.000000`


    `num ^ 2= 4.000000`


    ### For Loops with NSDictionary


    Dictionaries are a little bit more complicated than arrays because dictionaries
    maintain a list of keys and objects. You might expect that a `for` each loop used
    on a dictionary would yield a list of objects; however it turns out that you will
    just get a list of the dictionary keys.


    So, if you code a for each loop with an `NSDictionary`, as in


    `NSDictionary *d1 = @{@"one": @1, @"two": @2, @"three": @3};`


    `for (id object in d1){`


        `NSLog(@"object = %@", object);`


    `}`


    you will get output that lists out all the keys like this :


    `object = one`


    `object = two`


    `object = three`


    If you want to output values in the dictionary, you will need to send the `objectForKey:`
    messageto the dictionary.


    `for (id object in d1){`


        `NSNumber *num = [d1 objectForKey:object];`


        `NSLog(@"num = %@", num);`


    `}`


    This `for` loop will print out the values of the objects.


    `num = 1`


    `num = 2`


    `num = 3`


    # 14. If Statements


    Abstract


    If statements are used when you want to make a choice to execute code based on
    the trueness of a condition. To make this work, you evaluate an expression that
    uses relational operators to yield a `YES` or `NO` result. If you evaluate an
    express to be true, then you can execute the code; otherwise you can ignore the
    code.'
