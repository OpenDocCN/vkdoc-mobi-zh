    \ URL 的 `NSURL` 对象，以及一个用于执行网络工作的 `NSURLSession` 对象。\n\n```\nNSURL *requestURL\
    \ = [NSURL URLWithString:requestString];\n```\n\n```\nNSURLSession *session =\
    \ [NSURLSession sharedSession];\n```\n\n### 发送和接收响应\n\n你将使用 `NSURLSession` 对象的一个块（block）来请求网络服务缩短\
    \ URL。将处理响应所需的全部代码放入作为参数传递的块中。通过这种方法，你实际上是在同时完成两件事。\n\n```\n[[session dataTaskWithURL:requestURL\n\
    \        completionHandler:^(NSData *data,\n                                 \
    \         NSURLResponse *response,\n                                         \
    \ NSError *error) {\n        }] resume];\n```\n\n```\nsleep(60);\n```\n\n你仍然需要填充用于处理响应的块，但这将启动操作。请注意，你需要在代码中放入一个\
    \ `sleep` 函数。`sleep` 函数会阻止主线程在 60 秒内执行新代码。你需要这样做，因为正在使用的方法将在后台线程上执行（这是使用网络服务时的最佳实践）。如果不阻止命令行应用完成网络服务，它将没有足够的时间为你获取结果。\n"
- fmt: "### Parsing JSON\n\nInside the completion block, you can add the code used\
    \ to interpret the response from the web server. Since you know that you are going\
    \ to be working with JSON, you will use the `NSJSONSerialization` class. You need\
    \ an `NSError` object here as well as the `NSData` object supplied by the block\
    \ (this contains the data from the web service response).\n\n```\n[[session dataTaskWithURL:requestURL\n\
    \n        completionHandler:^(NSData *data,\n\n                            NSURLResponse\
    \ *response,\n\n                            NSError *error) {\n\n       NSError\
    \ *e = nil;\n\n       NSDictionary *bitlyJSON = [NSJSONSerialization JSONObjectWithData:data\n\
    \n                                                                           \
    \        options:0\n\n                                                       \
    \                                error: &e];\n\n        }] resume];\n\n```\n\n\
    This gives you all the JSON data organized in an `NSDictionary` collection. This\
    \ dictionary can have other dictionaries, arrays, numbers, and strings located\
    \ inside it. The next step is a process of going through all these returned objects\
    \ to locate what you need. You also need to test for errors here.\n\n```\n[[session\
    \ dataTaskWithURL:requestURL\n\n        completionHandler:^(NSData *data,\n\n\
    \                            NSURLResponse *response,\n\n                    \
    \        NSError *error) {\n\nNSError *e = nil;\n\nNSDictionary *bitlyJSON = [NSJSONSerialization\
    \ JSONObjectWithData:data\n\n                                                \
    \                                       options:0\n\n                        \
    \                                                                  error:&e];\n\
    \nif(!error){\n\n    NSDictionary *results = [bitlyJSON objectForKey:@\"results\"\
    ];\n\n    NSDictionary *resultsForLongURL = [results objectForKey:longURL];\n\n\
    \    NSString *shortURL = [resultsForLongURL objectForKey:@\"shortUrl\"];\n\n\
    \    NSLog(@\"shortURL = %@\", shortURL);\n\n}\n\nelse\n\n    NSLog(@\"There was\
    \ an error parsing the JSON\");\n\n        }] resume];\n\n```\n\nOnce this is\
    \ all set up, if you run your app, you will have retrieved the `shortURL` from\
    \ the response and printed the following out to your console log:\n\n```\nshortURL\
    \ = http://bit.ly/1fHrAsT\n```\n\n**Note**\n\nWhen you are parsing a web service\
    \ response like this, you will need to investigate where the important data is\
    \ by looking at the API documentation or viewing the string that is returned.\n\
