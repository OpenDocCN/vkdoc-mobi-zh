    \ as in\n\n```\nNSDictionary *d1 = @{@\"one\": @1, @\"two\": @2, @\"three\": @3};\n\
    for (id object in d1){\n    NSLog(@\"object = %@\", object);\n}\n```\n\nyou will\
    \ get output that lists out all the keys like this:\n\n```\nobject = one\nobject\
    \ = two\nobject = three\n```\n\nIf you want to output values in the dictionary,\
    \ you will need to send the `objectForKey:` message to the dictionary.\n\n```\n\
    for (id object in d1){\n    NSNumber *num = [d1 objectForKey:object];\n    NSLog(@\"\
    num = %@\", num);\n}\n```\n\nThis `for` loop will print out the values of the\
    \ objects.\n\n```\nnum = 1\nnum = 2\nnum = 3\n```\n\n# 14. If Statements\n\n**Abstract**\n\
    \n`If` statements are used when you want to make a choice to execute code based\
    \ on the trueness of a condition. To make this work, you evaluate an expression\
    \ that uses relational operators to yield a `YES` or `NO` result. If you evaluate\
    \ an expression to be true, then you can execute the code; otherwise you can ignore\
    \ the code."
