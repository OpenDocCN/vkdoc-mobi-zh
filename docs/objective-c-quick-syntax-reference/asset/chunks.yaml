  raw: '#### Parsing JSON


    Inside the completion block, you can add the code used to interpret the response
    from the web server. Since you know that you are going to be working with JSON,
    you will use the `NSJSONSerialization` class. You need an `NSError` object here
    as well as the `NSData` object supplied by the block (this contains the data from
    the web service response).


    `[[session dataTaskWithURL:requestURL`


            `completionHandler:^(NSData *data,`


                                `NSURLResponse *response,`


                                `NSError *error) {`


           `NSError *e = nil;`


           `NSDictionary *bitlyJSON = [NSJSONSerialization JSONObjectWithData:data`


                                                                                                                       `options:0`


                                                                                                                           `error:`
    `&` `e];`


            `}] resume];`


    This gives you all the JSON data organized in an `NSDictionary` collection. This
    dictionary can have other dictionaries, arrays, numbers, and strings located inside
    it. The next step is a process of going through all these returned objects to
    locate what you need. You also need to test for errors here.


    `[[session dataTaskWithURL:requestURL`


            `completionHandler:^(NSData *data,`


                                `NSURLResponse *response,`


                                `NSError *error) {`


    `NSError *e = nil;`


    `NSDictionary *bitlyJSON = [NSJSONSerialization JSONObjectWithData:data`


                                                                                                           `options:0`


                                                                                                              `error:&e];`


    `if(!error){`


        `NSDictionary *results = [bitlyJSON objectForKey:@"results"];`


        `NSDictionary *resultsForLongURL = [results objectForKey:longURL];`


        `NSString *shortURL = [resultsForLongURL objectForKey:@"shortUrl"];`


        `NSLog(@"shortURL = %@", shortURL);`


    `}`


    `else`


        `NSLog(@"There was an error parsing the JSON");`


            `}] resume];`


    Once this is all set up, if you run your app, you will have retrieved the `shortURL`
    from the response and printed the following out to your console log:


    `shortURL =` [`http://bit.ly/1fHrAsT`](http://bit.ly/1fHrAsT)


    Note


    When you are parsing a web service response like this, you will need to investigate
    where the important data is by looking at the API documentation or viewing the
    string that is returned.


