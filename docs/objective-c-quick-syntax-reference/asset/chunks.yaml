    \ self;\n}\n@end\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
    \ {\n        return 0;\n    }\n}\n```\n\n现在你已经设置好类别，可以在 main 函数内部直接使用这个初始化器来创建并初始化新的`Project`类对象了。\n\
