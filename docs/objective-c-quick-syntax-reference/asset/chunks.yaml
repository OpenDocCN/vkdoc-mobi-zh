    \ `NSDictionary`. You can use a `for` loop when you want to move through a list\
    \ of objects to perform an action on each object in the list.\n\n## For-Each Loops\
    \ Defined\n\n`For-each` loops are a more specific type of loop that can only be\
    \ used with collection objects like `NSArray` and `NSDictionary`. You can use\
