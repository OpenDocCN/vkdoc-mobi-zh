    New Project:


    `retrievedName = New Project`


    # 22. Key-Value Observation


    Abstract


    One of the applications of key-value coding is implementing the observer pattern.
    The observer pattern is used when you want an object to get a notification when
    the state of another object changes. This pattern is implemented with key-value
    observation in Objective-C.


    ## Key-Value Observation Defined


    One of the applications of key-value coding is implementing the observer pattern.
    The observer pattern is used when you want an object to get a notification when
    the state of another object changes. This pattern is implemented with key-value
    observation in Objective-C.


    To see a clear example of key-value observation, you need at least two objects.
    One object will be observed while the other object will be observing. For this
    example, let’s assume that you have two types of objects: a `Project` object and
    a `Task` object. `Project` objects maintain a list of `Task` objects. The project
    object needs to be notified when the state of a `Task` object changes (when the
    task is marked as complete, for example).'
  trans: "\n### 作为属性的 Block\n\n尽管 Block 不像类那样需要实体，但你仍然可以使用 Block 来增强对象的灵活性。通过将 Block\
    \ 作为属性添加到对象中，你可以提供一个接口，让客户端能够将自定义行为注入到你的对象中。\n\n#### Block 的前向声明\n\n由于 Block 的处理方式与对象类似，因此你可以将\
    \ Block 用作属性。为此，你需要从类接口（无论是公开接口还是私有类扩展）开始。下面演示了如何将`customReport` Block 添加到最初在第\
    \ 16 章中定义的`Project`类中：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Project : NSObject{\n    @private NSString *log1;\n    @protected NSString *log2;\n\
    \    @public NSString *log3;\n}\n\n@property(strong) NSString *name;\n@property\
    \ (copy) void (^makeCustomReport)(NSString *title);\n\n-(void)generateReport;\n\
    -(void)generateReportAndAddThisString:(NSString *)string\n                   andThenAddThisDate:(NSDate\
    \ *)date;\n+(void)printTimeStamp;\n\n@end\n```\n\n你需要使用`copy`属性描述符，因为你需要 Block\
    \ 及其所有作用域变量被正确拷贝和保留。作为类的作者，接下来需要确定何时执行这个 Block，同时要记住，你永远无法提前预知 Block 中会包含什么代码。\n\
    \n#### 在类中使用 Block\n\n对于这个例子来说，`generateReport`方法看起来是一个适合执行 Block 的位置。你需要进入`Project`类的实现部分，找到`generateReport`方法并添加这个\
    \ Block 调用。\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n\
    \    NSLog(@\"This is a report!\");\n    self.makeCustomReport(@\"Custom Project\
    \ Report Title\");\n}\n\n@end\n```\n\n如果观察上面的加粗代码，你会发现使用参数 Block 与使用其他 Block 类似，唯一的区别是这里使用了`self`关键字来引用该\
    \ Block。\n\n#### 分配 Block\n\n这种模式真正强大之处在于，即使你不确切知道某个行为是什么，或者该行为会随时间变化，你仍然可以设立一种方式来执行该行为。\n\
    \n要使它生效，客户端需要为 Block 赋值，并为你实际定义该行为。你可以在示例的主函数中完成此操作。\n\n```\nProject *p =[[Project\
    \ alloc]init];\np.makeCustomReport = ^(NSString* title){\n    NSLog(@\"%@\", title);\n\
    \    NSLog(@\"This is a custom report requested by the author\");\n    NSLog(@\"\
    Say This\");\n    NSLog(@\"Say That\");\n    NSLog(@\"Say The Other Thing\");\n\
    };  \n[p generateReport];\n```\n\n你需要为示例发送`generateReport`消息；发送后，你将得到以下输出：\n\n\
    ```\nThis is a report!\nCustom Project Report Title\nThis is a custom report requested\
    \ by the author\nSay This\nSay That\nSay The Other Thing\n```\n\n# 21. 键值编码\n\n\
    概要\n\n通常，当你想获取或设置对象中的属性值时，你使用点符号来获取对属性的引用以更改值。然而，通过键值编码，你可以使用字符串键来间接存储和检索属性值。需要归档的应用程序需要这种功能，以便应用能够从归档文件中检索对象数据。\n\
    \n## 键值编码定义\n\n通常，当你想获取或设置对象中的属性值时，你使用点符号来获取对属性的引用以更改值。然而，通过键值编码，你可以使用字符串键来间接存储和检索属性值。需要归档的应用程序需要这种功能，以便应用能够从归档文件中检索对象数据。\n\
    \n### 设置属性值\n\n你可以使用键值编码来设置属性值。要设置属性值，你必须使用`setValue:forKey:`消息，并提供新的属性值以及该属性的`NSString`名称。\n\
    \n```\n[p setValue:@\"New Project\" forKey:@\"name\"];\n```\n\n### 检索属性值\n\n要使用键值编码检索属性值，你可以直接向对象发送`valueForKey`消息。该消息需要以`NSString`格式的属性名称作为参数。下面演示了如何从`Project`对象中检索`name`属性值：\n\
    \n```\nNSString *retrievedName = [p valueForKey:@\"name\"];\n```\n\n这适用于任何类型的对象，包括数据集合对象和自定义对象。现在，你可以使用`NSLog`函数将这个值打印到日志中。\n\
    \n```\nNSLog(@\"retrievedName = %@\", retrievedName);\n```\n\n如果 Project 的名称是\
    \ New Project，执行上述代码你将得到以下输出：\n\n```\nretrievedName = New Project\n```\n\n# 22.\
    \ 键值观察\n\n概要\n\n键值编码的应用之一是实现观察者模式。当你希望一个对象在另一个对象的状态发生变化时收到通知时，就会使用观察者模式。在 Objective-C\
    \ 中，这种模式是通过键值观察来实现的。\n\n## 键值观察定义\n\n键值编码的应用之一是实现观察者模式。当你希望一个对象在另一个对象的状态发生变化时收到通知时，就会使用观察者模式。在\
    \ Objective-C 中，这种模式是通过键值观察来实现的。\n\n要看到一个清晰的键值观察示例，你至少需要两个对象。一个对象将被观察，另一个对象则进行观察。在这个例子中，假设你有两种类型的对象：一个`Project`对象和一个`Task`对象。`Project`对象维护着一个`Task`对象的列表。当`Task`对象的状态发生变化时（例如，当任务被标记为完成时），项目对象需要得到通知。\n"
- fmt: "# Project and Task Object Graph\n\nLet's go over this object graph before\
    \ implementing key-value observation here. `Project` has been simplified for this\
    \ example and I've added a `Task` class definition. The object graph will get\
    \ set up in the `main.m` file.\n\nHere is the interface for the `Project` class:\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Task.h\"\n\n@interface Project\
    \ : NSObject\n@property(strong) NSString *name;\n@property(strong) NSMutableArray\
    \ *listOfTasks;\n-(void)generateReport;\n@end\n```\n\nHere is the implementation\
    \ for the `Project` class:\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\
    -(void)generateReport{\n    NSLog(@\"Report for %@ Project\", self.name);\n  \
    \  [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL\
    \ *stop) {\n        [obj generateReport];\n    }];\n}\n@end\n```\n\nHere is the\
    \ interface for the `Task` class:\n\n```\n#import <Foundation/Foundation.h>\n\n\
    @interface Task : NSObject\n@property(strong) NSString *name;\n@property(assign)\
    \ BOOL done;\n-(void)generateReport;\n@end\n```\n\nHere is the implementation\
    \ for the `Task` class:\n\n```\n#import \"Task.h\"\n\n@implementation Task\n-(void)generateReport{\n\
    \    NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\"\
    );\n}\n@end\n```\n\nFinally, you set up the object graph in `main.m` like this:\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n\nint main(int\
    \ argc, const char * argv[]){\n    @autoreleasepool {\n        Project *p = [[Project\
    \ alloc]init];\n        p.listOfTasks = [[NSMutableArray alloc]init];\n      \
    \  p.name = @\"Cook Dinner\";\n        Task *t1 = [[Task alloc]init];\n      \
    \  t1.name = @\"Choose Menu\";\n        [p.listOfTasks addObject:t1];\n      \
    \  Task *t2 = [[Task alloc]init];\n        t2.name = @\"Buy Groceries\";\n   \
    \     [p.listOfTasks addObject:t2];\n        Task *t3 = [[Task alloc]init];\n\
    \        t3.name = @\"Prepare Ingredients\";\n        [p.listOfTasks addObject:t3];\n\
    \        Task *t4 = [[Task alloc]init];\n        t4.name = @\"Cook Food\";\n \
    \       [p.listOfTasks addObject:t4];\n        return 0;\n    }\n}\n```\n\nThis\
    \ is going to give you a `Project` object named `Cook Dinner` with four tasks.\
    \ Now you are ready to implement key-value observation.\n\n## Implementing Key-Value\
    \ Observation\n\nYou want `Project` objects to be notified when the state of their\
    \ `Task` objects changes. So, if a `Task` object gets marked as complete, then\
    \ the `Project` object will be notified. There are three steps to using key-value\
    \ observation:\n\n*   Send the `addObserver:forKeyPath:options:context:` message\
    \ to each object that is being observed.\n*   Override the method `observeValueForKeyPath:ofObject:change:content:`\
    \ in the class definition of the object that is doing the observing.\n*   Override\
    \ the `dealloc` method and remove the observer reference in the class definition\
    \ of the object that is observing.\n\n### Add the Observer\n\nThe easiest way\
    \ to send this message to each `Task` that `Project` is responsible for is to\
    \ use the `listOfTasks` enumeration method:\n\n```\n[p.listOfTasks enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n    [obj addObserver:p\n              forKeyPath:@\"\
    done\"\n                 options:NSKeyValueObservingOptionNew\n              \
    \   context:nil];\n}];\n```\n\nThis code can be located in the `main.m` file after\
    \ all the `Task` objects have been added to the `Project` object. The first parameter\
    \ after the `AddObserver` parameter descriptor is the object that will be observing.\
    \ The next parameter is the key path, which is where you put the key for the property\
    \ that you want to observe. Next you have some options that you can set; you can\
    \ choose the `NSKeyValueObservingOptionNew` to keep track of new changes to the\
    \ property value.\n\n> **Note:** You could have chosen `NSKeyValueObservingOptionOld`\
    \ to get the previous values instead of the new values like you did above.\n\n\
    ### Observing Value Changes\n\nTo receive a notification when a property value\
    \ has changed, the object that is observing needs to override a method in the\
    \ object's class definition. This is where you locate the code you need to respond\
    \ to the change. Here is an example of how you would do this in the `Project.m`\
    \ implementation file:\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\
    -(void)observeValueForKeyPath:(NSString *)keyPath\n                     ofObject:(id)object\n\
    \                       change:(NSDictionary *)change\n                      context:(void\
    \ *)context{\n    if([keyPath isEqualToString:@\"done\"]){\n        NSNumber *updatedStatus\
    \ = [change objectForKey:@\"new\"];\n        BOOL done = [updatedStatus boolValue];\n\
    \        NSLog(@\"Task '%@' is now %@\", [object name], done ? @\"DONE\" : @\"\
    IN PROGRESS\");\n    }\n}\n@end\n```\n\n> **Note:** The code above is added to\
    \ the code that you added in the beginning of this chapter.\n\nWhenever a `Task`\
    \ object that you are watching changes its status, this method will execute. When\
    \ this happens, you first test to make sure that the property you are expecting\
    \ (`done`) is the property that changed. You need to do this because this method\
    \ can be shared for all sorts of notifications.\n\nIn the next line of code, you\
    \ pull out the `NSNumber` version of your property from the supplied `NSDictionary`\
    \ changes before converting this to the `BOOL` type that you are expecting. Finally,\
    \ you write out a report to the console log, reporting the updated status of the\
    \ task.\n\nBefore you test this code, you need to clean up after yourself.\n\n\
    ### De-Registering Observers\n\nYou need to make sure that the observer object\
    \ goes through and stops observing each object since the observer object will\
    \ soon be deleted. The place to perform this task is in the `dealloc` method.\
    \ Every object has a `dealloc` method that executes before the object is removed\
    \ from a program, so this is a good place to do this type of cleanup work.\n\n\
    Here is how you would code the `dealloc` method in the `Project.m` implementation\
    \ file:\n\n```\n-(void)dealloc{\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n        [obj removeObserver:self\n     \
    \            forKeyPath:@\"done\"];\n    }];\n}\n```\n\nThis will enumerate through\
    \ the `listOfTasks` array and remove the observer from each object.\n\n### Testing\
    \ the Observer\n\nTo test this, just change the `done` property in some of the\
    \ `Task` objects. Each time you do this, you will see the report written out to\
    \ the log. For example, let's say you did this in `main.m`:\n\n```\nt4.done =\
    \ YES;\nt4.done = NO;\nt2.done = YES;\nt1.done = NO;\n```\n\nYour `Project` object\
    \ would be notified each time this state is changed, which would produce this\
    \ output to the log:\n\n```\nTask 'Cook Food' is now DONE\nTask 'Cook Food' is\
    \ now IN PROGRESS\nTask 'Buy Groceries' is now DONE\nTask 'Choose Menu' is now\
    \ IN PROGRESS\n```\n\n# Protocols\n\n## Abstract\n\nProtocols are used to define\
    \ a set of methods and properties independently of a class. Any class can adopt\
    \ a protocol, which means that the class implements the properties and methods\
    \ defined by the protocol. In effect, protocols define a contract that classes\
    \ can agree to fulfill. When a class adopts a protocol, you can be confident that\
    \ the class will have implemented the properties and methods in the protocol.\n\
    \n## Protocols Overview\n\nProtocols are used to define a set of methods and properties\
    \ independently of a class. Any class can adopt a protocol, which means that the\
    \ class implements the properties and methods defined by the protocol. In effect,\
    \ protocols define a contract that classes can agree to fulfill. When a class\
    \ adopts a protocol, you can be confident that the class will have implemented\
    \ the properties and methods in the protocol."
  raw: '## Project and Task Object Graph


    Let’s go over this object graph before implementing key-value observation here.
    `Project` has been simplified for this example and I’ve added a `Task` class definition.
    The object graph will get set up in the `main.m` file.


    Here is the interface for the `Project` class:


    `#import <Foundation/Foundation.h>`


    `#import "Task.h"`


    `@interface Project : NSObject`


    `@property(strong) NSString *name;`


    `@property(strong) NSMutableArray *listOfTasks;`


    `-(void)generateReport;`


    `@end`


    Here is the implementation for the `Project` class:


    `#import "Project.h"`


    `@implementation Project`


    `-(void)generateReport{`


        `NSLog(@"Report for %@ Project", self.name);`


        `[self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL
    *stop) {`


            `[obj generateReport];`


        `}];`


    `}`


    `@end`


    Here is the interface for the `Task` class:


    `#import <Foundation/Foundation.h>`


    `@interface Task : NSObject`


    `@property(strong) NSString *name;`


    `@property(assign) BOOL done;`


    `-(void)generateReport;`


    `@end`


    Here is the implementation for the `Task` class:


    `#import "Task.h"`


    `@implementation Task`


    `-(void)generateReport{`


        `NSLog(@"Task %@ is %@", self.name, self.done ? @"DONE" : @"IN PROGRESS");`


    `}`


    `@end`


    Finally, you set up the object graph in `main.m` like this:


    `#import <Foundation/Foundation.h>`


    `#import "Project.h"`


    `int main(int argc, const char * argv[]){`


        `@autoreleasepool {`


            `Project *p = [[Project alloc]init];`


            `p.listOfTasks = [[NSMutableArray alloc]init];`


            `p.name = @"Cook Dinner";`


            `Task *t1 = [[Task alloc]init];`


            `t1.name = @"Choose Menu";`


            `[p.listOfTasks addObject:t1];`


            `Task *t2 = [[Task alloc]init];`


            `t2.name = @"Buy Groceries";`


            `[p.listOfTasks addObject:t2];`


            `Task *t3 = [[Task alloc]init];`


            `t3.name = @"Prepare Ingredients";`


            `[p.listOfTasks addObject:t3];`


            `Task *t4 = [[Task alloc]init];`


            `t4.name = @"Cook Food";`


            `[p.listOfTasks addObject:t4];`


            `return 0;`


        `}`


    `}`


    This is going to give you a `Project` object named `Cook Dinner` with four tasks.
    Now you are ready to implement key-value observation.


    ## Implementing Key-Value Observation


    You want `Project` objects to be notified when the state of their `Task` objects
    changes. So, if a `Task` object gets marked as complete, then the `Project` object
    will be notified. There are three steps to using key-value observation:


    *   Send the `addObserver:forKeyPath:options:context:` message to each object
    that is being observed.

    *   Override the method `observeValueForKeyPath:ofObject:change:content:` in the
    class definition of the object that is doing the observing.

    *   Override the `dealloc` method and remove the observer reference in the class
    definition of the object that is observing.


    ## Add the Observer


    The easiest way to send this message to each `Task` that `Project` is responsible
    for is to use the `listOfTasks` enumeration method:


    `[p.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)
    {`


        `[obj addObserver:p`


                  `forKeyPath:@"done"`


                         `options:NSKeyValueObservingOptionNew`


                         `context:nil];`


    `}];`


    This code can be located in the `main.m` file after all the `Task` objects have
    been added to the `Project` object. The first parameter after the `AddObserver`
    parameter descriptor is the object that will be observing. The next parameter
    is the key path, which is where you put the key for the property that you want
    to observe. Next you have some options that you can set; you can choose the `NSKeyValueObservingOptionNew`
    to keep track of new changes to the property value.


    Note


    You could have chosen `NSKeyValueObservingOptionOld` to get the previous values
    instead of the new values like you did above.


    ### Observing Value Changes


    To receive a notification when a property value has changed, the object that is
    observing needs to override a method in the object’s class definition. This is
    where you locate the code you need to respond to the change. Here is an example
    of how you would do this in the `Project.m` implementation file:


    `#import "Project.h"`


    `@implementation Project`


    `-(void)observeValueForKeyPath:(NSString *)keyPath`


                         `ofObject:(id)object`


                           `change:(NSDictionary *)change`


                          `context:(void *)context{`


        `if([keyPath isEqualToString:@"done"]){`


            `NSNumber *updatedStatus = [change objectForKey:@"new"];`


            `BOOL done = [updatedStatus boolValue];`


            `NSLog(@"Task ''%@'' is now %@", [object name], done ? @"DONE" : @"IN
    PROGRESS");`


        `}`


    `}`


    `@end`


    Note


    The code above is added to the code that you added in the beginning of this chapter.


    Whenever a `Task` object that you are watching changes its status, this method
    will execute. When this happens, you first test to make sure that the property
    you are expecting (`done)` is the property that changed. You need to do this because
    this method can be shared for all sorts of notifications.


    In the next line of code, you pull out the `NSNumber` version of your property
    from the supplied `NSDictionary changes` before converting this to the `BOOL`
    type that you are expecting. Finally, you write out a report to the console log,
    reporting the updated status of the task.


    Before you test this code, you need to clean up after yourself.


    ### De-Registering Observers


    You need to make sure that the observer object goes through and stops observing
    each object since the observer object will soon be deleted. The place to perform
    this task is in the `dealloc` method. Every object has a `dealloc` method that
    executes before the object is removed from a program, so this is a good place
    to do this type of cleanup work.


    Here is how you would code the `dealloc` method in the `Project.m` implementation
    file:


    `-(void)dealloc{`


        `[self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL
    *stop) {`


            `[obj removeObserver:self`


                     `forKeyPath:@"done"];`


        `}];`


    `}`


    This will enumerate through the `listOfTasks` array and remove the observer from
    each object.


    ### Testing the Observer


    To test this, just change the `done` property in some of the `Task` objects. Each
    time you do this, you will see the report written out to the log. For example,
    let’s say you did this in `main.m`:


    `t4.done = YES;`


    `t4.done = NO;`


    `t2.done = YES;`


    `t1.done = NO;`


    Your `Project` object would be notified each time this state is changed, which
    would produce this output to the log:


    `Task ''Cook Food'' is now DONE`


    `Task ''Cook Food'' is now IN PROGRESS`


    `Task ''Buy Groceries'' is now DONE`


    `Task ''Choose Menu'' is now IN PROGRESS`


    # 23. Protocols


    Abstract


    Protocols are used to define a set of methods and properties independently of
    a class. Any class can adopt a protocol, which means that the class implements
    the properties and methods defined by the protocol. In effect, protocols define
    a contract that classes can agree to fulfill. When a class adopts a protocol,
    you can be confident that the class will have implemented the properties and methods
    in the protocol.


    ## Protocols Overview


    Protocols are used to define a set of methods and properties independently of
    a class. Any class can adopt a protocol, which means that the class implements
    the properties and methods defined by the protocol. In effect, protocols define
    a contract that classes can agree to fulfill. When a class adopts a protocol,
    you can be confident that the class will have implemented the properties and methods
    in the protocol.'
  trans: "\n# 项目与任务对象图\n\n在实现键值观察之前，我们先了解这个对象图。为了便于说明，`Project` 类已做了简化，同时我添加了一个 `Task`\
    \ 类的定义。对象图将在 `main.m` 文件中建立。\n\n以下是 `Project` 类的接口：\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Task.h\"\n\n@interface Project : NSObject\n@property(strong) NSString\
    \ *name;\n@property(strong) NSMutableArray *listOfTasks;\n-(void)generateReport;\n\
    @end\n```\n\n以下是 `Project` 类的实现：\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n-(void)generateReport{\n    NSLog(@\"Report for %@ Project\", self.name);\n\
    \    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL\
    \ *stop) {\n        [obj generateReport];\n    }];\n}\n@end\n```\n\n以下是 `Task`\
    \ 类的接口：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Task : NSObject\n\
    @property(strong) NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n\
    @end\n```\n\n以下是 `Task` 类的实现：\n\n```\n#import \"Task.h\"\n\n@implementation Task\n\
    -(void)generateReport{\n    NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"\
    DONE\" : @\"IN PROGRESS\");\n}\n@end\n```\n\n最后，在 `main.m` 中像这样设置对象图：\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"Project.h\"\n\nint main(int argc,\
    \ const char * argv[]){\n    @autoreleasepool {\n        Project *p = [[Project\
    \ alloc]init];\n        p.listOfTasks = [[NSMutableArray alloc]init];\n      \
    \  p.name = @\"Cook Dinner\";\n        Task *t1 = [[Task alloc]init];\n      \
    \  t1.name = @\"Choose Menu\";\n        [p.listOfTasks addObject:t1];\n      \
    \  Task *t2 = [[Task alloc]init];\n        t2.name = @\"Buy Groceries\";\n   \
    \     [p.listOfTasks addObject:t2];\n        Task *t3 = [[Task alloc]init];\n\
    \        t3.name = @\"Prepare Ingredients\";\n        [p.listOfTasks addObject:t3];\n\
    \        Task *t4 = [[Task alloc]init];\n        t4.name = @\"Cook Food\";\n \
    \       [p.listOfTasks addObject:t4];\n        return 0;\n    }\n}\n```\n\n这会给你一个名为\
    \ `Cook Dinner` 的 `Project` 对象，它包含四个任务。现在你可以实施键值观察了。\n\n## 实施键值观察\n\n你希望当 `Task`\
    \ 对象的状态发生变化时，`Project` 对象能得到通知。因此，如果一个 `Task` 对象被标记为完成，那么 `Project` 对象就会收到通知。使用键值观察需要三个步骤：\n\
    \n*   向每个被观察的对象发送 `addObserver:forKeyPath:options:context:` 消息。\n*   在观察者对象的类定义中重写\
    \ `observeValueForKeyPath:ofObject:change:content:` 方法。\n*   在观察者对象的类定义中重写 `dealloc`\
    \ 方法，并移除观察者引用。\n\n### 添加观察者\n\n向 `Project` 负责的每个 `Task` 发送此消息的最简单方法是使用 `listOfTasks`\
    \ 的枚举方法：\n\n```\n[p.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger\
    \ idx, BOOL *stop) {\n    [obj addObserver:p\n              forKeyPath:@\"done\"\
    \n                 options:NSKeyValueObservingOptionNew\n                 context:nil];\n\
    }];\n```\n\n这段代码可以放在 `main.m` 文件中，在所有 `Task` 对象都添加到 `Project` 对象之后。`AddObserver`\
    \ 参数描述符后的第一个参数是观察者对象。下一个参数是键路径，在这里设置你想要观察的属性的键。接着是一些你可以设置的选项；你可以选择 `NSKeyValueObservingOptionNew`\
    \ 来跟踪属性值的最新变化。\n\n> **注意：** 你也可以选择 `NSKeyValueObservingOptionOld` 来获取之前的属性值，而不是像上面那样获取最新值。\n\
    \n### 观察值的变化\n\n要在属性值发生变化时收到通知，观察者对象需要在其类定义中重写一个方法。你在这里编写代码来响应变化。以下是在 `Project.m`\
    \ 实现文件中执行此操作的示例：\n\n```\n#import \"Project.h\"\n\n@implementation Project\n-(void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                     ofObject:(id)object\n                      \
    \ change:(NSDictionary *)change\n                      context:(void *)context{\n\
    \    if([keyPath isEqualToString:@\"done\"]){\n        NSNumber *updatedStatus\
    \ = [change objectForKey:@\"new\"];\n        BOOL done = [updatedStatus boolValue];\n\
    \        NSLog(@\"Task '%@' is now %@\", [object name], done ? @\"DONE\" : @\"\
    IN PROGRESS\");\n    }\n}\n@end\n```\n\n> **注意：** 上述代码将添加到你本章开头添加的代码中。\n\n每当你正在观察的\
    \ `Task` 对象改变其状态时，此方法都会执行。发生这种情况时，你首先需要测试以确保你期望的属性（`done`）确实发生了改变。你需要这样做，因为此方法可以用于各种类型的通知。\n\
    \n在下一行代码中，你从提供的 `NSDictionary` 变化中提取出属性的 `NSNumber` 版本，然后将其转换为你期望的 `BOOL` 类型。最后，你向控制台输出报告，报告任务的更新状态。\n\
    \n在测试这段代码之前，你需要进行清理工作。\n\n### 注销观察者\n\n你需要确保观察者对象会遍历并停止观察每个对象，因为观察者对象很快就会被删除。执行此任务的最佳位置是在\
    \ `dealloc` 方法中。每个对象在被从程序中移除之前都会执行 `dealloc` 方法，因此这是进行此类清理工作的好时机。\n\n以下是在 `Project.m`\
    \ 实现文件中编写 `dealloc` 方法的方式：\n\n```\n-(void)dealloc{\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n        [obj removeObserver:self\n     \
    \            forKeyPath:@\"done\"];\n    }];\n}\n```\n\n这将遍历 `listOfTasks` 数组，并从每个对象中移除观察者。\n\
    \n### 测试观察者\n\n要测试这一点，只需更改某些 `Task` 对象的 `done` 属性。每次这样做时，你都会看到报告写入日志。例如，假设你在 `main.m`\
    \ 中这样做：\n\n```\nt4.done = YES;\nt4.done = NO;\nt2.done = YES;\nt1.done = NO;\n\
    ```\n\n每次状态发生变化时，你的 `Project` 对象都会收到通知，这会产生以下日志输出：\n\n```\nTask 'Cook Food' is\
    \ now DONE\nTask 'Cook Food' is now IN PROGRESS\nTask 'Buy Groceries' is now DONE\n\
    Task 'Choose Menu' is now IN PROGRESS\n```\n\n# 协议\n\n## 摘要\n\n协议用于独立于类定义一组方法和属性。任何类都可以采纳协议，这意味着该类实现了协议中定义的属性和方法。实际上，协议定义了一个契约，类可以同意履行该契约。当一个类采纳协议时，你可以确信该类已经实现了协议中的属性和方法。\n\
    \n## 协议概述\n\n协议用于独立于类定义一组方法和属性。任何类都可以采纳协议，这意味着该类实现了协议中定义的属性和方法。实际上，协议定义了一个契约，类可以同意履行该契约。当一个类采纳协议时，你可以确信该类已经实现了协议中的属性和方法。\n"
- fmt: "# Defining Protocols\n\nTo use protocols, you must start by defining the protocol.\
    \ Use the `@protocol` keyword to start defining the protocol. You can simply include\
    \ this in the same file as the class that the protocol is associated with or you\
    \ can include the protocol in a separate header file. If you want to define a\
    \ protocol for the `Task` class that you coded in the previous chapter, you could\
    \ do this:\n\n```\n#import <Foundation/Foundation.h>\n@class Task;\n@protocol\
    \ TaskDelegate <NSObject>\n@optional\n-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;\n\
    @end\n@interface Task : NSObject\n@end\n```\n\nThe protocol name follows the `@protocol`\
    \ keyword and the word in the angle brackets is the protocol that you are inheriting.\
    \ `NSObject` is the protocol that `NSObject` classes must conform to. Inheriting\
    \ a protocol is like inheriting a class, but the implication now is that classes\
    \ that adopt your protocol will be responsible for the methods that you define,\
    \ in addition to the methods defined in the inherited protocol.\n\nThe protocol\
    \ definition ends with the `@end` keyword. All the methods and properties between\
    \ the `@protocol` and the `@end` are the methods that are required to be implemented\
    \ when a class adopts this protocol.\n\nNote: You needed to use the `@class` keyword\
    \ above because you referenced the `Task` class in the protocol before defining\
    \ the class below. `@class` gives you a way of referencing a class without the\
    \ interface.\n\n## Optional and Required Methods and Properties\n\nProtocol methods\
    \ are required by default. However, you can specify methods to be optional. Optional\
    \ methods are used when the functionality is present but not crucial. To mark\
    \ methods as optional, use the `@optional` keyword. Every property and method\
    \ that appears after the `@optional` keyword will be considered optional.\n\n\
    Use the `@required` key to mark methods and property as required. Every method\
    \ and property that follows will be considered required.\n\n## Adopting Protocols\n\
    \nYou indicate that a class will adopt a protocol by including the protocol name\
    \ in angle brackets after the superclass in the class interface. If a class adopts\
    \ more than one protocol, then you must provide a comma-separated list of protocol\
    \ names in the angle brackets.\n\nIf you want `Project` to adopt the `TaskDelegate`\
    \ protocol, you would go to the `Project` interface and adopt the protocol, like\
    \ this:\n\n```\n#import <Foundation/Foundation.h>\n#import \"Task.h\"\n@interface\
    \ Project : NSObject <TaskDelegate>\n@property(strong) NSString *name;\n@property(strong)\
    \ NSMutableArray *listOfTasks;\n-(void)generateReport;\n@end\n```\n\nOnce you\
    \ adopt the `TaskDelegate` protocol, you are agreeing to implement the `TaskDelegate`\
    \ methods and properties. If you were to attempt to build your project right now,\
    \ you would get a warning. The next thing you have to do is implement the methods\
    \ defined in `TaskDelegate`.\n\n## Implementing Protocol Methods\n\nYou implement\
    \ protocol methods just as you would any other methods. You implement the protocol\
    \ methods in the implementation of the class that adopted the protocol.\n\nFor\
    \ this example, you would go to the `Project` class implementation and add this\
    \ method:\n\n```\n#import \"Project.h\"\n@implementation Project\n-(void)thisTask:(Task\
    \ *)task statusHasChangedToThis:(BOOL)done{\n    NSLog(@\"Task '%@' is now %@\"\
    , task.name, done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n@end\n```\n\nYou can’t\
    \ test this code yet because you still need to add code to give `Task` objects\
    \ the ability to use this protocol. This is part of the Delegation design pattern\
    \ that is covered in the next chapter.\n\n# Delegation\n\nAbstract: Delegation\
    \ is a design pattern where one object asks another object for help. Protocols\
    \ are an important part of Delegation, because protocols define how an object\
    \ will be helped.\n\n## Delegation Defined\n\nDelegation is a design pattern where\
    \ one object asks another object for help. Protocols are an important part of\
    \ Delegation, because protocols define how an object will be helped.\n\nDelegation\
    \ works by defining a protocol that will list out all the methods and properties\
    \ an object will need help with. Another object, known as the delegate, will provide\
    \ the help needed by adopting and implementing the protocol methods. Objects ask\
    \ for help by sending messages to their delegates.\n\n### Defining Delegate Protocols\n\
    \nLet’s say you want to implement Delegation for your object graph that includes\
    \ the `Project` object and `Task` objects. In your object graph, your `Task` objects\
    \ may need help from the `Project` object. For instance, when a `Task` status\
    \ is marked as Done, the `task` may not know what to do next. The `task` could\
    \ ask the `Project` for help if the `Project` was capable of acting as the `Task's`\
    \ delegate.\n\nTo make that happen, you would need to first define a protocol\
    \ for `Task` that defined the ways that `Task` would need help. Luckily for you,\
    \ you already did that in the previous chapter.\n\n```\n#import <Foundation/Foundation.h>\n\
    @class Task;\n@protocol TaskDelegate <NSObject>\n@optional\n-(void)thisTask:(Task\
    \ *)task statusHasChangedToThis:(BOOL)done;\n@end\n@interface Task : NSObject\n\
    @property(strong) NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n\
    @end\n```\n\nThe protocol is called `TaskDelegate` (because you are using this\
    \ to define how delegates can help you). `thisTask:statusHasChangedToThis:` is\
    \ the method that delegates can use to help you.\n\n### Sending Messages to the\
    \ Delegate\n\nWhen `Task` objects need help, they can send messages to the delegate.\
    \ Since you want this to happen when the `Task` status is changed, you can do\
    \ this by writing a custom property accessor for the `Task done` property.\n\n\
    Note: In Chapter 16, you declared properties and allowed them to be supported\
    \ by automatically generated getters and setters. There are some situations where\
    \ you want to code your own getters and setters.\n\nYou can send the message right\
    \ in the `Task` done setter method.\n\n```\n#import \"Task.h\"\n@implementation\
    \ Task\n-(void)generateReport{\n    NSLog(@\"Task %@ is %@\", self.name, self.done\
    \ ? @\"DONE\" : @\"IN PROGRESS\");\n}\nBOOL _done;\n-(void)setDone:(BOOL)done{\n\
    \    _done = done;\n    [self.delegate thisTask:self statusHasChangedToThis:done];\n\
    }\n-(BOOL)done{\n    return _done;\n}\n@end\n```\n\nIn the setter, you can see\
    \ that you are sending the message to the delegate. Your `delegate` can implement\
    \ this method to respond to the event of the `done` property changing.\n\nThe\
    \ other thing you may notice is that you have coded the getter as well. Even though\
    \ you don’t need to add any new code to the getter, you must manually implement\
    \ both the getter and the setter when you decide to implement one or the other."
  raw: '### Defining Protocols


    To use protocols, you must start by defining the protocol. Use the `@protocol`
    keyword to start defining the protocol. You can simply include this in the same
    file as the class that the protocol is associated with or you can include the
    protocol in a separate header file. If you want to define a protocol for the `Task`
    class that you coded in the previous chapter, you could do this:


    `#import <Foundation/Foundation.h>`


    `@class Task;`


    `@protocol TaskDelegate <NSObject>`


    `@optional`


    `-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;`


    `@end`


    `@interface Task : NSObject`


    `@end`


    The protocol name follows the `@protocol` keyword and the word in the angle brackets
    is the protocol that you are inheriting. `NSObject` is the protocol that `NSObject`
    classes must conform to. Inheriting a protocol is like inheriting a class, but
    the implication now is that classes that adopt your protocol will be responsible
    for the methods that you define, in addition to the methods defined in the inherited
    protocol.


    The protocol definition ends with the `@end` keyword. All the methods and properties
    between the `@protocol` and the `@end` are the methods that are required to be
    implemented when a class adopts this protocol.


    Note


    You needed to use the `@class` keyword above because you referenced the `Task`
    class in the protocol before defining the class below. `@class` gives you a way
    of referencing a class without the interface.


    #### Optional and Required Methods and Properties


    Protocol methods are required by default. However, you can specify methods to
    be optional. Optional methods are used when the functionality is present but not
    crucial. To mark methods as optional, use the `@optional` keyword. Every property
    and method that appears after the `@optional` keyword will be considered optional.


    Use the `@required` key to mark methods and property as required. Every method
    and property that follows will be considered required.


    ### Adopting Protocols


    You indicate that a class will adopt a protocol by including the protocol name
    in angle brackets after the superclass in the class interface. If a class adopts
    more than one protocol, then you must provide a comma-separated list of protocol
    names in the angle brackets.


    If you want `Project` to adopt the `TaskDelegate` protocol, you would go to the
    `Project` interface and adopt the protocol, like this:


    `#import <Foundation/Foundation.h>`


    `#import "Task.h"`


    `@interface Project : NSObject` `<TaskDelegate>`


    `@property(strong) NSString *name;`


    `@property(strong) NSMutableArray *listOfTasks;`


    `-(void)generateReport;`


    `@end`


    Once you adopt the `TaskDelegate` protocol, you are agreeing to implement the
    `TaskDelegate` methods and properties. If you were to attempt to build your project
    right now, you would get a warning. The next thing you have to do is implement
    the methods defined in `TaskDelegate`.


    ### Implementing Protocol Methods


    You implement protocol methods just as you would any other methods. You implement
    the protocol methods in the implementation of the class that adopted the protocol.


    For this example, you would go to the `Project` class implementation and add this
    method:


    `#import "Project.h"`


    `@implementation Project`


    `-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done{`


        `NSLog(@"Task ''%@'' is now %@", task.name, done ? @"DONE" : @"IN PROGRESS");`


    `}`


    `@end`


    You can’t test this code yet because you still need to add code to give `Task`
    objects the ability to use this protocol. This is part of the Delegation design
    pattern that is covered in the next chapter.


    # 24. Delegation


    Abstract


    Delegation is a design pattern where one object asks another object for help.
    Protocols are an important part of Delegation, because protocols define how an
    object will be helped.


    ## Delegation Defined


    Delegation is a design pattern where one object asks another object for help.
    Protocols are an important part of Delegation, because protocols define how an
    object will be helped.


    Delegation works by defining a protocol that will list out all the methods and
    properties an object will need help with. Another object, known as the delegate,
    will provide the help needed by adopting and implementing the protocol methods.
    Objects ask for help by sending messages to their delegates.


    ### Defining Delegate Protocols


    Let’s say you want to implement Delegation for your object graph that includes
    the `Project` object and `Task` objects. In your object graph, your `Task` objects
    may need help from the `Project` object. For instance, when a `Task` status is
    marked as Done, the `task` may not know what to do next. The `task` could ask
    the `Project` for help if the `Project` was capable of acting as the `Task''s`
    delegate.


    To make that happen, you would need to first define a protocol for `Task` that
    defined the ways that `Task` would need help. Luckily for you, you already did
    that in the previous chapter.


    `#import <Foundation/Foundation.h>`


    `@class Task;`


    `@protocol TaskDelegate <NSObject>`


    `@optional`


    `-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;`


    `@end`


    `@interface Task : NSObject`


    `@property(strong) NSString *name;`


    `@property(assign) BOOL done;`


    `-(void)generateReport;`


    `@end`


    The protocol is called `TaskDelegate`(because you are using this to define how
    delegates can help you). `thisTask:statusHasChangedToThis:` is the method that
    delegates can use to help you.


    ### Sending Messages to the Delegate


    When `Task` objects need help, they can send messages to the delegate. Since you
    want this to happen when the `Task` status is changed, you can do this by writing
    a custom property accessor for the `Task done` property.


    Note


    In [Chapter 16](#A978-1-4302-6488-0_16_Chapter.html), you declared properties
    and allowed them to be supported by automatically generated getters and setters.
    There are some situations where you want to code your own getters and setters.


    You can send the message right in the `Task` done setter method.


    `#import "Task.h"`


    `@implementation Task`


    `-(void)generateReport{`


        `NSLog(@"Task %@ is %@", self.name, self.done ? @"DONE" : @"IN PROGRESS");`


    `}`


    `BOOL _done;`


    `-(void)setDone:(BOOL)done{`


        `_done = done;`


        `[self.delegate thisTask:self statusHasChangedToThis:done];`


    `}`


    `-(BOOL)done{`


        `return _done;`


    `}`


    `@end`


    In the setter, you can see that you are sending the message to the delegate. Your
    `delegate` can implement this method to respond to the event of the `done` property
    changing.


    The other thing you may notice is that you have coded the getter as well. Even
    though you don’t need to add any new code to the getter, you must manually implement
    both the getter and the setter when you decide to implement one or the other.'
  trans: "\n# 定义协议\n\n要使用协议，必须首先定义协议。使用 `@protocol` 关键字开始定义协议。你可以将其包含在与协议相关联的类所在的同一文件中，也可以将协议放在一个单独的头文件中。如果你想为上一章中编写的\
    \ `Task` 类定义一个协议，可以这样做：\n\n```\n#import <Foundation/Foundation.h>\n@class Task;\n\
    @protocol TaskDelegate <NSObject>\n@optional\n-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;\n\
    @end\n@interface Task : NSObject\n@end\n```\n\n协议名称跟在 `@protocol` 关键字后面，尖括号中的内容是要继承的协议。`NSObject`\
    \ 是所有 `NSObject` 类必须遵循的协议。继承一个协议类似于继承一个类，但现在意味着采用你定义的协议的类，除了要实现继承协议中定义的方法之外，还要负责你定义的方法。\n\
    \n协议定义以 `@end` 关键字结束。位于 `@protocol` 和 `@end` 之间的所有方法和属性，都是类在采用该协议时需要实现的内容。\n\n\
    注意：上面需要用到 `@class` 关键字，是因为在下面定义 `Task` 类之前，你已经在协议中引用了它。`@class` 提供了一种在不使用接口的情况下引用类的方式。\n\
    \n## 可选与必需的方法和属性\n\n协议方法默认是必需的。不过，你可以将某些方法指定为可选的。可选方法用于功能存在但并非关键的情况。要标记方法为可选，请使用\
    \ `@optional` 关键字。在 `@optional` 关键字之后出现的每个属性和方法都将被视为可选。\n\n使用 `@required` 关键字将方法和属性标记为必需。之后的所有方法和属性都将被视为必需。\n\
    \n## 采用协议\n\n你可以在类接口中父类后面的尖括号里包含协议名称，以此指示某个类将采用该协议。如果一个类要采用多个协议，则必须在尖括号内提供以逗号分隔的协议名称列表。\n\
    \n如果你想让 `Project` 采用 `TaskDelegate` 协议，可以像这样在 `Project` 接口中采用该协议：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"Task.h\"\n@interface Project : NSObject\
    \ <TaskDelegate>\n@property(strong) NSString *name;\n@property(strong) NSMutableArray\
    \ *listOfTasks;\n-(void)generateReport;\n@end\n```\n\n一旦采用 `TaskDelegate` 协议，就表示你同意实现\
    \ `TaskDelegate` 中的方法和属性。如果现在尝试构建项目，你会收到一条警告。接下来要做的就是实现 `TaskDelegate` 中定义的方法。\n\
    \n## 实现协议方法\n\n实现协议方法与实现其他方法完全相同。你需要在采用该协议的类的实现中实现这些协议方法。\n\n对于这个例子，你需要在 `Project`\
    \ 类的实现中添加这个方法：\n\n```\n#import \"Project.h\"\n@implementation Project\n-(void)thisTask:(Task\
    \ *)task statusHasChangedToThis:(BOOL)done{\n    NSLog(@\"Task '%@' is now %@\"\
    , task.name, done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n@end\n```\n\n你还不能测试这段代码，因为你还需要添加代码，让\
    \ `Task` 对象能够使用这个协议。这属于下一章将要介绍的委托设计模式的一部分。\n\n# 委托\n\n摘要：委托是一种设计模式，其中一个对象向另一个对象请求帮助。协议是委托的重要组成部分，因为协议定义了对象将如何获得帮助。\n\
    \n## 委托的定义\n\n委托是一种设计模式，其中一个对象向另一个对象请求帮助。协议是委托的重要组成部分，因为协议定义了对象将如何获得帮助。\n\n委托的工作方式是：定义一个协议，列出某个对象需要帮助的所有方法和属性。另一个对象称为委托，它通过采用并实现协议方法来提供所需的帮助。对象通过向其委托发送消息来请求帮助。\n\
    \n### 定义委托协议\n\n假设你想在包含 `Project` 对象和 `Task` 对象的对象图中实现委托。在你的对象图中，`Task` 对象可能需要从\
    \ `Project` 对象获得帮助。例如，当某个 `Task` 的状态被标记为“完成”时，该任务可能不知道下一步该做什么。如果 `Project` 能够充当\
    \ `Task` 的委托，那么 `Task` 就可以向 `Project` 请求帮助。\n\n要实现这一点，你首先需要为 `Task` 定义一个协议，明确\
    \ `Task` 需要帮助的方式。幸运的是，你已经在上一章中完成了这一步。\n\n```\n#import <Foundation/Foundation.h>\n\
    @class Task;\n@protocol TaskDelegate <NSObject>\n@optional\n-(void)thisTask:(Task\
    \ *)task statusHasChangedToThis:(BOOL)done;\n@end\n@interface Task : NSObject\n\
    @property(strong) NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n\
    @end\n```\n\n该协议名为 `TaskDelegate`（因为你用这个协议来定义委托如何提供帮助）。`thisTask:statusHasChangedToThis:`\
    \ 是委托可以用来提供帮助的方法。\n\n### 向委托发送消息\n\n当 `Task` 对象需要帮助时，它们可以向委托发送消息。由于你希望在 `Task`\
    \ 状态发生变化时触发此操作，可以通过为 `Task` 的 `done` 属性编写自定义属性访问器来实现。\n\n注意：在第 16 章中，你声明了属性并让它们由自动生成的\
    \ getter 和 setter 来支持。在某些情况下，你可能希望自己编写 getter 和 setter。\n\n你可以在 `Task` 的 `done`\
    \ setter 方法中直接发送消息。\n\n```\n#import \"Task.h\"\n@implementation Task\n-(void)generateReport{\n\
    \    NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\"\
    );\n}\nBOOL _done;\n-(void)setDone:(BOOL)done{\n    _done = done;\n    [self.delegate\
    \ thisTask:self statusHasChangedToThis:done];\n}\n-(BOOL)done{\n    return _done;\n\
    }\n@end\n```\n\n在 setter 中，你可以看到正在向委托发送消息。你的 `delegate` 可以实现该方法来响应 `done` 属性更改的事件。\n\
    \n你可能会注意到的另一件事是，你也编写了 getter。即使不需要在 getter 中添加任何新代码，当你决定实现 setter 或 getter 中的任意一个时，必须手动实现两者。\n"
- fmt: "### Assigning the Delegate\n\nThe next step is to assign the delegate. In\
    \ this example, this is something that can be done in the `main.m` file. You can\
    \ do this by simply assigning the project to each task’s delegate property.\n\n\
    ```\nProject *p = [[Project alloc]init];\np.listOfTasks = [[NSMutableArray alloc]init];\n\
    p.name = @\"Cook Dinner\";\n\nTask *t1 = [[Task alloc]init];\nt1.name = @\"Choose\
    \ Menu\";\nt1.delegate = p;\n[p.listOfTasks addObject:t1];\n\nTask *t2 = [[Task\
    \ alloc]init];\nt2.name = @\"Buy Groceries\";\n[p.listOfTasks addObject:t2];\n\
    t2.delegate = p;\n\nTask *t3 = [[Task alloc]init];\nt3.name = @\"Prepare Ingredients\"\
    ;\n[p.listOfTasks addObject:t3];\nt3.delegate = p;\n\nTask *t4 = [[Task alloc]init];\n\
    t4.name = @\"Cook Food\";\n[p.listOfTasks addObject:t4];\nt4.delegate = p;\n```\n\
    \nNow when you assign a different value to a task’s `done` property, the `Project`\
    \ delegate will be notified. In the last chapter, you already adopted the `TaskDelegate`\
    \ protocol and implemented the protocol method `-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;`.\n\
    \nWhen you set a `done` property on a `Task` object like this:\n\n```\nt4.done\
    \ = YES;\n```\n\nthe protocol method you implemented in the `Project` implementation\
    \ `thisTask:statusHasChangedToThis:` will execute. Remember, this is what you\
    \ coded in the last chapter:\n\n```\n-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done{\n\
    \    NSLog(@\"Task '%@' is now %@\", task.name, done ? @\"DONE\" : @\"IN PROGRESS\"\
    );\n}\n```\n\nThis method will generate this output in the console log:\n\n```\n\
    Task 'Cook Food' is now DONE\n```\n\n# 25. Singleton\n\nAbstract\n\nSingleton\
    \ is a design pattern where you can have only one instance of a class. Usually,\
    \ when you define a class, you expect to use many instances of the class. But\
    \ in some designs this doesn’t make sense.\n\n## Singleton Defined\n\nSingleton\
    \ is a design pattern where you can have only one instance of a class. Usually,\
    \ when you define a class, you expect to use many instances of the class. But\
    \ in some designs this doesn’t make sense.\n\nFor instance, an application may\
    \ only need one reference to the file system (since there is only one file system).\
    \ Or the app has a data model that should stay in sync and so you want to make\
    \ sure you have only one instance of a class available.\n\nTo implement a Singleton\
    \ pattern, you will need to create a special type of constructor and then only\
    \ use this constructor to get a reference to the Singleton object.\n\n### Singleton\
    \ Interface\n\nThe first step is to code the interface. Let’s assume that you\
    \ are creating a class `AppSingleton` that will be your singleton. Here is how\
    \ you would code the interface:\n\n```\n#import <Foundation/Foundation.h>\n\n\
    @interface AppSingleton : NSObject\n\n+ (AppSingleton *)sharedInstance;\n\n@end\n\
    ```\n\nWhat you have above is a class method that returns an instance of `AppSingleton`.\n\
    \n### Singleton Implementation\n\nTo implement this singleton, you need a static\
    \ variable and the implementation of the class method `sharedInstance` that you\
    \ defined in the interface.\n\n```\n#import \"AppSingleton.h\"\n\n@implementation\
    \ AppSingleton\n\nstatic AppSingleton *singletonInstance = nil;\n\n+ (AppSingleton\
    \ *)sharedInstance{\n    @synchronized(self){\n        if (singletonInstance ==\
    \ nil)\n            singletonInstance = [[self alloc] init];\n        return(singletonInstance);\n\
    \    }\n}\n\n@end\n```\n\nThe static instance is an `AppSingleton` type named\
    \ `singletonInstance` and you have it initially set to nil. In the `sharedInstance`\
    \ method, you are testing the `singletonInstance`; if it is nil, then you will\
    \ create a new instance. Either way you return this instance to the caller.\n\n\
    The code in this method is surrounded by the `@synchronized(self)` block. This\
    \ is used to lock the code so that only one thread can use these lines of code\
    \ at a time. This ensures that you only have one instance of this singleton even\
    \ when you have more than one thread.\n\n### Referencing Singletons\n\nWhen you\
    \ need a singleton object, you must use the method that returns the instance.\
    \ This will be the method that you coded.\n\nIf you wanted to use the `AppSingleton`\
    \ class, you would do this:\n\n```\nAppSingleton *ap = [AppSingleton sharedInstance];\n\
    ```\n\nThis is used as in place of the `alloc` and `init` pattern normally used\
    \ to create objects. You can do this from any class or file in your app, and each\
    \ one will get the same instance of the class. The only caveat is that you must\
    \ use the Singleton constructor; while you can still use `alloc` and `init`, doing\
    \ so will break the pattern because these methods can still create more than one\
    \ object while the constructor you created can only create one object.\n\n# 26.\
    \ Error Handling\n\nAbstract\n\nWhen programs encounter unexpected errors, they\
    \ behave unexpectedly or stop working altogether. Ideally, programmers would find\
    \ and fix all bugs before programs are used, but there are some situations were\
    \ programmers don’t have control of the entire situation. For instance, errors\
    \ can happen when programs require resources like files or web sites that are\
    \ no longer present.\n\n## Error Handling Defined\n\nWhen programs encounter unexpected\
    \ errors, they behave unexpectedly or stop working altogether. Ideally, programmers\
    \ would find and fix all bugs before programs are used, but there are some situations\
    \ were programmers don’t have control of the entire situation. For instance, errors\
    \ can happen when programs require resources like files or web sites that are\
    \ no longer present.\n\nThe best practice in dealing with situations like this\
    \ is to add error handling to a program. This means that when an error occurs,\
    \ the program can recover or gracefully shutdown. `NSError` is the Foundation\
    \ class that programmers use to deal with errors."
