- fmt: "### NSCoding\n\n每个支持归档的类都必须遵循`NSCoding`协议并实现必需的方法。这些方法将帮助归档程序存储需要归档的对象中保存的属性值。\n\
    \n要遵循`NSCoding`协议，请在类接口的尖括号中添加`NSCoding`协议名称。以下是你已经编码的`Task`类的实现方式：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Task : NSObject <NSCoding>\n\n@property(strong)\
    \ NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n\n@end\n\
    ```\n\n所遵循的`NSCoding`协议的语法如上所示（以粗体显示）。现在你需要实现两个协议方法。第一个方法称为编码器（encoder），因为它将用于将属性值编码到归档文件中。\n\
    \n```\n#import \"Task.h\"\n\n@implementation Task\n\n-(void)generateReport{\n\
    \    NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\"\
    );\n}\n\n-(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeBool:self.done forKey:@\"donekey\"\
    ];\n}\n\n@end\n```\n\n你想要保存到归档中的每个属性都需要发送一个编码消息并附带一个键（key）。不同的数据类型需要不同的消息。有关可用方法的完整列表，请参阅\
    \ Apple 的`NSCoding`文档。例如，对象需要`encodeObject:forKey:`消息，而布尔值需要`encodeBool:forKey:`消息。\n\
    \n接下来，你需要实现解码器方法。该方法是一种构造器初始化方法，它会将属性值添加到对象中。与之前一样，重要方法以粗体显示。\n\n```\n#import\
    \ \"Task.h\"\n\n@implementation Task\n\n-(void)generateReport{\n    NSLog(@\"\
    Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n\n\
    -(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeBool:self.done forKey:@\"donekey\"\
    ];\n}\n\n-(id)initWithCoder:(NSCoder *)decoder {\n    self = [super init];\n \
    \   if (self) {\n        self.name = [decoder decodeObjectForKey:@\"namekey\"\
    ];\n        self.done = [decoder decodeBoolForKey:@\"donekey\"];\n    }\n    return\
    \ self;\n}\n\n@end\n```\n\n此方法中的每个键和属性必须与`encodeWithCoder:`方法中的键和属性匹配。至此，`Task`已经支持`NSCoding`。为了查看示例，你还需要为`Project`添加`NSCoding`支持。以下是`Project`接口的实现方式：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Task.h\"\n\n@interface Project\
    \ : NSObject <NSCoding>\n\n@property(strong) NSString *name;\n@property(strong)\
    \ NSMutableArray *listOfTasks;\n-(void)generateReport;\n\n@end\n```\n\n以下是`Project`实现的实现方式：\n\
    \n```\n#import \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n\
    \    NSLog(@\"Report for %@ Project\", self.name);\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n        [obj generateReport];\n    }];\n\
    }\n\n-(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeObject:self.listOfTasks forKey:@\"\
    listOfTaskskey\"];\n}\n\n-(id)initWithCoder:(NSCoder *)decoder {\n    self = [super\
    \ init];\n    if (self) {\n        self.name = [decoder decodeObjectForKey:@\"\
    namekey\"];\n        self.listOfTasks = [decoder decodeObjectForKey:@\"listOfTaskskey\"\
    ];\n    }\n    return self;\n}\n\n@end\n```\n\n### 使用归档器（Archiver）\n\n假设你已经建立了一个对象图，那么使用归档器就很简单了。你使用的类是`NSKeyedArchiver`，只需发送`archiveRootObject:toFile:`消息即可。两个参数分别是你要使用的文件名和对象图中的根对象。你的根对象是`Project\
    \ p`对象，因为你只有一个`p`，它包含多个`Task`对象。\n\n我们假设你仍然拥有[第24章](#A978-1-4302-6488-0_24_Chapter.html)中创建的对象图，该章列出了`p`的所有任务。如果你想归档这些内容，可以在`main.m`文件中执行以下操作：\n\
    \n```\nNSString *file = @\"/Users/Shared/project.dat\";\n[NSKeyedArchiver archiveRootObject:p\
    \ toFile:file];\n```\n\n这将在你的 Mac 上创建一个数据文件。将来，你可以读取这个文件并用它来将对象图恢复到你的应用中。\n\n\
    ```\nNSString *file = @\"/Users/Shared/project.dat\";\nProject *p = [NSKeyedUnarchiver\
    \ unarchiveObjectWithFile:file];\n[p generateReport];\n```\n\n由于你在此处发送了`generateReport`消息，你将在控制台日志中看到对象图的打印输出。\n\
    \n```\nReport for Cook Dinner Project\nTask Choose Menu is IN PROGRESS\nTask Buy\
    \ Groceries is IN PROGRESS\nTask Prepare Ingredients is IN PROGRESS\nTask Cook\
    \ Food is IN PROGRESS\n```\n\n# 29. Web 服务\n\n摘要\n\n许多公司（如 Facebook 和 Twitter）通过网站向用户提供服务。通常，这些服务也对开发者开放，以便在他们的应用中使用；这些服务被称为\
    \ Web 服务。Web 服务是驻留在 Web 服务器上的功能和内容，你可以通过一组定义明确的规则（称为 API，应用程序编程接口）来使用它们。\n\n##\
    \ Web 服务定义\n\n许多公司（如 Facebook 和 Twitter）通过网站向用户提供服务。通常，这些服务也对开发者开放，以便在他们的应用中使用；这些服务被称为\
    \ Web 服务。Web 服务是驻留在 Web 服务器上的功能和内容，你可以通过一组定义明确的规则（称为 API，应用程序编程接口）来使用它们。\n\n使用\
    \ Web 服务的一般模式是：构建请求、发送请求、接收响应，然后解释响应。Objective-C 内置了对 Web 服务的支持。要发送请求和接收响应，你可以使用`NSURLConnection`类和`NSData`类。要解释（或解析）响应，你可以使用`NSJSONSerialization`类。\n\
    \n注意\n\nJSON 代表 JavaScript 对象表示法（JavaScript Object Notation），用于数据存储和传输。实现为 REST（表述性状态转移）Web\
    \ 服务的 Web 服务将提供 JSON 响应数据。`NSJSONSerialization`类使得在 Objective-C 中处理 JSON 更加容易。\n\
    \n### Bitly 示例\n\nBitly 是一个很好的 Web 服务示例，我喜欢用它来做演示，因为它非常简单且功能清晰。Bitly 会将长 URL（你在\
    \ Web 浏览器中输入的字符串）转换为更易于输入的短 URL。我将使用 bitly 的 Web 服务来展示`NSURLConnection`类。\n\n\
    注意\n\n要跟着这个示例操作，你需要在 bit.ly 上创建一个免费账户，并获取你自己的 API 密钥和 API 用户名。如果你希望跟着这个示例操作，请前往[`https://bit.ly`](https://bit.ly/)获取你的账户。在示例中，当遇到`[YOUR\
    \ API LOGIN]`或`[YOUR API KEY]`时，你需要替换为从 bitly 获取的登录名和密钥。"
  raw: '### NSCoding


    Each class that will support archiving must adopt the `NSCoding` protocol and
    implement the required methods. These methods will help the archivers to store
    the property values stored in the objects that need to be archived.


    To adopt the `NSCoding` protocol, add the `NSCoding` protocol name in angle brackets
    to the class interface. Here is how you would do this for the `Task` class that
    you already coded:


    `#import <Foundation/Foundation.h>`


    `@interface Task : NSObject` `<NSCoding>`


    `@property(strong) NSString *name;`


    `@property(assign) BOOL done;`


    `-(void)generateReport;`


    `@end`


    The syntax for the adopted protocol `NSCoding` is shown above in bold. Now you
    need to implement two protocol methods. The first method is called an encoder
    because it will be used to encode the property values into an archive file.


    `#import "Task.h"`


    `@implementation Task`


    `-(void)generateReport{`


        `NSLog(@"Task %@ is %@", self.name, self.done ? @"DONE" : @"IN PROGRESS");`


    `}`


    `-(void)encodeWithCoder:(NSCoder *)encoder {`


        `[encoder encodeObject:self.name forKey:@"namekey"];`


        `[encoder encodeBool:self.done forKey:@"donekey"];`


    `}`


    `@end`


    Each property that you want to save in the archive needs to have an encode message
    sent along with a key. Different data types require different messages. See Apple’s
    `NSCoding` documentation for a complete listing of available methods. For instance,
    objects require the `encodeObject:forKey:` message while Boolean require the `encodeBool:forKey:`
    message.


    Next, you need to implement the decoder method. This method is a type of constructor
    initializer that will add the property values to the object. As before, the significant
    methods are in bold.


    `#import "Task.h"`


    `@implementation Task`


    `-(void)generateReport{`


        `NSLog(@"Task %@ is %@", self.name, self.done ? @"DONE" : @"IN PROGRESS");`


    `}`


    `-(void)encodeWithCoder:(NSCoder *)encoder {`


        `[encoder encodeObject:self.name forKey:@"namekey"];`


        `[encoder encodeBool:self.done forKey:@"donekey"];`


    `}`


    `-(id)initWithCoder:(NSCoder *)decoder {`


        `self = [super init];`


        `if (self) {`


            `self.name = [decoder decodeObjectForKey:@"namekey"];`


            `self.done = [decoder decodeBoolForKey:@"donekey"];`


        `}`


        `return self;`


    `}`


    `@end`


    Each key and property in this method must match the ones in the `encodeWithCoder:`
    method. At this point, `Task` now supports `NSCoding`. To see an example, you
    also need to add `NSCoding` support to `Project`. Here is what you would do to
    the `Project` interface:


    `#import <Foundation/Foundation.h>`


    `#import "Task.h"`


    `@interface Project : NSObject` `<NSCoding>`


    `@property(strong) NSString *name;`


    `@property(strong) NSMutableArray *listOfTasks;`


    `-(void)generateReport;`


    `@end`


    Here is what you would do the `Project` implementation:


    `#import "Project.h"`


    `@implementation Project`


    `-(void)generateReport{`


        `NSLog(@"Report for %@ Project", self.name);`


        `[self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL
    *stop) {`


            `[obj generateReport];`


        `}];`


    `}`


    `-(void)encodeWithCoder:(NSCoder *)encoder {`


        `[encoder encodeObject:self.name forKey:@"namekey"];`


        `[encoder encodeObject:self.listOfTasks forKey:@"listOfTaskskey"];`


    `}`


    `-(id)initWithCoder:(NSCoder *)decoder {`


        `self = [super init];`


        `if (self) {`


            `self.name = [decoder decodeObjectForKey:@"namekey"];`


            `self.listOfTasks = [decoder decodeObjectForKey:@"listOfTaskskey"];`


        `}`


        `return self;`


    `}`


    `@end`


    ### Using the Archiver


    Assuming that you have an object graph already set up, it’s easy to use the archiver.
    The class that you use is called `NSKeyedArchiver` and you just need to send the
    `archiveRootObject:toFile:` message. The two parameters are the filename that
    you want to use and the root object in the object graph. Your root object is the
    `Project p` object because you have only one `p` that contains many `Task` objects.


    Let’s assume that you still have the object graph created in [Chapter 24](#A978-1-4302-6488-0_24_Chapter.html)
    that listed out all the tasks for `p`. If you want to archive this, you could
    do this in the main.m file.


    `NSString *file = @"/Users/Shared/project.dat";`


    `[NSKeyedArchiver archiveRootObject:p toFile:file];`


    This is will create a data file on your Mac. In the future, you could read in
    this file and use it to restore the object graph to your app.


    `NSString *file = @"/Users/Shared/project.dat";`


    `Project *p = [NSKeyedUnarchiver unarchiveObjectWithFile:file];`


    `[p generateReport];`


    Since you sent the `generateReport` message here, you would get a printout of
    the object graph in your console log.


    `Report for Cook Dinner Project`


    `Task Choose Menu is IN PROGRESS`


    `Task Buy Groceries is IN PROGRESS`


    `Task Prepare Ingredients is IN PROGRESS`


    `Task Cook Food is IN PROGRESS`


    # 29. Web Services


    Abstract


    Many companies like Facebook and Twitter make their services available to users
    via web sites. Often these services are also available to developers to use in
    their apps; these are called web services. Web services are functions and content
    that reside on a web server that you can use via a well-defined set of rules called
    an API (Application Programming Interface).


    ## Web Services Defined


    Many companies like Facebook and Twitter make their services available to users
    via web sites. Often these services are also available to developers to use in
    their apps; these are called web services. Web services are functions and content
    that reside on a web server that you can use via a well-defined set of rules called
    an API (Application Programming Interface).


    The general pattern to working with web services is to formulate a request, send
    the request, receive the response, and then interpret the response. Objective-C
    comes with support for web services. To send requests and receive responses you
    can use the `NSURLConnection` class with the `NSData` class. To interpret, or
    parse, the response, you can use the `NSJSONSerialization` class.


    Note


    JSON stands for JavaScript Object Notation and is used for data storage and transportation.
    Web services that are implemented as REST (Representational State Transfer) web
    services will provide JSON response data. The `NSJSONSerialization` class makes
    working with JSON easier in Objective-C.


    ### Bitly Example


    Bitly is a good example of a web service that I like to use as a demonstration
    because it is pretty simple and provides a very clear function. Bitly will take
    a long URL (the string that you type into a web browser) and turn it into a short
    URL that is easier to type. I am going to use the bitly web service to showcase
    the `NSURLConnection` class.


    Note


    To follow along with this recipe, you will need to create a free account with
    bit.ly and get your own API key and API username. Go to [`https://bit.ly`](https://bit.ly/)
    to get your account if you wish to follow along with this example. In the examples,
    when I include [YOUR API LOGIN] or [YOUR API KEY] you will need to substitute
    the login and key that you obtained from bitly.'
  trans: "\n### NSCoding\n\n每个支持归档的类都必须遵循`NSCoding`协议并实现必需的方法。这些方法将帮助归档程序存储需要归档的对象中保存的属性值。\n\
    \n要遵循`NSCoding`协议，请在类接口的尖括号中添加`NSCoding`协议名称。以下是你已经编码的`Task`类的实现方式：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Task : NSObject <NSCoding>\n\n@property(strong)\
    \ NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n\n@end\n\
    ```\n\n所遵循的`NSCoding`协议的语法如上所示（以粗体显示）。现在你需要实现两个协议方法。第一个方法称为编码器（encoder），因为它将用于将属性值编码到归档文件中。\n\
    \n```\n#import \"Task.h\"\n\n@implementation Task\n\n-(void)generateReport{\n\
    \    NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\"\
    );\n}\n\n-(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeBool:self.done forKey:@\"donekey\"\
    ];\n}\n\n@end\n```\n\n你想要保存到归档中的每个属性都需要发送一个编码消息并附带一个键（key）。不同的数据类型需要不同的消息。有关可用方法的完整列表，请参阅\
    \ Apple 的`NSCoding`文档。例如，对象需要`encodeObject:forKey:`消息，而布尔值需要`encodeBool:forKey:`消息。\n\
    \n接下来，你需要实现解码器方法。该方法是一种构造器初始化方法，它会将属性值添加到对象中。与之前一样，重要方法以粗体显示。\n\n```\n#import\
    \ \"Task.h\"\n\n@implementation Task\n\n-(void)generateReport{\n    NSLog(@\"\
    Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n\n\
    -(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeBool:self.done forKey:@\"donekey\"\
    ];\n}\n\n-(id)initWithCoder:(NSCoder *)decoder {\n    self = [super init];\n \
    \   if (self) {\n        self.name = [decoder decodeObjectForKey:@\"namekey\"\
    ];\n        self.done = [decoder decodeBoolForKey:@\"donekey\"];\n    }\n    return\
    \ self;\n}\n\n@end\n```\n\n此方法中的每个键和属性必须与`encodeWithCoder:`方法中的键和属性匹配。至此，`Task`已经支持`NSCoding`。为了查看示例，你还需要为`Project`添加`NSCoding`支持。以下是`Project`接口的实现方式：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Task.h\"\n\n@interface Project\
    \ : NSObject <NSCoding>\n\n@property(strong) NSString *name;\n@property(strong)\
    \ NSMutableArray *listOfTasks;\n-(void)generateReport;\n\n@end\n```\n\n以下是`Project`实现的实现方式：\n\
    \n```\n#import \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n\
    \    NSLog(@\"Report for %@ Project\", self.name);\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n        [obj generateReport];\n    }];\n\
    }\n\n-(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeObject:self.listOfTasks forKey:@\"\
    listOfTaskskey\"];\n}\n\n-(id)initWithCoder:(NSCoder *)decoder {\n    self = [super\
    \ init];\n    if (self) {\n        self.name = [decoder decodeObjectForKey:@\"\
    namekey\"];\n        self.listOfTasks = [decoder decodeObjectForKey:@\"listOfTaskskey\"\
    ];\n    }\n    return self;\n}\n\n@end\n```\n\n### 使用归档器（Archiver）\n\n假设你已经建立了一个对象图，那么使用归档器就很简单了。你使用的类是`NSKeyedArchiver`，只需发送`archiveRootObject:toFile:`消息即可。两个参数分别是你要使用的文件名和对象图中的根对象。你的根对象是`Project\
    \ p`对象，因为你只有一个`p`，它包含多个`Task`对象。\n\n我们假设你仍然拥有第 24 章中创建的对象图，该章列出了`p`的所有任务。如果你想归档这些内容，可以在`main.m`文件中执行以下操作：\n\
    \n```\nNSString *file = @\"/Users/Shared/project.dat\";\n[NSKeyedArchiver archiveRootObject:p\
    \ toFile:file];\n```\n\n这将在你的 Mac 上创建一个数据文件。将来，你可以读取这个文件并用它来将对象图恢复到你的应用中。\n\n\
    ```\nNSString *file = @\"/Users/Shared/project.dat\";\nProject *p = [NSKeyedUnarchiver\
    \ unarchiveObjectWithFile:file];\n[p generateReport];\n```\n\n由于你在此处发送了`generateReport`消息，你将在控制台日志中看到对象图的打印输出。\n\
    \n```\nReport for Cook Dinner Project\nTask Choose Menu is IN PROGRESS\nTask Buy\
    \ Groceries is IN PROGRESS\nTask Prepare Ingredients is IN PROGRESS\nTask Cook\
    \ Food is IN PROGRESS\n```\n\n# 29. Web 服务\n\n摘要\n\n许多公司（如 Facebook 和 Twitter）通过网站向用户提供服务。通常，这些服务也对开发者开放，以便在他们的应用中使用；这些服务被称为\
    \ Web 服务。Web 服务是驻留在 Web 服务器上的功能和内容，你可以通过一组定义明确的规则（称为 API，应用程序编程接口）来使用它们。\n\n##\
    \ Web 服务定义\n\n许多公司（如 Facebook 和 Twitter）通过网站向用户提供服务。通常，这些服务也对开发者开放，以便在他们的应用中使用；这些服务被称为\
    \ Web 服务。Web 服务是驻留在 Web 服务器上的功能和内容，你可以通过一组定义明确的规则（称为 API，应用程序编程接口）来使用它们。\n\n使用\
    \ Web 服务的一般模式是：构建请求、发送请求、接收响应，然后解释响应。Objective-C 内置了对 Web 服务的支持。要发送请求和接收响应，你可以使用`NSURLConnection`类和`NSData`类。要解释（或解析）响应，你可以使用`NSJSONSerialization`类。\n\
    \n注意\n\nJSON 代表 JavaScript 对象表示法（JavaScript Object Notation），用于数据存储和传输。实现为 REST（表述性状态转移）Web\
    \ 服务的 Web 服务将提供 JSON 响应数据。`NSJSONSerialization`类使得在 Objective-C 中处理 JSON 更加容易。\n\
    \n### Bitly 示例\n\nBitly 是一个很好的 Web 服务示例，我喜欢用它来做演示，因为它非常简单且功能清晰。Bitly 会将长 URL（你在\
    \ Web 浏览器中输入的字符串）转换为更易于输入的短 URL。我将使用 bitly 的 Web 服务来展示`NSURLConnection`类。\n\n\
    注意\n\n要跟着这个示例操作，你需要在 bit.ly 上创建一个免费账户，并获取你自己的 API 密钥和 API 用户名。如果你希望跟着这个示例操作，请前往[`https://bit.ly`](https://bit.ly/)获取你的账户。在示例中，当遇到`[YOUR\
    \ API LOGIN]`或`[YOUR API KEY]`时，你需要替换为从 bitly 获取的登录名和密钥。\n"
- fmt: "### Formulate Request String\n\nWhen you work with a web service, you should\
    \ use the documentation provided by the company that published the web service\
    \ as a reference. This documentation will give you a string and parameters that\
    \ you can use. You are going to use the string from the API documentation (`http://api.bit.ly/shorten?version=2.0.1&longUrl=&login=&apiKey=&format=json`)\
    \ as a starting point along with the bitly login, bitly key, and a long URL as\
    \ parameters to formulate your request string.\n\n```\nNSString *APILogin = @\"\
    [YOUR API LOGIN]\";\n```\n\n```\nNSString *APIKey = @\"[YOUR API KEY]\";\n```\n\
    \n```\nNSString *longURL = @\"https://mobileappmastery.com\";\n```\n\n```\nNSString\
    \ *requestString = [NSString stringWithFormat:@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=json\"\
    , longURL, APILogin, APIKey];\n```\n\n### Create the Session and URL\n\nYou are\
    \ going to need two objects: an `NSURL` object to represent the request URL that\
    \ you are sending to the server and an `NSURLSession` object to do your web work\
    \ for you.\n\n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n\
    ```\n\n```\nNSURLSession *session = [NSURLSession sharedSession];\n```\n\n###\
    \ Send and Receive the Response\n\nYou are going to use a block with the `NSURLSession`\
    \ object to ask the web service to shorten the URL. Put all the code that you\
    \ need to work with the response in the block that you send as a parameter. You\
    \ are really doing two things at once with this method.\n\n```\n[[session dataTaskWithURL:requestURL\n\
    \        completionHandler:^(NSData *data,\n                                 \
    \         NSURLResponse *response,\n                                         \
    \ NSError *error) {\n        }] resume];\n```\n\n```\nsleep(60);\n```\n\nYou still\
    \ need to fill in the block where you handle the response, but this will start\
    \ the action. Notice that you need to put a `sleep` function in this code. The\
    \ `sleep` function will stop new code from executing on the main thread for 60\
    \ seconds. You need this because the method you are using is going to execute\
    \ on a background thread (this is the best practice when using web services).\
    \ If you don't stop the command line app from finishing the web service, it won't\
    \ have enough time to fetch the results for you."
  raw: '### Formulate Request String


    When you work with a web service, you should use the documentation provided by
    the company that published the web service as a reference. This documentation
    will give you a string and parameters that you can use. You are going to use the
    string from the API documentation(http://api.bit.ly/shorten?version=2.0.1&longUrl=&login=&apiKey=&format=json)
    as a starting point along with the bitly login, bitly key, and a long URL as parameters
    to formulate your request string.


    `NSString *APILogin = @"[YOUR API LOGIN]";`


    `NSString *APIKey = @"[YOUR API KEY]";`


    `NSString *longURL = @"` [`https://mobileappmastery.com`](https://mobileappmastery.com/)
    `";`


    `NSString *requestString = [NSString stringWithFormat:@"` `http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=json`
    `", longURL, APILogin, APIKey];`


    ### Create the Session and URL


    You are going to need two objects: an `NSURL` object to represent the request
    URL that you are sending to the server and a `NSURLSession` object to do your
    web work for you.


    `NSURL *requestURL = [NSURL URLWithString:requestString];`


    `NSURLSession *session = [NSURLSession sharedSession];`


    ### Send and Receive the Response


    You are going to use a block with the `NSURLSession` object to ask the web service
    to shorten the URL. Put all the code that you need to work with the response in
    the block that you send as a parameter. You are really doing two things at once
    with this method.


    `[[session dataTaskWithURL:requestURL`


            `completionHandler:^(NSData *data,`


                                              `NSURLResponse *response,`


                                              `NSError *error) {`


            `}] resume];`


    `sleep(60);`


    You still need to fill in the block where you handle the response, but this will
    start the action. Notice that you need to put a `sleep` function in this code.
    The `sleep` function will stop new code from executing on the main thread for
    60 seconds. You need this because the method you are using is going to execute
    on a background thread (this is the best practice when using web services). If
    you don’t stop the command line app from finishing the web service, it won’t have
    enough time to fetch the results for you.'
  trans: "\n### 构造请求字符串\n\n使用网络服务时，应参考发布该服务的公司提供的文档作为依据。该文档会提供可供使用的字符串和参数。你需要以 API\
