  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 解析 JSON\n\n在完成块（completion\
    \ block）内部，你可以添加用于解释 Web 服务器响应的代码。由于你知道将要处理 JSON 数据，因此你需要使用 `NSJSONSerialization`\
    \ 类。这里你需要一个 `NSError` 对象，以及由该块提供的 `NSData` 对象（它包含了来自 Web 服务的响应数据）。\n\n```\n[[session\
    \ dataTaskWithURL:requestURL\n\n        completionHandler:^(NSData *data,\n\n\
    \                            NSURLResponse *response,\n\n                    \
    \        NSError *error) {\n\n       NSError *e = nil;\n\n       NSDictionary\
    \ *bitlyJSON = [NSJSONSerialization JSONObjectWithData:data\n\n              \
    \                                                                     options:0\n\
    \n                                                                           \
    \            error: &e];\n\n        }] resume];\n\n```\n\n这会将所有 JSON 数据组织到一个 `NSDictionary`\
    \ 集合中。这个字典内部可能包含其他字典、数组、数字和字符串。下一步是遍历所有这些返回的对象，以定位你需要的内容。同时，你还需要在这里测试错误。\n\n```\n\
    [[session dataTaskWithURL:requestURL\n\n        completionHandler:^(NSData *data,\n\
    \n                            NSURLResponse *response,\n\n                   \
    \         NSError *error) {\n\nNSError *e = nil;\n\nNSDictionary *bitlyJSON =\
    \ [NSJSONSerialization JSONObjectWithData:data\n\n                           \
    \                                                            options:0\n\n   \
    \                                                                            \
    \           error:&e];\n\nif(!error){\n\n    NSDictionary *results = [bitlyJSON\
    \ objectForKey:@\"results\"];\n\n    NSDictionary *resultsForLongURL = [results\
    \ objectForKey:longURL];\n\n    NSString *shortURL = [resultsForLongURL objectForKey:@\"\
    shortUrl\"];\n\n    NSLog(@\"shortURL = %@\", shortURL);\n\n}\n\nelse\n\n    NSLog(@\"\
    There was an error parsing the JSON\");\n\n        }] resume];\n\n```\n\n一旦设置完成，运行你的应用程序，你将能够从响应中检索到\
    \ `shortURL`，并在控制台日志中打印出以下内容：\n\n```\nshortURL = http://bit.ly/1fHrAsT\n```\n\n\
