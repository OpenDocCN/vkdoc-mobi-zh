    \ that you have set on your Mac or iOS device.\n\n### Converting Strings into\
    \ Numbers\n\nYou can also convert a string into a number. If you have a number\
    \ represented as a string, you can use a number formatter to convert the string\
    \ into an `NSNumber` object.\n\nJust change the number formatter style to the\
