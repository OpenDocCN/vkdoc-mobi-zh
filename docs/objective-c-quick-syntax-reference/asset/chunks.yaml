    \n图 2-1. 产品构建选项\n\n## 构建并运行\n\n使用位于 Xcode 屏幕左上角的“构建并运行”按钮（见图 2-2）（这是一个看起来像播放按钮的箭头）来构建你的应用程序。\n\
    \n![A978-1-4302-6488-0_2_Fig2_HTML.jpg](img/A978-1-4302-6488-0_2_Fig2_HTML.jpg)\n\
