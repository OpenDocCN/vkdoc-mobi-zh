    # 25. 单例模式\n\n摘要\n\n单例模式是一种设计模式，它确保一个类只能有一个实例。通常，当你定义一个类时，你期望使用该类的多个实例。但在某些设计中，这种做法是没有意义的。\n\
    \n## 单例模式定义\n\n单例模式是一种设计模式，它确保一个类只能有一个实例。通常，当你定义一个类时，你期望使用该类的多个实例。但在某些设计中，这种做法是没有意义的。\n\
    \n例如，一个应用程序可能只需要一个对文件系统的引用（因为只有一个文件系统）。或者，应用程序有一个需要保持同步的数据模型，因此你希望确保只有一个类的实例可用。\n\
    \n要实现单例模式，你需要创建一种特殊类型的构造方法，然后只使用这个构造方法来获取单例对象的引用。\n\n### 单例接口\n\n第一步是编写接口代码。假设你要创建一个名为\
    \ `AppSingleton` 的类，它将作为你的单例。以下是接口的编写方式：\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface AppSingleton : NSObject\n\n+ (AppSingleton *)sharedInstance;\n\n\
    @end\n```\n\n上述代码是一个返回 `AppSingleton` 实例的类方法。\n\n### 单例实现\n\n要实现这个单例，你需要一个静态变量以及你在接口中定义的类方法\
    \ `sharedInstance` 的具体实现。\n\n```\n#import \"AppSingleton.h\"\n\n@implementation\
    \ AppSingleton\n\nstatic AppSingleton *singletonInstance = nil;\n\n+ (AppSingleton\
    \ *)sharedInstance{\n    @synchronized(self){\n        if (singletonInstance ==\
    \ nil)\n            singletonInstance = [[self alloc] init];\n        return(singletonInstance);\n\
    \    }\n}\n\n@end\n```\n\n静态实例是一个名为 `singletonInstance` 的 `AppSingleton` 类型变量，初始设置为\
    \ nil。在 `sharedInstance` 方法中，你检查 `singletonInstance`；如果它为 nil，则创建一个新实例。无论哪种情况，你都将这个实例返回给调用者。\n\
    \n该方法中的代码被 `@synchronized(self)` 块包含。这用于锁定代码，使得同一时间只有一个线程可以使用这些代码行。这确保了即使有多个线程，你也只会拥有这个单例的一个实例。\n\
    \n### 引用单例\n\n当你需要一个单例对象时，必须使用返回该实例的方法。这也就是你编写的方法。\n\n如果你想使用 `AppSingleton` 类，可以这样做：\n\
    \n```\nAppSingleton *ap = [AppSingleton sharedInstance];\n```\n\n这用于替代通常创建对象时使用的\
    \ `alloc` 和 `init` 模式。你可以从应用程序中的任何类或文件中执行此操作，每一个都会得到该类的同一个实例。唯一的注意事项是，你必须使用单例的构造方法；虽然你仍然可以使用\
    \ `alloc` 和 `init`，但这样做会破坏这种模式，因为这些方法仍然可以创建多个对象，而你创建的构造方法则只能创建一个对象。\n\n# 26. 错误处理\n\
    \n摘要\n\n当程序遇到意外错误时，它们可能会行为异常或完全停止工作。理想情况下，程序员应该在程序投入使用之前发现并修复所有 bug，但在某些情况下，程序员无法完全掌控整个局面。例如，当程序需要的资源（如文件或网站）不存在时，就可能会发生错误。\n\
    \n## 错误处理定义\n\n当程序遇到意外错误时，它们可能会行为异常或完全停止工作。理想情况下，程序员应该在程序投入使用之前发现并修复所有 bug，但在某些情况下，程序员无法完全掌控整个局面。例如，当程序需要的资源（如文件或网站）不存在时，就可能会发生错误。\n\
    \n处理这类情况的最佳实践是向程序添加错误处理。这意味着当错误发生时，程序可以恢复或优雅地关闭。`NSError` 是程序员用来处理错误的 Foundation\
    \ 类。\n"
- fmt: "## NSError\n\n`NSError`经常在涉及文件操作时使用。许多 Foundation 类使用`NSError`对象来帮助处理错误。其模式是：声明一个`NSError`对象，在通过引用传递之前将其设置为`nil`。以下是`NSString`方法从文件内容创建字符串时的工作方式：\n\
    \n```\nNSError *error = nil;\nNSString *file = @\"/Users/Shared/array.txt\";\n\
    NSString *content = [NSString stringWithContentsOfFile:file\n                \
    \               encoding:NSStringEncodingConversionAllowLossy\n              \
    \                              error:&error];\n```\n\n在`error`参数前面看到的`&`符号称为 AddressOf\
    \ 运算符。这意味着你传递的是对象的内存地址，而不是副本，因此当方法中的代码需要修改`error`对象时，你将能够看到结果。\n\n要检查`error`对象，你可以在消息之后立即加入如下代码：\n\
    \n```\nif(!error)\n    NSLog(@\"content = %@\", content);\nelse\n    NSLog(@\"\
    error = %@\", error);\n```\n\n如果没有错误，则对内容进行处理；否则，处理错误。如果此代码成功，则日志会打印出以下内容：\n\n\
    ```\ncontent = <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC\
    \ \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<array>\n    <string>A</string>\n    <string>B</string>\n\
    \    <string>C</string>\n    <string>D</string>\n</array>\n</plist>\n```\n\n这个文件是我\
    \ Mac 上的一个文件，但实际内容无关紧要。如果你将文件名更改为 Mac 上不存在的文件，则会收到错误消息，如下所示：\n\n```\nerror = Error\
    \ Domain=NSCocoaErrorDomain Code=260 \"The file \"arrayf.txt\" couldn’t be opened\
    \ because there is no such file.\" UserInfo=0x10010a8a0 {NSFilePath=/Users/Shared/arrayf.txt,\
    \ NSUnderlyingError=0x10010a650 \"The operation couldn’t be completed. No such\
    \ file or directory\"}\n```\n\n此时，你应该使用应用程序用户界面提示用户寻求帮助。\n\n## Try/Catch 语句\n\n\
    Try/catch 语句是另一种尝试捕获错误的方式。其思想是：你可以识别容易出错的代码区域，然后将这些区域包裹在一个称为 try 块的代码块中。你还可以识别一个称为\
    \ catch 块的代码块，该代码块会在 try 块中的代码失败时执行。\n\n你还可以设置一个称为 finally 块的代码块，无论 try 块是否失败，该代码块都会执行。让我们通过读取一个仅包含四个元素的数组文件，然后尝试读取超出边界的第五个元素来尝试这一点。\n\
    \n```\nNSArray *array = [NSArray arrayWithContentsOfFile:file];\n@try {\n    NSString\
    \ *fifthItem = [array objectAtIndex:4];\n    NSLog(@\"fifthItem = %@\", fifthItem);\n\
    }\n@catch (NSException *exception) {\n    NSLog(@\"exception = %@\", exception);\n\
    }\n@finally {\n    NSLog(@\"Moving on...\");\n}\n```\n\n如果执行此代码，try 块会失败，控制权将转到\
    \ catch 块，并且日志会打印出一条消息：\n\n```\nexception = *** -[__NSArrayM objectAtIndex:]:\
    \ index 4 beyond bounds [0 .. 3]\nMoving on...\n```\n\n文本“Moving on...”会出现，因为它是\
    \ finally 块的一部分，并且无论如何都会执行。\n\n# 背景处理\n\n摘要\n\n当你的程序需要同时执行多个任务时，可以使用后台处理。Objective-C\
    \ 中的后台处理是通过名为`NSOperationQueue`的 Foundation 类完成的。\n\n## 背景处理定义\n\n当你的程序需要同时执行多个任务时，可以使用后台处理。Objective-C\
    \ 中的后台处理是通过名为`NSOperationQueue`的 Foundation 类完成的。\n\n`NSOperationQueue`管理操作列表，并决定如何调度运行操作所需的资源。操作是代码块。操作可以同时执行，也可以逐个执行。\n\
    \n假设你想计数到 10,000 并将其打印到日志中。为此，你可以编写如下代码：\n\n```\nfor (int y=0; y<=10000; y++)\
    \ {\n    NSLog(@\"y = %i\", y);\n}\n```\n\n这可以正常工作。如果你在应用中运行此代码，你将在控制台日志中看到一长串`y`值。\n\
    \n```\ny = 0\n. . .\ny = 9998\ny = 9999\ny = 10000\n```\n\n现在，假设你还想从 20,000 倒数到\
    \ 0。如果你只是编写另一个循环，那么你必须等待 10,000 计数完成后才能进行 20,000 计数。但如果你使用后台队列，则可以同时执行这两个任务，并且可能耗时相同。\n\
    \n以下是如何使用后台队列进行设置：\n\n```\nNSOperationQueue *background = [[NSOperationQueue alloc]\
    \ init];\n[background addOperationWithBlock:^{\n    for (int i1=20000; i1>0; i1--)\
    \ {\n        NSLog(@\"i1 = %i\", i1);\n    }\n}];\nfor (int y=0; y<=10000; y++)\
    \ {\n    NSLog(@\"y = %i\", y);\n}\n```\n\n你可以使用`alloc`和`init`函数创建队列，然后使用`addOperationWithBlock:`消息将代码块添加到队列中。如果你运行此代码，日志将打印出类似以下内容：\n\
    \n```\ni1 = 20000\ny = 0\ni1 = 19999\ny = 1\ni1 = 19998\ny = 2\ny = 3\ni1 = 19997\n\
    i1 = 19996\n. . .\ny = 9997\ni1 = 10001\ny = 9998\ny = 9999\ni1 = 10000\ni1 =\
    \ 9999\ny = 10000\n```\n\n# 对象归档\n\n摘要\n\n保存应用程序对象图的副本以供日后作为备份使用，称为对象归档。Objective-C\
    \ 拥有可以帮助你归档对象图的类。每个支持归档的类都必须采用`NSCoding`协议，并实现`NSKeyedArchiver`和`NSKeyedUnarchiver`类所需的两个方法。\n\
    \n## 对象归档定义\n\n保存应用程序对象图的副本以供日后作为备份使用，称为对象归档。Objective-C 拥有可以帮助你归档对象图的类。每个支持归档的类都必须采用`NSCoding`协议，并实现`NSKeyedArchiver`和`NSKeyedUnarchiver`类所需的两个方法。"
  raw: '### NSError


    One place where `NSError` is used frequently is when you are working with operations
    involving files. Many Foundation classes use `NSError` objects to help with error
    handling. The pattern is that you declare the `NSError` object and set it to `nil`
    before passing it by reference. Here is how this works with the `NSString` method
    that creates a string from the contents of a file:


    `NSError *error = nil;`


    `NSString *file = @"/Users/Shared/array.txt";`


    `NSString *content = [NSString stringWithContentsOfFile:file`


                                   `encoding:NSStringEncodingConversionAllowLossy`


                                                    `error:&error];`


    The `&` symbol that you see in front of the error parameter is called the AddressOf
    operator. This means that you are passing the memory address of the object and
    not a copy, so when the code in the method needs to modify the error object you
    will be able to see the results.


    To check the error object, you would include code like this right after the message:


    `if(!error)`


        `NSLog(@"content = %@", content);`


    `else`


        `NSLog(@"error = %@", error);`


    If there is no error, then do something with the content; otherwise, deal with
    the error. If this code is successful, then you would get this printed out to
    the log:


    `content = <?xml version="1.0" encoding="UTF-8"?>`


    `<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "` [`http://www.apple.com/DTDs/PropertyList-1.0.dtd`](http://www.apple.com/DTDs/PropertyList-1.0.dtd)
    `">`


    `<plist version="1.0">`


    `<array>`


            `<string>A</string>`


            `<string>B</string>`


            `<string>C</string>`


            `<string>D</string>`


    `</array>`


    `</plist>`


    This file is something I had on my Mac, but the actual content doesn’t matter.
    If you changed the filename to a file that didn’t exist on my Mac, you would get
    the error message instead and it would look like this:


    `error = Error Domain=NSCocoaErrorDomain Code=260 "The file "arrayf.txt" couldn’t
    be opened because there is no such file." UserInfo=0x10010a8a0 {NSFilePath=/Users/Shared/arrayf.txt,
    NSUnderlyingError=0x10010a650 "The operation couldn’t be completed. No such file
    or directory"}`


    This is when you would use the app user interface to prompt the user for assistance.


    ### Try/Catch Statements


    Try/catch statements are another way that you can try to catch errors. The idea
    is that you can identify areas of code that are error-prone and then wrap up these
    areas in a block, called the try block. You can also identify a block of code
    called the catch block that will execute if the code in the try block fails.


    You can also set up a block of code called the finally block that will execute
    regardless of whether the try block fails or not. Let’s try this by reading in
    an array file that only has four elements and then attempt to read a fifth element
    that would be out of bounds.


    `NSArray *array = [NSArray arrayWithContentsOfFile:file];`


    `@try {`


        `NSString *fifthItem = [array objectAtIndex:4];`


        `NSLog(@"fifthItem = %@", fifthItem);`


    `}`


    `@catch (NSException *exception) {`


        `NSLog(@"exception = %@", exception);`


    `}`


    `@finally {`


        `NSLog(@"Moving on...");`


    `}`


    If you execute this code, the try block would fail, and control would go to the
    catch block, and you would get a message printed out to the log:


    `exception = *** -[__NSArrayM objectAtIndex:]: index 4 beyond bounds [0 .. 3]`


    `Moving on...`


    The text “Moving on…” appears because that is part of the finally block and will
    execute no matter what happens.


    # 27. Background Processing


    Abstract


    When your program needs to do more than one thing at a time, you can use background
    processing. Background processing in Objective-C is done with a Foundation class
    called `NSOperationQueue`.


    ## Background Processing Defined


    When your program needs to do more than one thing at a time, you can use background
    processing. Background processing in Objective-C is done with a Foundation class
    called `NSOperationQueue`.


    `NSOperationQueue` manages lists of operations and decides how to schedule the
    resources needed to run an operation. Operations are blocks of code. Operations
    can execute simultaneously or one at a time.


    Let’s say that you want to count to 10,000 while printing this out to the log.
    To do this, you would code something like the following:


    `for (int y=0; y<=10000; y++) {`


        `NSLog(@"y = %i", y);`


    `}`


    This works fine. If you run this in an app, you will see a long list of `y` values
    printed out to the console log.


    `y = 0`


    `. . .`


    `y = 9998`


    `y = 9999`


    `y = 10000`


    Now, let’s say you also want to count backwards from 20,000 to 0\. If you just
    code another loop, then you would have to wait for the 10,000 count to complete
    before moving on to the 20,000 count. But if you use a background queue, you can
    do both tasks at once in potentially the same amount of time.


    Here is how you could set this up using a background queue:


    `NSOperationQueue *background = [[NSOperationQueue alloc] init];`


    `[background addOperationWithBlock:^{`


        `for (int i1=20000; i1>0; i1--) {`


            `NSLog(@"i1 = %i", i1);`


        `}`


    `}];`


    `for (int y=0; y<=10000; y++) {`


        `NSLog(@"y = %i", y);`


    `}`


    You can create the queue with the `alloc` and `init` functions and then use the
    `addOperationWithBlock:` message to add a code block to the queue. If you run
    this code, you will get something like this printing out to the log:


    `i1 = 20000`


    `y = 0`


    `i1 = 19999`


    `y = 1`


    `i1 = 19998`


    `y = 2`


    `y = 3`


    `i1 = 19997`


    `i1 = 19996`


    `. . .`


    `y = 9997`


    `i1 = 10001`


    `y = 9998`


    `y = 9999`


    `i1 = 10000`


    `i1 = 9999`


    `y = 10000`


    # 28. Object Archiving


    Abstract


    Saving a copy of your app’s object graph to be used later on as a backup is called
    object archiving. Objective-C has classes that can help you archive your object
    graph. Each class that supports archiving must adopt the `NSCoding` protocol and
    implement two methods needed by the `NSKeyedArchiver` and `NSKeyedUnarchiver`
    classes.


    ## Object Archiving Defined


    Saving a copy of your app’s object graph to be used later on as a backup is called
    object archiving. Objective-C has classes that can help you archive your object
    graph. Each class that supports archiving must adopt the `NSCoding` protocol and
    implement two methods needed by the `NSKeyedArchiver` and `NSKeyedUnarchiver`
    classes.'
