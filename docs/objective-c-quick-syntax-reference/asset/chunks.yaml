- fmt: "# Compiling\n\nObjective-C code needs to be turned into machine code that\
    \ runs on an iOS device or a Mac. This process is called compiling, and Xcode\
    \ uses the LLVM compiler to create machine code. Xcode templates used to create\
    \ new projects, like you did in [Chapter 1](#A978-1-4302-6488-0_1_Chapter.html),\
    \ will have the settings that the compiler needs to set this up for you.\n\n#\
    \ Building\n\nCompiling code is usually only part of the process involved with\
    \ creating an app. Apps destined to be distributed to Mac and iPhone users require\
    \ other resources in addition to the compiled code. This includes content like\
    \ pictures, movies, music, and databases.\n\nThese resources, along with an app\
    \ directory structure, are all packed into a special file called a Bundle. You\
    \ will use Xcode to compile your source code and then package everything into\
    \ the bundle that you need for you app. This process is called Building in Xcode.\n\
    \nIf you look under the Project menu item in your Xcode menu bar (Figure [2-1](#A978-1-4302-6488-0_2_Chapter.html#Fig1)),\
    \ you will see options for building your program. Usually you will just use the\
    \ Build and Run feature of Xcode to creating compile and test your code.\n\n![A978-1-4302-6488-0_2_Fig1_HTML.jpg](A978-1-4302-6488-0_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1. Product build options\n\n## Build and Run\n\nUse the Build and Run\
    \ button (see Figure [2-2](#A978-1-4302-6488-0_2_Chapter.html#Fig2)) located in\
    \ the upper left-hand area of your Xcode screen (this is an arrow that looks like\
    \ a play button) to build your app.\n\n![A978-1-4302-6488-0_2_Fig2_HTML.jpg](A978-1-4302-6488-0_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2. Build and Run button\n\nXcode will not only build your app, but\
    \ execute the code as well. If you click the Build and Run button for the current\
    \ program, you should see the following text appear in your console log (also\
    \ shown in Figure [2-3](#A978-1-4302-6488-0_2_Chapter.html#Fig3)):\n\n```\n2014-01-12\
    \ 06:22:48.382\nCh01_source_code[13018:303] Hello, World!\nProgram ended with\
    \ exit code: 0\n```\n\n![A978-1-4302-6488-0_2_Fig3_HTML.jpg](A978-1-4302-6488-0_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3. Console log’s Hello World output\n\nYour output won’t match mine\
    \ exactly, but you should see the words Hello World! and the name of your project\
    \ on the screen.\n\n> **Note**  \n> While most apps will get a bundle along with\
    \ the compiled machine code included, I don’t need that for the apps I am using\
    \ to demonstrate the code used in this book. If you locate your compiled code\
    \ file, you will only find one Unix Executable File that you can run with the\
    \ Mac Terminal app.\n\n# 3. Variables\n\n**Abstract**  \nObjective-C stores information\
    \ in variables. These are divided into two types: primitive types and composite\
    \ types. Primitive variables store one piece of information, such as a number\
    \ or a character. Composite variables store a set of information, such as three\
    \ related numbers and a character.\n\n## Variables Defined\n\nObjective-C stores\
    \ information in variables. These are divided into two types: primitive types\
    \ and composite types. Primitive variables store one piece of information, such\
    \ as a number or a character. Composite variables store a set of information,\
    \ such as three related numbers and a character.\n\n### Data Types\n\nTable [3-1](#A978-1-4302-6488-0_3_Chapter.html#Tab1)\
    \ shows the most common primitive data types that you will see in Objective-C.\n\
    \n**Table 3-1.** Objective-C Data Types\n\n| Data Type | Format Specifier | Description\
    \ |\n| --- | --- | --- |\n| `NSInteger` | `%li` | Signed integer |\n| `NSUInteger`\
    \ | `%lu` | Unsigned integer |\n| `BOOL` | `%i` | Boolean (YES/NO) |\n| `CGFloat`\
    \ | `%f` | Floating point |\n\n> **Note**  \n> Objective-C programs can use C\
    \ data types like `int`, `long`, `float`, `double`, and `char` in addition to\
    \ the Objective-C data types listed in Table [3-1](#A978-1-4302-6488-0_3_Chapter.html#Tab1).\
    \ This is because Objective-C is based on the C programming language and so inherits\
    \ all of C’s functionality in addition to the Objective-C syntax that we are discussing\
    \ here.\n\n### Declaring Variables\n\nVariables are declared in Objective-C with\
    \ their data type first, followed by a variable name. You must declare a variable\
    \ before using it. Variable names should be meaningful, but you can name a variable\
    \ anything that you want.\n\nHere is how you would declare an integer in Objective-C:\n\
    \n```\nNSUInteger numberOfPeople;\n```\n\n### Assigning Values\n\nYou can use\
    \ the assignment operator (`=`) to assign a value to a variable, like so:\n\n\
    ```\nnumberOfPeople = 100;\n```\n\nOnce you have assigned a value, you can retrieve\
    \ and use that value by referencing the variable name.\n\n```\nNSLog(@\"The number\
    \ of people is %lu\", numberOfPeople);\n```\n\n> **Note**  \n> You may have noticed\
    \ that the `NSLog` statement required the `%lu` symbol. This symbol is called\
    \ a format specifier and `NSLog` will use it as a placeholder to insert values\
    \ in the comma-separated list that appears right after the string. See Table [3-1](#A978-1-4302-6488-0_3_Chapter.html#Tab1)\
    \ for a list of the format specifiers that you must use with Objective-C data\
    \ types.\n\nYou can also declare variables and assign values on the same line\
    \ if you like.\n\n```\nNSUInteger numberOfGroups = 20;\n```\n\n### Integer Types\n\
    \nIntegers are whole numbers, so any number that doesn’t need a decimal point\
    \ is an integer. In Objective-C, integers are expressed with the data types `NSInteger`\
    \ and `NSUInteger`.\n\n`NSUInteger`s are unsigned integers, which means that they\
    \ can only be positive numbers. The maximum value that an `NSUInteger` can take\
    \ depends on the system for which the Objective-C code is compiled. If you compile\
    \ for a 64-bit Mac, the maximum value will be 18,446,744,073,709,551,615.\n\n\
    For 32-bit platforms like the iPhone 5 and below, the maximum value is 4,294,967,295.\
    \ You can check these numbers yourself using the `NSUIntegerMax` constant.\n\n\
    ```\nNSLog(@\"NSUIntegerMax is %lu\", NSUIntegerMax);\n```\n\n`NSInteger`s are\
    \ signed integers, which means that they can be either positive or negative. The\
    \ maximum value of an `NSInteger` is half of the `NSUInteger` value because `NSInteger`\
    \ must support both positive and negative numbers.\n\nSo, if you need huge numbers,\
    \ you may need to stick to `NSUInteger`, but if you need to handle both positive\
    \ and negative numbers, you will need `NSInteger`. You can check the minimum and\
    \ maximum value of `NSInteger` on your system with the `NSIntegerMin` and `NSIntegerMax`\
    \ constants.\n\n```\nNSLog(@\"NSIntegerMin is %li\", NSIntegerMin);\nNSLog(@\"\
    NSIntegerMax is %li\", NSIntegerMax);\n```\n\n### Boolean Types\n\nBoolean data\
    \ types are used when values can either be true or false. In Objective-C, this\
    \ data type is declared as a `BOOL` type. `BOOL` types have values that are either\
    \ `YES` or `NO`.\n\n```\nBOOL success = YES;\n```\n\nSince Objective-C stores\
    \ `BOOL` values as `1` for `YES` and `0` for `NO`, you must use the `%i` format\
    \ specifier to print out a `BOOL` value. `%i` is another format specifier for\
    \ integers.\n\n```\nNSLog(@\"success is %i\", success);\n```\n\nThe `NSLog` statement\
    \ above will print out `1` for `YES` and `0` for `NO`, but some people prefer\
    \ to see the `YES` or `NO` strings printed out to the log. You can do so using\
    \ this alternate statement:\n\n```\nNSLog(@\"success: %@\", success ? @\"YES\"\
    \ : @\"NO\");\n```\n\nHere the variable `success` was replaced with a statement\
    \ that has to be evaluated. This statement will return either the string `YES`\
    \ or the string `NO` depending on the value of the variable `success`. If `success`\
    \ is zero, then whatever is in the last position of the statement is returned,\
    \ and if `success` is any other value then whatever is in the first position is\
    \ returned. The ternary operator (`?`) tells the compiler to evaluate the statement."
