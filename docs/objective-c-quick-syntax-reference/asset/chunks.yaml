    \ statusHasChangedToThis:(BOOL)done;`。\n\n当你像这样设置 `Task` 对象的 `done` 属性时：\n\n```\n\
    t4.done = YES;\n```\n\n你在 `Project` 实现中编写的协议方法 `thisTask:statusHasChangedToThis:`\
    \ 将被执行。请记住，这是你在上一章中编写的代码：\n\n```\n-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done{\n\
