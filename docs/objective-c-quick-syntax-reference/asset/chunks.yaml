    \ = New Project\n```\n\n# 22. Key-Value Observation\n\nAbstract\n\nOne of the\
    \ applications of key-value coding is implementing the observer pattern. The observer\
    \ pattern is used when you want an object to get a notification when the state\
    \ of another object changes. This pattern is implemented with key-value observation\
    \ in Objective-C.\n\n## Key-Value Observation Defined\n\nOne of the applications\
    \ of key-value coding is implementing the observer pattern. The observer pattern\
