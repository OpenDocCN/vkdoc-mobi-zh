    When you want to use `NSLog` to print out data type values you must use a format
    specifier like `%lu`, `%li`, `%f`, or `%i`. The value gets substituted into the
    `NSLog` string, giving you a way to observe variable values. You can do this with
    objects as well.


    `NSObject` objects and every object that derives from `NSObject` use the `%@`
    format specifier. The output you get from `NSLog` depends on the type of object.
    If you print out the object from the example above like this


    `NSLog(@"object = %@", object);`


    you will get output that gives you details about the object including the class
    name and memory address.


    `object = <NSObject: 0x10010a0c0>`


    Other objects will report back more specific information; what gets reported back
    depends on the type of object. If you tried the same trick with the `url NSURL`
    object like this


    `NSLog(@"website = %@", url);`


    the console would present a listing of the web site URL.


    `website =` [`https://mobileappmastery.com`](https://mobileappmastery.com/)


    ### Messages


    When you want an object to do something, you send a message to the object. Sending
    a message directs the object to execute the method defined in the class that corresponds
    to the message.


    For instance, you could remove a file from your shared directory by sending a
    message to an `NSFileManager` object.


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    `[fileManager removeItemAtPath:@"/Users/Shared/studyreport.txt"`


                                               `error:nil];`


    The first line of code above is declaring an `NSFileManager` object named `fileManager`.
    In the second line of code, you can see the example of the message being sent.
    The message is `removeItemAtPath:error` `:` and you send this message by writing
    this out and including the parameters (here, these are the item to remove and
    an optional error object). All of this is enclosed in square brackets, `[ ]`,
    and ends with a semi-colon.


    If you were to look at the class definition in the header file for `NSFileManager`,
    you would find the declaration for this method:


    `- (BOOL)removeItemAtPath:(NSString *)path error:(NSError **)error;`


    This method returns a `BOOL` value that you are not using here.


    # 6. Strings


    Abstract


    `NSString` is the class used in Objective-C to work with strings. `NSString` manages
    the list of characters that forms a string. `NSString` objects are immutable,
    which means that once you create an `NSString` object you can’t change it.


    ## NSString


    `NSString` is the class used in Objective-C to work with strings. `NSString` manages
    the list of characters that forms a string. `NSString` objects are immutable,
    which means that once you create an `NSString` object you can’t change it.


    `NSString` objects can be created with many different constructors, but the most
    common way you’ll see `NSString` objects created is with the `@` symbol followed
    by quotes. In fact, you’ve seen this already in the Hello World example from [Chapter
    1](#A978-1-4302-6488-0_1_Chapter.html).


    `NSLog` `(@"Hello, World!"` `);`


    That parameter is an `NSString` object, although it’s hard to see since you don’t
    need the explicit `NSString` declaration here. More often you will see `NSString`
    objects created like this:


    `NSString *firstName = @"Matthew";`


    `NSString *lastName = @"Campbell";`


    Here is another `NSString` constructor, `stringWithFormat:`, that is used often
    when other variables and objects are used to compose a new string:


    `NSString *n = [NSString stringWithFormat:@"%@ %@", firstName, lastName];`


    This constructor, `stringWithContentsOfFile:encoding:error:`, is used to create
    a new `NSString` object based on the contents of a file.


    `NSString *fileName = @"/Users/Shared/report.txt";`


    `NSString *fileContents = [NSString                stringWithContentsOfFile:fileName`


    `encoding:NSStringEncodingConversionAllowLossy`


                                      `error:nil];`


    ## NSMutableString


    Sometimes you want to be able to add or remove characters to a string as your
    program executes. For instance, you may want to maintain a log of changes users
    make in your program and you don’t want to create new strings each time a change
    is made. These situations call for `NSSMutableString`.


    You can use the same constructors to create `NSMutableString` objects except for
    the shortcut where you assign an object to a string contained in `@""`. To create
    a simple `NSMutableString`, use the `stringWithString:` constructor.


    `NSMutableString *alpha = [NSMutableString stringWithString:@"A"];`'
