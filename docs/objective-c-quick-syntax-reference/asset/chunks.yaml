    ## NSNumber


    `NSNumber` is the class used in Objective-C to work with numbers. `NSNumber` gives
    you a way to turn floating point and integer values into object-oriented number
    objects. While you can’t use `NSNumber` objects in expressions, `NSNumber` objects
    become useful when complicated formatting is required.


    `NSNumber` objects can be created with many different constructors, but the most
    common way you’ll see `NSNumber` objects created is with the `@` symbol followed
    by a number.


    `NSNumber *num1 = @1;`


    `NSNumber *num2 = @2.25;`


    Sometimes you may want to use special constructors that are matched to numbers
    stored in a particular way.


    `NSNumber *num3 = [NSNumber numberWithInteger:3];`


    `NSNumber *num4 = [NSNumber numberWithFloat:4.44];`


    ### Converting to Primitive Data Types


    `NSNumber` objects can’t be used in expressions, but `NSNumber` has some built-in
    functions that will return the object in a primitive data type form. You will
    have to use these functions to convert numbers before using them in expressions.


    `CGFloat result = [num1 floatValue] + [num2 floatValue];`


    The function used above is `floatValue` but there are more like `intValue` and
    `doubleValue` that match primitive data types from C programming like `int` and
    `double. stringValue` is another function that will return the number formatted
    as a string, which can be useful in reports.


    ### Formatting Numbers


    `NSNumber` becomes very useful when you want to format numbers for displays in
    reports and presentations. When used with the `NSNumberFormatter` class you can
    output numbers as localized currency, scientific notation, and they can even be
    spelled out.


    To do this, you must create a new number formatter and then set the formatting
    style that you want to use.


    `NSNumberFormatter *formatter = [[NSNumberFormatter alloc] init];`


    `formatter.numberStyle = NSNumberFormatterCurrencyStyle;`


    Then you can send the `stringFromNumber:` message to get the formatted number.
    Here is an example of doing this in the context of using `NSLog` to write a message
    to the console:


    `NSLog(@"Formatted num2 = %@", [formatter stringFromNumber:num2]);`


    This will output $2.25 from my computer since I’m set up in the United States.
    Your output will differ depending on the locale that you have set on your Mac
    or iOS device.


    ### Converting Strings into Numbers


    You can also convert a string into a number. If you have a number represented
    as a string, you can use a number formatter to convert the string into an `NSNumber`
    object.


    Just change the number formatter style to the style in which the number was stored.
    Then create a new `NSNumber` object with the `NSNumberFormatter numberFromString:`
    message. Here is how to convert the string “two point two five” into the number
    2.25:


    `formatter.numberStyle = NSNumberFormatterSpellOutStyle;`


    `NSNumber *num5 = [formatter numberFromString:@"two point two five"];`


    # 8. Arrays


    Abstract


    `NSArray` is a class used to organize objects in lists. `NSArray` can maintain
    an index of objects, search for objects, and enumerate through the list. Enumeration
    is the process of moving through a list one item at a time and performing an action
    on each item in the list.'
  trans: "\n### 插入字符串\n\n你可以在可变字符串构成字符列表的任意位置插入字符串。只需确保指定的插入点在字符列表的范围内即可。如果你的字符串只有\
    \ 10 个字符长，就不要尝试在位置 20 插入字符串。你可以通过向字符串发送 `length` 消息来获取字符串的长度。\n\n要插入字符串，你需要同时指定要插入的字符串和起始位置。以下是将\
    \ `B` 插入到可变字符串 `alpha` 中的方法：\n\n```\n[alpha insertString:@\"B\"\n            atIndex:[alpha\
    \ length]];\n```\n\n这里你发送了 `insertString:atIndex:` 消息。第一个参数是 `@\"B\"`，即你想要添加到可变字符串\
    \ `A` 中的字符串。`atIndex:` 参数是 `alpha` 字符串的长度，因为你想要将 `B` 追加到 `A` 字符串的末尾，以生成 `@\"AB\"\
    `。\n\n如果你只是想追加一个字符串，还有一种更简单的方法。你可以发送 `appendString:` 消息，该方法只需要字符串参数。由于假定该字符串会被追加到可变字符串的末尾，因此不需要指定插入点。\n\
    \n```\n[alpha appendString:@\"C\"];\n```\n\n### 删除字符串\n\n就像你可以向可变字符串添加字符串一样，你也可以移除可变字符串的部分内容。在删除字符串时，你需要同时指定起点和长度。有一个名为\
    \ `NSRange` 的复合类型可以帮助你完成此操作。`NSRange` 有两个关联变量：`location` 和 `length`。在向可变字符串发送\
    \ `deleteCharactersInRange:` 消息之前，你需要先创建一个这种复合类型的实例。\n\n```\nNSRange range;\n\
    range.location = 1;\nrange.length = 1;\n[alpha deleteCharactersInRange:range];\n\
    ```\n\n这段代码将从你在前面步骤中创建的 `ABC` 字符串中删除 `B`。\n\n**注意：** 当你使用 `NSRange` 时，应牢记字符串是以字母列表形式存储的，其索引从\
    \ 0 开始。\n\n### 查找与替换\n\n任何使用过文字处理软件的人都知道查找与替换功能有多么方便。你只需向程序提供要替换的文本以及替换后的文本即可。`NSMutableString`\
    \ 也具备此功能。\n\n要对可变字符串执行查找与替换操作，你需要定义一个范围，并提供你要查找的字符串以及用于替换它的字符串。你还可以指定搜索选项。\n\n\
    ```\nrange.location = 0;\nrange.length = 2;\n[alpha replaceOccurrencesOfString:@\"\
    AC\"\n                       withString:@\"ABCDEFGHI\"\n                     \
    \     options:NSLiteralSearch\n                            range:range];\n```\n\
    \n这里你首先做的是重用 `NSRange` 类型的 `range` 变量，以指定要检查的字符串部分。你将从开头开始，搜索整个字符串的长度。\n\n接下来，你定义要替换的字符串\
    \ `@\"AC\"`，以及用作替换的字符串 `@\"ABCDEFGHI\"`。\n\n在选项中，你设置了 `NSLiteralSearch` 选项。这意味着该方法将要求你的字符串完全匹配。你也可以指定\
    \ `NSCaseInsensitiveSearch` 来忽略大小写，以及 `NSRegularExpressionSearch`，它允许你使用正则表达式。\n\
    \n**注意：** 正则表达式是一种用于在字符串中搜索模式的工具。它们被广泛应用于许多编程语言中。对正则表达式的完整解释超出了本书的范围，但如果你经常处理字符串，它值得深入研究。\n\
    \n最后一个参数是你在发送消息之前设置好的 `range` 变量。\n\n# 7. 数字\n\n**摘要：** `NSNumber` 是 Objective-C\
    \ 中用于处理数字的类。`NSNumber` 提供了一种将浮点数和整数值转换为面向对象数字对象的方法。虽然你不能在表达式中使用 `NSNumber` 对象，但当需要复杂格式化时，`NSNumber`\
    \ 对象会非常有用。\n\n## NSNumber\n\n`NSNumber` 是 Objective-C 中用于处理数字的类。`NSNumber` 提供了一种将浮点数和整数值转换为面向对象数字对象的方法。虽然你不能在表达式中使用\
    \ `NSNumber` 对象，但当需要复杂格式化时，`NSNumber` 对象会非常有用。\n\n`NSNumber` 对象可以通过多种不同的构造器创建，但最常见的创建\
    \ `NSNumber` 对象的方式是使用 `@` 符号后跟一个数字。\n\n```\nNSNumber *num1 = @1;\nNSNumber *num2\
    \ = @2.25;\n```\n\n有时你可能希望使用与特定方式存储的数字相匹配的特殊构造器。\n\n```\nNSNumber *num3 = [NSNumber\
    \ numberWithInteger:3];\nNSNumber *num4 = [NSNumber numberWithFloat:4.44];\n```\n\
    \n### 转换为原始数据类型\n\n`NSNumber` 对象不能用于表达式中，但 `NSNumber` 有一些内置函数，可以以原始数据类型的形式返回该对象。你必须在表达式中使用这些函数之前，先使用它们来转换数字。\n\
    \n```\nCGFloat result = [num1 floatValue] + [num2 floatValue];\n```\n\n上面使用的函数是\
    \ `floatValue`，但还有更多如 `intValue` 和 `doubleValue` 等函数，它们与 C 语言编程中的 `int` 和 `double`\
    \ 等原始数据类型相匹配。`stringValue` 是另一个函数，它会将数字格式化为字符串返回，这在生成报告时非常有用。\n\n### 格式化数字\n\n\
    当你需要为报表和演示文稿中的显示格式化数字时，`NSNumber` 变得非常有用。与 `NSNumberFormatter` 类一起使用时，你可以将数字输出为本地化货币格式、科学记数法格式，甚至可以输出为拼写格式。\n\
    \n为此，你必须先创建一个新的数字格式化器，然后设置你想要使用的格式化样式。\n\n```\nNSNumberFormatter *formatter =\
    \ [[NSNumberFormatter alloc] init];\nformatter.numberStyle = NSNumberFormatterCurrencyStyle;\n\
    ```\n\n然后，你可以发送 `stringFromNumber:` 消息来获取格式化后的数字。以下是在 `NSLog` 的上下文中向控制台写入消息的示例：\n\
    \n```\nNSLog(@\"Formatted num2 = %@\", [formatter stringFromNumber:num2]);\n```\n\
    \n由于我在美国设置，这将在我的计算机上输出 `$2.25`。你的输出将根据你的 Mac 或 iOS 设备上设置的区域设置而有所不同。\n\n### 将字符串转换为数字\n\
    \n你也可以将字符串转换为数字。如果你有一个以字符串形式表示的数字，你可以使用数字格式化器将该字符串转换为 `NSNumber` 对象。\n\n只需将数字格式化器的样式更改为存储该数字时所用的样式。然后使用\
    \ `NSNumberFormatter numberFromString:` 消息创建一个新的 `NSNumber` 对象。以下是将字符串 “two point\
    \ two five” 转换为数字 `2.25` 的方法：\n\n```\nformatter.numberStyle = NSNumberFormatterSpellOutStyle;\n\
    NSNumber *num5 = [formatter numberFromString:@\"two point two five\"];\n```\n\n\
    # 8. 数组\n\n**摘要：** `NSArray` 是一个用于在列表中组织对象的类。`NSArray` 可以维护对象的索引、搜索对象以及枚举遍历列表。枚举是逐个遍历列表中的每个项目并对每个项目执行操作的过程。\n"
- fmt: "# NSArray\n\n`NSArray` is a class used to organize objects in lists. `NSArray`\
    \ can maintain an index of objects, search for objects, and enumerate through\
    \ the list. Enumeration is the process of moving through a list one item at a\
    \ time and performing an action on each item in the list.\n\nTo create an array,\
    \ you include a comma-separated list of objects enclosed in square brackets and\
    \ started with the `@` symbol.\n\n```\nNSArray *numbers = @[@-2, @-1, @0, @1,\
    \ @2];\n```\n\n```\nNSArray *letters = @[@\"A\", @\"B\", @\"C\", @\"D\", @\"E\"\
    , @\"F\"];\n```\n\nThe `NSArray` object `numbers` has a list of `NSNumber` objects,\
    \ while `letters` has a list of strings. Any object can be put into an `NSArray`\
    \ object, but not primitives like `NSInteger`.\n\n## Referencing Objects\n\nYou\
    \ put objects in arrays so that you have an easy way of getting references to\
    \ these objects later. The general way of getting these references is to send\
    \ an `objectAtIndex:` message to the array. Here is how to get the number object\
    \ reference from the second position in the numbers array:\n\n```\nNSNumber *num\
    \ = [numbers objectAtIndex:1];\n```\n\nIf you know that you want the last object\
    \ in the list, you use `lastObject` to return the last object in the list.\n\n\
    > **Note**: Array indexes in Objective-C start with 0.\n\n```\nNSNumber *lastNum\
    \ = [numbers lastObject];\n```\n\nSometimes you might already have a reference\
    \ to the object in question, but you want to find out the index number that corresponds\
    \ to the object’s position in the array. You can use `indexOfObject:` to get this\
    \ information.\n\n```\nNSUInteger index = [numbers indexOfObject:num];\n```\n\n\
    ## Enumeration\n\nEnumeration is the process of moving through a list one item\
    \ at a time. Usually, you will be performing some type of action on each item,\
    \ like writing out the object’s contents to the log or modifying a property on\
    \ the object.\n\nBlocks, or anonymous functions, are used to perform enumeration\
    \ with arrays. Blocks are functions that are not attached to an object. You can\
    \ define a block on enclosing lines of code in curly brackets. Blocks can be treated\
    \ like objects, which means that you can pass a block to an enumeration method\
    \ just like you could do for a variable or an object.\n\n> **Note**: Blocks deserve\
    \ their own treatment, apart from their use in arrays, and so more details about\
    \ using blocks will be covered in [Chapter 20](#A978-1-4302-6488-0_20_Chapter.html).\n\
    \nLet’s say you want to go through the array of numbers and print out each number’s\
    \ value when squared. You could enumerate through the list using the `NSArray\
    \ enumerateObjectsUsingBlock:` method. This method will give you a reference to\
    \ the current object, which you can use to perform this simple operation.\n\n\
    ```\n[numbers enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)\
    \ {\n    NSLog(@\"obj ^ 2= %f\", [obj floatValue] * [obj floatValue]);\n}];\n\
    ```\n\nAll of the code after the colon is the block code. This block starts with\
    \ the `^` symbol. Then you can see a comma-separated list of parameters followed\
    \ by curly brackets. The code inside the curly brackets is the block, and the\
    \ parameters declared in the parentheses are the variables that the block can\
    \ reference.\n\n# NSMutableArray\n\nMore often than not, you need to be able to\
    \ add and remove items from an array as your program executes code. You could\
    \ be maintaining a list of action items or video game characters. When you need\
    \ to do this, you can use `NSMutableArray`.\n\n`NSMutableArray` does everything\
    \ that `NSArray` does except that it gives you the ability to change the contents\
    \ of the array. You can add and remove items and do other types of manipulations\
    \ on objects in mutable arrays.\n\nYou can’t use the shortcut for array creation\
    \ here, though, and `NSMutableArray` will require you to use a constructor, like\
    \ this:\n\n```\nNSMutableArray *mArray = [NSMutableArray arrayWithArray:@[@-2,\
    \ @-1, @0]];\n```\n\nThe constructor used above is `arrayWithArray:` and you just\
    \ passed on an `NSArray` object to this constructor to get started.\n\nTo add\
    \ an object to a mutable array, you use the `addObject:` message.\n\n```\n[mArray\
    \ addObject:@1];\n```\n\nTo remove an object, you must use the `removeObject:`\
    \ message and pass a reference to the object that you want to remove.\n\n```\n\
    [mArray removeObject:@1];\n```\n\nIf you want to exchange one object with another,\
    \ you can use the method `exchangeObjectAtIndex:withObjectAtIndex:`.\n\n```\n\
    [mArray exchangeObjectAtIndex:0 withObjectAtIndex:1];\n```\n\nThis will take whatever\
    \ is in position 0 and switch with whatever is in position 1.\n\nThere are many\
    \ other variations of these functions available to you. You can remove all items,\
    \ add arrays of items into the mutable array, or insert items or arrays of items\
    \ at a specific starting point in the array.\n\n# 9. Dictionaries\n\n**Abstract**:\
    \ `NSDictionary` is a class used to organize objects in lists using keys and values.\
    \ `NSDictionary` can maintain an index of objects and let you retrieve an object\
    \ if you have the right key. Usually, the key will be an `NSString` object while\
    \ the value will be whatever type of object you are indexing.\n\n## NSDictionary\n\
    \n`NSDictionary` is a class used to organize objects in lists using keys and values.\
    \ `NSDictionary` can maintain an index of objects and let you retrieve an object\
    \ if you have the right key. Usually, the key will be an `NSString` object while\
    \ the value will be whatever type of object you are indexing.\n\nTo create a dictionary,\
    \ you include a comma-separated list of key value pairs enclosed in curly brackets\
    \ and started with the `@` symbol.\n\n```\nNSDictionary *d1 = @{@\"one\": @1,\
    \ @\"two\": @2, @\"three\": @3};\n```\n\nThis creates a dictionary of `NSNumber`\
    \ objects that you can reference with their string keys. So, the key string `@\"\
    one\"` can be used to retrieve the `NSNumber` object `1`.\n\n### Referencing Objects\n\
    \nYou put objects in dictionaries so that you have an efficient way of getting\
    \ references to these objects based on keys. The general way of getting these\
    \ references is to send an `objectForKey:` message to the dictionary. Here is\
    \ how to get the number referenced by the key `@\"one\"`:\n\n```\nNSNumber *n1\
    \ = [d1 objectForKey:@\"one\"];\n```\n\n### Enumeration\n\nEnumeration is the\
    \ process of moving through a list one item at a time. Usually, you will be performing\
    \ some type of action on each item, like writing out the object’s contents to\
    \ the log or modifying a property on the object.\n\nYou can enumerate through\
    \ a dictionary in almost the same way as you do with an array. But you will get\
    \ a reference to each key in the dictionary as well as each object.\n\n```\n[d1\
    \ enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL *stop) {\n    NSLog(@\"\
    key = %@, value = %@\", key, obj);\n}];\n```\n\nJust like with the array enumeration\
    \ procedure discussed in [Chapter 8](#A978-1-4302-6488-0_8_Chapter.html), the\
    \ block code declaration starts with the `^` character and the block code is enclosed\
    \ in the curly brackets, `{ }`.\n\nHere is the output that would be generated\
    \ with this message:\n\n```\nkey = one, value = 1\nkey = two, value = 2\nkey =\
    \ three, value = 3\n```"
  raw: '## NSArray


    `NSArray` is a class used to organize objects in lists. `NSArray` can maintain
    an index of objects, search for objects, and enumerate through the list. Enumeration
    is the process of moving through a list one item at a time and performing an action
    on each item in the list.


    To create an array, you include a comma-separate list of objects enclosed in square
    brackets and started with the `@` symbol.


    `NSArray *numbers = @[@-2, @-1, @0, @1, @2];`


    `NSArray *letters = @[@"A", @"B", @"C", @"D", @"E", @"F"];`


    The `NSArray` object `numbers` has a list of `NSNumber` objects, while `letters`
    has a list of strings. Any object can be put into an `NSArray` object, but not
    primitives like `NSInteger`.


    ### Referencing Objects


    You put objects in arrays so that you have an easy way of getting references to
    these objects later. The general way of getting these references is to send an
    `objectAtIndex:` message to the array. Here is how to get the number object reference
    from the second position in the numbers array:


    `NSNumber *num = [numbers objectAtIndex:1];`


    If you know that you want the last object in the list, you use `lastObject` to
    return the last object in the list.


    Note


    Array indexes in Objective-C start with 0.


    `NSNumber *lastNum = [numbers lastObject];`


    Sometimes you might already have a reference to the object in question, but you
    want to find out the index number that corresponds to the object’s position in
    the array. You can use `indexOfObject:` to get this information.


    `NSUInteger index = [numbers indexOfObject:num];`


    ### Enumeration


    Enumeration is the process of moving through a list one item at time. Usually,
    you will be performing some type of action on each item, like writing out the
    object’s contents to the log or modifying a property on the object.


    Blocks, or anonymous functions, are used to perform enumeration with arrays. Blocks
    are functions that are not attached to an object. You can define a block on enclosing
    lines of code in curly brackets. Blocks can be treated like objects, which means
    that you can pass a block to an enumeration method just like you could do for
    a variable or an object.


    Note


    Blocks deserve their own treatment, apart from their use in arrays, and so more
    details about using blocks will be covered in [Chapter 20](#A978-1-4302-6488-0_20_Chapter.html).


    Let’s say you want to go through the array of numbers and print out each number’s
    value when squared. You could enumerate through the list using the `NSArray enumerateObjectsUsingBlock:`
    method. This method will give you a reference to the current object, which you
    can use to perform this simple operation.


    `[numbers enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {`


        `NSLog(@"obj ^ 2= %f", [obj floatValue] * [obj floatValue]);`


    `}];`


    All of the code after the colon is the block code. This block starts with the
    `^` symbol. Then you can see a comma-separated list of parameters followed up
    by curly brackets. The code inside the curly brackets is the block, and the parameters
    declared in the parentheses are the variables that the block can reference.


    ## NSMutableArray


    More often than not, you need to be able to add and remove items from an array
    as your program executes code. You could be maintaining a list of action items
    or video game characters. When you need to do this, you can use `NSMutableArray`.


    `NSMutableArray` does everything that `NSArray` does except that it gives you
    the ability to change the contents of the array. You can add and remove items
    and do other types of manipulations on objects in mutable arrays.


    You can’t use the shortcut for array creation here, though, and `NSMutableArray`
    will require you to use a constructor, like this:


    `NSMutableArray *mArray = [NSMutableArray arrayWithArray:@[@-2, @-1, @0]];`


    The constructor used above is arrayWithArray: and you just passed on an NSArray
    object to this constructor to get started.


    To add an object to a mutable array, you use the `addObject:` message.


    `[mArray addObject:@1];`


    To remove an object, you must use the `removeObject` `:` message and pass a reference
    to the object that you want to remove.


    `[mArray removeObject:@1];`


    If you want to exchange one object with another, you can use the method `exchangeObjectAtIndex:withObjectAtIndex`:.


    `[mArray exchangeObjectAtIndex:0 withObjectAtIndex:1];`


    This will take whatever is in position 0 and switch with whatever is in position
    1.


    There are many other variations of these functions available to you. You can remove
    all items, add arrays of items into the mutable array, or insert items or arrays
    of items at a specific starting point in the array.


    # 9. Dictionaries


    Abstract


    `NSDictionary` is a class used to organize objects in lists using keys and values.
    `NSDictionary` can maintain an index of objects and let you retrieve an object
    if you have the right key. Usually, the key will be an `NSString` object while
    the value will be whatever type of object you are indexing.


    ## NSDictionary


    `NSDictionary` is a class used to organize objects in lists using keys and values.
    `NSDictionary` can maintain an index of objects and let you retrieve an object
    if you have the right key. Usually, the key will be an `NSString` object while
    the value will be whatever type of object you are indexing.


    To create a dictionary, you include a comma-separate list of key value pairs enclosed
    in curly brackets and started with the `@` symbol.


    `NSDictionary *d1 = @{@"one": @1, @"two": @2, @"three": @3};`


    This creates a dictionary of `NSNumber` objects that you can reference with their
    string keys. So, the key string `@"one"` can be used to retrieve the `NSNumber`
    object `1`.


    ### Referencing Objects


    You put objects in dictionaries so that you have an efficient way of getting references
    to these objects bases on keys. The general way of getting these references is
    to send an `objectForKey` `:` message to the dictionary. Here is how to get the
    number referenced by the key `@"one"`:


    `NSNumber *n1 =[d1 objectForKey:@"one"];`


    ### Enumeration


    Enumeration is the process of moving through a list one item at time. Usually,
    you will be performing some type of action on each item, like writing out the
    object’s contents to the log or modifying a property on the object.


    You can enumerate through a dictionary in almost the same way as you do with an
    array. But you will get a reference to each key in the dictionary as well as each
    object.


    `[d1 enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL *stop) {`


        `NSLog(@"key = %@, value = %@", key, obj);`


    `}];`


    Just like with the array enumeration procedure discussed in [Chapter 8](#A978-1-4302-6488-0_8_Chapter.html),
    the block code declaration starts with the `^` character and the block code is
    enclosed in the curly brackets, `{ }`.


    Here is the output that would be generated with this message:


    `key = one, value = 1`


    `key = two, value = 2`


    `key = three, value = 3`'
