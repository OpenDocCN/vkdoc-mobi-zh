    \ *formatter = [[NSNumberFormatter alloc] init];\nformatter.numberStyle = NSNumberFormatterCurrencyStyle;\n\
    ```\n\nThen you can send the `stringFromNumber:` message to get the formatted\
    \ number. Here is an example of doing this in the context of using `NSLog` to\
