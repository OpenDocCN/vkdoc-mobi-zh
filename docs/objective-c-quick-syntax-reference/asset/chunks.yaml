- fmt: "# Extending Classes\n\nTo extend a class, you can add properties and methods\
    \ to the subclass. Your subclass is `SpecialProject`. Let’s add a method named\
    \ `generateSpecialReport` to your `SpecialProject` class.\n\n```\n#import \"Project.h\"\
    \n\n@interface SpecialProject : Project\n\n-(void)generateSpecialReport;\n\n@end\n\
    ```\n\nNow, of course, you need to implement this method.\n\n```\n#import \"SpecialProject.h\"\
    \n\n@implementation SpecialProject\n\n-(void)generateSpecialReport{\n    NSLog(@\"\
    This is a special report!\");\n}\n\n@end\n```\n\nThe procedure to extend classes\
    \ is identical to adding properties and methods as you normally do. What makes\
    \ this a good tool is that you can share the code for the methods that are common\
    \ among a type of class.\n\n## Overriding Methods\n\nAnother thing you can do\
    \ is override a method from your superclass. Overriding a method means that you\
    \ are going to write your own version of a method with the exact same signature\
    \ (the collection of parameter descriptors). The code in your method will be different\
    \ so this means that objects from the inherited class will behave differently\
    \ even though they get the same message sent to them as the superclass.\n\nLet’s\
    \ say you want to make sure that `SpecialProject` objects always print out the\
    \ special report even if the `generateReport` message from the `Project` superclass\
    \ is sent.\n\nWhat you need to do first is code `generateReport` method in the\
    \ `SpecialProject` interface.\n\n```\n#import \"Project.h\"\n\n@interface SpecialProject\
    \ : Project\n\n-(void)generateSpecialReport;\n-(void)generateReport;\n\n@end\n\
    ```\n\nThen you need to code a new implementation of `generateReport` and have\
    \ that method send a message to `generateSpecialReport`. Often in this situation,\
    \ you will also send a message to the `super`'s implementation of the method,\
    \ which you can do by sending a message to `super`.\n\n```\n#import \"SpecialProject.h\"\
    \n\n@implementation SpecialProject\n\n-(void)generateSpecialReport{\n    NSLog(@\"\
    This is a special report!\");\n}\n\n-(void)generateReport{\n    [super generateReport];\n\
    \    [self generateSpecialReport];\n}\n\n@end\n```\n\n### Instance Variable Visibility\n\
    \nWhen I discussed instance variables, or ivars, in [Chapter 16](#A978-1-4302-6488-0_16_Chapter.html),\
    \ the use case for these was straightforward. If your class needed data storage\
    \ that didn’t really describe an attribute of the object (and therefore shouldn’t\
    \ have a property), then you would just use an ivar.\n\nSince you added ivars\
    \ to the class extension, the class that you were implementing in that file could\
    \ only use them. These ivars are considered private because they are only visible\
    \ to the class that they are coded in.\n\n#### Visibility Levels\n\nWhen you are\
    \ planning on using inheritance with your object graph, you may want instance\
    \ variables to have different levels of visibility. The term “visibility” refers\
    \ to the other entities’ access to the variable. Instance variables can either\
    \ be private, protected, or public. When you want to have different visibility\
    \ levels, you must code your instance variables in the interface, which should\
    \ be located in a header file since this is the file that other classes will be\
    \ importing.\n\n##### Private Instance Variables\n\nPrivate instance variables\
    \ can only be used in the class they are coded in. To make an instance variable\
    \ private, you would declare the instance variable in the class interface. Let’s\
    \ say you wanted to add some `NSString` objects to act as logs for all of your\
    \ `Project` classes. To add a private log to be used in `Project` objects, you\
    \ would do something like this in the `Project` interface:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Project : NSObject {\n    @private NSString *log1;\n}\n\n@property(strong)\
    \ NSString *name;\n-(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString\
    \ *)string\n                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
    \n@end\n```\n\nYou must use the `@private` keyword to designate that `log1` will\
    \ have private visibility. This means you can use `log1` in your `Project` methods,\
    \ but not in your `SpecialProject` methods.\n\n##### Protected Instance Methods\n\
    \nInstance variables with protected visibility can be accessed by methods in the\
    \ class they are coded in as well as any derived classes. So, if you wanted to\
    \ have an `NSString` log variable that can be used by `Project` and `SpecialProject`,\
    \ you would need to make it protected by using the `@protected` keyword.\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Project : NSObject{\n    @private\
    \ NSString *log1;\n    @protected NSString *log2;\n}\n\n@property(strong) NSString\
    \ *name;\n-(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString\
    \ *)string\n                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
    \n@end\n```\n\n##### Public Instance Variables\n\nPublic instance variables are\
    \ available to the class they are coded in and all derived classes. In addition,\
    \ other objects can reference public instance variables directly.\n\n> **Note:**\
    \ I am discussing public instance variables here for the sake of completeness,\
    \ but it is generally not accepted practice to use instance variables in this\
    \ way. Instead, you should define properties to return any values that you want\
    \ to make available to other objects.\n\nTo make an instance variable public,\
    \ you must use the `@public` keyword.\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Project : NSObject{\n    @private NSString *log1;\n    @protected\
    \ NSString *log2;\n    @public NSString *log3;\n}\n\n@property(strong) NSString\
    \ *name;\n-(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString\
    \ *)string\n                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
    \n@end\n```\n\nTo use this object, you would need to use the member of operator,\
    \ `->`. The member of operator is a traditional C operation that you can use to\
    \ reference a member of a structure that is referenced by a pointer. Here is an\
    \ example of how you would do this:\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"SpecialProject.h\"\n\nint main(int argc, const char * argv[]){\n   \
    \ @autoreleasepool {\n        SpecialProject *sp = [[SpecialProject alloc]init];\n\
    \        NSString *tempLog = sp->log3;\n        NSLog(@\"temp = %@\", tempLog);\n\
    \        return 0;\n    }\n}\n```\n\n# 19. Categories\n\n## Abstract\n\nCategories\
    \ are used to extend classes without using inheritance. When you use a category,\
    \ you can add properties and methods to a class without declaring a super class.\n\
    \n## Categories Defined\n\nCategories are used to extend classes without using\
    \ inheritance. When you use a category, you can add properties and methods to\
    \ a class without declaring a super class.\n\nTo define a category, you need to\
    \ add an interface and implementation. You can do this by adding new header and\
    \ code files or you can add the categories right in the code file where you are\
    \ working."
  raw: '## Extending Classes


    To extend a class, you can add properties and methods to the subclass. Your subclass
    is `SpecialProject`. Let’s add a method named `generateSpecialReport` to your
    `SpecialProject` class.


    `#import "Project.h"`


    `@interface SpecialProject : Project`


    `-(void)generateSpecialReport;`


    `@end`


    Now, of course, you need to implement this method.


    `#import "SpecialProject.h"`


    `@implementation SpecialProject`


    `-(void)generateSpecialReport{`


        `NSLog(@"This is a special report!");`


    `}`


    `@end`


    The procedure to extend classes is identical to adding properties and methods
    as you normally do. What makes this a good tool is that you can share the code
    for the methods that are common among a type of class.


    ## Overriding Methods


    Another thing you can do is override a method from your superclass. Overriding
    a method means that you are going to write your own version of a method with the
    exact same signature (the collection of parameter descriptors). The code in your
    method will be different so this means that objects from the inherited class will
    behave differently even though they get the same message sent to them as the superclass.


    Let’s say you want to make sure that `SpecialProject` objects always print out
    the special report even if the `generateReport` message from the `Project` superclass
    is sent.


    What you need to do first is code `generateReport` method in the `SpecialProject`
    interface.


    `#import "Project.h"`


    `@interface SpecialProject : Project`


    `-(void)generateSpecialReport;`


    `-(void)generateReport;`


    `@end`


    Then you need to code a new implementation of `generateReport` and have that method
    send a message to `generateSpecialReport`. Often in this situation, you will also
    send a message to the `super''`s implementation of the method, which you can do
    by sending a message to `super`.


    `#import "SpecialProject.h"`


    `@implementation SpecialProject`


    `-(void)generateSpecialReport{`


        `NSLog(@"This is a special report!");`


    `}`


    `-(void)generateReport{`


        `[super generateReport];`


        `[self generateSpecialReport];`


    `}`


    `@end`


    ### Instance Variable Visibility


    When I discussed instance variables, or ivars, in [Chapter 16](#A978-1-4302-6488-0_16_Chapter.html),
    the use case for these was straightforward. If your class needed data storage
    that didn’t really describe an attribute of the object (and therefore shouldn’t
    have a property), then you would just use an ivar.


    Since you added ivars to the class extension, the class that you were implementing
    in that file could only use them. These ivars are considered private because they
    are only visible to the class that they are coded in.


    #### Visibility Levels


    When you are planning on using inheritance with your object graph, you may want
    instance variables to have different levels of visibility. The term “visibility”
    refers to the other entities’ access to the variable. Instance variables can either
    be private, protected, or public. When you want to have different visibility levels,
    you must code your instance variables in the interface, which should be located
    in a header file since this is the file that other classes will be importing.


    ##### Private Instance Variables


    Private instance variables can only be used in the class they are coded in. To
    make an instance variable private, you would declare the instance variable in
    the class interface. Let’s say you wanted to add some `NSString` objects to act
    as logs for all of your `Project` classes. To add a private log to be used in
    `Project` objects, you would do something like this in the `Project` interface:


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject` `{`


        `@private NSString *log1;`


    `}`


    `@property(strong) NSString *name;`


    `-(void)generateReport;`


    `-(void)generateReportAndAddThisString:(NSString *)string`


                       `andThenAddThisDate:(NSDate *)date;`


    `+(void)printTimeStamp;`


    `@end`


    You must use the `@private` keyword to designate that `log1` will have private
    visibility. This means you can use `log1` in your `Project` methods, but not in
    your `SpecialProject` methods.


    ##### Protected Instance Methods


    Instance variables with protected visibility can be accessed by methods in the
    class they are coded in as well as any derived classes. So, if you wanted to have
    an `NSString` log variable that can be used by `Project` and `SpecialProject`,
    you would need to make it protected by using the `@protected` keyword.


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject{`


        `@private NSString *log1;`


        `@protected NSString *log2;`


    `}`


    `@property(strong) NSString *name;`


    `-(void)generateReport;`


    `-(void)generateReportAndAddThisString:(NSString *)string`


                       `andThenAddThisDate:(NSDate *)date;`


    `+(void)printTimeStamp;`


    `@end`


    ##### Public Instance Variables


    Public instance variables are available to the class they are coded in and all
    derived classes. In addition, other objects can reference public instance variables
    directly.


    Note


    I am discussing public instance variables here for the sake of completeness, but
    it is generally not accepted practice to use instance variables in this way. Instead,
    you should define properties to return any values that you want to make available
    to other objects.


    To make an instance variable public, you must use the `@public` keyword.


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject{`


        `@private NSString *log1;`


        `@protected NSString *log2;`


        `@public NSString *log3;`


    `}`


    `@property(strong) NSString *name;`


    `-(void)generateReport;`


    `-(void)generateReportAndAddThisString:(NSString *)string`


                       `andThenAddThisDate:(NSDate *)date;`


    `+(void)printTimeStamp;`


    `@end`


    To use this object, you would need to use the member of operator,`->`. The member
    of operator is a traditional C operation that you can use to reference a member
    of a structure that is referenced by a pointer. Here is an example of how you
    would do this:


    `#import <Foundation/Foundation.h>`


    `#import "SpecialProject.h"`


    `int main(int argc, const char * argv[]){`


        `@autoreleasepool {`


            `SpecialProject *sp = [[SpecialProject alloc]init];`


            `NSString *tempLog =` `sp->log3;`


            `NSLog(@"temp = %@", tempLog);`


            `return 0;`


        `}`


    `}`


    # 19. Categories


    Abstract


    Categories are used to extend classes without using inheritance. When you use
    a category, you can add properties and methods to a class without declaring a
    super class.


    ## Categories Defined


    Categories are used to extend classes without using inheritance. When you use
    a category, you can add properties and methods to a class without declaring a
    super class.


    To define a category, you need to add an interface and implementation. You can
    do this by adding new header and code files or you can add the categories right
    in the code file where you are working.'
  trans: "\n# 扩展类\n\n要扩展一个类，你可以向子类中添加属性和方法。你的子类是 `SpecialProject`。现在，我们为你的 `SpecialProject`\
    \ 类添加一个名为 `generateSpecialReport` 的方法。\n\n```\n#import \"Project.h\"\n\n@interface\
    \ SpecialProject : Project\n\n-(void)generateSpecialReport;\n\n@end\n```\n\n当然，接下来你需要实现这个方法。\n\
    \n```\n#import \"SpecialProject.h\"\n\n@implementation SpecialProject\n\n-(void)generateSpecialReport{\n\
    \    NSLog(@\"This is a special report!\");\n}\n\n@end\n```\n\n扩展类的过程与你通常添加属性和方法的方式完全相同。这个方法之所以强大，在于你可以共享某一类对象中通用的方法代码。\n\
    \n## 重写方法\n\n你还可以做另一件事：重写父类中的方法。重写方法意味着你将编写一个与父类方法*签名完全相同*（即参数描述符的集合）的自有版本。由于你编写的方法代码不同，这意味着即使子类对象收到与父类相同的消息，它们的行为也会有所不同。\n\
    \n假设你想确保 `SpecialProject` 对象总能打印出特殊报告，即使发送的是来自父类 `Project` 的 `generateReport`\
    \ 消息。\n\n首先，你需要在 `SpecialProject` 的接口中编写 `generateReport` 方法。\n\n```\n#import\
    \ \"Project.h\"\n\n@interface SpecialProject : Project\n\n-(void)generateSpecialReport;\n\
    -(void)generateReport;\n\n@end\n```\n\n然后，你需要为 `generateReport` 编写一个新的实现，并让该方法向\
    \ `generateSpecialReport` 发送一条消息。在这种情况下，你通常还会向父类（`super`）的该方法实现发送一条消息，这可以通过向 `super`\
    \ 发送消息来实现。\n\n```\n#import \"SpecialProject.h\"\n\n@implementation SpecialProject\n\
    \n-(void)generateSpecialReport{\n    NSLog(@\"This is a special report!\");\n\
    }\n\n-(void)generateReport{\n    [super generateReport];\n    [self generateSpecialReport];\n\
    }\n\n@end\n```\n\n### 实例变量的可见性\n\n在第 16 章中讨论实例变量（或 ivars）时，其使用场景非常直接。如果你的类需要数据存储，而这些数据并非描述对象的属性（因此不应该成为属性），那么你只需使用一个实例变量即可。\n\
    \n由于你将实例变量添加到了类扩展中，因此只有在该文件中实现的类才能使用它们。这些实例变量被认为是*私有的*，因为它们仅对编写它们的类可见。\n\n####\
    \ 可见性级别\n\n当你在对象图中计划使用继承时，你可能希望实例变量具有不同的可见性级别。“可见性”指的是其他实体对该变量的访问权限。实例变量可以是私有的、受保护的或公有的。当你希望拥有不同的可见性级别时，你必须在接口中编写实例变量，该接口应位于头文件中，因为其他类导入的正是这个文件。\n\
    \n##### 私有实例变量\n\n私有实例变量只能在其被编写的类中使用。要使实例变量成为私有的，你需要在类接口中声明该实例变量。假设你想添加一些 `NSString`\
    \ 对象，作为所有 `Project` 类的日志。要为 `Project` 对象添加一个私有日志，你需要在 `Project` 接口中这样操作：\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Project : NSObject {\n    @private\
    \ NSString *log1;\n}\n\n@property(strong) NSString *name;\n-(void)generateReport;\n\
    -(void)generateReportAndAddThisString:(NSString *)string\n                   andThenAddThisDate:(NSDate\
    \ *)date;\n+(void)printTimeStamp;\n\n@end\n```\n\n你必须使用 `@private` 关键字来指定 `log1`\
    \ 将具有私有可见性。这意味着你可以在 `Project` 的方法中使用 `log1`，但不能在 `SpecialProject` 的方法中使用。\n\n\
    ##### 受保护的实例方法\n\n具有受保护可见性的实例变量可以被其所属类以及任何派生类中的方法访问。因此，如果你想让一个 `NSString` 日志变量既能被\
    \ `Project` 使用，也能被 `SpecialProject` 使用，你需要使用 `@protected` 关键字使其受保护。\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Project : NSObject{\n    @private NSString\
    \ *log1;\n    @protected NSString *log2;\n}\n\n@property(strong) NSString *name;\n\
    -(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString *)string\n\
    \                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
    \n@end\n```\n\n##### 公有实例变量\n\n公有实例变量对其所属类以及所有派生类都是可用的。此外，其他对象可以直接引用公有实例变量。\n\n\
    > **注意：** 我在此讨论公有实例变量是为了内容的完整性，但通常不推荐以这种方式使用实例变量。相反，你应该定义属性来返回任何你想让其他对象访问的值。\n\
    \n要使一个实例变量成为公有的，你必须使用 `@public` 关键字。\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Project : NSObject{\n    @private NSString *log1;\n    @protected\
    \ NSString *log2;\n    @public NSString *log3;\n}\n\n@property(strong) NSString\
    \ *name;\n-(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString\
    \ *)string\n                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
    \n@end\n```\n\n要使用这个对象，你需要使用成员操作符 `->`。成员操作符是一种传统的 C 语言操作，可用于引用由指针所指向的结构体成员。以下是使用示例：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"SpecialProject.h\"\n\nint\
    \ main(int argc, const char * argv[]){\n    @autoreleasepool {\n        SpecialProject\
    \ *sp = [[SpecialProject alloc]init];\n        NSString *tempLog = sp->log3;\n\
    \        NSLog(@\"temp = %@\", tempLog);\n        return 0;\n    }\n}\n```\n\n\
    # 19. 分类\n\n## 摘要\n\n分类用于在不使用继承的情况下扩展类。当你使用分类时，你可以在不声明父类的情况下向类添加属性和方法。\n\n## 分类定义\n\
    \n分类用于在不使用继承的情况下扩展类。当你使用分类时，你可以在不声明父类的情况下向类添加属性和方法。\n\n要定义一个分类，你需要添加一个接口和实现。你可以通过添加新的头文件和代码文件来实现，也可以直接将分类添加到你正在处理的代码文件中。\n"
- fmt: "### Category Example\n\nAs an example, let’s say that you want to take the\
    \ `Project` class that you defined in [Chapter 16](#A978-1-4302-6488-0_16_Chapter.html)\
    \ and add a constructor method that would initialize a new `Project` object and\
    \ assign a name at the same time. You could add code like this right in the `main.m`\
    \ file where you are coding.\n\nThe first thing you would do is add the interface.\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n\n@interface\
    \ Project(ProjectExtension)\n\n@end\n\nint main(int argc, const char * argv[]){\n\
    \    @autoreleasepool {\n        return 0;\n    }\n}\n```\n\nCategory interfaces\
    \ look similar to class interfaces, but they follow a slightly different format.\
    \ These interfaces start with the `@interface` keyword and are followed by the\
    \ original class name. Following the class name is the name of the category in\
    \ parentheses.\n\nYou put forward declarations in the category interface. Since\
    \ you want an initializer that sets the name for you, you would add something\
    \ like this to your category interface:\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
    \ *)aName;\n@end\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
    \ {\n        return 0;\n    }\n}\n```\n\nThe next step is to implement the new\
    \ method, and to do that you must code the category implementation. Category implementations\
    \ follow the same pattern as the category interface.\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
    \ *)aName;\n@end\n\n@implementation Project (ProjectExtension)\n\n@end\n\nint\
    \ main(int argc, const char * argv[]){\n    @autoreleasepool {\n        return\
    \ 0;\n    }\n}\n```\n\nFinally, you need to implement the new method just like\
    \ you would for a class.\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
    Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
    \ *)aName;\n@end\n\n@implementation Project (ProjectExtension)\n-(id)initWithName:(NSString\
    \ *)aName{\n    self = [super init];\n    if (self) {\n        self.name = aName;\n\
    \    }\n    return self;\n}\n@end\n\nint main(int argc, const char * argv[]){\n\
    \    @autoreleasepool {\n        return 0;\n    }\n}\n```\n\nNow that you have\
    \ the category set up, you can use this initializer to help you create and initialize\
    \ new `Project` classes right inside the main function.\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
    \ *)aName;\n@end\n\n@implementation Project (ProjectExtension)\n-(id)initWithName:(NSString\
    \ *)aName{\n    self = [super init];\n    if (self) {\n        self.name = aName;\n\
    \    }\n    return self;\n}\n@end\n\nint main(int argc, const char * argv[]){\n\
    \    @autoreleasepool {\n        Project *p = [[Project alloc] initWithName:@\"\
    ThisNewProject\"];\n        NSLog(@\"p.name = %@\", p.name);\n        return 0;\n\
    \    }\n}\n```\n\nIf you were to build and run this project now, this would print\
    \ out to the log:\n\n```\np.name = ThisNewProject\n```\n\n# 20. Blocks\n\n## Abstract\n\
    \nBlocks are a way to define a block of code that you will use at a later time.\
    \ Blocks are a lot like methods or functions in that they can take parameters\
    \ and return a value. Sometimes people refer to blocks as anonymous functions\
    \ because they are functions that aren’t attached to an entity.\n\n## Blocks Defined\n\
    \nBlocks are a way to define a block of code that you will use at a later time.\
    \ Blocks are a lot like methods or functions in that they can take parameters\
    \ and return a value. Sometimes people refer to blocks as anonymous functions\
    \ because they are functions that aren’t attached to an entity.\n\nOne thing that\
    \ sets blocks apart is that they are coded in the same scope as the rest of your\
    \ program so you can add a block without a class definition. Blocks have some\
    \ other properties that make them very useful. While blocks don’t need to be attached\
    \ to objects, blocks can be treated as objects. This means that you can code a\
    \ set of blocks and then store them in a data collection.\n\nBlocks also copy\
    \ all the variable values that are in scope where the block is declared. This\
    \ feature gives the block the ability to capture state and then use that state\
    \ in the future, even if the original variables are out of scope when the block\
    \ is executed.\n\n### Defining Blocks\n\nAs an example, let’s code a block that\
    \ will take a float number as a parameter and then return a squared float result.\
    \ Call the block `squareThis`. The first thing you need to do is to declare the\
    \ block. This follows a similar pattern to declaring a datatype or an object,\
    \ but with some differences that allow you to use the block’s function-like behavior.\n\
    \n```\nfloat (^squareThis)(float);\n```\n\nThe block declaration starts with the\
    \ `float` return type. This means that when you use this block, you will get a\
    \ float number returned to you.\n\nThe next part of the block declaration is the\
    \ name of the block `squareThis` proceeded by the caret (`^`) symbol. The entire\
    \ name is enclosed in parentheses.\n\nFinally, you have a list of parameter types\
    \ enclosed in parentheses. If there is more than one parameter type, the list\
    \ must be comma-separated. A semicolon ends the line of code.\n\n### Assigning\
    \ Blocks\n\nYou can use the assignment operator (`=`) to assign a block of code\
    \ to the block you just declared. When you assign the block code to the block\
    \ variable, you will need to use the caret and declare variable names. You also\
    \ need to include the code scoped with curly brackets.\n\n```\nsquareThis = ^(float\
    \ x){\n    return x * x;\n};\n```\n\nThis block will take the number supplied,\
    \ multiply the number by itself, and then return the result.\n\n### Using Blocks\n\
    \nYou can call the block like a function when you are ready to execute the code.\
    \ Here is how you would use `squareThis`:\n\n```\nfloat result = squareThis(4);\n\
    NSLog(@\"result = %f\", result);\n```\n\nThis will print out the following output\
    \ to the console log:\n\n```\nresult = 16.000000\n```\n\n### Copying Scoped Variables\n\
    \nBlocks copy the variable values of every variable that is currently in scope\
    \ where the block is declared. This means that blocks can save the state of the\
    \ variables around them to use at a later time when the block is executed, whether\
    \ or not the variable is still in scope.\n\nHere is an example of a block called\
    \ `multiplyThese` that takes two numbers and multiplies them returning a float\
    \ result. This block requires two parameters, and you will define and assign the\
    \ block at the same time. Notice that you also have a string defined near the\
    \ `multiplyThese` block.\n\n```\nNSString *title = @\"Multiply Block Execution\"\
    ;\n\nfloat (^multiplyThese)(float, float) = ^(float x, float y){\n    NSLog(title);\n\
    \    return x * y;\n};\n```\n\nBefore returning the result, the `multiplyThese`\
    \ block will print out the string value it captured from the context. To use this\
    \ block, you would do this:\n\n```\nNSLog(@\"multiplyThese(3,4) = %f\", multiplyThese(3,4));\n\
    ```\n\nThis will produce the following output:\n\n```\nMultiply Block Execution\n\
    multiplyThese(3,4) = 12.000000\n```"
  raw: '### Category Example


    As an example, let’s say that you want to take the `Project` class that you defined
    in [Chapter 16](#A978-1-4302-6488-0_16_Chapter.html) and add a constructor method
    that would initialize a new `Project` object and assign a name at the same time.
