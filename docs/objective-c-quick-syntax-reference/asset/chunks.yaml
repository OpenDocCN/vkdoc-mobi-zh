    \ `report` 的值：\n\n```\nreport = minus two, minus one, zero, one, two,\n```\n\n\
    # 12. Do While 循环\n\n**摘要**\n\n`Do while` 循环与 `for` 循环和 `while` 循环的用途相同。其语法有所不同，`do\
    \ while` 循环的显著特点是代码块至少会执行一次。这是因为结束条件直到循环末尾才会被评估。以下是使用 `do while` 循环计数到 10 的代码示例：\n\
    \n## Do While 循环的定义\n\n`Do while` 循环与 `for` 循环和 `while` 循环的用途相同。其语法有所不同，`do while`\
    \ 循环的显著特点是代码块至少会执行一次。这是因为结束条件直到循环末尾才会被评估。以下是使用 `do while` 循环计数到 10 的代码示例：\n\n\
    ```\nint i = 0;\ndo{\n    NSLog(@\"i = %i\", i);\n    i++;\n}while (i <10);\n\
    ```\n\n这个 `do while` 循环将输出以下结果：\n\n```\ni = 0\ni = 1\ni = 2\ni = 3\ni = 4\ni =\
    \ 5\ni = 6\ni = 7\ni = 8\ni = 9\n```\n\n上述循环与第 10 章中的 `for` 循环以及第 11 章中的 `while`\
    \ 循环功能相同。`do while` 循环的规范与 `while` 循环类似，但它们位于不同的代码行中。\n\n与 `while` 循环一样，你需要准备一个计数器变量。\n\
    \n```\nint i = 0;\n```\n\n然后是以 `do` 关键字开头的 `do while` 循环本身。紧跟在 `do` 关键字之后的是由花括号定义的代码块。每次循环时，花括号内的代码都会执行。这里有一行代码\
    \ `NSLog(@\"i = %i\", i);` 用于写入日志，同时你还在该代码块中递增计数器变量 `i++;`。\n\n条件 `(i < 10)` 位于代码块之后的\
    \ `while` 关键字之后。这意味着只要 `i` 的值小于 10，循环就会继续。\n\n> **注意：** 务必记得在此处递增计数器变量。如果不这样做，`i`\
    \ 将永远不会超过 10，循环将永远不会结束，这会导致程序挂起，直到用户终止它。\n\n### Do While 循环与数组\n\n现在，让我们重复第 10\
    \ 章和第 11 章中的示例，该示例使用循环格式化数组中的数字列表。这是你在第 10 章和第 11 章中用过的数组和其他对象：\n\n```\nNSArray\
    \ *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\nNSMutableString *report = [[NSMutableString\
    \ alloc] init];\nNSNumberFormatter *formatter = [[NSNumberFormatter alloc] init];\n\
    formatter.numberStyle = NSNumberFormatterSpellOutStyle;\n```\n\n你将改用 `do while`\
    \ 循环实现。\n\n```\nint i = 0;\ndo {\n    NSNumber *num = [list objectAtIndex:i];\n\
    \    NSString *spelledOutNum = [formatter stringFromNumber:num];\n    [report\
    \ appendString:spelledOutNum];\n    [report appendString:@\", \"];\n    i++;\n\
    }while(i < list.count);\n\nNSLog(@\"report = %@\", report);\n```\n\n最终你会得到一个可变字符串，并将其输出到控制台日志中。输出结果如下：\n\
    \n```\nreport = minus two, minus one, zero, one, two,\n```\n\n# 13. For-Each 循环\n\
    \n**摘要**\n\n`For-each` 循环是一种更具体的循环类型，只能用于 `NSArray` 和 `NSDictionary` 等集合对象。当你需要遍历对象列表并对列表中的每个对象执行操作时，可以使用\
    \ `for` 循环。\n\n## For-Each 循环的定义\n\n`For-each` 循环是一种更具体的循环类型，只能用于 `NSArray` 和\
    \ `NSDictionary` 等集合对象。当你需要遍历对象列表并对列表中的每个对象执行操作时，可以使用 `for` 循环。\n\n例如，以第 8 章中的数组为例：\n\
    \n```\nNSArray *numbers = @[@-2, @-1, @0, @1, @2];\n```\n\n在第 8 章中，你使用了带块的枚举方法遍历列表并对每个数字求平方。你可以使用\
    \ `for` 循环作为枚举方法的替代方案。\n\n```\nfor (NSNumber *num in numbers){\n    NSLog(@\"\
    num ^ 2= %f\", [num floatValue] * [num floatValue]);\n}\n```\n\n该循环以 `for` 关键字开头，后面是括号内的规范。规范以对象类型（`NSNumber`）和一个变量（`*num`）开头，该变量将提供对列表中当前对象的引用。\n\
    \n接下来，你可以看到关键字 `in`，后面跟着数组（`numbers`）。综合来看，你可以将其理解为“对于数组 `numbers` 中的每个数字 num，执行某些操作”。“某些操作”定义在循环第一部分后面的代码块中。它将遍历整个数组并对每个数字求平方，生成以下输出：\n\
    \n```\nnum ^ 2= 4.000000\nnum ^ 2= 1.000000\nnum ^ 2= 0.000000\nnum ^ 2= 1.000000\n\
    num ^ 2= 4.000000\n```\n\n### 使用 NSDictionary 的 For 循环\n\n字典比数组稍微复杂一些，因为字典维护了一个键和对象的列表。你可能会认为对字典使用\
    \ `for` each 循环会得到对象列表；但实际上，你只会得到字典键的列表。\n\n因此，如果你像下面这样对 `NSDictionary` 使用 `for`\
    \ each 循环：\n\n```\nNSDictionary *d1 = @{@\"one\": @1, @\"two\": @2, @\"three\"\
    : @3};\nfor (id object in d1){\n    NSLog(@\"object = %@\", object);\n}\n```\n\
    \n你将得到如下列出所有键的输出：\n\n```\nobject = one\nobject = two\nobject = three\n```\n\n\
    如果你想输出字典中的值，你需要向字典发送 `objectForKey:` 消息。\n\n```\nfor (id object in d1){\n    NSNumber\
    \ *num = [d1 objectForKey:object];\n    NSLog(@\"num = %@\", num);\n}\n```\n\n\
    这个 `for` 循环将打印出对象的值：\n\n```\nnum = 1\nnum = 2\nnum = 3\n```\n\n# 14. If 语句\n\n\
    **摘要**\n\n当你希望根据条件的真假来决定是否执行代码时，可以使用 `if` 语句。为此，你需要评估一个使用关系运算符的表达式，以得到 `YES` 或\
    \ `NO` 的结果。如果表达式评估为真，则可以执行代码；否则可以忽略该代码。\n"
- fmt: "# If Statements Defined\n\nIf statements are used when you want to make a\
    \ choice to execute code based on the trueness of a condition. To make this work,\
    \ you evaluate an expression that uses relational operators to yield a `YES` or\
    \ `NO` result. If you evaluate an expression to be true, then you can execute\
    \ the code; otherwise you can ignore the code.\n\nYou need the `if` keyword and\
    \ an expression here along with a code block to use the if statement.\n\n```\n\
    if(1 < 2){\n    NSLog(@\"That is true\");\n}\n```\n\nThe statement is saying that\
    \ if 1 is less than 2, then execute the code that will print out the string “That\
    \ is true” to the console log.\n\n## Else Keyword\n\nYou can also define an alternate\
    \ action with the `else` keyword. This gives you a way of executing either one\
    \ of two actions based on the results of the expression that you are evaluating.\n\
    \n```\nif(1 < 2){\n    NSLog(@\"That is true\");\n}\nelse{\n    NSLog(@\"Not true\"\
    );\n}\n```\n\n### Nested If Else\n\nEach if statement can contain nested if statements.\
    \ This gives you a way of testing multiple conditions. Generally speaking, it’s\
    \ best to limit yourself to three nested if statements at most. Here is what a\
    \ nested if statement looks like:\n\n```\nif(1 > 2){\n    NSLog(@\"True\");\n\
    }\nelse{\n    if(3 > 4){\n        NSLog(@\"True\");\n    }\n    else{\n      \
    \  NSLog(@\"Not True\");\n    }\n}\n```\n\n## If Statements and Variables\n\n\
    Generally you will see if statements used along with variables that are used to\
    \ keep track of the state of a program. You can use variables inside the parentheses\
    \ as part of the expression in the if statement or you can test the variables\
    \ directly.\n\n```\nBOOL isTrue = 1 == 2;\n\nif(isTrue){\n    NSLog(@\"isTrue\
    \ = %@\", isTrue ? @\"YES\" : @\"NO\");\n    NSLog(@\"That was a true statement.\"\
    );\n}\nelse{\n    NSLog(@\"isTrue = %@\", isTrue ? @\"YES\" : @\"NO\");\n    NSLog(@\"\
    That was not a true statement.\");\n}\n```\n\nIn the code above, you are assigning\
    \ the result of an expression to the Boolean variable `isTrue` and then testing\
    \ this later on with an if statement.\n\nHere is what you will see in the console\
    \ log if you test this code for yourself:\n\n```\nisTrue = NO\nThat was not a\
    \ true statement.\n```\n\n# Switch Statements\n\nSwitch statements are used to\
    \ execute code based on the value of an integer. To make a switch statement work,\
    \ you need to define a level variable and then you need to write a code block\
    \ for each possible value of the level variable that you expect.\n\n## Switch\
    \ Statements Defined\n\nSwitch statements are used to execute code based on the\
    \ value of an integer. To make a switch statement work, you need to define a level\
    \ variable and then you need to write a code block for each possible value of\
    \ the level variable that you expect.\n\nFor this chapter, let’s assume you are\
    \ writing code to help you do some geometry work. You have different shapes that\
    \ you need to work with and you want to calculate the area of each shape. You\
    \ can keep track of what type of shape you are working with by using an `NSInteger`\
    \ variable like `shape`.\n\n```\nNSInteger shape = 0;\n```\n\nEach value of the\
    \ `NSInteger shape` will correspond to a type of shape. Zero could be a square,\
    \ one could be a parallelogram, and two could be a circle. Variables like `shape`\
    \ are called a level variable because they represent possible levels.\n\nFor the\
    \ purposes of this example, you also need a variable to store the results of any\
    \ calculation you make, which is why you have a float variable named `area`.\n\
    \n```\nfloat area;\n```\n\n### Switch Keyword\n\nNow, let’s get to the switch\
    \ statement itself. To start a switch statement, you need the `switch` keyword\
    \ followed by the level variable in parentheses. Also, you should use curly brackets\
    \ to create a code block for the switch statement.\n\n```\nswitch (shape) {\n\n\
    }\n```\n\n### Case Keyword\n\nNext, you can define code blocks that will be associated\
    \ with each value that the level variable can take on. You use the `case` keyword\
    \ to associate each possible value with a code block.\n\n```\nswitch (shape) {\n\
    \        case 0:{\n            float length = 3;\n            area = length *\
    \ length;\n            NSLog(@\"Square area is %f\", area);\n            break;\n\
    \        }\n}\n```\n\nWhat you see above is the `case` keyword followed by the\
    \ value that you are testing for, which is `0`. Then you have a colon followed\
    \ by curly brackets that define the code block that will execute whenever the\
    \ value of shape is `0`.\n\n### break Keyword\n\nAt the end of the code block\
    \ above you can see the `break` keyword. This keyword will return control the\
    \ program back to the main program and outside of the case statement. If this\
    \ statement didn’t appear, then every line of code after would execute whenever\
    \ the first case was true (switch statements stop evaluating the level variable\
    \ once it finds a true value).\n\n### Complete Switch Statement\n\nHere is what\
    \ the statement looks like with multiple case statements:\n\n```\nswitch (shape)\
    \ {\n    case 0:{\n        float length = 3;\n        area = length * length;\n\
    \        NSLog(@\"Square area is %f\", area);\n        break;\n    }\n    case\
    \ 1:{\n        float base = 16;\n        float height = 24;\n        area = base\
    \ * height;\n        NSLog(@\"Parallelogram area is %f\", area);\n        break;\n\
    \    }\n    default:{\n        area = -999;\n        NSLog(@\"No Shape Specified\"\
    );\n        break;\n    }\n}\n```\n\n### Default Case\n\nIf you look closely at\
    \ the code above, you can see that there is a `default` keyword. This keyword\
    \ is used to define a default case, which is a way to define a code block that\
    \ will execute if none of the other conditions are met. So, if the value of shape\
    \ happened to be 6 and had no code block defined, you would be sure that at least\
    \ the code that was included in the default case would execute.\n\nHere is what\
    \ you will find in the console log if you run the code from this chapter:\n\n\
    ```\nSquare area is 9.000000\n```\n\n# Defining Classes\n\nI covered objects when\
    \ I demonstrated the Objective-C objects used to work with strings, numbers, arrays,\
    \ and dictionaries. Objects are an essential object-oriented programming pattern.\
    \ While you will often simply use Foundation objects that are already set up for\
    \ you, usually you will need to define your own types of objects customized for\
    \ your app.\n\n## Classes\n\nI covered objects when I demonstrated the Objective-C\
    \ objects used to work with strings, numbers, arrays, and dictionaries. Objects\
    \ are an essential object-oriented programming pattern. While you will often simply\
    \ use Foundation objects that are already set up for you, usually you will need\
    \ to define your own types of objects customized for your app.\n\nYou can use\
    \ classes to define your own object types. Classes are code definitions that are\
    \ used to create objects. The primary purpose of coding class definitions is to\
    \ express an entity that has attributes and behaviors.\n\nAttributes are called\
    \ properties when coding classes and behaviors are called methods. Properties\
    \ are used to describe an object while methods are used to get objects to perform\
    \ an action.\n\nYou need to do two important tasks when defining a class: code\
    \ an interface and code an implementation."
  raw: '## If Statements Defined


    If statements are used when you want to make a choice to execute code based on
    the trueness of a condition. To make this work, you evaluate an expression that
    uses relational operators to yield a `YES` or `NO` result. If you evaluate an
    express to be true, then you can execute the code; otherwise you can ignore the
    code.


    You need the `if` keyword and an expression here along with a code block to use
    the if statement.


    `if(1 < 2){`


        `NSLog(@"That is true");`


    `}`


    The statement is saying that if 1 is less than 2, then execute the code that will
    print out the string “That is true” to the console log.


    ### Else Keyword


    You can also define an alternate action with the `else` keyword. This gives you
    a way of executing either one of two actions based on the results of the expression
    that you are evaluating.


    `if(1 < 2){`


        `NSLog(@"That is true");`


    `}`


    `else{`


        `NSLog(@"Not true");`


    `}`


    #### Nested If Else


    Each if statement can contain nested if statements. This gives you a way of testing
    multiple conditions. Generally speaking, it’s best to limit yourself to three
    nested if statements at most. Here is what a nested if statement looks like:


    `if(1 > 2){`


        `NSLog(@"True");`


    `}`


    `else{`


        `if(3 > 4){`


            `NSLog(@"True");`


        `}`


        `else{`


            `NSLog(@"Not True");`


        `}`


    `}`


    ### If Statements and Variables


    Generally you will see if statements used along with variables that are used to
    keep track of the state of a program. You can use variables inside the parentheses
    as part of the expression in the if statement or you can test the variables directly.


    `BOOL isTrue = 1 == 2;`


    `if(isTrue){`


        `NSLog(@"isTrue = %@", isTrue ? @"YES" : @"NO");`


        `NSLog(@"That was a true statement.");`


    `}`


    `else{`


        `NSLog(@"isTrue = %@", isTrue ? @"YES" : @"NO");`


        `NSLog(@"That was not a true statement.");`


    `}`


    In the code above, you are assigning the result of an expression to the Boolean
    variable `isTrue` and then testing this later on with an if statement.


    Here is what you will see in the console log if you test this code for yourself:


    `isTrue = NO`


    `That was not a true statement.`


    # 15. Switch Statements


    Abstract


    Switch statements are used to execute code based on the value of an integer. To
    make a switch statement work, you need to define a level variable and then you
    need to write a code block for each possible value of the level variable that
    you expect.


    ## Switch Statements Defined


    Switch statements are used to execute code based on the value of an integer. To
    make a switch statement work, you need to define a level variable and then you
    need to write a code block for each possible value of the level variable that
    you expect.


    For this chapter, let’s assume you are writing code to help you do some geometry
    work. You have different shapes that you need to work with and you want to calculate
    the area of each shape. You can keep track of what type of shape you are working
    with by using an `NSInteger` variablelike `shape`.


    `NSInteger shape = 0;`


    Each value of the `NSInteger shape` will correspond to a type of shape. Zero could
    be a square, one could be a parallelogram, and two could be a circle. Variables
    like `shape` are called a level variable because they represent possible levels.


    For the purposes of this example, you also need a variable to store the results
    of any calculation you make, which is why you have a float variable named `area`.


    `float area;`


    ### Switch Keyword


    Now, let’s get to the switch statement itself. To start a switch statement, you
    need the `switch` keyword followed by the level variable in parentheses. Also,
    you should use curly brackets to create a code block for the switch statement.


    `switch (shape) {`


    `}`


    ### Case Keyword


    Next, you can define code blocks that will be associated with each value that
    the level variable can take on. You use the `case` keyword to associate each possible
    value with a code block.


    `switch (shape) {`


            `case 0:{`


                `float length = 3;`


                `area = length * length;`


                `NSLog(@"Square area is %f", area);`


                `break;`


            `}`


    `}`


    What you see above is the `case` keyword followed by the value that you are testing
    for, which is `0`. Then you have a colon followed by curly brackets that define
    the code block that will execute whenever the value of shape is `0`.


    ### break Keyword


    At the end of the code block above you can see the `break` keyword. This keyword
    will return control the program back to the main program and outside of the case
    statement. If this statement didn’t appear, then every line of code after would
    execute whenever the first case was true (switch statements stop evaluating the
    level variable once it finds a true value).


    ### Complete Switch Statement


    Here is what the statement looks like with multiple case statements:


    `switch (shape) {`


        `case 0:{`


            `float length = 3;`


            `area = length * length;`


            `NSLog(@"Square area is %f", area);`


            `break;`


        `}`


        `case 1:{`


            `float base = 16;`


            `float height = 24;`


            `area = base * height;`


            `NSLog(@"Parallelogram area is %f", area);`


            `break;`


        `} default:{`


            `area = -999;`


            `NSLog(@"No Shape Specified");`


            `break;`


        `}`


    `}`


    ### Default Case


    If you look closely at the code above, you can see that there is a `default` keyword.
    This keyword is used to define a default case, which is a way to define a code
    block that will execute if none of the other conditions are met. So, if the value
    of shape happened to be 6 and had no code block defined, you would be sure that
    at least the code that was included in the default case would execute.


    Here is what you will find in the console log if you run the code from this chapter:


    `Square area is 9.000000`


    # 16. Defining Classes


    Abstract


    I covered objects when I demonstrated the Objective-C objects used to work with
    strings, number, arrays, and dictionaries. Objects are an essential object-oriented
    programming pattern. While you will often simply use Foundation objects that are
    already set up for you, usually you will need to define your own types of objects
    customized for your app.


    ## Classes


    I covered objects when I demonstrated the Objective-C objects used to work with
    strings, number, arrays, and dictionaries. Objects are an essential object-oriented
    programming pattern. While you will often simply use Foundation objects that are
    already set up for you, usually you will need to define your own types of objects
    customized for your app.


    You can use classes to define your own object types. Classes are code definitions
    that are used to create objects. The primary purpose of coding class definitions
    is to express an entity that has attributes and behaviors.


    Attributes are called properties when coding classes and behaviors are called
    methods. Properties are used to describe an object while methods are used to get
    objects to perform an action.


    You need to do two important tasks when defining a class: code an interface and
    code an implementation.'
