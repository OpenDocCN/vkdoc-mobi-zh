    \n要创建数组，你需要使用逗号分隔的对象列表，将其括在方括号中，并以 `@` 符号开头。\n\n```\nNSArray *numbers = @[@-2,\
    \ @-1, @0, @1, @2];\n```\n\n```\nNSArray *letters = @[@\"A\", @\"B\", @\"C\",\
    \ @\"D\", @\"E\", @\"F\"];\n```\n\n`NSArray` 对象 `numbers` 包含一个 `NSNumber` 对象列表，而\
    \ `letters` 则包含一个字符串列表。任何对象都可以放入 `NSArray` 对象中，但不能放入诸如 `NSInteger` 这样的基本类型。\n\n\
    ## 引用对象\n\n将对象放入数组，是为了以后能方便地获取对这些对象的引用。获取这些引用的一般方法是向数组发送 `objectAtIndex:` 消息。以下是如何从\
    \ numbers 数组的第二个位置获取数字对象引用的示例：\n\n```\nNSNumber *num = [numbers objectAtIndex:1];\n\
    ```\n\n如果你知道想要列表中的最后一个对象，可以使用 `lastObject` 来返回列表中的最后一个对象。\n\n> **注意**：Objective-C\
    \ 中的数组索引从 0 开始。\n\n```\nNSNumber *lastNum = [numbers lastObject];\n```\n\n有时你可能已经拥有待查询对象的引用，但想要找出该对象在数组中的位置所对应的索引号。你可以使用\
    \ `indexOfObject:` 来获取此信息。\n\n```\nNSUInteger index = [numbers indexOfObject:num];\n\
    ```\n\n## 枚举\n\n枚举就是逐个遍历列表中的元素。通常，你会对每个元素执行某种操作，例如将对象的内容写入日志或修改对象的属性。\n\n代码块（Blocks），即匿名函数，用于对数组执行枚举操作。代码块是不绑定到对象上的函数。你可以在封闭代码行的大括号内定义一个代码块。代码块可以像对象一样被处理，这意味着你可以将代码块传递给枚举方法，就像传递变量或对象一样。\n\
    \n> **注意**：代码块本身值得单独讲解，它们不仅用于数组。关于如何使用代码块的更多细节将在第 20 章中介绍。\n\n假设你想遍历数字数组，并打印出每个数字的平方值。你可以使用\
    \ `NSArray enumerateObjectsUsingBlock:` 方法遍历列表。该方法会为你提供一个当前对象的引用，你可以利用它来执行这个简单的操作。\n\
    \n```\n[numbers enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)\
    \ {\n    NSLog(@\"obj ^ 2= %f\", [obj floatValue] * [obj floatValue]);\n}];\n\
    ```\n\n冒号后面的所有代码都是代码块代码。这个代码块以 `^` 符号开头。然后你会看到一个逗号分隔的参数列表，后面跟着大括号。大括号内的代码就是代码块，而括号中声明的参数是代码块可以引用的变量。\n\
    \n# NSMutableArray\n\n很多时候，当程序执行代码时，你需要能够向数组中添加和删除项目。你可能正在维护一个操作项列表或视频游戏角色列表。当需要这样做时，你可以使用\
    \ `NSMutableArray`。\n\n`NSMutableArray` 能做 `NSArray` 能做的所有事情，只是它额外提供了更改数组内容的能力。你可以添加和删除项目，并对可变数组中的对象执行其他类型的操作。\n\
    \n不过，你不能在此处使用创建数组的快捷方式，`NSMutableArray` 要求你使用构造方法，如下所示：\n\n```\nNSMutableArray\
    \ *mArray = [NSMutableArray arrayWithArray:@[@-2, @-1, @0]];\n```\n\n上面使用的构造方法是\
    \ `arrayWithArray:`，你只需将一个 `NSArray` 对象传递给这个构造方法即可开始。\n\n要向可变数组添加对象，请使用 `addObject:`\
    \ 消息。\n\n```\n[mArray addObject:@1];\n```\n\n要删除对象，你必须使用 `removeObject:` 消息，并传递一个指向要删除对象的引用。\n\
    \n```\n[mArray removeObject:@1];\n```\n\n如果你想交换两个对象的位置，可以使用 `exchangeObjectAtIndex:withObjectAtIndex:`\
    \ 方法。\n\n```\n[mArray exchangeObjectAtIndex:0 withObjectAtIndex:1];\n```\n\n这将把位置\
    \ 0 上的内容与位置 1 上的内容互换。\n\n还有许多其他变体方法可供你使用。你可以删除所有项目、将项目数组添加到可变数组中，或者在数组的特定起始点插入项目或项目数组。\n\
    \n# 9. 字典\n\n**摘要**：`NSDictionary` 是一个用于通过键和值以列表形式组织对象的类。`NSDictionary` 可以维护对象的索引，并让你在拥有正确键的情况下检索对象。通常，键是一个\
    \ `NSString` 对象，而值则是你正在索引的任何类型的对象。\n\n## NSDictionary\n\n`NSDictionary` 是一个用于通过键和值以列表形式组织对象的类。`NSDictionary`\
    \ 可以维护对象的索引，并让你在拥有正确键的情况下检索对象。通常，键是一个 `NSString` 对象，而值则是你正在索引的任何类型的对象。\n\n要创建字典，你需要使用逗号分隔的键值对列表，将其括在大括号中，并以\
    \ `@` 符号开头。\n\n```\nNSDictionary *d1 = @{@\"one\": @1, @\"two\": @2, @\"three\"\
    : @3};\n```\n\n这将创建一个 `NSNumber` 对象的字典，你可以使用它们的字符串键进行引用。因此，键字符串 `@\"one\"` 可用于检索\
    \ `NSNumber` 对象 `1`。\n\n### 引用对象\n\n将对象放入字典，是为了能基于键高效地获取对这些对象的引用。获取这些引用的一般方法是向字典发送\
    \ `objectForKey:` 消息。以下是如何获取由键 `@\"one\"` 引用的数字的示例：\n\n```\nNSNumber *n1 = [d1\
    \ objectForKey:@\"one\"];\n```\n\n### 枚举\n\n枚举就是逐个遍历列表中的元素。通常，你会对每个元素执行某种操作，例如将对象的内容写入日志或修改对象的属性。\n\
    \n你可以用几乎与数组相同的方式枚举字典。但你会获得字典中每个键以及每个对象的引用。\n\n```\n[d1 enumerateKeysAndObjectsUsingBlock:^(id\
    \ key, id obj, BOOL *stop) {\n    NSLog(@\"key = %@, value = %@\", key, obj);\n\
    }];\n```\n\n与第 8 章中讨论的数组枚举过程一样，代码块声明以 `^` 字符开头，代码块代码包含在大括号 `{ }` 中。\n\n以下是使用此消息将生成的输出：\n\
    \n```\nkey = one, value = 1\nkey = two, value = 2\nkey = three, value = 3\n```\n"
- fmt: "# NSMutableDictionary\n\n`NSDictionary` is an immutable object, so once you\
    \ create an `NSDictionary` object you can't add or remove items from the dictionary.\
    \ If you need to add or remove items from a dictionary, you must use the `NSMutableDictionary`\
    \ class.\n\nYou can't use the shortcut for array creation here, though, and `NSMutableDictionary`\
    \ requires you to use a constructor, like this:\n\n```\nNSMutableDictionary *md1\
    \ = [[NSMutableDictionary alloc] init];\n```\n\nThe easiest thing to do is to\
    \ follow the `alloc` and `init` pattern to create an empty dictionary to which\
    \ you can add objects. When you are ready to add an object to the dictionary,\
    \ you will need a key and the value that you want to add. These two parameters\
    \ will be supplied to the `setObject: forKey:` method.\n\n```\n[md1 setObject:@4\
    \ forKey:@\"four\"];\n```\n\nTo remove an object, send the `removeObjectForKey:`\
    \ message and supply the key.\n\n```\n[md1 removeObjectForKey:@\"four\"];\n```\n\
    \nYou can remove every object from a mutable dictionary by sending the `removeAllObjects`\
    \ message.\n\n```\n[md1 removeAllObjects];\n```\n\n# 10. For Loops\n\n## Abstract\n\
    \nLoops are used when you want to repeat a similar type of task many times. `For`\
    \ loops are used when you know beforehand how many times you want to repeat a\
    \ similar line of code. Here is a `for` loop that will write to the console window\
    \ 10 times:\n\n## For Loops Defined\n\nLoops are used when you want to repeat\
    \ a similar type of task many times. `For` loops are used when you know beforehand\
    \ how many times you want to repeat a similar line of code. Here is a `for` loop\
    \ that will write to the console window 10 times:\n\n```\nfor (int i=0; i<10;\
    \ i++) {\n    NSLog(@\"i = %i\", i);\n}\n```\n\nThis `for` loop will produce this\
    \ output:\n\n```\ni = 0\ni = 1\ni = 2\ni = 3\ni = 4\ni = 5\ni = 6\ni = 7\ni =\
    \ 8\ni = 9\n```\n\nLet's take a closer look at the parts of this loop. The first\
    \ thing is the `for` keyword. This lets the compiler know that you are coding\
    \ a for loop.\n\nNext, you have a series of code lines enclosed in parenthesis:\
    \ `(int i=0; i<10; i++)`. These lines of code specify a starting condition (`int\
    \ i=0;`), an ending condition (`i<10`), and an increment instruction (`i++`).\
    \ This means that the loop will repeat 10 times by starting at 0 while the variable\
    \ `i` increases by 1 each time the loop executes as long as `i` is less than 10.\n\
    \nFinally, you have a code block defined by curly brackets, `{ }`. The code contained\
    \ in these curly brackets will execute each time you go through the loop. In the\
    \ example above, the code block had only one line of code, `NSLog(@\"i = %i\"\
    , i);`. Notice that the variable `i`, sometimes called the counter variable, is\
    \ in scope and you can use `i` in the code block.\n\n### For Loops and Arrays\n\
    \nMore often than not, you will use a `for` loop to go through a list and do something\
    \ with each object in that list. Let's assume that you have an array named `list`\
    \ that has five `NSNumber` objects ranging from -2.0 to 2.0.\n\n```\nNSArray *list\
    \ = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\n```\n\nLet's say that you want to construct\
    \ a string that includes all values in `list` but spelled out with words. For\
    \ example, you want a string `minus two, minus one, etc`. You would need to use\
    \ `NSNumberFormatter` and an `NSMutableString`, both of which have been covered\
    \ in the chapters on numbers and strings.\n\nJust to set this up, let's get the\
    \ number formatter, mutable string, and array before you go into the `for` loop.\n\
    \n```\nNSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\nNSMutableString *report\
    \ = [[NSMutableString alloc] init];\nNSNumberFormatter *formatter = [[NSNumberFormatter\
    \ alloc] init];\nformatter.numberStyle = NSNumberFormatterSpellOutStyle;\n```\n\
    \nNote that you are specifying `NSNumberFormatterSpellOutStyle` here so that the\
    \ number formatter can give you the value of each number object spelled out.\n\
    \nSince you want the `for` loop to move through each number in the array list,\
    \ you will need to find out how many objects are contained in `list`. `NSArray`\
    \ objects have a `count` property that you can use to get the number of objects\
    \ contained in the array, and you can use this value directly in the `for` loop.\n\
    \n```\nfor (int i=0; i<list.count; i++) {\n    NSNumber *num = [list objectAtIndex:i];\n\
    \    NSString *spelledOutNum = [formatter stringFromNumber:num];\n    [report\
    \ appendString:spelledOutNum];\n    [report appendString:@\", \"];\n}\n```\n\n\
    What you are doing above is going through each object in list and getting a reference\
    \ to the number in the list that corresponds to the index that is associated with\
    \ the current value of `i`.\n\nNext, you use the number formatter to get the spelled-out\
    \ string version of the number. Finally, you append this spelled-out string value\
    \ to the end of the mutable string. Here is what the output would look like:\n\
    \n```\nreport = minus two, minus one, zero, one, two,\n```\n\n# 11. While Loops\n\
    \n## Abstract\n\nLike `for` loops, `while` loops are used when you want to repeat\
    \ a similar type of task many times. `While` loops are used when you want to execute\
    \ a line of code many times until a condition is met. Here is a `while` loop that\
    \ will write to the console window 10 times:\n\n## While Loops Defined\n\nLike\
    \ `for` loops, `while` loops are used when you want to repeat a similar type of\
    \ task many times. `While` loops are used when you want to execute a line of code\
    \ many times until a condition is met. Here is a `while` loop that will write\
    \ to the console window 10 times:\n\n```\nint i = 0;\nwhile (i < 10) {\n    NSLog(@\"\
    i = %i\", i);\n    i++;\n}\n```\n\nThis `while` loop will produce this output:\n\
    \n```\ni = 0\ni = 1\ni = 2\ni = 3\ni = 4\ni = 5\ni = 6\ni = 7\ni = 8\ni = 9\n\
    ```\n\nThe loop above does the same thing as the `for` loop from Chapter 10, but\
    \ note that the specifications for the loop are in different spots. The first\
    \ thing that you will notice is that you need to have a counter variable on hand\
    \ to use in a `while` loop. You can't just put the counter variable right in the\
    \ body of the loop like you did before. So you need a separate line of code before\
    \ the `while` loop to declare and assign the counter variable.\n\n```\nint i =\
    \ 0;\n```\n\nThen you have the `while` loop itself that is started with the `while`\
    \ keyword. In the parentheses after the `while` keyword is the ending condition,\
    \ `(i < 10)`. This means that the loop will go on as long as the value of `i`\
    \ is less than 10.\n\nFinally, you have a code block defined by curly brackets.\
    \ The code contained in these curly brackets will execute each time you go through\
    \ the loop. You have one line of code, `NSLog(@\"i = %i\", i);`, to write to the\
    \ log. You also increment the counter variable in this code block, `i++;`.\n\n\
    **Note**\n\nIt's important to remember to increment the counter variable here.\
    \ If you don't do this, then `i` will never go beyond 10. The loop will never\
    \ end, which will effectively cause your program to hang until a user terminates\
    \ it."
  raw: '## NSMutableDictionary


    `NSDictionary` is an immutable object, so once you create an `NSDictionary` object
    you can’t add or remove items from the dictionary. If you need to add or remove
    items from a dictionary, you must use the `NSMutableDictionary` class .


    You can’t use the shortcut for array creation here, though, and `NSMutableDictionary`
    requires you to use a constructor, like this:


    `NSMutableDictionary *md1 = [[NSMutableDictionary alloc] init];`


    The easiest thing to do is to follow the `alloc` and `init` pattern to create
    an empty dictionary to which you can add objects. When you are ready to add an
    object to the dictionary, you will need a key and the value that you want to add.
    These two parameters will be supplied to the `setObject: for Key:` method.


    `[md1 setObject:@4 forKey:@"four"];`


    To remove an object, send the r `emoveObjectForKey:` message and supply the key.


    `[md1 removeObjectForKey:@"four"];`


    You can remove every object from a mutable dictionary by sending the `removeAllObjects`
    message.


    `[md1 removeAllObjects];`


    # 10. For Loops


    Abstract


    Loops are used when you want to repeat a similar type of task many times. `For`
    loops are used when you know beforehand how many times you want to repeat a similar
    line of code. Here is a `for` loop that will write to the console window 10 times:


    ## For Loops Defined


    Loops are used when you want to repeat a similar type of task many times. `For`
    loops are used when you know beforehand how many times you want to repeat a similar
    line of code. Here is a `for` loop that will write to the console window 10 times:


    `for (int i=0; i<10; i++) {`


        `NSLog(@"i = %i", i);`


    `}`


    This `for` loop will produce this output:


    `i = 0`


    `i = 1`


    `i = 2`


    `i = 3`


    `i = 4`


    `i = 5`


    `i = 6`


    `i = 7`


    `i = 8`


    `i = 9`


    Let’s take a closer loop at the parts of this loop. The first thing is the `for`
    keyword. This lets the compiler know that you are coding a for loop.


    Next, you have a series of code lines enclosed in parenthesis: `(int i=0; i<10;
    i++)`. These lines of code specify a starting condition (`int i=0;`), an ending
    condition (`i<10`), and an increment instruction (`i++`). This means that the
    loop will repeat 10 times by starting at 0 while the variable `i` increases by
    1 each time the loop executes as long as `i` is less than 10.


    Finally, you have a code block defined by curly brackets, `{ }`. The code contained
    in these curly brackets will execute each time you go through the loop. In the
    example above, the code block had only one line of code, `NSLog(@"i = %i", i);`.
    Notice that the variable `i`, sometimes called the counter variable, is in scope
    and you can use `i` in the code block.


    ### For Loops and Arrays


    More often than not, you will use a `for` loop to go through a list and do something
    with each object in that list. Let’s assume that you have an array named `list`
    that has a five `NSNumber` objects ranging from -2.0 to 2.0.


    `NSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];`


    Let’s say that you want to construct a string that includes all values in `list`
    but spelled out with words. For example, you want a string `minus two, minus one,
    etc` . You would need to use `NSNumberFormatter` and an `NSMutableString`, both
    of which have been covered in the chapters on numbers and strings.


    Just to set this up, let’s get the number formatter, mutable string, and array
    before you go into the `for` loop.


    `NSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];`


    `NSMutableString *report = [[NSMutableString alloc] init];`


    `NSNumberFormatter *formatter = [[NSNumberFormatter alloc] init];`


    `formatter.numberStyle = NSNumberFormatterSpellOutStyle;`


    Note that you are specifying `NSNumberFormatterSpellOutStyle` here so that the
    number formatter can give you the value of each number object spelled out.


    Since you want the `for` loop to move through each number in the array list, you
    will need to find out how many objects are contained in `list. NSArray` objects
    have a `count` property that you can use to get the number of objects contained
    in the array, and you can use this value directly in the `for` loop.


    `for (int i=0; i<list.count; i++) {`


        `NSNumber *num = [list objectAtIndex:i];`


        `NSString *spelledOutNum = [formatter stringFromNumber:num];`


        `[report appendString:spelledOutNum];`


        `[report appendString:@", "];`


    `}`


    What you are doing above is going through each object in list and getting a reference
    to the number in the list that corresponds to the index that is associated with
    the current value of `i`.


    Next, you use the number formatter to get the spelled-out string version of the
    number. Finally, you append this spelled-out string value to the end of the mutable
    string. Here is what the output would look like:


    `report = minus two, minus one, zero, one, two,`


    # 11. While Loops


    Abstract


    Like `for` loops, `while` loops are used when you want to repeat a similar type
    of task many times. `While` loops are used when you want to execute a line of
    code many times until a condition is met. Here is a `while` loop that will write
    to the console window 10 times:


    ## While Loops Defined


    Like `for` loops, `while` loops are used when you want to repeat a similar type
    of task many times. `While` loops are used when you want to execute a line of
    code many times until a condition is met. Here is a `while` loop that will write
    to the console window 10 times:


    `int i = 0;`


    `while (i < 10) {`


        `NSLog(@"i = %i", i);`


        `i++;`


    `}`


    This `while` loop will produce this output:


    `i = 0`


    `i = 1`


    `i = 2`


    `i = 3`


    `i = 4`


    `i = 5`


    `i = 6`


    `i = 7`


    `i = 8`


    `i = 9`


    The loop above does the same thing as the `for` loop from [Chapter 10](#A978-1-4302-6488-0_10_Chapter.html),
    but note that the specifications for the loop are in different spots. The first
    thing that you will notice is that you need to have a counter variable on hand
    to use in a `while` loop. You can’t just put the counter variable right in the
    body of the loop like you did before. So you need a separate line of code before
    the `while` loop to declare and assign the counter variable.


    `int i = 0;`


    Then you have the `while` loop itself that is started with the `while` keyword.
    In the parentheses after the `while` keyword is the ending condition, `(i < 10)`.
    This means that the loop will go on as long as the value of `i` is less than 10.


    Finally, you have a code block defined by curly brackets. The code contained in
    these curly brackets will execute each time you go through the loop. You have
    one line of code, `NSLog(@"i = %i", i);`, to write to the log. You also increment
    the counter variable in this code block, `i++;`.


    Note


    It’s important to remember to increment the counter variable here. If you don’t
    do this, then `i` will never go beyond 10\. The loop will never end, which will
    effectively cause your program to hang until a user terminates it.'
  trans: "\n# NSMutableDictionary\n\n`NSDictionary` 是一个不可变对象，因此一旦你创建了一个 `NSDictionary`\
    \ 对象，就无法向字典中添加或删除条目。如果你需要向字典中添加或删除条目，则必须使用 `NSMutableDictionary` 类。\n\n不过，这里不能使用数组创建的快捷方式，`NSMutableDictionary`\
    \ 要求你使用构造器，像这样：\n\n```\nNSMutableDictionary *md1 = [[NSMutableDictionary alloc]\
    \ init];\n```\n\n最简单的做法是遵循 `alloc` 和 `init` 模式来创建一个空字典，然后你就可以向其中添加对象。当你准备向字典中添加对象时，你需要一个键（key）和要添加的值（value）。这两个参数将被提供给\
    \ `setObject: forKey:` 方法。\n\n```\n[md1 setObject:@4 forKey:@\"four\"];\n```\n\
    \n若要移除一个对象，发送 `removeObjectForKey:` 消息并提供相应的键。\n\n```\n[md1 removeObjectForKey:@\"\
    four\"];\n```\n\n你可以通过发送 `removeAllObjects` 消息来移除可变字典中的所有对象。\n\n```\n[md1 removeAllObjects];\n\
    ```\n\n# 10. For 循环\n\n## 摘要\n\n当你想多次重复执行相似类型的任务时，会用到循环。`For` 循环用于当你事先知道要重复执行相似代码行的次数时。下面是一个\
    \ `for` 循环示例，它将向控制台窗口写入 10 次：\n\n## For 循环详解\n\n当你想多次重复执行相似类型的任务时，会用到循环。`For`\
    \ 循环用于当你事先知道要重复执行相似代码行的次数时。下面是一个 `for` 循环示例，它将向控制台窗口写入 10 次：\n\n```\nfor (int\
    \ i=0; i<10; i++) {\n    NSLog(@\"i = %i\", i);\n}\n```\n\n这个 `for` 循环将产生如下输出：\n\
    \n```\ni = 0\ni = 1\ni = 2\ni = 3\ni = 4\ni = 5\ni = 6\ni = 7\ni = 8\ni = 9\n\
    ```\n\n让我们更仔细地看一下这个循环的各个部分。首先是 `for` 关键字，它告诉编译器你正在编写一个 for 循环。\n\n接着，在括号内有一系列代码行：`(int\
    \ i=0; i<10; i++)`。这些代码行指定了起始条件（`int i=0;`）、结束条件（`i<10`）和增量指令（`i++`）。这意味着循环将重复\
    \ 10 次，从 0 开始，只要变量 `i` 小于 10，每次循环执行时 `i` 就增加 1。\n\n最后，有一个由花括号 `{ }` 定义的代码块。包含在这些花括号中的代码将在每次循环时执行。在上面的例子中，代码块只有一行代码：`NSLog(@\"\
    i = %i\", i);`。请注意，变量 `i`（有时称为计数器变量）在作用域内，你可以在代码块中使用 `i`。\n\n### For 循环与数组\n\n\
    通常情况下，你会使用 `for` 循环来遍历一个列表，并对列表中的每个对象执行某些操作。假设你有一个名为 `list` 的数组，其中包含五个范围从 -2.0\
    \ 到 2.0 的 `NSNumber` 对象。\n\n```\nNSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\n\
    ```\n\n假设你想构建一个字符串，其中包含 `list` 中的所有值，但要用单词拼写出来。例如，你想要一个字符串 `minus two, minus one,\
    \ etc`。你需要使用 `NSNumberFormatter` 和一个 `NSMutableString`，这些都在关于数字和字符串的章节中介绍过。\n\n\
    为了设置好这一切，让我们在进入 `for` 循环之前，先获取数字格式化器、可变字符串和数组。\n\n```\nNSArray *list = @[@-2.0,\
    \ @-1.0, @0.0, @1.0, @2.0];\nNSMutableString *report = [[NSMutableString alloc]\
    \ init];\nNSNumberFormatter *formatter = [[NSNumberFormatter alloc] init];\nformatter.numberStyle\
    \ = NSNumberFormatterSpellOutStyle;\n```\n\n请注意，这里指定了 `NSNumberFormatterSpellOutStyle`，这样数字格式化器就能给出每个数字对象拼写出来的值。\n\
    \n由于你希望 `for` 循环遍历数组列表中的每个数字，你需要找出 `list` 中包含多少个对象。`NSArray` 对象有一个 `count` 属性，你可以用它来获取数组中包含的对象数量，并且你可以直接在\
    \ `for` 循环中使用这个值。\n\n```\nfor (int i=0; i<list.count; i++) {\n    NSNumber *num\
    \ = [list objectAtIndex:i];\n    NSString *spelledOutNum = [formatter stringFromNumber:num];\n\
    \    [report appendString:spelledOutNum];\n    [report appendString:@\", \"];\n\
    }\n```\n\n上面所做的就是遍历列表中的每个对象，并获取列表中与当前 `i` 值对应的索引位置上的数字引用。\n\n接下来，使用数字格式化器获取该数字的拼写字符串版本。最后，将这个拼写的字符串值追加到可变字符串的末尾。以下是输出结果的样子：\n\
    \n```\nreport = minus two, minus one, zero, one, two,\n```\n\n# 11. While 循环\n\
    \n## 摘要\n\n与 `for` 循环类似，当你想多次重复执行相似类型的任务时，会用到 `while` 循环。`While` 循环用于当你想要重复执行一行代码多次，直到满足某个条件时。下面是一个\
    \ `while` 循环示例，它将向控制台窗口写入 10 次：\n\n## While 循环详解\n\n与 `for` 循环类似，当你想多次重复执行相似类型的任务时，会用到\
    \ `while` 循环。`While` 循环用于当你想要重复执行一行代码多次，直到满足某个条件时。下面是一个 `while` 循环示例，它将向控制台窗口写入\
    \ 10 次：\n\n```\nint i = 0;\nwhile (i < 10) {\n    NSLog(@\"i = %i\", i);\n   \
    \ i++;\n}\n```\n\n这个 `while` 循环将产生如下输出：\n\n```\ni = 0\ni = 1\ni = 2\ni = 3\ni\
    \ = 4\ni = 5\ni = 6\ni = 7\ni = 8\ni = 9\n```\n\n上面的循环与第 10 章的 `for` 循环功能相同，但请注意循环的各个部分位于不同的位置。你首先会注意到的是，在\
    \ `while` 循环中需要有一个计数器变量供其使用。你不能像之前那样直接将计数器变量放在循环体内部。所以你需要在使用 `while` 循环之前单独用一行代码来声明并赋值计数器变量。\n\
    \n```\nint i = 0;\n```\n\n然后是 `while` 循环本身，它以 `while` 关键字开始。在 `while` 关键字后面的括号内是结束条件\
    \ `(i < 10)`。这意味着只要 `i` 的值小于 10，循环就会继续。\n\n最后，有一个由花括号定义的代码块。包含在这些花括号中的代码将在每次循环时执行。你有一行代码\
    \ `NSLog(@\"i = %i\", i);` 用于写入日志。你还需要在此代码块中递增计数器变量：`i++;`。\n\n**注意**\n\n记住在此处递增计数器变量非常重要。如果你不这样做，那么\
    \ `i` 将永远不会超过 10。循环将永远不会结束，这实际上会导致你的程序挂起，直到用户终止它。\n"
