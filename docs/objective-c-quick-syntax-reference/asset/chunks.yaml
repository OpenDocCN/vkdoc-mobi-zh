    \n使用 if 语句需要 `if` 关键字、一个表达式以及一个代码块。\n\n```\nif(1 < 2){\n    NSLog(@\"That is true\"\
    );\n}\n```\n\n该语句的意思是：如果 1 小于 2，则执行代码，将字符串“That is true”打印到控制台日志中。\n\n## else\
    \ 关键字\n\n你还可以使用 `else` 关键字定义一个备选操作。这提供了一种方式，让你可以根据所计算的表达式结果，执行两个操作中的一个。\n\n```\n\
    if(1 < 2){\n    NSLog(@\"That is true\");\n}\nelse{\n    NSLog(@\"Not true\");\n\
    }\n```\n\n### 嵌套 if-else\n\n每个 if 语句都可以包含嵌套的 if 语句。这为你提供了测试多个条件的方式。一般来说，最好将嵌套\
    \ if 语句限制在最多三层。以下是嵌套 if 语句的样子：\n\n```\nif(1 > 2){\n    NSLog(@\"True\");\n}\n\
    else{\n    if(3 > 4){\n        NSLog(@\"True\");\n    }\n    else{\n        NSLog(@\"\
    Not True\");\n    }\n}\n```\n\n## if 语句与变量\n\n通常，你会看到 if 语句与用于跟踪程序状态的变量一起使用。你可以在\
    \ if 语句的括号内将变量作为表达式的一部分，或者直接测试变量。\n\n```\nBOOL isTrue = 1 == 2;\n\nif(isTrue){\n\
    \    NSLog(@\"isTrue = %@\", isTrue ? @\"YES\" : @\"NO\");\n    NSLog(@\"That\
    \ was a true statement.\");\n}\nelse{\n    NSLog(@\"isTrue = %@\", isTrue ? @\"\
    YES\" : @\"NO\");\n    NSLog(@\"That was not a true statement.\");\n}\n```\n\n\
    在上面的代码中，你将表达式的结果赋值给了布尔变量 `isTrue`，然后稍后通过 if 语句对其进行测试。\n\n如果你亲自测试这段代码，在控制台日志中会看到以下内容：\n\
    \n```\nisTrue = NO\nThat was not a true statement.\n```\n\n# Switch 语句\n\nSwitch\
    \ 语句用于根据整数值执行代码。要使 switch 语句工作，你需要定义一个层级变量，然后为预期的层级变量的每个可能值编写一个代码块。\n\n## Switch\
    \ 语句的定义\n\nSwitch 语句用于根据整数值执行代码。要使 switch 语句工作，你需要定义一个层级变量，然后为预期的层级变量的每个可能值编写一个代码块。\n\
    \n在本章中，假设你正在编写代码来帮助进行一些几何计算。你需要处理不同的形状，并希望计算每个形状的面积。你可以使用一个 `NSInteger` 类型的变量（如\
    \ `shape`）来跟踪你正在处理的形状类型。\n\n```\nNSInteger shape = 0;\n```\n\n`NSInteger shape`\
    \ 的每个值都对应一种形状类型。零可以是正方形，一可以是平行四边形，二可以是圆形。像 `shape` 这样的变量被称为层级变量，因为它们代表了可能的层级。\n\
    \n为了本示例的目的，你还需要一个变量来存储任何计算的结果，这就是为什么你有一个名为 `area` 的浮点数变量。\n\n```\nfloat area;\n\
    ```\n\n### switch 关键字\n\n现在，让我们来介绍 switch 语句本身。要开始一个 switch 语句，你需要 `switch` 关键字，后面跟括号中的层级变量。同时，你应该使用花括号为\
    \ switch 语句创建一个代码块。\n\n```\nswitch (shape) {\n\n}\n```\n\n### case 关键字\n\n接下来，你可以定义与层级变量可能取到的每个值相关联的代码块。你使用\
    \ `case` 关键字将每个可能的值与一个代码块关联起来。\n\n```\nswitch (shape) {\n        case 0:{\n  \
    \          float length = 3;\n            area = length * length;\n          \
    \  NSLog(@\"Square area is %f\", area);\n            break;\n        }\n}\n```\n\
    \n你上面看到的是 `case` 关键字后跟你要测试的值，这里是 `0`。然后是冒号，接着是用花括号定义的代码块，当 `shape` 的值为 `0` 时，该代码块将被执行。\n\
    \n### break 关键字\n\n在上面代码块的末尾，你可以看到 `break` 关键字。这个关键字会将程序控制权返回给主程序，并跳出 case 语句。如果没有这个语句，那么一旦第一个\
    \ case 为真，后面的每一行代码都会被执行（switch 语句在找到真值后，会停止对层级变量的求值）。\n\n### 完整的 Switch 语句\n\n\
    以下是包含多个 case 语句的 switch 语句样子：\n\n```\nswitch (shape) {\n    case 0:{\n       \
    \ float length = 3;\n        area = length * length;\n        NSLog(@\"Square\
    \ area is %f\", area);\n        break;\n    }\n    case 1:{\n        float base\
    \ = 16;\n        float height = 24;\n        area = base * height;\n        NSLog(@\"\
    Parallelogram area is %f\", area);\n        break;\n    }\n    default:{\n   \
    \     area = -999;\n        NSLog(@\"No Shape Specified\");\n        break;\n\
    \    }\n}\n```\n\n### 默认 case\n\n仔细观察上面的代码，你可以看到有一个 `default` 关键字。这个关键字用于定义一个默认\
    \ case，这是一种定义代码块的方式，当其他条件都不满足时，该代码块将被执行。因此，如果 `shape` 的值恰好是 6 并且没有定义相应的代码块，你可以确保至少默认\
    \ case 中包含的代码会被执行。\n\n如果你运行本章的代码，在控制台日志中会看到以下内容：\n\n```\nSquare area is 9.000000\n\
    ```\n\n# 定义类\n\n我在演示用于处理字符串、数字、数组和字典的 Objective-C 对象时，已经介绍过对象。对象是一种基本的面向对象编程模式。虽然你通常会直接使用已经为你设置好的\
    \ Foundation 对象，但通常你需要为你的应用自定义你自己的对象类型。\n\n## 类\n\n你可以在演示用于处理字符串、数字、数组和字典的 Objective-C\
    \ 对象时已经介绍过对象。**（注：此处英文原文有重复段落，译文按原文结构保留重复）** 类是用于创建对象的代码定义。编写类定义的主要目的是表达一个具有属性和行为的实体。\n\
    \n在编写类时，属性称为 properties，行为称为 methods。Properties 用于描述一个对象，而 methods 用于让对象执行一个动作。\n\
    \n定义类时需要完成两项重要任务：编写接口和编写实现。\n"
- fmt: "# Class Interfaces\n\nYou use a class interface to specify the name of the\
    \ class and the properties and methods that make up the class. Here is how you\
    \ would set up a class called `Project`:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Project : NSObject\n\n@end\n```\n\nThe line of the code that begins\
    \ with the `#import` imports the Foundation framework. This framework is needed\
    \ whenever you want to work with Objective-C classes like `NSObject` or `NSString`\
    \ (which you almost always do).\n\nIn particular, you need to reference `NSObject`\
    \ since that will be your base class. A base class is what your class will be\
    \ derived from and provides a starting point for you. `NSObject` provides the\
    \ object creation methods you need to make your objects work like objects (such\
    \ as `alloc` and `init`).\n\nIn the line that starts with `@interface` keyword,\
    \ you can use the name of the class, `Project`, and the base class `NSObject`,\
    \ which comes after the colon.\n\nThe `@interface` keyword must be matched with\
    \ the `@end` keyword.\n\n## Property Forward Declarations\n\nProperties require\
    \ a forward declaration that is coded in the class interface. These belong in\
    \ the space between the `@interface` line and `@end` line.\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Project : NSObject\n\n@property(strong) NSString *name;\n\n@end\n\
    ```\n\nProperty forward declarations start with the `@property` keyword followed\
    \ by a property descriptor in parenthesis. See Table [16-1](#A978-1-4302-6488-0_16_Chapter.html#Tab1)\
    \ for a list of the possible parameter descriptors that you can use.\n\n**Table\
    \ 16-1.** Parameter Descriptors\n\n| Attribute | Description |\n| --- | --- |\n\
    | `Readwrite` | The property needs both a getter and a setter (default). |\n|\
    \ `Readonly` | The property only needs a getter (objects cannot set this property).\
    \ |\n| `strong` | The property will have a strong relationship. |\n| `weak` |\
    \ The property will be set to nil when the destination object is deallocated.\
    \ |\n| `assign` | The property will simply use assignment (used with primitive\
    \ types). |\n| `Copy` | The property returns a copy and must implement the `NSCopying`\
    \ protocol. |\n| `retain` | A retain message will be sent in the setter method.\
    \ |\n| `nonatomic` | Specifies the property is not atomic (not locked while being\
    \ accessed). |\n\nThe next two parts of the property forward declaration are the\
    \ datatype and the name of the property. You can read this forward declaration\
    \ as defining a property `name` of type `NSString` that `Project` will have a\
    \ strong relationship with.\n\n**Note**  \nTerms like `strong`, `retain`, and\
    \ `weak` have to do with how memory management is handled for the property value.\
    \ Both `strong` and `retain` mean that your class objects will always retain a\
    \ reference to the property value, which guarantees that the object will stay\
    \ in scope for as long as you need it. Property descriptors `weak` and `assign`\
    \ don’t provide this guarantee.\n\n## Method Forward Declarations\n\nMethods also\
    \ need forward declarations. While properties describe an object, methods represent\
    \ actions that an object can take. Here is how you would add a forward declaration\
    \ to the `Project` class:\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Project : NSObject\n\n@property(strong) NSString *name;\n\n-(void)generateReport;\n\
    \n@end\n```\n\nMethod forward declarations start with the minus sign followed\
    \ by the return type in parenthesis. This method has a `void` return type, but\
    \ you can have any datatype or class as a return type for a method.\n\nAfter that\
    \ is the method’s signature, which I will talk more about once you see a method\
    \ that includes parameters. Here is an example of a method that includes parameters:\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface Project : NSObject\n\n\
    @property(strong) NSString *name;\n\n-(void)generateReport;\n\n-(void)generateReportAndAddThisString:(NSString\
    \ *)string\n                     andThenAddThisDate:(NSDate *)date;\n\n@end\n\
    ```\n\nIn this parameter, you can see that the method signature is broken up into\
    \ two parts. Each part has a parameter and a parameter descriptor separated by\
    \ a colon. In Objective-C, method signatures are a collection of parameter descriptors\
    \ and parameters. When you have no parameters (like the first method), you just\
    \ have a parameter descriptor to describe the method.\n\n# Implementing Classes\n\
    \nDefining the class interface is the first part of the process of defining a\
    \ class. The next part is called the implementation because this is where you\
    \ provide the code implementation that makes the class objects work.\n\nTo start\
    \ implementing a class, you use the `@implementation` keyword along with the class\
    \ name.\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\n@end\n```\n\
    \nThe first line of code is importing the Project forward declarations into this\
    \ file so the class is aware of what needs to be implemented.\n\n**Note**  \n\
    While it is not required, usually class interfaces and implementations will be\
    \ coded in separate files. Interface files end with the `.h` file extension and\
    \ are sometimes called header files. Implementation files end with the `.m` file\
    \ extension and are sometimes called code files.\n\nThe implementation begins\
    \ with the `@implementation` keyword followed by the name of the class `Project`.\
    \ Implementations end with the `@end` keyword. Now, you need to implement the\
    \ properties and methods.\n\nProperties are implemented for you automatically\
    \ and you don’t need to take any action to make properties work.\n\n## Implementing\
    \ Methods\n\nWhen you implement a method, you repeat the forward declaration of\
    \ the method from the interface. But you add a code block and the code that you\
    \ need to get the method to do something.\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n\n-(void)generateReport{\n    NSLog(@\"This is a report!\");\n}\n\n\
    @end\n```\n\nWhen you implement a method that includes parameters, you can reference\
    \ those parameter values in your code.\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n\n-(void)generateReport{\n    NSLog(@\"This is a report!\");\n}\n\n\
    -(void)generateReportAndAddThisString:(NSString *)string\n                   \
    \  andThenAddThisDate:(NSDate *)date{\n    [self generateReport];\n    NSLog(@\"\
    %@\", string);\n    NSLog(@\"Date: %@\", date);\n}\n\n@end\n```"
  raw: '## Class Interfaces


    You use a class interface to specify the name of the class and the properties
    and methods that make up the class. Here is how you would set up a class called
    `Project`:


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject`


    `@end`


    The line of the code that begins with the `#import` imports the Foundation framework.
    This framework is needed whenever you want to work with Objective-C classes like
    `NSObject` or `NSString` (which you almost always do).


    In particular, you need to reference `NSObject` since that will be your base class.
    A base class is what your class will be derived from and provides a starting point
    for you. `NSObject` provides the object creation methods you need to make your
    objects work like objects (such as `alloc` and `init`).


    In the line that starts with `@interface` keyword, you can use the name of the
    class, `Project`, and the base class `NSObject`, which comes after the colon.


    The `@interface` keyword must be matched with the `@end` keyword.


    ### Property Forward Declarations


    Properties require a forward declaration that is coded in the class interface.
    These belong in the space between the `@interface` line and `@end` line.


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject`


    `@property(strong) NSString *name;`


    `@end`


    Property forward declarations start with the `@property` keyword followed by a
    property descriptor in parenthesis. See Table [16-1](#A978-1-4302-6488-0_16_Chapter.html#Tab1)
    for a list of the possible parameter descriptors that you can use.


    Table 16-1.


    Parameter Descriptors


    | Attribute | Description |

    | --- | --- |

    | `Readwrite` | The property needs both a getter and a setter (default). |

    | `Readonly` | The property only needs a getter (objects cannot set this property).
    |

    | `strong` | The property will have a strong relationship. |

    | `weak` | The property will be set to nil when the destination object is deallocated.
    |

    | `assign` | The property will simply use assignment (used with primitive types).
    |

    | `Copy` | The property returns a copy and must implement the `NSCopying` protocol.
    |

    | `retain` | A retain message will be sent in the setter method. |

    | `nonatomic` | Specifies the property is not atomic (not locked while being accessed).
    |


    The next two parts of the property forward declaration are the datatype and the
    name of the property. You can read this forward declaration as defining a property
    `name` of type `NSString` that `Project` will have a strong relationship with.


    Note


    Terms like `strong`, `retain`, and `weak` have to do with how memory management
    is handled for the property value. Both `strong` and `retain` mean that your class
    objects will always retain a reference to the property value, which guarantees
    that the object will stay in scope for as long as you need it. Property descriptors
    `weak` and `assign` don’t provide this guarantee.


    ### Method Forward Declarations


    Methods also need forward declarations. While properties describe an object, methods
    represent actions that an object can take. Here is how you would add a forward
    declaration to the `Project` class:


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject`


    `@property(strong) NSString *name;`


    `-(void)generateReport;`


    `@end`


    Method forward declarations start with the minus sign followed by the return type
    in parenthesis. This method has a `void` return type, but you can have any datatype
    or class as a return type for a method.


    After that is the method’s signature, which I will talk more about once you see
    a method that includes parameters. Here is an example of a method that includes
    parameters:


    `#import <Foundation/Foundation.h>`


    `@interface Project : NSObject`


    `@property(strong) NSString *name;`


    `-(void)generateReport;`


    `-(void)generateReportAndAddThisString:(NSString *)string`


                                 `andThenAddThisDate:(NSDate *)date;`


    `@end`


    In this parameter, you can see that the method signature is broken up into two
    parts. Each part has a parameter and a parameter descriptor separated by a colon.
    In Objective-C, method signatures are a collection of parameter descriptors and
    parameters. When you have no parameters (like the first method), you just have
    a parameter descriptor to describe the method.


    ## Implementing Classes


    Defining the class interface is the first part of the process of defining a class.
    The next part is called the implementation because this is where you provide the
    code implementation that makes the class objects work.


    To start implementing a class, you use the `@implementation` keyword along with
    the class name.


    `#import "Project.h"`


    `@implementation Project`


    `@end`


    The first line of code is importing the Project forward declarations into this
    file so the class is aware of what needs to be implemented.


    Note


    While it is not required, usually class interfaces and implementations will be
    coded in separate files. Interface files end with the .h file extension and are
    sometimes called header files. Implementation files end with the .m file extension
    and are sometimes called code files.


    The implementation begins with the `@implementation` keyword followed by the name
    of the class `Project`. Implementations end with the `@end` keyword. Now, you
    need to implement the properties and methods.


    Properties are implemented for you automatically and you don’t need to take any
    action to make properties work.


    ### Implementing Methods


    When you implement a method, you repeat the forward declaration of the method
    from the interface. But you add a code block and the code that you need to get
    the method to do something.


    `#import "Project.h"`


    `@implementation Project`


    `-(void)generateReport{`


        `NSLog(@"This is a report!");`


    `}`


    `@end`


    When you implement a method that includes parameters, you can reference those
    parameter values in your code.


    `#import "Project.h"`


    `@implementation Project`


    `-(void)generateReport{`


        `NSLog(@"This is a report!");`


    `}`


    `-(void)generateReportAndAddThisString:(NSString *)string`


                                 `andThenAddThisDate:(NSDate *)date{`


        `[self generateReport];`


        `NSLog(@"%@", string);`


        `NSLog(@"Date: %@", date);`


    `}`


    `@end`'
  trans: "\n# 类接口\n\n使用类接口可以指定类名以及构成该类的属性和方法。以下是创建一个名为 `Project` 的类的方法：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Project : NSObject\n\n@end\n```\n\n\
    以 `#import` 开头的代码行导入了 Foundation 框架。每当您需要使用 `NSObject` 或 `NSString` 这类 Objective-C\
    \ 类时（几乎总是如此），都需要包含此框架。\n\n具体来说，您需要引用 `NSObject`，因为它将成为您的基类。基类是您派生类的起点，`NSObject`\
    \ 提供了使对象按预期工作所需的对象创建方法（例如 `alloc` 和 `init`）。\n\n在以 `@interface` 关键字开头的行中，您可以使用类名\
    \ `Project` 以及冒号后面的基类 `NSObject`。\n\n`@interface` 关键字必须与 `@end` 关键字配对使用。\n\n##\
    \ 属性前置声明\n\n属性需要在类接口中编写前置声明。这些声明位于 `@interface` 行和 `@end` 行之间的空间内。\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Project : NSObject\n\n@property(strong)\
    \ NSString *name;\n\n@end\n```\n\n属性前置声明以 `@property` 关键字开头，后跟括号内的属性描述符。有关可使用的参数描述符列表，请参见表\
    \ 16-1。\n\n**表 16-1.** 参数描述符\n\n| 属性 | 描述 |\n| --- | --- |\n| `Readwrite` | 该属性需要同时包含\
    \ getter 和 setter 方法（默认值）。 |\n| `Readonly` | 该属性只需要 getter 方法（对象无法设置此属性）。 |\n\
    | `strong` | 该属性将具有强引用关系。 |\n| `weak` | 当目标对象被释放时，该属性将被设为 nil。 |\n| `assign` |\
    \ 该属性仅使用赋值操作（用于基础数据类型）。 |\n| `Copy` | 该属性返回一个副本，并且必须实现 `NSCopying` 协议。 |\n| `retain`\
    \ | setter 方法中会发送 retain 消息。 |\n| `nonatomic` | 指定该属性是非原子性的（在访问时不会加锁）。 |\n\n属性前置声明的后两部分是数据类型和属性名。您可以将此前置声明理解为：定义了一个名为\
    \ `name` 的属性，其类型为 `NSString`，并且 `Project` 将与其建立强引用关系。\n\n**注意**  \n`strong`、`retain`\
    \ 和 `weak` 等术语与属性值的内存管理方式有关。`strong` 和 `retain` 都意味着您的类对象将始终持有对属性值的引用，从而保证在您需要期间该对象不会超出作用域。而属性描述符\
    \ `weak` 和 `assign` 则不提供此保证。\n\n## 方法前置声明\n\n方法同样需要前置声明。属性用于描述对象，而方法则代表对象可以执行的操作。以下是向\
    \ `Project` 类添加前置声明的方法：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Project : NSObject\n\n@property(strong) NSString *name;\n\n-(void)generateReport;\n\
    \n@end\n```\n\n方法前置声明以减号开头，后跟括号内的返回类型。此方法具有 `void` 返回类型，但您可以使用任何数据类型或类作为方法的返回类型。\n\
    \n之后是方法签名。当您看到一个包含参数的方法时，我会进一步讨论签名。以下是一个包含参数的方法示例：\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Project : NSObject\n\n@property(strong) NSString *name;\n\n-(void)generateReport;\n\
    \n-(void)generateReportAndAddThisString:(NSString *)string\n                 \
    \    andThenAddThisDate:(NSDate *)date;\n\n@end\n```\n\n在此参数示例中，您可以看到方法签名被分为两部分。每部分都有一个参数和一个由冒号分隔的参数描述符。在\
    \ Objective-C 中，方法签名是参数描述符和参数的集合。当您没有参数时（如第一个方法），只需使用一个参数描述符来描述该方法即可。\n\n# 实现类\n\
    \n定义类接口是定义类过程的第一步。下一步称为实现，因为您要在此处提供使类对象正常工作的代码实现。\n\n要开始实现一个类，请使用 `@implementation`\
    \ 关键字加上类名。\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\n@end\n\
    ```\n\n第一行代码将 Project 的前置声明导入到此文件中，以便该类了解需要实现的内容。\n\n**注意**  \n虽然并非强制要求，但通常类接口和实现会分别编写在不同文件中。接口文件以\
    \ `.h` 扩展名结尾，有时称为头文件。实现文件以 `.m` 扩展名结尾，有时称为代码文件。\n\n实现以 `@implementation` 关键字开头，后跟类名\
    \ `Project`。实现以 `@end` 关键字结束。现在，您需要实现属性和方法。\n\n属性会自动为您实现，无需采取任何额外操作即可使属性生效。\n\n\
    ## 实现方法\n\n当您实现一个方法时，需要重复接口中的方法前置声明。但您需要添加一个代码块以及使方法执行特定操作的代码。\n\n```\n#import\
    \ \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n    NSLog(@\"\
    This is a report!\");\n}\n\n@end\n```\n\n当您实现包含参数的方法时，可以在代码中引用这些参数值。\n\n```\n\
    #import \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n \
    \   NSLog(@\"This is a report!\");\n}\n\n-(void)generateReportAndAddThisString:(NSString\
    \ *)string\n                     andThenAddThisDate:(NSDate *)date{\n    [self\
    \ generateReport];\n    NSLog(@\"%@\", string);\n    NSLog(@\"Date: %@\", date);\n\
    }\n\n@end\n```\n"
- fmt: "### Private Properties and Methods\n\nThe procedures above define properties\
    \ and methods publicly. This means that other objects can reference these properties\
    \ and use those methods. Classes that are derived from this class can use and\
    \ override these properties and methods. If you want to prevent that from happening\
    \ to make properties and methods private, you can use a class extension.\n\n####\
    \ Class Extensions\n\nClass extensions give you a way to extend a class interface\
    \ in the implementation file. Since other classes will be importing the interface\
    \ file that ends with the `.h` extension (the header file), they will not be able\
    \ to access anything with forward declarations that are defined in a class extension.\n\
    \nYou can put a class extension in the implementation file like this:\n\n```\n\
