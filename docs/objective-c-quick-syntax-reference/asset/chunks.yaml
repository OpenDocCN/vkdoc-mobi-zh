    # 25. Singleton


    Abstract


    Singleton is a design pattern where you can have only one instance of a class.
    Usually, when you define a class, you expect to use many instances of the class.
    But in some designs this doesn’t make sense.


    ## Singleton Defined


    Singleton is a design pattern where you can have only one instance of a class.
    Usually, when you define a class, you expect to use many instances of the class.
    But in some designs this doesn’t make sense.


    For instance, an application may only need one reference to the file system (since
    there is only one file system). Or the app has a data model that should stay in
    sync and so you want to make sure you have only one instance of a class available.


    To implement a Singleton pattern, you will need to create a special type of constructor
    and then only use this constructor to get a reference to the Singleton object.


    ### Singleton Interface


    The first step is to code the interface. Let’s assume that you are creating a
    class `AppSingleton` that will be your singleton. Here is how you would code the
    interface:


    `#import <Foundation/Foundation.h>`


    `@interface AppSingleton : NSObject`


    `+ (AppSingleton *)sharedInstance;`


    `@end`


    What you have above is a class method that returns an instance of `AppSingleton`.


    ### Singleton Implementation


    To implement this singleton, you need a static variable and the implementation
    of the class method `sharedInstance` that you defined in the interface.


    `#import "AppSingleton.h"`


    `@implementation AppSingleton`


    `static AppSingleton *singletonInstance = nil;`


    `+ (AppSingleton *)sharedInstance{`


        `@synchronized(self){`


            `if (singletonInstance == nil)`


                `singletonInstance = [[self alloc] init];`


            `return(singletonInstance);`


        `}`


    `}`


    `@end`


    The static instance is an `AppSingleton` type named `singletonInstance` and you
    have it initially set to nil. In the `sharedInstance` method, you are testing
    the `singletonInstance`; if it is nil, then you will create a new instance. Either
    way you return this instance to the caller.


    The code in this method is surrounded by the `@synchronized(self)` block. This
    is used to lock the code so that only one thread can use these lines of code at
    a time. This ensures that you only have one instance of this singleton even when
    you have more than one thread.


    ### Referencing Singletons


    When you need a singleton object, you must use the method that returns the instance.
    This will be the method that you coded.


    If you wanted to use the `AppSingleton` class, you would do this:


    `AppSingleton *ap = [AppSingleton sharedInstance];`


    This is used as in place of the `alloc` and `init` pattern normally used to create
    objects. You can do this from any class or file in your app, and each one will
    get the same instance of the class. The only caveat is that you must use the Singleton
    constructor; while you can still use `alloc` and `init`, doing so will break the
    pattern because these methods can still create more than one object while the
    constructor you created can only create one object.


    # 26. Error Handling


    Abstract


    When programs encounter unexpected errors, they behave unexpectedly or stop working
    altogether. Ideally, programmers would find and fix all bugs before programs are
    used, but there are some situations were programmers don’t have control of the
    entire situation. For instance, errors can happen when programs require resources
    like files or web sites that are no longer present.


    ## Error Handling Defined


    When programs encounter unexpected errors, they behave unexpectedly or stop working
    altogether. Ideally, programmers would find and fix all bugs before programs are
    used, but there are some situations were programmers don’t have control of the
    entire situation. For instance, errors can happen when programs require resources
    like files or web sites that are no longer present.


    The best practice in dealing with situations like this is to add error handling
    to a program. This means that when an error occurs, the program can recover or
    gracefully shutdown. `NSError` is the Foundation class that programmers use to
    deal with errors.'
  trans: "\n### 分配委托对象\n\n下一步是分配委托对象。在本例中，可以在 `main.m` 文件中完成这一操作。你只需将项目对象赋值给每个任务的\
    \ `delegate` 属性即可。\n\n```\nProject *p = [[Project alloc]init];\np.listOfTasks\
    \ = [[NSMutableArray alloc]init];\np.name = @\"Cook Dinner\";\n\nTask *t1 = [[Task\
    \ alloc]init];\nt1.name = @\"Choose Menu\";\nt1.delegate = p;\n[p.listOfTasks\
