    # 20. Blocks


    Abstract


    Blocks are a way to define a block of code that you will use at a later time.
    Blocks are a lot like methods or functions in that they can take parameters and
    return a value. Sometimes people refer to blocks as anonymous functions because
    they are functions that aren’t attached to an entity.


    ## Blocks Defined


    Blocks are a way to define a block of code that you will use at a later time.
    Blocks are a lot like methods or functions in that they can take parameters and
    return a value. Sometimes people refer to blocks as anonymous functions because
    they are functions that aren’t attached to an entity.


    One thing that sets blocks apart is that they are coded in the same scope as the
    rest of your program so you can add a block without a class definition. Blocks
    have some other properties that make them very useful. While blocks don’t need
    to be attached to objects, blocks can be treated as objects. This means that you
    can code a set of blocks and then store them in a data collection.


    Blocks also copy all the variable values that are in scope where the block is
    declared. This feature gives the block the ability to capture state and then use
    that state in the future, even if the original variables are out of scope when
    the block is executed.


    ### Defining Blocks


    As an example, let’s code a block that will take a float number as a parameter
    and then return a squared float result. Call the block `squareThis`. The first
    thing you need to do is to declare the block. This follows a similar pattern to
    declaring a datatype or an object, but with some differences that allow you to
    use the block’s function-like behavior.


    `float (^squareThis)(float);`


    The block declaration starts with the `float` return type. This means that when
    you use this block, you will get a float number returned to you.


    The next part of the block declaration is the name of the block `squareThis` proceeded
    by the caret (`^`) symbol. The entire name is enclosed in parentheses.


    Finally, you have a list of parameter types enclosed in parentheses. If there
    is more than one parameter type, the list must be comma-separated. A semicolon
    ends the line of code.


    ### Assigning Blocks


    You can use the assignment operator (`=` ) to assign a block of code to the block
    you just declared. When you assign the block code to the block variable, you will
    need to use the caret and declare variable names. You also need to include the
    code scoped with curly brackets.


    `squareThis = ^(float x){`


        `return x * x;`


    `};`


    This block will take the number supplied, multiply the number by itself, and then
    return the result.


    ### Using Blocks


    You can call the block like a function when you are ready to execute the code.
    Here is how you would use `squareThis`:


    `float result = squareThis(4);`


    `NSLog(@"result = %f", result);`


    This will print out the following output to the console log:


    `result = 16.000000`


    ### Copying Scoped Variables


    Blocks copy the variable values of every variable that is currently in scope where
    the block is declared. This means that blocks can save the state of the variables
    around them to use at a later time when the block is executed, whether or not
    the variable is still in scope.


    Here is an example of a block called `multiplyThese` that takes two numbers and
    multiplies them returning a float result. This block requires two parameters,
    and you will define and assign the block at the same time. Notice that that you
    also have a string defined near the `multiplyThese` block.


    `NSString *title = @"Multiply Block Execution";`


    `float (^multiplyThese)(float, float) = ^(float x, float y){`


        `NSLog(title);`


        `return x * y;`


    `};`


    Before returning the result, the `multiplyThese` block will print out the string
    value it captured from the context. To use this block, you would do this:


    `NSLog(@"multiplyThese(3,4) = %f", multiplyThese(3,4));`


    This will produce the following output:


    `Multiply Block Execution`


    `multiplyThese(3,4) = 12.000000`'
