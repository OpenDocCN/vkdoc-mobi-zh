- "# 8. 数组\n\n**摘要：** `NSArray` 是一个用于在列表中组织对象的类。`NSArray` 可以维护对象的索引、搜索对象以及枚举遍历列表。枚举是逐个遍历列表中的每个项目并对每个项目执行操作的过程。\n\
  \n\n\n## NSArray\n\n`NSArray` 是一个用于以列表形式组织对象的类。`NSArray` 可以维护对象的索引、搜索对象以及遍历列表。枚举就是逐个遍历列表中的元素，并对每个元素执行操作的过程。\n\
  \n要创建数组，你需要使用逗号分隔的对象列表，将其括在方括号中，并以 `@` 符号开头。\n\n```\nNSArray *numbers = @[@-2, @-1,\
  \ @0, @1, @2];\n```\n\n```\nNSArray *letters = @[@\"A\", @\"B\", @\"C\", @\"D\"\
  , @\"E\", @\"F\"];\n```\n\n`NSArray` 对象 `numbers` 包含一个 `NSNumber` 对象列表，而 `letters`\
  \ 则包含一个字符串列表。任何对象都可以放入 `NSArray` 对象中，但不能放入诸如 `NSInteger` 这样的基本类型。\n\n### 引用对象\n\n\
  将对象放入数组，是为了以后能方便地获取对这些对象的引用。获取这些引用的一般方法是向数组发送 `objectAtIndex:` 消息。以下是如何从 numbers\
  \ 数组的第二个位置获取数字对象引用的示例：\n\n```\nNSNumber *num = [numbers objectAtIndex:1];\n```\n\
  \n如果你知道想要列表中的最后一个对象，可以使用 `lastObject` 来返回列表中的最后一个对象。\n\n> **注意**：Objective-C 中的数组索引从\
  \ 0 开始。\n\n```\nNSNumber *lastNum = [numbers lastObject];\n```\n\n有时你可能已经拥有待查询对象的引用，但想要找出该对象在数组中的位置所对应的索引号。你可以使用\
  \ `indexOfObject:` 来获取此信息。\n\n```\nNSUInteger index = [numbers indexOfObject:num];\n\
  ```\n\n### 枚举\n\n枚举就是逐个遍历列表中的元素。通常，你会对每个元素执行某种操作，例如将对象的内容写入日志或修改对象的属性。\n\n代码块（Blocks），即匿名函数，用于对数组执行枚举操作。代码块是不绑定到对象上的函数。你可以在封闭代码行的大括号内定义一个代码块。代码块可以像对象一样被处理，这意味着你可以将代码块传递给枚举方法，就像传递变量或对象一样。\n\
  \n> **注意**：代码块本身值得单独讲解，它们不仅用于数组。关于如何使用代码块的更多细节将在第 20 章中介绍。\n\n假设你想遍历数字数组，并打印出每个数字的平方值。你可以使用\
  \ `NSArray enumerateObjectsUsingBlock:` 方法遍历列表。该方法会为你提供一个当前对象的引用，你可以利用它来执行这个简单的操作。\n\
  \n```\n[numbers enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)\
  \ {\n    NSLog(@\"obj ^ 2= %f\", [obj floatValue] * [obj floatValue]);\n}];\n```\n\
  \n冒号后面的所有代码都是代码块代码。这个代码块以 `^` 符号开头。然后你会看到一个逗号分隔的参数列表，后面跟着大括号。大括号内的代码就是代码块，而括号中声明的参数是代码块可以引用的变量。\n\
  \n## NSMutableArray\n\n很多时候，当程序执行代码时，你需要能够向数组中添加和删除项目。你可能正在维护一个操作项列表或视频游戏角色列表。当需要这样做时，你可以使用\
  \ `NSMutableArray`。\n\n`NSMutableArray` 能做 `NSArray` 能做的所有事情，只是它额外提供了更改数组内容的能力。你可以添加和删除项目，并对可变数组中的对象执行其他类型的操作。\n\
  \n不过，你不能在此处使用创建数组的快捷方式，`NSMutableArray` 要求你使用构造方法，如下所示：\n\n```\nNSMutableArray *mArray\
  \ = [NSMutableArray arrayWithArray:@[@-2, @-1, @0]];\n```\n\n上面使用的构造方法是 `arrayWithArray:`，你只需将一个\
  \ `NSArray` 对象传递给这个构造方法即可开始。\n\n要向可变数组添加对象，请使用 `addObject:` 消息。\n\n```\n[mArray\
  \ addObject:@1];\n```\n\n要删除对象，你必须使用 `removeObject:` 消息，并传递一个指向要删除对象的引用。\n\n```\n\
  [mArray removeObject:@1];\n```\n\n如果你想交换两个对象的位置，可以使用 `exchangeObjectAtIndex:withObjectAtIndex:`\
  \ 方法。\n\n```\n[mArray exchangeObjectAtIndex:0 withObjectAtIndex:1];\n```\n\n这将把位置\
  \ 0 上的内容与位置 1 上的内容互换。\n\n还有许多其他变体方法可供你使用。你可以删除所有项目、将项目数组添加到可变数组中，或者在数组的特定起始点插入项目或项目数组。\n\
  \n"
- "# 9. 字典\n\n**摘要**：`NSDictionary` 是一个用于通过键和值以列表形式组织对象的类。`NSDictionary` 可以维护对象的索引，并让你在拥有正确键的情况下检索对象。通常，键是一个\
  \ `NSString` 对象，而值则是你正在索引的任何类型的对象。\n\n## NSDictionary\n\n`NSDictionary` 是一个用于通过键和值以列表形式组织对象的类。`NSDictionary`\
  \ 可以维护对象的索引，并让你在拥有正确键的情况下检索对象。通常，键是一个 `NSString` 对象，而值则是你正在索引的任何类型的对象。\n\n要创建字典，你需要使用逗号分隔的键值对列表，将其括在大括号中，并以\
  \ `@` 符号开头。\n\n```\nNSDictionary *d1 = @{@\"one\": @1, @\"two\": @2, @\"three\"\
  : @3};\n```\n\n这将创建一个 `NSNumber` 对象的字典，你可以使用它们的字符串键进行引用。因此，键字符串 `@\"one\"` 可用于检索\
  \ `NSNumber` 对象 `1`。\n\n### 引用对象\n\n将对象放入字典，是为了能基于键高效地获取对这些对象的引用。获取这些引用的一般方法是向字典发送\
  \ `objectForKey:` 消息。以下是如何获取由键 `@\"one\"` 引用的数字的示例：\n\n```\nNSNumber *n1 = [d1 objectForKey:@\"\
  one\"];\n```\n\n### 枚举\n\n枚举就是逐个遍历列表中的元素。通常，你会对每个元素执行某种操作，例如将对象的内容写入日志或修改对象的属性。\n\
  \n你可以用几乎与数组相同的方式枚举字典。但你会获得字典中每个键以及每个对象的引用。\n\n```\n[d1 enumerateKeysAndObjectsUsingBlock:^(id\
  \ key, id obj, BOOL *stop) {\n    NSLog(@\"key = %@, value = %@\", key, obj);\n\
  }];\n```\n\n与第 8 章中讨论的数组枚举过程一样，代码块声明以 `^` 字符开头，代码块代码包含在大括号 `{ }` 中。\n\n以下是使用此消息将生成的输出：\n\
  \n```\nkey = one, value = 1\nkey = two, value = 2\nkey = three, value = 3\n```\n\
  \n\n\n## NSMutableDictionary\n\n`NSDictionary` 是一个不可变对象，因此一旦你创建了一个 `NSDictionary`\
  \ 对象，就无法向字典中添加或删除条目。如果你需要向字典中添加或删除条目，则必须使用 `NSMutableDictionary` 类。\n\n不过，这里不能使用数组创建的快捷方式，`NSMutableDictionary`\
  \ 要求你使用构造器，像这样：\n\n```\nNSMutableDictionary *md1 = [[NSMutableDictionary alloc]\
  \ init];\n```\n\n最简单的做法是遵循 `alloc` 和 `init` 模式来创建一个空字典，然后你就可以向其中添加对象。当你准备向字典中添加对象时，你需要一个键（key）和要添加的值（value）。这两个参数将被提供给\
  \ `setObject: forKey:` 方法。\n\n```\n[md1 setObject:@4 forKey:@\"four\"];\n```\n\n\
  若要移除一个对象，发送 `removeObjectForKey:` 消息并提供相应的键。\n\n```\n[md1 removeObjectForKey:@\"\
  four\"];\n```\n\n你可以通过发送 `removeAllObjects` 消息来移除可变字典中的所有对象。\n\n```\n[md1 removeAllObjects];\n\
  ```\n\n"
- "# 10. For 循环\n\n## 摘要\n\n当你想多次重复执行相似类型的任务时，会用到循环。`For` 循环用于当你事先知道要重复执行相似代码行的次数时。下面是一个\
  \ `for` 循环示例，它将向控制台窗口写入 10 次：\n\n## For 循环详解\n\n当你想多次重复执行相似类型的任务时，会用到循环。`For` 循环用于当你事先知道要重复执行相似代码行的次数时。下面是一个\
  \ `for` 循环示例，它将向控制台窗口写入 10 次：\n\n```\nfor (int i=0; i<10; i++) {\n    NSLog(@\"\
  i = %i\", i);\n}\n```\n\n这个 `for` 循环将产生如下输出：\n\n```\ni = 0\ni = 1\ni = 2\ni = 3\n\
  i = 4\ni = 5\ni = 6\ni = 7\ni = 8\ni = 9\n```\n\n让我们更仔细地看一下这个循环的各个部分。首先是 `for` 关键字，它告诉编译器你正在编写一个\
  \ for 循环。\n\n接着，在括号内有一系列代码行：`(int i=0; i<10; i++)`。这些代码行指定了起始条件（`int i=0;`）、结束条件（`i<10`）和增量指令（`i++`）。这意味着循环将重复\
  \ 10 次，从 0 开始，只要变量 `i` 小于 10，每次循环执行时 `i` 就增加 1。\n\n最后，有一个由花括号 `{ }` 定义的代码块。包含在这些花括号中的代码将在每次循环时执行。在上面的例子中，代码块只有一行代码：`NSLog(@\"\
  i = %i\", i);`。请注意，变量 `i`（有时称为计数器变量）在作用域内，你可以在代码块中使用 `i`。\n\n### For 循环与数组\n\n通常情况下，你会使用\
  \ `for` 循环来遍历一个列表，并对列表中的每个对象执行某些操作。假设你有一个名为 `list` 的数组，其中包含五个范围从 -2.0 到 2.0 的 `NSNumber`\
  \ 对象。\n\n```\nNSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\n```\n\n假设你想构建一个字符串，其中包含\
  \ `list` 中的所有值，但要用单词拼写出来。例如，你想要一个字符串 `minus two, minus one, etc`。你需要使用 `NSNumberFormatter`\
  \ 和一个 `NSMutableString`，这些都在关于数字和字符串的章节中介绍过。\n\n为了设置好这一切，让我们在进入 `for` 循环之前，先获取数字格式化器、可变字符串和数组。\n\
  \n```\nNSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\nNSMutableString *report\
  \ = [[NSMutableString alloc] init];\nNSNumberFormatter *formatter = [[NSNumberFormatter\
  \ alloc] init];\nformatter.numberStyle = NSNumberFormatterSpellOutStyle;\n```\n\n\
  请注意，这里指定了 `NSNumberFormatterSpellOutStyle`，这样数字格式化器就能给出每个数字对象拼写出来的值。\n\n由于你希望 `for`\
  \ 循环遍历数组列表中的每个数字，你需要找出 `list` 中包含多少个对象。`NSArray` 对象有一个 `count` 属性，你可以用它来获取数组中包含的对象数量，并且你可以直接在\
  \ `for` 循环中使用这个值。\n\n```\nfor (int i=0; i<list.count; i++) {\n    NSNumber *num\
  \ = [list objectAtIndex:i];\n    NSString *spelledOutNum = [formatter stringFromNumber:num];\n\
  \    [report appendString:spelledOutNum];\n    [report appendString:@\", \"];\n\
  }\n```\n\n上面所做的就是遍历列表中的每个对象，并获取列表中与当前 `i` 值对应的索引位置上的数字引用。\n\n接下来，使用数字格式化器获取该数字的拼写字符串版本。最后，将这个拼写的字符串值追加到可变字符串的末尾。以下是输出结果的样子：\n\
  \n```\nreport = minus two, minus one, zero, one, two,\n```\n\n"
- "# 11. While 循环\n\n## 摘要\n\n与 `for` 循环类似，当你想多次重复执行相似类型的任务时，会用到 `while` 循环。`While`\
  \ 循环用于当你想要重复执行一行代码多次，直到满足某个条件时。下面是一个 `while` 循环示例，它将向控制台窗口写入 10 次：\n\n## While 循环详解\n\
  \n与 `for` 循环类似，当你想多次重复执行相似类型的任务时，会用到 `while` 循环。`While` 循环用于当你想要重复执行一行代码多次，直到满足某个条件时。下面是一个\
  \ `while` 循环示例，它将向控制台窗口写入 10 次：\n\n```\nint i = 0;\nwhile (i < 10) {\n    NSLog(@\"\
  i = %i\", i);\n    i++;\n}\n```\n\n这个 `while` 循环将产生如下输出：\n\n```\ni = 0\ni = 1\n\
  i = 2\ni = 3\ni = 4\ni = 5\ni = 6\ni = 7\ni = 8\ni = 9\n```\n\n上面的循环与第 10 章的 `for`\
  \ 循环功能相同，但请注意循环的各个部分位于不同的位置。你首先会注意到的是，在 `while` 循环中需要有一个计数器变量供其使用。你不能像之前那样直接将计数器变量放在循环体内部。所以你需要在使用\
  \ `while` 循环之前单独用一行代码来声明并赋值计数器变量。\n\n```\nint i = 0;\n```\n\n然后是 `while` 循环本身，它以\
  \ `while` 关键字开始。在 `while` 关键字后面的括号内是结束条件 `(i < 10)`。这意味着只要 `i` 的值小于 10，循环就会继续。\n\
  \n最后，有一个由花括号定义的代码块。包含在这些花括号中的代码将在每次循环时执行。你有一行代码 `NSLog(@\"i = %i\", i);` 用于写入日志。你还需要在此代码块中递增计数器变量：`i++;`。\n\
  \n**注意**\n\n记住在此处递增计数器变量非常重要。如果你不这样做，那么 `i` 将永远不会超过 10。循环将永远不会结束，这实际上会导致你的程序挂起，直到用户终止它。\n\
  \n\n\n### While 循环与数组\n\n现在，让我们重复第 10 章中的示例，该示例使用循环格式化数组中的数字列表。这是你在第 10 章中用过的数组和其他对象：\n\
  \n```\nNSArray *list = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\nNSMutableString *report\
  \ = [[NSMutableString alloc] init];\nNSNumberFormatter *formatter = [[NSNumberFormatter\
  \ alloc] init];\nformatter.numberStyle = NSNumberFormatterSpellOutStyle;\n```\n\n\
  你将执行与第 10 章相同的操作，但将改用 `while` 循环实现。\n\n```\nint i = 0;\nwhile(i < list.count) {\n\
  \    NSNumber *num = [list objectAtIndex:i];\n    NSString *spelledOutNum = [formatter\
  \ stringFromNumber:num];\n    [report appendString:spelledOutNum];\n    [report\
  \ appendString:@\", \"];\n    i++;\n}\n```\n\n上述操作是在遍历列表中的每个对象，并获取列表中与当前 `i` 值对应的索引所关联的数字引用。\n\
  \n接着，你使用数字格式化器获取数字的拼写字符串版本。最后，将这个拼写字符串值附加到可变字符串的末尾。以下是 `report` 的值：\n\n```\nreport\
  \ = minus two, minus one, zero, one, two,\n```\n\n"
- "# 12. Do While 循环\n\n**摘要**\n\n`Do while` 循环与 `for` 循环和 `while` 循环的用途相同。其语法有所不同，`do\
  \ while` 循环的显著特点是代码块至少会执行一次。这是因为结束条件直到循环末尾才会被评估。以下是使用 `do while` 循环计数到 10 的代码示例：\n\
  \n## Do While 循环的定义\n\n`Do while` 循环与 `for` 循环和 `while` 循环的用途相同。其语法有所不同，`do while`\
  \ 循环的显著特点是代码块至少会执行一次。这是因为结束条件直到循环末尾才会被评估。以下是使用 `do while` 循环计数到 10 的代码示例：\n\n```\n\
  int i = 0;\ndo{\n    NSLog(@\"i = %i\", i);\n    i++;\n}while (i <10);\n```\n\n\
  这个 `do while` 循环将输出以下结果：\n\n```\ni = 0\ni = 1\ni = 2\ni = 3\ni = 4\ni = 5\ni = 6\n\
  i = 7\ni = 8\ni = 9\n```\n\n上述循环与第 10 章中的 `for` 循环以及第 11 章中的 `while` 循环功能相同。`do\
  \ while` 循环的规范与 `while` 循环类似，但它们位于不同的代码行中。\n\n与 `while` 循环一样，你需要准备一个计数器变量。\n\n```\n\
  int i = 0;\n```\n\n然后是以 `do` 关键字开头的 `do while` 循环本身。紧跟在 `do` 关键字之后的是由花括号定义的代码块。每次循环时，花括号内的代码都会执行。这里有一行代码\
  \ `NSLog(@\"i = %i\", i);` 用于写入日志，同时你还在该代码块中递增计数器变量 `i++;`。\n\n条件 `(i < 10)` 位于代码块之后的\
  \ `while` 关键字之后。这意味着只要 `i` 的值小于 10，循环就会继续。\n\n> **注意：** 务必记得在此处递增计数器变量。如果不这样做，`i`\
  \ 将永远不会超过 10，循环将永远不会结束，这会导致程序挂起，直到用户终止它。\n\n### Do While 循环与数组\n\n现在，让我们重复第 10 章和第\
  \ 11 章中的示例，该示例使用循环格式化数组中的数字列表。这是你在第 10 章和第 11 章中用过的数组和其他对象：\n\n```\nNSArray *list\
  \ = @[@-2.0, @-1.0, @0.0, @1.0, @2.0];\nNSMutableString *report = [[NSMutableString\
  \ alloc] init];\nNSNumberFormatter *formatter = [[NSNumberFormatter alloc] init];\n\
  formatter.numberStyle = NSNumberFormatterSpellOutStyle;\n```\n\n你将改用 `do while`\
  \ 循环实现。\n\n```\nint i = 0;\ndo {\n    NSNumber *num = [list objectAtIndex:i];\n\
  \    NSString *spelledOutNum = [formatter stringFromNumber:num];\n    [report appendString:spelledOutNum];\n\
  \    [report appendString:@\", \"];\n    i++;\n}while(i < list.count);\n\nNSLog(@\"\
  report = %@\", report);\n```\n\n最终你会得到一个可变字符串，并将其输出到控制台日志中。输出结果如下：\n\n```\nreport\
  \ = minus two, minus one, zero, one, two,\n```\n\n"
- "# 13. For-Each 循环\n\n**摘要**\n\n`For-each` 循环是一种更具体的循环类型，只能用于 `NSArray` 和 `NSDictionary`\
  \ 等集合对象。当你需要遍历对象列表并对列表中的每个对象执行操作时，可以使用 `for` 循环。\n\n## For-Each 循环的定义\n\n`For-each`\
  \ 循环是一种更具体的循环类型，只能用于 `NSArray` 和 `NSDictionary` 等集合对象。当你需要遍历对象列表并对列表中的每个对象执行操作时，可以使用\
  \ `for` 循环。\n\n例如，以第 8 章中的数组为例：\n\n```\nNSArray *numbers = @[@-2, @-1, @0, @1, @2];\n\
  ```\n\n在第 8 章中，你使用了带块的枚举方法遍历列表并对每个数字求平方。你可以使用 `for` 循环作为枚举方法的替代方案。\n\n```\nfor (NSNumber\
  \ *num in numbers){\n    NSLog(@\"num ^ 2= %f\", [num floatValue] * [num floatValue]);\n\
  }\n```\n\n该循环以 `for` 关键字开头，后面是括号内的规范。规范以对象类型（`NSNumber`）和一个变量（`*num`）开头，该变量将提供对列表中当前对象的引用。\n\
  \n接下来，你可以看到关键字 `in`，后面跟着数组（`numbers`）。综合来看，你可以将其理解为“对于数组 `numbers` 中的每个数字 num，执行某些操作”。“某些操作”定义在循环第一部分后面的代码块中。它将遍历整个数组并对每个数字求平方，生成以下输出：\n\
  \n```\nnum ^ 2= 4.000000\nnum ^ 2= 1.000000\nnum ^ 2= 0.000000\nnum ^ 2= 1.000000\n\
  num ^ 2= 4.000000\n```\n\n### 使用 NSDictionary 的 For 循环\n\n字典比数组稍微复杂一些，因为字典维护了一个键和对象的列表。你可能会认为对字典使用\
  \ `for` each 循环会得到对象列表；但实际上，你只会得到字典键的列表。\n\n因此，如果你像下面这样对 `NSDictionary` 使用 `for`\
  \ each 循环：\n\n```\nNSDictionary *d1 = @{@\"one\": @1, @\"two\": @2, @\"three\":\
  \ @3};\nfor (id object in d1){\n    NSLog(@\"object = %@\", object);\n}\n```\n\n\
  你将得到如下列出所有键的输出：\n\n```\nobject = one\nobject = two\nobject = three\n```\n\n如果你想输出字典中的值，你需要向字典发送\
  \ `objectForKey:` 消息。\n\n```\nfor (id object in d1){\n    NSNumber *num = [d1 objectForKey:object];\n\
  \    NSLog(@\"num = %@\", num);\n}\n```\n\n这个 `for` 循环将打印出对象的值：\n\n```\nnum = 1\n\
  num = 2\nnum = 3\n```\n\n"
- "# 14. If 语句\n\n**摘要**\n\n当你希望根据条件的真假来决定是否执行代码时，可以使用 `if` 语句。为此，你需要评估一个使用关系运算符的表达式，以得到\
  \ `YES` 或 `NO` 的结果。如果表达式评估为真，则可以执行代码；否则可以忽略该代码。\n\n\n\n## If 语句的定义\n\n如果你想根据条件的真假来决定是否执行代码，就可以使用\
  \ if 语句。为此，你需要计算一个使用关系运算符的表达式，以得到“是”或“否”的结果。如果表达式计算结果为真，则执行代码；否则忽略该代码。\n\n使用 if\
  \ 语句需要 `if` 关键字、一个表达式以及一个代码块。\n\n```\nif(1 < 2){\n    NSLog(@\"That is true\");\n\
  }\n```\n\n该语句的意思是：如果 1 小于 2，则执行代码，将字符串“That is true”打印到控制台日志中。\n\n### else 关键字\n\
  \n你还可以使用 `else` 关键字定义一个备选操作。这提供了一种方式，让你可以根据所计算的表达式结果，执行两个操作中的一个。\n\n```\nif(1 <\
  \ 2){\n    NSLog(@\"That is true\");\n}\nelse{\n    NSLog(@\"Not true\");\n}\n```\n\
  \n### 嵌套 if-else\n\n每个 if 语句都可以包含嵌套的 if 语句。这为你提供了测试多个条件的方式。一般来说，最好将嵌套 if 语句限制在最多三层。以下是嵌套\
  \ if 语句的样子：\n\n```\nif(1 > 2){\n    NSLog(@\"True\");\n}\nelse{\n    if(3 > 4){\n\
  \        NSLog(@\"True\");\n    }\n    else{\n        NSLog(@\"Not True\");\n  \
  \  }\n}\n```\n\n## if 语句与变量\n\n通常，你会看到 if 语句与用于跟踪程序状态的变量一起使用。你可以在 if 语句的括号内将变量作为表达式的一部分，或者直接测试变量。\n\
  \n```\nBOOL isTrue = 1 == 2;\n\nif(isTrue){\n    NSLog(@\"isTrue = %@\", isTrue\
  \ ? @\"YES\" : @\"NO\");\n    NSLog(@\"That was a true statement.\");\n}\nelse{\n\
  \    NSLog(@\"isTrue = %@\", isTrue ? @\"YES\" : @\"NO\");\n    NSLog(@\"That was\
  \ not a true statement.\");\n}\n```\n\n在上面的代码中，你将表达式的结果赋值给了布尔变量 `isTrue`，然后稍后通过\
  \ if 语句对其进行测试。\n\n如果你亲自测试这段代码，在控制台日志中会看到以下内容：\n\n```\nisTrue = NO\nThat was not\
  \ a true statement.\n```\n\n"
- "# Switch 语句\n\nSwitch 语句用于根据整数值执行代码。要使 switch 语句工作，你需要定义一个层级变量，然后为预期的层级变量的每个可能值编写一个代码块。\n\
  \n## Switch 语句的定义\n\nSwitch 语句用于根据整数值执行代码。要使 switch 语句工作，你需要定义一个层级变量，然后为预期的层级变量的每个可能值编写一个代码块。\n\
  \n在本章中，假设你正在编写代码来帮助进行一些几何计算。你需要处理不同的形状，并希望计算每个形状的面积。你可以使用一个 `NSInteger` 类型的变量（如\
  \ `shape`）来跟踪你正在处理的形状类型。\n\n```\nNSInteger shape = 0;\n```\n\n`NSInteger shape`\
  \ 的每个值都对应一种形状类型。零可以是正方形，一可以是平行四边形，二可以是圆形。像 `shape` 这样的变量被称为层级变量，因为它们代表了可能的层级。\n\n\
  为了本示例的目的，你还需要一个变量来存储任何计算的结果，这就是为什么你有一个名为 `area` 的浮点数变量。\n\n```\nfloat area;\n```\n\
  \n### switch 关键字\n\n现在，让我们来介绍 switch 语句本身。要开始一个 switch 语句，你需要 `switch` 关键字，后面跟括号中的层级变量。同时，你应该使用花括号为\
  \ switch 语句创建一个代码块。\n\n```\nswitch (shape) {\n\n}\n```\n\n### case 关键字\n\n接下来，你可以定义与层级变量可能取到的每个值相关联的代码块。你使用\
  \ `case` 关键字将每个可能的值与一个代码块关联起来。\n\n```\nswitch (shape) {\n        case 0:{\n    \
  \        float length = 3;\n            area = length * length;\n            NSLog(@\"\
  Square area is %f\", area);\n            break;\n        }\n}\n```\n\n你上面看到的是 `case`\
  \ 关键字后跟你要测试的值，这里是 `0`。然后是冒号，接着是用花括号定义的代码块，当 `shape` 的值为 `0` 时，该代码块将被执行。\n\n### break\
  \ 关键字\n\n在上面代码块的末尾，你可以看到 `break` 关键字。这个关键字会将程序控制权返回给主程序，并跳出 case 语句。如果没有这个语句，那么一旦第一个\
  \ case 为真，后面的每一行代码都会被执行（switch 语句在找到真值后，会停止对层级变量的求值）。\n\n### 完整的 Switch 语句\n\n以下是包含多个\
  \ case 语句的 switch 语句样子：\n\n```\nswitch (shape) {\n    case 0:{\n        float length\
  \ = 3;\n        area = length * length;\n        NSLog(@\"Square area is %f\", area);\n\
  \        break;\n    }\n    case 1:{\n        float base = 16;\n        float height\
  \ = 24;\n        area = base * height;\n        NSLog(@\"Parallelogram area is %f\"\
  , area);\n        break;\n    }\n    default:{\n        area = -999;\n        NSLog(@\"\
  No Shape Specified\");\n        break;\n    }\n}\n```\n\n### 默认 case\n\n仔细观察上面的代码，你可以看到有一个\
  \ `default` 关键字。这个关键字用于定义一个默认 case，这是一种定义代码块的方式，当其他条件都不满足时，该代码块将被执行。因此，如果 `shape`\
  \ 的值恰好是 6 并且没有定义相应的代码块，你可以确保至少默认 case 中包含的代码会被执行。\n\n如果你运行本章的代码，在控制台日志中会看到以下内容：\n\
  \n```\nSquare area is 9.000000\n```\n\n"
- "# 定义类\n\n我在演示用于处理字符串、数字、数组和字典的 Objective-C 对象时，已经介绍过对象。对象是一种基本的面向对象编程模式。虽然你通常会直接使用已经为你设置好的\
  \ Foundation 对象，但通常你需要为你的应用自定义你自己的对象类型。\n\n## 类\n\n你可以在演示用于处理字符串、数字、数组和字典的 Objective-C\
  \ 对象时已经介绍过对象。**（注：此处英文原文有重复段落，译文按原文结构保留重复）** 类是用于创建对象的代码定义。编写类定义的主要目的是表达一个具有属性和行为的实体。\n\
  \n在编写类时，属性称为 properties，行为称为 methods。Properties 用于描述一个对象，而 methods 用于让对象执行一个动作。\n\
  \n定义类时需要完成两项重要任务：编写接口和编写实现。\n\n\n\n### 类接口\n\n使用类接口可以指定类名以及构成该类的属性和方法。以下是创建一个名为\
  \ `Project` 的类的方法：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Project\
  \ : NSObject\n\n@end\n```\n\n以 `#import` 开头的代码行导入了 Foundation 框架。每当您需要使用 `NSObject`\
  \ 或 `NSString` 这类 Objective-C 类时（几乎总是如此），都需要包含此框架。\n\n具体来说，您需要引用 `NSObject`，因为它将成为您的基类。基类是您派生类的起点，`NSObject`\
  \ 提供了使对象按预期工作所需的对象创建方法（例如 `alloc` 和 `init`）。\n\n在以 `@interface` 关键字开头的行中，您可以使用类名\
  \ `Project` 以及冒号后面的基类 `NSObject`。\n\n`@interface` 关键字必须与 `@end` 关键字配对使用。\n\n####\
  \ 属性前置声明\n\n属性需要在类接口中编写前置声明。这些声明位于 `@interface` 行和 `@end` 行之间的空间内。\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\n@interface Project : NSObject\n\n@property(strong)\
  \ NSString *name;\n\n@end\n```\n\n属性前置声明以 `@property` 关键字开头，后跟括号内的属性描述符。有关可使用的参数描述符列表，请参见表\
  \ 16-1。\n\n**表 16-1.** 参数描述符\n\n| 属性 | 描述 |\n| --- | --- |\n| `Readwrite` | 该属性需要同时包含\
  \ getter 和 setter 方法（默认值）。 |\n| `Readonly` | 该属性只需要 getter 方法（对象无法设置此属性）。 |\n| `strong`\
  \ | 该属性将具有强引用关系。 |\n| `weak` | 当目标对象被释放时，该属性将被设为 nil。 |\n| `assign` | 该属性仅使用赋值操作（用于基础数据类型）。\
  \ |\n| `Copy` | 该属性返回一个副本，并且必须实现 `NSCopying` 协议。 |\n| `retain` | setter 方法中会发送 retain\
  \ 消息。 |\n| `nonatomic` | 指定该属性是非原子性的（在访问时不会加锁）。 |\n\n属性前置声明的后两部分是数据类型和属性名。您可以将此前置声明理解为：定义了一个名为\
  \ `name` 的属性，其类型为 `NSString`，并且 `Project` 将与其建立强引用关系。\n\n**注意**  \n`strong`、`retain`\
  \ 和 `weak` 等术语与属性值的内存管理方式有关。`strong` 和 `retain` 都意味着您的类对象将始终持有对属性值的引用，从而保证在您需要期间该对象不会超出作用域。而属性描述符\
  \ `weak` 和 `assign` 则不提供此保证。\n\n#### 方法前置声明\n\n方法同样需要前置声明。属性用于描述对象，而方法则代表对象可以执行的操作。以下是向\
  \ `Project` 类添加前置声明的方法：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ Project : NSObject\n\n@property(strong) NSString *name;\n\n-(void)generateReport;\n\
  \n@end\n```\n\n方法前置声明以减号开头，后跟括号内的返回类型。此方法具有 `void` 返回类型，但您可以使用任何数据类型或类作为方法的返回类型。\n\
  \n之后是方法签名。当您看到一个包含参数的方法时，我会进一步讨论签名。以下是一个包含参数的方法示例：\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Project : NSObject\n\n@property(strong) NSString *name;\n\n-(void)generateReport;\n\
  \n-(void)generateReportAndAddThisString:(NSString *)string\n                   \
  \  andThenAddThisDate:(NSDate *)date;\n\n@end\n```\n\n在此参数示例中，您可以看到方法签名被分为两部分。每部分都有一个参数和一个由冒号分隔的参数描述符。在\
  \ Objective-C 中，方法签名是参数描述符和参数的集合。当您没有参数时（如第一个方法），只需使用一个参数描述符来描述该方法即可。\n\n### 实现类\n\
  \n定义类接口是定义类过程的第一步。下一步称为实现，因为您要在此处提供使类对象正常工作的代码实现。\n\n要开始实现一个类，请使用 `@implementation`\
  \ 关键字加上类名。\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\n@end\n```\n\
  \n第一行代码将 Project 的前置声明导入到此文件中，以便该类了解需要实现的内容。\n\n**注意**  \n虽然并非强制要求，但通常类接口和实现会分别编写在不同文件中。接口文件以\
  \ `.h` 扩展名结尾，有时称为头文件。实现文件以 `.m` 扩展名结尾，有时称为代码文件。\n\n实现以 `@implementation` 关键字开头，后跟类名\
  \ `Project`。实现以 `@end` 关键字结束。现在，您需要实现属性和方法。\n\n属性会自动为您实现，无需采取任何额外操作即可使属性生效。\n\n\
  #### 实现方法\n\n当您实现一个方法时，需要重复接口中的方法前置声明。但您需要添加一个代码块以及使方法执行特定操作的代码。\n\n```\n#import\
  \ \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n    NSLog(@\"\
  This is a report!\");\n}\n\n@end\n```\n\n当您实现包含参数的方法时，可以在代码中引用这些参数值。\n\n```\n#import\
  \ \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n    NSLog(@\"\
  This is a report!\");\n}\n\n-(void)generateReportAndAddThisString:(NSString *)string\n\
  \                     andThenAddThisDate:(NSDate *)date{\n    [self generateReport];\n\
  \    NSLog(@\"%@\", string);\n    NSLog(@\"Date: %@\", date);\n}\n\n@end\n```\n\n\
  \n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成高质量的中文。\n\n---\n\n\n##### 私有属性和方法\n\
  \n上述过程定义的都是公共属性和方法。这意味着其他对象可以引用这些属性并使用这些方法。从该类派生出的类也可以使用并覆写这些属性和方法。如果你希望阻止这种情况发生，使属性和方法成为私有，可以使用类扩展。\n\
  \n###### 类扩展\n\n类扩展提供了一种在实现文件中扩展类接口的方式。由于其他类会导入以 `.h` 扩展名结尾的接口文件（头文件），它们将无法访问在类扩展中使用前向声明定义的任何内容。\n\
  \n你可以像这样在实现文件中放置类扩展：\n\n```\n#import \"Project.h\"\n\n@interface Project()\n\n@property(strong)\
  \ NSArray *listOfTasks;\n\n-(void)generateAnotherReport;\n\n@end\n\n@implementation\
  \ Project\n\n-(void)generateReport{\n    NSLog(@\"This is a report!\");\n}\n\n-(void)generateReportAndAddThisString:(NSString\
  \ *)string\n                   andThenAddThisDate:(NSDate *)date{\n    [self generateReport];\n\
  \    NSLog(@\"%@\", string);\n    NSLog(@\"Date: %@\", date);\n}\n\n-(void)generateAnotherReport{\n\
  \    NSLog(@\"Another report!\");\n}\n\n@end\n```\n\n类扩展看起来像接口，但类名后面有空的括号。上述类扩展中的前向声明遵循与其他属性和方法前向声明相同的规则。类扩展必须以\
  \ `@end` 关键字结尾（每个 `@interface` 都需要一个匹配的 `@end`）。\n\n###### 局部实例变量\n\n有时你需要一些存储变量，这些变量不值得声明为属性。例如，有时你可能需要一个“计数器”或“进度”变量，或者一个维护日志的变量。这些变量是必需的，但它们并不能真正描述对象，因此不值得像属性一样对待。\n\
  \n在这种情况下，你可以使用实例变量。实例变量可以直接包含在类扩展中，就像这样：\n\n```\n#import \"Project.h\"\n\n@interface\
  \ Project() {\n    int counter;\n    NSString *log;\n}\n\n@property(strong) NSArray\
  \ *listOfTasks;\n\n-(void)generateAnotherReport;\n\n@end\n\n@implementation Project\n\
  \n-(void)generateReport{\n    NSLog(@\"This is a report!\");\n}\n\n-(void)generateReportAndAddThisString:(NSString\
  \ *)string\n                   andThenAddThisDate:(NSDate *)date{\n    [self generateReport];\n\
  \    NSLog(@\"%@\", string);\n    NSLog(@\"Date: %@\", date);\n}\n\n-(void)generateAnotherReport{\n\
  \    NSLog(@\"Another report!\");\n}\n\n@end\n```\n\n"
- "# 类方法\n\n**摘要**\n\n在第 16 章中，我们描述了如何使用属性和方法定义类。我们重点介绍的方法是实例方法。实例方法是只能用于对象的方法。当你想使用一个实例方法时，你向一个对象发送消息。\n\
  \n## 类方法的定义\n\n在第 16 章中，我们描述了如何使用属性和方法定义类。我们重点介绍的方法是实例方法。实例方法是只能用于对象的方法。当你想使用一个实例方法时，你向一个对象发送消息。\n\
  \n例如，如果你想向一个 `Project` 对象发送 `generateReport` 消息，你首先需要创建该对象，然后直接将消息发送给该对象。\n\n```\n\
  Project *p = [[Project alloc] init];\n[p generateReport];\n```\n\n类方法与实例方法类似，区别在于它们只能用于类。当你想使用一个类方法时，你必须向该类发送消息。如果你仔细看看上面的构造函数，你会发现你已经在使用一个名为\
  \ `alloc` 的类方法了。\n\n### 编写类方法\n\n如果你想创建自己的类方法，你需要从类接口开始。让我们为一个名为 `printTimeStamp`\
  \ 的类方法编写前向声明，该方法用于打印时间戳。你可以将其添加到上一章开始编写的类中。\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Project : NSObject\n\n@property(strong) NSString *name;\n\n-(void)generateReport;\n\
  \n-(void)generateReportAndAddThisString:(NSString *)string\n                   andThenAddThisDate:(NSDate\
  \ *)date;\n\n+(void)printTimeStamp;\n\n@end\n```\n\n这个方法看起来和你已经编写的实例方法类似，除了在返回类型前面有一个加号（`+`）。\n\
  \n下一步是实现这个方法，你必须在 `Project` 的实现中完成。请注意，此处省略了第 16 章的部分代码，以避免示例过长而分心。\n\n```\n#import\
  \ \"Project.h\"\n\n@implementation Project\n\n+(void)printTimeStamp{\n    NSLog(@\"\
  Timestamp: %@\", [NSDate date]);\n}\n\n@end\n```\n\n你需要再次使用加号将其定义为类方法，但编码模式与实例方法相同。\n\
  \n当你想使用 `printTimeStamp` 方法时，你直接将消息发送给这个类。你不需要先创建一个对象。\n\n```\n[Project printTimeStamp];\n\
  ```\n\n这条消息会将以下内容打印到控制台日志：\n\n`Timestamp: 2014-10-30 18:13:01 +0000`\n\n"
- "# 继承\n\n**摘要**\n\n当你想编写一个共享另一个类大部分属性和方法的新类时，可以使用继承。从另一个类继承的类继承了父类的所有属性和方法。\n\n\
  当你想要利用已经完成的工作，并通过添加更多属性和方法来自定义新类时，可以使用继承。这种模式实现了代码复用。\n\n你在第 16 章中看到了继承的例子：当你创建\
  \ `Project` 类时，你继承了 `NSObject`。这使得 `Project` 拥有了 `NSObject` 的所有方法和属性。\n\n当你将此技术应用于对象图时，会产生更有趣的应用。例如，假设现在你想创建一个与\
  \ `Project` 类似但有一些关键区别的新类。\n\n## 创建子类\n\n要创建一个新的子类，你可以遵循第 16 章中列出的相同模式。你需要定义一个接口和实现。这里的区别在于，你将选择\
  \ `Project` 而不是 `NSObject` 作为父类。\n\n```\n#import \"Project.h\"\n\n@interface SpecialProject\
  \ : Project\n\n@end\n```\n\n在上述接口中需要注意两点：你导入的是 `Project.h`（而不是之前的 `Foundation`），并且你现在在冒号后面的是\
  \ `Project` 而不是 `NSObject`，这表明 `Project` 是父类，而 `SpecialProject` 是你的子类。\n\n`SpecialProject`\
  \ 的实现很简单，与你为原始 `Project` 类所做的类似。\n\n```\n#import \"SpecialProject.h\"\n\n@implementation\
  \ SpecialProject\n\n@end\n```\n\n如果你现在使用 `SpecialProject`，它的行为会与 `Project` 完全一样。现在，你可以添加额外的属性和方法来自定义\
  \ `SpecialProject`。这被称为扩展类。\n\n\n\n## 扩展类\n\n要扩展一个类，你可以向子类中添加属性和方法。你的子类是 `SpecialProject`。现在，我们为你的\
  \ `SpecialProject` 类添加一个名为 `generateSpecialReport` 的方法。\n\n```\n#import \"Project.h\"\
  \n\n@interface SpecialProject : Project\n\n-(void)generateSpecialReport;\n\n@end\n\
  ```\n\n当然，接下来你需要实现这个方法。\n\n```\n#import \"SpecialProject.h\"\n\n@implementation\
  \ SpecialProject\n\n-(void)generateSpecialReport{\n    NSLog(@\"This is a special\
  \ report!\");\n}\n\n@end\n```\n\n扩展类的过程与你通常添加属性和方法的方式完全相同。这个方法之所以强大，在于你可以共享某一类对象中通用的方法代码。\n\
  \n### 重写方法\n\n你还可以做另一件事：重写父类中的方法。重写方法意味着你将编写一个与父类方法*签名完全相同*（即参数描述符的集合）的自有版本。由于你编写的方法代码不同，这意味着即使子类对象收到与父类相同的消息，它们的行为也会有所不同。\n\
  \n假设你想确保 `SpecialProject` 对象总能打印出特殊报告，即使发送的是来自父类 `Project` 的 `generateReport` 消息。\n\
  \n首先，你需要在 `SpecialProject` 的接口中编写 `generateReport` 方法。\n\n```\n#import \"Project.h\"\
  \n\n@interface SpecialProject : Project\n\n-(void)generateSpecialReport;\n-(void)generateReport;\n\
  \n@end\n```\n\n然后，你需要为 `generateReport` 编写一个新的实现，并让该方法向 `generateSpecialReport`\
  \ 发送一条消息。在这种情况下，你通常还会向父类（`super`）的该方法实现发送一条消息，这可以通过向 `super` 发送消息来实现。\n\n```\n#import\
  \ \"SpecialProject.h\"\n\n@implementation SpecialProject\n\n-(void)generateSpecialReport{\n\
  \    NSLog(@\"This is a special report!\");\n}\n\n-(void)generateReport{\n    [super\
  \ generateReport];\n    [self generateSpecialReport];\n}\n\n@end\n```\n\n#### 实例变量的可见性\n\
  \n在第 16 章中讨论实例变量（或 ivars）时，其使用场景非常直接。如果你的类需要数据存储，而这些数据并非描述对象的属性（因此不应该成为属性），那么你只需使用一个实例变量即可。\n\
  \n由于你将实例变量添加到了类扩展中，因此只有在该文件中实现的类才能使用它们。这些实例变量被认为是*私有的*，因为它们仅对编写它们的类可见。\n\n#####\
  \ 可见性级别\n\n当你在对象图中计划使用继承时，你可能希望实例变量具有不同的可见性级别。“可见性”指的是其他实体对该变量的访问权限。实例变量可以是私有的、受保护的或公有的。当你希望拥有不同的可见性级别时，你必须在接口中编写实例变量，该接口应位于头文件中，因为其他类导入的正是这个文件。\n\
  \n###### 私有实例变量\n\n私有实例变量只能在其被编写的类中使用。要使实例变量成为私有的，你需要在类接口中声明该实例变量。假设你想添加一些 `NSString`\
  \ 对象，作为所有 `Project` 类的日志。要为 `Project` 对象添加一个私有日志，你需要在 `Project` 接口中这样操作：\n\n```\n\
  #import <Foundation/Foundation.h>\n\n@interface Project : NSObject {\n    @private\
  \ NSString *log1;\n}\n\n@property(strong) NSString *name;\n-(void)generateReport;\n\
  -(void)generateReportAndAddThisString:(NSString *)string\n                   andThenAddThisDate:(NSDate\
  \ *)date;\n+(void)printTimeStamp;\n\n@end\n```\n\n你必须使用 `@private` 关键字来指定 `log1`\
  \ 将具有私有可见性。这意味着你可以在 `Project` 的方法中使用 `log1`，但不能在 `SpecialProject` 的方法中使用。\n\n######\
  \ 受保护的实例方法\n\n具有受保护可见性的实例变量可以被其所属类以及任何派生类中的方法访问。因此，如果你想让一个 `NSString` 日志变量既能被 `Project`\
  \ 使用，也能被 `SpecialProject` 使用，你需要使用 `@protected` 关键字使其受保护。\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Project : NSObject{\n    @private NSString *log1;\n    @protected NSString\
  \ *log2;\n}\n\n@property(strong) NSString *name;\n-(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString\
  \ *)string\n                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
  \n@end\n```\n\n###### 公有实例变量\n\n公有实例变量对其所属类以及所有派生类都是可用的。此外，其他对象可以直接引用公有实例变量。\n\n\
  > **注意：** 我在此讨论公有实例变量是为了内容的完整性，但通常不推荐以这种方式使用实例变量。相反，你应该定义属性来返回任何你想让其他对象访问的值。\n\n\
  要使一个实例变量成为公有的，你必须使用 `@public` 关键字。\n\n```\n#import <Foundation/Foundation.h>\n\n\
  @interface Project : NSObject{\n    @private NSString *log1;\n    @protected NSString\
  \ *log2;\n    @public NSString *log3;\n}\n\n@property(strong) NSString *name;\n\
  -(void)generateReport;\n-(void)generateReportAndAddThisString:(NSString *)string\n\
  \                   andThenAddThisDate:(NSDate *)date;\n+(void)printTimeStamp;\n\
  \n@end\n```\n\n要使用这个对象，你需要使用成员操作符 `->`。成员操作符是一种传统的 C 语言操作，可用于引用由指针所指向的结构体成员。以下是使用示例：\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"SpecialProject.h\"\n\nint main(int\
  \ argc, const char * argv[]){\n    @autoreleasepool {\n        SpecialProject *sp\
  \ = [[SpecialProject alloc]init];\n        NSString *tempLog = sp->log3;\n     \
  \   NSLog(@\"temp = %@\", tempLog);\n        return 0;\n    }\n}\n```\n\n"
- "# 19. 分类\n\n## 摘要\n\n分类用于在不使用继承的情况下扩展类。当你使用分类时，你可以在不声明父类的情况下向类添加属性和方法。\n\n## 分类定义\n\
  \n分类用于在不使用继承的情况下扩展类。当你使用分类时，你可以在不声明父类的情况下向类添加属性和方法。\n\n要定义一个分类，你需要添加一个接口和实现。你可以通过添加新的头文件和代码文件来实现，也可以直接将分类添加到你正在处理的代码文件中。\n\
  \n\n\n### 类别示例\n\n举个例子，假设你想给第 16 章中定义的`Project`类添加一个构造方法，用于初始化一个新的`Project`对象并同时为其赋值名称。你可以在正在编写代码的`main.m`文件中直接添加如下代码。\n\
  \n首先要做的是添加接口。\n\n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n\
  \n@interface Project(ProjectExtension)\n\n@end\n\nint main(int argc, const char\
  \ * argv[]){\n    @autoreleasepool {\n        return 0;\n    }\n}\n```\n\n类别接口看起来与类接口类似，但遵循略有不同的格式。这些接口以`@interface`关键字开头，后跟原始类名。类名之后，括号内是类别的名称。\n\
  \n你在类别接口中放置前向声明。由于你需要一个能设置名称的初始化器，因此需要在类别接口中添加如下内容：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
  \ *)aName;\n@end\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
  \ {\n        return 0;\n    }\n}\n```\n\n下一步是实现新方法，为此你必须编写类别实现。类别实现遵循与类别接口相同的模式。\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n\n@interface Project(ProjectExtension)\n\
  -(id)initWithName:(NSString *)aName;\n@end\n\n@implementation Project (ProjectExtension)\n\
  \n@end\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n   \
  \     return 0;\n    }\n}\n```\n\n最后，你需要像实现类方法一样实现这个新方法。\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
  \ *)aName;\n@end\n\n@implementation Project (ProjectExtension)\n-(id)initWithName:(NSString\
  \ *)aName{\n    self = [super init];\n    if (self) {\n        self.name = aName;\n\
  \    }\n    return self;\n}\n@end\n\nint main(int argc, const char * argv[]){\n\
  \    @autoreleasepool {\n        return 0;\n    }\n}\n```\n\n现在你已经设置好类别，可以在 main\
  \ 函数内部直接使用这个初始化器来创建并初始化新的`Project`类对象了。\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Project.h\"\n\n@interface Project(ProjectExtension)\n-(id)initWithName:(NSString\
  \ *)aName;\n@end\n\n@implementation Project (ProjectExtension)\n-(id)initWithName:(NSString\
  \ *)aName{\n    self = [super init];\n    if (self) {\n        self.name = aName;\n\
  \    }\n    return self;\n}\n@end\n\nint main(int argc, const char * argv[]){\n\
  \    @autoreleasepool {\n        Project *p = [[Project alloc] initWithName:@\"\
  ThisNewProject\"];\n        NSLog(@\"p.name = %@\", p.name);\n        return 0;\n\
  \    }\n}\n```\n\n如果现在编译并运行这个项目，日志将打印出：\n\n```\np.name = ThisNewProject\n```\n\n"
- "# 20. 块（Blocks）\n\n## 摘要\n\n块是一种定义代码块的方式，你可以在以后使用它。块与方法或函数有很多相似之处，它们都可以接受参数并返回值。有时人们将块称为匿名函数，因为它们是不附着于任何实体的函数。\n\
  \n## 块的定义\n\n块是一种定义代码块的方式，你可以在以后使用它。块与方法或函数有很多相似之处，它们都可以接受参数并返回值。有时人们将块称为匿名函数，因为它们是不附着于任何实体的函数。\n\
  \n块与众不同的一个特点是，它们与程序的其余部分编写在相同的作用域内，因此你无需类定义即可添加块。块还具有其他一些非常有用的特性。虽然块不需要附着于对象，但块可以被当作对象来处理。这意味着你可以编写一组块，然后将它们存储在数据集合中。\n\
  \n块还会复制声明块时作用域内所有变量的值。这一特性使得块能够捕获状态，并在将来使用该状态，即使在块执行时原始变量已经超出作用域。\n\n### 定义块\n\n\
  举个例子，我们来编写一个块，它接受一个浮点数作为参数，并返回其平方后的浮点数结果。将这个块命名为`squareThis`。首先需要声明块。这类似于声明数据类型或对象，但有一些差异，使你可以利用块类似函数的行为。\n\
  \n```\nfloat (^squareThis)(float);\n```\n\n块声明以`float`返回类型开头。这意味着当你使用这个块时，将得到一个浮点数返回。\n\
  \n块声明的下一部分是块名`squareThis`，前面是脱字符（`^`）。整个名称括在圆括号内。\n\n最后，括号内是一组参数类型。如果有多个参数类型，则列表必须用逗号分隔。代码行以分号结束。\n\
  \n### 赋值块\n\n你可以使用赋值运算符（`=`）将代码块赋值给刚刚声明的块。当你将块代码赋值给块变量时，需要使用脱字符并声明变量名。还需要包含用花括号括起来的代码作用域。\n\
  \n```\nsquareThis = ^(float x){\n    return x * x;\n};\n```\n\n这个块将接受提供的数字，将数字乘以自身，然后返回结果。\n\
  \n### 使用块\n\n当你准备好执行代码时，可以像调用函数一样调用块。以下是使用`squareThis`的方法：\n\n```\nfloat result\
  \ = squareThis(4);\nNSLog(@\"result = %f\", result);\n```\n\n这将在控制台日志中打印出以下输出：\n\
  \n```\nresult = 16.000000\n```\n\n### 复制作用域内的变量\n\n块会复制声明块时当前作用域内每个变量的值。这意味着块可以保存周围变量的状态，以便在以后执行块时使用，无论变量是否仍在作用域内。\n\
  \n下面是一个名为`multiplyThese`的块的示例，它接受两个数字并将它们相乘，返回一个浮点数结果。这个块需要两个参数，我们将同时定义并赋值该块。请注意，在`multiplyThese`块附近还定义了一个字符串。\n\
  \n```\nNSString *title = @\"乘法块执行\";\n\nfloat (^multiplyThese)(float, float) = ^(float\
  \ x, float y){\n    NSLog(title);\n    return x * y;\n};\n```\n\n在返回结果之前，`multiplyThese`块会打印出它从上下文中捕获的字符串值。要使用此块，可以这样做：\n\
  \n```\nNSLog(@\"multiplyThese(3,4) = %f\", multiplyThese(3,4));\n```\n\n这将产生以下输出：\n\
  \n```\n乘法块执行\nmultiplyThese(3,4) = 12.000000\n```\n\n\n\n### 作为属性的 Block\n\n尽管 Block\
  \ 不像类那样需要实体，但你仍然可以使用 Block 来增强对象的灵活性。通过将 Block 作为属性添加到对象中，你可以提供一个接口，让客户端能够将自定义行为注入到你的对象中。\n\
  \n#### Block 的前向声明\n\n由于 Block 的处理方式与对象类似，因此你可以将 Block 用作属性。为此，你需要从类接口（无论是公开接口还是私有类扩展）开始。下面演示了如何将`customReport`\
  \ Block 添加到最初在第 16 章中定义的`Project`类中：\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Project : NSObject{\n    @private NSString *log1;\n    @protected NSString\
  \ *log2;\n    @public NSString *log3;\n}\n\n@property(strong) NSString *name;\n\
  @property (copy) void (^makeCustomReport)(NSString *title);\n\n-(void)generateReport;\n\
  -(void)generateReportAndAddThisString:(NSString *)string\n                   andThenAddThisDate:(NSDate\
  \ *)date;\n+(void)printTimeStamp;\n\n@end\n```\n\n你需要使用`copy`属性描述符，因为你需要 Block 及其所有作用域变量被正确拷贝和保留。作为类的作者，接下来需要确定何时执行这个\
  \ Block，同时要记住，你永远无法提前预知 Block 中会包含什么代码。\n\n#### 在类中使用 Block\n\n对于这个例子来说，`generateReport`方法看起来是一个适合执行\
  \ Block 的位置。你需要进入`Project`类的实现部分，找到`generateReport`方法并添加这个 Block 调用。\n\n```\n#import\
  \ \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n    NSLog(@\"\
  This is a report!\");\n    self.makeCustomReport(@\"Custom Project Report Title\"\
  );\n}\n\n@end\n```\n\n如果观察上面的加粗代码，你会发现使用参数 Block 与使用其他 Block 类似，唯一的区别是这里使用了`self`关键字来引用该\
  \ Block。\n\n#### 分配 Block\n\n这种模式真正强大之处在于，即使你不确切知道某个行为是什么，或者该行为会随时间变化，你仍然可以设立一种方式来执行该行为。\n\
  \n要使它生效，客户端需要为 Block 赋值，并为你实际定义该行为。你可以在示例的主函数中完成此操作。\n\n```\nProject *p =[[Project\
  \ alloc]init];\np.makeCustomReport = ^(NSString* title){\n    NSLog(@\"%@\", title);\n\
  \    NSLog(@\"This is a custom report requested by the author\");\n    NSLog(@\"\
  Say This\");\n    NSLog(@\"Say That\");\n    NSLog(@\"Say The Other Thing\");\n\
  };  \n[p generateReport];\n```\n\n你需要为示例发送`generateReport`消息；发送后，你将得到以下输出：\n\n```\n\
  This is a report!\nCustom Project Report Title\nThis is a custom report requested\
  \ by the author\nSay This\nSay That\nSay The Other Thing\n```\n\n"
- '# 21. 键值编码


  概要


  通常，当你想获取或设置对象中的属性值时，你使用点符号来获取对属性的引用以更改值。然而，通过键值编码，你可以使用字符串键来间接存储和检索属性值。需要归档的应用程序需要这种功能，以便应用能够从归档文件中检索对象数据。


  ## 键值编码定义


  通常，当你想获取或设置对象中的属性值时，你使用点符号来获取对属性的引用以更改值。然而，通过键值编码，你可以使用字符串键来间接存储和检索属性值。需要归档的应用程序需要这种功能，以便应用能够从归档文件中检索对象数据。


  ### 设置属性值


  你可以使用键值编码来设置属性值。要设置属性值，你必须使用`setValue:forKey:`消息，并提供新的属性值以及该属性的`NSString`名称。


  ```

  [p setValue:@"New Project" forKey:@"name"];

  ```


  ### 检索属性值


  要使用键值编码检索属性值，你可以直接向对象发送`valueForKey`消息。该消息需要以`NSString`格式的属性名称作为参数。下面演示了如何从`Project`对象中检索`name`属性值：


  ```

  NSString *retrievedName = [p valueForKey:@"name"];

  ```


  这适用于任何类型的对象，包括数据集合对象和自定义对象。现在，你可以使用`NSLog`函数将这个值打印到日志中。


  ```

  NSLog(@"retrievedName = %@", retrievedName);

  ```


  如果 Project 的名称是 New Project，执行上述代码你将得到以下输出：


  ```

  retrievedName = New Project

  ```


  '
- "# 22. 键值观察\n\n概要\n\n键值编码的应用之一是实现观察者模式。当你希望一个对象在另一个对象的状态发生变化时收到通知时，就会使用观察者模式。在 Objective-C\
  \ 中，这种模式是通过键值观察来实现的。\n\n## 键值观察定义\n\n键值编码的应用之一是实现观察者模式。当你希望一个对象在另一个对象的状态发生变化时收到通知时，就会使用观察者模式。在\
  \ Objective-C 中，这种模式是通过键值观察来实现的。\n\n要看到一个清晰的键值观察示例，你至少需要两个对象。一个对象将被观察，另一个对象则进行观察。在这个例子中，假设你有两种类型的对象：一个`Project`对象和一个`Task`对象。`Project`对象维护着一个`Task`对象的列表。当`Task`对象的状态发生变化时（例如，当任务被标记为完成时），项目对象需要得到通知。\n\
  \n\n\n## 项目与任务对象图\n\n在实现键值观察之前，我们先了解这个对象图。为了便于说明，`Project` 类已做了简化，同时我添加了一个 `Task`\
  \ 类的定义。对象图将在 `main.m` 文件中建立。\n\n以下是 `Project` 类的接口：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Task.h\"\n\n@interface Project : NSObject\n@property(strong) NSString\
  \ *name;\n@property(strong) NSMutableArray *listOfTasks;\n-(void)generateReport;\n\
  @end\n```\n\n以下是 `Project` 类的实现：\n\n```\n#import \"Project.h\"\n\n@implementation\
  \ Project\n-(void)generateReport{\n    NSLog(@\"Report for %@ Project\", self.name);\n\
  \    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL\
  \ *stop) {\n        [obj generateReport];\n    }];\n}\n@end\n```\n\n以下是 `Task` 类的接口：\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@interface Task : NSObject\n@property(strong)\
  \ NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n@end\n\
  ```\n\n以下是 `Task` 类的实现：\n\n```\n#import \"Task.h\"\n\n@implementation Task\n-(void)generateReport{\n\
  \    NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\"\
  );\n}\n@end\n```\n\n最后，在 `main.m` 中像这样设置对象图：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Project.h\"\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
  \ {\n        Project *p = [[Project alloc]init];\n        p.listOfTasks = [[NSMutableArray\
  \ alloc]init];\n        p.name = @\"Cook Dinner\";\n        Task *t1 = [[Task alloc]init];\n\
  \        t1.name = @\"Choose Menu\";\n        [p.listOfTasks addObject:t1];\n  \
  \      Task *t2 = [[Task alloc]init];\n        t2.name = @\"Buy Groceries\";\n \
  \       [p.listOfTasks addObject:t2];\n        Task *t3 = [[Task alloc]init];\n\
  \        t3.name = @\"Prepare Ingredients\";\n        [p.listOfTasks addObject:t3];\n\
  \        Task *t4 = [[Task alloc]init];\n        t4.name = @\"Cook Food\";\n   \
  \     [p.listOfTasks addObject:t4];\n        return 0;\n    }\n}\n```\n\n这会给你一个名为\
  \ `Cook Dinner` 的 `Project` 对象，它包含四个任务。现在你可以实施键值观察了。\n\n### 实施键值观察\n\n你希望当 `Task`\
  \ 对象的状态发生变化时，`Project` 对象能得到通知。因此，如果一个 `Task` 对象被标记为完成，那么 `Project` 对象就会收到通知。使用键值观察需要三个步骤：\n\
  \n*   向每个被观察的对象发送 `addObserver:forKeyPath:options:context:` 消息。\n*   在观察者对象的类定义中重写\
  \ `observeValueForKeyPath:ofObject:change:content:` 方法。\n*   在观察者对象的类定义中重写 `dealloc`\
  \ 方法，并移除观察者引用。\n\n#### 添加观察者\n\n向 `Project` 负责的每个 `Task` 发送此消息的最简单方法是使用 `listOfTasks`\
  \ 的枚举方法：\n\n```\n[p.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger\
  \ idx, BOOL *stop) {\n    [obj addObserver:p\n              forKeyPath:@\"done\"\
  \n                 options:NSKeyValueObservingOptionNew\n                 context:nil];\n\
  }];\n```\n\n这段代码可以放在 `main.m` 文件中，在所有 `Task` 对象都添加到 `Project` 对象之后。`AddObserver`\
  \ 参数描述符后的第一个参数是观察者对象。下一个参数是键路径，在这里设置你想要观察的属性的键。接着是一些你可以设置的选项；你可以选择 `NSKeyValueObservingOptionNew`\
  \ 来跟踪属性值的最新变化。\n\n> **注意：** 你也可以选择 `NSKeyValueObservingOptionOld` 来获取之前的属性值，而不是像上面那样获取最新值。\n\
  \n#### 观察值的变化\n\n要在属性值发生变化时收到通知，观察者对象需要在其类定义中重写一个方法。你在这里编写代码来响应变化。以下是在 `Project.m`\
  \ 实现文件中执行此操作的示例：\n\n```\n#import \"Project.h\"\n\n@implementation Project\n-(void)observeValueForKeyPath:(NSString\
  \ *)keyPath\n                     ofObject:(id)object\n                       change:(NSDictionary\
  \ *)change\n                      context:(void *)context{\n    if([keyPath isEqualToString:@\"\
  done\"]){\n        NSNumber *updatedStatus = [change objectForKey:@\"new\"];\n \
  \       BOOL done = [updatedStatus boolValue];\n        NSLog(@\"Task '%@' is now\
  \ %@\", [object name], done ? @\"DONE\" : @\"IN PROGRESS\");\n    }\n}\n@end\n```\n\
  \n> **注意：** 上述代码将添加到你本章开头添加的代码中。\n\n每当你正在观察的 `Task` 对象改变其状态时，此方法都会执行。发生这种情况时，你首先需要测试以确保你期望的属性（`done`）确实发生了改变。你需要这样做，因为此方法可以用于各种类型的通知。\n\
  \n在下一行代码中，你从提供的 `NSDictionary` 变化中提取出属性的 `NSNumber` 版本，然后将其转换为你期望的 `BOOL` 类型。最后，你向控制台输出报告，报告任务的更新状态。\n\
  \n在测试这段代码之前，你需要进行清理工作。\n\n#### 注销观察者\n\n你需要确保观察者对象会遍历并停止观察每个对象，因为观察者对象很快就会被删除。执行此任务的最佳位置是在\
  \ `dealloc` 方法中。每个对象在被从程序中移除之前都会执行 `dealloc` 方法，因此这是进行此类清理工作的好时机。\n\n以下是在 `Project.m`\
  \ 实现文件中编写 `dealloc` 方法的方式：\n\n```\n-(void)dealloc{\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx, BOOL *stop) {\n        [obj removeObserver:self\n       \
  \          forKeyPath:@\"done\"];\n    }];\n}\n```\n\n这将遍历 `listOfTasks` 数组，并从每个对象中移除观察者。\n\
  \n#### 测试观察者\n\n要测试这一点，只需更改某些 `Task` 对象的 `done` 属性。每次这样做时，你都会看到报告写入日志。例如，假设你在 `main.m`\
  \ 中这样做：\n\n```\nt4.done = YES;\nt4.done = NO;\nt2.done = YES;\nt1.done = NO;\n```\n\
  \n每次状态发生变化时，你的 `Project` 对象都会收到通知，这会产生以下日志输出：\n\n```\nTask 'Cook Food' is now DONE\n\
  Task 'Cook Food' is now IN PROGRESS\nTask 'Buy Groceries' is now DONE\nTask 'Choose\
  \ Menu' is now IN PROGRESS\n```\n\n"
- "# 协议\n\n## 摘要\n\n协议用于独立于类定义一组方法和属性。任何类都可以采纳协议，这意味着该类实现了协议中定义的属性和方法。实际上，协议定义了一个契约，类可以同意履行该契约。当一个类采纳协议时，你可以确信该类已经实现了协议中的属性和方法。\n\
  \n## 协议概述\n\n协议用于独立于类定义一组方法和属性。任何类都可以采纳协议，这意味着该类实现了协议中定义的属性和方法。实际上，协议定义了一个契约，类可以同意履行该契约。当一个类采纳协议时，你可以确信该类已经实现了协议中的属性和方法。\n\
  \n\n\n### 定义协议\n\n要使用协议，必须首先定义协议。使用 `@protocol` 关键字开始定义协议。你可以将其包含在与协议相关联的类所在的同一文件中，也可以将协议放在一个单独的头文件中。如果你想为上一章中编写的\
  \ `Task` 类定义一个协议，可以这样做：\n\n```\n#import <Foundation/Foundation.h>\n@class Task;\n\
  @protocol TaskDelegate <NSObject>\n@optional\n-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;\n\
  @end\n@interface Task : NSObject\n@end\n```\n\n协议名称跟在 `@protocol` 关键字后面，尖括号中的内容是要继承的协议。`NSObject`\
  \ 是所有 `NSObject` 类必须遵循的协议。继承一个协议类似于继承一个类，但现在意味着采用你定义的协议的类，除了要实现继承协议中定义的方法之外，还要负责你定义的方法。\n\
  \n协议定义以 `@end` 关键字结束。位于 `@protocol` 和 `@end` 之间的所有方法和属性，都是类在采用该协议时需要实现的内容。\n\n注意：上面需要用到\
  \ `@class` 关键字，是因为在下面定义 `Task` 类之前，你已经在协议中引用了它。`@class` 提供了一种在不使用接口的情况下引用类的方式。\n\
  \n#### 可选与必需的方法和属性\n\n协议方法默认是必需的。不过，你可以将某些方法指定为可选的。可选方法用于功能存在但并非关键的情况。要标记方法为可选，请使用\
  \ `@optional` 关键字。在 `@optional` 关键字之后出现的每个属性和方法都将被视为可选。\n\n使用 `@required` 关键字将方法和属性标记为必需。之后的所有方法和属性都将被视为必需。\n\
  \n#### 采用协议\n\n你可以在类接口中父类后面的尖括号里包含协议名称，以此指示某个类将采用该协议。如果一个类要采用多个协议，则必须在尖括号内提供以逗号分隔的协议名称列表。\n\
  \n如果你想让 `Project` 采用 `TaskDelegate` 协议，可以像这样在 `Project` 接口中采用该协议：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"Task.h\"\n@interface Project : NSObject <TaskDelegate>\n\
  @property(strong) NSString *name;\n@property(strong) NSMutableArray *listOfTasks;\n\
  -(void)generateReport;\n@end\n```\n\n一旦采用 `TaskDelegate` 协议，就表示你同意实现 `TaskDelegate`\
  \ 中的方法和属性。如果现在尝试构建项目，你会收到一条警告。接下来要做的就是实现 `TaskDelegate` 中定义的方法。\n\n#### 实现协议方法\n\
  \n实现协议方法与实现其他方法完全相同。你需要在采用该协议的类的实现中实现这些协议方法。\n\n对于这个例子，你需要在 `Project` 类的实现中添加这个方法：\n\
  \n```\n#import \"Project.h\"\n@implementation Project\n-(void)thisTask:(Task *)task\
  \ statusHasChangedToThis:(BOOL)done{\n    NSLog(@\"Task '%@' is now %@\", task.name,\
  \ done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n@end\n```\n\n你还不能测试这段代码，因为你还需要添加代码，让\
  \ `Task` 对象能够使用这个协议。这属于下一章将要介绍的委托设计模式的一部分。\n\n"
- "# 委托\n\n摘要：委托是一种设计模式，其中一个对象向另一个对象请求帮助。协议是委托的重要组成部分，因为协议定义了对象将如何获得帮助。\n\n## 委托的定义\n\
  \n委托是一种设计模式，其中一个对象向另一个对象请求帮助。协议是委托的重要组成部分，因为协议定义了对象将如何获得帮助。\n\n委托的工作方式是：定义一个协议，列出某个对象需要帮助的所有方法和属性。另一个对象称为委托，它通过采用并实现协议方法来提供所需的帮助。对象通过向其委托发送消息来请求帮助。\n\
  \n### 定义委托协议\n\n假设你想在包含 `Project` 对象和 `Task` 对象的对象图中实现委托。在你的对象图中，`Task` 对象可能需要从\
  \ `Project` 对象获得帮助。例如，当某个 `Task` 的状态被标记为“完成”时，该任务可能不知道下一步该做什么。如果 `Project` 能够充当\
  \ `Task` 的委托，那么 `Task` 就可以向 `Project` 请求帮助。\n\n要实现这一点，你首先需要为 `Task` 定义一个协议，明确 `Task`\
  \ 需要帮助的方式。幸运的是，你已经在上一章中完成了这一步。\n\n```\n#import <Foundation/Foundation.h>\n@class\
  \ Task;\n@protocol TaskDelegate <NSObject>\n@optional\n-(void)thisTask:(Task *)task\
  \ statusHasChangedToThis:(BOOL)done;\n@end\n@interface Task : NSObject\n@property(strong)\
  \ NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n@end\n\
  ```\n\n该协议名为 `TaskDelegate`（因为你用这个协议来定义委托如何提供帮助）。`thisTask:statusHasChangedToThis:`\
  \ 是委托可以用来提供帮助的方法。\n\n### 向委托发送消息\n\n当 `Task` 对象需要帮助时，它们可以向委托发送消息。由于你希望在 `Task` 状态发生变化时触发此操作，可以通过为\
  \ `Task` 的 `done` 属性编写自定义属性访问器来实现。\n\n注意：在第 16 章中，你声明了属性并让它们由自动生成的 getter 和 setter\
  \ 来支持。在某些情况下，你可能希望自己编写 getter 和 setter。\n\n你可以在 `Task` 的 `done` setter 方法中直接发送消息。\n\
  \n```\n#import \"Task.h\"\n@implementation Task\n-(void)generateReport{\n    NSLog(@\"\
  Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\");\n}\nBOOL\
  \ _done;\n-(void)setDone:(BOOL)done{\n    _done = done;\n    [self.delegate thisTask:self\
  \ statusHasChangedToThis:done];\n}\n-(BOOL)done{\n    return _done;\n}\n@end\n```\n\
  \n在 setter 中，你可以看到正在向委托发送消息。你的 `delegate` 可以实现该方法来响应 `done` 属性更改的事件。\n\n你可能会注意到的另一件事是，你也编写了\
  \ getter。即使不需要在 getter 中添加任何新代码，当你决定实现 setter 或 getter 中的任意一个时，必须手动实现两者。\n\n\n\n\
  ### 分配委托对象\n\n下一步是分配委托对象。在本例中，可以在 `main.m` 文件中完成这一操作。你只需将项目对象赋值给每个任务的 `delegate`\
  \ 属性即可。\n\n```\nProject *p = [[Project alloc]init];\np.listOfTasks = [[NSMutableArray\
  \ alloc]init];\np.name = @\"Cook Dinner\";\n\nTask *t1 = [[Task alloc]init];\nt1.name\
  \ = @\"Choose Menu\";\nt1.delegate = p;\n[p.listOfTasks addObject:t1];\n\nTask *t2\
  \ = [[Task alloc]init];\nt2.name = @\"Buy Groceries\";\n[p.listOfTasks addObject:t2];\n\
  t2.delegate = p;\n\nTask *t3 = [[Task alloc]init];\nt3.name = @\"Prepare Ingredients\"\
  ;\n[p.listOfTasks addObject:t3];\nt3.delegate = p;\n\nTask *t4 = [[Task alloc]init];\n\
  t4.name = @\"Cook Food\";\n[p.listOfTasks addObject:t4];\nt4.delegate = p;\n```\n\
  \n现在，当你为某个任务的 `done` 属性赋予不同值时，`Project` 委托对象将收到通知。在上一章中，你已经采用了 `TaskDelegate` 协议并实现了协议方法\
  \ `-(void)thisTask:(Task *)task statusHasChangedToThis:(BOOL)done;`。\n\n当你像这样设置\
  \ `Task` 对象的 `done` 属性时：\n\n```\nt4.done = YES;\n```\n\n你在 `Project` 实现中编写的协议方法\
  \ `thisTask:statusHasChangedToThis:` 将被执行。请记住，这是你在上一章中编写的代码：\n\n```\n-(void)thisTask:(Task\
  \ *)task statusHasChangedToThis:(BOOL)done{\n    NSLog(@\"Task '%@' is now %@\"\
  , task.name, done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n```\n\n该方法将在控制台日志中生成如下输出：\n\
  \n```\nTask 'Cook Food' is now DONE\n```\n\n"
- "# 25. 单例模式\n\n摘要\n\n单例模式是一种设计模式，它确保一个类只能有一个实例。通常，当你定义一个类时，你期望使用该类的多个实例。但在某些设计中，这种做法是没有意义的。\n\
  \n## 单例模式定义\n\n单例模式是一种设计模式，它确保一个类只能有一个实例。通常，当你定义一个类时，你期望使用该类的多个实例。但在某些设计中，这种做法是没有意义的。\n\
  \n例如，一个应用程序可能只需要一个对文件系统的引用（因为只有一个文件系统）。或者，应用程序有一个需要保持同步的数据模型，因此你希望确保只有一个类的实例可用。\n\
  \n要实现单例模式，你需要创建一种特殊类型的构造方法，然后只使用这个构造方法来获取单例对象的引用。\n\n### 单例接口\n\n第一步是编写接口代码。假设你要创建一个名为\
  \ `AppSingleton` 的类，它将作为你的单例。以下是接口的编写方式：\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface AppSingleton : NSObject\n\n+ (AppSingleton *)sharedInstance;\n\n@end\n\
  ```\n\n上述代码是一个返回 `AppSingleton` 实例的类方法。\n\n### 单例实现\n\n要实现这个单例，你需要一个静态变量以及你在接口中定义的类方法\
  \ `sharedInstance` 的具体实现。\n\n```\n#import \"AppSingleton.h\"\n\n@implementation\
  \ AppSingleton\n\nstatic AppSingleton *singletonInstance = nil;\n\n+ (AppSingleton\
  \ *)sharedInstance{\n    @synchronized(self){\n        if (singletonInstance ==\
  \ nil)\n            singletonInstance = [[self alloc] init];\n        return(singletonInstance);\n\
  \    }\n}\n\n@end\n```\n\n静态实例是一个名为 `singletonInstance` 的 `AppSingleton` 类型变量，初始设置为\
  \ nil。在 `sharedInstance` 方法中，你检查 `singletonInstance`；如果它为 nil，则创建一个新实例。无论哪种情况，你都将这个实例返回给调用者。\n\
  \n该方法中的代码被 `@synchronized(self)` 块包含。这用于锁定代码，使得同一时间只有一个线程可以使用这些代码行。这确保了即使有多个线程，你也只会拥有这个单例的一个实例。\n\
  \n### 引用单例\n\n当你需要一个单例对象时，必须使用返回该实例的方法。这也就是你编写的方法。\n\n如果你想使用 `AppSingleton` 类，可以这样做：\n\
  \n```\nAppSingleton *ap = [AppSingleton sharedInstance];\n```\n\n这用于替代通常创建对象时使用的\
  \ `alloc` 和 `init` 模式。你可以从应用程序中的任何类或文件中执行此操作，每一个都会得到该类的同一个实例。唯一的注意事项是，你必须使用单例的构造方法；虽然你仍然可以使用\
  \ `alloc` 和 `init`，但这样做会破坏这种模式，因为这些方法仍然可以创建多个对象，而你创建的构造方法则只能创建一个对象。\n\n"
- "# 26. 错误处理\n\n摘要\n\n当程序遇到意外错误时，它们可能会行为异常或完全停止工作。理想情况下，程序员应该在程序投入使用之前发现并修复所有 bug，但在某些情况下，程序员无法完全掌控整个局面。例如，当程序需要的资源（如文件或网站）不存在时，就可能会发生错误。\n\
  \n## 错误处理定义\n\n当程序遇到意外错误时，它们可能会行为异常或完全停止工作。理想情况下，程序员应该在程序投入使用之前发现并修复所有 bug，但在某些情况下，程序员无法完全掌控整个局面。例如，当程序需要的资源（如文件或网站）不存在时，就可能会发生错误。\n\
  \n处理这类情况的最佳实践是向程序添加错误处理。这意味着当错误发生时，程序可以恢复或优雅地关闭。`NSError` 是程序员用来处理错误的 Foundation\
  \ 类。\n\n\n\n## NSError\n\n`NSError`经常在涉及文件操作时使用。许多 Foundation 类使用`NSError`对象来帮助处理错误。其模式是：声明一个`NSError`对象，在通过引用传递之前将其设置为`nil`。以下是`NSString`方法从文件内容创建字符串时的工作方式：\n\
  \n```\nNSError *error = nil;\nNSString *file = @\"/Users/Shared/array.txt\";\nNSString\
  \ *content = [NSString stringWithContentsOfFile:file\n                         \
  \      encoding:NSStringEncodingConversionAllowLossy\n                         \
  \                   error:&error];\n```\n\n在`error`参数前面看到的`&`符号称为 AddressOf 运算符。这意味着你传递的是对象的内存地址，而不是副本，因此当方法中的代码需要修改`error`对象时，你将能够看到结果。\n\
  \n要检查`error`对象，你可以在消息之后立即加入如下代码：\n\n```\nif(!error)\n    NSLog(@\"content = %@\"\
  , content);\nelse\n    NSLog(@\"error = %@\", error);\n```\n\n如果没有错误，则对内容进行处理；否则，处理错误。如果此代码成功，则日志会打印出以下内容：\n\
  \n```\ncontent = <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC\
  \ \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
  >\n<plist version=\"1.0\">\n<array>\n    <string>A</string>\n    <string>B</string>\n\
  \    <string>C</string>\n    <string>D</string>\n</array>\n</plist>\n```\n\n这个文件是我\
  \ Mac 上的一个文件，但实际内容无关紧要。如果你将文件名更改为 Mac 上不存在的文件，则会收到错误消息，如下所示：\n\n```\nerror = Error\
  \ Domain=NSCocoaErrorDomain Code=260 \"The file \"arrayf.txt\" couldn’t be opened\
  \ because there is no such file.\" UserInfo=0x10010a8a0 {NSFilePath=/Users/Shared/arrayf.txt,\
  \ NSUnderlyingError=0x10010a650 \"The operation couldn’t be completed. No such file\
  \ or directory\"}\n```\n\n此时，你应该使用应用程序用户界面提示用户寻求帮助。\n\n## Try/Catch 语句\n\nTry/catch\
  \ 语句是另一种尝试捕获错误的方式。其思想是：你可以识别容易出错的代码区域，然后将这些区域包裹在一个称为 try 块的代码块中。你还可以识别一个称为 catch\
  \ 块的代码块，该代码块会在 try 块中的代码失败时执行。\n\n你还可以设置一个称为 finally 块的代码块，无论 try 块是否失败，该代码块都会执行。让我们通过读取一个仅包含四个元素的数组文件，然后尝试读取超出边界的第五个元素来尝试这一点。\n\
  \n```\nNSArray *array = [NSArray arrayWithContentsOfFile:file];\n@try {\n    NSString\
  \ *fifthItem = [array objectAtIndex:4];\n    NSLog(@\"fifthItem = %@\", fifthItem);\n\
  }\n@catch (NSException *exception) {\n    NSLog(@\"exception = %@\", exception);\n\
  }\n@finally {\n    NSLog(@\"Moving on...\");\n}\n```\n\n如果执行此代码，try 块会失败，控制权将转到\
  \ catch 块，并且日志会打印出一条消息：\n\n```\nexception = *** -[__NSArrayM objectAtIndex:]: index\
  \ 4 beyond bounds [0 .. 3]\nMoving on...\n```\n\n文本“Moving on...”会出现，因为它是 finally\
  \ 块的一部分，并且无论如何都会执行。\n\n"
- "# 背景处理\n\n摘要\n\n当你的程序需要同时执行多个任务时，可以使用后台处理。Objective-C 中的后台处理是通过名为`NSOperationQueue`的\
  \ Foundation 类完成的。\n\n## 背景处理定义\n\n当你的程序需要同时执行多个任务时，可以使用后台处理。Objective-C 中的后台处理是通过名为`NSOperationQueue`的\
  \ Foundation 类完成的。\n\n`NSOperationQueue`管理操作列表，并决定如何调度运行操作所需的资源。操作是代码块。操作可以同时执行，也可以逐个执行。\n\
  \n假设你想计数到 10,000 并将其打印到日志中。为此，你可以编写如下代码：\n\n```\nfor (int y=0; y<=10000; y++) {\n\
  \    NSLog(@\"y = %i\", y);\n}\n```\n\n这可以正常工作。如果你在应用中运行此代码，你将在控制台日志中看到一长串`y`值。\n\
  \n```\ny = 0\n. . .\ny = 9998\ny = 9999\ny = 10000\n```\n\n现在，假设你还想从 20,000 倒数到\
  \ 0。如果你只是编写另一个循环，那么你必须等待 10,000 计数完成后才能进行 20,000 计数。但如果你使用后台队列，则可以同时执行这两个任务，并且可能耗时相同。\n\
  \n以下是如何使用后台队列进行设置：\n\n```\nNSOperationQueue *background = [[NSOperationQueue alloc]\
  \ init];\n[background addOperationWithBlock:^{\n    for (int i1=20000; i1>0; i1--)\
  \ {\n        NSLog(@\"i1 = %i\", i1);\n    }\n}];\nfor (int y=0; y<=10000; y++)\
  \ {\n    NSLog(@\"y = %i\", y);\n}\n```\n\n你可以使用`alloc`和`init`函数创建队列，然后使用`addOperationWithBlock:`消息将代码块添加到队列中。如果你运行此代码，日志将打印出类似以下内容：\n\
  \n```\ni1 = 20000\ny = 0\ni1 = 19999\ny = 1\ni1 = 19998\ny = 2\ny = 3\ni1 = 19997\n\
  i1 = 19996\n. . .\ny = 9997\ni1 = 10001\ny = 9998\ny = 9999\ni1 = 10000\ni1 = 9999\n\
  y = 10000\n```\n\n"
- "# 对象归档\n\n摘要\n\n保存应用程序对象图的副本以供日后作为备份使用，称为对象归档。Objective-C 拥有可以帮助你归档对象图的类。每个支持归档的类都必须采用`NSCoding`协议，并实现`NSKeyedArchiver`和`NSKeyedUnarchiver`类所需的两个方法。\n\
  \n## 对象归档定义\n\n保存应用程序对象图的副本以供日后作为备份使用，称为对象归档。Objective-C 拥有可以帮助你归档对象图的类。每个支持归档的类都必须采用`NSCoding`协议，并实现`NSKeyedArchiver`和`NSKeyedUnarchiver`类所需的两个方法。\n\
  \n\n\n### NSCoding\n\n每个支持归档的类都必须遵循`NSCoding`协议并实现必需的方法。这些方法将帮助归档程序存储需要归档的对象中保存的属性值。\n\
  \n要遵循`NSCoding`协议，请在类接口的尖括号中添加`NSCoding`协议名称。以下是你已经编码的`Task`类的实现方式：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\n@interface Task : NSObject <NSCoding>\n\n@property(strong)\
  \ NSString *name;\n@property(assign) BOOL done;\n-(void)generateReport;\n\n@end\n\
  ```\n\n所遵循的`NSCoding`协议的语法如上所示（以粗体显示）。现在你需要实现两个协议方法。第一个方法称为编码器（encoder），因为它将用于将属性值编码到归档文件中。\n\
  \n```\n#import \"Task.h\"\n\n@implementation Task\n\n-(void)generateReport{\n  \
  \  NSLog(@\"Task %@ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\"\
  );\n}\n\n-(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
  \ forKey:@\"namekey\"];\n    [encoder encodeBool:self.done forKey:@\"donekey\"];\n\
  }\n\n@end\n```\n\n你想要保存到归档中的每个属性都需要发送一个编码消息并附带一个键（key）。不同的数据类型需要不同的消息。有关可用方法的完整列表，请参阅\
  \ Apple 的`NSCoding`文档。例如，对象需要`encodeObject:forKey:`消息，而布尔值需要`encodeBool:forKey:`消息。\n\
  \n接下来，你需要实现解码器方法。该方法是一种构造器初始化方法，它会将属性值添加到对象中。与之前一样，重要方法以粗体显示。\n\n```\n#import \"\
  Task.h\"\n\n@implementation Task\n\n-(void)generateReport{\n    NSLog(@\"Task %@\
  \ is %@\", self.name, self.done ? @\"DONE\" : @\"IN PROGRESS\");\n}\n\n-(void)encodeWithCoder:(NSCoder\
  \ *)encoder {\n    [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder\
  \ encodeBool:self.done forKey:@\"donekey\"];\n}\n\n-(id)initWithCoder:(NSCoder *)decoder\
  \ {\n    self = [super init];\n    if (self) {\n        self.name = [decoder decodeObjectForKey:@\"\
  namekey\"];\n        self.done = [decoder decodeBoolForKey:@\"donekey\"];\n    }\n\
  \    return self;\n}\n\n@end\n```\n\n此方法中的每个键和属性必须与`encodeWithCoder:`方法中的键和属性匹配。至此，`Task`已经支持`NSCoding`。为了查看示例，你还需要为`Project`添加`NSCoding`支持。以下是`Project`接口的实现方式：\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"Task.h\"\n\n@interface Project\
  \ : NSObject <NSCoding>\n\n@property(strong) NSString *name;\n@property(strong)\
  \ NSMutableArray *listOfTasks;\n-(void)generateReport;\n\n@end\n```\n\n以下是`Project`实现的实现方式：\n\
  \n```\n#import \"Project.h\"\n\n@implementation Project\n\n-(void)generateReport{\n\
  \    NSLog(@\"Report for %@ Project\", self.name);\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx, BOOL *stop) {\n        [obj generateReport];\n    }];\n}\n\
  \n-(void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
  \ forKey:@\"namekey\"];\n    [encoder encodeObject:self.listOfTasks forKey:@\"listOfTaskskey\"\
  ];\n}\n\n-(id)initWithCoder:(NSCoder *)decoder {\n    self = [super init];\n   \
  \ if (self) {\n        self.name = [decoder decodeObjectForKey:@\"namekey\"];\n\
  \        self.listOfTasks = [decoder decodeObjectForKey:@\"listOfTaskskey\"];\n\
  \    }\n    return self;\n}\n\n@end\n```\n\n### 使用归档器（Archiver）\n\n假设你已经建立了一个对象图，那么使用归档器就很简单了。你使用的类是`NSKeyedArchiver`，只需发送`archiveRootObject:toFile:`消息即可。两个参数分别是你要使用的文件名和对象图中的根对象。你的根对象是`Project\
  \ p`对象，因为你只有一个`p`，它包含多个`Task`对象。\n\n我们假设你仍然拥有第 24 章中创建的对象图，该章列出了`p`的所有任务。如果你想归档这些内容，可以在`main.m`文件中执行以下操作：\n\
  \n```\nNSString *file = @\"/Users/Shared/project.dat\";\n[NSKeyedArchiver archiveRootObject:p\
  \ toFile:file];\n```\n\n这将在你的 Mac 上创建一个数据文件。将来，你可以读取这个文件并用它来将对象图恢复到你的应用中。\n\n```\n\
  NSString *file = @\"/Users/Shared/project.dat\";\nProject *p = [NSKeyedUnarchiver\
  \ unarchiveObjectWithFile:file];\n[p generateReport];\n```\n\n由于你在此处发送了`generateReport`消息，你将在控制台日志中看到对象图的打印输出。\n\
  \n```\nReport for Cook Dinner Project\nTask Choose Menu is IN PROGRESS\nTask Buy\
  \ Groceries is IN PROGRESS\nTask Prepare Ingredients is IN PROGRESS\nTask Cook Food\
  \ is IN PROGRESS\n```\n\n"
- "# 29. Web 服务\n\n摘要\n\n许多公司（如 Facebook 和 Twitter）通过网站向用户提供服务。通常，这些服务也对开发者开放，以便在他们的应用中使用；这些服务被称为\
  \ Web 服务。Web 服务是驻留在 Web 服务器上的功能和内容，你可以通过一组定义明确的规则（称为 API，应用程序编程接口）来使用它们。\n\n## Web\
  \ 服务定义\n\n许多公司（如 Facebook 和 Twitter）通过网站向用户提供服务。通常，这些服务也对开发者开放，以便在他们的应用中使用；这些服务被称为\
  \ Web 服务。Web 服务是驻留在 Web 服务器上的功能和内容，你可以通过一组定义明确的规则（称为 API，应用程序编程接口）来使用它们。\n\n使用 Web\
  \ 服务的一般模式是：构建请求、发送请求、接收响应，然后解释响应。Objective-C 内置了对 Web 服务的支持。要发送请求和接收响应，你可以使用`NSURLConnection`类和`NSData`类。要解释（或解析）响应，你可以使用`NSJSONSerialization`类。\n\
  \n注意\n\nJSON 代表 JavaScript 对象表示法（JavaScript Object Notation），用于数据存储和传输。实现为 REST（表述性状态转移）Web\
  \ 服务的 Web 服务将提供 JSON 响应数据。`NSJSONSerialization`类使得在 Objective-C 中处理 JSON 更加容易。\n\
  \n### Bitly 示例\n\nBitly 是一个很好的 Web 服务示例，我喜欢用它来做演示，因为它非常简单且功能清晰。Bitly 会将长 URL（你在\
  \ Web 浏览器中输入的字符串）转换为更易于输入的短 URL。我将使用 bitly 的 Web 服务来展示`NSURLConnection`类。\n\n注意\n\
  \n要跟着这个示例操作，你需要在 bit.ly 上创建一个免费账户，并获取你自己的 API 密钥和 API 用户名。如果你希望跟着这个示例操作，请前往[`https://bit.ly`](https://bit.ly/)获取你的账户。在示例中，当遇到`[YOUR\
  \ API LOGIN]`或`[YOUR API KEY]`时，你需要替换为从 bitly 获取的登录名和密钥。\n\n\n\n### 构造请求字符串\n\n\
  使用网络服务时，应参考发布该服务的公司提供的文档作为依据。该文档会提供可供使用的字符串和参数。你需要以 API 文档中的字符串（`http://api.bit.ly/shorten?version=2.0.1&longUrl=&login=&apiKey=&format=json`）为起点，结合\
  \ bitly 登录名、bitly 密钥和一个长 URL 作为参数，来构造请求字符串。\n\n```\nNSString *APILogin = @\"[你的\
  \ API 登录名]\";\n```\n\n```\nNSString *APIKey = @\"[你的 API 密钥]\";\n```\n\n```\nNSString\
  \ *longURL = @\"https://mobileappmastery.com\";\n```\n\n```\nNSString *requestString\
  \ = [NSString stringWithFormat:@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=json\"\
  , longURL, APILogin, APIKey];\n```\n\n### 创建会话和 URL\n\n你需要两个对象：一个用于表示发送到服务器的请求 URL\
  \ 的 `NSURL` 对象，以及一个用于执行网络工作的 `NSURLSession` 对象。\n\n```\nNSURL *requestURL = [NSURL\
  \ URLWithString:requestString];\n```\n\n```\nNSURLSession *session = [NSURLSession\
  \ sharedSession];\n```\n\n### 发送和接收响应\n\n你将使用 `NSURLSession` 对象的一个块（block）来请求网络服务缩短\
  \ URL。将处理响应所需的全部代码放入作为参数传递的块中。通过这种方法，你实际上是在同时完成两件事。\n\n```\n[[session dataTaskWithURL:requestURL\n\
  \        completionHandler:^(NSData *data,\n                                   \
  \       NSURLResponse *response,\n                                          NSError\
  \ *error) {\n        }] resume];\n```\n\n```\nsleep(60);\n```\n\n你仍然需要填充用于处理响应的块，但这将启动操作。请注意，你需要在代码中放入一个\
  \ `sleep` 函数。`sleep` 函数会阻止主线程在 60 秒内执行新代码。你需要这样做，因为正在使用的方法将在后台线程上执行（这是使用网络服务时的最佳实践）。如果不阻止命令行应用完成网络服务，它将没有足够的时间为你获取结果。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 解析 JSON\n\n在完成块（completion\
  \ block）内部，你可以添加用于解释 Web 服务器响应的代码。由于你知道将要处理 JSON 数据，因此你需要使用 `NSJSONSerialization`\
  \ 类。这里你需要一个 `NSError` 对象，以及由该块提供的 `NSData` 对象（它包含了来自 Web 服务的响应数据）。\n\n```\n[[session\
  \ dataTaskWithURL:requestURL\n\n        completionHandler:^(NSData *data,\n\n  \
  \                          NSURLResponse *response,\n\n                        \
  \    NSError *error) {\n\n       NSError *e = nil;\n\n       NSDictionary *bitlyJSON\
  \ = [NSJSONSerialization JSONObjectWithData:data\n\n                           \
  \                                                        options:0\n\n         \
  \                                                                              error:\
  \ &e];\n\n        }] resume];\n\n```\n\n这会将所有 JSON 数据组织到一个 `NSDictionary` 集合中。这个字典内部可能包含其他字典、数组、数字和字符串。下一步是遍历所有这些返回的对象，以定位你需要的内容。同时，你还需要在这里测试错误。\n\
  \n```\n[[session dataTaskWithURL:requestURL\n\n        completionHandler:^(NSData\
  \ *data,\n\n                            NSURLResponse *response,\n\n           \
  \                 NSError *error) {\n\nNSError *e = nil;\n\nNSDictionary *bitlyJSON\
  \ = [NSJSONSerialization JSONObjectWithData:data\n\n                           \
  \                                                            options:0\n\n     \
  \                                                                              \
  \       error:&e];\n\nif(!error){\n\n    NSDictionary *results = [bitlyJSON objectForKey:@\"\
  results\"];\n\n    NSDictionary *resultsForLongURL = [results objectForKey:longURL];\n\
  \n    NSString *shortURL = [resultsForLongURL objectForKey:@\"shortUrl\"];\n\n \
  \   NSLog(@\"shortURL = %@\", shortURL);\n\n}\n\nelse\n\n    NSLog(@\"There was\
  \ an error parsing the JSON\");\n\n        }] resume];\n\n```\n\n一旦设置完成，运行你的应用程序，你将能够从响应中检索到\
  \ `shortURL`，并在控制台日志中打印出以下内容：\n\n```\nshortURL = http://bit.ly/1fHrAsT\n```\n\n\
  **注意**\n\n像这样解析 Web 服务响应时，你需要通过查看 API 文档或查看返回的字符串，来调查重要数据所在的位置。\n\nMatthew Campbell\
