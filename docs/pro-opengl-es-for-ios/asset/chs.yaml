  \ 8-7 展示了这些修改，并且记得也要修改头文件中的定义以及初始化例程中的初始化行。\n\n**代码清单 8-7：** `Planet.mm` 的一些小型辅助函数\n\
  \n```\n-(GLKVector3)getPosition\n{\n```\n\n\n\n`return m_Pos;`\n\n`}`\n\n`-(void)setPosition:(GLKVector3)position`\n\
