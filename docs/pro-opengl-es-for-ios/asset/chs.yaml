  ## 致谢


  感谢 Corbin Collins 和 Richard Carey，我长期忍受痛苦的编辑，容忍了这位首次写书、显然需要阅读《编写 iOS 入门书籍》的作者。


  还要感谢我的技术编辑 Leila Muhtasib，她表现得和我想象的一样出色。


  感谢 Matthew Moodie 和 Mark Beckner 批准了进度延期，让我能够加入 iOS 5 的内容，确保这本书不会在发布之日就已过时。


  当然，还要感谢 Steve Jobs，他从不妥协，打造了极其出色的工具，让工作变得有趣，让乐趣变得“更有趣”。


