  \n然后再次尝试平截头体。将 `zNear` 从 0.1 设置为 2.15。（为什么不设置为 3？因为物体的距离？）你将得到图 3-21。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
