- "# 第七章：精美渲染的杂项\n\n**208**\n\n图 7-1. 左侧只有 Hedly 在旋转；中间 Hedly 和他的窗口都开始逆时针旋转；右侧则是整个框架在翻来覆去地旋转。\n\
  \n## 太阳缓冲对象\n\n有了这种相当于 3D 超能力的技术，你可以做许多有趣又奇异的事情。例如，你可以在一台小电视模型上模拟一些动画；可以在地面水洼的倒影或汽车后视镜中显示同一数据的多个视图；更棒的是，你还可以将\
