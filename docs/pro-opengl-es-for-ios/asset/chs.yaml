  \n在第 4 行及之后几行中，我们将所需的属性绑定到程序。在顶点着色器的实际代码中，可以看到定义了供使用的同名属性：\n\n```glsl\nattribute\
  \ vec4 position;\nattribute vec3 normal;\n```\n\n属性名称几乎可以任意指定；使用`position`或`normal`并无特殊之处。\n\
  \n第 5 行将两个着色器链接起来。\n\n除了将属性绑定到着色器中的命名实体外，你还可以对 uniform 变量进行同样的操作，如第 6 行和第 7 行所示。\n\
  \n请记住，uniform 变量只是从调用程序传入的值。（它们与属性的区别在于，属性与每个顶点是一一映射的。）在本例中，我们提供了两个矩阵，并分别命名为`modelViewProjectionMatrix`和`normalMatrix`。再次查看顶点着色器，可以看到以下内容：\n\
  \n```glsl\nuniform mat4 modelViewProjectionMatrix;\nuniform mat3 normalMatrix;\n\
  ```\n\n第 7 行及之后几行支持一项内存优化特性。链接完成后，着色器代码会被复制到程序中，因此我们已有的着色器对象就不再需要了。由于它们使用引用计数，`glDetachShader()`函数可以将计数减一，当然，当计数为零时，就可以安全地删除它们。\n\
  \n作为副作用，如果你以任何方式修改了着色器，则必须在修改生效前重新链接。为了防止需要重新链接的情况，驱动程序可能会保留一些缓存信息以备后用。否则，分离/删除的过程可以帮助驱动程序重用缓存内存。\n\
  \n如你所见，实际需要的调用非常少，但苹果的演示代码也包含了所有的错误处理，这也是保留该代码的原因。\n\n现在，解决了这些问题后，我们可以来看看这两个着色器。清单\
  \ 10-5 是顶点着色器`Shader.vsh`。请注意，这对着色器共享相同的前缀，顶点着色器的后缀为`vsh`，而片段着色器的后缀为`fsh`。\n\n**清单\
  \ 10-5. 演示程序的顶点着色器**\n\n```glsl\nattribute vec4 position; //1\nattribute vec3 normal;\n\
  \nvarying lowp vec4 colorVarying; //2\n\nuniform mat4 modelViewProjectionMatrix;\
  \ //3\nuniform mat3 normalMatrix;\n\nvoid main()\n{\n    vec3 normalDirection =\
  \ normalize(normalMatrix * normal); //4\n    vec3 lightPosition = vec3(0.0, 0.0,\
  \ 1.0); //5\n    vec4 diffuseColor = vec4(0.4, 0.4, 1.0, 1.0); //6\n\n    float\
  \ nDotVP = max(0.0, dot(eyeNormal, normalize(lightPosition))); //7\n\n    colorVarying\
  \ = diffuseColor * nDotVP; //8\n\n    gl_Position = modelViewProjectionMatrix *\
  \ position; //9\n}\n```\n\n详细说明如下：\n\n第 1 行声明了我们在调用代码中指定的属性。请记住，属性是直接映射到每个顶点的数据数组，并且仅在顶点着色器中可用。\n\
  \n在第 2 行中，声明了一个 varying 向量变量。它将用于将颜色信息传递到片段着色器。\n\n第 3 行声明了两个 uniform 变量，它们最初是在前面的`loadShaders()`函数中指定的。\n\
  \n在第 4 行中，法线乘以`normalMatrix`。在这种情况下不能使用模型视图矩阵，因为法线不需要平移，而且模型视图中的任何缩放都会扭曲法线。事实证明，你可以使用模型视图矩阵的逆矩阵和转置矩阵来处理法线。之后，对结果进行归一化处理。\n\
  \n第 5 行提供了光源的位置，而第 6 行提供了默认颜色。通常你不会将这些数据嵌入着色器内部，但这样做很可能是为了方便起见。\n\n现在，在第 7 行中，计算法线（现在称为`eyeNormal`）与光源位置的点积，以得出两者之间的夹角。`max()`函数确保返回值被限制在`>=0`范围内，以处理任何负值。\n\
  \n然后，如第 7 行所示，只需将点积乘以漫反射颜色，就能得到一个面相对于光源局部位置的亮度。法线越朝向光源，亮度越高。随着法线偏离光源，亮度会降低，最终变为\
  \ 0。\n\n`gl_Position`是 GLSL 中预定义的 varying 变量，用于将变换后的顶点位置传回驱动程序。\n\n此示例中的片段着色器是最基本的实现。它只是将颜色信息从顶点着色器原封不动地传递过来。`gl_FragColor`是另一个预定义的\
  \ varying 变量，所有最终计算都在这里完成，如清单 10-6 所示。\n\n**清单 10-6. 最简单的片段着色器**\n\n```glsl\nvarying\
  \ lowp vec4 colorVarying;\n\nvoid main()\n{\n    gl_FragColor = colorVarying;\n\
  }\n```\n\n现在我们准备使用着色器了，事实证明它们出乎意料地简单明了。\n\n首先，`glUseProgram()`设置当前程序，接着使用`glUniform*`函数将应用中的值传递到显卡上的着色器中。属性通常与几何体同时提供，通过调用`glVertexAttribPointer()`等函数来实现。\n\
  \n\n### 关于 `setupGL()` 的补充说明\n\n关于本示例，还有一个要点体现在它的 `setupGL()` 方法中。虽然第 1 章已简要提及，但现在是时候更仔细地看看数据在\
  \ OpenGL ES 2 程序中是如何传递给 GPU 的。顶点数组对象（VAO，切勿与顶点缓冲对象混淆）代表一组描述场景特定状态的信息集合。与其他对象一样，创建/使用\
  \ VAO 遵循相同的流程：生成唯一 ID、绑定、填充数据，然后解绑备用。可以生成多个 VAO，各自承载场景不同部分的几何体指针和属性。在立方体示例中，请参考代码清单\
  \ 10-7。生成 VAO ID 并将其绑定为当前 VAO 后，会为交错排列的几何数据创建一个顶点缓冲对象。随后，VAO 会被通知 VBO 数据的组织方式，在此示例中，仅涉及位置和法线数据。\n\
  \n**代码清单 10-7.** 创建顶点数组对象\n\n```\nglGenVertexArraysOES(1, &_vertexArray);\nglBindVertexArrayOES(_vertexArray);\n\
  glGenBuffers(1, &_vertexBuffer);\nglBindBuffer(GL_ARRAY_BUFFER, _vertexBuffer);\n\
  glBufferData(GL_ARRAY_BUFFER, sizeof(gCubeVertexData), gCubeVertexData, GL_STATIC_DRAW);\n\
  glEnableVertexAttribArray(GLKVertexAttribPosition);\nglVertexAttribPointer(GLKVertexAttribPosition,\
  \ 3, GL_FLOAT, GL_FALSE, 24, BUFFER_OFFSET(0));\nglEnableVertexAttribArray(GLKVertexAttribNormal);\n\
  glVertexAttribPointer(GLKVertexAttribNormal, 3, GL_FLOAT, GL_FALSE, 24, BUFFER_OFFSET(12));\n\
  glBindVertexArrayOES(0);\n```\n\n当需要绘制时，将 VAO 句柄设置为当前 VAO，并调用标准的 `glDrawArray()`\
  \ 例程。\n\n---\n\n### 地球夜景\n\n让我们从地球模型开始，看看如何利用着色器使其更生动。你熟悉地球表面的图像，如图 10-2（左图）所示，但你可能也见过类似的地球夜景图像，如图\
  \ 10-2（右图）所示。如果能在地球的暗面显示夜景纹理，而不是仅仅显示常规纹理贴图的暗色版本，那将会非常酷。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 278](img/index-322_1.jpg)\n\n**第 10 章：OpenGL ES 2、着色器与...** **319**\n\n\
  **图 10-2.** 白天地球（左）与夜地球（右）对比\n\n在 OpenGL 1.1 下，即使可能实现，这也非常棘手。算法应该相对简单：渲染两个尺寸完全相同的球体。一个使用夜图像，另一个使用日图像。根据光照强度改变日半球纹理的\
  \ alpha 通道。当光照强度降至 0 时，纹理完全透明，夜半球显露出来。然而，在 OpenGL ES 2 下，你可以非常轻松地编写着色器，几乎完全匹配该算法。\n\
  \n于是，我从 Apple 的立方体模板开始，去掉了立方体相关内容，并添加了 `Planet.mm` 和 `Planet.h` 文件。`setupGL()` 修改为代码清单\
  \ 10-8。注意加载两个纹理和两个着色器程序的过程。\n\n**代码清单 10-8.** 设置显示地球夜景\n\n```\n- (void)setupGL\n\
  {\n    int planetSize=20;\n    [EAGLContext setCurrentContext:self.context];\n \
  \   [self loadShaders:&m_NightsideProgram shaderName:@\"nightside\"];\n    [self\
  \ loadShaders:&m_DaysideProgram shaderName:@\"dayside\"];\n    float aspect = fabsf(self.view.bounds.size.width\
  \ / self.view.bounds.size.height);\n    m_ProjectionMatrix = GLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f),\n\
  \                                                  aspect, 0.1f, 100.0f);\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 10 章：OpenGL ES 2、着色器与...**\
  \ **320**\n\n```\n    glEnable(GL_DEPTH_TEST);\n    m_EyePosition=GLKVector3Make(0.0,0.0,65.0);\n\
  \    m_WorldModelViewMatrix=GLKMatrix4MakeTranslation(-m_EyePosition.x,-m_EyePosition.y,-m_EyePosition.z);\n\
  }\n```\n\n\n\n`m_Sphere=[[Planet alloc] init:planetSize slices:planetSize radius:10.0f\
  \ squash:1.0f textureFile:NULL];`\n\n`[m_Sphere setPositionX:0.0 Y:0.0 Z:0.0];`\n\
  \n`m_EarthDayTexture=[self loadTexture:@\"earth_light.png\"];` `m_EarthNightTexture=[self\
  \ loadTexture:@\"earth_night.png\"];`\n\n`m_LightPosition=GLKVector3Make(100.0,\
  \ 10,100.0);` //位于地球后方\n\n`}`\n\n在`loadShaders()`中，我仅仅增加了一个属性，即`texCoord`（纹理坐标）。这些属性在片段着色器中恢复：\n\
  \n`glBindAttribLocation(*program, ATTRIB_VERTEX, \"position\");` `glBindAttribLocation(*program,\
  \ ATTRIB_NORMAL, \"normal\");` `glBindAttribLocation(*program, GLKVertexAttribTexCoord0,\
  \ \"texCoord\");`\n\n我还将光源的位置作为 uniform 变量传递，而不是在顶点着色器中硬编码。这通过以下几个步骤完成：\n\n首先，将其添加到着色器中：`uniform\
  \ vec3 lightPosition;`。\n\n然后，在`loadShaders()`中，使用`glGetUniformLocation()`获取其“位置”。该函数仅返回一个会话内的唯一\
  \ ID，之后在向着色器设置或获取数据时使用。\n\n然后可以通过以下方式设置光源位置：\n\n`glUniform3fv(uniforms[UNIFORM_LIGHT_POSITION],1,m_LightPosition.v);`\n\
  \n接着修改调用，添加两个参数，以便能够使用不同的着色器名称进行调用，并添加一个指向程序句柄的指针。同时记得修改代码以支持参数，而不是临时变量：\n\n`- (BOOL)loadShaders:(GLuint\
  \ *)program shaderName:(NSString *)shaderName`\n\n现在，在清单 10-9 中，地球的两面都被绘制，夜晚的一面先绘制，白昼的一面后绘制。根据需要交换程序（shader\
  \ program）。\n\n清单 10-9. 处理该情况的`drawInRect()`方法\n\n```\n- (void)glkView:(GLKView\
  \ *)view drawInRect:(CGRect)rect\n{\n    GLfloat gray=0.0;\n    static int frame=0;\n\
  \n    glClearColor(gray,gray,gray, 1.0f);\n    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\
  \n    //夜晚面\n    [self useProgram:m_NightsideProgram];\n    [m_Sphere setBlendMode:PLANET_BLEND_MODE_SOLID];\n\
  \    [m_Sphere execute:m_EarthNightTexture.name];\n\n    //白昼面\n    [self useProgram:m_DaylightProgram];\n\
  \    [m_Sphere setBlendMode:PLANET_BLEND_MODE_FADE];\n    [m_Sphere execute:m_EarthDayTexture.name];\n\
  \n    //大气层\n    glCullFace(GL_FRONT);\n    glEnable(GL_CULL_FACE);\n    glFrontFace(GL_CW);\n\
  \n    frame++;\n}\n```\n\n在地球的白昼一侧，我使用`m_DaysideProgram`程序，而夜晚一侧则使用另一个称为`m_NightsideProgram`的程序。两者使用相同的顶点着色器，如清单\
  \ 10-10 所示。\n\n清单 10-10. 地球白昼和夜晚两侧的顶点着色器\n\n```\nattribute vec4 position;\nattribute\
  \ vec3 normal;\nattribute vec2 texCoord; //1\n\nvarying vec2 v_texCoord;\nvarying\
  \ lowp vec4 colorVarying;\n\nuniform mat4 modelViewProjectionMatrix;\nuniform mat3\
  \ normalMatrix;\nuniform vec3 lightPosition; //2\n\nvoid main()\n{\n    v_texCoord=texCoord;\
  \ //3\n\n    vec3 eyeNormal = normalize(normalMatrix * normal);\n    vec4 diffuseColor\
  \ = vec4(1.0, 1.0, 1.0, 1.0);\n\n    float nDotVP = max(0.0, dot(normalDirection,\
  \ normalize(lightPosition)));\n    colorVarying = diffuseColor * nDotVP;\n\n   \
  \ gl_Position = modelViewProjectionMatrix * position;\n}\n```\n\n这与 Apple 的模板几乎相同，但我们添加了一些内容：\n\
  \n第 1 行用于传递一个额外的属性，即每个顶点的纹理坐标。然后通过第 3 行使用`v_texCoord` varying 变量将其直接传递给片段着色器。\n\n\
  第 2 行是新的 uniform 变量，您可能还记得在视图控制器的代码中，它保存了光源的位置。\n\n清单 10-11 展示了地球白昼一侧的片段着色器，而清单\
  \ 10-12 则展示了夜晚一侧的片段着色器。\n\n\n\n### 列表 10-11\\. 地球白昼侧的片段着色器\n\n```\nvarying lowp\
  \ vec4 colorVarying; //1\n\nprecision mediump float;\n\nvarying vec2 v_texCoord;\
  \ //2\n\nuniform sampler2D s_texture; //3\n\nvoid main()\n{\n    gl_FragColor =\
  \ texture2D( s_texture, v_texCoord )*colorVarying; //4\n}\n```\n\n你会发现，能实现如此精美的效果，这些代码其实非常简单：\n\
  \n- 第 1 行从顶点着色器获取了易变变量 `colorVarying`。\n- 第 2 行以同样的方式获取纹理坐标，接着第 3 行获取纹理。如第 3 行所示，`sampler2D`\
  \ 是一个内置的统一变量，用于指明正在使用哪个纹理单元。\n- 最后，在第 4 行，内置函数 `texture2D` 从 `s_texture` 所引用的纹理中，根据\
  \ `v_texCoord` 坐标提取数值。然后将该数值与片段\"真实\"的颜色 `colorVarying` 相乘。`colorVarying` 的值越小，颜色就越暗。\n\
  \n列表 10-12 展示了如何渲染地球的夜半球。\n\n### 列表 10-12\\. 渲染夜半球\n\n```\nvarying lowp vec4 colorVarying;\n\
  \nprecision mediump float;\n\nvarying vec2 v_texCoord;\n\nuniform sampler2D s_texture;\n\
  \nvoid main()\n{\n    vec4 newColor;\n\n    newColor=1.0-colorVarying; //1\n\n \
  \   gl_FragColor = texture2D( s_texture, v_texCoord )*newColor; //2\n}\n```\n\n\
  在第 1 行，我们只是取了日半球着色器中颜色的相反值。随着阳光照射下颜色的增强，夜半球的纹理逐渐淡出至消失。这可能有些过度，因为夜半球的纹理会被另一侧的纹理冲淡，但在我的审美看来，明暗分界线之后的光点还是有点过于明显了。\n\
  \n最后还有一件事要做，那就是修改你的星球对象，使其能够使用顶点数组对象进行绘制。是的，这又是一个冗长的代码清单，如列表 10-13 所示。数据必须先被打包成更高效的交叉存取格式（参考第\
  \ 9 章）。然后，生成一个 VAO 作为某种封装容器。\n\n### 列表 10-13\\. 为星球创建 VAO\n\n```\n-(void)createInterleavedData\n\
  {\n    int i;\n    GLfloat *vtxPtr;\n    GLfloat *norPtr;\n    GLfloat *colPtr;\n\
  \    GLfloat *textPtr;\n    int xyzSize;\n    int nxyzSize;\n    int rgbaSize;\n\
  \    int textSize;\n\n    struct VAOInterleaved *startData;\n\n    int structSize=sizeof(struct\
  \ VAOInterleaved);\n    long allocSize=structSize*m_NumVertices;\n\n    m_InterleavedData=(struct\
  \ VAOInterleaved *)malloc(allocSize); //1\n\n    startData=m_InterleavedData;\n\n\
  \    vtxPtr=m_VertexData;\n    norPtr=m_NormalData;\n    colPtr=m_ColorData;\n \
  \   textPtr=m_TexCoordsData;\n\n    xyzSize=sizeof(GLfloat)*NUM_XYZ_ELS;\n    nxyzSize=sizeof(GLfloat)*NUM_NXYZ_ELS;\n\
  \    rgbaSize=sizeof(GLfloat)*NUM_RGBA_ELS;\n    textSize=sizeof(GLfloat)*NUM_ST_ELS;\n\
  \n    for(i=0;i<m_NumVertices;i++) //2\n    {\n        memcpy(&startData->xyz,vtxPtr,xyzSize);\
  \ //geometry（几何数据）\n        memcpy(&startData->nxyz,norPtr,nxyzSize); //normals（法线数据）\n\
  \        memcpy(&startData->rgba,colPtr,rgbaSize); //colors（颜色数据）\n        memcpy(&startData->st,textPtr,textSize);\
  \ //texture coords（纹理坐标）\n\n        startData++;\n        vtxPtr+=NUM_XYZ_ELS;\n\
  \        norPtr+=NUM_NXYZ_ELS;\n        colPtr+=NUM_RGBA_ELS;\n        textPtr+=NUM_ST_ELS;\n\
  \    }\n}\n\n-(void)createVAO\n{\n    GLuint numBytesPerXYZ,numBytesPerNXYZ,numBytesPerRGBA;\n\
  \    GLuint structSize=sizeof(struct VAOInterleaved);\n\n    [self createInterleavedData];\n\
  \n    //note that the context is set in the in the parent object\n    //注意：上下文已在父对象中设置\n\
  \n    glGenVertexArraysOES(1, &m_VertexArrayName);\n    glBindVertexArrayOES(m_VertexArrayName);\n\
  \n    numBytesPerXYZ=sizeof(GL_FLOAT)*NUM_XYZ_ELS;\n    numBytesPerNXYZ=sizeof(GL_FLOAT)*NUM_NXYZ_ELS;\n\
  \    numBytesPerRGBA=sizeof(GL_FLOAT)*NUM_RGBA_ELS;\n\n    glGenBuffers(1, &m_VertexBufferName);\n\
  \    glBindBuffer(GL_ARRAY_BUFFER, m_VertexBufferName);\n```\n\n\n\n`glBufferData(GL_ARRAY_BUFFER,\
  \ sizeof(struct VAOInterleaved)*m_NumVertices, m_InterleavedData, GL_STATIC_DRAW);`\n\
  \n`glEnableVertexAttribArray(GLKVertexAttribNormal);`\n\n`glVertexAttribPointer(GLKVertexAttribNormal,\
  \ NUM_NXYZ_ELS, GL_FLOAT, GL_FALSE, structSize, BUFFER_OFFSET(numBytesPerXYZ));`\n\
  \n`glEnableVertexAttribArray(GLKVertexAttribColor);`\n\n`glVertexAttribPointer(GLKVertexAttribColor,\
  \ NUM_RGBA_ELS, GL_FLOAT, GL_FALSE, structSize, BUFFER_OFFSET(numBytesPerNXYZ+numBytesPerXYZ));`\n\
  \n`glEnableVertexAttribArray(GLKVertexAttribTexCoord0);`\n\n`glVertexAttribPointer(GLKVertexAttribTexCoord0,\
  \ NUM_ST_ELS, GL_FLOAT, GL_FALSE, structSize, BUFFER_OFFSET(numBytesPerNXYZ+numBytesPerXYZ+numBytesPerRGBA));`\n\
  \n`}`\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图片 279](img/index-328_1.jpg)\n\
  \n![图片 280](img/index-328_2.jpg)\n\n## 第 10 章：OpenGL ES 2，着色器，以及…… 325\n\n在第 1 行中，分配了一个结构体数组来承载每个分量。此处的结构体定义在\
  \ `Planet.h` 中：\n\n```\nstruct VAOInterleaved\n{\n    GLfloat xyz[NUM_XYZ_ELS];\n\
  \    GLfloat nxyz[NUM_NXYZ_ELS];\n    GLfloat rgba[NUM_RGBA_ELS];\n    GLfloat st[NUM_ST_ELS];\n\
  };\n```\n\n第 2 行及之后的行扫描所有数据，并将其复制到交错数组中。\n\n在下一个方法中，创建了 VAO。与前面立方体的示例非常相似，唯一的区别在于纹理坐标和\
  \ RGBA 颜色数据被添加到了组合中。\n\n现在，在完成这些之后，请检查图 10-3 中的结果。\n\n**图 10-3.** 一次一个纹素地照亮黑暗\n\n\
  ## 那么镜面反射呢？\n\n就像任何其他闪亮的物体一样（地球的蓝色部分很闪亮），你可能期望看到太阳在水中的某种反射。嗯，你说得对。图 10-4 展示了一张地球的真实图像，正中间就是太阳的反射。让我们在我们自己的地球上尝试一下。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图片 281](img/index-329_1.jpg)\n\
  \n## 第 10 章：OpenGL ES 2，着色器，以及…… 326\n\n**图 10-4.** 从太空看到的地球反射太阳\n\n自然，我们需要编写自己的镜面反射着色器（在此例中，是将其添加到现有的日光着色器中）。\n\
  \n将旧的顶点着色器替换为列表 10-14，将片段着色器替换为列表 10-15 中的那个。这里我预先计算了镜面信息以及普通的漫反射颜色，但两者在片段着色器中才被分开处理。原因是地球上并非所有区域都具有反射性，因此陆地不应该进行镜面处理。\n\
  \n**列表 10-14.** 镜面反射的顶点着色器\n\n```\nattribute vec4 position;\nattribute vec3 normal;\n\
  attribute vec2 texCoord;\nvarying vec2 v_texCoord;\nvarying lowp vec4 colorVarying;\n\
  varying lowp vec4 specularColorVarying; //1\nuniform mat4 modelViewProjectionMatrix;\n\
  uniform mat3 normalMatrix;\nuniform vec3 lightPosition;\nuniform vec3 eyePosition;\n\
  \nvoid main()\n{\n    float shininess=100.0;\n    float balance=.75;\n    vec3 normalDirection\
  \ = normalize(normalMatrix * normal); //2\n    vec3 eyeNormal = normalize(eyePosition);\n\
  \    vec3 lightDirection;\n    float specular=0.0;\n    v_texCoord=texCoord;\n \
  \   eyeNormal = normalize(normalMatrix * normal);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 10 章：OpenGL ES 2，着色器，以及…… 327\n\n```\n    vec4 diffuseColor = vec4(1.0, 1.0,\
  \ 1.0, 1.0);\n    lightDirection=normalize(lightPosition);\n    float nDotVP = max(0.0,\
  \ dot(normalDirection,lightDirection));\n    float nDotVPReflection = dot(reflect(-lightDirection,normalDirection),eyeNormal);\
  \ //3\n```\n\n\n\n```glsl\nspecular = pow(max(0.0, nDotVPReflection), shininess)\
  \ * 0.75; // 4\nspecularColorVarying = vec4(specular, specular, specular, 0.0);\
  \ // 5\ncolorVarying = diffuseColor * nDotVP;\ngl_Position = modelViewProjectionMatrix\
  \ * position;\n}\n```\n\n以下是具体说明：\n\n第 1 行声明了一个 varying 变量，用于将镜面光照传递给片段着色器。\n\n\
  接下来，在第 2 行中，我们获取一个经过 `normalMatrix`（没错，听起来还是有点滑稽）变换后的标准化法线，这是计算正确镜面反射值所必需的。\n\n\
  现在，我们需要计算光线反射向量与法线的点积。这里的法线需要以常规方式由 `normalMatrix` 进行标准化。详见第 3 行。请注意此处使用的 `reflect()`\
  \ 方法，这是着色语言中另一个贴心的功能。`reflect()` 根据负的光线方向和局部法线生成反射向量，然后该向量再与 `eyeNormal` 计算点积。\n\
  \n在第 4 行中，该点积值被用来生成实际的镜面反射分量。你还会看到我们的老朋友 `shininess`，与 OpenGL ES 第一版一样，该值越大，反射范围越窄。\n\
  \n由于我们可以认为太阳的颜色只是白色，因此第 5 行中的镜面颜色可以将其所有分量设置为相同值。\n\n现在，可以使用片段着色器进一步完善效果，如代码清单 10-15\
  \ 所示。\n\n**代码清单 10-15.** 处理镜面反射的片段着色器\n\n```glsl\nprecision mediump float;\nvarying\
  \ lowp vec4 colorVarying;\nvarying lowp vec4 specularColorVarying; // 1\nuniform\
  \ mat4 modelViewProjectionMatrix;\nuniform mat3 normalMatrix;\nuniform vec3 lightPosition;\n\
  varying vec2 v_texCoord;\nuniform sampler2D s_texture;\n\nvoid main()\n{\n    vec4\
  \ finalSpecular = vec4(0,0,0,1);\n    vec4 surfaceColor;\n    float halfBlue;\n\n\
  \    surfaceColor = texture2D(s_texture, v_texCoord);\n    halfBlue = 0.5 * surfaceColor[2];\
  \ // 2\n    if(halfBlue > 1.0) // 3\n        halfBlue = 1.0;\n    if((surfaceColor[0]\
  \ < halfBlue) && (surfaceColor[1] < halfBlue)) // 4\n        finalSpecular = specularColorVarying;\n\
  \    gl_FragColor = surfaceColor * colorVarying + colorVarying * finalSpecular;\
  \ // 5\n}\n```\n\n这里的主要任务是判断哪些片段代表海洋，哪些不是。这非常简单：蓝色的东西就是水（水可是强大的湿性物质！），而非蓝色的东西则不是水。\n\
  \n首先在第 1 行中，我们接收 `specularColorVarying` 变量。\n\n在第 2 行中，我们获取蓝色分量并将其减半，并在第 3 行中进行钳位，因为任何颜色实际上都不能超过最大强度。\n\
  \n第 4 行进行过滤。如果红色和绿色分量都小于蓝色分量的一半，那么基本上可以确定我们可以将镜面高光绘制在水面上，而不是像乍得这样的地方。\n\n最后一行中，在将\
  \ `colorVarying` 与片段颜色相乘之后，将镜面反射部分添加到其中，因为这样可以将其与其他所有颜色进行调和。\n\n图 10-5 展示了结果。\n\n\
