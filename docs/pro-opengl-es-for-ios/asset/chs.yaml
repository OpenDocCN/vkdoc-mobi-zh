  ## 总结


  在本章中，我们结合了许多前几章学到的技巧，将它们组合成一个更完整、更吸引人的太阳系模型。单行星太阳系本身并不令人印象深刻。所以，亲爱的读者，我将把添加月球、添加其他行星以及让地球围绕太阳公转的任务留给你。此外，我们还涉及了其他几个我没能来得及加入项目的主题和技巧。例如，可以使用帧缓冲对象（FBO）在屏幕上插入一个来自不同视角的地球辅助视图。


