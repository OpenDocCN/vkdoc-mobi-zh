  \n## 总结\n\n\n"
- "# 第六章：它能融合吗？\n\n本章作为纹理及其应用的入门介绍，涵盖了基本纹理理论、纹理坐标的表达方式、如何利用 mipmap 提升保真度，以及如何通过纹理过滤实现平滑效果。太阳系模型已更新，地球现在通过纹理贴图看起来逼真还原。下一章我们将继续探讨纹理，学习如何使用\
  \ iPhone 的多重纹理单元以及混合技术。\n\n---\n\n**是的，它能融合！**  \n——汤姆·迪克森，Blendtec 搅拌机公司创始人\n\n\
  2006 年，汤姆·迪克森在 YouTube 上传了一段搞笑视频，通过将弹珠搅拌成粉末来展示自家公司搅拌机的强大性能。此后，他的系列视频被观看超过 1 亿次，融合对象从提基火炬、激光笔到贾斯汀·比伯玩偶和新摄像机，无所不有。不过，汤姆的\"\
  融合\"与我们讨论的混合技术毫不相干——除非把几台 iPad 和一部 iPhone 4 残忍无情地粉碎也算数。毕竟，它们都是搭载 OpenGL ES 的设备，有自己的混合方式，只不过远没有那么大的破坏力（好吧，这个比喻有点牵强）。混合在\
  \ OpenGL ES 应用中扮演着重要角色。它是创建半透明物体的过程，小到一扇窗户，大到一片池塘都能使用。其他用途包括添加雾气或烟雾等大气效果、平滑锯齿边缘，以及模拟各种复杂光照效果。OpenGL\
  \ ES 2 拥有一套复杂机制，使用称为着色器的小模块来实现专门的混合效果。但在着色器出现之前，混合函数就已存在，虽然功能远不如前者灵活，但使用起来要简单得多。\n\
  \n本章你将学习混合函数的基础知识，以及如何将其应用于颜色混合和 Alpha 混合。之后，你将使用涉及多重纹理的不同混合方式，实现阴影等更复杂的效果。最后，我将展示如何在太阳系项目中应用这些效果。\n\
  \n## Alpha 混合\n\n你肯定注意到了 RGBA 颜色四元组。如前所述，`A` 代表 Alpha 通道，传统上用于指定图像的半透明度。在用于纹理的位图中，Alpha\
  \ 层形成了一种特殊图像：某部分半透明，另一部分完全透明，第三部分则完全不透明。\n\n如果物体不使用纹理，而是通过顶点、光照或全局颜色来指定颜色，Alpha\
  \ 可以让整个物体或场景具有半透明属性。`1.0` 表示物体或像素完全不透明，而 `0` 则表示完全不可见。\n\n要使 Alpha 生效，与任何混合模型一样，需要同时处理源图像和目标图像。由于通过示例更容易理解，我们现在就开始第一个例子。\n\
  \n首先回到第 3 章的原始弹跳方块练习。然后用代码清单 6-1 替换原来的 `drawInRect()` 方法，并确保像之前一样在初始化器中调用 `setClipping`。这里先使用纯色方块而非纹理方块，因为这样示例更简单。\n\
  \n**代码清单 6-1.** 新的 `drawInRect()` 方法\n\n```objc\n(void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n\
  \n{\n\nstatic const GLfloat squareVertices[] = //1\n\n{\n\n-0.5, -0.5, 0.0,\n\n\
  0.5, -0.5, 0.0,\n\n-0.5, 0.5, 0.0,\n\n0.5, 0.5, 0.0\n\n};\n\nstatic float transY\
  \ = 0.0;\n\nglClearColor(0.0, 0.0, 0.0, 1.0); //2\n\nglClear(GL_COLOR_BUFFER_BIT);\n\
  \nglMatrixMode(GL_MODELVIEW);\n\nglLoadIdentity();\n\n//使方块一上下弹跳。\n```\n\n\n\n```glTranslatef(0.0,\
  \ (GLfloat)(sinf(transY)/2.0), -4.0); //3```\n\n```glVertexPointer(3, GL_FLOAT,\
  \ 0, squareVertices);```\n\n```glEnableClientState(GL_VERTEX_ARRAY);```\n\n```//方块\
  \ 1```\n\n```glColor4f(0.0, 0.0,1.0,1.0); //4```\n\n```glDrawArrays(GL_TRIANGLE_STRIP,\
  \ 0, 4);```\n\n```//方块 2```\n\n```glColor4f(1.0, 0.0,0.0, .5); //5```\n\n`glLoadIdentity();`\n\
  \n`glTranslatef( (GLfloat)(sinf(transY)/2.0),0.0, -3.0); //6`\n\n```glDrawArrays(GL_TRIANGLE_STRIP,\
  \ 0, 4); //7```\n\n```transY += 0.075; //8```\n\n```}```\n\n```(void)setClipping```\n\
  \n```{```\n\n```float aspectRatio;```\n\n```const float zNear = .01;```\n\n```const\
  \ float zFar = 100;```\n\n```const float fieldOfView =30.0;```\n\n```GLfloat size;```\n\
  \n```CGRect frame = [[UIScreen mainScreen] bounds];```\n\n```//h/w 限制视场角到高度方向；翻转该值则可使其相对于宽度方向。```\n\
