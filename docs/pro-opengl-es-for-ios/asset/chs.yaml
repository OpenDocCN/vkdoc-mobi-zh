  \ z 为负值，则太阳位于我们身后，因此可以完全跳过。\n\n第 4 行计算出新纹理应该渲染的大小。自然，我们不能仅仅使用半径，因为纹理要大得多，以处理主图像加上发光效果。在计算\
  \ `sunWidth` 时使用的各种值相当随意，但它们很好地达成了平衡。\n\n第 5 行中对 `renderTextureInRect()` 的调用通过从屏幕\
  \ x 和屏幕 y 位置减去 `sunWidth` 的一半来确保太阳矩形居中。\n\n由于这种绘制方式的副作用，深度提示效果不佳，因此无法使用 z 缓冲。通过将其作为第一个物体绘制，我们可以确保较近的物体会在需要时正确地覆盖图像的任意部分。\n\
  \n第 6 行重复了第一行，但这次用于在第 7 行渲染地球。明白了吗？请注意，我们获取了地球的屏幕 x 和 y 值，以及半径，就像我们之前为太阳所做的那样。\n\
  \n然后我们来到实际渲染光晕的部分，从第 8 行开始。这里的大部分代码主要处理一个基本效果：当太阳落到地球后面时会发生什么。自然，镜头光晕会消失，但它不会瞬间弹出或消失，因为太阳有有限的直径。因此，像\
  \ `grazeDist` 和 `vanishDist` 这样的值告诉我们太阳何时开始与地球相交（开始变暗过程），以及何时被完全覆盖（完全遮蔽光晕图像）。利用地球和太阳的屏幕\
  \ x 及 y 值，定义一个淡出函数就变得容易了。\n\n第 9 行实际决定了光晕的亮度。`percentVisible` 在 1.0 时为“全”亮度，但实际上可以稍微高一点，因为它会乘以光晕的颜色值。由于并非所有颜色在\
  \ 1.0 时都达到最大值，因此我实际上可以稍微增加一点。但为什么呢？当太阳落到地球后面时，人们可能会期待最后的光束被大气层略微折射，从而在短时间内增强亮度，在这种情况下，会产生一次几乎不可见的闪光。（如果你愿意将其制作成传说中的绿色闪光之一，你将获得额外加分。）\n\
