  iPad 看起来更具未来感的道具是多么困难。（甚至在 iPhone 上市之前，美国广播公司《迷失》剧组的道具部门就借用了苹果的一些屏幕图标，用于直升机飞行员携带的双向无线电对讲机。）如果你正在读这本书，很可能你拥有一台
