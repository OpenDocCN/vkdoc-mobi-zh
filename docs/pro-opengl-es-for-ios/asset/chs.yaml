  - 第 2 行将像素位置基于 frame 的宽度和高度转换为相对值。这些值被缩放 2 倍，因为我们的视口宽高将各为 2 个单位，从-1 到 1 变化。\n\n\n\
  \n"
- "# 排版后内容\n\n这些值最终会传递给`glTranslatef()`。\n\n接下来，为了安全起见，关闭任何深度测试以及光照，因为光晕必须独立于场景中的实际光照进行计算。\n\
  \n由于我们将使用正交投影，在第 4 行中将`GL_PROJECTION`重置为单位矩阵。请记住，任何时候想要操作特定的矩阵，都需要提前指定是哪一个。`glPushMatrix()`方法让我们可以在不破坏之前任何操作的情况下调整投影矩阵。\n\
  \n第 5 行是这个例程的核心。`glOrthof()`是一个新调用，用于设置正交矩阵。实际上，它指定了一个盒子。在这个例子中，盒子的宽度和深度范围都是从-1\
  \ 到 1，而高度则使用宽高比进行额外缩放，以补偿非正方形显示。这就是为什么之前的`scaledX`和`scaledY`值要乘以 2 的原因。\n\n接下来，在第\
  \ 6 行设置模型视图的单位矩阵，然后在第 7 行调用`glTranslatef()`。\n\n第 8 行根据场景的视野确定如何缩放光晕集合，接着第 9 行执行实际的缩放。这是相对的，取决于你想要处理的放大范围。目前尚未实现捏合缩放，因此这个值保持不变。`zoomBias`影响所有元素，这使得一次性缩放所有内容变得容易。\n\
  \n第 10 行及之后的内容使用最常见的选项设置混合函数。这使得每个反射都以非常可信的方式混合，尤其是当它们开始在中心堆积时。\n\n现在设置颜色并绘制对象。\n\
  \n再次，做好“邻居”，弹出矩阵，以免影响其他任何内容。\n\n我为单个光晕创建了一个光晕对象，并创建了一个`LensFlare`父对象来处理向量的设置、包含每个单独的图像，并在准备就绪时放置它们。来自清单\
  \ 7-7 中`LensFlare.mm`的主循环此时应该几乎不需要解释。它只是计算光晕向量的起点，然后遍历数组以执行每个实体。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 7 章：精心渲染的杂项\n\n**217**\n\n### 清单 7-7：整个镜头光晕效果的执行循环\n\n```\n-(void)execute:(CGRect)frame\
  \ source:(CGPoint)source\n{\n    CGPoint position;\n    NSEnumerator *e;\n    Flare\
  \ *object;\n\n    static GLfloat deltaX=40,deltaY=40;\n    static GLfloat offsetFromCenterX,offsetFromCenterY;\n\
  \    static GLfloat startingOffsetFromCenterX,startingOffsetFromCenterY;\n\n   \
  \ int numElements;\n    GLfloat cx,cy;\n\n    static int counter=0;\n\n    e=[m_Flares\
  \ objectEnumerator];\n\n    cx=(frame.size.width/2.0);\n    cy=(frame.size.height/2.0);\n\
  \n    startingOffsetFromCenterX=cx-source.x;\n    startingOffsetFromCenterY=source.y-cy;\n\
  \n    offsetFromCenterX=startingOffsetFromCenterX;\n    offsetFromCenterY=startingOffsetFromCenterY;\n\
  \n    numElements=[m_Flares count];\n\n    deltaX=2.0*startingOffsetFromCenterX;\n\
  \    deltaY=2.0*startingOffsetFromCenterY;\n\n    while (object = [e nextObject])\n\
  \    {\n        position=CGPointMake(offsetFromCenterX,offsetFromCenterY);\n\n \
  \       [object renderFlareAt:position];\n\n        offsetFromCenterX-=deltaX*[object\
  \ getVectorPosition];\n        offsetFromCenterY-=deltaY*[object getVectorPosition];\n\
  \    }\n\n    counter++;\n}\n```\n\n最后，每个单独的光晕图像必须在初始化时加载并添加到`NSArray`中。代码如下：\n\n\
  ```\n[m_Flares addObject:[[Flare alloc]init:@\"hexagon_blur.png\"\n    size:1.0\
  \ vectorPosition:(.05-ff) r:1.0 g:0.73 b:0.30 a:.4]];\n[m_Flares addObject:[[Flare\
  \ alloc]init:@\"glow.png\"\n    size:1.5 vectorPosition:(.055-ff) r:1.0 g:0.73 b:0.50\
  \ a:.4]];\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 219](img/index-221_1.jpg)\n\
  \n## 第 7 章：精心渲染的杂项\n\n**218**\n\n这个演示有 24 个这样的对象。图 7-6 显示了结果。\n\n### 图 7-6：简单的镜头光晕\n\
  \n\n\n"
- "# 文档排版\n\n遗憾的是，镜头光晕特效中存在一个重大难题。如果光源被其他物体遮挡会怎样？如果遮挡物是场景中央的一个规则球体等常见且已知的物体，处理起来相当简单。但若是随机位置上的随机物体，难度就会大大增加。那么，当光源仅被部分遮蔽时又该如何处理？只有在整个物体被完全隐藏时，反射效果才会变暗并逐渐消失。这个解决方案暂且留给你自行思考。\n\
  \n## 模板反射表面\n\n另一种正快速沦为视觉套路的特效（尽管仍然很酷），是在场景的部分或全部区域下方设置镜面反射表面。我们 Mac 用户每次看到 Dock\
  \ 栏时都会见到这种效果——那些快乐的小图标欢快地上下舞动，仿佛用尖细的声音喊着\"看这里！看这里！\"\n\n下方你会看到淡淡的倒影。当然，苹果的设计范例引领下，许多第三方应用也采用了相同效果。参见图\
  \ 7-7。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图 220](img/index-222_1.jpg)\n\
  \n![图 221](img/index-222_2.jpg)\n\n**第 7 章：精心渲染的杂项**\n\n**219**\n\n图 7-7. 遥远太阳中的倒影（没错，这是个免费的广告）。当然，苹果的示例是用\
  \ Core Graphics 实现的，但原理相同：这就是个投机取巧的方法！不过电脑图形学中大部分技术也是如此——我们试图通过一切必要手段模拟真实世界，制作这种反射表面也不例外。\n\
  \n这将引出下一个主题，涉及模板和反射两方面。除了\"颜色\"缓冲区（即图像缓冲区）和深度缓冲区外，OpenGL 还有一种称为模板缓冲区的机制。\n\n在 iOS5\
  \ 之前的时代，创建模板缓冲区需要额外十几行代码。此后已简化为仅需一行代码，微不足道。在`viewDidLoad()`中创建上下文时，添加：\n\n```\n\
  view.drawableStencilFormat = GLKViewDrawableStencilFormat8;\n```\n\n模板格式可以是 8 位，也可以不使用。\n\
  \n接下来创建生成实际模板的例程。将清单 7-8 添加到视图控制器中，并在主绘制循环中调用`renderToStencil()`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n**第 7 章：精心渲染的杂项**\n\n**220**\n\n本质上，渲染模板缓冲区与其他缓冲区类似，但在此情况下，每个像素及其数值将用于决定后续图像如何渲染到屏幕上。最常见的情况是：后续绘制在模板区域内的图像会正常渲染，而模板区域外的则不会渲染。当然，这些行为可以修改，这符合\
  \ OpenGL\"让一切比绝大多数工程师会用（更别说理解）的配置更灵活\"的理念。尽管如此，它有时确实非常实用。目前我们仍使用简单功能。\n\n清单 7-8.\
  \ 模板像普通屏幕对象一样生成\n\n```\n- (void)renderToStencil\n{\n    glEnable(GL_STENCIL_TEST);\
  \                              //1\n    glStencilFunc(GL_ALWAYS, 1, 0xffffffff);\
  \                //2\n    glStencilOp(GL_REPLACE, GL_REPLACE, GL_REPLACE);     \
  \   //3\n    [self renderStage];                                      //4\n    glStencilFunc(GL_EQUAL,\
  \ 1, 0xffffffff);                 //5\n    glStencilOp(GL_KEEP, GL_KEEP, GL_KEEP);\
  \                 //6\n}\n```\n\n因此，按以下方式建立模板：\n\n如第 1 行所示启用模板。\n\n第 2 行指定了向模板缓冲区写入时的比较函数。由于每次都会清除缓冲区，初始值全为零。函数`GL_ALWAYS`表示每次写入都会通过模板测试，这正是构建模板时所需的行为。值\
  \ 1 称为参考值。\n\n由于参考值取值范围为 0 到 255，可以根据提供的参考值让模板产生不同行为。\n\n\n\n## 模板操作的设置方式\n\n最终值是一个用于访问位平面的掩码。由于我们并不关心这一点，直接全部启用即可。\n\
  \n第 3 行指定了模板测试成功或失败时的处理方式。第一个参数对应模板测试失败的情况；第二个参数对应模板测试通过但深度测试失败的情况；第三个参数则对应两者都通过的情况。由于我们身处三维空间，模板测试与深度测试的联动机制表明，在某些情况下两者可能相互制约。模板缓冲区的使用中有些微妙的细节处理起来相当复杂。在此例中，将三个参数均设置为\
  \ `GL_REPLACE`。表 7-1 列出了所有其他允许的取值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 7 章：渲染精粹\n\n**221**\n\n第 4 行调用渲染函数，几乎与你平时调用它的方式相同。在此情况下，它同时向模板缓冲区和某个颜色通道写入数据，因此我们可以在全新的闪亮舞台或平台上获得某种闪光效果。与此同时，模板缓冲区中的背景像素将保持为\
  \ 0，而图像则会生成大于 0 的模板像素值，这使得后续的图像数据可以向其上写入。\n\n第 5 行和第 6 行现在将缓冲区调整为正常使用状态。第 5 行规定：如果当前寻址的模板像素值为\
  \ 1，则按第 6 行所述保持其不变。否则，允许该片段通过并继续处理，如同模板缓冲区不存在一样（不过如果它未能通过深度测试，仍可能被忽略）。因此，任何值为 0\
  \ 的模板像素都会导致测试失败，传入的片段将被阻挡在外。\n\n## 表 7-1. `glStencilOp()` 的可用取值\n\n| 操作类型 | 说明 |\n\
  |---------|--------|\n| `GL_KEEP` | 保持当前值。 |\n| `GL_ZERO` | 将模板缓冲区值设为 0。 |\n| `GL_REPLACE`\
  \ | 将模板缓冲区值设为 `glStencilFunc` 指定的 `ref` 值。 |\n| `GL_INCR` | 将当前模板缓冲区值递增。递增到最大可表示无符号值时将钳制在该最大值。\
  \ |\n| `GL_INCR_WRAP` | 将当前模板缓冲区值递增。当递增到最大可表示无符号值时，模板缓冲区值将回绕至零。 |\n| `GL_DECR` |\
  \ 将当前模板缓冲区值递减。递减到 0 时将钳制在 0。 |\n| `GL_DECR_WRAP` | 将当前模板缓冲区值递减。当递减 0 值时，模板缓冲区值将回绕至最大可表示无符号值。\
  \ |\n| `GL_INVERT` | 对当前模板缓冲区值进行按位取反。 |\n\n如您所见，模板缓冲区是一个非常强大的工具，拥有许多精妙之处。但更高级的用法将留待后续未命名的书籍中探讨。\n\
  \n现在来看看 `renderStage()` 方法，如清单 7-9 所示。\n\n## 清单 7-9. 仅将反射区域渲染到模板缓冲区\n\n```objc\n\
  -(void)renderStage\n{\n    static const GLfloat flatSquareVertices[] =\n    {\n\
  \        -0.5, 0.0, -.5f,\n        0.5, 0.0, -.5f,\n        -0.5, 0.0, 0.5,\n  \
  \      0.5, 0.0, 0.5\n    };\n\n    static const GLubyte colors[] =\n    {\n   \
  \     255, 0, 0, 128,\n        255, 0, 0, 255,\n        0, 0, 0, 0,\n        128,\
  \ 0, 0, 128\n    };\n\n    glFrontFace(GL_CW);\n    glPushMatrix();\n    glTranslatef(0.0,-1.0,-3.0);\n\
  \    glScalef(2.5,1.5,2.0);\n\n    glVertexPointer(3, GL_FLOAT, 0, flatSquareVertices);\n\
  \    glEnableClientState(GL_VERTEX_ARRAY);\n\n    glColorPointer(4, GL_UNSIGNED_BYTE,\
  \ 0, colors);\n\n    glDepthMask(GL_FALSE); //1\n    glColorMask(GL_TRUE, GL_FALSE,\
  \ GL_FALSE, GL_TRUE); //2\n    glDrawArrays( GL_TRIANGLE_STRIP,0, 4); //3\n    glColorMask(GL_TRUE,\
  \ GL_TRUE, GL_TRUE, GL_TRUE); //4\n    glDepthMask(GL_TRUE); //5\n\n    glPopMatrix();\n\
  }\n```\n\n在第 1 行中，深度缓冲区的写入被禁用；第 2 行则禁用了绿色和蓝色通道，因此只使用红色通道。这就是反射区域获得微小红光高亮的方式。\n\n\
  现在，我们可以在第 3 行将图像绘制到模板缓冲区中。\n\n第 4 行和第 5 行重置了掩码。\n\n\n\n此刻，`drawInRect()` 例程又需要修改了。哈欠连天……不过如果你还能打起精神，请查看代码清单\
  \ 7-10，它揭示了残酷且不加修饰的真相。\n\n抱歉重复了这么多之前的代码，但这比说“……在投石机那行代码后面，添加某行某某代码……”要容易得多。\n\n\
  ### 代码清单 7-10. 反射效果的 `drawInRect()` 方法\n\n```\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n\
  \n{\n\nstatic GLfloat z=-3.0;\n\nstatic GLfloat spinX=0;\n\nstatic GLfloat spinY=0;\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\nCHAPTER 7: Well-Rendered Miscellany\n\
  \n223\n\nstatic const GLfloat cubeVertices[] =\n\n{\n\n-0.5, 0.5, 0.5,\n\n0.5, 0.5,\
  \ 0.5,\n\n0.5,-0.5, 0.5,\n\n-0.5,-0.5, 0.5,\n\n-0.5, 0.5,-0.5,\n\n0.5, 0.5,-0.5,\n\
  \n0.5,-0.5,-0.5,\n\n0.5,-0.5,-0.5,\n\n};\n\nstatic const GLubyte cubeColors[] =\n\
  \n{\n\n255, 0, 0, 255,\n\n0, 255, 0, 255,\n\n0, 0, 0, 0,\n\n0, 0, 255, 255,\n\n\
  255, 255, 0, 255,\n\n0, 255, 255, 255,\n\n0, 0, 0, 0,\n\n255, 0, 255, 255,\n\n};\n\
  \nstatic const GLubyte tfan1[6 * 3] =\n\n{\n\n1,0,3,\n\n1,3,2,\n\n1,2,6,\n\n1,6,5,\n\
  \n1,5,4,\n\n1,4,0\n\n};\n\nstatic const GLubyte tfan2[6 * 3] =\n\n{\n\n7,4,5,\n\n\
  7,5,6,\n\n7,6,2,\n\n7,2,3,\n\n7,3,0,\n\n7,0,4\n\n};\n\nstatic float transY = 0.0;\n\
  \nglClearColor(0.0, 0.5, 0.7f, 1.0);\n\nglClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT\
  \ | GL_STENCIL_BUFFER_BIT); //1\n\n//首先渲染到模板缓冲区\n\n[self renderToStencil]; //2\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\nCHAPTER 7: Well-Rendered Miscellany\n\
  \n224\n\nglEnable(GL_CULL_FACE);\n\nglCullFace(GL_BACK);\n\nglMatrixMode(GL_MODELVIEW);\n\
  \nglLoadIdentity();\n\nglPushMatrix();\n\nglEnable(GL_STENCIL_TEST); //3\n\nglDisable(GL_DEPTH_TEST);\n\
  \nglVertexPointer(3, GL_FLOAT, 0, cubeVertices);\n\nglEnableClientState(GL_VERTEX_ARRAY);\n\
  \nglColorPointer(4, GL_UNSIGNED_BYTE, 0, cubeColors);\n\nglEnableClientState(GL_COLOR_ARRAY);\n\
  \nglEnableClientState(GL_NORMAL_ARRAY);\n\n//翻转图像\n\nglTranslatef(0.0,((GLfloat)(sinf(-transY)/2.0)-1.5),z);\
  \ //4\n\nglRotatef(spinY, 0.0, 1.0, 0.0);\n\nglScalef(1.0, -1.0, 1.0); //5\n\nglFrontFace(GL_CW);\n\
  \nglEnable(GL_BLEND); //6\n\nglBlendFunc(GL_ONE, GL_ONE_MINUS_SRC_COLOR);\n\nglDrawElements(\
  \ GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan1); //7\n\nglDrawElements( GL_TRIANGLE_FAN,\
  \ 6 * 3, GL_UNSIGNED_BYTE, tfan2);\n\nglPopMatrix();\n\nglDisable(GL_BLEND); //8\n\
  \nglEnable(GL_DEPTH_TEST);\n\nglDisable(GL_STENCIL_TEST);\n\n//绘制主图像\n\nglPushMatrix();\n\
  \nglScalef(1.0, 1.0, 1.0); //9\n\nglFrontFace(GL_CCW);\n\nglTranslatef(0.0, (GLfloat)1.5*(sinf(transY)/2.0)+0.5,z);\n\
  \nglRotatef(spinY, 0.0, 1.0, 0.0);\n\nglDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE,\
  \ tfan1); glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan2);\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info)\n\nCHAPTER 7: Well-Rendered Miscellany\n\
  \n225\n\nglPopMatrix();\n\nspinY+=.25;\n\ntransY += 0.075;\n\n}\n```\n\n下面是详细解析：\n\
  \n第 1 行，在 `glClear()` 中增加了 `GL_STENCIL_BUFFER_BIT`。\n\n第 2 行调用了新方法 `renderToStencil()`，该方法已在代码清单\
  \ 7-9 中定义。它将实际创建模板区域，也就是我们接下来要“开孔”并进行绘制的区域。\n\n第 3 行启用了模板测试。\n\n在第 4 行和第 5 行，绘制了倒影。首先将其向下平移\
  \ 1.5 个单位，以确保它位于真实立方体的下方。然后通过简单地将 y 轴“缩放”为 -1.0，使其上下颠倒。此时还需将正面设置为顺时针方向；否则，你只会看到背面。\n\
  \n我们希望下方图像的亮度低于全强度，这是符合预期的。在第 6 行，启用了混合，并使用第 6 章介绍的最常见的混合函数 `GL_ONE` 和 `GL_ONE_MINUS_SRC_COLOR`。\n\
  \n在第 7 行及后续行，我们看到翻转后的物体以与原始物体完全相同的方式绘制。绘制完成后，在第 8 行关闭混合，以免影响主立方体的渲染。同时，关闭模板测试，并重新开启深度测试。\n\
  \n由于之前为了翻转图像而改变了缩放，因此在第 9 行将缩放重置为默认值。平移量也做了一些微小调整。这使得翻转后的立方体略微上移，以获得额外的空间。\n\n现在进行测试。你应该会看到结果如图\
  \ 7-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 222](img/index-229_1.jpg)\n\
  \n![Image 223](img/index-229_2.jpg)\n\n![Image 224](img/index-229_3.jpg)\n\n**第\
  \ 7 章：精心渲染的杂项**\n**226**\n\n**图 7-8. 使用模板创建反射效果**\n\n## 阴影的来临\n\n在 OpenGL 中，阴影投射一直是一门偏玄学的技艺，在某种程度上现在依然如此。然而，随着更快的\
  \ CPU 和 GPU 的出现，许多过去更像研究生论文主题的行业技巧，终于可以走出理论，沐浴在实际应用的温暖光辉中。严格的阴影投射解决方案仍然是好莱坞使用的那种非实时渲染的领域，但在有限条件下，基本的阴影已经可用于全动态渲染。感谢各家硬件制造商为\
  \ GPU 增加了阴影和光照支持，我们的 3D 宇宙看起来比以往任何时候都更加丰富，因为计算机图形学中很少有元素能比精心处理的阴影带来更强的真实感。（去问问任何一部好莱坞电影的灯光总监就知道了。）别忘了还有通过\
  \ OpenGL ES 2 中的着色器实现的逐像素支持，它能让程序员在《毁灭一切 3》的每座阴森城堡的每个角落，都精细地渲染出阴影。\n\n有许多方法可以投射阴影，或者至少是看起来像阴影的东西。最简单的方法可能是使用预渲染的阴影纹理：一张看起来像是物体投射在地面上的阴影的位图，然后跟随物体的移动而移动。这种方法成本低、速度快，但极其有限。另一个极端是彻底的“渲染你所能看到的一切”软件，它能够轻松吞噬成堆的\
  \ GPU。介于两者之间，有阴影映射、阴影体积和投影阴影等方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 225](img/index-230_1.jpg)\n\n**第 7 章：精心渲染的杂项**\n**227**\n\n## 阴影映射\n\n\
  曾几何时，最流行的阴影投射形式之一是通过阴影映射来实现的，这在游戏中经常使用。虽然设置起来有点麻烦，更不用说描述了，但其理论却相当简单…...\n\n深度阴影映射需要场景的两个快照。一个从光源的视角拍摄，另一个从相机的视角拍摄。从光源视角渲染时，图像自然会显示出光源所照射的一切。颜色信息会被忽略，但深度信息会被保留，因此我们最终会得到一个可见片元及其相对距离的映射图。然后从相机视角拍摄一张。通过比较这两张图像，我们可以找出相机能看到但光源照射不到的区域。这些区域就处于阴影中。\n\
  \n当然，在实践中，这要稍微复杂一些。\n\n## 阴影体积\n\n阴影体积通过非常巧妙地利用模板缓冲区的某些特性，来确定场景中哪些部分被照亮，哪些部分没有被照亮。这项技术之所以如此强大，是因为它允许阴影投射到任意几何形状上，这与投影阴影（稍后讨论）不同，后者实际上只适用于阴影投射到平面上的简化情况。\n\
  \n\n\n当使用阴影体积技术渲染场景时，模板缓冲区会处于这样一种状态：最终图像中被遮蔽的任何部分，其对应的模板像素值都将大于零，而被照亮的任何部分，其对应的模板像素值则为零。见图\
  \ 7-9。\n\n图 7-9. 阴影体积展示了模板缓冲区中对应的数值：被照亮的部分为 0，阴影区域 >0\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n**第 7 章：精心渲染的杂项**\n\n**228**\n\n这一过程分三个阶段完成。第一遍渲染仅使用环境光，这样场景中的阴影部分依然可见。接下来是仅写入模板缓冲区的通道，最后阶段则是以完全光照渲染正常图像。然而，只有未被模板标记的像素可以被写入被照亮区域，同时它们被阻止写入阴影部分，从而只保留原始的环境光像素可见。在实践中，这要稍微复杂一些。\n\
  \n回到之前反射练习中用到的神秘的 `glStencilOp()` 函数，我们现在可以利用那些奇怪的 `GL_INCR` 和 `GL_DECR` 操作了。`GL_INCR`\
  \ 可以将模板像素的计数增加一，而 `GL_DECR` 则会将计数减少一，这两种操作都在特定条件下触发。\n\n“阴影体积”这个术语源自以下例子：想象一个雾夜。你拿着一个明亮的灯，比如汽车的一个前大灯，照向雾气中。现在在光束里玩手影戏。你仍然会看到部分光束绕过你那只拙劣模仿的爱荷华州形状的手影，然后飘向远方。我们对那部分不感兴趣。我们想要的是光束中变暗的部分，也就是你的手投下的阴影。那就是阴影体积。\n\
  \n在你的 OpenGL 场景中，假设有一个光源和几个遮挡物。这些遮挡物会在它们后面的任何物体上投下阴影，无论那是球体、圆锥体还是伍德罗·威尔逊的半身像。当你从侧面观察时，你会看到被遮蔽的物体和被照亮的物体。现在，从任意片段（无论是否被照亮）画一条指向摄像机的向量。如果该片段被照亮，根据定义，这条向量必须穿过阴影体积的偶数个面：一个面进入阴影体积，一个面出来（当然，忽略场景边缘的向量这一特殊情况，它可能不必穿过任何阴影区域）。对于在某个阴影体积内部的片段，该向量必须穿过奇数个面；使其数量变为奇数的那个额外的面，正是来源于该片段自身所在的体积。\n\
  \n明白了吗？等等，还有更妙的。\n\n现在回到模板缓冲区。阴影体积被生成得看起来像其他几何体，但只绘制到模板缓冲区中，由于所有颜色缓冲区都被关闭，它们将不可见。利用深度缓冲区，当阴影体积的壁比真实几何体更近时，它们才会被渲染到模板中。这一技巧使得阴影能够勾勒出任意物体的轮廓，而无需进行复杂繁琐的平面与球体或复活节岛雕像相交的计算。它仅仅利用深度缓冲区进行逐像素测试，来决定阴影的边界。因此，当阴影体积被渲染到模板缓冲区时，每个阴影锥体的每一侧都会以不同方式影响模板。朝向我们的那一侧会使模板缓冲区的值加一，而另一侧则会使值减一。因此，在阴影体积另一侧的被照亮区域，会与模板遮罩中所有像素都设为零的部分相匹配，因为向量在进入和离开时需要穿过的面数量相同。而处于阴影中的任何部分，其对应的模板值则为\
  \ 1。\n\n懂了吗？这就是为什么阴影体积从未被选用于该练习的原因。\n\n\n\n"
