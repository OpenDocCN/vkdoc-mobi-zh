  \n```\n-(void)setClipping\n{\n    float aspectRatio;\n    const float zNear = .1;\
  \ //1\n    const float zFar = 1000; //2\n    const float fieldOfView = 60.0; //3\n\
  \    GLfloat size;\n\n    CGRect frame = [[UIScreen mainScreen] bounds]; //4\n\n\
  \    //高度和宽度值将视场角限制在高度上；翻转后它将相对宽度而言。\n    //因此，如果我们希望视场角为 60 度（类似于广角镜头），它将基于窗口的高度而非宽度。\n\
