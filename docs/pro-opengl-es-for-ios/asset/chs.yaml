  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 8 章：整合所有内容**\n\n**248**\n\
  \n**这些四元数到底是什么？**\n\n1843 年 10 月 16 日，在都柏林，爱尔兰数学家威廉·哈密顿爵士在皇家运河旁散步时，突然灵光一现。他一直在寻找将空间中的两点进行有意义的乘法和除法的方法，突然间脑海中闪过了四元数的公式：*i*²\
  \ = *j*² = *k*² = *ijk* = −1。\n\n很厉害吧？\n\n\n他激动得无法抗拒诱惑，将这一发现刻在了刚走过的布鲁厄姆桥的石头上（无疑夹在那些较浅的涂鸦之间，比如“埃蒙爱菲奥娜，1839”或“帕特里克·奥卡拉汉最棒！”）。全新的物理和几何视角直接源于这一洞见。例如，电磁理论中的经典麦克斯韦方程组完全通过四元数来描述。随着处理类似问题的新方法出现，四元数一度被冷落，直到\
  \ 20 世纪末，它们才在三维计算机图形学、阿波罗宇宙飞船的月球导航以及其他严重依赖空间旋转的领域找到了重要角色。由于其紧凑的特性，它们比标准的`3x3`矩阵更高效地描述方向向量，进而实现三维旋转。不仅如此，它们还提供了将一系列旋转叠加在一起的远为优越的方式。那么，这意味着什么呢？\n\
  \n在第 2 章中，我们介绍了使用矩阵的传统三维变换数学。如果你想将物体绕`z 轴`旋转 32°，你会指示 OpenGL ES 通过命令`glRotation(32,0,0,1)`执行旋转。类似命令也会用于`x\
  \ 轴`和`y 轴`。但如果你想实现飞机向左倾斜时的那种奇特旋转，该如何用`glRotatef()`格式描述呢？使用更传统的方法，你需要为三个旋转分别生成矩阵，然后按偏航（绕`Y\
  \ 轴`旋转）、俯仰（绕`X 轴`旋转）和滚转（绕`Z 轴`旋转）的顺序将它们相乘。这种计算量很大，却只为对准一个方向。但如果这是用于飞行模拟器，你的倾斜动作会不断更新为新的滚转和航向，每次都是增量变化。这意味着每次都需要为上一帧以来的轨迹增量计算三个矩阵，而不是从某个起点开始的绝对值。\n\
  \n在计算机早期，浮点运算成本高昂，且出于性能考虑经常采用捷径，舍入误差很常见，并可能随时间累积，导致当前矩阵“失准”。然而，四元数因其几个极具吸引力的特性而救场。首先，四元数可以表示空间中物体的旋转，大致相当于`glRotatef()`的工作方式，但使用分轴值。这并不是一一对应的关系，因为你仍然需要做一些数学转换，将姿态与四元数相互转换。第二个也是更重要的特性源于这样一个事实：球面上的弧可以由两个四元数描述，每个端点一个。而弧上任意点之间的位置，也只需通过球面几何在端点之间插值距离即可得到四元数，如图\
  \ 8-2 所示。也就是说，如果你要经过一个 60°的弧，你可以沿着弧走三分之一的路程，找到距离起点 20°的中间四元数。在下一帧中，如果你要跳到 20.1°，只需在当前四元数上增加极小的一段弧，而无需每次都重复生成三个矩阵并相乘的繁琐过程。这个过程称为\
  \ slerping（球面线性插值，slerp 是其缩写）。由于轴/角度对不像使用矩阵时那样依赖于所有先前值的累积求和，而是基于瞬时值，因此不会因前者产生误差累积。\n\
  \n图 8-2. 球面上的中间四元数；`Q1.5`可以从另外两个四元数`Q1`和`Q2`插值得到。\n\nSlerp 用于在视点的“相机”从一个点到另一个点时提供平滑动画。它可用于飞行模拟器、太空模拟器，或赛车游戏中追逐车辆的视角。当然，它们也用于真实的飞行导航系统。\n\
  \n现在，有了这些背景知识，我们将使用四元数来帮助移动地球。\n\n## 在三维空间中移动物体\n\n由于我们目前没有为地球制作动画，因此需要一种方法移动它，以便从各个角度观察它。考虑到地球是我们的兴趣目标，我们将设置一个场景，使视点有效悬浮在地球上方，并通过捏合和拖拽手势控制。\n\
  \n第一步是添加手势识别器，这些功能在 iPad 上从第一代就可用，但在其他设备上直到 iOS 4 才可用。\n\n**注意** 对于“真实”应用，你可能需要考虑手势识别器的便利性是否值得放弃那些仅支持\
  \ iOS 3.x 的第一代 iOS 用户。\n\n如果你是 iOS 编程新手，可能还没接触过手势识别器。简而言之，它们处理了确定用户进行了哪种触摸手势的繁琐工作，而这在早期是开发者必须自己做的。这可能会变得非常混乱，尤其是在处理旋转手势时。滑动、轻点、捏合和平移手势也同样被处理。然而，它们确实忽略了惯性滑动，即手指抬起后能让列表继续滚动一段时间的动作。\n\
  \n这里我们只需要捏合和平移手势。在你的视图控制器的`viewDidLoad()`方法中，添加清单 8-2。\n\n**清单 8-2.** 分配手势识别器\n\n\
  ```\nUIPinchGestureRecognizer *pinchGesture =\n[[UIPinchGestureRecognizer alloc]initWithTarget:self\n\
  action:@selector(handlePinchGesture:)];\n[self.view addGestureRecognizer:pinchGesture];\n\
  UIPanGestureRecognizer *panGesture =\n[[UIPanGestureRecognizer alloc]initWithTarget:self\n\
  action:@selector(handlePanGesture:)];\n[self.view addGestureRecognizer:panGesture];\n\
  ```\n\n接下来，我们需要添加两个处理程序，`handlePanGesture()`和`handlePinchGesture()`，如清单 8-3 所示。\n\
  \n**清单 8-3.** 两个手势识别器的处理程序\n\n```\n- (IBAction)handlePanGesture:(UIPanGestureRecognizer\
  \ *)sender\n{\n    static CGPoint prevLocation;\n    CGPoint translate = [sender\
  \ translationInView:self.view];\n    UIGestureRecognizerState state;\n    state\
  \ = sender.state;\n    if(state == UIGestureRecognizerStateBegan)\n    {\n     \
  \   prevLocation = translate;\n        [m_SolarSystem lookAtTarget];\n    }\n  \
  \  else if(state == UIGestureRecognizerStateChanged)\n    {\n        CGPoint currlocation\
  \ = translate;\n        m_PointerLocation = CGPointMake(currlocation.x, currlocation.y);\n\
  \        [self setHoverPosition:0 location:currlocation prevLocation:prevLocation];\n\
  \        prevLocation = currlocation;\n    }\n}\n\n- (IBAction)handlePinchGesture:(UIGestureRecognizer\
  \ *)sender\n{\n    static float startFOV = 0.0;\n    CGFloat factor = [(UIPinchGestureRecognizer\
  \ *)sender scale];\n    UIGestureRecognizerState state;\n    state = sender.state;\n\
  \    if(state == UIGestureRecognizerStateBegan)\n    {\n        startFOV = [m_SolarSystem\
  \ getFieldOfView];\n    }\n    else if(state == UIGestureRecognizerStateChanged)\n\
  \    {\n        float minFOV = 5.0;\n        float maxFOV = 75.0;\n        float\
  \ currentFOV;\n        currentFOV = startFOV * factor;\n        if((currentFOV >=\
  \ minFOV) && (currentFOV <= maxFOV))\n            [m_SolarSystem setFieldOfView:currentFOV];\n\
  \    }\n}\n```\n\n\n`handlePanGesture()` 计算手指在屏幕上拖动时触摸位置与上次调用之间的差异。它将这些差异传递给 `setHoverPosition()`，后者将把视点移动到地球上的新位置。在头文件中添加\
  \ `CGPoint m_PointerLocation`。\n\n另一个处理程序 `handlePinchGesture()` 处理捏合操作。`UIPinchGestureRecognizer()`\
  \ 返回一个简单的缩放值，手势开始时该值为 1.0。随着手势继续，状态变为 `UIGestureRecognizerStateChanged`，缩放值对于展开捏合（放大）而增加，对于收缩捏合（缩小）而减小。\n\
  \n这里需要缓存显示的初始视场角，因为每个缩放值是累积的，而非相对于前一个事件的增量。这样，我们每次都是基于原始值进行缩放，而不是重新缩放视场角——如果只处理增量则会出现后一种情况。否则，视场角会以越来越大的跳跃方式变化。此外，请注意我限制了视场角的取值范围，从\
  \ 5° 到 75°。\n\n现在，需要在太阳系处理程序（solar-system handler）中添加实例变量 `float m_FieldOfView`，以及清单\
  \ 8-4 中的存取方法，并将其初始化为 30°。\n\n清单 8-4：太阳系控制器中 `m_FieldOfView` 的存取方法\n\n```\n-(float)getFieldOfView\n\
  {\n    return m_FieldOfView;\n}\n```\n\n```\n-(void)setFieldOfView:(float)fov\n\
  {\n    m_FieldOfView=fov;\n    [self setClipping];\n}\n```\n\n然后将 `setClipping()`\
  \ 从视图控制器移至太阳系控制器，并用 `m_FieldOfView` 替换自动变量 `fieldOfView`，确保在程序启动时将其初始化为类似 30° 的值，并在对象创建时调用\
  \ `setClipping()`（就像之前在视图控制器中所做的那样）。现在必须重新初始化投影矩阵，因为在捏合缩放操作期间会重复调用 `setClipping()`，我们不希望它们相互叠加。否则，视图很快就会变得混乱。\n\
  \n最后，需要添加两个存根方法，以防止意外执行拖拽操作时崩溃。这些将在下一个任务中完善。在视图控制器中添加：\n\n```\n-(void)setHoverPosition:(unsigned)nFlags\
  \ location:(CGPoint)location prevLocation:(CGPoint)prevLocation\n{\n}\n```\n\n在太阳系控制器中添加：\n\
  \n```\n-(void)lookAtTarget\n{\n}\n```\n\n如果一切按设计工作，您应该能够对地球模型进行缩放，如图 8-3 所示。\n\n\
