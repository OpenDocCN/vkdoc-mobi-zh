  \ `miniglu.h`。\n\n这段代码保持为通用 C 语言，因为 GLUT 的设计初衷就是尽可能可移植。\n\n**代码清单 8-6：** `miniGLU.mm`\
  \ 的两个例程\n\n```\nvoid gluLookAt(GLfloat eyex, GLfloat eyey, GLfloat eyez,\nGLfloat\
  \ centerx, GLfloat centery, GLfloat centerz,\nGLfloat upx, GLfloat upy, GLfloat\
  \ upz)\n{\nGLKVector3 up; //1\nGLKVector3 from,to;\nGLKVector3 lookat;\nGLKVector3\
  \ axis;\nfloat angle;\n\nlookat.x=centerx;\n//2\nlookat.y=centery;\nlookat.z=centerz;\n\
  \nfrom.x=eyex;\nfrom.y=eyey;\nfrom.z=eyez;\n\nto.x=lookat.x;\nto.y=lookat.y;\nto.z=lookat.z;\n\
  \nup.x=upx;\nup.y=upy;\nup.z=upz;\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n第 8 章：整合所有内容\n\n255\n\nGLKVector3 temp = GLKVector3Subtract(to,from);\n//3\nGLKVector3\
  \ n=GLKVector3Normalize(temp);\n\ntemp = GLKVector3CrossProduct(n,up);\nGLKVector3\
  \ v=GLKVector3Normalize(temp);\n\nGLKVector3 u = GLKVector3CrossProduct(v,n);\n\n\
  m_Quaternion= //4\nGLKQuaternionMakeWithMatrix3(GLKMatrix3MakeWithRows(v,u,GLKVector3Negate(n)));\n\
  \naxis=GLKQuaternionAxis(m_Quaternion);\nangle=GLKQuaternionAngle(m_Quaternion);\n\
  \nglRotatef(angle*57.29, axis.x, axis.y, axis.z); //5\n}\n\nGLKQuaternion gluGetOrientation()\n\
  {\nreturn m_Quaternion;\n}\n```\n\n在我们继续之前，`gluLookAt()` 需要——呃，大量的解释。`gluLookAt()`\
  \ 的作用正如其名。你向它传递视点的位置、要观察的目标，以及一个用于指定滚转角的上向量。通常，指向上方就意味着没有滚转。但你还是需要提供这个参数。\n\n让我们更仔细地看看：\n\
  \n如上所述，我们需要获取点或向量来完全描述我们在空间中的位置以及目标的位置，如第 1 行及后续行所示。上向量是相对于视点的，通常只是一个指向 y 轴正方向的单位向量。如果你想实现倾斜滚转，可以修改这个向量。\n\
  \n在第 2 行及后续行，以离散值传入的参数被映射到了 `GLKVector3` 对象。为什么不直接使用向量对象呢？官方的 GLUT 库不使用向量对象，这样更符合现有的标准。\n\
  \n第 3 行及后续行生成了三个新的向量，其中两个是通过叉积计算得到的。这确保了所有向量都归一化并且轴是正交的。\n\n一些使用 `gluLookAt()` 的例子会生成一个矩阵。但这里我们使用的是四元数。在第\
  \ 4 行，四元数由我们的新向量创建，并用于获取 `glRotatef()` 所喜欢的轴/角度参数，如第 5 行所示。请注意，生成的四元数会通过一个全局变量缓存起来，这样如果后续需要通过\
  \ `gluGetOrientation()` 获取即时姿态，就可以直接使用。这虽然有些笨拙，但确实能用。在实际应用中，你可能不会想这样做，因为它假设你的整个世界中只有一个视点。现实中，你可能希望有多个视点——例如，如果你想同时用两个显示器从不同的角度展示你的对象。\n\
