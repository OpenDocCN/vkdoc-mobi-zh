  \ += texIncrease;\ntextureCoords[5] += texIncrease;\ntextureCoords[7] += texIncrease;\n\
  ```\n\n这将使纹理坐标在每一帧中略微增加。运行它，你会惊叹不已。这是一个实现纹理动画的非常简单的小技巧。在 3D 世界中，跑马灯效果可能会用到它。你可以创建一个类似电影胶片的纹理，其中包含一个卡通角色在做某个动作，然后通过修改`s`和`t`值，像翻页动画书一样在不同帧之间跳转。另一种用途是创建基于纹理的字体。由于\
