  \n第 1 行创建了一种更浅的黄色。这只是为了让太阳的颜色略微更准确一些。\n\n我们需要一种黑色，以便在需要时“关闭”某些材质特性，如第 2 行所示。\n\n\
  在第 3 行中，需要轨道增量来让地球绕太阳公转。\n\n\n```markdown\n第 4 行的 `glPushMatrix()` 是一个新的 API 调用。当它与\
  \ `glPopMatrix()` 配合使用时，有助于将世界某一部分的变换与另一部分隔离开来。在这种情况下，第一个 `glPushMatrix()` 实际上防止了后续对\
  \ `glTranslate()` 的调用在自身基础上累加新的平移。你可以移除这对 `glPush`/`PopMatrix` 调用，并将 `glTranslate()`\
  \ 移出 `execute()`，放入初始化代码中，只要它只被调用一次即可。\n\n第 5 行的平移确保了物体从我们的视点处“移开”。记住，在 OpenGL ES\
  \ 世界中，一切实际上都是围绕视点旋转的。我更倾向于拥有一个不依赖于观察者位置的世界原点，在这个例子中，原点就是太阳的位置，用相对于视点的偏移量来表示。\n\n\
  第 6 行只是强制执行太阳位于原点。哦！第 7 行又有一个 `glPushMatrix()`。这确保了地球上的任何变换都不会影响太阳。\n\n第 8 行和第 9\
  \ 行让地球围绕太阳公转。怎么做到的？第 10 行调用了一个小的实用函数。该函数执行必要的平移，并在地球需要时将其移离原点。回想一下，变换可以被理解为“最后调用，最先使用”。因此，`executePlanets()`\
  \ 中的平移实际上先执行，然后才是 `glRotation()`。请注意，这种方法会让地球以完美的圆形轨道运行，而实际上，没有行星拥有完美的圆形轨道，因此之后会使用\
  \ `glTranslation()`。\n\n第 11 行的 `glPopMatrix()` 丢弃了所有仅适用于地球的变换。\n\n第 12 行将太阳的材质设置为自发光。请注意，对\
  \ `glMaterialfv()` 的调用并不绑定到任何特定对象。它们仅设置当前材质，该材质会被所有后续对象使用，直到下一次调用发生。第 13 行关闭了用于地球的高光设置。\n\
  \n第 14 行再次调用了我们的实用函数，这次是为太阳调用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n# 第 4 章：开启光照\n\n**127**\n\n自发光材质属性在第 15 行被关闭，随后是另一个 `glPopMatrix()`。请注意，每次使用压栈矩阵时，都必须与一个出栈配对。OpenGL\
  \ ES 可以处理最多 16 层的栈。此外，由于 OpenGL 使用了三种矩阵（模型视图矩阵、投影矩阵和纹理矩阵），请确保你是在正确的栈上进行压栈/出栈操作。你可以通过记住使用\
  \ `glMatrixMode()` 来确保这一点。\n\n现在，在 `executePlanet()` 中，第 17 行获取了行星的当前位置，以便第 18 行可以将行星平移到正确位置。在本例中，它实际上从未改变，因为我们让\
  \ `glRotatef()` 来处理轨道职责。否则，xyz 坐标会作为时间的函数不断变化。\n\n最后，在第 19 行调用行星自身的 `execute` 例程。\n\
