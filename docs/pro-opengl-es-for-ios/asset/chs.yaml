  \n    glBindVertexArrayOES(_vertexArray); //15\n\n    // 使用 GLKit 渲染对象。\n    [self.effect\
  \ prepareToDraw]; //16\n\n    glDrawArrays(GL_TRIANGLES, 0, 36); //17\n\n    //\
  \ 使用 ES2 再次渲染对象。\n    glUseProgram(_program); //18\n\n    glUniformMatrix4fv(uniforms[UNIFORM_MODELVIEWPROJECTION_MATRIX],\
  \ 1, 0, _modelViewProjectionMatrix.m);\n    glUniformMatrix3fv(uniforms[UNIFORM_NORMAL_MATRIX],\
  \ 1, 0, _normalMatrix.m);\n\n    glDrawArrays(GL_TRIANGLES, 0, 36); //19\n}\n```\n\
  \n让我们看看这里发生了什么：\n\n第 1 行，`update` 方法的开始，实际上是来自新 `GLKViewController` 对象的委托调用之一。这支持帧率提示，例如，“我希望我的新游戏《危险贵宾犬》能够以每秒\
  \ 60 帧的速度更新”。\n\n\n\n"
- '# 排版后的文档


  以 100 fps 进行，如果可以的话。它还会让你知道它的实际帧率、自会话开始以来的帧数，并处理暂停和恢复功能。


  在第 2 行中，除了定义要显示的对象外，我们还需要定义视锥体。这简单地指定了你希望在世界中看到的区域范围。可以将其视为摄像机的变焦镜头，你可以拉近或拉远。然后，这会被转换为一个`projection-matrix`，类似于我们之前看到的变换矩阵。它封装了将对象投影到设备显示上的信息。


  请注意，提供给`GLKMatrix4MakePerspective`的第一个值是 65，这意味着我们希望“镜头”具有 65 度的视角。这是利用 GLKit 中的众多新数学库调用之一生成的。这些调用包括对向量、矩阵和四元数（稍后介绍）的支持，专门用于
  3D 场景操作。


  需要告知用于容纳其中一个立方体的`GLKBaseEffect`在第 3 行中使用此矩阵。


  第 4 行生成了一个平移矩阵。这描述了如何在空间中移动或平移对象。在这种情况下，-4 值将其从视点移开 4 个单位。默认情况下，OpenGL 坐标系中 X 轴为左右方向，Y
  轴为上下方向，Z 轴为前后方向。我们正看向 -Z 方向。


  矩阵`baseModelViewMatrix`得名于 OpenGL 的“ModelView”矩阵，这是比任何其他矩阵调用都更频繁的一个矩阵。


  通过首先应用它，我们实际上将整个世界移开了 4 个单位。下面，我们为各个立方体添加单独的运动。


  现在我们要旋转立方体。第 5 行显示，可以通过将变换矩阵相乘来将它们串联起来。这里我们重用了上一行的`baseModelView`矩阵。


  “什么？”你无疑会问，“又是这些愚蠢的矩阵东西？”即使是看似简单的运动有时也需要一系列复杂的旋转和平移。在第 6 行中，立方体从自身原点移开了 1.5 个单位。这就是为什么两个立方体实际上都没有居中在屏幕上，而是围绕着一个看不见的东西运行。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  **第 1 章：计算机图形学：从过去到现在**


  **25**


  第 7 行对立方体世界的每个轴应用旋转。每次循环迭代时都会更新旋转值。


  第 8 行将先前完成的`baseModelViewMatrix`应用于这个正在从视点移开的立方体。然后，这个合并后的矩阵与投影矩阵一起在第 9 行被赋值给`GLKBaseEffect`对象。


  在第 10 行中，对绘制蓝色立方体的 OpenGL ES 2 独立代码块重复了大部分相同操作。第 10 行及之后的行，与第 6、7 和 8 行完全相同，只是平移是正方向，而不是负方向。


  现在，在第 11 行，我们需要另一个矩阵，这次是针对之前介绍的面法线。当法线长度恰好为 1 个单位时，它们通常处于最理想状态，即被称为“归一化”。这会抵消之前的变换矩阵可能引入的任何失真。


  第 12 行将模型视图矩阵与之前完成的投影矩阵结合起来。


  在第 13 行，旋转值略有增加。将其乘以`timeSinceLastUpdate`值可确保旋转速率是平滑的。


  第二个方法`drawInRect()`是实际渲染对象的方法。第 14 行清除了屏幕背景。这里`glClearColor()`被设置为显示所有三种颜色的 65%
  值，以产生你所看到的浅灰色。`glClear()`实际执行清除操作，但仅限于你指定的缓冲区——在本例中，是“颜色缓冲区”（即主缓冲区）和深度缓冲区（用于隐藏面移除，保存
  Z 值）。


  在第 15 行，我们终于可以使用很久以前创建的 `VAO`。将其绑定到系统意味着使用之前上传到 GPU 的集合数据。




  第一个渲染的立方体是由`GLKBaseEffect`对象管理的。第 16 行告诉它准备渲染，第 17 行实际命令它执行渲染。


  现在，从第 18 行开始，我们开始使用着色器来处理另一个立方体。`glUseProgram()`告诉程序使用之前已经加载的两个神秘着色器文件`Shader.fsh`和`Shader.vsh`，而两个`glUniform`调用则将模型视图矩阵和投影矩阵传递给它们。


  接着，在第 19 行再次调用`glDrawArrays()`，这样就完成了渲染！


  处理和使用着色器的部分是唯一需要关注的。这个过程包括首先将它们加载到内存中，然后编译，最后链接。如果一切按计划进行，可以通过调用`glUseProgram()`来启用它们。


  其中一个文件`Shader.vsh`在硬件开始处理顶点时拦截顶点信息，而另一个文件`Shader.fsh`则实际上允许你在每个像素被发送到显示硬件之前对其进行操作。


  **不断调整，不断改进**


  每当学习一门新技术时，我都会调整参数值，看看会发生什么。如果结果如我所料，我会感觉就像刚获得了一项新的超能力。


  那么，我们来试验一下。


  为了好玩，我们调整几个值。首先，回到前面几页的`gCubeVertexData`，将第一个值从`0.0`改为`1.0`。你觉得会看到什么？


  是不是像图 1-10 那样？


  图 1-10. 移动一个顶点后的效果


  **那着色器呢？**


  这里并不是深入讲解着色器设计和语言的地方，但让我们也通过摆弄它们来揭开一些神秘面纱。列表 1-3 是顶点着色器。


  列表 1-3. 预处理顶点的`Shader.vsh`


  ```

  attribute vec4 position;

  attribute vec3 normal;

  varying lowp vec4 colorVarying;

  uniform mat4 modelViewProjectionMatrix;

  uniform mat3 normalMatrix;

  void main()

  {

  vec3 eyeNormal = normalize(normalMatrix * normal);

  vec3 lightPosition = vec3(0.0, 0.0, 1.0); //1

  vec4 diffuseColor = vec4(0.4, 0.4, 1.0, 1.0);

  float nDotVP = max(0.0, dot(eyeNormal, normalize(lightPosition)));

  colorVarying = diffuseColor * nDotVP;

  gl_Position = modelViewProjectionMatrix * position; //2

  }

  ```


  在这个顶点着色器中，光线是针对这个特定立方体隐藏的；这些值是`x`、`y`和`z`值。将中间的值改为`5.0`，这将会把光线移到场景上方很远，但只会影响蓝色立方体。


  在第 2 行，`gl_Position`是一个预定义的对象，它携带当前顶点的位置。


  在末尾添加以下一行：`gl_Position.x*=.5;`。图 1-11a 显示了结果。


  图 1-11a,b. 左侧是顶点着色器中垂直缩放的变化，右侧是片段着色器中的颜色变化。


  现在快速浏览一下片段着色器，如列表 1-3 所示。它什么也不做，仅仅是一个透传着色器。然而，正是在这里，你可以拦截对每个“片段”（在此级别上类似于像素）的调用。在末尾添加一行`gl_FragColor.g=1.0;`。这会为图像中的每个像素添加绿色，看起来像图
  1-11b。看到了吗？这并不难，对吧？现在你可以自豪地走出去，告诉你的朋友你一整天都在编写着色器程序，然后看着赞美之词在你脚下堆积如山。


  列表 1-3. 片段着色器


  ```

  varying lowp vec4 colorVarying;

  void main()

  {

  gl_FragColor = colorVarying;

  }

  ```




