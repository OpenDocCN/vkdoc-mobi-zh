  \n![图 209](img/index-203_1.jpg)\n\n### 第 6 章：它会混合吗？——200\n\n**图 6-18.** 咦？\n\n这里发生的情况是，我们正在探索组合器未曾涉足的领域。通过加入我们自己的光照，由光矢量提供的模拟光照效果被抵消了。当光源在左侧时，效果看起来不错，这主要归功于运气。如果你的场景光照相对静止，凹凸贴图在此处效果尚可。但它不兼容多光源。实际上，通过光矢量指定的伪光照效果会被“真实”光源所忽略。此外，如果关闭这些真实光源，光矢量会完全忽略物体上的任何着色。在这种情况下，你会看到整个地球变亮又变暗，因为这是纹理本身所呈现的效果——纹理仅仅是一个二维表面。如果它的一部分被照亮，那么全部都会被照亮。那么，一个\
