  \n**第 1 章：计算机图形学：从过去到现在**\n\n**8**\n\n图 1-6：吉姆·布林描绘的 1981 年 8 月“旅行者 2 号”飞越土星的场景。请注意穿越环平面时由冰粒形成的条纹。图片由\
  \ NASA 提供。\n\n图 1-7：将图 1-6（使用当时最先进的图形计算机和软件）与`Distant Suns 3`（运行在价值 500 美元的 iPad\
  \ 上）中相似的土星景象进行比较。\n\n**在好莱坞走向成熟**\n\n计算机图形学在 20 世纪 80 年代真正开始崭露头角，这要归功于好莱坞以及那些性能越来越强大、成本却越来越低的机器。例如，1985\
  \ 年推出的备受喜爱的康懋达`Amiga`，售价不到 2000 美元，却为消费市场带来了先进的多任务操作系统和彩色图形，而这些此前是价值超过 10 万美元的工作站的专属。见图\
  \ 1-8。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 12](img/index-14_1.jpg)\n\
  \n**第 1 章：计算机图形学：从过去到现在**\n\n**9**\n\n图 1-8：1985 年左右生产的 Amiga 1000。照片由 Kaivv 拍摄，遵循知识共享署名\
  \ 2.0 通用许可协议（[`creativecommons.org/licenses/by/2.0/deed.en`](http://creativecommons.org/licenses/by/2.0/deed.en)）。\n\
  \n将此与 18 个月前发布、价格相近的原版黑白 Mac 进行比较。Mac 配备了非常原始的操作系统、平面文件系统和 1 位显示器，这为不同阵营之间爆发的关于谁家机器更好的“宗教战争”提供了肥沃的土壤（这些战争也波及了\
  \ Atari ST）。\n\n**注意** 原始`Amiga`上的一种特殊图形模式可以将 4096 种颜色压缩到一个通常最多只能支持 32 色的系统中。这种模式被称为“保持并修改”（HAM\
  \ 模式），最初由设计师杰伊·迈纳（Jay Miner）出于实验目的将其放在了一个主芯片上。尽管他想移除这个公认的、会产生大量色彩失真图像的权宜之计，但这样会在芯片上留下一个大空白区域。考虑到没有一个自尊的工程师能容忍闲置的芯片区域，他便保留了这一功能。令迈纳大吃一惊的是，人们开始使用它。\n\
  \n堪萨斯州一家名为`NewTek`的公司率先使用`Amiga`与其特殊硬件`Video Toaster`相结合，用于渲染高质量 3D 图形。结合名为`Lightwave\
  \ 3D`的复杂 3D 渲染软件包，`NewTek`向任何愿意花费几千美元的人敞开了获得廉价、网络级图形的大门。这一发展为诸如《巴比伦 5 号》或《深海冒险》这样需要大量特效的科幻剧集在经济上可行提供了可能。\n\
  \n在 20 世纪 80 年代，更多技术和创新逐渐在计算机图形学社区中得到普及：\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 13](img/index-15_1.jpg)\n\n**第 1 章：计算机图形学：从过去到现在**\n\n**10**\n\n洛伦·卡彭特（Loren\
  \ Carpenter）开发了一种使用称为分形的技术，通过算法生成高度精细的地形。卡彭特\n\n\n\n\n`was` 受雇于卢卡斯影业，为一家名为皮克斯的新公司创建渲染软件包。成果便是\
  \ `REYES`，代表“渲染你曾见过的一切”（Render Everything You Ever Saw）。\n\n特纳·惠特德开发了一种名为光线追踪的技术，能够生成高度逼真的场景（但会消耗大量\
  \ CPU 资源），尤其是当场景中包含具有各种反射和折射属性的物体时。玻璃物品是早期光线追踪作品中常见的主题，如图 1-9 所示。\n\n弗兰克·克劳发明了计算机图形学中首个实用的抗锯齿方法。锯齿现象是由于显示分辨率较低而产生的边缘锯齿状效应。克劳的方法能够平滑从线条到文字的所有元素，生成更自然、更悦目的图像。请注意，卢卡斯影业的早期游戏之一名为\
  \ `Rescue on Fractalus`。其中的反派被称为“锯齿怪”（jaggies，也是抗锯齿的另一个术语）。\n\n《星际迷航 2：可汗之怒》带来了首个完全由计算机生成的场景序列，用于展示一种名为“创世机器”的设备如何能在无生命星球上创造生命。该模拟被称为“永不消逝的特效”，因为它采用了火焰和粒子动画方面的开创性技术，同时使用了分形地形。\n\
  \n图 1-9. 像这样的精美图像，业余爱好者使用诸如开源软件 POV-Ray 等程序也能制作出来。摄影：Gilles Tran，2006 年。  \nwww.it-ebooks.info\n\
  \n"
- "# 第 1 章：计算机图形学：从过去到现在\n\n20 世纪 90 年代带来了《终结者 2：审判日》中的 T1000“液态金属”终结者、首部完全由计算机生成的长篇动画电影《玩具总动员》、《侏罗纪公园》中逼真的恐龙动画，以及詹姆斯·卡梅隆的《泰坦尼克号》，所有这些都帮助巩固了\
  \ CG 作为好莱坞导演工具箱中常用工具的地位。\n\n到 90 年代末，几乎很难找到哪部电影在制作过程中没有使用计算机图形学——无论是用于实际效果，还是后期制作中帮助清理各种场景。新技术仍在不断开发中，并以更加壮观的方式得到应用，例如迪士尼精彩的《飞屋环游记》或詹姆斯·卡梅隆绝美的《阿凡达》。\n\
  \n现在，再次拿出你的 i 设备，意识到它是一个多么小巧的技术奇迹吧。请随意用低沉而充满敬意的语气说出“哇”。\n\n## 工具包\n\n如果没有软件，前面提到的所有\
  \ 3D 魔法都不可能实现。许多 CG 软件程序高度专业化，而其他一些则更为通用，例如本书的重点 `OpenGL ES`。那么，以下是众多可用工具包中的几个。\n\
  \n### OpenGL\n\n开放图形库（`OpenGL`）源于高端图形工作站和大型机制造商 `SGI` 的开创性努力。其专有的图形框架 `IRIS-GL`\
  \ 已发展成为整个行业的事实标准。为了在竞争加剧时留住客户，`SGI` 选择将 `IRIS-GL` 转变为开放框架，以巩固其作为行业领导者的声誉。`IRIS-GL`\
  \ 被剥离了非图形相关功能和硬件相关特性，更名为 `OpenGL`，并于 1992 年初发布。截至撰写本文时，4.1 版本是最新版本。\n\n随着小型手持设备变得越来越普遍，`OpenGL\
  \ for Embedded Systems`（`OpenGL ES`，嵌入式系统开放图形库）被开发出来，它是桌面版的一个精简版本。它移除许多更冗余的 `API`\
  \ 调用，同时简化了其他元素，使其能够在低功耗 CPU 上高效运行。因此，它已被广泛采用于众多平台，如 Android、iOS、任天堂 3DS 和黑莓（操作系统\
  \ 5.0 及以上版本）。\n\n`OpenGL ES` 主要分为两个版本：1.x 和 2.x。许多设备同时支持两者。1.x 是基于原始 `OpenGL` 规范的高级变体。2.x\
  \ 版本（是的，我知道这容易混淆）则针对可以通过可编程图形硬件处理的更专门化的渲染任务。\n\n### Direct3D\n\n\n\n\n### Direct3D\n\
  \n`Direct3D`（`D3D`）是微软为应对`OpenGL`而推出的解决方案，主要面向游戏开发者。1995 年，微软收购了一家名为 RenderMorphics\
  \ 的小公司，该公司专门开发用于编写游戏的 3D 框架`RealityLab`。`RealityLab`后来被改造为`Direct3D`，并于 1996 年夏季首次发布。尽管它是\
  \ Windows 系统的专有技术，但在微软的所有平台（Windows、Windows 7 Mobile、甚至 Xbox）上拥有庞大的用户群体。`OpenGL`与`Direct3D`阵营之间一直争论不休，讨论哪个更强大、更灵活、更易用。其他影响因素还包括：硬件制造商更新驱动以支持新功能的速度、易理解性（`Direct3D`使用微软的`COM`接口，对新用户来说可能非常困惑）、稳定性以及行业支持。\n\
  \n## 其他竞争者\n\n尽管`OpenGL`和`Direct3D`在采用率和功能方面稳居榜首，但图形领域还遍布着众多其他框架，其中许多在现代设备上仍受支持。\n\
  \n在计算机图形学领域，图形库大致分为两大类：以`OpenGL`和`Direct3D`为代表的底层渲染机制，以及通常在游戏引擎中发现的高级系统，后者专注于资源管理，并附带扩展到常见游戏元素（如音效、网络、计分等）的特殊功能。后者通常基于前者中的一种来构建\
  \ 3D 部分。如果设计得当，高级系统甚至可能具备充分的抽象能力，从而能够兼容使用`GL`和`D3D`。\n\n### QuickDraw 3D\n\n高级通用库的一个例子是`QuickDraw\
  \ 3D`（`QD3D`）。作为苹果 2D 库`QuickDraw`（用于前 OS-X 时代）的 3D 兄弟，`QD3D`提供了一种优雅的方式来以易于理解的层级结构（场景图）生成和链接对象。它同样拥有用于加载\
  \ 3D 模型的自有文件格式和标准查看器，并且是平台无关的。`QD3D`的高级部分会计算场景，并确定每个对象乃至对象的每一个部分如何在 2D 绘图表面上显示。在`QD3D`之下，有一个名为`RAVE`的极薄层，负责处理这些位图的设备特定渲染。\n\
  \n用户可以使用标准版的`RAVE`，它会按预期渲染场景。但更有野心的用户可以编写自己的`RAVE`，以更具艺术性的方式显示场景。例如，有一家公司生成的`RAVE`输出效果，使其对象看起来像手绘在洞穴墙壁上。当你将这个现代版的洞穴壁画旋转起来时，效果非常酷。这种插件架构也使得`QD3D`具有很高的可移植性，能够移植到其他机器上。当潜在用户因`QD3D`在\
  \ PC 上缺乏硬件解决方案而拒绝使用时，人们开发了一个`RAVE`版本，该版本通过实际使用其竞争对手作为光栅化器，来利用`Direct3D`可用的硬件加速功能。遗憾的是，在史蒂夫·乔布斯回归后，`QD3D`几乎立即被砍掉，他认定`OpenGL`应该成为\
  \ Mac 未来 3D 标准。这个说法很奇怪，因为`QD3D`并非竞争对手，而是一个让程序员生活更轻松的附加组件。在乔布斯拒绝将`QD3D`开源后，Quesa\
  \ 项目成立，旨在尽可能多地重建原始库，截至本文撰写时，该项目仍在维护。毫不意外的是，Quesa 使用`OpenGL`作为其渲染引擎。\n\n需要声明的是：我编写了`QD3D`的`RAVE`/`Direct3D`层，结果项目在“金版”（准备发货）几天后就取消了。\n\
  \n### OGRE\n\n另一个场景图系统是面向对象的渲染引擎（`OGRE`）。`OGRE`于 2005 年首次发布，它可以同时使用`OpenGL`和`Direct3D`作为底层光栅化解决方案，同时为用户提供一个稳定且免费的工具包，被用于许多商业产品中。其用户社区规模巨大。快速浏览论坛会发现，截至本文撰写时，仅“一般讨论”板块就有超过\
  \ 6,500 个主题。\n\n### OpenSceneGraph\n\n最近发布的 iOS 版本`OpenSceneGraph`大致实现了`QuickDraw\
  \ 3D`的功能：提供在更高层级创建对象、将它们链接在一起、管理场景以及在`OpenGL`层之上进行特殊效果处理的方法。其他功能包括导入多种文件格式、文字支持、粒子效果（用于火花、火焰或云朵），以及在\
  \ 3D 应用程序中显示视频内容。强烈建议具备`OpenGL`知识，因为许多`OSG`函数仅仅是其对应`OpenGL`函数的薄封装。\n\n### Unity3D\n\
  \n与`OGRE`、`QD3D`或`OpenSceneGraph`不同，`Unity3D`是一个成熟的游戏引擎。区别在于产品的范围。前两者专注于在`OpenGL`周围创建更抽象的封装，而游戏引擎则更进一步，提供了游戏通常所需的大部分（如果不是全部）其他支持功能，如音效、脚本、网络扩展、物理引擎、用户界面和计分模块。此外，一个好的引擎可能还会包含帮助生成资源的工具，并且是平台无关的。\n\
  \n`Unity3D`具备所有这些功能，因此对于许多小型项目来说可能过于臃肿。同时，作为商业产品，其源代码不可获取，使用也非免费，需要支付适中的费用（与过去一些产品可能收取\
  \ 10 万美元或更多相比）。\n\n## 还有其他\n\n我们也不能忽视`A6`、`Adventure Game Studio`、`C4`、`Cinder`、`Cocos3d`、`Crystal\
  \ Space`、`VTK`、`Coin3D`、`SDL`、`QT`、`Delta3D`、`Glint3D`、`Esenthel`、`FlatRedBall`、`Horde3D`、`Irrlicht`、`Leadwerks3D`、`Lightfeather`、`Raydium`、`Panda3D`（来自迪士尼工作室和卡内基梅隆大学）、`Torque`（可用于\
  \ iOS）以及许多其他框架。尽管它们功能强大，但使用游戏引擎的一个缺点是，你的世界通常是在它们的环境中执行的。因此，如果你需要某种特定的、不支持的细微行为，可能就无能为力了。这让我回到了本书的主题。\n\
  \n## 回到两个立方体的华尔兹\n\n直到 iOS4，苹果都将`OpenGL`视为更通用的框架。但从 iOS5 开始，他们希望强调它是游戏开发的理想环境。这就是为什么，例如，向导中的项目图标被命名为“OpenGL\
  \ Game”，而之前是“OpenGL ES Application”。这也解释了为什么示例练习推崇性能更好但相当繁琐的`OpenGL ES 2`环境，而忽略了本书主题所涉及的更简单的版本。\n\
  \n**注意** 同样从 iOS5 开始，苹果在其新的`GLKit`框架中添加了许多特殊的辅助对象，接管了开发者早期必须自行完成的一些常见任务。这些任务包括图像加载、3D\
  \ 相关的数学运算、创建特殊的`OpenGL`视图以及管理特殊效果。\n\n考虑到这一点，我会时不时地踏入 2.0 领域，比如通过下面描述的示例应用，因为目前我们只有这些。关于\
  \ 2.0 的详细讨论将留到最后一章，因为它对于本书的范畴来说确实是一个相当高级的话题。\n\n## 深入探究\n\n向导生成六个主要文件，不包括 plist\
  \ 和 storyboard 文件。其中，有两个用于视图控制器，两个用于应用程序委托，还有两个看起来神秘的文件，分别叫做`shader.fsh`和`shader.vsh`。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n着色器文件是 OpenGL ES 2.0\
  \ 所独有的，用于微调场景的外观。它们就像是运行在显卡自身上的小型且快速的程序，使用一种类似 C 语言的独特语言。它们赋予你精确指定光线和纹理在最终图像中如何呈现的能力。不幸的是，OpenGL\
  \ ES 2.0 要求使用着色器，因此学习曲线相对陡峭；而更简单且使用更广泛的 1.1 版本则不使用着色器，仅采用一些标准的光照和着色效果（称为“固定功能”管线）。基于着色器的应用程序最有可能是那些视觉体验与任何其他方面同等重要的游戏，而更简单的\
  \ 1.1 框架则非常适合简单的游戏、商业图形、教育软件或任何其他不需要完美大气建模的应用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 1 章：计算机图形学：从过去到现在 **15**\n\n应用程序委托中没有活动代码，因此我们可以忽略它。真正的操作发生在 `viewController`\
  \ 中，主要通过三个部分进行。第一部分使用我们熟知并喜爱的标准视图控制器方法来初始化事物，第二部分负责渲染和动画化图像，第三部分则管理这些着色器相关的内容。\n\
  \n如果你没有完全理解也不必担心，因为这个示例仅仅是为了让你对基本的 OpenGL ES 程序有一个大致的了解。\n\n**注意** 所有这些练习都可以在 Apress\
  \ 网站上找到，包括可能不在书中的额外奖励练习。\n\n你会注意到，在所有代码清单中，代码的不同部分都标有带编号的注释。这些编号对应于清单后面的描述，用于突出显示代码的各个部分。\n\
  \n## 清单 1-1. 向导生成的视图控制器的初始化。\n\n```\n#import \"TwoCubesViewController.h\"\n\n#define\
  \ BUFFER_OFFSET(i) ((char *)NULL + (i))\n\n// 统一变量索引。\nenum //1\n{\n    UNIFORM_MODELVIEWPROJECTION_MATRIX,\n\
  \    UNIFORM_NORMAL_MATRIX,\n    NUM_UNIFORMS\n};\nGLint uniforms[NUM_UNIFORMS];\n\
  \n// 属性索引。\nenum\n{\n    ATTRIB_VERTEX,\n    ATTRIB_NORMAL,\n    NUM_ATTRIBUTES\n\
  };\n\nGLfloat gCubeVertexData[216] = //2\n{\n    // 下面每行的数据布局为：\n    // positionX,\
  \ positionY, positionZ, normalX, normalY, normalZ,\n    0.5f, -0.5f, -0.5f, 1.0f,\
  \ 0.0f, 0.0f,\n    0.5f, 0.5f, -0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, -0.5f, 0.5f,\
  \ 1.0f, 0.0f, 0.0f,\n    0.5f, -0.5f, 0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, 0.5f, 0.5f,\
  \ 1.0f, 0.0f, 0.0f,\n    0.5f, 0.5f, -0.5f, 1.0f, 0.0f, 0.0f,\n\n    0.5f, 0.5f,\
  \ -0.5f, 0.0f, 1.0f, 0.0f,\n    -0.5f, 0.5f, -0.5f, 0.0f, 1.0f, 0.0f,\n    0.5f,\
  \ 0.5f, 0.5f, 0.0f, 1.0f, 0.0f,\n    0.5f, 0.5f, 0.5f, 0.0f, 1.0f, 0.0f,\n```\n\n\
