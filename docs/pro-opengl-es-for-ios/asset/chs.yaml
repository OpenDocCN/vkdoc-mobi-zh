  \ CPU 开销。\n\n让我们再做最后一次调整。在此示例中，请确保星球分配时堆栈和切片值均设回 10。这有助于更容易看清光照的部分效果。现在你可以真正编译并运行，如果得到类似图\
  \ 4-5 的结果，不妨放松一下，喝杯清凉提神的饮料。\n\n**图 4-5. 平直着色**\n\n既然你回来了，我相信你一定注意到了有些奇怪的地方。理论上几何体是基于三角形带的，那么为什么这些面看起来是奇怪的四边三角形？\n\
  \n当设置为平直着色时，OpenGL 仅从单个顶点（即各个三角形的最后一个顶点）获取光照信息。现在，不要认为这些三角形带是按水平成对绘制的，而是按垂直成对松散耦合的，如图\
