- "# 第 3 章：构建 3D 世界\n\n### 超越弹跳方块\n\n现在让我们修改前面的示例，增加第三个维度。由于我们正在深入 3D 领域，需要添加多项内容来处理\
  \ Z 轴维度，包括：用于立方体几何形状和颜色的更大数据集、将这些数据传递给 OpenGL 的方法、视锥体定义、按需的面剔除技术，以及旋转而非仅仅平移。\n\n\
  **注意** *平移*是指在场景中上下、左右、前后移动物体，而*旋转*是指绕任意轴旋转物体。两者都被视为*变换*。\n\n### 添加几何体\n\n现在我们需要将上述示例中的顶点数量翻倍，并扩展它们以支持额外的\
  \ Z 值，如清单 3-3 的第 1 行所示。你会注意到所有顶点坐标都是`.5`或`-.5`。之前 Y 轴的值是`-0.33`到`0.33`。\n\n那是为了补偿屏幕的宽高比，拉伸图像使方块看起来确实是方形的。在本练习中，我们将添加视锥体，从而能够指定宽高比，这样我们就不必再为非方形屏幕进行补偿了。\n\
  \n接下来，颜色数组也相应翻倍（第 2 行及之后）。然后我们需要指定顶点如何连接，以便用 12 个三角形构成 6 个正方形面。这是通过两个额外的数组`tfan1`和`tfan2`实现的。这些数字是顶点数组的索引，告诉系统如何以\"\
  三角形扇形\"的形式连接各点。稍后将对此进行说明。现在你将修改弹跳方块应用，可以直接在原文件上修改或复制一份。\n\n**注意** 你可以通过进入 Xcode\
  \ 4 项目的根目录并重命名树顶部的项目名称来重命名项目。但遗憾的是，它不会更新源文件或`.xib`文件中的引用，因此你仍需手动修改这些内容。\n\n准备就绪后，将`drawInRect()`中的\
