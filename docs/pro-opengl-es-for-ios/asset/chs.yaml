  \ 2.0);```\n\n```glFrustumf(-size, size, -size *aspectRatio,```\n\n```size *aspectRatio,\
  \ zNear, zFar);```\n\n```glViewport(0, 0, frame.size.width, frame.size.height);```\n\
  \n```//将 OpenGL 模型视图矩阵设为默认矩阵。```\n\n```glMatrixMode(GL_MODELVIEW);```\n\n```}```\n\
  \n和之前一样，让我们仔细看看这段代码：\n\n现在你应该能认出弹跳方块的坐标了。在这个案例中，我们加入了 `z` 分量，使其变成一个 3D 弹跳方块。\n\n\
  当然，在第 2 行，缓冲区被清空了，不过这里将背景设置为黑色，而非默认的灰色。\n\n在第 3 行，方块被向后移动了 4 个单位。\n\n由于没有按顶点着色，第\
  \ 4 行中调用 `glColor4f()` 会将整个方块设置为蓝色。不过请注意，最后一个分量为 1.0，这是透明度值，稍后我们会讲解它。\n\n紧跟在 `glColor4f()`\
  \ 之后的是实际绘制方块的调用。\n\n但我们希望有两个方块来展示它们如何混合。因此，在第 5 行，颜色被改为红色，透明度设为 0.5，是蓝色方块的一半。\n\n\
  紧接着在第 6 行，坐标只平移了 3 个单位，因此红色方块因为距离更近而显得更大。同时，请注意 `x` 值现在也被平移了。与蓝色方块的上下运动不同，离得更近的红色方块将左右移动。\n\
  \n在第 7 行，红色方块被渲染出来。由于当前没有使用深度缓冲区，红色方块之所以能覆盖蓝色方块，仅仅是因为它在蓝色方块之后绘制。\n\n在第 8 行，平移量的值被减小，以降低运动幅度，这样在开启混合效果时，更容易捕捉到混合效果。\n\
  \n如果一切顺利，你应该能看到类似图 6-1 的效果。\n\n图 6-1. 蓝色方块上下移动；红色方块左右移动。\n\n这看起来并不起眼，但它将是后续几个实验的框架。\n\
  \n第一个实验将开启默认混合功能。\n\n与许多其他 OpenGL 功能一样，你可以通过调用 `glEnable(GL_BLEND)` 来开启混合。请将该调用添加到第一次调用\
  \ `glDrawArray()` 之前的任何位置。\n\n重新编译后，你看到了什么？什么都没有，或者至少没有任何变化。看起来还是图 6-1 的样子。这是因为混合不仅仅是向着屏幕挥舞拳头大喊“混合！”那么简单。我们还必须指定一个混合函数，该函数描述了源颜色（通过其片段或像素表示）如何与目标颜色混合。当然，默认情况下，当深度提示关闭时，源片段总是替换目标片段。实际上，混合只有在\
  \ z-buffer 关闭时才能发生。\n\n**混合函数**\n\n\n\n要改变默认混合，我们必须使用`glBlendFunc()`，它带有两个参数。第一个参数指定如何处理源颜色，第二个参数指定如何处理目标颜色。要理解这个过程，请注意最终发生的是：每个\
  \ RGBA 源分量与每个目标分量进行加法、减法或其他运算。也就是说，源的红色通道与目标的红色通道混合，源的绿色通道与目标的绿色通道混合，以此类推。这通常用以下方式表示：将源\
  \ RGBA 值称为`Rs`、`Gs`、`Bs`和`As`，将目标值称为`Rd`、`Gd`、`Bd`和`Ad`。但我们还需要源和目标混合因子，分别表示为`Sr`、`Sg`、`Sb`和`Sa`，以及`Dr`、`Dg`、`Db`和`Da`。（实际上并没有看起来那么复杂。）以下是最终合成颜色的公式：\n\
  \n( `R`，`G`，`B`) = (( `Rs` * `Sr`) + ( `Rd` * `Dr`)，( `Gs` * `Sg`) + ( `Gd` * `Dg`)，(\
  \ `Bs` * `Sb`) + ( `Bd` * `Db`))\n\n换句话说，将源颜色乘以其混合因子，然后与乘以自身混合因子的目标颜色相加。\n\n最常见的混合形式之一是将半透明面叠加到已绘制的内容（即目标）之上。如前所述，这可以是一个模拟的窗格、飞行模拟器的平视显示器，或者在与现有图像混合后看起来更好的其他图形。（后者在\
  \ Distant Suns 中大量使用，用于星座名称、轮廓等元素。）根据用途，你可能希望叠加层几乎不透明（alpha 接近 1.0），或者非常微弱（alpha\
  \ 接近 0.0）。\n\n在这个基本混合任务中，源颜色首先乘以 alpha 值（其混合因子）。因此，如果源红色最大值为 1.0 且 alpha 为 0.75，则结果只需将\
  \ 1.0 乘以 0.75 即可得出。绿色和蓝色也同样处理。另一方面，目标颜色乘以 1.0 减去源 alpha。为什么？这实际上产生了一个永远不会超过最大值 1.0\
  \ 的合成颜色；否则，可能会出现各种颜色失真。或者这样理解：源的 alpha 值是源允许填充的 1.0 颜色“宽度”的比例。剩余的空间即为 1.0 减去源 alpha。alpha\
  \ 越大，源颜色可使用的比例越大，为目标颜色保留的比例则越小。因此，当 alpha 接近 1.0 时，复制到帧缓冲区中的源颜色越多，从而替换掉目标颜色。\n\n\
  **注意** 在这些示例中，使用归一化的颜色值，因为这使得跟踪过程更容易，而不是使用无符号字节（后者将颜色范围表示为 0 到 255）。\n\n现在我们可以通过下一个示例来检验这一点。要设置前面描述的混合函数，你需要使用以下调用：\n\
  \n`glBlendFunc(GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA);`\n\n`GL_SRC_ALPHA`和`GL_ONE_MINUS_SRC_ALPHA`是前面描述的混合因子。\n\
  \n请记住，第一个参数是源（当前正在写入的对象）的混合因子。将这行代码放在启用混合的代码之后立即执行。然后应用到红色上，编译并运行。你看到图 6-2 了吗？\n\
  \n图 6-2. 红色方块的 alpha 为 0.5，蓝色方块的 alpha 为 1.0。\n\n那么，发生了什么？蓝色的 alpha 为 1.0，因此每个蓝色片段完全替换了背景中的任何内容。然后红色的\
  \ alpha 为 0.5，意味着 50\n\n\n\n"
- "# 章节 6：混合效果\n\n红色部分的百分之五十会被写入目标区域。黑色区域将呈现暗红色，但只有`glColor4f()`中指定的`1.0`值的百分之五十。到目前为止，一切正常。现在，在蓝色之上，红色值的百分之五十与蓝色值的百分之五十混合：混合颜色\
  \ = 源颜色 * 源颜色的 Alpha + (1.0 - 源颜色的 Alpha) * 目标颜色\n\n或者，基于前面红色方块示例中的每个分量值，以下是计算过程：\n\
  \n`红色 = 1.0 * 0.5 + (1.0 - 0.5) * 0.0`\n\n`绿色 = 0.0 * 0.5 + (1.0 - 0.5) * 0.0`\n\
  \n`蓝色 = 0.0 * 0.5 + (1.0 - 0.5) * 1.0`\n\n因此，片段像素的最终颜色应为`0.5, 0.0, 0.5`，即洋红色。现在，红色和由此产生的洋红色都略偏暗。如果你希望让它们更亮一些，该怎么办呢？如果能有一种方法混合颜色的全部强度就好了。你会使用`1.0`的\
  \ Alpha 值吗？不会。为什么呢？以蓝色为目标颜色，源 Alpha 为`1.0`，前文的蓝色通道等式将是`0.0 * 1.0 + (1.0 - 1.0) *\
  \ 1.0`。结果等于`0`，而红色将是`1.0`，即纯色。你实际想要的是，在写入黑色背景时，红色最亮，蓝色也同样最亮。为此，你需要使用一个能同时以全强度写入两种颜色的混合函数，例如`GL_ONE`。这意味着如下操作：\n\
  \n`glBlendFunc(GL_ONE, GL_ONE);`\n\n回到等式，使用源三元组红色=1、绿色=0、蓝色=0 和目标颜色红色=0、绿色=0、蓝色=1（Alpha\
  \ 默认为 1.0），计算结果如下：\n\n`红色 = 1 * 1 + 0 * 1`\n\n`绿色 = 0 * 1 + (0 - 0) * 1`\n\n`蓝色\
  \ = 0 * 1 + (1 - 0) * 1`\n\n这样得出的颜色中，红色=1、绿色=0、蓝色=1。这就是洋红色，各位，如图 6-3 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 177](img/index-177_1.jpg)\n\n**第 6 章：它会混合吗？**\n\n**174**\n\n图 6-3. 混合红色和蓝色的全强度\n\
  \n现在，是时候进行另一个实验了。采用上一个示例的代码，将两个 Alpha 值都设为`0.5`，并将混合函数重置为传统的透明度值：\n\n`glBlendFunc(GL_SRC_ALPHA,\
  \ GL_ONE_MINUS_SRC_ALPHA);`\n\n运行此修改后的代码后，注意混合后的颜色，并注意远方的方块在`-4.0`距离处是蓝色的，并且它是最先被渲染的，红色方块是第二个。现在，颠倒绘制的颜色顺序，然后运行。哪里出了问题？你应该得到类似图\
  \ 6-4 的结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 178](img/index-178_1.jpg)\n\
  \n![Image 179](img/index-178_2.jpg)\n\n**第 6 章：它会混合吗？**\n\n**175**\n\n图 6-4. 左侧是先绘制蓝色（左），而右侧是先绘制红色（右）。\n\
  \n交叉部分的颜色略有不同。这揭示了 OpenGL 中一个令人费解的问题：与大多数 3D 框架一样，混合效果会因渲染时面和颜色的顺序而略有不同。在这种情况下，要弄清楚发生了什么其实很简单。在图\
  \ 6-4（左）中，蓝色方块首先被绘制，其 Alpha 值为`0.5`。因此，即使蓝色颜色三元组被定义为`0,0,1`，Alpha 值也会在写入帧缓冲区时将其降低到`0,0,0.5`。现在，添加具有类似属性的红色方块。自然，红色会以与蓝色相同的方式写入帧缓冲区的黑色部分，因此最终值将是`0.5,0,0`。但请注意，当红色绘制在蓝色之上时会发生什么。由于蓝色已经处于其强度的一半，混合函数会将其进一步削减至`0.25`，这是混合函数的目标部分`(1.0\
  \ - 源 Alpha) * 蓝色 + 目标颜色`的结果，即`(1.0 - 0.5) * 0.5 + 0`，也就是`0.25`。最终颜色为`0.5, 0, 0.25`。由于蓝色强度较低，它对合成颜色的贡献较小，从而让红色占据主导地位。现在，在图\
  \ 6-4（右）中，顺序是相反的，因此蓝色占据主导地位，最终颜色为`0.25, 0, 0.5`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n**第 6 章：它会混合吗？**\n\n**176**\n\n表 6-1 列出了所有允许的 OpenGL ES 混合因子，尽管并非所有因子都同时支持源和目标。如您所见，这里有充足的调整空间，并且没有关于哪种组合能产生最佳效果的固定规则。不过，尝试不同的值会非常有趣。请确保将背景填充为暗灰色，因为某些组合在写入黑色背景时只会产生黑色。\n\
  \n表 6-1. 源和目标混合值；请注意，并非所有值都适用于两个通道\n\n| 混合因子 | 描述 |\n| :--- | :--- |\n| `GL_ZERO`\
  \ | 将操作数乘以 0。 |\n| `GL_ONE` | 将操作数乘以 1。 |\n| `GL_SRC_COLOR` | 将操作数乘以源颜色的四个分量（仅限目标）。\
  \ |\n| `GL_ONE_MINUS_SRC_COLOR` | 将操作数乘以 (1.0 – 源颜色)（仅限目标）。 |\n| `GL_DST_COLOR`\
  \ | 将操作数乘以目标颜色的四个分量（仅限源）。 |\n| `GL_ONE_MINUS_DST_COLOR` | 将操作数乘以 (1.0 – 目标颜色)（仅限源）。\
  \ |\n| `GL_SRC_ALPHA` | 将操作数乘以源 Alpha。 |\n| `GL_ONE_MINUS_SRC_ALPHA` | 将操作数乘以 (1.0\
  \ – 源 Alpha)。 |\n| `GL_DST_ALPHA` | 将操作数乘以目标 Alpha。 |\n| `GL_ONE_MINUS_DST_ALPHA`\
  \ | 将操作数乘以 (1.0 – 目标 Alpha)。 |\n| `GL_SRC_ALPHA_SATURATE` | 用于较旧图形实现的特殊模式，以辅助抗锯齿。你可能永远不会用到它。（仅限源。）\
  \ |\n\n在第 5 章中，我们研究了 iOS 设备上 OpenGL ES 支持的 GL 扩展。其中几个用于更复杂的混合方案，例如`GL_OES_blend_equation_separate`、`GL_OES_blend_func_separate`、`GL_OES_blend_subtract`和`GL_EXT_blend_minmax`。这些值与`glBlendEquation()`和`glBlendEquationSeparate()`方法一起使用。\n\
  \n回顾一下默认的混合等式，其中最终颜色由源值 + 目标值决定。但是，如果你想用源颜色减去目标颜色而不是相加呢？调用`glBlendEquation(GL_FUNC_SUBTRACT)`即可实现。将该行代码放在`glBlendFunc()`正下方，确保两个方块的\
  \ Alpha 值都为`0.5`，并将颜色重置回初始状态（红色在前），编译并运行。结果可能有点不明显，如图 6-5（左）所示。实际情况是，这个操作确实是“从红色源中减去蓝色”，但红色方块的颜色中没有任何蓝色分量。数学计算得出的最终颜色为红色=0.5、绿色=0、蓝色=-0.25。但是，由于负颜色在这个平面上（或者至少在加利福尼亚州圣何塞）不存在，系统会将蓝色分量钳位为`0`。结果是交叉部分呈现纯红色。因此，为了在这里看到一些效果，前面的方块需要预先包含一些蓝色。所以，将红色的颜色改为`1,0,1`，即洋红色。现在运行时，就得到了图\
  \ 6-5（右）的结果，因为目标蓝色可以从源蓝色中减去，留下一个系统能够理解的正值。在这种情况下，交叉部分的值是`0.5, 0, 0.25`，这就是为什么我们得到的是偏洋红的红色而不是纯红色。尝试将其导入绘图程序，并使用拾色器功能验证实际颜色。\n\
  \n图 6-5a, b. 左侧，使用减法操作时没有发生混合，而右侧则成功混合。\n\n\n\n扩展集中还有另外两个函数调用，它们是 `glBlendEquationSeparateOES()`\
  \ 和 `glBlendFuncSeparateOES()`。这些函数允许你分别修改 RGB 通道和 Alpha 通道。后缀 `OES` 指定了这些是 OpenGL\
  \ ES 的扩展（但仅针对 OpenGL 1.1——它们在 OpenGL 2.0 中是标准函数，因此末尾不需要 `OES`），并且定义在 `glext.h` 中。此功能的一个用途是抵消图\
  \ 6-4 所示的渲染顺序带来的影响。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图 182](img/index-181_1.jpg)\n\
  \n![图 183](img/index-181_2.jpg)\n\n## 第 6 章：它会混合吗？\n\n**178**\n\n最后，这里还有一个在某些混合操作中可能非常方便的方法，那就是\
