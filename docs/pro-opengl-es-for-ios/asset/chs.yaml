- "# 第 5 章：纹理\n\n155\n\n图 5-19. 两个图像均为 mipmap 纹理，但其中一个视觉效果更佳。这是为什么？\n\n你可能已经注意到这两个图像看起来略有不同。上方的图像有闪烁感，而下方的图像明显更平滑，看起来更舒适。这就引出了**过滤**这个主题。\n\
  \n### 过滤\n\n图像作为纹理使用时，根据其内容以及投影到屏幕上的最终尺寸，可能会表现出各种伪影。细节丰富的图像可能会出现恼人的闪烁效果。不过，可以通过一种称为**过滤**的过程来动态修改图像，以最大限度地减少这些影响。过滤通常与\
  \ mipmapping 结合使用，因为前者可以利用后者提供的多级图像。\n\n假设你有一个 128×128 的纹理，但纹理面的边长是 500 像素。你应该看到什么？显然，图像的原始像素（现称为纹素）会比任何屏幕像素大得多。这个过程称为**放大**。相反，也可能出现纹素远小于像素的情况，这称为**缩小**。过滤就是用于确定如何将一个像素的颜色与其底层的纹素（或多个纹素）关联起来的过程。表\
  \ 5-3 和表 5-4 分别展示了这一过程的可能变体。\n\n**表 5-3. OpenGL ES 中用于缩小的纹理过滤类型**\n\n| 名称 | 用途 |\n\
  |------|------|\n| `GL_LINEAR` | 使用被纹理化像素中心最近的四个邻近纹素来平滑纹理 |\n| `GL_LINEAR_MIPMAP_LINEAR`\
  \ | 类似于`GL_LINEAR`，但使用距离渲染像素最近的两个邻近 mipmap 级别 |\n| `GL_LINEAR_MIPMAP_NEAREST` |\
  \ 类似于`GL_LINEAR`，但使用距离渲染像素最近的一个 mipmap 级别 |\n| `GL_NEAREST` | 返回距离被渲染像素最近的纹素值 |\n\
  | `GL_NEAREST_MIPMAP_NEAREST` | 类似于`GL_NEAREST`，但使用最近 mipmap 中的纹素 |\n\n**表 5-4.\
  \ OpenGL ES 中用于放大的纹理过滤类型**\n\n| 名称 | 用途 |\n|------|------|\n| `GL_LINEAR` | 使用被纹理化像素中心最近的四个邻近纹素来平滑纹理\
  \ |\n| `GL_NEAREST` | 返回距离被渲染像素最近的纹素值 |\n\n过滤主要有三种方法：\n\n\n\n## 纹理采样与过滤\n\n**点采样**（在\
  \ OpenGL 术语中称为 `GL_NEAREST`）：像素的颜色基于离像素中心最近的纹素。这是最简单、最快的方式，自然产生的图像效果最差。\n\n**双线性采样**（通常简称为线性）：像素的颜色基于离像素中心最近的\
  \ 2x2 纹素阵列的加权平均值。这可以显著平滑图像。\n\n**三线性采样**：需要 `mipmap`，并取最接近屏幕最终渲染的两个 `mipmap` 层级，对每个层级执行双线性采样，然后对这两个值进行加权平均。\n\
  \n你在前面的练习中看到的就是三线性采样，它显著提升了感知到的图像质量。\n\n图 5-20a 展示了关闭过滤时 Hedly 的近距离特写，而图 5-20b 则展示了开启过滤后的效果。如果你回头查看\
  \ `mipmap` 代码，会发现两张图像实际上都使用了过滤。顶部有闪烁效果的那张使用了 `GL_LINEAR` 和 `GL_NEAREST` 过滤。底部的那张做了同样的事情，但额外使用了\
  \ `mipmap` 提供的信息。纯粹为了好玩，你可能想对比一下其他设置。例如，哪个更好：`GL_NEAREST` 还是 `GL_LINEAR`？\n\n随着视网膜级别显示屏的普及，过滤可能最终会像\
  \ 8 位着色一样成为历史。\n\n还有一点：如果你非常仔细地观察底部图像，可能会看到它切换到另一种纹理尺寸。这很微妙，但确实存在。\n\n![图 5-20 关闭所有过滤（左），开启双线性过滤（右）](img/index-160_2.jpg)\n\
  \n## OpenGL 扩展与 PVRTC 压缩\n\n尽管 OpenGL 是一个标准，但它在设计时就考虑到了可扩展性，允许各种硬件制造商通过扩展字符串为 3D\
  \ 领域添加自己的独门绝技。在 OpenGL 中，开发者可以查询可用的扩展，并在它们存在时使用。要查看这一点，请使用以下代码行：\n\n```\nchar *extensionList\
  \ = glGetString(GL_EXTENSIONS);\n```\n\n这将返回一个以空格分隔的列表，列出 iOS 中 OpenGL ES 的各种额外选项，看起来类似这样（来自\
  \ iOS 4.3）：\n\n```\nGL_OES_blend_equation_separate GL_OES_blend_func_separate GL_OES_blend_subtract\
  \ GL_OES_compressed_paletted_texture GL_OES_depth24 GL_OES_draw_texture GL_OES_fbo_render_mipmap\
  \ GL_OES_framebuffer_object GL_OES_mapbuffer GL_OES_matrix_palette GL_OES_packed_depth_stencil\
  \ GL_OES_point_size_array GL_OES_point_sprite GL_OES_read_format GL_OES_rgb8_rgba8\
  \ GL_OES_stencil_wrap GL_OES_stencil8 GL_OES_texture_mirrored_repeat GL_OES_vertex_array_object\
  \ GL_EXT_blend_minmax GL_EXT_discard_framebuffer GL_EXT_read_format_bgra GL_EXT_texture_filter_anisotropic\
  \ GL_EXT_texture_lod_bias GL_APPLE_framebuffer_multisample GL_APPLE_texture_2D_limited_npot\
  \ GL_APPLE_texture_format_BGRA8888 GL_APPLE_texture_max_level GL_IMG_read_format\
  \ GL_IMG_texture_compression_pvrtc\n```\n\n最后一行加粗的部分指出，iOS 可以处理一种名为 PVRTC 的特殊压缩纹理格式，该格式由\
  \ iOS 设备中的图形处理单元（GPU）品牌使用。前两代 iPhone 和 iPod/Touch 使用的是 PowerVR MBX 芯片，而较新的型号则使用更强大的\
  \ PowerVR SGX GPU。后者的优势在于，它可以接受以其自身格式高度压缩的纹理，并在飞行中进行显示。这可以将纹理压缩到未压缩大小的 1/16，从而在节省大量内存的同时提高帧率。\n\
  \n当然，这有一个主要限制：图像必须是正方形且为 2 的幂次（POT）形式。这种压缩在照片类图像上效果最佳，而在对比度强的图形上效果较差。\n\n\n\n**注意**\
  \ 字符串 `GL_APPLE_texture_` `2D_limited_npot GL` 中还有一个有趣的附加功能。NPOT 代表“非二次幂”。还记得较新版本的\
  \ iOS 可以使用 NPOT 图像吗？所以，如果你有理由使用 NPOT 图像，请事先检查扩展并相应地处理结果。\n\n接下来，我们将生成并导入一个 PVRTC\
  \ 格式。首先，你需要使用一款小巧的工具将现有文件压缩成 PVR 格式，这款工具由 Imagination Technologies（PowerVR 图形芯片制造商，该芯片用于所有\
  \ iOS 设备）提供。你可以从 `www.imgtec.com` 获取它。在开发者专区中查找 PowerVR Insider Utilities，具体工具名为\
  \ `PVRTexTool`。\n\n**注意** Apple 还提供了一个名为 `texturetool` 的纹理转换器。虽然它只是一个基于命令行的工具，但其本身的功能非常强大，如果你有大量文件需要一次性压缩，它可以用来处理大型批处理任务。\n\
  \n启动它时不要惊慌！它可能看起来像 Windows NT，但你的图片没有问题。它实际上使用了 X11 窗口平台，这使得它可以在许多不同的操作系统上使用。\n\n\
  要将纹理转换为 PVRTC，只需将其加载到编辑器中，然后选择“Encode Current Texture”（编码当前纹理）按钮。这将打开一个新对话框，让你选择要编码的目标\
  \ 3D 平台；在此情况下，选择 OpenGL ES 1.x 选项卡。在“压缩格式”部分，选择 `PVRTC 2BPP` 或 `PVRTC 4BPP` 按钮，然后点击底部的编码按钮。就这些！\n\
  \n表 5-5 显示了该工具生成的格式。尽管你只有两种选择，但实际上可能有四种，具体取决于源位图是否包含 Alpha 通道。`2BPP` 格式表示每像素 2 比特，而\
  \ `4BPP` 格式，你猜对了，是每像素 4 比特。还支持许多其他图像格式，这些将在第 9 章关于性能问题的讨论中介绍。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n**第 5 章：纹理**\n\n**159**\n\n表 5-5。`PVRTexTool` 生成的四种 PVR 格式\n\n| 格式 | 压缩比 | 详细信息\
  \ |\n|--------|-------------|---------|\n| `GL_COMPRESSED_RGBA_PVRTC_4BPPV1_IMG`\
  \ | 8:1 | 4 比特/像素，含 Alpha |\n| `GL_COMPRESSED_RGB_PVRTC_4BPPV1_IMG` | 6:1 | 4 比特/像素，不含\
  \ Alpha |\n| `GL_COMPRESSED_RGBA_PVRTC_2BPPV1_IMG` | 16:1 | 2 比特/像素，含 Alpha |\n\
  | `GL_COMPRESSED_RGB_PVRTC_2BPPV1_IMG` | 12:1 | 2 比特/像素，不含 Alpha |\n\n假设你有一个 512×512\
  \ 的 PNG 纹理，它将消耗 1 MB 内存。使用 `PVRTexTool` 进行最低程度的压缩，将占用不到 200 KB。最高压缩比的格式，即每像素 2 比特并含\
  \ Alpha，则仅有区区 64 KB。\n\nPVRTC 纹理也可以被 `GLKTextureLoader()` 读取，但如果你在选项字典中指定了 `GLKTextureLoaderGenerateMipmaps`，则加载会失败。不过，你可以使用\
  \ `PVRTexTool` 为主文件嵌入一个 mipmap 链。由于这种压缩是有损的，在使用前述代码时，你会比使用更清晰的图像时更容易看到不同分辨率文件的切换。\n\
  \n**注意** 由于 PVRTC 是硬件相关的，Apple 已发出预防性说明，指出未来设备不一定会支持 PVRTC。这仅仅意味着 Apple 未来可能会使用不同的\
