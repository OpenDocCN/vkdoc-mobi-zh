  `red-=colorIncrment;`\n\n}\n\n}\n\n`return self;`\n\n}\n\n好吧，创建像球体这样基础的东西需要大量代码。使用三角形列表比在标准\
  \ OpenGL 中使用四边形更复杂，但这是我们不得不采用的方法。\n\n基本算法将球体分为堆栈（stacks）和切片（slices）。堆栈是横向的片，而切片是纵向的。堆栈的边界每次成对生成，作为伙伴。这些边界构成了三角形带的边界。因此，堆栈\
  \ A 和 B 被计算出来，并根据绕圆切片的数量细分为三角形。下一次循环中，取堆栈 B 和 C，重复此过程。这里应用了两个边界条件：\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 107](img/index-85_1.jpg)\n\n第 3 章：构建 3D 世界\n\n81\n\n第一个和最后一个堆栈包含两个极点，在这种情况下，它们更像是三角形扇而非三角形带，但为了简化代码，我们仍将其视为三角形带。确保每个三角形带的末端与起始端相连，以形成一组连续的三角形。\n\
  \n那么，我们来分解一下：初始化程序使用堆栈和切片的概念来定义球体的分辨率。更多的切片和堆栈意味着球体更平滑，但会占用更多内存并增加处理时间。可以将切片想象成类似苹果的楔形块，代表从底部到顶部的一块球体。堆栈则是横向的切片，用于定义纬度区域。参见图\
  \ 3-16。\n\n`radius`参数是一种缩放形式。您可以选择将所有对象归一化并用`glScalef()`，但这会增加额外的 CPU 开销，因此在这里`radius`用作一种预缩放形式。而`squash`用于创建扁平的球体，这对木星和土星来说是必需的。两者都有极高的自转速度（木星的一天只有大约\
  \ 10 小时，而它的直径是地球的 10 倍多）。因此，它的极地直径约为赤道直径的 93%。土星甚至更扁，极地直径仅为赤道直径的 90%。\n\n因为在第 5\
  \ 章接触到酷炫的纹理内容之前，我们想让物体看起来更有趣，所以让我们从上到下改变颜色。\n\n\n\n顶部为蓝色，底部为红色。`colorIncrement`\
  \ 仅仅是堆栈之间的颜色差值。红色从 255 开始，蓝色从 0 开始，均采用无符号字符型。\n\n图 3-16\\. 堆栈上下延伸，切片环绕一周，面被细分为三角形条带。\n\
  \n**第 3 章：构建 3D 世界**\n\n第 3 行和第 4 行为顶点和颜色分配内存。稍后还需要其他数组来保存纹理坐标和光照所需的法线，但这里我们先保持简单。注意，与立方体一样，我们使用的是\
  \ 32 位颜色。三个字节用于 RGB 三元组，第四个字节用于 Alpha（透明度），但在此示例中并不需要。\n\n第 5 行开始外层循环，从最底部的堆栈（即我们星球的南极区域，或纬度-90\
  \ 度）一直向上到北极（+90 度）。这里使用了一些希腊字母标识符来表示球面坐标。`Phi` 通常用于类似纬度的点，而 `theta` 则用于经度。\n\n第\
  \ 6 行和第 7 行生成特定条带边界的纬度。首先，当 `phiIdx` 为 0 时，我们希望 `phi0` 为-90 度，即-1.57。`-.5` 将所有值向下偏移\
