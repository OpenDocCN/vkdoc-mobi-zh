- '# 第 10 章：OpenGL ES 2、着色器以及……


  她的天使容颜，宛若天堂之眼般明亮闪耀，让幽暗之地也洒满阳光。


  ——埃德蒙·斯宾塞


  在 iOS 设备上，OpenGL ES 图形库有两个不同的版本。本书主要讨论的是高级版本，即 OpenGL ES 1，有时也称为 1.1 或 1.x。第二个版本的名称颇具迷惑性，叫做
  OpenGL ES 2。第一个版本显然是两者中更简单的一个；它自带了各种辅助库，能替你完成大部分 3D 数学计算以及所有的光照、着色和阴影处理。ES 2 摒弃了所有这些便利特性，有时被称为“可编程函数”版本（相对于
  ES 1 的“固定函数”设计，后者通常会被那些真正的像素高手所不屑，他们更喜欢对自己的图像拥有更多控制权，尤其是在那些强调每一个微小视觉细节的沉浸式 3D 游戏环境中）。为此，OpenGL
  ES 2 应运而生。


  在本章中，我们只会极其简要地触及着色器，旨在让你对它们有一个大致的了解。之后，我将进一步讲解前几章未涉及的一些 GLKit 的精彩内容。


  版本 1 与桌面版本的 OpenGL 相对接近，这使得移植应用程序（尤其是老式应用）的痛苦程度，比让一只獾啃掉你的脸要轻一些。被省略掉的功能，是为了在资源有限的设备上保持较小的体积，并确保尽可能最佳的性能。


  版本 2 彻底放弃了兼容性，专注于主要面向娱乐软件的性能和灵活性特性。被移除的功能包括 `glRotatef()`、`glTranslatef()`、矩阵堆栈操作等。但我们得到的回报是一些令人愉悦的小亮点，例如通过使用着色器实现的可编程管线。而变换方法的缺失已经……




