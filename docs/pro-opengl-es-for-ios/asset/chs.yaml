  为什么？我也不知道。但我们在桌面上习以为常的平滑线条，在手持设备上却不存在。Retina 显示屏凭借其高分辨率，基本上让抗锯齿变得无关紧要。然而，在非 Retina
  设备（包括截至撰写本书时的 iPad）上，效果仍然相当粗糙。有几种变通方法，其中一种更像 hack。第一种（也更 hacky）方法是放弃标准的 OpenGL 线条支持，替换为非常长且细的纹理对象，因为后者可以被平滑处理。一个不错的副作用是（通过额外一点工作）你还可以得到虚线。


  另一种不那么 hacky 但容易得多的方法是使用 iOS 4 及之后版本中提供的一个特性：多重采样抗锯齿（简称 MSAA）。


  将多重采样作为抗锯齿的手段，需要添加一个特殊的多重采样帧缓冲对象。你的图像最初会被写入这个特殊缓冲区，其分辨率高于最终显示的分辨率。然后，它会被“解析”成一个更小的缓冲区，最终的像素代表原始颜色的混合版本。通常，多重采样缓冲区的尺寸是最终缓冲区的四倍；也就是说，每个最终像素通常是四个原始像素的加权平均值（这与第五章中介绍的纹理过滤并非完全不同）。这也被称为全屏抗锯齿，因为它确实做到了这一点。好处是图像更平滑；缺点包括性能下降以及离屏缓冲区消耗额外内存。图
  8-9（左）显示了我们的一条没有 MSAA 的线条，而图 8-9（右）显示了启用 MSAA 后的效果。


