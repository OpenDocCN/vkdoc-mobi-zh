  \ | 不，这里没有布尔矩阵。 |\n\n除了这些类型之外，你还可以使用修饰符来定义`int`和`float`类型变量的精度。精度可以是`highp`（24 位）、`mediump`（16\
  \ 位）或`lowp`（10 位），其中`highp`是默认值。所有变换都必须使用`highp`完成，而颜色只需要`mediump`。（不过，我不明白为什么布尔值没有精度限定符。）任何基本类型都可以声明为常量变量，例如`const\
