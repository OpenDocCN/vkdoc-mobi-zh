  以下是具体说明：


  第 1 行和第 2 行指定了近裁剪平面和远裁剪平面的距离。这两个值表示任何距离超过 1000 或小于 0.1 的物体都将被过滤掉。（“一千什么？”你可能会问。就是一千；单位由你决定。可以是光年，也可以是腕尺，这并不重要。）


