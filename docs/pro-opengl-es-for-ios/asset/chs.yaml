  ## 关于技术审校


  **Leila Muhtasib** 自她在 MS-DOS 上编写第一个程序起，就一直对编程充满热情。此后，她毕业于马里兰大学帕克分校，获得计算机科学学位。她着迷于移动技术及其日益普及的趋势，自第一个
  SDK 发布以来就一直在编写 iPhone 应用程序。她现在是思科系统公司移动开发团队的资深软件工程师和技术主管。


