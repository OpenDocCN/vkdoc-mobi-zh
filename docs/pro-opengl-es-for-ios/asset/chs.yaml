  \n`glLightfv(SS_FILLLIGHT2,GL_POSITION,posFill2);`\n\n`glLightfv(SS_FILLLIGHT2,GL_SPECULAR,dimmagenta);`\n\
  \n`glLightfv(SS_FILLLIGHT2,GL_DIFFUSE,dimblue);`\n\n`glLightf(SS_SUNLIGHT,GL_QUADRATIC_ATTENUATION,.005);`\n\
