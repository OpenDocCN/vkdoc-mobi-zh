  图 3-10. 让立方体自旋


  你可以通过两种不同的方式来理解变换顺序：局部坐标系或世界坐标系。按前者理解，你将物体移动到最终位置，然后执行旋转。因为坐标系是局部的，物体会围绕它自己的原点旋转，这使得从上到下的代码顺序变得合理。如果你选择世界坐标系的方法（实际上也是
  OpenGL ES 所做的方式），你必须在执行平移之前，先绕物体的局部轴执行旋转。这样看来，变换实际上是自下而上发生的。最终结果是一样的，代码也一样，两者都很令人困惑，并且很容易搞错顺序。这就是为什么你经常会看到搞
  3D 的伙计们伸长胳膊比划着，同时自己到处移动，试图弄明白为什么他们那个看起来很棒投石机模型飞到了地面以下。这被称为“3D 迷惑舞步”。而让事情更混乱的是，这只适用于
  OpenGL ES 1。原因是，变换会被排队，直到渲染过程完成，然后从第一个变换调用处理到最后一个。而在 ES 2 中，你必须自己执行所有变换，这种情况下，它们会按调用顺序立即执行。以下是相同变换序列在
  OpenGL ES 2 中的体现：


  ```

  baseModelViewMatrix = GLKMatrix4Scale(baseModelViewMatrix,scale,scale,scale);

  baseModelViewMatrix = GLKMatrix4Rotate(baseModelViewMatrix, _rotation, 1.0, 0.5,
  0.0);

  modelviewMatrix = GLKMatrix4MakeTranslation(0.0, offset, -6.0);

  modelviewMatrix = GLKMatrix4Multiply(modelviewMatrix, baseModelViewMatrix);

  ```


  现在需要注意的最后一个变换命令是 `glScalef()`，用于沿所有三个轴调整模型的大小。假设你需要将立方体的高度加倍。你可以使用代码行 `glScalef(1,2,1)`。请记住，高度与
  Y 轴对齐，而宽度和深度分别是 X 和 Z 轴，我们不需要改动它们。


