  \n凭借我们 3D 技能库中的这些基本工具，我们可以开始着手主要项目：构建一个小型太阳系示例。太阳系之所以理想，是因为它具有非常基本的简单形状、多个必须以层次化方式相互绕行的物体，以及一个单一光源。最初使用立方体示例的原因是，其形状对于\
