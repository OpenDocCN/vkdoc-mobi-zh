  \n## 小结\n\n在本章中，我们从生成一个 2D 正方形开始，将其转变为 3D 立方体，然后学习了如何旋转和平移它。我们还学习了视锥体，以及如何利用它来剔除物体并缩放场景。最后，我们构建了一个更复杂的物体，它将成为太阳系模型的根基。下一章将涵盖着色、光照和材质，并添加第二个物体。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n"
- "# 第 4 章：开启光照\n\n你现在必须坚强。你绝不能放弃。当别人（或代码）让你哭泣，当你害怕黑暗时，别忘了光始终都在。\n\n——佚名\n\n光是第一位画家。再丑陋的物体在强光下也会变得美丽。\n\
  \n——拉尔夫·沃尔多·爱默生\n\n船长，一切闪闪发光，不必担心。\n\n——凯莉·弗莱，《萤火虫》\n\n本章将涵盖 OpenGL ES 或许最重要的主题：照亮、着色和渲染虚拟场景的过程。我们在前一章中简单提到了颜色，但由于它对于光照和着色都至关重要，我们将在本章更深入地探讨。对于那些阅读本书平装版的人，是的，我知道，在一本黑白书中讨论颜色有些奇怪，但电子版是彩色的。\n\
  \n## 光与色的故事\n\n没有光，世界将一片黑暗（废话）。没有颜色，我们将很难区分红绿灯。\n\n我们都习以为常的光的奇妙特性——从晨雾中柔和的光线，到航天飞机主发动机的点火，再到隆冬雪地上满月害羞的苍白光芒。关于光的物理特性、本质和感知，已有大量著述。艺术家可能要花一辈子\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 4 章：开启光照**\n\n**92**\n\n\
  才能完全理解如何将悬浮在油中的彩色颜料涂抹在画布上，在瀑布底部创造出可信的彩虹。而这正是 OpenGL ES 在我们场景中开启光照时所面临的任务。\n\n抛开诗意不谈，光仅仅是我们眼睛敏感的全电磁频谱的一部分。同一频谱还包括\
  \ iPhone 使用的无线电信号、帮助医生的 X 射线、数十亿年前垂死恒星发出的伽马射线，以及可以用来加热上周四 Wii 保龄球之夜剩下的披萨的微波。\n\n\
  光被认为有四个主要属性：波长、强度、偏振和方向。波长决定了我们感知的颜色，或者我们是否首先能看到任何东西。可见光谱从波长约 380 纳米的紫色开始，一直到波长约\
  \ 780 纳米的红色。紧邻之下是紫外线，而可见光谱之上则是红外线，我们无法直接看到，但可以通过热量间接探测到。\n\n我们感知物体颜色的方式与物体或其材料吸收或以其他方式干扰迎面而来的光线的波长有关。除了吸收，光还可能被散射（形成蓝天或日落红霞）、反射和折射。\n\
  \n如果有人说他们最喜欢的颜色是白色，那一定意味着所有颜色都是他们的最爱，因为白色是可见光谱中所有颜色的总和。如果是黑色，那他们不喜欢任何颜色，因为黑色是颜色的缺失。事实上，这就是为什么你不应该在温暖晴朗的日子里穿黑色衣服。你的衣服吸收了如此多的能量（以光和红外线的形式），其中一部分最终转化为热量。\n\
  \n**注意** 当太阳直射头顶时，每平方米的辐照度可达约 1 千瓦。其中，略多于一半是红外线，让我们感到温暖，略少于一半是可见光，而可怜的 32 瓦则是紫外线。\n\
  \n据说亚里士多德提出了第一个已知的颜色理论。他考虑了四种颜色，每种对应四种元素之一：气、土、水、火。\n\n然而，当我们审视可见光谱时，你会注意到从紫色到红色有一个连续的渐变，其中既没有水也没有火。你也不会看到如今通常用于定义各个色调的离散的红、绿、蓝值。19\
  \ 世纪初，英国博学家托马斯·杨提出了三色模型，使用三种颜色来模拟所有可见色调。杨提出视网膜由神经纤维束组成，这些纤维束会对不同强度的红光、绿光或紫光做出反应。德国科学家赫尔曼·冯·亥姆霍兹后来在\
  \ 19 世纪中期扩展了这一理论。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image\
  \ 115](img/index-97_1.jpg)\n\n**第 4 章：开启光照**\n\n**93**\n\n**注意** 杨是一位特别生动的家伙。（总得有人这么说。）他不仅是*生理光学*领域的奠基人，还在业余时间发展了光的波动理论，包括发明了经典的双缝实验，这是大学物理的基石。但等等！还有更多！他还提出了毛细现象理论，第一个以现代意义使用*能量*一词，部分破译了罗塞塔石碑的埃及部分，并设计了一种改进的乐器调音方法。\n\
  \n这家伙肯定严重睡眠不足。\n\n如今，颜色最常通过红绿蓝（RGB）三元组及其相对强度来描述。每种颜色在零强度下变为黑色，随着强度增加呈现不同的色调，最终被感知为白色。由于这三种颜色需要叠加才能产生整个光谱，因此该系统是一种加法模型。\n\
  \n\n\n除了 RGB 模型，打印机还使用一种称为 CMYK 的减色模式，代表青色-品红-黄色-黑色（K）。由于三种原色无法产生真正的深黑色，因此添加黑色作为阴影或图形细节的强调色。\n\
  \n另一种常见模型是 HSV，代表色调-饱和度-明度，在许多图形软件或颜色选择器中，你会经常发现它作为 RGB 的替代方案。HSV 于 20 世纪 70 年代专门为计算机图形学开发，它将颜色描绘为一个\
  \ 3D 圆柱体（图 4-1）。饱和度从内向外变化，明度从下到上变化，而色调则围绕边缘分布。其变体 HSL 用亮度替代了明度。图 4-2 展示了 macOS 颜色选择器的多个版本。\n\
  \n![图 4-1. HSV 色轮或圆柱体（来源：维基共享资源）](img/index-98_1.jpg)\n\n![图 4-2. OS X 的标准颜色选择器——RGB、CMYK、HSV\
  \ 以及广受欢迎的 Crayola 模型](img/index-98_2.jpg)\n\n## 第 4 章：点亮灯光\n\n## 要有光\n\n在现实世界中，光线从四面八方涌来，携带各种颜色，当它们组合时，能创造出日常生活中的细节和丰富场景。OpenGL\
  \ 并不试图复制现实世界的照明模型，因为这些模型非常复杂且耗时，通常仅供迪士尼的渲染农场使用。但它能以足够满足实时游戏需求的方式，对此进行近似模拟。\n\nOpenGL\
  \ ES 1 使用的光照模型允许我们在场景中放置多个不同类型的光源。我们可以随意开启或关闭它们，并指定方向、强度、颜色等。但这还不是全部，因为还需要描述模型的多种属性以及它如何与入射光线交互。光照定义了光源与物体以及构成物体的材质之间的相互作用方式。\n\
  \n着色（Shading）则进一步根据光照和材质来决定像素的颜色。请注意，一张白纸对光线的反射方式与一个粉色的、带镜面效果的圣诞装饰球完全不同。综合起来，这些属性被封装成一个称为材质（Material）的对象。将材质的属性与光的属性融合在一起，就生成了最终场景。\n\
  \n**注意：** OpenGL ES 2 完全没有内置光源，这完全留待程序员通过着色器自行实现。iOS 5 中新增的 GLKit 框架，通过`GLKBaseEffect`对象添加了几个光源，但这并不能作为替代版本\
  \ 1 通用目的的解决方案。\n\nOpenGL 光源的颜色最多可由三种不同的分量组成：\n\n-   **漫反射（Diffuse）**\n-   **环境光（Ambient）**\n\
  -   **镜面反射（Specular）**\n\n漫反射光可以说来自单一方向，如太阳或手电筒。它照射到物体上，然后向四面八方散射，产生一种舒适的柔和质感。当漫反射光照射到表面时，反射量主要由入射角决定。当表面正对光源时最亮，随着表面逐渐倾斜远离光源，亮度会下降。\n\
  \n环境光是指不来自特定方向的光，它由环境中所有表面反射而来。环顾你所在的房间，从天花板、墙壁和家具上反弹回来的光线共同构成了环境光。如果你是一名摄影师，你会知道环境光对于让场景比单一光源更逼真有多么重要，尤其是在人像摄影中，你会使用柔和的“补光”来冲淡更亮的主光。\n\
  \n镜面反射光是从光泽表面反射回来的光。它来自特定方向，但以更具方向性的方式从表面反弹。它产生了我们在迪斯科球或刚清洗打蜡的汽车上看到的高光亮点。当视线与光源方向直接对齐时，它最亮，并随着我们围绕物体移动而迅速减弱。\n\
  \n就漫反射光和镜面反射光而言，它们通常是相同的颜色。但即使我们被限制在八个光源对象内，为每个分量设置不同的颜色实际上意味着一个 OpenGL“光源”可以同时扮演三个不同光源的角色。在这三者中，你可以考虑让环境光使用不同的颜色，通常是与主色调相对的颜色，以增强场景的视觉趣味性。在太阳系模型中，一个暗淡的蓝色环境光有助于照亮行星的暗面，并赋予其更强的\
  \ 3D 质感。\n\n**注意：** 你不必为给定光源指定所有三种类型。在简单场景中，通常只需使用漫反射光即可。\n\n## 回归趣事（稍作停留）\n\n我们的理论部分还没结束，不过先回到编码一会儿。之后，我会再介绍更多关于光照和着色理论的内容。\n\
  \n你在之前的示例中看到了，如何使用标准 RGB 版本在每个顶点上定义颜色，这样我们就能在没有光照的情况下看到我们的世界。现在，我们将创建各种类型的光源，并将它们放置在我们所谓的行星周围。OpenGL\
  \ ES 必须至少支持八个光源，iOS 也是如此。当然，你可以创建更多光源，并根据需要添加或移除它们。如果你非常讲究，可以在运行时通过使用`glGet*`的多个变体之一来查询特定\
  \ OpenGL 实现支持的光源数量，从而获取此值：\n\n```c\nint numLights;\nglGetIntegerv(GL_MAX_LIGHTS,\
  \ &numLights);\n```\n\n**注意：** OpenGL ES 有许多实用函数，其中`glGet*()`是最常用的之一。`glGet*`调用让你能够查询各种参数的状态，比如从当前模型视图矩阵到当前的线宽。具体调用取决于所请求的数据类型。要小心不要过于频繁地使用这些调用，尤其是在生产代码中，因为它们的效率非常低。\n\
  \n让我们回到第 3 章的示例代码，那里有一个压扁的红蓝星球，并做以下修改：\n\n1.  确保压扁值为 1.0，并且行星由 10 个经线段和 10 个纬线段构成。\n\
  2.  在`Planet.m`文件中，注释掉`init()`方法末尾的`blue+=colorIncrment`这一行。\n\n你应该会看到什么？来吧，别偷看。遮住图\
  \ 4-3，猜一猜。猜到了吗？现在你可以编译并运行了。图 4-3（左）就是你应该看到的结果。现在回到`initGeometry`方法，将经线段和纬线段的数量都增加到\
  \ 100。这应该会得到图 4-3（右）的结果。所以，仅仅通过改变几个数字，我们就得到了一个粗略的光照和着色方案。但这只是一个固定的光照方案，一旦你想开始移动物体，它就会失效。这时，就该让\
  \ OpenGL 来承担繁重的工作了。\n\n不幸的是，添加光源的过程并不像调用`glMakeAwesomeLightsDude()`那么简单，我们接下来就会看到。\n\
  \n![图 4-3. 从下方模拟光照（左）和使用更高多边形数模拟着色（右）](img/index-101_1.jpg)\n\n1.  创建一个新的头文件来存放一些系统级的值，命名为`OpenGLSolarSystem.h`。目前，它应该只包含以下两行代码：\n\
  \n```c\n#import <OpenGLES/ES1/gl.h>\n#define SS_SUNLIGHT GL_LIGHT0 //GL 使用 GL_LIGHTx\n\
  ```\n\n\n\n2. 在 `solar-system` 视图控制器顶部添加 `#import \"OpenGLSolarSystem.h\"`。\n\n\
  3. 添加清单 4-1 中的代码，并在你的 `viewDidLoad()` 方法中调用它（该方法位于包含所有其他初始化器的视图控制器中）。同时确保设置当前上下文；否则你将看不到任何内容。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 4 章：开启光照**\n\n**98**\n\n\
  清单 4-1. 初始化光照\n\n```\n-(void)initLighting\n{\n    GLfloat diffuse[]={0.0,1.0,0.0,1.0};\
  \ //1\n    GLfloat pos[]={0.0,10.0,0.0,1.0};   //2\n    glLightfv(SS_SUNLIGHT,GL_POSITION,pos);\
  \ //3\n    glLightfv(SS_SUNLIGHT,GL_DIFFUSE,diffuse); //4\n    glShadeModel(GL_FLAT);\
  \ //5\n    glEnable(GL_LIGHTING); //6\n    glEnable(SS_SUNLIGHT); //7\n}\n```\n\n\
  以下是具体说明：\n\n光照组件采用标准的 RGBA 归一化格式。\n\n在本例中，没有红色分量，最大绿色分量，没有蓝色分量。`alpha` 的最终值目前应保持为\
  \ `1.0`，因为后续章节将详细说明。\n\n第 2 行指定了光源的位置。它的 `y` 坐标为 `+10`，因此它将悬浮在球体上方。\n\n在第 3 行和第\
  \ 4 行中，我们设置了光源的位置以及漫反射分量（设置为漫反射颜色）。`glLightfv()` 是一个新的调用，用于设置各种与光照相关的参数。稍后你可以使用\
  \ `glGetLightfv()` 检索这些数据，该函数从特定光源中检索任何参数。\n\n第 5 行指定了着色模型。`GL_FLAT`（平面着色）意味着一个面是单一纯色，而将其设置为\
  \ `GL_SMOOTH`（平滑着色）则会使颜色在面内部以及面与面之间平滑混合。\n\n最后，第 6 行告诉系统我们要使用光照，而第 7 行则启用了我们创建的一个光源。\n\
  \n**注意** `glLightfv()` 的最后一个参数接受一个包含四个 `GLfloat` 值的数组；`fv` 后缀代表 “float-vector”。还有\
  \ `glLightf()` 调用用于设置单值参数。\n\n现在编译并运行。嗯？你说什么？你只看到一个像 M31 星系中心的超大质量黑洞一样大小的黑色物体？哦，我们忘了点什么，抱歉。如前所述，所有变体的\
  \ OpenGL 仍然是一个相对底层的库，因此需要程序员处理各种你期望由更高级系统管理的维护任务（在 OpenGL ES 2.0 上情况会更糟）。一旦灯光开启，预定义的顶点颜色就会被忽略，所以我们得到了黑色。考虑到这一点，我们的球体模型需要额外一层数据来告诉系统如何照亮其表面，这通过为每个顶点提供一个法线数组来实现。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 122](img/index-103_1.jpg)\n\
  \n**第 4 章：开启光照**\n\n**99**\n\n什么是顶点法线？面法线是垂直于平面或面的归一化向量。但在 OpenGL 中，使用的是顶点法线，因为它们能提供更好的着色效果。听起来很奇怪，一个顶点居然能有自己的“法线”。毕竟，顶点的“方向”是什么？实际上这在概念上很简单，因为顶点法线仅仅是与该顶点相邻的所有面的法线之和的归一化结果。参见图\
  \ 4-4。\n\n图 4-4. 右侧显示了一个面法线，而左侧显示了三角形扇的顶点法线。\n\nOpenGL 需要所有这些信息来判断顶点朝向哪个“方向”，以便计算落在其上的光照量（如果有的话）。当顶点直接朝向光源时最亮，随着它开始倾斜而变暗。这意味着我们需要修改行星生成器，使其在创建顶点和颜色数组的同时创建一个法线数组，如清单\
  \ 4-2 所示。\n\n清单 4-2. 向 `planet.m` 添加法线生成器\n\n```\n- (id) init:(GLint)stacks slices:(GLint)slices\
  \ radius:(GLfloat)radius squash:(GLfloat)squash\n{\n    unsigned int colorIncrment=0;\n\
  \    unsigned int blue=0;\n```\n\n\n\n`unsigned int red=255;`\n\n`int numVertices=0;`\n\
