  ```\n\n最后一步，转至窗口的 `viewcontroller`，将 `viewDidLoad()` 修改为代码清单 3-10。\n\n**代码清单 3-10\\\
  . 新的 `viewDidLoad()` 方法**\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    \n    self.context = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];\n\
  \    \n    if (!self.context)\n    {\n        NSLog(@\"Failed to create ES context\"\
  );\n    }\n    \n    GLKView *view = (GLKView *)self.view;\n    view.context = self.context;\n\
  \    view.drawableDepthFormat = GLKViewDrawableDepthFormat24;\n    \n    m_SolarSystem=[[\
  \ OpenGLSolarSystemController alloc] init];\n    \n    [EAGLContext setCurrentContext:self.context];\n\
  \    \n    [self setClipping];\n}\n```\n\n现在将 `drawInRect()` 方法修改为代码清单 3-11 中的内容。\n\
  \n**第 3 章：构建 3D 世界**\n\n**86**\n\n**代码清单 3-11\\. 太阳系的新 `drawInRect` 方法**\n\n```\n\
  - (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n{\n    glClearColor(0.0,0.0,\
  \ 0.0, 1.0);\n    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n    [m_SolarSystem\
  \ execute];\n}\n```\n\n最后，添加 `setClipping()` 方法（在上一个练习中使用过），确保已将 FOV 重置为 50 或 60\
  \ 度；根据需要修改头文件；然后编译。你应该会看到类似图 3-18 的结果。\n\n图 3-18\\. 未来的行星地球\n\n它实际上正在旋转，但由于毫无特征，你很难察觉到运动。\n\
  \n**第 3 章：构建 3D 世界**\n\n**87**\n\n与之前的示例一样，我们来调整一些参数看看效果。首先，在 `initGeometry` 方法中，将堆栈和切片的数量从\
  \ 10 改为 20。你应该会看到类似图 3-19 的结果。\n\n图 3-19\\. 堆栈和切片数量翻倍后的行星\n\n如果你希望曲线对象看起来更平滑，通常有三种方法：\n\
  \n- 使用尽可能多的三角形。\n- 使用 OpenGL 内置的一些特殊光照和着色工具。\n- 使用纹理。\n\n下一章将介绍第二种方法。但现在，试一下需要多少个切片和堆栈才能制作出一个真正平滑的球体。（两者数量相等时效果最佳。）当每个都达到\
  \ 100 时，效果才开始真正变好。现在，完成这个练习后，先恢复为每个 10 个。\n\n\n如果你想查看球体的实际线框结构，请在 `Planet.m` 文件的\
