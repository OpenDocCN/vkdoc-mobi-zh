  \n我们都见过这种效果。那些幽灵般、发光且轻如薄纱的光点，在电视画面中舞动，或者每当摄像机对准太阳时侵入图像。这是因为太阳光在相机镜头中欢快地来回反射，产生了大量的二次成像。这些成像既可以表现为明亮宽阔的光晕，也可以表现为许多较小的光斑。图\
  \ 7-3a 展示了 1971 年阿波罗 14 号登月任务中的一张图像，光晕遮住了登月舱的大部分。即便是 iPhone 也有类似的问题，如图 7-3b 所示。尽管阿波罗任务在月球上使用的哈苏相机是当时世界上最好的，也无法克服镜头光晕。不幸的是，它已成为计算机图形学中最常见的陈词滥调之一，被用作一种工具来呼喊：“嘿！这不是伪造的计算机图像，因为它有镜头光晕！”然而，镜头光晕确实有其用途，尤其是在太空模拟领域，因为虚拟图像经常要对着假想的太阳。在这种情况下，无论是有意识还是下意识，你都期望有一些视觉提示表明你正在观看一个非常非常明亮的物体。它还有助于为图像增添额外的深度感。光晕是在离用户很近的镜头中产生的，而目标却在数十亿英里之外。\n\
  \n**211**\n\n图 7-3. 左侧是阿波罗 14 号在月球上的视图，右侧是 iPhone 4 拍摄的图像。\n\n根据特定的镜头及其内部的不同镀膜，光晕可以呈现多种不同的形式，但最终通常只是一堆大小和色调各异的幽灵般的多边形。在接下来的练习中，我们将创建一个简单的镜头光晕项目，演示如何在\
  \ 3D 环境中使用 2D 图像。由于设置的代码较多，我在这里只强调关键部分。你需要访问 `www.apress.com` 获取完整的项目代码。\n\n从几何角度看，镜头光晕通常非常简单，因为它们具有对称性。它们表现出两个主要特征：所有镜头光晕都需要一个非常明亮的光源，并且它们会沿着一条穿过屏幕中心的假想对角线排列，如图\
  \ 7-4 所示。\n\n**212**\n\n图 7-4. 镜头光晕是由相机镜头内明亮光源的内部反射引起的。\n\n既然光晕图像是 2D 的，我们该如何将它们放入\
  \ 3D 空间呢？回到最初的示例，弹跳的正方形也是一个 2D 对象。但它的显示依赖于对象如何映射到屏幕的一些默认设置。这里我们将更加具体地处理。\n\n还记得第\
  \ 3 章我提到的透视投影与正射投影的区别吗？前者是我们感知物体维度的方式；后者用于需要精确尺寸和形状时，消除了透视给场景带来的变形。因此，在绘制 2D 对象时，你通常需要确保其视觉尺寸不受世界中其他\
  \ 3D 元素的影响。\n\n在生成镜头光晕时，你需要一小批不同形状的图像来模拟实际镜头的部分结构。六边形或五边形的图像代表了用来调节入射光强度的光圈，如图 7-5\
  \ 所示。由于用于保护镜头或过滤掉不需要波长的各种镀膜，它们也会呈现出不同的色调。\n\n**213**\n\n图 7-5. 六叶片光圈（图片由 Dave Fischer\
  \ 提供）\n\n生成光晕集需要以下步骤：\n\n1.  导入各种图像。\n2.  检测源对象在屏幕上的位置。\n3.  创建穿过屏幕中心的假想向量，用于放置各个光晕元素。\n\
  4.  在该向量上随机散布十几个或更多图像，并设置其随机的大小、颜色和透明度。\n5.  支持触摸拖动，以便在不同位置进行测试。\n\n\n\n我从标准模板开始，并增加了对触摸和拖拽视觉元素的支持。接着，在启动时加载太阳图像，并在\
