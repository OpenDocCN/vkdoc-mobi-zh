  . 有人将 `zNear` 裁剪平面设置得太近了。\n\n最后一个练习：如何才能得到类似图 3-22 的效果？\n\n（这是木星和土星所需的效果；因为它们自转很快，所以并非球体，而是扁球体。）\n\
