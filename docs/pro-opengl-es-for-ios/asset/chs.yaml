  的加入，情况好了很多。还有其它一些最佳实践需要牢记：


  - 如果视图被隐藏或应用程序进入后台，请禁用任何 OpenGL 渲染循环。

  - 如果正在执行全屏核心动画，请禁用任何 OpenGL 视图。

  - 对话框窗口越简单，对 OpenGL 图形的性能影响越小。

  - 少用透明度，特别是当你的 OpenGL 视图位于顶层时。


