  \ 使用捏合手势进行**放大和缩小**\n\n现在我们将实现旋转支持，其中包含那些四元数相关的内容。\n\n向太阳系控制器添加清单 8-5（同时可以移除 `lookAtTarget()`\
  \ 存根）。`m_Earth` 的辅助函数 `getPosition()` 会在清单 8-7 中添加，所以如果清单 8-5 导致出现红色错误标记，不必担心。\n\
