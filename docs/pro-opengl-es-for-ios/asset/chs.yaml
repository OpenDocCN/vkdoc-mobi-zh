  \    \n    scaledSize=zoomBias*size;\n    \n    glScalef(scaledSize,scaledSize,\
  \ 1);\n    \n    glVertexPointer(3, GL_FLOAT, 0, squareVertices);\n    glEnableClientState(GL_VERTEX_ARRAY);\n\
  \    \n    glEnable(GL_TEXTURE_2D);\n    glEnable(GL_BLEND);\n    glBlendFunc(GL_ONE,GL_ONE_MINUS_SRC_COLOR);\n\
  \    glBindTexture(GL_TEXTURE_2D,name);\n    glTexCoordPointer(2, GL_FLOAT,0,textureCoords);\n\
  \    glEnableClientState(GL_TEXTURE_COORD_ARRAY);\n    \n    glColor4f(r,g,b,a);\n\
  \    \n    glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);\n    \n    glMatrixMode(GL_PROJECTION);\n\
  \    glPopMatrix();\n    \n    glMatrixMode(GL_MODELVIEW);\n    glPopMatrix();\n\
  \    \n    glEnable(GL_DEPTH_TEST);\n    glEnable(GL_LIGHTING);\n}\n```\n\n关于此例程，有几点需要注意：\n\
  \n从第 1 行的参数列表可以看出，该例程的作用是在特定的屏幕相对位置绘制纹理。`name` 参数仅仅是其 OpenGL ES 句柄。颜色值可用于按任意方式为图像着色。除此之外，大部分代码与第一章中的原始弹跳方块示例类似，当然也存在一些例外。\n\
  \n第 2 行及之后的部分关闭了光照，因为我们不希望光照在这一层级影响图像。同样，面剔除也被禁用，以确保该块能够被实际渲染，以防其他例程设置的环境与当前不符。为了安全起见，还需要确保颜色数组客户端状态已被禁用。\n\
  \n\n\n第 3 行的`glOrthof()`是一个新例程，它改变由`setClipping()`设置的投影矩阵。在这里，您需要建立一个具有六个面的观察体，类似于在其他地方设置视锥体。然而，`zNear`和`zFar`平面稍有不同。在正交投影模式下，空间的深度是线性映射的，因此值为\
  \ 0.5 的`z`与透视模式下类似的`z`值的解释方式大不相同。因此，如果您依赖深度缓冲来管理正确的`z`剔除，混合使用这两种模式可能会产生意想不到的结果。如果您希望确保\
  \ 2D 对象始终可见，请将`zNear`设置为 0，并将深度值设置为 0。\n\n将正交窗口从-1 设置为 1 意味着任何绘制到屏幕上的 2D 对象都将使用归一化坐标，而不是传统的屏幕坐标。因此，放置在`(0,0)`处的对象将正好位于屏幕中央。`renderTextureAt()`使用基于实际像素定位的值，但在实际输出到屏幕时，这些值会被转换为归一化的正交坐标。\n\
  \n**注意**：在此例程中，会进行许多必要的状态调用，以确保图像按预期渲染，但这些调用会带来相当高的开销。如果速度是关键，则应尽可能少地更改状态。这说明了状态机（如\
  \ OpenGL）的一个问题，因为它会保持特定状态，直到在其他地方显式更改。这意味着您不应期望某个状态正好是您所需的，从而迫使您编写冗长且经常冗余的代码块来确保获得所需状态。可以采用许多优化技巧来最大限度地减少状态更改。一种简单的方法是尽可能将纹理调用批量处理，然后为每个批处理操作仅调用一次状态例程。\n\
  \n我称之为`LensFlare.mm`的镜头光晕管理器以及单个光晕对象都需要修改。对于`LensFlare.mm`的`execute`方法，我添加了两个新参数。`execute()`现在应如下所示：\n\
  \n```\n-(void)execute:(CGRect)frame source:(CGPoint)source scale:(float)scale alpha:(float)alpha\n\
