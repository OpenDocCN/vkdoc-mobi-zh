  好，我们终于完成了第一个示例。是的，对于刚接触 3D 的新手来说，信息量可能太大、来得太快。但我有一个理论：如果你早晨做的第一件事是吃一只冷青蛙，那么接下来的一天一定会好过得多。


  把这个第一个示例当作一只冷青蛙吧，至少在第 7 章之前都是如此。


  **OpenGL 架构**


  现在，既然我们已经把一个“简单”的 OpenGL 程序分析得透透了，让我们简要地看看图形管线的底层运作机制。


  术语“管线”通常用来描述一系列紧密关联的事件是如何相互关联的，如图 1-12 所示。对于 OpenGL ES 来说，这个过程在一端接收一堆数字，在另一端输出真正炫酷的东西，无论是土星图像，还是磁共振成像的结果。


