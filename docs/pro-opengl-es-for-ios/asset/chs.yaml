  ## 你的第一个 OpenGL ES 程序


  有些软件教程会循序渐进地铺垫其特定主题（“枯燥的内容”），直到大约 655 页才开始编码和示例（“有趣的内容”）。另一些则会立即进入一些练习来满足你的好奇心，把枯燥的内容留到稍后再说。本书属于后一类。


  **注意** `OpenGL ES` 是一个基于 `OpenGL` 库的 3D 图形标准，该库于 1992 年诞生于硅谷图形公司的实验室。它广泛应用于业界，从运行游戏的口袋设备到为
  NASA 运行流体动力学模拟（以及玩非常非常快的游戏）的超级计算机，无所不包。ES 系列代表 *嵌入式系统*，意指小型、便携、低功耗的设备。除非另有说明，我将互换使用
  `OpenGL` 和 `OpenGL ES`。


  在为 iOS 开发任何应用时，习惯上让 Xcode 通过其各种向导在项目开始时完成繁重的工作。使用 Xcode（本书以 Xcode 4 为参考），你可以轻松创建一个
  `OpenGL ES` 示例项目，然后添加自己的内容，最终形成一个可能有人愿意从 App Store 购买的东西。


  在 Xcode 4 运行的情况下，转到 `File New New Project`，你应该会看到类似图 1-1 的界面。


  **图 1-1.** Xcode 项目向导


