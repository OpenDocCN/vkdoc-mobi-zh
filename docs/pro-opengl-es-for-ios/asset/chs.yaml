  \ 1.0，这样球体就是标准化的。\n\n请注意，此处处理的是顶点 0 和顶点 2。顶点 0 对应 x，顶点 2 对应 z——它们平行于地面，即 X-Z 平面。由于顶点\
  \ 1 等同于 y，它在每次循环中保持不变，并且当然代表纬度。由于我们是成对进行循环，顶点 3、4 和 5 将覆盖下一个循环。\n\n实际上，我们是在成对生成点，即每个点及其正上方的对应点。这正是\
  \ GL 期望的三角形条带格式，如图 3-17 所示。\n\n**第 3 章：构建 3D 世界**\n\n**83**\n\n图 3-17\\. 由六个顶点构成的三角形条带\n\
  \n在第 11 行，生成颜色数组，并且与顶点一样，它们也是成对生成的。绿色分量暂时被忽略。\n\n在第 12f 行，颜色数组指针和顶点数组指针递增。最后在第 13\
  \ 行，我们增加蓝色分量并减少红色分量。\n\n几何部分处理完毕后，我们需要专注于 `execute` 方法。请参见代码清单 3-7。\n\n**代码清单 3-7\\\
  . 渲染星球**\n\n```\n- (bool)execute\n{\n    glMatrixMode(GL_MODELVIEW); //1\n    glEnable(GL_CULL_FACE);\
