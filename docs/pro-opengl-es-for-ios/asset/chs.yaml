  \ 左）。作为练习，思考一下如何得到图 3-20（右）。现在问问自己，为什么我们看到的不是三角形，而是那种奇特的螺旋图案？这仅仅是 OpenGL 绘制和连接线条条带的方式。我们可以通过指定一个连接数组来渲染三角形轮廓，但对于我们的最终目标来说，这并非必要。\n\
