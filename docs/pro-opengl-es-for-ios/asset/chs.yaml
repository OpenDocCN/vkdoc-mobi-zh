  \n![图 142](img/index-125_1.jpg)\n\n![图 143](img/index-125_2.jpg)\n\n## 第 4 章：开启灯光\n\
  \n**121**\n\n图 4-16：三盏灯光，一盏主灯和两盏补光灯。左侧图像为低分辨率球体，右侧为高分辨率球体。\n\n在前面的示例中，涵盖了一些新的 API\
  \ 调用，这些调用总结在表 4-2 中。请熟悉它们——它们是你的得力助手，今后你会频繁使用它们。\n\n**表 4-2：涵盖的新 API 调用**\n\n| 名称\
  \ | 用途 |\n|------|---------|\n| `glGetLight` | 从特定光源中检索任何参数 |\n| `glLight*` | 设置光源的参数\
  \ |\n| `glLightModel` | 指定光照模型，可以是 `GL_LIGHT_MODEL_AMBIENT` 或 `GL_LIGHT_MODEL_TWO_SIDE`\
  \ |\n| `glMaterialfv` | 定义当前材质的属性 |\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 4 章：开启灯光\n\n**122**\n\n续表\n\n| 名称 | 用途 |\n|------|---------|\n| `glNormal`\
  \ | 为面数组分配单个法线 |\n| `glNormalPointer` | 在执行方法中指定对象的当前法线数组 |\n| `glShadeModel` |\
  \ 可以是 `GL_FLAT` 或 `GL_SMOOTH` |\n| `glPopMatrix` | 从当前栈中弹出一个矩阵 |\n| `glPushMatrix`\
  \ | 将矩阵推入当前栈中 |\n\n## 回到太阳系\n\n现在我们有了足够的工具可以回到太阳系项目了。稍安勿躁，这里有很多内容需要讲解。特别是一些与光照或材质无关，但需要在太阳系模型变得更复杂之前处理的\
  \ OpenGL 其他方面。\n\n首先，我们需要在 `OpenGLSolarSystemController.h` 中添加一些新的方法声明和实例变量。详见代码清单\
