  \ ES 2、着色器以及……**\n\n**329**\n\n\n\n图 10-5\\. 地球/海洋交界处右侧的特写\n\n**引入云层**\n\n看来似乎确实还缺少一些东西。哦，对了，还有那些云层。\n\
  \n不过我们很走运，因为着色器也能轻松处理这个问题。在可下载的项目文件中，我添加了一张整个地球的云层贴图，如图 10-6 所示。陆地部分有些难以辨认，但右下角是澳大利亚，而左半部分则依稀可见南美洲。因此，我们的任务是将它叠加在彩色地形图之上，并去掉所有低对比度的部分。\n\
  \n图 10-6\\. 全球云层图案\n\n我们不仅要为模型添加云层，还要了解如何使用着色器处理多纹理渲染，即如何告诉着色器使用多个纹理？还记得第 6 章中关于纹理单元的内容吗？它们现在非常有用，因为纹理就存储在这些单元中，供片元着色器拾取。通常，对于单一纹理，系统会默认设置，无需额外配置，只需正常调用\
  \ `glBindTexture()` 即可。但如果你想使用多个纹理，则需要进行一些设置。步骤如下：\n\n1.  在主程序中加载新纹理。\n2.  在片元着色器中添加第二个\
  \ `uniform` 类型的 `sampler2D`，以支持第二个纹理，并通过 `glGetUniformLocation()` 获取其位置。\n3.  告诉系统哪个纹理单元对应哪个采样器。\n\
  4.  在主循环 `drawInRect()` 中，激活所需纹理并将其绑定到指定的纹理单元。\n\n现在来看一些具体细节：你已经知道如何加载纹理了，这当然不在话下。因此，在步骤\
  \ 2 中，你需要在片元着色器中添加类似以下几行代码，该着色器与之前几个练习中使用的是同一个：\n\n```glsl\nuniform sampler2D cloud_texture;\n\
  ```\n\n并在 `loadShaders()` 中添加：\n\n```cpp\nuniforms[UNIFORM_SAMPLER1] = glGetUniformLocation(*program,\
  \ \"cloud_texture\");\nuniforms[UNIFORM_SAMPLER0] = glGetUniformLocation(*program,\
  \ \"s_texture\");\n```\n\n步骤 3 在视图控制器的 `setupGL()` 中添加。`glUniform1i()` 调用的第一个参数是片元着色器中\
  \ uniform 变量的“位置”，第二个参数是实际的纹理单元编号。因此，在本例中，`sampler0` 绑定到纹理单元 0，而 `sampler1` 绑定到纹理单元\
  \ 1。由于单个纹理和第一个采样器默认都使用纹理单元 0，因此这段设置代码实际上不需要。\n\n```cpp\nglUseProgram(m_DaysideProgram);\n\
  glUniform1i(uniforms[UNIFORM_SAMPLER0], 0);\nglUniform1i(uniforms[UNIFORM_SAMPLER1],\
  \ 1);\n\nglUseProgram(m_NightsideProgram);\nglUniform1i(uniforms[UNIFORM_SAMPLER0],\
  \ 0);\nglUniform1i(uniforms[UNIFORM_SAMPLER1], 1);\n```\n\n在运行主循环时，步骤 4 可以这样操作：\n\
  \n```objectivec\nglActiveTexture(GL_TEXTURE0);\nglBindTexture(GL_TEXTURE_2D, m_EarthNightTexture.name);\n\
  \nglActiveTexture(GL_TEXTURE1);\nglBindTexture(GL_TEXTURE_2D, m_EarthCloudTexture.name);\n\
  \n[self useProgram:m_NightsideProgram];\n[m_Sphere setBlendMode:PLANET_BLEND_MODE_SOLID];\n\
  [m_Sphere execute:m_EarthNightTexture.name];\n```\n\n`glActiveTexture()` 指定要使用的纹理单元，随后调用\
  \ `glBindTexture()` 绑定纹理。之后，程序就可以用于实现所需效果了。\n\n\n\n现在，`cloud-luv'n` 片段应该看起来像**代码清单\
  \ 10-16**，以执行实际的混合操作。\n\n**代码清单 10-16** 将第二张云纹理与其他纹理混合\n\n```\nprecision mediump\
  \ float;\n\nvarying lowp vec4 colorVarying;\nvarying lowp vec4 specularColorVarying;\n\
  \nuniform mat4 modelViewProjectionMatrix;\nuniform mat3 normalMatrix;\nuniform vec3\
  \ lightPosition;\n\nvarying vec2 v_texCoord;\nuniform sampler2D s_texture;\nuniform\
  \ sampler2D cloud_texture; //1\n\nvoid main()\n{\n    vec4 finalSpecular = vec4(0,0,0,1);\n\
  \    vec4 surfaceColor;\n    vec4 cloudColor;\n\n    float halfBlue; //用于检测主蓝色片元的值。\n\
  \n    surfaceColor = texture2D( s_texture, v_texCoord );\n    cloudColor = texture2D(cloud_texture,\
  \ v_texCoord ); //2\n\n    halfBlue = 0.5 * surfaceColor[2];\n\n    if(halfBlue\
  \ > 1.0)\n        halfBlue = 1.0;\n\n    if((surfaceColor[0] < halfBlue) && (surfaceColor[1]\
  \ < halfBlue))\n        finalSpecular = specularColorVarying;\n\n    if(cloudColor[0]\
  \ > 0.15) //3\n    {\n        cloudColor[3] = 1.0;\n        gl_FragColor = (cloudColor\
  \ * 1.3 + surfaceColor * .4) * colorVarying;\n    }\n    else\n        gl_FragColor\
  \ = (surfaceColor + finalSpecular) * colorVarying;\n}\n```\n\n以下是具体说明：\n\n第 1 行仅仅声明了新的\
  \ `cloud_texture`。\n在第 2 行，我们从云采样器对象中获取云的颜色。\n\n从第 3 行开始，新颜色被过滤并与地球表面图像合并。所使用的数值相当随意，但能呈现最佳图像。当然，为了确保彩色陆地能显现出来，许多精细细节必须被剔除。\n\
  \n由于云是灰度对象，我只需要获取单一颜色进行测试，因为常规的 RGB 值都是相同的。因此，我选择处理所有亮度高于 .20 的纹素。然后，我确保 alpha 通道为\
  \ 1.0，并将所有三个分量组合起来。`cloudColor` 使用了 1.3 的乘数进行轻微增强，而底层表面仅使用 .4，这样既能稍微突出云层，又能使其保持相对不透明。\n\
  \n我希望你会看到类似**图 10-7** 的效果。现在它开始看起来像一个真正的行星了。\n\n**图 10-7** 整合所有元素\n\n这只是使用着色器的一个非常简单示例。例如，在涉及太空主题时，你可以在行星周围生成朦胧的大气层，或者使用\
  \ 3D 体积纹理来模拟星系或星云。要是我还能再写十章就好了……\n\n## 使用 GLKit 的更多乐趣\n\n如前所述，iOS 5 中引入 GLKit 的主要目的是让\
  \ OpenGL ES 的开发工作变得更简单一些。该套件在四个领域提供了新功能，其中三个你已经接触过，并且在 1.0 或 2.0 版本中都非常实用：\n\n-\
  \ `GLKView` 和 `GLKViewController`（隐藏了处理绘制表面时的一些繁琐细节）\n- 纹理管理\n- 数学库（丰富且标准化的数学 API）\n\
  - 特效（封装基于着色器效果的标准化手段）\n\n在这四个方面中，后两者是专门为了让 OpenGL ES 2.0 的开发工作更简便一些而设计的。不过，我们将重点介绍最后一项，因为它能增添一些额外的亮点。\n\
  \n\n\n### GLKEffects\n\n`GLKEffects`库的创建是为了管理基于着色器的效果。在撰写本文时，`GLKit`附带两个预构建的效果类，相信未来还会看到更多。其核心是`GLKBaseEffects`类。`GLKBaseEffects`类集成并“模仿”（借用苹果的术语）了\
  \ OpenGL ES 1 用户在迁移到 OpenGL ES 2 时必须放弃的大部分功能。这包括以下内容：\n\n- 来自 OpenGL ES 1 的基本光照模型，但一次仅支持三个光源（而版本\
  \ 1 支持 8 个或更多）。\n- 材质，使用`GLKEffectPropertyMaterial`类。\n- 支持材质及其所有相关属性。\n- 雾。\n-\
  \ 多重纹理。\n\n以下是两个子类：\n\n- `GLKReflectionMap`：将对象变成一个闪亮的玩具。\n- `GLKSkyboxEffect`：创建一个\
  \ 360 度全景。\n\n---\n\n**第 10 章：OpenGL ES 2、着色器以及……**（第 334 页）\n\n反射效果和天空盒都是游戏及其他领域中常用的标准效果。天空盒在飞行模拟器中非常有用，你可以环顾四周并沉浸在虚拟世界中。\n\
  \n### GLKReflectionMap\n\n有时也称为环境映射，反射映射用于使对象看起来像是用最光滑的金属或玻璃制成的。由于其外观酷炫且相对容易实现，因此在游戏及其他领域很常见。\n\
  \n反射效果主要源于将固定纹理与在其下方移动或旋转的几何体结合使用。这意味着反射面的纹理坐标会动态变化，以抵消底层对象可能产生的任何运动。\n\n最常用的“环境”纹理通常采用所谓的立方体贴图形式。立方体贴图是一种可以细分为六个正方形，然后以立方体形式重新组装在反射对象周围的纹理。为什么用立方体而不是球体？主要是为了减少麻烦，除非你喜欢麻烦并希望获得尽可能纯净且无失真的反射纹理。但创建立方体贴图比创建完整的\
  \ 360 度球体贴图更容易。\n\n想象一下，用纸制成的立方体展开后的样子，以 Hedly 和他的伙伴们为主题，如图 10-8 所示。\n\n---\n\n\
  **第 10 章：OpenGL ES 2、着色器以及……**（第 335 页）\n\n图 10-8：Hedly 和他的朋友们。他们是一群安静的家伙。\n\n那么，如何使用立方体贴图呢？首先，需要习惯在纹理坐标中添加第三个分量，该分量指定要使用的立方体面。立方体贴图基于以下几个假设：\n\
  \n- 反射中的环境非常遥远，因此不会出现视差。\n- 除非你知道自己在找什么，否则不连续性很难被察觉。\n- 除非使用特殊的图像贴图进行补偿，否则对象无法反射自身的任何部分。\n\
  - 对象具有弯曲表面，因为立方体贴图在镜面等平坦表面上看起来效果不佳。\n\n要使用反射/立方体贴图绘制对象，OpenGL 会从你的视点发射一条射线，将其从目标反射回来，并计算出它在立方体贴图上的命中位置。对象上的交点指定要使用的纹理坐标，而立方体贴图上的交点则选择要使用的纹素以及命中的是哪一面。\n\
  \n---\n\n**第 10 章：OpenGL ES 2、着色器以及……**（第 336 页）\n\n基于此，让我们使用`GLKReflectionMapEffect`向地球添加立方体贴图。\n\
  \n你可以从标准模板项目开始，然后将`Planet.mm`添加到其中。\n\n\n\n你需要同时修改视图控制器和行星的代码。首先，让我们在视图控制器中处理你的\
  \ `setupGL()` 方法，用代码清单 10-17 替换模板代码。\n\n**代码清单 10-17\\. 设置反射贴图**\n\n```\n-(NSString\
  \ *)imagePath:(NSString *)image\n\n{\n\nreturn [[NSBundle mainBundle] pathForResource:image\
  \ ofType:NULL];\n\n}\n\n- (void)setupGL\n\n{\n\nint planetSize=50;\n\n[NSArray *images\
  \ = [[NSMutableArray alloc] initWithObjects: //1\n\n[self imagePath:@\"hedly1.png\"\
  ],\n\n[self imagePath:@\"hedly2.png\"],\n\n[self imagePath:@\"hedly3.png\"],\n\n\
  [self imagePath:@\"hedly4.png\"],\n\n[self imagePath:@\"hedly5.png\"],\n\n[self\
  \ imagePath:@\"hedly6.png\"],\n\nnil];\n\n[EAGLContext setCurrentContext:self.context];\n\
  \nNSDictionary *options=\n\n[NSDictionary dictionaryWithObjectsAndKeys:\n\n[NSNumber\
  \ numberWithBool:YES],GLKTextureLoaderOriginBottomLeft,nil];\n\n[GLKTextureInfo\
  \ *info= //2\n\n[GLKTextureLoader cubeMapWithContentsOfFiles:images options:options\
  \ error:nil];\n\n[self.effect = [[GLKReflectionMapEffect alloc] init]; //3\n\nself.effect.light0.enabled\
  \ = GL_TRUE;\n\nself.effect.light0.diffuseColor = GLKVector4Make(1.0f, 1.0f, 1.0f,\
  \ 1.0f);\n\nself.effect.light0.specularColor = GLKVector4Make(1.0f, 1.0f, 1.0f,\
  \ 1.0f);\n\nself.effect.material.shininess = 15.0f;\n\nself.effect.lightingType\
  \ = GLKLightingTypePerPixel;\n\nself.effect.textureCubeMap.name =info.name;\n\n\
  self.effect.light0.position=GLKVector4Make(-5.0f, 5.0f, 10.0f, 1.0);\n\nglEnable(GL_DEPTH_TEST);\n\
  \nm_Eyeposition.x=0.0;\n\nm_Eyeposition.y=0.0;\n\nm_Eyeposition.z=5.0;\n\n[m_Earth=[[Planet\
  \ alloc] init:planetSize slices:planetSize //4\n\nradius:.5f squash:1.0f\n\ntextureFile:@\"\
  earth_light.png\"];\n\n[m_Earth setPositionX:0.0 Y:0.0 Z:-3.0];\n\n}\n```\n\n你肯定想知道这里发生了什么？\n\
  \n六面立方体贴图是通过在第 1 行及之后创建一个包含六张图片的数组来指定的。\n\n第 2 行生成了 `GLKTextureInfo` 对象，并利用其立方体贴图支持来获取所需的六个文件。\n\
  \n第 3 行分配了新的效果对象。之后，光照、材质和位置信息被填充进去，这与老牌的 OpenGL ES 1 并无二致。\n\n最后，在第 4 行，地球像之前一样被生成。\n\
  \n现在我们需要的 `update()` 和 `drawInRect()` 方法，如代码清单 10-18 所示。\n\n**代码清单 10-18\\. 更新效果**\n\
  \n```\n- (void)update\n\n{\n\nGLfloat scale=2.0;\n\nfloat aspect = fabsf(self.view.bounds.size.width\
  \ / self.view.bounds.size.height);//1\n\nGLKMatrix4 projectionMatrix =\n\nGLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f),\
  \ aspect, 0.1f, 100.0f);\n\nself.effect.transform.projectionMatrix = projectionMatrix;\n\
  \nGLKMatrix4 baseModelViewMatrix = GLKMatrix4Identity;\n\nGLKMatrix4 modelViewMatrix\
  \ = GLKMatrix4Identity;\n\n[baseModelViewMatrix = GLKMatrix4Scale(baseModelViewMatrix,scale,scale,scale);\
  \ //2\n\nbaseModelViewMatrix = GLKMatrix4Rotate(baseModelViewMatrix, _rotation,\
  \ 0.0, 0.5, 0.0f);\n\nmodelViewMatrix = GLKMatrix4MakeTranslation(0.0, 0.0, -3.0);\n\
  \nmodelViewMatrix = GLKMatrix4Multiply(modelViewMatrix, baseModelViewMatrix);\n\n\
  self.effect.transform.modelviewMatrix = modelViewMatrix;\n\n[self.effect.matrix=GLKMatrix3Identity;\
  \ //3\n\n_rotation+=0.03;\n\n}\n\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n\
  \n{\n\nGLfloat gray=0.2;\n\nglClearColor(gray,gray,gray, 1.0f);\n\nglClear(GL_COLOR_BUFFER_BIT\
  \ | GL_DEPTH_BUFFER_BIT);\n\n[[self.effect prepareToDraw]; //4\n\n[m_Earth execute:self.effect];\n\
  \n}\n```\n\n在 `update()` 函数中，你会看到我们现在需要依赖新的数学库中的矩阵相关函数；在这个宇宙里，没有 `glRotatef()` 或\
  \ `glTranslatef()`，也没有 `glPushMatrix()` 或 `glPopMatrix()`。\n\n第 1 行及之后指定了投影矩阵，在版本\
  \ 1 的另一个宇宙中，这通常是由 `glFrustum()` 来处理的。\n\n第 2 行及其后面的代码创建了我们进行变换所需的矩阵，最终将最终的 `modelViewMatrix`\
  \ 对象赋值给效果自身的 `GLKEffectPropertyTransform` 对象的 transform 字段。`GLKEffectPropertyTransform`\
  \ 同时包含了 Modelview 矩阵和法线矩阵。\n\n“效果”不仅有自己的变换矩阵，还可以有一个额外的矩阵来处理该效果的特定组件。在这种情况下，第 3 行突出了这个额外的矩阵。Modelview\
  \ 矩阵用于效果的几何图形，就像在版本 1 中一样，但这个新矩阵可以用来变换其他东西。在这里，它可以用于旋转立方体贴图。将其设置为单位矩阵可以使立方体贴图保持静态，只让地球模型旋转。\n\
  \n准备就绪后，调用效果类的 `prepareToDraw()` 方法，它将应用新的设置，之后你可以渲染对象本身，结果如图 10-9 所示。\n\n![Image\
  \ 288](img/index-342_1.jpg)\n\n![Image 289](img/index-342_2.jpg)\n\n**图 10-9\\.\
  \ 地球的反射贴图**\n\n对于像地球模型这样复杂的物体，最好使用更简单的立方体贴图。最基本的立方体贴图通常显示地平线、地面和天空，通常由不同的渐变生成。\n\
  \n## 总结\n\n在这最后一章中，你学到了一些关于 OpenGL ES 2（ES 的可编程管线版本）的知识；了解了着色器是如何以及在哪里融入其中的；并利用它们为地球增加了一些额外的细节。（作为额外挑战，尝试将模拟器的其余部分移植到版本\
  \ 2。）最后的练习使用了 OpenGL ES 2 专属的 GLKit 效果对象来创建立方体贴图和闪闪发光的地球，从而圆满结束了 GLKit 的介绍。我建议你观看苹果公司在\
  \ 2011 年 WWDC 上对 GLKit 所做的精彩演示。iTunes 上有所有在线演讲。\n\n在整本书中，你学习了基础的 3D 理论，既涉及相关的数学知识，也涵盖了总体原则。我希望这能让你对这个主题有了基本的理解，尽管我也知道这本书的篇幅可能会大很多倍，毕竟我们只是浅尝了\
  \ 3D 图形。\n\n\n\n"
- '# 作为一切正式 OpenGL 内容的守护者，Khronos Group 已就此主题出版了多本内容详尽的书籍。人们亲切地以其封面的颜色称呼它们：红皮书（官方编程指南）、蓝皮书（教程与参考）、橙皮书（着色语言）、绿皮书（Mac
  上的 OpenGL）以及略带紫色的书（`OpenGL ES 2`）。还有大量其它第三方书籍，其深入程度远超我所能触及。同样，也有许多专门提供 OpenGL 教程的网站；`nehe.gamedev.net`
  是迄今为止最好的网站之一，在我撰写本文时，它已提供近 50 个不同的教程。


  当您研读其他笔者（无论是来自其他书籍还是网络）的作品时，只需记住，是本书为您带来了太阳、地球和星辰。没有多少其他书能自称有此成就。


