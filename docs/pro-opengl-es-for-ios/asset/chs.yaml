  \ 矩阵（支持变换信息的矩阵）。第 2 行和第 3 行与之前用于剔除球体背面（我们看不到的部分）的代码相同。第 4 行和第 5 行同样熟悉，告诉 OpenGL\
  \ 接收顶点和颜色信息。接下来，在第 6 行提供顶点数据，在第 7 行提供颜色数据。第 8 行负责绘制数组（包括颜色和顶点）的主要工作。\n\n既然星球对象对于这个示例来说已经足够完整，让我们来编写驱动程序。首先，创建一个新的\
  \ Objective-C 对象，将其命名为类似 `OpenGLSolarSystemController` 的名称。然后添加代码清单 3-8a 和 3-8b\
  \ 中的代码来初始化对象和宇宙。\n\n**代码清单 3-8a. 初始化你的宇宙：头文件**\n\n```\n#import <Foundation/Foundation.h>\n\
