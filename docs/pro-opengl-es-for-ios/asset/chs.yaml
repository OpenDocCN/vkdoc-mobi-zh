  \n**图 4-7. 从左到右：包含 20 个堆栈和 20 个切片的球体进行平滑着色，仅 5 个堆栈和切片的球体进行平直着色，以及平滑着色**\n\n## 光与材质的趣味探索\n\
  \n现在，既然我们有了一个漂亮平滑的球体可以摆弄，就可以开始尝试其他光照模型和材质了。但首先做一个思想实验：假设你有一个前面提到的绿色球体，但你的漫射光却是红色的。球体会是什么颜色？（暂停，播放《危险边缘》的主题曲。）准备好了吗？嗯，在现实世界中它会是什么颜色呢？\n\
  \n红绿色？绿红色？紫褐色的粉红锈色？让我们试一下便知。\n\n再次修改`initLighting()`，如代码清单 4-4 所示。注意，光照向量已重命名为其特定颜色，以使其更具可读性。\n\
  \n**代码清单 4-4. 添加更多光照类型和材质**\n\n```\n-(void)initLighting\n\n{\n\nGLfloat pos[]={0.0,3.0,0.0,1.0};\n\
  \nGLfloat white[]={1.0,1.0,1.0,1.0};\n\nGLfloat red[]={1.0,0.0,0.0,1.0};\n\nGLfloat\
  \ green[]={0.0,1.0,0.0,1.0};\n\nGLfloat blue[]={0.0,0.0,1.0,1.0};\n\nGLfloat cyan[]={0.0,1.0,1.0,1.0};\n\
  \nGLfloat yellow[]={1.0,1.0,0.0,1.0};\n\nGLfloat magenta[]={1.0,0.0,1.0,1.0};\n\n\
  GLfloat halfcyan[]={0.0,.5,.5,1.0};\n\n//光照设置在此处\n\nglLightfv(SS_SUNLIGHT,GL_POSITION,pos);\n\
  \nglLightfv(SS_SUNLIGHT,GL_DIFFUSE,green);\n\n//材质设置在此处\n\nglMaterialfv(GL_FRONT_AND_BACK,\
  \ GL_DIFFUSE, red); // 1\n\nglShadeModel(GL_SMOOTH);\n\nglEnable(GL_LIGHTING);\n\
  \nglEnable(SS_SUNLIGHT);\n\nglLoadIdentity();\n\n}\n```\n\n如果你看到了我们的老朋友——M31 的超大质量黑洞，那么你做得很好。那么，为什么它是黑色的？这很简单；还记得本章开头关于颜色和反射的讨论吗？红色物体只有在照射到它的光包含红色成分时才呈现红色，而我们的绿光恰好不包含红色。如果你在暗室里拿着一个红色气球，并用绿光照射它，它会看起来是黑色的，因为没有绿色光反射回来。如果有人问你在暗室里拿着红气球做什么，你只需低吼一声“物理学！”，然后用一种不屑的语气告诉他们，他们不会懂的。\n\
  \n有了这个理解，将第 1 行中的红色漫射材质替换为绿色。你应该得到什么？对，绿色球体再次被照亮了。但你可能会注意到一件非常有趣的事情。现在的绿色看起来比添加材质之前要亮一些。图\
  \ 4-8（左）显示了未指定任何材质的情况，图 4-8（右）显示了添加绿色漫射材质后的情况。\n\n**图 4-8. 未定义绿色材质（左）与定义绿色材质后（右）**\n\
  \n我们再做一个实验。让我们将漫射光改为更传统的白色。那么绿色现在会怎样？红色呢？蓝色呢？由于白光包含所有颜色分量，彩色材质应该都能同样很好地显示出来。但如果你再次看到黑球，那说明你改变的是材质的颜色，而不是光照。\n\
  \n## 镜面光照\n\n那么，镜面反射部分呢？在光照部分添加以下行：`glLightfv(SS_SUNLIGHT,GL_SPECULAR,red);`\n\n\
  在材质部分添加以下行：`glMaterialfv(GL_FRONT_AND_BACK, GL_SPECULAR, red);`\n\n并将光源位置改为以下内容：`GLfloat\
  \ pos[]={10.0,3.0,0.0,1.0};`\n\n> **注意** `glMaterial*`的第一个参数必须始终是`GL_FRONT_AND_BACK`。在常规\
  \ OpenGL 中，允许在面的两侧使用不同的材质，但在 OpenGL ES 中不允许。然而，在 OpenGL ES 中你仍必须使用正面和背面的值，否则材质将无法正常工作。\n\
  \n\n\n"
- "# 排版后的内容\n\n将漫反射材质重置为绿色。你应该会看到一些看起来像是一大堆黄红色混杂的东西。简而言之，其原理是，还有一个我们可以用来调整光照的值。它叫做光泽度（`shininess`），用于指定物体表面的光泽程度，取值范围为\
  \ 0 到 128。值越高，反射越集中，因此表面看起来越有光泽。但由于其默认值为 0，它会将镜面高光（specular wealth）均匀分布在整个星球表面。这极大地压制了绿色，以至于当与红色混合时，显示为黄色。所以，为了控制这种混乱局面，请添加以下这行代码：\n\
  \n`glMaterialf(GL_FRONT_AND_BACK, GL_SHININESS, 5);`\n\n我稍后会解释这背后的真实数学原理，但现在先看看当值为\
  \ 5 时会发生什么。接下来尝试 25，并与图 4-9 进行比较。光泽度值在 5 到 10 之间大致对应塑料材质；大于这个范围，则进入严肃的金属材质领域。\n\n\
  **图 4-9.** 光泽度分别设置为 0、5.0 和 25.0（从左到右）\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 133](img/index-113_1.jpg)\n![Image 134](img/index-113_2.jpg)\n\n## 环境光\n\
  \n是时候玩一下环境光了。将以下这行代码添加到`initLighting()`中，然后编译并运行：\n\n`glLightfv(SS_SUNLIGHT, GL_AMBIENT,\
  \ blue);`\n\n看起来像图 4-10（左）吗？如何才能得到图 4-10（右）中的图像呢？你需要添加以下这行代码：\n\n`glMaterialfv(GL_FRONT_AND_BACK,\
  \ GL_AMBIENT, blue);`\n\n**图 4-10.** 仅有蓝色环境光（左），同时具有环境光和环境材质（右）\n\n除了每个光源的环境光属性外，你还可以设置一个世界环境光值。基于光源的值是变量，就像所有光照参数一样，因此它们会随着距离、衰减等因素而变化。而世界环境光值在你整个\
  \ OpenGL ES 世界中是一个常量，可以按如下方式设置：\n\n`GLfloat colorVector[4] = {r, g, b, a};`\n\n\
  `glLightModelfv(GL_LIGHT_MODEL_AMBIENT, colorVector);`\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n默认值是一种由红色为 0.2、绿色为 0.2、蓝色为 0.2 构成的暗灰色。这有助于确保你的物体无论如何都始终可见。同时，对于`glLightModelfv()`还有一个值，它由参数`GL_LIGHT_MODEL_TWO_SIDE`定义。该参数实际上是一个布尔型浮点数。如果它为`0.0`，则仅照亮一面；否则两面都将被照亮。默认值为`0.0`。如果你出于任何原因想要改变哪一面是正面，可以使用`glFrontFace()`并指定按顺时针或逆时针顺序排列的三角形代表正面。默认顺序是逆时针（CCW）。\n\
  \n## 退一步思考\n\n那么，这里到底发生了什么？事实上，相当多。在实时计算机图形学中，有三种通用的着色模型。OpenGL ES 1 使用了其中的两种，这两种我们都见过了。第一种是扁平着色模型，它简单地用一个恒定值来为每个三角形着色。你在图\
  \ 4-5 中已经看到过它的效果。在过去的好日子里，这是一个可行的选择，因为它比其他任何模型都快得多。\n\n然而，当你口袋里的 iPhone 大致相当于一台手持的\
  \ Cray-1 超级计算机（减去大约 3 吨的重量和液体冷却系统）时，那些速度技巧真的已经成为过去式了。平滑着色模型使用插值着色，计算每个顶点的颜色，然后在整个面上进行插值。OpenGL\
  \ 使用的实际着色类型是这种模型的一种特殊形式，称为 Gouraud 着色。这就是为什么顶点法线是基于所有相邻面的法线生成的。\n\n第三种着色模型被称为 Phong\
  \ 着色，由于 CPU 开销过高，OpenGL 中并未使用。它不是在整个面上插值颜色值，而是插值法线，为每个片段（即像素）生成一个法线。这有助于消除由高曲率产生的非常尖锐角度所导致的边缘伪影。Phong\
  \ 着色可以减轻这种效果，但使用更多三角形来定义物体同样可以做到。\n\n还有其他许多模型。20 世纪 70 年代，来自 JPL-Voyager 动画项目的 Jim\
  \ Blinn 创建了一种 Phong 着色的修改形式，现在被称为 Blinn-Phong 模型。如果光源和观察者可以被视为处于无限远处，那么它的计算密集度会更低。\n\
  \nMinnaert 模型倾向于为漫反射材质增加一点对比度。Oren-Nayer 模型则为漫反射模型添加了一个“粗糙度”成分，以便更好地匹配现实。\n\n##\
  \ 自发光材质\n\n这里还需要介绍的另一个重要的参数是`GL_EMISSION`，它会影响最终颜色。与漫反射、环境光和镜面高光不同，`GL_EMISSION`仅适用于材质，并指定材质具有自发光特性。一个自发光物体拥有自己的内部光源，例如太阳，这在太阳系模型中会很有用。要查看其效果，请将以下代码行添加到`initLighting()`中的其他材质代码中，并移除环境材质：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 135](img/index-115_1.jpg)\n\
  ![Image 136](img/index-115_2.jpg)\n\n`glMaterialfv(GL_FRONT_AND_BACK, GL_EMISSION,\
  \ yellow);`\n\n因为黄色是全强度的，你预计会看到什么？大概是图 4-11a。接下来将值减半，得到如下代码：\n\n`GLfloat yellow[]\
  \ = {.5, .5, 0.0, 1.0};`\n\n现在你看到了什么？我敢打赌它看起来像图 4-11（右）。\n\n**图 4-11.** 一个物体，其自发光材质设置为黄色的全强度（左）；同一个场景，但强度仅为\
  \ 50%（右）\n\n表面上，自发光材质可能看起来和使用环境光的结果相似。但与环境光不同，只有场景中的单个物体会受到影响。而且，作为一个附带好处，它们不会消耗额外的光源对象。然而，如果你的自发光物体确实代表了某种真实光源（例如太阳），那么在它内部放置一个光源对象确实会为场景增加另一层真实感。\n\
  \n关于材质的进一步说明：如果你的物体已经指定了颜色顶点（就像我们的立方体和球体那样），那么这些值可以用来替代设置材质。你必须调用`glEnable(GL_COLOR_MATERIAL)`。这会将顶点颜色应用于着色系统，而不是使用由`glMaterial`调用指定的颜色。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n## 衰减\n\n在现实世界中，当然，光线会随着物体距离光源越远而减弱。OpenGL\
  \ ES 也可以使用以下三个衰减因子中的一个或多个来模拟这个因素：\n\n- `GL_CONSTANT_ATTENUATION`\n- `GL_LINEAR_ATTENUATION`\n\
  - `GL_QUADRATIC_ATTENUATION`\n\n这三个因子被组合成一个值，然后计入你模型每个顶点的总光照量中。它们通过`glLightf(GLenum\
  \ light, GLenum pname, GLfloat param)`进行设置，其中`light`是你的光源 ID，例如`GL_LIGHT0`，`pname`是上述列出的三个衰减参数之一，实际值通过`param`传递。\n\
  \n线性衰减可用于模拟由雾气等因素引起的衰减。二次衰减则模拟了光强随距离增加而自然衰减的规律，这种衰减是指数级的。当光源距离加倍时，光照强度会减少到之前数值的四分之一。\n\
  \n\n\n我们先来看一个参数，`GL_LINEAR_ATTENUATION`。这三个参数背后的数学原理稍后揭晓。请在 `initLighting()` 中添加如下这一行代码：`glLightf(SS_SUNLIGHT,GL_LINEAR_ATTENUATION,.025);`\n\
  \n为了让视觉效果更清晰，请确保关闭自发光材质。你看到了什么？现在将 `pos` 向量中沿 X 轴的距离从 10 增加到 50。图 4-12 展示了结果。\n\n\
  ![图 137](img/index-117_1.jpg)\n\n![图 138](img/index-117_2.jpg)\n\n**第 4 章：点亮灯光**\n\
  \n**113**\n\n**图 4-12.** 光的 x 方向距离为 10（左）和 50（右），恒定衰减系数为 0.025。\n\n### 聚光灯\n\n标准灯光的默认模型是各向同性的；也就是说，它们就像一个没有灯罩的台灯，向各个方向均匀（且刺眼地）发光。OpenGL\
  \ 提供了三个额外的光照参数，可以将普通灯光转换为定向光：`GL_SPOT_DIRECTION`、`GL_SPOT_EXPONENT` 和 `GL_SPOT_CUTOFF`。\n\
  \n由于它是定向光，你需要使用 `GL_SPOT_DIRECTION` 向量来指定其方向。其默认值为 0,0,-1，指向 -Z 轴方向，如图 4-13 所示。如果你想要改变方向，可以使用类似下面的调用，使其指向\
  \ +X 轴方向：\n\n```\nGLfloat direction[]={1.0,0.0,0.0};\nglLightfv(GL_LIGHT0, GL_SPOT_DIRECTION,\
  \ direction);\n```\n\n![图 139](img/index-118_1.jpg)\n\n**第 4 章：点亮灯光**\n\n**114**\n\
  \n**图 4-13.** 指向默认方向的聚光灯\n\n`GL_SPOT_CUTOFF` 指定了聚光灯的光束从锥体中心开始，强度衰减到 0 时的角度，它天然就是整个光束角直径的一半。默认值为\
  \ 45 度，对应 90 度的光束宽度。该值越小，光束越窄。\n\n第三个也是最后一个聚光灯参数 `GL_SPOT_EXPONENT` 决定了光束强度的衰减速率，这是另一种形式的衰减。OpenGL\
  \ ES 会计算光束中心轴与任意顶点所形成的夹角 Θ 的余弦值，并将该余弦值提升到 `GL_SPOT_EXPONENT` 次幂。由于其默认值为 0，因此在达到截止角度之前，光照区域内各处的光强度都相同，此后强度降为\
  \ 0。\n\n### 光照参数实际应用\n\n表 4-1 总结了本节介绍的各种光照参数。\n\n**表 4-1.** OpenGL ES 1.1 中 `glLight()`\
  \ 调用所有可能的光照参数\n\n| 名称 | 用途 |\n| :--- | :--- |\n| `GL_AMBIENT` | 设置灯光的**环境**分量 |\n\
  | `GL_DIFFUSE` | 设置灯光的**漫反射**分量 |\n| `GL_SPECULAR` | 设置灯光的**镜面反射**分量 |\n| `GL_POSITION`\
  \ | 设置灯光的 x、y、z **坐标** |\n| `GL_SPOT_DIRECTION` | 指定聚光灯的**方向** |\n| `GL_SPOT_EXPONENT`\
  \ | 指定从聚光灯束中心向外的**衰减速率** |\n| `GL_SPOT_CUTOFF` | 指定从聚光灯束中心向外的**角度**，强度降为 0 |\n|\
  \ `GL_CONSTANT_ATTENUATION` | 指定衰减因子的**常数**部分 |\n| `GL_LINEAR_ATTENUATION` | 指定衰减因子的**线性**分量；模拟雾或其他自然现象\
  \ |\n| `GL_QUADRATIC_ATTENUATION` | 指定衰减因子的**二次**部分，模拟强度随距离正常减小的效果 |\n\n### 着色背后的数学原理\n\
  \n如你所见，漫反射着色模型使物体看起来非常平滑。它使用了所谓的朗伯光照模型。朗伯光照模型简单地说就是：一个面越直接对准光源，它就会越亮。太阳在天空中的位置越高，你脚下的地面就会越亮。或者用更晦涩但精确的技术版本来描述：反射光的强度从\
  \ 0 增加到 1，其依据是入射光线 I 与面法线 N 之间的夹角 Θ 从 90 度减小到 0 度时的余弦值 cos(Θ)。见图 4-14。这里有个快速的思维实验：当\
  \ Θ 为 90 度时，光线从侧面射入；cos(90) 为 0，因此沿 N 方向反射的光自然为 0。当光线垂直向下，与 N 平行时，cos(0) 为 1，因此最大量的光被反射回去。这可以更正式地表达如下：\n\
  \n\\[\n I_d = k_d I_i \\cos(\\Theta)\n\\]\n\n`Id` 是漫反射的强度，`Ii` 是入射光线的强度，`k d` 代表与物体材质粗糙度松散相关的漫反射率。“松散相关”\
  \ 是指，在许多真实世界的材质中，实际表面可能有些光滑但半透明，而紧挨着表面下的层则执行散射。像这样的材质可能同时具有很强的漫反射和镜面反射分量。另外，在现实中，每个颜色波段可能有自己的\
  \ k 值，因此会有分别对应红、绿、蓝的三个值。\n\n![图 140](img/index-120_1.jpg)\n\n**第 4 章：点亮灯光**\n\n\
  **116**\n\n**图 4-14.** 对于完美漫反射表面，入射光束的反射强度是该光束的垂直分量，即入射光束与表面法线之间夹角的余弦值。\n\n### 镜面反射\n\
  \n如前所述，镜面反射除了更通用的漫反射表面之外，还能使你的模型具有光泽的外观。很少有东西是完全平整或完全闪亮的，大多数介于两者之间。事实上，地球的海洋是很好的镜面反射体，在从远处拍摄的地球图像上，可以清晰地看到海洋中反射的太阳光。\n\
  \n与各个方向强度相等的漫反射“反射”不同，镜面反射高度依赖于观察者的角度。我们学过，入射角等于反射角。这对于完美反射体来说确实是成立的。但除了镜子、51 年款斯图贝克汽车的车头、或者那个在你被炸飞\
  \ 15 万年回到过去之前屏幕上闪过的赛隆百夫长锃亮的前额之外，很少有东西是完美的反射体。因此，入射光线会发生轻微散射；见图 4-15。\n\n![图 141](img/index-121_1.jpg)\n\
  \n**第 4 章：点亮灯光**\n\n**117**\n\n**图 4-15.** 对于镜面反射，入射光线被散射，但仅围绕其反射对应光线的中心。\n\n镜面反射分量的方程可以表示如下：\n\
  \n\\[\n I_{specular} = W(q) I_{light} \\cos^n \\Theta\n\\]\n\n其中：\n\n- `Ilight`\
  \ 是入射光线的强度。\n- `W(q)` 是表面基于 `Ilight` 角度的反射率。\n- `n` 是高光度因子（听起来耳熟吗？）。\n- `Θ` 是反射光线与射入眼睛的光线之间的夹角。\n\
  \n这实际上是基于所谓的菲涅耳反射定律，`W(q)` 值就来源于此。虽然 `W(q)` 没有直接用于 OpenGL ES 1（因为它随入射角变化，比镜面反射光照模型稍微复杂一些），但它可以在\
  \ OpenGL ES 2 版本的着色器中使用。在这种情况下，例如，它在模拟水面反射时特别有用。在 OpenGL ES 1 中，替代它的是一个基于材质设定的镜面反射值的常量。\n\
  \n高光度因子，也称为镜面反射指数，就是我们之前操作过的那个。然而，在现实生活中，n 可以远高于 128 这个最大值。\n\n## 衰减\n\n现在回到前面列出的三种衰减：常数衰减、线性衰减和二次衰减。\n\
  \n\n\n总衰减计算如下，其中`kc`是常数，`kl`是线性值，`kq`是二次分量，`d`表示光源到任意顶点的距离：\n\n`k = 1`\n\n`t`\n\n\
  `k + k d + k d²`\n\n`( )`\n\n`c`\n\n`l`\n\n`q`\n\n**总结**\n\n现在你可以看到，在场景中任何模型的顶点颜色和强度生成过程中，存在许多影响因素，包括：\n\
  \n- 距离衰减\n- 漫反射光和材质\n- 镜面反射光和材质\n- 聚光灯参数\n- 环境光和材质\n- 光泽度\n- 材质的自发光\n\n你可以将这些因素视为作用于整个颜色向量，或作用于颜色的每个独立`R`、`G`、`B`分量。\n\
  \n因此，明确定义后，最终顶点颜色如下：\n\n`color = ambient`\n\n`+`\n\n`+ emissive`\n\n`+ intensity`\n\
  \n`world model`\n\n`ambientmaterial`\n\n`material`\n\n`light`\n\n其中：\n\n`n − 1`\n\
  \n`intensity`\n\n`∑ ( spot light factor)`\n\n`light =`\n\n`( attenuation factor)\
  \ i`\n\n`i`\n\n`i = 0`\n\n`ambient`\n\n`ambient`\n\n`[ +cos(Θ) ^shininess specular\
  \ specular ]`\n\n`light`\n\n`material`\n\n`light`\n\n`material`\n\n换句话说，颜色等于不受光源控制的部分加上所有光源的强度，同时考虑了衰减、漫反射、镜面反射和聚光灯元素。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 4 章：点亮灯光**\n\n**119**\n\
  \n当计算时，这些值分别作用于所讨论颜色的每个`R`、`G`、`B`分量。\n\n**这一切有什么意义？**\n\n了解底层原理的一个好处是，它有助于让`OpenGL`及相关工具不再那么神秘。就像学习一门外语，比如克林贡语（如果你，亲爱的读者，是克林贡人，`majQa’\
  \ nuqDaq ‘oH puchpa’ ‘e’`！），它就不再是以前的神秘事物了；曾经咆哮是咆哮，怒吼是怒吼，现在你可能认出它是一首关于好茶的优美诗歌。\n\n\
  另一个原因是，如前所述，所有这些高级工具在`OpenGL ES 2.0`中都不存在。大多数早期的着色算法都必须由你在称为着色器的小段代码中实现。幸运的是，关于最常见着色器的信息可以在互联网上找到，并且复制上述信息是相对直接的。\n\
  \n**更多有趣的内容**\n\n现在，掌握了所有这些光子学知识，是时候回到编码并引入多个光源了。辅助光源可以以很小的努力为场景的真实感带来令人惊讶的巨大提升。\n\
  \n回到`initLighting()`方法，使其看起来像代码清单 4-5。这里我们添加了两个额外的光源，分别命名为`SS_FILLLIGHT1`和`SS_FILLLIGHT2`。将它们的定义添加到头文件中：\n\
  \n```\n#define SS_FILLLIGHT1 GL_LIGHT1\n#define SS_FILLLIGHT2 GL_LIGHT2\n```\n\n\
  现在编译并运行。你是否看到了图 4-16（左）？这就是前面提到的`Gouraud`着色模型失效的地方，暴露了三角形的边缘。解决方案是什么？此时，只需将切片和堆叠的数量从\
  \ 20 增加到 50，你将得到更令人满意的图像，如图 4-16（右）所示。\n\n代码清单 4-5 添加两个填充光源\n\n```\n-(void)initLighting\n\
  {\n    GLfloat posMain[]={5.0,4.0,6.0,1.0};\n    GLfloat posFill1[]={-15.0,15.0,0.0,1.0};\n\
  \    GLfloat posFill2[]={-10.0,-4.0,1.0,1.0};\n    GLfloat white[]={1.0,1.0,1.0,1.0};\n\
  \    GLfloat red[]={1.0,0.0,0.0,1.0};\n    GLfloat dimred[]={.5,0.0,0.0,1.0};\n\
  \    [www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 4 章：点亮灯光**\n\n**120**\n\
  \n    GLfloat green[]={0.0,1.0,0.0,0.0};\n    GLfloat dimgreen[]={0.0,.5,0.0,0.0};\n\
  \    GLfloat blue[]={0.0,0.0,1.0,1.0};\n    GLfloat dimblue[]={0.0,0.0,.2,1.0};\n\
  \    GLfloat cyan[]={0.0,1.0,1.0,1.0};\n    GLfloat yellow[]={1.0,1.0,0.0,1.0};\n\
  \    GLfloat magenta[]={1.0,0.0,1.0,1.0};\n    GLfloat dimmagenta[]={.75,0.0,.25,1.0};\n\
  \    GLfloat dimcyan[]={0.0,.5,.5,1.0};\n    // Lights go here.\n}\n```\n\n\n\n\
  `glLightfv(SS_SUNLIGHT,GL_POSITION,posMain);`\n\n`glLightfv(SS_SUNLIGHT,GL_DIFFUSE,white);`\n\
  \n`glLightfv(SS_SUNLIGHT,GL_SPECULAR,yellow);`\n\n`glLightfv(SS_FILLLIGHT1,GL_POSITION,posFill1);`\n\
