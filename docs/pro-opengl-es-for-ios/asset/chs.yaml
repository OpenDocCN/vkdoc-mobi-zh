  \ 1962 年创建了传奇游戏 `Spacewar`，它运行在 `PDP-1` 上，如图 1-3 所示。\n\n**图 1-3.** 1962 年的游戏 `Spacewar`，在加州山景城计算机历史博物馆的一台老式\
