  \ 0 开始，法线紧随顶点之后，纹理坐标则位于法线之后。\n\n第 5 行像之前一样绘制数组。\n\n在代码优化方面，我属于需要先验证特定技巧是否有效的人。否则，我可能会花费大量时间来做一些仅能将帧率提升\
  \ 0.23%的事情。游戏程序员或许会将此视为一种荣誉，但我认为这会分散我的注意力，从而剥夺用户获得某个可选新功能或 Bug 修复的机会——因为用户永远无法察觉到这些优化。因此，我开发了一个简单的测试程序来尝试本文描述的各种技巧。前面的两个代码清单便来自这项测试。\n\
