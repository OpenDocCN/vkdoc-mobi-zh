- "# 第 7 章：渲染精美的杂项\n\n\n  \n如果我们确切知道自己在做什么，那它就不叫研究了，不是吗？  \n\n——阿尔伯特·爱因斯坦  \n\n在开始本章时，我试图找一句与杂项主题相称的引言。遗憾的是，能找到的只有一堆杂七杂八的语录。但阿尔伯特·爱因斯坦的这句话确实是个珍宝，几乎可以适用——因为亲爱的读者，你正在开展研究：研究如何制作更丰富、更引人入胜且更有趣的软件。\
  \  \n\n苹果发布的产品和工具用起来很有趣——几乎到了好玩、迷人且令人惊叹的地步。如果打扫房间能像用 iPad 一样有趣，我们都能从 *《好管家》* 杂志获得奖项。\
  \  \n\n在像这样的书中，有时很难对某个特定主题进行清晰分类。因此，当某些内容不足以单独成章时，我们只能把它们一股脑儿塞进一个章节里。所以，这里我将介绍一些经典的呈现与渲染技巧——无论它们是否能应用到太阳系项目中——这些技巧将\
  \ UIKit 元素与 OpenGL 窗口以及场景中组件的用户交互整合在一起。  \n\n## **帧缓冲对象**  \n\n通常简称为 FBO，你可以把帧缓冲对象简单理解为渲染表面。到目前为止，你一直在使用一个\
  \ FBO，可能自己都没意识到：你的场景渲染到的 `EAGL` 上下文本身就是一个 FBO。而你可能不知道的是，你可以同时拥有多个屏幕。和之前一样，我们先从老标准入手，再看看它可以如何延伸发展。\
  \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info)  \n\n**第 7 章：精心渲染的杂项**  \n\
  \n**202**  \n\n## **海德利缓冲对象**  \n\n到了这时候，你应该轻车熟路了：找到第 5 章练习中那个原始 2D 纹理填充的方形。这将像往常一样作为我们的基础框架。你需要创建一个单独的对象来封装新的\
  \ FBO。把它命名为 `FBOController`，并用清单 7-1 和清单 7-2 填充它。  \n\n**清单 7-1.** `FBOController.h`\
  \ 的头文件  \n\n```  \n#import <Foundation/Foundation.h>  \n#import <UIKit/UIKit.h>\
  \  \n#import <GLKit/GLKit.h>  \n\n@interface FBOController : NSObject  \n{  \n \
  \   GLuint m_Texture;  \n    GLuint m_FBO1;  \n}  \n\n-(GLint)getFBOName;  \n-(GLuint)getTextureName;\
  \  \n-(id)initWidth:(float)width height:(float)height;  \n\n@end  \n```  \n\n**清单\
  \ 7-2.** `FBController.m` 的主体部分  \n\n```  \n#import <OpenGLES/ES1/gl.h>  \n#import\
  \ <OpenGLES/ES1/glext.h>  \n#import \"FBOController.h\"  \n\n@implementation FBOController\
  \  \n\n-(id)initWidth:(float)width height:(float)height  \n{  \n    GLint originalFBO;\
  \  \n    GLuint depthBuffer;  \n    \n    // 缓存原始 FBO，稍后恢复  \n    glGetIntegerv(GL_FRAMEBUFFER_BINDING_OES,\
  \ &originalFBO); //1  \n    \n    glGenRenderbuffersOES(1, &depthBuffer); //2  \n\
  \    glBindRenderbufferOES(GL_RENDERBUFFER_OES, depthBuffer);  \n    \n    glRenderbufferStorageOES(GL_RENDERBUFFER_OES,\
  \ //3  \n                             GL_DEPTH_COMPONENT16_OES, width, height);\
  \  \n    \n    // 创建用于渲染的纹理  \n    glGenTextures(1, &m_Texture); //4  \n    glBindTexture(GL_TEXTURE_2D,\
  \ m_Texture);  \n```  \n\n[www.it-ebooks.info](http://www.it-ebooks.info)  \n\n\
  **第 7 章：精心渲染的杂项**  \n\n**203**  \n\n```  \n    glTexImage2D(GL_TEXTURE_2D, 0, GL_RGB,\
  \ width, height, 0,  \n                 GL_RGB, GL_UNSIGNED_SHORT_5_6_5, 0);  \n\
  \    \n    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MIN_FILTER, GL_LINEAR);  \n\
  \    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MAG_FILTER, GL_LINEAR);  \n    glTexParameterf(GL_TEXTURE_2D,\
  \ GL_TEXTURE_WRAP_S, GL_CLAMP_TO_EDGE);  \n    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_WRAP_T,\
  \ GL_CLAMP_TO_EDGE);  \n    \n    // 现在创建实际的 FBO  \n    glGenFramebuffersOES(1,\
  \ &m_FBO1); //5  \n    glBindFramebufferOES(GL_FRAMEBUFFER_OES, m_FBO1);  \n   \
  \ \n    // 将纹理附加到 FBO  \n    glFramebufferTexture2DOES(GL_FRAMEBUFFER_OES, //6 \
  \ \n                              GL_COLOR_ATTACHMENT0_OES, GL_TEXTURE_2D, m_Texture,\
  \ 0);  \n    \n    // 将之前创建的深度缓冲区附加到 FBO  \n    glFramebufferRenderbufferOES(GL_FRAMEBUFFER_OES,\
  \ //7  \n                                 GL_DEPTH_ATTACHMENT_OES, GL_RENDERBUFFER_OES,\
  \ depthBuffer);  \n```  \n\n\n```objectivec\n// 检查我们创建 FBO 是否成功。\nglCheckFramebufferStatusOES(GL_FRAMEBUFFER_OES);\
  \ //8\nGLuint uStatus = glCheckFramebufferStatusOES(GL_FRAMEBUFFER_OES);\nif(uStatus\
  \ != GL_FRAMEBUFFER_COMPLETE_OES)\n{\n    NSLog(@\"错误：初始化 FBO 失败\");\n    return\
  \ 0;\n}\nglClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\nglBindFramebufferOES(GL_FRAMEBUFFER_OES,\
  \ originalFBO); //9\nreturn self;\n}\n-(GLint)getFBOName //10\n{\n    return m_FBO1;\n\
  }\n-(GLuint)getTextureName //11\n{\n    return m_Texture;\n}\n@end\n```\n\n你应该能识别出这里的模式，因为创建\
  \ FBO 与许多其他 OpenGL 对象非常相似。那么，我们来逐一分解：\n\n与许多 OpenGL 对象一样，FBO 使用“名称”作为句柄来唯一标识它们。在第\
  \ 1 行，我们获取了用作主屏幕的原始帧缓冲区对象。这样做是为了做个好邻居，在最后恢复它。否则，可能会错误地使用其他对象。\n\n第 2 行，我们为深度缓冲区生成了一个名称。然后，它被绑定到系统作为当前的渲染缓冲区。如果这是该对象第一次绑定，OpenGL\
  \ 将为其分配内存（不包括图像内存），并在之后的所有绑定中使用该已分配的内存。\n\n在第 3 行，我们实际为缓冲区的图像数据分配了内存。由于图像需要大块的内存，因此它们永远不应当被提前分配，直到真正需要时。这就是为什么绑定和分配操作通常分开进行。\n\
  \n在第 4 行及之后，我们需要分配一个纹理图像并将其链接到帧缓冲区。这是将我们的 FBO 伪装成 OpenGL 眼中与其他纹理无异的接口。在这里，我们还可以设置一些常规纹理属性，例如边缘条件和双线性过滤。\n\
  \n到目前为止，我们只是创建了深度缓冲区和图像接口。在第 5 行，我们实际创建了帧缓冲区对象，并将之前的各部分挂载到它上面。\n\n第 6 行首先挂载了纹理。注意使用了`GL_COLOR_ATTACHMENT0_OES`。纹理部分实际上存储了颜色信息，因此它被称为颜色附着点。\n\
  \n在第 7 行，我们对深度缓冲区执行相同操作，使用`GL_DEPTH_ATTACHMENT_OES`。并且记住，在 OpenGL ES 中，我们只有三种类型的缓冲区附着点：深度、颜色和模板。后者用于实现诸如在屏幕特定区域遮挡渲染等功能。而完整版的\
  \ OpenGL 则添加了第四种类型：`GL_DEPTH_STENCIL_ATTACHMENT`。\n\n第 8 行进行快速错误检查。\n\n如前所述，我们需要在第\
  \ 9 行恢复用于主屏幕的原始 FBO。\n\n最后，第 10 和 11 行提供了获取方法，以便我们可以使用新创建的 FBO。\n\n那么，这仅仅是创建 FBO\
  \ 的过程。你会看到，这是一段相当简洁的代码，使用了 OpenGL ES 1 和 2 中都可用的内置函数。是的，它看起来确实有点过于复杂，但通过一个辅助函数很容易封装起来。\n\
