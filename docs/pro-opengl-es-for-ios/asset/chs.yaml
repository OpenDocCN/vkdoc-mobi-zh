  现在是时候尝试其他组合器设置了。尝试将纹理模式改为 `GL_ADD`，接着是 `GL_BLEND` 和 `GL_DECAL`。我的结果如图 6-12 所示。对于加法模式，请注意叠加纹理的白色部分是不透明的。因为白色在所有三个颜色通道中均为
  1.0，所以它始终会产生 1.0 的颜色，从而遮挡住底层的任何内容。对于非白色的色调，你应该能看到一些 Hedly 纹理透出来。


  如图 6-12（中）所示的 `GL_BLEND` 模式，效果不那么明显。为什么会在红色位置出现青色斑点？很简单。假设红色值为 1.0，即其最大值。考虑 `GL_BLEND`
  的公式：


  `输出 = *P* * (1 - *S*) + *S* × *C*`


  对于红色，第一部分会为零，因为红色的值 1 被公式中的 1 减去；而且，如果使用默认的环境颜色黑色，第二部分也会为零。考虑绿色通道。假设背景图像（即“前一个”颜色）的绿色值为
  0.5，同时保持溅斑颜色（即源）为纯红色（因此溅斑中不含蓝色或绿色）。现在公式的第一部分变为 `.5 * (1.0 - 0.0)`，即 0.5。也就是说，前一个纹理
  Hedly 中绿色的 0.5 值，乘以源纹理中“1 减去绿色”的值。


  由于源纹理红色溅斑中的绿色和蓝色通道均为 0.0，绿色和蓝色组合在一起，没有任何红色，就会产生青色阴影，因为青色是红色的反色。如果你仔细观察图 6-12（中），就能隐约看到一些
  Hedly 透出来。对于洋红色和黄色溅斑也是如此。在图 6-12（右）中，使用了 `GL_DECAL`，其作用类似于塑料模型上的贴花，即应用会遮挡其后任何内容的标志或符号。因此对于贴花，通常将纹理实际图像部分的
  alpha 通道设置为 1.0，而对于非期望图像的任何部分，则设置为 0.0。通常背景为黑色，你可以在绘图程序中让它根据亮度或图像中非零颜色的部分生成 alpha
  通道。对于这个溅斑，由于背景是白色的，我必须先反转颜色将其变为黑色，生成蒙版，然后将其与正常的正片图像合并。实际使用的图像是项目下载中的 `rgb_splats_masked.256.color.png`
  文件。为绿色通道生成了一些略小于 1 的 alpha，结果你可以看到一点点 Hedly 透出来。


