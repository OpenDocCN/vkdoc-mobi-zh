  \n\n\n使用单一位图并为其着色是一种常见的节省内存的做法。如果您正在 OpenGL 层中构建一些 UI 组件，请考虑使用单张图像，并通过这些技术为其着色。您可能会问，为什么它会呈现纯红色，而不仅仅是带有红色色调，从而允许颜色有一些变化？这里发生的情况是，顶点的颜色与每个片段的颜色相乘。对于红色，我使用了\
  \ RGB 三元组`1.0,0.0,0.0`。因此，当每个片段在逐通道乘法中计算时，绿色和蓝色通道将被乘以 0，它们被完全过滤掉，只留下红色。如果您希望让其他一些颜色透出，您可以将顶点指定为偏向更中性的色调，使所需的色调颜色略高于其他颜色，例如`1.0,0.7,0.7`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 187](img/index-186_1.jpg)\n\
  \n![Image 188](img/index-186_2.jpg)\n\n![Image 189](img/index-186_3.jpg)\n\n**第\
  \ 6 章：它会混合吗？**\n\n**183**\n\n图 6-8. 左侧仅显示纹理。中间部分与颜色混合，右侧部分则为纯红色。\n\n您还可以非常轻松地为纹理添加半透明效果。为了实现这一点，我将在此引入一个简化因素。您可以通过简单地使用`glColor4f()`来使用单一颜色为纹理面着色，从而无需创建顶点颜色数组。\n\
  \n将 alpha 设置为小于`1.0`会产生透视纹理的效果，如图 6-9 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
