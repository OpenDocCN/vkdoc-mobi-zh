- "# 第 7 章：完美渲染杂项\n\n好了，深吸一口气——我们还有更多内容要讲。列表 7-13 展示了新的 `drawLight()` 函数，而列表 7-14\
  \ 展示了 `drawPlatform()`。本次练习的核心是列表 7-15（计算阴影矩阵）和列表 7-16（绘制阴影）。你是否已经兴奋起来了？反正我知道我是。\n\
  \n**列表 7-13.** 修改后的 `drawLight()` 函数\n\n```\n-(void)drawLight:(int)lightNumber\n\
  {\n   static GLbyte lampVertices[]={0,0,0}; //1\n   glDisableClientState(GL_COLOR_ARRAY);\n\
  \   glEnable(GL_POINT_SMOOTH); //2\n   glPointSize(5.0); //3\n   glLightfv(lightNumber,\
  \ GL_POSITION, iLightPos ); //4\n   glPushMatrix();\n   glRotatef(m_WorldRotationX,\
  \ 1.0, 0.0, 0.0); //5\n```\n\n\n`glRotatef(m_WorldRotationY, 0.0, 1.0, 0.0);`\n\n\
  `glTranslatef( iLightPosX, iLightPosY, iLightPosZ );` //6\n\n`glColor4f( 1.0, 1.0,\
  \ 0, 1.0);` //7\n\n`glVertexPointer( 3, GL_BYTE, 0, lampVertices );` //8\n\n`glDrawArrays(GL_POINTS,\
  \ 0,1);`\n\n`glPopMatrix();`\n\n`glEnableClientState(GL_COLOR_ARRAY);`\n\n`}`\n\n\
  上述代码将在屏幕上绘制一个圆点，显示光源在任何时刻的所在位置。\n\n由于我们只需要绘制一个点，因此可以在第 1 行中在原点上指定一个单独的顶点。\n\n`GL_POINT_SMOOTH`是一个新函数。它告诉\
  \ OpenGL 绘制的所有点都应为圆形。没有这一设置，光源将被渲染为一个方形。\n\n第 3 行是另一个新调用，它告诉系统该点的直径将为 5 个像素。最大尺寸在不同设备上可能有所差异，但通常直径可达\
  \ 64 或 128 像素。\n\n现在，我们可以在第 4 行设置实际光源的绝对位置。第 5 行及之后的行在世界空间中旋转灯具，而第 6 行对其位置进行平移。通过第\
  \ 7 行将颜色设置为黄色，第 8 行及之后的行提供顶点，然后通过`glDrawArrays()`绘制点。\n\n但等等，还有更多内容！\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 7 章：渲染完备的杂项\n\n**235**\n\n我们需要在立方体下方添加一个平面或平台，以便阴影能够投射其上，如清单 7-14 所示。\n\n\
  **清单 7-14.** 用于在立方体下方渲染平面的 `drawPlatform()` 例程\n\n```\n-(void)drawPlatform:(float)x\
  \ y:(float)y z:(float)z\n{\nstatic const GLfloat platformVertices[] = //1\n{\n-1.0,-0.01,-1.0,\n\
  1.0,-0.01,-1.0,\n-1.0,-0.01, 1.0,\n1.0,-0.01, 1.0\n};\nstatic const GLubyte platformColors[]\
  \ =\n{\n128, 128, 128, 255,\n128, 0, 255, 255,\n64, 64, 64, 0,\n255, 64, 128, 255\n\
  };\nGLfloat scale=1.5; //2\nglEnable( GL_DEPTH_TEST );\nglShadeModel( GL_SMOOTH\
  \ );\nglDisable(GL_CULL_FACE); //3\nglVertexPointer(3, GL_FLOAT, 0, platformVertices);\n\
  glEnableClientState(GL_VERTEX_ARRAY);\nglColorPointer(4, GL_UNSIGNED_BYTE, 0, platformColors);\n\
  glEnableClientState(GL_COLOR_ARRAY);\nglPushMatrix();\nglRotatef(m_WorldRotationX,\
  \ 1.0, 0.0, 0.0); //4\nglRotatef(m_WorldRotationY, 0.0, 1.0, 0.0);\nglTranslatef(x,y,z);\n\
  glScalef(scale,scale,scale); //5\nglDrawArrays(GL_TRIANGLE_STRIP, 0, 4);\nglEnable(GL_CULL_FACE);\n\
  glPopMatrix();\n}\n```\n\n这仅仅用于绘制阴影投映所依赖的方形基础对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n## 第 7 章：渲染完备的杂项\n\n**236**\n\n第 1 行中没有特殊内容，不过与之前我们在 x-y 平面上描述正方形不同的是，这里是在 x-z\
  \ 平面上且 y=0。哦，等等！其实有特殊之处。注意 y 坐标，它们并非像 0.0 这样合理的数值，而是略微负值-0.01。这是一个快速修复“深度冲突”问题的技巧。所谓深度冲突，是指共面物体的像素可能共享或不共享相同的深度值。结果会导致两个面交替闪烁：某一刻\
  \ A 面在最前面，下一刻 B 面的像素又认为自己处于最前面。（注意，这仅在硬件上会出现问题，在模拟器中看起来会是正常的。）如果你足够仔细地观察几乎任何实时 3D\
  \ 软件，都可能在背景中看到一些深度冲突现象。\n\n图 7-12。\n\n在本例中，修复方法是把平台的 y 坐标稍微降低，使其位于阴影下方。这个修复方法并非总是有效，因为它取决于环境、所处理对象的缩放比例等因素。另一种解决方法是使用`glPolygonOffset()`调用。但同样不能保证一定成功。有时你只能尝试不同的方法，看看哪个能解决问题。\n\
  \n由于平台的坐标是归一化的，我们需要像第 2 行那样将它们放大一些，以便使其可用。\n\n第 3 行关闭了面剔除。原因在于，平台只是一个单一的正方形，而我们很容易走到其下方，因此需要看到同一面的两侧。\n\
  \n\n第 4 行在此处与其他地方相同；它只是将平台旋转到世界空间。\n\n第 5 行执行实际的缩放操作；请将其作为第一个要执行的变换。（记住，变换栈可以被视为一个\
  \ FIFO：第一个入栈的变换最先被执行。如果缩放位于其他变换之后，它会将物体绕偏离预期结果的中心进行缩放。）\n\n图 7-12：平台与阴影之间的 Z 缓冲区冲突\n\
  \n现在我们来处理真正有趣的部分——实际计算和绘制阴影。清单 7-15 展示了矩阵的生成方式，而清单 7-16 则绘制了被压扁的阴影。\n\n清单 7-15：计算阴影矩阵\n\
  \n```\n-(void)calculateShadowMatrix\n{\n    GLfloat shadowMat_local[16] =\n    {\n\
  \        iLightPosY, 0.0, 0.0, 0.0,\n        -iLightPosX, 0.0, -iLightPosZ, -1.0,\n\
  \        0.0, 0.0, iLightPosY, 0.0,\n        0.0, 0.0, 0.0, iLightPosY\n    };\n\
  \n    for ( int i=0;i<16;i++ )\n    {\n        iShadowMat[i] = shadowMat_local[i];\n\
  \    }\n}\n```\n\n这实际上是以下更通用矩阵的简化版本：\n\n```\n[ dotp-l[0]*p[0], -l[1]*p[0], -l[2]*p[0],\
  \ -l[3]*p[0],\n  -l[0]*p[1], dotp-l[1]*p[1], -l[2]*p[1], -l[3]*p[1],\n  -l[0]*p[2],\
  \ -l[1]*p[2], dotp-l[2]*p[2], -l[3]*p[2],\n  -l[0]*p[3], -l[1]*p[3], -l[2]*p[3],\
