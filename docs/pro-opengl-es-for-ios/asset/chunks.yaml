    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**CHAPTER 8: Putting\
    \ It All Together** 278\n\n```objectivec\n+(id)allocWithZone:(NSZone *)zone\n\
    {\n    @synchronized(self)\n    {\n        if (m_Singleton == nil)\n        {\n\
    \            m_Singleton = [super allocWithZone:zone];\n            return m_Singleton;\
    \ // Assignment and return on first alUI.\n        }\n    }\n    return nil; //On\
