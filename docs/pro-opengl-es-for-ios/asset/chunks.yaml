- fmt: '# Inspector Overview


    The inspector will let you select what kinds of traces you can record. Each item
    selected will add a new track to the track window. The colors are the ones used
    to distinguish each trace from the others, while the symbols are used only if
    you choose a track style of Line Graph in the Track Display section near the bottom.


    The `Configure` button will flip the page to a larger list of statistics. These
    are all the ones to list in the detail pane. Since not all would work as graphs,
    you have more selections to choose from.


    As of this writing, you have the following kinds of traces you can collect and,
    unless noted, are not cumulative but per frame only (and in most cases, the fewer
    the better):


    - `#Batches`: The number of calls to the various batch routines such as `glDrawArrays()`
    or `glDrawElements()`.

    - `#Disables`: The number of calls to `glDisable()`.

    - `#Enables`: The number of calls to `glEnable()`.

    - `#Flushes`: The number of times `glFlush()` is called.

    - `#GL & Platform Calls`: The total instantaneous number of API calls to both
    OpenGL and iOS per frame.

    - `#GL calls`: Same as previous but OpenGL calls only.

    - `#Lines Rendered`: The number of line primitives rendered.

    - `#Platform Calls`: The total instantaneous number of iOS calls per frame.

    - `#Points Rendered`: The number of point primitives rendered. For my test case,
    it shows 880,000 on my iPad 1, affectionately called Newton. (Think about it.)
    You can also equate those to vertices processed.

    - `#Redundant State Changes`: As mentioned previously, the total count per frame
    of unnecessary state changes. I am currently showing only 19. Your goal would
    be to get this value down to 0.

    - `#Render Passes`: The handle to track multipass rendering.

    - `#Texture Uploads`: The number of textures uploaded to the hardware.

    - `#Triangles Rendered`: The total number of triangle primitives rendered. My
    test app is currently showing a total of 879,978 triangles per frame racing along
    3 FPS on my iPad 1. Of course, things like triangle counts are only relative because
    they can vary wildly depending on size and direction.


    # Target Selector


    When launched from Xcode, your running app will appear here. It will also let
    you select any device or any other apps under development.


    # Track Display


    The displayed traces are the ones selected from the inspector’s panel in the section
    “Frame Statistics to Observe.” You can stack the displays or overlay them one
    on top of the other. And clicking and dragging the little transparent wedge thing
    along the time scale will display the actual values of any of the traces at a
    specific time, as shown in Figure 9-11.


    ![Image 265](index-308_1.jpg)


    **Figure 9-11.** Picking data from the track pane


    # Extended Detail


    This pane will display any extra details that might be available, such as stack
    traces, sample statistics, recommendations, and so on. Currently, in Figure 9-8
    (item 5), for example, it is showing that a call to `glMaterialfv()` is passing
    the wrong parameter—a value that is valid on OpenGL but is unused on ES. That’s
    scary cool.


    It can also point out many of the hints or nudges that Performance Detective can
    show, sounding like a disappointed aunt tsk-tsking if you’re missing a chance
    to use a VBO or if textures are not optimized.


    # Additional Context-Sensitive Settings


    Depending on what tool you’ve selected, you’ll see a collection of additional
    controls to help fine-tune the display and how OpenGL operates. The Overrides
    section will let you turn on or off various parts of the pipeline. And you will
    usually receive many warnings in the process, of the “Are you really sure you
    want to do this?” variety.


    # Detailed Pane


    This is a frighteningly detailed look at various statistics and traces. The selector
    in the toolbar contains several options:'
