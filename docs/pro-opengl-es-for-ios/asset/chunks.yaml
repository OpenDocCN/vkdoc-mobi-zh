    \ 8-8 中的代码，并添加`miniglu.h`。\n\n清单 8-8. 添加视图的旋转代码\n\n```\n-(void)setHoverPosition:(unsigned)nFlags\
    \ location:(CGPoint)location prevLocation:(CGPoint)prevLocation\n{\n    int dx;\n\
    \    int dy;\n    GLKQuaternion orientation,tempQ;\n    GLKVector3 offset,objectLoc,vpLoc;\n\
