    a ‘‘fixed function’’ pipeline). The shader-based applications are most likely
    going to be games where a visually rich experience is as important as anything
    else, while the easier 1.1 framework is just right for simple games, business
    graphics, educational titles, or any other apps that don’t need to have perfect
    atmospheric modeling.


