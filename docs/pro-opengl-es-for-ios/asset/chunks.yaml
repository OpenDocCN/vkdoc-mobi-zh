- fmt: "The top is blue, and the bottom is red. The `colorIncrement` is merely the\
    \ color delta from stack to stack. Red starts at 255, and blue starts at 0, using\
    \ unsigned chars.\n\nFigure 3-16\\. Stacks go up and down, slices go round and\
    \ round, and faces are subdivided into triangle strips.\n\n**CHAPTER 3: Building\
    \ a 3D World**\n\nLines 3 and 4 allocate the memory for both the vertices and\
    \ the colors. Later other arrays will be needed to hold the texture coordinates\
    \ and face normals needed for lighting, but for now, let’s keep things simple.\
    \ Notice that we’re doing 32-bit colors, as with the cube. Three bytes are for\
    \ the RGB triplet, while the fourth is for alpha (translucency) but is not needed\
    \ in this example.\n\nLine 5 starts the outer loop, going from the bottom-most\
    \ stack (or the southern polar regions of our planet or altitude of -90 degrees)\
    \ and up to the northern pole, at +90 degrees. Some Greek identifiers are used\
    \ here for spherical coordinates. `Phi` is commonly used for the latitude-like\
    \ points, while `theta` is used for longitude.\n\nLines 6 and 7 generate the latitude\
    \ for the boundaries of a specific strip. For starters, when `phiIdx` is 0, we\
    \ want `phi0` to be -90 degrees, or -1.57. The -.5 shoves everything down by 90\
    \ degrees; otherwise, our values would go from 0 to 180 degrees.\n\nIn lines 8ff,\
    \ some values are precalculated to minimize the CPU load. Line 9 is the inner\
    \ loop, going from 0 to 360 degrees, and defines the slices. The math is similar,\
    \ so no need to go into extreme detail, except that we are calculating the points\
    \ on a circle, via line 10. Both `m_Scale` and `m_Squash` come into play here.\
    \ But for now, just assume that they are both 1.0, so the sphere is normalized.\n\
    \nNotice that vertex 0 and vertex 2 are addressed here. Vertex 0 is x, while vertex\
    \ 2 is z—which are parallel to the ground, the X-Z plane. Since vertex 1 is the\
    \ same as y, it remains constant for each loop and of course represents the latitude.\
    \ Since we’re doing the loops in pairs, vertices 3, 4, and 5 cover up the next\
    \ loop.\n\nIn effect, we are generating pairs of points, namely, each point and\
    \ its mate immediately above it. And this is the format that GL expects for the\
    \ triangle strips, as shown in Figure 3-17.\n\n**CHAPTER 3: Building a 3D World**\n\
    \n**83**\n\nFigure 3-17\\. A triangle strip of six vertices\n\nIn line 11, the\
    \ color array is generated, and as with the vertices, they are generated in pairs.\
    \ The green component is ignored for now.\n\nAt lines 12f, the color array pointer\
    \ and vertex array pointers are incremented. And finally in line 13, we increment\
    \ the blue and decrement the red.\n\nNow that the geometry is out of the way,\
    \ we need to concentrate on the execute method. See Listing 3-7.\n\n**Listing\
    \ 3-7\\. Rendering the Planet**\n\n```\n- (bool)execute\n{\n    glMatrixMode(GL_MODELVIEW);\
    \ //1\n    glEnable(GL_CULL_FACE); //2\n    glCullFace(GL_BACK); //3\n    \n \
    \   glEnableClientState(GL_VERTEX_ARRAY); //4\n    glEnableClientState(GL_COLOR_ARRAY);\
    \ //5\n    \n    glVertexPointer(3, GL_FLOAT, 0, m_VertexData); //6\n    glColorPointer(4,\
    \ GL_UNSIGNED_BYTE, 0, m_ColorData); //7\n    glDrawArrays(GL_TRIANGLE_STRIP,\
    \ 0, (m_Slices +1)*2*(m_Stacks-1)+2); //8\n    \n    return true;\n}\n```\n\n\
    You should now recognize many of the elements from the cube examples. First, in\
    \ line 1, tell the system that we want to work with the `GL_MODELVIEW` matrix\
    \ (the one that supports the transformation information). Lines 2 and 3 are identical\
    \ to the ones used previously to cull out the back of the sphere that we cannot\
    \ see. Lines 4 and 5 are again familiar and tell OpenGL to accept both vertex\
    \ and color information. Next we supply the vertex data in line 6 and the color\
    \ data in line 7. Line 8 does the heavy lifting in drawing the arrays, both color\
    \ and vertices.\n\nNow that the planet object is complete enough for this example,\
    \ let’s do the driver. First, create a new Objective-C object and call it something\
    \ like `OpenGLSolarSystemController`. Now add the code from Listing 3-8a and 3-8b\
    \ to initialize the object and universe.\n\n**Listing 3-8a. Initializing your\
    \ universe: the header**\n\n```\n#import <Foundation/Foundation.h>\n#import <GLKit/GLKit.h>\n\
    #import \"Planet.h\"\n\n@interface OpenGLSolarSystemController : NSObject\n{\n\
    \    Planet *m_Earth;\n}\n\n-(void)execute;\n-(id)init;\n-(void)initGeometry;\n\
    \n@end\n```\n\n**Listing 3-8b. Initializing your universe: the rest of the stuff**\n\
    \n```\n-(id)init\n{\n    [self initGeometry];\n    return self;\n}\n\n-(void)initGeometry\n\
    {\n    m_Earth=[[Planet alloc] init:10 slices:10 radius:1.0 squash:1.0];\n}\n\
    ```\n\nThe earth model here is initialized at fairly low resolution: 10 stacks\
    \ high, 10 slices around.\n\n**CHAPTER 3: Building a 3D World**\n\n**85**\n\n\
    Listing 3-9 shows the master execute method. As with the cube, we translate the\
    \ earth on the Z-axis and rotate it around the y-axis.\n\n**Listing 3-9\\. Master\
    \ execute method**\n\n```\n-(void)execute\n{\n    static GLfloat angle=0;\n  \
    \  glLoadIdentity();\n    glTranslatef(0.0, -0.0, -3.0);\n    glRotatef(angle,0.0,1.0,0.0);\n\
    \    [m_Earth execute];\n    angle+=.5;\n}\n```\n\nFor the final steps, go to\
    \ the window’s `viewcontroller` and change `viewDidLoad()` to Listing 3-10.\n\n\
    **Listing 3-10\\. The new `viewDidLoad()` method**\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    \n    self.context = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];\n\
    \    \n    if (!self.context)\n    {\n        NSLog(@\"Failed to create ES context\"\
    );\n    }\n    \n    GLKView *view = (GLKView *)self.view;\n    view.context =\
    \ self.context;\n    view.drawableDepthFormat = GLKViewDrawableDepthFormat24;\n\
    \    \n    m_SolarSystem=[[ OpenGLSolarSystemController alloc] init];\n    \n\
    \    [EAGLContext setCurrentContext:self.context];\n    \n    [self setClipping];\n\
    }\n```\n\nNow change the `drawInRect()` method to the one in Listing 3-11.\n\n\
    **CHAPTER 3: Building a 3D World**\n\n**86**\n\n**Listing 3-11\\. The new `drawInRect`\
    \ for the Solar System**\n\n```\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n\
    {\n    glClearColor(0.0,0.0, 0.0, 1.0);\n    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\
    \    [m_SolarSystem execute];\n}\n```\n\nFinally, add in `setClipping()` (used\
    \ in the previous exercise), making sure you’ve reset the FOV to 50 or 60 degrees;\
    \ modify the headers as needed; and compile. You should see something like Figure\
    \ 3-18.\n\nFigure 3-18\\. The future planet Earth\n\nIt is actually rotating but,\
    \ because it has no features at all, you’ll be hard-pressed to see the motion.\n\
    \n**CHAPTER 3: Building a 3D World**\n\n**87**\n\nAs with the previous examples,\
    \ let’s play around with some of the parameters and see what happens. First let’s\
    \ change the number of stacks and slices, from 10 to 20, in the `initGeometry`\
    \ method. You should see something like Figure 3-19.\n\nFigure 3-19\\. The planet\
    \ with double the stacks and slices\n\nIf you want your curved objects to look\
    \ smoother, there are generally three ways:\n\n- Have as many triangles as possible.\n\
    - Use some special lighting and shading tools built into OpenGL.\n- Use textures.\n\
    \nThe next chapter will cover the second option. But for now, see how many slices\
    \ and stacks it takes to make a really smooth sphere. (It works best with an equal\
    \ number of both.) It really starts looking good at 100 each. For now, go back\
    \ to 10 each when finished with this exercise."
