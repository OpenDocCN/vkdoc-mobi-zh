    white teapot, at which point Newell laboriously digitized it by hand. When he
    released the data into the public domain, it quickly achieved the status of being
    the “Hello World!” of graphics programming. Even one of the early OpenGL ES examples
    from Apple’s developer web site had a teapot demo. The original teapot now resides
    at the Computer History Museum in Mountain View, California, just a few blocks
    from Google. See the upper left image of Figure 1-14.


    [www.it-ebooks.info](http://www.it-ebooks.info)


