  trans: "\n有趣的效果。由于这个话题内容庞大，值得用单独一章来讲解，而这一章便是第 6 章。\n\n`第 5 行`确保我们想要的纹理是当前激活的纹理。与其他\
    \ OpenGL 对象一样，纹理被赋予一个“名称”（一个唯一的整数 ID 号），在它被删除之前都会通过这个 ID 号来引用。\n\n`第 6 行`是将纹理坐标交给硬件处理的地方。\n\
    \n正如你之前需要告知客户端处理颜色和顶点一样，你需要在`第 7 行`中对纹理坐标做同样的事情。\n\n`第 8 行`你应该很熟悉，但这一次除了绘制颜色和几何体之外，它还会从当前纹理中获取信息，将四个纹理坐标与`squareVertices[]`数组指定的四个角点一一对应（纹理对象的每个顶点都需要分配一个纹理坐标），并使用`第\
    \ 4 行`指定的数值进行混合。\n\n最后，像禁用颜色和顶点的客户端状态一样，在`第 9 行`禁用纹理的客户端状态。\n\n如果一切正常，你应该会看到类似图\
    \ 5-13a 的效果。你说没看到？图像是倒置的？根据所使用的格式，你的纹理很可能被反转了，其内部原点在左上角而不是左下角。修复方法很简单。将`loadTexture`修改为以下代码：\n\
    \n```\n-(GLKTextureInfo *)loadTexture:(NSString *)filename\n{\n    NSError *error;\n\
    \    GLKTextureInfo *info;\n    NSDictionary *options=[NSDictionary dictionaryWithObjectsAndKeys:\n\
    \                           [NSNumber numberWithBool:YES],\n                 \
    \          GLKTextureLoaderOriginBottomLeft,nil];\n    NSString *path=[[NSBundle\
    \ mainBundle]pathForResource:filename ofType:NULL];\n    info=[GLKTextureLoader\
    \ textureWithContentsOfFile:path options:options error:&error];\n    glBindTexture(GL_TEXTURE_2D,\
    \ info.name);\n    glTexParameteri(GL_TEXTURE_2D,GL_TEXTURE_WRAP_S,GL_REPEAT);\n\
    \    glTexParameteri(GL_TEXTURE_2D,GL_TEXTURE_WRAP_T,GL_REPEAT);\n    return info;\n\
    }\n```\n\n你是在告诉加载器翻转纹理的原点，使其锚定在屏幕的左下角。现在看起来像图 5-13（左图）吗？\n\n注意到纹理也在拾取顶点的颜色了吗？请注释掉`drawInRect()`中的`glEnableClientState(GL_COLOR_ARRAY)`这行代码，现在你应该会看到图\
    \ 5-13（右图）。如果看不到任何图像，请仔细检查你的文件，确保其尺寸是 2 的幂，例如 128x128 或 256x256。\n\n**图 5-13.**\
    \ 为弹跳方块应用纹理。使用顶点颜色（左图）与不使用顶点颜色（右图）。\n\n现在，我们可以复现本章第一部分的一些示例。第一个示例是从纹理中只选取一部分进行显示。将`drawInRect`中的`textureCoords`修改为以下代码：\n\
    \n```\nstatic GLfloat textureCoords[] =\n{\n    0.0, 0.5,\n    0.5, 0.5,\n   \
    \ 0.0, 1.0,\n    0.5, 1.0\n};\n```\n\n你是否得到了图 5-14？\n\n**图 5-14.** 使用 s 和 t 坐标裁剪图像\n\
    \n纹理坐标到实际几何坐标的映射如图 5-15 所示。如果你还不清楚，不妨花几分钟时间理解一下这里发生的事情。简单来说，纹理坐标数组中的坐标与几何坐标数组中的坐标是一一对应的。\n\
    \n**图 5-15.** 纹理坐标与几何坐标之间存在一一对应关系。\n\n现在将纹理坐标修改为以下代码。你能猜到会发生什么吗（图 5-16）？\n\n```\n\
    static GLfloat textureCoords[] =\n{\n    0.0, 0.0,\n    2.0, 0.0,\n    0.0, 2.0,\n\
    \    2.0, 2.0\n};\n```\n"
- fmt: "### Figure 5-16\nRepeating the image is convenient when you need to do repetitive\
    \ patterns such as wallpaper.\n\nNow let’s distort the texture by changing the\
    \ vertex geometry, and to make things visually clearer, restore the original texture\
    \ coordinates to turn off the repeating:\n\n```\nstatic const GLfloat squareVertices[]\
    \ =\n{\n    -0.5f, -0.33f,\n     0.5f, -0.15f,\n    -0.5f,  0.33f,\n     0.5f,\
    \  0.15f,\n};\n```\n\nThis should pinch the right side of the square and take\
    \ the texture with it, as shown in Figure 5-17.\n\n![Image 167](index-154_1.jpg)\n\
    \n### Figure 5-17\nPinching down the right side of the polygon.\n\nArmed with\
    \ all of this knowledge, what would happen if you changed the texture coordinates\
    \ dynamically? Add the following code to `drawInRect` — anywhere should work:\n\
    \n```\nstatic float texIncrease = 0.01;\n\ntextureCoords[0] += texIncrease;\n\
    textureCoords[2] += texIncrease;\ntextureCoords[4] += texIncrease;\ntextureCoords[6]\
    \ += texIncrease;\ntextureCoords[1] += texIncrease;\ntextureCoords[3] += texIncrease;\n\
    textureCoords[5] += texIncrease;\ntextureCoords[7] += texIncrease;\n```\n\nThis\
    \ will increase the texture coordinates just a little from frame to frame. Run,\
    \ and stand in awe. This is a really simple trick to get animated textures. A\
    \ marquee in a 3D world might use this. You could create a texture that was like\
    \ a strip of movie film with a cartoon character doing something and change the\
    \ `s` and `t` values to jump from frame to frame like a little flip book. Another\
    \ is to create a texture-based font. Because OpenGL has no native font support,\
    \ it’s up to us, the long-suffering engineers of the world, to add it ourselves.\
    \ Sigh. This could be done by placing the characters of the desired font onto\
    \ a single mosaic texture, called a “font atlas,” and then selecting them by carefully\
    \ using texture coordinates.\n\n![Image 168](index-155_1.jpg)\n\n### Mipmaps\n\
    \nMipmaps are a means of specifying multiple levels of detail for a given texture.\
    \ That can help in two ways: it can smooth out the appearance of a textured object\
    \ as its distance to the viewpoint varies, and it can save resource usage when\
    \ textured objects are far away.\n\nFor example, in Distant Suns, I may use a\
    \ texture for Jupiter that is 1024×512. But that would be a waste of both memory\
    \ and CPU if Jupiter was so far away that it was only a few pixels across. Here\
    \ is where mipmapping can come into play. So, what is a mipmap?\n\nFrom the Latin\
    \ phrase “multum in parvo” (literally: “much in little”), a mipmap is a family\
    \ of textures of varying levels of detail. Your root image might be 128 on a side,\
    \ but when a part of a mipmap, it would have textures that were also 64, 32, 16,\
    \ 8, 4, 2, and 1 pixel on a side, as shown in Figure 5-18.\n\n### Figure 5-18\n\
    Hedly the head, the mipmapped edition.\n\nIn iOS5, switching on mipmapping is\
    \ done by adding only one additional parameter to the `GLKTextureLoader:textureWithContentsOfFile()`\
    \ call. So swap in the options dictionary in place of the previous one, as follows:\n\
    \n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:\n \
    \   [NSNumber numberWithBool:YES], GLKTextureLoaderOriginBottomLeft,\n    [NSNumber\
    \ numberWithBool:TRUE], GLKTextureLoaderGenerateMipmaps,\n    nil];\n```\n\nNaturally,\
    \ `drawInRect()` also needs some changes. Swap out your old `drawInRect()` for\
    \ the new and improved version in **Listing 5-5**. This will cause the `z` value\
    \ to oscillate back and forth.\n\n### Listing 5-5\nSubstitute this for your `drawInRect`.\n\
    \n```\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n{\n    static\
    \ int counter = 1;\n    static float direction = -1.0;\n    static float transZ\
    \ = -1.0;\n    static GLfloat rotation = 0;\n    static bool initialized = NO;\n\
    \n    static const GLfloat squareVertices[] =\n    {\n        -0.5f, -0.5f, -0.5f,\n\
    \         0.5f, -0.5f, -0.5f,\n        -0.5f,  0.5f, -0.5f,\n         0.5f,  0.5f,\
    \ -0.5f\n    };\n\n    static GLfloat textureCoords[] =\n    {\n        // ...\
    \ (texture coordinates continue)\n    };\n}\n```"
