    \n        //The second one\n        float phi1 = M_PI * ((float)(phiIdx+1) * (1.0/(float)(m_Stacks))\
    \ - 0.5);\n        float cosPhi0 = cos(phi0);\n        float sinPhi0 = sin(phi0);\n\
    \        float cosPhi1 = cos(phi1);\n        float sinPhi1 = sin(phi1);\n    \
