    root of the solar-system model. The next chapter will cover shading, lighting,
    and materials, and a second object will be added.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **Chapter 4


    **Turning On the Lights**


    You must be strong now. You must never give up. And when people [or


    code] make you cry and you are afraid of the dark, don’t forget the light is always
    there.


    ----Author Unknown


    Light is the first of painters. There is no object so foul that intense light
    will not make it beautiful.


    -----Ralph Waldo Emerson


    Everything’s shiny, Cap’n. Not to fret.


    -----Kaylee Frye, Firefly


    This chapter will cover perhaps the single biggest topic for OpenGL ES: the process
    of illuminating, shading, and coloring the virtual landscape. We touched on color
    in the previous chapter, but because it is so integral to both lighting and shading,
    we will cover it more in depth here. For those of you reading the quaint paper
    version of this book, yes, I know, it is odd to have a chapter on colors in a
    monochrome form. However, the ebook version is in color.


    **The Story of Light and Color**


    Without light, the world would be a dark place (duh). Without color, it would
    be hard to tell the difference between stoplights.


    We all take for granted the wondrous nature of light----from the soft and gentle
    illumination off the morning mist to the ignition of a space shuttle’s main engines
    to the shy pale radiance of a full moon on a snowy field in mid-winter. A lot
    has been written about the physics of light and its nature and perception. It
    might take an artist a lifetime


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 4: Turning On the Lights**


    **92**


    to fully understand how to take colored pigments suspended in oil and to apply
    them on a canvas to create a believable rainbow at the base of a waterfall. Such
    is the task of OpenGL ES when it comes to turning on the lights in our scenes.


    Sans poetry, light is merely a portion of the full electromagnetic spectrum that
    our eyes are sensitive to. The same spectrum also includes radio signals that
    our iPhones use, X-rays to aid a physician, gamma rays sent out from a dying star
    billions of years ago, and microwaves that can be used to reheat some pizza left
    over from Wii Bowling Night last Thursday.


    Light is said to have four main properties: wavelength, intensity, polarization,
    and direction. The wavelength determines the color that we perceive, or whether
    we can actually see anything in the first place. The visible spectrum starts in
    the violet range, with wavelengths of around 380 nanometers, on up to red, with
    a wavelength of around 780 nanometers. Immediately below is ultraviolet, and right
    above the visible range you’ll find infrared, which we can’t directly see but
    can detect indirectly in the form of heat.


    The way we perceive colors from objects has to do with what wavelengths the object
    or its material absorbs or otherwise interferes with the oncoming light. Besides
    absorption, it could be scattered (giving us the blue of the sky or the red of
    the sunset), reflected, and refracted.


    If someone says that their favorite color is white, they must mean that all colors
    are their favorite because white is a summation of all colors of the visible spectrum.
    If it is black, they don’t like any colors, because black is the absence of color.
    In fact, that is why you shouldn’t wear black on a nice warm sunny day. Your clothing
    absorbs so much energy (in the form of light and infrared) that some of that ultimately
    turns into heat.


    **Note** When the sun is straight overhead, it can deliver an irradiance of about
    1 kilowatt for every square meter. Of that, a little more than half is infrared,
    sensed as a very warm day, while a little less than half is visible light, and
    a measly 32 watts are devoted to UV.


    It is said that Aristotle developed the first known color theory. He considered
    four colors, each corresponding to one of the four elements of air, earth, water,
    and fire.


    However, as we look at the visible spectrum, you will notice a nice contiguous
    spread from violet on one end to red on the other that has neither water nor fire
    in it. Nor will you see discrete values of red, green, or blue, typically used
    nowadays to define the individual shades. In the early 19th century, British polymath
    Thomas Young developed the tricolor model that uses three colors to simulate all
    visible hues. Young proposed that the retina was made up of bundles of nerve fibers,
    which would respond to varying intensities of red, green, or violet light. German
    scientist Hermann von Helmholtz later expanded this theory in the mid-19th century.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 115](index-97_1.jpg)


    **CHAPTER 4: Turning On the Lights**


    **93**


    **Note** Young was a particularly colorful fellow. (Someone had to say it.) Not
    only was he the founder of the field of *physiological optics*, in his spare time
    he developed the wave theory of light, including the invention of the classic
    double-slit experiment, which is a college physics staple. But wait! There’s more!
    He also proposed the theory of capillary phenomena, was the first to use the term
    *energy* in the modern sense, partially deciphered some of the Egyptian portion
    of the Rosetta Stone, and devised an improved means of tuning musical instruments.


    The laddie must have been seriously sleep-deprived.


    Today, colors are most frequently described via red-green-blue (RGB) triplets
    and their relative intensity. Each of the colors fades to black with zero intensity
    and shows varying hues as the intensity increases, ultimately perceived as white.
    Because the three colors need to be added together to produce the entire spectrum,
    this system is an additive model.'
