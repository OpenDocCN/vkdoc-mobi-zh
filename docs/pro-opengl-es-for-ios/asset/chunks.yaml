  trans: "\n不过，我们确实添加了镜头光晕、点和线对象，使应用程序支持高分辨率 Retina 显示屏，并涵盖了全屏抗锯齿以及 OpenGL 视图与标准 iOS\
    \ 控件的混合使用。\n\n在下一章中，我们将探讨优化技巧，以及如何利用苹果自带的工具来定位 OpenGL ES 应用程序的性能瓶颈。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n# 第 9 章\n## 性能与技巧\n\n一分性能胜过十分承诺。\n\n—— 梅·韦斯特\n\n我的速度如此之快，以至于昨晚我在酒店房间里关掉电灯开关后，在房间变暗之前就已经躺到床上了。\n\
    \n—— 穆罕默德·阿里\n\n在处理 3D 世界时，性能几乎始终是一个问题，因为即便是简单的场景也需要大量的数学运算。如果你只需要渲染一个弹跳的立方体，那倒不必担心；但如果你想展示整个宇宙，你就必须时刻关注性能。\n\
    \n到目前为止，所有的练习都力求清晰明了（希望如此），但并不一定追求高效。而遗憾的是，高效的代码往往不是最清晰、最容易理解的。因此，现在我们将开始研究一些略显凌乱的内容，并探讨如何将它们整合到你的应用程序中。\n\
    \n在苹果的 OpenGL ES 手册中，有一个名为“最佳实践”的章节。本章将详细讲解这部分内容，然后介绍一些苹果专门为开发者提供的、用于分析和调试 OpenGL\
    \ 程序的工具。\n\n### 顶点缓冲对象\n\n性能优化的两个主要方向是：最小化图形硬件之间的数据传输，以及最小化数据本身。顶点缓冲对象（VBO）属于前者的范畴。当你生成几何体并将其愉快地发送到显示设备时，通常的做法是告诉系统在哪里可以找到每个所需的数据块，启用要使用的数据（顶点、法线、颜色和纹理坐标），然后进行绘制。每次调用\
    \ `glDrawArrays()` 或 `glDrawElements()` 时，都必须将所有数据打包并发送到图形处理单元（GPU）。每一次数据传输都需要消耗有限的时间，而如果某些数据能够缓存在\
    \ GPU 上，性能就会得到提升。顶点缓冲对象就是一种在 GPU 上分配常用数据的方法，这些数据可以在显示时被调用，而无需每次都重新提交。\n\n创建和使用\
    \ VBO 的过程你应该很熟悉，因为它模仿了纹理的创建过程：首先生成一个“名称”，为数据分配空间，加载数据，然后在需要使用时调用 `glBindBuffer()`。\n\
    \n清单 9-1 展示了我如何从行星数据中创建一个 VBO。由于大多数行星的形状基本相同，即大致呈球形，因此我们可以在 CPU 上缓存一个球体模型，并将其用于任何行星或卫星——当然，火卫一、火卫二、土卫七、冥卫二和天卫二等不规则天体除外。\n\
    \n#### 清单 9-1. 为行星模型创建 VBO\n\n```\n-(void)createVBO\n{\n    int numXYZElements=3;\n\
    \    int numNormalElements=3;\n    int numColorElements=4;\n    int numTextureCoordElements=2;\n\
    \    long totalXYZBytes;\n    long totalNormalBytes;\n    long totalTexCoordinateBytes;\n\
    \    int numBytesPerVertex;\n\n    glGenBuffers(1, &m_VBO_SphereDataName); //1\n\
    \    glBindBuffer(GL_ARRAY_BUFFER, m_VBO_SphereDataName);\n\n    numBytesPerVertex=numXYZElements;\
    \ //2\n    if(m_UseNormals)\n        numBytesPerVertex+=numNormalElements;\n \
    \   if(m_UseTexture)\n        numBytesPerVertex+=numTextureCoordElements;\n  \
    \  numBytesPerVertex*=sizeof(GLfloat);\n\n    //3\n    glBufferData(GL_ARRAY_BUFFER,\
    \ numBytesPerVertex*m_NumVertices, 0, GL_STATIC_DRAW);\n\n    //4\n    GLubyte\
    \ *vboBuffer=(GLubyte *)glMapBufferOES(GL_ARRAY_BUFFER, GL_WRITE_ONLY_OES);\n\n\
    \    //5\n    totalXYZBytes=numXYZElements*m_NumVertices*sizeof(GLfloat);\n}\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n"
- fmt: "# CHAPTER 9: Performance 'n' Stuff\n\n## 291\n\n`totalNormalBytes=numNormalElements*m_NumVertices*sizeof(GLfloat);`\
    \ `totalTexCoordinateBytes=numTextureCoordElements*m_NumVertices*sizeof(GLfloat);`\n\
    \n```\nmemcpy(vboBuffer,m_VertexData,totalXYZBytes); //6\n```\n\n```\nif(m_UseNormals)\n\
    {\n    vboBuffer += totalXYZBytes;\n    memcpy(vboBuffer,m_NormalData,totalNormalBytes);\n\
    }\n```\n\n```\nif(m_UseTexture)\n{\n    vboBuffer += totalNormalBytes;\n    memcpy(vboBuffer,m_TexCoordsData,totalTexCoordinateBytes);\n\
    }\n```\n\n```\nglUnmapBufferOES(GL_ARRAY_BUFFER); //7\n```\n\n```\nm_TotalXYZBytes=totalXYZBytes;\n\
    m_TotalNormalBytes=totalNormalBytes;\n}\n```\n\nHere's what's going on:\n\nFirst\
    \ we need to generate a name for this VBO in line 1, in a manner similar to textures.\n\
    \nNext, tally up the size of each vertex in the lines 2ff. And in this case a\
    \ vertex is the summation of its coordinates, texture coordinates, and the normal\
    \ vector, as required. The total is now multiplied by the total number of vertices.\n\
    \nLine 3 actually allocates the memory on the GPU. This can be deleted by using\
    \ `glDeleteBuffer()` when your object is no longer needed. The final parameter\
    \ is a hint to the driver saying that the data is never expected to change. If\
    \ you expect to update it, then use `GL_DYNAMIC_DRAW`. Don't be surprised if you\
    \ see no change between the two, because the current driver could very well ignore\
    \ it.\n\nLine 4 starts the process of uploading the data to the cache. This can\
    \ be done a couple of ways: via memory mapping or a direct upload. Here we use\
    \ memory mapping by calling `glMapBufferOES()`. This returns a pointer to a memory-mapped\
    \ portion of the GPU's data storage inside the application's address space. The\
    \ other method uses the more traditional `glBufferData()`. The advantage of the\
    \ former is that it can prevent an extra memory copy on part of your application\
    \ that would otherwise be necessary to join multiple components together into\
    \ one big array for uploading.\n\nNow calculate the total number of bytes for\
    \ each data type. Both the normals and the xyz coordinates require the same memory\
    \ each, while we're using only 2D texture coordinates.\n\nThe magic starts in\
    \ lines 6ff where it is possible to copy the individual buffers one at a time\
    \ by merely using `memcpy()`.\n\n`glUnmapBufferOES()` in line 7 forces the actual\
    \ copy action to execute.\n\n## 292\n\nSo, how do we use VBOs? Very easily. Take\
    \ a look at the `executeVBO()` method in Listing 9-2.\n\n**Listing 9-2. Rendering\
    \ the Planet Using VBOs**\n\n```\n-(bool)executeVBO\n{\n    int i;\n    static\
    \ int counter=0;\n\n    glBindBuffer(GL_ARRAY_BUFFER, m_VBO_SphereDataName); //1\n\
    \n    glMatrixMode(GL_MODELVIEW);\n\n    glDisable(GL_CULL_FACE); //2\n    glEnable(GL_BLEND);\n\
    \    glEnable(GL_DEPTH_TEST);\n\n    glEnableClientState(GL_VERTEX_ARRAY); //3\n\
    \n    if(m_UseNormals)\n        glEnableClientState(GL_NORMAL_ARRAY);\n\n    glVertexPointer(3,GL_FLOAT,0,(GLvoid*)(char*)0);\
    \ //4\n    glNormalPointer(GL_FLOAT,0,(const GLvoid*)(char*)(0+m_TotalXYZBytes));\n\
    \    glTexCoordPointer(2,GL_FLOAT,0,\n        (const GLvoid*)((char*)(m_TotalXYZBytes+m_TotalNormalBytes)));\n\
    \n    if(m_UseTexture)\n    {\n        if(m_TexCoordsData!=nil)\n        {\n \
    \           glEnable(GL_TEXTURE_2D);\n            glEnableClientState(GL_TEXTURE_COORD_ARRAY);\n\
    \n            if(m_TextureID!=0)\n                glBindTexture(GL_TEXTURE_2D,\
    \ m_TextureID);\n\n        }\n    }\n    else\n        glDisableClientState(GL_TEXTURE_COORD_ARRAY);\n\
    \n    //5\n    glDrawArrays(GL_TRIANGLE_STRIP, 0, (m_Slices+1)*2*(m_Stacks-1)+2);\n\
    \n    glDisable(GL_BLEND);\n    glDisable(GL_TEXTURE_2D);\n\n    return true;\n\
    }\n```\n\n## 293\n\nRendering the VBOs is pretty straightforward, with only a\
    \ single \"huh?\" in the process.\n\nLine 1 binds it, in the same way a texture\
    \ is bound. This simply makes it the current object in use, until another is bound\
    \ or this one is unbound with `glBindBuffer(GL_ARRAY_BUFFER, 0);`."
