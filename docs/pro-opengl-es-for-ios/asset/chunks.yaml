    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 8: Putting It All Together**


    **266**


    The multiplication is done via another GLUT helper routine at lines 2ff.


    First the projection matrix and then the model matrix operate on our


    object’s xyz coordinates. (Remember, the first transform in the list is the last
    to be executed.) Note that the first call to


    **gluMultMatrixVector3f()** passes the ‘‘in’’ array, followed by the ‘‘out,’’


    while the second one passes the two arrays in reverse order. There’s


    nothing clever here-----the second instance reverses the use of the two just to
    recycle the existing arrays.


    In lines 3ff, the resulting values of the earlier calculations are


    normalized and then mapped against the screen’s dimensions, giving


    us the final values.


    We’d likely never to have to call **gluProject()** directly; instead, the caller
    is **gluGetScreenLocation()**, which merely gets the needed


    matrices in lines 4ff, passes them on to **gluProject()**, and retrieves the screen
    coordinates. Because of the inversion of the Y-axis that


    OpenGL ES does, we need to uninvert it in line 5.


    And one final tweak comes courtesy of the Retina display, in line 6.


    The de facto screen dimensions on the iPhone are 320x480\. What the


    scale value is used for is to scale up any screen coordinates to handle the higher
    resolution. Scale would be 1 on any pre-Retina devices,


    while it would be 2 otherwise.


