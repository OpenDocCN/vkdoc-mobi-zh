  trans: '


    # 图 3-11

    在旋转执行前进行缩放（左图）与旋转执行后进行缩放（右图）。先旋转几何体，再旋转立方体的本地轴，此时其本地轴不再与原点对齐。随后进行缩放时，物体会沿世界坐标系的
    Y 轴（而非自身轴）拉伸。这就好比，你一开始就有一个已旋转一定角度的立方体顶点列表，并在无其他操作的情况下对其缩放。因此，如果你在最后一步进行缩放，整个世界都会被拉伸。


    ## 调整数值

    当我们开始尝试不同数值时，更多乐趣也随之而来。本节将演示多个重要原理，这些原理不仅适用于 OpenGL ES，也几乎存在于你可能遇到的任何 3D 工具包中。


    ## 裁剪区域

    有了一个可运行的示例后，我们可以通过调整某些数值并观察变化来获得乐趣。首先，我们将视锥体的远裁剪平面值 `zFar` 从 1000 改为 1.5，以调整远裁剪平面。为什么这么做？请记住，立方体的本地原点为
    2.0，其尺寸为 1.0。因此，当它正面朝向我们时，最近的点距离为 2.5，因为每个侧面各以原点为中心向两侧延伸 0.5。所以，将 `zFar` 改为 1.5
    后，立方体正对我们时就会被隐藏。但它的某些部分会“露出”一点，看起来就像是水面上的漂浮物。原因在于，当它旋转时，其角点自然会更接近视平面，如图 3-12 所示。


    那么，当我将近裁剪平面移远时会发生什么？将 `zFar` 重置为 1000（一个足够大以确保我们能看见所有物体的数值），并将 `zNear` 从 0.1 改为
    1.5。你认为效果会怎样？这将与上一个例子相反。结果见图 3-13。


    **图 3-12.** 躲猫猫！当立方体的任何部分比 `zFar` 更远时，就会被裁剪。


    **图 3-13.** 重置 `zFar` 平面，同时将近处 `zNear` 平面后移，以裁剪立方体任何过近的部分。


    在处理庞大而复杂的世界时，像这样使用 Z 轴裁剪非常有用。你可能不希望将所有“可见”物体都渲染出来，因为其中许多物体可能太远而根本看不清。设置 `zFar`
    和 `zNear` 来限制可视距离可以加速系统运行。不过，这并非在物体进入管线前对其进行预裁剪的最佳替代方案。


    ## 视角

    请记住，观察者的 FOV（视角）也可以在视锥体设置中更改。回到我们的弹跳立方体，确保 `zNear` 和 `zFar` 设置恢复为默认值 0.1 和 1000。然后将
    `drawInRect()` 中的 `z` 值改为 -20 并再次运行。你应该会看到如图 3-14（左图）所示的效果。


    接下来我们要进行放大操作。转到 `setClipping()`，将 `fieldOfView` 从 60 度改为 5 度。结果如图 3-14（中图）所示。请注意，与图
    3-14（右图）相比，此时的立方体完全没有明显的消失点，也没有透视效果。


    **图 3-14a,b,c.** 将物体移远（左图），然后放大观察（中图）。最右侧图像为默认 FOV 值 60 度，且立方体距离仅 2 个单位时的效果。


    ## 面剔除

    让我们回到几页前你可能还记得的代码：


    ```

    glEnable(GL_CULL_FACE);

    glCullFace(GL_BACK);

    ```


