    # Figure 3-11

    Scaling before the rotations have been executed (left) and scaling after the rotations
    (right). The geometry is rotated first, and then the cube’s local axis is rotated,
    which no longer aligns with the origin’s axis. Following that with scale, it is
    stretched out along the world’s y-axis, instead of its own. This would be as if
    you already started with a vertex list of a cube rotated partway and scaled it
    with nothing else. So if you make the scaling at the very end, your entire world
    is scaled.


    ## Tweaking the Values

    Now some more fun comes when we can start playing with various values. This section
    will demonstrate a number of the various principles that are not just relevant
    to OpenGL ES but found in nearly every 3D toolkit you’re likely to stumble across.


    ## Clipping Regions

    With a working demo, we can have fun by tweaking some of values and observing
    the changes. First we’ll change the far clipping plane in the frustum by changing
    the value of `zFar` from 1000 down to 1.5. Why? Remember that the cube’s local
    origin is 2.0 and its size is 1.0. So when facing straight at us, the closest
    point would be 2.5 because each of the sides would straddle the origin with .5
    on each side. So, by changing the value of `zFar` to 1.5, the cube would be hidden
    when it is exactly facing us. But portions will peek through, looking something
    like a piece of flotsam poking above the water. The reason is that when it rotates,
    the corners are naturally going to be a little closer to the viewing plane, as
    shown in Figure 3-12.


    So, what happens when I move the near clipping plane farther away? Reset `zFar`
    back to 1000 (a number that is arbitrarily large enough to ensure we can see everything)
    and set `zNear` from .1 to 1.5. What do you think it will look like? It will be
    the opposite of the previous example. See Figure 3-13 for the results.


    **Figure 3-12.** Peek-a-boo! The cube is clipped when any part of it is farther
    away than `zFar`.


    **Figure 3-13.** The `zFar` plane is reset, while the `zNear` plane is moved back
    to clip any part of the cube that is too close.


    Using Z-axis clipping such as this is very helpful when dealing with large and
    complicated worlds. You’d likely not want all objects you might be “looking at”
    to be rendered, because many could be too far away to really see. Setting `zFar`
    and `zNear` to limit the visibility distance could speed up the system. However,
    this would not be the best substitute for preculling your objects before they
    get into the pipeline.


    ## Field of View

    Remember that the viewer’s FOV can also be changed in the frustum settings. Go
    back to our bouncy friend again and make sure your `zNear` and `zFar` settings
    are back to the normal values of .1 and 1000. Now change the `z` value in `drawInRect()`
    to -20 and run again. Figure 3-14 (left) is what you should see.


    Next we’re going to zoom in. Go to `setClipping()` and change `fieldOfView` =5
    degrees from 60 degrees. The results are depicted in Figure 3-14 (center). Notice
    how the cube has no apparent vanishing point or no perspective when compared to
    Figure 3-14 (right).


    **Figure 3-14a,b,c.** Moving the object away (left) and then zooming in on it
    (center). The rightmost image has the default FOV value set to 60 degrees with
    the cube at only 2 units away.


    ## Face Culling

    Let’s go back to the code you might remember from a few pages ago:


    ```

    glEnable(GL_CULL_FACE);

    glCullFace(GL_BACK);

    ```

