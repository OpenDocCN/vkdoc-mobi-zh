- fmt: "当然，没有任何太阳系的模型会在背景中缺少一些漂亮的星星，对吧？到目前为止，所有的示例都足够小，可以在本文中完整打印，但现在随着我们在背景中添加一个简单的星场，情况会略有改变。主要的区别在于所需的数据库，你需要从Apress网站获取，因为它将包含超过500颗视星等低至4.0等的恒星，以及一个包含多个突出星座的轮廓和名称的附加数据库。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**CHAPTER 8: Putting It All\
    \ Together**\n\n**272**\n\n**注意** 恒星的星等是其视亮度；数值越大，恒星越暗。天空中最亮的恒星是天狼星，其视星等为-1.46。肉眼能看到的最暗恒星大约为6.5等。双筒望远镜的极限约为10等，而哈勃太空望远镜则能达到31.5等。每个整数星等之间的实际亮度差异约为2.5倍，因此一颗3等星的亮度大约是一颗4等星的2.5倍。\n\
    \n除了OpenGL ES用于创建实体模型的三角面之外，你还可以指定将模型的每个顶点渲染为具有给定星等和大小的点图像。这对我们自己的小星场来说非常自然。由于这将最终与一些星座轮廓配对，让我们创建一个支持这两种数据的新对象，如清单8-12a和8-12b所示。同时，请确保从网站获取`OpenGLOutlines.h`和`.mm`文件。\n\
    \n**清单8-12a. 星座集合的头文件**\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
    OpenGLOutlines.h\"\n#import \"OpenGLStars.h\"\n\n@interface OpenGLConstellations\
    \ : NSObject\n{\n    OpenGLOutlines *m_Outlines;\n    OpenGLStars *m_Stars;\n\
    }\n\n-(void)execute:(BOOL)constOutlinesOn names:(BOOL)constNamesOn;\n\n@end\n\
    ```\n\n**清单8-12b. 星座集合的主体**\n\n```\n#import \"OpenGLConstellations.h\"\n\n@implementation\
    \ OpenGLConstellations\n\n- (id)init\n{\n    self = [super init];\n\n    if (self)\n\
    \    {\n        m_Outlines=[[OpenGLOutlines alloc]init];\n        m_Stars=[[OpenGLStars\
    \ alloc]init];\n    }\n\n    return self;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**CHAPTER 8: Putting It All Together**\n\n**273**\n\n```\n-(void)execute:(BOOL)constOutlinesOn\
    \ names:(BOOL)constNamesOn\n{\n    [m_Outlines execute: constOutlinesOn showNames:\
    \ constNamesOn];\n    [m_Stars execute];\n}\n\n@end\n```\n\n这个没什么特别的。那么，我们继续介绍星星对象本身，如清单8-13a、8-13b和8-13c所示。这将使用Apple推荐的“数据交错”方法来提高性能。\n\
    \n**清单8-13a. 星容器头文件**\n\n```\n#import <Foundation/Foundation.h>\n#import <OpenGLES/ES1/gl.h>\n\
    #import <OpenGLES/ES1/glext.h>\n\nstruct starData //1\n{\n    GLfloat x;\n   \
    \ GLfloat y;\n    GLfloat z;\n    GLfloat mag;\n    GLfloat r,g,b,a;\n    GLint\
    \ hdnum;\n};\n\n@interface OpenGLStars : NSObject\n{\n    struct starData *m_Data;\n\
