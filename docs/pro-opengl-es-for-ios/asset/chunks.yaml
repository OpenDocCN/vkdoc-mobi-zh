    ]


    *light*


    *material*


    *light*


    *material*


    In other words, the color is equal to the some of the things not controlled by
    the lights added to the intensity of all the lights once we take into account
    the attenuation, diffuse, specular, and spotlight elements.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 4: Turning On the Lights**


    **119**


    When calculated, these values act individually on each of the R, G, and B components
    of the colors in question.


    **What’s This All For?**


    One reason why it is handy to understand what’s going on beneath the hood is that
    it helps make OpenGL and related tools less mysterious. Just like when you learn
    a foreign language, say Klingon (and if you, dear reader, are Klingon, majQa’
    nuqDaq ‘oH


    puchpa’ ‘e’!), it ceases to be the mystery that it once was; where growls were
    growls and snarls were snarls, now you might recognize it as a lovely poem about
    fine tea.


    And another reason is, as mentioned early on, all of these nice ‘‘high-level’’
    tools are absent in OpenGL ES 2.0\. Most any of the earlier shading algorithms
    will have to be implemented by you in little bits o’ code that are called shaders.
    Fortunately, information on the most common shaders is available on the Internet
    and, replicating the previous information, relatively straightforward.


    **More Fun Stuff**


    Now, armed with all of this photonic goodness, it’s time to get back to coding
    and introduce more than one light. Secondary lights can make a surprisingly large
    difference in the authenticity of the scene for little effort.


