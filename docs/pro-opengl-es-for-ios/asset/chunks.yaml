  raw: '****Let’s just look at one, **GL_LINEAR_ATTENUATION**, for the time being.
    The math behind all three will be unveiled in a moment. Add the following line
    to **initLighting():** **glLightf(SS_SUNLIGHT,GL_LINEAR_ATTENUATION,.025);**


    And just to make things a little clearer visually, ensure that the emissive material
    is turned off. What do you see? Now increase the distance down the X-axis from
    10 to 50


    in the **pos** vector. Figure 4-12 illustrates the results.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 137](index-117_1.jpg)


    ![Image 138](index-117_2.jpg)


    **CHAPTER 4: Turning On the Lights**


    **113**


    **Figure 4-12\. The light’s x distance is 10 (left) and 50 (right), with a constant
    attenuation of 0.025.


    **Spotlights**


    The standard lights default to an isotropic model; that is, they are like a desk
    light without a shade, shining equally (and blindingly) in all directions. OpenGL
    provides three additional lighting parameters that can turn the run-of-the-mill
    light into a directional light:


    **GL_SPOT_DIRECTION**


    **GL_SPOT_EXPONENT**


    **GL_SPOT_CUTOFF**


    Since it is a directional light, it is up to you to aim it using the **GL_SPOT_DIRCTION**
    vector. It defaults to 0,0,-1, pointing down the --Z-axis, as shown in Figure
    4-13\. Otherwise, if you want to change it, you would use a call similar to the
    following that aims it down the +X-axis:


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 139](index-118_1.jpg)


    **CHAPTER 4: Turning On the Lights**


    **114**


    **GLfloat direction[]={1.0,0.0,0.0};**


    ****glLightfv(GL_LIGHT0, GL_SPOT_DIRECTION, direction);**


    Figure 4-13\. A spotlight aimed at the default direction


    **GL_SPOT_CUTOFF** specifies the angle at which the spotlight’s beam fades to
    0 intensity from the center of the spotlight’s cone and is naturally half the
    angular diameter of the full beam. The default value is 45 degrees, for a beam
    width of 90 degrees. And the lower the value, the narrower the beam.


    The third and final spotlight parameter, **GL_SPOT_EXPONENT**, establishes the
    rate of drop-off of the beam’s intensity, which is still another form of attenuation.
    OpenGL ES will take the cosine of the angle formed by the beam’s center axis and
    that of an arbitrary vertex, Θ, and raise it to the power of **GL_SPOT_EXPONENT**.
    Because its default is 0, the light’s intensity will be the same across all parts
    of the illuminated region until the cutoff value is reached, and then it drops
    to zero.


    **Light Parameters in Play**


    Table 4-1 summarizes the various light parameters covered in this section.


    Table 4-1\. All of the Possible Lighting Parameters for ***glLight*()*** Calls
    in OpenGL ES 1.1


    **Name Purpose**


    **GL_AMBIENT**


    Sets the ambient component of a light


    **GL_DIFFUSE**


    Sets the diffuse component of a light


    **GL_SPECULAR**


    Sets the specular component of a light


    **GL_POSITION**


    Sets the x,y,z coordinates of the light


    **GL_SPOT_DIRECTION**


    Aims a spotlight


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 4: Turning On the Lights**


    **115**


    **Name Purpose**


    **GL_SPOT_EXPONENT**


    Specifies the rate of falloff from the center of a


    spotlight’s beam


    **GL_SPOT_CUTOFF**


    Specifies the angle from the center of a spotlight’s


    beam and drops to 0 intensity


    **GL_CONSTANT_ATTENUATION**


    Specifies the constant of the attenuation factor


    **GL_LINEAR_ATTENUATION**


    Specifies the linear component of the attenuation


    factor; simulates fog or other natural phenomena


    **GL_QUADRATIC_ATTENUATION**


    Specifies the quadratic portion of the attenuation


    factor, simulating the normal decrease in intensity as


    a function of distance


    **The Math Behind Shading**


    The diffuse shading model gives a very smooth look to objects, as you have seen.
    It uses something called the Lambert lighting model. Lambert lighting states simply
    that the more directly aimed a specific face is to the light source, the brighter
    it will be. The ground beneath your feet is going to be brighter the higher the
    sun is in the sky. Or in the more obscure but precise technical version, the reflective
    light increases from 0 to 1


    as the angle, Θ, between the incident light, I, and the face’s normal, N, decrease
    from 90


    to 0 degrees based on cos (Θ). See Figure 4-14\. Here’s a quickie thought experiment:
    when Θ is 90 degrees, it is coming from the side; cos(90) is 0, so the reflected
    light along N is naturally going to be 0. When it is coming straight down, parallel
    to N, cos(0) will be 1, so the maximum amount will be reflected back. And this
    can be more formally expressed as follows:


    *I* = *k I* cos(Θ)


    *d*


    *d i*


    *Id* is the intensity of the diffuse reflection, *Ii* is the intensity of the
    incoming ray of light, and *k d* represents the diffuse reflectance that is loosely
    coupled to the roughness of the object’s material. Loosely means that in a lot
    of real-world materials, the actual surface may be somewhat polished but yet translucent,
    while the layers immediately underneath perform the scattering. Materials such
    as this may have both strong diffuse and specular components. Also, each color
    band may have its own k value in real life, so there would be one for red, green,
    and blue.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 140](index-120_1.jpg)


    **CHAPTER 4: Turning On the Lights**


    **116**


    Figure 4-14\. For a perfectly diffuse surface, the reflected intensity of an incoming
    beam will be the vertical component of that beam, or cosine of the angle between
    the incoming beam and the surface normal.


    **Specular Reflections**


    As referenced earlier, specular reflections serve to give your model a shiny appearance
    besides the more general diffuse surface. Few things are perfectly flat or perfectly
    shiny, and most lay somewhere in between. In fact, the earth’s oceans are good
    specular reflectors, and on images of the earth from long distances, the sun’s
    reflection can clearly be seen in the oceans.


    Unlike a diffuse ‘‘reflection,’’ which is equal in all directions, a specular
    reflection is highly dependent on the viewer’s angle. We’ve been taught that the
    angle of incidence=angle of reflectance. This is true enough for the perfect reflector.
    But with the exception of mirrors, the nose of a ’51 Studebaker, or the nicely
    polished forehead of that Cylon centurion right before he blasts you 150,000 years
    into the past, few things are perfect reflectors. And as such, there will be a
    slight scattering of the incoming ray; see Figure 4-15.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 141](index-121_1.jpg)


    **CHAPTER 4: Turning On the Lights**


    **117**


    Figure 4-15\. For a specular reflection, the incoming ray is scattered but only
    around the center of its reflected counterpart.


    The equation of the specular component can be expressed as follows:


    *I*


    = *W* ( *q*) *I* cos *n* Θ


    *specular*


    *light*


    where:


    *Ilight* is the intensity of the incoming ray.


    *W* ( *q*) is how reflective the surfaces is based on the angle of *Ilight*.


    n is the shininess factor (sound familiar?).


    Θ is the angle between the reflected ray and the ray hitting the eye.


    This is actually based on what’s called the Fresnel Law of Reflection, which is
    where the W(q) value comes from. Although W(q) is not directly used by OpenGL
    ES 1 because it varies with the angle of incidence and is therefore a little more
    complicated than the specular lighting model, it could be used in a shader for
    version OpenGL ES 2\. In that case, it would be particularly useful in doing reflections
    off the water, for example. In its place is a constant that is based on the specular
    values from the material setting.


    The shininess factor, also called the specular exponent, is what we played with
    earlier.


    However, in real life n can go far higher than the max of 128.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 4: Turning On the Lights**


    **118**


    **Attenuation**


    Now back to the three kinds of attenuation listed earlier: constant, linear, and
    quadratic.'
  trans: "\n我们先来看一个参数，`GL_LINEAR_ATTENUATION`。这三个参数背后的数学原理稍后揭晓。请在 `initLighting()`\
    \ 中添加如下这一行代码：`glLightf(SS_SUNLIGHT,GL_LINEAR_ATTENUATION,.025);`\n\n为了让视觉效果更清晰，请确保关闭自发光材质。你看到了什么？现在将\
    \ `pos` 向量中沿 X 轴的距离从 10 增加到 50。图 4-12 展示了结果。\n\n![图 137](img/index-117_1.jpg)\n\
    \n![图 138](img/index-117_2.jpg)\n\n**第 4 章：点亮灯光**\n\n**113**\n\n**图 4-12.** 光的\
    \ x 方向距离为 10（左）和 50（右），恒定衰减系数为 0.025。\n\n### 聚光灯\n\n标准灯光的默认模型是各向同性的；也就是说，它们就像一个没有灯罩的台灯，向各个方向均匀（且刺眼地）发光。OpenGL\
    \ 提供了三个额外的光照参数，可以将普通灯光转换为定向光：`GL_SPOT_DIRECTION`、`GL_SPOT_EXPONENT` 和 `GL_SPOT_CUTOFF`。\n\
    \n由于它是定向光，你需要使用 `GL_SPOT_DIRECTION` 向量来指定其方向。其默认值为 0,0,-1，指向 -Z 轴方向，如图 4-13 所示。如果你想要改变方向，可以使用类似下面的调用，使其指向\
    \ +X 轴方向：\n\n```\nGLfloat direction[]={1.0,0.0,0.0};\nglLightfv(GL_LIGHT0, GL_SPOT_DIRECTION,\
    \ direction);\n```\n\n![图 139](img/index-118_1.jpg)\n\n**第 4 章：点亮灯光**\n\n**114**\n\
    \n**图 4-13.** 指向默认方向的聚光灯\n\n`GL_SPOT_CUTOFF` 指定了聚光灯的光束从锥体中心开始，强度衰减到 0 时的角度，它天然就是整个光束角直径的一半。默认值为\
    \ 45 度，对应 90 度的光束宽度。该值越小，光束越窄。\n\n第三个也是最后一个聚光灯参数 `GL_SPOT_EXPONENT` 决定了光束强度的衰减速率，这是另一种形式的衰减。OpenGL\
    \ ES 会计算光束中心轴与任意顶点所形成的夹角 Θ 的余弦值，并将该余弦值提升到 `GL_SPOT_EXPONENT` 次幂。由于其默认值为 0，因此在达到截止角度之前，光照区域内各处的光强度都相同，此后强度降为\
    \ 0。\n\n### 光照参数实际应用\n\n表 4-1 总结了本节介绍的各种光照参数。\n\n**表 4-1.** OpenGL ES 1.1 中 `glLight()`\
    \ 调用所有可能的光照参数\n\n| 名称 | 用途 |\n| :--- | :--- |\n| `GL_AMBIENT` | 设置灯光的**环境**分量\
    \ |\n| `GL_DIFFUSE` | 设置灯光的**漫反射**分量 |\n| `GL_SPECULAR` | 设置灯光的**镜面反射**分量 |\n\
    | `GL_POSITION` | 设置灯光的 x、y、z **坐标** |\n| `GL_SPOT_DIRECTION` | 指定聚光灯的**方向** |\n\
    | `GL_SPOT_EXPONENT` | 指定从聚光灯束中心向外的**衰减速率** |\n| `GL_SPOT_CUTOFF` | 指定从聚光灯束中心向外的**角度**，强度降为\
    \ 0 |\n| `GL_CONSTANT_ATTENUATION` | 指定衰减因子的**常数**部分 |\n| `GL_LINEAR_ATTENUATION`\
    \ | 指定衰减因子的**线性**分量；模拟雾或其他自然现象 |\n| `GL_QUADRATIC_ATTENUATION` | 指定衰减因子的**二次**部分，模拟强度随距离正常减小的效果\
    \ |\n\n### 着色背后的数学原理\n\n如你所见，漫反射着色模型使物体看起来非常平滑。它使用了所谓的朗伯光照模型。朗伯光照模型简单地说就是：一个面越直接对准光源，它就会越亮。太阳在天空中的位置越高，你脚下的地面就会越亮。或者用更晦涩但精确的技术版本来描述：反射光的强度从\
    \ 0 增加到 1，其依据是入射光线 I 与面法线 N 之间的夹角 Θ 从 90 度减小到 0 度时的余弦值 cos(Θ)。见图 4-14。这里有个快速的思维实验：当\
    \ Θ 为 90 度时，光线从侧面射入；cos(90) 为 0，因此沿 N 方向反射的光自然为 0。当光线垂直向下，与 N 平行时，cos(0) 为 1，因此最大量的光被反射回去。这可以更正式地表达如下：\n\
    \n\\[\n I_d = k_d I_i \\cos(\\Theta)\n\\]\n\n`Id` 是漫反射的强度，`Ii` 是入射光线的强度，`k d`\
    \ 代表与物体材质粗糙度松散相关的漫反射率。“松散相关” 是指，在许多真实世界的材质中，实际表面可能有些光滑但半透明，而紧挨着表面下的层则执行散射。像这样的材质可能同时具有很强的漫反射和镜面反射分量。另外，在现实中，每个颜色波段可能有自己的\
    \ k 值，因此会有分别对应红、绿、蓝的三个值。\n\n![图 140](img/index-120_1.jpg)\n\n**第 4 章：点亮灯光**\n\n\
    **116**\n\n**图 4-14.** 对于完美漫反射表面，入射光束的反射强度是该光束的垂直分量，即入射光束与表面法线之间夹角的余弦值。\n\n###\
    \ 镜面反射\n\n如前所述，镜面反射除了更通用的漫反射表面之外，还能使你的模型具有光泽的外观。很少有东西是完全平整或完全闪亮的，大多数介于两者之间。事实上，地球的海洋是很好的镜面反射体，在从远处拍摄的地球图像上，可以清晰地看到海洋中反射的太阳光。\n\
    \n与各个方向强度相等的漫反射“反射”不同，镜面反射高度依赖于观察者的角度。我们学过，入射角等于反射角。这对于完美反射体来说确实是成立的。但除了镜子、51\
    \ 年款斯图贝克汽车的车头、或者那个在你被炸飞 15 万年回到过去之前屏幕上闪过的赛隆百夫长锃亮的前额之外，很少有东西是完美的反射体。因此，入射光线会发生轻微散射；见图\
    \ 4-15。\n\n![图 141](img/index-121_1.jpg)\n\n**第 4 章：点亮灯光**\n\n**117**\n\n**图 4-15.**\
    \ 对于镜面反射，入射光线被散射，但仅围绕其反射对应光线的中心。\n\n镜面反射分量的方程可以表示如下：\n\n\\[\n I_{specular} = W(q)\
    \ I_{light} \\cos^n \\Theta\n\\]\n\n其中：\n\n- `Ilight` 是入射光线的强度。\n- `W(q)` 是表面基于\
    \ `Ilight` 角度的反射率。\n- `n` 是高光度因子（听起来耳熟吗？）。\n- `Θ` 是反射光线与射入眼睛的光线之间的夹角。\n\n这实际上是基于所谓的菲涅耳反射定律，`W(q)`\
    \ 值就来源于此。虽然 `W(q)` 没有直接用于 OpenGL ES 1（因为它随入射角变化，比镜面反射光照模型稍微复杂一些），但它可以在 OpenGL\
    \ ES 2 版本的着色器中使用。在这种情况下，例如，它在模拟水面反射时特别有用。在 OpenGL ES 1 中，替代它的是一个基于材质设定的镜面反射值的常量。\n\
    \n高光度因子，也称为镜面反射指数，就是我们之前操作过的那个。然而，在现实生活中，n 可以远高于 128 这个最大值。\n\n### 衰减\n\n现在回到前面列出的三种衰减：常数衰减、线性衰减和二次衰减。\n"
- fmt: "总衰减计算如下，其中`kc`是常数，`kl`是线性值，`kq`是二次分量，`d`表示光源到任意顶点的距离：\n\n`k = 1`\n\n`t`\n\n\
    `k + k d + k d^2`\n\n`( )`\n\n`c`\n\n`l`\n\n`q`\n\n**总结**\n\n现在你可以看到，在场景中任何模型的顶点颜色和强度生成过程中，存在许多影响因素，包括：\n\
    \n- 距离衰减\n- 漫反射光和材质\n- 镜面反射光和材质\n- 聚光灯参数\n- 环境光和材质\n- 光泽度\n- 材质的自发光\n\n你可以将这些因素视为作用于整个颜色向量，或作用于颜色的每个独立`R`、`G`、`B`分量。\n\
    \n因此，明确定义后，最终顶点颜色如下：\n\n`color = ambient`\n\n`+`\n\n`+ emissive`\n\n`+ intensity`\n\
    \n`world model`\n\n`ambientmaterial`\n\n`material`\n\n`light`\n\n其中：\n\n`n − 1`\n\
    \n`intensity`\n\n`∑ ( spot light factor)`\n\n`light =`\n\n`( attenuation factor)\
    \ i`\n\n`i`\n\n`i = 0`\n\n`ambient`\n\n`ambient`\n\n`[ +cos(Θ) ^shininess specular\
    \ specular ]`\n\n`light`\n\n`material`\n\n`light`\n\n`material`\n\n换句话说，颜色等于不受光源控制的部分加上所有光源的强度，同时考虑了衰减、漫反射、镜面反射和聚光灯元素。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第4章：点亮灯光**\n\n**119**\n\
    \n当计算时，这些值分别作用于所讨论颜色的每个`R`、`G`、`B`分量。\n\n**这一切有什么意义？**\n\n了解底层原理的一个好处是，它有助于让`OpenGL`及相关工具不再那么神秘。就像学习一门外语，比如克林贡语（如果你，亲爱的读者，是克林贡人，`majQa’\
    \ nuqDaq ‘oH puchpa’ ‘e’`！），它就不再是以前的神秘事物了；曾经咆哮是咆哮，怒吼是怒吼，现在你可能认出它是一首关于好茶的优美诗歌。\n\
    \n另一个原因是，如前所述，所有这些高级工具在`OpenGL ES 2.0`中都不存在。大多数早期的着色算法都必须由你在称为着色器的小段代码中实现。幸运的是，关于最常见着色器的信息可以在互联网上找到，并且复制上述信息是相对直接的。\n\
