    **210**


    This differs from the previous version of `drawInRect()` as follows:


    In line 1 we need to change the square dimensions of the "square" to compensate
    for the short but wide shape of the sun’s texture geometry; otherwise, the image
    would be highly distorted.


    Line 2 disables the lighting so that the full image can be seen no matter what.


    Lines 3f were commented out to turn off the coloring, making the image of Hedly
    more visible.


    I hope you get something like Figure 7-2, with Hedly bouncing up and down on the
    sun.


    Figure 7-2. Using an off-screen FBO to animate texture on another one


    Pretty slick, eh?


    ## Lens Flare


    We’ve all seen it. Those ghostly, glowing gossamer lights dancing around television
    scenes or invading an image whenever a camera is aimed toward the sun. This happens
    as the sun’s light merrily bounces around to and fro in the camera’s optics, causing
    numerous secondary images. These can be seen both as a bright broad haze and as
    many smaller artifacts. Figure 7-3a illustrates this with an image from the Apollo
    14 moon landing mission in 1971. The flare obscures most of the lunar module.
    Even the iPhone has the similar issues, as demonstrated with Figure 7-3b. Even
    though the Hasselblad cameras that were used on the moon were the best in the
    world, we couldn’t beat lens flare. Unfortunately, it has become one of the more
    common clichés in computer graphics, used as a tool that shouts "Hey! This is
    not a fake computer image, because it has lens flare!" However, lens flares do
    have their uses, especially in the arena of space simulations because the fake
    imagery frequently looks at the fake sun. In that case, both consciously and subconsciously,
    you’d expect some visual cue that you were looking at something very, very, very
    bright. It also helps give an extra sense of depth to the image. The flare is
    generated in the optics that are really near the user while the target is a bazillion
    miles away.


    **211**


    Figure 7-3. On the left is a view on the moon from Apollo 14, and an iPhone 4
    image is on the right.


    Depending on the specific optics and their various internal coatings, the flares
    can take many different forms, but they usually end up being just of bunch of
    ghostly polygons of varying sizes and hues. In the next exercise, we’ll create
    a simple lens flare project that will illustrate using 2D images in a 3D environment.
    Because there is a lot of code for the setup, I will only highlight the key bits
    here. You will need to go to `www.apress.com` to get the full project.


    Geometrically, lens flares are generally pretty simple because of their symmetry.
    They exhibit two main characteristics: all lens flares require a very bright light
    source, and they’ll lie along a diagonal line going through the center of the
    screen, as shown in Figure 7-4.


    **212**


    Figure 7-4. Lens flares are caused by the inner reflections of a bright light
    source within a camera’s lens.


    Since flare images are 2D, how do we put them in a 3D space? Going back to the
    original sample, the bouncy square was also 2D object. But displaying it relied
    on some defaults as to how the object was mapped to the screen. Here we get a
    little more specific.


    Remember in Chapter 3, where I spoke of perspective vs. orthographic projections?
    The former is the way we perceive the dimensionality of objects; the latter is
    used when precise sizes and shapes are required, eliminating the distortion that
    perspective adds to the scene. So, when drawing 2D objects, you will generally
    want to ensure that their visual dimensions are untouched by any of the 3D-ness
    of the rest of your world.


    When it comes to generating your lens flares, you will need a small collection
    of different shapes to represent some of the mechanics of the actual lens. The
    hexagonal or pentagonal images are those of the iris used to vary the intensity
    of the incoming light; see Figure 7-5. They will also exhibit different tints
    as a result of the various coatings used to protect the lenses or filter out unwanted
    wavelengths.


    **213**


    Figure 7-5. A six-blade iris (image by Dave Fischer)


    The following steps are needed to generate the flare set:


    1. Import the various images.

    2. Detect where on the screen the source object is.

    3. Create the imaginary vector that goes through the center of the screen so as
    to hold the individual pieces of art.

    4. Add a dozen or more images, with random sizes, colors, and translucency, scattered
    up and down the vector.

    5. Support touch dragging to test it in all different positions.'
