    \ = tPtr[-1];\n        }\n    }\n\n    numVertices = (vPtr - m_VertexData) / 6;\n\
    }\n\nm_Angle = 0.0;\nm_RotationalIncrement = 0.0;\nm_Pos[0] = 0.0;\nm_Pos[1] =\
    \ 0.0;\nm_Pos[2] = 0.0;\n\nreturn self;\n```\n\nSo, here is what’s happening:\n\
    \nA file name for the image is added to the end of the parameter list in line\
