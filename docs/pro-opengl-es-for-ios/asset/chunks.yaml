    \    glDisable(SS_FILLLIGHT2);\n    glPushMatrix();\n    angle+=orbitalIncrement;\n\
    \    [self executePlanet:m_Earth];\n    glPopMatrix();\n    glPopMatrix();\n}\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图 206](img/index-202_1.jpg)\n\
    \n![图 207](img/index-202_2.jpg)\n\n![图 208](img/index-202_3.jpg)\n\n### 第 6 章：它会混合吗？——199\n\
    \n```\n-(void)executePlanet:(Planet *)planet\n{\n    GLfloat posX, posY, posZ;\n\
    \    static GLfloat angle=0.0;\n    glPushMatrix();\n    [planet getPositionX:&posX\
    \ Y:&posY Z:&posZ];\n    glTranslatef(posX,posY,posZ);\n    glRotatef(angle,0.0,1.0,0.0);\n\
    \    [planet execute];\n    glPopMatrix();\n    angle+=.4;\n}\n```\n\n如果你现在看到类似图\
    \ 6-17 的景象，那么你可以正式拍拍自己表示赞许。\n\n**图 6-17.** 凹凸不平的地球\n\n好，现在做个实验：移动光源位置，使其从右侧而不是左侧照射进来。图\
    \ 6-18 显示了出乎意料的结果。这是怎么回事？现在，山脉看起来像山谷了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![图 209](img/index-203_1.jpg)\n\n### 第 6 章：它会混合吗？——200\n\n**图 6-18.** 咦？\n\n\
    这里发生的情况是，我们正在探索组合器未曾涉足的领域。通过加入我们自己的光照，由光矢量提供的模拟光照效果被抵消了。当光源在左侧时，效果看起来不错，这主要归功于运气。如果你的场景光照相对静止，凹凸贴图在此处效果尚可。但它不兼容多光源。实际上，通过光矢量指定的伪光照效果会被“真实”光源所忽略。此外，如果关闭这些真实光源，光矢量会完全忽略物体上的任何着色。在这种情况下，你会看到整个地球变亮又变暗，因为这是纹理本身所呈现的效果——纹理仅仅是一个二维表面。如果它的一部分被照亮，那么全部都会被照亮。那么，一个\
    \ OpenGL 爱好者该如何应对呢？我的朋友，答案是着色器。着色器。这正是 OpenGL ES 2 和 iOS 5 扩展发挥作用的地方；这些内容将在第 10\
    \ 章中介绍。\n\n## 本章小结\n\n在本章中，你学习了 OpenGL ES 1 提供的混合功能。混合通过混合函数和组合器表达其独特的语言。你了解了半透明效果，以及如何及何时应用它。此外，还介绍了通过混合和纹理实现动画与凹凸贴图的一些巧妙技巧。在下一章中，我将开始应用这些技巧，并展示其他能让\
    \ 3D 宇宙更加有趣的技巧。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n## 第 7 章：渲染精美的杂项\n"
- fmt: "If we knew what it was we were doing, it would not be called research, would\
    \ it?\n\n-----Albert Einstein\n\nWhen starting this chapter, I tried to find a\
    \ suitable quote about miscellany. Unfortunately, all I could find were collections\
    \ of miscellaneous quotes. But the one by Albert Einstein is a real gem and can\
    \ almost apply because you, dear reader, are conducting research----research in\
    \ how to make richer, more involving and fun software.\n\nThe products and tools\
    \ that Apple releases are fun to use----to the point of almost being playful,\
    \ charming, and wondrous. If vacuuming the house was as much fun as using an iPad,\
    \ we’d all win awards from *Good Housekeeping* magazine.\n\nIn books like this,\
    \ sometimes it’s hard to make clean classifications of a particular topic. So,\
    \ we just have to dump a lot things into a single chapter when they might not\
    \ warrant a chapter of their own. So here I’m going to cover some classic presentation\
    \ and rendering tricks, whether they can be applied to the solar-system project\
    \ or not, that integrate UIKit elements with OpenGL windows and user interaction\
    \ with components in your scenes.\n\n## **Frame Buffer Objects**\n\nUsually referred\
    \ to as FBOs, you can think of frame buffer objects as simply rendering surfaces.\
    \ Up until now, you’ve been using one and you probably didn’t know it; the `EAGL`\
    \ context that your scene renders to is an FBO. What you probably didn’t know\
    \ is that you can have multiple screens at the same time. As before, we’ll start\
    \ off with the old standard, and then see where it can go from there.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**CHAPTER 7: Well-Rendered Miscellany**\n\n**202**\n\n## **Hedley Buffer Objects**\n\
    \nYou know the drill by this time: find the exercise from Chapter 5, with the\
    \ original 2D textured square filled. This will serve as our basic framework as\
    \ usual. You’ll have to create a separate object that encapsulates the new FBO.\
    \ Call it `FBOController` and populate it with Listing 7-1 and Listing 7-2.\n\n\
    Listing 7-1\\. The header for `FBOController.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <UIKit/UIKit.h>\n#import <GLKit/GLKit.h>\n\n@interface FBOController :\
    \ NSObject\n{\n    GLuint m_Texture;\n    GLuint m_FBO1;\n}\n\n-(GLint)getFBOName;\n\
    -(GLuint)getTextureName;\n-(id)initWidth:(float)width height:(float)height;\n\n\
    @end\n```\n\nListing 7-2\\. The main body of `FBController.m`\n\n```\n#import\
    \ <OpenGLES/ES1/gl.h>\n#import <OpenGLES/ES1/glext.h>\n#import \"FBOController.h\"\
    \n\n@implementation FBOController\n\n-(id)initWidth:(float)width height:(float)height\n\
    {\n    GLint originalFBO;\n    GLuint depthBuffer;\n    \n    //Cache the original\
    \ FBO, and restore it later.\n    glGetIntegerv(GL_FRAMEBUFFER_BINDING_OES, &originalFBO);\
    \ //1\n    \n    glGenRenderbuffersOES(1, &depthBuffer); //2\n    glBindRenderbufferOES(GL_RENDERBUFFER_OES,\
    \ depthBuffer);\n    \n    glRenderbufferStorageOES(GL_RENDERBUFFER_OES, //3\n\
    \                             GL_DEPTH_COMPONENT16_OES, width, height);\n    \n\
    \    //Make the texture to render to.\n    glGenTextures(1, &m_Texture); //4\n\
    \    glBindTexture(GL_TEXTURE_2D, m_Texture);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**CHAPTER 7: Well-Rendered Miscellany**\n\n**203**\n\n```\n    glTexImage2D(GL_TEXTURE_2D,\
    \ 0, GL_RGB, width, height, 0,\n                 GL_RGB, GL_UNSIGNED_SHORT_5_6_5,\
    \ 0);\n    \n    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MIN_FILTER, GL_LINEAR);\n\
    \    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MAG_FILTER, GL_LINEAR);\n    glTexParameterf(GL_TEXTURE_2D,\
    \ GL_TEXTURE_WRAP_S, GL_CLAMP_TO_EDGE);\n    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_WRAP_T,\
    \ GL_CLAMP_TO_EDGE);\n    \n    //Now create the actual FBO.\n    glGenFramebuffersOES(1,\
    \ &m_FBO1); //5\n    glBindFramebufferOES(GL_FRAMEBUFFER_OES, m_FBO1);\n    \n\
    \    // Attach the texture to the FBO.\n    glFramebufferTexture2DOES(GL_FRAMEBUFFER_OES,\
    \ //6\n                              GL_COLOR_ATTACHMENT0_OES, GL_TEXTURE_2D,\
    \ m_Texture, 0);\n    \n    // Attach the depth buffer we created earlier to our\
    \ FBO.\n    glFramebufferRenderbufferOES(GL_FRAMEBUFFER_OES, //7\n           \
    \                      GL_DEPTH_ATTACHMENT_OES, GL_RENDERBUFFER_OES, depthBuffer);\n\
    ```"
  raw: 'If we knew what it was we were doing, it would not be called research, would
    it?


    -----Albert Einstein


    When starting this chapter, I tried to find a suitable quote about miscellany.


    Unfortunately, all I could find were collections of miscellaneous quotes. But
    the one by Albert Einstein is a real gem and can almost apply because you, dear
    reader, are conducting research----research in how to make richer, more involving
    and fun software.


    The products and tools that Apple releases are fun to use----to the point of almost
    being playful, charming, and wondrous. If vacuuming the house was as much fun
    as using an iPad, we’d all win awards from Good Housekeeping magazine.


    In books like this, sometimes it’s hard to make clean classifications of a particular
    topic.


    So, we just have to dump a lot things into a single chapter when they might not
    warrant a chapter of their own. So here I’m going to cover some classic presentation
    and rendering tricks, whether they can be applied to the solar-system project
    or not, that integrate UIKit elements with OpenGL windows and user interaction
    with components in your scenes.


    **Frame Buffer Objects**


    Usually referred to as FBOs, you can think of frame buffer objects as simply rendering
    surfaces. Up until now, you’ve been using one and you probably didn’t know it;
    the EAGL context that your scene renders to is an FBO. What you probably didn’t
    know is that you can have multiple screens at the same time. As before, we’ll
    start off with the old standard, and then see where it can go from there.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 7: Well-Rendered Miscellany**


    **202**


    **Hedley Buffer Objects**


    You know the drill by this time: find the exercise from Chapter 5, with the original
    2D


    textured square filled. This will serve as our basic framework as usual.


    You’ll have to create a separate object that encapsulates the new FBO. Call it
    **FBOController** and populate it with Listing 7-1 and Listing 7-2.


    Listing 7-1\. The header for ***FBOController.h***


    **#import <Foundation/Foundation.h>**


    **#import <UIKit/UIKit.h>**


    **#import <GLKit/GLKit.h>**


    ****@interface FBOController : NSObject**


    **{**


    **GLuint m_Texture;**


    **GLuint m_FBO1;**


    **}**


    ****-(GLint)getFBOName;**


    **-(GLuint)getTextureName;**


    **-(id)initWidth:(float)width height:(float)height;**


    ****@end**


    Listing 7-2\. The main body of ***FBController.m***


    **#import <OpenGLES/ES1/gl.h>**


    **#import <OpenGLES/ES1/glext.h>**


    **#import "FBOController.h"**


    ******@implementation FBOController**


    ****-(id)initWidth:(float)width height:(float)height**


    **{**


    **GLint originalFBO;**


    **GLuint depthBuffer;**


    ****//Cache the original FBO, and restore it later.**


    ****glGetIntegerv(GL_FRAMEBUFFER_BINDING_OES, &originalFBO); //1**


    ****glGenRenderbuffersOES(1, &depthBuffer); //2**


    **glBindRenderbufferOES(GL_RENDERBUFFER_OES, depthBuffer);**


    ****glRenderbufferStorageOES(GL_RENDERBUFFER_OES, //3**


    **GL_DEPTH_COMPONENT16_OES, width, height);**


    ****//Make the texture to render to.**


    ****glGenTextures(1, &m_Texture); //4**


    **glBindTexture(GL_TEXTURE_2D, m_Texture);**


    **[www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 7: Well-Rendered Miscellany**


    **203**


    **glTexImage2D(GL_TEXTURE_2D, 0, GL_RGB, width, height, 0,**


    **GL_RGB, GL_UNSIGNED_SHORT_5_6_5, 0);**


    ****glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MIN_FILTER, GL_LINEAR);** **glTexParameterf(GL_TEXTURE_2D,
    GL_TEXTURE_MAG_FILTER, GL_LINEAR);** **glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_WRAP_S,
    GL_CLAMP_TO_EDGE);** **glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_WRAP_T, GL_CLAMP_TO_EDGE);**


    ****//Now create the actual FBO.**


    ****glGenFramebuffersOES(1, &m_FBO1); //5**


    **glBindFramebufferOES(GL_FRAMEBUFFER_OES, m_FBO1);**


    ****// Attach the texture to the FBO.**


    ****glFramebufferTexture2DOES(GL_FRAMEBUFFER_OES, //6**


    **GL_COLOR_ATTACHMENT0_OES, GL_TEXTURE_2D, m_Texture, 0);**


    ****// Attach the depth buffer we created earlier to our FBO.**


    ****glFramebufferRenderbufferOES(GL_FRAMEBUFFER_OES, //7**


    **GL_DEPTH_ATTACHMENT_OES, GL_RENDERBUFFER_OES, depthBuffer);**'
  trans: "  \n如果我们确切知道自己在做什么，那它就不叫研究了，不是吗？  \n\n——阿尔伯特·爱因斯坦  \n\n在开始本章时，我试图找一句与杂项主题相称的引言。遗憾的是，能找到的只有一堆杂七杂八的语录。但阿尔伯特·爱因斯坦的这句话确实是个珍宝，几乎可以适用——因为亲爱的读者，你正在开展研究：研究如何制作更丰富、更引人入胜且更有趣的软件。\
    \  \n\n苹果发布的产品和工具用起来很有趣——几乎到了好玩、迷人且令人惊叹的地步。如果打扫房间能像用 iPad 一样有趣，我们都能从 *《好管家》* 杂志获得奖项。\
    \  \n\n在像这样的书中，有时很难对某个特定主题进行清晰分类。因此，当某些内容不足以单独成章时，我们只能把它们一股脑儿塞进一个章节里。所以，这里我将介绍一些经典的呈现与渲染技巧——无论它们是否能应用到太阳系项目中——这些技巧将\
    \ UIKit 元素与 OpenGL 窗口以及场景中组件的用户交互整合在一起。  \n\n## **帧缓冲对象**  \n\n通常简称为 FBO，你可以把帧缓冲对象简单理解为渲染表面。到目前为止，你一直在使用一个\
    \ FBO，可能自己都没意识到：你的场景渲染到的 `EAGL` 上下文本身就是一个 FBO。而你可能不知道的是，你可以同时拥有多个屏幕。和之前一样，我们先从老标准入手，再看看它可以如何延伸发展。\
    \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info)  \n\n**第 7 章：精心渲染的杂项**\
    \  \n\n**202**  \n\n## **海德利缓冲对象**  \n\n到了这时候，你应该轻车熟路了：找到第 5 章练习中那个原始 2D 纹理填充的方形。这将像往常一样作为我们的基础框架。你需要创建一个单独的对象来封装新的\
    \ FBO。把它命名为 `FBOController`，并用清单 7-1 和清单 7-2 填充它。  \n\n**清单 7-1.** `FBOController.h`\
    \ 的头文件  \n\n```  \n#import <Foundation/Foundation.h>  \n#import <UIKit/UIKit.h>\
    \  \n#import <GLKit/GLKit.h>  \n\n@interface FBOController : NSObject  \n{  \n\
    \    GLuint m_Texture;  \n    GLuint m_FBO1;  \n}  \n\n-(GLint)getFBOName;  \n\
    -(GLuint)getTextureName;  \n-(id)initWidth:(float)width height:(float)height;\
    \  \n\n@end  \n```  \n\n**清单 7-2.** `FBController.m` 的主体部分  \n\n```  \n#import\
    \ <OpenGLES/ES1/gl.h>  \n#import <OpenGLES/ES1/glext.h>  \n#import \"FBOController.h\"\
    \  \n\n@implementation FBOController  \n\n-(id)initWidth:(float)width height:(float)height\
    \  \n{  \n    GLint originalFBO;  \n    GLuint depthBuffer;  \n    \n    // 缓存原始\
    \ FBO，稍后恢复  \n    glGetIntegerv(GL_FRAMEBUFFER_BINDING_OES, &originalFBO); //1\
    \  \n    \n    glGenRenderbuffersOES(1, &depthBuffer); //2  \n    glBindRenderbufferOES(GL_RENDERBUFFER_OES,\
    \ depthBuffer);  \n    \n    glRenderbufferStorageOES(GL_RENDERBUFFER_OES, //3\
    \  \n                             GL_DEPTH_COMPONENT16_OES, width, height);  \n\
    \    \n    // 创建用于渲染的纹理  \n    glGenTextures(1, &m_Texture); //4  \n    glBindTexture(GL_TEXTURE_2D,\
    \ m_Texture);  \n```  \n\n[www.it-ebooks.info](http://www.it-ebooks.info)  \n\n\
    **第 7 章：精心渲染的杂项**  \n\n**203**  \n\n```  \n    glTexImage2D(GL_TEXTURE_2D, 0,\
    \ GL_RGB, width, height, 0,  \n                 GL_RGB, GL_UNSIGNED_SHORT_5_6_5,\
    \ 0);  \n    \n    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MIN_FILTER, GL_LINEAR);\
    \  \n    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_MAG_FILTER, GL_LINEAR);  \n\
    \    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_WRAP_S, GL_CLAMP_TO_EDGE);  \n\
    \    glTexParameterf(GL_TEXTURE_2D, GL_TEXTURE_WRAP_T, GL_CLAMP_TO_EDGE);  \n\
    \    \n    // 现在创建实际的 FBO  \n    glGenFramebuffersOES(1, &m_FBO1); //5  \n   \
    \ glBindFramebufferOES(GL_FRAMEBUFFER_OES, m_FBO1);  \n    \n    // 将纹理附加到 FBO\
    \  \n    glFramebufferTexture2DOES(GL_FRAMEBUFFER_OES, //6  \n               \
    \               GL_COLOR_ATTACHMENT0_OES, GL_TEXTURE_2D, m_Texture, 0);  \n  \
    \  \n    // 将之前创建的深度缓冲区附加到 FBO  \n    glFramebufferRenderbufferOES(GL_FRAMEBUFFER_OES,\
    \ //7  \n                                 GL_DEPTH_ATTACHMENT_OES, GL_RENDERBUFFER_OES,\
    \ depthBuffer);  \n```  \n"
- fmt: "```objectivec\n// Check that our FBO creation was successful.\nglCheckFramebufferStatusOES(GL_FRAMEBUFFER_OES);\
    \ //8\nGLuint uStatus = glCheckFramebufferStatusOES(GL_FRAMEBUFFER_OES);\nif(uStatus\
    \ != GL_FRAMEBUFFER_COMPLETE_OES)\n{\n    NSLog(@\"ERROR: Failed to initialise\
    \ FBO\");\n    return 0;\n}\nglClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\
    glBindFramebufferOES(GL_FRAMEBUFFER_OES, originalFBO); //9\nreturn self;\n}\n\
    -(GLint)getFBOName //10\n{\n    return m_FBO1;\n}\n-(GLuint)getTextureName //11\n\
    {\n    return m_Texture;\n}\n@end\n```\n\nYou should recognize the pattern here,\
    \ because creating FBOs is a lot like many of the other OpenGL objects. So, let’s\
    \ break it down:\n\nFBOs, as with many of the OpenGL objects, use “names” as handles\
    \ to uniquely identify them. In line 1, we’re getting the original frame buffer\
    \ object that serves as the main screen. The idea is to be a good neighbor and\
    \ restore it at the very end. Otherwise, the wrong one could be used.\n\nLine\
    \ 2 has us generating a name for our depth buffer. Then it is bound to the system\
    \ as our current render buffer. If this is the first time that object has been\
    \ bound, OpenGL will allocate it minus the image memory and then use that allocated\
    \ memory in all subsequent bindings.\n\nIn line 3 we actually allocated the memory\
    \ for the buffer’s image data. Since images require large blocks of memory, they\
    \ should never be allocated until needed. That is why the bind and the allocation\
    \ operations are usually kept separate.\n\nAt this point in lines 4ff, we need\
    \ to allocate a texture image and have it linked up to our frame buffer. This\
    \ is the interface required to camouflage our FBO so it looks just like any other\
    \ texture to OpenGL. Here we can also set up some of the normal texture settings\
    \ for edge conditions and use bilinear filtering.\n\nUp until now we’ve merely\
    \ created the depth buffer and image interface. In line 5, we actually create\
    \ the frame buffer object and attach the previous bits to it.\n\nLine 6 attaches\
    \ the texture first. Notice the use of `GL_COLOR_ATTACHMENT0_OES`. The texture\
    \ bit actually holds the color information, so it is called the color attachment.\n\
    \nIn line 7, we do the same for the depth buffer, using `GL_DEPTH_ATTACHMENT_OES`.\
    \ And remember that in OpenGL ES we have only three types of buffer attachments:\
    \ depth, color, and stencil. The latter does things such as blocking rendering\
    \ in a certain part of the screen. The adult version of OpenGL adds a fourth kind,\
    \ `GL_DEPTH_STENCIL_ATTACHMENT`.\n\nLine 8 does a quick error check.\n\nAs referenced\
    \ earlier, we need to restore the original FBO for our main screen, in line 9.\n\
    \nAnd finally, lines 10 and 11 provide some getters so we can use the new FBO.\n\
    \nSo, that’s merely creating an FBO. You’ll see that it is a fairly no-frills\
    \ piece of code, using the built-in functions available in both OpenGL ES 1 and\
    \ 2. And yes, it does seem a little overly complicated, but it’s easily wrapped\
    \ with a helper function.\n\nBut we’re still not quite done, because we now have\
    \ to rejigger `drawInRect()` to use both FBOs.\n\nTo the end of the `viewDidLoad()`\
    \ method, add the following lines:\n\n```objectivec\nm_FBOHeight=480;\nm_FBOWidth=320;\n\
    m_FBOController=[[FBOController alloc]initWidth:m_FBOWidth height:m_FBOHeight];\n\
    ```\n\nThen modify the header as needed. The first line caches the original FBO\
    \ so that it can be restored properly as needed.\n\nNow add the new `drawInRect()`\
    \ method shown in Listing 7-3.\n\n**Listing 7-3.** The new `drawInRect()`, renders\
    \ to both FBOs\n\n```objectivec\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n\
    {\n    static const GLfloat squareVertices[] =\n    {\n        -0.5, -0.5, 0.0,\n\
    \        0.5, -0.5, 0.0,\n        -0.5, 0.5, 0.0,\n        0.5, 0.5, 0.0\n   \
    \ };\n    static const GLfloat fboVertices[] =\n    //1\n    {\n        -0.5,\
    \ -0.75, 0.0,\n        0.5, -0.75, 0.0,\n        -0.5, 0.75, 0.0,\n```"
