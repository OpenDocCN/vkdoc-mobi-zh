- fmt: '

    使用单一位图并为其着色是一种常见的节省内存的做法。如果您正在 OpenGL 层中构建一些 UI 组件，请考虑使用单张图像，并通过这些技术为其着色。您可能会问，为什么它会呈现纯红色，而不仅仅是带有红色色调，从而允许颜色有一些变化？这里发生的情况是，顶点的颜色与每个片段的颜色相乘。对于红色，我使用了
    RGB 三元组`1.0,0.0,0.0`。因此，当每个片段在逐通道乘法中计算时，绿色和蓝色通道将被乘以 0，它们被完全过滤掉，只留下红色。如果您希望让其他一些颜色透出，您可以将顶点指定为偏向更中性的色调，使所需的色调颜色略高于其他颜色，例如`1.0,0.7,0.7`。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 187](index-186_1.jpg)


    ![Image 188](index-186_2.jpg)


    ![Image 189](index-186_3.jpg)


    **CHAPTER 6: Will It Blend?**


    **183**


    Figure 6-8. On the left, only the textures are displayed. In the center, they’re
    blended with color, and for the one on the right they’re solid red.


    您还可以非常轻松地为纹理添加半透明效果。为了实现这一点，我将在此引入一个简化因素。您可以通过简单地使用`glColor4f()`来使用单一颜色为纹理面着色，从而无需创建顶点颜色数组。


    将 alpha 设置为小于`1.0`会产生透视纹理的效果，如图 6-9 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 190](index-187_1.jpg)


    ![Image 191](index-187_2.jpg)


    **CHAPTER 6: Will It Blend?**


    **184**


    Figure 6-9. The image on the left has an alpha of .5, while the figure on the
    right has an alpha of .75.


    ## Multitexturing


    到目前为止，我们已经介绍了颜色混合以及纹理与颜色的混合模式，但是如何将两个纹理组合以创建第三个纹理呢？这种技术称为多重纹理。多重纹理可用于将一个纹理层叠在另一个纹理之上，同时执行某些数学运算。更复杂的应用包括简单的图像处理。但我们还是先处理简单的情况。


    多重纹理需要使用纹理组合器（texture combiners）和纹理单元（texture units）。纹理组合器允许您组合和处理绑定到硬件纹理单元的纹理，纹理单元是图形芯片中用于将图像包裹到对象周围的特定部分。在
    iPhone 3GS 之前，您只有两个纹理单元可用，这是 Imagination Technologies 公司 PowerVR MBX 图形芯片的限制。当
    3GS 推出时，Apple 改用更强大的 SGX 芯片，该芯片将纹理单元总数增加到八个。如果您预计会大量使用组合器，您可能需要通过以下方式验证支持的总数：


    `glGetIntegerv(GL_MAX_COMBINED_TEXTURE_IMAGE_UNITS, &numberTextureUnits)`，其中`numberTextureUnits`被定义为`GLint`。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 192](index-188_1.jpg)


    **CHAPTER 6: Will It Blend?**


    **185**


    为了建立处理多重纹理的管线，我们需要告诉 OpenGL 使用哪些纹理以及如何将它们混合在一起。这个过程（至少在理论上）与之前处理 alpha 和颜色混合操作时定义混合函数并没有太大区别。它确实大量使用了`glTexEnvf()`调用，这是
    OpenGL 另一个极度重载的方法。（如果您不相信我，可以在 OpenGL 官网上查看其参考页面。）这会设置纹理环境，定义多重纹理处理过程的每个阶段。


    图 6-10 展示了组合器链。每个组合器引用前一个纹理片段（`P0`或`Pn`），或者对于第一个组合器，引用输入的片段。然后，它从一个“源”纹理（称为`S0`）中获取一个片段，将其与`P0`组合，并在需要时（称为`C1`）传递给下一个组合器；然后循环重复。


    Figure 6-10. The texture combiner chain


    处理这个主题的最佳方法与其他主题一样：直接看代码。在以下示例中，两个纹理被一起加载，绑定到它们各自的纹理单元，并合并成一个单一的输出纹理。我们尝试了几种用于组合两个图像的方法，并深入展示了每种方法的结果。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 6: Will It Blend?**


    **186**


