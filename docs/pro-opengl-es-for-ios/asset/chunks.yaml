    # 第 10 章：OpenGL ES 2、着色器与……


    **309**


    如果这听起来像是要对场景中每个对象的每个片元都进行大量工作，并以每秒 60 帧的速度运行，那么你说对了。但从根本上说，着色器实际上是在图形硬件本身上加载和运行的小型程序，因此它们非常非常快。


    OpenGL 应用程序


    几何图形与纹理


    顶点着色器


    光照、变换、缩放等


    生成片元


    光栅化


    片段着色器


    纹理、着色


    帧缓冲区


    模板、Alpha、Z 测试、混合


