- fmt: '# 计算机图形学：从过去到现在


    1961 年，麻省理工学院（MIT）的一名工程系学生名叫伊万·萨瑟兰（Ivan Sutherland），他在攻读博士学位期间，利用向量示波器、一支简陋的光笔以及一台定制的林肯
    TX-2 计算机（从 TX-2 项目组分离出来的团队后来成立了 DEC 公司），创建了一个名为 `Sketchpad` 的系统。


    `Sketchpad` 的革命性图形用户界面展示了现代 UI 设计的许多核心原则，更不用说它还融入了大量的面向对象架构思想。


    **注意**：欲观看 `Sketchpad` 的操作视频，请前往 YouTube 搜索 `Sketchpad` 或 `Ivan Sutherland`。


    萨瑟兰的一位同学史蒂夫·拉塞尔（Steve Russell）发明了或许是史上最大的时间杀手之一——电子游戏。拉塞尔在 1962 年创建了传奇游戏 `Spacewar`，它运行在
    `PDP-1` 上，如图 1-3 所示。


    **图 1-3.** 1962 年的游戏 `Spacewar`，在加州山景城计算机历史博物馆的一台老式 `PDP-1` 上重现。照片由 Joi Itoh 拍摄，遵循知识共享署名
    2.0 通用许可协议（`http://creativecommons.org/licenses/by/2.0/deed.en`）。


    到 1965 年，IBM 发布了被认为是第一款广泛使用的商用图形终端——`2250`。该终端与低成本的 `IBM-1130` 计算机或 `IBM S/340`
    搭配使用，主要面向科学界。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 5](index-11_1.jpg)


    **第 1 章：计算机图形学：从过去到现在**


    **6**


    也许最早在电视上展示计算机图形学的例子之一，是 1965 年 12 月 CBS 新闻对双子星 6 号和 7 号联合任务的报道中使用了 `2250` 终端（IBM
    为双子星建造了机载计算机系统）。该终端被用于在实况电视中演示从发射到交会的任务各个阶段。在 1965 年，其成本约为 10 万美元，相当于一栋非常不错的房子。参见图
    1-4。


    **图 1-4.** 1965 年的 `IBM-2250` 终端。图片由 NASA 提供。


    ## 犹他大学


    萨瑟兰于 1968 年受聘于犹他大学，在其计算机科学项目工作，他自然地将精力集中在图形学上。在接下来的几年里，许多未来的计算机图形学远见者都将先后在该大学的实验室中深造。


    例如，埃德·卡特穆尔（Ed Catmull）热爱经典动画，但苦于自己无法绘画——正如人们所看到的那样，这在当时是艺术家的必备技能。他意识到计算机可能是制作电影的一条途径，于是制作了有史以来第一个计算机动画，内容是他的手张开和合上。这段剪辑后来被用到了
    1976 年的电影《未来世界》中。


    在那段时间里，他开创了两项重要的计算机图形学创新：纹理映射和双三次曲面。前者可以通过使用纹理图像来为简单的形体增加复杂性，而不必使用离散的点或面来创建纹理和粗糙感，如图
    1-5 所示。后者用于通过算法生成弯曲的曲面，这比传统的多边形网格要高效得多。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 6](index-12_1.jpg)


    ![Image 7](index-12_2.jpg)


    **第 1 章：计算机图形学：从过去到现在**


    **7**


    **图 1-5.** 有纹理和无纹理的土星


    卡特穆尔最终进入了卢卡斯影业，后来到了皮克斯，并最终担任迪士尼动画工作室的总裁，在那里他终于可以制作自己渴望看到的电影。这真是一份不错的差事。


    许多其他业内顶尖人物也同样曾在犹他大学和萨瑟兰的影响下学习或工作：


    -   **约翰·沃诺克（John Warnock）**，他在开发一种名为 `PostScript` 的设备无关的图形显示与打印方法以及便携式文档格式（PDF）方面发挥了重要作用，并且是
    Adobe 公司的联合创始人。

    -   **吉姆·克拉克（Jim Clark）**，硅谷图形公司（SGI）的创始人，SGI 为好莱坞提供了当时一些最好的图形工作站，并创建了现在被称为 `OpenGL`
    的 3D 软件开发框架。'
  raw: 'In 1961, an MIT engineering student named Ivan Sutherland created a system
    called Sketchpad for his PhD thesis using a vectorscope, a crude light pen, and
    a custom-made Lincoln TX-2 computer (a spin-off from the TX-2 group would become
    DEC).


    Sketchpad’s revolutionary graphical user interface demonstrated many of the core
    principles of modern UI design, not to mention a big helping of object-oriented
    architecture tossed in for good measure.


    **Note** For a video of Sketchpad in operation, go to YouTube and search for *Sketchpad*
    or *Ivan* *Sutherland*.


    A fellow student of Sutherland’s, Steve Russell, would invent perhaps one of the
    biggest time sinks ever made, the computer game. Russell created the legendary
    game of Spacewar in 1962, which ran on the PDP-1, as shown in Figure 1-3.


    Figure 1-3\. The 1962 game of Spacewar resurrected at the Computer History Museum
    in Mountain View, California, on a vintage PDP-1\. Photo by Joi Itoh, licensed
    under the Creative Commons Attribution 2.0 Generic license ( ***http://creativecommons.org/licenses/by/2.0/deed.en***).


    By 1965, IBM would release what is considered the first widely used commercial
    graphics terminal, the 2250\. Paired with either the low-cost IBM-1130 computer
    or the IBM S/340, the terminal was meant largely for use in the scientific community.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 5](index-11_1.jpg)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **6**


    Perhaps one of the earliest known examples of computer graphics on television
    was the use of a 2250 on the CBS news coverage of the joint Gemini 6 and Gemini
    7 missions in December 1965 (IBM built the Gemini’s onboard computer system).
    The terminal was used to demonstrate several phases of the mission on live television
    from liftoff to rendezvous. At a cost of about $100,000 in 1965, it was worth
    the equivalent of a very nice home. See Figure 1-4.


    Figure 1-4\. IBM-2250 terminal from 1965\. Courtesy NASA.


    **University of Utah**


    Recruited by the University of Utah in 1968 to work in its computer science program,
    Sutherland naturally concentrated on graphics. Over the course of the next few
    years, many computer graphics visionaries in training would pass through the university’s
    labs.


    Ed Catmull, for example, loved classic animation but was frustrated by his inability
    to draw-----a requirement for artists back in those days as it would appear. Sensing
    that computers might be a pathway to making movies, Catmull produced the first-ever
    computer animation, which was of his hand opening and closing. This clip would
    find its way into the 1976 film Future World.


    During that time he would pioneer two major computer graphics innovations: texture
    mapping and bicubic surfaces. The former could be used to add complexity to simple
    forms by using images of texture instead of having to create texture and roughness
    using discrete points and surfaces, as shown in Figure 1-5\. The latter is used
    to generate algorithmically curved surfaces that are much more efficient than
    the traditional polygon meshes.


    [www.it-ebooks.info](http://www.it-ebooks.info)


