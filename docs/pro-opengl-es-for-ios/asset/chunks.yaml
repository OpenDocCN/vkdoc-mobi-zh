    \n        startData++;\n        vtxPtr+=NUM_XYZ_ELS;\n        norPtr+=NUM_NXYZ_ELS;\n\
    \        colPtr+=NUM_RGBA_ELS;\n        textPtr+=NUM_ST_ELS;\n    }\n}\n\n-(void)createVAO\n\
    {\n    GLuint numBytesPerXYZ,numBytesPerNXYZ,numBytesPerRGBA;\n    GLuint structSize=sizeof(struct\
