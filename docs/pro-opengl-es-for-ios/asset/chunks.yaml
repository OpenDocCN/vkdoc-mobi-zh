- fmt: "对于正方形，手动排序数据（即排列顶点顺序）使其四个顶点能构成两个三角形是件轻而易举的事。但对于立方体，这就复杂得多了。我们可以为立方体的六个面分别定义顶点数组，但这种方法对于更复杂的物体扩展性不佳，而且其效率也低于一次性将六组数据推入图形硬件。因此，从内存和性能两个角度来看，将所有数据保存在一个数组中是最有效率的。那么，我们该如何告诉\
    \ OpenGL 数据的布局呢？在本例中，我们将使用一种称为“三角形扇”的绘制模式，如图 3-6 所示。三角形扇是一组共享一个公共顶点的三角形。\n\n图\
    \ 3-6. 三角形扇的所有三角形共享一个公共点。\n\n数据可以通过多种不同的方式存储并呈现给 OpenGL ES。一种格式可能速度更快但占用更多内存，而另一种格式可能占用更少内存，但代价是增加一些额外的开销。如果你从某个\
    \ 3D 文件导入数据，它很可能已经针对其中一种方法进行了优化。但如果你真的想手动调优系统，在某些时候你可能需要将顶点重新打包成你应用程序偏好的格式。\n\n\
    除了三角形扇，你还会发现其他存储或表示数据的方式，这些方式被称为“模式”。\n\n点和线如其名：就是点和线。OpenGL ES 可以将你的顶点渲染为可定义大小的点，也可以在点之间绘制线条以显示线框版本（`gl.h`中分别通过`GL_POINTS`和`GL_LINES`定义了这些）。\n\
    \n`GL_LINE_STRIP`（线条带）是 OpenGL 一次绘制一系列线条的方式，而`GL_LINE_LOOP`（线条环）类似于线条带，但它总是会将第一个和最后一个顶点连接起来。\n\
    \n三角形、三角形带和三角形扇构成了 OpenGL ES 图元列表的其余部分：`GL_TRIANGLES`、`GL_TRIANGLE_STRIP`和`GL_TRIANGLE_FAN`。桌面级\
    \ OpenGL 本身可以处理更多模式，例如`GL_QUADS`（四个顶点/边的面）、`GL_QUAD_STRIP`（四边形带）和多边形。\n\n**注意**：术语“图元”指的是图形系统中一种基本的数据形状或形式。图元的示例包括立方体、球体和锥体。该术语也可用于更简单的形状，如点、线，以及对于\
    \ OpenGL ES 而言的三角形和三角形扇。\n\n在使用元素时，你需要使用索引数组（或称为连通性数组）来告诉 OpenGL 哪些顶点在被绘制时顺序如何。这将告知管线处理每个元素时顶点所需的确切顺序，如清单\
    \ 3-3 的第 3 行和第 4 行所示。例如，数组`tfan1`中的前三个数字是 1、0 和 3。这意味着第一个三角形由顶点 1、0 和 3 按此顺序构成。因此，回到数组`cubeVertices`中，顶点\
    \ 1 位于 x=0.5, y=0.5, z=0.5。顶点 0 是位于 x=-0.5, y=0.5, z=0.5 的点，而我们三角形的第三个角位于 x=-0.5,\
    \ y=-0.5, z=0.5。这样做的好处是，这使得创建数据集变得容易得多，因为实际的顺序现在无关紧要了；而缺点是它需要占用更多的内存来存储这些额外的信息。\n\
    \n这个立方体可以被分割成两个不同的三角形扇，这就是为什么会有两个索引数组。第一个扇包含了正面、右面和顶面，而第二个扇则包含了背面、底面和左面，如图 3-7\
    \ 所示。\n\n图 3-7. 第一个三角形扇共享顶点 1 作为公共顶点。\n\n**整合在一起**\n\n现在必须修改渲染代码以处理新数据。清单 3-4\
    \ 展示了`drawInRect()`方法的其余部分，紧跟在清单 3-3 的数据定义之后。这将重复早期示例中的大部分内容，包括运动。主要区别在于对`glDrawArray()`的两次调用，因为立方体被分成了两部分，每部分对应三个面或定义两个三角形扇的六个三角形。\n\
    \n**注意**：你会注意到许多 OpenGL ES 调用以`f`结尾，例如`glScalef()`、`glRotatef()`等。这个`f`意味着传递的参数是浮点数，或者说是`GLfloat`。OpenGL\
    \ ES 中唯一的其他参数类型是定点值，因此`glScalex()`对应的是`glScalex()`。定点在较老、较慢的设备上有用，但鉴于现代硬件，Apple\
    \ 建议使用浮点数。\n\n来自先前示例的过时行已被注释掉，但保留在原处以更清晰地显示差异。\n\n清单 3-4. 弹跳立方体`drawInRect`方法的其余部分\n\
    \n```\nstatic GLfloat transY = 0.0;\nstatic GLfloat z=-2.0; //1\n\nglClearColor(0.5,\
    \ 0.5, 0.5, 1.0); //2\nglClear(GL_COLOR_BUFFER_BIT);\n\nglEnable(GL_CULL_FACE);\
    \ //3\nglCullFace(GL_BACK);\n\n// glMatrixMode(GL_PROJECTION); //4\n// glLoadIdentity();\n\
    \nglMatrixMode(GL_MODELVIEW); //5\nglLoadIdentity();\n\n//glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0),\
    \ 0.0);\n\nglTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z); //6\ntransY += 0.075f;\n\
    \n//glVertexPointer(2, GL_FLOAT, 0, squareVertices);\n\nglVertexPointer(3, GL_FLOAT,\
    \ 0, cubeVertices); //7\nglEnableClientState(GL_VERTEX_ARRAY);\n\nglColorPointer(4,\
    \ GL_UNSIGNED_BYTE, 0, cubeColors); //8\nglEnableClientState(GL_COLOR_ARRAY);\n\
    \n// glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);\n\nglDrawElements( GL_TRIANGLE_FAN,\
    \ 6 * 3, GL_UNSIGNED_BYTE, tfan1); //9\nglDrawElements( GL_TRIANGLE_FAN, 6 * 3,\
    \ GL_UNSIGNED_BYTE, tfan2);\n\nif(!(counter%100))\n    NSLog(@\"FPS: %d\\n\",self.framesPerSecond);\n\
    \ncounter++;\n}\n```\n\n做了以下更改：\n\n在第 1 行添加了一个`z`值。目前这个值是静态的，因为动画仍然只在上下方向进行。一个负值意味着物体远离我们，就像它已经移到了屏幕的更深处。\n\
    \n在第 2 行再次将背景清除为中灰色。\n\n因为我们永远不想处理或绘制任何非绝对必要的东西，所以可以在第 3 行直接消除那些“背离”观察者的三角形。面剔除用于移除那些本来不可见的面。对于我们的立方体，我们只需要看到那些实际朝向我们的三角形，这取决于面的顶点环绕顺序。如果环绕顺序是逆时针的，那么它就是朝向我们的并且应该是可见的；否则，它将被剔除。这听起来像是面法线的替代品，是的，在背面消除或剔除方面确实如此。但法线仍然是确定光照照在面上所必需的。\n\
    \n**注意**：“环绕性”基于顶点描述的方向。由顶点 1、0 和 3 形成的第一个三角形是朝向我们的，因为顶点是按逆时针顺序排列的。第一个扇中的所有三角形都是逆时针的。\n\
    \n在第 4 行，投影矩阵的初始化被关闭，只保留模型视图矩阵被修改。投影将在下面处理。\n\n在第 5 行，只有`GL_MODELVIEW`被设置为当前矩阵，以防其他地方有人改变了它。\n\
    \n在第 6 行，原始`glTranslatef()`调用中最后一个坐标之前被固定为 0（因为不需要），现在被更改为`z`（`-2.0`）。\n\n在第 7\
    \ 行，原始的`squareVertices`指针被替换为`cubeVertices`。"
  raw: 'With the square it was a no-brainer to order, or sequence, the data by hand
    so that the four vertices could represent the two triangles. The cube makes this
    considerably more complicated. We could have defined each of the six faces of
    the cube by separate vertex arrays, but that wouldn’t scale well for more complex
    objects. And it would be less efficient than having to shove six sets of data
    through the graphics hardware. Thus, keeping all the data in a single array is
    the most efficient from both a memory and a performance standpoint. So, how do
    we tell OpenGL the layout of the data? In this case, we’ll use the drawing mode
    called triangle fans, as shown in Figure 3-6\. A triangle fan is a set of triangles
    that share a common vertex.


    Figure 3-6\. A triangle fan has one common point with all triangles.


    Data can be stored and presented to OpenGL ES in many different ways. One format
    may be faster but uses more memory, while another may use less memory but at the
    cost of a little extra overhead. If you were to import data from one of the 3D
    files,


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 3: Building a 3D World**


    **63**


    chances are it is already optimized for one of the approaches, but if you really
    want to hand-tune the system, you may at some point have to repack the vertices
    into the format you prefer for your application.


    Besides triangle fans, you will find other ways data can be stored or represented,
    called modes.


    Points and lines specify just that: points and lines. OpenGL ES can render your
    vertices as merely points of definable sizes or can render lines between the points
    to show the wireframe version (**gl.h** defines these by **GL_POINTS** and **GL_LINES**,
    respectively).


    Line strips, **GL_LINE_STRIP**, are a way for OpenGL to draw a series of lines
    in one shot, while line loops, **GL_LINE_LOOP**, are like line strips but will
    always connect the first and last vertices together.


    Triangles, triangle strips, and triangle fans round out the list of OpenGL


    ES primitives: **GL_TRIANGLES**, **GL_TRIANGLE_STRIP**, and **GL_TRIANGLE_**


    **FAN**. Desktop OpenGL itself can handle additional modes such as


    quads (faces with four vertices/sides), quad strips, and polygons.


    **Note** The term *primitive* denotes a fundamentally basic shape or form of data
    in graphics systems. Examples of primitives include cubes, spheres, and cones.
    The term can also be used for even simpler shapes such as points, lines, and,
    in the case of OpenGL ES, triangles and triangle fans.


    When using elements, you will need to tell OpenGL what vertices are drawn when,
    using index, or connectivity, arrays. These will tell the pipeline the exact order
    the vertices need to be processed for each element, demonstrated in lines 3 and
    4 in Listing 3-3\. So, for example, the first three numbers in the array **tfan1**
    are 1, 0, and 3\. That means the first triangle is made up of vertices 1, 0, and
    3, in that order. Therefore, back in the array **cubeVertices**, vertex 1 is located
    at x=0.5, y=0.5, and z=0.5\. Vertex 0 is the point at x=-


    0.5, y=0.5, and z=0.5, while the third corner of our triangle is located at x=-0.5,
    y=-0.5, and z=0.5\. The upside is that this makes it a lot easier to create the
    datasets because the actual order is now irrelevant, while the downside is that
    it uses up a little more memory to store the additional information.


    The cube can be divided up into two different triangle fans, which is why there
    are two index arrays. The first incorporates the front, right, and top faces,
    while the second incorporates the back, bottom, and left faces, as shown in Figure
    3-7.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 86](index-68_1.jpg)


    **CHAPTER 3: Building a 3D World**


    **64**


    Figure 3-7\. The first triangle fan shares vertex 1 as the common vertex.


    **Stitching It All Together**


    Now the rendering code must be modified to handle the new data. Listing 3-4 shows
    the rest of the drawInRect() method, right under the data definitions given in
    Listing 3-3\. This will replicate much of the earlier example, complete with motion.
    The major difference is to be found in two calls to **glDrawArray()** because
    the cube is in two pieces, one each for of the three faces or six triangles that
    define the two triangle fans.


    **Note** You’ll note that many of the OpenGL ES calls end in an *f*, such as **glScalef()**,
    **glRotatef()**, and so on. The *f* means that the parameters passed are floats,
    or **GLfloat**.


    The only other parameter types in OpenGL ES are fixed-point values, so **glScale**
    would now be **glScalex()**. Fixed point was useful for the older and slower devices,
    but with more current hardware, Apple recommends staying with floats.


    The obsolete lines from the previous example have been commented out but left
    in place to more clearly show the differences.


    Listing 3-4\. The rest of the drawInRect method for the Bouncy Cube


    **static GLfloat transY = 0.0;**


    **static GLfloat z=-2.0; //1**


    ****glClearColor(0.5, 0.5, 0.5, 1.0); //2**


    **glClear(GL_COLOR_BUFFER_BIT);**


    **[www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 3: Building a 3D World**


    **65**


    **glEnable(GL_CULL_FACE); //3**


    **glCullFace(GL_BACK);**


    ****// glMatrixMode(GL_PROJECTION); //4**


    **// glLoadIdentity();**


    ****glMatrixMode(GL_MODELVIEW); //5**


    **glLoadIdentity();**


    ****//glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), 0.0);**


    ****glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z); //6**


    **transY += 0.075f;**


    ****//glVertexPointer(2, GL_FLOAT, 0, squareVertices);**


    ****glVertexPointer(3, GL_FLOAT, 0, cubeVertices); //7**


    **glEnableClientState(GL_VERTEX_ARRAY);**


    **glColorPointer(4, GL_UNSIGNED_BYTE, 0, cubeColors); //8**


    **glEnableClientState(GL_COLOR_ARRAY);**


    ****// glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);**


    ****glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan1); //9**


    **glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan2);**


    ****if(!(counter%100))**


    **NSLog(@"FPS: %d\n",self.framesPerSecond);**


    ****counter++;**


    **}**


    The following changes have been made:


    A **z** value has been added in at line 1\. For the time being, this will be static
    because the animation remains only up and down. A negative


    value means that the object has moved away from us, as if it has


    moved deeper into the screen.


    Clear the background to the medium gray once again in line 2.


    Because we never want to process or draw anything that is not


    absolutely necessary, it is possible to just eliminate a bunch of the


    triangles that are ‘‘facing away’’ from the viewer, as on line 3. Face culling
    is used to remove the otherwise invisible faces. For our cube, the only triangles
    we need to see are the ones actually facing us, and that is determined by the
    winding, or the order, of the vertices for the face. If the winding is counterclockwise,
    it is facing us and should be visible; otherwise, it is culled. This may sound
    like a substitute for face normals, and, yes, it is when it comes to backface
    elimination, or


    culling. But normals are still needed to determine illumination striking a face.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 3: Building a 3D World**


    **66**


    **Note** “Windingness” is based on the direction the vertices describe. The first
    triangle formed by vertices 1, 0, and 3 is facing us because the vertices are
    ordered counterclockwise. All triangles in the first fan are counterclockwise.


    In line 4, the projection matrix initialization is turned off, leaving only the
    modelview matrix to be modified. Projection will be handled below.


    In line 5, only the **modelview** is set as the current matrix, in case someone
    else changed it elsewhere.


    In line 6, the final coordinate of the original **glTranslatef()** call, which
    had been fixed at 0 because it wasn’t needed, is now changed


    to z (**-2.0**).


    The original **squareVertices** pointer is replaced by **cubeVertices** in line
    7.'
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您的要求，对给定的英文文本进行翻译。\n\n\n对于正方形，手动排序数据（即排列顶点顺序）使其四个顶点能构成两个三角形是件轻而易举的事。但对于立方体，这就复杂得多了。我们可以为立方体的六个面分别定义顶点数组，但这种方法对于更复杂的物体扩展性不佳，而且其效率也低于一次性将六组数据推入图形硬件。因此，从内存和性能两个角度来看，将所有数据保存在一个数组中是最有效率的。那么，我们该如何告诉\
    \ OpenGL 数据的布局呢？在本例中，我们将使用一种称为“三角形扇”的绘制模式，如图 3-6 所示。三角形扇是一组共享一个公共顶点的三角形。\n\n图\
    \ 3-6. 三角形扇的所有三角形共享一个公共点。\n\n数据可以通过多种不同的方式存储并呈现给 OpenGL ES。一种格式可能速度更快但占用更多内存，而另一种格式可能占用更少内存，但代价是增加一些额外的开销。如果你从某个\
    \ 3D 文件导入数据，它很可能已经针对其中一种方法进行了优化。但如果你真的想手动调优系统，在某些时候你可能需要将顶点重新打包成你应用程序偏好的格式。\n\n\
    除了三角形扇，你还会发现其他存储或表示数据的方式，这些方式被称为“模式”。\n\n点和线如其名：就是点和线。OpenGL ES 可以将你的顶点渲染为可定义大小的点，也可以在点之间绘制线条以显示线框版本（`gl.h`中分别通过\
    \ `GL_POINTS` 和 `GL_LINES` 定义了这些）。\n\n`GL_LINE_STRIP`（线条带）是 OpenGL 一次绘制一系列线条的方式，而\
    \ `GL_LINE_LOOP`（线条环）类似于线条带，但它总是会将第一个和最后一个顶点连接起来。\n\n三角形、三角形带和三角形扇构成了 OpenGL ES\
    \ 图元列表的其余部分：`GL_TRIANGLES`、`GL_TRIANGLE_STRIP` 和 `GL_TRIANGLE_FAN`。桌面级 OpenGL\
    \ 本身可以处理更多模式，例如 `GL_QUADS`（四个顶点/边的面）、`GL_QUAD_STRIP`（四边形带）和多边形。\n\n**注意**：术语“图元”指的是图形系统中一种基本的数据形状或形式。图元的示例包括立方体、球体和锥体。该术语也可用于更简单的形状，如点、线，以及对于\
    \ OpenGL ES 而言的三角形和三角形扇。\n\n在使用元素时，你需要使用索引数组（或称为连通性数组）来告诉 OpenGL 哪些顶点在被绘制时顺序如何。这将告知管线处理每个元素时顶点所需的确切顺序，如清单\
    \ 3-3 的第 3 行和第 4 行所示。例如，数组 `tfan1` 中的前三个数字是 1、0 和 3。这意味着第一个三角形由顶点 1、0 和 3 按此顺序构成。因此，回到数组\
    \ `cubeVertices` 中，顶点 1 位于 x=0.5, y=0.5, z=0.5。顶点 0 是位于 x=-0.5, y=0.5, z=0.5 的点，而我们三角形的第三个角位于\
    \ x=-0.5, y=-0.5, z=0.5。这样做的好处是，这使得创建数据集变得容易得多，因为实际的顺序现在无关紧要了；而缺点是它需要占用更多的内存来存储这些额外的信息。\n\
    \n这个立方体可以被分割成两个不同的三角形扇，这就是为什么会有两个索引数组。第一个扇包含了正面、右面和顶面，而第二个扇则包含了背面、底面和左面，如图 3-7\
    \ 所示。\n\n图 3-7. 第一个三角形扇共享顶点 1 作为公共顶点。\n\n**整合在一起**\n\n现在必须修改渲染代码以处理新数据。清单 3-4\
    \ 展示了 `drawInRect()` 方法的其余部分，紧跟在清单 3-3 的数据定义之后。这将重复早期示例中的大部分内容，包括运动。主要区别在于对 `glDrawArray()`\
    \ 的两次调用，因为立方体被分成了两部分，每部分对应三个面或定义两个三角形扇的六个三角形。\n\n**注意**：你会注意到许多 OpenGL ES 调用以\
    \ `f` 结尾，例如 `glScalef()`、`glRotatef()` 等。这个 `f` 意味着传递的参数是浮点数，或者说是 `GLfloat`。OpenGL\
    \ ES 中唯一的其他参数类型是定点值，因此 `glScalex()` 对应的是 `glScalex()`。定点在较老、较慢的设备上有用，但鉴于现代硬件，Apple\
    \ 建议使用浮点数。\n\n来自先前示例的过时行已被注释掉，但保留在原处以更清晰地显示差异。\n\n清单 3-4. 弹跳立方体 `drawInRect` 方法的其余部分\n\
    \n```\nstatic GLfloat transY = 0.0;\nstatic GLfloat z=-2.0; //1\n\nglClearColor(0.5,\
    \ 0.5, 0.5, 1.0); //2\nglClear(GL_COLOR_BUFFER_BIT);\n\nglEnable(GL_CULL_FACE);\
    \ //3\nglCullFace(GL_BACK);\n\n// glMatrixMode(GL_PROJECTION); //4\n// glLoadIdentity();\n\
    \nglMatrixMode(GL_MODELVIEW); //5\nglLoadIdentity();\n\n//glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0),\
    \ 0.0);\n\nglTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z); //6\ntransY += 0.075f;\n\
    \n//glVertexPointer(2, GL_FLOAT, 0, squareVertices);\n\nglVertexPointer(3, GL_FLOAT,\
    \ 0, cubeVertices); //7\nglEnableClientState(GL_VERTEX_ARRAY);\n\nglColorPointer(4,\
    \ GL_UNSIGNED_BYTE, 0, cubeColors); //8\nglEnableClientState(GL_COLOR_ARRAY);\n\
    \n// glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);\n\nglDrawElements( GL_TRIANGLE_FAN,\
    \ 6 * 3, GL_UNSIGNED_BYTE, tfan1); //9\nglDrawElements( GL_TRIANGLE_FAN, 6 * 3,\
    \ GL_UNSIGNED_BYTE, tfan2);\n\nif(!(counter%100))\n    NSLog(@\"FPS: %d\\n\",self.framesPerSecond);\n\
    \ncounter++;\n}\n```\n\n做了以下更改：\n\n在第 1 行添加了一个 `z` 值。目前这个值是静态的，因为动画仍然只在上下方向进行。一个负值意味着物体远离我们，就像它已经移到了屏幕的更深处。\n\
    \n在第 2 行再次将背景清除为中灰色。\n\n因为我们永远不想处理或绘制任何非绝对必要的东西，所以可以在第 3 行直接消除那些“背离”观察者的三角形。面剔除用于移除那些本来不可见的面。对于我们的立方体，我们只需要看到那些实际朝向我们的三角形，这取决于面的顶点环绕顺序。如果环绕顺序是逆时针的，那么它就是朝向我们的并且应该是可见的；否则，它将被剔除。这听起来像是面法线的替代品，是的，在背面消除或剔除方面确实如此。但法线仍然是确定光照照在面上所必需的。\n\
    \n**注意**：“环绕性”基于顶点描述的方向。由顶点 1、0 和 3 形成的第一个三角形是朝向我们的，因为顶点是按逆时针顺序排列的。第一个扇中的所有三角形都是逆时针的。\n\
    \n在第 4 行，投影矩阵的初始化被关闭，只保留模型视图矩阵被修改。投影将在下面处理。\n\n在第 5 行，只有 `GL_MODELVIEW` 被设置为当前矩阵，以防其他地方有人改变了它。\n\
    \n在第 6 行，原始 `glTranslatef()` 调用中最后一个坐标之前被固定为 0（因为不需要），现在被更改为 `z`（`-2.0`）。\n\n\
    在第 7 行，原始的 `squareVertices` 指针被替换为 `cubeVertices`。\n"
- fmt: "Line 8 replaces the `squareColors` with `cubeColors`.\n\nThe original `glDrawArrays()`\
    \ is removed to be replaced by two calls to `glDrawElements()` on line 9, one\
    \ for each of the triangle fans. Of note, the second argument is for the number\
    \ of elements in the `tFan` connectivity arrays: six vertices times three elements\
    \ on each vertex.\n\nOpenGL will take the connectivity arrays, `tfan1` and `tfan2`;\
    \ look up each vertex in the vertex pointer array (line 7); and render the object.\n\
    \nYou should be able to get a compile at this point, but you won’t see anything\
    \ because the viewing frustum has yet to be defined. The default far clip plane\
    \ is -1.0, meaning that anything further than that will be culled, that is, not\
    \ be visible. If you substitute -1.5 for z, in place of -2.0, the “cube” is moved\
    \ closer and should be partially visible. Although it looks like the whole thing,\
    \ it is actually just the closest face poking through. Change the `z` to -1.500001,\
    \ and it vanishes. It’s not going to look like much of a cube right now, because\
    \ only a portion of it will be poking through. Also, because the frustum is not\
    \ defined, the square viewport is stretched out when being adapted to fill the\
    \ window.\n\n(The coordinate -1.5 is where the origin of the cube needs to be\
    \ to ensure the closest face is at -1.0.) Now move it back to -2.0.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## CHAPTER 3: Building a 3D World\n\n### 67\n\n## Defining the Frustum\n\nThe\
    \ last step we need is to specify details on how the vertices are mapped to our\
    \ screen using `glFrustumf()`, as in Listing 3-5. If you’ll recall, the frustum\
    \ is made of six planes that enclose the volume that specifies what we can see,\
    \ something like a camera’s lens.\n\n**Listing 3-5.** Creating the viewing frustum,\
    \ added to the View Controller file\n\n```\n-(void)setClipping\n{\n    float aspectRatio;\n\
    \    const float zNear = .1; //1\n    const float zFar = 1000; //2\n    const\
    \ float fieldOfView = 60.0; //3\n    GLfloat size;\n\n    CGRect frame = [[UIScreen\
    \ mainScreen] bounds]; //4\n\n    //Height and width values clamp the fov to the\
    \ height; flipping it would make it relative to the width.\n    //So if we want\
    \ the field-of-view to be 60 degrees, similar to that of a wide angle lens, it\
    \ will be\n    //based on the height of our window and not the width. This is\
    \ important to know when rendering\n    // to a non-square screen.\n\n    aspectRatio=(float)frame.size.width/(float)frame.size.height;\
    \ //5\n\n    //Set the OpenGL projection matrix.\n    glMatrixMode(GL_PROJECTION);\
    \ //6\n    glLoadIdentity();\n\n    size = zNear * tanf(GLKMathDegreesToRadians\
    \ (fieldOfView) / 2.0); //7\n\n    glFrustumf(-size, size, -size /aspectRatio,\
    \ size /aspectRatio, zNear, zFar); //8\n    glViewport(0, 0, frame.size.width,\
    \ frame.size.height); //9\n\n    //Make the OpenGL ModelView matrix the default.\n\
    \    glMatrixMode(GL_MODELVIEW); //10\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## CHAPTER 3: Building a 3D World\n\n### 68\n\nHere is what is happening:\n\n\
    Lines 1 and 2 specify the distances of the near and far clipping planes. These\
    \ two values say that anything further than 1,000 or closer than .1 will be filtered\
    \ out. (“A thousand what?” you might ask. Just a thousand; the units can be up\
    \ to you. They could be light-years or cubits, it doesn’t matter.)\n\nLine 3 sets\
    \ the field of view to 60 degrees.\n\nLines 4 and 5 calculate the aspect ratio\
    \ of the final screen. Its height and width values clamp the FOV to the height;\
    \ flipping it would make it relative to the width. So if we want the field-of-view\
    \ to be 60 degrees, similar to that of a wide-angle lens, it will be based on\
    \ the height of our window and not the width. This is important to know when rendering\
    \ to a non-square screen.\n\nBecause the frustum affects the projection matrix,\
    \ we need to ensure that it is activated instead of the modelview matrix, in line\
    \ 6.\n\nLine 7 has the duty of calculating a size value needed to specify the\
    \ left/right and top/bottom limits of the viewing volume, as shown in"
