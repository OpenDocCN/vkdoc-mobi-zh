    \nFigure 2-4. The z-axis comes toward the viewer.\n\nFirst we’ll look at 3D transformation.\
    \ Just as the 2D variety was merely adding the desired deltas to the original\
    \ location, the same thing goes for 3D. And the matrix that describes that would\
    \ look like the following:\n\n```\n      ⎡ 1 0 0 0⎤            ⎡ x'⎤   ⎡ 1 0 0\
    \ 0⎤⎡ x⎤\n      ⎢ 0 1 0 0⎥            ⎢ y'⎥   ⎢ 0 1 0 0⎥⎢ y⎥\nT =   ⎢ 0 0 1 0⎥\
    \      so    ⎢ z'⎥ = ⎢ 0 0 1 0⎥⎢ z⎥\n      ⎣ Tx Ty Tz 1⎦         ⎣ 1 ⎦   ⎣ Tx\
    \ Ty Tz 1⎦⎣ 1⎦\n```\n\nAnd of course that would yield the following:\n\n`x′ =\
    \ x + Tx`, `y′ = y + Ty`, and `z′ = z + Tz`\n\nNotice the extra `1` that’s been\
    \ added; it’s the same as for the 2D stuff, so our point location is now in homogeneous\
    \ form.\n\nSo, let’s take a look at rotation. One can safely assume that if we\
    \ were to rotate around the Z-axis (Figure 2-5), the equations would map directly\
    \ to the 2D versions. Using the matrix to express this, here is what we get (notice\
    \ the new notation, where `R(z,a)` is used to make it clear which axis is being\
