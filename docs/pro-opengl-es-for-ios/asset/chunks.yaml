    The final step is to modify the `execute()` method in `Planet.m` to look like
    Listing 4-3.


    Listing 4-3. Supporting lighting in the Planet Execute routine


    ```

    - (bool)execute


    {


    glMatrixMode(GL_MODELVIEW);


    glEnable(GL_CULL_FACE);


    glCullFace(GL_BACK);


    glEnableClientState(GL_NORMAL_ARRAY); //1


    glEnableClientState(GL_VERTEX_ARRAY);


    glEnableClientState(GL_COLOR_ARRAY);


    glVertexPointer(3, GL_FLOAT, 0, m_VertexData);


    glNormalPointer(GL_FLOAT, 0, m_NormalData); //2


    glColorPointer(4, GL_UNSIGNED_BYTE, 0, m_ColorData);


    glDrawArrays(GL_TRIANGLE_STRIP, 0, (m_Slices+1)*2*(m_Stacks-1)+2);


    return true;


    }

    ```


    It’s not much different than the original, except with the addition of lines 1
    and 2 for sending the normal data to the OpenGL pipeline alongside the color and
    vertex information. If you have a very simple model in which many of the vertices
    all share the same normal, you can dump the normal array and use `glNormal3f()`
    instead, saving a little memory and CPU overhead in the process.


    Let’s make one final tweak. For this example, ensure that the planet is allocated
    with the stack and slice values set back to 10 each. This makes it easier to see
    how some of the lighting works. Now you can compile and run it for real, and if
    you get something similar to Figure 4-5, relax and take a pause for a cool refreshing
    beverage.


    Figure 4-5. Flat lighting


    Now that you’re back, I am sure you’ve spotted something a little odd. Supposedly
    the geometry is based on strips of triangles, so why are the faces those weird
    four-sided triangle things?


    When set for flat shading, OpenGL picks up its illumination cue from only a single
    vertex, the last one of the respective triangle. Now, instead of the strips being
    drawn from triangles in horizontal pairs, think of them loosely coupled in vertical
    pairs, as you see in Figure 4-6.


    Figure 4-6. “Stacked” triangle pairs


    In Strip 0, Triangle 1 will be drawn using vertices 0, 1, and 2, with vertex 2
    used for the shading. Triangle 2 will use 2, 1, and 3. Lather, rinse, and repeat
    for the rest of the strip.


    Next for Strip 1, Triangle 41 will be drawn with vertices 4, 0, and 5. But Triangle
    42 will use vertices 5, 0, and 2, with the same vertex as Triangle 1 for its shading.
    That is why the vertical pairs combine to form a “bent” quadrilateral.


    There are few reasons nowadays to use flat shading, so in `initLighting()`, swap
    out `GL_FLAT` for `GL_SMOOTH`.


    And now you probably know the drill: compile, run, and compare. Then for fun,
    decrease the sphere’s resolution from 10 slices and segments down to 5. Go back
    to flat shading on this one, and then compare to smooth shading. See Figure 4-7a,
    b, and c. Figure 4-7c is particularly interesting because the shading model starts
    to break down, showing some artifacting along the face edges. Now reset the sphere’s
    resolution back up to 20 or 30 to make it nice and smooth for the next section.


    Figure 4-7. From left to right, smooth shading a sphere with 20 stacks and 20
    slices, flat shading on a sphere of only 5 stacks and slices, followed by smooth
    shading


    ## Fun with Light and Materials


    Now, since we have a nice smooth sphere to play with, we can start tinkering with
    the other lighting models and materials. But first a thought experiment: say you
    have a green sphere as shown earlier but your diffuse light is red. What color
    will the sphere be? (Pause for the Jeopardy theme.) Ready? Well, in the real world
    what would it be?


    Reddish green? Greenish red? A mauvy shade of pinky russet? Let’s try it and find
    out.


    Modify `initLighting()` again, as shown in Listing 4-4. Note that the light vectors
    have been renamed to their specific colors to make it a little more readable.


    Listing 4-4. Adding Some More Light Types and Materials


    ```

    -(void)initLighting


    {


    GLfloat pos[]={0.0,3.0,0.0,1.0};


    GLfloat white[]={1.0,1.0,1.0,1.0};


    GLfloat red[]={1.0,0.0,0.0,1.0};


    GLfloat green[]={0.0,1.0,0.0,1.0};


    GLfloat blue[]={0.0,0.0,1.0,1.0};


    GLfloat cyan[]={0.0,1.0,1.0,1.0};


    GLfloat yellow[]={1.0,1.0,0.0,1.0};


    GLfloat magenta[]={1.0,0.0,1.0,1.0};


    GLfloat halfcyan[]={0.0,.5,.5,1.0};


    //Lights go here.


    glLightfv(SS_SUNLIGHT,GL_POSITION,pos);


    glLightfv(SS_SUNLIGHT,GL_DIFFUSE,green);


    //Materials go here.


    glMaterialfv(GL_FRONT_AND_BACK, GL_DIFFUSE, red); // 1


    glShadeModel(GL_SMOOTH);


    glEnable(GL_LIGHTING);


    glEnable(SS_SUNLIGHT);


    glLoadIdentity();


    }

    ```


    If you see our old friend, the supermassive black hole from M31, you’ve done well.
    So, why is it black? That’s simple; remember the discussion at the start of this
    chapter on colors and reflectance? A red object looks red only when the lighting
    hitting it has a red component, precisely the way our green light doesn’t. If
    you had a red balloon in a dark room and illuminated it with green light on it,
    it would look black, because no green would come back to you. And if someone asks
    you what you’re doing with a red balloon in a dark room, just growl “Physics!”
    Then tell them that they just wouldn’t understand in a dismissive tone.


    So, with this understanding, replace the red diffuse material with green in line
    1. What should you get? Right, the green sphere is illuminated again. But you
    may notice something really interesting. The green now looks a little bit brighter
    than before adding the material. Figure 4-8 (left) shows it without any material
    specified, and Figure 4-8 (right) shows it with the green diffuse material added.


    Figure 4-8. Without green material defined (left) and with it defined (right)


    Let’s do one more experiment. Let’s make the diffuse light be a more traditional
    white. What should now happen with the green? Red? How about blue? Since the white
    light has all those components, the colored materials should all show up equally
    well. But if you see the black ball again, you changed the material’s color, not
    the lighting.


    ## Specular Lighting


    Well, how about the specular stuff? Add the following line to the lights section:
    `glLightfv(SS_SUNLIGHT,GL_SPECULAR,red);`


    To the material section, add this: `glMaterialfv(GL_FRONT_AND_BACK, GL_SPECULAR,
    red);`


    And change the light’s position to the following: `GLfloat pos[]={10.0,3.0,0.0,1.0};`


    > **Note** The first value to `glMaterial*` must always be `GL_FRONT_AND_BACK`.
    In normal OpenGL, you’re permitted to have different materials on both sides of
    a face, but not so in OpenGL ES. However, you still must use the front and back
