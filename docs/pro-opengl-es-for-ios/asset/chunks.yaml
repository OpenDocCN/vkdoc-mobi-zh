    # 检查器概览


    检查器可让您选择要记录的跟踪类型。每选择一个项目，就会在轨道窗口中新增一条轨道。颜色用于区分不同跟踪数据，而符号则仅当您在底部附近的“轨道显示”部分选择了折线图轨道样式时才会使用。


    `配置`按钮会将页面翻转至更大的统计列表。这些都是详列在详细信息窗格中的项目。由于并非所有项目都适合以图表形式呈现，因此您有更多选项可供选择。


    截至目前，您可以采集以下类型的跟踪数据，除非特别说明，这些数据均非累积值，而是每帧的单独值（在大多数情况下，数值越小越好）：


    -   `#批处理调用次数`：各种批处理例程（如 `glDrawArrays()` 或 `glDrawElements()`）的调用次数。

    -   `#禁用调用次数`：`glDisable()` 的调用次数。

    -   `#启用调用次数`：`glEnable()` 的调用次数。

    -   `#刷新调用次数`：`glFlush()` 被调用的次数。

    -   `#GL 与平台调用次数`：每帧中对 OpenGL 和 iOS API 的总瞬时调用次数。

    -   `#GL 调用次数`：与前一项相同，但仅限 OpenGL 调用。

    -   `#渲染线条数`：渲染的图元线条数。

    -   `#平台调用次数`：每帧中对 iOS API 的总瞬时调用次数。

    -   `#渲染点数`：渲染的图元点数。在我的测试案例中，在我那台被亲切地称为“牛顿”的 iPad 1 上，它显示为 880,000。（想想看。）您也可以将这些点等同于已处理的顶点数。

    -   `#冗余状态变更`：如前所述，每帧内不必要的状态变更总数。我目前只显示了 19 次。您的目标是将其降至 0。

    -   `#渲染通道数`：用于跟踪多通道渲染的句柄。

    -   `#纹理上传数`：上传到硬件的纹理数量。

    -   `#渲染三角形数`：渲染的三角形图元总数。在我那台 iPad 1 上，我的测试应用目前每帧渲染 879,978 个三角形，并以 3 FPS 的速度运行。当然，像三角形数量这样的指标只是相对概念，因为它们会根据大小和方向发生巨大变化。


    # 目标选择器


    当从 Xcode 启动时，您正在运行的应用会出现在此处。它还可以让您选择任何设备或任何其他正在开发的应用程序。


    # 轨道显示


    显示的跟踪数据是从检查器面板的“要观察的帧统计信息”部分中选择的。您可以堆叠显示，或将它们相互重叠。在时间轴上单击并拖动那个小小的透明楔形物，可以显示任意一个跟踪数据在特定时间点的实际值，如图
    9-11 所示。


    ![图片 265](img/index-308_1.jpg)


    **图 9-11.** 从轨道窗格中选取数据


    # 扩展详情


    此窗格将显示任何可能的额外细节，例如堆栈跟踪、样本统计信息、建议等。例如，当前在图 9-8（项目 5）中，它显示了对 `glMaterialfv()` 的调用传递了错误的参数——该值在
    OpenGL 中有效，但在 ES 中未使用。这既可怕又神奇。


    它还可以指出性能侦探可能给出的许多提示或建议，听起来就像失望的阿姨在啧啧责备，如果您错过了使用 VBO 的机会或纹理未优化的话。


    # 其他上下文相关设置


    根据您选择的工具，您会看到一系列额外的控件，用于帮助微调显示以及 OpenGL 的运行方式。“覆盖”部分可让您开启或关闭管线的各个部分。在此过程中，您通常会收到许多警告，比如“您确定要这样做吗？”之类的提示。


    # 详细信息窗格


    这是一个关于各种统计信息和跟踪数据的、详尽的视图。工具栏中的选择器包含几个选项：'
- fmt: '# API Expert

    Displays things that Instruments thinks could be slowing up execution. When running
    with the OpenGL ES tool, this will point out many of the issues covered previously
    such as mipmap usage, textures that could be compacted, and so on, with very wordy
    but helpful tips on what to fix.


    # Frame Statistics

    Lists version of the data displayed in the track pane, along with other data that
    cannot be easily shown in a graph format.


    ---


    ## CHAPTER 9: Performance ’n’ Stuff


    **306**


    # Trace

    Shows every OpenGL call made and supplies a call stack in the detail pane on the
    right.


    # Call Tree

    Aggregates the stack traces so it can display them as call trees by queue.


    # Api Statistics

    Shows cumulative usage metrics not covered elsewhere. Fields covered for each
    OpenGL API call include number of times it’s been called, total time in each call
    in microseconds, and average time (also in microseconds). My app is showing that
    over a period of five minutes, `glDrawArrays()` has been called 3,369 times, with
    an average time of 67,174 µsecs. `PresentFrameBuffer()` in the `EAGLContext` has
    only 306 calls, but a whopping amount of time, with the average time of 83,561,776
    µsecs.


    ## Summary

    In this chapter, you learned about the basic tricks and best practices to make
    your OpenGL app really perform. Vertex buffer objects will cut down saturation
    of the bus by keeping commonly used geometry on the GPU. Reducing the state changing
    and `glGet*` calls to a minimum can also yield a substantial improvement in rendering
    speed.


    After that, you learned a little about the OpenGL ES analyzer that is new in the
    Xcode 4 release of Instruments; it acts a little like an MRI machine for your
    code, making visible that which was once hidden.


    In the final chapter, you’ll learn a little about OpenGL ES 2.0 and those mysterious
    shader things that are all the rage these days.


    ---


    ## Chapter 10: OpenGL ES 2, Shaders, and…


    Her angel’s face, As the great eye of heaven shined bright, And made a sunshine
    in the shady place.


    —Edmund Spenser


    There are two different versions of the OpenGL ES graphics library on your iOS
    devices. This book has largely dealt with the higher-level one, known as OpenGL
    ES 1, sometimes referred to as 1.1 or 1.x. The second version is a rather confusingly
    named OpenGL ES 2\. The first one is by far the easier of the two; it comes with
    all sorts of helper libraries doing much of the 3D mathematics and all of the
    lighting, coloring, and shading on your behalf. ES 2 eschews all of those niceties
    and is sometimes referred to as the "programmable function" version (vs. ES 1’s
    "fixed function" design, which is generally sneered at by the true pixel-jockeys
    who prefer more control over their imagery, usually for immersive 3D game environments
    where every little visual footnote is emphasized). For that, OpenGL ES 2 was released.


    In this chapter, we’ll just touch ever so briefly on shaders, just enough to give
    you a general feel for them. Afterward, I’ll go into some more of the GLKit goodness
    not covered in previous chapters.


    Version 1 is relatively close to the desktop variety of OpenGL, making porting
    applications, particularly vintage ones, a little less painful than having a badger
    gnaw your face off. The things that were left out were done so to keep the footprint
    small on limited-resource devices and to ensure performance was as good as could
    be.


    Version 2 defenestrated compatibility altogether and concentrated on performance
    and flexibility-oriented features aimed primarily at entertainment-oriented software.
    Among the things left out were `glRotatef()`, `glTranslatef()`, matrix stack operations,
    and so on. But what we got in return are some delightful little morsels such as
    a programmable pipeline via the use of shaders. And the loss of the transformation
    methods have been'
