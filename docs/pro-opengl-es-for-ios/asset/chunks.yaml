    \   if(m_UseTexture)\n        numBytesPerVertex+=numTextureCoordElements;\n  \
    \  numBytesPerVertex*=sizeof(GLfloat);\n\n    //3\n    glBufferData(GL_ARRAY_BUFFER,\
    \ numBytesPerVertex*m_NumVertices, 0, GL_STATIC_DRAW);\n\n    //4\n    GLubyte\
    \ *vboBuffer=(GLubyte *)glMapBufferOES(GL_ARRAY_BUFFER, GL_WRITE_ONLY_OES);\n\n\
    \    //5\n    totalXYZBytes=numXYZElements*m_NumVertices*sizeof(GLfloat);\n}\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)"
