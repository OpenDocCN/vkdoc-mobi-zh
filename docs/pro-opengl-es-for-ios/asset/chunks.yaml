    This is what’s going on:


    The lighting components are in the standard RGBA normalized form.


    So in this case, there is no red, maximum green, and no blue. The final value
    of alpha should be kept at 1.0 for now, because it will be


    covered in more detail later.


    Line 2 specifies the position of the light. It is at a y of +10 so, it will be
    hovering above our sphere.


    In lines 3 and 4, we set the light’s position and the diffuse component to the
    diffuse color. **glLightfv()** is a new call and is used to set various light-related
    parameters. You can retrieve any of this data at a later time using **glGetLightfv()**,
    which retrieves any of the parameters from a specific light.


    In line 5 we specify a shading model. Flat means that a face is a single solid
    color, while setting it to **GL_SMOOTH** will cause the colors to blend smoothly
    across the face and from face to face.


    And finally, line 6 tells the system we want to use lighting, while line 7


    enables the one light we’ve created.


    **Note** The final parameter of **glLightfv()** takes an array of four **GLfloat**
    values; the *fv* suffix means “float-vector.” There is also a **glLightf()** call
    to set single-value parameters.


    Now compile and run. Eh? What’s that, you say? You see only a black thing about
    the size of the super-massive black hole at the center of the galaxy M31? Oh yes,
    we forgot something, sorry. As previously mentioned, OpenGL in all of its varieties
    still remains a relatively low-level library, so it is up to the programmer to
    handle all sorts of housekeeping tasks that you’d expect a higher-level system
    to manage (and it gets much worse on OpenGL ES 2.0). And once the lights are turned
    on, the predefined vertex colors are ignored, so we get black. With that in mind,
    our sphere model needs an extra layer of data to tell the system just how to light
    its facets, and that is done through an array of normals for each vertex.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 122](index-103_1.jpg)


    **CHAPTER 4: Turning On the Lights**


    **99**


    What is a vertex normal? Face normals are normalized vectors that are orthogonal
    (perpendicular) to a plane or face. But in OpenGL, vertex normals are used instead
    because they provide for better shading down the road. It sounds odd that a vertex
    can have a ‘‘normal’’ of its own. After all, what is the ‘‘direction’’ of a vertex?
    It is actually quite simple conceptually, because vertex normals are merely the
    normalized sum of the normals of the faces adjacent to the vertex. See Figure
    4-4.


    Figure 4-4\. A face normal is illustrated on the right, while vertex normals for
    a triangle fan are on the left.


    OpenGL needs all of this information to tell what ‘‘direction’’ the vertex is
    aiming at so it can calculate just how much illumination is falling on it, if
    at all. It will be its brightest when aiming directly at the light source and
    dims as it starts tilting away. This means we need to modify our planet generator
    to create a normal array along with the vertex and color arrays, as shown in Listing
    4-2.


