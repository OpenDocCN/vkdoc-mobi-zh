    ## 多重纹理


    到目前为止，我们已经介绍了颜色混合以及纹理与颜色的混合模式，但是如何将两个纹理组合以创建第三个纹理呢？这种技术称为多重纹理。多重纹理可用于将一个纹理层叠在另一个纹理之上，同时执行某些数学运算。更复杂的应用包括简单的图像处理。但我们还是先处理简单的情况。


    多重纹理需要使用纹理组合器（texture combiners）和纹理单元（texture units）。纹理组合器允许您组合和处理绑定到硬件纹理单元的纹理，纹理单元是图形芯片中用于将图像包裹到对象周围的特定部分。在
    iPhone 3GS 之前，您只有两个纹理单元可用，这是 Imagination Technologies 公司 PowerVR MBX 图形芯片的限制。当
    3GS 推出时，Apple 改用更强大的 SGX 芯片，该芯片将纹理单元总数增加到八个。如果您预计会大量使用组合器，您可能需要通过以下方式验证支持的总数：


    `glGetIntegerv(GL_MAX_COMBINED_TEXTURE_IMAGE_UNITS, &numberTextureUnits)`，其中`numberTextureUnits`被定义为`GLint`。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 192](img/index-188_1.jpg)


    **第 6 章：它会混合吗？**


    **185**


