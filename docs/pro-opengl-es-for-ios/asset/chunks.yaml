- fmt: "```glsl\nspecular = pow(max(0.0, nDotVPReflection), shininess) * 0.75; //\
    \ 4\nspecularColorVarying = vec4(specular, specular, specular, 0.0); // 5\ncolorVarying\
    \ = diffuseColor * nDotVP;\ngl_Position = modelViewProjectionMatrix * position;\n\
    }\n```\n\nHere’s what is going on:\n\n[Line 1](#index_split_000.html#p6) declares\
    \ a varying variable to hand the specular illumination off to the fragment shader.\n\
    \nNext, in line 2, we get a normalized normal transformed by the `normalMatrix`\
    \ (yup, still sounds funny), which is needed to get the proper specular value.\n\
    \nWe now need to get the dot product of the reflection of the light and the normalized\
    \ normal multiplied normally by the `normalMatrix` in a normal fashion. [See line\
    \ 3.](#index_split_000.html#p8) Notice the use of the `reflect()` method, which\
    \ is another one of the niceties in the shader language. `reflect()` generates\
    \ a reflected vector based on the negative light direction and the local normal.\
    \ That is then dotted with the `eyeNormal`.\n\n[In Line 4](#index_split_000.html#p9)\
    \ that dot value is taken and used to generate the actual specular component.\
    \ You will also see our old friend `shininess`, and just as in version 1 of OpenGL\
    \ ES, the higher the value, the narrower the reflection.\n\nSince we can consider\
    \ the sun's color just to be white, the specular color in line 5 can be made to\
    \ have all its components set to the same value.\n\nNow the fragment shader can\
    \ be used to refine things even further, as shown in Listing 10-15.\n\n**Listing\
    \ 10-15.** The Fragment Shader That Handles the Specular Reflection\n\n```glsl\n\
    precision mediump float;\nvarying lowp vec4 colorVarying;\nvarying lowp vec4 specularColorVarying;\
    \ // 1\nuniform mat4 modelViewProjectionMatrix;\nuniform mat3 normalMatrix;\n\
    uniform vec3 lightPosition;\nvarying vec2 v_texCoord;\nuniform sampler2D s_texture;\n\
    \nvoid main()\n{\n    vec4 finalSpecular = vec4(0,0,0,1);\n    vec4 surfaceColor;\n\
    \    float halfBlue;\n\n    surfaceColor = texture2D(s_texture, v_texCoord);\n\
    \    halfBlue = 0.5 * surfaceColor[2]; // 2\n    if(halfBlue > 1.0) // 3\n   \
    \     halfBlue = 1.0;\n    if((surfaceColor[0] < halfBlue) && (surfaceColor[1]\
    \ < halfBlue)) // 4\n        finalSpecular = specularColorVarying;\n    gl_FragColor\
    \ = surfaceColor * colorVarying + colorVarying * finalSpecular; // 5\n}\n```\n\
    \nThe main task here is to determine which fragments represent sea and which do\
    \ not. It’s pretty easy: the blue stuff is water (powerful wet stuff, that water!),\
    \ and everything that isn’t, isn’t.\n\n[First in line 1,](#index_split_000.html#p6)\
    \ we pick up the `specularColorVarying` variable.\n\n[In line 2,](#index_split_000.html#p7)\
    \ we pick up the blue component and divide it by half, clamping [in line 3,](#index_split_000.html#p8)\
    \ since no color can actually go above full intensity.\n\n[Line 4](#index_split_000.html#p9)\
    \ does the filtering. If the red and green components were both less than half\
    \ that of the blue, then it’s a pretty safe bet that we can draw the specular\
    \ glint over the water, instead of some place like Chad.\n\nThe specular piece\
    \ is now added to the fragment color in the last line, after first multiplying\
    \ it with the `colorVarying`, because that will modulate it with everything else.\n\
    \nFigure 10-5 shows the results.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 282](index-332_1.jpg)\n![Image 283](index-332_2.jpg)\n![Image 284](index-332_3.jpg)\n\
    \n**CHAPTER 10: OpenGL ES 2, Shaders, and...**\n\n**329**"
