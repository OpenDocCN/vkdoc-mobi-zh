    \n### 过滤\n\n图像作为纹理使用时，根据其内容以及投影到屏幕上的最终尺寸，可能会表现出各种伪影。细节丰富的图像可能会出现恼人的闪烁效果。不过，可以通过一种称为**过滤**的过程来动态修改图像，以最大限度地减少这些影响。过滤通常与\
    \ mipmapping 结合使用，因为前者可以利用后者提供的多级图像。\n\n假设你有一个 128×128 的纹理，但纹理面的边长是 500 像素。你应该看到什么？显然，图像的原始像素（现称为纹素）会比任何屏幕像素大得多。这个过程称为**放大**。相反，也可能出现纹素远小于像素的情况，这称为**缩小**。过滤就是用于确定如何将一个像素的颜色与其底层的纹素（或多个纹素）关联起来的过程。表\
    \ 5-3 和表 5-4 分别展示了这一过程的可能变体。\n\n**表 5-3. OpenGL ES 中用于缩小的纹理过滤类型**\n\n| 名称 | 用途\
