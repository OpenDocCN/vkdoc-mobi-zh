  trans: "\n**注意** 字符串 `GL_APPLE_texture_` `2D_limited_npot GL` 中还有一个有趣的附加功能。NPOT\
    \ 代表“非二次幂”。还记得较新版本的 iOS 可以使用 NPOT 图像吗？所以，如果你有理由使用 NPOT 图像，请事先检查扩展并相应地处理结果。\n\n\
    接下来，我们将生成并导入一个 PVRTC 格式。首先，你需要使用一款小巧的工具将现有文件压缩成 PVR 格式，这款工具由 Imagination Technologies（PowerVR\
    \ 图形芯片制造商，该芯片用于所有 iOS 设备）提供。你可以从 `www.imgtec.com` 获取它。在开发者专区中查找 PowerVR Insider\
    \ Utilities，具体工具名为 `PVRTexTool`。\n\n**注意** Apple 还提供了一个名为 `texturetool` 的纹理转换器。虽然它只是一个基于命令行的工具，但其本身的功能非常强大，如果你有大量文件需要一次性压缩，它可以用来处理大型批处理任务。\n\
    \n启动它时不要惊慌！它可能看起来像 Windows NT，但你的图片没有问题。它实际上使用了 X11 窗口平台，这使得它可以在许多不同的操作系统上使用。\n\
    \n要将纹理转换为 PVRTC，只需将其加载到编辑器中，然后选择“Encode Current Texture”（编码当前纹理）按钮。这将打开一个新对话框，让你选择要编码的目标\
    \ 3D 平台；在此情况下，选择 OpenGL ES 1.x 选项卡。在“压缩格式”部分，选择 `PVRTC 2BPP` 或 `PVRTC 4BPP` 按钮，然后点击底部的编码按钮。就这些！\n\
    \n表 5-5 显示了该工具生成的格式。尽管你只有两种选择，但实际上可能有四种，具体取决于源位图是否包含 Alpha 通道。`2BPP` 格式表示每像素 2\
    \ 比特，而 `4BPP` 格式，你猜对了，是每像素 4 比特。还支持许多其他图像格式，这些将在第 9 章关于性能问题的讨论中介绍。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**第 5 章：纹理**\n\n**159**\n\n表 5-5。`PVRTexTool` 生成的四种 PVR 格式\n\n| 格式 | 压缩比 | 详细信息\
    \ |\n|--------|-------------|---------|\n| `GL_COMPRESSED_RGBA_PVRTC_4BPPV1_IMG`\
    \ | 8:1 | 4 比特/像素，含 Alpha |\n| `GL_COMPRESSED_RGB_PVRTC_4BPPV1_IMG` | 6:1 | 4\
    \ 比特/像素，不含 Alpha |\n| `GL_COMPRESSED_RGBA_PVRTC_2BPPV1_IMG` | 16:1 | 2 比特/像素，含\
    \ Alpha |\n| `GL_COMPRESSED_RGB_PVRTC_2BPPV1_IMG` | 12:1 | 2 比特/像素，不含 Alpha |\n\
    \n假设你有一个 512×512 的 PNG 纹理，它将消耗 1 MB 内存。使用 `PVRTexTool` 进行最低程度的压缩，将占用不到 200 KB。最高压缩比的格式，即每像素\
    \ 2 比特并含 Alpha，则仅有区区 64 KB。\n\nPVRTC 纹理也可以被 `GLKTextureLoader()` 读取，但如果你在选项字典中指定了\
    \ `GLKTextureLoaderGenerateMipmaps`，则加载会失败。不过，你可以使用 `PVRTexTool` 为主文件嵌入一个 mipmap\
    \ 链。由于这种压缩是有损的，在使用前述代码时，你会比使用更清晰的图像时更容易看到不同分辨率文件的切换。\n\n**注意** 由于 PVRTC 是硬件相关的，Apple\
    \ 已发出预防性说明，指出未来设备不一定会支持 PVRTC。这仅仅意味着 Apple 未来可能会使用不同的 GPU 制造商，从而不太可能支持其他公司的格式。\n\
    \n## 更多太阳系内容\n\n现在，我们可以回到上一章的太阳系模型，为地球添加一个纹理，使其看起来真正像地球。查看 `Planet.m`，并将 `init()`\
    \ 替换为代码清单 5-6。\n\n### 代码清单 5-6。修改后的球体生成器，增加了纹理支持\n\n```\n-(id) init:(GLint)stacks\
    \ slices:(GLint)slices radius:(GLfloat)radius //1\nsquash:(GLfloat) squash textureFile:(NSString\
    \ *)textureFile\n{\n  unsigned int colorIncrment=0;\n  unsigned int blue=0;\n\
    \  unsigned int red=255;\n  int numVertices=0;\n  if(textureFile!=nil)\n    m_TextureInfo=[self\
    \ loadTexture:textureFile]; //2\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**第 5 章：纹理**\n\n**160**\n\n```\n  m_Scale=radius;\n  m_Squash=squash;\n```\n"
