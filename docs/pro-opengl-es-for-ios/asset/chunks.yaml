- fmt: '# CHAPTER 6: Will It Blend?


    ![Image 194](index-193_1.jpg)


    ![Image 195](index-193_2.jpg)


    ![Image 196](index-193_3.jpg)


    **190**


    Figure 6-12. On the left, `GL_ADD` was used, `GL_BLEND` was added for the center,
    and `GL_DECAL` was added on the right.


    One further task would be to animate the second texture. Add the following to
    `drawInRect()`:


    ```

    for(i=0;i<8;i++)

    {

    textureCoords2[i]+=.01;

    }

    ```


    Then make a duplicate of the original `textureCoords` array, and name it `textureCoords2`.
    The latter coordinates are specific to the second texture, so modify the second
    call to `glTexCoordPointer()` to use the new data. And finally, declare the index
    `i` somewhere. You should see texture 2 scrolling wildly on top of texture 1.


    An effect like this could be used to animate rain or snow in a cartoonlike setting
    or a cloud layer surrounding a planet. The latter would be cool if you had two
    additional textures, one for the upper deck of clouds and one for the lower, moving
    at different rates.


    As mentioned, the environment parameter `GL_COMBINE` needs an additional family
    of settings to get working, because it lets you operate on a much more precise
    level with the combiner equations. If you were to do nothing more than just using
    `GL_COMBINE`, it defaults to `GL_MODULATE`, so you’d see no difference between
    the two. Using `Arg0` and `Arg1` means the input sources are set up by using something
    like the following line, where `GL_SOURCE0_RGB` is the argument `0` or `Arg0`,
    referenced in Table 6-3:


    ```

    glTexEnvf(GL_TEXTURE_ENV, GL_SOURCE0_RGB, GL_TEXTURE);

    ```


    **191**


    And similarly you’d use `GL_SOURCE1_RGB` for `Arg1`.


    Table 6-3. Possible Values for `GL_COMBINE_RGB` and `GL_COMBINE_ALPHA` Parameters


    | `GL_COMBINE_*` | Function |

    |---|---|

    | `GL_REPLACE` | `Arg0` |

    | `GL_MODULATE` | `Arg0 * Arg1` (the default) |

    | `GL_ADD` | `Arg0 + Arg1` |

    | `GL_ADD_SIGNED` | `Arg0 + Arg1 - 0.5` |

    | `GL_INTERPOLATE` | `Arg0 * Arg2 + Arg1 * (1 - Arg2)` |

    | `GL_SUBTRACT` | `Arg0 - Arg1` |

    | `GL_DOT3_RGB` | `4 * (((Arg0_red - .5) * (Arg1_red - .5)) + ((Arg0_green - .5)
    * (Arg1_green - .5)) + ((Arg0_blue - .5) * (Arg1_blue - .5)))` (`GL_COMBINE_RGB`
    only) |

    | `GL_DOT3_RGBA` | Same as above, but with alpha added (`GL_COMBINE_RGBA` only)
    |


    ## Mapping with Bumps


    You can do many extremely sophisticated things with textures; bump mapping is
    just one. So, what follows is a discussion of exactly what "bumps" are and why
    anyone should be concerned with mapping them.


    As previously pointed out, much of the challenge in computer graphics is to make
    complicated-looking visuals using clever hacks behind the scenes. Bump mapping
    is just one of those tricks, and in OpenGL ES 1, it can be implemented with texture
    combiners.


    Just as textures were "tricks" to layer complexity to a simple face, bump mapping
    is a technique to add a third dimension to the texture. It’s used to generate
    a roughness to the overall surface of an object, giving some surprisingly realistic
    highlights when illuminated. It might be used to simulate waves on a lake, the
    surface of a tennis ball, or a planetary surface.


    Roughness to an object’s surface is perceived by the way it plays with both light
    and shadow. For example, consider a full moon vs. a gibbous moon, as shown in
    Figure 6-13. The moon is full when the sun is directly in front of it, and as
    a result, the surface is little more than varying shades of gray. No shadows whatsoever
    are visible. It’s not much different than you looking at the ground facing away
    from the sun. Around the shadow of your head the surface looks flat. Now, if the
    light source is moved to the side of things, suddenly all sorts of details pop
    out. Figure 6-13 (right) shows a gibbous moon that has the sun toward the left,
    the moon’s eastern limb. It’s a completely different story, isn’t it?


    ![Image 197](index-195_1.jpg)


    ![Image 198](index-195_2.jpg)


    **192**


    Figure 6-13. Relatively little detail shows on the left, while with oblique lighting,
    a lot more shows on the right.


    Understanding how highlights and shadows work together is absolutely critical
    to the training of fine artists and illustrators.


    Adding real surface displacement to replicate the entire lunar surface would likely
    require many gigabytes of data and is out of the question for the current generation
    of small handheld devices from both a memory and a CPU standpoint. Thus enters
    the rather elegant hack of bump mapping to the center stage.


    If you remember in Chapter 4 on lighting, you had to add an array of "face normals"
    to the sphere model. Normals are merely vectors that are perpendicular to the
    face that show the direction the face is pointing. It is the angle of the normal
    to any of the light sources that largely determines just how bright or dark the
    face will be. And the more directly oriented the face is toward the light, the
    brighter it will be. So, what if you had a compact way to encode normals not on
    a face-by-face basis, because a model might have relatively few faces, but on,
    say, a pixel-by-pixel basis? And what if you could combine that encoded normal
    array with a real image texture and process it in a way that could brighten or
    darken a pixel from the image, based on the direction of incoming light?


    This brings us back to the texture combiners. In Table 6-3, notice the last two
    combiner types: `GL_DOT3_RGB` and `GL_DOT3_RGBA`. Now, reach back, way back to
    your high-school geometry classes. Remember the dot product of two vectors? Both
    the dot products and cross products were those things that you scorned with the
    whine "Teacherrrrr?? Why do I need to know this?" Well, now you are going to get
    your answer.


    The dot product is the length of a vector based on the angle of two other vectors.
    Still not following? Consider Figure 6-14 (left). The dot product is the "amount"
    of the normal vector that is aiming toward the light, and that value is used to
    directly illuminate the face. In Figure 6-14 (right), the face is at a right angle
    to the direction of the sun, so it is not illuminated.


    ![Image 199](index-196_1.jpg)


    ![Image 200](index-196_2.jpg)


    **193**


    Figure 6-14. On the left (left), the face is illuminated, which is not the case
    on the right (right).


    With this in mind, the "cheat" that bump mapping uses is as follows. Take the
    actual texture you want to use, and add a special second companion texture to
    it. This second texture encodes normal information in place of the RGB colors.
    So, instead of using floats that are 4 bytes each, it uses 1-byte values for the
    xyz of normal vectors that conveniently fit inside a single 4-byte pixel. Since
    the vectors usually don’t have to be super accurate, the 8-bit resolution is just
    fine and is very memory efficient. So, these normals are generated in a way to
    map directly to the vertical features you want highlighted.


    Because normals can have negative values as well as positive (negative when pointing
    away from the sun), the xyz values are centered in the range of 0 to 1. That is,
    -127 to +127 must be mapped to anywhere between 0 and 1. So, the "red" component,
    which is typically the x part of the vector, would be calculated as follows: `red
    = (x + 1) / 2`. And of course this is similar for the green and blue bits.


    Now look at the formula expressed in the `GL_DOT3_RGB` entry of Table 6-3. This
    takes the RGB triplet as the vector and returns its length. N is the normal vector,
    and L is the light vector, so the length is solved as follows:


    `length = 4 × ((Rn - 0.5) × (Rl - 0.5) + (Gn - 0.5) × (Gl - 0.5) + (Bn - 0.5)
    × (Bl - 0.5))`.


    [www.it-ebooks.info](http://www.it-ebooks.info)'
