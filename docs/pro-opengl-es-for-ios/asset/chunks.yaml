- fmt: "The shader files are unique to OpenGL ES 2.0 and are used to fine-tune the\
    \ look of your scenes. They serve as small and very fast programs that execute\
    \ on the graphics card itself, using their own unique language that resembles\
    \ C. They give you the power to specify exactly how light and texture should show\
    \ up in the final image. Unfortunately, OpenGL ES 2.0 requires shaders and hence\
    \ a somewhat steeper learning curve, while the easier and more heavily used version\
    \ 1.1 doesn’t use shaders, settling for a few standard lighting and shading effects\
    \ (called a “fixed function” pipeline). The shader-based applications are most\
    \ likely going to be games where a visually rich experience is as important as\
    \ anything else, while the easier 1.1 framework is just right for simple games,\
    \ business graphics, educational titles, or any other apps that don’t need to\
    \ have perfect atmospheric modeling.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## CHAPTER 1: Computer Graphics: From Then to Now **15**\n\nThe application\
    \ delegate has no active code in it, so we can ignore it. The real action takes\
    \ place in the `viewController` via three main sections. The first initializes\
    \ things using some of the standard view controller methods we all know and love,\
    \ the second serves to render and animate the image, and the third section manages\
    \ these shader things.\n\nDon’t worry if you don’t get it completely, because\
    \ this example is merely intended to give you a general overview of what a basic\
    \ OpenGL ES program looks like.\n\n**Note** All of these exercises are available\
    \ on the Apress site, including additional bonus exercises that may not be in\
    \ the book.\n\nYou will notice that throughout all of the listings, various parts\
    \ of the code are marked with a numbered comment. The numbers correspond to the\
    \ descriptions following the listing and that highlight various parts of the code.\n\
    \n## Listing 1-1. The initialization of the wizard-generated view controller.\n\
    \n```\n#import \"TwoCubesViewController.h\"\n\n#define BUFFER_OFFSET(i) ((char\
    \ *)NULL + (i))\n\n// Uniform index.\nenum //1\n{\n    UNIFORM_MODELVIEWPROJECTION_MATRIX,\n\
    \    UNIFORM_NORMAL_MATRIX,\n    NUM_UNIFORMS\n};\nGLint uniforms[NUM_UNIFORMS];\n\
    \n// Attribute index.\nenum\n{\n    ATTRIB_VERTEX,\n    ATTRIB_NORMAL,\n    NUM_ATTRIBUTES\n\
    };\n\nGLfloat gCubeVertexData[216] = //2\n{\n    // Data layout for each line\
    \ below is:\n    // positionX, positionY, positionZ, normalX, normalY, normalZ,\n\
    \    0.5f, -0.5f, -0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, 0.5f, -0.5f, 1.0f, 0.0f,\
    \ 0.0f,\n    0.5f, -0.5f, 0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, -0.5f, 0.5f, 1.0f,\
    \ 0.0f, 0.0f,\n    0.5f, 0.5f, 0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, 0.5f, -0.5f,\
    \ 1.0f, 0.0f, 0.0f,\n\n    0.5f, 0.5f, -0.5f, 0.0f, 1.0f, 0.0f,\n    -0.5f, 0.5f,\
    \ -0.5f, 0.0f, 1.0f, 0.0f,\n    0.5f, 0.5f, 0.5f, 0.0f, 1.0f, 0.0f,\n    0.5f,\
    \ 0.5f, 0.5f, 0.0f, 1.0f, 0.0f,\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## CHAPTER 1: Computer Graphics: From Then to Now **16**\n\n```\n    -0.5f,\
    \ 0.5f, -0.5f, 0.0f, 1.0f, 0.0f,\n    -0.5f, 0.5f, 0.5f, 0.0f, 1.0f, 0.0f,\n\n\
