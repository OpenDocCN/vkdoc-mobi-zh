    3D`的复杂3D渲染软件包，`NewTek`向任何愿意花费几千美元的人敞开了获得廉价、网络级图形的大门。这一发展为诸如《巴比伦5号》或《深海冒险》这样需要大量特效的科幻剧集在经济上可行提供了可能。


