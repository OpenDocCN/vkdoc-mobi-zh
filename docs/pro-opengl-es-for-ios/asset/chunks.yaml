    **Summing It All Up**


    So, now you can see that there are many factors in play to merely generate the
    color and intensity of that color for any of the vertices of any models in our
    scene. These include the following:


    Attenuation because of distance


    Diffuse lights and materials


    Specular lights and materials


    Spotlight parameters


    Ambient lights and materials


    Shininess


    Emissivity of the material


    You can think of all of these as acting on the entire color vector or on each
    of the individual R, G, and B components of the colors.


    So, to spell it all out, the final vertex color will be as follows:


    *color* = *ambient*


    +


