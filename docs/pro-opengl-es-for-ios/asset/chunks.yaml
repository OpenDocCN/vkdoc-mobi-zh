    ![Image 223](index-229_2.jpg)


    ![Image 224](index-229_3.jpg)


    **CHAPTER 7: Well-Rendered Miscellany**

    **226**


    **Figure 7-8. Using stencils to create reflections**


    ## Coming of the Shadows


    Shadow casting has always been a bit of a black art in OpenGL, and it still is
    to a certain extent. However, with faster CPUs and GPUs, many tricks of the trade
    that were previously more the subject of a grad student’s paper can finally step
    out of theory into the warm glow of real-world deployment. Rigorous solutions
    to shadow casting are still the domain of the non-real-time rendering that Hollywood
    employs, but basic shadows, under limited conditions, are available to full-motion
    rendering. With thanks to the various hardware manufacturers that have added both
    shadow and lighting support to their GPUs, our 3D universes look richer than ever
    before because few elements in computer graphics can add more realism than carefully
    managed shadows. (Ask any lighting director on a Hollywood movie.) And don’t forget
    the per-pixel support via the use of shaders in OpenGL ES 2, which can let a programmer
    delicately shade every corner of every spooky castle in Blow Up Everything 3.


    There are many ways to cast shadows, or at least shadow-looking things. Perhaps
    the simplest is to have a prerendered shadow texture: a bitmap that looks like
    a shadow on the ground, cast by your object, which is then moved around as it
    moves. It’s cheap, fast, but extremely limited. On the other extreme is the full-blown
    render-everything-you-can-ever-see software that eats GPUs by the handful for
    lunch. In between the two, you’ll find shadow mapping, shadow volumes, and projection
    shadows.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 225](index-230_1.jpg)


    **CHAPTER 7: Well-Rendered Miscellany**

    **227**


    ## Shadow Mapping


    At one time, one of the most popular forms of shadow casting was through the use
    of shadow mapping frequently employed in games. Although it is a bit of a bother
    to set up, not to mention describe, the theory is pretty simple...considering.


    Shadow mapping requires two snapshots of the scene. One is from the light’s point
    of view, and the other is from that of the camera’s. When rendered from the light,
    the image will, by definition, see everything illuminated by itself. The color
    information is ignored, but the depth information is preserved, so we end up with
    a map of the visible fragments and their relative distances. Now take a shot from
    the camera’s viewpoint. By comparing the two images, we can find out what bits
    the camera sees that the light cannot. Those bits are in shadow.


    In practice, of course, it is a little more complicated than that.


    ## Shadow Volumes


    Shadow volumes are used for determining what part of your scene is illuminated
    and what is not by making very clever use of certain properties of the stencil
    buffer. What makes this technique so powerful is that it permits shadows to be
    cast across arbitrary geometric shapes as opposed to projection shadows (discussed
    later), which really works only for the simplified case of the shadow being thrown
    against a flat surface.'
