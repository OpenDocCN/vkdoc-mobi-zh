- fmt: "# Chapter 6: Will It Blend?\n\nThis chapter served as an introduction to textures\
    \ and their uses. It covered basic texture theory, how texture coordinates are\
    \ expressed, how mipmaps can be used for greater fidelity, and how textures can\
    \ be filtered to smooth them out. The solar-system model was updated so that earth\
    \ now really looks like the earth using a texture map. In the next chapter, we’ll\
    \ continue with textures, putting to use the iPhone’s multiple texture units,\
