    of 1981\. Notice the streaks formed of icy particles while crossing the ring plane.
    Courtesy NASA.


    Figure 1-7\. Compare Figure 1-6, using some of the best graphics computers and
    software at the time, with a similar view of Saturn from Distant Suns 3 running
    on a $500 iPad.


    **Coming of Age in Hollywood**


    Computer graphics would really start to come into their own in the 1980s thanks
    both to Hollywood and to machines that were increasingly powerful while at the
    same time costing less. For example, the beloved Commodore Amiga that was introduced
    in 1985


    cost less than $2,000, and it brought to the consumer market an advanced multitasking
    operating system and color graphics that had been previously the domain of workstations
    costing upwards of $100,000\. See Figure 1-8.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 12](index-14_1.jpg)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **9**


    Figure 1-8\. Amiga 1000, circa 1985\. Photo by Kaivv, licensed under the Creative
    Commons Attribution 2.0 Generic license ( ***http://creativecommons.org/licenses/by/2.0/deed.en***).


    Compare this to the original black-and-white Mac that was released a scant 18
    months earlier for about the same cost. Coming with a very primitive OS, flat
    file system, and 1-bit display, it was fertile territory for the ‘‘religious wars’’
    that broke out between the various camps as to whose machine was better (wars
    that would also include the Atari ST).


    **Note** One of the special graphics modes on the original Amiga could compress
    4,096 colors into a system that would normally max out at 32\. Called Hold and
    Modify (HAM mode), it was originally included on one of the main chips for experimental
    reasons by designer Jay Miner.


    Although he wanted to remove the admitted kludge that produced images with a lot
    of color distortion, the results would have left a big empty spot on the chip.
    Considering that unused chip landscape was something no self-respecting engineer
    could tolerate, he left it in, and to Miner’s great surprise, people started using
    it.


    A company in Kansas called NewTek pioneered the use of Amigas for rendering high-quality
    3D graphics when coupled with its special hardware named the Video Toaster.


    Combined with a sophisticated 3D rendering software package called Lightwave 3D,
    NewTek opened up the realm of cheap, network-quality graphics to anyone who had
    a few thousand dollars to spend. This development opened the doors for elaborate
    science-fiction shows such as Babylon 5 or Seaquest to be financially feasible
    considering their extensive special effects needs.


    During the 1980s, many more techniques and innovations would work their way into
    common use in the CG community:


    [www.it-ebooks.info](http://www.it-ebooks.info)


