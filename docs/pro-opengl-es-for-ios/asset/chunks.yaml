  raw: 'To change the default blending, we must resort to using **glBlendFunc()**,
    which comes with two parameters. The first tells just what to do with the source,
    and the second specifies what to do with the destination. To picture what goes
    on, note that all that’s ultimately happening is that each of the RGBA source
    components is added, subtracted, or whatever, with each of the destination components.
    That is, the source’s red channel is mixed with the destination’s red channel,
    the source’s green is mixed with the destination’s green, and so on. This is usually
    expressed the following way: call the source RGBA values Rs, Gs, Bs, and As, and
    call the destination values Rd, Gd, Bd, and Ad. But we also need both source and
    destination blending factors, expressed as Sr, Sg, Sb, and Sa and Dr, Dg, Db,
    and Da. (It’s not as complicated as it seems, really.) And here’s the formula
    for the final composite color:


    ( *R*, *G*, *B*) = (( *Rs* * *Sr*) + ( *Rd* * *Dr*),( *Gs* * *Sg*) + ( *Gd* *
    *Dg*),( *Bs* * *Sb*) + ( *Bd* * *Db*)) In other words, multiply the source color
    by its blending factor and add it to the destination color multiplied by its blending
    factor.


    One of the most common forms of blending is to overlay a translucent face on top
    of stuff that has already been drawn-----that is, the destination. As before,
    that can be a simulated window pane, a heads-up display for a flight simulator,
    or other graphics that might just look nicer when mixed with the existing imagery.
    (The latter is used a lot in Distant Suns for a number of the elements such as
    the constellation names, the outlines, and so on.) Depending on the purpose, you
    may want the overlay to be nearly opaque, using an alpha approaching 1.0, or very
    tenuous, with an alpha approaching 0.0.


    In this basic blending task, the source’s colors are first multiplied by the alpha
    value, its blending factor. So if the source red is maxed out at 1.0 and the alpha
    is 0.75, the result is derived by simply multiplying 1.0 by 0.75\. The same would
    be used for both green and blue. On the other hand, the destination colors are
    multiplied by 1.0 minus the source’s alpha. Why? That effectively yields a composite
    color that can never exceed the maximum value of 1.0; otherwise, all sorts of
    color distortion could happen. Or imagine it this way: the source’s alpha value
    is the proportion of the color ‘‘width’’ of 1.0 that the source is permitted to
    fill. The leftover space then becomes 1.0 minus the source’s alpha. The larger
    the alpha, the greater the proportion of the source color that can be


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 176](index-175_1.jpg)


    **CHAPTER 6: Will It Blend?**


    **172**


    used, with an increasingly smaller proportion reserved for the destination color.
    So as the alpha approaches 1.0, the greater the amount of the source color that
    is copied to the frame buffer, replacing the destination color.


    **Note** In these examples, normalized color values are used because they make
    it much easier to follow the process instead of using unsigned bytes, which would
    express the colors from 0


    to 255.


    Now we can examine that in the next example. To set up the blending functions
    described earlier, you would use the following call:


    **glBlendFunc(GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA);**


    **GL_SRC_ALPHA** and **GL_ONE_MINUS_SRC_ALPHA** are the blending factors described
    earlier.


    And remember that the first parameter is the source’s blending, the object being
    written currently. Place that line immediately after where you enable blending.
    And to the red colors, compile and run. Do you see Figure 6-2?


    Figure 6-2\. The red square has an alpha of .5, and the blue has an alpha of 1.0.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 6: Will It Blend?**


    **173**


    So, what’s happening? The blue has an alpha of 1.0, so each blue fragment completely
    replaces anything in the background. Then the red with an alpha of .5 means that
