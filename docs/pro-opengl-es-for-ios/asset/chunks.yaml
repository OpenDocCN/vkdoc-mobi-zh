    \ 6 行设置模型视图的单位矩阵，然后在第 7 行调用`glTranslatef()`。\n\n第 8 行根据场景的视野确定如何缩放光晕集合，接着第 9 行执行实际的缩放。这是相对的，取决于你想要处理的放大范围。目前尚未实现捏合缩放，因此这个值保持不变。`zoomBias`影响所有元素，这使得一次性缩放所有内容变得容易。\n\
    \n第 10 行及之后的内容使用最常见的选项设置混合函数。这使得每个反射都以非常可信的方式混合，尤其是当它们开始在中心堆积时。\n\n现在设置颜色并绘制对象。\n\
    \n再次，做好“邻居”，弹出矩阵，以免影响其他任何内容。\n\n我为单个光晕创建了一个光晕对象，并创建了一个`LensFlare`父对象来处理向量的设置、包含每个单独的图像，并在准备就绪时放置它们。来自清单\
    \ 7-7 中`LensFlare.mm`的主循环此时应该几乎不需要解释。它只是计算光晕向量的起点，然后遍历数组以执行每个实体。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## 第 7 章：精心渲染的杂项\n\n**217**\n\n### 清单 7-7：整个镜头光晕效果的执行循环\n\n```\n-(void)execute:(CGRect)frame\
    \ source:(CGPoint)source\n{\n    CGPoint position;\n    NSEnumerator *e;\n   \
    \ Flare *object;\n\n    static GLfloat deltaX=40,deltaY=40;\n    static GLfloat\
    \ offsetFromCenterX,offsetFromCenterY;\n    static GLfloat startingOffsetFromCenterX,startingOffsetFromCenterY;\n\
    \n    int numElements;\n    GLfloat cx,cy;\n\n    static int counter=0;\n\n  \
    \  e=[m_Flares objectEnumerator];\n\n    cx=(frame.size.width/2.0);\n    cy=(frame.size.height/2.0);\n\
    \n    startingOffsetFromCenterX=cx-source.x;\n    startingOffsetFromCenterY=source.y-cy;\n\
    \n    offsetFromCenterX=startingOffsetFromCenterX;\n    offsetFromCenterY=startingOffsetFromCenterY;\n\
    \n    numElements=[m_Flares count];\n\n    deltaX=2.0*startingOffsetFromCenterX;\n\
    \    deltaY=2.0*startingOffsetFromCenterY;\n\n    while (object = [e nextObject])\n\
    \    {\n        position=CGPointMake(offsetFromCenterX,offsetFromCenterY);\n\n\
    \        [object renderFlareAt:position];\n\n        offsetFromCenterX-=deltaX*[object\
    \ getVectorPosition];\n        offsetFromCenterY-=deltaY*[object getVectorPosition];\n\
    \    }\n\n    counter++;\n}\n```\n\n最后，每个单独的光晕图像必须在初始化时加载并添加到`NSArray`中。代码如下：\n\
    \n```\n[m_Flares addObject:[[Flare alloc]init:@\"hexagon_blur.png\"\n    size:1.0\
    \ vectorPosition:(.05-ff) r:1.0 g:0.73 b:0.30 a:.4]];\n[m_Flares addObject:[[Flare\
    \ alloc]init:@\"glow.png\"\n    size:1.5 vectorPosition:(.055-ff) r:1.0 g:0.73\
    \ b:0.50 a:.4]];\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image\
    \ 219](img/index-221_1.jpg)\n\n## 第 7 章：精心渲染的杂项\n\n**218**\n\n这个演示有 24 个这样的对象。图\
    \ 7-6 显示了结果。\n\n### 图 7-6：简单的镜头光晕\n"
- fmt: "# 文档排版\n\nUnfortunately, there is one big gotcha in the lens flare biz. What\
    \ happens if your light source goes behind something else? If it is a regular\
    \ and known entity such as a round sphere in the center of the scene, it is pretty\
    \ easy to figure out. But if it is a random object at a random place, it becomes\
    \ much more difficult. Then what happens if the source is only partially eclipsed?\
    \ Reflections will then dim and flicker out only when the entire object is hidden.\
    \ The solution is left for you for the time being.\n\n## Stencils Reflective Surfaces\n\
    \nAnother effect that is rapidly becoming a bit of a visual cliché, albeit still\
    \ a cool one, is that of a mirrored surface underneath part or all of the scene.\
    \ We Mac-heads see that every time we look at the Dock, for example, with the\
    \ happy little icons dancing their jig-of-joy up and down, in effect saying “Look\
    \ here! look here!” in their little squeaky voices.\n\nUnderneath you will see\
    \ a faint little reflection. It’s the same for many third-party apps, of course,\
    \ led by Apple’s own designs and examples. See Figure 7-7.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 220](index-222_1.jpg)\n\n![Image 221](index-222_2.jpg)\n\n**CHAPTER\
    \ 7: Well-Rendered Miscellany**\n\n**219**\n\nFigure 7-7. Reflections in Distant\
    \ Suns. (Yes, it is a gratuitous plug.) Of course, Apple’s examples were implemented\
    \ in Core Graphics, but the principles are the same: it’s a big fat hack! But\
    \ so is most everything in graphics as we try to simulate the real world through\
    \ whatever means necessary, and making a reflective surface of this type is no\
    \ different.\n\nThis will introduce the next topic, which is about both stencils\
    \ and reflections. Besides the “color” buffer (that is, the image buffer) and\
    \ the depth buffer, OpenGL also has something called a stencil buffer.\n\nIn the\
    \ pre-iOS5 days, creating a stencil buffer required another dozen-or-so lines\
    \ of code. That has since been collapsed to only a single line, a mere trifle\
    \ of code. In your `viewDidLoad()`, when the context is created, add:\n\n```\n\
    view.drawableStencilFormat = GLKViewDrawableStencilFormat8;\n```\n\nThe stencil\
    \ format can be either 8 bits or none.\n\nNext let’s create the routines that\
    \ will generate the actual stencil. Add Listing 7-8 to your view controller, and\
    \ call `renderToStencil()` from your main draw loop.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**CHAPTER 7: Well-Rendered Miscellany**\n\n**220**\n\nEssentially, you render\
    \ something to the stencil buffer as you would to any other, but in this case,\
    \ any pixel and its value are used to determine how to render future images to\
    \ the screen. The most common case is that any later image drawn to the stencil\
    \ area will be rendered as it normally would, whereas anything outside of the\
    \ stencil area is not rendered. These behaviors can be modified, of course, keeping\
    \ with OpenGL’s philosophy of making everything more flexible than the vast majority\
    \ of engineers would use, let alone understand. Still, it can be very handy at\
    \ times. We’ll stay with the simple function for the time being.\n\nListing 7-8.\
    \ The stencil is generated like a normal screen object\n\n```\n- (void)renderToStencil\n\
    {\n    glEnable(GL_STENCIL_TEST);                              //1\n    glStencilFunc(GL_ALWAYS,\
    \ 1, 0xffffffff);                //2\n    glStencilOp(GL_REPLACE, GL_REPLACE,\
    \ GL_REPLACE);        //3\n    [self renderStage];                           \
    \           //4\n    glStencilFunc(GL_EQUAL, 1, 0xffffffff);                 //5\n\
    \    glStencilOp(GL_KEEP, GL_KEEP, GL_KEEP);                 //6\n}\n```\n\nSo,\
    \ you establish your stencil the following way:\n\nEnable the stencil as done\
    \ in line 1.\n\nHere in line 2 we specify the comparison function used whenever\
    \ something is writing to the stencil buffer. Since we clear it each time through,\
    \ it will be all zeros. The function `GL_ALWAYS` says that every write will pass\
    \ the stencil test, which is what we want when constructing the stencil. The value\
    \ of 1 is called the reference value.\n\nSince you can have any value from 0 to\
    \ 255, it is possible to have a stencil behave differently based on the reference\
    \ value supplied."
  raw: 'Unfortunately, there is one big gotcha in the lens flare biz. What happens
    if your light source goes behind something else? If it is a regular and known
    entity such as a round sphere in the center of the scene, it is pretty easy to
    figure out. But if it is a random object at a random place, it becomes much more
    difficult. Then what happens if the source is only partially eclipsed? Reflections
    will then dim and flicker out only when the entire object is hidden. The solution
    is left for you for the time being.


    **Stencils Reflective Surfaces**


    Another effect that is rapidly becoming a bit of a visual cliché, albeit still
    a cool one, is that of a mirrored surface underneath part or all of the scene.
    We Mac-heads see that every time we look at the Dock, for example, with the happy
    little icons dancing their jig-of-joy up and down, in effect saying ‘‘Look here!
    look here!’’ in their little squeaky voices.


    Underneath you will see a faint little reflection. It’s the same for many third-party
    apps, of course, led by Apple’s own designs and examples. See Figure 7-7.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 220](index-222_1.jpg)


    ![Image 221](index-222_2.jpg)


    **CHAPTER 7: Well-Rendered Miscellany**


    **219**


    Figure 7-7\. Reflections in Distant Suns. (Yes, it is a gratuitous plug.) Of course,
    Apple’s examples were implemented in Core Graphics, but the principles are the
    same: it’s a big fat hack! But so is most everything in graphics as we try to
    simulate the real world through whatever means necessary, and making a reflective
    surface of this type is no different.


    This will introduce the next topic, which is about both stencils and reflections.
    Besides the ‘‘color’’ buffer (that is, the image buffer) and the depth buffer,
    OpenGL also has something called a stencil buffer.


    In the pre-iOS5 days, creating a stencil buffer required another dozen-or-so lines
    of code. That has since been collapsed to only a single line, a mere trifle of
    code. In your viewDidLoad(), when the context is created, add:


    **view.drawableStencilFormat=GLKViewDrawableStencilFormat8;**


    The stencil format can be either 8 bits or none.


    Next let’s create the routines that will generate the actual stencil. Add Listing
    7-8 to your view controller, and call **renderToStencil()** from your main draw
    loop.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 7: Well-Rendered Miscellany**


    **220**


    Essentially, you render something to the stencil buffer as you would to any other,
    but in this case, any pixel and its value are used to determine how to render
    future images to the screen. The most common case is that any later image drawn
    to the stencil area will be rendered as it normally would, whereas anything outside
    of the stencil area is not rendered. These behaviors can be modified, of course,
    keeping with OpenGL’s philosophy of making everything more flexible than the vast
    majority of engineers would use, let alone understand. Still, it can be very handy
    at times. We’ll stay with the simple function for the time being.


    Listing 7-8\. The stencil is generated like a normal screen object


    **-(void)renderToStencil**


    **{**


    **glEnable(GL_STENCIL_TEST); //1**


    **glStencilFunc(GL_ALWAYS,1, 0xffffffff); //2**


    ****glStencilOp(GL_REPLACE, GL_REPLACE, GL_REPLACE); //3**


    ****[self renderStage]; //4**


    ****glStencilFunc(GL_EQUAL, 1, 0xffffffff); //5**


    **glStencilOp(GL_KEEP, GL_KEEP, GL_KEEP); //6**


    **}**


    So, you establish your stencil the following way:


    Enable the stencil as done in line 1.


    Here in line 2 we specify the comparison function used whenever


    something is writing to the stencil buffer. Since we clear it each time through,
    it will be all zeros. The function **GL_ALWAYS** says that every write will pass
    the stencil test, which is what we want when


    constructing the stencil. The value of 1 is called the reference value.


    Since you can have any value from 0 to 255, it is possible to have a


    stencil behave differently based on the reference value supplied and'
  trans: "\n# 文档排版\n\n遗憾的是，镜头光晕特效中存在一个重大难题。如果光源被其他物体遮挡会怎样？如果遮挡物是场景中央的一个规则球体等常见且已知的物体，处理起来相当简单。但若是随机位置上的随机物体，难度就会大大增加。那么，当光源仅被部分遮蔽时又该如何处理？只有在整个物体被完全隐藏时，反射效果才会变暗并逐渐消失。这个解决方案暂且留给你自行思考。\n\
    \n## 模板反射表面\n\n另一种正快速沦为视觉套路的特效（尽管仍然很酷），是在场景的部分或全部区域下方设置镜面反射表面。我们 Mac 用户每次看到 Dock\
    \ 栏时都会见到这种效果——那些快乐的小图标欢快地上下舞动，仿佛用尖细的声音喊着\"看这里！看这里！\"\n\n下方你会看到淡淡的倒影。当然，苹果的设计范例引领下，许多第三方应用也采用了相同效果。参见图\
    \ 7-7。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图 220](img/index-222_1.jpg)\n\
    \n![图 221](img/index-222_2.jpg)\n\n**第 7 章：精心渲染的杂项**\n\n**219**\n\n图 7-7. 遥远太阳中的倒影（没错，这是个免费的广告）。当然，苹果的示例是用\
    \ Core Graphics 实现的，但原理相同：这就是个投机取巧的方法！不过电脑图形学中大部分技术也是如此——我们试图通过一切必要手段模拟真实世界，制作这种反射表面也不例外。\n\
    \n这将引出下一个主题，涉及模板和反射两方面。除了\"颜色\"缓冲区（即图像缓冲区）和深度缓冲区外，OpenGL 还有一种称为模板缓冲区的机制。\n\n在\
    \ iOS5 之前的时代，创建模板缓冲区需要额外十几行代码。此后已简化为仅需一行代码，微不足道。在`viewDidLoad()`中创建上下文时，添加：\n\n\
    ```\nview.drawableStencilFormat = GLKViewDrawableStencilFormat8;\n```\n\n模板格式可以是\
    \ 8 位，也可以不使用。\n\n接下来创建生成实际模板的例程。将清单 7-8 添加到视图控制器中，并在主绘制循环中调用`renderToStencil()`。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 7 章：精心渲染的杂项**\n\n**220**\n\
    \n本质上，渲染模板缓冲区与其他缓冲区类似，但在此情况下，每个像素及其数值将用于决定后续图像如何渲染到屏幕上。最常见的情况是：后续绘制在模板区域内的图像会正常渲染，而模板区域外的则不会渲染。当然，这些行为可以修改，这符合\
    \ OpenGL\"让一切比绝大多数工程师会用（更别说理解）的配置更灵活\"的理念。尽管如此，它有时确实非常实用。目前我们仍使用简单功能。\n\n清单 7-8.\
    \ 模板像普通屏幕对象一样生成\n\n```\n- (void)renderToStencil\n{\n    glEnable(GL_STENCIL_TEST);\
    \                              //1\n    glStencilFunc(GL_ALWAYS, 1, 0xffffffff);\
    \                //2\n    glStencilOp(GL_REPLACE, GL_REPLACE, GL_REPLACE);   \
    \     //3\n    [self renderStage];                                      //4\n\
    \    glStencilFunc(GL_EQUAL, 1, 0xffffffff);                 //5\n    glStencilOp(GL_KEEP,\
    \ GL_KEEP, GL_KEEP);                 //6\n}\n```\n\n因此，按以下方式建立模板：\n\n如第 1 行所示启用模板。\n\
    \n第 2 行指定了向模板缓冲区写入时的比较函数。由于每次都会清除缓冲区，初始值全为零。函数`GL_ALWAYS`表示每次写入都会通过模板测试，这正是构建模板时所需的行为。值\
    \ 1 称为参考值。\n\n由于参考值取值范围为 0 到 255，可以根据提供的参考值让模板产生不同行为。\n"
- fmt: "# How the Stencil Op is Set\n\nThe final value is a mask for the bit planes\
    \ to access. Since we’re not concerned about it, let’s just turn them all on.\n\
    \nLine 3 specifies what to do when a stencil test succeeds or fails. The first\
    \ parameter pertains if the stencil test fails; the second, if the stencil passes\
    \ but the depth test fails; and the third, if both succeed. Since we are living\
    \ in 3D space here, having the stencil tests coupled to depth testing recognizes\
    \ that there may be situations in which one overrules the other. Some of the subtleties\
    \ in the use of the stencil buffer can get quite complicated. In this case, set\
    \ all three to `GL_REPLACE`. Table 7-1 shows all the other permissible values.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n## CHAPTER 7: Well-Rendered\
    \ Miscellany\n\n**221**\n\nLine 4 calls our rendering function, pretty much as\
    \ you would normally call it. In this case, it is writing both to the stencil\
    \ buffer and to one of the color channels at the same time, so we can get a glint\
    \ of sorts off of our new shiny stage or platform. Meanwhile, in the stencil buffer,\
    \ the background will remain zeros, while the image will produce stencil pixels\
    \ that are greater than 0, so it permits image data to write to it later.\n\n\
    Lines 5 and 6 prepare the buffer now for normal use. Line 5 says that if the value\
    \ in the currently addressed stencil pixel is 1, keep it unchanged as given in\
    \ line 6. Otherwise, pass the fragment through to be processed as if the stencil\
    \ buffer wasn’t there (although it may still be ignored if it fails the depth\
    \ test). So, any stencil pixel that is 0, the test will fail, and the incoming\
    \ fragment will be locked out.\n\n## Table 7-1. Possible values for `glStencilOp()`\n\
    \n| Op Type | Action |\n|---------|--------|\n| `GL_KEEP` | Keeps the current\
    \ value. |\n| `GL_ZERO` | Sets the stencil buffer value to 0. |\n| `GL_REPLACE`\
    \ | Sets the stencil buffer value to `ref`, as specified by `glStencilFunc`. |\n\
    | `GL_INCR` | Increments the current stencil buffer value. Clamps to the maximum\
    \ representable unsigned value. |\n| `GL_INCR_WRAP` | Increments the current stencil\
    \ buffer value. Wraps stencil buffer value to zero when incrementing the maximum\
    \ representable unsigned value. |\n| `GL_DECR` | Decrements the current stencil\
    \ buffer value. Clamps to 0. |\n| `GL_DECR_WRAP` | Decrements the current stencil\
    \ buffer value. Wraps stencil buffer value to the maximum representable unsigned\
    \ value when decrementing a stencil buffer value of zero. |\n| `GL_INVERT` | Bitwise\
    \ inverts the current stencil buffer value. |\n\nAs you can see, the stencil buffer\
    \ is a very powerful instrument with a lot of subtlety. But any more extravagant\
    \ use is reserved for future books as yet unnamed.\n\nNow it’s time for the `renderStage()`\
    \ method, as shown in Listing 7-9.\n\n## Listing 7-9. Rendering the reflective\
    \ area to the stencil buffer only\n\n```objc\n-(void)renderStage\n{\n    static\
    \ const GLfloat flatSquareVertices[] =\n    {\n        -0.5, 0.0, -.5f,\n    \
    \    0.5, 0.0, -.5f,\n        -0.5, 0.0, 0.5,\n        0.5, 0.0, 0.5\n    };\n\
    \n    static const GLubyte colors[] =\n    {\n        255, 0, 0, 128,\n      \
    \  255, 0, 0, 255,\n        0, 0, 0, 0,\n        128, 0, 0, 128\n    };\n\n  \
    \  glFrontFace(GL_CW);\n    glPushMatrix();\n    glTranslatef(0.0,-1.0,-3.0);\n\
    \    glScalef(2.5,1.5,2.0);\n\n    glVertexPointer(3, GL_FLOAT, 0, flatSquareVertices);\n\
    \    glEnableClientState(GL_VERTEX_ARRAY);\n\n    glColorPointer(4, GL_UNSIGNED_BYTE,\
    \ 0, colors);\n\n    glDepthMask(GL_FALSE); //1\n    glColorMask(GL_TRUE, GL_FALSE,\
    \ GL_FALSE, GL_TRUE); //2\n    glDrawArrays( GL_TRIANGLE_STRIP,0, 4); //3\n  \
    \  glColorMask(GL_TRUE, GL_TRUE, GL_TRUE, GL_TRUE); //4\n    glDepthMask(GL_TRUE);\
    \ //5\n\n    glPopMatrix();\n}\n```\n\nIn line 1, writing to the depth buffer\
    \ is disabled, and line 2 disables the green and blue color channels, so only\
    \ the red one will be used. That is how the reflected area gets its little red\
    \ highlight.\n\nNow we can draw the image to the stencil buffer in line 3.\n\n\
    Lines 4 and 5 reset the masks."
