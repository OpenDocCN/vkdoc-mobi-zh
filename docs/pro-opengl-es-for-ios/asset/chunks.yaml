    \ 2-3. Rotation around the point of origin followed by a translation (left) vs.\
    \ translation followed by rotation (right)\n\nSo, what does this have to do with\
    \ the 3D stuff? Simple! Most if not all of the principles can be applied to 3D\
    \ transformations and are more clearly illustrated with one less dimension.\n\n\
