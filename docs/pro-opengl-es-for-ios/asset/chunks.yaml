- fmt: "I started with the standard template and added support for touching and dragging\
    \ the visuals. Following that, the sun image is loaded at startup and is drawn\
    \ in `drawInRect()` at the current position of a user’s finger, as demonstrated\
    \ in Listing 7-5.\n\n**Listing 7-5\\. The top-level `drawInRect()`**\n\n```\n\
    - (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n{\n    GLfloat cx,cy;\n\
    \    CGPoint centerRelative;\n    CGRect frame = [[UIScreen mainScreen] bounds];\n\
    \    glClearColor(0.0, 0.0, 0.0, 1.0);\n    glClear(GL_COLOR_BUFFER_BIT);\n  \
    \  cx=(frame.size.width/2.0);\n    //1\n    cy=(frame.size.height/2.0);\n    centerRelative=CGPointMake(m_PointerLocation.x-cx,cy-m_PointerLocation.y);\n\
    \    //2\n    [[OpenGLCreateTexture getObject]renderTextureAt:centerRelative name:m_FlareSource\
    \ size:3.0 r:1.0 g:1.0 b:1.0 a:1.0];\n    //3\n    [m_LensFlare execute:[[UIScreen\
    \ mainScreen]applicationFrame] source:m_PointerLocation];\n}\n```\n\nI put the\
    \ helper routines for creating and rendering a texture on their own module, `renderTextureAt()`,\
    \ which is covered in Listing 7-6\\. However, there are three lines to take note\
    \ of:\n\n- Lines 1ff get the center of the screen and creates the information\
    \ needed to track the flare source (the sun) with the pointer.\n- In line 2, the\
    \ flare’s source object, usually the sun, is rendered.\n- Line 3 calls the helper\
    \ routine that draws our 2D sun graphic in the sky.\n\n**Listing 7-6\\. Rendering\
    \ a 2D texture**\n\n```\n-(void)renderTextureAt:(CGPoint)position name:(GLuint)name\
    \ size:(GLfloat)size r:(GLfloat)r g:(GLfloat)g b:(GLfloat)b a:(GLfloat)a; //1\n\
