  raw: 'Unfortunately, for all that OpenGL gives us, text support is not one of them.
    Thus, it is up to us, the long-suffering engineers, to implement our own text
    manager. There are three ways to do this. The first is to write text out as a
    collection of vectors, but that’s a poor solution because it looks terrible along
    with being a CPU hog. The second is to generate a texture for each text string,
    while the third is to generate a ‘‘font atlas’’ (also known as sprite sheets).
    Font atlases are used to contain multiple related images on a single bitmap, with
    each image plucked out as needed. For text, this would have all possible characters
    jammed together along with reference data specifying the location of each character.
    The second way, generating a texture, is easier to implement, but font atlases
    are far more flexible, because it will let you put up arbitrary lines of text.
    I vote for the easy one. With this in mind, I can introduce you to the **OpenGLText**
    manager in Listings 8-15a and 8-15b.


    [www.it-ebooks.info](http://www.it-ebooks.info)


