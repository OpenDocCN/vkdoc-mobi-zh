- fmt: "### Listing 10-11\\. The Fragment Shader for the Daylight Side of the Earth\n\
    \n```\nvarying lowp vec4 colorVarying; //1\n\nprecision mediump float;\n\nvarying\
    \ vec2 v_texCoord; //2\n\nuniform sampler2D s_texture; //3\n\nvoid main()\n{\n\
    \    gl_FragColor = texture2D( s_texture, v_texCoord )*colorVarying; //4\n}\n\
    ```\n\nYou can see how simple these are for such beautiful results:\n\n- Line\
    \ 1 picks up the varying variable, `colorVarying`, from the vertex shader.\n-\
    \ Line 2 does the same for the texture coordinates, followed by line 3 that has\
    \ the texture. The `sampler2D`, as shown in line 3, is a built-in uniform variable\
    \ that points out which texture unit is being used.\n- Finally, in line 4, the\
    \ built-in function `texture2D` extracts the value from the texture referenced\
    \ by `s_texture` at the coordinates of `v_texCoord`. That value is then multiplied\
    \ by `colorVarying`, the \"real\" color of the fragment. The less the `colorVarying`\
    \ is, the darker the color becomes.\n\nListing 10-12 shows how to do the night\
    \ side of the earth.\n\n### Listing 10-12\\. Rendering the Night Side\n\n```\n\
    varying lowp vec4 colorVarying;\n\nprecision mediump float;\n\nvarying vec2 v_texCoord;\n\
    \nuniform sampler2D s_texture;\n\nvoid main()\n{\n    vec4 newColor;\n\n    newColor=1.0-colorVarying;\
    \ //1\n\n    gl_FragColor = texture2D( s_texture, v_texCoord )*newColor; //2\n\
    }\n```\n\nHere in line 1, we’re merely taking the opposite of what was in the\
    \ day-side shader. As the color increases because of the sun, the dark-side texture\
    \ fades to nothing. This might be overkill, because the night-side texture would\
    \ be washed out by the other, but the lights are just a little too visible after\
    \ the terminator for my taste.\n\nThere’s one final thing to do, and that is to\
    \ modify your planet object so as to be drawable with a vertex array object. Yes,\
    \ it’s yet another interminable listing, as shown in Listing 10-13\\. The data\
    \ must first be packed into more efficient interleaved form, referenced in Chapter\
    \ 9\\. Afterward, a VAO is generated as a wrapper of sorts.\n\n### Listing 10-13\\\
    . Creating a VAO for the Planet\n\n```\n-(void)createInterleavedData\n{\n    int\
    \ i;\n    GLfloat *vtxPtr;\n    GLfloat *norPtr;\n    GLfloat *colPtr;\n    GLfloat\
    \ *textPtr;\n    int xyzSize;\n    int nxyzSize;\n    int rgbaSize;\n    int textSize;\n\
    \n    struct VAOInterleaved *startData;\n\n    int structSize=sizeof(struct VAOInterleaved);\n\
