    Consider this first example a cold frog, at least until Chapter 7 that is.


    **OpenGL Architecture**


    Now since we’ve analyzed to death a “simple” OpenGL program, let’s take a brief
    look at what goes on under the hood at the graphics pipeline.


    The term pipeline is commonly used to illustrate how a tightly bound sequence
    of events relate to each other, as illustrated in Figure 1-12. In the case of
    OpenGL ES, the process accepts a bunch of numbers in one end and outputs something
    really cool-looking at the other end, be it an image of the planet Saturn or the
    results of an MRI.


    Geometry and texture


    OpenGL application


    Lighting, transform, scale, etc


    Vertex data


    Clipping


    3D Geometry


    Projection


    “2D” Geometry


    Fragment


    Rasterization


    Fog and texture


    Per-fragment operations


    Stencil, alpha, z-tests, blending


    Framebuffer


    “Hey, that’s really cool!”


    Eyeballs


    Figure 1-12. Basic overview of the OpenGL ES 1.x pipeline


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **30**


    The first step is to take the data that describes some geometry along with information
    on how to handle lighting, colors, materials, and textures and send it into the
    pipeline.


    Next the data is moved and rotated, after which lighting on each object is calculated
    and stored. The scene—say, a solar-system model—must then be moved, rotated, and
    scaled based on the viewpoint you have set up. The viewpoint takes the form of
    a frustrum, a rectangular cone of sorts, which limits the scene to, ideally, a
    manageable level.


    Next the scene is clipped, meaning that only stuff that is likely to be visible
    is actually processed. All of the other stuff is culled out as early as possible
    and discarded. Much of the history of real-time graphics development has to do
    with object culling techniques, some of which are very complex.


    Let’s get back to the example of a solar system. If you are looking at the Earth
    and the Moon is behind your viewpoint, there is no need whatsoever to process
    the Moon data. The clipping level does just this, both on an object level on one
    end and on a vertex level on the other. Of course, if you can pre-cull objects
    on your own before submitting to the pipeline, so much the better. Perhaps the
    easiest is to simply tell whether an object is behind you, making it completely
    skippable. Culling can also take place if the object is just too far away to see
    or is completely obscured by other objects.


    The remaining objects are now projected against the “viewport,” a virtual display
    of sorts.


    At this point is where rasterization takes place. Rasterization breaks apart the
    image into fragments that are in effect single pixels. Fragments are pixels bundled
    with additional information such as texture and fog, in preparation for the next
    step.


    Now the fragments can have texture and fog effects applied to them. Additional
    culling can likewise take place if the fog might obscure the more distant fragments,
    for example.


    The final phase is where the surviving fragments are written to the frame buffer,
    but only if they satisfy some last-minute operations. Here is where the fragment’s
    alpha values are applied for translucency, along with depth tests to ensure that
    the closest fragments are drawn in front of further ones and stencil tests used
    to render to nonrectangular viewports.


    [www.it-ebooks.info](http://www.it-ebooks.info)'
