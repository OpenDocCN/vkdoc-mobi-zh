  trans: "\n# 第 9 章：性能与相关优化\n\n## 291\n\n`totalNormalBytes=numNormalElements*m_NumVertices*sizeof(GLfloat);`\
    \ `totalTexCoordinateBytes=numTextureCoordElements*m_NumVertices*sizeof(GLfloat);`\n\
    \n```\nmemcpy(vboBuffer,m_VertexData,totalXYZBytes); //6\n```\n\n```\nif(m_UseNormals)\n\
    {\n    vboBuffer += totalXYZBytes;\n    memcpy(vboBuffer,m_NormalData,totalNormalBytes);\n\
    }\n```\n\n```\nif(m_UseTexture)\n{\n    vboBuffer += totalNormalBytes;\n    memcpy(vboBuffer,m_TexCoordsData,totalTexCoordinateBytes);\n\
    }\n```\n\n```\nglUnmapBufferOES(GL_ARRAY_BUFFER); //7\n```\n\n```\nm_TotalXYZBytes=totalXYZBytes;\n\
    m_TotalNormalBytes=totalNormalBytes;\n}\n```\n\n以下是具体说明：\n\n首先，我们需要在第 1 行中为这个\
    \ VBO 生成一个名称，其方式与纹理类似。\n\n接下来，在第 2 行及后续行中统计每个顶点的大小。在本例中，一个顶点由坐标、纹理坐标和法向量（根据需要）的总和构成。然后将该总和乘以顶点总数。\n\
    \n第 3 行实际上是在 GPU 上分配内存。当你的对象不再需要时，可以通过调用`glDeleteBuffer()`来释放这块内存。最后一个参数是一个提示，告知驱动程序这些数据预计永远不会改变。如果你预期会更新数据，则应使用`GL_DYNAMIC_DRAW`。如果你发现两者之间没有任何变化，也不必惊讶，因为当前的驱动程序很可能直接忽略了该提示。\n\
    \n第 4 行开始将数据上传到缓存的过程。这可以通过两种方式实现：通过内存映射或直接上传。这里我们通过调用`glMapBufferOES()`来使用内存映射。该函数返回一个指针，指向应用程序地址空间内\
    \ GPU 数据存储中经过内存映射的部分。另一种方法使用更传统的`glBufferData()`。前者的优势在于，可以避免应用程序中因需要将多个组件合并成一个大数据块进行上传而产生的额外内存拷贝。\n\
    \n现在计算每种数据类型的总字节数。法线和 XYZ 坐标各自需要相同的内存，而我们仅使用 2D 纹理坐标。\n\n神奇之处始于第 6 行及后续行，只需使用`memcpy()`即可逐一复制各个缓冲区。\n\
    \n第 7 行中的`glUnmapBufferOES()`强制执行实际的拷贝操作。\n\n## 292\n\n那么，我们如何使用 VBO 呢？非常简单。请看清单\
    \ 9-2 中的`executeVBO()`方法。\n\n**清单 9-2. 使用 VBO 渲染行星**\n\n```\n-(bool)executeVBO\n\
    {\n    int i;\n    static int counter=0;\n\n    glBindBuffer(GL_ARRAY_BUFFER,\
    \ m_VBO_SphereDataName); //1\n\n    glMatrixMode(GL_MODELVIEW);\n\n    glDisable(GL_CULL_FACE);\
    \ //2\n    glEnable(GL_BLEND);\n    glEnable(GL_DEPTH_TEST);\n\n    glEnableClientState(GL_VERTEX_ARRAY);\
    \ //3\n\n    if(m_UseNormals)\n        glEnableClientState(GL_NORMAL_ARRAY);\n\
    \n    glVertexPointer(3,GL_FLOAT,0,(GLvoid*)(char*)0); //4\n    glNormalPointer(GL_FLOAT,0,(const\
    \ GLvoid*)(char*)(0+m_TotalXYZBytes));\n    glTexCoordPointer(2,GL_FLOAT,0,\n\
    \        (const GLvoid*)((char*)(m_TotalXYZBytes+m_TotalNormalBytes)));\n\n  \
    \  if(m_UseTexture)\n    {\n        if(m_TexCoordsData!=nil)\n        {\n    \
    \        glEnable(GL_TEXTURE_2D);\n            glEnableClientState(GL_TEXTURE_COORD_ARRAY);\n\
    \n            if(m_TextureID!=0)\n                glBindTexture(GL_TEXTURE_2D,\
    \ m_TextureID);\n\n        }\n    }\n    else\n        glDisableClientState(GL_TEXTURE_COORD_ARRAY);\n\
    \n    //5\n    glDrawArrays(GL_TRIANGLE_STRIP, 0, (m_Slices+1)*2*(m_Stacks-1)+2);\n\
    \n    glDisable(GL_BLEND);\n    glDisable(GL_TEXTURE_2D);\n\n    return true;\n\
    }\n```\n\n## 293\n\n渲染 VBO 相当直接，整个过程中只有一个地方让人稍感困惑。\n\n第 1 行将其绑定，方式与绑定纹理相同。这简单地使其成为当前正在使用的对象，直到绑定另一个对象或通过`glBindBuffer(GL_ARRAY_BUFFER,\
    \ 0);`将其解绑为止。\n"
- fmt: '# Face Culling and VBO Usage


    Face culling is disabled in line 2 for testing purposes, so we know all faces
    are being rendered and not just the front-facing ones.


    Lines 3ff enable the various data buffers as has been done in previous `execute()`
    methods.


    Lines 4ff are the different ones. When using VBOs, the various pointers to the
    data blocks are the offset from the first element, which always starts at “address”
    of zero instead one in the app’s own address space. So, the vertex pointer starts
    at address of 0, while the normals are right after the vertices, and the texture
    coordinates are right after the normals.


    The array is now drawn in line 5 just as before.


    When it comes to optimizing code, I am one who needs to be convinced that a specific
    trick will work. Otherwise, I might spend a lot of time doing something that increases
    the frame rate by .23 percent. A game programmer might find that a badge of honor,
    but I feel that it steals an optional new feature, or bug fix away from my users
    by diverting my attention on something that would never be noticed. So, I developed
    a simple test program to try the various techniques described here. The previous
    two listings are from that effort.


    Once you’re sure that the VBO operates as planned, have the program draw multiple
    earths on top of each other. The following lines will render 10 additional planets
    while rotating them at the same time:


    ```

    for(i=0;i<10;i++)

    {

    glTranslatef(0.0, 0.01, 0.0);

    glDrawArrays(GL_TRIANGLE_STRIP, 0, (m_Slices+1)*2*(m_Stacks-1)+2);

    }

    ```


    And generate the spheres with 200 stacks and 200 slices, giving them a total of
    80,400 vertices, which yields more than 2.5MB of data. I use the same instance,
    so I have to load the GPU only once at program startup. Without VBOs, the same
    model would be loaded 11 times. See Figure 9-1.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 255](index-297_1.jpg)


    ## CHAPTER 9: Performance ’n’ Stuff


    **294**


    Figure 9-1. Giant computer-generated sow bug. Or 11 planet earths stacked on top
    of each other.


    When it comes to testing the frame rate in examples like this, Apple has supplied
    an incredibly simple but powerful new tool with the iOS 5 dev install. Called
    OpenGL ES Performance Detective, as shown in Figure 9-2, it can link up to any
    of your apps on your device and give you the frame rate. If the rate is slow,
    it will analyze it for you and let you know whether it is an OpenGL issue and,
    if so, will recommend possible solutions.


    Using this tool, it told me that on my iPad 2 the example was running about 9.5
    frames per second (FPS) when not using VBOs but jumped almost 50 percent to 13.5
    FPS.


    Interestingly enough, there was virtually no detectable increase on my iPad 1,
    which hovered at only about 2.5 FPS, while on both an iPhone 3GS and iPhone 4,
    the VBO frame rate was just slightly less than when not using VBOs (2.0 vs. 2.3).
    The Performance Detective is telling me that the frame rate is the performance
    bottleneck, while suggesting that I limit the data.


    **Note** All of the devices, from the iPhone 3GS to the iPad 1, use the same GPU
    from Imagination Technologies, the PowerVR SGX-535, while the iPad 2 uses the
    dual-core SGX 545MP. So if your app’s limitation is OpenGL related, it would likely
    run about the same on any machine that uses the same GPUs.


    All of these tests are relative to each other, because the example is fully contrived
    and may not reflect your own situation.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 256](index-298_1.jpg)


    ![Image 257](index-298_2.jpg)


    ## CHAPTER 9: Performance ’n’ Stuff


    **295**


    Figure 9-2. Performance Detective


    ## Interleaved Data


    Another recommended trick is to use interleaved data as opposed to sequential
    arrays. Remember the example from Chapter 8 when creating the stellar importer?
    There’s not much difference here. You can take the individual buffers and weave
    them together so that each vertex’s data is in one contiguous structure, as shown
    in Figure 9-3.'
