    \ 年的经典著作《交互式计算机图形学原理》中，`z` 轴向上，`+y` 轴指向屏幕内部。在他的书中，微软飞行模拟器的创建者 Bruce Artwick 展示了位于视平面内的\
    \ `x` 和 `y` 轴，但 `+z` 轴指向屏幕 *内部*。而另一本书（听好了！）中，`z` 轴向上，`y` 轴向 *右*，`x` 轴朝向观察者。这简直该有法律来管管……。\n\
    \n图 2-4. z 轴指向观察者。\n\n首先，我们来看看三维变换。就像二维变换仅仅是将所需的增量加到原始位置一样，三维变换也是如此。描述该变换的矩阵如下所示：\n\
    \n```\n      ⎡ 1 0 0 0⎤            ⎡ x'⎤   ⎡ 1 0 0 0⎤⎡ x⎤\n      ⎢ 0 1 0 0⎥  \
    \          ⎢ y'⎥   ⎢ 0 1 0 0⎥⎢ y⎥\nT =   ⎢ 0 0 1 0⎥      so    ⎢ z'⎥ = ⎢ 0 0 1\
    \ 0⎥⎢ z⎥\n      ⎣ Tx Ty Tz 1⎦         ⎣ 1 ⎦   ⎣ Tx Ty Tz 1⎦⎣ 1⎦\n```\n\n当然，这将产生以下结果：\n\
    \n`x′ = x + Tx`, `y′ = y + Ty`, 和 `z′ = z + Tz`\n\n注意增加的 `1`；这与二维中的情况相同，因此我们的点位置现在以齐次形式表示。\n\
    \n那么，让我们来看看旋转。可以放心地假设，如果我们要绕 Z 轴旋转（图 2-5），方程将直接映射到二维版本。使用矩阵来表达，我们得到如下结果（注意新的标记法\
    \ `R(z,a)`，用于明确表示所操作的是哪个轴）。注意 `z` 保持不变，因为它乘以了 `1`：\n\n```\n           ⎡ cos(a)\
    \  -sin(a)  0 0⎤\n           ⎢ sin(a)   cos(a)  0 0⎥\nR(z, a) =  ⎢ 0        0\
    \       1 0⎥\n           ⎣ 0        0       0 1⎦\n```\n\n图 2-5. 绕 z 轴旋转\n\n这看起来几乎与它的二维版本完全相同，只是多了\
    \ `z′ = z`。但现在我们也可以绕 `x` 轴或 `y` 轴旋转。对于 `x` 轴，我们得到：\n\n```\n           ⎡ 1  0 \
    \       0       0⎤\n           ⎢ 0  cos(a)  -sin(a)  0⎥\nR(x, a) =  ⎢ 0  sin(a)\
    \   cos(a)  0⎥\n           ⎣ 0  0        0       1⎦\n```\n\n当然，对于 `y` 轴，我们得到：\n\
    \n```\n           ⎡  cos(a)  0  sin(a)  0⎤\n           ⎢  0       1  0       0⎥\n\
    R(y, a) =  ⎢ -sin(a)  0  cos(a)  0⎥\n           ⎣  0       0  0       1⎦\n```\n\
    \n但是，如果叠加多个变换呢？那就会变得非常复杂。幸运的是，你不必过于担心这一点，因为你可以让 OpenGL 来处理繁重的工作。这就是它的用途。\n\n假设我们想先绕\
    \ `y` 轴旋转，然后绕 `x` 轴，最后绕 `z` 轴旋转。得到的矩阵可能类似于下面这样（使用 `a` 表示绕 x 轴的旋转，`b` 表示绕 y 轴的旋转，`c`\
    \ 表示绕 z 轴的旋转）：\n\n```\n⎡ cos(b)cos(c)-sin(b)sin(a)sin(c)   -cos(b)sin(c)+sin(b)sin(a)cos(c)\
    \   sin(b)cos(a)  0⎤\n⎢ sin(c)cos(a)                       cos(c)cos(a)      \
    \               -sin(a)       0⎥\nR=⎢-sin(b)cos(c)+cos(b)sin(a)sin(c)   sin(c)sin(b)+cos(b)sin(a)cos(c)\
    \   cos(a)cos(b)  0⎥\n⎣ 0                                  0                 \
    \                0             1⎦\n```\n\n简单吧，嗯？难怪三维引擎作者的座右铭是优化、优化、再优化。事实上，在原始\
    \ Amiga 版 *Distant Suns* 中，我的部分内部循环需要用 68K 汇编语言来编写。并且注意，这甚至还没有包括缩放或平移。\n\n现在让我们进入本书的主题：所有这些都可以通过以下三行代码来完成：\n\
    \n```\nglRotatef(b,0.0,1.0,0.0);\nglRotatef(a,1.0,0.0,0.0);\nglRotatef(c,0.0,0.0,1.0);\n\
    ```\n"
- fmt: '**Note** There are many functions in OpenGL ES 1.1 that are not available
    in 2.0. The latter is oriented toward lower-level operations, sacrificing some
    of the ease-of-use utility routines for flexibility and control. The transformation
    functions have vanished, leaving it up to the developer to calculate their own
    matrices. Fortunately, there are a number of different libraries to mimic these
    operations. One such library was released by Apple’s introduction of iOS 5.


    Called the ES Framework API (and described in Apple’s official OpenGL ES 2.0 Programming
    Guide), it’s designed to ease the transition to OpenGL ES 2.0.


    When dealing with OpenGL, this particular matrix is called the Modelview because
    it is applied to anything that you draw, which are either models or lights. There
    are two other types that we’ll deal with a little later: the Projection and Texture
    matrices.


    It bears repeating that the actual order of the rotations is absolutely critical
    when trying to get this stuff to work. For example, a frequent task is to model
    an aircraft or spacecraft with a full six degrees of freedom: three translational
    components and three rotational components. The rotational parts are usually referred
    to as roll, pitch, and yaw (RPY). Roll would be rotations around the `z`-axis,
    pitch is around the `x` (in other words, aiming the nose up or down), and yaw
    is rotation around the `y`-axis, moving the nose left and right. Figure 2-6a,
    b, and c show this at work in the Apollo spacecraft from the moon landings in
    the 1960s. The proper sequence would be yaw, pitch, and roll, or rotation around
    `y`, `x`, and finally `z`. (This requires 12 multiplications and 6 additions,
    while premultiplying the three rotation matrices could reduce that down to 9 multiplications
    and 6 additions.) The transformations would be incremental, comprising the changes
    in the RPY angles since the last update, not the total ones from the beginning.
    In the good ol’ days, round-off errors could compound distorting the matrix, leading
    to very cool but otherwise unanticipated results (but still cool nonetheless).


    **ENGINE LOCATION**


    - ROLL

    - PITCH

    - ROLL

    - PITCH

    - ROLL

    - YAW

    - ROLL

    - YAW


    **ROTATION CONTROL**


    - YAW

    - PITCH


    **FLIGHT DIRECTOR ATTITUDE INDICATOR**


    - ROLL

    - PITCH & YAW


    **Picture This: Projecting the Object onto the Screen**


    Whew, even after all of that we’re not quite done yet. Once you have performed
    all the rotations, scaling, and translations of your objects, you still need to
    get them projected onto your screen. Converting a 3D scene onto a 2D surface has
    troubled mankind since he sketched the first mammoth on a cave wall. But it is
    actually quite easy to grasp, as opposed to transformations.


    There are two main kinds of projections at work here: perspective and parallel.'
