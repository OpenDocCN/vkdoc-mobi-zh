- fmt: "So, to create a matrix for translation, we need a third component for our\
    \ 2D point, commonly written as `(x,y,1)`, as is the case in the second expression.\
    \ Ignoring where the `1` comes from for a moment, notice that this can be easily\
    \ reduced to the following:  \n`x′ = x + Tx`, `y′ = y + Ty`.\n\nThe value of `1`\
    \ is not to be confused with a third dimension of `z`; rather, it is a means used\
    \ to express an equation of a line (in 2D space for this example) that is slightly\
    \ different from the slope/intercept we learned in grade school. A set of coordinates\
    \ in this form is called homogeneous coordinates, and in this case it helps to\
    \ create a 3x3 matrix that can now be combined or concatenated to other 3x3 matrices.\n\
    \nWhy would we want to do this? What if we wanted to do a rotation and translation\
    \ together? Two separate matrices could be used for each point, and that would\
    \ work just fine. But instead, we can precalculate a single matrix out of several\
    \ using matrix multiplication (also known as concatenation) that in turn represents\
    \ the cumulative effect of the individual transformations. Not only can this save\
    \ some space, but it can substantially increase performance.\n\nIn Core Animation\
    \ and Core Graphics, you will see a number of transformation methods with `affine`\
    \ in their names. You can think of those as transformations (in this case, 2D)\
    \ that can be decomposed into one or more of the following: rotation, translation,\
