  trans: "\n### 图 5-16\n当需要制作重复图案（如壁纸）时，重复图像是很方便的。\n\n现在，通过修改顶点几何体来扭曲纹理，为了让视觉效果更清晰，恢复原始纹理坐标以关闭重复模式：\n\
    \n```\nstatic const GLfloat squareVertices[] =\n{\n    -0.5f, -0.33f,\n     0.5f,\
    \ -0.15f,\n    -0.5f,  0.33f,\n     0.5f,  0.15f,\n};\n```\n\n这将会挤压正方形的右侧，并带动纹理一起变形，如图\
    \ 5-17 所示。\n\n![图 167](img/index-154_1.jpg)\n\n### 图 5-17\n挤压多边形的右侧。\n\n掌握了这些知识，如果你动态修改纹理坐标会发生什么？在\
    \ `drawInRect` 中添加以下代码——任意位置都可以：\n\n```\nstatic float texIncrease = 0.01;\n\n\
    textureCoords[0] += texIncrease;\ntextureCoords[2] += texIncrease;\ntextureCoords[4]\
    \ += texIncrease;\ntextureCoords[6] += texIncrease;\ntextureCoords[1] += texIncrease;\n\
    textureCoords[3] += texIncrease;\ntextureCoords[5] += texIncrease;\ntextureCoords[7]\
    \ += texIncrease;\n```\n\n这将使纹理坐标在每一帧中略微增加。运行它，你会惊叹不已。这是一个实现纹理动画的非常简单的小技巧。在 3D\
    \ 世界中，跑马灯效果可能会用到它。你可以创建一个类似电影胶片的纹理，其中包含一个卡通角色在做某个动作，然后通过修改`s`和`t`值，像翻页动画书一样在不同帧之间跳转。另一种用途是创建基于纹理的字体。由于\
    \ OpenGL 原生不支持字体，我们这些长期受苦的工程师们只能自己动手添加。唉。这可以通过将所需字体的字符排列到一个单一的拼图纹理上（称为“字体图集”），然后通过精心使用纹理坐标来选择它们来实现。\n\
    \n![图 168](img/index-155_1.jpg)\n\n### Mipmaps（多级纹理映射）\n\nMipmaps 是一种为给定纹理指定多个细节层级的方法。这可以带来两方面的好处：一方面可以平滑纹理对象在距离视点变化时的外观，另一方面可以在纹理对象距离较远时节省资源消耗。\n\
    \n例如，在《遥远的太阳》中，我可能为木星使用一个 1024×512 的纹理。但如果木星距离非常远，在屏幕上只有几个像素大，那么使用这么大的纹理既浪费内存也浪费\
    \ CPU 资源。这时 Mipmap 就能派上用场了。那么，什么是 Mipmap 呢？\n\nMipmap 一词源于拉丁短语“multum in parvo”（字面意思：“小中见大”），它是一族具有不同细节级别的纹理。你的原始图像可能边长为\
    \ 128，但作为 Mipmap 的一部分，它还会包含边长为 64、32、16、8、4、2 和 1 像素的纹理，如图 5-18 所示。\n\n### 图 5-18\n\
    头部模型 Hedly 的 Mipmap 版本。\n\n在 iOS5 中，开启 Mipmap 只需要在调用 `GLKTextureLoader:textureWithContentsOfFile()`\
    \ 时增加一个参数即可。因此，将选项字典替换为以下内容：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \    [NSNumber numberWithBool:YES], GLKTextureLoaderOriginBottomLeft,\n    [NSNumber\
