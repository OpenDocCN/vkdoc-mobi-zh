    \n在 Core Animation 和 Core Graphics 中，你会看到许多名称中包含 `affine` 的变换方法。你可以将这些方法视为变换（此处指二维变换），它们可以分解为以下一种或多种：旋转、平移、剪切和缩放。所有可能的二维仿射变换都可以表示为\
    \ `x′ = ax + cy + e` 和 `y′ = bx + dy + f`。这就构成了一个非常好的矩阵，一个非常可爱的矩阵：\n\n```\n  \
