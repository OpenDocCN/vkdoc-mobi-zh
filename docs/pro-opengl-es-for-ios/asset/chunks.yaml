    ## 小结


    在本章中，我们从生成一个 2D 正方形开始，将其转变为 3D 立方体，然后学习了如何旋转和平移它。我们还学习了视锥体，以及如何利用它来剔除物体并缩放场景。最后，我们构建了一个更复杂的物体，它将成为太阳系模型的根基。下一章将涵盖着色、光照和材质，并添加第二个物体。


