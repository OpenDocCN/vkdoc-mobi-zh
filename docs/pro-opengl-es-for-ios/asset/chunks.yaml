  trans: "\n第 4 行在此处与其他地方相同；它只是将平台旋转到世界空间。\n\n第 5 行执行实际的缩放操作；请将其作为第一个要执行的变换。（记住，变换栈可以被视为一个\
    \ FIFO：第一个入栈的变换最先被执行。如果缩放位于其他变换之后，它会将物体绕偏离预期结果的中心进行缩放。）\n\n图 7-12：平台与阴影之间的 Z 缓冲区冲突\n\
    \n现在我们来处理真正有趣的部分——实际计算和绘制阴影。清单 7-15 展示了矩阵的生成方式，而清单 7-16 则绘制了被压扁的阴影。\n\n清单 7-15：计算阴影矩阵\n\
    \n```\n-(void)calculateShadowMatrix\n{\n    GLfloat shadowMat_local[16] =\n  \
    \  {\n        iLightPosY, 0.0, 0.0, 0.0,\n        -iLightPosX, 0.0, -iLightPosZ,\
    \ -1.0,\n        0.0, 0.0, iLightPosY, 0.0,\n        0.0, 0.0, 0.0, iLightPosY\n\
    \    };\n\n    for ( int i=0;i<16;i++ )\n    {\n        iShadowMat[i] = shadowMat_local[i];\n\
    \    }\n}\n```\n\n这实际上是以下更通用矩阵的简化版本：\n\n```\n[ dotp-l[0]*p[0], -l[1]*p[0], -l[2]*p[0],\
    \ -l[3]*p[0],\n  -l[0]*p[1], dotp-l[1]*p[1], -l[2]*p[1], -l[3]*p[1],\n  -l[0]*p[2],\
    \ -l[1]*p[2], dotp-l[2]*p[2], -l[3]*p[2],\n  -l[0]*p[3], -l[1]*p[3], -l[2]*p[3],\
    \ dotp-l[3]*p[3] ]\n```\n\n其中 `dotp` 是光线向量与平面法线的点积，`l` 是光的位置，`p` 是平面（在我的代码中即“平台”）。由于我们的平台位于`x/z`平面，平面方程表示为\
    \ `p=[0,1,0,0]`，即 `p[0]=p[2]=p[3]=0`。这意味着矩阵中的大多数项都会被清零。一旦矩阵生成，将其乘以当前的模型视图矩阵，就可以将点映射到您的局部空间以及其他所有内容。\n\
    \n清单 7-16：调整后的 `drawShadow()` 例程\n\n```\n- (void)drawShadow\n{\n    glPushMatrix();\n\
    \n    glRotatef(m_WorldRotationX, 1.0, 0.0, 0.0); //1\n    glRotatef(m_WorldRotationY,\
    \ 0.0, 1.0, 0.0);\n\n    glMultMatrixf( iShadowMat ); //2\n\n    //Place the shadows.\n\
    \    glTranslatef(0.0,m_TransY, 0.0); //3\n    glRotatef( m_SpinZ, 0.0, 0.0, 1.0\
    \ ); //4\n    glRotatef( m_SpinY, 0.0, 1.0, 0.0 );\n    glRotatef( m_SpinX, 1.0,\
    \ 0.0, 0.0 );\n\n    //Draw them.\n    glDisableClientState(GL_COLOR_ARRAY);\n\
    \    glEnable(GL_BLEND); //5\n    glBlendFunc(GL_ZERO,GL_ONE_MINUS_SRC_ALPHA);\n\
    \n    glColor4f( 0.0, 0.0, 0.0, .3 ); //6\n    glEnableClientState(GL_VERTEX_ARRAY);\n\
    \    glVertexPointer( 3, GL_FLOAT, 0, m_CubeVertices ); //7\n\n    glDrawElements(\
    \ GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, m_Tfan1);\n    glDrawElements( GL_TRIANGLE_FAN,\
    \ 6 * 3, GL_UNSIGNED_BYTE, m_Tfan2);\n\n    // glLineWidth(3.0); //8\n    // glDrawElements(\
    \ GL_LINES, 6 * 3, GL_UNSIGNED_BYTE, m_Tfan1);\n    // glDrawElements( GL_LINES,\
    \ 6 * 3, GL_UNSIGNED_BYTE, m_Tfan2);\n    glDisable(GL_BLEND);\n\n    glPopMatrix();\n\
    }\n```\n\n首先，像之前在第 1 行中一样，将所有内容旋转到世界空间。\n\n第 2 行将阴影矩阵与当前的模型视图矩阵相乘。\n\n第 3 行和第\
