  trans: '

    **注意** OpenGL ES 1.1 中有许多函数在 2.0 版本中不可用。后者面向底层操作，牺牲了一些易用性工具函数，以换取灵活性和控制力。变换函数已消失，开发者需要自行计算矩阵。幸运的是，有许多不同的库可以模拟这些操作。苹果在
    iOS 5 的发布中推出了这样一个库。


    该库称为 ES 框架 API（在苹果官方的《OpenGL ES 2.0 编程指南》中有描述），旨在简化向 OpenGL ES 2.0 的过渡。


    在 OpenGL 中，这个特定的矩阵被称为模型视图矩阵，因为它应用于你所绘制的任何对象（无论是模型还是光源）。稍后我们还会处理另外两种矩阵：投影矩阵和纹理矩阵。


    需要强调的是，在尝试实现这些效果时，旋转的实际顺序绝对至关重要。例如，一个常见的任务是模拟具有完整六自由度的飞机或航天器：三个平移分量和三个旋转分量。旋转部分通常称为滚转、俯仰和偏航（RPY）。滚转是围绕`z`轴旋转，俯仰是围绕`x`轴旋转（即控制机头向上或向下），偏航是围绕`y`轴旋转，使机头左右移动。图
    2-6a、b 和 c 展示了 20 世纪 60 年代登月任务中阿波罗飞船上的这一过程。正确的顺序应是偏航、俯仰、滚转，即先绕`y`轴旋转，再绕`x`轴旋转，最后绕`z`轴旋转。（这需要
    12 次乘法和 6 次加法，而将三个旋转矩阵预先相乘可减少到 9 次乘法和 6 次加法。）变换应是增量式的，只包含自上次更新以来 RPY 角度的变化，而非从头开始的全部变化。在那些美好的旧时光里，舍入误差可能会累积并扭曲矩阵，导致非常酷但出乎意料的结果（不过仍然很酷）。


    **引擎位置**


    -   滚转

    -   俯仰

    -   滚转

    -   俯仰

    -   滚转

    -   偏航

    -   滚转

    -   偏航


    **旋转控制**


    -   偏航

    -   俯仰


    **飞行指引仪姿态指示器**


    -   滚转

    -   俯仰和偏航


    **想象一下：将物体投影到屏幕上**


    哎呀，即使经历了以上所有步骤，我们还没完。在完成所有对象的旋转、缩放和平移后，还需要将它们投影到屏幕上。自从人类在洞穴墙壁上画出第一头猛犸象以来，将 3D
    场景转换为 2D 表面就一直困扰着他们。但与变换不同，这其实很容易理解。


    这里涉及两种主要的投影：透视投影和平行投影。

