    \ packed binary file, which is nice for my 300,000-star database.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**CHAPTER 8: Putting It All Together** 276\n\nIn line 1 of Listing 8-13a, we\
    \ define a structure for each star. Its position is in rectangular coordinates\
    \ since that is what OpenGL expects, followed by a magnitude, colors, and something\
    \ called the `hdnum`. The magnitude value in this structure is normalized and\
    \ used in the RGBA fields. Because stars can actually be different colors—red\
    \ giants and yellow dwarfs, for example—these values could encode their true shades\
    \ were we going to do that.\n\nThe `hdnum` is the identifier for stars in the\
    \ \"Henry Draper Catalog,\" which covers most stars down to about magnitude 10.\
    \ As with the colors, it is not used here except for possible testing and debugging.\n\
    \nNext we jump to Listing 8-13b where we read in the data from the plist in line\
    \ 2.\n\nLines 3ff fetch the locations of each star and, using a helper function\
    \ (Listing 8-14), convert the spherical coordinates to rectangular.\n\nLine 4\
    \ and the following lines take in the actual magnitude value and convert it to\
    \ a normalized shade of gray, clamping the values from .2 to 1.0 and ensuring\
    \ that the dimmest stars will still be visible.\n\nNow on to the `execute` method\
    \ where lines 5ff disable stuff that might otherwise interfere with our renderings.\
    \ The depth test is turned off to minimize interference of the points with the\
    \ constellation outlines. We could have left z-buffering on and drawn the constellations\
    \ lines a little bit behind the stars but at a slight loss of performance.\n\n\
