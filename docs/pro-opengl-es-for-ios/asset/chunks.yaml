    \ Everything You Ever Saw）。\n\n特纳·惠特德开发了一种名为光线追踪的技术，能够生成高度逼真的场景（但会消耗大量 CPU 资源），尤其是当场景中包含具有各种反射和折射属性的物体时。玻璃物品是早期光线追踪作品中常见的主题，如图\
    \ 1-9 所示。\n\n弗兰克·克劳发明了计算机图形学中首个实用的抗锯齿方法。锯齿现象是由于显示分辨率较低而产生的边缘锯齿状效应。克劳的方法能够平滑从线条到文字的所有元素，生成更自然、更悦目的图像。请注意，卢卡斯影业的早期游戏之一名为\
    \ `Rescue on Fractalus`。其中的反派被称为“锯齿怪”（jaggies，也是抗锯齿的另一个术语）。\n\n《星际迷航 2：可汗之怒》带来了首个完全由计算机生成的场景序列，用于展示一种名为“创世机器”的设备如何能在无生命星球上创造生命。该模拟被称为“永不消逝的特效”，因为它采用了火焰和粒子动画方面的开创性技术，同时使用了分形地形。\n\
    \n图 1-9. 像这样的精美图像，业余爱好者使用诸如开源软件 POV-Ray 等程序也能制作出来。摄影：Gilles Tran，2006 年。  \nwww.it-ebooks.info\n\
    \n## 第 1 章：计算机图形学：从过去到现在\n\n20 世纪 90 年代带来了《终结者 2：审判日》中的 T1000“液态金属”终结者、首部完全由计算机生成的长篇动画电影《玩具总动员》、《侏罗纪公园》中逼真的恐龙动画，以及詹姆斯·卡梅隆的《泰坦尼克号》，所有这些都帮助巩固了\
    \ CG 作为好莱坞导演工具箱中常用工具的地位。\n\n到 90 年代末，几乎很难找到哪部电影在制作过程中没有使用计算机图形学——无论是用于实际效果，还是后期制作中帮助清理各种场景。新技术仍在不断开发中，并以更加壮观的方式得到应用，例如迪士尼精彩的《飞屋环游记》或詹姆斯·卡梅隆绝美的《阿凡达》。\n\
    \n现在，再次拿出你的 i 设备，意识到它是一个多么小巧的技术奇迹吧。请随意用低沉而充满敬意的语气说出“哇”。\n\n## 工具包\n\n如果没有软件，前面提到的所有\
    \ 3D 魔法都不可能实现。许多 CG 软件程序高度专业化，而其他一些则更为通用，例如本书的重点 `OpenGL ES`。那么，以下是众多可用工具包中的几个。\n\
    \n### OpenGL\n\n开放图形库（`OpenGL`）源于高端图形工作站和大型机制造商 `SGI` 的开创性努力。其专有的图形框架 `IRIS-GL`\
    \ 已发展成为整个行业的事实标准。为了在竞争加剧时留住客户，`SGI` 选择将 `IRIS-GL` 转变为开放框架，以巩固其作为行业领导者的声誉。`IRIS-GL`\
    \ 被剥离了非图形相关功能和硬件相关特性，更名为 `OpenGL`，并于 1992 年初发布。截至撰写本文时，4.1 版本是最新版本。\n\n随着小型手持设备变得越来越普遍，`OpenGL\
    \ for Embedded Systems`（`OpenGL ES`，嵌入式系统开放图形库）被开发出来，它是桌面版的一个精简版本。它移除许多更冗余的 `API`\
    \ 调用，同时简化了其他元素，使其能够在低功耗 CPU 上高效运行。因此，它已被广泛采用于众多平台，如 Android、iOS、任天堂 3DS 和黑莓（操作系统\
    \ 5.0 及以上版本）。\n\n`OpenGL ES` 主要分为两个版本：1.x 和 2.x。许多设备同时支持两者。1.x 是基于原始 `OpenGL`\
    \ 规范的高级变体。2.x 版本（是的，我知道这容易混淆）则针对可以通过可编程图形硬件处理的更专门化的渲染任务。\n\n### Direct3D\n\n"
- fmt: '# Direct3D


    `Direct3D` (`D3D`) is Microsoft’s answer to `OpenGL` and is heavily oriented toward
    game developers. In 1995, Microsoft bought a small company called RenderMorphics
    that specialized in creating a 3D framework named `RealityLab` for writing games.
    `RealityLab` was turned into `Direct3D` and first released in the summer of 1996.
    Even though it was proprietary to Windows-based systems, it has a huge user base
    across all of Microsoft’s platforms: Windows, Windows 7 Mobile, and even Xbox.
    There are constant ongoing debates between the `OpenGL` and `Direct3D` camps as
    to which is more powerful, flexible, and easier to use. Other factors include
    how quickly hardware manufacturers can update their drivers to support new features,
    ease of understanding (`Direct3D` uses Microsoft’s `COM` interface that can be
    very confusing for newcomers), stability, and industry support.


    ## The Other Guys


    While `OpenGL` and `Direct3D` remain at the top of the heap when it comes to both
    adoption and features, the graphics landscape is littered with numerous other
    frameworks, many which are supported on today’s devices.


    In the computer graphics world, graphics libraries come in two very broad flavors:
    low-level rendering mechanisms represented by `OpenGL` and `Direct3D` and high-level
    systems typically found in game engines that concentrate on resource management
    with special extras that extend to common gameplay elements (sound, networking,
    scoring, and so on). The latter are usually built on top of one of the former
    for the 3D portion. And if done well, the higher-level systems might even be abstracted
    enough to make it possible to work with both `GL` and `D3D`.


    ## QuickDraw 3D


    An example of a higher-level general-purpose library is `QuickDraw 3D` (`QD3D`).
    A 3D sibling to Apple’s 2D `QuickDraw` (used in pre-OS-X days), `QD3D` had an
    elegant means of generating and linking objects in an easy-to-understand hierarchical
    fashion (a scene-graph). It likewise had its own file format for loading 3D models
    and a standard viewer and was platform independent. The higher-level part of `QD3D`
    would calculate the scene and determine how each object and, in turn, each piece
    of each object would be shown on a 2D drawing surface. Underneath `QD3D` there
    was a very thin layer called `RAVE` that would handle device-specific rendering
    of these bits.


    Users could go with the standard version of `RAVE`, which would render the scene
    as expected. But more ambitious users could write their own that would display
    the scene in a more artistic fashion. For example, one company generated the `RAVE`
    output so as to look like their objects were hand-painted on the side of a cave.
    It was very cool when you could take this modern version of a cave drawing and
    spin it around. The plug-in architecture also made `QD3D` highly portable to other
    machines. When potential users balked at using `QD3D` since it had no hardware
    solution on PCs, a version of `RAVE` was produced that would use the hardware
    acceleration available for `Direct3D` by actually using its competitor as its
    rasterizer. Sadly, `QD3D` was almost immediately killed on the second coming of
    Steve Jobs, who determined that `OpenGL` should be the 3D standard for Macs in
    the future. This was an odd statement because `QD3D` was not a competitor to the
    other but an add-on that made the lives of programmers much easier. After Jobs
    refused requests to make `QD3D` open source, the Quesa project was formed to re-create
    as much as possible the original library, which is still being supported at the
    time of this writing. And to nobody’s surprise, Quesa uses `OpenGL` as its rendering
    engine.


    A disclaimer here: I wrote the `RAVE`/`Direct3D` layer of `QD3D` only to have
    the project canceled a few days after going “gold master” (ready to ship).


    ## OGRE


    Another scene-graph system is Object-oriented Rendering Engine (`OGRE`). First
    released in 2005, `OGRE` can use both `OpenGL` and `Direct3D` as the low-level
    rasterizing solution, while offering users a stable and free toolkit used in many
    commercial products. The size of the user community is impressive. A quick peek
    at the forums shows more than 6,500 topics in the General Discussion section alone
    at the time of this writing.


    ## OpenSceneGraph


    Recently released for iOS devices, `OpenSceneGraph` does roughly what `QuickDraw
    3D` did, by providing a means of creating your objects on a higher level, linking
    them together, and performing scene management duties and extra effects above
    the `OpenGL` layer. Other features include importing multiple file formats, text
    support, particle effects (used for sparks, flames, or clouds), and the ability
    to display video content in your 3D applications. Knowledge of `OpenGL` is highly
    recommended, because many of the `OSG` functions are merely thin wrappers to their
    `OpenGL` counterparts.


    ## Unity3D


    Unlike `OGRE`, `QD3D`, or `OpenSceneGraph`, `Unity3D` is a full-fledged game engine.
    The difference lies in the scope of the product. Whereas the first two concentrated
    on creating a more abstract wrapper around `OpenGL`, game engines go several steps
    further, supplying most if not all of the other supporting functionality that
    games would typically need such as sound, scripting, networked extensions, physics,
    user interface, and score-keeping modules. In addition, a good engine will likely
    have tools to help generate the assets and be platform independent.


    `Unity3D` has all of these so would be overkill for many smaller projects. Also,
    being a commercial product, the source is not available, and it is not free to
    use, costing a modest amount (compared to other products in the past that could
    charge $100,000 or more).


    ## And Still Others


    Let’s not ignore `A6`, `Adventure Game Studio`, `C4`, `Cinder`, `Cocos3d`, `Crystal
    Space`, `VTK`, `Coin3D`, `SDL`, `QT`, `Delta3D`, `Glint3D`, `Esenthel`, `FlatRedBall`,
    `Horde3D`, `Irrlicht`, `Leadwerks3D`, `Lightfeather`, `Raydium`, `Panda3D` (from
    Disney Studios and CMU), `Torque` (available for iOS), and many others. Although
    they’re powerful, one drawback of using game engines is that more often than not,
    your world is executed in their environment. So if you need a specific subtle
    behavior that is unavailable, you may be out of luck. That brings me back to the
    topic of this book.


    ## Back to the Waltz of the Two Cubes


    Up through iOS4, Apple saw `OpenGL` as more of a general-purpose framework. But
    starting with iOS5, they wanted to emphasize it as a perfect environment for game
    development. That is why, for example, the project icon in the wizard is titled
    “OpenGL Game,” where previously it was “OpenGL ES Application.” That also explains
    why the example exercise pushes the better-performing—but considerably more cumbersome—`OpenGL
    ES 2` environment, while ignoring the easier version that is the subject of this
    book.


    **Note** Also starting with iOS5, Apple has added a number of special helper-objects
    in their new `GLKit` framework that take over some of the common duties developers
    had to do themselves early on. These tasks include image loading, 3D-oriented
    math operations, creating a special `OpenGL` view, and managing special effects.


    With that in mind, I’ll step into 2.0-land every once in a while, such as via
    the example app described below, because that’s all we have for now. Detailed
    discussions of 2.0 will be reserved for the last chapter, because it really is
    a fairly advanced topic for the scope of this book.


    ## A Closer Look


    The wizard produces six main files not including those of the plist and storyboards.
    Of these, there are the two for the view controller, two for the application delegate,
    and two mysterious looking things called `shader.fsh` and `shader.vsh`.'
