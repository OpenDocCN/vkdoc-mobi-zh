    chip, while the later ones use the more powerful PowerVR SGX GPU. The advantage
    of the later ones is that it can accept highly compressed textures in their own
    format and display them on the fly. This can save substantial memory while increasing
    framerate, by compressing textures down as small as 1/16th uncompressed size.


    Of course, this comes with one main caveat: images must have a square power-of-two
    (POT) form. The compression works best on photographic type of images as opposed
    to contrasty graphics.'
  trans: '

    # 纹理采样与过滤


    **点采样**（在 OpenGL 术语中称为 `GL_NEAREST`）：像素的颜色基于离像素中心最近的纹素。这是最简单、最快的方式，自然产生的图像效果最差。


    **双线性采样**（通常简称为线性）：像素的颜色基于离像素中心最近的 2x2 纹素阵列的加权平均值。这可以显著平滑图像。


    **三线性采样**：需要 `mipmap`，并取最接近屏幕最终渲染的两个 `mipmap` 层级，对每个层级执行双线性采样，然后对这两个值进行加权平均。


    你在前面的练习中看到的就是三线性采样，它显著提升了感知到的图像质量。


    图 5-20a 展示了关闭过滤时 Hedly 的近距离特写，而图 5-20b 则展示了开启过滤后的效果。如果你回头查看 `mipmap` 代码，会发现两张图像实际上都使用了过滤。顶部有闪烁效果的那张使用了
    `GL_LINEAR` 和 `GL_NEAREST` 过滤。底部的那张做了同样的事情，但额外使用了 `mipmap` 提供的信息。纯粹为了好玩，你可能想对比一下其他设置。例如，哪个更好：`GL_NEAREST`
    还是 `GL_LINEAR`？


    随着视网膜级别显示屏的普及，过滤可能最终会像 8 位着色一样成为历史。


    还有一点：如果你非常仔细地观察底部图像，可能会看到它切换到另一种纹理尺寸。这很微妙，但确实存在。


    ![图 5-20 关闭所有过滤（左），开启双线性过滤（右）](img/index-160_2.jpg)


    ## OpenGL 扩展与 PVRTC 压缩


    尽管 OpenGL 是一个标准，但它在设计时就考虑到了可扩展性，允许各种硬件制造商通过扩展字符串为 3D 领域添加自己的独门绝技。在 OpenGL 中，开发者可以查询可用的扩展，并在它们存在时使用。要查看这一点，请使用以下代码行：


    ```

    char *extensionList = glGetString(GL_EXTENSIONS);

    ```


    这将返回一个以空格分隔的列表，列出 iOS 中 OpenGL ES 的各种额外选项，看起来类似这样（来自 iOS 4.3）：


    ```

    GL_OES_blend_equation_separate GL_OES_blend_func_separate GL_OES_blend_subtract
    GL_OES_compressed_paletted_texture GL_OES_depth24 GL_OES_draw_texture GL_OES_fbo_render_mipmap
    GL_OES_framebuffer_object GL_OES_mapbuffer GL_OES_matrix_palette GL_OES_packed_depth_stencil
    GL_OES_point_size_array GL_OES_point_sprite GL_OES_read_format GL_OES_rgb8_rgba8
    GL_OES_stencil_wrap GL_OES_stencil8 GL_OES_texture_mirrored_repeat GL_OES_vertex_array_object
    GL_EXT_blend_minmax GL_EXT_discard_framebuffer GL_EXT_read_format_bgra GL_EXT_texture_filter_anisotropic
    GL_EXT_texture_lod_bias GL_APPLE_framebuffer_multisample GL_APPLE_texture_2D_limited_npot
    GL_APPLE_texture_format_BGRA8888 GL_APPLE_texture_max_level GL_IMG_read_format
    GL_IMG_texture_compression_pvrtc

    ```


    最后一行加粗的部分指出，iOS 可以处理一种名为 PVRTC 的特殊压缩纹理格式，该格式由 iOS 设备中的图形处理单元（GPU）品牌使用。前两代 iPhone
    和 iPod/Touch 使用的是 PowerVR MBX 芯片，而较新的型号则使用更强大的 PowerVR SGX GPU。后者的优势在于，它可以接受以其自身格式高度压缩的纹理，并在飞行中进行显示。这可以将纹理压缩到未压缩大小的
    1/16，从而在节省大量内存的同时提高帧率。


    当然，这有一个主要限制：图像必须是正方形且为 2 的幂次（POT）形式。这种压缩在照片类图像上效果最佳，而在对比度强的图形上效果较差。

    '
- fmt: "**Note** Another interesting extra feature is found in the string `GL_APPLE_texture_`\
    \ `2D_limited_npot GL`. NPOT means “nonpower-of-two.” Remember that more recent\
    \ versions of iOS can use NPOT images? So if you have reason to use an NPOT image,\
    \ check the extensions beforehand and handle the results accordingly.\n\nHere\
    \ we’re going to generate and import a PVRTC. First you will have to compress\
    \ your existing files down to the PVR format using a nice little tool that Imagination\
    \ Technologies, the manufacturer of the PowerVR graphics chips, used in all iOS\
    \ devices. You can fetch it at `www.imgtec.com`. Look for PowerVR Insider Utilities\
    \ under the developer’s section. It is called `PVRTexTool`.\n\n**Note** Apple\
    \ also supplies a texture convertor called `texturetool`. While it is only a command-line\
    \ based tool, it is very powerful in its own right and could be used to handle\
    \ large batch jobs if you had a lot of files to compress at once.\n\nDo not be\
    \ alarmed when you launch it! It might look like Windows NT, but there is nothing\
    \ wrong with your picture. It actually uses the X11 windowing platform that makes\
    \ it usable across many different operation systems.\n\nTo convert a texture to\
    \ PVRTC, simply load it into the editor, and select the Encode Current Texture\
    \ button. That will open up a new dialog that will let you select which 3D platform\
    \ you want to encode to; in this case, select the OpenGL ES 1.x tab. Select either\
    \ the `PVRTC 2BPP` or `PVRTC 4BPP` button in the Compressed Formats section, and\
    \ then the encode button on the bottom. That’s it!\n\nTable 5-5 shows the formats\
    \ generated by the tool. Even though you have a selection of only two, four are\
    \ possible depending on whether the source bitmap has alpha or not. The `2BPP`\
    \ format means two bits-per-pixel while `4BPP` means, well you guessed it, four-bits-per-pixel.\
    \ Many other image formats supported as well, and those are covered in Chapter\
    \ 9 in the discussion on performance issues.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**CHAPTER 5: Textures**\n\n**159**\n\nTable 5-5\\. The Four PVR Formats Generated\
    \ by `PVRTexTool`\n\n| Format | Compression | Details |\n|--------|-------------|---------|\n\
    | `GL_COMPRESSED_RGBA_PVRTC_4BPPV1_IMG` | 8:1 | 4 bits/pixel with alpha |\n| `GL_COMPRESSED_RGB_PVRTC_4BPPV1_IMG`\
    \ | 6:1 | 4 bits/pixel no alpha |\n| `GL_COMPRESSED_RGBA_PVRTC_2BPPV1_IMG` | 16:1\
    \ | 2 bits/pixel with alpha |\n| `GL_COMPRESSED_RGB_PVRTC_2BPPV1_IMG` | 12:1 |\
    \ 2 bits/pixel no alpha |\n\nSay you have a 512×512 PNG texture that will consume\
    \ 1 MB of memory. The least compression using `PVRTexTool` will take less than\
    \ 200 KB. The greatest compression format, 2 bits/pixel with alpha, would be a\
    \ mere 64 KB.\n\nPVRTC textures are also readable by `GLKTextureLoader()` but\
    \ will fail to load if you specify `GLKTextureLoaderGenerateMipmaps` in the option\
    \ dictionary. However, you can use `PVRTexTool` to embed a mipmap chain in the\
    \ host file for you. Because the compression is a lossy one, you can see the various\
    \ resolution files pop in and out when using the preceding code, more readily\
    \ than the sharper images.\n\n**Note** Because PVRTC is hardware specific, Apple\
    \ has issued a precautionary note to not necessarily rely on PVRTC support in\
    \ future devices. This simply means that Apple may at some point use a different\
    \ GPU manufacturer that is not likely to support another company’s format.\n\n\
    ## More Solar System Goodness\n\nNow we can go back to our solar-system model\
    \ from the previous chapter and add a texture to the Earth so that it can really\
    \ look like the Earth. Examine `Planet.m`, and swap out `init()` for Listing 5-6.\n\
    \n### Listing 5-6\\. Modified sphere generator with texture support added\n\n\
    ```\n-(id) init:(GLint)stacks slices:(GLint)slices radius:(GLfloat)radius //1\n\
    squash:(GLfloat) squash textureFile:(NSString *)textureFile\n{\n  unsigned int\
    \ colorIncrment=0;\n  unsigned int blue=0;\n  unsigned int red=255;\n  int numVertices=0;\n\
    \  if(textureFile!=nil)\n    m_TextureInfo=[self loadTexture:textureFile]; //2\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**CHAPTER 5: Textures**\n\
    \n**160**\n\n```\n  m_Scale=radius;\n  m_Squash=squash;\n```"
