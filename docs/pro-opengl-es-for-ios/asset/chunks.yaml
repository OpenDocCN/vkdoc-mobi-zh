    # 第 10 章：OpenGL ES 2、着色器与……


    **308**


    ……已被全新的 iOS5 `GLKit` 数学库取代，因此现在学习曲线已稍微平缓一些。


    可想而知，第 2 版的内容太过庞大，无法用单独一章来涵盖，因此接下来将提供一个总体概述，让你对这个主题有一个良好的感性认识，并判断它是否值得你在某个时间点深入研究。


    ## 着色管线


    如果你对 OpenGL 或 Direct3D 有过些许了解，那么仅仅提及“着色器”这个词可能就会让你不寒而栗。它们就像是属于图形界核心圈的神秘护身符。


    但事实并非如此。


    第 1 版的“固定功能”管线指的是顶点和片元的照明与着色。例如，你最多可以使用八盏灯光，每盏灯光都有各种属性。灯光照亮表面，而每个表面都有自己的属性，这些属性被称为材质。将两者结合，我们就能得到一个相当不错但受限的通用光照模型。但如果你想做些与众不同的事情呢？如果你希望一个表面根据其相对光照强度而逐渐变得透明呢？越暗，就越透明？如果你想要精确模拟土星环投射到其云层上的阴影，或者日出前那种苍白的光晕呢？考虑到固定功能模型的局限性，上述所有效果都几乎不可能实现，尤其是最后一个，因为一旦你开始考虑大气湿度、背向散射等因素的影响，光照方程就会变得非常复杂。而第
    2 版提供的正是这样一种可编程管线，它允许你直接模拟这些精确的方程，无需使用纹理组合器之类的任何技巧。


    ## 回到起点


    让我们回到第 1 章中给出的第一个示例——那两个立方体。你已经调整过其中一个着色器，并且还安然无恙地活了下来讲述这段经历，但现在我们可以深入研究一点了。


    ES 2 的管线架构允许你在几何处理过程中拥有不同的接入点，如图 10-1 所示。第一个接入点将每个顶点连同其各种属性（例如 xyz 坐标、颜色和不透明度）交给你。这被称为顶点着色器，你在第一章中已经接触过了。此时，你需要决定这个顶点应该呈现出什么样子，以及如何利用提供的属性和你
    3D 世界的状态来渲染它。处理完成后，顶点被交回给硬件，根据你计算出的数据进行光栅化，然后作为二维片元传递给片段着色器。正是在这里，你可以根据需要组合纹理，进行任何最终处理，然后将其交回，最终渲染到帧缓冲区中。


    [www.it-ebooks.info](http://www.it-ebooks.info)


