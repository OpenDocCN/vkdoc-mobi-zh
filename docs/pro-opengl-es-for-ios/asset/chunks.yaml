    \n第 3 行中的`m_LightRadius`表示光源在场景上方移动的圆的半径。\n\n`drawInRect()`方法在清单 7-12 中介绍。你最先注意到的变化是几何体和颜色数组不见了。实际上，我现在已将它们移到了文件顶部，作为全局定义的数据。这使得将渲染内容拆分成更小的部分变得更容易。有趣的是，很多\
