- fmt: 'You will need to modify both the view controller and the planet code. First,
    let’s handle your `setupGL()` method in the view controller by substituting Listing
    10-17 for the template code.


    Listing 10-17\. Setting Up Your Reflection Map


    ```

    -(NSString *)imagePath:(NSString *)image


    {


    return [[NSBundle mainBundle] pathForResource:image ofType:NULL];


    }


    - (void)setupGL


    {


    int planetSize=50;


    [NSArray *images = [[NSMutableArray alloc] initWithObjects: //1


    [self imagePath:@"hedly1.png"],


    [self imagePath:@"hedly2.png"],


    [self imagePath:@"hedly3.png"],


    [self imagePath:@"hedly4.png"],


    [self imagePath:@"hedly5.png"],


    [self imagePath:@"hedly6.png"],


    nil];


    [EAGLContext setCurrentContext:self.context];


    NSDictionary *options=


    [NSDictionary dictionaryWithObjectsAndKeys:


    [NSNumber numberWithBool:YES],GLKTextureLoaderOriginBottomLeft,nil];


    [GLKTextureInfo *info= //2


    [GLKTextureLoader cubeMapWithContentsOfFiles:images options:options error:nil];


    [self.effect = [[GLKReflectionMapEffect alloc] init]; //3


    self.effect.light0.enabled = GL_TRUE;


    self.effect.light0.diffuseColor = GLKVector4Make(1.0f, 1.0f, 1.0f, 1.0f);


    self.effect.light0.specularColor = GLKVector4Make(1.0f, 1.0f, 1.0f, 1.0f);


    self.effect.material.shininess = 15.0f;


    self.effect.lightingType = GLKLightingTypePerPixel;


    self.effect.textureCubeMap.name =info.name;


    self.effect.light0.position=GLKVector4Make(-5.0f, 5.0f, 10.0f, 1.0);


    glEnable(GL_DEPTH_TEST);


    m_Eyeposition.x=0.0;


    m_Eyeposition.y=0.0;


    m_Eyeposition.z=5.0;


    [m_Earth=[[Planet alloc] init:planetSize slices:planetSize //4


    radius:.5f squash:1.0f


    textureFile:@"earth_light.png"];


    [m_Earth setPositionX:0.0 Y:0.0 Z:-3.0];


    }

    ```


    Bet you want to know what’s going on here?


    The six-sided cube map is specified by creating an array of the six images in
    lines 1ff.


    Line 2 generates the `GLKTextureInfo` object and uses its cube map support to
    fetch the six needed files.


    The new effects object is allocated in line 3\. After that, the lighting, materials,
    and position info are filled in, not at all unlike good old’ OpenGL ES 1.


    And finally, the earth is generated just like before, in line 4.


    Now we need the `update()` and `drawInRect()` methods, as shown in Listing 10-18.


    Listing 10-18\. Updating the Effect


    ```

    - (void)update


    {


    GLfloat scale=2.0;


    float aspect = fabsf(self.view.bounds.size.width / self.view.bounds.size.height);//1


    GLKMatrix4 projectionMatrix =


    GLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f), aspect, 0.1f, 100.0f);


    self.effect.transform.projectionMatrix = projectionMatrix;


    GLKMatrix4 baseModelViewMatrix = GLKMatrix4Identity;


    GLKMatrix4 modelViewMatrix = GLKMatrix4Identity;


    [baseModelViewMatrix = GLKMatrix4Scale(baseModelViewMatrix,scale,scale,scale);
    //2


    baseModelViewMatrix = GLKMatrix4Rotate(baseModelViewMatrix, _rotation, 0.0, 0.5,
    0.0f);


    modelViewMatrix = GLKMatrix4MakeTranslation(0.0, 0.0, -3.0);


    modelViewMatrix = GLKMatrix4Multiply(modelViewMatrix, baseModelViewMatrix);


    self.effect.transform.modelviewMatrix = modelViewMatrix;


    [self.effect.matrix=GLKMatrix3Identity; //3


    _rotation+=0.03;


    }


    - (void)glkView:(GLKView *)view drawInRect:(CGRect)rect


    {


    GLfloat gray=0.2;


    glClearColor(gray,gray,gray, 1.0f);


    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);


    [[self.effect prepareToDraw]; //4


    [m_Earth execute:self.effect];


    }

    ```


    In the `update()` function, you’ll see how we now need to rely on the matrixy
    functions from the new math library; there’s no `glRotatef()` or `glTranslatef()`,
    `glPushMatrix()`, or `glPopMatrix()` in this universe.


    Lines 1ff specify the projection matrix, what would normally be given over to
    `glFrustum()` in the alternate universe of version 1.


    Line 2 and those following create the matrices we need for the transformations,
    ultimately assigning the final `modelViewMatrix` object to the transform field
    of the effect’s own `GLKEffectPropertyTransform` object. `GLKEffectPropertyTransform`
    contains both the Modelview and normal matrix.


    Not only does the “effect” have its own transformation matrix, it can also have
    an additional matrix to handle specific components of that effect. In this case,
    line 3 highlights this extra matrix. The Modelview matrix is for the geometry
    of the effect, just like it is in version 1, but this new one can be used to transform
    other things. In this case, it could be used to rotate the cube map. Setting it
    to the identity keeps the cube map static, letting just the earth model rotate.


    When ready, call the `prepareToDraw()` method of the effect’s class, and it will
    apply the new settings, after which you may render the object itself, with the
    results shown in Figure 10-9.


    ![Image 288](index-342_1.jpg)


    ![Image 289](index-342_2.jpg)


    Figure 10-9\. Reflection mapping the earth


    For complicated objects such as the earth model, you would be better off using
    a more simple cube map. The most basic ones typically would show a horizon, ground,
    and sky, usually produced by different gradients.


    ## Summary


    In this final chapter, you learned a little about OpenGL ES 2, the programmable
    pipeline version of ES; learned how and where shaders fit it in; and used them
    to add some extra detail to the earth. (For extra credit, try porting the rest
    of the simulator to version 2.) The final exercise used the OpenGL ES 2--exclusive
    GLKit effects objects to create a cube map and a shiny earth, rounding out the
    GLKit introduction. I advise watching the superb presentation of the GLKit by
    Apple from the 2011-WWDC . iTunes has all of the talks online.


    Throughout this book, you’ve learned basic 3D theory, both in the math involved
    and in the overall principles. I’d like to think it’s given you a basic understanding
    of the topic, even knowing that the book could be many times larger, considering
    that we’ve barely touched 3D graphics.'
