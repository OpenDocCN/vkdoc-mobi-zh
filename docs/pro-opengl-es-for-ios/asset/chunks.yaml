    will never have to define geometry in this fashion. You’ll likely load your objects
    from a file stored in one of the standard 3D data formats, such as those used
    by 3D Studio or Modeler 3D. And considering how complicated such files can be,
    it is not recommended that you write your own because importers for most of the
    major formats are available.


