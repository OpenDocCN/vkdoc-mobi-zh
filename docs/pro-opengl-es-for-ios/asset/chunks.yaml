    In line 1, writing to the depth buffer is disabled, and line 2 disables the green
    and blue color channels, so only the red one will be used. That


    is how the reflected area gets its little red highlight.


    Now we can draw the image to the stencil buffer in line 3.


    Lines 4 and 5 reset the masks.'
  trans: "\n# 模板操作的设置方式\n\n最终值是一个用于访问位平面的掩码。由于我们并不关心这一点，直接全部启用即可。\n\n第 3 行指定了模板测试成功或失败时的处理方式。第一个参数对应模板测试失败的情况；第二个参数对应模板测试通过但深度测试失败的情况；第三个参数则对应两者都通过的情况。由于我们身处三维空间，模板测试与深度测试的联动机制表明，在某些情况下两者可能相互制约。模板缓冲区的使用中有些微妙的细节处理起来相当复杂。在此例中，将三个参数均设置为\
    \ `GL_REPLACE`。表 7-1 列出了所有其他允许的取值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## 第 7 章：渲染精粹\n\n**221**\n\n第 4 行调用渲染函数，几乎与你平时调用它的方式相同。在此情况下，它同时向模板缓冲区和某个颜色通道写入数据，因此我们可以在全新的闪亮舞台或平台上获得某种闪光效果。与此同时，模板缓冲区中的背景像素将保持为\
    \ 0，而图像则会生成大于 0 的模板像素值，这使得后续的图像数据可以向其上写入。\n\n第 5 行和第 6 行现在将缓冲区调整为正常使用状态。第 5 行规定：如果当前寻址的模板像素值为\
    \ 1，则按第 6 行所述保持其不变。否则，允许该片段通过并继续处理，如同模板缓冲区不存在一样（不过如果它未能通过深度测试，仍可能被忽略）。因此，任何值为\
    \ 0 的模板像素都会导致测试失败，传入的片段将被阻挡在外。\n\n## 表 7-1. `glStencilOp()` 的可用取值\n\n| 操作类型 |\
    \ 说明 |\n|---------|--------|\n| `GL_KEEP` | 保持当前值。 |\n| `GL_ZERO` | 将模板缓冲区值设为\
    \ 0。 |\n| `GL_REPLACE` | 将模板缓冲区值设为 `glStencilFunc` 指定的 `ref` 值。 |\n| `GL_INCR`\
    \ | 将当前模板缓冲区值递增。递增到最大可表示无符号值时将钳制在该最大值。 |\n| `GL_INCR_WRAP` | 将当前模板缓冲区值递增。当递增到最大可表示无符号值时，模板缓冲区值将回绕至零。\
    \ |\n| `GL_DECR` | 将当前模板缓冲区值递减。递减到 0 时将钳制在 0。 |\n| `GL_DECR_WRAP` | 将当前模板缓冲区值递减。当递减\
    \ 0 值时，模板缓冲区值将回绕至最大可表示无符号值。 |\n| `GL_INVERT` | 对当前模板缓冲区值进行按位取反。 |\n\n如您所见，模板缓冲区是一个非常强大的工具，拥有许多精妙之处。但更高级的用法将留待后续未命名的书籍中探讨。\n\
    \n现在来看看 `renderStage()` 方法，如清单 7-9 所示。\n\n## 清单 7-9. 仅将反射区域渲染到模板缓冲区\n\n```objc\n\
    -(void)renderStage\n{\n    static const GLfloat flatSquareVertices[] =\n    {\n\
    \        -0.5, 0.0, -.5f,\n        0.5, 0.0, -.5f,\n        -0.5, 0.0, 0.5,\n\
    \        0.5, 0.0, 0.5\n    };\n\n    static const GLubyte colors[] =\n    {\n\
    \        255, 0, 0, 128,\n        255, 0, 0, 255,\n        0, 0, 0, 0,\n     \
    \   128, 0, 0, 128\n    };\n\n    glFrontFace(GL_CW);\n    glPushMatrix();\n \
    \   glTranslatef(0.0,-1.0,-3.0);\n    glScalef(2.5,1.5,2.0);\n\n    glVertexPointer(3,\
    \ GL_FLOAT, 0, flatSquareVertices);\n    glEnableClientState(GL_VERTEX_ARRAY);\n\
    \n    glColorPointer(4, GL_UNSIGNED_BYTE, 0, colors);\n\n    glDepthMask(GL_FALSE);\
    \ //1\n    glColorMask(GL_TRUE, GL_FALSE, GL_FALSE, GL_TRUE); //2\n    glDrawArrays(\
    \ GL_TRIANGLE_STRIP,0, 4); //3\n    glColorMask(GL_TRUE, GL_TRUE, GL_TRUE, GL_TRUE);\
    \ //4\n    glDepthMask(GL_TRUE); //5\n\n    glPopMatrix();\n}\n```\n\n在第 1 行中，深度缓冲区的写入被禁用；第\
    \ 2 行则禁用了绿色和蓝色通道，因此只使用红色通道。这就是反射区域获得微小红光高亮的方式。\n\n现在，我们可以在第 3 行将图像绘制到模板缓冲区中。\n\
    \n第 4 行和第 5 行重置了掩码。\n"
- fmt: 'At this point, the `drawInRect()` routine has to be modified, yet again. Yawn….
    And if you can keep your peepers open, check out Listing 7-10 for the cruel and
    unvarnished truth.


    Sorry for repeating so much of the previous code, but it’s much easier than saying
    “...and after the line about squirrel trebuchets add such-and-such a line....”


    ### Listing 7-10. The reflection `drawInRect()` method


    ```

    - (void)glkView:(GLKView *)view drawInRect:(CGRect)rect


    {


    static GLfloat z=-3.0;


    static GLfloat spinX=0;


    static GLfloat spinY=0;


    [www.it-ebooks.info](http://www.it-ebooks.info)


    CHAPTER 7: Well-Rendered Miscellany


    223


    static const GLfloat cubeVertices[] =


    {


    -0.5, 0.5, 0.5,


    0.5, 0.5, 0.5,


    0.5,-0.5, 0.5,


    -0.5,-0.5, 0.5,


    -0.5, 0.5,-0.5,


    0.5, 0.5,-0.5,


    0.5,-0.5,-0.5,


    0.5,-0.5,-0.5,


    };


    static const GLubyte cubeColors[] =


    {


    255, 0, 0, 255,


    0, 255, 0, 255,


    0, 0, 0, 0,


    0, 0, 255, 255,


    255, 255, 0, 255,


    0, 255, 255, 255,


    0, 0, 0, 0,


    255, 0, 255, 255,


    };


    static const GLubyte tfan1[6 * 3] =


    {


    1,0,3,


    1,3,2,


    1,2,6,


    1,6,5,


    1,5,4,


    1,4,0


    };


    static const GLubyte tfan2[6 * 3] =


    {


    7,4,5,


    7,5,6,


    7,6,2,


    7,2,3,


    7,3,0,


    7,0,4


    };


    static float transY = 0.0;


    glClearColor(0.0, 0.5, 0.7f, 1.0);


    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT | GL_STENCIL_BUFFER_BIT); //1


    //Render to the stencil first.


    [self renderToStencil]; //2


    [www.it-ebooks.info](http://www.it-ebooks.info)


    CHAPTER 7: Well-Rendered Miscellany


    224


    glEnable(GL_CULL_FACE);


    glCullFace(GL_BACK);


    glMatrixMode(GL_MODELVIEW);


    glLoadIdentity();


    glPushMatrix();


    glEnable(GL_STENCIL_TEST); //3


    glDisable(GL_DEPTH_TEST);


    glVertexPointer(3, GL_FLOAT, 0, cubeVertices);


    glEnableClientState(GL_VERTEX_ARRAY);


    glColorPointer(4, GL_UNSIGNED_BYTE, 0, cubeColors);


    glEnableClientState(GL_COLOR_ARRAY);


    glEnableClientState(GL_NORMAL_ARRAY);


    //Flip the image.


    glTranslatef(0.0,((GLfloat)(sinf(-transY)/2.0)-1.5),z); //4


    glRotatef(spinY, 0.0, 1.0, 0.0);


    glScalef(1.0, -1.0, 1.0); //5


    glFrontFace(GL_CW);


    glEnable(GL_BLEND); //6


    glBlendFunc(GL_ONE, GL_ONE_MINUS_SRC_COLOR);


    glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan1); //7


    glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan2);


    glPopMatrix();


    glDisable(GL_BLEND); //8


    glEnable(GL_DEPTH_TEST);


    glDisable(GL_STENCIL_TEST);


    //Do the main image.


    glPushMatrix();


    glScalef(1.0, 1.0, 1.0); //9


    glFrontFace(GL_CCW);


    glTranslatef(0.0, (GLfloat)1.5*(sinf(transY)/2.0)+0.5,z);


    glRotatef(spinY, 0.0, 1.0, 0.0);


    glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan1); glDrawElements(
    GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan2);


    [www.it-ebooks.info](http://www.it-ebooks.info)


    CHAPTER 7: Well-Rendered Miscellany


    225


    glPopMatrix();


    spinY+=.25;


    transY += 0.075;


    }

    ```


    And here’s the breakdown:


    In line 1, `GL_STENCIL_BUFFER_BIT` is added to `glClear()`.


    Line 2 calls the new method `renderToStencil()`, which is back in Listing 7-9.
    This will actually create the stenciled region, poking the hole that we’ll draw
    through next.


    Enable the stencil test in line 3.


    Here in lines 4 and 5 the reflection is drawn. First translate it down a little,
    subtracting 1.5, to ensure that it is below the real cube. And then it’s a simple
    matter of “scaling” the y-axis to -1.0 to flip it upside-down. You will need to
    change the front face to clockwise at this point; otherwise, you’ll see the back
    faces only.


    We want to make the lower image translucent instead of the full intensity, as
    we’d expect. In line 6f, blend is enabled and uses the most common blending function
    of `GL_ONE` and `GL_ONE_MINUS_SRC_COLOR` covered in Chapter 6.


    In lines 7ff we see that the inverted object is drawn exactly the same way as
    the original. When done, the blending is switched off in line 8 so that it doesn’t
    affect the rendering of the primary cube. At the same time, stencil is switched
    off while depth test is switched back on.


    Since scale was touched to invert the image, in line 9 scale is reset to the default.
    The translation has been modified with a couple of other small values. This shifts
    it up a little bit just to get extra clearance for the inverted cube.


    And now the test. Figure 7-8 is what you should see.


    [www.it-ebooks.info](http://www.it-ebooks.info)


