- fmt: '第一个渲染的立方体是由`GLKBaseEffect`对象管理的。第16行告诉它准备渲染，第17行实际命令它执行渲染。


    现在，从第18行开始，我们开始使用着色器来处理另一个立方体。`glUseProgram()`告诉程序使用之前已经加载的两个神秘着色器文件`Shader.fsh`和`Shader.vsh`，而两个`glUniform`调用则将模型视图矩阵和投影矩阵传递给它们。


    接着，在第19行再次调用`glDrawArrays()`，这样就完成了渲染！


    处理和使用着色器的部分是唯一需要关注的。这个过程包括首先将它们加载到内存中，然后编译，最后链接。如果一切按计划进行，可以通过调用`glUseProgram()`来启用它们。


    其中一个文件`Shader.vsh`在硬件开始处理顶点时拦截顶点信息，而另一个文件`Shader.fsh`则实际上允许你在每个像素被发送到显示硬件之前对其进行操作。


    **不断调整，不断改进**


    每当学习一门新技术时，我都会调整参数值，看看会发生什么。如果结果如我所料，我会感觉就像刚获得了一项新的超能力。


    那么，我们来试验一下。


    为了好玩，我们调整几个值。首先，回到前面几页的`gCubeVertexData`，将第一个值从`0.0`改为`1.0`。你觉得会看到什么？


    是不是像图1-10那样？


    图1-10. 移动一个顶点后的效果


    **那着色器呢？**


    这里并不是深入讲解着色器设计和语言的地方，但让我们也通过摆弄它们来揭开一些神秘面纱。列表1-3是顶点着色器。


    列表1-3. 预处理顶点的`Shader.vsh`


    ```

    attribute vec4 position;

    attribute vec3 normal;

    varying lowp vec4 colorVarying;

    uniform mat4 modelViewProjectionMatrix;

    uniform mat3 normalMatrix;

    void main()

    {

    vec3 eyeNormal = normalize(normalMatrix * normal);

    vec3 lightPosition = vec3(0.0, 0.0, 1.0); //1

    vec4 diffuseColor = vec4(0.4, 0.4, 1.0, 1.0);

    float nDotVP = max(0.0, dot(eyeNormal, normalize(lightPosition)));

    colorVarying = diffuseColor * nDotVP;

    gl_Position = modelViewProjectionMatrix * position; //2

    }

    ```


    在这个顶点着色器中，光线是针对这个特定立方体隐藏的；这些值是`x`、`y`和`z`值。将中间的值改为`5.0`，这将会把光线移到场景上方很远，但只会影响蓝色立方体。


    在第2行，`gl_Position`是一个预定义的对象，它携带当前顶点的位置。


    在末尾添加以下一行：`gl_Position.x*=.5;`。图1-11a显示了结果。


    图1-11a,b. 左侧是顶点着色器中垂直缩放的变化，右侧是片段着色器中的颜色变化。


    现在快速浏览一下片段着色器，如列表1-3所示。它什么也不做，仅仅是一个透传着色器。然而，正是在这里，你可以拦截对每个“片段”（在此级别上类似于像素）的调用。在末尾添加一行`gl_FragColor.g=1.0;`。这会为图像中的每个像素添加绿色，看起来像图1-11b。看到了吗？这并不难，对吧？现在你可以自豪地走出去，告诉你的朋友你一整天都在编写着色器程序，然后看着赞美之词在你脚下堆积如山。


    列表1-3. 片段着色器


    ```

    varying lowp vec4 colorVarying;

    void main()

    {

    gl_FragColor = colorVarying;

    }

    ```'
  raw: 'The first cube rendered is the one managed by the GLKBaseEffect


    object. Line 16 tells it to prepare to render, and line 17 actually


    commands it to do so.


    Now in lines 18ff, we start using the shader stuff for the other cube.


    glUseProgram() tells it to use the two mysterious shader files,


    Shader.fsh and Shader.vsh, which had previously been loaded, while


    the two glUniform calls hand off the model view and the projection


    matrices to them.


    Now a second call to glDrawArrays() in line 19, and that does it!


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 14](index-31_1.jpg)


    ![Image 15](index-31_2.jpg)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **26**


    The only other section is that which handles the loading and using of the shaders.
    This process is to load them first in memory, compile, and then link them. If
    all works as planned, they can be turned on with the call to glUseProgram() above.


    One of the files, Shader.vsh, intercepts the vertices as the hardware starts processing
    them, while the other, Shader.fsh, in effect lets you play with each individual
    pixel before it’s sent to the display hardware.


    **Tweak and Tweak Some More**


    Whenever I learn some new technology, I start tweaking the values to see what
    happens. If it happens the way I expect, I feel as if I’ve just acquired a new
    super-power.


    So, let’s play here.


    Let’s tweak a couple of the values just for kicks. First, go to the gCubeVertexData
    a few pages up, and change the very first value from 0.0 to 1.0\. What do you
    think you’ll see?


    How about Figure 1-10?


    Figure 1-10\. With one vertex moved out.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **27**


    **What About the Shaders?**


    Here is not the place to get into a detailed breakdown of shader design and the
    language, but let’s remove a little of the mystery by playing with those as well.
    Listing 1-3 is the vertex shader.


    Listing 1-3\. Shader.vsh that preprocesses the vertices.


    **attribute vec4 position;**


    **attribute vec3 normal;**


    **varying lowp vec4 colorVarying;**


    **uniform mat4 modelViewProjectionMatrix;**


    **uniform mat3 normalMatrix;**


