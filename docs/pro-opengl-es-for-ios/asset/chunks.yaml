    In effect, we are generating pairs of points, namely, each point and its mate
    immediately above it. And this is the format that GL expects for


    the triangle strips, as shown in Figure 3-17.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 108](index-87_1.jpg)


    **CHAPTER 3: Building a 3D World**


    **83**


    Figure 3-17\. A triangle strip of six vertices


    In line 11, the color array is generated, and as with the vertices, they are generated
    in pairs. The green component is ignored for now.


    At lines 12f, the color array pointer and vertex array pointers are incremented.


    And finally in line 13, we increment the blue and decrement the red.


    Now that the geometry is out of the way, we need to concentrate on the execute
    method. See Listing 3-7.


    Listing 3-7\. Rendering the Planet


    **- (bool)execute**


    **{**


    **glMatrixMode(GL_MODELVIEW); //1**


    **glEnable(GL_CULL_FACE); //2**


    **glCullFace(GL_BACK); //3**


    ****glEnableClientState(GL_VERTEX_ARRAY); //4**


    **glEnableClientState(GL_COLOR_ARRAY); //5**


    ****glVertexPointer(3, GL_FLOAT, 0, m_VertexData); //6**


    ****glColorPointer(4, GL_UNSIGNED_BYTE, 0, m_ColorData); //7**


    **glDrawArrays(GL_TRIANGLE_STRIP, 0, (m_Slices +1)*2*(m_Stacks-1)+2); //8**


    ****return true;**


    **}**


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 3: Building a 3D World**


    **84**


    You should now recognize many of the elements from the cube examples.


    First, in line 1, tell the system that we want to work with the


    **GL_MODELVIEW** matrix (the one that supports the transformation


    information).


    Lines 2 and 3 are identical to the ones used previously to cull out the back of
    the sphere that we cannot see.


    Lines 4 and 5 are again familiar and tell OpenGL to accept both vertex and color
    information.


    Next we supply the vertex data in line 6 and the color data in line 7.


    Line 8 does the heavy lifting in drawing the arrays, both color and vertices.


    Now that the planet object is complete enough for this example, let’s do the driver.
    First, create a new Objective-C object and call it something like


    OpenGL**SolarSystemController**. Now add the code from Listing 3-8a and 3-8b to
    initialize the object and universe.


    Listing 3-8a. Initializing your universe: the header


    **#import <Foundation/Foundation.h>**


    **#import <GLKit/GLKit.h>**


    **#import "Planet.h"**


    ****@interface OpenGLSolarSystemController : NSObject**


    **{**


    **Planet *m_Earth;**


    **}**


    ****-(void)execute;**


    **-(id)init;**


    **-(void)initGeometry;**


    ****@end**


    Listing 3-8b. Initializing your universe: the rest of the stuff


    **-(id)init**


    **{**


    **[self initGeometry];**


    ****return self;**


    **}**


    ****-(void)initGeometry**


    **{**


    **m_Earth=[[Planet alloc] init:10 slices:10 radius:1.0 squash:1.0];**


    **}**


    The earth model here is initialized at fairly low resolution: 10 stacks high,
    10 slices around.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 3: Building a 3D World**


    **85**


    Listing 3-9 shows the master execute method. As with the cube, we translate the
    earth on the Z-axis and rotate it around the y-axis.


    Listing 3-9\. Master execute method


    **-(void)execute**


    **{**


    **static GLfloat angle=0;**


    ****glLoadIdentity();**


    **glTranslatef(0.0, -0.0, -3.0);**


    ****glRotatef(angle,0.0,1.0,0.0);**


    ****[m_Earth execute];**


    ****angle+=.5;**


    **}**


    For the final steps, go to the window’s **viewcontroller** and change **viewDidLoad()**
    to Listing 3-10.


    Listing 3-10\. The new ***viewDidLoad() method***


    **- (void)viewDidLoad**


    **{**


    **[super viewDidLoad];**


    ****self.context = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];**


    ****if (!self.context)**


    **{**


    **NSLog(@"Failed to create ES context");**


    **}**


    ****GLKView *view = (GLKView *)self.view;**


    **view.context = self.context;**


    **view.drawableDepthFormat = GLKViewDrawableDepthFormat24;**


    ****m_SolarSystem=[[ OpenGLSolarSystemController alloc] init];**


    ****[EAGLContext setCurrentContext:self.context];**


    ****[self setClipping];**


    **}**


    Now change the **drawInRect()** method to the one in Listing 3-11.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 109](index-90_1.jpg)


    **CHAPTER 3: Building a 3D World**


    **86**


    Listing 3-11\. The new ***drawInRect*** for the Solar System


    **- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect**


    **{**


    ****glClearColor(0.0,0.0, 0.0, 1.0);**


    **glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);**


    ****[m_SolarSystem execute];**


    **}**


    Finally, add in setClipping() (used in the previous exercise), making sure you’ve
    reset the FOV to 50 or 60 degrees; modify the headers as needed; and compile.
    You should see something like Figure 3-18.


    Figure 3-18\. The future planet Earth


    It is actually rotating but, because it has no features at all, you’ll be hard-pressed
    to see the motion.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 110](index-91_1.jpg)


    **CHAPTER 3: Building a 3D World**


    **87**


    As with the previous examples, let’s play around with some of the parameters and
    see what happens. First let’s change the number of stacks and slices, from 10
    to 20, in the **initGeometry** method. You should see something like Figure 3-19.


    Figure 3-19\. The planet with double the stacks and slices


    If you want your curved objects to look smoother, there are generally three ways:


    Have as many triangles as possible.


    Use some special lighting and shading tools built into OpenGL.


    Use textures.


    The next chapter will cover the second option. But for now, see how many slices
    and stacks it takes to make a really smooth sphere. (It works best with an equal
    number of both.) It really starts looking good at 100 each. For now, go back to
    10 each when finished with this exercise.


    [www.it-ebooks.info](http://www.it-ebooks.info)


