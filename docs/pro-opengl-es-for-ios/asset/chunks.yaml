    # CHAPTER 10: OpenGL ES 2, Shaders, and...


    **309**


    If this sounds like a lot of work for each fragment of each object in your scene
    roaring along at 60 fps, you are right. But fundamentally, shaders are small programs
    that are actually loaded and run on the graphics hardware itself and, as a result,
    are very, very fast.


