    **176**


    表 6-1 列出了所有允许的 OpenGL ES 混合因子，尽管并非所有因子都同时支持源和目标。如您所见，这里有充足的调整空间，并且没有关于哪种组合能产生最佳效果的固定规则。不过，尝试不同的值会非常有趣。请确保将背景填充为暗灰色，因为某些组合在写入黑色背景时只会产生黑色。


    表 6-1. 源和目标混合值；请注意，并非所有值都适用于两个通道


    | 混合因子 | 描述 |

    | :--- | :--- |

    | `GL_ZERO` | 将操作数乘以 0。 |

    | `GL_ONE` | 将操作数乘以 1。 |

    | `GL_SRC_COLOR` | 将操作数乘以源颜色的四个分量（仅限目标）。 |

    | `GL_ONE_MINUS_SRC_COLOR` | 将操作数乘以 (1.0 – 源颜色)（仅限目标）。 |

    | `GL_DST_COLOR` | 将操作数乘以目标颜色的四个分量（仅限源）。 |

    | `GL_ONE_MINUS_DST_COLOR` | 将操作数乘以 (1.0 – 目标颜色)（仅限源）。 |

    | `GL_SRC_ALPHA` | 将操作数乘以源 Alpha。 |

    | `GL_ONE_MINUS_SRC_ALPHA` | 将操作数乘以 (1.0 – 源 Alpha)。 |

    | `GL_DST_ALPHA` | 将操作数乘以目标 Alpha。 |

    | `GL_ONE_MINUS_DST_ALPHA` | 将操作数乘以 (1.0 – 目标 Alpha)。 |

    | `GL_SRC_ALPHA_SATURATE` | 用于较旧图形实现的特殊模式，以辅助抗锯齿。你可能永远不会用到它。（仅限源。） |


    在第 5 章中，我们研究了 iOS 设备上 OpenGL ES 支持的 GL 扩展。其中几个用于更复杂的混合方案，例如`GL_OES_blend_equation_separate`、`GL_OES_blend_func_separate`、`GL_OES_blend_subtract`和`GL_EXT_blend_minmax`。这些值与`glBlendEquation()`和`glBlendEquationSeparate()`方法一起使用。


    回顾一下默认的混合等式，其中最终颜色由源值 + 目标值决定。但是，如果你想用源颜色减去目标颜色而不是相加呢？调用`glBlendEquation(GL_FUNC_SUBTRACT)`即可实现。将该行代码放在`glBlendFunc()`正下方，确保两个方块的
    Alpha 值都为`0.5`，并将颜色重置回初始状态（红色在前），编译并运行。结果可能有点不明显，如图 6-5（左）所示。实际情况是，这个操作确实是“从红色源中减去蓝色”，但红色方块的颜色中没有任何蓝色分量。数学计算得出的最终颜色为红色=0.5、绿色=0、蓝色=-0.25。但是，由于负颜色在这个平面上（或者至少在加利福尼亚州圣何塞）不存在，系统会将蓝色分量钳位为`0`。结果是交叉部分呈现纯红色。因此，为了在这里看到一些效果，前面的方块需要预先包含一些蓝色。所以，将红色的颜色改为`1,0,1`，即洋红色。现在运行时，就得到了图
    6-5（右）的结果，因为目标蓝色可以从源蓝色中减去，留下一个系统能够理解的正值。在这种情况下，交叉部分的值是`0.5, 0, 0.25`，这就是为什么我们得到的是偏洋红的红色而不是纯红色。尝试将其导入绘图程序，并使用拾色器功能验证实际颜色。


    图 6-5a, b. 左侧，使用减法操作时没有发生混合，而右侧则成功混合。'
  raw: 'percent of the red is written to the destination. The black area will be a
    dim red but only 50 percent of the specified value of 1.0 given in **glColor4f()**.
    So far, so good. Now on top of the blue, 50 percent of the red value is mixing
    with a 50 percent blue value: Blended color=Color Source*Alpha of source + (1.0-Alpha
    of Source)*Color of the destination


    Or looking at each component based on the values in the earlier red square example,
    here are the calculations:


    Red=1.0*0.5+(1.0-0.5)*0.0


    Green=0.0*0.5+(1.0-0.5)*0.0


    Blue=0.0*0.5+(1.0-0.5)*1.0


    So, the final color of the fragment’s pixels should be 0.5,0.0,0.5, or magenta.
    Now, the red and resulting magenta are a little on the dim side. What would you
    do if you wanted to make this much brighter? It would be nice if there were a
    means of blending the full intensities of the colors. Would you use alpha values
    of 1.0? Nope. Why? Well, with blue as the destination and a source alpha of 1.0,
    the preceding blue channel equation would be 0.0*1.0+(1.0-1.0)*1.0\. And that
    equals 0, while the red would be 1.0, or solid. What you would want is to have
    the brightest red when writing to the black background, and the same for the blue.
    For that you would use a blending function that writes both colors at full intensity,
    such as **GL_ONE**. That means the following:


    **glBlendFunc(GL_ONE, GL_ONE);**


    Going back to the equations using the source triplet of red=1, green=0, blue=0
    and the destination of red=0, green=0, blue=1 (with alpha defaulting to 1.0),
    the calculations would be as follows:


    Red=1*1+0*1


    Green=0* (1+(0-0)*1


    Blue=0*1+(1-0)*1


