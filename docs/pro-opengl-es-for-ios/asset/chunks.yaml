    \n19\n\n那么，这里发生了什么？\n\n在第 1 行及后续行（ff 表示“及后续行”）中，定义了一些看起来很奇怪的枚举。这些枚举保存了着色器代码中各种参数的“位置”。我们会在本书后面讨论这一点。\n\
    \n第 2 行及后续行实际定义了用于描述两个立方体的数据。你很少需要像这样在代码中定义任何东西。通常，基本图元（例如球体、立方体和圆锥体）是即时生成的，而更复杂的对象则是从\
    \ 3D 建模工具生成的文件中加载的。\n\n两个立方体实际上使用的是同一个数据集，只是在不同的方式下操作它。\n"
- fmt: 'slightly different fashion. There are six sections of data, one for each face,
    with each line defining a vertex or corner of the face. The first three numbers
    are the `x`, `y` and `z` values in space, and the second three have the normal
    of the face (the normal being a line that specifies the direction the face is
    aiming and that is used to calculate how the face is illuminated). If the normal
    is facing a light source, it will be lit; if away, it would be in shadow.


    You will notice that the cube’s vertices are either `0.5` or `-0.5`. There is
    nothing magical about this, merely defining the cube’s size as being `1.0` unit
    on a side.


    The faces are actually made up of two triangles. The big-brother of `OpenGL ES`
    can render four-sided faces, but not this version, which can do only three sides.
    So we have to fake it. That is why there are six vertices defined here: three
    for each triangle. Notice that two of the points are repeated. That is not really
    necessary, because only four unique vertices will do just fine.


    Lines 3ff specify the matrices that are used to rotate and translate (move) our
    objects. In this use, a matrix is a compact form of trigonometric expressions
    that describe various transformations for each object and how their geometry in
    3 dimensions is eventually mapped to a two-dimensional surface of our screens.
    In `OpenGL ES 1.1`, we rarely have to refer to the actual matrices directly because
    the system keeps them hidden from us, while under `2.0`, we see all of the inner
    workings of the system and must handle the various transformations ourselves.
    And it is not a pretty sight at times.


    Line 4 allocates an `OpenGL` context. This is used to keep track of all of our
    specific states, commands, and resources needed to actually render something on
    the screen. This line actually allocates a context for `OpenGL ES 2`, as specified
    via the parameter passed via `initWithAPI`. Most of the time we’ll be using `kEAGLRenderingAPIOpenGLES1`.


    In line 5, we grab the view object of this controller. What makes this different
    is the use of a `GLKView` object, as opposed to the more common `UIView` that
    you are probably familiar with. New to `iOS5`, the `GLKView` takes the place of
    the much messier `EAGLView`. With the former, it takes only a couple of lines
    of code to create a `GLKView` and specify various properties, whereas in those
    dark and unforgiving days before `iOS5`, it could take dozens of lines of code
    to do only basic stuff. Besides making things easier to set up, the `GLKView`
    also handles the duties of calling your update and refresh routines and adds a
    handy snapshot feature to get screen grabs of your scene.


    Line 6 states that we want our view to support full 24-bit colors.


    Line 7 features the first 2.0-only call. As mentioned above, shaders are little
    C-like programs designed to execute on the graphics hardware. They exist in either
    a separate file, as in this exercise, or as some people prefer, embedded in text
    strings in the main body of the code.


    Line 8 illustrates another new feature in the `GLKit`: effect objects. The effect
    objects are designed to hold some date and presentation information, such as lighting,
    materials, images, and geometry that are needed to create a special effect. On
    `iOS5`’s initial release, only two effects were available, one to do reflections
    in objects and the other to provide full panoramic images: Both are commonly used
    in graphics, so they are welcomed by developers who would otherwise have to code
    their own. I expect libraries of effects to eventually become available, both
    from Apple and from third parties.


    In this case, the example is using the “base effect” to render one of the two
    cubes. You’d likely never use an effect class to draw just basic geometry like
    this, but it demonstrates how the effect encapsulates a miniature version of `OpenGL
    ES 1.1`. That is, it has a lot of the missing functionality, mainly in lights
    and materials, that you’d otherwise have to reimplement when porting `1.1` code
    over to `2.0`.


    Also a part of the setup of the effect, line 9 shows us how to turn on the lights,
    followed by line 10, which actually specifies the color of the light by using
    a four-component vector. The fields are ordered as red, green, blue, and alpha.
    The colors are normalized between `0` and `1`, so here red is the main color,
    with green and blue both at only `40%`. If you guessed this is the color of the
    reddish cube, you’d be right. The fourth component is alpha, which is used to
    specify transparency, with `1.0` being completely opaque.


    Depth-testing is another important part of 3D worlds. It is used in line 11, in
    what is otherwise a very nasty topic, for occluding or blocking stuff that is
    hidden behind other stuff. What depth-testing does is to render each object on
    your screen with a depth component. Called a `z-buffer`, this lets the system
    know, as it renders an object, whether something is in front of that object. If
    so, the object (or pieces of it) is not rendered. In earlier days, z-buffering
    was so slow and took up so much extra memory that it was invoked only when absolutely
    necessary, but nowadays there is rarely any reason not to use it, except for some
    special rendering effects.


    Lines 12f (the single `f` meaning “the line following”) sets the system up for
    something called `Vertex Array Objects` (`VAOs`). `VAOs` enable you to cache your
    models and their attributes in the `GPU` itself, cutting down a lot of overhead
    otherwise incurred by copying the data across the bus for each frame. Up until
    `iOS4`, `VAOs` were available only on `OpenGL ES 2` implementations, but now both
    versions can use them. Seen here, we first get a “name” (actually just a unique
    handle) used to identify our array of data to the system. Afterwards, we take
    that and “bind” it, which merely makes it the currently available array for any
    calls that need one. It can be unbound, either by binding a new array handle or
    by using `0`. This process of naming and binding objects is a common one used
    across all of `OpenGL`.


    In lines 13ff, the same process is repeated, but this time on a vertex buffer.
    The difference is that a vertex buffer is the actual data, and in this case, it
    points to the statically defined data for the cube at the very top of this file.


    Line 14 supplies the cube’s data to the system now, specifying both the size and
    the location of the data, which is then sent up to the graphics subsystem.


    Remember how both the 3D `xyz` coordinates of each corner were embedded with the
    normals of the faces (the things that say where a face is pointing)? You can actually
    embed almost any data in these arrays, as long as the data format doesn’t change.
    Lines 15f tell the system which data is which. The first line says that we’re
    using `GLKVertexAttribPosition` data made up of three floating point values (the
    `x`, `y`, and `z` components), offset by `0` bytes from the start of the data
    supplied in line 14, and a total of `24` bytes long for each structure. That means
    when it comes time to draw this cube, it will grab three numbers from the very
    start of the buffer, jump `24` bytes, grab the next three, and so on.


    The normals are treated almost identical, except they are called `GLKVertexAttribNormal`,
    and start at an offset of `12` bytes, or immediately after the `xyz` data.


    Line 16 “closes” the vertex array object. Now, whenever we want to draw one of
    these cubes, we can just bind this specific `VAO` and give a draw command without
    having to supply the format and offset information again.


    Finally, in line 17, the buffers are deleted.'
  raw: 'slightly different fashion. There are six sections of data, one for each face,
    with each line defining a vertex or corner of the face. The first three numbers
    are the x, y and z values in space, and the second three have the normal of the
    face (the normal being a line that specifies the direction the face is aiming
    and that is used to calculate how the face is illuminated). If the normal is facing
    a light source, it will be lit; if away, it would be in shadow.


    You will notice that the cube’s vertices are either 0.5 or -0.5. There is nothing
    magical about this, merely defining the cube’s size as being


    1.0 unit on a side.


    The faces are actually made up of two triangles. The big-brother of


    OpenGL ES can render four-sided faces, but not this version, which


    can do only three sides. So we have to fake it. That is why there are


    six vertices defined here: three for each triangle. Notice that two of the points
    are repeated. That is not really necessary, because only four


    unique vertices will do just fine.


    Lines 3ff specify the matrices that are used to rotate and translate (move) our
    objects. In this use, a matrix is a compact form of


    trigonometric expressions that describe various transformations for


    each object and how their geometry in 3 dimensions is eventually


    mapped to a two-dimensional surface of our screens. In OpenGL ES


    1.1, we rarely have to refer to the actual matrices directly because the system
    keeps them hidden from us, while under 2.0, we see all of the


    inner workings of the system and must handle the various


    transformations ourselves. And it is not a pretty sight at times.


    Line 4 allocates an OpenGL context. This is used to keep track of all of our specific
    states, commands, and resources needed to actually


    render something on the screen. This line actually allocates a context for OpenGL
    ES 2, as specified via the parameter passed via


    initWithAPI. Most of the time we’ll be using


    kEAGLRenderingAPIOpenGLES1.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **20**


    In line 5, we grab the view object of this controller. What makes this different
    is the use of a GLKView object, as opposed to the more


    common UIView that you are probably familiar with. New to iOS5, the


    GLKView takes the place of the much messier EAGLView. With the


    former, it takes only a couple of lines of code to create a GLKView and specify
    various properties, whereas in those dark and unforgiving days before iOS5, it
    could take dozens of lines of code to do only basic


    stuff. Besides making things easier to set up, the GLKView also


    handles the duties of calling your update and refresh routines and


    adds a handy snapshot feature to get screen grabs of your scene.


    Line 6 states that we want our view to support full 24-bit colors.


    Line 7 features the first 2.0-only call. As mentioned above, shaders are little
    C-like programs designed to execute on the graphics hardware.


    They exist in either a separate file, as in this exercise, or as some


    people prefer, embedded in text strings in the main body of the code.


    Line 8 illustrates another new feature in the GLKit: effect objects. The effect
    objects are designed to hold some date and presentation


    information, such as lighting, materials, images, and geometry that are needed
    to create a special effect. On iOS5’s initial release, only two effects were available,
    one to do reflections in objects and the other to provide full panoramic images:
    Both are commonly used in graphics,


    so they are welcomed by developers who would otherwise have to


    code their own. I expect libraries of effects to eventually become


    available, both from Apple and from third parties.


    In this case, the example is using the ‘‘base effect’’ to render one of the two
    cubes. You’d likely never use an effect class to draw just basic geometry like
    this, but it demonstrates how the effect encapsulates a


    miniature version of OpenGL ES 1.1\. That is, it has a lot of the missing functionality,
    mainly in lights and materials, that you’d otherwise have to reimplement when
    porting 1.1 code over to 2.0.


    Also a part of the setup of the effect, line 9 shows us how to turn on the lights,
    followed by line 10, which actually specifies the color of the light by using
    a four-component vector. The fields are ordered as red, green, blue, and alpha.
    The colors are normalized between 0 and 1, so


    here red is the main color, with green and blue both at only 40%. If


    you guessed this is the color of the reddish cube, you’d be right. The fourth
    component is alpha, which is used to specify transparency, with 1.0 being completely
    opaque.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **21**


    Depth-testing is another important part of 3D worlds. It is used in line 11, in
    what is otherwise a very nasty topic, for occluding or blocking stuff that is
    hidden behind other stuff. What depth-testing does is to render each object on
    your screen with a depth component. Called a


    z-buffer, this lets the system know, as it renders an object, whether


    something is in front of that object. If so, the object (or pieces of it) is not
    rendered. In earlier days, z-buffering was so slow and took up so


    much extra memory that it was invoked only when absolutely


    necessary, but nowadays there is rarely any reason not to use it,


    except for some special rendering effects.


    Lines 12f (the single f meaning ‘‘the line following’’) sets the system up for
    something called Vertex Array Objects (VAOs). VAOs enable you to


    cache your models and their attributes in the GPU itself, cutting down a lot of
    overhead otherwise incurred by copying the data across the


    bus for each frame. Up until iOS4, VAOs were available only on


    OpenGL ES 2 implementations, but now both versions can use them.


    Seen here, we first get a ‘‘name’’ (actually just a unique handle) used to identify
    our array of data to the system. Afterwards, we take that


    and ‘‘bind’’ it, which merely makes it the currently available array for any calls
    that need one. It can be unbound, either by binding a new


    array handle or by using 0\. This process of naming and binding


    objects is a common one used across all of OpenGL.


    In lines 13ff, the same process is repeated, but this time on a vertex buffer.
    The difference is that a vertex buffer is the actual data, and in this case, it
    points to the statically defined data for the cube at the very top of this file.


    Line 14 supplies the cube’s data to the system now, specifying both the size and
    the location of the data, which is then sent up to the


    graphics subsystem.


    Remember how both the 3D xyz coordinates of each corner were


    embedded with the normals of the faces (the things that say where a


    face is pointing)? You can actually embed almost any data in these


    arrays, as long as the data format doesn’t change. Lines 15f tell the


    system which data is which. The first line says that we’re using


    **GLKVertexAttribPosition** data made up of three floating point values (the x,
    y, and z components), offset by 0 bytes from the start of the


    data supplied in line 14, and a total of 24 bytes long for each


    structure. That means when it comes time to draw this cube, it will


    grab three numbers from the very start of the buffer, jump 24 bytes,


    grab the next three, and so on.


    The normals are treated almost identical, except they are called


    GLKVertexAttribNormal, and start at an offset of 12 bytes, or


    immediately after the xyz data.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **22**


    Line 16 ‘‘closes’’ the vertex array object. Now, whenever we want to draw one
    of these cubes, we can just bind this specific VAO and give


    a draw command without having to supply the format and offset


    information again.


    Finally, in line 17, the buffers are deleted.'
  trans: '

    略有不同。数据分为六个部分，每部分对应一个面，每行定义该面的一个顶点或角。前三个数字是空间中的 `x`、`y` 和 `z` 值，后三个数字是该面的法线（法线是一条线，用于指定面所朝向的方向，并用于计算该面如何被照亮）。如果法线朝向光源，则该面会被照亮；如果背向光源，则处于阴影中。


    你会注意到，立方体的顶点要么是 `0.5`，要么是 `-0.5`。这没什么特别的，只是将立方体的尺寸定义为每边 `1.0` 个单位。


    这些面实际上由两个三角形组成。`OpenGL ES` 的“老大哥”可以渲染四边形面，但这个版本不行，它只能处理三边形。因此我们必须模拟四边形。这就是为什么这里定义了六个顶点：每个三角形三个。注意其中两个点是重复的。这并非绝对必要，因为仅用四个不同的顶点就可以很好地完成。


    第 3 行及之后的行指定了用于旋转和平移（移动）物体的矩阵。在此应用中，矩阵是一种紧凑的三角函数表达式形式，用于描述每个物体的各种变换，以及它们的三维几何结构最终如何映射到我们屏幕的二维表面上。在
    `OpenGL ES 1.1` 中，我们很少需要直接引用实际的矩阵，因为系统将它们对我们隐藏起来；而在 `2.0` 下，我们能看到系统所有的内部工作机制，并且必须自行处理各种变换。有时这并不美观。


    第 4 行分配了一个 `OpenGL` 上下文。这用于跟踪所有特定状态、命令以及实际在屏幕上渲染内容所需的资源。此行实际上为 `OpenGL ES 2` 分配了一个上下文，这是通过
    `initWithAPI` 传递的参数指定的。我们大多数时候会使用 `kEAGLRenderingAPIOpenGLES1`。


    在第 5 行，我们获取了该控制器的视图对象。其特殊之处在于使用了 `GLKView` 对象，而不是你可能更熟悉的常见 `UIView`。作为 `iOS5`
    的新增特性，`GLKView` 取代了更为混乱的 `EAGLView`。使用前者，只需几行代码就能创建一个 `GLKView` 并指定各种属性；而在 `iOS5`
    之前那些黑暗且不宽容的日子里，仅仅做些基本的事情就可能需要几十行代码。除了简化设置外，`GLKView` 还负责调用更新和刷新例程，并增加了便捷的快照功能，用于获取场景截图。


    第 6 行声明我们希望视图支持完整的 24 位色彩。


    第 7 行出现了第一个仅适用于 2.0 的调用。如上所述，着色器是类似 C 语言的小程序，旨在图形硬件上执行。它们既可以像本练习中这样存放在单独文件中，也可以像一些人喜欢的那样，以文本字符串的形式嵌入代码主体中。


    第 8 行展示了 `GLKit` 中的另一个新特性：效果对象。效果对象设计用于保存一些数据和呈现信息，例如创建特效所需的照明、材质、图像和几何体。在 `iOS5`
    的初始版本中，只有两种效果可用，一种用于在物体上实现反射，另一种用于提供全景图像：这两种效果在图形学中都很常用，因此受到开发者的欢迎，否则他们需要自己编写。我预计苹果公司和第三方最终会提供更多的效果库。


    在这个例子中，示例使用“基础效果”来渲染两个立方体中的一个。你很可能不会使用效果类来绘制如此基础的几何体，但这演示了效果如何封装了 `OpenGL ES 1.1`
    的微型版本。也就是说，它包含了许多缺失的功能，主要是光照和材质方面，否则在将 `1.1` 代码移植到 `2.0` 时，你将不得不重新实现这些功能。


    作为效果设置的一部分，第 9 行展示了如何开启灯光，接着第 10 行使用一个四分量向量实际指定了灯光的颜色。这些字段的顺序是红色、绿色、蓝色和 alpha。颜色值在
    `0` 和 `1` 之间标准化，所以这里红色是主色，绿色和蓝色都只有 `40%`。如果你猜这是红色立方体的颜色，那你就对了。第四个分量是 alpha，用于指定透明度，`1.0`
    表示完全不透明。


    深度测试是 3D 世界的另一个重要部分。它在第 11 行使用，这是一个相当令人头疼的话题，用于遮挡或屏蔽隐藏在其它物体后面的物体。深度测试的作用是在渲染屏幕上的每个物体时为其提供一个深度分量。这被称为
    `z-buffer`，它让系统在渲染一个物体时知道是否有物体位于该物体前面。如果是，则该物体（或其一部分）不会被渲染。在早期，z-buffer 速度非常慢且占用大量额外内存，因此只在绝对必要时才启用，但如今除了某些特殊渲染效果外，几乎没有理由不使用它。


    第 12 行及后续行（单个 `f` 表示“下一行”）为系统设置了称为 `Vertex Array Objects`（`VAO`）的功能。`VAO` 使您能够将模型及其属性缓存在
    `GPU` 本身中，从而大大减少了因每帧通过总线复制数据而产生的开销。直到 `iOS4`，`VAO` 仅在 `OpenGL ES 2` 实现中可用，但现在两个版本都可以使用。这里我们可以看到，我们首先获得一个用于向系统标识数据数组的“名称”（实际上只是一个唯一的句柄）。之后，我们获取该名称“绑定”它，这仅仅是使其成为需要数组的任何调用的当前可用数组。可以通过绑定一个新的数组句柄或使用
    `0` 来解除绑定。这种命名和绑定对象的过程在整个 `OpenGL` 中都很常见。


    在第 13 行及后续行，重复了相同的过程，但这次是在顶点缓冲区上。区别在于，顶点缓冲区是实际的数据，在本例中，它指向本文件最顶部静态定义的立方体数据。


    第 14 行现在向系统提供了立方体数据，指定了数据的大小和位置，然后将其发送到图形子系统。


    还记得每个角的 3D `xyz` 坐标是如何与面的法线（指示面朝向的东西）嵌入在一起的吧？实际上，只要数据格式不变，可以在这类数组中嵌入几乎任何数据。第 15
    行及后续行告诉系统哪个数据对应什么。第一行说我们使用的 `GLKVertexAttribPosition` 数据由三个浮点值（`x`、`y` 和 `z` 分量）组成，从第
    14 行提供的数据起始处偏移 `0` 个字节，每个结构体总长度为 `24` 个字节。这意味着在绘制这个立方体时，它会从缓冲区的开头获取三个数字，跳过后面的
    `24` 个字节，再获取接下来的三个数字，依此类推。


    法线的处理方式几乎相同，只是它们被称为 `GLKVertexAttribNormal`，并且起始偏移量为 `12` 个字节，也就是紧跟在 `xyz` 数据之后。


    第 16 行“关闭”了顶点数组对象。现在，每当我们想要绘制其中一个立方体时，只需绑定这个特定的 `VAO` 并发出绘制命令即可，无需再次提供格式和偏移量信息。


    最后，在第 17 行，缓冲区被删除。

