    该信息随后被用于构建一颗二叉空间分割（BSP）树。3D 世界中的任何位置都可以映射到该树中的一个元素，通过遍历该树，可以根据观察者的位置获取最佳绘制顺序。这种方法执行速度非常快，但设置起来很复杂。幸运的是，对于我们简单的宇宙来说，这完全是杀鸡用牛刀。第二种深度排序方法并非真正的排序，而是利用了每个像素的`z`分量。屏幕上的像素有`x`和`y`值，尽管我面前的`Viewsonic`显示器是平面的
    2D 表面，但它也可以有一个`z`值。当一个像素准备绘制在另一个像素之上时，会比较它们的`z`值，距离更近的那个像素胜出。这种方法称为`z-buffering`（深度缓冲），它非常简单直观，但对于非常复杂的场景，可能会消耗额外的
    CPU 时间和显存。我更喜欢后者，并且`OpenGL`使得实现`z-buffering`非常容易，但`GLKit`让它变得更简单。在撰写本书时，`iOS5`发布了，我欣喜地发现，我可以愉快地删除大约
    1.5 页的代码和注释，只需在视图控制器的初始化代码中添加一行即可：


    ```

    glEnable(GL_DEPTH_TEST);

    ```


    现在，`GLKViewController`管理所有设置代码，而`Apple`的向导生成的代码默认使用深度缓冲区，格式为：


    ```

    view.drawableDepthFormat = GLKViewDrawableDepthFormat24;

    ```


    你可以选择不使用缓冲区，或使用 16 位或 24 位分辨率的缓冲区。额外的 8 位保留给模板缓冲区（`stencils`）使用，这将在后面介绍。


    如果一切正常，你现在应该能看到地球在太阳前方时会遮挡太阳，而在太阳后方时则被遮挡。见图 4-18。


    ![Image 147](img/index-135_1.jpg)


    **图 4-18.** 使用 z-buffer


    **总结**


    本章涵盖了场景光照和着色的各种方法，以及用于确定每个顶点颜色的数学算法。你还学习了漫反射、镜面反射、自发光和环境光照，以及将普通灯光变为聚光灯的相关参数。太阳系模型进行了更新，以支持多个对象，并使用`z-buffering`来正确处理对象遮挡。


    [www.it-ebooks.info](http://www.it-ebooks.info)


