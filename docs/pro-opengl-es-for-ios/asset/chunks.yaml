    # 作为一切正式 OpenGL 内容的守护者，Khronos Group 已就此主题出版了多本内容详尽的书籍。人们亲切地以其封面的颜色称呼它们：红皮书（官方编程指南）、蓝皮书（教程与参考）、橙皮书（着色语言）、绿皮书（Mac
    上的 OpenGL）以及略带紫色的书（`OpenGL ES 2`）。还有大量其它第三方书籍，其深入程度远超我所能触及。同样，也有许多专门提供 OpenGL
    教程的网站；`nehe.gamedev.net` 是迄今为止最好的网站之一，在我撰写本文时，它已提供近 50 个不同的教程。


    当您研读其他笔者（无论是来自其他书籍还是网络）的作品时，只需记住，是本书为您带来了太阳、地球和星辰。没有多少其他书能自称有此成就。


    [www.it-ebooks.info](http://www.it-ebooks.info)


