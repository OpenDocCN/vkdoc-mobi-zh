    The intersections are slightly different colors. This shows one of the mystifying
    gotchas in OpenGL: like with most 3D frameworks, the blending will be slightly
    different depending on the order of the faces and colors when rendered. In this
    case, it is actually quite simple to figure out what’s going on. In Figure 6-4
    (left), the blue square is drawn first with an alpha of .5\. So, even though the
    blue color triplet is defined as 0,0,1, the alpha value will knock that down to
    0,0,.5 while it is written to the frame buffer. Now add the red square with similar
    properties. Naturally, the red will write to the black part of the frame buffer
