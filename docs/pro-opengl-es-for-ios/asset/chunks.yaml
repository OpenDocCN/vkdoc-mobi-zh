- fmt: '# 章节 6：混合效果


    红色部分的百分之五十会被写入目标区域。黑色区域将呈现暗红色，但只有`glColor4f()`中指定的`1.0`值的百分之五十。到目前为止，一切正常。现在，在蓝色之上，红色值的百分之五十与蓝色值的百分之五十混合：混合颜色
    = 源颜色 * 源颜色的 Alpha + (1.0 - 源颜色的 Alpha) * 目标颜色


    或者，基于前面红色方块示例中的每个分量值，以下是计算过程：


    `红色 = 1.0 * 0.5 + (1.0 - 0.5) * 0.0`


    `绿色 = 0.0 * 0.5 + (1.0 - 0.5) * 0.0`


    `蓝色 = 0.0 * 0.5 + (1.0 - 0.5) * 1.0`


    因此，片段像素的最终颜色应为`0.5, 0.0, 0.5`，即洋红色。现在，红色和由此产生的洋红色都略偏暗。如果你希望让它们更亮一些，该怎么办呢？如果能有一种方法混合颜色的全部强度就好了。你会使用`1.0`的
    Alpha 值吗？不会。为什么呢？以蓝色为目标颜色，源 Alpha 为`1.0`，前文的蓝色通道等式将是`0.0 * 1.0 + (1.0 - 1.0) *
    1.0`。结果等于`0`，而红色将是`1.0`，即纯色。你实际想要的是，在写入黑色背景时，红色最亮，蓝色也同样最亮。为此，你需要使用一个能同时以全强度写入两种颜色的混合函数，例如`GL_ONE`。这意味着如下操作：


    `glBlendFunc(GL_ONE, GL_ONE);`


    回到等式，使用源三元组红色=1、绿色=0、蓝色=0 和目标颜色红色=0、绿色=0、蓝色=1（Alpha 默认为 1.0），计算结果如下：


    `红色 = 1 * 1 + 0 * 1`


    `绿色 = 0 * 1 + (0 - 0) * 1`


    `蓝色 = 0 * 1 + (1 - 0) * 1`


    这样得出的颜色中，红色=1、绿色=0、蓝色=1。这就是洋红色，各位，如图 6-3 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 177](index-177_1.jpg)


    **第 6 章：它会混合吗？**


    **174**


    图 6-3. 混合红色和蓝色的全强度


    现在，是时候进行另一个实验了。采用上一个示例的代码，将两个 Alpha 值都设为`0.5`，并将混合函数重置为传统的透明度值：


    `glBlendFunc(GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA);`


    运行此修改后的代码后，注意混合后的颜色，并注意远方的方块在`-4.0`距离处是蓝色的，并且它是最先被渲染的，红色方块是第二个。现在，颠倒绘制的颜色顺序，然后运行。哪里出了问题？你应该得到类似图
    6-4 的结果。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 178](index-178_1.jpg)


    ![Image 179](index-178_2.jpg)


    **第 6 章：它会混合吗？**


    **175**


    图 6-4. 左侧是先绘制蓝色（左），而右侧是先绘制红色（右）。


    交叉部分的颜色略有不同。这揭示了 OpenGL 中一个令人费解的问题：与大多数 3D 框架一样，混合效果会因渲染时面和颜色的顺序而略有不同。在这种情况下，要弄清楚发生了什么其实很简单。在图
    6-4（左）中，蓝色方块首先被绘制，其 Alpha 值为`0.5`。因此，即使蓝色颜色三元组被定义为`0,0,1`，Alpha 值也会在写入帧缓冲区时将其降低到`0,0,0.5`。现在，添加具有类似属性的红色方块。自然，红色会以与蓝色相同的方式写入帧缓冲区的黑色部分，因此最终值将是`0.5,0,0`。但请注意，当红色绘制在蓝色之上时会发生什么。由于蓝色已经处于其强度的一半，混合函数会将其进一步削减至`0.25`，这是混合函数的目标部分`(1.0
    - 源 Alpha) * 蓝色 + 目标颜色`的结果，即`(1.0 - 0.5) * 0.5 + 0`，也就是`0.25`。最终颜色为`0.5, 0, 0.25`。由于蓝色强度较低，它对合成颜色的贡献较小，从而让红色占据主导地位。现在，在图
    6-4（右）中，顺序是相反的，因此蓝色占据主导地位，最终颜色为`0.25, 0, 0.5`。


    [www.it-ebooks.info](http://www.it-ebooks.info)


