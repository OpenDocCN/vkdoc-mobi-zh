    ![Image 226](index-232_1.jpg)


    **CHAPTER 7: Well-Rendered Miscellany**


    **229**


    **Blob Shadows**


    Blob shadows are a total cheat. It simply assumes that there is no real direct
    light source, so the object’s shadow is little more than a blob underneath, as
    shown in Figure 7-10\. As you can see, this won’t work too well if our occluder
    (the shadow casting thing) is a giant man-eating burrito.


    Figure 7-10\. A blob shadow texture that is placed under all objects


    **Projection Shadows**


    Projection shadows are the ‘‘easiest’’ of the dynamic shadows algorithms to implement,
    but of course that also means they come with many restrictions, namely, that projection
    shadows work best when casting a shadow on a large flat surface, as shown in Figure
    7-11\. Also, shadows cannot be cast on arbitrary objects. As with the other approaches,
    the basic process is to take a snapshot of sorts from the light’s point of view
    and one from the camera’s. The light’s view is squashed down flat on the plane,
    painted a suitable shadowy color (aka dark), followed by the occluder being rendered
    on top.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 227](index-233_1.jpg)


    **CHAPTER 7: Well-Rendered Miscellany**


    **230**


    Figure 7-11\. Projection of a shadow on a flat plane that is then ‘‘reprojected’’
    out to poke the viewer’s eye The shaded area is calculated by using the intersection
    of the vectors and the plane, which travel from the light source by way of each
    of the vertices. Each point on the plane forms a ‘‘new’’ object that can then
    be transformed, as anything else on the plane would be. Listing 7-15 shows how
    this is coded.


    Let’s start again with the basic bouncy cube demo (even though much of it will
    be changed for the shadow code, it’ll still serve as a working template), but
    we’ll swap in new view controller code. Listing 7-11 covers some of the initialization
    parameters.


    Listing 7-11\. The initialization stuff to add to the view controller


    **- (void)viewDidLoad**


    **{**


    **[super viewDidLoad];**


    ****//Normal wizard-produced code deleted for clarity.**


    ******m_WorldRotationX=35.0; //1**


    **m_WorldRotationY=0.0;**


    **[www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 7: Well-Rendered Miscellany**


    **231**


    **m_SpinX=0.0;**


    **m_SpinY=0.0;**


    **m_SpinZ=0.0;**


    ****m_WorldZ=-6.0; //2**


    **m_WorldY=-1.0;**


    ****m_LightRadius=2.5; //3**


    ****[(EAGLView *)self.view setContext:context];**


    **}**


    In lines 1f, the world rotations are set up; 90º will have you looking straight
    down in the scene, while 0º will have you looking straight on the side.


    The world locations for the scene are established in lines 2f.


    Decreasing z will move the scene further away; increasing z moves it


    closer. Decreasing y will move it down on the screen, and increasing it will move
    it up.


    **m_LightRadius** in line 3 means the radius of the circle that the light moves
    above the scene.


    The **drawInRect()** method is covered in Listing 7-12. The most immediate change
    you’ll notice is that the geometry and color arrays are nowhere to be found. Actually,
    I have now moved them up to the top of the file as globally defined data. That
    made it a little easier to break the rendering stuff into smaller bits. Interestingly
    enough, a lot of OpenGL geometric descriptions are kept in **.h** files-----really,
    really, really big **.h** files.


    Apple actually recommends this approach for some tasks and uses it in its OpenGL


    example that draws the infamous teapot. That file is more than 3,000 lines long.


    Listing 7-12\. The ***drawInRect()*** method for projected shadows


    **- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect**


    **{**


    **int lightsOnFlagTrigger=300; //1**


    **bool lightsOnFlag=true;**


    **static int frameNumber=0;**


    **GLfloat minY=2.0;**


    **static GLfloat transY=0.0;**


    ******m_TransY=(GLfloat)(sinf(transY)/2.0)+minY; //2**


    ****glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);**


    **glClearColor(0.0, 0.0, 0.0, 1.0);**


    ****glEnable(GL_DEPTH_TEST);**


    ****[self updateLightPosition]; //3**'
