- fmt: 'Unfortunately, there is no complete GLUT library for iOS as of this writing,
    so I’ve had to create my own where I stuff most any basic 3D utility method. With
    that in mind, create a new object called `miniglu.mm` (the ``mm`` suffix lets
    the Objective C compiler understand straight C code mixed with ObjC), add the
    the contents of Listing 8-6, and add static `GLKQuaternion m_Quaternion` to the
    top of the file. And make sure to add `miniglu.h` where needed.


    This is kept as generic-C because GLUT is meant to be as portable as possible.


    Listing 8-6\. Two routines for `miniGLU.mm`


    ```

    void gluLookAt(GLfloat eyex, GLfloat eyey, GLfloat eyez,

    GLfloat centerx, GLfloat centery, GLfloat centerz,

    GLfloat upx, GLfloat upy, GLfloat upz)

    {

    GLKVector3 up; //1

    GLKVector3 from,to;

    GLKVector3 lookat;

    GLKVector3 axis;

    float angle;


    lookat.x=centerx;

    //2

    lookat.y=centery;

    lookat.z=centerz;


    from.x=eyex;

    from.y=eyey;

    from.z=eyez;


    to.x=lookat.x;

    to.y=lookat.y;

    to.z=lookat.z;


    up.x=upx;

    up.y=upy;

    up.z=upz;


    [www.it-ebooks.info](http://www.it-ebooks.info)


    CHAPTER 8: Putting It All Together


    255


    GLKVector3 temp = GLKVector3Subtract(to,from);

    //3

    GLKVector3 n=GLKVector3Normalize(temp);


    temp = GLKVector3CrossProduct(n,up);

    GLKVector3 v=GLKVector3Normalize(temp);


    GLKVector3 u = GLKVector3CrossProduct(v,n);


    m_Quaternion= //4

    GLKQuaternionMakeWithMatrix3(GLKMatrix3MakeWithRows(v,u,GLKVector3Negate(n)));


    axis=GLKQuaternionAxis(m_Quaternion);

    angle=GLKQuaternionAngle(m_Quaternion);


    glRotatef(angle*57.29, axis.x, axis.y, axis.z); //5

    }


    GLKQuaternion gluGetOrientation()

    {

    return m_Quaternion;

    }

    ```


    Before we continue, `gluLookAt()` will need some, er, a lot of explanation. `gluLookAt()`
    does exactly what its name implies. You pass it the location of your eye point,
    the thing you want to look at, and an up vector to specify roll angles. Naturally,
    straight up would be equal to no roll whatsoever. But you still need to supply
    it.


    Let’s take a closer look:


    As referenced earlier, we need to grab points or vectors to fully describe our
    position in space and that of the target, as in lines 1ff. The up vector is local
    to your eye point, and it is typically just a unit vector pointing up the y-axis.
    You could modify this if you wanted to do banking rolls.


    In lines 2ff, the terms passed through in discrete values are mapped to `GLKVector3`
    objects. Why instead of vectors in? The official GLUT libraries don’t use vector
    objects, so this matches the existing standard.


    Lines 3ff generate three new vectors, two using cross products. This ensures everything
    is both normalized and the axis squared.


    Some examples of `gluLookAt()` generate a matrix. Here, quaternions are used instead.
    In line 4, the quaternion is created by our new vectors and is used to get the
    axis/angle parameters that `glRotatef()` likes to use, as in line 5. Note that
    the resulting quaternion is cached via a global that can be picked up later if
    the instantaneous attitude is needed via `gluGetOrientation()`. It’s clumsy, but
    it works. In real life, you probably wouldn’t want to do this, because it assumes
    only a single viewpoint in your entire world. In reality, you might want to have
    more than one—if, for example, you wanted two simultaneous displays showing your
    object from two different vantage points.


