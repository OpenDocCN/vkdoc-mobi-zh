    遗憾的是，截至撰写本文时，iOS 尚没有完整的 GLUT 库，因此我不得不自行创建了一个，将大多数基础 3D 工具方法都塞了进去。考虑到这一点，请创建一个名为
    `miniglu.mm` 的新对象（`mm` 后缀能让 Objective C 编译器理解混合了 ObjC 的纯 C 代码），添加代码清单 8-6 的内容，并在文件顶部添加静态变量
    `GLKQuaternion m_Quaternion`。同时，请确保在需要的文件中引入 `miniglu.h`。


    这段代码保持为通用 C 语言，因为 GLUT 的设计初衷就是尽可能可移植。


    **代码清单 8-6：** `miniGLU.mm` 的两个例程


    ```

    void gluLookAt(GLfloat eyex, GLfloat eyey, GLfloat eyez,

    GLfloat centerx, GLfloat centery, GLfloat centerz,

    GLfloat upx, GLfloat upy, GLfloat upz)

    {

    GLKVector3 up; //1

    GLKVector3 from,to;

    GLKVector3 lookat;

    GLKVector3 axis;

    float angle;


    lookat.x=centerx;

    //2

    lookat.y=centery;

    lookat.z=centerz;


    from.x=eyex;

    from.y=eyey;

    from.z=eyez;


    to.x=lookat.x;

    to.y=lookat.y;

    to.z=lookat.z;


    up.x=upx;

    up.y=upy;

    up.z=upz;


