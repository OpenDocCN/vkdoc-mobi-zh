    \ and most easily understood. So now, we’re going to start looking at the slightly\
    \ messier stuff and see how it can be integrated into your applications.\n\nIn\
    \ its manual on OpenGL ES, Apple has a section called “Best Practices.” I’ll cover\
    \ those in detail in this chapter followed by a look at some of the tools Apple\
    \ provides developers specifically for analyzing and debugging OpenGL programs.\n\
    \n### Vertex Buffer Objects\n\nThe two main arenas of performance enhancements\
    \ are minimizing the data transfer to and from the graphics hardware and minimizing\
    \ data itself. Vertex buffer objects (VBOs) are part of the former process. When\
    \ you generated your geometry and sent it merrily along to be displayed, the usual\
    \ process was to tell the system where to find each of the needed blocks of data,\
    \ enabling which data to use (vertex, normals, colors, and texture coordinates)\
    \ and then drawing it. Each time `glDrawArrays()` or `glDrawElements()` is called,\
    \ all of the data must be packed up and shipped to the graphics processing unit\
    \ (GPU). Each data transfer takes a finite amount of time, and performance could\
    \ be increased if, say, some of the data could be cached on the GPU itself. Vertex\
    \ buffer objects are a means of allocating commonly used data on the GPU that\
    \ can then be called to be displayed without having to resubmit it each time.\n\
    \nThe process of creating and using VBOs should be familiar to you because it\
    \ mimics the process used for textures: first generate a “name,” allocate space\
