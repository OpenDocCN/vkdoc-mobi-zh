    **在好莱坞走向成熟**


    计算机图形学在20世纪80年代真正开始崭露头角，这要归功于好莱坞以及那些性能越来越强大、成本却越来越低的机器。例如，1985年推出的备受喜爱的康懋达`Amiga`，售价不到2000美元，却为消费市场带来了先进的多任务操作系统和彩色图形，而这些此前是价值超过10万美元的工作站的专属。见图1-8。


