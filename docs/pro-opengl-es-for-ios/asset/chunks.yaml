- fmt: "If your head hurts, it’s understandable. This is a lot of fussing around to\
    \ draw a couple of cubes. But a visual world is a rich one, and needs a lot of\
    \ stuff to define it. And we’re far from done yet. But the principles remain the\
    \ same.\n\n## Showing the Scene\n\nIn Listing 1-2, we can now actually draw the\
    \ data to the screen and see some pretty pictures. This uses two different approaches\
    \ to display things. The first hides everything under the new GLKit available\
    \ from iOS5 and beyond. It hides all of the shaders and other stuff that OpenGL\
    \ ES 2 normally exposes, and does so under the new `GLKBaseEffect` class. The\
    \ second way is just straight 2.0 stuff. Together, the both of them show how the\
    \ two different approaches can be part of the same rendering loop.\n\nBut remember,\
    \ using the effects classes to render a simple cube is overkill, sort of like\
    \ hopping in the car to drive 6 feet to the mailbox.\n\n**Note:** Apple has pitched\
    \ the use of `GLKBaseEffect` as a means to get 1.1 users to port their code to\
    \ 2.0, because it has lights, materials, and other features that 2.0 doesn’t have.\
    \ But it really doesn’t work well for a simple migration because it has far too\
    \ many limitations to host the entire 1.1 environment of most OpenGL apps.\n\n\
    **Listing 1-2\\. Rendering the scene to the display.**\n\n```\n- (void)update\
    \ //1\n{\n    //2\n    float aspect = fabsf(self.view.bounds.size.width / self.view.bounds.size.height);\n\
    \    GLKMatrix4 projectionMatrix =\n    GLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f),\
    \ aspect, 0.1f, 100.0f);\n\n    self.effect.transform.projectionMatrix = projectionMatrix;\
    \ //3\n\n    GLKMatrix4 baseModelViewMatrix = //4\n    GLKMatrix4MakeTranslation(0.0f,\
    \ 0.0f, -4.0f);\n    \n    baseModelViewMatrix = //5\n    GLKMatrix4Rotate(baseModelViewMatrix,\
    \ _rotation, 0.0f, 1.0f, 0.0f);\n\n    // Compute the model view matrix for the\
    \ object rendered with GLKit.\n    GLKMatrix4 modelViewMatrix = //6\n    GLKMatrix4MakeTranslation(0.0f,\
    \ 0.0f, -1.5f);\n\n    modelViewMatrix = //7\n    GLKMatrix4Rotate(modelViewMatrix,\
    \ _rotation, 1.0f, 1.0f, 1.0f);\n\n    modelViewMatrix = //8\n    GLKMatrix4Multiply(baseModelViewMatrix,\
    \ modelViewMatrix);\n\n    self.effect.transform.modelviewMatrix = modelViewMatrix;\
    \ //9\n\n    // Compute the model view matrix for the object rendered with ES2.\n\
    \    modelViewMatrix =\n    GLKMatrix4MakeTranslation(0.0f, 0.0f, 1.5f); //10\n\
    \    \n    modelViewMatrix =\n    GLKMatrix4Rotate(modelViewMatrix, _rotation,\
    \ 1.0f, 1.0f, 1.0f);\n    \n    modelViewMatrix =\n    GLKMatrix4Multiply(baseModelViewMatrix,\
    \ modelViewMatrix);\n\n    _normalMatrix = //11\n    GLKMatrix3InvertAndTranspose(GLKMatrix4GetMatrix3(modelViewMatrix),\
    \ NULL);\n\n    //12\n    _modelViewProjectionMatrix = GLKMatrix4Multiply(projectionMatrix,\
    \ modelViewMatrix);\n\n    _rotation += self.timeSinceLastUpdate * 0.5f; //13\n\
    }\n\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n{\n    glClearColor(0.65f,\
    \ 0.65f, 0.65f, 1.0f); //14\n    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\
    \n    glBindVertexArrayOES(_vertexArray); //15\n\n    // Render the object with\
    \ GLKit.\n    [self.effect prepareToDraw]; //16\n\n    glDrawArrays(GL_TRIANGLES,\
    \ 0, 36); //17\n\n    // Render the object again with ES2.\n    glUseProgram(_program);\
    \ //18\n\n    glUniformMatrix4fv(uniforms[UNIFORM_MODELVIEWPROJECTION_MATRIX],\
    \ 1, 0, _modelViewProjectionMatrix.m);\n    glUniformMatrix3fv(uniforms[UNIFORM_NORMAL_MATRIX],\
    \ 1, 0, _normalMatrix.m);\n\n    glDrawArrays(GL_TRIANGLES, 0, 36); //19\n}\n\
    ```\n\nLet’s take a look at what’s going on here:\n\nLine 1, the start of the\
    \ `update` method, is actually one of the delegate calls from the new `GLKViewController`\
    \ object. This supports frame-rate hints, as in, “I’d love to have my new game\
    \ Dangerous Poodles update”"
