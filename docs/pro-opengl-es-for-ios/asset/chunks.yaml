    they included objects with various reflective and refractive


    properties. Glass items were common subjects in various early ray-


    tracing efforts, as shown in Figure 1-9.


    Frank Crow developed the first practical method of anti-aliasing in computer graphics.
    Aliasing is the phenomenon that generates jagged


    edges because of the relatively poor resolution of the display. Crow’s method
    would smooth out everything from lines to text, producing far


    more natural and pleasing imagery. Note that one of Lucasfilm’s early


    games was called Rescue on Fractalus. The bad guys were named


    jaggies (another term for anti-aliasing).


    Star Trek II: The Wrath of Khan brought with it the first entirely


    computer-generated sequence used to illustrate how a device called


    the Genesis Machine could generate life on a lifeless planet. That one simulation
    was called ‘‘the effect that wouldn’t die’’ because of its


    groundbreaking techniques in flame and particle animation, along with


    the use of fractal landscapes.


    Figure 1-9\. Sophisticated images such as this are within the range of hobbyists
    with programs such as the open source POV-Ray. Photo by Gilles Tran, 2006.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **11**


    The 1990s brought the T1000 ‘‘liquid metal’’ terminator in Terminator 2: Judgment
    Day, the first completely computer-generated full-length feature film of Toy Story,
    believable animated dinosaurs in Jurassic Park, and James Cameron’s Titanic, all
    of which helped solidified CG as a common tool in the Hollywood director’s arsenal.


    By the decade’s end, it would be hard to find any films that didn’t have computer
    graphics as part of the production in either actual effects or in postproduction
    to help clean up various scenes. New techniques are still being developed and
    applied in ever more spectacular fashion, as in Disney’s delightful Up! or James
    Cameron’s beautiful Avatar.


    Now, once again, take out your i-device and realize what a little technological
    marvel it is. Feel free to say ‘‘wow’’ in hushed, respectful tones.


    **Toolkits**


    All of the 3D wizardry referenced earlier would never have been possible without
    software. Many CG software programs are highly specialized, and others are more
    general purpose, such as OpenGL ES, the focus of this book. So, what follows are
    a few of the many toolkits available.


    **OpenGL**


    Open Graphics Library (OpenGL) came out of the pioneering efforts of SGI, the
    maker of high-end graphics workstations and mainframes. Its own proprietary graphics
    framework, IRIS-GL, had grown into a de-facto standard across the industry. To
    keep customers as competition increased, SGI opted to turn IRIS-GL into an open
    framework so as to strengthen their reputation as the industry leader. IRIS-GL
    was stripped of non-graphics-related functions and hardware-dependent features,
    renamed OpenGL, and released in early 1992\. As of this writing, version 4.1 is
    the most current one available.


    As small handheld devices became more common, OpenGL for Embedded Systems (OpenGL
    ES) was developed, which was a stripped-down version of the desktop version. It
    removed many of the more redundant API calls while simplifying other elements.
    making it run efficiently on lower-power CPUs. As a result, it has been widely
    adopted across many platforms, such as Android, iOS, Nintendo 3DS, and BlackBerry
    (OS 5.0 and newer).


    There are two main flavors of OpenGL ES, 1.x and 2.x. Many devices support both.
    1.x is the higher-level variant, based on the original OpenGL specification. Version
    2.x (yes, I know it’s confusing) is targeted toward more specialized rendering
    chores that can be handled by programmable graphics hardware.


    **Direct3D**'
