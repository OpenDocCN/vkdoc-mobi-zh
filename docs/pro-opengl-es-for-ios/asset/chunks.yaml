    \ classic 1973 book *Principles of Interactive Computer Graphics* has `z` going\
    \ up and `+y` going into the screen. In his book, Bruce Artwick, the creator of\
    \ Microsoft’s Flight Simulator, shows `x` and `y` in the viewing plane but `+z`\
    \ going *into* the screen. And yet another book has (get this!) `z` going up,\
