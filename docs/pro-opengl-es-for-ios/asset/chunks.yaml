    另一种常见模型是 HSV，代表色调-饱和度-明度，在许多图形软件或颜色选择器中，你会经常发现它作为 RGB 的替代方案。HSV 于 20 世纪 70 年代专门为计算机图形学开发，它将颜色描绘为一个
    3D 圆柱体（图 4-1）。饱和度从内向外变化，明度从下到上变化，而色调则围绕边缘分布。其变体 HSL 用亮度替代了明度。图 4-2 展示了 macOS 颜色选择器的多个版本。


    ![图 4-1. HSV 色轮或圆柱体（来源：维基共享资源）](img/index-98_1.jpg)


