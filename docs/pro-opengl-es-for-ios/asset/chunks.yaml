    ## About the Author


    **Mike Smithwick**’s slow descent into programming computers began when he first
    got a little 3-bit plastic DigiComp 1 computer in 1963 (http://en.wikipedia.org/wiki/Digi-Comp_I).
    Not too long before that, he got interested in planetariums. Eventually he graduated
    to programming NASA flight simulator graphics through the 1980s. But what he really
    wanted to do was become a syndicated cartoonist (really!). Failing to get any
    syndication deals, he wrote and sold the popular Distant Suns planetarium program
    for the Commodore Amiga, old-school Mac, and Microsoft Windows while selling himself
    as a contract programmer on the side, working for Apple, 3DO, Sense-8, and Epyx.
    Eventually he landed a “real” job at Live365, working on client software Windows
    and Windows Mobile 6, TiVo, Symbian (ahhh…Symbian…), and iPhone. After 13 short
    years he decided to go back to the dark side of contracting, writing, and working
    on Distant Suns for the iPhone after it became modest success in the App Store.
    Sometimes late at night, he thinks he can hear his Woz-autographed Apple II sobbing
    for attention from the garage. He may be contacted via `www.distantsuns.com`,
    `lazyastronomer` on AIM, and `@distantsuns` or `@lazyastronomer` on Twitter.


    ix


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 292](index-361_1.jpg)


    ## About the Technical Reviewer


    **Leila Muhtasib** has been passionate about programming since she wrote her first
    program on MS-DOS. Since then, she''s graduated with a Computer Science degree
    from the University of Maryland, College Park. Fascinated by mobile technology
    and its increasing ubiquity, she has been programming iPhone applications since
    the first SDK was released. She is now a Senior Software Engineer and Tech Lead
    of a mobile development team at Cisco Systems.


    x


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ## Acknowledgments


    Thanks to Corbin Collins and Richard Carey, my long-suffering editors, for putting
    up with a first-time author, someone who clearly needs to read *Writing iOS Books
    for Beginners*.


    And to Leila Muhtasib, my tech editor, who was every bit as good as I thought
    she would be.


    And to Matthew Moodie and Mark Beckner for approving the schedule slippage so
    I could add in iOS 5 content, ensuring that the book wasn’t obsolete on its release
    day.


    And, of course, to Steve Jobs for never compromising and for producing insanely
    great tools that make work fun and make fun “funner.”


    xi


    [www.it-ebooks.info](http://www.it-ebooks.info)


