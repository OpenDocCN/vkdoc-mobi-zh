- fmt: '# Procedural Textures and Image Textures


    Procedural textures, and to a lesser degree image textures, can be classified
    in a spectrum of complexity from random to structured. Random, or stochastic textures,
    can be thought of as "looking like noise," like a fine-grained material such as
    sand, dust, gravel, the grain in paper, and so on. Near stochastic could be flames,
    grass, or the surface of a lake. On the other hand, structured textures have broad
    recognizable features and patterns. A brick wall, wicker basket, plaid, or herd
    of geckos would be structured.


    ## Image Textures


    As referenced earlier, image textures are just that. They can serve as a surface
    or material texture such as mahogany wood, steel plating, or leaves scattered
    across the ground. If done right, these can be seamlessly tiled to cover a much
    larger surface than the original image would suggest. And because they come from
    real life, they don''t need the sophisticated software used for the procedural
    variety. Figure 5-4 shows the chalice scene, but this time with wood textures,
    mahogany for the chalice, and alder for the cone, while the cube remains gold.


    Figure 5-4. Using real-world image textures


    Besides using image textures as materials, they can be used as pictures themselves
    in your 3D world. A rendered image of an iPad can have a texture dropped into
    where the screen is. A 3D city could use real photographs for windows on the buildings,
    for billboards, or for family photos in a living room.


    ## OpenGL ES and Textures


    When OpenGL ES renders an object, such as the mini solar system in Chapter 4,
    it draws each triangle and then lights and colorizes them based on the three vertices
    that make up each face. Afterward it merrily goes to the next one, singing a jaunty
    little tune no doubt. A texture is nothing more than an image. As you learned
    earlier in the chapter, it can be generated on the fly to handle context-sensitive
    details (such as cloud patterns), or it can be a JPEG, PNG, or anything else.
    It is made up of pixels, of course, but when operating as a texture, they are
    called texels. You can think of an OpenGL ES texture as a bunch of little colored
    "faces" (the texels), each of the same size and stitched together in one sheet
    of, say, 256 such faces on a side. Each face is the same size as each other one
    and can be stretched or squeezed so as to work on surfaces of any size or shape.
    They don''t have corner geometry to waste memory storing `xyz` values, can come
    in a multitude of lovely colors, and give a lot of bang for the buck. And of course
    they are extraordinarily versatile.


    Like your geometry, textures have their own coordinate space. Where geometry denotes
    locations of its many pieces using the trusty Cartesian coordinates known as `x`,
    `y`, and `z`, textures use `s` and `t`. The process that applies a texture to
    some geometric object is called UV mapping. (`s` and `t` are used only for OpenGL
    world, whereas others use `u` and `v`. Go figure.)


    So, how is this applied? Say you have a square tablecloth that you must make fit
    a rectangular table. You need to attach it firmly along one side and then tug
    and stretch it along the other until it just barely covers the table. You can
    attach just the four corners, but if you really want it to "fit," you can attach
    other parts along the edge or even in the middle. That''s a little how a texture
    is fitted to a surface.


    Texture coordinate space is normalized; that is, both `s` and `t` range from 0
    to 1. They are unitless entities, abstracted so as not to rely on either the dimensions
    of the source or the destination. So, the face to be textured will carry around
    with its vertices `s` and `t` values that lay between 0.0 to 1.0, as shown in
    Figure 5-5.


    Figure 5-5. Texture coordinates go from 0 to 1.0, no matter what the texture is.


    In the most elementary example, we can apply a rectangular texture to a rectangular
    face and be done with it, as illustrated in Figure 5-5. But what if you wanted
    only part of the texture? You could supply a PNG that had only the bit you wanted,
    which is not very convenient if you wanted to have many variants of the thing.
    However, there''s another way. Merely change the `s` and `t` coordinates of the
    destination face. Let''s say all you wanted was the upper-left quarter of the
    Easter Island statue I call Hedly. All you need to do is change the coordinates
    of the destination, and those coordinates are based on the proportion of the image
    section you want, as shown in Figure 5-6. That is, because you want the image
    to be cropped halfway down the `s`-axis, the `s` coordinate will no longer go
    from 0 to 1 but instead from 0 to .5. And the `t` coordinate would then go from
    .5 to 1.0. If you wanted the lower-left corner, you''d use the same 0 to .5 ranges
    as the `s` coordinate.


    Also note that the texture coordinate system is resolution independent. That is,
    the center of an image that is 512 on a side would be (.5,.5), just as it would
    be for an image 128 on a side.


    Figure 5-6. Clipping out a portion of the texture by changing the texture coordinates


    Textures are not limited to rectilinear objects. With careful selections of the
    `st` coordinates on your destination face, you can do some of the more colorful
    shapes depicted in Figure 5-7.


    Figure 5-7. Mapping an image to unusual shapes


    If you keep the image coordinates the same across the vertices of your destination,
    the image''s corners will follow those of the destination, as shown in Figure
    5-8.


    Figure 5-8. Distorting images can give a 3D effect on 2D surfaces.


    Textures can also be tiled so as to replicate patterns that depict wallpaper,
    brick walls, sandy beaches, and so on, as shown in Figure 5-9. Notice how the
    coordinates actually go beyond the upper limit of 1.0. All that does is to start
    the texture repeating so that, for example, an `s` of .6 equals an `s` of 1.6,
    2.6, and so on.


    Figure 5-9. Tiled images are useful for repeated patterns such as those used for
    wallpaper or brick walls.


    Besides the tiling model shown in Figure 5-9, texture tiles can also be "mirrored,"
    or clamped, which is a mechanism for dealing with `s` and `t` when outside of
    the 0 to 1.0 range.


    Mirrored tiling repeats textures as above, but also flips columns/rows of alternating
    images, as shown in Figure 5-10 (left). Clamping an image means that the last
    row or column of texels repeats, as shown in Figure 5-10 (right). Clamping looks
    like a total mess with my sample image but is useful when the image has a neutral
    border. In that case, you can prevent any image repetition on either or both axes
    if `s` or `v` exceeds its normal bounds.


    Figure 5-10. A mirrored-repeat for just the `s`-axis (left), the texture clamped
    (right)


    > **Note:** The problem with the right edge in Figure 5-10 suggests that textures
    designed to be clamped should have a 1-pixel-wide border to match the colors of
    the object to which they are bound. Unless you think it''s really cool, then of
    course that trumps nearly everything.'
  raw: 'Procedural textures, and to a lesser degree image textures, can be classified
    in a spectrum of complexity from random to structured. Random, or stochastic textures,
    can be thought of as ‘‘looking like noise,’’ like a fine-grained material such
    as sand, dust, gravel, the grain in paper, and so on. Near stochastic could be
    flames, grass, or the surface of a lake. On the other hand, structured textures
    have broad recognizable features and patterns. A brick wall, wicker basket, plaid,
    or herd of geckos would be structured.


    **Image Textures**


    As referenced earlier, image textures are just that. They can serve as a surface
    or material texture such as mahogany wood, steel plating, or leaves scattered
    across the ground. If done right, these can be seamlessly tiled to cover a much
    larger surface than the original image would suggest. And because they come from
    real life, they don’t need the sophisticated software used for the procedural
    variety. Figure 5-4 shows the chalice


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 152](index-140_1.jpg)


    **CHAPTER 5: Textures**


    **137**


    scene, but this time with wood textures, mahogany for the chalice, and alder for
    the cone, while the cube remains gold.


    Figure 5-4\. Using real-world image textures


    Besides using image textures as materials, they can be used as pictures themselves
    in your 3D world. A rendered image of an iPad can have a texture dropped into
    where the screen is. A 3D city could use real photographs for windows on the buildings,
    for billboards, or for family photos in a living room.


    **OpenGL ES and Textures**


    When OpenGL ES renders an object, such as the mini solar system in Chapter 4,
    it draws each triangle and then lights and colorizes them based on the three vertices
    that make up each face. Afterward it merrily goes to the next one, singing a jaunty
    little tune no doubt. A texture is nothing more than an image. As you learned
    earlier in the chapter, it can be generated on the fly to handle context-sensitive
    details (such as cloud patterns), or it can be a JPEG, PNG, or anything else.
    It is made up of pixels, of course, but when operating as a texture, they are
    called texels. You can think of an OpenGL ES


    texture as a bunch of little colored ‘‘faces’’ (the texels), each of the same
    size and stitched together in one sheet of, say, 256 such faces on a side. Each
    face is the same size as each other one and can be stretched or squeezed so as
    to work on surfaces of any size or shape. They don’t have corner geometry to waste
    memory storing xyz values, can come in a multitude of lovely colors, and give
    a lot of bang for the buck. And of course they are extraordinarily versatile.


    Like your geometry, textures have their own coordinate space. Where geometry denotes
    locations of its many pieces using the trusty Cartesian coordinates known as x,
    y, and z, textures use s and t. The process that applies a texture to some geometric
    object is called UV mapping. (s and t are used only for OpenGL world, whereas
    others use u and v. Go figure.)


    So, how is this applied? Say you have a square tablecloth that you must make fit
    a rectangular table. You need to attach it firmly along one side and then tug
    and stretch it along the other until it just barely covers the table. You can
    attach just the four corners,


