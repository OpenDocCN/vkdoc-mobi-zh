    \ the first component (which happens to be red) and a value that tells the system\
    \ how large the structure is so it knows where to pick up each successive color\
    \ or vertex element in the case of vertex data.\n\nLines 7ff tell the system how\
    \ to render the points, both size and style. Size is specified by `glPointSize()`\
    \ with a value of 3.0 pixels, which seems to work for both the standard and Retina\
    \ displays. We can also have points that are either square or rounded. Since I\
    \ don’t know of any square stars last I checked, we can use rounded points by\
    \ enabling `GL_POINT_SMOOTH` capabilities. And if we really want really nicely\
    \ anti-aliased points, then blending needs to be activated for those to work.\
    \ Figure 8-7 shows the difference between the three styles.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 248](index-280_1.jpg)\n\n**CHAPTER 8: Putting It All Together** 277\n\
    \n**Note** If you want to draw really big stars, there is a limit to the maximum\
