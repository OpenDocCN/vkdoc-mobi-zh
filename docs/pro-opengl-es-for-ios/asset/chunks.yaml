    **CHAPTER 8: Putting It All Together**


    **250**


    gestures are also handled. However, they did leave out momentum swipes, the kind
    of action that can keep a list scrolling for a while after you’ve lifted your
    finger.


    Here we’ll need only the pinch and pan gestures. To your view controller’s **viewDidLoad()**
    method, add Listing 8-2.


    Listing 8-2\. Allocating the gesture recognizers


