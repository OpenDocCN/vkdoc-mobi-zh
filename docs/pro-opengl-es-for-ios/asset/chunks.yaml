    和之前一样，让我们仔细看看这段代码：


    现在你应该能认出弹跳方块的坐标了。在这个案例中，我们加入了 `z` 分量，使其变成一个 3D 弹跳方块。


    当然，在第 2 行，缓冲区被清空了，不过这里将背景设置为黑色，而非默认的灰色。


    在第 3 行，方块被向后移动了 4 个单位。


    由于没有按顶点着色，第 4 行中调用 `glColor4f()` 会将整个方块设置为蓝色。不过请注意，最后一个分量为 1.0，这是透明度值，稍后我们会讲解它。


    紧跟在 `glColor4f()` 之后的是实际绘制方块的调用。


    但我们希望有两个方块来展示它们如何混合。因此，在第 5 行，颜色被改为红色，透明度设为 0.5，是蓝色方块的一半。


    紧接着在第 6 行，坐标只平移了 3 个单位，因此红色方块因为距离更近而显得更大。同时，请注意 `x` 值现在也被平移了。与蓝色方块的上下运动不同，离得更近的红色方块将左右移动。


    在第 7 行，红色方块被渲染出来。由于当前没有使用深度缓冲区，红色方块之所以能覆盖蓝色方块，仅仅是因为它在蓝色方块之后绘制。


    在第 8 行，平移量的值被减小，以降低运动幅度，这样在开启混合效果时，更容易捕捉到混合效果。


    如果一切顺利，你应该能看到类似图 6-1 的效果。


    图 6-1. 蓝色方块上下移动；红色方块左右移动。


    这看起来并不起眼，但它将是后续几个实验的框架。


    第一个实验将开启默认混合功能。


