    happens when red writes on top of the blue. Since the blue is already at half
    of its intensity, the blending function will cut that down even further, to .25,
    as a result of the destination part of the blending function, (1.0-Source alpha)*blue+destination,
    or (1.0-


    .5).5+0, or .25\. The final color is then .5,0,.25\. With the lower intensity
    of the blue, it contributes less to the composite color, leaving red to dominate.
    Now in Figure 6-4


    (right), the order is reversed, so the blue dominates with a final color of .25,0,.5.


