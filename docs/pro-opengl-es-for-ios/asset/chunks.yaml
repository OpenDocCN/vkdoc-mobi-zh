    put the **glTranslate()** out of **execute()**, into the initialization code,
    just as long as it is called only once.


    The translation in line 5 ensures that the objects are ‘‘moved away’’


    from our eyepoint. Remember that everything in an OpenGL ES world


    effectively revolves around the eyepoint. I prefer to have a common


    origin that doesn’t rely on viewer’s location, and in this case, it is the position
    of the sun as expressed in offsets from the eyepoint.


    Line 6 merely enforces the sun’s location as being at the origin.


    Ooh! Another **glPushMatrix()** in line 7\. This ensures that any transformations
    on the earth don’t affect the sun.


    Lines 8 and 9 get the earth to orbit the sun. How? In line 10 a little utility
    function is called. That performs any transitions and moves an object away from
    the origin if need be. As you recall, the


    transformations can be thought of being last called/first used. So, the translation
    in **executePlanets()** is actually performed first, followed by the **glRotation()**.
    Note that this method will have the earth orbiting in a perfect circle, whereas
    in reality, no planets will have a perfectly circular orbit, so **glTranlsation()**
    will be used.


    **glPopMatrix()** in line 11 dumps any of the transformations unique to the earth.


