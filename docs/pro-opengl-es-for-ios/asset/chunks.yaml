- fmt: '# 纹理采样与过滤


    **点采样**（在 OpenGL 术语中称为 `GL_NEAREST`）：像素的颜色基于离像素中心最近的纹素。这是最简单、最快的方式，自然产生的图像效果最差。


    **双线性采样**（通常简称为线性）：像素的颜色基于离像素中心最近的 2x2 纹素阵列的加权平均值。这可以显著平滑图像。


    **三线性采样**：需要 `mipmap`，并取最接近屏幕最终渲染的两个 `mipmap` 层级，对每个层级执行双线性采样，然后对这两个值进行加权平均。


    你在前面的练习中看到的就是三线性采样，它显著提升了感知到的图像质量。


    图 5-20a 展示了关闭过滤时 Hedly 的近距离特写，而图 5-20b 则展示了开启过滤后的效果。如果你回头查看 `mipmap` 代码，会发现两张图像实际上都使用了过滤。顶部有闪烁效果的那张使用了
    `GL_LINEAR` 和 `GL_NEAREST` 过滤。底部的那张做了同样的事情，但额外使用了 `mipmap` 提供的信息。纯粹为了好玩，你可能想对比一下其他设置。例如，哪个更好：`GL_NEAREST`
    还是 `GL_LINEAR`？


    随着视网膜级别显示屏的普及，过滤可能最终会像 8 位着色一样成为历史。


    还有一点：如果你非常仔细地观察底部图像，可能会看到它切换到另一种纹理尺寸。这很微妙，但确实存在。


    ![图 5-20 关闭所有过滤（左），开启双线性过滤（右）](index-160_2.jpg)


    ## OpenGL 扩展与 PVRTC 压缩


    尽管 OpenGL 是一个标准，但它在设计时就考虑到了可扩展性，允许各种硬件制造商通过扩展字符串为 3D 领域添加自己的独门绝技。在 OpenGL 中，开发者可以查询可用的扩展，并在它们存在时使用。要查看这一点，请使用以下代码行：


    ```

    char *extensionList = glGetString(GL_EXTENSIONS);

    ```


    这将返回一个以空格分隔的列表，列出 iOS 中 OpenGL ES 的各种额外选项，看起来类似这样（来自 iOS 4.3）：


    ```

    GL_OES_blend_equation_separate GL_OES_blend_func_separate GL_OES_blend_subtract
    GL_OES_compressed_paletted_texture GL_OES_depth24 GL_OES_draw_texture GL_OES_fbo_render_mipmap
    GL_OES_framebuffer_object GL_OES_mapbuffer GL_OES_matrix_palette GL_OES_packed_depth_stencil
    GL_OES_point_size_array GL_OES_point_sprite GL_OES_read_format GL_OES_rgb8_rgba8
    GL_OES_stencil_wrap GL_OES_stencil8 GL_OES_texture_mirrored_repeat GL_OES_vertex_array_object
    GL_EXT_blend_minmax GL_EXT_discard_framebuffer GL_EXT_read_format_bgra GL_EXT_texture_filter_anisotropic
    GL_EXT_texture_lod_bias GL_APPLE_framebuffer_multisample GL_APPLE_texture_2D_limited_npot
    GL_APPLE_texture_format_BGRA8888 GL_APPLE_texture_max_level GL_IMG_read_format
    GL_IMG_texture_compression_pvrtc

    ```


    最后一行加粗的部分指出，iOS 可以处理一种名为 PVRTC 的特殊压缩纹理格式，该格式由 iOS 设备中的图形处理单元（GPU）品牌使用。前两代 iPhone
    和 iPod/Touch 使用的是 PowerVR MBX 芯片，而较新的型号则使用更强大的 PowerVR SGX GPU。后者的优势在于，它可以接受以其自身格式高度压缩的纹理，并在飞行中进行显示。这可以将纹理压缩到未压缩大小的
    1/16，从而在节省大量内存的同时提高帧率。


    当然，这有一个主要限制：图像必须是正方形且为 2 的幂次（POT）形式。这种压缩在照片类图像上效果最佳，而在对比度强的图形上效果较差。'
  raw: 'Point sampling (called nearest in OpenGL lingo): A pixel’s color is based
    on the texel that is nearest to the pixel’s center. This is the


    simplest, is the fastest, and naturally yields the least satisfactory


    image.


    Bilinear sampling, otherwise called just linear: A pixel’s coloring is based on
    a weighted average of a 2¯2 array of texels nearest to the


    pixel’s center. This can smooth out an image considerably.


    Trilinear sampling: Requires mipmaps and takes the two closest


    mipmap levels to the final rendering on the screen, performs a bilinear selection
    on each, and then takes a weighted average of the two


    individual values.


    It’s the trilinear sampling that you saw in action in the previous exercise, and
    it results in a pretty dramatic increase in perceived image quality.


