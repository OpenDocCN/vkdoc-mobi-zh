    So, that’s part one of today’s exercise. Remember those lens flare things from
    Chapter 7? Now we can put them to use.


    **Adding Some Flare**


    From Chapter 7, grab the four source files from the lens flare exercise, and add
    them to your project along with the artwork. This will require some substantial
    updates to your main execute method in the solar-system controller, mainly for
    managing the lens flare object in terms of both positioning and highlighting.


    Something like a lens flare effect has all sorts of small issues that will be
    addressed.


    Namely, if the flare’s source object, in the case the sun, goes behind the earth,
    the flare itself should vanish. Also note that it won’t vanish immediately but
    will actually fade out.


    There are a couple of new utility routines that need to be added before the flare
    itself can be rendered.


    For starters, though, you’ll need to allocate both the lens flare object and a
    new texture object for rendering the sun. Add the following two lines to the **init**
    routine of the solar-system controller:


    **m_LensFlare=[[LensFlare alloc]init];**


    ******m_FlareSource= m_FlareSource=[[OpenGLCreateTexture**


    **getObject]loadTexture:@"gimp_sun3.png"];**


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 245](index-263_1.jpg)


    **CHAPTER 8: Putting It All Together**


    **260**


    Now is the time to dump any image utilities over into their own routine. I’ve
    created OpenGLCreateTexture for this and have moved loadTexture() from the solar-system
    controller to here. This will help support the above call. The **.png** file can
    be whatever you want that will replace the current 3D sun model. What we want
    this for is to draw a flat bitmap of the sun where the spherical model would normally
    render as it has done in the past. The reason is that we can finely control the
    look of our star to make it resemble more closely how the eye might perceive this.
    The stark yellow ball, while technically more accurate, just doesn’t look right
    because any optical receptor to this would add all sorts of various distortions,
    reflections, and highlights (lens flares, for example). Shaders could be employed
    that mathematically model the optics of the eye, for example, but that’s a lot
    of work for a fuzzy ball-like-thing for the time being. You can download my own
    artwork from the Apress site if you choose. Or just copy something to suit your
    own tastes. Figure 8-5 is what I am using with translucent background. Interesting
    enough, this image fools my own eyes enough to make my brain think that I am actually
    looking at something too bright, because it causes all sorts of eyestrain when
    I stare at it.


    This uses a technique called billboarding, which takes a flat 2D texture and keeps
    it aimed toward the viewer no matter what where they are. It permits complex and
    fairly random organic objects (things called trees I think) to be easily depicted
    while using only simple textures. As your viewpoint changes, the billboard objects
    rotate to compensate.'
