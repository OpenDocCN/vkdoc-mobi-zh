    \ as `x′ = ax + cy + e` and `y′ = bx + dy + f`. That makes for a very nice matrix,\
    \ a lovely one at that:\n\n```\n    ⎡ a b 0⎤          ⎡ x'⎤   ⎡ a b 0⎤⎡ x⎤\nT\
