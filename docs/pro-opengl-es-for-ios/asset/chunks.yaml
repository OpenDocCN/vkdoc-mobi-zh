    But we want two squares to show how they can blend. So in line 5, the color is
    changed to red and is given an alpha of .5, half that of the blue one.


    Following that is a translation of only 3 units in line 6, and as a result, the
    red square will be larger because it is closer. Also, notice that the `x` value
    is now being translated. Instead of the up and down movement of the blue square,
    the closer red one will move left and right.


    And in line 7, the red square is rendered. Because there is no depth buffer being
    used right now, the only reason why the red square covers the blue one is that
    it is drawn after the blue square.


    In line 8 the value of the translation is cut down so as to decrease the motion,
    making it a little easier to catch the blending effects when turned on.


    If all works, you should have something that looks like Figure 6-1.


    Figure 6-1. The blue square goes up and down; the red one goes left and right.


    It’s not much to look at, but this will be the framework for the next several
    experiments.


    The first will switch on the default blending function.


    As with so many other OpenGL features, you turn blending on with the call `glEnable(GL_BLEND)`.
    Add that anywhere before the first call to `glDrawArray()`.


    Recompile, and what do you see? Nothing, or at least nothing has changed. It still
    looks like Figure 6-1. That’s because there’s more to blending than saying shaking
    your fist at the monitor shouting "Blend!" We must specify a blending function
    as well, which describes how the source colors (as expressed via its fragments
    or pixels) mix with those at the destination. The default, of course, is when
    the source fragments always replace those at the destination, when depth cueing
    is off. As a matter of fact, blending can take place only when z-buffering is
    switched off.


