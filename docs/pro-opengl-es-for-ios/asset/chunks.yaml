    draw a couple of cubes. But a visual world is a rich one, and needs a lot of stuff
    to define it. And we’re far from done yet. But the principles remain the same.


    **Showing the Scene**


    In Listing 1-2, we can now actually draw the data to the screen and see some pretty
    pictures. This uses two different approaches to display things. The first hides
    everything under the new GLKit available from iOS5 and beyond. It hides all of
    the shaders and other stuff that OpenGL ES 2 normally exposes, and does so under
    the new GLKBaseEffect class. The second way is just straight 2.0 stuff. Together,
    the both of them show how the two different approaches can be part of the same
    rendering loop.


    But remember, using the effects classes to render a simple cube is overkill, sort
    of like hopping in the car to drive 6 feet to the mailbox.


    **Note** Apple has pitched the use of GLKBaseEffect as a means to get 1.1 users
    to port their code to 2.0, because it has lights, materials, and other features
    that 2.0 doesn’t have. But it really doesn’t work well for a simple migration
    because it has far too many limitations to host the entire 1.1 environment of
    most OpenGL apps.


