    # 视锥体也用于指定视野（FOV），类似于相机广角镜头与长焦镜头的区别。侧面与中心轴形成的角度（即它们展开的程度）越大，视野就越大。较大的视野能让你看到更多世界中的内容，而较小的视野则让你能将注意力集中于更小的区域。


    到目前为止，平移和旋转都使用模型视图矩阵，可通过调用 `glMatrixMode(GL_MODELVIEW);` 轻松设置。但现在，在渲染流程的这一阶段，你需要定义并使用投影矩阵（详见第
    1 章中的列表 1-2）。


    这主要通过第 2 章“想象一下”一节中详述的视锥体定义来实现。同时，这也是一种非常简洁的方式来处理大量运算。


    将变换后的顶点转换为 2D 图像的最终步骤如下：


    1.  视锥体内的 3D 点被映射到一个标准化立方体，以将 XYZ 值转换为 NDC。`NDC` 代表标准化设备坐标，这是一个描述视锥体内坐标空间的中间系统。这在将每个顶点和对象映射到设备屏幕时非常有用，无论设备屏幕大小或像素多少——无论是
    iPhone、iPad，还是屏幕尺寸完全不同的新设备。一旦获得这种形式，坐标就已经“移动”，但仍保留彼此之间的相对关系。当然，在 `ndc` 中，它们现在的值范围在-1
    到 1 之间。请注意，内部 Z 值会被翻转。现在 `-Z` 朝向观察者，而 `+Z` 则远离，但幸运的是，这些令人不快的复杂操作都被隐藏了。


    2.  接着，这些新的 NDC 被映射到屏幕上，同时考虑屏幕的宽高比以及顶点到屏幕的“距离”（由近裁剪平面指定）。因此，物体越远，看起来就越小。大部分数学运算仅用于确定视锥体内各物体的比例关系。


    上述步骤描述的是透视投影，这也是我们通常观察世界的方式。也就是说，物体越远，看起来越小。当这些固有的扭曲被消除时，我们就得到了正交投影。此时，无论物体多远，它显示的大小都相同。正交渲染通常用于机械制图，因为任何透视变形都会破坏原图意的表达。


    **注意：** 你经常需要明确指定当前处理的是哪个矩阵。调用 `glMatrixMode()` 用于指定当前矩阵，所有后续操作都将应用于该矩阵。忘记当前是哪个矩阵是一个容易犯的错误。


    ## 回到有趣的部分：一个更简单的演示


    当 Xcode 4.2 发布时（伴随 iOS5 SDK），它改变了 OpenGL 向导的默认项目。此前，它生成的是一个 OpenGL ES 1 应用，显示一个非常简单的
    2D 场景——一个扁平弹跳方块；而 OpenGL ES 2 环境则生成一个两个 3D 立方体围绕公共中心旋转的应用。前者是早期利用的理想项目，因为它比后者简单得多，正如第
    1 章所述。因此，我们将使用原始演示及其后续变体作为基础项目，从一个已知且易于理解的代码库出发，以此为跳板去实现更宏大、更好的目标。


    最简单的方法是从 Apress 网站获取源代码，或者拿第 1 章中的示例，将列表 3-1 和列表 3-2 中的内容覆盖第 1 章的视图控制器内容。


