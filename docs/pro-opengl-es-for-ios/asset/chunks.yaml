    \ OpenGL 帧并将它们合并。接下来是镜头光晕（`lens flares`），可以为户外场景增加视觉戏剧效果，随后是苹果在其许多 UI 设计中大量使用的反射（`reflections`）和模板（`stencils`）。最后，我们介绍了使用阴影投影（`shadow\
