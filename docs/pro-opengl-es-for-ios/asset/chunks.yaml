    # API 专家

    显示 Instruments 认为可能导致执行速度变慢的项目。当使用 OpenGL ES 工具运行时，它会指出先前提到的许多问题，例如 mipmap 使用情况、可压缩的纹理等，并附上详细但实用的修复建议。


