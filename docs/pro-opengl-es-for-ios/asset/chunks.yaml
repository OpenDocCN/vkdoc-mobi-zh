    glRotatef(spinY, 0.0, 1.0, 0.0);


    glDrawElements( GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan1); glDrawElements(
    GL_TRIANGLE_FAN, 6 * 3, GL_UNSIGNED_BYTE, tfan2);


