    # 程序化纹理与图像纹理


    程序化纹理，以及程度稍逊的图像纹理，可按照从随机到结构化的复杂度谱系进行分类。随机纹理（或称随机噪声纹理）可理解为"看起来像噪点"，例如沙子、灰尘、碎石、纸张纹路等细粒材质。接近随机纹理的包括火焰、草地或湖面。而结构化纹理具有清晰可辨的广泛特征与图案，砖墙、柳编筐、格子布或一群壁虎都属于此类。


    ## 图像纹理


    如前所述，图像纹理即其字面意思。它们可用作表面或材质纹理，例如桃花心木、钢板或散落地面的树叶。处理得当的话，这些纹理可以无缝平铺，覆盖远超原始图片面积的大范围表面。由于源自真实世界，它们无需使用生成程序化纹理所需的专业软件。图
    5-4 展示了圣杯场景，这次圣杯使用桃花心木纹理，圆锥体使用赤杨木纹理，而立方体保持金色。


    图 5-4. 使用真实世界的图像纹理


    除了作为材质使用，图像纹理还能以图片形式直接存在于你的三维世界中。渲染出的 iPad 图像可以将纹理"嵌入"屏幕位置。三维城市建筑可使用真实照片作为窗户、广告牌，或客厅里的家庭照片。


    ## OpenGL ES 与纹理


    当 OpenGL ES 渲染物体时（如第 4 章的迷你太阳系），它会绘制每个三角形，并根据构成每个面的三个顶点进行光照和着色，然后欢快地转向下一个三角形（想必还会哼着轻快小调）。纹理不过是一张图像。如本章前面所学，它可以实时生成以处理上下文相关的细节（如云层图案），也可以是
    JPEG、PNG 或其他格式。纹理由像素组成，但作为纹理使用时，这些像素被称为**纹素 (texels)**。你可以把 OpenGL ES 纹理想象成由大量彩色小"面片"（即纹素）组成，每个面片尺寸相同，拼接成一张例如每边
    256 个面片的"大布"。每个面片大小相等，可拉伸或压缩，以适应任意尺寸或形状的表面。它们没有需要存储 `xyz` 值的角点几何数据，能呈现多种绚丽色彩，性价比极高，而且用途极其广泛。


    与几何体一样，纹理拥有自己的坐标空间。几何体使用经典的笛卡尔坐标 `x`、`y`、`z` 标记各个部件的坐标，而纹理使用 `s` 和 `t`。将纹理应用于几何物体的过程称为
    UV 映射（`s` 和 `t` 仅用于 OpenGL 环境，其他环境使用 `u` 和 `v`——真是令人费解）。


    那么，这是如何应用的呢？假设你有一块方形桌布，必须让它适配一张矩形桌子。你需要沿桌布一侧将其牢固贴合，然后沿另一侧拉扯拉伸，直到刚好覆盖桌面。你可以只固定四个角，但若想让它真正"贴合"，还可以沿边缘甚至中间部位进行固定——纹理适配表面的原理与此类似。


    纹理坐标空间是归一化的：即 `s` 和 `t` 的取值范围均为 0 到 1。它们是无量纲的抽象实体，不依赖于源或目标的尺寸。因此，待纹理化的面将在其顶点上携带介于
    0.0 到 1.0 之间的 `s` 和 `t` 值，如图 5-5 所示。


    图 5-5. 无论纹理内容如何，纹理坐标范围都是 0 到 1.0


    在最基础的示例中，我们可以将矩形纹理直接应用于矩形面，如图 5-5 所示。但如果你只需要纹理的一部分呢？你可以提供一个仅包含所需部分的 PNG 图像，但如果需要多种变体，这就不太方便了。不过，还有另一种方法：只需改变目标面的
    `s` 和 `t` 坐标。假设你只想要被我称为"海德利"的复活节岛雕像的左上四分之一部分。你需要做的就是更改目标面的坐标，这些坐标基于所需图像部分的比例，如图
    5-6 所示。也就是说，因为你希望图像在 `s` 轴方向裁剪一半，所以 `s` 坐标将不再从 0 到 1，而是从 0 到 0.5。而 `t` 坐标则从 0.5
    到 1.0。如果你想要左下角，只需将 `s` 坐标设为 0 到 0.5 即可。


    另请注意，纹理坐标系统与分辨率无关。也就是说，边长为 512 像素的图像中心坐标为 (0.5, 0.5)，边长为 128 像素的图像中心坐标同样如此。


    图 5-6. 通过改变纹理坐标裁剪纹理的一部分


    纹理并非仅限于矩形物体。通过在目标面上精心选择 `st` 坐标，你可以实现图 5-7 中一些更复杂的形状。


    图 5-7. 将图像映射到异形表面


    如果你在目标面顶点上保持图像坐标不变，图像的角点将跟随目标面的角点，如图 5-8 所示。


    图 5-8. 扭曲图像可在二维表面呈现三维效果


    纹理也可以平铺，以复制壁纸、砖墙、沙滩等重复图案，如图 5-9 所示。注意坐标如何超出上限 1.0——这会使纹理开始重复，例如，`s` 值为 0.6 相当于
    1.6、2.6 等。


    图 5-9. 平铺图像适用于壁纸或砖墙等重复图案


    除了图 5-9 所示的平铺模式，纹理平铺还可以采用"镜像"或"钳制"模式，这是处理 `s` 和 `t` 超出 0 到 1.0 范围时的机制。


    镜像平铺如上所述重复纹理，同时还会翻转交替图像的行/列，如图 5-10（左）所示。钳制图像意味着重复最后一列或最后一行的纹素，如图 5-10（右）所示。用我的示例图像来看，钳制显得杂乱无章，但当图像具有中性边框时则非常有用。此时，如果
    `s` 或 `t` 超出正常范围，你可以防止图像在任一或两个轴向上重复。


    图 5-10. 仅 `s` 轴的镜像重复（左），纹理钳制（右）


    > **注意：** 图 5-10 中右侧边缘的问题表明，设计为钳制的纹理应具有 1 像素宽的边框，以匹配其绑定物体的颜色。当然，如果你觉得这样很酷，那它几乎可以超越一切。

