- fmt: '# Chapter 9: Performance ’n’ Stuff


    `bits` for green because our eyes are more sensitive to green as opposed to red
    or blue.


    On `Distant Suns`, my grayscale constellation artwork is only 8 bits, cutting
    memory usage by 75 percent. Should I want it tinted to match a specific theme,
    I let `OpenGL` do the work. With the proper tool and careful tweaking, some 16-bit
    textures are almost indistinguishable from the 32-bitters.


    Figure 9-5 illustrates four of these formats created by `TexturePacker`, with
    the highest to lowest quality going from left to right. The first image is the
    true color one we’ve been using, sometimes called `RGBA8888`. Next is `RGB565`,
    which still looks quite good considering. The third one is `RGBA5551`, allocating
    a 1-bit alpha channel (notice how much a difference the extra bit for green makes
    when compared to the previous texture), and the rightmost image is the lowest
    quality one, `RGB4444`. `TexturePacker` also supports the `PVRTC` file types referenced
    in Chapter 5.


    **Note:** An alternate (and free) tool is available from Imagination Technologies,
    the maker of the PowerVR chips. It does the same texture modes as `TexturePacker`
    but doesn’t create sprite sheets, as `TexturePacker` does. It uses `X11` as the
    UI that is skinned to look like Windows-NT.


    Go to `www.imgtec.com` and look for `PowerVR Insider Utilities` under the developer’s
    section.


    Look for `PVRTexTool`.


    The images that work best when compressed are those with color palettes that rely
    heavily on one or two parts of the spectrum. The more varied your colors, the
    harder it will be minimize the artifacting. The image of Hedly works better than
    the earth’s texture map, because the former is largely grays and greens, while
    the latter is composed of greens, browns, grays (for the polar regions), and blue.


    Figure 9-5. Texture (from left to right): 32 bit, RGB565, RGBA5551, and RGBA:4444


    ## Other Tips to Remember


    The following are some useful tips to keep in mind:


    - Even though multisample antialiasing can be very useful in smoothing out your
    images, it means sudden death in the performance department, cutting frame rates
    by 30 percent or more. So, you must really, really need to use it.


    - Avoid using `GL_ALPHA_TEST`. This was never covered, but it can also kill performance
    as much as `MSAA`.


    - When going to background, make sure to stop the animation and delete any easily
    re-created resources.


    - Minimize the use of any calls that return information from the system, such
    as the `glGet*` family of methods, especially `glGetError()`. Many of these will
    force any previous commands to execute before state information can be retrieved.


    - Use as few lights as possible. Going down to only a single light (the sun),
    by turning off the fill and the ambient lights, increased frame rates by as much
    as 30 percent on my iPad 2.


    - A lot of the literature will recommend turning off “compile for thumb” in your
    build settings. The “thumb” that they are talking about is a special 16-bit instruction
    set that the ARM processor can use to make your executable smaller. It applies
    only to older devices, including iPhones 1 and 3G and the first two generations
    of the iPod touch. So, you will not likely see any improvement on the more recent
    units.


    - Do not access the frame buffer from the CPU. Calls such as `glReadPixels()`
    should be avoided because they force the frame buffer to flush all queued commands.


    ## OpenGL Analyzer


    Without a doubt, Xcode’s profiling application, `Instruments`, is one of the most
    powerful debugging tools I have ever seen. And with Xcode 4, it is better than
    ever, adding a lot of new tools for `OpenGL ES` applications. (I’ve already talked
    about `Performance Detective`, but that is a separate application so not part
    of the actual `Instruments` package covered here.)


    You may already be familiar with some of the tools in the `Instruments` bulging
    toolbox for tracking memory use, file I/O bottlenecks, and even WiFi activity.
    But the new `OpenGL ES` analyzer should become your BFF — best (software) friend
    forever — for both the depth and the breadth of the information it provides.


    This will by no means be a comprehensive examination of the `OpenGL ES Analyzer`
    within `Instruments` but will highlight some of its many features.


    The analyzer uses Apple’s in-depth knowledge of the hardware and software both
    to study the inner workings of `OpenGL` and to see how your application makes
    use of it, as well as using an expert system to sniff out problems and possible
    cures. It hooks into every call within `OpenGL`, tracking timing, duration, backtrace
    information, parameter correctness, and much more. Note that only iPhones from
    3GS and beyond and the third-generation iPod/touch will work with the new tools.


    **Note:** As opposed to many of the tools within `Instruments`, the `OpenGL` analyzer
    will not work on the simulator.


    You start `Instruments` by using the Profile menu item or the build/run selection
    on the editor window, as shown in Figure 9-6. If you don’t see the micrometer
    icon, just click and hold on whatever the button is showing at that time.


    Figure 9-6. The Instruments launch button from Xcode


    `Instruments` will now display the palette of various tools available for iOS.
    Select the one for `OpenGL ES Analysis`, as shown in Figure 9-7; then stand back
    and be amazed.


    Figure 9-7. Launching the OpenGL ES analysis tool


    When the tool has launched, you’ll be presented with the screen in Figure 9-8.


    Figure 9-8. The main instruments screen at startup


    The following describes briefly what you’re looking at:


    1. Record/Stop button

    2. OpenGL instrument inspector

    3. The target selector

    4. Track pane

    5. Extended detail

    6. Additional context-sensitive settings

    7. Detail pane


    ### Record/Stop


    The Record/Stop button will start and end a recording session. When depressed,
    it will launch your app and start all of the pretty little squiggly tracks looking
    like a fancy-pants EKG machine. Click it again, and it will terminate your session.
    You can now have the option to save it or wipe it out by starting a new session.
    If all you want is to pause a session so that you can examine some specific data,
    the Pause button will do the trick.


    The Repeat UI Input button is used only for flexing desktop apps and not those
    on iOS devices. See Figure 9-9.


    Figure 9-9. The Pause/Record/Repeat UI buttons and target selector


    **Note:** The Repeat UI button is particularly interesting because it is used
    to automate user interaction. You can record a session and then have `Instruments`
    repeat it over and over for stress testing or to find that elusive bug that only
    shows up every once-in-a-while.


    ### Instrument Inspector


    Clicking the “i” button on the upper-right corner of the Analyzer’s window will
    launch its inspector, as shown in Figure 9-10. It will let you set what specific
    items you want to observe such as the number of lines rendered or redundant state
    changes. (Remember the recommendation earlier about minimizing state changes?
    This will help you fix that.)


    Figure 9-10. The inspector for the OpenGL analyzer'
