    ST）。


    **注意** 原始`Amiga`上的一种特殊图形模式可以将4096种颜色压缩到一个通常最多只能支持32色的系统中。这种模式被称为“保持并修改”（HAM模式），最初由设计师杰伊·迈纳（Jay
    Miner）出于实验目的将其放在了一个主芯片上。尽管他想移除这个公认的、会产生大量色彩失真图像的权宜之计，但这样会在芯片上留下一个大空白区域。考虑到没有一个自尊的工程师能容忍闲置的芯片区域，他便保留了这一功能。令迈纳大吃一惊的是，人们开始使用它。


