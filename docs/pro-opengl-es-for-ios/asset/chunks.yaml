    # 第九章：性能优化


    `bits` 用于绿色，因为人眼对绿色比红色或蓝色更敏感。


    在《遥望星空》中，我的灰度星座图仅使用 8 位，将内存使用量减少了 75%。若想为其着色以匹配特定主题，我会让 `OpenGL` 来完成这项工作。借助合适的工具和精心的调整，一些
    16 位纹理与 32 位纹理几乎难以区分。


    图 9-5 展示了由 `TexturePacker` 创建的四种格式，从左到右品质从高到低。第一张图是我们一直在用的真彩色图，有时也被称为 `RGBA8888`。接下来是
    `RGB565`，即便如此，它看起来仍然相当不错。第三张是 `RGBA5551`，分配了 1 位的 alpha 通道（注意，与上一张纹理相比，多出的绿色位带来的差异有多大），最右边的图是品质最低的
    `RGB4444`。`TexturePacker` 还支持第 5 章中提到的 `PVRTC` 文件类型。


    **注意：** 英伟达（Imagination Technologies）公司（PowerVR 芯片制造商）提供了一款替代工具（且免费）。它支持与 `TexturePacker`
    相同的纹理模式，但不像 `TexturePacker` 那样能创建精灵图集。它使用 `X11` 作为界面，外观被定制得看起来像 Windows-NT。


    请访问 `www.imgtec.com`，在开发者专区查找 `PowerVR Insider Utilities`。


    查找 `PVRTexTool`。


    最适合压缩的图像是那些色彩调色板主要依赖光谱中一至两种颜色的图像。颜色变化越丰富，就越难将伪影减少到最低。赫德利的图像效果比地球纹理图更好，因为前者主要是灰色和绿色，而后者则由绿色、棕色、灰色（极地区域）和蓝色组成。


    图 9-5. 纹理（从左至右）：32 位、RGB565、RGBA5551 和 RGBA:4444


    ## 其他需谨记的技巧


    以下是需要记住的一些实用技巧：


    -   尽管多重采样抗锯齿对于平滑图像非常有用，但它会显著影响性能，使帧率降低 30% 或更多。因此，只有在确实必要时才应使用它。

    -   避免使用 `GL_ALPHA_TEST`。之前从未提及，但它同样可能导致性能损失，与 `MSAA` 一样严重。

    -   当应用进入后台时，请务必停止动画并删除任何易于重新创建的资源。

    -   尽量减少使用从系统返回信息的调用，例如 `glGet*` 系列方法，尤其是 `glGetError()`。其中许多调用会强制在执行状态信息检索前完成所有之前的命令。

    -   尽可能少用光源。在我的 iPad 2 上，通过关闭补光和环境光，仅保留一个光源（太阳），帧率可提升高达 30%。

    -   许多文献会建议在构建设置中关闭“为 thumb 编译”。他们提到的“thumb”是一种 ARM 处理器可用于减小可执行文件体积的特殊 16 位指令集。它仅适用于较旧的设备，包括
    iPhone 1、3G 以及前两代 iPod touch。因此，在较新的设备上不太可能看到任何改进。

    -   不要从 CPU 访问帧缓冲区。应避免使用例如 `glReadPixels()` 这样的调用，因为它们会强制帧缓冲区刷新所有排队的命令。


    ## OpenGL 分析器


    毫无疑问，Xcode 的性能分析应用 `Instruments` 是我见过的最强大的调试工具之一。在 Xcode 4 中，它比以往任何时候都更出色，为 `OpenGL
    ES` 应用增添了许多新工具。（我之前已经介绍过 `Performance Detective`，但那是另一个独立的应用程序，不包含在本节讨论的 `Instruments`
    软件包中。）


    你可能已经熟悉 `Instruments` 工具包中的一些工具，用于跟踪内存使用、文件 I/O 瓶颈，甚至 WiFi 活动。但新的 `OpenGL ES`
    分析器应该会成为你的“最佳拍档”——永恒的（软件）好友——因为它提供的信息既深入又广泛。


    本节绝非对 `Instruments` 中 `OpenGL ES 分析器` 的全面探讨，而只是突出其众多功能中的一部分。


    该分析器利用苹果对硬件和软件的深入了解，一方面研究 `OpenGL` 的内部工作原理以及你的应用程序如何使用它，另一方面则使用专家系统来嗅探问题并找出可能的解决方案。它会挂钩
    `OpenGL` 中的每一个调用，跟踪时序、持续时间、回溯信息、参数正确性等等。请注意，只有 iPhone 3GS 及更新机型以及第三代 iPod touch
    才能配合这些新工具使用。


    **注意：** 与 `Instruments` 中的许多工具不同，`OpenGL` 分析器无法在模拟器上运行。


    通过使用“Profile”菜单项或编辑器窗口中的“构建/运行”选项来启动 `Instruments`，如图 9-6 所示。如果看不到微距图标，只需单击并按住当时按钮上显示的内容即可。


    图 9-6. Xcode 中的 Instruments 启动按钮


    `Instruments` 现在将显示 iOS 可用的各种工具面板。选择 `OpenGL ES Analysis` 工具，如图 9-7 所示；然后退后一步，静待奇迹。


    图 9-7. 启动 OpenGL ES 分析工具


    工具启动后，你将看到如图 9-8 所示的屏幕。


    图 9-8. 启动时的 Instruments 主屏幕


    以下是所见内容的简要说明：


    1. 录制/停止按钮

    2. OpenGL 工具检查器

    3. 目标选择器

    4. 轨道面板

    5. 扩展详情

    6. 其他上下文相关设置

    7. 详情面板


    ### 录制/停止


    录制/停止按钮用于开始和结束录制会话。按下该按钮时，它将启动你的应用并开始生成所有漂亮的、波形起伏的轨道，看起来像一台花哨的 EKG 机器。再次单击它将终止当前会话。你现在可以选择保存它，或者通过开始一个新会话来清除它。如果你只想暂停会话以便检查某些特定数据，暂停按钮可以实现这一点。


    重复用户界面输入按钮仅用于对桌面应用进行压力测试，而非 iOS 设备上的应用。见图 9-9。


    图 9-9. 暂停/录制/重复用户界面按钮及目标选择器


    **注意：** 重复用户界面按钮特别有趣，因为它用于自动化用户交互。你可以录制一个会话，然后让 `Instruments` 反复重放以进行压力测试，或寻找那个偶尔才出现的难以捉摸的
    Bug。


    ### 工具检查器


    单击分析器窗口右上角的“i”按钮将启动其检查器，如图 9-10 所示。它允许你设置想要观察的特定项目，例如渲染的线条数量或冗余的状态更改。（还记得之前关于尽量减少状态更改的建议吗？这将帮助你解决这个问题。）


    图 9-10. OpenGL 分析器的检查器

