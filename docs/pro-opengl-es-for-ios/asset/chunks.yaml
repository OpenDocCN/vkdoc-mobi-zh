    more futuristic than an iPad. (Even before the iPhone was available for sale,
    the prop department at ABC’s LOST borrowed some of Apple’s screen iconography
    for use in a two-way radio carried by a helicopter pilot.) If you are reading
    this book, chances are you have an iOS-based device or are considering getting
    one in the near future. If you have one, put it in your hand now and consider
    what a miracle it is of 21st-century engineering. Millions of man-hours, billions
    of dollars of research, centuries of overtime, plenty of all-nighters, and an
    abundance of Jolt-drinking, T-shirt--


    -wearing, comic-book-loving engineers coding into the silence of


    the night have gone into making that little glass and plastic miracle-box so you
    could play DoodleJump when Mythbusters is in reruns.


