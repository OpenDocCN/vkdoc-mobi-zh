    Here in the vertex shader is where the light is hidden for this particular cube;
    the values are the x, y, and z values. Change the middle value to 5.0, which will
    move it way above the scene but will affect only the blue cube.


    In line 2, gl_Position is predefined object that carries the position of the current
    vertex.


    Add in the following line to the end: gl_Position.x*=.5;. Figure 1-11a shows the
    result.


