    **glEnable(GL_DEPTH_TEST);**


    ****m_EyePosition=GLKVector3Make(0.0,0.0,65.0);**


    ****m_WorldModelViewMatrix=GLKMatrix4MakeTranslation(-m_EyePosition.x,-m_EyePosition.y,-**


