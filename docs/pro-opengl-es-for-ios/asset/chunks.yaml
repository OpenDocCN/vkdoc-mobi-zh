  trans: "\n现在，`cloud-luv'n` 片段应该看起来像**代码清单 10-16**，以执行实际的混合操作。\n\n**代码清单 10-16**\
    \ 将第二张云纹理与其他纹理混合\n\n```\nprecision mediump float;\n\nvarying lowp vec4 colorVarying;\n\
    varying lowp vec4 specularColorVarying;\n\nuniform mat4 modelViewProjectionMatrix;\n\
    uniform mat3 normalMatrix;\nuniform vec3 lightPosition;\n\nvarying vec2 v_texCoord;\n\
    uniform sampler2D s_texture;\nuniform sampler2D cloud_texture; //1\n\nvoid main()\n\
    {\n    vec4 finalSpecular = vec4(0,0,0,1);\n    vec4 surfaceColor;\n    vec4 cloudColor;\n\
    \n    float halfBlue; //用于检测主蓝色片元的值。\n\n    surfaceColor = texture2D( s_texture,\
    \ v_texCoord );\n    cloudColor = texture2D(cloud_texture, v_texCoord ); //2\n\
    \n    halfBlue = 0.5 * surfaceColor[2];\n\n    if(halfBlue > 1.0)\n        halfBlue\
    \ = 1.0;\n\n    if((surfaceColor[0] < halfBlue) && (surfaceColor[1] < halfBlue))\n\
    \        finalSpecular = specularColorVarying;\n\n    if(cloudColor[0] > 0.15)\
    \ //3\n    {\n        cloudColor[3] = 1.0;\n        gl_FragColor = (cloudColor\
    \ * 1.3 + surfaceColor * .4) * colorVarying;\n    }\n    else\n        gl_FragColor\
    \ = (surfaceColor + finalSpecular) * colorVarying;\n}\n```\n\n以下是具体说明：\n\n第 1\
    \ 行仅仅声明了新的 `cloud_texture`。\n在第 2 行，我们从云采样器对象中获取云的颜色。\n\n从第 3 行开始，新颜色被过滤并与地球表面图像合并。所使用的数值相当随意，但能呈现最佳图像。当然，为了确保彩色陆地能显现出来，许多精细细节必须被剔除。\n\
    \n由于云是灰度对象，我只需要获取单一颜色进行测试，因为常规的 RGB 值都是相同的。因此，我选择处理所有亮度高于 .20 的纹素。然后，我确保 alpha\
    \ 通道为 1.0，并将所有三个分量组合起来。`cloudColor` 使用了 1.3 的乘数进行轻微增强，而底层表面仅使用 .4，这样既能稍微突出云层，又能使其保持相对不透明。\n\
    \n我希望你会看到类似**图 10-7** 的效果。现在它开始看起来像一个真正的行星了。\n\n**图 10-7** 整合所有元素\n\n这只是使用着色器的一个非常简单示例。例如，在涉及太空主题时，你可以在行星周围生成朦胧的大气层，或者使用\
    \ 3D 体积纹理来模拟星系或星云。要是我还能再写十章就好了……\n\n## 使用 GLKit 的更多乐趣\n\n如前所述，iOS 5 中引入 GLKit\
    \ 的主要目的是让 OpenGL ES 的开发工作变得更简单一些。该套件在四个领域提供了新功能，其中三个你已经接触过，并且在 1.0 或 2.0 版本中都非常实用：\n\
    \n- `GLKView` 和 `GLKViewController`（隐藏了处理绘制表面时的一些繁琐细节）\n- 纹理管理\n- 数学库（丰富且标准化的数学\
    \ API）\n- 特效（封装基于着色器效果的标准化手段）\n\n在这四个方面中，后两者是专门为了让 OpenGL ES 2.0 的开发工作更简便一些而设计的。不过，我们将重点介绍最后一项，因为它能增添一些额外的亮点。\n"
- fmt: '# GLKEffects


    `GLKEffects`库的创建是为了管理基于着色器的效果。在撰写本文时，`GLKit`附带两个预构建的效果类，相信未来还会看到更多。其核心是`GLKBaseEffects`类。`GLKBaseEffects`类集成并“模仿”（借用苹果的术语）了OpenGL
    ES 1用户在迁移到OpenGL ES 2时必须放弃的大部分功能。这包括以下内容：


    - 来自OpenGL ES 1的基本光照模型，但一次仅支持三个光源（而版本1支持8个或更多）。

    - 材质，使用`GLKEffectPropertyMaterial`类。

    - 支持材质及其所有相关属性。

    - 雾。

    - 多重纹理。


    以下是两个子类：


    - `GLKReflectionMap`：将对象变成一个闪亮的玩具。

    - `GLKSkyboxEffect`：创建一个360度全景。


    ---


    **第10章：OpenGL ES 2、着色器以及……**（第334页）


    反射效果和天空盒都是游戏及其他领域中常用的标准效果。天空盒在飞行模拟器中非常有用，你可以环顾四周并沉浸在虚拟世界中。


    ## GLKReflectionMap


    有时也称为环境映射，反射映射用于使对象看起来像是用最光滑的金属或玻璃制成的。由于其外观酷炫且相对容易实现，因此在游戏及其他领域很常见。


    反射效果主要源于将固定纹理与在其下方移动或旋转的几何体结合使用。这意味着反射面的纹理坐标会动态变化，以抵消底层对象可能产生的任何运动。


    最常用的“环境”纹理通常采用所谓的立方体贴图形式。立方体贴图是一种可以细分为六个正方形，然后以立方体形式重新组装在反射对象周围的纹理。为什么用立方体而不是球体？主要是为了减少麻烦，除非你喜欢麻烦并希望获得尽可能纯净且无失真的反射纹理。但创建立方体贴图比创建完整的360度球体贴图更容易。


    想象一下，用纸制成的立方体展开后的样子，以Hedly和他的伙伴们为主题，如图10-8所示。


    ---


    **第10章：OpenGL ES 2、着色器以及……**（第335页）


    图10-8：Hedly和他的朋友们。他们是一群安静的家伙。


    那么，如何使用立方体贴图呢？首先，需要习惯在纹理坐标中添加第三个分量，该分量指定要使用的立方体面。立方体贴图基于以下几个假设：


    - 反射中的环境非常遥远，因此不会出现视差。

    - 除非你知道自己在找什么，否则不连续性很难被察觉。

    - 除非使用特殊的图像贴图进行补偿，否则对象无法反射自身的任何部分。

    - 对象具有弯曲表面，因为立方体贴图在镜面等平坦表面上看起来效果不佳。


    要使用反射/立方体贴图绘制对象，OpenGL会从你的视点发射一条射线，将其从目标反射回来，并计算出它在立方体贴图上的命中位置。对象上的交点指定要使用的纹理坐标，而立方体贴图上的交点则选择要使用的纹素以及命中的是哪一面。


    ---


    **第10章：OpenGL ES 2、着色器以及……**（第336页）


    基于此，让我们使用`GLKReflectionMapEffect`向地球添加立方体贴图。


    你可以从标准模板项目开始，然后将`Planet.mm`添加到其中。'
  raw: '**GLKEffects**


    The GLKEffects library was created as a way to manage shader-based effects. At
    the time of this writing, GLKit comes with two prebuilt effects classes, and I
    am sure we’ll see more. The core to this is the **GLKBaseEffects** class. GLKBaseEffects
    incorporates, and to use Apple’s term ‘‘mimics,’’ much of what Open[GL ES 1 user](#index_split_000.html#p6)s
    had to leave behind when making the jump to [2\. This](#index_split_000.html#p7)
    includes the following:


    The basic lighting model from OpenGL [ES 1, but with only](#index_split_000.html#p6)
    three lights at a time thou[gh, vs. 8 or](#index_split_000.html#p13) more un[der
    version 1.](#index_split_000.html#p6)


    Materials, using the **GLKEffectPropertyMaterial** class


    Support for materials and all of their respective qualities


    Fog


    Multitexturing


    These are the two subclasses:


    **GLKReflectionMap**: Turns an object into a shiny toy


    **GLKSkyboxEffect**: Creates a 360-degree panorama


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER [10: OpenGL E](#index_split_000.html#p15)S [2, S](#index_split_000.html#p7)haders,
    and...**


    [**334**](#index_split_006.html#p337)


    **Both the reflection and skybox are standard effects used often in games and
    elsewhere.


    The skybox is very useful in flight simulators so you can look anywhere and be
    immersed in the artificial world.


    **GLKReflectionMap**


    Sometimes called environment mapping, reflection mapping is used to make an object
    look like it is made out of the most polished metal or glass. Because it is cool-looking
    and relatively easy, it is commonly found in games and elsewhere.


    The reflection effect largely comes from having a fixed texture with some geometry
    moving or rotating underneath. That means the texture coordinates for the reflective
    surfaces will vary dynamically to counteract any motion the underlying object
    might have.


    The texture most commonly used as the ‘‘environment’’ typically comes in the form
    of what’s called a cube map. A cube map is simply a texture that can be subdivided
    into six squares and then reassembled in cube form around the reflecting object.
    Why a cube instead of a sphere? Less fuss, mainly, unless you like fuss and want
    a reflected texture as pure and distortion free as possible, but creating a cube
    texture is easier than


    a full 360-degree spherical texture.


    Think of what a cube made out of paper would look like unfolded, using Hedly and
    his pals as the subject, as shown Figure 10-8.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 287](index-338_1.jpg)


    **CHAPTER [10: OpenGL E](#index_split_000.html#p15)S [2, S](#index_split_000.html#p7)haders,
    and...**


    [**335**](#index_split_006.html#p338)


    Figure 10-8\. Hedly and his friends. They’re a quiet bunch.


    So, how is a cube map used? First, get used to adding a third component to the
    texture coordinates, which specifies the face of the cube to use. Cube mapping
    makes a number of assumptions:


    The environment in the reflection very far away, so no parallax will be visible.


    The discontinuities are largely difficult to notice unless you know what you’re
    looking for.


    The object cannot reflect any part of itself, unless you use some


    special image maps to compensate.


    You have a curved surface, because cube maps don’t look right in a


    flat surface like a mirror.


    To draw an object with a reflection/cube map, OpenGL will draw a ray from your
    viewpoint, bounce it off the target, and figure out where it hits on the cube
    map. The intersection point on the object specifies what texture coordinates are
    to be used, and the intersection on the cube map picks out what texel to use and
    which of the six faces was hit.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER [10: OpenGL E](#index_split_000.html#p15)S [2, S](#index_split_000.html#p7)haders,
    and...**


    [**336**](#index_split_006.html#p339)


    **With that in mind, let’s add cube map to the earth using **GLKReflectionMapEffect**.


    You can start again with the standard template project and then add **Planet.mm**
    to it.'
  trans: '

    # GLKEffects


    `GLKEffects`库的创建是为了管理基于着色器的效果。在撰写本文时，`GLKit`附带两个预构建的效果类，相信未来还会看到更多。其核心是`GLKBaseEffects`类。`GLKBaseEffects`类集成并“模仿”（借用苹果的术语）了
    OpenGL ES 1 用户在迁移到 OpenGL ES 2 时必须放弃的大部分功能。这包括以下内容：


    - 来自 OpenGL ES 1 的基本光照模型，但一次仅支持三个光源（而版本 1 支持 8 个或更多）。

    - 材质，使用`GLKEffectPropertyMaterial`类。

    - 支持材质及其所有相关属性。

    - 雾。

    - 多重纹理。


    以下是两个子类：


    - `GLKReflectionMap`：将对象变成一个闪亮的玩具。

    - `GLKSkyboxEffect`：创建一个 360 度全景。


    ---


    **第 10 章：OpenGL ES 2、着色器以及……**（第 334 页）


    反射效果和天空盒都是游戏及其他领域中常用的标准效果。天空盒在飞行模拟器中非常有用，你可以环顾四周并沉浸在虚拟世界中。


    ## GLKReflectionMap


    有时也称为环境映射，反射映射用于使对象看起来像是用最光滑的金属或玻璃制成的。由于其外观酷炫且相对容易实现，因此在游戏及其他领域很常见。


    反射效果主要源于将固定纹理与在其下方移动或旋转的几何体结合使用。这意味着反射面的纹理坐标会动态变化，以抵消底层对象可能产生的任何运动。


    最常用的“环境”纹理通常采用所谓的立方体贴图形式。立方体贴图是一种可以细分为六个正方形，然后以立方体形式重新组装在反射对象周围的纹理。为什么用立方体而不是球体？主要是为了减少麻烦，除非你喜欢麻烦并希望获得尽可能纯净且无失真的反射纹理。但创建立方体贴图比创建完整的
    360 度球体贴图更容易。


    想象一下，用纸制成的立方体展开后的样子，以 Hedly 和他的伙伴们为主题，如图 10-8 所示。


    ---


    **第 10 章：OpenGL ES 2、着色器以及……**（第 335 页）


    图 10-8：Hedly 和他的朋友们。他们是一群安静的家伙。


    那么，如何使用立方体贴图呢？首先，需要习惯在纹理坐标中添加第三个分量，该分量指定要使用的立方体面。立方体贴图基于以下几个假设：


    - 反射中的环境非常遥远，因此不会出现视差。

    - 除非你知道自己在找什么，否则不连续性很难被察觉。

    - 除非使用特殊的图像贴图进行补偿，否则对象无法反射自身的任何部分。

    - 对象具有弯曲表面，因为立方体贴图在镜面等平坦表面上看起来效果不佳。


    要使用反射/立方体贴图绘制对象，OpenGL 会从你的视点发射一条射线，将其从目标反射回来，并计算出它在立方体贴图上的命中位置。对象上的交点指定要使用的纹理坐标，而立方体贴图上的交点则选择要使用的纹素以及命中的是哪一面。


    ---


    **第 10 章：OpenGL ES 2、着色器以及……**（第 336 页）


    基于此，让我们使用`GLKReflectionMapEffect`向地球添加立方体贴图。


