    **68**


    Here is what is happening:


    Lines 1 and 2 specify the distances of the near and far clipping planes.


    These two values say that anything further than 1,000 or closer than .1


    will be filtered out. (‘‘A thousand what?’’ you might ask. Just a


    thousand; the units can be up to you. They could be light-years or


    cubits, it doesn’t matter.)


    Line 3 sets the field of view to 60 degrees.


    Lines 4 and 5 calculate the aspect ratio of the final screen. Its height and width
    values clamp the FOV to the height; flipping it would make it relative to the
    width. So if we want the field-of-view to be 60 degrees, similar to that of a
    wide-angle lens, it will be based on the height of our window and not the width.
    This is important to know when rendering


    to a non-square screen.


    Because the frustum affects the projection matrix, we need to ensure that it is
    activated instead of the modelview matrix, in line 6.


