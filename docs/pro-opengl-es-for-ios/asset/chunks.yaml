    Computer graphics have always been the darling of the software world. Laypeople
    can appreciate computer graphics more easily than, say, increasing the speed of
    a sort algorithm by 3 percent or adding automatic tint control to a spreadsheet
    program. You are likely to hear more people say “Cooooolllll!” at your nicely
    rendered image of Saturn on your iPad than at a Visual Basic script in Microsoft
    Word (unless, of course, a Visual Basic script in Microsoft Word can render Saturn,
    then that really would be cool). The cool factor goes up even more so when said
    renderings are on a device you can carry around in your back pocket. Let’s face
    it—Steve Jobs has made the life of art directors on science-fiction films very
    difficult. After all, imagine how hard it must be to design a prop that looks
    more futuristic than an iPad. (Even before the iPhone was available for sale,
    the prop department at ABC’s LOST borrowed some of Apple’s screen iconography
    for use in a two-way radio carried by a helicopter pilot.) If you are reading
    this book, chances are you have an iOS-based device or are considering getting
    one in the near future. If you have one, put it in your hand now and consider
    what a miracle it is of 21st-century engineering. Millions of man-hours, billions
    of dollars of research, centuries of overtime, plenty of all-nighters, and an
    abundance of Jolt-drinking, T-shirt-wearing, comic-book-loving engineers coding
    into the silence of the night have gone into making that little glass and plastic
    miracle-box so you could play DoodleJump when Mythbusters is in reruns.


    [www.it-ebooks.info](http://www.it-ebooks.info)


