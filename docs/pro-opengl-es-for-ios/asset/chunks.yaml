  trans: "\n### 关于 `setupGL()` 的补充说明\n\n关于本示例，还有一个要点体现在它的 `setupGL()` 方法中。虽然第 1 章已简要提及，但现在是时候更仔细地看看数据在\
    \ OpenGL ES 2 程序中是如何传递给 GPU 的。顶点数组对象（VAO，切勿与顶点缓冲对象混淆）代表一组描述场景特定状态的信息集合。与其他对象一样，创建/使用\
    \ VAO 遵循相同的流程：生成唯一 ID、绑定、填充数据，然后解绑备用。可以生成多个 VAO，各自承载场景不同部分的几何体指针和属性。在立方体示例中，请参考代码清单\
    \ 10-7。生成 VAO ID 并将其绑定为当前 VAO 后，会为交错排列的几何数据创建一个顶点缓冲对象。随后，VAO 会被通知 VBO 数据的组织方式，在此示例中，仅涉及位置和法线数据。\n\
    \n**代码清单 10-7.** 创建顶点数组对象\n\n```\nglGenVertexArraysOES(1, &_vertexArray);\nglBindVertexArrayOES(_vertexArray);\n\
    glGenBuffers(1, &_vertexBuffer);\nglBindBuffer(GL_ARRAY_BUFFER, _vertexBuffer);\n\
    glBufferData(GL_ARRAY_BUFFER, sizeof(gCubeVertexData), gCubeVertexData, GL_STATIC_DRAW);\n\
    glEnableVertexAttribArray(GLKVertexAttribPosition);\nglVertexAttribPointer(GLKVertexAttribPosition,\
    \ 3, GL_FLOAT, GL_FALSE, 24, BUFFER_OFFSET(0));\nglEnableVertexAttribArray(GLKVertexAttribNormal);\n\
    glVertexAttribPointer(GLKVertexAttribNormal, 3, GL_FLOAT, GL_FALSE, 24, BUFFER_OFFSET(12));\n\
    glBindVertexArrayOES(0);\n```\n\n当需要绘制时，将 VAO 句柄设置为当前 VAO，并调用标准的 `glDrawArray()`\
    \ 例程。\n\n---\n\n### 地球夜景\n\n让我们从地球模型开始，看看如何利用着色器使其更生动。你熟悉地球表面的图像，如图 10-2（左图）所示，但你可能也见过类似的地球夜景图像，如图\
    \ 10-2（右图）所示。如果能在地球的暗面显示夜景纹理，而不是仅仅显示常规纹理贴图的暗色版本，那将会非常酷。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 278](img/index-322_1.jpg)\n\n**第 10 章：OpenGL ES 2、着色器与...** **319**\n\
    \n**图 10-2.** 白天地球（左）与夜地球（右）对比\n\n在 OpenGL 1.1 下，即使可能实现，这也非常棘手。算法应该相对简单：渲染两个尺寸完全相同的球体。一个使用夜图像，另一个使用日图像。根据光照强度改变日半球纹理的\
    \ alpha 通道。当光照强度降至 0 时，纹理完全透明，夜半球显露出来。然而，在 OpenGL ES 2 下，你可以非常轻松地编写着色器，几乎完全匹配该算法。\n\
    \n于是，我从 Apple 的立方体模板开始，去掉了立方体相关内容，并添加了 `Planet.mm` 和 `Planet.h` 文件。`setupGL()`\
    \ 修改为代码清单 10-8。注意加载两个纹理和两个着色器程序的过程。\n\n**代码清单 10-8.** 设置显示地球夜景\n\n```\n- (void)setupGL\n\
    {\n    int planetSize=20;\n    [EAGLContext setCurrentContext:self.context];\n\
    \    [self loadShaders:&m_NightsideProgram shaderName:@\"nightside\"];\n    [self\
    \ loadShaders:&m_DaysideProgram shaderName:@\"dayside\"];\n    float aspect =\
    \ fabsf(self.view.bounds.size.width / self.view.bounds.size.height);\n    m_ProjectionMatrix\
    \ = GLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f),\n              \
    \                                    aspect, 0.1f, 100.0f);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**第 10 章：OpenGL ES 2、着色器与...** **320**\n\n```\n    glEnable(GL_DEPTH_TEST);\n\
    \    m_EyePosition=GLKVector3Make(0.0,0.0,65.0);\n    m_WorldModelViewMatrix=GLKMatrix4MakeTranslation(-m_EyePosition.x,-m_EyePosition.y,-m_EyePosition.z);\n\
    }\n```\n"
- fmt: "`m_Sphere=[[Planet alloc] init:planetSize slices:planetSize radius:10.0f squash:1.0f\
    \ textureFile:NULL];`\n\n`[m_Sphere setPositionX:0.0 Y:0.0 Z:0.0];`\n\n`m_EarthDayTexture=[self\
    \ loadTexture:@\"earth_light.png\"];` `m_EarthNightTexture=[self loadTexture:@\"\
    earth_night.png\"];`\n\n`m_LightPosition=GLKVector3Make(100.0, 10,100.0);` //behind\
    \ the earth\n\n`}`\n\n在`loadShaders()`中，我仅仅增加了一个属性，即`texCoord`（纹理坐标）。这些属性在片段着色器中恢复：\n\
    \n`glBindAttribLocation(*program, ATTRIB_VERTEX, \"position\");` `glBindAttribLocation(*program,\
    \ ATTRIB_NORMAL, \"normal\");` `glBindAttribLocation(*program, GLKVertexAttribTexCoord0,\
    \ \"texCoord\");`\n\n我还将光源的位置作为 uniform 变量传递，而不是在顶点着色器中硬编码。这通过以下几个步骤完成：\n\n首先，将其添加到着色器中：`uniform\
    \ vec3 lightPosition;`。\n\n然后，在`loadShaders()`中，使用`glGetUniformLocation()`获取其“位置”。该函数仅返回一个会话内的唯一\
    \ ID，之后在向着色器设置或获取数据时使用。\n\n然后可以通过以下方式设置光源位置：\n\n`glUniform3fv(uniforms[UNIFORM_LIGHT_POSITION],1,m_LightPosition.v);`\n\
    \n接着修改调用，添加两个参数，以便能够使用不同的着色器名称进行调用，并添加一个指向程序句柄的指针。同时记得修改代码以支持参数，而不是临时变量：\n\n`-\
    \ (BOOL)loadShaders:(GLuint *)program shaderName:(NSString *)shaderName`\n\n现在，在清单\
    \ 10-9 中，地球的两面都被绘制，夜晚的一面先绘制，白昼的一面后绘制。根据需要交换程序（shader program）。\n\n清单 10-9. 处理该情况的`drawInRect()`方法\n\
    \n```\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n{\n    GLfloat\
    \ gray=0.0;\n    static int frame=0;\n\n    glClearColor(gray,gray,gray, 1.0f);\n\
    \    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\n    //nightside\n\
    \    [self useProgram:m_NightsideProgram];\n    [m_Sphere setBlendMode:PLANET_BLEND_MODE_SOLID];\n\
    \    [m_Sphere execute:m_EarthNightTexture.name];\n\n    //dayside\n    [self\
    \ useProgram:m_DaylightProgram];\n    [m_Sphere setBlendMode:PLANET_BLEND_MODE_FADE];\n\
    \    [m_Sphere execute:m_EarthDayTexture.name];\n\n    //atmosphere\n    glCullFace(GL_FRONT);\n\
    \    glEnable(GL_CULL_FACE);\n    glFrontFace(GL_CW);\n\n    frame++;\n}\n```\n\
    \n在地球的白昼一侧，我使用`m_DaysideProgram`程序，而夜晚一侧则使用另一个称为`m_NightsideProgram`的程序。两者使用相同的顶点着色器，如清单\
    \ 10-10 所示。\n\n清单 10-10. 地球白昼和夜晚两侧的顶点着色器\n\n```\nattribute vec4 position;\nattribute\
    \ vec3 normal;\nattribute vec2 texCoord; //1\n\nvarying vec2 v_texCoord;\nvarying\
    \ lowp vec4 colorVarying;\n\nuniform mat4 modelViewProjectionMatrix;\nuniform\
    \ mat3 normalMatrix;\nuniform vec3 lightPosition; //2\n\nvoid main()\n{\n    v_texCoord=texCoord;\
    \ //3\n\n    vec3 eyeNormal = normalize(normalMatrix * normal);\n    vec4 diffuseColor\
    \ = vec4(1.0, 1.0, 1.0, 1.0);\n\n    float nDotVP = max(0.0, dot(normalDirection,\
    \ normalize(lightPosition)));\n    colorVarying = diffuseColor * nDotVP;\n\n \
    \   gl_Position = modelViewProjectionMatrix * position;\n}\n```\n\n这与 Apple 的模板几乎相同，但我们添加了一些内容：\n\
    \n第 1 行用于传递一个额外的属性，即每个顶点的纹理坐标。然后通过第 3 行使用`v_texCoord` varying 变量将其直接传递给片段着色器。\n\
    \n第 2 行是新的 uniform 变量，您可能还记得在视图控制器的代码中，它保存了光源的位置。\n\n清单 10-11 展示了地球白昼一侧的片段着色器，而清单\
    \ 10-12 则展示了夜晚一侧的片段着色器。"
