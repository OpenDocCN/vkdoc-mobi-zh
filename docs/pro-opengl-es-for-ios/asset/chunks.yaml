    \ to cache one model of the sphere on the CPU and use it for any planet or moon,\
    \ short of Phobos or Deimos or Hyperion or Nix or Miranda….\n\n#### Listing 9-1.\
    \ Creating a VBO for the Planet Model\n\n```\n-(void)createVBO\n{\n    int numXYZElements=3;\n\
