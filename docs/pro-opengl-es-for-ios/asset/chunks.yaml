- fmt: "# Perspective Projection and Parallel Projection\n\nPerspective projection\
    \ is the way we see the 3D world on our 2D retina. Perspective views consist of\
    \ vanishing points and foreshortening. Vanishing points are where all parallel\
    \ lines converge in the distance, providing the perception of depth (think of\
    \ railroad tracks heading toward the horizon). The result is that the closer something\
    \ is, the bigger it appears, and vice versa, as shown in Figure 2-7. The parallel\
    \ variety, also called orthographic projection, simply removes the effects of\
    \ distance by effectively setting the `z` component of each vertex to `0` (the\
    \ location of our viewing plane), as shown in Figure 2-8.\n\n**Figure 2-7.** Perspective\
    \ projection\n\n**Figure 2-8.** Parallel projection\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 63](index-50_1.jpg)  \n![Image 64](index-50_2.jpg)\n\n## Chapter 2:\
    \ All That Math Jazz\n\nIn perspective projection, the distance component, `z`,\
    \ is used to scale what will ultimately be the screen `x` and screen `y` values.\
    \ So, the larger the `z`, or the distance away from the viewer, the smaller the\
    \ pieces are visually. What one needs is the dimension of the viewport (OpenGL’s\
    \ version of your window or display screen) and its center point, which is typically\
    \ the origin of the XY plane.\n\nThis final phase involves setting up the viewing\
    \ frustum. The frustum establishes six clipping planes (top, bottom, left, right,\
    \ near, and far) needed to precisely determine what should be visible to the user\
    \ and how it is projected onto their viewport, which is OpenGL’s version of your\
    \ window or screen. This acts something like a lens into your OpenGL virtual world.\
    \ By changing the values, you can zoom in or out and clip stuff really far away\
    \ or not at all, as shown in Figures 2-9 and 2-10. The perspective matrix is defined\
    \ by these values.\n\n**Figure 2-9.** Narrow bounds for the frustum give you a\
    \ high-power lens.\n\n**Figure 2-10.** Wider bounds are like a wide-angle lens.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 65](index-51_1.jpg)\n\
    \n## Chapter 2: All That Math Jazz\n\nWith these boundaries established, the one\
    \ final transformation is that to the viewport, OpenGL’s version of your screen.\
    \ This is the point where OpenGL is fed the screen’s dimensions, those of your\
    \ display area, and the origin, which is likely the lower-left corner of the screen.\
    \ On small devices such as the iPhone or iPad, you will likely fill up the entire\
    \ screen and so will use the screen’s width. But should you want to place the\
    \ image into a subwindow of the main display, you could simply pass smaller values\
    \ to the viewport. The law of similar triangles plays out here.\n\nIn Figure 2-11\
    \ we want to find what the projected `x’` is, given the `x` of an arbitrary vertex\
    \ on the model. Consider two triangles, one formed by the corners CBA and the\
    \ other smaller one by COA’ (the O is for origin). The distance from C (where\
    \ the eye is, to O is `d`). The distance from C to B is `d + z`. So, just taking\
    \ the ratio of those, as follows:\n\n```\nx’ / x = d_eye / (z + d_eye)\ny’ / y\
    \ = d_eye / (z + d_eye)\n```\n\nyields the following:\n\n```\nx’ = (x * d_eye)\
    \ / (z + d_eye)\ny’ = (y * d_eye) / (z + d_eye)\n```\n\n**Figure 2-11.** Mapping\
    \ a vertex to the viewport using the Law of Similar Triangles\n\nFigure 2-12 shows\
    \ the final translations. Those can be added to `x’` and `y’`:\n\n```\nx’ = (x\
    \ * d_eye) / (z + d_eye) + Tx\ny’ = (y * d_eye) / (z + d_eye) + Ty\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 66](index-52_1.jpg)  \n![Image 67](index-52_2.jpg)\n\n## Chapter 2:\
    \ All That Math Jazz\n\n**Figure 2-12.** Projecting `x` and `y` onto the device’s\
    \ screen. You can visualize this as either translating the iPhone (or iPad) to\
    \ the object’s coordinates (left) or translating the object to the iPhone’s coordinates\
    \ (right).\n\nAnd when the pixel dust settles, we have a nice matrix form:\n\n\
    ```\n[ x’ ]   [ d   0   0   Tx ] [ x ]\n[ y’ ] = [ 0   d   0   Ty ] [ y ]\n[ z’\
    \ ]   [ 0   0   0   0  ] [ z ]\n[ 1  ]   [ 0   0   1   d  ] [ 1 ]\n```\n\nUsually,\
    \ some final scaling is required—for example, if the viewport is normalized. But\
    \ that is left up to you."
