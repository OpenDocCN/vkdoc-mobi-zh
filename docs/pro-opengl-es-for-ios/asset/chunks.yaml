    the second instructs which face is to be culled. In this case, the triangles facing
    away from us don’t need to be rendered.


    **Note** glEnable() is a frequent call and is used to change various states, from
    eliminating back faces, as shown earlier, to smoothing points (**GL_POINT-SMOOTH**),
    to performing depth tests (**GL_DEPTH_TEST**). It can also affect performance
    if you use it a lot. Best practice is to minimize use of glEnable() as much as
