    \ f 1⎦⎣ 1⎦\n```\n\nNow take a look at the structure `CGAffineTransform`:\n\n```\n\
    struct CGAffineTransform {\n    CGFloat a;\n    CGFloat b;\n    CGFloat c;\n \
