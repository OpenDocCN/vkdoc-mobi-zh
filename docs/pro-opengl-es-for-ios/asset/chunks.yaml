    \n作为副作用，如果你以任何方式修改了着色器，则必须在修改生效前重新链接。为了防止需要重新链接的情况，驱动程序可能会保留一些缓存信息以备后用。否则，分离/删除的过程可以帮助驱动程序重用缓存内存。\n\
    \n如你所见，实际需要的调用非常少，但苹果的演示代码也包含了所有的错误处理，这也是保留该代码的原因。\n\n现在，解决了这些问题后，我们可以来看看这两个着色器。清单\
    \ 10-5 是顶点着色器`Shader.vsh`。请注意，这对着色器共享相同的前缀，顶点着色器的后缀为`vsh`，而片段着色器的后缀为`fsh`。\n\n\
    **清单 10-5. 演示程序的顶点着色器**\n\n```glsl\nattribute vec4 position; //1\nattribute vec3\
    \ normal;\n\nvarying lowp vec4 colorVarying; //2\n\nuniform mat4 modelViewProjectionMatrix;\
    \ //3\nuniform mat3 normalMatrix;\n\nvoid main()\n{\n    vec3 normalDirection\
    \ = normalize(normalMatrix * normal); //4\n    vec3 lightPosition = vec3(0.0,\
    \ 0.0, 1.0); //5\n    vec4 diffuseColor = vec4(0.4, 0.4, 1.0, 1.0); //6\n\n  \
    \  float nDotVP = max(0.0, dot(eyeNormal, normalize(lightPosition))); //7\n\n\
    \    colorVarying = diffuseColor * nDotVP; //8\n\n    gl_Position = modelViewProjectionMatrix\
    \ * position; //9\n}\n```\n\n详细说明如下：\n\n第 1 行声明了我们在调用代码中指定的属性。请记住，属性是直接映射到每个顶点的数据数组，并且仅在顶点着色器中可用。\n\
    \n在第 2 行中，声明了一个 varying 向量变量。它将用于将颜色信息传递到片段着色器。\n\n第 3 行声明了两个 uniform 变量，它们最初是在前面的`loadShaders()`函数中指定的。\n\
    \n在第 4 行中，法线乘以`normalMatrix`。在这种情况下不能使用模型视图矩阵，因为法线不需要平移，而且模型视图中的任何缩放都会扭曲法线。事实证明，你可以使用模型视图矩阵的逆矩阵和转置矩阵来处理法线。之后，对结果进行归一化处理。\n\
    \n第 5 行提供了光源的位置，而第 6 行提供了默认颜色。通常你不会将这些数据嵌入着色器内部，但这样做很可能是为了方便起见。\n\n现在，在第 7 行中，计算法线（现在称为`eyeNormal`）与光源位置的点积，以得出两者之间的夹角。`max()`函数确保返回值被限制在`>=0`范围内，以处理任何负值。\n\
    \n然后，如第 7 行所示，只需将点积乘以漫反射颜色，就能得到一个面相对于光源局部位置的亮度。法线越朝向光源，亮度越高。随着法线偏离光源，亮度会降低，最终变为\
    \ 0。\n\n`gl_Position`是 GLSL 中预定义的 varying 变量，用于将变换后的顶点位置传回驱动程序。\n\n此示例中的片段着色器是最基本的实现。它只是将颜色信息从顶点着色器原封不动地传递过来。`gl_FragColor`是另一个预定义的\
    \ varying 变量，所有最终计算都在这里完成，如清单 10-6 所示。\n\n**清单 10-6. 最简单的片段着色器**\n\n```glsl\n\
    varying lowp vec4 colorVarying;\n\nvoid main()\n{\n    gl_FragColor = colorVarying;\n\
    }\n```\n\n现在我们准备使用着色器了，事实证明它们出乎意料地简单明了。\n\n首先，`glUseProgram()`设置当前程序，接着使用`glUniform*`函数将应用中的值传递到显卡上的着色器中。属性通常与几何体同时提供，通过调用`glVertexAttribPointer()`等函数来实现。"
- fmt: "### One Additional Note on `setupGL()`\n\nOne additional note regarding this\
    \ example is to be found in its `setupGL()` method. This was briefly touched upon\
    \ in Chapter 1, but now is a good time to take a little closer look at how the\
    \ data is actually passed to the GPU in an OpenGL ES 2 program. Vertex array objects\
    \ (VAOs), not to be confused with vertex buffer objects, represent a collection\
    \ of information that describes a specific state of your scene. As with other\
    \ objects, creating/using VAOs follows the same path: generate a unique ID, bind\
    \ it, fill it up, and then unbind it until needed. Many VAOs can be generated\
    \ that haul about the pointers of the geometry and attributes of different aspects\
    \ of your world. In the cube example, consider Listing 10-7. After the VAO ID\
    \ is generated and bound as the current VAO, a vertex buffer object is created\
    \ for the interleaved geometric data. Afterward, the VAO is notified about how\
    \ the VBO data is organized, and in this case, just the position and normals are\
    \ addressed.\n\n**Listing 10-7.** Creating the Vertex Array Object\n\n```\nglGenVertexArraysOES(1,\
    \ &_vertexArray);\nglBindVertexArrayOES(_vertexArray);\nglGenBuffers(1, &_vertexBuffer);\n\
    glBindBuffer(GL_ARRAY_BUFFER, _vertexBuffer);\nglBufferData(GL_ARRAY_BUFFER, sizeof(gCubeVertexData),\
    \ gCubeVertexData, GL_STATIC_DRAW);\nglEnableVertexAttribArray(GLKVertexAttribPosition);\n\
    glVertexAttribPointer(GLKVertexAttribPosition, 3, GL_FLOAT, GL_FALSE, 24, BUFFER_OFFSET(0));\n\
    glEnableVertexAttribArray(GLKVertexAttribNormal);\nglVertexAttribPointer(GLKVertexAttribNormal,\
    \ 3, GL_FLOAT, GL_FALSE, 24, BUFFER_OFFSET(12));\nglBindVertexArrayOES(0);\n```\n\
    \nWhen it comes time to draw, the VAO handle is set to be the current one, and\
    \ the normal `glDrawArray()` routine is called.\n\n---\n\n### Earth at Night\n\
    \nLet’s start with our earth model and see how shaders can be used to make it\
    \ more interesting. You’re familiar with the image used for the earth’s surface,\
    \ as shown in Figure 10-2 (left), but you may have also seen a similar image of\
    \ the earth at night, as shown in Figure 10-2 (right). What would be neat is if\
    \ we could show the night texture on the dark side of the earth, instead of just\
    \ a dark version of the regular texture map.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 278](index-322_1.jpg)\n\n**CHAPTER 10: OpenGL ES 2, Shaders, and...**\
    \ **319**\n\n**Figure 10-2.** The daytime earth (left) vs. the nighttime earth\
    \ (right)\n\nUnder OpenGL 1.1, this would be very tricky to accomplish if at all.\
    \ The algorithm should be relatively simple: render two spheres of exactly the\
    \ same dimensions. One has the night image, and the other has the day image. Vary\
    \ the daylight-side alpha channel of the texture of the day-side earth based on\
    \ the illumination. When illumination reaches 0, it is completely transparent,\
    \ and the night portion shows through. However, under OpenGL ES 2, you can code\
    \ the shaders very easily to match the algorithm almost exactly.\n\nSo, I started\
    \ with the cube template from Apple and dumped the cube stuff and added `Planet.mm`\
    \ and `Planet.h` files. `setupGL()` was changed to Listing 10-8. Notice the loading\
    \ of the two textures and two shader programs.\n\n**Listing 10-8.** Setting Up\
    \ to Show Earth at Night\n\n```\n- (void)setupGL\n{\n    int planetSize=20;\n\
    \    [EAGLContext setCurrentContext:self.context];\n    [self loadShaders:&m_NightsideProgram\
    \ shaderName:@\"nightside\"];\n    [self loadShaders:&m_DaysideProgram shaderName:@\"\
    dayside\"];\n    float aspect = fabsf(self.view.bounds.size.width / self.view.bounds.size.height);\n\
    \    m_ProjectionMatrix = GLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f),\n\
    \                                                  aspect, 0.1f, 100.0f);\n```\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**CHAPTER 10: OpenGL ES 2,\
    \ Shaders, and...** **320**\n\n```\n    glEnable(GL_DEPTH_TEST);\n    m_EyePosition=GLKVector3Make(0.0,0.0,65.0);\n\
    \    m_WorldModelViewMatrix=GLKMatrix4MakeTranslation(-m_EyePosition.x,-m_EyePosition.y,-m_EyePosition.z);\n\
    }\n```"
