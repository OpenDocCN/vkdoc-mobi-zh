    cover those in detail in this chapter followed by a look at some of the tools
    Apple provides developers specifically for analyzing and debugging OpenGL programs.


    **Vertex Buffer Objects**


    The two main arenas of performance enhancements are minimizing the data transfer
    to and from the graphics hardware and minimizing data itself. Vertex buffer objects
    (VBOs) are part of the former process. When you generated your geometry and sent
    it merrily along to be displayed, the usual process was to tell the system where
    to find each of the needed blocks of data, enabling which data to use (vertex,
    normals, colors, and texture coordinates) and then drawing it. Each time **glDrawArrays()**
    or **glDrawElements()** is called, all of the data must be packed up and shipped
    to the graphics processing unit


