- fmt: "Let’s just look at one, `GL_LINEAR_ATTENUATION`, for the time being. The math\
    \ behind all three will be unveiled in a moment. Add the following line to `initLighting()`:\
    \ `glLightf(SS_SUNLIGHT,GL_LINEAR_ATTENUATION,.025);`\n\nAnd just to make things\
    \ a little clearer visually, ensure that the emissive material is turned off.\
    \ What do you see? Now increase the distance down the X-axis from 10 to 50 in\
    \ the `pos` vector. Figure 4-12 illustrates the results.\n\n![Image 137](index-117_1.jpg)\n\
    \n![Image 138](index-117_2.jpg)\n\n**CHAPTER 4: Turning On the Lights**\n\n**113**\n\
    \n**Figure 4-12.** The light’s x distance is 10 (left) and 50 (right), with a\
    \ constant attenuation of 0.025.\n\n### Spotlights\n\nThe standard lights default\
    \ to an isotropic model; that is, they are like a desk light without a shade,\
    \ shining equally (and blindingly) in all directions. OpenGL provides three additional\
    \ lighting parameters that can turn the run-of-the-mill light into a directional\
    \ light: `GL_SPOT_DIRECTION`, `GL_SPOT_EXPONENT`, and `GL_SPOT_CUTOFF`.\n\nSince\
    \ it is a directional light, it is up to you to aim it using the `GL_SPOT_DIRECTION`\
    \ vector. It defaults to 0,0,-1, pointing down the --Z-axis, as shown in Figure\
    \ 4-13. Otherwise, if you want to change it, you would use a call similar to the\
    \ following that aims it down the +X-axis:\n\n```\nGLfloat direction[]={1.0,0.0,0.0};\n\
    glLightfv(GL_LIGHT0, GL_SPOT_DIRECTION, direction);\n```\n\n![Image 139](index-118_1.jpg)\n\
    \n**CHAPTER 4: Turning On the Lights**\n\n**114**\n\n**Figure 4-13.** A spotlight\
    \ aimed at the default direction\n\n`GL_SPOT_CUTOFF` specifies the angle at which\
    \ the spotlight’s beam fades to 0 intensity from the center of the spotlight’s\
    \ cone and is naturally half the angular diameter of the full beam. The default\
    \ value is 45 degrees, for a beam width of 90 degrees. And the lower the value,\
    \ the narrower the beam.\n\nThe third and final spotlight parameter, `GL_SPOT_EXPONENT`,\
    \ establishes the rate of drop-off of the beam’s intensity, which is still another\
    \ form of attenuation. OpenGL ES will take the cosine of the angle formed by the\
    \ beam’s center axis and that of an arbitrary vertex, Θ, and raise it to the power\
    \ of `GL_SPOT_EXPONENT`. Because its default is 0, the light’s intensity will\
    \ be the same across all parts of the illuminated region until the cutoff value\
    \ is reached, and then it drops to zero.\n\n### Light Parameters in Play\n\nTable\
    \ 4-1 summarizes the various light parameters covered in this section.\n\n**Table\
    \ 4-1.** All of the Possible Lighting Parameters for `glLight()` Calls in OpenGL\
    \ ES 1.1\n\n| Name | Purpose |\n| :--- | :--- |\n| `GL_AMBIENT` | Sets the ambient\
    \ component of a light |\n| `GL_DIFFUSE` | Sets the diffuse component of a light\
    \ |\n| `GL_SPECULAR` | Sets the specular component of a light |\n| `GL_POSITION`\
    \ | Sets the x,y,z coordinates of the light |\n| `GL_SPOT_DIRECTION` | Aims a\
    \ spotlight |\n| `GL_SPOT_EXPONENT` | Specifies the rate of falloff from the center\
    \ of a spotlight’s beam |\n| `GL_SPOT_CUTOFF` | Specifies the angle from the center\
    \ of a spotlight’s beam and drops to 0 intensity |\n| `GL_CONSTANT_ATTENUATION`\
    \ | Specifies the constant of the attenuation factor |\n| `GL_LINEAR_ATTENUATION`\
    \ | Specifies the linear component of the attenuation factor; simulates fog or\
    \ other natural phenomena |\n| `GL_QUADRATIC_ATTENUATION` | Specifies the quadratic\
    \ portion of the attenuation factor, simulating the normal decrease in intensity\
    \ as a function of distance |\n\n### The Math Behind Shading\n\nThe diffuse shading\
    \ model gives a very smooth look to objects, as you have seen. It uses something\
    \ called the Lambert lighting model. Lambert lighting states simply that the more\
    \ directly aimed a specific face is to the light source, the brighter it will\
    \ be. The ground beneath your feet is going to be brighter the higher the sun\
    \ is in the sky. Or in the more obscure but precise technical version, the reflective\
    \ light increases from 0 to 1 as the angle, Θ, between the incident light, I,\
    \ and the face’s normal, N, decrease from 90 to 0 degrees based on cos (Θ). See\
    \ Figure 4-14. Here’s a quickie thought experiment: when Θ is 90 degrees, it is\
    \ coming from the side; cos(90) is 0, so the reflected light along N is naturally\
    \ going to be 0. When it is coming straight down, parallel to N, cos(0) will be\
    \ 1, so the maximum amount will be reflected back. And this can be more formally\
    \ expressed as follows:\n\n\\[\n I_d = k_d I_i \\cos(\\Theta)\n\\]\n\n`Id` is\
    \ the intensity of the diffuse reflection, `Ii` is the intensity of the incoming\
    \ ray of light, and `k d` represents the diffuse reflectance that is loosely coupled\
    \ to the roughness of the object’s material. Loosely means that in a lot of real-world\
    \ materials, the actual surface may be somewhat polished but yet translucent,\
    \ while the layers immediately underneath perform the scattering. Materials such\
    \ as this may have both strong diffuse and specular components. Also, each color\
    \ band may have its own k value in real life, so there would be one for red, green,\
    \ and blue.\n\n![Image 140](index-120_1.jpg)\n\n**CHAPTER 4: Turning On the Lights**\n\
    \n**116**\n\n**Figure 4-14.** For a perfectly diffuse surface, the reflected intensity\
    \ of an incoming beam will be the vertical component of that beam, or cosine of\
    \ the angle between the incoming beam and the surface normal.\n\n### Specular\
    \ Reflections\n\nAs referenced earlier, specular reflections serve to give your\
    \ model a shiny appearance besides the more general diffuse surface. Few things\
    \ are perfectly flat or perfectly shiny, and most lay somewhere in between. In\
    \ fact, the earth’s oceans are good specular reflectors, and on images of the\
    \ earth from long distances, the sun’s reflection can clearly be seen in the oceans.\n\
    \nUnlike a diffuse \"reflection,\" which is equal in all directions, a specular\
    \ reflection is highly dependent on the viewer’s angle. We’ve been taught that\
    \ the angle of incidence = angle of reflectance. This is true enough for the perfect\
    \ reflector. But with the exception of mirrors, the nose of a '51 Studebaker,\
    \ or the nicely polished forehead of that Cylon centurion right before he blasts\
    \ you 150,000 years into the past, few things are perfect reflectors. And as such,\
    \ there will be a slight scattering of the incoming ray; see Figure 4-15.\n\n\
    ![Image 141](index-121_1.jpg)\n\n**CHAPTER 4: Turning On the Lights**\n\n**117**\n\
    \n**Figure 4-15.** For a specular reflection, the incoming ray is scattered but\
    \ only around the center of its reflected counterpart.\n\nThe equation of the\
    \ specular component can be expressed as follows:\n\n\\[\n I_{specular} = W(q)\
    \ I_{light} \\cos^n \\Theta\n\\]\n\nwhere:\n\n- `Ilight` is the intensity of the\
    \ incoming ray.\n- `W(q)` is how reflective the surfaces is based on the angle\
    \ of `Ilight`.\n- `n` is the shininess factor (sound familiar?).\n- `Θ` is the\
    \ angle between the reflected ray and the ray hitting the eye.\n\nThis is actually\
    \ based on what’s called the Fresnel Law of Reflection, which is where the W(q)\
    \ value comes from. Although W(q) is not directly used by OpenGL ES 1 because\
