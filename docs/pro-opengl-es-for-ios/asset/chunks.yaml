- fmt: "在所有这些图像中，背景是黑色的。更改背景的颜色并运行。图 7-16 中发生了什么？\n\n图 7-16\\. 惊喜！阴影并未被裁剪到平台上。\n\n\
    这里发生的是，我们在将阴影裁剪到平台时作弊了。当背景为黑色时，渲染到平台之外的阴影部分是看不见的。但现在，随着背景变亮，你可以看到完整的阴影。如果你一开始就需要浅色背景怎么办？使用模板（`stencils`）围绕平台进行裁剪，遮掉我们不需要的任何多余阴影部分，类似于之前的反射练习。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 7 章：渲染精妙的杂项**\n\n**244**\n\
    \n**总结**\n\n在本章中，我们介绍了一些额外技巧，为 OpenGL ES 场景增加更多真实感。首先是帧缓冲对象（`frame buffer objects`），它允许你绘制到多个\
    \ OpenGL 帧并将它们合并。接下来是镜头光晕（`lens flares`），可以为户外场景增加视觉戏剧效果，随后是苹果在其许多 UI 设计中大量使用的反射（`reflections`）和模板（`stencils`）。最后，我们介绍了使用阴影投影（`shadow\
    \ projection`）将阴影投射到背景上的多种方法之一。接下来，其中一些技巧将应用于我们的小型太阳系项目。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**第 8 章**\n\n**整合所有内容**\n\n即使穷尽一生专注于天空，也不足以研究如此广阔的领域。\n\n——塞内卡，罗马哲学家\n\n好了，现在我们一路走到了第\
    \ 8 章。这时，我们可以将从到目前为止的练习中学到的内容整合起来，构建成一个更完整的太阳系模型。之后，我希望你会说：“哇！这有点酷！”\n\n本章将包含大量代码，因为该模型既需要许多新例程，也需要对现有项目进行修改。因此，与第\
    \ 7 章一样，我将打破前几章的风格，不会呈现完整的代码文件，原因是它们过长或为了避免重复；因此，鼓励你从 Apress 网站获取完整的项目以及一些数据文件，以确保你拥有功能完整的示例。此外，还会加入一些新技巧，例如如何集成标准\
    \ iPhone UIKit 以及使用四元数（`quaternions`）。请注意，尽管以下很多代码基于之前的练习，但可能需要一些小的调整才能将其集成到更大的包中，所以不幸的是，这不仅仅是简单的剪切和粘贴。\n\
    \n**但视网膜显示屏怎么办？**\n\n是的，我知道，一切在视网膜显示屏上都看起来更好，所以在做其他事情之前，让我们告诉 OpenGL 如何处理更高分辨率。哦，等等。我们不再需要那样做了。在\
    \ iOS 5 之前，有必要使用`setContentScaleFactor`实例变量告诉 OpenGL 视图对象如何调整自身大小。对于旧式显示器，该值为`1.0`；对于视网膜显示屏，该值为`2.0`。在\
    \ `GLKit` 下，这种内务管理不再需要。然而，在设置视景体（`viewing frustum`）时调用`glViewPort()`时，你仍然需要获取视图的实际尺寸，如下所示，记住这里的视图实际上是继承自`UIView`的`GLKView`。\n\
    \n```\nglViewport(0, 0, view.drawableWidth, view.drawableHeight);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n**第 8 章：整合所有内容**\n\n**246**\n\n苹果推荐使用“drawable”字段，尽管如果你正在创建一个与屏幕尺寸相同的显示，使用`mainScreen`的`frame`的传统方式仍然有效。\n\
    \n**重新审视太阳系**\n\n回到第 5 章，获取用作最终项目的太阳系模型。第 7 章的模型被用作在 3D 对象上显示动态纹理的表面，但这里不会以那种方式使用它。\n\
    \n那么，首先要处理的是调整模型的大小，以呈现稍微更真实的展示。目前来看，地球看起来大约是太阳的三分之一大小，并且只有几千英里（如果你在意的话，也可以是几弗隆）远。考虑到北加州现在是宜人的秋日，而地球绝不是烧焦的余烬，我敢打赌这个模型是错的。好吧，让我们把它修正。这将在太阳系控制器的`initGeometry()`方法中完成。同时，`m_Eyeposition`的类型将被更改，升级为一个更面向对象的、为\
    \ 3D 操作定制的对象。新例程见清单 8-1。同时确保为太阳表面添加纹理；否则，可能会发生糟糕的事情。\n\n清单 8-1\\. 重新调整太阳系中对象的大小\n\
    \n```\n-(void)initGeometry\n{\n    //设 1.0 = 100 万英里。\n    // 太阳半径 = .4。\n   \
    \ // 地球半径 = .04（放大 10 倍以使其更容易看到）。\n\n    m_Eyeposition.x=0;\n    m_Eyeposition.y=0;\n\
    \    m_Eyeposition.z=93.25;\n\n    m_Earth=[[Planet alloc] init:48 slices:48 radius:0.04\n\
    \              squash:1.0 textureFile:@\"earth_light.png\"];\n\n    [m_Earth setPositionX:0.0\
    \ Y:0.0 Z:93.0];\n\n    m_Sun=[[Planet alloc] init:48 slices:48 radius:0.4\n \
    \           squash:1.0 textureFile:@\"sun_surface.png\"];\n\n}\n```\n\n`m_Eyeposition`现在被定义为一个新的`GLKVector3`对象。\n\
    \n**注意** 新的 iOS5 向量类设计得非常周到，因为它们使用联合（`unions`）来支持`xyz`值、`rgb`、`stp`（用于纹理坐标）以及非常流行的数组格式`float\
    \ v[3]`。其他容器类也使用了类似的约定。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n\
    ![Image 238](index-250_1.jpg)\n\n**第 8 章：整合所有内容**\n\n**247**\n\n我们模型的比例设置为 1 单位\
    \ = 100 万英里（170 万公里或 830 万弗隆）。太阳半径为 40 万英里，即这些单位下的 0.4。这意味着地球的半径将是 0.004，但我已将其增加\
    \ 10 倍，至 0.04，以使其更容易处理。因为地球的默认位置是沿 +Z 轴，让我们把眼睛位置放在地球正后方，仅 25 万英里远，位于“93.25”。并且，在太阳系对象的`execute`方法中，移除`glRotatef()`，这样地球现在将保持固定。这暂时使事情变得简单得多。确保根据需要修改头文件。去找你的朋友`setClipping()`，将视野从\
    \ 50 度改为 30 度；同时，将`zFar`设置为 2000（以处理未来的对象）。最终你应该得到类似图 8-1 的结果。因为从我们的视角看，太阳实际上在地球后面，我提高了`SS_FILLLIGHT1`的高光照明。\n\
    \n图 8-1\\. 我们在小屏幕上的家\n\n“说得很好，代码小子！”你一定在低声嘀咕。“但现在我们被困在太空中了！”确实如此，所以下一步是添加一个导航元素。这意味着（请播放戏剧性音乐）我们将要添加四元数（`quaternions`）。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n**第 8 章：整合所有内容**\n\n**248**\n\
    \n**这些四元数到底是什么？**\n\n1843 年 10 月 16 日，在都柏林，爱尔兰数学家威廉·哈密顿爵士在皇家运河旁散步时，突然灵光一现。他一直在寻找将空间中的两点进行有意义的乘法和除法的方法，突然间脑海中闪过了四元数的公式：*i*²\
    \ = *j*² = *k*² = *ijk* = −1。\n\n很厉害吧？"
  raw: 'In all of these images, the background is black. Change the coloring of the
    background and run. What’s going on in Figure 7-16?


    Figure 7-16\. Surprise! The shadow is not clipped to the platform.


    What’s happening here is that we were cheating when it comes to clipping the shadow
    against the platform. With the background black, the part of the shadow that rendered
    off the platform was invisible. But now as the background is brightened, you can
    see the full shadow. What happens if you need a light background in the first
    place? Use stencils to clip around the platform, blanking out any extra part of
    the shadow that we don’t need, similarly to the earlier reflection exercise.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 7: Well-Rendered Miscellany**


    **244**


    **Summary**


    In this chapter, we covered a number of extra tricks to add more realism to an
    OpenGL


    ES scene. First were frame buffer objects that let you draw to multiple OpenGL
    frames and merge them together. Next came lens flares that can add visual drama
    to outdoor scenes, followed by reflections and stencils that are heavily used
    by Apple in a lot of its UI design. We ended with one of the many ways shadows
    can be cast against a background using shadow projection. Next, some of these
    tricks will be applied to our little solar-system project.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **Chapter 8


    **Putting It All Together**


    A single lifetime, even though entirely devoted to the sky, would not be enough
    for the investigation of so vast a subject.


    -----Seneca, Roman philosopher


    Well, now we’ve made it all the way up to Chapter 8\. This is when we can take
    what was learned from the exercises up to this point and slap it together into
    a more complete solar-system model. And afterward, I hope you will say, ‘‘Wow!
    That’s kinda cool!’’


    This chapter will be very code heavy, because the model requires both a number
    of new routines and modifications to existing projects. So, as with Chapter 7
    I’ll be breaking with the style of the previous chapters and will not present
    entire code files because of their length or to avoid repetition; therefore, you
    are encouraged to fetch the full projects, as well as some data files, from the
    Apress site to ensure that you have fully functional examples. A few new tricks
    will also be tossed in for good measure such as how to integrate the standard
    iPhone UIKit and the use of quaternions. Note that although a lot of the following
    code is based on previous exercises, there are likely some small tweaks needed
    to integrate it into the larger package, so unfortunately this won’t simply be
    a cut-and-paste situation.


    **But What About a Retina Display?**


    Yes, I know, everything looks better on a Retina display, so let’s tell OpenGL
    how to handle the higher resolution before we do anything else. Oh, wait. We don’t
    have to do that anymore. Pre-iOS 5, it was necessary to tell the OpenGL view object
    how to size itself using the setContentScaleFactor instance variable. It would
    be 1.0 for the old-school displays, or 2.0 for Retina. Under the GLKit, that kind
    of housekeeping is no longer needed. However, you will still need to grab the
    actual dimensions of the view when it comes time to set the glViewPort() when
    setting the viewing frustum, as follows, remembering that the view here is actually
    the GLKView subclassed from the UIView.


    **glViewport(0, 0, view.drawableWidth, view.drawableHeight);**


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 8: Putting It All Together**


    **246**


    Using the ‘‘drawable’’ fields is recommended by Apple, although the more traditional
    way, using the frame of the mainScreen, should still be valid if you are creating
    a display to be the size of the screen.


    **Revisiting the Solar System**


    Go back to Chapter 5 and get the solar-system model that was used as the final
    project.


    The Chapter 7 model was used as a surface for displaying dynamic textures on 3D


    objects, but that won’t be used here in that way.


    So, the first thing to tackle is resizing our models to make a slightly more realistic
    presentation. As of right now, it looks like the earth is about a third the size
    of the sun and only a few thousand miles (or furlongs if you care) away. Considering
    that it is a pleasant fall day here in Northern California and the earth is anything
    but a burnt cinder, I bet the model is wrong. Well, let’s make it right. This
    will be done in the **initGeometry()** method in your solar-system controller.
    And while we’re at it, the type of **m_Eyeposition** will be changed to upgrade
    it to a slightly more objectified object customized for 3D


    operations. The new routine is in Listing 8-1\. Make sure to add a texture for
    the sun’s surface while you are at it; otherwise, nasty things might happen.


    Listing 8-1\. Resizing the objects for the solar system


    **-(void)initGeometry**


    **{**


    **//Let 1.0=1 million miles.**


    **// The sun''s radius=.4.**


    **// The earth''s radius=.04 (10x larger to make it easier to see).**


    ****m_Eyeposition.x=0;**


    **m_Eyeposition.y=0;**


    **m_Eyeposition.z=93.25;**


    ****m_Earth=[[Planet alloc] init:48 slices:48 radius:0.04**


    **squash:1.0 textureFile:@"earth_light.png"];**


    ****[m_Earth setPositionX:0.0 Y:0.0 Z:93.0];**


    ******m_Sun=[[Planet alloc] init:48 slices:48 radius:0.4**


    **squash:1.0 textureFile:@"sun_surface.png"];**


    ****}**


    **m_Eyeposition** is now defined as a new GLKVector3 object.


    **Note** The new iOS5 vector classes are very well thought out, because they use
    unions to support xyz values, rgb, stp (for texture coordinates), and the ever
    popular array format, float v[3]. Similar conventions are used for the other container
    classes as well.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 238](index-250_1.jpg)


    **CHAPTER 8: Putting It All Together**


    **247**


    The scale of our model is set at 1 unit=1 million miles (1.7m kilometers or 8.3m
    furlongs).


    The sun has a radius of 400,000 miles, or .4 in these units. That means earth’s
    radius would be .004, but I’ve increased it by 10 times, to .04, to make it a
    little easier to deal with. Because earth’s default position is along the +Z-axis,
    let’s put the eye position right behind the earth, only a quarter million miles
    away, at ‘‘93.25.’’ And in **the execute** **method for the solar-system object**,
    remove **glRotatef()** so that the earth will now stay fixed. That makes things
    a lot simpler for the time being. Make sure to modify the headers as needed. Go
    to your friend, **setClipping()**, and change the field of view from 50 degrees
    to 30; also, set zFar=2000 (to handle future objects). You should ultimately get
    something that looks like Figure 8-1\. Because the sun is actually behind the
    earth from our viewpoint, I cranked up the specular lighting for SS_FILLLIGHT1.


    Figure 8-1\. Our home on a tiny screen


    ‘‘All well and good, code-boy!’’ you must be muttering under your breath. ‘‘But
    now we’re stuck in space!’’ True enough, so that means the next step is to add
    a navigational element. And that means (cue dramatic music) we’ll be adding quaternions.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 8: Putting It All Together**


    **248**


    **What Are These Quaternion Things Anyway?**


    On October 16, 1843, in Dublin, Irish mathematician Sir William Hamilton was taking
    a stroll by the Royal Canal when he had a sudden flash of mathematical inspiration.
    He’d been working on ways to meaningfully multiply and divide two points in space
    and 2


    suddenly saw the formula for quaternions in his mind: *i* = *j* = *k* = *ijk*
    = 1


    − .


    Impressive, huh?'
