    \ 7-11 所示。此外，阴影无法投射到任意物体上。与其他方法一样，其基本流程是从光源视角和相机视角分别获取某种快照。光源视图被压扁到平面上，涂上合适的阴影颜色（即深色），然后遮挡物被渲染在最上层。\n\
    \n图 7-11：将阴影投射到平坦平面上，然后“重新投影”到观察者眼中的效果。阴影区域通过计算从光源出发、经过每个顶点的向量与平面的交点来确定。平面上的每个点构成一个“新”的物体，可以像平面上其他物体一样进行变换。清单\
    \ 7-15 展示了如何编写这段代码。\n\n让我们再次从基本的弹跳立方体演示开始（尽管其中大部分内容将针对阴影代码进行修改，但它仍可作为工作模板），但我们将替换新的视图控制器代码。清单\
    \ 7-11 涵盖了一些初始化参数。\n\n清单 7-11：需要添加到视图控制器的初始化内容\n\n```\n- (void)viewDidLoad\n{\n\
