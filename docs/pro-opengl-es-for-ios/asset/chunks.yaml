    ![Image 223](img/index-229_2.jpg)


    ![Image 224](img/index-229_3.jpg)


    **第 7 章：精心渲染的杂项**

    **226**


    **图 7-8. 使用模板创建反射效果**


    ## 阴影的来临


    在 OpenGL 中，阴影投射一直是一门偏玄学的技艺，在某种程度上现在依然如此。然而，随着更快的 CPU 和 GPU 的出现，许多过去更像研究生论文主题的行业技巧，终于可以走出理论，沐浴在实际应用的温暖光辉中。严格的阴影投射解决方案仍然是好莱坞使用的那种非实时渲染的领域，但在有限条件下，基本的阴影已经可用于全动态渲染。感谢各家硬件制造商为
    GPU 增加了阴影和光照支持，我们的 3D 宇宙看起来比以往任何时候都更加丰富，因为计算机图形学中很少有元素能比精心处理的阴影带来更强的真实感。（去问问任何一部好莱坞电影的灯光总监就知道了。）别忘了还有通过
    OpenGL ES 2 中的着色器实现的逐像素支持，它能让程序员在《毁灭一切 3》的每座阴森城堡的每个角落，都精细地渲染出阴影。


    有许多方法可以投射阴影，或者至少是看起来像阴影的东西。最简单的方法可能是使用预渲染的阴影纹理：一张看起来像是物体投射在地面上的阴影的位图，然后跟随物体的移动而移动。这种方法成本低、速度快，但极其有限。另一个极端是彻底的“渲染你所能看到的一切”软件，它能够轻松吞噬成堆的
    GPU。介于两者之间，有阴影映射、阴影体积和投影阴影等方法。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 225](img/index-230_1.jpg)


    **第 7 章：精心渲染的杂项**

    **227**


    ## 阴影映射


    曾几何时，最流行的阴影投射形式之一是通过阴影映射来实现的，这在游戏中经常使用。虽然设置起来有点麻烦，更不用说描述了，但其理论却相当简单…...


    深度阴影映射需要场景的两个快照。一个从光源的视角拍摄，另一个从相机的视角拍摄。从光源视角渲染时，图像自然会显示出光源所照射的一切。颜色信息会被忽略，但深度信息会被保留，因此我们最终会得到一个可见片元及其相对距离的映射图。然后从相机视角拍摄一张。通过比较这两张图像，我们可以找出相机能看到但光源照射不到的区域。这些区域就处于阴影中。


    当然，在实践中，这要稍微复杂一些。


    ## 阴影体积


    阴影体积通过非常巧妙地利用模板缓冲区的某些特性，来确定场景中哪些部分被照亮，哪些部分没有被照亮。这项技术之所以如此强大，是因为它允许阴影投射到任意几何形状上，这与投影阴影（稍后讨论）不同，后者实际上只适用于阴影投射到平面上的简化情况。

