    \ 0⎥⎢ y⎥\n    ⎣ e f 1⎦          ⎣ 1 ⎦   ⎣ e f 1⎦⎣ 1⎦\n```\n\n现在看看 `CGAffineTransform`\
    \ 的结构：\n\n```\nstruct CGAffineTransform {\n    CGFloat a;\n    CGFloat b;\n  \
    \  CGFloat c;\n    CGFloat d;\n    CGFloat tx; // 在 x 方向上的平移\n    CGFloat ty;\
    \ // 在 y 方向上的平移\n};\n```\n\n看起来很熟悉吗？\n\n## 缩放\n\n在另外两种变换中，让我们看看缩放，或者说对象的简单调整大小：\n\
    \n`x' = xSx` 和 `y′ = ySy`\n\n在矩阵形式中，它变成了这样：\n\n```\n    ⎡ Sx  0 0⎤\nS = ⎢ 0  Sy\
    \ 0⎥\n    ⎣ 0   0 1⎦\n```\n\n缩放与其他两种变换一样，应用于几何图形时，顺序非常重要。例如，假设你想旋转并移动你的对象。根据你是先平移还是后平移，结果会明显不同。更常见的顺序是先旋转对象，然后平移，如图\
    \ 2-3（左）所示。但如果你颠倒顺序，你会得到类似图 2-3（右）的结果。在这两种情况下，旋转都是围绕原点进行的。如果你想围绕对象自身的原点旋转，第一个示例适合你。如果你希望它与所有其他对象一起旋转，第二个示例则适用。（一个典型的情况可能是你将对象平移到世界原点，旋转它，然后再平移回去。）\n\
    \n图 2-3. 绕原点旋转后平移（左）与先平移后旋转（右）\n\n那么，这和三维的东西有什么关系呢？很简单！这些原理的大部分（即使不是全部）都可以应用于三维变换，并且通过少一个维度的说明可以更清晰地阐明。\n\
