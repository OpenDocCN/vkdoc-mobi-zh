    on the handhelds. The Retina display makes anti-aliasing pretty much moot simply
    because of its resolution. However, on non-Retina devices, including the iPad
    (as of this writing), it still looks pretty rough. There are a couple of workarounds,
    one more of a hack than the other. The first and more hacky of the two, dumps
    the normal OpenGL lines support and substitutes really long and thin textured
    objects, because they can be smoothed out. A nice side effect is that (with a
    little extra work) you can get dotted lines as well.


    The less hacky version, but a lot easier to do, is to use a feature found in iOS
    4 and after: multisampled anti-aliasing (MSAA to its friends).


    Multisampling as a means toward anti-aliasing requires the addition of a special
    multisample frame buffer object. Your image is initially written to the special
    buffer in a resolution that is higher than your final display. It is then ‘‘resolved’’
    into a smaller buffer, with the final pixels representing blended versions of
    the originals. Typically the multisampling buffer is four times larger than the
    final one; that is, each of the final pixels is generally a weighted average of
    the four pixels in the former (not unlike texture filtering covered in Chapter
    5). This is also called full-screen anti-aliasing, because that is exactly what
    it does. The benefits are a smoother image; the drawbacks include a performance
    hit and extra memory used for the off-screen buffer. Figure 8-9 (left) shows one
    of our lines with no MSAA, while Figure 8-9 (right) shows it with MSAA turned
    on.


    Figure 8-9\. Multisample anti-aliasing, before (left) and after (right) Another
    nice addition in iOS5’s GLKit is support for MSAA that is built into GLKView.


    Previously, it took about 40 lines of code, but now all you need to do is to add
    the following to viewDidLoad() in your view controller:


    **view.drawableMultisample=GLKViewDrawableMultisample4X;**


    **Adding a UI**


    Of course, any app that doesn’t have a means to interact with it is usually called
    a demo. But here our little demo will in fact gain both a simple user-interface
    and HUD


    graphics.


    When it comes to adding UI elements to your OpenGL app, I have some very good
    news. Because the **GLKView** is a subclass of **UIView**, you can treat it like
    any other view object. This means you can create and add any other UIView object,
    hence practically any UIKit controls, as subviews to your 3D scene. This also
    means you have full access to animation properties of the views as well, to create
    a truly fluid interface. Figure 8-10


    shows a quick UI I added to the example to turn on and off various objects along
    with an animated sweep that goes across the screen. The buttons are UIButtons
    with custom imagery, the text is a UILabel, and the green lines sweep across the
    screen like some sort of radar sequence.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 252](index-289_1.jpg)


    ![Image 253](index-289_2.jpg)


    **CHAPTER 8: Putting It All Together**


    **286**


    And surprisingly, the performance generally holds up. So, it has two things going
    for it.


    The downside is that it will lock you even more into the iOS universe. Considering
    that OpenGL ES is an industry standard, you might want to consider the implications
    of mixing the standard with nonstandard objects. In fact, many authors eschew
    any Objective-C and iOS-specific stuff as much as they can, rolling their own
    UI within the OpenGL world. That way, ports to other devices can be reduced to
    days, instead of months.


    **Figure 8-10\. Adding interface elements to the solar system


    In Distant Suns I have a date/time widget on the left side of the screen that
    lets users very quickly advance forward or backward in time (Figure 8-11). That
    was completely rendered in the OpenGL layer, largely to see whether I could do
    it. It looks and works very well, while the bottom and top toolbars are standard
    issue UIKit models.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 254](index-290_1.jpg)


    **CHAPTER 8: Putting It All Together**


    **287**


    **Figure 8-11 ***.*** Distant Suns with custom date wheel on the left side yet
    with a standard UIKit toolbar at the same time


    **Early on, Apple did caution about mixing the two worlds for performance reasons,
    in particular when the practice was to use an **NSTimer** to drive the rendering
    loop. With the addition of **CADisplayLink** with iOS 3.1, things got much better.
    There are a number of other best practices to keep in mind:


    Disable any OpenGL rendering loops if the view is hidden or the app is pushed
    to the background.


    Disable any OpenGL view if performing full-screen core animations.


    The simpler the dialog windows, the less of a performance hit on the OpenGL graphics.


    Use transparency sparingly, in particular if your OpenGL view is


    on top.


    See? Sometimes the easy way can be the best way.


    **Summary**


    In this chapter, we took many of the tricks learned in previous chapters and combined
    them into a more complete and more attractive solar-system model. A one-planet
    solar system is not that impressive as it stands. So, I’ll leave it up to you,
    dear reader, to add the moon, add some other planets, and get the earth to revolve
    around the sun.


    Furthermore, we covered several other topics and tricks in past that I couldn’t
    get around to adding to the project. For example, FBOs could be used to insert
    a secondary view of the earth from a different angle in the screen.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 8: Putting It All Together**


