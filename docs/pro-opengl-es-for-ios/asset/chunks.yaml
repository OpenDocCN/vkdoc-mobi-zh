    and top/bottom limits of the viewing volume, as shown in'
  trans: "\n第 8 行将 `squareColors` 替换为 `cubeColors`。\n\n原有的 `glDrawArrays()` 被移除，替换为第\
    \ 9 行对 `glDrawElements()` 的两次调用，分别对应两个三角形扇。需要注意的是，第二个参数表示 `tFan` 连接数组中的元素数量：六个顶点，每个顶点包含三个元素。\n\
    \nOpenGL 将获取连接数组 `tfan1` 和 `tfan2`；在顶点指针数组（第 7 行）中查找每个顶点；并渲染该对象。\n\n此时你应该能够编译成功，但还看不到任何东西，因为观察视锥体尚未定义。默认的远裁剪平面为\
    \ -1.0，这意味着所有超出该距离的物体都将被剔除，即不可见。如果将 z 值从 -2.0 改为 -1.5，“立方体”将移近并应部分可见。虽然看起来像是整个物体，但实际上只有最近的面显露出来。将\
    \ `z` 改为 -1.500001，它就会消失。目前它看起来不太像一个立方体，因为只有一部分会显露出来。此外，由于视锥体未定义，方形视口在适配填充窗口时会被拉伸。\n\
    \n（坐标 -1.5 是立方体原点需要位于的位置，以确保最近的面在 -1.0 处。）现在将其移回 -2.0。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## 第 3 章：构建 3D 世界\n\n### 67\n\n## 定义视锥体\n\n最后一步，我们需要使用 `glFrustumf()` 来指定顶点如何映射到屏幕的细节，如列表\
    \ 3-5 所示。回想一下，视锥体由六个平面组成，这些平面包围了一个体积，定义了我们可以看到的范围，类似于相机的镜头。\n\n**列表 3-5.** 创建观察视锥体，添加到视图控制器文件中\n\
    \n```\n-(void)setClipping\n{\n    float aspectRatio;\n    const float zNear =\
    \ .1; //1\n    const float zFar = 1000; //2\n    const float fieldOfView = 60.0;\
    \ //3\n    GLfloat size;\n\n    CGRect frame = [[UIScreen mainScreen] bounds];\
    \ //4\n\n    //高度和宽度值将视场角限制在高度上；翻转后它将相对宽度而言。\n    //因此，如果我们希望视场角为 60 度（类似于广角镜头），它将基于窗口的高度而非宽度。\n\
    \    //在渲染到非方形屏幕时，了解这一点非常重要。\n\n    aspectRatio=(float)frame.size.width/(float)frame.size.height;\
    \ //5\n\n    //设置 OpenGL 投影矩阵。\n    glMatrixMode(GL_PROJECTION); //6\n    glLoadIdentity();\n\
    \n    size = zNear * tanf(GLKMathDegreesToRadians (fieldOfView) / 2.0); //7\n\n\
    \    glFrustumf(-size, size, -size /aspectRatio, size /aspectRatio, zNear, zFar);\
    \ //8\n    glViewport(0, 0, frame.size.width, frame.size.height); //9\n\n    //将\
    \ OpenGL 模型视图矩阵设为默认矩阵。\n    glMatrixMode(GL_MODELVIEW); //10\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n## 第 3 章：构建 3D 世界\n\n### 68\n\n以下是具体说明：\n\n第 1 行和第 2 行指定了近裁剪平面和远裁剪平面的距离。这两个值表示任何距离超过\
    \ 1000 或小于 0.1 的物体都将被过滤掉。（“一千什么？”你可能会问。就是一千；单位由你决定。可以是光年，也可以是腕尺，这并不重要。）\n\n第 3\
    \ 行将视场角设置为 60 度。\n\n第 4 行和第 5 行计算最终屏幕的宽高比。其高度和宽度值将视场角限制在高度上；翻转后它将相对宽度而言。因此，如果我们希望视场角为\
    \ 60 度（类似于广角镜头），它将基于窗口的高度而非宽度。在渲染到非方形屏幕时，了解这一点非常重要。\n\n由于视锥体影响投影矩阵，我们需要确保在第 6\
    \ 行激活投影矩阵而非模型视图矩阵。\n\n第 7 行的任务是计算一个尺寸值，该值用于指定视景体的左/右和上/下边界，如图所示。\n"
- fmt: '### Figure 3-3

    This can be thought of as your virtual window into the 3D space. With the center
    of the screen being the origin, you need to go from `--size` to `+size` in both
    dimensions. That is why the field is divided by two—the window will go from `-30`
    degrees to `+30` degrees.


    Multiplying `size` by `zNear` merely adds a scaling hint of sorts. Finally, divide
    the bottom/top limits by the aspect ratio to ensure your square will really be
    a square.


    Now in line 8, we can plug those values into `glFrustumf()`; and in line 9, pass
    the actual pixel dimension of the viewport.


    Don’t forget to reset the matrix mode back to `modelview` just to be a good neighbor,
    as in line 10.


    `SetClipping()` needs to be called only once at the start unless you want to change
    the “power” of your lens. More complex situations might need to vary the `zNear`/`zFar`
    values to handle variances in depth or to use a different field of view to zoom
    in on a specific target. But you can add it into `viewDidLoad()` with the following
    two lines:


    ```

    [EAGLContext setCurrentContext:self.context];

    [self setClipping];

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ### CHAPTER 3: Building a 3D World


    **69**


    Any OpenGL call must have a current context to work, so it needs to be set ahead
    of everything else, hence the extra line ahead of `setClipping()`. If it works
    right, you should see something that looks exactly like the original bouncy cube!
    Wait, you’re not impressed? OK, let’s add some rotations to the thing.


    ### Taking ’er Out for a Spin


    Now it’s time to add some more interesting animation to the scene. We’re going
    to be spinning this slowly besides bouncing it up and down. To the top of `drawInRect()`,
    add the following:


    ```

    static GLfloat spinX=0;

    static GLfloat spinY=0;

    ```


    Next add the following lines to the bottom of `drawInRect()`:


    ```

    spinY+=.25;

    spinX+=.25;

    ```


    And right before the `glTranslatef()` call, add the following:


    ```

    glRotatef(spinY, 0.0, 1.0, 0.0);

    glRotatef(spinX, 1.0, 0.0, 0.0);

    ```


    Now run again. “Hey! Huh?” will be the mostly likely response. The cube doesn’t
    seem to be spinning, but instead it’s rotating around your viewpoint (while bouncing
    at the same time), as shown in Figure 3-8. This illustrates one of the most confusing
    elements in basic 3D animation: getting the order of the translations and rotations
    correct.


    (Remember the discussion in Chapter 2?)


    Consider our cube. If you want to have a cube spinning in front of your face,
    which would be the proper order? Rotate and then translate? Or translate and then
    rotate?


    Reaching way back to fifth-grade math, you might remember learning something about
    addition and multiplication being commutative. That is, the order of operations
    was not critical: `a+b=b+a`, or `a*b=b*a`. Well, 3D transformations are not commutative
    (finally, a use for something I’d never thought I’d use!). That is, `rotation*translation`
    is not the same as `translation*rotation`. See Figure 3-9.


    The right side is what you are seeing right now in the rotating cube example.
    The cube is being translated first and then rotated, but because the rotation
    takes place around the “world” origin (the viewpoint’s location), you see it as
    if it’s spinning around your head.


    Now to the obvious does-not-compute moment: are the rotations not placed before
    the translations in the example code anyway?


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 87](index-74_1.jpg)

    ![Image 88](index-74_2.jpg)

    ![Image 89](index-74_3.jpg)

    ![Image 90](index-74_4.jpg)

    ![Image 91](index-74_5.jpg)


    ### CHAPTER 3: Building a 3D World


    **70**


    Figure 3-8. Translation first, rotation second


    Here is what should be causing the sudden outbreak of furrowed brows across the
    land:


    ```

    glRotatef(spinY, 0.0, 1.0, 0.0);

    glRotatef(spinX, 1.0, 0.0, 0.0);

    glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z);

    ```


    Figure 3-9. Rotation first or translation first?


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 92](index-75_1.jpg)

    ![Image 93](index-75_2.jpg)

    ![Image 94](index-75_3.jpg)


    ### CHAPTER 3: Building a 3D World


    **71**


    However, in reality, the order of transformations is actually applied from last
    to first. Now put `glTranslatef()` ahead of the two rotations, and you should
    see something like Figure 3-10, which is exactly what we wanted in the first place.
    Here is the code needed to do that:


    ```

    glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z);

    glRotatef(spinY, 0.0, 1.0, 0.0);

    glRotatef(spinX, 1.0, 0.0, 0.0);

    ```


    Figure 3-10. Making the cube spin


    You can visualize transformation ordering in two different ways: the local coordinate
    or the world coordinate approach. Seeing things in the former, you move the objects
    to their final resting place and then perform the rotations. Because the coordinate
    system is local, the object will rotate around its own origin, making the previous
    sequence make sense when going from top to bottom. If you choose the world approach,
    which is in effect what OpenGL ES is doing, you must perform the rotations first
    around the object’s local axis before performing the translation. In that way,
    the transformations actually happen from bottom to top. The net result is the
    same and so is the code, and both are confusing and easily can get out of sequence.
    That is why you’ll see many a 3D guy or gal holding something at arm’s length
    while moving themselves all around to help them figure out why their great-looking
    catapult model is flying below the ground. This is called the 3D shuffle. And
    just to make things more confusing, this is only for OpenGL ES 1. The reason being
    is that the transformations are queued up until the rendering pass is done, and
    then processed from the first transformation call to the last. While in ES 2,
    you must perform all of the transforms yourself, in which case they are done immediately
    as called. Following is the same transformation sequence, but in OpenGL ES 2:


    ```

    baseModelViewMatrix = GLKMatrix4Scale(baseModelViewMatrix,scale,scale,scale);

    baseModelViewMatrix = GLKMatrix4Rotate(baseModelViewMatrix, _rotation, 1.0, 0.5,
    0.0);

    modelviewMatrix = GLKMatrix4MakeTranslation(0.0, offset, -6.0);

    modelviewMatrix = GLKMatrix4Multiply(modelviewMatrix, baseModelViewMatrix);

    ```


    One final transformation command to be aware of right now is `glScalef()`, used
    for resizing the model along all three axes. Let’s say you need to double the
    height of the cube. You would use the line `glScalef(1,2,1)`. Remember that the
    height is aligned with the Y-axis, while width and depth are X and Z, which we
    don’t want to touch.


    Now the question is, where would you put the line to ensure that the geometry
    of the cube is the only thing affected, as in Figure 3-11 (left), before or after
    the calls to `glRotatef()` in `drawInRect()`?


    If you said after—as in the following example:


    ```

    glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z);

    glRotatef(spinY, 0.0, 1.0, 0.0);

    glRotatef(spinX, 1.0, 0.0, 0.0);

    glScalef(1,2,1);

    ```


    —you’d be right. The reason why this works is that because the last transformation
    in the list is actually the first to be executed, you must put scaling ahead of
    any other transformations if all you want is to resize the object’s geometry.
    Put it anywhere else, and you could end up with something like Figure 3-11 (right).
    So, what’s happening there? The following was generated with the code snippet:


    ```

    glTranslatef(0.0, (GLfloat)(sinf(transY)/2.0), z);

    glScalef(1,2,1);

    glRotatef(spinY, 0.0, 1.0, 0.0);

    glRotatef(spinX, 1.0, 0.0, 0.0);

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 95](index-77_1.jpg)

    ![Image 96](index-77_2.jpg)


    ### CHAPTER 3: Building a 3D World


