    \   ATTRIB_NORMAL,\n    NUM_ATTRIBUTES\n};\n\nGLfloat gCubeVertexData[216] = //2\n\
    {\n    // 下面每行的数据布局为：\n    // positionX, positionY, positionZ, normalX, normalY,\
    \ normalZ,\n    0.5f, -0.5f, -0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, 0.5f, -0.5f,\
    \ 1.0f, 0.0f, 0.0f,\n    0.5f, -0.5f, 0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, -0.5f,\
    \ 0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f, 0.5f, 0.5f, 1.0f, 0.0f, 0.0f,\n    0.5f,\
    \ 0.5f, -0.5f, 1.0f, 0.0f, 0.0f,\n\n    0.5f, 0.5f, -0.5f, 0.0f, 1.0f, 0.0f,\n\
