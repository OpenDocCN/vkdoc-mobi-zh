    \n**129**\n\n趁此机会，我们把背景中的灰色调暗一点。这应该是太空，而太空不是灰色的。转到 `OpenGLSolarSystemViewController`\
    \ 和主 `drawInRect()` 例程，将对 `glClearColor` 的调用修改如下：`glClearColor(0.0,0.0, 0.0, 1.0);`\n\
    \n现在编译并运行。你应该会看到类似于图 4-17 的内容。\n\n图 4-17. 中间发生了什么？\n\n这里有些奇怪。运行时，你应该看到地球从太阳左侧的后方出现，绕向我们并穿过太阳前方，然后远离而去，重复这个轨道。但是，在图\
    \ 4-17（中间）中，当地球应该在太阳前方时，发生了什么？\n\n在所有图形（无论是计算机图形还是其他）中，绘制顺序都起着重要作用。如果你在画一幅肖像，你会先画背景。如果你在生成一个小型太阳系，应该先画太阳（呃，也许不一定……或者说不总是这样）。\n\
    \n渲染顺序，或者说深度排序，以及如何确定哪些物体遮挡了其他物体，一直是计算机图形学的重要部分。在太阳被添加之前，渲染顺序无关紧要，因为只有一个物体。但随着世界变得复杂得多，你会发现有两种通用的方法可以解决这个问题。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n## 第 4 章：开启光照\n\n**130**\n\
    \n第一种方法称为画家算法。这意味着简单地先绘制最远的物体。在像一颗球体绕着另一颗球体旋转这样简单的事情中，这非常容易。但是，当你拥有像《魔兽世界》或《第二人生》这样非常复杂的三维沉浸式世界时，会发生什么？这些游戏实际上会使用画家算法的一种变体，但会预先计算一些信息，以确定所有可能的遮挡顺序。\n\
    ```"
- fmt: '该信息随后被用于构建一颗二叉空间分割（BSP）树。3D世界中的任何位置都可以映射到该树中的一个元素，通过遍历该树，可以根据观察者的位置获取最佳绘制顺序。这种方法执行速度非常快，但设置起来很复杂。幸运的是，对于我们简单的宇宙来说，这完全是杀鸡用牛刀。第二种深度排序方法并非真正的排序，而是利用了每个像素的`z`分量。屏幕上的像素有`x`和`y`值，尽管我面前的`Viewsonic`显示器是平面的2D表面，但它也可以有一个`z`值。当一个像素准备绘制在另一个像素之上时，会比较它们的`z`值，距离更近的那个像素胜出。这种方法称为`z-buffering`（深度缓冲），它非常简单直观，但对于非常复杂的场景，可能会消耗额外的CPU时间和显存。我更喜欢后者，并且`OpenGL`使得实现`z-buffering`非常容易，但`GLKit`让它变得更简单。在撰写本书时，`iOS5`发布了，我欣喜地发现，我可以愉快地删除大约1.5页的代码和注释，只需在视图控制器的初始化代码中添加一行即可：


    ```

    glEnable(GL_DEPTH_TEST);

    ```


    现在，`GLKViewController`管理所有设置代码，而`Apple`的向导生成的代码默认使用深度缓冲区，格式为：


    ```

    view.drawableDepthFormat = GLKViewDrawableDepthFormat24;

    ```


    你可以选择不使用缓冲区，或使用16位或24位分辨率的缓冲区。额外的8位保留给模板缓冲区（`stencils`）使用，这将在后面介绍。


    如果一切正常，你现在应该能看到地球在太阳前方时会遮挡太阳，而在太阳后方时则被遮挡。见图4-18。


    ![Image 147](index-135_1.jpg)


    **图4-18.** 使用z-buffer


    **总结**


    本章涵盖了场景光照和着色的各种方法，以及用于确定每个顶点颜色的数学算法。你还学习了漫反射、镜面反射、自发光和环境光照，以及将普通灯光变为聚光灯的相关参数。太阳系模型进行了更新，以支持多个对象，并使用`z-buffering`来正确处理对象遮挡。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ## 第5章 纹理


    人的真正价值不在于其本身，而在于他人生命中焕发出的色彩与质感。

    ——阿尔伯特·施韦泽


    如果生活中没有了纹理，人们将变得相当乏味。去除那些有趣的小怪癖和古怪之处，将会带走我们日常生活中的一点光彩，无论它们是奇特却迷人的小习惯，还是意想不到的才能。想象一下那位恰好是出色舞者的高中看门人，那位只穿全新白袜子的著名喜剧演员，那位害怕手写信件的成功游戏工程师——他们都能让我们会心一笑，并为每一天增添一点惊奇。在创建人工世界时也是如此。计算机能够生成的视觉完美或许很漂亮，但如果你想为你的场景营造一种真实感，它总感觉不太对劲。这就是纹理的用武之地。


    纹理使完美之物变为真实之物。《美国传统词典》这样描述它：“某物独特的物理组成或结构，特别是关于其各部分的尺寸、形状和排列。”


    相当富有诗意，是吧？


    在3D图形世界中，纹理与光照一样，对于创建引人入胜的图像至关重要，并且如今可以以令人惊讶的少量工作量将其整合进来。图形芯片行业的大部分工作都根植于以比前一代硬件更高的速率渲染越来越精细的纹理。


    由于`OpenGL ES`中的纹理是一个如此庞大的主题，本章将局限于基础知识，更高级的主题和技术将留到下一章。考虑到这一点，让我们开始吧。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 148](index-137_1.jpg)


    ![Image 149](index-137_2.jpg)


    **纹理的语言**


    假设你想在你正在开发的游戏中创建一个飞机跑道。你会怎么做？简单，拿几个黑色三角形，把它们拉得很长。砰！你的跑道就有了！别急，伙计。跑道中央的划线怎么办？用一堆小的白色面怎么样？这可行。但别忘了跑道尽头的黄色`V`形标志。嗯，再加一堆面并把它们涂成黄色。还有数字呢？通往停机坪的曲线呢？很快你可能就要用到数百个三角形，但这仍然无法解决油污、修补痕迹、刹车痕和路面动物尸体的问题。现在事情开始变得复杂了。要想获得所有精细细节，可能需要数千甚至数万个面。与此同时，你的朋友`Arthur`也在创建一条跑道。你正在和他比较心得，告诉他你的多边形数量，而你甚至还没谈到路面动物尸体。`Arthur`说他只需要几个三角形和一张图片。你看，他使用了纹理贴图，而使用纹理贴图可以创建出高度细节化的表面，例如跑道、砖墙、盔甲、云彩、吱吱作响的破旧木门、遥远星球上布满陨石坑的地形，或者一辆生锈的56年款别克轿车的外观。


    在计算机图形学的早期，纹理（或纹理映射）消耗了两种最宝贵的资源：CPU周期和内存。纹理映射被谨慎使用，并且人们采用了各种小技巧来节省这两种资源。如今，内存几乎是免费的（与20年前相比），而现代芯片拥有看似无限的速度，使用纹理不再是一个需要你熬夜纠结的决定。


    **关于纹理的一切（大部分）**


    纹理有两大类型：程序化纹理和图像纹理。程序化纹理是基于某种算法即时生成的。有用于木材、大理石、沥青、石头等的“方程”。几乎任何种类的材料都可以简化为一种算法，从而绘制到物体上，如图5-1所示。


    **图5-1.** 一个金色圣杯（左图）。通过使用程序化纹理映射（右图），圣杯可以由金矿石构成，而圆锥体则使用了大理石贴图。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 150](index-138_1.jpg)


    程序化纹理非常强大，因为它们可以产生无限多种可缩放图案，这些图案可以放大以显示越来越多的细节，如图5-2所示。否则，这将需要一张巨大的静态图像。


    **图5-2.** 图5-1（右图）中高脚杯的特写。注意那些精细的细节，这需要一张非常大的图像才能实现。


    用于生成图5-2中图像的3D渲染应用程序`Strata Design 3D-SE`同时支持程序化纹理和基于图像的纹理。图5-3显示了用于指定图5-2中金矿石纹理参数的对话框。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 151](index-139_1.jpg)


    **图5-3.** 用于生成图5-2中金矿石纹理的所有可能设置。'
  raw: 'That information is then used to form a binary space partitioning (BSP) tree.
    Any place in the 3D world can be mapped to an element in the tree, which can then
    be traversed to fetch the optimum order for viewer’s location. This is very fast
    in execution but complicated to set up. Fortunately, it is way overkill for our
    simple universe. The second means of depth sorting isn’t sorting at all but actually
    uses the z component of each individual pixel. A pixel on the screen has an x
    and y value, but it can also have a z value as well, even though the Viewsonic
    in front of me is a flat 2D surface. As one pixel is ready to draw on top of another,
    the z values are compared, and the closer of the two wins out. Called z-buffering,
    it is very simple and straightforward but can chew up extra CPU time and graphics
    memory for very complicated scenes. I prefer the latter, and OpenGL makes z-buffering
    very easy to implement, but GLKit makes it easier. As this book was being written,
    iOS5 was announced, and with great delight, I was able to gleefully delete about
    1½ pages of code and comments to replace them with a single line to add somewhere
    to your view controller’s initialization code:


    **glEnable(GL_DEPTH_TEST);**


    The GLKViewController manages all of setup code now, and Apple’s wizard produced
    code defaults to a depth buffer using:


    **view.drawableDepthFormat = GLKViewDrawableDepthFormat24;**


    You can select to have no buffer, one that’s 16 bits or 24 bits of resolution.
    The extra 8


    bits is reserved for use by stencils, which will be covered later.


    If it works right, you should now see the earth eclipsing the sun when in front
    or being hidden while in back. See Figure 4-18.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 147](index-135_1.jpg)


    **CHAPTER 4: Turning On the Lights**


    **131**


    Figure 4-18\. Using the z-buffer


    **Summary**


    This chapter covered the various approaches to lighting and shading the scene,
    along with the mathematical algorithms used to determine the color at each vertex.
    You also studied diffuse, specular, emissive, and ambient lighting along with
    various parameters having to do with turning the lights into spotlights. The solar-system
    model was updated to support multiple objects and to use z-buffering to handle
