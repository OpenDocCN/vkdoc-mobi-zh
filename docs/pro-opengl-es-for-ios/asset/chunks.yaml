- fmt: 'Besides the RGB model, printers use a subtractive mode known as CMYK, for
    cyan-magenta-yellow-black (the key). Because the three primaries cannot produce
    a really deep black, black is added as an accent for deep shadows or graphic details.


    Another common model is HSV for hue-saturation-value, and you will frequently
    find it as an alternative to RGB in many graphics packages or color pickers. Developed
    in the 1970s specifically for computer graphics, HSV depicts color as a 3D cylinder
    (Figure 4-1). Saturation goes from the inside out, value goes from bottom to top,
    and hue goes around the edge. A variant on this is HSL, substituting value for
    lightness. Figure 4-2 shows the Mac OS X color picker in its many versions.


    ![Figure 4-1. HSV color wheel or cylinder (source: Wikipedia Commons)](index-98_1.jpg)


    ![Figure 4-2. OS X’s standard color pickers—RGB, CMYK, HSV, and the ever-popular
    Crayola model](index-98_2.jpg)


    ## CHAPTER 4: Turning On the Lights


    ### Let There Be Light


    In the real world, light comes at us from all sides and with all colors and, when
    combined, can create the details and rich scenes of everyday life. OpenGL doesn’t
    attempt to duplicate anything like the real-world lighting models, because those
    are very complex and time-consuming and generally reserved for Disney’s rendering
    farms. But it can approximate it in a way that is certainly good enough for real-time
    gaming action.


    The lighting model used in OpenGL ES 1 permits us to place several lights of varying
    types around our scene. We can switch them on or off at will, specifying direction,
    intensity, colors, and so on. But that’s not all, because we also need to describe
    various properties of our model and how it interacts with the incoming light.
    Lighting defines the way light sources interact with objects and the materials
    those objects are created with.


    Shading specifically determines the coloring of the pixel based on the lighting
    and material. Notice that a white piece of paper will reflect light completely
    differently than a pink, mirrored Christmas ornament. Taken together, these properties
    are bundled up into an object called a material. Blending the material’s attributes
    and the light’s attributes together generates the final scene.


    **Note:** OpenGL ES 2 has no lights whatsoever, leaving that up to the programmer
    via the use of shaders. The GLKit framework, new in iOS5, adds a few lights via
    the `GLKBaseEffect` object, but that is not meant to be a general-purpose substitute
    for version 1.


    The colors of OpenGL lights can consist of up to three different components:


    - **Diffuse**

    - **Ambient**

    - **Specular**


    Diffuse light can be said to come from one direction such as the sun or a flashlight.
    It hits an object and then scatters off in all directions, producing a pleasant
    soft quality. When a diffuse light hits a surface, the reflected amount is largely
    determined by the angle of incidence. It will be at its brightest when directly
    facing the light but drops as it tilts further and further away.


    Ambient light is that which comes from no particular direction, having been reflected
    off all the surfaces that make up the environment. Look around the room you are
    in, and the light that is bouncing off the ceiling, walls, and your furniture
    all combine to form the ambient light. If you are a photographer, you know how
    important ambient lighting is to make a scene much more realistic than a single
    point source can, particularly in portrait photography where you would have a
    soft "fill light" to offset the brighter main light.


    Specular light is that which is reflected off a shiny surface. It comes from a
    specific direction but bounces off a surface in a much more directed fashion.
    It makes the hot spot that we''d see on a disco ball or a newly cleaned and waxed
    car. It is at its brightest when the viewpoint is directly in line with the source
    and falls off quickly as we move around the object.


    When it comes to both diffuse and specular lighting, they are typically the same
    colors. But even though we’re limited to the eight light objects, having different
    colors for each component actually means that a single OpenGL "light" can act
    like three different ones at the same time. Out of the three, you might consider
    having the ambient light be a different color, usually one that is opposing the
    main coloring so as to make the scene more visually interesting. In the solar-system
    model, a dim blue ambient light helps illuminate the dark side of a planet and
    lends a greater 3D quality to it.


    **Note:** You don’t have to specify all three types for a given light. Diffuse
    usually works just fine in simple scenes.


    ### Back to the Fun Stuff (for a While)


    We’re not done with the theory yet, but let’s get back to coding for a while.
    After that, I’ll cover more on light and shading theory.


    You saw in the previous examples how colors defined with the standard RGB version
    on a per-vertex basis would let us see our world without any lighting at all.
    Now we will create lights of various types and position them around our so-called
    planet. OpenGL ES must support at least eight lights total, which is the case
    for iOS. But of course you can create more and add or remove them as needed. If
    you are really picky, you can check at runtime for just how many lights a particular
    implementation of OpenGL supports by using one of the many variants of `glGet*`
    to retrieve the values of this:


    ```c

    int numLights;

    glGetIntegerv(GL_MAX_LIGHTS, &numLights);

    ```


    **Note:** OpenGL ES has a number of utility functions, with `glGet*()` being one
    of the most commonly used. The `glGet*` calls let you inquire about the states
    of various parameters, such as the current modelview matrix to the current line
    width. The exact call depends on the type of data requested. Be careful about
    using these calls too frequently, particularly in production code, because they
    are very inefficient.


    Let’s go back to the example code from Chapter 3, where you had a squashed red
    and blue planet, and make the following changes:


    1. Ensure that the squash value is 1.0, and the planet is made up of 10 stacks
    and 10 slices.

    2. In `Planet.m`, comment out the line `blue+=colorIncrment` at the end of the
    `init()` method.


    What should you see? C’mon, no peeking. Cover up Figure 4-3 and guess. Got it?
    Now you can compile and run. Figure 4-3 (left) is what you should see. Now go
    back to the `initGeometry` method and increase the number of slices and stacks
    to 100 each. That should yield Figure 4-3 (right). So, by simply changing a few
    numbers around, we have a crude lighting and shading scheme. But this is only
    a fixed lighting scheme that breaks down the moment you want to start moving things
    around. That’s when we let OpenGL do the heavy lifting.


    Unfortunately, the process of adding lights is a little more complicated than
    just calling something like `glMakeAwesomeLightsDude()`, as we will see.


    ![Figure 4-3. Simulated lighting from below (left) and a higher polygon count
    to simulate shading (right)](index-101_1.jpg)


    1. Create a new header to hold some of the systemwide values, and call it `OpenGLSolarSystem.h`.
    For now, it should contain just the following two lines:


    ```c

    #import <OpenGLES/ES1/gl.h>

    #define SS_SUNLIGHT GL_LIGHT0 //GL uses GL_LIGHTx

    ```'
