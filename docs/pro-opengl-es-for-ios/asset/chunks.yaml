    ![Image 204](index-199_2.jpg)\n![Image 205](index-199_3.jpg)\n\n# CHAPTER 6: Will\
    \ It Blend?\n\n**196**\n\nHere we set up “stage 0,” the first of two stages. The\
    \ source of the first bit of data is specified in line 8. This says to use the\
    \ texture from the current texture unit (`GL_TEXTURE0`) as the source for the\
    \ bump map assigned in line 5.\n\nThen line 9 tells it to blend with the previous\
    \ color—in this case, that which was set via `glColor()` in line 4. For stage\
    \ 0, `GL_PREVIOUS` is the same as `GL_PRIMARY_COLOR`, because there is no previous\
    \ texture to use.\n\nNow set up stage 1 in line 10 and the following line. The\
    \ argument, `tex1`, is the color image.\n\nNow all we want to do is combine the\
    \ image with the bump map, which is what line 11 does.\n\nNow all you have to\
    \ do is to call the new method in place of `multTexture()` used in the previous\
    \ exercise. My source texture is selected so that you can easily see the results.\n\
    \nWhen started, the light should move from left to right and illuminate the edges\
    \ of the land masses, as shown in Figure 6-16.\n\nFigure 6-16. Bump-mapped North\
    \ America at morning, noon, and evening, respectively\n\nLooks pretty cool, eh?\
