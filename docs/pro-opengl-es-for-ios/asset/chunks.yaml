- fmt: '# 排版后的内容


    将漫反射材质重置为绿色。你应该会看到一些看起来像是一大堆黄红色混杂的东西。简而言之，其原理是，还有一个我们可以用来调整光照的值。它叫做光泽度（`shininess`），用于指定物体表面的光泽程度，取值范围为
    0 到 128。值越高，反射越集中，因此表面看起来越有光泽。但由于其默认值为 0，它会将镜面高光（specular wealth）均匀分布在整个星球表面。这极大地压制了绿色，以至于当与红色混合时，显示为黄色。所以，为了控制这种混乱局面，请添加以下这行代码：


    `glMaterialf(GL_FRONT_AND_BACK, GL_SHININESS, 5);`


    我稍后会解释这背后的真实数学原理，但现在先看看当值为 5 时会发生什么。接下来尝试 25，并与图 4-9 进行比较。光泽度值在 5 到 10 之间大致对应塑料材质；大于这个范围，则进入严肃的金属材质领域。


    **图 4-9.** 光泽度分别设置为 0、5.0 和 25.0（从左到右）


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 133](index-113_1.jpg)

    ![Image 134](index-113_2.jpg)


    ## 环境光


    是时候玩一下环境光了。将以下这行代码添加到`initLighting()`中，然后编译并运行：


    `glLightfv(SS_SUNLIGHT, GL_AMBIENT, blue);`


    看起来像图 4-10（左）吗？如何才能得到图 4-10（右）中的图像呢？你需要添加以下这行代码：


    `glMaterialfv(GL_FRONT_AND_BACK, GL_AMBIENT, blue);`


    **图 4-10.** 仅有蓝色环境光（左），同时具有环境光和环境材质（右）


    除了每个光源的环境光属性外，你还可以设置一个世界环境光值。基于光源的值是变量，就像所有光照参数一样，因此它们会随着距离、衰减等因素而变化。而世界环境光值在你整个
    OpenGL ES 世界中是一个常量，可以按如下方式设置：


    `GLfloat colorVector[4] = {r, g, b, a};`


    `glLightModelfv(GL_LIGHT_MODEL_AMBIENT, colorVector);`


    [www.it-ebooks.info](http://www.it-ebooks.info)


    默认值是一种由红色为 0.2、绿色为 0.2、蓝色为 0.2 构成的暗灰色。这有助于确保你的物体无论如何都始终可见。同时，对于`glLightModelfv()`还有一个值，它由参数`GL_LIGHT_MODEL_TWO_SIDE`定义。该参数实际上是一个布尔型浮点数。如果它为`0.0`，则仅照亮一面；否则两面都将被照亮。默认值为`0.0`。如果你出于任何原因想要改变哪一面是正面，可以使用`glFrontFace()`并指定按顺时针或逆时针顺序排列的三角形代表正面。默认顺序是逆时针（CCW）。


    ## 退一步思考


    那么，这里到底发生了什么？事实上，相当多。在实时计算机图形学中，有三种通用的着色模型。OpenGL ES 1 使用了其中的两种，这两种我们都见过了。第一种是扁平着色模型，它简单地用一个恒定值来为每个三角形着色。你在图
    4-5 中已经看到过它的效果。在过去的好日子里，这是一个可行的选择，因为它比其他任何模型都快得多。


    然而，当你口袋里的 iPhone 大致相当于一台手持的 Cray-1 超级计算机（减去大约 3 吨的重量和液体冷却系统）时，那些速度技巧真的已经成为过去式了。平滑着色模型使用插值着色，计算每个顶点的颜色，然后在整个面上进行插值。OpenGL
    使用的实际着色类型是这种模型的一种特殊形式，称为 Gouraud 着色。这就是为什么顶点法线是基于所有相邻面的法线生成的。


    第三种着色模型被称为 Phong 着色，由于 CPU 开销过高，OpenGL 中并未使用。它不是在整个面上插值颜色值，而是插值法线，为每个片段（即像素）生成一个法线。这有助于消除由高曲率产生的非常尖锐角度所导致的边缘伪影。Phong
    着色可以减轻这种效果，但使用更多三角形来定义物体同样可以做到。


    还有其他许多模型。20 世纪 70 年代，来自 JPL-Voyager 动画项目的 Jim Blinn 创建了一种 Phong 着色的修改形式，现在被称为
    Blinn-Phong 模型。如果光源和观察者可以被视为处于无限远处，那么它的计算密集度会更低。


    Minnaert 模型倾向于为漫反射材质增加一点对比度。Oren-Nayer 模型则为漫反射模型添加了一个“粗糙度”成分，以便更好地匹配现实。


    ## 自发光材质


    这里还需要介绍的另一个重要的参数是`GL_EMISSION`，它会影响最终颜色。与漫反射、环境光和镜面高光不同，`GL_EMISSION`仅适用于材质，并指定材质具有自发光特性。一个自发光物体拥有自己的内部光源，例如太阳，这在太阳系模型中会很有用。要查看其效果，请将以下代码行添加到`initLighting()`中的其他材质代码中，并移除环境材质：


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 135](index-115_1.jpg)

    ![Image 136](index-115_2.jpg)


    `glMaterialfv(GL_FRONT_AND_BACK, GL_EMISSION, yellow);`


    因为黄色是全强度的，你预计会看到什么？大概是图 4-11a。接下来将值减半，得到如下代码：


    `GLfloat yellow[] = {.5, .5, 0.0, 1.0};`


    现在你看到了什么？我敢打赌它看起来像图 4-11（右）。


    **图 4-11.** 一个物体，其自发光材质设置为黄色的全强度（左）；同一个场景，但强度仅为 50%（右）


    表面上，自发光材质可能看起来和使用环境光的结果相似。但与环境光不同，只有场景中的单个物体会受到影响。而且，作为一个附带好处，它们不会消耗额外的光源对象。然而，如果你的自发光物体确实代表了某种真实光源（例如太阳），那么在它内部放置一个光源对象确实会为场景增加另一层真实感。


    关于材质的进一步说明：如果你的物体已经指定了颜色顶点（就像我们的立方体和球体那样），那么这些值可以用来替代设置材质。你必须调用`glEnable(GL_COLOR_MATERIAL)`。这会将顶点颜色应用于着色系统，而不是使用由`glMaterial`调用指定的颜色。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ## 衰减


    在现实世界中，当然，光线会随着物体距离光源越远而减弱。OpenGL ES 也可以使用以下三个衰减因子中的一个或多个来模拟这个因素：


    - `GL_CONSTANT_ATTENUATION`

    - `GL_LINEAR_ATTENUATION`

    - `GL_QUADRATIC_ATTENUATION`


    这三个因子被组合成一个值，然后计入你模型每个顶点的总光照量中。它们通过`glLightf(GLenum light, GLenum pname, GLfloat
    param)`进行设置，其中`light`是你的光源 ID，例如`GL_LIGHT0`，`pname`是上述列出的三个衰减参数之一，实际值通过`param`传递。


    线性衰减可用于模拟由雾气等因素引起的衰减。二次衰减则模拟了光强随距离增加而自然衰减的规律，这种衰减是指数级的。当光源距离加倍时，光照强度会减少到之前数值的四分之一。'
  raw: 'Reset the diffuse material back to green. **You should see something that
    looks like a big mess of something yellowish-reddish. Shorthand for what’s happening
    is that there’s yet another value we can use to play with the lighting. Called
    shininess, it specifies just how shiny the object’s surface is and ranges from
    0 to 128\. The higher the value, the more focused the reflection will be, and
    hence the shinier it appears. But since it defaults to 0, it spreads the specular
    wealth across the entire planet. It overpowers the green so much that when mixed
    with the red, it shows up as yellow. So, in order to get control of this mess,
    add this line:**


    ****glMaterialf(GL_FRONT_AND_BACK,GL_SHININESS, 5);**


    I’ll explain shortly the real math behind this, but for right now see what happens
    with the value of 5\. Next try 25, and compare it with Figure 4-9\. Shininess
    values from 5 to 10


    correspond roughly to plastics; greater than that, and we get into serious metal
    territory.


    Figure 4-9\. Shininess set to 0, 5.0, and 25.0, respectively (left to right)


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 133](index-113_1.jpg)


    ![Image 134](index-113_2.jpg)


    **CHAPTER 4: Turning On the Lights**


    **109**


    **Ambient Lighting**


    It’s time for some fun with the ambient lighting. Add the following line to **initLighting()**
    then compile and run:


    **glLightfv(SS_SUNLIGHT,GL_AMBIENT,blue);**


    Does it look like Figure 4-10 (left)? And what should you do to get the image
    in Figure 4-10 (right)? **You need to add the following line:**


    ****glMaterialfv(GL_FRONT_AND_BACK, GL_AMBIENT, blue);**


    Figure 4-10\. Blue ambient light only (left), both ambient light and ambient material
    (right) Besides the ambient attribute for each light, you can also set a world
    ambient value. The light-based values are variables, as are all of light parameters,
    so they vary as a function of the distance, attenuation, and so on. The world
    value is a constant across your entire OpenGL ES universe and can be set as follows:


    **GLfloat colorVector[4]={r,g,b,a};**


    ****glLightModelfv(GL_LIGHT_MODEL_AMBIENT,colorVector);**


    s


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 4: Turning On the Lights**


    **110**


    The default value is a dim gray formed by a color with red=.2, green=.2, and blue=.2.


    This helps ensure that your objects are always visible no matter what. And while
    we’re at it, there is one other value for **glLightModelfv()**, and that is defined
    by the parameter of **GL_LIGHT_MODEL_TWO_SIDE**. The parameter is actually a Boolean
    float. If it is 0.0, only one side will be illuminated; otherwise, both will.
    The default is 0.0\. And if for any reason you wanted to change which faces were
    front ones, you may use **glFrontFace()** and specify the triangles ordered clockwise
    or counterclockwise represent the front face. CCW is the default.


    **Taking a Step Back**


    So, what is actually happening here? Quite a lot, actually. There are three general
    shading models in use for real-time computer graphics. OpenGL ES 1 uses two of
    those, both of which we’ve seen. The first, the flat model, simply shades each
    triangle with one constant value. You’ve seen that that looks like in Figure 4-5\.
    And in the good ol’ days, this was a valid option, considering it was much faster
    than any others.


    However, when the iPhone in your pocket is roughly the equivalent of a handheld
    Cray-1


    (minus about 3 tons and liquid cooling), those kinds of speed tricks are really
    a thing of the past. The smooth model uses interpolative shading, calculating
    the colors at each vertex and then interpolating them across the faces. The actual
    kind of shading OpenGL


    uses is a special form of this called Gouraud shading. This is why the vertex
    normals are generated based on normals of all the adjacent faces.


    The third kind of shading is called Phong and is not used in OpenGL because of
    high CPU overhead. Instead of interpolating color values across the face, it interpolates
    normals, generating a normal for each fragment (that is, pixel). This helps remove
    some of the artifacting along edges defined by high curvatures, which produce
    very sharp angles. Phong can diminish that effect, but so can using more triangles
    to define your object.


    There are numerous other models. Jim Blinn of the JPL-Voyager animations in the
    1970s created a modified form of Phong shading, now called the Blinn-Phong model.
    If the light source and viewer can be treated as if they are at infinity, it can
    be less computationally intensive.


    The Minnaert model tends to add a little more contrast to diffuse materials. Oren-Nayer
    adds a ‘‘roughness’’ component to the diffuse model in order to match reality
    just a little bit better.


    **Emissive Materials**


    Still another significant parameter we need to cover here that factors into the
    final color is **GL_EMISSION**. Unlike the diffuse, ambient, and specular bits,
    **GL_EMISSION** is for materials only and specifies that a material is emissive
    in quality. An emissive object has its own internal light source such as the sun,
    which will come in handy in the solar-system model. To see this in action, add
    the following line to the other material code in **initLighting()** and remove
    the ambient material:


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 135](index-115_1.jpg)


    ![Image 136](index-115_2.jpg)


    **CHAPTER 4: Turning On the Lights**


    **111**


    **glMaterialfv(GL_FRONT_AND_BACK, GL_EMISSION, yellow);**


    Because the yellow is at full intensity, what do you expect to see? Probably Figure
    4-11a. Next cut the values down by half so you have this:


    **GLfloat yellow[]={.5,.5,0.0,1.0};**


    Now what do you see? I’ll bet it looks something like Figure 4-11 (right).


    Figure 4-11\. A body with emissive material set to full intensity for the yellow
    (left); the same scene but with just 50 percent intensity (right)


    Superficially, emissive materials may look just like the results of using ambient
    lighting.


    But unlike ambient lights, only a single object in your scene will be affected.
    And as a side benefit, they don’t use up additional light objects. However, if
    your emissive objects do represent real lights of any sort such as the sun, putting
    a light object inside definitely adds another layer of authenticity to the scene.


    One further note regarding materials: if your object has had the color vertices
    specified, as both our cube and sphere have, those values can be used instead
    of setting materials. You must call **glEnable(GL_COLOR_MATERIAL)**. This will
    apply the vertex colors to the shading system, instead of those specified by the
    **glMaterial** calls.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 4: Turning On the Lights**


    **112**


    **Attenuation**


    In the real world, of course, light decreases the further an object is from the
    light source.


    OpenGL ES can model this factor as well using one or more of the following three
    attenuation factors:


    **GL_CONSTANT_ATTENUATION**


    **GL_LINEAR_ATTENUATION**


    **GL_QUADRATIC_ATTENUATION**


    All three are combined to form one value that then figures into the total illumination
    of each vertex of your model. They are set using **gLightf(GLenum light, GLenum
    pname,** **GLfloat param)**, where light is your light ID such as **GL_LIGHT0**,
    **pname** is one of the three attenuation parameters listed earlier, and the actual
    value is passed using **param**.


    Linear attenuation can be used to model attenuation caused by factors such as
    fog. The quadratic attenuation models the natural **falloff of light as the distance
    increases, which changes exponentially. As the distance of the light doubles,
    the illumination is cut to one quarter of the previous amount.**'
