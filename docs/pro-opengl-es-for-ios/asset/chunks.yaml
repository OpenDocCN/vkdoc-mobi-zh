- fmt: '# 排版后的内容


    **Figure 9-3. Data ordering.** The VBO example uses the top format, while the
    bottom illustrates data interleaving.


    In my own tests I found the difference to be negligible. But still, keep interleaving
    in mind for your projects, and it can’t hurt to design for it because future hardware
    might make better use of it.


    ## Batching


    Batch as many operations as possible that rely on the same state, because changing
    the system state (by using the `glEnable()` and `glDisable()` calls) is costly.
    OpenGL does not check internally to see whether a specific feature is already
    in the state you want. In the exercises in this book, I would frequently set states
    more often than I likely needed to, just to ensure the behavior is easily predictable.
    But for commercial, performance-intensive apps, try to remove any redundant calls
    in the release build.


    Also, batch your drawing calls as much as possible.


    ## Textures


    A few of the texture optimization tricks have already been addressed, such as
    mipmapping in Chapter 5 and making use of PVRTC textures. Others are just plain
    common sense: textures take a whopping lot of memory. Make them as small as possible
    and reuse them if needed. Also, set any image parameters ahead of loading them,
    because they act as a hint to tell OpenGL how to optimize the information before
    shipping up to the hardware.


    Draw the opaque textures first, and avoid having a translucent OpenGL ES screen.


    As a fairly simple example of how texturing can affect frame rates, the previous
    VBO example gained about a 25-percent increase when I dumped the texture altogether.


    ## Sprite Sheets


    Sprite sheets (or texture atlases or font atlases) were briefly referenced in
    Chapter 8 when covering displaying text in an OpenGL environment. Figure 9-4 illustrates
    what a sprite sheet looks like when used for rendering text to the screen.


    **Figure 9-4. Sprite sheet for 24-point Copperplate**


    This particular image was created using a free tool called LabelAtlasCreator.
    Besides the image file, it will generate a handy plist that contains all of the
    placement details that are easy to convert to texture space. Another one is the
    Java-based Hiero that can do fonts with gradients. However, it is very slow. Perhaps
    the most robust one is “Angelcode-Bitmap Font Generator,” for Microsoft Windows
    only, but it seems to be pretty popular.


    The latter two tools generate a font metrics file in the `.font` format. It’s
    much less handy than a `.plist`, but there are some free parsers floating about
    to handle it.


    But don’t stop at fonts, because sprite sheets can also be applied anytime you
    have a family of likeminded images. Switching from one texture to another can
    cause a lot of unneeded overhead, whereas a sprite sheet acts as a form of texture
    batching, saving a lot of GPU time. Check out the OS-X compatible Zwoptex tool,
    or TexturePacker, used for general-purpose images.


    ## Texture Uploads


    Copying textures to the GPU can be very expensive, because they must reformatted
    by the chip before they can be used. This can cause stuttering in the display
    for larger textures. Therefore, make sure to load them up at the very start with
    `glTexImage2D`.


    ## Mipmaps


    Always make sure to use mipmaps for anything other than 2D unscaled images. Yes,
    they do use a little more memory, but the smaller mipmaps can save a lot of cycles
    for your objects when far away. It is recommended that you use `GL_LINEAR_MIPMAP_NEAREST`
    because it is faster than `GL_LINEAR_MIPMAP_LINEAR` (albeit with a little less
    image fidelity).


    ## Fewer Colors


    Other recommendations might include lower-resolution color formats. A lot of imagery
    would look almost as good at only 16 bits vs. 32, especially if there is no alpha
    mask. Popular formats include RGBA5551 or RBGA4444, and RGB565. The latter assigns
    6'
