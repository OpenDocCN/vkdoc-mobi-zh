  trans: '

    图 10-5\. 地球/海洋交界处右侧的特写


    **引入云层**


    看来似乎确实还缺少一些东西。哦，对了，还有那些云层。


    不过我们很走运，因为着色器也能轻松处理这个问题。在可下载的项目文件中，我添加了一张整个地球的云层贴图，如图 10-6 所示。陆地部分有些难以辨认，但右下角是澳大利亚，而左半部分则依稀可见南美洲。因此，我们的任务是将它叠加在彩色地形图之上，并去掉所有低对比度的部分。


    图 10-6\. 全球云层图案


    我们不仅要为模型添加云层，还要了解如何使用着色器处理多纹理渲染，即如何告诉着色器使用多个纹理？还记得第 6 章中关于纹理单元的内容吗？它们现在非常有用，因为纹理就存储在这些单元中，供片元着色器拾取。通常，对于单一纹理，系统会默认设置，无需额外配置，只需正常调用
    `glBindTexture()` 即可。但如果你想使用多个纹理，则需要进行一些设置。步骤如下：


    1.  在主程序中加载新纹理。

    2.  在片元着色器中添加第二个 `uniform` 类型的 `sampler2D`，以支持第二个纹理，并通过 `glGetUniformLocation()`
    获取其位置。

    3.  告诉系统哪个纹理单元对应哪个采样器。

    4.  在主循环 `drawInRect()` 中，激活所需纹理并将其绑定到指定的纹理单元。


    现在来看一些具体细节：你已经知道如何加载纹理了，这当然不在话下。因此，在步骤 2 中，你需要在片元着色器中添加类似以下几行代码，该着色器与之前几个练习中使用的是同一个：


    ```glsl

    uniform sampler2D cloud_texture;

    ```


    并在 `loadShaders()` 中添加：


    ```cpp

    uniforms[UNIFORM_SAMPLER1] = glGetUniformLocation(*program, "cloud_texture");

    uniforms[UNIFORM_SAMPLER0] = glGetUniformLocation(*program, "s_texture");

    ```


    步骤 3 在视图控制器的 `setupGL()` 中添加。`glUniform1i()` 调用的第一个参数是片元着色器中 uniform 变量的“位置”，第二个参数是实际的纹理单元编号。因此，在本例中，`sampler0`
    绑定到纹理单元 0，而 `sampler1` 绑定到纹理单元 1。由于单个纹理和第一个采样器默认都使用纹理单元 0，因此这段设置代码实际上不需要。


    ```cpp

    glUseProgram(m_DaysideProgram);

    glUniform1i(uniforms[UNIFORM_SAMPLER0], 0);

    glUniform1i(uniforms[UNIFORM_SAMPLER1], 1);


    glUseProgram(m_NightsideProgram);

    glUniform1i(uniforms[UNIFORM_SAMPLER0], 0);

    glUniform1i(uniforms[UNIFORM_SAMPLER1], 1);

    ```


    在运行主循环时，步骤 4 可以这样操作：


    ```objectivec

    glActiveTexture(GL_TEXTURE0);

    glBindTexture(GL_TEXTURE_2D, m_EarthNightTexture.name);


    glActiveTexture(GL_TEXTURE1);

    glBindTexture(GL_TEXTURE_2D, m_EarthCloudTexture.name);


    [self useProgram:m_NightsideProgram];

    [m_Sphere setBlendMode:PLANET_BLEND_MODE_SOLID];

    [m_Sphere execute:m_EarthNightTexture.name];

    ```


    `glActiveTexture()` 指定要使用的纹理单元，随后调用 `glBindTexture()` 绑定纹理。之后，程序就可以用于实现所需效果了。

    '
- fmt: "The `cloud-luv'n` fragment should now look something like Listing 10-16 to\
    \ perform the actual blending.\n\n**Listing 10-16**. Blends a Second Texture with\
    \ Clouds on Top of the Others\n\n```\nprecision mediump float;\n\nvarying lowp\
    \ vec4 colorVarying;\nvarying lowp vec4 specularColorVarying;\n\nuniform mat4\
    \ modelViewProjectionMatrix;\nuniform mat3 normalMatrix;\nuniform vec3 lightPosition;\n\
    \nvarying vec2 v_texCoord;\nuniform sampler2D s_texture;\nuniform sampler2D cloud_texture;\
    \ //1\n\nvoid main()\n{\n    vec4 finalSpecular = vec4(0,0,0,1);\n    vec4 surfaceColor;\n\
    \    vec4 cloudColor;\n\n    float halfBlue; //a value used to detect a mainly\
    \ blue fragment.\n\n    surfaceColor = texture2D( s_texture, v_texCoord );\n \
    \   cloudColor = texture2D(cloud_texture, v_texCoord ); //2\n\n    halfBlue =\
    \ 0.5 * surfaceColor[2];\n\n    if(halfBlue > 1.0)\n        halfBlue = 1.0;\n\n\
    \    if((surfaceColor[0] < halfBlue) && (surfaceColor[1] < halfBlue))\n      \
    \  finalSpecular = specularColorVarying;\n\n    if(cloudColor[0] > 0.15) //3\n\
    \    {\n        cloudColor[3] = 1.0;\n        gl_FragColor = (cloudColor * 1.3\
    \ + surfaceColor * .4) * colorVarying;\n    }\n    else\n        gl_FragColor\
    \ = (surfaceColor + finalSpecular) * colorVarying;\n}\n```\n\nHere’s what is happening:\n\
    \nLine 1 is merely declaring the new `cloud_texture`.\nIn Line 2, we pick up the\
    \ cloud color from the cloud sampler object.\n\nThe new color is filtered and\
    \ merged with the earth’s surface image, lines 3ff. The numbers used are quite\
    \ arbitrary, but they give the best image. Naturally much of the finer detail\
    \ will have to be cut out to ensure the colored land masses show through.\n\n\
    Since the clouds are grayscale objects, I need to pick up only a single color\
    \ to test, because the normal RGB values are identical. So, I opted to handle\
    \ all texels brighter than .20. Then I ensure that the alpha channel is 1.0 and\
    \ combine all three components. The `cloudColor` is given a slight boost with\
    \ the 1.3 multiplier, while the underlying surface uses only .4, so as to emphasize\
    \ the clouds a little more while still making them relatively opaque.\n\nI hope\
    \ you’ll see something like Figure 10-7. Now it’s starting to look like a real\
    \ planet.\n\n**Figure 10-7**. Putting it all together\n\nThis is just one very\
    \ simple example of using a shader. When it comes to space themes, for example,\
    \ you might generate a hazy atmosphere around a planet or 3D volumetric textures\
    \ to simulate galaxies or nebula. If only I had another ten chapters….\n\n## More\
    \ Fun and Games with GLKit\n\nAs mentioned previously, the introduction of the\
    \ GLKit in iOS 5 was largely designed to make working in OpenGL ES a little easier.\
    \ The kit supplied new functionality in four areas, three of which you already\
    \ have dealt with and are very handy in either version 1 or 2:\n\n- `GLKView`\
    \ and `GLKViewController` (hiding some of the messiness when dealing with the\
    \ drawing surface)\n- Texture management\n- Math libraries (rich and standardized\
    \ math API)\n- Effects (standard means to encapsulate shader-based effects)\n\n\
    Of the four, the latter two were specifically targeted to make working with OpenGL\
    \ ES 2 a little easier. It’s the final one, however, that adds a little bit of\
    \ extra flash that we’re going to cover now."
