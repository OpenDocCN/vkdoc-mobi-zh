    **260**


    现在是时候将所有图像实用工具转移到它们自己的例程中了。为此我创建了`OpenGLCreateTexture`，并将`loadTexture()`从太阳系控制器移到了这里。这将有助于支持上面的调用。`.png`文件可以是任何你想要的、用来替换当前3D太阳模型的图片。我们这样做的目的是，在球体模型通常渲染的位置，绘制一个扁平的太阳位图。原因是我们能够精细控制这颗恒星的视觉效果，使其更接近人眼可能感知的样子。那种鲜明的黄色球体，虽然技术上更准确，但看起来并不真实，因为任何光学接收器都会为其添加各种扭曲、反射和高光（例如镜头光晕）。比如，可以使用着色器来数学建模眼睛的光学特性，但就目前这个模糊的球状物而言，工作量太大了。如果你愿意，可以从Apress网站下载我自己的美术资源。或者复制一些符合你个人品味的东西。图8-5是我正在使用的带有透明背景的图片。有趣的是，这张图片足以欺骗我的眼睛，让大脑以为我真的在看某个太亮的东西，因为盯着它看时会引起各种眼疲劳。


    这使用了一种称为公告板的技术，它会将一个扁平的2D纹理始终对准观察者，无论观察者身在何处。它允许使用简单的纹理来轻松描绘复杂且相当随机的有机物体（我认为那些叫做树的东西）。随着视角的变化，公告板对象会旋转以进行补偿。'
