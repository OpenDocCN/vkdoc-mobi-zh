- fmt: "Interesting effects. Because this is such a large topic, it deserves its own\
    \ chapter, which as it turns out is Chapter 6.\n\n`Line 5` ensures that the texture\
    \ we want is the current one. Like the other OpenGL objects, textures are assigned\
    \ a \"name\" (a unique integer ID number), which will be referenced until it's\
    \ deleted.\n\n`Line 6` is where the texture coordinates are handed off to the\
    \ hardware.\n\nAnd just as you had to tell the client to handle the colors and\
    \ vertices, you need to do the same for the texture coordinates here in `line\
    \ 7`.\n\n`Line 8` you'll recognize, but this time besides drawing the colors and\
    \ the geometry, it now takes the information from the current texture, matches\
    \ up the four texture coordinates to the four corners specified by the `squareVertices[]`\
    \ array (each vertex of the textured object needs to have a texture coordinate\
    \ assigned to it), and blends it using the values specified in `line 4`.\n\nFinally,\
    \ disable the client state for texture, `line 9`, the same way it was disabled\
    \ for color and vertices.\n\nIf everything works right, you should see something\
    \ like Figure 5-13a. You don't you say? It's upside down? Depending on the format\
    \ used, your texture could very well be inverted, with its internal origin in\
