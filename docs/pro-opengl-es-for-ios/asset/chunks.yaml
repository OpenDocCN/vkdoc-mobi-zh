- fmt: "# Chapter 7: Well-Rendered Miscellany\n\n## Blob Shadows\n\nBlob shadows are\
    \ a total cheat. It simply assumes that there is no real direct light source,\
    \ so the object’s shadow is little more than a blob underneath, as shown in Figure\
    \ 7-10. As you can see, this won’t work too well if our occluder (the shadow casting\
    \ thing) is a giant man-eating burrito.\n\nFigure 7-10. A blob shadow texture\
    \ that is placed under all objects\n\n## Projection Shadows\n\nProjection shadows\
    \ are the \"easiest\" of the dynamic shadows algorithms to implement, but of course\
    \ that also means they come with many restrictions, namely, that projection shadows\
    \ work best when casting a shadow on a large flat surface, as shown in Figure\
    \ 7-11. Also, shadows cannot be cast on arbitrary objects. As with the other approaches,\
    \ the basic process is to take a snapshot of sorts from the light’s point of view\
    \ and one from the camera’s. The light’s view is squashed down flat on the plane,\
    \ painted a suitable shadowy color (aka dark), followed by the occluder being\
    \ rendered on top.\n\nFigure 7-11. Projection of a shadow on a flat plane that\
    \ is then \"reprojected\" out to poke the viewer’s eye The shaded area is calculated\
    \ by using the intersection of the vectors and the plane, which travel from the\
    \ light source by way of each of the vertices. Each point on the plane forms a\
    \ \"new\" object that can then be transformed, as anything else on the plane would\
    \ be. Listing 7-15 shows how this is coded.\n\nLet’s start again with the basic\
    \ bouncy cube demo (even though much of it will be changed for the shadow code,\
    \ it’ll still serve as a working template), but we’ll swap in new view controller\
    \ code. Listing 7-11 covers some of the initialization parameters.\n\nListing\
    \ 7-11. The initialization stuff to add to the view controller\n\n```\n- (void)viewDidLoad\n\
    {\n  [super viewDidLoad];\n\n  //Normal wizard-produced code deleted for clarity.\n\
    \  m_WorldRotationX=35.0; //1\n  m_WorldRotationY=0.0;\n  m_SpinX=0.0;\n  m_SpinY=0.0;\n\
    \  m_SpinZ=0.0;\n  m_WorldZ=-6.0; //2\n  m_WorldY=-1.0;\n  m_LightRadius=2.5;\
    \ //3\n  [(EAGLView *)self.view setContext:context];\n}\n```\n\nIn lines 1f, the\
    \ world rotations are set up; 90º will have you looking straight down in the scene,\
    \ while 0º will have you looking straight on the side.\n\nThe world locations\
    \ for the scene are established in lines 2f. Decreasing `z` will move the scene\
    \ further away; increasing `z` moves it closer. Decreasing `y` will move it down\
    \ on the screen, and increasing it will move it up.\n\n`m_LightRadius` in line\
    \ 3 means the radius of the circle that the light moves above the scene.\n\nThe\
    \ `drawInRect()` method is covered in Listing 7-12. The most immediate change\
    \ you’ll notice is that the geometry and color arrays are nowhere to be found.\
    \ Actually, I have now moved them up to the top of the file as globally defined\
    \ data. That made it a little easier to break the rendering stuff into smaller\
    \ bits. Interestingly enough, a lot of OpenGL geometric descriptions are kept\
    \ in `.h` files — really, really, really big `.h` files. Apple actually recommends\
    \ this approach for some tasks and uses it in its OpenGL example that draws the\
    \ infamous teapot. That file is more than 3,000 lines long.\n\nListing 7-12. The\
    \ `drawInRect()` method for projected shadows\n\n```\n- (void)glkView:(GLKView\
