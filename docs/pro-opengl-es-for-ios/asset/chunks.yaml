    **Other Tips to Remember**


    The following are some useful tips to keep in mind:


    Even though multisample antialiasing can be very useful in smoothing out your
    images, it means sudden death in the performance


    department, cutting frame rates by 30 percent or more. So, you must


    really, really need to use it.


    Avoid using **GL_ALPHA_TEST**. This was never covered, but it can also kill performance
    as much as MSAA.


    When going to background, make sure to stop the animation and


    delete any easily re-created resources.


    Minimize the use of any calls that return information from the system, such as
    the **glGet*** family of methods, especially **glGetError()**. Many of these will
    force any previous commands to execute before state


    information can be retrieved.


    Use as few lights as possible. Going down to only a single light (the sun), by
    turning off the fill and the ambient lights, increased frame


    rates by as much as 30 percent on my iPad 2.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 9: Performance ’n’ Stuff**


    **299**


    A lot of the literature will recommend turning off ‘‘compile for thumb’’


    in your build settings. The ‘‘thumb’’ that they are talking about is a special
    16-bit instruction set that the ARM processor can use to make


    your executable smaller. It applies only to older devices, including


    iPhones 1 and 3G and the first two generations of the iPod touch. So,


    you will not likely see any improvement on the more recent units.


    Do not access the frame buffer from the CPU. Calls such as


    **glReadPixels()** should be avoided because they force the frame


    buffer to flush all queued commands.


    **OpenGL Analyzer**


    Without a doubt, Xcode’s profiling application, Instruments, is one of the most
    powerful debugging tools I have ever seen. And with Xcode 4, it is better than
    ever, adding a lot of new tools for OpenGL ES applications. (I’ve already talked
    about Performance Detective, but that is a separate application so not part of
    the actual Instruments package covered here.)


    You may already be familiar with some of the tools in the Instruments bulging
    toolbox for tracking memory use, file I/O bottlenecks, and even WiFi activity.
    But the new OpenGL


    ES analyzer should become your BFF----best (software) friend forever----for both
    the depth and the breadth of the information it provides.


    This will by no means be a comprehensive examination of the OpenGL ES Analyzer
    within Instruments but will highlight some of its many features.


    The analyzer uses Apple’s in-depth knowledge of the hardware and software both
    to study the inner workings of OpenGL and to see how your application makes use
    of it, as well as using an expert system to sniff out problems and possible cures.
    It hooks into every call within OpenGL, tracking timing, duration, backtrace information,
    parameter correctness, and much more. Note that only iPhones from 3GS and beyond
    and the third-generation iPod/touch will work with the new tools.


    **Note** As opposed to many of the tools within Instruments, the OpenGL analyzer
    will not work on the simulator.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 260](index-303_1.jpg)


    ![Image 261](index-303_2.jpg)


    **CHAPTER 9: Performance ’n’ Stuff**


    **300**


    You start Instruments by using the Profile menu item or the build/run selection
    on the editor window, as shown in Figure 9-6\. If you don’t see the micrometer
    icon, just click and hold on whatever the button is showing at that time.


    Figure 9-6\. The Instruments launch button from Xcode


    Instruments will now display the palette of various tools available for iOS. Select
    the one for OpenGL ES Analysis, as shown in Figure 9-7; then stand back and be
    amazed.


    Figure 9-7\. Launching the OpenGL ES analysis tool


    When the tool has launched, you’ll be presented with the screen in Figure 9-8.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 262](index-304_1.jpg)


    **CHAPTER 9: Performance ’n’ Stuff**


    **301**


    Figure 9-8\. The main instruments screen at startup


    The following describes briefly what you’re looking at:


    1\. Record/Stop button


    2\. OpenGL instrument inspector


    3\. The target selector


    4\. Track pane


