    **CHAPTER 1: Computer Graphics: From Then to Now**


    **2**


    **Your First OpenGL ES Program**


    Some software how-to titles will carefully build up the case for their specific
    topic (‘‘the boring stuff’’) only to get to the coding and examples (‘‘the fun
    stuff’’) by around page 655\. Others will jump immediately into some exercises
    to address your curiosity and save the boring stuff for a little later. This book
    will be of the latter category.


    **Note** OpenGL ES is a 3D graphics standard based on the OpenGL library that
    emerged from the labs of Silicon Graphics in 1992\. It is widely used across the
    industry in everything from pocketable machines running games up to supercomputers
    running fluid dynamics simulations for NASA (and playing really, really fast games).
    The ES variety stands for *Embedded* *Systems*, meaning small, portable, low-power
    devices. Unless otherwise noted, I’ll use OpenGL and OpenGL ES interchangeably.


    When developing any apps for iOS, it is customary to let Xcode do the heavy lifting
    at the beginning of any project via its various wizards. With Xcode (this book
    uses Xcode 4


    as reference), you can easily create an example OpenGL ES project and then add
    on your own stuff to eventually arrive at something someone might want to buy
    from the App Store.


    With Xcode 4 already running, go to File New New Project, and you should see something
    that looks like Figure 1-1.


    Figure 1-1\. Xcode project wizard


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 3](index-8_1.jpg)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **3**


    Select the OpenGL Game template, and fill in the needed project data. It doesn’t
    matter whether it is for the iPhone or iPad.


    Now compile and run, making sure you have administrative privileges. If you didn’t
    break anything by undue tinkering, you should see something like Figure 1-2.


    Figure 1-2\. Your first OpenGL ES project. Give yourself a high five.


    The code will be examined later. And don’t worry, you’ll build stuff fancier than
    a couple of rotating cubes. The main project will be to construct a simple solar-system
    simulator based on some of the code used in Distant Suns 3\. But for now, it’s
    time to get to the boring stuff: where computer graphics came from and where it
    is likely to go.


    **A Spotty History of Computer Graphics**


    To say that 3D is all the rage today is at best an understatement. Although forms
    of ‘‘3D’’


    imagery go back to more than a century ago, it seems that it has finally come
    of age.


    First let’s look at what 3D is and what it is not.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **4**


    **3D in Hollywood**


    In 1982 Disney released Tron, the first movie to widely use computer graphics
    depicting life inside a video game. Although the movie was a critical and financial
    flop (not unlike the big-budget sequel released in 2011), it would eventually
    join the ranks of cult favorites right up there with Showgirls and The Rocky Horror
    Picture Show. Hollywood had taken the bite out of the apple, and there was no
    turning back.


    Stretching back to the 1800s, what we call ‘‘3D’’ today was more commonly referred
    to as stereo vision. Popular Victorian-era stereopticons would be found in many
    parlors of the day. Consider this technology an early Viewmaster. The user would
    hold the stereopticon up to their face with a stereo photograph slipped into the
    far end and see a view of some distant land, but in stereo rather than a flat
    2D picture. Each eye would see only one half of the card, which carried two nearly
    identical photos taken only a couple of inches apart.


    Stereovision is what gives us the notion of a depth component to our field of
    view. Our two eyes deliver two slightly different images to the brain that then
    interprets them in a way that we understand as depth perception. A single image
    will not have that effect.


    Eventually this moved to movies, with a brief and unsuccessful dalliance as far
    back as 1903 (the short L’arrivée du Train is said to have had viewers running
    from the theater to avoid the train that was clearly heading their way) and a
    resurgence in the early 1950s, with Bwana Devil being perhaps the best known.


    The original form of 3D movies generally used the ‘‘anaglyph’’ technique that
    required the viewers to wear cheap plastic glasses with a red filter over one
    eye and a blue one over the other. Polarizing systems were incorporated in the
    early 1950s and permitted color movies to be seen in stereo, and they are still
    very much the same as today. Afraid that television would kill off the movie industry,
    Hollywood needed some gimmick that was impossible on television in order to keep
    selling tickets, but because both the cameras and the projectors required were
    much too impractical and costly, the form fell out of favor, and the movie industry
    struggled along just fine.


    With the advent of digital projection systems in the 1990s and fully rendered
    films such as Toy Story, stereo movies and eventually television finally became
    both practical and affordable enough to move it beyond the gimmick stage. In particular,
    full-length animated features (Toy Story being the first) made it a no-brainer
    to convert to stereo. All one needed to do was simply rerender the entire film
    but from a slightly different viewpoint. This is where stereo and 3D computer
    graphics merge.


    **The Dawn of Computer Graphics**


    One of the fascinating things about the history of computer graphics, and computers
    in general, is that the technology is still so new that many of the giants still
    stride among us. It would be tough to track down whoever invented the buggy whip,
    but I’d know whom to call if you wanted to hear firsthand how to program the Apollo
    Lunar Module computers from the 1960s.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 4](index-10_1.jpg)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **5**


    Computer graphics (frequently referred to as CG) come in three overall flavors:
    2D for user interface, 3D in real time for flight or other forms of simulation
    as well as games, and 3D rendering where quality trumps speed for non-real-time
    use.


    **MIT**'
