    **Chapter 5


    **Textures**


    The true worth of a man is not to be found in man himself but in the


    colours and textures that come alive in others.


    -----Albert Schweitzer


    People would be a rather dull bunch without texture in their lives. Removing those
    interesting little foibles and eccentricities would remove a little of the sheen
    in our daily wanderings, be they odd but beguiling little habits or unexpected
    talents. Imagine the high-school janitor who happens to be an excellent ballroom
    dancer, the famous comedian who must wear only new white socks every day, the
    highly successful game engineer who’s afraid to write letters by hand----all can
    make us smile and add just a little bit of wonder through the day. And so it is
    when creating artificial worlds. The visual perfection that computers can generate
    might be pretty, but it just doesn’t feel right if you want to create a sense
    of authenticity to your scenes. That’s where texturing comes in.


    Texture makes that which is perfect become that which is real. The American Heritage
    Dictionary describes it this way: ‘‘The distinctive physical composition or structure
    of something, especially with respect to the size, shape, and arrangement of its
    parts.’’


    Nearly poetic, huh?


    In the world of 3D graphics, texturing is as vital as lighting in creating compelling
    images and can be incorporated with surprisingly little effort nowadays. Much
    of the work in the graphics chip industry is rooted in rendering increasingly
    detailed textures at higher rates than each previous generation of hardware.


    Because texturing in OpenGL ES is such a vast topic, this chapter will be confined
    to the basics, with more advanced topics and techniques reserved for the next
    chapter. With that in mind, let’s get started.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 148](index-137_1.jpg)


    ![Image 149](index-137_2.jpg)


    **CHAPTER 5: Textures**


    **134**


    **The Language of Texturing**


    Say you wanted to create an airstrip in a game you’re working on. How would you
    do that? Simple, take a couple of black triangles and stretch them really long.
    Bang! You’ve got your landing strip! Not so fast there, sport. What about the
    lines painted down the center of the strip? How about a bunch of small white faces?
    That could work. But don’t forget those yellow chevrons at the very end. Well,
    add a bunch of additional faces and color them yellow. And don’t forget about
    the numbers. How about the curved lines leading to the tarmac? Pretty soon you
    might be up to hundreds of triangles, but that still wouldn’t help with the oil
    spots, repairs, skid marks, and roadkill. Now it starts getting complicated. Getting
    all of the fine detail could require thousands if not tens of thousands of faces.
    Meanwhile, your buddy, Arthur, is also creating a strip. You are comparing notes,
    telling him about polygon counts, and you haven’t even gotten to the roadkill
    yet. Arthur says all he needed was a couple of triangles and one image. You see,
    he used texture maps, and using texture maps can create a highly detailed surface
    such as an airstrip, brick walls, armor, clouds, creaky weathered wooden doors,
    a cratered terrain on a distant planet, or the rusting exterior of a ’56 Buick.


    In the early days of computer graphics, texturing (or texture mapping) used up
    two of the most precious resources: CPU cycles and memory. Texture mapping was
    used sparingly, and all sorts of little tricks were done to save on both resources.
    With memory now virtually free (compared to 20 years ago) and with modern chips
    having seemingly limitless speed, using textures is no longer a decision one should
    ever have to stay up all night and struggle with.


    **All About Textures (Mostly)**


    Textures come in two broad types: procedural and image. Procedural textures are
    generated on the fly based on some algorithm. There are ‘‘equations’’ for wood,
    marble, asphalt, stone, and so on. Nearly any kind of material can be reduced
    to an algorithm and hence drawn onto an object, as shown in Figure 5-1.


    Figure 5-1\. A golden chalice (left). By using procedural texture mapping (right),
    the chalice can be made up of gold ore instead, while the cone uses a marble map.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 150](index-138_1.jpg)


    **CHAPTER 5: Textures**


    **135**


    Procedural textures are very powerful because they can produce an infinite variety
    of scalable patterns that can be enlarged to reveal increasingly more detail,
    as shown in Figure 5-2\. Otherwise, this would require a massive static image.


    Figure 5-2\. Close-up on the goblet from Figure 5-1 (right). Notice the fine detailing
    that would need a very large image to accomplish.


    The 3D rendering application Strata Design 3D-SE, which was used for the images
    in Figure 5-2, supports both procedural and image-based textures. Figure 5-3 shows
    the dialog used to specify the parameters of the gold ore texture depicted in
    Figure 5-2.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 151](index-139_1.jpg)


    **CHAPTER 5: Textures**


    **136**


    Figure 5-3\. All of the possible settings used to produce the gold ore texture
    in Figure 5-2.'
