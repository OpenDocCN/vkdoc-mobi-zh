  trans: "\n如果感到头疼，这完全可以理解。为了绘制几个立方体，确实需要处理大量繁琐的步骤。但视觉世界本身就丰富多彩，需要大量元素来定义它。我们离完成还差得远。不过，其核心原则始终如一。\n\
    \n## 展示场景\n\n在清单 1-2 中，我们终于可以将数据绘制到屏幕上，并看到一些漂亮的图像了。这里使用了两种不同的方式来显示内容。第一种方式将所有内容隐藏在\
    \ iOS5 及更高版本提供的新 `GLKit` 框架之下。它隐藏了 OpenGL ES 2.0 通常暴露的所有着色器和其他内容，并通过新的 `GLKBaseEffect`\
    \ 类来实现。第二种方式则直接使用纯粹的 2.0 技术。两者结合，展示了这两种不同方法如何共存于同一个渲染循环中。\n\n但请记住，使用效果类来渲染一个简单的立方体是大材小用，这有点像开车去\
    \ 6 英尺外的邮箱取信。\n\n**注意：** Apple 倡导使用 `GLKBaseEffect` 来帮助 1.1 用户将其代码移植到 2.0，因为它提供了\
    \ 2.0 所没有的光照、材质和其他功能。但它实际上并不适合简单的迁移，因为它的限制太多，无法承载大多数 OpenGL 应用在 1.1 环境下的全部功能。\n\
    \n**清单 1-2：将场景渲染到显示器上。**\n\n```\n- (void)update //1\n{\n    //2\n    float aspect\
    \ = fabsf(self.view.bounds.size.width / self.view.bounds.size.height);\n    GLKMatrix4\
    \ projectionMatrix =\n    GLKMatrix4MakePerspective(GLKMathDegreesToRadians(65.0f),\
    \ aspect, 0.1f, 100.0f);\n\n    self.effect.transform.projectionMatrix = projectionMatrix;\
    \ //3\n\n    GLKMatrix4 baseModelViewMatrix = //4\n    GLKMatrix4MakeTranslation(0.0f,\
    \ 0.0f, -4.0f);\n    \n    baseModelViewMatrix = //5\n    GLKMatrix4Rotate(baseModelViewMatrix,\
    \ _rotation, 0.0f, 1.0f, 0.0f);\n\n    // 为使用 GLKit 渲染的对象计算模型视图矩阵。\n    GLKMatrix4\
    \ modelViewMatrix = //6\n    GLKMatrix4MakeTranslation(0.0f, 0.0f, -1.5f);\n\n\
    \    modelViewMatrix = //7\n    GLKMatrix4Rotate(modelViewMatrix, _rotation, 1.0f,\
    \ 1.0f, 1.0f);\n\n    modelViewMatrix = //8\n    GLKMatrix4Multiply(baseModelViewMatrix,\
    \ modelViewMatrix);\n\n    self.effect.transform.modelviewMatrix = modelViewMatrix;\
    \ //9\n\n    // 为使用 ES2 渲染的对象计算模型视图矩阵。\n    modelViewMatrix =\n    GLKMatrix4MakeTranslation(0.0f,\
    \ 0.0f, 1.5f); //10\n    \n    modelViewMatrix =\n    GLKMatrix4Rotate(modelViewMatrix,\
    \ _rotation, 1.0f, 1.0f, 1.0f);\n    \n    modelViewMatrix =\n    GLKMatrix4Multiply(baseModelViewMatrix,\
    \ modelViewMatrix);\n\n    _normalMatrix = //11\n    GLKMatrix3InvertAndTranspose(GLKMatrix4GetMatrix3(modelViewMatrix),\
    \ NULL);\n\n    //12\n    _modelViewProjectionMatrix = GLKMatrix4Multiply(projectionMatrix,\
    \ modelViewMatrix);\n\n    _rotation += self.timeSinceLastUpdate * 0.5f; //13\n\
    }\n\n- (void)glkView:(GLKView *)view drawInRect:(CGRect)rect\n{\n    glClearColor(0.65f,\
    \ 0.65f, 0.65f, 1.0f); //14\n    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\
    \n    glBindVertexArrayOES(_vertexArray); //15\n\n    // 使用 GLKit 渲染对象。\n    [self.effect\
    \ prepareToDraw]; //16\n\n    glDrawArrays(GL_TRIANGLES, 0, 36); //17\n\n    //\
    \ 使用 ES2 再次渲染对象。\n    glUseProgram(_program); //18\n\n    glUniformMatrix4fv(uniforms[UNIFORM_MODELVIEWPROJECTION_MATRIX],\
    \ 1, 0, _modelViewProjectionMatrix.m);\n    glUniformMatrix3fv(uniforms[UNIFORM_NORMAL_MATRIX],\
    \ 1, 0, _normalMatrix.m);\n\n    glDrawArrays(GL_TRIANGLES, 0, 36); //19\n}\n\
    ```\n\n让我们看看这里发生了什么：\n\n第 1 行，`update` 方法的开始，实际上是来自新 `GLKViewController` 对象的委托调用之一。这支持帧率提示，例如，“我希望我的新游戏《危险贵宾犬》能够以每秒\
    \ 60 帧的速度更新”。\n"
- fmt: '# 排版后的文档


    以 100 fps 进行，如果可以的话。它还会让你知道它的实际帧率、自会话开始以来的帧数，并处理暂停和恢复功能。


    在第 2 行中，除了定义要显示的对象外，我们还需要定义视锥体。这简单地指定了你希望在世界中看到的区域范围。可以将其视为摄像机的变焦镜头，你可以拉近或拉远。然后，这会被转换为一个`projection-matrix`，类似于我们之前看到的变换矩阵。它封装了将对象投影到设备显示上的信息。


    请注意，提供给`GLKMatrix4MakePerspective`的第一个值是 65，这意味着我们希望“镜头”具有 65 度的视角。这是利用 GLKit
    中的众多新数学库调用之一生成的。这些调用包括对向量、矩阵和四元数（稍后介绍）的支持，专门用于 3D 场景操作。


    需要告知用于容纳其中一个立方体的`GLKBaseEffect`在第 3 行中使用此矩阵。


    第 4 行生成了一个平移矩阵。这描述了如何在空间中移动或平移对象。在这种情况下，-4 值将其从视点移开 4 个单位。默认情况下，OpenGL 坐标系中 X
    轴为左右方向，Y 轴为上下方向，Z 轴为前后方向。我们正看向 -Z 方向。


    矩阵`baseModelViewMatrix`得名于 OpenGL 的“ModelView”矩阵，这是比任何其他矩阵调用都更频繁的一个矩阵。


    通过首先应用它，我们实际上将整个世界移开了 4 个单位。下面，我们为各个立方体添加单独的运动。


    现在我们要旋转立方体。第 5 行显示，可以通过将变换矩阵相乘来将它们串联起来。这里我们重用了上一行的`baseModelView`矩阵。


    “什么？”你无疑会问，“又是这些愚蠢的矩阵东西？”即使是看似简单的运动有时也需要一系列复杂的旋转和平移。在第 6 行中，立方体从自身原点移开了 1.5 个单位。这就是为什么两个立方体实际上都没有居中在屏幕上，而是围绕着一个看不见的东西运行。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **第 1 章：计算机图形学：从过去到现在**


    **25**


    第 7 行对立方体世界的每个轴应用旋转。每次循环迭代时都会更新旋转值。


    第 8 行将先前完成的`baseModelViewMatrix`应用于这个正在从视点移开的立方体。然后，这个合并后的矩阵与投影矩阵一起在第 9 行被赋值给`GLKBaseEffect`对象。


    在第 10 行中，对绘制蓝色立方体的 OpenGL ES 2 独立代码块重复了大部分相同操作。第 10 行及之后的行，与第 6、7 和 8 行完全相同，只是平移是正方向，而不是负方向。


    现在，在第 11 行，我们需要另一个矩阵，这次是针对之前介绍的面法线。当法线长度恰好为 1 个单位时，它们通常处于最理想状态，即被称为“归一化”。这会抵消之前的变换矩阵可能引入的任何失真。


    第 12 行将模型视图矩阵与之前完成的投影矩阵结合起来。


    在第 13 行，旋转值略有增加。将其乘以`timeSinceLastUpdate`值可确保旋转速率是平滑的。


    第二个方法`drawInRect()`是实际渲染对象的方法。第 14 行清除了屏幕背景。这里`glClearColor()`被设置为显示所有三种颜色的 65%
    值，以产生你所看到的浅灰色。`glClear()`实际执行清除操作，但仅限于你指定的缓冲区——在本例中，是“颜色缓冲区”（即主缓冲区）和深度缓冲区（用于隐藏面移除，保存
    Z 值）。


    在第 15 行，我们终于可以使用很久以前创建的 `VAO`。将其绑定到系统意味着使用之前上传到 GPU 的集合数据。'
  raw: 'at 100 fps, if you can do so please.’’ It will also let you know what its
    real frame rate is, the number of frames since starting the session, and it handles
    pause and resume functions.


    In line 2, besides defining the objects to show, we need to define the viewing
    frustum. This simply specifies how big of a swath of area you


    want to see in your world. Think of it as a camera’s zoom lens, where


    you can zoom in or out. This then gets converted into a projection-


    matrix, similar to a transformation matrix that we saw earlier. This


    encapsulates the information to project your object up against you


    device’s display.


    Note that the first value supplied to GLKMatrix4MakePerspective is 65, meaning
    that we want our ‘‘lens’’ to have a 65 degree field-of-view.


    This is generated using one of the many new math library calls that


    also form a part of the GLKit. The calls include support for vectors,


    matrices, and quaternions (covered later), exclusively for 3D scene


    manipulation.


    The GLKBaseEffect used to contain one of the cubes needs to be told to use this
    matrix in line 3.


    Line 4 generates a translation matrix. This describes how to move, or translate,
    your object through space. In this case, the -4 value moves it away from our eyepoint
    by 4 units. By default, the OpenGL coordinate


    system has the X-axis, left and right, the Y-axis up and down, and the Z-axis,
    forward and back. We are looking towards --


    -Z.


    The matrix, baseModelViewMatrix, gets its name from OpenGL’s


    ‘‘ModelView’’ matrix, which the one invoked more frequently than any


    others.


    By applying it first, we are actually moving our entire world away by 4


    units. Below we add separate motions to the individual cubes.


    Now we want to rotate the cube. Line 5 shows that transformations


    can be concatenated by multiplying them together. Here we reuse the


    baseModelView matrix from the previous line.


    ‘‘What?’’ you are no doubt asking, ‘‘another one of these silly matrix things?’’
    Even seemingly simple motions sometimes require a


    convoluted assortment of rotations and translations. Here in line 6 the cube is
    moved -1.5 units away from its own origin. That’s why neither


    is actually centered in the screen but orbit around an invisible


    something.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    **CHAPTER 1: Computer Graphics: From Then to Now**


    **25**


    Line 7 applies a rotation to each axis of the cube’s world. The rotation value
    is updated each time through this loop.


    Line 8 applies the baseModelViewMatrix done earlier to this one


    moving it away from our eyepoint. This combined matrix is then


    assigned to the GLKBaseEffect object along with the projection matrix


    in line 9.


    In line 10, much of the same is repeated for the OpenGL ES 2-only


    code block that draws the blue cube. Lines 10ff, are exactly like lines 6, 7,
    and 8, except the translation is in a positive direction, not a


    negative one.


    Now, in line 11, we need another matrix, this one for the face normals described
    earlier. Normals are generally at their happiest when exactly 1 unit in length,
    otherwise known as being ‘‘normalized.’’ This


    counteracts any distortions the previous transformation matrices might otherwise
    introduce.


    Line 12 combines the model view matrix with the projection matrix


    done earlier.


    In line 13, the rotational value is bumped up a bit. Multiplying it against the
    value timeSinceLastUpdate ensures that the rotation rates are


    smooth.


    The second method, drawInRect(), is the one that actually renders the objects.
    Lines 14f clear the screen’s background. Here glClearColor()


    is set to display 65% values of all three colors, to give the light gray you see.
    glClear() actually performs the clearing operation but only on buffers you specify-----in
    this case, the ‘‘color buffer,’’ which is the main one, and the depth buffer,
    which holds the z-values for hidden surface removal.


    In line 15, we can finally use the VAO created way back in the day.


    Binding it to the system means to use the collection of stuff previously uploaded
    to the GPU.'
