    \ the `glGetFloatv()` call, in line 7. The simulator shows a range from .1 to\
    \ 511 pixels, while the iPad 1 shows it as 1 to 511. Note that single pixel points\
    \ are almost impossible to see on the Retina display.\n\nFigure 8-7. From left\
    \ to right, a close-up on an 8-pixel-wide unsmoothed point, with smoothing, and\
    \ with smoothing and blending\n\nIn line 8 we can finally draw the stars, followed\
    \ by just some basic cleanup stuff.\n\nI decided to add a utilities object, because\
