- fmt: '# The Architecture of a Collection View


    The `UICollectionView` class is part of the `UIKit` framework, and is a subclass
    of `UIScrollView`, which in turns inherits from `UIView`, `UIResponder`, and ultimately
    `NSObject`, as shown in Figure [4-2](#A978-1-4842-1242-4_4_Chapter.html#Fig2).


    ![A978-1-4842-1242-4_4_Fig2_HTML.jpg](A978-1-4842-1242-4_4_Fig2_HTML.jpg)


    Figure 4-2. The inheritance tree of `UICollectionView`


    The `UICollectionView` control works with four other objects, shown in Figure
    [4-3](#A978-1-4842-1242-4_4_Chapter.html#Fig3). The collection view itself is
    managed by a subclass of `UIViewController`, either directly or as an instance
    of `UICollectionViewController` that inherits from `UIViewController`.


    ![A978-1-4842-1242-4_4_Fig3_HTML.jpg](A978-1-4842-1242-4_4_Fig3_HTML.jpg)


    Figure 4-3. The collection view and supporting objects


    The `UICollectionViewDataSource` is an object that is responsible for getting
    data from the data model. It uses this to inform the collection view of the number
    and type of items that are to be displayed, and it creates and configures the
    items before passing them to the collection view itself.


    Interactions with the collection view (selections, highlighting, focusing, etc.)
    are handled by an object acting as the `UICollectionViewDelegate`.


    `UICollectionView` uses the model-view-controller pattern to organize itself.
    The data that drives the contents of the items and supplementary views is provided
    by the model object, while the `UICollectionView` control itself is the view component.


    The controller part is often a `UICollectionViewController` subclass, but the
    role of the controller can also be played by another separate class, or even split
    across different classes that act as `delegate` and `dataSource` independently
    of each other.


    **Tip:** The `UIViewController` subclasses that also act as a `UICollectionView`
    datasource and delegates often have a tendency to become rather large. To avoid
    your project succumbing to “Massive View Controller” syndrome, it’s worth considering
    whether it would be better structured with a separate class to manage the collection
    view, while the view controller sticks to its normal role.


    The layout of a collection view is managed by a `UICollectionViewLayout` object
    that tells the collection view how each cell, supplementary view, and decoration
    view should be positioned within the bounds of the collection view itself by configuring
    the various layout attributes of each item. Changes in layouts can be animated
    and react to interactions.


    Although collection views and table views are similar in terms of their basic
    operation (each uses a datasource to provide items to display, and a delegate
    to handle interaction), the collection view layout provides a much greater degree
    of flexibility in configuring its appearance.


    As with `UITableView`, collection views use a dequeuing and recycling approach
    to creating and managing cells. When cells are created, they’re tagged with a
    cell identifier that allows the collection view to keep track of the cell type.


    As cells scroll out of the visible area, they’re stored in a cache from where
    they can be dequeued and recycled as “new” cells are needed to display items that
    are about to scroll into view. By using the cell identifier, the collection view
    can handle the dequeuing and recycling of multiple types of cells.


    Creating cells is an expensive operation, so this approach allows collection views
    to manage potentially huge numbers of individual data items while maintaining
    fast scrolling and animation performance, and all within the stringent memory
    limitations of an iOS device. There’s a detailed description of how the dequeuing
    mechanism works in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html).


    # The Anatomy of a Collection View


    Collection views are instances of the `UICollectionView` class, and display a
    list of items—or cells—that can be scrolled vertically and horizontally. They’re
    instances of the `UICollectionView` class and come in three physical parts.


    ## The Collection View Itself


    The visible container part, the `collectionView` itself, is a specialized subclass
    of `UIScrollView`, and is responsible for displaying a collection of data items
    as items. Just like `UIScrollView`, the collection view’s frame acts as a “window”
    over the content view, which, depending on the number and size of the items being
    displayed, may be larger than the frame itself.


    The content items are laid out inside the bounds of the collection view. If the
    contents are larger than the collection view’s frame, the collection view will
    handle scrolling the content around, either in response to user interaction or
    programmatically. Figure [4-4](#A978-1-4842-1242-4_4_Chapter.html#Fig4) shows
    how the frame and content relate.


    ![A978-1-4842-1242-4_4_Fig4_HTML.jpg](A978-1-4842-1242-4_4_Fig4_HTML.jpg)


    Figure 4-4. The frame and content view


    If the number and size of items means that they can all fit within the collection
    view’s frame, then the content won’t scroll. The overall size of the content view
    is calculated by the collection view’s layout, and is recalculated every time
    the number of sections and/or items changes.


    Figure [4-4](#A978-1-4842-1242-4_4_Chapter.html#Fig4) shows a collection view
    with a layout that arranges items in rows and columns, but this doesn’t have to
    be the case. With custom layouts you can implement rows, columns, circles, or
    pretty much any arrangement in between. Regardless of how the items are arranged,
    however, the collection view will handle scrolling if they don’t all fit into
    the collection view’s frame.


    As the content view scrolls around, the collection view will create and remove
    items from it as required. This is a balance between ensuring that items are always
    created and placed in time to be visible as that part of the content view scrolls
    into the frame, but not creating and maintaining so many items that aren’t visible
    so that the memory consumption of the collection view is excessive.


    In exactly the same way as a `UITableView`, the collection view uses a queue of
    preexisting items that it can dequeue and recycle as required. Just before an
    item scrolls into the visible area, the collection view will grab it from the
    queue and configure it with the correct data. Once the item scrolls out of the
    visible area, the collection view will dump it back onto the queue ready for eventual
    reuse. In this way a collection view can appear to create and display thousands
    of items while only needing to create a small fraction of that amount as actual
    objects to maintain in memory.'
