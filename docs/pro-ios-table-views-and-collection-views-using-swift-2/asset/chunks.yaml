  raw: '##### Parameters


    It takes three parameters for the collection view and layout objects, and the
    index path.


    | Parameter | Type | Purpose |

    | --- | --- | --- |

    | `collectionView` | `UICollectionView` | A reference to the collection view that
    the delegate is dealing with. This enables a single delegate object to support
    multiple collection views. |

    | `Layout` | `UICollectionViewFlowLayout` | A reference to the collection view
    flow layout that the delegate is dealing with. This enables a single delegate
    object to support multiple flow layouts. |

    | `indexPath` | `NSIndexPath` | Identifies the section and item for which the
    calculation should be performed. |


    ##### Return Values


    It returns the item size:


    | Return value | Type | Purpose |

    | --- | --- | --- |

    | `Item size` | `CGSize` | The calculated size of the item at the specified index
    path |


    ##### Example


    Listing [15-1](#A978-1-4842-1242-4_15_Chapter.html#FPar1)shows an example implementation
    of the `collectionView(_:layout:sizeForItemAtIndexPath:)` function.


    Listing 15-1. An Example sizeForItemAtIndexPath: Function


    `func collectionView(collectionView: UICollectionView, layout ➤`


      `collectionViewLayout: UICollectionViewLayout, sizeForItemAtIndexPath➤`


      `indexPath: NSIndexPath) -> CGSize {`


            `// Get the dictionary for this suit`


            `let suitDictionary = suitsArray[indexPath.section]`


            `// Get the array of cards in this suit`


            `let cardsArray = suitDictionary["cards"]`


            `// Get the dictionary for this card`


            `let cardDictionary: NSDictionary = cardsArray[indexPath.row] as! Dictionary`


            `// Get the name of the card’s image`


            `let cardImageName = cardDictionary["cardImage"] as! String`


            `// Load the image for this card`


            `let cardImage: UIImage? = UIImage(named: cardImageName)`


            `if let unwrappedCardImage = cardImage {`


                `// If the image was loaded successfully, return its size`


                `return unwrappedCardImage.size`


            `}`


            `// There was a problem finding the image, so return a zero size`


            `return CGSizeZero`


        `}`


    #### Managing Section Spacing


    The `UICollectionViewDelegateFlowLayout`protocol defines three optional functions
    for controlling section spacing:


    ##### collectionView(_:layout:insetForSectionAtIndex:)


    This function takes parameters for the collection view and flow layout, and the
    index of the section for which the insets should be calculated.


    | Parameter | Type | Purpose |

    | --- | --- | --- |

    | `collectionView` | `UICollectionView` | A reference to the collection view that
    the delegate is dealing with. This enables a single delegate object to support
    multiple collection views. |

    | `Layout` | `UICollectionViewFlowLayout` | A reference to the collection view
    flow layout that the delegate is dealing with. This enables a single delegate
    object to support multiple flow layouts. |

    | `Index` | `Int` | Identifies the section for which the calculation should be
    performed. |


    It returns a `UIEdgeInsets` struct:


    | Return value | Type | Purpose |

    | --- | --- | --- |

    | Insets | `UIEdgeInsets` | `CGFloat` values for top, left, bottom, and left insets.
    Positive values inset the items relative to the collection view’s frame; negative
    values outset the items. |


    ##### collectionView(_:layout:minimumLineSpacingForSectionAtIndex:)


    This function takes parameters for the collection view and flow layout, and the
    index of the section for which the minimum line spacing should be calculated.


    | Parameter | Type | Purpose |

    | --- | --- | --- |

    | `collectionView` | `UICollectionView` | A reference to the collection view that
    the delegate is dealing with. This enables a single delegate object to support
    multiple collection views. |

    | `Layout` | `UICollectionViewFlowLayout` | A reference to the collection view
    flow layout that the delegate is dealing with. This enables a single delegate
    object to support multiple flow layouts. |

    | `Index` | `Int` | Identifies the section for which the calculation should be
    performed. |


    It returns a `CGFloat`:


    | Return value | Type | Purpose |

    | --- | --- | --- |

    | Minimum line spacing | `CGFloat` | A `CGFloat` value for the minimum line spacing
    of rows of items. Items will never positioned closer together than this value,
    although they can be further apart depending on their vertical (or horizontal)
    alignment. |


    ##### collectionView(_:layout:minimumInteritemSpacingForSectionAtIndex:)


    This function takes parameters for the collection view and flow layout, and the
    index of the section for which the minimum interitem spacing should be calculated.


    | Parameter | Type | Purpose |

    | --- | --- | --- |

    | `collectionView` | `UICollectionView` | A reference to the collection view that
    the delegate is dealing with. This enables a single delegate object to support
    multiple collection views. |

    | `layout` | `UICollectionViewFlowLayout` | A reference to the collection view
    flow layout that the delegate is dealing with. This enables a single delegate
    object to support multiple flow layouts. |

    | `index` | `Int` | Identifies the section for which the calculation should be
    performed. |


    It returns a `CGFLoat`:


    | Return value | Type | Purpose |

    | --- | --- | --- |

    | Minimum interitem spacing | `CGFloat` | A CGFloat values for the minimum interitem
    spacing of items in rows. Items will never be positioned closer together than
    this value, although they can be further apart depending on their vertical (or
    horizontal) alignment. |


    #### Managing Header and Footer Sizes


    The `UICollectionViewDelegateFlowLayout` protocol defines two optional functions
    for controlling header and footer sizes:


    ## Subclassing UICollectionViewFlowLayout


    Used in conjunction with a `UICollectionViewDelegateFlowLayout` delegate, you
    can apply fine-grained control to a line-based collection view without needing
    to implement the heavy lifting involved in calculating line layouts.


    Sometimes, though, you need to be able to customize the layout still further.
    In these situations, you can still benefit from the behind-the-scenes calculations
    of the flow layout, but implement further customizations, by creating a custom
    subclass of `UICollectionViewFlowLayout`.


    There are several scenarios where you might want to do this:


    *   You want to control layout attributes for items.

    *   You want to add custom layout attributes to items.

    *   You want to add new supplementary and/or decoration views.

    *   You want greater control over item insertion or deletion animations.


    The process for subclassing `UICollectionViewFlowLayout` is identical to that
    for creating custom layouts; this is covered in detail in [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html).


    ### Controlling Item Layout Attributes


    Controlling layout attributes allows you to update values such as the item’s frame,
    bounds, position, transform, z-index, and alpha properties.


    You need to implement the flow layout’s `layoutAttributesForElementsInRect:` function
    to override the desired attributes. Bear in mind that `UICollectionViewFlowLayout`
    normally figures out the positioning of items for you, so updating these may result
    in unexpected results!


    ### Adding Additional Custom Layout Attributes to Items


    `UICollectionView` doesn’t restrict you to just the “standard” item layout attributes.
    If needed, you can define your own. This involves creating custom subclasses of
    `UICollectionViewLayoutAttributes` (you’ll look at this in [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html)).


    Once you have a custom layout attributes class, you need to override `UICollectionViewLayout`’s
    `layoutAttributesClass` function to return your custom attributes class instead
    of the default.


    Then, using `layoutAttributesForElementsInRect:`, you can apply the custom attributes
    to items as required.'
