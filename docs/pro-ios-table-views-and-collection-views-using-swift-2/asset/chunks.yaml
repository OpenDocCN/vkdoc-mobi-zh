    Finally, it’s a good idea to clean up the `NSTimer` once the view is dismissed,
    so add the `viewWillDisappear()` function to the view controller, as shown in
    Listing [16-14](#A978-1-4842-1242-4_16_Chapter.html#FPar15).


    Listing 16-14. The viewWillDisappear() Function


