    `NSIndexPath`。 |


    ## 数据源


    数据源在生命周期中扮演着相当直接的角色：它们提供数据及数据相关信息，并处理数据的操作。与 `delegates` 类似，`UITableView` 和 `UICollectionView`
    的 `dataSource` 协议虽有相似之处，但也存在差异，因此我们将逐一探讨。


    ### `UITableView` 数据源


    一个 `UITableView` 需要三项关键信息才能成功绘制自身及其单元格：


    - 表格中的分区数量

    - 分区中的行数

    - 分区中每行所属的单元格


    `dataSource` 的作用正是提供这些信息。


    #### 获取表格中的分区数量


    简单表格通常只有一个分区，因此除非实现了 `numberOfSectionsInTableView(_:)` 方法并返回不同值，否则表格视图会默认分区数为
    1。


    尽管 `numberOfSectionsInTableView(_:)` 是一个可选方法，但我倾向于始终实现它，以确保其存在。由于这是第一个被调用的方法，如果表格数据集为空，你也可以通过返回
    `0` 来加快处理速度——此后 `tableView` 会认为不会再获取到额外数据，并停止询问。


    #### 获取分区中的行数


    假设有数据需要显示，则会调用 `tableView(_:numberOfRowsInSection:)` 方法。调用该方法的 `tableView` 会提供一个整数形式的分区编号，该方法则返回行数（同样为整数）。


    #### 获取该分区该行所属的单元格


    创建要显示的单元格是设置 `tableView` 的核心。每次调用 `tableView(_:cellForRowAtIndexPath:)` 方法时，你的代码都需要返回一个
    `UITableViewCell` 实例供 `tableView` 显示。


    `tableView` 会通过 `indexPath` 提供分区和行号，这取决于你的 `tableView(_:cellForRowAtIndexPath:)`
    方法：从数据模型中检索数据、出列（dequeue）单元格、对其进行配置，并尽快将其返回。


    #### 表格如何获取关键信息


    涉及的四个对象——包含 `tableView` 的视图控制器、`tableView` 本身以及属于 `tableView` 的 `delegate` 和 `dataSource`
    对象——之间的交互按特定顺序进行。如图 5-10 所示。


    首先，视图控制器分配并实例化 `tableView`，然后设置 `delegate` 和 `dataSource` 属性。创建完成后，`tableView`
    向 `dataSource` 请求自身包含的分区数，`dataSource` 以一个 `NSInteger` 值作为响应。接着，`tableView` 通过
    `indexPath` 实例提供自身引用和分区编号，并向 `dataSource` 请求该分区中的行数。`dataSource` 再次以一个 `NSInteger`
    作为响应。最后，`tableView` 通过 `indexPath` 对象提供自身引用和行号，并向 `dataSource` 请求该行对应的单元格。`dataSource`
    以一个 `UITableViewCell` 实例作为响应。


    ![A978-1-4842-1242-4_5_Fig10_HTML.jpg](img/A978-1-4842-1242-4_5_Fig10_HTML.jpg)


    **图 5-10.** 视图控制器、tableView 和数据源之间的消息传递


    当你的 `dataSource` 提供这三项信息后，`tableView` 就正式投入工作了。这三个方法以及其他八个 `dataSource` 方法均定义在
    `UITableViewDataSource` 协议中。'
