  trans: '

    ### 为何使用模型-视图-控制器模式？


    起初，MVC 模式可能看起来像是不必要的复杂化，特别是对于小型应用而言。但以这种方式思考并构建应用会带来一些好处：


    - **模块化**：应用的每个功能元素各自管理其关注领域。模型处理数据的读写，而视图负责呈现信息。这意味着对一个功能元素的更改不一定影响其他元素。例如，你可以完全更换底层数据库引擎，而视图保持不变。

    - **多视图**：考虑 iPhone 和 iPad 用户界面的差异。如果你的应用逻辑嵌入在视图中，你就需要创建两套——一套针对 iPhone 的小屏幕，另一套针对
    iPad 的大屏幕。坚持使用 MVC 模式，同一组模型和控制器可以为两种界面版本提供数据。

    - **高效性**：分离应用的不同层可以支持诸如线程化和后台处理等技巧。例如，你可以在视图仍在加载时就启动数据检索过程，以充分利用 iOS 设备的多任务处理能力。

    - **可测试性**：通过将应用分解为独立区域，你可以分别测试每个部分。如果一个 `tableView` 依赖于一个 `dataSource`，作为测试该表过程的一部分，你可以用一个返回已知值的“替身”对象来替代数据源。这意味着你可以更轻松地定位任何错误的源头。

    - **可复用性**：如果你的应用涉及多个表格或集合视图，可以通过创建一个单一的 `dataSource` 或 `delegate` 来服务多个视图，从而减少代码和功能的重复。单个视图所需的大部分支持框架将与其他视图共用。更少的代码意味着更少的错误来源，也更易于维护。


    ### MVC 与 iOS


    iOS 是一个以模型-视图-控制器为中心的框架，尽管与许多 SDK——特别是 Web 框架——相比，iOS 的 MVC 特性有时有些隐蔽。如果你是从 Rails
    或 Django 等 Web 框架转向 iOS 的，这一点会尤为明显。这些框架使每一层的分离非常清晰，它们各自在一组名为 `models`、`views`
    和 `controllers` 的独立目录中拥有文件集。


    另一方面，iOS 则更为微妙。你可以使用 XIB 文件创建视图，这些显然是视图。但你也可能通过在视图控制器内编写代码以编程方式创建视图，此时事情就开始变得可能令人困惑了。类似地，一个
    `tableView` 或 `collectionView` 的数据来自模型，但这个模型可能像 Core Data 管理的 SQLite 数据库那样“抽离”，也可能像在视图控制器内的
    `viewDidLoad` 方法中创建的 `Array` 那样“内嵌”！


    在 iOS 世界中保持 MVC 清醒头脑的关键是记住 MVC 是一个概念性框架，而不是像一组目录这样更绝对的事物。如果你记住表格的数据来自模型，而那个模型实际上就是前面提到的
    `Array`，你仍然是在以 MVC 的方式思考（并工作）。


    ### MVC、tableViews 和 collectionViews


    现在显而易见的问题是：“MVC 如何与表格和集合视图搭配？”


    幸运的是，答案相对直接。表格或集合视图本身是视图。它呈现用户界面并拦截用户交互，如点击和滑动操作。


    表格或集合视图呈现的数据来自模型。如前所述，这可能简单到如你加载视图时创建的一个单一的 `Array`，或者涉及 Core Data 或从外部网络源获取的信息等更复杂的内容。


    控制器元素是充当 `tableView` 或 `collectionView` 的 `delegate` 和 `dataSource` 的对象。`delegate`
    接收来自表格或集合视图的消息，并处理诸如用户点击项目或滑动单元格等事件。`dataSource` 通过从模型检索数据来“喂给”表格或集合视图其数据。


    ## 改进应用结构


    如果一个视图控制器同时也充当表格或集合视图的 `datasource` 和 `delegate`，它可能会迅速膨胀到你开始遭受“巨量视图控制器”综合症的程度。视图控制器增长到数百行代码并不罕见（我见过最大的一个记录是
    6500 行，我想明确指出，我并不是导致它变得那么大的责任人！）


    巨型视图控制器会因多种原因给项目带来问题：它们违反了面向对象设计的“单一职责原则”；它们难以测试；它们增加了源代码控制冲突的风险；并且如果它们太大，当你尝试编辑时，它们可能会直接导致
    Xcode 崩溃。


    因此，将你的大型类拆分成更小的类有助于防止这些问题的部分或全部。


    ### 如何拆分数据源和委托


    因为你负责连接表格和集合视图与它们的 `datasource` 和 `delegate`，所以你不局限于只使用管理视图层次结构中表格或集合视图的视图控制器。


    假设你一开始将 `datasource` 和 `delegate` 方法放在视图控制器中，那么分离它们需要以下步骤：


    ##### 第 1 步：创建一个单独的类


    首先创建一个单独的类。我通常将其命名为类似 `ContactsTableHelper` 这样的名称，以明确它与哪个表格协作，并且它同时充当 `datasource`
    和 `delegate`。


    接下来，将 `datasource` 和 `delegate` 方法移入这个新类。你需要声明新类将遵循 `dataSource` 和 `delegate`
    协议；并从视图控制器中移除这些：


    ```

    class TableViewHelper : NSObject, UITableViewDataSource, UITableViewDelegate {


    }

    ```


    ##### 第 2 步：将表格视图链接到新类


    创建新类后，你需要将表格视图连接到它。如果你是以代码方式创建链接的，则需要通过为新类添加一个属性来更新：


    ```

    let tableViewHelper = TableViewHelper()

    ```


    然后，你可以将 `tableView` 的 `dataSource` 和 `delegate` 属性从


    ```

    tableView.dataSource = self

    tableView.delegate = self

    ```


    更新为


    ```

    tableView.dataSource = tableViewHelper

    tableView.delegate = tableViewHelper

    ```


    如果你是以可视化方式建立连接的，过程略有不同。首先，在你的 Storyboard 中，你需要从对象浏览器中拖拽一个 `Object` 占位符到左侧的视图层次结构中，如图
    5-14 所示。


    ![A978-1-4842-1242-4_5_Fig14_HTML.jpg](img/A978-1-4842-1242-4_5_Fig14_HTML.jpg)


    图 5-14. 添加对象占位符


    选中新的 `Object` 占位符后，切换到 `Identity` 检查器，并将其 `Class` 值更新为 `TableViewHelper`，如图 5-15
    所示。


    ![A978-1-4842-1242-4_5_Fig15_HTML.jpg](img/A978-1-4842-1242-4_5_Fig15_HTML.jpg)


    图 5-15. 更新类


    现在你可以通过按住 Ctrl 键在 `tableView` 上点击，并拖拽到 `TableViewHelper` 占位符上来连接 `tableView` 的
    `dataSource` 和 `delegate` 属性，如图 5-16 所示。


    ![A978-1-4842-1242-4_5_Fig16_HTML.jpg](img/A978-1-4842-1242-4_5_Fig16_HTML.jpg)


    图 5-16. 重新连接 dataSource 和 Delegates


    一旦连接完成，这将在加载表格时懒加载一个 `TableViewHelper` 类的实例，并将其用作表格视图的 `dataSource` 和 `delegate`，而不是视图控制器。

