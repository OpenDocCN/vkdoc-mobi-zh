    ![A978-1-4842-1242-4_12_Fig27_HTML.jpg](A978-1-4842-1242-4_12_Fig27_HTML.jpg)


    Figure 12-27.


    The new cell


    ## Rearranging UICollectionViews


    A collection view is a great control for presenting data for your user to sort
    interactively–rearranging the order of photos in an album, for example. `UICollectionView`
    makes it almost trivial to implement this kind of feature.


    To demonstrate this, you’ll create a very simple collection view that displays
    a number of cells, and then you’ll implement the functionality that allows them
    to be sorted by dragging and dropping.


    Implementing drag-and-drop reordering involves adding some `UICollectionViewDelegate`
    functions to the collection view’s delegate object; the exact approach depends
    on whether you’re using a subclass of `UICollectionViewController` or not. You’ll
    look at both processes in turn.


    ### Prerequisites


    This process assumes that you’ve got a collection view that displays cells in
    a single section based on the underlying data stored in a model. The source code
    for this chapter includes two projects: one for the initial state to get you started,
    and one with the functionality fully implemented.


    Assuming you’re starting from the initial state, the app will look like Figure
    [12-28](#A978-1-4842-1242-4_12_Chapter.html#Fig28).


    ![A978-1-4842-1242-4_12_Fig28_HTML.jpg](A978-1-4842-1242-4_12_Fig28_HTML.jpg)


    Figure 12-28.


    The initial app


    There are two tabs, one containing a `UIViewController`-based collection view,
    and one with a `UICollectionViewController` subclass. Both have identical data
    structures: a `Struct` of 100 `Strings`, which are displayed in 100 x 100 cells
    under the control of a flow layout.


    At the moment, the only interaction that’s possible is the default vertical scrolling
    behavior. You’re going to enhance that by implementing drag-and-drop reordering
    of the collection view.


    The process begins with a long press on the item; once that’s been detected, the
    delegate is asked whether the item at that index path is allowed to move. If it
    is, the cell will follow the pan gesture.


    When the user lifts their finger and the pan gesture ends, the cell is inserted
    into the collection view in the space that’s opened up, and a second delegate
    function is called to allow the data source to be updated.


    Adapting the `UICollectionViewController`-based collection view is the simpler
    of the two, so you implement this first and then use it as the starting point
    for the same functionality in a `UIViewController`.


    ### Implementing Drag-and-Drop with UICollectionViewController


    The process begins with updating the `UICollectionViewController` to set the `installsStandardGestureForInteractiveMovement`
    property to `true`. Add this to `viewDidLoad` function:


    `self.installsStandardGestureForInteractiveMovement = true`'
