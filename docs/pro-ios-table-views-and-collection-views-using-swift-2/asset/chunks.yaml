    \    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
    \        // Dispose of any resources that can be recreated.\n    }\n}\n\nextension\
    \ ViewController {\n}\n```\n\nNow add the first new function in the extension,\
    \ shown in Listing [10-3](#A978-1-4842-1242-4_10_Chapter.html#FPar7).\n\n**Listing\
    \ 10-3. Creating Random Names**\n\n```swift\nfunc createRandomNameWithNonsenseData()\
    \ -> Name {\n    // Create sample data arrays\n    let namesArray = [\"Abigail\"\
    , \"Ada\", \"Adelaide\", \"Abel\", \"Algernon\", \"Anatole\",\n              \
    \        \"Barbara\", \"Bertha\", \"Brunhilda\", \"Barton\", \"Ben\", \"Boris\"\
    ,\n                      \"Calista\", \"Cassandra\", \"Constance\", \"Caspar\"\
    , \"Clive\", \"Corey\",\n                      \"Danica\", \"Dido\", \"Dora\"\
    , \"Darnell\", \"Dexter\", \"Dunstan\", \"Duncan\"]\n    let genderArray = [\"\
    Boy\", \"Girl\", \"Unisex\"]\n    let notesArray = [\"Prosperous and joyful\"\
    , \"A popular name in Victorian times.\",\n                      \"'Bright fair\
    \ one'. A term of endearment used by the Irish\",\n                      \"'Son\
    \ of the furrows; ploughman' One of the twelve apostles\",\n                 \
    \     \"One who is graceful and charming\",\n                      \"'Spear'.\
    \ A warrior who wielded her spear to the detriment of her enemies\"]\n    let\
    \ derivationArray = [\"Celtic\", \"Germanic\", \"Old English\", \"Latin\", \"\
    Greek\"]\n    let iconArray = [\"icon1.png\", \"icon2.png\", \"icon3.png\", \"\
    icon4.png\", \"icon5.png\"]\n\n    // Get counts of sample data arrays, to act\
    \ as seeds for the random numbers\n    let nameCount = UInt32(namesArray.count)\n\
    \    let genderCount = UInt32(genderArray.count)\n    let notesCount = UInt32(notesArray.count)\n\
    \    let derivationCount = UInt32(derivationArray.count)\n    let iconCount =\
    \ UInt32(iconArray.count)\n\n    // Create a Name struct\n    var thisName = Name()\n\
    \n    // Set some random facts\n    thisName.nameText = namesArray[Int(arc4random_uniform(nameCount))]\n\
    \    thisName.gender = genderArray[Int(arc4random_uniform(genderCount))]\n   \
    \ thisName.notes = notesArray[Int(arc4random_uniform(notesCount))]\n    thisName.derivation\
    \ = derivationArray[Int(arc4random_uniform(derivationCount))]\n    thisName.iconName\
    \ = iconArray[Int(arc4random_uniform(iconCount))]\n\n    return thisName\n}\n\
    ```\n\n**Note:** You don't need to use this data. I picked the values pretty much\
    \ at random. There's enough lorem ipsum in the world without me adding to it!\n\
    \nHaving gained the ability to create instances of `Name` filled with random data,\
    \ you can now store them in the `tableData` array.\n\nAdd a second function to\
    \ the `ViewController`'s extension, shown in Listing [10-4](#A978-1-4842-1242-4_10_Chapter.html#FPar9).\n\
    \n**Listing 10-4. Creating the Random Data**\n\n```swift\nfunc loadRandomNames()\
    \ -> [Name] {\n    var namesArray = [Name]()\n    for _ in 0...numberOfNames {\n\
    \        let thisName = createRandomNameWithNonsenseData()\n        namesArray.append(thisName)\n\
    \    }\n    return namesArray\n}\n```\n\nWith the two data generation functions\
    \ created, you can now use them to create the dummy data for the table. Update\
    \ the `viewDidLoad()` function, as shown in Listing [10-5](#A978-1-4842-1242-4_10_Chapter.html#FPar10).\n\
    \n**Listing 10-5. The updated `viewDidLoad()` Function**\n\n```swift\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    tableData = loadRandomNames()\n\
    }\n```"
