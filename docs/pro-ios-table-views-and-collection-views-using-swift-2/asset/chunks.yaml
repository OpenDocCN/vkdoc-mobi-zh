- fmt: "# Summary\n\nThis chapter has covered a lot of fairly heavy conceptual stuff,\
    \ but all of the concepts tie back into table and collection views in some way.\
    \ The data that is displayed by a `tableView` or `collectionView` is provided\
    \ by the `dataSource`, while the user’s interaction with the view is handled by\
    \ the `delegate`. Both of these are examples of the delegation design pattern,\
    \ while the division of labor between the `tableView` or `collectionView`, its\
    \ controllers, and the underlying data is the model-view-controller architecture\
    \ pattern in action.\n\nBoth the `dataSource` and `delegate` functions are defined\
    \ by their respective protocols: `UITableViewDataSource`, `UITableViewDelegate`,\
    \ `UICollectionViewDataSource`, and `UICollectionViewDelegate`. Building `tableViews`\
    \ and `collectionViews` is a process of implementing (at least) the required methods,\
    \ and often some of the optional ones as well.\n\nArmed with an understanding\
    \ of where the data comes from, and how the views handle interactions, you’re\
    \ ready to dive into the details and start the process of customization.\n\n#\
    \ 6. How the Table Cell Fits Together\n\nIn this chapter, you’re going to take\
    \ a detailed look at table cells and how they work. In order to be able to customize\
    \ them, it’s important to understand the anatomy of cells, and how they’re created\
    \ and reused.\n\nYou’ll see the following:\n\n- The internal structure of a table\
    \ cell\n- The standard cell types that come for free with `UITableView`\n- How\
    \ to create prototype cells\n- The configuration of default cell content\n- The\
    \ use of accessory views\n- How the cell creation and recycling process works\n\
    \nThis covers everything you need to know in order to create default-styled cells\
    \ and perform basic configuration of them. Configuring cells is often a case of\
    \ knowing when to intervene in the creation and reuse process. Later in Chapters\
    \ 7 and 8, you’ll build on this when you create customized cells.\n\n## Understanding\
    \ the Anatomy of a `UITableViewCell`\n\nThe first thing to bear in mind about\
    \ `UITableViewCell`s is that they are `UIView` objects. The `UITableViewCell`\
    \ class inherits from `UIView`, which means that the features of `UIView`s are\
    \ available to you in `UITableViewCell`s. Figure 6-1 shows the class hierarchy\
    \ of `UITableViewCell`.\n\nBecause `UIView` inherits in turn from `UIResponder`,\
    \ this also means that it’s possible to interact with cells by using gestures.\
    \ I’ll show you some of the effects that this enables in Chapter 9.\n\n![A978-1-4842-1242-4_6_Fig1_HTML.jpg](A978-1-4842-1242-4_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1.** The class hierarchy of `UITableViewCell`\n\n### Basic Structure\
    \ of the Cell\n\nThe vanilla cell has five component parts, shown in Figure 6-2.\n\
    \n![A978-1-4842-1242-4_6_Fig2_HTML.jpg](A978-1-4842-1242-4_6_Fig2_HTML.jpg)\n\n\
    **Figure 6-2.** The basic layout of a cell in normal mode\n\n- A frame and bounds,\
    \ which describe the cell’s location and size\n- The backgrounds, which you’ll\
    \ look at in the next section\n- The cell content\n- An optional accessory view\n\
    - An automatically placed editing control, which appears when the cell is in editing\
    \ mode\n\nThe content of the cell can be accessed en masse through the `contentView`\
    \ property, which is a `UIView`. You can add and remove subviews, and the `contentView`\
    \ will take care of moving things around to allow the editing control to fit.\n\
    \nWhen switched to editing mode, the cell’s `contentView` is reduced in width\
    \ by about 40 points, and an editing control is inserted at the left side, as\
    \ shown in Figure 6-3.\n\n![A978-1-4842-1242-4_6_Fig3_HTML.jpg](A978-1-4842-1242-4_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3.** The basic layout of a cell in editing mode\n\nThe editing control\
    \ can be either a green insertion control or a red deletion control.\n\n**Note:**\
    \ When designing custom cells that will be edited, it’s important to make sure\
    \ that the layout of the content view can cope with being automatically resized.\
    \ Chapter 8 covers this topic.\n\n### The Cell’s Background Views\n\nThe cell\
    \ has several background views, which are “stacked” along the Z-axis, as shown\
    \ in Figure 6-4.\n\n![A978-1-4842-1242-4_6_Fig4_HTML.jpg](A978-1-4842-1242-4_6_Fig4_HTML.jpg)\n\
    \n**Figure 6-4.** The background views\n\nOpaque content in upper views will obscure\
    \ the content of the lower views, and empty views are effectively invisible. The\
    \ two selection background views, `selectedBackgroundView` and `multipleSelectionBackgroundView`,\
    \ normally have an alpha property of `0`; this is toggled between `0` and `1`\
    \ in response to cell selection events.\n\nTo add a specific background view,\
    \ you first need to create it and then add it to the relevant cell property. For\
    \ example, this code snippet will create a cyan background:\n\n```\nlet backgroundView\
    \ = UIView(frame: cell.frame)\nbackgroundView.backgroundColor = UIColor.cyanColor()\n\
    cell.backgroundView = backgroundView\n```\n\nYou can also use this approach to\
    \ add images as backgrounds:\n\n```\nif let selectedImage = UIImage(named:\"selectedBg\"\
    ) {\n    cell.selectedBackgroundView = UIImageView(image: selectedImage)\n}\n\
    ```\n\nThe image will be toggled on and off as the cell is selected and deselected.\n\
    \nBecause the background views are arranged along the Z-axis, it’s very important\
    \ that you only add custom controls to the cell’s `contentView`. Adding them to\
    \ the cell itself will give inconsistent results if they become obscured by one\
    \ of the background views. There may also be layout problems caused by the cell’s\
    \ `contentView` being resized to show in-cell editing controls when the table\
    \ goes into editing mode.\n\n**Caution:** Despite the power of the graphics processor\
    \ in iOS devices, compositing the various layers in cells does come with some\
    \ overhead. This is especially the case when dealing with layers with transparency\
    \ such as background images. Basically, the more areas of transparency there are\
    \ in layers, the slower the compositing will be.\n\nTo make your table views as\
    \ performant as possible, it’s important to keep transparency to a minimum wherever\
    \ you can. This is covered in more detail in Chapter 8.\n\n### Content and Accessory\
    \ Views\n\nContent and accessory views are instances of `UIView`, which means\
    \ that they have all the properties and methods of a “normal” `UIView`. You’ll\
    \ be exploiting these properties and methods when you go on to create customized\
    \ cells.\n\n## Designing Prototype Cells\n\nBefore cells can be created by the\
    \ table view’s datasource, you need to build prototypes, which you can think of\
    \ as being the templates from which new cells are created.\n\nIn simple situations,\
    \ it may be enough to use one or more of the four standard cell types that `UITableView`\
    \ provides for free. As your app interface becomes more sophisticated, the standard\
    \ types may not be sufficient, and you’ll want to create custom cells. The custom\
    \ cell process is covered in detail in Chapter 8.\n\nEven if you’re only going\
    \ to use standard cells, it’s still important to understand the options for creating\
    \ their prototypes. You have three options:\n\n- Creating cells visually in separate\
    \ XIB files, one for each cell type\n- Laying out cells visually in Storyboards\n\
    - In code, by creating instances of standard cell types and updating the in-cell\
    \ controls\n\nAlthough different, the three approaches all have the same end result,\
    \ so which you decide to use is a largely a matter of personal preference. We’ll\
    \ look at each one in turn."
  raw: '## Summary


    This chapter has covered a lot of fairly heavy conceptual stuff, but all of the
    concepts tie back into table and collection views in some way. The data that is
    displayed by a `tableView` or `collectionView` is provided by the `dataSource`,
    while the user’s interaction with the view is handled by the `delegate`. Both
    of these are examples of the delegation design pattern, while the division of
    labor between the `tableView` or `collectionView`, its controllers, and the underlying
    data is the model-view-controller architecture pattern in action.


    Both the `dataSource` and `delegate` functions are defined by their respective
    protocols: `UITableViewDataSource`, `UITableViewDelegate, UICollectionViewDataSource`,
    and `UICollectionViewDelegate`. Building `tableViews` and `collectionViews` is
    a process of implementing (at least) the required methods, and often some of the
    optional ones as well.


    Armed with an understanding of where the data comes from, and how the views handle
    interactions, you’re ready to dive into the details and start the process of customization.


    # 6. How the Table Cell Fits Together


    In this chapter, you’re going to take a detailed look at table cells and how they
    work. In order to be able to customize them, it’s important to understand the
    anatomy of cells, and how they’re created and reused.


    You’ll see the following:


    *   The internal structure of a table cell

    *   The standard cell types that come for free with `UITableView`

    *   How to create prototype cells

    *   The configuration of default cell content

    *   The use of accessory views

    *   How the cell creation and recycling process works


    This covers everything you need to know in order to create default-styled cells
    and perform basic configuration of them. Configuring cells is often a case of
    knowing when to intervene in the creation and reuse process. Later in [Chapters
    7](#A978-1-4842-1242-4_7_Chapter.html) and [8](#A978-1-4842-1242-4_8_Chapter.html),
    you’ll build on this when you create customized cells.


    ## Understanding the Anatomy of a UITableViewCell


    The first thing to bear in mind about `UITableViewCell`s is that they are `UIView`
    objects. The `UITableViewCell` class inherits from `UIView`, which means that
    the features of `UIView`s are available to you in `UITableViewCell`s. Figure [6-1](#A978-1-4842-1242-4_6_Chapter.html#Fig1)
    shows the class hierarchy of `UITableViewCell`.


    Because `UIView` inherits in turn from `UIResponder`, this also means that it’s
    possible to interact with cells by using gestures. I’ll show you some of the effects
    that this enables in [Chapter 9](#A978-1-4842-1242-4_9_Chapter.html).


    ![A978-1-4842-1242-4_6_Fig1_HTML.jpg](A978-1-4842-1242-4_6_Fig1_HTML.jpg)


    Figure 6-1.


    The class hierarchy of UITableViewCell


    ### Basic Structure of the Cell


    The vanilla cell has five component parts, shown in Figure [6-2](#A978-1-4842-1242-4_6_Chapter.html#Fig2).


    ![A978-1-4842-1242-4_6_Fig2_HTML.jpg](A978-1-4842-1242-4_6_Fig2_HTML.jpg)


    Figure 6-2.


    The basic layout of a cell in normal mode


    *   A frame and bounds, which describe the cell’s location and size

    *   The backgrounds, which you’ll look at in the next section

    *   The cell content

    *   An optional accessory view

    *   An automatically placed editing control, which appears when the cell is in
    editing mode


    The content of the cell can be accessed en masse through the `contentView` property,
    which is a `UIView`. You can add and remove subviews, and the `contentView` will
    take care of moving things around to allow the editing control to fit.


    When switched to editing mode, the cell’s `contentView` is reduced in width by
    about 40 points, and an editing control is inserted at the left side, as shown
    in Figure [6-3](#A978-1-4842-1242-4_6_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_6_Fig3_HTML.jpg](A978-1-4842-1242-4_6_Fig3_HTML.jpg)


    Figure 6-3.


    The basic layout of a cell in editing mode


    The editing control can be either a green insertion control or a red deletion
    control.


    Note


    When designing custom cells that will be edited, it’s important to make sure that
    the layout of the content view can cope with being automatically resized. [Chapter
    8](#A978-1-4842-1242-4_8_Chapter.html) covers this topic.


    ### The Cell’s Background Views


    The cell has several background views, which are “stacked” along the Z-axis, as
    shown in Figure [6-4](#A978-1-4842-1242-4_6_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_6_Fig4_HTML.jpg](A978-1-4842-1242-4_6_Fig4_HTML.jpg)


    Figure 6-4.


    The background views


    Opaque content in upper views will obscure the content of the lower views, and
    empty views are effectively invisible. The two selection background views, `selectedBackgroundView`
    and `multipleSelectionBackgroundView`, normally have an alpha property of `0`;
    this is toggled between `0` and `1` in response to cell selection events.


    To add a specific background view, you first need to create it and then add it
    to the relevant cell property. For example, this code snippet will create a cyan
    background:


    `let backgroundView = UIView(frame: cell.frame)`


    `backgroundView.backgroundColor = UIColor.cyanColor()`


    `cell.backgroundView = backgroundView`


    You can also use this approach to add images as backgrounds:


    `if let selectedIimage = UIImage(named:"selectedBg") {`


        `cell.selectedBackgroundView = UIImageView(image: selectedImage)`


    `}`


    The image will be toggled on and off as the cell is selected and deselected.


    Because the background views are arranged along the Z-axis, it’s very important
    that you only add custom controls to the cell’s `contentView`. Adding them to
    the cell itself will give inconsistent results if they become obscured by one
    of the background views. There may also be layout problems caused by the cell’s
    `contentView` being resized to show in-cell editing controls when the table goes
    into editing mode.


    Caution


    Despite the power of the graphics processor in iOS devices, compositing the various
    layers in cells does come with some overhead. This is especially the case when
    dealing with layers with transparency such as background images. Basically, the
    more areas of transparency there are in layers, the slower the compositing will
    be.


    To make your table views as performant as possible, it’s important to keep transparency
    to a minimum wherever you can. This is covered in more detail in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html).


    ### Content and Accessory Views


    Content and accessory views are instances of `UIView`, which means that they have
    all the properties and methods of a “normal” `UIView`. You’ll be exploiting these
    properties and methods when you go on to create customized cells.


    ## Designing Prototype Cells


    Before cells can be created by the table view’s datasource, you need to build
    prototypes, which you can think of as being the templates from which new cells
    are created.


    In simple situations, it may be enough to use one or more of the four standard
    cell types that `UITableView` provides for free. As your app interface becomes
    more sophisticated, the standard types may not be sufficient, and you’ll want
    to create custom cells. The custom cell process is covered in detail in [Chapter
    8](#A978-1-4842-1242-4_8_Chapter.html).


    Even if you’re only going to use standard cells, it’s still important to understand
    the options for creating their prototypes. You have three options:


    *   Creating cells visually in separate XIB files, one for each cell type

    *   Laying out cells visually in Storyboards

    *   In code, by creating instances of standard cell types and updating the in-cell
    controls


    Although different, the three approaches all have the same end result, so which
    you decide to use is a largely a matter of personal preference. We’ll look at
    each one in turn.'
  trans: "\n# 总结\n\n本章涵盖了大量相当抽象的概念性内容，但所有概念都以某种方式与表格和集合视图相关联。由`tableView`或`collectionView`显示的数据由`dataSource`提供，而用户与视图的交互则由`delegate`处理。这两者都是委托设计模式的例子，而`tableView`或`collectionView`、其控制器以及底层数据之间的分工，正是模型-视图-控制器架构模式的实际体现。\n\
    \n`dataSource`和`delegate`函数均由各自的协议定义：`UITableViewDataSource`、`UITableViewDelegate`、`UICollectionViewDataSource`和`UICollectionViewDelegate`。构建`tableViews`和`collectionViews`的过程，就是实现（至少是）必需方法，并且通常还要实现一些可选方法的过程。\n\
    \n了解了数据的来源以及视图如何处理交互，你就可以深入细节，开始定制化的过程了。\n\n# 6. 表格单元格的构成\n\n在本章中，你将详细研究表格单元格及其工作原理。为了能够对它们进行自定义，理解单元格的结构以及它们是如何被创建和复用的至关重要。\n\
    \n你将看到以下内容：\n\n- 表格单元格的内部结构\n- `UITableView`免费提供的标准单元格类型\n- 如何创建原型单元格\n- 默认单元格内容的配置\n\
    - 辅助视图的使用\n- 单元格创建和回收的工作机制\n\n这涵盖了创建默认样式单元格并对其进行基本配置所需了解的所有内容。配置单元格通常涉及知道何时干预创建和复用过程。稍后在第\
    \ 7 章和第 8 章中，你将在创建自定义单元格时以此为基础进行构建。\n\n## 理解`UITableViewCell`的结构\n\n关于`UITableViewCell`，首先需要记住的是它们是`UIView`对象。`UITableViewCell`类继承自`UIView`，这意味着`UIView`的功能在`UITableViewCell`中同样可用。图\
    \ 6-1 显示了`UITableViewCell`的类层次结构。\n\n因为`UIView`又继承自`UIResponder，所以这也意味着可以通过手势与单元格进行交互。在第\
    \ 9 章中，我将向你展示由此带来的一些效果。\n\n![A978-1-4842-1242-4_6_Fig1_HTML.jpg](img/A978-1-4842-1242-4_6_Fig1_HTML.jpg)\n\
    \n**图 6-1.** `UITableViewCell`的类层次结构\n\n### 单元格的基本结构\n\n标准的单元格由五个组成部分构成，如图 6-2\
    \ 所示。\n\n![A978-1-4842-1242-4_6_Fig2_HTML.jpg](img/A978-1-4842-1242-4_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** 普通模式下单元格的基本布局\n\n- 描述单元格位置和大小的框架和边界\n- 背景，将在下一节中介绍\n- 单元格内容\n- 可选的辅助视图\n\
    - 一个自动放置的编辑控件，当单元格处于编辑模式时出现\n\n单元格的内容可以通过`contentView`属性整体访问，该属性是一个`UIView`。你可以添加和移除子视图，`contentView`会自动调整布局以便为编辑控件腾出空间。\n\
    \n当切换到编辑模式时，单元格的`contentView`宽度会减少约 40 点，并且在左侧插入一个编辑控件，如图 6-3 所示。\n\n![A978-1-4842-1242-4_6_Fig3_HTML.jpg](img/A978-1-4842-1242-4_6_Fig3_HTML.jpg)\n\
    \n**图 6-3.** 编辑模式下单元格的基本布局\n\n编辑控件可以是绿色的插入控件或红色的删除控件。\n\n**注意：** 在设计将要被编辑的自定义单元格时，确保内容视图的布局能够应对自动调整大小非常重要。第\
    \ 8 章将涵盖此主题。\n\n### 单元格的背景视图\n\n单元格有多个背景视图，它们沿着 Z 轴“堆叠”，如图 6-4 所示。\n\n![A978-1-4842-1242-4_6_Fig4_HTML.jpg](img/A978-1-4842-1242-4_6_Fig4_HTML.jpg)\n\
    \n**图 6-4.** 背景视图\n\n上层视图中的不透明内容会遮挡下层视图的内容，而空视图实际上是不可见的。两个选择背景视图，`selectedBackgroundView`和`multipleSelectionBackgroundView`，通常其\
    \ alpha 属性为`0`；当单元格被选中或取消选中时，该值会在`0`和`1`之间切换。\n\n要添加特定的背景视图，你首先需要创建它，然后将其添加到相应的单元格属性中。例如，以下代码片段将创建一个青色背景：\n\
    \n```\nlet backgroundView = UIView(frame: cell.frame)\nbackgroundView.backgroundColor\
    \ = UIColor.cyanColor()\ncell.backgroundView = backgroundView\n```\n\n你也可以使用这种方法添加图像作为背景：\n\
    \n```\nif let selectedImage = UIImage(named:\"selectedBg\") {\n    cell.selectedBackgroundView\
    \ = UIImageView(image: selectedImage)\n}\n```\n\n当单元格被选中和取消选中时，该图像会相应地显示或隐藏。\n\
    \n由于背景视图沿 Z 轴排列，因此务必将自定义控件仅添加到单元格的`contentView`中。如果将其直接添加到单元格本身，它们可能会被某个背景视图遮挡，从而导致结果不一致。此外，当表格进入编辑模式时，单元格的`contentView`可能会因显示单元格内编辑控件而调整大小，这也可能引起布局问题。\n\
    \n**警告：** 尽管 iOS 设备的图形处理器功能强大，但合成单元格中的各个图层仍会带来一些开销。当处理具有透明度的图层（例如背景图像）时尤其如此。基本上，图层中的透明区域越多，合成速度就越慢。\n\
    \n为了使表格视图尽可能高效，务必在可能的情况下尽量减少透明度。这一点将在第 8 章中更详细地介绍。\n\n### 内容和辅助视图\n\n内容和辅助视图是`UIView`的实例，这意味着它们拥有“普通”`UIView`的所有属性和方法。当你继续创建自定义单元格时，将会利用这些属性和方法。\n\
    \n## 设计原型单元格\n\n在表格视图的数据源能够创建单元格之前，你需要构建原型。你可以将这些原型视为创建新单元格的模板。\n\n在简单的情况下，使用`UITableView`免费提供的四种标准单元格类型中的一种或几种可能就足够了。随着应用界面的日益复杂，标准类型可能不够用，你需要创建自定义单元格。自定义单元格的流程将在第\
    \ 8 章中详细介绍。\n\n即使你只打算使用标准单元格，理解创建其原型的选项仍然很重要。你有三种选择：\n\n- 在单独的 XIB 文件中直观地创建单元格，每种单元格类型对应一个文件\n\
    - 在 Storyboard 中直观地布局单元格\n- 在代码中，通过创建标准单元格类型的实例并更新单元格内控件\n\n这三种方法虽然不同，但最终结果相同，因此选择哪种方法很大程度上取决于个人偏好。我们将逐一介绍每种方法。"
- fmt: "### The Code for This Chapter\n\nThe sample app for this chapter is set up\
    \ with a tabbed interface, each tab demonstrating a table using one of the different\
    \ techniques for cell creation. Each view controller has a basic set of data wired\
    \ up ready, so you can use them as a starting point for your own customization.\n\
    \n### Creating Prototype Cells in XIB Files\n\nThis approach relies on creating\
    \ the prototype cell in a standalone `XIB` file, then associating the `XIB` with\
    \ a cell identifier as part of the table view configuration process.\n\n**Note:**\
    \ The table created using prototype cells in XIB files is displayed in the XIB\
    \ table tab in the sample app. The view controller for this tab is `XibTableViewController`.\
    \ All the associated source and XIB files can be found in the `Xib-based table\
    \ cells` folder in Xcode.\n\nAs the table view is set up, the `XIB` will be loaded\
    \ and “inflated” to create prototype instances, which the datasource can then\
    \ use by accessing the data outlets and setting these with the values from the\
    \ cell’s model.\n\nThe process has five steps:\n\n- Creating the `XIB` file\n\
    - Adding the cell object into the `XIB`\n- Laying out the prototype cell\n- Registering\
    \ the `XIB` with a cell identifier as the table view is configured\n- Creating\
    \ and configuring instances of the cell in the datasource methods\n\nYou can create\
    \ tables with multiple types of cells using this technique, simply by repeating\
    \ the process for each different kind of cell and giving it a different identifier.\
    \ Then in the `tableView`’s `dataSource` you can dequeue and configure the relevant\
    \ cell type based on the data in your table’s model.\n\n#### Creating the XIB\
    \ File\n\nCreating a new `XIB` file isn’t complicated: select the File ➤ New ➤\
    \ File menu option and then the Empty item from the User Interface section, as\
    \ shown in Figure 6-5.\n\n![A978-1-4842-1242-4_6_Fig5_HTML.jpg](A978-1-4842-1242-4_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5. Creating a new XIB file\n\nGive the file a name (I’m using `XibCell.xib`),\
    \ and then click the Create button.\n\n#### Adding the Cell Object to the XIB\n\
    \nWith an empty `XIB` file, you’re now ready to add the table view cell. From\
    \ the `Object Browser`, select the `Table View Cell` object, as shown in Figure\
    \ 6-6, and drag it out into the canvas.\n\n![A978-1-4842-1242-4_6_Fig6_HTML.jpg](A978-1-4842-1242-4_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6. The `Table View Cell` object in the `Object Browser`\n\nYou’ve now\
    \ added an empty custom-style `UITableViewCell` to the `XIB` file, which will\
    \ look like Figure 6-7.\n\n![A978-1-4842-1242-4_6_Fig7_HTML.jpg](A978-1-4842-1242-4_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7. The new cell in the Canvas\n\n#### Laying Out the Prototype Cell\n\
    \nAt this point, you’re ready to configure its layout. You’ll look at creating\
    \ customizing cells in detail in Chapter 7. If you only need one of the four standard\
    \ cell types, you can quickly change this by selecting it from the Style drop-down\
    \ in the Attributes inspector, as shown in Figure 6-8.\n\n![A978-1-4842-1242-4_6_Fig8_HTML.jpg](A978-1-4842-1242-4_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8. Selecting the cell’s style\n\nThis will convert the cell into one\
    \ of the four standard types. There are more details about how to access the outlets\
    \ in each one of the standard styles later in this chapter. For now, select the\
    \ `Basic` type so that you get a cell with a built-in `Title` label.\n\nYou’ll\
    \ also need to set the cell’s `Identifier`, which you’ll use in a moment to identify\
    \ the cell to the table. This is an arbitrary `String` value, but it’s important!\
    \ Set it to something descriptive because it will be the table view’s link between\
    \ the XIB and the cell object, as you’ll see next. In the sample project, I’ve\
    \ set it to `MyXibCell`, and created a property for it:\n\n```\nlet kCellIdentifier\
    \ = \"MyXibCell\"\n```\n\n#### Telling the Table View About the XIB\n\nWith the\
    \ cell created, you need to inform the table view that it’s going to load its\
    \ prototype cells from a XIB file. This has to be done before the datasource makes\
    \ any attempt to dequeue a cell from the table, so a good place to set this up\
    \ is in the view controller’s `viewDidLoad` method.\n\nAdd the following to the\
    \ `XibTableViewController`'s `viewDidLoad:` method:\n\n```\ntableView.registerNib(UINib(nibName:\
    \ \"XibCell\", bundle: nil), forCellReuseIdentifier: \"MyXibCell\")\n```\n\nHere,\
    \ you’re informing the table view that it should use the contents of the `XibCell`\
    \ nib file for cells that are identified with `MyXibCell`. The table view will\
    \ expect that the top-level object in the XIB is an instance of `UITableViewCell`\
    \ or a `UITableViewCell` subclass.\n\nIf you have several cell types, you can\
    \ associate them with the table view by repeating this process, remembering to\
    \ provide the appropriate (and unique) cell identifier each time.\n\n#### Creating\
    \ and Configuring Cells\n\nWith the cell type(s) registered with the table view,\
    \ it’s time to update the `cellForRowAtIndexPath:` method to dequeue and configure\
    \ the cells.\n\nThis doesn’t differ significantly from the process you’ve seen\
    \ in previous chapters: dequeue the cell with the correct identifier, configure\
    \ it, and return it to the table view.\n\nAssuming you’re using your `XibCell`\
    \ XIB, which is identified by the `MyXibCell` identifier, the code will look something\
    \ like Listing 6-1.\n\n**Listing 6-1.** The `cellForRowAtIndexPath:` Method\n\n\
    ```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    MyCellIdentifier\", forIndexPath: indexPath)\n    // Configure the cell...\n \
    \   cell.textLabel!.text = tableData[indexPath.row]\n    return cell\n}\n```\n\
    \nIf you added a standard cell type to your XIB, then it will be dequeued with\
    \ all the controls ready for use, and you can configure it as normal in the `cellForRowAtIndexPath:`\
    \ method. Configuring custom cells is covered in detail in Chapter 8.\n\n### Creating\
    \ Prototype Cells in Storyboards\n\nLaying out the design of your cells can be\
    \ easier when it’s done visually. In the section above, you looked at the process\
    \ of doing this in a standalone XIB file, but if you prefer, you can do exactly\
    \ the same in a Storyboard instead.\n\nWhen you look at a `UITableView` in a Storyboard,\
    \ you’ll see that it comes with an empty section for prototype content, as shown\
    \ in Figure 6-9.\n\n![A978-1-4842-1242-4_6_Fig9_HTML.jpg](A978-1-4842-1242-4_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9. The Prototype Content section\n\nAs the name suggests, this is where\
    \ you can create prototype cells that are then instantiated and dequeued by the\
    \ table’s `dataSource`.\n\nYou can use this technique to create one or more prototype\
    \ cells. The main limitation is that if you have more cells than will fit in the\
    \ Storyboard’s `Table View`, they can become a bit unwieldy to manage. In this\
    \ situation, you may be better off using separate XIB files."
  raw: '### The Code for This Chapter


    The sample app for this chapter is set up with a tabbed interface, each tab demonstrating
    a table using one of the different techniques for cell creation. Each view controller
    has a basic set of data wired up ready, so you can use them as a starting point
    for your own customization.


    ### Creating Prototype Cells in XIB Files


    This approach relies on creating the prototype cell in a standalone `XIB` file,
    then associating the `XIB` with a cell identifier as part of the table view configuration
    process.


    Note


    The table created using prototype cells in XIB files is displayed in the XIB table
    tab in the sample app. The view controller for this tab is `XibTableViewController`.
    All the associated source and XIB files can be found in the `Xib-based table cells`
    folder in Xcode.


    As the table view is set up, the `XIB` will be loaded and “inflated” to create
    prototype instances, which the datasource can then use by accessing the data outlets
    and setting these with the values from the cell’s model.


    The process has five steps:


    *   Creating the `XIB` file

    *   Adding the cell object into the `XIB`

    *   Laying out the prototype cell

    *   Registering the `XIB` with a cell identifier as the table view is configured

    *   Creating and configuring instances of the cell in the datasource methods


    You can create tables with multiple types of cells using this technique, simply
    by repeating the process for each different kind of cell and giving it a different
    identifier. Then in the `tableView`’s `dataSource` you can dequeue and configure
    the relevant cell type based on the data in your table’s model.


    #### Creating the XIB File


    Creating a new `XIB` file isn’t complicated: select the File ➤ New ➤ File menu
    option and then the Empty item from the User Interface section, as shown in Figure
    [6-5](#A978-1-4842-1242-4_6_Chapter.html#Fig5).


    ![A978-1-4842-1242-4_6_Fig5_HTML.jpg](A978-1-4842-1242-4_6_Fig5_HTML.jpg)


    Figure 6-5.


    Creating a new XIB file


    Give the file a name (I’m using `XibCell.xib`), and then click the Create button.


    #### Adding the Cell Object to the XIB


    With an empty `XIB` file, you’re now ready to add the table view cell. From the
    `Object Browser`, select the `Table View Cell` object, as shown in Figure [6-6](#A978-1-4842-1242-4_6_Chapter.html#Fig6),
    and drag it out into the canvas.


    ![A978-1-4842-1242-4_6_Fig6_HTML.jpg](A978-1-4842-1242-4_6_Fig6_HTML.jpg)


    Figure 6-6.


    The Table View Cell object in the Object Browser


    You’ve now added an empty custom-style `UITableViewCell` to the `XIB` file, which
    will look like Figure [6-7](#A978-1-4842-1242-4_6_Chapter.html#Fig7).


    ![A978-1-4842-1242-4_6_Fig7_HTML.jpg](A978-1-4842-1242-4_6_Fig7_HTML.jpg)


    Figure 6-7.


    The new cell in the Canvas


    #### Laying Out the Prototype Cell


    At this point, you’re ready to configure its layout. You’ll look at creating customizing
    cells in detail in [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html). If you only
    need one of the four standard cell types, you can quickly change this by selecting
    it from the Style drop-down in the Attributes inspector, as shown in Figure [6-8](#A978-1-4842-1242-4_6_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_6_Fig8_HTML.jpg](A978-1-4842-1242-4_6_Fig8_HTML.jpg)


    Figure 6-8.


    Selecting the cell’s style


    This will convert the cell into one of the four standard types. There are more
    details about how to access the outlets in each one of the standard styles later
    in this chapter. For now, select the `Basic` type so that you get a cell with
    a built-in `Title` label.


    You’ll also need to set the cell’s `Identifier`, which you’ll use in a moment
    to identify the cell to the table. This is an arbitrary `String` value, but it’s
    important!


    Set it to something descriptive because it will be the table view’s link between
    the XIB and the cell object, as you’ll see next. In the sample project, I’ve set
    it to `MyXibCell`, and created a property for it:


    `let kCellIdentifier = "MyXibCell"`


    #### Telling the Table View About the XIB


    With the cell created, you need to inform the table view that it’s going to load
    its prototype cells from a XIB file. This has to be done before the datasource
    makes any attempt to dequeue a cell from the table, so a good place to set this
    up is in the view controller’s `viewDidLoad` method.


    Add the following to the `XibTableViewController’s viewDidLoad`: method:


    `tableView.registerNib(UINib(nibName: "XibCell", bundle: nil), forCellReuseIdentifier:
    ➤`


    `"MyXibCell")`


    Here, you’re informing the table view that it should use the contents of the `XibCell`
    nib file for cells that are identified with `MyXibCell`. The table view will expect
    that the top-level object in the XIB is an instance of `UITableViewCell` or a
    `UITableViewCell` subclass.


    If you have several cell types, you can associate them with the table view by
    repeating this process, remembering to provide the appropriate (and unique) cell
    identifier each time.


    #### Creating and Configuring Cells


    With the cell type(s) registered with the table view, it’s time to update the
    `cellForRowAtIndexPath:` method to dequeue and configure the cells.


    This doesn’t differ significantly from the process you’ve seen in previous chapters:
    dequeue the cell with the correct identifier, configure it, and return it to the
    table view.


    Assuming you’re using your `XibCell` XIB, which is identified by the `MyXibCell`
    identifier, the code will look something like Listing [6-1](#A978-1-4842-1242-4_6_Chapter.html#FPar4).


    Listing 6-1. The cellForRowAtIndexPath: Method


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("MyCellIdentifier",
    ➤`


      `forIndexPath: indexPath)`


        `// Configure the cell...`


        `cell.textLabel!.text = tableData[indexPath.row]`


        `return cell`


    `}`


    If you added a standard cell type to your XIB, then it will be dequeued with all
    the controls ready for use, and you can configure it as normal in the `cellForRowAtIndexPath:`
    method. Configuring custom cells is covered in detail in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html).


    ### Creating Prototype Cells in Storyboards


    Laying out the design of your cells can be easier when it’s done visually. In
    the section above, you looked at the process of doing this in a standalone XIB
    file, but if you prefer, you can do exactly the same in a Storyboard instead.


    When you look at a `UITableView` in a Storyboard, you’ll see that it comes with
    an empty section for prototype content, as shown in Figure [6-9](#A978-1-4842-1242-4_6_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_6_Fig9_HTML.jpg](A978-1-4842-1242-4_6_Fig9_HTML.jpg)


    Figure 6-9.


    The Prototype Content section


    As the name suggests, this is where you can create prototype cells that are then
    instantiated and dequeued by the table’s `dataSource`.


    You can use this technique to create one or more prototype cells. The main limitation
    is that if you have more cells than will fit in the Storyboard’s `Table View`,
    they can become a bit unwieldy to manage. In this situation, you may be better
    off using separate XIB files.'
  trans: "\n### 本章代码\n\n本章示例应用采用标签式界面布局，每个标签分别展示一种不同的单元格创建技术所实现的表格。每个视图控制器都已预先接入基础数据集，方便您将其作为自定义开发的起点。\n\
    \n### 在 XIB 文件中创建原型单元格\n\n此方法需在独立的 `XIB` 文件中创建原型单元格，然后在配置表格视图时，将 `XIB` 文件与一个单元格标识符关联起来。\n\
    \n**注意：** 使用 XIB 文件创建原型单元格的表格，会在示例应用的“XIB 表格”标签页中显示。该标签页对应的视图控制器为 `XibTableViewController`。所有相关的源文件和\
    \ XIB 文件均可在 Xcode 的 `基于 XIB 的表格单元格` 文件夹中找到。\n\n当表格视图被设置时，`XIB` 文件会被加载并“初始化”以创建原型实例。数据源随后可通过访问这些实例的数据接口，并使用单元格模型中的值进行设置。\n\
    \n整个过程包含五个步骤：\n\n-   创建 `XIB` 文件\n-   将单元格对象添加到 `XIB` 文件中\n-   布局原型单元格\n-   在配置表格视图时，将\
    \ `XIB` 文件注册为一个单元格标识符\n-   在数据源方法中创建并配置单元格实例\n\n使用此技术，您可以创建包含多种类型单元格的表格，只需为每种不同单元格重复上述流程，并赋予其不同的标识符即可。然后，在\
    \ `tableView` 的 `dataSource` 中，您可以根据表格模型中的数据，出列并配置相应的单元格类型。\n\n#### 创建 XIB 文件\n\
    \n创建一个新的 `XIB` 文件并不复杂：选择 **文件** ➤ **新建** ➤ **文件** 菜单项，然后从“用户界面”部分选择“Empty”选项，如图\
    \ 6-5 所示。\n\n![A978-1-4842-1242-4_6_Fig5_HTML.jpg](img/A978-1-4842-1242-4_6_Fig5_HTML.jpg)\n\
    \n图 6-5. 创建新的 XIB 文件\n\n为文件命名（此处命名为 `XibCell.xib`），然后点击“创建”按钮。\n\n#### 将单元格对象添加到\
    \ XIB 文件中\n\n有了一个空的 `XIB` 文件后，您现在就可以添加表格视图单元格了。从“对象浏览器”中选择 `Table View Cell` 对象，如图\
    \ 6-6 所示，并将其拖拽到画布中。\n\n![A978-1-4842-1242-4_6_Fig6_HTML.jpg](img/A978-1-4842-1242-4_6_Fig6_HTML.jpg)\n\
    \n图 6-6. `Object Browser` 中的 `Table View Cell` 对象\n\n现在，您已经将一个空的定制样式 `UITableViewCell`\
    \ 添加到了 `XIB` 文件中，它看起来会像图 6-7 所示。\n\n![A978-1-4842-1242-4_6_Fig7_HTML.jpg](img/A978-1-4842-1242-4_6_Fig7_HTML.jpg)\n\
    \n图 6-7. 画布中的新单元格\n\n#### 布局原型单元格\n\n至此，您可以开始配置其布局了。关于创建定制单元格的详细信息，将在第 7 章中讲解。如果您只需要四种标准单元格类型之一，可以通过在“属性检查器”的“样式”下拉菜单中选择来快速切换，如图\
    \ 6-8 所示。\n\n![A978-1-4842-1242-4_6_Fig8_HTML.jpg](img/A978-1-4842-1242-4_6_Fig8_HTML.jpg)\n\
    \n图 6-8. 选择单元格样式\n\n这将把单元格转换为四种标准类型之一。关于如何访问每种标准样式中数据接口的更多细节，将在本章后续部分介绍。现在，请选择\
    \ `Basic` 类型，这样您会得到一个包含内置 `Title` 标签的单元格。\n\n您还需要设置单元格的 `Identifier`，稍后将用它来向表格标识该单元格。这是一个任意的\
    \ `String` 值，但很重要！请将其设置为一个描述性的值，因为它将是表格视图连接 XIB 文件和单元格对象的桥梁，您将在下面看到这一点。在示例项目中，我将其设置为\
    \ `MyXibCell`，并创建了一个属性：\n\n```\nlet kCellIdentifier = \"MyXibCell\"\n```\n\n####\
    \ 告知表格视图有关 XIB 的信息\n\n单元格创建完成后，您需要通知表格视图，它将从一个 XIB 文件中加载其原型单元格。这必须在数据源尝试从表格中出列单元格之前完成，因此，设置此信息的一个好位置是在视图控制器的\
    \ `viewDidLoad` 方法中。\n\n将以下代码添加到 `XibTableViewController` 的 `viewDidLoad:` 方法中：\n\
    \n```\ntableView.registerNib(UINib(nibName: \"XibCell\", bundle: nil), forCellReuseIdentifier:\
    \ \"MyXibCell\")\n```\n\n这里，您是在通知表格视图，对于标识符为 `MyXibCell` 的单元格，应使用 `XibCell` nib\
    \ 文件的内容。表格视图将期望 XIB 文件中的顶层对象是 `UITableViewCell` 或 `UITableViewCell` 的子类实例。\n\n\
    如果您有多个单元格类型，可以通过重复此过程将它们与表格视图关联起来，每次记得提供适当（且唯一）的单元格标识符。\n\n#### 创建并配置单元格\n\n在将单元格类型注册到表格视图后，接下来需要更新\
    \ `cellForRowAtIndexPath:` 方法，以出列并配置这些单元格。\n\n这与您在前几章中看到的过程没有显著区别：使用正确的标识符出列单元格，配置它，然后将其返回给表格视图。\n\
    \n假设您正在使用由 `MyXibCell` 标识符标识的 `XibCell` XIB 文件，代码将类似于代码清单 6-1。\n\n**代码清单 6-1.**\
    \ `cellForRowAtIndexPath:` 方法\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    MyCellIdentifier\", forIndexPath: indexPath)\n    // 配置单元格...\n    cell.textLabel!.text\
    \ = tableData[indexPath.row]\n    return cell\n}\n```\n\n如果您在 XIB 中添加了标准单元格类型，那么出列时所有控件都已就绪，您可以在\
    \ `cellForRowAtIndexPath:` 方法中像往常一样进行配置。配置定制单元格的详细信息将在第 8 章中介绍。\n\n### 在故事板中创建原型单元格\n\
    \n通过可视化方式布局单元格的设计会更加容易。在上一节中，您了解了在独立 XIB 文件中进行此操作的过程，但如果您愿意，也可以在故事板中完成完全相同的操作。\n\
    \n当您在故事板中查看 `UITableView` 时，您会看到它自带一个用于原型内容的空区域，如图 6-9 所示。\n\n![A978-1-4842-1242-4_6_Fig9_HTML.jpg](img/A978-1-4842-1242-4_6_Fig9_HTML.jpg)\n\
    \n图 6-9. 原型内容区域\n\n正如其名，您可以在此区域创建原型单元格，随后由表格的 `dataSource` 进行实例化和出列。\n\n您可以使用此技术创建一个或多个原型单元格。主要的限制是，如果您拥有的单元格数量超过了故事板\
    \ `Table View` 所能容纳的限度，管理起来可能会变得有些笨拙。在这种情况下，使用独立的 XIB 文件可能是更好的选择。\n"
- fmt: "### Creating Prototype Cells\n\nTo add a prototype cell, select the `Table\
    \ View` in the Storyboard, then switch to the Attributes Inspector, shown in Figure\
    \ [6-10](#A978-1-4842-1242-4_6_Chapter.html#Fig10). In the top section, you’ll\
    \ see a drop-down that allows you to switch between dynamic prototypes or static\
    \ cells (creating static table views is covered in [Chapter 13](#A978-1-4842-1242-4_13_Chapter.html)).\n\
    \n![A978-1-4842-1242-4_6_Fig10_HTML.jpg](A978-1-4842-1242-4_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. Selecting the number of dynamic prototypes\n\nBelow this is the\
    \ number of prototype cells that the Storyboard contains. If you increase this\
    \ value, you’ll see that cells are added to the `Table View`, complete with an\
    \ empty `Content View`.\n\nIn Figure [6-11](#A978-1-4842-1242-4_6_Chapter.html#Fig11),\
    \ you can see that there are three prototype cells (because the default content\
    \ view background is white, it’s not always immediately obvious how many cells\
    \ are in the table until you look at the object hierarchy).\n\n![A978-1-4842-1242-4_6_Fig11_HTML.jpg](A978-1-4842-1242-4_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11. The prototype cells in the Table View\n\n### Setting Up the Prototype\
    \ Cells\n\nWith the prototype cells added, now you can start configuring them.\
    \ By default, they arrive in the Storyboard as instances of the Custom cell type,\
    \ but you can change that by selecting the `Table View Cell` in the object hierarchy\
    \ and choosing a different style from the Style dropdown in the Attributes Inspector.\n\
    \nThis will update the prototype cell in the Storyboard. In Figure [6-12](#A978-1-4842-1242-4_6_Chapter.html#Fig12),\
    \ there are five prototypes, with types of (from top to bottom) Basic, Right Detail,\
    \ Left Detail, Subtitle, and Custom. In the screenshot from sample project, the\
    \ cell identifiers have been updated to match the cell types, which you’ll do\
    \ in the next section.\n\n![A978-1-4842-1242-4_6_Fig12_HTML.jpg](A978-1-4842-1242-4_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12. The Table View with five prototype cells\n\nAs you can see, the\
    \ standard cell types are shown in the Storyboard with their controls. You can\
    \ select this and change their styles by setting values in the Attributes Inspector.\n\
    \n### Telling the Table View About the Prototype Cells\n\nIn order for the table\
    \ view to be able to use the prototype cells, you have to provide a way of referencing\
    \ which particular cell should be used for which index path value.\n\nThis is\
    \ done by setting the prototype cell’s `identifier` attribute in the Storyboard.\
    \ When dequeuing a cell, the `dataSource` will automatically retrieve the prototype\
    \ with the matching identifier from the Storyboard.\n\nTo set the prototype’s\
    \ identifier, select the `Table View Cell` object in the hierarchy, as shown in\
    \ Figure [6-13](#A978-1-4842-1242-4_6_Chapter.html#Fig13).\n\n![A978-1-4842-1242-4_6_Fig13_HTML.jpg](A978-1-4842-1242-4_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13. Selecting the prototype cell\n\nThen update the `Identifier` field\
    \ in the Attributes inspector with the reuse identifier, as shown in Figure [6-14](#A978-1-4842-1242-4_6_Chapter.html#Fig14).\n\
    \n![A978-1-4842-1242-4_6_Fig14_HTML.jpg](A978-1-4842-1242-4_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14. Updating the prototype cell’s Identifier\n\nThis will also update\
    \ the name of the cell in the Object tree, as shown in Figure [6-15](#A978-1-4842-1242-4_6_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1242-4_6_Fig15_HTML.jpg](A978-1-4842-1242-4_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15. The updated prototype cell\n\nThe sample app will create one row\
    \ for each of the cell types, so you can use that as your source data. Add a `tableData`\
    \ property to the view controller:\n\n```swift\nvar tableData = [String]()\n```\n\
    \nNow add the code in Listing [6-2](#A978-1-4842-1242-4_6_Chapter.html#FPar5)\
    \ as an extension to the view controller.\n\n**Listing 6-2.** The View Controller\
    \ Extension\n\n```swift\nextension StoryboardTableViewController {\n    func setupTable()\
    \ {\n        tableData.append(\"BasicCellIdentifier\")\n        tableData.append(\"\
    RightDetailCellIdentifier\")\n        tableData.append(\"LeftDetailCellIdentifier\"\
    )\n        tableData.append(\"SubtitleCellIdentifier\")\n        tableData.append(\"\
    CustomCellIdentifier\")\n    }\n}\n```\n\nFinally, call the `setupTable()` function\
    \ from the `viewDidLoad()` function:\n\n```swift\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    setupTable()\n}\n```\n\n### Creating and Configuring\
    \ Cells\n\nWith the cell identifier set, the `cellForRowAtIndexPath:` method will\
    \ now be able to create instances from your prototype. The key is to use the cell’s\
    \ `Identifier` attribute to create (or dequeue) the correct prototype and then\
    \ configure the cell from the data model in the usual way.\n\nListing [6-3](#A978-1-4842-1242-4_6_Chapter.html#FPar6)\
    \ shows how to do this for your newly-created cell type’s `BasicCellIdentifier`\
    \ cells.\n\n**Listing 6-3.** The `cellForRowAtIndexPath:` Method\n\n```swift\n\
    override func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ \nNSIndexPath) -> UITableViewCell {\n    let cellIdentifier = tableData[indexPath.row]\n\
    \    let cell = tableView.dequeueReusableCellWithIdentifier(cellIdentifier, \n\
    \    forIndexPath: indexPath) as! UITableViewCell\n\n    switch cellIdentifier\
    \ {\n    case \"BasicCellIdentifier\" :\n        cell.textLabel!.text = \"Basic\
    \ cell\"\n    case \"RightDetailCellIdentifier\":\n        cell.textLabel!.text\
    \ = \"Right detail cell\"\n        cell.detailTextLabel!.text = \"Detail text\
    \ label\"\n    case \"LeftDetailCellIdentifier\" :\n        cell.textLabel!.text\
    \ = \"Left detail cell\"\n        cell.detailTextLabel!.text = \"Detail text label\"\
    \n    case \"SubtitleCellIdentifier\" :\n        cell.textLabel!.text = \"Subtitle\
    \ cell\"\n        cell.detailTextLabel!.text = \"Detail text label\"\n    default\
    \ :  // Handles CustomCellIdentifier by process of elimination\n        print(\"\
    The default custom cell type is empty and has no controls\")\n    }\n\n    return\
    \ cell\n}\n```\n\nThis method gets the item from the data array for the current\
    \ index path, and uses that as the `cellIdentifier`. Then it switches over the\
    \ item and configures the cell accordingly. The end result looks like Figure [6-16](#A978-1-4842-1242-4_6_Chapter.html#Fig16).\n\
    \n![A978-1-4842-1242-4_6_Fig16_HTML.jpg](A978-1-4842-1242-4_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16. The custom cells\n\n## Creating Prototype Cells in Code\n\nCreating\
    \ prototype cells in code is normally used for custom instances of `UITableViewCell`\
    \ subclasses. If you use this approach to create “standard” `UITableViewCells`,\
    \ you’re restricted to the `UITableViewStyle.Default` style and won’t be able\
    \ to use cells with subtitles, etc.\n\nThe process is very similar to the visual\
    \ methods: you register the cell class with the table view using an identifier,\
    \ and then you create or dequeue an instance of the class in the `cellForRowAtIndexPath:`\
    \ method.\n\n### Registering the Cell Class with the Table View\n\nThis must happen\
    \ before the `dataSource` attempts to create or dequeue cells, so it is normally\
    \ done as the view is set up in the `viewDidLoad` method or similar.\n\nTo register\
    \ a cell class with the table, use the `registerClass:forCellReuseIdentifier:`\
    \ method with the appropriate identifier.\n\nFor example, to register the `UITableViewCell`\
    \ class with the `StandardCell` identifier, add the following to (for example)\
    \ the `tableViewController`’s `viewDidLoad` method:\n\n```swift\ntableView.registerClass(UITableViewCell.self,\
    \ forCellReuseIdentifier: \"StandardCell\")\n```\n\nIf you had a custom `UITableViewCell`\
    \ subclass, you’d use this in the `registerClass:forCellReuseIdentifier:` method:\n\
    \n```swift\ntableView.registerClass(MyCustomCellClass.self, forCellReuseIdentifier:\
    \ \"CustomCell\")\n```\n\nTo deregister a class for a given `cellIdentifier`,\
    \ you pass `nil` to the `registerClass:forCellIdentifier:` method:\n\n```swift\n\
    tableView.registerClass(nil, forCellReuseIdentifier: \"CustomCell\")\n```"
  raw: '#### Creating Prototype Cells


    To add a prototype cell, select the `Table View` in the Storyboard, then switch
    to the Attributes Inspector, shown in Figure [6-10](#A978-1-4842-1242-4_6_Chapter.html#Fig10).
    In the top section, you’ll see a drop-down that allows you to switch between dynamic
    prototypes or static cells (creating static table views is covered in [Chapter
    13](#A978-1-4842-1242-4_13_Chapter.html)).


    ![A978-1-4842-1242-4_6_Fig10_HTML.jpg](A978-1-4842-1242-4_6_Fig10_HTML.jpg)


    Figure 6-10.


    Selecting the number of dynamic prototypes


    Below this is the number of prototype cells that the Storyboard contains. If you
    increase this value, you’ll see that cells are added to the `Table View`, complete
    with an empty `Content View`.


    In Figure [6-11](#A978-1-4842-1242-4_6_Chapter.html#Fig11), you can see that there
    are three prototype cells (because the default content view background is white,
    it’s not always immediately obvious how many cells are in the table until you
    look at the object hierarchy).


    ![A978-1-4842-1242-4_6_Fig11_HTML.jpg](A978-1-4842-1242-4_6_Fig11_HTML.jpg)


    Figure 6-11.


    The prototype cells in the Table View


    #### Setting Up the Prototype Cells


    With the prototype cells added, now you can start configuring them. By default,
    they arrive in the Storyboard as instances of the Custom cell type, but you can
    change that by selecting the Table View Cell in the object hierarchy and choosing
    a different style from the Style dropdown in the Attributes Inspector.


    This will update the prototype cell in the Storyboard. In Figure [6-12](#A978-1-4842-1242-4_6_Chapter.html#Fig12),
    there are five prototypes, with types of (from top to bottom) Basic, Right Detail,
    Left Detail, Subtitle, and Custom. In the screenshot from sample project, the
    cell identifiers have been updated to match the cell types, which you’ll do in
    the next section.


    ![A978-1-4842-1242-4_6_Fig12_HTML.jpg](A978-1-4842-1242-4_6_Fig12_HTML.jpg)


    Figure 6-12.


    The Table View with five prototype cells


    As you can see, the standard cell types are shown in the Storyboard with their
    controls. You can select this and change their styles by setting values in the
    Attributes Inspector.


    #### Telling the Table View About the Prototype Cells


    In order for the table view to be able to use the prototype cells, you have to
    provide a way of referencing which particular cell should be used for which index
    path value.


    This is done by setting the prototype cell’s `identifier` attribute in the Storyboard.
    When dequeuing a cell, the `dataSource` will automatically retrieve the prototype
    with the matching identifier from the Storyboard.


    To set the prototype’s identifier, select the `Table View Cell` object in the
    hierarchy, as shown in Figure [6-13](#A978-1-4842-1242-4_6_Chapter.html#Fig13).


    ![A978-1-4842-1242-4_6_Fig13_HTML.jpg](A978-1-4842-1242-4_6_Fig13_HTML.jpg)


    Figure 6-13.


    Selecting the prototype cell


    Then update the `Identifier` field in the Attributes inspector with the reuse
    identifier, as shown in Figure [6-14](#A978-1-4842-1242-4_6_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_6_Fig14_HTML.jpg](A978-1-4842-1242-4_6_Fig14_HTML.jpg)


    Figure 6-14.


    Updating the prototype cell’s Identifier


    This will also update the name of the cell in the Object tree, as shown in Figure
    [6-15](#A978-1-4842-1242-4_6_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_6_Fig15_HTML.jpg](A978-1-4842-1242-4_6_Fig15_HTML.jpg)


    Figure 6-15.


    The updated prototype cell


    The sample app will create one row for each of the cell types, so you can use
    that as your source data. Add a `tableData` property to the view controller:


    `var tableData = [String]()`


    Now add the code in Listing [6-2](#A978-1-4842-1242-4_6_Chapter.html#FPar5) as
    an extension to the view controller.


    Listing 6-2. The View Controller Extension


    `extension StoryboardTableViewController {`


        `func setupTable() {`


            `tableData.append("BasicCellIdentifier")`


            `tableData.append("RightDetailCellIdentifier")`


            `tableData.append("LeftDetailCellIdentifier")`


            `tableData.append("SubtitleCellIdentifier")`


            `tableData.append("CustomCellIdentifier")`


        `}`


    `}`


    Finally, call the `setupTable()` function from the `viewDidLoad()` function:


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `setupTable()`


    `}`


    #### Creating and Configuring Cells


    With the cell identifier set, the `cellForRowAtIndexPath`: method will now be
    able to create instances from your prototype. The key is to use the cell’s `Identifier`
    attribute to create (or dequeue) the correct prototype and then configure the
    cell from the data model in the usual way.


    Listing [6-3](#A978-1-4842-1242-4_6_Chapter.html#FPar6) shows how to do this for
    your newly-created cell type’s `BasicCellIdentifier` cells.


    Listing 6-3. The cellForRowAtIndexPath: Method


    `override func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:
    ➤`


    `NSIndexPath) -> UITableViewCell {`


        `let cellIdentifier = tableData[indexPath.row]`


        `let cell = tableView.dequeueReusableCellWithIdentifier(cellIdentifier, ➤`


        `forIndexPath: indexPath) as! UITableViewCell`


        `switch cellIdentifier {`


        `case "BasicCellIdentifier" :`


            `cell.textLabel!.text = "Basic cell"`


        `case "RightDetailCellIdentifier":`


            `cell.textLabel!.text = "Right detail cell"`


            `cell.detailTextLabel!.text = "Detail text label"`


        `case "LeftDetailCellIdentifier" :`


            `cell.textLabel!.text = "Left detail cell"`


            `cell.detailTextLabel!.text = "Detail text label"`


        `case "SubtitleCellIdentifier" :`


            `cell.textLabel!.text = "Subtitle cell"`


            `cell.detailTextLabel!.text = "Detail text label"`


        `default :  // Handles CustomCellIdentifier by process of elimination`


            `print("The default custom cell type is empty and has no controls")`


        `}`


        `return cell`


    `}`


    This method gets the item from the data array for the current index path, and
    uses that as the `cellIdentifier`. Then it switches over the item and configures
    the cell accordingly. The end result looks like Figure [6-16](#A978-1-4842-1242-4_6_Chapter.html#Fig16).


    ![A978-1-4842-1242-4_6_Fig16_HTML.jpg](A978-1-4842-1242-4_6_Fig16_HTML.jpg)


    Figure 6-16.


    The custom cells


    ### Creating Prototype Cells in Code


    Creating prototype cells in code is normally used for custom instances of `UITableViewCell`
    subclasses. If you use this approach to create “standard” `UITableViewCells`,
    you’re restricted to the `UITableViewStyle.Default` style and won’t be able to
    use cells with subtitles, etc.


    The process is very similar to the visual methods: you register the cell class
    with the table view using an identifier, and then you create or dequeue an instance
    of the class in the `cellForRowAtIndexPath:` method.


    #### Registering the Cell Class with the Table View


    This must happen before the `dataSource` attempts to create or dequeue cells,
    so it is normally done as the view is set up in the `viewDidLoad` method or similar.


    To register a cell class with the table, use the `registerClass:forCellReuseIdentifier:`
    method with the appropriate identifier.


    For example, to register the `UITableViewCell` class with the `StandardCell` identifier,
    add the following to (for example) the `tableViewController`’s `viewDidLoad` method:


    `tableView.registerClass(UITableViewCell.self, forCellReuseIdentifier: "StandardCell")`


    If you had a custom `UITableViewCell` subclass, you’d use this in the `registerClass:forCellReuseIdentifier:`
    method:


    `tableView.registerClass(MyCustomCellClass.self, forCellReuseIdentifier: "CustomCell")`


    To deregister a class for a given `cellIdentifier`, you pass `nil` to the `registerClass:forCellIdentifier:`
    method:


    `tableView.registerClass(nil, forCellReuseIdentifier: "CustomCell")`'
  trans: "\n### 创建原型单元格\n\n要添加原型单元格，请先选中故事板中的`Table View`，然后切换到属性检查器，如图 6-10 所示。在顶部区域，你会看到一个下拉菜单，可以在动态原型和静态单元格之间切换（创建静态表格视图的内容将在第\
    \ 13 章中介绍）。\n\n![A978-1-4842-1242-4_6_Fig10_HTML.jpg](img/A978-1-4842-1242-4_6_Fig10_HTML.jpg)\n\
    \n图 6-10. 选择动态原型的数量\n\n其下方是故事板中包含的原型单元格数量。如果增加此数值，你会看到`Table View`中新增了单元格，每个单元格都带有一个空的`Content\
    \ View`。\n\n在图 6-11 中，可以看到有三个原型单元格（由于默认内容视图背景为白色，除非查看对象层级，否则不一定能立刻看清表格中有多少个单元格）。\n\
    \n![A978-1-4842-1242-4_6_Fig11_HTML.jpg](img/A978-1-4842-1242-4_6_Fig11_HTML.jpg)\n\
    \n图 6-11. Table View 中的原型单元格\n\n### 设置原型单元格\n\n添加原型单元格后，你就可以开始配置它们了。默认情况下，它们在故事板中以自定义单元格类型的实例出现，但你可以通过选中对象层级中的`Table\
    \ View Cell`，然后从属性检查器的“样式”下拉菜单中选择不同样式来更改。\n\n这会更新故事板中的原型单元格。在图 6-12 中，有五个原型，其类型（从上到下）分别为：基本、右侧详情、左侧详情、副标题和自定义。在示例项目的截图中，单元格标识符已更新以匹配单元格类型，你将在下一节中执行此操作。\n\
    \n![A978-1-4842-1242-4_6_Fig12_HTML.jpg](img/A978-1-4842-1242-4_6_Fig12_HTML.jpg)\n\
    \n图 6-12. 包含五个原型单元格的 Table View\n\n如你所见，标准单元格类型在故事板中会显示其控件。你可以选中它并通过在属性检查器中设置值来更改其样式。\n\
    \n### 告知表格视图关于原型单元格的信息\n\n为了使表格视图能够使用原型单元格，你必须提供一种方式来引用特定索引路径值应使用哪个单元格。\n\n这是通过在故事板中设置原型单元格的`identifier`属性来实现的。当出队一个单元格时，`dataSource`将自动从故事板中检索具有匹配标识符的原型。\n\
    \n要设置原型的标识符，请选中层级中的`Table View Cell`对象，如图 6-13 所示。\n\n![A978-1-4842-1242-4_6_Fig13_HTML.jpg](img/A978-1-4842-1242-4_6_Fig13_HTML.jpg)\n\
    \n图 6-13. 选中原型单元格\n\n然后在属性检查器中更新`标识符`字段，填入复用标识符，如图 6-14 所示。\n\n![A978-1-4842-1242-4_6_Fig14_HTML.jpg](img/A978-1-4842-1242-4_6_Fig14_HTML.jpg)\n\
    \n图 6-14. 更新原型单元格的标识符\n\n这还会更新对象树中单元格的名称，如图 6-15 所示。\n\n![A978-1-4842-1242-4_6_Fig15_HTML.jpg](img/A978-1-4842-1242-4_6_Fig15_HTML.jpg)\n\
    \n图 6-15. 更新后的原型单元格\n\n示例应用将为每种单元格类型创建一行，因此你可以将其用作源数据。向视图控制器添加一个`tableData`属性：\n\
    \n```swift\nvar tableData = [String]()\n```\n\n现在将代码清单 6-2 作为视图控制器的扩展添加进去。\n\n\
    **代码清单 6-2.** 视图控制器扩展\n\n```swift\nextension StoryboardTableViewController {\n\
    \    func setupTable() {\n        tableData.append(\"BasicCellIdentifier\")\n\
    \        tableData.append(\"RightDetailCellIdentifier\")\n        tableData.append(\"\
    LeftDetailCellIdentifier\")\n        tableData.append(\"SubtitleCellIdentifier\"\
    )\n        tableData.append(\"CustomCellIdentifier\")\n    }\n}\n```\n\n最后，在`viewDidLoad()`函数中调用`setupTable()`函数：\n\
    \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    setupTable()\n\
    }\n```\n\n### 创建和配置单元格\n\n设置好单元格标识符后，`cellForRowAtIndexPath:`方法现在就能够从你的原型中创建实例了。关键在于使用单元格的`Identifier`属性来创建（或出队）正确的原型，然后按照常规方式从数据模型中配置单元格。\n\
    \n代码清单 6-3 展示了如何为你新创建的`BasicCellIdentifier`类型单元格执行此操作。\n\n**代码清单 6-3.** `cellForRowAtIndexPath:`方法\n\
    \n```swift\noverride func tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: \nNSIndexPath) -> UITableViewCell {\n    let cellIdentifier = tableData[indexPath.row]\n\
    \    let cell = tableView.dequeueReusableCellWithIdentifier(cellIdentifier, \n\
    \    forIndexPath: indexPath) as! UITableViewCell\n\n    switch cellIdentifier\
    \ {\n    case \"BasicCellIdentifier\" :\n        cell.textLabel!.text = \"Basic\
    \ cell\"\n    case \"RightDetailCellIdentifier\":\n        cell.textLabel!.text\
    \ = \"Right detail cell\"\n        cell.detailTextLabel!.text = \"Detail text\
    \ label\"\n    case \"LeftDetailCellIdentifier\" :\n        cell.textLabel!.text\
    \ = \"Left detail cell\"\n        cell.detailTextLabel!.text = \"Detail text label\"\
    \n    case \"SubtitleCellIdentifier\" :\n        cell.textLabel!.text = \"Subtitle\
    \ cell\"\n        cell.detailTextLabel!.text = \"Detail text label\"\n    default\
    \ :  // Handles CustomCellIdentifier by process of elimination\n        print(\"\
    The default custom cell type is empty and has no controls\")\n    }\n\n    return\
    \ cell\n}\n```\n\n该方法从当前索引路径的数据数组中获取项，并将其用作`cellIdentifier`。然后根据该项进行分支判断，并相应配置单元格。最终结果如图\
    \ 6-16 所示。\n\n![A978-1-4842-1242-4_6_Fig16_HTML.jpg](img/A978-1-4842-1242-4_6_Fig16_HTML.jpg)\n\
    \n图 6-16. 自定义单元格\n\n## 在代码中创建原型单元格\n\n在代码中创建原型单元格通常用于`UITableViewCell`子类的自定义实例。如果使用此方法创建“标准”`UITableViewCells`，则只能使用`UITableViewStyle.Default`样式，并且无法使用带副标题等的单元格。\n\
    \n该过程与可视化方法非常相似：使用标识符向表格视图注册单元格类，然后在`cellForRowAtIndexPath:`方法中创建或出队该类的实例。\n\n\
    ### 向表格视图注册单元格类\n\n这必须在`dataSource`尝试创建或出队单元格之前完成，因此通常是在`viewDidLoad`方法或类似方法中设置视图时进行。\n\
    \n要注册一个单元格类，请使用带有适当标识符的`registerClass:forCellReuseIdentifier:`方法。\n\n例如，要使用`StandardCell`标识符注册`UITableViewCell`类，请将以下代码添加到（例如）`tableViewController`的`viewDidLoad`方法中：\n\
    \n```swift\ntableView.registerClass(UITableViewCell.self, forCellReuseIdentifier:\
    \ \"StandardCell\")\n```\n\n如果你有一个自定义的`UITableViewCell`子类，你可以在`registerClass:forCellReuseIdentifier:`方法中使用它：\n\
    \n```swift\ntableView.registerClass(MyCustomCellClass.self, forCellReuseIdentifier:\
    \ \"CustomCell\")\n```\n\n要取消注册给定`cellIdentifier`的类，请向`registerClass:forCellIdentifier:`方法传递`nil`：\n\
    \n```swift\ntableView.registerClass(nil, forCellReuseIdentifier: \"CustomCell\"\
    )\n```\n"
- fmt: "# Creating and Configuring Cells\n\nOnce the cell classes and identifiers\
    \ are registered with the table view, the `cellForRowAtIndexPath:` method will\
    \ now be able to create instances on demand.\n\nUse the cell's `Identifier` attribute\
    \ to create (or dequeue) an instance of the correct class, and then configure\
    \ the cell from the data model in the usual way.\n\nListing [6-4](#A978-1-4842-1242-4_6_Chapter.html#FPar7)\
    \ shows how to do this for `MyCustomCellClass` cells.\n\n**Listing 6-4.** The\
    \ `cellForRowAtIndexPath:` Method\n\n```\nfunc tableView(tableView: UITableView,\
    \ cellForRowAtIndexPath indexPath: NSIndexPath) ➤\n-> UITableViewCell {\n    let\
    \ cell = tableView.dequeueReusableCellWithIdentifier(\"CustomCell\", ➤\n    forIndexPath:\
    \ indexPath) as! MyCustomCellClass\n    // Configure the cell...\n    cell.myCustomOutlet!.text\
    \ = tableData[indexPath.row]\n    return cell\n}\n```\n\nNote that the `dequeueReusableCellWithIdentifier:forIndexPath:`\
    \ method returns a vanilla `UITableViewCell` instance, so you will need to downcast\
    \ this to your custom class with the `as!` method.\n\n## Working with Standard\
    \ Cell Types\n\n`UITableView`s come with four standard cell types, and for many\
    \ applications these may be all you need. The four styles have constant names,\
    \ which unfortunately aren't particularly descriptive:\n\n* `UITableViewCellStyleDefault`\n\
    * `UITableViewCellStyleValue1`\n* `UITableViewCellStyleValue2`\n* `UITableViewCellStyleSubtitle`\n\
    \nThis section details the four types and then shows you how to select the one\
    \ you want.\n\n### Using `UITableViewCellStyleDefault`\n\nAs the name suggests,\
    \ `UITableViewCellStyleDefault` is the default cell style for a standard, out-of-the-box\
    \ `UITableView`. It provides three areas (shown in Figure [6-17](#A978-1-4842-1242-4_6_Chapter.html#Fig17)):\n\
    \n* A `UIImageView` called `imageView` at the left end of the cell. This is optional;\
    \ if an image view isn't present in the cell, the cell content will align to the\
    \ left.\n* A `UILabel` called `textLabel`, which holds the cell content.\n* An\
    \ optional `UIView` called `accessoryView` that can show one of the standard accessory\
    \ view indicators, a custom image by adding a `UIImageView` as a `subView`, or\
    \ a control such as a `UIButton`.\n\nAs with all the other standard cell styles,\
    \ the `textLabel` can be formatted by changing the `UILabel` properties such as\
    \ font, text alignment, and color. Although the layout of the default cells may\
    \ be fixed, this formatting does enable you to apply some degree of customization.\n\
