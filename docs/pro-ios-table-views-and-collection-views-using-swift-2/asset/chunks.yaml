    \ NSIndexPath) -> Bool {\n    if (indexPath.row == tableData.count) {\n      \
    \  return false\n    }\n    return true\n}\n```\n"
- fmt: "### Moving Rows Around\n\nAfter the table is in editing mode and the rows\
    \ are flagged as movable, the Reordering control appears at the right end of the\
    \ cell, as in Figure [12-19](#A978-1-4842-1242-4_12_Chapter.html#Fig19).\n\n![A978-1-4842-1242-4_12_Fig19_HTML.jpg](A978-1-4842-1242-4_12_Fig19_HTML.jpg)\n\
    \nFigure 12-19. The table in editing mode (and rearranged)\n\nTouching the Reordering\
    \ control will cause the row to be animated away from the table and become draggable.\
    \ As the row passes over other rows, the `tableView` will animate the shuffling\
    \ around to make room.\n\n#### Can the Row Be Moved to Here?\n\nIn addition to\
    \ controlling whether rows can be moved at all, `UITableView`’s delegate can also\
    \ control whether a row can be moved to a particular location.\n\nAs the row in\
    \ motion passes over the static rows in the table, the `tableView` will call the\
    \ `tableView:targetIndexPathForMoveFromRowAtIndexPath:toProposedIndexPath:` function.\
    \ (This is probably the function that’s responsible for critics of iOS complaining\
    \ about long-winded function names.)\n\nThis function takes three parameters:\
    \ a reference to the `tableView` itself, the original `indexPath` of the row that’s\
    \ being moved, and the `indexPath` that has just been moved over. The `tableView`\
    \ doesn’t know yet whether the user is going to release the Reordering control\
    \ and “drop” the cell into place, so this function will be called repeatedly as\
    \ the row in motion moves over `indexPath` positions as it travels up and down\
    \ the table.\n\nIf the row can be moved to this position, the function simply\
    \ returns the `proposedDestinationIndexPath` to confirm that this move is permissible.\n\
    \nYou can use this function to complement “freezing” the `Add New Row` row to\
    \ the bottom of the table. In addition to not wanting to move the `Add New Row`\
    \ row, you also want to prevent the user from moving another row to the very bottom.\
    \ Figure [12-20](#A978-1-4842-1242-4_12_Chapter.html#Fig20) shows what you’re\
    \ trying to avoid.\n\n![A978-1-4842-1242-4_12_Fig20_HTML.jpg](A978-1-4842-1242-4_12_Fig20_HTML.jpg)\n\
    \nFigure 12-20. Not allowed!\n\nYou can implement this by checking whether the\
    \ proposed `indexPath` is the end of the table. If it is, you can “send” the row\
    \ back to where it came from by returning `sourceIndexPath`. If it isn’t, the\
    \ move can be allowed by returning `proposedDestinationIndexPath`. Listing [12-24](#A978-1-4842-1242-4_12_Chapter.html#FPar30)\
    \ shows this in action.\n\n**Listing 12-24.** Preventing a Move to the End of\
    \ the Table\n\n```\nfunc tableView(tableView: UITableView, targetIndexPathForMoveFromRowAtIndexPath\n\
    sourceIndexPath: NSIndexPath, toProposedIndexPath proposedDestinationIndexPath:\n\
    NSIndexPath) -> NSIndexPath {\n    if proposedDestinationIndexPath.row == tableData.count\
    \ {\n        return sourceIndexPath\n    }\n    return proposedDestinationIndexPath\n\
    }\n```\n\n#### Updating the Model\n\nAfter completing the shuffling of rows, the\
    \ user will take the table out of editing mode either by tapping the `Done` button\
    \ on the navigation bar or by tapping whatever custom control you implemented.\n\
    \nAt this stage, it’s vital to remember that all the changes have taken place\
    \ only in the view. The underlying data model has not been updated with the changes.\
    \ Unless you explicitly update the model, the changes won’t persist.\n\nThis could\
    \ manifest itself in a couple of ways. The next time the table is reloaded, the\
    \ rows will have reverted to their original ordering. Worse, if your table has\
    \ more rows than can be displayed at once, as the table scrolls, you’ll get some\
    \ extremely weird ordering effects appearing.\n\nIf the delegate has allowed the\
    \ move, the `tableView` will call its delegate’s `tableView:moveRowAtIndexPath:toIndexPath:`\
    \ function. This takes three parameters: the usual reference to the `tableView`\
    \ itself; the `indexPath` of the source row, and the `indexPath` of the destination\
    \ row.\n\nHow you go about rearranging the model is obviously dependent on how\
    \ your model is implemented. In this simple example, you can exploit `Array`’s\
    \ `insert:atIndex:` and `removeAtIndex:` functions, as shown in Listing [12-25](#A978-1-4842-1242-4_12_Chapter.html#FPar31).\n\
    \n**Listing 12-25.** Updating the Model with Rearranged Objects\n\n```\nfunc tableView(tableView:\
    \ UITableView, moveRowAtIndexPath sourceIndexPath:\n  NSIndexPath, toIndexPath\
    \ destinationIndexPath: NSIndexPath) {\n    tableData.insert(tableData[sourceIndexPath.row],\
    \ atIndex:\n    destinationIndexPath.row)\n    tableData.removeAtIndex(sourceIndexPath.row\
    \ + 1)\n}\n```\n\nThis function first grabs the object from the donor row and\
    \ inserts it at the destination. If you just left things there, you’d end up with\
    \ two copies of the original object.\n\nThe `insert:atIndex:` function inserts\
    \ a new index at the specified index, moves the other objects beyond the insertion\
    \ down by one, and inserts a copy of the object from the source `indexPath`.\n\
    \n### Enabling Batch Insertion and Deletion\n\nIn most user-controlled situations,\
    \ rows will be affected one by one. You can, however, combine a number of insertion\
    \ or deletion commands by wrapping them into a block:\n\n```\ntableView.beginUpdates()\n\
    // do lots of\n// insertions and deletions here\ntableView.endUpdates()\n```\n\
    \nThis takes care of a lot of heavy lifting for you. The manipulation of the `tableView`\
    \ and the data model will take place in the sequence you specify, but you don’t\
    \ need to worry about tracking the changes as you go along.\n\nThis is quite subtle\
    \ and quite powerful. If you delete row 1 of the table, then what was row 2 will\
    \ move up to become row 1. So now you have to refer to row 1 to affect what was\
    \ previously row 2, and so on. The update block handles this for you. If you delete\
    \ row 1 and then delete row 2 within the block, row 2 will refer to the original\
    \ row 2.\n\nYou mustn’t call any functions that will update the `tableView` within\
    \ an update block (`reloadData` and so on). If you do, you have to handle the\
    \ animations yourself.\n\n### Batch Insertion and Deletion of Sections\n\nAs well\
    \ as batch insertion of rows, it’s also possible to insert or delete entire sections.\
    \ The animations are handled for you.\n\nInserting sections is performed with\
    \ the `insertSections:withRowAnimation:` function. You pass an `NSIndexSet` containing\
    \ the sections to insert, and the table view will call its `dataSource` to obtain\
    \ the necessary data before inserting the section.\n\nIf there’s already a section\
    \ in the position you’re attempting to insert at, the existing section will be\
    \ moved down automatically.\n\nThe `rowAnimation` parameter allows you to control\
    \ the type of animation that’s used to insert the new section.\n\nDeleting sections\
    \ uses the `deleteSections:withRowAnimation:` function. Again, you need to provide\
    \ an `NSIndexSet` of the sections to remove, and a `rowAnimation` parameter to\
    \ control the animation. The table view will then handle removing the section\
    \ and closing up the gap.\n\nYou need to be careful when constructing the `NSIndexSet`\
    \ – if you attempt to insert or remove a section that doesn’t exist in the underlying\
    \ data model, you’ll get a runtime crash.\n\n## Selection in UICollectionViews\n\
    \nOne way of thinking of a `UICollectionView` is as a two-dimensional `UITableView`\
    \ – that is, a control that manages cells but can scroll in x and y coordinates,\
    \ rather than the up-down direction of `UITableView`.\n\nWith that mental model\
    \ in mind, it shouldn’t come as a surprise to learn that selection in `UICollectionView`s\
    \ is managed in very similar ways to selection in `UITableView`s.\n\nThe main\
    \ difference is that because collection views can be implemented in radically\
    \ different ways to table views, they come with fewer built-in features such as\
    \ in-cell controls. If you want to add edit, delete, or rearrangement controls\
    \ into cells, you need to handle this yourself."
