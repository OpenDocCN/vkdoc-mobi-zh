    \n**图 9-6.** Storyboard 中的`UITableViewController`\n\n### 添加刷新控件\n\n在属性检查器中，有一个`Refreshing`下拉选项。选择`Enabled`选项，如图\
    \ 9-7 所示。\n\n![A978-1-4842-1242-4_9_Fig7_HTML.jpg](img/A978-1-4842-1242-4_9_Fig7_HTML.jpg)\n\
    \n**图 9-7.** 设置`Refreshing`选项\n\n如果现在运行项目，你会看到可以下拉表格，顶部会出现活动指示器，如图 9-8 所示。\n\n\
    ![A978-1-4842-1242-4_9_Fig8_HTML.jpg](img/A978-1-4842-1242-4_9_Fig8_HTML.jpg)\n\
    \n**图 9-8.** 表格视图中的下拉刷新\n\n虽然这看起来令人印象深刻，但有一个问题：活动指示器不会消失！\n\n还需要做一些额外工作。首先，你需要将刷新控件连接到一个函数，以响应用户的下拉操作。将其添加到`viewDidLoad`函数中：\n\
    \n```\nrefreshControl?.addTarget(self, action: \"didPullRefresh:\", forControlEvents:\n\
    \   UIControlEvents.ValueChanged)\n```\n\n`refreshControl`是`UITableViewController`的内置属性。这里，你将`didPullRefresh:`函数作为目标添加，以响应用户的下拉操作。\n"
- fmt: "### Implementing the `pullToRefresh` Function\n\nAdd a new function, as shown\
    \ in Listing [9-12](#A978-1-4842-1242-4_9_Chapter.html#FPar13).\n\n**Listing 9-12.**\
    \ The `pullToRefresh` Function\n\n```\nfunc didPullRefresh(sender: UIRefreshControl)\
    \ {\n    tableData.append(tableData.count)\n    tableView.reloadData()\n    sender.endRefreshing()\n\
    }\n```\n\nThis function does three things:\n\n- It adds another entry to the end\
    \ of the `tableData` array.\n- It forces the table to reload the data from the\
    \ model.\n- It stops the `UIRefreshControl` from spinning, and animates its removal.\n\
    \nThis is an extremely trivial example. What you would be far more likely to do\
    \ in practice is call some kind of network manager function to retrieve information\
    \ from an API.\n\nIf you run the app again, you’ll see that the activity indicator\
    \ appears, followed by a new entry at the end of the table. Once the table has\
    \ been refreshed, the activity indicator is animated off the top of the view.\n\
    \n### Adding a `UIRefreshControl` to a Table View\n\nThe process in the previous\
    \ section was predicated on using a `UITableViewController`. If instead you have\
    \ a plain `UITableView` embedded inside a `UIViewController`, the process is a\
    \ little more involved.\n\nThe extra steps required are to:\n\n- Add a property\
    \ for a `UIRefreshControl` to the view controller class.\n- Instantiate the `UIRefreshControl`\
    \ and give it an action.\n- Add the newly-instantiated `UIRefreshControl` to the\
    \ table view.\n\n#### Adding the `UIRefreshControl` Property\n\nThis is simple\
    \ a case of adding a property to the `UIViewController`:\n\n```\nvar refreshControl:\
    \ UIRefreshControl!\n```\n\n#### Instantiating the Refresh Control\n\nBefore it\
    \ can be used, the property needs to be instantiated. Since this needs to be done\
    \ before it’s used, one obvious place to do this is in the `viewController`’s\
    \ `viewDidLoad` function:\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    ... setup the table and data ...\n    refreshControl = UIRefreshControl()\n\
    \    refreshControl.addTarget(self, action: \"didPullRefresh:\", forControlEvents:\
    \ .ValueChanged)\n    tableView.addSubview(refreshControl)\n}\n```\n\nHere, you’re\
    \ setting up the table and its data, and then instantiating the `refreshControl`\
    \ property:\n\n```\nrefreshControl = UIRefreshControl()\n```\n\nWith that done,\
    \ you can set the `didPullRefresh:` function as the action for a `valueChanged`\
    \ event. This event is triggered by the pull-down interaction on the table:\n\n\
    ```\nrefreshControl.addTarget(self, action: \"didPullRefresh:\", forControlEvents:\
    \ .ValueChanged)\n```\n\nWith the function linked to the `refreshControl`, you\
    \ simply add it to the `tableView`:\n\n```\ntableView.addSubview(refreshControl)\n\
    ```\n\nThe end result is exactly the same as if you’d used a `UITableViewController`\
    \ and set up its in-built `refreshControl` property.\n\n## Searching in Tables\
    \ and Collection Views\n\nIf you’ve got a view displaying any significant amount\
    \ of data, you owe it to your users to give them the means to navigate around\
    \ easily. There’s nothing more frustrating than having to scroll through hundreds\
    \ of entries in search of the one that you’re after.\n\nPreviously you looked\
    \ at adding indexes to the `tableView`; that’s a good way of letting the user\
    \ jump between sections. But sometimes even that’s not enough. Wouldn’t it be\
    \ much better if you could provide a means of searching the content of the table\
    \ so the user could find the row for which they were looking?\n\nFortunately for\
    \ us, the iOS SDK includes the `UISearchBar` class and its associated delegate\
    \ protocols. This class makes implementing search in table views almost trivially\
