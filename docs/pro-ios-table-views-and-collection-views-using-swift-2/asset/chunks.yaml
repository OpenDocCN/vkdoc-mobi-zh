    Unless you tell it otherwise, the `tableView` assumes that it will be dealing
    with cells that have a standard height of 44 points. Because the custom cell types
    you just created don’t have standard sizes, you will need to implement the `UITableViewDelegate`’s
    `tableView:heightForRowAtIndexPath:` function in order to get cells of the correct
    size.


    If you miss this function, your table will still work, but it will attempt to
    cram the cells into a height of 44 points, and their contents will be cropped.


    The `tableView:heightForRowAtIndexPath:` function is shown in Listing [8-3](#A978-1-4842-1242-4_8_Chapter.html#FPar7).
    It simply checks whether the `indexPath` is odd or even, and then returns the
    appropriate height measurement as a `CGFloat`.


    Listing 8-3. The tableView:heightForRowAtIndexPath: Function


