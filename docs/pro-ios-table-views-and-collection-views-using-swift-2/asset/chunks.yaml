    Run the application in the Simulator by pressing Command+R or by choosing Product
    ➤ Run, and then take a look at the logger output


    `The tableData array contains ["Item 0", "Item 1", "Item 2", "Item 3", "Item 4",
    "Item 5", "Item 6", "Item 7", "Item 8", "Item 9", "Item 10"]`


    ## Creating the Table View


    As it stands, the user interface for your application is a bit dull. You haven’t
    added the table yet! This needs fixing.


    Click the `Main.storyboard` file in the project explorer, and you’ll see the Storyboard
    open in the Interface Builder pane, as shown in Figure [1-8](#A978-1-4842-1242-4_1_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_1_Fig8_HTML.jpg](A978-1-4842-1242-4_1_Fig8_HTML.jpg)


    Figure 1-8.


    Editing the Storyboard file in Interface Builder


    In the Objects browser at the bottom right, find the `TableView` item and drag
    it out onto the view in the center; this will act as the container for the table
    view. The scene’s Document Outline will now look like Figure [1-9](#A978-1-4842-1242-4_1_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_1_Fig9_HTML.jpg](A978-1-4842-1242-4_1_Fig9_HTML.jpg)


    Figure 1-9.


    The scene’s Document Outline after adding the `UITableView`


    To make the table display properly in any view size (and if the device is rotated)
    you need to add some AutoLayout constraints.


    Highlight the table view if it’s not already selected, and add the constraints
    by clicking the Pin icon at the bottom of the Storyboard, then updating the values,
    as shown in Figure [1-10](#A978-1-4842-1242-4_1_Chapter.html#Fig10).


    ![A978-1-4842-1242-4_1_Fig10_HTML.jpg](A978-1-4842-1242-4_1_Fig10_HTML.jpg)


    Figure 1-10.


    Adding the table view’s AutoLayout constraints


    Believe it or not, that’s all you need to do in order to implement the most basic
    table view. It won’t display any data yet because you haven’t implemented the
    `UITableViewDataSource` protocol functions, and it certainly won’t have any interactivity—but
    the app will run.


    To prove this, run it again (Command +R), and marvel at your awesome application
    in the Simulator, as shown in Figure [1-11](#A978-1-4842-1242-4_1_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_1_Fig11_HTML.jpg](A978-1-4842-1242-4_1_Fig11_HTML.jpg)


    Figure 1-11.


    A functional, albeit not very impressive, table view application


    What’s more, you can even rotate the Simulator and the table view will resize
    itself (shown in Figure [1-12](#A978-1-4842-1242-4_1_Chapter.html#Fig12)).


    ![A978-1-4842-1242-4_1_Fig12_HTML.jpg](A978-1-4842-1242-4_1_Fig12_HTML.jpg)


    Figure 1-12.


    The table view rotated


    Okay—maybe this isn’t all that impressive. Let’s complete the wiring up of the
    table view so that it actually does something.


    ## Conforming to the Table View Protocols


    The table view that you’ve just created needs both a data source and a delegate;
    the data source will provide the table with the information it needs to configure
    itself plus the cells to display, while the delegate will handle interactions
    like cell selection.


    You need to conform your `ViewController` class to both the `UITableViewDataSource`
    and `UITableViewDelegate` protocols.


    Note


    Data sources and delegates are covered in detail in [Chapters 3](#A978-1-4842-1242-4_3_Chapter.html),
    [4](#A978-1-4842-1242-4_4_Chapter.html), and [5](#A978-1-4842-1242-4_5_Chapter.html).


    In the class, update the class declaration so it looks like Listing [1-3](#A978-1-4842-1242-4_1_Chapter.html#FPar7).


    Listing 1-3\. Conforming the Swift Class to the `UITableDelegate` and `UITableDataSource`
    Protocols


    `class ViewController: UIViewController, UITableViewDataSource, UITableViewDelegate
    {`


    This will tell the compiler to expect the required functions to have been implemented.
    Immediately you’ll see Xcode display a warning that the `ViewController` doesn’t
    yet conform to the protocol (shown in Figure [1-14](#A978-1-4842-1242-4_1_Chapter.html#Fig14)).


    ![A978-1-4842-1242-4_1_Fig14_HTML.jpg](A978-1-4842-1242-4_1_Fig14_HTML.jpg)


    Figure 1-14.


    The Table View property HUD


    ![A978-1-4842-1242-4_1_Fig13_HTML.jpg](A978-1-4842-1242-4_1_Fig13_HTML.jpg)


    Figure 1-13.


    The Xcode error


    You’ll fix this in moment, but first, let’s wire up the table to the `ViewController`
    class.'
  trans: "\n# 生成一些数据\n\n在开始使用表格视图之前，你需要创建一些数据来填充它。由于这是一个简单的表格示例，数据也将很简单。你将创建一个字符串数组，其中包含要放入每个单元格的信息。\n\
    \n当表格视图调用数据源时，数据数组必须准备就绪，那么在哪里创建它呢？有几种选择，但一个显而易见的地方是在视图控制器的 `viewDidLoad` 函数中。在这里创建是安全的。\n\
