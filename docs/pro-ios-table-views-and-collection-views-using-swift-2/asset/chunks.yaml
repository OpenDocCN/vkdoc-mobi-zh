  trans: "\n### 提供最终布局属性\n\n最终布局属性允许你控制项目如何从集合视图中移除。在此场景下，你希望项目移动到集合视图的中心，并在移动过程中逐渐淡出。\n\
    \n这些属性通过 `finalLayoutAttributesForDisppearingItemAtIndexPath` 函数返回给集合视图。该函数与 `initialLayoutAttributesForAppearingItemAtIndexPath`\
    \ 非常相似，但它返回的是移除过程结束时的属性。\n\n添加代码清单 17-15 中所示的函数。\n\n**代码清单 17-15.** `finalLayoutAttributesForDisppearingItemAtIndexPath`\
    \ 函数\n\n```\noverride func finalLayoutAttributesForDisappearingItemAtIndexPath(itemIndexPath:\
    \ ➤\n\n  NSIndexPath) -> UICollectionViewLayoutAttributes? {\n\n    let attributes\
    \ = UICollectionViewLayoutAttributes(forCellWithIndexPath: ➤\n\n    itemIndexPath)\n\
    \n    // 检查此 indexPath 是否在 BeingUpdated 列表中\n\n    // 如果不在，则可以直接退出\n\n    let\
    \ indexFound = indexPathsBeingUpdated.indexOf { (element) -> Bool in\n\n     \
    \   element.indexPathBeforeUpdate == itemIndexPath\n\n    }\n\n    if indexFound\
    \ == nil {\n\n        return super.finalLayoutAttributesForDisappearingItemAtIndexPath(itemIndexPath)\n\
    \n    }\n\n    // 测试我们是否正在处理第一个项目的移除，因为它移动到第二个项目腾出空间\n\n    // 在这种情况下，将有 2 个项目，我们正在处理的项目的\
    \ indexPath.row 将为 0\n\n    //\n\n    // 在此场景中，项目需要返回到顶部中心位置，成为唯一的项目\n\n    if\
    \ ( (collectionView?.numberOfItemsInSection(0) == 2) && ➤\n\n   (itemIndexPath.row\
    \ == 0)  ) {\n\n        attributes.center = calculateCenterForFirstItem()\n\n\
    \        attributes.size = itemSize\n\n        attributes.zIndex = 0\n\n     \
    \   return attributes;\n\n    }\n\n    // 这是一个正在消失的项目，因此我们需要设置其透明度、\n\n    //\
    \ 大小、z-index 和中心点，使其向中心缩放\n\n    attributes.center = calculateCenterForFirstItem()\n\
    \n    attributes.alpha = 0\n\n    attributes.size = itemSize\n\n    attributes.zIndex\
    \ = 0\n\n    return attributes;\n\n}\n```\n\n不同之处在于，这里的中心值是集合视图的中间位置，并且 `alpha`\
    \ 值为 `0`。\n\n至此，自定义的 `UICollectionViewLayout` 实现已完成。现在，需要完成集合视图的连线工作。\n\n### 连接集合视图\n\
    \n目前，集合视图使用的是标准流式布局来排列项目，如图 17-7 所示。\n\n![A978-1-4842-1242-4_17_Fig7_HTML.jpg](img/A978-1-4842-1242-4_17_Fig7_HTML.jpg)\n\
    \n**图 17-7.** 流式布局\n\n你需要更新 `ViewController`，以创建自定义布局并将其应用于集合视图。\n\n更新 `setupCollectionView()`\
    \ 函数，如代码清单 17-16 所示。\n\n**代码清单 17-16.** `setupCollectionView()` 函数\n\n```\nfunc\
    \ setupCollectionView() {\n\n    let layout = BounceLayout()\n\n    layout.itemSize\
    \ = CGSizeMake(75,75)\n\n    layout.sidePadding = 10\n\n    collectionView.setCollectionViewLayout(layout,\
    \ animated: false)\n\n    collectionView.collectionViewLayout = layout\n\n}\n\
    ```\n\n这并不复杂。你创建了一个 `BounceLayout` 类的实例，并设置了项目大小和边距属性。然后将其分配给集合视图作为布局。\n\n如果你现在运行项目，就会看到已经得到了一个圆形布局，如图\
    \ 17-8 所示。\n\n![A978-1-4842-1242-4_17_Fig8_HTML.jpg](img/A978-1-4842-1242-4_17_Fig8_HTML.jpg)\n\
    \n**图 17-8.** 新应用的 `BounceLayout`\n\n#### 添加新项目\n\n效果不错，但还不是你想要的。首先，将起始项目数量减少到\
    \ 1 个：\n\n```\nfunc setupData() {\n\n    cvData.append(\"0\")\n\n}\n```\n\n现在，添加一些函数来连接到按钮。首先，添加\
    \ `didTapAdd` 函数，如代码清单 17-17 所示。\n\n**代码清单 17-17.** `didTapAdd` 函数\n\n```\n@IBAction\
    \ func didTapAdd(sender: AnyObject) {\n\n    // 获取最后一个项目的索引\n\n    let index =\
    \ cvData.count\n\n    cvData.append(\"\\(index)\")\n\n    // 为新项目创建一个 NSIndexPath\
    \ 对象\n\n    let newItemIndexPath = NSIndexPath(forItem: index, inSection: 0)\n\
    \n    // 现在更新集合视图\n\n    collectionView.insertItemsAtIndexPaths([newItemIndexPath])\n\
    \n}\n```\n\n这并非过于复杂。你获取当前数据数组中的项目数量：\n\n```\nlet index = cvData.count\n```\n\n\
    并用它来添加一个新条目：\n\n```\ncvData.append(\"\\(index)\")\n```\n\n现在，你需要为新项目创建一个 `NSIndexPath`\
    \ 对象：\n\n```\nlet newItemIndexPath = NSIndexPath(forItem: index, inSection: 0)\n\
    ```\n\n然后，你可以告诉集合视图插入新项目：\n\n```\ncollectionView.insertItemsAtIndexPaths([newItemIndexPath])\n\
    ```\n\n#### 移除项目\n\n`didTapRemoveItem` 函数如代码清单 17-17 所示，与 `didTapAdd` 函数非常相似。\n\
    \n**代码清单 17-18.** `didTapRemoveItem` 函数\n\n```\n@IBAction func didTapRemoveItem(sender:\
    \ AnyObject) {\n\n    let itemIndex = cvData.count - 1\n\n    removeItemAtIndexPath(NSIndexPath(forItem:\
    \ itemIndex, inSection: 0))\n\n}\n```\n\n它使用一个辅助函数从集合视图中移除项目，如代码清单 17-19 所示。\n\
    \n**代码清单 17-19.** `removeItemAtIndexPath` 函数\n\n```\nfunc removeItemAtIndexPath(indexPath:\
    \ NSIndexPath) {\n\n    // 不要尝试移除最后一个项目！\n\n    if cvData.count == 0 {\n\n   \
    \     return\n\n    }\n\n    // 从数据数组中移除\n\n    cvData.removeAtIndex(indexPath.row)\n\
    \n    // 现在更新集合视图\n\n    collectionView.deleteItemsAtIndexPaths([indexPath])\n\
    \n}\n```\n\n首先，这可以防止你移除最后一个项目。假设还有多个项目，你就从 `dataArray` 中删除相应的条目，然后将要移除的 `indexPath`\
    \ 传递给集合视图的 `deleteItemsAtIndexPaths` 函数。\n\n最后一步是实现 `UICollectionViewDelegate`\
    \ 的 `didSelectItemAtIndexPath` 函数，这样你就可以点击项目来删除它们。将其添加到 `viewController` 的一个扩展中，如代码清单\
    \ 17-20 所示。\n\n**代码清单 17-20.** `didSelectItemAtIndexPath` 函数\n\n```\nextension\
    \ ViewController: UICollectionViewDelegate {\n\n    func collectionView(collectionView:\
    \ UICollectionView, didSelectItemAtIndexPath ➤\n\n    indexPath: NSIndexPath)\
    \ {\n\n        switch indexPath.row {\n\n        case 0:\n\n            didTapAdd(indexPath)\n\
    \n        default:\n\n            removeItemAtIndexPath(indexPath)\n\n       \
    \ }\n\n    }\n\n}\n```\n\n选择该项目将触发 `removeItemAtIndexPath:` 函数，该项目将从集合视图中飞出。\n\
    \n将 Storyboard 中的 `UIButtons` 连接到它们各自的 `IBAction` 函数，再次运行项目，你就可以点击 `Add` 按钮插入新项目，并点击\
    \ `Remove` 按钮或点击某个项目来将其移除。\n\n"
- fmt: "### Controlling Insertion and Removal Animations\n\nCurrently, the insertion\
    \ and removal animations are controlled by the collection view itself. It uses\
    \ standard timing and easings. This might be fine for some projects, but it would\
    \ be nice to add a bit more control over them.\n\nThe key to this is to wrap the\
    \ `insertItemsAtIndexPaths` and `removeItemsAtIndexPaths` function inside a `UIView`\
    \ animation block.\n\nListing [17-21](#A978-1-4842-1242-4_17_Chapter.html#FPar22)\
    \ shows an example of the kind of effect that you can achieve.\n\n**Listing 17-21.**\
    \ Custom Insertion Animations\n\n```swift\nUIView.animateWithDuration(1.0,\n \
    \   delay: 0.0,\n    usingSpringWithDamping: 0.6,\n    initialSpringVelocity:\
    \ 0.0,\n    options: UIViewAnimationOptions.CurveEaseIn,\n    animations: { ()\
    \ -> Void in\n        // Insert items into collection view\n        self.collectionView.insertItemsAtIndexPaths([newItemIndexPath])\n\
    \    }) { (finished) -> Void in\n       // block to run when animations complete\n\
    \    }\n```\n\nThe syntax could perhaps be a little clearer, but what you’re doing\
    \ here is\n\n- Setting an animation duration of 1 second: `animateWithDuration(1.0)`\n\
    - Providing no delay before starting the animation: `delay: 0.0`\n- Using the\
    \ spring capabilities of `UIKitDynamics` to add some bounce: `usingSpringWithDamping:\
    \ 0.6`, `initialSpringVelocity: 0.0`\n- Using a `CurveEaseInOut` easing curve\
    \ to start the animation slowly, speed it up, and then slow down again before\
    \ it completes: `options: UIViewAnimationOptions.CurveEaseIn`\n\nIt’s difficult\
    \ to show the effect of animations on the printed page or static screen, but if\
    \ you run the project now, you’ll see that the items appear with a smooth animation\
    \ and a very satisfying bounce effect.\n\nBeware – it’s possible to spend hours\
    \ tweaking animations to get that perfect bounce!\n\n## Summary\n\nGestures and\
    \ animations can be used to bring your collection views to life, both deepening\
    \ the interactions available and enhancing the user experienced with animations.\n\
    \nBy creating gesture recognizers that capture user input, it’s possible to interactively\
    \ update collection views by manipulating layout attributes. This provides the\
    \ possibility for interfaces that allow users to interact directly with data and\
    \ controls.\n\nBy adding animation effects to insertion and deletions, the user\
    \ experience delivered by your collection views can be enhanced. This can also\
    \ be used as a tool to emphasize information and interaction possibilities. The\
    \ powerful iOS animation APIs allow you to create fluid and engaging interfaces\
