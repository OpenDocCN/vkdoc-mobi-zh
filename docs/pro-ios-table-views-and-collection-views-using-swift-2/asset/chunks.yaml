    The approach you’re going to use is to build the data from a JSON file. The structure
    of the JSON looks like Listing [3-1](#A978-1-4842-1242-4_3_Chapter.html#FPar1).


    Listing 3-1. An Extract from the cards.json File


    `{`


    `"suits": [`


    `{`


    `"suitName": "Spades",`


    `"packOrder": 1,`


    `"cards": [`


    `{`


    `"cardName": "Ace of Spades",`


    `"cardImage": "ace_of_spades.png",`


    `"suitOrder": 1,`


    `"cardValue": 14`


    `},`


    `{`


    `"cardName": "King of Spades",`


    `"cardImage": "king_of_spades.png",`


    `"suitOrder": 2,`


    `"cardValue": 13`


    `},`


    `{`


    `"cardName": "Queen of Spades",`


    `"cardImage": "queen_of_spades.png",`


    `"suitOrder": 3,`


    `"cardValue": 12`


    `},`


    `...`


    `]`


    `},`


    `{`


    `"suitName": "Hearts",`


    `"packOrder": 2,`


    `"cards": [...]`


    `},`


    `{`


    `"suitName": "Diamonds",`


    `"packOrder": 3,`


    `"cards": [...]`


    `},`


    `{`


    `"suitName": "Clubs",`


    `"packOrder": 4,`


    `"cards": [...]`


    `},`


    `{`


    `"suitName": "Jokers",`


    `"packOrder": 5,`


    `"cards": [`


    `{`


    `"cardName": "Black Joker",`


    `"cardImage": "black_joker.png",`


    `"suitOrder": 1,`


    `"cardValue": 1`


    `},`


    `{`


    `"cardName": "Red Joker",`


    `"cardImage": "red_joker.png",`


    `"suitOrder": 2,`


    `"cardValue": 2`


    `}`


    `]`


    `}`


    `]`


    `}`


    To save you having to create the JSON file from scratch, it’s available in the
    downloadable source code.


    The model will be stored as an `Array` of `Dictionaries` in a property in `ViewController`.
    Add this at the top of the class:


    `class ViewController: UIViewController {`


    `var suitsArray = [Dictionary<String, AnyObject]()`


    `...`


    Here, you’re declaring that `suitsArray` will be an array of `Dictionaries.` Each
    dictionary will have a `String` as a key and can store an `AnyObject` as the corresponding
    value (this will allow you to store `Strings`, `Ints`, and other `Arrays`, as
    you’ll see in a moment.)


    Next, you need a function to load the data from the JSON file. This will read
    the JSON file from disk and parse it as dictionaries into the `suitsArray` array.


    Although you’re only building a simple example application, it’s still a good
    idea to get into good habits around handling errors. Parsing JSON can be hazardous;
    the source JSON might not exist, and it might prove impossible to parse. In either
    of those situations, you need to handle the resulting errors.


    To do this, first you add an `enum` to describe the potential error cases. Add
    this at the top of the class, underneath the `suitsArray` declaration:


    `enum ParsingError: ErrorType {`


    `case MissingJson`


    `case JsonParsingError`


    `}`


    This declares an `enum` that conforms to the `ErrorType` protocol. You’re creating
    two possible values for the errors that this `enum` will describe: `MissingJson`,
    to indicate that there was a problem with the source data, and `JsonParsingError`,
    to show that something went wrong with the parsing of the JSON into the `suitsArray`.


    Now add a new function at the bottom of the class called `setupData()`, as shown
    in Listing [3-2](#A978-1-4842-1242-4_3_Chapter.html#FPar2).


    Listing 3-2. The setupData() Function


    `// MARK:`


    `// MARK: Data setup`


    `func setupData () throws {`


    `guard let filePath = NSBundle.mainBundle().pathForResource("cards", ➤`


    `ofType: "json"), jsonData = NSData(contentsOfFile: filePath) else {`


    `throw ParsingError.MissingJson`


    `}`


    `do {`


    `let parsedObject = try NSJSONSerialization.JSONObjectWithData(jsonData, ➤`


    `options: NSJSONReadingOptions.MutableContainers) as! NSDictionary`


    `suitsArray = parsedObject["suits"] as! Array`


    `} catch {`


    `throw ParsingError.JsonParsingError`


    `}`


    `}`


    Firstly, the function tries to load the `cards.json` file. It will throw a `MissingJson`
    error if it can’t find it or there’s some problem loading it. If everything is
    OK, then the JSON will be loaded into the `jsonData` object.


    Next, the `jsonData` object is parsed into an `NSDictionary` `.` Since this might
    fail, it’s wrapped in a `do-catch` block that will throw a `JsonParsingError`
    if anything fails. You’re indicating that things might go wrong by using the `try`
    keyword in front of the `JSONObjectWithData` function.


    You’re also force-unwrapping the result of the parsing into an `NSDictionary`.
    This might also fail, but at least you’ll handle the error if either operation
    goes wrong.


    The `suitsArray` property will have the structure shown in Figure [3-15](#A978-1-4842-1242-4_3_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_3_Fig15_HTML.jpg](A978-1-4842-1242-4_3_Fig15_HTML.jpg)


    Figure 3-15.


    The data structure


    An individual section or item in a `UICollectionView` is referenced by an `NSIndexPath`
    value. Figure [3-16](#A978-1-4842-1242-4_3_Chapter.html#Fig16) shows how the `indexPath
    section` and `row` values map onto suits and cards.


    ![A978-1-4842-1242-4_3_Fig16_HTML.jpg](A978-1-4842-1242-4_3_Fig16_HTML.jpg)


    Figure 3-16.


    Mapping between collection sections and rows


    The data model needs to be set up before the collection view starts asking for
    data, so add a call to the `setupData` function in the `ViewController`’s `viewDidLoad`
    function, as shown in Listing [3-3](#A978-1-4842-1242-4_3_Chapter.html#FPar3).


    Listing 3-3. The Updated viewDidLoad() Function


    `override func viewDidLoad() {`


    `super.viewDidLoad()`


    `// Do any additional setup after loading the view, typically from a nib.`


    `// Configure data`


    `do {`


    `try setupData()`


    `} catch ParsingError.MissingJson {`


    `print("Error loading JSON")`


    `} catch ParsingError.JsonParsingError {`


    `print("Error parsing JSON")`


    `} catch {`


    `print("Something went wrong")`


    `}`


    `}`


    This wraps the `setupData()` function inside a do-catch block. If any errors are
    thrown, they’ll be handled here.


    Tip


    There’s no reason why you couldn’t put this data setup code in the `viewDidLoad`
    function itself, but I prefer to keep this kind of thing separate in its own function.
    There are a couple of advantages to this approach. Firstly, it keeps the `viewDidLoad`
    function compact and easier to read. Secondly, it will make unit testing your
    view controllers much easier if you can decouple this sort of data setup process
    from the view lifecycle.'
  trans: "\n### 构建模型\n\n你将采用的方法是从 JSON 文件构建数据。该 JSON 的结构如清单 3-1 所示。\n\n**清单 3-1.** `cards.json`\
    \ 文件片段\n\n```\n{\n  \"suits\": [\n    {\n      \"suitName\": \"Spades\",\n   \
    \   \"packOrder\": 1,\n      \"cards\": [\n        {\n          \"cardName\":\
    \ \"Ace of Spades\",\n          \"cardImage\": \"ace_of_spades.png\",\n      \
    \    \"suitOrder\": 1,\n          \"cardValue\": 14\n        },\n        {\n \
    \         \"cardName\": \"King of Spades\",\n          \"cardImage\": \"king_of_spades.png\"\
    ,\n          \"suitOrder\": 2,\n          \"cardValue\": 13\n        },\n    \
    \    {\n          \"cardName\": \"Queen of Spades\",\n          \"cardImage\"\
    : \"queen_of_spades.png\",\n          \"suitOrder\": 3,\n          \"cardValue\"\
    : 12\n        },\n        ...\n      ]\n    },\n    {\n      \"suitName\": \"\
    Hearts\",\n      \"packOrder\": 2,\n      \"cards\": [...]\n    },\n    {\n  \
    \    \"suitName\": \"Diamonds\",\n      \"packOrder\": 3,\n      \"cards\": [...]\n\
    \    },\n    {\n      \"suitName\": \"Clubs\",\n      \"packOrder\": 4,\n    \
    \  \"cards\": [...]\n    },\n    {\n      \"suitName\": \"Jokers\",\n      \"\
    packOrder\": 5,\n      \"cards\": [\n        {\n          \"cardName\": \"Black\
    \ Joker\",\n          \"cardImage\": \"black_joker.png\",\n          \"suitOrder\"\
    : 1,\n          \"cardValue\": 1\n        },\n        {\n          \"cardName\"\
    : \"Red Joker\",\n          \"cardImage\": \"red_joker.png\",\n          \"suitOrder\"\
    : 2,\n          \"cardValue\": 2\n        }\n      ]\n    }\n  ]\n}\n```\n\n为了免去你从头创建\
    \ JSON 文件的麻烦，该文件已在可下载的源代码中提供。\n\n模型将以`Dictionaries`的`Array`形式存储在`ViewController`的一个属性中。在类的顶部添加以下代码：\n\
    \n```\nclass ViewController: UIViewController {\n    var suitsArray = [Dictionary<String,\
    \ AnyObject]()\n    ...\n}\n```\n\n这里，你声明了`suitsArray`将是一个`Dictionaries`的数组。每个字典将以`String`作为键，并能存储一个`AnyObject`作为对应的值（这样你就可以存储`Strings`、`Ints`以及其他`Arrays`，稍后你会看到）。\n\
    \n接下来，你需要一个函数来从 JSON 文件加载数据。该函数将从磁盘读取 JSON 文件，并将其解析为字典，存入`suitsArray`数组。\n\n虽然你只是在构建一个简单的示例应用程序，但养成处理错误的好习惯仍然是一个好主意。解析\
    \ JSON 可能有风险；源 JSON 文件可能不存在，也可能无法解析。在这两种情况下，你都需要处理由此产生的错误。\n\n为此，首先添加一个`enum`来描述可能出现的错误情况。在类的顶部，`suitsArray`声明的下方添加以下代码：\n\
    \n```\nenum ParsingError: ErrorType {\n    case MissingJson\n    case JsonParsingError\n\
    }\n```\n\n这声明了一个符合`ErrorType`协议的`enum`。你为这个`enum`将描述的错误创建了两个可能的值：`MissingJson`，用于指示源数据存在问题；`JsonParsingError`，用于指示将\
    \ JSON 解析到`suitsArray`时出现了问题。\n\n现在，在类的底部添加一个名为`setupData()`的新函数，如清单 3-2 所示。\n\
    \n**清单 3-2.** `setupData()` 函数\n\n```\n// MARK:\n// MARK: Data setup\nfunc setupData\
    \ () throws {\n    guard let filePath = NSBundle.mainBundle().pathForResource(\"\
    cards\",\n        ofType: \"json\"), jsonData = NSData(contentsOfFile: filePath)\
    \ else {\n        throw ParsingError.MissingJson\n    }\n\n    do {\n        let\
    \ parsedObject = try NSJSONSerialization.JSONObjectWithData(jsonData,\n      \
    \      options: NSJSONReadingOptions.MutableContainers) as! NSDictionary\n   \
    \     suitsArray = parsedObject[\"suits\"] as! Array\n    } catch {\n        throw\
    \ ParsingError.JsonParsingError\n    }\n}\n```\n\n首先，该函数尝试加载`cards.json`文件。如果找不到该文件或加载时出现问题，它会抛出一个`MissingJson`错误。如果一切正常，JSON\
    \ 将被加载到`jsonData`对象中。\n\n接下来，`jsonData`对象被解析为一个`NSDictionary`。由于这可能会失败，它被包裹在一个`do-catch`块中，如果任何操作失败，该块将抛出一个`JsonParsingError`错误。通过在`JSONObjectWithData`函数前使用`try`关键字，你表明了事情可能会出错。\n\
    \n你还将解析结果强制解包为一个`NSDictionary`。这一步也可能失败，但至少如果其中任一操作出错，你都能处理该错误。\n\n`suitsArray`属性将具有如图\
    \ 3-15 所示的结构。\n\n![A978-1-4842-1242-4_3_Fig15_HTML.jpg](img/A978-1-4842-1242-4_3_Fig15_HTML.jpg)\n\
    \n**图 3-15.** 数据结构\n\n`UICollectionView`中的某个单独分区或项目通过`NSIndexPath`值进行引用。图 3-16\
    \ 展示了`indexPath section`和`row`值如何映射到花色和牌面。\n\n![A978-1-4842-1242-4_3_Fig16_HTML.jpg](img/A978-1-4842-1242-4_3_Fig16_HTML.jpg)\n\
    \n**图 3-16.** 集合分区与行之间的映射\n\n数据模型需要在集合视图开始请求数据之前设置好，因此在`ViewController`的`viewDidLoad`函数中添加对`setupData`函数的调用，如清单\
    \ 3-3 所示。\n\n**清单 3-3.** 更新后的 `viewDidLoad()` 函数\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    // Configure data\n    do {\n        try setupData()\n\
    \    } catch ParsingError.MissingJson {\n        print(\"Error loading JSON\"\
    )\n    } catch ParsingError.JsonParsingError {\n        print(\"Error parsing\
    \ JSON\")\n    } catch {\n        print(\"Something went wrong\")\n    }\n}\n\
    ```\n\n这将`setupData()`函数包裹在一个`do-catch`块中。如果抛出任何错误，都会在此处得到处理。\n\n> **提示**  \n\
    > 你完全可以将这些数据设置代码直接放在`viewDidLoad`函数中，但我更倾向于将这类事务分离到其独立的函数中。这种方法有几个优点。首先，它能让`viewDidLoad`函数保持简洁并易于阅读。其次，如果你能将这种数据设置过程与视图生命周期解耦，那么对视图控制器进行单元测试就会容易得多。\n"
- fmt: "### Setting Up the Collection View in the Storyboard\n\nWith the data set\
    \ up, you can now set about wiring up the interface. This will be very simple,\
    \ with a single collection view that fills the full screen.\n\nIn order to configure\
    \ the collection view, you need to connect it to the view controller, so create\
    \ an `IBOutlet` property in the `ViewController` implementation file:\n\n```\n\
    class ViewController: UIViewController {\n    var suitsArray = [Dictionary<String,\
    \ AnyObject>]()\n    @IBOutlet var collectionView: UICollectionView!\n    ...\n\
    }\n```\n\nNext, switch to the Storyboard and drag a `UICollectionView` object\
    \ from the Object Browser into the view, and let it snap to fill the full screen,\
    \ as shown in Figure 3-17.\n\n![A978-1-4842-1242-4_3_Fig17_HTML.jpg](A978-1-4842-1242-4_3_Fig17_HTML.jpg)\n\
    \n**Figure 3-17.** The `UICollectionView` added to the Storyboard\n\n`UICollectionViews`\
    \ that are dragged into Storyboards come with a single prototype cell (that’s\
    \ the white outline at the top-left of the collection view). You aren’t going\
    \ to need this. You can leave it there, but Xcode will pop up a warning about\
    \ requiring reuse identifiers. To keep the project tidy, highlight the `Collection\
    \ View Cell` item in the Scene tree, and press the Backspace key to delete it.\n\
    \nWith the `UICollectionView` in place, you now need to connect it to the view\
    \ controller’s outlet (drag down from the `File's Owner` placeholder to the collection\
    \ view, and select the `collectionView` outlet from the HUD).\n\nNext, set the\
    \ `File's Owner` placeholder as the `delegate` and `datasource` of the collection\
    \ view (drag from the collection view up to the `File's Owner` placeholder, and\
    \ select the `datasource` and `delegate` outlets from the HUD).\n\nThe final task\
    \ is to set up the collection view’s AutoLayout constraints so that it fills the\
    \ full width and height of the view regardless of the orientation of the device,\
    \ but doesn’t underlap the status bar.\n\nHighlight the Collection View if it’s\
    \ not already selected, and add `Leading`, `Trailing`, `Top`, and `Bottom` constraints\
    \ to it by clicking the Pin button at the bottom of the Storyboard view, as shown\
    \ in Figure 3-18.\n\n![A978-1-4842-1242-4_3_Fig18_HTML.jpg](A978-1-4842-1242-4_3_Fig18_HTML.jpg)\n\
    \n**Figure 3-18.** Adding new constraints\n\nWith those three connections established,\
    \ you can switch back to the `ViewController`’s implementation file and start\
    \ configuring the collection view in code.\n\n### Setting Up the Delegate and\
    \ DataSource Functions\n\nAs with `UITableView`, `UICollectionView` relies on\
    \ the assistance of a `delegate` and a `dataSource` object to provide it with\
    \ cells, supplementary and decoration views, as well as layout and configuration\
    \ information at runtime.\n\nThis can be any class that conforms to the `UICollectionViewDelegate`\
    \ and `UICollectionViewDataSource` protocols. It’s normally regarded as best practice\
    \ to use a separate class to act as `delegate` and `dataSource`, as this means\
    \ that each class has specific role (in software engineering terms, this is the\
    \ Single Responsibility Principle).\n\nIn the projects in later chapters, you’ll\
    \ take this approach, but to keep this one as simple as possible, you’ll use the\
    \ `ViewController`.\n\nBy connecting the collection view’s `delegate` and `dataSource`\
    \ outlets in Interface Builder, you’ve already told the collection view that the\
    \ `ViewController` class will be acting as `delegate` and `dataSource`. Now you\
    \ need to set up the class to do this.\n\nThe first step is to conform the class\
    \ to the three protocols as shown in Listing 3-4.\n\n**Listing 3-4.** The Updated\
    \ `ViewController`\n\n```\nimport UIKit\nclass ViewController: UIViewController,\
    \ UICollectionViewDataSource,\nUICollectionViewDelegate, UICollectionViewDelegateFlowLayout\
    \ {\n    ...\n}\n```\n\nThe third protocol, `UICollectionViewDelegateFlowLayout`,\
    \ extends the `UICollectionViewDelegate` protocol with some optional functions\
    \ that assist `UICollectionViewFlowLayout` with attributes like cell sizes. You’ll\
    \ look at that in a moment, but while you’re updating the header file, it’s as\
    \ good a time as any to add this in.\n\n> **Note:** The `UICollectionViewDelegateFlowLayout`\
    \ is an additional protocol that defines some flow layout-specific functions for\
    \ attributes such as cell sizes. You can think of it as “extending” the `UICollectionDelegate`\
    \ protocol to define the extra functions, similar to adding additional functions\
    \ to a Swift class by adding an extension.\n\nThe `UICollectionViewDataSource`\
    \ protocol is responsible for providing the data and views that the collection\
    \ needs at runtime. At a minimum, you need to implement two functions:\n\n*  \
    \ `collectionView(_:numberOfItemsInSection:)`\n*   `collectionView(_:cellForItemAtIndexPath:)`\n\
    \nThere’s also a third, optional function that you can implement:\n\n*   `numberOfSectionsInCollectionView(_:)`\n\
    \nAs the names suggest, the first function returns the number of items in the\
    \ current section; this will correspond to the number of cards in each suit.\n\
    \nThe second is where you create or dequeue a `UICollectionViewCell`, configure\
    \ its content, and pass it to the `collectionView` that can then display it.\n\
    \nThe third (optional) function returns the number of suits; in your collection\
    \ view, each suit will sit inside its own section.\n\n> **Tip:** Unless you tell\
    \ it otherwise by implementing the `numberOfSectionsInCollectionView(_:)` function,\
    \ the collection view will assume that there’s only one section.\n\n#### The `numberOfSectionsInCollectionView:`\
    \ Function\n\nThe `numberOfSectionsInCollectionView:` function tells the collection\
    \ view how many sections will be needed to display the data contained in the model.\
    \ In your example, this is the number of suits in the deck of cards.\n\nAdd the\
    \ code in Listing 3-5 to the bottom of the `ViewController`.\n\n**Listing 3-5.**\
    \ The `numberOfSectionsInCollectionView:` Function\n\n```\nfunc numberOfSectionsInCollectionView(collectionView:\
    \ UICollectionView) -> Int {\n    return suitsArray.count\n}\n```\n\n> **Tip:**\
    \ When the collection view calls one of these three datasource functions, it passes\
    \ in a reference to itself as one of the parameters. This means that by checking\
    \ which one is being passed in, you can serve multiple collection views with the\
    \ same datasource function(s).\n\n#### The `collectionView:numberOfItemsInSection:`\
    \ Function\n\nNow you can implement the function that determines the number of\
    \ items that will be displayed in each section. With your data model, this will\
    \ be the number of cards in the suit.\n\nAdd the `collectionView:numberOfItemsInSection:`\
    \ function to the bottom of the `ViewController`, as shown in Listing 3-6.\n\n\
    **Listing 3-6.** The `collectionView:numberOfItemsInSection:` Function\n\n```\n\
    func collectionView(collectionView: UICollectionView, numberOfItemsInSection\n\
    section: Int) -> Int {\n    let cardsDictionary = self.suitsArray[section]\n \
    \   let cardsArray = cardsDictionary[\"cards\"] as! NSArray\n    return cardsArray.count\n\
    }\n```\n\nThis function is very straightforward: it gets the dictionary containing\
    \ the suit from the relevant element of the `suitsArray`, then grabs the array\
    \ containing the card items and returns their count."
  raw: '### Setting Up the Collection View in the Storyboard


    With the data set up, you can now set about wiring up the interface. This will
    be very simple, with a single collection view that fills the full screen.


    In order to configure the collection view, you need to connect it to the view
    controller, so create an `IBOutlet` property in the `ViewController` implementation
    file:


    `class ViewController: UIViewController {`


        `var suitsArray = [Dictionary<String, AnyObject>]()`


        `@IBOutlet var collectionView: UICollectionView!`


        `...`


    Next, switch to the Storyboard and drag a `UICollectionView` object from the Object
    Browser into the view, and let it snap to fill the full screen, as shown in Figure
    [3-17](#A978-1-4842-1242-4_3_Chapter.html#Fig17).


    ![A978-1-4842-1242-4_3_Fig17_HTML.jpg](A978-1-4842-1242-4_3_Fig17_HTML.jpg)


    Figure 3-17.


    The UICollectionView added to the Storyboard


    `UICollectionViews` that are dragged into Storyboards come with a single prototype
    cell (that’s the white outline at the top-left of the collection view). You aren’t
    going to need this. You can leave it there, but Xcode will pop up a warning about
    requiring reuse identifiers. To keep the project tidy, highlight the `Collection
    View Cell` item in the Scene tree, and press the Backspace key to delete it.


    With the `UICollectionView` in place, you now need to connect it to the view controller’s
    outlet (drag down from the `File’s Owner` placeholder to the collection view,
    and select the `collectionView` outlet from the HUD).


    Next, set the `File’s Owner` placeholder as the `delegate` and `datasource` of
    the collection view (drag from the collection view up to the `File’s Owner` placeholder,
    and select the `datasource` and `delegate` outlets from the HUD).


    The final task is to set up the collection view’s AutoLayout constraints so that
    it fills the full width and height of the view regardless of the orientation of
    the device, but doesn’t underlap the status bar.


    Highlight the Collection View if it’s not already selected, and add `Leading`,
    `Trailing`, `Top,` and `Bottom` constraints to it by clicking the Pin button at
    the bottom of the Storyboard view, as shown in Figure [3-18](#A978-1-4842-1242-4_3_Chapter.html#Fig18).


    ![A978-1-4842-1242-4_3_Fig18_HTML.jpg](A978-1-4842-1242-4_3_Fig18_HTML.jpg)


    Figure 3-18.


    Adding new constraints


    With those three connections established, you can switch back to the `ViewController`’s
    implementation file and start configuring the collection view in code.


    ### Setting Up the delegate and dataSource Funtions


    As with `UITableView`, `UICollectionView` relies on the assistance of a `delegate`
    and a `dataSource` object to provide it with cells, supplementary and decoration
    views, as well as layout and configuration information at runtime.


    This can be any class that conforms to the `UICollectionViewDelegate` and `UICollectionViewDataSource`
    protocols. It’s normally regarded as best practice to use a separate class to
    act as `delegate` and `dataSource`, as this means that each class has specific
    role (in software engineering terms, this is the Single Responsibility Principle).


    In the projects in later chapters, you’ll take this approach, but to keep this
    one as simple as possible, you’ll use the `ViewController`.


    By connecting the collection view’s `delegate` and `dataSource` outlets in Interface
    Builder, you’ve already told the collection view that the `ViewController` class
    will be acting as `delegate` and `dataSource`. Now you need to set up the class
    to do this.


    The first step is to conform the class to the three protocols as shown in Listing
    [3-4](#A978-1-4842-1242-4_3_Chapter.html#FPar5).


    Listing 3-4. The Updated SCVViewControllerC


    `import UIKit`


    `class ViewController: UIViewController, UICollectionViewDataSource, É`


    `UICollectionViewDelegate, UICollectionViewDelegateFlowLayout {`


    `...`


    The third protocol, `UICollectionViewDelegateFlowLayout`, extends the `UICollectionViewDelegate`
    protocol with some optional functions that assist `UICollectionViewFlowLayout`
    with attributes like cell sizes. You’ll look at that in a moment, but while you’re
    updating the header file, it’s as good a time as any to add this in.


    Note


    The `UICollectionViewDelegateFlowLayout` is an additional protocol that defines
    some flow layout-specific functions for attributes such as cell sizes. You can
    think of it as “extending” the `UICollectionDelegate` protocol to define the extra
    functions, similar to adding additional functions to a Swift class by adding an
    extension.


    The `UICollectionViewDataSource` protocol is responsible for providing the data
    and views that the collection needs at runtime. At a minimum, you need to implement
    two functions:


    *   `collectionView(_:numberOfItemsInSection:)`

    *   `collectionView(_:cellForItemAtIndexPath:)`


    There’s also a third, optional function that you can to implement:


    *   `numberOfSectionsInCollectionView(_:)`


    As the names suggest, the first function returns the number of items in the current
    section; this will correspond to the number of cards in each suit.


    The second is where you create or dequeue a `UICollectionViewCell`, configure
    its content, and pass it to the `collectionView` that can then display it.


    The third (optional) function returns the number of suits; in your collection
    view, each suit will sit inside its own section.


    Tip


    Unless you tell it otherwise by implementing the `numberOfSectionsInCollectionView(_:)`
    function, the collection view will assume that there’s only one section.


    #### The numberOfSectionsInCollectionView: Function


    The `numberOfSectionsInCollectionView` `:` function tells the collection view
    how many sections will be needed to display the data contained in the model. In
    your example, this is the number of suits in the deck of cards.


    Add the code in Listing [3-5](#A978-1-4842-1242-4_3_Chapter.html#FPar8) to the
    bottom of the `ViewController`.


    Listing 3-5. The numberOfSectionsInCollectionView: Function in Objective-C


    `func numberOfSectionsInCollectionView(collectionView: UICollectionView) -> Int
    {`


        `return suitsArray.count`


    `}`


    Tip


    When the collection view calls one of these three datasource functions, it passes
    in a reference to itself as one of the parameters. This means that by checking
    which one is being passed in, you can serve multiple collection views with the
    same datasource function(s).


    #### The collectionView:numberOfItemsInSection: Function


    Now you can implement the function that determines the number of items that will
    be displayed in each section. With your data model, this will be the number of
    cards in the suit.


    Add the `collectionView:numberOfItemsInSection:` function to the bottom of the
    `ViewController`, as shown in Listing [3-6](#A978-1-4842-1242-4_3_Chapter.html#FPar10).


    Listing 3-6. The collectionView:numberOfItemsInSection: Function


    `func collectionView(collectionView: UICollectionView, numberOfItemsInSection
    ➤`


    `section: Int) -> Int {`


        `let cardsDictionary = self.suitsArray[section]`


        `let cardsArray = cardsDictionary["cards"] as! NSArray`


        `return cardsArray.count`


    `}`


    This function is very straightforward: it gets the dictionary containing the suit
    from the relevant element of the `suitsArray`, then grabs the array containing
    the card items and returns their count.'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 在 Storyboard 中设置集合视图\n\
    \n数据设置完成后，您现在可以着手连接界面。这非常简单，只需要一个填充整个屏幕的集合视图即可。\n\n为了配置集合视图，您需要将其连接到视图控制器，因此在\
    \ `ViewController` 的实现文件中创建一个 `IBOutlet` 属性：\n\n```\nclass ViewController: UIViewController\
    \ {\n    var suitsArray = [Dictionary<String, AnyObject>]()\n    @IBOutlet var\
    \ collectionView: UICollectionView!\n    ...\n}\n```\n\n接下来，切换到 Storyboard，从对象浏览器中拖拽一个\
    \ `UICollectionView` 对象到视图中，并让它自动吸附以填充整个屏幕，如图 3-17 所示。\n\n![A978-1-4842-1242-4_3_Fig17_HTML.jpg](img/A978-1-4842-1242-4_3_Fig17_HTML.jpg)\n\
    \n**图 3-17.** 添加到 Storyboard 中的 `UICollectionView`\n\n拖入 Storyboard 的 `UICollectionViews`\
    \ 会自带一个原型单元格（即集合视图左上角的白色轮廓）。您不需要它。您可以将其留在那里，但 Xcode 会弹出警告，要求提供重用标识符。为了保持项目整洁，请在场景树中高亮选中\
    \ `Collection View Cell` 项，然后按退格键将其删除。\n\n`UICollectionView` 就位后，您现在需要将其连接到视图控制器的输出口（从\
    \ `File's Owner` 占位符拖拽到集合视图，然后从 HUD 中选择 `collectionView` 输出口）。\n\n接下来，将 `File's\
    \ Owner` 占位符设置为集合视图的 `delegate` 和 `datasource`（从集合视图向上拖拽到 `File's Owner` 占位符，然后从\
    \ HUD 中选择 `datasource` 和 `delegate` 输出口）。\n\n最后一项任务是设置集合视图的 AutoLayout 约束，使其无论设备方向如何，都能填充视图的完整宽度和高度，但不要与状态栏重叠。\n\
    \n如果集合视图还未被选中，请高亮选中它，然后点击 Storyboard 视图底部的“固定 (Pin)”按钮，为其添加“前导”、“尾随”、“顶部”和“底部”约束，如图\
    \ 3-18 所示。\n\n![A978-1-4842-1242-4_3_Fig18_HTML.jpg](img/A978-1-4842-1242-4_3_Fig18_HTML.jpg)\n\
    \n**图 3-18.** 添加新约束\n\n完成这三个连接后，您可以切换回 `ViewController` 的实现文件，并开始在代码中配置集合视图。\n\
    \n### 设置委托和数据源函数\n\n与 `UITableView` 类似，`UICollectionView` 依赖于 `delegate` 和 `dataSource`\
    \ 对象的协助，为其提供单元格、补充视图和装饰视图，以及在运行时提供布局和配置信息。\n\n这可以是任何遵循 `UICollectionViewDelegate`\
    \ 和 `UICollectionViewDataSource` 协议的类。通常认为最佳实践是使用单独的类来充当 `delegate` 和 `dataSource`，这意味着每个类都有特定的角色（用软件工程术语来说，这就是单一职责原则）。\n\
    \n在后几章的项目中，您会采用这种方法，但为了尽可能简化当前项目，您将使用 `ViewController`。\n\n通过在 Interface Builder\
    \ 中连接集合视图的 `delegate` 和 `dataSource` 输出口，您已经告诉集合视图，`ViewController` 类将扮演 `delegate`\
    \ 和 `dataSource` 的角色。现在您需要设置该类来实现这一功能。\n\n第一步是让该类遵循这三个协议，如代码清单 3-4 所示。\n\n**代码清单\
    \ 3-4.** 更新后的 `ViewController`\n\n```\nimport UIKit\nclass ViewController: UIViewController,\
    \ UICollectionViewDataSource,\nUICollectionViewDelegate, UICollectionViewDelegateFlowLayout\
    \ {\n    ...\n}\n```\n\n第三个协议 `UICollectionViewDelegateFlowLayout`，通过一些可选函数扩展了\
    \ `UICollectionViewDelegate` 协议，这些函数可以辅助 `UICollectionViewFlowLayout` 处理诸如单元格大小等属性。您稍后会看到这个，但在您更新头文件的同时，正好可以把它加进来。\n\
    \n> **注意：** `UICollectionViewDelegateFlowLayout` 是一个额外的协议，它定义了一些特定于流式布局的函数，用于处理诸如单元格大小等属性。您可以将其视为“扩展”了\
    \ `UICollectionDelegate` 协议以定义额外函数，类似于通过添加扩展来为 Swift 类添加额外函数。\n\n`UICollectionViewDataSource`\
    \ 协议负责提供集合在运行时所需的数据和视图。至少，您需要实现两个函数：\n\n*   `collectionView(_:numberOfItemsInSection:)`\n\
    *   `collectionView(_:cellForItemAtIndexPath:)`\n\n还有一个可选的第三个函数可供实现：\n\n*   `numberOfSectionsInCollectionView(_:)`\n\
    \n顾名思义，第一个函数返回当前分区中的项目数量；这对应于每种花色的牌数。\n\n第二个函数是您创建或出列 `UICollectionViewCell`、配置其内容并将其传递给\
    \ `collectionView` 进行显示的地方。\n\n第三个可选函数返回花色的数量；在您的集合视图中，每种花色将位于其自己的分区内。\n\n> **提示：**\
    \ 除非您通过实现 `numberOfSectionsInCollectionView(_:)` 函数另行指定，否则集合视图将假定只有一个分区。\n\n####\
    \ `numberOfSectionsInCollectionView:` 函数\n\n`numberOfSectionsInCollectionView:`\
    \ 函数告诉集合视图需要多少个分区来显示模型中包含的数据。在您的示例中，这对应于一副牌中花色的数量。\n\n将代码清单 3-5 中的代码添加到 `ViewController`\
    \ 的底部。\n\n**代码清单 3-5.** `numberOfSectionsInCollectionView:` 函数\n\n```\nfunc numberOfSectionsInCollectionView(collectionView:\
    \ UICollectionView) -> Int {\n    return suitsArray.count\n}\n```\n\n> **提示：**\
    \ 当集合视图调用这三个数据源函数之一时，它会将自身的引用作为参数之一传递进来。这意味着通过检查传入的是哪个集合视图，您就可以用同一个（或同一组）数据源函数来服务于多个集合视图。\n\
    \n#### `collectionView:numberOfItemsInSection:` 函数\n\n现在，您可以实现确定每个分区中将显示多少个项目的函数了。根据您的数据模型，这将是该花色中牌的数量。\n\
    \n将 `collectionView:numberOfItemsInSection:` 函数添加到 `ViewController` 的底部，如代码清单\
    \ 3-6 所示。\n\n**代码清单 3-6.** `collectionView:numberOfItemsInSection:` 函数\n\n```\n\
    func collectionView(collectionView: UICollectionView, numberOfItemsInSection\n\
    section: Int) -> Int {\n    let cardsDictionary = self.suitsArray[section]\n \
    \   let cardsArray = cardsDictionary[\"cards\"] as! NSArray\n    return cardsArray.count\n\
    }\n```\n\n这个函数非常直接：它从 `suitsArray` 的相应元素中获取包含花色的字典，然后获取包含卡牌对象的数组并返回其数量。\n"
- fmt: "### `collectionView:cellForItemAtIndexPath:` Function\n\nThe `collectionView:cellForItemAtIndexPath:`\
    \ function is where the magic happens. This is the function that is called repeatedly\
    \ by the collection view when it needs a new cell to display, and is responsible\
    \ for either creating or dequeueing a cell, configuring it, and handing that cell\
    \ over to the collection view on demand.\n\nThe question that immediately arises\
    \ is “where does the cell come from in the first place?” Unlike `UITableView`,\
    \ `UICollectionView` doesn’t have any “standard” cell types. You have to create\
    \ them yourself from scratch.\n\nYou can do this in two ways: by creating a nib\
    \ file, or creating a custom `UICollectionViewReusableView` or `UICollectionViewCell`\
    \ subclass. Then when you’re configuring the collection view as it’s instantiated,\
    \ you register the nib file or class together with a cell reuse identifier.\n\n\
    This process of registration tells the collection view where the cells are to\
    \ be sourced from. The reuse identifier acts as a “tag” to tell the different\
    \ cell types apart. Although your simple example only has a single cell type,\
    \ you can have many different kinds to display different types of data within\
    \ the same collection view.\n\nIn the spirit of a simple example, you’re going\
    \ to create a very simple Xib file to contain your `UICollectionViewCell` template.\
    \ Create a new file (File ➤ New ➤ File) and select the View item from the User\
    \ Interface section, as shown in Figure [3-19](#A978-1-4842-1242-4_3_Chapter.html#Fig19).\n\
    \n![A978-1-4842-1242-4_3_Fig19_HTML.jpg](A978-1-4842-1242-4_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19: Selecting a view template\n\nThe device family setting isn’t important,\
    \ so click Next to step through this and then give your new file a name. I’m calling\
    \ mine `CollectionViewCell`. Click the Create button, and you’ll be presented\
    \ with a new `UIView` in the Interface Builder.\n\nSomewhat counterintuitively,\
    \ the first thing you need to do with your new file is delete the view that’s\
    \ been provided for you. Select it in the list of Placeholders, and then press\
    \ the Delete key.\n\nNow find `UICollectionViewCell` in the Object Brower in the\
    \ Utilities area on the right of the Xcode window, and drag it out into the main\
    \ area. You should end up with something looking like Figure [3-20](#A978-1-4842-1242-4_3_Chapter.html#Fig20).\n\
    \n![A978-1-4842-1242-4_3_Fig20_HTML.jpg](A978-1-4842-1242-4_3_Fig20_HTML.jpg)\n\
    \nFigure 3-20: The new `UICollectionViewCell`\n\nNow you need to add a `UIImageView`\
    \ to the cell to display the card, so drag one from the Object Browser and drop\
    \ it into the cell, as shown in Figure [3-21](#A978-1-4842-1242-4_3_Chapter.html#Fig21).\n\
    \n![A978-1-4842-1242-4_3_Fig21_HTML.jpg](A978-1-4842-1242-4_3_Fig21_HTML.jpg)\n\
    \nFigure 3-21: The `UIImageView` inside the cell\n\nNote that the image view is\
    \ bigger than the cell itself. Use AutoLayout constraints to “glue” the image\
    \ view to the cell frame, so that when the cell is resized, the image view will\
    \ grow with it.\n\nSelect the image view in the view tree, click the Pin button\
    \ at the bottom of the Storyboard view, and add four constraints, as shown in\
    \ Figure [3-22](#A978-1-4842-1242-4_3_Chapter.html#Fig22).\n\n![A978-1-4842-1242-4_3_Fig22_HTML.jpg](A978-1-4842-1242-4_3_Fig22_HTML.jpg)\n\
    \nFigure 3-22: Adding constraints to the image view\n\nFinally, select the image\
    \ view again, open the Attributes Inspector if it isn’t visible, and add a tag\
    \ to the image view, as shown in Figure [3-23](#A978-1-4842-1242-4_3_Chapter.html#Fig23).\n\
    \n![A978-1-4842-1242-4_3_Fig23_HTML.jpg](A978-1-4842-1242-4_3_Fig23_HTML.jpg)\n\
    \nFigure 3-23: Adding the tag to the image view\n\n**Caution:** Accessing in-cell\
    \ controls through tags can be a brittle process. It relies on the tag set in\
    \ the Storyboard matching exactly with the tag used to refer to the control in\
    \ the code. If you have a cell with more than a single control, it’s safer to\
    \ connect them via outlets in a custom `UICollectionViewCell` subclass.\n\nThat’s\
    \ it as far as the user interface is concerned. The rest of the configuration\
    \ of your `UICollectionViewCell` will take place in code. Switch back to the `ViewController`’s\
    \ implementation file, and you’re ready to continue.\n\nHaving created the nib\
    \ file containing your cell, you need to register it with the collection view.\
    \ The obvious place to do this is as the view controller loads, so you’re going\
    \ to take the same approach I used to create the data for the collection view,\
    \ and create a separate function that will be called by the view controller’s\
    \ `viewDidLoad` function.\n\nCreate a new function called `configureCollectionView`,\
    \ as shown in Listing 3-7.\n\n**Listing 3-7.** The `configureCollectionView` Function\n\
    \n```\nfunc configureCollectionView() {\n    collectionView.registerNib(UINib(nibName:\
    \ \"CollectionViewCell\", bundle: nil), forCellWithReuseIdentifier: \"CardCell\"\
    )\n}\n```\n\nThis is very simple. You call the `registerNib(_:forCellWithReuseIdentifier:)`\
    \ function on the collection view, and provide it with the name of the nib file\
    \ you just created and the reuse identifier.\n\nHaving created the function, update\
    \ the `viewDidLoad` function so that it’s called as the view controller is loaded,\
    \ as shown in Listing 3-8.\n\n**Listing 3-8.** The updated `viewDidLoad` Function\
    \ in Swift\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n  \
    \  // Do any additional setup after loading the view, typically from a nib.\n\n\
    \    // Configure data\n    do {\n        try setupData()\n    } catch ParsingError.MissingJson\
    \ {\n        print(\"Error loading JSON\")\n    } catch ParsingError.JsonParsingError\
    \ {\n        print(\"Error parsing JSON\")\n    } catch {\n        print(\"Something\
    \ went wrong\")\n    }\n\n    // Configure collection view\n    configureCollectionView()\n\
    }\n```\n\nWith the cell’s nib registered, you’re in a position to implement the\
    \ `collectionView(_:cellForItemAtIndexPath:)` function, as shown in Listing 3-9.\n\
    \n**Listing 3-9.** The `collectionView:cellForItemAtIndexPath:` Function\n\n```\n\
    func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath indexPath:\
    \ NSIndexPath) -> UICollectionViewCell {\n    let cell: UICollectionViewCell =\
    \ collectionView.dequeueReusableCellWithReuseIdentifier(\"CardCell\", forIndexPath:\
    \ indexPath)\n\n    let suitDictionary = suitsArray[indexPath.section]\n    let\
    \ cardsArray = suitDictionary[\"cards\"] as! [Dictionary<String, AnyObject>]\n\
    \    let cardDictionary = cardsArray[indexPath.row]\n    let cardImageName = cardDictionary[\"\
    cardImage\"] as! String\n\n    if let cardImage = UIImage(named: cardImageName)\
    \ {\n        if let imageView = cell.contentView.viewWithTag(1000) as? UIImageView\
    \ {\n            imageView.image = cardImage\n        }\n    }\n\n    return cell\n\
    }\n```\n\nJust like `UITableViews`, `UICollectionView` maintains a queue of cells\
    \ that can be recycled when required to remove the need to maintain one cell per\
    \ item, and to reduce the memory overhead to an absolute minimum.\n\nWhen the\
    \ collection view needs a new cell to display, it calls the `collectionView(_:cellForItemAtIndexPath:)`\
    \ function on its datasource, passing over a reference to itself and the index\
    \ path for which the cell is required.\n\nThe datasource dequeues a cached cell\
    \ of the appropriate type with the `dequeueReusableCellWithReuseIdentifier(_:forIndexPath:)`\
    \ function. If a queued cell is available, it will be returned; otherwise a new\
    \ one will be created in the background.\n\nRegardless of which happens, the collection\
    \ view guarantees that it will return an instance of `UICollectionViewCell` that\
    \ you can then configure with the relevant data for this item.\n\nIt’s worth noting\
    \ that the same datasource can serve several collection views, hence the collection\
    \ view sending a reference to itself along with the request, so that the datasource\
    \ can keep track of which collection view it’s responding to."
  raw: '#### The collectionView:cellForItemForIndexPath: Function


    The `collectionView:` `cellForItemAtIndexPath` `:` function is where the magic
    happens.


    This is the function that is called repeatedly by the collection view when it
    needs a new cell to display, and is responsible for either creating or dequeueing
    a cell, configuring it, and handing that cell over to the collection view on demand.


    The question that immediately arises is “where does the cell come from in the
    first place?” Unlike `UITableView`, `UICollectionView` doesn’t have any “standard”
    cell types. You have to create them yourself from scratch.


    You can do this in two ways: by creating a nib file, or creating a custom `UICollectionViewReusableView`
    or `UICollectionViewCell` subclass. Then when you’re configuring the collection
    view as it’s instantiated, you register the nib file or class together with a
    cell reuse identifier.


    This process of registration tells the collection view where the cells are to
    be sourced from. The reuse identifier acts as a “tag” to tell the different cell
    types apart. Although your simple example only has a single cell type, you can
    have many different kinds to display different types of data within the same collection
    view.


    In the spirit of a simple example, you’re going to create a very simple Xib file
    to contain your `UICollectionViewCell` template. Create a new file (File ➤ New
    ➤ File) and select the View item from the User Interface section, as shown in
    Figure [3-19](#A978-1-4842-1242-4_3_Chapter.html#Fig19).


    ![A978-1-4842-1242-4_3_Fig19_HTML.jpg](A978-1-4842-1242-4_3_Fig19_HTML.jpg)


    Figure 3-19.


    Selecting a view template


    The device family setting isn’t important, so click Next to step through this
    and then give your new file a name. I’m calling mine `CollectionViewCell`. Click
    the Create button, and you’ll be presented with a new `UIView` in the Interface
    Builder.


    Somewhat counterintuitively, the first thing you need to do with your new file
    is delete the view that’s been provided for you. Select it in the list of Placeholders,
    and then press the Delete key.


    Now find `UICollectionViewCell` in the Object Brower in the Utilities area on
    the right of the Xcode window, and drag it out into the main area. You should
    end up with something looking like Figure [3-20](#A978-1-4842-1242-4_3_Chapter.html#Fig20).


    ![A978-1-4842-1242-4_3_Fig20_HTML.jpg](A978-1-4842-1242-4_3_Fig20_HTML.jpg)


    Figure 3-20.


    The new UICollectionViewCell


    Now you need to add a `UIImageView` to the cell to display the card, so drag one
    from the Object Browser and drop it into the cell, as shown in Figure [3-21](#A978-1-4842-1242-4_3_Chapter.html#Fig21).


    ![A978-1-4842-1242-4_3_Fig21_HTML.jpg](A978-1-4842-1242-4_3_Fig21_HTML.jpg)


    Figure 3-21.


    The UIImageView inside the cell


    Note that the image view is bigger than the cell itself. Use AutoLayout constraints
    to “glue” the image view to the cell frame, so that when the cell is resized,
    the image view will grow with it.


    Select the image view in the view tree, click the Pin button at the bottom of
    the Storyboard view, and add four constraints, as shown in Figure [3-22](#A978-1-4842-1242-4_3_Chapter.html#Fig22).


    ![A978-1-4842-1242-4_3_Fig22_HTML.jpg](A978-1-4842-1242-4_3_Fig22_HTML.jpg)


    Figure 3-22.


    Adding constraints to the image view


    Finally, select the image view again, open the Attributes Inspector if it isn’t
    visible, and add a tag to the image view, as shown in Figure [3-23](#A978-1-4842-1242-4_3_Chapter.html#Fig23).


    ![A978-1-4842-1242-4_3_Fig23_HTML.jpg](A978-1-4842-1242-4_3_Fig23_HTML.jpg)


    Figure 3-23.


    Adding the tag to the image view Caution


    Accessing in-cell controls through tags can be a brittle process. It relies on
    the tag set in the Storyboard matching exactly with the tag used to refer to the
    control in the code. If you have a cell with more than a single control, it’s
    safer to connect them via outlets in a custom `UICollectionViewCell` subclass.


    That’s it as far as the user interface is concerned. The rest of the configuration
    of your `UICollectionViewCell` will take place in code. Switch back to the `ViewController`’s
    implementation file, and you’re ready to continue.


    Having created the nib file containing your cell, you need to register it with
    the collection view. The obvious place to do this is as the view controller loads,
    so you’re going to take the same approach I used to create the data for the collection
    view, and create a separate function that will be called by the view controller’s
    `viewDidLoad` function.


    Create a new function called `configureCollectionView`, as shown in Listing [3-7](#A978-1-4842-1242-4_3_Chapter.html#FPar12).


    Listing 3-7. The configureCollectionView Function


    `func configureCollectionView() {`


    `collectionView.registerNib(UINib(nibName: "CollectionViewCell",➤`


    `bundle: nil), forCellWithReuseIdentifier: "CardCell")`


    `}`


    This is very simple. You call the `registerNib(_:forCellWithReuseIdentifier:)`
    function on the collection view, and provide it with the name of the nib file
    you just created and the reuse identifier.


    Having created the function, update the `viewDidLoad` function so that it’s called
    as the view controller is loaded, as shown in Listing [3-8](#A978-1-4842-1242-4_3_Chapter.html#FPar13).


    Listing 3-8. The updated viewDidLoad Function in Swift


    `override func viewDidLoad() {`


    `super.viewDidLoad()`


    `// Do any additional setup after loading the view, typically from a nib.`


    `// Configure data`


    `do {`


    `try setupData()`


    `} catch ParsingError.MissingJson {`


    `print("Error loading JSON")`


    `} catch ParsingError.JsonParsingError {`


    `print("Error parsing JSON")`


    `} catch {`


    `print("Something went wrong")`


    `}`


    `// Configure collection view`


    `configureCollectionView()`


    `}`


    With the cell’s nib registered, you’re in a position to implement the `collectionView(_:cellForItemAtIndexPath:)`
    function, as shown in Listing [3-9](#A978-1-4842-1242-4_3_Chapter.html#FPar14).


    Listing 3-9. The collectionView:cellForItemAtIndexPath: Function


    `func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath
    indexPath: NSIndexPath) -> UICollectionViewCell {`


    `let cell: UICollectionViewCell = collectionView.dequeueReusableCellWithReuseIdentifier("CardCell",
    forIndexPath: indexPath)`


    `let suitDictionary = suitsArray[indexPath.section]`


    `let cardsArray = suitDictionary["cards"] as! [Dictionary<String, AnyObject>]`


    `let cardDictionary = cardsArray[indexPath.row]`


    `let cardImageName = cardDictionary["cardImage"] as! String`


    `if let cardImage = UIImage(named: cardImageName) {`


    `if let imageView = cell.contentView.viewWithTag(1000) as? UIImageView {`


    `imageView.image = cardImage`


    `}`


    `}`


    `return cell`


    `}`


    Just like `UITableViews`, `UICollectionView` maintains a queue of cells that can
    be recycled when required to remove the need to maintain one cell per item, and
    to reduce the memory overhead to an absolute minimum.


    When the collection view needs a new cell to display, it calls the `collectionView(_:cellForItemAtIndexPath:)`
    function on its datasource, passing over a reference to itself and the index path
    for which the cell is required.


    The datasource dequeues a cached cell of the appropriate type with the `dequeueReusableCellWithReuseIdentifier(_:forIndexPath:)`
    function. If a queued cell is available, it will be returned; otherwise a new
    one will be created in the background.


    Regardless of which happens, the collection view guarantees that it will return
    an instance of `UICollectionViewCell` that you can then configure with the relevant
    data for this item.


    It’s worth noting that the same datasource can serve several collection views,
    hence the collection view sending a reference to itself along with the request,
    so that the datasource can keep track of which collection view it’s responding
    to.'
  trans: "\n### `collectionView:cellForItemAtIndexPath:` 函数\n\n`collectionView:cellForItemAtIndexPath:`\
    \ 函数是魔法发生的核心所在。当集合视图需要显示新单元格时，会重复调用此函数，其职责包括创建或复用队列中的单元格、配置该单元格，并根据需求将其交付给集合视图。\n\
    \n随之而来的一个问题是：“单元格最初是从哪里来的？”与`UITableView`不同，`UICollectionView`没有任何“标准”的单元格类型。你必须从头开始自行创建。\n\
    \n有两种实现方式：创建一个 nib 文件，或创建一个自定义的 `UICollectionViewReusableView` 或 `UICollectionViewCell`\
    \ 子类。然后在配置集合视图实例化时，你需要将 nib 文件或类与一个单元格复用标识符（reuse identifier）一起注册。\n\n这个注册过程会告知集合视图单元格的来源位置。复用标识符就像一个“标签”，用于区分不同的单元格类型。尽管你的简单示例只有一种单元格类型，但在同一个集合视图中，你可以拥有多种不同类型的单元格来展示不同类别的数据。\n\
    \n本着简单示例的精神，你将创建一个非常简单的 Xib 文件来包含你的 `UICollectionViewCell` 模板。新建文件（文件 ➤ 新建 ➤ 文件），并从“用户界面”部分选择“视图”项，如图\
    \ 3-19 所示。\n\n![A978-1-4842-1242-4_3_Fig19_HTML.jpg](img/A978-1-4842-1242-4_3_Fig19_HTML.jpg)\n\
    \n图 3-19：选择视图模板\n\n设备系列设置并不重要，因此点击“下一步”跳过此步，然后给你的新文件命名。我将其命名为 `CollectionViewCell`。点击“创建”按钮，你将在界面构建器中看到一个全新的\
    \ `UIView`。\n\n有些反直觉的是，处理新文件的第一步是删除已为你提供的视图。在占位对象列表中选择它，然后按下 Delete 键。\n\n现在，在\
    \ Xcode 窗口右侧“工具区”的对象浏览器中找到 `UICollectionViewCell`，并将其拖拽到主区域。最终你应该得到类似图 3-20 所示的结果。\n\
    \n![A978-1-4842-1242-4_3_Fig20_HTML.jpg](img/A978-1-4842-1242-4_3_Fig20_HTML.jpg)\n\
    \n图 3-20：新的 `UICollectionViewCell`\n\n现在你需要向单元格中添加一个 `UIImageView` 来显示卡片，因此从对象浏览器中拖拽一个并将其放入单元格，如图\
    \ 3-21 所示。\n\n![A978-1-4842-1242-4_3_Fig21_HTML.jpg](img/A978-1-4842-1242-4_3_Fig21_HTML.jpg)\n\
    \n图 3-21：单元格内部的 `UIImageView`\n\n注意图像视图比单元格本身要大。使用自动布局约束将图像视图“粘合”到单元格框架上，这样当单元格调整大小时，图像视图会随之放大。\n\
    \n在视图树中选择图像视图，点击故事板视图底部的“固定”按钮，并添加四个约束，如图 3-22 所示。\n\n![A978-1-4842-1242-4_3_Fig22_HTML.jpg](img/A978-1-4842-1242-4_3_Fig22_HTML.jpg)\n\
    \n图 3-22：向图像视图添加约束\n\n最后，再次选择图像视图，如果属性检查器未显示则将其打开，并为图像视图添加一个标签，如图 3-23 所示。\n\n\
    ![A978-1-4842-1242-4_3_Fig23_HTML.jpg](img/A978-1-4842-1242-4_3_Fig23_HTML.jpg)\n\
    \n图 3-23：为图像视图添加标签\n\n**警告:** 通过标签访问单元格内的控件可能是一个脆弱的流程。它依赖于故事板中设置的标签与代码中引用该控件时使用的标签完全匹配。如果单元格包含多个控件，通过自定义\
    \ `UICollectionViewCell` 子类中的出口（outlet）连接它们会更安全。\n\n就用户界面而言，这就完成了。你的 `UICollectionViewCell`\
    \ 的其余配置将在代码中进行。切换回 `ViewController` 的实现文件，你就可以继续了。\n\n创建包含单元格的 nib 文件后，你需要将其注册到集合视图中。最明显的时机是在视图控制器加载时，因此我将采用与之前创建集合视图数据相同的方法，创建一个独立的函数，由视图控制器的\
    \ `viewDidLoad` 函数调用。\n\n创建一个名为 `configureCollectionView` 的新函数，如代码清单 3-7 所示。\n\
    \n**代码清单 3-7.** `configureCollectionView` 函数\n\n```\nfunc configureCollectionView()\
    \ {\n    collectionView.registerNib(UINib(nibName: \"CollectionViewCell\", bundle:\
    \ nil), forCellWithReuseIdentifier: \"CardCell\")\n}\n```\n\n这非常简单。你在集合视图上调用 `registerNib(_:forCellWithReuseIdentifier:)`\
    \ 函数，并提供刚创建的 nib 文件名和复用标识符。\n\n创建该函数后，更新 `viewDidLoad` 函数，使其在视图控制器加载时被调用，如代码清单\
    \ 3-8 所示。\n\n**代码清单 3-8.** Swift 中更新后的 `viewDidLoad` 函数\n\n```\noverride func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    // 加载视图后的任何额外设置，通常来自 nib。\n\n\
    \    // 配置数据\n    do {\n        try setupData()\n    } catch ParsingError.MissingJson\
    \ {\n        print(\"加载 JSON 出错\")\n    } catch ParsingError.JsonParsingError\
    \ {\n        print(\"解析 JSON 出错\")\n    } catch {\n        print(\"发生未知错误\")\n\
    \    }\n\n    // 配置集合视图\n    configureCollectionView()\n}\n```\n\n在注册了单元格的 nib\
    \ 之后，你就可以实现 `collectionView(_:cellForItemAtIndexPath:)` 函数了，如代码清单 3-9 所示。\n\n\
    **代码清单 3-9.** `collectionView:cellForItemAtIndexPath:` 函数\n\n```\nfunc collectionView(collectionView:\
    \ UICollectionView, cellForItemAtIndexPath indexPath: NSIndexPath) -> UICollectionViewCell\
    \ {\n    let cell: UICollectionViewCell = collectionView.dequeueReusableCellWithReuseIdentifier(\"\
    CardCell\", forIndexPath: indexPath)\n\n    let suitDictionary = suitsArray[indexPath.section]\n\
    \    let cardsArray = suitDictionary[\"cards\"] as! [Dictionary<String, AnyObject>]\n\
    \    let cardDictionary = cardsArray[indexPath.row]\n    let cardImageName = cardDictionary[\"\
    cardImage\"] as! String\n\n    if let cardImage = UIImage(named: cardImageName)\
    \ {\n        if let imageView = cell.contentView.viewWithTag(1000) as? UIImageView\
    \ {\n            imageView.image = cardImage\n        }\n    }\n\n    return cell\n\
    }\n```\n\n`UICollectionView` 与 `UITableView` 类似，会维护一个可回收的单元格队列，以便在需要时重复使用，从而无需为每个项目维护单独的单元格，并将内存开销降至最低。\n\
    \n当集合视图需要显示新单元格时，它会调用其数据源的 `collectionView(_:cellForItemAtIndexPath:)` 函数，并传递一个指向自身的引用以及所需单元格对应的索引路径。\n\
    \n数据源通过 `dequeueReusableCellWithReuseIdentifier(_:forIndexPath:)` 函数出列一个适当类型的缓存单元格。如果队列中有可用单元格，则返回该单元格；否则，会在后台创建一个新的单元格。\n\
    \n无论哪种情况，集合视图都保证会返回一个 `UICollectionViewCell` 实例，然后你可以使用该项目相关的数据进行配置。\n\n值得注意的是，同一个数据源可以为多个集合视图提供服务，因此集合视图在发送请求时会附带一个指向自身的引用，以便数据源能够追踪它正在响应的是哪个集合视图。"
- fmt: 'It’s also at this point that the rationale for the `reuseIdentifier` becomes
    clear. You may have a collection view that displays several types of cells, all
    of which will have a different identifier. By supplying the identifier when you
    ask for a cell to be dequeued, you can control the kind of cell that will be returned.


    With a `UICollectionViewCell` returned, you can now configure it. First, you grab
    the relevant `suitDictionary` from the `suitsArray` by getting the object that
    exists at the index corresponding to the index of the item in the collection view.


    The card details are stored as dictionaries in elements of an array. The index
    of the element you need will correspond to the `row` value of the `indexPath`
    parameter passed into the `cellForItemAtIndexPath` function.


    Having retrieved the `cardDictionary`, you can access the image name through the
    `String` object identified by the `cardImage` key. The PNG image is loaded into
    a `UIImage` object.


    If there is a valid `UIImage` object, then you attempt to access the `UIImageView`
    in the cell. This has a tag of `1000`, so can be accessed through the `contentView`’s
    `viewWithTag()` property.


    As this property returns an optional, you need to check that it’s unwrapped before
    setting its image property to the card image that you just created.


    Finally, the cell is returned to the collection view that’s asking for it.


    Go ahead and run the app. You might be surprised at what you see. It’s not looking
    bad, but something isn’t quite right yet, as you can see in Figure [3-24](#A978-1-4842-1242-4_3_Chapter.html#Fig24).


    ![A978-1-4842-1242-4_3_Fig24_HTML.jpg](A978-1-4842-1242-4_3_Fig24_HTML.jpg)


    Figure 3-24.


    The not-quite-right collection view


    ### Configuring the Layout of the Collection View


    The problem you have right now is that the collection view doesn’t really know
    how it should lay out its items. It does its best, but there’s room for improvement.


    There are two ways of doing this: you could create a `UICollectionViewLayout`
    subclass and apply this to the collection view, or you can take the simpler (but
    ultimately less flexible) approach and configure the collection view directly.


    Because this is a simple app, let’s take the simple approach. Select the collection
    view in the Storyboard, then switch to the Size Inspector. Update the Collection
    View values so they match Figure [3-25](#A978-1-4842-1242-4_3_Chapter.html#Fig25).


    ![A978-1-4842-1242-4_3_Fig25_HTML.jpg](A978-1-4842-1242-4_3_Fig25_HTML.jpg)


    Figure 3-25.


    Adjusted size values


    Now if you run the app again, you’ll see that the item, line, and section spacing
    look much better, as shown in Figure [3-26](#A978-1-4842-1242-4_3_Chapter.html#Fig26).


    ![A978-1-4842-1242-4_3_Fig26_HTML.jpg](A978-1-4842-1242-4_3_Fig26_HTML.jpg)


    Figure 3-26.


    The new spacing values in action


    You may have noticed that you didn’t update the values for the cell size. As it
    turns out, you didn’t need to because the collection view is clever enough to
    fit the cell size to the contents when using a very simple layout like this.


    ### The App in Action


    With all these steps complete, you can now run the app! If you try rotating the
    device or simulator, you’ll see that the collection view layout is automatically
    updated, and the items flow neatly to fill the bounds of the view, as shown in
    Figure [3-27](#A978-1-4842-1242-4_3_Chapter.html#Fig27).


    ![A978-1-4842-1242-4_3_Fig27_HTML.jpg](A978-1-4842-1242-4_3_Fig27_HTML.jpg)


    Figure 3-27.


    The app running in landscape orientation


    ## Summary


    In this chapter, you created a very basic collection view stage by stage:


    * To start, you created some data to display in the collection view.

    * Then, using Interface Builder, you created an instance of `UICollectionView`
    in the window.

    * The view controller conformed to the `UICollectionViewDataSource` and `UICollectionViewDelegate`
    protocols so that it could provide the data for the collection view and responses
    to interaction.

    * You implemented the code required to create cells for the collection view.

    * You tweaked the layout to control how items are laid out within the bounds of
    the collection view.


    This has been an indication of the power of `UICollectionView`. By setting four
    attributes, you created a layout that can handle any number of items of any size
    and any orientation, and do all of this with a tiny memory footprint and smooth
    scrolling performance thanks to the caching of cells.


    The structure of the app that you built here is the basis of all collection view-based
    apps, so you can use this as a starting point for your own projects. As you delve
