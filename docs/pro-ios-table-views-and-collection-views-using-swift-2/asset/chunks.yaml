    \ hTitleConstraint, ➤\n   hSubtitleConstraint, vSubtitleConstraint])\n}\n```\n\
    \n在这里，你通过辅助函数依次创建每个标签，然后设置一些 AutoLayout 约束。一旦标签被添加到 `contentView` 中，就可以应用约束了。\n"
- fmt: "### Overriding the `layoutSubviews` Function\n\nThe `layoutSubviews` function\
    \ is called on the cell when it’s dequeued; it’s an opportunity to tweak the layout\
    \ and look of the cell before it’s drawn, and also to set the content of any controls\
    \ based on the data model passed into the cell.\n\nTo show how this works in practice,\
    \ let’s look at the `cellForItemAtIndexPath:` function from the collection view\
    \ app’s `viewController` class, in Listing [8-11].\n\n**Listing 8-11.** The Collection\
    \ View’s `cellForItemAtIndexPath:` Function\n```\nfunc collectionView(collectionView:\
    \ UICollectionView, cellForItemAtIndexPath\nindexPath: NSIndexPath) -> UICollectionViewCell\
    \ {\n    let cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"CustomCVCell\"\
    ,\nforIndexPath: indexPath) as! CustomCell\n    cell.cellTitle = cvData[indexPath.row]\n\
    \    return cell\n}\n```\nYou’ve seen this pattern before. You’re dequeuing a\
    \ cell with the cell identifier, and then downcasting it to an instance of your\
    \ custom class.\n\nThis allows you to access the properties of the cell and pass\
    \ in the relevant object from the data model, before returning the cell to the\
    \ collection view.\n\n**Listing 8-12.** The Collection View’s `cellForItemAtIndexPath:`\
    \ Function\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath)\n-> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CustomTVCell\",\n    forIndexPath: indexPath) as! CustomClassCell\n    cell.cellTitle\
    \ = \"Cell \\(tableData[indexPath.row])...\"\n    cell.cellSubtitle = \"...\\\
    (tableData[indexPath.row]) lleC\"\n    return cell\n}\n```\nBehind the scenes,\
    \ the cell’s `init` and `layoutSubviews` functions are being called:\n\n- The\
    \ `init` function is called when a new instance of the cell is instantiated. This\
    \ will only happen when the first few cells are created; after that, the table\
    \ or collection view will cache cells for reuse once they scroll off the top or\
    \ bottom of the view.\n- The `layoutSubviews` function is called just before the\
    \ cell is displayed, so this is where you update the cell controls to display\
    \ the data that was passed into the cell when it was dequeued.\n\n### Overriding\
    \ the `prepareForReuse` Function\n\nThe `prepareForReuse()` function is called\
    \ just before the cell is returned from the `dequeueReusableCellWithIdentifier:`\
    \ or `dequeueReusableViewWithIdentifier:` functions.\n\nIt’s a last chance to\
    \ clean the cell up before it’s reused, but there are a couple of things to bear\
    \ in mind when overriding this function:\n\n- Always make sure that you call the\
    \ superclass implementation at the start of the function with `super.prepareForReuse()`\n\
    - Only use this function to reset non-content properties of the cell – alpha,\
    \ editing or selection properties. Using it to change content-related outlets\
    \ can have an adverse impact on performance.\n\n## Improving the App’s Architecture\
    \ with MVVM\n\n`UITableView` and `UICollectionView` are complex beasts, and rely\
    \ on a lot of “moving parts” to function: table and collection view objects, cells,\
    \ datasources, delegates, and view controllers. All of them have to coordinate\
    \ to produce the desired effect.\n\nThe number of moving parts can lead to blurred\
    \ responsibilities within your app’s classes. For example, a very common pattern\
    \ that you’ve seen several times so far is where a `UIViewController` acts as\
    \ the `dataSource` and `delegate` for a table or collection view.\n\nThere’s nothing\
    \ wrong with this per se, but a class that does several things is usually regarded\
    \ as a code smell: it’s harder to write, harder to understand after you’ve written\
    \ it, harder to test, and harder to debug.\n\nOne of the most important design\
    \ patterns in object-oriented software is the single responsibility principle,\
    \ which can be summed up as “do one thing, and do it well.” The model-view-view\
    \ model (or MVVM) approach is one way of attempting this.\n\n### The Model-View-View\
    \ Model Approach\n\nTo understand the MVVM model, it’s worth starting by looking\
    \ at the “traditional” approach to structuring a table view project.\n\n> **Note:**\
    \ I’m going to illustrate the MVVM approach with a `UITableView` example, but\
    \ everything that applies to MVVM in a table view context also applies to MVVM\
    \ and `UICollectionView`.\n\nThe split between controller and view is reasonably\
    \ obvious: the table is the view, and the view controller that acts as the table’s\
    \ datasource and delegate is the controller.\n\nBut views are a little more complicated\
    \ than that; cells are also view objects, and the data source has to be aware\
    \ of cells in order to configure them in the `tableView:cellForRowAtIndexPath:`\
    \ function. This means that the datasource has to be concerned with the internal\
    \ structure of the cells so it can set outlets.\n\nIf you change your data model,\
    \ you must change both cell and datasource. If you have multiple cell types, your\
    \ `cellForRowAtIndexPath:` function can quickly become messy with if-then statements\
    \ checking which kind of cell is being configured. Big, complex logic statements\
    \ like this are a code smell: hard to read, hard to understand, hard to test,\
    \ and hard to debug.\n\nMVVM changes this approach radically, but with one very\
    \ simple change.\n\nYou start by focusing the responsibility of the datasource.\
    \ It does two things: gets the relevant object from the underlying data model,\
    \ and passes it to a cell before handing the cell off to the table. It neither\
    \ knows nor cares about the internal structure of the cell; as far as the datasource\
    \ is concerned, the cell has a single property that can be set, the view model.\n\
    \nThe view model is the object that contains all the data that the cell will require\
    \ to configure itself. In an address book app, this might be a `Contact` object\
    \ containing name, phone numbers, and email addresses. Crucially, it’s not tailored\
    \ in any way to the specific needs of the cell. Even if the cell will only be\
    \ displaying phone numbers, you pass the whole `Contact` object into the cell\
    \ subclass.\n\n**Figure 8-13** shows how the model, the view model, and the controllers\
    \ interrelate.\n\n![A978-1-4842-1242-4_8_Fig13_HTML.jpg](A978-1-4842-1242-4_8_Fig13_HTML.jpg)\n\
    \n**Figure 8-13.** The model-view-view model relationship\n\nThe cell is responsible\
    \ for managing its own layout. It will take the relevant attributes of the view\
    \ model, say the phone number fields, and ignore the others. It will use the relevant\
    \ attributes to set up its view outlets, text field contents, and so on, as well\
    \ as handling AutoLayout constraints and so on. You can even go one stage further\
    \ and use a property observer so that the layout processes are triggered automatically\
    \ whenever the view model property is set."
