  raw: '### Controlling Insertion and Removal Animations


    Currently, the insertion and removal animations are controlled by the collection
    view itself. It uses standard timing and easings. This might be fine for some
    projects, but it would be nice to add a bit more control over them.


    The key to this is to wrap the `insertItemsAtIndexPaths`and `removeItemsAtIndexPaths`
    function inside a `UIView` animation block.


    Listing [17-21](#A978-1-4842-1242-4_17_Chapter.html#FPar22) shows an example of
    the kind of effect that you can achieve.


    Listing 17-21. Custom Insertion Animations


    `UIView.animateWithDuration(1.0, ➤`


        `delay: 0.0, ➤`


        `usingSpringWithDamping: 0.6, ➤`


        `initialSpringVelocity: 0.0, ➤`


        `options: UIViewAnimationOptions.CurveEaseIn, ➤`


        `animations: { () -> Void in`


                `// Insert items into collection view`


                `self.collectionView.insertItemsAtIndexPaths([newItemIndexPath])`


        `}) { (finished) -> Void in`


           `// block to run when animations complete`


        `}`


    The syntax could perhaps be a little clearer, but what you’re doing here is


    *   Setting an animation duration of 1 second: `animateWithDuration(1.0`

    *   Providing no delay before starting the animation: `delay: 0.0`

    *   Using the spring capabilities of `UIKitDynamics` to add some bounce: `usingSpringWithDamping:
    0.6,` `initialSpringVelocity: 0.0`

    *   Using a `CurveEaseInOut` easing curve to start the animation slowly, speed
    it up, and then slow down again before it completes: `options: UIViewAnimationOptions.CurveEaseIn`


    It’s difficult to show the effect of animations on the printed page or static
    screen, but if you run the project now, you’ll see that the items appear with
    a smooth animation and a very satisfying bounce effect.


    Beware–it’s possible to spend hours tweaking animations to get that perfect bounce!


    ## Summary


    Gestures and animations can be used to bring your collection views to life, both
    deepening the interactions available and enhancing the user experienced with animations.


    By creating gesture recognizers that capture user input, it’s possible to interactively
    update collection views by manipulating layout attributes. This provides the possibility
    for interfaces that allow users to interact directly with data and controls.


    By adding animation effects to insertion and deletions, the user experience delivered
    by your collection views can be enhanced. This can also be used as a tool to emphasize
    information and interaction possibilities. The powerful iOS animation APIs allow
    you to create fluid and engaging interfaces with ease.'
  trans: "\n### 控制插入和移除动画\n\n目前，插入和移除动画由集合视图本身控制，它使用标准的持续时间和缓动曲线。这对某些项目来说可能没问题，但如果能对它们有更多一点的控制权就更好了。\n\
    \n实现这一点的关键在于将 `insertItemsAtIndexPaths` 和 `removeItemsAtIndexPaths` 函数包裹在 `UIView`\
    \ 动画块内。\n\n清单 17-21 展示了一个你可以实现的效果示例。\n\n**清单 17-21.** 自定义插入动画\n\n```swift\nUIView.animateWithDuration(1.0,\n\
    \    delay: 0.0,\n    usingSpringWithDamping: 0.6,\n    initialSpringVelocity:\
    \ 0.0,\n    options: UIViewAnimationOptions.CurveEaseIn,\n    animations: { ()\
    \ -> Void in\n        // 向集合视图中插入项目\n        self.collectionView.insertItemsAtIndexPaths([newItemIndexPath])\n\
    \    }) { (finished) -> Void in\n       // 动画完成时执行的代码块\n    }\n```\n\n语法或许可以更清晰一些，但你在这里所做的是：\n\
    \n- 设置动画持续时间为 1 秒：`animateWithDuration(1.0)`\n- 在开始动画前不设置延迟：`delay: 0.0`\n- 使用\
    \ `UIKitDynamics` 的弹性功能添加一些弹跳效果：`usingSpringWithDamping: 0.6`，`initialSpringVelocity:\
    \ 0.0`\n- 使用 `CurveEaseInOut` 缓动曲线，使动画开始缓慢，然后加速，最后在完成前再次减速：`options: UIViewAnimationOptions.CurveEaseIn`\n\
    \n在纸面或静态屏幕上很难展示动画的效果，但如果你现在运行项目，你会看到项目以平滑的动画出现，并伴有非常令人满意的弹跳效果。\n\n请注意——你可能会花费数小时来调整动画以获得完美的弹跳效果！\n\
    \n## 总结\n\n手势和动画可以用来让你的集合视图活起来，既能加深可用的交互，也能通过动画增强用户体验。\n\n通过创建捕获用户输入的手势识别器，可以操作布局属性来交互式地更新集合视图。这为实现允许用户直接与数据和控件进行交互的界面提供了可能性。\n\
    \n通过为插入和删除操作添加动画效果，可以增强集合视图所提供的用户体验。这也可以用作强调信息和交互可能性的工具。强大的 iOS 动画 API 使您能够轻松创建流畅且引人入胜的界面。\n"
