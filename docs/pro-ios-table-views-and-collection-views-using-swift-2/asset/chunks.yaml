- fmt: '### Collection View Items


    Collection view items are instances of `UICollectionReusableView` or its subclasses.
    They play one of three roles:


    - **Item cells**, which are created as instances of `UICollectionViewCell`. These
    are analogous to the cells of a table view, and are used to display the main data
    items. In a gallery app, for example, the cells might display thumbnail images
    of the photos in an album.

    - **Supplementary views**, which are instances of `UICollectionReusableView`.
    These are entirely optional and can have a variety of purposes. In grid-type layouts,
    such as a photo gallery, they’re often used to provide metadata about sections
    by acting as headers and footers (album names, for example). In more complex layouts,
    they can be used to display additional information about items, such as image
    metadata.

    - **Decoration views**, which are also instances of `UICollectionReusableView`
    (and also optional). These are independent of the collection view’s model and
    don’t display any data. Typically they are used to display visual elements such
    as backgrounds.


    Figure 4-5 shows the conceptual parts of a collection view with a grid layout,
    with the various types of view highlighted.


    ![A978-1-4842-1242-4_4_Fig5_HTML.jpg](A978-1-4842-1242-4_4_Fig5_HTML.jpg)


    *Figure 4-5. The basic anatomy of a collection view*


    Figure 4-6 shows a collection view in action in the iOS iBooks app. It uses cells
    to show the book covers, supplementary views that contain the download control,
    and a decoration view to provide the background gradient "shelf" effect.


    ![A978-1-4842-1242-4_4_Fig6_HTML.jpg](A978-1-4842-1242-4_4_Fig6_HTML.jpg)


    *Figure 4-6. The iBooks app*


    Unlike `UITableViewCell`, `UICollectionViewCell` doesn’t have any predefined cell
    types. Instead you get an empty `contentView` into which you can place your own
    controls. For this reason, when you’re building collection views you’ll always
    end up creating at least one cell object.


    Cells can be created in several ways:


    - Visually as prototype cells in a Storyboard

    - Visually as a collection view cell in its own `.xib` file

    - In code, by configuring a "standard" instance of `UICollectionViewCell`

    - As a custom `UICollectionViewCell` subclass


    We’ll look at all four approaches in later chapters.


    ### Collection View Layouts


    Unlike table views, collection views don’t know anything about how to lay out
    the positioning of their items. Instead, they rely on a separate object, a collection
    view layout, to determine the attributes of each item at any given moment. The
    collection view then uses those attributes to figure out where each item should
    appear and how it should look.


    The layout of a collection view is a subclass of `UICollectionViewLayout` and
    is responsible for calculating the overall content size of the collection view,
    together with the layout attributes for each individual item whenever the collection
    view requests it.


    These control every aspect of the display and placement of the item: frame, bounds,
    center, size, transform, `transform3D`, alpha, z-index, and visibility. By manipulating
    these, it’s possible to design layouts that can range from simple rows and columns
    of items to complex, animated interactive 3D arrangements.


    Attributes can be requested individually for a specific item, or en-masse for
    all the items contained within a specific part of the collection view’s content
    area. Performing the calculations involved efficiently plays a major part in ensuring
    collection view performance.


    Because the row-and-column layout is such a common one, `UIKit` ships with a predefined
    `UICollectionViewLayout` subclass called `UICollectionViewFlowLayout`. It implements
    a "line-breaking" layout of horizontal or vertical rows of items, and it takes
    care of figuring out the positioning of line breaks for you. This removes a significant
    amount of the heavy lifting involved in setting up collection view layouts, and
    can also be subclassed to get finer degrees of control.


    We’ll look at collection view layouts in detail in Chapters 15 and 16.


    ### The Supporting Objects in Detail


    The collection view control itself is pretty dumb, and relies on the support of
    five other objects in order to display its data:


    - View controller

    - Model

    - Datasource

    - Delegate

    - Layout


    Each object has a specific role to play supporting the collection view, and their
    organization is based on the model-view-controller architecture. Figure 4-7 shows
    how the five objects interrelate.


    ![A978-1-4842-1242-4_4_Fig7_HTML.jpg](A978-1-4842-1242-4_4_Fig7_HTML.jpg)


    *Figure 4-7. How the collection view and supporting objects interrelate*


    #### The Collection View’s Model


    The model contains the data that will be displayed in the collection view through
    the data source. As the name suggests, it’s part of the model component of the
    model-view-controller architecture.


    Models can take many forms; the form will depend on the way that the data in your
    app needs to be managed. At its simplest, the model may be a one-dimensional array
    that contains a set of `Strings`. More complex models may involve two-dimensional
    arrays to split the data into sections, or could retrieve data from a local persistent
    database or an external network source.


    Regardless of what form the model takes, it doesn’t communicate directly with
    the collection view. That’s the role of the data source.


    #### The Collection View’s Data Source


    The responsibility of the data source object is to supply the collection view
    with cells, supplementary views, and decoration views when requested so that they
    can be displayed by the collection view. It forms the other part of the model
    component of the model-view-controller architecture, and mediates between the
    underlying data in the model and the collection view itself.


    The relationship between the collection view and its data source is defined by
    the `UICollectionViewDataSource` protocol. There are mandatory methods that the
    collection view’s data source must implement, and some optional ones.


    The data source can be a standalone class that conforms to the `UICollectionViewDataSource`
    protocol, or it can be the collection view’s view controller.


    There are no hard and fast rules about which approach is correct. Splitting the
    functionality out into a separate class can help to keep your app well-structured,
    but regardless of how it’s implemented, it’s vitally important that the data source
    is able to return data to the collection view as fast as possible in order to
    maximize performance.


    #### The Collection View’s Delegate


    Handling user interaction with the collection view is the responsibility of the
    delegate object, which forms one part of the controller component of the model-view-controller
    architecture.


    The delegate is a class that implements some or all of the methods defined by
    the `UICollectionViewDelegate` protocol. These handle selection and highlighting
    of the collection view’s items.


    There are no mandatory methods in the `UICollectionViewDelegate` protocol, so
    a collection view doesn’t necessarily need a `delegate` object in order to operate.


    Just like the datasource, the delegate is often the `UIViewController` subclass
    that manages the view in which the collection view lives. However, there’s no
    reason why that has to be the case. It can help keep classes to a manageable size
    if you create a standalone class to act as the delegate.


    We’ll look at both data source and delegates in more detail in Chapter 5.'
