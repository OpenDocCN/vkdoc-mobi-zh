    `override func layoutAttributesForElementsInRect(rect: CGRect) ➤`


      `-> [UICollectionViewLayoutAttributes]? {`


        `// As all elements will be shown, return all of them`


        `return layout` `Attributes`


    `}`'
  trans: "\n### 计算中心点\n\n计算项目的中心点是涉及数学运算最多的功能，但并没有看起来那么复杂。请添加如代码清单 17-8 所示的函数。\n\n\
    **代码清单 17-8.** 计算项目中心点\n\n```\nfunc calculateCenterForItemAtIndexPath(indexPath:\
    \ NSIndexPath) -> CGPoint {\n    // 如果只有一个项目，则应将其居中\n    if (collectionView!.numberOfItemsInSection(0)\
    \ == 1) {\n        return calculateCenterForFirstItem()\n    }\n    // 获取该项目对应的角位移\n\
    \    let angularDisplacement: CGFloat = calculateRotationPerItem()\n    // 计算该项目所需的旋转角度\n\
    \    let theta = (angularDisplacement * CGFloat(indexPath.row))\n    // 利用三角函数计算将项目沿辐条半径的圆移动\n\
    \    // 所需的 x 和 y 位移\n    let xDisplacement = CGFloat(sinf(Float(theta))) * calculateSpokeRadius()\n\
    \    let yDisplacement = CGFloat(cosf(Float(theta))) * calculateSpokeRadius()\n\
    \    // 计算小时标签块的中心点\n    let xPosition = (collectionView!.bounds.size.width/2)\
    \ + xDisplacement\n    let yPosition = (collectionView!.bounds.size.width/2) -\
    \ yDisplacement\n    return CGPointMake(xPosition, yPosition)\n}\n```\n\n首先，需要处理集合视图中只有一个项目的特殊情况。在这种情况下，您希望将项目放置在集合视图的中心：\n\
    \n```\nif (collectionView!.numberOfItemsInSection(0) == 1) {\n    return CGPointMake(collectionView!.bounds.size.width\
    \ / 2, collectionView!.bounds.size.height/2)\n}\n```\n\n现在，您可以计算该项目绕集合视图中心旋转的角度。\n\
    \n图 17-6 展示了旋转角度是如何计算的。\n\n![A978-1-4842-1242-4_17_Fig6_HTML.jpg](img/A978-1-4842-1242-4_17_Fig6_HTML.jpg)\n\
    \n**图 17-6.** 计算角度旋转\n\n这实现为一个独立的函数，如代码清单 17-9 所示。\n\n**代码清单 17-9.** 计算每个项目的旋转角度\n\
    \n```\nfunc calculateRotationPerItem() -> CGFloat {\n    // 如果只有一个项目，则不应旋转\n \
    \   if (collectionView!.numberOfItemsInSection(0) == 1) {\n        return 0.0;\n\
    \    }\n    // 否则，旋转角度为 360 / 项目总数\n    // （由于我们处理的是弧度，因此为 2Pi / 项目总数）\n    return\
    \ ( CGFloat(2 * M_PI) / CGFloat(collectionView!.numberOfItemsInSection(0)))\n\
    }\n```\n\n再次强调，集合视图中只有一个项目的情况属于特殊情况；不涉及旋转。\n\n假设有多个项目，则每个项目的旋转角度为 `2π` 除以项目数量（`2π`\
    \ 是整个圆的弧度数；iOS 在三角函数计算中使用弧度）。\n\n回顾 `calculateCenterForItemAtIndexPath:` 函数，您会看到还需要实现另一个辅助函数。它的作用是计算圆的半径：取集合视图高度和宽度中较小的那个值。\n\
    \n添加代码清单 17-10 中的函数。\n\n**代码清单 17-10.** 计算圆半径\n\n```\nfunc calculateSpokeRadius()\
    \ -> CGFloat {\n    // 计算连接项目中心与集合视图中心的“辐条”半径\n    // 找出较短的一边，以防\n    // collectionView\
    \ 不是正方形\n    let shorterSide = min(collectionView!.bounds.size.width, collectionView!.bounds.size.height)\n\
    \    let collectionViewAllowance = shorterSide / 2\n    let itemWidthAllowance\
    \ = itemSize.width / 2\n    // 调整侧边距（如果有）\n    return (collectionViewAllowance\
    \ - (itemWidthAllowance + sidePadding))\n}\n```\n\n在这里，您获取集合视图较短边的长度，然后根据项目宽度以及项目与集合视图边框之间的任何内边距进行调整。\n\
    \n`calculateSpokeRadius` 函数返回的值被 `calculateCenterForItemAtIndexPath:` 函数用来计算集合视图中心与项目中心之间的水平和垂直距离：\n\
    \n```\nlet xDisplacement = CGFloat(sinf(Float(theta))) * calculateSpokeRadius()\n\
    let yDisplacement = CGFloat(cosf(Float(theta))) * calculateSpokeRadius()\n```\n\
    \n这需要一点高中数学知识，并使用了 `sinf` 和 `cosf` 三角函数。所涉及的角度构成了一个直角三角形。这与您在第 16 章中使用的是相同的技术，如果需要复习，可以回头查看。\n\
    \n计算出距离后，您现在可以计算项目的中心坐标：\n\n```\nlet xPosition = (collectionView!.bounds.size.width/2)\
    \ + xDisplacement\nlet yPosition = (collectionView!.bounds.size.width/2) - yDisplacement\n\
    ```\n\n现在将整个属性集返回给调用函数：\n\n```\nreturn CGPointMake(xPosition, yPosition)\n```\n\
    \n完成所有这些设置后，您就可以计算集合视图中任何项目的属性了。现在，您需要实现一些函数，以便在需要时将这些属性返回给集合视图。\n\n### 向集合视图提供属性\n\
    \n向集合视图提供项目属性的过程可以在以下四个阶段之一进行：\n\n- **批量提供**，即集合视图会询问给定 `CGRect` 内所有项目的属性。由于您的集合视图始终完全可见，实际上就是要求提供所有项目的属性。\n\
    - **单独提供**，即集合视图提供一个 `NSIndexPath`，并期望返回相应项目的属性。\n- **插入项目期间**，集合视图会询问即将出现项目的初始属性。集合视图将负责在初始属性和项目在集合视图中停留期间将使用的属性之间进行插值。\n\
    - **移除项目期间**，集合视图会询问即将被移除的项目的最终属性。与初始属性类似，集合视图将负责从项目的当前状态插值到其最终值。\n\n让我们逐一处理这些情况。\n\
    \n### 批量提供属性\n\n布局需要实现 `layoutAttributesForElementInRect:` 函数，该函数接收一个 `CGRect`\
    \ 参数，并负责确定哪些元素适合该矩形区域并返回它们的属性。这些属性以 `UICollectionViewLayoutAttributes` 的 `Array`\
    \ 形式返回。\n\n关于此函数有几点需要注意。首先，您有责任确定哪些元素出现在所提供的 `CGRect` 中。集合视图并不知道这一点，并且在滚动时可能会反复向布局请求此信息。\n\
    \n其次，元素指的是单元格、补充视图和装饰视图。如果您的集合视图使用了这些项目，您需要确定哪些在 `CGRect` 内可见并返回它们的属性。\n\n在这种情况下，事情稍微简单一些。您只有单元格，而且集合视图不会滚动。因此，您可以简单地返回您拥有的所有属性，如代码清单\
    \ 17-11 所示。\n\n**代码清单 17-11.** `layoutAttributesForElementsInRect:` 函数\n\n```\n\
    override func layoutAttributesForElementsInRect(rect: CGRect) -> [UICollectionViewLayoutAttributes]?\
    \ {\n    // 由于所有元素都将显示，返回所有元素\n    return layoutAttributes\n}\n```\n"
- fmt: "#### Supplying Individual Item Attributes\n\nThe contrasting function to `layoutAttributesForElementsInRect`\
    \ is `layoutAttributesForItemAtIndexPath`. It receives an `NSIndexPath` as a parameter.\
    \ The calling code will expect an optional `UICollectionViewLayoutAttributes`\
    \ instance.\n\nThere are two ways to implement this function: either by calculating\
    \ the attributes on the fly when they’re requested, or calculating them upfront\
    \ while preparing the layout, storing them, and returning the pre-calculated values\
    \ in response to `layoutAttributesForItemAtIndexPath`.\n\nWhich approach is the\
    \ right one will depend on the situation. If your layout is very dynamic and the\
    \ calculation isn’t too expensive, there may be no reason to prematurely optimize.\
    \ The flip side to this if the calculations require heavyweight calculations,\
    \ or are simply not going to change very often.\n\nBear in mind that this function\
    \ is called by the `collectionView` while it’s drawing the items, so a slow response\
    \ could result in choppy scrolling. If you are having problems with scrolling\
    \ performance, you might want to take a closer look at this function.\n\nYou’re\
    \ using the prepare-everything-upfront approach, so your function is simple and\
    \ is shown in Listing [17-12](#A978-1-4842-1242-4_17_Chapter.html#FPar13).\n\n\
    Listing 17-12. The `layoutAttributesForItemAtIndexPath`\n\n```\noverride func\
    \ layoutAttributesForItemAtIndexPath(indexPath: NSIndexPath) -> ➤\n  UICollectionViewLayoutAttributes?\
    \ {\n    // Return the layout attributes for the specific item\n    return layoutAttributes[indexPath.row]\n\
    }\n```\n\n#### Supplying Initial Layout Attributes\n\nUp to now, you’ve been implementing\
    \ required functions to return `UILayoutAttributes` to the collection view. If\
    \ you don’t supply initial attributes, then the collection view will use what\
    \ it’s given from the previous two functions to place the item. If the item is\
    \ newly added, it will appear in the correct place immediately.\n\nIf you want\
    \ the initial attributes to differ–in your case, to have items appear at the center\
    \ of the collection view and be animated into position–then you need to supply\
    \ a set of initial attributes by implementing the `initialLayoutAttributesForAppearingItemAtIndexPath`\
    \ function.\n\nIf you don’t implement this function, the collection view won’t\
    \ get any initial attributes and will go on to ask for attributes by calling the\
    \ `layoutAttributesForItemAtIndexPath` function.\n\nAny `UICollectionViewLayoutAttribute`,\
    \ built-in or custom, can be included in the initial set. In your case, you’re\
    \ going to supply the center and alpha attributes, so that the item appears in\
    \ the center and appears to fade in as it animates out towards the circle.\n\n\
    Before the collection view asks for initial attributes, it will call the `prepareForCollectionViewUpdates`\
    \ function, supplying an `Array` of `UICollectionViewLayoutUpdateItems`. Any item\
    \ that will be affected by the update will have a corresponding `UICollectionViewLayoutUpdateItems`,\
    \ which has three properties:\n\n- `indexPathBeforeUpdate`: This is an `NSIndexPath`\
    \ that contains the index path of the item at the start of the update. In the\
    \ case of an item being inserted, this will be empty. If the item is being removed,\
    \ it will contain the current index path.\n- `indexPathAfterUpdate`: This is an\
    \ `NSIndexPath` that contains the index path of the item at the end of the update.\
    \ In the case of an item being removed, this will be empty. If the item is being\
    \ added, it will contain the target index path where the item will end up.\n-\
    \ `updateAction`: This contains a `UICollectionUpdateAction` constant indicating\
    \ the action that’s being performed on the item: `Insert`, `Delete`, `Reload`,\
    \ `Move`, or `None`.\n\nYou need to check what’s going on with the item being\
    \ inserted or removed, so add a property to store the details:\n\n`var indexPathsBeingUpdated\
    \ = [UICollectionViewUpdateItem]()`\n\nNow add the function shown in Listing [17-13](#A978-1-4842-1242-4_17_Chapter.html#FPar14).\n\
    \nListing 17-13. The `prepareForCollectionViewUpdates` Function\n\n```\noverride\
    \ func prepareForCollectionViewUpdates(updateItems: ➤  [UICollectionViewUpdateItem])\
    \ {\n    indexPathsBeingUpdated = updateItems\n}\n```\n\nThis simply copies the\
    \ array and stores it in the `indexPathsBeingUpdated` property.\n\nNow you’re\
    \ ready to implement the `initialLayoutAttributesForAppearingItemAtIndexPath`,\
    \ as shown in Listing [17-14](#A978-1-4842-1242-4_17_Chapter.html#FPar15).\n\n\
    Listing 17-14. The `initialLayoutAttributesForAppearingItemAtIndexPath` Function\n\
    \n```\noverride func initialLayoutAttributesForAppearingItemAtIndexPath(itemIndexPath:\
    \ ➤\nNSIndexPath) -> UICollectionViewLayoutAttributes? {\n    // Check to see\
    \ if this indexPath is in the BeingUpdated list\n    // if it isn’t, we can just\
    \ bail out\n    let indexFound = indexPathsBeingUpdated.indexOf { (element) ->\
    \ Bool in\n        element.indexPathAfterUpdate == itemIndexPath\n    }\n\n  \
    \  if indexFound == nil {\n        return layoutAttributes[itemIndexPath.row]\n\
    \    }\n\n    let attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath:\
    \ ➤\n        itemIndexPath)\n\n    // Test to see if we’re dealing with a situation\
    \ where we’re removing\n    // the second item - there will now only be 1 item,\
    \ and the indexPath.row that we’re\n    // dealing with will be 0.\n    //\n \
    \   // In this situation the first item needs to start where it originated, at\
    \ the top\n    if (collectionView!.numberOfItemsInSection(0) == 1) && (itemIndexPath.row\
    \ == 0) {\n        attributes.center = calculateCenterForFirstItem()\n       \
    \ attributes.size = itemSize\n        return attributes\n    }\n\n    // This\
    \ is a brand new item, so we need to set its alpha, size, z-index and center\n\
    \    attributes.center = CGPointMake(collectionView!.bounds.size.width / 2, ➤\n\
    \        collectionView!.bounds.size.height / 2)\n    attributes.alpha = 0.0\n\
    \    attributes.size = itemSize\n    attributes.zIndex = 0\n    return attributes;\n\
    }\n```\n\nYou begin by checking if the `indexPath` you’ve been passed is included\
    \ in the `indexPathsBeingUpdated` array:\n\n```\nlet indexFound = indexPathsBeingUpdated.indexOf\
    \ { (element) -> Bool in\n    element.indexPathAfterUpdate == itemIndexPath\n\
    }\n```\n\nIf it isn’t, then it’s an item that’s already present in the collection\
    \ view. The initial attributes for this will be the same as the calculated attributes,\
    \ so you can return them:\n\n```\nif indexFound == nil {\n    return layoutAttributes[itemIndexPath.row]\n\
    }\n```\n\nAssuming that the item is one you need to handle, you need a `UICollectionViewLayoutAttributes`\
    \ instance to configure:\n\n```\nlet attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath:\
    \ itemIndexPath)\n```\n\nYou need to handle the removal of the second item as\
    \ a special case:\n\n```\nif (collectionView!.numberOfItemsInSection(0) == 1)\
    \ && (itemIndexPath.row == 0) {\n    attributes.center = calculateCenterForFirstItem()\n\
    \    attributes.size = itemSize\n    return attributes\n}\n```\n\nOtherwise you’re\
    \ dealing with a new item, so you need to set the `attributes` accordingly:\n\n\
    - The `center` at the middle of the collection view\n- An `alpha` value of `0`,\
    \ so that the item will appear to fade in\n- The correct `size`\n- A `zIndex`\
    \ of `0`, so that the newest item is always on the top of the “pile”\n\n```\n\
    attributes.center = CGPointMake(collectionView!.bounds.size.width / 2, ➤\n   \
    \ collectionView!.bounds.size.height / 2)\nattributes.alpha = 0.0\nattributes.size\
    \ = itemSize\nattributes.zIndex = 0\n```\n\nHaving set the attributes, you can\
    \ return them:\n\n```\nreturn attributes;\n```"
