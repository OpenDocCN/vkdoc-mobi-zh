  raw: '### tableView:didSelectRowAtIndexPath:


    Your table view already responds in a somewhat limited way to user input. When
    you tap a cell, it’s highlighted in a light grey color. Behind the scenes, the
    table view makes a call to the delegate indicating two things: that a row has
    been selected, and which row that was.


    If the delegate implements the `tableView:didSelectRowAtIndexPath:` function,
    it can use that to fire off some other activity. For example, in the iPhone’s
    Contacts app, a view showing the contact’s details will be displayed. In iTunes,
    the song shown in the row will start playing. And so on.


    You’re not going to do anything quite so ambitious here. When a row is tapped,
    you’ll log the event into the debugger, and you’ll then pop up a modal dialog
    box showing which row has been tapped.


    To begin, enter the function in Listing [1-7](#A978-1-4842-1242-4_1_Chapter.html#FPar13)
    into the `ViewController`.


    Listing 1-7. The `tableView:didSelectRowAtIndexPath:` Function


    `// MARK:`


    `// MARK: UITableViewDelegate functions`


    `func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)
    {`


        `let messageString = "You tapped row \(indexPath.row)"`


        `let alertController = UIAlertController(title: "Row tapped",` ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)


    `message: messageString, preferredStyle: .Alert)`


        `let okAction = UIAlertAction(title: "OK", style: .Default,` ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)


    `handler: nil)`


        `alertController.addAction(okAction)`


        `self.presentViewController(alertController, animated: true) {`


            `print("\(messageString)")`


        `}`


    `}`


    Let’s unpack this function. The `tableView(_:didSelectRowAtIndexPath:)` function
    doesn’t return anything and takes the following two parameters:


    *   The `UITableView` instance that called the function (as with the data source,
    the delegate could respond to more than one table view and therefore needs to
    be able to distinguish between them)

    *   The `indexPath` whose `row` property corresponds to the row that was tapped


    First, you create a string that will be displayed in the log and the alert controller:


    `let messageString = "You tapped row \(indexPath.row)"`


    Next, you create the `UIAlertController`:


    `let alertController = UIAlertController(title: "Row tapped",` ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)


    `message: messageString, preferredStyle: UIAlertControllerStyle.Alert)`


    The alert controller needs a `UIAlertAction` button:


    `let okAction = UIAlertAction(title: "OK", style: UIAlertActionStyle.Default,`
    ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)


    `handler: nil)`


    `alertController.addAction(okAction)`


    Finally, you present the `UIAlertController` and send a message to the debugger
    as the completion action of the presentation:


    `self.presentViewController(alertController, animated: true) {`


        `print("\(messageString)")`


    `}`


    Tip


    Most developers spend as much time looking at the output of the debugger as they
    do actually writing code. To make the debugger console visible if it isn’t already,
    do one of the following: choose View ➤ Debug Area ➤ Show Debug Area from the menu,
    type Command+Shift+Y, or click the middle of the three View icons at the top left
    of the Xcode toolbar.


    Run the code by pressing Command +R (if the Simulator is still running, select
    the option to quit). Then tap a row at random. If all goes well, you’ll see something
    like Figure [1-20](#A978-1-4842-1242-4_1_Chapter.html#Fig20).


    ![A978-1-4842-1242-4_1_Fig20_HTML.jpg](A978-1-4842-1242-4_1_Fig20_HTML.jpg)


    Figure 1-20.


    Tapping a row


    Congratulations—that’s a fully functional, responsive table you’ve just built
    there!


    ## Understanding How the App’s Objects Fit Together


    Before you leave the SimpleTable app for more adventurous exercises, it’s worth
    looking at how the various objects fit together. The app has three main objects:


    *   The app delegate

    *   The view controller

    *   The view, which has the table view embedded within it


    Figure [1-21](#A978-1-4842-1242-4_1_Chapter.html#Fig21) shows how the three objects
    relate, together with their outlets.


    ![A978-1-4842-1242-4_1_Fig21_HTML.jpg](A978-1-4842-1242-4_1_Fig21_HTML.jpg)


    Figure 1-21.


    The object diagram


    The `AppDelegate`’s `window` has a `rootViewController` property, which is connected
    to the `ViewController` object. This in turn has a `view` outlet, which is connected
    to the `view` object in the Storyboard file. Embedded in the Storyboard is the
    `UITableView` instance, which has `delegate` and `dataSource` properties. These
    are linked back to the `ViewController`.


    Obviously, this is a pretty simple application, but as applications get more complex,
    it’s worth spending time to sketch out an object diagram. If a picture’s worth
    a thousand words, as the saying goes, an object diagram is worth at least a thousand
    lines of comments!


    ## Summary


    In this chapter, you created a very basic table view stage by stage:


    *   To start, you created some data to display in the table.

    *   Then, using Interface Builder, you created an instance of `UITableView` in
    the window.

    *   The view controller conformed to the `UITableViewDataSource` and `UITableViewDelegate`
    protocols so that it could provide the data for the table and the response to
    interaction.

    *   You implemented the code required to create cells for the table.

    *   Finally, you made the table react to user input.


    From here, it’s time to look in much more detail at how tables and cells are constructed,
    together with how they can be customized and made to respond to user interaction.


    # 2. How the Table View Fits Together


    In this chapter, you’re going to take a whistle-stop tour of table views and the
    elements from which they’re built. Although this chapter does not present a lot
    of code, it will provide a useful foundation for later when you start to customize
    table views.


    Along the way, you’ll look at the following:


    *   The types and styles of table views

    *   The anatomy and dimensions of table views

    *   `UITableView`’s relationship to the `UIScrollView` superclass

    *   Creation of table views in code and with Interface Builder

    *   Use of the `UITableViewController` class to take advantage of its template
    methods


    ## Understanding Table Views


    At its simplest, a table view is a list of items that can (often) be scrolled
    vertically. Because this is a common interface design pattern, UIKit provides
    a powerful suite of classes and protocols to make the creation and management
    of table views as simple and as effective as possible.


    Table views can range from a very plain list created by using one of the standard
    styles provided by the SDK to something so customized that it’s barely recognizable
    as a table at all. Figure [2-1](#A978-1-4842-1242-4_2_Chapter.html#Fig1) shows
    some examples of table views.


    ![A978-1-4842-1242-4_2_Fig1_HTML.jpg](A978-1-4842-1242-4_2_Fig1_HTML.jpg)


    Figure 2-1.


    Examples of table views—the built-in Settings app, the 1Password password manager
    and the Collins German Dictionary app


    The Settings app uses grouped static rows, while the 1Password app is a plain
    table view with a search bar. The Collins German Dictionary app uses cell customization
    to create custom typography effects. Despite the differences in visual appearance,
    all three of these apps are based around `UITableViews` and have identical interaction
    patterns.'
