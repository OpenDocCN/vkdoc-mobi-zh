    \n如果遗漏了这个函数，你的表格仍能正常工作，但系统会试图将单元格强行压缩至 44 点高度，导致内容被裁剪。\n\n`tableView:heightForRowAtIndexPath:`函数如代码清单\
    \ 8-3 所示。该函数仅需检查`indexPath`的奇偶性，然后以`CGFloat`类型返回相应的高度值。\n\n**代码清单 8-3.** `tableView:heightForRowAtIndexPath:`函数\n\
    \n```\nextension ViewController: UITableViewDelegate {\n\n    func tableView(tableView:\
    \ UITableView, heightForRowAtIndexPath ➤\n   indexPath: NSIndexPath) -> CGFloat\
    \ {\n\n        if (indexPath.row % 2 == 0) {\n            return EvenRowHeight\n\
    \        }\n\n        return OddRowHeight\n    }\n\n}\n```\n\n由于行高这类数值对于成功绘制界面至关重要，通常将它们存储在常量中会很有帮助：\n\
    \n```\nlet OddRowHeight: CGFloat = 70.0\nlet EvenRowHeight: CGFloat = 100.0\n\
    ```\n\n### 创建自定义单元格实例\n\n在费尽周折创建了自定义子类并设计了自定义单元格布局之后，你终将需要创建它们的实际实例。\n\n不出所料，这一过程发生在我们的老朋友——`tableView:cellForRowAtIndexPath:`函数中。到目前为止，你一直在创建标准`UITableViewCell`的实例，而现在你将稍作调整，创建自定义类之一的实例。\n\
    \n本例还略显复杂，因为存在两种类型的单元格。这意味着需要某种条件代码来选择创建哪种类型的单元格。\n\n不过在创建任何单元格类型之前，你需要先在`tableView`中注册你创建的\
    \ XIB 文件，以便在需要时能够创建或复用它们。\n\n为了保持视图控制器的条理性，你可以将此过程放在一个扩展中，并在`viewDidLoad:`方法里调用该函数。配置函数如代码清单\
    \ 8-4 所示。\n\n**代码清单 8-4.** 配置表格\n\n```\nextension ViewController {\n\nfunc configureTable()\
    \ {\n\ntableView.registerNib(UINib(nibName: \"OddCell\", bundle: nil), ➤\nforCellReuseIdentifier:\
    \ OddCellIdentifier)\n\ntableView.registerNib(UINib(nibName: \"EvenCell\", bundle:\
    \ nil), ➤\nforCellReuseIdentifier: EvenCellIdentifier)\n\n}\n\n}\n```\n\n单元格标识符很重要，因为它们会在多处使用，因此同样被定义为常量：\n\
    \n```\nlet OddCellIdentifier = \"OddCellIdentifier\"\nlet EvenCellIdentifier =\
    \ \"EvenCellIdentifier\"\n```\n\n最后，从`viewDidLoad:`中调用配置函数：\n\n```\noverride func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    configureTable()\n}\n```\n\n注册完\
    \ XIB 文件后，它们就可以在`tableView:cellForRowAtIndexPath:`函数中使用了。\n\n代码清单 8-5 展示了第一版实现。`tableData`和`phraseData`属性只是你之前在`viewDidLoad:`函数中创建的拉丁文样板文本数组。\n\
    \n**代码清单 8-5.** 从`tableView:cellForRowAtIndexPath:`函数返回自定义单元格\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)➤\n-> UITableViewCell\
    \ {\n\n    let remainder = indexPath.row % 2\n\n    switch remainder {\n    case\
    \ 0:\n        let cell = tableView.dequeueReusableCellWithIdentifier(EvenCellIdentifier,➤\n\
    \            forIndexPath: indexPath) as! EvenCell\n\n        cell.iconView.image\
    \ = UIImage(named: \"cat\")\n        cell.backgroundColor = UIColor(patternImage:\
    \ UIImage(named: \"evenBackground\")!)\n        cell.cellTitle.text = \"Cell \\\
    (indexPath.row)\"\n        cell.cellMainContent.text = tableData[indexPath.row]\n\
    \        cell.cellOtherContent.text = tableData[indexPath.row + 1]\n\n       \
    \ return cell\n    default:\n        let cell = tableView.dequeueReusableCellWithIdentifier(OddCellIdentifier,\
    \ ➤\n            forIndexPath: indexPath) as! OddCell\n\n        cell.iconView.image\
    \ = UIImage(named: \"dog\")\n        if let patternImage = UIImage(named: \"oddBackground\"\
    ) {\n            cell.backgroundColor = UIColor(patternImage: patternImage)\n\
    \        }\n        cell.cellTitle.text = \"Cell \\(indexPath.row)\"\n       \
    \ cell.cellContent.text = tableData[indexPath.row]\n\n        return cell\n  \
    \  }\n\n}\n```\n\n这与标准的`tableView:cellForRowAtIndexPath:`函数并无太大区别，但存在一些变化：\n\n\
    ```\nlet remainder = indexPath.row % 2;\n```\n\n`remainder`是行号除以`2`后的余数。如果余数为`0`，则该行为偶数行；如果余数为`1`，则为奇数行。\n\
    \n这使你能够通过在奇偶单元格之间进行切换，来创建相应自定义单元格的实例：\n\n```\nswitch remainder {\ncase 0:\n  \
    \  let cell = tableView.dequeueReusableCellWithIdentifier(EvenCellIdentifier,\
    \ ➤\n        forIndexPath: indexPath) as! EvenCell\n    ... 在此处配置单元格 ...\n   \
    \ return cell\ndefault:\n    let cell = tableView.dequeueReusableCellWithIdentifier(OddCellIdentifier,\
    \ ➤\n        forIndexPath: indexPath) as! OddCell\n    ... 在此处配置单元格 ...\n    return\
    \ cell\n}\n```\n\n配置各个单元格取决于你在 XIB 中创建的输出口，例如`OddCell`：\n\n```\ncell.iconView.image\
    \ = UIImage(named: \"dog\")\nif let patternImage = UIImage(named: \"OddBackground\"\
    ) {\n    cell.backgroundColor = UIColor(patternImage: patternImage)\n}\ncell.cellTitle.text\
    \ = \"Cell \\(indexPath.row)\"\ncell.cellContent.text = tableData[indexPath.row]\n\
    ```\n\n创建`EvenCell`实例的过程与此类似，最终得到的`tableView`效果将如图 8-10 所示。\n\n![A978-1-4842-1242-4_8_Fig10_HTML.jpg](img/A978-1-4842-1242-4_8_Fig10_HTML.jpg)\n\
    \n**图 8-10.** 同一表格中的两种不同`UITableViewCell`子类\n"
- fmt: "# Handling Selection in Custom Cells\n\nIf you change the cell’s `backgroundView`\
    \ property, chances are you’ll also need to control the way the cell is highlighted\
    \ when it’s selected.\n\nCell selection is controlled by `UITableViewCell`’s `selectionStyle`\
    \ property. This can be in one of four states:\n\n- `UITableViewCellSelectionStyleNone`\n\
    - `UITableViewCellSelectionStyleBlue`\n- `UITableViewCellSelectionStyleGray`\n\
    - `UITableViewCellSelectionStyleDefault`\n\nWhen the `selectionStyle` value is\
    \ set to `None`, there are no visible changes, but the other three causes the\
    \ cell’s background to appear to be filled with a solid color.\n\nThe cell also\
    \ has two background views that sit behind the `contentView`: `backgroundView`,\
    \ which is shown by default, and `selectedBackgroundView`, which sits between\
    \ `backgroundView` and `contentView` (and isn’t displayed by default).\n\nThis\
    \ arrangement is shown in Figure [8-11](#A978-1-4842-1242-4_8_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1242-4_8_Fig11_HTML.jpg](A978-1-4842-1242-4_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11. The arrangement of views inside the cell\n\nThe “selection layer”\
    \ that’s controlled by the `selectionStyle` property sits in front of the `backgroundView`,\
    \ so if you’ve changed the `backgroundView`, it will be obscured by the default\
    \ selection coloring when the cell is selected.\n\nThat might be OK, but if you\
    \ want a background other than solid blue or gray, you need to change the `selectedBackgroundView`\
    \ property. This sits behind `contentView`, but in front of the “selection layer,”\
    \ so instead of seeing the solid default color, you see whatever is in the `selectedBackgroundView`.\n\
    \nThis could be a solid color, such as:\n\n```\nlet redView = UIView(frame: cell.selectedBackgroundView.frame)\n\
    redView.backgroundColor = UIColor.redColor()\ncell.selectedBackgroundView = redview\n\
    ```\n\nThis `selectedBackgroundView` will need to be added to the cell. You could\
    \ do this before any selection takes place (for example, in the `cellForRowAtIndexPath:`\
    \ function, as shown in Listing [8-6](#A978-1-4842-1242-4_8_Chapter.html#FPar10)).\n\
    \n**Listing 8-6.** Setting the `selectedBackgroundView` in `cellForRowAtIndexPath`:\n\
    \n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\", forIndexPath: indexPath)\n    let selectionView = UIView(frame:\
    \ cell.frame)\n    selectionView.backgroundColor = UIColor.cyanColor()\n    cell.selectedBackgroundView\
    \ = selectionView\n    ... configure rest of cell here ...\n    return cell\n\
    }\n```\n\nAlternatively, you could set this while responding to the cell selection\
    \ (shown in Listing [8-7](#A978-1-4842-1242-4_8_Chapter.html#FPar11)).\n\n**Listing\
    \ 8-7.** Adding a `selectedBackgroundView` While Handling Cell Selection\n\n```\n\
    func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)\
    \ {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n    let selectionView\
    \ = UIView(frame: cell!.frame)\n    cell?.selectedBackgroundView = selectionView\n\
    \    selectionView.backgroundColor = UIColor.greenColor()\n}\n```\n\nOf course,\
    \ you’re not restricted to using solid colors to indicate selection if your design\
    \ calls for something a bit more imaginative. Here’s how you could use an image:\n\
    \n```\nlet selectedImageView = UIImageView(frame: cell.frame)\nif let selectedImageView.image\
    \ = UIImage(named: \"SelectedCellBackground\") {\n    cell.selectedBackgroundView\
    \ = selectedImageView\n}\n```\n\nThis will obscure the “selection layer” so you\
    \ can control the background appearance of your custom cell.\n\n## Custom Cells\
    \ in Code\n\nLaying out cells visually will take you so far, but if you prefer\
    \ a code-based approach you can override the `init(style:reuseIdentifier:)`, and\
    \ then use the `layoutSubviews` function in the custom cell subclass or add AutoLayout\
    \ constraints, which allows you to lay out a completely custom cell.\n\n### The\
    \ Process of Custom Cells in Code\n\nThe process of creating custom cells in code\
    \ has six stages:\n\n- Create a custom subclass of `UITableViewCell` or `UICollectionViewCell`\
    \ for each type of cell that you need.\n- Create properties in the class to pass\
    \ data into the cell.\n- Lay out the cell’s controls by overriding the `init(style:reuseIdentifier:)`\
    \ function (for a `UITableViewCell`) or `init(frame:)` for a `UICollectionViewCell`.\n\
    - Override the `layoutSubviews` function to update the cell’s controls with the\
    \ values passed into the cell properties.\n- Optionally, override the `prepareForReuse()`\
    \ function to update the cell’s controls just before the cell is displayed.\n\
    - Register the cell class for use by the table or collection view.\n- Implement\
    \ the standard `datasource` function to dequeue cells as instances of your new\
    \ custom cell subclass.\n\nIn this section, you’ll build a table view and a collection\
    \ view that use custom cells to display the simple layouts shown in Figure [8-12](#A978-1-4842-1242-4_8_Chapter.html#Fig12).\n\
    \n![A978-1-4842-1242-4_8_Fig12_HTML.jpg](A978-1-4842-1242-4_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12. The apps using custom cells\n\n### Creating Custom Subclasses\n\
    \nIn order to create cells with custom subclasses, you need to override the appropriate\
    \ `init` function:\n\n- `init(style:reuseIdentifier:)` for a `UITableViewCell`\n\
    - `init(frame:)` for a `UICollectionViewCell`\n\nAnd the common `init` function:\n\
    \n- `init(coder:)`\n\nAlthough you must provide an implementation of this last\
    \ function in order to satisfy the compiler, it won’t actually get called using\
    \ your cell creation process.\n\n#### Creating the Classes\n\nThe quickest way\
    \ to create the classes is to use the built-in templates:\n\n- From the **File**\
    \ menu, select the **File ➤ New ➤ File** option, or type **Ctrl + N**.\n- In the\
    \ templates, select the **Cocoa Touch** class option.\n- Name your class, and\
    \ then select either `UITableViewCell` or `UICollectionViewCell` as the subclass.\n\
    \nNow you can start implementing the custom classes.\n\n#### Registering Custom\
    \ Classes with the Table or Collection View\n\nWith the custom classes created,\
    \ you need to tell the table or collection view how to use them. This is done\
    \ with the `registerClass` function:\n\n```\ncollectionView.registerClass(CustomCell.self,\
    \ forCellWithReuseIdentifier: \"CustomCVCell\")\n```\n\nor\n\n```\ntableView.registerClass(CustomClassCell.self,\
    \ forCellReuseIdentifier: \"CustomTVCell\")\n```\n\nThis has to be done before\
    \ there’s any chance that a cell will be dequeued, so I usually call it from the\
    \ view controller’s `viewDidLoad` function.\n\nWith this done, it’s time to start\
    \ work on the custom cell classes.\n\n#### The `init` Functions\n\nThe `init(style:reuseIdentifier:)`\
    \ and `init(frame:)` functions are called when the datasource creates an instance\
    \ of the cell; it’s here that you draw the cell contents.\n\n**Note:** You might\
    \ be surprised to find that the `init` functions will only be called a few times\
    \ throughout the lifecycle of the table or collection view, even if your control\
    \ has thousands of cells. That’s down to the caching and dequeuing mechanism of\
    \ the two controls; by recycling previously-created cells, the number of expensive\
    \ setup operations can be kept to a minimum."
  raw: '## Handling Selection in Custom Cells


    If you change the cell’s `backgroundView` property, chances are you’ll also need
    to control the way the cell is highlighted when it’s selected.


    Cell selection is controlled by `UITableViewCell`’s `selectionStyle` property.
    This can be in one of four states:


    *   `UITableViewCellSelectionStyleNone`

    *   `UITableViewCellSelectionStyleBlue`

    *   `UITableViewCellSelectionStyleGray`

    *   `UITableViewCellSelectionStyleDefault`


    When the `selectionStyle` value is set to `None`, there are no visible changes,
    but the other three causes the cell’s background to appear to be filled with a
    solid color.


    The cell also has two background views that sit behind the `contentView`: `backgroundView`,
    which is shown by default, and `selectedBackgroundView`, which sits between `backgroundView`
    and `contentView` (and isn’t displayed by default).


    This arrangement is shown in Figure [8-11](#A978-1-4842-1242-4_8_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_8_Fig11_HTML.jpg](A978-1-4842-1242-4_8_Fig11_HTML.jpg)


    Figure 8-11.


    The arrangement of views inside the cell


    The “selection layer” that’s controlled by the `selectionStyle` property sits
    in front of the `backgroundView`, so if you’ve changed the `backgroundView`, it
    will be obscured by the default selection coloring when the cell is selected.


    That might be OK, but if you want a background other than solid blue or gray,
    you need to change the `selectedBackgroundView` property. This sits behind `contentView`,
    but in front of the “selection layer,” so instead of seeing the solid default
    color, you see whatever is in the `selectedBackgroundView`.


    This could be a solid color, such as


    `let redView = UIView(frame: cell.selectedBackgroundView.frame)`


    `redView.backgroundColor = UIColor.redColor()`


    `cell.selectedBackgroundView = redview`


    This `selectedBackgroundView` will need to be added to the cell. You could do
    this before any selection takes place (for example, in the `cellForRowAtIndexPath:`
    function, as shown in Listing [8-6](#A978-1-4842-1242-4_8_Chapter.html#FPar10)).


    Listing 8-6. Setting the selectedBackgroundView in cellForRowAtIndexPath:


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",
    ➤`


       `forIndexPath: indexPath)`


        `let selectionView = UIView(frame: cell.frame)`


        `selectionView.backgroundColor = UIColor.cyanColor()`


        `cell.selectedBackgroundView = selectionView`


        `... configure rest of cell here ...`


        `return cell`


    `}`


    Alternatively, you could set this while responding to the cell selection (shown
    in Listing [8-7](#A978-1-4842-1242-4_8_Chapter.html#FPar11)) .


    Listing 8-7. Adding a selectedBackgroundView While Handling Cell Selection


    `func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)
    {`


        `let cell = tableView.cellForRowAtIndexPath(indexPath)`


        `let selectionView = UIView(frame: cell!.frame)`


        `cell?.selectedBackgroundView = selectionView`


        `selectionView.backgroundColor = UIColor.greenColor()`


    `}`


    Of course, you’re not restricted to using solid colors to indicate selection if
    your design calls for something a bit more imaginative. Here’s how you could use
    an image:


    `let selectedImageView = UIImageView(frame: cell.frame)`


    `if let selectedImageView.image = UIImage(named: "SelectedCellBackground") {`


        `cell.selectedBackgroundView = selectedImageView`


    `}`


    This will obscure the “selection layer” so you can control the background appearance
    of your custom cell.


    ## Custom Cells in Code


    Laying out cells visually will take you so far, but if you prefer a code-based
    approach you can override the `init(style:reuseIdentifier:),` and then use the
    `layoutSubviews` function in the custom cell subclass or add AutoLayout contraints,
    which allows you to lay out a completely custom cell.


    ### The Process of Custom Cells in Code


    The process of creating custom cells in code has six stages:


    *   Create a custom subclass of `UITableViewCell` or `UICollectionViewCell` for
    each type of cell that you need.

    *   Create properties in the class to pass data into the cell.

    *   Lay out the cell’s controls by overriding the `init(style:reuseIdentifier:)`
    function (for a `UITableViewCell`) or `init(frame:)` for a `UICollectionViewCell`.

    *   Override the `layoutSubviews` function to update the cell’s controls with
    the values passed into the cell properties.

    *   Optionally, override the `prepareForReuse()` function to update the cell’s
    controls just before the cell is displayed

    *   Register the cell class for use by the table or collection view.

    *   Implement the standard `datasource` function to dequeue cells as instances
    of your new custom cell subclass.


    In this section, you’ll build a table view and a collection view that use custom
    cells to display the simple layouts shown in Figure [8-12](#A978-1-4842-1242-4_8_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_8_Fig12_HTML.jpg](A978-1-4842-1242-4_8_Fig12_HTML.jpg)


    Figure 8-12.


    The apps using custom cells


    ### Creating Custom Subclasses


    In order to create cells with custom subclasses, you need to override the appropriate
    `init` function:


    *   `init(style:reuseIdentifier:)` for a `UITableViewCell`

    *   `init(frame:)` for a `UICollectionViewCell`


    And the common `init` function:


    *   `init(coder:)`


    Although you must provide an implementation of this last function in order to
    satisfy the compiler, it won’t actually get called using your cell creation process.


    #### Creating the Classes


    The quickest way to create the classes is to use the built-in templates:


    *   From the File menu, select the File ➤ New ➤ File option, or type Ctrl + N.

    *   In the templates, select the `Cocoa Touch` class option.

    *   Name your class, and then select either `UITableViewCell` or `UICollectionViewCell`
    as the subclass.


    Now you can start implementing the custom classes.


    #### Registering Custom Classes with the Table or Collection View


    With the custom classes created, you need to tell the table or collection view
    how to use them. This is done with the `registerClass` function:


    `collectionView.registerClass(CustomCell.self, forCellWithReuseIdentifier: "CustomCVCell")`


    or


    `tableView.registerClass(CustomClassCell.self, forCellReuseIdentifier: "CustomTVCell")`


    This has to be done before there’s any chance that a cell will be dequeued, so
    I usually call it from the view controller’s `viewDidLoad` function.


    With this done, it’s time to start work on the custom cell classes.


    #### The init Functions


    The `init(style:reuseIdentifier:)` and `init(frame:)` functions are called when
    the datasource creates an instance of the cell; it’s here that you draw the cell
    contents.


    Note


    You might be surprised to find that the `init` functions will only be called a
    few times throughout the lifecycle of the table or collection view, even if your
    control has thousands of cells. That’s down to the caching and dequeuing mechanism
    of the two controls; by recycling previously-created cells, the number of expensive
    setup operations can be kept to a minimum.'
  trans: "\n# 处理自定义单元格的选中状态\n\n如果修改了单元格的 `backgroundView` 属性，你很可能还需要控制在单元格被选中时的突出显示方式。\n\
    \n单元格的选中状态由 `UITableViewCell` 的 `selectionStyle` 属性控制。该属性有以下四种状态：\n\n- `UITableViewCellSelectionStyleNone`\n\
    - `UITableViewCellSelectionStyleBlue`\n- `UITableViewCellSelectionStyleGray`\n\
    - `UITableViewCellSelectionStyleDefault`\n\n当 `selectionStyle` 设置为 `None` 时，选中后没有可见变化；但其他三种状态会使单元格的背景显示为纯色填充。\n\
    \n单元格还有两个位于 `contentView` 后方的背景视图：默认显示的 `backgroundView`，以及位于 `backgroundView`\
    \ 与 `contentView` 之间（默认不显示）的 `selectedBackgroundView`。\n\n这种布局如图 8-11 所示。\n\n\
    ![A978-1-4842-1242-4_8_Fig11_HTML.jpg](img/A978-1-4842-1242-4_8_Fig11_HTML.jpg)\n\
    \n图 8-11. 单元格内部视图的排列布局\n\n由 `selectionStyle` 属性控制的“选中层”位于 `backgroundView` 之上，因此如果你修改了\
    \ `backgroundView`，当单元格被选中时，它会被默认的选中颜色所遮盖。\n\n这可能没问题，但如果你想要纯蓝或纯灰以外的背景，就需要修改 `selectedBackgroundView`\
    \ 属性。该属性位于 `contentView` 后方，但在“选中层”之前，因此你看到的将是 `selectedBackgroundView` 中的内容，而不是默认的纯色。\n\
    \n它可以是一个纯色视图，例如：\n\n```\nlet redView = UIView(frame: cell.selectedBackgroundView.frame)\n\
    redView.backgroundColor = UIColor.redColor()\ncell.selectedBackgroundView = redview\n\
    ```\n\n这个 `selectedBackgroundView` 需要添加到单元格中。你可以在任何选中操作发生之前执行此操作（例如，在 `cellForRowAtIndexPath:`\
    \ 函数中，如代码清单 8-6 所示）。\n\n**代码清单 8-6.** 在 `cellForRowAtIndexPath:` 中设置 `selectedBackgroundView`：\n\
    \n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\", forIndexPath: indexPath)\n    let selectionView = UIView(frame:\
    \ cell.frame)\n    selectionView.backgroundColor = UIColor.cyanColor()\n    cell.selectedBackgroundView\
    \ = selectionView\n    ... 在此处配置单元格的其他部分 ...\n    return cell\n}\n```\n\n或者，你也可以在响应单元格选中时进行设置（如代码清单\
    \ 8-7 所示）。\n\n**代码清单 8-7.** 在处理单元格选中时添加 `selectedBackgroundView`\n\n```\nfunc\
    \ tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)\
    \ {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n    let selectionView\
    \ = UIView(frame: cell!.frame)\n    cell?.selectedBackgroundView = selectionView\n\
    \    selectionView.backgroundColor = UIColor.greenColor()\n}\n```\n\n当然，如果你的设计需要更有创意，你也并不局限于使用纯色来表示选中状态。下面是如何使用图片：\n\
    \n```\nlet selectedImageView = UIImageView(frame: cell.frame)\nif let selectedImageView.image\
    \ = UIImage(named: \"SelectedCellBackground\") {\n    cell.selectedBackgroundView\
    \ = selectedImageView\n}\n```\n\n这将遮盖“选中层”，以便你能控制自定义单元格的背景外观。\n\n## 通过代码实现自定义单元格\n\
    \n通过可视化方式布局单元格能带你走得很远，但如果你更喜欢基于代码的方法，你可以重写 `init(style:reuseIdentifier:)`，然后在自定义单元格子类中使用\
    \ `layoutSubviews` 函数或添加 AutoLayout 约束，从而布局一个完全自定义的单元格。\n\n### 通过代码实现自定义单元格的流程\n\
    \n通过代码创建自定义单元格的过程分为六个步骤：\n\n- 为你需要的每种单元格类型创建一个 `UITableViewCell` 或 `UICollectionViewCell`\
    \ 的自定义子类。\n- 在类中创建属性，用于将数据传入单元格。\n- 通过重写 `init(style:reuseIdentifier:)` 函数（针对\
    \ `UITableViewCell`）或 `init(frame:)` 函数（针对 `UICollectionViewCell`）来布局单元格的控件。\n\
    - 重写 `layoutSubviews` 函数，以传入的单元格属性值更新单元格的控件。\n- 可选地，重写 `prepareForReuse()` 函数，在单元格即将显示前更新其控件。\n\
    - 注册该单元格类以供表格或集合视图使用。\n- 实现标准的 `datasource` 函数，以将单元格出列作为自定义单元格子类的实例。\n\n在本节中，你将构建一个表格视图和一个集合视图，它们使用自定义单元格来显示图\
    \ 8-12 所示的简单布局。\n\n![A978-1-4842-1242-4_8_Fig12_HTML.jpg](img/A978-1-4842-1242-4_8_Fig12_HTML.jpg)\n\
    \n图 8-12. 使用自定义单元格的应用程序\n\n### 创建自定义子类\n\n为了创建具有自定义子类的单元格，你需要重写相应的 `init` 函数：\n\
    \n- 针对 `UITableViewCell` 的 `init(style:reuseIdentifier:)`\n- 针对 `UICollectionViewCell`\
    \ 的 `init(frame:)`\n\n以及通用的 `init` 函数：\n\n- `init(coder:)`\n\n尽管你必须提供最后一个函数的实现来满足编译器要求，但在你创建单元格的过程中它实际上不会被调用。\n\
    \n#### 创建类\n\n创建类最快的方式是使用内置模板：\n\n- 从 **File** 菜单中，选择 **File ➤ New ➤ File** 选项，或键入\
    \ **Ctrl + N**。\n- 在模板中，选择 **Cocoa Touch** 类选项。\n- 命名你的类，然后选择 `UITableViewCell`\
    \ 或 `UICollectionViewCell` 作为父类。\n\n现在你可以开始实现自定义类了。\n\n#### 向表格或集合视图注册自定义类\n\n\
    创建自定义类后，你需要告诉表格或集合视图如何使用它们。这通过 `registerClass` 函数完成：\n\n```\ncollectionView.registerClass(CustomCell.self,\
    \ forCellWithReuseIdentifier: \"CustomCVCell\")\n```\n\n或\n\n```\ntableView.registerClass(CustomClassCell.self,\
    \ forCellReuseIdentifier: \"CustomTVCell\")\n```\n\n这必须在任何可能出列单元格的操作之前完成，因此我通常会在视图控制器的\
    \ `viewDidLoad` 函数中调用它。\n\n完成这一步后，就可以开始处理自定义单元格类了。\n\n#### `init` 函数\n\n`init(style:reuseIdentifier:)`\
    \ 和 `init(frame:)` 函数在数据源创建单元格实例时被调用；正是在这里你绘制单元格的内容。\n\n**注意：** 你可能会惊讶地发现，即使你的控件有数千个单元格，在整个表格或集合视图的生命周期中，`init`\
    \ 函数只会被调用几次。这是由这两个控件的缓存和出列机制决定的；通过回收之前创建的单元格，可以最大限度地减少昂贵的设置操作次数。\n"
- fmt: "#### The Table View Cell’s init Function\n\nFirst, let’s add the properties\
    \ that the class is going to need:\n\n`var cellTitle: String?`\n`var cellSubtitle:\
    \ String?`\n`var leftLabel: UILabel!`\n`var middleLabel: UILabel!`\n`var rightLabel:\
    \ UILabel!`\n\nThe two `String?` properties will be set with the data model’s\
    \ object; while the three labels will display the data.\n\nNow, get the `init(coder:)`\
    \ function out of the way:\n\n```\nrequired init?(coder aDecoder: NSCoder) {\n\
    \    super.init(coder: aDecoder)\n}\n```\n\nNow you can implement the `init(style:reuseIdentifier:)`\
    \ function; it isn’t much more complicated at this stage:\n\n```\noverride init(style:\
    \ UITableViewCellStyle, reuseIdentifier: String?) {\n    super.init(style: style,\
    \ reuseIdentifier: reuseIdentifier)\n    setupViews()\n}\n```\n\nTo help reduce\
    \ code repetition, implement a helper function that creates the `UILabel`, shown\
    \ in Listing [8-8](#A978-1-4842-1242-4_8_Chapter.html#FPar13). It’s the same for\
    \ both table and collection view.\n\nListing 8-8. The Label Helper Function\n\n\
    ```\nfunc drawLabel() -> UILabel {\n    let cellTitleLabel = UILabel(frame: CGRectZero)\n\
    \    cellTitleLabel.translatesAutoresizingMaskIntoConstraints = false\n    cellTitleLabel.sizeToFit()\n\
    \    return cellTitleLabel\n}\n```\n\nThe heavy lifting is done by the `setupViews()`\
    \ function, shown in Listing [8-9](#A978-1-4842-1242-4_8_Chapter.html#FPar14).\n\
    \nListing 8-9. The setupViews( ) Function\n\n```\nfunc setupViews() {\n    //\
    \ Setup title label\n    leftLabel = drawLabel()\n    let vLeftLabelConstraint\
    \ = NSLayoutConstraint(item: leftLabel, attribute: ➤\nNSLayoutAttribute.Top, relatedBy:\
    \ NSLayoutRelation.Equal, toItem: self.contentView, ➤\nattribute: NSLayoutAttribute.Top,\
    \ multiplier: 1.0, constant: 0)\n    let hLeftLabelConstraint = NSLayoutConstraint(item:\
    \ leftLabel, attribute: ➤\nNSLayoutAttribute.Left, relatedBy: NSLayoutRelation.Equal,\
    \ toItem: self.contentView, ➤\nattribute: NSLayoutAttribute.Left, multiplier:\
    \ 1.0, constant: 10)\n\n    // Setup middle label\n    middleLabel = drawLabel()\n\
    \    let vMiddleLabelConstraint = NSLayoutConstraint(item: middleLabel, attribute:\
    \ ➤\n  NSLayoutAttribute.CenterY, relatedBy: NSLayoutRelation.Equal, toItem: ➤\n\
    \  self.contentView, attribute: NSLayoutAttribute.CenterY, multiplier: 1.0, constant:\
    \ 0)\n    let hMiddleLabelConstraint = NSLayoutConstraint(item: middleLabel, attribute:\
    \ ➤\n  NSLayoutAttribute.CenterX, relatedBy: NSLayoutRelation.Equal, toItem: ➤\n\
    \  self.contentView, attribute: NSLayoutAttribute.CenterX, multiplier: 1.0, constant:\
    \ 0)\n\n    // Setup subtitle label\n    rightLabel = drawLabel()\n    rightLabel.text\
    \ = \"...middle...\"\n    rightLabel.font = UIFont(name: \"Georgia\", size: 11.0)\n\
    \    rightLabel.sizeToFit()\n    let vRightLabelConstraint = NSLayoutConstraint(item:\
    \ rightLabel, attribute: ➤\n  NSLayoutAttribute.Bottom, relatedBy: NSLayoutRelation.Equal,\
    \ toItem: ➤\n  self.contentView, attribute: NSLayoutAttribute.Bottom, multiplier:\
    \ 1.0, constant: 0)\n    let hRightLabelConstraint = NSLayoutConstraint(item:\
    \ rightLabel, attribute: ➤\n  NSLayoutAttribute.Right, relatedBy: NSLayoutRelation.Equal,\
    \ toItem: ➤\n  self.contentView, attribute: NSLayoutAttribute.Right, multiplier:\
    \ 1.0, constant: -10)\n\n    self.contentView.addSubview(leftLabel)\n    self.contentView.addSubview(middleLabel)\n\
    \    self.contentView.addSubview(rightLabel)\n    self.contentView.addConstraints([vLeftLabelConstraint,\
    \ hLeftLabelConstraint, ➤\n        vMiddleLabelConstraint, hMiddleLabelConstraint,\
    \ ➤\n        vRightLabelConstraint, hRightLabelConstraint])\n}\n```\n\nWorking\
    \ through this, you create each `UILabel` in turn by calling the helper function.\
    \ Then there are horizontal and vertical AutoLayout constraints for each one.\n\
    \nThe labels are added to the cell’s `contentView`, and then the layout constraints\
    \ are added to the container.\n\n#### The Collection View’s init Function\n\n\
    If you’re building a `UICollectionViewCell` subclass, the process is very similar\
    \ to that for `UITableViewCell`.\n\nHere’s the `init` function:\n\n```\noverride\
    \ init(frame: CGRect) {\n    super.init(frame: frame)\n    setupViews()\n}\n```\n\
    \nThe `drawLabel()` function is exactly the same as Listing [8-8](#A978-1-4842-1242-4_8_Chapter.html#FPar13),\
    \ and the `setupViews()` function is shown in Listing [8-10](#A978-1-4842-1242-4_8_Chapter.html#FPar15).\n\
    \nListing 8-10. The setupViews( ) Function for the Collection View Cell\n\n```\n\
    func setupViews() {\n    // Setup title label\n    titleLabel = drawLabel()\n\
    \    let vTitleConstraint = NSLayoutConstraint(item: titleLabel, attribute: ➤\n\
    NSLayoutAttribute.CenterY, relatedBy: NSLayoutRelation.Equal, toItem: ➤\nself.contentView,\
    \ attribute: NSLayoutAttribute.CenterY, multiplier: 1.0, constant: 0)\n    let\
    \ hTitleConstraint = NSLayoutConstraint(item: titleLabel, attribute: ➤\nNSLayoutAttribute.CenterX,\
    \ relatedBy: NSLayoutRelation.Equal, toItem: ➤\nself.contentView, attribute: NSLayoutAttribute.CenterX,\
    \ multiplier: 1.0, constant: 0)\n\n    self.contentView.addSubview(titleLabel)\n\
    \n    // Setup subtitle label\n    subtitleLabel = drawLabel()\n    let hSubtitleConstraint\
    \ = NSLayoutConstraint(item: subtitleLabel, attribute: ➤\nNSLayoutAttribute.CenterX,\
    \ relatedBy: NSLayoutRelation.Equal, toItem: ➤\nself.contentView, attribute: NSLayoutAttribute.CenterX,\
    \ multiplier: 1.0, constant: 0)\n    let vSubtitleConstraint = NSLayoutConstraint(item:\
    \ subtitleLabel, attribute: ➤\nNSLayoutAttribute.Top, relatedBy: NSLayoutRelation.Equal,\
