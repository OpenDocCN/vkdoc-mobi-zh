    by its parent classes. For example, `UIScrollView` provides the scrolling of the
    table, while `UIResponder` allows the table cells to respond to user touches and
    swipes.


    Note


    In an attempt to reduce confusion, I’ll use `UITableView` when I’m referring to
    the class, `tableView` when I’m referring to a specific instance of a `UITableView`,
    and “table view” when I’m talking about table views in general.


