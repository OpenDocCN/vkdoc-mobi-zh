    \nFigure 14-6. Activating the WatchTarget scheme\n\nYou should now see that you’ve\
    \ got two new folders in the Navigator, and two new Targets in the Projects and\
    \ Targets list, as shown in Figure [14-7](#A978-1-4842-1242-4_14_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1242-4_14_Fig7_HTML.jpg](A978-1-4842-1242-4_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7. The new targets"
  raw: '## What Are WatchKit Tables?


    The WatchKit SDK includes `WKInterfaceTable`, a class that supports single column
    tables. A table can consist of multiple types of rows. Each row type has its own
    row controller, which is backed by a custom class that you need to create. The
    row controller contain the outlets to connect to the interface elements, and (where
    needed) functions to handle interactions with the controls.


    The relationship between table, rows and row controllers is shown in Figure [14-1](#A978-1-4842-1242-4_14_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_14_Fig1_HTML.jpg](A978-1-4842-1242-4_14_Fig1_HTML.jpg)


    Figure 14-1.


    The relationship between table, rows and row controllers


    The process of creating a table-based WatchKit app has four steps.


    Creating a table object in the Storyboard and laying out controls in the rows.
      Creating `NSObject` subclasses to act as controllers for each type of row that
    will be displayed, with outlets to the controls in the Storyboard.   Creating
    instances of the row controller classes and providing them to the table at runtime.
      Responding to user interaction with the rows.


    WatchKit tables are instances of the `WKInterfaceTable` class. Conceptually, they’re
    similar to `UITableView`, but with some significant differences:


    *   `WKInterfaceTable` doesn’t use a data source to create cells on demand. Instead,
    you’re responsible for creating all the cells upfront before the table is displayed
    in the interface.

    *   There is no delegate to handle interaction; that’s something you need to implement
    yourself as well.

    *   Like the other WatchKit interface elements, there’s no support for AutoLayout,
    and you need to use Storyboards to create the interfaces.

    *   The performance limitations of the current generation of Apple Watch devices
    means that in practice you’re limited to around 20 rows before performance drops
    off unacceptably.


    Figure [14-2](#A978-1-4842-1242-4_14_Chapter.html#Fig2) shows how the row controller
    and rows relate together.


    ![A978-1-4842-1242-4_14_Fig2_HTML.jpg](A978-1-4842-1242-4_14_Fig2_HTML.jpg)


    Figure 14-2.


    How WKInterfaceTable objects fit together


    At runtime, you’re responsible for telling the table the type, number, and order
    of the rows, and then creating instances of the row controllers before configuring
    their outlets. You have two options here:


    *   If your table will only have one type of cell, you can use the `setNumberOfCells:withRowType`
    function: `table.setNumberOfRows(5, withRowType: "ContactRow")`

    *   If your table will have more than one type of cell, you need to pass an array
    of cell identifier strings into the `setRowTypes:` function. For example, if you
    have one header, two data and one footer row, you pass in the array `["HeaderCell",
    "DataCell", "DataCell", "FooterCell"]:` `table.setRowTypes(["HeaderCell", "DataCell",
    "DataCell", "FooterCell"])`


    Once you’ve told the table which row has which type of cell, you then need to
    get the row controller for each row in turn with the `rowControllerAtIndex` `:`
    function. Now you’re able to configure the outlets that you previously defined
    in the row controller class. An example of this process is shown in Listing [14-1](#A978-1-4842-1242-4_14_Chapter.html#FPar1).


    Listing 14-1. Configuring and Updating a Watch Table


    `func updateTable() {`


    `// Create array to hold the row types`


    `var rowsArray = [String]()`


    `// Add header row as the row 0`


    `rowsArray.append("HeaderRow")`


    `// Add a contact row for each object in the dataArray`


    `for index in 1...self.dataArray.count {`


    `rowsArray.append("ContactRow")`


    `}`


    `// Add a footer row as the last row`


    `rowsArray.append("FooterRow")`


    `// Configure the table to display the rows as defined in the rowsArray`


    `self.watchTable.setRowTypes(rowsArray)`


    `// Retrieve each contact row and set the contents from the dataArray`


    `// Start at row 1, because row 0 is the header row`


    `for index in 1...self.dataArray.count {`


    `var contactRow: ContactRowController = ➤`


    `self.watchTable.rowControllerAtIndex(index) as! ContactRowController`


    `var rowContent = self.dataArray[index]`


    `contactRow.nameLabel!.setText(rowContent)`


    `}`


    `// Get the last row, and configure it as the footer`


    `let contactCount = self.dataArray.count`


    `var footerRow: FooterRowController = ➤`


    `self.watchTable.rowControllerAtIndex(contactCount + 1) as! FooterRowController`


    `footerRow.footerLabel.setText("\(contactCount) messages")`


    `}`


    The Storyboard presents the table as one or more rows. Inside each row there’s
    a group, which is where you add your custom controls, shown in Figure [14-3](#A978-1-4842-1242-4_14_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_14_Fig3_HTML.jpg](A978-1-4842-1242-4_14_Fig3_HTML.jpg)


    Figure 14-3.


    The groups inside each row


    Controls in the group are connected to outlets in the same way as a normal Storyboard
    or Xib file.


    ## Creating a Basic Table


    In this section, you’ll go through the process of creating a demonstration WatchKit
    table. It won’t be a fully-featured app with a dynamic data source, because that’s
    beyond the scope of creating a table interface, but it will show you how to wire
    up a table that you can extend further.


    There are four steps involved, assuming you’re creating a new project from scratch:


    *   Create a new iPhone project to act as the host for the extension.

    *   Create a WatchKit app as a new target, to create the app that will run on
    the watch and the extension that will configure the table.

    *   Lay out the table in the Storyboard.

    *   Create the functions to populate the table at runtime.


    ### Creating the Project


    To begin, you’ll need a new iPhone project. Create a new project in Xcode with
    File ➤ New ➤ Project and select the Single View Application template. Give the
    project a name (I’m calling mine `WatchTable`), and save the project somewhere
    appropriate.


    ### Adding the WatchKit Target


    As you saw above, there are three components to a WatchKit app:


    *   The iPhone app, which handles the heavy lifting of things like communicating
    with APIs, etc.

    *   The WatchKit app, which runs on the watch itself. This is where you’ll lay
    out the table’s visual appearance in the Storyboard.

    *   The Watchkit extension, which runs on the iPhone and contains the code for
    managing the content and interaction of the table.


    All three components are bundled together into the app, and if a paired watch
    is present as the app is installed, the user will be asked whether they want to
    install the WatchKit app onto the watch itself.


    To begin extending an iPhone app with watch functionality, you first need to create
    a new target that adds the WatchKit app and extension.


    From the File ➤ New ➤ Target menu, select the `WatchKit App`template, as shown
    in Figure [14-4](#A978-1-4842-1242-4_14_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_14_Fig4_HTML.jpg](A978-1-4842-1242-4_14_Fig4_HTML.jpg)


    Figure 14-4.


    Adding the WatchKit target


    You’ll then be prompted to set the options for the new target. Most of these are
    read-only, but you can select the language and whether you want to add Notification
    and Glance scenes to the target. You don’t, so change the options so they match
    those shown in Figure [14-5](#A978-1-4842-1242-4_14_Chapter.html#Fig5), and select
    Finish.


    ![A978-1-4842-1242-4_14_Fig5_HTML.jpg](A978-1-4842-1242-4_14_Fig5_HTML.jpg)


    Figure 14-5.


    Setting the target options


    You may then be prompted to confirm whether you want to activate the WatchTarget
    app’s scheme, as shown in Figure [14-6](#A978-1-4842-1242-4_14_Chapter.html#Fig6).
    You do, so select the Activate option.


    ![A978-1-4842-1242-4_14_Fig6_HTML.jpg](A978-1-4842-1242-4_14_Fig6_HTML.jpg)


    Figure 14-6.


    Activating the WatchTarget scheme


    You should now see that you’ve got two new folders in the Navigator, and two new
    Targets in the Projects and Targets list, as shown in Figure [14-7](#A978-1-4842-1242-4_14_Chapter.html#Fig7).


    ![A978-1-4842-1242-4_14_Fig7_HTML.jpg](A978-1-4842-1242-4_14_Fig7_HTML.jpg)


    Figure 14-7.


    The new targets'
  trans: "\n# 什么是 WatchKit 表格？\n\nWatchKit SDK 包含 `WKInterfaceTable` 类，该类支持单列表格。一个表格可以由多种类型的行组成。每种行类型都有其自己的行控制器，该控制器由一个你需要创建的自定义类支持。行控制器包含连接到界面元素的输出口，以及（在需要时）处理与控件交互的函数。\n\
    \n表格、行和行控制器之间的关系如图 14-1 所示。\n\n![A978-1-4842-1242-4_14_Fig1_HTML.jpg](img/A978-1-4842-1242-4_14_Fig1_HTML.jpg)\n\
    \n图 14-1. 表格、行和行控制器之间的关系\n\n创建基于表格的 WatchKit 应用程序的过程包含四个步骤：\n\n1.  在 Storyboard\
    \ 中创建一个表格对象，并在行中布局控件。\n2.  创建 `NSObject` 子类，作为将要显示的每种类型行的控制器，并带有输出口连接到 Storyboard\
    \ 中的控件。\n3.  创建行控制器类的实例，并在运行时将其提供给表格。\n4.  响应用户与行的交互。\n\nWatchKit 表格是 `WKInterfaceTable`\
    \ 类的实例。从概念上讲，它们类似于 `UITableView`，但有一些显著的区别：\n\n- `WKInterfaceTable` 不使用数据源来按需创建单元格。相反，你需要在表格显示在界面上之前，预先创建所有单元格。\n\
    - 没有委托来处理交互；这也是需要你自己实现的部分。\n- 与其他 WatchKit 界面元素一样，不支持 AutoLayout，你需要使用 Storyboard\
    \ 来创建界面。\n- 当前一代 Apple Watch 设备的性能限制意味着，在实践中，当行数超过大约 20 行时，性能会下降到不可接受的程度。\n\n\
    图 14-2 展示了行控制器和行之间的关系。\n\n![A978-1-4842-1242-4_14_Fig2_HTML.jpg](img/A978-1-4842-1242-4_14_Fig2_HTML.jpg)\n\
    \n图 14-2. `WKInterfaceTable` 对象的组合方式\n\n在运行时，你需要负责告诉表格行的类型、数量和顺序，然后创建行控制器的实例，最后配置它们的输出口。你在这里有两个选择：\n\
    \n- 如果表格只有一种类型的单元格，你可以使用 `setNumberOfCells:withRowType` 函数：`table.setNumberOfRows(5,\
    \ withRowType: \"ContactRow\")`\n- 如果表格有不止一种类型的单元格，你需要将一个单元格标识符字符串数组传递给 `setRowTypes:`\
    \ 函数。例如，如果你有一个标题行、两个数据行和一个页脚行，你需要传入数组 `[\"HeaderCell\", \"DataCell\", \"DataCell\"\
    , \"FooterCell\"]`：`table.setRowTypes([\"HeaderCell\", \"DataCell\", \"DataCell\"\
    , \"FooterCell\"])`\n\n一旦你告诉表格哪一行是哪种类型的单元格，你就需要使用 `rowControllerAtIndex` 函数依次获取每一行的行控制器。现在你可以配置之前在行控制器类中定义的输出口了。此过程的示例见代码清单\
    \ 14-1。\n\n代码清单 14-1. 配置和更新 Watch 表格\n\n```\nfunc updateTable() {\n\n    // 创建数组来保存行类型\n\
    \    var rowsArray = [String]()\n\n    // 添加标题行作为第 0 行\n    rowsArray.append(\"\
    HeaderRow\")\n\n    // 为 dataArray 中的每个对象添加一个联系人行\n    for index in 1...self.dataArray.count\
    \ {\n        rowsArray.append(\"ContactRow\")\n    }\n\n    // 添加一个页脚行作为最后一行\n\
    \    rowsArray.append(\"FooterRow\")\n\n    // 配置表格以显示 rowsArray 中定义的行\n    self.watchTable.setRowTypes(rowsArray)\n\
    \n    // 检索每个联系人行并从 dataArray 中设置内容\n    // 从第 1 行开始，因为第 0 行是标题行\n    for index\
    \ in 1...self.dataArray.count {\n        var contactRow: ContactRowController\
    \ =\n        self.watchTable.rowControllerAtIndex(index) as! ContactRowController\n\
    \        var rowContent = self.dataArray[index]\n        contactRow.nameLabel!.setText(rowContent)\n\
    \    }\n\n    // 获取最后一行，并将其配置为页脚\n    let contactCount = self.dataArray.count\n\
    \    var footerRow: FooterRowController =\n    self.watchTable.rowControllerAtIndex(contactCount\
    \ + 1) as! FooterRowController\n    footerRow.footerLabel.setText(\"\\(contactCount)\
    \ messages\")\n}\n```\n\nStoryboard 将表格呈现为一行或多行。在每一行内部都有一个组，你可以在其中添加自定义控件，如图 14-3\
    \ 所示。\n\n![A978-1-4842-1242-4_14_Fig3_HTML.jpg](img/A978-1-4842-1242-4_14_Fig3_HTML.jpg)\n\
    \n图 14-3. 每行内部的组\n\n组中的控件以与普通 Storyboard 或 Xib 文件相同的方式连接到输出口。\n\n## 创建一个基本表格\n\
    \n在本节中，你将逐步创建一个演示性的 WatchKit 表格。它不会是一个具有动态数据源的完整应用程序，因为这超出了创建表格界面的范围，但它将向你展示如何连接一个可以进一步扩展的表格。\n\
    \n假设你从头开始创建一个新项目，这涉及四个步骤：\n\n- 创建一个新的 iPhone 项目，作为扩展的主机。\n- 创建一个 WatchKit 应用作为新目标，用于创建将在手表上运行的应用以及将配置表格的扩展。\n\
    - 在 Storyboard 中布局表格。\n- 创建用于在运行时填充表格的函数。\n\n### 创建项目\n\n首先，你需要一个新的 iPhone 项目。在\
    \ Xcode 中使用“文件”➤“新建”➤“项目”创建一个新项目，并选择“单视图应用程序”模板。给项目命名（我将其命名为 `WatchTable`），并将项目保存到合适的位置。\n\
    \n### 添加 WatchKit 目标\n\n如上所述，WatchKit 应用包含三个组件：\n\n- iPhone 应用，负责处理诸如与 API 通信等繁重任务。\n\
    - WatchKit 应用，在手表本身上运行。你将在此处通过 Storyboard 布局表格的视觉外观。\n- WatchKit 扩展，在 iPhone 上运行，包含用于管理表格内容和交互的代码。\n\
    \n所有这三个组件都捆绑到应用中，如果在安装应用时存在配对的 Apple Watch，系统将询问用户是否要将 WatchKit 应用安装到手表上。\n\n\
    要开始为 iPhone 应用扩展手表功能，首先需要创建一个新目标来添加 WatchKit 应用和扩展。\n\n从“文件”➤“新建”➤“目标”菜单中，选择 `WatchKit\
    \ App` 模板，如图 14-4 所示。\n\n![A978-1-4842-1242-4_14_Fig4_HTML.jpg](img/A978-1-4842-1242-4_14_Fig4_HTML.jpg)\n\
    \n图 14-4. 添加 WatchKit 目标\n\n然后系统会提示你设置新目标的选项。其中大部分是只读的，但你可以选择语言以及是否要向目标添加通知和快速查看场景。你不打算添加，所以更改选项以匹配图\
    \ 14-5 所示的选项，然后选择“完成”。\n\n![A978-1-4842-1242-4_14_Fig5_HTML.jpg](img/A978-1-4842-1242-4_14_Fig5_HTML.jpg)\n\
    \n图 14-5. 设置目标选项\n\n然后系统可能会提示你确认是否要激活 WatchTarget 应用的 Scheme，如图 14-6 所示。你需要激活，因此选择“激活”选项。\n\
    \n![A978-1-4842-1242-4_14_Fig6_HTML.jpg](img/A978-1-4842-1242-4_14_Fig6_HTML.jpg)\n\
    \n图 14-6. 激活 WatchTarget Scheme\n\n你现在应该会看到，在导航器中有了两个新文件夹，并且在项目和目标列表中有了两个新目标，如图\
    \ 14-7 所示。\n\n![A978-1-4842-1242-4_14_Fig7_HTML.jpg](img/A978-1-4842-1242-4_14_Fig7_HTML.jpg)\n\
    \n图 14-7. 新目标\n"
- fmt: '### Building the Table Interface


    You’re going to begin by building the table interface, so select the `Interface.storyboard`
    file in the `WatchTarget App` folder so that it’s shown in the main pane, as shown
    in Figure 14-8.


    ![A978-1-4842-1242-4_14_Fig8_HTML.jpg](A978-1-4842-1242-4_14_Fig8_HTML.jpg)


    **Figure 14-8.** The `Interface.storyboard` file


    To verify that everything is working correctly, let’s get the app to fire up with
    a “Hello, world!” message.


    Start by selecting a `Label` object in the Object browser, and drag this onto
    the watch interface. Then tweak the properties so that it looks like Figure 14-9.


    ![A978-1-4842-1242-4_14_Fig9_HTML.jpg](A978-1-4842-1242-4_14_Fig9_HTML.jpg)


    **Figure 14-9.** The “Hello, world!” label


    You’ll notice that the options are much more limited than you would see with a
    `UILabel`. The Apple Watch doesn’t support AutoLayout, so there are only a few
    layout options available.


    If you now select the `WatchTarget` app from the Schemes drop-down (shown in Figure
    14-10) and run the app, the iPhone and Watch simulators will start.


    ![A978-1-4842-1242-4_14_Fig10_HTML.jpg](A978-1-4842-1242-4_14_Fig10_HTML.jpg)


    **Figure 14-10.** Selecting the `WatchTarget` to run the app in the Apple Watch
    Simulator


    You’ll see the results as shown in Figure 14-11. This verifies that everything
    is running correctly, and that the WatchKit app has been correctly installed.


    ![A978-1-4842-1242-4_14_Fig11_HTML.jpg](A978-1-4842-1242-4_14_Fig11_HTML.jpg)


    **Figure 14-11.** The “Hello, world!” app running on the Apple Watch Tip


    The default Apple Watch simulator doesn’t really give you much of a feel for how
    the app will look when it’s running on an actual device. To get a better impression,
    I’m using an app called Bezel ([http://infinitapps.com/bezel](http://infinitapps.com/bezel)),
    which displays the Simulator output inside a mocked-up watch bezel. You can select
    the bezel type to use, so it’s definitely the cheapest option for testing on an
    18-karat Rose Gold Watch with a Link bracelet.


    Having confirmed that the WatchKit app runs, you can start the process of building
    the table.


    ### Creating the Table


    Switch back to the WatchKit app’s `Interface.storyboard`, delete the label that
    you created a moment ago, and replace it with a table dragged from the Objects
    list. This will auto-size in the frame to create a table with a single row (shown
    in Figure 14-12).


    ![A978-1-4842-1242-4_14_Fig12_HTML.jpg](A978-1-4842-1242-4_14_Fig12_HTML.jpg)


    **Figure 14-12.** The table placed in the Watch interface


    As well as rows containing actual data, you’re also going to add header and footer
    rows to the table. Each type of row (header, data, and footer) will have its own
    row controller, which will be an instance of a custom class that you’ll create
    in a moment.


    Setting this up takes four steps:


    - Increase the number of rows in the table so that there is a row for each type
    of cell that will appear.

    - Create the layout for each cell type in the Storyboard by adding controls.

    - Create a custom class for each row type with outlets to connect to the controls
    in the cell, and (if required) functions to handle user interaction with those
    controls.

    - Associate each row type with its custom class.


    Remember that unlike `UITableView`, the cell layout takes place in the Storyboard.


    #### Creating the Rows


    To create the new rows, highlight the table in the Interface Controller scene,
    and switch to the Attributes Inspector if it’s not already visible, as shown in
    Figure 14-13.


    ![A978-1-4842-1242-4_14_Fig13_HTML.jpg](A978-1-4842-1242-4_14_Fig13_HTML.jpg)


    **Figure 14-13.** Setting the number of rows in the table


    Increase the number of rows by updating the field in the Attributes Inspector.
    This will add another row type in the Storyboard, and add another Interface Controller
    object in the object hierarchy.


    Your layout will need three row types; one for the header, one for data rows,
    and one for the footer. Update the number of rows to 3, so that the object hierarchy
    looks like that in Figure 14-14.


    ![A978-1-4842-1242-4_14_Fig14_HTML.jpg](A978-1-4842-1242-4_14_Fig14_HTML.jpg)


    **Figure 14-14.** The three rows


    #### Laying Out the Rows


    With the three rows in place, you can now lay out the controls in each one. Figure
    14-15 shows what my cells look like; you can play around with the layouts as you
    want (it’s good practice!) but make sure that you’ve got a `WKInterfaceImage`
    and a `WKInterfaceLabel` in the contact row, and a `WKInterfaceLabel` in the footer.


    ![A978-1-4842-1242-4_14_Fig15_HTML.jpg](A978-1-4842-1242-4_14_Fig15_HTML.jpg)


    **Figure 14-15.** Laying out the interface Tip


    The limitations of the WatchKit UI can make laying out interfaces tricky. To achieve
    the contact row layout, select its `Group`, then change the layout to `Vertical`
    in the Attributes Inspector.'
  raw: '### Building the Table Interface


    You’re going to begin by building the table interface, so select the `Interface.storyboard`
    file in the WatchTarget App folder so that it’s shown in the main pane, as shown
    in Figure [14-8](#A978-1-4842-1242-4_14_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_14_Fig8_HTML.jpg](A978-1-4842-1242-4_14_Fig8_HTML.jpg)


    Figure 14-8.


    The Interface.storyboard file


    To verify that everything is working correctly, let’s get the app to fire up with
    a “Hello, world!” message.


    Start by selecting a Label object in the Object browser, and drag this onto the
    watch interface. Then tweak the properties so that it looks like Figure [14-9](#A978-1-4842-1242-4_14_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_14_Fig9_HTML.jpg](A978-1-4842-1242-4_14_Fig9_HTML.jpg)


    Figure 14-9.


    The “Hello, world!” label


    You’ll notice that the options are much more limited than you would see with a
    `UILabel`. The Apple Watch doesn’t support AutoLayout, so there are only a few
    layout options available.


    If you now select the WatchTarget app from the Schemes drop-down (shown in Figure
    [14-10](#A978-1-4842-1242-4_14_Chapter.html#Fig10)) and run the app, the iPhone
    and Watch simulators will start.


    ![A978-1-4842-1242-4_14_Fig10_HTML.jpg](A978-1-4842-1242-4_14_Fig10_HTML.jpg)


    Figure 14-10.


    Selecting the WatchTarget to run the app in the Apple Watch Simulator


    You’ll see the results as shown in Figure [14-11](#A978-1-4842-1242-4_14_Chapter.html#Fig11).
    This verifies that everything is running correctly, and that the WatchKit app
    has been correctly installed.


    ![A978-1-4842-1242-4_14_Fig11_HTML.jpg](A978-1-4842-1242-4_14_Fig11_HTML.jpg)


    Figure 14-11.


    The “Hello, world!” app running on the Apple Watch Tip


    The default Apple Watch simulator doesn’t really give you much of a feel for how
    the app will look when it’s running on an actual device. To get a better impression,
    I’m using an app called Bezel ( [`http://infinitapps.com/bezel`](http://infinitapps.com/bezel)
    ), which displays the Simulator output inside a mocked-up watch bezel. You can
    select the bezel type to use, so it’s definitely the cheapest option for testing
    on an 18-karat Rose Gold Watch with a Link bracelet.


    Having confirmed that the WatchKit app runs, you can start the process of building
    the table.


    ### Creating the Table


    Switch back to the WatchKit app’s Interface.storyboard, delete the label that
    you created a moment ago, and replace it with a table dragged from the Objects
    list. This will auto-size in the frame to create a table with a single row (shown
    in Figure [14-12](#A978-1-4842-1242-4_14_Chapter.html#Fig12)).


    ![A978-1-4842-1242-4_14_Fig12_HTML.jpg](A978-1-4842-1242-4_14_Fig12_HTML.jpg)


    Figure 14-12.


    The table placed in the Watch interface


    As well as rows containing actual data, you’re also going to add header and footer
    rows to the table. Each type of row (header, data, and footer) will have its own
    row controller, which will be an instance of a custom class that you’ll create
    in a moment.


    Setting this up takes four steps:


    *   Increase the number of rows in the table so that there is a row for each type
    of cell that will appear.

    *   Create the layout for each cell type in the Storyboard by adding controls.

    *   Create a custom class for each row type with outlets to connect to the controls
    in the cell, and (if required) functions to handle user interaction with those
    controls.

    *   Associate each row type with its custom class.


    Remember that unlike `UITableView`, the cell layout takes place in the Storyboard.


    #### Creating the Rows


    To create the new rows, highlight the table in the Interface Controller scene,
    and switch to the Attributes Inspector if it’s not already visible, as shown in
    Figure [14-13](#A978-1-4842-1242-4_14_Chapter.html#Fig13).


    ![A978-1-4842-1242-4_14_Fig13_HTML.jpg](A978-1-4842-1242-4_14_Fig13_HTML.jpg)


    Figure 14-13.


    Setting the number of rows in the table


    Increase the number of rows by updating the field in the Attributes Inspector.
    This will add another row type in the Storyboard, and add another Interface Controller
    object in the object hierarchy.


    Your layout will need three row types; one for the header, one for data rows,
    and one for the footer. Update the number of rows to 3, so that the object hierarchy
    looks like that in Figure [14-14](#A978-1-4842-1242-4_14_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_14_Fig14_HTML.jpg](A978-1-4842-1242-4_14_Fig14_HTML.jpg)


    Figure 14-14.


    The three rows


    #### Laying Out the Rows


    With the three rows in place, you can now lay out the controls in each one. Figure
    [14-15](#A978-1-4842-1242-4_14_Chapter.html#Fig15) shows what my cells look like;
    you can play around with the layouts as you want (it’s good practice!) but make
    sure that you’ve got a `WKInterfaceImage` and a `WKInterfaceLabel` in the contact
    row, and a `WKInterfaceLabel` in the footer.


    ![A978-1-4842-1242-4_14_Fig15_HTML.jpg](A978-1-4842-1242-4_14_Fig15_HTML.jpg)


    Figure 14-15.


    Laying out the interface Tip


    The limitations of the WatchKit UI can make laying out interfaces tricky. To achieve
    the contact row layout, select its `Group`, then change the layout to `Vertical`
    in the Attributes Inspector.'
  trans: '

    ### 构建表格界面


    首先，你需要构建表格界面，因此选择位于`WatchTarget App`文件夹中的`Interface.storyboard`文件，使其显示在主面板中，如图
    14-8 所示。


    ![A978-1-4842-1242-4_14_Fig8_HTML.jpg](img/A978-1-4842-1242-4_14_Fig8_HTML.jpg)


    **图 14-8.** `Interface.storyboard`文件


    为了验证一切是否正常运作，我们让应用启动时显示一条“Hello, world!”消息。


    首先，在对象浏览器中选择一个`Label`对象，并将其拖放到手表界面上。然后调整其属性，使其看起来如图 14-9 所示。


    ![A978-1-4842-1242-4_14_Fig9_HTML.jpg](img/A978-1-4842-1242-4_14_Fig9_HTML.jpg)


    **图 14-9.** “Hello, world!”标签


    你会注意到，其可用选项比`UILabel`要有限得多。Apple Watch 不支持自动布局，因此只有少数布局选项可用。


    如果你现在从方案下拉菜单（如图 14-10 所示）中选择`WatchTarget`应用并运行它，iPhone 和 Watch 模拟器将会启动。


    ![A978-1-4842-1242-4_14_Fig10_HTML.jpg](img/A978-1-4842-1242-4_14_Fig10_HTML.jpg)


    **图 14-10.** 选择`WatchTarget`以在 Apple Watch 模拟器中运行应用


    你将看到如图 14-11 所示的结果。这验证了一切运行正常，并且 WatchKit 应用已正确安装。


    ![A978-1-4842-1242-4_14_Fig11_HTML.jpg](img/A978-1-4842-1242-4_14_Fig11_HTML.jpg)


    **图 14-11.** “Hello, world!”应用在 Apple Watch 上运行提示


    默认的 Apple Watch 模拟器并不能很好地让你感受应用在真实设备上运行时的外观。为了获得更好的体验，我使用了一款名为 Bezel ([`infinitapps.com/bezel`](http://infinitapps.com/bezel))
    的应用，它会在一个模拟的表圈内显示模拟器的输出。你可以选择要使用的表圈类型，因此对于在配有链式表带的 18K 玫瑰金手表上进行测试来说，这绝对是最经济的选择。


    确认 WatchKit 应用可以运行后，你就可以开始构建表格了。


    ### 创建表格


    切换回 WatchKit 应用的`Interface.storyboard`，删除你之前创建的标签，然后从对象列表中拖入一个表格来替换它。它会在框架中自动调整大小，创建一个只有一行的表格（如图
    14-12 所示）。


    ![A978-1-4842-1242-4_14_Fig12_HTML.jpg](img/A978-1-4842-1242-4_14_Fig12_HTML.jpg)


    **图 14-12.** 放置在手表界面中的表格


    除了包含实际数据的行之外，你还将为表格添加页眉和页脚行。每种类型的行（页眉、数据和页脚）都将拥有自己的行控制器，该控制器将是稍后您将创建的自定义类的实例。


    设置该功能需要四个步骤：


    -   增加表格中的行数，以确保每种显示的单元格类型都有一行。

    -   通过添加控件，在 Storyboard 中为每种单元格类型创建布局。

    -   为每种行类型创建一个包含输出口的自定义类，用于连接单元格中的控件，并且（如果需要）创建处理用户与这些控件交互的函数。

    -   将每种行类型与其自定义类关联。


    请记住，与`UITableView`不同，单元格的布局是在 Storyboard 中完成的。


    #### 创建行


    要创建新行，请在“界面控制器”场景中高亮表格，如果属性检查器尚未显示，则切换到该检查器，如图 14-13 所示。


    ![A978-1-4842-1242-4_14_Fig13_HTML.jpg](img/A978-1-4842-1242-4_14_Fig13_HTML.jpg)


    **图 14-13.** 设置表格中的行数


    通过在属性检查器中更新字段来增加行数。这将在 Storyboard 中添加另一种行类型，并在对象层次结构中添加另一个“界面控制器”对象。


    你的布局将需要三种行类型：一种用于页眉，一种用于数据行，一种用于页脚。将行数更新为 3，使得对象层次结构如图 14-14 所示。


    ![A978-1-4842-1242-4_14_Fig14_HTML.jpg](img/A978-1-4842-1242-4_14_Fig14_HTML.jpg)


    **图 14-14.** 三行


    #### 布局行


    三行就位后，你现在可以布局每一行中的控件了。图 14-15 显示了我的单元格外观；你可以根据需要自由调整布局（这是很好的练习！），但请确保联系人行中有一个`WKInterfaceImage`和一个`WKInterfaceLabel`，页脚中有一个`WKInterfaceLabel`。


    ![A978-1-4842-1242-4_14_Fig15_HTML.jpg](img/A978-1-4842-1242-4_14_Fig15_HTML.jpg)


    **图 14-15.** 布局界面提示


    WatchKit UI 的限制可能使得界面布局变得棘手。为了实现联系人行的布局，请选择其`Group`，然后在属性检查器中将布局更改为`Vertical`。

