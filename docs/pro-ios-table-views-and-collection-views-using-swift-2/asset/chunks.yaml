    | `collectionView(_:shouldUpdateFocus InContext:)` | Returns a `Bool` to control
    whether the focus update specified by the given context should occur. By default
    this returns `false`. |

    | `collectionView(_:didUpdateFocusIn Context:withAnimationCoordinator:)` | Called
    when a focus update in the provided context occurred. Does not return a value.
    |

    | `indexPathForPreferredFocusedViewIn CollectionView(_:)` | Returns the `NSIndexPath`
    for the preferred focused view in the provided collection view. |


    ## Datasources


    Datasources have a pretty straightforward role in life: they provide data and
    information about data and they handle manipulation of data. Like `delegates`,
    the `dataSource` protocols for `UITableView` and `UICollectionView` are similar
    but different, so we’ll look at each one individually.


    ## The UITableView dataSource


    A `UITableView` needs three key pieces of information in order to successfully
    draw itself and its cells:


    *   The number of sections in the table

    *   The number of rows in the section

    *   The cells that belong in the rows within the sections


    The `dataSource` exists to provide this information.


    ### Getting the Number of Sections in the Table


    A simple table has only one section, so tableviews will assume this is 1 unless
    the `numberOfSectionsInTableView(_:)`method is implemented and returns something
    different.


    Although `numberOfSectionsInTableView(_:)` is an optional method, I tend to always
    implement it so that it’s there. Because this is the first method that gets called,
    you can also speed things up by returning `0` if the dataset for your table is
    empty—after which the `tableView` assumes that it’s not going to get any additional
    data, and stops asking.


    ### Getting the Number of Rows in the Section


    Assuming that there’s data to display, the `tableView(_:numberOfRowsInSection:)`method
    is called. The `tableView` calling the method supplies the section number as an
    integer, and the method returns the number of rows (also as an integer).


    ### Getting Cells That Belong in This Row of This Section


    Creating cells to be displayed is at the heart of setting up the `tableView`.
    This is where your code will need to return an instance of a `UITableViewCell`
    for the `tableView` to display, each time the `tableView(_:cellForRowAtIndexPath:)`method
    is called.


    The `tableView` will provide the section and row numbers as an `indexPath`, and
    it’s up to your `tableView(_:cellForRowAtIndexPath:)` method to retrieve the data
    from the model, dequeue the cell, configure it, and return it as quickly as possible.


    ### How the Key Information Is Obtained by the Table


    The conversation between the four objects involved–the view controller that contains
    the `tableView`, the `tableView` itself, and the `delegate` and `dataSource` objects
    belonging to the `tableView`–takes place in a specific order. This is illustrated
    in Figure [5-10](#A978-1-4842-1242-4_5_Chapter.html#Fig10).


    First, the view controller allocates and instantiates the `tableView`, and then
    sets the `delegate` and `dataSource` properties.   Once in existence, the `tableView`
    asks the `dataSource` for the number of sections for itself, and the `dataSource`
    replies with an `NSInteger` value.   Then the `tableView` provides a reference
    to itself and a section number in an `indexPath` instance, and asks the `dataSource`
    for the number of rows in that section. Again, the `dataSource` replies with an
    `NSInteger`.   Finally, the `tableView` provides a reference to itself and the
    row number in an `indexPath` object, and asks the `dataSource` to supply the cell
    for that row. The `dataSource` replies with an instance of a `UITableViewCell`.
     


    ![A978-1-4842-1242-4_5_Fig10_HTML.jpg](A978-1-4842-1242-4_5_Fig10_HTML.jpg)


    Figure 5-10.


    Messaging between view controller, tableView, and datasource


    After your `dataSource` provides these three pieces of information, your `tableView`
    is in business. These three methods, and the other eight `dataSource` methods,
    are defined in the `UITableViewDataSource` protocol.'
