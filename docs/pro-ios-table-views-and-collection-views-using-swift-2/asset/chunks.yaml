    ### 集合视图项


    集合视图项是 `UICollectionReusableView` 或其子类的实例。它们扮演以下三种角色之一：


    -   **项目单元格**，创建为 `UICollectionViewCell` 的实例。它们类似于表格视图的单元格，用于显示主要数据项。例如，在相册应用中，这些单元格可能显示相册中照片的缩略图。

    -   **补充视图**，是 `UICollectionReusableView` 的实例。这些是完全可选的，并且可以有多种用途。在网格型布局中（例如照片库），它们通常用作页眉和页脚（例如相册名称）来提供关于分区的元数据。在更复杂的布局中，它们可用于显示关于项目的附加信息，例如图像元数据。

    -   **装饰视图**，也是 `UICollectionReusableView` 的实例（也是可选的）。它们独立于集合视图的模型，不显示任何数据。通常用于显示视觉元素，例如背景。


    图 4-5 以高亮显示各种类型视图的方式，展示了具有网格布局的集合视图的概念组成部分。


    ![A978-1-4842-1242-4_4_Fig5_HTML.jpg](img/A978-1-4842-1242-4_4_Fig5_HTML.jpg)


    *图 4-5. 集合视图的基本结构*


    图 4-6 展示了 iOS iBooks 应用中实际运行的集合视图。它使用单元格来显示书籍封面，使用包含下载控件的补充视图，以及使用装饰视图来提供背景渐变“书架”效果。


    ![A978-1-4842-1242-4_4_Fig6_HTML.jpg](img/A978-1-4842-1242-4_4_Fig6_HTML.jpg)


    *图 4-6. iBooks 应用*


    与 `UITableViewCell` 不同，`UICollectionViewCell` 没有预定义的单元格类型。相反，你会得到一个空的 `contentView`，你可以在其中放置自己的控件。因此，当构建集合视图时，你最终总是需要创建至少一个单元格对象。


    可以通过以下几种方式创建单元格：


    -   在 Storyboard 中可视化为原型单元格

    -   在独立的 `.xib` 文件中可视化为集合视图单元格

    -   在代码中，通过配置 `UICollectionViewCell` 的“标准”实例

    -   作为自定义的 `UICollectionViewCell` 子类


    我们将在后面的章节中探讨所有这四种方法。


    ### 集合视图布局


    与表格视图不同，集合视图对如何布局其项目的位置一无所知。相反，它们依赖一个独立的对象——集合视图布局——来在任意给定时刻确定每个项目的属性。然后，集合视图使用这些属性来确定每个项目应该出现的位置及其外观。


    集合视图的布局是 `UICollectionViewLayout` 的子类，负责计算集合视图的整体内容大小，以及在集合视图请求时为每个单独项目计算布局属性。


    这些属性控制项目显示和放置的各个方面：frame、bounds、center、size、transform、`transform3D`、alpha、z-index
    和可见性。通过操作这些属性，可以设计出从简单的项目行和列到复杂的、动画交互式 3D 排列的布局。


    可以单独请求特定项目的属性，也可以批量请求集合视图内容区域内特定部分包含的所有项目的属性。高效地执行所涉及的计算，对于确保集合视图性能起着重要作用。


    由于行和列布局非常常见，`UIKit` 附带了一个名为 `UICollectionViewFlowLayout` 的预定义 `UICollectionViewLayout`
    子类。它实现了一个项目水平或垂直行的“自动换行”布局，并自动处理换行位置的确定。这消除了设置集合视图布局所涉及的大量繁重工作，并且也可以对其进行子类化以获得更精细的控制。


    我们将在第 15 章和第 16 章详细讨论集合视图布局。


    ### 详细解析支持对象


    集合视图控件本身非常笨拙，它依赖其他五个对象的支持来显示其数据：


    -   视图控制器

    -   模型

    -   数据源

    -   委托

    -   布局


    每个对象在支持集合视图方面都扮演着特定的角色，它们的组织基于模型-视图-控制器架构。图 4-7 显示了这五个对象是如何相互关联的。


    ![A978-1-4842-1242-4_4_Fig7_HTML.jpg](img/A978-1-4842-1242-4_4_Fig7_HTML.jpg)


    *图 4-7. 集合视图与支持对象之间的相互关系*


    #### 集合视图的模型


    模型包含将通过数据源在集合视图中显示的数据。顾名思义，它是模型-视图-控制器架构中模型组件的一部分。


    模型可以采用多种形式；形式将取决于应用中数据需要管理的方式。最简单的形式，模型可能是一维数组，包含一组 `Strings`。更复杂的模型可能涉及二维数组以将数据分割成多个分区，或者可以从本地持久数据库或外部网络源检索数据。


    无论模型采用何种形式，它都不会直接与集合视图通信。那是数据源的职责。


    #### 集合视图的数据源


    数据源对象的职责是在请求时向集合视图提供单元格、补充视图和装饰视图，以便它们能够被集合视图显示。它构成了模型-视图-控制器架构中模型组件的另一部分，并在模型中的底层数据和集合视图本身之间进行调解。


    集合视图与其数据源之间的关系由 `UICollectionViewDataSource` 协议定义。集合视图的数据源必须实现一些强制方法，以及一些可选方法。


    数据源可以是一个符合 `UICollectionViewDataSource` 协议的独立类，也可以是集合视图的视图控制器。


    关于哪种方法是正确的，并没有硬性规定。将功能拆分到一个单独的类中有助于保持应用结构良好，但无论其如何实现，数据源能够尽可能快地将数据返回给集合视图对于最大化性能至关重要。


    #### 集合视图的委托


    处理与集合视图的用户交互是委托对象的职责，它构成了模型-视图-控制器架构中控制器组件的一部分。


    委托是一个实现了 `UICollectionViewDelegate` 协议定义的部分或全部方法的类。这些方法处理集合视图项目的选择和高亮。


    `UICollectionViewDelegate` 协议中没有强制方法，因此集合视图运行不一定需要 `delegate` 对象。


    就像数据源一样，委托通常是管理集合视图所在视图的 `UIViewController` 子类。然而，这并非必须如此。如果创建一个独立的类来充当委托，有助于保持类的大小可控。


    我们将在第 5 章更详细地探讨数据源和委托。

    '
- fmt: '# The Collection View’s Layout


    Unlike `UITableView`, a `UICollectionView` control has no knowledge about how
    it should lay out items in its content view, and so it relies on a `UICollectionViewLayout`
    object to provide layout attributes for every item.


    Each item in the collection view (cell, supplementary view, or decoration view)
    has a corresponding instance of `UICollectionViewLayoutAttributes`. These define
    the layout-related attributes for the item, and are created by the `UICollectionViewLayout`
    object when requested by the collection view.


    Having requested the attributes for each item, the collection view then uses these
    to position the item in its content view. The attributes control the size, position,
    transform, and opacity of each item, but you can also supplement to control other
    properties of the items by subclassing `UICollectionViewLayoutAttributes` and
    adding your own custom properties.


    If your collection view layout is based around a line of items, with or without
    line breaks, then you can take advantage of the `UICollectionViewFlowLayout` class,
    which takes care of much of the layout requirements for you. You will normally
    only need to specify item sizes and inter-item and inter-line spacing, after which
    the flow layout will figure out how to arrange everything else for you.


    For more complex layouts, you’ll need to create a custom layout as a subclass
    of `UICollectionViewLayout`. With this, you’re responsible for calculating all
    the necessary attributes to display the items correctly.


    We’ll look at flow layouts in more detail in [Chapter 15](#A978-1-4842-1242-4_15_Chapter.html)
    and custom layouts in [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html).


    ## Creating Collection Views


    Because a `UICollectionView` relies on the support of its delegate and datasource,
    the process of creating one can be broken down into two stages:


    - Setting up the visual elements, either in a Storyboard, an Interface Builder
    `xib` file, or in code

    - Setting up the supporting classes in code


    Although both steps need to be completed before the collection view will function,
    you can do either one first. We’ll go into more detail about creating and configuring
    the supporting classes in [Chapter 15](#A978-1-4842-1242-4_15_Chapter.html). For
    the moment, let’s look at what is involved in creating the interface.


    ### Creating a UICollectionView with Interface Builder


    There are three approaches to creating `UICollectionViews` with Interface Builder:


    - Embedding a `UICollectionView` object inside an existing view in a Storyboard
    scene or XIB file

    - Creating a `UICollectionViewController` object as an entire Storyboard scene

    - Creating a XIB file containing a `UICollectionView` as part of the process of
    adding a `UICollectionViewController` subclass to the project


    #### Embedding a UICollectionView into an Existing View


    Embedding a `UICollectionView` into an existing view in a Storyboard or XIB is
    very easy.


    Open the Storyboard or XIB in Interface Builder. Drag a `UICollectionView` object
    from the Object Browser into the main view, as shown in Figure [4-8](#A978-1-4842-1242-4_4_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_4_Fig8_HTML.jpg](A978-1-4842-1242-4_4_Fig8_HTML.jpg)


    Figure 4-8.


    A UICollectionView object in the Object Browser Set up the AutoLayout constraints
    so that the collection view will be sized correctly. Often the collection view
    will be full-screen, although of course it can be placed in the interface with
    any size using the appropriate constraints.


    It’s common for the roles of the collection view’s delegate and datasource to
    be played by the view controller that owns the scene in which the collection view
    is placed. If this is the case, you can connect these directly in Interface Builder.


    Select the collection view in Interface Builder, then Ctrl-click and drag up to
    the view controller object in the object tree. As the mouse cursor hovers over
    the view controller object, it will be highlighted. Release the mouse button,
    and a popover showing the delegate and datasource will appear, as shown in Figure
    [4-9](#A978-1-4842-1242-4_4_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_4_Fig9_HTML.jpg](A978-1-4842-1242-4_4_Fig9_HTML.jpg)


    Figure 4-9.


    Connecting the delegate and datasource Click each in turn to connect the collection
    view’s delegate and datasource to the view controller.


    **Caution**


    Just connecting the delegate and datasource outlets doesn’t implement any of the
    functionality in the view controller that the collection view will need to work.
    You’re responsible for making sure that the class implements the required methods
    from the `UICollectionViewDelegate` and `UICollectionViewDatasource` protocols.
    This is covered in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html).


    #### Adding a UICollectionView as a Storyboard Scene


    If you have a `UICollectionView` that will be displayed full-screen, then you
    can add it to the Storyboard as an entire scene. The advantage of taking this
    approach is that the collection view is the root view of the scene, rather than
    being a subview of a parent `UIView`. The difference in structure is shown in
    Figure [4-10](#A978-1-4842-1242-4_4_Chapter.html#Fig10).


    ![A978-1-4842-1242-4_4_Fig10_HTML.jpg](A978-1-4842-1242-4_4_Fig10_HTML.jpg)


    Figure 4-10.


    Comparing a subview with an entire scene


    There’s a prerequisite for this approach, however; you’ll need to have (or implement
    before you try to run the project!) a subclass of `UICollectionViewController`
    to act as the delegate and datasource for the collection view that is contained
    in the scene. By default, the collection view scene assumes that its parent class
    will act as both.


    Creating this `UICollectionViewController` subclass is covered in more detail
    in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html).


    There are two steps to adding a `UICollectionView` as an entire scene.


    ![A978-1-4842-1242-4_4_Fig12_HTML.jpg](A978-1-4842-1242-4_4_Fig12_HTML.jpg)


    Figure 4-12.


    Updating the class


    ![A978-1-4842-1242-4_4_Fig11_HTML.jpg](A978-1-4842-1242-4_4_Fig11_HTML.jpg)


    Figure 4-11.


    Selecting the Collection View Controller Select the Collection View Controller
    object from the object browser, then drag it out into the Storyboard. This will
    add the scene containing the collection view, as shown in Figure [4-11](#A978-1-4842-1242-4_4_Chapter.html#Fig11).
    Update the scene’s Custom Class properties so that it belongs to your `UICollectionViewController`
    class. Select the Collection View Controller in the scene’s tree, as shown in
    Figure [4-11](#A978-1-4842-1242-4_4_Chapter.html#Fig11), then switch to the Identity
    Inspector in the Utilities panel and update the `Custom Class` field as shown
    in Figure [4-12](#A978-1-4842-1242-4_4_Chapter.html#Fig12). In this example, the
    project contains a `UICollectionViewController` subclass called `MyCollectionViewController`.'
