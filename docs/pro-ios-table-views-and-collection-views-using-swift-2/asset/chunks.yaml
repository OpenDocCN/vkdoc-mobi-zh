        `forIndexPath: indexPath) as! CustomClassCell`


        `cell.cellTitle = "Cell \(tableData[indexPath.row])..."`


        `cell.cellSubtitle = "...\(tableData[indexPath.row]) lleC"`


        `return cell`


    `}`


    Behind the scenes, the cell’s `init` and `layoutSubviews` functions are being
    called:


    *   The `init` function is called when a new instance of the cell is instantiated.
    This will only happen when the first few cells are created; after that, the table
    or collection view will cache cells for reuse once they scroll off the top or
    bottom of the view.

    *   The `layoutSubviews` function is called just before the cell is displayed,
    so this is where you update the cell controls to display the data that was passed
    into the cell when it was dequeued.


    ### Overriding the prepareForReuse Function


    The `prepareForReuse()` function is called just before the cell is returned from
    the `dequeueReusableCellWithIdentifier:` or `dequeueReusableViewWithIdentifier:`
    functions.


    It’s a last chance to clean the cell up before it’s reused, but there are a couple
    of things to bear in mind when overriding this function:


