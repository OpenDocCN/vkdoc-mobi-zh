    ![A978-1-4842-1242-4_14_Fig31_HTML.jpg](A978-1-4842-1242-4_14_Fig31_HTML.jpg)


    Figure 14-31.


    The detail view


    This is a very simplistic implementation, but the context object allows you to
    pass information between controllers to build up a drill-down style navigation
    journey.


    ### Adding Navigation in Code


    In the previous section, you saw how to implement a navigation flow using Storyboards
    and segues. You can also create the same end results by using code instead.


    Instead of linking the two Storyboard scenes with a segue, you can rely on the
    `didSelectRowAtIndex` function, and trigger the push of the detail controller
    with the `pushControllerWithName:context:` function.


    Listing [14-10](#A978-1-4842-1242-4_14_Chapter.html#FPar14) shows the updated
    `didSelectRowAtIndex:`function.


    Listing 14-10. Pushing the Detail Controller in Code


    `override func table(table: WKInterfaceTable, didSelectRowAtIndex rowIndex: Int)
    {`


        `for index in 0..<dataArray.count {`


            `var contactRow: ContactRowController = ➤`


          `watchTable.rowControllerAtIndex(index+1) as! ContactRowController`


            `contactRow.nameLabel!.setTextColor(UIColor.whiteColor())`


        `}`


        `let selectedRow: ContactRowController = ➤`


      `watchTable.rowControllerAtIndex(rowIndex) as! ContactRowController`


        `selectedRow.nameLabel.setTextColor(UIColor.redColor())`


        `let contextDictionary = ["selectedName" : dataArray[rowIndex - 1]]`


        `self.pushControllerWithName("DetailInterface", context: contextDictionary)`


    `}`


    Here you’re using the `pushControllerWithName:` `context` `:` function to perform
    the navigation. It relies on the detail controller having its `identifier` set
    in the Attributes Inspector. Figure [14-32](#A978-1-4842-1242-4_14_Chapter.html#Fig32)
    shows this for the `DetailInterface` scene.


    ![A978-1-4842-1242-4_14_Fig32_HTML.jpg](A978-1-4842-1242-4_14_Fig32_HTML.jpg)


    Figure 14-32.


    Setting the Interface controller’s identifier


    ## Summary


    In this chapter, you learned how to create, configure, and use the table control
    that forms part of WatchKit.


    WatchKit is designed for the small, low-powered Apple Watch, so the `WKInterfaceTable`
    control is much less powerful than `UITableView`, but nonetheless, it can be used
    to present table-based information and act as a navigation interface.


    # 15. Collection View Flow Layouts


    In this chapter, you’ll look at one of the most useful components of the `UICollectionView`
    family, the flow layout. The flow layout allows you to build collection views
    containing rows or columns of items with very little effort, but also provides
    some fine-grained control over various attributes to allow you to fine tune its
    appearance.


    The sample application code for this chapter implements a flow-based layout to
    illustrate many of its features and to provide a template that you can adapt for
    your own purposes.


    ## About Flow Layouts


    A layout consisting of rows or columns of items is a very common user interface
    design. It’s a staple of apps ranging from galleries to bookshelves. Some examples
    are shown in Figures [15-1](#A978-1-4842-1242-4_15_Chapter.html#Fig1) through
    [15-3](#A978-1-4842-1242-4_15_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_15_Fig3_HTML.jpg](A978-1-4842-1242-4_15_Fig3_HTML.jpg)


    Figure 15-3.


    A highly customized flow layout in the Artsy app


    ![A978-1-4842-1242-4_15_Fig2_HTML.jpg](A978-1-4842-1242-4_15_Fig2_HTML.jpg)


    Figure 15-2.


    A simple flow layout in action in iBooks


    ![A978-1-4842-1242-4_15_Fig1_HTML.jpg](A978-1-4842-1242-4_15_Fig1_HTML.jpg)


    Figure 15-1.


    A flow layout in action on an iPhone 6


    Although grid-style layouts can appear visually simple, when you consider the
    calculations that are involved in figuring out aspects such as spacing of items,
    or where to wrap each line, things get complex very quickly.


    Fortunately, Apple recognized this and ships `UICollectionView` with a “canned”
    layout that makes it very easy to create line-based interfaces. `UICollectionViewFlowLayout`
    can be used to whip up grid layouts with very little configuration, but it allows
    a degree of customization that allows you to create very sophisticated interfaces
    with a minimum of code.


    ## The Characteristics of a Flow Layout


    You can think of a flow layout as being like a sentence where words are arranged
    in rows from one side to the other, and when the row reaches the side of the page,
    the line “wraps” down to the next one.


    In iOS terms, the page corresponds to the collection view’s bounds, and the words
    are analogous to the collection view items. Each line of words corresponds to
    a collection view row. See Figure [15-4](#A978-1-4842-1242-4_15_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_15_Fig4_HTML.jpg](A978-1-4842-1242-4_15_Fig4_HTML.jpg)


    Figure 15-4.


    How flow layouts operate


    The analogy can be taken still further: flow layouts can be broken into sections,
    with headers and footers, just as pages can be divided up into paragraphs with
    headings. And just as individual words have different lengths, so flow layouts
    can display items of different sizes (both horizontally and vertically).


    ## UICollectionViewFlowLayout


    A `UICollectionViewFlowLayout` is a concrete subclass of `UICollectionViewLayout`
    that adds a number of attributes to control the flow of items. It handles most
    of the calculations involved in figuring out item and line spacing, together with
    line wrapping.


    Attributes that you can control are the following:


    *   The scroll direction (vertically or horizontally relative to the collection
    view)

    *   Line and item spacing

    *   Item sizing

    *   Header and footer sizing

    *   Section insets


    Once you’ve provided those values, the flow layout handles all the calculations
    involved in figuring out how to position and space items, and when to break lines
    in order to fit all the items neatly into the space available.


    The size and spacing attributes of `UICollectionViewFlowLayout` apply globally
    to all items, headers, footers, and sections, which is useful if the collection
    view’s items will be constant sizes. If you need to display items with varying
    sizes, you need to implement an optional delegate object that conforms to the
    `UICollectionViewDelegateFlowLayout` protocol.


    The flow layout’s delegate object provides fine-grain control over the size of
    items, section spacing, and the sizing of headers and footers. This is useful
    if your items will vary in size, such as if you’re building a gallery that will
    display thumbnail images of different heights or widths.


    The functions of the delegate protocol are all optional, so you do not need to
    implement them unless you need to control the attribute in question.'
