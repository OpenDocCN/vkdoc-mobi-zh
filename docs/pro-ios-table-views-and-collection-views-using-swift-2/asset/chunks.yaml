    \ cell 显示之前被调用，尽管从出队到显示之间通常不会有太大的延迟。\n\n作为经验法则，你应该使用此方法基于底层数据模型的单个属性来更新 cell 的内容——例如，字段或图像视图的内容。\n\
    \n#### 委托的 `willDisplayCellAtIndexPath:` 函数\n\n`UICollectionViewDelegate` 的 `willDisplayCellForItemAtIndexPath:`\
    \ 函数由 `collectionView` 在每个 cell 即将显示之前调用。这发生在 cell 绘制到集合视图之前，因此是在显示前调整 cell 内容的最后时机。\n\
    \n在此处更改 cell 内容是可能的，但有几点原因建议你仅进行小而具体的更改：\n\n*   如果使用此方法更新 cell 内容，会模糊集合视图的 `dataSource`\
    \ 与 `delegate` 对象之间的职责区分。这可能导致未来重构困难，并可能使代码变得混乱。\n*   此函数在 cell 显示前被调用，因此如果执行缓慢，会对集合视图的滚动性能产生不利影响。\n\
    \n作为经验法则，你应将该函数的使用限制为基于选择更新 cell 内容，例如设置或移除复选框。\n\n### 与 Cell、Section 和 Item 相关的\
    \ `UICollectionViewDataSource` 方法\n\n表 5-6 列出了四个主要方法，它们负责提供这些信息。其中两个方法是必需的。\n\n\
    表 5-6. `UICollectionViewDataSource` 协议的 Cell、Section 和 Item 方法\n\n| 方法 | 目的 |\
    \ 返回类型 | 是否必需 |\n| --- | --- | --- | --- |\n| `numberOfSectionsInCollectionView(_:)`\
    \ | 返回集合视图中的 section 数量 | `NSInteger` | 否 |\n| `collectionView(_:numberOfItemsInSection:)`\
    \ | 返回给定 section 中的 item 数量 | `NSInteger` | 是 |\n| `collectionView(_:cellForItemAtIndexPath:)`\
    \ | 为提供的索引路径下的 item 返回一个 `UICollectionViewCell` | `UICollectionViewCell` | 是 |\n\
    | `collectionView(_:viewForSupplementaryElementOfKind:atIndexPath:)` | 为提供的索引路径下的\
    \ item 返回一个用作补充视图的 `UICollectionReusableView` | `UICollectionReusableView` | 否\
    \ |\n\n补充视图是可选的，仅当你的集合视图布局需要时才需要提供。\n\n尽管 `collectionView` 需要知道所需的 section 数量，但默认值为\
    \ `1`，这就是为什么你常常会在简单的集合视图中看到 `numberOfSectionsInCollectionView` 被省略。\n\n## 关于 `dataSource`\
    \ 方法需要记住的一点\n\n虽然表格视图和集合视图表面看起来很简单，但底层涉及大量操作。流畅且即时的滚动是良好用户体验的关键。例如，你会听到关于 iPad\
    \ 竞争对手的主要抱怨之一就是它们的滚动存在卡顿和不流畅。\n\n为了使视图能够平滑滚动，你的 `dataSource` 必须准备好随时按需提供数据。返回数据的延迟意味着绘制\
    \ cell 和更新视图布局的延迟——这会导致用户界面出现卡顿。\n\n使数据立即可用可以有多种形式，缓存数据查询是一个明显的方法。无需多言，从网络源实时检索\
    \ `tableView` 或 `collectionView` 数据是一个非常糟糕的主意。\n\n如果你的数据不能立即可用，可能有必要先提供占位信息，并在数据可用后稍后再回去更新缺失的值。\n\
    \n`UITableView` 有三组方法可用于此目的：`reloadData` 重新加载整个表格，而 `reloadRowsAtIndexPath` 更新特定行。`reloadSectionIndexTitles`\
    \ 和 `reloadSections:withRowAnimation:` 更新指定的 section。\n\n`UICollectionViews` 以非常类似的方式处理更新：`reloadData`\
    \ 重新加载整个集合视图，`reloadSections:` 对特定 section 执行相同操作，`reloadItemsAtIndexPaths:` 重新加载多个特定\
    \ item。\n\n## 实现 `dataSource` 和 `delegate` 协议\n\n一种常见的模式是，负责显示表格或集合视图的视图控制器同时充当\
    \ `dataSource` 和 `delegate`，但请继续阅读本章，了解为什么这可能不总是一个好主意！\n\n注意\n\n本节中的所有内容同样适用于\
    \ `UITableView` 和 `UICollectionView`，因此 “表格视图” 也指代 “集合视图”，反之亦然。\n\n为了使表格视图能够将某个类用作其\
    \ `dataSource` 或 `delegate`，该类必须遵循 `UITableViewDataSource` 和 `UITableViewDelegate`\
    \ 协议。有两种方法可以实现这一点：第一种是在类的主体中声明其遵循性并实现必需的方法，如代码清单 5-4 所示。\n\n代码清单 5-4. 充当 `UITableViewDataSource`\
    \ 和 `UITableViewDelegate` 的示例类\n\n```\nclass ViewController: UIViewController,\
    \ UITableViewDataSource, UITableViewDelegate {\n\n    // mark: -\n    // mark:\
    \ UIViewController methods\n\n            // ...\n            // UIViewController\
    \ methods here\n            // ...\n\n    // mark: -\n    // mark: UITableView\
    \ methods\n\n    func numberOfSectionsInTableView(tableView: UITableView) -> Int\
    \ {\n        ...\n    }\n\n    func tableView(tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        ...\n    }\n\n    func tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath:\n    NSIndexPath) -> UITableViewCell\
    \ {\n        ...\n    }\n}\n```\n\n一种更符合 Swift 风格的方式是为 `UIViewController` 添加扩展，如代码清单\
    \ 5-5 所示。\n\n代码清单 5-5. 使用扩展实现协议\n\n```\nimport UIKit\n\nclass ViewController:\
    \ UIViewController {\n    // ...\n    // view controller methods here\n}\n\nextension\
    \ ViewController: UITableViewDataSource, UITableViewDelegate {\n\n    func numberOfSectionsInTableView(tableView:\
    \ UITableView) -> Int {\n        ...\n    }\n\n    func tableView(tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int {\n        ...\n    }\n\n    func\
    \ tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\n    NSIndexPath)\
    \ -> UITableViewCell {\n        ...\n    }\n}\n```\n\n以这种方式组织代码可以更清晰地区分 `UIViewController`\
    \ 方法与 `dataSource`/`delegate` 函数——并且如果你稍后需要将这些函数重构到单独的类中，也会更加容易。\n"
- fmt: "# All About indexPaths\n\nTable and collection views describe their layouts\
    \ in terms of instances of the `NSIndexPath` class. Technically, these are representations\
    \ of paths to nodes within a collection of nested arrays.\n\nHowever, that’s an\
    \ extremely complicated description of what `NSIndexPath` objects are in the context\
    \ of views, so I’d stick to thinking of them in much more simple terms.\n\nAs\
    \ far as a `tableView` is concerned, an `indexPath` has two properties: a `section`\
    \ and a `row`, shown in Figure [5-12](#A978-1-4842-1242-4_5_Chapter.html#Fig12).\
    \ Both of these are instances of `Int`.\n\nA `collectionView` thinks of an `indexPath`\
    \ in very similar ways, but instead of `rows`, we refer to `items`. So in the\
    \ context of a collection view, we refer to `itemAtIndexPath` rather than `cellAtIndexPath`.\n\
    \n![A978-1-4842-1242-4_5_Fig12_HTML.jpg](A978-1-4842-1242-4_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12. indexPath sections and rows\n\nAs you can see, the table uses `indexPaths`\
    \ to identify `sections` and `rows`. The iPhone Simulator is running Apple’s The\
    \ Elements sample code, and it’s scrolled down to the elements beginning with\
    \ the letter D.\n\nThe elements are grouped in sections according to their first\
    \ letter. Because D is the fourth letter of the alphabet, the elements beginning\
    \ with D appear in section 3 (remember, `indexPath` numbering, as with `NSArrays`\
    \ and so on, starts at `0`).\n\nThere happen to be three elements beginning with\
    \ the letter E (including the fantastically named einsteinium—atomic weight 252,\
    \ discovered in 1952—the app has all the details). These are placed in rows 0,\
    \ 1, and 2 (again, `indexPath` rows start at `0`). This allows each row to be\
    \ uniquely identified in the table. In the case of einsteinium, it’s found in\
    \ the `indexPath` with `section == 3` and `row == 0`.\n\nCreating `indexPaths`\
    \ is somewhat fiddly, so the `UITableView` class extends `NSIndexPath` with a\
    \ category that provides some convenience methods for creating `indexPaths` with\
    \ sections and rows. One of these is `indexPathForRow:inSection`. Listing [5-6](#A978-1-4842-1242-4_5_Chapter.html#FPar10)\
    \ shows a (somewhat contrived) example of the kind of thing you could do to locate\
    \ a specific cell.\n\nListing 5-6. Locating a Specific Cell\n\n```\nfunc findEinsteiniumCellContents()\
    \ {\n    let einsteinIndexPath = NSIndexPath(forRow: 1, inSection: 3)\n    let\
    \ einsteinCell = tableView.cellForRowAtIndexPath(einsteinIndexPath)\n    let elementName\
    \ = einsteinCell?.textLabel?.text\n    print(\"The element name is \\(elementName)\"\
    )\n}\n```\n\n# The Model-View-Controller Design Pattern\n\nTo the untutored eye,\
    \ an iOS application opened in Xcode looks like a mess of code. With a bit of\
    \ familiarity, though, it’s possible to discern that different aspects of the\
    \ application have different functions.\n\nAt the front end, the user interface\
    \ presents information to, and receives input from, the user. We typically think\
    \ of a “user” as being a human, but the analogy still works if the user is in\
    \ fact another system, as would be the case if the interface were an API.\n\n\
    Behind the scenes, virtually all applications contain data of some form or another.\
    \ Sometimes that data is sourced externally, such as the HTML that a web browser\
    \ displays. Other times, the data is maintained internally to the application.\
    \ Storing the application state such as high scores is an example.\n\nSitting\
    \ between the two, you need some logic—the application logic—to get and present\
    \ data to the user interface, and to receive and process input from the user.\
    \ You also need logic to manage the internal state of the application.\n\nThat\
    \ “division of labor” has been formalized into an application architecture pattern\
    \ called the model-view-controller pattern, illustrated in Figure [5-13](#A978-1-4842-1242-4_5_Chapter.html#Fig13).\
    \ It divides the application into three areas:\n\n![A978-1-4842-1242-4_5_Fig13_HTML.jpg](A978-1-4842-1242-4_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13. The model-view-controller pattern\n\n*   Views: In iOS terms, these\
    \ are the views (or interfaces) that are created in Interface Builder or programmatically\
    \ within the code.\n*   Controllers: Controllers provide the application’s internal\
    \ logic. They tend to be easier to spot in iOS apps because they often have names\
    \ such as `ScoreTableViewController`.\n*   Models: Models manage the data within\
    \ the application. A model can be as simple as an `NSArray` containing some `NSStrings`\
    \ or a full-blown Core Data setup.\n\nCrudely speaking, the controllers fetch\
    \ and process data from the models that gets passed to the views for consumption\
    \ by the user. The user interacts with the views, and the results of those interactions\
    \ are handled by the controllers.\n\nVarious analogies have been rolled out to\
    \ illustrate the model-view-controller pattern, but the one that works best for\
    \ me is the process that goes into making a movie.\n\nBefore you can go watch\
    \ a movie, someone needs to write it. So the process starts with a screenwriter\
    \ pouring out their soul over a typewriter and creating a script. That’s the model:\
    \ it’s the source of the data that will later be used to create the cinematic\
    \ experience.\n\nIn order to bring the script to life, you need actors. (Okay,\
    \ the analogy breaks down slightly if you’re thinking about the latest Pixar blockbuster,\
    \ but animated characters still need voices, right?) They’re the views, responsible\
    \ for presenting the data of the script to the audience (via the medium of the\
    \ camera, of course).\n\nThe person who sits between the writer and the actors—the\
    \ controller in our programming analogy—is the director. The director is responsible\
    \ for interpreting the script and telling the actors how to go about presenting\
    \ it.\n\nThere’s room for analogic subtlety here, as well. Good actors will take\
    \ the director’s direction along with the script’s dialogue and add their own\
    \ interpretation that takes the performance from something resembling a tree to\
    \ one that will win them an Oscar.\n\nThat’s where the interfaces come in. Consider\
    \ the graceful gradients and subtle shading of the iOS interface, versus the,\
    \ well, less-graceful and less-subtle interfaces of certain mobile devices that\
    \ weren’t designed in Cupertino..."
  raw: '## All About indexPaths


    Table and collection views describe their layouts in terms of instances of the
    `NSIndexPath` class. Technically, these are representations of paths to nodes
    within a collection of nested arrays.


    However, that’s an extremely complicated description of what `NSIndexPath` objects
    are in the context of views, so I’d stick to thinking of them in much more simple
    terms.


    As far as a `tableView` is concerned, an `indexPath` has two properties: a `section`
    and a `row`, shown in Figure [5-12](#A978-1-4842-1242-4_5_Chapter.html#Fig12).
    Both of these are instances of `Int`.


    A `collectionView` thinks of an `indexPath` in very similar ways, but instead
    of `rows`, we refer to `items`. So in the context of a collection view, we refer
    to `itemAtIndexPath` rather than `cellAtIndexPath`.


    ![A978-1-4842-1242-4_5_Fig12_HTML.jpg](A978-1-4842-1242-4_5_Fig12_HTML.jpg)


    Figure 5-12.


    indexPath sections and rows


    As you can see, the table uses `indexPaths` to identify `sections` and `rows`.
    The iPhone Simulator is running Apple’s The Elements sample code, and it’s scrolled
    down to the elements beginning with the letter D.


    The elements are grouped in sections according to their first letter. Because
    D is the fourth letter of the alphabet, the elements beginning with D appear in
    section 3 (remember, `indexPath` numbering, as with `NSArrays` and so on, starts
    at `0`).


    There happen to be three elements beginning with the letter E (including the fantastically
    named einsteinium—atomic weight 252, discovered in 1952—the app has all the details).
    These are placed in rows 0, 1, and 2 (again, `indexPath` rows start at `0`). This
    allows each row to be uniquely identified in the table. In the case of einsteinium,
    it’s found in the `indexPath` with `section == 3` and `row == 0`.


    Creating `indexPaths` is somewhat fiddly, so the `UITableView` class extends `NSIndexPath`
    with a category that provides some convenience methods for creating `indexPaths`
    with sections and rows. One of these is `indexPathForRow:inSection`. Listing [5-6](#A978-1-4842-1242-4_5_Chapter.html#FPar10)
    shows a (somewhat contrived) example of the kind of thing you could do to locate
    a specific cell.


    Listing 5-6. Locating a Specific Cell


    `func findEinsteiniumCellContents() {`


        `let einsteinIndexPath = NSIndexPath(forRow: 1, inSection: 3)`


        `let einsteinCell = tableView.cellForRowAtIndexPath(einsteinIndexPath)`


        `let elementName = einsteinCell?.textLabel?.text`


        `print("The element name is \(elementName)")`


    `}`


    ## The Model-View-Controller Design Pattern


    To the untutored eye, an iOS application opened in Xcode looks like a mess of
    code. With a bit of familiarity, though, it’s possible to discern that different
    aspects of the application have different functions.


    At the front end, the user interface presents information to, and receives input
    from, the user. We typically think of a “user” as being a human, but the analogy
    still works if the user is in fact another system, as would be the case if the
    interface were an API.


    Behind the scenes, virtually all applications contain data of some form or another.
    Sometimes that data is sourced externally, such as the HTML that a web browser
    displays. Other times, the data is maintained internally to the application. Storing
    the application state such as high scores is an example.


    Sitting between the two, you need some logic—the application logic—to get and
    present data to the user interface, and to receive and process input from the
    user. You also need logic to manage the internal state of the application.


    That “division of labor” has been formalized into an application architecture
    pattern called the model-view-controllerpattern, illustrated in Figure [5-13](#A978-1-4842-1242-4_5_Chapter.html#Fig13).
    It divides the application into three areas:


    ![A978-1-4842-1242-4_5_Fig13_HTML.jpg](A978-1-4842-1242-4_5_Fig13_HTML.jpg)


    Figure 5-13.


    The model-view-controller pattern


    *   Views: In iOS terms, these are the views (or interfaces) that are created
    in Interface Builder or programmatically within the code.

    *   Controllers: Controllers provide the application’s internal logic. They tend
    to be easier to spot in iOS apps because they often have names such as `ScoreTableViewController`.

    *   Models: Models manage the data within the application. A model can be as simple
    as an `NSArray` containing some `NSStrings` or a full-blown Core Data setup.


    Crudely speaking, the controllers fetch and process data from the models that
    gets passed to the views for consumption by the user. The user interacts with
    the views, and the results of those interactions are handled by the controllers.


    Various analogies have been rolled out to illustrate the model-view-controller
    pattern, but the one that works best for me is the process that goes into making
    a movie.


    Before you can go watch a movie, someone needs to write it. So the process starts
    with a screenwriter pouring out their soul over a typewriter and creating a script.
    That’s the model: it’s the source of the data that will later be used to create
    the cinematic experience.


    In order to bring the script to life, you need actors. (Okay, the analogy breaks
    down slightly if you’re thinking about the latest Pixar blockbuster, but animated
    characters still need voices, right?) They’re the views, responsible for presenting
    the data of the script to the audience (via the medium of the camera, of course).


    The person who sits between the writer and the actors—the controller in our programming
    analogy—is the director. The director is responsible for interpreting the script
    and telling the actors how to go about presenting it.


    There’s room for analogic subtlety here, as well. Good actors will take the director’s
    direction along with the script’s dialogue and add their own interpretation that
    takes the performance from something resembling a tree to one that will win them
    an Oscar.


    That’s where the interfaces come in. Consider the graceful gradients and subtle
    shading of the iOS interface, versus the, well, less-graceful and less-subtle
    interfaces of certain mobile devices that weren’t designed in Cupertino...'
  trans: "\n# 关于 `indexPath` 的一切\n\n表格视图和集合视图利用 `NSIndexPath` 类的实例来描述其布局。从技术上讲，这些实例代表了嵌套数组集合中节点的路径。\n\
    \n然而，对于视图上下文中的 `NSIndexPath` 对象而言，这描述过于复杂，因此我倾向于用更简单的方式来理解它们。\n\n就 `tableView`\
    \ 而言，一个 `indexPath` 拥有两个属性：`section`（分区）和 `row`（行），如图 5-12 所示。这两个属性都是 `Int` 类型的实例。\n\
    \n`collectionView` 对 `indexPath` 的理解非常相似，但区别在于我们使用术语 `items`（项目）而不是 `rows`（行）。因此，在集合视图的上下文中，我们称之为\
    \ `itemAtIndexPath`，而不是 `cellAtIndexPath`。\n\n![A978-1-4842-1242-4_5_Fig12_HTML.jpg](img/A978-1-4842-1242-4_5_Fig12_HTML.jpg)\n\
    \n图 5-12. `indexPath` 的分区与行\n\n如图所示，表格使用 `indexPaths` 来标识 `sections`（分区）和 `rows`（行）。iPhone\
    \ 模拟器正在运行苹果的 The Elements 示例代码，并已滚动到以字母 D 开头的元素位置。\n\n这些元素根据其首字母分组到不同的分区中。因为 D\
    \ 是字母表中的第四个字母，所以以 D 开头的元素出现在分区 3（记住，`indexPath` 的编号与 `NSArray` 等一样，都是从 `0` 开始计数的）。\n\
    \n恰好有三个元素以字母 E 开头（包括名字奇特的 einsteinium——原子量 252，于 1952 年发现——这个应用有它的所有详细信息）。它们被放置在行\
    \ 0、行 1 和行 2 中（同样，`indexPath` 的行号从 `0` 开始）。这样，表中的每一行都可以被唯一标识。以 einsteinium 为例，它在\
    \ `section == 3` 且 `row == 0` 的 `indexPath` 中。\n\n创建 `indexPaths` 有些繁琐，因此 `UITableView`\
    \ 类通过一个类别扩展了 `NSIndexPath`，提供了一些便捷方法来创建带有分区和行的 `indexPaths`。其中一个方法就是 `indexPathForRow:inSection`。清单\
    \ 5-6 展示了一个（稍显刻意）的示例，说明如何定位到特定单元格。\n\n清单 5-6. 定位特定单元格\n\n```\nfunc findEinsteiniumCellContents()\
    \ {\n    let einsteinIndexPath = NSIndexPath(forRow: 1, inSection: 3)\n    let\
    \ einsteinCell = tableView.cellForRowAtIndexPath(einsteinIndexPath)\n    let elementName\
    \ = einsteinCell?.textLabel?.text\n    print(\"The element name is \\(elementName)\"\
    )\n}\n```\n\n# 模型-视图-控制器设计模式\n\n在外行人看来，在 Xcode 中打开的 iOS 应用程序就像是一堆混乱的代码。不过，只要稍微熟悉一下，就能辨别出应用程序的不同方面具有不同的功能。\n\
    \n在前端，用户界面负责向用户呈现信息并接收用户的输入。我们通常认为“用户”是指人类，但如果这个用户实际上是另一个系统（例如当界面是 API 时），这个类比也同样成立。\n\
    \n在幕后，几乎所有应用程序都包含某种形式的数据。有时这些数据来源于外部，例如网络浏览器显示的 HTML。其他情况下，数据由应用程序内部维护。存储应用状态（例如最高分）就是一个例子。\n\
    \n在这两者之间，你需要一些逻辑——即应用程序逻辑——来获取数据并呈现给用户界面，以及接收和处理用户的输入。你还需要逻辑来管理应用程序的内部状态。\n\n\
    这种“分工”已经被形式化为一种称为模型-视图-控制器模式的应用程序架构模式，如图 5-13 所示。它将应用程序分为三个区域：\n\n![A978-1-4842-1242-4_5_Fig13_HTML.jpg](img/A978-1-4842-1242-4_5_Fig13_HTML.jpg)\n\
    \n图 5-13. 模型-视图-控制器模式\n\n*   **视图（Views）**：在 iOS 术语中，这些是在 Interface Builder 中或以编程方式在代码中创建的视图（或界面）。\n\
    *   **控制器（Controllers）**：控制器提供应用程序的内部逻辑。在 iOS 应用中它们往往更容易被识别出来，因为它们的名称通常类似于 `ScoreTableViewController`。\n\
    *   **模型（Models）**：模型管理应用程序中的数据。模型可以简单如一个包含一些 `NSStrings` 的 `NSArray`，也可以复杂如一个完整的\
    \ Core Data 配置。\n\n粗略地说，控制器从模型中获取并处理数据，然后将数据传递给视图供用户使用。用户与视图进行交互，而这些交互的结果由控制器来处理。\n\
    \n人们提出了各种类比来说明模型-视图-控制器模式，但对我来说最贴切的是电影制作的过程。\n\n在你去看电影之前，需要有人先写剧本。所以这个过程始于一位编剧在打字机上倾注心血，创作出剧本。这就是模型：它是数据源，这些数据之后将被用来创造电影体验。\n\
    \n为了让剧本活起来，你需要演员。（好吧，如果你考虑的是最新的皮克斯大片，这个类比有点站不住脚，但动画角色仍然需要声音，对吧？）他们就是视图，负责将剧本的数据呈现给观众（当然，是通过摄像机这个媒介）。\n\
    \n介于编剧和演员之间的那个人——在我们的编程类比中就是控制器——则是导演。导演负责解读剧本，并指导演员如何呈现它。\n\n这个类比还可以更微妙一些。优秀的演员会遵循导演的指导并结合剧本的对白，加入自己的理解，从而将表演从呆板如树提升到能赢得奥斯卡奖的水平。\n\
    \n这就是界面发挥作用的地方。想想 iOS 界面优雅的渐变和微妙的阴影，对比那些……嗯，不那么优雅、不那么微妙的某些并非出自库比蒂诺设计的移动设备界面……\n"
- fmt: '### Why Use the Model-View-Controller Pattern?


    At first, the MVC pattern might seem like an unnecessary complication, especially
    for small applications. But thinking about—and building—applications in this way
    brings some benefits:


    - **Modularity**: Each functional element of the application manages its own area
    of concern. The models deal with reading and writing of data, while the views
    handle presenting the information. This means that changes to one functional element
    don’t necessarily affect others. You could completely change the underlying database
    engine, for example, and the views would remain the same.

    - **Multiple views**: Consider the differences in the user interface between the
    iPhone and the iPad. If your application’s logic were embedded in the views, you’d
    need to create it twice—once for the smaller screen of the iPhone, and again for
    the bigger screen of the iPad. By sticking with the MVC pattern, the same set
    of models and controllers can feed both versions of the interface.

    - **Efficiencies**: Separating out the layers of the application allows for tricks
    such as threading and background processing. You can kick off a data-retrieval
    process while the views are still loading, for example, to take advantage of the
    iOS device’s multitasking capabilities.

    - **Testability**: By breaking applications into discrete areas, you can test
    each one individually. If a `tableView` relies on a `dataSource`, as part of the
    process of testing the table you can substitute the datasource with a “stand-in”
    object that returns known values. This means that you can pinpoint the source
    of any errors much more easily.

    - **Reuse**: If your application involves the use of several table or collection
    views, you can reduce duplication of code and features by creating a single `dataSource`
    or `delegate` to serve several views. Much of the supporting framework that an
    individual view needs will be common with others. Less code means fewer sources
    of bugs, and less to maintain.


    ### MVC and iOS


    iOS is a model-view-controller-centric framework, although compared to many SDKs—particularly
    web frameworks—the MVC nature of iOS is sometimes a bit hidden. This will be especially
    the case if you’ve come to iOS from web frameworks such as Rails or Django. These
    make the separation of each layer very obvious. Each one has a set of files in
    separate directories called `models`, `views`, and `controllers`.


    iOS, on the other hand, is more subtle. You can create views with XIB files, which
    are clearly views. But you can also create views programmatically with code inside
    view controllers, and that’s where things start to get potentially confusing.
    Similarly, a `tableView` or `collectionView`’s data comes from a model, but that
    model could be as “extracted” as a SQLite database managed by Core Data, or as
    “embedded” as an `Array` created in the `viewDidLoad` method inside a view controller!


    The key to staying sane with MVC in the iOS world is to remember that MVC is a
    conceptual framework, rather than something more absolute, such as a set of directories.
    If you bear in mind that the table’s data comes from a model, and that model is
    actually the `Array` mentioned, you’ll still be thinking (and working) in an MVC
    way.


    ### MVC, tableViews, and collectionViews


    The obvious question is now, “How does MVC fit with table and collection views?”


    Fortunately, the answer is relatively straightforward. The table or collection
    view itself is the view. It presents the user interface and intercepts user interaction
    such as taps and scrolling flicks.


    The data that the table or collection view presents comes from the model. As mentioned,
    that could be as simple as a single `Array` that you create as you load the view,
    or something a lot more complex involving Core Data or information retrieved from
    an external network source.


    The controller elements are the object(s) that act as the `tableView` or `collectionView`’s
    `delegate` and `dataSource`. The `delegate` receives messages from the table or
    collection view and deals with events such as a user tapping an item or swiping
    a cell. The `dataSource` “feeds” the table or collection view its data by retrieving
    it from the model.


    ## Improving the App Structure


    If a view controller is also acting as the `datasource` and `delegate` of a table
    or collection view, it can rapidly grow to the point where you begin to suffer
    from “Massive View Controller” syndrome. It’s not unheard of for view controllers
    to grow to hundreds of lines long (the record for the largest one I’ve ever seen
    is 6,500 lines, and I’d just like to make it really clear that I wasn’t responsible
    for it getting that big!)


    Massive View Controllers are a problem for projects for a number of reasons: they
    violate the “single responsibility principle” of object-orientated design; they’re
    hard to test; they increase the risk of source control conflicts; and if they’re
    too big they can simply cause Xcode to keel over and crash when you try to edit
    them.


    It follows, then, that splitting up your large classes into smaller ones can help
    prevent some or all of these problems.


    ### How to Split Out Datasources and Delegates


    Because you’re responsible for connecting table and collection views with their
    `datasource`s and `delegate`s, you’re not restricted to only using the view controller
    that manages the table or collection view in the view hierarchy.


    Assuming that you’re beginning with the `datasource` and `delegate` methods in
    the view controller, then there are X steps to separating things out


    ##### Step 1: Create a Separate Class


    Start by creating a separate class. I usually name mine something along the lines
    of `ContactsTableHelper` to make it clear which table it’s working with, and that
    it’s acting as both `datasource` and `delegate`.


    Next, move the `datasource` and `delegate` methods into this new class. You’ll
    need to declare that the new class will conform to the `dataSource` and `delegate`
    protocols; and remove this from the view controller:


    ```

    class TableViewHelper : NSObject, UITableViewDataSource, UITableViewDelegate {


    }

    ```


    ##### Step 2: Link the Table View to the New Class


    With the new class created, you need to connect the table view to it. If you’ve
    created the link in code, this needs to be updated by adding a property for the
    new class:


    ```

    let tableViewHelper = TableViewHelper()

    ```


    Then you can update the `dataSource` and `delegate` properties of your `tableView`
    from


    ```

    tableView.dataSource = self

    tableView.delegate = self

    ```


    to


    ```

    tableView.dataSource = tableViewHelper

    tableView.delegate = tableViewHelper

    ```


    If you’ve made the connections visually, the process is slightly different. First,
    in your Storyboard you’ll need to drag an `Object` placeholder from the Objects
    browser to the view hierarchy on the left, as shown in Figure [5-14](#A978-1-4842-1242-4_5_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_5_Fig14_HTML.jpg](A978-1-4842-1242-4_5_Fig14_HTML.jpg)


    Figure 5-14. Adding an Object Placeholder


    With the new `Object` placeholder selected, switch to the `Identity` inspector,
    and update its `Class` value to `TableViewHelper`, as shown in Figure [5-15](#A978-1-4842-1242-4_5_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_5_Fig15_HTML.jpg](A978-1-4842-1242-4_5_Fig15_HTML.jpg)


    Figure 5-15. Updating the Class


    Now you can connect the `tableView`’s `dataSource` and `delegate` properties by
    Ctrl-Clicking in the `tableView`, and dragging over to the `TableViewHelper` placeholder,
    as shown in Figure [5-16](#A978-1-4842-1242-4_5_Chapter.html#Fig16).


    ![A978-1-4842-1242-4_5_Fig16_HTML.jpg](A978-1-4842-1242-4_5_Fig16_HTML.jpg)


    Figure 5-16. Reconnecting the dataSource and Delegates


    Once connected, this will lazily instantiate an instance of the `TableViewHelper`
    class when the table is loaded and use it as the `dataSource` and `delegate` of
    the table view instead of the view controller.'
