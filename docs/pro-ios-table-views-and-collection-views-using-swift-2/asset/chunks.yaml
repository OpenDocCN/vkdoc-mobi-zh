- fmt: '# What This Book Covers


    [Chapter 1](#A978-1-4842-1242-4_1_Chapter.html), “Table Views Quick Start”, introduces
    the table view with some examples of the current state of the art. After showing
    you something of what’s possible, we’ll start out with a very simple table view–based
    app for the iPhone, which will introduce you to the `UITableView` and its main
    elements. The app will also act as a starting point for later versions, and it’ll
    be a working prototype that you can use as the basis for your own experiments.


    In [Chapter 2](#A978-1-4842-1242-4_2_Chapter.html), “How The Table Fits Together”,
    you’ll look at how the parts of the table view work together. You’ll see the main
    types of `UITableViews` and their anatomy. You’ll learn how to create them both
    with Interface Builder and in code, and how to use the `UITableViewController`
    class as a template.


    [Chapter 3](#A978-1-4842-1242-4_3_Chapter.html), “Collection View Quick Start”,
    switches focus to `UICollectionView` to showcase what’s possible with this powerful
    and infinitely flexible control. Like [Chapter 1](#A978-1-4842-1242-4_1_Chapter.html),
    we’ll start with a simple example that can act as a starting point for more advanced
    topics, and provide a working prototype as the basis for your experiments.


    [Chapter 4](#A978-1-4842-1242-4_4_Chapter.html), “How the Collection View Fits
    Together”, looks at how the parts of the collection view work together. You’ll
    see how they are similar – but even more flexible – than `UITableViews`, and the
    component parts of their anatomy. You’ll learn how to create them both with Interface
    Builder and in code, and how to use the `UICollectionViewController` class as
    a template.


    [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html), “Feeding Data To Your Views”
    is about where tables and collection views get their data and how you get it there.
    It shows how they keep track of sections and rows, and covers some of the software
    design patterns that the `UITableView` and `UICollectionView` classes exploit.


    [Chapter 6](#A978-1-4842-1242-4_6_Chapter.html) “How The Table Cell Fits Together”,
    focuses on the cells that make up tables. You’ll see how cells are structured
    internally, and how they’re created and reused. It also covers the standard cells
    types that come for free with the `UITableView` classes.


    In [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html), “Improving the Look of Cells”,
    you will start to look at the process of going beyond standard cell types to customize
    the look and feel of your table views. This chapter covers some of the quickest
    ways to make the cells look the way you need them to.


    [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html), “Creating Custom Cells With Subclasses”,
    covers the most powerful and flexible way of customizing every aspect of cells
    to use in table and collection views. With great power comes great responsibility
    – but it’s worth persevering so that your able to achieve complete mastery of
    the look, feel and behaviour of your apps.


    [Chapter 9](#A978-1-4842-1242-4_9_Chapter.html), “Improving Interaction”, steps
    you though the process of embedding interactive controls in table and collection
    views; implementing pull-to-refresh; exploiting gesture recognizers, and implementing
    in-view search.


    [Chapter 10](#A978-1-4842-1242-4_10_Chapter.html), “Using Tables for Navigation”,
    covers an almost-ubiquitous feature of the iOS user interface, and shows how tables
    can be used to navigate through a hierarchy of data in a simple and consistent
    way.


    The constrained size of the iOS user interface presents some challenges when it
    comes to presenting large amounts of data. [Chapter 11](#A978-1-4842-1242-4_11_Chapter.html),
    “Indexing, Grouping, and Sorting”, presents some ways of arranging the data in
    tables, to help users find their way.


    [Chapter 12](#A978-1-4842-1242-4_12_Chapter.html), “Selecting and Editing Content”,
    shows how you can use tables and collection views to manage data. It covers how
    to add, delete, and rearrange the information, and some of the interface aspects
    that this entails.


    [Chapter 13](#A978-1-4842-1242-4_13_Chapter.html), “Static Tables”, is an introduction
    to an often-overlooked use of table views to present controls and information
    in a static way. These can often be used as a short-cut to simplifying otherwise
    complex layouts.


    [Chapter 14](#A978-1-4842-1242-4_14_Chapter.html), “Tables in WatchKit”, looks
    at the challenges of table-based interfaces with Apple’s first venture into wearable
    technologies. The small form factor and low power of the Apple Watch presents
    some challenges, but effective use of tables can be the key to engaging user interactions.


    [Chapter 15](#A978-1-4842-1242-4_15_Chapter.html), “Collection View Flow Layouts”,
    looks at one of the most useful components of the `UICollectionView` family, which
    allows you to very rapidly build sophisticated line-oriented layouts with a minimum
    of complex calculations.


    When a line-based layout isn’t sufficient to deliver the interface you need, collection
    views can be completely customized. [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html),
    “Collection View Custom Layouts” looks at taking complete control over every aspect
    of the collection view’s look and feel.


    [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html), “Animated And Interactive Collection
    Views”, takes them to the limits of what’s possible in interactive interfaces.
    Combining collection views with gesture recognizers and custom layouts allows
    you to create interfaces that are limited only by your imagination.


    # The Style of This Book


    I’ve tried to bridge the gap between two styles of book—the in-depth treatment
    of every last little detail, and the cookbook of specific point solutions. Both
    have their place, but sometimes I find that descriptions of very detailed, elegant
    solutions with lots of features can obscure the detail of the problem I’m trying
    to solve. Equally, sometimes cookbook solutions are too specific and don’t easily
    lend themselves to adapting to my specific situation.


    In the code examples that follow, I’ve tried to balance the two styles. The visual
    polish and extraneous functions are kept to a minimum, which hopefully results
    in examples that illustrate how to build a solution while also acting as a building
    block for your own code.


    # About the Second Edition


    Nothing in the technology world stays still for long, and Apple frameworks are
    no exception. The first edition published in 2012 predated the iPad, collection
    views, a complete overhaul of the iOS design language, and one of the most exciting
    developments in software development for a long time.


    With the introduction of Swift in 2014, Apple have taken all the very best parts
    of a myriad of programming languages and paradigms available, and combined them
    with their legendary frameworks and APIs to produce something that completely
    lives up to the superlatives used to describe it. The open-sourcing of Swift at
    the end of 2015 will make for some very interesting developments in the months
    and years to come.


    I’ve spent many happy years working with Objective-C, but with Swift things have
    taken a giant leap forward. This book uses Swift exclusively, as I suspect I and
    many other iOS developers will be doing for the foreseeable future.


    This book was written using Swift 2.0, WatchKit 2.0 and Xcode 7.1. It’s as up-to-date
    and current as it’s possible to be when covering a dynamic and rapidly-changing
    world – when things change, updates and errata will be available from the Apress
    site and the book’s source code on GitHub.'
