- fmt: '# Introducing the `UINavigationController`


    The Apple iOS documentation describes a `UINavigationController` as a “container
    for several other views” which is as good a way of describing it as I can think
    of. Shown in Figure [10-4](#A978-1-4842-1242-4_10_Chapter.html#Fig4), it gives
    you a top navigation bar and an optional toolbar at the bottom.


    There’s also space for bar button items on the navigation bar. Between the top
    and bottom bar there’s a space for your custom content to be loaded into: it’s
    into this space that you’ll push and pop view controllers.


    ![A978-1-4842-1242-4_10_Fig4_HTML.jpg](A978-1-4842-1242-4_10_Fig4_HTML.jpg)


    Figure 10-4.


    The components of `UINavigationController`


    Interacting with the content inside the view controllers—tapping on a row, tapping
    on a button, and so on—is the cue to call the `UINavigationController`’s `pushViewController:animated:`
    and `popViewController:animated:` functions.


    As well as moving through the stack of view controllers one by one, you can also
    head straight to the top of the stack by calling the `UIViewController` class’s
    `popToRootControllerAnimated:` function.


    And finally, pushing (or popping) to a specific view controller is achieved by
    the `popToViewController:animated` function, which takes a parameter of type `UIViewController`
    through which you can indicate which controller you’re after.


    > **Note**: Although using `UITableViews` with `UIViewControllers` is far and
    away the most common scenario, it’s worth remembering that the view controllers
    you push and pop can be any kind of view controller.


    You’re not restricted to using a table at the top level; you could just as easily
    push in the next view by tapping on, say, a `UIButton` as you could by tapping
    on a row in a `tableView`. Use whatever will provide the user experience that
    you’re trying to deliver.


    # The Navigation Controller Example Application


    Illustrating the function of the `UINavigationController` really calls for an
    example application that is a bit more complex than the simple apps that I’ve
    been using as the examples so far. To do this, I’ve built a relatively simple
    app to use as the basis of this chapter. It’s far from being something that you’d
    want to buy from the App Store, but it’ll do for these purposes.


    If you’ve got kids (or even if you haven’t and you’ve got friends who do), you
    know that one of the most important decisions you can make before the little bundle
    of joy arrives is deciding on a name. Get it wrong, and you could condemn your
    offspring to an educational lifetime of teasing in the playground. Don’t get it
    right, and Great Aunt Agatha will cut you out of her will for not continuing the
    family tradition of naming all first-born males Algernon.


    To help you navigate through this minefield, what you need (of course!) is an
    iOS app: enter the oh-so-imaginative titled Baby Names. Although this most emphatically
    won’t win any awards for either design or ground-breaking functionality, it gives
    us something to work with.


    ## Creating a Navigation Controller App


    Probably because navigation controller-based apps are so common, most versions
    of Xcode so far have shipped with a template for creating this type of app. It
    provides much of the plumbing ready-made to speed you on your way. You also get
    a lot of functionality for free if you use a `UITableViewController` object in
    a Storyboard.


    While that’s great, you’re going to take the back-to-basics approach, and build
    the app entirely by hand. That’s not because there’s anything wrong with the app
    templates, but if you start from scratch you’ll end up with a much better feel
    for how all the pieces fit together.


    Start by creating a new app in Xcode (**File ➤ New ➤ New Project**) that uses
    the Single View Application template, as shown in Figure [10-5](#A978-1-4842-1242-4_10_Chapter.html#Fig5).


    ![A978-1-4842-1242-4_10_Fig5_HTML.jpg](A978-1-4842-1242-4_10_Fig5_HTML.jpg)


    Figure 10-5.


    Xcode’s new application dialog


    > **Tip**: The selection of default templates that ship with Xcode tends to alter
    from version to version (this book was written using Xcode 7.1).


    Your version of Xcode may look different from this, but among the templates there’ll
    be one that creates a skeleton application with a single view; that’s the one
    you’re after.


    Name the application `BabyNames` and save it to the folder of your choice. You’ll
    end up with an app containing:


    *   An app delegate, called `AppDelegate`

    *   A view controller, called `ViewController`

    *   A storyboard file, called `Main`


    As you progress through building the app you will create some extra view controllers,
    object classes, and nib files, so you may want to set up some groups in Xcode
    to keep the various files organized, as displayed in Figure [10-6](#A978-1-4842-1242-4_10_Chapter.html#Fig6).
    It’s up to you whether to do this in your apps, but I find it helps keep things
    organized as the project expands.


    ![A978-1-4842-1242-4_10_Fig6_HTML.jpg](A978-1-4842-1242-4_10_Fig6_HTML.jpg)


    Figure 10-6.


    Creating groups in the app


    To make keeping track of things slightly easier for yourself later, first rename
    the `ViewController` to `TableViewController`.


    Highlight the `ViewController` file in the Navigator, then double-click it and
    change the name to `TableViewController`.


    Next, change the name in the class itself, so that it looks like this:


    ```

    class TableViewController: UIViewController {

    ```


    Finally, open the Storyboard and select the `ViewController` in the Document Outline,
    switch to the Identity Inspector in the Utilities pane and update the Class and
    Storyboard ID to `TableViewController`, as shown in Figure [10-7](#A978-1-4842-1242-4_10_Chapter.html#Fig7).


    ![A978-1-4842-1242-4_10_Fig7_HTML.jpg](A978-1-4842-1242-4_10_Fig7_HTML.jpg)


    Figure 10-7.


    Updating the Storyboard


    Having created the app skeleton, the next step is to create some sample data.'
