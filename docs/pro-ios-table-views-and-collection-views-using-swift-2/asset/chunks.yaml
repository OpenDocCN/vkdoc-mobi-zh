    \ `tableView:didSelectRowAtIndexPath:` 函数。\n\n**代码清单 12-18.** `tableView:` `didSelectRowAtIndexPath`\
    \ `:` 函数\n\n```\nfunc tableView(tableView: UITableView, didSelectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    if (indexPath.row == tableData.count) {\n   \
    \     // 将表格置于编辑模式\n        tableView.setEditing(true, animated: true)\n    }\
    \ else {\n        // 处理“正常”选择\n    }\n}\n```\n\n再次测试所选行是否为表格末尾的那一行。如果是，则重写默认的\
    \ `setEditing:animated:` 函数，使该单元格进入编辑模式，如代码清单 12-19 所示。\n\n**代码清单 12-19.** 自定义\
    \ `setEditing:animated:` 函数\n\n```\noverride func setEditing(editing: Bool, animated:\
    \ Bool) {\n    tableView.setEditing(!tableView.editing, animated: true)\n}\n```\n\
    \n您需要修改 `tableView:editingStyleForRowAtIndexPath:` 函数，以为最后一行提供插入控件（如代码清单 12-20\
    \ 所示）。\n\n表格进入编辑模式后，由用户决定是使用删除或插入控件进行编辑，还是让表格退出编辑模式。\n\n如果用户选择后者，您无需担心如何响应其操作。更新后的\
    \ `setEditing:animated:` 函数会处理该情况。\n\n另一方面，编辑操作则需要您进行处理。\n\n**代码清单 12-20.** 处理编辑操作\n\
    \n```\nfunc tableView(tableView: UITableView, editingStyleForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCellEditingStyle {\n    if tableView.editing {\n\
    \        if (indexPath.row == tableData.count) {\n            return UITableViewCellEditingStyle.Insert;\n\
    \        } else {\n            return UITableViewCellEditingStyle.Delete;\n  \
    \      }\n    }\n    return UITableViewCellEditingStyle.None\n}\n```\n\n轻点某行的控件将触发\
    \ `tableView:commitEditingStyle:forRowAtIndexPath:` 函数，该函数会提供对 `tableView`本身、被轻点的行以及控件类型的引用。\n\
    \n这里有两种可能：`UITableViewCellEditingStyle.Delete` 或 `UITableViewCellEditingStyle.Insert`。如果是\
    \ `delete`，则按之前的方式处理：从数据模型的相应索引处移除对象，然后从表格中删除该行。\n\n而 `insert` 则需要采用相反的方法。首先，您需要一个新对象。为演示起见，创建一个包含时间戳的\
    \ `NSString`：\n\n```\nlet thingToInsert = \"\\(NSDate())\"\n```\n\n然后，需要将这个新对象添加到数据模型中。重要的是，此操作必须在表格更新之前完成，因为表格需要确定其当前拥有的行数，才能插入新行：\n\
    \n```\ntableData.append(thingToInsert)\n```\n\n`Array` 的 `append` 函数将新对象插入到现有数组的末尾，但您当然也可以使用\
    \ `append(:atIndex:)` 函数将其插入到特定位置。\n\n现在已将新对象安全地存储在数据模型中，您可以向表格中插入新行了。您希望它出现在倒数第二行——位于“添加新行”之上，但位于现有行之下（大致如图\
    \ 12-17 所示）。\n\n![A978-1-4842-1242-4_12_Fig17_HTML.jpg](img/A978-1-4842-1242-4_12_Fig17_HTML.jpg)\n\
    \n**图 12-17.** 新插入的行\n\n`UITableView` 的 `insertRowsAtIndexPath:` `withRowAnimation:`\
    \ 方法接收一个包含需要新行的 `IndexPath` 对象的 `Array`，并调用 `tableView` 的 `cellForRowAtIndexPath:`\
    \ 函数来填充它们。\n\n它会自动将现有行下移。您的表格当前有十行，而您的 `indexPath.row` 值是 `9`（请记住，表格行是从零开始索引的）。在\
    \ `indexPath.row` 9 处插入新行将导致该行当前的内容下移到新的 `indexPath.row` 10 位置。\n\n```\ntableView.insertRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)\n```\n\n`UITableViewRowAnimation.Automatic`\
