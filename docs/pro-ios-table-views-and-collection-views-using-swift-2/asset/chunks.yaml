    ## Happy, Healthy Tables


    If the overall user experience of the iOS device family had to be boiled down
    to a single adjective, I’d go for “smooth.” Everything about the interface of
    well-written apps moves without hesitation, stuttering, or jerkiness. Get it right,
    and the overall impression is that of a precision, well-oiled device.


    Table views have a lot of moving parts, so if that level of smoothness is going
    to go wrong anywhere, it could be here. Although the `UITableView`, `UICollectionView`
    and their supporting classes are designed and written for performance, it is possible
    to build table and collection views that don’t perform well, especially if you
    lose sight of some basic best practices.


    In this section, we take a look at some things you can do—both quick fixes, and
    some more in-depth—to make sure that your views perform as well as they possibly
    can.


    ### Background, Background, Background


    One of the most common problems with stuttering scrolling is caused by expensive
    and slow processing taking place on the main thread.


    The iOS interface is rendered on the main thread, so anything that slows this
    down will cause the interface to be slowed as well. Normally that’s not a problem,
    but scrolling is one situation where every one of the sixty frames a second is
    required.


    As a general rule of thumb, expensive or long-running activity–network requests
    in particular–should be dispatched onto a background queue, which calls back to
    the main thread when the work is completed.


    This is often an issue if you’re retrieving images from a network source. There
    are a couple of techniques you can use here:


    *   Asynchronous background fetching of images, which are then updated once retrieved.

    *   Placeholder images to “fill in” for the real thing. Often when scrolling a
    view, the cells are removed from the visible view long before the image can be
    downloaded. In those situations, you can use a placeholder image initially, and
    only update the image if the cell hangs around on the screen long enough for it
    to be visible.


    Beware of premature optimization, though. There’s a saying in software engineering
    that goes “I had a bottleneck problem, so I used background threading. Now problems
    two have I.” It’s very easy to get completely tied in knots with race conditions.


    ### Are the Cells Cached?


    Building cells is expensive in processing terms, so the `UITableView` and `UICollectionView`
    classes provide caching and dequeuing functionality to allow constructed cells
    to be reused. This can make a dramatic difference if you’ve got more rows than
    can fit on the screen.


    The two places to check are the `tableView:cellForRowAtIndexPath:` or `collectionView:cellForItemAtIndexPath:`methods.
    For maximum efficiency, you should be doing one of three things:


    *   Dequeuing an existing reusable cell before creating an new instance: `let
    cell = [tableView ➤` `dequeueReusableCellWithIdentifier:CellIdentifier];`

    *   Registering a class for the cell: `tableView.registerClass(MyCell.self, forCellReuseIdentifier:
    ➤` `"MyCustomCell")`

    *   Registering a nib file containing the cell layout: `tableView.registerNib(UINib(nibName:
    "MyCell", bundle: nil), ➤` `forCellReuseIdentifier: "MyCustomCell")`


    The only exceptions to the first rule are if you’re dealing with a static table
    or if you’ll never have more cells than will fit into the visible area. In the
    later situation you can probably get away without cached cells because they’ll
    always remain visible.


    ### Do Your Table Cells Have Varying Heights?


    Behind the scenes, `UITableView` uses the cell height to build a number of elements
    relating to the “chrome” of the table. When all cells in the `tableView` are the
    same height, this can be done relatively cheaply, but if the cell height varies,
    these calculations get repeated every time a new cell is created.


    To extract the last ounce of speed from a table view, it’s most efficient to keep
    the cell heights identical. Whether this is possible is going to vary from project
    to project, of course, but if your cell heights only vary within a limited range,
    you may find you’re better off designing them with a single consistent height
    and managing the differences within the internal cell layout.


    If that’s not possible, implement `UITableViewDelegate`’s `tableView:estimatedHeightForCell:`
    function to return an estimated height. The table will use this value to calculate
    the full content area by assuming that all cells will have this height, and defer
    the exact calculation until the very last moment possible.


    It’s not a get-out-jail-free card–you can run into problems if your estimated
    row height is wildly different from the actual value–but this function can help.'
  trans: "\n### 更新 `UITableViewDataSource` 函数\n\n如果你现在运行项目，你可以在搜索框中输入文字，但你不会看到表格显示的数据有任何变化。\n\
    \n这是因为无论是否处于搜索模式，表格都是从 `tableData` 数组加载数据的。你需要更新 `UITableViewDelegate` 函数，以使用正确的数据源。\n\
    \n有两个函数需要更新。代码清单 9-15 展示了 `tableView:numberOfRowsInSection:`\n\n**代码清单 9-15.** 更新后的\
    \ `tableView:numberOfRowsInSection:` 函数\n\n```\nfunc tableView(tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int {\n    if searchActive {\n      \
    \  return filteredTableData.count\n    }\n    return tableData.count\n}\n```\n\
    \n其实非常简单。如果表格处于 `searchActive` 模式，那么行数来自 `filteredTableData` 数组；如果不是，则像往常一样，行数来自\
    \ `tableData`。\n\n代码清单 9-16 展示了更新后的 `tableView:cellForRowAtIndexPath:` 函数。它采用了相同的方法：如果表格正在被搜索，就使用\
    \ `filteredTableData` 数组作为数据模型；否则使用 `tableData`。\n\n**代码清单 9-16.** 更新后的 `tableView:cellForRowAtIndexPath:`\
    \ 函数\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath)\n    -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\n        forIndexPath: indexPath)\n    if searchActive {\n \
    \       cell.textLabel!.text = filteredTableData[indexPath.row]\n    } else {\n\
    \        cell.textLabel!.text = tableData[indexPath.row]\n    }\n    return cell\n\
    }\n```\n\n在所有工作彻底完成之前，还有一项整理工作要做。在 `UISearchBarDelegate` 扩展中，添加代码清单 9-17 所示的函数。\n\
    \n**代码清单 9-17.** `searchBarCancelButtonClicked` 函数\n\n```\nfunc searchBarCancelButtonClicked(searchBar:\
    \ UISearchBar) {\n    searchBar.text = \"\"\n    searchBar.resignFirstResponder()\n\
    \    searchActive = false\n}\n```\n\n这将清空搜索栏，取消键盘的第一响应者状态，并在用户点击搜索栏中的“取消”按钮时将\
    \ `searchActive` 标志设为 false。\n\n到目前为止，你还没有实际设置“取消”按钮，所以回到故事板，高亮选中搜索栏，然后在属性检查器中勾选“显示取消按钮”选项（如图\
    \ 9-13 所示）。\n\n![A978-1-4842-1242-4_9_Fig13_HTML.jpg](img/A978-1-4842-1242-4_9_Fig13_HTML.jpg)\n\
    \n**图 9-13.** 显示取消按钮选项\n\n如果你再次运行项目，你将看到一个可用的搜索功能，并带有“取消”功能，该功能会关闭键盘并用完整数据集重新加载表格（图\
    \ 9-14）。\n\n![A978-1-4842-1242-4_9_Fig14_HTML.jpg](img/A978-1-4842-1242-4_9_Fig14_HTML.jpg)\n\
    \n**图 9-14.** 可用的搜索功能\n\n## 健康、流畅的表格\n\n如果要用一个词来概括 iOS 设备系列的整体用户体验，我会选择“流畅”。设计优秀的应用，其界面的一切操作都毫无迟疑、卡顿或抖动。如果做对了，整体印象就是一台精密、运转顺畅的设备。\n\
    \n表格视图包含很多活动部件，因此如果要出现问题，很可能就在这里。尽管 `UITableView`、`UICollectionView` 及其辅助类在设计之初就考虑到了性能，但仍然可能构建出性能不佳的表格和集合视图，尤其是当你忽略了一些基本的*最佳实践*时。\n\
    \n在本节中，我们将探讨一些你可以采取的措施——既有快速修复，也有一些更深入的方法——以确保你的视图能够尽可能发挥其最佳性能。\n\n### 后台、后台、再后台\n\
    \n滚动时卡顿最常见的问题之一，是在主线程上进行了耗时且缓慢的处理。\n\niOS 的界面是在主线程上进行渲染的，因此任何减慢主线程的操作都会导致界面速度变慢。通常情况下这不成问题，但滚动是一种要求每秒钟达到六十帧的场景。\n\
    \n根据一般的经验法则，耗时或长时间运行的活动——特别是网络请求——应该被分发到后台队列，在工作完成后再回调到主线程。\n\n如果你从网络源获取图片，这通常是个问题。这里有几种你可以使用的技巧：\n\
    \n*   异步后台获取图片，获取后再更新。\n*   使用占位图片来“代替”真实图片。在滚动视图时，单元格通常会在图片下载完成之前很久就从可见视图中移除。在这种情况下，你可以先使用占位图片，只有当该单元格在屏幕上停留足够长的时间使其可见时，才更新图片。\n\
    \n不过，要警惕过早优化。软件工程中有一句谚语：“我有一个瓶颈问题，所以我用了后台线程。现在我有了两个问题。”竞争条件很容易让你陷入完全纠结的境地。\n\n\
    ### 单元格是否被缓存？\n\n构建单元格在处理方面代价高昂，因此 `UITableView` 和 `UICollectionView` 类提供了缓存和出队功能，以允许重用已构建的单元格。如果你的行数超过屏幕能容纳的数量，这会带来显著的差异。\n\
    \n需要检查的两个地方是 `tableView:cellForRowAtIndexPath:` 或 `collectionView:cellForItemAtIndexPath:`\
    \ 方法。为了获得最高效率，你应该执行以下三项操作之一：\n\n*   在创建新实例之前，先从队列中取出一个现有的可重用单元格：`let cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];`\n*   为单元格注册一个类：`tableView.registerClass(MyCell.self,\
    \ forCellReuseIdentifier: \"MyCustomCell\")`\n*   注册一个包含单元格布局的 nib 文件：`tableView.registerNib(UINib(nibName:\
    \ \"MyCell\", bundle: nil), forCellReuseIdentifier: \"MyCustomCell\")`\n\n第一条规则的唯一例外情况是，你正在处理一个静态表格，或者你永远不会有超过可见区域容量的单元格。在后一种情况下，你可能无需缓存单元格，因为它们将始终保持可见。\n\
    \n### 你的表格单元格高度是否不同？\n\n在幕后，`UITableView` 使用单元格高度来构建与表格“框架”相关的多个元素。当 `tableView`\
    \ 中的所有单元格高度相同时，这个计算成本相对较低；但如果单元格高度不同，这些计算会在每次创建新单元格时重复进行。\n\n为了从表格视图中榨取最后一丝速度，最有效的方法是保持单元格高度一致。当然，这在不同的项目中能否实现会有所差异，但如果你的单元格高度仅在一个有限范围内变化，你可能会发现最好将它们设计为统一的高度，并通过内部单元格布局来管理差异。\n\
    \n如果这不可行，请实现 `UITableViewDelegate` 的 `tableView:estimatedHeightForCell:` 函数来返回一个估计高度。表格将使用此值，通过假设所有单元格都具有此高度来计算完整的内容区域，并将精确计算推迟到最后一刻。\n\
    \n这并非一张“免罪金牌”——如果你的估计行高与实际值相差很大，你可能会遇到问题——但这个函数还是有帮助的。\n"
- fmt: '### Cutting the Cost of Compositing


    The iPhone and iPad have incredibly powerful GPUs considering the limitations
    of the form factor and battery constraints. Even so, they do have limits, and
    one thing that pushes at those limits is drawing views with transparency.


    The reason is fairly apparent when you think about it. Put crudely, the device
    builds the view front-to-back and if a front layer is opaque, it doesn’t need
    to bother with even considering what lies behind it when rendering the screen.


    Create a layer with transparent pixels, though, and that calculation has to take
    place, and the more calculations that are needed, the slower the rendering process
    will become.


    Life would be great if all elements of a view could be opaque, but of course it’s
    never that simple. Gradients, drop shadows, and the like are all illusions that
    are only possible thanks to transparency, so a purely opaque interface would be
    a pretty dull one.


    The key to maximum application performance is to use transparency only where it’s
    needed. This then poses another dilemma: how can you tell what’s transparent and
    what isn’t? Fortunately, there’s a tool that can help.


    #### Checking Transparency in the Simulator


    The Simulator has some often-overlooked tools that allow you to peer deep inside
    the interface of your apps. One of the features that it provides enables the visualization
    of the level of transparency and blending in your views, which can then be used
    to fine-tune your interfaces.


    - `Color blended layers` highlights multiple view layers that are drawn on top
    of each other. Red layers indicate where there are transparent areas that need
    to be blended with lower layers, while green shows opaque areas that don’t need
    blending. It’s not always possible to completely remove blended layers, but if
    you’re having problems with rendering speeds and there’s a lot of red showing,
    it is worth digging further to see if the interface can be rejigged to remove
    as much blending as possible.

    - `Color copied images` indicates images that have a color format that the GPU
    can’t handle directly. In this situation, the rendering will be handled by the
    CPU. That’s doubly-expensive because it uses resources that will be needed elsewhere,
    and the CPU is not optimized for image processing.

    - `Color misaligned images` highlights images with bounds that don’t align to
    pixel boundaries. This causes additional rendering to be needed, which can slow
    things down. This is often caused by mis-sizing of assets between `@2x` and `@3x`
    sizes. Check to see if there are the image assets with sizes that have odd numbers
    of pixels, and resize them to even numbers if necessary.

    - `Color offscreen-rendered` highlights layers that have been rendered separately
    to the main screen. This is something that can happen automatically, so it’s not
    always an indication of a problem per-se, but it’s caused by applying masks to
    layers, so this may be something to look for in an effort to optimize your interfaces.


    Figure [9-15](#A978-1-4842-1242-4_9_Chapter.html#Fig15) shows an example of this
    highlighting in action, in the iOS Calendar app – what’s interesting to note is
    that even an app which has been built and optimized by Apple engineers still has
    a certain amount of blending going on. That’s because it’s not necessarily a bad
    thing per se – the key to optimizing performance is to aim for as little as possible.


    ![A978-1-4842-1242-4_9_Fig15_HTML.jpg](A978-1-4842-1242-4_9_Fig15_HTML.jpg)


    Figure 9-15. View blend highlighting in action


    Graphics processing and image optimization is a complex subject. There are some
    excellent deep-dives into the problems and pitfalls available in WWDC videos on
    the Developer Portal which are well-worth checking out.


    ## Summary


    In this chapter, you looked at bringing your table views to life by transforming
    cells from static displays of data through adding some interaction to the cells.
    There’s a range of ways to do this:


    - Embedding custom controls such as buttons, switches, and sliders within the
    cell

    - Implementing pull-to-refresh functionality

    - Adding gesture recognizers to cells to support double taps and so on

    - Implementing search within the table’s contents


    Finally, you looked at some of the processes to ensure that the performance of
    your table views is as slick as possible.


    # 10. Using Tables for Navigation


    Navigation controllers are an almost ubiquitous feature of the iOS user interface.
    They enable a user to manage the navigation through a hierarchy of content, moving
    through the tree of content items in a simple and consistent way.


    Examples of this kind of user interface pattern abound. The iPhone’s built-in
    Contacts app is a classic example. Contacts are displayed in a table view, and
    tapping a row pushes in a view showing the details, as you can see in Figure [10-1](#A978-1-4842-1242-4_10_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_10_Fig1_HTML.jpg](A978-1-4842-1242-4_10_Fig1_HTML.jpg)


    Figure 10-1. The built-in iPhone Contacts app


    This user interface pattern is so common that the iOS SDK provides a controller
    for this specific purpose, which handles the heavy lifting of the navigation for
    you. This chapter will show you how to create and configure a navigation-based
    app with `UINavigationController`.


    This is done in five steps.


    1. Create the skeleton structure of the app.

    2. Create some example data to feed the `UINavigationController`.

    3. Build the detail view.

    4. Link the `UINavigationController` with the detail view.

    5. Tweak the `UINavigationController` to customize its appearance.


    The approach that I take here is a little unusual, in that you would often create
    a navigation controller-based app using the template that Xcode provides. That’s
    fine, but the template does a lot for you, and it hides significant details about
    how the various pieces fit together.


    Building the app from scratch, by contrast, will give you a good understanding
    of the anatomy of a navigation controller.


    ### The Navigation Controller Interface Pattern


    The way in which navigation controllers fit together with the application structure
    always reminds me of Russian dolls. Views fit inside controllers, which fit inside
    windows; at first it can seem unfeasibly complicated.


    Navigation controllers act in a similar way to the page history and forward and
    back buttons of a web browser. As you visit each new page, that page is added
    to the browser’s history. The forward and back buttons allow you to move up and
    down the list of pages that you’ve visited. That’s the pattern used by the Contacts
    app, shown in Figure [10-2](#A978-1-4842-1242-4_10_Chapter.html#Fig2).


    ![A978-1-4842-1242-4_10_Fig2_HTML.jpg](A978-1-4842-1242-4_10_Fig2_HTML.jpg)


    Figure 10-2. Pushing and popping views


    Instead of a list of pages, the navigation controller is basically a stack of
    view controllers. The top-most view controller in the stack is visible, so in
    order to display a new view controller, you push that onto the top of the stack.
    Visually, the new view controller usually appears to slide in from the right,
    as in Figure [10-3](#A978-1-4842-1242-4_10_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_10_Fig3_HTML.jpg](A978-1-4842-1242-4_10_Fig3_HTML.jpg)


    Figure 10-3. Pushing and popping view controllers into the navigation controller
    stack


    When you want to navigate “backwards,” you pop the current view controller off
    the stack to expose the one underneath. The top-most view controller usually appears
    to slide off to the right.'
