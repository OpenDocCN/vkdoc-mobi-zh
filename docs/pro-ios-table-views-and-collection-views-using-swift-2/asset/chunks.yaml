    \n实现起来也非常简单。最简单的方法是使用`UITableViewController`，但如果你在标准`UIViewController`中放置表格视图，也可以实现。我们将依次介绍这两种方法。\n\
    \n## 使用`UITableViewController`实现下拉刷新\n\n在此示例中，我假设你在 Storyboard 中使用`UITableViewController`实例，如图\
