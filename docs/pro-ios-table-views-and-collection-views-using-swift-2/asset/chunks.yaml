  trans: '

    ### 添加 UIViewController 场景


    第一步是从对象浏览器中拖入一个 `UIViewController` 对象，这样故事板中现在就有两个场景了，如图 13-15 所示。


    ![A978-1-4842-1242-4_13_Fig15_HTML.jpg](img/A978-1-4842-1242-4_13_Fig15_HTML.jpg)


    图 13-15. 向故事板添加 UIViewController 场景


    目前，`UITableViewController` 是故事板的入口点，由指向该场景的灰色入口箭头表示。你需要更改此项设置，使其首先加载的是视图控制器。因此，在堆栈中选择“**视图控制器场景**”，然后在属性检查器中选中“**是初始视图控制器**”复选框，如图
    13-16 所示。


    ![A978-1-4842-1242-4_13_Fig16_HTML.jpg](img/A978-1-4842-1242-4_13_Fig16_HTML.jpg)


    图 13-16. 将 UITableViewController 设置为初始视图


    一旦执行此操作，入口箭头就会切换为指向 `UIViewController` 场景。


    ### 向 UIViewController 添加容器视图


    现在你需要向 `UIViewController` 中添加一个容器视图，以便将静态表格视图嵌入其中。


    从“**对象**”浏览器中选择一个“**容器视图**”，并将其拖入视图控制器场景的视图中。一旦执行此操作，你会看到它添加了第三个场景，即一个通过“**嵌入**”转场连接的
    `UIViewController`，如图 13-17 所示。


    ![A978-1-4842-1242-4_13_Fig17_HTML.jpg](img/A978-1-4842-1242-4_13_Fig17_HTML.jpg)


    图 13-17. 添加到第一个 UIViewController 场景的容器视图


    由于你希望静态表格全屏显示，因此需要向容器视图添加一些自动布局约束，使其填满整个视图。


    选择容器视图，然后添加上、下、前导和尾部约束，如图 13-18 所示。


    ![A978-1-4842-1242-4_13_Fig18_HTML.jpg](img/A978-1-4842-1242-4_13_Fig18_HTML.jpg)


    图 13-18. 向容器视图添加自动布局约束


    添加完约束并使容器视图全屏后，你需要删除随“**容器**”对象一起带来的多余的 `UIViewController` 场景。在画布左侧的对象层次结构中选择整个场景，然后按删除键。该场景和转场会一并消失。


    ### 将静态表格视图嵌入到视图控制器中


    将静态表格视图嵌入到视图控制器中是最后一步。按住 Ctrl 键点击对象层次结构中的“**容器**”视图，将蓝色连接线拖至表格视图控制器场景中的表格视图控制器对象。松开鼠标按钮时，表格视图控制器旁边会出现一个
    HUD 菜单，如图 13-19 所示。


    ![A978-1-4842-1242-4_13_Fig19_HTML.jpg](img/A978-1-4842-1242-4_13_Fig19_HTML.jpg)


    图 13-19. 添加嵌入转场


    选择“**嵌入**”项，将创建一个新的“**嵌入**”转场，用于连接表格视图控制器场景与容器，如图 13-20 所示。


    ![A978-1-4842-1242-4_13_Fig20_HTML.jpg](img/A978-1-4842-1242-4_13_Fig20_HTML.jpg)


    图 13-20. 嵌入到 UIViewController 中的静态表格视图


    现在运行应用程序，将会在视图控制器内显示静态表格。从用户体验的角度来看，变化不大，但通过调整容器视图的约束，你现在可以随心所欲地控制静态表格的位置。


    ## 静态表格的其他用途


    静态 `UITableView` 的“典型”用途是设置应用，但它的用途并不仅限于此类情况。


    利用 `UITableView` 的垂直布局能力，只要你的布局看起来像是一堆元素上下堆叠，并且需要比 `UIStackView` 更高级别的控制和灵活性，就可以使用静态表格。


    表单基本上就是一系列标题和文本字段。通过将标题和文本字段放置到交替的行中，你可以使用静态表格视图来构建表单，并让表格视图处理垂直滚动。


    ## 总结


    在本章中，你学习了创建静态表格视图的流程，该流程适用于要显示的数据并非动态变化的情况。这是一个简单的过程，可用于为偏好设置和设置等功能构建视图，或者以表格样式布局显示静态信息。


    # 14. WatchKit 中的表格


    在本章中，你将学习如何创建、配置和使用 WatchKit 中的表格控件。


    WatchKit 专为小巧、低功耗的 Apple Watch 设计，因此 `WKInterfaceTable` 控件的功能远不如 `UITableView`
    强大，但仍可用于呈现基于表格的信息并充当导航界面。


    你将学习以下内容：


    - WatchKit 表格与 `WKInterfaceTable` 类的结构

    - 如何在故事板中创建和配置表格行

    - 如何创建和配置行控制器类

    - 如何在运行时使用数据配置表格

    - 如何响应用户与 WatchKit 表格的交互

    - 如何将 WatchKit 表格用作导航界面。


    ## 关于 WatchKit


    尽管 Apple Watch 在有限的机身内整合了强大的功能和复杂性，堪称工程壮举，但不可否认，该设备的性能远不及 iPhone。


    为了充分发挥 WatchKit 表格的优势，你需要记住一些注意事项和限制条件：


    - Apple Watch 实际上充当着配对 iPhone 上 WatchKit 扩展程序的视图，因此所有通信都必须通过蓝牙链路进行。这可能会速度较慢，因此务必尽可能精简界面更新。

    - 与 `UITableView` 不同，`WKInterfaceTable` 控件不使用按需缓存机制。表格中将要显示的所有行都必须在显示之前创建并发送到
    Watch。因此，通常最好将表格中的行数限制在 20 行左右。

    - Watch 的界面很小，专为快速浏览而设计。在设计表格界面时，务必保持信息密度低，并且控件足够大以便于操作。

    - WatchKit 界面必须在故事板中布局；无法通过代码构建或在运行时进行修改（更改控件内容或可见性除外）。

    - WatchKit 界面不支持自动布局。


    ## WatchKit 应用的结构


    WatchKit 应用由两部分组成：一个在配对 iPhone 上运行的 WatchKit 扩展程序，以及安装在 Watch 本身上的用户界面。


    WatchKit 扩展程序在后台运行，负责向用户界面发送更新，并响应用户与 Watch 的交互。


    WatchKit 应用有三种界面类型：完整的应用用户界面（`WKInterfaceTable` 位于其中）、用于快速访问只读信息的 Glance 界面，以及通知界面。


    界面更新和用户交互通过蓝牙连接在 iPhone 与配对的 Watch 之间进行通信。

