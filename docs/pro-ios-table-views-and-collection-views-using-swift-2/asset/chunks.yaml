  raw: '## Embedding Custom Controls into Cells


    Up to now, you’ve been mainly concerned with creating and presenting largely static
    views. Although you’ve created cells that present dynamic data, the cells themselves
    have so far only responded to the basic taps and swipes associated with editing,
    deleting, and sorting.


    Because both `UITableViewCell` and `UICollectionViewCell` are subclassed of `UIView`,
    this allows you to do pretty much anything you can do with a “standard” `UIView`.
    This includes embedding custom controls such as buttons, sliders, and switches
    as subviews, and having them respond to user actions.


    To begin with, here’s a really trivial example. Each cell contains a `UIButton`
    that pops up an alert view when it’s tapped, as shown in Figure [9-1](#A978-1-4842-1242-4_9_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_9_Fig1_HTML.jpg](A978-1-4842-1242-4_9_Fig1_HTML.jpg)


    Figure 9-1.


    Really simple buttons


    There are two approaches that you can use to implement this kind of functionality:


    *   A simple approach, which inserts a button directly into the cell when the
    cell is first created

    *   A more robust approach, which uses a custom cell class and delegation.


    In this section, we’ll look at the simple approach; and then build up to a more
    robust solution in the next section.


    ### A Simple Approach – Adding a Button Directly To The Cell


    I’m not going to go into detail about the main aspects of creating the table or
    collection view — that’s pretty familiar by now—but there are two things you need
    to do in order to create the button and the alert view.


    #### Creating an Alert View


    The first is to create a function to display the alert view when one of the buttons
    is tapped; this should go in an extension of the view controller. Listing [9-1](#A978-1-4842-1242-4_9_Chapter.html#FPar2)
    shows the table version.


