    to determine which elements appear in the supplied `CGRect`. The collection view
    doesn’t know about this, and in any case it may ask the layout for this information
    repeatedly as it scrolls.


    Secondly, elements refers to cells, supplementary views, and decoration views.
    If your collection view uses these items, you need to figure out which are visible
    in the `CGRect` and return their attributes.


    In this case, things are a little simpler. You only have cells, and the collection
    view won’t scroll. Therefore you can simply return all the attributes you have,
    as shown in Listing [17-11](#A978-1-4842-1242-4_17_Chapter.html#FPar12).


