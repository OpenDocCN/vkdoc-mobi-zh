        `}`


    `}`


    This uses the cell that “owns” the menu to get the indexPath from the collection
    view, and then deletes the object at that index. When the collection view’s data
    is reloaded, the selected cell will have been removed, as shown in Figure [12-25](#A978-1-4842-1242-4_12_Chapter.html#Fig25).


