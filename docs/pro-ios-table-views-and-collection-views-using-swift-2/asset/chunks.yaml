- fmt: "# Getting the Clock to “Tick”\n\nThat’s all you need to do to display the\
    \ hands and the hours, but the clock isn’t yet ready to run. The last task is\
    \ to get it to “tick.”\n\nThis involves invalidating the collection view’s layout\
    \ to force it to recalculate the attributes for each element. Because you set\
    \ the time in the layout, every time the layout is invalidated, it will calculate\
    \ attributes for a new time; invalidate the layout once a second, and the clock\
    \ will appear to tick.\n\nYou can do this by adding an `updateClock()` function\
    \ to the view controller, as shown in Listing [16-12](#A978-1-4842-1242-4_16_Chapter.html#FPar13).\n\
    \n**Listing 16-12.** The `updateClock()` Function\n\n```\nfunc updateClock() {\n\
    \    collectionView.collectionViewLayout.invalidateLayout()\n}\n```\n\nWith this\
    \ function in place, you can now set up a timer to call it once per second. First,\
    \ add a property to the view controller:\n\n```\nvar tickTimer: NSTimer!\n```\n\
    \nThen update the `viewDidLoad()` function so that it looks like Listing [16-13](#A978-1-4842-1242-4_16_Chapter.html#FPar14).\n\
    \n**Listing 16-13.** The updated `viewDidLoad()` Function\n\n```\noverride func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    setupData()\n    configureCollectionView()\n\
    \    tickTimer = NSTimer.scheduledTimerWithTimeInterval(1.0, target: self,\n \
    \       selector: \"updateClock\", userInfo: nil, repeats: true)\n    NSRunLoop.currentRunLoop().addTimer(tickTimer,\
    \ forMode: NSRunLoopCommonModes)\n}\n```\n\nThis creates an instance of `NSTimer`\
    \ that fires once per second and calls the `updateClock()` function. The timer\
    \ is then added to the main run loop to create the illusion that time is passing.\n\
    \nFinally, it’s a good idea to clean up the `NSTimer` once the view is dismissed,\
    \ so add the `viewWillDisappear()` function to the view controller, as shown in\
    \ Listing [16-14](#A978-1-4842-1242-4_16_Chapter.html#FPar15).\n\n**Listing 16-14.**\
    \ The `viewWillDisappear()` Function\n\n```\noverride func viewWillDisappear(animated:\
    \ Bool) {\n    super.viewWillDisappear(animated)\n    tickTimer.invalidate()\n\
    }\n```\n\nIf you run the project now you’ll see a ticking clock like Figure [16-17](#A978-1-4842-1242-4_16_Chapter.html#Fig17),\
    \ built entirely from a `UICollectionView` with a custom layout.\n\n![A978-1-4842-1242-4_16_Fig17_HTML.jpg](A978-1-4842-1242-4_16_Fig17_HTML.jpg)\n\
    \n**Figure 16-17.** The finished `UICollectionView` clock\n\n## Summary\n\nIn\
    \ this chapter, you looked at the process of going beyond the constraints of flow\
    \ layout to something that’s completely customized. You learned how to create\
    \ custom `UICollectionViewFlowLayout` classes and calculate the layout attributes\
    \ needed to place views according to your design.\n\nUsing combinations of all\
    \ of these techniques, you can now create custom layouts. In the next chapter,\
    \ you’re going to take things a few stages further.\n\n# 17. Animated and Interactive\
    \ Collection Views\n\nCombine the flexibility of the collection view with the\
    \ tactile user interface of iOS devices, and you’ve got a world of interface possibilities\
    \ to explore. One of the most satisfying approaches from a user interaction perspective\
    \ is combining collection views with gesture recognizers to build truly interactive\
    \ interfaces.\n\nSo far, you’ve mainly looked at collection views with fairly\
    \ static layouts, albeit with some scrolling. But `UICollectionView` is capable\
    \ of doing much more. It has sophisticated support for reacting to user interaction\
    \ through gesture; and by using custom layouts, you can bring your collection\
    \ views to life with animations.\n\nIn this chapter, you’ll look first at controlling\
    \ collection views with gestures. By implementing gesture recognizers that update\
    \ layout attributes, you can make your collection views react to user interaction\
    \ in naturalistic ways.\n\nYou’ll also look at enhancing the user experience by\
    \ animating collection view transitions such as insertion and deletion. In conjunction\
    \ with the powerful iOS animation APIs, you can create fluid and engaging interfaces\
    \ with ease.\n\n## Controlling Collection Views with Gestures\n\niOS devices are\
    \ inherently interactive and tactile. The touch screens allow apps to create interfaces\
    \ that offer interaction possibilities much more flexible than anything that’s\
    \ achievable with a keyboard and mouse.\n\nThe family of `UIGestureRecognizer`\
    \ classes provide easy but powerful ways to allow your users to control apps with\
    \ interactive gestures such as taps, pans, swipes, and pinches. You can very easily\
    \ combine `UICollectionViewLayouts` with gesture recognizers to build immersive\
    \ interfaces.\n\nIn [Chapter 12](#A978-1-4842-1242-4_12_Chapter.html), you saw\
    \ how to build collection views that allowed interactive ordering and rearrangements.\
    \ In this chapter, we’ll look at using gestures to directly control layout attributes.\n\
    \n### Connecting Gestures with Layouts\n\nYou can very easily connect gesture\
    \ recognizers to collection views. By receiving the gesture events and using the\
    \ values obtained to update layout attributes, you can make your layouts interactive.\n\
    \nYou’ll build two separate effects that use a pinch gesture to control a flow\
    \ layout. In the first, you’ll update the item spacing; in the second, you’ll\
    \ control item sizing.\n\nThe basic approach is very simple:\n\n- Create a `UIGestureRecognizer`\
    \ to handle the type of interaction you need, in this case a `UIPinchGestureRecognizer`.\n\
    - Install this gesture recognizer on the collection view controller.\n- Implement\
    \ the callback functions to receive the data relating to the gestures.\n- Use\
    \ these values to update the attributes of the collection view’s layout.\n\nTo\
    \ speed things up, you can use the base project from the [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html)\
    \ source code in the book’s GitHub repo. This creates a `UITabBarController`-based\
    \ project with two tabs, each containing a collection view. Both display 20 items\
    \ with a standard `UICollectionViewFlowLayout`, as shown in Figure [17-1](#A978-1-4842-1242-4_17_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1242-4_17_Fig1_HTML.jpg](A978-1-4842-1242-4_17_Fig1_HTML.jpg)\n\
    \n**Figure 17-1.** The base project with a flow layout\n\n#### Adding the Gesture\
    \ Recognizer\n\nThe gesture recognizer needs to be added to the collection view\
    \ controller so that it can intercept the gesture and then pass the data onto\
    \ the collection view’s view controller class.\n\nAdd the following lines to the\
    \ `setupCollectionView` function in the `SpaceViewController` class:\n\n```\n\
    let pinchRecognizer = UIPinchGestureRecognizer(target: self, action: \"didGetPinchGesture:\"\
    )\ncollectionView.addGestureRecognizer(pinchRecognizer)\n```\n\nThis creates an\
    \ instance of a `UIPinchGestureRecognizer` and sets the target property to the\
    \ `didGetPinchGesture:` function. Then it adds the newly-created gesture recognizer\
    \ to the collection view."
