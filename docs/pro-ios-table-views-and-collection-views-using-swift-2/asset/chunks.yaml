    \ Controller` 左侧向内的箭头）。\n\n所有这些元素都列在文档大纲的 `Navigation Controller` 场景下方。在 iOS 开发中，这时你会开始体会到大显示器的用处！\n\
    \n`Navigation Controller` 场景出现在 Storyboard 中时没有任何标识符，因此你需要设置它。在文档大纲中选择它，切换到工具面板中的身份检查器，并将\
    \ Storyboard ID 更新为 `NavigationController`，如图 10-30 所示。\n\n![A978-1-4842-1242-4_10_Fig30_HTML.jpg](img/A978-1-4842-1242-4_10_Fig30_HTML.jpg)\n\
    \n**图 10-30.** 更新导航控制器的标识符\n\n### 更新应用委托\n\n由于你改变了 Storyboard 的结构，你需要更新 `AppDelegate`\
    \ 以反映这些变化。\n\n切换到 `application:didFinishLaunchingWithOptions:` 函数，并将其更新为与代码清单\
    \ 10-11 一致。\n\n**代码清单 10-11.** 更新后的 `application:didFinishLaunchingWithOptions:`\
    \ 函数\n\n```\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ \nlaunchOptions: [NSObject: AnyObject]?) -> Bool {\n    // Override point for\
    \ customization after application launch.\n    let storyboard = UIStoryboard(name:\
    \ \"Main\", bundle: nil)\n    let navigationController = \n  storyboard.instantiateViewControllerWithIdentifier(\"\
    NavigationController\")\n    navigationController.navigationBarHidden = false\n\
    \    self.window?.rootViewController = navigationController\n    self.window?.makeKeyAndVisible()\n\
    \    return true\n}\n```\n\n这里你像之前一样实例化了 `storyboard`，但这次你是从 `storyboard` 加载导航控制器，而不是用代码创建它。也不需要创建\
    \ `TableViewController` 的实例；你在 `storyboard` 中建立的链接会自动处理这些。\n"
- fmt: "### Linking the Detail View to the Table View\n\nNow that the `TableViewController`\
    \ is embedded inside a navigation controller, you can link the `TableViewController`\
    \ to the `DetailViewController`.\n\nThis is as simple as right-clicking in the\
    \ prototype row in the table view, dragging the blue connection line out to the\
    \ `Detail View Controller`, and releasing the mouse button.\n\nAt this point,\
    \ you’ll see the connection HUD pop up. Select the `Show` option, as shown in\
    \ Figure 10-31.\n\n![A978-1-4842-1242-4_10_Fig31_HTML.jpg](A978-1-4842-1242-4_10_Fig31_HTML.jpg)\n\
    \nFigure 10-31. The connection HUD\n\nA connection will be made between the two\
    \ controllers (shown in Figure 10-32).\n\n![A978-1-4842-1242-4_10_Fig32_HTML.jpg](A978-1-4842-1242-4_10_Fig32_HTML.jpg)\n\
    \nFigure 10-32. Making the connection between the `TableViewController` and the\
    \ detail view\n\nOnce the link, or segue, has been made, you need to give it an\
    \ identifier. Click it so that the line is highlighted, switch to the Identity\
    \ Inspector in the Utilities pane, and give it a name of `PushDetailSegue`, as\
    \ shown in Figure 10-33.\n\n![A978-1-4842-1242-4_10_Fig33_HTML.jpg](A978-1-4842-1242-4_10_Fig33_HTML.jpg)\n\
    \nFigure 10-33. Giving the segue an identifier\n\nAt this point, you no longer\
    \ need the `UITableViewDelegate` function to react to selections, so switch back\
    \ to the `TableViewController` and remove the `tableView:didSelectRowAtIndexPath:`\
    \ function from the `TableViewController` extension. It should now look like Listing\
    \ 10-12.\n\n**Listing 10-12.** The Updated `TableViewController` Extension\n\n\
    ```\nextension TableViewController: UITableViewDataSource {\n\n    // DataSource\
    \ functions\n\n    func numberOfSectionsInTableView(tableView: UITableView) ->\
    \ Int {\n        return 1\n    }\n\n    func tableView(tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int {\n        return tableData.count\n\
    \    }\n\n    func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n        let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    NameCell\", forIndexPath: indexPath)\n        let name = tableData[indexPath.row]\n\
    \        cell.textLabel!.text = name.nameText\n        return cell\n    }\n}\n\
    ```\n\nRun the app, and test the push from table to detail. Something’s not quite\
    \ right; the detail view looks like Figure 10-34.\n\n![A978-1-4842-1242-4_10_Fig34_HTML.jpg](A978-1-4842-1242-4_10_Fig34_HTML.jpg)\n\
    \nFigure 10-34. The problematic detail view\n\nThe problem here is that you removed\
    \ the function where the `Name` struct was passed from the `TableViewController`\
    \ to the `DetailViewController`. This means that the `displayName` property of\
    \ the `DetailViewController` is empty and there’s nothing to update the fields\
    \ with.\n\nBefore it performs a segue, the view controller executes the `prepareForSegue:sender:`\
    \ function. This is the point where you can access the view controller that will\
    \ be displayed, and pass over any data objects that the new controller will need.\n\
    \nIn the main body of the `TableViewController`, add the function shown in Listing\
    \ 10-13.\n\n**Listing 10-13.** The `prepareForSegue:sender` Function\n\n```\n\
    override func prepareForSegue(segue: UIStoryboardSegue, sender: AnyObject?) {\n\
    \    if segue.identifier == \"PushDetailSegue\" {\n        let detailViewController\
    \ = segue.destinationViewController as! DetailViewController\n        if let indexPath\
    \ = tableView.indexPathForSelectedRow {\n            detailViewController.displayName\
    \ = tableData[indexPath.row]\n        }\n    }\n}\n```\n\nFirst, you check which\
    \ segue is being performed. This function will be called for all segues, so it’s\
    \ important to make sure that the right action takes place.\n\nAssuming that the\
    \ segue that is about to be performed has an identifier of `PushDetailSegue`,\
    \ you access its `destinationViewController` property and create a reference to\
    \ `detailViewController` by force-downcasting it to an instance of the `DetailViewController`\
    \ class. (By default, the `destinationViewController` property of a segue is an\
    \ instance of `UIViewController`).\n\nNext, you check if there is a selected row\
    \ by asking the table for the `indexPath` of any selected row. If there isn’t\
    \ a selected row for some reason, the table view will return the optional containing\
    \ `nil`, so it’s safest to unwrap it with an `if-let` clause.\n\nThen with the\
    \ `indexPath` for the selected row, you can set the `detailViewController`'s `displayName`\
    \ property with the relevant item from the `tableData` array.\n\nRun the app again,\
    \ and this time you’ll see that the detail view has been populated with the `Name`\
    \ struct, as shown in Figure 10-35.\n\n![A978-1-4842-1242-4_10_Fig35_HTML.jpg](A978-1-4842-1242-4_10_Fig35_HTML.jpg)\n\
    \nFigure 10-35. The app with a populated detail view\n\n## Summary\n\nIn this\
    \ chapter you wired together a `UINavigationController`-based app from scratch.\
    \ The app delegate loads the navigation controller. The navigation controller\
    \ loads the table view. The table view provides the relevant row, and asks the\
    \ navigation controller to push in the detail view for the row’s content.\n\n\
    There are two basic ways to implement this functionality: either by wiring it\
    \ up in code and using the `UITableViewDelegate` functions to react to selections\
    \ in the table, or by using Storyboard features and reacting to segues.\n\nHaving\
    \ put the structure and the basic function of the app together, you can adapt\
    \ this to drive the table with any suitable model as the data source. The structure\
    \ of that data will determine how you’ll handle drilling into the details; by\
    \ moving from table to table, it’s very easy to navigate backwards and forwards\
    \ in a hierarchical data structure.\n\n# 11. Indexing, Grouping, and Sorting Tables\n\
    \nAlthough `UITableView` is efficient at managing large quantities of data, the\
    \ user interface is constrained by the physical size of the device. By the time\
    \ a table displays more than 10 or 12 rows, its labels and controls have become\
    \ too small to easily work with.\n\nIf a table contains a lot of data, the user\
    \ might also have to perform a lot of scrolling, which doesn’t make for a good\
    \ user experience. Fortunately, some `UITableView` facilities are available to\
    \ improve the organization of the data presented by the table view.\n\n## Using\
    \ Indexed Tables\n\nAn indexed table is fundamentally the same as a plain-style\
    \ table, but with an index running down the right hand edge, as you saw in Chapter\
    \ 3. Typically, this index displays letters or numbers, which the user can tap\
    \ to automatically scroll the table to the relevant section, without having to\
    \ scroll manually.\n\nThis is how apps such as the built-in Contacts application\
    \ work. When the app opens, you’re at the top of the list of names beginning with\
    \ A. Tapping Z will rapidly scroll the app down to the bottom of the list.\n\n\
    Indexed tables rely on two elements: an array of strings to act as index entries\
    \ that will be displayed down the right-hand edge, and data that is organized\
    \ into sections corresponding to the index entries. In the case of the Contacts\
    \ app, names are organized alphabetically in sections—a section for names beginning\
    \ with A, a section for names beginning with B, and so on.\n\nAlthough there needs\
    \ to be a corresponding section for each entry in the index, the titles of the\
    \ section headers don’t have to be the same as the index strings themselves. In\
    \ the Contacts app, the section headers and indexes are the same, but you can\
    \ be more flexible if you need to be.\n\n**Caution**\n\nApple’s iOS Human Interface\
    \ Guidelines advise against using table indexes in conjunction with in-cell controls,\
    \ because the index will tend to obscure the right-hand side of the cells."
