    of the function with `super.prepareForReuse()`

    *   Only use this function to reset non-content properties of the cell – alpha,
    editing or selection properties. Using it to change content-related outlets can
    have an adverse impact on performance.


    ## Improving the App’s Architecture with MVVM


    `UITableView` and `UICollectionView` are complex beasts, and rely on a lot of
    “moving parts” to function: table and collection view objects, cells, datasources,
    delegates, and view controllers. All them have to coordinate to produce the desired
    effect.


    The number of moving parts can lead to blurred responsibilities within your app’s
    classes. For example, a very common pattern that you’ve seen several times so
    far is where a `UIViewController` acts as the `dataSource` and `delegate` for
    a table or collection view.


    There’s nothing wrong with this per se, but a class that does several things is
    usually regarded as a code smell: it’s harder to write, harder to understand after
    you’ve written it, harder to test, and harder to debug.


    One of the most important design patterns in object- oriented software is the
    single responsibility principle, which can be summed up as “do one thing, and
    do it well.” The model-view-view model (or MVVM) approach is one way of attempting
    this.


    ### The Model-View-View Model Approach


    To understand the MVVM model, it’s worth starting by looking at the “traditional”
    approach to structuring a table view project.


