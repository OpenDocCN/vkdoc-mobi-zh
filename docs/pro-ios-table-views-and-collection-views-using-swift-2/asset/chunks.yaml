    \n图 1-14. 表格视图属性 HUD\n\n![A978-1-4842-1242-4_1_Fig13_HTML.jpg](img/A978-1-4842-1242-4_1_Fig13_HTML.jpg)\n\
    \n图 1-13. Xcode 错误\n\n稍后你将修复这个问题，但首先，让我们将表格连接到 `ViewController` 类。\n"
- fmt: "### Wiring Up the Data Source and Delegate\n\nYour `ViewController` object\
    \ will be ready shortly, but the table view itself doesn’t yet know that the view\
    \ controller will act as both a data source and a delegate. You need to connect\
    \ the two together.\n\nThere are two ways of doing this: visually (though Interface\
    \ Builder) or in code. For this example application, you’ll use Interface Builder,\
    \ so click the Storyboard file to open it again.\n\nRight-click the table view\
    \ object (either in the main Interface Builder or in the objects tree in the middle\
    \ pane), and you’ll see the Table View property HUD, as shown in Figure [1-14](#A978-1-4842-1242-4_1_Chapter.html#Fig14).\n\
    \nIt’s showing the two Outlet properties that you’re interested in: the `dataSource`\
    \ and the `delegate`.\n\nTo connect these, mouse-over the circle to the right\
    \ of the `dataSource` entry. The circle changes to a plus symbol. Click and drag\
    \ from this symbol and a blue line extends out. Mouse-over to the File’s Owner\
    \ item in the object tree, and it becomes highlighted in blue. Release the mouse,\
    \ and the `dataSource` is now connected. Next, repeat the same process for the\
    \ `delegate`: drag from the plus symbol to File’s Owner, drop, and connect.\n\n\
    The Table View properties HUD will now show that both the `dataSource` and the\
    \ `delegate` are connected to the View Controller, as shown in Figure [1-15](#A978-1-4842-1242-4_1_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1242-4_1_Fig15_HTML.jpg](A978-1-4842-1242-4_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15. The `dataSource` and `delegate` are now connected to the View Controller\n\
    \n### Displaying the Data\n\nNow that you have the table view wired up to its\
    \ `delegate` and `dataSource`, you’re in a position to start making it do something.\
    \ A logical next step would be to get the table view to display its data.\n\n\
    As the table view draws itself, it asks its `dataSource` to provide cells that\
    \ can then be displayed. You’ll look at this process in a lot more detail in [Chapters\
    \ 3](#A978-1-4842-1242-4_3_Chapter.html) and [5](#A978-1-4842-1242-4_5_Chapter.html),\
    \ but for now let’s get those cells created.\n\nThe `UITableViewDataSource` protocol\
    \ has two required functions and nine optional ones. Because this is a simple\
    \ example, you’re going to implement only the two required functions and one optional\
    \ one.\n\n- The first required function, `tableView(_:numberOfRowsInSection:)`,\
    \ returns the number of rows that the section will eventually contain.\n- The\
    \ second required function, `tableView(_:cellForRowAtIndexPath:)`, creates and\
    \ returns the cell itself.\n- The optional function is `numberOfSectionsInTableView(_:)`.\
    \ It’s optional in your app because you’re using a table with a single section,\
    \ and by default the number of sections in a table is 1.\n\nLater, when you look\
    \ at more complex sectional tables, this function definitely will be required,\
    \ so I’m including it here even though it’s not strictly necessary.\n\n#### `numberOfSectionsInTableView(\
    \ :)`\n\nYou have a simple table with one section, so this function is going to\
    \ be pretty trivial. Switch to `ViewController.swift` or `ViewController.m`, where\
    \ you can create the function, shown in Listing [1-4](#A978-1-4842-1242-4_1_Chapter.html#FPar8).\n\
    \nListing 1-4. The `numberOfSectionsInTableView( :)` Function\n\n```\n//MARK:\
    \ UITableViewDatasource functions\n\nfunc numberOfSectionsInTableView(tableView:\
    \ UITableView) -> Int {\n    return 1\n}\n```\n\n**Note:** The `MARK` lines are\
    \ compiler directives. They’re not used during compilation, but they demarcate\
    \ sections of the code during the writing process. If you pull down the breadcrumb\
    \ menu or press Crtl+6 at the top of the Edit pane, you’ll see that these lines\
    \ break up the list of functions and make the code easier to navigate. Using these\
    \ directives is not a big deal now, but as your classes grow, they can be a real\
    \ lifesaver when trying to find a particular function among others.\n\n#### `tableView:numberOfRowsInSection(\
    \ :)`\n\nIn order to draw itself successfully, the table view needs to know how\
    \ many rows are going to appear in the section (your simple table view has only\
    \ one section).\n\nEarlier, you created an array to hold your data and populated\
    \ it with this string. The section will have as many rows as there are elements\
    \ in the array. The `Array` class has a useful function for returning the number\
    \ of elements in an array: `tableData.count`. In the view controller class, add\
    \ the function as shown in Listing [1-5](#A978-1-4842-1242-4_1_Chapter.html#FPar10).\n\
    \nListing 1-5. The `tableView:numberOfRowsInSection:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return tableData.count\n\
    }\n```\n\nPretty straightforward, yes?\n\n#### Creating Cells\n\nNow that you’ve\
    \ connected the table view to the `ViewController` it’s time to start creating\
    \ cells.\n\nWhenever the table needs a cell, it asks its data source to provide\
    \ one by calling the `cellForRowAtIndexPath:` function. The data source will either\
    \ create a brand new instance of a cell, configure it, and hand it back to the\
    \ table view, or it will dequeue a previously-created instance from its cache,\
    \ before configuring and handing this back.\n\nYou’ll look at the caching and\
    \ dequeueing mechanisms in more detail in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html),\
    \ but for now just bear in mind that the data source uses its cache to vastly\
    \ improve the performance of the table view.\n\nTo begin, add the function in\
    \ Listing [1-6](#A978-1-4842-1242-4_1_Chapter.html#FPar11) to the view controller\
    \ class, and then I’ll step through what it does.\n\nListing 1-6. The `tableView:cellForRowAtIndexPath:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\n\
    indexPath: NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\nforIndexPath: indexPath)\n\n    cell.textLabel!.text = tableData[indexPath.row]\n\
    \    return cell\n}\n```\n\nLet’s start by looking at the function itself:\n\n\
    ```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\nindexPath:\
    \ NSIndexPath) -> UITableViewCell {\n```\n\nThis returns an instance of `UITableViewCell`\
    \ and takes the following two parameters:\n- The `tableView` that is calling for\
    \ the cell (because this class might be the data source for numerous tables, it\
    \ needs to identify which table it’s dealing with)\n- An `indexPath`, which has\
    \ a `row` property identifying the table row for which the cell is being requested\n\
    \nThe first line of the function attempts to grab a previously-instantiated cell\
    \ from the `tableView`’s cache with the `dequeueReusableCellWithIdentifier:` function:\n\
    \n```\nlet cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
    , forIndexPath: indexPath)\n```\n\n**Tip:** The use of cell identifiers is something\
    \ you’ll explore in much more detail in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html).\
    \ For now, you can get by thinking of this as a label that identifies which kind\
    \ of cell you’re using. This table has only one kind of cell, hence the single\
    \ identifier.\n\nBehind the scenes, the data source will have either dequeued\
    \ an existing cell instance or it will create a fresh one for you. You don’t have\
    \ to worry about this because the function is guaranteed to return a cell instance\
    \ that you can work with, so you’re ready to configure its contents."
  raw: '## Wiring Up the Data Source and Delegate


    Your `ViewController` object will be ready shortly, but the table view itself
    doesn’t yet know that the view controller will act as both a data source and a
    delegate. You need to connect the two together.


    There are two ways of doing this: visually (though Interface Builder) or in code.
    For this example application, you’ll use Interface Builder, so click the Storyboard
    file to open it again.


    Right-click the table view object (either in the main Interface Builder or in
    the objects tree in the middle pane), and you’ll see the Table View property HUD,
    as shown in Figure [1-14](#A978-1-4842-1242-4_1_Chapter.html#Fig14).


    It’s showing the two Outlet properties that you’re interested in: the `dataSource`
    and the `delegate`.


    To connect these, mouse-over the circle to the right of the `dataSource` entry.
    The circle changes to a plus symbol. Click and drag from this symbol and a blue
    line extends out.


    Mouse-over to the File’s Owner item in the object tree, and it becomes highlighted
    in blue. Release the mouse, and the `dataSource` is now connected.


    Next, repeat the same process for the `delegate`: drag from the plus symbol to
    File’s Owner, drop, and connect.


    The Table View properties HUD will now show that both the `dataSource` and the
    `delegate` are connected to the View Controller, as shown in Figure [1-15](#A978-1-4842-1242-4_1_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_1_Fig15_HTML.jpg](A978-1-4842-1242-4_1_Fig15_HTML.jpg)


    Figure 1-15.


    The `dataSource` and `delegate` are now connected to the View Controller


    ## Displaying the Data


    Now that you have the table view wired up to its `delegate` and `dataSource`,
    you’re in a position to start making it do something. A logical next step would
    be to get the table view to display its data.


    As the table view draws itself, it asks its `dataSource` to provide cells that
    can then be displayed. You’ll look at this process in a lot more detail in [Chapters
    3](#A978-1-4842-1242-4_3_Chapter.html) and [5](#A978-1-4842-1242-4_5_Chapter.html),
    but for now let’s get those cells created.


    The `UITableViewDataSource` protocol has two required functions and nine optional
    ones. Because this is a simple example, you’re going to implement only the two
    required functions and one optional one.


    The first required function, `tableView(_:numberOfRowsInSection:)` returns the
    number of rows that the section will eventually contain.


    The second required function, `tableView(_:cellForRowAtIndexPath:)`, creates and
    returns the cell itself.


    The optional function is `numberOfSectionsInTableView(_:)`. It’s optional in your
    app because you’re using a table with a single section, and by default the number
    of sections in a table is 1.


    Later, when you look at more complex sectional tables, this function definitely
    will be required, so I’m including it here even though it’s not strictly necessary.


    ### numberOfSectionsInTableView( :)


    You have a simple table with one section, so this function is going to be pretty
    trivial. Switch to `ViewController.swift` or `ViewController.m`, where you can
    create the function, shown in Listing [1-4](#A978-1-4842-1242-4_1_Chapter.html#FPar8).


    Listing 1-4. The `numberOfSectionsInTableView( :)` Function


    `//MARK: UITableViewDatasource functions`


    `func numberOfSectionsInTableView(tableView: UITableView) -> Int {`


        `return 1`


    `}`


    Note


    The `MARK` lines are compiler directives. They’re not used during compilation,
    but they demarcate sections of the code during the writing process. If you pull
    down the breadcrumb menu or press Crtl+6 at the top of the Edit pane, you’ll see
    that these lines break up the list of functions and make the code easier to navigate.
    Using these directives is not a big deal now, but as your classes grow, they can
    be a real lifesaver when trying to find a particular function among others.


    ### tableView:numberOfRowsInSection( :)


    In order to draw itself successfully, the table view needs to know how many rows
    are going to appear in the section (your simple table view has only one section).


    Earlier, you created an array to hold your data and populated it with this string.
    The section will have as many rows as there are elements in the array.


    The `Array` class has a useful function for returning the number of elements in
    an array:


    `tableData.count`


    In the view controller class, add the function as shown in Listing [1-5](#A978-1-4842-1242-4_1_Chapter.html#FPar10).


    Listing 1-5\. The `tableView:numberOfRowsInSection:` Function


    `func tableView(tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {`


        `return tableData.count`


    `}`


    Pretty straightforward, yes?


    ### Creating Cells


    Now that you’ve connected the table view to the `ViewController` it’s time to
    start creating cells.


    Whenever the table needs a cell, it asks its data source to provide one by calling
    the `cellForRowAtIndexPath:` function. The data source will either create a brand
    new instance of a cell, configure it, and hand it back to the table view, or it
    will dequeue a previously-created instance from its cache, before configuring
    and handing this back.


    You’ll look at the caching and dequeueing mechanisms in more detail in [Chapter
    5](#A978-1-4842-1242-4_5_Chapter.html), but for now just bear in mind that the
    data source uses its cache to vastly improve the performance of the table view.


    To begin, add the function in Listing [1-6](#A978-1-4842-1242-4_1_Chapter.html#FPar11)
    to the view controller class, and then I’ll step through what it does.


    Listing 1-6\. The `tableView:cellForRowAtIndexPath:` Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath` ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)


    `indexPath: NSIndexPath) -> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",`
    ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)`forIndexPath:
    indexPath)`


        `cell.textLabel!     .text = tableData[indexPath.row]`


        `return cell`


    `}`


    Let’s start by looking at the function itself:


    `func tableView(tableView: UITableView, cellForRowAtIndexPath` ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg)


    `indexPath: NSIndexPath) -> UITableViewCell {`


    This returns an instance of `UITableViewCell` and takes the following two parameters:


    *   The `tableView` that is calling for the cell (because this class might be
    the data source for numerous tables, it needs to identify which table it’s dealing
    with)

    *   An `indexPath`, which has a `row` property identifying the table row for which
    the cell is being requested


    The first line of the functions attempts to grab a previously-instantiated cell
    from the `tableView`’s cache with the `dequeueReusableCellWithIdentifier:` function:


    `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier", forIndexPath:`
    ![A978-1-4842-1242-4_1_Figa_HTML.jpg](A978-1-4842-1242-4_1_Figa_HTML.jpg) `indexPath)`


    Tip


    The use of cell identifiers is something you’ll explore in much more detail in
    [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html). For now, you can get by thinking
    of this as a label that identifies which kind of cell you’re using. This table
    has only one kind of cell, hence the single identifier.


    Behind the scenes, the data source will have either dequeued an existing cell
    instance or it will create a fresh one for you. You don’t have to worry about
    this because the function is guaranteed to return a cell instance that you can
    work with, so you’re ready to configure its contents.'
  trans: "\n### 连接数据源与委托\n\n你的 `ViewController` 对象即将准备就绪，但表格视图本身还不知道视图控制器将同时充当数据源和委托。你需要将两者连接起来。\n\
    \n有两种方法可以做到这一点：可视化（通过 Interface Builder）或在代码中实现。对于这个示例应用，你将使用 Interface Builder，因此点击故事板文件再次将其打开。\n\
    \n右键单击表格视图对象（在主 Interface Builder 中或中间窗格的对象树中），你将看到表格视图属性 HUD，如图 1-14 所示。\n\n\
    它显示了你感兴趣的两个出口属性：`dataSource` 和 `delegate`。\n\n要连接它们，将鼠标悬停在 `dataSource` 条目右侧的圆圈上。圆圈会变成一个加号符号。从该符号上点击并拖动，会伸出一条蓝色线。将鼠标悬停在对象树中的文件所有者项上，该项会高亮显示为蓝色。松开鼠标，`dataSource`\
    \ 即连接成功。接下来，对 `delegate` 重复相同的过程：从加号符号拖动到文件所有者，松开并连接。\n\n现在，表格视图属性 HUD 将显示 `dataSource`\
    \ 和 `delegate` 都已连接到视图控制器，如图 1-15 所示。\n\n![A978-1-4842-1242-4_1_Fig15_HTML.jpg](img/A978-1-4842-1242-4_1_Fig15_HTML.jpg)\n\
    \n图 1-15. `dataSource` 和 `delegate` 现已连接到视图控制器\n\n### 显示数据\n\n现在你已经将表格视图连接到其 `delegate`\
    \ 和 `dataSource`，就可以开始让它执行操作了。合乎逻辑的下一步是让表格视图显示其数据。\n\n当表格视图绘制自身时，它会要求其 `dataSource`\
    \ 提供可供显示的单元格。我们将在第 3 章和第 5 章中更详细地探讨这个过程，但现在先让我们创建这些单元格。\n\n`UITableViewDataSource`\
    \ 协议包含两个必需函数和九个可选函数。由于这是一个简单的示例，你将只实现两个必需函数和一个可选函数。\n\n- 第一个必需函数 `tableView(_:numberOfRowsInSection:)`\
    \ 返回该分区最终将包含的行数。\n- 第二个必需函数 `tableView(_:cellForRowAtIndexPath:)` 创建并返回单元格本身。\n\
    - 可选函数是 `numberOfSectionsInTableView(_:)`。在你的应用中它是可选的，因为你使用的是只有一个分区的表格，而默认情况下表格的分区数为\
    \ 1。\n\n稍后，当你处理更复杂的分区表格时，这个函数将变得必不可少，所以我在这里包含了它，尽管严格来说并非必需。\n\n#### `numberOfSectionsInTableView(\
    \ :)`\n\n你有一个包含一个分区的简单表格，所以这个函数将非常简单。切换到 `ViewController.swift` 或 `ViewController.m`，在这里你可以创建该函数，如代码清单\
    \ 1-4 所示。\n\n代码清单 1-4. `numberOfSectionsInTableView( :)` 函数\n\n```\n//MARK: UITableViewDatasource\
    \ functions\n\nfunc numberOfSectionsInTableView(tableView: UITableView) -> Int\
    \ {\n    return 1\n}\n```\n\n**注意：** `MARK` 行是编译器指令。它们在编译期间不会被使用，但会在编写过程中标记代码的各个部分。如果你下拉面包屑菜单或在编辑窗格顶部按\
    \ `Ctrl+6`，你会看到这些行将函数列表分隔开，使代码更易于导航。目前使用这些指令不是什么大事，但随着你的类不断增长，在众多函数中寻找特定函数时，它们可能会成为真正的救星。\n\
    \n#### `tableView:numberOfRowsInSection( :)`\n\n为了成功绘制自身，表格视图需要知道该分区中将出现多少行（你的简单表格视图只有一个分区）。\n\
    \n之前，你创建了一个数组来保存数据，并用这个字符串填充了它。该分区的行数将与数组中的元素数量相同。`Array` 类有一个用于返回数组中元素数量的实用函数：`tableData.count`。在视图控制器类中，添加如代码清单\
    \ 1-5 所示的函数。\n\n代码清单 1-5. `tableView:numberOfRowsInSection:` 函数\n\n```\nfunc tableView(tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return tableData.count\n\
    }\n```\n\n相当直接，对吧？\n\n#### 创建单元格\n\n现在你已经将表格视图连接到 `ViewController`，是时候开始创建单元格了。\n\
    \n每当表格需要一个单元格时，它都会通过调用 `cellForRowAtIndexPath:` 函数要求其数据源提供一个。数据源要么创建一个全新的单元格实例，进行配置，然后交还给表格视图，要么从其缓存中取出一个之前创建的实例，再进行配置并交还。\n\
    \n你将在第 5 章中更详细地研究缓存和出队机制，但现在只需记住，数据源利用其缓存来极大地提高表格视图的性能。\n\n首先，将代码清单 1-6 中的函数添加到视图控制器类中，然后我将逐步解释其功能。\n\
    \n代码清单 1-6. `tableView:cellForRowAtIndexPath:` 函数\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath\nindexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
    ,\nforIndexPath: indexPath)\n\n    cell.textLabel!.text = tableData[indexPath.row]\n\
    \    return cell\n}\n```\n\n让我们先看看这个函数本身：\n\n```\nfunc tableView(tableView: UITableView,\
    \ cellForRowAtIndexPath\nindexPath: NSIndexPath) -> UITableViewCell {\n```\n\n\
    该函数返回一个 `UITableViewCell` 实例，并接受以下两个参数：\n- 调用该单元格的 `tableView`（因为此类可能是多个表格的数据源，所以需要标识当前处理的是哪个表格）\n\
    - 一个 `indexPath`，它具有一个 `row` 属性，用于标识请求单元格的表格行\n\n函数的第一行尝试使用 `dequeueReusableCellWithIdentifier:`\
    \ 函数从 `tableView` 的缓存中获取一个先前实例化的单元格：\n\n```\nlet cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\", forIndexPath: indexPath)\n```\n\n**提示：** 关于单元格标识符的使用，你将在第 5\
    \ 章中更深入地探索。现在，你可以将其理解为一个用于标识你正在使用哪种单元格的标签。该表格只有一种单元格，因此使用单一标识符。\n\n在幕后，数据源要么会取出一个现有的单元格实例，要么会为你创建一个全新的实例。你无需为此担心，因为该函数保证会返回一个你可以操作的单元格实例，因此你可以准备配置其内容了。\n"
- fmt: '### Creating a Prototype Cell


    A prototype cell is a “blueprint” that is used by the `UITableViewDataSource`
    to create an actual cell when called for. The data source uses the `cellIdentifier`
    string that you provided in the `cellForRowAtIndexPath` function to determine
    which prototype is the basis of which type of cell.


    Switch to the Storyboard, and select the `UITableView` by clicking on the Table
    View item in the Document Outline. You’ll see that the table view in the canvas
    shows `Prototype Content`, and the Attributes Inspector shows `Dynamic Protoypes`
    in the Content dropdown.


    Create a prototype cell by increasing the number in the Prototype Cells box to
    1, as shown in Figure [1-16](#A978-1-4842-1242-4_1_Chapter.html#Fig16).


    ![A978-1-4842-1242-4_1_Fig16_HTML.jpg](A978-1-4842-1242-4_1_Fig16_HTML.jpg)


    Figure 1-16. Increasing the number of prototype cells


    Now you can select the newly-created prototype cell, by selecting in the Document
    Outline shown in Figure [1-17](#A978-1-4842-1242-4_1_Chapter.html#Fig17):


    ![A978-1-4842-1242-4_1_Fig17_HTML.jpg](A978-1-4842-1242-4_1_Fig17_HTML.jpg)


    Figure 1-17. Selecting the prototype cell


    The Attributes Inspector will show the attributes of the prototype cell – so here
    you can add the cell’s cell identifier so that the data source is able to find
    it.


    Add `CellIdentifier` to the `Identifier` field as shown in Figure [1-18](#A978-1-4842-1242-4_1_Chapter.html#Fig18)
    – make sure that you match the cell identifier exactly with the string that you
    used in the ViewController. Then save the Storyboard, and switch back to the `ViewController`.


    ![A978-1-4842-1242-4_1_Fig18_HTML.jpg](A978-1-4842-1242-4_1_Fig18_HTML.jpg)


    Figure 1-18. Setting the cell identifier


    ### Configuring the Cell


    Once the data source has created or dequeued a cell instance, you can configure
    its contents before handing it back to the table view.


    You’ll look at cells in much more detail in [Chapter 6](#A978-1-4842-1242-4_6_Chapter.html),
    but for now all you need to know is that a `UITableViewCell` contains a `UILabel`
    outlet called `textLabel` that you can set the `text` property of, like


    ```

    cell.textLabel!.text = tableData[indexPath.row]

    ```


    The `cellForRowAtIndexPath()` function is passed an `NSIndexPath` parameter by
    the `tableView`; this indicates the `section` and `row` of the table that the
    cell is intended for.


    You’re not interested in the `section`, because your table only has one, but you
    can use the `row` property of the `indexPath` parameter to retrieve the corresponding
    `String` (or `NSString`) from the `tableData` array.


    Finally, your configured cell is returned to the `tableView` with


    ```

    return cell

    ```


    ### Running the App


    At this stage, you have some data and a table view, and you have wired up the
    functions that feed the table view with the data. Run the application, and you’ll
    see your table resplendent with content, as in Figure [1-19](#A978-1-4842-1242-4_1_Chapter.html#Fig19).


    ![A978-1-4842-1242-4_1_Fig19_HTML.jpg](A978-1-4842-1242-4_1_Fig19_HTML.jpg)


    Figure 1-19. The table replete with content


    On that triumphant note, it’s time to make the table respond to some user input.


    ## Adding Some Interactivity


    You can legitimately feel quite pleased with yourself at this point. You have
    a table view that takes in data, displays it on the screen, and can scroll around
    (try scrolling the table if you haven’t already). You can also select cells by
    tapping them, and the table view will highlight the selected row.


    All of this functionality comes for free with an instance of `UITableView`, which
    saves you an awful lot of time getting a table view up and running. But eventually,
    you’re going to want it to do much more. This is where the `UITableViewDelegate`
    comes in.


    Whenever the table receives some kind of interaction (tapping on a row to select
    it, for example) it will ask its delegate to handle that for it. Think of the
    table view as “outsourcing” the details of how to respond to the delegate.


    `UITableViewDelegate` provides a host of functions that allow the table and the
    cells (among other things) to react to user input. These functions support selecting,
    editing, reordering, and deleting cells, in addition to configuring how the table
    view looks. For the moment, you’ll take a look at just one of those functions,
    which enables a row to react to being tapped by the user.'
