    In [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html) , “Improving the Look of Cells”,
    you will start to look at the process of going beyond standard cell types to customize
    the look and feel of your table views. This chapter covers some of the quickest
    ways to make the cells look the way you need them to.


    [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html) , “Creating Custom Cells With
    Subclasses”, covers the most powerful and flexible way of customizing every aspect
    of cells to use in table and collection views. With great power comes great responsibility
    – but it’s worth persevering so that your able to achieve complete mastery of
    the look, feel and behaviour of your apps.


    [Chapter 9](#A978-1-4842-1242-4_9_Chapter.html) , “Improving Interaction”, steps
    you though the process of embedding interactive controls in table and collection
    views; implementing pull-to-refresh; exploiting gesture recognizers, and implementing
    in-view search.


    [Chapter 10](#A978-1-4842-1242-4_10_Chapter.html) , “Using Tables for Navigation”,
    covers an almost-ubiquitous feature of the iOS user interface, and shows how tables
    can be used to navigate through a hierarchy of data in a simple and consistent
    way.


    The constrained size of the iOS user interface presents some challenges when it
    comes to presenting large amounts of data. [Chapter 11](#A978-1-4842-1242-4_11_Chapter.html)
    , “Indexing, Grouping, and Sorting”, presents some ways of arranging the data
    in tables, to help users find their way.


    [Chapter 12](#A978-1-4842-1242-4_12_Chapter.html) , “Selecting and Editing Content”,
    shows how you can use tables and collection views to manage data. It covers how
    to add, delete, and rearrange the information, and some of the interface aspects
    that this entails.


    [Chapter 13](#A978-1-4842-1242-4_13_Chapter.html) , “Static Tables”, is an introduction
    to an often-overlooked use of table views to present controls and information
    in a static way. These can often be used as a short-cut to simplifying otherwise
    complex layouts.


    [Chapter 14](#A978-1-4842-1242-4_14_Chapter.html) , “Tables in WatchKit”, looks
    at the challenges of table-based interfaces with Apple’s first venture into wearable
    technologies. The small form factor and low power of the Apple Watch presents
    some challenges, but effective use of tables can be the key to engaging user interactions.


    [Chapter 15](#A978-1-4842-1242-4_15_Chapter.html) , “Collection View Flow Layouts”,
    looks at one of the most useful components of the UICollectionView family, which
    allows you to very rapidly build sophisticated line-oriented layouts with a minimum
    of complex calculations.


    When a line-based layout isn’t sufficient to deliver the interface you need, collection
    views can be completely customized. [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html)
    , “Collection View Custom Layouts” looks at taking complete control over every
    aspect of the collection view’s look and feel.


    [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html) , “Animated And Interactive
    Collection Views”, takes them to the limits of what’s possible in interactive
    interfaces. Combining collection views with gesture recognizers and custom layouts
    allows you to create interfaces that are limited only by your imagination.


    ## The Style of This Book


    I’ve tried to bridge the gap between two styles of book—the in-depth treatment
    of every last little detail, and the cookbook of specific point solutions. Both
    have their place, but sometimes I find that descriptions of very detailed, elegant
    solutions with lots of features can obscure the detail of the problem I’m trying
    to solve. Equally, sometimes cookbook solutions are too specific and don’t easily
    lend themselves to adapting to my specific situation.


    In the code examples that follow, I’ve tried to balance the two styles. The visual
    polish and extraneous functions are kept to a minimum, which hopefully results
    in examples that illustrate how to build a solution while also acting as a building
    block for your own code.


    ## About the Second Edition


    Nothing in the technology world stays still for long, and Apple frameworks are
    no exception. The first edition published in 2012 predated the iPad, collection
    views, a complete overhaul of the iOS design language, and one of the most exciting
    developments in software development for a long time.


    With the introduction of Swift in 2014, Apple have taken all the very best parts
    of a myriad of programming languages and paradigms available, and combined them
    with their legendary frameworks and APIs to produce something that completely
    lives up to the superlatives used to describe it. The open-sourcing of Swift at
    the end of 2015 will make for some very interesting developments in the months
    and years to come.


    I’ve spent many happy years working with Objective-C, but with Swift things have
    taken a giant leap forward. This book uses Swift exclusively, as I suspect I and
    many other iOS developers will be doing for the foreseeable future.


    This book was written using Swift 2.0, WatchKit 2.0 and Xcode 7.1\. It’s as up-to-date
    and current as it’s possible to be when covering a dynamic and rapidly-changing
    world – when things change, updates and errata will be available from the Apress
    site and the book’s source code on GitHub.'
  trans: '

    # 本书涵盖内容


    第 1 章《表格视图快速入门》通过一些当前技术水平的示例介绍了表格视图。在展示了一些可能实现的效果之后，我们将从一个简单的基于表格视图的 iPhone 应用程序开始，这将向您介绍`UITableView`及其主要元素。该应用程序还将作为后续版本的基础，并作为一个可工作的原型，供您在自己的实验中使用。


    在第 2 章《表格的组成结构》中，您将了解表格视图各部分如何协同工作。您将看到`UITableViews`的主要类型及其结构。您将学习如何使用 Interface
    Builder 和代码创建它们，以及如何将`UITableViewController`类用作模板。


    第 3 章《集合视图快速入门》将焦点转移到`UICollectionView`，展示这种强大且无比灵活的控件所能实现的功能。与第 1 章类似，我们将从一个简单的示例开始，该示例可作为更高级主题的起点，并提供一个可工作的原型作为您实验的基础。


    第 4 章《集合视图的组成结构》探讨了集合视图各部分如何协同工作。您将看到它们与`UITableViews`相比有多相似——但更加灵活——以及其结构组件。您将学习如何使用
    Interface Builder 和代码创建它们，以及如何将`UICollectionViewController`类用作模板。


    第 5 章《向视图提供数据》介绍了表格和集合视图从何处获取数据以及如何将数据传入。它展示了这些视图如何跟踪分区和行，并涵盖了`UITableView`和`UICollectionView`类所利用的一些软件设计模式。


    第 6 章《表格单元格的组成结构》聚焦于构成表格的单元格。您将了解单元格的内部结构，以及它们是如何创建和重用的。此外，它还涵盖了`UITableView`类免费提供的标准单元格类型。


    在第 7 章《改善单元格外观》中，您将开始探索超越标准单元格类型、自定义表格视图外观和感受的过程。本章涵盖了一些让单元格呈现所需外观的最快捷方法。


    第 8 章《使用子类创建自定义单元格》介绍了在表格和集合视图中自定义单元格各个方面最强大、最灵活的方法。能力越大，责任越大——但值得坚持，以便能够完全掌控应用程序的外观、感受和行为。


    第 9 章《改进交互》将引导您完成在表格和集合视图中嵌入交互控件、实现下拉刷新、利用手势识别器以及实现视图内搜索的过程。


    第 10 章《使用表格进行导航》涵盖了 iOS 用户界面中几乎无处不在的一个功能，并展示了如何以简单一致的方式使用表格浏览分层数据。


    当需要呈现大量数据时，iOS 用户界面受限的尺寸会带来一些挑战。第 11 章《索引、分组和排序》提出了一些在表格中排列数据的方法，以帮助用户找到所需内容。


    第 12 章《选择和编辑内容》展示了如何使用表格和集合视图来管理数据。它涵盖了如何添加、删除和重新排列信息，以及由此带来的一些界面方面的问题。


    第 13 章《静态表格》介绍了表格视图一个常被忽视的用途——以静态方式呈现控件和信息。这些表格通常可作为简化复杂布局的捷径。


    第 14 章《WatchKit 中的表格》探讨了在苹果首次涉足可穿戴技术时，基于表格的界面所面临的挑战。Apple Watch 的小尺寸和低功耗带来了一些挑战，但有效利用表格可能是实现引人入胜的用户交互的关键。


    第 15 章《集合视图流式布局》介绍了`UICollectionView`家族中最有用的组件之一，它允许您以极少的复杂计算，非常快速地构建复杂的线型布局。


    当基于线的布局不足以实现您所需的界面时，可以完全自定义集合视图。第 16 章《集合视图自定义布局》探讨了如何完全掌控集合视图外观和感受的每个方面。


    第 17 章《动画与交互式集合视图》将集合视图推向了交互界面的可能极限。将集合视图与手势识别器和自定义布局相结合，您可以创建出仅受想象力限制的界面。


    # 本书风格


    我试图在两种书籍风格之间架起一座桥梁——一种是深入探讨每一个微小细节的风格，另一种是提供特定解决方案的“烹饪手册”风格。两者都各有用处，但有时我发现，那些描述非常详细、功能丰富且优雅的解决方案可能会掩盖我正在尝试解决的问题的细节。同样，有时“烹饪手册”式的解决方案又过于具体，不易适应我的特定情况。


    在随后的代码示例中，我尝试平衡这两种风格。视觉上的修饰和无关紧要的功能被控制在最低限度，这有望产生既演示如何构建解决方案，又能作为您自己代码构建块的示例。


    # 关于第二版


    技术世界没有任何东西会长期停滞不前，苹果的框架也不例外。第一版于 2012 年出版，那时 iPad、集合视图、iOS 设计语言的彻底革新以及软件发展领域长期来最激动人心的进展之一都尚未出现。


    随着 Swift 在 2014 年的推出，苹果吸纳了现有无数编程语言和范式中所有最精华的部分，并将其与传奇般的框架和 API 相结合，创造出了一种完全配得上用于描述它的所有赞誉之词的产品。Swift
    在 2015 年底的开源将在未来数月乃至数年内带来一些非常有趣的发展。


    我多年来一直愉快地使用 Objective-C 进行开发，但随着 Swift 的出现，我们已经实现了巨大的飞跃。本书专门使用 Swift，因为我猜想在可预见的未来，我和许多其他
    iOS 开发者都将这样做。


    本书撰写时使用的是 Swift 2.0、WatchKit 2.0 和 Xcode 7.1。在涵盖一个动态且快速变化的世界时，本书已尽可能做到最新和与时俱进——当情况发生变化时，更新和勘误表将从
    Apress 网站以及本书在 GitHub 上的源代码中获取。

    '
- fmt: '## The Book’s Source Code


    You can download the source code for each chapter’s examples from the Apress site
    (`www.apress.com/9781484212431`) or from GitHub at `https://github.com/timd/ProiOSTableCollectionViews`.


    Although that’s the quickest way to get up and running, I encourage you to take
    the extra time to key in the code yourself as you go along. With `Xcode`’s code
    completion, it doesn’t take that long, and code that has flowed through your eyes
    and brain, and then out to your fingers, is much more likely to sink in and make
    sense.


    ## Where to Find Out More


    Beyond the pages of this book, there’s a wealth of other information available
    online (not to mention the great range of other Apress titles):


    - For a general overview, Apple’s “Table View Programming Guide” and “Collection
    View Programming Guide” are detailed guides that cover most of the topics in this
    book. They are both available from the Apple Developer Portal, or in `Xcode`’s
    documentation.

    - Apple’s iOS Developer Library has full documentation for all Cocoa Touch libraries,
    as well as the Swift language. It tends not to include examples in the documentation
    itself, but the Library is the one-stop shop for a detailed reference for each
    class, protocol, library and language.

    - Online forums are a fantastic resource. Sites such as Stack Overflow (`www.stackoverflow.com`)
    are the place to go for practical advice. Chances are, a number of people will
    have met and overcome the same problem that you’re experiencing, and the answer
    will be there. Stack Overflow’s customs and practices can be a little daunting
    at first, but it’s worth persevering. There are no stupid questions, after all,
    just questions that haven’t been answered yet.

    - A general Google search will often throw up answers from blogs. There are some
    extremely talented individuals out there who regularly post about how to do this
    or that with iOS and Objective-C, and many of them also point to source code on
    their sites or GitHub and the like.

    - Apple also provides some fairly detailed source code examples. Your mileage
    may vary with these. I sometimes find that they can be a bit overcomplicated and
    can obscure the core technique that I’m trying to grasp. But they shouldn’t be
    overlooked, if only because they’ve been written by engineers with an intimate
    understanding of the frameworks.

    - Universities such as Stanford and MIT place entire semesters’ worth of lecture
    modules online, both on their sites and on iTunes U. Their technical education
    is some of the best on the planet, and some of the online lectures are taught
    by current and former Apple engineers. These are definitely worth checking out.

    - Local user groups meet regularly around the world. It’s an iron law of software
    that there’s always someone who knows more than you do about a topic, and problems
    are always less daunting when discussed with them over a beverage or two.

    - Mailing lists have had a renaissance in the last couple of years. Some excellent
    examples (which often cover not just coding topics, but design and business issues
    as well) are `http://iosdevweekly.com`, `http://natashatherobot.com` and `http://ios-goodies.com`


    Finally, if you’ve battled with—and resolved—some gnarly issue, then post about
    it yourself, whether that’s on your own blog or a site like Stack Overflow. Even
    if the topic has been covered numerous times before, there’s always room for another
    take on a problem. Your unique point of view could be just what someone else needs.


    ### Contacting the Author


    Tim Duckett can be found online at `http://adoptioncurve.net` and on places like
    Twitter and GitHub as `@timd`.


    ## Acknowledgments


    It’s my name on the cover, but there’s a whole host of people without whom this
    book would never have happened.


    At Apress, Mark Powers and Michelle Lowman kept me on track from one end of the
    project plan to the other, and were very gracious about my procrastination and
    constant content changes. Mary Behr hunted down all the rogue ‘u’s that I tried
    to hide in the word “colour”. Tiago and Michael were both kind and constructive
    as the technical reviewers, and if they laughed at my mistakes, they didn’t tell
    me.


    There is a group of fantastic current and former colleagues – Martin, Marco, Eduardo,
    Eli, Johannes and many more - in various locations around Europe who have been
    sources of inspiration, support, and fanfarres of squirrels during projects both
    successful and not-so-successful.


    Tom Armitage is responsible for taking the only decent picture of me in existence.


    Finally, none of this would have happened without the unconditional love and support
    of my family, who put up with me writing this book while we embarked on a rollercoaster
    of moving between four houses in three different countries in the space of two
    years. I don’t tell them this nearly often enough, but - I’m very lucky to have
    them.'
