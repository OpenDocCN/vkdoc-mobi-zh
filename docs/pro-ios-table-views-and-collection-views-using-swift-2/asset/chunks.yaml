- fmt: "# Generating Some Data\n\nBefore you start with the table view itself, you\
    \ need to create some data to feed it. Because this is a simple table example,\
    \ the data is going to be simple too. You’ll create an array of strings that contains\
    \ some information to go into each cell.\n\nThe data array will need to be ready\
    \ by the time the data source is called by the table view, so where to create\
    \ it? There are several options, but one obvious place is in the view controller’s\
    \ `viewDidLoad` function. It’s safe to create it here.\n\nYou’re also going to\
    \ need a way of passing the array of data around the application. This process\
    \ requires a property that can be accessed by the various functions that will\
    \ need access to the data.\n\nLet’s get started. Open the `ViewController.swift`\
    \ file shown in Figure [1-7](#A978-1-4842-1242-4_1_Chapter.html#Fig7) and begin\
    \ by creating the property.\n\n![A978-1-4842-1242-4_1_Fig7_HTML.jpg](A978-1-4842-1242-4_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7. Editing the `ViewController.swift` file\n\n> **Note**: To save space\
    \ from now on, I’m not going to show the full Xcode interface—just the code that\
    \ you need to enter.\n\nAdd in a declaration for the property so that the code\
    \ looks like Listings [1-1](#A978-1-4842-1242-4_1_Chapter.html#FPar3).\n\n**Listing\
    \ 1-1.** Declaring the Property\n\n```\nimport UIKit\n\nclass ViewController:\
    \ UIViewController {\n\n    var tableData  = [String]()\n\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n\n    override func didReceiveMemoryWarning()\
    \ {\n        super.didReceiveMemoryWarning()\n        // Dispose of any resources\
    \ that can be recreated.\n    }\n\n}\n```\n\n> **Note**: To save space, in future\
    \ listings I’ll only show the added or amended code with enough additional lines\
    \ to establish the context.\n\nNow you’re going to create the actual data array\
    \ itself. Your data array will be a simple array of ten strings. You’re going\
    \ to add this in the `viewDidLoad` function, as this function is executed as part\
    \ of `UIViewController`’s lifecycle before the view is visible on-screen. Setting\
    \ up the data here will give the table the data it needs to draw itself before\
    \ it becomes visible. Add the code shown in Listings [1-2](#A978-1-4842-1242-4_1_Chapter.html#FPar5).\n\
    \n**Listing 1-2.** Creating the Data Array\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n\n    for count in 0...10 {\n        // The cell\
    \ will contain the string \"Item X\"\n        tableData.append(\"Item \\(count)\"\
    )\n    }\n\n    // Print out the contents of the data array into the log\n   \
    \ print(\"The tableData array contains \\(tableData)\")\n}\n```\n\nLet’s run the\
    \ application to see that data array being created. The user interface isn’t doing\
    \ much yet, but you’ll be able to see the data that you’re going to feed to the\
    \ table.\n\nRun the application in the Simulator by pressing Command+R or by choosing\
    \ Product ➤ Run, and then take a look at the logger output:\n\n```\nThe tableData\
    \ array contains [\"Item 0\", \"Item 1\", \"Item 2\", \"Item 3\", \"Item 4\",\
    \ \"Item 5\", \"Item 6\", \"Item 7\", \"Item 8\", \"Item 9\", \"Item 10\"]\n```\n\
    \n# Creating the Table View\n\nAs it stands, the user interface for your application\
    \ is a bit dull. You haven’t added the table yet! This needs fixing.\n\nClick\
    \ the `Main.storyboard` file in the project explorer, and you’ll see the Storyboard\
    \ open in the Interface Builder pane, as shown in Figure [1-8](#A978-1-4842-1242-4_1_Chapter.html#Fig8).\n\
    \n![A978-1-4842-1242-4_1_Fig8_HTML.jpg](A978-1-4842-1242-4_1_Fig8_HTML.jpg)\n\n\
    Figure 1-8. Editing the Storyboard file in Interface Builder\n\nIn the Objects\
    \ browser at the bottom right, find the `TableView` item and drag it out onto\
    \ the view in the center; this will act as the container for the table view. The\
    \ scene’s Document Outline will now look like Figure [1-9](#A978-1-4842-1242-4_1_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1242-4_1_Fig9_HTML.jpg](A978-1-4842-1242-4_1_Fig9_HTML.jpg)\n\n\
    Figure 1-9. The scene’s Document Outline after adding the `UITableView`\n\nTo\
    \ make the table display properly in any view size (and if the device is rotated)\
    \ you need to add some AutoLayout constraints.\n\nHighlight the table view if\
    \ it’s not already selected, and add the constraints by clicking the Pin icon\
    \ at the bottom of the Storyboard, then updating the values, as shown in Figure\
    \ [1-10](#A978-1-4842-1242-4_1_Chapter.html#Fig10).\n\n![A978-1-4842-1242-4_1_Fig10_HTML.jpg](A978-1-4842-1242-4_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10. Adding the table view’s AutoLayout constraints\n\nBelieve it or\
    \ not, that’s all you need to do in order to implement the most basic table view.\
    \ It won’t display any data yet because you haven’t implemented the `UITableViewDataSource`\
    \ protocol functions, and it certainly won’t have any interactivity—but the app\
    \ will run.\n\nTo prove this, run it again (Command + R), and marvel at your awesome\
    \ application in the Simulator, as shown in Figure [1-11](#A978-1-4842-1242-4_1_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1242-4_1_Fig11_HTML.jpg](A978-1-4842-1242-4_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11. A functional, albeit not very impressive, table view application\n\
    \nWhat’s more, you can even rotate the Simulator and the table view will resize\
    \ itself (shown in Figure [1-12](#A978-1-4842-1242-4_1_Chapter.html#Fig12)).\n\
    \n![A978-1-4842-1242-4_1_Fig12_HTML.jpg](A978-1-4842-1242-4_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12. The table view rotated\n\nOkay—maybe this isn’t all that impressive.\
    \ Let’s complete the wiring up of the table view so that it actually does something.\n\
    \n# Conforming to the Table View Protocols\n\nThe table view that you’ve just\
    \ created needs both a data source and a delegate; the data source will provide\
    \ the table with the information it needs to configure itself plus the cells to\
    \ display, while the delegate will handle interactions like cell selection.\n\n\
    You need to conform your `ViewController` class to both the `UITableViewDataSource`\
    \ and `UITableViewDelegate` protocols.\n\n> **Note**: Data sources and delegates\
    \ are covered in detail in [Chapters 3](#A978-1-4842-1242-4_3_Chapter.html), [4](#A978-1-4842-1242-4_4_Chapter.html),\
    \ and [5](#A978-1-4842-1242-4_5_Chapter.html).\n\nIn the class, update the class\
    \ declaration so it looks like Listing [1-3](#A978-1-4842-1242-4_1_Chapter.html#FPar7).\n\
    \n**Listing 1-3.** Conforming the Swift Class to the `UITableDelegate` and `UITableDataSource`\
    \ Protocols\n\n```\nclass ViewController: UIViewController, UITableViewDataSource,\
    \ UITableViewDelegate {\n```\n\nThis will tell the compiler to expect the required\
    \ functions to have been implemented. Immediately you’ll see Xcode display a warning\
    \ that the `ViewController` doesn’t yet conform to the protocol (shown in Figure\
    \ [1-14](#A978-1-4842-1242-4_1_Chapter.html#Fig14)).\n\n![A978-1-4842-1242-4_1_Fig14_HTML.jpg](A978-1-4842-1242-4_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14. The Table View property HUD\n\n![A978-1-4842-1242-4_1_Fig13_HTML.jpg](A978-1-4842-1242-4_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13. The Xcode error\n\nYou’ll fix this in a moment, but first, let’s\
    \ wire up the table to the `ViewController` class."
