    `func tableView(tableView: UITableView, moveRowAtIndexPath sourceIndexPath: ➤`


      `NSIndexPath, toIndexPath destinationIndexPath: NSIndexPath) {`


        `tableData.insert(tableData[sourceIndexPath.row], atIndex: ➤`


        `destinationIndexPath.row)`


        `tableData.removeAtIndex(sourceIndexPath.row + 1)`


    `}`


    This function first grabs the object from the donor row and inserts it at the
    destination. If you just left things there, you’d end up with two copies of the
    original object.


    The `insert:atIndex:` function inserts a new index at the specified index, moves
    the other objects beyond the insertion down by one, and inserts a copy of the
    object from the source `indexPath`.


    ### Enabling Batch Insertion and Deletion


    In most user-controlled situations, rows will be affected one by one. You can,
    however, combine a number of insertion or deletion commands by wrapping them into
    a block:


    `tableView.beginUpdates()`


    `// do lots of`


    `// insertions and deletions here`


    `tableView.endUpdates()`


    This takes care of a lot of heavy lifting for you. The manipulation of the `tableView`
    and the data model will take place in the sequence you specify, but you don’t
    need to worry about tracking the changes as you go along.


    This is quite subtle and quite powerful. If you delete row 1 of the table, then
    what was row 2 will move up to become row 1\. So now you have to refer to row
    1 to affect what was previously row 2, and so on. The update block handles this
    for you. If you delete row 1 and then delete row 2 within the block, row 2 will
    refer to the original row 2.


    You mustn’t call any functions that will update the `tableView` within an update
    block (`reloadData` and so on). If you do, you have to handle the animations yourself.


    ### Batch Insertion and Deletion of Sections


    As well as batch insertion of rows, it’s also possible to insert or delete entire
    sections. The animations are handled for you.


    Inserting sections is performed with the `insertSections:withRowAnimation:` function.
    You pass an `NSIndexSet` containing the sections to insert, and the table view
    will call its `dataSource` to obtain the necessary data before inserting the section.


    If there’s already a section in the position you’re attempting to insert at, the
    existing section will be moved down automatically.


    The `rowAnimation` parameter allows you to control the type of animation that’s
    used to insert the new section.


    Deleting sections uses the `deleteSections:withRowAnimation:` function. Again,
    you need to provide an `NSIndexSet` of the sections to remove, and a `rowAnimation`
    parameter to control the animation. The table view will then handle removing the
    section and closing up the gap.


    You need to be careful when constructing the `NSIndexSet` – if you attempt to
    insert or remove a section that doesn’t exist in the underlying data model, you’ll
    get a runtime crash.


    ## Selection in UICollectionViews


    One way of thinking of a UICollectionView is as a two-dimensionalUITableView–that
    is, a control that manages cells but can scroll in x and y coordinates, rather
    than the up-down direction of UITableView.


    With that mental model in mind, it shouldn’t come as a surprise to learn that
    selection in UICollectionViews is managed in very similar ways to selection in
    UITableViews.


    The main difference is that because collection views can be implemented in radically
    different ways to table views, they come with fewer built-in features such as
    in-cell controls. If you want to add edit, delete, or rearrangement controls into
    cells, you need to handle this yourself.'
  trans: "\n### 移动行\n\n当表格处于编辑模式且行被标记为可移动时，单元格右端会出现重新排序控件，如图 12-19 所示。\n\n![A978-1-4842-1242-4_12_Fig19_HTML.jpg](img/A978-1-4842-1242-4_12_Fig19_HTML.jpg)\n\
    \n图 12-19. 编辑模式下的表格（已重新排列）\n\n触摸重新排序控件将导致该行从表格处移出并变为可拖拽状态。当该行经过其他行时，`tableView`\
    \ 会以动画方式移动其他行以腾出空间。\n\n#### 该行能否被移动到这里？\n\n除了控制行是否可以整体移动外，`UITableView` 的委托还能控制某一行是否可以移动到特定位置。\n\
    \n当被拖动的行经过表格中的静态行时，`tableView` 会调用 `tableView:targetIndexPathForMoveFromRowAtIndexPath:toProposedIndexPath:`\
    \ 函数。（这个函数可能就是导致 iOS 批评者抱怨函数名冗长的原因。）\n\n该函数接收三个参数：对 `tableView` 本身的引用、被移动行的原始\
    \ `indexPath`，以及刚刚被移动经过的 `indexPath`。`tableView` 此时还不知道用户是否会释放重新排序控件并将该单元格“放下”，因此当被拖动的行在表格中上下移动经过\
    \ `indexPath` 位置时，此函数会被重复调用。\n\n如果该行可以移动到此位置，函数只需返回 `proposedDestinationIndexPath`\
    \ 来确认此次移动是被允许的。\n\n你可以使用此函数来补充“冻结”表格底部“添加新行”行的功能。除了不希望移动“添加新行”这一行外，你还想阻止用户将另一行移动到表格最底部。图\
    \ 12-20 显示了你要避免的情况。\n\n![A978-1-4842-1242-4_12_Fig20_HTML.jpg](img/A978-1-4842-1242-4_12_Fig20_HTML.jpg)\n\
    \n图 12-20. 不允许！\n\n你可以通过检查提议的 `indexPath` 是否为表格末尾来实现此功能。如果是，你可以通过返回 `sourceIndexPath`\
    \ 将该行“送回”到其原始位置。如果不是，则可以通过返回 `proposedDestinationIndexPath` 允许移动。清单 12-24 展示了实际应用。\n\
    \n**清单 12-24.** 防止移动到表格末尾\n\n```\nfunc tableView(tableView: UITableView, targetIndexPathForMoveFromRowAtIndexPath\n\
    sourceIndexPath: NSIndexPath, toProposedIndexPath proposedDestinationIndexPath:\n\
    NSIndexPath) -> NSIndexPath {\n    if proposedDestinationIndexPath.row == tableData.count\
    \ {\n        return sourceIndexPath\n    }\n    return proposedDestinationIndexPath\n\
    }\n```\n\n#### 更新数据模型\n\n完成行的重排后，用户将通过点击导航栏上的`完成`按钮或你实现的任何自定义控件，将表格退出编辑模式。\n\n\
    在此阶段，务必记住所有更改都只发生在视图层面。底层数据模型并未随这些更改而更新。除非你显式更新数据模型，否则这些更改将不会持久保存。\n\n这可能会以几种方式表现出来。下次重新加载表格时，行将恢复到其原始顺序。更糟的是，如果你的表格行数超过了一次性可以显示的数量，当表格滚动时，你将会看到一些极其奇怪的排序效果。\n\
    \n如果委托允许了移动，`tableView` 会调用其委托的 `tableView:moveRowAtIndexPath:toIndexPath:` 函数。该函数接收三个参数：对\
    \ `tableView` 本身的引用；源行的 `indexPath`，以及目标行的 `indexPath`。\n\n如何重新排列数据模型显然取决于你的模型是如何实现的。在这个简单的示例中，你可以利用\
    \ `Array` 的 `insert:atIndex:` 和 `removeAtIndex:` 函数，如清单 12-25 所示。\n\n**清单 12-25.** 使用重新排列的对象更新数据模型\n\
    \n```\nfunc tableView(tableView: UITableView, moveRowAtIndexPath sourceIndexPath:\n\
    \  NSIndexPath, toIndexPath destinationIndexPath: NSIndexPath) {\n    tableData.insert(tableData[sourceIndexPath.row],\
    \ atIndex:\n    destinationIndexPath.row)\n    tableData.removeAtIndex(sourceIndexPath.row\
    \ + 1)\n}\n```\n\n此函数首先从源行获取对象，并将其插入到目标行。如果仅止于此，你最终会得到原始对象的两个副本。\n\n`insert:atIndex:`\
    \ 函数在指定索引处插入一个新索引，将其余对象向下移动一位，并从源 `indexPath` 处插入该对象的一个副本。\n\n### 启用批量插入和删除\n\n\
    在大多数用户控制的情况下，行将逐一受到影响。但是，你可以通过将多个插入或删除命令包装到一个块中来组合它们：\n\n```\ntableView.beginUpdates()\n\
    // 在这里进行大量的\n// 插入和删除操作\ntableView.endUpdates()\n```\n\n这会为你处理大量繁重的工作。对 `tableView`\
    \ 和数据模型的操作将按照你指定的顺序进行，但你无需担心在操作过程中跟踪更改。\n\n这非常精妙且强大。如果你删除表格的第 1 行，那么原来的第 2 行将上移成为第\
    \ 1 行。因此你现在必须引用第 1 行才能影响原来的第 2 行，依此类推。更新块会为你处理这个问题。如果你在块内先删除第 1 行然后删除第 2 行，那么第\
    \ 2 行将引用原始的的第 2 行。\n\n你绝不能在一个更新块内调用任何会更新 `tableView` 的函数（如 `reloadData` 等）。如果你这样做了，你将不得不自己处理动画。\n\
    \n### 批量插入和删除分区\n\n除了批量插入行之外，也可以插入或删除整个分区。动画会由系统为你处理。\n\n插入分区使用 `insertSections:withRowAnimation:`\
    \ 函数。你需要传递一个包含要插入分区的 `NSIndexSet`，表格视图会在插入分区之前调用其 `dataSource` 以获取所需数据。\n\n如果在你尝试插入的位置已存在一个分区，则现有分区会自动下移。\n\
    \n`rowAnimation` 参数允许你控制用于插入新分区的动画类型。\n\n删除分区使用 `deleteSections:withRowAnimation:`\
    \ 函数。同样，你需要提供一个 `NSIndexSet` 来指定要移除的分区，以及一个 `rowAnimation` 参数来控制动画。然后表格视图会处理移除分区并闭合间隙。\n\
    \n在构造 `NSIndexSet` 时需要小心——如果你尝试插入或移除一个底层数据模型中不存在的分区，将会导致运行时崩溃。\n\n## 在 UICollectionViews\
    \ 中选择\n\n`UICollectionView` 的一种理解方式是将其视为二维的 `UITableView`——即，一个管理单元格但可以在 x 和 y\
    \ 坐标方向上滚动（而非 `UITableView` 的上下方向）的控件。\n\n有了这个概念模型，了解到 `UICollectionView` 中选中项的管理方式与\
    \ `UITableView` 非常相似就不会令人感到惊讶了。\n\n主要区别在于，由于集合视图的实现方式可能与表格视图根本不同，它们内置的特性（如单元格内控件）较少。如果要在单元格中添加编辑、删除或重新排列控件，你需要自己处理。"
- fmt: "### Cut, Copy, and Paste with Collection Views\n\nHaving said that collection\
    \ views provide less out of the box, there are some neat features that they provide.\
    \ Support for displaying menus in response to long-presses in cells is one.\n\n\
    A common requirement is support for cut, copy, and paste options for content that\
    \ is displayed inside a collection view cell. The good news is that this is very\
    \ simple to implement.\n\nFigure [12-21](#A978-1-4842-1242-4_12_Chapter.html#Fig21)\
    \ shows the effect of implementing cut/copy/paste, in response to a long press\
    \ on cell 20.\n\n![A978-1-4842-1242-4_12_Fig21_HTML.jpg](A978-1-4842-1242-4_12_Fig21_HTML.jpg)\n\
    \nFigure 12-21. Implementing cut/copy/paste\n\nYou need to implement three `UICollectionViewDelegate`\
    \ functions:\n\n- `collectionView(shouldShowMenuForItemAtIndexPath:) -> Bool`\n\
    - `collectionView(canPerformAction:forItemAtIndexPath:withSender:) -> Bool`\n\
    - `collectionView(performAction:forItemAtIndexPath:withSender:)`\n\nThe first\
    \ function controls whether a menu should be displayed at all for the selected\
    \ item; return `true` if it should, or `false` if not (Listing [12-26](#A978-1-4842-1242-4_12_Chapter.html#FPar32)).\n\
    \nListing 12-26. The `shouldShowMenuForItemAtIndexPath:` Function\n\n```\noverride\
    \ func collectionView(collectionView: UICollectionView,\n    shouldShowMenuForItemAtIndexPath\
    \ indexPath: NSIndexPath) -> Bool {\n    return true\n}\n```\n\nThe second controls\
    \ whether a specific action can be performed for that item. This is where you\
    \ could disable the cut function, for example, with the code in Listing [12-27](#A978-1-4842-1242-4_12_Chapter.html#FPar33).\n\
    \nListing 12-27. Disabling the Cut Function\n\n```\noverride func collectionView(collectionView:\
    \ UICollectionView, canPerformAction\n    action: Selector, forItemAtIndexPath\
    \ indexPath: NSIndexPath, withSender\n    sender: AnyObject?) -> Bool {\n    if\
    \ action.description == \"cut:\" {\n        return false\n    }\n    return true\n\
    }\n```\n\nThere are a range of actions that you can respond to. If you check the\
    \ `description` property of the `action` when it’s passed into the function, you\
    \ can see the full list.\n\nFigure [12-22](#A978-1-4842-1242-4_12_Chapter.html#Fig22)\
    \ shows the effect of the code in Listing [12-27](#A978-1-4842-1242-4_12_Chapter.html#FPar33).\n\
    \n![A978-1-4842-1242-4_12_Fig22_HTML.jpg](A978-1-4842-1242-4_12_Fig22_HTML.jpg)\n\
    \nFigure 12-22. Disabling cut\n\nThe final function is where you implement the\
    \ action that you want to enable (Listing [12-28](#A978-1-4842-1242-4_12_Chapter.html#FPar34)).\n\
    \nListing 12-28. Implementing the Action\n\n```\noverride func collectionView(collectionView:\
    \ UICollectionView, performAction\n    action: Selector, forItemAtIndexPath indexPath:\
    \ NSIndexPath, withSender\n    sender: AnyObject?) {\n    //\n    switch action.description\
    \ {\n    case \"copy:\" :\n        // Implement copy functionality\n    case \"\
    paste:\" :\n        // Implement copy functionality\n    }\n}\n```\n\n### Implementing\
    \ Custom Menus in a Collection View\n\nAlthough cut, copy, and paste are useful,\
    \ you’re not restricted to these. You can add custom items to the menu that is\
    \ displayed in response to a long-press in the cell to implement your own functionality.\n\
    \nLong-pressing on the cell will display your custom menu, which will then call\
    \ a function in the cell. If you need to manipulate the data model by, for example,\
    \ deleting a cell, then you need to get the cell to call back to the collection\
    \ view’s controller. It can look something like Figure [12-23](#A978-1-4842-1242-4_12_Chapter.html#Fig23).\n\
    \n![A978-1-4842-1242-4_12_Fig23_HTML.jpg](A978-1-4842-1242-4_12_Fig23_HTML.jpg)\n\
    \nFigure 12-23. The custom menu item\n\nThe process has several steps:\n\n- Define\
    \ a menu delegate protocol, and declare a function to handle your custom action.\n\
    - Implement this custom function in your view controller, so that it conforms\
    \ to the menu delegate protocol.\n- Create a custom subclass of `UICollectionViewCell`\
    \ and add a delegate property for an object that conforms to the menu delegate\
    \ protocol.\n- In the cell subclass, implement a function to call the delegate.\
    \ The cell will handle the initial menu press, and then call through to its delegate\
    \ to perform any action that’s required on the data model.\n- Create a menu item\
    \ for the new action, and assign it to the shared menu controller.\n- When dequeuing\
    \ the cell, set the collection view controller as the cell delegate.\n- Optionally,\
    \ update the `UICollectionViewDelegate` functions to restrict the menu items that\
    \ are displayed in the pop-over.\n\n#### Defining the Custom Protocol\n\nThe protocol\
    \ can be defined in the collection view’s view controller. Add the declaration\
    \ at the top of the file (Listing [12-29](#A978-1-4842-1242-4_12_Chapter.html#FPar35)).\n\
    \nListing 12-29. Declaring the Custom Menu Protocol\n\n```\nprotocol CustomMenuDelegate\
    \ {\n    func performDestroy(sender: AnyObject, forCell:SelectionCell)\n}\n```\n\
    \n#### Implementing the Custom Protocol\n\nNow you can implement the function\
    \ so that the view controller conforms to the protocol. Add this as an extension\
    \ to the view controller, as shown in Listing [12-30](#A978-1-4842-1242-4_12_Chapter.html#FPar36).\n\
    \nListing 12-30. The Protocol Extension\n\n```\nextension SelectionController\
    \ : CustomMenuDelegate {\n    func performDestroy(sender: AnyObject, forCell:\
    \ SelectionCell) {\n        print(\"Custom action for sender: \\(sender) with\
    \ cell \\(forCell)\")\n    }\n}\n```\n\n#### Updating the Collection View Cell\
    \ Subclass\n\nIf you don’t already have a custom `UICollectionViewCell` subclass,\
    \ you need to implement one. If you have one, you need to update it so that it\
    \ has a delegate property and a function to implement the action that’s called\
    \ from the custom menu. An example is shown in Listing [12-31](#A978-1-4842-1242-4_12_Chapter.html#FPar37).\n\
    \nListing 12-31. An Example Custom `UICollectionViewCell`\n\n```\nimport UIKit\n\
    \nclass SelectionCell: UICollectionViewCell {\n    var delegate: CustomMenuDelegate?\n\
    \n    func performDestroy(sender: AnyObject) {\n        if let delegate = delegate\
    \ {\n            delegate.performDestroy(sender, forCell: self)\n        }\n \
    \   }\n}\n```\n\n#### Creating the Custom Menu Item\n\nNow you can create the\
    \ custom menu item. In the view controller, add the following code to the `viewDidLoad`\
    \ function:\n\n```\nlet menuItem = UIMenuItem(title: \"Destroy!\", action: \"\
    performDestroy:\")\nUIMenuController.sharedMenuController().menuItems = [menuItem]\n\
    ```\n\nThis creates a new menu item titled `Destroy!` that will call the `performDestroy:`\
    \ function when it’s tapped. The function will be called on the cell, because\
    \ that’s the object that the menu will be attached to.\n\nIt’s then added to the\
    \ `sharedMenuController` so that it can be added to the cell in response to a\
    \ long press.\n\n#### Linking the Cell to Its Delegate\n\nNow you need to update\
    \ the `cellForItemAtIndexPath:` function so that the cell’s delegate is set as\
    \ it’s dequeued. Add the following line to the `cellForItemAtIndexPath:` function,\
    \ after the cell is dequeued but before it’s returned:\n\n```\ncell.delegate =\
    \ self\n```"
  raw: '### Cut, Copy, and Paste with Collection Views


    Having said that collection views provide less out of the box, there are some
    neat features that they provide. Support for displaying menus in response to long-presses
    in cells is one.


    A common requirement is support for cut, copy, and paste options for content that
    is displayed inside a collection view cell. The good news is that this is very
    simple to implement.


    Figure [12-21](#A978-1-4842-1242-4_12_Chapter.html#Fig21) shows the effect of
    implementing cut/copy/paste, in response to a long press on cell 20.


    ![A978-1-4842-1242-4_12_Fig21_HTML.jpg](A978-1-4842-1242-4_12_Fig21_HTML.jpg)


    Figure 12-21.


    Implementing cut/copy/paste


    You need to implement three `UICollectionViewDelegate` functions:


    *   `collectionView(shouldShowMenuForItemAtIndexPath:` `) -> Bool`

    *   `collectionView(canPerformAction:forItemAtIndexPath:➤ withSender: -> Bool`

    *   `collectionView(performAction:forItemAtIndexPath:withSender:)`


    The first function controls whether a menu should be displayed at all for the
    selected item; return `true` if it should, or `false` if not (Listing [12-26](#A978-1-4842-1242-4_12_Chapter.html#FPar32)).


    Listing 12-26. The shouldShowMenuForItemAtIndexPath: Function


    `override func collectionView(collectionView: UICollectionView, ➤`


    `shouldShowMenuForItemAtIndexPath indexPath: NSIndexPath) -> Bool {`


        `return true`


    `}`


    The second controls whether a specific action can be performed for that item.
    This is where you could disable the cut function, for example, with the code in
    Listing [12-27](#A978-1-4842-1242-4_12_Chapter.html#FPar33).


    Listing 12-27. Disabling the Cut Function


    `override func collectionView(collectionView: UICollectionView, canPerformAction➤`


    `action: Selector, forItemAtIndexPath indexPath: NSIndexPath, withSender➤`


    `sender: AnyObject?) -> Bool {`


        `if action.description == "cut:" {`


            `return false`


        `}`


        `return true`


    `}`


    There are a range of actions that you can respond to. If you check the `description`
    property of the `action` when it’s passed into the function, you can see the full
    list.


    Figure [12-22](#A978-1-4842-1242-4_12_Chapter.html#Fig22) shows the effect of
    the code in Listing [12-27](#A978-1-4842-1242-4_12_Chapter.html#FPar33).


    ![A978-1-4842-1242-4_12_Fig22_HTML.jpg](A978-1-4842-1242-4_12_Fig22_HTML.jpg)


    Figure 12-22.


    Disabling cut


    The final function is where you implement the action that you want to enable (Listing
    [12-28](#A978-1-4842-1242-4_12_Chapter.html#FPar34)).


    Listing 12-28. Implementing the Action


    `override func collectionView(collectionView: UICollectionView, performAction➤`


    `action: Selector, forItemAtIndexPath indexPath: NSIndexPath, withSender➤`


    `sender: AnyObject?) {`


        `//`


        `switch action.description {`


        `case "copy:" :`


            `// Implement copy functionality`


        `case "paste:" :`


            `// Implement copy functionality`


        `}`


    `}`


    ### Implementing Custom Menus in a Collection View


    Although cut, copy, and paste are useful, you’re not restricted to these. You
    can add custom items to the menu that is displayed in response to a long-press
    in the cell to implement your own functionality.


    Long-pressing on the cell will display your custom menu, which will then call
    a function in the cell. If you need to manipulate the data model by, for example,
    deleting a cell, then you need to get the cell to call back to the collection
    view’s controller. It can look something like Figure [12-23](#A978-1-4842-1242-4_12_Chapter.html#Fig23).


    ![A978-1-4842-1242-4_12_Fig23_HTML.jpg](A978-1-4842-1242-4_12_Fig23_HTML.jpg)


    Figure 12-23.


    The custom menu item


    The process has several steps:


    *   Define a menu delegate protocol, and declare a function to handle your custom
    action.

    *   Implement this custom function in your view controller, so that it conforms
    to the menu delegate protocol.

    *   Create a custom subclass of `UICollectionViewCell` and add a delegate property
    for an object that conforms to the menu delegate protocol.

    *   In the cell subclass, implement a function to call the delegate. The cell
    will handle the initial menu press, and then call through to its delegate to perform
    any action that’s required on the data model.

    *   Create a menu item for the new action, and assign it to the shared menu controller.

    *   When dequeuing the cell, set the collection view controller as the cell delegate.

    *   Optionally, update the `UICollectionViewDelegate` functions to restrict the
    menu items that are displayed in the pop-over.


    #### Defining the Custom Protocol


    The protocol can be defined in the collection view’s view controller. Add the
    declaration at the top of the file (Listing [12-29](#A978-1-4842-1242-4_12_Chapter.html#FPar35)).


    Listing 12-29. Declaring the Custom Menu Protocol


    `protocol CustomMenuDelegate {`


        `func performDestroy(sender: AnyObject, forCell:SelectionCell)`


    `}`


    #### Implementing the Custom Protocol


    Now you can implement the function so that the view controller conforms to the
    protocol. Add this as an extension to the view controller, as shown in Listing
    [12-30](#A978-1-4842-1242-4_12_Chapter.html#FPar36).


    Listing 12-30. The Protocol Extension


    `extension SelectionController : CustomMenuDelegate {`


        `func performDestroy(sender: AnyObject, forCell: SelectionCell) {`


            `print("Custom action for sender: \(sender) with cell \(forCell)")`


        `}`


    `}`


    #### Updating the Collection View Cell Subclass


    If you don’t already have a custom UICollectionViewCell subclass, you need to
    implement one. If you have one, you need to update it so that it has a delegate
    property and a function to implement the action that’s called from the custom
    menu. An example is shown in Listing [12-31](#A978-1-4842-1242-4_12_Chapter.html#FPar37).


    Listing 12-31. An Example Custom UICollectionViewCell


    `import UIKit`


    `class SelectionCell: UICollectionViewCell {`


        `var delegate: CustomMenuDelegate?`


        `func performDestroy(sender: AnyObject) {`


            `if let delegate = delegate {`


                `delegate.performDestroy(sender, forCell: self)`


            `}`


        `}`


    `}`


    #### Creating the Custom Menu Item


    Now you can create the custom menu item. In the view controller, add the following
    code to the `viewDidLoad` function:


    `let menuItem = UIMenuItem(title: "Destroy!", action: "performDestroy:")`


    `UIMenuController.sharedMenuController().menuItems = [menuItem]`


    This creates a new menu item titled `Destroy!` that will call the `performDestroy:`
    function when it’s tapped. The function will be called on the cell, because that’s
    the object that the menu will be attached to.


    It’s then added to the `sharedMenuController` so that it can be added to the cell
    in response to a long press.


    #### Linking the Cell to Its Delegate


    Now you need to update the `cellForItemAtIndexPath:` function so that the cell’s
    delegate is set as it’s dequeued. Add the following line to the `cellForItemAtIndexPath:`
    function, after the cell is dequeued but before it’s returned:


    `cell.delegate = self`'
  trans: "\n### 集合视图中的剪切、复制与粘贴\n\n尽管集合视图提供的开箱即用功能较少，但它确实具备一些便捷特性。其中之一就是支持通过长按单元格显示菜单。\n\
    \n常见需求是为集合视图单元格中显示的内容提供剪切、复制和粘贴选项。好消息是实现起来非常简单。\n\n图 12-21 展示了针对第 20 个单元格长按后实现剪切/复制/粘贴的效果。\n\
    \n![A978-1-4842-1242-4_12_Fig21_HTML.jpg](img/A978-1-4842-1242-4_12_Fig21_HTML.jpg)\n\
    \n图 12-21. 实现剪切/复制/粘贴\n\n需要实现三个 `UICollectionViewDelegate` 函数：\n\n- `collectionView(shouldShowMenuForItemAtIndexPath:)\
    \ -> Bool`\n- `collectionView(canPerformAction:forItemAtIndexPath:withSender:)\
    \ -> Bool`\n- `collectionView(performAction:forItemAtIndexPath:withSender:)`\n\
    \n第一个函数控制是否为选中单元格显示菜单：需要时返回 `true`，否则返回 `false`（代码清单 12-26）。\n\n代码清单 12-26. `shouldShowMenuForItemAtIndexPath:`\
    \ 函数\n\n```\noverride func collectionView(collectionView: UICollectionView,\n\
    \    shouldShowMenuForItemAtIndexPath indexPath: NSIndexPath) -> Bool {\n    return\
    \ true\n}\n```\n\n第二个函数控制该单元格能否执行特定操作。例如，可以用代码清单 12-27 中的代码禁用剪切功能。\n\n代码清单 12-27.\
    \ 禁用剪切功能\n\n```\noverride func collectionView(collectionView: UICollectionView,\
    \ canPerformAction\n    action: Selector, forItemAtIndexPath indexPath: NSIndexPath,\
    \ withSender\n    sender: AnyObject?) -> Bool {\n    if action.description ==\
    \ \"cut:\" {\n        return false\n    }\n    return true\n}\n```\n\n可响应的操作种类繁多。检查传入函数时\
    \ `action` 的 `description` 属性，即可查看完整列表。\n\n图 12-22 展示了代码清单 12-27 的效果。\n\n![A978-1-4842-1242-4_12_Fig22_HTML.jpg](img/A978-1-4842-1242-4_12_Fig22_HTML.jpg)\n\
    \n图 12-22. 禁用剪切\n\n最后一个函数用于实现需要启用的操作（代码清单 12-28）。\n\n代码清单 12-28. 实现操作\n\n```\n\
    override func collectionView(collectionView: UICollectionView, performAction\n\
    \    action: Selector, forItemAtIndexPath indexPath: NSIndexPath, withSender\n\
    \    sender: AnyObject?) {\n    //\n    switch action.description {\n    case\
    \ \"copy:\" :\n        // 实现复制功能\n    case \"paste:\" :\n        // 实现粘贴功能\n \
    \   }\n}\n```\n\n### 在集合视图中实现自定义菜单\n\n虽然剪切、复制和粘贴很有用，但并非仅限于此。你可以向长按单元格时显示的菜单中添加自定义项，以实现自己的功能。\n\
    \n长按单元格将显示自定义菜单，该菜单会调用单元格中的函数。如果需要操作数据模型（例如删除单元格），则必须让单元格回调集合视图的控制器。效果可参考图 12-23。\n\
    \n![A978-1-4842-1242-4_12_Fig23_HTML.jpg](img/A978-1-4842-1242-4_12_Fig23_HTML.jpg)\n\
    \n图 12-23. 自定义菜单项\n\n该过程包含以下步骤：\n\n- 定义一个菜单委托协议，并声明处理自定义操作的函数。\n- 在视图控制器中实现该自定义函数，使其遵循菜单委托协议。\n\
    - 创建 `UICollectionViewCell` 的自定义子类，并为遵循菜单委托协议的对象添加委托属性。\n- 在单元格子类中，实现调用委托的函数。单元格将处理初始菜单点击，然后通过委托执行数据模型所需的操作。\n\
    - 为新操作创建菜单项，并将其分配给共享菜单控制器。\n- 在出队单元格时，将集合视图控制器设置为单元格委托。\n- （可选）更新 `UICollectionViewDelegate`\
    \ 函数，限制弹出菜单中显示的菜单项。\n\n#### 定义自定义协议\n\n协议可以在集合视图的视图控制器中定义。在文件顶部添加声明（代码清单 12-29）。\n\
    \n代码清单 12-29. 声明自定义菜单协议\n\n```\nprotocol CustomMenuDelegate {\n    func performDestroy(sender:\
    \ AnyObject, forCell:SelectionCell)\n}\n```\n\n#### 实现自定义协议\n\n现在可以实现该函数，使视图控制器遵循协议。作为视图控制器的扩展添加，如代码清单\
    \ 12-30 所示。\n\n代码清单 12-30. 协议扩展\n\n```\nextension SelectionController : CustomMenuDelegate\
    \ {\n    func performDestroy(sender: AnyObject, forCell: SelectionCell) {\n  \
    \      print(\"Custom action for sender: \\(sender) with cell \\(forCell)\")\n\
    \    }\n}\n```\n\n#### 更新集合视图单元格子类\n\n如果尚未创建自定义的 `UICollectionViewCell` 子类，则需要实现一个。如果已有，则需要更新它，使其包含委托属性和从自定义菜单调用的操作实现函数。示例见代码清单\
    \ 12-31。\n\n代码清单 12-31. 自定义 `UICollectionViewCell` 示例\n\n```\nimport UIKit\n\n\
    class SelectionCell: UICollectionViewCell {\n    var delegate: CustomMenuDelegate?\n\
    \n    func performDestroy(sender: AnyObject) {\n        if let delegate = delegate\
    \ {\n            delegate.performDestroy(sender, forCell: self)\n        }\n \
    \   }\n}\n```\n\n#### 创建自定义菜单项\n\n现在可以创建自定义菜单项。在视图控制器的 `viewDidLoad` 函数中添加以下代码：\n\
    \n```\nlet menuItem = UIMenuItem(title: \"销毁!\", action: \"performDestroy:\")\n\
    UIMenuController.sharedMenuController().menuItems = [menuItem]\n```\n\n这将创建一个标题为\
    \ `销毁!` 的新菜单项，点击时会调用 `performDestroy:` 函数。该函数将在单元格上被调用，因为菜单会附加到单元格对象上。\n\n然后将其添加到\
    \ `sharedMenuController`，以便在长按时显示在单元格中。\n\n#### 将单元格链接到其委托\n\n现在需要更新 `cellForItemAtIndexPath:`\
    \ 函数，使单元格出队时设置其委托。在 `cellForItemAtIndexPath:` 函数中，单元格出队后、返回前添加以下行：\n\n```\ncell.delegate\
    \ = self\n```\n"
- fmt: "## Updating the `UICollectionViewDelegate` Functions\n\nThe `UICollectionViewDelegate`\
    \ functions that control the actions that can be performed in response to a long\
    \ press need to be updated. Assuming you only want to provide the `Destroy!` menu\
    \ option, update the `collectionView(canPerformAction:forItemAtIndexPath:withSender:)`\
    \ function as shown in Listing [12-32](#A978-1-4842-1242-4_12_Chapter.html#FPar38).\n\
    \n**Listing 12-32.** The Updated `collectionView(canPerformAction:forItemAtIndexPath:withSender:)`\
    \ Function\n\n```\noverride func collectionView(collectionView: UICollectionView,\
    \ canPerformAction➤\naction: Selector, forItemAtIndexPath indexPath: NSIndexPath,\
    \ withSender➤\nsender: AnyObject?) -> Bool {\n    if action.description == \"\
    performDestroy:\" {\n        return true\n    }\n    return false\n}\n```\n\n\
    With these updates in place, you’re ready to run the app again, and try a long\
    \ press action in a cell. You should see the `Destroy!` item pop up, as shown\
    \ in Figure [12-24](#A978-1-4842-1242-4_12_Chapter.html#Fig24).\n\n![A978-1-4842-1242-4_12_Fig24_HTML.jpg](A978-1-4842-1242-4_12_Fig24_HTML.jpg)\n\
    \n**Figure 12-24.** The `Destroy!` menu item\n\n## Removing Cells in Response\
    \ to the Menu Item\n\nTo complete this process, let’s implement the functionality\
    \ needed to remove the cell item in response to selecting the `Destroy!` option.\
    \ Update the `performDestroy` function so that it matches Listing [12-33](#A978-1-4842-1242-4_12_Chapter.html#FPar39).\n\
    \n**Listing 12-33.** The Updated `performDestroy` Function\n\n```\nfunc performDestroy(sender:\
    \ AnyObject, forCell: SelectionCell) {\n    if let indexPath = collectionView?.indexPathForCell(forCell)\
    \ {\n        dataArray.removeAtIndex(indexPath.row)\n        collectionView?.reloadData()\n\
    \    }\n}\n```\n\nThis uses the cell that “owns” the menu to get the `indexPath`\
    \ from the collection view, and then deletes the object at that index. When the\
    \ collection view’s data is reloaded, the selected cell will have been removed,\
    \ as shown in Figure [12-25](#A978-1-4842-1242-4_12_Chapter.html#Fig25).\n\n![A978-1-4842-1242-4_12_Fig25_HTML.jpg](A978-1-4842-1242-4_12_Fig25_HTML.jpg)\n\
    \n**Figure 12-25.** Cell 7 has been removed\n\n## Implementing an “Add Cell” Option\n\
    \nImplementing the functionality to add a cell, instead of remove one, is a virtually\
    \ identical process.\n\n### Extending the Protocol to Add a Function to Insert\
    \ a Cell\n\nUpdate the protocol to add a definition for `addItem(sender:atCell:)`:\n\
    \n```\nprotocol CustomMenuDelegate {\n    func performDestroy(sender: AnyObject,\
    \ forCell:SelectionCell)\n    func addItem(sender: AnyObject, atCell: SelectionCell)\n\
    }\n```\n\n### Adding the New Function to the Cell Subclass\n\nAdd the `addItem`\
    \ function to the `SelectionCell` subclass:\n\n```\nfunc addItem(sender: AnyObject)\
    \ {\n    if let delegate = delegate {\n        delegate.addItem(sender, atCell:\
    \ self)\n    }\n}\n```\n\n### Implementing the `addItem` Function in the Collection\
    \ View Controller\n\nAdd the function to insert an item into the collection view’s\
    \ data model, and refresh the data:\n\n```\nfunc addItem(sender: AnyObject, atCell:\
    \ SelectionCell) {\n    if let indexPath = collectionView?.indexPathForCell(atCell)\
    \ {\n        dataArray.insert(\"new cell)\", atIndex: indexPath.row)\n       \
    \ collectionView?.reloadData()\n    }\n}\n```\n\n### Adding a New Menu Item\n\n\
    Update the collection view controller to add another menu item:\n\n```\nlet destroyMenuItem\
    \ = UIMenuItem(title: \"Destroy!\", action: \"performDestroy:\")\nlet addMenuItem\
    \ = UIMenuItem(title: \"Add!\", action: \"addItem:\")\nUIMenuController.sharedMenuController().menuItems\
    \ = [addMenuItem, destroyMenuItem]\n```\n\nRun the project again, and you’ll see\
    \ a new item in the pop-up menu, as shown in Figure [12-26](#A978-1-4842-1242-4_12_Chapter.html#Fig26).\n\
    \n![A978-1-4842-1242-4_12_Fig26_HTML.jpg](A978-1-4842-1242-4_12_Fig26_HTML.jpg)\n\
    \n**Figure 12-26.** The new menu item\n\nTap the `Add!` button, and you’ll see\
    \ a new item appear in the collection view, as shown in Figure [12-27](#A978-1-4842-1242-4_12_Chapter.html#Fig27).\n\
    \n![A978-1-4842-1242-4_12_Fig27_HTML.jpg](A978-1-4842-1242-4_12_Fig27_HTML.jpg)\n\
    \n**Figure 12-27.** The new cell\n\n## Rearranging `UICollectionView`s\n\nA collection\
    \ view is a great control for presenting data for your user to sort interactively–rearranging\
    \ the order of photos in an album, for example. `UICollectionView` makes it almost\
    \ trivial to implement this kind of feature.\n\nTo demonstrate this, you’ll create\
    \ a very simple collection view that displays a number of cells, and then you’ll\
    \ implement the functionality that allows them to be sorted by dragging and dropping.\n\
    \nImplementing drag-and-drop reordering involves adding some `UICollectionViewDelegate`\
    \ functions to the collection view’s delegate object; the exact approach depends\
    \ on whether you’re using a subclass of `UICollectionViewController` or not. You’ll\
    \ look at both processes in turn.\n\n### Prerequisites\n\nThis process assumes\
    \ that you’ve got a collection view that displays cells in a single section based\
    \ on the underlying data stored in a model. The source code for this chapter includes\
    \ two projects: one for the initial state to get you started, and one with the\
    \ functionality fully implemented.\n\nAssuming you’re starting from the initial\
    \ state, the app will look like Figure [12-28](#A978-1-4842-1242-4_12_Chapter.html#Fig28).\n\
    \n![A978-1-4842-1242-4_12_Fig28_HTML.jpg](A978-1-4842-1242-4_12_Fig28_HTML.jpg)\n\
    \n**Figure 12-28.** The initial app\n\nThere are two tabs, one containing a `UIViewController`-based\
    \ collection view, and one with a `UICollectionViewController` subclass. Both\
    \ have identical data structures: a `Struct` of 100 `Strings`, which are displayed\
    \ in 100 x 100 cells under the control of a flow layout.\n\nAt the moment, the\
    \ only interaction that’s possible is the default vertical scrolling behavior.\
    \ You’re going to enhance that by implementing drag-and-drop reordering of the\
    \ collection view.\n\nThe process begins with a long press on the item; once that’s\
    \ been detected, the delegate is asked whether the item at that index path is\
    \ allowed to move. If it is, the cell will follow the pan gesture.\n\nWhen the\
    \ user lifts their finger and the pan gesture ends, the cell is inserted into\
    \ the collection view in the space that’s opened up, and a second delegate function\
    \ is called to allow the data source to be updated.\n\nAdapting the `UICollectionViewController`-based\
    \ collection view is the simpler of the two, so you implement this first and then\
    \ use it as the starting point for the same functionality in a `UIViewController`.\n\
    \n### Implementing Drag-and-Drop with `UICollectionViewController`\n\nThe process\
    \ begins with updating the `UICollectionViewController` to set the `installsStandardGestureForInteractiveMovement`\
    \ property to `true`. Add this to the `viewDidLoad` function:\n\n```\nself.installsStandardGestureForInteractiveMovement\
    \ = true\n```"
