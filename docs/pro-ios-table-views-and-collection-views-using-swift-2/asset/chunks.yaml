    view required, and asks the `dataSource` to supply the supplementary view for
    that item. The `dataSource` replies with an instance of a `UICollectionViewReusableView`.
     


    ![A978-1-4842-1242-4_5_Fig11_HTML.jpg](A978-1-4842-1242-4_5_Fig11_HTML.jpg)


    Figure 5-11.


    Messaging between view controller, collectionView, and datasource


    After your `dataSource` provides this information, your `collectionView` is in
    business. These three methods are defined in the `UICollectionViewDataSource`
    protocol.


    ### Which configuration method should I use?


    There are two points in the cell’s lifecycle where it’s possible to configure
    cells that will be displayed in the table – when it’s dequeued or created by the
    datasource; and just before it’s actually displayed in the collection view.'
  trans: '

    ### 与 Cell、Section 和 Row 相关的 UITableViewDataSource 方法


    如表 5-3 所列，有三个主要方法负责提供这三类信息。其中两个方法是必需的。


    **表 5-3.** UITableViewDataSource 协议中的 Cell、Section 和 Row 方法


    | 方法 | 用途 | 是否必需？ |

    | --- | --- | --- |

    | `numberOfSectionsInTableView(_:)` | 返回一个 `Int` 值，表示表格视图中的分区数 | 否 |

    | `tableView(_:numberOfRowsInSection:)` | 返回一个 `Int` 值，表示指定分区中的行数 | 是 |

    | `tableView(_:cellForRowAtIndexPath:)` | 返回一个 `UITableViewCell` 实例，用于指定索引路径处的行
    | 是 |


    虽然 `tableView` 需要知道所需的分区数量，但默认值为 `1`，这就是为什么在简单表格中你经常会看到 `numberOfSectionsInTableView`
    方法被省略的原因。


    ### 与标题和索引相关的 UITableViewDataSource 方法


    有四个方法用于创建和管理表格的标题和索引。表 5-4 列出了这些方法。


    **表 5-4.** UITableViewDataSource 协议中的标题和分区方法


    | 方法 | 用途 |

    | --- | --- |

    | `tableView(_:titleForHeaderInSection:)` | 返回一个 `String` 值，表示指定分区的页眉标题 |

    | `tableView(_:titleForFooterInSection:)` | 返回一个 `String` 值，表示指定分区的页脚标题 |

    | `sectionIndexTitlesForTableView(:_)` | 返回一个可选的 `String` 类型 `Array`，包含索引列表的标题（例如
    A、B、C、D 等），该列表显示在带索引表格的右侧 |

    | `tableView(_:sectionForSectionIndexTitle:atIndex:)` | 返回一个 `Int` 值，表示给定标题和分区标题索引所对应的分区编号
    |


    ### 与插入、删除和重排相关的 UITableViewDataSource 方法


    其余 `UITableViewDataSource` 协议方法用于处理 `tableView` 中行的插入、删除和重排。表 5-5 列出了这些方法。


    **表 5-5.** 与插入、删除和重排相关的 UITableViewDataSource 方法


    | 方法 | 用途 |

    | --- | --- |

    | `tableView(_:canEditRowAt IndexPath:)` | 返回一个 `Bool` 值，取决于指定行是否被标记为可编辑。如果未实现此方法，则
    `tableView` 默认所有行均可编辑。 |

    | `tableView(_:canMoveRowAt IndexPath:)` | 返回一个 `Bool` 值，取决于指定行是否被标记为可在表格内移动。如果未重写此方法，默认值为
    `false`。 |

    | `tableView(_:moveRowAtIndexPath: toIndexPath:)` | 指示 `dataSource` 将一行从一个位置移动到另一个位置。如果希望更改持久化，此方法还需要更新底层数据模型。不返回值。
    |

    | `tableView(_:commitEditingStyle: forRowAtIndexPath:)` | 通过调用 `insertRowsAtIndexPath:withRowAnimation`
    或 `deleteRowsAtIndexPath:withRowAnimation tableView` 方法，指示 `dataSource` 提交行的插入或删除操作。不返回值。
    |


    ## UICollectionView 的数据源


    `UICollectionView` 在成功绘制自身及其 Cell 所需的关键信息方面，其工作方式与 `UITableView` 非常相似。


    具体来说，它需要：


    *   集合视图中的分区数

    *   每个分区中的项数

    *   每个分区中每个项的 Cell


    `UICollectionView dataSource` 的存在正是为了提供这些信息。


    ### 获取表格中的分区数


    一个简单的集合视图只有一个分区，因此集合视图默认认为分区数为 1，除非实现了 `collectionView(_:numberOfSectionsInCollectionView:)`
    方法并返回了不同的值。


    尽管 `numberOfSectionsInCollectionView` 是一个可选方法，但我通常都会实现它，以便它始终存在。由于这是第一个被调用的方法，如果集合视图的数据集为空，你也可以通过返回
    `0` 来加快处理速度——此后 `collectionView` 会认为不会再有额外数据，并停止请求。


    ### 获取分区中的项数


    假设有数据需要显示，则会调用 `numberOfItemsInSection(:_)` 方法。调用该方法的 `collectionView` 会将分区编号以整数形式提供，而该方法则返回项数（同样以整数形式）。


    ### 获取属于该分区该行的 Cell


    创建要显示的 Cell 是设置 `collectionView` 的核心。每当调用 `collectionView(_:cellForItemAtIndexPath:)`
    方法时，你的代码需要返回一个 `UICollectionViewCell` 实例供 `collectionView` 显示。


    `collectionView` 会将分区和行编号以 `indexPath` 形式提供，而你的 `cellForItemAtIndexPath` 方法需要从模型中检索数据、创建
    Cell，并尽快返回它。


    ### 获取属于该索引路径的补充视图


    尽管补充视图是可选的，但提供它们的方式与提供集合视图 Cell 的方式非常相似：它们是在响应集合视图的请求时出列的。


    `collectionView` 会将分区和行编号以 `indexPath` 形式提供，同时还会提供所需的补充视图类型，而 `collectionView(_:viewForSupplementaryElementOfKind:atIndexPath:)`
    方法则负责从模型中检索数据、创建并配置补充视图，并尽快返回它。


    ### 集合视图如何获取关键信息


    涉及四个对象——包含 `collectionView` 的视图控制器、`collectionView` 本身，以及属于 `collectionView` 的
    `delegate` 和 `dataSource` 对象——之间的对话按特定顺序进行。这如图 5-11 所示。


    首先，视图控制器分配并实例化 `collectionView`，然后设置其 `delegate` 和 `dataSource` 属性。创建完成后，`collectionView`
    向 `dataSource` 请求自身分区数，`dataSource` 以 `NSInteger` 值作为回复。然后，`collectionView` 在
    `indexPath` 实例中提供自身引用和分区编号，并向 `dataSource` 请求该分区中的项数。`dataSource` 再次以 `NSInteger`
    作为回复。接着，`collectionView` 在 `indexPath` 对象中提供自身引用和项编号，并请求 `dataSource` 提供该行的项。`dataSource`
    以一个 `UICollectionViewCell` 实例作为回复。可选地，`collectionView` 提供自身引用、`indexPath` 对象中的项编号以及所需的补充视图类型，并请求
    `dataSource` 提供该行的补充视图。`dataSource` 以一个 `UICollectionViewReusableView` 实例作为回复。


    ![A978-1-4842-1242-4_5_Fig11_HTML.jpg](img/A978-1-4842-1242-4_5_Fig11_HTML.jpg)


    **图 5-11.** 视图控制器、collectionView 和数据源之间的消息传递


    在你的 `dataSource` 提供了这些信息之后，你的 `collectionView` 就可以正常工作了。这三个方法在 `UICollectionViewDataSource`
    协议中定义。


    ### 我应该使用哪种配置方法？


    在 Cell 的生命周期中有两个时间点可以配置将要显示在表格中的 Cell：一是当它从数据源出列或创建时；二是就在它即将实际显示在集合视图中之前。

