    yet ready to run. The last task is to get it to “tick.”


    This involves invalidating the collection view’s layout to force it to recalculate
    the attributes for each element. Because you set the time in the layout, every
    time the layout is invalidated, it will calculate attributes for a new time; invalidate
    the layout once a second, and the clock will appear to tick.


    You can do this by adding an `updateClock()` function to the view controller,
    as shown in Listing [16-12](#A978-1-4842-1242-4_16_Chapter.html#FPar13).


    Listing 16-12. The updateClock() Function


    `func updateClock() {`


        `collectionView.collectionViewLayout.invalidateLayout()`


    `}`


    With this function in place, you can now set up a timer to call it once per second.
    First, add a property to the view controller:


    `var tickTimer: NSTimer!`


    Then update the `viewDidLoad()` function so that it looks like Listing [16-13](#A978-1-4842-1242-4_16_Chapter.html#FPar14).


    Listing 16-13. The updated viewDidLoad() Function


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `setupData()`


        `configureCollectionView()`


        `tickTimer = NSTimer.scheduledTimerWithTimeInterval(1.0, target: self,  ➤`


        `selector: "updateClock", userInfo: nil, repeats: true)`


        `NSRunLoop.currentRunLoop().addTimer(tickTimer, forMode: NSRunLoopCommonModes)`


    `}`


    This creates an instance of `NSTimer` that fires once per second and calls the
    `updateClock()` function. The timer is then added to the main run loop to create
