    # 4.  How The Collection View Fits Together


    In this chapter, you’re going to take a whistle-stop tour of collection views
    and the elements from which they’re built. Although this chapter does not present
    a lot of code, it will provide a useful foundation for when you start to customize
    collection views.


    Along the way, you’ll look at the following:


    * The anatomy and dimensions of collection views

