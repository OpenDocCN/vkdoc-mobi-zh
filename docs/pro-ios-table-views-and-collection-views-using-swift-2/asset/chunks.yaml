- fmt: '# Table Views Quick Start


    In this chapter, you’ll start your exploration of table views. This chapter begins
    with an overview of what table views are and some examples of how they’re used
    in practice. Then, in the second section, you’ll build a simple “Hello, world”-style
    table view app to introduce you to the components behind the user interface and
    help you contextualize the detail that will come in later chapters.


    If you’re just starting to use table views, it’s worth taking some time to build
    a very simple one from scratch before diving into the gnarly details. However,
    if you’ve reached the stage where you feel more confident about how the components
    of the table view jigsaw fit together and want to get straight into the code,
    feel free to skip the rest of this chapter completely. I’ll cover the elements
    in detail later, so you won’t miss out.


    ## What Are Table Views?


    Examples of table views can be found everywhere in iOS apps. You are already familiar
    with simple tables, implemented as standard controls such as the iPhone’s Settings
    app or the iPad’s Mail app, shown in Figure [1-1](#A978-1-4842-1242-4_1_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_1_Fig1_HTML.jpg](A978-1-4842-1242-4_1_Fig1_HTML.jpg)


    Figure 1-1. Some basic table-based applications


    At the other end of the scale, the default look, feel, and behavior of the table
    view and cells can be customized to the point where they are hardly recognizable
    as table views at all. Figure [1-2](#A978-1-4842-1242-4_1_Chapter.html#Fig2) shows
    some examples.


    ![A978-1-4842-1242-4_1_Fig2_HTML.jpg](A978-1-4842-1242-4_1_Fig2_HTML.jpg)


    Figure 1-2. Examples of table views in action on the iPhone


    ## The Anatomy of a Table View


    The table view displays a list of elements, also known as table view cells, that
    can be scrolled vertically. The table view is composed of two physical parts:


    * The container part—the `tableView` itself—is a subclass of `UIScrollView` and
    contains a vertically scrollable list of table cells.

    * Table cells, which can be instances of one of four standard `UITableViewCell`
    types or custom subclasses of `UITableViewCell` that can be customized as required.


    Figure [1-3](#A978-1-4842-1242-4_1_Chapter.html#Fig3) illustrates the parts of
    a table view.


    ![A978-1-4842-1242-4_1_Fig3_HTML.jpg](A978-1-4842-1242-4_1_Fig3_HTML.jpg)


    Figure 1-3. The basic anatomy of a table view


    The table view can’t operate on its own, though; it needs the support of objects
    that conform to two `UITableView` protocols:


    * The object that conforms to the `UITableViewDatasource` protocol provides the
    table view with the data that it needs to construct and configure itself, such
    as the number of sections and rows. It also creates and provides the cell objects
    that the table view displays.

    * The object that conforms to the `UITableViewDelegate` protocol is responsible
    for handling user interaction with the table, such as selection, editing, and
    ordering.


    A very common pattern is for the `UIViewController` instance that manages the
    view in which the table lives to also act as the data source and delegate. As
    you’ll see later in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html), this doesn’t
    always have to be the case; it can help to make the architecture of your app cleaner
    if those functions are delivered by other classes.


    ## Creating a Simple Table View App


    In the rest of this chapter, you’ll build a simple “Hello, world” style table
    view app from scratch. It will show you how the container, cells, data source,
    and delegate all fit together and give you an app that you can use as the basis
    for your own experiments.


    I’m going to take it deliberately slowly and cover all the steps. If you’re a
    confident Xcode driver, you won’t need this hand-holding—just concentrate on the
    code instead.


    Still with me? Okay—you’re going to do the following:


    * Create a simple, window-based application skeleton.

    * Generate some data to feed the table.

    * Create a simple table view.

    * Wire up the table view’s data source and delegate.

    * Implement some very simple interactivity.


    It’s a very straightforward but useful practice. Onward!


    ## Creating the Application Skeleton


    For this application, you’re going to use a simple structure: a single view managed
    by a view controller, and a Storyboard file to provide the content for the view.
    Fire up Xcode and select the Single View Application template, as shown in Figure
    [1-4](#A978-1-4842-1242-4_1_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_1_Fig4_HTML.jpg](A978-1-4842-1242-4_1_Fig4_HTML.jpg)


    Figure 1-4. Xcode’s template selection pane


    > **Note:** With each new release of Xcode, Apple frequently (and pointlessly)
    changes the templates that are included. You may see a set that is different from
    those shown in Figure [1-5](#A978-1-4842-1242-4_1_Chapter.html#Fig5). Check the
    description of the templates to find the one that provides a single view application.


    ![A978-1-4842-1242-4_1_Fig5_HTML.jpg](A978-1-4842-1242-4_1_Fig5_HTML.jpg)


    Figure 1-5. Name the application


    Call the application `SimpleTable`. You’re going to build an iPhone version, but
    you don’t need Core Data or any tests.


    Make sure those options are selected as needed, as shown in Figure [1-5](#A978-1-4842-1242-4_1_Chapter.html#Fig5).


    Finally, you need to select where you want to save the project. You don’t need
    to worry about creating a local Git repository for this project unless you particularly
    want to.


    When you’ve reached this point, you’ll see the project view of Xcode, with the
    initial skeleton of your application. It’ll look something like Figure [1-6](#A978-1-4842-1242-4_1_Chapter.html#Fig6),
    assuming that you’ve stuck with the `SimpleTable` application name.


    ![A978-1-4842-1242-4_1_Fig6_HTML.jpg](A978-1-4842-1242-4_1_Fig6_HTML.jpg)


    Figure 1-6. The initial Xcode view showing your new skeleton application


    You’ll see that you have the following:


    * An app delegate (`AppDelegate.swift`)

    * A view controller (`ViewController.swift`)

    * A Storyboard file (`Main.storyboard`)


    At the end of this chapter, you’ll look again at how these fit together. For the
    moment, you’ll be working with the view controller and the Storyboard file.


    At this point, you can run the app to verify that it compiles correctly. Go to
    Product ➤ Run or press Command+R and you’ll see the app’s launch screen and an
    empty white view. Now you’re ready to start building the table view.'
  raw: '# 1. Table Views Quick Start


    In this chapter, you’ll start your exploration of table views. This chapter begins
    with an overview of what table views are and some examples of how they’re used
    in practice. Then, in the second section, you’ll build a simple “Hello, world”-style
    table view app to introduce you to the components behind the user interface and
    help you contextualize the detail that will come in later chapters.


    If you’re just starting to use table views, it’s worth taking some time to build
    a very simple one from scratch before diving into the gnarly details. However,
    if you’ve reached the stage where you feel more confident about how the components
    of the table view jigsaw fit together and want to get straight into the code,
    feel free to skip the rest of this chapter completely. I’ll cover the elements
    in detail later, so you won’t miss out.


    ## What Are Table Views?


    Examples of table views can be found everywhere in iOS apps. You are already familiar
    with simple tables, implemented as standard controls such as the iPhone’s Settings
    app or the iPad’s Mail app, shown in Figure [1-1](#A978-1-4842-1242-4_1_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_1_Fig1_HTML.jpg](A978-1-4842-1242-4_1_Fig1_HTML.jpg)


    Figure 1-1.


    Some basic table-based applications


    At the other end of the scale, the default look, feel, and behavior of the table
    view and cells can be customized to the point where they are hardly recognizable
    as table views at all. Figure [1-2](#A978-1-4842-1242-4_1_Chapter.html#Fig2) shows
    some examples.


    ![A978-1-4842-1242-4_1_Fig2_HTML.jpg](A978-1-4842-1242-4_1_Fig2_HTML.jpg)


    Figure 1-2.


    Examples of table views in action on the iPhone


    ## The Anatomy of a Table View


    The table view displays a list of elements, also known as table view cells, that
    can be scrolled vertically. The table view is composed of two physical parts:


    *   The container part—the `tableView` itself—is a subclass of `UIScrollView`
    and contains a vertically scrollable list of table cells.

    *   Table cells, which can be instances of one of four standard `UITableViewCell`
    types or custom subclasses of `UITableViewCell` that can be customized as required.


    Figure [1-3](#A978-1-4842-1242-4_1_Chapter.html#Fig3) illustrates the parts of
    a table view.


    ![A978-1-4842-1242-4_1_Fig3_HTML.jpg](A978-1-4842-1242-4_1_Fig3_HTML.jpg)


    Figure 1-3.


    The basic anatomy of a table view


    The table view can’t operate on its own, though; it needs the support of objects
    that conform to two `UITableView` protocols:


    *   The object that conforms to the `UITableViewDatasource` protocol provides
    the table view with the data that it needs to construct and configure itself,
    such as the number of sections and rows. It also creates and provides the cell
    objects that the table view displays.

    *   The object that conforms to the `UITableViewDelegate` protocol is responsible
    for handling user interaction with the table, such as selection, editing, and
    ordering.


    A very common pattern is for the `UIViewController` instance that manages the
    view in which the table lives to also act as the data source and delegate. As
    you’ll see later in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html), this doesn’t
    always have to be the case; it can help to make the architecture of your app cleaner
    if those functions are delivered by other classes.


    ## Creating a Simple Table View App


    In the rest of this chapter, you’ll build a simple “Hello, world” style table
    view app from scratch. It will show you how the container, cells, data source,
    and delegate all fit together and give you an app that you can use as the basis
    for your own experiments.


    I’m going to take it deliberately slowly and cover all the steps. If you’re a
    confident Xcode driver, you won’t need this hand-holding—just concentrate on the
    code instead.


    Still with me? Okay—you’re going to do the following:


    *   Create a simple, window-based application skeleton.

    *   Generate some data to feed the table.

    *   Create a simple table view.

    *   Wire up the table view’s data source and delegate.

    *   Implement some very simple interactivity.


    It’s a very straightforward but useful practice. Onward!


    ## Creating the Application Skeleton


    For this application, you’re going to use a simple structure: a single view managed
    by a view controller, and a Storyboard file to provide the content for the view.
    Fire up Xcode and select the Single View Application template, as shown in Figure
    [1-4](#A978-1-4842-1242-4_1_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_1_Fig4_HTML.jpg](A978-1-4842-1242-4_1_Fig4_HTML.jpg)


    Figure 1-4.


    Xcode’s template selection pane Note


    With each new release of Xcode, Apple frequently (and pointlessly) changes the
    templates that are included. You may see a set that is different from those shown
    in Figure [1-5](#A978-1-4842-1242-4_1_Chapter.html#Fig5). Check the description
    of the templates to find the one that provides a single view application.


    ![A978-1-4842-1242-4_1_Fig5_HTML.jpg](A978-1-4842-1242-4_1_Fig5_HTML.jpg)


    Figure 1-5.


    Name the application


    Call the application SimpleTable. You’re going to build an iPhone version, but
    you don’t need Core Data or any tests.


    Make sure those options are selected as needed, as shown in Figure [1-5](#A978-1-4842-1242-4_1_Chapter.html#Fig5).


    Finally, you need to select where you want to save the project. You don’t need
    to worry about creating a local Git repository for this project unless you particularly
    want to.


    When you’ve reached this point, you’ll see the project view of Xcode, with the
    initial skeleton of your application. It’ll look something like Figure [1-6](#A978-1-4842-1242-4_1_Chapter.html#Fig6),
    assuming that you’ve stuck with the SimpleTable application name.


    ![A978-1-4842-1242-4_1_Fig6_HTML.jpg](A978-1-4842-1242-4_1_Fig6_HTML.jpg)


    Figure 1-6.


    The initial Xcode view showing your new skeleton application


    You’ll see that you have the following:


    *   An app delegate (`AppDelegate.swift`)

    *   A view controller (`ViewController.swift`)

    *   A Storyboard file (`Main.storyboard`)


    At the end of this chapter, you’ll look again at how these fit together. For the
    moment, you’ll be working with the view controller and the Storyboard file.


    At this point, you can run the app to verify that it compiles correctly. Go to
    Product ➤ Run or press Command+R and you’ll see the app’s launch screen and an
    empty white view. Now you’re ready to start building the table view.'
  trans: '

    # 表格视图快速入门


    在本章中，你将开始探索表格视图（Table Views）。本章首先概述了什么是表格视图，以及它们在实践中的一些应用示例。接着，在第二节中，你将构建一个简单的“Hello,
    world”风格的表格视图应用，以便向你介绍用户界面背后的组件，并帮助你理解后续章节中将会涉及的细节内容。


    如果你是初次接触表格视图，那么在深入那些复杂细节之前，花些时间从头构建一个非常简单的实例是值得的。然而，如果你已经到了对表格视图各组件的组合方式更有信心，并且想直接进入代码编写的阶段，可以完全跳过本章剩余部分。我将在后面详细讲解各个元素，所以你并不会错过什么。


    ## 什么是表格视图？


    在 iOS 应用中，表格视图的示例随处可见。你已经熟悉了作为标准控件实现的简单表格，例如 iPhone 的“设置”应用或 iPad 的“邮件”应用，如图 1-1
    所示。


    ![A978-1-4842-1242-4_1_Fig1_HTML.jpg](img/A978-1-4842-1242-4_1_Fig1_HTML.jpg)


    图 1-1. 一些基本的基于表格的应用


    在另一个极端，表格视图和单元格的默认外观、感觉和行为可以被定制到几乎看不出它们原本是表格视图的程度。图 1-2 展示了一些示例。


    ![A978-1-4842-1242-4_1_Fig2_HTML.jpg](img/A978-1-4842-1242-4_1_Fig2_HTML.jpg)


    图 1-2. iPhone 上表格视图在运行中的示例


    ## 表格视图的构成


    表格视图显示一个可以垂直滚动的元素列表，这些元素也称为表格视图单元格。表格视图由两个物理部分组成：


    *   容器部分——即 `tableView` 本身——是 `UIScrollView` 的一个子类，包含一个可垂直滚动的表格单元格列表。

    *   表格单元格，可以是四种标准 `UITableViewCell` 类型之一的实例，也可以是可根据需要定制的 `UITableViewCell` 的自定义子类。


    图 1-3 展示了表格视图的组成部分。


    ![A978-1-4842-1242-4_1_Fig3_HTML.jpg](img/A978-1-4842-1242-4_1_Fig3_HTML.jpg)


    图 1-3. 表格视图的基本结构


    不过，表格视图不能独立运行；它需要遵循两个 `UITableView` 协议的对象支持：


    *   遵循 `UITableViewDatasource` 协议的对象为表格视图提供构建和配置自身所需的数据，例如分区和行数。它还创建并提供表格视图要显示的单元格对象。

    *   遵循 `UITableViewDelegate` 协议的对象负责处理用户与表格的交互，例如选择、编辑和排序。


    一种非常常见的模式是管理表格所在视图的 `UIViewController` 实例同时充当数据源和委托。正如你将在第 5 章中看到的，情况并非总是如此；如果这些功能由其他类提供，有助于使应用架构更清晰。


    ## 创建一个简单的表格视图应用


    在本章的剩余部分，你将从头构建一个简单的“Hello, world”风格的表格视图应用。它将向你展示容器、单元格、数据源和委托是如何组合在一起的，并为你提供一个可以作为自己实验基础的应用。


    我打算刻意放慢速度，并涵盖所有步骤。如果你是一个熟练的 Xcode 用户，就不需要这样的手把手指导了——只需专注于代码即可。


    还在听吗？好的——接下来你要做的是：


    *   创建一个简单的、基于窗口的应用骨架。

    *   生成一些数据来填充表格。

    *   创建一个简单的表格视图。

    *   连接表格视图的数据源和委托。

    *   实现一些非常简单的交互功能。


    这是一个非常简单但有用的实践。开始吧！


    ## 创建应用骨架


    对于这个应用，你将使用一个简单的结构：一个由视图控制器管理的单一视图，以及一个提供视图内容的 Storyboard 文件。启动 Xcode 并选择 Single
    View Application 模板，如图 1-4 所示。


    ![A978-1-4842-1242-4_1_Fig4_HTML.jpg](img/A978-1-4842-1242-4_1_Fig4_HTML.jpg)


    图 1-4. Xcode 的模板选择窗格


    > **注意：** 随着 Xcode 的每次新版本发布，Apple 经常（且毫无意义地）更改包含的模板。你可能会看到与图 1-5 所示不同的模板集合。请检查模板的描述，找到提供单一视图应用的模板。


    ![A978-1-4842-1242-4_1_Fig5_HTML.jpg](img/A978-1-4842-1242-4_1_Fig5_HTML.jpg)


    图 1-5. 为应用命名


    将应用命名为 `SimpleTable`。你将构建一个 iPhone 版本，但不需要 Core Data 或任何测试。


    确保根据需要选择了这些选项，如图 1-5 所示。


    最后，你需要选择保存项目的位置。除非你特别需要，否则不必担心为此项目创建本地 Git 仓库。


    到达这一步后，你将看到 Xcode 的项目视图，其中包含应用的初始骨架。假设你坚持使用了 `SimpleTable` 这个应用名，它看起来会像图 1-6 所示。


    ![A978-1-4842-1242-4_1_Fig6_HTML.jpg](img/A978-1-4842-1242-4_1_Fig6_HTML.jpg)


    图 1-6. 显示新骨架应用的初始 Xcode 视图


    你会看到项目中包含以下内容：


    *   一个应用委托（`AppDelegate.swift`）

    *   一个视图控制器（`ViewController.swift`）

    *   一个 Storyboard 文件（`Main.storyboard`）


    在本章结尾，你将再次审视这些文件是如何组合在一起的。目前，你将处理视图控制器和 Storyboard 文件。


    此时，你可以运行应用来验证它是否能正确编译。前往 Product ➤ Run 或按下 Command+R，你将看到应用的启动屏幕和一个空白的白色视图。现在，你已经准备好开始构建表格视图了。

