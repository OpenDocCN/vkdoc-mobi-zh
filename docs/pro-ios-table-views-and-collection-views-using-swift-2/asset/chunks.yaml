        `cell.cellTitle = cvData[indexPath.row]`


        `return cell`


    `}`


    You’ve seen this pattern before. You’re dequeuing a cell with the cell identifier,
    and then downcasting it to an instance of your custom class.


    This allows you to access the properties of the cell and pass in the relevant
    object from the data model, before returning the cell to the collection view.


    Listing [8-12](#A978-1-4842-1242-4_8_Chapter.html#FPar17) shows the equivalent
    for the table view app.


