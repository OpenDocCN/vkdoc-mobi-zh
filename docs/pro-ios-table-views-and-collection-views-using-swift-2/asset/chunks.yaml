    \ AnyObject?) -> Bool {\n    if action.description == \"performDestroy:\" {\n\
    \        return true\n    }\n    return false\n}\n```\n\n完成这些更新后，你就可以重新运行应用，并在某个单元格上尝试长按操作。此时应该会弹出\
    \ `Destroy!` 项目，如图 12-24 所示。\n\n![A978-1-4842-1242-4_12_Fig24_HTML.jpg](img/A978-1-4842-1242-4_12_Fig24_HTML.jpg)\n\
    \n**图 12-24.** `Destroy!` 菜单项\n\n## 响应菜单项移除单元格\n\n为了完成这一流程，我们需要实现响应 `Destroy!`\
    \ 选项来移除单元格的功能。请更新 `performDestroy` 函数，使其与代码清单 12-33 匹配。\n\n**代码清单 12-33.** 更新后的\
    \ `performDestroy` 函数\n\n```\nfunc performDestroy(sender: AnyObject, forCell:\
    \ SelectionCell) {\n    if let indexPath = collectionView?.indexPathForCell(forCell)\
    \ {\n        dataArray.removeAtIndex(indexPath.row)\n        collectionView?.reloadData()\n\
    \    }\n}\n```\n\n这段代码通过“拥有”菜单的单元格从集合视图中获取 `indexPath`，然后删除该索引处的对象。当集合视图的数据重新加载后，选中的单元格将被移除，如图\
    \ 12-25 所示。\n\n![A978-1-4842-1242-4_12_Fig25_HTML.jpg](img/A978-1-4842-1242-4_12_Fig25_HTML.jpg)\n\
    \n**图 12-25.** 单元格 7 已被移除\n\n## 实现“添加单元格”选项\n\n实现添加单元格（而非移除单元格）的功能，过程实际上与上述操作相同。\n\
    \n### 扩展协议以添加插入单元格的函数\n\n更新协议，添加 `addItem(sender:atCell:)` 的定义：\n\n```\nprotocol\
    \ CustomMenuDelegate {\n    func performDestroy(sender: AnyObject, forCell:SelectionCell)\n\
    \    func addItem(sender: AnyObject, atCell: SelectionCell)\n}\n```\n\n### 在单元格子类中添加新函数\n\
    \n将 `addItem` 函数添加到 `SelectionCell` 子类中：\n\n```\nfunc addItem(sender: AnyObject)\
    \ {\n    if let delegate = delegate {\n        delegate.addItem(sender, atCell:\
    \ self)\n    }\n}\n```\n\n### 在集合视图控制器中实现 `addItem` 函数\n\n添加一个函数，用于向集合视图的数据模型中插入一个条目，并刷新数据：\n\
    \n```\nfunc addItem(sender: AnyObject, atCell: SelectionCell) {\n    if let indexPath\
    \ = collectionView?.indexPathForCell(atCell) {\n        dataArray.insert(\"new\
    \ cell)\", atIndex: indexPath.row)\n        collectionView?.reloadData()\n   \
    \ }\n}\n```\n\n### 添加新的菜单项\n\n更新集合视图控制器，添加另一个菜单项：\n\n```\nlet destroyMenuItem\
    \ = UIMenuItem(title: \"Destroy!\", action: \"performDestroy:\")\nlet addMenuItem\
    \ = UIMenuItem(title: \"Add!\", action: \"addItem:\")\nUIMenuController.sharedMenuController().menuItems\
    \ = [addMenuItem, destroyMenuItem]\n```\n\n再次运行项目，你会在弹出菜单中看到一个新项目，如图 12-26 所示。\n\
    \n![A978-1-4842-1242-4_12_Fig26_HTML.jpg](img/A978-1-4842-1242-4_12_Fig26_HTML.jpg)\n\
    \n**图 12-26.** 新的菜单项\n\n点击 `Add!` 按钮，你会看到集合视图中出现一个新条目，如图 12-27 所示。\n\n![A978-1-4842-1242-4_12_Fig27_HTML.jpg](img/A978-1-4842-1242-4_12_Fig27_HTML.jpg)\n\
    \n**图 12-27.** 新的单元格\n\n## 重新排列 `UICollectionView`\n\n集合视图是向用户展示可交互排序数据的绝佳控件——例如，重新排列相册中照片的顺序。`UICollectionView`\
    \ 使得实现此类功能几乎不费吹灰之力。\n\n为了演示这一点，你将创建一个非常简单的集合视图，用于显示若干单元格，然后实现通过拖放对其进行排序的功能。\n\n\
    实现拖放重新排序需要在集合视图的委托对象中添加一些 `UICollectionViewDelegate` 函数；具体方法取决于你是否使用了 `UICollectionViewController`\
    \ 的子类。你将依次了解这两种方法。\n\n### 先决条件\n\n此过程假设你已有一个集合视图，它基于存储在模型中的底层数据，在单个分区中显示单元格。本章的源代码包含两个项目：一个用于初始状态，便于你开始操作；另一个则完整实现了该功能。\n\
    \n假设你从初始状态开始，应用将如图 12-28 所示。\n\n![A978-1-4842-1242-4_12_Fig28_HTML.jpg](img/A978-1-4842-1242-4_12_Fig28_HTML.jpg)\n\
    \n**图 12-28.** 初始应用\n\n应用包含两个标签页，一个包含基于 `UIViewController` 的集合视图，另一个包含 `UICollectionViewController`\
    \ 子类。两者具有相同的数据结构：一个包含 100 个 `String` 的 `Struct`，这些字符串在流式布局的控制下显示在 100 x 100 的单元格中。\n\
    \n目前，唯一可能的交互是默认的垂直滚动行为。你将通过实现集合视图的拖放重新排序功能来增强这一点。\n\n该过程始于对项目进行长按；一旦检测到长按，委托对象会被询问是否允许该索引路径处的项目移动。如果允许，该单元格将跟随拖动手势移动。\n\
    \n当用户抬起手指且拖动手势结束时，该单元格会被插入到集合视图新空出的空间中，并调用第二个委托函数来允许更新数据源。\n\n适配基于 `UICollectionViewController`\
    \ 的集合视图是两者中较为简单的方法，因此你首先实现它，然后将其用作在 `UIViewController` 中实现相同功能的起点。\n\n### 使用 `UICollectionViewController`\
    \ 实现拖放\n\n该过程首先需要更新 `UICollectionViewController`，将 `installsStandardGestureForInteractiveMovement`\
    \ 属性设置为 `true`。将此代码添加到 `viewDidLoad` 函数中：\n\n```\nself.installsStandardGestureForInteractiveMovement\
    \ = true\n```\n"
- fmt: "### Adding `UICollectionViewDelegate` Functions\n\nNext, there are two optional\
    \ `UICollectionViewDelegate` functions that you need to implement:\n- `collectionView(_:canMoveItemAtIndexPath:)`\n\
    - `collectionView(_:moveItemAtIndexPath:toIndexPath)`\n\nThe first function simply\
    \ controls whether the selected item can be moved or not, and is called before\
    \ the interaction begins. You may have items that must remain in place, in which\
    \ case you need to return `false` for those specific index paths.\n\nIn your case,\
    \ you’re allowing all items to move, so you simply return `true` from the function,\
    \ as shown in Listing [12-34](#A978-1-4842-1242-4_12_Chapter.html#FPar40).\n\n\
    **Listing 12-34.** `collectionView(_:canMoveItemAtIndexPath:)`\n```swift\noverride\
    \ func collectionView(collectionView: UICollectionView, canMoveItemAtIndexPath\n\
    indexPath: NSIndexPath) -> Bool {\n    return true\n}\n```\n\nThe second function\
    \ is called once the interaction is completed. This is the point where you can\
    \ update the underlying data source to match the changes in the collection view.\n\
    \n> **Caution:** The action of rearranging the items in the collection view doesn’t\
    \ update the underlying data model; the changes only take place in the view. If\
    \ you don’t update the data model to reflect how the items have been moved, then\
    \ the changes will disappear the next time the collection view updates.\n\nThis\
    \ function takes three parameters: the `collectionView` itself, the `indexPath`\
    \ that the item came from, and the `indexPath` that it’s going to. Armed with\
    \ this data, you can update the data accordingly, as shown in Listing [12-35](#A978-1-4842-1242-4_12_Chapter.html#FPar42).\n\
    \n**Listing 12-35.** Updating the Data Model\n```swift\noverride func collectionView(collectionView:\
    \ UICollectionView, moveItemAtIndexPath\nsourceIndexPath: NSIndexPath, toIndexPath\
    \ destinationIndexPath: NSIndexPath) {\n    // Find object to move\n    let thingToMove\
    \ = dataArray[sourceIndexPath.row]\n    // Remove old object\n    dataArray.removeAtIndex(sourceIndexPath.row)\n\
    \    // insert new copy of thing to move\n    dataArray.insert(thingToMove, atIndex:\
    \ destinationIndexPath.row)\n    // Reload the data\n    collectionView.reloadData()\n\
    }\n```\n\nThe final `reloadData()` call isn’t strictly necessary to update the\
    \ view, but it means that the `collectionView` and its underlying data are back\
    \ in sync once the interaction is completed.\n\nWith those three changes implemented,\
    \ you can now drag and drop cells around the collection view with impunity!\n\n\
    ### Highlighting the Move\n\nAs things stand, it can be a little difficult to\
    \ see what’s going on as you’re moving a cell around, because the cell in motion\
    \ looks the same as all the others. To make it stand out a little more, you can\
    \ tap into the two delegate functions you’ve just implemented to highlight the\
    \ cell while it’s in motion.\n\nTo begin with, let’s change the background color\
    \ of the cell when the pan gesture starts.\n\nAdd a property to the class to hold\
    \ a reference to the cell that’s in motion:\n```swift\nprivate var selectedCell:\
    \ UICollectionViewCell?\n```\n\nNext, update the `collectionView(_:cellForItemAtIndexPath:)`\
    \ function to set the cell’s border when it’s dequeued, by adding these two lines\
    \ after the label has been updated:\n```swift\ncell.contentView.layer.borderColor\
    \ = UIColor.lightGrayColor().CGColor\ncell.contentView.layer.borderWidth = 2.0\n\
    ```\n\nNow update the `collectionView(_:canMoveAtIndexPath:)` function so that\
    \ it looks like Listing [12-36](#A978-1-4842-1242-4_12_Chapter.html#FPar43).\n\
    \n**Listing 12-36.** The Updated `collectionView(_:canMoveAtIndexPath:)` Function\n\
    ```swift\noverride func collectionView(collectionView: UICollectionView, canMoveItemAtIndexPath\n\
    indexPath: NSIndexPath) -> Bool {\n    selectedCell = collectionView.cellForItemAtIndexPath(indexPath)\n\
    \    selectedCell?.contentView.layer.borderColor = UIColor.redColor().CGColor\n\
    \    return true\n}\n```\n\nThis gets a reference to the cell that’s been selected,\
    \ and changes the color of the border to red as the interaction begins.\n\nTo\
    \ set the border color back to its original value when the interaction ends, update\
    \ the `collectionView(_:moveItemAtIndexPath:toIndexPath:)` function by adding\
    \ this line just before the `reloadData()` call:\n```swift\nselectedCell?.contentView.layer.borderColor\
    \ = UIColor.lightGrayColor().CGColor\n```\n\n### Using Drag-and-Drop Interaction\n\
    \nWith these updates in place, you can drag and drop cells to rearrange, as shown\
    \ in Figure [12-29](#A978-1-4842-1242-4_12_Chapter.html#Fig29).\n\n![A978-1-4842-1242-4_12_Fig29_HTML.jpg](A978-1-4842-1242-4_12_Fig29_HTML.jpg)\n\
    \n**Figure 12-29.** The drag-and-drop interaction in progress\n\n### Implementing\
    \ Drag-and-Drop with `UIViewController`\n\nIf your collection view is managed\
    \ by a `UIViewController` subclass rather than a `UICollectionViewController`,\
    \ there is slightly more involved in implementing drag-and-drop interaction. The\
    \ end result is exactly the same, however.\n\nTo begin with, follow the `UICollectionViewController`\
    \ process shown above to add the `UICollectionViewDelegate` functions and highlight\
    \ the moving cell.\n\n#### Adding Properties\n\nNext, you need to add three properties\
    \ to the view controller:\n```swift\nvar longPressGesture: UILongPressGestureRecognizer!\n\
    var panGesture: UIPanGestureRecognizer!\nvar selectedIndexPath: NSIndexPath!\n\
    ```\n\nThe `longPressGesture` property holds a reference to the gesture recognizer\
    \ that controls the start of the drag-and-drop process. `panGesture` holds a reference\
    \ to the gesture recognizer that handles the tracking of the cell underneath the\
    \ touch point; and `selectedIndexPath` is a reference to the cell that’s being\
    \ manipulated."
  raw: '#### Adding UICollectionViewDelegate Functions


    Next, there are two optional `UICollectionViewDelegate` functions that you need
    to implement:


    *   `collectionView(_:canMoveItemAtIndexPath:)`

    *   `collectionView(_:moveItemAtIndexPath:toIndexPath)`


    The first function simply controls whether the selected item can be moved or not,
    and is called before the interaction begins. You may have items that must remain
    in place, in which case you need to return `false` for those specific index paths.


    In your case, you’re allowing all items to move, so you simply return `true` from
    the function, as shown in Listing [12-34](#A978-1-4842-1242-4_12_Chapter.html#FPar40).


    Listing 12-34. collectionView(_:canMoveItemAtIndexPath:)


    `override func collectionView(collectionView: UICollectionView, canMoveItemAtIndexPath
    ➤`


    `indexPath: NSIndexPath) -> Bool {`


        `return true`


    `}`


    The second function is called once the interaction is completed. This is the point
    where you can update the underlying data source to match the changes in the collection
    view.


    Caution


    The action of rearranging the items in the collection view doesn’t update the
    underlying data model; the changes only take place in the view. If you don’t update
    the data model to reflect how the items have been moved, then the changes will
    disappear the next time the collection view updates.


    This function takes three parameters: the `collectionView` itself, the `indexPath`
    that the item came from, and the `indexPath` that it’s going to. Armed with this
    data, you can update the data according, as shown in Listing [12-35](#A978-1-4842-1242-4_12_Chapter.html#FPar42).


    Listing 12-35. Updating the Data Model


    `override func collectionView(collectionView: UICollectionView, moveItemAtIndexPath
    ➤`


    `sourceIndexPath: NSIndexPath, toIndexPath destinationIndexPath: NSIndexPath)
    {`


        `// Find object to move`


        `let thingToMove = dataArray[sourceIndexPath.row]`


        `// Remove old object`


        `dataArray.removeAtIndex(sourceIndexPath.row)`


        `// insert new copy of thing to move`


        `dataArray.insert(thingToMove, atIndex: destinationIndexPath.row)`


        `// Reload the data`


        `collectionView.reloadData()`


    `}`


    The final `reloadData()` call isn’t strictly necessary to update the view, but
    it means that the collectionView and its underlying data are back in sync once
    the interaction is completed.


    With those three changes implemented, you can now drag and drop cells around the
    collection view with impunity!


    #### Highlighting the Move


    As things stand, it can be a little difficult to see what’s going on as you’re
    moving a cell around, because the cell in motion looks the same as all the others.
    To make it stand out a little more, you can tap into the two delegate functions
    you’ve just implemented to highlight the cell while it’s in motion.


    To begin with, let’s change the background color of the cell when the pan gesture
    starts.


    Add a property to the class to hold a reference to the cell that’s in motion:


    `private var selectedCell: UICollectionViewCell?`


    Next, update the `collectionView(_:cellForItemAtIndexPath:)` function to set the
    cell’s border when it’s dequeued, by adding these two lines after the label has
    been updated:


    `cell.contentView.layer.borderColor = UIColor.lightGrayColor().CGColor`


    `cell.contentView.layer.borderWidth = 2.0`


    Now update the `collectionView(_:canMoveAtIndexPath:)` function so that it looks
    like Listing [12-36](#A978-1-4842-1242-4_12_Chapter.html#FPar43).


    Listing 12-36. The Updated collectionView(_:canMoveAtIndexPath:) Function


    `override func collectionView(collectionView: UICollectionView, canMoveItemAtIndexPath
    ➤`


    `indexPath: NSIndexPath) -> Bool {`


        `selectedCell = collectionView.cellForItemAtIndexPath(indexPath)`


        `selectedCell?.contentView.layer.borderColor = UIColor.redColor().CGColor`


        `return true`


    `}`


    This gets a reference to the cell that’s been selected, and changes the color
    of the border to red as the interaction begins.


    To set the border color back to its original value when the interaction ends,
    update the `collectionView(_:moveItemAtIndexPath:toIndexPath:)` function by adding
    this line just before the `reloadData()` call:


    `selectedCell?.contentView.layer.borderColor = UIColor.lightGrayColor().CGColor`


    #### Using Drag-and-Drop Interaction


    With these updates in place, you can drag and drop cells to rearrange, as shown
    in Figure [12-29](#A978-1-4842-1242-4_12_Chapter.html#Fig29).


    ![A978-1-4842-1242-4_12_Fig29_HTML.jpg](A978-1-4842-1242-4_12_Fig29_HTML.jpg)


    Figure 12-29.


    The drag-and-drop interaction in progress


    ### Implementing Drag-and-Drop with UIViewController


    If your collection view is managed by a `UIViewController` subclass rather than
    a `UICollectionViewController`, there is slightly more involved in implementing
    drag-and-drop interaction. The end result is exactly the same, however.


    To begin with, follow the `UICollectionViewController` process shown above to
    add the `UICollectionViewDelegate` functions and highlight the moving cell.


    #### Adding Properties


    Next, you need to add three properties to the view controller:


    `var longPressGesture: UILongPressGestureRecognizer!`


    `var panGesture: UIPanGestureRecognizer!`


    `var selectedIndexPath: NSIndexPath!`


    The `longPressGesture` property holds a reference to the gesture recognizer that
    controls the start of the drag-and-drop process. `panGesture` holds a reference
    to the gesture recognizer that handles the tracking of the cell underneath the
    touch point; and `selectedIndexPath` is a reference to the cell that’s being manipulated.'
  trans: "\n### 添加 `UICollectionViewDelegate` 函数\n\n接下来，你需要实现两个可选的 `UICollectionViewDelegate`\
    \ 函数：\n\n-   `collectionView(_:canMoveItemAtIndexPath:)`\n-   `collectionView(_:moveItemAtIndexPath:toIndexPath)`\n\
    \n第一个函数简单地控制选中的项目是否可以被移动，它会在交互开始前被调用。你可能有必须保持原位不动的项目，在这种情况下，你需要为这些特定的索引路径返回 `false`。\n\
    \n在你的示例中，你允许所有项目移动，因此只需从该函数返回 `true`，如代码清单 12-34 所示。\n\n**代码清单 12-34.** `collectionView(_:canMoveItemAtIndexPath:)`\n\
    ```swift\noverride func collectionView(collectionView: UICollectionView, canMoveItemAtIndexPath\n\
    indexPath: NSIndexPath) -> Bool {\n    return true\n}\n```\n\n第二个函数会在交互完成后被调用。此时，你可以更新底层数据源，使其与集合视图的变化相匹配。\n\
    \n> **警告：** 在集合视图中重新排列项目的操作并不会更新底层数据模型；这些变化仅发生在视图中。如果你不更新数据模型以反映项目的移动情况，那么当下次集合视图更新时，这些变化将会消失。\n\
    \n该函数接收三个参数：`collectionView` 自身、项目来源的 `indexPath` 以及项目目标位置的 `indexPath`。有了这些数据，你就可以相应地更新数据，如代码清单\
    \ 12-35 所示。\n\n**代码清单 12-35.** 更新数据模型\n```swift\noverride func collectionView(collectionView:\
    \ UICollectionView, moveItemAtIndexPath\nsourceIndexPath: NSIndexPath, toIndexPath\
    \ destinationIndexPath: NSIndexPath) {\n    // 找到要移动的对象\n    let thingToMove =\
    \ dataArray[sourceIndexPath.row]\n    // 移除旧对象\n    dataArray.removeAtIndex(sourceIndexPath.row)\n\
    \    // 插入要移动对象的新副本\n    dataArray.insert(thingToMove, atIndex: destinationIndexPath.row)\n\
    \    // 重新加载数据\n    collectionView.reloadData()\n}\n```\n\n最后的 `reloadData()`\
    \ 调用对于更新视图来说并非严格必需，但它确保了交互完成后 `collectionView` 与其底层数据能够重新同步。\n\n实现了这三处更改后，你就可以在集合视图中随心所欲地拖拽单元格了！\n\
    \n### 高亮移动过程\n\n目前来看，当你在移动单元格时，可能很难看清具体发生了什么，因为正在移动的单元格看起来和其他单元格一样。为了让其更加醒目，你可以利用刚实现的两个委托函数，在单元格移动时高亮显示它。\n\
    \n首先，让我们在手势开始平移时，更改单元格的背景颜色。\n\n向类中添加一个属性，用于保存对正在移动的单元格的引用：\n```swift\nprivate\
    \ var selectedCell: UICollectionViewCell?\n```\n\n接下来，更新 `collectionView(_:cellForItemAtIndexPath:)`\
    \ 函数，在单元格出列时设置其边框。在标签更新后添加以下两行代码：\n```swift\ncell.contentView.layer.borderColor\
    \ = UIColor.lightGrayColor().CGColor\ncell.contentView.layer.borderWidth = 2.0\n\
    ```\n\n现在更新 `collectionView(_:canMoveAtIndexPath:)` 函数，使其看起来像代码清单 12-36 所示。\n\n\
    **代码清单 12-36.** 更新后的 `collectionView(_:canMoveAtIndexPath:)` 函数\n```swift\noverride\
    \ func collectionView(collectionView: UICollectionView, canMoveItemAtIndexPath\n\
    indexPath: NSIndexPath) -> Bool {\n    selectedCell = collectionView.cellForItemAtIndexPath(indexPath)\n\
    \    selectedCell?.contentView.layer.borderColor = UIColor.redColor().CGColor\n\
    \    return true\n}\n```\n\n这段代码获取了被选中单元格的引用，并在交互开始时将边框颜色改为红色。\n\n要在交互结束时将边框颜色恢复为原始值，请在\
    \ `collectionView(_:moveItemAtIndexPath:toIndexPath:)` 函数中，于 `reloadData()` 调用之前添加以下代码行：\n\
    ```swift\nselectedCell?.contentView.layer.borderColor = UIColor.lightGrayColor().CGColor\n\
    ```\n\n### 使用拖放交互\n\n完成这些更新后，你就可以拖放单元格进行重新排列，如图 12-29 所示。\n\n![A978-1-4842-1242-4_12_Fig29_HTML.jpg](img/A978-1-4842-1242-4_12_Fig29_HTML.jpg)\n\
    \n**图 12-29.** 进行中的拖放交互\n\n### 使用 `UIViewController` 实现拖放\n\n如果你的集合视图是由 `UIViewController`\
    \ 子类而非 `UICollectionViewController` 管理的，那么实现拖放交互会稍微复杂一些。不过，最终效果是完全相同的。\n\n首先，按照上述\
    \ `UICollectionViewController` 的流程，添加 `UICollectionViewDelegate` 函数并高亮被移动的单元格。\n\
    \n#### 添加属性\n\n接下来，你需要向视图控制器添加三个属性：\n```swift\nvar longPressGesture: UILongPressGestureRecognizer!\n\
    var panGesture: UIPanGestureRecognizer!\nvar selectedIndexPath: NSIndexPath!\n\
    ```\n\n`longPressGesture` 属性保存了对控制拖放过程启动的手势识别器的引用。`panGesture` 保存了对处理触摸点下方单元格追踪的手势识别器的引用。而\
    \ `selectedIndexPath` 则是对正在被操作的单元格的引用。\n\n"
- fmt: "#### Adding the Gesture Recognizers\n\nNow you need to add the gesture recognizers\
    \ to the collection view. This is done in `viewDidLoad`, as shown in Listing [12-37](#A978-1-4842-1242-4_12_Chapter.html#FPar44).\n\
    \nListing 12-37. The Updated `viewDidLoad` Function\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    panGesture = UIPanGestureRecognizer(target:\
    \ self, action: \"handlePanGesture:\")\n    self.collectionView.addGestureRecognizer(panGesture)\n\
    \    panGesture.delegate = self\n    longPressGesture = UILongPressGestureRecognizer(target:\
    \ self, ➤\n  action: \"handleLongGesture:\")\n    self.collectionView.addGestureRecognizer(longPressGesture)\n\
    \    longPressGesture.delegate = self\n}\n```\n\nA new function is needed to handle\
    \ the `longGesture`; add this as shown in Listing [12-38](#A978-1-4842-1242-4_12_Chapter.html#FPar45).\n\
    \nListing 12-38. The `handleLongGesture(_:)` Function\n\n```\nfunc handleLongGesture(gesture:\
    \ UILongPressGestureRecognizer) {\n    switch(gesture.state) {\n    case UIGestureRecognizerState.Began:\n\
    \        selectedIndexPath = self.collectionView.indexPathForItemAtPoint➤\n  \
    \      (gesture.locationInView(self.collectionView))\n    case UIGestureRecognizerState.Changed:\n\
    \        break\n    default:\n        selectedIndexPath = nil\n    }\n}\n```\n\
    \nThis updates the `selectedIndexPath` in response to the `UILongPressGesture`\
    \ starting; and resets it when the gesture finishes.\n\nThe `handlePanGesture(_:)`\
    \ function is responsible for passing the movement to the collection view, so\
    \ add the code shown in Listing [12-39](#A978-1-4842-1242-4_12_Chapter.html#FPar46).\n\
    \nListing 12-39. The `handlePanGesture(_:)` Function\n\n```\nfunc handlePanGesture(gesture:\
    \ UIPanGestureRecognizer) {\n    switch(gesture.state) {\n    case UIGestureRecognizerState.Began:\n\
    \        collectionView.beginInteractiveMovementForItemAtIndexPath(selectedIndexPath!)\n\
    \    case UIGestureRecognizerState.Changed:\n        collectionView.updateInteractiveMovementTargetPosition\
    \ ➤\n        (gesture.locationInView(gesture.view!))\n    case UIGestureRecognizerState.Ended:\n\
    \        collectionView.endInteractiveMovement()\n    default:\n        collectionView.cancelInteractiveMovement()\n\
    \    }\n}\n```\n\nThere are three possible states of a pan gesture recognizer:\n\
    \n- `Began` is where you tell the collection view to begin moving the item at\
    \ the selected index path.\n- `Changed` occurs as the touch point moves, so the\
    \ collection view is told to move the target to match the touch point.\n- Finally,\
    \ `Ended` occurs after the touch-up event, at which point the collection view\
    \ is told to cancel the movement. This causes the moving element to “snap” into\
    \ its new position.\n\n#### Adding `UIGestureRecognizerDelegate` Functions\n\n\
    As you’ll have noticed in the updated `viewDidLoad` function, the two gesture\
    \ recognizers have delegates. These have both been set to the view controller.\
    \ You need to add two delegate functions. The easiest way to do this is to add\
    \ an extension to the view controller, as shown in Listing [12-40](#A978-1-4842-1242-4_12_Chapter.html#FPar47).\n\
    \nListing 12-40. The View Controller’s `UIGestureRecognizerDelegate` Extension\n\
    \n```\nextension ViewController: UIGestureRecognizerDelegate {\n    func gestureRecognizer(gestureRecognizer:\
    \ UIGestureRecognizer, ➤\n    shouldRecognizeSimultaneouslyWithGestureRecognizer\
    \ otherGestureRecognizer: ➤\n    UIGestureRecognizer) -> Bool {\n            if\
    \ gestureRecognizer == longPressGesture {\n                return panGesture ==\
    \ otherGestureRecognizer\n            }\n            if gestureRecognizer == panGesture\
    \ {\n                return longPressGesture == otherGestureRecognizer\n     \
    \       }\n            return true\n    }\n\n    func gestureRecognizerShouldBegin(gestureRecognizer:\
    \ UIGestureRecognizer) -> Bool {\n        guard gestureRecognizer == self.panGesture\
    \ else {\n            return true\n        }\n        return selectedIndexPath\
    \ != nil\n    }\n}\n```\n\n#### Finishing Up\n\nWith the extension functions in\
    \ place, you’re now ready to run the app, and see the drag-and-drop interaction\
    \ implemented in the view controller tab, as shown in Figure [12-30](#A978-1-4842-1242-4_12_Chapter.html#Fig30).\n\
    \n![A978-1-4842-1242-4_12_Fig30_HTML.jpg](A978-1-4842-1242-4_12_Fig30_HTML.jpg)\n\
    \nFigure 12-30.\n\nThe drag-and-drop interaction in progress\n\n## Summary\n\n\
    In this chapter, you looked at how tables and collection views can be extended\
    \ from being presenters of static, unreactive data to handle user input through\
    \ selection traits. You saw how they can be used to rearrange data and to facilitate\
    \ the updating of the underlying data model.\n\nFinally, you took things to their\
    \ logical conclusion and extended them still further to allow users to add, amend,\
    \ and delete information from the data model—taking tables and collection views\
    \ from being a read-only views to fully interactive components.\n\n# 13. Static\
    \ Tables\n\nMany table views are built dynamically, populating instances of prototype\
    \ cells on demand as the data is displayed. But that’s not the only way of building\
    \ them; static table views can also be useful components of a user interface.\n\
    \nWith a static table, you define the cells and their contents up front. This\
    \ is useful in situations where you know the content to be displayed won’t change,\
    \ such as when displaying a list of settings. Many parts of the built-in iOS Settings\
    \ app are based on a static table view, as shown in Figure [13-1](#A978-1-4842-1242-4_13_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1242-4_13_Fig1_HTML.jpg](A978-1-4842-1242-4_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1.\n\nA static table used to display the Display & Brightness controls\
    \ in the Settings app\n\nStatic tables can also be used to take advantage of the\
    \ layout flexibility that a table view offers, even for static content, and even\
    \ if the interface looks nothing like a table at first glance.\n\nIn this chapter,\
    \ you’ll look at the process of building static tables, and some of the uses for\
    \ such tables.\n\n## How to Build Static Tables\n\nWhen you add a table view object,\
    \ either as a child of an existing view, or as the root object of a table view\
    \ controller scene, it appears with an area for prototype content, as shown in\
    \ Figure [13-2](#A978-1-4842-1242-4_13_Chapter.html#Fig2).\n\n![A978-1-4842-1242-4_13_Fig2_HTML.jpg](A978-1-4842-1242-4_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2.\n\nThe prototype content area\n\nIn [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html),\
    \ you looked at how to add prototype cells that could then be used by the table\
    \ view’s `dataSource` as “templates” for cells that are created at runtime.\n\n\
    The table view controller control in a Storyboard or XIB can also be used to create\
    \ static cells; these are created and laid out up front, so they aren’t created\
    \ dynamically at runtime.\n\n> Tip: Static table view cells can only be created\
    \ in a Storyboard when you are using a `UITableViewController`. If you try to\
    \ create static cells in a `UITableView`, Xcode will complain."
  raw: '#### Adding the Gesture Recognizers


    Now you need to add the gesture recognizers to the collection view. This is done
    in `viewDidLoad`, as shown in Listing [12-37](#A978-1-4842-1242-4_12_Chapter.html#FPar44).


    Listing 12-37. The Updated viewDidLoad Function


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `panGesture = UIPanGestureRecognizer(target: self, action: "handlePanGesture:")`


        `self.collectionView.addGestureRecognizer(panGesture)`


        `panGesture.delegate = self`


        `longPressGesture = UILongPressGestureRecognizer(target: self, ➤`


      `action: "handleLongGesture:")`


        `self.collectionView.addGestureRecognizer(longPressGesture)`


        `longPressGesture.delegate = self`


    `}`


    A new function is needed to handle the `longGesture;` add this as shown in Listing
    [12-38](#A978-1-4842-1242-4_12_Chapter.html#FPar45).


    Listing 12-38. The handleLongGesture(_:) Function


    `func handleLongGesture(gesture: UILongPressGestureRecognizer) {`


        `switch(gesture.state) {`


        `case UIGestureRecognizerState.Began:`


            `selectedIndexPath = self.collectionView.indexPathForItemAtPoint➤`


            `(gesture.locationInView(self.collectionView))`


        `case UIGestureRecognizerState.Changed:`


            `break`


        `default:`


            `selectedIndexPath = nil`


        `}`


    `}`


    This updates the `selectedIndexPath` in response to the `UILongPressGesture` starting;
    and resets it when the gesture finishes.


    The `handlePanGesture(_:)` function is responsible for passing the movement to
    the collection view, so add the code shown in Listing [12-39](#A978-1-4842-1242-4_12_Chapter.html#FPar46).


    Listing 12-39. The handlePanGesture(_:) Function


    `func handlePanGesture(gesture: UIPanGestureRecognizer) {`


        `switch(gesture.state) {`


        `case UIGestureRecognizerState.Began:`


            `collectionView.beginInteractiveMovementForItemAtIndexPath(selectedIndexPath!)`


        `case UIGestureRecognizerState.Changed:`


            `collectionView.updateInteractiveMovementTargetPosition ➤`


            `(gesture.locationInView(gesture.view!))`


        `case UIGestureRecognizerState.Ended:`


            `collectionView.endInteractiveMovement()`


        `default:`


            `collectionView.cancelInteractiveMovement()`


        `}`


    `}`


    There are three possible states of a pan gesture recognizer:


    *   `Began` is where you tell the collection view to begin moving the item at
    the selected index path.

    *   `Changed` occurs as the touch point moves, so the collection view is told
    to move the target to match the touch point.

    *   Finally, `Ended` occurs after the touch-up event, at which point the collection
    view is told to cancel the movement. This causes the moving element to “snap”
    into its new position.


    #### Adding UIGestureRecognizerDelegate Functions


    As you’ll have noticed in the updated `viewDidLoad` function, the two gesture
    recognizers have delegates. These have both been set to the view controller. You
    need to add two delegate functions. The easiest way to do this is to add an extension
    to the view controller, as shown in Listing [12-40](#A978-1-4842-1242-4_12_Chapter.html#FPar47).


    Listing 12-40. The View Controller’s UIGestureRecognizerDelegate Extension


    `extension ViewController: UIGestureRecognizerDelegate {`


        `func gestureRecognizer(gestureRecognizer: UIGestureRecognizer, ➤`


        `shouldRecognizeSimultaneouslyWithGestureRecognizer otherGestureRecognizer:
    ➤`


        `UIGestureRecognizer) -> Bool {`


                `if gestureRecognizer == longPressGesture {`


                    `return panGesture == otherGestureRecognizer`


                `}`


                `if gestureRecognizer == panGesture {`


                    `return longPressGesture == otherGestureRecognizer`


                `}`


                `return true`


        `}`


        `func gestureRecognizerShouldBegin(gestureRecognizer: UIGestureRecognizer)
    -> Bool {`


            `guard gestureRecognizer == self.panGesture else {`


                `return true`


            `}`


            `return selectedIndexPath != nil`


        `}`


    `}`


    #### Finishing Up


    With the extension functions in place, you’re now ready to run the app, and see
    the drag-and-drop interaction implemented in the view controller tab, as shown
    in Figure [12-30](#A978-1-4842-1242-4_12_Chapter.html#Fig30).


    ![A978-1-4842-1242-4_12_Fig30_HTML.jpg](A978-1-4842-1242-4_12_Fig30_HTML.jpg)


    Figure 12-30.


    The drag-and-drop interaction in progress


    ## Summary


    In this chapter, you looked at how tables and collection views can be extended
    from being presenters of static, unreactive data to handle user input through
    selection traits. You saw how they can be used to rearrange data and to facilitate
    the updating of the underlying data model.


    Finally, you took things to their logical conclusion and extended them still further
    to allow users to add, amend, and delete information from the data model—taking
    tables and collection views from being a read-only views to a fully interactive
    components.


    # 13. Static Tables


    Many table views are built dynamically, populating instances of prototype cells
    on demand as the data is displayed. But that’s not the only way of building them;
    static table views can also be useful components of a user interface.


    With a static table, you define the cells and their contents up front. This is
    useful in situations where you know the content to be displayed won’t change,
    such as when displaying a list of settings. Many parts of the built-in iOS Settings
    app are based on a static table view, as shown in Figure [13-1](#A978-1-4842-1242-4_13_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_13_Fig1_HTML.jpg](A978-1-4842-1242-4_13_Fig1_HTML.jpg)


    Figure 13-1.


    A static table used to display the Display & Brightness controls in the Settings
    app


    Static tables can also be used to take advantage of the layout flexibility that
    a table view offers, even for static content, and even if the interface looks
    nothing like a table at first glance.


    In this chapter, you’ll look at the process of building static tables, and some
    of the uses for such tables.


    ## How to Build Static Tables


    When you add a table view object, either as a child of an existing view, or as
    the root object of a table view controller scene, it appears with an area for
    prototype content, as shown in Figure [13-2](#A978-1-4842-1242-4_13_Chapter.html#Fig2).


    ![A978-1-4842-1242-4_13_Fig2_HTML.jpg](A978-1-4842-1242-4_13_Fig2_HTML.jpg)


    Figure 13-2.


    The prototype content area


    In [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html), you looked at how to add prototype
    cells that could then be used by the table view’s `dataSource` as “templates”
    for cells that are created at runtime.


    The table view controller control in a Storyboard or XIB can also be used to create
    static cells; these are created and laid out up front, so they aren’t created
    dynamically at runtime.


    Tip


    Static table view cells can only be created in a Storyboard when you are using
    a `UITableViewController`. If you try to create static cells in a `UITableView`,
    Xcode will complain.'
  trans: "\n#### 添加手势识别器\n\n现在需要在集合视图上添加手势识别器。这一操作在`viewDidLoad`中完成，如代码清单 12-37 所示。\n\
    \n代码清单 12-37. 更新后的`viewDidLoad`函数\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    panGesture = UIPanGestureRecognizer(target: self, action: \"handlePanGesture:\"\
    )\n    self.collectionView.addGestureRecognizer(panGesture)\n    panGesture.delegate\
    \ = self\n    longPressGesture = UILongPressGestureRecognizer(target: self, ➤\n\
    \  action: \"handleLongGesture:\")\n    self.collectionView.addGestureRecognizer(longPressGesture)\n\
    \    longPressGesture.delegate = self\n}\n```\n\n需要新增一个函数来处理`longGesture`；请按代码清单\
    \ 12-38 所示添加。\n\n代码清单 12-38. `handleLongGesture(_:)`函数\n\n```\nfunc handleLongGesture(gesture:\
    \ UILongPressGestureRecognizer) {\n    switch(gesture.state) {\n    case UIGestureRecognizerState.Began:\n\
    \        selectedIndexPath = self.collectionView.indexPathForItemAtPoint➤\n  \
    \      (gesture.locationInView(self.collectionView))\n    case UIGestureRecognizerState.Changed:\n\
    \        break\n    default:\n        selectedIndexPath = nil\n    }\n}\n```\n\
    \n该函数在`UILongPressGesture`开始时更新`selectedIndexPath`；并在手势结束时重置它。\n\n`handlePanGesture(_:)`函数负责将移动操作传递给集合视图，因此请添加代码清单\
    \ 12-39 所示的代码。\n\n代码清单 12-39. `handlePanGesture(_:)`函数\n\n```\nfunc handlePanGesture(gesture:\
    \ UIPanGestureRecognizer) {\n    switch(gesture.state) {\n    case UIGestureRecognizerState.Began:\n\
    \        collectionView.beginInteractiveMovementForItemAtIndexPath(selectedIndexPath!)\n\
    \    case UIGestureRecognizerState.Changed:\n        collectionView.updateInteractiveMovementTargetPosition\
    \ ➤\n        (gesture.locationInView(gesture.view!))\n    case UIGestureRecognizerState.Ended:\n\
    \        collectionView.endInteractiveMovement()\n    default:\n        collectionView.cancelInteractiveMovement()\n\
    \    }\n}\n```\n\n平移手势识别器有三种可能的状态：\n\n- `Began`：在此状态下通知集合视图开始移动所选索引路径上的项目。\n-\
    \ `Changed`：当触摸点移动时触发，此时通知集合视图将目标位置移动到与触摸点匹配的位置。\n- 最后，`Ended` 在触摸抬起事件后触发，此时通知集合视图取消移动。这会导致移动中的元素“吸附”到新位置。\n\
    \n#### 添加`UIGestureRecognizerDelegate`函数\n\n正如你在更新后的`viewDidLoad`函数中所注意到的，两个手势识别器都有代理。这些代理都已设置为视图控制器。你需要添加两个代理函数。最简便的方法是为视图控制器添加一个扩展，如代码清单\
    \ 12-40 所示。\n\n代码清单 12-40. 视图控制器的`UIGestureRecognizerDelegate`扩展\n\n```\nextension\
    \ ViewController: UIGestureRecognizerDelegate {\n    func gestureRecognizer(gestureRecognizer:\
    \ UIGestureRecognizer, ➤\n    shouldRecognizeSimultaneouslyWithGestureRecognizer\
    \ otherGestureRecognizer: ➤\n    UIGestureRecognizer) -> Bool {\n            if\
    \ gestureRecognizer == longPressGesture {\n                return panGesture ==\
    \ otherGestureRecognizer\n            }\n            if gestureRecognizer == panGesture\
    \ {\n                return longPressGesture == otherGestureRecognizer\n     \
    \       }\n            return true\n    }\n\n    func gestureRecognizerShouldBegin(gestureRecognizer:\
    \ UIGestureRecognizer) -> Bool {\n        guard gestureRecognizer == self.panGesture\
    \ else {\n            return true\n        }\n        return selectedIndexPath\
    \ != nil\n    }\n}\n```\n\n#### 收尾工作\n\n完成扩展函数后，你现在可以运行应用，并查看在视图控制器标签页中实现的拖拽交互效果，如图\
    \ 12-30 所示。\n\n![A978-1-4842-1242-4_12_Fig30_HTML.jpg](img/A978-1-4842-1242-4_12_Fig30_HTML.jpg)\n\
    \n图 12-30.\n\n正在进行的拖拽交互\n\n## 本章小结\n\n在本章中，你了解了如何将表格和集合视图从静态、无响应的数据展示器扩展为能够通过选择特性处理用户输入的组件。你看到了如何利用它们重新排列数据，以及促进底层数据模型的更新。\n\
    \n最后，你将这一逻辑推向了极致，进一步扩展它们，允许用户对数据模型进行添加、修改和删除操作——将表格和集合视图从只读视图转变为完全交互式的组件。\n\n\
    # 13. 静态表格\n\n许多表格视图是动态构建的，在显示数据时按需填充原型单元格的实例。但这并非构建表格的唯一方式；静态表格视图也可以是用户界面中有用的组件。\n\
    \n使用静态表格时，你需要预先定义单元格及其内容。这在你知道要显示的内容不会改变的情况下非常有用，例如显示设置列表时。iOS 内置的“设置”应用中的许多部分都基于静态表格视图，如图\
    \ 13-1 所示。\n\n![A978-1-4842-1242-4_13_Fig1_HTML.jpg](img/A978-1-4842-1242-4_13_Fig1_HTML.jpg)\n\
    \n图 13-1.\n\n在“设置”应用中用于显示“显示与亮度”控件的静态表格\n\n即使对于静态内容，甚至当界面乍一看完全不像表格时，静态表格也可以利用表格视图提供的布局灵活性。\n\
    \n在本章中，你将了解构建静态表格的过程，以及此类表格的一些用途。\n\n## 如何构建静态表格\n\n当你添加一个表格视图对象时（无论是作为现有视图的子视图，还是作为表格视图控制器场景的根对象），它都会显示一个用于原型内容的区域，如图\
    \ 13-2 所示。\n\n![A978-1-4842-1242-4_13_Fig2_HTML.jpg](img/A978-1-4842-1242-4_13_Fig2_HTML.jpg)\n\
    \n图 13-2.\n\n原型内容区域\n\n在第 7 章中，你了解了如何添加原型单元格，这些单元格可以被表格视图的`dataSource`用作运行时创建的单元格的“模板”。\n\
    \nStoryboard 或 XIB 中的表格视图控制器控件也可以用于创建静态单元格；这些单元格是预先创建和布局的，因此不会在运行时动态创建。\n\n> 提示：仅当你在使用`UITableViewController`时，才能在\
    \ Storyboard 中创建静态表格视图单元格。如果你尝试在`UITableView`中创建静态单元格，Xcode 会报错。\n"
- fmt: '### Adding Static Cells to the Table View


    Static cells are added as prototypes by switching the table view’s `Content` attribute
    from the default `Dynamic Prototype` value to `Static Cells`. This is set in the
    Attributes Inspector, as shown in Figure [13-3](#A978-1-4842-1242-4_13_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_13_Fig3_HTML.jpg](A978-1-4842-1242-4_13_Fig3_HTML.jpg)


    Figure 13-3. Switching to static cells


    As soon as you change this, you’ll see that the table view updates to add a new
    section containing three cells (you may need to expand the scene’s Hierarchy tree
    to expose the new controls). See Figure [13-4](#A978-1-4842-1242-4_13_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_13_Fig4_HTML.jpg](A978-1-4842-1242-4_13_Fig4_HTML.jpg)


    Figure 13-4. The new section and static cells


    The new cells are the standard 44 points high with a transparent separator so
    it’s not immediately apparent whether anything is there, but you can change this
    by playing around with the attributes of the table, section, and cell in the Attributes
    Inspector.


    Figure [13-5](#A978-1-4842-1242-4_13_Chapter.html#Fig5) shows an updated table
    that now includes some header and footer text, together with a light gray cell
    separator. The three cells have been changed from `Custom` to `Default`, and the
    title fields have been updated.


    ![A978-1-4842-1242-4_13_Fig5_HTML.jpg](A978-1-4842-1242-4_13_Fig5_HTML.jpg)


    Figure 13-5. The updated cells


    If you run the app now (shown in Figure [13-6](#A978-1-4842-1242-4_13_Chapter.html#Fig6)),
    you’ll see that the table view appears with the three cells, all without the need
    to implement any `UITableViewDataSource` methods!


    ![A978-1-4842-1242-4_13_Fig6_HTML.jpg](A978-1-4842-1242-4_13_Fig6_HTML.jpg)


    Figure 13-6. The initial static table in action


    ### Fixing Scrolling


    By default, the table view will scroll, even if there are not enough rows to fill
    the view. This can look strange in a static table view, so if you’re sure that
    all your content will fit onto a single screen even on smaller devices (and where
    appropriate, in landscape orientations) then you may want to prevent the table
    from scrolling.


    To prevent scrolling, select the `TableView` in the view hierarchy, and uncheck
    the `Scrolling Enabled` setting in the Attributes Inspector (Figure [13-7](#A978-1-4842-1242-4_13_Chapter.html#Fig7)).


    ![A978-1-4842-1242-4_13_Fig7_HTML.jpg](A978-1-4842-1242-4_13_Fig7_HTML.jpg)


    Figure 13-7. Preventing the table from scrolling


    ### Adding Controls to the Static Cells


    With the static cells in place, you’re now ready to start customizing them. If
    you change the cell types back to `Custom`, you can treat the content view of
    each cell as if it was an empty `UIView` — placing other controls inside and positioning
    them with AutoLayout constraints.


    #### Adjusting the Cell Heights


    Before placing other controls in the cell, you’ll probably need to adjust the
    height. By default, the empty custom cells have a height of 44 points. To change
    this, select the row in the object hierarchy, then adjust the row height in the
    Size Inspector, as shown in Figure [13-8](#A978-1-4842-1242-4_13_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_13_Fig8_HTML.jpg](A978-1-4842-1242-4_13_Fig8_HTML.jpg)


    Figure 13-8. Adjusting the row height


    #### Adding Interactive Controls


    Linking controls to methods in a static table view is done in the standard way:
    the control event is linked to an `IBAction` method in a controller, which is
    triggered by user interaction.


    But you’ve added a `UITableViewController` scene without an associated `UIViewController`
    subclass, so the question that arises is, link to an `IBAction` method where?


    The answer is “In some controller class that does exist.” In this case, you could
    link the buttons in the static table view to `IBAction` methods in a `UIViewController`
    subclass that you either added previously, or create to handle this `UITableViewController`
    scene.


    In order to connect this static table’s scene up to a view controller, you need
    to add a reference to the view controller. To do this, select an object from the
    Object browser, and drag this into the table view controller’s scene, as shown
    in Figure [13-9](#A978-1-4842-1242-4_13_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_13_Fig9_HTML.jpg](A978-1-4842-1242-4_13_Fig9_HTML.jpg)


    Figure 13-9. Adding the object to the scene


    This also now shows up as a placeholder in the scene’s header, as shown in Figure
    [13-10](#A978-1-4842-1242-4_13_Chapter.html#Fig10).


    ![A978-1-4842-1242-4_13_Fig10_HTML.jpg](A978-1-4842-1242-4_13_Fig10_HTML.jpg)


    Figure 13-10. The object in the scene’s header


    With the Object placeholder selected, switch to the Identity Inspector and update
    the `Custom Class` value to the class that this will represent (in this case,
    add the `didTapStaticTableButton IBAction` method to the `ViewController` class),
    as shown in Figure [13-11](#A978-1-4842-1242-4_13_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_13_Fig11_HTML.jpg](A978-1-4842-1242-4_13_Fig11_HTML.jpg)


    Figure 13-11. Setting the custom class


    With the class set, you can now Ctrl-drag from the control to the placeholder,
    where the available `IBAction` methods will show up in the HUD, as shown in Figure
    [13-12](#A978-1-4842-1242-4_13_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_13_Fig12_HTML.jpg](A978-1-4842-1242-4_13_Fig12_HTML.jpg)


    Figure 13-12. Connecting controls to actions


    ### Using Static Tables Inside Container Views


    Up to now, you’ve been creating static table layouts inside `UITableViewController`
    scenes placed in the Storyboard. That’s fine, but the `UITableViewController`
    scene makes assumptions about how it’s going to be used, chiefly that it will
    be displayed full-screen.


    So what can you do if you want to include a static table view inside another view
    controller (if it doesn’t fill the full interface, for example)?


    You could try adding a standard `UITableView` object into the view controller’s
    view as if you were building a dynamic table view. Interface Builder will let
    you change the table view from dynamic prototypes and static cells, and lay out
    the static cells, as you did earlier in this chapter.


    When you come to build the project, though, the compiler will refuse, with the
    error shown in Figure [13-13](#A978-1-4842-1242-4_13_Chapter.html#Fig13).


    ![A978-1-4842-1242-4_13_Fig13_HTML.jpg](A978-1-4842-1242-4_13_Fig13_HTML.jpg)


    Figure 13-13. The error that occurs if you try to build static cells in a standard
    `UITableView`


    That’s annoying, to say the least. So what’s the work-around?


    The answer is to use a `UITableViewController` to create the static table layout
    as you have done previously, and then embed this into a container inside the `UIViewController`.


    #### Prerequisites


    As the exact configuration will depend on the structure of your project, I’ll
    show a hypothetical situation. I’ve assumed that you’ve built a static table layout
    using a `UITableViewController` as described earlier in the chapter; but now you’ve
    realized that you need to present this inside another view.


    I’ve also assumed that your `UITableViewController` is the only scene inside a
    Storyboard, so you’ll be starting with something that looks like Figure [13-14](#A978-1-4842-1242-4_13_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_13_Fig14_HTML.jpg](A978-1-4842-1242-4_13_Fig14_HTML.jpg)


    Figure 13-14. The `UITableViewController` configured, but alone in the Storyboard'
