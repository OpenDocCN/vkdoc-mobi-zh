    \ 术语中，页面对应于集合视图的边界，单词类似于集合视图的项目。每行单词对应于一个集合视图行。参见图 15-4。\n\n![A978-1-4842-1242-4_15_Fig4_HTML.jpg](img/A978-1-4842-1242-4_15_Fig4_HTML.jpg)\n\
    \n图 15-4. 流布局如何运作\n\n这个类比可以进一步延伸：流布局可以分成带有页眉和页脚的区块，就像页面可以分成带有标题的段落。正如单个单词有不同的长度，流布局也可以显示不同大小（水平和垂直方向）的项目。\n\
    \n## UICollectionViewFlowLayout\n\n`UICollectionViewFlowLayout`是`UICollectionViewLayout`的一个具体子类，它添加了许多属性来控制项目的流动。它处理了涉及项目和行间距以及换行的大部分计算。\n\
    \n你可以控制的属性如下：\n\n- 滚动方向（相对于集合视图的垂直或水平方向）\n- 行间距和项目间距\n- 项目大小\n- 页眉和页脚大小\n- 区块边距\n\
    \n一旦你提供了这些值，流布局就会处理所有涉及如何定位和间隔项目、以及何时换行以将所有项目整齐地放入可用空间的计算。\n\n`UICollectionViewFlowLayout`的大小和间距属性全局应用于所有项目、页眉、页脚和区块，如果集合视图的项目大小恒定，这将非常有用。如果你需要显示不同大小的项目，则需要实现一个符合`UICollectionViewDelegateFlowLayout`协议的可选委托对象。\n\
    \n流布局的委托对象提供了对项目大小、区块间距以及页眉和页脚大小的精细控制。如果你的项目大小会变化，例如在构建一个显示不同高度或宽度缩略图图像的图库时，这将非常有用。\n\
    \n委托协议的所有函数都是可选的，因此除非你需要控制相关属性，否则无需实现它们。\n"
- fmt: "# Creating and Configuring Flow Layouts\n\nYou can create `UICollectionViewFlowLayouts`\
    \ in code or in Interface Builder. Regardless of which approach you take, there\
    \ are six steps involved.\n\n- Create an instance of `UICollectionViewFlowLayout`.\n\
    - Assign the flow layout to the collection view that will use it.\n- Provide values\
    \ for the height and width of the cells if the cells will all be the same size.\
    \ If your layout will have different sizes, you’ll need to implement the collection\
    \ view delegate’s `collectionView(_:layout:sizeForItemAtIndexPath:)` function.\n\
    - If required, set values for the item and line spacing (or implement the delegate\
    \ functions if they will vary).\n- Optionally, specify sizes for the section headers\
    \ and footers (again implementing the delegate functions for sizes that will vary).\n\
    - Set the layout’s direction of scrolling (either vertically or horizontally relative\
    \ to the collection view itself).\n\n## Instantiating a Flow Layout\n\nTo instantiate\
    \ a flow layout, you have two options:\n\n- Create and configure the flow layout\
    \ in code.\n- Configure the flow layout in Interface Builder.\n\n### Creating\
    \ and Configuring a Flow Layout in Code\n\nCreating a flow layout in code has\
    \ two basic steps:\n\n- Instantiating a flow layout object\n- Setting this as\
    \ the collection view’s layout\n\nOnce the flow layout is created and attached\
    \ to the collection view, you have two options:\n\n- Set the flow layout’s properties\
    \ directly if all configurable values will be static for the lifetime of the collection\
    \ view, or\n- Implement the relevant `UICollectionViewDelegateFlowLayout` functions\
    \ to dynamically configure the flow layout’s properties.\n\n#### Creating the\
    \ Flow Layout\n\nCreating a flow layout object isn’t difficult. If the values\
    \ will be static, then you don’t need to create a property for it:\n\n```\nlet\
    \ flowLayout = UICollectionViewFlowLayout()\n```\n\nIf the values will be set\
    \ by `UICollectionViewDelegateFlowLayout` functions, you need to declare a property\
    \ before instantiating it, so that the delegate functions will have a reference\
    \ available:\n\n```\nlet flowLayout = UICollectionViewFlowLayout()\n```\n\n####\
    \ Setting the Collection View’s Layout\n\nOnce there’s an instantiated flow layout,\
    \ the next step is to set this as the collection view’s layout. Assuming that\
    \ you have a collection view called `myCollectionView` and a flow layout called\
    \ `flowLayout`, you would do this with\n\n```\nmyCollectionView.collectionViewLayout\
    \ = flowLayout\n```\n\nIt’s possible to change a collection view’s layout at runtime,\
    \ although this will cause the items to be reloaded.\n\n#### Configuring Static\
    \ Flow Layout Values\n\nIf the items in your collection view will all have the\
    \ same size, then you can set the flow layout attributes globally. For example,\n\
    \n```\nflowLayout.scrollDirection = .Vertical\nflowLayout.itemSize = CGSizeMake(200,\
    \ 100)\nflowLayout.minimumInteritemSpacing = 10.0\nflowLayout.minimumLineSpacing\
    \ = 10.0\nflowLayout.sectionInset = UIEdgeInsetsMake(25.0, 25.0, 25.0, 25.0)\n\
    ```\n\nDetails of the various flow layout attributes that you can control are\
    \ shown in the following sections.\n\n#### Configuring Flow Layout Values Dynamically\n\
    \nIf elements such as items, headers, or footers will be updated dynamically in\
    \ response to the data model, then you can’t set attributes relating to dynamic\
    \ item properties directly. Instead, you’ll need to create an object to act as\
    \ the flow layout’s delegate, and implement the relevant `UICollectionViewDelegateFlowLayout`\
    \ function(s). This is covered in detail in the next section.\n\n### Configuring\
    \ a Flow Layout in Interface Builder\n\nWhen you drag a collection view or collection\
    \ view controller out into a Storyboard or XIB, it comes with a `UICollectionViewFlowLayout`\
    \ attached, as shown in Figure 15-5.\n\n![A978-1-4842-1242-4_15_Fig5_HTML.jpg](A978-1-4842-1242-4_15_Fig5_HTML.jpg)\n\
    \nFigure 15-5. The flow layout attached to the collection view\n\nSelecting this\
    \ allows you to set the following basic properties statically for all items in\
    \ the collection view:\n\n- The scroll direction, which is found in the Attributes\
    \ inspector, as shown in Figure 15-6.\n\n  ![A978-1-4842-1242-4_15_Fig6_HTML.jpg](A978-1-4842-1242-4_15_Fig6_HTML.jpg)\n\
    \n  Figure 15-6. Setting the scroll direction\n\n- Cell size and spacing, and\
    \ header and footer sizes. These are found in the Size inspector, shown in Figure\
    \ 15-7.\n\n  ![A978-1-4842-1242-4_15_Fig7_HTML.jpg](A978-1-4842-1242-4_15_Fig7_HTML.jpg)\n\
    \n  Figure 15-7. Setting sizes\n\nIf you need to set these values dynamically,\
    \ you need connect the flow layout to an outlet in your controller and manage\
    \ the values in code.\n\nTo do this, first create an outlet for the flow layout:\n\
    \n```\n@IBOutlet var flowLayout: UICollectionViewFlowLayout!\n```\n\nThen connect\
    \ the outlet with the flow layout object in Interface Builder.\n\nOnce connected,\
    \ you can set the values from within the controller, like so:\n\n```\nflowLayout.itemSize\
    \ = CGSizeMake(100, 100)\nflowLayout.scrollDirection = .Vertical\n```\n\n# Customizing\
    \ Flow Layouts\n\nDespite implementing all the heavy lifting of figuring out where\
    \ line breaks should occur, `UICollectionViewFlowLayout` still allows for a high\
    \ degree of customization within the constraints of a line-based layout.\n\nThe\
    \ attributes of `UICollectionViewFlowLayout` that you can customize are shown\
    \ in Figure 15-8.\n\n![A978-1-4842-1242-4_15_Fig8_HTML.jpg](A978-1-4842-1242-4_15_Fig8_HTML.jpg)\n\
    \nFigure 15-8. The UICollectionViewFlowLayout attributes\n\nThe attributes can\
    \ be customised though a mix of directly setting the property of the `UICollectionViewFlowLayout`\
    \ object or by implementing the appropriate `UICollectionViewDelegateFlowLayout`\
    \ function.\n\n## Customizing with Attributes\n\nThe following attributes can\
    \ be customized by directly setting the properties of the `UICollectionViewFlowLayout`\
    \ object, such as\n\n```\ncollectionView.scrollingDirection = .Vertical\n```\n\
    \n### Scrolling Direction\n\nScrolling direction determines whether collection\
    \ view scrolls vertically or horizontally. The lines of items are laid out perpendicularly\
    \ to the direction of scrolling, as shown in Figure 15-9.\n\n| Property | Value\
    \ | Effect |\n| --- | --- | --- |\n| `scrollDirection` | `UICollectionViewScrollDirection.Vertical`\
    \ | Forces the collection view to scroll vertically and arrange lines of items\
    \ horizontally |\n| | `UICollectionViewScrollDirection.Horizontal` | Forces the\
    \ collection view to scroll horizontally and arrange lines of items vertically\
    \ |\n\n![A978-1-4842-1242-4_15_Fig9_HTML.jpg](A978-1-4842-1242-4_15_Fig9_HTML.jpg)\n\
    \nFigure 15-9. Scroll direction\n\n### Item Size\n\nItem size determines the width\
    \ and height of each collection view cell, regardless of the intrinsic size of\
    \ the cell contents. If left unset, it will default to `(50.0, 50.0)`.\n\nIf the\
    \ `UICollectionViewDelegateFlowLayout collectionView:layout:sizeForItemAtIndexPath:`\
    \ function is implemented, this will override any item size value that is set\
    \ directly on the flow layout object.\n\n| Property | Value | Effect |\n| ---\
    \ | --- | --- |\n| `itemSize` | `CGSize` | Sets the size and width of each collection\
    \ view item |"
