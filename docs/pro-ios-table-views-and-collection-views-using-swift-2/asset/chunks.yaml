    used in practice. Then in the second section, you’ll build a simple “Hello, world”-style
    collection view app to introduce you to the components behind the user interface
    and help you to contextualize the detail that’s going to come in later chapters.


    If you’re just starting to use collection views, it’s worth taking some time to
    build a very simple one from scratch before diving into the gnarly details. However,
    if you’ve reached the stage where you feel more confident about how the components
    of the collection view jigsaw fit together and want to get straight into the code,
    feel free to skip the rest of this chapter completely. I’ll cover the elements
    in detail later, so you won’t miss out.'
  trans: '

    ### 使用 UITableViewController 创建 UITableView


    要使 `tableView` 正常运行，需要实现多个 `UITableViewDelegate` 和 `UITableViewDataSource` 方法。


    虽然 Xcode 的自动补全功能有助于输入，但手动编写所有方法可能会导致重复性劳损。为了解放你的手腕、加快开发速度，不妨创建一个 `UITableViewController`
    子类！


    这一过程非常简单。只需在下拉子类列表中选择 `UITableViewController`，而不是创建普通的 `UIViewController` 实例，如图
    2-11 所示。


    ![A978-1-4842-1242-4_2_Fig11_HTML.jpg](img/A978-1-4842-1242-4_2_Fig11_HTML.jpg)


    图 2-11. 创建 UITableViewController 实例


    新的类文件将照常创建，但会附带一些额外内容。除了常规的 `UIViewController` 方法外，你还会在文件中找到一些已提供框架的 `UITableViewDataSource`
    方法（见图 2-12）。


    ![A978-1-4842-1242-4_2_Fig12_HTML.jpg](img/A978-1-4842-1242-4_2_Fig12_HTML.jpg)


    图 2-12. UITableViewDataSource 方法


    这是 `UITableViewController`、`delegate` 和 `dataSource` 中最少必要的方法子集，足以让你快速上手，并且该类的头文件会声明它遵循这两个协议。


    Xcode 还提供了许多被注释掉的其他方法：


    ```

    override func tableView(tableView: UITableView, canMoveRowAtIndexPath indexPath:
    NSIndexPath) -> Bool


    override func tableView(tableView: UITableView, moveRowAtIndexPath fromIndexPath:
    NSIndexPath, toIndexPath: NSIndexPath)


    override func tableView(tableView: UITableView, commitEditingStyle editingStyle:
    UITableViewCellEditingStyle, forRowAtIndexPath indexPath: NSIndexPath)


    override func tableView(tableView: UITableView, canEditRowAtIndexPath indexPath:
    NSIndexPath) -> Bool

    ```


    这些方法并非必须实现，但它们作为骨架方法存在，当你需要时，可以取消注释后直接使用。


    #### 连接 UITableViewController 的输出口


    如果在创建 `UITableViewController` 子类时选择了“带 XIB 用户界面”选项，那么 XIB 文件中会包含一个已连接到其 `delegate`
    和 `dataSource` 的 `UITableView`。


    如果你没有选择创建 XIB 文件的选项，那么需要自行创建 XIB 文件后手动连接相关组件。


    -   首先，创建一个新的 `View` 文件，然后删除系统为你添加的 `UIView` 对象，并替换为 `UITableView` 对象。

    -   接下来，在“占位符”列表中选择“文件所有者”图标，然后在“身份检查器”中将“自定义类”字段修改为你的 `UITableViewController`
    子类名称，从而设置界面的文件所有者。

    -   `UITableViewController` 子类会暴露一个 `view` 属性，该属性需要连接到 `Table View` 对象。

    -   最后，需要通过“占位符”列表中的“文件所有者”对象，将 `Table View` 对象的 `dataSource` 和 `delegate` 输出口连接到
    `UITableViewController` 子类。


    至此，你实际上已经复现了在创建新 `UITableViewController` 子类并勾选“带 XIB 用户界面”选项时系统自动完成的过程。


    ## 本章小结


    本章简要介绍了 `UITableView` 的结构和核心组件。


    表格视图有两种基本样式：


    -   普通（Plain）

    -   分组（Grouped）


    表格视图也可以划分为分区，并提供索引。


    虽然外观可能不同，但不同类型的表格视图拥有相似的组件和尺寸。它们还会从父类 `UIScrollView` 继承方法和属性。


    与 UIKit 的许多组件类似，既可以通过 Interface Builder 可视化创建 `UITableView`，也可以通过代码创建。任何能用 Interface
    Builder 完成的操作也都能通过代码实现。


    将 `tableView` 的控制器实现为 `UITableViewController` 的子类，可以让我们减少手动创建方法的工作量，直接使用系统提供的模板。


    在第 5 章中，你将学习如何为新建的 `UITableView` 提供数据，以及它如何与 `UITableViewDelegate` 和 `UITableViewDataSource`
    协议协同工作。


    # 3. 集合视图快速入门


    在本章中，你将开始探索集合视图。首先概述集合视图是什么，以及一些实际应用示例。然后在第二部分，你将构建一个简单的“Hello, world”风格的集合视图应用，以此介绍用户界面背后的组件，并帮助你为后续章节中的细节内容构建上下文背景。


    如果你刚开始使用集合视图，那么在深入复杂的细节之前，花些时间从零开始构建一个非常简单的集合视图是值得的。不过，如果你已经对集合视图各组件的拼图如何组合有了信心，并且想直接进入代码阶段，可以完全跳过本章剩余部分。我将在后面详细讲解这些元素，所以你不会错过任何内容。

    '
- fmt: '# What Are Collection Views?


    A collection view provides a way of managing and displaying an ordered set of
    data items with customizable and interactive layouts.


    Collection views consist of data items displayed in cells, together with supplementary
    views that can display additional information for things like section headers
    and footers, or additional metadata about the items themselves.


    Decoration views are purely visual components that can be used to display interface
    elements like backgrounds and borders; they don’t include any variable data elements.


    The collection view builds on the table view control by providing the potential
    for much more complex layouts. Whereas a table view can display items in a single
    column, collection views can present items in layouts ranging from linear grids
    to circles and every conceivable layout in between, as shown in Figure [3-1](#A978-1-4842-1242-4_3_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_3_Fig1_HTML.jpg](A978-1-4842-1242-4_3_Fig1_HTML.jpg)


    Figure 3-1. Examples of collection views in action


    The `UICollectionView` control works with four other objects, shown in Figure
    [3-2](#A978-1-4842-1242-4_3_Chapter.html#Fig2). The collection view itself is
    managed by a `UIViewController`. The model contains the data that will be displayed
    in the collection view; this is supplied to the collection view itself by the
    `UICollectionViewDataSource`. Interactions with the collection view are handed
    by an object acting as the `UICollectionViewDelegate`.


    `UICollectionView` uses the model-view-controller pattern to organize itself.
    The data that drives the contents of the items and supplementary views is provided
    by the model object, while the `UICollectionView` control itself is the view component.
    The controller part is normally a `UIViewController`, but the role of the controller
    can also be split across different objects that act as `delegate` and `dataSource`.


    The layout of a collection view is managed by a `UICollectionViewLayout` object
    that tells the collection view how each cell, supplementary view, and decoration
    view should be positioned within the bounds of the collection view itself by configuring
    the various layout attributes of each item. Changes in layouts can be animated
    and react to interactions.


    ![A978-1-4842-1242-4_3_Fig2_HTML.jpg](A978-1-4842-1242-4_3_Fig2_HTML.jpg)


    Figure 3-2. The collection view and supporting objects


    As with `UITableView`, collection views use a dequeuing and recycling approach
    to creating and managing cells. This allows collection views to manage potentially
    huge numbers of individual data items while maintaining fast scrolling and animation
    performance, and all within the stringent memory limitations of an iOS device.


    There’s a detailed description of how the dequeueing mechanism works with `UITableView`
    in [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html); `UICollectionView` operates
    in exactly the same way, with the addition of supplementary and decoration views
    as well as item cells.


    # The Anatomy of a Collection View


    The collection view displays a list of items—or cells—that can be scrolled vertically
    and horizontally. They are instances of the `UICollectionView` class and come
    in two physical parts.


    ## The Collection View Itself


    The visible container part, the `collectionView` itself, is a subclass of `UIScrollView`,
    and is responsible for displaying a collection of data items as cells.


    These are laid out inside the bounds of the collection view’s `contentView`. If
    the `contentView` is larger than the `collectionView`’s frame, then the collection
    view will take care of scrolling the content view around, either in response to
    user interaction or programmatically. Figure [3-3](#A978-1-4842-1242-4_3_Chapter.html#Fig3)
    shows how the `frame` and `contentView` relate.


    ![A978-1-4842-1242-4_3_Fig3_HTML.jpg](A978-1-4842-1242-4_3_Fig3_HTML.jpg)


    Figure 3-3. The frame and contentView


    As the content view scrolls around, the collection view will create and remove
    items from it as required; this is a balance between ensuring that items are always
    created and placed in time to be visible as that part of the content view scrolls
    into the frame, but not creating and maintaining so many items that aren’t visible
    so that the memory consumption of the collection view is excessive.


    In exactly the same way as a `UITableView`, the collection view uses a queue of
    preexisting items that it can dequeue and recycle as required. Just before an
    item scrolls into the visible area, the collection view will grab it from the
    queue and configure it with the correct data. Once the item scrolls out of the
    visible area, the collection view will dump it back onto the queue ready for eventual
    reuse.


    In this way, a collection view can appear to create and display thousands of items
    while only needing to create a small fraction of them as actual objects to maintain
    in memory.


    ## Collection View Cells


    Collection view cells are instances of `UICollectionReusableView` or its subclasses.
    They have one of three roles:


    - Item cells, which are created as instances of `UICollectionViewCell`. These
    are analogous to the cells of a table view, and are used to display the main data
    items. In a gallery app, for example, the cells are likely to display thumbnail
    images of the photos in an album.

    - Supplementary views, which are instances of `UICollectionReusableView`. These
    are entirely optional, and can have a variety of purposes. In grid-type layouts,
    such as a photo gallery, they’re often used to provide metadata about sections
    by acting as headers and footers. In more complex layouts, they can be used to
    display additional information about items.

    - Decoration views, which are also instances of `UICollectionReusableView`. These
    are independent of the collection view’s model and don’t display any data. Typically
    they’re often used to display graphical elements such as backgrounds or section
    highlights.


    Figure [3-4](#A978-1-4842-1242-4_3_Chapter.html#Fig4) shows the conceptual parts
    of a collection view with a grid layout, with the various types of views highlighted.


    ![A978-1-4842-1242-4_3_Fig4_HTML.jpg](A978-1-4842-1242-4_3_Fig4_HTML.jpg)


    Figure 3-4. The basic anatomy of a collection view


    Figure [3-5](#A978-1-4842-1242-4_3_Chapter.html#Fig5) shows a collection view
    in action in the iOS iBooks app. It uses cells to show the book covers, supplementary
    views to contain the download control, and a decoration view to provide the “shelf”
    effect.


    ![A978-1-4842-1242-4_3_Fig5_HTML.jpg](A978-1-4842-1242-4_3_Fig5_HTML.jpg)


    Figure 3-5. The iBooks app


    ## The Supporting Objects


    The collection view control itself is pretty dumb; it relies on the support of
    four other objects in order to display its data:


    - Model

    - Datasource

    - Delegate

    - Layout


    Each object has a specific role to play in supporting the collection view, and
    their organization is based on the model-view-controller architecture. Figure
    [3-6](#A978-1-4842-1242-4_3_Chapter.html#Fig6) shows how the four objects interrelate.


    ![A978-1-4842-1242-4_3_Fig6_HTML.jpg](A978-1-4842-1242-4_3_Fig6_HTML.jpg)


    Figure 3-6. How the collection view and supporting objects interrelate


    ### The Collection View’s Model


    The model contains the data that will be displayed in the collection view through
    the datasource. As the name suggests, it’s part of the model component of the
    model-view-controller architecture.


    Models can take many forms, and will depend on the way that the data in your app
    needs to be managed. At its simplest, the model may be a one-dimensional array
    that contains a set of `Strings`. More complex models may involve two-dimensional
    arrays to split the data into sections, or could retrieve data from a local Core
    Data database or an external network source.


    Regardless of what form the model takes, it doesn’t communicate directly with
    the collection view. That’s the role of the datasource.'
