    \nFigure 10-11. The new class's files\n\n**Tip:** If you ticked the **\"Create\
    \ local git repository for this project\"** option when you created the project,\
    \ you'll see symbols appearing to the right of filenames. They show each file's\
    \ source control status. New files show a status of `A` (indicating they need\
    \ to be added to the repository). Files with a status of `M` have been modified.\n\
    \nIt's out of the scope of this book, but if you're not using source control with\
