- fmt: "### Creating the Row Controller Classes\n\nWith the three rows laid out, now\
    \ you can create the row controller classes that will handle each row. Each different\
    \ type of row in your WatchKit table needs a custom class to act as its controller;\
    \ these are subclasses of `NSObject`, and are added to the WatchKit Extension\
    \ (not the WatchKit app). The row controller class is responsible for managing\
    \ the content of the controls in its row, so it needs an outlet for every dynamic\
    \ control. If the controls respond to user interaction, such as a tap on a button\
    \ control, then the row controller class needs to implement functions to handle\
    \ this.\n\nThe simplest type of row has only static controls and doesn’t respond\
    \ to any user interaction. That describes your header row, so you’ll create it\
    \ first. Select the `WatchTarget Extension` folder in the Navigator pane, and\
    \ then add a new class with `File` ➤ `New` ➤ `File`. In the list of templates,\
    \ select the `Source` group, and then the `Cocoa Touch Class`. Click the `Next`\
    \ button, and then name your class `HeaderRowController`. Make sure that the subclass\
    \ is set to `NSObject`, and check that you’re creating the class using the correct\
    \ language.\n\nClick `Next`, and double-check that the new class will be created\
    \ in the WatchKit Extension Group and Target (see Figure [14-16](#A978-1-4842-1242-4_14_Chapter.html#Fig16)).\
    \ Then click `Create` to add the new class file(s).\n\n![A978-1-4842-1242-4_14_Fig16_HTML.jpg](A978-1-4842-1242-4_14_Fig16_HTML.jpg)\n\
    \nFigure 14-16. Selecting the group and target for the new class\n\nFor the header\
    \ row, that’s all you need to do. It doesn’t have any items that will be updated\
    \ at runtime, and it doesn’t react to any user interaction, so the class can remain\
    \ as an empty `NSObject` subclass.\n\nThe footer is slightly more sophisticated,\
    \ in that it has one item that’s dynamically updated, so you’ll create this next.\
    \ Go through the same process as above to create an `NSObject` subclass called\
    \ `FooterRowController`. This needs one outlet, an `IBOutlet` property for a `WKInterfaceLabel`\
    \ called `footerLabel`. Add this to the class as shown in Listing [14-2](#A978-1-4842-1242-4_14_Chapter.html#FPar4).\n\
    \n**Listing 14-2.** The `FooterRowController` Class\n\n```\nimport UIKit\nimport\
    \ WatchKit\n\nclass FooterRowController: NSObject {\n    @IBOutlet var footerLabel:\
    \ WKInterfaceLabel!\n}\n```\n\nNote that you’ll need to import the `WatchKit`\
    \ framework so that you can add the outlet to the `WKInterfaceLabel`.\n\nFinally,\
    \ you can add the class for the `ContactRowController`. This has two outlets,\
    \ one for the image and one for the label, and one interaction function to handle\
    \ taps on the cell. Add a new `NSObject` subclass as before, and update it as\
    \ shown in Listing [14-3](#A978-1-4842-1242-4_14_Chapter.html#FPar5).\n\n**Listing\
    \ 14-3.** The `ContactRowController` Class\n\n```\nimport UIKit\nimport WatchKit\n\
    \nclass ContactRowController: NSObject {\n    @IBOutlet var nameLabel: WKInterfaceLabel!\n\
    \    @IBOutlet var avatarImage: WKInterfaceImage!\n\n    @IBAction func didTapDataRow(sender:\
    \ WKInterfaceButton) {\n    }\n}\n```\n\n### Connecting the Classes to the Rows\n\
    \nWith the custom classes created, it’s time to link these to the controls in\
    \ the Storyboard. Switch back to the Storyboard in the `WatchTarget`, and expand\
    \ the tree of controls so that you can see all three rows. Then select the header\
    \ row, and open the Identity Inspector in the Utilities panel if it’s not visible.\
    \ The top section allows you to define the custom class that controls the row\
    \ (see Figure [14-17](#A978-1-4842-1242-4_14_Chapter.html#Fig17)).\n\n![A978-1-4842-1242-4_14_Fig17_HTML.jpg](A978-1-4842-1242-4_14_Fig17_HTML.jpg)\n\
    \nFigure 14-17. Connecting the custom class with the row\n\nUpdate this so that\
    \ it shows `HeaderRowController`, and then select the Attributes Inspector. Here,\
    \ you need to provide an identifier for the row that will be used as the rows\
    \ are populated at runtime (it’s analogous to the `rowIdentifier` property used\
    \ by `UITableView`). This can be an arbitrary string, but to keep things neat,\
    \ my approach is to use the name of the custom class (in this case, `HeaderRowController`).\
    \ It’s shown in Figure [14-18](#A978-1-4842-1242-4_14_Chapter.html#Fig18).\n\n\
    ![A978-1-4842-1242-4_14_Fig18_HTML.jpg](A978-1-4842-1242-4_14_Fig18_HTML.jpg)\n\
    \nFigure 14-18. The row identifier\n\nAs this row is simply a text header, you\
    \ don’t want it to be selectable, so uncheck the `Selectable` box. Now repeat\
    \ the same process for the contact row; the custom class is `ContactRowController`,\
    \ and the identifier is `ContactRow`. This row will be selectable. Finally, complete\
    \ the process with the footer row. The custom class for this row is `FooterRowController`,\
    \ and the identifier is `FooterRow`. As with the header, this row shouldn’t be\
    \ selectable.\n\n### Connecting Outlets\n\nWith the rows connected to their custom\
    \ classes, it’s possible to connect up the controls. This is done in the usual\
    \ Interface Builder way: Ctrl-clicking on the row in the object tree will pop\
    \ up a HUD window showing the outlets defined in the custom class, which you can\
    \ then connect by clicking and dragging over to the control.\n\nYou need to complete\
    \ this process for the Contact and Footer rows. There are no outlets defined in\
    \ the Header, so there’s nothing connected. When it’s complete, the outlets for\
    \ the Contact row will look like Figure [14-19](#A978-1-4842-1242-4_14_Chapter.html#Fig19).\n\
    \n![A978-1-4842-1242-4_14_Fig19_HTML.jpg](A978-1-4842-1242-4_14_Fig19_HTML.jpg)\n\
    \nFigure 14-19. The connections to the Contact row\n\nThe Footer row should look\
    \ like Figure [14-20](#A978-1-4842-1242-4_14_Chapter.html#Fig20).\n\n![A978-1-4842-1242-4_14_Fig20_HTML.jpg](A978-1-4842-1242-4_14_Fig20_HTML.jpg)\n\
    \nFigure 14-20. The connection to the Footer row\n\nWhile you’re in the process\
    \ of connecting outlets, you also need to add one for the table itself. In the\
    \ `InterfaceController.swift` file, add an `IBOutlet` property for the table:\n\
    \n```\n@IBOutlet var watchTable: WKInterfaceTable!\n```\n\nThen switch to the\
    \ Storyboard and connect this outlet to the table, as shown in Figure [14-21](#A978-1-4842-1242-4_14_Chapter.html#Fig21).\n\
    \n![A978-1-4842-1242-4_14_Fig21_HTML.jpg](A978-1-4842-1242-4_14_Fig21_HTML.jpg)\n\
    \nFigure 14-21. Connecting the table"
  raw: '#### Creating the Row Controller Classes


    With the three rows laid out, now you can create the row controller classes that
    will handle each row.


    Each different type of row in your WatchKit table needs a custom class to act
    as its controller; these are subclasses of `NSObject`, and are added to the WatchKit
    Extension (not the WatchKit app).


    The row controller class is responsible for managing the content of the controls
    in its row, so it needs an outlet for every dynamic control. If the controls respond
    to user interaction, such as a tap on a button control, then the row controller
    class needs to implement functions to handle this.


    The simplest type of row has only static controls and doesn’t respond to any user
    interaction. That describes your header row, so you’ll create it first.


    Select the `WatchTarget Extension` folder in the Navigator pane, and then add
    a new class with File ➤ New ➤ File. In the list of templates, select the Source
    group, and the `Cocoa Touch Class`. Click the Next button, and then name your
    class `HeaderRowController`. Make sure that the subclass is set to `NSObject`,
    and check that you’re creating the class using the correct language.


    Click Next, and double-check that the new class will be created in the WatchKit
    Extension Group and Target (see Figure [14-16](#A978-1-4842-1242-4_14_Chapter.html#Fig16)).
    Then click Create to add the new class file(s).


    ![A978-1-4842-1242-4_14_Fig16_HTML.jpg](A978-1-4842-1242-4_14_Fig16_HTML.jpg)


    Figure 14-16.


    Selecting the group and target for the new class


    For the header row, that’s all you need to do. It doesn’t have any items that
    will be updated at runtime, and it doesn’t react to any user interaction, so the
    class can remain as an empty `NSObject` subclass.


    The footer is slightly more sophisticated, in that it has one item that’s dynamically
    updated, so you’ll create this next. Go through the same process as above to create
    an `NSObject` subclass called `FooterRowController`.


    This needs one outlet, an `IBOutlet` property for a `WKInterfaceLabel` called
    `footerLabel`. Add this to the class as shown in Listing [14-2.](#A978-1-4842-1242-4_14_Chapter.html#FPar4)


    Listing 14-2. The FooterRowController Class


    `import UIKit`


    `import WatchKit`


    `class FooterRowController: NSObject {`


        `@IBOutlet var footerLabel: WKInterfaceLabel!`


    `}`


    Note that you’ll need to import the `WatchKit` framework so that you can add the
    outlet to the `WKInterfaceLabel`.


    Finally, you can add the class for the `ContactRowController`. This has two outlets,
    one for the image and one for the label, and one interaction function to handle
    taps on the cell.


    Add a new `NSObject` subclass as before, and update it as show in Listing [14-3](#A978-1-4842-1242-4_14_Chapter.html#FPar5).


    Listing 14-3. The ContactRowController Class


    `import UIKit`


    `import WatchKit`


    `class ContactRowController: NSObject {`


        `@IBOutlet var nameLabel: WKInterfaceLabel!`


        `@IBOutlet var avatarImage: WKInterfaceImage!`


        `@IBAction func didTapDataRow(sender: WKInterfaceButton) {`


        `}`


    `}`


    #### Connecting the Classes to the Rows


    With the custom classes created, it’s time to link these to the controls in the
    Storyboard. Switch back to the Storyboard in the WatchTarget, and expand the tree
    of controls so that you can see all three rows. Then select the header row, and
    open the Identity Inspector in the Utilities panel if it’s not visible. The top
    section allows you to define the custom class that controls the row (see Figure
    [14-17](#A978-1-4842-1242-4_14_Chapter.html#Fig17)).


    ![A978-1-4842-1242-4_14_Fig17_HTML.jpg](A978-1-4842-1242-4_14_Fig17_HTML.jpg)


    Figure 14-17.


    Connecting the custom class with the row


    Update this so that it shows `HeaderRowController`, and then select the Attributes
    Inspector. Here, you need to provide an identifier for the row that will be used
    as the rows are populated at runtime (it’s analogous to the `rowIdentifier` property
    used by `UITableView`).


    This can be an arbitrary string, but to keep things neat, my approach is to use
    the name of the custom class (in this case, `HeaderRowController`). It’s shown
    in Figure [14-18](#A978-1-4842-1242-4_14_Chapter.html#Fig18).


    ![A978-1-4842-1242-4_14_Fig18_HTML.jpg](A978-1-4842-1242-4_14_Fig18_HTML.jpg)


    Figure 14-18.


    The row identifier


    As this row is simply a text header, you don’t want it to be selectable, so uncheck
    the `Selectable` box.


    Now repeat the same process for the contact row; the custom class is `ContactRowController`,
    and the identifier is `ContactRow`. This row will be selectable.


    Finally, complete the process with the footer row. The custom class for this row
    is `FooterRowController`, and the identifier is `FooterRow`. As with the header,
    this row shouldn’t be selectable.


    #### Connecting Outlets


    With the rows connected to their custom classes, it’s possible to connect up the
    controls. This is done in the usual Interface Builder way: Ctrl-clicking on the
    row in the object tree will pop up a HUD window showing the outlets defined in
    the custom class, which you can then connect by clicking and dragging over to
    the control.


    You need to complete this process for the Contact and Footer rows. There are no
    outlets defined in the Header, so there’s nothing connected. When it’s complete,
    the outlets for the Contact row will look like Figure [14-19](#A978-1-4842-1242-4_14_Chapter.html#Fig19).


    ![A978-1-4842-1242-4_14_Fig19_HTML.jpg](A978-1-4842-1242-4_14_Fig19_HTML.jpg)


    Figure 14-19.


    The connections to the Contact row


    The Footer row should look like Figure [14-20](#A978-1-4842-1242-4_14_Chapter.html#Fig20).


    ![A978-1-4842-1242-4_14_Fig20_HTML.jpg](A978-1-4842-1242-4_14_Fig20_HTML.jpg)


    Figure 14-20.


    The connection to the Footer row


    While you’re in the process of connecting outlets, you also need to add one for
    the table itself.


    In the `InterfaceController.swift` file, add an `IBOutlet` property for the table:


    `@IBOutlet var watchTable: WKInterfaceTable!`


    Then switch to the Storyboard and connect this outlet to the table, as shown in
    Figure [14-21](#A978-1-4842-1242-4_14_Chapter.html#Fig21):


    ![A978-1-4842-1242-4_14_Fig21_HTML.jpg](A978-1-4842-1242-4_14_Fig21_HTML.jpg)


    Figure 14-21.


    Connecting the table'
  trans: "\n### 创建行控制器类\n\n布局好三行之后，现在可以创建用于处理每一行的行控制器类。WatchKit 表格中每种不同类型的行都需要一个自定义类作为其控制器；这些类是\
    \ `NSObject` 的子类，并添加到 WatchKit 扩展（而非 WatchKit 应用）中。行控制器类负责管理其行内控件的内容，因此它需要为每个动态控件提供一个输出口。如果控件响应用户交互（例如点击按钮控件），则行控制器类需要实现函数来处理这些交互。\n\
    \n最简单的行类型仅包含静态控件，并且不响应用户交互。这正符合你的标题行，因此你将首先创建它。在导航器窗格中选择 `WatchTarget Extension`\
    \ 文件夹，然后通过 `文件` ➤ `新建` ➤ `文件` 添加一个新类。在模板列表中，选择 `Source` 组，然后选择 `Cocoa Touch Class`。点击\
    \ `下一步` 按钮，然后将类命名为 `HeaderRowController`。确保将子类设置为 `NSObject`，并检查你是否正在使用正确的语言创建该类。\n\
    \n点击 `下一步`，再次确认新类将创建在 WatchKit 扩展组和目标中（见图 14-16）。然后点击 `创建` 以添加新的类文件。\n\n![A978-1-4842-1242-4_14_Fig16_HTML.jpg](img/A978-1-4842-1242-4_14_Fig16_HTML.jpg)\n\
    \n图 14-16. 为新类选择组和目标\n\n对于标题行，你需要做的就这些了。它没有任何在运行时需要更新的项目，也不响应用户交互，因此该类可以保留为一个空的\
    \ `NSObject` 子类。\n\n页脚行稍微复杂一些，因为它有一个动态更新的项目，因此接下来你将创建它。重复上述过程，创建一个名为 `FooterRowController`\
    \ 的 `NSObject` 子类。这需要一个输出口，即一个名为 `footerLabel` 的 `WKInterfaceLabel` 类型的 `IBOutlet`\
    \ 属性。将此项添加到类中，如列表 14-2 所示。\n\n**列表 14-2.** `FooterRowController` 类\n\n```\nimport\
    \ UIKit\nimport WatchKit\n\nclass FooterRowController: NSObject {\n    @IBOutlet\
    \ var footerLabel: WKInterfaceLabel!\n}\n```\n\n请注意，你需要导入 `WatchKit` 框架，以便能够为\
    \ `WKInterfaceLabel` 添加输出口。\n\n最后，你可以添加 `ContactRowController` 类。该类有两个输出口（一个用于图像，一个用于标签）和一个交互函数，用于处理对单元格的点击。像之前一样添加一个新的\
    \ `NSObject` 子类，并按列表 14-3 所示进行更新。\n\n**列表 14-3.** `ContactRowController` 类\n\n\
    ```\nimport UIKit\nimport WatchKit\n\nclass ContactRowController: NSObject {\n\
    \    @IBOutlet var nameLabel: WKInterfaceLabel!\n    @IBOutlet var avatarImage:\
    \ WKInterfaceImage!\n\n    @IBAction func didTapDataRow(sender: WKInterfaceButton)\
    \ {\n    }\n}\n```\n\n### 将类连接到行\n\n创建了自定义类之后，是时候将它们链接到 Storyboard 中的控件了。切换回 `WatchTarget`\
    \ 中的 Storyboard，展开控件树以便你能看到所有三行。然后选择标题行，如果“工具”面板中的“身份检查器”不可见，请将其打开。顶部部分允许你定义控制该行的自定义类（见图\
    \ 14-17）。\n\n![A978-1-4842-1242-4_14_Fig17_HTML.jpg](img/A978-1-4842-1242-4_14_Fig17_HTML.jpg)\n\
    \n图 14-17. 将自定义类连接到行\n\n将其更新为显示 `HeaderRowController`，然后选择“属性检查器”。在这里，你需要为行提供一个标识符，该标识符将在运行时填充行时使用（类似于\
    \ `UITableView` 使用的 `rowIdentifier` 属性）。这可以是任意字符串，但为了保持整洁，我的方法是使用自定义类的名称（在本例中为\
    \ `HeaderRowController`）。如图 14-18 所示。\n\n![A978-1-4842-1242-4_14_Fig18_HTML.jpg](img/A978-1-4842-1242-4_14_Fig18_HTML.jpg)\n\
    \n图 14-18. 行标识符\n\n由于这一行只是一个文本标题，你不希望它被选中，因此取消选中 `Selectable` 复选框。现在对联系人行重复相同的过程；自定义类是\
    \ `ContactRowController`，标识符是 `ContactRow`。这一行将可被选中。最后，对页脚行完成此过程。该行的自定义类是 `FooterRowController`，标识符是\
    \ `FooterRow`。与标题行一样，这一行不应可被选中。\n\n### 连接输出口\n\n将行连接到其自定义类后，就可以连接控件了。这是通过通常的 Interface\
    \ Builder 方式完成的：在对象树中按住 Ctrl 键点击行，会弹出一个 HUD 窗口，显示自定义类中定义的输出口，然后你可以通过点击并拖动到控件上来连接它们。\n\
    \n你需要为联系人行和页脚行完成此过程。标题行中没有定义输出口，因此没有需要连接的内容。完成后，联系人行的输出口将如图 14-19 所示。\n\n![A978-1-4842-1242-4_14_Fig19_HTML.jpg](img/A978-1-4842-1242-4_14_Fig19_HTML.jpg)\n\
    \n图 14-19. 联系人行的连接\n\n页脚行应如图 14-20 所示。\n\n![A978-1-4842-1242-4_14_Fig20_HTML.jpg](img/A978-1-4842-1242-4_14_Fig20_HTML.jpg)\n\
    \n图 14-20. 页脚行的连接\n\n在连接输出口的过程中，你还需要为表格本身添加一个输出口。在 `InterfaceController.swift`\
    \ 文件中，为表格添加一个 `IBOutlet` 属性：\n\n```\n@IBOutlet var watchTable: WKInterfaceTable!\n\
    ```\n\n然后切换到 Storyboard 并将此输出口连接到表格，如图 14-21 所示。\n\n![A978-1-4842-1242-4_14_Fig21_HTML.jpg](img/A978-1-4842-1242-4_14_Fig21_HTML.jpg)\n\
    \n图 14-21. 连接表格\n"
- fmt: "# Creating the Rows in Code\n\nWith the interface connections made and data\
    \ set up, it’s time to start creating the code that will populate the table with\
    \ cells and data at runtime.\n\n`WKInterfaceTable` differs significantly from\
    \ `UITableView` in that it doesn’t operate in conjunction with a datasource. All\
    \ the rows have to be created upfront when the table is configured.\n\nThis means\
    \ you’ll have to figure out how many rows of each type there will be, tell the\
    \ table about this, and then create the rows yourself.\n\nIf you have a simple\
    \ table consisting of only one row type, then you can use the `setNumberOfRows:withRowType:`\
    \ function to tell the table how many rows of what type it will be displaying.\
    \ An example that you could use to display a table consisting only of `ContactRows`\
    \ is shown below:\n\n`self.watchTable.setNumberOfRows(self.dataArray.count, withRowType:\
    \ \"ContactRow\")`\n\nIn your case, things are more complex. You’ve got three\
    \ row types, so there’s a bit more to do.\n\nFirst, you need some dummy data.\
    \ In this example, it’s an `Array` of four `Strings`, corresponding to the name\
    \ of some avatar images – add the function in Listing [14-4](#A978-1-4842-1242-4_14_Chapter.html#FPar5)\
    \ to the bottom of the `InterfaceController`:\n\n**Listing 14-4.** The `setupData()`\
    \ Function\n\n```\nfunc setupData() {\n    dataArray.append(\"Bob\")\n    dataArray.append(\"\
    Felix\")\n    dataArray.append(\"Jim\")\n    dataArray.append(\"Fred\")\n}\n```\n\
    \nYou can find the four sample images in this chapter’s code, or of course you’re\
    \ free to add your own.\n\nHaving added some dummy data, you’re now in a position\
    \ to feed that data to the table. Add the code in Listing [14-5](#A978-1-4842-1242-4_14_Chapter.html#FPar7)\
    \ to the bottom of the `InterfaceController` class.\n\n**Listing 14-5.** The `updateTable()`\
    \ Function\n\n```\nprivate func updateTable() {\n    // Create array to hold the\
    \ row types\n    var rowsTypes = [String]()\n    \n    // Add header row as the\
    \ row 0\n    rowsTypes.append(\"HeaderRow\")\n    \n    // Add a contact row for\
    \ each object in the dataArray\n    for _ in dataArray {\n        rowsTypes.append(\"\
    ContactRow\")\n    }\n    \n    // Add a footer row as the last row\n    rowsTypes.append(\"\
    FooterRow\")\n    \n    // Configure the table to display the rows as defined\
    \ in the rowsArray\n    watchTable.setRowTypes(rowsTypes)\n    \n    // Retrieve\
    \ each contact row and set the contents from the dataArray\n    // Start at row\
    \ 1, because row 0 is the header row\n    for index in 0..< dataArray.count {\n\
    \        var contactRow = watchTable.rowControllerAtIndex(index+1) as! ContactRowController\n\
    \        var rowContent = dataArray[index]\n        contactRow.nameLabel!.setText(rowContent)\n\
    \        if let image = UIImage(named: rowContent) {\n            contactRow.avatarImage.setImage(image)\n\
    \        }\n    }\n    \n    // Get the last row, and configure it as the footer\n\
    \    let contactCount = dataArray.count\n    let footerRow = watchTable.rowControllerAtIndex(contactCount\
    \ + 1) as! FooterRowController\n    footerRow.footerLabel.setText(\"\\(contactCount)\
    \ messages\")\n}\n```\n\nWalking through this code, you’re going to have three\
    \ distinct types of row, so you can’t use the one-shot `setNumberOfCells:withRowType`\
    \ function. Instead, you create an array of the cell types: first a header cell,\
    \ then the same number of contact rows as you have elements in the data array,\
    \ and finally a footer cell. This array is used to tell the table what rows types\
    \ it will have to display.\n\nThe row types are created when the `setRowTypes`\
    \ function is called, according to what identifier has been provided in the row\
    \ types array. If there are outlets in the row that you need to update dynamically,\
    \ it’s your responsibility to iterate over each row in turn and make the necessary\
    \ changes.\n\nEach row can be accessed by asking the table, using the `rowControllerAtIndex`\
    \ function, and casting the type if necessary. Once you’ve got a reference to\
    \ the cell, you can update it with the corresponding data from the model.\n\n\
    In the case of contact rows, it’s the relevant element from the `dataArray`. In\
    \ the case of the footer, it’s done with a calculation based on the total number\
    \ of elements in the `dataArray`.\n\n## Finishing up\n\nTo finish the process,\
    \ you need to call the two new functions when the interface is loaded. Update\
    \ the `awakeWithContext(:_)` function to match Listing [14-6](#A978-1-4842-1242-4_14_Chapter.html#FPar8)\
    \ – this is called when the interface is loaded, equivalent to the `viewDidLoad`\
    \ function in `UIViewController`.\n\n**Listing 14-6.** The updated `awakeWithContext()`\
    \ function\n\n```\noverride func awakeWithContext(context: AnyObject?) {\n   \
    \ super.awakeWithContext(context)\n    // Configure interface objects here.\n\
    \    setupData()\n    updateTable()\n}\n```\n\nIf you run the app in the Simulator,\
    \ you’ll see the table being loaded and populated with data, as shown in Figure\
    \ [14-22](#A978-1-4842-1242-4_14_Chapter.html#Fig22).\n\n![A978-1-4842-1242-4_14_Fig22_HTML.jpg](A978-1-4842-1242-4_14_Fig22_HTML.jpg)\n\
    \n**Figure 14-22.** The app running in the Apple Watch Simulator\n\n## Adding\
    \ Interactivity\n\nJust like a `UITableView`, rows in a WatchKit table can respond\
    \ to user interaction. It’s limited to simple taps in the current WatchKit SDK,\
    \ but this may change in the future.\n\nUnlike `UITableView`, a `WKInterfaceTable`\
    \ doesn’t have a delegate object. Instead, if the row has selection enabled, then\
    \ the table will call the interface controller’s `table:didSelectRowAtIndex:`\
    \ function if that is implemented.\n\nListing [14-7](#A978-1-4842-1242-4_14_Chapter.html#FPar9)\
    \ shows an example of a function that logs the index of the row that’s been selected\
    \ and then changes the color of the text in the row.\n\n**Listing 14-7.** Handling\
    \ Selection in WatchKit Tables with Swift\n\n```\noverride func table(table: WKInterfaceTable,\
    \ didSelectRowAtIndex rowIndex: Int) {\n    print(\"Row \\(rowIndex) selected\"\
    )\n    for index in 0..< dataArray.count {\n        let contactRow: ContactRowController\
    \ = self.watchTable.rowControllerAtIndex(index+1) as! ContactRowController\n \
    \       contactRow.nameLabel!.setTextColor(UIColor.whiteColor())\n    }\n    let\
    \ selectedRow: ContactRowController = self.watchTable.rowControllerAtIndex(rowIndex)\
    \ as! ContactRowController\n    selectedRow.nameLabel.setTextColor(UIColor.redColor())\n\
    }\n```\n\n**Caution**\n\nThe interface controller code is executed on the iPhone,\
    \ and updates to the interface are passed to the Apple Watch via Bluetooth. This\
    \ can introduce a noticeable lag between taps and interface updates."
  raw: '#### Creating the Rows in Code


    With the interface connections made and data set up, it’s time to start creating
    the code that will populate the table with cells and data at runtime.


    `WKInterfaceTable` differs significantly from `UITableView` in that it doesn’t
    operate in conjunction with a datasource. All the rows have to be created upfront
    when the table is configured.


    This means you’ll have to figure out how many rows of each type there will be,
    tell the table about this, and then create the rows yourself.


    If you have a simple table consisting of only one row type, then you can use the
    `setNumberOfRows:withRowType:` function to tell the table how many rows of what
    type it will be displaying. An example that you could use to display a table consisting
    only of `ContactRows` is shown below:


    `self.watchTable.setNumberOfRows(self.dataArray.count, withRowType: "ContactRow")`


    In your case, things are more complex. You’ve got three row types, so there’s
    a bit more to do.


    First, you need some dummy data. In this example, it’s an `Array` of four `Strings`,
    corresponding to the name of some avatar images – add the function in Listing
    [14-4](#A978-1-4842-1242-4_14_Chapter.html#FPar5) to the bottom of the InterfaceController:


    Listing 14-4. The setupData() Function


    `func setupData() {`


    `dataArray.append("Bob")`


    `dataArray.append("Felix")`


    `dataArray.append("Jim")`


    `dataArray.append("Fred")`


    `}`


    You can find the four sample images in this chapter’s code, or of course you’re
    free to add your own.


    Having added some dummy data, you’re now in a position to feed that data to the
    table. Add the code in Listing [14-5](#A978-1-4842-1242-4_14_Chapter.html#FPar7)
    to the bottom of the `InterfaceController` class.


    Listing 14-5. The updateTable( ) Function


    `private func updateTable() {`


    `// Create array to hold the row types`


    `var rowsTypes = [String]()`


    `// Add header row as the row 0`


    `rowsTypes.append("HeaderRow")`


    `// Add a contact row for each object in the dataArray`


    `for _ in dataArray {`


    `rowsTypes.append("ContactRow")`


    `}`


    `// Add a footer row as the last row`


    `rowsTypes.append("FooterRow")`


    `// Configure the table to display the rows as defined in the rowsArray`


    `watchTable.setRowTypes(rowsTypes)`


    `// Retrieve each contact row and set the contents from the dataArray`


    `// Start at row 1, because row 0 is the header row`


    `for index in 0..< dataArray.count {`


    `var contactRow = watchTable.rowControllerAtIndex(index+1) ➤`


    `as! ContactRowController`


    `var rowContent = dataArray[index]`


    `contactRow.nameLabel!.setText(rowContent)`


    `if let image = UIImage(named: rowContent) {`


    `contactRow.avatarImage.setImage(image)`


    `}`


    `}`


    `// Get the last row, and configure it as the footer`


    `let contactCount = dataArray.count`


    `let footerRow = watchTable.rowControllerAtIndex(contactCount + 1) ➤`


    `as! FooterRowController`


    `footerRow.footerLabel.setText("\(contactCount) messages")`


    `}`


    Walking through this code, you’re going to have three distinct types of row, so
    you can’t use the one-shot `setNumberOfCells:withRowType` function. Instead, you
    create an array of the cell types: first a header cell, then the same number of
    contact rows as you have elements in the data array, and finally a footer cell.
    This array is used to tell the table what rows types it will have to display.


    The row types are created when the `setRowTypes` function is called, according
    to what identifier has been provided in the row types array. If there are outlets
    in the row that you need to update dynamically, it’s your responsibility to iterate
    over each row in turn and make the necessary changes.


    Each row can be accessed by asking the table, using the `rowControllerAtIndex`
    function, and casting the type if necessary. Once you’ve got a reference to the
    cell, you can update it with the corresponding data from the model.


    In the case of contact rows, it’s the relevant element from the `dataArray.` In
    the case of the footer, it’s done with a calculation based on the total number
    of elements in the `dataArray`.


    #### Finishing up


    To finish the process, you need to call the two new functions when the interface
    is loaded. Update the `awakeWithContext(:_)`function to match Listing [14-6](#A978-1-4842-1242-4_14_Chapter.html#FPar8)
    – this is called when the interface is loaded, equivalent to the `viewDidLoad`
    function in `UIViewController`.


    Listing 14-6. The updated awakeWithContext( ) function


    `override func awakeWithContext(context: AnyObject?) {`


        `super.awakeWithContext(context)`


        `// Configure interface objects here.`


        `setupData()`


        `updateTable()`


    `}`


    If you run the app in the Simulator, you’ll see the table being loaded and populated
    with data, as shown in Figure [14-22](#A978-1-4842-1242-4_14_Chapter.html#Fig22).


    ![A978-1-4842-1242-4_14_Fig22_HTML.jpg](A978-1-4842-1242-4_14_Fig22_HTML.jpg)


    Figure 14-22.


    The app running in the Apple Watch Simulator


    #### Adding Interactivity


    Just like a `UITableView`, rows in a WatchKit table can respond to user interaction.
    It’s limited to simple taps in the current WatchKit SDK, but this may change in
    the future.


    Unlike `UITableView`, a `WKInterfaceTable` doesn’t have a delegate object. Instead,
    if the row has selection enabled, then the table will call the interface controller’s
    `table:didSelectRowAtIndex:` function if that is implemented.


    Listing [14-7](#A978-1-4842-1242-4_14_Chapter.html#FPar9) shows an example of
    a function that logs the index of the row that’s been selected and then changes
    the color of the text in the row.


    Listing 14-7. Handling Selection in WatchKit Tables with Swift


    `override func table(table: WKInterfaceTable, didSelectRowAtIndex rowIndex: Int)
    {`


        `print("Row \(rowIndex) selected")`


        `for index in 0..< dataArray.count {`


            `let contactRow: ContactRowController = ➤`


            `self.watchTable.rowControllerAtIndex(index+1) as! ContactRowController`


            `contactRow.nameLabel!.setTextColor(UIColor.whiteColor())`


        `}`


        `let selectedRow: ContactRowController = ➤`


        `self.watchTable.rowControllerAtIndex(rowIndex) as! ContactRowController`


        `selectedRow.nameLabel.setTextColor(UIColor.redColor())`


    `}`


    Caution


    The interface controller code is executed on the iPhone, and updates to the interface
    are passed to the Apple Watch via Bluetooth. This can introduce a noticeable lag
    between taps and interface updates.'
  trans: "\n# 在代码中创建行\n\n完成接口连接并设置好数据后，就可以开始编写代码，在运行时用单元格和数据填充表格了。\n\n`WKInterfaceTable`\
    \ 与 `UITableView` 的一个显著区别在于，它不与数据源协同工作。所有行都必须在配置表格时预先创建。\n\n这意味着你必须先确定每种类型的行各有多少，告知表格这一信息，然后自行创建这些行。\n\
    \n如果你的表格仅由一种行类型组成，那么可以使用 `setNumberOfRows:withRowType:` 函数，告诉表格将显示多少行以及行的类型。下面是一个示例，可用于显示仅包含\
    \ `ContactRows` 的表格：\n\n`self.watchTable.setNumberOfRows(self.dataArray.count,\
    \ withRowType: \"ContactRow\")`\n\n但在你的场景中，情况更为复杂。你有三种行类型，因此需要多做一些工作。\n\n首先，你需要一些虚拟数据。在这个示例中，它是由四个`字符串`组成的`数组`，对应一些头像图片的名称——将清单\
    \ 14-4 中的函数添加到`InterfaceController`的底部：\n\n**清单 14-4.** `setupData()` 函数\n\n```\n\
    func setupData() {\n    dataArray.append(\"Bob\")\n    dataArray.append(\"Felix\"\
    )\n    dataArray.append(\"Jim\")\n    dataArray.append(\"Fred\")\n}\n```\n\n你可以在本章的代码中找到这四个示例图片，当然，你也可以自由添加自己的图片。\n\
    \n添加了一些虚拟数据后，现在可以将这些数据提供给表格了。将清单 14-5 中的代码添加到`InterfaceController`类的底部。\n\n**清单\
    \ 14-5.** `updateTable()` 函数\n\n```\nprivate func updateTable() {\n    // 创建数组来保存行类型\n\
    \    var rowsTypes = [String]()\n    \n    // 将标题行作为第 0 行添加\n    rowsTypes.append(\"\
    HeaderRow\")\n    \n    // 为 dataArray 中的每个对象添加一个联系人行\n    for _ in dataArray\
    \ {\n        rowsTypes.append(\"ContactRow\")\n    }\n    \n    // 将页脚行作为最后一行添加\n\
    \    rowsTypes.append(\"FooterRow\")\n    \n    // 配置表格，按照 rowsTypes 数组中的定义显示行\n\
    \    watchTable.setRowTypes(rowsTypes)\n    \n    // 获取每个联系人行并从 dataArray 中设置内容\n\
    \    // 从第 1 行开始，因为第 0 行是标题行\n    for index in 0..< dataArray.count {\n      \
    \  var contactRow = watchTable.rowControllerAtIndex(index+1) as! ContactRowController\n\
    \        var rowContent = dataArray[index]\n        contactRow.nameLabel!.setText(rowContent)\n\
    \        if let image = UIImage(named: rowContent) {\n            contactRow.avatarImage.setImage(image)\n\
    \        }\n    }\n    \n    // 获取最后一行，并将其配置为页脚\n    let contactCount = dataArray.count\n\
    \    let footerRow = watchTable.rowControllerAtIndex(contactCount + 1) as! FooterRowController\n\
    \    footerRow.footerLabel.setText(\"\\(contactCount) messages\")\n}\n```\n\n\
    逐行分析这段代码，你将会拥有三种不同类型的行，因此不能使用一次性函数 `setNumberOfCells:withRowType`。取而代之的是，你需要创建一个单元格类型的数组：首先是标题单元格，然后是数据数组中元素数量相同的联系人行，最后是页脚单元格。这个数组用于告知表格它需要显示哪些行类型。\n\
    \n当调用 `setRowTypes` 函数时，会根据行类型数组中提供的标识符创建相应的行类型。如果行中有需要动态更新的输出口，你需要负责逐个迭代每一行并进行必要的修改。\n\
    \n可以通过向表格请求（使用 `rowControllerAtIndex` 函数）并强制转换类型（如有必要）来访问每一行。一旦获取到单元格的引用，就可以用模型中的相应数据来更新它。\n\
    \n对于联系人行，数据来自 `dataArray` 中的相关元素。对于页脚行，则基于 `dataArray` 中元素的总数进行计算。\n\n## 收尾工作\n\
    \n为了完成整个过程，你需要在接口加载时调用这两个新函数。更新 `awakeWithContext(:_)` 函数，使其与清单 14-6 匹配——该函数在接口加载时被调用，相当于\
    \ `UIViewController` 中的 `viewDidLoad` 函数。\n\n**清单 14-6.** 更新后的 `awakeWithContext()`\
    \ 函数\n\n```\noverride func awakeWithContext(context: AnyObject?) {\n    super.awakeWithContext(context)\n\
    \    // 在此处配置接口对象。\n    setupData()\n    updateTable()\n}\n```\n\n如果你在模拟器中运行该应用，会看到表格被加载并填充了数据，如图\
    \ 14-22 所示。\n\n![A978-1-4842-1242-4_14_Fig22_HTML.jpg](img/A978-1-4842-1242-4_14_Fig22_HTML.jpg)\n\
    \n**图 14-22.** 应用在 Apple Watch 模拟器中运行\n\n## 添加交互性\n\n与 `UITableView` 类似，WatchKit\
    \ 表格中的行可以对用户交互做出响应。在当前版本的 WatchKit SDK 中，交互仅限于简单点击，但未来可能会有所改变。\n\n与 `UITableView`\
    \ 不同，`WKInterfaceTable` 没有代理对象。相反，如果行已启用选择功能，那么表格会调用接口控制器的 `table:didSelectRowAtIndex:`\
    \ 函数（如果已实现该函数的话）。\n\n清单 14-7 展示了一个函数的示例，该函数记录被选中行的索引，然后更改该行文本的颜色。\n\n**清单 14-7.** 在\
    \ WatchKit 表格中使用 Swift 处理选择\n\n```\noverride func table(table: WKInterfaceTable,\
    \ didSelectRowAtIndex rowIndex: Int) {\n    print(\"Row \\(rowIndex) selected\"\
    )\n    for index in 0..< dataArray.count {\n        let contactRow: ContactRowController\
    \ = self.watchTable.rowControllerAtIndex(index+1) as! ContactRowController\n \
    \       contactRow.nameLabel!.setTextColor(UIColor.whiteColor())\n    }\n    let\
    \ selectedRow: ContactRowController = self.watchTable.rowControllerAtIndex(rowIndex)\
    \ as! ContactRowController\n    selectedRow.nameLabel.setTextColor(UIColor.redColor())\n\
    }\n```\n\n**注意**\n\n接口控制器代码在 iPhone 上执行，对接口的更新通过蓝牙传递到 Apple Watch。这可能会导致点击和接口更新之间出现明显的延迟。\n"
- fmt: "# Navigation with WatchKit Tables\n\n`UITableViews` are often used as a navigation\
    \ mechanism for \"drilling down\" into a hierarchy of data. `WKInterfaceTable`\
    \ can also be exploited for this purpose, albeit within the constraints of a much\
    \ smaller interface.\n\nThere are two ways of navigating between screens of content\
    \ with WatchKit: page-based, which is designed for moving between independent\
    \ screens; and hierarchical, where new screens are pushed into view together with\
    \ an on-screen control for moving back through the \"tree.\"\n\nAlthough you can\
    \ use other controls to control movement between screens in a hierarchical-based\
    \ app, doing so with a `WKInterfaceTable` is a very common interface pattern.\n\
    \nThe transitions between screens are either segues, which you set up in Interface\
    \ Builder, or are triggered by calling the `pushControllerWithName:context:` function,\
    \ which can be called from the `didSelectRowAtIndex:` function in response to\
    \ a tap on a row.\n\nTo pass information between screens, such as the object that's\
    \ displayed in the selected row, so that the detail interface can show data about\
    \ it, you pass a `context` object between the two controllers. In your case, this\
    \ would be the object from the `dataArray` at the index corresponding to the selected\
    \ row.\n\nExtending the example app from the previous section to add hierarchical\
    \ navigation isn't difficult. It takes three steps:\n\n- Add a new interface controller\
    \ class to manage the new screen.\n- Add a new interface controller to the Storyboard,\
    \ and lay out the controls.\n- Implement the navigation, either by adding a push\
    \ seque or extending the `didSelectRowAtIndex:` function to push the new screen\
    \ in response to selection of the row.\n\n## Adding a New Interface Controller\n\
    \nThe first step is to add a new class to act as the interface controller. To\
    \ do this, add a new file (File ➤ New ➤ File) and select the Cocoa Touch template.\
    \ Create a subclass of `WKInterfaceController` and call it `DetailInterfaceController`,\
    \ as shown in Figure 14-23.\n\n![A978-1-4842-1242-4_14_Fig23_HTML.jpg](A978-1-4842-1242-4_14_Fig23_HTML.jpg)\n\
    \nFigure 14-23. Creating the `DetailInterfaceController`\n\nMake sure that the\
    \ new file is created in the WatchTarget Extension, not the main or WatchTable\
    \ apps.\n\n## Adding a New Screen to the Storyboard\n\nTo add a new screen to\
    \ the existing Storyboard, select the Interface Controller in the Object browser\
    \ and drag it out into the Storyboard, as shown in Figure 14-24.\n\n![A978-1-4842-1242-4_14_Fig24_HTML.jpg](A978-1-4842-1242-4_14_Fig24_HTML.jpg)\n\
    \nFigure 14-24. Adding the Interface Controller\n\nWith the new Interface Controller\
    \ in the Storyboard and selected, open the Identity Inspector and update the class\
    \ name. If you already created the `DetailInterfaceController` class, the Class\
    \ field will autofill after typing a couple of characters, as shown in Figure\
    \ 14-25.\n\n![A978-1-4842-1242-4_14_Fig25_HTML.jpg](A978-1-4842-1242-4_14_Fig25_HTML.jpg)\n\
    \nFigure 14-25. Updating the class of the new Interface Controller in the Storyboard\n\
    \n## Implementing the Navigation\n\nThere are two ways of implementing the push\
    \ navigation between the two controllers:\n\n- Adding a push segue in Interface\
    \ Builder\n- Extending the `didSelectRowAtIndex:` function in the interface controller\
    \ class\n\nThe two approaches are identical in terms of end results, but have\
    \ different implementations.\n\n### Adding a Push Segue\n\nAdding a push seque\
    \ has two steps:\n\n- Adding the seque itself\n- Optionally, implementing the\
    \ `contextForSegueWithIdentifier:inTable:rowIndex:` function in order to pass\
    \ a data object to the next screen. In most cases, you'll want to do this in order\
    \ to pass the object to be displayed on the next screen.\n\n> **Tip:** If you\
    \ set up navigation using a push segue, the `didSelectRowAtIndex` function won't\
    \ be called; you need to use the `prepareForSegue` function instead.\n\nAdding\
    \ a segue is simplicity itself. In the Storyboard, select the row that will trigger\
    \ the navigation and Ctrl-drag down to the Detail Interface scene, as shown in\
    \ Figure 14-26.\n\n![A978-1-4842-1242-4_14_Fig26_HTML.jpg](A978-1-4842-1242-4_14_Fig26_HTML.jpg)\n\
    \nFigure 14-26. Adding the seque\n\nWhen you release the mouse button, the Selection\
    \ Segue HUD will pop up: select the `Push` option from the HUD, and the segue\
    \ will be added, as shown in Figure 14-27.\n\n![A978-1-4842-1242-4_14_Fig27_HTML.jpg](A978-1-4842-1242-4_14_Fig27_HTML.jpg)\n\
    \nFigure 14-27. The added segue\n\nFinally, you need to add an identifier to the\
    \ segue so that it can be identified in the `contextForSegueWithIdentifier` function.\
    \ Highlight the segue in Interface Builder, switch to the Attributes Inspector,\
    \ and add the segue identifier string in the field, as shown in Figure 14-28.\n\
    \n![A978-1-4842-1242-4_14_Fig28_HTML.jpg](A978-1-4842-1242-4_14_Fig28_HTML.jpg)\n\
    \nFigure 14-28. Adding the segue identifier string in the field\n\nIf you run\
    \ the app now, you'll see that the detail screen is pushed in when you tap on\
    \ a row, and popped back if you tap on the back chevron at the top left of the\
    \ screen (shown in Figure 14-29).\n\n![A978-1-4842-1242-4_14_Fig29_HTML.jpg](A978-1-4842-1242-4_14_Fig29_HTML.jpg)\n\
    \nFigure 14-29. Pushing and popping between screens\n\nNow add the `contextForSegueWithIdentifier:table:rowIndex:`\
    \ function to the `InterfaceController` class. This is shown in Listing 14-8.\n\
    \nListing 14-8. The `contextForSegueWithIdentifier:table:rowIndex:` Function\n\
    \n``` \noverride func contextForSegueWithIdentifier(segueIdentifier: String,\n\
    \    inTable table: WKInterfaceTable, rowIndex: Int) -> AnyObject? {\n    if segueIdentifier\
    \ == \"PushDetailScreenSegue\" {\n        return dataArray[rowIndex - 1]\n   \
    \ }\n    return nil\n}\n```\n\nThis will return the name from the data array at\
    \ the index corresponding to the selected row, and pass it to the `DetailInterfaceController`\
    \ in the context. Note that you're subtracting 1 from the `rowIndex` that's passed\
    \ into the function, to compensate for the fact that the first row of the table\
    \ is actually the header row.\n\nThe context can be any object that will be used\
    \ by the detail interface controller so will have a type of `AnyObject`.\n\nHere,\
    \ you're creating a dictionary containing the name of the person at the selected\
    \ row. Now let's update the controller to use this.\n\nIn the `DetailInterfaceController`\
    \ class, add an outlet for a `WKInterfaceLabel` called `nameLabel`:\n\n``` \n\
    @IBOutlet var nameLabel: WKInterfaceLabel!\n```\n\nThen switch back to Interface\
    \ Builder, and add a `WKInterfaceLabel` object to the `DetailInterfaceController`,\
    \ as shown in Figure 14-30.\n\n![A978-1-4842-1242-4_14_Fig30_HTML.jpg](A978-1-4842-1242-4_14_Fig30_HTML.jpg)\n\
    \nFigure 14-30. The label\n\nSet the label's `Lines` property to `0` so that it\
    \ will automatically wrap the content. Finally, connect the outlet to the control\
    \ by dragging and dropping in Interface Builder.\n\nWith the control connected,\
    \ you can update the `DetailInterfaceController` class to use the context object\
    \ that will be passed to it from the `InterfaceController`."
  raw: '## Navigation with WatchKit Tables


    `UITableViews` are often used as a navigation mechanism for “drilling down” into
    a hierarchy of data. `WKInterfaceTable` can also be exploited for this purpose,
    albeit within the constraints of a much smaller interface.


    There are two ways of navigating between screens of content with WatchKit: page-based,
    which is designed for moving between independent screens; and hierarchical, where
    new screens are pushed into view together with an on-screen control for moving
    back through the “tree.”


    Although you can use other controls to control movement between screens in a hierarchical-based
    app, doing so with a `WKInterfaceTable` is a very common interface pattern.


    The transitions between screens are either segues, which you set up in Interface
    Builder, or are triggered by calling the `pushControllerWithName:context:` function,
    which can be called from the `didSelectRowAtIndex:` function in response to a
    tap on a row.


    To pass information between screens, such as the object that’s displayed in the
    selected row, so that the detail interface can show data about it, you pass a
    `context` object between the two controllers. In your case, this would be the
    object from the `dataArray` at the index corresponding to the selected row.


    Extending the example app from the previous section to add hierarchical navigation
    isn’t difficult. It takes three steps:


    *   Add a new interface controller class to manage the new screen.

    *   Add a new interface controller to the Storyboard, and lay out the controls.

    *   Implement the navigation, either by adding a push seque or extending the `didSelectRowAtIndex:`
    function to push the new screen in response to selection of the row.


    ### Adding a New Interface Controller


    The first step is to add a new class to act as the interface controller. To do
    this, add a new file (File ➤ New ➤ File) and select the Cocoa Touch template.
    Create a subclass of `WKInterfaceController` and call it `DetailInterfaceController`,
    as shown in Figure [14-23](#A978-1-4842-1242-4_14_Chapter.html#Fig23).


    ![A978-1-4842-1242-4_14_Fig23_HTML.jpg](A978-1-4842-1242-4_14_Fig23_HTML.jpg)


    Figure 14-23.


    Creating the DetailInterfaceController


    Make sure that the new file is created in the WatchTarget Extension, not the main
    or WatchTable apps.


    ### Adding a New Screen to the Storyboard


    To add a new screen to the existing Storyboard, select the Interface Controller
    in the Object browser and drag it out into the Storyboard, as shown in Figure
    [14-24](#A978-1-4842-1242-4_14_Chapter.html#Fig24).


    ![A978-1-4842-1242-4_14_Fig24_HTML.jpg](A978-1-4842-1242-4_14_Fig24_HTML.jpg)


    Figure 14-24.


    Adding the Interface Controller


    With the new Interface Controller in the Storyboard and selected, open the Identity
    Inspector and update the class name. If you already created the `DetailInterfaceController`
    class, the Class field will autofill after typing a couple of characters, as shown
    in Figure [14-25](#A978-1-4842-1242-4_14_Chapter.html#Fig25).


    ![A978-1-4842-1242-4_14_Fig25_HTML.jpg](A978-1-4842-1242-4_14_Fig25_HTML.jpg)


    Figure 14-25.


    Updating the class of the new Interface Controller in the Storyboard


    ### Implementing the Navigation


    There are two ways of implementing the push navigation between the two controllers:


    *   Adding a push segue in Interface Builder

    *   Extending the `didSelectRowAtIndex:` function in the interface controller
    class


    The two approaches are identical in terms of end results, but have different implementations.


    #### Adding a Push Segue


    Adding a push seque has two steps:


    *   Adding the seque itself

    *   Optionally, implementing the `contextForSegueWithIdentifier:inTable:rowIndex:`
    function in order to pass a data object to the next screen. In most cases, you’ll
    want to do this in order to pass the object to be displayed on the next screen.


    Tip


    If you set up navigation using a push segue, the `didSelectRowAtIndex` function
    won’t be called; you need to use the `prepareForSegue` function instead.


    Adding a segue is simplicity itself. In the Storyboard, select the row that will
    trigger the navigation and Ctrl-drag down to the Detail Interface scene, as shown
    in Figure [14-26](#A978-1-4842-1242-4_14_Chapter.html#Fig26).


    ![A978-1-4842-1242-4_14_Fig26_HTML.jpg](A978-1-4842-1242-4_14_Fig26_HTML.jpg)


    Figure 14-26.


    Adding the seque


    When you release the mouse button, the Selection Segue HUD will pop up: select
    the `Push` option from the HUD, and the segue will be added, as shown in Figure
    [14-27](#A978-1-4842-1242-4_14_Chapter.html#Fig27).


    ![A978-1-4842-1242-4_14_Fig27_HTML.jpg](A978-1-4842-1242-4_14_Fig27_HTML.jpg)


    Figure 14-27.


    The added segue


    Finally, you need to add an identifier to the segue so that it can be identified
    in the `contextForSegueWithIdentifier` function. Highlight the segue in Interface
    Builder, switch to the Attributes Inspector, and add the segue identifier string
    in the field, as shown in Figure [14-28](#A978-1-4842-1242-4_14_Chapter.html#Fig28).


    ![A978-1-4842-1242-4_14_Fig28_HTML.jpg](A978-1-4842-1242-4_14_Fig28_HTML.jpg)


    Figure 14-28.


    Adding the segue identifier string in the field


    If you run the app now, you’ll see that the detail screen is pushed in when you
    tap on a row, and popped back if you tap on the back chevron at the top left of
    the screen (shown in Figure [14-29](#A978-1-4842-1242-4_14_Chapter.html#Fig29)).


    ![A978-1-4842-1242-4_14_Fig29_HTML.jpg](A978-1-4842-1242-4_14_Fig29_HTML.jpg)


    Figure 14-29.


    Pushing and popping between screens


    Now add the `contextForSegueWithIdentifier:table:rowIndex:` function to the `InterfaceController`
    class. This is shown in Listing [14-8](#A978-1-4842-1242-4_14_Chapter.html#FPar12).


    Listing 14-8. The contextForSegueWithIdentifier:table:rowIndex: Function


    `override func contextForSegueWithIdentifier(segueIdentifier: String,➤`


    `inTable table: WKInterfaceTable, rowIndex: Int) -> AnyObject? {`


    `if segueIdentifier == "PushDetailScreenSegue" {`


    `return dataArray[rowIndex - 1]`


    `}`


    `return nil`


    `}`


    This will return the name from the data array at the index corresponding to the
    selected row, and pass it to the `DetailInterfaceController` in the context. Note
    that you’re subtracting 1 from the `rowIndex` that’s passed into the function,
    to compensate for the fact that the first row of the table is actually the header
    row.


    The context can be any object that will be used by the detail interface controller
    so will have a type of `AnyObject`.


    Here, you’re creating a dictionary containing the name of the person at the selected
    row. Now let’s update the controller to use this.


    In the `DetailInterfaceController` class, add an outlet for a `WKInterfaceLabel`
    called `nameLabel`:


    `@IBOutlet var nameLabel: WKInterfaceLabel!`


    Then switch back to Interface Builder, and add a `WKInterfaceLabel` object to
    the `DetailInterfaceController`, as shown in Figure [14-30](#A978-1-4842-1242-4_14_Chapter.html#Fig30).


    ![A978-1-4842-1242-4_14_Fig30_HTML.jpg](A978-1-4842-1242-4_14_Fig30_HTML.jpg)


    Figure 14-30.


    The label


    Set the label’s `Lines` property to `0` so that it will automatically wrap the
    content. Finally, connect the outlet to the control by dragging and dropping in
    Interface Builder.


    With the control connected, you can update the `DetailInterfaceController` class
    to use the context object that will be passed to it from the `InterfaceController`.'
  trans: "\n# 使用 WatchKit 表格进行导航\n\n`UITableViews` 通常被用作“深入”数据层级结构的导航机制。`WKInterfaceTable`\
    \ 同样可以用于此目的，尽管是在更小的界面限制下。\n\n在 WatchKit 中，有两种在屏幕内容间导航的方式：基于页面的方式（适用于独立屏幕间的切换）；以及层级方式（新屏幕推入视图，并附带一个用于在“树”结构中向后导航的屏幕控件）。\n\
    \n虽然你可以在基于层级的应用中使用其他控件来控制屏幕间的切换，但使用 `WKInterfaceTable` 来实现是一种非常常见的界面模式。\n\n屏幕间的转场过渡可以通过在\
    \ Interface Builder 中设置的 Segue 实现，也可以通过调用 `pushControllerWithName:context:` 函数来触发，该函数可在\
    \ `didSelectRowAtIndex:` 函数中调用，以响应某行的点击。\n\n要在屏幕间传递信息（例如显示在所选行中的对象），以便详情界面能显示其相关数据，你需要在两个控制器之间传递一个\
    \ `context` 对象。在你的场景中，这个对象就是 `dataArray` 中与所选行索引对应的那个对象。\n\n扩展上一节中的示例应用以添加层级导航并不困难。它只需要三个步骤：\n\
    \n- 添加一个新的界面控制器类来管理新屏幕。\n- 在 Storyboard 中添加一个新的界面控制器，并布置好控件。\n- 实现导航，可以通过添加一个\
    \ push 类型的 Segue，或者扩展 `didSelectRowAtIndex:` 函数，使其在选择某行时推送新屏幕。\n\n## 添加新的界面控制器\n\
    \n第一步是添加一个充当界面控制器的新类。为此，请添加一个新文件（文件 ➤ 新建 ➤ 文件），然后选择 Cocoa Touch 模板。创建一个 `WKInterfaceController`\
    \ 的子类，并将其命名为 `DetailInterfaceController`，如图 14-23 所示。\n\n![A978-1-4842-1242-4_14_Fig23_HTML.jpg](img/A978-1-4842-1242-4_14_Fig23_HTML.jpg)\n\
    \n图 14-23. 创建 `DetailInterfaceController`\n\n确保新文件创建在 WatchTarget Extension 中，而不是主应用或\
    \ WatchTable 应用中。\n\n## 在 Storyboard 中添加新屏幕\n\n要在现有的 Storyboard 中添加新屏幕，请从对象浏览器中选择“Interface\
    \ Controller”，并将其拖拽到 Storyboard 中，如图 14-24 所示。\n\n![A978-1-4842-1242-4_14_Fig24_HTML.jpg](img/A978-1-4842-1242-4_14_Fig24_HTML.jpg)\n\
    \n图 14-24. 添加界面控制器\n\n在 Storyboard 中选中新添加的界面控制器后，打开身份检查器（Identity Inspector）并更新类名。如果你已经创建了\
    \ `DetailInterfaceController` 类，则输入几个字符后，类字段将自动填充，如图 14-25 所示。\n\n![A978-1-4842-1242-4_14_Fig25_HTML.jpg](img/A978-1-4842-1242-4_14_Fig25_HTML.jpg)\n\
    \n图 14-25. 在 Storyboard 中更新新界面控制器的类\n\n## 实现导航\n\n在两个控制器之间实现 push 导航有两种方式：\n\n\
    - 在 Interface Builder 中添加一个 push Segue\n- 在界面控制器类中扩展 `didSelectRowAtIndex:` 函数\n\
    \n这两种方法在最终效果上完全相同，但实现方式不同。\n\n### 添加 Push Segue\n\n添加一个 push Segue 分为两个步骤：\n\n\
    - 添加 Segue 本身\n- 可选地，实现 `contextForSegueWithIdentifier:inTable:rowIndex:` 函数，以便将数据对象传递到下一个屏幕。在大多数情况下，你需要这样做来传递要在下一个屏幕上显示的对象。\n\
    \n> **提示：** 如果你使用 push Segue 设置导航，则 `didSelectRowAtIndex` 函数将不会被调用；你需要改用 `prepareForSegue`\
    \ 函数。\n\n添加 Segue 本身非常简单。在 Storyboard 中，选择将触发导航的行，然后按住 Ctrl 键并向下拖拽到“详情界面”场景，如图\
    \ 14-26 所示。\n\n![A978-1-4842-1242-4_14_Fig26_HTML.jpg](img/A978-1-4842-1242-4_14_Fig26_HTML.jpg)\n\
    \n图 14-26. 添加 Segue\n\n释放鼠标按钮时，将弹出“选择 Segue”HUD：从 HUD 中选择 `Push` 选项，Segue 将被添加，如图\
    \ 14-27 所示。\n\n![A978-1-4842-1242-4_14_Fig27_HTML.jpg](img/A978-1-4842-1242-4_14_Fig27_HTML.jpg)\n\
    \n图 14-27. 添加的 Segue\n\n最后，你需要为 Segue 添加一个标识符，以便在 `contextForSegueWithIdentifier`\
    \ 函数中识别它。在 Interface Builder 中高亮选中该 Segue，切换到属性检查器（Attributes Inspector），并在字段中添加\
    \ Segue 标识字符串，如图 14-28 所示。\n\n![A978-1-4842-1242-4_14_Fig28_HTML.jpg](img/A978-1-4842-1242-4_14_Fig28_HTML.jpg)\n\
    \n图 14-28. 在字段中添加 Segue 标识字符串\n\n如果你现在运行应用，将看到当点击某行时，详情屏幕会被推入；而点击屏幕左上角的返回箭头（如图\
    \ 14-29 所示）则会返回。\n\n![A978-1-4842-1242-4_14_Fig29_HTML.jpg](img/A978-1-4842-1242-4_14_Fig29_HTML.jpg)\n\
    \n图 14-29. 屏幕之间的推入和弹出\n\n现在，将 `contextForSegueWithIdentifier:table:rowIndex:`\
    \ 函数添加到 `InterfaceController` 类中。该函数如代码清单 14-8 所示。\n\n代码清单 14-8. `contextForSegueWithIdentifier:table:rowIndex:`\
    \ 函数\n\n``` \noverride func contextForSegueWithIdentifier(segueIdentifier: String,\n\
    \    inTable table: WKInterfaceTable, rowIndex: Int) -> AnyObject? {\n    if segueIdentifier\
    \ == \"PushDetailScreenSegue\" {\n        return dataArray[rowIndex - 1]\n   \
    \ }\n    return nil\n}\n```\n\n这将会从数据数组中返回与所选行索引对应的名字，并将其作为上下文传递给 `DetailInterfaceController`。请注意，这里从传入函数的\
    \ `rowIndex` 中减去了 1，以补偿表格的第一行实际上是标题行的事实。\n\n上下文可以是任何将被详情界面控制器使用的对象，因此其类型为 `AnyObject`。\n\
    \n在这里，你正在创建一个包含所选行人员姓名的字典。现在让我们更新控制器来使用它。\n\n在 `DetailInterfaceController` 类中，为一个名为\
    \ `nameLabel` 的 `WKInterfaceLabel` 添加一个输出口：\n\n``` \n@IBOutlet var nameLabel:\
    \ WKInterfaceLabel!\n```\n\n然后切换回 Interface Builder，并向 `DetailInterfaceController`\
    \ 添加一个 `WKInterfaceLabel` 对象，如图 14-30 所示。\n\n![A978-1-4842-1242-4_14_Fig30_HTML.jpg](img/A978-1-4842-1242-4_14_Fig30_HTML.jpg)\n\
    \n图 14-30. 标签\n\n将标签的 `Lines` 属性设置为 `0`，以便它能自动换行显示内容。最后，通过在 Interface Builder\
    \ 中拖放来将输出口连接到该控件。\n\n连接好控件后，你就可以更新 `DetailInterfaceController` 类，使其使用将从 `InterfaceController`\
    \ 传递过来的上下文对象。\n"
- fmt: "当加载详情界面时，它会调用`awakeWithContext:`函数。`context`对象作为参数传入，因此你可以在这里使用先前创建的字典内容。\n\
    \n列表[14-9](#A978-1-4842-1242-4_14_Chapter.html#FPar13)展示了`awakeWithContext:`函数。\n\
    \n列表 14-9. `awakeWithContext`函数\n\n```\noverride func awakeWithContext(context:\
    \ AnyObject?) {\n    super.awakeWithContext(context)\n    if let selectedName\
    \ = context as? String {\n        nameLabel.setText(\"You selected the row for\
    \ \\(selectedName)\")\n    }\n}\n```\n\n如果现在运行应用程序并点击某行，你会看到详情界面被推入，并更新为你点击的行中人员的姓名，如图[14-31](#A978-1-4842-1242-4_14_Chapter.html#Fig31)所示。\n\
    \n![A978-1-4842-1242-4_14_Fig31_HTML.jpg](A978-1-4842-1242-4_14_Fig31_HTML.jpg)\n\
    \n图 14-31. 详情视图\n\n这是一个非常简化的实现，但`context`对象允许你在控制器之间传递信息，以构建逐层深入的导航体验。\n\n###\
    \ 在代码中添加导航\n\n在上一节中，你了解了如何使用Storyboard和segue实现导航流程。你也可以通过代码实现相同的结果。\n\n与其用segue连接两个Storyboard场景，你可以依赖`didSelectRowAtIndex`函数，并使用`pushControllerWithName:context:`函数触发详情控制器的推送。\n\
    \n列表[14-10](#A978-1-4842-1242-4_14_Chapter.html#FPar14)展示了更新后的`didSelectRowAtIndex:`函数。\n\
    \n列表 14-10. 在代码中推送详情控制器\n\n```\noverride func table(table: WKInterfaceTable, didSelectRowAtIndex\
    \ rowIndex: Int) {\n    for index in 0..<dataArray.count {\n        var contactRow:\
    \ ContactRowController = \n            watchTable.rowControllerAtIndex(index+1)\
    \ as! ContactRowController\n        contactRow.nameLabel!.setTextColor(UIColor.whiteColor())\n\
    \    }\n    let selectedRow: ContactRowController = \n        watchTable.rowControllerAtIndex(rowIndex)\
    \ as! ContactRowController\n    selectedRow.nameLabel.setTextColor(UIColor.redColor())\n\
    \    let contextDictionary = [\"selectedName\" : dataArray[rowIndex - 1]]\n  \
    \  self.pushControllerWithName(\"DetailInterface\", context: contextDictionary)\n\
    }\n```\n\n这里你使用了`pushControllerWithName:context:`函数来执行导航。它依赖于在属性检查器中设置了`identifier`的详情控制器。图[14-32](#A978-1-4842-1242-4_14_Chapter.html#Fig32)展示了`DetailInterface`场景的该设置。\n\
    \n![A978-1-4842-1242-4_14_Fig32_HTML.jpg](A978-1-4842-1242-4_14_Fig32_HTML.jpg)\n\
    \n图 14-32. 设置界面控制器的标识符\n\n## 总结\n\n在本章中，你学习了如何创建、配置和使用WatchKit中的表格控件。\n\nWatchKit专为小型、低功耗的Apple\
    \ Watch设计，因此`WKInterfaceTable`控件远不如`UITableView`强大，但它仍然可以用于呈现基于表格的信息并充当导航界面。\n\
    \n# 15. 集合视图流布局\n\n在本章中，你将学习`UICollectionView`家族中最有用的组件之一——流布局。流布局允许你以极少的努力构建包含行或列项目的集合视图，同时还提供对各种属性的精细控制，以便微调其外观。\n\
    \n本章的示例应用程序代码实现了一个基于流的布局，以展示其众多功能，并提供一个可为你自己的目的进行修改的模板。\n\n## 关于流布局\n\n由行或列项目组成的布局是一种非常常见的用户界面设计。它是从图库到书架等各种应用程序的基本元素。图[15-1](#A978-1-4842-1242-4_15_Chapter.html#Fig1)到图[15-3](#A978-1-4842-1242-4_15_Chapter.html#Fig3)展示了一些示例。\n\
    \n![A978-1-4842-1242-4_15_Fig3_HTML.jpg](A978-1-4842-1242-4_15_Fig3_HTML.jpg)\n\
    \n图 15-3. Artsy应用程序中高度定制的流布局\n\n![A978-1-4842-1242-4_15_Fig2_HTML.jpg](A978-1-4842-1242-4_15_Fig2_HTML.jpg)\n\
    \n图 15-2. iBooks中运行的简单流布局\n\n![A978-1-4842-1242-4_15_Fig1_HTML.jpg](A978-1-4842-1242-4_15_Fig1_HTML.jpg)\n\
    \n图 15-1. iPhone 6上运行的流布局\n\n尽管网格式布局在视觉上看起来很简单，但当你考虑涉及间距计算或每行何处换行等方面的计算时，事情会迅速变得复杂。\n\
    \n幸运的是，Apple认识到了这一点，并为`UICollectionView`附带了一个\"现成\"的布局，使得创建基于行的界面变得非常容易。`UICollectionViewFlowLayout`可用于以极少的配置快速创建网格布局，同时它允许一定程度的自定义，使你能够用最少的代码创建非常复杂的界面。\n\
    \n## 流布局的特性\n\n你可以将流布局想象成一个句子，其中单词从一侧到另一侧排列成行，当行到达页面边缘时，该行\"换行\"到下一行。\n\n在iOS术语中，页面对应于集合视图的边界，单词类似于集合视图的项目。每行单词对应于一个集合视图行。参见图[15-4](#A978-1-4842-1242-4_15_Chapter.html#Fig4)。\n\
    \n![A978-1-4842-1242-4_15_Fig4_HTML.jpg](A978-1-4842-1242-4_15_Fig4_HTML.jpg)\n\
    \n图 15-4. 流布局如何运作\n\n这个类比可以进一步延伸：流布局可以分成带有页眉和页脚的区块，就像页面可以分成带有标题的段落。正如单个单词有不同的长度，流布局也可以显示不同大小（水平和垂直方向）的项目。\n\
    \n## UICollectionViewFlowLayout\n\n`UICollectionViewFlowLayout`是`UICollectionViewLayout`的一个具体子类，它添加了许多属性来控制项目的流动。它处理了涉及项目和行间距以及换行的大部分计算。\n\
    \n你可以控制的属性如下：\n\n- 滚动方向（相对于集合视图的垂直或水平方向）\n- 行间距和项目间距\n- 项目大小\n- 页眉和页脚大小\n- 区块边距\n\
    \n一旦你提供了这些值，流布局就会处理所有涉及如何定位和间隔项目、以及何时换行以将所有项目整齐地放入可用空间的计算。\n\n`UICollectionViewFlowLayout`的大小和间距属性全局应用于所有项目、页眉、页脚和区块，如果集合视图的项目大小恒定，这将非常有用。如果你需要显示不同大小的项目，则需要实现一个符合`UICollectionViewDelegateFlowLayout`协议的可选委托对象。\n\
    \n流布局的委托对象提供了对项目大小、区块间距以及页眉和页脚大小的精细控制。如果你的项目大小会变化，例如在构建一个显示不同高度或宽度缩略图图像的图库时，这将非常有用。\n\
    \n委托协议的所有函数都是可选的，因此除非你需要控制相关属性，否则无需实现它们。"
