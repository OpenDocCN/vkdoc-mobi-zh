  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n# 将自定义控件嵌入到单元格中\n\
    \n到目前为止，您主要关注的是创建和呈现基本静态的视图。尽管您已经创建了呈现动态数据的单元格，但这些单元格本身目前仅对与编辑、删除和排序相关的基本点击和滑动操作做出响应。\n\
    \n由于 `UITableViewCell` 和 `UICollectionViewCell` 都是 `UIView` 的子类，因此您几乎可以执行任何对“标准”`UIView`\
    \ 能执行的操作。这包括将自定义控件（如按钮、滑块和开关）作为子视图嵌入，并让它们响应用户操作。\n\n首先，这里有一个非常简单的示例。每个单元格包含一个\
    \ `UIButton`，点击时会弹出一个警告视图，如图 9-1 所示。\n\n![A978-1-4842-1242-4_9_Fig1_HTML.jpg](img/A978-1-4842-1242-4_9_Fig1_HTML.jpg)\n\
    \n图 9-1. 非常简单的按钮\n\n您可以使用两种方法来实现此类功能：\n\n-   一种简单的方法，即在首次创建单元格时直接将按钮插入到单元格中\n\
    -   一种更健壮的方法，它使用自定义单元格类和委托。\n\n在本节中，我们将先探讨简单的方法；然后在下一节逐步构建一个更健壮的解决方案。\n\n## 简单方法\
    \ – 直接将按钮添加到单元格\n\n我不会详细讨论创建表格或集合视图的主要方面——这部分现在已经非常熟悉了——但为了创建按钮和警告视图，您需要做两件事。\n\
    \n### 创建警告视图\n\n首先是创建一个函数，用于在点击某个按钮时显示警告视图；这应该放在视图控制器的扩展中。代码清单 9-1 显示了表格版本。\n\n\
    代码清单 9-1. `didTapButtonInCell:` 方法\n\n```\nfunc didTapButtonInCell(sender: UIButton)\
    \ {\n    let alert = UIAlertController(title: \"Something happened!\", message:\
    \ \"A button was tapped\", preferredStyle: .Alert)\n    let action = UIAlertAction(title:\
    \ \"OK\", style: .Default, handler: nil)\n    alert.addAction(action)\n    self.presentViewController(alert,\
    \ animated: true, completion: nil)\n}\n```\n\n### 创建按钮\n\n创建了 `didTapButtonInCell`\
    \ 函数后，您需要将按钮添加到单元格中，并将它们连接到这个方法。\n\n创建一个名为 `addButtonToCell` 的函数。代码清单 9-2 显示了表格视图的版本。\n\
    \n代码清单 9-2. 表格视图的 `addButtonToCell` 方法\n\n```\nfunc addButtonToCell(cell: UITableViewCell)\
    \ {\n    guard cell.contentView.viewWithTag(1000) == nil else {\n        return\n\
    \    }\n    let button = UIButton(type: UIButtonType.RoundedRect)\n    button.tag\
    \ = 1000\n    button.setTitle(\"Tap me!\", forState: UIControlState.Normal)\n\
    \    button.sizeToFit()\n    button.translatesAutoresizingMaskIntoConstraints\
    \ = false\n    button.addTarget(self, action: \"didTapButtonInCell:\", forControlEvents:\
    \ UIControlEvents.TouchUpInside)\n    let vConstraint = NSLayoutConstraint(item:\
    \ button, attribute: NSLayoutAttribute.CenterY, relatedBy: NSLayoutRelation.Equal,\
    \ toItem: cell.contentView, attribute: NSLayoutAttribute.CenterY, multiplier:\
    \ 1.0, constant: 0)\n    let hConstraint = NSLayoutConstraint(item: button, attribute:\
    \ NSLayoutAttribute.Right, relatedBy: NSLayoutRelation.Equal, toItem: cell.contentView,\
    \ attribute: NSLayoutAttribute.Right, multiplier: 1.0, constant: 0)\n    cell.contentView.addSubview(button)\n\
    \    cell.contentView.addConstraints([vConstraint, hConstraint])\n}\n```\n\n集合视图的函数定义略有不同：\n\
    \n```\nfunc addButtonToCell(cell: UICollectionViewCell) {\n```\n\n函数的第一部分检查单元格中是否已存在按钮：\n\
    \n```\nguard cell.contentView.viewWithTag(1000) == nil else {\n    return\n}\n\
    ```\n\n`guard` 语句检查单元格的 `contentView` 中是否存在标记为 `1000` 的 `UIView` 或 `UIView` 子类。除非\
    \ `viewWithTag()` 函数的结果为 nil，否则函数将返回，因为按钮已创建，无需添加。\n\n另一方面，如果单元格中还没有按钮，函数的下一部分将创建一个\
    \ `UIButton` 实例，设置其标题，然后调整其大小以适应内容：\n\n```\nlet button = UIButton(type: UIButtonType.RoundedRect)\n\
    button.setTitle(\"Tap me!\", forState: UIControlState.Normal)\nbutton.sizeToFit()\n\
    button.translatesAutoresizingMaskIntoConstraints = false\n```\n\n然后，通过向按钮添加一个目标(target)，将按钮与函数关联起来：\n\
    \n```\nbutton.addTarget(self, action: \"didTapButtonInCell:\", forControlEvents:\
    \ UIControlEvents.TouchUpInside)\n```\n\n接下来，您需要几个 AutoLayout 约束来定位按钮。以下是表格视图的定位代码：\n\
    \n```\nlet vConstraint = NSLayoutConstraint(item: button, attribute: NSLayoutAttribute.CenterY,\
    \ relatedBy: NSLayoutRelation.Equal, toItem: cell.contentView, attribute: NSLayoutAttribute.CenterY,\
    \ multiplier: 1.0, constant: 0)\nlet hConstraint = NSLayoutConstraint(item: button,\
    \ attribute: NSLayoutAttribute.Right, relatedBy: NSLayoutRelation.Equal, toItem:\
    \ cell.contentView, attribute: NSLayoutAttribute.Right, multiplier: 1.0, constant:\
    \ 0)\n```\n\n集合视图的定位略有不同：\n\n```\nlet vConstraint = NSLayoutConstraint(item: button,\
    \ attribute: NSLayoutAttribute.CenterX, relatedBy: NSLayoutRelation.Equal, toItem:\
    \ cell.contentView, attribute: NSLayoutAttribute.CenterX, multiplier: 1.0, constant:\
    \ 0)\nlet hConstraint = NSLayoutConstraint(item: button, attribute: NSLayoutAttribute.Bottom,\
    \ relatedBy: NSLayoutRelation.Equal, toItem: cell.contentView, attribute: NSLayoutAttribute.Bottom,\
    \ multiplier: 1.0, constant: -10)\n```\n\n最后，您可以将按钮添加到单元格中：\n\n```\ncell.contentView.addSubview(button)\n\
    ```\n\n并添加布局约束：\n\n```\ncell.contentView.addConstraints([vConstraint, hConstraint])\n\
    ```\n\n### 将按钮添加到单元格\n\n将按钮添加到单元格需要更新 `tableView:cellForRowAtIndexPath:` 或 `collectionView:cellForItemAtIndexPath:`\
    \ 函数。\n\n函数的第一部分是标准的——这里单元格中有一个标签为 2000 的标签，用于显示行数。\n\n要将按钮插入到单元格中，请添加对 `addButtonToCell(_:)`\
    \ 函数的调用。代码清单 9-3 显示了集合视图的版本。\n\n代码清单 9-3. 将按钮添加到单元格\n\n```\nfunc collectionView(collectionView:\
    \ UICollectionView, cellForItemAtIndexPath indexPath: NSIndexPath) -> UICollectionViewCell\
    \ {\n    let cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"CellIdentifier\"\
    , forIndexPath: indexPath)\n    let label = cell.contentView.viewWithTag(2000)\
    \ as! UILabel\n    label.text = \"Item \\(cvData[indexPath.row])\"\n    addButtonToCell(cell)\n\
    \    cell.layer.borderColor = UIColor.blackColor().CGColor\n    cell.layer.borderWidth\
    \ = 1.0\n    return cell\n}\n```\n"
- fmt: "### Reacting to Individual Controls\n\nImpressive as this example might seem,\
    \ there’s one significant limitation. Each button is tied to the same method,\
    \ so it isn’t possible to do something that is related to a specific cell. A very\
    \ simple example might be to pop up an alert view containing the `indexPath` of\
    \ the button’s cell.\n\nTo do this, you need to update the `didTapButtonInCell:`\
    \ function, as shown in Listing [9-4](#A978-1-4842-1242-4_9_Chapter.html#FPar5).\n\
    \n**Listing 9-4.** Reacting to Individual Cells\n\n```\nfunc didTapButtonInCell(sender:\
    \ UIButton) {\n    let cell = sender.superview!.superview as! UICollectionViewCell\n\
    \    let indexPathAtTap = collectionView.indexPathForCell(cell)\n    let alert\
    \ = UIAlertController(title: \"Something happened!\", message: \"A button was\
    \ tapped at row \\(indexPathAtTap?.row)\", preferredStyle: .Alert)\n    let action\
    \ = UIAlertAction(title: \"OK\", style: .Default, handler: nil)\n    alert.addAction(action)\n\
    \    self.presentViewController(alert, animated: true, completion: nil)\n}\n```\n\
    \nYou’ll notice something slightly strange about the first line. You’re getting\
    \ the `superview` of the `superview` of the button.\n\nThat’s because the button\
    \ sits inside the cell’s `contentView`, which sits inside the cell. Figure [9-2](#A978-1-4842-1242-4_9_Chapter.html#Fig2)\
    \ shows how the elements fit together.\n\n![A978-1-4842-1242-4_9_Fig2_HTML.jpg](A978-1-4842-1242-4_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2.** How the cell views fit together\n\nPutting this all together,\
    \ you now have a set of cells with buttons that trigger row-specific actions,\
    \ shown in Figure [9-3](#A978-1-4842-1242-4_9_Chapter.html#Fig3).\n\n![A978-1-4842-1242-4_9_Fig3_HTML.jpg](A978-1-4842-1242-4_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3.** The row-specific alertView\n\n### A More Robust Subclass-based\
    \ Approach\n\nAlthough it works, the simple approach has a major flaw – it relies\
    \ on the button being in exactly the right place in the cell’s view hierarchy.\
    \ If that changes for any reason, you would have to ensure that the `didTapButtonInCell:`\
    \ function was updated to match.\n\nA less hacky approach is to use a custom cell\
    \ subclass which calls back to a delegate in order to react to the tap on the\
    \ button.\n\nThis involves making some changes to the project as it stands:\n\n\
    * Declaring a protocol to define the interaction between the cell and the view\
    \ controller.\n* Implementing a custom `UITableViewCell` subclass which has a\
    \ delegate property, and adds a button which makes a call to the delegate when\
    \ it is tapped.\n* Amending the Storyboard to use instances of the custom `UITableViewCell`\
    \ subclass\n* Updating the view controller to set the cell’s delegate as the cell\
    \ is instantiated; and handle the delegate callback from the cell.\n\n#### Declaring\
    \ the Protocol\n\nTo declare the protocol, you’ll need to add it to the very top\
    \ of the view controller, as shown in Listing [9-5](#A978-1-4842-1242-4_9_Chapter.html#FPar6):\n\
    \n**Listing 9-5.** The Delegate Protocol Declaration\n\n```\nprotocol InCellButtonProtocol\
    \ {\n    func didTapButtonInCell(cell: ButtonCell)\n}\n```\n\n#### Implementing\
    \ the Custom UITableViewCell\n\nThe custom `UITableViewCell` subclass will differ\
    \ from a vanilla table cell in three ways:\n\n* It will add a button to its `contentView`\
    \ in the `awakeFromNib()` function\n* It will have a `delegate` optional property,\
    \ which will require an object that conforms to the `InCellButtonProtocol`\n*\
    \ It will have an `IBAction` function that calls the delegate in response to taps\
    \ in the button.\n\nStart by adding a new class for the custom cell – `File ➤\
    \ New ➤ File`, and select the `Cocoa Touch` class option from the `Source` templates.\
    \ Call the file `ButtonCell`, and make sure that it is a subclass of `UITableViewCell`,\
    \ as shown in Figure [9-4](#A978-1-4842-1242-4_9_Chapter.html#Fig4):\n\n![A978-1-4842-1242-4_9_Fig4_HTML.jpg](A978-1-4842-1242-4_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4.** Adding the cell subclass\n\n##### Adding the Button to the Cell’s\
    \ ContentView\n\nTo add the button to the cell’s `contentView`, you’ll override\
    \ the `awakeFromNib()` function – this is called when the cell is retrieved from\
    \ the Storyboard in the `cellForRowAtIndexPath:` function.\n\nAs things stand,\
    \ there will be a stub function in the `ButtonCell` class, as shown in Listing\
    \ [9-6](#A978-1-4842-1242-4_9_Chapter.html#FPar7):\n\n**Listing 9-6.** The Stub\
    \ awakeFromNib() Function\n\n```\noverride func awakeFromNib() {\n    super.awakeFromNib()\n\
    \    // Initialization code\n}\n```\n\nUpdate this function as shown in Listing\
    \ [9-7](#A978-1-4842-1242-4_9_Chapter.html#FPar8) – this is based on the code\
    \ which you saw in the previous section, but with some updates that are detailed\
    \ below.\n\n**Listing 9-7.** The Updated awakeFromNib() Function\n\n```\noverride\
    \ func awakeFromNib() {\n    super.awakeFromNib()\n    // Initialization code\n\
    \n    let button = UIButton(type: UIButtonType.RoundedRect)\n    button.setTitle(\"\
    Tap me!\", forState: UIControlState.Normal)\n    button.sizeToFit()\n    button.translatesAutoresizingMaskIntoConstraints\
    \ = false\n    button.addTarget(self, action: \"didTapButton:\", forControlEvents:\
    \ UIControlEvents.TouchUpInside)\n\n    let vConstraint = NSLayoutConstraint(item:\
    \ button, attribute: NSLayoutAttribute.CenterY, relatedBy: NSLayoutRelation.Equal,\
    \ toItem: self.contentView, attribute: NSLayoutAttribute.CenterY, multiplier:\
    \ 1.0, constant: 0)\n    let hConstraint = NSLayoutConstraint(item: button, attribute:\
    \ NSLayoutAttribute.Right, relatedBy: NSLayoutRelation.Equal, toItem: self.contentView,\
    \ attribute: NSLayoutAttribute.Right, multiplier: 1.0, constant: 0)\n\n    self.contentView.addSubview(button)\n\
    \    self.contentView.addConstraints([vConstraint, hConstraint])\n}\n```\n\nThere\
    \ are a couple of differences – firstly, the button has no `tag` set, and secondly,\
    \ the added target is the cell instance itself:\n\n```\nbutton.addTarget(self,\
    \ action: \"didTapButton:\", forControlEvents: UIControlEvents.TouchUpInside)\n\
    ```\n\nOtherwise, everything is the same – the button is created; the title is\
    \ set; it is sized to fit the text; the attributes are created; and added to the\
    \ cell.\n\n##### Adding a Delegate Property\n\nWhen the button is tapped, it will\
    \ call back to the delegate which is responsible for implementing whatever action\
    \ should take place.\n\nIn order for this to happen, add a `delegate` property\
    \ to the `ButtonCell` class:\n\n```\nvar delegate: InCellButtonProtocol?\n```\n\
    \nThis declares that the `delegate` is an optional that conforms to the `InCellButtonProtocol`.\n\
    \n##### Adding the Code to Handle a Button Tap\n\nThe action that we added to\
    \ the button in the `awakeFromNib()` function calls the `ButtonCell`’s `didTapButton:`\
    \ function, which you need to add. This is shown in Listing [9-8](#A978-1-4842-1242-4_9_Chapter.html#FPar9):\n\
    \n**Listing 9-8.** The didTapButton: function\n\n```\nfunc didTapButton(sender:\
    \ AnyObject) {\n    if let delegate = delegate {\n        delegate.didTapButtonInCell(self)\n\
    \    }\n}\n```\n\nThis simple checks if there is a `delegate` set, and calls the\
    \ `didTapButtonInCell:` function if there is, passing a reference to itself as\
    \ the parameter.\n\nThis is all the changes that are needed in the `ButtonCell`\
    \ class. Now there’s a change required in the Storyboard.\n\n##### Updating the\
    \ Storyboard\n\nSwitch to the Storyboard, and update the prototype cell so that\
    \ is an instance of `ButtonCell`. In the `Identity Inspector`, click into the\
    \ `Class` field in the `Custom Class` section, and add `ButtonCell` as shown in\
    \ Figure [9-5](#A978-1-4842-1242-4_9_Chapter.html#Fig5):\n\n![A978-1-4842-1242-4_9_Fig5_HTML.jpg](A978-1-4842-1242-4_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5.** Updating the Cell’s Class"
  raw: '### Reacting to Individual Controls


    Impressive as this example might seem, there’s one significant limitation. Each
    button is tied to the same method, so it isn’t possible to do something that is
    related to a specific cell. A very simple example might be to pop up an alert
    view containing the `indexPath` of the button’s cell.


    To do this, you need to update the `didTapButtonInCell:` function, as shown in
    Listing [9-4](#A978-1-4842-1242-4_9_Chapter.html#FPar5).


    Listing 9-4. Reacting to Individual Cells


    `func didTapButtonInCell(sender: UIButton) {`


        `let cell = sender.superview!.superview as! UICollectionViewCell`


        `let indexPathAtTap = collectionView.indexPathForCell(cell)`


        `let alert = UIAlertController(title: "Something happened!", message: "A button
    was➤`


       `tapped at row \(indexPathAtTap?.row)", preferredStyle: .Alert)`


        `let action = UIAlertAction(title: "OK", style: .Default, handler: nil)`


        `alert.addAction(action)`


        `self.presentViewController(alert, animated: true, completion: nil)`


    `}`


    You’ll notice something slightly strange about the first line. You’re getting
    the `superview` of the `superview` of the button.


    That’s because the button sits inside the cell’s `contentView`, which sits inside
    the cell. Figure [9-2](#A978-1-4842-1242-4_9_Chapter.html#Fig2) shows how the
    elements fit together.


    ![A978-1-4842-1242-4_9_Fig2_HTML.jpg](A978-1-4842-1242-4_9_Fig2_HTML.jpg)


    Figure 9-2.


    How the cell views fit together


    Putting this all together, you now have a set of cells with buttons that trigger
    row-specific actions, shown in Figure [9-3](#A978-1-4842-1242-4_9_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_9_Fig3_HTML.jpg](A978-1-4842-1242-4_9_Fig3_HTML.jpg)


    Figure 9-3.


    The row-specific alertView


    ### A More Robust Subclass-based Approach


    Although it works, the simple approach has a major flaw – it relies on the button
    being in exactly the right place in the cell’s view hierarchy. If that changes
    for any reason, you would have to ensure that the `didTapButtonInCell:` function
    was updated to match.


    A less hacky approach is to use a custom cell subclass which calls back to a delegate
    in order to react to the tap on the button.


    This involves making some changes to the project as it stands:


    *   Declaring a protocol to define the interaction between the cell and the view
    controller.

    *   Implementing a custom `UITableViewCell` subclass which has a delegate property,
    and adds a button which makes a call to the delegate when it is tapped.

    *   Amending the Storyboard to use instances of the custom `UITableViewCell` subclass

    *   Updating the view controller to set the cell’s delegate as the cell is instantiated;
    and handle the delegate callback from the cell.


    #### Declaring the Protocol


    To declare the protocol, you’ll need to add it to the very top of the view controller,
    as shown in Listing [9-5](#A978-1-4842-1242-4_9_Chapter.html#FPar6):


    Listing 9-5. The Delegate Protocol Declaration


    `protocol InCellButtonProtocol {`


        `func didTapButtonInCell(cell: ButtonCell)`


    `}`


    #### Implementing the Custom UITableViewCell


    The custom `UITableViewCell` subclass will differ from a vanilla table cell in
    three ways:


    *   It will add a button to its contentView in the `awakeFromNib()` function

    *   It will have a `delegate` optional property, which will require an object
    that conforms to the `InCellButtonProtocol`

    *   It will have an `IBAction` function that calls the delegate in response to
    taps in the button.


    Start by adding a new class for the custom cell – `File ➤ New ➤ File`, and select
    the `Cocoa Tou`ch class option from the `Source` templates. Call the file `ButtonCell`,
    and make sure that it is a subclass of `UITableViewCell`, as shown in Figure [9-4](#A978-1-4842-1242-4_9_Chapter.html#Fig4):


    ![A978-1-4842-1242-4_9_Fig4_HTML.jpg](A978-1-4842-1242-4_9_Fig4_HTML.jpg)


    Figure 9-4.


    Adding the cell subclass


    ##### Adding the Button to the Cell’s ContentView


    To add the button to the cell’s `contentView`, you’ll override the `awakeFromNib()`
    function – this is called when the cell is retrieved from the Storyboard in the
    `cellForRowAtIndexPath:` function.


    As things stand, there will be a stub function in the ButtonCell class, as shown
    in Listing [9-6](#A978-1-4842-1242-4_9_Chapter.html#FPar7):


    Listing 9-6. The Stub awakeFromNib() Function


    `override func awakeFromNib() {`


        `super.awakeFromNib()`


        `// Initialization code`


    `}`


    Update this function as shown in Listing [9-7](#A978-1-4842-1242-4_9_Chapter.html#FPar8)
    – this is based on the code which you saw in the previous section, but with some
    updates that are detailed below.


    Listing 9-7. The Updated awakeFromNib( ) Function


    `override func awakeFromNib() {`


        `super.awakeFromNib()`


        `// Initialization code`


        `let button = UIButton(type: UIButtonType.RoundedRect)`


        `button.setTitle("Tap me!", forState: UIControlState.Normal)`


        `button.sizeToFit()`


        `button.translatesAutoresizingMaskIntoConstraints = false`


        `button.addTarget(self, action: "didTapButton:", forControlEvents: UIControlEvents.TouchUpInside)`


        `let vConstraint = NSLayoutConstraint(item: button, attribute: NSLayoutAttribute.CenterY,
    relatedBy:`


            `NSLayoutRelation.Equal, toItem: self.contentView, attribute: NSLayoutAttribute.CenterY,
    multiplier: 1.0, constant: 0)`


        `let hConstraint = NSLayoutConstraint(item: button, attribute: NSLayoutAttribute.Right,
    relatedBy: NSLayoutRelation.Equal, toItem: self.contentView, attribute: NSLayoutAttribute.Right,
    multiplier: 1.0, constant: 0)`


        `self.contentView.addSubview(button)`


        `self.contentView.addConstraints([vConstraint, hConstraint])`


    `}`


    There are a couple of differences – firstly, the button has no `tag` set, and
    secondly, the added target is the cell instance itself:


    `button.addTarget(self, action: "didTapButton:", forControlEvents: UIControlEvents.TouchUpInside)`


    Otherwise, everything is the same – the button is created; the title is set; it
    is sized to fit the text; the attributes are created; and added to the cell.


    ##### Adding a Delegate Property


    When the button is tapped, it will call back to the delegate which is responsible
    for implementing whatever action should take place.


    In order for this to happen, add a `delegate` property to the `ButtonCell` class:


    `var delegate: InCellButtonProtocol?`


    This declares that the `delegate` is an optional that conforms to the `InCellButtonProtocol`.


    ##### Adding the Code to Handle a Button Tap


    The action that we added to the button in the `awakeFromNib()` function calls
    the `ButtonCell`’s `didTapButton:`function, which you need to add. This is shown
    in Listing [9-8](#A978-1-4842-1242-4_9_Chapter.html#FPar9):


    Listing 9-8. The didTapButton: function


    `func didTapButton(sender: AnyObject) {`


        `if let delegate = delegate {`


            `delegate.didTapButtonInCell(self)`


        `}`


    `}`


    This simple checks if there is a `delegate` set, and calls the `didTapButtonInCell:`function
    if there is, passing a reference to itself as the parameter.


    This is all the changes that are needed in the `ButtonCell` class. Now there’s
    a change required in the Storyboard.


    ##### Updating the Storyboard


    Switch to the Storyboard, and update the prototype cell so that is an instance
    of `ButtonCell`. In the `Identity Inspector`, click into the `Class` field in
    the `Custom Class` section, and add `ButtonCell` as shown in Figure [9-5](#A978-1-4842-1242-4_9_Chapter.html#Fig5):


    ![A978-1-4842-1242-4_9_Fig5_HTML.jpg](A978-1-4842-1242-4_9_Fig5_HTML.jpg)


    Figure 9-5.


    Updating the Cell’s Class'
  trans: "\n### 响应单个控件\n\n这个示例虽然看起来令人印象深刻，但有一个明显的局限。每个按钮都绑定到同一个方法，因此无法执行与特定单元格相关的操作。一个非常简单的例子可能是弹出一个包含按钮所在单元格\
    \ `indexPath` 的警告视图。\n\n为此，你需要更新 `didTapButtonInCell:` 函数，如代码清单 9-4 所示。\n\n**代码清单\
    \ 9-4.** 响应单个单元格\n\n```\nfunc didTapButtonInCell(sender: UIButton) {\n    let\
    \ cell = sender.superview!.superview as! UICollectionViewCell\n    let indexPathAtTap\
    \ = collectionView.indexPathForCell(cell)\n    let alert = UIAlertController(title:\
    \ \"Something happened!\", message: \"A button was tapped at row \\(indexPathAtTap?.row)\"\
    , preferredStyle: .Alert)\n    let action = UIAlertAction(title: \"OK\", style:\
    \ .Default, handler: nil)\n    alert.addAction(action)\n    self.presentViewController(alert,\
    \ animated: true, completion: nil)\n}\n```\n\n你会注意到第一行代码有些奇怪。我们获取的是按钮的 `superview`\
    \ 的 `superview`。\n\n这是因为按钮位于单元格的 `contentView` 内部，而 `contentView` 又位于单元格内部。图 9-2\
    \ 展示了这些元素的嵌套关系。\n\n![A978-1-4842-1242-4_9_Fig2_HTML.jpg](img/A978-1-4842-1242-4_9_Fig2_HTML.jpg)\n\
    \n**图 9-2.** 单元格视图的嵌套方式\n\n综合以上内容，你现在得到了一组带有按钮的单元格，这些按钮可以触发指定行的操作，如图 9-3 所示。\n\
    \n![A978-1-4842-1242-4_9_Fig3_HTML.jpg](img/A978-1-4842-1242-4_9_Fig3_HTML.jpg)\n\
    \n**图 9-3.** 指定行的警告视图\n\n### 更稳健的基于子类的方法\n\n上述简单方法虽然可行，但存在一个重大缺陷——它依赖于按钮在单元格视图层次结构中位于完全正确的位置。如果该位置因任何原因发生变化，你就必须确保更新\
    \ `didTapButtonInCell:` 函数以匹配新的层级。\n\n一种更少“取巧”的方法是使用自定义单元格子类，它通过回调委托来响应按钮点击事件。\n\
    \n这需要对当前项目进行一些修改：\n\n*   声明一个协议，定义单元格与视图控制器之间的交互。\n*   实现一个自定义 `UITableViewCell`\
    \ 子类，该类包含一个委托属性，并添加一个按钮，当按钮被点击时，该按钮会调用委托。\n*   修改故事板，使用自定义 `UITableViewCell` 子类的实例。\n\
    *   更新视图控制器，在单元格实例化时设置其委托，并处理来自单元格的委托回调。\n\n#### 声明协议\n\n要声明该协议，你需要将其添加到视图控制器的顶部，如代码清单\
    \ 9-5 所示：\n\n**代码清单 9-5.** 委托协议声明\n\n```\nprotocol InCellButtonProtocol {\n  \
    \  func didTapButtonInCell(cell: ButtonCell)\n}\n```\n\n#### 实现自定义 UITableViewCell\n\
    \n自定义 `UITableViewCell` 子类与普通表格单元格在三个方面有所不同：\n\n*   它会在 `awakeFromNib()` 函数中向自己的\
    \ `contentView` 添加一个按钮。\n*   它包含一个可选的 `delegate` 属性，该属性需要一个遵循 `InCellButtonProtocol`\
    \ 协议的对象。\n*   它包含一个 `IBAction` 函数，该函数在按钮被点击时调用委托。\n\n首先，为自定义单元格添加一个新类：选择 `File\
    \ ➤ New ➤ File`，然后从 `Source` 模板中选择 `Cocoa Touch Class` 选项。将文件命名为 `ButtonCell`，并确保它是\
    \ `UITableViewCell` 的子类，如图 9-4 所示：\n\n![A978-1-4842-1242-4_9_Fig4_HTML.jpg](img/A978-1-4842-1242-4_9_Fig4_HTML.jpg)\n\
    \n**图 9-4.** 添加单元格子类\n\n##### 向单元格的 ContentView 添加按钮\n\n要向单元格的 `contentView` 添加按钮，你需要重写\
    \ `awakeFromNib()` 函数——当单元格在 `cellForRowAtIndexPath:` 函数中从故事板中检索出来时，该函数会被调用。\n\
    \n目前，`ButtonCell` 类中会有一个存根函数，如代码清单 9-6 所示：\n\n**代码清单 9-6.** 存根 awakeFromNib()\
    \ 函数\n\n```\noverride func awakeFromNib() {\n    super.awakeFromNib()\n    //\
    \ Initialization code\n}\n```\n\n按代码清单 9-7 所示更新此函数——该代码基于你在上一节中看到的代码，但进行了一些下面详述的更新。\n\
    \n**代码清单 9-7.** 更新后的 awakeFromNib() 函数\n\n```\noverride func awakeFromNib() {\n\
    \    super.awakeFromNib()\n    // Initialization code\n\n    let button = UIButton(type:\
    \ UIButtonType.RoundedRect)\n    button.setTitle(\"Tap me!\", forState: UIControlState.Normal)\n\
    \    button.sizeToFit()\n    button.translatesAutoresizingMaskIntoConstraints\
    \ = false\n    button.addTarget(self, action: \"didTapButton:\", forControlEvents:\
    \ UIControlEvents.TouchUpInside)\n\n    let vConstraint = NSLayoutConstraint(item:\
    \ button, attribute: NSLayoutAttribute.CenterY, relatedBy: NSLayoutRelation.Equal,\
    \ toItem: self.contentView, attribute: NSLayoutAttribute.CenterY, multiplier:\
    \ 1.0, constant: 0)\n    let hConstraint = NSLayoutConstraint(item: button, attribute:\
    \ NSLayoutAttribute.Right, relatedBy: NSLayoutRelation.Equal, toItem: self.contentView,\
    \ attribute: NSLayoutAttribute.Right, multiplier: 1.0, constant: 0)\n\n    self.contentView.addSubview(button)\n\
    \    self.contentView.addConstraints([vConstraint, hConstraint])\n}\n```\n\n这里有几个不同之处——首先，按钮没有设置\
    \ `tag`，其次，添加的目标是单元格实例本身：\n\n```\nbutton.addTarget(self, action: \"didTapButton:\"\
    , forControlEvents: UIControlEvents.TouchUpInside)\n```\n\n除此之外，一切都是一样的：创建按钮；设置标题；调整大小以适应文本；创建约束；并将其添加到单元格中。\n\
    \n##### 添加委托属性\n\n当按钮被点击时，它会回调委托，由委托负责执行相应的操作。\n\n为了实现这一点，需要在 `ButtonCell` 类中添加一个\
    \ `delegate` 属性：\n\n```\nvar delegate: InCellButtonProtocol?\n```\n\n这声明了 `delegate`\
    \ 是一个可选项，它遵循 `InCellButtonProtocol` 协议。\n\n##### 添加处理按钮点击的代码\n\n我们在 `awakeFromNib()`\
    \ 函数中添加到按钮上的动作会调用 `ButtonCell` 的 `didTapButton:` 函数，你需要添加这个函数。该函数如代码清单 9-8 所示：\n\
    \n**代码清单 9-8.** didTapButton: 函数\n\n```\nfunc didTapButton(sender: AnyObject)\
    \ {\n    if let delegate = delegate {\n        delegate.didTapButtonInCell(self)\n\
    \    }\n}\n```\n\n这段代码简单检查是否设置了 `delegate`，如果设置了，则调用 `didTapButtonInCell:` 函数，并将自身的引用作为参数传递。\n\
    \n这就是 `ButtonCell` 类中需要的所有更改。现在需要对故事板进行修改。\n\n##### 更新故事板\n\n切换到故事板，并更新原型单元格，使其成为\
    \ `ButtonCell` 的实例。在“身份检查器”中，点击“自定义类”部分下的“类”字段，然后添加 `ButtonCell`，如图 9-5 所示：\n\n\
    ![A978-1-4842-1242-4_9_Fig5_HTML.jpg](img/A978-1-4842-1242-4_9_Fig5_HTML.jpg)\n\
    \n**图 9-5.** 更新单元格的类\n"
- fmt: "# Updating the View Controller\n\nNow it’s time to update the `ViewController`\
    \ to use the new cell class, and react to calls from the cell.\n\nFirstly, conform\
    \ the `ViewController` class to the `InCellButtonProtocol` by updating the class\
    \ declaration:\n\n`class ViewController: UIViewController, InCellButtonProtocol\
    \ {`\n\nThen add the `didTapButtonInCell:` function as shown in Listing 9-9:\n\
    \n**Listing 9-9.** The `didTapButtonInCell:` Function\n\n```\nfunc didTapButtonInCell(cell:\
    \ ButtonCell) {\n    let indexPathAtTap = tableView.indexPathForCell(cell)\n \
    \   let alert = UIAlertController(title: \"Something happened!\", message: \"\
    A button was tapped at row \\(indexPathAtTap!.row)\", preferredStyle: .Alert)\n\
    \    let action = UIAlertAction(title: \"OK\", style: .Default, handler: nil)\n\
    \    alert.addAction(action)\n    self.presentViewController(alert, animated:\
    \ true, completion: nil)\n}\n```\n\nThis is similar to the previous version, but\
    \ the `cell` parameter is an instance of the `ButtonCell` class.\n\nNext, update\
    \ the `cellForRowAtIndexPath:` function so that it matches Listing 9-10:\n\n**Listing\
    \ 9-10.** The Updated `cellForRowAtIndexPath:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
    , forIndexPath: indexPath) as! ButtonCell\n    cell.textLabel?.text = \"Row \\\
    (tableData[indexPath.row])\"\n    if cell.delegate == nil {\n        cell.delegate\
    \ = self\n    }\n    return cell\n}\n```\n\nThis hasn’t changed much – but instead\
    \ of calling the `addButtonToCell:` function, the `cell`’s delegate is being set\
    \ as a reference to the view controller itself.\n\nAt this point, you can also\
    \ clean up the view controller a bit by removing the now-redundant `addButtonToCell:`\
    \ function.\n\nIf you run the project again, you’ll see that the functionality\
    \ is exactly the same as it was previously. The difference is that we’ve refactored\
    \ the code to implement an architecture that is much cleaner than before:\n\n\
    - There is now a separation of concerns between cell and view controller.\n- The\
    \ code to handle interaction with the button is much more robust, with no reference\
    \ to the cell’s view hierarchy.\n- The project has become more adaptable, as it\
    \ is now possible to implement the cell’s delegate functionality in a class other\
    \ than the view controller.\n\n# Adding Gestures to Cells\n\nYou’re not limited\
    \ to adding controls to cells; you can also enable additional functionality by\
    \ attaching gesture recognizers. As you will see in the next section, this opens\
    \ up the possibility of adding swipe gestures to expose additional information.\
    \ A simpler interaction is to add the ability to double-tap a cell in order to\
    \ trigger some action or transformation.\n\nListing 9-11 shows how to add a double-tap\
    \ recognizer to each cell in the `cellForRowAtIndexPath:` function.\n\n**Listing\
    \ 9-11.** Adding a `gestureRecognizer` to Each Cell\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\n-> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
    ,\n  forIndexPath: indexPath)\n    cell.textLabel?.text = \"Row \\(tableData[indexPath.row])\"\
    \n    if cell.gestureRecognizers?.count != 1 {\n        let tapRecognizer = UITapGestureRecognizer(target:\
    \ self, action:\n     \"didDoubleTapInCell:\")\n        tapRecognizer.numberOfTapsRequired\
    \ = 2\n        cell.addGestureRecognizer(tapRecognizer)\n    }\n    return cell\n\
    }\n```\n\nHaving added the double-tap recognizer to the cell, you’ll probably\
    \ want to be able to distinguish which cell has been tapped. Here’s how you can\
    \ access the cell in the example `didDoubleTapCell:` function:\n\n```\nfunc didTapButtonInCell(sender:\
    \ AnyObject) {\n    let recognizer = sender as! UITapGestureRecognizer\n    let\
    \ cell = recognizer.view as! UITableViewCell\n    let indexPathAtTap = tableView.indexPathForCell(cell)\n\
    \    ... do something with cell here ...\n}\n```\n\nThe `UIGestureRecognizer`\
    \ instance that responded to the interaction is passed through to the function\
    \ as `sender`. This has a `view` property that’s a pointer to the `UIView` object\
    \ to which the gesture recognizer was attached.\n\nIn this case, it’s the `cell`,\
    \ so the `sender.view` property can be cast to an instance of `UITableViewCell`,\
    \ at which point you can treat it as the cell that it is.\n\nObviously you’re\
    \ not restricted to just tap gestures: pinches, pans, rotations, long presses,\
    \ and swipes are all available. Some of these will work better in the limited\
    \ size of a cell than others, though, so some careful experimentation is called\
    \ for in order to get the best overall user experience. You may find that some\
    \ multi-touch gestures are only practical on the larger user interface of the\
    \ iPad.\n\n# Adding Pull-to-Refresh to Table Views\n\nPull-to-refresh is an action\
    \ that triggers a refresh of a table’s data in response to the user pulling the\
    \ table down past the top, and then letting go. Instead of springing straight\
    \ back, they’ll see an activity indicator. Once the data has been updated (or\
    \ sometimes, if the network call times out) the table “springs” back up again,\
    \ and the contents get refreshed.\n\nIt’s a brilliant piece of interface design\
    \ – but actually not one originally created by Apple. It first appeared in a third-party\
    \ Twitter client; was quickly implemented as a number of open-source controls;\
    \ and eventually found its way into the official iOS SDK.\n\nIt’s also very easy\
    \ to implement. The easiest option is when you’re using a `UITableViewController`,\
    \ but it’s also possible to implement if you have a table view inside a standard\
    \ `UIViewController`. We’ll look at both approaches in order.\n\n## Implementing\
    \ Pull-to-Refresh with `UITableViewController`\n\nIn this example, I’m assuming\
    \ that you’re using a `UITableViewController` instance in a Storyboard, as shown\
    \ in Figure 9-6.\n\n![A978-1-4842-1242-4_9_Fig6_HTML.jpg](A978-1-4842-1242-4_9_Fig6_HTML.jpg)\n\
    \n**Figure 9-6.** A `UITableViewController` in the Storyboard\n\n### Adding the\
    \ Refresh Control\n\nIn the Attributes Inspector, there’s a drop-down option for\
    \ `Refreshing`. Select the `Enabled` option, as shown in Figure 9-7.\n\n![A978-1-4842-1242-4_9_Fig7_HTML.jpg](A978-1-4842-1242-4_9_Fig7_HTML.jpg)\n\
    \n**Figure 9-7.** Setting the `Refreshing` option\n\nIf you run the project now,\
    \ you’ll see that you can pull down on the table, and the activity indicator appears\
    \ at the top, as shown in Figure 9-8.\n\n![A978-1-4842-1242-4_9_Fig8_HTML.jpg](A978-1-4842-1242-4_9_Fig8_HTML.jpg)\n\
    \n**Figure 9-8.** Pull-to-refresh in the table view\n\nAlthough this looks impressive,\
    \ there’s a problem: the activity indicator doesn’t disappear!\n\nThere’s a little\
    \ more work to do. First, you need to connect the refresh control to a function\
    \ in response to being invoked by the pull action. Add this to the `viewDidLoad`\
    \ function:\n\n```\nrefreshControl?.addTarget(self, action: \"didPullRefresh:\"\
    , forControlEvents:\n   UIControlEvents.ValueChanged)\n```\n\nThe `refreshControl`\
    \ is a built-in property of `UITableViewController`. Here, you’re adding the `didPullRefresh:`\
    \ function as the target in response to the pull action."
  raw: '##### Updating the View Controller


    Now it’s time to update the `ViewController` to use the new cell class, and react
    to calls from the cell.


    Firstly, conform the `ViewController` class to the `InCellButtonProtocol` by updating
    the class declaration:


    `class ViewController: UIViewController, InCellButtonProtocol {`


    Then add the `didTapButtonInCell:` function as shown in Listing [9-9](#A978-1-4842-1242-4_9_Chapter.html#FPar10):


    Listing 9-9. The didTapButtonInCell: Function


    `func didTapButtonInCell(cell: ButtonCell) {`


        `let indexPathAtTap = tableView.indexPathForCell(cell)`


        `let alert = UIAlertController(title: "Something happened!", message: "A button
    was ➤tapped at row \(indexPathAtTap!.row)", preferredStyle: .Alert)`


        `let action = UIAlertAction(title: "OK", style: .Default, handler: nil)`


        `alert.addAction(action)`


        `self.presentViewController(alert, animated: true, completion: nil)`


    `}`


    This is similar to the previous version, but the `cell` parameter is an instance
    of the `ButtonCell` class.


    Next, update the `cellForRowAtIndexPath:` function so that it matches Listing
    [9-10](#A978-1-4842-1242-4_9_Chapter.html#FPar11):


    Listing 9-10. The Updated cellForRowAtIndexPath: Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    -> ➤ UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",
    forIndexPath: ➤  indexPath) as! ButtonCell`


        `cell.textLabel?.text = "Row \(tableData[indexPath.row])"`


        `if cell.delegate == nil {`


            `cell.delegate = self`


        `}`


        `return cell`


    `}`


    This hasn’t changed much – but instead of calling the `addButtonToCell:`function,
    the `cell`’s delegate is being set as a reference to the view controller itself.


    At this point, you can also clean up the view controller a bit by removing the
    now-redundant `addButtonToCell:` function.


    If you run the project again, you’ll see that the functionality is exactly the
    same as it was previously. The difference is that we’ve refactored the code to
    implement an architecture that is much cleaner than before:


    *   There is now a separation of concerns between cell and view controller.

    *   The code to handle interaction with the button is much more robust, with no
    reference to the cell’s view hierarchy.

    *   The project has become more adaptable, as it is now possible to implement
    the cell’s delegate functionality in a class other than the view controller.


    ## Adding Gestures to Cells


    You’re not limited to adding controls to cells; you can also enable additional
    functionality by attaching gesture recognizers. As you will see in the next section,
    this opens up the possibility of adding swipe gestures to expose additional information.
    A simpler interaction is to add the ability to double-tap a cell in order to trigger
    some action or transformation.


    Listing [9-11](#A978-1-4842-1242-4_9_Chapter.html#FPar12) shows how to add a double-tap
    recognizer to each cell in the `cellForRowAtIndexPath:`function.


    Listing 9-11. Adding a gestureRecognizer to Each Cell


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)  ➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",
    ➤`


      `forIndexPath: indexPath)`


        `cell.textLabel?.text = "Row \(tableData[indexPath.row])"`


        `if cell.gestureRecognizers?.count != 1 {`


            `let tapRecognizer = UITapGestureRecognizer(target: self, action:  ➤`


         `"didDoubleTapInCell:")`


            `tapRecognizer.numberOfTapsRequired = 2`


            `cell.addGestureRecognizer(tapRecognizer)`


        `}`


        `return cell`


    `}`


    Having added the double-tap recognizer to the cell, you’ll probably want to be
    able to distinguish which cell has been tapped. Here’s how you can access the
    cell in the example `didDoubleTapCell:`function:


    `func didTapButtonInCell(sender: AnyObject) {`


        `let recognizer = sender as! UITapGestureRecognizer`


        `let cell = recognizer.view as! UITableViewCell`


        `let indexPathAtTap = tableView.indexPathForCell(cell)`


        `... do something with cell here ...`


    `}`


    The `UIGestureRecognizer` instance that responded to the interaction is passed
    through to the function as `sender`. This has a `view` property that’s a pointer
    to the `UIView` object to which the gesture recognizer was attached.


    In this case, it’s the `cell`, so the `sender.view` property can be cast to an
    instance of `UITableViewCell`, at which point you can treat it as the cell that
    it is.


    Obviously you’re not restricted to just tap gestures: pinches, pans, rotations,
    long presses, and swipes are all available. Some of these will work better in
    the limited size of a cell than others, though, so some careful experimentation
    is called for in order to get the best overall user experience. You may find that
    some multi-touch gestures are only practical on the larger user interface of the
    iPad.


    ## Adding Pull-to-Refresh to Table Views


    Pull-to-refresh is an action that triggers a refresh of a table’s data in response
    to the user pulling the table down past the top, and then letting go. Instead
    of springing straight back, they’ll see an activity indicator. Once the data has
    been updated (or sometimes, if the network call times out) the table “springs”
    back up again, and the contents get refreshed.


    It’s a brilliant piece of interface design–but actually not one originally created
    by Apple. It first appeared in a third-party Twitter client; was quickly implemented
    as a number of open-source controls; and eventually found its way into the official
    iOS SDK.


    It’s also very easy to implement. The easiest option is when you’re using a `UITableViewController`,
    but it’s also possible to implement if you have a table view inside a standard
    `UIViewController.` We’ll look at both approaches in order.


    ### Implementing Pull-to-Refresh with UITableViewController


    In this example, I’m assuming that you’re using a `UITableViewController` instance
    in a Storyboard, as shown in Figure [9-6](#A978-1-4842-1242-4_9_Chapter.html#Fig6).


    ![A978-1-4842-1242-4_9_Fig6_HTML.jpg](A978-1-4842-1242-4_9_Fig6_HTML.jpg)


    Figure 9-6.


    A UITableViewController in the Storyboard


    #### Adding the Refresh Control


    In the Attributes Inspector, there’s a drop-down option for `Refreshing`. Select
    the `Enabled` option, as shown in Figure [9-7](#A978-1-4842-1242-4_9_Chapter.html#Fig7).


    ![A978-1-4842-1242-4_9_Fig7_HTML.jpg](A978-1-4842-1242-4_9_Fig7_HTML.jpg)


    Figure 9-7.


    Setting the Refreshing option


    If you run the project now, you’ll see that you can pull down on the table, and
    the activity indicator appears at the top, as shown in Figure [9-8](#A978-1-4842-1242-4_9_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_9_Fig8_HTML.jpg](A978-1-4842-1242-4_9_Fig8_HTML.jpg)


    Figure 9-8.


    Pull-to-refresh in the table view


    Although this looks impressive, there’s a problem: the activity indicator doesn’t
    disappear!


    There’s a little more work to do. First, you need to connect the refresh control
    to a function in response to being invoked by the pull action. Add this to the
    `viewDidLoad` function:


        `refreshControl?.addTarget(self, action: "didPullRefresh:", forControlEvents:  ➤`


       `UIControlEvents.ValueChanged)`


    The `refreshControl` is a built-in property of `UITableViewController`. Here,
    you’re adding the `didPullRefresh:` function as the target in response to the
    pull action.'
  trans: "\n# 更新视图控制器\n\n现在需要更新`ViewController`以使用新的单元格类，并响应来自单元格的调用。\n\n首先，通过更新类声明使`ViewController`类遵循`InCellButtonProtocol`协议：\n\
    \n`class ViewController: UIViewController, InCellButtonProtocol {`\n\n然后添加`didTapButtonInCell:`函数，如代码清单\
