    \ 所示。\n\n**代码清单 12-21.** 完整的 `commitEditingStyle:` 函数\n\n```\nfunc tableView(tableView:\
    \ UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle, forRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    if (editingStyle == UITableViewCellEditingStyle.Delete)\
    \ {\n        tableData.removeAtIndex(indexPath.row)\n        tableView.deleteRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)\n    } else if (editingStyle\
    \ == UITableViewCellEditingStyle.Insert) {\n        let thingToInsert = \"\\(NSDate())\"\
    \n        tableData.append(thingToInsert)\n        tableView.insertRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)\n    }\n}\n```\n\n## 重新排列表格\n\
    \n除了插入和删除行与分区之外，您还可以通过编程方式或用户操作来重新排列它们。\n\n重新排列的过程与插入和删除过程类似，如图 12-18 所示。\n\n\
    ![A978-1-4842-1242-4_12_Fig18_HTML.jpg](img/A978-1-4842-1242-4_12_Fig18_HTML.jpg)\n\
    \n**图 12-18.** 行重排过程  \n\n- 表格进入编辑模式。  \n- 向 `tableView` 的 `delegate` 咨询移动行的许可性。\
    \  \n- 移动该行。  \n- 更新数据模型。\n\n### 进入编辑模式\n\n为了重新排列行，表格需要处于编辑模式。与删除操作一样，有两种方法可以实现这一点。对于\
    \ `UITableViewController` 子类，用户可以轻点导航栏的“编辑”按钮，或者重写 `tableView` 的 `setEditing:animated:`\
    \ 函数。\n\n为了显示重排控件，您需要实现 `tableView(moveRowAtIndexPath:toIndexPath)` 函数，如代码清单 12-22\
    \ 所示。\n\n**代码清单 12-22.** 自定义 `setEditing:animated:` 函数\n\n```\nfunc tableView(tableView:\
    \ UITableView, moveRowAtIndexPath sourceIndexPath: NSIndexPath, toIndexPath destinationIndexPath:\
    \ NSIndexPath) {\n    //\n}\n```\n\n此函数尚未执行任何操作，但它是让表格显示重排控件所必需的。\n\n### 检查行是否可移动\n\
    \n当 `tableView` 进入编辑模式时，它会通过调用 `tableView:canMoveRowAtIndexPath:` 函数询问委托每个可见行是否可以被移动。该函数返回\
    \ `true` 或 `false`。返回 `false` 将使您能够将特定行“锁定”在原位。\n\n例如，如果您在表格底部有一个“`添加新行`”行，则移动该行是没有意义的。代码清单\
    \ 12-23 展示了如何将该行“锁定”在原位。\n\n**代码清单 12-23.** `tableView:canMoveRowAtIndexPath:`\
