        `func tableView(tableView: UITableView, heightForRowAtIndexPath ➤`


       `indexPath: NSIndexPath) -> CGFloat {`


            `if (indexPath.row % 2 == 0) {`


                `return EvenRowHeight`


            `}`


            `return OddRowHeight`


        `}`


    `}`


    Because values like row height are important to the interface being drawn successfully,
    it’s often helpful to store them in constants:


    `let OddRowHeight: CGFloat = 70.0`


    `let EvenRowHeight: CGFloat = 100.0`


    ### Creating Instances of the Custom Cells


    Having gone to all the trouble of creating custom subclasses, and designing the
    layout of your custom cells, there comes a point where you will want to create
    actual instances of them.


    It shouldn’t come as a surprise to learn that this takes place in our old friend
    the `tableView:cellForRowAtIndexPath:` function. Whereas up until now you have
    been creating instances of standard `UITableViewCells`, now you are going to ring
    the changes slightly, and create instances of one of your custom classes.


    This example is also slightly more sophisticated, in that there are two types
    of cells. The implication here is that there will be some kind of conditional
    code to choose which type of cell to create.


    Before any cell types can be created, though, you need to register the XIB files
    that you created with the `tableView` so that they can be created or dequeued
    as required.


    To keep the view controller organized, you can place this process in an extension,
    and call the function from `viewDidLoad:`. The configuration function is shown
    in Listing [8-4](#A978-1-4842-1242-4_8_Chapter.html#FPar8).


    Listing 8-4. Configuring the Table


    `extension ViewController {`


    `func configureTable() {`


    `tableView.registerNib(UINib(nibName: "OddCell", bundle: nil), ➤`


    `forCellReuseIdentifier: OddCellIdentifier)`


    `tableView.registerNib(UINib(nibName: "EvenCell", bundle: nil), ➤`


    `forCellReuseIdentifier: EvenCellIdentifier)`


    `}`


    `}`


    Cell identifiers are important because they can be used in several places, so
    again these are defined as constants:


    `let OddCellIdentifier = "OddCellIdentifier"`


    `let EvenCellIdentifier = "EvenCellIdentifier"`


    Finally, call the configuration function from `viewDidLoad:`


    `override func viewDidLoad() {`


    `super.viewDidLoad()`


    `configureTable()`


    `}`


    Having registered the XIBs, now they can be used in the `tableView:cellForRowAtIndexPath:`
    function.


    Here’s the first pass in Listing [8-5](#A978-1-4842-1242-4_8_Chapter.html#FPar9).
    The `tableData` and `phraseData` properties are just `Arrays` of Latin boilerplate
    phrases that you created earlier from the `viewDidLoad:` function.


    Listing 8-5. Returning Custom Cells from the tableView:cellForRowAtIndexPath:
    Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)➤`


    `-> UITableViewCell {`


    `let remainder = indexPath.row % 2`


    `switch remainder {`


    `case 0:`


    `let cell = tableView.dequeueReusableCellWithIdentifier(EvenCellIdentifier,➤`


    `forIndexPath: indexPath) as! EvenCell`


    `cell.iconView.image = UIImage(named: "cat")`


