    \ | --- |\n| `collectionView` | `UICollectionView` | 对委托正在处理的集合视图的引用。这使得单个委托对象能够支持多个集合视图。\
    \ |\n| `Layout` | `UICollectionViewFlowLayout` | 对委托正在处理的集合视图流布局的引用。这使得单个委托对象能够支持多个流布局。\
    \ |\n| `indexPath` | `NSIndexPath` | 标识应为其执行计算的分区和项目。 |\n\n### 4.1.2 返回值\n\n它返回项目大小：\n\
    \n| 返回值 | 类型 | 用途 |\n| --- | --- | --- |\n| `Item size` | `CGSize` | 在指定索引路径处的项目的计算大小\
    \ |\n\n### 4.1.3 示例\n\n清单 15-1 展示了 `collectionView(_:layout:sizeForItemAtIndexPath:)`\
    \ 函数的示例实现。\n\n**清单 15-1.** 一个 `sizeForItemAtIndexPath:` 函数的示例\n\n```\nfunc collectionView(collectionView:\
    \ UICollectionView, layout\n  collectionViewLayout: UICollectionViewLayout, sizeForItemAtIndexPath\n\
    \  indexPath: NSIndexPath) -> CGSize {\n        // 获取此花色的字典\n        let suitDictionary\
    \ = suitsArray[indexPath.section]\n        // 获取此花色中的牌数组\n        let cardsArray\
    \ = suitDictionary[\"cards\"]\n        // 获取此牌的字典\n        let cardDictionary:\
    \ NSDictionary = cardsArray[indexPath.row] as! Dictionary\n        // 获取牌图片的名称\n\
    \        let cardImageName = cardDictionary[\"cardImage\"] as! String\n      \
    \  // 加载此牌的图片\n        let cardImage: UIImage? = UIImage(named: cardImageName)\n\
    \        if let unwrappedCardImage = cardImage {\n            // 如果图片加载成功，返回其大小\n\
    \            return unwrappedCardImage.size\n        }\n        // 查找图片时出现问题，因此返回零大小\n\
    \        return CGSizeZero\n    }\n```\n\n## 管理分区间距\n\n`UICollectionViewDelegateFlowLayout`\
    \ 协议定义了三个用于控制分区间距的可选函数：\n\n### `collectionView(_:layout:insetForSectionAtIndex:)`\n\
    \n此函数接收集合视图、流布局以及应为其计算间距分区索引的参数。\n\n| 参数 | 类型 | 用途 |\n| --- | --- | --- |\n| `collectionView`\
    \ | `UICollectionView` | 对委托正在处理的集合视图的引用。这使得单个委托对象能够支持多个集合视图。 |\n| `Layout` |\
    \ `UICollectionViewFlowLayout` | 对委托正在处理的集合视图流布局的引用。这使得单个委托对象能够支持多个流布局。 |\n| `Index`\
    \ | `Int` | 标识应为其执行计算的分区。 |\n\n它返回一个 `UIEdgeInsets` 结构体：\n\n| 返回值 | 类型 | 用途 |\n\
    | --- | --- | --- |\n| `Insets` | `UIEdgeInsets` | 用于上、左、下和左间距的 `CGFloat` 值。正值使项目相对于集合视图的框架内缩；负值使项目外扩。\
    \ |\n\n### `collectionView(_:layout:minimumLineSpacingForSectionAtIndex:)`\n\n\
    此函数接收集合视图、流布局以及应为其计算最小行间距的分区索引的参数。\n\n| 参数 | 类型 | 用途 |\n| --- | --- | --- |\n\
    | `collectionView` | `UICollectionView` | 对委托正在处理的集合视图的引用。这使得单个委托对象能够支持多个集合视图。\
    \ |\n| `Layout` | `UICollectionViewFlowLayout` | 对委托正在处理的集合视图流布局的引用。这使得单个委托对象能够支持多个流布局。\
    \ |\n| `Index` | `Int` | 标识应为其执行计算的分区。 |\n\n它返回一个 `CGFloat`：\n\n| 返回值 | 类型 | 用途\
    \ |\n| --- | --- | --- |\n| `Minimum line spacing` | `CGFloat` | 行间项目最小间距的 `CGFloat`\
    \ 值。项目的间距永远不会小于此值，但根据其垂直（或水平）对齐方式，它们之间的距离可能更大。 |\n\n### `collectionView(_:layout:minimumInteritemSpacingForSectionAtIndex:)`\n\
    \n此函数接收集合视图、流布局以及应为其计算最小项目间距的分区索引的参数。\n\n| 参数 | 类型 | 用途 |\n| --- | --- | --- |\n\
    | `collectionView` | `UICollectionView` | 对委托正在处理的集合视图的引用。这使得单个委托对象能够支持多个集合视图。\
    \ |\n| `layout` | `UICollectionViewFlowLayout` | 对委托正在处理的集合视图流布局的引用。这使得单个委托对象能够支持多个流布局。\
    \ |\n| `index` | `Int` | 标识应为其执行计算的分区。 |\n\n它返回一个 `CGFloat`：\n\n| 返回值 | 类型 | 用途\
    \ |\n| --- | --- | --- |\n| `Minimum interitem spacing` | `CGFloat` | 行内项目间最小间距的\
    \ `CGFloat` 值。项目的间距永远不会小于此值，但根据其垂直（或水平）对齐方式，它们之间的距离可能更大。 |\n\n## 管理页眉和页脚大小\n\n\
    `UICollectionViewDelegateFlowLayout` 协议定义了用于控制页眉和页脚大小的两个可选函数。\n\n## 子类化 `UICollectionViewFlowLayout`\n\
    \n与 `UICollectionViewDelegateFlowLayout` 委托结合使用时，您可以对基于行的集合视图进行精细控制，而无需处理计算行布局所涉及的大量工作。\n\
    \n不过，有时您需要能够进一步自定义布局。在这些情况下，您仍然可以受益于流布局的后台计算，但通过创建 `UICollectionViewFlowLayout`\
    \ 的自定义子类来实现进一步的自定义。\n\n您可能想要这样做的几种场景：\n\n- 您想要控制项目的布局属性。\n- 您想要向项目添加自定义布局属性。\n\
    - 您想要添加新的补充视图和/或装饰视图。\n- 您想要对项目插入或删除动画有更大的控制权。\n\n子类化 `UICollectionViewFlowLayout`\
    \ 的过程与创建自定义布局完全相同；这在第 16 章中有详细说明。\n\n### 控制项目布局属性\n\n控制布局属性允许您更新项目的 frame、bounds、position、transform、z-index\
    \ 和 alpha 属性值。\n\n您需要实现流布局的 `layoutAttributesForElementsInRect:` 函数来覆盖所需的属性。请记住，`UICollectionViewFlowLayout`\
    \ 通常会为您计算项目的位置，因此更新这些属性可能会导致意外结果！\n\n### 向项目添加额外的自定义布局属性\n\n`UICollectionView`\
    \ 并不限制您只能使用“标准”项目布局属性。如果需要，您可以定义自己的属性。这涉及创建 `UICollectionViewLayoutAttributes`\
    \ 的自定义子类（您将在第 16 章中了解这一点）。\n\n一旦您有了自定义布局属性类，就需要覆盖 `UICollectionViewLayout` 的 `layoutAttributesClass`\
    \ 函数，使其返回您的自定义属性类而不是默认类。\n\n然后，使用 `layoutAttributesForElementsInRect:`，您可以根据需要将自定义属性应用于项目。\n"
- fmt: '### Adding New Supplementary Views


    By default, `UICollectionViewFlowLayout` doesn’t support decoration views. If
    you want to add additional supplementary and decoration views, you need to implement
    four functions:


    - `layoutAttributesForElementsInRect:`

    - `layoutAttributesForItemAtIndexPath:`

    - `layoutAttributesForSupplementaryViewOfKind:atIndexPath:`

    - `layoutAttributesForDecorationViewOfKind:atIndexPath:`


    ### Controlling Insertion and Deletion Animations


    The default insertion and deletion animation is a simple fade, but you can change
    these if you want.


    Creating new insertion effects is achieved by tweaking the item attributes when
    appearing using one of these functions:


    - `initialLayoutAttributesForAppearingItemAtIndexPath:`

    - `initialLayoutAttributesForAppearingSupplementaryElementOfKind:atIndexPath:`

    - `initialLayoutAttributesForAppearingDecorationElementOfKind:atIndexPath:`


    New deletion effects are obtainable using the corresponding removal functions:


    - `finalLayoutAttributesForDisappearingItemAtIndexPath:`

    - `finalLayoutAttributesForDisappearingSupplementaryElementOfKind:atIndexPath:`

    - `finalLayoutAttributesForDisappearingDecorationElementOfKind:atIndexPath:`


    ## Summary


    In this chapter, you looked at one of the most useful parts of the `UICollectionView`
    family, and you saw how it can allow you to rapidly create line-breaking layouts
    with a minimum of configuration or code.


    It’s also possible to get fine-grained control over many attributes of the layout
    by implementing the `UICollectionViewDelegateFlowLayout` delegate functions, or
    go further by subclassing to customize even more.


    In the next chapter, you’ll take things further by implementing completely custom
    layouts, many aspects of which are also relevant to creating fully-customized
    `UICollectionViewFlowLayout` layouts.


    # 16. Collection View Custom Layouts


    Custom `UICollectionView` layouts allow you to take complete control over every
    aspect of the look and feel of the collection view, and produce spectacular effects
    with visual appearance and transitions. The downside to this is that you’re responsible
    for calculating every aspect, so custom layouts are more complex to implement
    than flow layouts.


    Don’t let that put you off, however. Custom layouts aren’t that complex to implement,
    and the results are often worth the extra effort!


    This chapter covers the process of creating custom layouts for `UICollectionView`.
    In the first part of the chapter, I’ll introduce the processes that are involved
    in calculating the various layout attributes that are required. Next, you’ll look
    in detail at the functions necessary to create a completely custom layout.


    In the next chapter, you’ll look at custom layouts in even more detail, using
    supplementary and decoration views, animating simple layout changes, and creating
    complex custom layout transitions.


    The kind of custom layout you need to create is of course entirely dependent on
    the nature of your projects, so it’s impossible to cover every combination in
    a book of a finite length. To put what you’ll learn in the first section into
    practice, therefore, in the second part you’ll work through a layout that is completely
    different in look and feel to anything you’ve seen before. Instead of a grid of
    regular items, you’ll create a working collection view-based analogue clock.


    ## About Custom Layouts


    Collection view layouts have the potential to get complex quickly, so Apple thoughtfully
    provided a “canned” layout in the shape of `UICollectionViewFlowLayout`. This
    is based around lines or columns of items, and takes care of the calculations
    involved in positioning “line breaks” and spacing items for you. With a bit of
    judicious subclassing here and there, you can go a long way without needing to
    create a layout of your own from scratch.


    Eventually, though, you’ll come across a situation where your collection view
    looks nothing like a line or a grid, or you want a fine degree of control over
    customizing attributes. In this kind of situation, the line-breaking nature of
    `UICollectionViewFlowLayout` might not work, so it becomes time to take complete
    control and implement a custom layout.


    Figure 16-1 shows some possibilities: both apps are collection views, and both
    apps are based on exactly the same source data.


    ![A978-1-4842-1242-4_16_Fig1a_HTML.jpg](A978-1-4842-1242-4_16_Fig1a_HTML.jpg)![A978-1-4842-1242-4_16_Fig1b_HTML.jpg](A978-1-4842-1242-4_16_Fig1b_HTML.jpg)


    Figure 16-1.


    Before and after


    With a custom layout, you’re responsible for all the heavy lifting of figuring
    out where each item and view should be placed. As an exercise, reimplementing
    `UICollectionViewFlowLayout` yourself will quickly give you a newfound respect
    for the amount of work that went into creating it!


    Actually, though, this makes the task of creating custom layouts sound harder
    than it really is. There’s a very clearly defined process that you’ll work through
    to perform these calculations, so with a bit of practice you’ll find that you
    can create sophisticated-looking layouts very quickly.


    The process of creating a custom layout has six steps, two of which are optional:


    - Create a custom subclass of `UICollectionViewLayout`.

    - Decide whether your layout needs to compute the attributes of each item on the
    fly, or whether it can do this en masse.

    - Implement the four core functions to calculate the placement of each item in
    the collection view.

    - Optionally, implement custom subclasses of `UICollectionViewLayoutAttributes`
    to customize additional attributes of cells and views.

    - Optionally, implement the supporting functions for things like supplementary
    and decoration views, and animated insertion and deletion of items.

    - Create a new instance of your custom `UICollectionViewLayout` subclass and set
    it as the collection view’s `collectionViewLayout` property.


