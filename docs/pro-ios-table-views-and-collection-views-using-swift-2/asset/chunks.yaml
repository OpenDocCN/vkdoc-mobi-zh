    \        cell.addGestureRecognizer(tapRecognizer)\n    }\n    return cell\n}\n\
    ```\n\n向单元格添加双击识别器后，你很可能希望能够区分哪个单元格被点击了。以下是在示例`didDoubleTapCell:`函数中访问单元格的方法：\n\
    \n```\nfunc didTapButtonInCell(sender: AnyObject) {\n    let recognizer = sender\
