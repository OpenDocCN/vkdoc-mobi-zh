    \ and collection views. This example will focus on searching within a `UITableView`,\
    \ but the processes are identical between the two controls.\n\n### Adding a Search\
    \ Bar to the Table\n\nThe `UISearchBar` provides a styled text field that you\
    \ can add to your interface as required. The normal layout for a table view is\
    \ to put the search back at the top, although there’s nothing to stop you putting\
    \ somewhere else.\n\nYou can embed the search bar within in the table itself,\
    \ in which case it will scroll with the table (shown in Figure [9-9](#A978-1-4842-1242-4_9_Chapter.html#Fig9)).\n\
    \n![A978-1-4842-1242-4_9_Fig9_HTML.jpg](A978-1-4842-1242-4_9_Fig9_HTML.jpg)\n\n\
    **Figure 9-9.** The search bar placed within the table\n\nIn this situation, the\
    \ search bar will scroll with the table. If you want it to remain “anchored” at\
    \ the top, you can place it outside the table, as shown in Figure [9-10](#A978-1-4842-1242-4_9_Chapter.html#Fig10).\n\
    \n![A978-1-4842-1242-4_9_Fig10_HTML.jpg](A978-1-4842-1242-4_9_Fig10_HTML.jpg)\n\
    \n**Figure 9-10.** The search bar placed above the table\n\nYou can use AutoLayout\
    \ constraints to set up and secure the place of the search bar within your layout.\n\
    \nRegardless of where the `UISearchBar` is placed, it’s important that its delegate\
    \ outlet is connected.\n\nYou can do this visually, by Ctrl-clicking in the bar\
    \ and dragging over to the relevant controller object in the Document Outline\
    \ to connect the `delegate` outlet; or programmatically by setting the `delegate`\
    \ property:\n\n```\nsearchBar.delegate = self\n```\n\n### How Search Works\n\n\
    The basic principle of table view search is that the table has two data sources:\n\
    \n- **The default data source**, which contains all the data that the table will\
    \ display. This is implemented in the same way as you’ve been doing throughout\
    \ the book so far. For example, it might be an `Array` containing `Strings`.\n\
    - **The filtered data source**, which is a subset of the default data source after\
    \ it’s been filtered in response to the user input in the search bar. You trigger\
    \ the filtering in response to user input. If your default data source was an\
    \ `Array` containing `Strings`, the filtered data source would also be a `String`-containing\
    \ `Array`, but the entries would only be those that match the search terms.\n\n\
