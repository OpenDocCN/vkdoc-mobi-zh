  trans: '

    ### 向表格视图添加静态单元格


    通过将表格视图的 `Content` 属性从默认的 `Dynamic Prototype`（动态原型）切换为 `Static Cells`（静态单元格），即可将静态单元格作为原型添加。此设置可在属性检查器中进行，如图
    13-3 所示。


    ![A978-1-4842-1242-4_13_Fig3_HTML.jpg](img/A978-1-4842-1242-4_13_Fig3_HTML.jpg)


    图 13-3. 切换至静态单元格


    一旦进行此更改，您会看到表格视图更新，并添加了一个包含三个单元格的新分区（您可能需要展开场景的层级结构树以显示新的控件）。请参见图 13-4。


    ![A978-1-4842-1242-4_13_Fig4_HTML.jpg](img/A978-1-4842-1242-4_13_Fig4_HTML.jpg)


    图 13-4. 新分区与静态单元格


    新的单元格采用的是标准的 44 点高度，并带有透明分隔线，因此不太容易立即看出是否有内容存在。但您可以通过在属性检查器中调整表格、分区和单元格的属性来更改这一点。


    图 13-5 展示了一个更新后的表格，其中包含了一些页眉和页脚文本，以及浅灰色的单元格分隔线。三个单元格已从 `Custom`（自定义）更改为 `Default`（默认），并且标题字段也已更新。


    ![A978-1-4842-1242-4_13_Fig5_HTML.jpg](img/A978-1-4842-1242-4_13_Fig5_HTML.jpg)


    图 13-5. 更新后的单元格


    如果您现在运行应用程序（如图 13-6 所示），将会看到表格视图显示了这三个单元格，而且完全无需实现任何 `UITableViewDataSource` 方法！


    ![A978-1-4842-1242-4_13_Fig6_HTML.jpg](img/A978-1-4842-1242-4_13_Fig6_HTML.jpg)


    图 13-6. 运行中的初始静态表格


    ### 修复滚动问题


    默认情况下，即使没有足够的行来填满视图，表格视图也会滚动。这在一个静态表格视图中看起来可能很奇怪，因此如果您确定所有内容即使在较小的设备上（以及在适当情况下的横屏方向）也能适合单个屏幕，那么您可能需要禁止表格滚动。


    要禁止滚动，请在视图层级中选择 `TableView`，然后取消选中属性检查器中的 `Scrolling Enabled`（启用滚动）设置（图 13-7）。


    ![A978-1-4842-1242-4_13_Fig7_HTML.jpg](img/A978-1-4842-1242-4_13_Fig7_HTML.jpg)


    图 13-7. 禁止表格滚动


    ### 向静态单元格添加控件


    静态单元格就位后，您就可以开始自定义它们了。如果将单元格类型改回 `Custom`（自定义），您就可以将每个单元格的内容视图视为一个空的 `UIView`——在其中放置其他控件，并使用自动布局约束定位它们。


    #### 调整单元格高度


    在向单元格中放置其他控件之前，您可能需要调整其高度。默认情况下，空的自定义单元格高度为 44 点。要更改此设置，请在对象层级中选择该行，然后在尺寸检查器中调整行高，如图
    13-8 所示。


    ![A978-1-4842-1242-4_13_Fig8_HTML.jpg](img/A978-1-4842-1242-4_13_Fig8_HTML.jpg)


    图 13-8. 调整行高


    #### 添加交互式控件


    在静态表格视图中将控件链接到方法是通过标准方式完成的：控件事件链接到控制器中的 `IBAction` 方法，该方法由用户交互触发。


    但是您添加了一个 `UITableViewController` 场景，却没有关联的 `UIViewController` 子类，因此出现的问题是：链接到哪个位置的
    `IBAction` 方法？


    答案是：“链接到某个已存在的控制器类中。” 在这种情况下，您可以将静态表格视图中的按钮链接到某个 `UIViewController` 子类中的 `IBAction`
    方法，这个子类可以是您之前添加的，也可以是为处理此 `UITableViewController` 场景而创建的。


    为了将这个静态表格的场景连接到视图控制器，您需要添加对视图控制器的引用。为此，请从对象库中选择一个对象，并将其拖入表格视图控制器的场景中，如图 13-9 所示。


    ![A978-1-4842-1242-4_13_Fig9_HTML.jpg](img/A978-1-4842-1242-4_13_Fig9_HTML.jpg)


    图 13-9. 向场景添加对象


    该对象现在也会作为占位符显示在场景的顶部区域，如图 13-10 所示。


    ![A978-1-4842-1242-4_13_Fig10_HTML.jpg](img/A978-1-4842-1242-4_13_Fig10_HTML.jpg)


    图 13-10. 场景顶部区域中的对象


    选中对象占位符后，切换到身份检查器，并将 `Custom Class`（自定义类）的值更新为该对象所代表的类（在此例中，将 `didTapStaticTableButton
    IBAction` 方法添加到 `ViewController` 类中），如图 13-11 所示。


    ![A978-1-4842-1242-4_13_Fig11_HTML.jpg](img/A978-1-4842-1242-4_13_Fig11_HTML.jpg)


    图 13-11. 设置自定义类


    设置好类之后，您现在可以按住 Ctrl 键，从控件拖拽到占位符，此时可用的 `IBAction` 方法将显示在 HUD 中，如图 13-12 所示。


    ![A978-1-4842-1242-4_13_Fig12_HTML.jpg](img/A978-1-4842-1242-4_13_Fig12_HTML.jpg)


    图 13-12. 将控件连接到操作


    ### 在容器视图中使用静态表格


    到目前为止，您一直在 Storyboard 中的 `UITableViewController` 场景内创建静态表格布局。这没问题，但 `UITableViewController`
    场景对其使用方式有一些预设，主要是它会以全屏方式显示。


    那么，如果您想将静态表格视图包含在另一个视图控制器内（例如，如果它没有填满整个界面），该怎么办？


    您可以尝试像构建动态表格视图一样，将一个标准的 `UITableView` 对象添加到视图控制器的视图中。Interface Builder 会让您像本章前面所做的那样，将表格视图从动态原型更改为静态单元格，并布局静态单元格。


    然而，当您构建项目时，编译器会拒绝，并显示图 13-13 所示的错误。


    ![A978-1-4842-1242-4_13_Fig13_HTML.jpg](img/A978-1-4842-1242-4_13_Fig13_HTML.jpg)


    图 13-13. 尝试在标准 `UITableView` 中构建静态单元格时出现的错误


    至少可以说，这很烦人。那么有什么变通方法呢？


    答案是使用 `UITableViewController` 像以前一样创建静态表格布局，然后将其嵌入到 `UIViewController` 内部的容器中。


    #### 先决条件


    由于具体配置取决于项目的结构，我将阐述一个假设的情况。我假设您已经按照本章前面的描述，使用 `UITableViewController` 构建了一个静态表格布局；但现在您意识到需要在另一个视图内呈现它。


    我还假设您的 `UITableViewController` 是 Storyboard 中唯一的场景，因此您将从类似于图 13-14 所示的内容开始。


    ![A978-1-4842-1242-4_13_Fig14_HTML.jpg](img/A978-1-4842-1242-4_13_Fig14_HTML.jpg)


    图 13-14. 已配置但在 Storyboard 中孤立的 `UITableViewController`

