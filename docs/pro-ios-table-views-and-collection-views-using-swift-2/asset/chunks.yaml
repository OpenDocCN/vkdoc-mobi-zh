  trans: "\n#### 内务函数\n\n你需要实现的第一个内务函数是向集合视图返回其`contentSize`。\n\n在本例中，这非常简单。你将使用一个与集合视图自身相同的`contentSize`，因此不会涉及滚动。请添加清单\
    \ 17-3 中的函数。\n\n**清单 17-3.** `collectionViewContentSize`函数\n\n```\noverride func\
    \ collectionViewContentSize() -> CGSize {\n    super.collectionViewContentSize()\n\
    \    return collectionView!.frame.size\n}\n```\n\n这非常直观。在调用父类函数后，你返回`collectionView`的`frame`大小。\n\
    \n接下来，你需要`prepareLayout()`。该函数在每个布局过程开始时被调用，是执行任何影响所有元素的“批量”操作的机会。你需要做以下几件事：\n\
    \n*   向布局类添加一些属性，用于保存计算出的属性和一些尺寸值。\n*   移除所有现有布局属性（添加或移除元素会导致所有其他元素移动，因此所有现有属性都将失效）。\n\
    *   对布局的整体尺寸进行一些预先计算。\n*   依次计算每个元素的属性。\n\n首先，添加清单 17-4 中所示的属性。\n\n**清单 17-4.**\
    \ `BounceLayout`的属性\n\n```\nvar layoutAttributes = [UICollectionViewLayoutAttributes]()\n\
    var cvCenterPoint: CGPoint!\nvar itemSize: CGSize!\nvar sidePadding: CGFloat!\n\
    ```\n\n布局属性将存储在一个`UICollectionViewLayoutAttributes`类型的`Array`中。你需要一些与尺寸相关的属性：集合视图的中心点、每个元素的大小、元素边缘与集合视图边缘之间的内边距。\n\
    \n接下来，你需要`prepareLayout()`函数。该函数在布局失效后的布局过程开始时被调用。这既是配置布局全局值的机会，也是触发所有必需属性计算的时机。\n\
    \n请添加清单 17-5 中所示的函数。\n\n**清单 17-5.** `prepareLayout()` 函数\n\n```\noverride func\
    \ prepareLayout() {\n    super.prepareLayout()\n    layoutAttributes.removeAll()\n\
    \    // 计算集合视图的中心位置\n    cvCenterPoint = CGPointMake(collectionView!.frame.size.width\
    \ / 2, \n    collectionView!.frame.size.height / 2);\n    // 计算我们要处理的元素数量\n  \
    \  // 这里，我们假设集合视图中只有一个分区\n    let numberOfItems = collectionView!.numberOfItemsInSection(0)\n\
    \    calculateAllAttributes(numberOfItems)\n}\n```\n\n逐步解析：首先，你调用父类函数。然后，移除所有现有布局属性；插入或移除元素会导致所有其他元素移动，因此所有属性都失效了。\n\
    \n圆的中心点很重要，因为它既是计算每个元素位置属性的原点，也是插入计算的起始点。\n\n`cvCenterPoint = calculateCenterForFirstItem()`\n\
    \n稍后在多个地方会用到这个值，为了减少代码重复，请添加清单 17-6 中的函数。\n\n**清单 17-6.** 计算集合视图中心点\n\n```\nfunc\
    \ calculateCenterForFirstItem() -> CGPoint {\n    return CGPointMake(collectionView!.frame.size.width\
    \ / 2, \n  collectionView!.frame.size.height / 2);\n}\n```\n\n你还需要知道要处理的元素数量，以便计算间距。\n\
    \n`let numberOfItems = collectionView!.numberOfItemsInSection(0)`\n\n最后，你针对给定的元素数量，调用尚未实现的`calculateAllAttributes(_:)`函数。\n\
    \n#### 计算属性\n\n这是真正开始工作的地方。请添加清单 17-7 中的函数。\n\n**清单 17-7.** `calculateAllAttributes`\
    \ 函数\n\n```\nfunc calculateAllAttributes(numberOfItems: Int) {\n    // 依次为每个元素创建属性\n\
    \    for index in 0..<numberOfItems {\n        // 为当前处理的元素构建索引路径\n        let\
    \ itemIndexPath = NSIndexPath(forItem: index, inSection: 0)\n        // 为此索引路径创建一个\
    \ UICollectionViewLayoutAttributes 对象\n        let attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath:\
    \ \n      itemIndexPath)\n        // 计算元素中心点应处的位置\n        let center = calculateCenterForItemAtIndexPath(itemIndexPath)\n\
    \        attributes.center = center\n        // 设置元素大小\n        attributes.size\
    \ = itemSize\n        // 设置 Z-index 使它们彼此“层叠”\n        attributes.zIndex = index\
    \ + 1\n        // 将新的属性集合添加到数组中\n        layoutAttributes.append(attributes)\n\
    \    }\n}\n```\n\n该函数接受一个`Int`参数，即集合视图中元素的数量。然后它会循环，依次计算每个元素的属性。\n\n首先，你为元素创建一个`NSIndexPath`：\n\
    \n`let itemIndexPath = NSIndexPath(forItem: index, inSection: 0)`\n\n接下来，你使用这个`indexPath`创建`UICollectionViewLayoutAttributes`的一个实例：\n\
    \n`let attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath: itemIndexPath)`\n\
    \n对于这个元素，你现在借助一个稍后将要实现的辅助函数来计算中心点应处的位置：\n\n`let center = calculateCenterForItemAtIndexPath(itemIndexPath)`\n\
    \n`attributes.center = center`\n\n你设置元素大小。所有元素的大小相同：\n\n`attributes.size = itemSize`\n\
    \n每个元素的`Z-index`递增，这样当它们重叠时，看起来像是层叠的：\n\n`attributes.zIndex = index + 1`\n\n计算出所有必要属性后，你可以将它们添加到数组中：\n\
    \n`layoutAttributes.append(attributes)`\n\n现在，让我们添加用于计算元素中心点的函数。\n"
- fmt: "### Calculating the Center Point\n\nCalculating the center point of the item\
    \ is the function that involves the most math, but it’s not as intimidating as\
    \ it looks. Add the function shown in Listing [17-8](#A978-1-4842-1242-4_17_Chapter.html#FPar9).\n\
    \n**Listing 17-8.** Calculating the Center for an Item\n\n```\nfunc calculateCenterForItemAtIndexPath(indexPath:\
    \ NSIndexPath) -> CGPoint {\n    // If there’s only one item, then it should be\
    \ centered\n    if (collectionView!.numberOfItemsInSection(0) == 1) {\n      \
    \  return calculateCenterForFirstItem()\n    }\n    // Get angular displacement\
    \ for this item\n    let angularDisplacement: CGFloat = calculateRotationPerItem()\n\
    \    // Calculate rotation required for this item\n    let theta = (angularDisplacement\
    \ * CGFloat(indexPath.row))\n    // Trig to calculate the x and y shifts required\
    \ to\n    // get the moved around a circle of diameter spoke radius\n    let xDisplacement\
    \ = CGFloat(sinf(Float(theta))) * calculateSpokeRadius()\n    let yDisplacement\
    \ = CGFloat(cosf(Float(theta))) * calculateSpokeRadius()\n    // Make the centre\
    \ point of the hour label block\n    let xPosition = (collectionView!.bounds.size.width/2)\
    \ + xDisplacement\n    let yPosition = (collectionView!.bounds.size.width/2) -\
    \ yDisplacement\n    return CGPointMake(xPosition, yPosition)\n}\n```\n\nFirst,\
    \ you need to deal with a special case of only one item in the collection view.\
    \ In this situation, you want the item to be placed in the center of the collection\
    \ view:\n\n```\nif (collectionView!.numberOfItemsInSection(0) == 1) {\n    return\
    \ CGPointMake(collectionView!.bounds.size.width / 2, collectionView!.bounds.size.height/2)\n\
    }\n```\n\nNow you can calculate the rotation around the center of the collection\
    \ view for this item.\n\nFigure [17-6](#A978-1-4842-1242-4_17_Chapter.html#Fig6)\
    \ shows how the rotation is calculated.\n\n![A978-1-4842-1242-4_17_Fig6_HTML.jpg](A978-1-4842-1242-4_17_Fig6_HTML.jpg)\n\
    \n**Figure 17-6.** Calculating angular rotation\n\nThis is implemented as a separate\
    \ function, shown in Listing [17-9](#A978-1-4842-1242-4_17_Chapter.html#FPar10).\n\
    \n**Listing 17-9.** Calculating the Rotation Per Item\n\n```\nfunc calculateRotationPerItem()\
    \ -> CGFloat {\n    // Shouldn’t rotate if there’s only one item\n    if (collectionView!.numberOfItemsInSection(0)\
    \ == 1) {\n        return 0.0;\n    }\n    // Otherwise, the rotation is given\
    \ by 360 / number of items\n    // (or 2Pi / number of items as we’re dealing\
    \ with radians here)\n    return ( CGFloat(2 * M_PI) / CGFloat(collectionView!.numberOfItemsInSection(0)))\n\
    }\n```\n\nAgain, the situation with only one item in the collection view is a\
    \ special case; there’s no rotation involved.\n\nAssuming there’s more than one\
    \ item, then the rotation per item is `2π` divided by the number of items (`2π`\
    \ is the number of radians in a full circle; iOS uses radians for trigonometric\
    \ calculations).\n\nLooking back to the `calculateCenterForItemAtIndexPath:` function,\
    \ you’ll see that there’s another helper function you need to implement. It is\
    \ to calculate the radius of the circle: the smaller of the height or the width\
    \ of the collection view.\n\nAdd the function in Listing [17-10](#A978-1-4842-1242-4_17_Chapter.html#FPar11).\n\
    \n**Listing 17-10.** Calculating the Circle Radius\n\n```\nfunc calculateSpokeRadius()\
    \ -> CGFloat {\n    // Calculates the radius of the ’spoke’ connecting the item’s\
    \ center and the\n    // center of the collectionView\n    // Find out which is\
    \ the shorter side, in case\n    // the collectionView’s not square\n    let shorterSide\
    \ = min(collectionView!.bounds.size.width, collectionView!.bounds.size.height)\n\
    \    let collectionViewAllowance = shorterSide / 2\n    let itemWidthAllowance\
    \ = itemSize.width / 2\n    // Adjust for side padding (if any)\n    return (collectionViewAllowance\
    \ - (itemWidthAllowance + sidePadding))\n}\n```\n\nHere, you get the length of\
    \ the shorter side of the collection view, and then you adjust for the width of\
    \ the item and any padding between the item and the collection view frame.\n\n\
    The value returned by the `calculateSpokeRadius` function is used by `calculateCenterForItemAtIndexPath:`\
    \ to calculate the horizontal and vertical distance between the center of the\
    \ collection view and the center of the item:\n\n```\nlet xDisplacement = CGFloat(sinf(Float(theta)))\
    \ * calculateSpokeRadius()\nlet yDisplacement = CGFloat(cosf(Float(theta))) *\
    \ calculateSpokeRadius()\n```\n\nThis requires a bit of high school math, and\
    \ uses the `sinf` and `cosf` trigonometry functions. The angles involved form\
    \ a right-angled triangle. This is the same technique you used in [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html),\
    \ so check back there if you need a refresher.\n\nWith the distances calculated,\
    \ you’re now in a position to calculate the center coordinates for the item:\n\
    \n```\nlet xPosition = (collectionView!.bounds.size.width/2) + xDisplacement\n\
    let yPosition = (collectionView!.bounds.size.width/2) - yDisplacement\n```\n\n\
    Now return the entire set of attributes back to the calling function:\n\n```\n\
    return CGPointMake(xPosition, yPosition)\n```\n\nWith all this in place, you can\
    \ calculate the attributes for any item within the collection view. Now you need\
    \ to implement the functions to return them to the collection view when they’re\
    \ required.\n\n### Supplying Attributes to the Collection View\n\nThe process\
    \ of supplying attributes for items to the collection view can take place in one\
    \ of four phases:\n\n- **En masse**, where the collection view will ask for all\
    \ attributes for items in a given `CGRect`. Since your collection view will always\
    \ be completely visible, you’re effectively being asked for attributes for all\
    \ the items.\n- **Individually**, where the collection view supplies an `NSIndexPath`\
    \ and expects the attributes for the relevant item.\n- **During insertion of items**,\
    \ when the collection view will ask for initial attributes for items that are\
    \ appearing. The collection view will handle interpolating between the initial\
    \ attributes and those that the item will use for the duration of its stay in\
    \ the collection view.\n- **During removal of items**, when the collection view\
    \ will ask for final attributes for items that are being removed. As with initial\
    \ attributes, the collection view will handle interpolating from the current state\
    \ of the item to its final values.\n\nLet’s tackle these one by one.\n\n### Supplying\
    \ Attributes En Masse\n\nThe layout needs to implement the `layoutAttributesForElementInRect:`\
    \ function, which is passed a `CGRect` parameter and is responsible for figuring\
    \ out which elements fit within the rect and returning their attributes. These\
    \ get returned as an `Array` of `UICollectionViewLayoutAttributes`.\n\nThere are\
    \ a couple of things to note about this function. Firstly, it’s your responsibility\
    \ to determine which elements appear in the supplied `CGRect`. The collection\
    \ view doesn’t know about this, and in any case it may ask the layout for this\
    \ information repeatedly as it scrolls.\n\nSecondly, elements refers to cells,\
    \ supplementary views, and decoration views. If your collection view uses these\
    \ items, you need to figure out which are visible in the `CGRect` and return their\
    \ attributes.\n\nIn this case, things are a little simpler. You only have cells,\
    \ and the collection view won’t scroll. Therefore you can simply return all the\
    \ attributes you have, as shown in Listing [17-11](#A978-1-4842-1242-4_17_Chapter.html#FPar12).\n\
    \n**Listing 17-11.** The `layoutAttributesForElementsInRect:` Function\n\n```\n\
    override func layoutAttributesForElementsInRect(rect: CGRect) -> [UICollectionViewLayoutAttributes]?\
    \ {\n    // As all elements will be shown, return all of them\n    return layoutAttributes\n\
    }\n```"
