- fmt: "# What UITableView Inherits from UIScrollView\n\nWhat does `UITableView` get\
    \ from `UIScrollView`?\n\nThe short answer to this is, “Everything that `UITableView`\
    \ doesn’t explicitly override.” This provides some useful `UIScrollView` and `UIScrollViewDelegate`\
    \ methods and properties that are particularly relevant to the `UITableView` class.\n\
    \n`contentSize` indicates the full height that the table would be if all rows\
    \ were created and populated at once. (In fact, unless the table is small, this\
    \ very rarely happens because of `UITableView`’s caching and queuing mechanism.)\
    \ `contentSize` is calculated by adding the total height of all the rows, plus\
    \ the header and footer views.\n\n`contentOffset` indicates how far down the table\
    \ has been scrolled from the top of the `tableView`’s frame. For example, if the\
    \ `tableView`’s `contentSize.height` value is 1,000 points, and the table is scrolled\
    \ halfway down, the `contentOffset` would be 500 points.\n\nTwo `UIScrollViewDelegate`\
    \ methods are particularly useful if you want to know when your user is scrolling\
    \ the table around.\n\n`scrollViewWillBeginDragging` `tableView` starts moving,\
    \ and `scrollViewDidScroll` is called multiple times while the table scrolls.\n\
    \nThis is where you could get the new `contentOffset` value and update anything\
    \ that needed to change as a result.\n\n**Note**\n\nAlthough `UITableView` is\
    \ a subclass of `UIScrollView`, table views can only scroll vertically.\n\n##\
    \ Creating UITableViews\n\nAny discussion of how to go about creating `UITableViews`\
    \ has to come with a caveat: on their own, `UITableViews` don’t really do very\
    \ much. In order to become populated with data and interact with your user, they\
    \ need the support of a class that implements the `UITableViewDelegate` and `UITableViewDatasource`\
    \ protocols.\n\nHaving said that, in order to get a `UITableView` onto the screen,\
    \ you need to be able to draw it. You have two options here: create it visually\
    \ using Interface Builder in a XIB file or Storyboard or create it programmatically\
    \ in code.\n\n### Creating a UITableView in Interface Builder\n\nCreating a `UITableView`\
    \ in Interface Builder is a massively challenging process.\n\n![A978-1-4842-1242-4_2_Fig8_HTML.jpg](A978-1-4842-1242-4_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8. The `UITableView` item in the Objects browser Open your Storyboard.\
    \ Drag a `UITableView` from the Objects browser onto your view, as shown in Figure\
    \ [2-8](#A978-1-4842-1242-4_2_Chapter.html#Fig8).\n\nOkay, I lied. It’s actually\
    \ pretty straightforward. But there are a couple of details to take care of, so\
    \ the process is worth stepping through.\n\n#### Placing a UITableView into Another\
    \ View\n\nAlthough you’ll often see table views full-screen, you’re not restricted\
    \ to that option. You can make your table views any size you want. This is pretty\
    \ simple: drag the `UITableView` object onto the view in which it’s going to appear,\
    \ and adjust the AutoLayout constraints as needed (see Figure [2-9](#A978-1-4842-1242-4_2_Chapter.html#Fig9)).\n\
    \n![A978-1-4842-1242-4_2_Fig9_HTML.jpg](A978-1-4842-1242-4_2_Fig9_HTML.jpg)\n\n\
    Figure 2-9. Placing a `UITableView` into another view\n\n#### Placing a Full-Screen\
    \ UITableView\n\nIf, on the other hand, your `tableView` will always be shown\
    \ full screen, there’s not really much point in creating it as a child of another\
    \ view that will never be shown.\n\nThe process in this scenario is slightly different.\n\
    \nDelete the existing view object from the NIB file or Storyboard. Drag a `UITableView`\
    \ object into the central area (Figure [2-10](#A978-1-4842-1242-4_2_Chapter.html#Fig10)).\n\
    \n![A978-1-4842-1242-4_2_Fig10_HTML.jpg](A978-1-4842-1242-4_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10. Dragging a `UITableView` object into the main area\n\nHaving removed\
    \ the default view from the NIB file or Storyboard, you need to reconnect the\
    \ File’s Owner `view` outlet to the `tableView`. Ctrl-click the File’s Owner icon\
    \ in the Placeholders list and drag out to the `tableView`. Then release the mouse\
    \ button, and select the View outlet from the pop-up list.\n\n**Caution**\n\n\
    It’s easy to forget to reconnect the `view` outlet if you’ve deleted the object\
    \ it was once connected to. If you don’t reconnect, your app will crash with an\
    \ error something along the lines of\n\n```\n*** Terminating app due to uncaught\
    \ exception ’NSInternalInconsistency Exception’, reason: ’-[UIViewController _loadViewFromNibNamed:bundle:]\
    \ loaded the \"PlainTable\" nib but the view outlet was not set.’\n```\n\nAfter\
    \ the `view` outlet is reconnected, hook your new `tableView` up to its `dataSource`\
    \ and `delegate`.\n\nThe chances are that the class that will act as `dataSource`\
    \ and `delegate` will also be the File’s Owner. If that’s the case, you can connect\
    \ these by Ctrl-clicking and dragging from the table to the File’s Owner icon\
    \ and selecting `dataSource` and `delegate` from the pop-up options.\n\n### Creating\
    \ a UITableView Programmatically\n\nIn [Chapter 1](#A978-1-4842-1242-4_1_Chapter.html),\
    \ we built a simple app with a table view using Interface Builder.\n\nFollowing\
    \ the maxim of anything you can do in Interface Builder, you can also do in code,\
    \ the alternative way of creating a `UITableView` is to do so in code. It’s a\
    \ four-step process.\n\nCreate an instance of `UITableView` with a size and a\
    \ style.  \nSet the new `tableView`’s `delegate` and `dataSource` properties.\
    \  \nAdd the new `tableView` to the `superView`.  \nCall the new `tableView`’s\
    \ `reloadData` method to make sure it updates.\n\nListing [2-1](#A978-1-4842-1242-4_2_Chapter.html#FPar4)\
    \ shows an example of how you could do this in a `UIViewController`’s `viewDidLoad`\
    \ method.\n\n**Listing 2-1.** Adding a `tableView` Programmatically\n\n```\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    tableView = UITableView(frame:\
    \ self.view.frame, style:.Plain)\n    tableView.delegate = self\n    tableView.dataSource\
    \ = self\n    self.view.addSubview(tableView)\n    tableView.reloadData()\n}\n\
    ```\n\n**Caution**\n\nHaving set the `delegate` and `dataSource` properties of\
    \ your `tableView`, it will expect (nay, demand!) that the controller adopts the\
    \ `UITableViewDelegate` and `UITableViewDataSource` protocols–in particular, that\
    \ the `numberOfSectionsInTableView:`, `tableView:numberOfRowsInSection:` and `tableView:cellForRowAtIndexPath:`\
    \ methods are implemented.\n\nIf those protocols haven’t been implemented correctly,\
