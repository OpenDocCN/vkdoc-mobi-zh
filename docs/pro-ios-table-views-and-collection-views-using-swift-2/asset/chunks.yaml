    methods


    ## What Are Collection Views?


    A collection view provides a way of managing and displaying an ordered set of
    data items with customizable and interactive layouts.


    Collection views consist of data items displayed in cells, together with supplementary
    views that can display additional information for things like section headers
    and footers, or for additional metadata about the items themselves.


    Decoration views are purely visual components that can be used to display interface
    elements like backgrounds and borders; they don’t include any variable data elements.


    The collection view builds on the table view control by providing the potential
    for much more complex layouts. Whereas a table view can display items in a single
    column, collection views can present items in layouts ranging from linear grids
    to circles and every conceivable layout in between. Some examples are shown in
    Figure [4-1](#A978-1-4842-1242-4_4_Chapter.html#Fig1).


