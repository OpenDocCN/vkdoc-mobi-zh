- fmt: "# What Are WatchKit Tables?\n\nThe WatchKit SDK includes `WKInterfaceTable`,\
    \ a class that supports single column tables. A table can consist of multiple\
    \ types of rows. Each row type has its own row controller, which is backed by\
    \ a custom class that you need to create. The row controller contain the outlets\
    \ to connect to the interface elements, and (where needed) functions to handle\
    \ interactions with the controls.\n\nThe relationship between table, rows and\
    \ row controllers is shown in Figure [14-1](#A978-1-4842-1242-4_14_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1242-4_14_Fig1_HTML.jpg](A978-1-4842-1242-4_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1. The relationship between table, rows and row controllers\n\nThe\
    \ process of creating a table-based WatchKit app has four steps.\n\nCreating a\
    \ table object in the Storyboard and laying out controls in the rows. Creating\
    \ `NSObject` subclasses to act as controllers for each type of row that will be\
    \ displayed, with outlets to the controls in the Storyboard. Creating instances\
    \ of the row controller classes and providing them to the table at runtime. Responding\
    \ to user interaction with the rows.\n\nWatchKit tables are instances of the `WKInterfaceTable`\
    \ class. Conceptually, they’re similar to `UITableView`, but with some significant\
    \ differences:\n\n- `WKInterfaceTable` doesn’t use a data source to create cells\
    \ on demand. Instead, you’re responsible for creating all the cells upfront before\
    \ the table is displayed in the interface.\n- There is no delegate to handle interaction;\
    \ that’s something you need to implement yourself as well.\n- Like the other WatchKit\
    \ interface elements, there’s no support for AutoLayout, and you need to use Storyboards\
    \ to create the interfaces.\n- The performance limitations of the current generation\
    \ of Apple Watch devices means that in practice you’re limited to around 20 rows\
    \ before performance drops off unacceptably.\n\nFigure [14-2](#A978-1-4842-1242-4_14_Chapter.html#Fig2)\
    \ shows how the row controller and rows relate together.\n\n![A978-1-4842-1242-4_14_Fig2_HTML.jpg](A978-1-4842-1242-4_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2. How `WKInterfaceTable` objects fit together\n\nAt runtime, you’re\
    \ responsible for telling the table the type, number, and order of the rows, and\
    \ then creating instances of the row controllers before configuring their outlets.\
    \ You have two options here:\n\n- If your table will only have one type of cell,\
    \ you can use the `setNumberOfCells:withRowType` function: `table.setNumberOfRows(5,\
    \ withRowType: \"ContactRow\")`\n- If your table will have more than one type\
    \ of cell, you need to pass an array of cell identifier strings into the `setRowTypes:`\
    \ function. For example, if you have one header, two data and one footer row,\
    \ you pass in the array `[\"HeaderCell\", \"DataCell\", \"DataCell\", \"FooterCell\"\
    ]`: `table.setRowTypes([\"HeaderCell\", \"DataCell\", \"DataCell\", \"FooterCell\"\
    ])`\n\nOnce you’ve told the table which row has which type of cell, you then need\
    \ to get the row controller for each row in turn with the `rowControllerAtIndex`\
    \ function. Now you’re able to configure the outlets that you previously defined\
    \ in the row controller class. An example of this process is shown in Listing\
    \ [14-1](#A978-1-4842-1242-4_14_Chapter.html#FPar1).\n\nListing 14-1. Configuring\
    \ and Updating a Watch Table\n\n```\nfunc updateTable() {\n\n    // Create array\
    \ to hold the row types\n    var rowsArray = [String]()\n\n    // Add header row\
    \ as the row 0\n    rowsArray.append(\"HeaderRow\")\n\n    // Add a contact row\
    \ for each object in the dataArray\n    for index in 1...self.dataArray.count\
    \ {\n        rowsArray.append(\"ContactRow\")\n    }\n\n    // Add a footer row\
    \ as the last row\n    rowsArray.append(\"FooterRow\")\n\n    // Configure the\
    \ table to display the rows as defined in the rowsArray\n    self.watchTable.setRowTypes(rowsArray)\n\
    \n    // Retrieve each contact row and set the contents from the dataArray\n \
    \   // Start at row 1, because row 0 is the header row\n    for index in 1...self.dataArray.count\
    \ {\n        var contactRow: ContactRowController =\n        self.watchTable.rowControllerAtIndex(index)\
    \ as! ContactRowController\n        var rowContent = self.dataArray[index]\n \
    \       contactRow.nameLabel!.setText(rowContent)\n    }\n\n    // Get the last\
    \ row, and configure it as the footer\n    let contactCount = self.dataArray.count\n\
    \    var footerRow: FooterRowController =\n    self.watchTable.rowControllerAtIndex(contactCount\
    \ + 1) as! FooterRowController\n    footerRow.footerLabel.setText(\"\\(contactCount)\
    \ messages\")\n}\n```\n\nThe Storyboard presents the table as one or more rows.\
    \ Inside each row there’s a group, which is where you add your custom controls,\
    \ shown in Figure [14-3](#A978-1-4842-1242-4_14_Chapter.html#Fig3).\n\n![A978-1-4842-1242-4_14_Fig3_HTML.jpg](A978-1-4842-1242-4_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3. The groups inside each row\n\nControls in the group are connected\
    \ to outlets in the same way as a normal Storyboard or Xib file.\n\n## Creating\
    \ a Basic Table\n\nIn this section, you’ll go through the process of creating\
    \ a demonstration WatchKit table. It won’t be a fully-featured app with a dynamic\
    \ data source, because that’s beyond the scope of creating a table interface,\
    \ but it will show you how to wire up a table that you can extend further.\n\n\
    There are four steps involved, assuming you’re creating a new project from scratch:\n\
    \n- Create a new iPhone project to act as the host for the extension.\n- Create\
    \ a WatchKit app as a new target, to create the app that will run on the watch\
    \ and the extension that will configure the table.\n- Lay out the table in the\
    \ Storyboard.\n- Create the functions to populate the table at runtime.\n\n###\
    \ Creating the Project\n\nTo begin, you’ll need a new iPhone project. Create a\
    \ new project in Xcode with File ➤ New ➤ Project and select the Single View Application\
    \ template. Give the project a name (I’m calling mine `WatchTable`), and save\
    \ the project somewhere appropriate.\n\n### Adding the WatchKit Target\n\nAs you\
    \ saw above, there are three components to a WatchKit app:\n\n- The iPhone app,\
    \ which handles the heavy lifting of things like communicating with APIs, etc.\n\
    - The WatchKit app, which runs on the watch itself. This is where you’ll lay out\
    \ the table’s visual appearance in the Storyboard.\n- The Watchkit extension,\
    \ which runs on the iPhone and contains the code for managing the content and\
    \ interaction of the table.\n\nAll three components are bundled together into\
    \ the app, and if a paired watch is present as the app is installed, the user\
    \ will be asked whether they want to install the WatchKit app onto the watch itself.\n\
    \nTo begin extending an iPhone app with watch functionality, you first need to\
    \ create a new target that adds the WatchKit app and extension.\n\nFrom the File\
    \ ➤ New ➤ Target menu, select the `WatchKit App` template, as shown in Figure\
    \ [14-4](#A978-1-4842-1242-4_14_Chapter.html#Fig4).\n\n![A978-1-4842-1242-4_14_Fig4_HTML.jpg](A978-1-4842-1242-4_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4. Adding the WatchKit target\n\nYou’ll then be prompted to set the\
    \ options for the new target. Most of these are read-only, but you can select\
    \ the language and whether you want to add Notification and Glance scenes to the\
    \ target. You don’t, so change the options so they match those shown in Figure\
    \ [14-5](#A978-1-4842-1242-4_14_Chapter.html#Fig5), and select Finish.\n\n![A978-1-4842-1242-4_14_Fig5_HTML.jpg](A978-1-4842-1242-4_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5. Setting the target options\n\nYou may then be prompted to confirm\
    \ whether you want to activate the WatchTarget app’s scheme, as shown in Figure\
