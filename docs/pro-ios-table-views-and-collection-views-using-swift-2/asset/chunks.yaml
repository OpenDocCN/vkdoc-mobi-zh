  raw: '#### The datasource’s cellForItemAtIndexPath: function


    The `UICollectionViewDataSource` function `cellForItemAtIndexPath` should be familiar
    by now – this is where the collection view’s `datasource` returns a cell to the
    collection view either by dequeueing a previously-created one, or by creating
    one from the subclass, prototype or XIB that’s previously been registered.


    This is the first point in the cell lifecycle where you can configure cells –
    and it’s the most usual point for doing so. However, this function is called before
    the cell is displayed, albeit that there isn’t usually much of a delay between
    dequeuing and display.


    As a rule of thumb, you should use this method for updating the content of the
    cell based on individual properties of the underlying data model – for example,
    the contents of a field or an image view.


    #### The delegate’s willDisplayCellAtIndexPath: function


    The `UICollectionViewDelegate` function `willDisplayCellForItemAtIndexPath:` is
    called by the `collectionView` just before it displays each cell. This happens
    immediately before the cell is drawn in the collection view, so it’s the last
    point where you can tweak the cell’s contents before display.


    It is possible to change the cell’s contents here, but there are a couple of reasons
    why you should restrict the changes to small, specific ones:


    *   If you use this method to update the cell contents, you’re blurring the distinction
    between the roles of the collection view’s `dataSource` and `delegate` objects.
    That can make it harder to refactor in the future, and could lead to messier code.

    *   This function is called just before the cell is displayed, so if it’s slow
    to complete it will adversely affect the collection view’s scrolling performance.


    As a rule of thumb, you should restrict the use of this function to updating the
    contents of the cell based on selections, for example setting or removing checkboxes.


    ### Cell-, Section-, and Item-Related UICollectionViewDataSource Methods


    Four main methods, listed in Table [5-6](#A978-1-4842-1242-4_5_Chapter.html#Tab6),
    are concerned with providing that information. Two of the methods are required.


    Table 5-6.


    Cell, Section, And Item Methods Of The UICollectionViewDataSource Protocol


    | Method | Purpose | Returns | Required? |

    | --- | --- | --- | --- |

    | `numberOfSectionsInCollectionView(_:)` | Returns the number of sections in the
    collection view | `NSInteger` | No |

    | `collectionView(_:numberOfItemsInSection:)` | Returns the number of items in
    the given section | `NSInteger` | Yes |

    | `collectionView(_:cellForItemAtIndexPath:)` | Returns a `UICollectionViewCell`
    for the item at the index path provided | `UICollectionViewCell` | Yes |

    | `collectionView(_:viewForSupplementaryElementOfKind:atIndexPath:)` | Returns
    a `UICollectionReusableView` to use as the supplementary view for the item at
    the index path provided | `UICollectionReusableView` | No |


    Supplementary views are optional and only need to be provided if your collection
    view layout requires them.


    Although the `collectionView` needs to know the number of sections required, the
    default value is `1`, which is why you’ll often see `numberOfSectionsInCollectionView`
    omitted for simple collection views.


    ## The Thing to Bear in Mind About dataSource Methods


    Although table and collection views look simple enough on the surface, there’s
    a lot going on underneath. Key to a good user experience is scrolling that is
    smooth and instantaneous. One of the main complaints you’ll hear about iPad rivals,
    for instance, is that their scrolling stutters and is jerky.


    In order for the views to scroll smoothly, your `dataSource` must be prepared
    to provide data as soon as it’s asked for. Delays in returning data mean delays
    in drawing the cells and updating the view’s layout—and that means jerks and stutters
    in the user interface.


    Making the data available immediately can have various forms, caching data queries
    being an obvious one. And needless to say, retrieving live `tableView` or `collectionView`
    data from a network source is a spectacularly bad idea.


    If your data isn’t available immediately, it’ll probably be necessary to provide
    placeholder information and go back to update missing values later, when the data
    becomes available.


    `UITableView` has three sets of methods that can be used for this: `reloadData`
    reloads the whole table, while `reloadRowsAtIndexPath` updates specific rows.
    `reloadSectionIndexTitles` and `reloadSections:withRowAnimation:` update the specified
    sections.


    `UICollectionViews` handles updates in a very similar fashion: `reloadData` reloads
    the whole of the collection view, `reloadSections:` does the same for a specific
    section, and `reloadItemsAtIndexPaths:` reloads a number of specific items.


    ## Implementing the dataSource and delegate Protocols


    A common pattern is for the view controller that is responsible for the view in
    which the table or collection view appears to act as the `dataSource` and `delegate,`
    although read on in this chapter as to why that might not always be a good idea!


    Note


    Everything in this section applies equally to both `UITableView` and `UICollectionView`,
    so for “table view” read “collection view,” and vice versa.


    In order for a table view to use a class as its `dataSource` or `delegate`, the
    class has to conform to the `UITableViewDataSource` and `UITableViewDelegate`
    protocols. There are two ways of doing this: the first is to declare the class’s
    conformance and implement the required methods in the body of the class, as shown
    in Listing [5-4](#A978-1-4842-1242-4_5_Chapter.html#FPar8).


    Listing 5-4. An Example Class Acting as UITableViewDataSource and UITableViewDelegate


    `class ViewController: UIViewController, UITableViewDataSource, UITableViewDelegate
    {`


        `// mark: -`


        `// mark: UIViewController methods`


                `// ...`


                `// UIViewController methods here`


                `// ...`


        `// mark: -`


        `// mark: UITableView methods`


        `func numberOfSectionsInTableView(tableView: UITableView) -> Int {`


            `...`


        `}`


        `func tableView(tableView: UITableView, numberOfRowsInSection section: Int)
    -> Int {`


            `...`


        `}`


        `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: ➤`


        `NSIndexPath) -> UITableViewCell {`


            `...`


        `}`


    `}`


    A “Swiftier” way to do this is to add an extension to the `UIViewController`,
    as shown in Listing [5-5](#A978-1-4842-1242-4_5_Chapter.html#FPar9).


    Listing 5-5. Using an Extension for Protocols


    `import UIKit`


    `class ViewController: UIViewController {`


        `// ...`


        `// view controller methods here`


    `}`


    `extension ViewController: UITableViewDataSource, UITableViewDelegate {`


        `func numberOfSectionsInTableView(tableView: UITableView) -> Int {`


            `...`


        `}`


        `func tableView(tableView: UITableView, numberOfRowsInSection section: Int)
    -> Int {`


            `...`


        `}`


        `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: ➤`


        `NSIndexPath) -> UITableViewCell {`


            `...`


        `}`


    `}`


    Laying out your code in this way makes a clearer separation between the `UIViewController`
    methods and the `dataSource`/`delegate` functions–and makes it easier to refactor
    these functions out into a separate class if you need to do this later.'
