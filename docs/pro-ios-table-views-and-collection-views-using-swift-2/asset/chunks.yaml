- fmt: '### Deciding When to Calculate Attributes


    The collection view itself doesn’t care when the layout attributes are calculated;
    all that matters is that they can be returned by the layout on demand when the
    collection asks for them. Because the collection view will call `layoutAttributesForItemsInRect:`
    and `layoutAttributesForItemAtIndexPath:`, you could calculate the attributes
    on the fly. However, this might not be necessary.


    If your layout is highly dynamic (it can scroll, or perhaps there are many items
    that will change presence, size, or location), then you will most likely have
    to calculate layout attributes when the collection view calls for them.


    If, on the other hand, you’ve got a layout that’s largely static, another option
    might be to calculate the layout attributes up front in the `prepareLayout` function,
    and then simply return the pre-calculated values in response to `layoutAttributesForItemsInRect:`.


    Which approach to take is a balance between the effort involved in the calculations
    and the frequency of updates. There’s no obviously right answer, unfortunately,
    other than to bear in mind the saying “premature optimization is the root of all
    evil.”


    ### What the Custom Layout Does


    The custom layout has three main tasks that it carries out on behalf of the collection
    view. These are:


    - Calculating the size of the collection view’s content area, that is, how large
    the scrolling content area will be, based on the size and position attributes
    for each item that the collection view will display.

    - Calculating the layout attributes for the item at each index path.

    - Returning an array of layout attributes for the items in a given area of the
    collection view’s content area.


    ### What Are Layout Attributes?


    With all this talk of layout attributes, what exactly are they?


    The `UICollectionViewLayoutAttributes` class defines a series of layout-related
    attributes that can be applied to a collection view item (or supplementary or
    decoration view) to customize the way in which it is displayed.


    The class defines a number of “standard” attributes, but if these aren’t sufficient
    you can create a subclass of `UICollectionViewLayoutAttributes` and create your
    own as required.


    The standard attributes provided are:


    - `frame`, which determines where the item will be displayed within the collection
    view. Changing this attribute also sets the item’s `center` and `size` properties.

    - `bounds`, which determines the bounds rectangle of the item relative to its
    own coordinate system. Changing this attribute will also change the `size` property.

    - `center`, which locates the center of the item relative to the collection view.
    Changing this attribute will also update the `frame` property.

    - `size`, which determines the size of the item. Changing this attribute will
    also cause the `frame` and `bounds` properties to be updated.

    - `transform3D`, which allows the item to be transformed in the x, y, and z planes
    to create 3D effects. Changing this attribute will also update the `transform`
    property.

    - `transform`, which allows the item to be transformed in the x and/or y planes
    to get scale or skew effects. Changing this attribute will also update the `transform3D`
    property.

    - `alpha`, which controls the transparency of the item. By default, the item is
    totally non-transparent with an `alpha` value of `1`. Setting the `alpha` value
    to `0` will make the item appear to vanish; setting it somewhere between `1` and
    `0` will provide varying degrees of transparency. Note that this isn’t the same
    as setting the `hidden` property to `YES`, as items with an `alpha` property of
    0 will always be created by the collection view.

    - `zIndex`, which determines whether the item is displayed “above” or “below”
    other items in the collection view. By manipulating the `zIndex` for each item,
    you can get the appearance of items “stacking” or overlapping. The higher the
    number, the closer to the “front” or “top” the item will be.

    - `hidden`, which controls the overall appearance of the item. If this is set
    to `YES` or `true`, the item won’t be displayed. Note that this isn’t the same
    as setting the `alpha` attribute to `0`, because the collection view may self-optimize
    and choose not to create items with `hidden` set to `YES`.


    #### Custom Layout Attributes


    If the standard set of layout attributes doesn’t give you the level of control
    that you need, you can create your own custom attributes. These can control any
    other aspect of the item’s visual appearance (text color, font, or orientation,
    for example), although the possibilities are more or less limitless.


    You can extend the standard attributes by subclassing `UICollectionViewLayoutAttributes`
    and adding your own properties as required. If you do this, there are three additional
    steps that you need to implement:


    - A custom `UICollectionViewLayoutAttributes` subclass must conform to the `NSCopying`
    protocol, so that the collection view can copy them as and when it needs to.

    - A custom `UICollectionViewLayoutAttributes` subclass must override the inherited
    `isEqual:` function so that any custom properties are checked. The collection
    view won’t apply attributes to an item unless they’ve changed, so if you’ve implemented
    your own custom attributes, the collection view needs a way of determining whether
    they are the same or not.

    - Any items that have custom attributes applied to them (cells, supplementary
    view, or decoration views) must implement the `applyLayoutAttributes:` function.
    This function is where you take the attribute (say text color, for example) and
    apply it (in this case, to a `UILabel` in the item).


    ### The Four Key Functions to Implement


    There are four key functions that you need to implement in your custom `UICollectionViewLayout`
    in order to provide the collection view with the layout attributes it needs:


    - `func prepareLayout()`

    - `func collectionViewContentSize() -> CGSize`

    - `func layoutAttributesForElementsInRect(_ rect: CGRect) -> [UICollectionViewLayoutAttributes]?`

    - `func layoutAttributesForItemAtIndexPath(_ indexPath: NSIndexPath) -> UICollectionViewLayoutAttributes?`


    Let’s look at each one in turn.


    ### prepareLayout


    This function is called when the collection view first asks its layout object
    for attributes, and again at any point where the layout is invalidated in response
    to a bounds change or an explicit request.


    Depending on the specific details of your custom layout, there may be values that
    it makes most sense to calculate “globally” for the layout as a whole.


    For example, the individual items might get placed relative to the center of the
    collection view’s bounds. This center point won’t change unless the bounds of
    the collection view change, so `prepareLayout` is a good place to calculate this
    and place it in a class property.


    If you’ve got a relatively static layout, you could use `prepareLayout` to calculate
    all the attributes for all the items and then store them in a property. If your
    layout is more dynamic, however, this might not make sense.


    By default, `UICollectionViewLayout` doesn’t implement `prepareLayout`, so if
    there aren’t any preparations that need to occur, you can simply omit the function
    completely.'
