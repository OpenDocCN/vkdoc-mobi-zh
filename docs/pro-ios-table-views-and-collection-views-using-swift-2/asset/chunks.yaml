    `let destroyMenuItem = UIMenuItem(title: "Destroy!", action: "performDestroy:")`


    `let addMenuItem = UIMenuItem(title: "Add!", action: "addItem:")`


    `UIMenuController.sharedMenuController().menuItems = [addMenuItem, destroyMenuItem]`


