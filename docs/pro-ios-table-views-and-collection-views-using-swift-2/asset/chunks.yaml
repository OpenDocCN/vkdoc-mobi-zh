- fmt: "### Building the Model\n\nThe approach you’re going to use is to build the\
    \ data from a JSON file. The structure of the JSON looks like Listing [3-1](#A978-1-4842-1242-4_3_Chapter.html#FPar1).\n\
    \nListing 3-1. An Extract from the `cards.json` File\n\n```\n{\n  \"suits\": [\n\
    \    {\n      \"suitName\": \"Spades\",\n      \"packOrder\": 1,\n      \"cards\"\
    : [\n        {\n          \"cardName\": \"Ace of Spades\",\n          \"cardImage\"\
    : \"ace_of_spades.png\",\n          \"suitOrder\": 1,\n          \"cardValue\"\
    : 14\n        },\n        {\n          \"cardName\": \"King of Spades\",\n   \
    \       \"cardImage\": \"king_of_spades.png\",\n          \"suitOrder\": 2,\n\
    \          \"cardValue\": 13\n        },\n        {\n          \"cardName\": \"\
    Queen of Spades\",\n          \"cardImage\": \"queen_of_spades.png\",\n      \
    \    \"suitOrder\": 3,\n          \"cardValue\": 12\n        },\n        ...\n\
    \      ]\n    },\n    {\n      \"suitName\": \"Hearts\",\n      \"packOrder\"\
    : 2,\n      \"cards\": [...]\n    },\n    {\n      \"suitName\": \"Diamonds\"\
    ,\n      \"packOrder\": 3,\n      \"cards\": [...]\n    },\n    {\n      \"suitName\"\
    : \"Clubs\",\n      \"packOrder\": 4,\n      \"cards\": [...]\n    },\n    {\n\
    \      \"suitName\": \"Jokers\",\n      \"packOrder\": 5,\n      \"cards\": [\n\
    \        {\n          \"cardName\": \"Black Joker\",\n          \"cardImage\"\
    : \"black_joker.png\",\n          \"suitOrder\": 1,\n          \"cardValue\":\
    \ 1\n        },\n        {\n          \"cardName\": \"Red Joker\",\n         \
    \ \"cardImage\": \"red_joker.png\",\n          \"suitOrder\": 2,\n          \"\
    cardValue\": 2\n        }\n      ]\n    }\n  ]\n}\n```\n\nTo save you having to\
    \ create the JSON file from scratch, it’s available in the downloadable source\
    \ code.\n\nThe model will be stored as an `Array` of `Dictionaries` in a property\
    \ in `ViewController`. Add this at the top of the class:\n\n```\nclass ViewController:\
    \ UIViewController {\n    var suitsArray = [Dictionary<String, AnyObject]()\n\
    \    ...\n}\n```\n\nHere, you’re declaring that `suitsArray` will be an array\
    \ of `Dictionaries`. Each dictionary will have a `String` as a key and can store\
    \ an `AnyObject` as the corresponding value (this will allow you to store `Strings`,\
    \ `Ints`, and other `Arrays`, as you’ll see in a moment.)\n\nNext, you need a\
    \ function to load the data from the JSON file. This will read the JSON file from\
    \ disk and parse it as dictionaries into the `suitsArray` array.\n\nAlthough you’re\
    \ only building a simple example application, it’s still a good idea to get into\
    \ good habits around handling errors. Parsing JSON can be hazardous; the source\
    \ JSON might not exist, and it might prove impossible to parse. In either of those\
    \ situations, you need to handle the resulting errors.\n\nTo do this, first you\
    \ add an `enum` to describe the potential error cases. Add this at the top of\
    \ the class, underneath the `suitsArray` declaration:\n\n```\nenum ParsingError:\
    \ ErrorType {\n    case MissingJson\n    case JsonParsingError\n}\n```\n\nThis\
    \ declares an `enum` that conforms to the `ErrorType` protocol. You’re creating\
    \ two possible values for the errors that this `enum` will describe: `MissingJson`,\
    \ to indicate that there was a problem with the source data, and `JsonParsingError`,\
    \ to show that something went wrong with the parsing of the JSON into the `suitsArray`.\n\
    \nNow add a new function at the bottom of the class called `setupData()`, as shown\
    \ in Listing [3-2](#A978-1-4842-1242-4_3_Chapter.html#FPar2).\n\nListing 3-2. The\
    \ `setupData()` Function\n\n```\n// MARK:\n// MARK: Data setup\nfunc setupData\
    \ () throws {\n    guard let filePath = NSBundle.mainBundle().pathForResource(\"\
    cards\",\n        ofType: \"json\"), jsonData = NSData(contentsOfFile: filePath)\
    \ else {\n        throw ParsingError.MissingJson\n    }\n\n    do {\n        let\
    \ parsedObject = try NSJSONSerialization.JSONObjectWithData(jsonData,\n      \
    \      options: NSJSONReadingOptions.MutableContainers) as! NSDictionary\n   \
    \     suitsArray = parsedObject[\"suits\"] as! Array\n    } catch {\n        throw\
    \ ParsingError.JsonParsingError\n    }\n}\n```\n\nFirstly, the function tries\
    \ to load the `cards.json` file. It will throw a `MissingJson` error if it can’t\
    \ find it or there’s some problem loading it. If everything is OK, then the JSON\
    \ will be loaded into the `jsonData` object.\n\nNext, the `jsonData` object is\
    \ parsed into an `NSDictionary`. Since this might fail, it’s wrapped in a `do-catch`\
    \ block that will throw a `JsonParsingError` if anything fails. You’re indicating\
    \ that things might go wrong by using the `try` keyword in front of the `JSONObjectWithData`\
    \ function.\n\nYou’re also force-unwrapping the result of the parsing into an\
    \ `NSDictionary`. This might also fail, but at least you’ll handle the error if\
    \ either operation goes wrong.\n\nThe `suitsArray` property will have the structure\
    \ shown in Figure [3-15](#A978-1-4842-1242-4_3_Chapter.html#Fig15).\n\n![A978-1-4842-1242-4_3_Fig15_HTML.jpg](A978-1-4842-1242-4_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15. The data structure\n\nAn individual section or item in a `UICollectionView`\
    \ is referenced by an `NSIndexPath` value. Figure [3-16](#A978-1-4842-1242-4_3_Chapter.html#Fig16)\
    \ shows how the `indexPath section` and `row` values map onto suits and cards.\n\
    \n![A978-1-4842-1242-4_3_Fig16_HTML.jpg](A978-1-4842-1242-4_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16. Mapping between collection sections and rows\n\nThe data model\
    \ needs to be set up before the collection view starts asking for data, so add\
    \ a call to the `setupData` function in the `ViewController`’s `viewDidLoad` function,\
    \ as shown in Listing [3-3](#A978-1-4842-1242-4_3_Chapter.html#FPar3).\n\nListing\
    \ 3-3. The Updated `viewDidLoad()` Function\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    // Configure data\n    do {\n        try setupData()\n\
    \    } catch ParsingError.MissingJson {\n        print(\"Error loading JSON\"\
    )\n    } catch ParsingError.JsonParsingError {\n        print(\"Error parsing\
    \ JSON\")\n    } catch {\n        print(\"Something went wrong\")\n    }\n}\n\
    ```\n\nThis wraps the `setupData()` function inside a `do-catch` block. If any\
    \ errors are thrown, they’ll be handled here.\n\n> **Tip**  \n> There’s no reason\
    \ why you couldn’t put this data setup code in the `viewDidLoad` function itself,\
    \ but I prefer to keep this kind of thing separate in its own function. There\
    \ are a couple of advantages to this approach. Firstly, it keeps the `viewDidLoad`\
    \ function compact and easier to read. Secondly, it will make unit testing your\
    \ view controllers much easier if you can decouple this sort of data setup process\
    \ from the view lifecycle."
