    ### Rearranging Tables


    In addition to inserting and deleting rows and sections, you can also rearrange
    them, both programmatically and through user actions.


    The rearrangement process is similar to the insertion and deletion process, as
    shown in Figure [12-18](#A978-1-4842-1242-4_12_Chapter.html#Fig18).


    ![A978-1-4842-1242-4_12_Fig18_HTML.jpg](A978-1-4842-1242-4_12_Fig18_HTML.jpg)


    Figure 12-18.


