    ### Next Steps


    That completes all the steps for creating the custom layout. Now all that’s left
    is to build the views for the clock’s hands, and wire the collection view up to
    use the custom class.


    First, declare the `clockLayout` property:


    `var clockLayout: ClockLayout!`


    Before you start with the hands and numerals, update the `ClockViewController’s
    configureCollectionView()` function to instantiate and set the `ClockLayout`:


    `clockLayout = ClockLayout()`


    `collectionView.setCollectionViewLayout(clockLayout, animated: false)`


    ### Displaying the Numerals and Hands


    The clock’s numerals and hands are displayed in instances of `UICollectionViewCells`.
    You create a custom `UICollectionViewCell` subclass for the hands, and use a XIB
    file for the numerals.


    #### Creating a XIB File for the Hour Labels


    To create a XIB file for the hour labels, select File ➤ New ➤ File, and select
    the User Interface section in the sidebar. Then highlight the Empty item in the
    main section, as shown in Figure [16-11](#A978-1-4842-1242-4_16_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_16_Fig11_HTML.jpg](A978-1-4842-1242-4_16_Fig11_HTML.jpg)


    Figure 16-11.


    Creating a XIB file


    Name the file `HandCell` and click `Create`.


    Now open the new XIB file in the Interface Builder, and drag out a Collection
    View Cell object out into the main pane, as shown in Figure [16-12](#A978-1-4842-1242-4_16_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_16_Fig12_HTML.jpg](A978-1-4842-1242-4_16_Fig12_HTML.jpg)


    Figure 16-12.


    Adding a Collection View Cell object


    Adjust the size so that the cell is 100 points wide by 100 points tall, and set
    its reuse identifier to `HourCellView`.


    Now drag a Label out into the cell, center it with AutoLayout constraints, and
    update the font according to your preferences. The finished result will look something
    like Figure [16-13](#A978-1-4842-1242-4_16_Chapter.html#Fig13).


    ![A978-1-4842-1242-4_16_Fig13_HTML.jpg](A978-1-4842-1242-4_16_Fig13_HTML.jpg)


    Figure 16-13.


    The updated label


    Finally, update the label’s `tag` property in the Attributes Inspector to `1000`
    so that it can be accessed from within the view controller, as shown in Figure
    [16-14](#A978-1-4842-1242-4_16_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_16_Fig14_HTML.jpg](A978-1-4842-1242-4_16_Fig14_HTML.jpg)


    Figure 16-14.


    Setting the label’s tag property


    Now that you have your XIB file created, it’s time to switch back to the `ClockViewController`
    and register this for use. In the `configureCollectionView()` function, add the
    following lines:


    `collectionView.registerNib(UINib(nibName: "HourCell", bundle: nil), ➤`


      `forCellWithReuseIdentifier: HourCellView)`


        `clockLayout.hourLabelCellSize = CGSizeMake(100.0, 100.0)`'
  trans: "\n#### 计算指针位置\n\n创建自定义布局的最后任务是计算指针的位置。这些指针单元格已在`ClockViewController`中设置好，但还有一些与布局相关的事项需要配置，例如让指针围绕集合视图的中心旋转以指示时间。\n\
    \n处理此任务的函数是`calculateAttributesForHandCellAtIndexPath:`。它与您刚刚构建的上一个函数类似：接受一个`indexPath`参数，并返回一个`UILayoutViewAttributes`对象。\n\
    \n完整函数如代码清单 16-10 所示。\n\n**代码清单 16-10.** `calculateAttributesForHandCell` 函数\n\
    \n```\nfunc calculateAttributesForHandCellAt(handPath: NSIndexPath) -> UICollectionViewLayoutAttributes\
    \ {\n    let attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath:\
    \ handPath)\n    let rotationPerHour: Double = (2 * M_PI) / 12\n    let rotationPerMinute:\
    \ Double = (2 * M_PI) / 60.0\n    \n    switch handPath.row {\n    case 0: //\
    \ 处理时针\n        attributes.size = hourHandSize\n        attributes.center = cvCenter\n\
    \        let intraHourRotationPerMinute: Double = rotationPerHour / 60\n     \
    \   let currentIntraHourRotation: Double = intraHourRotationPerMinute * Double(timeMinutes)\n\
    \        let angularDisplacement = (rotationPerHour * Double(timeHours)) + currentIntraHourRotation\n\
    \        attributes.transform = CGAffineTransformMakeRotation(CGFloat(angularDisplacement))\n\
    \        \n    case 1: // 处理分针\n        attributes.size = minuteHandSize\n   \
    \     attributes.center = cvCenter\n        let intraMinuteRotationPerSecond:\
    \ Double = rotationPerMinute / 60\n        let currentIntraMinuteRotation: Double\
    \ = intraMinuteRotationPerSecond * Double(timeSeconds)\n        let angularDisplacement\
    \ = (rotationPerMinute * Double(timeMinutes)) + currentIntraMinuteRotation\n \
    \       attributes.transform = CGAffineTransformMakeRotation(CGFloat(angularDisplacement))\n\
    \        \n    case 2: // 处理秒针\n        attributes.size = secondHandSize\n   \
    \     attributes.center = cvCenter\n        let angularDisplacement = rotationPerMinute\
    \ * Double(timeSeconds)\n        attributes.transform = CGAffineTransformMakeRotation(CGFloat(angularDisplacement))\n\
    \        \n    default:\n        break\n    }\n    \n    return attributes\n}\n\
    ```\n\n第一步是创建一个`UICollectionViewLayoutAttributes`实例：\n\n```\nlet attributes =\
    \ UICollectionViewLayoutAttributes(forCellWithIndexPath: handPath)\n```\n\n接下来，计算每小时的旋转量（时针为\
    \ 360° ÷ 12，分针为 360° ÷ 60）：\n\n```\nlet rotationPerHour: Double = (2 * M_PI) /\
    \ 12\nlet rotationPerMinute: Double = (2 * M_PI) / 60.0\n```\n\n然后需要处理三种情况，分别对应时针、分针和秒针。它们在`handPath`中的行索引分别为\
    \ 0、1 和 2，因此可以使用`switch`语句分别处理：\n\n```\nswitch handPath.row {\n    ...\n}\n```\n\
    \n每种情况都非常相似。首先，设置尺寸和中心属性：\n\n```\nattributes.size = hourHandSize;\nattributes.center\
    \ = cvCenter;\n```\n\n指针的尺寸作为属性传递给布局，使其与使用的图片无关。您可以随意更改该属性，而无需更新布局类。\n\n然后计算当前小时所需的旋转量：\n\
    \n```\nlet intraHourRotationPerMinute: Double = rotationPerHour / 60\n```\n\n\
    由于时针从某一小时刻度开始，并在一小时内逐渐移动到下一个刻度，因此需要根据当前分钟数计算所需的调整量：\n\n```\nlet currentIntraHourRotation:\
    \ Double = intraHourRotationPerMinute * Double(timeMinutes)\n```\n\n利用这两个值，可以计算实际的偏移量：\n\
    \n```\nlet angularDisplacement = (rotationPerHour * Double(timeHours)) + currentIntraHourRotation\n\
    ```\n\n最后，通过设置`transform`属性来旋转指针视图：\n\n```\nattributes.transform = CGAffineTransformMakeRotation(CGFloat(angularDisplacement))\n\
    ```\n\n### 后续步骤\n\n至此，创建自定义布局所需的全部步骤已完成。接下来只需构建时钟指针的视图，并将集合视图连接到自定义类即可。\n\n首先，声明`clockLayout`属性：\n\
    \n```\nvar clockLayout: ClockLayout!\n```\n\n在开始处理指针和数字之前，更新`ClockViewController`中的`configureCollectionView()`函数，以实例化并设置`ClockLayout`：\n\
    \n```\nclockLayout = ClockLayout()\ncollectionView.setCollectionViewLayout(clockLayout,\
    \ animated: false)\n```\n\n### 显示数字和指针\n\n时钟的数字和指针显示在`UICollectionViewCells`实例中。为指针创建一个自定义的`UICollectionViewCell`子类，并使用\
    \ XIB 文件来显示数字。\n\n#### 为小时标签创建 XIB 文件\n\n要创建小时标签的 XIB 文件，请选择 **File** ➤ **New**\
    \ ➤ **File**，然后在侧边栏中选择 **User Interface** 部分。接着高亮主区域中的 **Empty** 项，如图 16-11 所示。\n\
    \n![A978-1-4842-1242-4_16_Fig11_HTML.jpg](img/A978-1-4842-1242-4_16_Fig11_HTML.jpg)\n\
    \n**图 16-11.** 创建 XIB 文件\n\n将文件命名为`HandCell`，并点击 **Create**。\n\n现在在 Interface\
    \ Builder 中打开新建的 XIB 文件，将一个 **Collection View Cell** 对象拖入主面板，如图 16-12 所示。\n\n\
    ![A978-1-4842-1242-4_16_Fig12_HTML.jpg](img/A978-1-4842-1242-4_16_Fig12_HTML.jpg)\n\
    \n**图 16-12.** 添加 Collection View Cell 对象\n\n调整尺寸，使单元格宽 100 点、高 100 点，并将其复用标识符设置为`HourCellView`。\n\
    \n现在将一个 **Label** 拖入单元格，使用 AutoLayout 约束使其居中，并根据您的偏好更新字体。最终结果如图 16-13 所示。\n\n\
    ![A978-1-4842-1242-4_16_Fig13_HTML.jpg](img/A978-1-4842-1242-4_16_Fig13_HTML.jpg)\n\
    \n**图 16-13.** 更新后的标签\n\n最后，在属性检查器中将标签的`tag`属性设置为`1000`，以便在视图控制器中访问该标签，如图 16-14\
    \ 所示。\n\n![A978-1-4842-1242-4_16_Fig14_HTML.jpg](img/A978-1-4842-1242-4_16_Fig14_HTML.jpg)\n\
    \n**图 16-14.** 设置标签的 tag 属性\n\nXIB 文件创建完成后，返回`ClockViewController`并注册此文件以供使用。在`configureCollectionView()`函数中添加以下代码行：\n\
    \n```\ncollectionView.registerNib(UINib(nibName: \"HourCell\", bundle: nil),\n\
    \    forCellWithReuseIdentifier: HourCellView)\nclockLayout.hourLabelCellSize\
    \ = CGSizeMake(100.0, 100.0)\n```\n"
- fmt: "## Creating a UICollectionView Subclass for the Clock Hands\n\nInstead of\
    \ creating the hands in nib files, you’ll take a different approach and create\
    \ a custom subclass of `UICollectionViewCell`. Both techniques are equivalent,\
    \ but using a custom subclass gives you the opportunity to configure various aspects\
    \ of the cell in code.\n\nThe first step is to create a new `UICollectionViewCell`\
    \ subclass as a new file. Select File ➤ New ➤ File. Call the class `HandCell`,\
    \ and change the `Subclass Of` field to choose `UICollectionViewCell`. Selecting\
    \ OK will create a new class files.\n\nNow you need to register the class with\
    \ the collection view as you did with the nib file. This needs to be done three\
    \ times, one each for the three types of hands. First, add the reuse identifier\
    \ declarations at the top of the class:\n\n```\nlet HourCellView = \"HourCellView\"\
    \nlet HourHandCell = \"HourHandCell\"\nlet MinsHandCell = \"MinsHandCell\"\nlet\
    \ SecsHandCell = \"SecsHandCell\"\n```\n\nNext, add the following code to the\
    \ `configureCollectionView` function:\n\n```\ncollectionView.registerClass(HandCell.self,\
    \ forCellWithReuseIdentifier: HourHandCell)\ncollectionView.registerClass(HandCell.self,\
    \ forCellWithReuseIdentifier: MinsHandCell)\ncollectionView.registerClass(HandCell.self,\
    \ forCellWithReuseIdentifier: SecsHandCell)\n```\n\nYou also need to set the sizes\
    \ of the hand cells:\n\n```\nclockLayout.hourHandSize = CGSizeMake(10.0, 140.0)\n\
    clockLayout.minuteHandSize = CGSizeMake(10.0, 200.0)\nclockLayout.secondHandSize\
    \ = CGSizeMake(6.0, 200.0)\n```\n\nThe rest of the process will be dealt with\
    \ as you update the collection view’s view controller in the next step.\n\n##\
    \ Using the Custom Layout\n\nWith the layout in place, you now need to update\
    \ the `cellForItemAtIndexPath:` function in the collection view’s `datasource`\
    \ object, as shown in Listing 16-11.\n\n**Listing 16-11.** The updates `collectionView:cellForItemAtIndexPath:`\
    \ Function\n\n```\nfunc collectionView(collectionView: UICollectionView, cellForItemAtIndexPath\
    \ ➤\nindexPath: NSIndexPath) -> UICollectionViewCell {\n    var cell: UICollectionViewCell!\n\
    \n    // Handle time labels\n    switch (indexPath.section) {\n    case 0:\n \
    \       // Handle hands\n        switch (indexPath.row) {\n        case 0:\n \
    \           // Handle hour hands\n            cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \                (HourHandCell, forIndexPath: indexPath) as! HandCell\n      \
    \      let hourHandView = UIView(frame: CGRectMake(0, 0, ➤\n                clockLayout.hourHandSize.width,\
    \ clockLayout.hourHandSize.height))\n            hourHandView.backgroundColor\
    \ = UIColor.blackColor()\n            cell.contentView.addSubview(hourHandView)\n\
    \            cell.layer.anchorPoint = CGPointMake(0.5, 0.9)\n\n        case 1:\n\
    \            // handle minute hands\n            cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \                (MinsHandCell, forIndexPath: indexPath) as! HandCell\n      \
    \      let minuteHandView = UIView(frame: CGRectMake(0, 0, ➤\n               \
    \ clockLayout.minuteHandSize.width, clockLayout.minuteHandSize.height))\n    \
    \        minuteHandView.backgroundColor = UIColor.blackColor()\n            cell.contentView.addSubview(minuteHandView)\n\
    \            cell.layer.anchorPoint = CGPointMake(0.5, 0.9)\n\n        default:\n\
    \            // handle second hands\n            cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \                (SecsHandCell, forIndexPath: indexPath)\n            let secondHandView\
    \ = UIView(frame: CGRectMake(0, 0, ➤\n                clockLayout.secondHandSize.width,\
    \ clockLayout.secondHandSize.height))\n            secondHandView.backgroundColor\
    \ = UIColor.redColor()\n            cell.contentView.addSubview(secondHandView)\n\
    \            cell.layer.anchorPoint = CGPointMake(0.5, 0.9)\n        }\n\n   \
    \ default:\n        // Handle hours labels\n        cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \            (HourCellView, forIndexPath: indexPath) as UICollectionViewCell\n\
    \        let hourLabelsArray = dataArray[1]\n        let hoursText = hourLabelsArray[indexPath.row]\n\
    \        if let cellLabel: UILabel = cell.viewWithTag(1000) as? UILabel {\n  \
    \          cellLabel.text = hoursText\n        }\n    }\n\n    return cell\n}\n\
    ```\n\nThere are two parts to this: handling the hour labels, and dealing with\
    \ the hands.\n\nThe first thing you do here is create an optional to hold the\
    \ cell that will be returned:\n\n```\nvar cell: UICollectionViewCell!\n```\n\n\
    Now if you think back to how the data model is configured, elements in the first\
    \ section of the array contain placeholders for the hands, and the second section\
    \ holds the numeral values.\n\nBy checking the `indexPath` parameter that’s passed\
    \ into the function, you can take the appropriate action with a `switch` statement:\n\
    \n```\nswitch (indexPath.section) {\ncase 0: // handle hands\n    ...\ndefault:\
    \ // handle hour labels\n    ...\n}\n```\n\nAn `indexPath section` of 1 means\
    \ you need to dequeue and configure an hour cell:\n\n```\ndefault: // Handle hours\
    \ labels\ncell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n    (HourCellView,\
    \ forIndexPath: indexPath) as UICollectionViewCell\nlet hourLabelsArray = dataArray[1]\n\
    let hoursText = hourLabelsArray[indexPath.row]\nif let cellLabel: UILabel = cell.viewWithTag(1000)\
    \ as? UILabel {\n    cellLabel.text = hoursText\n}\n```\n\nOnce the cell’s dequeued,\
    \ you can access the label through its `tag` property and set the text so that\
    \ it shows the hour numeral.\n\nAn `indexPath` section of 0 means you’re dealing\
    \ with hand cells. Again, the process is similar:\n\n```\ncase 0: // Handle hands\n\
    switch (indexPath.row) {\ncase 0: // Handle hour hands\n    cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \        (HourHandCell, forIndexPath: indexPath) as! HandCell\n    let hourHandView\
    \ = UIView(frame: CGRectMake(0, 0, ➤\n        clockLayout.hourHandSize.width,\
    \ clockLayout.hourHandSize.height))\n    hourHandView.backgroundColor = UIColor.blackColor()\n\
    \    cell.contentView.addSubview(hourHandView)\n    cell.layer.anchorPoint = CGPointMake(0.5,\
    \ 0.9)\n\ncase 1: // handle minute hands\n    cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \        (MinsHandCell, forIndexPath: indexPath) as! HandCell\n    let minuteHandView\
    \ = UIView(frame: CGRectMake(0, 0, ➤\n        clockLayout.minuteHandSize.width,\
    \ clockLayout.minuteHandSize.height))\n    minuteHandView.backgroundColor = UIColor.blackColor()\n\
    \    cell.contentView.addSubview(minuteHandView)\n    cell.layer.anchorPoint =\
    \ CGPointMake(0.5, 0.9)\n\ndefault: // handle second hands\n    cell = collectionView.dequeueReusableCellWithReuseIdentifier➤\n\
    \        (SecsHandCell, forIndexPath: indexPath)\n    let secondHandView = UIView(frame:\
    \ CGRectMake(0, 0, ➤\n        clockLayout.secondHandSize.width, clockLayout.secondHandSize.height))\n\
    \    secondHandView.backgroundColor = UIColor.redColor()\n    cell.contentView.addSubview(secondHandView)\n\
    \    cell.layer.anchorPoint = CGPointMake(0.5, 0.9)\n}\n```\n\nThere are three\
    \ possible scenarios here. You’re dealing with an hour, a minute, or a second\
    \ hand, corresponding to rows 0, 1, or 2 in the index path.\n\nEach process is\
    \ virtually the same:\n\n- First, you dequeue a cell with the appropriate `reuseIdentifier`.\n\
    - Next, you create a `UIView` for the hand, set the `size`, and color the `background`\
    \ black.\n- Then you add the `UIView` into the cell.\n- Finally, you adjust the\
    \ cell’s `anchorPoint` property.\n\nThe last line of each section moves the anchor\
    \ point for the rotation that the layout applies. By default, a `CAlayer`’s rotation\
    \ point is at its center (or (0.5, 0.5) in coordinate terms), shown in Figure\
    \ 16-15.\n\n![A978-1-4842-1242-4_16_Fig15_HTML.jpg](A978-1-4842-1242-4_16_Fig15_HTML.jpg)\n\
    \n**Figure 16-15.** The default rotation point\n\nWhat you actually want to do\
    \ is rotate around the bottom of the hand image, as shown in Figure 16-16.\n\n\
    ![A978-1-4842-1242-4_16_Fig16_HTML.jpg](A978-1-4842-1242-4_16_Fig16_HTML.jpg)\n\
    \n**Figure 16-16.** Updated rotation\n\nSince the rotation point is slightly “inside”\
    \ the image, the offset is adjusted accordingly to give the impression that the\
    \ hands are rotating around fixed points.\n\nWith the cells configured, finally\
    \ the function returns it to the collection view:\n\n```\nreturn cell\n```"
