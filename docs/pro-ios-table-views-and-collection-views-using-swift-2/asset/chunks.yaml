  trans: "\n#### 提供单个项目属性\n\n`layoutAttributesForElementsInRect` 的对应函数是 `layoutAttributesForItemAtIndexPath`。它接收一个\
    \ `NSIndexPath` 作为参数。调用代码预期会收到一个可选的 `UICollectionViewLayoutAttributes` 实例。\n\n\
    实现此函数有两种方式：一是在被请求时动态计算属性；二是在准备布局时预先计算并存储，然后在响应 `layoutAttributesForItemAtIndexPath`\
    \ 时返回预先计算好的值。\n\n选择哪种方法取决于具体场景。如果你的布局非常动态且计算开销不大，则可能没有必要过早优化。反之，如果计算涉及繁重的计算，或者这些值根本不会频繁变化，则预先计算可能更为合适。\n\
    \n请记住，`collectionView` 在绘制项目时会调用此函数，因此响应缓慢可能会导致滚动卡顿。如果你遇到滚动性能问题，你可能需要仔细检查这个函数。\n\
    \n你当前使用的是预先计算所有内容的方法，因此你的函数很简单，如代码清单 17-12 所示。\n\n**代码清单 17-12. `layoutAttributesForItemAtIndexPath`**\n\
    \n```\noverride func layoutAttributesForItemAtIndexPath(indexPath: NSIndexPath)\
    \ -> ➤\n  UICollectionViewLayoutAttributes? {\n    // 返回特定项目的布局属性\n    return\
    \ layoutAttributes[indexPath.row]\n}\n```\n\n#### 提供初始布局属性\n\n到目前为止，你已经实现了必需的函数来向集合视图返回\
    \ `UILayoutAttributes`。如果你不提供初始属性，集合视图将使用前两个函数提供的信息来放置项目。如果是新添加的项目，它会立即出现在正确的位置。\n\
    \n如果你希望初始属性有所不同——在你的场景中，希望项目出现在集合视图中心并动画过渡到最终位置——那么你需要通过实现 `initialLayoutAttributesForAppearingItemAtIndexPath`\
    \ 函数来提供一组初始属性。\n\n如果你不实现此函数，集合视图将不会获取任何初始属性，而会转而调用 `layoutAttributesForItemAtIndexPath`\
    \ 函数来请求属性。\n\n任何内置或自定义的 `UICollectionViewLayoutAttribute` 都可以包含在初始属性集中。在你的场景中，你将要提供\
    \ **center** 和 **alpha** 属性，以便项目先出现在中心，然后在其向圆圈动画过渡时淡入。\n\n在集合视图请求初始属性之前，它会调用 `prepareForCollectionViewUpdates`\
    \ 函数，并传入一个 `UICollectionViewLayoutUpdateItems` 数组。任何受更新影响的项目都会对应一个 `UICollectionViewLayoutUpdateItems`，它包含三个属性：\n\
    \n- `indexPathBeforeUpdate`：一个 `NSIndexPath`，包含项目在更新开始时的索引路径。如果项目是插入操作，此项为空。如果项目被移除，则包含其当前的索引路径。\n\
    - `indexPathAfterUpdate`：一个 `NSIndexPath`，包含项目在更新结束时的索引路径。如果项目是移除操作，此项为空。如果项目被添加，则包含该项目最终的目标索引路径。\n\
    - `updateAction`：包含一个 `UICollectionUpdateAction` 常量，指示对项目执行的操作：`Insert`、`Delete`、`Reload`、`Move`\
    \ 或 `None`。\n\n你需要检查正在插入或移除的项目发生了什么，因此添加一个属性来存储这些详细信息：\n\n`var indexPathsBeingUpdated\
    \ = [UICollectionViewUpdateItem]()`\n\n现在添加如代码清单 17-13 所示的函数。\n\n**代码清单 17-13. `prepareForCollectionViewUpdates`\
    \ 函数**\n\n```\noverride func prepareForCollectionViewUpdates(updateItems: ➤  [UICollectionViewUpdateItem])\
    \ {\n    indexPathsBeingUpdated = updateItems\n}\n```\n\n这行代码只是将数组复制并存储在 `indexPathsBeingUpdated`\
    \ 属性中。\n\n现在，你可以准备实现 `initialLayoutAttributesForAppearingItemAtIndexPath`，如代码清单\
    \ 17-14 所示。\n\n**代码清单 17-14. `initialLayoutAttributesForAppearingItemAtIndexPath`\
    \ 函数**\n\n```\noverride func initialLayoutAttributesForAppearingItemAtIndexPath(itemIndexPath:\
    \ ➤\nNSIndexPath) -> UICollectionViewLayoutAttributes? {\n    // 检查这个 indexPath\
    \ 是否在更新列表中\n    // 如果不在，我们可以直接返回\n    let indexFound = indexPathsBeingUpdated.indexOf\
    \ { (element) -> Bool in\n        element.indexPathAfterUpdate == itemIndexPath\n\
    \    }\n\n    if indexFound == nil {\n        return layoutAttributes[itemIndexPath.row]\n\
    \    }\n\n    let attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath:\
    \ ➤\n        itemIndexPath)\n\n    // 测试是否正在处理移除第二个项目的情况\n    // 此时将只有 1 个项目，当前处理的\
    \ indexPath.row 将为 0。\n    //\n    // 在这种情况下，第一个项目需要从其原始位置开始，即在顶部\n    if (collectionView!.numberOfItemsInSection(0)\
    \ == 1) && (itemIndexPath.row == 0) {\n        attributes.center = calculateCenterForFirstItem()\n\
    \        attributes.size = itemSize\n        return attributes\n    }\n\n    //\
    \ 这是一个全新的项目，所以我们需要设置其 alpha、大小、z-index 和中心点\n    attributes.center = CGPointMake(collectionView!.bounds.size.width\
    \ / 2, ➤\n        collectionView!.bounds.size.height / 2)\n    attributes.alpha\
    \ = 0.0\n    attributes.size = itemSize\n    attributes.zIndex = 0\n    return\
    \ attributes;\n}\n```\n\n首先，检查传入的 `indexPath` 是否包含在 `indexPathsBeingUpdated` 数组中：\n\
    \n```\nlet indexFound = indexPathsBeingUpdated.indexOf { (element) -> Bool in\n\
    \    element.indexPathAfterUpdate == itemIndexPath\n}\n```\n\n如果不在，说明该项目已经存在于集合视图中。它的初始属性将与计算出的属性相同，因此你可以直接返回它们：\n\
    \n```\nif indexFound == nil {\n    return layoutAttributes[itemIndexPath.row]\n\
    }\n```\n\n假设该项目是需要处理的项目，你需要一个 `UICollectionViewLayoutAttributes` 实例来进行配置：\n\n\
    ```\nlet attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath: itemIndexPath)\n\
    ```\n\n你需要将移除第二个项目的情况作为一个特例来处理：\n\n```\nif (collectionView!.numberOfItemsInSection(0)\
    \ == 1) && (itemIndexPath.row == 0) {\n    attributes.center = calculateCenterForFirstItem()\n\
    \    attributes.size = itemSize\n    return attributes\n}\n```\n\n否则，你正在处理一个新项目，因此需要相应地设置\
    \ `attributes`：\n\n- `center` 设置为集合视图的中心\n- `alpha` 值设为 `0`，使项目呈现淡入效果\n- 正确的 `size`\n\
    - `zIndex` 设为 `0`，使最新的项目始终位于“堆叠”的最顶层\n\n```\nattributes.center = CGPointMake(collectionView!.bounds.size.width\
    \ / 2, ➤\n    collectionView!.bounds.size.height / 2)\nattributes.alpha = 0.0\n\
    attributes.size = itemSize\nattributes.zIndex = 0\n```\n\n设置完属性后，就可以返回它们了：\n\n\
    ```\nreturn attributes;\n```\n"
- fmt: "### Supplying Final Layout Attributes\n\nFinal layout attributes allow you\
    \ to control how items are removed from the collection view. In this situation,\
    \ you want the item to move to the center of the collection view, fading as it\
    \ goes.\n\nThese attributes are returned to the collection view by the `finalLayoutAttributesForDisppearingItemAtIndexPath`\
    \ function. This is very similar to `initialLayoutAttributesForAppearingItemAtIndexPath`,\
    \ but it returns the attributes for the end of the removal process.\n\nAdd the\
    \ function shown in Listing 17-15.\n\n**Listing 17-15.** The `finalLayoutAttributesForDisppearingItemAtIndexPath`\
    \ Function\n\n```\noverride func finalLayoutAttributesForDisappearingItemAtIndexPath(itemIndexPath:\
    \ ➤\n\n  NSIndexPath) -> UICollectionViewLayoutAttributes? {\n\n    let attributes\
    \ = UICollectionViewLayoutAttributes(forCellWithIndexPath: ➤\n\n    itemIndexPath)\n\
    \n    // Check to see if this indexPath is in the BeingUpdated list\n\n    //\
    \ if it isn’t, we can just bail out\n\n    let indexFound = indexPathsBeingUpdated.indexOf\
    \ { (element) -> Bool in\n\n        element.indexPathBeforeUpdate == itemIndexPath\n\
    \n    }\n\n    if indexFound == nil {\n\n        return super.finalLayoutAttributesForDisappearingItemAtIndexPath(itemIndexPath)\n\
    \n    }\n\n    // Test to see if we’re handling the removal of the first item\
    \ as it moves to make\n\n    // way for the second one.  In this case, there will\
    \ be 2 items, and the handling\n\n    // indexPath.row of the item we’re dealing\
    \ with will be 0\n\n    //\n\n    // In this scenario, the item needs to end up\
    \ back at the top center as the\n\n    // only one\n\n    if ( (collectionView?.numberOfItemsInSection(0)\
    \ == 2) && ➤\n\n   (itemIndexPath.row == 0)  ) {\n\n        attributes.center\
    \ = calculateCenterForFirstItem()\n\n        attributes.size = itemSize\n\n  \
    \      attributes.zIndex = 0\n\n        return attributes;\n\n    }\n\n    //\
    \ This is a disappearing item, so we need to set its alpha,\n\n    // size, z-index\
    \ and center so that it zooms into towards the centre\n\n    attributes.center\
    \ = calculateCenterForFirstItem()\n\n    attributes.alpha = 0\n\n    attributes.size\
    \ = itemSize\n\n    attributes.zIndex = 0\n\n    return attributes;\n\n}\n```\n\
    \nThe difference here is that the center value is the middle of the collection\
    \ view and the `alpha` is `0`.\n\nThat completes the implementation of your custom\
    \ `UICollectionViewLayout`. Now it’s time to finish wiring up the collection view.\n\
    \n### Wiring Up the Collection View\n\nCurrently, the collection view is using\
    \ a standard flow layout to arrange the items, as shown in Figure 17-7.\n\n![A978-1-4842-1242-4_17_Fig7_HTML.jpg](A978-1-4842-1242-4_17_Fig7_HTML.jpg)\n\
    \n**Figure 17-7.** The flow layout\n\nYou need to update the `ViewController`\
    \ to create and apply the custom layout to the collection view.\n\nUpdate the\
    \ `setupCollectionView()` function as shown in Listing 17-16.\n\n**Listing 17-16.**\
    \ The `setupCollectionView()` Function\n\n```\nfunc setupCollectionView() {\n\n\
    \    let layout = BounceLayout()\n\n    layout.itemSize = CGSizeMake(75,75)\n\n\
    \    layout.sidePadding = 10\n\n    collectionView.setCollectionViewLayout(layout,\
    \ animated: false)\n\n    collectionView.collectionViewLayout = layout\n\n}\n\
    ```\n\nThis isn’t especially complicated. You create an instance of the `BounceLayout`\
    \ class and set the item size and padding properties. Then it is assigned to the\
    \ collection view as the layout.\n\nIf you run the project now, you’ll see that\
    \ you’ve got a circular layout, as shown in Figure 17-8.\n\n![A978-1-4842-1242-4_17_Fig8_HTML.jpg](A978-1-4842-1242-4_17_Fig8_HTML.jpg)\n\
    \n**Figure 17-8.** The newly-applied `BounceLayout`\n\n#### Adding New Items\n\
    \nThat’s good, but not quite what you were after. First, let’s reduce the number\
    \ of items that you start with to 1:\n\n```\nfunc setupData() {\n\n    cvData.append(\"\
    0\")\n\n}\n```\n\nNow let’s add functions to connect to the buttons. First, add\
    \ the `didTapAdd` function, as shown in Listing 17-17.\n\n**Listing 17-17.** The\
    \ `didTapAdd` Function\n\n```\n@IBAction func didTapAdd(sender: AnyObject) {\n\
    \n    // Get index of last item\n\n    let index = cvData.count\n\n    cvData.append(\"\
    \\(index)\")\n\n    // Create an NSIndexPath object for the new item\n\n    let\
    \ newItemIndexPath = NSIndexPath(forItem: index, inSection: 0)\n\n    // Now update\
    \ the collection view\n\n    collectionView.insertItemsAtIndexPaths([newItemIndexPath])\n\
    \n}\n```\n\nThis isn’t too complex. You get the number of items that are currently\
    \ in the data array:\n\n```\nlet index = cvData.count\n```\n\nAnd use this to\
    \ add a new entry:\n\n```\ncvData.append(\"\\(index)\")\n```\n\nNow you need an\
    \ `NSIndexPath` object for the new item:\n\n```\nlet newItemIndexPath = NSIndexPath(forItem:\
    \ index, inSection: 0)\n```\n\nAnd you can tell the collection view to insert\
    \ the new item:\n\n```\ncollectionView.insertItemsAtIndexPaths([newItemIndexPath])\n\
    ```\n\n#### Removing Items\n\nThe `didTapRemoveItem` function is shown in Listing\
    \ 17-17, and it’s very similar to the `didTapAdd` function.\n\n**Listing 17-18.**\
    \ The `didTapRemoveItem` Function\n\n```\n@IBAction func didTapRemoveItem(sender:\
    \ AnyObject) {\n\n    let itemIndex = cvData.count - 1\n\n    removeItemAtIndexPath(NSIndexPath(forItem:\
    \ itemIndex, inSection: 0))\n\n}\n```\n\nIt uses a helper function to remove the\
    \ item from the collection view, shown in Listing 17-19.\n\n**Listing 17-19.**\
    \ The `removeItemAtIndexPath` Function\n\n```\nfunc removeItemAtIndexPath(indexPath:\
    \ NSIndexPath) {\n\n    // Don’t attempt to remove the last item!\n\n    if cvData.count\
    \ == 0 {\n\n        return\n\n    }\n\n    // Remove it from the data array\n\n\
    \    cvData.removeAtIndex(indexPath.row)\n\n    // Now update the collection view\n\
    \n    collectionView.deleteItemsAtIndexPaths([indexPath])\n\n}\n```\n\nFirstly,\
    \ this prevents you from removing the last item. Assuming there is more than one\
    \ item left, you remove the corresponding entry from the `dataArray`, and then\
    \ pass the `indexPath` to be removed to the collection view’s `deleteItemsAtIndexPaths`\
    \ function.\n\nThe final touch is to implement the `UICollectionViewDelegate`’s\
    \ `didSelectItemAtIndexPath` function so that you can tap items to delete them.\
    \ Add this in an extension to the `viewController`, as shown in Listing 17-20.\n\
    \n**Listing 17-20.** The `didSelectItemAtIndexPath` Function\n\n```\nextension\
    \ ViewController: UICollectionViewDelegate {\n\n    func collectionView(collectionView:\
    \ UICollectionView, didSelectItemAtIndexPath ➤\n\n    indexPath: NSIndexPath)\
    \ {\n\n        switch indexPath.row {\n\n        case 0:\n\n            didTapAdd(indexPath)\n\
    \n        default:\n\n            removeItemAtIndexPath(indexPath)\n\n       \
    \ }\n\n    }\n\n}\n```\n\nSelecting the item will trigger the `removeItemAtIndexPath:`\
    \ function, and the item will fly out of the collection view.\n\nConnect the `UIButtons`\
    \ in the Storyboard to their respective `IBAction` functions, run the project\
    \ again, and you’ll be able to tap the `Add` button to insert new items and tap\
    \ either the `Remove` button or on an item to remove it."
