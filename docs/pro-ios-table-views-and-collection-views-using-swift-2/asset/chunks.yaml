    \n**Figure 6-24.** `UITableViewCellStyleSubtitle` with an image\n\n## Configuring\
    \ the Default Cell's Content\n\nA `UITableViewCell` of one of the four default\
    \ types has a whole range of properties that you can access to configure the content.\
    \ This section presents four key properties—`textLabel`, `detailTextLabel`, `imageView`,\
    \ and `contentView`—and then shows an example of using them.\n\n### `textLabel`\n\
    \nThe `textLabel` property is a `UILabel`, with text that can be changed. It is\
