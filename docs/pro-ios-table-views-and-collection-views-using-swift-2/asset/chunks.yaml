  trans: "\n# 创建与配置流式布局\n\n你可以通过代码或 Interface Builder 创建 `UICollectionViewFlowLayout`。无论采用哪种方式，都需遵循以下六个步骤。\n\
    \n-   创建 `UICollectionViewFlowLayout` 实例。\n-   将流式布局分配给将要使用它的集合视图。\n-   如果所有单元格尺寸相同，需提供单元格的高度和宽度值。若布局包含不同尺寸，则需实现集合视图代理的\
    \ `collectionView(_:layout:sizeForItemAtIndexPath:)` 方法。\n-   如有必要，设置项目和行间距的值（若间距会变化，则需实现代理方法）。\n\
    -   可选地，指定分区页眉和页脚的尺寸（同样，若尺寸会变化，需实现代理方法）。\n-   设置布局的滚动方向（相对于集合视图本身，垂直或水平滚动）。\n\n\
    ## 实例化流式布局\n\n实例化流式布局有两种方式：\n\n-   通过代码创建并配置流式布局。\n-   在 Interface Builder 中配置流式布局。\n\
    \n### 通过代码创建与配置流式布局\n\n通过代码创建流式布局包含两个基本步骤：\n\n-   实例化流式布局对象\n-   将其设置为集合视图的布局\n\
    \n流式布局创建并关联到集合视图后，你有两个选择：\n\n-   若集合视图生命周期内所有可配置值均为静态，则直接设置流式布局的属性，或\n-   实现相关的\
    \ `UICollectionViewDelegateFlowLayout` 方法来动态配置流式布局属性。\n\n#### 创建流式布局\n\n创建流式布局对象并不困难。若属性值为静态，则无需为其创建属性：\n\
    \n```\nlet flowLayout = UICollectionViewFlowLayout()\n```\n\n若属性值由 `UICollectionViewDelegateFlowLayout`\
    \ 方法设置，则需在实例化前声明一个属性，以便代理方法能够引用该对象：\n\n```\nlet flowLayout = UICollectionViewFlowLayout()\n\
    ```\n\n#### 设置集合视图的布局\n\n实例化流式布局后，下一步是将其设置为集合视图的布局。假设你有一个名为 `myCollectionView`\
    \ 的集合视图和一个名为 `flowLayout` 的流式布局，可以这样操作：\n\n```\nmyCollectionView.collectionViewLayout\
    \ = flowLayout\n```\n\n虽然运行时可以更改集合视图的布局，但这会导致项目重新加载。\n\n#### 配置静态流式布局值\n\n如果集合视图中的所有项目大小相同，可以全局设置流式布局属性。例如：\n\
    \n```\nflowLayout.scrollDirection = .Vertical\nflowLayout.itemSize = CGSizeMake(200,\
    \ 100)\nflowLayout.minimumInteritemSpacing = 10.0\nflowLayout.minimumLineSpacing\
    \ = 10.0\nflowLayout.sectionInset = UIEdgeInsetsMake(25.0, 25.0, 25.0, 25.0)\n\
    ```\n\n以下部分将详细介绍你可以控制的各种流式布局属性。\n\n#### 动态配置流式布局值\n\n如果项目、页眉或页脚等元素需要根据数据模型动态更新，则不能直接设置与动态项目属性相关的值。相反，你需要创建一个对象作为流式布局的代理，并实现相关的\
    \ `UICollectionViewDelegateFlowLayout` 方法。这将在下一节详细讨论。\n\n### 在 Interface Builder\
    \ 中配置流式布局\n\n当你将集合视图或集合视图控制器拖入 Storyboard 或 XIB 时，它会附带一个 `UICollectionViewFlowLayout`，如图\
    \ 15-5 所示。\n\n![A978-1-4842-1242-4_15_Fig5_HTML.jpg](img/A978-1-4842-1242-4_15_Fig5_HTML.jpg)\n\
    \n图 15-5. 附加到集合视图的流式布局\n\n选中该布局后，可以静态地为集合视图中的所有项目设置以下基本属性：\n\n-   滚动方向，可在属性检查器中找到，如图\
    \ 15-6 所示。\n\n  ![A978-1-4842-1242-4_15_Fig6_HTML.jpg](img/A978-1-4842-1242-4_15_Fig6_HTML.jpg)\n\
    \n  图 15-6. 设置滚动方向\n\n-   单元格大小与间距，以及页眉和页脚尺寸。这些可在尺寸检查器中找到，如图 15-7 所示。\n\n  ![A978-1-4842-1242-4_15_Fig7_HTML.jpg](img/A978-1-4842-1242-4_15_Fig7_HTML.jpg)\n\
    \n  图 15-7. 设置尺寸\n\n如果需要动态设置这些值，则需将流式布局连接到控制器中的输出口，并通过代码管理这些值。\n\n为此，首先为流式布局创建一个输出口：\n\
    \n```\n@IBOutlet var flowLayout: UICollectionViewFlowLayout!\n```\n\n然后在 Interface\
    \ Builder 中将该输出口与流式布局对象连接。\n\n连接后，便可在控制器中设置数值，例如：\n\n```\nflowLayout.itemSize\
    \ = CGSizeMake(100, 100)\nflowLayout.scrollDirection = .Vertical\n```\n\n# 自定义流式布局\n\
    \n尽管 `UICollectionViewFlowLayout` 承担了确定换行位置等繁重工作，但在基于行的布局约束内，它仍然允许高度自定义。\n\n可定制的\
    \ `UICollectionViewFlowLayout` 属性如图 15-8 所示。\n\n![A978-1-4842-1242-4_15_Fig8_HTML.jpg](img/A978-1-4842-1242-4_15_Fig8_HTML.jpg)\n\
    \n图 15-8. UICollectionViewFlowLayout 属性\n\n这些属性可通过直接设置 `UICollectionViewFlowLayout`\
    \ 对象的属性，或实现相应的 `UICollectionViewDelegateFlowLayout` 方法来自定义。\n\n## 通过属性自定义\n\n\
    以下属性可通过直接设置 `UICollectionViewFlowLayout` 对象的属性来自定义，例如：\n\n```\ncollectionView.scrollingDirection\
    \ = .Vertical\n```\n\n### 滚动方向\n\n滚动方向决定了集合视图是垂直滚动还是水平滚动。项目行垂直排列于滚动方向，如图 15-9\
    \ 所示。\n\n| 属性 | 值 | 效果 |\n| --- | --- | --- |\n| `scrollDirection` | `UICollectionViewScrollDirection.Vertical`\
    \ | 强制集合视图垂直滚动，并水平排列项目行 |\n| | `UICollectionViewScrollDirection.Horizontal` |\
    \ 强制集合视图水平滚动，并垂直排列项目行 |\n\n![A978-1-4842-1242-4_15_Fig9_HTML.jpg](img/A978-1-4842-1242-4_15_Fig9_HTML.jpg)\n\
    \n图 15-9. 滚动方向\n\n### 项目尺寸\n\n项目尺寸决定了每个集合视图单元格的宽度和高度，无论单元格内容的固有尺寸如何。若未设置，默认为 `(50.0,\
    \ 50.0)`。\n\n如果实现了 `UICollectionViewDelegateFlowLayout collectionView:layout:sizeForItemAtIndexPath:`\
    \ 方法，该方法将覆盖直接在流式布局对象上设置的任何项目尺寸值。\n\n| 属性 | 值 | 效果 |\n| --- | --- | --- |\n| `itemSize`\
    \ | `CGSize` | 设置每个集合视图项目的尺寸和宽度 |\n"
- fmt: '#### `EstimatedItemSize`


    如果你实现了逐项尺寸（per-item sizing），这会给`UICollectionViewDataSource`对象带来额外的处理负载。它现在负责按需计算每个项目的尺寸。


    尽管对于iOS设备中的快速处理器来说，这听起来不算什么大事，但请记住，为了获得良好的滚动性能，你需要尽可能接近以每秒60帧的速度渲染视图。


    这意味着，绘制集合视图可见元素所需的所有计算必须在约15毫秒内完成。这包括从模型检索数据、设置单元格控件，到计算屏幕上所有元素的尺寸和位置等一切操作。


    更棘手的是，这一计算过程还包括算出集合视图内容区域的总高度，这意味着需要计算整个集合视图中每个单元格的尺寸，而不仅仅是可见区域。因此，任何能帮助集合视图加速这一过程的举措都将提升性能。


    一种方法是提供一个预估的项目尺寸（`estimatedItemSize`），即关于项目可能尺寸的提示。如果设置了预估项目尺寸，那么集合视图将假定所有当前不可见单元格都使用此尺寸，而不会费心去单独计算它们的尺寸。这对集合视图的性能有显著影响。


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `estimatedItemSize` | `CGSize` | 设置预估的项目尺寸，该尺寸将用于涉及当前不可见单元格的计算中 |


    #### `ItemSpacing`


    在布局集合视图的项目时，流布局（flow layout）会使用集合视图边界的宽度和集合视图项目的宽度来计算每个项目之间的间距。


    `minimumInteritemSpacing`属性设定了项目之间间距的下限。如果意味着每个项目之间的间距会低于此值，集合视图不会在单行上容纳额外的项目。如果未定义，此值默认为10.0点（见图[15-10](#A978-1-4842-1242-4_15_Chapter.html#Fig10)）。


    ![A978-1-4842-1242-4_15_Fig10_HTML.jpg](A978-1-4842-1242-4_15_Fig10_HTML.jpg)


    图15-10. 最小项目间间距


    此间距垂直于集合视图的滚动方向应用。换句话说，如果集合视图垂直滚动，最小项目间间距属性控制项目之间的水平空间；反之，对于水平滚动的集合视图，它则控制垂直空间。


    如果实现了`UICollectionViewDelegateFlowLayout collectionView:layout:minimumInteritemSpacingForSectionAtIndex:`函数，它将覆盖任何直接在流布局对象上设置的项目间间距值。


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `minimumInteritemSpacing` | `CGFloat` | 设置节中每个项目之间允许的最小间距。 |


    #### `LineSpacing`


    流布局使用其`lineSpacing`属性来控制上一行项目底部与下一行项目顶部之间的最小空间量。


    实际值将取决于每行最高项目的高度，但保证不会低于你为此属性设置的值（见图[15-11](#A978-1-4842-1242-4_15_Chapter.html#Fig11)）。


    ![A978-1-4842-1242-4_15_Fig11_HTML.jpg](A978-1-4842-1242-4_15_Fig11_HTML.jpg)


    图15-11. 最小行间距


    请注意，`UICollectionViewFlowLayout`的默认行为是将行中的所有项目垂直居中；如果你想改变此行为，需要创建`UICollectionViewFlowLayout`的子类并重写它。


    如果集合视图的滚动方向是垂直的，此属性控制行之间的垂直间距。如果滚动方向是水平的，此属性控制水平间距。


    注意，这不会影响节中底部与第一行顶部之间的间距，也不会影响最后一行底部与页脚顶部之间的间距。这些值由`sectionInset`属性控制。


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `minimumLineSpacing` | `CGFloat` | 设置节中每行之间允许的最小间距。 |


    #### `SectionInsets`


    节插入（Section insets）控制集合视图框架与项目之间的水平空间量，如图[15-12](#A978-1-4842-1242-4_15_Chapter.html#Fig12)所示。


    ![A978-1-4842-1242-4_15_Fig12_HTML.jpg](A978-1-4842-1242-4_15_Fig12_HTML.jpg)


    图15-12. 节插入


    它还控制页眉和页脚视图（如果存在）与项目之间的间距，以及页眉视图底部与第一行顶部之间、最后一行底部与页脚视图顶部之间的间距。


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `sectionInset` | `UIEdgeInset` | 设置项目与集合视图框架之间，以及页眉/页脚与行之间的间距。 |


    #### `SupplementaryViewSizes`


    两个补充视图尺寸属性控制节中页眉和页脚视图的尺寸。设置这些值会固定所有节的页眉和页脚尺寸；如果页眉和页脚需要按节变化尺寸，你必须实现`collectionView:layout:referenceSizeForHeaderInSection:`函数。


    一个重要的注意事项是，集合视图只会应用与滚动方向相对应的属性，如图[15-13](#A978-1-4842-1242-4_15_Chapter.html#Fig13)所示。


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `headerReferenceSize` | `CGSize` | 设置页眉视图的尺寸；垂直于滚动方向的属性被忽略。 |

    | `footerReferenceSize` | `CGSize` | 设置页脚视图的尺寸；垂直于滚动方向的属性被忽略。 |


    ![A978-1-4842-1242-4_15_Fig13_HTML.jpg](A978-1-4842-1242-4_15_Fig13_HTML.jpg)


    图15-13. 根据滚动方向应用补充视图尺寸属性


    ### 使用`UICollectionViewDelegateFlowLayout`进行自定义


    直接设置`UICollectionViewFlowLayout`的属性会产生“全局”效果。例如，如果你将项目尺寸设置为宽100点、高200点，那么所有单元格都将以此尺寸显示。


    同样的过程也适用于每个节的插入、行间距、页眉和页脚。在流布局级别全局设置这些值，所有节将使用相同的值。


    如果你希望对这些值（按项目针对单元格，按节针对其他属性）进行变化，那么你可以为`UICollectionViewFlowLayout`提供一个委托对象来处理这些计算。`UICollectionViewDelegateFlowLayout`是定义了按需计算这些值的可选函数的协议。


    `UICollectionViewDelegateFlowLayout`声明了六个可选函数，每个函数都包含`UICollectionView`和`UICollectionViewFlowLayout`参数。这意味着你可以实现一个单一的委托对象，使其能与多个集合视图和/或流布局一起工作。


    #### 控制项目尺寸


    项目尺寸由`collectionView(_:layout:sizeForItemAtIndexPath:)`函数控制。'
  raw: '#### Estimated Item Size


    If you implement per-item sizing, this imposes an additional processing load on
    the `UICollectionViewDataSource` object. It is now responsible for calculating
    the size of every item on demand.


    Although that doesn’t sound like such a big deal for the fast processors in iOS
    devices, bear in mind that for good scrolling performance, you need to get as
    close as possible to rendering the views at 60 frames per second.


    That means that all the calculations required to draw the visible elements of
    the collection view have to complete in around 15 milliseconds. This includes
    everything from retrieving the data from the model and setting up the cell controls,
    to calculating the size and positioning of all elements on the screen.


    To make matters harder, that calculation process also includes figuring out the
    total height of the collection view’s content area, which means calculating the
    size of every cell in the entire collection view, not just the visible area. It
    follows, then, that anything you can do to help the collection view with the process
    will speed things up.


    One way to do this is to provide an estimated item size, a hint about the likely
    size of the items. If an estimated item size is set, then the collection view
    will assume that this is the size of all cells that are not currently visible
    and not bother to calculate their sizes individually. This can have a dramatic
    effect on collection view performance.


    | Property | Value | Effect |

    | --- | --- | --- |

    | `estimatedItemSize` | `CGSize` | Sets an estimated item size, which will be
    used for calculations involving cells that are not currently visible |


    #### Item Spacing


    When laying out the collection view’s items, the flow layout uses the width of
    the collection view’s bounds and the width of the collection view items to calculate
    the spacing between each item.


    The`minimumInteritemSpacing` property sets the lower limit on the spacing between
    items. The collection view will not fit additional items onto a line if it would
    mean the spacing between each item falls below this value. Left undefined, this
    value defaults to 10.0 points (see Figure [15-10](#A978-1-4842-1242-4_15_Chapter.html#Fig10)).


    ![A978-1-4842-1242-4_15_Fig10_HTML.jpg](A978-1-4842-1242-4_15_Fig10_HTML.jpg)


    Figure 15-10.


    Minimum interitem spacing


    This spacing is applied perpendicularly to the collection view’s scroll direction.
    In other words, if the collection view scrolls vertically, the minimum interitem
    spacing attribute controls the horizontal space between items, and vice versa
    for a horizontally-scrolling collection view.


    If the `UICollectionViewDelegateFlowLayout collectionView:layout:minimumInteritemSpacingForSectionAtIndex:`
    function is implemented, this will override any interitem spacing value that is
    set directly on the flow layout object.


    | Property | Value | Effect |

    | --- | --- | --- |

    | `minimumInteritemSpacing` | `CGFloat` | Sets the minimum spacing allowed between
    each item in the section. |


    #### Line Spacing


    The flow layout uses its `lineSpacing` attribute to control the minimum amount
    of space between the bottom of the item in an upper line and the top of an item
    in the line below.


    The actual value will depend on the height of the tallest item on each line, but
    is guaranteed not to fall below the value you set for this attribute (see Figure
    [15-11](#A978-1-4842-1242-4_15_Chapter.html#Fig11)).


    ![A978-1-4842-1242-4_15_Fig11_HTML.jpg](A978-1-4842-1242-4_15_Fig11_HTML.jpg)


    Figure 15-11.


    Minimum line spacing


    Note that the default behavior of `UICollectionViewFlowLayout` is to vertically
    center all items in the row; if you want to change this behavior, you need to
    create a subclass of `UICollectionViewFlowLayout` and override it.


    If the collection view’s scroll direction is vertical, this attribute controls
    the vertical spacing between lines. If the scroll direction is horizontal, this
    attribute controls the horizontal spacing.


    Note that this doesn’t affect the spacing between the bottom of the header and
    the top of the first row in the section, or the spacing between the bottom of
    the last row and the top of the footer. These values are controlled by the `sectionInset`
    property.


    | Property | Value | Effect |

    | --- | --- | --- |

    | `minimumLineSpacing` | `CGFloat` | Sets the minimum spacing allowed between
    each line in the section. |


    #### Section Insets


    Section insets control the amount of horizontal space between the frame of the
    collection view and the items, as shown in Figure [15-12](#A978-1-4842-1242-4_15_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_15_Fig12_HTML.jpg](A978-1-4842-1242-4_15_Fig12_HTML.jpg)


    Figure 15-12.


    Section insets


    It also controls the spacing between the header and footer views (if present)
    and the items between the bottom of the header view and the top of the first row,
    and the bottom of the last row and the top of the footer view.


    | Property | Value | Effect |

    | --- | --- | --- |

    | `sectionInset` | `UIEdgeInset` | Sets the spacing between items and collection
    view frame, and between header/footer and rows |


    #### Supplementary View Sizes


    The two supplementary view size attributes control the size of the section’s header
    and footer views. Setting these values fixes the header and footer sizes for all
    sections; if the headers and footers need to vary in size per section, you have
    to implement the `collectionView:layout:referenceSizeForHeaderInSection:` function.


    One important caveat to note is that the collection view will only apply the attribute
    that applies in the scroll direction, as shown in Figure [15-13](#A978-1-4842-1242-4_15_Chapter.html#Fig13).


    | Property | Value | Effect |

    | --- | --- | --- |

    | `headerReferenceSize` | `CGSize` | Sets the size of the header view; the attribute
    perpendicular to the scroll direction is ignored. |

    | `footerReferenceSize` | `CGSize` | Sets the size of the footer view; the attribute
    perpendicular to the scroll direction is ignored. |


    ![A978-1-4842-1242-4_15_Fig13_HTML.jpg](A978-1-4842-1242-4_15_Fig13_HTML.jpg)


    Figure 15-13.


    Applying supplementary view size attributes relative to scroll direction


    ### Customizing with UICollectionViewDelegateFlowLayout


    Setting the attributes of `UICollectionViewFlowLayout` directly has a “global”
    effect. If you set the item size to 100 points wide by 200 points high, for example,
    then all cells will be displayed with this size.


    The same process also applies to insets, line spacing, headers, and footers for
    each section. Set these values globally at the flow layout level, and all sections
    will use the same values.


    If you want to vary these values (per-item for cells, and per-section for the
    other attributes), then you can provide the `UICollectionViewFlowLayout` with
    a delegate object that handles these calculations on its behalf. The `UICollectionViewDelegateFlowLayout`
    is the protocol that defines the optional functions required to calculate these
    values on-demand.


    There are six optional functions declared by `UICollectionViewDelegateFlowLayout`,
    and each one takes a parameter for the `UICollectionView` and `UICollectionViewFlowLayout`.
    This means you can implement a single delegate object that can work with multiple
    collection views and/or flow layouts.


    #### Controlling Item Size


    Item size is controlled by the `collectionView(_:layout:sizeForItemAtIndexPath:)`
    function.'
  trans: '

    #### `EstimatedItemSize`


    If you implement per-item sizing, this adds additional processing load to the
    `UICollectionViewDataSource` object. It is now responsible for calculating the
    size of each item on demand.


    Although this may not sound like a big deal for the fast processors in iOS devices,
    keep in mind that for good scrolling performance, you need to render views as
    close to 60 frames per second as possible.


    This means that all calculations required to draw the visible elements of the
    collection view must be completed within approximately 15 milliseconds. This includes
    everything from retrieving data from the model, setting up cell controls, to calculating
    the size and position of all elements on the screen.


    To make things trickier, this calculation process also involves figuring out the
    total height of the collection view''s content area, which means calculating the
    size of every single cell in the entire collection view, not just the visible
    area. Therefore, anything that helps the collection view speed up this process
    will improve performance.


    One approach is to provide an estimated item size (`estimatedItemSize`), which
    is a hint about the likely size of the items. If an estimated item size is set,
    the collection view will assume that all currently invisible cells use this size
    and will not bother calculating their sizes individually. This has a significant
    impact on the collection view''s performance.


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `estimatedItemSize` | `CGSize` | 设置预估的项目尺寸，该尺寸将用于涉及当前不可见单元格的计算中 |


    #### `ItemSpacing`


    When laying out the items of a collection view, the flow layout uses the width
    of the collection view bounds and the width of the collection view items to calculate
    the spacing between each item.


    The `minimumInteritemSpacing` property sets the lower limit for the spacing between
    items. If it means the spacing between each item would be less than this value,
    the collection view will not fit an additional item on a single line. If undefined,
    this value defaults to `10.0` points (see Figure 15-10).


    ![A978-1-4842-1242-4_15_Fig10_HTML.jpg](img/A978-1-4842-1242-4_15_Fig10_HTML.jpg)


    *Figure 15-10. Minimum interitem spacing*


    This spacing is applied perpendicular to the scrolling direction of the collection
    view. In other words, if the collection view scrolls vertically, the minimum interitem
    spacing property controls the horizontal space between items; conversely, for
    a horizontally scrolling collection view, it controls the vertical space.


    If the `UICollectionViewDelegateFlowLayout collectionView:layout:minimumInteritemSpacingForSectionAtIndex:`
    function is implemented, it will override any interitem spacing value set directly
    on the flow layout object.


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `minimumInteritemSpacing` | `CGFloat` | 设置节中每个项目之间允许的最小间距。 |


    #### `LineSpacing`


    The flow layout uses its `lineSpacing` property to control the minimum amount
    of space between the bottom of the previous row and the top of the next row.


    The actual value will depend on the height of the tallest item in the row, but
    is guaranteed not to be less than the value you set for this property (see Figure
    15-11).


    ![A978-1-4842-1242-4_15_Fig11_HTML.jpg](img/A978-1-4842-1242-4_15_Fig11_HTML.jpg)


    *Figure 15-11. Minimum line spacing*


    Note that the default behavior of `UICollectionViewFlowLayout` is to vertically
    center all items in a row; if you want to change this behavior, you need to create
    a subclass of `UICollectionViewFlowLayout` and override it.


    If the scroll direction of the collection view is vertical, this property controls
    the vertical spacing between rows. If the scroll direction is horizontal, this
    property controls the horizontal spacing.


    Note that this does not affect the spacing between the bottom of the section and
    the top of the first row, nor between the bottom of the last row and the top of
    the footer. These values are controlled by the `sectionInset` property.


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `minimumLineSpacing` | `CGFloat` | 设置节中每行之间允许的最小间距。 |


    #### `SectionInsets`


    Section insets control the amount of horizontal space between the collection view
    frame and the items, as shown in Figure 15-12.


    ![A978-1-4842-1242-4_15_Fig12_HTML.jpg](img/A978-1-4842-1242-4_15_Fig12_HTML.jpg)


    *Figure 15-12. Section insets*


    It also controls the spacing between the header and footer views (if present)
    and the items, as well as the spacing between the bottom of the header view and
    the top of the first row, and between the bottom of the last row and the top of
    the footer view.


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `sectionInset` | `UIEdgeInset` | 设置项目与集合视图框架之间，以及页眉/页脚与行之间的间距。 |


    #### `SupplementaryViewSizes`


    Two supplementary view size properties control the size of the header and footer
    views in a section. Setting these values fixes the header and footer size for
    all sections; if headers and footers need to vary in size per section, you must
    implement the `collectionView:layout:referenceSizeForHeaderInSection:` function.


    An important note is that the collection view only applies the property corresponding
    to the scroll direction, as shown in Figure 15-13.


    | 属性 | 值 | 效果 |

    | --- | --- | --- |

    | `headerReferenceSize` | `CGSize` | 设置页眉视图的尺寸；垂直于滚动方向的属性被忽略。 |

    | `footerReferenceSize` | `CGSize` | 设置页脚视图的尺寸；垂直于滚动方向的属性被忽略。 |


    ![A978-1-4842-1242-4_15_Fig13_HTML.jpg](img/A978-1-4842-1242-4_15_Fig13_HTML.jpg)


    *Figure 15-13. Applying supplementary view size properties based on scroll direction*


    ### Customizing with `UICollectionViewDelegateFlowLayout`


    Setting properties directly on `UICollectionViewFlowLayout` has a "global" effect.
    For example, if you set the item size to 100 points wide and 200 points high,
    all cells will be displayed at this size.


    The same process applies to section insets, line spacing, headers, and footers.
    Setting these values globally at the flow layout level means all sections will
    use the same values.


    If you want variation in these values (per item for the cell, per section for
    other properties), you can provide a delegate object to `UICollectionViewFlowLayout`
    to handle these calculations. `UICollectionViewDelegateFlowLayout` is a protocol
    that defines optional functions for calculating these values on demand.


    `UICollectionViewDelegateFlowLayout` declares six optional functions, each of
    which includes `UICollectionView` and `UICollectionViewFlowLayout` parameters.
    This means you can implement a single delegate object that works with multiple
    collection views and/or flow layouts.


    #### Controlling Item Size


    The item size is controlled by the `collectionView(_:layout:sizeForItemAtIndexPath:)`
    function.

    '
- fmt: "## 4.1.1 Parameters\n\nIt takes three parameters for the collection view and\
    \ layout objects, and the index path.\n\n| Parameter | Type | Purpose |\n| ---\
    \ | --- | --- |\n| `collectionView` | `UICollectionView` | A reference to the\
    \ collection view that the delegate is dealing with. This enables a single delegate\
    \ object to support multiple collection views. |\n| `Layout` | `UICollectionViewFlowLayout`\
    \ | A reference to the collection view flow layout that the delegate is dealing\
    \ with. This enables a single delegate object to support multiple flow layouts.\
    \ |\n| `indexPath` | `NSIndexPath` | Identifies the section and item for which\
    \ the calculation should be performed. |\n\n### 4.1.2 Return Values\n\nIt returns\
    \ the item size:\n\n| Return value | Type | Purpose |\n| --- | --- | --- |\n|\
    \ `Item size` | `CGSize` | The calculated size of the item at the specified index\
    \ path |\n\n### 4.1.3 Example\n\nListing [15-1](#A978-1-4842-1242-4_15_Chapter.html#FPar1)\
    \ shows an example implementation of the `collectionView(_:layout:sizeForItemAtIndexPath:)`\
    \ function.\n\n**Listing 15-1.** An Example `sizeForItemAtIndexPath:` Function\n\
    \n```\nfunc collectionView(collectionView: UICollectionView, layout\n  collectionViewLayout:\
    \ UICollectionViewLayout, sizeForItemAtIndexPath\n  indexPath: NSIndexPath) ->\
    \ CGSize {\n        // Get the dictionary for this suit\n        let suitDictionary\
    \ = suitsArray[indexPath.section]\n        // Get the array of cards in this suit\n\
    \        let cardsArray = suitDictionary[\"cards\"]\n        // Get the dictionary\
    \ for this card\n        let cardDictionary: NSDictionary = cardsArray[indexPath.row]\
    \ as! Dictionary\n        // Get the name of the card’s image\n        let cardImageName\
    \ = cardDictionary[\"cardImage\"] as! String\n        // Load the image for this\
    \ card\n        let cardImage: UIImage? = UIImage(named: cardImageName)\n    \
    \    if let unwrappedCardImage = cardImage {\n            // If the image was\
    \ loaded successfully, return its size\n            return unwrappedCardImage.size\n\
    \        }\n        // There was a problem finding the image, so return a zero\
    \ size\n        return CGSizeZero\n    }\n```\n\n## Managing Section Spacing\n\
    \nThe `UICollectionViewDelegateFlowLayout` protocol defines three optional functions\
    \ for controlling section spacing:\n\n### `collectionView(_:layout:insetForSectionAtIndex:)`\n\
    \nThis function takes parameters for the collection view and flow layout, and\
    \ the index of the section for which the insets should be calculated.\n\n| Parameter\
    \ | Type | Purpose |\n| --- | --- | --- |\n| `collectionView` | `UICollectionView`\
