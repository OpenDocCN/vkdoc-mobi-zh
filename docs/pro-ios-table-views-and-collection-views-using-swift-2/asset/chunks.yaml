- fmt: '### Adding a UIViewController Scene


    The first step is to drag in a `UIViewController` object from the Object browser,
    so you now have two scenes in the Storyboard, as shown in Figure 13-15.


    ![A978-1-4842-1242-4_13_Fig15_HTML.jpg](A978-1-4842-1242-4_13_Fig15_HTML.jpg)


    Figure 13-15. Adding a UIViewController scene to the Storyboard


    At the moment, the `UITableViewController` is the Storyboard’s entry point, shown
    by the grey entry point arrow pointing to the scene. You need to change this so
    that it’s the view controller that’s loaded first, so select the `View Controller
    Scene` in the Stack, and select the `Is Initial View Controller` checkbox in the
    Attributes Inspector, as shown in Figure 13-16.


    ![A978-1-4842-1242-4_13_Fig16_HTML.jpg](A978-1-4842-1242-4_13_Fig16_HTML.jpg)


    Figure 13-16. Setting the UITableViewController as the initial view


    As soon as you do this, the entry point arrow switches to point to the `UIViewController`
    scene.


    ### Adding a Container View to the UIViewController


    Now you need to add a container view into the `UIViewController` so that you can
    embed the static table view inside.


    Select a `Container View` from the `Object` browser, and drag this out into the
    view controller scene’s view. As soon as you do so, you’ll see that it adds a
    third scene, a `UIViewController` linked by an `Embed` segue, as shown in Figure
    13-17.


    ![A978-1-4842-1242-4_13_Fig17_HTML.jpg](A978-1-4842-1242-4_13_Fig17_HTML.jpg)


    Figure 13-17. The container view added to the first UIViewController scene


    Since you want the static table to be shown full-screen, you need to add some
    AutoLayout constraints to the Container view so that it fills the full view.


    Select the Container view, then add top, bottom, leading, and trailing constraints
    as shown in Figure 13-18.


    ![A978-1-4842-1242-4_13_Fig18_HTML.jpg](A978-1-4842-1242-4_13_Fig18_HTML.jpg)


    Figure 13-18. Adding AutoLayout constraints to the container view


    With constraints added and the container view full-screen, you need to get rid
    of the spare `UIViewController` scene that the `Container` object arrived with.
    Select the entire scene in the object hierarchy on the left of the canvas and
    press delete. The scene and the segue will disappear.


    ### Embedding the Static Table View into the View Controller


    Embedding the static table view into the view controller is the final step. Ctrl-click
    the `Container` view in the object hierarchy, and drag the blue connection line
    to the table view controller object in the table view controller scene. When you
    release the mouse button, a HUD menu will appear next to the table view controller,
    as shown in Figure 13-19.


    ![A978-1-4842-1242-4_13_Fig19_HTML.jpg](A978-1-4842-1242-4_13_Fig19_HTML.jpg)


    Figure 13-19. Adding the embed segue


    Select the `Embed` item, and a new `Embed` segue will be created to link the table
    view controller scene with the Container, as shown in Figure 13-20.


    ![A978-1-4842-1242-4_13_Fig20_HTML.jpg](A978-1-4842-1242-4_13_Fig20_HTML.jpg)


    Figure 13-20. The static table view embedded in the UIViewController


    Running the app now will show the static table inside the view controller. From
    a user experience point of view, not a lot has changed, but by adjusting the constraints
    of the container view, you now have the ability to control the placement of the
    static table as you wish.


    ## Other Uses for Static Tables


    The “canonical” use of a static `UITableView` is the Settings app, but it has
    uses beyond this type of situation.


    By taking advantage of `UITableView’s` vertical layout capabilities, you can use
    static tables whenever you have a layout that looks like a stack of elements one
    on top of each other, and need a greater level of control and flexibility than
    `UIStackView`.


    Forms are basically a series of headings and text fields. By placing headings
    and textfields into alternating rows, you can use the static table view to build
    the form and let the table view handle the vertical scrolling.


    ## Summary


    In this chapter, you looked at the process of creating static table views, for
    use in situations where the data to be displayed isn’t dynamic. It’s a simple
    process that can be used to build views for features like preferences and settings,
    or for displaying static information in a table-style layout.


    # 14. Tables in WatchKit


    In this chapter, you’re going to look at how to create, configure, and use the
    table control that forms part of WatchKit.


    WatchKit is designed for the small, low-powered Apple Watch, so the `WKInterfaceTable`
    control is much less powerful than `UITableView`, but nonetheless it can be used
    to present table-based information and act as a navigation interface.


    You’ll look at the following:


    - The anatomy of the WatchKit table and the `WKInterfaceTable` class

    - How to create and configure table rows in Storyboards

    - How to create and configure row controller classes

    - How to configure tables with data at runtime

    - How to respond to user interaction with the WatchKit table

    - How to use WatchKit tables as a navigation interface.


    ## About WatchKit


    While the power and complexity that’s been squeezed into the confines of the Apple
    Watch is an impressive feat of engineering, there’s no getting away from the fact
    that the device is a lot less powerful than an iPhone.


    To get the best out of WatchKit tables, there are a number of caveats and limitations
    that you need to bear in mind:


    - Apple Watch effectively acts as the view of the WatchKit extension within the
    app on the paired iPhone, so all communication has to go across the Bluetooth
    link. This can be slow, so it’s important to keep interface updates as small as
    possible.

    - The `WKInterfaceTable` control doesn’t use an on-demand caching mechanism, unlike
    `UITableView`. All the rows that will be displayed in the table have to be created
    and sent to the Watch before they can be displayed. For this reason, it’s usually
    best to limit the number of rows in a table to 20 or so.

    - The Watch interface is small and is designed for quick glances. When designing
    your table interface, it’s important to keep the information density low and the
    controls large enough to be easily accessible.

    - The WatchKit interface must be laid out in a Storyboard; there’s no option to
    build it in code, or amend it at runtime other than changing the content or visibility
    of controls.

    - WatchKit interfaces don’t support AutoLayout.


    ## The Anatomy of a WatchKit App


    WatchKit apps have two parts: a WatchKit extension that runs on the paired iPhone,
    and user interfaces that are installed on the Watch itself.


    The WatchKit extension runs in the background to send updates to the user interface,
    and react to user interaction with the Watch.


    WatchKit apps have three kinds of interfaces: the full app user interface, which
    is where `WKInterfaceTable`s live; Glances, which provide quick access to read-only
    information; and notifications.


    Interface updates and user interactions are communicated between the iPhone and
    the paired Watch over a Bluetooth connection.'
  raw: '### Adding a UIViewController Scene


    The first step is to drag in a `UIViewController` object from the Object browser,
    so you now have two scenes in the Storyboard, as shown in Figure [13-15](#A978-1-4842-1242-4_13_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_13_Fig15_HTML.jpg](A978-1-4842-1242-4_13_Fig15_HTML.jpg)


    Figure 13-15.


    Adding a UIViewController scene to the Storyboard


    At the moment, the `UITableViewController` is the Storyboard’s entry point, shown
    by the grey entry point arrow pointing to the scene. You need to change this so
    that it’s the view controller that’s loaded first, so select the `View Controller
    Scene` in the Stack, and select the `Is Initial View Controlle`r checkbox in the
    Attributes Inspector, as shown in Figure [13-16](#A978-1-4842-1242-4_13_Chapter.html#Fig16).


    ![A978-1-4842-1242-4_13_Fig16_HTML.jpg](A978-1-4842-1242-4_13_Fig16_HTML.jpg)


    Figure 13-16.


    Setting the UITableViewController as the initial view


    As soon as you do this, the entry point arrow switches to point to the `UIViewController`
    scene.


    ### Adding a Container View to the UIViewController


    Now you need to add a container view into the `UIViewController` so that you can
    embed the static table view inside.


    Select a `Container View` from the `Object` browser, and drag this out into the
    view controller scene’s view. As soon as you do so, you’ll see that it adds a
    third scene, a `UIViewController` linked by an `Embed` segue, as shown in Figure
    [13-17](#A978-1-4842-1242-4_13_Chapter.html#Fig17).


    ![A978-1-4842-1242-4_13_Fig17_HTML.jpg](A978-1-4842-1242-4_13_Fig17_HTML.jpg)


    Figure 13-17.


    The container view added to the first UIViewController scene


    Since you want the static table to be shown full-screen, you need to add some
    AutoLayout constraints to the Container view so that it fills the full view.


    Select the Container view, then add top, bottom, leading, and trailing constraints
    as shown in Figure [13-18](#A978-1-4842-1242-4_13_Chapter.html#Fig18).


    ![A978-1-4842-1242-4_13_Fig18_HTML.jpg](A978-1-4842-1242-4_13_Fig18_HTML.jpg)


    Figure 13-18.


    Adding AutoLayout constraints to the container view


    With constraints added and the container view full-screen, you need to get rid
    of the spare `UIViewController` scene that the `Container` object arrived with.
    Select the entire scene in the object hierarchy on the left of the canvas and
    press delete. The scene and the segue will disappear.


    ### Embedding the Static Table View into the View Controller


    Embedding the static table view into the view controller is the final step. Ctrl-click
    the `Container` view in the object hierarchy, and drag the blue connection line
    to the table view controller object in the table view controller scene. When you
    release the mouse button, a HUD menu will appear next to the table view controller,
    as shown in Figure [13-19](#A978-1-4842-1242-4_13_Chapter.html#Fig19).


    ![A978-1-4842-1242-4_13_Fig19_HTML.jpg](A978-1-4842-1242-4_13_Fig19_HTML.jpg)


    Figure 13-19.


    Adding the embed segue


    Select the `Embed` item, and a new `Embed` segue will be created to link the table
    view controller scene with the Container, as shown in Figure [13-20](#A978-1-4842-1242-4_13_Chapter.html#Fig20).


    ![A978-1-4842-1242-4_13_Fig20_HTML.jpg](A978-1-4842-1242-4_13_Fig20_HTML.jpg)


    Figure 13-20.


    The static table view embedded in the UIViewController


    Running the app now will show the static table inside the view controller. From
    a user experience point of view, not a lot has changed, but by adjusting the constraints
    of the container view, you now have the ability to control the placement of the
    static table as you wish.


    ## Other Uses for Static Tables


    The “canonical” use of a static `UITableView` is the Settings app, but it has
    uses beyond this type of situation.


    By taking advantage of `UITableView’s` vertical layout capabilities, you can use
    static tables whenever you have a layout that looks like a stack of elements one
    on top of each other, and need a greater level of control and flexibility than
    `UIStackView`.


    Forms are basically a series of headings and text fields. By placing headings
    and textfields into alternating rows, you can use the static table view to build
    the form and let the table view handle the vertical scrolling.


    ## Summary


    In this chapter, you looked at the process of creating static table views, for
    use in situations where the data to be displayed isn’t dynamic. It’s a simple
    process that can be used to build views for features like preferences and settings,
    or for displaying static information in a table-style layout.


    # 14. Tables in WatchKit


    In this chapter, you’re going to look at how to create, configure, and use the
    table control that forms part of WatchKit.


    WatchKit is designed for the small, low-powered Apple Watch, so the `WKInterfaceTable`
    control is much less powerful than `UITableView`, but nonetheless it can be used
    to present table-based information and act as a navigation interface.


    You’ll look at the following:


    *   The anatomy of the WatchKit table and the `WKInterfaceTable` class

    *   How to create and configure table rows in Storyboards

    *   How to create and configure row controller classes

    *   How to configure tables with data at runtime

    *   How to respond to user interaction with the WatchKit table

    *   How to use WatchKit tables as a navigation interface.


    ## About WatchKit


    While the power and complexity that’s been squeezed into the confines of the Apple
    Watch is an impressive feat of engineering, there’s no getting away from the fact
    that the device is a lot less powerful than an iPhone.


    To get the best out of WatchKit tables, there are a number of caveats and limitations
    that you need to bear in mind:


    *   Apple Watch effectively acts as the view of the WatchKit extension within
    the app on the paired iPhone, so all communication has to go across the Bluetooth
    link. This can be slow, so it’s important to keep interface updates as small as
    possible.

    *   The `WKInterfaceTable` control doesn’t use an on-demand caching mechanism,
    unlike `UITableView`. All the rows that will be displayed in the table have to
    be created and sent to the Watch before they can be displayed. For this reason,
    it’s usually best to limit the number of rows in a table to 20 or so.

    *   The Watch interface is small and is designed for quick glances. When designing
    your table interface, it’s important to keep the information density low and the
    controls large enough to be easily accessible.

    *   The WatchKit interface must be laid out in a Storyboard; there’s no option
    to build it in code, or amend it at runtime other than changing the content or
    visibility of controls.

    *   WatchKit interfaces don’t support AutoLayout.


    ## The Anatomy of a WatchKit App


    WatchKit apps have two parts: a WatchKit extension that runs on the paired iPhone,
    and user interfaces that are installed on the Watch itself.


