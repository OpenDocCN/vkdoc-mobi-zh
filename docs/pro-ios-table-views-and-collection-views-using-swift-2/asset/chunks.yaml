    \ the user ends the search, reset the flag back to the “normal table” state, and\
    \ reload the table. Because the flag is in normal mode, the table will load from\
    \ the unfiltered data source."
  raw: '### Implementing the pullToRefresh Function


    Add a new function, as shown in Listing [9-12](#A978-1-4842-1242-4_9_Chapter.html#FPar13).


    Listing 9-12. The pullToRefresh Function


    `func didPullRefresh(sender: UIRefreshControl) {`


        `tableData.append(tableData.count)`


        `tableView.reloadData()`


        `sender.endRefreshing()`


    `}`


    This function does three things:


    *   It adds another entry to the end of the `tableData` array.

    *   It forces the table to reload the data from the model.

    *   It stops the `UIRefreshControl` from spinning, and animates its removal.


    This is an extremely trivial example. What you would be far more likely to do
    in practice is call some kind of network manager function to retrieve information
    from an API.


    If you run the app again, you’ll see that the activity indicator appears, followed
    by a new entry at the end of the table. Once the table has been refreshed, the
    activity indicator is animated off the top of the view.


    ### Adding a UIRefreshControl to a Table View


    The process in the previous section was predicated on using a `UITableViewController`.
    If instead you have a plain `UITableView` embedded inside a `UIViewController`,
    the process is a little more involved.


    The extra steps required are to


    *   Add a property for a `UIRefreshControl` to the view controller class.

    *   Instantiate the `UIRefreshControl` and give it an action.

    *   Add the newly-instantiated `UIRefreshControl` to the table view.


    #### Adding the UIRefreshControl Property


    This is simple a case of adding a property to the `UIViewController`:


    `var refreshControl: UIRefreshControl!`


    #### Instantiating the Refresh Control


    Before it can be used, the property needs to be instantiated. Since this needs
    to be done before it’s used, one obvious place to do this is in the `viewController`’s
    `viewDidLoad` function:


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `... setup the table and data ...`


        `refreshControl = UIRefreshControl()`


        `refreshControl.addTarget(self, action: "didPullRefresh:", forControlEvents:  ➤`


       `.ValueChanged)`


        `tableView.addSubview(refreshControl)`


    `}`


    Here, you’re setting up the table and its data, and then instantiating the `refreshControl`
    property:


    `refreshControl = UIRefreshControl()`


    With that done, you can set the `didPullRefresh:` function as the action for a
    `valueChanged` event. This event is triggered by the pull-down interaction on
    the table:


        `refreshControl.addTarget(self, action: "didPullRefresh:", forControlEvents:  ➤`


       `.ValueChanged)`


    With the function linked to the `refreshControl`, you simply add it to the `tableView`:


    `tableView.addSubview(refreshControl)`


    The end result is exactly the same as if you’d used a `UITableViewController`
    and set up its in-built `refreshControl` property.


    ## Searching in Tables and Collection Views


    If you’ve got a view displaying any significant amount of data, you owe it to
    your users to give them the means to navigate around easily. There’s nothing more
    frustrating than having to scroll through hundreds of entries in search of the
    one that you’re after.


    Previously you looked at adding indexes to the `tableView`; that’s a good way
    of letting the user jump between sections. But sometimes even that’s not enough.
    Wouldn’t it be much better if you could provide a means of searching the content
    of the table so the user could find the row for which they were looking?


    Fortunately for us, the iOS SDK includes the `UISearchBar` class and its associated
    delegate protocols. This class makes implementing search in table views almost
    trivially easy; building the same functionality from scratch would be significantly
    more work.


    The `UISearchBar` class operates in exactly the same way for both table and collection
    views. This example will focus on searching within a `UITableView`, but the processes
    are identical between the two controls.


    ### Adding a Search Bar to the Table


    The `UISearchBar` provides a styled text field that you can add to your interface
    as required. The normal layout for a table view is to put the search back at the
    top, although there’s nothing to stop you putting somewhere else.


    You can embed the search bar within in the table itself, in which case it will
    scroll with the table (shown in Figure [9-9](#A978-1-4842-1242-4_9_Chapter.html#Fig9)).


    ![A978-1-4842-1242-4_9_Fig9_HTML.jpg](A978-1-4842-1242-4_9_Fig9_HTML.jpg)


    Figure 9-9.


    The search bar placed within the table


    In this situation, the search bar will scroll with the table. If you want it to
    remain “anchored” at the top, you can place it outside the table, as shown in
    Figure [9-10](#A978-1-4842-1242-4_9_Chapter.html#Fig10).


    ![A978-1-4842-1242-4_9_Fig10_HTML.jpg](A978-1-4842-1242-4_9_Fig10_HTML.jpg)


    Figure 9-10.


    The search bar placed above the table


    You can use AutoLayout constraints to set up and secure the place of the search
    bar within your layout.


    Regardless of where the `UISearchBar` is placed, it’s important that its delegate
    outlet is connected.


    You can do this visually, by Ctrl-clicking in the bar and dragging over to the
    relevant controller object in the Document Outline to connect the `delegate` outlet;
    or programmatically by setting the `delegate` property:


    `searchBar.delegate = self`


    ### How Search Works


    The basic principle of table view search is that the table has two data sources:


    *   The default data source, which contains all the data that the table will display.
    This is implemented in the same way as you’ve been doing throughout the book so
    far. For example, it might be an `Array` containing `Strings`.

    *   The filtered data source, which is a subset of the default data source after
    it’s been filtered in response to the user input in the search bar. You trigger
    the filtering in response to user input. If your default data source was an `Array`
    containing `Strings`, the filtered data source would also be a `String`-containing
    `Array`, but the entries would only be those that match the search terms.


    The search process is normally triggered by the user tapping in the Search bar.
    The typical process is the following:


    *   Set a flag on the class acting as the data source to indicate that the table
    is currently being filtered.

    *   Filter the filtered data source to remove elements that don’t match the search
    terms that the user has entered.

    *   Reload the table from the filtered source, using the flag to control from
    which data source `UITableDataSource` functions like `numberOfRowsInSection` and
    `cellForRowAtIndexPath` get their data.

    *   When the user ends the search, reset the flag back to the “normal table” state,
    and reload the table. Because the flag is in normal mode, the table will load
    from the unfiltered data source.'
  trans: "\n### 实现`pullToRefresh`功能\n\n新增一个函数，如代码清单 9-12 所示。\n\n**代码清单 9-12.** `pullToRefresh`函数\n\
    \n```\nfunc didPullRefresh(sender: UIRefreshControl) {\n    tableData.append(tableData.count)\n\
    \    tableView.reloadData()\n    sender.endRefreshing()\n}\n```\n\n此函数执行三项操作：\n\
    \n- 在`tableData`数组末尾新增一条记录。\n- 强制表格从模型重新加载数据。\n- 停止`UIRefreshControl`的旋转动画，并使其消失。\n\
    \n这是一个极为简单的示例。在实际开发中，更常见的做法是调用某种网络管理器函数来从 API 获取信息。\n\n如果再次运行应用，你会看到活动指示器出现，随后表格末尾新增一条记录。一旦表格刷新完成，活动指示器会以动画形式从视图顶部消失。\n\
    \n### 向表格视图添加`UIRefreshControl`\n\n上一节的操作基于使用`UITableViewController`。如果你是在`UIViewController`内嵌入一个普通的`UITableView`，则过程会稍显复杂。\n\
    \n所需的额外步骤如下：\n\n- 为视图控制器类添加一个`UIRefreshControl`属性。\n- 实例化`UIRefreshControl`并为其指定动作。\n\
    - 将新实例化的`UIRefreshControl`添加到表格视图。\n\n#### 添加`UIRefreshControl`属性\n\n这只是在`UIViewController`中添加属性的简单情况：\n\
    \n```\nvar refreshControl: UIRefreshControl!\n```\n\n#### 实例化刷新控件\n\n在使用之前，需要先实例化该属性。由于这需要在正式使用之前完成，一个明显的位置是在`viewController`的`viewDidLoad`函数中：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    ... 配置表格和数据\
    \ ...\n    refreshControl = UIRefreshControl()\n    refreshControl.addTarget(self,\
    \ action: \"didPullRefresh:\", forControlEvents: .ValueChanged)\n    tableView.addSubview(refreshControl)\n\
    }\n```\n\n在这里，你配置了表格及其数据，然后实例化了`refreshControl`属性：\n\n```\nrefreshControl = UIRefreshControl()\n\
    ```\n\n完成之后，你可以将`didPullRefresh:`函数设置为`valueChanged`事件的动作。此事件由表格的下拉交互触发：\n\n```\n\
    refreshControl.addTarget(self, action: \"didPullRefresh:\", forControlEvents:\
    \ .ValueChanged)\n```\n\n将函数与`refreshControl`关联后，只需将其添加到`tableView`即可：\n\n```\n\
    tableView.addSubview(refreshControl)\n```\n\n最终结果与使用`UITableViewController`并设置其内置`refreshControl`属性完全一致。\n\
    \n## 在表格和集合视图中搜索\n\n如果你的视图显示了大量数据，那么为用户提供便捷的导航方式是对用户负责的表现。没有什么比必须滚动数百行来查找目标数据更让人沮丧的了。\n\
    \n之前我们讨论过向`tableView`添加索引，这可以很好地让用户在章节间跳转。但有时这仍然不够。如果你能提供一种搜索表格内容的方法，让用户快速找到所需行，是不是更好？\n\
    \n幸运的是，iOS SDK 提供了`UISearchBar`类及其相关的委托协议。这个类使得在表格视图中实现搜索变得极其简单；如果从头构建同样的功能，工作量会显著增加。\n\
    \n`UISearchBar`类在表格和集合视图中的工作方式完全相同。本示例将重点介绍如何在`UITableView`中进行搜索，但两个控件中的操作流程是一样的。\n\
    \n### 向表格添加搜索栏\n\n`UISearchBar`提供了一个样式化的文本字段，你可以根据需要添加到界面中。表格视图的正常布局是将搜索栏放在顶部，当然你也可以将其放在其他位置。\n\
    \n你可以将搜索栏嵌入表格内部，这样它会随表格一起滚动（如图 9-9 所示）。\n\n![A978-1-4842-1242-4_9_Fig9_HTML.jpg](img/A978-1-4842-1242-4_9_Fig9_HTML.jpg)\n\
    \n**图 9-9.** 嵌入表格内部的搜索栏\n\n在这种情况下，搜索栏会随表格滚动。如果你希望它“固定”在顶部，可以将其放置在表格外部，如图 9-10\
    \ 所示。\n\n![A978-1-4842-1242-4_9_Fig10_HTML.jpg](img/A978-1-4842-1242-4_9_Fig10_HTML.jpg)\n\
    \n**图 9-10.** 放置在表格上方的搜索栏\n\n你可以使用 AutoLayout 约束来设置并固定搜索栏在布局中的位置。\n\n无论`UISearchBar`放置在何处，连接其委托出口都非常重要。\n\
    \n你可以通过可视化方式实现：按住 Ctrl 键点击搜索栏，然后拖拽到文档大纲中的相关控制器对象来连接`delegate`出口；或者通过编程方式设置`delegate`属性：\n\
    \n```\nsearchBar.delegate = self\n```\n\n### 搜索的工作原理\n\n表格视图搜索的基本原理是表格有两个数据源：\n\
    \n- **默认数据源**，包含表格将要显示的所有数据。其实现方式与本书之前的讲解相同。例如，它可能是一个包含`Strings`的`Array`。\n- **过滤后的数据源**，即默认数据源根据搜索栏的用户输入进行过滤后的子集。你通过响应用户输入来触发过滤。如果你的默认数据源是一个包含`Strings`的`Array`，那么过滤后的数据源也是一个包含`Strings`的`Array`，但其中的条目仅包含与搜索条件匹配的内容。\n\
    \n搜索过程通常由用户点击搜索栏触发。典型流程如下：\n\n- 在充当数据源的类上设置一个标志，表示当前表格正在被过滤。\n- 过滤过滤后的数据源，移除与用户输入的搜索条件不匹配的元素。\n\
    - 使用该标志控制`numberOfRowsInSection`和`cellForRowAtIndexPath`等`UITableDataSource`函数获取数据的数据源，从过滤后的数据源重新加载表格。\n\
    - 当用户结束搜索时，将标志重置为“普通表格”状态，并重新加载表格。由于标志处于普通模式，表格将从未过滤的数据源加载数据。\n"
- fmt: "### Implementing Search\n\nLet's work through the process of wiring up a search\
    \ bar and filtering a data source. For the purposes of this exercise, you're going\
    \ to use an `Array` of `Strings` as the table's data source and filter based on\
    \ the text that you type in the search bar.\n\nYou can use whatever source data\
    \ you like, but the sample project for this chapter uses a list of German spa\
    \ towns (there's lots of them!) It looks like Figure [9-11](#A978-1-4842-1242-4_9_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1242-4_9_Fig11_HTML.jpg](A978-1-4842-1242-4_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11.\n\nThe running app\n\nAs you type in the search bar, the list will\
    \ be filtered using a case-insensitive substring search and the table update (shown\
    \ in Figure [9-12](#A978-1-4842-1242-4_9_Chapter.html#Fig12)).\n\n![A978-1-4842-1242-4_9_Fig12_HTML.jpg](A978-1-4842-1242-4_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12.\n\nA basic search function in action\n\nI'll assume that you've\n\
    \n*   Built a basic table that displays items from an `Array` of `Strings`.\n\
    *   Added a `UISearchBar` at the top of the table view, and connected its delegate\
    \ outlet to the view controller managing the table.\n*   Added an `IBOutlet` property\
    \ called `searchBar` to the view controller, and connected this to the `UISearchBar`\
    \ in the Storyboard.\n\nThe first stage is to add two additional properties to\
    \ the view controller class:\n\n```\nvar filteredTableData = [String]()\n```\n\
    \nThis is an array to hold the list of filtered results, and will be used to feed\
    \ the table while it's in search mode:\n\n```\nvar searchActive: Bool = false\n\
    ```\n\nThe `searchActive` flag will be used by the `UITableViewDatasource` methods\
    \ to determine whether they should use the filtered or unfiltered data model.\n\
    \nWith those properties in place, the next stage is to set up the `UISearchBarDelegate`.\n\
    \n### Implementing the UISearchBarDelegate Functions\n\nAdd the `UISearchBarDelegate`\
    \ functions to an extension of the view controller. Listing [9-13](#A978-1-4842-1242-4_9_Chapter.html#FPar14)\
    \ shows the first two functions to add.\n\nListing 9-13. Implementing the UISearchBarDelegate\
    \ Functions\n\n```\nextension ViewController: UISearchBarDelegate {\n\n    func\
    \ searchBarTextDidBeginEditing(searchBar: UISearchBar) {\n        searchActive\
    \ = true\n    }\n\n    func searchBarTextDidEndEditing(searchBar: UISearchBar)\
    \ {\n        searchActive = false\n        tableView.reloadData()\n    }\n\n}\n\
    ```\n\nThe `searchBarTextDidBeginEditing` function simply sets the `searchActive`\
    \ flag to true.\n\nThe `searchBarTextDidEndEditing` function does the opposite,\
    \ and then forces the table to reload, so that it contains unfiltered data once\
    \ more.\n\nNow it's time for the function that will handle the actual searching,\
    \ shown in Listing [9-14](#A978-1-4842-1242-4_9_Chapter.html#FPar15) – this will\
    \ also go inside the `UISearchBarDelegate` extension.\n\nListing 9-14. The searchBar:textDidChange\
    \ Function\n\n```\nfunc searchBar(searchBar: UISearchBar, textDidChange searchText:\
    \ String) {\n\n    if searchText.characters.count == 0 {\n        searchActive\
    \ = false\n        tableView.reloadData()\n        return\n    }\n\n    searchActive\
    \ = true\n\n    filteredTableData = tableData.filter({( spaTown: String) -> Bool\
    \ in\n\n        let spaRange = Range(start: spaTown.startIndex, end: spaTown.endIndex)\n\
    \n        let stringMatch = spaTown.rangeOfString(searchText,  \n            options:\
    \ NSStringCompareOptions.CaseInsensitiveSearch,  \n            range: spaRange,\
    \  \n            locale: NSLocale.autoupdatingCurrentLocale())\n\n        return\
    \ stringMatch != nil\n    })\n\n    tableView.reloadData()\n}\n```\n\nThis looks\
    \ a bit intimidating at first, but it's not as bad as it seems.\n\nThe first part\
    \ checks whether the user has cleared the search field. If there are no characters\
    \ in the `searchText`, you assumed that searching has completed. The `searchActive`\
    \ flag is set to `false`, you reload the table to show the unfiltered data, and\
    \ then return:\n\n```\nif searchText.characters.count == 0 {\n    searchActive\
    \ = false\n    tableView.reloadData()\n    return\n}\n```\n\nIf there are characters\
    \ in the `searchString`, then it's game on.\n\nFirst, you set the `searchActive`\
    \ flag to true so that the `UITableViewDelegate` method will use the `filteredTableData`\
    \ array (you'll implement this in a moment):\n\n```\nsearchActive = true\n```\n\
    \nNow comes the actual filtering. Here, you're using the `Array filter` function\
    \ to step through the `tableData` array and place any `Strings` that match the\
    \ `searchText` into the `filteredTableData` array.\n\nThe `filter` function steps\
    \ through each entry in turn, and passes it as the `spaTown` parameter to a closure\
    \ that returns a `Bool`. If the returned `Bool` is true, then the entry is added\
    \ to the `filteredTableData` array. If it's `false`, the entry is ignored.\n\n\
    The closure starts by creating a `Range` from the `spaTown` parameter:\n\n```\n\
    let spaRange = Range(start: spaTown.startIndex, end: spaTown.endIndex)\n```\n\n\
    It then uses the `rangeOfString` function to look through the `spaTown` string\
    \ to see if the contents of `searchText` appear anywhere. For example, if the\
    \ `spaTown` contained \"`Bad Marianberg`\" then a `searchText` containing \"`enb`\"\
    \ would match:\n\n```\nlet stringMatch = spaTown.rangeOfString(searchText,  \n\
    \    options: NSStringCompareOptions.CaseInsensitiveSearch,  \n    range: spaRange,\
    \  \n    locale: NSLocale.autoupdatingCurrentLocale())\n```\n\nThe `options` ensure\
    \ that the search is case-insensitive, and the `locale` ensures that locale-specific\
    \ factors such as accented characters are handled correctly.\n\nIf a match is\
    \ found, the `rangeOfString` function returns the range of characters in the `spaTown`\
    \ string where it was found. If there's no match, it returns `nil`.\n\nYou can\
    \ use this to decide whether to return a `true` or `false` to the filter function.\
    \ If nothing was found, it'll have a range of `nil` and can return `false`. If\
    \ something was found, then it'll return `true` so that the `spaTown` will be\
    \ added to the `filteredTableData` array.\n\nFinally, having filtered the `tableData`\
    \ array, you call the table's `reloadData()` function to force it to reload."
  raw: '### Implementing Search


    Let’s work through the process of wiring up a search bar and filtering a data
    source. For the purposes of this exercise, you’re going to use an `Array` of `Strings`
    as the table’s data source and filter based on the text that you type in the search
    bar.


    You can use whatever source data you like, but the sample project for this chapter
    uses a list of German spa towns (there’s lots of them!) It looks like Figure [9-11](#A978-1-4842-1242-4_9_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_9_Fig11_HTML.jpg](A978-1-4842-1242-4_9_Fig11_HTML.jpg)


    Figure 9-11.


    The running app


    As you type in the search bar, the list will be filtered using a case-insensitive
    substring search and the table update (shown in Figure [9-12](#A978-1-4842-1242-4_9_Chapter.html#Fig12)).


    ![A978-1-4842-1242-4_9_Fig12_HTML.jpg](A978-1-4842-1242-4_9_Fig12_HTML.jpg)


    Figure 9-12.


    A basic search function in action


    I’ll assume that you’ve


    *   Built a basic table that displays items from an `Array` of `Strings.`

    *   Added a `UISearchBar` at the top of the table view, and connected its delegate
    outlet to the view controller managing the table.

    *   Added an `IBOutlet` property called `searchBar` to the view controller, and
    connected this to the `UISearchBar` in the Storyboard.


    The first stage is to add two additional properties to the view controller class:


    `var filteredTableData = [String]()`


    This is an array to hold the list of filtered results, and will be used to feed
    the table while it’s in search mode:


    `var searchActive: Bool = false`


    The `searchActive` flag will be used by the `UITableViewDatasource` methods to
    determine whether they should use the filtered or unfiltered data model.


    With those properties in place, the next stage is to set up the `UISearchBarDelegate.`


    #### Implementing the UISearchBarDelegate Functions


    Add the `UISearchBarDelegate` functions to an extension of the view controller.
    Listing [9-13](#A978-1-4842-1242-4_9_Chapter.html#FPar14) shows the first two
    functions to add.


    Listing 9-13. Implementing the UISearchBarDelegate Functions


    `extension ViewController: UISearchBarDelegate {`


    `func searchBarTextDidBeginEditing(searchBar: UISearchBar) {`


    `searchActive = true`


    `}`


    `func searchBarTextDidEndEditing(searchBar: UISearchBar) {`


    `searchActive = false`


    `tableView.reloadData()`


    `}`


    `}`


    The `searchBarTextDidBeginEditing` function simply sets the `searchActive` flag
    to true.


    The `searchBarTextDidEndEditing` function does the opposite, and then forces the
    table to reload, so that it contains unfiltered data once more.


    Now it’s time for the function that will handle the actual searching, shown in
    Listing [9-14](#A978-1-4842-1242-4_9_Chapter.html#FPar15) – this will also go
    inside the `UISearchBarDelegate` extension.


    Listing 9-14. The searchBar:textDidChange Function


    `func searchBar(searchBar: UISearchBar, textDidChange searchText: String) {`


    `if searchText.characters.count == 0 {`


    `searchActive = false`


    `tableView.reloadData()`


    `return`


    `}`


    `searchActive = true`


    `filteredTableData = tableData.filter({( spaTown: String) -> Bool in`


    `let spaRange = Range(start: spaTown.startIndex, end: spaTown.endIndex)`


    `let stringMatch = spaTown.rangeOfString(searchText,  ➤`


    `options: NSStringCompareOptions.CaseInsensitiveSearch,  ➤`


    `range: spaRange,  ➤`


    `locale: NSLocale.autoupdatingCurrentLocale())`


    `return stringMatch != nil`


    `})`


    `tableView.reloadData()`


    `}`


    This looks a bit intimidating at first, but it’s not as bad as it seems.


    The first part checks whether the user has cleared the search field. If there
    are no characters in the `searchText`, you assumed that searching has completed.
    The `searchActive` flag is set to `false`, you reload the table to show the unfiltered
    data, and then return:


    `if searchText.characters.count == 0 {`


    `searchActive = false`


    `tableView.reloadData()`


    `return`


    `}`


    If there are characters in the `searchString`, then it’s game on.


    First, you set the `searchActive` flag to true so that the `UITableViewDelegate`
    method will use the `filteredTableData` array (you’ll implement this in a moment):


    `searchActive = true`


    Now comes the actual filtering. Here, you’re using the `Array filter` function
    to step through the `tableData` array and place any `Strings` that match the `searchText`
    into the `filteredTableData` array.


    The `filter` function steps through each entry in turn, and passes it as the `spaTown`
    parameter to a closure that returns a `Bool`. If the returned `Bool` is true,
    then the entry is added to the `filteredTableData` array. If it’s `false`, the
    entry is ignored.


    The closure starts by creating a `Range` from the `spaTown` parameter:


    `let spaRange = Range(start: spaTown.startIndex, end: spaTown.endIndex)`


    It then uses the `rangeOfString` function to look through the `spaTown` string
    to see if the contents of `searchText` appear anywhere. For example, if the `spaTown`
    contained “`Bad Marianberg`” then a `searchText` containing “`enb`” would match:


    `let stringMatch = spaTown.rangeOfString(searchText,  ➤`


    `options: NSStringCompareOptions.CaseInsensitiveSearch,  ➤`


    `range: spaRange,  ➤`


    `locale: NSLocale.autoupdatingCurrentLocale())`


    The `options` ensure that the search is case-insensitive, and the `locale` ensures
    that locale-specific factors such as accented characters are handled correctly.


    If a match is found, the `rangeOfString` function returns the range of characters
    in the `spaTown` string where it was found. If there’s no match, it returns `nil`.


    You can use this to decide whether to return a `true` or `false` to the filter
    function. If nothing was found, it’ll have a range of `nil` and can return `false`.
    If something was found, then it’ll return `true` so that the `spaTown` will be
    added to the `filteredTableData` array.


    Finally, having filtered the `tableData` array, you call the table’s `reloadData()`
    function to force it to reload.'
  trans: "\n### 实现搜索功能\n\n现在我们来逐步实现搜索栏的配置和数据源的过滤。在本练习中，你将使用一个由`String`组成的`Array`作为表格的数据源，并根据你在搜索栏中输入的内容进行过滤。\n\
    \n你可以使用任意你喜欢的数据源，但本章的示例项目使用的是一份德国温泉小镇的列表（数量非常多！），如图 9-11 所示。\n\n![A978-1-4842-1242-4_9_Fig11_HTML.jpg](img/A978-1-4842-1242-4_9_Fig11_HTML.jpg)\n\
    \n图 9-11.\n\n运行中的应用程序\n\n当你在搜索栏中输入内容时，列表将会通过不区分大小写的子串搜索进行过滤，并且表格也会随之更新（如图 9-12\
    \ 所示）。\n\n![A978-1-4842-1242-4_9_Fig12_HTML.jpg](img/A978-1-4842-1242-4_9_Fig12_HTML.jpg)\n\
    \n图 9-12.\n\n基础搜索功能的实际效果\n\n我假定你已经完成了以下操作：\n\n*   构建了一个基础表格，用于显示来自`String`数组`Array`中的条目。\n\
    *   在表格视图顶部添加了一个`UISearchBar`，并将其委托出口连接到管理该表格的视图控制器。\n*   向视图控制器添加了一个名为`searchBar`的`IBOutlet`属性，并将其连接到故事板中的`UISearchBar`。\n\
    \n第一步是向视图控制器类中添加两个额外的属性：\n\n```\nvar filteredTableData = [String]()\n```\n\n这是一个用于存储过滤结果列表的数组，在表格处于搜索模式时，它将作为表格的数据源：\n\
    \n```\nvar searchActive: Bool = false\n```\n\n`searchActive` 标志将被 `UITableViewDatasource`\
    \ 的方法使用，用来决定它们应该使用过滤后的数据模型还是未过滤的数据模型。\n\n添加好这些属性后，下一步就是设置 `UISearchBarDelegate`。\n\
    \n### 实现 UISearchBarDelegate 函数\n\n将 `UISearchBarDelegate` 函数添加到视图控制器的扩展中。代码清单\
    \ 9-13 展示了需要添加的前两个函数。\n\n代码清单 9-13. 实现 UISearchBarDelegate 函数\n\n```\nextension\
    \ ViewController: UISearchBarDelegate {\n\n    func searchBarTextDidBeginEditing(searchBar:\
    \ UISearchBar) {\n        searchActive = true\n    }\n\n    func searchBarTextDidEndEditing(searchBar:\
    \ UISearchBar) {\n        searchActive = false\n        tableView.reloadData()\n\
    \    }\n\n}\n```\n\n`searchBarTextDidBeginEditing` 函数只是将 `searchActive` 标志设置为\
    \ true。\n\n`searchBarTextDidEndEditing` 函数则执行相反的操作，然后强制重新加载表格，以便表格再次显示未过滤的数据。\n\
    \n现在，我们来看负责处理实际搜索功能的函数，如代码清单 9-14 所示——该函数也将放置在 `UISearchBarDelegate` 扩展内部。\n\n\
    代码清单 9-14. searchBar:textDidChange 函数\n\n```\nfunc searchBar(searchBar: UISearchBar,\
    \ textDidChange searchText: String) {\n\n    if searchText.characters.count ==\
    \ 0 {\n        searchActive = false\n        tableView.reloadData()\n        return\n\
    \    }\n\n    searchActive = true\n\n    filteredTableData = tableData.filter({(\
    \ spaTown: String) -> Bool in\n\n        let spaRange = Range(start: spaTown.startIndex,\
    \ end: spaTown.endIndex)\n\n        let stringMatch = spaTown.rangeOfString(searchText,\
    \  \n            options: NSStringCompareOptions.CaseInsensitiveSearch,  \n  \
    \          range: spaRange,  \n            locale: NSLocale.autoupdatingCurrentLocale())\n\
    \n        return stringMatch != nil\n    })\n\n    tableView.reloadData()\n}\n\
    ```\n\n这段代码初看可能有点吓人，但实际上并没有那么糟糕。\n\n第一部分检查用户是否清空了搜索字段。如果 `searchText` 中没有字符，就假定搜索已完成。将\
    \ `searchActive` 标志设置为 `false`，重新加载表格以显示未过滤的数据，然后返回：\n\n```\nif searchText.characters.count\
    \ == 0 {\n    searchActive = false\n    tableView.reloadData()\n    return\n}\n\
    ```\n\n如果 `searchString` 中有字符，则搜索开始。\n\n首先，将 `searchActive` 标志设置为 true，以便 `UITableViewDelegate`\
    \ 方法能够使用 `filteredTableData` 数组（稍后将实现此方法）：\n\n```\nsearchActive = true\n```\n\n\
    接下来是实际的过滤操作。这里，我们使用 `Array` 的 `filter` 函数来遍历 `tableData` 数组，并将所有与 `searchText`\
    \ 匹配的 `String` 放入 `filteredTableData` 数组中。\n\n`filter` 函数逐个遍历每个条目，并将其作为 `spaTown`\
    \ 参数传递给一个返回 `Bool` 值的闭包。如果返回的 `Bool` 值为 true，则该条目会被添加到 `filteredTableData` 数组中；如果返回\
    \ `false`，则忽略该条目。\n\n闭包首先从 `spaTown` 参数创建一个 `Range`：\n\n```\nlet spaRange = Range(start:\
    \ spaTown.startIndex, end: spaTown.endIndex)\n```\n\n然后，它使用 `rangeOfString` 函数在\
    \ `spaTown` 字符串中查找 `searchText` 的内容是否出现在任何位置。例如，如果 `spaTown` 包含 \"`Bad Marianberg`\"\
    ，那么包含 \"`enb`\" 的 `searchText` 就能匹配到：\n\n```\nlet stringMatch = spaTown.rangeOfString(searchText,\
    \  \n    options: NSStringCompareOptions.CaseInsensitiveSearch,  \n    range:\
    \ spaRange,  \n    locale: NSLocale.autoupdatingCurrentLocale())\n```\n\n`options`\
    \ 参数确保搜索不区分大小写，而 `locale` 参数确保诸如重音字符等与区域设置相关的因素能被正确处理。\n\n如果找到匹配项，`rangeOfString`\
    \ 函数会返回 `spaTown` 字符串中匹配到的字符范围。如果没有找到匹配项，则返回 `nil`。\n\n你可以据此来决定向 `filter` 函数返回\
    \ `true` 还是 `false`。如果未找到任何内容，范围将为 `nil`，因此可以返回 `false`。如果找到了内容，则返回 `true`，以便将\
    \ `spaTown` 添加到 `filteredTableData` 数组中。\n\n最后，在过滤完 `tableData` 数组后，调用表格的 `reloadData()`\
    \ 函数以强制其重新加载。\n"
- fmt: "### Updating the `UITableViewDatasource` Functions\n\nIf you run the project\
    \ now, you can enter text into the search box, but you won’t see any difference\
    \ in the data that the table displays.\n\nThis is because the table is loading\
    \ its data from the `tableData` array regardless of whether it’s in search mode\
    \ or not. You need to update the `UITableViewDelegate` function to use the right\
    \ data source.\n\nThere are two functions that need to be updated. Listing [9-15](#A978-1-4842-1242-4_9_Chapter.html#FPar16)\
    \ shows `tableView:numberOfRowsInSection:`\n\nListing 9-15. The Updated `tableView:numberOfRowsInSection:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    if searchActive {\n        return filteredTableData.count\n\
    \    }\n    return tableData.count\n}\n```\n\nIt’s actually very simple. If the\
    \ table is in `searchActive` mode, then the number of rows is derived from the\
    \ `filteredTableData` array; if not, the number of rows is derived from `tableData`\
    \ as normal.\n\nListing [9-16](#A978-1-4842-1242-4_9_Chapter.html#FPar17) shows\
    \ the updated `tableView:cellForRowAtIndexPath:` function. It uses the same approach:\
    \ if the table is being searched, use the `filteredTableData` array as the data\
    \ mode; if not, use `tableData`.\n\nListing 9-16. The Updated `tableView:cellForRowAtIndexPath:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath)\n    -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\n        forIndexPath: indexPath)\n    if searchActive {\n \
    \       cell.textLabel!.text = filteredTableData[indexPath.row]\n    } else {\n\
    \        cell.textLabel!.text = tableData[indexPath.row]\n    }\n    return cell\n\
    }\n```\n\nThere’s one other piece of housekeeping to do before things are completely\
    \ finished. In the `UISearchBarDelegate` extension, add the function shown in\
    \ Listing [9-17](#A978-1-4842-1242-4_9_Chapter.html#FPar18).\n\nListing 9-17. The\
    \ `searchBarCancelButtonClicked` Function\n\n```\nfunc searchBarCancelButtonClicked(searchBar:\
    \ UISearchBar) {\n    searchBar.text = \"\"\n    searchBar.resignFirstResponder()\n\
    \    searchActive = false\n}\n```\n\nThis clears the search bar, dismisses the\
    \ keyboard, and sets the `searchActive` flag to false in response to the user\
    \ tapping the Cancel button in the Search Bar.\n\nYou haven’t actually set the\
    \ Cancel button up so far, so switch back to the Storyboard, highlight the Search\
    \ Bar, and select the Shows Cancel Button option in the Attributes Inspector (shown\
    \ in Figure [9-13](#A978-1-4842-1242-4_9_Chapter.html#Fig13)).\n\n![A978-1-4842-1242-4_9_Fig13_HTML.jpg](A978-1-4842-1242-4_9_Fig13_HTML.jpg)\n\
    \nFigure 9-13. The Shows Cancel Button option\n\nIf you run the project again,\
    \ you’ll see a working Search function complete with a Cancel function that dismisses\
    \ the keyboard and reloads the table with the full data set (Figure [9-14](#A978-1-4842-1242-4_9_Chapter.html#Fig14)).\n\
    \n![A978-1-4842-1242-4_9_Fig14_HTML.jpg](A978-1-4842-1242-4_9_Fig14_HTML.jpg)\n\
    \nFigure 9-14. The working search function\n\n## Happy, Healthy Tables\n\nIf the\
    \ overall user experience of the iOS device family had to be boiled down to a\
    \ single adjective, I’d go for “smooth.” Everything about the interface of well-written\
    \ apps moves without hesitation, stuttering, or jerkiness. Get it right, and the\
    \ overall impression is that of a precision, well-oiled device.\n\nTable views\
    \ have a lot of moving parts, so if that level of smoothness is going to go wrong\
    \ anywhere, it could be here. Although the `UITableView`, `UICollectionView` and\
    \ their supporting classes are designed and written for performance, it is possible\
    \ to build table and collection views that don’t perform well, especially if you\
    \ lose sight of some basic best practices.\n\nIn this section, we take a look\
    \ at some things you can do—both quick fixes, and some more in-depth—to make sure\
    \ that your views perform as well as they possibly can.\n\n### Background, Background,\
    \ Background\n\nOne of the most common problems with stuttering scrolling is caused\
    \ by expensive and slow processing taking place on the main thread.\n\nThe iOS\
    \ interface is rendered on the main thread, so anything that slows this down will\
    \ cause the interface to be slowed as well. Normally that’s not a problem, but\
    \ scrolling is one situation where every one of the sixty frames a second is required.\n\
    \nAs a general rule of thumb, expensive or long-running activity–network requests\
    \ in particular–should be dispatched onto a background queue, which calls back\
    \ to the main thread when the work is completed.\n\nThis is often an issue if\
    \ you’re retrieving images from a network source. There are a couple of techniques\
    \ you can use here:\n\n*   Asynchronous background fetching of images, which are\
    \ then updated once retrieved.\n*   Placeholder images to “fill in” for the real\
    \ thing. Often when scrolling a view, the cells are removed from the visible view\
    \ long before the image can be downloaded. In those situations, you can use a\
    \ placeholder image initially, and only update the image if the cell hangs around\
    \ on the screen long enough for it to be visible.\n\nBeware of premature optimization,\
    \ though. There’s a saying in software engineering that goes “I had a bottleneck\
    \ problem, so I used background threading. Now problems two have I.” It’s very\
    \ easy to get completely tied in knots with race conditions.\n\n### Are the Cells\
    \ Cached?\n\nBuilding cells is expensive in processing terms, so the `UITableView`\
    \ and `UICollectionView` classes provide caching and dequeuing functionality to\
    \ allow constructed cells to be reused. This can make a dramatic difference if\
    \ you’ve got more rows than can fit on the screen.\n\nThe two places to check\
    \ are the `tableView:cellForRowAtIndexPath:` or `collectionView:cellForItemAtIndexPath:`\
    \ methods. For maximum efficiency, you should be doing one of three things:\n\n\
    *   Dequeuing an existing reusable cell before creating an new instance: `let\
    \ cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`\n*   Registering\
    \ a class for the cell: `tableView.registerClass(MyCell.self, forCellReuseIdentifier:\
    \ \"MyCustomCell\")`\n*   Registering a nib file containing the cell layout: `tableView.registerNib(UINib(nibName:\
    \ \"MyCell\", bundle: nil), forCellReuseIdentifier: \"MyCustomCell\")`\n\nThe\
    \ only exceptions to the first rule are if you’re dealing with a static table\
    \ or if you’ll never have more cells than will fit into the visible area. In the\
    \ later situation you can probably get away without cached cells because they’ll\
    \ always remain visible.\n\n### Do Your Table Cells Have Varying Heights?\n\n\
    Behind the scenes, `UITableView` uses the cell height to build a number of elements\
    \ relating to the “chrome” of the table. When all cells in the `tableView` are\
    \ the same height, this can be done relatively cheaply, but if the cell height\
    \ varies, these calculations get repeated every time a new cell is created.\n\n\
    To extract the last ounce of speed from a table view, it’s most efficient to keep\
    \ the cell heights identical. Whether this is possible is going to vary from project\
    \ to project, of course, but if your cell heights only vary within a limited range,\
    \ you may find you’re better off designing them with a single consistent height\
    \ and managing the differences within the internal cell layout.\n\nIf that’s not\
    \ possible, implement `UITableViewDelegate`’s `tableView:estimatedHeightForCell:`\
    \ function to return an estimated height. The table will use this value to calculate\
    \ the full content area by assuming that all cells will have this height, and\
    \ defer the exact calculation until the very last moment possible.\n\nIt’s not\
    \ a get-out-jail-free card–you can run into problems if your estimated row height\
    \ is wildly different from the actual value–but this function can help."
