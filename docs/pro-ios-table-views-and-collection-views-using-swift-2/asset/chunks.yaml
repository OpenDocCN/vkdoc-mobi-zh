- fmt: '### The Collection View’s Datasource


    The responsibility of the datasource object is to supply the collection view with
    cells, supplementary views, and decoration views when requested so that they can
    be displayed by the collection view. It forms the other part of the model component
    of the model-view-controller architecture.


    The relationship between the collection view and its datasource is defined by
    the `UICollectionViewDataSource` protocol. There are mandatory functions that
    the collection view’s datasource must implement, and some optional ones.


    The datasource can be a standalone class that conforms to the `UICollectionViewDataSource`
    protocol, or it can be the collection view’s view controller. There are no hard
    and fast rules about which approach is correct, but regardless of how its implemented,
    it’s vitally important that the datasource is able to return data to the collection
    view as fast as possible in order to maximize performance.


    ### The Collection View’s Delegate


    Handling user interaction with the collection view is the responsibility of the
    delegate object, which forms one part of the controller component of the model-view-controller
    architecture.


    The delegate is a class that implements some or all of the functions defined by
    the `UICollectionViewDelegate` protocol. It handles selection and highlighting
    of the collection view’s items. There are no mandatory functions in the `UICollectionViewDelegate`
    protocol, but the collection view must have a delegate object set.


    ### The Collection View’s Layout


    Unlike `UITableView`, a `UICollectionView` control has no knowledge about how
    it should lay out items in its content view. It relies on a `UICollectionViewLayout`
    object to provide layout attributes for every item.


    Each item in the collection view (cell, supplementary view, or decoration view)
    has a corresponding instance of `UICollectionViewLayoutAttributes`, shown in Figure
    [3-7](#A978-1-4842-1242-4_3_Chapter.html#Fig7). It manages the layout-related
    attributes for the item, and is created by the `UICollectionViewLayout` object
    when requested by the collection view.


    ![A978-1-4842-1242-4_3_Fig7_HTML.jpg](A978-1-4842-1242-4_3_Fig7_HTML.jpg)


    Figure 3-7. `UICollectionViewLayoutAttributes`


    Having requested the attributes for each item, the collection view then uses them
    to position the item in its content view. The attributes control the size, position,
    transform, and opacity of each item, but you can also supplement them by subclassing
    `UICollectionViewLayoutAttributes` and adding your own custom properties.


    If your collection view layout is based around a line of items, with or without
    line breaks, then you can take advantage of the `UICollectionViewFlowLayout` class,
    which takes care of much of the layout requirements for you. You normally only
    need to specify item sizes and inter-item and inter-line spacing; then the flow
    layout will calculate everything else for you.


    For more complex layouts, you need to create a custom layout as a subclass of
    `UICollectionViewLayout`. With this, you’re responsible for calculating all the
    necessary attributes to display the items correctly.


    ## Creating a Simple Collection View App


    In the rest of this chapter, you’ll build a simple “Hello, world”-style collection
    view app from scratch. It will show you how the container, datasource, delegate,
    layout, cells, and views all fit together and give you an app that you can use
    as the basis for your own experiments. The end result will display a deck of cards
    in suits, as shown in Figure [3-8](#A978-1-4842-1242-4_3_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_3_Fig8_HTML.jpg](A978-1-4842-1242-4_3_Fig8_HTML.jpg)


    Figure 3-8. The completed app


    I’m going to take it deliberately slowly and cover all the steps. If you’re a
    confident Xcode driver, you won’t need this hand-holding—just concentrate on the
    code instead.


    Still with me? Okay, you’re going to do the following:


    * Create a simple, window-based application skeleton

    * Generate some data for feeding the collection view

    * Create a simple collection view

    * Wire up the collection view’s datasource and delegate

    * Implement the collection view’s layout

    * Add some very simple interactivity


    It’s all very straightforward, but useful practice nevertheless.


    ## Creating the Application Skeleton


    For this application, you’re going to use a simple structure: a single view managed
    by a view controller and a Storyboard to provide the content for the view.


    To begin with, create a new project in Xcode and select the Single View Application
    template, as shown in Figure [3-9](#A978-1-4842-1242-4_3_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_3_Fig9_HTML.jpg](A978-1-4842-1242-4_3_Fig9_HTML.jpg)


    Figure 3-9. Xcode’s template selection pane


    Call the application `SimpleCV`, as shown in Figure [3-10](#A978-1-4842-1242-4_3_Chapter.html#Fig10).


    ![A978-1-4842-1242-4_3_Fig10_HTML.jpg](A978-1-4842-1242-4_3_Fig10_HTML.jpg)


    Figure 3-10. Name the application


    Save the project somewhere appropriate, and you’ll see the project view of Xcode,
    with the initial skeleton of your application. It’ll look something like Figure
    [3-11](#A978-1-4842-1242-4_3_Chapter.html#Fig11), assuming that you’ve gone with
    the `SimpleCV` application name.


    ![A978-1-4842-1242-4_3_Fig11_HTML.jpg](A978-1-4842-1242-4_3_Fig11_HTML.jpg)


    Figure 3-11. The initial Xcode view


    You’ll see that you have the following:


    * An app delegate (`AppDelegate.swift`)

    * A view controller (`ViewController.swift`)

    * A Storyboard (`Main.storyboard`)

    * An asset catalog (`Images.xcassets`)

    * Supporting files and folders for unit tests, frameworks, and products


    ## Creating Some Data


    Before you start with the collection view itself, you need to create some data
    to feed it with. You’re going to create the model for the collection view from
    a directory containing the four card suits.


    ### Adding the Card Images


    In the source code for this book, you’ll find a `cards` folder than contains five
    subdirectories. Each subdirectory contains the `png` image for each card. First,
    drag the `cards` folder into the project folder, as shown in Figure [3-12](#A978-1-4842-1242-4_3_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_3_Fig12_HTML.jpg](A978-1-4842-1242-4_3_Fig12_HTML.jpg)


    Figure 3-12. The card images


    Next, drag the `cards` folder from the Finder into Xcode, and drop it so that
    it’s inside the `SimpleVC` folder, as shown in Figure [3-13](#A978-1-4842-1242-4_3_Chapter.html#Fig13).


    ![A978-1-4842-1242-4_3_Fig13_HTML.jpg](A978-1-4842-1242-4_3_Fig13_HTML.jpg)


    Figure 3-13. Adding the card images to the project


    When adding the folder, make sure that you select the options to copy items into
    the destination folder and to create groups for any added folders, as shown in
    Figure [3-14](#A978-1-4842-1242-4_3_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_3_Fig14_HTML.jpg](A978-1-4842-1242-4_3_Fig14_HTML.jpg)


    Figure 3-14. The options for adding the card files'
