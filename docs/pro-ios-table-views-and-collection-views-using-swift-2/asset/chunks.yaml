    Again, the situation with only one item in the collection view is a special case;
    there’s no rotation involved.


    Assuming there’s more than one item, then the rotation per item is 2π divided
    by the number of items (2π is the number of radians in a full circle; iOS uses
    radians for trigonometric calculations).


    Looking back to the `calculateCenterForItemAtIndexPath:` function, you’ll see
    that there’s another helper function you need to implement. It is to calculate
    the radius of the circle: the smaller of the height or the width of the collection
    view.


    Add the function in Listing [17-10](#A978-1-4842-1242-4_17_Chapter.html#FPar11).


    Listing 17-10. Calculating the Circle Radius


    `func calculateSpokeRadius() -> CGFloat {`


    `// Calculates the radius of the ’spoke’ connecting the item’s center and the`


    `// center of the collectionView`


    `// Find out which is the shorter side, in case`


    `// the collectionView’s not square`


    `let shorterSide = min(collectionView!.bounds.size.width, ➤`


    `collectionView!.bounds.size.height)`


    `let collectionViewAllowance = shorterSide / 2`


    `let itemWidthAllowance = itemSize.width / 2`


    `// Adjust for side padding (if any)`


    `return (collectionViewAllowance - (itemWidthAllowance + sidePadding))`


    `}`


    Here, you get the length of the shorter side of the collection view, and then
    you adjust for the width of the item and any padding between the item and the
    collection view frame.


    The value returned by the `calculateSpokeRadius` function is used by `calculateCenterForItemAtIndexPath:`
    to calculate the horizontal and vertical distance between the center of the collection
    view and the center of the item:


    `let xDisplacement = CGFloat(sinf(Float(theta))) * calculateSpokeRadius()`


    `let yDisplacement = CGFloat(cosf(Float(theta))) * calculateSpokeRadius()`


    This requires a bit of high school math, and uses the `sinf` and `cosf` trigonometry
    functions. The angles involved form a right-angled triangle. This is the same
    technique you used in [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html), so check
    back there if you need a refresher.


    With the distances calculated, you’re now in a position to calculate the center
    coordinates for the item:


    `let xPosition = (collectionView!.bounds.size.width/2) + xDisplacement`


    `let yPosition = (collectionView!.bounds.size.width/2) - yDisplacement`


    Now return the entire set of attributes back to the calling function:


    `return CGPointMake(xPosition, yPosition)`


    With all this in place, you can calculate the attributes for any item within the
    collection view. Now you need to implement the functions to return them to the
    collection view when they’re required.


    #### Supplying Attributes to the Collection View


    The process of supplying attributes for items to the collection view can take
    place in one of four phases:


    *   En masse, where the collection view will ask for all attributes for items
    in a given `CGRect`. Since your collection view will always be completely visible,
    you’re effectively being asked for attributes for all the items.

    *   Individually, where the collection view supplies an `NSIndexPath` and expects
    the attributes for the relevant item.

    *   During insertion of items, when the collection view will ask for initial attributes
    for items that are appearing. The collection view will handle interpolating between
    the initial attributes and those that the item will use for the duration of its
    stay in the collection view.

    *   During removal of items, when the collection view will ask for final attributes
    for items that are being removed. As with initial attributes, the collection view
    will handle interpolating from the current state of the item to its final values.


    Let’s tackle these one by one.


    #### Supplying Attributes En Masse


    The layout needs to implement the `layoutAttributesForElementInRect:` function,
    which is passed a `CGRect` parameter and is responsible for figuring out which
    elements fit within the rect and returning their attributes. These get returned
    as an `Array` of `UICollectionViewLayoutAttributes`.


