    shows the difference between sections and groups.


    ![A978-1-4842-1242-4_2_Fig6_HTML.jpg](A978-1-4842-1242-4_2_Fig6_HTML.jpg)


    Figure 2-6.


    Comparing sections and groups


    Each section has a header and footer. These are `UIViews`, and are returned by
    two `UITableViewDelegate` methods:


    `func tableView(` `tableView` `: UITableView, viewForFooterInSection ➤`


    `section` `: Int) -> UIView?`


    `func tableView(_` `tableView` `: UITableView, viewForHeaderInSection ➤`


    `section` `: Int) -> UIView?`


    Although you can manipulate the view that comprises the entire header and footer,
    often it’s enough just to be able to set the titles. `UITableViewDataSource` has
    two methods to support this:


    `func tableView(` `tableView` `: UITableView, titleForHeaderInSection ➤`


    `section` `: Int) -> String?`


    `func tableView(t` `ableView` `: UITableView, titleForFooterInSection ➤`


