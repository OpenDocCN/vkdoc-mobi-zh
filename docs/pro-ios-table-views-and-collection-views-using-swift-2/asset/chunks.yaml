  raw: '## What UITableView Inherits from UIScrollView


    What does `UITableView` get from `UIScrollView`?


    The short answer to this is, “Everything that `UITableView` doesn’t explicitly
    override.” This provides some useful `UIScrollView` and `UIScrollViewDelegate`
    methods and properties that are particularly relevant to the `UITableView` class.


    `contentSize` indicates the full height that the table would be if all rows were
    created and populated at once. (In fact, unless the table is small, this very
    rarely happens because of `UITableView`’s caching and queuing mechanism.) `contentSize`
    is calculated by adding the total height of all the rows, plus the header and
    footer views.


    `contentOffset` indicates how far down the table has been scrolled from the top
    of the `tableView`’s frame. For example, if the `tableView`’s `contentSize.height`
    value is 1,000 points, and the table is scrolled halfway down, the `contentOffset`
    would be 500 points.


    Two `UIScrollViewDelegate` methods are particularly useful if you want to know
    when your user is scrolling the table around.


    `scrollViewWillBeginDragging` `tableView` starts moving, and `scrollViewDidScroll`
    is called multiple times while the table scrolls.


    This is where you could get the new `contentOffset` value and update anything
    that needed to change as a result.


    Note


    Although `UITableView` is a subclass of `UIScrollView`, table views can only scroll
    vertically.


    ## Creating UITableViews


    Any discussion of how to go about creating `UITableViews` has to come with a caveat:
    on their own, `UITableViews` don’t really do very much. In order to become populated
    with data and interact with your user, they need the support of a class that implements
    the `UITableViewDelegate` and `UITableViewDatasource` protocols.


    Having said that, in order to get a `UITableView` onto the screen, you need to
    be able to draw it. You have two options here: create it visually using Interface
    Builder in a XIB file or Storyboard or create it programmatically in code.


    ### Creating a UITableView in Interface Builder


    Creating a `UITableView` in Interface Builder is a massively challenging process.


    ![A978-1-4842-1242-4_2_Fig8_HTML.jpg](A978-1-4842-1242-4_2_Fig8_HTML.jpg)


    Figure 2-8.


    The UITableView item in the Objects browser Open your Storyboard.   Drag a `UITableView`
    from the Objects browser onto your view, as shown in Figure [2-8](#A978-1-4842-1242-4_2_Chapter.html#Fig8).
     


    Okay, I lied. It’s actually pretty straightforward. But there are a couple of
    details to take care of, so the process is worth stepping through.


    #### Placing a UITableView into Another View


    Although you’ll often see table views full-screen, you’re not restricted to that
    option. You can make your table views any size you want. This is pretty simple:
    drag the `UITableView` object onto the view in which it’s going to appear, and
    adjust the AutoLayout constraints as needed (see Figure [2-9](#A978-1-4842-1242-4_2_Chapter.html#Fig9)).


    ![A978-1-4842-1242-4_2_Fig9_HTML.jpg](A978-1-4842-1242-4_2_Fig9_HTML.jpg)


    Figure 2-9.


    Placing a UITableView into another view


    #### Placing a Full-Screen UITableView


    If, on the other hand, your `tableView` will always be shown full screen, there’s
    not really much point in creating it as a child of another view that will never
    be shown.


    The process in this scenario is slightly different.


    Delete the existing view object from the NIB file or Storyboard.   Drag a `UITableView`
    object into the central area (Figure [2-10](#A978-1-4842-1242-4_2_Chapter.html#Fig10)).


    ![A978-1-4842-1242-4_2_Fig10_HTML.jpg](A978-1-4842-1242-4_2_Fig10_HTML.jpg)


    Figure 2-10.


    Dragging a UITableView object into the main area   Having removed the default
    view from the NIB file or Storyboard, you need to reconnect the File’s Owner `view`
    outlet to the `tableView`. Ctrl-click the File’s Owner icon in the Placeholders
    list and drag out to the `tableView`. Then release the mouse button, and select
    the View outlet from the pop-up list.   Caution


    It’s easy to forget to reconnect the view outlet if you’ve deleted the object
    it was once connected to. If you don’t reconnect, your app will crash with an
    error something along the lines of


    `*** Terminating app due to uncaught exception ’NSInternalInconsistency Exception’,
    reason: ’-[UIViewController _loadViewFromNibNamed:bundle:] loaded the "PlainTable"
    nib but the view outlet was not set.’`


    After the `view` outlet is reconnected, hook your new `tableView` up to its `dataSource`
    and `delegate`.  


    The chances are that the class that will act as `dataSource` and `delegate` will
    also be the File’s Owner. If that’s the case, you can connect these by Ctrl-clicking
    and dragging from the table to the File’s Owner icon and selecting `dataSource`
    and `delegate` from the pop-up options.


    ### Creating a UITableView Programmatically


    In [Chapter 1](#A978-1-4842-1242-4_1_Chapter.html), we built a simple app with
    a table view using Interface Builder.


    Following the maxim of anything you can do in Interface Builder, you can also
    do in code, the alternative way of creating a `UITableView` is to do so in code.
    It’s a four-step process.


    Create an instance of `UITableView` with a size and a style.   Set the new `tableView`’s
    `delegate` and `dataSource` properties.   Add the new `tableView` to the `superView`.
      Call the new `tableView`’s `reloadData` method to make sure it updates.  


    Listing [2-1](#A978-1-4842-1242-4_2_Chapter.html#FPar4) shows an example of how
    you could do this in a `UIViewController`’s `viewDidLoad` method.


    Listing 2-1. Adding a tableView Programmatically


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `// Do any additional setup after loading the view, typically from a nib.`


        `tableView = UITableView(frame: self.view.frame, style:.Plain)`


        `tableView.delegate = self`


        `tableView.dataSource = self`


        `self.view.addSubview(tableView)`


        `tableView.reloadData()`


    `}`


    Caution


    Having set the `delegate` and `dataSource` properties of your `tableView`, it
    will expect (nay, demand!) that the controller adopts the `UITableViewDelegate`
    and `UITableViewDataSource` protocols–in particular, that the `numberOfSectionsInTableView:`,
    `tableView:numberOfRowsInSection:` and `tableView:cellForRowAtIndexPath:` methods
    are implemented.


    If those protocols haven’t been implemented correctly, the app will crash when
    the `tableView` is loaded, complaining that the `dataSource` hasn’t returned a
    cell.'
  trans: "\n# UITableView 继承自 UIScrollView 的要素\n\n`UITableView` 从 `UIScrollView` 中继承了哪些特性？\n\
    \n简而言之，答案是：“`UITableView` 没有明确重写的所有内容。” 这提供了一些对 `UITableView` 类特别有用的 `UIScrollView`\
    \ 和 `UIScrollViewDelegate` 方法与属性。\n\n`contentSize` 表示如果一次性创建并填充所有行，表格的总高度。（实际上，除非表格很小，否则由于\
    \ `UITableView` 的缓存和排队机制，这种情况很少发生。）`contentSize` 通过累加所有行的总高度以及页眉和页脚视图的高度计算得出。\n\
    \n`contentOffset` 表示表格从 `tableView` 框架顶部向下滚动了多少。例如，如果 `tableView` 的 `contentSize.height`\
    \ 值为 1000 点，并且表格向下滚动了一半，那么 `contentOffset` 将为 500 点。\n\n当你需要了解用户何时在滚动表格时，有两个 `UIScrollViewDelegate`\
    \ 方法特别有用。\n\n`scrollViewWillBeginDragging` 在 `tableView` 开始移动时调用，而 `scrollViewDidScroll`\
    \ 在表格滚动期间会被多次调用。\n\n在此处，你可以获取新的 `contentOffset` 值，并更新任何需要随之变化的内容。\n\n**注意**\n\n\
    尽管 `UITableView` 是 `UIScrollView` 的子类，但表格视图只能垂直滚动。\n\n## 创建 UITableView\n\n任何关于如何创建\
    \ `UITableView` 的讨论都必须附带一个警告：仅靠 `UITableView` 本身并不能做太多事情。为了填充数据并与用户交互，它们需要一个实现了\
    \ `UITableViewDelegate` 和 `UITableViewDataSource` 协议的类来提供支持。\n\n话虽如此，要将 `UITableView`\
    \ 显示到屏幕上，你需要能够绘制它。这里有两个选择：使用 Interface Builder 在 XIB 文件或 Storyboard 中可视化创建，或者在代码中以编程方式创建。\n\
    \n### 在 Interface Builder 中创建 UITableView\n\n在 Interface Builder 中创建 `UITableView`\
    \ 是一个极具挑战性的过程。\n\n![A978-1-4842-1242-4_2_Fig8_HTML.jpg](img/A978-1-4842-1242-4_2_Fig8_HTML.jpg)\n\
    \n**图 2-8.** “对象浏览器”中的 `UITableView` 项目 打开你的 Storyboard。从“对象浏览器”中拖拽一个 `UITableView`\
    \ 到你的视图上，如图 2-8 所示。\n\n好吧，我承认我说谎了。实际上这个过程相当直接。但有一些细节需要处理，因此仍有必要逐步了解这个过程。\n\n####\
    \ 将 UITableView 放置到另一个视图中\n\n尽管你经常看到表格视图全屏显示，但你不必局限于此。你可以将表格视图设置为任意大小。这非常简单：将\
    \ `UITableView` 对象拖拽到它将要出现的视图中，并根据需要调整自动布局约束（见图 2-9）。\n\n![A978-1-4842-1242-4_2_Fig9_HTML.jpg](img/A978-1-4842-1242-4_2_Fig9_HTML.jpg)\n\
    \n**图 2-9.** 将 `UITableView` 放置到另一个视图中\n\n#### 放置全屏 UITableView\n\n另一方面，如果你的 `tableView`\
    \ 总是全屏显示，那么将其创建为另一个永远不会显示的子视图就没什么意义了。\n\n这种情况下，过程稍有不同。\n\n从 NIB 文件或 Storyboard\
    \ 中删除现有的视图对象。将一个 `UITableView` 对象拖拽到中央区域（图 2-10）。\n\n![A978-1-4842-1242-4_2_Fig10_HTML.jpg](img/A978-1-4842-1242-4_2_Fig10_HTML.jpg)\n\
    \n**图 2-10.** 将 `UITableView` 对象拖拽到主区域\n\n从 NIB 文件或 Storyboard 中移除默认视图后，你需要重新连接“文件所有者”的\
    \ `view` 出口到 `tableView`。按住 Ctrl 键点击“占位符”列表中的“文件所有者”图标，然后拖拽到 `tableView` 上。释放鼠标按钮，然后从弹出列表中选择“View”出口。\n\
    \n**警告**\n\n如果你删除了 `view` 出口曾经连接的对象，很容易忘记重新连接它。如果不重新连接，你的应用将崩溃，并显示类似如下的错误：\n\n\
    ```\n*** 因未捕获异常 ’NSInternalInconsistency Exception’ 而终止应用，原因：’-[UIViewController\
    \ _loadViewFromNibNamed:bundle:] 加载了 \"PlainTable\" 笔尖文件，但视图出口未设置。’\n```\n\n在\
    \ `view` 出口重新连接后，将你的新 `tableView` 连接到其 `dataSource` 和 `delegate`。\n\n担任 `dataSource`\
    \ 和 `delegate` 角色的类很可能也是“文件所有者”。如果是这种情况，你可以通过按住 Ctrl 键点击并从表格拖拽到“文件所有者”图标，然后从弹出选项中选择\
    \ `dataSource` 和 `delegate` 来连接它们。\n\n### 以编程方式创建 UITableView\n\n在第 1 章中，我们使用\
    \ Interface Builder 构建了一个带有表格视图的简单应用。\n\n遵循“在 Interface Builder 中能做的任何事，在代码中也能做”的原则，创建\
    \ `UITableView` 的另一种方式是在代码中完成。这是一个四步的过程：\n\n1.  创建一个指定大小和样式的 `UITableView` 实例。\n\
    2.  设置新 `tableView` 的 `delegate` 和 `dataSource` 属性。\n3.  将新 `tableView` 添加到 `superView`\
    \ 中。\n4.  调用新 `tableView` 的 `reloadData` 方法以确保其更新。\n\n清单 2-1 展示了如何在 `UIViewController`\
    \ 的 `viewDidLoad` 方法中实现这一过程。\n\n**清单 2-1.** 以编程方式添加 `tableView`\n\n```\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // 在加载视图后进行任何额外的设置，通常来自 nib\
    \ 文件。\n    tableView = UITableView(frame: self.view.frame, style:.Plain)\n   \
    \ tableView.delegate = self\n    tableView.dataSource = self\n    self.view.addSubview(tableView)\n\
    \    tableView.reloadData()\n}\n```\n\n**警告**\n\n设置了 `tableView` 的 `delegate`\
    \ 和 `dataSource` 属性后，它会期望（不，是要求！）控制器遵守 `UITableViewDelegate` 和 `UITableViewDataSource`\
    \ 协议——特别是必须实现 `numberOfSectionsInTableView:`、`tableView:numberOfRowsInSection:`\
    \ 和 `tableView:cellForRowAtIndexPath:` 方法。\n\n如果这些协议没有正确实现，当 `tableView` 被加载时应用将崩溃，并提示\
    \ `dataSource` 未能返回一个单元格。\n"
- fmt: '### Creating a UITableView with UITableViewController


    In order for a `tableView` to operate successfully, it needs a number of `UITableViewDelegate`
    and `UITableViewDataSource` methods to be implemented.


    Although Xcode’s autocompletion helps with the typing, creating all the methods
    by hand will probably induce repetitive strain injury. Save your wrists, speed
    things up, and create a subclass of `UITableViewController` instead!


    The process is delightfully simple. Instead of creating an instance of a vanilla
    `UIViewController`, drop down the subclass list and select `UITableViewController`
    instead, as shown in Figure [2-11](#A978-1-4842-1242-4_2_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_2_Fig11_HTML.jpg](A978-1-4842-1242-4_2_Fig11_HTML.jpg)


    Figure 2-11. Creating an instance of UITableViewController


    The new class files will be created as usual, but with some added extras. In addition
    to the usual `UIViewController` methods, you’ll find some stubbed-out `UITableViewDataSource`
    methods in the file (see Figure [2-12](#A978-1-4842-1242-4_2_Chapter.html#Fig12)).


    ![A978-1-4842-1242-4_2_Fig12_HTML.jpg](A978-1-4842-1242-4_2_Fig12_HTML.jpg)


    Figure 2-12. The UITableViewDataSource methods


    This is the minimal subset of `UITableViewController`, `delegate`, and `dataSource`
    methods that you need to get going, and the class’s header file declares it as
    conforming to the two protocols.


    Xcode also provides a slew of other methods that are commented out:


    ```

    override func tableView(tableView: UITableView, canMoveRowAtIndexPath indexPath:
    NSIndexPath) -> Bool


    override func tableView(tableView: UITableView, moveRowAtIndexPath fromIndexPath:
    NSIndexPath, toIndexPath: NSIndexPath)


    override func tableView(tableView: UITableView, commitEditingStyle editingStyle:
    UITableViewCellEditingStyle, forRowAtIndexPath indexPath: NSIndexPath)


    override func tableView(tableView: UITableView, canEditRowAtIndexPath indexPath:
    NSIndexPath) -> Bool

    ```


    None of these have to be implemented, but they are there as skeleton methods ready
    to be uncommented if you need them.


    #### Connecting UITableViewController Outlets


    If you selected the "with XIB for user interface" option when creating the `UITableViewController`
    subclass, the XIB file will contain a `UITableView` that comes already connected
    to its `delegate` and `dataSource`.


    If you didn’t select the option to create the XIB file, you’ll need to connect
    things up manually once you’ve created the XIB file yourself.


    - First, create a new `View` file and then delete the `UIView` object that is
    added for you, and replace it with a `UITableView` object.

    - Next, set the interface’s `File’s Owner` by selecting the `File’s Owner` icon
    in the `Placeholders` list, then changing the `Custom Class` field in the `Identity
    Inspector` to the name of your `UITableViewController` subclass.

    - The `UITableViewController` subclass exposes a `view` property; this needs to
    be connected to the `Table View` object.

    - Finally, the `Table View` object’s `dataSource` and `delegate` outlets need
    to be connected to the `UITableViewController` subclass via the `File’s Owner`
    object in the `Placeholders` list.


    At this point, you’ve effectively replicated the process that’s done for you automatically
    when you create a new `UITableViewController` subclass with the "with XIB for
    user interface" option selected.


    ## Summary


    This short chapter introduced the anatomy and core components of the `UITableView`.


    There are two basic styles of table view:


    - Plain

    - Grouped


    Table views can also be split into sections, and provided with an index.


    Although they can look different, the different types of table view have similar
    component parts and dimensions. They also inherit methods and properties from
    the `UIScrollView` parent class.


    Like many of UIKit’s components, it’s possible to create `UITableViews` both visually
    — using Interface Builder — and programmatically. Anything that can be done with
    Interface Builder can also be done in code.


    Implementing the `tableView`’s controller as a subclass of `UITableViewController`
    allows us to cut down on creating methods manually and use the templates that
    are provided.


    In [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html), you’ll learn how your newly
    created `UITableView` is fed with data, and how it works in conjunction with the
    `UITableViewDelegate` and `UITableViewDataSource` protocols.


    # 3. Collection Views Quick Start


    In this chapter, you’ll start your exploration of collection views. It begins
    with an overview of what collection views are and some examples of how they’re
    used in practice. Then in the second section, you’ll build a simple "Hello, world"-style
    collection view app to introduce you to the components behind the user interface
    and help you to contextualize the detail that’s going to come in later chapters.


    If you’re just starting to use collection views, it’s worth taking some time to
    build a very simple one from scratch before diving into the gnarly details. However,
    if you’ve reached the stage where you feel more confident about how the components
    of the collection view jigsaw fit together and want to get straight into the code,
    feel free to skip the rest of this chapter completely. I’ll cover the elements
    in detail later, so you won’t miss out.'
