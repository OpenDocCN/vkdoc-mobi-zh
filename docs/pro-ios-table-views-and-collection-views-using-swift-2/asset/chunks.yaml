    \nFigure 10-9. Xcode's New File templates\n\nSelect **Swift File** and click **Next**\
    \ (see Figure [10-10](#A978-1-4842-1242-4_10_Chapter.html#Fig10)).\n\n![A978-1-4842-1242-4_10_Fig10_HTML.jpg](A978-1-4842-1242-4_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10. Naming the new file\n\nCall the new file `Name`, click **Next**,\
    \ and make sure that the tick-box to add the file to the `BabyNames` target is\
