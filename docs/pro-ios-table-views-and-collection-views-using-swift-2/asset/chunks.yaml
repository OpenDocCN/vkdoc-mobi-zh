    `delegate` is consulted about the permissibility of moving the row.   The row
    gets moved.   The data model is updated.


    #### Entering Editing Mode


    In order to rearrange rows, the table needs to be in editing mode. As with deletions,
    there are two ways of doing this. In the case of `UITableViewController` subclasses,
    the user can tap the navigation bar’s Edit button or override the `tableView`’s
