    \ itself\n*   `gender`: A string containing a gender flag of `M`, `F`, or `U`\
    \ (for unisex)\n*   `derivation`: A string containing some text about the derivation\
    \ of the name\n*   `iconName`: A string containing the filename of the name's\
    \ icon\n*   `notes`: A string containing some explanatory notes about the name\n\
    \nLet's get this underway. Highlight the `Models` group in the navigator area\
