    I’m going to illustrate the MVVM approach with a `UITableView` example, but everything
    that applies to MVVM in a table view context also applies to MVVM and `UICollectionViews`.


    The split between controller and view is reasonably obvious: the table is the
    view, and the view controller that acts as the table’s datasource and delegate
    is the controller.


    But views are a little more complicated than that; cells are also view objects,
    and the data source has to be aware of cells in order to configure them in `the
    tableView:cellForRow ➤AtIndexPath`: function. This means that the datasource has
    to be concerned with the internal structure of the cells so it can set outlets.


    If you change your data model, you must change both cell and datasource. If you
    have multiple cell types, your `cellForRowAtIndexPath:` function can quickly become
    messy with if-then statements checking which kind of cell is being configured.
    Big, complex logic statements like this are a code smell: hard to read, hard to
    understand, hard to test, and hard to debug.


    MVVM changes this approach radically, but with one very simple change.


    You start by focusing the responsibility of the datasource. It does two things:
    gets the relevant object from the underlying data model, and passes it to a cell
    before handing the cell off to the table. It neither knows nor cares about the
    internal structure of the cell; as far as the datasource is concerned, the cell
    has a single property that can be set, the view model.


    The view model is the object that contains all the data that the cell will require
    to configure itself. In an address book app, this might be a `Contact` object
    containing name, phone numbers, and email addresses. Crucially, it’s not tailored
    in any way to the specific needs of the cell. Even if the cell will only be displaying
    phone numbers, you pass the whole `Contact` object into the cell subclass.


    Figure [8-13](#A978-1-4842-1242-4_8_Chapter.html#Fig13) shows how the model, the
    view model, and the controllers interrelate.


    ![A978-1-4842-1242-4_8_Fig13_HTML.jpg](A978-1-4842-1242-4_8_Fig13_HTML.jpg)


    Figure 8-13.


    The model-view-view model relationship


    The cell is responsible for managing its own layout. It will take the relevant
    attributes of the view model, say the phone number fields, and ignore the others.
    It will use the relevant attributes to set up its view outlets, text field contents,
    and so on, as well as handling AutoLayout constraints and so on. You can even
    go one stage further and use a property observer so that the layout processes
    are triggered automatically whenever the view model property is set.'
  trans: "\n### 重写 `layoutSubviews` 函数\n\n当单元格被出队时，会调用其 `layoutSubviews` 函数；这是在绘制前调整单元格布局和外观、以及根据传入单元格的数据模型设置任何控件内容的绝佳机会。\n\
    \n为了说明其实际工作方式，让我们来看看集合视图应用的 `viewController` 类中的 `cellForItemAtIndexPath:` 函数，如代码清单\
    \ [8-11] 所示。\n\n**代码清单 8-11.** 集合视图的 `cellForItemAtIndexPath:` 函数\n```\nfunc collectionView(collectionView:\
    \ UICollectionView, cellForItemAtIndexPath\nindexPath: NSIndexPath) -> UICollectionViewCell\
    \ {\n    let cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"CustomCVCell\"\
    ,\nforIndexPath: indexPath) as! CustomCell\n    cell.cellTitle = cvData[indexPath.row]\n\
    \    return cell\n}\n```\n你之前已经见过这种模式。你使用单元格标识符将单元格出队，然后将其向下转型为自定义类的实例。\n\n这样，你就能访问单元格的属性，将数据模型中的相关对象传入，然后将单元格返回给集合视图。\n\
    \n**代码清单 8-12.** 集合视图的 `cellForItemAtIndexPath:` 函数\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\n-> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CustomTVCell\"\
    ,\n    forIndexPath: indexPath) as! CustomClassCell\n    cell.cellTitle = \"Cell\
    \ \\(tableData[indexPath.row])...\"\n    cell.cellSubtitle = \"...\\(tableData[indexPath.row])\
    \ lleC\"\n    return cell\n}\n```\n在幕后，单元格的 `init` 和 `layoutSubviews` 函数被依次调用：\n\
    \n- 当单元格的新实例被初始化时，会调用 `init` 函数。这只会在创建最开始的几个单元格时发生；之后，表格或集合视图会缓存滚出视图顶部或底部的单元格以供重用。\n\
    - `layoutSubviews` 函数恰好在单元格显示之前被调用，因此这是你更新单元格控件以显示出队时传入数据的好时机。\n\n### 重写 `prepareForReuse`\
    \ 函数\n\n`prepareForReuse()` 函数在单元格从 `dequeueReusableCellWithIdentifier:` 或 `dequeueReusableViewWithIdentifier:`\
    \ 函数返回之前被调用。\n\n这是在单元格被重用之前清理它的最后机会，但在重写此函数时有几点需要注意：\n\n- 始终确保在函数开头通过 `super.prepareForReuse()`\
    \ 调用父类的实现。\n- 仅使用此函数来重置单元格的非内容属性——比如透明度、编辑或选择属性。使用它来更改与内容相关的控件可能会对性能产生负面影响。\n\n\
    ## 使用 MVVM 改进应用架构\n\n`UITableView` 和 `UICollectionView` 是复杂的“野兽”，它们依赖大量“活动部件”才能工作：表格和集合视图对象、单元格、数据源、委托以及视图控制器。所有这些部件都必须协同工作才能产生预期的效果。\n\
    \n活动部件的数量可能导致应用中类的职责模糊。例如，到目前为止你多次见到的一个非常常见的模式是，一个 `UIViewController` 同时充当表格或集合视图的\
    \ `dataSource` 和 `delegate`。\n\n这本身并没有错，但一个执行多项任务的类通常被视为代码异味：(该类)更难编写、编写后更难理解、更难测试，也更难调试。\n\
    \n面向对象软件中最重要的设计模式之一是**单一职责原则**，可以概括为“做好一件事，并且做好它。”模型-视图-视图模型（或 MVVM）方法是实现这一目标的一种方式。\n\
    \n### 模型-视图-视图模型方法\n\n要理解 MVVM 模型，最好先从查看组织表格视图项目的“传统”方法开始。\n\n> **注意：** 我将用一个\
    \ `UITableView` 示例来说明 MVVM 方法，但所有适用于表格视图上下文中 MVVM 的内容也同样适用于 MVVM 和 `UICollectionView`。\n\
    \n控制器和视图之间的划分是相当明显的：表格是视图，而充当表格数据源和委托的视图控制器是控制器。\n\n但视图稍微复杂一些；单元格也是视图对象，数据源必须了解单元格，以便在\
    \ `tableView:cellForRowAtIndexPath:` 函数中配置它们。这意味着数据源必须关注单元格的内部结构，以便能够设置其输出口。\n\
    \n如果你更改了数据模型，就必须同时更改单元格和数据源。如果你有多个单元格类型，你的 `cellForRowAtIndexPath:` 函数会很快因为检查正在配置的是哪种单元格的\
    \ if-then 语句而变得混乱不堪。像这样庞大复杂的逻辑语句是一种代码异味：难以阅读、难以理解、难以测试，也难以调试。\n\nMVVM 从根本上改变了这种方法，但仅通过一个非常简单的改变。\n\
    \n你首先专注于数据源的职责。它做两件事：从底层数据模型中获取相关对象，并将其传递给单元格，然后将单元格交给表格。它既不知道也不关心单元格的内部结构；就数据源而言，单元格有一个可以设置的单一属性，即**视图模型**。\n\
    \n视图模型是包含单元格自配置所需所有数据的对象。在通讯录应用中，这可能是一个包含姓名、电话号码和电子邮件地址的 `Contact` 对象。关键的是，它不以任何方式针对单元格的特定需求进行定制。即使单元格只显示电话号码，你也会将整个\
    \ `Contact` 对象传递给单元格子类。\n\n**图 8-13** 展示了模型、视图模型和控制器之间的相互关系。\n\n![A978-1-4842-1242-4_8_Fig13_HTML.jpg](img/A978-1-4842-1242-4_8_Fig13_HTML.jpg)\n\
    \n**图 8-13.** 模型-视图-视图模型关系\n\n单元格负责管理自己的布局。它将获取视图模型的相关属性（比如电话号码字段），而忽略其他属性。它将使用相关属性来设置其视图出口、文本字段内容等，以及处理\
    \ AutoLayout 约束等。你甚至还可以更进一步，使用属性观察器，以便在视图模型属性被设置时自动触发布局过程。\n"
- fmt: "### Advantages and Disadvantages of MVVM\n\nEmploying a model-view-view model\
    \ approach brings several advantages:\n\n- The data source class of the table\
    \ view no longer needs to be aware of the internal structure of the cell.\n- Cell\
    \ types can be swapped in and out much more easily, with significantly less code\
    \ in the datasource class.\n- It becomes much easier to update and adapt cells.\
    \ Again, there’s no need to keep the datasource and cell classes in sync.\n- It\
    \ makes testing cell subclasses much easier, as you don’t need to wrangle the\
    \ datasource class to generate and feed model objects in the cell instance during\
    \ the test.\n\nThe MVVM approach does have a couple of drawbacks, however:\n\n\
    - It’s not a “standard” Apple design pattern, so there’s no “native” implementation\
    \ to use as a starting point.\n- The division of responsibilities is offset by\
    \ the need for some more “moving parts.” Your cell classes need to be more complex\
    \ than they would be if they were simpler “passive” components.\n\nEven with these\
    \ disadvantages, I’m firmly of the opinion that MVVM is a useful design pattern\
    \ that can make your table and collection views a lot easier to configure and\
    \ maintain.\n\n### Implementing the MVVM Approach\n\nTo illustrate the MVVM approach,\
    \ you’re going to use it to power a very simple example. The table in this project\
    \ will display the contents of a `Contact` object: `name`, `number`, and `notes`.\
    \ To keep things as simple as possible, all three `Contact` properties are `Strings`.\n\
    \nYou’ll model the `Contact` object as a `Struct`, shown in Listing [8-13](#A978-1-4842-1242-4_8_Chapter.html#FPar19).\n\
    \nListing 8-13. The Contact struct\n\n```\nstruct Contact {\n    var name: String?\n\
    \    var number: String?\n    var notes: String?\n    init(name: String, number:\
    \ String, notes: String) {\n        self.name = name\n        self.number = number\n\
    \        self.notes = notes\n    }\n}\n```\n\nThe `Contacts` will be stored in\
    \ an `Array` that is set up by a function called from the table view controller’s\
    \ `viewDidLoad` function (shown in Listing [8-14](#A978-1-4842-1242-4_8_Chapter.html#FPar20)).\n\
    \nListing 8-14. The `setupData` Function\n\n```\nextension ViewController {\n\
    \    func setupData() {\n        for index in 1...10 {\n            let contact\
    \ = Contact(name: \"Name \\(index)\", number: \"\\(index)\", notes: \"The notes\
    \ for contact \\(index)\")\n            tableData.append(contact)\n        }\n\
    \    }\n}\n```\n\nThe cells displayed in the table are instances of a custom `UITableViewCell`\
    \ subclass called `ContactCell` (shown in Listing [8-15](#A978-1-4842-1242-4_8_Chapter.html#FPar21)).\n\
    \nListing 8-15. The `ContactCell` Class\n\n```\nimport UIKit\n\nclass ContactCell:\
    \ UITableViewCell {\n    @IBOutlet var nameLabel: UILabel!\n    @IBOutlet var\
    \ numberLabel: UILabel!\n    @IBOutlet var descriptionLabel: UILabel!\n}\n```\n\
    \nThe three outlets are connected to `UILabel` controls in the prototype cell\
    \ in the Storyboard, as shown in Figure [8-14](#A978-1-4842-1242-4_8_Chapter.html#Fig14).\n\
    \n![A978-1-4842-1242-4_8_Fig14_HTML.jpg](A978-1-4842-1242-4_8_Fig14_HTML.jpg)\n\
    \nFigure 8-14. The prototype cell\n\nWith everything wired together, you can turn\
    \ your attention to setting up the `UITableViewDataSource` functions to configure\
    \ and feed the cells to the table.\n\nUp to now, you’ve used a very standard approach\
    \ that uses the `cellForRowAtIndexPath:` function to configure the cell. This\
    \ is shown in Listing [8-16](#A978-1-4842-1242-4_8_Chapter.html#FPar22).\n\nListing\
    \ 8-16. The Standard `cellForRowAtIndexPath:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"ContactCell\"\
    , forIndexPath: indexPath) as! ContactCell\n    let contact = tableData[indexPath.row]\n\
    \    cell.nameLabel.text = contact.name\n    cell.numberLabel.text = contact.number\n\
    \    cell.descriptionLabel.text = contact.notes\n    return cell\n}\n```\n\nRun\
    \ the project, and it will look like Figure [8-15](#A978-1-4842-1242-4_8_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1242-4_8_Fig15_HTML.jpg](A978-1-4842-1242-4_8_Fig15_HTML.jpg)\n\
    \nFigure 8-15. The running project\n\nThere shouldn’t be any surprises about the\
    \ approach here. You’re dequeuing a cell as an instance of `ContactCell`, getting\
    \ the `Contact` object from the data model, and populating the cell outlets with\
    \ the contents of the `Contact`’s properties.\n\nHowever, it’s also possible to\
    \ see some of the pitfalls of this approach:\n\n- You’ve blurred the separations\
    \ of concern between the cell subclass and the view controller, because the view\
    \ controller is directly referencing the cell outlets.\n- Any changes in the cell\
    \ subclass or `Contact` object have to be reflected in the table view controller.\n\
    - If you want to test the cell subclass, you must figure out a way to wrangle\
    \ the view controller so that you can populate the cell’s outlets.\n\nSurely there\
    \ has to be a more efficient way. Good news! There is."
  raw: '### Advantages and Disadvantages of MVVM


    Employing a model-view-view model approach brings several advantages:


    *   The data source class of the table view no longer needs to be aware of the
    internal structure of the cell.

    *   Cell types can be swapped in and out much more easily, with significantly
    less code in the datasource class.

    *   It becomes much easier to update and adapt cells. Again, there’s no need to
    keep the datasource and cell classes in sync.

    *   It makes testing cell subclasses much easier, as you don’t need to wrangle
    the datasource class to generate and feed model objects in the cell instance during
    the test.


    The MVVM approach does have a couple of drawbacks, however:


    *   It’s not a “standard” Apple design pattern, so there’s no “native” implementation
    to use as a starting point.

    *   The division of responsibilities is offset by the need for some more “moving
    parts.” Your cell classes need to be more complex than they would be if they were
    simpler “passive” components.


    Even with these disadvantages, I’m firmly of the opinion that MVVM is a useful
    design pattern that can make your table and collection views a lot easier to configure
    and maintain.


    ### Implementing the MVVM Approach


    To illustrate the MVVM approach, you’re going to use it to power a very simple
    example. The table in this project will display the contents of a `Contact` object:
    `name`, `number`, and `notes`. To keep things as simple as possible, all three
    `Contact` properties are `Strings`.


    You’ll model the `Contact` object as a `Struct`, shown in Listing [8-13](#A978-1-4842-1242-4_8_Chapter.html#FPar19).


    Listing 8-13. The Contact struct


    `struct Contact {`


        `var name: String?`


        `var number: String?`


        `var notes: String?`


        `init(name: String, number: String, notes: String) {`


            `self.name = name`


            `self.number = number`


            `self.notes = notes`


        `}`


    `}`


    The `Contacts` will be stored in an `Array` that is set up by a function called
    from the table view controller’s `viewDidLoad` function (shown in Listing [8-14](#A978-1-4842-1242-4_8_Chapter.html#FPar20)).


    Listing 8-14. The setupDate Function


    `extension ViewController {`


        `func setupData() {`


            `for index in 1...10 {`


                `let contact = Contact(name: "Name \(index)", number: "\(index)",
    notes:➤`


    `"The notes for contact \(index)")`


                `tableData.append(contact)`


            `}`


        `}`


    `}`


    The cells displayed in the table are instances of a custom `UITableViewCell` subclass
    called `ContactCell` (shown in Listing [8-15](#A978-1-4842-1242-4_8_Chapter.html#FPar21)).


    Listing 8-15. The ContactCell Class


    `import UIKit`


    `class ContactCell: UITableViewCell {`


        `@IBOutlet var nameLabel: UILabel!`


        `@IBOutlet var numberLabel: UILabel!`


        `@IBOutlet var descriptionLabel: UILabel!`


    `}`


    The three outlets are connected to `UILabel` controls in the prototype cell in
    the Storyboard, as shown in Figure [8-14](#A978-1-4842-1242-4_8_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_8_Fig14_HTML.jpg](A978-1-4842-1242-4_8_Fig14_HTML.jpg)


    Figure 8-14.


    The prototype cell


    With everything wired together, you can turn your attention to setting up the
    `UITableViewDataSource` functions to configure and feed the cells to the table.


    Up to now, you’ve used a very standard approach that uses the `cellForRowAtIndexPath:`
    function to configure the cell. This is show in Listing [8-16](#A978-1-4842-1242-4_8_Chapter.html#FPar22).


    Listing 8-16. The Standard cellForRowAtIndexPath: Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    -> ➤ UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("ContactCell", forIndexPath:
    ➤ indexPath) as! ContactCell`


        `let contact = tableData[indexPath.row]`


        `cell.nameLabel.text = contact.name`


        `cell.numberLabel.text = contact.number`


        `cell.descriptionLabel.text = contact.notes`


        `return cell`


    `}`


    Run the project, and it will look like Figure [8-15](#A978-1-4842-1242-4_8_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_8_Fig15_HTML.jpg](A978-1-4842-1242-4_8_Fig15_HTML.jpg)


    Figure 8-15.


    The running project


    There shouldn’t be any surprises about the approach here. You’re dequeuing a cell
    as an instance of `ContactCell`, getting the `Contact` object from the data model,
    and populating the cell outlets with the contents of the `Contact`’s properties.


    However, it’s also possible to see some of the pitfalls of this approach:


    *   You’ve blurred the separations of concern between the cell subclass and the
    view controller, because the view controller is directly referencing the cell
    outlets.

    *   Any changes in the cell subclass or `Contact` object have to be reflected
    in the table view controller.

    *   If you want to test the cell subclass, you must figure out a way to wrangle
    the view controller so that you can populate the cell’s outlets.


    Surely there has to be a more efficient way. Good news! There is.'
  trans: "\n### MVVM 的优缺点\n\n采用模型-视图-视图模型（MVVM）方法带来了若干优势：\n\n- 表格视图的数据源类无需再了解单元格的内部结构。\n\
    - 单元格类型的替换变得更加轻松，数据源类中的代码量显著减少。\n- 更新和适配单元格变得更加容易。同样，无需保持数据源和单元格类的同步。\n- 它使得测试单元格子类更加简便，因为在测试过程中你无需费心去操控数据源类来生成模型对象并将其馈送到单元格实例中。\n\
    \n然而，MVVM 方法也确实存在一些缺点：\n\n- 它并非“标准”的 Apple 设计模式，因此没有现成的“原生”实现方案可以作为起点。\n- 职责分工的代价是需要引入一些额外的“活动部件”。你的单元格类需要比将其设计为更简单的“被动”组件时更加复杂。\n\
    \n尽管存在这些缺点，我仍然坚信 MVVM 是一种有用的设计模式，它能让你的表格和集合视图的配置与维护变得更加轻松。\n\n### 实现 MVVM 方法\n\
    \n为了演示 MVVM 方法，你将用它来驱动一个非常简单的示例。该项目中的表格将显示一个 `Contact` 对象的内容：`name`、`number` 和\
    \ `notes`。为了尽可能简化，所有三个 `Contact` 属性都是 `Strings` 类型。\n\n你将把 `Contact` 对象建模为一个 `Struct`，如代码清单\
    \ 8-13 所示。\n\n**代码清单 8-13. Contact 结构体**\n\n```\nstruct Contact {\n    var name:\
    \ String?\n    var number: String?\n    var notes: String?\n    init(name: String,\
    \ number: String, notes: String) {\n        self.name = name\n        self.number\
    \ = number\n        self.notes = notes\n    }\n}\n```\n\n这些 `Contacts` 将存储在一个\
    \ `Array` 中，该数组由表格视图控制器的 `viewDidLoad` 函数调用的一个函数来设置（如代码清单 8-14 所示）。\n\n**代码清单\
    \ 8-14. `setupData` 函数**\n\n```\nextension ViewController {\n    func setupData()\
    \ {\n        for index in 1...10 {\n            let contact = Contact(name: \"\
    Name \\(index)\", number: \"\\(index)\", notes: \"The notes for contact \\(index)\"\
    )\n            tableData.append(contact)\n        }\n    }\n}\n```\n\n表格中显示的单元格是自定义\
    \ `UITableViewCell` 子类 `ContactCell` 的实例（如代码清单 8-15 所示）。\n\n**代码清单 8-15. `ContactCell`\
    \ 类**\n\n```\nimport UIKit\n\nclass ContactCell: UITableViewCell {\n    @IBOutlet\
    \ var nameLabel: UILabel!\n    @IBOutlet var numberLabel: UILabel!\n    @IBOutlet\
    \ var descriptionLabel: UILabel!\n}\n```\n\n这三个输出口连接到故事板原型单元格中的 `UILabel` 控件，如图\
    \ 8-14 所示。\n\n![A978-1-4842-1242-4_8_Fig14_HTML.jpg](img/A978-1-4842-1242-4_8_Fig14_HTML.jpg)\n\
    \n**图 8-14. 原型单元格**\n\n一切连接就绪后，你就可以将注意力转向设置 `UITableViewDataSource` 函数，以配置并将单元格提供给表格。\n\
    \n到目前为止，你一直使用一种非常标准的方法，即通过 `cellForRowAtIndexPath:` 函数来配置单元格。如代码清单 8-16 所示。\n\n\
    **代码清单 8-16. 标准的 `cellForRowAtIndexPath:` 函数**\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"ContactCell\"\
    , forIndexPath: indexPath) as! ContactCell\n    let contact = tableData[indexPath.row]\n\
    \    cell.nameLabel.text = contact.name\n    cell.numberLabel.text = contact.number\n\
    \    cell.descriptionLabel.text = contact.notes\n    return cell\n}\n```\n\n运行项目，效果将如图\
    \ 8-15 所示。\n\n![A978-1-4842-1242-4_8_Fig15_HTML.jpg](img/A978-1-4842-1242-4_8_Fig15_HTML.jpg)\n\
    \n**图 8-15. 运行中的项目**\n\n对于这种方法，应该不会有什么意外之处。你将一个单元格出队作为 `ContactCell` 的实例，从数据模型中获取\
    \ `Contact` 对象，然后用 `Contact` 属性的内容填充单元格的输出口。\n\n然而，也能看出这种方法的一些弊端：\n\n- 你模糊了单元格子类和视图控制器之间的关注点分离，因为视图控制器直接引用了单元格的输出口。\n\
    - 单元格子类或 `Contact` 对象的任何更改都必须反映在表格视图控制器中。\n- 如果你想测试单元格子类，必须想办法操控视图控制器，以便能够填充单元格的输出口。\n\
    \n肯定有一种更高效的方法。好消息！确实是有的。\n"
- fmt: "### Converting the Project to an MVVM Approach\n\nYou’re going to convert\
    \ the project to a model-view-view model approach by passing the `Contact` object\
    \ directly to the `ContactCell` instance, and letting the cell configure itself.\n\
    \nThe view controller won’t know, or care, what outlets the cell has. Instead,\
    \ you’ll update the `cellForRowAtIndexPath:` function to remove all references\
    \ to the cell outlets.\n\nThis is an example of an approach known as dependency\
    \ injection: the `ContactCell` has a dependency on the `Contact` object to populate\
    \ its outlets, and you’re going to inject that `Contact` object into the `ContactCell`\
    \ immediately after you’ve dequeued it.\n\nListing [8-17](#A978-1-4842-1242-4_8_Chapter.html#FPar23)\
    \ shows what the updated `cellForRowAtIndexPath:` function looks like.\n\n**Listing\
    \ 8-17.** The Updated `cellForRowAtIndexPath:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) ➤\n-> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"ContactCell\"\
    , ➤\n        forIndexPath: indexPath) as! ContactCell\n    let contact = tableData[indexPath.row]\n\
    \    cell.contact = contact\n    return cell\n}\n```\n\nStraight away you can\
    \ see that the function is much more streamlined, and the difference would be\
    \ even more dramatic if the cell was more complex than this admittedly trivial\
    \ example.\n\nHowever, this won’t compile as it stands. You need to make some\
    \ changes to the `CustomCell` class to allow it to accept the injection of the\
    \ `Contact` dependency.\n\nListing [8-18](#A978-1-4842-1242-4_8_Chapter.html#FPar24)\
    \ shows the initial changes.\n\n**Listing 8-18.** The `ContactCell` Class Updated\
    \ to Receive an Injected `Contact`\n\n```\nimport UIKit\n\nclass ContactCell:\
    \ UITableViewCell {\n    var contact: Contact?\n\n    @IBOutlet var nameLabel:\
    \ UILabel!\n    @IBOutlet var numberLabel: UILabel!\n    @IBOutlet var notesLabel:\
    \ UILabel!\n}\n```\n\nThis gets you part of the way, but if you run the project\
    \ now you’ll see that the cells aren’t displaying any data. Figure [8-16](#A978-1-4842-1242-4_8_Chapter.html#Fig16)\
    \ shows the effect.\n\n![A978-1-4842-1242-4_8_Fig16_HTML.jpg](A978-1-4842-1242-4_8_Fig16_HTML.jpg)\n\
    \n**Figure 8-16.** Cells no longer being updated\n\nPreviously, you were setting\
    \ the text property of the `UILabels` in the `cellForRowAtIndexPath:` function,\
    \ but as this no longer happens, the cells are no longer updated.\n\nYou need\
    \ to find some way to set the label properties once more.\n\nOne option would\
    \ be to override the `UITableViewCell`’s `layoutSubviews` function, and set the\
    \ outlets there. Listing [8-19](#A978-1-4842-1242-4_8_Chapter.html#FPar25) shows\
    \ how you could do that.\n\n**Listing 8-19.** Using `layoutSubviews` to Update\
    \ the Outlets\n\n```\noverride func layoutSubviews() {\n    nameLabel.text = contact?.name\n\
    \    numberLabel.text = contact?.number\n    notesLabel.text = contact?.notes\n\
    }\n```\n\nAlthough this would certainly work, there is a disconnect between setting\
    \ the `Contact` property in the cell and updating the outlets. Is there a way\
    \ of tying the two things closer together?\n\nAs it turns out, there is. Swift\
    \ class and struct properties allow you to attach property observers. These are\
    \ inline functions that are called whenever a property is set, and they allow\
    \ you to perform arbitrary tasks every time you access a property to set it.\n\
    \nThere are two property observers available to us:\n\n*   `willSet` is called\
    \ just before a value is stored in the property.\n*   `didSet` is called just\
    \ after a value is stored in the property.\n\nThis means you can use the cell’s\
    \ contact property’s `didSet` observer to update the outlets with the values of\
    \ the `Contact` object that’s just been injected into the `CustomCell` instance.\n\
    \nListing [8-20](#A978-1-4842-1242-4_8_Chapter.html#FPar26) shows the updated\
    \ `CustomCell` class.\n\n**Listing 8-20.** The Updated `CustomCell` Class\n\n\
    ```\nimport UIKit\n\nclass ContactCell: UITableViewCell {\n    var contact: Contact?\
    \ {\n        didSet {\n            nameLabel.text = contact?.name\n          \
    \  numberLabel.text = contact?.number\n            notesLabel.text = contact?.notes\n\
    \        }\n    }\n\n    @IBOutlet var nameLabel: UILabel!\n    @IBOutlet var\
    \ numberLabel: UILabel!\n    @IBOutlet var notesLabel: UILabel!\n}\n```\n\nHere,\
    \ you’re using the `didSet` observer to update the `nameLabel`, `numberLabel`,\
    \ and `notesLabel` outlets with the relevant property from the `Contact` object.\
    \ Whenever a new `Contact` object is passed in, such as when a `ContactCell` is\
    \ dequeued in the `cellForRowAtIndexPath:` function, the cell outlets will be\
    \ updated automatically.\n\nHaving updated the `ContactCell` class, run the project\
    \ again, and you’ll see the rows being populated once more, as shown in Figure\
    \ [8-17](#A978-1-4842-1242-4_8_Chapter.html#Fig17).\n\n![A978-1-4842-1242-4_8_Fig17_HTML.jpg](A978-1-4842-1242-4_8_Fig17_HTML.jpg)\n\
    \n**Figure 8-17.** Cells updated after dependency injection\n\n## Summary\n\n\
    In this chapter, you saw how to create your own custom subclass of `UITableViewCell`\
    \ to give you the ultimate in control over the appearance and functions of your\
    \ cells.\n\nThere’s a range of approaches that you can use to tackle custom cells:\n\
    \n*   Combine a custom subclass with a XIB file.\n*   Replace the need for a XIB\
    \ file by building the cell entirely in code.\n*   Modify a standard cell type\
    \ by overriding `layoutSubviews`.\n\nChoosing the approach to take is a case of\
    \ trading off the level of control you need over the cell against the complexity\
    \ and additional code overhead of each technique. Another factor is performance;\
    \ custom subclasses allow you to take advantage of various techniques that can\
    \ speed up the performance of your table views.\n\n# 9. Improving Interaction\n\
    \nSo far, the cells that you have been creating have been relatively static: the\
    \ user’s interaction with them has been limited to tapping for selection and editing.\n\
    \nThat’s not all you can do with cells, though, so this chapter looks at some\
    \ of the tricks you can use to make table and collection views truly interactive:\n\
    \n*   Embedding custom controls including buttons, switches, and sliders within\
    \ the cell\n*   Implementing the widely used pull-to-refresh functionality\n*\
    \   Adding gesture recognizers to cells to support double taps and so on\n*  \
    \ Implementing search within the contents of the view\n\nNo matter how interactive\
    \ the view is, however, it’s not going to deliver a good user experience if it’s\
    \ not responsive. Although we’ve been covering best-practice as we’ve gone along\
    \ in earlier chapters, this chapter finishes up by looking at a checklist of ways\
    \ to ensure that you squeeze maximum performance from your table and collection\
    \ views.\n\n**Note**\n\nThe techniques in this chapter are broadly identical for\
    \ both `UITableView` and `UICollectionView`. However, if it’s something that’s\
    \ specific to just `UITableView` I’ll use “table view”; if it’s something specific\
    \ to `UICollectionView` I’ll use “collection view”; and when it’s common to both\
    \ I’ll use “view”."
  raw: '### Converting the Project to an MVVM Approach


    You’re going to convert the project to an model-view-view model approach by passing
    the `Contact` object directly to the `ContactCell` instance, and letting the cell
    configure itself..


    The view controller won’t know, or care, what outlets the cell has. Instead, you’ll
    update the `cellForRowAtIndexPath:` function to remove all references to the cell
    outlets.


    This is an example of an approach known as dependency injection: the `ContactCell`
    has a dependency on the `Contact` object to populate its outlets, and you’re going
    to inject that `Contact` object into the `ContactCell` immediately after you’ve
    dequeued it.


    Listing [8-17](#A978-1-4842-1242-4_8_Chapter.html#FPar23) shows what the updated
    `cellForRowAtIndexPath:` function looks like.


    Listing 8-17. The Updated cellForRowAtIndexPath: Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


    `let cell = tableView.dequeueReusableCellWithIdentifier("ContactCell", ➤`


    `forIndexPath: indexPath) as! ContactCell`


    `let contact = tableData[indexPath.row]`


    `cell.contact = contact`


    `return cell`


    `}`


    Straight away you can see that the function is much more streamlined, and the
    difference would be even more dramatic if the cell was more complex than this
    admittedly trivial example.


    However, this won’t compile as it stands. You need to make some changes to the
    `CustomCell` class to allow it to accept the injection of the `Contact` dependency.


    Listing [8-18](#A978-1-4842-1242-4_8_Chapter.html#FPar24) shows the initial changes.


    Listing 8-18. The ContactCell Class Updated to Receive an Injected Contact


    `import UIKit`


    `class ContactCell: UITableViewCell {`


    `var contact: Contact?`


    `@IBOutlet var nameLabel: UILabel!`


    `@IBOutlet var numberLabel: UILabel!`


    `@IBOutlet var notesLabel: UILabel!`


    `}`


    This gets you part of the way, but if you run the project now you’ll see that
    the cells aren’t displaying any data. Figure [8-16](#A978-1-4842-1242-4_8_Chapter.html#Fig16)
    shows the effect.


    ![A978-1-4842-1242-4_8_Fig16_HTML.jpg](A978-1-4842-1242-4_8_Fig16_HTML.jpg)


    Figure 8-16.


    Cells no longer being updated


    Previously, you were setting the text property of the `UILabels` in the `cellForRowAtIndexPath:`
    function, but as this no longer happens, the cells are no longer updated.


    You need to find some way to set the label properties once more.


    One option would be to override the `UITableViewCell`’s `layoutSubviews` function,
    and set the outlets there. Listing [8-19](#A978-1-4842-1242-4_8_Chapter.html#FPar25)
    shows how you could do that.


    Listing 8-19. Using layoutSubviews to Update the Outlets


    `override func layoutSubviews() {`


    `nameLabel.text = contact?.name`


    `numberLabel.text = contact?.number`


    `notesLabel.text = contact?.notes`


    `}`


    Although this would certainly work, there is a disconnect between setting the
    `Contact` property in the cell and updating the outlets. Is there a way of tying
    the two things closer together?


    As it turns out, there is. Swift class and struct properties allow you to attach
    property observers. These are inline functions that are called whenever a property
    is set, and they allow you to perform arbitrary tasks every time you access a
    property to set it.


    There are two property observers available to us:


    *   `willSet` is called just before a value is stored in the property.

    *   `didSet` is called just after a value is stored in the property.


    This means you can use the cell’s contact property’s `didSet` observer to update
    the outlets with the values of the `Contact` object that’s just been injected
    into the `CustomCell` instance.


    Listing [8-20](#A978-1-4842-1242-4_8_Chapter.html#FPar26) shows the updated `CustomCell`
    class.


    Listing 8-20. The Updated CustomCell Class


    `import UIKit`


    `class ContactCell: UITableViewCell {`


    `var contact: Contact? {`


    `didSet {`


    `nameLabel.text = contact?.name`


    `numberLabel.text = contact?.number`


    `notesLabel.text = contact?.notes`


    `}`


    `}`


    `@IBOutlet var nameLabel: UILabel!`


    `@IBOutlet var numberLabel: UILabel!`


    `@IBOutlet var notesLabel: UILabel!`


    `}`


    Here, you’re using the `didSet` observer to update the `nameLabel`, `numberLabel`,
    and `notesLabel` outlets with the relevant property from the `Contact` object.
    Whenever a new `Contact` object is passed in, such as when a `ContactCell` is
    dequeued in the `cellForRowAtIndexPath:` function, the cell outlets will be updated
    automatically.


    Having updated the `ContactCell` class, run the project again, and you’ll see
    the rows being populated once more, as shown in Figure [8-17](#A978-1-4842-1242-4_8_Chapter.html#Fig17).


    ![A978-1-4842-1242-4_8_Fig17_HTML.jpg](A978-1-4842-1242-4_8_Fig17_HTML.jpg)


    Figure 8-17.


    Cells updated after dependency injection


    ## Summary


    In this chapter, you saw how to create your own custom subclass of `UITableViewCell`
    to give you the ultimate in control over the appearance and functions of your
    cells.


    There’s a range of approaches that you can use to tackle custom cells:


    *   Combine a custom subclass with a XIB file.

    *   Replace the need for a XIB file by building the cell entirely in code.

    *   Modify a standard cell type by overriding `layoutSubviews`.


    Choosing the approach to take is a case of trading off the level of control you
    need over the cell against the complexity and additional code overhead of each
    technique. Another factor is performance; custom subclasses allow you to take
    advantage of various techniques that can speed up the performance of your table
    views.


    # 9. Improving Interaction


    So far, the cells that you have been creating have been relatively static: the
    user’s interaction with them has been limited to tapping for selection and editing.


    That’s not all you can do with cells, though, so this chapter looks at some of
    the tricks you can use to make table and collection views truly interactive:


    *   Embedding custom controls including buttons, switches, and sliders within
    the cell

    *   Implementing the widely used pull-to-refresh functionality

    *   Adding gesture recognizers to cells to support double taps and so on

    *   Implementing search within the contents of the view


    No matter how interactive the view is, however, it’s not going to deliver a good
    user experience if it’s not responsive. Although we’ve been covering best-practice
    as we’ve gone along in earlier chapters, this chapter finishes up by looking at
    a checklist of ways to ensure that you squeeze maximum performance from your table
    and collection views.


    Note


    The techniques in this chapter are broadly identical for both `UITableView` and
    `UICollectionView`. However, if it’s something that’s specific to just `UITableView`
    I’ll use “table view”; if it’s something specific to `UICollectionView` I’ll use
    “collection view”; and when it’s common to both I’ll use “view”.'
  trans: "\n### 将项目转换为 MVVM 架构\n\n你将通过将 `Contact` 对象直接传递给 `ContactCell` 实例，并让单元格自行配置，从而将项目转换为模型-视图-视图模型架构。\n\
    \n视图控制器将不知道也不关心单元格拥有哪些输出口。相反，你将更新 `cellForRowAtIndexPath:` 函数，移除所有对单元格输出口的引用。\n\
    \n这是一种称为依赖注入的架构示例：`ContactCell` 依赖 `Contact` 对象来填充其输出口，你将在此单元格出列后立即将 `Contact`\
    \ 对象注入到 `ContactCell` 中。\n\n列表 8-17 展示了更新后的 `cellForRowAtIndexPath:` 函数。\n\n**列表\
    \ 8-17.** 更新后的 `cellForRowAtIndexPath:` 函数\n\n```\nfunc tableView(tableView: UITableView,\
    \ cellForRowAtIndexPath indexPath: NSIndexPath) ➤\n-> UITableViewCell {\n    let\
    \ cell = tableView.dequeueReusableCellWithIdentifier(\"ContactCell\", ➤\n    \
    \    forIndexPath: indexPath) as! ContactCell\n    let contact = tableData[indexPath.row]\n\
    \    cell.contact = contact\n    return cell\n}\n```\n\n你可以立即看到该函数变得更加简洁，如果单元格比这个确实简单的示例更复杂，差异会更加明显。\n\
    \n然而，这段代码目前无法编译。你需要对 `CustomCell` 类进行一些修改，使其能够接受 `Contact` 依赖项的注入。\n\n列表 8-18\
    \ 展示了初始的修改。\n\n**列表 8-18.** 更新后的 `ContactCell` 类，用于接收注入的 `Contact`\n\n```\nimport\
    \ UIKit\n\nclass ContactCell: UITableViewCell {\n    var contact: Contact?\n\n\
    \    @IBOutlet var nameLabel: UILabel!\n    @IBOutlet var numberLabel: UILabel!\n\
    \    @IBOutlet var notesLabel: UILabel!\n}\n```\n\n这解决了部分问题，但如果你现在运行项目，你会看到单元格没有显示任何数据。图\
    \ 8-16 展示了这一效果。\n\n![A978-1-4842-1242-4_8_Fig16_HTML.jpg](img/A978-1-4842-1242-4_8_Fig16_HTML.jpg)\n\
    \n**图 8-16.** 单元格不再更新\n\n之前，你是在 `cellForRowAtIndexPath:` 函数中设置 `UILabels` 的文本属性，但由于现在不再这样操作，单元格就不再更新了。\n\
    \n你需要找到某种方法再次设置标签属性。\n\n一种选择是重写 `UITableViewCell` 的 `layoutSubviews` 函数，并在那里设置输出口。列表\
    \ 8-19 展示了如何实现。\n\n**列表 8-19.** 使用 `layoutSubviews` 更新输出口\n\n```\noverride func\
    \ layoutSubviews() {\n    nameLabel.text = contact?.name\n    numberLabel.text\
    \ = contact?.number\n    notesLabel.text = contact?.notes\n}\n```\n\n尽管这肯定能奏效，但在单元格中设置\
    \ `Contact` 属性和更新输出口之间存在脱节。有没有办法将这两件事更紧密地联系在一起呢？\n\n事实证明，是有的。Swift 类和结构体的属性允许你附加属性观察器。这些内联函数会在属性被设置时被调用，它们允许你在每次访问属性并设置它时执行任意任务。\n\
    \n我们有两种可用的属性观察器：\n\n*   `willSet` 在值存储到属性之前被调用。\n*   `didSet` 在值存储到属性之后被调用。\n\n\
    这意味着你可以使用单元格的 `contact` 属性的 `didSet` 观察器，用刚刚注入到 `CustomCell` 实例中的 `Contact` 对象的值来更新输出口。\n\
    \n列表 8-20 展示了更新后的 `CustomCell` 类。\n\n**列表 8-20.** 更新后的 `CustomCell` 类\n\n```\n\
    import UIKit\n\nclass ContactCell: UITableViewCell {\n    var contact: Contact?\
    \ {\n        didSet {\n            nameLabel.text = contact?.name\n          \
    \  numberLabel.text = contact?.number\n            notesLabel.text = contact?.notes\n\
    \        }\n    }\n\n    @IBOutlet var nameLabel: UILabel!\n    @IBOutlet var\
    \ numberLabel: UILabel!\n    @IBOutlet var notesLabel: UILabel!\n}\n```\n\n在这里，你使用\
    \ `didSet` 观察器，用 `Contact` 对象中的相关属性来更新 `nameLabel`、`numberLabel` 和 `notesLabel`\
    \ 输出口。每当传入一个新的 `Contact` 对象时（例如在 `cellForRowAtIndexPath:` 函数中出列一个 `ContactCell`\
    \ 时），单元格输出口将自动更新。\n\n更新 `ContactCell` 类后，再次运行项目，你会看到行被再次填充，如图 8-17 所示。\n\n![A978-1-4842-1242-4_8_Fig17_HTML.jpg](img/A978-1-4842-1242-4_8_Fig17_HTML.jpg)\n\
    \n**图 8-17.** 依赖注入后更新的单元格\n\n## 总结\n\n在本章中，你了解了如何创建自己的 `UITableViewCell` 自定义子类，从而对单元格的外观和功能实现最大程度的控制。\n\
    \n处理自定义单元格有多种方法可供选择：\n\n*   将自定义子类与 XIB 文件结合。\n*   完全通过代码构建单元格，从而替代 XIB 文件的需求。\n\
    *   通过重写 `layoutSubviews` 来修改标准单元格类型。\n\n选择哪种方法，需要在所需控制级别与每种技术的复杂度和额外代码开销之间进行权衡。另一个因素是性能；自定义子类允许你利用各种技术来加速表视图的性能。\n\
    \n# 9. 改善交互\n\n到目前为止，你创建的单元格相对静态：用户与它们的交互仅限于点击进行选择和编辑。\n\n但这并不是你能对单元格做的全部。因此，本章研究了一些可以用于使表和集合视图真正实现交互的技巧：\n\
    \n*   在单元格中嵌入自定义控件，包括按钮、开关和滑块\n*   实现广泛使用的下拉刷新功能\n*   为单元格添加手势识别器以支持双击等操作\n* \
    \  在视图内容中实现搜索\n\n然而，无论视图的交互性有多强，如果它响应不及时，就无法提供良好的用户体验。尽管我们在前几章中一直在介绍最佳实践，但本章最后将通过一份清单来总结确保表和集合视图获得最佳性能的方法。\n\
    \n**注意**\n\n本章中的技术对于 `UITableView` 和 `UICollectionView` 大致相同。但是，如果某些内容是 `UITableView`\
    \ 特有的，我将使用“表视图”；如果某些内容是 `UICollectionView` 特有的，我将使用“集合视图”；如果两者通用，我将使用“视图”。\n"
- fmt: "# Embedding Custom Controls into Cells\n\nUp to now, you've been mainly concerned\
    \ with creating and presenting largely static views. Although you've created cells\
    \ that present dynamic data, the cells themselves have so far only responded to\
    \ the basic taps and swipes associated with editing, deleting, and sorting.\n\n\
    Because both `UITableViewCell` and `UICollectionViewCell` are subclassed of `UIView`,\
    \ this allows you to do pretty much anything you can do with a \"standard\" `UIView`.\
    \ This includes embedding custom controls such as buttons, sliders, and switches\
    \ as subviews, and having them respond to user actions.\n\nTo begin with, here's\
    \ a really trivial example. Each cell contains a `UIButton` that pops up an alert\
    \ view when it's tapped, as shown in Figure [9-1](#A978-1-4842-1242-4_9_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1242-4_9_Fig1_HTML.jpg](A978-1-4842-1242-4_9_Fig1_HTML.jpg)\n\n\
    Figure 9-1. Really simple buttons\n\nThere are two approaches that you can use\
    \ to implement this kind of functionality:\n\n- A simple approach, which inserts\
    \ a button directly into the cell when the cell is first created\n- A more robust\
    \ approach, which uses a custom cell class and delegation.\n\nIn this section,\
    \ we'll look at the simple approach; and then build up to a more robust solution\
    \ in the next section.\n\n## A Simple Approach – Adding a Button Directly To The\
    \ Cell\n\nI'm not going to go into detail about the main aspects of creating the\
    \ table or collection view — that's pretty familiar by now — but there are two\
    \ things you need to do in order to create the button and the alert view.\n\n\
    ### Creating an Alert View\n\nThe first is to create a function to display the\
    \ alert view when one of the buttons is tapped; this should go in an extension\
