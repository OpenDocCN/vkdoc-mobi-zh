    ## Summary


    In this chapter, you looked at the process of going beyond the constraints of
    flow layout to something that’s completely customized. You learned how to create
    custom `UICollectionViewFlowLayout` classes and calculate the layout attributes
    needed to place views according to your design.


    Using combinations of all of these techniques, you can now create custom layouts.
    In the next chapter, you’re going to take things a few stages further.


    # 17. Animated and Interactive Collection Views


    Combine the flexibility of the collection view with the tactile user interface
    of iOS devices, and you’ve got a world of interface possibilities to explore.
    One of the most satisfying approaches from a user interaction perspective is combining
    collection views with gesture recognizers to build truly interactive interfaces.


    So far, you’ve mainly looked at collection views with fairly static layouts, albeit
    with some scrolling. But `UICollectionView` is capable of doing much more. It
    has sophisticated support for reacting to user interaction through gesture; and
    by using custom layouts, you can bring your collection views to life with animations.


    In this chapter, you’ll look first at controlling collection views with gestures.
    By implementing gesture recognizers that update layout attributes, you can make
    your collection views react to user interaction in naturalistic ways.


    You’ll also look at enhancing the user experience by animating collection view
    transitions such as insertion and deletion. In conjunction with the powerful iOS
    animation APIs, you can create fluid and engaging interfaces with ease.


    ## Controlling Collection Views with Gestures


    iOS devices are inherently interactive and tactile. The touch screens allow apps
    to create interfaces that offer interaction possibilities much more flexible than
    anything that’s achievable with a keyboard and mouse.


    The family of `UIGestureRecognizer` classes provide easy but powerful ways to
    allow your users to control apps with interactive gestures such as taps, pans,
    swipes, and pinches. You can very easily combine `UICollectionViewLayouts` with
    gesture recognizers to build immersive interfaces.


    In [Chapter 12](#A978-1-4842-1242-4_12_Chapter.html), you saw how to build collection
    views that allowed interactive ordering and rearrangements. In this chapter, we’ll
    look at using gestures to directly control layout attributes.


    ### Connecting Gestures with Layouts


    You can very easily connect gesture recognizers to collection views. By receiving
    the gesture events and using the values obtained to update layout attributes,
    you can make your layouts interactive.


    You’ll build two separate effects that use a pinch gesture to control a flow layout.
    In the first, you’ll update the item spacing; in the second, you’ll control item
    sizing.


    The basic approach is very simple:


    *   Create a `UIGestureRecognizer` to handle the type of interaction you need,
    in this case a `UIPinchGestureRecognizer.`

    *   Install this gesture recognizer on the collection view controller.

    *   Implement the callback functions to receive the data relating to the gestures.

    *   Use these values to update the attributes of the collection view’s layout.


    To speed things up, you can use the base project from the [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html)
    source code in the book’s GitHub repo. This creates a `UITabBarController`-based
    project with two tabs, each containing a collection view. Both display 20 items
    with a standard `UICollectionViewFlowLayout`, as shown in Figure [17-1](#A978-1-4842-1242-4_17_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_17_Fig1_HTML.jpg](A978-1-4842-1242-4_17_Fig1_HTML.jpg)


    Figure 17-1.


    The base project with a flow layout


    #### Adding the Gesture Recognizer


    The gesture recognizer needs to be added to the collection view controller so
    that it can intercept the gesture and then pass the data onto the collection view’s
    view controller class.


    Add the following lines to the `setupCollectionView` function in the `SpaceViewController`
    class:


    `let pinchRecognizer = UIPinchGestureRecognizer(target: self, action: ➤`


      `"didGetPinchGesture:")`


    `collectionView.addGestureRecognizer(pinchRecognizer)`


    This creates an instance of a `UIPinchGestureRecognizer` and sets the target property
    to the `didGetPinchGesture:` function. Then it adds the newly-created gesture
    recognizer to the collection view.'
  trans: "\n# 让时钟“滴答”走动\n\n以上操作即可显示表盘和时针，但此时时钟尚未开始运转。最后一项任务是让它“滴答”走动。\n\n这需要使集合视图的布局失效，强制其重新计算每个元素的属性。由于你已在布局中设置了时间，每次布局失效时，它都会为新时间重新计算属性；若每秒使布局失效一次，时钟便会呈现“滴答”走动的效果。\n\
    \n你可以在视图控制器中添加一个 `updateClock()` 函数来实现这一功能，如代码清单 16-12 所示。\n\n**代码清单 16-12.**\
    \ `updateClock()` 函数\n\n```\nfunc updateClock() {\n    collectionView.collectionViewLayout.invalidateLayout()\n\
    }\n```\n\n现在有了此函数，你可以设置一个定时器，使其每秒调用一次该函数。首先，在视图控制器中添加一个属性：\n\n```\nvar tickTimer:\
    \ NSTimer!\n```\n\n然后更新 `viewDidLoad()` 函数，使其如代码清单 16-13 所示。\n\n**代码清单 16-13.**\
    \ 更新后的 `viewDidLoad()` 函数\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    setupData()\n    configureCollectionView()\n    tickTimer = NSTimer.scheduledTimerWithTimeInterval(1.0,\
    \ target: self,\n        selector: \"updateClock\", userInfo: nil, repeats: true)\n\
    \    NSRunLoop.currentRunLoop().addTimer(tickTimer, forMode: NSRunLoopCommonModes)\n\
    }\n```\n\n这段代码创建了一个 `NSTimer` 实例，该定时器每秒触发一次并调用 `updateClock()` 函数。随后将定时器添加到主运行循环中，以营造时间流逝的视觉效果。\n\
    \n最后，当视图被关闭时，最好清理掉 `NSTimer`，因此请在视图控制器中添加 `viewWillDisappear()` 函数，如代码清单 16-14\
    \ 所示。\n\n**代码清单 16-14.** `viewWillDisappear()` 函数\n\n```\noverride func viewWillDisappear(animated:\
    \ Bool) {\n    super.viewWillDisappear(animated)\n    tickTimer.invalidate()\n\
    }\n```\n\n如果现在运行项目，你将看到一个正在“滴答”走动的时钟，如图 16-17 所示，该时钟完全由带有自定义布局的 `UICollectionView`\
    \ 构建而成。\n\n![A978-1-4842-1242-4_16_Fig17_HTML.jpg](img/A978-1-4842-1242-4_16_Fig17_HTML.jpg)\n\
    \n**图 16-17.** 完成后的 `UICollectionView` 时钟\n\n## 本章小结\n\n在本章中，你学习了如何突破流式布局的限制，创建完全自定义的布局。你掌握了创建自定义\
    \ `UICollectionViewFlowLayout` 类的方法，并学会了计算根据设计放置视图所需的布局属性。\n\n通过组合运用所有这些技术，你现在可以创建自定义布局了。在下一章中，我们将更进一步探索相关内容。\n\
    \n# 17. 动画与交互式集合视图\n\n将集合视图的灵活性与 iOS 设备的触控界面相结合，你将拥有一个充满探索可能的界面世界。从用户交互的角度来看，最令人满意的方案之一是将集合视图与手势识别器结合，构建出真正可交互的界面。\n\
    \n到目前为止，你主要关注的是布局相对静态的集合视图（尽管也涉及一些滚动）。但 `UICollectionView` 的能力远不止于此。它通过手势对用户交互提供了精妙的支持；通过使用自定义布局，你可以借助动画让集合视图栩栩如生。\n\
    \n在本章中，你首先将学习如何通过手势控制集合视图。通过实现能够更新布局属性的手势识别器，你可以让集合视图以自然的方式响应用户交互。\n\n你还将学习如何通过动画增强集合视图的过渡效果（例如插入和删除操作）。结合强大的\
    \ iOS 动画 API，你可以轻松创建流畅且引人入胜的界面。\n\n## 通过手势控制集合视图\n\niOS 设备天生具有交互性和触控性。触摸屏使应用能够创建比键盘和鼠标所能实现的交互方式灵活得多的界面。\n\
    \n`UIGestureRecognizer` 类家族提供了简单而强大的方法，让用户能够通过点击、平移、滑动和捏合等交互手势来控制应用。你可以非常轻松地将\
    \ `UICollectionViewLayouts` 与手势识别器结合，构建沉浸式界面。\n\n在第 12 章中，你已经了解了如何构建支持交互式排序和重排的集合视图。在本章中，我们将探讨如何使用手势直接控制布局属性。\n\
    \n### 将手势与布局关联\n\n你可以非常轻松地将手势识别器连接到集合视图。通过接收手势事件并利用获取的值更新布局属性，你可以让布局变得可交互。\n\n\
    你将构建两个独立的效果，使用捏合手势控制流式布局。第一个效果将更新项目间距；第二个效果将控制项目大小。\n\n基本方法非常简单：\n\n- 创建一个 `UIGestureRecognizer`\
    \ 来处理你需要的交互类型，此处为 `UIPinchGestureRecognizer`。\n- 将此手势识别器安装到集合视图控制器上。\n- 实现回调函数以接收与手势相关的数据。\n\
    - 使用这些值更新集合视图布局的属性。\n\n为了加快进度，你可以使用本书 GitHub 仓库中第 17 章源代码的基础项目。该项目创建了一个基于 `UITabBarController`\
    \ 的项目，包含两个标签页，每个标签页都含有一个集合视图。两个集合视图均显示 20 个项目，并使用标准的 `UICollectionViewFlowLayout`，如图\
    \ 17-1 所示。\n\n![A978-1-4842-1242-4_17_Fig1_HTML.jpg](img/A978-1-4842-1242-4_17_Fig1_HTML.jpg)\n\
    \n**图 17-1.** 使用流式布局的基础项目\n\n#### 添加手势识别器\n\n需要将手势识别器添加到集合视图控制器中，以便其能够拦截手势，然后将相关数据传递给集合视图的视图控制器类。\n\
    \n在 `SpaceViewController` 类的 `setupCollectionView` 函数中添加以下代码行：\n\n```\nlet pinchRecognizer\
    \ = UIPinchGestureRecognizer(target: self, action: \"didGetPinchGesture:\")\n\
    collectionView.addGestureRecognizer(pinchRecognizer)\n```\n\n这将创建一个 `UIPinchGestureRecognizer`\
    \ 实例，并将其 target 属性设置为 `didGetPinchGesture:` 函数。随后，将新创建的手势识别器添加到集合视图中。\n"
- fmt: "#### Handling Gestures\n\nYou don’t yet have the function to handle the gestures\
    \ when the gesture recognizer intercepts them, so add the function in Listing\
    \ [17-1](#A978-1-4842-1242-4_17_Chapter.html#FPar1) to the `SpaceViewController`.\n\
    \nListing 17-1. The `didGetPinchGesture:` Function\n\n```\nfunc didGetPinchGesture(sender:\
    \ UIPinchGestureRecognizer) {\n    guard sender.numberOfTouches() == 2 else {\n\
    \        return\n    }\n\n    let pointOne = sender.locationOfTouch(0, inView:\
    \ collectionView)\n    let pointTwo = sender.locationOfTouch(1, inView: collectionView)\n\
    \    let dX = pointOne.x - pointTwo.x\n    let dY = pointTwo.y - pointTwo.y\n\
    \    let distance = sqrt(dX * dX + dY * dY)\n    let layout = collectionView.collectionViewLayout\
    \ as! UICollectionViewFlowLayout\n    layout.minimumLineSpacing = distance / 5\n\
    \    layout.minimumInteritemSpacing = distance / 5\n    layout.invalidateLayout()\n\
    }\n```\n\nThe first thing you need to do is make sure that you’re reacting to\
    \ the right gesture. `UIGestureRecognizers` has a `numberOfTouches` property that\
    \ contains the number of contact points that the gesture recognizer has detected.\
    \ For a tap with a single finger, this would be `1`. If five fingers were on screen,\
    \ the `numberOfTouches` would be `5`.\n\nIn this case, you’re only interested\
    \ in two-fingered pinch gestures, so you can reject any gesture that doesn’t have\
    \ a `numberOfTouches` property of `2`:\n\n```\nguard sender.numberOfTouches()\
    \ == 2 else {\n    return\n}\n```\n\nAssuming that you do only have two touches,\
    \ you can now start to use them to control the collection view layout.\n\nFirst,\
    \ get the coordinates of the two touches relative to the `collectionView`:\n\n\
    ```\nlet pointOne = sender.locationOfTouch(0, inView: collectionView)\nlet pointTwo\
    \ = sender.locationOfTouch(1, inView: collectionView)\n```\n\n**Tip**: The touch\
    \ number refers to the order in which the touch was detected by the gesture recognizer,\
    \ not which finger is doing the touching!\n\nEach touch point has an x and y coordinate,\
    \ so you can use this to calculate the difference between the two touches. This\
    \ needs some trigonometry, as shown in Figure [17-2](#A978-1-4842-1242-4_17_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1242-4_17_Fig2_HTML.jpg](A978-1-4842-1242-4_17_Fig2_HTML.jpg)\n\
    \nFigure 17-2. Calculating the distance between the touches\n\nIn code, this is\
    \ expressed as\n\n```\nlet distance = sqrt((dX * dX) + (dY * dY))\n```\n\nWith\
    \ the calculation out of the way, get a reference to the flow layout:\n\n```\n\
    let layout = collectionView.collectionViewLayout as! UICollectionViewFlowLayout\n\
    ```\n\nAnd update the spacing-related attributes with the distance value:\n\n\
    ```\nlayout.minimumLineSpacing = distance / 5\nlayout.minimumInteritemSpacing\
    \ = distance / 5\n```\n\nSince the touch distance is relative to the collection\
    \ view size, you need to scale it down a bit so that the spacings don’t become\
    \ too big.\n\nFinally, you can force the layout to update itself:\n\n```\nlayout.invalidateLayout()\n\
    ```\n\nThe effect isn’t easy to reproduce on paper, but as the spacing between\
    \ the touch points increases, the spacing between the cells will increase as shown\
    \ in Figure [17-3](#A978-1-4842-1242-4_17_Chapter.html#Fig3).\n\n![A978-1-4842-1242-4_17_Fig3_HTML.jpg](A978-1-4842-1242-4_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3. Increasing cell spacing\n\n## Collection Views and Animations\n\
    \nSo far, the collection view layouts that you’ve built have relied on the in-built\
    \ classes to handle placement when inserting and deleting items. This saves a\
    \ lot of time and effort, and it’s fine if you’re happy with the basic effects.\
    \ But if you need more control over the way items are added and removed, you can\
    \ exploit custom `UICollectionViewLayouts` to give you complete control.\n\nTo\
    \ illustrate this, you’re going to build a collection view that:\n- Arranges the\
    \ items in a completely non-linear way; which means you will be responsible for\
    \ calculating their placements\n- Inserts and removes items with animated transitions\
    \ that you determine\n\nThe end result will look like Figure [17-4](#A978-1-4842-1242-4_17_Chapter.html#Fig4).\
    \ Cells are arranged in an even-spaced circle; they’re inserted by flying out\
    \ from the center to their place in the ring (while the existing cells shuffle\
    \ up to make space). They’ll be removed in the opposite direction: flying into\
    \ the center, while the remaining cells space themselves out.\n\n![A978-1-4842-1242-4_17_Fig4_HTML.jpg](A978-1-4842-1242-4_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4. The custom layout in action\n\nTo achieve this, you’ll implement\
    \ a custom `UICollectionViewLayout`. This isn’t the first time you’ve done this,\
    \ but in this example, you’ll take things one step further by calculating both\
    \ the initial and final layout attributes for an item. The collection view will\
    \ then handle smoothly animating the change between the initial and final positions.\n\
    \n### The Process\n\nIn order to have the collection view animate the insertion\
    \ and deletion of items, you need to provide three sets of attributes for each\
    \ item:\n- The initial layout attributes, which the collection view uses to place\
    \ the item in the collection view when it first appears. In your example, this\
    \ will be the center of the circle.\n- The layout attributes that determine the\
    \ \"final\" home for the item. In this example, each item will be at a point on\
    \ a circle, with the spacing between each item determined by the number of items\
    \ in total.\n- The final layout attributes, which the collection view uses as\
    \ the final place for the item before it's removed. In this example, items will\
    \ appear to fly back to the center of the circle, fading and getting smaller as\
    \ they go.\n\nThe other processes involved in setting up the custom layout are\
    \ the same as you’ve seen before, but you’ll work through them in detail.\n\n\
    ### Prerequisites\n\nTo begin with, you’re going to need a collection view, so\
    \ to save some setup time, I’ve created a stub project. It contains a single view\
    \ controller that acts as the data source and delegate for the collection view.\
    \ The Storyboard contains a full-screen collection view and two buttons to add\
    \ and remove items.\n\nThe collection view's data source is an `Array` of `Strings`,\
    \ and the cells are very basic 75pt x 75pt `UICollectionViewCells` that display\
    \ the `String` from the relevant row. Finally, there’s a basic `UICollectionFlowLayout`\
    \ that results in an app that looks like Figure [17-5](#A978-1-4842-1242-4_17_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1242-4_17_Fig5_HTML.jpg](A978-1-4842-1242-4_17_Fig5_HTML.jpg)\n\
    \nFigure 17-5. The initial app\n\nAs you can see, it’s going to need a bit of\
    \ work.\n\n### Creating the Custom Layout\n\nThe first thing you need is a custom\
    \ layout. This will be a subclass of `UICollectionViewLayout`, so create a new\
    \ one with **File** ➤ **New** ➤ **File**, selecting the `Cocoa Touch` item from\
    \ the `Source` section, and then creating a subclass of `UICollectionViewLayout`\
    \ called `BounceLayout`.\n\nThis creates a depressingly empty class, shown in\
    \ Listing [17-2](#A978-1-4842-1242-4_17_Chapter.html#FPar3).\n\nListing 17-2. The\
    \ Initial `BounceLayout`\n\n```\nimport UIKit\n\nclass BounceLayout: UICollectionViewLayout\
    \ {\n\n}\n```\n\nThere are three sets of functions you need to implement:\n- Housekeeping\
    \ functions that handle preparing the layout\n- Attributes functions, responsible\
