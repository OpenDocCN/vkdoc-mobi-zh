- fmt: "# Adding a `UICollectionViewController` Subclass to the Project\n\nTo speed\
    \ up the process of creating `UICollectionViewController` subclasses, Xcode ships\
    \ with a preconfigured template. This creates a subclass with stubbed-out `UICollectionViewDataSource`\
    \ and `UICollectionViewDelegate` methods, and optionally, a XIB file containing\
    \ the collection view itself.\n\nTo create a `UICollectionViewController` subclass\
    \ using the template, follow these steps.\n\nOpen the template chooser with `File`\
    \ ➤ `New` ➤ `Cocoa Touch Class`, and click the `Next` button (shown in Figure\
    \ 4-13).\n\n![A978-1-4842-1242-4_4_Fig13_HTML.jpg](A978-1-4842-1242-4_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13. The template chooser\n\nGive the class a name, and optionally select\
    \ the “Also create XIB file” option if you want the template to create the Interface\
    \ Builder file for you (shown in Figure 4-14).\n\n![A978-1-4842-1242-4_4_Fig14_HTML.jpg](A978-1-4842-1242-4_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14. The “Also create XIB file” option\n\nSelecting this will (unsurprisingly)\
    \ create a XIB file that is prewired to the new `UICollectionViewController` subclass.\n\
    \nClick `Next` to create the class and the XIB file, as shown in Figure 4-15.\n\
    \n![A978-1-4842-1242-4_4_Fig15_HTML.jpg](A978-1-4842-1242-4_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15. The resulting XIB file\n\nThe XIB file will be automatically named.\
    \ Assuming your `UICollectionViewController` subclass is called `MyCollectionViewController.swift`,\
    \ the XIB file will be named `MyCollectionViewController.xib`.\n\nThe XIB is created\
    \ with the collection view’s `delegate` and `datasource` properties connected\
    \ to the parent class and a placeholder `UICollectionViewFlowLayout` object.\n\
    \nIn the `UICollectionViewController` subclass, you’ll see some placeholder code\
    \ that contains the following:\n\n*   A private property for the cell’s reuse\
    \ identifier: `private let reuseIdentifier = \"Cell\"`\n*   In the `viewDidLoad`\
    \ method, the `collectionView` registers the `UICollectionViewCell` class using\
    \ the identifier: `self.collectionView!.registerClass(UICollectionViewCell.self,\
    \ forCellWithReuseIdentifier: reuseIdentifier)`\n*   Basic implementations of\
    \ the three required `UICollectionViewDataSource` methods are created, with helpful\
    \ warnings:\n    ```\n    override func numberOfSectionsInCollectionView(collectionView:\
    \ UICollectionView) -> Int {\n        // #warning Incomplete implementation, return\
    \ the number of sections\n        return 0\n    }\n    override func collectionView(collectionView:\
    \ UICollectionView, numberOfItemsInSection section: Int) -> Int {\n        //\
    \ #warning Incomplete implementation, return the number of items\n        return\
    \ 0\n    }\n    override func collectionView(collectionView: UICollectionView,\
    \ cellForItemAtIndexPath indexPath: NSIndexPath) -> UICollectionViewCell {\n \
    \       let cell = collectionView.dequeueReusableCellWithReuseIdentifier(reuseIdentifier,\
    \ forIndexPath: indexPath)\n        // Configure the cell\n        return cell\n\
    \    }\n    ```\n*   Commented-out placeholders for `UICollectionViewDelegate`\
    \ methods are added at the bottom of the class.\n\nThis placeholder code is enough\
    \ to get the project to build and run, although you’ll need to update the `UICollectionViewDataSource`\
    \ methods before you’ll see any content displayed in the newly-created collection\
    \ view.\n\n## Creating a `UICollectionView` in Code\n\nFollowing the mantra that\
    \ “anything you can do visually, you can do in code,” it’s entirely possible to\
    \ create `UICollectionViews` in code if you prefer this to the visual approach.\n\
    \nAssuming that you already have a `UIViewController` class that will act as the\
    \ collection view’s `delegate` and `datasource`, this process has five steps.\
    \ Listing 4-1 shows an example, assuming the class has a `UICollectionView` property\
    \ called `myCollectionView`.\n\nListing 4-1. Creating a `UICollectionView` in\
    \ Code\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    let\
    \ myFlowLayout = UICollectionViewFlowLayout()\n    // Configure flow layout here…\n\
    \    myCollectionView = UICollectionView(frame: view.frame, collectionViewLayout:\
    \ myFlowLayout)\n    myCollectionView.dataSource = self\n    myCollectionView.delegate\
    \ = self\n    myCollectionView.registerClass(UICollectionViewCell.self, forCellWithReuseIdentifier:\
    \ \"ReuseIdentifier\")\n    view.addSubview(myCollectionView)\n}\n```\n\nStepping\
    \ through this:\n\n*   A `UICollectionViewFlowLayout` is created and configured\
    \ (collection view layouts are covered in Chapters 15 and 16).\n*   Having created\
    \ a flow layout, the `myCollectionView` property is then instantiated with a `UICollectionView`.\
    \ It uses the flow layout just created, and will fill the full view by setting\
    \ its frame to the same dimension as the view’s frame.\n*   The collection view’s\
    \ datasource and delegate are connected to the view controller (having done this,\
    \ you’ll need to ensure that the `UIViewController` implements the required `UICollectionViewDataSource`\
    \ and `UICollectionViewDelegate` methods).\n*   The `UICollectionViewCell` class\
    \ is registered with the collection view and given a cell identifier so that cells\
    \ can be created and dequeued.\n*   The collection view is added to the view controller’s\
    \ view.\n\n## Summary\n\nIn this chapter, you looked at `UICollectionView` and\
    \ the elements from which it’s built. With this background knowledge, you're ready\
    \ to start building and customizing collection views in your projects.\n\nThis\
    \ is just the starting point, however. In Chapter 5, you’re going to look at the\
    \ process of feeding data into the collection view so that it can be displayed.\
    \ In Chapters 15 and 16, you’ll look at building collection view layouts to format\
    \ and customize the data that is presented. Chapter 17 will look at how to customize\
    \ collection view cells themselves.\n\n# 5. Feeding Data to Your Views\n\nWhen\
    \ working with table and collection views, it’s important to bear in mind that\
    \ on their own, they are able to do very little. Just as it takes a small army\
    \ of ground staff (not to mention the flight crew!) to get an airliner off the\
    \ tarmac and into the skies, so `tableViews` and `collectionViews` need the help\
    \ and support of other objects in order to function properly.\n\nOne of the main\
    \ parts of building `tableViews` and `collectionViews` is getting the objects\
    \ to play nicely together, so this chapter covers the following:\n\n*   Where\
    \ the views get their data, and how you get it there\n*   How the views keep track\
    \ of cells and sections\n*   An initial look at how the views handle interaction\n\
    *   An overview of the architecture patterns that the `UITableView` and `UICollectionView`\
    \ classes exploit\n\nSome of this chapter’s content might feel somewhat abstract\
    \ and theoretical—but sticking with it is worthwhile. Developing your expertise\
    \ with iOS (and `tableViews` and `collectionViews` especially!) often requires\
    \ dealing with situations where you find yourself thinking, “Where the heck did\
    \ that come from?” Figuring out what that is and where it came from is generally\
    \ a case of understanding the design patterns that iOS uses—some of which are\
    \ covered in this chapter.\n\n## `UITableView`, `UICollectionView`, and Delegation\n\
    \nOn their own, `UITableView` and `UICollectionView` are pretty puny creatures.\
    \ Although they handle the tasks involved in displaying and scrolling of cells\
    \ themselves, they rely on external support for pretty much everything else.\n\
    \nThat’s not a weakness, though. By passing off their responsibility for other\
    \ functions to external objects, you end up with code that’s much more modular,\
    \ robust, and easier to debug. The process of passing off that responsibility\
    \ is known as delegation."
  raw: '#### Adding a UICollectionViewController Subclass to the Project


    To speed up the process of creating `UICollectionViewController` subclasses, Xcode
    ships with a preconfigured template. This creates a subclass with stubbed-out
    `UICollectionViewDataSource` and `UICollectionViewDelegate` methods, and optionally,
    a XIB file containing the collection view itself.


    To create a `UICollectionViewController` subclass using the template, follow these
    steps.


    Open the template chooser with File ➤ New ➤ Cocoa Touch Class, and click the Next
    button (shown in Figure [4-13](#A978-1-4842-1242-4_4_Chapter.html#Fig13)).


    ![A978-1-4842-1242-4_4_Fig13_HTML.jpg](A978-1-4842-1242-4_4_Fig13_HTML.jpg)


    Figure 4-13.


    The template chooser   Give the class a name, and optionally select the “Also
    create XIB file” option if you want the template to create the Interface Builder
    file for you (shown in Figure [4-14](#A978-1-4842-1242-4_4_Chapter.html#Fig14)).


    ![A978-1-4842-1242-4_4_Fig14_HTML.jpg](A978-1-4842-1242-4_4_Fig14_HTML.jpg)


    Figure 4-14.


    The “Also create XIB file” option Selecting this will (unsurprisingly) create
    a XIB file that is prewired to the new `UICollectionViewController` subclass.
      Click Next to create the class and the XIB file, as shown in Figure [4-15](#A978-1-4842-1242-4_4_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_4_Fig15_HTML.jpg](A978-1-4842-1242-4_4_Fig15_HTML.jpg)


    Figure 4-15.


    The resulting XIB file  


    The XIB file will be automatically named. Assuming your `UICollectionViewController`
    subclass is called `MyCollectionViewController.swift`, the XIB file will be named
    `MyCollectionViewController.xib.`


    The XIB is created with the collection view’s `delegate` and `datasource` properties
    connected to the parent class and a placeholder `UICollectionViewFlowLayout` object.


    In the `UICollectionViewController` subclass, you’ll see some placeholder code
    that contains the following:


    *   A private property for the cell’s reuse identifier: `private let reuseIdentifier
    = "Cell"`

    *   In the `viewDidLoad` method, the `collectionView` registers the `UICollectionViewCell`
    class using the identifier: `self.collectionView!.registerClass(UICollectionViewCell.self,
    ➤forCellWithReuseIdentifier: reuseIdentifier)`

    *   Basic implementations of the three required `UICollectionViewDataSource` methods
    are created, with helpful warnings: `override func numberOfSectionsInCollectionView(collectionView:
    UICollectionView) -> Int {`     `// #warning Incomplete implementation, return
    the number of sections`     `return 0` `}` `override func collectionView(collectionView:
    UICollectionView, numberOfItemsInSection section: Int) -> Int {`     `// #warning
    Incomplete implementation, return the number of items`     `return 0` `}` `override
    func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath ➤indexPath:
    NSIndexPath) -> UICollectionViewCell {`     `let cell = collectionView.dequeueReusableCellWithReuseIdentifier(reuseIdentifier,
    ➤forIndexPath: indexPath)`     `// Configure the cell`     `return cell` `}`

    *   Commented-out placeholders for `UICollectionViewDelegate` methods are added
    at the bottom of the class.


    This placeholder code is enough to get the project to build and run, although
    you’ll need to update the `UICollectionViewDataSource` methods before you’ll see
    any content displayed in the newly-created collection view.


    ### Creating a UICollectionView in Code


    Following the mantra that “anything you can do visually, you can do in code,”
    it’s entirely possible to create `UICollectionViews` in code if you prefer this
    to the visual approach.


    Assuming that you already have a `UIViewController` class that will act as the
    collection view’s `delegate` and `datasource`, this process has five steps. Listing
    [4-1](#A978-1-4842-1242-4_4_Chapter.html#FPar3) shows an example, assuming the
    class has a `UICollectionView` property called `myCollectionView`.


    Listing 4-1. Creating a UICollectionView in Code


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `let myFlowLayout = UICollectionViewFlowLayout()`


        `// Configure flow layout here…`


        `myCollectionView = UICollectionView(frame: view.frame, collectionViewLayout:
    myFlowLayout)`


        `myCollectionView.dataSource = self`


        `myCollectionView.delegate = self`


        `myCollectionView.registerClass(UICollectionViewCell.self, forCellWithReuseIdentifier:
    ➤"ReuseIdentifier")`


        `view.addSubview(myCollectionView)`


    `}`


    Stepping through this,


    A `UICollectionViewFlowLayout` is created and configured (collection view layouts
    are covered in [Chapters 15](#A978-1-4842-1242-4_15_Chapter.html) and [16](#A978-1-4842-1242-4_16_Chapter.html)).
      Having created a flow layout, the `myCollectionView` property is then instantiated
    with a `UICollectionView`. It uses the flow layout just created, and will fill
    the full view by setting its frame to the same dimension as the view’s frame.
      The collection view’s datasource and delegate are connected to the view controller
    (having done this, you’ll need to ensure that the `UIViewController` implements
    the required `UICollectionViewDataSource` and `UICollectionViewDelegate` methods).
      The `UICollectionViewCell` class is registered with the collection view and
    given a cell identifier so that cells can be created and dequeued.   The collection
    view is added to the view controller’s view.


    ## Summary


    In this chapter, you looked at `UICollectionView` and the elements from which
    it’s built. With this background knowledge, you’re ready to start building and
    customizing collection views in your projects.


    This is just the starting point, however. In [Chapter 5](#A978-1-4842-1242-4_5_Chapter.html),
    you’re going to look at the process of feeding data into the collection view so
    that it can be displayed. In [Chapters 15](#A978-1-4842-1242-4_15_Chapter.html)
    and [16](#A978-1-4842-1242-4_16_Chapter.html), you’ll look at building collection
    view layouts to format and customize the data that is presented. [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html)
    will look at how to customize collection view cells themselves.


    # 5. Feeding Data to Your Views


    When working with table and collection views, it’s important to bear in mind that
    on their own, they are able to do very little. Just as it takes a small army of
    ground staff (not to mention the flight crew!) to get an airliner off the tarmac
    and into the skies, so `tableViews` and `collectionViews` need the help and support
    of other objects in order to function properly.


    One of the main parts of building `tableViews` and `collectionViews` is getting
    the objects to play nicely together, so this chapter covers the following:


    *   Where the views gets their data, and how you get it there

    *   How the views keep track of cells and sections

    *   An initial look at how the views handle interaction

    *   An overview of the architecture patterns that the `UITableView` and `UICollectionView`
    classes exploit


    Some of this chapter’s content might feel somewhat abstract and theoretical—but
    sticking with it is worthwhile. Developing your expertise with iOS (and `tableViews`
    and `collectionViews` especially!) often requires dealing with situations where
    you find yourself thinking, “Where the heck did that come from?” Figuring out
    what that is and where it came from is generally a case of understanding the design
    patterns that iOS uses—some of which are covered in this chapter.


    ## UITableView, UICollectionView, and Delegation


    On its own, `UITableView` and `UICollectionView` are pretty puny creatures. Although
    they handle the tasks involved in displaying and scrolling of cells themselves,
    they rely on external support for pretty much everything else.


    That’s not a weakness, though. By passing off their responsibility for other functions
    to external objects, you end up with code that’s much more modular, robust, and
    easier to debug. The process of passing off that responsibility is known as delegation.'
  trans: "\n# 向项目中添加 `UICollectionViewController` 子类\n\n为了加速创建 `UICollectionViewController`\
    \ 子类的过程，Xcode 提供了一个预配置的模板。该模板会创建一个子类，其中包含存根的 `UICollectionViewDataSource` 和 `UICollectionViewDelegate`\
    \ 方法，以及一个可选的包含集合视图本身的 XIB 文件。\n\n要使用该模板创建 `UICollectionViewController` 子类，请按照以下步骤操作。\n\
    \n通过 `File` ➤ `New` ➤ `Cocoa Touch Class` 打开模板选择器，然后点击 `Next` 按钮（如图 4-13 所示）。\n\
    \n![A978-1-4842-1242-4_4_Fig13_HTML.jpg](img/A978-1-4842-1242-4_4_Fig13_HTML.jpg)\n\
    \n图 4-13. 模板选择器\n\n为该类命名，并可选择勾选“Also create XIB file”选项（如果您希望模板为您创建 Interface\
    \ Builder 文件，如图 4-14 所示）。\n\n![A978-1-4842-1242-4_4_Fig14_HTML.jpg](img/A978-1-4842-1242-4_4_Fig14_HTML.jpg)\n\
    \n图 4-14. “Also create XIB file”选项\n\n（毫不意外地）选择此选项将创建一个 XIB 文件，该文件已预先连接到新的 `UICollectionViewController`\
    \ 子类。\n\n点击 `Next` 来创建类及 XIB 文件，如图 4-15 所示。\n\n![A978-1-4842-1242-4_4_Fig15_HTML.jpg](img/A978-1-4842-1242-4_4_Fig15_HTML.jpg)\n\
    \n图 4-15. 生成的 XIB 文件\n\nXIB 文件将自动命名。假设您的 `UICollectionViewController` 子类名为 `MyCollectionViewController.swift`，那么\
    \ XIB 文件将被命名为 `MyCollectionViewController.xib`。\n\n创建的 XIB 文件中，集合视图的 `delegate`\
    \ 和 `datasource` 属性已连接到父类，并包含一个占位的 `UICollectionViewFlowLayout` 对象。\n\n在 `UICollectionViewController`\
    \ 子类中，您将看到一些包含以下内容的占位代码：\n\n*   一个用于单元格复用标识符的私有属性：`private let reuseIdentifier\
    \ = \"Cell\"`\n*   在 `viewDidLoad` 方法中，`collectionView` 使用该标识符注册 `UICollectionViewCell`\
    \ 类：`self.collectionView!.registerClass(UICollectionViewCell.self, forCellWithReuseIdentifier:\
    \ reuseIdentifier)`\n*   创建了三个必需的 `UICollectionViewDataSource` 方法的基本实现，并带有有用的警告：\n\
    \    ```\n    override func numberOfSectionsInCollectionView(collectionView: UICollectionView)\
    \ -> Int {\n        // #warning Incomplete implementation, return the number of\
    \ sections\n        return 0\n    }\n    override func collectionView(collectionView:\
    \ UICollectionView, numberOfItemsInSection section: Int) -> Int {\n        //\
    \ #warning Incomplete implementation, return the number of items\n        return\
    \ 0\n    }\n    override func collectionView(collectionView: UICollectionView,\
    \ cellForItemAtIndexPath indexPath: NSIndexPath) -> UICollectionViewCell {\n \
    \       let cell = collectionView.dequeueReusableCellWithReuseIdentifier(reuseIdentifier,\
    \ forIndexPath: indexPath)\n        // Configure the cell\n        return cell\n\
    \    }\n    ```\n*   在类的底部添加了已注释掉的 `UICollectionViewDelegate` 方法占位符。\n\n这段占位代码足以让项目编译和运行，不过您需要在\
    \ `UICollectionViewDataSource` 方法中进行更新，才能在新建的集合视图中看到任何内容显示。\n\n## 在代码中创建 `UICollectionView`\n\
    \n秉承“任何你能在图形界面完成的事情，都能在代码中完成”的理念，如果你更喜欢代码方式而不是图形界面方式，那么完全可以在代码中创建 `UICollectionView`。\n\
    \n假设您已经有一个 `UIViewController` 类，它将充当集合视图的 `delegate` 和 `datasource`，该过程分为五个步骤。清单\
    \ 4-1 显示了一个示例，假设该类有一个名为 `myCollectionView` 的 `UICollectionView` 属性。\n\n清单 4-1.\
    \ 在代码中创建 `UICollectionView`\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    let myFlowLayout = UICollectionViewFlowLayout()\n    // Configure flow layout\
    \ here…\n    myCollectionView = UICollectionView(frame: view.frame, collectionViewLayout:\
    \ myFlowLayout)\n    myCollectionView.dataSource = self\n    myCollectionView.delegate\
    \ = self\n    myCollectionView.registerClass(UICollectionViewCell.self, forCellWithReuseIdentifier:\
    \ \"ReuseIdentifier\")\n    view.addSubview(myCollectionView)\n}\n```\n\n逐步解析如下：\n\
    \n*   创建并配置一个 `UICollectionViewFlowLayout`（集合视图布局将在第 15 章和第 16 章中介绍）。\n*   创建流式布局后，`myCollectionView`\
    \ 属性通过 `UICollectionView` 进行实例化。它使用刚刚创建的流式布局，并通过将其 frame 设置为与视图 frame 相同的尺寸来填充整个视图。\n\
    *   集合视图的数据源和委托连接到视图控制器（完成此操作后，您需要确保 `UIViewController` 实现了必需的 `UICollectionViewDataSource`\
    \ 和 `UICollectionViewDelegate` 方法）。\n*   `UICollectionViewCell` 类在集合视图中注册，并赋予一个单元格标识符，以便单元格可以创建和出队。\n\
    *   将集合视图添加到视图控制器的视图中。\n\n## 总结\n\n在本章中，您学习了 `UICollectionView` 及其构成元素。有了这些背景知识，您就可以开始在项目中构建和自定义集合视图了。\n\
    \n然而，这仅仅是个开始。在第 5 章中，您将学习如何将数据提供给集合视图，以便显示数据。在第 15 章和第 16 章中，您将学习如何构建集合视图布局来格式化和自定义显示的数据。第\
    \ 17 章将介绍如何自定义集合视图单元格本身。\n\n# 5. 向视图提供数据\n\n在处理表格视图和集合视图时，务必记住它们本身的能力非常有限。就像一架客机需要大量地勤人员（更不用说机组人员！）才能从停机坪起飞升空一样，`tableViews`\
    \ 和 `collectionViews` 也需要其他对象的帮助与支持才能正常运行。\n\n构建 `tableViews` 和 `collectionViews`\
    \ 的主要部分之一就是让这些对象协同工作，因此本章涵盖以下内容：\n\n*   视图从哪里获取数据，以及如何将数据传递过去\n*   视图如何跟踪单元格和分区\n\
    *   初步了解视图如何处理交互\n*   概述 `UITableView` 和 `UICollectionView` 类所采用的架构模式\n\n本章的部分内容可能会显得有些抽象和理论化——但坚持阅读是值得的。培养\
    \ iOS 开发（尤其是 `tableViews` 和 `collectionViews`）的专业技能通常需要处理一些情况，在这些情况下您会想：“这到底是从哪冒出来的？”弄清楚那是什么以及它从哪里来的，通常需要理解\
    \ iOS 使用的设计模式——本章涵盖了其中的一部分。\n\n## `UITableView`、`UICollectionView` 与委托\n\n就其本身而言，`UITableView`\
    \ 和 `UICollectionView` 是相当弱小的生物。虽然它们能处理单元格的显示和滚动任务，但几乎所有其他功能都需要依赖外部支持。\n\n然而，这并非弱点。通过将其他功能的职责委托给外部对象，您最终会得到更模块化、更健壮且更易于调试的代码。这种职责转移的过程被称为**委托**。\n"
- fmt: "### Understanding Delegation\n\nDelegation is an application design pattern\
    \ in which one object requests–or delegates–another object to complete a task\
    \ on its behalf.\n\nAn analogy for this is the delegation that takes place in\
    \ a restaurant. You could place your order yourself by walking to the kitchen\
    \ and telling the chef what you want, but in most establishments, you delegate\
    \ that task to the wait staff. The process of informing the chef of your order\
    \ still gets completed; it’s just that you’ve delegated it to somebody else.\n\
    \nIn a restaurant, you wouldn’t normally have a formal definition of how you’re\
    \ going to delegate things to the wait staff. There’s an unspoken assumption that\
    \ they’re going to get your order to the kitchen. But in software, that’s just\
    \ not clear enough, so the processes are usually spelled out in protocols.\n\n\
    You can think of protocols as informal contracts that define what tasks one party\
    \ will do on behalf of another and that outline how the information will be exchanged\
    \ between them.\n\nBy conforming to a protocol, one of the parties (or objects,\
    \ if we’re thinking in software terms) is promising to implement the tasks that\
    \ the other party will ask for, assuming that they’re asked in the correct way.\n\
    \nFigure [5-1](#A978-1-4842-1242-4_5_Chapter.html#Fig1) illustrates this pattern,\
    \ which can occur in a couple of scenarios:\n\n![A978-1-4842-1242-4_5_Fig1_HTML.jpg](A978-1-4842-1242-4_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. The delegation pattern\n\n- The first object is notifying the second\
    \ that some event is about to occur, is occurring, or has occurred.\n- The first\
    \ object is asking the second object for input.\n\nThose are pretty dry descriptions,\
    \ so let’s look at a couple of examples.\n\n### A Delegate Example: `collectionView(_:didSelectItemAtIndexPath:)`\n\
    \nWhen an item in a table or collection view is selected, it calls the `collectionView(_:didSelectItemAtIndexPath:)`\
    \ or `tableView(_:didSelectRowAtIndexPath:)` method of its `delegate` with two\
    \ parameters: a reference to itself (the `collectionView` or `tableView` parameter)\
    \ and the `indexPath` of the selected item.\n\nThe `delegate` can then respond\
    \ to the selection event. It could do something to the calling view, trigger some\
    \ external action, or just ignore the message completely.\n\nFor example, tapping\
    \ an item often causes a detail view to be loaded, so the `collectionView(_:didSelectItemAtIndexPath:)`\
    \ method might look similar to Listing [5-1](#A978-1-4842-1242-4_5_Chapter.html#FPar1).\n\
    \nListing 5-1. An Example `collectionView(_:didSelectItemAtIndexPath:)` Method\n\
    \n```\nfunc collectionView(collectionView: UICollectionView, didSelectItemAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let detailView = DetailViewController(nibName:\
    \ \"DetailViewController\", bundle: nil)\n    detailView.modalPresentationStyle\
    \ = UIModalPresentationStyle.FullScreen\n    detailView.selectedItem = self.dataModel[indexPath.row]\n\
    \    self.presentViewController(detailView, animated: true, completion: nil)\n\
    }\n```\n\n### A dataSource Example: `tableView:cellForRowAtIndexPath`\n\nYou’ve\
    \ met the `tableView(_:cellForRowAtIndexPath:)` method several times before. When\
    \ the `tableView` is ready to display a cell, it asks its `dataSource` to return\
    \ a `UITableViewCell` for the specified `indexPath` so that the cell can then\
    \ be displayed inside the table itself.\n\nThe `dataSource` object will implement\
    \ the `tableView(_:cellForRowAtIndexPath:)` method, as shown in Listing [5-2](#A978-1-4842-1242-4_5_Chapter.html#FPar2).\n\
    \nListing 5-2. An Example `tableView(_:cellForRowAtIndexPath:)` Method\n\n```\n\
    func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    cellIdentifier\", forIndexPath: indexPath)\n    // cell properties will be configured\
    \ here\n    return cell\n}\n```\n\nThe point of all this is that by separating\
    \ out the functionality, you can split view concerns from model concerns and use\
    \ a controller to coordinate the two.\n\n**Tip**: `UITableViewDataSource` and\
    \ `UITableViewDelegate` are both examples of delegate protocols; it’s just that\
    \ one is explicitly named as a delegate, while the other has a slightly different\
    \ name.\n\n### Setting Delegates\n\nObjects and delegates don’t just get together\
    \ magically. There needs to be an explicit connection. Objects that have delegates\
    \ have a `delegate` property, which can be set in code. Alternatively, you can\
    \ use Interface Builder to do the same thing visually.\n\nIn the case of table\
    \ and collection views, you can also set both `delegate` and `dataSource` by using\
    \ Interface Builder. You Ctrl-Click the `view` and then drag the connection to\
    \ the File’s Owner icon. Figure [5-2](#A978-1-4842-1242-4_5_Chapter.html#Fig2)\
    \ shows how to do this to a `tableView`.\n\n![A978-1-4842-1242-4_5_Fig2_HTML.jpg](A978-1-4842-1242-4_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2. Connecting `UITableView` `dataSource` and `delegate` properties\
    \ in Interface Builder\n\nIt’s common for a view’s controller class to also be\
    \ the `dataSource` and the `delegate`, although there’s no reason why that has\
    \ to be the case. If you have a number of views being supplied by the same datasource,\
    \ for example, it might make more sense to create a stand-alone object to act\
    \ as the datasource for some or all of them. The same can also be true of delegates.\n\
    \nGetting an object and its delegate to play nicely together can feel a bit intricate\
    \ at first, so it’s worth taking a quick look at how this is done.\n\n### Wiring\
    \ Up an Object with a Delegate\n\nThink back for a moment to our two example objects,\
    \ shown in Figure [5-3](#A978-1-4842-1242-4_5_Chapter.html#Fig3).\n\n![A978-1-4842-1242-4_5_Fig3_HTML.jpg](A978-1-4842-1242-4_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3. The delegation pattern, again\n\nIn order for `objectB` to act as\
    \ `objectA`’s `delegate`, you need some way of connecting the two. This requires\
    \ setting the `delegate` property of `objectA` to point to the instance of its\
    \ delegate class, in this case `objectB`.\n\nIf `objectA` has a property called\
    \ `delegate`, as shown here:\n\n```\nweak var delegate: ObjectB?\n```\n\nThen\
    \ `objectA` can set the instance of `objectB` as the delegate:\n\n```\ndelegate\
    \ = objectB\n```"
  raw: '### Understanding Delegation


    Delegation is an application design pattern in which one object requests–or delegates–another
    object to complete a task on its behalf.


    An analogy for this is the delegation that takes place in a restaurant. You could
    place your order yourself by walking to the kitchen and telling the chef what
    you want, but in most establishments, you delegate that task to the wait staff.
    The process of informing the chef of your order still gets completed; it’s just
    that you’ve delegated it to somebody else.


    In a restaurant, you wouldn’t normally have a formal definition of how you’re
    going to delegate things to the wait staff. There’s an unspoken assumption that
    they’re going to get your order to the kitchen. But in software, that’s just not
    clear enough, so the processes are usually spelled out in protocols.


    You can think of protocols as informal contracts that define what tasks one party
    will do on behalf of another and that outline how the information will be exchanged
    between them.


    By conforming to a protocol, one of the parties (or objects, if we’re thinking
    in software terms) is promising to implement the tasks that the other party will
    ask for, assuming that they’re asked in the correct way.


    Figure [5-1](#A978-1-4842-1242-4_5_Chapter.html#Fig1) illustrates this pattern,
    which can occur in a couple of scenarios:


    ![A978-1-4842-1242-4_5_Fig1_HTML.jpg](A978-1-4842-1242-4_5_Fig1_HTML.jpg)


    Figure 5-1.


    The delegation pattern


    *   The first object is notifying the second that some event is about to occur,
    is occurring, or has occurred.

    *   The first object is asking the second object for input.


    Those are pretty dry descriptions, so let’s look at a couple of examples.


    #### A Delegate Example: collectionView(_:didSelectItemAtIndexPath:)


    When an item in a table or collection view is selected, it calls the `collectionView(_:➤didSelectItemAtIndexPath:)`
    or `tableView(_:didSelectRowAtIndexPath:)` method of its `delegate` with two parameters:
    a reference to itself (the `collectionView` or `tableView` parameter) and the
    `indexPath` of the selected item.


    The `delegate` can then respond to the selection event. It could do something
    to the calling view, trigger some external action, or just ignore the message
    completely.


    For example, tapping an item often causes a detail view to be loaded, so the `collection
    ➤View(_:didSelectItemAtIndexPath:)` method might look similar to Listing [5-1](#A978-1-4842-1242-4_5_Chapter.html#FPar1).


    Listing 5-1. An Example collectionView(_:didSelectItemAtIndexPath:)Method


    `func collectionView(collectionView: UICollectionView, didSelectItemAtIndexPath
    ➤`


    `indexPath: NSIndexPath) {`


        `let detailView = DetailViewController(nibName: "DetailViewController", bundle:
    nil)`


        `detailView.modalPresentationStyle = UIModalPresentationStyle.FullScreen`


        `detailView.selectedItem = self.dataModel[indexPath.row]`


        `self.presentViewController(detailView, animated: true, completion: nil)`


    `}`


    #### A dataSource Example: tableView:cellForRowAtIndexPath


    You’ve met the `tableView(_:cellForRowAtIndexPath:)` method several times before.
    When the `tableView` is ready to display a cell, it asks its `dataSource` to return
    a `UITableViewCell` for the specified `indexPath` so that the cell can then be
    displayed inside the table itself.


    The `dataSource` object will implement the `tableView(_:cellForRowAtIndexPath:)`
    method, as shown in Listing [5-2](#A978-1-4842-1242-4_5_Chapter.html#FPar2).


    Listing 5-2. An Example tableView(_:cellForRowAtIndexPath:) Method


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("cellIdentifier",
    forIndexPath:➤ indexPath)`


        `// cell properties will be configured here`


        `return cell`


    `}`


    The point of all this is that by separating out the functionality, you can split
    view concerns from model concerns and use a controller to coordinate the two.


    Tip


    `UITableViewDatasource` and `UITableViewDelegate` are both examples of delegate
    protocols; it’s just that one is explicitly named as a delegate, while the other
    has a slightly different name.


    ### Setting Delegates


    Objects and delegates don’t just get together magically. There needs to be an
    explicit connection. Objects that have delegates have a `delegate` property, which
    can be set in code. Alternatively, you can use Interface Builder to do the same
    thing visually.


    In the case of table and collection views, you can also set both `delegate` and
    `dataSource` by using Interface Builder. You Ctrl-Click the `view` and then drag
    the connection to the File’s Owner icon. Figure [5-2](#A978-1-4842-1242-4_5_Chapter.html#Fig2)
    shows how to do this to a `tableView`.


    ![A978-1-4842-1242-4_5_Fig2_HTML.jpg](A978-1-4842-1242-4_5_Fig2_HTML.jpg)


    Figure 5-2.


    Connecting UITableView dataSource and delegate properties in Interface Builder


    It’s common for a view’s controller class to also be the `dataSource` and the
    `delegate`, although there’s no reason why that has to be the case. If you have
    a number of views being supplied by the same datasource, for example, it might
    make more sense to create a stand-alone object to act as the datasource for some
    or all of them. The same can also be true of delegates.


    Getting an object and its delegate to play nicely together can feel a bit intricate
    at first, so it’s worth taking a quick look at how this is done.


    ### Wiring Up an Object with a Delegate


    Think back for a moment to our two example objects, shown in Figure [5-3](#A978-1-4842-1242-4_5_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_5_Fig3_HTML.jpg](A978-1-4842-1242-4_5_Fig3_HTML.jpg)


    Figure 5-3.


    The delegate pattern, again


    In order for `objectB` to act as `objectA`’s `delegate`, you need some way of
    connecting the two. This requires setting the `delegate` property of `objectA`
    to point to the instance of its delegate class, in this case `objectB`.


    If `objectA` has a property called `delegate`, as shown here:


    `weak var delegate: ObjectB?`


    Then `objectA` can set the instance of `objectB` as the delegate:


    `delegate = objectB`'
  trans: "\n### 理解委托\n\n委托是一种应用设计模式，其中一个对象请求—或委托—另一个对象代为完成某项任务。\n\n餐厅中的委托行为可以作为类比。你可以走到厨房亲自告诉厨师你想点什么菜，但在大多数餐厅中，你会将点餐任务委托给服务生。通知厨师你的订单这一过程仍然会完成，只是你委托给了其他人而已。\n\
    \n在餐厅里，你通常不会正式定义如何将事情委托给服务生。大家会心照不宣地默认他们会把你的订单送到厨房。但在软件领域，这样显然不够清晰，因此这些过程通常会在协议中明确说明。\n\
    \n你可以将协议视为非正式的契约，它定义了某一方将代替另一方执行哪些任务，并概述了双方之间如何交换信息。\n\n通过遵守协议，其中一方（或对象，如果用软件术语思考的话）承诺会以正确的方式实现另一方所请求的任务。\n\
    \n图 5-1 展示了这种模式，它可能出现在以下几种场景中：\n\n![A978-1-4842-1242-4_5_Fig1_HTML.jpg](img/A978-1-4842-1242-4_5_Fig1_HTML.jpg)\n\
    \n图 5-1. 委托模式\n\n- 第一个对象通知第二个对象某个事件即将发生、正在发生或已经发生。\n- 第一个对象向第二个对象请求输入。\n\n这些描述相当枯燥，让我们来看几个例子。\n\
    \n### 委托示例：`collectionView(_:didSelectItemAtIndexPath:)`\n\n当表格或集合视图中的某个项被选中时，它会调用其`delegate`的`collectionView(_:didSelectItemAtIndexPath:)`或`tableView(_:didSelectRowAtIndexPath:)`方法，并传入两个参数：对自身的引用（`collectionView`或`tableView`参数）以及选中项的`indexPath`。\n\
    \n然后，`delegate`可以对选择事件做出响应。它可以对调用它的视图执行一些操作、触发某些外部动作，或者完全忽略该消息。\n\n例如，点击某个项通常会加载一个详情视图，因此`collectionView(_:didSelectItemAtIndexPath:)`方法可能类似于代码清单\
    \ 5-1。\n\n代码清单 5-1. `collectionView(_:didSelectItemAtIndexPath:)`方法示例\n\n```\n\
    func collectionView(collectionView: UICollectionView, didSelectItemAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let detailView = DetailViewController(nibName:\
    \ \"DetailViewController\", bundle: nil)\n    detailView.modalPresentationStyle\
    \ = UIModalPresentationStyle.FullScreen\n    detailView.selectedItem = self.dataModel[indexPath.row]\n\
    \    self.presentViewController(detailView, animated: true, completion: nil)\n\
    }\n```\n\n### 数据源示例：`tableView:cellForRowAtIndexPath`\n\n你之前已经多次见过`tableView(_:cellForRowAtIndexPath:)`方法。当`tableView`准备好显示某个单元格时，它会要求其`dataSource`为指定的`indexPath`返回一个`UITableViewCell`，以便该单元格可以在表格中显示。\n\
    \n`dataSource`对象会实现`tableView(_:cellForRowAtIndexPath:)`方法，如代码清单 5-2 所示。\n\n代码清单\
    \ 5-2. `tableView(_:cellForRowAtIndexPath:)`方法示例\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"cellIdentifier\"\
    , forIndexPath: indexPath)\n    // 此处将配置单元格属性\n    return cell\n}\n```\n\n所有这些的核心在于：通过分离功能，你可以将视图关注点与模型关注点分开，并使用控制器来协调两者。\n\
    \n**提示**：`UITableViewDataSource`和`UITableViewDelegate`都是委托协议的实例；只不过一个明确命名为委托，而另一个的名称略有不同。\n\
    \n### 设置委托\n\n对象和委托并不会神奇地组合在一起。需要建立显式的连接。拥有委托的对象会有一个`delegate`属性，该属性可以在代码中设置。或者，你也可以使用\
    \ Interface Builder 以可视方式完成同样的操作。\n\n对于表格和集合视图，你也可以使用 Interface Builder 来同时设置`delegate`和`dataSource`。按住\
    \ Ctrl 键单击`view`，然后将连接拖拽到文件所有者图标上。图 5-2 显示了如何在`tableView`上执行此操作。\n\n![A978-1-4842-1242-4_5_Fig2_HTML.jpg](img/A978-1-4842-1242-4_5_Fig2_HTML.jpg)\n\
    \n图 5-2. 在 Interface Builder 中连接`UITableView`的`dataSource`和`delegate`属性\n\n通常情况下，视图的控制器类也会同时扮演`dataSource`和`delegate`的角色，尽管并没有规定必须如此。例如，如果有多个视图由同一个数据源提供，那么创建一个独立对象作为其中部分或全部视图的数据源可能更有意义。对于委托来说也是如此。\n\
    \n让一个对象及其委托良好协作起初可能会感觉有些复杂，因此值得快速了解一下具体做法。\n\n### 将对象与委托连接起来\n\n暂时回想一下我们之前提到的两个示例对象，如图\
    \ 5-3 所示。\n\n![A978-1-4842-1242-4_5_Fig3_HTML.jpg](img/A978-1-4842-1242-4_5_Fig3_HTML.jpg)\n\
    \n图 5-3. 再次展示委托模式\n\n为了让`objectB`作为`objectA`的`delegate`，你需要某种方式将两者连接起来。这需要将`objectA`的`delegate`属性设置为指向其委托类的实例，在此例中即`objectB`。\n\
    \n如果`objectA`有一个名为`delegate`的属性，如下所示：\n\n```\nweak var delegate: ObjectB?\n```\n\
    \n那么`objectA`可以将`objectB`的实例设置为委托：\n\n```\ndelegate = objectB\n```\n"
- fmt: "# Delegates and Memory Management\n\nThere's a subtlety here that's important\
    \ to be aware of. Although `objectA` is the object with the `delegate` property,\
    \ it's `objectB` that is the delegate.\n\nThis leads to an interesting memory\
    \ management–related side effect, which you'll need to bear in mind. Although\
    \ `objectB` has been set as `objectA`'s `delegate`, `objectA` will be unaware\
    \ if `objectB` goes out of existence. `objectA` will continue to send messages\
    \ to what it thinks is its `delegate`.\n\nAs long as that delegate object exists,\
    \ obviously that's not a problem. However, if the `delegate` object disappears,\
    \ `objectA` will send messages to a nonexistent object, and the program will crash.\n\
    \nThe workaround for this is to declare delegate properties as optionals, and\
    \ use optional chaining to call delegate methods. If the delegate has become set\
    \ to `nil` for some reason, the call will fail quietly without causing your code\
    \ to blow up.\n\nYou hopefully have noticed that the `delegate` property looks\
    \ a little different from the way that you've been setting up properties to this\
    \ point:\n\n```\nweak var delegate: ObjectB?\n```\n\nSpecifically, it's a `weak`\
    \ property. The property is `weak` (as opposed to `strong`) because objects must\
    \ not retain their delegates. If they do, you run the risk of causing a retain\
    \ loop.\n\nConsider the situation shown in Figure [5-4](#A978-1-4842-1242-4_5_Chapter.html#Fig4):\
    \ object `A` has a delegate object `B`, which is referenced with\n\n```\nvar delegate:\
    \ ObjectB\n```\n\n![A978-1-4842-1242-4_5_Fig4_HTML.jpg](A978-1-4842-1242-4_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4.** A strong reference\n\nIf object `B` receives a `dealloc` message,\
    \ it won't be deallocated because it is still owned by the strong reference from\
    \ object `A`, as shown in Figure [5-5](#A978-1-4842-1242-4_5_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1242-4_5_Fig5_HTML.jpg](A978-1-4842-1242-4_5_Fig5_HTML.jpg)\n\n\
    **Figure 5-5.** After a dealloc message\n\nCompare that with the situation in\
    \ Figure [5-6](#A978-1-4842-1242-4_5_Chapter.html#Fig6), where object `A` has\
    \ a `weak` optional reference to object `B`.\n\n![A978-1-4842-1242-4_5_Fig6_HTML.jpg](A978-1-4842-1242-4_5_Fig6_HTML.jpg)\n\
    \n**Figure 5-6.** A weak optional reference\n\nIf object `B` receives a `dealloc`\
    \ message in this situation, shown in Figure [5-7](#A978-1-4842-1242-4_5_Chapter.html#Fig7),\
    \ the weak reference will allow it to be deallocated, and because object `A` refers\
    \ to it as an optional property, it's perfectly legal for it to become `nil` as\
    \ far as object `A` is concerned.\n\n![A978-1-4842-1242-4_5_Fig7_HTML.jpg](A978-1-4842-1242-4_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7.** A Weak Reference After Deallocation\n\n## Defining Protocols\n\
    \nMethods are defined in protocols so that objects and their delegates know the\
    \ methods that each is expected to implement and respond to. A protocol is simply\
    \ a list of methods—sometimes required and sometimes optional—that an object promises\
    \ to implement.\n\nIf a protocol method is required, the object adopting the protocol\
    \ must implement it. Otherwise, the compiler will complain, and the project won't\
    \ build. Optional methods are, well, optional, so the compiler won't moan if they\
    \ are missing.\n\nProtocols are defined either in a stand-alone protocol header\
    \ file or in a class itself. In both situations, they're defined as a list of\
    \ methods, demarked by the `@protocol` compiler directive. The list is split into\
    \ `@required` and `@optional` sections.\n\nListing [5-3](#A978-1-4842-1242-4_5_Chapter.html#FPar4)\
    \ shows the `UITableViewDataSource` protocol methods. (I've removed the comments\
    \ to save space.)\n\n**Listing 5-3.** The `UITableViewDataSource` Protocol\n\n\
    ```\nprotocol UITableViewDataSource : NSObjectProtocol {\n    func tableView(tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int\n    func tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\n\
    \    optional func numberOfSectionsInTableView(tableView: UITableView) -> Int\n\
    \    optional func tableView(tableView: UITableView, titleForHeaderInSection section:\
    \ Int) -> String?\n    optional func tableView(tableView: UITableView, titleForFooterInSection\
    \ section: Int) -> String?\n    optional func tableView(tableView: UITableView,\
    \ canEditRowAtIndexPath indexPath: NSIndexPath) -> Bool\n    optional func tableView(tableView:\
    \ UITableView, canMoveRowAtIndexPath indexPath: NSIndexPath) -> Bool\n    optional\
    \ func sectionIndexTitlesForTableView(tableView: UITableView) -> [String]?\n \
    \   optional func tableView(tableView: UITableView, sectionForSectionIndexTitle\
    \ title: String, atIndex index: Int) -> Int\n    optional func tableView(tableView:\
    \ UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle, forRowAtIndexPath\
    \ indexPath: NSIndexPath)\n    optional func tableView(tableView: UITableView,\
    \ moveRowAtIndexPath sourceIndexPath: NSIndexPath, toIndexPath destinationIndexPath:\
    \ NSIndexPath)\n}\n```\n\nThis tells us that although the `UITableViewDataSourceProtocol`\
    \ defines myriad methods, only two of them have to be implemented in order for\
    \ the table to function. The rest are optional.\n\n> **Note:** Strictly speaking,\
    \ in order to work, a `tableView` needs to know the number of sections it has.\
    \ You'll notice that the `UITableViewDataSource` protocol lists `numberOfSectionsInTableView`\
    \ as an optional method, which seems a little counterintuitive. A `tableView`\
    \ gets around this by assuming that unless the `dataSource` says otherwise, the\
    \ table view has just the one section.\n\n### Accessing Protocol Definitions in\
    \ Xcode\n\nWhen you implement a protocol method in your classes, that method needs\
    \ to be implemented exactly as it's defined in the protocol. That can lead to\
    \ a lot of typing, so it's much easier (and safer) to copy the method name directly\
    \ from the protocol itself. You'll end up spending a lot of time checking protocol\
    \ documentation, so here's a quick way of accessing it. If you hold down the Option\
    \ key and hover the mouse cursor over the protocol name in an Xcode window, the\
    \ cursor changes to a question mark and the name becomes a hyperlink. Clicking\
    \ that link pops up a summary window.\n\n![A978-1-4842-1242-4_5_Figa_HTML.jpg](A978-1-4842-1242-4_5_Figa_HTML.jpg)\n\
    \nClicking any of the highlighted terms opens either the help file in the Xcode\
    \ Organizer or the relevant code file itself.\n\n## Using UITableView's Delegate\
    \ Methods\n\nBoth `UITableView` and `UICollectionView` use the delegate pattern\
    \ to obtain data from their `dataSource` and to handle user interaction and configuration\
    \ (see Figures [5-8](#A978-1-4842-1242-4_5_Chapter.html#Fig8) and [5-9](#A978-1-4842-1242-4_5_Chapter.html#Fig9)).\
    \ Despite the name, their `dataSource` is a form of a delegate, just one with\
    \ specific responsibilities.\n\n![A978-1-4842-1242-4_5_Fig9_HTML.jpg](A978-1-4842-1242-4_5_Fig9_HTML.jpg)\n\
    \n**Figure 5-9.** How the `collectionView` interacts with its delegate and `dataSource`\n\
    \n![A978-1-4842-1242-4_5_Fig8_HTML.jpg](A978-1-4842-1242-4_5_Fig8_HTML.jpg)\n\n\
    **Figure 5-8.** How the `tableView` interacts with its delegate and `dataSource`\n\
    \nHaving seen how the views use the delegation pattern, you can then start to\
    \ look at the detail of how the `dataSource` and `delegate` operates. Although\
    \ the processes are the same, `UITableView` and `UICollectionView` delegate protocols\
    \ are declared separately, so we'll look at each one in turn.\n\n## Using UITableViewDelegate\
    \ Methods\n\nThe `UITableViewDelegate` handles the following:\n\n- Configuring\
    \ the `tableView`'s rows\n- Configuring the header and footer of sections\n- Managing\
    \ the selection of rows\n- Editing rows\n- Managing accessory views\n- Reordering\
    \ rows\n\nTable [5-1](#A978-1-4842-1242-4_5_Chapter.html#Tab1) shows the methods\
    \ available in the `UITableViewDelegate` protocol.\n\n**Table 5-1.** `UITableViewDelegate`\
    \ Protocol Methods"
  raw: '#### Delegates and Memory Management


    There’s a subtlety here that’s important to be aware of. Although `objectA` is
    the object with the `delegate` property, it’s `objectB` that is the delegate.


    This leads to an interesting memory management–related side effect, which you’ll
    need to bear in mind. Although `objectB` has been set as `objectA`’`s delegate`,
    `objectA` will be unaware if `objectB` goes out of existence. `objectA` will continue
    to send messages to what it thinks is its `delegate`.


    As long as that delegate object exists, obviously that’s not a problem. However,
    if the `delegate` object disappears, `objectA` will send messages to a nonexistent
    object, and the program will crash.


    The workaround for this is to declare delegate properties as optionals, and use
    optional chaining to call delegate methods. If the delegate has become set to
    nil for some reason, the call will fail quietly without causing your code to blow
    up.


    You hopefully have noticed that the `delegate` property looks a little different
    from the way that you’ve been setting up properties to this point:


    `weak var delegate: ObjectB?`


    Specifically, it’s a `weak` property. The property is `weak` (as opposed to `strong`)
    because objects must not retain their delegates. If they do, you run the risk
    of causing a retain loop.


    Consider the situation shown in Figure [5-4](#A978-1-4842-1242-4_5_Chapter.html#Fig4):
    object `A` has a delegate object `B`, which is referenced with


    `var delegate: ObjectB`


    ![A978-1-4842-1242-4_5_Fig4_HTML.jpg](A978-1-4842-1242-4_5_Fig4_HTML.jpg)


    Figure 5-4.


    A strong reference


    If object `B` receives a `dealloc` message, it won’t be deallocated because it
    is still owned by the strong reference from object `A`, as shown in Figure [5-5](#A978-1-4842-1242-4_5_Chapter.html#Fig5).


    ![A978-1-4842-1242-4_5_Fig5_HTML.jpg](A978-1-4842-1242-4_5_Fig5_HTML.jpg)


    Figure 5-5.


    After a dealloc message


    Compare that with the situation in Figure [5-6](#A978-1-4842-1242-4_5_Chapter.html#Fig6),
    where object `A` has a `weak` optional reference to object `B`.


    ![A978-1-4842-1242-4_5_Fig6_HTML.jpg](A978-1-4842-1242-4_5_Fig6_HTML.jpg)


    Figure 5-6.


    A weak optional reference


    If object `B` receives a `dealloc` message in this situation, shown in Figure
    [5-7](#A978-1-4842-1242-4_5_Chapter.html#Fig7), the weak reference will allow
    it to be deallocated, and because object `A` refers to it as an optional property,
    it’s perfectly legal for it to become `nil` as far as object `A` is concerned.


    ![A978-1-4842-1242-4_5_Fig7_HTML.jpg](A978-1-4842-1242-4_5_Fig7_HTML.jpg)


    Figure 5-7.


    A Weak Reference After Deallocation


    ### Defining Protocols


    Methods are defined in protocols so that objects and their delegates know the
    methods that each is expected to implement and respond to. A protocol is simply
    a list of methods—sometimes required and sometimes optional—that an object promises
    to implement.


    If a protocol method is required, the object adopting the protocol must implement
    it. Otherwise, the compiler will complain, and the project won’t build. Optional
    methods are, well, optional, so the compiler won’t moan if they are missing.


    Protocols are defined either in a stand-alone protocol header file or in a class
    itself. In both situations, they’re defined as a list of methods, demarked by
    the `@protocol` compiler directive. The list is split into `@required` and `@optional`
    sections.


    Listing [5-3](#A978-1-4842-1242-4_5_Chapter.html#FPar4) shows the `UITableViewDataSource`
    protocol methods. (I’ve removed the comments to save space.)


    Listing 5-3. The UITableViewDataSource Protocol


    `protocol UITableViewDataSource : NSObjectProtocol {`


        `func tableView(tableView: UITableView, numberOfRowsInSection section: Int)
    -> Int`


        `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: ➤`


        `NSIndexPath) -> UITableViewCell`


        `optional func numberOfSectionsInTableView(tableView: UITableView) -> Int`


        `optional func tableView(tableView: UITableView, titleForHeaderInSection section:
    ➤`


        `Int) -> String?`


        `optional func tableView(tableView: UITableView, titleForFooterInSection section:
    ➤`


        `Int) -> String?`


        `optional func tableView(tableView: UITableView, canEditRowAtIndexPath indexPath:
    ➤`


        `NSIndexPath) -> Bool`


        `optional func tableView(tableView: UITableView, canMoveRowAtIndexPath indexPath:
    ➤`


        `NSIndexPath) -> Bool`


        `optional func sectionIndexTitlesForTableView(tableView: UITableView) -> [String?`


        `optional func tableView(tableView: UITableView, sectionForSectionIndexTitle
    ➤`


        `title: String, atIndex index: Int) -> Int`


        `optional func tableView(tableView: UITableView, commitEditingStyle editingStyle:
    ➤`


        `UITableViewCellEditingStyle, forRowAtIndexPath indexPath: NSIndexPath)`


        `optional func tableView(tableView: UITableView, moveRowAtIndexPath ➤`


        `sourceIndexPath: NSIndexPath, toIndexPath destinationIndexPath: NSIndexPath)`


    `}`


    This tells us that although the `UITableViewDataSourceProtocol` defines myriad
    methods, only two of them have to be implemented in order for the table to function.
    The rest are optional.


    Note


    Strictly speaking, in order to work, a `tableView` needs to know the number of
    sections it has. You’ll notice that the `UITableViewDataSource` protocol lists
    `numberOfSectionsInTableView` as an optional method, which seems a little counterintuitive.
    A `tableView` gets around this by assuming that unless the `dataSource` says otherwise,
    the table view has just the one section.


    ACCESSING PROTOCOL DEFINITIONS IN XCODE


    When you implement a protocol method in your classes, that method needs to be
    implemented exactly as it’s defined in the protocol. That can lead to a lot of
    typing, so it’s much easier (and safer) to copy the method name directly from
    the protocol itself. You’ll end up spending a lot of time checking protocol documentation,
    so here’s a quick way of accessing it. If you hold down the Option key and hover
    the mouse cursor over the protocol name in an Xcode window, the cursor changes
    to a question mark and the name becomes a hyperlink. Clicking that link pops up
    a summary window.


    ![A978-1-4842-1242-4_5_Figa_HTML.jpg](A978-1-4842-1242-4_5_Figa_HTML.jpg)


    Clicking any of the highlighted terms opens either the help file in the Xcode
    Organizer or the relevant code file itself.


    ### Using UITableView’s Delegate Methods


    Both `UITableView` and `UICollectionView` use the delegate pattern to obtain data
    from their `dataSource` and to handle user interaction and configuration (see
    Figures [5-8](#A978-1-4842-1242-4_5_Chapter.html#Fig8) and [5-9](#A978-1-4842-1242-4_5_Chapter.html#Fig9)).
    Despite the name, their `dataSource` is a form of a delegate, just one with specific
    responsibilities.


    ![A978-1-4842-1242-4_5_Fig9_HTML.jpg](A978-1-4842-1242-4_5_Fig9_HTML.jpg)


    Figure 5-9.


    How the collectionView interacts with its delegate and dataSource


    ![A978-1-4842-1242-4_5_Fig8_HTML.jpg](A978-1-4842-1242-4_5_Fig8_HTML.jpg)


    Figure 5-8.


    How the tableView interacts with its delegate and dataSource


    Having seen how the views use the delegation pattern, you can then start to look
    at the detail of how the `dataSource` and `delegate` operates. Although the processes
    are the same, `UITableView` and `UICollectionView` delegate protocols are declared
    separately, so we’ll look at each one in turn.


    ### Using UITableViewDelegate Methods


    The `UITableViewDelegate` handles the following:


    *   Configuring the `tableView`’s rows

    *   Configuring the header and footer of sections

    *   Managing the selection of rows

    *   Editing rows

    *   Managing accessory views

    *   Reordering rows


    Table [5-1](#A978-1-4842-1242-4_5_Chapter.html#Tab1) shows the methods available
    in the `UITableViewDelegate` protocol.


    Table 5-1.


    UITableViewDelegate Protocol Methods'
  trans: "\n# 委托与内存管理\n\n这里有一个需要留意的微妙之处。尽管`objectA`是拥有`delegate`属性的对象，但`objectB`才是实际的委托对象。\n\
    \n这会导致一个与内存管理相关的有趣副作用，你需要牢记在心。虽然`objectB`已被设置为`objectA`的`delegate`，但如果`objectB`不再存在，`objectA`对此将毫无察觉。`objectA`仍会继续向其认为的`delegate`发送消息。\n\
    \n只要该委托对象存在，这显然不是问题。然而，如果`delegate`对象消失了，`objectA`就会向一个不存在的对象发送消息，从而导致程序崩溃。\n\n\
    解决此问题的方法是将委托属性声明为可选类型，并使用可选链式调用来调用委托方法。如果由于某种原因委托被设置为`nil`，调用将以静默方式失败，不会导致代码崩溃。\n\
    \n你可能已经注意到，`delegate`属性的声明方式与迄今为止你所设置属性的方式略有不同：\n\n```\nweak var delegate: ObjectB?\n\
    ```\n\n具体来说，它是一个`弱(weak)`属性。之所以使用`弱(weak)`（与`强(strong)`相对），是因为对象绝不能持有对其委托的强引用。如果这样做，你就有可能造成保留循环。\n\
    \n请考虑图 5-4 所示的情况：对象 `A` 有一个委托对象 `B`，它被引用为\n\n```\nvar delegate: ObjectB\n```\n\
    \n![A978-1-4842-1242-4_5_Fig4_HTML.jpg](img/A978-1-4842-1242-4_5_Fig4_HTML.jpg)\n\
    \n**图 5-4.** 强引用\n\n如果对象 `B` 收到一个 `dealloc` 消息，它并不会被释放，因为它仍然被来自对象 `A` 的强引用所持有，如图\
    \ 5-5 所示。\n\n![A978-1-4842-1242-4_5_Fig5_HTML.jpg](img/A978-1-4842-1242-4_5_Fig5_HTML.jpg)\n\
    \n**图 5-5.** 收到 `dealloc` 消息之后\n\n将此与图 5-6 中的情况进行比较，其中对象 `A` 对对象 `B` 有一个`弱(weak)`的可选引用。\n\
    \n![A978-1-4842-1242-4_5_Fig6_HTML.jpg](img/A978-1-4842-1242-4_5_Fig6_HTML.jpg)\n\
    \n**图 5-6.** 弱可选引用\n\n如果在这种情况下对象 `B` 收到一个 `dealloc` 消息，如图 5-7 所示，弱引用将允许它被释放。并且由于对象\
    \ `A` 将其作为一个可选属性来引用，对于对象 `A` 而言，该属性变为 `nil` 是完全合法的。\n\n![A978-1-4842-1242-4_5_Fig7_HTML.jpg](img/A978-1-4842-1242-4_5_Fig7_HTML.jpg)\n\
    \n**图 5-7.** 释放后的弱引用\n\n## 定义协议\n\n方法在协议中进行定义，以便对象及其委托知晓各自期望实现和响应哪些方法。协议就是一个方法列表——有些是必需的，有些是可选的——这些方法是对象承诺要实现的方法。\n\
    \n如果协议方法是必需的，则采用该协议的对象必须实现它。否则，编译器会报错，项目将无法构建。可选方法，顾名思义，是可选的，因此如果缺少它们，编译器不会报错。\n\
    \n协议可以在独立的协议头文件中定义，也可以在类自身内部定义。在两种情况下，它们都被定义为一个方法列表，由 `@protocol` 编译器指令进行分隔。该列表分为\
    \ `@required` 和 `@optional` 两部分。\n\n清单 5-3 显示了 `UITableViewDataSource` 协议的方法。（为节省空间，我删除了注释。）\n\
    \n**清单 5-3.** `UITableViewDataSource` 协议\n\n```\nprotocol UITableViewDataSource\
    \ : NSObjectProtocol {\n    func tableView(tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int\n    func tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell\n    optional func numberOfSectionsInTableView(tableView:\
    \ UITableView) -> Int\n    optional func tableView(tableView: UITableView, titleForHeaderInSection\
    \ section: Int) -> String?\n    optional func tableView(tableView: UITableView,\
    \ titleForFooterInSection section: Int) -> String?\n    optional func tableView(tableView:\
    \ UITableView, canEditRowAtIndexPath indexPath: NSIndexPath) -> Bool\n    optional\
    \ func tableView(tableView: UITableView, canMoveRowAtIndexPath indexPath: NSIndexPath)\
    \ -> Bool\n    optional func sectionIndexTitlesForTableView(tableView: UITableView)\
    \ -> [String]?\n    optional func tableView(tableView: UITableView, sectionForSectionIndexTitle\
    \ title: String, atIndex index: Int) -> Int\n    optional func tableView(tableView:\
    \ UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle, forRowAtIndexPath\
    \ indexPath: NSIndexPath)\n    optional func tableView(tableView: UITableView,\
    \ moveRowAtIndexPath sourceIndexPath: NSIndexPath, toIndexPath destinationIndexPath:\
    \ NSIndexPath)\n}\n```\n\n这告诉我们，尽管 `UITableViewDataSourceProtocol` 定义了众多方法，但为了使表格正常工作，只需实现其中两个方法即可。其余的都是可选的。\n\
    \n> **注意：** 严格来说，为了正常工作，一个`tableView`需要知道它有多少个分区。你会注意到 `UITableViewDataSource`\
    \ 协议将 `numberOfSectionsInTableView` 列为可选方法，这似乎有点反直觉。`tableView` 通过以下方式处理这个问题：除非\
    \ `dataSource` 另有说明，否则它默认表格视图只有一个分区。\n\n### 在 Xcode 中访问协议定义\n\n当你在类中实现协议方法时，该方法必须严格按照协议中的定义来实现。这可能导致大量输入工作，因此直接从协议本身复制方法名称会容易得多（也更安全）。你将花费大量时间检查协议文档，这里有一种快速访问方法。如果你按住\
    \ Option 键，并将鼠标悬停在 Xcode 窗口中的协议名称上，光标将变为问号，名称变为超链接。单击该链接会弹出一个摘要窗口。\n\n![A978-1-4842-1242-4_5_Figa_HTML.jpg](img/A978-1-4842-1242-4_5_Figa_HTML.jpg)\n\
    \n单击任何高亮显示的术语将打开 Xcode Organizer 中的帮助文件或相关的代码文件本身。\n\n## 使用 UITableView 的委托方法\n\
    \n`UITableView` 和 `UICollectionView` 都使用委托模式从其 `dataSource` 获取数据，并处理用户交互和配置（见图\
    \ 5-8 和 5-9）。尽管名称如此，但其 `dataSource` 是一种委托形式，只是具有特定的职责。\n\n![A978-1-4842-1242-4_5_Fig9_HTML.jpg](img/A978-1-4842-1242-4_5_Fig9_HTML.jpg)\n\
    \n**图 5-9.** `collectionView` 如何与其委托和 `dataSource` 交互\n\n![A978-1-4842-1242-4_5_Fig8_HTML.jpg](img/A978-1-4842-1242-4_5_Fig8_HTML.jpg)\n\
    \n**图 5-8.** `tableView` 如何与其委托和 `dataSource` 交互\n\n了解了视图如何使用委托模式后，你就可以开始详细研究\
    \ `dataSource` 和 `delegate` 是如何运作的。尽管过程相同，但 `UITableView` 和 `UICollectionView`\
    \ 的委托协议是分开声明的，因此我们将依次查看每个协议。\n\n## 使用 UITableViewDelegate 方法\n\n`UITableViewDelegate`\
    \ 处理以下事项：\n\n- 配置 `tableView` 的行\n- 配置分区的页眉和页脚\n- 管理行的选择\n- 编辑行\n- 管理附件视图\n- 重新排列行\n\
    \n表 5-1 显示了 `UITableViewDelegate` 协议中可用的方法。\n\n**表 5-1.** `UITableViewDelegate`\
    \ 协议方法\n"
- fmt: '| Method | Purpose |

    | --- | --- |

    | Configuring Rows |

    | `tableView(_:heightForRowAtIndexPath:)` | Returns the actual calculated height
    of the row as a `CGFloat`. This overrides any table-wide value set for the row
    height. |

    | `tableView(_:estimatedHeightForRowAtIndexPath:)` | Returns the estimated height
    of the row as a `CGFloat`. Providing an estimated value can help to speed up the
    table, which has to calculate the total height of all cells when it first loads.
    Deferring the calculation of cell height until actually required means that time
    won’t be wasted with calculations for cells that aren’t yet visible. |

    | `tableView(_:indentationLevelForRowAtIndexPath:)` | Returns the indentation
    level for the current row as an `Int`. |

    | `tableView(_:willDisplayCell:forRowAtIndexPath:)` | Called to tell the delegate
    that the table is just about to display the cell at this row. This provides the
    final opportunity to customize cell settings like selection or background color.
    Does not return anything. |

    | Managing Accessory Views |

    | `tableView(_:editActionsForRowAtIndexPath:)` | Returns the `UITableViewRowActions`
    that are available for this row. If you don’t override this method, the cell will
    display the standard accessory controls. |

    | `tableView(_:accessoryButtonTappedForRowWithIndexPath:)` | Tells the delegate
    that the accessory button has been tapped for this row. You will often see this
    used to push in a new view as a drill-down detail view for the data model element
    relating to this row. Does not return anything. |

    | Managing Accessory Views |

    | `tableView(_:willSelectRowAtIndexPath:)` | Tells the delegate that the row is
    about to be selected. It’s triggered by a touch up inside the cell. It returns
    an `NSIndexPath` for the row that the table should select (it’s possible to select
    another row in response to a selection). If the row should not be selected, return
    `nil`. |

    | `tableView(_:didSelectRowAtIndexPath:)` | Called after the row is selected.
    You can use this method to deselect the other rows in the table if only one can
    be selected at a time. Does not return anything. |

    | `tableView(_:willDeselectRowAtIndexPath:)` | Called just before the cell is
    deselected. Returns an `NSIndexPath` if you want to deselect another row. If you
    want to prevent the row being deselected, return `nil`. |

    | `tableView(_:didDeselectRowAtIndexPath:)` | Called after the row is deselected.
    You could use this method to remove any selection indicator from the cell at this
    row. Does not return anything. |

    | Managing Section Headers and Footers |

    | `tableView(_:viewForHeaderInSection:)` | Returns an optional `UIView` to use
    as the header for the current section. |

    | `tableView(_:viewForFooterInSection:)` | Returns an optional `UIView` to use
    as the footer for the current section. |

    | `tableView(_:heightForHeaderInSection:)` | Returns the height of the header
    for the current section as a `CGFloat`. |

    | `tableView(_:estimatedHeightForHeaderInSection:)` | Returns the estimated height
    of the header for the current section as a `CGFloat`. Providing an estimated height
    can help to improve the table’s performance by speeding up the calculation of
    the overall content height. |

    | `tableView(_:heightForFooterInSection:)` | Returns the height of the footer
    for the current section as a `CGFloat`. |

    | `tableView(_:estimatedHeightForFooterInSection:)` | Returns the estimated height
    of the footer for the current section as a `CGFloat`. Providing an estimated height
    can help to improve the table’s performance by speeding up the calculation of
    the overall content height. |

    | `tableView(_:willDisplayHeaderView:forSection:)` | Tells the delegate that the
    header view is about to be displayed to allow a last chance for it to be customized
    before display. Does not return anything. |

    | `tableView(_:willDisplayFooterView:forSection:)` | Tells the delegate that the
    footer view is about to be displayed to allow a last chance for it to be customized
    before display. Does not return anything. |

    | Managing Editing of Rows |

    | `tableView(_:willBeginEditingRowAtIndexPath:)` | Tells the delegate that the
    table is about to go into editing mode. The table’s `editing` property is set
    to `true`, and a Delete button is displayed in this row. This method gives you
    the chance to update the app’s view to handle the change in mode. Does not return
    anything. |

    | `tableView(_:didEndEditingRowAtIndexPath:)` | Called when the table leaves editing
    mode. Does not return anything. |

    | `tableView(_:editingStyleForRowAtIndexPath:)` | Returns a `UITableViewEditingStyle`
    to control what editing control is displayed in the cell. If this method isn’t
    implemented, the control defaults to `Delete`. |

    | `tableView(_:titleForDeleteConfirmationButtonForRowAtIndexPath:)` | Returns
    an optional `String` to use as the title of the `Delete` confirmation button.
    This title can be localized. |

    | `tableView(_:shouldIndentWhileEditingRowAtIndexPath:)` | Returns a `Bool` that
    tells the table whether it should indent the cell’s background while it is in
    editing mode. |

    | Reordering Cells |

    | `tableView(_:targetIndexPathForMoveFromRowAtIndexPath:toProposedIndexPath:)`
    | Returns an `NSIndexPath` to indicate where a cell should be moved to during
    reordering. |

    | Tracking View Removal |

    | `tableView(_:didEndDisplayingCell:forRowAtIndexPath:)` | Called when a cell
    has been removed from the table. Does not return anything. |

    | `tableView(_:didEndDisplayingHeaderView:forSection:)` | Called when a header
    view has been removed from the table. Does not return anything. |

    | `tableView(_:didEndDisplayingFooterView:forSection:)` | Called when a footer
    view has been removed from the table. Does not return anything. |

    | Copying and Pasting Row Content |

    | `tableView(_:shouldShowMenuForRowAtIndexPath:)` | Returns a `Bool` to indicate
    to the table view whether an editing control should be displayed for this row.
    Return `false` if you want to prevent copying of or pasting over this cell. |

    | `tableView(_:canPerformAction:forRowAtIndexPath:withSender:)` | Returns a `Bool`
    to indicate to the table view whether the Copy or Paste command should be available
    for this row. |

    | `tableView(_:performAction:forRowAtIndexPath:withSender:)` | This function is
    called when the user taps Copy or Paste in the cell’s editing menu. Does not return
    anything. |

    | `tableView(_:shouldHighlightRowAtIndexPath:)` | Returns a `Bool` to indicate
    whether a row should be selected or not in response to touch events. If you don’t
    override this method, it will default to `true`. |

    | `tableView(_:didHighlightRowAtIndexPath:)` | Called when the row is highlighted.
    Does not return anything. |

