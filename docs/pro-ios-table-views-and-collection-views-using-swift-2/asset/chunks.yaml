  trans: "好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 创建 `Name` 类\n\n\
    虽然应用程序的外观和体验是逐步构建的，但数据模型完全可以立即创建。事实上，从一开始就对数据的结构有清晰的了解，可以帮助你弄清楚界面应该如何工作。\n\n应用程序的核心是姓名。这一点如此核心，以至于你将创建一个具有以下属性的\
    \ `Name` 结构体（另请参见图 [10-8]）：\n\n![A978-1-4842-1242-4_10_Fig8_HTML.jpg](img/A978-1-4842-1242-4_10_Fig8_HTML.jpg)\n\
    \n图 10-8. `Name` 结构体\n\n*   `nameText`：一个包含姓名本身的字符串\n*   `gender`：一个包含性别标志的字符串，值为\
    \ `M`、`F` 或 `U`（表示通用）\n*   `derivation`：一个包含姓名来源说明的字符串\n*   `iconName`：一个包含姓名图标文件名的字符串\n\
    *   `notes`：一个包含关于姓名的解释性备注的字符串\n\n让我们开始吧。在导航区高亮 `Models` 组，然后按住 Ctrl 键或右键单击。在弹出的上下文菜单中，选择\
    \ **New File** 选项。你将看到一个用于新文件的模板选择界面（参见图 [10-9]）。\n\n![A978-1-4842-1242-4_10_Fig9_HTML.jpg](img/A978-1-4842-1242-4_10_Fig9_HTML.jpg)\n\
    \n图 10-9. Xcode 的新文件模板\n\n选择 **Swift File**，然后点击 **Next**（参见图 [10-10]）。\n\n![A978-1-4842-1242-4_10_Fig10_HTML.jpg](img/A978-1-4842-1242-4_10_Fig10_HTML.jpg)\n\
    \n图 10-10. 为新文件命名\n\n将新文件命名为 `Name`，点击 **Next**，并确保选中“将文件添加到 `BabyNames` 目标”的复选框。\n\
    \n新的 `Name` 文件将被创建并出现在导航区中（图 [10-11]）。\n\n![A978-1-4842-1242-4_10_Fig11_HTML.jpg](img/A978-1-4842-1242-4_10_Fig11_HTML.jpg)\n\
    \n图 10-11. 新类的文件\n\n**提示：** 如果你在创建项目时选中了 **“为此项目创建本地 git 仓库”** 选项，你会看到文件名右侧出现符号。它们显示了每个文件的源代码控制状态。新文件显示状态\
    \ `A`（表示它们需要被添加到仓库中）。状态为 `M` 的文件已被修改。\n\n这超出了本书的范围，但如果你在项目中不使用源代码控制，我强烈建议你去研究一下。\n\
    \n现在你需要配置这个新的结构体。打开 `Name` 文件，并添加结构体的属性，如代码清单 [10-1] 所示。\n\n**代码清单 10-1. Name.swift**\n\
    \n```swift\nimport Foundation\n\nstruct Name {\n    var nameText: String?\n  \
    \  var gender: String?\n    var derivation: String?\n    var iconName: String?\n\
    \    var notes: String?\n}\n```\n\n### 创建一些虚拟数据\n\n创建了 `Name` 结构体后，下一步是创建一些可用于原型设计的虚拟数据。你需要一个模型来向\
    \ `tableView` 提供数据；这将在应用程序启动时创建。\n\n切换到 `TableViewController`，并添加一个属性来保存用于表数据的\
    \ `Array`：\n\n```swift\nvar tableData: [Name]!\n```\n\n现在添加一个 `IBOutlet` 来连接到表视图（稍后你将使用它来管理详情视图出现后的行高亮）：\n\
    \n```swift\n@IBOutlet var tableView: UITableView!\n```\n\n最后，添加另一个属性来保存你想要在表中显示的姓名数量：\n\
    \n```swift\nlet numberOfNames = 25\n```\n\n最初，你将使用无意义的数据创建 `Name` 实例，这样你就拥有一些可以用来测试应用的数据。为此，你需要创建一个名为\
    \ `createNameWithNonsenseData` 的函数，该函数返回一个填充了随机数据的 `Name`。\n\n然后，在 `ViewController`\
    \ 的 `viewDidLoad` 函数中，`tableData` 数组将加载适当数量的无意义 `Name`。\n\n你将在视图控制器的扩展中添加这两个新函数，以便将与视图控制器生命周期相关的函数与你的自定义函数分离开来。\n\
    \n在 `TableViewController` 文件的底部，添加扩展；参见代码清单 [10-2]。\n\n**代码清单 10-2. 更新 TableViewController**\n\
    \n```swift\nimport UIKit\n\nclass TableViewController: UIViewController {\n\n\
    \    var tableData: [Name]!\n\n    @IBOutlet var tableView: UITableView!\n\n \
    \   let numberOfNames = 25\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // 加载视图后执行任何其他设置，通常来自 nib 文件。\n    }\n\n    override func didReceiveMemoryWarning()\
    \ {\n        super.didReceiveMemoryWarning()\n        // 处置任何可以重新创建的资源。\n    }\n\
    }\n\nextension ViewController {\n}\n```\n\n现在在扩展中添加第一个新函数，如代码清单 [10-3] 所示。\n\n\
    **代码清单 10-3. 创建随机姓名**\n\n```swift\nfunc createRandomNameWithNonsenseData() ->\
    \ Name {\n    // 创建示例数据数组\n    let namesArray = [\"Abigail\", \"Ada\", \"Adelaide\"\
    , \"Abel\", \"Algernon\", \"Anatole\",\n                      \"Barbara\", \"\
    Bertha\", \"Brunhilda\", \"Barton\", \"Ben\", \"Boris\",\n                   \
    \   \"Calista\", \"Cassandra\", \"Constance\", \"Caspar\", \"Clive\", \"Corey\"\
    ,\n                      \"Danica\", \"Dido\", \"Dora\", \"Darnell\", \"Dexter\"\
    , \"Dunstan\", \"Duncan\"]\n    let genderArray = [\"男孩\", \"女孩\", \"通用\"]\n \
    \   let notesArray = [\"繁荣而快乐\", \"维多利亚时代的流行名字。\",\n                      \"'明亮的美人'。爱尔兰人使用的爱称\"\
    ,\n                      \"'犁沟之子；农夫'。十二使徒之一\",\n                      \"优雅迷人之人\"\
    ,\n                      \"'矛'。一个挥舞长矛使敌人受损的女战士\"]\n    let derivationArray = [\"\
    凯尔特语\", \"日耳曼语\", \"古英语\", \"拉丁语\", \"希腊语\"]\n    let iconArray = [\"icon1.png\"\
    , \"icon2.png\", \"icon3.png\", \"icon4.png\", \"icon5.png\"]\n\n    // 获取示例数据数组的数量，作为随机数的种子\n\
    \    let nameCount = UInt32(namesArray.count)\n    let genderCount = UInt32(genderArray.count)\n\
    \    let notesCount = UInt32(notesArray.count)\n    let derivationCount = UInt32(derivationArray.count)\n\
    \    let iconCount = UInt32(iconArray.count)\n\n    // 创建一个 Name 结构体\n    var\
    \ thisName = Name()\n\n    // 设置一些随机事实\n    thisName.nameText = namesArray[Int(arc4random_uniform(nameCount))]\n\
    \    thisName.gender = genderArray[Int(arc4random_uniform(genderCount))]\n   \
    \ thisName.notes = notesArray[Int(arc4random_uniform(notesCount))]\n    thisName.derivation\
    \ = derivationArray[Int(arc4random_uniform(derivationCount))]\n    thisName.iconName\
    \ = iconArray[Int(arc4random_uniform(iconCount))]\n\n    return thisName\n}\n\
    ```\n\n**注意：** 你不需要使用这些数据。我几乎是随机挑选的数值。这个世界上的废话已经够多了，我就不再添乱了。\n\n拥有了创建填充了随机数据的\
    \ `Name` 实例的能力后，你现在可以将它们存储在 `tableData` 数组中。\n\n向 `ViewController` 的扩展中添加第二个函数，如代码清单\
    \ [10-4] 所示。\n\n**代码清单 10-4. 创建随机数据**\n\n```swift\nfunc loadRandomNames() -> [Name]\
    \ {\n    var namesArray = [Name]()\n    for _ in 0...numberOfNames {\n       \
    \ let thisName = createRandomNameWithNonsenseData()\n        namesArray.append(thisName)\n\
    \    }\n    return namesArray\n}\n```\n\n创建了两个数据生成函数后，你现在可以使用它们为表创建虚拟数据。更新 `viewDidLoad()`\
    \ 函数，如代码清单 [10-5] 所示。\n\n**代码清单 10-5. 更新后的 `viewDidLoad()` 函数**\n\n```swift\n\
    override func viewDidLoad() {\n    super.viewDidLoad()\n    // 加载视图后执行任何其他设置，通常来自\
    \ nib 文件。\n    tableData = loadRandomNames()\n}\n```\n"
- fmt: "### Connecting Up the Table View\n\nAs it stands, the app doesn’t actually\
    \ display any content when it launches. Let’s fix that by adding in a `tableView`,\
    \ and getting it to load the data.\n\nSwitch to the Main storyboard, and drag\
    \ in a `UITableView` object so that it looks like Figure [10-12](#A978-1-4842-1242-4_10_Chapter.html#Fig12).\n\
    \n![A978-1-4842-1242-4_10_Fig12_HTML.jpg](A978-1-4842-1242-4_10_Fig12_HTML.jpg)\n\
    \nFigure 10-12. Adding a table view to the view\n\nNow add some AutoLayout constraints\
    \ so that it fills the entire view. Select the `tableView` in the Storyboard,\
    \ click the Pin icon at the bottom right of the Storyboard pane, and set the constraints\
    \ to the values shown in Figure [10-13](#A978-1-4842-1242-4_10_Chapter.html#Fig13).\n\
    \n![A978-1-4842-1242-4_10_Fig13_HTML.jpg](A978-1-4842-1242-4_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13. Setting the AutoLayout constraints\n\nThere are two things to\
    \ note here:\n\n- Make sure that the Constraint lines are solid red, not a hatched\
    \ line. Click the line to set it if that’s not the case.\n- Make sure that `Constrain\
    \ to Margin` option is unchecked.\n\nOnce those are set correctly, click the `Add\
    \ 4 Constraints` button, and the constraints will be added, as shown in Figure\
    \ [10-14](#A978-1-4842-1242-4_10_Chapter.html#Fig14).\n\n![A978-1-4842-1242-4_10_Fig14_HTML.jpg](A978-1-4842-1242-4_10_Fig14_HTML.jpg)\n\
    \nFigure 10-14. The newly added constraints\n\nThe yellow lines indicate that\
    \ there’s a discrepancy between the constraints that have been added and the display\
    \ of the table in the Storyboard. To force the Storyboard to apply the constraints,\
    \ click the yellow update icons, as shown in Figure [10-15](#A978-1-4842-1242-4_10_Chapter.html#Fig15).\n\
    \n![A978-1-4842-1242-4_10_Fig15_HTML.jpg](A978-1-4842-1242-4_10_Fig15_HTML.jpg)\n\
    \nFigure 10-15. Updating the AutoLayout constraints\n\nNow let’s connect the new\
    \ `tableView` to the view controller. Right-click the `tableView` in the Storyboard\
    \ and drag it over to the `View Controller` object in the Document Outline to\
    \ connect the table’s `dataSource` and `delegate` outlets, as shown in Figure\
    \ [10-16](#A978-1-4842-1242-4_10_Chapter.html#Fig16).\n\n![A978-1-4842-1242-4_10_Fig16_HTML.jpg](A978-1-4842-1242-4_10_Fig16_HTML.jpg)\n\
    \nFigure 10-16. Connecting the `dataSource` and `delegate`\n\nNow you need to\
    \ connect the `tableView` outlet of the `TableViewController` to the table itself.\
    \ Right-click the `TableViewController` in the Document Outline, and drag it out\
    \ to the table in the Storyboard. When the HUD pops up, select the `tableView`\
    \ outlet to make the connection (Figure [10-17](#A978-1-4842-1242-4_10_Chapter.html#Fig17)).\n\
    \n![A978-1-4842-1242-4_10_Fig17_HTML.jpg](A978-1-4842-1242-4_10_Fig17_HTML.jpg)\n\
    \nFigure 10-17. Linking the `tableView` outlet to the table\n\nThere’s one last\
    \ job left to do with the `tableView`, which is to add a prototype cell and give\
    \ it a `cellIdentifier` so that the view controller can use the prototype to create\
    \ a new cell instance when required.\n\nClick in the table view if it isn’t already\
    \ selected, then switch to the Attributes Inspector in the Utilities pane. At\
    \ the top, there’s the drop-down to select the table’s content type; make sure\
    \ this is set to Dynamic Protoypes.\n\nThen increase the Prototype Cells to 1,\
    \ as shown in Figure [10-18](#A978-1-4842-1242-4_10_Chapter.html#Fig18).\n\n![A978-1-4842-1242-4_10_Fig18_HTML.jpg](A978-1-4842-1242-4_10_Fig18_HTML.jpg)\n\
    \nFigure 10-18. Increasing the number of prototype cells\n\nThe table view will\
    \ be updated to add a prototype cell, as shown in Figure [10-19](#A978-1-4842-1242-4_10_Chapter.html#Fig19).\n\
    \n![A978-1-4842-1242-4_10_Fig19_HTML.jpg](A978-1-4842-1242-4_10_Fig19_HTML.jpg)\n\
    \nFigure 10-19. The new prototype cell\n\nClick into the prototype cell at the\
    \ top of the table, switch to the Attributes Inspector, and update the cell so\
    \ that it has a Basic style, an identifier of `NameCell` and shows a Disclosure\
    \ Indicator accessory, as shown in Figure [10-20](#A978-1-4842-1242-4_10_Chapter.html#Fig20).\n\
    \n![A978-1-4842-1242-4_10_Fig20_HTML.jpg](A978-1-4842-1242-4_10_Fig20_HTML.jpg)\n\
    \nFigure 10-20. Updating the prototype cell\n\nNow you can switch back to the\
    \ `TableViewController` class, and create the `UITableViewDataSource` functions\
    \ to feed the table with its data.\n\nAdd the `dataSource` functions in the extension\
    \ to the class at the bottom, as shown in Listing [10-6](#A978-1-4842-1242-4_10_Chapter.html#FPar11).\n\
    \nListing 10-6. Adding `dataSource` Functions\n\n```\nextension TableViewController:\
    \ UITableViewDataSource {\n\n    // DataSource functions\n\n    func numberOfSectionsInTableView(tableView:\
    \ UITableView) -> Int {\n        return 1\n    }\n\n    func tableView(tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n        return tableData.count\n\
    \    }\n\n    func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n        let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    NameCell\", forIndexPath: indexPath)\n        let name = tableData[indexPath.row]\n\
    \        cell.textLabel!.text = name.nameText\n        return cell\n    }\n}\n\
    ```\n\nRun the app to check everything’s wired up correctly, and you should see\
    \ a table displaying 50 random names, as in Figure [10-21](#A978-1-4842-1242-4_10_Chapter.html#Fig21).\n\
    \n![A978-1-4842-1242-4_10_Fig21_HTML.jpg](A978-1-4842-1242-4_10_Fig21_HTML.jpg)\n\
    \nFigure 10-21. Data appears in the table!\n\n### Building the Detail View\n\n\
    When the users click a Name row in the table, the app will present them with a\
    \ details screen with the information for that name. The `UINavigationController`\
    \ will handle the process of pushing the detail view in, but before it can do\
    \ this you need to create a details view.\n\nSince the app is still at the proof-of-concept\
    \ stage, you can make this as simple or as detailed as you like. I’ve made a very\
    \ (very!) basic version to use as a starting point. Either way, you’re going to\
    \ need a new view controller.\n\nHighlight the View controllers group in the Navigator,\
    \ right-click, and add a new file. Choose the `Cocoa Class` item in the templates,\
    \ then create a `UIViewController` subclass, and call the file `DetailViewController`.\n\
    \nNext, switch to the Storyboard and drag out a `View Controller` from the Object\
    \ browser. This will add the scene to the Document Outline, as shown in Figure\
    \ [10-22](#A978-1-4842-1242-4_10_Chapter.html#Fig22).\n\n![A978-1-4842-1242-4_10_Fig22_HTML.jpg](A978-1-4842-1242-4_10_Fig22_HTML.jpg)\n\
    \nFigure 10-22. The new view controller in the Document Outline\n\nWith the new\
    \ view controller in the Storyboard, you need to link it to the `DetailViewController`\
    \ class you just created. Highlight the `View Controller` item in the Document\
    \ Outline if it isn’t already, then switch to the Identity Inspector. Update the\
    \ `Custom Class` property to `DetailViewController`, as shown in Figure [10-23](#A978-1-4842-1242-4_10_Chapter.html#Fig23).\n\
    \n![A978-1-4842-1242-4_10_Fig23_HTML.jpg](A978-1-4842-1242-4_10_Fig23_HTML.jpg)\n\
    \nFigure 10-23. Linking the View Controller to the custom class\n\nNow you can\
    \ lay out the controls in the Storyboard to display the data for the name detail.\
    \ My work of art looks like that in Figure [10-24](#A978-1-4842-1242-4_10_Chapter.html#Fig24).\n\
    \n![A978-1-4842-1242-4_10_Fig24_HTML.jpg](A978-1-4842-1242-4_10_Fig24_HTML.jpg)\n\
    \nFigure 10-24. A very basic detail view\n\nThere are corresponding outlets in\
    \ the `DetailViewController`:\n\n```\n@IBOutlet var nameLabel: UILabel!\n@IBOutlet\
    \ var genderLabel: UILabel!\n@IBOutlet var derivationLabel: UILabel!\n@IBOutlet\
    \ var notesLabel: UILabel!\n@IBOutlet var iconImageView: UIImageView!\n```\n\n\
    Tip\n\nTo allow the image view to change its aspect ratio to fit an image, you\
    \ can tweak the AutoLayout constraints. Set the priority of the `height` and `width`\
    \ constraints to `750`, and the `vertical` and `horizontal` priorities of both\
    \ `content hugging` and `content compression` to `1000`."
  raw: '### Connecting Up the Table View


    As it stands, the app doesn’t actually display any content when it launches. Let’s
    fix that by adding in a `tableView`, and getting it to load the data.


    Switch to the Main storyboard, and drag in a `UITableView` object so that it looks
    like Figure [10-12](#A978-1-4842-1242-4_10_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_10_Fig12_HTML.jpg](A978-1-4842-1242-4_10_Fig12_HTML.jpg)


    Figure 10-12.


    Adding a table view to the view


    Now add some AutoLayout constraints so that it fills the entire view. Select the
    `tableView` in the Storyboard, click the Pin icon at the bottom right of the Storyboard
    pane, and set the constraints to the values shown in Figure [10-13](#A978-1-4842-1242-4_10_Chapter.html#Fig13).


    ![A978-1-4842-1242-4_10_Fig13_HTML.jpg](A978-1-4842-1242-4_10_Fig13_HTML.jpg)


    Figure 10-13.


    Setting the AutoLayout constraints


    There are two things to note here:


    *   Make sure that the Constraint lines are solid red, not a hatched line. Click
    the line to set it if that’s not the case.

    *   Make sure that `Constrain to Margin` option is unchecked.


    Once those are set correctly, click the `Add 4 Constraints` button, and the constraints
    will be added, as shown in Figure [10-14](#A978-1-4842-1242-4_10_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_10_Fig14_HTML.jpg](A978-1-4842-1242-4_10_Fig14_HTML.jpg)


    Figure 10-14.


    The newly added constraints


    The yellow lines indicate that there’s a discrepancy between the constraints that
    have been added and the display of the table in the Storyboard. To force the Storyboard
    to apply the constraints, click the yellow update icons, as shown in Figure [10-15](#A978-1-4842-1242-4_10_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_10_Fig15_HTML.jpg](A978-1-4842-1242-4_10_Fig15_HTML.jpg)


    Figure 10-15.


    Updating the AutoLayout constraints


    Now let’s connect the new `tableView` to the view controller. Right-click the
    `tableView` in the Storyboard and drag it over to the `View Controller` object
    in the Document Outline to connect the table’s `dataSource` and `delegate` outlets,
    as shown in Figure [10-16](#A978-1-4842-1242-4_10_Chapter.html#Fig16).


    ![A978-1-4842-1242-4_10_Fig16_HTML.jpg](A978-1-4842-1242-4_10_Fig16_HTML.jpg)


    Figure 10-16.


    Connecting the dataSource and delegate


    Now you need to connect the `tableView` outlet of the `TableViewController` to
    the table itself. Right-click the `TableViewController` in the Document Outline,
    and drag it out to the table in the Storyboard. When the HUD pops up, select the
    `tableView` outlet to make the connection (Figure [10-17](#A978-1-4842-1242-4_10_Chapter.html#Fig17)).


    ![A978-1-4842-1242-4_10_Fig17_HTML.jpg](A978-1-4842-1242-4_10_Fig17_HTML.jpg)


    Figure 10-17.


    Linking the tableView outlet to the table


    There’s one last job left to do with the `tableView`, which is to add a prototype
    cell and give it a `cellIdentifier` so that the view controller can use the prototype
    to create a new cell instance when required.


    Click in the table view if it isn’t already selected, then switch to the Attributes
    Inspector in the Utilities pane. At the top, there’s the drop-down to select the
    table’s content type; make sure this is set to Dynamic Protoypes.


    Then increase the Prototype Cells to 1, as shown in Figure [10-18](#A978-1-4842-1242-4_10_Chapter.html#Fig18).


    ![A978-1-4842-1242-4_10_Fig18_HTML.jpg](A978-1-4842-1242-4_10_Fig18_HTML.jpg)


    Figure 10-18.


    Increasing the number of prototype cells


    The table view will be updated to add a prototype cell, as shown in Figure [10-19](#A978-1-4842-1242-4_10_Chapter.html#Fig19).


    ![A978-1-4842-1242-4_10_Fig19_HTML.jpg](A978-1-4842-1242-4_10_Fig19_HTML.jpg)


    Figure 10-19.


    The new prototype cell


    Click into the prototype cell at the top of the table, switch to the Attributes
    Inspector, and update the cell so that it has a Basic style, an identifier of
    NameCell and shows a Disclosure Indicator accessory, as shown in Figure [10-20](#A978-1-4842-1242-4_10_Chapter.html#Fig20).


    ![A978-1-4842-1242-4_10_Fig20_HTML.jpg](A978-1-4842-1242-4_10_Fig20_HTML.jpg)


    Figure 10-20.


    Updating the prototype cell


    Now you can switch back to the `TableViewController` class, and create the `UITableViewDataSource`
    functions to feed the table with its data.


    Add the `dataSource` functions in the extension to the class at the bottom, as
    shown in Listing [10-6](#A978-1-4842-1242-4_10_Chapter.html#FPar11).


    Listing 10-6. Adding dataSource Functions


    `extension TableViewController: UITableViewDataSource {`


    `// DataSource functions`


    `func numberOfSectionsInTableView(tableView: UITableView) -> Int {`


    `return 1`


    `}`


    `func tableView(tableView: UITableView, numberOfRowsInSection section: Int) ->➤`


    `Int {`


    `return tableData.count`


    `}`


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:  ➤`


    `NSIndexPath) -> UITableViewCell {`


    `let cell = tableView.dequeueReusableCellWithIdentifier("NameCell",➤`


    `forIndexPath: indexPath)`


    `let name = tableData[indexPath.row]`


    `cell.textLabel!.text = name.nameText`


    `return cell`


    `}`


    `}`


    Run the app to check everything’s wired up correctly, and you should see a table
    displaying 50 random names, as in Figure [10-21](#A978-1-4842-1242-4_10_Chapter.html#Fig21).


    ![A978-1-4842-1242-4_10_Fig21_HTML.jpg](A978-1-4842-1242-4_10_Fig21_HTML.jpg)


    Figure 10-21.


    Data appears in the table!


    ### Building the Detail View


    When the users click a Name row in the table, the app will present them with a
    details screen with the information for that name. The `UINavigationController`
    will handle the process of pushing the detail view in, but before it can do this
    you need to create a details view.


    Since the app is still at the proof-of-concept stage, you can make this as simple
    or as detailed as you like. I’ve made a very (very!) basic version to use as a
    starting point. Either way, you’re going to need a new view controller.


    Highlight the View controllers group in the Navigator, right-click, and add a
    new file. Choose the `Cocoa Class` item in the templates, then create a `UIViewController`
    subclass, and call the file `DetailViewController`.


    Next, switch to the Storyboard and drag out a `View Controller` from the Object
    browser. This will add the scene to the Document Outline, as shown in Figure [10-22](#A978-1-4842-1242-4_10_Chapter.html#Fig22).


    ![A978-1-4842-1242-4_10_Fig22_HTML.jpg](A978-1-4842-1242-4_10_Fig22_HTML.jpg)


    Figure 10-22.


    The new view controller in the Document Outline


    With the new view controller in the Storyboard, you need to link it to the `DetailViewController`
    class you just created. Highlight the `View Controller` item in the Document Outline
    if it isn’t already, then switch to the Identity Inspector. Update the `Custom
    Class` property to `DetailViewController`, as shown in Figure [10-23](#A978-1-4842-1242-4_10_Chapter.html#Fig23).


    ![A978-1-4842-1242-4_10_Fig23_HTML.jpg](A978-1-4842-1242-4_10_Fig23_HTML.jpg)


    Figure 10-23.


    Linking the View Controller to the custom class


    Now you can lay out the controls in the Storyboard to display the data for the
    name detail. My work of art looks like that in Figure [10-24](#A978-1-4842-1242-4_10_Chapter.html#Fig24).


    ![A978-1-4842-1242-4_10_Fig24_HTML.jpg](A978-1-4842-1242-4_10_Fig24_HTML.jpg)


    Figure 10-24.


    A very basic detail view


    There are corresponding outlets in the `DetailViewController`:


        `@IBOutlet var nameLabel: UILabel!`


        `@IBOutlet var genderLabel: UILabel!`


        `@IBOutlet var derivationLabel: UILabel!`


        `@IBOutlet var notesLabel: UILabel!`


        `@IBOutlet var iconImageView: UIImageView!`


    Tip


    To allow the image view to change its aspect ratio to fit an image, you can tweak
    the AutoLayout constraints. Set the priority of the `height` and `width` constraints
    to `750`, and the `vertical` and `horizontal` priorities of both `content hugging`
    and `content compression` to `1000`.'
  trans: "\n### 连接表格视图\n\n目前，应用启动后实际上并没有显示任何内容。让我们通过添加一个 `tableView` 并让它加载数据来解决这个问题。\n\
    \n切换到 Main storyboard，拖入一个 `UITableView` 对象，使其如图 10-12 所示。\n\n![A978-1-4842-1242-4_10_Fig12_HTML.jpg](img/A978-1-4842-1242-4_10_Fig12_HTML.jpg)\n\
    \n图 10-12. 向视图中添加表格视图\n\n现在添加一些 AutoLayout 约束，使其填充整个视图。在 Storyboard 中选择 `tableView`，点击\
    \ Storyboard 面板右下角的固定图标，并将约束设置为图 10-13 中显示的值。\n\n![A978-1-4842-1242-4_10_Fig13_HTML.jpg](img/A978-1-4842-1242-4_10_Fig13_HTML.jpg)\n\
    \n图 10-13. 设置 AutoLayout 约束\n\n这里需要注意两点：\n\n-   确保约束线是实心的红色，而不是虚线。如果不是，请点击线条进行设置。\n\
    -   确保 `Constrain to Margin` 选项未被勾选。\n\n设置正确后，点击 `Add 4 Constraints` 按钮，约束将被添加，如图\
    \ 10-14 所示。\n\n![A978-1-4842-1242-4_10_Fig14_HTML.jpg](img/A978-1-4842-1242-4_10_Fig14_HTML.jpg)\n\
    \n图 10-14. 新添加的约束\n\n黄色的线条表明添加的约束与 Storyboard 中表格的显示之间存在差异。要强制 Storyboard 应用这些约束，请点击黄色的更新图标，如图\
    \ 10-15 所示。\n\n![A978-1-4842-1242-4_10_Fig15_HTML.jpg](img/A978-1-4842-1242-4_10_Fig15_HTML.jpg)\n\
    \n图 10-15. 更新 AutoLayout 约束\n\n现在，让我们将新的 `tableView` 连接到视图控制器。在 Storyboard 中右键点击\
    \ `tableView`，并将其拖到文档大纲中的 `View Controller` 对象上，以连接表格的 `dataSource` 和 `delegate`\
    \ 输出口，如图 10-16 所示。\n\n![A978-1-4842-1242-4_10_Fig16_HTML.jpg](img/A978-1-4842-1242-4_10_Fig16_HTML.jpg)\n\
    \n图 10-16. 连接 `dataSource` 和 `delegate`\n\n接下来，你需要将 `TableViewController` 的 `tableView`\
    \ 输出口连接到表格本身。在文档大纲中右键点击 `TableViewController`，并将其拖到 Storyboard 中的表格上。当弹出 HUD 时，选择\
    \ `tableView` 输出口以建立连接（图 10-17）。\n\n![A978-1-4842-1242-4_10_Fig17_HTML.jpg](img/A978-1-4842-1242-4_10_Fig17_HTML.jpg)\n\
    \n图 10-17. 将 `tableView` 输出口链接到表格\n\n对于 `tableView`，还有最后一项工作，即添加一个原型单元格并为其指定一个\
    \ `cellIdentifier`，以便视图控制器在需要时能够使用原型创建新的单元格实例。\n\n如果表格视图尚未被选中，请点击它，然后切换到实用工具面板中的属性检查器。顶部有一个下拉菜单用于选择表格的内容类型；请确保将其设置为\
    \ Dynamic Protoypes。\n\n然后将原型单元格数量增加到 1，如图 10-18 所示。\n\n![A978-1-4842-1242-4_10_Fig18_HTML.jpg](img/A978-1-4842-1242-4_10_Fig18_HTML.jpg)\n\
    \n图 10-18. 增加原型单元格的数量\n\n表格视图将被更新，添加一个原型单元格，如图 10-19 所示。\n\n![A978-1-4842-1242-4_10_Fig19_HTML.jpg](img/A978-1-4842-1242-4_10_Fig19_HTML.jpg)\n\
    \n图 10-19. 新的原型单元格\n\n点击表格顶部的原型单元格，切换到属性检查器，并更新该单元格，使其具有 Basic 样式、标识符为 `NameCell`，并显示一个公开指示器附件，如图\
    \ 10-20 所示。\n\n![A978-1-4842-1242-4_10_Fig20_HTML.jpg](img/A978-1-4842-1242-4_10_Fig20_HTML.jpg)\n\
    \n图 10-20. 更新原型单元格\n\n现在，你可以切回到 `TableViewController` 类，并创建 `UITableViewDataSource`\
    \ 函数来为表格提供数据。\n\n在类的底部扩展中添加 `dataSource` 函数，如代码清单 10-6 所示。\n\n代码清单 10-6. 添加 `dataSource`\
    \ 函数\n\n```\nextension TableViewController: UITableViewDataSource {\n\n    //\
    \ DataSource 函数\n\n    func numberOfSectionsInTableView(tableView: UITableView)\
    \ -> Int {\n        return 1\n    }\n\n    func tableView(tableView: UITableView,\
    \ numberOfRowsInSection section: Int) -> Int {\n        return tableData.count\n\
    \    }\n\n    func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n        let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    NameCell\", forIndexPath: indexPath)\n        let name = tableData[indexPath.row]\n\
    \        cell.textLabel!.text = name.nameText\n        return cell\n    }\n}\n\
    ```\n\n运行应用以检查所有连接是否正确，你应该会看到一个显示 50 个随机名字的表格，如图 10-21 所示。\n\n![A978-1-4842-1242-4_10_Fig21_HTML.jpg](img/A978-1-4842-1242-4_10_Fig21_HTML.jpg)\n\
    \n图 10-21. 数据出现在表格中！\n\n### 构建详情视图\n\n当用户在表格中点击一个名字行时，应用将向用户显示一个详情界面，其中包含该名字的信息。`UINavigationController`\
    \ 将处理推送详情视图的过程，但在它能够这样做之前，你需要创建一个详情视图。\n\n由于应用仍处于概念验证阶段，你可以根据自己的喜好将其制作得简单或详细。我制作了一个非常（非常！）基础的版本作为起点。无论哪种方式，你都将需要一个新的视图控制器。\n\
    \n在导航器中高亮选中 View controllers 组，右键点击，然后添加一个新文件。在模板中选择 `Cocoa Class` 项，然后创建一个 `UIViewController`\
    \ 子类，并将文件命名为 `DetailViewController`。\n\n接下来，切换到 Storyboard，并从对象浏览器中拖出一个 `View\
    \ Controller`。这将向文档大纲中添加一个场景，如图 10-22 所示。\n\n![A978-1-4842-1242-4_10_Fig22_HTML.jpg](img/A978-1-4842-1242-4_10_Fig22_HTML.jpg)\n\
    \n图 10-22. 文档大纲中的新视图控制器\n\n在 Storyboard 中有了新的视图控制器后，你需要将其链接到刚刚创建的 `DetailViewController`\
    \ 类。如果尚未选中，高亮选中文档大纲中的 `View Controller` 项，然后切换到身份检查器。将 `Custom Class` 属性更新为 `DetailViewController`，如图\
    \ 10-23 所示。\n\n![A978-1-4842-1242-4_10_Fig23_HTML.jpg](img/A978-1-4842-1242-4_10_Fig23_HTML.jpg)\n\
    \n图 10-23. 将视图控制器链接到自定义类\n\n现在，你可以在 Storyboard 中排列控件来显示名字详情的相关数据。我的作品看起来如图 10-24\
    \ 所示。\n\n![A978-1-4842-1242-4_10_Fig24_HTML.jpg](img/A978-1-4842-1242-4_10_Fig24_HTML.jpg)\n\
    \n图 10-24. 非常基础的详情视图\n\n`DetailViewController` 中提供了相应的输出口：\n\n```\n@IBOutlet var\
    \ nameLabel: UILabel!\n@IBOutlet var genderLabel: UILabel!\n@IBOutlet var derivationLabel:\
    \ UILabel!\n@IBOutlet var notesLabel: UILabel!\n@IBOutlet var iconImageView: UIImageView!\n\
    ```\n\n提示\n\n要允许图像视图更改其宽高比以适应图像，你可以调整 AutoLayout 约束。将 `height` 和 `width` 约束的优先级设置为\
    \ `750`，并将 `content hugging` 和 `content compression` 的 `vertical` 和 `horizontal`\
    \ 优先级均设置为 `1000`。\n"
- fmt: "# Passing Data into the Detail View\n\nTo pass data into the detail view,\
    \ you'll use a technique called dependency injection. That's basically a fancy\
    \ term for passing in–or injecting–some object that the view depends on to configure\
    \ itself, in this case the `Name` struct for the row whose detail you're displaying.\n\
    \nStart by adding a `displayName` property as an option to the `DetailViewController`\
    \ class:\n\n```swift\nvar displayName: Name?\n```\n\nThis provides a property\
    \ that the `TableViewController` can set when the table's row is tapped, before\
    \ the detail view gets pushed in.\n\nThen update the `viewDidLoad` function to\
    \ set the outlets:\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    if let displayName = displayName {\n        nameLabel.text = displayName.nameText\n\
    \        genderLabel.text = displayName.gender\n        derivationLabel.text =\
    \ displayName.derivation\n        notesLabel.text = displayName.notes\n      \
    \  if let iconName = displayName.iconName {\n            iconImageView.image =\
    \ UIImage(named: iconName)\n        }\n    }\n}\n```\n\nThis unwraps the `displayName`\
    \ property and updates the contents of the labels.\n\nThere's a subtlety to note\
    \ here: all the properties of the `displayName` struct are optionals. That's not\
    \ a problem for setting labels, because they'll be blank if the property is empty,\
    \ but when creating an image, you need to use the `if-let` construct to safely\
    \ unwrap the optional `iconName` string before attempting to use it to load the\
    \ `iconImageView`.\n\nHaving created a view controller and a layout for the detail\
    \ screen, this is the point where you can introduce the navigation controller.\n\
    \n## Implementing the Navigation Controller\n\nImplementing the navigation controller\
    \ is the process of replacing the app's initial table view with a `UINavigationController`,\
    \ then loading the table view into this.\n\nAt the moment, the initial view that's\
    \ displayed is handled by the Storyboard, so there's no code in the `AppDelegate`\
    \ to manage this. Listing [10-7](#A978-1-4842-1242-4_10_Chapter.html#FPar13) shows\
    \ the current state of the `AppDelegate`'s `application:didFinishLaunchingWithOptions:`\
    \ function.\n\n**Listing 10-7.** The Current Initial View Code\n\n```swift\nfunc\
    \ application(application: UIApplication, didFinishLaunchingWithOptions launchOptions:\
    \ [NSObject: AnyObject]?) -> Bool {\n    // Override point for customization after\
    \ application launch.\n    return true\n}\n```\n\nYou need to update this so that\
    \ it does two things:\n\n* Creates a `UINavigationController`, and sets it as\
    \ the root view of the app\n* Loads the `tableViewController` as the root view\
    \ of the navigation controller\n\nA diagram or two can help make sense of this.\
    \ Let's start by looking at Figure [10-25](#A978-1-4842-1242-4_10_Chapter.html#Fig25),\
    \ which displays how this app currently sets up its visual interface.\n\n![A978-1-4842-1242-4_10_Fig25_HTML.jpg](A978-1-4842-1242-4_10_Fig25_HTML.jpg)\n\
    \n**Figure 10-25.** How the app delegate instantiates the user interface\n\nThe\
    \ app delegate has a `window` property that is created using the bounds of `UIScreen`'s\
    \ `mainScreen` property. This `window` is where the visible user interface for\
    \ the app has to fit. In effect, it's a virtual reference in software to the physical\
    \ screen of the device.\n\nThe `window` property has a `rootViewController` property,\
    \ which you can think of as the front most slot in the window into which a view\
    \ controller can be placed.\n\n> **Caution**  \n> There's a potential source for\
    \ confusion here due to some less-than-consistent naming conventions in iOS. Both\
    \ the app delegate and `UINavigationControllers` have a property called `rootViewController`.\
    \  \n> They've both got broadly similar purposes, but they're NOT the same thing.\
    \ Make sure you know what context you're dealing with when thinking about `rootViewController`\
    \ properties.\n\nThe app delegate also has a `viewController` property. An instance\
    \ of the `ViewController` is instantiated from the Storyboard, and then assigned\
    \ to the `viewController` property.\n\nAt this point you have two things: a way\
    \ of referencing the physical screen (via the `window` property) and a `viewController`\
    \ object. To make the `viewController` visible, you simply insert the `viewController`\
    \ object into the window's `rootViewController` property. That's at the top of\
    \ the stack, so it's the one that's visible on the device screen.\n\n## How the\
    \ Navigation Controller Is Wired Up\n\nThe process for a navigation controller\
    \ app is similar, but subtly different. Instead of filling the window with the\
    \ `viewController`, you create a `UINavigationController` object and put that\
    \ in the `window`. Then you take the `viewController` that you had to start with\
    \ and put that inside the navigation controller. See what I mean about Russian\
    \ dolls?\n\nFigure [10-26](#A978-1-4842-1242-4_10_Chapter.html#Fig26) shows how\
    \ this hangs together in practice.\n\n![A978-1-4842-1242-4_10_Fig26_HTML.jpg](A978-1-4842-1242-4_10_Fig26_HTML.jpg)\n\
    \n**Figure 10-26.** How the navigation controller fits into the picture\n\nThe\
    \ corresponding code from the app delegate is shown in Listing [10-8](#A978-1-4842-1242-4_10_Chapter.html#FPar15).\n\
    \n**Listing 10-8.** The Updated Code\n\n```swift\nfunc application(application:\
    \ UIApplication, didFinishLaunchingWithOptions launchOptions: [NSObject: AnyObject]?)\
    \ -> Bool {\n    // Override point for customization after application launch.\n\
    \    let storyboard = UIStoryboard(name: \"Main\", bundle: nil)\n    let tableViewController\
    \ = storyboard.instantiateViewControllerWithIdentifier(\"TableViewController\"\
    ) as! TableViewController\n    let navigationController = UINavigationController(rootViewController:\
    \ tableViewController)\n    navigationController.navigationBarHidden = false\n\
    \    self.window?.rootViewController = navigationController\n    self.window?.makeKeyAndVisible()\n\
    \    return true\n}\n```\n\nJust before you run the app, make one more tweak.\
    \ Switch back to the `TableViewController`, and add these two lines to the `viewDidLoad`\
    \ function:\n\n```swift\ntitle = \"Baby Names\"\nautomaticallyAdjustsScrollViewInsets\
    \ = false\n```\n\nThis aligns the top of the table to the bottom of the navigation\
    \ bar, and sets the title.\n\nIf you run the app now, you'll see that the table\
    \ is still there, but now it sits inside a navigation controller that provides\
    \ a top bar. The title of the view controller displayed in the navigation controller's\
    \ content area is shown in the top bar (see Figure [10-27](#A978-1-4842-1242-4_10_Chapter.html#Fig27)).\n\
    \n![A978-1-4842-1242-4_10_Fig27_HTML.jpg](A978-1-4842-1242-4_10_Fig27_HTML.jpg)\n\
    \n**Figure 10-27.** The navigation controller with the table inside"
  raw: '### Passing Data into the Detail View


    To pass data into the detail view, you’ll use a technique called dependency injection.
    That’s basically a fancy term for passing in–or injecting–some object that the
    view depends on to configure itself, in this case the `Name` struct for the row
    whose detail you’re displaying.


    Start by adding a `displayName` property as an option to the `DetailViewController`
    class:


    `var displayName: Name?`


    This provides a property that the `TableViewController` can set when the table’s
    row is tapped, before the detail view gets pushed in.


    Then update the `viewDidLoad` function to set the outlets:


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `if let displayName = displayName {`


            `nameLabel.text = displayName.nameText`


            `genderLabel.text = displayName.gender`


            `derivationLabel.text = displayName.derivation`


            `notesLabel.text = displayName.notes`


            `if let iconName = displayName.iconName {`


                `iconImageView.image = UIImage(named: iconName)`


            `}`


        `}`


    `}`


    This unwraps the `displayName` property and updates the contents of the labels.


    There’s a subtlety to note here: all the properties of the `displayName` struct
    are optionals. That’s not a problem for setting labels, because they’ll be blank
    if the property is empty, but when creating an image, you need to use the `if-let`
    construct to safely unwrap the optional `iconName` string before attempting to
    use it to load the `iconImageView`.


    Having created a view controller and a layout for the detail screen, this is the
    point where you can introduce the navigation controller.


    ### Implementing the Navigation Controller


    Implementing the navigation controller is the process of replacing the app’s initial
    table view with a `UINavigationController`, then loading the table view into this.


    At the moment, the initial view that’s displayed is handled by the Storyboard,
    so there’s no code in the `AppDelegate` to manage this. Listing [10-7](#A978-1-4842-1242-4_10_Chapter.html#FPar13)
    shows the current state of the `AppDelgate`’s `application:didFinishLaunchingWithOptions:`
    function.


    Listing 10-7. The Current Initial View Code


    `func application(application: UIApplication, didFinishLaunchingWithOptions ➤`


    `launchOptions: [NSObject: AnyObject]?) -> Bool {`


        `// Override point for customization after application launch.`


        `return true`


    `}`


    You need to update this so that it does two things:


    *   Creates a `UINavigationController`, and sets it as the root view of the app

    *   Loads the `tableViewController` as the root view of the navigation controller


    A diagram or two can help make sense of this. Let’s start by looking at Figure
    [10-25](#A978-1-4842-1242-4_10_Chapter.html#Fig25), which displays how this app
    currently sets up its visual interface.


    ![A978-1-4842-1242-4_10_Fig25_HTML.jpg](A978-1-4842-1242-4_10_Fig25_HTML.jpg)


    Figure 10-25.


    How the app delegate instantiates the user interface


    The app delegate has a `window` property that is created using the bounds of `UIScreen`’s
    `mainScreen` property. This `window` is where the visible user interface for the
    app has to fit. In effect, it’s a virtual reference in software to the physical
    screen of the device.


    The `window` property has a `rootViewController` property, which you can think
    of as the front most slot in the window into which a view controller can be placed.


    Caution


    There’s a potential source for confusion here due to some less-than-consistent
    naming conventions in iOS. Both the app delegate and `UINavigationControllers`
    have a property called `rootViewController`.


    They’ve both got broadly similar purposes, but they’re NOT the same thing. Make
    sure you know what context you’re dealing with when thinking about `rootViewController`
    properties.


    The app delegate also has a `viewController` property. An instance of the `ViewController`
    is instantiated from the Storyboard, and then assigned to the `viewController`
    property.


    At this point you have two things: a way of referencing the physical screen (via
    the `window` property) and a `viewController` object. To make the `viewController`
    visible, you simply insert the `viewController` object into the window’s `rootViewController`
    property. That’s at the top of the stack, so it’s the one that’s visible on the
    device screen.


    ### How the Navigation Controller Is Wired Up


    The process for a navigation controller app is similar, but subtly different.
    Instead of filling the window with the `viewController`, you create a `UINavigationController`
    object and put that in the `window`. Then you take the `viewController` that you
    had to start with and put that inside the navigation controller. See what I mean
    about Russian dolls?


    Figure [10-26](#A978-1-4842-1242-4_10_Chapter.html#Fig26) shows how this hangs
    together in practice.


    ![A978-1-4842-1242-4_10_Fig26_HTML.jpg](A978-1-4842-1242-4_10_Fig26_HTML.jpg)


    Figure 10-26.


    How the navigation controller fits into the picture


    The corresponding code from the app delegate is shown in Listing [10-8](#A978-1-4842-1242-4_10_Chapter.html#FPar15).


    Listing 10-8. The Updated Code


    `func application(application: UIApplication, didFinishLaunchingWithOptions ➤`


    `launchOptions: [NSObject: AnyObject]?) -> Bool {`


        `// Override point for customization after application launch.`


        `let storyboard = UIStoryboard(name: "Main", bundle: nil)`


        `let tableViewController = ➤`


      `storyboard.instantiateViewControllerWithIdentifier("TableViewController") as!  ➤`


      `TableViewController`


        `let navigationController = UINavigationController(rootViewController:  ➤`


       `tableViewController)`


        `navigationController.navigationBarHidden = false`


        `self.window?.rootViewController = navigationController`


        `self.window?.makeKeyAndVisible()`


        `return true`


    `}`


    Just before you run the app, make one more tweak. Switch back to the `TableViewController`,
    and add these two lines to the `viewDidLoad` function:


    `title = "Baby Names"`


    `automaticallyAdjustsScrollViewInsets = false`


    This aligns the top of the table to the bottom of the navigation bar, and sets
    the title.


    If you run the app now, you’ll see that the table is still there, but now it sits
    inside a navigation controller that provides a top bar. The title of the view
    controller displayed in the navigation controller’s content area is shown in the
    top bar (see Figure [10-27](#A978-1-4842-1242-4_10_Chapter.html#Fig27)).


    ![A978-1-4842-1242-4_10_Fig27_HTML.jpg](A978-1-4842-1242-4_10_Fig27_HTML.jpg)


    Figure 10-27.


    The navigation controller with the table inside'
  trans: "\n# 将数据传递到详细视图\n\n要将数据传递到详细视图，你需要使用一种称为依赖注入的技术。这本质上是一个术语，指的是传入（或注入）视图所依赖的对象来配置自身，在本例中，就是需要显示详细信息的行所对应的\
    \ `Name` 结构体。\n\n首先，在 `DetailViewController` 类中添加一个可选的 `displayName` 属性：\n\n```swift\n\
    var displayName: Name?\n```\n\n这提供了一个属性，`TableViewController` 可以在点击表格行时、在详细视图被推入之前设置该属性。\n\
    \n然后，更新 `viewDidLoad` 函数以设置各个输出口：\n\n```swift\noverride func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    if let displayName = displayName {\n        nameLabel.text\
    \ = displayName.nameText\n        genderLabel.text = displayName.gender\n    \
    \    derivationLabel.text = displayName.derivation\n        notesLabel.text =\
    \ displayName.notes\n        if let iconName = displayName.iconName {\n      \
    \      iconImageView.image = UIImage(named: iconName)\n        }\n    }\n}\n```\n\
    \n这段代码解包了 `displayName` 属性并更新了标签的内容。\n\n这里有一个细微之处需要注意：`displayName` 结构体的所有属性都是可选的。对于设置标签来说这不成问题，因为如果属性为空，标签会保持空白；但在创建图片时，你需要使用\
    \ `if-let` 结构来安全地解包可选的 `iconName` 字符串，然后才能尝试用它加载 `iconImageView`。\n\n创建了视图控制器和详细屏幕的布局后，现在就可以引入导航控制器了。\n\
    \n## 实现导航控制器\n\n实现导航控制器的过程包括将应用的初始表格视图替换为 `UINavigationController`，然后将表格视图加载到这个控制器中。\n\
    \n目前，初始显示的视图由 Storyboard 处理，所以 `AppDelegate` 中没有代码来管理这一点。代码清单 10-7 显示了 `AppDelegate`\
    \ 的 `application:didFinishLaunchingWithOptions:` 函数的当前状态。\n\n**代码清单 10-7.** 初始视图代码\n\
    \n```swift\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n    // 应用启动后的自定义覆盖点。\n   \
    \ return true\n}\n```\n\n你需要更新这段代码，使其完成以下两件事：\n\n* 创建一个 `UINavigationController`，并将其设置为应用的根视图\n\
    * 将 `tableViewController` 加载为导航控制器的根视图\n\n画一两个示意图有助于理解这一点。首先来看图 10-25，该图展示了当前应用如何设置其可视化界面。\n\
    \n![A978-1-4842-1242-4_10_Fig25_HTML.jpg](img/A978-1-4842-1242-4_10_Fig25_HTML.jpg)\n\
    \n**图 10-25.** 应用委托实例化用户界面的方式\n\n应用委托有一个 `window` 属性，它是通过 `UIScreen` 的 `mainScreen`\
    \ 属性的边界创建的。这个 `window` 是应用的可视化用户界面必须容纳的地方。实际上，在软件中它是对设备物理屏幕的虚拟引用。\n\n`window`\
    \ 属性有一个 `rootViewController` 属性，你可以将其视为窗口中用于放置视图控制器的最前端的槽位。\n\n> **注意**  \n> 由于\
    \ iOS 中一些不太一致的命名约定，这里可能存在混淆的潜在来源。应用委托和 `UINavigationControllers` 都有一个名为 `rootViewController`\
    \ 的属性。  \n> 它们的用途大致相似，但它们**不是**同一个东西。在考虑 `rootViewController` 属性时，请务必清楚你所处理的上下文。\n\
    \n应用委托还有一个 `viewController` 属性。一个 `ViewController` 实例从 Storyboard 中实例化，然后分配给 `viewController`\
    \ 属性。\n\n此时你有两样东西：一个引用物理屏幕的方式（通过 `window` 属性）和一个 `viewController` 对象。要使 `viewController`\
    \ 可见，只需将 `viewController` 对象插入到窗口的 `rootViewController` 属性中即可。它位于堆栈顶部，因此在设备屏幕上可见。\n\
    \n## 导航控制器如何连接\n\n导航控制器应用的过程类似，但略有不同。不是用 `viewController` 填充窗口，而是创建一个 `UINavigationController`\
    \ 对象并将其放入 `window` 中。然后，将你一开始拥有的 `viewController` 放入导航控制器内部。你明白我所说的套娃意思吗？\n\n\
    图 10-26 展示了这在实践中是如何结合在一起的。\n\n![A978-1-4842-1242-4_10_Fig26_HTML.jpg](img/A978-1-4842-1242-4_10_Fig26_HTML.jpg)\n\
    \n**图 10-26.** 导航控制器如何融入其中\n\n来自应用委托的相应代码如代码清单 10-8 所示。\n\n**代码清单 10-8.** 更新后的代码\n\
    \n```swift\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n    // 应用启动后的自定义覆盖点。\n   \
    \ let storyboard = UIStoryboard(name: \"Main\", bundle: nil)\n    let tableViewController\
    \ = storyboard.instantiateViewControllerWithIdentifier(\"TableViewController\"\
    ) as! TableViewController\n    let navigationController = UINavigationController(rootViewController:\
    \ tableViewController)\n    navigationController.navigationBarHidden = false\n\
    \    self.window?.rootViewController = navigationController\n    self.window?.makeKeyAndVisible()\n\
    \    return true\n}\n```\n\n在运行应用之前，再做一处调整。切换回 `TableViewController`，并在 `viewDidLoad`\
    \ 函数中添加这两行代码：\n\n```swift\ntitle = \"Baby Names\"\nautomaticallyAdjustsScrollViewInsets\
    \ = false\n```\n\n这将表格顶部与导航栏底部对齐，并设置了标题。\n\n如果你现在运行应用，会看到表格仍在，但现在已经位于一个提供顶部栏的导航控制器内。显示在导航控制器内容区域中的视图控制器的标题会显示在顶部栏中（见图\
    \ 10-27）。\n\n![A978-1-4842-1242-4_10_Fig27_HTML.jpg](img/A978-1-4842-1242-4_10_Fig27_HTML.jpg)\n\
    \n**图 10-27.** 内部包含表格的导航控制器\n"
- fmt: "### Linking the Navigation Controller and Detail Views Together\n\nThe app\
    \ is getting close to being done, but tapping on the cells still doesn’t cause\
    \ the detail view to magically appear. In order for this to happen, you need to\
    \ implement the `TableViewController`’s `didSelectRowAtIndexPath:` function.\n\
    \nSwitch to the `TableViewController` and update the extension so that it also\
    \ implements the `UITableViewDelegate` protocol:\n\n`extension TableViewController:\
    \ UITableViewDataSource, UITableViewDelegate {`\n\nNow implement the `tableView:didSelectRowAtIndexPath:`\
    \ function, as shown in Listing [10-9](#A978-1-4842-1242-4_10_Chapter.html#FPar16).\n\
    \n**Listing 10-9.** The `tableView:didSelectRowAtIndexPath:` Function\n\n```\n\
    func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath:  \n\
    NSIndexPath) {\n    let storyboard = UIStoryboard(name: \"Main\", bundle: nil)\n\
    \    let detailView = \n  storyboard.instantiateViewControllerWithIdentifier(\"\
    DetailViewController\") as!  \n  DetailViewController\n\n    detailView.displayName\
    \ = tableData[indexPath.row]\n    navigationController?.pushViewController(detailView,\
    \ animated: true)\n}\n```\n\nTo kick things off, you need to create an instance\
    \ of the `storyboard`:\n\n```\nlet storyboard = UIStoryboard(name: \"Main\", bundle:\
    \ nil)\n```\n\nThen instantiate the `DetailViewController` from the view controller\
    \ with the appropriate Storyboard identifier:\n\n```\nlet detailView = \n  storyboard.instantiateViewControllerWithIdentifier(\"\
    DetailViewController\") as! \n  DetailViewController\n```\n\nWhen the `detailView`\
    \ is instantiated from `storyboard`, it will be an instance of `UIViewController`,\
    \ so you need to force-downcast this to an instance of `DetailViewController`\
    \ with the `as!` operator so that the `displayName` property is available to be\
    \ set.\n\nWith a newly-instantiated instance of `DisplayViewController`, you can\
    \ inject the `displayName` property with the appropriate `Name` from the `tableData`\
    \ array:\n\n```\ndetailView.displayName = tableData[indexPath.row]\n```\n\nAnd\
    \ then get the navigation controller inside which `TableViewController` sits to\
    \ push in the new view:\n\n```\nnavigationController?.pushViewController(detailView,\
    \ animated: true)\n```\n\nRun the app now, and tap on a row: the `DetailViewController`\
    \ will slide in from the right, and tapping the “back” button will slide it out\
    \ again, as shown in Figure [10-28](#A978-1-4842-1242-4_10_Chapter.html#Fig28).\n\
    \n![A978-1-4842-1242-4_10_Fig28_HTML.jpg](A978-1-4842-1242-4_10_Fig28_HTML.jpg)\n\
    \n**Figure 10-28.** Navigation from list to detail and back again\n\nOne minor\
    \ bit of housekeeping remains: when the detail view is removed and the `tableView`\
    \ reappears, you need to deselect the previously selected row.\n\nThe `TableViewController`’s\
    \ `viewWillAppear:` and `viewDidAppear:` functions are called just before and\
    \ just after the detail view is removed, so you can use the `viewDidAppear:` to\
    \ remove the selection highlight from the row, as shown in Listing [10-10](#A978-1-4842-1242-4_10_Chapter.html#FPar17).\n\
    \n**Listing 10-10.** The `viewDidAppear:` Function\n\n```\noverride func viewDidAppear(animated:\
    \ Bool) {\n    super.viewDidAppear(animated)\n    if let indexPath = tableView.indexPathForSelectedRow\
    \ {\n        tableView.deselectRowAtIndexPath(indexPath, animated: true)\n   \
    \ }\n}\n```\n\nFirst, you need to get hold of the `indexPath` of the currently\
    \ selected row (which is the same as it was when the detail view was pushed in),\
    \ and then use this to call the `tableView`’s `deselectRowAtIndexPath:animated:`\
    \ function.\n\nIf you pass in `true` as the `animated:` parameter, the highlight\
    \ will be removed with a gentle fade effect.\n\nAlthough this certainly isn’t\
    \ going to win any awards for user interface design, you’ve now got the navigation\
    \ controller, table view, and detail view controllers wired up and playing nicely\
    \ together.\n\n## Building Navigation Structure with Segues\n\nSo far, you’ve\
    \ build the app’s structure and navigation processes manually, which means that\
    \ you created the `UINavigationController` in code in the `AppDelegate`, and the\
    \ `TableViewController` and `DetailViewController` aren’t connected in any way\
    \ in the Storyboard.\n\nThere is an alternative way of implementing the same results,\
    \ which provides a more visual indication of what’s going on in the Storyboard.\
    \ The end results are completely identical, so it’s up to you which to implement.\n\
    \nTo illustrate this, let’s convert the app you’ve got at this point to use segues\
    \ to manage the transition between the table and the detail views.\n\n### Embedding\
    \ the Table View in a Navigation Controller\n\nThe first step is to embed the\
    \ `TableViewController` inside a `UINavigationController` in the Storyboard. This\
    \ is very simple: select the `TableViewController` in the Document Outline, and\
    \ select the Embed In ➤ Navigation Controller item from the `Editor` menu.\n\n\
    This will insert a `Navigation Controller` into the Storyboard, and link the `TableViewController`\
    \ with a relationship.\n\n![A978-1-4842-1242-4_10_Fig29_HTML.jpg](A978-1-4842-1242-4_10_Fig29_HTML.jpg)\n\
    \n**Figure 10-29.** The new navigation controller in the Storyboard\n\nAs you\
    \ can see in Figure [10-29](#A978-1-4842-1242-4_10_Chapter.html#Fig29), the `TableViewController`\
    \ is linked to the `Navigation Controller` by a relationship, and the `Navigation\
    \ Controller` has been set as the app’s initial view controller (the inward pointing\
    \ arrow at the left side of the `Navigation Controller`).\n\nAll of these elements\
    \ are listed below the `Navigation Controller` scene in the Document Outline.\
    \ It’s at this point in iOS development that you start to appreciate the utility\
    \ of a large monitor!\n\nThe `Navigation Controller` scene has arrived in the\
    \ Storyboard without any identifier, so you will need to set that. Select it in\
    \ the Document Outline, switch to the Identity Inspector in the Utilities pane,\
    \ and update the Storyboard ID to `NavigationController`, as shown in Figure [10-30](#A978-1-4842-1242-4_10_Chapter.html#Fig30).\n\
    \n![A978-1-4842-1242-4_10_Fig30_HTML.jpg](A978-1-4842-1242-4_10_Fig30_HTML.jpg)\n\
    \n**Figure 10-30.** Updating the Navigation Controller’s identifier\n\n### Updating\
    \ the App Delegate\n\nSince you’ve changed the structure of the Storyboard, you’ll\
    \ need to update the `AppDelegate` to reflect the changes.\n\nSwitch to the `application:didFinishLaunchingWithOptions:`\
    \ function, and update it to match Listing [10-11](#A978-1-4842-1242-4_10_Chapter.html#FPar18).\n\
    \n**Listing 10-11.** The Updated `application:didFinishLaunchingWithOptions:`\
    \ Function\n\n```\nfunc application(application: UIApplication, didFinishLaunchingWithOptions\
    \ \nlaunchOptions: [NSObject: AnyObject]?) -> Bool {\n    // Override point for\
    \ customization after application launch.\n    let storyboard = UIStoryboard(name:\
    \ \"Main\", bundle: nil)\n    let navigationController = \n  storyboard.instantiateViewControllerWithIdentifier(\"\
    NavigationController\")\n    navigationController.navigationBarHidden = false\n\
    \    self.window?.rootViewController = navigationController\n    self.window?.makeKeyAndVisible()\n\
    \    return true\n}\n```\n\nHere you’re instantiating `storyboard` as before,\
    \ but this time you’re loading the navigation controller from `storyboard` rather\
    \ than creating it with code. There’s also no need to create an instance of the\
    \ `TableViewController`; the links you made in `storyboard` take care of that\
    \ for you."
  raw: '### Linking the Navigation Controller and Detail Views Together


    The app is getting close to being done, but tapping on the cells still doesn’t
    cause the detail view to magically appear. In order for this to happen, you need
    to implement the `TableViewController`’s `didSelectRowAtIndexPath:` function.


    Switch to the `TableViewController` and update the extension so that it also implements
    the `UITableViewDelegate` protocol:


    `extension TableViewController: UITableViewDataSource, UITableViewDelegate {`


    Now implement the `tableView:didSelectRowAtIndexPath:` function, as shown in Listing
    [10-9](#A978-1-4842-1242-4_10_Chapter.html#FPar16).


    Listing 10-9. The tableView:didSelectRowAtIndexPath: Function


    `func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath:  ➤`


    `NSIndexPath) {`


        `let storyboard = UIStoryboard(name: "Main", bundle: nil)`


        `let detailView = ➤`


      `storyboard.instantiateViewControllerWithIdentifier("DetailViewController")
    as!  ➤`


      `DetailViewController`


        `detailView.displayName = tableData[indexPath.row]`


        `navigationController?.pushViewController(detailView, animated: true)`


    `}`


    To kick things off, you need to create an instance of the `storyboard`:


        `let storyboard = UIStoryboard(name: "Main", bundle: nil)`


    Then instantiate the `DetailViewController` from the view controller with the
    appropriate Storyboard identifier:


        `let detailView = ➤`


      `storyboard.instantiateViewControllerWithIdentifier("DetailViewController")
    as! ➤`


      `DetailViewController`


    When the `detailView` is instantiated from `storyboard`, it will be an instance
    of `UIViewController,` so you need to force-downcast this to an instance of `DetailViewController`
    with the `as!` operator so that the `displayName` property is available to be
    set.


    With a newly-instantiated instance of `DisplayViewController`, you can inject
    the `displayName` property with the appropriate `Name` from the `tableData` array:


    `detailView.displayName = tableData[indexPath.row]`


    And then get the navigation controller inside which `TableViewController` sits
    to push in the new view:


    `navigationController?.pushViewController(detailView, animated: true)`


    Run the app now, and tap on a row: the `DetailViewController` will slide in from
    the right, and tapping the “back” button will slide it out again, as shown in
    Figure [10-28](#A978-1-4842-1242-4_10_Chapter.html#Fig28).


    ![A978-1-4842-1242-4_10_Fig28_HTML.jpg](A978-1-4842-1242-4_10_Fig28_HTML.jpg)


    Figure 10-28.


    Navigation from list to detail and back again


    One minor bit of housekeeping remains: when the detail view is removed and the
    `tableView` reappears, you need to deselect the previously selected row.


    The `TableViewController`’s `viewWillAppear:` and `viewDidAppear:` functions are
    called just before and just after the detail view is removed, so you can use the
    `viewDidAppear:` to remove the selection highlight from the row, as shown in Listing
    [10-10](#A978-1-4842-1242-4_10_Chapter.html#FPar17).


    Listing 10-10. The viewDidAppear: Function


    `override func viewDidAppear(animated: Bool) {`


        `super.viewDidAppear(animated)`


        `if let indexPath = tableView.indexPathForSelectedRow {`


            `tableView.deselectRowAtIndexPath(indexPath, animated: true)`


        `}`


    `}`


    First, you need to get hold of the `indexPath` of the currently selected row (which
    is the same as it was when the detail view was pushed in), and then use this to
    call the `tableView`’s `deselectRowAtIndexPath:animated:` function.


    If you pass in `true` as the `animated:` parameter, the highlight will be removed
    with a gentle fade effect.


    Although this certainly isn’t going to win any awards for user interface design,
    you’ve now got the navigation controller, table view, and detail view controllers
    wired up and playing nicely together.


    ## Building Navigation Structure with Segues


    So far, you’ve build the app’s structure and navigation processes manually, which
    means that you created the `UINavigationController` in code in the `AppDelegate`,
    and the `TableViewController` and `DetailViewController` aren’t connected in any
    way in the Storyboard.


    There is an alternative way of implementing the same results, which provides a
    more visual indication of what’s going on in the Storyboard. The end results are
    completely identical, so it’s up to you which to implement.


    To illustrate this, let’s convert the app you’ve got at this point to use segues
    to manage the transition between the table and the detail views.


    ### Embedding the Table View in a Navigation Controller


    The first step is to embed the `TableViewController` inside a `UINavigationController`
    in the Storyboard. This is very simple: select the `TableViewController` in the
    Document Outline, and select the Embed In ➤ Navigation Controller item from the
    `Editor` menu.


    This will insert a `Navigation Controller` into the Storyboard, and link the `TableViewController`
    with a relationship`.`


    ![A978-1-4842-1242-4_10_Fig29_HTML.jpg](A978-1-4842-1242-4_10_Fig29_HTML.jpg)


    Figure 10-29.


    The new navigation controller in the Storyboard


    As you can see in Figure [10-29](#A978-1-4842-1242-4_10_Chapter.html#Fig29), the
    `TableViewController` is linked to the `Navigation Controller` by a relationship,
    and the `Navigation Controller` has been set as the app’s initial view controller
    (the inward pointing arrow at the left side of the `Navigation Controller`).


    All of these elements are listed below the `Navigation Controller` scene in the
    Document Outline. It’s at this point in iOS development that you start to appreciate
    the utility of a large monitor!


    The `Navigation Controller` scene has arrived in the Storyboard without any identifier,
    so you will need to set that. Select it in the Document Outline, switch to the
    Identity Inspector in the Utilities pane, and update the Storyboard ID to `NavigationController`,
    as shown in Figure [10-30](#A978-1-4842-1242-4_10_Chapter.html#Fig30).


    ![A978-1-4842-1242-4_10_Fig30_HTML.jpg](A978-1-4842-1242-4_10_Fig30_HTML.jpg)


    Figure 10-30.


    Updating the Navigation Controller’s identifier


    ### Updating the App Delegate


    Since you’ve changed the structure of the Storyboard, you’ll need to update the
    `AppDelegate` to reflect the changes.


    Switch to the `application:didFinishLaunchingWithOptions:` function, and update
    it to match Listing [10-11](#A978-1-4842-1242-4_10_Chapter.html#FPar18).


    Listing 10-11\. The Updated Application:didFinishLaunchingWithOptions: Function


    `func application(application: UIApplication, didFinishLaunchingWithOptions ➤`


    `launchOptions: [NSObject: AnyObject]?) -> Bool {`


        `// Override point for customization after application launch.`


        `let storyboard = UIStoryboard(name: "Main", bundle: nil)`


        `let navigationController = ➤`


      `storyboard.instantiateViewControllerWithIdentifier("NavigationController")`


        `navigationController.navigationBarHidden = false`


        `self.window?.rootViewController = navigationController`


        `self.window?.makeKeyAndVisible()`


        `return true`


    `}`


    Here you’re instantiating `storyboard` as before, but this time you’re loading
    the navigation controller from `storyboard` rather than creating it with code.
    There’s also no need to create an instance of the `TableViewController`; the links
    you made in `storyboard` take care of that for you.'
  trans: "\n### 将导航控制器与详细视图连接起来\n\n这个应用快完成了，但点击单元格并不会让详细视图神奇地出现。要实现这一点，你需要实现 `TableViewController`\
    \ 的 `didSelectRowAtIndexPath:` 函数。\n\n切换到 `TableViewController` 并更新扩展，使其也实现 `UITableViewDelegate`\
    \ 协议：\n\n`extension TableViewController: UITableViewDataSource, UITableViewDelegate\
    \ {`\n\n现在实现 `tableView:didSelectRowAtIndexPath:` 函数，如代码清单 10-9 所示。\n\n**代码清单\
    \ 10-9.** `tableView:didSelectRowAtIndexPath:` 函数\n\n```\nfunc tableView(tableView:\
    \ UITableView, didSelectRowAtIndexPath indexPath:  \nNSIndexPath) {\n    let storyboard\
    \ = UIStoryboard(name: \"Main\", bundle: nil)\n    let detailView = \n  storyboard.instantiateViewControllerWithIdentifier(\"\
    DetailViewController\") as!  \n  DetailViewController\n\n    detailView.displayName\
    \ = tableData[indexPath.row]\n    navigationController?.pushViewController(detailView,\
    \ animated: true)\n}\n```\n\n首先，你需要创建一个 `storyboard` 的实例：\n\n```\nlet storyboard\
    \ = UIStoryboard(name: \"Main\", bundle: nil)\n```\n\n然后，从视图控制器中实例化具有适当 Storyboard\
    \ 标识符的 `DetailViewController`：\n\n```\nlet detailView = \n  storyboard.instantiateViewControllerWithIdentifier(\"\
    DetailViewController\") as! \n  DetailViewController\n```\n\n当 `detailView` 从\
    \ `storyboard` 实例化时，它将是 `UIViewController` 的一个实例，因此你需要使用 `as!` 运算符将其强制向下转换为 `DetailViewController`\
    \ 的实例，以便能够设置 `displayName` 属性。\n\n使用新实例化的 `DetailViewController` 实例，你可以从 `tableData`\
    \ 数组中注入适当的 `Name` 到 `displayName` 属性：\n\n```\ndetailView.displayName = tableData[indexPath.row]\n\
    ```\n\n然后获取 `TableViewController` 所在的导航控制器，以推入新视图：\n\n```\nnavigationController?.pushViewController(detailView,\
    \ animated: true)\n```\n\n现在运行应用，点击一行：`DetailViewController` 会从右侧滑入，点击“返回”按钮会使其再次滑出，如图\
    \ 10-28 所示。\n\n![A978-1-4842-1242-4_10_Fig28_HTML.jpg](img/A978-1-4842-1242-4_10_Fig28_HTML.jpg)\n\
    \n**图 10-28.** 从列表导航到详细视图并返回\n\n还剩下一点清理工作：当详细视图被移除且 `tableView` 重新出现时，你需要取消选中之前选中的行。\n\
    \n`TableViewController` 的 `viewWillAppear:` 和 `viewDidAppear:` 函数会在详细视图被移除前后调用，因此你可以使用\
    \ `viewDidAppear:` 来移除行的选中高亮，如代码清单 10-10 所示。\n\n**代码清单 10-10.** `viewDidAppear:`\
    \ 函数\n\n```\noverride func viewDidAppear(animated: Bool) {\n    super.viewDidAppear(animated)\n\
    \    if let indexPath = tableView.indexPathForSelectedRow {\n        tableView.deselectRowAtIndexPath(indexPath,\
    \ animated: true)\n    }\n}\n```\n\n首先，你需要获取当前选中行的 `indexPath`（与详细视图被推入时相同），然后使用它来调用\
    \ `tableView` 的 `deselectRowAtIndexPath:animated:` 函数。\n\n如果你将 `animated:` 参数传递为\
    \ `true`，高亮将以柔和的淡出效果被移除。\n\n虽然这肯定不会在用户界面设计上获奖，但你现在已经将导航控制器、表格视图和详细视图控制器连接起来，并让它们协同工作了。\n\
    \n## 使用 Segue 构建导航结构\n\n到目前为止，你已经手动构建了应用的结构和导航流程，这意味着你在 `AppDelegate` 的代码中创建了\
    \ `UINavigationController`，而 `TableViewController` 和 `DetailViewController` 在\
    \ Storyboard 中没有任何连接。\n\n还有一种替代方法可以实现相同的效果，它能在 Storyboard 中更直观地显示发生了什么。最终结果完全相同，因此由你决定采用哪种方法。\n\
    \n为了说明这一点，让我们将当前的应用转换为使用 Segue 来管理表格和详细视图之间的转换。\n\n### 将表格视图嵌入导航控制器\n\n第一步是在 Storyboard\
    \ 中将 `TableViewController` 嵌入 `UINavigationController` 中。这很简单：在文档大纲中选择 `TableViewController`，然后从\
