    \  super.didReceiveMemoryWarning()\n        // 处置任何可以重新创建的资源\n    }\n\n}\n```\n\
    \n> **注意**：为了节省空间，在接下来的列表中，我将只显示新增或修改的代码，并附上足够的上下文行。\n\n现在，你将创建实际的数据数组。你的数据数组将是一个包含十个字符串的简单数组。你将在\
