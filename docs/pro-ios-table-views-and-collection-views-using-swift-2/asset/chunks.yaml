  trans: '

    # 模型-视图-控制器模式回顾


    在深入探讨如何通过表格视图或集合视图进行选择、插入和删除的具体机制之前，您需要了解这些操作如何影响表格或集合视图所显示的底层数据。


    这意味着要理解您在第 5 章中遇到的模型-视图-控制器（MVC）架构模式。`UITableView` 和 `UICollectionView` 都是 MVC
    架构的实例，该架构将前端视图与后端模型分离开来。


    MVC 模式描述了这种分离，它将应用程序划分为三个区域：


    *   **视图**：在 iOS 术语中，这些是在 Interface Builder 中或通过代码以编程方式创建的视图（或界面）。就 `UITableView`
    或 `UICollectionView` 而言，视图就是表格或集合视图本身，以及构成表格行或集合视图项的单元格。

    *   **控制器**：代表应用程序的内部逻辑。换句话说，控制器是一个或多个类，负责控制数据的显示以及与表格的交互——原因可能是它本身就是 `UITableViewController`
    或 `UICollectionView` 的一个完整子类，也可能是 `UITableViewController` 或 `UICollectionView`
    的委托和/或数据源。

    *   **模型**：管理应用程序内的数据。模型可以像包含一些字符串的 `Array` 一样简单，也可以是完整的 Core Data 设置。但无论复杂还是简单，正是模型提供了要在
    `tableView` 或 `collectionView` 中显示的数据。


    图 12-1 展示了您之前在第 5 章中见过的 MVC 模式。


    ![A978-1-4842-1242-4_12_Fig1_HTML.jpg](img/A978-1-4842-1242-4_12_Fig1_HTML.jpg)


    *图 12-1. 模型-视图-控制器模式*


    如您所见，控制器从模型中获取并处理数据，然后将数据传递给视图供用户消费。用户与视图交互，而控制器则处理这些交互的结果。


    ## 模型-视图-控制器模式为何重要


    在使用以某种方式响应用户交互的 `tableViews` 或 `collectionViews` 时，牢记 MVC 设计模式非常重要。单元格没有记忆——实际上，它们只是其内容的“信封”。一旦它们滚动出可见视图，就会被复用或完全消失。它们的状态将会丢失——或者更糟，被不恰当地应用到复用单元格的内容上。


    对用户而言，这看起来就像单元格的状态没有“粘性”。如果用户点击某行或某项来设置值并显示一个复选标记，当用户向上或向下滚动时，该选择可能会发生变化。


    这不仅适用于选择操作，也适用于插入、删除和重新排序。以表格中的行删除为例。您的用户点击导航栏上的`编辑`按钮并删除一行。`tableView` 负责显示编辑控件、移除被删除的行，并在其他行向上移动以填补空白时，动画化地展示“队列收拢”的过程。就用户而言，任务已经完成——该行已经消失，不会再回来。


    但是，模型中的底层数据并未因任何用户界面的更改而改变。如果表格被重新加载（例如，如果它是 `UINavigationController` 的一部分，这很可能会发生），原始数据将被重新加载，被删除的行将再次出现。更糟糕的是，如果似乎插入了一行新内容，用户提供的信息将会丢失。


    关键在于，您的用户（或您的应用程序）在视图中所做的任何更改，都必须反映在模型中，以便这些更改得以持久化。`tableView` 或 `collectionView`
    会处理行或项的添加、删除和移动（如果您启用了动画，它会优雅地完成这些操作），但将更改反映到您的模型中则是您的责任。


    ## 表格视图中的单元格选择


    除非 `tableView` 用于显示静态信息，否则用户迟早会与其交互并需要反馈。单元格选择是提供这种反馈的一部分。


    ### 单元格选择的类型


    根据应用程序的功能，您可能需要实现两种类型的单元格选择：


    *   **瞬时选择**，用于向用户提供关于他们正在与哪一行或哪一项进行交互的反馈。

    *   **持久选择**，用于指示表格中的哪些行或集合视图中的哪些项正在显示具有特定状态的数据模型项（例如，可能处于“开启”状态的对象）。


    #### 控制选择


    您可以通过两种方式控制行和项的选择：对整个 `视图` 进行全局控制，或者基于特定行或项进行控制。


    ##### 全局选择


    `UITableView` 有一个 `allowsSelection` 属性，该属性既可以在构建视图时在 Interface Builder 中设置，也可以在视图生命周期的任意时刻通过代码设置。


    将 `allowsSelection` 属性设置为 `false` 会完全禁用行选择，因此视图将不会对触摸作出反应（滚动除外）。


    您可能想要完全禁用选择的原因有两个：


    *   您的视图仅显示数据，不允许与之交互。

    *   表格行或项正在被编辑或重新排列，而选择会干扰此过程。


    您可以通过在 Interface Builder 中选择该选项来控制 `allowsSelection` 属性（见图 12-2）。


    ![A978-1-4842-1242-4_12_Fig2_HTML.jpg](img/A978-1-4842-1242-4_12_Fig2_HTML.jpg)


    *图 12-2. 在 Interface Builder 中设置全局选择属性*


    或者，您也可以在代码中控制它：


    ```

    tableView.allowsSelection = false

    ```

    '
- fmt: "# Understanding How Selection Works for Tables\n\nManaging selection in table\
    \ views is the responsibility of the `UITableViewDelegate` object. If the table\
    \ view doesn’t have a `delegate` object set, selection events will be ignored.\n\
    \nThere are four `UITableViewDelegate` functions that work together to provide\
    \ selection functionality:\n\n- `tableView:willSelectRowAtIndexPath:`: This function\
    \ is called after the user has touched down and lifted a finger (a `TouchUpInside`\
    \ action, in other words), but before the `tableView:didSelectRowAtIndexPath:`\
    \ function is called. By default, this function isn’t implemented. Implementing\
    \ this and returning `nil` will prevent the row selection from taking place. If\
    \ you return an `indexPath` that refers to another row, that row will be selected\
    \ instead of the row that was tapped.\n- `tableView:didSelectRowAtIndexPath:`:\
    \ Assuming that the `tableView:willSelectRowAtIndexPath:` function didn’t return\
    \ `nil`, this is where you can implement your custom behavior. The behavior could\
    \ be presentational (displaying a check mark, for example) or can cause some kind\
    \ of navigation action (for example, a `pushNavigationController` action).\n-\
    \ `tableView:willDeselectRowAtIndexPath:`: This function is called only if an\
    \ existing selection has been made. It returns the `indexPath` of the row that\
    \ should be deselected—and so gives you the opportunity to deselect another row\
    \ in place of the one that is currently selected. Try as I might, I’ve never been\
    \ able to conjure up a scenario where this was required, but your mileage may\
    \ vary. If you return `nil` from this function, the row won’t be deselected, which\
    \ effectively means you can “lock” selection if required.\n- `tableView:didDeselectRowAtIndexPath:`:\
    \ This function tells the delegate that the row is now deselected. It’s the place\
    \ where you want to reverse any custom selection traits that you created. If you\
    \ have a custom cell that shows selection by turning the `textLabel` green, for\
    \ example, you would use the `tableView:didDeselectRowAtIndexPath:` function to\
    \ change it back to the normal color.\n\n> **Tip**\n>\n> If cell selection appears\
    \ to lag behind the user’s input, you might have inadvertently implemented `tableView:willDeselectRowAtIndexPath:`\
    \ instead of `tableView:didSelectRowAtIndexPath:`. It’s surprisingly easy to be\
    \ tripped up by Xcode’s autocompletion, and once the wrong function has been added\
    \ to your code, it can be difficult to spot where the problem has been introduced.\n\
    \n## Managing Row-Specific Selection\n\nIn addition to enabling or disabling selection\
    \ at the global `tableView` level, you may also need to control it at the row\
    \ level. For example, later in this chapter, you’ll build a table that allows\
    \ extra rows to be inserted by tapping an Add New row.\n\nDepending on the requirements\
    \ of your data model, you might want to disable this function.\n\nBy checking\
    \ which row is being selected in the `tableView:willSelectRowAtIndexPath:` function,\
    \ you can add conditional code to allow the selection of some rows and prevent\
    \ the selection of others. This is shown in Listing 12-1.\n\n**Listing 12-1.**\
    \ Checking Row Selection in `tableView:willSelectRowAtIndexPath:`\n\n```\nfunc\
    \ tableView(tableView: UITableView, willSelectRowAtIndexPath\nindexPath: NSIndexPath)\
    \  -> NSIndexPath? {\n    let rowNotToSelect = 3\n    if indexPath.row == rowNotToSelect\
    \ {\n        return nil\n    }\n    return indexPath\n}\n```\n\nThis code arbitrarily\
    \ prevents the selection of row 3, and returns `nil` if it’s row 3 that’s being\
    \ checked.\n\nYou can also return an `indexPath` other than the value that was\
    \ passed in if you wanted to select another row, rather than the one that was\
    \ tapped. I haven’t been able to think of any situation where you’d actually want\
    \ to do that, but it’s there if you need it.\n\n## Visualizing Selection\n\nVisualizing\
    \ the selection provides feedback to your user that their actions have been registered\
    \ by the app. It can also provide a cue that something is about to happen or is\
    \ taking place.\n\nWhen the user taps a table row, the standard behavior turns\
    \ the row’s background light grey and the `textLabel` black, as shown in Figure\
    \ 12-3.\n\n![A978-1-4842-1242-4_12_Fig3_HTML.jpg](A978-1-4842-1242-4_12_Fig3_HTML.jpg)\n\
    \n**Figure 12-3.** The default row selection style\n\nYou may also want to disable\
    \ the selection highlight completely if it will interfere with any custom selection\
    \ behavior that you implement.\n\nSomewhat counter-intuitively, setting the `selectionStyle`\
    \ to `None` does not prevent cell selection, so all the selection-related functions\
    \ will fire. It just doesn’t provide any feedback to the user.\n\nAll styles are\
    \ set by the cell’s `selectionStyle` property. In most scenarios, you’d set this\
    \ in the `tableView:cellForRowAtIndexPath:` function, for example:\n\n```\ncell.selectionStyle\
    \ = UITableViewCellSelectionStyle.None\n```\n\nAlternatively, you can set the\
    \ `Selection` property to `None` in Interface Builder.\n\n### Customizing Selection\n\
    \nYou’re not restricted to the standard white-on-blue or white-on-gray selection\
    \ highlight styles. If you’ve customized the `tableView` cells, this highlighting\
    \ style probably won’t be appropriate anyway.\n\nBy adding custom code, you can\
    \ manipulate your cells as you see fit. You could do this as cells are dequeued\
    \ by using the `tableView:didSelectRowAtIndexPath:` function, or you can manage\
    \ this in a `UITableViewCell` subclass.\n\nFigure 12-4 shows an example from one\
    \ of my apps.\n\n![A978-1-4842-1242-4_12_Fig4_HTML.jpg](A978-1-4842-1242-4_12_Fig4_HTML.jpg)\n\
    \n**Figure 12-4.** A custom cell in normal and highlighted state\n\nThe cell background\
    \ and outlines are `UIViews`, so it’s possible to manipulate their `backgroundColor`\
    \ properties. They’re set to orange in the cell’s XIB file, and then switched\
    \ to blue in the `tableView:didSelectRowAtIndexPath:` function:\n\n```\n// Set\
    \ cell highlight\nlet blueColor = UIColor(colorWithRed:0.08 green:0.4 blue:0.58\
    \ alpha:1.0)\ncell.codeBackgroundView.backgroundColor = blueColor;\ncell.frameTopView.backgroundColor\
    \ = blueColor;\ncell.frameBottomView.backgroundColor = blueColor;\ncell.titleLabel.textColor\
    \ = blueColor;\n```\n\n> **Tip**\n>\n> One of the limitations of Interface Builder\
    \ is that there’s no line tool (or shape tools of any description, for that matter).\
    \ This makes drawing lines awkward. One option is to include line graphics as\
    \ `UIImageViews`, but that’s quite expensive in rendering terms.\n>\n> Another\
    \ option is to place `UIViews` where the lines are required, and set the width\
    \ (or height) to a very small value—say, 1 or 2 points. You can use the `UIView`’s\
    \ `backgroundColor` property to set the color of your “line.” You’re restricted\
    \ to solid lines of a single color, but it’s often a quicker process than creating\
    \ line graphics in another package and importing them as images."
