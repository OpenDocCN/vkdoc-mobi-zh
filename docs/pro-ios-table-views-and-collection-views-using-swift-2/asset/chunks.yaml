- fmt: "### The Process of Creating Custom Cells\n\nCreating custom cells with subclasses\
    \ is a multi-stage process, with two common steps at the outset regardless of\
    \ which approach you’re taking.\n\nWith a pencil and paper, design the layout\
    \ of your custom cell. This isn’t a compulsory step, but having an idea of how\
    \ the cell will fit together on paper tends to pay dividends in the long run.\
    \ Create a class for each type of custom cell that inherits from `UITableViewCell`\
    \ or `UICollectionViewCell` and implement properties for the dynamic view objects\
    \ that you are going to create in your cell, and any properties that you need\
    \ to set from outside the cell.\n\nThen, you have a choice of two visual approaches:\n\
    \n- Build your cell as a XIB in Interface Builder, and populate it with the view\
    \ objects that you need: labels, views, images, and so on.\n- Build the cell as\
    \ a prototype cell in your Storyboard, populating it with view objects as you\
    \ would in a XIB.\n\nOr a code-based approach:\n\n- In the custom subclass, lay\
    \ out the cell in code by overriding the initialization function–`init(style:reuseIdentifier)`–and\
    \ add controls to the `contentView`.\n\nThen, the final common steps:\n\nAdd any\
    \ custom initialization to the `layoutSubviews` function that the cell needs in\
    \ order to function. When the table needs to fill a row with a custom cell, instantiate\
    \ an instance of your custom `UITableViewCell` or `UICollectionView` subclass\
    \ in the `dataSource`, and set the dynamic properties according to the data. Rinse\
    \ and repeat as required!\n\nAs you can see, it’s really not all that complicated\
    \ a process. Keep in mind a couple of subtleties as you build your custom cell\
    \ (see the note below for details) and you’ll find that this is actually a quick\
    \ and flexible process.\n\n#### Some Performance-Related Factors to Bear in Mind\n\
    \nWhen creating a subclasses of `UITableViewCell` or `UICollectionView`, there\
    \ are a couple of performance-related factors to bear in mind in order to maximize\
    \ the performance of your table:\n\n- Be wary of building cells that are expensive\
    \ for the graphics engine to render. Although the GPUs (graphics processing units)\
    \ built into the iPhone and iPad provide breathtaking performance considering\
    \ the size of the devices, they aren’t infallible. In particular, be careful with\
    \ transparency and alpha values. If the GPU has to calculate how much of a lower\
    \ layer can be seen through the transparency mask of an upper layer, this can\
    \ result in a serious performance hit. This is covered in more detail in [Chapter\
    \ 9](#A978-1-4842-1242-4_9_Chapter.html).\n- Don’t violate the principles of MVC.\
    \ Your custom cell is a view, and as such should only be concerned with displaying\
    \ content. If you need to undertake any kind of code-based configuration of that\
    \ content (concatenating strings or adding values, for example), this should take\
    \ place in the datasource, not in the view.\n\nHaving mentioned these two caveats,\
    \ don’t let them put you off trying to push the boundaries of what’s possible.\
    \ The members of the iOS device family are high-performance little beasts, so\
    \ you’ll most likely be surprised at what’s possible before you start to push\
    \ at the limits of their capabilities.\n\n### Custom Cells with XIBs\n\nIn this\
    \ section, you’ll look at the process of designing custom cell subclasses in conjunction\
    \ with Interface Builder and XIBs.\n\n#### Designing Your Cell\n\nWhen designing\
    \ a custom cell, I put down my Magic Mouse and reach for a pencil and some (squared)\
    \ paper. That’s what works for me–your approach may differ–but I find that if\
    \ I start trying to design a cell in Interface Builder, two problems quickly emerge.\n\
    \nFirstly, Interface Builder tends to push me in the direction of “pixel perfection”\
    \ before I’ve decided on what the cell is actually going to do. The fact that\
    \ you can (relatively) easily line things up exactly means it’s very tempting\
    \ to spend your time doing just that, at the expense of thinking about the overall\
    \ design.\n\nSecondly, I become frustrated by the limitations of Interface Builder\
    \ quite quickly. It looks like it should have the same level of fine-detailed\
    \ control over layout as a tool like Photoshop, but it simply doesn’t. If laying\
    \ out designs in Photoshop is precision surgery with a scalpel, then Interface\
    \ Builder can sometimes feel like painting a brick wall with a broom.\n\n> **Note**\n\
    > To illustrate the process of creating custom cells, and using multiple types\
    \ of cells in the same table, we’ll create a somewhat-contrived example with two\
    \ types, one cell type for even-numbered rows and one cell type for odd-numbered\
    \ rows.\n\n#### Creating the Class for the Custom Cell\n\nThe new custom cells\
    \ that you will create will be instances of a subclass of `UITableViewCell` or\
    \ `UICollectionViewCell`. This means that when you create them, they will have\
    \ all the functionality of a “standard” cell, but with the opportunity to add\
    \ additional functions of your own.\n\nTo illustrate this process, you’ll create\
    \ two `UITableViewCell` subclasses, which you’ll refer to as `OddCell` and `EvenCell`,\
    \ so that eventually the table will have two distinct types of cells with differing\
    \ layouts.\n\nThe process is virtually identical for `UICollectionView`, but you’ll\
    \ look at this specifically later in the chapter.\n\n##### Creating the Subclasses\n\
    \nThe first step is to create the subclasses (Figure [8-1](#A978-1-4842-1242-4_8_Chapter.html#Fig1)).\
    \ In Xcode, Ctrl-click the group in which you want to create the new class and\
    \ select New File from the pop-up window.\n\nThen, select the Cocoa class icon\
    \ from the Source group, and click Next, as shown in Figure [8-1](#A978-1-4842-1242-4_8_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1242-4_8_Fig1_HTML.jpg](A978-1-4842-1242-4_8_Fig1_HTML.jpg)\n\n\
    **Figure 8-1.** Creating a new subclass\n\nThe next screen allows you to choose\
    \ which superclass your new class is going to belong to. Select `UITableViewCell`\
    \ from the drop-down menu.\n\nCall your new class `OddCell` and save it. You’ll\
    \ now see the class file for `OddCell`.\n\nNow, you need to create properties\
    \ for the custom controls within the cell (Listing [8-1](#A978-1-4842-1242-4_8_Chapter.html#FPar3)).\n\
    \n**Listing 8-1.** The `OddCell` Class\n\n```\nimport UIKit\n\nclass OddCell:\
    \ UITableViewCell {\n\n    @IBOutlet var backView: UIImageView!\n    @IBOutlet\
    \ var iconView: UIImageView!\n    @IBOutlet var cellTitle: UILabel!\n    @IBOutlet\
    \ var cellContent: UILabel!\n\n    override func awakeFromNib() {\n        super.awakeFromNib()\n\
    \        // Initialization code\n    }\n\n    override func setSelected(selected:\
    \ Bool, animated: Bool) {\n        super.setSelected(selected, animated: animated)\n\
    \        // Configure the view for the selected state\n    }\n}\n```\n\nHaving\
    \ got this far, you are now ready to build `OddCell`’s XIB and wire up the class’s\
    \ properties with the outlets in the XIB file.\n\n#### Building the Cell in Interface\
    \ Builder\n\nCreating the cell itself is a four-stage process, which you will\
    \ complete inside Interface Builder.\n\n- Create the XIB file (if you checked\
    \ the Also Create XIB File option when creating the subclass, this is unnecessary).\n\
    - Lay the custom controls out inside the XIB.\n- Conform the XIB to your custom\
    \ class.\n- Link up the custom controls with the properties of the custom class."
  raw: '### The Process of Creating Custom Cells


    Creating custom cells with subclasses is a multi-stage process, with two common
    steps at the outset regardless of which approach you’re taking.


    With a pencil and paper, design the layout of your custom cell. This isn’t a compulsory
    step, but having an idea of how the cell will fit together on paper tends to pay
    dividends in the long run.   Create a class for each type of custom cell that
    inherits from `UITableViewCell` or `UICollectionViewCell` and implement properties
    for the dynamic view objects that you are going to create in your cell, and any
    properties that you need to set from outside the cell.  


    Then, you have a choice of two visual approaches:


    *   Build your cell as a XIB in Interface Builder, and populate it with the view
    objects that you need: labels, views, images, and so on.

    *   Build the cell as a prototype cell in your Storyboard, populating it with
    view objects as you would in a XIB.


    Or a code-based approach:


    *   In the custom subclass, lay out the cell in code by overriding the initialization
    function–`init(style:reuseIdentifier)`–and add controls to the `contentView`.


    Then, the final common steps:


    Add any custom initialization to the `layoutSubviews` function that the cell needs
    in order to function.   When the table needs to fill a row with a custom cell,
    instantiate an instance of your custom `UITableViewCell` or `UICollectionView`
    subclass in the `dataSource`, and set the dynamic properties according to the
    data.   Rinse and repeat as required!  


    As you can see, it’s really not all that complicated a process. Keep in mind a
    couple of subtleties as you build your custom cell (see the note below for details)
    and you’ll find that this is actually a quick and flexible process.


    SOME PERFORMANCE-RELATED FACTORS TO BEAR IN MIND


    When creating a subclasses of `UITableViewCell` or `UICollectionView`, there are
    a couple of performance-related factors to bear in mind in order to maximize the
    performance of your table:


    *   Be wary of building cells that are expensive for the graphics engine to render.
    Although the GPUs (graphics processing units) built into the iPhone and iPad provide
    breathtaking performance considering the size of the devices, they aren’t infallible.
    In particular, be careful with transparency and alpha values. If the GPU has to
    calculate how much of a lower layer can be seen through the transparency mask
    of an upper layer, this can result in a serious performance hit. This is covered
    in more detail in [Chapter 9](#A978-1-4842-1242-4_9_Chapter.html).

    *   Don’t violate the principles of MVC. Your custom cell is a view, and as such
    should only be concerned with displaying content. If you need to undertake any
    kind of code-based configuration of that content (concatenating strings or adding
    values, for example), this should take place in the datasource, not in the view.


    Having mentioned these two caveats, don’t let them put you off trying to push
    the boundaries of what’s possible. The members of the iOS device family are high-performance
    little beasts, so you’ll most likely be surprised at what’s possible before you
    start to push at the limits of their capabilities.


    ## Custom Cells with XIBs


    In this section, you’ll look at the process of designing custom cell subclasses
    in conjunction with Interface Builder and XIBs.


    ### Designing Your Cell


    When designing a custom cell, I put down my Magic Mouse and reach for a pencil
    and some (squared) paper. That’s what works for me–your approach may differ–but
    I find that if I start trying to design a cell in Interface Builder, two problems
    quickly emerge.


    Firstly, Interface Builder tends to push me in the direction of “pixel perfection”
    before I’ve decided on what the cell is actually going to do. The fact that you
    can (relatively) easily line things up exactly means it’s very tempting to spend
    your time doing just that, at the expense of thinking about the overall design.


    Secondly, I become frustrated by the limitations of Interface Builder quite quickly.
    It looks like it should have the same level of fine-detailed control over layout
    as a tool like Photoshop, but it simply doesn’t. If laying out designs in Photoshop
    is precision surgery with a scalpel, then Interface Builder can sometimes feel
    like painting a brick wall with a broom.


    Note


    To illustrate the process of creating custom cells, and using multiple types of
    cells in the same table, we’ll create a somewhat-contrived example with two types,
    one cell type for even-numbered rows and one cell type for odd-numbered rows.


    ### Creating the Class for the Custom Cell


    The new custom cells that you will create will be instances of a subclass of `UITableViewCell`
    or `UICollectionViewCell`. This means that when you create them, they will have
    all the functionality of a “standard” `cell`, but with the opportunity to add
    additional functions of your own.


    To illustrate this process, you’ll create two `UITableViewCell` subclasses, which
    you’ll refer to as `OddCell` and `EvenCell`, so that eventually the table will
    have two distinct types of cells with differing layouts.


    The process is virtually identical for `UICollectionView`, but you’ll look at
    this specifically later in the chapter.


    #### Creating the Subclasses


    The first step is to create the subclasses (Figure [8-1](#A978-1-4842-1242-4_8_Chapter.html#Fig1)).
    In Xcode, Ctrl-click the group in which you want to create the new class and select
    New File from the pop-up window.


    Then, select the Cocoa class icon from the Source group, and click Next, as shown
    in Figure [8-1](#A978-1-4842-1242-4_8_Chapter.html#Fig1).


    ![A978-1-4842-1242-4_8_Fig1_HTML.jpg](A978-1-4842-1242-4_8_Fig1_HTML.jpg)


    Figure 8-1.


    Creating a new subclass


    The next screen allows you to choose which superclass your new class is going
    to belong to. Select `UITableViewCell` from the drop-down menu.


    Call your new class `OddCell` and save it. You’ll now see the class file for `OddCell`.


    Now, you need to create properties for the custom controls within the cell (Listing
    [8-1](#A978-1-4842-1242-4_8_Chapter.html#FPar3)).


    Listing 8-1. The OddCell Class


    `import UIKit`


    `class OddCell: UITableViewCell {`


        `@IBOutlet var backView: UIImageView!`


        `@IBOutlet var iconView: UIImageView!`


        `@IBOutlet var cellTitle: UILabel!`


        `@IBOutlet var cellContent: UILabel!`


        `override func awakeFromNib() {`


            `super.awakeFromNib()`


            `// Initialization code`


        `}`


        `override func setSelected(selected: Bool, animated: Bool) {`


            `super.setSelected(selected, animated: animated)`


            `// Configure the view for the selected state`


        `}`


    `}`


    Having got this far, you are now ready to build `OddCell`’s XIB and wire up the
    class’s properties with the outlets in the XIB file.


    ### Building the Cell in Interface Builder


    Creating the cell itself is a four-stage process, which you will complete inside
    Interface Builder.


    Create the XIB file (if you checked the Also Create XIB File option when creating
    the subclass, this is unnecessary).   Lay the custom controls out inside the XIB.
      Conform the XIB to your custom class.   Link up the custom controls with the
    properties of the custom class.'
  trans: "\n### 自定义单元格的创建流程\n\n通过子类创建自定义单元格是一个多阶段的过程，无论采用哪种方法，初始阶段都有两个通用步骤。\n\n首先，用纸笔设计自定义单元格的布局。这一步并非强制要求，但从长远来看，先在纸上构思好单元格各部分的组合方式通常会带来回报。接着，为每种继承自`UITableViewCell`或`UICollectionViewCell`的自定义单元格类型创建一个类，并为你将在单元格中创建的动态视图对象以及需要从单元格外部设置的任何属性实现对应的属性。\n\
    \n然后，你可以选择两种可视化方法之一：\n\n- 在 Interface Builder 中将单元格构建为 XIB，并用你需要的视图对象（如标签、视图、图像等）填充它。\n\
    - 在 Storyboard 中将单元格构建为原型单元格，并像在 XIB 中一样用视图对象填充它。\n\n或者选择基于代码的方法：\n\n- 在自定义子类中，通过重写初始化函数\
    \ `init(style:reuseIdentifier)` 在代码中布局单元格，并将控件添加到 `contentView` 中。\n\n最后，是最终的通用步骤：\n\
    \n在单元格所需的 `layoutSubviews` 函数中添加任何自定义初始化代码，以确保其正常运行。当表格需要使用自定义单元格填充一行时，在 `dataSource`\
    \ 中实例化你的自定义 `UITableViewCell` 或 `UICollectionView` 子类的一个实例，并根据数据设置动态属性。根据需要重复此过程！\n\
    \n如你所见，这其实并不是一个复杂的过程。在构建自定义单元格时，只需注意一些细微之处（详见下方注释），你就会发现这实际上是一个快速且灵活的过程。\n\n####\
    \ 需要注意的性能相关因素\n\n在创建`UITableViewCell`或`UICollectionView`的子类时，为了最大化表格的性能，需要注意以下几个与性能相关的因素：\n\
    \n- 注意避免构建那些对图形引擎渲染成本高昂的单元格。尽管 iPhone 和 iPad 内置的 GPU（图形处理单元）考虑到设备尺寸已提供了惊人的性能，但它们并非无懈可击。尤其要小心透明度和\
    \ alpha 值。如果 GPU 需要计算通过上层透明度遮罩能看到多少下层内容，这可能会导致严重的性能下降。更多细节请参阅第 9 章。\n- 不要违反 MVC\
    \ 原则。你的自定义单元格是一个视图，因此应仅负责显示内容。如果你需要对内容进行任何基于代码的配置（例如拼接字符串或添加数值），这些操作应在数据源中完成，而非视图本身。\n\
    \n提到这两点注意事项后，不要因此放弃探索可能性的边界。iOS 设备家族成员都是高性能的小野兽，所以在触及它们的能力极限之前，你很可能会对所能实现的效果感到惊讶。\n\
    \n### 使用 XIB 的自定义单元格\n\n在本节中，你将学习如何结合 Interface Builder 和 XIB 来设计自定义单元格子类的过程。\n\
    \n#### 设计你的单元格\n\n在设计自定义单元格时，我会放下 Magic Mouse，拿起铅笔和方格纸。这对我来说很有效——你的方法可能不同——但我发现，一旦开始尝试在\
    \ Interface Builder 中设计单元格，两个问题会很快浮现。\n\n首先，在我还没决定单元格实际要做什么之前，Interface Builder\
    \ 往往会将我推向“像素完美”的方向。由于可以（相对）轻松地将元素精准对齐，很容易让人把时间花在这上面，而牺牲了对整体设计的思考。\n\n其次，我会很快对\
    \ Interface Builder 的局限性感到沮丧。它看起来应该像 Photoshop 这类工具一样具备对布局的精细控制能力，但实际上并非如此。如果说用\
    \ Photoshop 设计布局是用手术刀进行精密手术，那么用 Interface Builder 有时会感觉像用扫帚粉刷砖墙。\n\n> **注**\n\
    > 为了说明创建自定义单元格的过程，以及在同一表格中使用多种类型的单元格，我们将创建一个略为刻意的示例，包含两种类型：一种用于偶数行的单元格，另一种用于奇数行的单元格。\n\
    \n#### 创建自定义单元格的类\n\n你将创建的新自定义单元格将是`UITableViewCell`或`UICollectionViewCell`子类的实例。这意味着在创建它们时，它们将具备“标准”单元格的所有功能，同时你还有机会添加自己的额外功能。\n\
    \n为说明这一过程，你将创建两个`UITableViewCell`子类，分别命名为`OddCell`和`EvenCell`，这样表格最终将拥有两种不同布局的单元格类型。\n\
    \n该过程对于`UICollectionView`几乎完全相同，但你将在本章稍后部分具体了解。\n\n##### 创建子类\n\n第一步是创建子类（图 8-1）。在\
    \ Xcode 中，按住 Ctrl 键单击你要创建新类的分组，然后从弹出窗口中选择“新建文件”。\n\n接着，从“来源”分组中选择 Cocoa 类图标，点击“下一步”，如图\
    \ 8-1 所示。\n\n![A978-1-4842-1242-4_8_Fig1_HTML.jpg](img/A978-1-4842-1242-4_8_Fig1_HTML.jpg)\n\
    \n**图 8-1.** 创建新子类\n\n下一屏幕允许你选择新类所属的父类。从下拉菜单中选择`UITableViewCell`。\n\n将你的新类命名为\
    \ `OddCell` 并保存。现在你会看到 `OddCell` 的类文件。\n\n接下来，你需要为单元格内的自定义控件创建属性（清单 8-1）。\n\n\
    **清单 8-1.** `OddCell` 类\n\n```\nimport UIKit\n\nclass OddCell: UITableViewCell\
    \ {\n\n    @IBOutlet var backView: UIImageView!\n    @IBOutlet var iconView: UIImageView!\n\
    \    @IBOutlet var cellTitle: UILabel!\n    @IBOutlet var cellContent: UILabel!\n\
    \n    override func awakeFromNib() {\n        super.awakeFromNib()\n        //\
    \ 初始化代码\n    }\n\n    override func setSelected(selected: Bool, animated: Bool)\
    \ {\n        super.setSelected(selected, animated: animated)\n        // 配置选中状态下的视图\n\
    \    }\n}\n```\n\n至此，你就可以构建 `OddCell` 的 XIB 文件，并将类的属性与 XIB 文件中的输出口连接起来了。\n\n####\
    \ 在 Interface Builder 中构建单元格\n\n创建单元格本身是一个四个阶段的过程，你将在 Interface Builder 中完成。\n\
    \n- 创建 XIB 文件（如果在创建子类时勾选了“同时创建 XIB 文件”选项，则此步骤可省略）。\n- 在 XIB 中布局自定义控件。\n- 将 XIB\
    \ 与你的自定义类关联。\n- 将自定义控件与自定义类的属性连接起来。\n"
- fmt: "#### Creating the XIB File\n\nIn Xcode, Ctrl-click the group in which you\
    \ want to create the new XIB and select New File from the pop-up window.\n\nThen,\
    \ select the `User Interface` section in the iOS group, and select the `View`\
    \ icon from the list of templates (Figure [8-2](#A978-1-4842-1242-4_8_Chapter.html#Fig2)).\n\
    \n![A978-1-4842-1242-4_8_Fig2_HTML.jpg](A978-1-4842-1242-4_8_Fig2_HTML.jpg)\n\n\
    Figure 8-2. Choosing a template\n\nThen you need to provide a name for the cell\
    \ (I’m calling it `OddCell` for consistency) and click `Create` to save it.\n\n\
    The new view will open up in Interface Builder, with a blank view. Xcode has assumed\
    \ that this is a view with a size class of `Any, Any`, which is not what you want.\
    \ So somewhat counter-intuitively, the first thing you need to do after creating\
    \ the new view is delete it.\n\nHighlight the icon for the view in the left-hand\
    \ Document Outline, and press delete. You now have a completely empty Interface\
    \ Builder pane.\n\nThis is the point when you create the new cell. Midway down\
    \ the list of objects in the Utilities area is the `Table View Cell`. Drag this\
    \ out into the center pane, and you have replaced the full-window view with a\
    \ table view cell (Figure [8-3](#A978-1-4842-1242-4_8_Chapter.html#Fig3)).\n\n\
    ![A978-1-4842-1242-4_8_Fig3_HTML.jpg](A978-1-4842-1242-4_8_Fig3_HTML.jpg)\n\n\
    Figure 8-3. The new empty cell\n\nThe new cell will automatically have a standard\
    \ size. You can resize it in the same way as other `UIView` controls: either grab\
    \ the sizing handles around the cell’s border, or set the dimensions in the Size\
    \ Inspector.\n\nWhichever function you use, make a note of the height; you will\
    \ need it later to return from the `tableView:heightForCellAtIndexPath:` function.\
    \ My `OddCell` is 70 points high.\n\n#### Laying Out Controls in Interface Builder\n\
    \nIn essence, this is exactly the same process that you have been through before:\
    \ drag instances of the controls from the Object Library into the `UITableViewCell`,\
    \ and then size and lay them out appropriately.\n\nHow you do this will obviously\
    \ depend on the design of your cells. This is my work-in-progress `OddCell` XIB,\
    \ which has four controls (Figure [8-4](#A978-1-4842-1242-4_8_Chapter.html#Fig4)):\n\
    \n![A978-1-4842-1242-4_8_Fig4_HTML.jpg](A978-1-4842-1242-4_8_Fig4_HTML.jpg)\n\n\
    Figure 8-4. The OddCell XIB in progress\n\n- Two `UIImageViews`, one for the background\
    \ and one for the icon\n- Two `UILabels`, one for the cell’s title and one for\
    \ the cell’s content\n\nWhen fully instantiated, instances of `OddCell` will look\
    \ like Figure [8-5](#A978-1-4842-1242-4_8_Chapter.html#Fig5).\n\n![A978-1-4842-1242-4_8_Fig5_HTML.jpg](A978-1-4842-1242-4_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5. The OddCell\n\n#### Conforming the Cell to the Custom Class\n\n\
    This step is required if you didn’t create the XIB file when you created the custom\
    \ class. If you did, the cell in the XIB file will be an instance of the correct\
    \ subclass and you can skip straight to the next section.\n\nIf not, the cell\
    \ is an instance of `UITableViewCell`. In your custom class, which itself is a\
    \ subclass of `UITableViewCell`, you have created a raft of outlets for custom\
    \ controls.\n\nThe problem is that because your custom class is a subclass of\
    \ `UITableViewCell`, the parent class neither knows nor cares about the outlets\
    \ and properties that you created. In order to connect the controls inside the\
    \ cell up to the outlets in the custom subclass, you are going to have to conform\
    \ the cell to the subclass.\n\nFortunately, this is probably the simplest part\
    \ of the whole process. In the Objects section, highlight the Table View cell\
    \ icon (shown in Figure [8-6](#A978-1-4842-1242-4_8_Chapter.html#Fig6)).\n\n![A978-1-4842-1242-4_8_Fig6_HTML.jpg](A978-1-4842-1242-4_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6. The Objects section\n\nThen switch over to the Identity Inspector,\
    \ and expand the Custom Class section if it isn’t visible. At the moment, it’ll\
    \ show that the cell is inheriting from `UITableViewCell`.\n\nWhat you need to\
    \ do is to change this so that the cell’s class is your custom subclass of `UITableViewCell`.\
    \ Overtype the contents of the Custom Class section, and Xcode will autocomplete\
    \ the field with the name of the `UITableViewCell` subclass (Figure [8-7](#A978-1-4842-1242-4_8_Chapter.html#Fig7)).\n\
    \n![A978-1-4842-1242-4_8_Fig7_HTML.jpg](A978-1-4842-1242-4_8_Fig7_HTML.jpg)\n\n\
    Figure 8-7. Changing the cell’s owner\n\n> **Tip:** There will probably come a\
    \ point in your table-building career when your app crashes as soon as your custom\
    \ table is loaded, with an error that looks something along the lines of this:\n\
    >\n> `2015-11-05 19:58:13.263 myApp[6042:f803] *** Terminating app due to uncaught\
    \ exception ’NSUnknownKeyException’, reason: ’[<UITableViewCell 0x6895790> setValue:forUndefinedKey:]:\
    \ this class is not key value coding-compliant for the key cellSubtitle.’`\n>\n\
    > Don’t panic. This is almost certainly the result of something going wrong with\
    \ the connections of the cell controls. Check that you’ve made the connections\
    \ from the custom cell, and not the file’s owner.\n\n#### Linking Up Custom Controls\n\
    \nIf you’ve created any controls in the cell through Interface Builder, as opposed\
    \ to instantiating them in code, then these will currently be sitting in the cell\
    \ as orphans. If they’re not going to change in response to the cell’s data (for\
    \ example, if you’ve got a static background view), then that’s fair enough. But\
    \ if you do want the controls to reflect the data in the model, then they’ll have\
    \ to be connected to the outlets in the custom class.\n\nThis will be familiar\
    \ by now. Ctrl-click on the Custom Cell in the Objects list to reveal the Outlets\
    \ HUD, and drag from the circle out to the control in the cell itself, as shown\
    \ in Figure [8-8](#A978-1-4842-1242-4_8_Chapter.html#Fig8).\n\n![A978-1-4842-1242-4_8_Fig8_HTML.jpg](A978-1-4842-1242-4_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8. The Outlets HUD\n\nRepeat this for all the dynamic controls that\
    \ you’ve inserted into the cell.\n\n> **Note:** Because this custom cell is a\
    \ subclass of `UITableViewCell`, it inherits all `UITableViewCell`’s properties\
    \ such as `accessoryView` and `backgroundView`.\n\n#### Creating the EvenCell\n\
    \nIn this example, the `EvenCell` class is not too dissimilar to the `OddCell`\
    \ class, but of course you’ve got free rein to create cells that are radically\
    \ different if your app requires that.\n\nInstances of `EvenCell` will look like\
    \ Figure [8-9](#A978-1-4842-1242-4_8_Chapter.html#Fig9).\n\n![A978-1-4842-1242-4_8_Fig9_HTML.jpg](A978-1-4842-1242-4_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9. The EvenCell\n\nThe `EvenCell` subclass is more-or-less identical\
    \ to `OddCell`, save for an extra property; see Listing [8-2](#A978-1-4842-1242-4_8_Chapter.html#FPar6).\n\
    \nListing 8-2. The EvenCell Subclass\n\n```\nimport UIKit\n\nclass EvenCell: UITableViewCell\
    \ {\n\n    @IBOutlet var backView: UIImageView!\n    @IBOutlet var iconView: UIImageView!\n\
    \    @IBOutlet var cellTitle: UILabel!\n    @IBOutlet var cellMainContent: UILabel!\n\
    \    @IBOutlet var cellOtherContent: UILabel!\n\n    override func awakeFromNib()\
    \ {\n        super.awakeFromNib()\n        // Initialization code\n    }\n\n \
    \   override func setSelected(selected: Bool, animated: Bool) {\n        super.setSelected(selected,\
    \ animated: animated)\n        // Configure the view for the selected state\n\
    \    }\n\n}\n```"
  raw: '#### Creating the XIB File


    In Xcode, Ctrl-click the group in which you want to create the new XIB and select
    New File from the pop-up window.


    Then, select the `User Interface` section in the iOS group, and select the `View`
    icon from the list of templates (Figure [8-2](#A978-1-4842-1242-4_8_Chapter.html#Fig2)).


    ![A978-1-4842-1242-4_8_Fig2_HTML.jpg](A978-1-4842-1242-4_8_Fig2_HTML.jpg)


    Figure 8-2.


    Choosing a template


    Then you need to provide a name for the cell (I’m calling it `OddCell` for consistency)
    and click `Create` to save it.


    The new view will open up in Interface Builder, with a blank view. Xcode has assumed
    that this is a view with a size class of `Any, Any`, which is not what you want.
    So somewhat counter-intuitively, the first thing you need to do after creating
    the new view is delete it.


    Highlight the icon for the view in the left-hand Document Outline, and press delete.
    You now have a completely empty Interface Builder pane.


    This is the point when you create the new cell. Midway down the list of objects
    in the Utilities area is the `Table View Cell`. Drag this out into the center
    pane, and you have replaced the full-window view with a table view cell (Figure
    [8-3](#A978-1-4842-1242-4_8_Chapter.html#Fig3)).


    ![A978-1-4842-1242-4_8_Fig3_HTML.jpg](A978-1-4842-1242-4_8_Fig3_HTML.jpg)


    Figure 8-3.


    The new empty cell


    The new cell will automatically have a standard size. You can resize it in the
    same way as other `UIView` controls: either grab the sizing handles around the
    cell’s border, or set the dimensions in the Size Inspector.


    Whichever function you use, make a note of the height; you will need it later
    to return from the `tableView:heightForCellAtIndexPath:` function. My `OddCell`
    is 70 points high.


    #### Laying Out Controls in Interface Builder


    In essence, this is exactly the same process that you have been through before:
    drag instances of the controls from the Object Library into the `UITableViewCell`,
    and then size and lay them out appropriately.


    How you do this will obviously depend on the design of your cells. This is my
    work-in-progress `OddCell` XIB, which has four controls (Figure [8-4](#A978-1-4842-1242-4_8_Chapter.html#Fig4)):


    ![A978-1-4842-1242-4_8_Fig4_HTML.jpg](A978-1-4842-1242-4_8_Fig4_HTML.jpg)


    Figure 8-4.


    The OddCell XIB in progress


    *   Two `UIImageViews`, one for the background and one for the icon

    *   Two `UILabels`, one for the cell’s title and one for the cell’s content


    When fully instantiated, instances of `OddCell` will look like Figure [8-5](#A978-1-4842-1242-4_8_Chapter.html#Fig5).


    ![A978-1-4842-1242-4_8_Fig5_HTML.jpg](A978-1-4842-1242-4_8_Fig5_HTML.jpg)


    Figure 8-5.


    The OddCell


    #### Conforming the Cell to the Custom Class


    This step is required if you didn’t create the XIB file when you created the custom
    class. If you did, the cell in the XIB file will be an instance of the correct
    subclass and you can skip straight to the next section.


    If not,, the cell is an instance of `UITableViewCell`. In your custom class, which
    itself is a subclass of `UITableViewCell`, you have created a raft of outlets
    for custom controls.


    The problem is that because your custom class is a subclass of `UITableViewCell`,
    the parent class neither knows nor cares about the outlets and properties that
    you created. In order to connect the controls inside the cell up to the outlets
    in the custom subclass, you are going to have to conform the cell to the subclass.


    Fortunately, this is probably the simplest part of the whole process. In the Objects
    section, highlight the Table View cell icon (shown in Figure [8-6](#A978-1-4842-1242-4_8_Chapter.html#Fig6)).


    ![A978-1-4842-1242-4_8_Fig6_HTML.jpg](A978-1-4842-1242-4_8_Fig6_HTML.jpg)


    Figure 8-6.


    The Objects section


    Then switch over to the Identity Inspector, and expand the Custom Class section
    if it isn’t visible. At the moment, it’ll show that the cell is inheriting from
    `UITableViewCell`.


    What you need to do is to change this so that the cell’s class is your custom
    subclass of `UITableViewCell`. Overtype the contents of the Custom Class section,
    and Xcode will autocomplete the field with the name of the `UITableViewCell` subclass
    (Figure [8-7](#A978-1-4842-1242-4_8_Chapter.html#Fig7)).


    ![A978-1-4842-1242-4_8_Fig7_HTML.jpg](A978-1-4842-1242-4_8_Fig7_HTML.jpg)


    Figure 8-7.


    Changing the cell’s owner Tip


    There will probably come a point in your table-building career when your app crashes
    as soon as your custom table is loaded, with an error that looks something along
    the lines of this:


    `2015-11-05 19:58:13.263 myApp[6042:f803] *** Terminating app due to uncaught
    exception ’NSUnknownKeyException’, reason: ’[<UITableViewCell 0x6895790> setValue:forUndefinedKey:]:
    this class is not key value coding-compliant for the key cellSubtitle.’`


    Don’t panic. This is almost certainly the result of something going wrong with
    the connections of the cell controls. Check that you’ve made the connections from
    the custom cell, and not the file’s owner.


    #### Linking Up Custom Controls


    If you’ve created any controls in the cell through Interface Builder, as opposed
    to instantiating them in code, then these will currently be sitting in the cell
    as orphans. If they’re not going to change in response to the cell’s data (for
    example, if you’ve got a static background view), then that’s fair enough. But
    if you do want the controls to reflect the data in the model, then they’ll have
    to be connected to the outlets in the custom class.


    This will be familiar by now. Ctrl-click on the Custom Cell in the Objects list
    to reveal the Outlets HUD, and drag from the circle out to the control in the
    cell itself, as shown in Figure [8-8](#A978-1-4842-1242-4_8_Chapter.html#Fig8).


    ![A978-1-4842-1242-4_8_Fig8_HTML.jpg](A978-1-4842-1242-4_8_Fig8_HTML.jpg)


    Figure 8-8.


    The Outlets HUD


    Repeat this for all the dynamic controls that you’ve inserted into the cell.


    Note


    Because this custom cell is a subclass of `UITableViewCell`, it inherits all `UITableViewCell`’s
    properties such as `accessoryView` and `backgroundView`.


    #### Creating the EvenCell


    In this example, the `EvenCell` class is not too dissimilar to the `OddCell` class,
    but of course you’ve got free rein to create cells that are radically different
    if your app requires that.


    Instances of `EvenCell` will look like Figure [8-9](#A978-1-4842-1242-4_8_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_8_Fig9_HTML.jpg](A978-1-4842-1242-4_8_Fig9_HTML.jpg)


    Figure 8-9.


    The EvenCell


    The `EvenCell` subclass is more-or-less identical to `OddCell`, save for an extra
    property; see Listing [8-2](#A978-1-4842-1242-4_8_Chapter.html#FPar6).


    Listing 8-2. The EvenCell Subclass


    `import UIKit`


    `class EvenCell: UITableViewCell {`


        `@IBOutlet var backView: UIImageView!`


        `@IBOutlet var iconView: UIImageView!`


        `@IBOutlet var cellTitle: UILabel!`


        `@IBOutlet var cellMainContent: UILabel!`


        `@IBOutlet var cellOtherContent: UILabel!`


        `override func awakeFromNib() {`


            `super.awakeFromNib()`


            `// Initialization code`


        `}`


        `override func setSelected(selected: Bool, animated: Bool) {`


            `super.setSelected(selected, animated: animated)`


            `// Configure the view for the selected state`


        `}`


    `}`'
  trans: "\n#### 创建 XIB 文件\n\n在 Xcode 中，按住 Ctrl 键单击要创建新 XIB 的组，然后从弹出窗口中选择 New File。\n\
    \n接着，在 iOS 分组中选择 `User Interface` 部分，并从模板列表中选择 `View` 图标（图 8-2）。\n\n![A978-1-4842-1242-4_8_Fig2_HTML.jpg](img/A978-1-4842-1242-4_8_Fig2_HTML.jpg)\n\
    \n图 8-2. 选择模板\n\n然后你需要为单元格提供一个名称（为了保持一致性，我将其命名为 `OddCell`），并单击 `Create` 保存。\n\n\
    新视图会在 Interface Builder 中打开，显示为一个空白视图。Xcode 假设这是一个尺寸等级为 `Any, Any` 的视图，但这并非你想要的。因此，略显反直觉的是，创建新视图后你首先需要做的就是删除它。\n\
    \n高亮左侧文档大纲中该视图的图标，然后按删除键。现在你得到了一个完全空白的 Interface Builder 面板。\n\n这时就可以创建新的单元格了。在工具区对象列表的中部有一个\
    \ `Table View Cell`。将其拖拽到中央面板，你就用表格视图单元格替换了全窗口视图（图 8-3）。\n\n![A978-1-4842-1242-4_8_Fig3_HTML.jpg](img/A978-1-4842-1242-4_8_Fig3_HTML.jpg)\n\
    \n图 8-3. 新的空单元格\n\n新的单元格会自动拥有一个标准尺寸。你可以像调整其他 `UIView` 控件一样调整它的大小：要么拖拽单元格边框上的尺寸手柄，要么在\
    \ Size Inspector 中设置尺寸。\n\n无论使用哪种方法，请记下高度值；稍后你需要在 `tableView:heightForCellAtIndexPath:`\
    \ 函数中返回这个值。我的 `OddCell` 高度为 70 点。\n\n#### 在 Interface Builder 中布局控件\n\n本质上，这与你之前经历的过程完全相同：将控件从对象库拖拽到\
    \ `UITableViewCell` 中，然后适当地调整其大小和布局。\n\n具体如何操作显然取决于你的单元格设计。这是我正在制作的 `OddCell`\
    \ XIB，它包含四个控件（图 8-4）：\n\n![A978-1-4842-1242-4_8_Fig4_HTML.jpg](img/A978-1-4842-1242-4_8_Fig4_HTML.jpg)\n\
    \n图 8-4. 制作中的 OddCell XIB\n\n- 两个 `UIImageViews`，一个用于背景，一个用于图标\n- 两个 `UILabels`，一个用于单元格的标题，一个用于单元格的内容\n\
    \n完全实例化后，`OddCell` 的实例将如图 8-5 所示。\n\n![A978-1-4842-1242-4_8_Fig5_HTML.jpg](img/A978-1-4842-1242-4_8_Fig5_HTML.jpg)\n\
    \n图 8-5. OddCell 单元格\n\n#### 使单元格遵循自定义类\n\n如果你在创建自定义类时没有创建 XIB 文件，则需要执行此步骤。如果你已经创建了，那么\
    \ XIB 文件中的单元格将是正确子类的实例，你可以直接跳到下一节。\n\n如果没有，该单元格是 `UITableViewCell` 的一个实例。在你的自定义类（它本身是\
    \ `UITableViewCell` 的子类）中，你为自定义控件创建了许多输出口。\n\n问题在于，因为你的自定义类是 `UITableViewCell`\
    \ 的子类，父类既不知道也不关心你创建的输出口和属性。为了将单元格内的控件连接到自定义子类中的输出口，你需要使单元格遵循该子类。\n\n幸运的是，这可能是整个过程中最简单的一步。在对象部分中，高亮选择\
    \ Table View Cell 图标（如图 8-6 所示）。\n\n![A978-1-4842-1242-4_8_Fig6_HTML.jpg](img/A978-1-4842-1242-4_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 对象部分\n\n然后切换到 Identity Inspector，如果 Custom Class 部分不可见，请展开它。目前，它会显示该单元格继承自\
    \ `UITableViewCell`。\n\n你需要做的是修改此项，使单元格的类成为你自定义的 `UITableViewCell` 子类。在 Custom\
    \ Class 部分中覆盖输入内容，Xcode 会自动补全 `UITableViewCell` 子类的名称（图 8-7）。\n\n![A978-1-4842-1242-4_8_Fig7_HTML.jpg](img/A978-1-4842-1242-4_8_Fig7_HTML.jpg)\n\
    \n图 8-7. 更改单元格的所有者\n\n> **提示：** 在你的表格开发生涯中，可能会出现这样的情况：加载自定义表格时应用立即崩溃，错误信息类似于：\n\
    >\n> `2015-11-05 19:58:13.263 myApp[6042:f803] *** Terminating app due to uncaught\
    \ exception ’NSUnknownKeyException’, reason: ’[<UITableViewCell 0x6895790> setValue:forUndefinedKey:]:\
    \ this class is not key value coding-compliant for the key cellSubtitle.’`\n>\n\
    > 别慌。这几乎肯定是单元格控件连接出错导致的。检查一下你是否是从自定义单元格（而不是文件的所有者）进行的连接。\n\n#### 连接自定义控件\n\n如果你通过\
    \ Interface Builder 在单元格中创建了任何控件（而不是在代码中实例化它们），那么这些控件目前是孤立的。如果它们不会随单元格数据而改变（例如，如果你有一个静态背景视图），那就没问题。但如果你希望控件反映模型中的数据，则必须将它们连接到自定义类中的输出口。\n\
    \n现在你应该对此很熟悉了。按住 Ctrl 键单击对象列表中的 Custom Cell，以显示输出口 HUD，然后从圆圈拖拽到单元格本身的控件上，如图 8-8\
    \ 所示。\n\n![A978-1-4842-1242-4_8_Fig8_HTML.jpg](img/A978-1-4842-1242-4_8_Fig8_HTML.jpg)\n\
    \n图 8-8. 输出口 HUD\n\n对所有插入到单元格中的动态控件重复此操作。\n\n> **注意：** 由于此自定义单元格是 `UITableViewCell`\
    \ 的子类，它继承了 `UITableViewCell` 的所有属性，例如 `accessoryView` 和 `backgroundView`。\n\n\
    #### 创建 EvenCell\n\n在这个例子中，`EvenCell` 类与 `OddCell` 类并没有太大不同，但当然，如果你的应用需要，你可以自由创建截然不同的单元格。\n\
    \n`EvenCell` 的实例将如图 8-9 所示。\n\n![A978-1-4842-1242-4_8_Fig9_HTML.jpg](img/A978-1-4842-1242-4_8_Fig9_HTML.jpg)\n\
    \n图 8-9. EvenCell 单元格\n\n`EvenCell` 子类几乎与 `OddCell` 相同，只多了一个属性；参见代码清单 8-2。\n\n\
    代码清单 8-2. EvenCell 子类\n\n```\nimport UIKit\n\nclass EvenCell: UITableViewCell\
    \ {\n\n    @IBOutlet var backView: UIImageView!\n    @IBOutlet var iconView: UIImageView!\n\
    \    @IBOutlet var cellTitle: UILabel!\n    @IBOutlet var cellMainContent: UILabel!\n\
    \    @IBOutlet var cellOtherContent: UILabel!\n\n    override func awakeFromNib()\
    \ {\n        super.awakeFromNib()\n        // 初始化代码\n    }\n\n    override func\
    \ setSelected(selected: Bool, animated: Bool) {\n        super.setSelected(selected,\
    \ animated: animated)\n        // 配置选中状态下的视图\n    }\n\n}\n```\n"
- fmt: "### Setting the Cell Heights\n\nUnless you tell it otherwise, the `tableView`\
    \ assumes that it will be dealing with cells that have a standard height of 44\
    \ points. Because the custom cell types you just created don’t have standard sizes,\
    \ you will need to implement the `UITableViewDelegate`’s `tableView:heightForRowAtIndexPath:`\
    \ function in order to get cells of the correct size.\n\nIf you miss this function,\
    \ your table will still work, but it will attempt to cram the cells into a height\
    \ of 44 points, and their contents will be cropped.\n\nThe `tableView:heightForRowAtIndexPath:`\
    \ function is shown in Listing [8-3](#A978-1-4842-1242-4_8_Chapter.html#FPar7).\
    \ It simply checks whether the `indexPath` is odd or even, and then returns the\
    \ appropriate height measurement as a `CGFloat`.\n\n**Listing 8-3.** The `tableView:heightForRowAtIndexPath:`\
    \ Function\n\n```\nextension ViewController: UITableViewDelegate {\n\n    func\
    \ tableView(tableView: UITableView, heightForRowAtIndexPath ➤\n   indexPath: NSIndexPath)\
    \ -> CGFloat {\n\n        if (indexPath.row % 2 == 0) {\n            return EvenRowHeight\n\
    \        }\n\n        return OddRowHeight\n    }\n\n}\n```\n\nBecause values like\
    \ row height are important to the interface being drawn successfully, it’s often\
    \ helpful to store them in constants:\n\n```\nlet OddRowHeight: CGFloat = 70.0\n\
    let EvenRowHeight: CGFloat = 100.0\n```\n\n### Creating Instances of the Custom\
    \ Cells\n\nHaving gone to all the trouble of creating custom subclasses, and designing\
    \ the layout of your custom cells, there comes a point where you will want to\
    \ create actual instances of them.\n\nIt shouldn’t come as a surprise to learn\
    \ that this takes place in our old friend the `tableView:cellForRowAtIndexPath:`\
    \ function. Whereas up until now you have been creating instances of standard\
    \ `UITableViewCells`, now you are going to ring the changes slightly, and create\
    \ instances of one of your custom classes.\n\nThis example is also slightly more\
    \ sophisticated, in that there are two types of cells. The implication here is\
    \ that there will be some kind of conditional code to choose which type of cell\
    \ to create.\n\nBefore any cell types can be created, though, you need to register\
    \ the XIB files that you created with the `tableView` so that they can be created\
    \ or dequeued as required.\n\nTo keep the view controller organized, you can place\
    \ this process in an extension, and call the function from `viewDidLoad:`. The\
    \ configuration function is shown in Listing [8-4](#A978-1-4842-1242-4_8_Chapter.html#FPar8).\n\
    \n**Listing 8-4.** Configuring the Table\n\n```\nextension ViewController {\n\n\
    func configureTable() {\n\ntableView.registerNib(UINib(nibName: \"OddCell\", bundle:\
    \ nil), ➤\nforCellReuseIdentifier: OddCellIdentifier)\n\ntableView.registerNib(UINib(nibName:\
    \ \"EvenCell\", bundle: nil), ➤\nforCellReuseIdentifier: EvenCellIdentifier)\n\
    \n}\n\n}\n```\n\nCell identifiers are important because they can be used in several\
    \ places, so again these are defined as constants:\n\n```\nlet OddCellIdentifier\
    \ = \"OddCellIdentifier\"\nlet EvenCellIdentifier = \"EvenCellIdentifier\"\n```\n\
    \nFinally, call the configuration function from `viewDidLoad:`\n\n```\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    configureTable()\n}\n```\n\
    \nHaving registered the XIBs, now they can be used in the `tableView:cellForRowAtIndexPath:`\
    \ function.\n\nHere’s the first pass in Listing [8-5](#A978-1-4842-1242-4_8_Chapter.html#FPar9).\
    \ The `tableData` and `phraseData` properties are just `Arrays` of Latin boilerplate\
    \ phrases that you created earlier from the `viewDidLoad:` function.\n\n**Listing\
    \ 8-5.** Returning Custom Cells from the `tableView:cellForRowAtIndexPath:` Function\n\
    \n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath)➤\n-> UITableViewCell {\n\n    let remainder = indexPath.row % 2\n\
    \n    switch remainder {\n    case 0:\n        let cell = tableView.dequeueReusableCellWithIdentifier(EvenCellIdentifier,➤\n\
    \            forIndexPath: indexPath) as! EvenCell\n\n        cell.iconView.image\
    \ = UIImage(named: \"cat\")\n        cell.backgroundColor = UIColor(patternImage:\
    \ UIImage(named: \"evenBackground\")!)\n        cell.cellTitle.text = \"Cell \\\
    (indexPath.row)\"\n        cell.cellMainContent.text = tableData[indexPath.row]\n\
    \        cell.cellOtherContent.text = tableData[indexPath.row + 1]\n\n       \
    \ return cell\n    default:\n        let cell = tableView.dequeueReusableCellWithIdentifier(OddCellIdentifier,\
    \ ➤\n            forIndexPath: indexPath) as! OddCell\n\n        cell.iconView.image\
    \ = UIImage(named: \"dog\")\n        if let patternImage = UIImage(named: \"oddBackground\"\
    ) {\n            cell.backgroundColor = UIColor(patternImage: patternImage)\n\
    \        }\n        cell.cellTitle.text = \"Cell \\(indexPath.row)\"\n       \
    \ cell.cellContent.text = tableData[indexPath.row]\n\n        return cell\n  \
    \  }\n\n}\n```\n\nIt’s not too dissimilar to a standard `tableView:cellForRowAtIndexPath:`\
    \ function, but there are some changes:\n\n```\nlet remainder = indexPath.row\
    \ % 2;\n```\n\n`remainder` is the remainder after dividing the row number by `2`.\
    \ If it’s `0`, the row is an even one; if `remainder` is `1`, it’s odd.\n\nThis\
    \ allows you to create instances of the appropriate custom cell by switching between\
    \ odd and even cells:\n\n```\nswitch remainder {\ncase 0:\n    let cell = tableView.dequeueReusableCellWithIdentifier(EvenCellIdentifier,\
    \ ➤\n        forIndexPath: indexPath) as! EvenCell\n    ... configure cell here\
    \ ...\n    return cell\ndefault:\n    let cell = tableView.dequeueReusableCellWithIdentifier(OddCellIdentifier,\
    \ ➤\n        forIndexPath: indexPath) as! OddCell\n    ... configure cell here\
    \ ...\n    return cell\n}\n```\n\nConfiguring the individual cells depends on\
    \ the outlets that you created in the XIB, such as the `OddCell`:\n\n```\ncell.iconView.image\
    \ = UIImage(named: \"dog\")\nif let patternImage = UIImage(named: \"OddBackground\"\
    ) {\n    cell.backgroundColor = UIColor(patternImage: patternImage)\n}\ncell.cellTitle.text\
    \ = \"Cell \\(indexPath.row)\"\ncell.cellContent.text = tableData[indexPath.row]\n\
    ```\n\nCreating instances of `EvenCell` is much the same process, which results\
    \ in a `tableView` that looks like Figure [8-10](#A978-1-4842-1242-4_8_Chapter.html#Fig10).\n\
    \n![A978-1-4842-1242-4_8_Fig10_HTML.jpg](A978-1-4842-1242-4_8_Fig10_HTML.jpg)\n\
    \n**Figure 8-10.** Two different `UITableViewCell` subclasses in one table"
