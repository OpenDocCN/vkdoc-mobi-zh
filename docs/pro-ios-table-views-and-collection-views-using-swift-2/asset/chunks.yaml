    `}`


    `// Otherwise, the rotation is given by 360 / number of items`


    `// (or 2Pi / number of items as we’re dealing with radians here)`


    `return ( CGFloat(2 * M_PI) / CGFloat(collectionView!.numberOfItemsInSection(0)))`


