  raw: '#### Creating and Configuring Cells


    Once the cell classes and identifiers are registered with the table view, the
    `cellForRowAtIndexPath`: method will now be able to create instances on demand.


    Use the cell’s `Identifier` attribute to create (or dequeue) an instance of the
    correct class, and then configure the cell from the data model in the usual way.


    Listing [6-4](#A978-1-4842-1242-4_6_Chapter.html#FPar7) shows how to do this for
    `MyCustomCellClass` cells.


    Listing 6-4. The cellForRowAtIndexPath: Method


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CustomCell", ➤`


        `forIndexPath: indexPath) as! MyCustomCellClass`


        `// Configure the cell...`


        `cell.myCustomOutlet!.text = tableData[indexPath.row]`


        `return cell`


    `}`


    Note that the `dequeueReusableCellWithIdentifier:forIndexPath:` method returns
    a vanilla `UITableViewCell` instance, so you will need to downcast this to your
    custom class with the `as!` method.


    ## Working with Standard Cell Types


    `UITableView`s come with four standard cell types, and for many applications these
    may be all you need. The four styles have constant names, which unfortunately
    aren’t particularly descriptive:


    *   `UITableViewCellStyleDefault`

    *   `UITableViewCellStyleValue1`

    *   `UITableViewCellStyleValue2`

    *   `UITableViewCellStyleSubtitle`


    This section details the four types and then shows you how to select the one you
    want.


    ### Using UITableViewCellStyleDefault


    As the name suggests, `UITableViewCellStyleDefault` is the default cell style
    for a standard, out-of-the-box `UITableView`. It provides three areas (shown in
    Figure [6-17](#A978-1-4842-1242-4_6_Chapter.html#Fig17)):


    *   A `UIImageView` called `imageView` at the left end of the cell. This is optional;
    if an image view isn’t present in the cell, the cell content will align to the
    left.

    *   A `UILabel` called `textLabel`, which holds the cell content.

    *   An optional `UIView` called `accessoryView` that can show one of the standard
    accessory view indicators, a custom image by adding a `UIImageView` as a `subView`,
    or a control such as a UIButton.


    As with all the other standard cell styles, the `textLabel` can be formatted by
    changing the `UILabel` properties such as font, text alignment, and color. Although
    the layout of the default cells may be fixed, this formatting does enable you
    to apply some degree of customization.


    ![A978-1-4842-1242-4_6_Fig17_HTML.jpg](A978-1-4842-1242-4_6_Fig17_HTML.jpg)


    Figure 6-17.


    UITableViewCellStyleDefault


    The content of the textLabel is accessed through its `text` property:


    `cell.textLabel!.text = "textLabel"`


    Similarly, the image is set by accessing the `imageView`’s `image` property:


    `cell.imageView!.image = UIImage(named:"panda")`


    If you’re working with a prototype cell in a Storyboard, then the `UITableViewCellDefault`
    corresponds to `Basic` style in the Attributes Inspector (see Figure [6-18](#A978-1-4842-1242-4_6_Chapter.html#Fig18)).


    ![A978-1-4842-1242-4_6_Fig18_HTML.jpg](A978-1-4842-1242-4_6_Fig18_HTML.jpg)


    Figure 6-18.


    Selecting a UITableViewCellBasic style in Interface Builder


    ### Using UITableViewCellStyleValue1


    The `Value1` cell style is similar to the `Default` type, but includes an extra,
    optional `UILabel` called `detailTextLabel` and an optional `imageView`. Figure
    [6-19](#A978-1-4842-1242-4_6_Chapter.html#Fig19) shows an example.


    ![A978-1-4842-1242-4_6_Fig19_HTML.jpg](A978-1-4842-1242-4_6_Fig19_HTML.jpg)


    Figure 6-19.


    UITableViewCellStyleValue1


    The `textLabels` will attempt to handle restricted space but won’t always result
    in the desired effect, as shown in Figure [6-20](#A978-1-4842-1242-4_6_Chapter.html#Fig20).
    If the automatic results aren’t acceptable, this might be a cue for you to think
    about implementing a custom cell style.


    ![A978-1-4842-1242-4_6_Fig20_HTML.jpg](A978-1-4842-1242-4_6_Fig20_HTML.jpg)


    Figure 6-20.


    Truncation of cell content


    If you’re working with a prototype cell in a Storyboard, then the `UITableViewCellDefault`
    corresponds to `Right Detail` style in the Attributes Inspector (see Figure [6-21](#A978-1-4842-1242-4_6_Chapter.html#Fig21)).


    ![A978-1-4842-1242-4_6_Fig21_HTML.jpg](A978-1-4842-1242-4_6_Fig21_HTML.jpg)


    Figure 6-21.


    Selecting a UITableViewCellValue1 style in Interface Builder


    ### Using UITableViewCellStyleValue2


    The `Value2` cell style is virtually identical to the `Value1` style, with the
    exception that the default weight of the `textLabel` and `detailTextLabel` are
    altered, and there’s no `imageView`. Figure [6-22](#A978-1-4842-1242-4_6_Chapter.html#Fig22)
    shows an example.


    ![A978-1-4842-1242-4_6_Fig22_HTML.jpg](A978-1-4842-1242-4_6_Fig22_HTML.jpg)


    Figure 6-22.


    UITableViewCellStyleValue2


    If you’re working with a prototype cell in a Storyboard, then the `UITableViewCellDefault`
    corresponds to the `Left Detail` style in the Attributes Inspector (see Figure
    [6-23](#A978-1-4842-1242-4_6_Chapter.html#Fig23)).


    ![A978-1-4842-1242-4_6_Fig23_HTML.jpg](A978-1-4842-1242-4_6_Fig23_HTML.jpg)


    Figure 6-23.


    Selecting a UITableViewCellValue2 style in Interface Builder


    I can’t ever remember seeing an example of `UITableViewCellStyleValue2` in the
    wild, but it’s there if you need it.


    ### Using UITableViewCellStyleSubtitle


    The fourth default type is another variation of the other three. It combines `textLabel`
    and `detailTextLabel` with an optional `imageView`. Figure [6-24](#A978-1-4842-1242-4_6_Chapter.html#Fig24)
    shows this default cell with an image, and Figure [6-25](#A978-1-4842-1242-4_6_Chapter.html#Fig25)
    shows it without an image.


    ![A978-1-4842-1242-4_6_Fig25_HTML.jpg](A978-1-4842-1242-4_6_Fig25_HTML.jpg)


    Figure 6-25.


    UITableViewCellStyleSubtitle without an image


    ![A978-1-4842-1242-4_6_Fig24_HTML.jpg](A978-1-4842-1242-4_6_Fig24_HTML.jpg)


    Figure 6-24.


    UITableViewCellStyleSubtitle with an image


    ## Configuring the Default Cell’s Content


    A `UITableViewCell` of one of the four default types has a whole range of properties
    that you can access to configure the content. This section presents four key properties—`textLabel`,
    `detailTextLabel`, `imageView`, and `contentView`—and then shows an example of
    using them.


    ### textLabel


    The `textLabel` property is a `UILabel`, with text that can be changed. It is
    generally used as the cell’s main title:


    `cell.textLabel!.text = "The main cell text"`


    ### detailTextLabel


    `detailTextLabel` is also a `UILabel,` with text that can be changed. It can act
    as a subtitle for the cell:


    `cell.detailTextLabel!.text = "The cell subtitle"`


    ### imageView


    The cell’s `imageView` is a `UIImageView`. It has an `image` property that can
    be passed a `UIImage`, which is then displayed in the cell:


    `if let avatar = UIImage(named:"avatar") {`


       `cell.imageView!.image = avatar`


    `}`


    ### contentView


    The cell’s `contentView` is a `UIView` to which subviews can be added:


    `cell.contentView.addSubview(theView)`


    You’ll look at `contentView` in much more detail in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html).


    A common mistake is to try to access these properties directly:


    `cell.textLabel = "Some text"   // This won’t work!`


    In order to ensure that the table is as responsive as possible, it’s a good idea
    to make sure that any images are scaled before adding them to the cell. If cells
    need to rescale images before displaying them, jerky scrolling of the table can
    result.'
  trans: "\n# 创建和配置单元格\n\n一旦将单元格类和标识符注册到表视图中，`cellForRowAtIndexPath:` 方法即可按需创建实例。\n\
    \n使用单元格的 `Identifier` 属性来创建（或重用）正确类的实例，然后按照常规方式从数据模型中配置该单元格。\n\n列表 6-4 展示了如何为\
    \ `MyCustomCellClass` 单元格执行此操作。\n\n**列表 6-4.** `cellForRowAtIndexPath:` 方法\n\n\
    ```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ ➤\n-> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CustomCell\", ➤\n    forIndexPath: indexPath) as! MyCustomCellClass\n    // 配置单元格...\n\
    \    cell.myCustomOutlet!.text = tableData[indexPath.row]\n    return cell\n}\n\
    ```\n\n请注意，`dequeueReusableCellWithIdentifier:forIndexPath:` 方法返回的是一个普通的 `UITableViewCell`\
    \ 实例，因此你需要使用 `as!` 方法将其向下转换为自定义类。\n\n## 使用标准单元格类型\n\n`UITableView` 提供了四种标准单元格类型，对于许多应用程序来说，这些可能就足够了。这四种样式的名称是常量，但遗憾的是，这些名称并没有特别的描述性：\n\
    \n* `UITableViewCellStyleDefault`\n* `UITableViewCellStyleValue1`\n* `UITableViewCellStyleValue2`\n\
    * `UITableViewCellStyleSubtitle`\n\n本节将详细介绍这四种类型，然后向你展示如何选择所需的类型。\n\n### 使用 `UITableViewCellStyleDefault`\n\
    \n顾名思义，`UITableViewCellStyleDefault` 是标准、开箱即用型 `UITableView` 的默认单元格样式。它提供了三个区域（如图\
    \ 6-17 所示）：\n\n* 一个位于单元格左端的 `UIImageView`，称为 `imageView`。这是可选的；如果单元格中没有图像视图，单元格内容将左对齐。\n\
    * 一个 `UILabel`，称为 `textLabel`，用于容纳单元格内容。\n* 一个可选的 `UIView`，称为 `accessoryView`，它可以显示一个标准的辅助视图指示器，通过添加\
    \ `UIImageView` 作为 `subView` 来显示自定义图像，或者显示如 `UIButton` 等控件。\n\n与所有其他标准单元格样式一样，可以通过更改\
    \ `UILabel` 的属性（如字体、文本对齐方式和颜色）来格式化 `textLabel`。尽管默认单元格的布局可能是固定的，但这种格式化确实能够让你进行一定程度的自定义。\n\
    \n![A978-1-4842-1242-4_6_Fig17_HTML.jpg](img/A978-1-4842-1242-4_6_Fig17_HTML.jpg)\n\
    \n**图 6-17.** `UITableViewCellStyleDefault`\n\n通过访问 `textLabel` 的 `text` 属性来获取其内容：\n\
    \n```\ncell.textLabel!.text = \"textLabel\"\n```\n\n类似地，通过访问 `imageView` 的 `image`\
    \ 属性来设置图像：\n\n```\ncell.imageView!.image = UIImage(named:\"panda\")\n```\n\n如果你在\
    \ Storyboard 中使用原型单元格，那么 `UITableViewCellDefault` 对应于属性检查器中的 `Basic` 样式（见图 6-18）。\n\
    \n![A978-1-4842-1242-4_6_Fig18_HTML.jpg](img/A978-1-4842-1242-4_6_Fig18_HTML.jpg)\n\
    \n**图 6-18.** 在 Interface Builder 中选择 `UITableViewCellBasic` 样式\n\n### 使用 `UITableViewCellStyleValue1`\n\
    \n`Value1` 单元格样式与 `Default` 类型类似，但增加了一个可选的 `UILabel`，称为 `detailTextLabel`，以及一个可选的\
    \ `imageView`。图 6-19 显示了一个示例。\n\n![A978-1-4842-1242-4_6_Fig19_HTML.jpg](img/A978-1-4842-1242-4_6_Fig19_HTML.jpg)\n\
    \n**图 6-19.** `UITableViewCellStyleValue1`\n\n`textLabel` 会尝试处理受限的空间，但并不总能达到预期效果，如图\
    \ 6-20 所示。如果自动处理的结果不可接受，这可能提示你需要考虑实现自定义单元格样式。\n\n![A978-1-4842-1242-4_6_Fig20_HTML.jpg](img/A978-1-4842-1242-4_6_Fig20_HTML.jpg)\n\
    \n**图 6-20.** 单元格内容的截断\n\n如果你在 Storyboard 中使用原型单元格，那么 `UITableViewCellDefault`\
    \ 对应于属性检查器中的 `Right Detail` 样式（见图 6-21）。\n\n![A978-1-4842-1242-4_6_Fig21_HTML.jpg](img/A978-1-4842-1242-4_6_Fig21_HTML.jpg)\n\
    \n**图 6-21.** 在 Interface Builder 中选择 `UITableViewCellValue1` 样式\n\n### 使用 `UITableViewCellStyleValue2`\n\
    \n`Value2` 单元格样式与 `Value1` 样式几乎相同，区别在于 `textLabel` 和 `detailTextLabel` 的默认字重不同，并且没有\
    \ `imageView`。图 6-22 显示了一个示例。\n\n![A978-1-4842-1242-4_6_Fig22_HTML.jpg](img/A978-1-4842-1242-4_6_Fig22_HTML.jpg)\n\
    \n**图 6-22.** `UITableViewCellStyleValue2`\n\n如果你在 Storyboard 中使用原型单元格，那么 `UITableViewCellDefault`\
    \ 对应于属性检查器中的 `Left Detail` 样式（见图 6-23）。\n\n![A978-1-4842-1242-4_6_Fig23_HTML.jpg](img/A978-1-4842-1242-4_6_Fig23_HTML.jpg)\n\
    \n**图 6-23.** 在 Interface Builder 中选择 `UITableViewCellValue2` 样式\n\n我从未在实际应用中见过\
    \ `UITableViewCellStyleValue2` 的示例，但如果你需要，它就在那里。\n\n### 使用 `UITableViewCellStyleSubtitle`\n\
    \n第四种默认类型是其他三种类型的另一种变体。它结合了 `textLabel` 和 `detailTextLabel` 以及一个可选的 `imageView`。图\
    \ 6-24 显示了带图像的默认单元格，而图 6-25 显示了不带图像的默认单元格。\n\n![A978-1-4842-1242-4_6_Fig25_HTML.jpg](img/A978-1-4842-1242-4_6_Fig25_HTML.jpg)\n\
    \n**图 6-25.** 不带图像的 `UITableViewCellStyleSubtitle`\n\n![A978-1-4842-1242-4_6_Fig24_HTML.jpg](img/A978-1-4842-1242-4_6_Fig24_HTML.jpg)\n\
    \n**图 6-24.** 带图像的 `UITableViewCellStyleSubtitle`\n\n## 配置默认单元格的内容\n\n四种默认类型之一的\
    \ `UITableViewCell` 拥有一系列可用于配置内容的属性。本节介绍四个关键属性——`textLabel`、`detailTextLabel`、`imageView`\
    \ 和 `contentView`——然后展示使用它们的示例。\n\n### `textLabel`\n\n`textLabel` 属性是一个 `UILabel`，其文本可以更改。它通常用作单元格的主标题：\n\
    \n```\ncell.textLabel!.text = \"主单元格文本\"\n```\n\n### `detailTextLabel`\n\n`detailTextLabel`\
    \ 也是一个 `UILabel`，其文本可以更改。它可以充当单元格的副标题：\n\n```\ncell.detailTextLabel!.text = \"\
    单元格副标题\"\n```\n\n### `imageView`\n\n单元格的 `imageView` 是一个 `UIImageView`。它具有一个 `image`\
    \ 属性，可以传入一个 `UIImage`，然后该图像将显示在单元格中：\n\n```\nif let avatar = UIImage(named:\"\
    avatar\") {\n   cell.imageView!.image = avatar\n}\n```\n\n### `contentView`\n\n\
    单元格的 `contentView` 是一个 `UIView`，可以向其添加子视图：\n\n```\ncell.contentView.addSubview(theView)\n\
    ```\n\n你将在第 8 章中更详细地了解 `contentView`。\n\n一个常见的错误是试图直接访问这些属性：\n\n```\ncell.textLabel\
    \ = \"一些文本\"   // 这不会生效！\n```\n\n为了确保表格尽可能响应快速，最好在将任何图像添加到单元格之前对其进行缩放。如果单元格在显示图像之前需要重新缩放图像，可能会导致表格滚动时出现抖动。\n"
- fmt: "### Formatting Text in Default Cell Types\n\nHere’s an example of setting\
    \ these properties in practice:\n\n```\ncell.textLabel!.textColor = UIColor.blueColor()\n\
    cell.detailTextLabel!.font = UIFont(name: \"TimesNewRomanPSMT\", size: 12)\ncell.detailTextLabel!.textColor\
    \ = UIColor.redColor()\n```\n\nThis code results in the cell shown in Figure [6-26](#A978-1-4842-1242-4_6_Chapter.html#Fig26).\
    \ I wouldn’t necessarily advise using this frankly hideous combination of fonts\
    \ and colors, but you get the idea.\n\n![A978-1-4842-1242-4_6_Fig26_HTML.jpg](A978-1-4842-1242-4_6_Fig26_HTML.jpg)\n\
    **Figure 6-26.** Example cell formatting\n\n## Working with Accessory Views\n\n\
    `UITableViewCell` provides three types of accessory views (well, four if you count\
    \ `None` as a type). Accessory views are displayed at the right-hand end of the\
    \ cell. You can also add your own custom accessory view. These are `UIViews`,\
    \ which either act as a hint to the user that touching the cell will result in\
    \ some kind of action or show some information about the cell state.\n\nTapping\
    \ an accessory view causes the `tableView` to call the delegate’s `accessoryButtonTappedForRowWithIndexPath`\
    \ method. This allows you to trigger actions such as pushing in a new view controller.\n\
    \nAs an alternative to using a default accessory view, you can provide a custom\
    \ view of your own or place a control such as a `UIButton` into a custom view.\n\
    \n### Using UITableViewCellAccessoryDisclosureIndicator\n\nThe `DisclosureIndicator`\
    \ acts as a hint that touching the cell will result in another table view being\
    \ displayed, to drill down into a data hierarchy. Figure [6-27](#A978-1-4842-1242-4_6_Chapter.html#Fig27)\
    \ shows how this appears.\n\n![A978-1-4842-1242-4_6_Fig27_HTML.jpg](A978-1-4842-1242-4_6_Fig27_HTML.jpg)\n\
    **Figure 6-27.** `UITableViewCellAccessoryDisclosureIndicator`\n\n### Using UITableViewCellAccessoryDetailDisclosureIndicator\n\
    \nThe fact that `DetailDisclosureIndicator` looks like an info button is a hint\
    \ that touching the cell will result in the display of more data. The display\
    \ might be another table view, but could be another view of a different type.\n\
    \nWhen it’s tapped, a `DetailDisclosureIndicator` sends the `tableView:accessoryButtonTappedForRowWithIndexPath`\
    \ message to the table’s `dataSource`. Figure [6-28](#A978-1-4842-1242-4_6_Chapter.html#Fig28)\
    \ shows this.\n\n![A978-1-4842-1242-4_6_Fig28_HTML.jpg](A978-1-4842-1242-4_6_Fig28_HTML.jpg)\n\
    **Figure 6-28.** `UITableViewCellAccessoryDetailDisclosureIndicator`\n\n### Using\
    \ UITableViewCellAccessoryCheckmark\n\nThe check mark, shown in Figure [6-29](#A978-1-4842-1242-4_6_Chapter.html#Fig29),\
    \ shows that the cell has been selected, either by the user tapping the row or\
    \ by some data field behind the scenes. This provides a way of selecting and deselecting\
    \ one or more items in a list. It’s a very common user interface pattern for setting\
    \ configuration items, for example.\n\n![A978-1-4842-1242-4_6_Fig29_HTML.jpg](A978-1-4842-1242-4_6_Fig29_HTML.jpg)\n\
    **Figure 6-29.** `UITableViewCellAccessoryCheckmark`\n\n### Using UITableViewCellAccessoryNone\n\
    \nAs the name suggests, `UITableViewCellAccessoryNone` doesn’t display any accessory\
    \ view. Figure [6-30](#A978-1-4842-1242-4_6_Chapter.html#Fig30) shows an example.\
    \ Setting this accessory type removes any previously set accessory. You might\
    \ use this view because there’s no further information below this level—or because\
    \ the cell was previously selected and showed a `UITableViewCellAccessoryCheckmark`.\n\
    \n![A978-1-4842-1242-4_6_Fig30_HTML.jpg](A978-1-4842-1242-4_6_Fig30_HTML.jpg)\n\
    **Figure 6-30.** `UITableViewCellAccessoryNone`\n\n### Setting the Accessory View\
    \ Type\n\nThe cell’s accessory view is set with the `accessoryType` property:\n\
    \n```\ncell.accessoryType = UITableViewCellAccessory.Checkmark\n```\n\nThe code\
    \ in Listing [6-5](#A978-1-4842-1242-4_6_Chapter.html#FPar8) shows how you might\
    \ toggle a check mark on and off, depending on the value of some data.\n\n**Listing\
    \ 6-5.** Toggling a Cell’s Accessory Type\n\n```\nlet dataItem = tableData[indexPath.row]\n\
    if dataItem == \"some string that indicates a checkmark is needed\" {\n    cell.accessoryType\
    \ = UITableViewCellAccessory.Checkmark;\n} else {\n    cell.accessoryType = UITableViewCellAccessory.None;\n\
    }\n```\n\nApple provides guidelines about which accessory type should be used\
    \ for what purpose. Although I’ve never heard of an app being rejected from the\
    \ App Store because disclosure indicators were used in a nonstandard way, doing\
    \ so runs the risk of confusing your users. It’s probably best to stick with the\
    \ default behaviors unless there’s a very good reason not to.\n\n### Using an\
    \ Accessory View to Show Cell Selection State\n\nUsing the presence or absence\
    \ of a cell accessory view is a perfectly valid way of showing whether a cell\
    \ is selected. But there is a “gotcha” that can very easily get you if you’re\
    \ not careful.\n\nThink back to the model-view-controller pattern for a moment.\
    \ Cells are views, and the data that populates the cell exists in the model(s).\
    \ When you switch a selection indicator on and off, you’re doing that to the view—not\
    \ the model.\n\nCells themselves don’t have state. Remember, even in a `tableView`\
    \ of 99,999 rows, only about 11 cells are created. If you want the selection state\
    \ to persist the next time that data point is displayed, you must update the external\
    \ data model and then set the selection indicator accordingly.\n\nSimilarly, if\
    \ you set the accessory view state of a cell that is then recycled from the cache,\
    \ it’ll arrive back at the table in the same state it had when the cell was dumped\
    \ into the cache. That’s why it’s important to reset accessory views (and later,\
    \ any controls or views that you’ve included in your custom cells) every time\
    \ a row is updated.\n\nListing [6-6](#A978-1-4842-1242-4_6_Chapter.html#FPar9)\
    \ presents a code snippet from one of my apps, a networked game called TeaWars,\
    \ that demonstrates this in practice. The table displays a list of peer devices.\
    \ In the next step, the user can select the ones they want to connect to. Tapping\
    \ the row fires the `didSelectRowAtIndexPath` method, which adds that client ID\
    \ to an `NSMutableArray` called `listOfPlayers`.\n\n**Listing 6-6.** Toggling\
    \ Cell Selection\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(kCellIdentifier,\
    \ forIndexPath:indexPath)\n    // Retrieve the ID of the relevant connected client\n\
    \    let peerID = sessionManager.connectedClients[indexPath.row]\n    // Retrieve\
    \ the displayName of the peer\n    cell.textLabel.text = sessionManager.gkSession.displayNameForPeer(peerID)\n\
    \    // If this peerID is contained in the listOfPlayers, it’s been selected\n\
    \    // so show the checkmark in the cell\n    if listOfPlayers.containsObject(peerID)\
    \ {\n        cell.accessoryType = UITableViewCellAccessory.Checkmark\n    } else\
    \ {\n        // The peer ID isn’t in the list, so it’s not selected\n        cell.accessoryType\
    \ = UITableViewCellAccessory.None\n    }\n    return cell\n}\n```\n\nAs the cells\
    \ are popped and pushed in and out of the cache, the `cellForRowAtIndexPath` method\
    \ checks whether the peer exists in the `listOfPlayers` array. If it does, it\
    \ must have been selected, so the cell needs a `UITableViewCellAccessoryCheckmark`.\
    \ (The `_sessionManager` object handles the network communication, so it’s not\
    \ really relevant to this example.)\n\n### Creating Custom Accessory Views\n\n\
    Because the cell’s `accessoryView` is an instance of `UIView`, it’s a pretty trivial\
    \ task to assign your own custom `UIView` to the cell:\n\n```\nif let image =\
    \ UIImage(named: \"imageName\") {\n    cell.accessoryView = UIImageView(image:\
    \ image)\n}\n```\n\nAs with the cell’s `imageView`, it’s best to make sure any\
    \ `accessoryView` image is sized and scaled correctly first. You’re not just restricted\
    \ to images, though; the `accessoryView` can be a useful place to insert controls\
    \ such as `UIButtons`."
  raw: '### Formatting Text in Default Cell Types


    Here’s an example of setting these properties in practice:


    `cell.textLabel!.textColor = UIColor.blueColor()`


    `cell.detailTextLabel!.font = UIFont(name: "TimesNewRomanPSMT", size: 12)`


    `cell.detailTextLabel!.textColor = UIColor.redColor()`


    This code results in the cell shown in Figure [6-26](#A978-1-4842-1242-4_6_Chapter.html#Fig26).
    I wouldn’t necessarily advise using this frankly hideous combination of fonts
    and colors, but you get the idea.


    ![A978-1-4842-1242-4_6_Fig26_HTML.jpg](A978-1-4842-1242-4_6_Fig26_HTML.jpg)


    Figure 6-26.


    Example cell formatting


    ## Working with Accessory Views


    `UITableViewCell` provides three types of accessory views (well, four if you count
    `None` as a type). Accessory views are displayed at the right-hand end of the
    cell. You can also add your own custom accessory view. These are `UIViews`, which
    either act as a hint to the user that touching the cell will result in some kind
    of action or show some information about the cell state.


    Tapping an accessory view causes the `tableView` to call the delegate’s `accessoryButtonTappedForRowWithIndexPath`
    method. This allows you to trigger actions such as pushing in a new view controller.


    As an alternative to using a default accessory view, you can provide a custom
    view of your own or place a control such as a `UIButton` into a custom view.


    ### Using UITableViewCellAccessoryDisclosureIndicator


    The `DisclosureIndicator` acts as a hint that touching the cell will result in
    another table view being displayed, to drill down into a data hierarchy. Figure
    [6-27](#A978-1-4842-1242-4_6_Chapter.html#Fig27) shows how this appears.


    ![A978-1-4842-1242-4_6_Fig27_HTML.jpg](A978-1-4842-1242-4_6_Fig27_HTML.jpg)


    Figure 6-27.


    UITableViewCellAccessoryDisclosureIndicator


    ### Using UITableViewCellAccessoryDetailDisclosureIndicator


    The fact that `DetailDisclosureIndicator` looks like an info button is a hint
    that touching the cell will result in the display of more data. The display might
    be another table view, but could be another view of a different type.


    When it’s tapped, a `DetailDisclosureIndicator` sends the `tableView:accessoryButtonTappedForRowWithIndexPath`
    message to the table’s `dataSource`. Figure [6-28](#A978-1-4842-1242-4_6_Chapter.html#Fig28)
    shows this.


    ![A978-1-4842-1242-4_6_Fig28_HTML.jpg](A978-1-4842-1242-4_6_Fig28_HTML.jpg)


    Figure 6-28.


    UITableViewCellAccessoryDetailDisclosureIndicator


    ### Using UITableViewCellAccessoryCheckmark


    The check mark, shown in Figure [6-29](#A978-1-4842-1242-4_6_Chapter.html#Fig29),
    shows that the cell has been selected, either by the user tapping the row or by
    some data field behind the scenes. This provides a way of selecting and deselecting
    one or more items in a list. It’s a very common user interface pattern for setting
    configuration items, for example.


    ![A978-1-4842-1242-4_6_Fig29_HTML.jpg](A978-1-4842-1242-4_6_Fig29_HTML.jpg)


    Figure 6-29.


    UITableViewCellAccessoryCheckmark


    ### Using UITableViewCellAccessoryNone


    As the name suggests, `UITableViewCellAccessoryNone` doesn’t display any accessory
    view. Figure [6-30](#A978-1-4842-1242-4_6_Chapter.html#Fig30) shows an example.
    Setting this accessory type removes any previously set accessory. You might use
    this view because there’s no further information below this level—or because the
    cell was previously selected and showed a `UITableViewCellAccessoryCheckmark`.


    ![A978-1-4842-1242-4_6_Fig30_HTML.jpg](A978-1-4842-1242-4_6_Fig30_HTML.jpg)


    Figure 6-30.


    UITableViewCellAccessoryNone


    ### Setting the Accessory View Type


    The cell’s accessory view is set with the `accessoryType` property:


    `cell.accessoryType = UITableViewCellAccessory.Checkmark`


    The code in Listing [6-5](#A978-1-4842-1242-4_6_Chapter.html#FPar8) shows how
    you might toggle a check mark on and off, depending on the value of some data.


    Listing 6-5. Toggling a Cell’s Accessory Type


    `let dataItem = tableData[indexPath.row]`


    `if dataItem == "some string that indicates a checkmark is needed" {`


      `cell.accessoryType = UITableViewCellAccessory.Checkmark;`


    `} else {`


      `cell.accessoryType = UITableViewCellAccessory.None;`


    `}`


    Apple provides guidelines about which accessory type should be used for what purpose.
    Although I’ve never heard of an app being rejected from the App Store because
    disclosure indicators were used in a nonstandard way, doing so runs the risk of
    confusing your users. It’s probably best to stick with the default behaviors unless
    there’s a very good reason not to.


    ### Using an Accessory View to Show Cell Selection State


    Using the presence or absence of a cell accessory view is a perfectly valid way
    of showing whether a cell is selected. But there is a “gotcha” that can very easily
    get you if you’re not careful.


    Think back to the model-view-controller pattern for a moment. Cells are views,
    and the data that populates the cell exists in the model(s). When you switch a
    selection indicator on and off, you’re doing that to the view—not the model.


    Cells themselves don’t have state. Remember, even in a `tableView` of 99,999 rows,
    only about 11 cells are created. If you want the selection state to persist the
    next time that data point is displayed, you must update the external data model
    and then set the selection indicator accordingly.


    Similarly, if you set the accessory view state of a cell that is then recycled
    from the cache, it’ll arrive back at the table in the same state it had when the
    cell was dumped into the cache. That’s why it’s important to reset accessory views
    (and later, any controls or views that you’ve included in your custom cells) every
    time a row is updated.


    Listing [6-6](#A978-1-4842-1242-4_6_Chapter.html#FPar9) presents a code snippet
    from one of my apps, a networked game called TeaWars, that demonstrates this in
    practice. The table displays a list of peer devices. In the next step, the user
    can select the ones they want to connect to. Tapping the row fires the `didSelectRowAtIndexPath`
    method, which adds that client ID to an `NSMutableArray` called `listOfPlayers`.


    Listing 6-6. Toggling Cell Selection


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


      `let cell = tableView.dequeueReusableCellWithIdentifier(kCellIdentifier, forIndexPath:indexPath)`


        `// Retrieve the ID of the relevant connected client`


        `let peerID = sessionManager.connectedClients[indexPath.row]`


        `// Retrieve the displayName of the peer`


        `cell.textLabel.text = sessionManager.gkSession.displayNameForPeer(peerID)`


        `// If this peerID is contained in the listOfPlayers, it’s been selected`


        `// so show the checkmark in the cell`


        `if listOfPlayers.containsObject(peerID) {`


            `cell.accessoryType = UITableViewCellAccessory.Checkmark`


        `} else {`


            `// The peer ID isn’t in the list, so it’s not selected`


            `cell.accessoryType = UITableViewCellAccessory.None`


        `}`


        `return cell`


    `}`


    As the cells are popped and pushed in and out of the cache, the `cellForRowAtIndexPath`
    method checks whether the peer exists in the `listOfPlayers` array. If it does,
    it must have been selected, so the cell needs a `UITableViewCellAccessoryCheckmark`.
    (The `_sessionManager` object handles the network communication, so it’s not really
    relevant to this example.)


    ### Creating Custom Accessory Views


    Because the cell’s `accessoryView` is an instance of `UIView`, it’s a pretty trivial
    task to assign your own custom `UIView` to the cell:


    `if let image = UIImage(named: "imageName") {`


        `cell.accessoryView = UIImageView(image: image)`


    `}`


    As with the cell’s `imageView`, it’s best to make sure any `accessoryView` image
    is sized and scaled correctly first. You’re not just restricted to images, though;
    the `accessoryView` can be a useful place to insert controls such as `UIButtons`.'
  trans: "\n### 默认单元格类型中的文本格式设置\n\n以下是一个实际设置这些属性的示例：\n\n```\ncell.textLabel!.textColor\
    \ = UIColor.blueColor()\ncell.detailTextLabel!.font = UIFont(name: \"TimesNewRomanPSMT\"\
    , size: 12)\ncell.detailTextLabel!.textColor = UIColor.redColor()\n```\n\n这段代码生成了图\
    \ 6-26 所示的单元格。虽然我不建议使用这种坦率来说非常难看的字体和颜色组合，但您明白其中的原理。\n\n![A978-1-4842-1242-4_6_Fig26_HTML.jpg](img/A978-1-4842-1242-4_6_Fig26_HTML.jpg)\n\
    **图 6-26.** 单元格格式示例\n\n## 使用辅助视图\n\n`UITableViewCell` 提供了三种类型的辅助视图（如果算上 `None`\
    \ 类型，则是四种）。辅助视图显示在单元格的右端。您也可以添加自定义辅助视图。这些都是 `UIView` 实例，它们要么向用户提示触摸该单元格会触发某种操作，要么显示关于单元格状态的信息。\n\
    \n轻触辅助视图会触发 `tableView` 调用委托的 `accessoryButtonTappedForRowWithIndexPath` 方法。这允许您触发诸如推入新的视图控制器等操作。\n\
    \n除了使用默认的辅助视图外，您还可以提供自己的自定义视图，或者将诸如 `UIButton` 之类的控件放入自定义视图中。\n\n### 使用 UITableViewCellAccessoryDisclosureIndicator\n\
    \n`DisclosureIndicator` 作为提示，表示触摸该单元格将显示另一个表格视图，以便深入数据层级。图 6-27 展示了它的外观。\n\n![A978-1-4842-1242-4_6_Fig27_HTML.jpg](img/A978-1-4842-1242-4_6_Fig27_HTML.jpg)\n\
    **图 6-27.** `UITableViewCellAccessoryDisclosureIndicator`\n\n### 使用 UITableViewCellAccessoryDetailDisclosureIndicator\n\
    \n`DetailDisclosureIndicator` 看起来像一个信息按钮，这提示触摸该单元格将显示更多数据。显示的可能是另一个表格视图，但也可能是其他类型的视图。\n\
    \n当被轻触时，`DetailDisclosureIndicator` 会向表格的 `dataSource` 发送 `tableView:accessoryButtonTappedForRowWithIndexPath`\
    \ 消息。图 6-28 展示了这一点。\n\n![A978-1-4842-1242-4_6_Fig28_HTML.jpg](img/A978-1-4842-1242-4_6_Fig28_HTML.jpg)\n\
    **图 6-28.** `UITableViewCellAccessoryDetailDisclosureIndicator`\n\n### 使用 UITableViewCellAccessoryCheckmark\n\
    \n如图 6-29 所示的复选标记，表示该单元格已被选中，无论是通过用户轻触行还是通过后台某些数据字段选中。这提供了一种在列表中选中和取消选中一个或多个项目的方法。例如，这是一种非常常见的用于设置配置项的用户界面模式。\n\
    \n![A978-1-4842-1242-4_6_Fig29_HTML.jpg](img/A978-1-4842-1242-4_6_Fig29_HTML.jpg)\n\
    **图 6-29.** `UITableViewCellAccessoryCheckmark`\n\n### 使用 UITableViewCellAccessoryNone\n\
    \n顾名思义，`UITableViewCellAccessoryNone` 不显示任何辅助视图。图 6-30 显示了一个示例。设置此附件类型会移除之前设置的任何辅助视图。您可能使用此视图，因为在该层级之下没有更多信息，或者因为该单元格之前被选中并显示了\
    \ `UITableViewCellAccessoryCheckmark`。\n\n![A978-1-4842-1242-4_6_Fig30_HTML.jpg](img/A978-1-4842-1242-4_6_Fig30_HTML.jpg)\n\
    **图 6-30.** `UITableViewCellAccessoryNone`\n\n### 设置辅助视图类型\n\n单元格的辅助视图通过 `accessoryType`\
    \ 属性进行设置：\n\n```\ncell.accessoryType = UITableViewCellAccessory.Checkmark\n```\n\
    \n清单 6-5 中的代码展示了如何根据某些数据的值，切换复选标记的显示与隐藏。\n\n**清单 6-5.** 切换单元格的辅助类型\n\n```\nlet\
    \ dataItem = tableData[indexPath.row]\nif dataItem == \"某个表示需要复选标记的字符串\" {\n \
    \   cell.accessoryType = UITableViewCellAccessory.Checkmark;\n} else {\n    cell.accessoryType\
    \ = UITableViewCellAccessory.None;\n}\n```\n\nApple 提供了关于何种目的应使用何种辅助类型的指南。虽然我从未听说有应用因为以非标准方式使用展开指示器而被\
    \ App Store 拒绝，但这样做有让用户感到困惑的风险。除非有非常好的理由，否则最好坚持使用默认行为。\n\n### 使用辅助视图显示单元格选中状态\n\
    \n利用单元格辅助视图的存在与否来指示单元格是否被选中，是一种完全有效的方法。但有一个“陷阱”，如果您不小心，很容易中招。\n\n现在回想一下模型-视图-控制器模式。单元格是视图，而填充单元格的数据存在于模型之中。当您打开或关闭选中指示器时，您是在对视图进行操作，而不是模型。\n\
    \n单元格本身没有状态。请记住，即使在有 99,999 行的 `tableView` 中，也只会创建大约 11 个单元格。如果您希望选中状态在下一次显示该数据点时仍然存在，您必须更新外部数据模型，然后相应地设置选中指示器。\n\
    \n同样地，如果您设置了一个单元格的辅助视图状态，而该单元格随后从缓存中被回收，那么它回到表格时，会保持被丢弃到缓存时的状态。这就是为什么每次更新行时，都需要重置辅助视图（以及后续自定义单元格中包含的任何控件或视图）的原因。\n\
    \n清单 6-6 展示了我一个名为 TeaWars 的网络游戏应用中的代码片段，演示了实际应用。该表格显示了对等设备的列表。在下一步中，用户可以选择他们想要连接的设备。触摸该行会触发\
    \ `didSelectRowAtIndexPath` 方法，该方法将该客户端 ID 添加到一个名为 `listOfPlayers` 的 `NSMutableArray`\
    \ 中。\n\n**清单 6-6.** 切换单元格选择状态\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(kCellIdentifier,\
    \ forIndexPath:indexPath)\n    // 获取相关已连接客户端的 ID\n    let peerID = sessionManager.connectedClients[indexPath.row]\n\
    \    // 获取对等方的 displayName\n    cell.textLabel.text = sessionManager.gkSession.displayNameForPeer(peerID)\n\
    \    // 如果这个 peerID 包含在 listOfPlayers 中，则表示它已被选中\n    // 因此在单元格中显示复选标记\n    if\
    \ listOfPlayers.containsObject(peerID) {\n        cell.accessoryType = UITableViewCellAccessory.Checkmark\n\
    \    } else {\n        // 对等方 ID 不在列表中，因此未选中\n        cell.accessoryType = UITableViewCellAccessory.None\n\
    \    }\n    return cell\n}\n```\n\n当单元格被移入和移出缓存时，`cellForRowAtIndexPath` 方法会检查该对等方是否存在于\
    \ `listOfPlayers` 数组中。如果存在，则说明它已被选中，因此该单元格需要一个 `UITableViewCellAccessoryCheckmark`。（`_sessionManager`\
    \ 对象处理网络通信，因此与本示例不太相关。）\n\n### 创建自定义辅助视图\n\n由于单元格的 `accessoryView` 是 `UIView`\
    \ 的一个实例，因此将您自己的自定义 `UIView` 赋值给该单元格是一项相当简单的任务：\n\n```\nif let image = UIImage(named:\
    \ \"imageName\") {\n    cell.accessoryView = UIImageView(image: image)\n}\n```\n\
    \n与单元格的 `imageView` 类似，最好确保任何 `accessoryView` 的图像首先经过了正确的大小和缩放处理。不过，您不仅仅局限于图像；`accessoryView`\
    \ 也可以是一个放置诸如 `UIButton` 之类控件的有用位置。\n"
- fmt: "## Creating and Reusing Cells\n\nHaving looked at the various default cell\
    \ styles that are available, you’re probably impatient to start creating custom\
    \ cell styles of your own. Before you move on to that, though, it’s a good idea\
    \ to explore in more detail how cells are created and managed by the table view\
    \ itself. Creating custom cells is often a process of knowing when to intervene\
    \ in the “standard” processes, so knowing what those processes are will help you\
    \ to figure out what’s going on and why.\n\n### Memory Limitations\n\niOS devices\
    \ pack a lot into small packages. But even though the iPhone and iPad have something\
    \ like 256,000 times the memory of the Apollo Lunar Module’s onboard computer,\
    \ memory is still a constraint. The small form factor of the devices means there’s\
    \ a limit to the amount of RAM that can be crammed into the casing. As an iOS\
    \ developer, you need to remain aware of the memory footprint of your apps.\n\n\
    Apps with very small tables, like the `SimpleTable` app, don’t pose much of a\
    \ problem; you had only 10 rows. But if the app’s data comes from a bigger source,\
    \ you could have thousands—if not millions—of rows. Dealing with that data en\
    \ masse could quickly overwhelm the limited memory that iOS devices have.\n\n\
    ### Speed and Smoothness\n\nWhen the first generation iPhone was first launched\
    \ back in 2007, one thing that reviewers were consistently blown away by was the\
    \ smoothness of the interface. Flick a table view, and it smoothly scrolls up\
    \ and down—no stuttering, hesitation, or jerkiness. Interfaces that don’t respond\
    \ smoothly are incredibly obvious to the user (and jerky interface response is\
    \ one of the main criticisms of iPhone and iPad rivals).\n\nMaking content move\
    \ around smoothly onscreen isn’t too big a challenge to today’s powerful graphics\
    \ processors. Making a table (or indeed, any scrolling interface) run smoothly\
    \ mainly requires that data can be retrieved fast enough to be moved onto the\
    \ screen, without the screen having to wait for it. Delays in fetching data manifest\
    \ themselves as stuttering or hesitating scrolling views.\n\n### Just-in-Time\
    \ Creation and Recycling\n\nSo, how does iOS deal with limited memory and a need\
    \ for smoothness and speed? The solution to both problems is ingenious. `UITableViews`\
    \ take advantage of an important fact: although a table might have thousands of\
    \ cells, only a few are visible to the user at any one time.\n\nFirst, `UITableViews`\
    \ use a just-in-time approach to creating cells. A new cell is created just before\
    \ it’s required. Each cell is then ready to be displayed, but not so soon that\
    \ the device memory becomes clogged with cells that aren’t yet needed.\n\nSecond,\
    \ after a cell is no longer visible, it’s dequeued into a cache for reuse. Taking\
    \ a preexisting cell and updating its content is both quicker and less memory-intensive\
    \ than creating a brand new one. Instead of creating a brand new cell, the `tableView`\
    \ will dequeue and recycle an existing cell, updating its content just before\
    \ it is displayed onscreen.\n\n### The Table View’s “Conveyor Belt”\n\nAll this\
    \ can seem a little abstract, so a visual analogy can help. You can think of the\
    \ `tableView` as something like a conveyor belt inside a box, as shown in Figure\
    \ [6-31](#A978-1-4842-1242-4_6_Chapter.html#Fig31). The user can move the belt\
    \ backwards and forwards with a control button. A small section of the belt is\
    \ visible through a window in the top of the box.\n\n![A978-1-4842-1242-4_6_Fig31_HTML.jpg](A978-1-4842-1242-4_6_Fig31_HTML.jpg)\n\
    \nFigure 6-31.\n\nThe cell production process\n\nThe conveyor belt has slots into\
    \ which different types of cells can be placed. As the cells reach either end\
    \ of the conveyor belt, they fall off and are sorted into a series of boxes underneath\
    \ the belt, one box for each different type of cell.\n\nInside the box, and next\
    \ to the conveyor, stand two robots. One robot – called `dataSource` - is responsible\
    \ for putting cells onto either end of the tray, and other – called `delegate`\
    \ - stands ready to tweak the attributes of a cell when required.\n\nAlso in the\
    \ cell is a set of templates for cells; depending on how the table is set up,\
    \ these might have come from a Storyboard or XIB file, or they might be a description\
    \ contained in a `UITableViewCell` subclass.\n\nJust before the user winds the\
    \ belt to move an empty slot underneath the window, the `dataSource` robot checks\
    \ with the model to see what kind of cell is required. Armed with this knowledge,\
    \ it will look in the relevant tray to see if there are any spare cells lying\
    \ around.\n\nIf the tray is empty, the `dataSource` robot will quickly create\
    \ an empty new one by copying from the relevant template. If there is a spare\
    \ cell lying around in the tray, the robot will pick it up and get it ready to\
    \ put it onto the conveyor belt.\n\nImmediately before the cell gets placed onto\
    \ the conveyor belt, the robot checks with the table’s model to find what information\
    \ should be contained in this cell. It writes the content into the cell, and the\
    \ first arm places it into the slot just in time for the cell to be scrolled into\
    \ view.\n\nIf the user interacts with a cell on the conveyor belt, the delegate\
    \ robot is responsible for reacting. It might colour in the contents of the cell,\
    \ or ask the view controller to pop up an alert view or push in a new view.\n\n\
    #### How the “Conveyor Belt” Process Is Built in Code\n\nFortunately for those\
    \ of us building and configuring table views, a lot of this conveyor-belt action\
    \ takes place behind the scenes. The heavy lifting is done by the `cellForRowAtIndexPath`\
    \ method.\n\nIf you’ve created a new `UITableViewController` subclass by using\
    \ the built-in template, the subclass is virtually ready to use out of the box.\
    \ Listing [6-7](#A978-1-4842-1242-4_6_Chapter.html#FPar10) provides the template\
    \ version with some comments I’ve added so that it relates to our conveyor-belt\
    \ analogy.\n\nListing 6-7. The “Conveyor Belt” Code\n\n```\n// the tableView asks\
    \ the dataSource robot to create and return\n// a cell to fit into the indexPath.row\
    \ slot\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ ➤\nNSIndexPath) -> UITableViewCell {\n    let CellIdentifier = \"MyImpressiveCell\"\
    \n    // the dataSource robot reaches into the tray\n    // and tries to find\
    \ an old cell with cell identifier “MyImpressiveCell”\n    // If it can’t find\
    \ one, it will create a new one\n    let cell = tableView.dequeueReusableCellWithIdentifier(CellIdentifier],\
    \ ➤\n    forIndexPath: indexPath) as! UITableViewCell\n    // The dataSource robot\
    \ now sets up the cell\n    // Configures the cell...\n    cell.textLabel!.text\
    \ = \"cell contents...\"\n    // and hands it over to the tableView robot\n  \
    \  return cell\n}\n```"
  raw: '## Creating and Reusing Cells


    Having looked at the various default cell styles that are available, you’re probably
    impatient to start creating custom cell styles of your own. Before you move on
    to that, though, it’s a good idea to explore in more detail how cells are created
    and managed by the table view itself. Creating custom cells is often a process
    of knowing when to intervene in the “standard” processes, so knowing what those
    processes are will help you to figure out what’s going on and why.


    ### Memory Limitations


    iOS devices pack a lot into small packages. But even though the iPhone and iPad
    have something like 256,000 times the memory of the Apollo Lunar Module’s onboard
    computer, memory is still a constraint. The small form factor of the devices means
    there’s a limit to the amount of RAM that can be crammed into the casing. As an
    iOS developer, you need to remain aware of the memory footprint of your apps.


    Apps with very small tables, like the SimpleTable app, don’t pose much of a problem;
    you had only 10 rows. But if the app’s data comes from a bigger source, you could
    have thousands—if not millions—of rows. Dealing with that data en masse could
    quickly overwhelm the limited memory that iOS devices have.


    ### Speed and Smoothness


    When the first generation iPhone was first launched back in 2007, one thing that
    reviewers were consistently blown away by was the smoothness of the interface.
    Flick a table view, and it smoothly scrolls up and down—no stuttering, hesitation,
    or jerkiness. Interfaces that don’t respond smoothly are incredibly obvious to
    the user (and jerky interface response is one of the main criticisms of iPhone
    and iPad rivals).


    Making content move around smoothly onscreen isn’t too big a challenge to today’s
    powerful graphics processors. Making a table (or indeed, any scrolling interface)
    run smoothly mainly requires that data can be retrieved fast enough to be moved
    onto the screen, without the screen having to wait for it. Delays in fetching
    data manifest themselves as stuttering or hesitating scrolling views.


    ### Just-in-Time Creation and Recycling


    So, how does iOS deal with limited memory and a need for smoothness and speed?
    The solution to both problems is ingenious. `UITableViews` take advantage of an
    important fact: although a table might have thousands of cells, only a few are
    visible to the user at any one time.


    First, `UITableViews` use a just-in-time approach to creating cells. A new cell
    is created just before it’s required. Each cell is then ready to be displayed,
    but not so soon that the device memory becomes clogged with cells that aren’t
    yet needed.


    Second, after a cell is no longer visible, it’s dequeued into a cache for reuse.
    Taking a preexisting cell and updating its content is both quicker and less memory-intensive
    than creating a brand new one. Instead of creating a brand new cell, the `tableView`
    will dequeue and recycle an existing cell, updating its content just before it
    is displayed onscreen.


    ### The Table View’s “Conveyor Belt”


    All this can seem a little abstract, so a visual analogy can help. You can think
    of the `tableView` as something like a conveyor belt inside a box, as shown in
    Figure [6-31](#A978-1-4842-1242-4_6_Chapter.html#Fig31). The user can move the
    belt backwards and forwards with a control button. A small section of the belt
    is visible through a window in the top of the box.


    ![A978-1-4842-1242-4_6_Fig31_HTML.jpg](A978-1-4842-1242-4_6_Fig31_HTML.jpg)


    Figure 6-31.


    The cell production process


    The conveyor belt has slots into which different types of cells can be placed.
    As the cells reach either end of the conveyor belt, they fall off and are sorted
    into a series of boxes underneath the belt, one box for each different type of
    cell.


    Inside the box, and next to the conveyor, stand two robots. One robot – called
    `dataSource` - is responsible for putting cells onto either end of the tray, and
    other – called `delegate` - stands ready to tweak the attributes of a cell when
    required.


    Also in the cell is a set of templates for cells; depending on how the table is
    set up, these might have come from a Storyboard or XIB file, or they might be
    a description contained in a `UITableViewCell` subclass.


    Just before the user winds the belt to move an empty slot underneath the window,
    the `dataSource` robot checks with the model to see what kind of cell is required.
    Armed with this knowledge, it will look in the relevant tray to see if there are
    any spare cells lying around.


    If the tray is empty, the `dataSource` robot will quickly create an empty new
    one by copying from the relevant template. If there is a spare cell lying around
    in the tray, the robot will pick it up and get it ready to put it onto the conveyor
    belt.


    Immediately before the cell gets placed onto the conveyor belt, the robot checks
    with the table’s model to find what information should be contained in this cell.
    It writes the content into the cell, and the first arm places it into the slot
    just in time for the cell to be scrolled into view.


    If the user interacts with a cell on the conveyor belt, the delegate robot is
    responsible for reacting. It might colour in the contents of the cell, or ask
    the view controller to pop up an alert view or push in a new view.


    #### How the “Conveyor Belt” Process Is Built in Code


    Fortunately for those of us building and configuring table views, a lot of this
    conveyor-belt action takes place behind the scenes. The heavy lifting is done
    by the `cellForRowAtIndexPath` method.


    If you’ve created a new `UITableViewController` subclass by using the built-in
    template, the subclass is virtually ready to use out of the box. Listing [6-7](#A978-1-4842-1242-4_6_Chapter.html#FPar10)
    provides the template version with some comments I’ve added so that it relates
    to our conveyor-belt analogy.


    Listing 6-7. The “Conveyor Belt” Code


    `// the tableView asks the dataSource robot to create and return`


    `// a cell to fit into the indexPath.row slot`


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: ➤`


    `NSIndexPath) -> UITableViewCell {`


        `let CellIdentifier = "MyImpressiveCell"`


        `// the dataSource robot reaches into the tray`


        `// and tries to find an old cell with cell identifier “MyImpressiveCell”`


        `// If it can’t find one, it will create a new one`


        `let cell = tableView.dequeueReusableCellWithIdentifier(CellIdentifier], ➤`


        `forIndexPath: indexPath) as! UITableViewCell`


        `// The dataSource robot now sets up the cell`


        `// Configures the cell...`


        `cell.textLabel!.text = “cell contents...”`


        `// and hands it over to the tableView robot`


        `return cell`


    `}`'
  trans: "\n## 创建和复用单元格\n\n你已经了解了各种可用的默认单元格样式，现在可能已经迫不及待想要创建自己自定义的单元格样式了。不过，在继续之前，最好先深入了解一下表格视图本身是如何创建和管理单元格的。创建自定义单元格通常需要知道何时介入“标准”流程，因此了解这些流程有助于你理解正在发生的事情及其原因。\n\
    \n### 内存限制\n\niOS 设备在紧凑的机身中集成了大量功能。但尽管 iPhone 和 iPad 的内存大约是阿波罗登月舱机载计算机的 25.6 万倍，内存仍然是一个限制因素。设备小巧的物理尺寸意味着，机身内所能容纳的\
    \ RAM 容量是有限的。作为 iOS 开发者，你需要时刻注意应用的内存占用情况。\n\n对于像 `SimpleTable` 这样只有非常小型表格的应用来说，这不算什么大问题；它只有\
    \ 10 行。但如果应用的数据来自更大的数据源，你可能会有成千上万甚至上百万行。一次性处理所有这些数据，可能会迅速耗尽 iOS 设备有限的内存。\n\n###\
    \ 速度与流畅度\n\n当第一代 iPhone 在 2007 年首次推出时，评测者们一致为之惊叹的一点是其界面的流畅性。轻弹一个表格视图，它就能平滑地上下滚动——没有卡顿、延迟或抖动。响应不流畅的界面，用户会非常明显地感觉到（而界面响应卡顿是\
    \ iPhone 和 iPad 竞争对手的主要批评点之一）。\n\n对于当今强大的图形处理器来说，让内容在屏幕上平滑移动并非太大的挑战。让表格（或任何滚动界面）流畅运行，主要要求数据能够足够快地获取并移动到屏幕上，而无需屏幕等待。数据获取的延迟会表现为滚动视图的卡顿或延迟。\n\
    \n### 即时创建与循环复用\n\n那么，iOS 是如何同时应对有限的内存和对速度与流畅度的需求的呢？这两个问题的解决方案非常巧妙。`UITableViews`\
    \ 利用了一个重要事实：尽管一个表格可能有成千上万个单元格，但在任何时刻，只有少数几个对用户是可见的。\n\n首先，`UITableViews` 采用了一种即时创建单元格的方法。一个新单元格在需要之前才被创建。这样，每个单元格都已准备好显示，但又不会因为过早创建那些暂时不需要的单元格而导致设备内存阻塞。\n\
    \n其次，当一个单元格不再可见后，它会被出列并放入一个缓存中以供复用。获取一个已有的单元格并更新其内容，比创建一个全新的单元格既更快，又更节省内存。`tableView`\
    \ 不会创建全新的单元格，而是会将一个已有的单元格出列并循环利用，在其即将显示到屏幕上之前更新其内容。\n\n### 表格视图的“传送带”\n\n所有这些可能看起来有点抽象，所以一个视觉上的类比可能会有所帮助。你可以把\
    \ `tableView` 想象成盒子里面的一条传送带，如图 6-31 所示。用户可以通过一个控制按钮来回移动传送带。通过盒子顶部的一个窗口，可以看到传送带的一小段。\n\
    \n![A978-1-4842-1242-4_6_Fig31_HTML.jpg](img/A978-1-4842-1242-4_6_Fig31_HTML.jpg)\n\
    \n图 6-31.\n\n单元格生产过程\n\n传送带上有一些槽位，可以放置不同类型的单元格。当单元格到达传送带的任一端时，它们会掉落下来，并被分类到传送带下方的一系列盒子中，每种不同类型的单元格对应一个盒子。\n\
    \n在盒子内部，传送带旁边，站着两个机器人。一个名为 `dataSource` 的机器人负责将单元格放置到托盘的任一端，另一个名为 `delegate` 的机器人则随时准备在需要时调整单元格的属性。\n\
    \n盒子中还存放着一组单元格模板；根据表格的设置方式，这些模板可能来自 Storyboard 或 XIB 文件，也可能包含在 `UITableViewCell`\
    \ 子类的描述中。\n\n就在用户转动传送带，将一个空槽位移到窗口下方之前，`dataSource` 机器人会向模型（Model）查询所需的单元格类型。有了这个信息，它会查看相关的托盘，看看里面是否有闲置的单元格。\n\
    \n如果托盘是空的，`dataSource` 机器人会通过复制相关模板快速创建一个新的空单元格。如果托盘中有闲置的单元格，机器人会将其拿起，并准备好将其放到传送带上。\n\
    \n就在单元格被放置到传送带上的那一刻之前，机器人会向表格的模型（Model）查询这个单元格应包含的信息。它将内容写入单元格，然后第一只手臂将其放入槽位中，正好赶上该单元格被滚动到视图中。\n\
    \n如果用户与传送带上的某个单元格进行交互，那么 `delegate` 机器人就负责做出反应。它可能会给单元格的内容着色，或者要求视图控制器弹出一个警告视图，或者推入一个新的视图。\n\
    \n#### “传送带”过程的代码实现方式\n\n对于我们这些构建和配置表格视图的人来说，幸运的是，这个传送带的许多动作都是在幕后完成的。繁重的工作由 `cellForRowAtIndexPath`\
    \ 方法承担。\n\n如果你使用内置模板创建了一个新的 `UITableViewController` 子类，那么该子类基本上立即可用。代码清单 6-7 提供了模板版本，并添加了一些注释，以便与我们传送带的类比联系起来。\n\
    \n代码清单 6-7. “传送带”代码\n\n```\n// tableView 要求 dataSource 机器人创建并返回\n// 一个适合放到 indexPath.row\
    \ 槽位的单元格\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ ➤\nNSIndexPath) -> UITableViewCell {\n    let CellIdentifier = \"MyImpressiveCell\"\
    \n    // dataSource 机器人把手伸进托盘\n    // 试图找到一个标识符为 “MyImpressiveCell” 的旧单元格\n  \
    \  // 如果找不到，它会创建一个新的\n    let cell = tableView.dequeueReusableCellWithIdentifier(CellIdentifier],\
    \ ➤\n    forIndexPath: indexPath) as! UITableViewCell\n    // dataSource 机器人现在设置单元格\n\
    \    // 配置单元格...\n    cell.textLabel!.text = \"cell contents...\"\n    // 并将其交给\
    \ tableView 机器人\n    return cell\n}\n```\n"
- fmt: "### Identifying Cells with the `cellIdentifier`\n\nIt’s important to bear\
    \ in mind that it’s possible to display a potentially unlimited range of cell\
    \ types in the same `tableView`. Later you’ll exploit this to create highly customized\
    \ tables. The `tableView`, therefore, needs some way of identifying each different\
    \ cell type, which is the job of the `cellIdentifier`.\n\nThe `cellIdentifier`\
    \ is simply an arbitrary `String` that is unique to each cell type. When a new\
    \ cell is created, it’s “tagged” with the `cellIdentifier`. Behind the scenes,\
    \ the `dataSource` uses this `cellIdentifier` to do the following:\n\n* Drop the\
    \ discarded cell into the right queue for later reuse\n* Retrieve a cell of the\
    \ right type from a queue when the `tableView` requests a new cell\n\nFigure [6-32](#A978-1-4842-1242-4_6_Chapter.html#Fig32)\
    \ shows a somewhat contrived example with two cell types alternating on odd and\
    \ even rows.\n\n![A978-1-4842-1242-4_6_Fig32_HTML.jpg](A978-1-4842-1242-4_6_Fig32_HTML.jpg)\n\
    \nFigure 6-32.\n\nCell alternation\n\nThe table was produced by the code in Listing\
    \ [6-8](#A978-1-4842-1242-4_6_Chapter.html#FPar11).\n\nListing 6-8. Creating Alternating\
    \ Cell Types\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) ➤\n-> UITableViewCell {\n    var currentCellIdentifier:\
    \ String\n    if (indexPath.row % 2) == 0 {\n        currentCellIdentifier = \"\
    EvenCell\"\n    } else {\n        currentCellIdentifier = \"OddCell\"\n    }\n\
    \    var cell = tableView.dequeueReusableCellWithIdentifier➤\n  (currentCellIdentifier,forIndexPath:\
    \ indexPath)\n    cell.textLabel!.text = \"textLabel\"\n    cell.detailTextLabel!.text\
    \ = \"detailTextLabel\"\n    return cell\n}\n```\n\nStepping through Listing [6-8](#A978-1-4842-1242-4_6_Chapter.html#FPar11),\
    \ the first task is to create a string for use as the cell identifier:\n\n```\n\
    var currentCellIdentifier: String\n```\n\nThe identifier is used to determine\
    \ whether the row is odd or even. You can use the modulo function to divide the\
    \ `indexPath.row` by 2. If the modulus is zero, the row is even; otherwise, it’s\
    \ odd. The cell identifier can then be set accordingly:\n\n```\nif (indexPath.row\
    \ % 2) == 0 {\n    currentCellIdentifier = \"EvenCell\"\n} else {\n    currentCellIdentifier\
    \ = \"OddCell\"\n}\n```\n\nYou then dequeue a reusable cell with the cell identifier\
    \ for this row:\n\n```\nvar cell = tableView.dequeueReusableCellWithIdentifier\
    \ ➤\n  (currentCellIdentifier,forIndexPath: indexPath)\n```\n\nThe cell identifier\
    \ informs the `tableView` of which kind of cell is required. The `tableView` will\
    \ take care of either returning an already-existing cell for recycling or creating\
    \ a new one from scratch if there isn’t a spare waiting around.\n\nHaving been\
    \ handed the right kind of cell, then it’s simply a case of configuring it:\n\n\
    ```\ncell.textLabel!.text = \"textLabel\"\ncell.detailTextLabel!.text = \"detailTextLabel\"\
    \n```\n\nFinally, you return it to the `tableView`:\n\n```\nreturn cell\n```\n\
    \n### Side Effects of Cell Reuse and Caching\n\nAlthough caching and reusing cells\
    \ dramatically reduces memory use and speeds up the table, some potential side\
    \ effects can cause problems. When the unused cells are dumped into the queue,\
    \ they’re queued as is. In other words, their content and attributes remain in\
    \ exactly the same state as when the cell was created.\n\nThis can cause interesting\
    \ display issues, with seemingly “old” cells creeping into the middle of the table.\
    \ This can be reasonably obvious when it happens with cell data, but it can often\
    \ catch you unawares if you’re customizing other cell attributes such as selection\
    \ state.\n\nTo prevent this, it’s vitally important to reset the cell’s content\
    \ every time it’s used—regardless of whether it’s a new or dequeued cell.\n\n\
    There are three places where you can amend cell content:\n\n*   `prepareForReuse`:\
    \ This method gets called on the cell in the background just before it’s returned\
    \ to the delegate by `dequeueReusableCellWithIdentifier`. You can override this\
    \ method if needed, but for performance reasons Apple recommends that you reset\
    \ only noncontent cell attributes here (editing and selection properties, for\
    \ example). You can change content in `cellForRowAtIndexPath`.\n*   `cellForRowAtIndexPath`:\
    \ As you’ve already seen, this is where you’ll do most of the cell’s configuration—setting\
    \ content items based on the data returned by the `tableView`’s model and so on.\n\
    *   `willDisplayCell:forRowAtIndexPath`: After the cell is created with `cellForRowAtIndexPath`,\
    \ there’s one last chance to tweak it before the `tableView` actually draws it\
    \ to the screen. Just before this happens, the `tableView` will tell the delegate\
    \ that it’s about to draw a cell for a particular row—and at this point, you can\
    \ change state-based properties such as selection and background color.\n\nOne\
    \ technique I have seen suggested on forums is to create each cell with a unique\
    \ `cellIdentifier`. Although this may work for very small tables, it’s an incredibly\
    \ bad idea if you’re populating a table with a significant number of cells. By\
    \ creating unique `cellIdentifiers`, you’re preventing the caching and reuse of\
    \ cells, so the memory footprint of your app will be significantly higher than\
    \ it otherwise would be.\n\n## Summary\n\nIn this chapter, you looked in depth\
    \ at how cells are structured, created, and reused. You also saw how cells can\
    \ be configured beyond their default look by using just the default elements.\
    \ Successfully customizing cells depends on knowing when to override the default\
    \ processes, so you learned how the table view creates and manages cells for you.\n\
    \nBy understanding what’s possible with basic customizations, you can then use\
    \ this information to go further. In [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html),\
    \ you’ll use this knowledge to build completely customized cells, and you’ll build\
    \ on this further in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html). In [Chapter\
    \ 9](#A978-1-4842-1242-4_9_Chapter.html), you’ll improve the way that your users\
    \ can interact with cells.\n\n# 7. Improving the Look of Cells\n\nUsing `UITableView`’s\
    \ built-in standard cell types is a great way to get up and running quickly. But\
    \ pretty soon you’re going to run up against the limitations of the standard look\
    \ and feel, and you’ll want to move beyond the typical layouts.\n\nIf you’re working\
    \ with a `UICollectionView`, you don’t have any standard cells in the first place,\
    \ so you’re going to need to customize them yourself from the outset.\n\nCreating\
    \ and using custom cells isn’t difficult, and builds on all the topics that we’ve\
    \ covered so far. There are four main ways of customizing cells:\n\n* Add subviews\
    \ to the cell’s `contentView` in code.\n* Create prototype cells in a Storyboard.\n\
    * Create a custom cell in a XIB by using Interface Builder.\n* Create a custom\
    \ subclass of `UITableViewCell` or `UICollectionViewCell`.\n\nThe four functions\
    \ complement each other, and apply to both table and collection views with some\
    \ minor differences. In this chapter, you’ll look at the first three. Then in\
    \ [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html), you’ll take a detailed look\
    \ at custom subclasses.\n\nThe three approaches in this chapter are different\
    \ ways to achieve much the same result, but there’s a certain amount of commonality\
    \ between them. This chapter’s examples include some repetition in order to compare\
    \ the three techniques."
  raw: '#### Identifying Cells with the cellIdentifier


    It’s important to bear in mind that it’s possible to display a potentially unlimited
    range of cell types in the same `tableView`. Later you’ll exploit this to create
    highly customized tables. The `tableView`, therefore, needs some way of identifying
    each different cell type, which is the job of the `cellIdentifier`.


    The `CellIdentifier` is simply an arbitrary `String` that is unique to each cell
    type. When a new cell is created, it’s “tagged” with the `cellIdentifier`. Behind
    the scenes, the `dataSource` uses this `cellIdentifier` to do the following:


    *   Drop the discarded cell into the right queue for later reuse

    *   Retrieve a cell of the right type from a queue when the `tableView` requests
    a new cell


    Figure [6-32](#A978-1-4842-1242-4_6_Chapter.html#Fig32) shows a somewhat contrived
    example with two cell types alternating on odd and even rows.


    ![A978-1-4842-1242-4_6_Fig32_HTML.jpg](A978-1-4842-1242-4_6_Fig32_HTML.jpg)


    Figure 6-32.


    Cell alternation


    The table was produced by the code in Listing [6-8](#A978-1-4842-1242-4_6_Chapter.html#FPar11).


    Listing 6-8. Creating Alternating Cell Types


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


        `var currentCellIdentifier: String`


        `if (indexPath.row % 2) == 0 {`


            `currentCellIdentifier = "EvenCell"`


        `} else {`


            `currentCellIdentifier = "OddCell"`


        `}`


        `var cell = tableView.dequeueReusableCellWithIdentifier➤`


      `(currentCellIdentifier,forIndexPath: indexPath)`


        `cell.textLabel!.text = "textLabel"`


        `cell.detailTextLabel!.text = "detailTextLabel"`


        `return cell`


    `}`


    Stepping through Listing [6-8](#A978-1-4842-1242-4_6_Chapter.html#FPar11), the
    first task is to create a string for use as the cell identifier:


    `var currentCellIdentifier: String`


    The identifier is used to determine whether the row is odd or even. You can use
    the modulo function to divide the `indexPath.row` by 2. If the modulus is zero,
    the row is even; otherwise, it’s odd. The cell identifier can then be set accordingly:


    `if (indexPath.row % 2) == 0 {`


        `currentCellIdentifier = "EvenCell"`


    `} else {`


        `currentCellIdentifier = "OddCell"`


    `}`


    You then dequeue a reusable cell with the cell identifier for this row:


    `var cell = tableView.dequeueReusableCellWithIdentifier ➤`


      `(currentCellIdentifier,forIndexPath: indexPath)`


    The cell identifier informs the `tableView` of which kind of cell is required.
    The `tableView` will take care of either returning an already-existing cell for
    recycling or creating a new one from scratch if there isn’t a spare waiting around.


    Having been handed the right kind of cell, then it’s simply a case of configuring
    it:


    `cell.textLabel!.text = "textLabel"`


    `cell.detailTextLabel!.text = "detailTextLabel"`


    Finally, you return it to the `tableView`:


    `return cell`


    ### Side Effects of Cell Reuse and Caching


    Although caching and reusing cells dramatically reduces memory use and speeds
    up the table, some potential side effects can cause problems. When the unused
    cells are dumped into the queue, they’re queued as is. In other words, their content
    and attributes remain in exactly the same state as when the cell was created.


    This can cause interesting display issues, with seemingly “old” cells creeping
    into the middle of the table. This can be reasonably obvious when it happens with
    cell data, but it can often catch you unawares if you’re customizing other cell
    attributes such as selection state.


    To prevent this, it’s vitally important to reset the cell’s content every time
    it’s used—regardless of whether it’s a new or dequeued cell.


    There are three places where you can amend cell content:


    *   `prepareForReuse`: This method gets called on the cell in the background just
    before it’s returned to the delegate by `dequeueReusableCellWithIdentifier`. You
    can override this method if needed, but for performance reasons Apple recommends
    that you reset only noncontent cell attributes here (editing and selection properties,
    for example). You can change content in `cellForRowAtIndexPath`.

    *   `cellForRowAtIndexPath`: As you’ve already seen, this is where you’ll do most
    of the cell’s configuration—setting content items based on the data returned by
    the `tableView`’s model and so on.

    *   `willDisplayCell` `:forRowAtIndexPath`: After the cell is created with `cellForRowAtIndexPath`,
    there’s one last chance to tweak it before the `tableView` actually draws it to
    the screen. Just before this happens, the `tableView` will tell the delegate that
    it’s about to draw a cell for a particular row—and at this point, you can change
    state-based properties such as selection and background color.


    One technique I have seen suggested on forums is to create each cell with a unique
    `cellIdentifier`. Although this may work for very small tables, it’s an incredibly
    bad idea if you’re populating a table with a significant number of cells. By creating
    unique `cellIdentifiers`, you’re preventing the caching and reuse of cells, so
    the memory footprint of your app will be significantly higher than it otherwise
    would be.


    ## Summary


    In this chapter, you looked in depth at how cells are structured, created, and
    reused. You also saw how cells can be configured beyond their default look by
    using just the default elements. Successfully customizing cells depends on knowing
    when to override the default processes, so you learned how the table view creates
    and manages cells for you.


    By understanding what’s possible with basic customizations, you can then use this
    information to go further. In [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html),
    you’ll use this knowledge to build completely customized cells, and you’ll build
    on this further in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html). In [Chapter
    9](#A978-1-4842-1242-4_9_Chapter.html), you’ll improve the way that your users
    can interact with cells.


    # 7. Improving the Look of Cells


    Using `UITableView`’s built-in standard cell types is a great way to get up and
    running quickly. But pretty soon you’re going to run up against the limitations
    of the standard look and feel, and you’ll want to move beyond the typical layouts.


    If you’re working with a `UICollectionView`, you don’t have any standard cells
    in the first place, so you’re going to need to customize them yourself from the
    outset.


    Creating and using custom cells isn’t difficult, and builds on all the topics
    that we’ve covered so far. There are four main ways of customizing cells:


    *   Add subviews to the cell’s `contentView` in code.

    *   Create prototype cells in a Storyboard.

    *   Create a custom cell in a XIB by using Interface Builder.

    *   Create a custom subclass of `UITableViewCell` or `UICollectionViewCell`.


    The four functions complement each other, and apply to both table and collection
    views with some minor differences. In this chapter, you’ll look at the first three.
    Then in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html), you’ll take a detailed
    look at custom subclasses.


    The three approaches in this chapter are different ways to achieve much the same
    result, but there’s a certain amount of commonality between them. This chapter’s
    examples include some repetition in order to compare the three techniques.'
  trans: "\n### 使用 `cellIdentifier` 识别单元格\n\n需要注意的是，同一个 `tableView` 中可能显示无限多种类的单元格。稍后你将利用这一点创建高度自定义的表格。因此，`tableView`\
    \ 需要某种方式来识别每种不同的单元格类型，而这正是 `cellIdentifier` 的职责所在。\n\n`cellIdentifier` 只是一个任意的\
    \ `String`，对每种单元格类型来说都是唯一的。当创建一个新单元格时，它会用 `cellIdentifier` 进行“标记”。在幕后，`dataSource`\
    \ 会利用这个 `cellIdentifier` 执行以下操作：\n\n*   将丢弃的单元格放入正确的队列，以便稍后重用。\n*   当 `tableView`\
    \ 请求新单元格时，从队列中取出正确类型的单元格。\n\n图 6-32 展示了一个略显做作的例子，其中两种单元格类型在奇数行和偶数行交替出现。\n\n![A978-1-4842-1242-4_6_Fig32_HTML.jpg](img/A978-1-4842-1242-4_6_Fig32_HTML.jpg)\n\
    \n图 6-32.\n\n单元格交替\n\n该表格由代码清单 6-8 中的代码生成。\n\n代码清单 6-8. 创建交替的单元格类型\n\n```\nfunc\
    \ tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ ➤\n-> UITableViewCell {\n    var currentCellIdentifier: String\n    if (indexPath.row\
    \ % 2) == 0 {\n        currentCellIdentifier = \"EvenCell\"\n    } else {\n  \
    \      currentCellIdentifier = \"OddCell\"\n    }\n    var cell = tableView.dequeueReusableCellWithIdentifier➤\n\
    \  (currentCellIdentifier,forIndexPath: indexPath)\n    cell.textLabel!.text =\
    \ \"textLabel\"\n    cell.detailTextLabel!.text = \"detailTextLabel\"\n    return\
    \ cell\n}\n```\n\n逐步分析代码清单 6-8，第一个任务是创建一个用作单元格标识符的字符串：\n\n```\nvar currentCellIdentifier:\
    \ String\n```\n\n该标识符用于判断行是奇数还是偶数。你可以使用取模函数将 `indexPath.row` 除以 2。如果余数为零，则该行为偶数；否则为奇数。然后可以相应地设置单元格标识符：\n\
    \n```\nif (indexPath.row % 2) == 0 {\n    currentCellIdentifier = \"EvenCell\"\
    \n} else {\n    currentCellIdentifier = \"OddCell\"\n}\n```\n\n接着，你使用该行的单元格标识符从重用队列中取出一个可重用的单元格：\n\
    \n```\nvar cell = tableView.dequeueReusableCellWithIdentifier ➤\n  (currentCellIdentifier,forIndexPath:\
    \ indexPath)\n```\n\n单元格标识符告知 `tableView` 需要哪种单元格。`tableView` 会负责返回一个已有的单元格以供循环利用，或者，如果没有闲置的单元格，则从头创建一个新的。\n\
    \n获取到正确类型的单元格后，剩下的工作就是配置它了：\n\n```\ncell.textLabel!.text = \"textLabel\"\ncell.detailTextLabel!.text\
    \ = \"detailTextLabel\"\n```\n\n最后，你将其返回给 `tableView`：\n\n```\nreturn cell\n```\n\
    \n### 单元格重用与缓存的副作用\n\n尽管缓存和重用单元格能显著减少内存使用并加速表格，但一些潜在的副作用可能会引发问题。当未使用的单元格被放入队列时，它们会按原样排队。换句话说，它们的内容和属性会保持与创建时完全相同的状态。\n\
    \n这可能导致有趣的显示问题，看似“旧”的单元格会悄悄出现在表格中间。当单元格数据出现这种情况时，可能还比较明显，但如果你正在自定义其他单元格属性（如选中状态），它往往会在你毫无防备时引发问题。\n\
    \n为防止这种情况，每次使用单元格时——无论它是新创建的还是从队列中取出的——都重置其内容是*极其重要*的。\n\n有三个地方可以修改单元格内容：\n\n\
    *   `prepareForReuse`：此方法会在后台的单元格上被调用，就在它被 `dequeueReusableCellWithIdentifier`\
    \ 返回给代理之前。如果需要，你可以重写此方法，但出于性能原因，苹果公司建议你只在此处重置非内容的单元格属性（例如编辑和选择属性）。你可以在 `cellForRowAtIndexPath`\
    \ 中更改内容。\n*   `cellForRowAtIndexPath`：正如你已经看到的，这是你完成大部分单元格配置的地方——根据 `tableView`\
    \ 的模型返回的数据来设置内容项等等。\n*   `willDisplayCell:forRowAtIndexPath`：在使用 `cellForRowAtIndexPath`\
    \ 创建单元格之后，在 `tableView` 实际将其绘制到屏幕之前，还有最后的机会对其进行微调。就在这发生之前，`tableView` 会告知代理它即将为特定行绘制单元格——此时，你可以更改基于状态的属性，例如选中状态和背景颜色。\n\
    \n我在论坛上看到有人建议的一种技术是为每个单元格创建唯一的 `cellIdentifier`。虽然这对于非常小的表格可能有效，但如果你要为表格填充大量单元格，这是一个极其糟糕的主意。通过创建唯一的\
    \ `cellIdentifiers`，你实际上阻止了单元格的缓存和重用，因此你的应用的内存占用会显著高于正常水平。\n\n## 小结\n\n在本章中，你深入了解了单元格的结构、创建和重用方式。你还了解了如何仅使用默认元素来配置单元格，使其超越默认外观。成功地自定义单元格取决于知道何时重写默认过程，因此你学习了表视图是如何为你创建和管理单元格的。\n\
    \n通过理解基本自定义所能实现的功能，你就可以利用这些信息走得更远。在第 7 章中，你将运用这些知识构建完全自定义的单元格，并在第 8 章中进一步深入。在第\
    \ 9 章中，你将改进用户与单元格交互的方式。\n\n# 7. 改善单元格的外观\n\n使用 `UITableView` 内置的标准单元格类型是快速上手并运行的好方法。但很快你就会遇到标准外观和感觉的限制，并希望超越典型的布局。\n\
    \n如果你在使用 `UICollectionView`，一开始就没有任何标准单元格可用，因此你从一开始就需要自己自定义它们。\n\n创建和使用自定义单元格并不困难，并且建立在我们迄今所涵盖的所有主题之上。自定义单元格主要有四种方式：\n\
    \n*   在代码中向单元格的 `contentView` 添加子视图。\n*   在 Storyboard 中创建原型单元格。\n*   使用 Interface\
    \ Builder 在 XIB 文件中创建自定义单元格。\n*   创建 `UITableViewCell` 或 `UICollectionViewCell`\
    \ 的自定义子类。\n\n这四种方法相辅相成，并适用于表视图和集合视图，但存在一些细微差别。在本章中，你将了解前三种方法。然后在第 8 章中，你将详细研究自定义子类。\n\
    \n本章介绍的三种方法是以不同方式实现大致相同的结果，但它们之间存在一定的共性。为了比较这三种技术，本章的示例会包含一些重复内容。\n"
- fmt: "# Customizing Cells\n\nWhen it comes to customizing cells, you can take four\
    \ approaches:\n\n* Add subviews to the cell’s `contentView` in code. The entire\
    \ content of the cell can be accessed through the `contentView` property. When\
    \ the cell is dequeued by the `cellForRowAtIndexPath` or `cellforItemAtIndexPath`\
    \ functions, you can create and add your controls as subviews to `contentView`.\
    \ If you’re dealing with `UITableViewCell`, your new subviews can work alongside\
    \ the built-in subviews, or you can ignore the built-in subviews completely. If\
    \ you don’t set the built-in subviews, they will not be inserted into the cell.\n\
    * Create a prototype cell in a Storyboard. Using a Storyboard in Interface Builder,\
    \ you can lay out the cell controls visually in a prototype cell. These provide\
    \ a “template” that the `dataSource` can use to create cells. You register the\
    \ template for use when you set up the table or collection view. When the cell\
    \ is created by the `dataSource`, it’s possible to programmatically set the properties\
    \ of the custom controls.\n* Create a custom cell in a XIB by using Interface\
    \ Builder. Using Interface Builder, you can lay out the cell controls visually\
    \ in a XIB, and then load that file when the cell is registered with the table\
    \ or collection view. Then with a bit of additional code to access your custom\
    \ controls, it’s possible to set their values programmatically in the relevant\
    \ `dataSource` function.\n* Create a cell subclass and override `layoutSubviews`.\
    \ As an alternative to Interface Builder’s visual approach, you can subclass the\
    \ cell class and lay out the custom cell’s content in code—either overriding the\
    \ `layoutSubviews` function or drawing the cell with `drawRect`.\n\n## Which Function\
    \ Should I Use?\n\nThe short answer is—it depends! There’s no right or wrong way\
    \ to customize cells. Which approach is best depends on a combination of what\
    \ you’re trying to achieve, how comfortable you are working with code versus laying\
    \ out views visually (and vice versa), and how quickly you need to get your code\
    \ up and running.\n\n## Adding Subviews to the Cell’s `contentView`\n\nThe cell’s\
    \ contents sit inside a `UIView` called `contentView`. With a `UITableViewCell`,\
    \ you also get an accessory view, shown in Figure 7-1. A `UICollectionViewCell`\
    \ has an empty `contentView`, shown in Figure 7-2.\n\nAlthough `contentView` itself\
    \ is read-only—meaning you can’t replace it—you can add and remove subviews to\
    \ and from it.\n\n![A978-1-4842-1242-4_7_Fig2_HTML.jpg](A978-1-4842-1242-4_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2. The layout of a `UICollectionViewCell`\n\n![A978-1-4842-1242-4_7_Fig1_HTML.jpg](A978-1-4842-1242-4_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1. The layout of a `UITableViewCell`\n\nThese subviews can be any control\
    \ or component that inherits from `UIView` itself, including labels, controls,\
    \ text fields, images, and so on.\n\nYou add a custom view when a new cell is\
    \ created for the first time. This view will then be in place if and when the\
    \ cell is subsequently recycled.\n\nThis means that if you’re adding content into\
    \ the custom view that will vary with each item—a label, an image, and so on—they\
    \ need to be set for each and every item. The implication here is that you need\
    \ to be able to reach back inside the custom view, as it were, to access the properties\
    \ in order to set them.\n\nThe approach to take is to think of your custom view\
    \ in two parts:\n\n* Creating the structure: Setting the size and position of\
    \ the elements that you’re going to add to the cell’s `contentView` in each new\
    \ cell.\n* Updating the content: Configuring the properties of the custom elements\
    \ you’ve added to the `contentView` as each row is updated.\n\n> **Tip**: If you\
    \ don’t explicitly reference the standard contents of a `UITableViewCell` —`textLabel`,\
    \ `detailTextLabel`, `imageView`, and `accessoryView`—then they won’t be inserted\
    \ into the cell and won’t get in the way of your custom layout.\n\n### VIEWS AND\
    \ THEIR HIERARCHY\n\nOne aspect of iOS that often causes confusion is how `UIViews`\
    \ relate to each other. All this talk of adding subviews—but to where? And what?\n\
    \nThe key concept to understanding `UIViews` is that they form a hierarchy, shown\
    \ in Figure 7-3.\n\n![A978-1-4842-1242-4_7_Fig3_HTML.jpg](A978-1-4842-1242-4_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3. The view hierarchy\n\nEach `UIView` can have a parent—or `superView`—and\
    \ one or many `subViews`. Visibility of `subViews` is tied to their `superView`,\
    \ so setting the visibility of `UIView C` to `hidden` will cause `UIViews D` and\
    \ `E` to disappear.\n\nEach `UIView` has a property called `subViews`, which is\
    \ an `Array` containing any `UIViews` for which this `UIView` instance is the\
    \ parent, or `superView`; see Figure 7-4.\n\n![A978-1-4842-1242-4_7_Fig4_HTML.jpg](A978-1-4842-1242-4_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4. Views in a `subView` array\n\nYou can access each `subView` for\
    \ a `UIView` by iterating through its array of `subViews`:\n\n```swift\nfor theSubView\
    \ in parentView.subViews {\n    // do something to theSubView\n}\n```\n\nSimilarly,\
    \ each `UIView` has a `superView` property that is a reference to the “parent”\
    \ view. In Figure 7-3, the `superView` of `view C` is `view A`, and `view C` has\
    \ two views in its `subViews` array: `views D` and `E`.\n\nIf you’re creating\
    \ complex layouts with multiple views, subviews, and superviews, it’s worth keeping\
    \ some diagrams to show how each view relates to the others. That can prevent\
    \ much confusion later.\n\n### Creating the Elements in the Cell\n\nThe first\
    \ step has to take place as each cell is created. This occurs in the relevant\
    \ `dataSource` function, either `tableView:cellForRowAtIndexPath`, shown in Listing\
    \ 7-1, or `collectionView:itemForRowAtIndexPath:`, shown in Listing 7-2.\n\nEach\
    \ listing shows the basic technique:\n\n* First, check whether the subview that\
    \ you want to add exists (in case you’re recycling an already-existing cell).\n\
    * If the subview already exists, configure the properties that you want to control.\n\
    * If the subview doesn’t exist, create and add it to the cell’s `contentView`,\
    \ and then configure it.\n\n**Listing 7-1.** Adding and Configuring a Custom Subview\
    \ for `UITableView`\n\n```swift\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\n\
    indexPath: NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\nforIndexPath: indexPath)\n    // Check if the custom view already\
    \ exists – if it does,\n    // we’re recycling an existing cell\n    if let customView\
    \ = cell.contentView.viewWithTag(1000) {\n        // customize the properties\
    \ of the view\n    } else {\n        // create the custom view and set the tag\
    \ value\n        let customView = UIView(frame: cell.contentView.frame)\n    \
    \    customView.tag = 1000\n        // customize the custom view’s properties\n\
    \        ...\n        // add the custom view to the cell’s contentView\n     \
    \   cell.contentView.addSubview(customView)\n        }\n    // return the cell\
    \ to the tableView\n    return cell\n}\n```\n\n**Listing 7-2.** Adding and Configuring\
    \ a Custom Subview for `UICollectionView`\n\n```swift\nfunc collectionView(collectionView:\
    \ UICollectionView, cellForItemAtIndexPath\nindexPath: NSIndexPath) -> UICollectionViewCell\
    \ {\n    let cell = collectionView.dequeueReusableCellWithReuseIdentifier(reuseIdentifier,\n\
    \   forIndexPath: indexPath)\n    if let customView = cell.contentView.viewWithTag(1000)\
    \ {\n        customView.backgroundColor = UIColor.redColor()\n    } else {\n \
    \       let customView = UIView(frame: cell.frame)\n        customView.tag = 1000\n\
    \        customView.backgroundColor = UIColor.redColor()\n        cell.contentView.addSubview(customView)\n\
    \    }\n    return cell\n}\n```"
  raw: '## Customizing Cells


    When it comes to customizing cells, you can take four approaches:


    *   Add subviews to the cell’s `contentView` in code. The entire content of the
    cell can be accessed through the `contentView` property. When the cell is dequeued
    by the `cellForRowAtIndexPath` or `cellforItemAtIndexPath` functions, you can
    create and add your controls as subviews to `contentView`. If you’re dealing with
    `UITableViewCell`, your new subviews can work alongside the built-in subviews,
    or you can ignore the built-in subviews completely. If you don’t set the built-in
    subviews, they will not be inserted into the cell.

    *   Create a prototype cell in a Storyboard. Using a Storyboard in Interface Builder,
    you can lay out the cell controls visually in a prototype cell. These provide
    a “template” that the `dataSource` can use to create cells. You register the template
    for use when you set up the table or collection view. When the cell is created
    by the `dataSource`, it’s possible to programmatically set the properties of the
    custom controls.

    *   Create a custom cell in a XIB by using Interface Builder. Using Interface
    Builder, you can lay out the cell controls visually in a XIB, and then load that
    file when the cell is registered with the table or collection view. Then with
    a bit of additional code to access your custom controls, it’s possible to set
    their values programmatically in the relevant `dataSource` function.

    *   Create a cell subclass and override `layoutSubviews`. As an alternative to
    Interface Builder’s visual approach, you can subclass the cell class and lay out
    the custom cell’s content in code—either overriding the `layoutSubviews` function
    or drawing the cell with `drawRect`.


    ### Which Function Should I Use?


    The short answer is—it depends! There’s no right or wrong way to customize cells.
    Which approach is best depends on a combination of what you’re trying to achieve,
    how comfortable you are working with code versus laying out views visually (and
    vice versa), and how quickly you need to get your code up and running.


    ## Adding Subviews to the Cell’s contentView


    The cell’s contents sit inside a `UIView` called `contentView`. With a `UITableViewCell`,
    you also get an accessory view, shown in Figure [7-1](#A978-1-4842-1242-4_7_Chapter.html#Fig1).
    A `UICollectionViewCell` has an empty `contentView`, shown in Figure [7-2](#A978-1-4842-1242-4_7_Chapter.html#Fig2).


    Although `contentView` itself is read-only—meaning you can’t replace it—you can
    add and remove subviews to and from it.


    ![A978-1-4842-1242-4_7_Fig2_HTML.jpg](A978-1-4842-1242-4_7_Fig2_HTML.jpg)


    Figure 7-2.


    The layout of a UICollectionViewCell


    ![A978-1-4842-1242-4_7_Fig1_HTML.jpg](A978-1-4842-1242-4_7_Fig1_HTML.jpg)


    Figure 7-1.


    The layout of a UITableViewCell


    These subviews can be any control or component that inherits from `UIView` itself,
    including labels, controls, text fields, images, and so on.


    You add a custom view when a new cell is created for the first time. This view
    will then be in place if and when the cell is subsequently recycled.


    This means that if you’re adding content into the custom view that will vary with
    each item—a label, an image, and so on—they need to be set for each and every
    item. The implication here is that you need to be able to reach back inside the
    custom view, as it were, to access the properties in order to set them.


    The approach to take is to think of your custom view in two parts:


    *   Creating the structure: Setting the size and position of the elements that
    you’re going to add to the cell’s `contentView` in each new cell.

    *   Updating the content: Configuring the properties of the custom elements you’ve
    added to the `contentView` as each row is updated.


    Tip


    If you don’t explicitly reference the standard contents of a `UITableViewCell`
    —`textLabel, detailTextLabel, imageView`, and `accessoryView`—then they won’t
    be inserted into the cell and won’t get in the way of your custom layout.


    VIEWS AND THEIR HIERARCHY


    One aspect of iOS that often causes confusion is how `UIViews` relate to each
    other. All this talk of adding subviews—but to where? And what?


    The key concept to understanding `UIViews` is that they form a hierarchy, shown
    in Figure [7-3](#A978-1-4842-1242-4_7_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_7_Fig3_HTML.jpg](A978-1-4842-1242-4_7_Fig3_HTML.jpg)


    Figure 7-3.


    The view hierarchy


    Each `UIView` can have a parent—or `superView`—and one or many `subViews`. Visibility
    of `subViews` is tied to their `superView`, so setting the visibility of `UIView
    C` to `hidden` will cause `UIViews D` and `E` to disappear.


    Each `UIView` has a property called `subViews`, which is an `Array` containing
    any `UIViews` for which this `UIView` instance is the parent, or `superView`;
    see Figure [7-4](#A978-1-4842-1242-4_7_Chapter.html#Fig4).


    ![A978-1-4842-1242-4_7_Fig4_HTML.jpg](A978-1-4842-1242-4_7_Fig4_HTML.jpg)


    Figure 7-4.


    Views in a subView array


    You can access each `subView` for a `UIView` by iterating through its array of
    `subViews`:


    `for theSubView in parentView.subViews {`


      `// do something to theSubView`


    `}`


    Similarly, each `UIView` has a `superView` property that is a reference to the
    “parent” view. In Figure [7-3](#A978-1-4842-1242-4_7_Chapter.html#Fig3), the `superView`
    of `view C` is `view A`, and `view C` has two views in its `subViews` array: `views
    D` and `E`.


    If you’re creating complex layouts with multiple views, subviews, and superviews,
    it’s worth keeping some diagrams to show how each view relates to the others.
    That can prevent much confusion later.


    ### Creating the Elements in the Cell


    The first step has to take place as each cell is created. This occurs in the relevant
    `dataSource` function, either `tableView:` `cellForRowAtIndexPath`, shown in Listing
    [7-1](#A978-1-4842-1242-4_7_Chapter.html#FPar3), or `collectionView:itemForRowAtIndexPath:`,
    shown in Listing [7-2](#A978-1-4842-1242-4_7_Chapter.html#FPar4).


    Each listing shows the basic technique:


    *   First, check whether the subview that you want to add exists (in case you’re
    recycling an already-existing cell).

    *   If the subview already exists, configure the properties that you want to control.

    *   If the subview doesn’t exist, create and add it to the cell’s `contentView`,
    and then configure it.


    Listing 7-1. Adding and Configuring a Custom Subview for UITableView


    `func tableView(tableView: UITableView, cellForRowAtIndexPath ➤`


    `indexPath: NSIndexPath) -> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",➤`


    `forIndexPath: indexPath)`


        `// Check if the custom view already exists – if it does,`


        `// we’re recycling an existing cell`


        `if let customView = cell.contentView.viewWithTag(1000) {`


            `// customize the properties of the view`


        `} else {`


            `// create the custom view and set the tag value`


            `let customView = UIView(frame: cell.contentView.frame)`


            `customView.tag = 1000`


            `// customize the custom view’s properties`


            `...`


            `// add the custom view to the cell’s contentView`


            `cell.contentView.addSubview(customView)`


            `}`


        `// return the cell to the tableView`


        `return cell`


    `}`


    Listing 7-2. Adding and Configuring a Custom Subview for UICollectionView


    `func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath
    ➤`


    `indexPath: NSIndexPath) -> UICollectionViewCell {`


        `let cell = collectionView.dequeueReusableCellWithReuseIdentifier(reuseIdentifier,➤`


       `forIndexPath: indexPath)`


        `if let customView = cell.contentView.viewWithTag(1000) {`


            `customView.backgroundColor = UIColor.redColor()`


        `} else {`


            `let customView = UIView(frame: cell.frame)`


            `customView.tag = 1000`


            `customView.backgroundColor = UIColor.redColor()`


            `cell.contentView.addSubview(customView)`


        `}`


        `return cell`


    `}`'
  trans: "\n# 自定义单元格\n\n自定义单元格有四种方法：\n\n* 通过代码向单元格的 `contentView` 添加子视图。您可以通过 `contentView`\
    \ 属性访问单元格的全部内容。当 `cellForRowAtIndexPath` 或 `cellforItemAtIndexPath` 函数出列单元格时，您可以创建控件并将其作为子视图添加到\
    \ `contentView` 中。如果您处理的是 `UITableViewCell`，新的子视图可以与内置子视图共存，也可以完全忽略内置子视图。如果您不设置内置子视图，它们将不会被插入到单元格中。\n\
    * 在 Storyboard 中创建原型单元格。通过 Interface Builder 使用 Storyboard，您可以在原型单元格中直观地布局单元格控件。这些原型单元格提供了一个“模板”，`dataSource`\
    \ 可以使用它来创建单元格。您可以在设置表格或集合视图时注册该模板以供使用。当 `dataSource` 创建单元格时，可以通过编程方式设置自定义控件的属性。\n\
    * 通过 Interface Builder 在 XIB 文件中创建自定义单元格。使用 Interface Builder，您可以在 XIB 文件中直观地布局单元格控件，然后在单元格注册到表格或集合视图时加载该文件。然后，通过少量额外的代码来访问您的自定义控件，就可以在相应的\
    \ `dataSource` 函数中以编程方式设置它们的值。\n* 创建单元格子类并重写 `layoutSubviews`。作为 Interface Builder\
    \ 可视化方法的替代方案，您可以创建单元格的子类，并通过代码布局自定义单元格的内容——可以重写 `layoutSubviews` 函数，或者使用 `drawRect`\
    \ 绘制单元格。\n\n## 应使用哪个函数？\n\n简短的回答是——视情况而定！自定义单元格没有绝对正确或错误的方法。哪种方法最好取决于您要实现的目标、您对使用代码与可视化布局视图的适应程度（反之亦然），以及您需要多快让代码运行起来。\n\
    \n## 向单元格的 `contentView` 添加子视图\n\n单元格的内容位于一个名为 `contentView` 的 `UIView` 中。对于 `UITableViewCell`，您还会得到一个附件视图，如图\
    \ 7-1 所示。`UICollectionViewCell` 则有一个空的 `contentView`，如图 7-2 所示。\n\n尽管 `contentView`\
    \ 本身是只读的——这意味着您不能替换它——但您可以向其中添加或移除子视图。\n\n![A978-1-4842-1242-4_7_Fig2_HTML.jpg](img/A978-1-4842-1242-4_7_Fig2_HTML.jpg)\n\
    \n图 7-2. `UICollectionViewCell` 的布局\n\n![A978-1-4842-1242-4_7_Fig1_HTML.jpg](img/A978-1-4842-1242-4_7_Fig1_HTML.jpg)\n\
    \n图 7-1. `UITableViewCell` 的布局\n\n这些子视图可以是任何继承自 `UIView` 本身的控件或组件，包括标签、控件、文本字段、图像等。\n\
    \n您可以在首次创建新单元格时添加自定义视图。这样，如果该单元格随后被回收利用，该视图将保留在原位。\n\n这意味着如果您要向自定义视图中添加随每个项目而变化的内容（例如标签、图像等），则需要为每个项目设置这些内容。这意味着您需要能够访问自定义视图内部，以获取其属性并进行设置。\n\
    \n采取的方法是将自定义视图分为两部分来考虑：\n\n* 创建结构：在每个新单元格中，设置要添加到单元格 `contentView` 中的元素的大小和位置。\n\
    * 更新内容：在更新每一行时，配置添加到 `contentView` 中的自定义元素的属性。\n\n> **提示**：如果您不显式引用 `UITableViewCell`\
    \ 的标准内容——`textLabel`、`detailTextLabel`、`imageView` 和 `accessoryView`——那么它们将不会被插入到单元格中，也不会干扰您的自定义布局。\n\
    \n### 视图及其层次结构\n\niOS 中一个经常引起混淆的方面是 `UIViews` 之间的相互关系。所有这些关于添加子视图的讨论——但添加到哪？添加到什么？\n\
    \n理解 `UIViews` 的关键概念是它们形成了一个层次结构，如图 7-3 所示。\n\n![A978-1-4842-1242-4_7_Fig3_HTML.jpg](img/A978-1-4842-1242-4_7_Fig3_HTML.jpg)\n\
    \n图 7-3. 视图层次结构\n\n每个 `UIView` 可以有一个父视图（或 `superView`）以及一个或多个 `subViews`。`subViews`\
    \ 的可见性与其 `superView` 相关，因此将 `UIView C` 的可见性设置为 `hidden` 将导致 `UIViews D` 和 `E`\
    \ 消失。\n\n每个 `UIView` 都有一个名为 `subViews` 的属性，它是一个 `Array`，包含该 `UIView` 实例作为父视图（或\
    \ `superView`）的所有 `UIViews`；见图 7-4。\n\n![A978-1-4842-1242-4_7_Fig4_HTML.jpg](img/A978-1-4842-1242-4_7_Fig4_HTML.jpg)\n\
    \n图 7-4. `subView` 数组中的视图\n\n您可以通过遍历 `UIView` 的 `subViews` 数组来访问其每个 `subView`：\n\
    \n```swift\nfor theSubView in parentView.subViews {\n    // 对 theSubView 执行某些操作\n\
    }\n```\n\n类似地，每个 `UIView` 都有一个 `superView` 属性，它是对其“父”视图的引用。在图 7-3 中，`view C` 的\
    \ `superView` 是 `view A`，而 `view C` 的 `subViews` 数组中有两个视图：`views D` 和 `E`。\n\n\
    如果您正在创建包含多个视图、子视图和父视图的复杂布局，那么保留一些图表来展示每个视图与其他视图的关系是值得的。这可以防止将来产生很多困惑。\n\n### 在单元格中创建元素\n\
    \n第一步必须在每个单元格创建时进行。这发生在相应的 `dataSource` 函数中，即 `tableView:cellForRowAtIndexPath`（如代码清单\
    \ 7-1 所示）或 `collectionView:itemForRowAtIndexPath:`（如代码清单 7-2 所示）。\n\n每个代码清单展示了基本技术：\n\
    \n* 首先，检查您要添加的子视图是否存在（以防您正在回收利用已存在的单元格）。\n* 如果子视图已存在，则配置您想要控制的属性。\n* 如果子视图不存在，则创建它并将其添加到单元格的\
    \ `contentView` 中，然后进行配置。\n\n**代码清单 7-1.** 为 `UITableView` 添加和配置自定义子视图\n\n```swift\n\
    func tableView(tableView: UITableView, cellForRowAtIndexPath\nindexPath: NSIndexPath)\
    \ -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\nforIndexPath: indexPath)\n    // 检查自定义视图是否已存在 – 如果存在，\n   \
    \ // 则说明我们正在回收利用一个已有的单元格\n    if let customView = cell.contentView.viewWithTag(1000)\
    \ {\n        // 自定义视图的属性\n    } else {\n        // 创建自定义视图并设置标签值\n        let\
    \ customView = UIView(frame: cell.contentView.frame)\n        customView.tag =\
    \ 1000\n        // 自定义视图的属性\n        ...\n        // 将自定义视图添加到单元格的 contentView\n\
    \        cell.contentView.addSubview(customView)\n        }\n    // 将单元格返回给 tableView\n\
    \    return cell\n}\n```\n\n**代码清单 7-2.** 为 `UICollectionView` 添加和配置自定义子视图\n\n\
    ```swift\nfunc collectionView(collectionView: UICollectionView, cellForItemAtIndexPath\n\
    indexPath: NSIndexPath) -> UICollectionViewCell {\n    let cell = collectionView.dequeueReusableCellWithReuseIdentifier(reuseIdentifier,\n\
    \   forIndexPath: indexPath)\n    if let customView = cell.contentView.viewWithTag(1000)\
    \ {\n        customView.backgroundColor = UIColor.redColor()\n    } else {\n \
    \       let customView = UIView(frame: cell.frame)\n        customView.tag = 1000\n\
    \        customView.backgroundColor = UIColor.redColor()\n        cell.contentView.addSubview(customView)\n\
    \    }\n    return cell\n}\n```\n"
- fmt: "#### Updating the Content in a Customized Cell\n\nThe preceding code will\
    \ ensure that every new cell will be created with a `UIView` inside it, ready\
    \ for configuration as each row is updated.\n\nAt this point, you meet what might\
    \ seem like a bit of a stumbling block. After the subviews that you created are\
    \ inserted into the cell’s `contentView`, you can no longer access them directly\
    \ to update them. They’re effectively subsumed into the cell’s `contentView`,\
    \ which doesn’t have any properties or outlets that you can use to update them.\n\
    \nThis is where the tags come in. Updating the content is a two-step process.\n\
    \nGet a reference to the custom label and `imageView` inside the cell’s `contentView`,\
    \ which you do by referencing their tags. Update the content of the controls.\n\
    \n#### Tagging Controls in the Cell\n\nEvery `UIView` control has an associate\
    \ `tag` property, which can be set either in Interface Builder or dynamically\
    \ in code. The `tag` is simply an `Int` value that uniquely identifies each element—with\
    \ one very important caveat: you’re in charge of the `tag`’s uniqueness.\n\nLet\
    \ me say that again, for emphasis. The control doesn’t care about what its `tag`\
    \ value is, and the view doesn’t care if the `tag` is unique. If you need to identify\
    \ each control uniquely, the `tags` need to be unique. You can get some very strange\
    \ results if that’s not the case.\n\nSetting the `tag` of a control can be done\
    \ in code:\n\n`myControl.tag = 1050`\n\nAlternatively, you can use the View section\
    \ of the Attributes Inspector (shown in Figure [7-5](#A978-1-4842-1242-4_7_Chapter.html#Fig5))\
    \ if you’re working with Interface Builder.\n\n![A978-1-4842-1242-4_7_Fig5_HTML.jpg](A978-1-4842-1242-4_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5. Setting a control’s tag\n\nThere are a couple of tricks I use to\
    \ keep track of control `tags` within XIB files:\n\n- Start the numbering at a\
    \ large value, and leave “space” in the numbering for additional tags. I’ve gotten\
    \ into the habit of starting `tag` numbering at `1000`, and incrementing by `10`\
    \ for each `tag`.\n- Keep the tag numbering consistent with the layout of the\
    \ XIB. For example, if you have four `UILabels` in a line, give the top one the\
    \ `tag 1000`, the second `1010`, the third `1020`, and so on.\n\nAfter you’ve\
    \ finished with the XIB file, the next challenge is keeping track of tag numbers\
    \ in your classes. This is where enumerations come into their own.\n\nEnumerations\
    \ (`enums`) allow you to associate integer values with what are effectively text\
    \ labels. One way of thinking about them is as a kind of compile-time global find-and-replace\
    \ (this will make Swift purists wince, though.)\n\n`enums` need to be defined\
    \ before they’re used. I tend to put them at the top of my view classes files\
    \ so I know where to find them:\n\n```\nenum kCellControl: Int {\n    case NameLabel\
    \ = 1050\n    case StreetLabel = 1060\n    case UserImage = 1070\n}\n```\n\nThen\
    \ as the file is compiled, any instances of the `enum` (in this case `kCellControl.NameLabel`)\
    \ will be replaced by whatever integer follows. So this code\n\n```\nif let myLabel\
    \ = cell.contentView.viewWithTag(kCellControl.NameLabel.rawValue) as? UILabel\
    \ {\n    myLabel.text = \"Label text\"\n}\n```\n\nwill be interpreted by the complier\
    \ as\n\n```\nif let myLabel = cell.contentView.viewWithTag(1050) as? UILabel {\n\
    \    myLabel.text = \"Label text\"\n}\n```\n\nStarting an `enum` with `k` just\
    \ indicates it’s a constant. You don’t need to do this, but you’ll see this done\
    \ a lot in Apple code that defines constants. It’s a hangover from days of yore.\n\
    \nBy using `enums` inline in your code rather than the actual tag values themselves,\
    \ you’re doing several things:\n\n- You’re making your code significantly more\
    \ readable, because it’s far more obvious what the control does.\n- You’re making\
    \ any use of the wrong tag much more obvious.\n- You’re providing a record of\
    \ all your tags at the top of your class (or wherever you choose to place them),\
    \ keeping everything neatly together.\n\n#### Casting Controls\n\nYou’ll notice\
    \ that the line that creates your `UILabel` has a slightly strange syntax. You’re\
    \ casting the `UIView` with the tag `1050` into a `UILabel`. If this is something\
    \ new to you, fear not—it’s not as arcane as it sounds.\n\nThe `viewWithTag` function\
    \ returns a `UIView`, which will respond to all the functions defined for the\
    \ `UIView` class. The problem is that the view with tag `1050` is actually a `UILabel`,\
    \ and you want to set its `textLabel` property.\n\n`UIView` doesn’t have a text\
    \ property. If you try to send a text message to an instance of `UIView`, the\
    \ compiler will (rightly) complain that the `UIView` won’t respond, and the program\
    \ will crash when the message is sent.\n\nThe work-around is something of a cheat.\
    \ What you’re doing in the line\n\n```\nif let myLabel = cell.contentView.viewWithTag(1050)\
    \ as? UILabel\n```\n\nis telling the compiler that the view with tag `1050` is\
    \ actually a `UILabel`, and that you want to access it as such. Technically speaking,\
    \ you’re casting it from a `UIView` to an optional `UILabel`.\n\nIf the view with\
    \ the tag `1050` can be cast to a `UILabel`, then it will be; if not, then it\
    \ will be returned as `nil`. By using the `if let` syntax to unwrap the optional,\
    \ you can be sure that you are dealing with a `UILabel`, and you can set the text\
    \ property:\n\n```\nmyLabel.text = \"Some custom text\"\n```\n\n# Creating Custom\
    \ Cells Visually As Prototypes In A Storyboard\n\nPrototype cells are a way of\
    \ designing custom cells in Interface Builder, but without the overhead of creating\
    \ and managing separate XIB files. They can be used for both table and collection\
    \ views, and keep everything neatly together in the table or collection view object\
    \ in the Storyboard.\n\nYou can think of prototype cells as blueprints. You create\
    \ one prototype for each type of cell that you need, add the cell controls and\
    \ lay them out, and then at runtime update the controls from the data model.\n\
    \nThe controls in prototype cells can be accessed by the view controller by referencing\
    \ them directly with tags, or via the outlets in a `UITableViewCell` or `UICollectionViewCell`\
    \ subclass.\n\nDynamic cells, as the name suggests, will be updated at runtime\
    \ with content obtained from the table or collection view’s data model. They are\
    \ supported in both table and collection views.\n\n`UITableViews` are slightly\
    \ different, and also offer static cells. Static cell subviews are not updated\
    \ at runtime. They can be a flexible way of creating user interfaces for app components\
    \ such as preference settings, or for layouts that exploit the scrolling features\
    \ of table views."
  raw: '#### Updating the Content in a Customized Cell


    The preceding code will ensure that every new cell will be created with a `UIView`
    inside it, ready for configuration as each row is updated.


    At this point, you meet what might seem like a bit of a stumbling block. After
    the subviews that you created are inserted into the cell’s `contentView`, you
    can no longer access them directly to update them. They’re effectively subsumed
    into the cell’s `contentView`, which doesn’t have any properties or outlets that
    you can use to update them.


    This is where the tags come in. Updating the content is a two-step process.


    Get a reference to the custom label and `imageView` inside the cell’s `contentView`,
    which you do by referencing their tags.   Update the content of the controls.


    #### Tagging Controls in the Cell


    Every `UIView` control has an associate `tag` property, which can be set either
    in Interface Builder or dynamically in code. The `tag` is simply an `Int` value
    that uniquely identifies each element—with one very important caveat: you’re in
    charge of the `tag`’s uniqueness.


    Let me say that again, for emphasis. The control doesn’t care about what its `tag`
    value is, and the view doesn’t care if the `tag` is unique. If you need to identify
    each control uniquely, the `tags` need to be unique. You can get some very strange
    results if that’s not the case.


    Setting the `tag` of a control can be done in code:


    `myControl.tag = 1050`


    Alternatively, you can use the View section of the Attributes Inspector (shown
    in Figure [7-5](#A978-1-4842-1242-4_7_Chapter.html#Fig5)) if you’re working with
    Interface Builder.


    ![A978-1-4842-1242-4_7_Fig5_HTML.jpg](A978-1-4842-1242-4_7_Fig5_HTML.jpg)


    Figure 7-5.


    Setting a control’s tag


    There are a couple of tricks I use to keep track of control `tags` within XIB
    files:


    *   Start the numbering at a large value, and leave “space” in the numbering for
    additional tags. I’ve gotten into the habit of starting `tag` numbering at `1000`,
    and incrementing by `10` for each `tag`.

    *   Keep the tag numbering consistent with the layout of the XIB. For example,
    if you have four `UILabels` in a line, give the top one the `tag 1000`, the second
    `1010`, the third `1020`, and so on.


    After you’ve finished with the XIB file, the next challenge is keeping track of
    tag numbers in your classes. This is where enumerations come into their own.


    Enumerations (`enums`) allow you to associate integer values with what are effectively
    text labels. One way of thinking about them is as a kind of compile-time global
    find-and-replace (this will make Swift purists wince, though.)


    `enums` need to be defined before they’re used. I tend to put them at the top
    of my view classes files so I know where to find them:


    `enum kCellControl: Int {`


        `case NameLabel = 1050`


        `case StreetLabel = 1060`


        `case UserImage = 1070`


    `}`


    Then as the file is compiled, any instances of the `enum` (in this case `kCellControl.NameLabel`)
    will be replaced by whatever integer follows. So this code


    `if let myLabel = cell.contentView.viewWithTag ➤`


    `(kCellControl.NameLabel.rawValue) as? UILabel {`


        `myLabel.text = "Label text"`


    `}`


    will be interpreted by the complier as


    `if let myLabel = cell.contentView.viewWithTag(1050) as? UILabel {`


        `myLabel.text = "Label text"`


    `}`


    Starting an `enum` with `k` just indicates it’s a constant. You don’t need to
    do this, but you’ll see this done a lot in Apple code that defines constants.
    It’s a hangover from days of yore.


    By using `enums` inline in your code rather than the actual tag values themselves,
    you’re doing several things:


    *   You’re making your code significantly more readable, because it’s far more
    obvious what the control does.

    *   You’re making any use of the wrong tag much more obvious.

    *   You’re providing a record of all your tags at the top of your class (or wherever
    you choose to place them), keeping everything neatly together.


    #### Casting Controls


    You’ll notice that the line that creates your `UILabel` has a slightly strange
    syntax. You’re casting the `UIView` with the tag `1050` into a `UILabel`. If this
    is something new to you, fear not—it’s not as arcane as it sounds.


    The `viewWithTag`function returns a `UIView`, which will respond to all the functions
    defined for the `UIView` class. The problem is that the view with tag `1050` is
    actually a `UILabel`, and you want to set its `textLabel` property.


    `UIView` doesn’t have a text property. If you try to send a text message to an
    instance of `UIView`, the compiler will (rightly) complain that the `UIView` won’t
    respond, and the program will crash when the message is sent.


    The work-around is something of a cheat. What you’re doing in the line


    `if let myLabel = cell.contentView.viewWithTag(1050) as? UILabel`


    is telling the compiler that the view with tag `1050` is actually a `UILabel`,
    and that you want to access it as such. Technically speaking, you’re casting it
    from a `UIView` to an optional `UILabel`.


    If the view with the tag `1050` can be cast to a `UILabel`, then it will be; if
    not, then it will be returned as `nil`. By using the `if let` syntax to unwrap
    the optional, you can be sure that you are dealing with a `UILabel`, and you can
    set the text property:


    `myLabel.text = "Some custom text"`


    ## Creating Custom Cells Visually As Prototypes In A Storyboard


    Prototype cells are a way of designing custom cells in Interface Builder, but
    without the overhead of creating and managing separate XIB files. They can be
    used for both table and collection views, and keep everything neatly together
    in the table or collection view object in the Storyboard.


    You can think of prototype cells as blueprints. You create one prototype for each
    type of cell that you need, add the cell controls and lay them out, and then at
    runtime update the controls from the data model.


    The controls in prototype cells can be accessed by the view controller by referencing
    them directly with tags, or via the outlets in a `UITableViewCell` or `UICollectionViewCell`
    subclass.


    Dynamic cells, as the name suggests, will be updated at runtime with content obtained
    from the table or collection view’s data model. They are supported in both table
    and collection views.


    `UITableViews` are slightly different, and also offer static cells. Static cell
    subviews are not updated at runtime. They can be a flexible way of creating user
    interfaces for app components such as preference settings, or for layouts that
    exploit the scrolling features of table views.'
  trans: "\n#### 更新自定义单元格中的内容\n\n前面的代码将确保每个新单元格内部都会创建一个 `UIView`，并随着每一行的更新而准备好进行配置。\n\
    \n此时，你可能会遇到一个看似棘手的问题。在你创建的子视图被插入到单元格的 `contentView` 之后，你就无法再直接访问它们来更新了。它们实际上被合并到了单元格的\
    \ `contentView` 中，而 `contentView` 没有任何可供你用来更新这些子视图的属性或接口。\n\n这就是标签发挥作用的地方。更新内容是一个两步过程。\n\
    \n首先，获取单元格 `contentView` 内部自定义标签和 `imageView` 的引用，这是通过引用它们的标签来实现的。然后，更新这些控件的内容。\n\
    \n#### 为单元格中的控件添加标签\n\n每一个 `UIView` 控件都有一个关联的 `tag` 属性，该属性既可以在 Interface Builder\
    \ 中设置，也可以在代码中动态设置。`tag` 只是一个用于唯一标识每个元素的 `Int` 值——但有一个非常重要的注意事项：你需要负责 `tag` 的唯一性。\n\
    \n让我再强调一遍。控件并不关心其 `tag` 值是多少，视图也不关心 `tag` 是否唯一。如果你需要唯一标识每个控件，那么 `tags` 必须是唯一的。如果不这样做，你可能会得到一些非常奇怪的结果。\n\
    \n可以在代码中设置控件的 `tag`：\n\n`myControl.tag = 1050`\n\n或者，如果你在使用 Interface Builder，也可以使用属性检查器中的“视图”部分（如图\
    \ 7-5 所示）进行设置。\n\n![A978-1-4842-1242-4_7_Fig5_HTML.jpg](img/A978-1-4842-1242-4_7_Fig5_HTML.jpg)\n\
    \n图 7-5. 设置控件的标签\n\n我使用了一些技巧来跟踪 XIB 文件中的控件 `tags`：\n\n-   从一个较大的数值开始编号，并在编号中为额外的标签留出“空间”。我养成了从\
    \ `1000` 开始 `tag` 编号，并为每个 `tag` 递增 `10` 的习惯。\n-   保持标签编号与 XIB 的布局一致。例如，如果一行中有四个\
    \ `UILabel`，则将第一个的 `tag` 设为 `1000`，第二个设为 `1010`，第三个设为 `1020`，依此类推。\n\n完成 XIB 文件后，下一个挑战是在你的类中跟踪标签编号。这时枚举就发挥其作用了。\n\
    \n枚举（`enums`）允许你将整数值与实际上相当于文本标签的内容关联起来。一种思考它们的方式是将其视为一种编译时的全局查找和替换（不过，这可能会让 Swift\
    \ 纯粹主义者感到不适）。\n\n`enums` 需要在使用前定义。我倾向于将它们放在视图类文件的顶部，这样我就知道在哪里能找到它们：\n\n```\nenum\
    \ kCellControl: Int {\n    case NameLabel = 1050\n    case StreetLabel = 1060\n\
    \    case UserImage = 1070\n}\n```\n\n然后，在文件编译时，`enum` 的任何实例（本例中为 `kCellControl.NameLabel`）都会被其后的整数值替换。因此，这段代码\n\
    \n```\nif let myLabel = cell.contentView.viewWithTag(kCellControl.NameLabel.rawValue)\
    \ as? UILabel {\n    myLabel.text = \"Label text\"\n}\n```\n\n会被编译器解释为\n\n```\n\
    if let myLabel = cell.contentView.viewWithTag(1050) as? UILabel {\n    myLabel.text\
    \ = \"Label text\"\n}\n```\n\n以 `k` 开头命名 `enum` 仅表示它是一个常量。并非必须这样做，但你在定义常量的 Apple\
    \ 代码中会经常看到这种做法。这是早期编程风格的遗留习惯。\n\n通过在代码中内联使用 `enums` 而非实际的标签值本身，你做了以下几件事：\n\n-\
    \   让你的代码更具可读性，因为控件的功能更加一目了然。\n-   使任何使用错误标签的情况都更加明显。\n-   在你的类（或你选择放置它们的任何位置）的顶部提供了所有标签的记录，将所有内容整齐地组织在一起。\n\
    \n#### 转换控件类型\n\n你会注意到，创建 `UILabel` 的那行代码语法略显奇怪。你将带有标签 `1050` 的 `UIView` **转换**（casting）为\
    \ `UILabel`。如果这对你来说是新鲜事物，请不要担心——它并不像听起来那么神秘。\n\n`viewWithTag` 函数返回一个 `UIView`，该对象会响应所有为\
    \ `UIView` 类定义的方法。问题在于，标签为 `1050` 的视图实际上是一个 `UILabel`，而你想要设置它的 `textLabel` 属性。\n\
    \n`UIView` 没有文本属性。如果你尝试向 `UIView` 的实例发送一个文本消息，编译器会（正确地）报错，指出 `UIView` 不会响应此消息，并且在发送消息时程序会崩溃。\n\
    \n解决方法有点像一种取巧。你在以下代码行中做的事情\n\n```\nif let myLabel = cell.contentView.viewWithTag(1050)\
    \ as? UILabel\n```\n\n是告诉编译器，带有标签 `1050` 的视图实际上是一个 `UILabel`，并且你想以这种方式访问它。从技术上讲，你在将它从\
    \ `UIView` **转换**为可选的 `UILabel`。\n\n如果带有标签 `1050` 的视图可以被转换为 `UILabel`，那么它就会被转换；如果不能，则返回\
    \ `nil`。通过使用 `if let` 语法来解包这个可选值，你可以确保处理的是一个 `UILabel`，并且可以设置文本属性：\n\n```\nmyLabel.text\
    \ = \"Some custom text\"\n```\n\n# 在故事板中以原型方式可视化创建自定义单元格\n\n原型单元格是一种在 Interface\
    \ Builder 中设计自定义单元格的方法，而且无需创建和管理单独的 XIB 文件。它们可用于表视图和集合视图，并将所有内容整齐地保留在故事板的表视图或集合视图对象中。\n\
    \n你可以将原型单元格视为蓝图。为你需要的每种单元格类型创建一个原型，添加单元格控件并进行布局，然后在运行时根据数据模型更新这些控件。\n\n视图控制器可以通过直接引用标签或通过\
    \ `UITableViewCell` 或 `UICollectionViewCell` 子类中的接口来访问原型单元格中的控件。\n\n顾名思义，动态单元格将在运行时使用从表视图或集合视图数据模型获取的内容进行更新。表视图和集合视图都支持动态单元格。\n\
    \n`UITableViews` 略有不同，它还提供了静态单元格。静态单元格的子视图在运行时不会更新。它们可以为应用程序组件（如偏好设置）创建用户界面，或者用于利用表视图滚动功能的布局，提供了一种灵活的方式。"
- fmt: "### Creating Prototype Dynamic Cells\n\nPrototype dynamic cells are added\
    \ to table views in Storyboards. When you first add a `UITableViewController`\
    \ object into a Storyboard, you’ll see that it arrives with one empty prototype\
    \ cell (see Figure [7-6](#A978-1-4842-1242-4_7_Chapter.html#Fig6)).\n\n![A978-1-4842-1242-4_7_Fig6_HTML.jpg](A978-1-4842-1242-4_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6. A prototype cell in a `UITableViewController`\n\nA `UITableView`\
    \ is slightly different, in that it arrives in the Storyboard empty (shown in\
    \ Figure [7-7](#A978-1-4842-1242-4_7_Chapter.html#Fig7)).\n\n![A978-1-4842-1242-4_7_Fig7_HTML.jpg](A978-1-4842-1242-4_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7. A `UITableView` embedded inside a `UIViewController`\n\n`UICollectionView`\
    \ provides a single prototype cell regardless of whether you’re adding a `UICollectionView`\
    \ inside a `UIViewController` or a `UICollectionViewController`.\n\nRegardless\
    \ of whether you’re using a `UITableViewController` or a `UITableView` inside\
    \ a `UIViewController`, you can control the number of prototype cells by changing\
    \ the control in the Attributes Inspector (shown in Figure [7-8](#A978-1-4842-1242-4_7_Chapter.html#Fig8)).\n\
    \n![A978-1-4842-1242-4_7_Fig8_HTML.jpg](A978-1-4842-1242-4_7_Fig8_HTML.jpg)\n\n\
    Figure 7-8. Altering the number of prototype cells in a table view\n\n`UICollectionView`\
    \ is similar, as shown in Figure [7-9](#A978-1-4842-1242-4_7_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1242-4_7_Fig9_HTML.jpg](A978-1-4842-1242-4_7_Fig9_HTML.jpg)\n\n\
    Figure 7-9. Altering the number of prototype items in a collection view\n\nFor\
    \ each prototype that you create, you need to provide it with a cell or item identifier\
    \ so that the `tableView:cellForRowAtIndexPath` or `collectionView:cellForItemAtIndexPath`\
    \ knows which prototype to use when required.\n\nYou add this in the Attributes\
    \ Inspector. Figure [7-10](#A978-1-4842-1242-4_7_Chapter.html#Fig10) shows the\
    \ `UITableView` cell identifier, while Figure [7-11](#A978-1-4842-1242-4_7_Chapter.html#Fig11)\
    \ shows the `UICollectionViewCell` identifier.\n\n![A978-1-4842-1242-4_7_Fig11_HTML.jpg](A978-1-4842-1242-4_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11. Setting the custom item identifier for a prototype collection view\
    \ cell\n\n![A978-1-4842-1242-4_7_Fig10_HTML.jpg](A978-1-4842-1242-4_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10. Setting the custom cell identifier for a prototype table view cell\n\
    \n#### Customizing Prototype Table View Cells\n\nTable view cells can be instances\
    \ of one of the four standard cell types:\n\n*   Basic (single `titleLabel` at\
    \ the left)\n*   Right detail (`titleLabel` at the left, `detailTextLabel` on\
    \ the right)\n*   Left detail (`detailTextLabel` on the left, `titleLabel` on\
    \ the right)\n*   Subtitle (`titleLabel` on top, `detailTextlabel` below)\n\n\
    If these don’t fit your requirements, you have two options:\n\n*   Select the\
    \ `Custom` cell type, lay out the controls from scratch, and access them using\
    \ their `tag` property.\n*   Create a custom `UITableViewCell` subclass, select\
    \ the `Custom` cell in the Storyboard, lay out the controls from scratch, and\
    \ link them to outlets in your custom class.\n\nBoth processes are shown in detail\
    \ later in this chapter.\n\n#### Prototype Cells and Custom `UITableViewCell`\
    \ Subclasses\n\nCustom cell subclasses allow you complete control over their content.\
    \ You can lay out the prototype cell in the Storyboard, and then connect the cell’s\
    \ controls to outlets in the custom `UITableViewCell` subclass. When the cell\
    \ is dequeued, you can set the outlet properties so that the cell displays your\
    \ data.\n\nTo add a prototype of a custom cell, you first need to add a prototype\
    \ cell to the table view contained in the Storyboard, as you did above.\n\nThen,\
    \ you need to set the cell’s `Custom Class` property in the Identity Inspector,\
    \ as shown in Figure [7-12](#A978-1-4842-1242-4_7_Chapter.html#Fig12).\n\n![A978-1-4842-1242-4_7_Fig12_HTML.jpg](A978-1-4842-1242-4_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12. Setting the cell’s class\n\nNow you can connect the controls in\
    \ the cell to the outlets in the `UITableViewCell` subclass. Figure [7-13](#A978-1-4842-1242-4_7_Chapter.html#Fig13)\
    \ shows this in action: the `UILabel` in the cell is connected to the `nameLabel`\
    \ outlet in the `CustomCell` class.\n\n![A978-1-4842-1242-4_7_Fig13_HTML.jpg](A978-1-4842-1242-4_7_Fig13_HTML.jpg)\n\
    \nFigure 7-13. Connecting the `nameLabel`\n\nWhen the cell is dequeued in the\
    \ `tableView:cellForRowAtIndexPath:` function, you need to cast the dequeued cell\
    \ to an instance of the subclass:\n\n```\nlet cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CustomCell\",\nforIndexPath: indexPath) as! CustomCell\n```\n\nThis will enable\
    \ you to access the connected outlets:\n\n```\ncell.nameLabel.text = tableData[indexPath.row]\n\
    ```\n\n#### Setting Prototype Cell Heights\n\nThe standard table cell has a standard\
    \ height of 44 points, but you have flexibility to change this, either globally,\
    \ or on a per-row basis. However, if you change the row height in the prototype\
    \ cells, you also need to make sure that this is set at runtime. You have two\
    \ options:\n\n*   Set the row height globally for all rows in the table.\n*  \
    \ Set the row height on a per-row basis.\n\nTo change the row height in the prototype,\
    \ you can either drag the resizing handle at the bottom of the cell, or set the\
    \ row height value in the Size Inspector, as shown in Figure [7-14](#A978-1-4842-1242-4_7_Chapter.html#Fig14).\n\
    \n![A978-1-4842-1242-4_7_Fig14_HTML.jpg](A978-1-4842-1242-4_7_Fig14_HTML.jpg)\n\
    \nFigure 7-14. Setting the row height in the Size Inspector\n\nRegardless of which\
    \ approach you use, you will then need to set the row height in code. You can\
    \ do this for all cells in the table, by setting the `tableView`’s `rowHeight`\
    \ property:\n\n```\ntableView.rowHeight = 150.0\n```\n\nAlternatively, you can\
    \ implement the `UITableViewDelegate` function:\n\n```\nfunc tableView(tableView:\
    \ UITableView, heightForRowAtIndexPath indexPath:\nNSIndexPath) -> CGFloat {\n\
    \    return 150.0\n}\n```\n\nImplementing the `heightForRowAtIndexPath:` function\
    \ provides the flexibility to return different heights for different sections\
    \ or rows.\n\n#### Setting Variable Cell Heights\n\nIf your table design involves\
    \ varying heights of cells, you can potentially improve the performance of your\
    \ table by implementing the `tableView:estimatedHeightForRowAtIndexPath:` function.\n\
    \nThis is used by the table view when calculating its total height. If you have\
    \ a lot of cells with complex layouts, calculating the height upfront can take\
    \ time. The estimated row height gives the table view enough information to make\
    \ an attempt at calculating the total content height, but allows it to defer detailed\
    \ calculation until absolutely necessary.\n\nTo implement this, you need to do\
    \ two things. First, set the `tableView`’s `rowHeight` property to `UITableViewAutomaticDimension`:\n\
    \n```\ntableView.rowHeight = UITableViewAutomaticDimension\n```\n\nThen implement\
    \ the `tableView:estimatedHeightForCellAtIndexPath:` function:\n\n```\nfunc tableView(tableView:\
    \ UITableView, estimatedHeightForRowAtIndexPath\nindexPath: NSIndexPath) -> CGFloat\
    \ {\n    return 80\n}\n```\n\nUsing this approach allows you to exploit the power\
    \ of AutoLayout when laying out prototype cells, without needing to implement\
    \ the heavy lifting involved in calculating the height of cells yourself.\n\n\
    #### Customizing Prototype Collection View Cells\n\nThe process of customizing\
    \ prototype collection view cells is exactly the same as that for table view cells,\
    \ with the difference that collection view cells don’t have standard types. Each\
    \ collection view cell is effectively completely customized.\n\nAs with table\
    \ view cells, you’ve got two options: lay out controls and access them through\
    \ `tag` properties; or make connections to outlets in a custom `UICollectionViewCell`\
    \ subclass."
  raw: '### Creating Prototype Dynamic Cells


    Prototype dynamic cells are added to table views in Storyboards. When you first
    add a `UITableViewController` object into a Storyboard, you’ll see that it arrives
    with one empty prototype cell (see Figure [7-6](#A978-1-4842-1242-4_7_Chapter.html#Fig6)).


    ![A978-1-4842-1242-4_7_Fig6_HTML.jpg](A978-1-4842-1242-4_7_Fig6_HTML.jpg)


    Figure 7-6.


    A prototype cell in a UITableViewController


    A `UITableView` is slightly different, in that it arrives in the Storyboard empty
    (shown in Figure [7-7](#A978-1-4842-1242-4_7_Chapter.html#Fig7)).


    ![A978-1-4842-1242-4_7_Fig7_HTML.jpg](A978-1-4842-1242-4_7_Fig7_HTML.jpg)


    Figure 7-7.


    A UITableView embedded inside a UIViewController


    `UICollectionView` provides a single prototype cell regardless of whether you’re
    adding a `UICollectionView` inside a `UIViewController` or a `UICollectionViewController`.


    Regardless of whether you’re using a `UITableViewController` or a `UITableView`
    inside a `UIViewController`, you can control the number of prototype cells by
    changing the control in the Attributes Inspector (shown in Figure [7-8](#A978-1-4842-1242-4_7_Chapter.html#Fig8)).


    ![A978-1-4842-1242-4_7_Fig8_HTML.jpg](A978-1-4842-1242-4_7_Fig8_HTML.jpg)


    Figure 7-8.


    Altering the number of prototype cells in a table view


    `UICollectionView` is similar, as shown in Figure [7-9](#A978-1-4842-1242-4_7_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_7_Fig9_HTML.jpg](A978-1-4842-1242-4_7_Fig9_HTML.jpg)


    Figure 7-9.


    Altering the number of prototype items in a collection view


    For each prototype that you create, you need to provide it with a cell or item
    identifier so that the `tableView:cellForRowAtIndexPath` or `collectionView:cellForItemAtIndexPath`
    knows which prototype to use when required.


    You add this in the Attributes Inspector. Figure [7-10](#A978-1-4842-1242-4_7_Chapter.html#Fig10)
    shows the `UITableView` cell identifier, while Figure [7-11](#A978-1-4842-1242-4_7_Chapter.html#Fig11)
    shows the `UICollectionViewCell` identifier.


    ![A978-1-4842-1242-4_7_Fig11_HTML.jpg](A978-1-4842-1242-4_7_Fig11_HTML.jpg)


    Figure 7-11.


    Setting the custom item identifier for a prototype collection view cell


    ![A978-1-4842-1242-4_7_Fig10_HTML.jpg](A978-1-4842-1242-4_7_Fig10_HTML.jpg)


    Figure 7-10.


    Setting the custom cell identifier for a prototype table view cell


    #### Customizing Prototype Table View Cells


    Table view cells can be instances of one of the four standard cell types:


    *   Basic (single `titleLabel` at the left)

    *   Right detail (`titleLabel` at the left, `detailTextLabel` on the right)

    *   Left detail (`detailTextLabel` on the left, `titleLabel` on the right)

    *   Subtitle (`titleLabel` on top, `detailTextlabel` below)


    If these don’t fit your requirements, you have two options:


    *   Select the `Custom` cell type, lay out the controls from scratch, and access
    them using their `tag` property.

    *   Create a custom `UITableViewCell` subclass, select the `Custom` cell in the
    Storyboard, lay out the controls from scratch, and link them to outlets in your
    custom class.


    Both processes are shown in detail later in this chapter.


    #### Prototype Cells and Custom UITableViewCell Subclasses


    Custom cell subclasses allow you complete control over their content. You can
    lay out the prototype cell in the Storyboard, and then connect the cell’s controls
    to outlets in the custom `UITableViewCell` subclass. When the cell is dequeued,
    you can set the outlet properties so that the cell displays your data.


    To add a prototype of a custom cell, you first need to add a prototype cell to
    the table view contained in the Storyboard, as you did above.


    Then, you need to set the cell’s `Custom Class` property in the Identity Inspector,
    as shown in Figure [7-12](#A978-1-4842-1242-4_7_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_7_Fig12_HTML.jpg](A978-1-4842-1242-4_7_Fig12_HTML.jpg)


    Figure 7-12.


    Setting the cell’s class


    Now you can connect the controls in the cell to the outlets in the `UITableViewCell`
    subclass. Figure [7-13](#A978-1-4842-1242-4_7_Chapter.html#Fig13) shows this in
    action: the `UILabel` in the cell is connected to the `nameLabel` outlet in the
    `CustomCell` class.


    ![A978-1-4842-1242-4_7_Fig13_HTML.jpg](A978-1-4842-1242-4_7_Fig13_HTML.jpg)


    Figure 7-13.


    Connecting the nameLabel


    When the cell is dequeued in the `tableView:cellForRowAtIndexPath:` function,
    you need to cast the dequeued cell to an instance of the subclass:


    `let cell = tableView.dequeueReusableCellWithIdentifier("CustomCell", ➤`


    `forIndexPath: indexPath) as! CustomCell`


    This will enable you to access the connected outlets:


    `cell.nameLabel.text = tableData[indexPath.row]`


    #### Setting Prototype Cell Heights


    The standard table cell has a standard height of 44 points, but you have flexibility
    to change this, either globally, or on a per-row basis. However, if you change
    the row height in the prototype cells, you also need to make sure that this is
    set at runtime. You have two options:


    *   Set the row height globally for all rows in the table.

    *   Set the row height on a per-row basis.


    To change the row height in the prototype, you can either drag the resizing handle
    at the bottom of the cell, or set the row height value in the Size Inspector,
    as shown in Figure [7-14](#A978-1-4842-1242-4_7_Chapter.html#Fig14).


    ![A978-1-4842-1242-4_7_Fig14_HTML.jpg](A978-1-4842-1242-4_7_Fig14_HTML.jpg)


    Figure 7-14.


    Setting the row height in the Size Inspector


    Regardless of which approach you use, you will then need to set the row height
    in code. You can do this for all cells in the table, by setting the `tableView`’s
    `rowHeight` property:


    `tableView.rowHeight = 150.0`


    Alternatively, you can implement the `UITableViewDelegate` function:


    `func tableView(tableView: UITableView, heightForRowAtIndexPath indexPath: ➤`


    `NSIndexPath) -> CGFloat {`


        `return 150.0`


    `}`


    Implementing the `heightForRowAtIndexPath:` function provides the flexibility
    to return different heights for different sections or rows.


    #### Setting Variable Cell Heights


    If your table design involves varying heights of cells, you can potentially improve
    the performance of your table by implementing the `tableView:estimatedHeightForRowAtIndexPath:`
    function.


    This is used by the table view when calculating its total height. If you have
    a lot of cells with complex layouts, calculating the height upfront can take time.
    The estimated row height gives the table view enough information to make an attempt
    at calculating the total content height, but allows it to defer detailed calculation
    until absolutely necessary.


    To implement this, you need to do two things. First, set the `tableView`’s `rowHeight`
    property to `UITableViewAutomaticDimension`:


    `tableView.rowHeight = UITableViewAutomaticDimension`


    Then implement the `tableView:estimatedHeightForCellAtIndexPath:` function:


    `func tableView(tableView: UITableView, estimatedHeightForRowAtIndexPath➤`


    `indexPath: NSIndexPath) -> CGFloat {`


        `return 80`


    `}`


    Using this approach allows you to exploit the power of AutoLayout when laying
    out prototype cells, without needing to implement the heavy lifting involved in
    calculating the height of cells yourself.


    #### Customizing Prototype Collection View Cells


    The process of customizing prototype collection view cells is exactly the same
    as that for table view cells, with the difference that collection view cells don’t
    have standard types. Each collection view cell is effectively completely customized.


    As with table view cells, you’ve got two options: lay out controls and access
    them through `tag` properties; or make connections to outlets in a custom `UICollectionViewCell`
    subclass.'
  trans: "\n### 创建原型动态单元格\n\n原型动态单元格是在 Storyboard 中添加到表格视图的。当你首次向 Storyboard 添加一个\
    \ `UITableViewController` 对象时，你会看到它自带一个空的原型单元格（见图 7-6）。\n\n![A978-1-4842-1242-4_7_Fig6_HTML.jpg](img/A978-1-4842-1242-4_7_Fig6_HTML.jpg)\n\
    \n图 7-6. `UITableViewController` 中的一个原型单元格\n\n`UITableView` 则略有不同，它被添加到 Storyboard\
    \ 时是空的（如图 7-7 所示）。\n\n![A978-1-4842-1242-4_7_Fig7_HTML.jpg](img/A978-1-4842-1242-4_7_Fig7_HTML.jpg)\n\
    \n图 7-7. 嵌入在 `UIViewController` 中的 `UITableView`\n\n无论你是将 `UICollectionView` 添加在\
    \ `UIViewController` 内部，还是使用 `UICollectionViewController`，它都只提供一个原型单元格。\n\n无论你是在\
    \ `UIViewController` 内部使用 `UITableViewController` 还是 `UITableView`，你都可以通过更改 Attributes\
    \ Inspector（属性检查器）中的控件来控制原型单元格的数量（如图 7-8 所示）。\n\n![A978-1-4842-1242-4_7_Fig8_HTML.jpg](img/A978-1-4842-1242-4_7_Fig8_HTML.jpg)\n\
    \n图 7-8. 更改表格视图中的原型单元格数量\n\n`UICollectionView` 与此类似，如图 7-9 所示。\n\n![A978-1-4842-1242-4_7_Fig9_HTML.jpg](img/A978-1-4842-1242-4_7_Fig9_HTML.jpg)\n\
    \n图 7-9. 更改集合视图中的原型项目数量\n\n对于你创建的每个原型，都需要提供一个单元格或项目标识符，以便 `tableView:cellForRowAtIndexPath`\
    \ 或 `collectionView:cellForItemAtIndexPath` 方法在需要时知道使用哪个原型。\n\n你可以在 Attributes\
    \ Inspector 中添加此标识符。图 7-10 展示了 `UITableView` 的单元格标识符，而图 7-11 则展示了 `UICollectionViewCell`\
    \ 的标识符。\n\n![A978-1-4842-1242-4_7_Fig11_HTML.jpg](img/A978-1-4842-1242-4_7_Fig11_HTML.jpg)\n\
    \n图 7-11. 为原型集合视图单元格设置自定义项目标识符\n\n![A978-1-4842-1242-4_7_Fig10_HTML.jpg](img/A978-1-4842-1242-4_7_Fig10_HTML.jpg)\n\
    \n图 7-10. 为原型表格视图单元格设置自定义单元格标识符\n\n#### 自定义原型表格视图单元格\n\n表格视图单元格可以是四种标准单元格类型之一的实例：\n\
    \n*   基本型（左侧单个 `titleLabel`）\n*   右侧详细信息（左侧 `titleLabel`，右侧 `detailTextLabel`）\n\
    *   左侧详细信息（左侧 `detailTextLabel`，右侧 `titleLabel`）\n*   副标题型（上方 `titleLabel`，下方\
    \ `detailTextLabel`）\n\n如果这些类型不符合你的需求，你有两个选择：\n\n*   选择 `Custom` 单元格类型，从零开始布局控件，并通过它们的\
    \ `tag` 属性访问它们。\n*   创建一个自定义的 `UITableViewCell` 子类，在 Storyboard 中选择 `Custom` 单元格，从零开始布局控件，并将它们链接到你自定义类中的输出口。\n\
    \n这两种过程将在本章后面详细说明。\n\n#### 原型单元格与自定义 `UITableViewCell` 子类\n\n自定义单元格子类允许你完全控制其内容。你可以在\
    \ Storyboard 中布局原型单元格，然后将单元格的控件连接到自定义 `UITableViewCell` 子类中的输出口。当单元格被出队时，你可以设置输出口属性，以便单元格显示你的数据。\n\
    \n要添加自定义单元格的原型，首先需要像之前所做的那样，向 Storyboard 中包含的表格视图中添加一个原型单元格。\n\n然后，你需要在 Identity\
    \ Inspector（身份检查器）中设置单元格的 `Custom Class` 属性，如图 7-12 所示。\n\n![A978-1-4842-1242-4_7_Fig12_HTML.jpg](img/A978-1-4842-1242-4_7_Fig12_HTML.jpg)\n\
    \n图 7-12. 设置单元格的类\n\n现在，你可以将单元格中的控件连接到 `UITableViewCell` 子类中的输出口。图 7-13 展示了这一实际操作：单元格中的\
    \ `UILabel` 连接到了 `CustomCell` 类中的 `nameLabel` 输出口。\n\n![A978-1-4842-1242-4_7_Fig13_HTML.jpg](img/A978-1-4842-1242-4_7_Fig13_HTML.jpg)\n\
    \n图 7-13. 连接 `nameLabel`\n\n当单元格在 `tableView:cellForRowAtIndexPath:` 函数中被出队时，你需要将出队的单元格转换为子类的一个实例：\n\
    \n```\nlet cell = tableView.dequeueReusableCellWithIdentifier(\"CustomCell\",\n\
    forIndexPath: indexPath) as! CustomCell\n```\n\n这将使你能够访问已连接的输出口：\n\n```\ncell.nameLabel.text\
    \ = tableData[indexPath.row]\n```\n\n#### 设置原型单元格高度\n\n标准表格单元格的标准高度为 44 磅，但你可以灵活地更改此设置，无论是全局更改还是按行更改。但是，如果你更改了原型单元格中的行高，还需要确保在运行时也进行了此设置。你有两个选择：\n\
    \n*   为表中的所有行全局设置行高。\n*   按行设置行高。\n\n要更改原型中的行高，你可以拖动单元格底部的调整大小手柄，或者在 Size Inspector（尺寸检查器）中设置行高值，如图\
    \ 7-14 所示。\n\n![A978-1-4842-1242-4_7_Fig14_HTML.jpg](img/A978-1-4842-1242-4_7_Fig14_HTML.jpg)\n\
    \n图 7-14. 在 Size Inspector 中设置行高\n\n无论使用哪种方法，你都需要在代码中设置行高。你可以通过设置 `tableView`\
    \ 的 `rowHeight` 属性来为表中的所有单元格执行此操作：\n\n```\ntableView.rowHeight = 150.0\n```\n\n\
    或者，你也可以实现 `UITableViewDelegate` 函数：\n\n```\nfunc tableView(tableView: UITableView,\
    \ heightForRowAtIndexPath indexPath:\nNSIndexPath) -> CGFloat {\n    return 150.0\n\
    }\n```\n\n实现 `heightForRowAtIndexPath:` 函数提供了为不同分区或行返回不同高度的灵活性。\n\n#### 设置可变单元格高度\n\
    \n如果你的表格设计涉及不同高度的单元格，那么通过实现 `tableView:estimatedHeightForRowAtIndexPath:` 函数，你可能会改善表格的性能。\n\
    \n表格视图在计算其总高度时会使用此函数。如果你有很多布局复杂的单元格，提前计算高度可能会花费时间。估计行高为表格视图提供了足够的信息来尝试计算总内容高度，但允许将详细计算推迟到绝对必要时才进行。\n\
    \n要实现此功能，你需要做两件事。首先，将 `tableView` 的 `rowHeight` 属性设置为 `UITableViewAutomaticDimension`：\n\
    \n```\ntableView.rowHeight = UITableViewAutomaticDimension\n```\n\n然后，实现 `tableView:estimatedHeightForCellAtIndexPath:`\
    \ 函数：\n\n```\nfunc tableView(tableView: UITableView, estimatedHeightForRowAtIndexPath\n\
    indexPath: NSIndexPath) -> CGFloat {\n    return 80\n}\n```\n\n使用这种方法，你可以在布局原型单元格时利用\
    \ AutoLayout 的强大功能，而无需自己实现计算单元格高度所需的繁重工作。\n\n#### 自定义原型集合视图单元格\n\n自定义原型集合视图单元格的过程与表格视图单元格完全相同，区别在于集合视图单元格没有标准类型。实际上，每个集合视图单元格都是完全自定义的。\n\
    \n与表格视图单元格一样，你有两个选择：布局控件并通过 `tag` 属性访问它们；或者连接到自定义 `UICollectionViewCell` 子类中的输出口。\n"
- fmt: "### Setting the Size of Prototype Collection View Cells\n\nThe size of collection\
    \ view cells is controlled by the collection view’s layout. If you’re using a\
    \ flow layout, you can set either set this in the `UICollectionViewFlowLayout`\
    \ that’s attached to the collection view in the Storyboard, or do so in code.\n\
    \nFigure [7-15](#A978-1-4842-1242-4_7_Chapter.html#Fig15) shows how the item size\
    \ is controlled in the Storyboard.\n\n![A978-1-4842-1242-4_7_Fig15_HTML.jpg](A978-1-4842-1242-4_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15. Setting the item size in the Storyboard\n\nAlternatively, if you’re\
    \ creating a `UICollectionViewFlowLayout` or `UICollectionViewLayout` in code,\
    \ you can set the item size in two ways:\n\n- Globally for all items controlled\
    \ by this layout by setting the `itemSize` property:\n\n`myCustomLayout.itemSize\
    \ = CGSizeMake(100, 175)`\n\n- On an item-by-item basis when calculating the `UICollectionViewLayoutAttributes`.\n\
    \nThis process is covered in detail in [Chapters 15](#A978-1-4842-1242-4_15_Chapter.html)\
    \ and [16](#A978-1-4842-1242-4_16_Chapter.html).\n\n### Creating Custom Cells\
    \ Visually Using Interface Builder\n\nAdding subviews to the cell’s `contentView`\
    \ can quickly lead to a lot of code—and unless you’re good at mentally translating\
    \ between the cell’s layout and the coordinates in the code, that code can be\
    \ difficult to follow.\n\nAn alternative approach is to use the power and flexibility\
    \ of Interface Builder to create a custom cell in a NIB file, and use this to\
    \ create a completely customized cell whenever a new one is required.\n\nI don’t\
    \ subscribe to the school of thought that maintains, “Real developers don’t use\
    \ visual tools.” If you find it quicker and easier to design your custom cells\
    \ with a visual layout tool (and subject to the following caveat), go right ahead.\
    \ What counts, after all, is getting the job done.\n\n#### The Stages of Creating\
    \ Cells Visually\n\nCreating custom cells visually with Interface Builder is a\
    \ multistage process:\n\n1. Create a new XIB file, and lay out the cell using\
    \ Interface Builder.\n2. Give the cell a cell identifier.\n3. Create controls\
    \ inside your new cell.\n4. Assign tags to the controls so they can be accessed\
    \ from the outside world.\n5. Register the XIB file with the table or collection\
    \ view for use with the cell identifier that you created in step 2.\n6. If needed,\
    \ implement the functions needed to handle the size of the cells.\n\nThese six\
    \ steps will give you a custom cell that can be created when required using the\
    \ `tableView:cellForRowAtIndexPath` or `collectionView:cellForItemAtIndexPath:`\
    \ functions.\n\nAfter you have an instance of that custom cell, you can then manipulate\
    \ the controls according to the values of the data in your table’s model.\n\n\
    Laid out like this, it seems like a lot of work. In reality, it’s a very quick\
    \ process to get the housekeeping tasks out of the way so you can get on with\
    \ creating the cell itself.\n\n#### Creating a New XIB File\n\nFirst, you need\
    \ a new XIB file. From the File menu, choose the New File option, or type Command\
    \ + N.\n\nFrom the templates (shown in Figure [7-16](#A978-1-4842-1242-4_7_Chapter.html#Fig16)),\
    \ select the User Interface section in the sidebar, and then the Empty view option.\
    \ Tap Next, and give the XIB file a name.\n\n![A978-1-4842-1242-4_7_Fig16_HTML.jpg](A978-1-4842-1242-4_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16. Creating the new view\n\nThe XIB will initially be empty, so the\
    \ next task is to drag a cell into the main pane. In the `Object Browser`, select\
    \ a `Table` or `Collection View Cell` (Figure [7-17](#A978-1-4842-1242-4_7_Chapter.html#Fig17)).\n\
    \n![A978-1-4842-1242-4_7_Fig17a_HTML.jpg](A978-1-4842-1242-4_7_Fig17a_HTML.jpg)\
    \ ![A978-1-4842-1242-4_7_Fig17b_HTML.jpg](A978-1-4842-1242-4_7_Fig17b_HTML.jpg)\n\
    \nFigure 7-17. Selecting a Table or Collection View Cell\n\nDrag it out into the\
    \ main pane, as shown in Figure [7-18](#A978-1-4842-1242-4_7_Chapter.html#Fig18).\n\
    \n![A978-1-4842-1242-4_7_Fig18a_HTML.jpg](A978-1-4842-1242-4_7_Fig18a_HTML.jpg)\
    \ ![A978-1-4842-1242-4_7_Fig18b_HTML.jpg](A978-1-4842-1242-4_7_Fig18b_HTML.jpg)\n\
    \nFigure 7-18. Adding the cells to Interface Builder\n\nBecause these cells are\
    \ subclasses of `UIView`, you can drag and drop other controls into them in exactly\
    \ the same way as if you were creating a full-screen view. However, before you\
    \ get carried away, there are a couple of housekeeping activities you could get\
    \ out of the way first.\n\n##### Setting Up the Cell’s Identifier\n\nIn previous\
    \ code samples, you saw how `reuseIdentifiers` are used to keep track of dequeued\
    \ cells for reuse. In the code, this is simply an arbitrary `String`. If there’s\
    \ only one type of cell to keep track of, I tend to call this `cellIdentifier`\
    \ simply so its purpose is really obvious.\n\nWhen you’re creating cells in Interface\
    \ Builder, it’s important to associate whatever the reuse identifier is going\
    \ to be with the kind of custom cell that it’s going to refer to.\n\nIf you select\
    \ the `Cell` item in the Objects list, and then open the Attributes Inspector,\
    \ you’ll see an `Identifier` option at the top of the list (see Figure [7-19](#A978-1-4842-1242-4_7_Chapter.html#Fig19)).\n\
    \n![A978-1-4842-1242-4_7_Fig19a_HTML.jpg](A978-1-4842-1242-4_7_Fig19a_HTML.jpg)\
    \ ![A978-1-4842-1242-4_7_Fig19b_HTML.jpg](A978-1-4842-1242-4_7_Fig19b_HTML.jpg)\n\
    \nFigure 7-19. Setting the cell reuse identifier\n\n### Creating the Cell’s Content\n\
    \nFinally, after all that, you’re ready to start laying out the cell’s contents.\
    \ Because the cell is an instance of `UIView`, you can put in a cell pretty much\
    \ anything you can put in a plain ole’ `UIView`, and position it with AutoLayout\
    \ constraints.\n\nYour choice is limited only by your imagination, what the cell\
    \ needs to do, and the controls at your disposal. Figures [7-20](#A978-1-4842-1242-4_7_Chapter.html#Fig20)\
    \ and [7-21](#A978-1-4842-1242-4_7_Chapter.html#Fig21) show a very simple layout\
    \ that will be used in the next steps of this example.\n\n**Tip**: You’re not\
    \ limited to static content such as `UILabels` and `UIViews`. You can also place\
    \ controls such as `UIButtons`, `UISwitches`, and `UISliders` into cells.\n\n\
    ![A978-1-4842-1242-4_7_Fig20_HTML.jpg](A978-1-4842-1242-4_7_Fig20_HTML.jpg)\n\n\
    Figure 7-20. An example custom table cell layout\n\n![A978-1-4842-1242-4_7_Fig21_HTML.jpg](A978-1-4842-1242-4_7_Fig21_HTML.jpg)\n\
    \nFigure 7-21. An example collection view cell layout\n\n#### Assigning Tags to\
    \ Controls\n\nEarlier in the chapter, you were assigning tags to cell content\
    \ by setting each object’s `tag` property in code. That’s not an option when using\
    \ Interface Builder because you need the tag to get a reference to the control.\n\
    \nTag attributes can be set in the View section of the Attributes Inspector (see\
    \ Figure [7-22](#A978-1-4842-1242-4_7_Chapter.html#Fig22)).\n\n![A978-1-4842-1242-4_7_Fig22_HTML.jpg](A978-1-4842-1242-4_7_Fig22_HTML.jpg)\n\
    \nFigure 7-22. The Tag field in the Attributes Inspector\n\nThis has the same\
    \ effect as `myControl.tag = 1050` has in code.\n\n### Registering the Cell\n\n\
    Once you’ve created the cell in a XIB file, you need to inform the table or collection\
    \ view that you want to use it in conjunction with the cell reuse identifier that\
    \ you set up. The function is identical for both table and collection view:\n\n\
    `tableView.registerNib(UINib(nibName: \"MyCustomCell\", bundle: nil), forCellReuseIdentifier:\
    \ \"MyCustomCell\")`\n\n`collectionView.registerNib(UINib(nibName: \"MyCustomCell\"\
    , bundle: nil), forCellReuseIdentifier: \"MyCustomCell\")`\n\nThis must happen\
    \ before your view makes any attempt to dequeue a cell for use. Failure to do\
    \ this will cause a runtime crash. One way of ensuring that this happens is to\
    \ put the registration code in the `viewDidLoad` function of the `viewController`\
    \ that manages the table or collection view:\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    tableView.registerNib(UINib(nibName: \"TableCustomCell\"\
    , bundle: nil), forCellReuseIdentifier: \"MyCustomCell\")\n}\n```"
  raw: '#### Setting the Size of Prototype Collection View Cells


    The size of collection view cells is controlled by the collection view’s layout.
    If you’re using a flow layout, you can set either set this in the `UICollectionViewFlowLayout`
    that’s attached to the collection view in the Storyboard, or do so in code.


    Figure [7-15](#A978-1-4842-1242-4_7_Chapter.html#Fig15) shows how the item size
    is controlled in the Storyboard.


    ![A978-1-4842-1242-4_7_Fig15_HTML.jpg](A978-1-4842-1242-4_7_Fig15_HTML.jpg)


    Figure 7-15.


    Setting the item size in the Storyboard


    Alternatively, if you’re creating a `UICollectionViewFlowLayout` or `UICollectionViewLayout`
    in code, you can set the item size in two ways:


    *   Globally for all items controlled by this layout by setting the `itemSize`
    property:


    `myCustomLayout.itemSize = CGSizeMake(100, 175)`


    *   On an item-by-item basis when calculating the `UICollectionViewLayoutAttributes`.


    This process is covered in detail in [Chapters 15](#A978-1-4842-1242-4_15_Chapter.html)
    and [16](#A978-1-4842-1242-4_16_Chapter.html).


    ## Creating Custom Cells Visually Using Interface Builder


    Adding subviews to the cell’s `contentView` can quickly lead to a lot of code—and
    unless you’re good at mentally translating between the cell’s layout and the coordinates
    in the code, that code can be difficult to follow.


    An alternative approach is to use the power and flexibility of Interface Builder
    to create a custom cell in a NIB file, and use this to create a completely customized
    cell whenever a new one is required.


    I don’t subscribe to the school of thought that maintains, “Real developers don’t
    use visual tools.” If you find it quicker and easier to design your custom cells
    with a visual layout tool (and subject to the following caveat), go right ahead.
    What counts, after all, is getting the job done.


    ### The Stages of Creating Cells Visually


    Creating custom cells visually with Interface Builder is a multistage process:


    Create a new XIB file, and lay out the cell using Interface Builder.   Give the
    cell a cell identifier.   Create controls inside your new cell.   Assign tags
    to the controls so they can be accessed from the outside world.   Register the
    XIB file with the table or collection view for use with the cell identifier that
    you created in step 2.   If needed, implement the functions needed to handle the
    size of the cells.  


    These six steps will give you a custom cell that can be created when required
    using the `tableView:cellForRowAtIndexPath` or `collectionView:cellForItemAtIndexPath:`
    functions.


    After you have an instance of that custom cell, you can then manipulate the controls
    according to the values of the data in your table’s model.


    Laid out like this, it seems like a lot of work. In reality, it’s a very quick
    process to get the housekeeping tasks out of the way so you can get on with creating
    the cell itself.


    ### Creating a New XIB File


    First, you need a new XIB file. From the File menu, choose the New File option,
    or type Command + N.


    From the templates (shown in Figure [7-16](#A978-1-4842-1242-4_7_Chapter.html#Fig16)),
    select the User Interface section in the sidebar, and then the Empty view option.
    Tap Next, and give the XIB file a name.


    ![A978-1-4842-1242-4_7_Fig16_HTML.jpg](A978-1-4842-1242-4_7_Fig16_HTML.jpg)


    Figure 7-16.


    Creating the new view


    The XIB will initially be empty, so the next task is to drag a cell into the main
    pane. In the `Object Browser`, select a `Table` or `Collection View Cell` (Figure
    [7-17](#A978-1-4842-1242-4_7_Chapter.html#Fig17)).


    ![A978-1-4842-1242-4_7_Fig17a_HTML.jpg](A978-1-4842-1242-4_7_Fig17a_HTML.jpg)![A978-1-4842-1242-4_7_Fig17b_HTML.jpg](A978-1-4842-1242-4_7_Fig17b_HTML.jpg)


    Figure 7-17.


    Selecting a Table or Collection View Cell


    Drag it out into the main pane, as shown in Figure [7-18](#A978-1-4842-1242-4_7_Chapter.html#Fig18).


    ![A978-1-4842-1242-4_7_Fig18a_HTML.jpg](A978-1-4842-1242-4_7_Fig18a_HTML.jpg)![A978-1-4842-1242-4_7_Fig18b_HTML.jpg](A978-1-4842-1242-4_7_Fig18b_HTML.jpg)


    Figure 7-18.


    Adding the cells to Interface Builder


    Because these cells are subclasses of `UIView`, you can drag and drop other controls
    into them in exactly the same way as if you were creating a full-screen view.
    However, before you get carried away, there are a couple of housekeeping activities
    you could get out of the way first.


    #### Setting Up the Cell’s Identifier


    In previous code samples, you saw how `reuseIdentifiers` are used to keep track
    of dequeued cells for reuse. In the code, this is simply an arbitrary `String`.
    If there’s only one type of cell to keep track of, I tend to call this `cellIdentifier`
    simply so its purpose is really obvious.


    When you’re creating cells in Interface Builder, it’s important to associate whatever
    the reuse identifier is going to be with the kind of custom cell that it’s going
    to refer to.


    If you select the `Cell` item in the Objects list, and then open the Attributes
    Inspector, you’ll see an `Identifier` option at the top of the list (see Figure
    [7-19](#A978-1-4842-1242-4_7_Chapter.html#Fig19)).


    ![A978-1-4842-1242-4_7_Fig19a_HTML.jpg](A978-1-4842-1242-4_7_Fig19a_HTML.jpg)![A978-1-4842-1242-4_7_Fig19b_HTML.jpg](A978-1-4842-1242-4_7_Fig19b_HTML.jpg)


    Figure 7-19.


    Setting the cell reuse identifier


    ### Creating the Cell’s Content


    Finally, after all that, you’re ready to start laying out the cell’s contents.
    Because the cell is an instance of `UIView`, you can put in a cell pretty much
    anything you can put in a plain ole’ `UIView`, and position it with AutoLayout
    constraints.


    Your choice is limited only by your imagination, what the cell needs to do, and
    the controls at your disposal. Figures [7-20](#A978-1-4842-1242-4_7_Chapter.html#Fig20)
    and [7-21](#A978-1-4842-1242-4_7_Chapter.html#Fig21) show a very simple layout
    that will be used in the next steps of this example.


    Tip


    You’re not limited to static content such as UILabels and UIViews. You can also
    place controls such as UIButtons, UISwitches, and UISliders into cells


    ![A978-1-4842-1242-4_7_Fig20_HTML.jpg](A978-1-4842-1242-4_7_Fig20_HTML.jpg)


    Figure 7-20.


    An example custom table cell layout


    ![A978-1-4842-1242-4_7_Fig21_HTML.jpg](A978-1-4842-1242-4_7_Fig21_HTML.jpg)


    Figure 7-21.


    An example collection view cell layout


    #### Assigning Tags to Controls


    Earlier in the chapter, you were assigning tags to cell content by setting each
    object’s `tag` property in code. That’s not an option when using Interface Builder
    because you need the tag to get a reference to the control.


    Tag attributes can be set in the View section of the Attributes Inspector (see
    Figure [7-22](#A978-1-4842-1242-4_7_Chapter.html#Fig22)).


    ![A978-1-4842-1242-4_7_Fig22_HTML.jpg](A978-1-4842-1242-4_7_Fig22_HTML.jpg)


    Figure 7-22.


    The Tag field in the Attributes Inspector


    This has the same effect as


    `myControl.tag = 1050`


    has in code.


    ### Registering the Cell


    Once you’ve created the cell in a XIB file, you need to inform the table or collection
    view that you want to use it in conjunction with the cell reuse identifier that
    you set up. The function is identical for both table and collection view:


    `tableView.registerNib(UINib(nibName: "MyCustomCell", bundle: nil), ➤`


    `forCellReuseIdentifier: "MyCustomCell")`


    `collectionView.registerNib(UINib(nibName: "MyCustomCell", bundle: nil), ➤`


    `forCellReuseIdentifier: "MyCustomCell")`


    This must happen before your view makes any attempt to dequeue a cell for use.
    Failure to do this will cause a runtime crash. One way of ensuring that this happens
    is to put the registration code in the `viewDidLoad` function of the `viewController`
    that manages the table or collection view:


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `tableView.registerNib(UINib(nibName: "TableCustomCell", bundle: nil), ➤`


      `forCellReuseIdentifier: "MyCustomCell")`


    `}`'
  trans: "好的，遵照您的要求，以下是翻译后的中文文档：\n\n\n### 设置原型集合视图单元格的大小\n\n集合视图单元格的大小由集合视图的布局控制。如果你使用流布局，你可以在\
    \ Storyboard 中附加到集合视图的 `UICollectionViewFlowLayout` 中进行设置，也可以在代码中设置。\n\n图 7-15\
    \ 展示了如何在 Storyboard 中控制项目大小。\n\n![A978-1-4842-1242-4_7_Fig15_HTML.jpg](img/A978-1-4842-1242-4_7_Fig15_HTML.jpg)\n\
    \n图 7-15. 在 Storyboard 中设置项目大小\n\n或者，如果你在代码中创建 `UICollectionViewFlowLayout` 或\
    \ `UICollectionViewLayout`，可以通过两种方式设置项目大小：\n\n-   全局设置：通过设置 `itemSize` 属性，使此布局控制的所有项目生效：\n\
    \n`myCustomLayout.itemSize = CGSizeMake(100, 175)`\n\n-   逐个设置：在计算 `UICollectionViewLayoutAttributes`\
    \ 时，为每个项目单独设置。\n\n此过程在第 15 章和第 16 章中有详细介绍。\n\n### 使用 Interface Builder 可视化创建自定义单元格\n\
    \n向单元格的 `contentView` 中添加子视图很快就会产生大量代码——除非你擅长在脑海中将单元格布局与代码中的坐标进行转换，否则这些代码可能难以理解。\n\
    \n另一种方法是利用 Interface Builder 的强大功能和灵活性，在 NIB 文件中创建自定义单元格，并在需要新单元格时使用它来创建完全自定义的单元格。\n\
    \n我不赞同那种认为“真正的开发者不使用可视化工具”的观点。如果你发现使用可视化布局工具来设计自定义单元格更快捷、更容易（并且注意以下警告），那就尽管去做。毕竟，重要的是完成任务。\n\
    \n#### 可视化创建单元格的阶段\n\n使用 Interface Builder 可视化创建自定义单元格是一个多阶段过程：\n\n1.  创建一个新的\
    \ XIB 文件，并使用 Interface Builder 布局单元格。\n2.  为单元格指定一个单元格标识符。\n3.  在你的新单元格内部创建控件。\n\
    4.  为控件分配标签，以便能够从外部访问它们。\n5.  将 XIB 文件注册到表格或集合视图，以便与你第二步创建的单元格标识符一起使用。\n6.  如果需要，实现处理单元格尺寸所需的功能。\n\
    \n这六个步骤将为你提供一个自定义单元格，可以在需要时使用 `tableView:cellForRowAtIndexPath` 或 `collectionView:cellForItemAtIndexPath:`\
    \ 函数创建。\n\n在你获得该自定义单元格的实例后，你就可以根据表格模型中数据的值来操作这些控件。\n\n罗列出来，看起来工作量很大。但实际上，这是一个非常快速的过程，能够迅速完成这些内务处理任务，以便你可以继续创建单元格本身。\n\
    \n#### 创建新的 XIB 文件\n\n首先，你需要一个新的 XIB 文件。从“文件”菜单中选择“新建文件”选项，或键入 Command + N。\n\n\
    从模板（如图 7-16 所示）中，在侧边栏中选择“用户界面”部分，然后选择“空视图”选项。点击“下一步”，并为 XIB 文件命名。\n\n![A978-1-4842-1242-4_7_Fig16_HTML.jpg](img/A978-1-4842-1242-4_7_Fig16_HTML.jpg)\n\
    \n图 7-16. 创建新视图\n\nXIB 初始为空，因此下一步是将一个单元格拖入主窗格。在“对象浏览器”中，选择一个“表格视图单元格”或“集合视图单元格”（图\
    \ 7-17）。\n\n![A978-1-4842-1242-4_7_Fig17a_HTML.jpg](img/A978-1-4842-1242-4_7_Fig17a_HTML.jpg)\
    \ ![A978-1-4842-1242-4_7_Fig17b_HTML.jpg](img/A978-1-4842-1242-4_7_Fig17b_HTML.jpg)\n\
    \n图 7-17. 选择表格或集合视图单元格\n\n将其拖到主窗格中，如图 7-18 所示。\n\n![A978-1-4842-1242-4_7_Fig18a_HTML.jpg](img/A978-1-4842-1242-4_7_Fig18a_HTML.jpg)\
    \ ![A978-1-4842-1242-4_7_Fig18b_HTML.jpg](img/A978-1-4842-1242-4_7_Fig18b_HTML.jpg)\n\
    \n图 7-18. 向 Interface Builder 中添加单元格\n\n因为这些单元格是 `UIView` 的子类，你可以像创建全屏视图一样，以完全相同的方式将其他控件拖放进去。然而，在你忘乎所以之前，可以先完成一些内务处理活动。\n\
    \n##### 设置单元格的标识符\n\n在之前的代码示例中，你已经看到了如何使用 `reuseIdentifiers` 来跟踪已出队等待重用的单元格。在代码中，这只是一个任意的\
    \ `String`。如果只需要跟踪一种类型的单元格，我倾向于直接将其命名为 `cellIdentifier`，这样它的用途就一目了然了。\n\n当你在 Interface\
    \ Builder 中创建单元格时，将无论什么标识符与你将要引用的那种自定义单元格关联起来，这一点很重要。\n\n如果你在对象列表中选择“Cell”项，然后打开属性检查器，你会在列表顶部看到一个“Identifier”选项（见图\
    \ 7-19）。\n\n![A978-1-4842-1242-4_7_Fig19a_HTML.jpg](img/A978-1-4842-1242-4_7_Fig19a_HTML.jpg)\
    \ ![A978-1-4842-1242-4_7_Fig19b_HTML.jpg](img/A978-1-4842-1242-4_7_Fig19b_HTML.jpg)\n\
    \n图 7-19. 设置单元格重用标识符\n\n### 创建单元格的内容\n\n最后，在上述所有步骤之后，你就可以开始布局单元格的内容了。因为单元格是 `UIView`\
    \ 的一个实例，你可以将几乎任何能放到普通 `UIView` 中的内容放入单元格，并使用 AutoLayout 约束来定位它。\n\n你的选择仅受限于你的想象力、单元格需要完成的功能以及你可用的控件。图\
    \ 7-20 和 7-21 展示了一个将在本例后续步骤中使用的非常简单的布局。\n\n**提示**：你不必局限于静态内容，例如 `UILabels` 和 `UIViews`。你也可以将诸如\
    \ `UIButtons`、`UISwitches` 和 `UISliders` 等控件放入单元格中。\n\n![A978-1-4842-1242-4_7_Fig20_HTML.jpg](img/A978-1-4842-1242-4_7_Fig20_HTML.jpg)\n\
    \n图 7-20. 一个自定义表格单元格布局示例\n\n![A978-1-4842-1242-4_7_Fig21_HTML.jpg](img/A978-1-4842-1242-4_7_Fig21_HTML.jpg)\n\
    \n图 7-21. 一个集合视图单元格布局示例\n\n#### 为控件分配标签\n\n在本章前面部分，你通过代码设置每个对象的 `tag` 属性来为单元格内容分配标签。在使用\
    \ Interface Builder 时，这不是一个选项，因为你需要标签来获得对控件的引用。\n\n标签属性可以在属性检查器的“视图”部分中设置（见图 7-22）。\n\
    \n![A978-1-4842-1242-4_7_Fig22_HTML.jpg](img/A978-1-4842-1242-4_7_Fig22_HTML.jpg)\n\
    \n图 7-22. 属性检查器中的“标签”字段\n\n此操作的效果与在代码中设置 `myControl.tag = 1050` 相同。\n\n### 注册单元格\n\
    \n在 XIB 文件中创建了单元格之后，你需要通知表格或集合视图，你希望将它与你设置的单元格重用标识符一起使用。表格和集合视图的函数完全相同：\n\n`tableView.registerNib(UINib(nibName:\
    \ \"MyCustomCell\", bundle: nil), forCellReuseIdentifier: \"MyCustomCell\")`\n\
    \n`collectionView.registerNib(UINib(nibName: \"MyCustomCell\", bundle: nil), forCellReuseIdentifier:\
    \ \"MyCustomCell\")`\n\n这必须发生在此视图尝试将单元格出队以供使用之前。未能执行此操作将导致运行时崩溃。确保执行此操作的一种方法是将注册代码放在管理表格或集合视图的\
    \ `viewController` 的 `viewDidLoad` 函数中：\n\n```\noverride func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    tableView.registerNib(UINib(nibName: \"TableCustomCell\"\
    , bundle: nil), forCellReuseIdentifier: \"MyCustomCell\")\n}\n```\n"
- fmt: "# Controlling Cell Sizes\n\nThe cell objects that you dragged out into the\
    \ Interface Builder arrived with standard sizes, but it’s unlikely that these\
    \ are going to be right for the interface that you’re designing.\n\n## Collection\
    \ View Cell Sizes\n\nControlling the size of the collection view cell for a given\
    \ index path is the responsibility of the collection view’s `layout` object. These\
    \ are instances of `UICollectionViewLayout`, either as the specialized line-oriented\
    \ subclass `UICollectionViewFlowLayout`, or as a custom layout that you implement\
    \ from scratch.\n\nThe processes involved in this are covered in detail in [Chapter\
    \ 16](#A978-1-4842-1242-4_16_Chapter.html) for flow layouts and [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html)\
    \ for custom layouts.\n\n## Table View Cell Sizes\n\nTable views are slightly\
    \ easier to deal with because you can only control the height of cells; their\
    \ width is controlled by the width of the table view itself. However, cells can\
    \ vary in height, so you will need to tell the table view how to handle this.\n\
    \nThere are two approaches:\n\n- Set a fixed height for the cell, and use AutoLayout\
    \ to arrange the controls inside.\n- Allow the cell height to vary, and implement\
    \ one or both of the two height-related functions of the `UITableViewDelegate`.\n\
    \n### Setting a Fixed Height\n\nIf all cells that will ever be displayed in the\
    \ table view have the same height, then you should fix the cell height to maximize\
    \ the table’s performance. You can do this in one of two ways:\n\n![A978-1-4842-1242-4_7_Fig23_HTML.jpg](A978-1-4842-1242-4_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23. Setting the table’s row height in Interface Builder\n\n- Programmatically,\
    \ by setting the `rowHeight` property for the table view with `tableView.rowHeight\
    \ = 100.0`. This overrides the cell height that you set in Interface Builder.\n\
    - By setting the table view’s `rowHeight` property in the Size Inspector in Interface\
    \ Builder, as shown in Figure [7-23](#A978-1-4842-1242-4_7_Chapter.html#Fig23).\n\
    \n### Setting Variable Row Heights\n\nIf the content of your cells demand it,\
    \ you can display tables with rows of varying heights. However, with great flexibility\
    \ comes great responsibility: varying row height can have a significant impact\
    \ on the performance of your table views.\n\nThe reason for this lies in the fact\
    \ that `UITableView` is a specialized subclass of `UIScrollView`. The frame of\
    \ the scroll view provides a “window” into a (potentially) much larger content\
    \ view, so one of the key setup calculations that you need to implement in order\
    \ to display a scroll view is the overall content size. This is shown in Figure\
    \ [7-24](#A978-1-4842-1242-4_7_Chapter.html#Fig24).\n\n![A978-1-4842-1242-4_7_Fig24_HTML.jpg](A978-1-4842-1242-4_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24. The relationship between `UIScrollView`’s frame and content size\n\
    \nOne way of thinking of `UITableView` is as a `UIScrollView` with a `contentView`\
    \ that has the same width as the frame, but with a height that can vary with the\
    \ number of cells that need to be displayed. This is shown in Figure [7-25](#A978-1-4842-1242-4_7_Chapter.html#Fig25).\n\
    \n![A978-1-4842-1242-4_7_Fig25_HTML.jpg](A978-1-4842-1242-4_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25. The relationship between a table view’s frame and total row height\n\
    \nBefore the table view can be displayed, it will ask the data source for total\
    \ number of rows in the table, then calculate the height for each row in turn\
    \ before adding them all together to get the total height for the table.\n\nIf\
    \ there are a lot of cells in the table, this can take a significant amount of\
    \ time. If the data source is dynamic, this calculation will also need to be rerun\
    \ every time the table’s underlying data changes.\n\nFortunately, `UITableView`\
    \ provides a way of lessening the impact of this. The simplest option, which you\
    \ saw above, is to give all cells the same height, so the calculation is just\
    \ `(number of rows x row height)`.\n\nIf your table will have rows of different\
    \ height, this approach isn’t an option. The other extreme is to implement `UITableViewDelegate`’s\
    \ `heightForRowAtIndexPath:` function to calculate and return the height of the\
    \ row for the given `indexPath`:\n\n```\nfunc tableView(tableView: UITableView,\
    \ heightForRowAtIndexPath ➤\n   indexPath: NSIndexPath) -> CGFloat {\n    // calculate\
    \ height of row here\n    return height\n}\n```\n\nThis works for smaller tables,\
    \ but doesn’t scale particularly well for larger ones because this function will\
    \ be called `n` times, where `n` is the number of cells in the table. If the calculation\
    \ is expensive, the performance of the table view might be sluggish.\n\nThe third\
    \ option attempts to strike a balance between the speed of assuming that all cells\
    \ will have the same height versus assuming that every one must be calculated\
    \ individually.\n\nBy setting an estimated row height, you can think of this as\
    \ being the average across all the cells. The table view can calculate a content\
    \ that’s close enough, but defer the detailed calculation of row height until\
    \ it’s actually needed to display the cell.\n\nThere are two ways of setting an\
    \ estimated row height:\n\n- Setting it globally with the `estimatedRowHeight`\
    \ property: `tableView.estimatedRowHeight = 125.0`\n- Implementing the `UITableViewDatasource`\
    \ `tableview:estimatedHeightForRowAtIndexPath` function:\n\n```\nfunc tableView(tableView:\
    \ UITableView, estimatedHeightForRowAtIndexPath ➤\n   indexPath: NSIndexPath)\
    \ -> CGFloat {\n    return 125.0\n}\n```\n\nThe second option is more flexible,\
    \ in that it can return different estimated row heights for different tables and/or\
    \ sections.\n\n> **Note**: Implementing one of these approaches doesn’t eliminate\
    \ the need to calculate the exact row height before the cell can be displayed.\
    \ You’ll still need to do this in the `cellForRowAtIndexPath:` function, based\
    \ on the actual cell contents retrieved from the data model."
  raw: '### Controlling Cell Sizes


    The cell objects that you dragged out into the Interface Builder arrived with
    standard sizes, but it’s unlikely that these are going to be right for the interface
    that you’re designing.


    #### Collection View Cell Sizes


    Controlling the size of the collection view cell for a given index path is the
    responsibility of the collection view’s `layout` object. These are instances of
    `UICollectionViewLayout`, either as the specialized line-oriented subclass `UICollectionViewFlowLayout`,
    or as a custom layout that you implement from scratch.


    The processes involved in this are covered in detail in [Chapter 16](#A978-1-4842-1242-4_16_Chapter.html)
    for flow layouts and [Chapter 17](#A978-1-4842-1242-4_17_Chapter.html) for custom
    layouts.


    #### Table View Cell Sizes


    Table views are slightly easier to deal with because you can only control the
    height of cells; their width is controlled by the width of the table view itself.
    However, cells can vary in height, so you will need to tell the table view how
    to handle this.


    There are two approaches:


    *   Set a fixed height for the cell, and use AutoLayout to arrange the controls
    inside.

    *   Allow the cell height to vary, and implement one or both of the two height-related
    functions of the `UITableViewDelegate.`


    ##### Setting a Fixed Height


    If all cells that will ever be displayed in the table view have the same height,
    then you should fix the cell height to maximize the table’s performance. You can
    do this in one of two ways:


    ![A978-1-4842-1242-4_7_Fig23_HTML.jpg](A978-1-4842-1242-4_7_Fig23_HTML.jpg)


    Figure 7-23.


    Setting the table’s row height in Interface Builder


    *   Programmatically, by setting the `rowHeight` property for the table view with
    `tableView.rowHeight = 100.0` This overrides the cell height that you set in Interface
    Builder.

    *   By setting the table view’s `rowHeight` property in the Size Inspector in
    Interface Builder, as shown in Figure [7-23](#A978-1-4842-1242-4_7_Chapter.html#Fig23).


    ##### Setting Variable Row Heights


    If the content of your cells demand it, you can display tables with rows of varying
    heights. However, with great flexibility comes great responsibility: varying row
    height can have a significant impact on the performance of your table views.


    The reason for this lies in the fact that `UITableView` is a specialized subclass
    of `UIScrollView`. The frame of the scroll view provides a “window” into a (potentially)
    much larger content view, so one of the key setup calculations that you need to
    implement in order to display a scroll view is the overall content size. This
    is shown in Figure [7-24](#A978-1-4842-1242-4_7_Chapter.html#Fig24).


    ![A978-1-4842-1242-4_7_Fig24_HTML.jpg](A978-1-4842-1242-4_7_Fig24_HTML.jpg)


    Figure 7-24.


    The relationship between UIScrollView’s frame and content size


    One way of thinking of `UITableView` is as a `UIScrollView` with a `contentView`
    that has the same width as the frame, but with a height that can vary with the
    number of cells that need to be displayed. This is shown in Figure [7-25](#A978-1-4842-1242-4_7_Chapter.html#Fig25).


    ![A978-1-4842-1242-4_7_Fig25_HTML.jpg](A978-1-4842-1242-4_7_Fig25_HTML.jpg)


    Figure 7-25.


    The relationship between a table view’s frame and total row height


    Before the table view can be displayed, it will ask the data source for total
    number of rows in the table, then calculate the height for each row in turn before
    adding them all together to get the total height for the table.


    If there are a lot of cells in the table, this can take a significant amount of
    time. If the data source is dynamic, this calculation will also need to be rerun
    every time the table’s underlying data changes.


    Fortunately, `UITableView` provides a way of lessening the impact of this. The
    simplest option, which you saw above, is to give all cells the same height, so
    the calculation is just `(number of rows x row height)`.


    If your table will have rows of different height, this approach isn’t an option.
    The other extreme is to implement `UITableViewDelegate`’s`heightForRowAtIndexPath:`
    function to calculate and return the height of the row for the given `indexPath`:


    `func tableView(tableView: UITableView, heightForRowAtIndexPath ➤`


       `indexPath: NSIndexPath) -> CGFloat {`


        `// calculate height of row here`


        `return height`


    `}`


    This works for smaller tables, but doesn’t scale particularly well for larger
    ones because this function will be called `n` times, where `n` is the number of
    cells in the table. If the calculation is expensive, the performance of the table
    view might be sluggish.


    The third option attempts to strike a balance between the speed of assuming that
    all cells will have the same height versus assuming that every one must be calculated
    individually.


    By setting an estimated row height, you can think of this as being the average
    across all the cells. The table view can calculate a content that’s close enough,
    but defer the detailed calculation of row height until it’s actually needed to
    display the cell.


    There are two ways of setting an estimated row height:


    *   Setting it globally with the `estimatedRowHeight` property: `tableView.estimatedRowHeight
    = 125.0`

    *   Implementing the `UITableViewDatasource tableview:estimatedHeightForRowAtIndexPath`
    function: `func tableView(tableView: UITableView, estimatedHeightForRowAtIndexPath
    ➤` `indexPath: NSIndexPath) -> CGFloat {`     `return 125.0` `}`


    The second option is more flexible, in that it can return different estimated
    row heights for different tables and/or sections.


    Note


    Implementing one of these approaches doesn’t eliminate the need to calculate the
    exact row height before the cell can be displayed. You’ll still need to do this
    in the `cellForRowAtIndexPath:` function, based on the actual cell contents retrieved
    from the data model.'
  trans: "\n# 控制单元格尺寸\n\n当你将单元格对象拖入 Interface Builder 时，它们会带有标准尺寸，但这些尺寸很可能不适合你正在设计的界面。\n\
    \n## 集合视图单元格尺寸\n\n控制指定索引路径的集合视图单元格尺寸是集合视图的 `layout` 对象的职责。这些 `UICollectionViewLayout`\
    \ 的实例，要么是专门的线性方向子类 `UICollectionViewFlowLayout`，要么是你从头实现的自定义布局。\n\n涉及此过程的内容在第\
    \ 16 章（针对流式布局）和第 17 章（针对自定义布局）中有详细说明。\n\n## 表格视图单元格尺寸\n\n表格视图处理起来稍简单一些，因为您只能控制单元格的高度；其宽度由表格视图本身的宽度控制。然而，单元格的高度可能不同，因此您需要告诉表格视图如何处理这种情况。\n\
    \n有两种方法：\n\n-   为单元格设置固定高度，并使用 **AutoLayout** 排列内部控件。\n-   允许单元格高度变化，并实现 `UITableViewDelegate`\
    \ 中一个或两个与高度相关的函数。\n\n### 设置固定高度\n\n如果表格视图中显示的所有单元格都具有相同的高度，那么您应固定单元格高度以最大化表格性能。您可以通过以下两种方式之一实现：\n\
    \n![A978-1-4842-1242-4_7_Fig23_HTML.jpg](img/A978-1-4842-1242-4_7_Fig23_HTML.jpg)\n\
    \n图 7-23. 在 Interface Builder 中设置表格的行高\n\n-   通过编程方式，使用 `tableView.rowHeight =\
    \ 100.0` 为表格视图设置 `rowHeight` 属性。这会覆盖您在 Interface Builder 中设置的单元格高度。\n-   通过 Interface\
    \ Builder 的尺寸检查器中设置表格视图的 `rowHeight` 属性，如图 7-23 所示。\n\n### 设置可变行高\n\n如果单元格的内容需要，您可以显示具有不同行高的表格。然而，灵活性越大，责任也越大：不同的行高可能会对表格视图的性能产生显著影响。\n\
    \n其原因在于 `UITableView` 是 `UIScrollView` 的一个专门子类。滚动视图的框架提供了一个“窗口”来查看（可能）更大的内容视图，因此，为显示滚动视图需要实现的一个关键设置计算是整体内容大小。这一点如图\
    \ 7-24 所示。\n\n![A978-1-4842-1242-4_7_Fig24_HTML.jpg](img/A978-1-4842-1242-4_7_Fig24_HTML.jpg)\n\
    \n图 7-24. `UIScrollView` 的框架与内容大小之间的关系\n\n可以将 `UITableView` 视为一个 `UIScrollView`，其\
    \ `contentView` 宽度与框架相同，但高度随需要显示的单元格数量而变化。这一点如图 7-25 所示。\n\n![A978-1-4842-1242-4_7_Fig25_HTML.jpg](img/A978-1-4842-1242-4_7_Fig25_HTML.jpg)\n\
    \n图 7-25. 表格视图的框架与总行高之间的关系\n\n在表格视图可以显示之前，它会向数据源询问表格的总行数，然后依次计算每行的高度，最后将它们全部相加得到表格的总高度。\n\
    \n如果表格中有大量单元格，这可能会耗费大量时间。如果数据源是动态的，每当表格的底层数据发生变化时，也需要重新运行此计算。\n\n幸运的是，`UITableView`\
    \ 提供了一种减轻此影响的方法。您之前看到的最简单选项是为所有单元格赋予相同的高度，这样计算就只是 `（行数 × 行高）`。\n\n如果您的表格将有不同高度的行，则此方法不可行。另一种极端情况是，实现\
    \ `UITableViewDelegate` 的 `heightForRowAtIndexPath:` 函数，以计算并返回指定 `indexPath` 的行高：\n\
    \n```\nfunc tableView(tableView: UITableView, heightForRowAtIndexPath ➤\n   indexPath:\
    \ NSIndexPath) -> CGFloat {\n    // 在此处计算行的高度\n    return height\n}\n```\n\n这种方法适用于较小的表格，但对于较大的表格扩展性不佳，因为此函数会被调用\
    \ `n` 次，其中 `n` 是表格中的单元格数量。如果计算开销较大，表格视图的性能可能会变慢。\n\n第三种选项试图在假设所有单元格具有相同高度与假设每个单元格都必须单独计算之间取得平衡。\n\
    \n通过设置估计的行高，您可以将其视为所有单元格的平均值。表格视图可以计算出一个大致接近的内容，但将行高的详细计算推迟到实际需要显示单元格时再进行。\n\n\
    设置估计行高有两种方法：\n\n-   使用 `estimatedRowHeight` 属性全局设置：`tableView.estimatedRowHeight\
    \ = 125.0`\n-   实现 `UITableViewDatasource` 的 `tableview:estimatedHeightForRowAtIndexPath`\
    \ 函数：\n\n```\nfunc tableView(tableView: UITableView, estimatedHeightForRowAtIndexPath\
    \ ➤\n   indexPath: NSIndexPath) -> CGFloat {\n    return 125.0\n}\n```\n\n第二种方法更灵活，因为它可以为不同的表格和/或分区返回不同的估计行高。\n\
    \n> **注意**：采用这些方法之一并不能消除在单元格显示前计算精确行高的需求。您仍然需要在 `cellForRowAtIndexPath:` 函数中，根据从数据模型检索到的实际单元格内容进行该计算。\n"
- fmt: '# Handling Cell Resizing in Tables


    In [Chapter 12](#A978-1-4842-1242-4_12_Chapter.html), you will look at the various
    changes that take place when selecting and editing table content—and will spend
    a lot of time looking at the controls that are added to the cell when the table
    goes into editing mode.


    This begs the question: how should a customized cell react to changes in shape,
    either because of the table entering editing mode, or because the entire device
    has been rotated?


    There are two kinds of events that can cause cell resizing:


    - Putting a table into editing mode, which causes the editing and/or reordering
    controls to be displayed.

    - Rotating the device so that the size class changes.


    Both types of events will cause the cells to resize—in the first instance because
    the cell needs to display more “furniture,” and in the second because the cell
    has to adapt to a new table width.


    As you saw earlier, the table goes into editing mode when the `setEditing:animated`
    function is called. At this point, if the cell is editable (and/or the row can
    be rearranged), the additional cell controls are inserted.


    Figure [7-26](#A978-1-4842-1242-4_7_Chapter.html#Fig26) shows how a table changes.


    ![A978-1-4842-1242-4_7_Fig26_HTML.jpg](A978-1-4842-1242-4_7_Fig26_HTML.jpg)


    Figure 7-26. Changing from normal to editing mode


    The deletion or insertion control appears at the left end of the cell, and the
    rearrangement control (if applicable) appears at the right. This means that the
    content of the cell has to move right to accommodate the deletion or insertion
    control, and potentially shrink to accommodate the rearrangement control.


    When the deletion/insertion controls appear, the row appears to move right, with
    the accessory view moving off-screen if applicable. In both situations, the cells’
    `contentViews` will automatically alter the width value of their `frames`.


    The good news is that AutoLayout will take care of rearranging the cell contents
    for you.


    Figures [7-27](#A978-1-4842-1242-4_7_Chapter.html#Fig27) through [7-29](#A978-1-4842-1242-4_7_Chapter.html#Fig29)
    show the AutoLayout constraints in use in this example.


    ![A978-1-4842-1242-4_7_Fig29_HTML.jpg](A978-1-4842-1242-4_7_Fig29_HTML.jpg)


    Figure 7-29. Cells adapting to rotation


    ![A978-1-4842-1242-4_7_Fig28_HTML.jpg](A978-1-4842-1242-4_7_Fig28_HTML.jpg)


    Figure 7-28. The cell in “edit” and “rearrange” modes


    ![A978-1-4842-1242-4_7_Fig27_HTML.jpg](A978-1-4842-1242-4_7_Fig27_HTML.jpg)


    Figure 7-27. The AutoLayout constraints in the cell


    ## Summary


    This chapter covered three of the four main ways of creating and configuring custom
    `tableView` cells:


    - Adding subviews to the cell’s `contentView`, and configuring them in the `cellForRowAtIndexPath`
    dataSource function

    - Creating prototype cells in a Storyboard

    - Designing a cell from scratch by using Interface Builder and configuring the
    custom controls in code when the cell is loaded from its NIB file


    The fourth approach—which is the most flexible, but also the one that requires
    the most work to set up—is to create a custom subclass for each type of cell that
    your `tableView` requires. This is covered in [Chapter 8](#A978-1-4842-1242-4_8_Chapter.html).


    # 8. Creating Custom Cells with Subclasses


    In [Chapter 7](#A978-1-4842-1242-4_7_Chapter.html), you looked at two of the three
    main ways of creating and configuring custom table view and collection view cells:


    - Adding subviews to the cell’s built-in `contentView`

    - Creating a custom cell from scratch and instantiating it from a XIB file


    The third approach, which provides the greatest flexibility, albeit at the cost
    of slightly more complexity, is to create a custom subclass of `UITableViewCell`
    or `UICollectionViewCell`.


    The main reasons for using this approach are that you need multiple types of cells
    in the same table or collection view, or in the case of table views, you want
    a level of control over the contents that is awkward to achieve by adding subviews.


    In this chapter, you will look at the different ways of creating custom cells
    with `UITableViewCell` and `UICollectionView` subclasses:


    - How to subclass `UITableViewCell` and `UICollectionViewCell`

    - Using subclasses with XIB files

    - Handling selection in cell subclasses

    - Customizing the cell by overriding `layoutSubviews`

    - Creating cells with a custom `contentView`

    - Improving your app’s architecture with the Model-View-View Model pattern.


    ## Why Create a Custom Cell Subclass?


    Creating a custom cell through the approach of using a custom subclass gives you
    complete flexibility over the layout. You’re starting with a blank canvas (or
    blank view, at least), so how the cell looks is entirely up to you.


    The trade-off is that this function is slightly more complex. For a start, you
    have to create a custom subclass of either `UITableViewCell` or `UICollectionView`.
    However, don’t let that put you off; my experience is that it’s all too easy to
    spend significant amounts of time trying to get the desired results using one
    of the “lighter” functions, when in fact it would have been quicker to reach straight
    for a custom subclass.


    Creating custom subclasses also enables the creation of multiple types of cells
    in the same table. This can give your visual design a much greater degree of freedom
    than if you had to shoehorn dissimilar data into a single cell type.


    As you’d expect, there are two approaches you can use: the “visual” approach,
    involving creating a custom cell in Interface Builder, and the “code” approach,
    which creates and configures the cell entirely in code.


    Both processes, though, have a couple of common steps at the outset.'
