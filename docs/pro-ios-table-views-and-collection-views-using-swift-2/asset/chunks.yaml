    ## Collection Views and Animations


    So far, the collection view layouts that you’ve built have relied on the in-built
    classes to handle placement when inserting and deleting items. This saves a lot
    of time and effort, and it’s fine if you’re happy with the basic effects. But
    if you need more control over the way items are added and removed, you can exploit
    custom `UICollectionViewLayouts` to give you complete control.


    To illustrate this, you’re going to build a collection view that


    *   Arranges the items in a completely non-linear way; which means you will be
    responsible for calculating their placements

    *   Inserts and removes items with animated transitions that you determine


    The end result will look like Figure [17-4](#A978-1-4842-1242-4_17_Chapter.html#Fig4).
    Cells are arranged in an even-spaced circle; they’re inserted by flying out from
    the center to their place in the ring (while the existing cells shuffle up to
    make space). They’ll be removed in the opposite direction: flying into the center,
    while the remaining cells space themselves out.


    ![A978-1-4842-1242-4_17_Fig4_HTML.jpg](A978-1-4842-1242-4_17_Fig4_HTML.jpg)


    Figure 17-4.


    The custom layout in action


    To achieve this, you’ll implement a custom `UICollectionViewLayout`. This isn’t
    the first time you’ve done this, but in this example, you’ll take things one step
    further by calculating both the initial and final layout attributes for an item.
    The collection view will then handle smoothly animating the change between the
    initial and final positions.


    ### The Process


    In order to have the collection view animate the insertion and deletion of items,
    you need to provide three sets of attributes for each item:


    *   The initial layout attributes, which the collection view uses to place the
    item in the collection view when it first appears. In your example, this will
    be the center of the circle.

    *   The layout attributes that determine the “final” home for the item. In this
    example, each item will be at a point on a circle, with the spacing between each
    item determined by the number of items in total.

    *   The final layout attributes, which the collection view uses as the final place
    for the item before it’s removed. In this example, items will appear to fly back
    to the center of the circle, fading and getting smaller as they go.


    The other processes involved in setting up the custom layout are the same as you’ve
    seen before, but you’ll work through them in detail.


    ### Prerequisites


    To begin with, you’re going to need a collection view, so to save some setup time,
    I’ve created a stub project. It contains a single view controller that acts as
    the data source and delegate for the collection view. The Storyboard contains
    a full-screen collection view and two buttons to add and remove items.


    The collection view’s data source is an `Array` of `Strings`, and the cells are
    very basic 75pt x 75pt `UICollectionViewCells` that display the `String` from
    the relevant row. Finally, there’s a basic `UICollectionFlowLayout` that results
    in an app that looks like Figure [17-5](#A978-1-4842-1242-4_17_Chapter.html#Fig5).


    ![A978-1-4842-1242-4_17_Fig5_HTML.jpg](A978-1-4842-1242-4_17_Fig5_HTML.jpg)


    Figure 17-5.


    The initial app


    As you can see, it’s going to need a bit of work.


    ### Creating the Custom Layout


    The first thing you need is a custom layout. This will be a subclass of `UICollectionViewLayout`,
    so create a new one with File ➤ New ➤ File, selecting the `Cocoa Touch` item from
    the `Source` section, and then creating a subclass of `UICollectionViewLayout`
    called `BounceLayout`.


    This creates a depressingly empty class, shown in Listing [17-2](#A978-1-4842-1242-4_17_Chapter.html#FPar3).


    Listing 17-2. The Initial BounceLayout


    `import UIKit`


    `class BounceLayout: UICollectionViewLayout {`


    `}`


    There are three sets of functions you need to implement:


    *   Housekeeping functions that that handle preparing the layout

    *   Attributes functions, responsible for creating and vending the layout attributes
    for each item to the collection view

    *   Custom functions, which are unique to your layout and will handle the calculations
    required by the attributes functions


    You’ll start with the basic housekeeping functions.'
  trans: "\n#### 处理手势\n\n目前你还未实现手势识别器拦截手势时的处理函数，因此请将代码清单 17-1 中的函数添加到`SpaceViewController`中。\n\
    \n代码清单 17-1. `didGetPinchGesture:` 函数\n\n```\nfunc didGetPinchGesture(sender:\
    \ UIPinchGestureRecognizer) {\n    guard sender.numberOfTouches() == 2 else {\n\
    \        return\n    }\n\n    let pointOne = sender.locationOfTouch(0, inView:\
    \ collectionView)\n    let pointTwo = sender.locationOfTouch(1, inView: collectionView)\n\
    \    let dX = pointOne.x - pointTwo.x\n    let dY = pointTwo.y - pointTwo.y\n\
    \    let distance = sqrt(dX * dX + dY * dY)\n    let layout = collectionView.collectionViewLayout\
    \ as! UICollectionViewFlowLayout\n    layout.minimumLineSpacing = distance / 5\n\
    \    layout.minimumInteritemSpacing = distance / 5\n    layout.invalidateLayout()\n\
    }\n```\n\n首先需要确保你响应的是正确的手势。`UIGestureRecognizers` 拥有一个 `numberOfTouches` 属性，其中包含手势识别器检测到的触点数量。对于单指点击，该值为\
    \ `1`。如果屏幕上有五根手指，则 `numberOfTouches` 为 `5`。\n\n在本例中，你只对双指捏合手势感兴趣，因此可以拒绝任何 `numberOfTouches`\
    \ 属性不等于 `2` 的手势：\n\n```\nguard sender.numberOfTouches() == 2 else {\n    return\n\
    }\n```\n\n假设确实只有两个触点，现在就可以开始用它们来控制集合视图的布局了。\n\n首先，获取两个触点相对于 `collectionView` 的坐标：\n\
    \n```\nlet pointOne = sender.locationOfTouch(0, inView: collectionView)\nlet pointTwo\
    \ = sender.locationOfTouch(1, inView: collectionView)\n```\n\n**提示**：触点的编号指的是手势识别器检测到触点的顺序，而非具体是哪根手指在触摸！\n\
    \n每个触点都有 x 和 y 坐标，因此可以用它们来计算两个触点之间的差值。这需要一些三角学知识，如图 17-2 所示。\n\n![A978-1-4842-1242-4_17_Fig2_HTML.jpg](img/A978-1-4842-1242-4_17_Fig2_HTML.jpg)\n\
    \n图 17-2. 计算触点之间的距离\n\n在代码中，这一计算表示为：\n\n```\nlet distance = sqrt((dX * dX) + (dY\
    \ * dY))\n```\n\n完成计算后，获取流式布局的引用：\n\n```\nlet layout = collectionView.collectionViewLayout\
    \ as! UICollectionViewFlowLayout\n```\n\n然后用距离值更新与间距相关的属性：\n\n```\nlayout.minimumLineSpacing\
    \ = distance / 5\nlayout.minimumInteritemSpacing = distance / 5\n```\n\n由于触摸距离是相对于集合视图尺寸的，因此需要适当缩小比例，以免间距过大。\n\
    \n最后，强制布局进行自我更新：\n\n```\nlayout.invalidateLayout()\n```\n\n在纸上很难复现这一效果，但随着触点间距的增加，单元格之间的间距也会增大，如图\
    \ 17-3 所示。\n\n![A978-1-4842-1242-4_17_Fig3_HTML.jpg](img/A978-1-4842-1242-4_17_Fig3_HTML.jpg)\n\
    \n图 17-3. 单元格间距增大\n\n## 集合视图与动画\n\n到目前为止，你构建的集合视图布局都依赖内置类来处理插入和删除项目时的位置安排。这节省了大量时间和精力，如果你对基本效果满意，则无需改动。但如果你需要对项目的添加和移除方式进行更精细的控制，可以利用自定义的\
    \ `UICollectionViewLayouts` 来获得完全控制权。\n\n为了说明这一点，你将构建一个集合视图，其功能如下：\n- 以完全非线性的方式排列项目；这意味着你将负责计算它们的位置\n\
    - 使用由你决定的动画过渡效果来插入和移除项目\n\n最终结果将如图 17-4 所示。单元格均匀排列在一个圆形上；它们通过从中心飞出到环形上的位置来插入（同时现有单元格会移动以腾出空间）。移除方向则相反：飞回中心，同时剩余单元格会重新均匀分布。\n\
    \n![A978-1-4842-1242-4_17_Fig4_HTML.jpg](img/A978-1-4842-1242-4_17_Fig4_HTML.jpg)\n\
    \n图 17-4. 自定义布局的实际效果\n\n为了实现这一效果，你将实现一个自定义的 `UICollectionViewLayout`。这并非你第一次这样做，但在本例中，你将更进一步，为每个项目计算初始和最终布局属性。集合视图随后会平滑地动画呈现初始位置与最终位置之间的变化。\n\
    \n### 过程\n\n为了让集合视图对项目的插入和删除进行动画处理，你需要为每个项目提供三组属性：\n- 初始布局属性：集合视图在项目首次出现时用于放置项目。在本例中，该位置为圆心。\n\
    - 布局属性：决定项目的“最终”归属位置。在本例中，每个项目位于圆上的一点，项目之间的间距由项目总数决定。\n- 最终布局属性：集合视图在项目移除前将其作为最终位置。在本例中，项目会看似飞回圆心，并在过程中逐渐淡出和缩小。\n\
    \n设置自定义布局所涉及的其他过程与你之前看到的相同，但这里将详细讲解。\n\n### 前提条件\n\n首先，你需要一个集合视图。为节省设置时间，我已创建了一个基础项目。其中包含一个作为集合视图数据源和委托的单一视图控制器。Storyboard\
    \ 中包含一个全屏集合视图以及两个用于添加和移除项目的按钮。\n\n集合视图的数据源是一个 `Strings` 类型的 `Array`，单元格是非常基础的\
    \ 75pt x 75pt 的 `UICollectionViewCells`，用于显示对应行中的 `String`。最后，还有一个基本的 `UICollectionFlowLayout`，生成的应用程序如图\
    \ 17-5 所示。\n\n![A978-1-4842-1242-4_17_Fig5_HTML.jpg](img/A978-1-4842-1242-4_17_Fig5_HTML.jpg)\n\
    \n图 17-5. 初始应用\n\n如你所见，这还需要进一步处理。\n\n### 创建自定义布局\n\n首先需要创建一个自定义布局。它将作为 `UICollectionViewLayout`\
    \ 的子类，因此请通过 **File** ➤ **New** ➤ **File** 创建一个新文件，从 `Source` 部分选择 `Cocoa Touch`\
    \ 项，然后创建一个名为 `BounceLayout` 的 `UICollectionViewLayout` 子类。\n\n这将生成一个空荡荡的类，如代码清单\
    \ 17-2 所示。\n\n代码清单 17-2. 初始的 `BounceLayout`\n\n```\nimport UIKit\n\nclass BounceLayout:\
    \ UICollectionViewLayout {\n\n}\n```\n\n你需要实现三组函数：\n- 处理布局准备工作的管理函数\n- 属性函数：负责为集合视图创建和提供每个项目的布局属性\n\
    - 自定义函数：是布局所特有的，用于处理属性函数所需的计算\n\n我们从基本的管理函数开始。\n"
- fmt: "#### Housekeeping Functions\n\nThe first housekeeping function that you need\
    \ is to return the collection view’s `contentSize` to the collection view.\n\n\
    In this case, it’s quite simple. You’re going to use a `contentSize` that’s the\
    \ same as the collection view itself, so there will be no scrolling involved.\
    \ Add the function in Listing 17-3.\n\n**Listing 17-3.** The `collectionViewContentSize`\
    \ Function\n\n```\noverride func collectionViewContentSize() -> CGSize {\n   \
    \ super.collectionViewContentSize()\n    return collectionView!.frame.size\n}\n\
    ```\n\nThis is very straightforward. After calling the superclass function, you\
    \ return the size of the `collectionView`’s frame.\n\nNext, you need `prepareLayout()`.\
    \ This is called at the start of each layout pass and is an opportunity to carry\
    \ out any “bulk” operations that affect all items. There are several things you\
    \ need to do:\n\n* Add some properties to the layout class to hold the calculated\
    \ attributes, and some values for dimensions.\n* Remove all the existing layout\
    \ attributes (adding or removing an item will cause all the other items to move,\
    \ so all existing attributes will become invalid).\n* Do some up-front calculations\
    \ about the overall dimensions of the layout.\n* Calculate the attributes for\
    \ each item in turn.\n\nFirst, add the properties shown in Listing 17-4.\n\n**Listing\
    \ 17-4.** The `BounceLayout`’s Properties\n\n```\nvar layoutAttributes = [UICollectionViewLayoutAttributes]()\n\
    var cvCenterPoint: CGPoint!\nvar itemSize: CGSize!\nvar sidePadding: CGFloat!\n\
    ```\n\nThe layout attributes will be stored in an `Array` of `UICollectionViewLayoutAttributes`.\
    \ There are some dimension-related properties that you’ll need: the center point\
    \ of the collection view, the size of each item, the padding between the edges\
    \ of the item, and the edge of the collection view.\n\nNext, you need the `prepareLayout()`\
    \ function. This is called at the start of the layout process, after the layout\
    \ has been invalidated. It’s both an opportunity to configure layout-wide values\
    \ and the point where you can trigger the calculation of all the attributes required.\n\
    \nAdd the function shown in Listing 17-5.\n\n**Listing 17-5.** The `prepareLayout()`\
    \ Function\n\n```\noverride func prepareLayout() {\n    super.prepareLayout()\n\
    \    layoutAttributes.removeAll()\n    // Figure out where the centre of the collection\
    \ view is\n    cvCenterPoint = CGPointMake(collectionView!.frame.size.width /\
    \ 2, \n    collectionView!.frame.size.height / 2);\n    // Figure out the number\
    \ of items that we’re dealing with\n    // Here, we assume that there is only\
    \ one section in the collection view\n    let numberOfItems = collectionView!.numberOfItemsInSection(0)\n\
    \    calculateAllAttributes(numberOfItems)\n}\n```\n\nWalking through this, you\
    \ first call the superclass function. Then you remove all the existing layout\
    \ attributes; inserting or removing an item will cause all the other items to\
    \ move, so all attributes become invalid.\n\nThe center point of the circle will\
    \ be important, as it’s both the origin of the calculation for the position attributes\
    \ for each item and also the starting point of the insertion calculation.\n\n\
    `cvCenterPoint = calculateCenterForFirstItem()`\n\nThis will be needed in several\
    \ places later, so to reduce code duplication, add the function in Listing 17-6.\n\
    \n**Listing 17-6.** Calculating the Center Point of the Collection View\n\n```\n\
    func calculateCenterForFirstItem() -> CGPoint {\n    return CGPointMake(collectionView!.frame.size.width\
    \ / 2, \n  collectionView!.frame.size.height / 2);\n}\n```\n\nYou also need the\
    \ number of items that you’re dealing with to calculate the spacing.\n\n`let numberOfItems\
    \ = collectionView!.numberOfItemsInSection(0)`\n\nFinally, you call the as-yet\
    \ unimplemented `calculateAllAttributes(_:)` function for the given number of\
    \ items.\n\n#### Calculating Attributes\n\nThis is where the real work starts.\
    \ Add the function shown in Listing 17-7.\n\n**Listing 17-7.** The `calculateAllAttributes`\
    \ Function\n\n```\nfunc calculateAllAttributes(numberOfItems: Int) {\n    // Create\
    \ the attributes for each item in turn\n    for index in 0..<numberOfItems {\n\
    \        // Construct the index path for the item we’re dealing with\n       \
    \ let itemIndexPath = NSIndexPath(forItem: index, inSection: 0)\n        // Create\
    \ a UICollectionViewLayoutAttributes item for this indexPath\n        let attributes\
    \ = UICollectionViewLayoutAttributes(forCellWithIndexPath: \n      itemIndexPath)\n\
    \        // Calculate where the centre of the item should be\n        let center\
    \ = calculateCenterForItemAtIndexPath(itemIndexPath)\n        attributes.center\
    \ = center\n        // Set the item’s size\n        attributes.size = itemSize\n\
    \        // Set the Z-index so they \"stack\" on top of each other\n        attributes.zIndex\
    \ = index + 1\n        // Add our new set of attributes into the array\n     \
    \   layoutAttributes.append(attributes)\n    }\n}\n```\n\nThis takes one `Int`\
    \ parameter, the number of items in the collection view. It then repeats, in order\
    \ to calculate the attributes for each item.\n\nFirst, you create an `NSIndexPath`\
    \ for the item:\n\n`let itemIndexPath = NSIndexPath(forItem: index, inSection:\
    \ 0)`\n\nNext, you use this `indexPath` to create an instance of `UICollectionViewLayoutAttributes`:\n\
    \n`let attributes = UICollectionViewLayoutAttributes(forCellWithIndexPath: itemIndexPath)`\n\
    \nFor this item, you now calculate where the center point should be, with the\
    \ aid of a helper function that you’ll implement in a moment:\n\n`let center =\
    \ calculateCenterForItemAtIndexPath(itemIndexPath)`\n\n`attributes.center = center`\n\
    \nYou set the item size. This is the same for all items:\n\n`attributes.size =\
    \ itemSize`\n\nThe `Z-index` of each item increases so that when they overlap,\
    \ they’ll appear to stack:\n\n`attributes.zIndex = index + 1`\n\nWith all the\
    \ necessary attributes calculated, you can add them to the array:\n\n`layoutAttributes.append(attributes)`\n\
    \nNow let’s add the function to calculate the center point of the item."
