    You can also return an `indexPath` other than the value that was passed in if
    you wanted to select another row, rather than the one that was tapped. I haven’t
    been able to think of any situation where you’d actually want to do that, but
    it’s there if you need it.


    ### Visualizing Selection


    Visualizing the selection provides feedback to your user that their actions have
    been registered by the app. It can also provide a cue that something is about
    to happen or is taking place.


    When the user taps a table row, the standard behavior turns the row’s background
    light grey and the `textLabel` black, as shown in Figure [12-3](#A978-1-4842-1242-4_12_Chapter.html#Fig3).


    ![A978-1-4842-1242-4_12_Fig3_HTML.jpg](A978-1-4842-1242-4_12_Fig3_HTML.jpg)


    Figure 12-3.


    The default row selection style


    You may also want to disable the selection highlight completely if it will interfere
    with any custom selection behavior that you implement.


    Somewhat counter-intuitively, setting the `selectionStyle` to `None` does not
    prevent cell selection, so all the selection-related functions will fire. It just
    doesn’t provide any feedback to the user.


    All styles are set by the cell’s `selectionStyle` property. In most scenarios,
    you’d set this in the `tableView:cellForRowAtIndexPath:` function, for example:


    `cell.selectionStyle = UITableViewCellSelectionStyle.None`


    Alternatively, you can set the `Selection` property to `None` in Interface Builder.


    #### Customizing Selection


    You’re not restricted to the standard white-on-blue or white-on-gray selection
    highlight styles. If you’ve customized the `tableView` cells, this highlighting
    style probably won’t be appropriate anyway.


    By adding custom code, you can manipulate your cells as you see fit. You could
    do this as cells are dequeued by using the `tableView:didSelectRowAtIndexPath:`
    function, or you can manage this in a `UITableViewCell` subclass.


    Figure [12-4](#A978-1-4842-1242-4_12_Chapter.html#Fig4) shows an example from
    one of my apps.


    ![A978-1-4842-1242-4_12_Fig4_HTML.jpg](A978-1-4842-1242-4_12_Fig4_HTML.jpg)


    Figure 12-4.


    A custom cell in normal and highlighted state


    The cell background and outlines are `UIViews`, so it’s possible to manipulate
    their `backgroundColor` properties. They’re set to orange in the cell’s XIB file,
    and then switched to blue in the `tableView:didSelectRowAtIndexPath:` function:


    `// Set cell highlight`


    `let blueColor = UIColor(colorWithRed:0.08 green:0.4 blue:0.58 alpha:1.0)`


    `cell.codeBackgroundView.backgroundColor = blueColor;`


    `cell.frameTopView.backgroundColor = blueColor;`


    `cell.frameBottomView.backgroundColor = blueColor;`


    `cell.titleLabel.textColor = blueColor;`


    Tip


    One of the limitations of Interface Builder is that there’s no line tool (or shape
    tools of any description, for that matter). This makes drawing lines awkward.
    One option is to include line graphics as `UIImageViews`, but that’s quite expensive
    in rendering terms.


    Another option is to place `UIViews` where the lines are required, and set the
    width (or height) to a very small value—say, 1 or 2 points. You can use the `UIView`’s
    `backgroundColor` property to set the color of your “line.” You’re restricted
    to solid lines of a single color, but it’s often a quicker process than creating
    line graphics in another package and importing them as images.'
  trans: "\n# 理解表格选择功能的工作原理\n\n表格视图中的选择管理由`UITableViewDelegate`对象负责。如果表格视图没有设置`delegate`对象，选择事件将被忽略。\n\
    \n以下是协同实现选择功能的四个`UITableViewDelegate`函数：\n\n- `tableView:willSelectRowAtIndexPath:`：当用户触摸并抬起手指（即执行了`TouchUpInside`操作）后，但在`tableView:didSelectRowAtIndexPath:`函数被调用前，会调用此函数。默认情况下该函数未被实现。实现它并返回`nil`将阻止行选择发生。如果你返回指向另一行的`indexPath`，则该行会被选中，而非被点击的那一行。\n\
    - `tableView:didSelectRowAtIndexPath:`：假设`tableView:willSelectRowAtIndexPath:`函数没有返回`nil`，你可以在此处实现自定义行为。该行为可以是展示性的（例如显示勾选标记），也可以触发某种导航操作（例如`pushNavigationController`动作）。\n\
    - `tableView:willDeselectRowAtIndexPath:`：仅当存在已有选中的行时才会调用此函数。它返回应取消选中的行的`indexPath`——因此提供了让你选择另一行而非当前选中行进行取消的机会。尽管我尽力尝试，但从未遇到过真正需要这个功能的情景，不过具体情况可能因人而异。如果从此函数返回`nil`，则该行将不会被取消选中，这实际上意味着你可以根据需要“锁定”选择状态。\n\
    - `tableView:didDeselectRowAtIndexPath:`：此函数通知代理该行已被取消选中。在这里你应撤销之前创建的任何自定义选择特性。例如，如果你有一个通过将`textLabel`变为绿色来显示选择状态的自定义单元格，那么就应该使用`tableView:didDeselectRowAtIndexPath:`函数将其改回正常颜色。\n\
    \n> **提示**\n>\n> 如果单元格选择看起来滞后于用户输入，你可能无意中实现了`tableView:willDeselectRowAtIndexPath:`而不是`tableView:didSelectRowAtIndexPath:`。Xcode\
    \ 的自动补全功能很容易让人犯错，而且一旦错误的函数被添加到代码中，就很难发现问题的来源。\n\n## 管理特定行的选择\n\n除了在全局`tableView`级别启用或禁用选择外，你可能还需要在行级别控制选择。例如，在本章后面，你将构建一个表格，允许通过点击“添加新行”来插入额外的行。\n\
    \n根据数据模型的需求，你可能需要禁用此功能。\n\n通过检查`tableView:willSelectRowAtIndexPath:`函数中正在被选择的行，你可以添加条件代码来允许某些行的选择同时阻止其他行的选择。这如代码清单\
    \ 12-1 所示。\n\n**代码清单 12-1.** 在`tableView:willSelectRowAtIndexPath:`中检查行选择\n\n\
    ```\nfunc tableView(tableView: UITableView, willSelectRowAtIndexPath\nindexPath:\
    \ NSIndexPath)  -> NSIndexPath? {\n    let rowNotToSelect = 3\n    if indexPath.row\
    \ == rowNotToSelect {\n        return nil\n    }\n    return indexPath\n}\n```\n\
    \n这段代码任意地阻止了第 3 行的选择，如果检查的是第 3 行则返回`nil`。\n\n你也可以返回一个与传入值不同的`indexPath`，以便选择另一行而非被点击的那一行。我暂时想不出任何实际需要这样做的场景，但如果你需要，它就在那里。\n\
    \n## 可视化选择\n\n可视化选择可以向用户提供反馈，表明他们的操作已被应用记录。它还可以提示即将发生或正在发生的事情。\n\n当用户点击表格行时，默认行为会将行的背景变为浅灰色，并将`textLabel`变为黑色，如图\
    \ 12-3 所示。\n\n![A978-1-4842-1242-4_12_Fig3_HTML.jpg](img/A978-1-4842-1242-4_12_Fig3_HTML.jpg)\n\
    \n**图 12-3.** 默认的行选择样式\n\n如果选择高亮会干扰你实现的任何自定义选择行为，你可能还需要完全禁用选择高亮。\n\n有点反直觉的是，将`selectionStyle`设置为`None`并不会阻止单元格选择，所有与选择相关的函数仍然会触发。只是不会向用户提供任何反馈。\n\
    \n所有样式都由单元格的`selectionStyle`属性设置。在大多数情况下，你会在`tableView:cellForRowAtIndexPath:`函数中设置它，例如：\n\
    \n```\ncell.selectionStyle = UITableViewCellSelectionStyle.None\n```\n\n或者，你也可以在\
    \ Interface Builder 中将`Selection`属性设置为`None`。\n\n### 自定义选择\n\n你不必局限于标准的白底蓝字或白底灰字选择高亮样式。如果你已自定义了`tableView`单元格，这种高亮样式可能本来就不太适用。\n\
    \n通过添加自定义代码，你可以按自己的需求操作单元格。你可以在单元格出列时使用`tableView:didSelectRowAtIndexPath:`函数来实现，也可以在`UITableViewCell`子类中进行管理。\n\
    \n图 12-4 展示了我某个应用中的示例。\n\n![A978-1-4842-1242-4_12_Fig4_HTML.jpg](img/A978-1-4842-1242-4_12_Fig4_HTML.jpg)\n\
    \n**图 12-4.** 处于正常和高亮状态的自定义单元格\n\n单元格的背景和轮廓都是`UIViews`，因此可以操作它们的`backgroundColor`属性。它们在单元格的\
    \ XIB 文件中被设置为橙色，然后在`tableView:didSelectRowAtIndexPath:`函数中被切换为蓝色：\n\n```\n// 设置单元格高亮\n\
    let blueColor = UIColor(colorWithRed:0.08 green:0.4 blue:0.58 alpha:1.0)\ncell.codeBackgroundView.backgroundColor\
    \ = blueColor;\ncell.frameTopView.backgroundColor = blueColor;\ncell.frameBottomView.backgroundColor\
    \ = blueColor;\ncell.titleLabel.textColor = blueColor;\n```\n\n> **提示**\n>\n>\
    \ Interface Builder 的局限性之一是没有线条工具（或者说没有任何形状工具）。这使得绘制线条变得棘手。一种选择是将线条图形作为`UIImageViews`包含进来，但这在渲染方面代价相当高。\n\
    >\n> 另一种选择是在需要线条的位置放置`UIViews`，并将宽度（或高度）设置为非常小的值——例如 1 或 2 点。你可以使用`UIView`的`backgroundColor`属性来设置“线条”的颜色。虽然只能使用单一颜色的实线，但这通常比在其他软件中创建线条图形再将其作为图像导入要快得多。\n"
- fmt: "### Handling Deselection\n\nIf you stick with the default selection behavior,\
    \ deselection is handled for you. The white-on-gray cell style will revert back\
    \ to the default black-on-white.\n\nIf there’s custom selection behavior in play,\
    \ however, you need to handle that manually. This need can arise in two situations:\n\
    \n- When another cell has been selected. In this situation, you can add your deselection\
    \ code to either the `tableView:willDeselectRowAtIndexPath:` or `tableView:didDeselectRowAtIndexPath:`\
    \ function.\n- When the selection is now irrelevant because some action has been\
    \ performed, such as after returning to the `tableView` from a detail view. This\
    \ pattern can be seen in the Mail app. Tapping an e-mail in the list view slides\
    \ in the e-mail content. After the content view is dismissed, the highlight is\
    \ removed—slowly enough that you can see which e-mail you previously tapped, but\
    \ not so slow that the selection lingers. In this situation, the selection is\
    \ removed in the `tableView`’s `viewDidAppear` function with `UITableView`’s `deselectRowAtIndexPath:animated:`\
    \ function.\n\n### Visualizing Persistent Selection\n\nVisualizing persistent\
    \ selection is required for one of two reasons:\n\n- Your user is selecting multiple\
    \ rows prior to some other action, such as deleting records from the model.\n\
    - The selection reflects the underlying state of a property of the object that\
    \ the row represents, such as an item in a checklist has been “checked off.”\n\
    \nEither way, you need a means of indicating selection that’s distinct from the\
    \ momentary selection indicating which row has been tapped.\n\nApple makes an\
    \ overt point in the iOS Human Interface Guidelines that selection traits associated\
    \ with momentary selection shouldn’t be used to indicate state. In other words,\
    \ don’t use the default cell highlighting options to indicate the state of the\
    \ underlying data in the model. Doing so risks confusing your users, and also\
    \ may get your app rejected from the App Store.\n\nTo show persistent selection,\
    \ a couple of options are available:\n\n- Use `UITableViewCell`’s built-in `accessoryView`\
    \ to show a selection mark.\n- Create some other visual indication in a custom\
    \ cell.\n\nYour options in the second scenario are limited only by taste and what\
    \ it’s possible to get a cell to do, so I’ll concentrate on the first.\n\n###\
    \ Using Selection Marks to Indicate Multiple Selections\n\nYou’re not limited\
    \ to selecting rows one at a time, although the table has to be configured to\
    \ permit it. The default is `false`, which restricts the selection of rows to\
    \ one at a time. Setting the value to `true` allows a number of rows to be selected\
    \ simultaneously.\n\nThis is controlled at the table level. You can set the property\
    \ in Interface Builder, as shown in Figure 12-5.\n\n![A978-1-4842-1242-4_12_Fig5_HTML.jpg](A978-1-4842-1242-4_12_Fig5_HTML.jpg)\n\
    \nFigure 12-5. Controlling table selection traits in Interface Builder\n\nOr you\
    \ can set the property programmatically:\n\n```\ntableView.setAllowsSelection\
    \ = true\ntableView.setAllowsMultipleSelection = false\n```\n\nIf the `allowsSelection`\
    \ property is `false`, the `mutipleSelection` setting is ignored.\n\n### Working\
    \ with Selections\n\nAfter selection has taken place, the row or rows that have\
    \ been selected can be accessed through two `tableView` properties:\n\n- `indexPathForSelectedRow`\n\
    - `indexPathsForSelectedRows`\n\nAs their names suggest, they return `indexPaths`.\
    \ The results returned are different, though, so it’s important not to mix the\
    \ two up (the names of the properties being so similar doesn’t help here).\n\n\
    `indexPathForSelectedRow` returns a single `indexPath`. If only one cell is selected,\
    \ this will be the `indexPath` that’s returned, as you would expect.\n\nIf more\
    \ than one row is selected, `indexPathForSelectedRow` will return the first row\
    \ that was selected.\n\n`indexPathsForSelectedRows` returns an `Array` of `indexPath`s\
    \ for all rows that are selected. The `indexPath` objects in the array are in\
    \ the order that the rows were selected—index `0` is the first row, index `1`\
    \ is the second, and so on.\n\nIf no rows are selected at all, both these properties\
    \ will return `nil`.\n\n### Visualizing Multiple Row Selection\n\nThere are basically\
    \ two options when it comes to visualizing multiple row selections: using the\
    \ default cell’s accessory view or customizing your cell.\n\nWhich option to use\
    \ will depend first on whether your cell has an accessory view. If you’ve created\
    \ a custom subclass of `UITableViewCell`, it might not. Second, the option chosen\
    \ depends on whether showing an indicator at the right-hand end of the cell is\
    \ visually appropriate.\n\n#### Using the Cell’s Accessory View to Show a Selection\
    \ Mark\n\nThe default `UITableViewCell` (shown in Figure 12-6) has an accessory\
    \ view at its right-hand end, which is often used to indicate that selecting the\
    \ row will cause some kind of action, such as pushing in a detail view.\n\n![A978-1-4842-1242-4_12_Fig6_HTML.jpg](A978-1-4842-1242-4_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6. The default accessory view\n\nThe accessory view is exposed in\
    \ two ways:\n\n- As the cell’s `accessoryType` property, which can be set to one\
    \ of the four `UITableViewCellAccessoryType` values\n- As a `UIView` property,\
    \ which can be customized directly\n\nListing 12-2 shows how you could indicate\
    \ selection in response to a selection.\n\nListing 12-2. An Example `tableView:didSelectRowAtIndexPath:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, didSelectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n\
    \    cell?.accessoryType = UITableViewCellAccessoryType.Checkmark\n}\n```\n\n\
    For situations where you need to set the selection to match the properties of\
    \ the corresponding object in the `tableView`’s model, you need to set this up\
    \ as the cell is dequeued.\n\nListing 12-3 is an example of a `tableView:cellForRowAtIndexPath:`\
    \ function that displays the default tick mark when an object property is set.\n\
    \nListing 12-3. An Example `tableView:cellForRowAtIndexPath:` Function\n\n```\n\
    func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\", forIndexPath: indexPath)\n    let theObject = tableData.objectAtIndex(indexPath.row)\n\
    \    if theObject.isSelected == true {\n        cell.accessoryType = UITableViewCellAccessoryCheckmark\n\
    \    } else {\n        cell.accessoryType = UITableViewCellAccessoryNone\n   \
    \ }\n    cell.textLabel!.text = theObject.name\n    return cell\n}\n```\n\nAssuming\
    \ that three of the `objects` have their `selected` property set to `true`, the\
    \ result would appear as in Figure 12-7.\n\n![A978-1-4842-1242-4_12_Fig7_HTML.jpg](A978-1-4842-1242-4_12_Fig7_HTML.jpg)\n\
    \nFigure 12-7. The default selection tick mark\n\n#### Using the Cell’s Accessory\
    \ View to Show a Custom View\n\nBecause the accessory view is exposed as a `UIView`\
    \ property, it can be manipulated accordingly. Listing 12-4 is a code snippet\
    \ showing how you can set the `accessoryView` property to display an image.\n\n\
    Listing 12-4. Inserting an Image into the Accessory View\n\n```\nlet accessoryImage\
    \ = UIImage(name:\"accessory\")\nlet accessoryImageView = UIImageView(image:accessoryImage)\n\
    cell.accessoryView = accessoryImageView\n```"
  raw: '#### Handling Deselection


    If you stick with the default selection behavior, deselection is handled for you.
    The white-on-gray cell style will revert back to the default black-on-white.


    If there’s custom selection behavior in play, however, you need to handle that
    manually. This need can arise in two situations:


    *   When another cell has been selected. In this situation, you can add your deselection
    code to either the `tableView:willDeselectRowAtIndexPath:` or `tableView:didDeselectRowAtIndexPath:`
    function.

    *   When the selection is now irrelevant because some action has been performed,
    such as after returning to the `tableView` from a detail view. This pattern can
    be seen in the Mail app. Tapping an e-mail in the list view slides in the e-mail
    content. After the content view is dismissed, the highlight is removed—slowly
    enough that you can see which e-mail you previously tapped, but not so slow that
    the selection lingers. In this situation, the selection is removed in the `tableView`’s
    `viewDidAppear` function with `UITableView`’s `deselectRowAtIndexPath:animated:`
    function.


    #### Visualizing Persistent Selection


    Visualizing persistent selection is required for one of two reasons:


    *   Your user is selecting multiple rows prior to some other action, such as deleting
    records from the model.

    *   The selection reflects the underlying state of a property of the object that
    the row represents, such as an item in a checklist has been “checked off.”


    Either way, you need a means of indicating selection that’s distinct from the
    momentary selection indicating which row has been tapped.


    Apple makes an overt point in the iOS Human Interface Guidelines that selection
    traits associated with momentary selection shouldn’t be used to indicate state.


    In other words, don’t use the default cell highlighting options to indicate the
    state of the underlying data in the model. Doing so risks confusing your users,
    and also may get your app rejected from the App Store.


    To show persistent selection, a couple of options are available:


    *   Use `UITableViewCell`’s built-in `accessoryView` to show a selection mark.

    *   Create some other visual indication in a custom cell.


    Your options in the second scenario are limited only by taste and what it’s possible
    to get a cell to do, so I’ll concentrate on the first.


    #### Using Selection Marks to Indicate Multiple Selections


    You’re not limited to selecting rows one at a time, although the table has to
    be configured to permit it. The default is `false`, which restricts the selection
    of rows to one at a time. Setting the value to `true` allows a number of rows
    to be selected simultaneously.


    This is controlled at the table level. You can set the property in Interface Builder,
    as shown in Figure [12-5](#A978-1-4842-1242-4_12_Chapter.html#Fig5).


    ![A978-1-4842-1242-4_12_Fig5_HTML.jpg](A978-1-4842-1242-4_12_Fig5_HTML.jpg)


    Figure 12-5.


    Controlling table selection traits in Interface Builder


    Or you can set the property programmatically:


    `tableView.setAllowsSelection = true`


    `tableView.setAllowsMultipleSelection = false`


    If the `allowsSelection` property is false, the `mutipleSelection` setting is
    ignored.


    #### Working with Selections


    After selection has taken place, the row or rows that have been selected can be
    accessed through two `tableView` properties:


    *   `indexPathForSelectedRow`

    *   `indexPathsForSelectedRows`


    As their names suggest, they return `indexPaths`. The results returned are different,
    though, so it’s important not to mix the two up (the names of the properties being
    so similar doesn’t help here).


    `indexPathForSelectedRow` returns a single `indexPath`. If only one cell is selected,
    this will be the `indexPath` that’s returned, as you would expect.


    If more than one row is selected, `indexPathForSelectedRow` will return the first
    row that was selected.


    `indexPathsForSelectedRows` returns an `Array` of `indexPath`s for all rows that
    are selected. The `indexPath` objects in the array are in the order that the rows
    were selected—index `0` is the first row, index `1` is the second, and so on.


    If no rows are selected at all, both these properties will return `nil`.


    #### Visualizing Multiple Row Selection


    There are basically two options when it comes to visualizing multiple row selections:
    using the default cell’s accessory view or customizing your cell.


    Which option to use will depend first on whether your cell has an accessory view.
    If you’ve created a custom subclass of `UITableViewCell`, it might not. Second,
    the option chosen depends on whether showing an indicator at the right-hand end
    of the cell is visually appropriate.


    ##### Using the Cell’s Accessory View to Show a Selection Mark


    The default `UITableViewCell` (shown in Figure [12-6](#A978-1-4842-1242-4_12_Chapter.html#Fig6))
    has an accessory view at its right-hand end, which is often used to indicate that
    selecting the row will cause some kind of action, such as pushing in a detail
    view.


    ![A978-1-4842-1242-4_12_Fig6_HTML.jpg](A978-1-4842-1242-4_12_Fig6_HTML.jpg)


    Figure 12-6.


    The default accessory view


    The accessory view is exposed in two ways:


    *   As the cell’s `accessoryType` property, which can be set to one of the four
    `UITableViewCellAccessoryType` values

    *   As a `UIView` property, which can be customized directly


    Listing [12-2](#A978-1-4842-1242-4_12_Chapter.html#FPar4) shows how you could
    indicate selection in response to a selection.


    Listing 12-2. An Example `tableView:` `cellForRowAtIndexPath:` Function


    `func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)
    {`


        `let cell = tableView.cellForRowAtIndexPath(indexPath)`


        `cell?.accessoryType = UITableViewCellAccessoryType.Checkmark`


    `}`


    For situations where you need to set the selection to match the properties of
    the corresponding object in the tableView’s model, you need to set this up as
    the cell is dequeued.


    Listing [12-3](#A978-1-4842-1242-4_12_Chapter.html#FPar5) is an example of a `tableView:cellForRowAtIndexPath:`
    function that displays the default tick mark when an object property is set.


    Listing 12-3. An Example `tableView:` `cellForRowAtIndexPath` `:` Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",➤`


         `forIndexPath: indexPath)`


         `let theObject = tableData.objectAtIndex(indexPath.row)`


        `if theObject.isSelected == true {`


            `cell.accessoryType = UITableViewCellAccessoryCheckmark;`


        `} else {`


            `cell.accessoryType = UITableViewCellAccessoryNone;`


        `}`


        `cell.textLabel!.text = theObject.name`


        `return cell`


    `}`


    Assuming that three of the `objects` have their `selected` property set to `true`,
    the result would appear as in Figure [12-7](#A978-1-4842-1242-4_12_Chapter.html#Fig7).


    ![A978-1-4842-1242-4_12_Fig7_HTML.jpg](A978-1-4842-1242-4_12_Fig7_HTML.jpg)


    Figure 12-7.


    The default selection tick mark


    ##### Using the Cell’s Accessory View to Show a Custom View


    Because the accessory view is exposed as a `UIView` property, it can be manipulated
    accordingly. Listing [12-4](#A978-1-4842-1242-4_12_Chapter.html#FPar6) is a code
    snippet showing how you can set the `accessoryView` property to display an image.


    Listing 12-4. Inserting an Image into the Accessory View


    `let accessoryImage = UIImage(name:"accessory")`


    `let accessoryImageView = UIImageView(image:accessoryImage)`


    `cell.accessoryView = accessoryImageView`'
  trans: "\n### 处理取消选中\n\n如果你坚持使用默认的选择行为，系统会自动处理取消选中。灰底白字的单元格样式会恢复为默认的黑底白字。\n\n但如果涉及自定义选择行为，则需要手动处理。这种情况可能出现在以下两个场景中：\n\
    \n- 当另一个单元格被选中时。此时，你可以将取消选中的代码添加到 `tableView:willDeselectRowAtIndexPath:` 或 `tableView:didDeselectRowAtIndexPath:`\
    \ 函数中。\n- 当因执行某项操作（例如从详情视图返回 `tableView`）而导致选中状态不再相关时。这种模式在邮件应用中可以看到：点击列表中的某封邮件会滑入邮件内容视图，内容视图关闭后，高亮效果会缓慢消失——速度足够慢以至于你能看到之前点击的是哪封邮件，但又不会让选中状态持续停留。这种情况下，需要在\
    \ `tableView` 的 `viewDidAppear` 函数中，通过 `UITableView` 的 `deselectRowAtIndexPath:animated:`\
    \ 函数移除选中状态。\n\n### 可视化持久选中\n\n可视化持久选中通常是基于以下两个原因之一：\n\n- 用户需要在执行其他操作（例如从模型中删除记录）之前选择多个行。\n\
    - 选中状态反映了行所对应对象的某个属性的底层状态，例如清单中的某个项目已被“勾选”。\n\n无论哪种情况，你都需要一种与表示点击行的瞬时选中状态截然不同的选中指示方式。\n\
    \n苹果在《iOS 人机界面指南》中明确指出，不应使用与瞬时选中关联的选中特征来表示状态。换句话说，不要使用默认的单元格高亮选项来指示模型中底层数据的状态。这样做可能会让用户感到困惑，甚至可能导致你的应用被\
    \ App Store 拒绝。\n\n要显示持久选中状态，有以下几种选择：\n\n- 使用 `UITableViewCell` 内置的 `accessoryView`\
    \ 来显示选中标记。\n- 在自定义单元格中创建其他视觉指示。\n\n第二种方案的选择仅受限于审美和单元格能实现的功能，因此我将重点介绍第一种方案。\n\n\
    ### 使用选中标记表示多项选择\n\n你并非只能一次选择一行，但表格必须配置为允许多选。默认值为 `false`，这会将行的选择限制为一次只能选一个。将该值设置为\
    \ `true` 则允许同时选择多行。\n\n这个设置在表格级别控制。你可以在 Interface Builder 中设置该属性，如图 12-5 所示。\n\
    \n![A978-1-4842-1242-4_12_Fig5_HTML.jpg](img/A978-1-4842-1242-4_12_Fig5_HTML.jpg)\n\
    \n图 12-5. 在 Interface Builder 中控制表格选择特性\n\n或者你也可以通过代码设置该属性：\n\n```\ntableView.setAllowsSelection\
    \ = true\ntableView.setAllowsMultipleSelection = false\n```\n\n如果 `allowsSelection`\
    \ 属性为 `false`，则 `multipleSelection` 设置将被忽略。\n\n### 处理选中操作\n\n选中发生后，已选中的行可以通过两个\
    \ `tableView` 属性访问：\n\n- `indexPathForSelectedRow`\n- `indexPathsForSelectedRows`\n\
    \n正如其名，它们返回的是 `indexPath`。但返回的结果有所不同，因此注意不要混淆两者（属性名称非常相似对此并无助益）。\n\n`indexPathForSelectedRow`\
    \ 返回单个 `indexPath`。如果只选中了一个单元格，按预期会返回该 `indexPath`。\n\n如果选中了多行，`indexPathForSelectedRow`\
    \ 将返回最先选中的那行。\n\n`indexPathsForSelectedRows` 返回一个包含所有已选中行 `indexPath` 的 `Array`。数组中的\
    \ `indexPath` 对象按行被选中的顺序排列——索引 `0` 是第一行，索引 `1` 是第二行，依此类推。\n\n如果没有选中任何行，这两个属性都会返回\
    \ `nil`。\n\n### 可视化多项选择\n\n在可视化多项选择方面，基本有两种选择：使用默认单元格的附件视图或自定义你的单元格。\n\n采用哪种方案首先取决于你的单元格是否有附件视图。如果你创建了\
    \ `UITableViewCell` 的自定义子类，它可能没有附件视图。其次，所选的方案取决于在单元格右端显示指示符在视觉上是否合适。\n\n#### 使用单元格的附件视图显示选中标记\n\
    \n默认的 `UITableViewCell`（如图 12-6 所示）在其右端有一个附件视图，它通常用于表示选择该行会触发某种操作，例如推入一个详情视图。\n\
    \n![A978-1-4842-1242-4_12_Fig6_HTML.jpg](img/A978-1-4842-1242-4_12_Fig6_HTML.jpg)\n\
    \n图 12-6. 默认附件视图\n\n附件视图有两种暴露方式：\n\n- 作为单元格的 `accessoryType` 属性，可以设置为 `UITableViewCellAccessoryType`\
    \ 四个枚举值之一。\n- 作为一个 `UIView` 属性，可以直接自定义。\n\n清单 12-2 展示了如何响应选中来指示选中状态。\n\n清单 12-2.\
    \ `tableView:didSelectRowAtIndexPath:` 函数示例\n\n```\nfunc tableView(tableView:\
    \ UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath) {\n    let cell\
    \ = tableView.cellForRowAtIndexPath(indexPath)\n    cell?.accessoryType = UITableViewCellAccessoryType.Checkmark\n\
    }\n```\n\n对于需要将选中状态与 `tableView` 模型中对应对象的属性相匹配的场景，你需要在单元格出队时进行设置。\n\n清单 12-3 是一个\
    \ `tableView:cellForRowAtIndexPath:` 函数的示例，当对象属性被设置时显示默认勾选标记。\n\n清单 12-3. `tableView:cellForRowAtIndexPath:`\
    \ 函数示例\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\", forIndexPath: indexPath)\n    let theObject = tableData.objectAtIndex(indexPath.row)\n\
    \    if theObject.isSelected == true {\n        cell.accessoryType = UITableViewCellAccessoryCheckmark\n\
    \    } else {\n        cell.accessoryType = UITableViewCellAccessoryNone\n   \
    \ }\n    cell.textLabel!.text = theObject.name\n    return cell\n}\n```\n\n假设其中有三个\
    \ `objects` 的 `selected` 属性设置为 `true`，结果将如图 12-7 所示。\n\n![A978-1-4842-1242-4_12_Fig7_HTML.jpg](img/A978-1-4842-1242-4_12_Fig7_HTML.jpg)\n\
    \n图 12-7. 默认的选中勾选标记\n\n#### 使用单元格的附件视图显示自定义视图\n\n由于附件视图作为 `UIView` 属性暴露，因此可以相应地操作它。清单\
    \ 12-4 是一段代码片段，展示了如何设置 `accessoryView` 属性来显示图片。\n\n清单 12-4. 在附件视图中插入图片\n\n```\n\
    let accessoryImage = UIImage(name:\"accessory\")\nlet accessoryImageView = UIImageView(image:accessoryImage)\n\
    cell.accessoryView = accessoryImageView\n```\n"
- fmt: "### Showing Selection in Other Ways\n\nYou’re not restricted to using accessory\
    \ views to show selection, especially if you’re implementing custom cells. Virtually\
    \ any combination of images, text formatting, or area highlighting can be used,\
    \ depending on your inclination and the needs of the project. Whatever you decide\
    \ to do, you need to implement it in either `tableView:willSelectRowAtIndexPath:`\
    \ or `tableView:didSelectRowAtIndexPath:`.\n\n### Handling Deselection After Selection\n\
    \nIf you’ve implemented custom selection (either by an accessory view function\
    \ or by something more adventurous), you’re also responsible for handling the\
    \ deselection process.\n\nBasically, this means undoing whatever selection trait\
    \ you supplied when the row was selected. There are two places where this can\
    \ be done: `tableView:willDeselectRowAtIndexPath:` and `tableView:didDeselectRowAtIndexPath:`.\n\
    \nIn either case, the row in question is located at the `indexPath` provided.\n\
    \nHere’s an example of how you might handle this to reverse the effect of the\
    \ code in Listing 12-4:\n\n```\nfunc tableView(tableView: UITableView, didDeselectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n\
    \    cell.accessoryView = nil\n}\n```\n\n### Keeping the Data Model in Sync\n\n\
    If you need the cell selection to persist after the cell has been scrolled off\
    \ the visible area, you need to update the underlying data model that powers your\
    \ table.\n\nObviously the detailed implementation will depend on the structure\
    \ of the data that your table is modeling, but here’s a very simple example to\
    \ give you a structure to work with. The table’s data is stored in the `tableData`\
    \ property of the `viewController`, which is an `Array` that stores `Bools`:\n\
    \n```\nvar tableData = Array<Bool>()\n```\n\nIn the `cellForRowAtIndexPath:` function\
    \ in the table’s `dataSource` you set the cell’s accessory view to match the value\
    \ of the selection flag in the `tableData` array (Listing 12-5).\n\n**Listing\
    \ 12-5.** The `cellForRowAtIndexPath:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
    , forIndexPath: indexPath)\n    let selectionFlag = tableData[indexPath.row]\n\
    \    cell.textLabel?.text = \"Row \\(indexPath.row)\"\n    switch selectionFlag\
    \ {\n        case true:\n            cell.accessoryType = UITableViewCellAccessoryType.Checkmark\n\
    \        case false:\n            cell.accessoryType = UITableViewCellAccessoryType.None\n\
    \    }\n    return cell\n}\n```\n\nThen in the `tableView`’s `delegate` you handle\
    \ selection (Listing 12-6).\n\n**Listing 12-6.** Handling Selection\n\n```\nfunc\
    \ tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)\
    \ {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n    cell!.accessoryType\
    \ = UITableViewCellAccessoryType.Checkmark\n    tableData[indexPath.row] = true\n\
    }\n```\n\nHere you get the cell for the selected row with the `cellForRowAtIndexPath:`\
    \ function and set the `accessoryView` to show a checkmark. Then you update the\
    \ `tableData` array to store whether the row has been selected or not.\n\nHandling\
    \ deselection is the reverse, shown in Listing 12-7.\n\n**Listing 12-7.** Handling\
    \ Deselection\n\n```\nfunc tableView(tableView: UITableView, didDeselectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n\
    \    cell!.accessoryType = UITableViewCellAccessoryType.None\n    tableData[indexPath.row]\
    \ = false\n}\n```\n\nOnce again, you get the cell for the selected row, but this\
    \ time you remove the accessory view checkmark. Then the `tableData` array is\
    \ updated with the new value for the given item. The effect of these three functions\
    \ is that the selection will persist as the table is scrolled around.\n\n## Optimizing\
    \ Selection Performance\n\nAlthough the standard pattern of cell creation and\
    \ configuration tends to use the `cellForRowAtIndexPath:` function to dequeue\
    \ and configure cells, there is an alternative approach that can help eke out\
    \ the last gram of performance from your table views.\n\nThe `cellForRowAtIndexPath:`\
    \ function is called in advance of the cell being needed for display in the table\
    \ view, so the cells “hang around” for a while before they’re actually displayed.\n\
    \nJust before the cell is drawn in the table view, the `tableView:willDisplayCellAtIndexPath:`\
    \ function is called on the `tableView`’s delegate. This is the last chance you\
    \ have for the cell to be updated in relation to the table view’s data model,\
    \ before the internal cell functions such as `layoutSubviews` take over.\n\nIf\
    \ you have an expensive operation relating to the data model that you want to\
    \ defer to the last possible moment, you can move it from `cellForRowAtIndexPath:`\
    \ to `willDisplayCellAtIndexPath:`. Listing 12-8 shows how you could refactor\
    \ the function from Listing 12-7 to use this approach.\n\n**Listing 12-8.** Using\
    \ the `willDisplayCellAtIndexPath:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, willDisplayCell cell: UITableViewCell, forRowAtIndexPath indexPath:\
    \ NSIndexPath) {\n    let selectionFlag = tableData[indexPath.row]\n    switch\
    \ selectionFlag {\n    case true:\n        cell.accessoryType = UITableViewCellAccessoryType.Checkmark\n\
    \    case false:\n        cell.accessoryType = UITableViewCellAccessoryType.None\n\
    \    }\n}\n```\n\n**Caution**\n\nAs with life, there are few miracle cures for\
    \ sluggish table views. Implementing the `willDisplayCell:forRowAtIndexPath:`\
    \ might help to improve your table’s performance, but it’s not a given. You will\
    \ need to look closely using tools like Instruments to be sure.\n\n## Selection\
    \ Dos and Don’ts\n\nThere are a few of things to bear in mind when configuring\
    \ row selection:\n\n- Don’t use selection to indicate the state of the row’s object.\
    \ Selection works at the view level of the MVC hierarchy, so it’s independent\
    \ of the model.\n- Unless multiple selections are allowed, always programmatically\
    \ deselect the previously selected row before a new row is selected.\n- If the\
    \ response to the row selection is to push a new view onto the display (for example,\
    \ if you have a navigation controller that pushes on a detail view), always programmatically\
    \ deselect the previous rows after the detail view is dismissed. This will ensure\
    \ that the rows aren’t still highlighted after the detail view is popped off the\
    \ view stack, but provides a visual cue as to which row the detail view referred\
    \ to."
  raw: '##### Showing Selection in Other Ways


    You’re not restricted to using accessory views to show selection, especially if
    you’re implementing custom cells. Virtually any combination of images, text formatting,
    or area highlighting can be used, depending on your inclination and the needs
    of the project. Whatever you decide to do, you need to implement it in either
    `tableView:willSelectRowAtIndexPath: or tableView:didSelectRowAtIndexPath:.`


    #### Handling Deselection After Selection


    If you’ve implemented custom selection (either by an accessory view function or
    by something more adventurous), you’re also responsible for handling the deselection
    process.


    Basically, this means undoing whatever selection trait you supplied when the row
    was selected. There are two places where this can be done: `tableView:` `willDeselectRowAtIndex➤Path`
    `:` and `tableView:` `didDeselectRowAtIndexPath` `:`.


    In either case, the row in question is located at the `indexPath` provided.


    Here’s an example of how you might handle this to reverse the effect of the code
    in Listing [12-4](#A978-1-4842-1242-4_12_Chapter.html#FPar6):


    `func tableView(tableView: UITableView, didDeselectRowAtIndexPath ➤`


      `indexPath: NSIndexPath) {`


        `let cell = tableView.cellForRowAtIndexPath(indexPath)`


        `cell.accessoryView = nil`


    `}`


    #### Keeping the Data Model in Sync


    If you need the cell selection to persist after the cell has been scrolled off
    the visible area, you need to update the underlying data model that powers your
    table.


    Obviously the detailed implementation will depend on the structure of the data
    that your table is modeling, but here’s a very simple example to give you a structure
    to work with. The table’s data is stored in the `tableData` property of the `viewController`,
    which is an `Array` that stores `Bools`:


    `var tableData = Array<Bool>()`


    In the `cellForRowAtIndexPath:` function in the table’s `dataSource` you set the
    cell’s accessory view to match the value of the selection flag in the `tableData`
    array (Listing [12-5](#A978-1-4842-1242-4_12_Chapter.html#FPar7)).


    Listing 12-5. The cellForRowAtIndexPath: Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",➤`


        `forIndexPath: indexPath)`


        `let selectionFlag = tableData[indexPath.row]`


        `cell.textLabel?.text = "Row \(indexPath.row)"`


        `switch selectionFlag {`


            `case true:`


                `cell.accessoryType = UITableViewCellAccessoryType.Checkmark`


            `case false:`


                `cell.accessoryType = UITableViewCellAccessoryType.None`


        `}`


        `return cell`


    `}`


    Then in the `tableView`’s `delegate` you handle selection (Listing [12-6](#A978-1-4842-1242-4_12_Chapter.html#FPar8)).


    Listing 12-6. Handling Selection


    `func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)
    {`


        `let cell = tableView.cellForRowAtIndexPath(indexPath)`


        `cell!.accessoryType = UITableViewCellAccessoryType.Checkmark`


        `tableData[indexPath.row] = true`


    `}`


    Here you get the cell for the selected row with the `cellForRowAtIndexPath:` function
    and set the `accessoryView` to show a checkmark. Then you update the `tableData`
    array to store whether the row has been selected or not.


    Handling deselection is the reverse, shown in Listing [12-7](#A978-1-4842-1242-4_12_Chapter.html#FPar9).


    Listing 12-7. Handling Deselection


    `func tableView(tableView: UITableView, didDeselectRowAtIndexPath indexPath:➤`


    `NSIndexPath) {`


        `let cell = tableView.cellForRowAtIndexPath(indexPath)`


        `cell!.accessoryType = UITableViewCellAccessoryType.None`


        `tableData[indexPath.row] = false`


    `}`


    Once again, you get the cell for the selected row, but this time you remove the
    accessory view checkmark. Then the `tableData` array is updated with the new value
    for the given item. The effect of these three functions is that the selection
    will persist as the table is scrolled around.


    ### Optimizing Selection Performance


    Although the standard pattern of cell creation and configuration tends to use
    the `cellForRowAtIndexPath:` function to dequeue and configure cells, there is
    an alternative approach that can help eke out the last gram of performance from
    your table views.


    The `cellForRowAtIndexPath:`function is called in advance of the cell being needed
    for display in the table view, so the cells “hang around” for a while before they’re
    actually displayed.


    Just before the cell is drawn in the table view, the `tableView:willDisplayCellAtIndexPath:`
    function is called on the `tableView`’s delegate. This is the last chance you
    have for the cell to be updated in relation to the table view’s data model, before
    the internal cell functions such as `layoutSubviews` take over.


    If you have an expensive operation relating to the data model that you want to
    defer to the last possible moment, you can move it from `cellForRowAtIndexPath:`
    to `willDisplayCellAtIndexPath:`. Listing [12-8](#A978-1-4842-1242-4_12_Chapter.html#FPar10)
    shows how you could refactor the function from Listing [12-7](#A978-1-4842-1242-4_12_Chapter.html#FPar9)
    to use this approach.


    Listing 12-8. Using the willDisplayCellAtIndexPath: Function


    `func tableView(tableView: UITableView, willDisplayCell cell: UITableViewCell,➤`


    `forRowAtIndexPath indexPath: NSIndexPath) {`


        `let selectionFlag = tableData[indexPath.row]`


        `switch selectionFlag {`


        `case true:`


            `cell.accessoryType = UITableViewCellAccessoryType.Checkmark`


        `case false:`


            `cell.accessoryType = UITableViewCellAccessoryType.None`


        `}`


    `}`


    Caution


    As with life, there are few miracle cures for sluggish table views. Implementing
    the `willDisplayCell:forRowAtIndexPath:` might help to improve your table’s performance,
    but it’s not a given. You will need to look closely using tools like Instruments
    to be sure.


    ## Selection Dos and Don’ts


    There are a few of things to bear in mind when configuring row selection:


    *   Don’t use selection to indicate the state of the row’s object. Selection works
    at the view level of the MVC hierarchy, so it’s independent of the model.

    *   Unless multiple selections are allowed, always programmatically deselect the
    previously selected row before a new row is selected.

    *   If the response to the row selection is to push a new view onto the display
    (for example, if you have a navigation controller that pushes on a detail view),
    always programmatically deselect the previous rows after the detail view is dismissed.
    This will ensure that the rows aren’t still highlighted after the detail view
    is popped off the view stack, but provides a visual cue as to which row the detail
    view referred to.'
  trans: "\n### 以其他方式展示选择状态\n\n你并非只能使用辅助视图来展示选择状态，尤其是在实现自定义单元格时。实际上，你可以根据项目需求和个人偏好，使用任何图像、文本格式或区域高亮的组合。无论决定采用何种方式，你都需要在\
    \ `tableView:willSelectRowAtIndexPath:` 或 `tableView:didSelectRowAtIndexPath:`\
    \ 方法中实现它。\n\n### 处理选择后的取消选择\n\n如果你实现了自定义选择逻辑（无论是通过辅助视图功能还是更复杂的方式），你还需要负责处理取消选择的过程。\n\
    \n简单来说，这意味着要撤销在选中某行时所应用的选择特征。可以在两个方法中完成：`tableView:willDeselectRowAtIndexPath:`\
    \ 和 `tableView:didDeselectRowAtIndexPath:`。\n\n无论使用哪种方法，相关的行都位于提供的 `indexPath`\
    \ 处。\n\n下面是一个示例，说明如何撤销清单 12-4 中代码的效果：\n\n```\nfunc tableView(tableView: UITableView,\
    \ didDeselectRowAtIndexPath indexPath: NSIndexPath) {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n\
    \    cell.accessoryView = nil\n}\n```\n\n### 保持数据模型同步\n\n如果你希望单元格在滚动出可视区域后仍能保持选择状态，则需要更新支撑表格的底层数据模型。\n\
    \n显然，具体实现取决于表格所建模数据的结构，但这里有一个非常简单的示例，可以为你提供一个可操作的结构。表格数据存储在 `viewController` 的\
    \ `tableData` 属性中，该属性是一个存储 `Bool` 值的 `Array`：\n\n```\nvar tableData = Array<Bool>()\n\
    ```\n\n在表格 `dataSource` 的 `cellForRowAtIndexPath:` 方法中，根据 `tableData` 数组中**选择标记**的值来设置单元格的辅助视图（清单\
    \ 12-5）。\n\n**清单 12-5.** `cellForRowAtIndexPath:` 方法\n\n```\nfunc tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
    , forIndexPath: indexPath)\n    let selectionFlag = tableData[indexPath.row]\n\
    \    cell.textLabel?.text = \"行 \\(indexPath.row)\"\n    switch selectionFlag\
    \ {\n        case true:\n            cell.accessoryType = UITableViewCellAccessoryType.Checkmark\n\
    \        case false:\n            cell.accessoryType = UITableViewCellAccessoryType.None\n\
    \    }\n    return cell\n}\n```\n\n然后，在 `tableView` 的 `delegate` 中处理选择事件（清单 12-6）。\n\
    \n**清单 12-6.** 处理选择事件\n\n```\nfunc tableView(tableView: UITableView, didSelectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n\
    \    cell!.accessoryType = UITableViewCellAccessoryType.Checkmark\n    tableData[indexPath.row]\
    \ = true\n}\n```\n\n这里，你通过 `cellForRowAtIndexPath:` 方法获取选中行的单元格，并将其 `accessoryView`\
    \ 设置为显示勾选标记。然后更新 `tableData` 数组，以存储该行是否被选中。\n\n处理取消选择的过程则相反，如清单 12-7 所示。\n\n**清单\
    \ 12-7.** 处理取消选择事件\n\n```\nfunc tableView(tableView: UITableView, didDeselectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let cell = tableView.cellForRowAtIndexPath(indexPath)\n\
    \    cell!.accessoryType = UITableViewCellAccessoryType.None\n    tableData[indexPath.row]\
    \ = false\n}\n```\n\n同样，你获取选中行的单元格，但这次移除了辅助视图的勾选标记。然后使用给定项的新值更新 `tableData` 数组。这三个方法的效果是，当表格滚动时，选择状态将得以保持。\n\
    \n## 优化选择性能\n\n尽管单元格创建和配置的标准模式通常使用 `cellForRowAtIndexPath:` 方法来重用和配置单元格，但还有另一种方法可以帮助从表格视图中榨取最后一丝性能。\n\
    \n`cellForRowAtIndexPath:` 方法会在单元格需要显示在表格视图之前被调用，因此单元格在实际显示之前会“闲置”一段时间。\n\n就在单元格即将在表格视图中绘制之前，`tableView`\
    \ 的 `delegate` 会调用 `tableView:willDisplayCellAtIndexPath:` 方法。这是在内部单元格方法（例如 `layoutSubviews`）接管之前，你根据表格视图数据模型更新单元格的最后机会。\n\
    \n如果你有一个与数据模型相关的耗时操作，希望将其推迟到最后一刻，你可以将其从 `cellForRowAtIndexPath:` 移到 `willDisplayCellAtIndexPath:`\
    \ 中。清单 12-8 展示了如何重构清单 12-7 中的方法以使用此方式。\n\n**清单 12-8.** 使用 `willDisplayCellAtIndexPath:`\
    \ 方法\n\n```\nfunc tableView(tableView: UITableView, willDisplayCell cell: UITableViewCell,\
    \ forRowAtIndexPath indexPath: NSIndexPath) {\n    let selectionFlag = tableData[indexPath.row]\n\
    \    switch selectionFlag {\n    case true:\n        cell.accessoryType = UITableViewCellAccessoryType.Checkmark\n\
    \    case false:\n        cell.accessoryType = UITableViewCellAccessoryType.None\n\
    \    }\n}\n```\n\n**注意**\n\n和生活中的其他事情一样，解决表格视图卡顿问题并没有什么灵丹妙药。实现 `willDisplayCell:forRowAtIndexPath:`\
    \ 方法可能有助于提升表格性能，但这并非必然。你需要使用 Instruments 等工具进行仔细分析才能确认。\n\n## 选择操作的注意事项\n\n配置行选择时需要牢记以下几点：\n\
    \n- 不要使用选择状态来表示行对象的状态。选择是在 MVC 架构的视图层级上工作的，因此它独立于模型。\n- 除非允许多选，否则在选择新行之前，始终要以编程方式取消选中之前选中的行。\n\
    - 如果行选择的响应是推入一个新视图（例如，如果你的导航控制器推入了一个详细视图），则务必在详细视图被关闭后，以编程方式取消选中之前的行。这将确保在详细视图从视图堆栈中弹出后，这些行不再处于高亮状态，但会提供一个视觉提示，表明详细视图所指的具体行。\n\
    \n"
- fmt: "## Responding to Selections with More Detail\n\nSelection of a row by the\
    \ user generally requires some kind of response in return. These can be broadly\
    \ categorized in one of two patterns:\n\n- The selection results in the display\
    \ of additional data, either by \"drilling down\" into a navigation hierarchy\
    \ or displaying some form of detail view.\n- The selection reflects some kind\
    \ of choice on the part of the user and results in the update of a model.\n\n\
    A common pattern is to push in a new view of some description—a navigation view\
    \ that reveals another `tableView` enabling drill-down into the information hierarchy,\
    \ for example, or a detail view that contains more information about the row that\
    \ was tapped.\n\nListing [12-9](#A978-1-4842-1242-4_12_Chapter.html#FPar12) is\
    \ an example of that second process.\n\n**Listing 12-9.** An Example of a `tableView:didSelectRowAtIndexPath:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, didSelectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let modelForDetailView = tableData[indexPath.row]\n\
    \    let storyboard = UIStoryboard(name: \"Main\", bundle: nil)\n    let detailVC\
    \ = ➤\n  storyboard.instantiateViewControllerWithIdentifier(\"DetailViewController\"\
    ) ➤\n  as! DetailViewController\n    detailVC.model = modelForDetailView\n   \
    \ tableView.deselectRowAtIndexPath(indexPath, animated: true)\n    detailVC.modalTransitionStyle\
    \ = UIModalTransitionStyle.FlipHorizontal\n    self.presentViewController(detailVC,\
    \ animated: true, completion: nil)\n}\n```\n\nThis is a `UITableViewDelegate`\
    \ function that takes two parameters: a reference to the `tableView` itself and\
    \ the `IndexPath` that has been selected.\n\nThe first task is to get a reference\
    \ to the object in the model that corresponds to the row that's been selected.\
    \ Bear in mind that it's the row that's been selected, and not the model object\
    \ itself:\n\n```\nlet modelForDetailView = tableData[indexPath.row]\n```\n\nIn\
    \ this situation, the table's data model is an `Array` of `Model` objects, so\
    \ it's simply a case of getting the `model` instance that resides at the corresponding\
    \ index.\n\nAfter you have a reference to the selected object, the code instantiates\
    \ an instance of a `DetailViewController`, having first deselected the row. It\
    \ then sets the `DetailViewController`'s `model` property, and pushes in the new\
    \ view with a modal transition.\n\n## Design Patterns and `UITableViews`\n\nIn\
    \ addition to architectural design patterns such as MVC, there are also interaction\
    \ patterns. Whereas architectural patterns help you consider how to structure\
    \ and build an application, interaction patterns can help to manage what you do\
    \ with it.\n\nAfter you've used the MVC pattern to build the table, the question\
    \ arises, \"What are you going to do with the data that the table contains?\"\
    \ Clearly, the user will read the content of the cells, but what then? What sort\
    \ of user behaviors do you need to anticipate?\n\nA useful pattern to use when\
    \ thinking about data and how to work with it is create, read, update, delete,\
    \ or CRUD for short. This is most commonly used when working with records in a\
    \ database, but it's also applicable when considering what might happen to a row\
    \ in a `UITableView`.\n\n### Read\n\nIn database terms, reading is concerned with\
    \ retrieving records from the database, usually with some kind of SQL `SELECT`\
    \ query. In `UITableView` terms, you can think of reading as the process of getting\
    \ data out of the model and into the table itself through functions such as `tableView:cellForRowAtIndexPath:`.\
    \ We've covered this in detail elsewhere, so you don't need to trouble yourself\
    \ much with the Read action.\n\n### Create\n\nIn addition to displaying information,\
    \ table views are often used to enable the user to create and enter new information.\
    \ The Contacts app is a good example of this: tapping the + button at the top\
    \ of the list of names causes a modal view containing a form for a new contact\
    \ to be pushed in from the bottom of the screen. The form that arrives in response\
    \ to tapping + isn't part of the `tableView` itself, but after the new `Contact`\
    \ object has been created, the `tableView` does have to react to that and insert\
    \ the new row at the appropriate place.\n\n### Update\n\nThe Contacts app allows\
    \ existing contact information to be updated by selecting a contact and then tapping\
    \ the Edit button. Again, this isn't, strictly speaking, a `tableView` concern\
    \ until the amended data is saved, at which point it may be necessary to rearrange\
    \ the rows to cope with the changed data.\n\nA more `tableView`-specific action\
    \ would be the user wanting to rearrange rows or sections. The `UITableView dataSource`\
    \ and `delegate` protocols provide a number of functions to support this, which\
    \ you'll look at later in this chapter.\n\n### Delete\n\nAn equally common interaction\
    \ pattern is deleting an entire record. The iPhone's Reminders app, shown in Figure\
    \ [12-8](#A978-1-4842-1242-4_12_Chapter.html#Fig8), enables the deletion of notes\
    \ by swiping left or right in the row to reveal a Delete control. Tapping Delete\
    \ animates the removal of the row, which slides away to the left, after which\
    \ the rows below are scrolled up to fill the gap.\n\n![A978-1-4842-1242-4_12_Fig8_HTML.jpg](A978-1-4842-1242-4_12_Fig8_HTML.jpg)\n\
    \n**Figure 12-8.** Deleting a reminder\n\nAll these functions and animations come\
    \ for free through the built-in `UITableViewDelegate` functions. We'll start by\
    \ looking at the actions that have the greatest impact on the `tableView` itself:\
    \ inserting new rows and deleting existing ones.\n\n**Note:** If your table view\
    \ controller is a subclass of `UITableViewController`, you'll get a lot of insertion\
    \ and deletion behavior for free courtesy of the `UITableViewController` superclass.\
    \ That's great as far as implementing the functionality is concerned, but not\
    \ that helpful if you're trying to figure out how things work so you can adapt\
    \ them later. Therefore, I'm working through this section with a generic `UIViewController`\
    \ and adding the table view functionality in manually."
  raw: '## Responding to Selections with More Detail


    Selection of a row by the user generally requires some kind of response in return.
    These can be broadly categorized in one of two patterns:


    *   The selection results in the display of additional data, either by “drilling
    down” into a navigation hierarchy or displaying some form of detail view.

    *   The selection reflects some kind of choice on the part of the user and results
    in the update of a model.


    A common pattern is to push in a new view of some description—a navigation view
    that reveals another `tableView` enabling drill-down into the information hierarchy,
    for example, or a detail view that contains more information about the row that
    was tapped.


    Listing [12-9](#A978-1-4842-1242-4_12_Chapter.html#FPar12) is an example of that
    second process.


    Listing 12-9. An Example of a `tableView:didSelectRowAtIndexPath:` Function


    `func tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath)
    {`


        `let modelForDetailView = tableData[indexPath.row]`


        `let storyboard = UIStoryboard(name: "Main", bundle: nil)`


        `let detailVC = ➤`


      `storyboard.instantiateViewControllerWithIdentifier("DetailViewController")
    ➤`


      `as! DetailViewController`


        `detailVC.model = modelForDetailView`


        `tableView.deselectRowAtIndexPath(indexPath, animated: true)`


        `detailVC.modalTransitionStyle = UIModalTransitionStyle.FlipHorizontal`


        `self.presentViewController(detailVC, animated: true, completion: nil)`


    `}`


    This is a `UITableViewDelegate` function that takes two parameters: a reference
    to the `tableView` itself and the `IndexPath` that has been selected.


    The first task is to get a reference to the object in the model that corresponds
    to the row that’s been selected. Bear in mind that it’s the row that’s been selected,
    and not the model object itself:


    `let modelForDetailView = tableData[indexPath.row]`


    In this situation, the table’s data model is an `Array` of `Model` objects, so
    it’s simply a case of getting the `model` instance that resides at the corresponding
    index.


    After you have a reference to the selected object, the code instantiates an instance
    of a `DetailViewController`, having first deselected the row. It then sets the
    `DetailViewController`’s `model` property, and pushes in the new view with a modal
    transition.


    ## Design Patterns and UITableViews


    In addition to architectural design patterns such as MVC, there are also interaction
    patterns. Whereas architectural patterns help you consider how to structure and
    build an application, interaction patterns can help to manage what you do with
    it.


    After you’ve used the MVC pattern to build the table, the question arises, “What
    are you going to do with the data that the table contains?” Clearly, the user
    will read the content of the cells, but what then? What sort of user behaviors
    do you need to anticipate?


    A useful pattern to use when thinking about data and how to work with it is create,
    read, update, delete, or CRUD for short. This is most commonly used when working
    with records in a database, but it’s also applicable when considering what might
    happen to a row in a `UITableView`.


    ### Read


    In database terms, reading is concerned with retrieving records from the database,
    usually with some kind of SQL `SELECT` query. In `UITableView` terms, you can
    think of reading as the process of getting data out of the model and into the
    table itself through functions such as `tableView:cellForRowAtIndexPath:`. We’ve
    covered this in detail elsewhere, so you don’t need to trouble yourself much with
    the Read action.


    ### Create


    In addition to displaying information, table views are often used to enable the
    user to create and enter new information. The Contacts app is a good example of
    this: tapping the + button at the top of the list of names causes a modal view
    containing a form for a new contact to be pushed in from the bottom of the screen.
    The form that arrives in response to tapping + isn’t part of the tableView itself,
    but after the new `Contact` object has been created, the `tableView` does have
    to react to that and insert the new row at the appropriate place.


    ### Update


    The Contacts app allows existing contact information to be updated by selecting
    a contact and then tapping the Edit button. Again, this isn’t, strictly speaking,
    a `tableView` concern until the amended data is saved, at which point it may be
    necessary to rearrange the rows to cope with the changed data.


    A more `tableView`-specific action would be the user wanting to rearrange rows
    or sections. The `UITableView dataSource` and `delegate` protocols provide a number
    of functions to support this, which you’ll look at later in this chapter.


    ### Delete


    An equally common interaction pattern is deleting an entire record. The iPhone’s
    Reminders app, shown in Figure [12-8](#A978-1-4842-1242-4_12_Chapter.html#Fig8),
    enables the deletion of notes by swiping left or right in the row to reveal a
    Delete control. Tapping Delete animates the removal of the row, which slides away
    to the left, after which the rows below are scrolled up to fill the gap.


    ![A978-1-4842-1242-4_12_Fig8_HTML.jpg](A978-1-4842-1242-4_12_Fig8_HTML.jpg)


    Figure 12-8.


    Deleting a reminder


    All these functions and animations come for free through the built-in `UITableViewDelegate`
    functions. We’ll start by looking at the actions that have the greatest impact
    on the `tableView` itself: inserting new rows and deleting existing ones.


    Note


    If your table view controller is a subclass of `UITableViewController`, you’ll
    get a lot of insertion and deletion behavior for free courtesy of the `UITableViewController`
    superclass. That’s great as far as implementing the functionality is concerned,
    but not that helpful if you’re trying to figure out how things work so you can
    adapt them later. Therefore, I’m working through this section with a generic `UIViewController`
    and adding the table view functionality in manually.'
  trans: "\n## 对用户选择做出更详细的响应\n\n用户选中某一行通常需要以某种方式进行回应。这些回应大致可分为两种模式：\n\n-   选择的结果是显示附加数据，既可以通过“深入”导航层级，也可以显示某种形式的详情视图。\n\
    -   选择反映了用户做出的某种选择，并导致模型的更新。\n\n一种常见的模式是推入某个描述性的新视图——例如，一个导航视图，它揭示了另一个 `tableView`，从而实现向信息层级的深入探索；或者是一个详情视图，其中包含有关被点击行的更多信息。\n\
    \n代码清单 12-9 是第二种过程的一个例子。\n\n**代码清单 12-9.** `tableView:didSelectRowAtIndexPath:`\
    \ 函数示例\n\n```\nfunc tableView(tableView: UITableView, didSelectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n    let modelForDetailView = tableData[indexPath.row]\n\
    \    let storyboard = UIStoryboard(name: \"Main\", bundle: nil)\n    let detailVC\
    \ = ➤\n  storyboard.instantiateViewControllerWithIdentifier(\"DetailViewController\"\
    ) ➤\n  as! DetailViewController\n    detailVC.model = modelForDetailView\n   \
    \ tableView.deselectRowAtIndexPath(indexPath, animated: true)\n    detailVC.modalTransitionStyle\
    \ = UIModalTransitionStyle.FlipHorizontal\n    self.presentViewController(detailVC,\
    \ animated: true, completion: nil)\n}\n```\n\n这是一个 `UITableViewDelegate` 函数，它接受两个参数：对\
    \ `tableView` 本身的引用，以及被选中的 `IndexPath`。\n\n第一个任务是获取模型中与所选行相对应的对象的引用。请记住，被选中是行，而不是模型对象本身：\n\
    \n```\nlet modelForDetailView = tableData[indexPath.row]\n```\n\n在这种情况下，表格的数据模型是一个由\
    \ `Model` 对象组成的 `Array`，因此只需获取位于相应索引处的 `model` 实例即可。\n\n获得所选对象的引用后，代码会先取消选中该行，然后实例化一个\
    \ `DetailViewController` 实例。接着，它设置 `DetailViewController` 的 `model` 属性，并通过模态过渡推入新视图。\n\
    \n## 设计模式与 `UITableViews`\n\n除了 MVC 等架构设计模式外，还存在交互模式。架构模式帮助你思考如何构建应用程序，而交互模式则有助于管理如何使用应用程序。\n\
    \n使用 MVC 模式构建表格后，问题来了：“你将如何处理表格中包含的数据？”显然，用户会阅读单元格的内容，但之后呢？你需要预判哪些用户行为？\n\n在思考数据及其处理方式时，一个有用的模式是创建、读取、更新、删除，简称为\
    \ CRUD。这在处理数据库中的记录时最为常用，但在考虑 `UITableView` 中的某一行可能会发生什么时也同样适用。\n\n### 读取\n\n在数据库术语中，读取涉及从数据库中检索记录，通常使用某种\
    \ SQL `SELECT` 查询。在 `UITableView` 的语境下，你可以将读取视为通过 `tableView:cellForRowAtIndexPath:`\
    \ 等函数，将数据从模型中取出并放入表格本身的过程。我们在其他地方已经详细讨论过这一点，因此你无需过多操心读取操作。\n\n### 创建\n\n除了显示信息，表格视图也常用于让用户创建和输入新信息。“通讯录”应用就是一个很好的例子：点击姓名列表顶部的\
    \ + 按钮，会从屏幕底部推入一个包含新建联系人表单的模态视图。响应点击 + 按钮而出现的表单本身并非 `tableView` 的一部分，但在创建了新的 `Contact`\
    \ 对象之后，`tableView` 必须对此做出反应，并在适当的位置插入新行。\n\n### 更新\n\n“通讯录”应用允许通过选择一个联系人然后点击“编辑”按钮来更新现有联系人信息。同样，严格来说，这并非\
    \ `tableView` 的职责范畴，直到修改后的数据被保存，此时可能有必要重新排列行以处理已更改的数据。\n\n一个更 `tableView` 特定的操作是用户想要重新排列行或节。`UITableView`\
    \ 的 `dataSource` 和 `delegate` 协议提供了许多支持此操作的函数，你将在本章后面看到这些函数。\n\n### 删除\n\n同样常见的交互模式是删除整个记录。iPhone\
    \ 的“提醒事项”应用，如图 12-8 所示，允许通过在行上向左或向右滑动来显示“删除”控件，从而删除备忘录。点击“删除”会以动画方式移除该行，该行会向左滑走，然后下方的行会上移以填补空缺。\n\
    \n![A978-1-4842-1242-4_12_Fig8_HTML.jpg](img/A978-1-4842-1242-4_12_Fig8_HTML.jpg)\n\
    \n**图 12-8.** 删除一个提醒事项\n\n所有这些功能和动画都通过内置的 `UITableViewDelegate` 函数免费获得。我们将从查看对\
    \ `tableView` 本身影响最大的操作开始：插入新行和删除现有行。\n\n**注意：** 如果你的表格视图控制器是 `UITableViewController`\
    \ 的子类，你将能够免费获得许多插入和删除行为，这要归功于其超类 `UITableViewController`。就实现功能而言，这非常棒，但如果你想弄清楚事情是如何运作以便以后调整，这就没那么有帮助了。因此，在本节中，我将使用一个通用的\
    \ `UIViewController` 并手动添加表格视图功能。\n"
- fmt: "# Custom Row Actions\n\nThe standard rowediting options can be further extended\
    \ by using custom actions; you can customize the text that’s displayed in the\
    \ row while it’s being edited, as well as create callback blocks to execute code\
    \ in response to selecting one of the row actions.\n\nTo create custom actions,\
    \ you need to implement the `UITableViewDelegate` function `tableView(tableView:editActionsForRowAtIndexPath:)`.\
    \ This returns an `Array` of `UITableViewRowActions` that you can customize.\n\
    \nEach row action has three properties:\n\n*   The `UITableViewRowActionStyle`\
    \ – `Default`, `Destructive` (which is colored red), or `Normal` – for the button\
    \ that’s displayed inside the edited row\n*   The title, which is a `String` to\
    \ display inside the button\n*   A function that can run a callback action. It\
    \ takes two parameters: the `action` that’s just been triggered, and the `row`\
    \ that the action took place in.\n\nIn Listing [12-10](#A978-1-4842-1242-4_12_Chapter.html#FPar14),\
    \ you can see how this fits together.\n\nListing 12-10. Setting Up the Custom\
    \ Edit Actions\n\n```\nfunc tableView(tableView: UITableView, editActionsForRowAtIndexPath\
    \ indexPath: ➤\nNSIndexPath) -> [UITableViewRowAction]? {\n    let tweet = UITableViewRowAction(style:\
    \ UITableViewRowActionStyle.Default,➤\n    title: \"Tweet\") { action, index in\n\
    \        print(\"selected tweet action\")\n        tableView.setEditing(false,\
    \ animated: true)\n    }\n    tweet.backgroundColor = UIColor.lightGrayColor()\n\
    \    let facebook = UITableViewRowAction(style: .Normal, title: \"Facebook\")\
    \ ➤\n    { action, index in\n        print(\"selected facebook action\")\n   \
    \     tableView.setEditing(false, animated: true)\n    }\n    facebook.backgroundColor\
    \ = UIColor.blueColor()\n    let email = UITableViewRowAction(style: .Normal,\
    \ title: \"Email\")➤\n   { action, index in\n        print(\"selected email action\"\
    )\n        tableView.setEditing(false, animated: true)\n    }\n    email.backgroundColor\
    \ = UIColor.purpleColor()\n    return [tweet, facebook, email]\n}\n```\n\nThis\
    \ inserts three buttons into the row when it moves into edit mode, as shown in\
    \ Figure [12-9](#A978-1-4842-1242-4_12_Chapter.html#Fig9).\n\n![A978-1-4842-1242-4_12_Fig9_HTML.jpg](A978-1-4842-1242-4_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9.\n\nCustom editing actions\n\nIf you want deselect the row after\
    \ triggering the action, you need to call the `tableView.setEditing(false, animated:\
    \ true)` function. This will slide the action buttons back out again, to reset\
    \ the row.\n\n## Inserting and Deleting Rows\n\nAs you’ll probably be expecting\
    \ by now, inserting and deleting rows is a multistage process that involves the\
    \ `tableView`, the `delegate`, and the `dataSource` working in tandem with each\
    \ other.\n\nThe process involves the following:\n\n*   Putting the table into\
    \ editing mode.\n*   For each row, checking whether editing is allowed and displaying\
    \ the editing controls if it is.\n*   Responding to the user’s touches on the\
    \ editing controls by sending a message to the `dataSource`.\n*   Updating the\
    \ model.\n*   Updating the table’s rows.\n\nThe sequence of events, and the passing\
    \ of messages between `tableView`, `dataSource`, and `delegate`, is illustrated\
    \ in Figure [12-10](#A978-1-4842-1242-4_12_Chapter.html#Fig10).\n\n![A978-1-4842-1242-4_12_Fig10_HTML.jpg](A978-1-4842-1242-4_12_Fig10_HTML.jpg)\n\
    \nFigure 12-10.\n\nMessages passed during `tableView` editing\n\nAt first glance,\
    \ this looks horrendously complicated. It’s actually not that bad, as you’ll see\
    \ as you step through it.\n\n### The Sample App\n\nIf you want to follow along\
    \ with the upcoming examples, you will need a simple table to experiment with.\
    \ I’m not going to go into detail about how to do that (hopefully you can build\
    \ a table after having read this far!) but a couple of specifics are worth mentioning:\n\
    \n*   Because tables with editing functions are often found in `UINavigationControllers`,\
    \ I’ve implemented the table view inside a navigation controller.\n*   The `tableView`’s\
    \ data model is deliberately simple, so that the data doesn’t overshadow the more\
    \ relevant matters of editing, updating, and deleting.\n\n### Creating a UINavigationController-Based\
    \ Table\n\nTo create the `UINavigationController`-based table, I’ve taken the\
    \ standard Single View Application template provided by Xcode, and embedded the\
    \ View Controller inside a Navigation Controller.\n\n### Creating the Sample Table’s\
    \ Data Model\n\nThe data model for this app is very simple. It’s just an `Array`\
    \ of `Strings`, which gets created in `ViewController`’s `viewDidLoad` function:\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    self.navigationItem.title\
    \ = \"Row insertion\"\n    self.navigationItem.rightBarButtonItem = self.editButtonItem()\n\
    \    for index in 0…100 {\n        tableData.append(\"Row \\(index)\")\n    }\n\
    }\n```\n\nThere are a couple of other setup-related tasks in this function. The\
    \ following sets up the title of the navigation bar:\n\n```\nself.navigationItem.title\
    \ = @\"Row insertion\";\n```\n\nThis code creates an Edit button:\n\n```\nself.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;\n```\n\nThe overall effect is shown in Figure [12-11](#A978-1-4842-1242-4_12_Chapter.html#Fig11).\n\
    \n![A978-1-4842-1242-4_12_Fig11_HTML.jpg](A978-1-4842-1242-4_12_Fig11_HTML.jpg)\n\
    \nFigure 12-11.\n\nThe customized navigation bar\n\n#### Putting the Table into\
    \ Editing Mode\n\nThe first step is to put the table into editing mode, which\
    \ is invoked by calling the `setEditing:animated` function on the table view:\n\
    \n```\ntableView.setEditing(true, animated:true)\n```\n\nNormally this would be\
    \ done in response to a button tap. If you are using a `UINavigationController`,\
    \ the `UINavigationBar` at the top of your screen comes with a handy Edit button\
    \ baked in. You can set this up in the `viewDidLoad` function:\n\n```\nself.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;\n```\n\nThis gives you not only an Edit button at the\
    \ top right of the navigation bar, but one that will automatically toggle between\
    \ Edit (before the table goes into editing mode) and Done (while the table is\
    \ in editing mode). The effect is shown in Figure [12-12](#A978-1-4842-1242-4_12_Chapter.html#Fig12).\n\
    \n![A978-1-4842-1242-4_12_Fig12_HTML.jpg](A978-1-4842-1242-4_12_Fig12_HTML.jpg)\n\
    \nFigure 12-12.\n\nThe toggling Edit button\n\nIf you’re not using a `UINavigationController`,\
    \ you need to add a button that calls the `setEditing:animated:` selector, and\
    \ then handles the toggling between Edit and Done modes manually.\n\nListing [12-11](#A978-1-4842-1242-4_12_Chapter.html#FPar16)\
    \ shows an example of adding an Edit button.\n\nListing 12-11. Adding an Edit\
    \ Button\n\n```\nlet editingButton = UIButton(type: UIButtonType.RoundedRect)\n\
    editingButton.frame = CGRectMake(0, 0, 60, 40)\neditingButton.setTitle(\"Edit\"\
    , forState: UIControlState.Normal)\neditingButton.addTarget(self, action: \"setEditing:\"\
    , forControlEvents:➤\nUIControlEvents.TouchUpInside)\nself.view.addSubview(editingButton)\n\
    ```\n\nIf you have a “standard” button, you need to implement the `setEditing:animated`\
    \ function in Listing [12-12](#A978-1-4842-1242-4_12_Chapter.html#FPar17).\n\n\
    Listing 12-12. The `setEditing:animated:` Function\n\n```\noverride func setEditing(editing:\
    \ Bool, animated: Bool) {\n    tableView.setEditing(!tableView.editing, animated:\
    \ true)\n}\n```"
  raw: '## Custom Row Actions


    The standard rowediting options can be further extended by using custom actions;
    you can customize the text that’s displayed in the row while it’s being edited,
    as well as create callback blocks to execute code in response to selecting one
    of the row actions.


    To create custom actions, you need to implement the `UITableViewDelegate` function
    `tableView(tableView:editActionsForRowAtIndexPath:`). This returns an `Array`
    of `UITableViewRowActions` that you can customize.


    Each row action has three properties:


    *   The `UITableViewRowActionStyle`–`Default`, `Destructive` (which is colored
    red), or `Normal`–for the button that’s displayed inside the edited row

    *   The title, which is a String to display inside the button

    *   A function that can run a callback action. It takes two parameters: the `action`
    that’s just been triggered, and the `row` that the action took place in.


    In Listing [12-10](#A978-1-4842-1242-4_12_Chapter.html#FPar14), you can see how
    this fits together.


    Listing 12-10. Setting Up the Custom Edit Actions


    `func tableView(tableView: UITableView, editActionsForRowAtIndexPath indexPath:
    ➤`


    `NSIndexPath) -> [UITableViewRowAction]? {`


        `let tweet = UITableViewRowAction(style: UITableViewRowActionStyle.Default,➤`


        `title: "Tweet") { action, index in`


            `print("selected tweet action")`


            `tableView.setEditing(false, animated: true)`


        `}`


        `tweet.backgroundColor = UIColor.lightGrayColor()`


        `let facebook = UITableViewRowAction(style: .Normal, title: "Facebook") ➤`


        `{ action, index in`


            `print("selected facebook action")`


            `tableView.setEditing(false, animated: true)`


        `}`


        `facebook.backgroundColor = UIColor.blueColor()`


        `let email = UITableViewRowAction(style: .Normal, title: "Email")➤`


       `{ action, index in`


            `print("selected email action")`


            `tableView.setEditing(false, animated: true)`


        `}`


        `email.backgroundColor = UIColor.purpleColor()`


        `return [tweet, facebook, email]`


    `}`


    This inserts three buttons into the row when it moves into edit mode, as shown
    in Figure [12-9](#A978-1-4842-1242-4_12_Chapter.html#Fig9).


    ![A978-1-4842-1242-4_12_Fig9_HTML.jpg](A978-1-4842-1242-4_12_Fig9_HTML.jpg)


    Figure 12-9.


    Custom editing actions


    If you want deselect the row after triggering the action, you need to call the
    `tableView.setEditing(false, animated: true)` function. This will slide the action
    buttons back out again, to reset the row.


    ## Inserting and Deleting Rows


    As you’ll probably be expecting by now, inserting and deleting rows is a multistage
    process that involves the `tableView`, the `delegate`, and the `dataSource` working
    in tandem with each other.


    The process involves the following:


    Putting the table into editing mode.   For each row, checking whether editing
    is allowed and displaying the editing controls if it is.   Responding to the user’s
    touches on the editing controls by sending a message to the `dataSource`.   Updating
    the model.   Updating the table’s rows.  


    The sequence of events, and the passing of messages between `tableView`, `dataSource`,
    and `delegate`, is illustrated in Figure [12-10](#A978-1-4842-1242-4_12_Chapter.html#Fig10).


    ![A978-1-4842-1242-4_12_Fig10_HTML.jpg](A978-1-4842-1242-4_12_Fig10_HTML.jpg)


    Figure 12-10.


    Messages passed during `tableView` editing


    At first glance, this looks horrendously complicated. It’s actually not that bad,
    as you’ll see as you step through it.


    THE SAMPLE APP


    If you want to follow along with the upcoming examples, you will need a simple
    table to experiment with. I’m not going to go into detail about how to do that
    (hopefully you can build a table after having read this far!) but a couple of
    specifics are worth mentioning:


    *   Because tables with editing functions are often found in `UINavigationControllers`,
    I’ve implemented the table view inside a navigation controller.

    *   The `tableView`’s data model is deliberately simple, so that the data doesn’t
    overshadow the more relevant matters of editing, updating, and deleting.


    Creating a UINavigationController-Based Table


    To create the `UINavigationController`-based table, I’ve taken the standard Single
    View Application template provided by Xcode, and embedded the View Controller
    inside a Navigation Controller.


    Creating the Sample Table’s Data Model


    The data model for this app is very simple. It’s just an `Array` of `Strings`,
    which gets created in `ViewController`’s `viewDidLoad` function:


    `override func viewDidLoad() {`


        `super.viewDidLoad()`


        `// Do any additional setup after loading the view, typically from a nib.`


        `self.navigationItem.title = "Row insertion"`


        `self.navigationItem.rightBarButtonItem = self.editButtonItem()`


        `for index in 0…100 {`


            `tableData.append("Row \(index)")`


        `}`


    `}`


    There are a couple of other setup-related tasks in this function. The following
    sets up the title of the navigation bar:


    `self.navigationItem.title = @"Row insertion";`


    This code creates an Edit button:


    `self.navigationItem.rightBarButtonItem = self.editButtonItem;`


    The overall effect is shown in Figure [12-11](#A978-1-4842-1242-4_12_Chapter.html#Fig11).


    ![A978-1-4842-1242-4_12_Fig11_HTML.jpg](A978-1-4842-1242-4_12_Fig11_HTML.jpg)


    Figure 12-11.


    The customized navigation bar


    ### Putting the Table into Editing Mode


    The first step is to put the table into editing mode, which is invoked by calling
    the `setEditing:animated` function on the table view:


    `tableView.setEditing(true, animated:true)`


    Normally this would be done in response to a button tap. If you are using a `UINavigationController`,
    the `UINavigationBar` at the top of your screen comes with a handy Edit button
    baked in. You can set this up in the `viewDidLoad` function:


    `self.navigationItem.rightBarButtonItem = self.editButtonItem;`


    This gives you not only an Edit button at the top right of the navigation bar,
    but one that will automatically toggle between Edit (before the table goes into
    editing mode) and Done (while the table is in editing mode). The effect is shown
    in Figure [12-12](#A978-1-4842-1242-4_12_Chapter.html#Fig12).


    ![A978-1-4842-1242-4_12_Fig12_HTML.jpg](A978-1-4842-1242-4_12_Fig12_HTML.jpg)


    Figure 12-12.


    The toggling Edit button


    If you’re not using a `UINavigationController`, you need to add a button that
    calls the `setEditing:animated:` selector, and then handles the toggling between
    Edit and Done modes manually.


    Listing [12-11](#A978-1-4842-1242-4_12_Chapter.html#FPar16) shows an example of
    adding an Edit button.


    Listing 12-11. Adding an Edit Button


    `let editingButton = UIButton(type: UIButtonType.RoundedRect)`


    `editingButton.frame = CGRectMake(0, 0, 60, 40)`


    `editingButton.setTitle("Edit", forState: UIControlState.Normal)`


    `editingButton.addTarget(self, action: "setEditing:", forControlEvents:➤`


    `UIControlEvents.TouchUpInside)`


    `self.view.addSubview(editingButton)`


    If you have a “standard” button, you need to implement the `setEditing:animated`
    function in Listing [12-12](#A978-1-4842-1242-4_12_Chapter.html#FPar17).


    Listing 12-12. The `setEditing:animated:` Function


    `override func setEditing(editing: Bool, animated: Bool) {`


        `tableView.setEditing(!tableView.editing, animated: true)`


    `}`'
  trans: "\n# 自定义行操作\n\n标准行编辑选项可以通过使用自定义操作进一步扩展；你可以自定义行在编辑时显示的文本，以及创建回调块来响应选择行操作时执行的代码。\n\
    \n要创建自定义操作，你需要实现 `UITableViewDelegate` 的 `tableView(tableView:editActionsForRowAtIndexPath:)`\
    \ 函数。该函数返回一个 `UITableViewRowAction` 的 `Array`，你可以对其进行自定义。\n\n每个行操作有三个属性：\n\n*\
    \   `UITableViewRowActionStyle` – `Default`、`Destructive`（显示为红色）或 `Normal` – 用于编辑行内显示的按钮\n\
    *   标题，即按钮内显示的 `String`\n*   一个可以运行回调操作的函数。它接受两个参数：刚刚触发的 `action` 和操作发生的 `row`。\n\
    \n在清单 12-10 中，你可以看到它们是如何结合在一起的。\n\n清单 12-10. 设置自定义编辑操作\n\n```\nfunc tableView(tableView:\
    \ UITableView, editActionsForRowAtIndexPath indexPath: ➤\nNSIndexPath) -> [UITableViewRowAction]?\
    \ {\n    let tweet = UITableViewRowAction(style: UITableViewRowActionStyle.Default,➤\n\
    \    title: \"Tweet\") { action, index in\n        print(\"selected tweet action\"\
    )\n        tableView.setEditing(false, animated: true)\n    }\n    tweet.backgroundColor\
    \ = UIColor.lightGrayColor()\n    let facebook = UITableViewRowAction(style: .Normal,\
    \ title: \"Facebook\") ➤\n    { action, index in\n        print(\"selected facebook\
    \ action\")\n        tableView.setEditing(false, animated: true)\n    }\n    facebook.backgroundColor\
    \ = UIColor.blueColor()\n    let email = UITableViewRowAction(style: .Normal,\
    \ title: \"Email\")➤\n   { action, index in\n        print(\"selected email action\"\
    )\n        tableView.setEditing(false, animated: true)\n    }\n    email.backgroundColor\
    \ = UIColor.purpleColor()\n    return [tweet, facebook, email]\n}\n```\n\n当行进入编辑模式时，这会在该行中插入三个按钮，如图\
    \ 12-9 所示。\n\n![A978-1-4842-1242-4_12_Fig9_HTML.jpg](img/A978-1-4842-1242-4_12_Fig9_HTML.jpg)\n\
    \n图 12-9.\n\n自定义编辑操作\n\n如果你想在触发动作后取消选中该行，需要调用 `tableView.setEditing(false, animated:\
    \ true)` 函数。这将使操作按钮再次滑出，以重置该行。\n\n## 插入和删除行\n\n你现在可能已经预料到，插入和删除行是一个多阶段过程，涉及 `tableView`、`delegate`\
    \ 和 `dataSource` 之间的协同工作。\n\n该过程包括以下步骤：\n\n*   将表格置于编辑模式。\n*   对于每一行，检查是否允许编辑，如果允许则显示编辑控件。\n\
    *   通过向 `dataSource` 发送消息来响应用户对编辑控件的触摸。\n*   更新模型。\n*   更新表格的行。\n\n事件序列以及 `tableView`、`dataSource`\
    \ 和 `delegate` 之间传递消息的过程如图 12-10 所示。\n\n![A978-1-4842-1242-4_12_Fig10_HTML.jpg](img/A978-1-4842-1242-4_12_Fig10_HTML.jpg)\n\
    \n图 12-10.\n\n`tableView` 编辑期间传递的消息\n\n乍一看，这看起来极其复杂。实际上并没有那么糟糕，当你逐步操作时就会明白。\n\n\
    ### 示例应用\n\n如果你想跟着后续的示例操作，需要一个简单的表格来进行实验。我不打算详细说明如何做（希望你已经读到这里，能够构建一个表格！），但有几个具体细节值得一提：\n\
    \n*   由于具有编辑功能的表格通常出现在 `UINavigationController` 中，因此我在导航控制器内实现了表格视图。\n*   `tableView`\
    \ 的数据模型特意设计得简单，以便数据不会掩盖编辑、更新和删除等更相关的问题。\n\n### 创建基于 UINavigationController 的表格\n\
    \n为了创建基于 `UINavigationController` 的表格，我采用了 Xcode 提供的标准 Single View Application\
    \ 模板，并将 View Controller 嵌入到 Navigation Controller 中。\n\n### 创建示例表格的数据模型\n\n此应用的数据模型非常简单。它只是一个\
    \ `String` 的 `Array`，在 `ViewController` 的 `viewDidLoad` 函数中创建：\n\n```\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    self.navigationItem.title\
    \ = \"Row insertion\"\n    self.navigationItem.rightBarButtonItem = self.editButtonItem()\n\
    \    for index in 0…100 {\n        tableData.append(\"Row \\(index)\")\n    }\n\
    }\n```\n\n此函数中还有其他一些与设置相关的任务。以下代码设置了导航栏的标题：\n\n```\nself.navigationItem.title\
    \ = @\"Row insertion\";\n```\n\n这段代码创建了一个“编辑”按钮：\n\n```\nself.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;\n```\n\n整体效果见图 12-11。\n\n![A978-1-4842-1242-4_12_Fig11_HTML.jpg](img/A978-1-4842-1242-4_12_Fig11_HTML.jpg)\n\
    \n图 12-11.\n\n自定义导航栏\n\n#### 将表格置于编辑模式\n\n第一步是将表格置于编辑模式，这可以通过在表格视图上调用 `setEditing:animated`\
    \ 函数来实现：\n\n```\ntableView.setEditing(true, animated:true)\n```\n\n通常这是在响应按钮点击时完成的。如果你使用的是\
    \ `UINavigationController`，屏幕顶部的 `UINavigationBar` 内置了一个方便的“编辑”按钮。你可以在 `viewDidLoad`\
    \ 函数中进行设置：\n\n```\nself.navigationItem.rightBarButtonItem = self.editButtonItem;\n\
    ```\n\n这不仅在导航栏右上角提供了一个“编辑”按钮，而且该按钮会在进入编辑模式前的“编辑”状态和编辑模式中的“完成”状态之间自动切换。效果见图 12-12。\n\
    \n![A978-1-4842-1242-4_12_Fig12_HTML.jpg](img/A978-1-4842-1242-4_12_Fig12_HTML.jpg)\n\
    \n图 12-12.\n\n可切换的编辑按钮\n\n如果你没有使用 `UINavigationController`，则需要添加一个按钮来调用 `setEditing:animated:`\
    \ 选择器，然后手动处理“编辑”和“完成”模式之间的切换。\n\n清单 12-11 展示了添加“编辑”按钮的示例。\n\n清单 12-11. 添加编辑按钮\n\
    \n```\nlet editingButton = UIButton(type: UIButtonType.RoundedRect)\neditingButton.frame\
    \ = CGRectMake(0, 0, 60, 40)\neditingButton.setTitle(\"Edit\", forState: UIControlState.Normal)\n\
    editingButton.addTarget(self, action: \"setEditing:\", forControlEvents:➤\nUIControlEvents.TouchUpInside)\n\
    self.view.addSubview(editingButton)\n```\n\n如果你使用的是“标准”按钮，则需要在清单 12-12 中实现 `setEditing:animated`\
    \ 函数。\n\n清单 12-12. `setEditing:animated:` 函数\n\n```\noverride func setEditing(editing:\
    \ Bool, animated: Bool) {\n    tableView.setEditing(!tableView.editing, animated:\
    \ true)\n}\n```\n"
- fmt: "### Controlling Whether Rows Can Be Edited\n\nAfter the table is in editing\
    \ mode, the table view will then ask the data source whether each row should be\
    \ editable. If the `tableView:canEditRowAtIndexPath:` function is implemented,\
    \ this is called for each row in turn. Listing 12-13 shows how to use this function\
    \ to prevent a specific section and row from being edited.\n\n**Listing 12-13.** Controlling\
    \ Whether a Section or Row Can Be Edited\n\n```\nfunc tableView(tableView: UITableView,\
    \ canEditRowAtIndexPath indexPath: NSIndexPath) -> Bool {\n    if indexPath.section\
    \ == 0 || indexPath.row == 3 {\n        return false\n    }\n    return true;\n\
    }\n```\n\nIf the `tableView:canEditRowAtIndexPath:` function returns `false`,\
    \ the row won’t be indented. Figure 12-13 shows the effect of this.\n\n![A978-1-4842-1242-4_12_Fig13_HTML.jpg](A978-1-4842-1242-4_12_Fig13_HTML.jpg)\n\
    \n**Figure 12-13.** Preventing editing of an entire section\n\nIf the `tableView:canEditRowAtIndexPath:`\
    \ isn’t implemented, the table view assumes that each row can be edited. In effect,\
    \ the default return value is `true`.\n\nTo temporarily disable editing of the\
    \ table view as a whole, you can return `false` from the `canEditRowAtIndexPath:`\
    \ regardless of the `indexPath` being passed into the function.\n\n### Controlling\
    \ Each Row’s Editing Style\n\nHaving established whether a row can be edited,\
    \ the table view then asks the delegate which editing style each row should use:\n\
    \n```\nfunc tableView(tableView: UITableView, editingStyleForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCellEditingStyle {\n    return UITableViewCellEditingStyle.Delete\n\
    }\n```\n\nIf the `tableView:editingStyleForRowAtIndexPath:` function is implemented,\
    \ it will return one of three possible options:\n\n- `UITableViewCellEditingStyleDelete`:\
    \ This causes the deletion control to be inserted at the left end of the cell.\n\
    - `UITableViewCellEditingStyleInsert`: This causes the insertion control to be\
    \ inserted at the left end of the cell.\n- `UITableViewCellEditingStyleNone`:\
    \ Somewhat unsurprisingly, this does not insert an editing control.\n\nAs with\
    \ `tableView:canEditRowAtIndexPath:`, if the `tableView:editingStyleForRowAtIndexPath:`\
    \ isn’t implemented, the `tableView` will assume that all cells will be deletable\
    \ and return `UITableViewCellEditingStyleDelete` as the default value.\n\nInserting\
    \ additional rows is a little more involved, so we’ll cover that later in this\
    \ chapter.\n\n### Dealing with Row Deletions\n\nIf you’ve been following along\
    \ so far, your table will look like Figure 12-14, with an Edit button, cells that\
    \ display Delete controls when the table goes into editing mode, and a Delete\
    \ button that appears at the end of the row when the Delete control is tapped.\n\
    \n![A978-1-4842-1242-4_12_Fig14_HTML.jpg](A978-1-4842-1242-4_12_Fig14_HTML.jpg)\n\
    \n**Figure 12-14.** Progress so far\n\nHowever, tapping that Delete button is\
    \ something of an anticlimax. Nothing happens.\n\nWhen the Delete button is tapped,\
    \ the `tableView` sends the `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ message to the data source. It takes three parameters:\n\n- A reference to the\
    \ `tableView` itself (in case the data source needs to distinguish between a number\
    \ of `tableViews`)\n- The `UITableViewCellEditingStyle` of the control that’s\
    \ just been tapped, which in this case is `UITableViewCellEditingStyleDelete`\n\
    - An `indexPath` object locating the row in question\n\nWhen the data source receives\
    \ the `commitEditingStyle:forRowAtIndexPath:` message, it needs to do two things:\n\
    \n1. Update the `tableView`’s model by deleting the object represented by the\
    \ row in the table. Remember that the table itself is just a view, and unless\
    \ you actually delete the object from the model, it will reappear in the table\
    \ the next time the table gets reloaded.\n2. Send the `tableView:deleteRowsAtIndexPath:withRowAnimation:`\
    \ message to the `tableView` so that it updates the table display. In this case,\
    \ because you’re dealing with a Delete, it will animate the deleted cell sliding\
    \ off to the left, and then move the cells below it up to close the gap.\n\nListing\
    \ 12-14 shows how this might be done.\n\n**Listing 12-14.** Implementing the `commitEditingStyle:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, commitEditingStyle editingStyle:\
    \ UITableViewCellEditingStyle, forRowAtIndexPath indexPath: NSIndexPath) {\n \
    \   if editingStyle == UITableViewCellEditingStyle.Delete {\n        tableData.removeAtIndex(indexPath.row)\n\
    \        tableView.deleteRowsAtIndexPaths([indexPath], withRowAnimation: UITableViewRowAnimation.Automatic)\n\
    \    }\n}\n```\n\nThere’s a reasonable amount going on here. First, you need to\
    \ check what kind of action is required (you’ll be adding the insert action shortly).\n\
    \nIf it’s a delete, you need to remove the object in question from the data model.\
    \ In this simple instance, it’s just a case of removing an object from an array,\
    \ but in a more complex app, this might require a database deletion:\n\n`tableData.removeAtIndex(indexPath.row)`\n\
    \nThen you can send that delete message to the `tableView`, passing in the `indexPaths`\
    \ to be deleted as an `Array`:\n\n`tableView.deleteRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)`\n\nThere’s a range of\
    \ table cell insertion and deletion animations to choose from. These are listed\
    \ in Table 12-1.\n\n**Table 12-1.** The `UITableViewRowAnimation` Options\n\n\
    | UITableViewRowAnimation Type | Effect |\n| --- | --- |\n| `.Fade` | Rows fade\
    \ in and out. |\n| `.Right` | Inserted rows slide in from the right; deleted rows\
    \ slide out to the right. |\n| `.Left` | Inserted rows slide in from the left;\
    \ deleted rows slide out to the left. |\n| `.Top` | Inserted rows slide down from\
    \ the bottom of the row above; deleted rows slide up toward the bottom of the\
    \ row above. |\n| `.Bottom` | Inserted rows slide up from the top of the cell\
    \ below; deleted rows appear to be covered by the row below sliding up. |\n| `.None`\
    \ | Inserted rows simply appear; deleted rows simply disappear. |\n| `.Middle`\
    \ | Cells are inserted and deleted with an accordion-style effect. |\n| `.Automatic`\
    \ | The `tableView` automatically chooses an appropriate animation style |\n\n\
    It’s worth noting that the `Top`, `Bottom`, and `Middle` styles can produce some\
    \ bizarre effects if you try to apply them to rows at the very top or bottom of\
    \ the `tableView`.\n\nFor that reason `UITableViewRowAnimationAutomatic` automatically\
    \ applies the correct top, bottom, or middle style depending on which row is being\
    \ animated. This saves a lot of work, so unless you have a very good reason to\
    \ do otherwise, it’s the way to go."
  raw: '### Controlling Whether Rows Can Be Edited


    After the table is in editing mode, the table view will then ask the data source
    whether each row should be editable. If the `tableView:canEditRowAtIndexPath:`
    function is implemented, this is called for each row in turn. Listing [12-13](#A978-1-4842-1242-4_12_Chapter.html#FPar18)
    shows how to use this function to prevent a specific section and row from being
    edited.


    Listing 12-13. Controlling Whether a Section or Row Can Be Edited


    `func tableView(tableView: UITableView, canEditRowAtIndexPath indexPath: NSIndexPath)➤`


    `-> Bool {`


        `if indexPath.section == 0 || indexPath.row == 3 {`


            `return false`


        `}`


        `return true;`


    `}`


    If the `tableView:canEditRowAtIndexPath:` function returns `false`, the row won’t
    be indented. Figure [12-13](#A978-1-4842-1242-4_12_Chapter.html#Fig13) shows the
    effect of this.


    ![A978-1-4842-1242-4_12_Fig13_HTML.jpg](A978-1-4842-1242-4_12_Fig13_HTML.jpg)


    Figure 12-13.


    Preventing editing of an entire section


    If the `tableView:canEditRowAtIndexPath:` isn’t implemented, the table view assumes
    that each row can be edited. In effect, the default return value is `true`.


    To temporarily disable editing of the table view as a whole, you can return `false`
    from the `canEditRowAtIndexPath:` regardless of the `indexPath` being passed into
    the function.


    ### Controlling Each Row’s Editing Style


    Having established whether a row can be edited, the table view then asks the delegate
    which editing style each row should use:


    `func tableView(tableView: UITableView, editingStyleForRowAtIndexPath indexPath:➤`


    `NSIndexPath) -> UITableViewCellEditingStyle {`


        `return UITableViewCellEditingStyle.Delete`


    `}`


    If the `tableView:editingStyleForRowAtIndexPath:` function is implemented, it
    will return one of three possible options:


    *   `UITableViewCellEditingStyleDelete`: This causes the deletion control to be
    inserted at the left end of the cell.

    *   `UITableViewCellEditingStyleInsert`: This causes the insertion control to
    be inserted at the left end of the cell.

    *   `UITableViewCellEditingStyleNone`: Somewhat unsurprisingly, this does not
    insert an editing control.


    As with `tableView:canEditRowAtIndexPath:`, if the `tableView:editingStyleForRowAtIndexPath:`
    isn’t implemented, the `tableView` will assume that all cells will be deletable
    and return `UITableViewCellEditingStyleDelete` as the default value.


    Inserting additional rows is a little more involved, so we’ll cover that later
    in this chapter.


    ### Dealing with Row Deletions


    If you’ve been following along so far, your table will look like Figure [12-14](#A978-1-4842-1242-4_12_Chapter.html#Fig14),
    with an Edit button, cells that display Delete controls when the table goes into
    editing mode, and a Delete button that appears at the end of the row when the
    Delete control is tapped.


    ![A978-1-4842-1242-4_12_Fig14_HTML.jpg](A978-1-4842-1242-4_12_Fig14_HTML.jpg)


    Figure 12-14.


    Progress so far


    However, tapping that Delete button is something of an anticlimax. Nothing happens.


    When the Delete button is tapped, the `tableView` sends the `tableView:commitEditingStyle:forRowAtIndexPath:`
    message to the data source. It takes three parameters:


    *   A reference to the `tableView` itself (in case the data source needs to distinguish
    between a number of `tableViews`)

    *   The `UITableViewCellEditingStyle` of the control that’s just been tapped,
    which in this case is `UITableViewCellEditingStyleDelete`

    *   An `indexPath` object locating the row in question


    When the data source receives the `commitEditingStyle:forRowAtIndexPath:` message,
    it needs to do two things:


    Update the `tableView`’s model by deleting the object represented by the row in
    the table. Remember that the table itself is just a view, and unless you actually
    delete the object from the model, it will reappear in the table the next time
    the table gets reloaded.   Send the `tableView:deleteRowsAtIndexPath:withRowAnimation:`
    message to the `tableView` so that it updates the table display. In this case,
    because you’re dealing with a Delete, it will animate the deleted cell sliding
    off to the left, and then move the cells below it up to close the gap.


    Listing [12-14](#A978-1-4842-1242-4_12_Chapter.html#FPar19) shows how this might
    be done.


    Listing 12-14. Implementing the `commitEditingStyle` `:` Function


    `forRowAtIndexPath indexPath: NSIndexPath) {`


    `if editingStyle == UITableViewCellEditingStyle.Delete {`


    `tableData.removeAtIndex(indexPath.row)`


    `tableView.deleteRowsAtIndexPaths([indexPath], withRowAnimation:➤`


    `UITableViewRowAnimation.Automatic)`


    `}`


    `}`


    There’s a reasonable amount going on here. First, you need to check what kind
    of action is required (you’ll be adding the insert action shortly).


    If it’s a delete, you need to remove the object in question from the data model.
    In this simple instance, it’s just a case of removing an object from an array,
    but in a more complex app, this might require a database deletion:


    `tableData.removeAtIndex(indexPath.row)`


    Then you can send that delete message to the `tableView`, passing in the `indexPaths`
    to be deleted as an `Array`:


    `tableView.deleteRowsAtIndexPaths([indexPath], withRowAnimation:➤`


    `UITableViewRowAnimation.Automatic)`


    There’s a range of table cell insertion and deletion animations to choose from.
    These are listed in Table [12-1](#A978-1-4842-1242-4_12_Chapter.html#Tab1).


    Table 12-1.


    The `UITableViewRowAnimation` Options


    | UITableViewRowAnimation Type | Effect |

    | --- | --- |

    | `.Fade` | Rows fade in and out. |

    | `.Right` | Inserted rows slide in from the right; deleted rows slide out to
    the right. |

    | `.Left` | Inserted rows slide in from the left; deleted rows slide out to the
    left. |

    | `.Top` | Inserted rows slide down from the bottom of the row above; deleted
    rows slide up toward the bottom of the row above. |

    | `.Bottom` | Inserted rows slide up from the top of the cell below; deleted rows
    appear to be covered by the row below sliding up. |

    | `.None` | Inserted rows simply appear; deleted rows simply disappear. |

    | `.Middle` | Cells are inserted and deleted with an accordion-style effect. |

    | `.Automatic` | The `tableView` automatically chooses an appropriate animation
    style |


    It’s worth noting that the `Top`, `Bottom`, and `Middle` styles can produce some
    bizarre effects if you try to apply them to rows at the very top or bottom of
    the `tableView`.


    For that reason `UITableViewRowAnimationAutomatic` automatically applies the correct
    top, bottom, or middle style depending on which row is being animated. This saves
    a lot of work, so unless you have a very good reason to do otherwise, it’s the
    way to go.'
  trans: "\n### 控制行是否可编辑\n\n进入编辑模式后，表格视图会向数据源询问每一行是否应该可编辑。如果实现了`tableView:canEditRowAtIndexPath:`函数，系统会依次对每一行调用该函数。清单\
    \ 12-13 演示了如何使用该函数来阻止特定分区和行被编辑。\n\n**清单 12-13.** 控制分区或行是否可编辑\n\n```\nfunc tableView(tableView:\
    \ UITableView, canEditRowAtIndexPath indexPath: NSIndexPath) -> Bool {\n    if\
    \ indexPath.section == 0 || indexPath.row == 3 {\n        return false\n    }\n\
    \    return true;\n}\n```\n\n如果`tableView:canEditRowAtIndexPath:`函数返回`false`，则该行不会出现缩进。图\
    \ 12-13 展示了这一效果。\n\n![A978-1-4842-1242-4_12_Fig13_HTML.jpg](img/A978-1-4842-1242-4_12_Fig13_HTML.jpg)\n\
    \n**图 12-13.** 阻止编辑整个分区\n\n如果未实现`tableView:canEditRowAtIndexPath:`，表格视图会假定每一行都可编辑。实际上，默认返回值是`true`。\n\
    \n若要临时禁用整个表格视图的编辑功能，可以在`canEditRowAtIndexPath:`中始终返回`false`，无论传入的`indexPath`是什么。\n\
    \n### 控制每行的编辑样式\n\n在确定行是否可编辑后，表格视图会询问委托对象每行应使用哪种编辑样式：\n\n```\nfunc tableView(tableView:\
    \ UITableView, editingStyleForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCellEditingStyle\
    \ {\n    return UITableViewCellEditingStyle.Delete\n}\n```\n\n如果实现了`tableView:editingStyleForRowAtIndexPath:`函数，它将返回以下三种可能选项之一：\n\
    \n- `UITableViewCellEditingStyleDelete`：这会在单元格左端插入删除控件。\n- `UITableViewCellEditingStyleInsert`：这会在单元格左端插入插入控件。\n\
    - `UITableViewCellEditingStyleNone`：这不会插入任何编辑控件，这一点并不出人意料。\n\n与`tableView:canEditRowAtIndexPath:`类似，如果未实现`tableView:editingStyleForRowAtIndexPath:`，则`tableView`会假定所有单元格都可删除，并默认返回`UITableViewCellEditingStyleDelete`。\n\
    \n插入额外行稍微复杂一些，我们将在本章稍后部分讨论。\n\n### 处理行删除\n\n如果你一直按照本文进行操作，你的表格看起来应该像图 12-14 所示，带有一个“编辑”按钮，当表格进入编辑模式时单元格会显示删除控件，并且当点击删除控件时，行末尾会出现一个“删除”按钮。\n\
    \n![A978-1-4842-1242-4_12_Fig14_HTML.jpg](img/A978-1-4842-1242-4_12_Fig14_HTML.jpg)\n\
    \n**图 12-14.** 当前进度\n\n然而，点击那个“删除”按钮多少有些令人扫兴——什么都不会发生。\n\n当“删除”按钮被点击时，`tableView`会向数据源发送`tableView:commitEditingStyle:forRowAtIndexPath:`消息。该消息接收三个参数：\n\
    \n- 对`tableView`自身的引用（以便数据源在需要时区分多个`tableView`）\n- 被点击控件的`UITableViewCellEditingStyle`，此处为`UITableViewCellEditingStyleDelete`\n\
    - 一个用于定位相关行的`indexPath`对象\n\n当数据源接收到`commitEditingStyle:forRowAtIndexPath:`消息时，它需要做两件事：\n\
    \n1.  通过从表格的行所代表的对象中删除该对象来更新`tableView`的模型。请记住，表格本身只是一个视图，除非你实际从模型中删除了该对象，否则下次重新加载表格时，它仍会重新出现。\n\
    2.  向`tableView`发送`tableView:deleteRowsAtIndexPath:withRowAnimation:`消息，以便表格更新显示。在这种情况下，由于处理的是删除操作，系统会动画化地将被删除的单元格向左滑出，然后将下方的单元格向上移动以填补空缺。\n\
    \n清单 12-14 展示了如何实现这一点。\n\n**清单 12-14.** 实现`commitEditingStyle:`函数\n\n```\nfunc\
    \ tableView(tableView: UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle,\
    \ forRowAtIndexPath indexPath: NSIndexPath) {\n    if editingStyle == UITableViewCellEditingStyle.Delete\
    \ {\n        tableData.removeAtIndex(indexPath.row)\n        tableView.deleteRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)\n    }\n}\n```\n\n这里涉及的操作相当多。首先，你需要检查需要执行何种操作（稍后你将添加插入操作）。\n\
    \n如果是删除操作，你需要从数据模型中移除相关对象。在这个简单的例子中，只是从数组中移除一个对象，但在更复杂的应用中，这可能需要执行数据库删除操作：\n\n\
    `tableData.removeAtIndex(indexPath.row)`\n\n然后，你可以向`tableView`发送删除消息，将要删除的`indexPaths`以`Array`形式传入：\n\
    \n`tableView.deleteRowsAtIndexPaths([indexPath], withRowAnimation: UITableViewRowAnimation.Automatic)`\n\
    \n有一系列表格单元格插入和删除动画可供选择。这些动画列于表 12-1 中。\n\n**表 12-1.** `UITableViewRowAnimation`\
    \ 的选项\n\n| UITableViewRowAnimation 类型 | 效果 |\n| --- | --- |\n| `.Fade` | 行淡入淡出。\
    \ |\n| `.Right` | 插入的行从右侧滑入；删除的行向右侧滑出。 |\n| `.Left` | 插入的行从左侧滑入；删除的行向左侧滑出。 |\n\
    | `.Top` | 插入的行从上一行的底部向下滑入；删除的行向上一行的底部向上滑出。 |\n| `.Bottom` | 插入的行从下方单元格的顶部向上滑入；删除的行看起来被下方滑上的单元格覆盖。\
    \ |\n| `.None` | 插入的行直接出现；删除的行直接消失。 |\n| `.Middle` | 单元格以手风琴风格的效果进行插入和删除。 |\n\
    | `.Automatic` | `tableView`自动选择合适的动画样式。 |\n\n值得注意的是，如果尝试对位于`tableView`最顶部或最底部的行应用`Top`、`Bottom`和`Middle`样式，可能会产生一些奇特的效果。\n\
    \n正因如此，`UITableViewRowAnimationAutomatic`会根据正在执行动画的行自动应用正确的顶部、底部或中间样式。这节省了大量工作，因此除非你有非常充分的理由不这样做，否则这是首选方式。\n"
- fmt: "# Swipe-Style Row Deletions\n\nIn addition to the “tap-Edit-and-then-tap-the-Delete-control-and-then-tap-the-Delete-button”\
    \ approach to deleting rows, `UITableView` provides another option. Swiping from\
    \ side to side in the cell will cause a `Delete` button to slide in from the right\
    \ side. Tapping the button will then call the `commitEditingStyle` function as\
    \ usual.\n\nBecause it’s a user-initiated action, the call to `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ is bracketed by two other calls: `tableView:willBeginEditingRowAtIndexPath:`\
    \ and `tableView:didEndEditingRowAtIndexPath:`.\n\nThere are a couple of reasons\
    \ why I think this is a Bad Idea, and you shouldn’t implement it:\n\n- It is hidden\
    \ functionality. Until the user swipes over the row, there’s no indication that\
    \ this action will trigger any effect. Neither is it intuitive how to cancel the\
    \ action. Tapping elsewhere in the cell will do so, but that runs the risk of\
    \ accidentally tapping the `Delete` button by mistake.\n- Using a swipe in a row\
    \ to trigger the `Delete` action means that this action isn’t available for other,\
    \ potentially more useful actions, such as revealing controls “underneath” the\
    \ row. (Yes, I know this contradicts my first point, but if you’re going to use\
    \ “hidden” gestures to trigger actions, at least make the actions the most useful\
    \ ones!).\n\nThere’s a counter-argument, of course. The swipe-to-delete approach\
    \ is a standard part of iOS table views that’s used extensively in apps such as\
    \ Mail, so users may tend to expect it. Apple’s user interface designers are very\
    \ clever people, and they clearly think it’s okay.\n\nHowever, if I have managed\
    \ to convince you that enabling swipe-to-delete is a Bad Thing, here’s how to\
    \ disable it. Swiping in the cell triggers the `tableView:editingStyleForRowAtIndexPath:`\
    \ function. By default, this always returns `UITableViewCellEditingStyle.Delete`.\
    \ If you want to restrict cell editing unless the table is in editing mode, you\
    \ can test for this before returning the editing style. That’s what Listing 12-15\
    \ does.\n\n**Listing 12-15.** Disabling Swipe-to-Delete\n\n```\nfunc tableView(tableView:\
    \ UITableView, editingStyleForRowAtIndexPath indexPath:\nNSIndexPath) -> UITableViewCellEditingStyle\
    \ {\n    if tableView.editing {\n        return UITableViewCellEditingStyle.Delete\n\
    \    }\n    return UITableViewCellEditingStyle.None\n}\n```\n\nUnless the table\
    \ is in editing mode (that is, `tableView.editing == true`), this function will\
    \ return `UITableViewCellEditingStyle.None`, preventing the Delete control from\
    \ being shown.\n\n## Dealing with Row Insertions\n\nIf your app needs to handle\
    \ row deletions, there’s a fair chance it will also need to deal with row insertions.\
    \ This process is not too dissimilar to dealing with deletions.\n\n1. Put the\
    \ table into editing mode.\n2. Check whether the row can be edited.\n3. Return\
    \ the editing style for the row in question (in this case, `UITableViewEditingStyle.Insert`).\n\
    4. Handle whatever actions are needed to create a new object model—for example,\
    \ presenting a modal data entry view.\n5. Commit the editing action with `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ and then update the model.\n6. Update the table by inserting a row with `insertRowAtIndexPath:withAnimation:`.\n\
    \nThe first two steps we’ve already covered with the deletion process. The third\
    \ is a little more involved, so let’s look at it.\n\nA common requirement is a\
    \ need to insert a new row to the end of a table or a section. There are a couple\
    \ of ways that this could be approached. One option is to place an `Add` button\
    \ onto the navigation bar in a similar way to the `Edit/Done` button that you\
    \ saw earlier.\n\nThe downside to this approach is that you may already have an\
    \ `Edit` button in place—or you might not have a navigation bar at all. In this\
    \ case, a different approach is needed: placing the call to action into the table\
    \ itself, as shown in Figure 12-15.\n\n![A978-1-4842-1242-4_12_Fig15_HTML.jpg](A978-1-4842-1242-4_12_Fig15_HTML.jpg)\n\
    \n**Figure 12-15.** The call to action in the table\n\nTapping the `Add New Row`\
    \ row when the table is not in editing mode will switch it into editing mode.\
    \ Tapping any other row will result in the “normal” row selection actions.\n\n\
    Regardless of how the table entered editing mode, the `Add New Row` row will show\
    \ an Insert control, while all the other rows will show a Delete control (shown\
    \ in Figure 12-16).\n\n![A978-1-4842-1242-4_12_Fig16_HTML.jpg](A978-1-4842-1242-4_12_Fig16_HTML.jpg)\n\
    \n**Figure 12-16.** The table in editing mode\n\n### Amending the Data Model\n\
    \nThe `Add New Row` item needs to appear in the last row. One option is to add\
    \ this to the data model itself, but that would violate the separation of the\
    \ model from the view.\n\nThe “cleaner” alternative is to add the row when the\
    \ table gets reloaded. First, you need to tell the table to expect an extra row,\
    \ as shown in Listing 12-16.\n\n**Listing 12-16.** The Updated `tableView:numberOfRowsInSection:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n    return tableData.count + 1\n}\n```\n\nAnd then add\
    \ the extra row in the `tableView:cellForRowAtIndexPath:` function, as shown in\
    \ Listing 12-17.\n\n**Listing 12-17.** The Updated `tableView:cellForRowAtIndexPath:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, cellForRowAtIndexPath\
    \ indexPath: NSIndexPath) \n-> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\n    forIndexPath: indexPath)\n    if indexPath.row == tableData.count\
    \ {\n        cell.textLabel?.text = \"Add new row\"\n        cell.textLabel?.textColor\
    \ = UIColor.darkGrayColor()\n    } else {\n        cell.textLabel?.text = tableData[indexPath.row]\n\
    \    }\n    return cell\n}\n```\n\nThe magic happens after the cell is created.\
    \ If the function is dealing with the last row (in other words, the `indexPath`’s\
    \ row value is the same as the number of items in the data model), then the `cell.textLabel.text`\
    \ property is set to “`Add New Row`”.\n\n> **Note:** Bear in mind that while `indexPath`\
    \ values start from `0`, counting the number of elements in the data model starts\
    \ from 1. Hence—usually—the `indexPath`'s `row` value for the final item in the\
    \ table will be `(tableData.count - 1)`. If the `indexPath`'s `row` value equals\
    \ `tableData.count`, you’re actually one row beyond the end of the array, and\
    \ therefore you need to insert the `Add New Row` item here."
  raw: '#### Swipe-Style Row Deletions


    In addition to the “tap-Edit-and-then-tap-the-Delete-control-and-then-tap-the-Delete-button”
    approach to deleting rows, `UITableView` provides another option. Swiping from
    side to side in the cell will cause a `Delete` button to slide in from the right
    side. Tapping the button will then call the `commitEditingStyle` function as usual.


    Because it’s a user-initiated action, the call to `tableView:commitEditingStyle:forRowAtIndexPath:`
    is bracketed by two other calls: `tableView:` `willBeginEditingRowAtIndexPath`
    `:` and `tableView:` `didEndEditingRowAtIndexPath` `:`.


    There are a couple of reasons why I think this is a Bad Idea, and you shouldn’t
    implement it:


    *   It is hidden functionality. Until the user swipes over the row, there’s no
    indication that this action will trigger any effect. Neither is it intuitive how
    to cancel the action. Tapping elsewhere in the cell will do so, but that runs
    the risk of accidentally tapping the Delete button by mistake.

    *   Using a swipe in a row to trigger the Delete action means that this action
    isn’t available for other, potentially more useful actions, such as revealing
    controls “underneath” the row. (Yes, I know this contradicts my first point, but
    if you’re going to use “hidden” gestures to trigger actions, at least make the
    actions the most useful ones!).


    There’s a counter-argument, of course. The swipe-to-delete approach is a standard
    part of iOS table views that’s used extensively in apps such as Mail, so users
    may tend to expect it. Apple’s user interface designers are very clever people,
    and they clearly think it’s okay.


    However, if I have managed to convince you that enabling swipe-to-delete is a
    Bad Thing, here’s how to disable it. Swiping in the cell triggers the `tableView:editingStyleForRowAtIndexPath:`
    function. By default, this always returns `UITableViewCellEditingStyle` `.Delete`.
    If you want to restrict cell editing unless the table is in editing mode, you
    can test for this before returning the editing style. That’s what Listing [12-15](#A978-1-4842-1242-4_12_Chapter.html#FPar20)
    does.


    Listing 12-15. Disabling Swipe-to-Delete


    `func tableView(tableView: UITableView, editingStyleForRowAtIndexPath indexPath:➤`


    `NSIndexPath) -> UITableViewCellEditingStyle {`


        `if tableView.editing {`


            `return UITableViewCellEditingStyle.Delete`


        `}`


        `return UITableViewCellEditingStyle.None`


    `}`


    Unless the table is in editing mode (that is, `tableView.editing == true`), this
    function will return `UITableViewCellEditingStyle.None`, preventing the Delete
    control from being shown.


    ### Dealing with Row Insertions


    If your app needs to handle row deletions, there’s a fair chance it will also
    need to deal with row insertions. This process is not too dissimilar to dealing
    with deletions.


    Put the table into editing mode.   Check whether the row can be edited.   Return
    the editing style for the row in question (in this case, `UITableViewEditingStyle.Insert`).
      Handle whatever actions are needed to create a new object model—for example,
    presenting a modal data entry view.   Commit the editing action with `tableView:commitEditingStyle:➤
    forRowAtIndexPath:` and then update the model.   Update the table by inserting
    a row with `insertRowAtIndexPath:withAnimation:`.  


    The first two steps we’ve already covered with the deletion process. The third
    is a little more involved, so let’s look at it.


    A common requirement is a need to insert a new row to the end of a table or a
    section. There are a couple of ways that this could be approached. One option
    is to place an Add button onto the navigation bar in a similar way to the Edit/Done
    button that you saw earlier.


    The downside to this approach is that you may already have an Edit button in place—or
    you might not have a navigation bar at all. In this case, a different approach
    is needed: placing the call to action into the table itself, as shown in Figure
    [12-15](#A978-1-4842-1242-4_12_Chapter.html#Fig15).


    ![A978-1-4842-1242-4_12_Fig15_HTML.jpg](A978-1-4842-1242-4_12_Fig15_HTML.jpg)


    Figure 12-15.


    The call to action in the table


    Tapping the `Add New Row` row when the table is not in editing mode will switch
    it into editing mode. Tapping any other row will result in the “normal” row selection
    actions.


    Regardless of how the table entered editing mode, the `Add New Row` row will show
    an Insert control, while all the other rows will show a Delete control (shown
    in Figure [12-16](#A978-1-4842-1242-4_12_Chapter.html#Fig16)).


    ![A978-1-4842-1242-4_12_Fig16_HTML.jpg](A978-1-4842-1242-4_12_Fig16_HTML.jpg)


    Figure 12-16.


    The table in editing mode


    #### Amending the Data Model


    The Add New Row item needs to appear in the last row. One option is to add this
    to the data model itself, but that would violate the separation of the model from
    the view.


    The “cleaner” alternative is to add the row when the table gets reloaded. First,
    you need to tell the table to expect an extra row, as shown in Listing [12-16](#A978-1-4842-1242-4_12_Chapter.html#FPar21).


    Listing 12-16. The Updated `tableView:numberOfRowsInSection:` Function


    `func tableView(tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {`


        `return tableData.count + 1`


    `}`


    And then add the extra row in the `tableView:cellForRowAtIndexPath:` function,
    as shown in Listing [12-17](#A978-1-4842-1242-4_12_Chapter.html#FPar22).


    Listing 12-17. The Updated `tableView:cellForRowAtIndexPath:`Function


    `func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)
    ➤`


    `-> UITableViewCell {`


        `let cell = tableView.dequeueReusableCellWithIdentifier("CellIdentifier",➤`


        `forIndexPath: indexPath)`


        `if indexPath.row == tableData.count {`


            `cell.textLabel?.text = "Add new row"`


            `cell.textLabel?.textColor = UIColor.darkGrayColor()`


        `} else {`


            `cell.textLabel?.text = tableData[indexPath.row]`


        `}`


        `return cell`


    `}`


    The magic happens after the cell is created. If the function is dealing with the
    last row (in other words, the `indexPath`’s row value is the same as the number
    of items in the data model), then the `cell.textLabel.text` property is set to
    “`Add New Row`”.


    Note


    Bear in mind that while `indexPath` values start from `0`, counting the number
    of elements in the data model starts from 1. Hence—usually—the `indexPath`‘s `row`
    value for the final item in the table will be `(tableData.count – 1)`. If the
    `indexPath`’s `row` value equals `tableData. count`, you’re actually one row beyond
    the end of the array, and therefore you need to insert the Add New Row item here.'
  trans: "\n# 滑动式行删除\n\n除了“点击编辑->点击删除控件->点击删除按钮”这种删除行的方式外，`UITableView`还提供了另一种选项。在单元格上横向滑动，会从右侧滑入一个`删除`按钮。点击该按钮将照常调用`commitEditingStyle`函数。\n\
    \n由于这是用户发起的操作，对`tableView:commitEditingStyle:forRowAtIndexPath:`的调用会被另外两个调用所包围：`tableView:willBeginEditingRowAtIndexPath:`和`tableView:didEndEditingRowAtIndexPath:`。\n\
    \n基于几个原因，我认为这是一个糟糕的设计，你不应该实现它：\n\n- 这是隐藏的功能。在用户滑动行之前，没有任何迹象表明这个操作会触发任何效果。如何取消该操作也不直观。在单元格其他地方点击可以取消，但这有可能意外误触`删除`按钮。\n\
    - 在行内使用滑动来触发`删除`操作，意味着该操作无法用于其他可能更有用的行为，例如显示行“下方”的控件。（是的，我知道这与我第一点矛盾，但如果你要用“隐藏”手势触发操作，至少要让这些操作成为最有用的那些！）。\n\
    \n当然，也有反对意见。滑动删除方法是 iOS 表格视图的标准功能，在邮件等应用中广泛使用，因此用户可能倾向于期待它。苹果的用户界面设计师非常聪明，他们显然认为这样做没问题。\n\
    \n不过，如果我说服了你启用滑动删除是个糟糕设计，下面介绍如何禁用它。在单元格内滑动会触发`tableView:editingStyleForRowAtIndexPath:`函数。默认情况下，该函数始终返回`UITableViewCellEditingStyle.Delete`。如果你想限制仅在表格处于编辑模式时才允许单元格编辑，你可以在返回编辑样式前进行检测。清单\
    \ 12-15 演示了这一点。\n\n**清单 12-15.** 禁用滑动删除\n\n```\nfunc tableView(tableView: UITableView,\
    \ editingStyleForRowAtIndexPath indexPath:\nNSIndexPath) -> UITableViewCellEditingStyle\
    \ {\n    if tableView.editing {\n        return UITableViewCellEditingStyle.Delete\n\
    \    }\n    return UITableViewCellEditingStyle.None\n}\n```\n\n除非表格处于编辑模式（即`tableView.editing\
    \ == true`），否则此函数将返回`UITableViewCellEditingStyle.None`，从而阻止显示删除控件。\n\n## 处理行插入\n\
    \n如果你的应用需要处理行删除，那么很可能也需要处理行插入。这个过程与处理删除并没有太大不同。\n\n1. 将表格置于编辑模式。\n2. 检查该行是否可编辑。\n\
    3. 返回相应行的编辑样式（此处为`UITableViewEditingStyle.Insert`）。\n4. 处理创建新对象模型所需的任何操作——例如，弹出一个模态数据录入视图。\n\
    5. 使用`tableView:commitEditingStyle:forRowAtIndexPath:`提交编辑操作，然后更新模型。\n6. 通过`insertRowAtIndexPath:withAnimation:`插入一行来更新表格。\n\
    \n前两步我们已经在删除过程中介绍过了。第三步稍微复杂一些，我们来看看。\n\n一个常见的需求是在表格或分组的末尾插入新行。有几种方法可以实现。一种选择是在导航栏上放置一个`添加`按钮，类似于之前看到的`编辑/完成`按钮。\n\
    \n这种方法的缺点是，你可能已经有一个`编辑`按钮——或者根本就没有导航栏。在这种情况下，需要采用不同的方法：将操作入口放在表格本身中，如图 12-15 所示。\n\
    \n![A978-1-4842-1242-4_12_Fig15_HTML.jpg](img/A978-1-4842-1242-4_12_Fig15_HTML.jpg)\n\
    \n**图 12-15.** 表格中的操作入口\n\n当表格不处于编辑模式时，点击`添加新行`行会将其切换到编辑模式。点击任何其他行则会执行“常规”的行选择操作。\n\
    \n无论表格是如何进入编辑模式的，`添加新行`行都会显示一个插入控件，而所有其他行都会显示一个删除控件（如图 12-16 所示）。\n\n![A978-1-4842-1242-4_12_Fig16_HTML.jpg](img/A978-1-4842-1242-4_12_Fig16_HTML.jpg)\n\
    \n**图 12-16.** 处于编辑模式的表格\n\n### 修改数据模型\n\n`添加新行`项必须出现在最后一行。一种选择是将其添加到数据模型本身，但这会违反模型与视图的分离原则。\n\
    \n更“干净”的替代方案是在表格重新加载时添加该行。首先，你需要告诉表格预期会多出一行，如清单 12-16 所示。\n\n**清单 12-16.** 更新后的`tableView:numberOfRowsInSection:`函数\n\
    \n```\nfunc tableView(tableView: UITableView, numberOfRowsInSection section: Int)\
    \ -> Int {\n    return tableData.count + 1\n}\n```\n\n然后在`tableView:cellForRowAtIndexPath:`函数中添加额外的一行，如清单\
    \ 12-17 所示。\n\n**清单 12-17.** 更新后的`tableView:cellForRowAtIndexPath:`函数\n\n```\n\
    func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ \n-> UITableViewCell {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"\
    CellIdentifier\",\n    forIndexPath: indexPath)\n    if indexPath.row == tableData.count\
    \ {\n        cell.textLabel?.text = \"添加新行\"\n        cell.textLabel?.textColor\
    \ = UIColor.darkGrayColor()\n    } else {\n        cell.textLabel?.text = tableData[indexPath.row]\n\
    \    }\n    return cell\n}\n```\n\n神奇之处发生在单元格创建之后。如果该函数处理的是最后一行（换句话说，`indexPath`的行值与数据模型中的项目数量相同），那么`cell.textLabel.text`属性就会被设置为“`添加新行`”。\n\
    \n> **注意：** 请记住，`indexPath`值从`0`开始，而计算数据模型中的元素数量是从`1`开始的。因此——通常情况下——表格中最后一项的`indexPath`的`row`值会是`(tableData.count\
    \ - 1)`。如果`indexPath`的`row`等于`tableData.count`，那么实际上你已经超出了数组末尾一行，因此需要在此插入`添加新行`项。\n"
- fmt: "### Working with the New Row\n\nHaving created the new row, you now have to\
    \ handle the user interaction. When the row is tapped, you want the table to enter\
    \ editing mode, which means revising the `tableView:didSelectRowAtIndexPath:`\
    \ function in Listing [12-18](#A978-1-4842-1242-4_12_Chapter.html#FPar24).\n\n\
    **Listing 12-18.** The `tableView:` `didSelectRowAtIndexPath` `:` Function\n\n\
    ```\nfunc tableView(tableView: UITableView, didSelectRowAtIndexPath indexPath:\
    \ NSIndexPath) {\n    if (indexPath.row == tableData.count) {\n        // put\
    \ table into edit mode\n        tableView.setEditing(true, animated: true)\n \
    \   } else {\n        // Handle \"normal\" selection\n    }\n}\n```\n\nAgain,\
    \ you test to see whether the selected row is the one at the end of the table.\
    \ If it is, you override the default `setEditing:animated:` function to put the\
    \ cell into editing mode, as shown in Listing [12-19](#A978-1-4842-1242-4_12_Chapter.html#FPar25).\n\
    \n**Listing 12-19.** The Custom `setEditing:animated:`Function\n\n```\noverride\
    \ func setEditing(editing: Bool, animated: Bool) {\n    tableView.setEditing(!tableView.editing,\
    \ animated: true)\n}\n```\n\nYou will need to amend the `tableView:editingStyleForRowAtIndexPath:`\
    \ function to supply the insertion control to the last row (shown in Listing [12-20](#A978-1-4842-1242-4_12_Chapter.html#FPar26)).\n\
    \nAfter the table is in editing mode, it’s up to the user to either edit something\
    \ with the Delete or Insert controls, or take the table out of editing mode.\n\
    \nIf they do the latter, you don’t need to worry about responding to their action.\
    \ The updated `setEditing:animated:` function will handle that.\n\nAn editing\
    \ action, on the other hand, is something you need to handle.\n\n**Listing 12-20.**\
    \ Handling an Editing Action\n\n```\nfunc tableView(tableView: UITableView, editingStyleForRowAtIndexPath\
    \ indexPath: NSIndexPath) -> UITableViewCellEditingStyle {\n    if tableView.editing\
    \ {\n        if (indexPath.row == tableData.count) {\n            return UITableViewCellEditingStyle.Insert;\n\
    \        } else {\n            return UITableViewCellEditingStyle.Delete;\n  \
    \      }\n    }\n    return UITableViewCellEditingStyle.None\n}\n```\n\nTapping\
    \ a row’s control will fire the `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ function, supplying references to the `tableView` itself, the row that was tapped,\
    \ and the type of control.\n\nThere are two possibilities here: a `UITableViewCellEditingStyle.Delete`\
    \ or a `UITableViewCellEditingStyle.Insert`. If it’s a `delete`, then you handle\
    \ it as you did previously: remove the object from the relevant index of the data\
    \ model and then delete the row from the table.\n\nAn `insert`, on the other hand,\
    \ needs the opposite approach. First, you need a new object. For demonstration\
    \ purposes, create an `NSString` containing a date stamp:\n\n```\nlet thingToInsert\
    \ = \"\\(NSDate())\"\n```\n\nThen, this new object needs to be added to the data\
    \ model. It’s important that this takes place before the table gets updated, because\
    \ the table will need to determine the number of rows it now has in order to be\
    \ able to insert the new row:\n\n```\ntableData.append(thingToInsert)\n```\n\n\
    `Array`’s `append` function inserts the new object at the end of the existing\
    \ array, but you could, of course, insert it at a particular position with the\
    \ `append(:atIndex:)` function.\n\nNow that you have the new object safely stored\
    \ in the data model, you can insert the new row into the table. You’ll want this\
    \ to appear in the penultimate row—above Add New Row, but below the existing rows\
    \ (along the lines of Figure [12-17](#A978-1-4842-1242-4_12_Chapter.html#Fig17)).\n\
    \n![A978-1-4842-1242-4_12_Fig17_HTML.jpg](A978-1-4842-1242-4_12_Fig17_HTML.jpg)\n\
    \n**Figure 12-17.** The newly inserted row\n\n`UITableView`’s `insertRowsAtIndexPath:`\
    \ `withRowAnimation:` takes an `Array` of `IndexPath` objects where new rows are\
    \ required and calls the `tableView`’s `cellForRowAtIndexPath:` function to fill\
    \ them.\n\nIt’ll automatically shift existing rows down. Your table currently\
    \ has ten rows, and your `indexPath.row` value is `9` (remember, table rows are\
    \ zero-indexed.) Inserting a new row at `indexPath.row` 9 will cause whatever’s\
    \ currently in that row to be shifted down to the new `indexPath.row` 10.\n\n\
    ```\ntableView.insertRowsAtIndexPaths([indexPath], withRowAnimation: UITableViewRowAnimation.Automatic)\n\
    ```\n\nThe `UITableViewRowAnimation.Automatic` value will force the `tableView`\
    \ to take care of moving existing rows around to keep the animation seamless.\n\
    \nPutting that all together (with a little bit of refactoring to keep the function\
    \ tidy) looks like Listing [12-21](#A978-1-4842-1242-4_12_Chapter.html#FPar27).\n\
    \n**Listing 12-21.** The Completed `commitEditingStyle:` Function\n\n```\nfunc\
    \ tableView(tableView: UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle,\
    \ forRowAtIndexPath indexPath: NSIndexPath) {\n    if (editingStyle == UITableViewCellEditingStyle.Delete)\
    \ {\n        tableData.removeAtIndex(indexPath.row)\n        tableView.deleteRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)\n    } else if (editingStyle\
    \ == UITableViewCellEditingStyle.Insert) {\n        let thingToInsert = \"\\(NSDate())\"\
    \n        tableData.append(thingToInsert)\n        tableView.insertRowsAtIndexPaths([indexPath],\
    \ withRowAnimation: UITableViewRowAnimation.Automatic)\n    }\n}\n```\n\n## Rearranging\
    \ Tables\n\nIn addition to inserting and deleting rows and sections, you can also\
    \ rearrange them, both programmatically and through user actions.\n\nThe rearrangement\
    \ process is similar to the insertion and deletion process, as shown in Figure\
    \ [12-18](#A978-1-4842-1242-4_12_Chapter.html#Fig18).\n\n![A978-1-4842-1242-4_12_Fig18_HTML.jpg](A978-1-4842-1242-4_12_Fig18_HTML.jpg)\n\
    \n**Figure 12-18.** The row rearrangement process  \n\n- The table enters editing\
    \ mode.  \n- The `tableView`’s `delegate` is consulted about the permissibility\
    \ of moving the row.  \n- The row gets moved.  \n- The data model is updated.\n\
    \n### Entering Editing Mode\n\nIn order to rearrange rows, the table needs to\
    \ be in editing mode. As with deletions, there are two ways of doing this. In\
    \ the case of `UITableViewController` subclasses, the user can tap the navigation\
    \ bar’s Edit button or override the `tableView`’s `setEditing:animated:` function.\n\
    \nIn order for the rearrange control to be displayed, you need to implement the\
    \ `tableView(moveRowAtIndexPath:toIndexPath)` function, as shown in Listing [12-22](#A978-1-4842-1242-4_12_Chapter.html#FPar28).\n\
    \n**Listing 12-22.** The Custom `setEditing:animated:` Function\n\n```\nfunc tableView(tableView:\
    \ UITableView, moveRowAtIndexPath sourceIndexPath: NSIndexPath, toIndexPath destinationIndexPath:\
    \ NSIndexPath) {\n    //\n}\n```\n\nThis doesn’t do anything yet, but it’s necessary\
    \ to get the table to show the rearrangement control.\n\n### Checking Whether\
    \ Rows Can Be Moved\n\nAs the `tableView` enters editing mode, it asks the delegate\
    \ whether each visible row can be moved by calling the `tableView:canMoveRowAtIndexPath:`\
    \ function. This returns either `true` or `false`. Returning `false` will enable\
    \ you to “lock” particular rows into place.\n\nFor example, if you have an “`Add\
    \ New Row`” row at the bottom of the table, it doesn’t make sense to be able to\
    \ move this. Listing [12-23](#A978-1-4842-1242-4_12_Chapter.html#FPar29) shows\
    \ how you’d “lock” this row into place.\n\n**Listing 12-23.** The `tableView:canMoveRowAtIndexPath:`\
    \ Function\n\n```\nfunc tableView(tableView: UITableView, canMoveRowAtIndexPath\
    \ indexPath: NSIndexPath) -> Bool {\n    if (indexPath.row == tableData.count)\
    \ {\n        return false\n    }\n    return true\n}\n```"
