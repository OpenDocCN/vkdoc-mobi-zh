    The `layoutSubviews` function is called on the cell when it’s dequeued; it’s a
    opportunity to tweak the layout and look of the cell before it’s drawn, and also
    to set the content of any controls based on the data model passed into the cell.


    To show how this works in practice, let’s look at the `cellForItemAtIndexPath:`
    function from the collection view app’s `viewController` class, in Listing [8-11](#A978-1-4842-1242-4_8_Chapter.html#FPar16).


    Listing 8-11. The Collection View’s cellForItemAtIndexPath: Function


