- fmt: '# Working with the `UITableView` Family


    At the heart of the table view are the classes, protocols, and view objects that
    make up the members of the `UITableView` family:


    - The `UITableView` and `UITableViewController` classes

    - The `UITableViewDelegate` and `UITableViewDataSource` protocols

    - The `UITableView` and `UITableViewCell` view objects


    All six work together. The classes provide the core functionality for the table
    view, the protocols define various data and interaction methods, and the view
    objects provide the physical user interface.


    ## The `UITableView` Class Hierarchy


    The `UITableView` class is a subclass of `UIScrollView`, which in turn inherits
    from `UIView`, `UIResponder`, and ultimately `NSObject`, as shown in Figure 2-2.


    ![A978-1-4842-1242-4_2_Fig2_HTML.jpg](A978-1-4842-1242-4_2_Fig2_HTML.jpg)

    *Figure 2-2. The `UITableView` inheritance chain*


    This means that `UITableView` benefits from much of the functionality provided
    by its parent classes. For example, `UIScrollView` provides the scrolling of the
    table, while `UIResponder` allows the table cells to respond to user touches and
    swipes.


    > **Note:** In an attempt to reduce confusion, I’ll use `UITableView` when I’m
    referring to the class, `tableView` when I’m referring to a specific instance
    of a `UITableView`, and “table view” when I’m talking about table views in general.


    ## Choosing the Type of Table View


    Although their visual appearance can be customized to the point where it’s almost
    difficult to recognize them as instances of the `UITableView` class at all, table
    views come in one of two basic forms: plain and grouped. These basic types have
    two variations: indexed and sectioned.


    ### The Plain Table


    The plain table is the basic vanilla incarnation of the `UITableView`. Figure
    2-3 shows an example (with possibly the dullest content imaginable).


    ![A978-1-4842-1242-4_2_Fig3_HTML.jpg](A978-1-4842-1242-4_2_Fig3_HTML.jpg)

    *Figure 2-3. A plain table view and its components*


    The plain table is the version that is created by default when dragging into a
    view in Interface Builder, although the type can be specified when creating a
    table view in code:


    ```

    var tableView: UITableView = UITableView(frame: tvFrame, style:.Plain)

    ```


    If the number of rows in the `tableView` doesn’t fit in the frame, the table can
    be scrolled to reveal more rows. Scroll indicators appear in the right-hand scroll
    area when the table is in motion.


    ### The Indexed Table


    The indexed table builds on the plain table by adding an extra navigation aid
    in the form of an index that appears on the right-hand side of the table view,
    adjacent to the scroll area. Figure 2-4 shows an example.


    ![A978-1-4842-1242-4_2_Fig4_HTML.jpg](A978-1-4842-1242-4_2_Fig4_HTML.jpg)

    *Figure 2-4. An indexed table*


    Implementing indexes involves `UITableViewDataSource` protocol methods, and is
    covered in detail in Chapter 11.


    ### The Sectioned Table


    The sectioned table, as its name suggests, groups its rows into sections. These
    sections can have headers. Figure 2-5 shows an example of relatively simple text
    headers, which could be replaced with complex `UIView` objects if needed.


    ![A978-1-4842-1242-4_2_Fig5_HTML.jpg](A978-1-4842-1242-4_2_Fig5_HTML.jpg)

    *Figure 2-5. A simple sectioned table*


    This type of table view utilizes several `UITableViewDataSource` protocol methods
    to configure the behavior of the sections, and is covered in Chapter 11.


    ### The Grouped Table


    The grouped table takes things one step further by separating the sections into
    a style that is distinct from the table view’s background. Figure 2-6 shows the
    difference between sections and groups.


    ![A978-1-4842-1242-4_2_Fig6_HTML.jpg](A978-1-4842-1242-4_2_Fig6_HTML.jpg)

    *Figure 2-6. Comparing sections and groups*


    Each section has a header and footer. These are `UIViews`, and are returned by
    two `UITableViewDelegate` methods:


    ```

    func tableView(tableView: UITableView, viewForFooterInSection section: Int) ->
    UIView?

    func tableView(_ tableView: UITableView, viewForHeaderInSection section: Int)
    -> UIView?

    ```


    Although you can manipulate the view that comprises the entire header and footer,
    often it’s enough just to be able to set the titles. `UITableViewDataSource` has
    two methods to support this:


    ```

    func tableView(tableView: UITableView, titleForHeaderInSection section: Int) ->
    String?

    func tableView(tableView: UITableView, titleForFooterInSection section: Int) ->
    String?

    ```


    If for any reason you need to find the dimensions of the headers and footers,
    the `UITableView` can return these as `CGRect` values with the following methods:


    ```

    func rectForHeaderInSection(_ section: Int) -> CGRect

    func rectForFooterInSection(_ section: Int) -> CGRect

    ```


    The dimensions of the entire section (header, footer, and content) are available
    by calling the following:


    ```

    func rectForSection(_ section: Int) -> CGRect

    ```


    ## Setting `TableView` Dimensions


    One way to visualize a `tableView` is to think of it as a window that provides
    a view of a conveyor belt of cells. The number of cells that are visible through
    the window depends on the size of the window—indicated by the `tableView`’s `frame`
    property—and the height of each cell. The `frame` property is a `CGRect` with
    height and width values.


    The overall length of the conveyor belt—or more properly, the height of the `tableView`
    in points—is available through the `contentSize` property, which returns a `CGSize`.
    From there you can access the `width` and `height` values.


    At the top and bottom of each “belt” of cells, you can add a `UIView` as a static
    header and footer. These are set through the `tableHeaderView` and `tableFooterView`
    properties, respectively. Figure 2-7 illustrates a `tableView`’s dimensions.


    ![A978-1-4842-1242-4_2_Fig7_HTML.jpg](A978-1-4842-1242-4_2_Fig7_HTML.jpg)

    *Figure 2-7. The dimensions of a `tableView`*


    The cells that are visible at any given moment can be accessed en masse through
    the `tableView`’s `visibleCells` property. This is an `Array` and is updated as
    the table scrolls up and down.


    ## Controlling the Background of a `UITableView`


    Setting an image as the background of a `UITableView` is possible, albeit slightly
    convoluted. There are four steps:


    1. Create an instance of a `UIImageView` and set its `image` property to the image
    that you want to appear behind the table: `let tableBackgroundImage = UIImageView(image:
    UIImage(named:"myImage"))`

    2. Set the `UIImageView`’s `frame` property so that it’s the same size as that
    of the `tableView`: `tableBackgroundImage.frame = tableView.frame`

    3. Update the `tableView`’s `backgroundImage` property to point to your new `UIImageView`
    object: `tableView.backgroundView = tableBackgroundImage`

    4. Set the background color of the table’s cells to `clearColor` so that the background
    image can be seen: `cell.backgroundColor = UIColor.clearColor()`'
