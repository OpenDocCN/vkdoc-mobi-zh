    \ shown in Listing [10-1](#A978-1-4842-1242-4_10_Chapter.html#FPar5).\n\n**Listing\
    \ 10-1. Name.swift**\n\n```swift\nimport Foundation\n\nstruct Name {\n    var\
    \ nameText: String?\n    var gender: String?\n    var derivation: String?\n  \
    \  var iconName: String?\n    var notes: String?\n}\n```\n\n### Creating Some\
    \ Dummy Data\n\nHaving created a `Name` struct, the next stage is to create some\
    \ dummy data that you can use for prototyping purposes. You need a model to feed\
    \ the `tableView` with data; this is created as the app starts up.\n\nSwitch to\
    \ `TableViewController`, and add a property to hold an `Array` for the table data:\n\
    \n```swift\nvar tableData: [Name]!\n```\n\nNow add an `IBOutlet` to connect to\
    \ the table view (you'll use this later to manage the highlighting of rows after\
    \ the detail view has appeared):\n\n```swift\n@IBOutlet var tableView: UITableView!\n\
    ```\n\nFinally, add another property to hold the number of names that you want\
    \ to display in the table:\n\n```swift\nlet numberOfNames = 25\n```\n\nInitially,\
    \ you're going to create instances of `Name` with nonsense data so you've got\
    \ some data with which you can test out your app. To do this, you need to create\
    \ a function called `createNameWithNonsenseData` that returns—well—a `Name` filled\
    \ with random data.\n\nThen, in the `ViewController's viewDidLoad` function, the\
    \ `tableData` array will be loaded with a suitable number of nonsense `Names`.\n\
    \nYou'll add the two new functions in an extension to the view controller, so\
    \ that the functions relating to the view controller lifecycle are separated from\
    \ your custom functions.\n\nAt the bottom of the `TableViewController` file, add\
    \ the extension; see Listing [10-2](#A978-1-4842-1242-4_10_Chapter.html#FPar6).\n\
    \n**Listing 10-2. Updating the TableViewController**\n\n```swift\nimport UIKit\n\
    \nclass TableViewController: UIViewController {\n\n    var tableData: [Name]!\n\
    \n    @IBOutlet var tableView: UITableView!\n\n    let numberOfNames = 25\n\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
