  trans: '

    ### 降低视图合成的成本


    考虑到设备形态和电池续航的限制，iPhone 和 iPad 的图形处理器性能已经非常强劲。即便如此，它们也存在极限，而突破这些极限的挑战之一便是绘制带有透明效果的视图。


    原因显而易见。粗略来说，设备会从前往后构建视图。如果前层是不透明的，那么在渲染屏幕时，它无需费心考虑后面有什么内容。


    然而，一旦创建了包含透明像素的图层，就必须进行相应的计算。所需的计算越多，渲染过程就越慢。


    如果视图的所有元素都能不透明，那当然再好不过，但现实往往没那么简单。渐变、投影等效果都依赖于透明度才能实现，因此一个完全不透明的界面会显得相当乏味。


    实现最佳应用性能的关键在于，仅在需要的地方使用透明度。这又带来了另一个难题：如何判断哪些是透明的，哪些不是？幸运的是，有工具可以帮到你。


    #### 在模拟器中检查透明度


    模拟器提供了一些常被忽略的工具，可以让你深入探查应用界面的内部构造。其功能之一便是可视化视图中的透明度与混合程度，进而用于微调界面。


    -   `Color blended layers` 高亮显示相互叠加绘制的多个视图层。红色层表示存在需要与下层混合的透明区域，而绿色层则表示不需要混合的不透明区域。完全消除混合图层并非总是可行，但如果你遇到渲染速度问题且界面上显示大量红色，那么就值得深入调查，看看是否可以重新调整界面以尽可能减少混合。

    -   `Color copied images` 会标出颜色格式无法被 GPU 直接处理的图像。在这种情况下，渲染工作将由 CPU 承担。这会带来双倍的成本，因为不仅占用了其他组件所需的资源，而且
    CPU 本身也并非为图像处理而优化的。

    -   `Color misaligned images` 会高亮显示其边界与像素边界不对齐的图像。这会导致额外的渲染需求，从而拖慢速度。这通常是由 `@2x`
    和 `@3x` 尺寸的素材资源大小不匹配造成的。请检查是否存在尺寸为奇数像素的图像资源，如有必要，将其调整为偶数尺寸。

    -   `Color offscreen-rendered` 会高亮显示在主屏幕之外单独渲染的图层。这种情况可能自动发生，因此它本身并不一定表示存在问题，但它是由对图层应用蒙版（masks）引起的，因此在优化界面时，这可能是需要关注的方向。


    图 9-15 展示了 iOS 日历应用中此项高亮功能的实际效果——有趣的是，即使是由苹果工程师构建和优化的应用，仍然存在一定程度的混合。这本身并不是什么坏事——优化性能的关键在于尽可能减少混合。


    ![A978-1-4842-1242-4_9_Fig15_HTML.jpg](img/A978-1-4842-1242-4_9_Fig15_HTML.jpg)


    图 9-15. 视图混合高亮功能演示


    图形处理和图像优化是一个复杂的主题。在开发者门户网站的 WWDC 视频中，有一些关于这些问题和陷阱的精彩深度探讨，非常值得一看。


    ## 本章小结


    在本章中，你学习了如何通过为单元格添加交互，将表格视图从静态数据展示转变为动态效果。实现的方式有很多种：


    -   在单元格内嵌入诸如按钮、开关和滑块等自定义控件

    -   实现下拉刷新功能

    -   为单元格添加手势识别器以支持双击等操作

    -   在表格内容中实现搜索功能


    最后，你学习了一些确保表格视图性能尽可能流畅的流程。


    # 10. 使用表格进行导航


    导航控制器几乎是 iOS 用户界面中无处不在的功能。它使用户能够以简单一致的方式，在内容层级中导航，浏览内容项的结构树。


    这类用户界面模式的例子比比皆是。iPhone 自带的应用“通讯录”就是一个经典例子。联系人以表格视图形式显示，点击某一行会推入一个显示详细信息的视图，如图
    10-1 所示。


    ![A978-1-4842-1242-4_10_Fig1_HTML.jpg](img/A978-1-4842-1242-4_10_Fig1_HTML.jpg)


    图 10-1. iPhone 自带的应用“通讯录”


    这种用户界面模式非常普遍，以至于 iOS SDK 为此提供了一个专用的控制器，为你处理繁重的导航工作。本章将演示如何使用 `UINavigationController`
    创建并配置一个基于导航的应用。


    这需要五个步骤。


    1.  创建应用的基本骨架结构。

    2.  创建一些示例数据来供给 `UINavigationController`。

    3.  构建详情视图。

    4.  将 `UINavigationController` 与详情视图链接起来。

    5.  调整 `UINavigationController` 以自定义其外观。


    我在这里采用的方法有点不寻常，因为你通常会使用 Xcode 提供的模板来创建基于导航控制器的应用。这没问题，但模板为你做了很多事情，同时也掩盖了各个部分如何组合在一起的许多重要细节。


    相比之下，从头开始构建应用将使你很好地理解导航控制器的内部构造。


    ### 导航控制器界面模式


    导航控制器与应用结构的结合方式，总是让我想起俄罗斯套娃。视图嵌入控制器，控制器再嵌入窗口；乍看之下，这似乎复杂得不可思议。


    导航控制器的运作方式类似于网页浏览器的页面历史以及前进和后退按钮。当你访问每个新页面时，该页面就会被添加到浏览器的历史记录中。前进和后退按钮允许你在已访问的页面列表中前后移动。这就是图
    10-2 所示的“通讯录”应用所使用的模式。


    ![A978-1-4842-1242-4_10_Fig2_HTML.jpg](img/A978-1-4842-1242-4_10_Fig2_HTML.jpg)


    图 10-2. 推入和弹出视图


    导航控制器本质上是一个视图控制器栈，而不是一个页面列表。栈顶的视图控制器是可见的，因此要显示一个新的视图控制器，就将其推入栈顶。在视觉上，新的视图控制器通常会从右侧滑入，如图
    10-3 所示。


    ![A978-1-4842-1242-4_10_Fig3_HTML.jpg](img/A978-1-4842-1242-4_10_Fig3_HTML.jpg)


    图 10-3. 将视图控制器推入和弹出导航控制器栈


    当你想“向后”导航时，就将当前视图控制器从栈中弹出，露出下面的那个。通常，栈顶的视图控制器会向右滑出。

