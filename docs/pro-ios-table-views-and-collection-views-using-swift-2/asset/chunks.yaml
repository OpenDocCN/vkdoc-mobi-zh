    Three main methods, listed in Table [5-3](#A978-1-4842-1242-4_5_Chapter.html#Tab3),
    are concerned with providing exactly those three pieces of information. Two of
    the methods are required.


    **Table 5-3.** Cell, Section And Row Methods Of The UITableViewDataSource Protocol


    | Method | Purpose | Required? |

    | --- | --- | --- |

    | `numberOfSectionsInTableView(_:)` | Returns an `Int` for the number of sections
    in the table view | No |

    | `tableView(_:numberOfRowsInSection:)` | Returns an `Int` for the number of rows
    in the given section | Yes |

    | `tableView(_:cellForRowAtIndexPath:)` | Returns a `UITableViewCell` for the
    row at the index path provided | Yes |


    Although the `tableView` needs to know the number of sections required, the default
    value is `1`, which is why you’ll often see `numberOfSectionsInTableView` omitted
    from simple tables.


    ### Title- and Index-Related UITableViewDataSource Methods


    There are four methods that create and manage the table’s titles and indexes.
    Table [5-4](#A978-1-4842-1242-4_5_Chapter.html#Tab4) lists these methods.


    **Table 5-4.** UITableViewDataSource Protocol Title And Section Methods


    | Method | Purpose |

    | --- | --- |

    | `tableView(_:titleForHeaderInSection:)` | Returns a `String` containing the
    header title for the given section |

    | `tableView(_:titleForFooterInSection:)` | Returns a `String` containing the
    footer title for the given section |

    | `sectionIndexTitlesForTableView(:_)` | Returns an optional `Array` of `Strings`
    containing titles for the index list that appears down the right side of an indexed
    table (for example, A, B, C, D, and so on) |

    | `tableView(_:sectionForSectionIndexTitle:atIndex:)` | Returns an `Int` for the
    index number of the section with the given title and section title index |


    ### Insertion-, Removal-, and Reordering-Related UITableViewDataSource Methods


    The remaining `UITableViewDataSource` protocol methods handle inserting, deleting,
    and reordering rows within the `tableView`. Table [5-5](#A978-1-4842-1242-4_5_Chapter.html#Tab5)
    lists these methods.


    **Table 5-5.** Insertion-, Removal-, and Reordering-related UITableViewDataSource
    Methods


    | Method | Purpose |

    | --- | --- |

    | `tableView(_:canEditRowAt IndexPath:)` | Returns a `Bool` that depends on whether
    the given row is flagged as being editable. If this method isn’t implemented,
    the `tableView` assumes that all rows can be edited. |

    | `tableView(_:canMoveRowAt IndexPath:)` | Returns a `Bool` that depends on whether
    the given row is flagged as being able to move within the table. If this method
    isn’t overridden, the default will be `false`. |

    | `tableView(_:moveRowAtIndexPath: toIndexPath:)` | Instructs the `dataSource`
    to move a row from one location to another. This method also needs to update the
    underlying data model if the change is to persist. Doesn’t return a value. |

    | `tableView(_:commitEditingStyle: forRowAtIndexPath:)` | Instructs the `dataSource`
    to commit the insertion or deletion of a row by calling the `insertRowsAtIndexPath:withRowAnimation`
    or `deleteRowsAtIndexPath:withRowAnimation tableView` methods. Doesn’t return
    a value. |


    ## The UICollectionView dataSource


    A `UICollectionView` operates in a very similar way to a `UITableView` when it
    comes to the key pieces of information needed in order to successfully draw itself
    and its cells.


    Specifically, it needs


    *   The number of sections in the collection view

    *   The number of items in each section

    *   The cell for each item within the sections


    The `UICollectionView dataSource` exists to provide this information.


    ### Getting the Number of Sections in the Table


    A simple collection view has only one section, so collection views will assume
    this is 1 unless the `collectionView(_:numberOfSectionsInCollectionView:)` method
    is implemented and returns something different.


    Although `numberOfSectio` `nsInCollectionView` is an optional method, I tend to
    always implement it so that it’s there. Because this is the first method that
    gets called, you can also speed things up by returning `0` if the dataset for
    your collection view is empty—after which the `collectionView` assumes that it’s
    not going to get any additional data, and stops asking.


    ### Getting the Number of Items in the Section


    Assuming that there is data to display, the `numberOfItemsInSection(:_)` method
    is called. The `collectionView` calling the method supplies the section number
    as an integer, and the method returns the number of items (also as an integer).


    ### Getting Cells That Belong To This Item of This Section


    Creating cells to be displayed is at the heart of setting up the `collectionView`.
    This is where your code will need to return an instance of a `UICollectionViewCell`
    for the `collectionView` to display, each time the `collectionView(_:cellForItemAtIndexPath:)`
    method is called.


    The `collectionView` will provide the section and item numbers as an `indexPath`,
    and it’s up to your `cellForItemAtIndexPath` method to retrieve the data from
    the model, create the cell, and return it as quickly as possible.


    ### Getting Supplementary Views That Belong To This Index Path


    Although supplementary views are optional, you provide them in much the same way
    that collection view cells are provided: they are dequeued in response to a request
    from the collection view.


    The `collectionView` will provide the section and item numbers as an `indexPath`
    together with the type of supplementary view required, and the `collectionView(_:viewForSupplementaryElementOfKind:atIndexPath:)`
    method is responsible for retrieving data from the model, creating and configuring
    the supplementary view, and returning it as quickly as possible.


    ### How the Key Information Is Obtained by the Collection View


    The conversation between the four objects involved–the view controller that contains
    the `collectionView`, the `collectionView` itself, and the `delegate` and `dataSource`
    objects belonging to the `collectionView`–takes place in a specific order. This
    is illustrated in Figure [5-11](#A978-1-4842-1242-4_5_Chapter.html#Fig11).


    First, the view controller allocates and instantiates the `collectionView`, and
    it then sets the `delegate` and `dataSource` properties. Once in existence, the
    `collectionView` asks the `dataSource` for the number of sections for itself,
    and the `dataSource` replies with an `NSInteger` value. Then the `collectionView`
    provides a reference to itself and a section number in an `indexPath` instance,
    and asks the `dataSource` for the number of items in that section. Again, the
    `dataSource` replies with an `NSInteger`. The `collectionView` provides a reference
    to itself and the item number in an `indexPath` object, and asks the `dataSource`
    to supply the item for that item. The `dataSource` replies with an instance of
    a `UICollectionViewCell`. Optionally, the `collectionView` provides a reference
    to itself, the item number in an `indexPath` object, and the kind of supplementary
    view required, and asks the `dataSource` to supply the supplementary view for
    that item. The `dataSource` replies with an instance of a `UICollectionViewReusableView`.


    ![A978-1-4842-1242-4_5_Fig11_HTML.jpg](A978-1-4842-1242-4_5_Fig11_HTML.jpg)


    **Figure 5-11.** Messaging between view controller, collectionView, and datasource


    After your `dataSource` provides this information, your `collectionView` is in
    business. These three methods are defined in the `UICollectionViewDataSource`
    protocol.


    ### Which configuration method should I use?


    There are two points in the cell’s lifecycle where it’s possible to configure
    cells that will be displayed in the table – when it’s dequeued or created by the
    datasource; and just before it’s actually displayed in the collection view.'
