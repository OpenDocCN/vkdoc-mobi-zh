- "# 表格视图快速入门\n\n在本章中，你将开始探索表格视图（Table Views）。本章首先概述了什么是表格视图，以及它们在实践中的一些应用示例。接着，在第二节中，你将构建一个简单的“Hello,\
  \ world”风格的表格视图应用，以便向你介绍用户界面背后的组件，并帮助你理解后续章节中将会涉及的细节内容。\n\n如果你是初次接触表格视图，那么在深入那些复杂细节之前，花些时间从头构建一个非常简单的实例是值得的。然而，如果你已经到了对表格视图各组件的组合方式更有信心，并且想直接进入代码编写的阶段，可以完全跳过本章剩余部分。我将在后面详细讲解各个元素，所以你并不会错过什么。\n\
  \n## 什么是表格视图？\n\n在 iOS 应用中，表格视图的示例随处可见。你已经熟悉了作为标准控件实现的简单表格，例如 iPhone 的“设置”应用或 iPad\
  \ 的“邮件”应用，如图 1-1 所示。\n\n![A978-1-4842-1242-4_1_Fig1_HTML.jpg](img/A978-1-4842-1242-4_1_Fig1_HTML.jpg)\n\
  \n图 1-1. 一些基本的基于表格的应用\n\n在另一个极端，表格视图和单元格的默认外观、感觉和行为可以被定制到几乎看不出它们原本是表格视图的程度。图 1-2\
  \ 展示了一些示例。\n\n![A978-1-4842-1242-4_1_Fig2_HTML.jpg](img/A978-1-4842-1242-4_1_Fig2_HTML.jpg)\n\
  \n图 1-2. iPhone 上表格视图在运行中的示例\n\n## 表格视图的构成\n\n表格视图显示一个可以垂直滚动的元素列表，这些元素也称为表格视图单元格。表格视图由两个物理部分组成：\n\
  \n*   容器部分——即 `tableView` 本身——是 `UIScrollView` 的一个子类，包含一个可垂直滚动的表格单元格列表。\n*   表格单元格，可以是四种标准\
  \ `UITableViewCell` 类型之一的实例，也可以是可根据需要定制的 `UITableViewCell` 的自定义子类。\n\n图 1-3 展示了表格视图的组成部分。\n\
  \n![A978-1-4842-1242-4_1_Fig3_HTML.jpg](img/A978-1-4842-1242-4_1_Fig3_HTML.jpg)\n\
  \n图 1-3. 表格视图的基本结构\n\n不过，表格视图不能独立运行；它需要遵循两个 `UITableView` 协议的对象支持：\n\n*   遵循 `UITableViewDatasource`\
  \ 协议的对象为表格视图提供构建和配置自身所需的数据，例如分区和行数。它还创建并提供表格视图要显示的单元格对象。\n*   遵循 `UITableViewDelegate`\
  \ 协议的对象负责处理用户与表格的交互，例如选择、编辑和排序。\n\n一种非常常见的模式是管理表格所在视图的 `UIViewController` 实例同时充当数据源和委托。正如你将在第\
  \ 5 章中看到的，情况并非总是如此；如果这些功能由其他类提供，有助于使应用架构更清晰。\n\n## 创建一个简单的表格视图应用\n\n在本章的剩余部分，你将从头构建一个简单的“Hello,\
  \ world”风格的表格视图应用。它将向你展示容器、单元格、数据源和委托是如何组合在一起的，并为你提供一个可以作为自己实验基础的应用。\n\n我打算刻意放慢速度，并涵盖所有步骤。如果你是一个熟练的\
  \ Xcode 用户，就不需要这样的手把手指导了——只需专注于代码即可。\n\n还在听吗？好的——接下来你要做的是：\n\n*   创建一个简单的、基于窗口的应用骨架。\n\
  *   生成一些数据来填充表格。\n*   创建一个简单的表格视图。\n*   连接表格视图的数据源和委托。\n*   实现一些非常简单的交互功能。\n\n这是一个非常简单但有用的实践。开始吧！\n\
  \n## 创建应用骨架\n\n对于这个应用，你将使用一个简单的结构：一个由视图控制器管理的单一视图，以及一个提供视图内容的 Storyboard 文件。启动 Xcode\
  \ 并选择 Single View Application 模板，如图 1-4 所示。\n\n![A978-1-4842-1242-4_1_Fig4_HTML.jpg](img/A978-1-4842-1242-4_1_Fig4_HTML.jpg)\n\
  \n图 1-4. Xcode 的模板选择窗格\n\n> **注意：** 随着 Xcode 的每次新版本发布，Apple 经常（且毫无意义地）更改包含的模板。你可能会看到与图\
  \ 1-5 所示不同的模板集合。请检查模板的描述，找到提供单一视图应用的模板。\n\n![A978-1-4842-1242-4_1_Fig5_HTML.jpg](img/A978-1-4842-1242-4_1_Fig5_HTML.jpg)\n\
  \n图 1-5. 为应用命名\n\n将应用命名为 `SimpleTable`。你将构建一个 iPhone 版本，但不需要 Core Data 或任何测试。\n\n\
  确保根据需要选择了这些选项，如图 1-5 所示。\n\n最后，你需要选择保存项目的位置。除非你特别需要，否则不必担心为此项目创建本地 Git 仓库。\n\n到达这一步后，你将看到\
  \ Xcode 的项目视图，其中包含应用的初始骨架。假设你坚持使用了 `SimpleTable` 这个应用名，它看起来会像图 1-6 所示。\n\n![A978-1-4842-1242-4_1_Fig6_HTML.jpg](img/A978-1-4842-1242-4_1_Fig6_HTML.jpg)\n\
  \n图 1-6. 显示新骨架应用的初始 Xcode 视图\n\n你会看到项目中包含以下内容：\n\n*   一个应用委托（`AppDelegate.swift`）\n\
  *   一个视图控制器（`ViewController.swift`）\n*   一个 Storyboard 文件（`Main.storyboard`）\n\n\
  在本章结尾，你将再次审视这些文件是如何组合在一起的。目前，你将处理视图控制器和 Storyboard 文件。\n\n此时，你可以运行应用来验证它是否能正确编译。前往\
  \ Product ➤ Run 或按下 Command+R，你将看到应用的启动屏幕和一个空白的白色视图。现在，你已经准备好开始构建表格视图了。\n\n\n\n\
  ### 生成一些数据\n\n在开始使用表格视图之前，你需要创建一些数据来填充它。由于这是一个简单的表格示例，数据也将很简单。你将创建一个字符串数组，其中包含要放入每个单元格的信息。\n\
  \n当表格视图调用数据源时，数据数组必须准备就绪，那么在哪里创建它呢？有几种选择，但一个显而易见的地方是在视图控制器的 `viewDidLoad` 函数中。在这里创建是安全的。\n\
  \n你还需要一种在应用程序中传递数据数组的方法。这个过程需要一个属性，该属性可以被需要访问数据的各种函数所访问。\n\n让我们开始吧。打开图 1-7 中所示的\
  \ `ViewController.swift` 文件，并开始创建该属性。\n\n![A978-1-4842-1242-4_1_Fig7_HTML.jpg](img/A978-1-4842-1242-4_1_Fig7_HTML.jpg)\n\
  \n图 1-7. 编辑 `ViewController.swift` 文件\n\n> **注意**：从现在开始，为了节省篇幅，我将不再展示完整的 Xcode 界面，只显示你需要输入的代码。\n\
  \n添加该属性的声明，使代码看起来如列表 1-1 所示。\n\n**列表 1-1.** 声明属性\n\n```\nimport UIKit\n\nclass ViewController:\
  \ UIViewController {\n\n    var tableData  = [String]()\n\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 执行额外的设置，通常从 nib 加载视图后执行\n    }\n\n\
  \    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
  \        // 处置任何可以重新创建的资源\n    }\n\n}\n```\n\n> **注意**：为了节省空间，在接下来的列表中，我将只显示新增或修改的代码，并附上足够的上下文行。\n\
  \n现在，你将创建实际的数据数组。你的数据数组将是一个包含十个字符串的简单数组。你将在 `viewDidLoad` 函数中添加这段代码，因为该函数作为 `UIViewController`\
  \ 生命周期的一部分，在视图在屏幕上可见之前执行。在这里设置数据，将为表格提供在变得可见之前绘制自身所需的数据。添加列表 1-2 中所示的代码。\n\n**列表\
  \ 1-2.** 创建数据数组\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    // 执行额外的设置，通常从 nib 加载视图后执行\n\n    for count in 0...10 {\n        // 单元格将包含字符串\
  \ \"Item X\"\n        tableData.append(\"Item \\(count)\")\n    }\n\n    // 将数据数组的内容打印到日志中\n\
  \    print(\"The tableData array contains \\(tableData)\")\n}\n```\n\n让我们运行应用程序，看看数据数组是如何创建的。用户界面目前还没有做什么，但你可以看到将要提供给表格的数据。\n\
  \n通过按 Command+R 或选择 Product ➤ Run 在模拟器中运行应用程序，然后查看记录器输出：\n\n```\nThe tableData array\
  \ contains [\"Item 0\", \"Item 1\", \"Item 2\", \"Item 3\", \"Item 4\", \"Item 5\"\
  , \"Item 6\", \"Item 7\", \"Item 8\", \"Item 9\", \"Item 10\"]\n```\n\n### 创建表格视图\n\
