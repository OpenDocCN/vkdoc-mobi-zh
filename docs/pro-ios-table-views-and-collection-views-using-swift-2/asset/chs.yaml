  \ 所示。更新场景的自定义类属性，使其属于你的 `UICollectionViewController` 类。如图 4-11 所示，在场景树中选择集合视图控制器，然后切换到工具面板中的标识检查器，并更新\
  \ `Custom Class` 字段，如图 4-12 所示。在此示例中，项目包含一个名为 `MyCollectionViewController` 的 `UICollectionViewController`\
  \ 子类。\n\n\n\n### 向项目中添加 `UICollectionViewController` 子类\n\n为了加速创建 `UICollectionViewController`\
