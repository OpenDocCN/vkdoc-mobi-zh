- "# UITableView 继承自 UIScrollView 的要素\n\n`UITableView` 从 `UIScrollView` 中继承了哪些特性？\n\
  \n简而言之，答案是：“`UITableView` 没有明确重写的所有内容。” 这提供了一些对 `UITableView` 类特别有用的 `UIScrollView`\
  \ 和 `UIScrollViewDelegate` 方法与属性。\n\n`contentSize` 表示如果一次性创建并填充所有行，表格的总高度。（实际上，除非表格很小，否则由于\
  \ `UITableView` 的缓存和排队机制，这种情况很少发生。）`contentSize` 通过累加所有行的总高度以及页眉和页脚视图的高度计算得出。\n\n\
  `contentOffset` 表示表格从 `tableView` 框架顶部向下滚动了多少。例如，如果 `tableView` 的 `contentSize.height`\
  \ 值为 1000 点，并且表格向下滚动了一半，那么 `contentOffset` 将为 500 点。\n\n当你需要了解用户何时在滚动表格时，有两个 `UIScrollViewDelegate`\
  \ 方法特别有用。\n\n`scrollViewWillBeginDragging` 在 `tableView` 开始移动时调用，而 `scrollViewDidScroll`\
  \ 在表格滚动期间会被多次调用。\n\n在此处，你可以获取新的 `contentOffset` 值，并更新任何需要随之变化的内容。\n\n**注意**\n\n\
  尽管 `UITableView` 是 `UIScrollView` 的子类，但表格视图只能垂直滚动。\n\n## 创建 UITableView\n\n任何关于如何创建\
  \ `UITableView` 的讨论都必须附带一个警告：仅靠 `UITableView` 本身并不能做太多事情。为了填充数据并与用户交互，它们需要一个实现了\
  \ `UITableViewDelegate` 和 `UITableViewDataSource` 协议的类来提供支持。\n\n话虽如此，要将 `UITableView`\
  \ 显示到屏幕上，你需要能够绘制它。这里有两个选择：使用 Interface Builder 在 XIB 文件或 Storyboard 中可视化创建，或者在代码中以编程方式创建。\n\
  \n### 在 Interface Builder 中创建 UITableView\n\n在 Interface Builder 中创建 `UITableView`\
  \ 是一个极具挑战性的过程。\n\n![A978-1-4842-1242-4_2_Fig8_HTML.jpg](img/A978-1-4842-1242-4_2_Fig8_HTML.jpg)\n\
  \n**图 2-8.** “对象浏览器”中的 `UITableView` 项目 打开你的 Storyboard。从“对象浏览器”中拖拽一个 `UITableView`\
  \ 到你的视图上，如图 2-8 所示。\n\n好吧，我承认我说谎了。实际上这个过程相当直接。但有一些细节需要处理，因此仍有必要逐步了解这个过程。\n\n####\
  \ 将 UITableView 放置到另一个视图中\n\n尽管你经常看到表格视图全屏显示，但你不必局限于此。你可以将表格视图设置为任意大小。这非常简单：将 `UITableView`\
  \ 对象拖拽到它将要出现的视图中，并根据需要调整自动布局约束（见图 2-9）。\n\n![A978-1-4842-1242-4_2_Fig9_HTML.jpg](img/A978-1-4842-1242-4_2_Fig9_HTML.jpg)\n\
  \n**图 2-9.** 将 `UITableView` 放置到另一个视图中\n\n#### 放置全屏 UITableView\n\n另一方面，如果你的 `tableView`\
  \ 总是全屏显示，那么将其创建为另一个永远不会显示的子视图就没什么意义了。\n\n这种情况下，过程稍有不同。\n\n从 NIB 文件或 Storyboard 中删除现有的视图对象。将一个\
  \ `UITableView` 对象拖拽到中央区域（图 2-10）。\n\n![A978-1-4842-1242-4_2_Fig10_HTML.jpg](img/A978-1-4842-1242-4_2_Fig10_HTML.jpg)\n\
  \n**图 2-10.** 将 `UITableView` 对象拖拽到主区域\n\n从 NIB 文件或 Storyboard 中移除默认视图后，你需要重新连接“文件所有者”的\
  \ `view` 出口到 `tableView`。按住 Ctrl 键点击“占位符”列表中的“文件所有者”图标，然后拖拽到 `tableView` 上。释放鼠标按钮，然后从弹出列表中选择“View”出口。\n\
  \n**警告**\n\n如果你删除了 `view` 出口曾经连接的对象，很容易忘记重新连接它。如果不重新连接，你的应用将崩溃，并显示类似如下的错误：\n\n```\n\
  *** 因未捕获异常 ’NSInternalInconsistency Exception’ 而终止应用，原因：’-[UIViewController _loadViewFromNibNamed:bundle:]\
  \ 加载了 \"PlainTable\" 笔尖文件，但视图出口未设置。’\n```\n\n在 `view` 出口重新连接后，将你的新 `tableView` 连接到其\
  \ `dataSource` 和 `delegate`。\n\n担任 `dataSource` 和 `delegate` 角色的类很可能也是“文件所有者”。如果是这种情况，你可以通过按住\
  \ Ctrl 键点击并从表格拖拽到“文件所有者”图标，然后从弹出选项中选择 `dataSource` 和 `delegate` 来连接它们。\n\n### 以编程方式创建\
  \ UITableView\n\n在第 1 章中，我们使用 Interface Builder 构建了一个带有表格视图的简单应用。\n\n遵循“在 Interface\
  \ Builder 中能做的任何事，在代码中也能做”的原则，创建 `UITableView` 的另一种方式是在代码中完成。这是一个四步的过程：\n\n1.  创建一个指定大小和样式的\
  \ `UITableView` 实例。\n2.  设置新 `tableView` 的 `delegate` 和 `dataSource` 属性。\n3.  将新\
  \ `tableView` 添加到 `superView` 中。\n4.  调用新 `tableView` 的 `reloadData` 方法以确保其更新。\n\
  \n清单 2-1 展示了如何在 `UIViewController` 的 `viewDidLoad` 方法中实现这一过程。\n\n**清单 2-1.** 以编程方式添加\
  \ `tableView`\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n \
  \   // 在加载视图后进行任何额外的设置，通常来自 nib 文件。\n    tableView = UITableView(frame: self.view.frame,\
  \ style:.Plain)\n    tableView.delegate = self\n    tableView.dataSource = self\n\
  \    self.view.addSubview(tableView)\n    tableView.reloadData()\n}\n```\n\n**警告**\n\
  \n设置了 `tableView` 的 `delegate` 和 `dataSource` 属性后，它会期望（不，是要求！）控制器遵守 `UITableViewDelegate`\
  \ 和 `UITableViewDataSource` 协议——特别是必须实现 `numberOfSectionsInTableView:`、`tableView:numberOfRowsInSection:`\
  \ 和 `tableView:cellForRowAtIndexPath:` 方法。\n\n如果这些协议没有正确实现，当 `tableView` 被加载时应用将崩溃，并提示\
  \ `dataSource` 未能返回一个单元格。\n\n\n\n### 使用 UITableViewController 创建 UITableView\n\n\
  要使 `tableView` 正常运行，需要实现多个 `UITableViewDelegate` 和 `UITableViewDataSource` 方法。\n\
  \n虽然 Xcode 的自动补全功能有助于输入，但手动编写所有方法可能会导致重复性劳损。为了解放你的手腕、加快开发速度，不妨创建一个 `UITableViewController`\
  \ 子类！\n\n这一过程非常简单。只需在下拉子类列表中选择 `UITableViewController`，而不是创建普通的 `UIViewController`\
  \ 实例，如图 2-11 所示。\n\n![A978-1-4842-1242-4_2_Fig11_HTML.jpg](img/A978-1-4842-1242-4_2_Fig11_HTML.jpg)\n\
  \n图 2-11. 创建 UITableViewController 实例\n\n新的类文件将照常创建，但会附带一些额外内容。除了常规的 `UIViewController`\
  \ 方法外，你还会在文件中找到一些已提供框架的 `UITableViewDataSource` 方法（见图 2-12）。\n\n![A978-1-4842-1242-4_2_Fig12_HTML.jpg](img/A978-1-4842-1242-4_2_Fig12_HTML.jpg)\n\
  \n图 2-12. UITableViewDataSource 方法\n\n这是 `UITableViewController`、`delegate` 和 `dataSource`\
  \ 中最少必要的方法子集，足以让你快速上手，并且该类的头文件会声明它遵循这两个协议。\n\nXcode 还提供了许多被注释掉的其他方法：\n\n```\noverride\
  \ func tableView(tableView: UITableView, canMoveRowAtIndexPath indexPath: NSIndexPath)\
  \ -> Bool\n\noverride func tableView(tableView: UITableView, moveRowAtIndexPath\
  \ fromIndexPath: NSIndexPath, toIndexPath: NSIndexPath)\n\noverride func tableView(tableView:\
  \ UITableView, commitEditingStyle editingStyle: UITableViewCellEditingStyle, forRowAtIndexPath\
  \ indexPath: NSIndexPath)\n\noverride func tableView(tableView: UITableView, canEditRowAtIndexPath\
  \ indexPath: NSIndexPath) -> Bool\n```\n\n这些方法并非必须实现，但它们作为骨架方法存在，当你需要时，可以取消注释后直接使用。\n\
  \n#### 连接 UITableViewController 的输出口\n\n如果在创建 `UITableViewController` 子类时选择了“带 XIB\
  \ 用户界面”选项，那么 XIB 文件中会包含一个已连接到其 `delegate` 和 `dataSource` 的 `UITableView`。\n\n如果你没有选择创建\
  \ XIB 文件的选项，那么需要自行创建 XIB 文件后手动连接相关组件。\n\n-   首先，创建一个新的 `View` 文件，然后删除系统为你添加的 `UIView`\
  \ 对象，并替换为 `UITableView` 对象。\n-   接下来，在“占位符”列表中选择“文件所有者”图标，然后在“身份检查器”中将“自定义类”字段修改为你的\
  \ `UITableViewController` 子类名称，从而设置界面的文件所有者。\n-   `UITableViewController` 子类会暴露一个\
  \ `view` 属性，该属性需要连接到 `Table View` 对象。\n-   最后，需要通过“占位符”列表中的“文件所有者”对象，将 `Table View`\
  \ 对象的 `dataSource` 和 `delegate` 输出口连接到 `UITableViewController` 子类。\n\n至此，你实际上已经复现了在创建新\
  \ `UITableViewController` 子类并勾选“带 XIB 用户界面”选项时系统自动完成的过程。\n\n## 本章小结\n\n本章简要介绍了 `UITableView`\
  \ 的结构和核心组件。\n\n表格视图有两种基本样式：\n\n-   普通（Plain）\n-   分组（Grouped）\n\n表格视图也可以划分为分区，并提供索引。\n\
  \n虽然外观可能不同，但不同类型的表格视图拥有相似的组件和尺寸。它们还会从父类 `UIScrollView` 继承方法和属性。\n\n与 UIKit 的许多组件类似，既可以通过\
  \ Interface Builder 可视化创建 `UITableView`，也可以通过代码创建。任何能用 Interface Builder 完成的操作也都能通过代码实现。\n\
  \n将 `tableView` 的控制器实现为 `UITableViewController` 的子类，可以让我们减少手动创建方法的工作量，直接使用系统提供的模板。\n\
  \n在第 5 章中，你将学习如何为新建的 `UITableView` 提供数据，以及它如何与 `UITableViewDelegate` 和 `UITableViewDataSource`\
  \ 协议协同工作。\n\n"
- "# 3. 集合视图快速入门\n\n在本章中，你将开始探索集合视图。首先概述集合视图是什么，以及一些实际应用示例。然后在第二部分，你将构建一个简单的“Hello,\
  \ world”风格的集合视图应用，以此介绍用户界面背后的组件，并帮助你为后续章节中的细节内容构建上下文背景。\n\n如果你刚开始使用集合视图，那么在深入复杂的细节之前，花些时间从零开始构建一个非常简单的集合视图是值得的。不过，如果你已经对集合视图各组件的拼图如何组合有了信心，并且想直接进入代码阶段，可以完全跳过本章剩余部分。我将在后面详细讲解这些元素，所以你不会错过任何内容。\n\
  \n\n\n## 什么是集合视图？\n\n集合视图提供了一种管理和展示有序数据项的方式，并配有可定制且具有交互性的布局。\n\n集合视图由显示在单元格中的数据项，以及可显示节标题和页脚等附加信息或数据项本身额外元数据的补充视图组成。\n\
  \n装饰视图是纯视觉组件，可用于显示背景和边框等界面元素；它们不包含任何可变数据元素。\n\n集合视图建立在表格视图控件的基础上，能够实现更为复杂的布局。表格视图只能在单列中显示数据项，而集合视图则可以在从线性网格到圆形等各种布局中展示数据项，如图\
  \ 3-1 所示。\n\n![A978-1-4842-1242-4_3_Fig1_HTML.jpg](img/A978-1-4842-1242-4_3_Fig1_HTML.jpg)\n\
  \n图 3-1. 集合视图示例\n\n`UICollectionView` 控件与另外四个对象协同工作，如图 3-2 所示。集合视图本身由一个 `UIViewController`\
  \ 管理。模型包含将在集合视图中显示的数据；这些数据由 `UICollectionViewDataSource` 提供给集合视图本身。与集合视图的交互由充当 `UICollectionViewDelegate`\
  \ 的对象处理。\n\n`UICollectionView` 使用模型-视图-控制器模式来组织自身。驱动数据项和补充视图内容的数据由模型对象提供，而 `UICollectionView`\
  \ 控件本身是视图组件。控制器部分通常是一个 `UIViewController`，但控制器的角色也可以由充当 `delegate` 和 `dataSource`\
  \ 的不同对象分担。\n\n集合视图的布局由 `UICollectionViewLayout` 对象管理，该对象通过配置每个项的各种布局属性，告知集合视图每个单元格、补充视图和装饰视图应如何在集合视图自身的边界内定位。布局的变化可以以动画形式呈现，并对交互做出响应。\n\
  \n![A978-1-4842-1242-4_3_Fig2_HTML.jpg](img/A978-1-4842-1242-4_3_Fig2_HTML.jpg)\n\
  \n图 3-2. 集合视图及其支持对象\n\n与 `UITableView` 一样，集合视图采用出队和回收的方式来创建和管理单元格。这使得集合视图能够在 iOS\
  \ 设备严格的内存限制下，管理数量可能极其庞大的单个数据项，同时保持流畅的滚动和动画性能。\n\n第 5 章 详细描述了出队机制如何与 `UITableView`\
  \ 协同工作；`UICollectionView` 的工作方式完全相同，只是增加了补充视图、装饰视图以及数据项单元格。\n\n## 集合视图的结构\n\n集合视图显示一系列可以垂直和水平滚动的数据项（或称单元格）。它们是\
  \ `UICollectionView` 类的实例，包含两个物理部分。\n\n### 集合视图本身\n\n可见的容器部分，即 `collectionView`\
  \ 本身，是 `UIScrollView` 的子类，负责将数据项集合以单元格形式显示出来。\n\n这些单元格被放置在集合视图的 `contentView` 边界内。如果\
  \ `contentView` 大于 `collectionView` 的框架，那么集合视图将负责滚动内容视图，这既可以通过用户交互触发，也可以以编程方式实现。图\
  \ 3-3 展示了 `frame` 和 `contentView` 之间的关系。\n\n![A978-1-4842-1242-4_3_Fig3_HTML.jpg](img/A978-1-4842-1242-4_3_Fig3_HTML.jpg)\n\
  \n图 3-3. 框架与内容视图\n\n当内容视图滚动时，集合视图会根据需要从中创建和移除数据项；这需要在确保数据项始终能及时创建并放置到位（以便在内容视图相应部分滚动到框架内时可见），与避免创建和维护太多不可见的数据项（以防止集合视图内存消耗过大）之间取得平衡。\n\
  \n与 `UITableView` 完全相同，集合视图使用一个预先存在的数据项队列，可以根据需要从中出队和回收。就在某个数据项即将滚入可见区域之前，集合视图会从队列中取出它，并用正确的数据进行配置。一旦该数据项滚出可见区域，集合视图就会将其放回队列，以备将来重复使用。\n\
  \n通过这种方式，集合视图可以看起来创建和显示成千上万的数据项，而实际上只需要创建其中一小部分作为实际对象保存在内存中。\n\n### 集合视图单元格\n\n\
  集合视图单元格是 `UICollectionReusableView` 或其子类的实例。它们扮演三种角色之一：\n\n- **数据项单元格**，创建为 `UICollectionViewCell`\
  \ 的实例。它们类似于表格视图的单元格，用于显示主要数据项。例如，在图库应用中，单元格可能显示相册中照片的缩略图。\n- **补充视图**，是 `UICollectionReusableView`\
  \ 的实例。它们是完全可选的，并具有多种用途。在网格类型的布局（如照片图库）中，它们通常用作页眉和页脚，以提供关于节的元数据。在更复杂的布局中，它们可用于显示关于数据项的附加信息。\n\
  - **装饰视图**，也是 `UICollectionReusableView` 的实例。它们独立于集合视图的模型，不显示任何数据。通常，它们用于显示图形元素，例如背景或节高亮显示。\n\
  \n图 3-4 展示了一个具有网格布局的集合视图的概念组成部分，并突出显示了各种类型的视图。\n\n![A978-1-4842-1242-4_3_Fig4_HTML.jpg](img/A978-1-4842-1242-4_3_Fig4_HTML.jpg)\n\
  \n图 3-4. 集合视图的基本结构\n\n图 3-5 展示了 iOS iBooks 应用中运行的集合视图。它使用单元格显示书籍封面，使用补充视图包含下载控件，并使用装饰视图呈现“书架”效果。\n\
  \n![A978-1-4842-1242-4_3_Fig5_HTML.jpg](img/A978-1-4842-1242-4_3_Fig5_HTML.jpg)\n\
  \n图 3-5. iBooks 应用\n\n### 支持对象\n\n集合视图控件本身相当简单；它依赖其他四个对象的支持来显示其数据：\n\n- 模型（Model）\n\
  - 数据源（Datasource）\n- 委托（Delegate）\n- 布局（Layout）\n\n每个对象在支持集合视图方面都扮演着特定的角色，它们的组织基于模型-视图-控制器架构。图\
  \ 3-6 展示了这四个对象如何相互关联。\n\n![A978-1-4842-1242-4_3_Fig6_HTML.jpg](img/A978-1-4842-1242-4_3_Fig6_HTML.jpg)\n\
  \n图 3-6. 集合视图及其支持对象如何相互关联\n\n#### 集合视图的模型\n\n模型包含将通过数据源在集合视图中显示的数据。顾名思义，它是模型-视图-控制器架构中模型组件的一部分。\n\
  \n模型可以采用多种形式，具体取决于应用中数据的管理方式。最简单的情况下，模型可能是一个包含一组 `String` 的一维数组。更复杂的模型可能涉及二维数组以将数据分割成节，或者可以从本地\
  \ Core Data 数据库或外部网络源检索数据。\n\n无论模型采用何种形式，它都不会直接与集合视图通信。那是数据源的职责。\n\n\n\n#### 集合视图的数据源\n\
  \n数据源对象的职责是，在收到请求时为集合视图提供单元格、补充视图和装饰视图，以便集合视图能够显示它们。它是模型-视图-控制器架构中模型组件的另一部分。\n\n\
  集合视图与其数据源之间的关系由 `UICollectionViewDataSource` 协议定义。集合视图的数据源必须实现一些强制函数，还有一些是可选的。\n\
  \n数据源可以是一个单独的类，遵守 `UICollectionViewDataSource` 协议，也可以是集合视图的视图控制器。哪种方法正确并没有硬性规定，但无论实现方式如何，数据源能够尽快将数据返回给集合视图这一点至关重要，以便最大化性能。\n\
  \n#### 集合视图的委托\n\n处理用户与集合视图的交互是委托对象的职责，它构成了模型-视图-控制器架构中控制器组件的一部分。\n\n委托是一个实现了 `UICollectionViewDelegate`\
  \ 协议中部分或全部函数的类。它负责处理集合视图项的选择和高亮。`UICollectionViewDelegate` 协议中没有强制函数，但集合视图必须设置一个委托对象。\n\
  \n## 集合视图的布局\n\n与 `UITableView` 不同，`UICollectionView` 控件本身并不知道应如何在其内容视图中布局各项。它依赖于一个\
  \ `UICollectionViewLayout` 对象来为每一项提供布局属性。\n\n集合视图中的每一项（单元格、补充视图或装饰视图）都有一个对应的 `UICollectionViewLayoutAttributes`\
  \ 实例，如图 3-7 所示。它管理该项的布局相关属性，并由 `UICollectionViewLayout` 对象在集合视图请求时创建。\n\n![A978-1-4842-1242-4_3_Fig7_HTML.jpg](img/A978-1-4842-1242-4_3_Fig7_HTML.jpg)\n\
  \n图 3-7. `UICollectionViewLayoutAttributes`\n\n在请求了每一项的属性后，集合视图使用这些属性将其定位在内容视图中。这些属性控制着每一项的大小、位置、变换和不透明度，但你也可以通过子类化\
  \ `UICollectionViewLayoutAttributes` 并添加自己的自定义属性来补充它们。\n\n如果你的集合视图布局基于一行项（可能有换行，也可能没有），那么你可以利用\
  \ `UICollectionViewFlowLayout` 类，它会为你处理大部分布局需求。通常你只需要指定项的大小、项间间距和行间距；然后流式布局会为你计算其他一切。\n\
  \n对于更复杂的布局，你需要创建一个自定义布局作为 `UICollectionViewLayout` 的子类。这样，你需要负责计算显示项所需的所有属性。\n\n\
  ## 创建一个简单的集合视图应用\n\n在本章的其余部分，你将从头开始构建一个简单的“Hello, world”风格的集合视图应用。它将向你展示容器、数据源、委托、布局、单元格和视图如何组合在一起，并为你提供一个可以作为自己实验基础的应用。最终结果将按花色显示一副扑克牌，如图\
  \ 3-8 所示。\n\n![A978-1-4842-1242-4_3_Fig8_HTML.jpg](img/A978-1-4842-1242-4_3_Fig8_HTML.jpg)\n\
  \n图 3-8. 完成的应用\n\n我将有意放慢速度，涵盖所有步骤。如果你是一个熟练的 Xcode 使用者，你不需要这样的手把手指导——只需专注于代码即可。\n\
  \n还在听吗？好的，你需要执行以下操作：\n\n* 创建一个简单的、基于窗口的应用骨架\n* 生成一些用于供给集合视图的数据\n* 创建一个简单的集合视图\n\
  * 连接集合视图的数据源和委托\n* 实现集合视图的布局\n* 添加一些非常简单的交互性\n\n这一切都非常直接，但仍然是很有用的练习。\n\n## 创建应用骨架\n\
  \n对于这个应用，你将使用一个简单的结构：一个由视图控制器管理的单一视图和一个 Storyboard，以为视图提供内容。\n\n首先，在 Xcode 中创建一个新项目，并选择\
  \ Single View Application 模板，如图 3-9 所示。\n\n![A978-1-4842-1242-4_3_Fig9_HTML.jpg](img/A978-1-4842-1242-4_3_Fig9_HTML.jpg)\n\
  \n图 3-9. Xcode 的模板选择面板\n\n将应用命名为 `SimpleCV`，如图 3-10 所示。\n\n![A978-1-4842-1242-4_3_Fig10_HTML.jpg](img/A978-1-4842-1242-4_3_Fig10_HTML.jpg)\n\
  \n图 3-10. 命名应用\n\n将项目保存到合适的位置，你将看到 Xcode 的项目视图，其中包含应用的初始骨架。假设你选择了 `SimpleCV` 应用名称，它看起来会像图\
  \ 3-11 所示。\n\n![A978-1-4842-1242-4_3_Fig11_HTML.jpg](img/A978-1-4842-1242-4_3_Fig11_HTML.jpg)\n\
  \n图 3-11. 初始的 Xcode 视图\n\n你会看到你拥有以下内容：\n\n* 一个应用委托（`AppDelegate.swift`）\n* 一个视图控制器（`ViewController.swift`）\n\
  * 一个 Storyboard（`Main.storyboard`）\n* 一个素材目录（`Images.xcassets`）\n* 用于单元测试、框架和产品的支持文件和文件夹\n\
  \n## 创建一些数据\n\n在你开始处理集合视图本身之前，你需要创建一些数据来供给它。你将从包含四种花色扑克牌图片的目录中创建集合视图的模型。\n\n###\
  \ 添加扑克牌图片\n\n在本节的源代码中，你会找到一个包含五个子目录的 `cards` 文件夹。每个子目录包含每张扑克牌的 `png` 图片。首先，将 `cards`\
  \ 文件夹拖入项目文件夹，如图 3-12 所示。\n\n![A978-1-4842-1242-4_3_Fig12_HTML.jpg](img/A978-1-4842-1242-4_3_Fig12_HTML.jpg)\n\
  \n图 3-12. 扑克牌图片\n\n接下来，将 `cards` 文件夹从 Finder 拖入 Xcode，并将其放置到 `SimpleVC` 文件夹内，如图\
  \ 3-13 所示。\n\n![A978-1-4842-1242-4_3_Fig13_HTML.jpg](img/A978-1-4842-1242-4_3_Fig13_HTML.jpg)\n\
  \n图 3-13. 将扑克牌图片添加到项目中\n\n添加文件夹时，请确保选择将项目复制到目标文件夹并为任何添加的文件夹创建组的选项，如图 3-14 所示。\n\n\
  ![A978-1-4842-1242-4_3_Fig14_HTML.jpg](img/A978-1-4842-1242-4_3_Fig14_HTML.jpg)\n\
  \n图 3-14. 添加扑克牌文件的选项\n\n\n\n### 构建模型\n\n你将采用的方法是从 JSON 文件构建数据。该 JSON 的结构如清单 3-1\
  \ 所示。\n\n**清单 3-1.** `cards.json` 文件片段\n\n```\n{\n  \"suits\": [\n    {\n      \"\
  suitName\": \"Spades\",\n      \"packOrder\": 1,\n      \"cards\": [\n        {\n\
  \          \"cardName\": \"Ace of Spades\",\n          \"cardImage\": \"ace_of_spades.png\"\
  ,\n          \"suitOrder\": 1,\n          \"cardValue\": 14\n        },\n      \
  \  {\n          \"cardName\": \"King of Spades\",\n          \"cardImage\": \"king_of_spades.png\"\
  ,\n          \"suitOrder\": 2,\n          \"cardValue\": 13\n        },\n      \
  \  {\n          \"cardName\": \"Queen of Spades\",\n          \"cardImage\": \"\
  queen_of_spades.png\",\n          \"suitOrder\": 3,\n          \"cardValue\": 12\n\
  \        },\n        ...\n      ]\n    },\n    {\n      \"suitName\": \"Hearts\"\
  ,\n      \"packOrder\": 2,\n      \"cards\": [...]\n    },\n    {\n      \"suitName\"\
  : \"Diamonds\",\n      \"packOrder\": 3,\n      \"cards\": [...]\n    },\n    {\n\
  \      \"suitName\": \"Clubs\",\n      \"packOrder\": 4,\n      \"cards\": [...]\n\
  \    },\n    {\n      \"suitName\": \"Jokers\",\n      \"packOrder\": 5,\n     \
  \ \"cards\": [\n        {\n          \"cardName\": \"Black Joker\",\n          \"\
  cardImage\": \"black_joker.png\",\n          \"suitOrder\": 1,\n          \"cardValue\"\
  : 1\n        },\n        {\n          \"cardName\": \"Red Joker\",\n          \"\
  cardImage\": \"red_joker.png\",\n          \"suitOrder\": 2,\n          \"cardValue\"\
  : 2\n        }\n      ]\n    }\n  ]\n}\n```\n\n为了免去你从头创建 JSON 文件的麻烦，该文件已在可下载的源代码中提供。\n\
  \n模型将以`Dictionaries`的`Array`形式存储在`ViewController`的一个属性中。在类的顶部添加以下代码：\n\n```\nclass\
  \ ViewController: UIViewController {\n    var suitsArray = [Dictionary<String, AnyObject]()\n\
  \    ...\n}\n```\n\n这里，你声明了`suitsArray`将是一个`Dictionaries`的数组。每个字典将以`String`作为键，并能存储一个`AnyObject`作为对应的值（这样你就可以存储`Strings`、`Ints`以及其他`Arrays`，稍后你会看到）。\n\
  \n接下来，你需要一个函数来从 JSON 文件加载数据。该函数将从磁盘读取 JSON 文件，并将其解析为字典，存入`suitsArray`数组。\n\n虽然你只是在构建一个简单的示例应用程序，但养成处理错误的好习惯仍然是一个好主意。解析\
  \ JSON 可能有风险；源 JSON 文件可能不存在，也可能无法解析。在这两种情况下，你都需要处理由此产生的错误。\n\n为此，首先添加一个`enum`来描述可能出现的错误情况。在类的顶部，`suitsArray`声明的下方添加以下代码：\n\
  \n```\nenum ParsingError: ErrorType {\n    case MissingJson\n    case JsonParsingError\n\
  }\n```\n\n这声明了一个符合`ErrorType`协议的`enum`。你为这个`enum`将描述的错误创建了两个可能的值：`MissingJson`，用于指示源数据存在问题；`JsonParsingError`，用于指示将\
  \ JSON 解析到`suitsArray`时出现了问题。\n\n现在，在类的底部添加一个名为`setupData()`的新函数，如清单 3-2 所示。\n\n\
  **清单 3-2.** `setupData()` 函数\n\n```\n// MARK:\n// MARK: Data setup\nfunc setupData\
  \ () throws {\n    guard let filePath = NSBundle.mainBundle().pathForResource(\"\
  cards\",\n        ofType: \"json\"), jsonData = NSData(contentsOfFile: filePath)\
  \ else {\n        throw ParsingError.MissingJson\n    }\n\n    do {\n        let\
  \ parsedObject = try NSJSONSerialization.JSONObjectWithData(jsonData,\n        \
  \    options: NSJSONReadingOptions.MutableContainers) as! NSDictionary\n       \
  \ suitsArray = parsedObject[\"suits\"] as! Array\n    } catch {\n        throw ParsingError.JsonParsingError\n\
  \    }\n}\n```\n\n首先，该函数尝试加载`cards.json`文件。如果找不到该文件或加载时出现问题，它会抛出一个`MissingJson`错误。如果一切正常，JSON\
  \ 将被加载到`jsonData`对象中。\n\n接下来，`jsonData`对象被解析为一个`NSDictionary`。由于这可能会失败，它被包裹在一个`do-catch`块中，如果任何操作失败，该块将抛出一个`JsonParsingError`错误。通过在`JSONObjectWithData`函数前使用`try`关键字，你表明了事情可能会出错。\n\
  \n你还将解析结果强制解包为一个`NSDictionary`。这一步也可能失败，但至少如果其中任一操作出错，你都能处理该错误。\n\n`suitsArray`属性将具有如图\
  \ 3-15 所示的结构。\n\n![A978-1-4842-1242-4_3_Fig15_HTML.jpg](img/A978-1-4842-1242-4_3_Fig15_HTML.jpg)\n\
  \n**图 3-15.** 数据结构\n\n`UICollectionView`中的某个单独分区或项目通过`NSIndexPath`值进行引用。图 3-16 展示了`indexPath\
  \ section`和`row`值如何映射到花色和牌面。\n\n![A978-1-4842-1242-4_3_Fig16_HTML.jpg](img/A978-1-4842-1242-4_3_Fig16_HTML.jpg)\n\
  \n**图 3-16.** 集合分区与行之间的映射\n\n数据模型需要在集合视图开始请求数据之前设置好，因此在`ViewController`的`viewDidLoad`函数中添加对`setupData`函数的调用，如清单\
  \ 3-3 所示。\n\n**清单 3-3.** 更新后的 `viewDidLoad()` 函数\n\n```\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    // Configure data\n    do {\n        try setupData()\n\
  \    } catch ParsingError.MissingJson {\n        print(\"Error loading JSON\")\n\
  \    } catch ParsingError.JsonParsingError {\n        print(\"Error parsing JSON\"\
  )\n    } catch {\n        print(\"Something went wrong\")\n    }\n}\n```\n\n这将`setupData()`函数包裹在一个`do-catch`块中。如果抛出任何错误，都会在此处得到处理。\n\
  \n> **提示**  \n> 你完全可以将这些数据设置代码直接放在`viewDidLoad`函数中，但我更倾向于将这类事务分离到其独立的函数中。这种方法有几个优点。首先，它能让`viewDidLoad`函数保持简洁并易于阅读。其次，如果你能将这种数据设置过程与视图生命周期解耦，那么对视图控制器进行单元测试就会容易得多。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 在 Storyboard 中设置集合视图\n\
  \n数据设置完成后，您现在可以着手连接界面。这非常简单，只需要一个填充整个屏幕的集合视图即可。\n\n为了配置集合视图，您需要将其连接到视图控制器，因此在 `ViewController`\
  \ 的实现文件中创建一个 `IBOutlet` 属性：\n\n```\nclass ViewController: UIViewController {\n \
  \   var suitsArray = [Dictionary<String, AnyObject>]()\n    @IBOutlet var collectionView:\
  \ UICollectionView!\n    ...\n}\n```\n\n接下来，切换到 Storyboard，从对象浏览器中拖拽一个 `UICollectionView`\
  \ 对象到视图中，并让它自动吸附以填充整个屏幕，如图 3-17 所示。\n\n![A978-1-4842-1242-4_3_Fig17_HTML.jpg](img/A978-1-4842-1242-4_3_Fig17_HTML.jpg)\n\
  \n**图 3-17.** 添加到 Storyboard 中的 `UICollectionView`\n\n拖入 Storyboard 的 `UICollectionViews`\
  \ 会自带一个原型单元格（即集合视图左上角的白色轮廓）。您不需要它。您可以将其留在那里，但 Xcode 会弹出警告，要求提供重用标识符。为了保持项目整洁，请在场景树中高亮选中\
  \ `Collection View Cell` 项，然后按退格键将其删除。\n\n`UICollectionView` 就位后，您现在需要将其连接到视图控制器的输出口（从\
  \ `File's Owner` 占位符拖拽到集合视图，然后从 HUD 中选择 `collectionView` 输出口）。\n\n接下来，将 `File's\
  \ Owner` 占位符设置为集合视图的 `delegate` 和 `datasource`（从集合视图向上拖拽到 `File's Owner` 占位符，然后从\
  \ HUD 中选择 `datasource` 和 `delegate` 输出口）。\n\n最后一项任务是设置集合视图的 AutoLayout 约束，使其无论设备方向如何，都能填充视图的完整宽度和高度，但不要与状态栏重叠。\n\
  \n如果集合视图还未被选中，请高亮选中它，然后点击 Storyboard 视图底部的“固定 (Pin)”按钮，为其添加“前导”、“尾随”、“顶部”和“底部”约束，如图\
  \ 3-18 所示。\n\n![A978-1-4842-1242-4_3_Fig18_HTML.jpg](img/A978-1-4842-1242-4_3_Fig18_HTML.jpg)\n\
  \n**图 3-18.** 添加新约束\n\n完成这三个连接后，您可以切换回 `ViewController` 的实现文件，并开始在代码中配置集合视图。\n\n\
  ### 设置委托和数据源函数\n\n与 `UITableView` 类似，`UICollectionView` 依赖于 `delegate` 和 `dataSource`\
  \ 对象的协助，为其提供单元格、补充视图和装饰视图，以及在运行时提供布局和配置信息。\n\n这可以是任何遵循 `UICollectionViewDelegate`\
  \ 和 `UICollectionViewDataSource` 协议的类。通常认为最佳实践是使用单独的类来充当 `delegate` 和 `dataSource`，这意味着每个类都有特定的角色（用软件工程术语来说，这就是单一职责原则）。\n\
  \n在后几章的项目中，您会采用这种方法，但为了尽可能简化当前项目，您将使用 `ViewController`。\n\n通过在 Interface Builder\
  \ 中连接集合视图的 `delegate` 和 `dataSource` 输出口，您已经告诉集合视图，`ViewController` 类将扮演 `delegate`\
  \ 和 `dataSource` 的角色。现在您需要设置该类来实现这一功能。\n\n第一步是让该类遵循这三个协议，如代码清单 3-4 所示。\n\n**代码清单\
  \ 3-4.** 更新后的 `ViewController`\n\n```\nimport UIKit\nclass ViewController: UIViewController,\
  \ UICollectionViewDataSource,\nUICollectionViewDelegate, UICollectionViewDelegateFlowLayout\
  \ {\n    ...\n}\n```\n\n第三个协议 `UICollectionViewDelegateFlowLayout`，通过一些可选函数扩展了 `UICollectionViewDelegate`\
  \ 协议，这些函数可以辅助 `UICollectionViewFlowLayout` 处理诸如单元格大小等属性。您稍后会看到这个，但在您更新头文件的同时，正好可以把它加进来。\n\
  \n> **注意：** `UICollectionViewDelegateFlowLayout` 是一个额外的协议，它定义了一些特定于流式布局的函数，用于处理诸如单元格大小等属性。您可以将其视为“扩展”了\
  \ `UICollectionDelegate` 协议以定义额外函数，类似于通过添加扩展来为 Swift 类添加额外函数。\n\n`UICollectionViewDataSource`\
  \ 协议负责提供集合在运行时所需的数据和视图。至少，您需要实现两个函数：\n\n*   `collectionView(_:numberOfItemsInSection:)`\n\
  *   `collectionView(_:cellForItemAtIndexPath:)`\n\n还有一个可选的第三个函数可供实现：\n\n*   `numberOfSectionsInCollectionView(_:)`\n\
  \n顾名思义，第一个函数返回当前分区中的项目数量；这对应于每种花色的牌数。\n\n第二个函数是您创建或出列 `UICollectionViewCell`、配置其内容并将其传递给\
  \ `collectionView` 进行显示的地方。\n\n第三个可选函数返回花色的数量；在您的集合视图中，每种花色将位于其自己的分区内。\n\n> **提示：**\
  \ 除非您通过实现 `numberOfSectionsInCollectionView(_:)` 函数另行指定，否则集合视图将假定只有一个分区。\n\n####\
  \ `numberOfSectionsInCollectionView:` 函数\n\n`numberOfSectionsInCollectionView:`\
  \ 函数告诉集合视图需要多少个分区来显示模型中包含的数据。在您的示例中，这对应于一副牌中花色的数量。\n\n将代码清单 3-5 中的代码添加到 `ViewController`\
  \ 的底部。\n\n**代码清单 3-5.** `numberOfSectionsInCollectionView:` 函数\n\n```\nfunc numberOfSectionsInCollectionView(collectionView:\
  \ UICollectionView) -> Int {\n    return suitsArray.count\n}\n```\n\n> **提示：** 当集合视图调用这三个数据源函数之一时，它会将自身的引用作为参数之一传递进来。这意味着通过检查传入的是哪个集合视图，您就可以用同一个（或同一组）数据源函数来服务于多个集合视图。\n\
  \n#### `collectionView:numberOfItemsInSection:` 函数\n\n现在，您可以实现确定每个分区中将显示多少个项目的函数了。根据您的数据模型，这将是该花色中牌的数量。\n\
  \n将 `collectionView:numberOfItemsInSection:` 函数添加到 `ViewController` 的底部，如代码清单 3-6\
  \ 所示。\n\n**代码清单 3-6.** `collectionView:numberOfItemsInSection:` 函数\n\n```\nfunc\
  \ collectionView(collectionView: UICollectionView, numberOfItemsInSection\nsection:\
  \ Int) -> Int {\n    let cardsDictionary = self.suitsArray[section]\n    let cardsArray\
  \ = cardsDictionary[\"cards\"] as! NSArray\n    return cardsArray.count\n}\n```\n\
  \n这个函数非常直接：它从 `suitsArray` 的相应元素中获取包含花色的字典，然后获取包含卡牌对象的数组并返回其数量。\n\n\n\n#### `collectionView:cellForItemAtIndexPath:`\
  \ 函数\n\n`collectionView:cellForItemAtIndexPath:` 函数是魔法发生的核心所在。当集合视图需要显示新单元格时，会重复调用此函数，其职责包括创建或复用队列中的单元格、配置该单元格，并根据需求将其交付给集合视图。\n\
  \n随之而来的一个问题是：“单元格最初是从哪里来的？”与`UITableView`不同，`UICollectionView`没有任何“标准”的单元格类型。你必须从头开始自行创建。\n\
  \n有两种实现方式：创建一个 nib 文件，或创建一个自定义的 `UICollectionViewReusableView` 或 `UICollectionViewCell`\
  \ 子类。然后在配置集合视图实例化时，你需要将 nib 文件或类与一个单元格复用标识符（reuse identifier）一起注册。\n\n这个注册过程会告知集合视图单元格的来源位置。复用标识符就像一个“标签”，用于区分不同的单元格类型。尽管你的简单示例只有一种单元格类型，但在同一个集合视图中，你可以拥有多种不同类型的单元格来展示不同类别的数据。\n\
  \n本着简单示例的精神，你将创建一个非常简单的 Xib 文件来包含你的 `UICollectionViewCell` 模板。新建文件（文件 ➤ 新建 ➤ 文件），并从“用户界面”部分选择“视图”项，如图\
  \ 3-19 所示。\n\n![A978-1-4842-1242-4_3_Fig19_HTML.jpg](img/A978-1-4842-1242-4_3_Fig19_HTML.jpg)\n\
  \n图 3-19：选择视图模板\n\n设备系列设置并不重要，因此点击“下一步”跳过此步，然后给你的新文件命名。我将其命名为 `CollectionViewCell`。点击“创建”按钮，你将在界面构建器中看到一个全新的\
  \ `UIView`。\n\n有些反直觉的是，处理新文件的第一步是删除已为你提供的视图。在占位对象列表中选择它，然后按下 Delete 键。\n\n现在，在 Xcode\
  \ 窗口右侧“工具区”的对象浏览器中找到 `UICollectionViewCell`，并将其拖拽到主区域。最终你应该得到类似图 3-20 所示的结果。\n\n\
  ![A978-1-4842-1242-4_3_Fig20_HTML.jpg](img/A978-1-4842-1242-4_3_Fig20_HTML.jpg)\n\
  \n图 3-20：新的 `UICollectionViewCell`\n\n现在你需要向单元格中添加一个 `UIImageView` 来显示卡片，因此从对象浏览器中拖拽一个并将其放入单元格，如图\
  \ 3-21 所示。\n\n![A978-1-4842-1242-4_3_Fig21_HTML.jpg](img/A978-1-4842-1242-4_3_Fig21_HTML.jpg)\n\
  \n图 3-21：单元格内部的 `UIImageView`\n\n注意图像视图比单元格本身要大。使用自动布局约束将图像视图“粘合”到单元格框架上，这样当单元格调整大小时，图像视图会随之放大。\n\
  \n在视图树中选择图像视图，点击故事板视图底部的“固定”按钮，并添加四个约束，如图 3-22 所示。\n\n![A978-1-4842-1242-4_3_Fig22_HTML.jpg](img/A978-1-4842-1242-4_3_Fig22_HTML.jpg)\n\
  \n图 3-22：向图像视图添加约束\n\n最后，再次选择图像视图，如果属性检查器未显示则将其打开，并为图像视图添加一个标签，如图 3-23 所示。\n\n![A978-1-4842-1242-4_3_Fig23_HTML.jpg](img/A978-1-4842-1242-4_3_Fig23_HTML.jpg)\n\
  \n图 3-23：为图像视图添加标签\n\n**警告:** 通过标签访问单元格内的控件可能是一个脆弱的流程。它依赖于故事板中设置的标签与代码中引用该控件时使用的标签完全匹配。如果单元格包含多个控件，通过自定义\
  \ `UICollectionViewCell` 子类中的出口（outlet）连接它们会更安全。\n\n就用户界面而言，这就完成了。你的 `UICollectionViewCell`\
  \ 的其余配置将在代码中进行。切换回 `ViewController` 的实现文件，你就可以继续了。\n\n创建包含单元格的 nib 文件后，你需要将其注册到集合视图中。最明显的时机是在视图控制器加载时，因此我将采用与之前创建集合视图数据相同的方法，创建一个独立的函数，由视图控制器的\
  \ `viewDidLoad` 函数调用。\n\n创建一个名为 `configureCollectionView` 的新函数，如代码清单 3-7 所示。\n\n\
  **代码清单 3-7.** `configureCollectionView` 函数\n\n```\nfunc configureCollectionView()\
  \ {\n    collectionView.registerNib(UINib(nibName: \"CollectionViewCell\", bundle:\
  \ nil), forCellWithReuseIdentifier: \"CardCell\")\n}\n```\n\n这非常简单。你在集合视图上调用 `registerNib(_:forCellWithReuseIdentifier:)`\
  \ 函数，并提供刚创建的 nib 文件名和复用标识符。\n\n创建该函数后，更新 `viewDidLoad` 函数，使其在视图控制器加载时被调用，如代码清单 3-8\
  \ 所示。\n\n**代码清单 3-8.** Swift 中更新后的 `viewDidLoad` 函数\n\n```\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    // 加载视图后的任何额外设置，通常来自 nib。\n\n    // 配置数据\n   \
  \ do {\n        try setupData()\n    } catch ParsingError.MissingJson {\n      \
  \  print(\"加载 JSON 出错\")\n    } catch ParsingError.JsonParsingError {\n        print(\"\
  解析 JSON 出错\")\n    } catch {\n        print(\"发生未知错误\")\n    }\n\n    // 配置集合视图\n\
  \    configureCollectionView()\n}\n```\n\n在注册了单元格的 nib 之后，你就可以实现 `collectionView(_:cellForItemAtIndexPath:)`\
  \ 函数了，如代码清单 3-9 所示。\n\n**代码清单 3-9.** `collectionView:cellForItemAtIndexPath:` 函数\n\
  \n```\nfunc collectionView(collectionView: UICollectionView, cellForItemAtIndexPath\
  \ indexPath: NSIndexPath) -> UICollectionViewCell {\n    let cell: UICollectionViewCell\
  \ = collectionView.dequeueReusableCellWithReuseIdentifier(\"CardCell\", forIndexPath:\
  \ indexPath)\n\n    let suitDictionary = suitsArray[indexPath.section]\n    let\
  \ cardsArray = suitDictionary[\"cards\"] as! [Dictionary<String, AnyObject>]\n \
  \   let cardDictionary = cardsArray[indexPath.row]\n    let cardImageName = cardDictionary[\"\
  cardImage\"] as! String\n\n    if let cardImage = UIImage(named: cardImageName)\
  \ {\n        if let imageView = cell.contentView.viewWithTag(1000) as? UIImageView\
  \ {\n            imageView.image = cardImage\n        }\n    }\n\n    return cell\n\
  }\n```\n\n`UICollectionView` 与 `UITableView` 类似，会维护一个可回收的单元格队列，以便在需要时重复使用，从而无需为每个项目维护单独的单元格，并将内存开销降至最低。\n\
  \n当集合视图需要显示新单元格时，它会调用其数据源的 `collectionView(_:cellForItemAtIndexPath:)` 函数，并传递一个指向自身的引用以及所需单元格对应的索引路径。\n\
  \n数据源通过 `dequeueReusableCellWithReuseIdentifier(_:forIndexPath:)` 函数出列一个适当类型的缓存单元格。如果队列中有可用单元格，则返回该单元格；否则，会在后台创建一个新的单元格。\n\
  \n无论哪种情况，集合视图都保证会返回一个 `UICollectionViewCell` 实例，然后你可以使用该项目相关的数据进行配置。\n\n值得注意的是，同一个数据源可以为多个集合视图提供服务，因此集合视图在发送请求时会附带一个指向自身的引用，以便数据源能够追踪它正在响应的是哪个集合视图。\n\
  \n\n也正是在这一点上，`reuseIdentifier` 的原理变得清晰起来。你可能有一个集合视图，它要显示多种类型的单元格，每种单元格都会有不同的标识符。当你请求出列一个单元格时，通过提供标识符，就可以控制返回的单元格类型。\n\
  \n拿到返回的 `UICollectionViewCell` 之后，你现在可以配置它了。首先，从 `suitsArray` 中获取相应的 `suitDictionary`，方法是取出数组中索引与集合视图内项目索引相对应的那个对象。\n\
  \n卡片详情以字典形式存储在数组的元素中。你所需元素的索引，应与传入 `cellForItemAtIndexPath` 函数的 `indexPath` 参数的\
  \ `row` 值相对应。\n\n检索到 `cardDictionary` 后，你可以通过由 `cardImage` 键标识的 `String` 对象来访问图片名称。PNG\
  \ 图片会被加载到一个 `UIImage` 对象中。\n\n如果存在有效的 `UIImage` 对象，那么你尝试访问单元格中的 `UIImageView`。它的标签值是\
  \ `1000`，所以可以通过 `contentView` 的 `viewWithTag()` 属性来访问。\n\n由于此属性返回的是一个可选值，你需要在将其\
  \ `image` 属性设置为你刚刚创建的卡片图片之前，检查它是否已被解包。\n\n最后，将这个单元格返回给请求它的集合视图。\n\n继续运行这个应用。你可能会对自己看到的结果感到惊讶。看起来还不错，但还有些不太对劲，正如你在图\
  \ 3-24 中看到的那样。\n\n![A978-1-4842-1242-4_3_Fig24_HTML.jpg](img/A978-1-4842-1242-4_3_Fig24_HTML.jpg)\n\
  \n图 3-24.\n还不算完美的集合视图\n\n### 配置集合视图的布局\n\n你现在面临的问题是，集合视图并不真正知道应该如何布局它的项目。它已经尽力了，但仍有改进的空间。\n\
  \n有两种方法可以做到这一点：你可以创建一个 `UICollectionViewLayout` 的子类并将其应用于集合视图，或者你可以采用更简单（但最终灵活性较差）的方法，直接配置集合视图。\n\
  \n因为这是一个简单的应用，我们采用简单的方法。在 Storyboard 中选择集合视图，然后切换到尺寸检查器。更新集合视图的值，使其与图 3-25 一致。\n\
  \n![A978-1-4842-1242-4_3_Fig25_HTML.jpg](img/A978-1-4842-1242-4_3_Fig25_HTML.jpg)\n\
  \n图 3-25.\n调整后的尺寸值\n\n现在，如果你再次运行应用，你会看到项目、行和分区间距看起来好多了，如图 3-26 所示。\n\n![A978-1-4842-1242-4_3_Fig26_HTML.jpg](img/A978-1-4842-1242-4_3_Fig26_HTML.jpg)\n\
  \n图 3-26.\n实际应用中的新间距值\n\n你可能已经注意到，你没有更新单元格大小的值。事实证明，你不需要这样做，因为当使用像这样非常简单的布局时，集合视图足够智能，能够将单元格大小适配到内容。\n\
  \n### 应用运行\n\n完成所有这些步骤后，你现在可以运行应用了！如果你尝试旋转设备或模拟器，你会看到集合视图的布局会自动更新，并且项目会整齐地排列以填满视图的边界，如图\
  \ 3-27 所示。\n\n![A978-1-4842-1242-4_3_Fig27_HTML.jpg](img/A978-1-4842-1242-4_3_Fig27_HTML.jpg)\n\
  \n图 3-27.\n在横屏方向运行的应用\n\n## 本章小结\n\n在本章中，你逐步创建了一个非常基础的集合视图：\n\n*   首先，你创建了一些要在集合视图中显示的数据。\n\
  *   然后，使用 Interface Builder，你在窗口中创建了一个 `UICollectionView` 实例。\n*   视图控制器遵循了 `UICollectionViewDataSource`\
  \ 和 `UICollectionViewDelegate` 协议，以便能够为集合视图提供数据并响应交互。\n*   你实现了为集合视图创建单元格所需的代码。\n\
  *   你调整了布局，以控制项目在集合视图边界内的排列方式。\n\n这证明了 `UICollectionView` 的强大功能。通过设置四个属性，你创建了一个能够处理任意数量、任意大小和任意方向项目的布局，并且由于单元格的缓存机制，所有这些操作都占用极小的内存并拥有流畅的滚动性能。\n\
  \n你在此构建的应用结构是所有基于集合视图的应用的基础，因此你可以将其作为自己项目的起点。当你更深入地研究 `UICollectionView` 时，你会重复使用许多相同的模式。\n\
  \n现在，是时候更详细地了解集合视图和单元格是如何构建的，以及它们如何被自定义并响应交互了。\n\n"
- "# 4. 集合视图的构成\n\n在本章中，你将快速浏览一下集合视图及其构成元素。虽然本章不会展示大量代码，但它将为你开始自定义集合视图提供一个有用的基础。\n\
  \n在此过程中，你将了解以下内容：\n\n*   集合视图的结构和尺寸\n*   `UICollectionView` 与其超类 `UIScrollView`\
  \ 的关系\n*   如何在代码中以及使用 Interface Builder 创建集合视图\n*   使用 `UICollectionViewController`\
  \ 类来利用其模板方法\n\n## 什么是集合视图？\n\n集合视图提供了一种管理和显示有序数据项集合的方式，并带有可定制和可交互的布局。\n\n集合视图由显示在单元格中的数据项，以及可以显示额外信息的补充视图组成，例如用于节头、节尾，或关于项目本身的元数据。\n\
  \n装饰视图是纯视觉组件，可用于显示背景和边框等界面元素；它们不包含任何可变数据元素。\n\n集合视图在表格视图控件的基础上进行了扩展，提供了实现更复杂布局的潜力。表格视图只能以单列形式显示项目，而集合视图可以用从线性网格到圆形乃至两者之间任何可想到的布局来展示项目。图\
  \ 4-1 显示了一些示例。\n\n![A978-1-4842-1242-4_4_Fig1_HTML.jpg](img/A978-1-4842-1242-4_4_Fig1_HTML.jpg)\n\
  \n图 4-1.\n集合视图示例\n\n\n\n## 集合视图的架构\n\n`UICollectionView` 类是 `UIKit` 框架的一部分，是 `UIScrollView`\
  \ 的子类，而 `UIScrollView` 又继承自 `UIView`、`UIResponder`，最终继承自 `NSObject`，如图 4-2 所示。\n\
  \n![A978-1-4842-1242-4_4_Fig2_HTML.jpg](img/A978-1-4842-1242-4_4_Fig2_HTML.jpg)\n\
  \n**图 4-2.** `UICollectionView` 的继承树\n\n`UICollectionView` 控件与其他四个对象协同工作，如图 4-3\
  \ 所示。集合视图本身由 `UIViewController` 的子类管理，可以是直接管理，也可以是作为继承自 `UIViewController` 的 `UICollectionViewController`\
  \ 实例来管理。\n\n![A978-1-4842-1242-4_4_Fig3_HTML.jpg](img/A978-1-4842-1242-4_4_Fig3_HTML.jpg)\n\
  \n**图 4-3.** 集合视图及其支持对象\n\n`UICollectionViewDataSource` 是一个负责从数据模型获取数据的对象。它利用这些数据来告知集合视图要显示的项目数量和类型，并创建和配置这些项目，然后将它们传递给集合视图本身。\n\
  \n与集合视图的交互（选择、高亮、聚焦等）由充当 `UICollectionViewDelegate` 的对象来处理。\n\n`UICollectionView`\
  \ 采用模型-视图-控制器模式来组织自身。驱动项目和补充视图内容的数据由模型对象提供，而 `UICollectionView` 控件本身则充当视图组件。\n\n\
  控制器部分通常是一个 `UICollectionViewController` 子类，但控制器的角色也可以由另一个独立的类来扮演，甚至可以分散到不同的类中，这些类彼此独立地充当\
  \ `delegate` 和 `dataSource`。\n\n**提示：** 同时充当 `UICollectionView` 数据源和委托的 `UIViewController`\
  \ 子类，往往有变得相当庞大的趋势。为了避免你的项目陷入“臃肿的视图控制器”综合症，值得考虑是否使用一个单独的类来管理集合视图，同时让视图控制器坚守其常规职责，这样结构会更好。\n\
  \n集合视图的布局由一个 `UICollectionViewLayout` 对象管理，该对象通过配置每个项目的各种布局属性，告知集合视图每个单元格、补充视图和装饰视图应如何在集合视图自身的边界内定位。布局的变化可以动画化，并能对交互做出反应。\n\
  \n尽管集合视图和表视图在基本操作上相似（两者都使用数据源来提供要显示的项目，并使用委托来处理交互），但集合视图布局在配置其外观方面提供了更大的灵活性。\n\n\
  与 `UITableView` 一样，集合视图在创建和管理单元格时采用了出队和重用的方法。当创建单元格时，它们会被标记上一个单元格标识符，以便集合视图能够追踪单元格的类型。\n\
  \n当单元格滚动出可见区域时，它们会被存储在一个缓存中，当需要“新的”单元格来显示即将滚动进入视野的项目时，就可以从这个缓存中出队并重用。通过使用单元格标识符，集合视图可以处理多种类型单元格的出队和重用。\n\
  \n创建单元格是一项开销很大的操作，因此这种方法使得集合视图能够在 iOS 设备严格的内存限制下，管理潜在的海量独立数据项，同时保持流畅的滚动和动画性能。关于出队机制如何工作的详细描述，请参见第\
  \ 5 章。\n\n## 集合视图的剖析\n\n集合视图是 `UICollectionView` 类的实例，用于显示可以垂直和水平滚动的项目列表（或单元格）。它们是\
  \ `UICollectionView` 类的实例，由三个物理部分组成。\n\n### 集合视图本身\n\n作为可见容器的 `collectionView` 本身，是\
  \ `UIScrollView` 的一个专门子类，负责将数据项集合作为项目来显示。就像 `UIScrollView` 一样，集合视图的 frame 充当内容视图上的一个“窗口”，而内容视图的大小，取决于所显示项目的数量和大小，可能比\
  \ frame 本身还要大。\n\n内容项目排列在集合视图的边界内。如果内容大于集合视图的 frame，集合视图将处理内容的滚动，无论是响应用户交互还是通过编程方式。图\
  \ 4-4 展示了 frame 和内容之间的关系。\n\n![A978-1-4842-1242-4_4_Fig4_HTML.jpg](img/A978-1-4842-1242-4_4_Fig4_HTML.jpg)\n\
  \n**图 4-4.** frame 与内容视图\n\n如果项目的数量和大小意味着它们都可以适配到集合视图的 frame 内，那么内容将不会滚动。内容视图的总大小由集合视图的布局计算得出，并且每当分区和/或项目的数量发生变化时都会重新计算。\n\
  \n图 4-4 展示了一个采用行和列排列项目的布局的集合视图，但这并非必须如此。通过自定义布局，你可以实现行、列、圆形，或者几乎任何你能想到的排列方式。然而，无论项目如何排列，如果它们不能全部适配到集合视图的\
  \ frame 中，集合视图都会处理滚动。\n\n当内容视图滚动时，集合视图会根据需要从中创建和移除项目。这需要在以下两者之间取得平衡：确保项目总能及时被创建并放置到位，以便在内容视图的该部分滚动到\
  \ frame 内时变为可见；同时又不能创建和维护过多不可见的项目，以免导致集合视图的内存消耗过大。\n\n与 `UITableView` 完全相同，集合视图使用一个预先存在的项目队列，它可以根据需要对这些项目进行出队和重用。就在一个项目即将滚动到可见区域之前，集合视图会从队列中取出它，并用正确的数据进行配置。一旦该项目滚动出可见区域，集合视图会将其放回队列，以备最终重用。通过这种方式，集合视图看起来可以创建并显示数千个项目，而实际上只需创建其中一小部分数量的实际对象在内存中维护。\n\
  \n\n\n#### 集合视图项\n\n集合视图项是 `UICollectionReusableView` 或其子类的实例。它们扮演以下三种角色之一：\n\n\
  -   **项目单元格**，创建为 `UICollectionViewCell` 的实例。它们类似于表格视图的单元格，用于显示主要数据项。例如，在相册应用中，这些单元格可能显示相册中照片的缩略图。\n\
  -   **补充视图**，是 `UICollectionReusableView` 的实例。这些是完全可选的，并且可以有多种用途。在网格型布局中（例如照片库），它们通常用作页眉和页脚（例如相册名称）来提供关于分区的元数据。在更复杂的布局中，它们可用于显示关于项目的附加信息，例如图像元数据。\n\
  -   **装饰视图**，也是 `UICollectionReusableView` 的实例（也是可选的）。它们独立于集合视图的模型，不显示任何数据。通常用于显示视觉元素，例如背景。\n\
  \n图 4-5 以高亮显示各种类型视图的方式，展示了具有网格布局的集合视图的概念组成部分。\n\n![A978-1-4842-1242-4_4_Fig5_HTML.jpg](img/A978-1-4842-1242-4_4_Fig5_HTML.jpg)\n\
  \n*图 4-5. 集合视图的基本结构*\n\n图 4-6 展示了 iOS iBooks 应用中实际运行的集合视图。它使用单元格来显示书籍封面，使用包含下载控件的补充视图，以及使用装饰视图来提供背景渐变“书架”效果。\n\
  \n![A978-1-4842-1242-4_4_Fig6_HTML.jpg](img/A978-1-4842-1242-4_4_Fig6_HTML.jpg)\n\
  \n*图 4-6. iBooks 应用*\n\n与 `UITableViewCell` 不同，`UICollectionViewCell` 没有预定义的单元格类型。相反，你会得到一个空的\
  \ `contentView`，你可以在其中放置自己的控件。因此，当构建集合视图时，你最终总是需要创建至少一个单元格对象。\n\n可以通过以下几种方式创建单元格：\n\
  \n-   在 Storyboard 中可视化为原型单元格\n-   在独立的 `.xib` 文件中可视化为集合视图单元格\n-   在代码中，通过配置 `UICollectionViewCell`\
  \ 的“标准”实例\n-   作为自定义的 `UICollectionViewCell` 子类\n\n我们将在后面的章节中探讨所有这四种方法。\n\n### 集合视图布局\n\
  \n与表格视图不同，集合视图对如何布局其项目的位置一无所知。相反，它们依赖一个独立的对象——集合视图布局——来在任意给定时刻确定每个项目的属性。然后，集合视图使用这些属性来确定每个项目应该出现的位置及其外观。\n\
  \n集合视图的布局是 `UICollectionViewLayout` 的子类，负责计算集合视图的整体内容大小，以及在集合视图请求时为每个单独项目计算布局属性。\n\
  \n这些属性控制项目显示和放置的各个方面：frame、bounds、center、size、transform、`transform3D`、alpha、z-index\
  \ 和可见性。通过操作这些属性，可以设计出从简单的项目行和列到复杂的、动画交互式 3D 排列的布局。\n\n可以单独请求特定项目的属性，也可以批量请求集合视图内容区域内特定部分包含的所有项目的属性。高效地执行所涉及的计算，对于确保集合视图性能起着重要作用。\n\
  \n由于行和列布局非常常见，`UIKit` 附带了一个名为 `UICollectionViewFlowLayout` 的预定义 `UICollectionViewLayout`\
  \ 子类。它实现了一个项目水平或垂直行的“自动换行”布局，并自动处理换行位置的确定。这消除了设置集合视图布局所涉及的大量繁重工作，并且也可以对其进行子类化以获得更精细的控制。\n\
  \n我们将在第 15 章和第 16 章详细讨论集合视图布局。\n\n### 详细解析支持对象\n\n集合视图控件本身非常笨拙，它依赖其他五个对象的支持来显示其数据：\n\
  \n-   视图控制器\n-   模型\n-   数据源\n-   委托\n-   布局\n\n每个对象在支持集合视图方面都扮演着特定的角色，它们的组织基于模型-视图-控制器架构。图\
  \ 4-7 显示了这五个对象是如何相互关联的。\n\n![A978-1-4842-1242-4_4_Fig7_HTML.jpg](img/A978-1-4842-1242-4_4_Fig7_HTML.jpg)\n\
  \n*图 4-7. 集合视图与支持对象之间的相互关系*\n\n#### 集合视图的模型\n\n模型包含将通过数据源在集合视图中显示的数据。顾名思义，它是模型-视图-控制器架构中模型组件的一部分。\n\
  \n模型可以采用多种形式；形式将取决于应用中数据需要管理的方式。最简单的形式，模型可能是一维数组，包含一组 `Strings`。更复杂的模型可能涉及二维数组以将数据分割成多个分区，或者可以从本地持久数据库或外部网络源检索数据。\n\
  \n无论模型采用何种形式，它都不会直接与集合视图通信。那是数据源的职责。\n\n#### 集合视图的数据源\n\n数据源对象的职责是在请求时向集合视图提供单元格、补充视图和装饰视图，以便它们能够被集合视图显示。它构成了模型-视图-控制器架构中模型组件的另一部分，并在模型中的底层数据和集合视图本身之间进行调解。\n\
  \n集合视图与其数据源之间的关系由 `UICollectionViewDataSource` 协议定义。集合视图的数据源必须实现一些强制方法，以及一些可选方法。\n\
  \n数据源可以是一个符合 `UICollectionViewDataSource` 协议的独立类，也可以是集合视图的视图控制器。\n\n关于哪种方法是正确的，并没有硬性规定。将功能拆分到一个单独的类中有助于保持应用结构良好，但无论其如何实现，数据源能够尽可能快地将数据返回给集合视图对于最大化性能至关重要。\n\
  \n#### 集合视图的委托\n\n处理与集合视图的用户交互是委托对象的职责，它构成了模型-视图-控制器架构中控制器组件的一部分。\n\n委托是一个实现了 `UICollectionViewDelegate`\
  \ 协议定义的部分或全部方法的类。这些方法处理集合视图项目的选择和高亮。\n\n`UICollectionViewDelegate` 协议中没有强制方法，因此集合视图运行不一定需要\
  \ `delegate` 对象。\n\n就像数据源一样，委托通常是管理集合视图所在视图的 `UIViewController` 子类。然而，这并非必须如此。如果创建一个独立的类来充当委托，有助于保持类的大小可控。\n\
  \n我们将在第 5 章更详细地探讨数据源和委托。\n\n\n\n## 集合视图的布局\n\n与 `UITableView` 不同，`UICollectionView`\
  \ 控件本身并不了解应如何在其内容视图中布局项目，因此它依赖于 `UICollectionViewLayout` 对象为每个项目提供布局属性。\n\n集合视图中的每个项目（单元格、补充视图或装饰视图）都有对应的\
  \ `UICollectionViewLayoutAttributes` 实例。这些实例定义了项目的布局相关属性，并在集合视图请求时由 `UICollectionViewLayout`\
  \ 对象创建。\n\n集合视图在获取每个项目的属性后，会利用这些属性将项目定位到其内容视图中。这些属性控制每个项目的大小、位置、变换和不透明度，但你也可以通过继承\
  \ `UICollectionViewLayoutAttributes` 并添加自定义属性来补充控制项目的其他属性。\n\n如果你的集合视图布局基于一排项目（无论是否换行），那么你可以利用\
  \ `UICollectionViewFlowLayout` 类，它会为你处理大部分布局需求。通常你只需指定项目大小、项目间距和行间距，流式布局便会自动计算出其余一切的排列方式。\n\
  \n对于更复杂的布局，你需要创建一个自定义布局作为 `UICollectionViewLayout` 的子类。此时，你需要负责计算所有必要的属性，以确保项目正确显示。\n\
  \n我们将在第 15 章中更详细地介绍流式布局，并在第 16 章中介绍自定义布局。\n\n## 创建集合视图\n\n由于 `UICollectionView`\
  \ 依赖其委托和数据源的支持，创建过程可分为两个阶段：\n\n- 在 Storyboard、Interface Builder 的 `xib` 文件或代码中设置视觉元素\n\
  - 在代码中设置支持类\n\n尽管这两个步骤都需要在集合视图正常工作前完成，但你可以先执行其中任意一个步骤。我们将在第 15 章中详细讨论如何创建和配置支持类。现在，我们先来看看创建界面所涉及的内容。\n\
  \n### 使用 Interface Builder 创建 UICollectionView\n\n使用 Interface Builder 创建 `UICollectionView`\
  \ 有三种方法：\n\n- 在 Storyboard 场景或 XIB 文件中，将 `UICollectionView` 对象嵌入到现有视图中\n- 创建一个 `UICollectionViewController`\
  \ 对象作为完整的 Storyboard 场景\n- 在向项目添加 `UICollectionViewController` 子类的过程中，创建一个包含 `UICollectionView`\
  \ 的 XIB 文件\n\n#### 将 UICollectionView 嵌入到现有视图中\n\n将 `UICollectionView` 嵌入到 Storyboard\
  \ 或 XIB 的现有视图中非常容易。\n\n在 Interface Builder 中打开 Storyboard 或 XIB。从对象浏览器中将 `UICollectionView`\
  \ 对象拖入主视图，如图 4-8 所示。\n\n![A978-1-4842-1242-4_4_Fig8_HTML.jpg](img/A978-1-4842-1242-4_4_Fig8_HTML.jpg)\n\
  \n图 4-8.\n\n对象浏览器中的 UICollectionView 对象 设置 AutoLayout 约束，以确保集合视图大小正确。通常集合视图会全屏显示，当然，通过使用适当的约束，它可以按任意大小放置在界面中。\n\
  \n通常情况下，集合视图的委托和数据源角色由拥有该场景的视图控制器承担。如果是这种情况，你可以在 Interface Builder 中直接连接它们。\n\n\
  在 Interface Builder 中选择集合视图，然后按住 Ctrl 键并向上拖动到对象树中的视图控制器对象。当鼠标光标悬停在视图控制器对象上时，该对象会高亮显示。松开鼠标按钮，将出现一个显示委托和数据源的弹出窗口，如图\
  \ 4-9 所示。\n\n![A978-1-4842-1242-4_4_Fig9_HTML.jpg](img/A978-1-4842-1242-4_4_Fig9_HTML.jpg)\n\
  \n图 4-9.\n\n连接委托和数据源 依次点击每个选项，将集合视图的委托和数据源连接到视图控制器。\n\n**注意**\n\n仅连接委托和数据源插座并不会实现集合视图工作所需的视图控制器功能。你需要负责确保该类实现了\
  \ `UICollectionViewDelegate` 和 `UICollectionViewDatasource` 协议中要求的方法。这在第 5 章中已有介绍。\n\
  \n#### 将 UICollectionView 添加为 Storyboard 场景\n\n如果你有一个将全屏显示的 `UICollectionView`，则可以将其作为一个完整场景添加到\
