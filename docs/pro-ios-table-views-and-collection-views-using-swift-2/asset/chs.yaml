  \n图 1-12. 旋转后的表格视图\n\n好吧——也许这并不那么令人印象深刻。让我们完成表格视图的连接，使其真正发挥作用。\n\n### 遵循表格视图协议\n\
  \n你刚刚创建的表格视图需要数据源和委托；数据源将为表格提供配置自身和显示单元格所需的信息，而委托将处理诸如单元格选择之类的交互。\n\n你需要让你的 `ViewController`\
  \ 类遵循 `UITableViewDataSource` 和 `UITableViewDelegate` 这两个协议。\n\n> **注意**：数据源和委托将在第\
  \ 3 章、第 4 章和第 5 章中详细介绍。\n\n在类中，更新类声明，使其看起来像列表 1-3 所示。\n\n**列表 1-3.** 让 Swift 类遵循\
  \ `UITableDelegate` 和 `UITableDataSource` 协议\n\n```\nclass ViewController: UIViewController,\
  \ UITableViewDataSource, UITableViewDelegate {\n```\n\n这将告诉编译器期望已实现所需的函数。你会立即看到\
  \ Xcode 显示一个警告，提示 `ViewController` 尚未遵循该协议（如图 1-14 所示）。\n\n![A978-1-4842-1242-4_1_Fig14_HTML.jpg](img/A978-1-4842-1242-4_1_Fig14_HTML.jpg)\n\
  \n图 1-14. 表格视图属性 HUD\n\n![A978-1-4842-1242-4_1_Fig13_HTML.jpg](img/A978-1-4842-1242-4_1_Fig13_HTML.jpg)\n\
  \n图 1-13. Xcode 错误\n\n稍后你将修复这个问题，但首先，让我们将表格连接到 `ViewController` 类。\n\n\n\n#### 连接数据源与委托\n\
  \n你的 `ViewController` 对象即将准备就绪，但表格视图本身还不知道视图控制器将同时充当数据源和委托。你需要将两者连接起来。\n\n有两种方法可以做到这一点：可视化（通过\
  \ Interface Builder）或在代码中实现。对于这个示例应用，你将使用 Interface Builder，因此点击故事板文件再次将其打开。\n\n\
  右键单击表格视图对象（在主 Interface Builder 中或中间窗格的对象树中），你将看到表格视图属性 HUD，如图 1-14 所示。\n\n它显示了你感兴趣的两个出口属性：`dataSource`\
  \ 和 `delegate`。\n\n要连接它们，将鼠标悬停在 `dataSource` 条目右侧的圆圈上。圆圈会变成一个加号符号。从该符号上点击并拖动，会伸出一条蓝色线。将鼠标悬停在对象树中的文件所有者项上，该项会高亮显示为蓝色。松开鼠标，`dataSource`\
  \ 即连接成功。接下来，对 `delegate` 重复相同的过程：从加号符号拖动到文件所有者，松开并连接。\n\n现在，表格视图属性 HUD 将显示 `dataSource`\
  \ 和 `delegate` 都已连接到视图控制器，如图 1-15 所示。\n\n![A978-1-4842-1242-4_1_Fig15_HTML.jpg](img/A978-1-4842-1242-4_1_Fig15_HTML.jpg)\n\
  \n图 1-15. `dataSource` 和 `delegate` 现已连接到视图控制器\n\n#### 显示数据\n\n现在你已经将表格视图连接到其 `delegate`\
  \ 和 `dataSource`，就可以开始让它执行操作了。合乎逻辑的下一步是让表格视图显示其数据。\n\n当表格视图绘制自身时，它会要求其 `dataSource`\
  \ 提供可供显示的单元格。我们将在第 3 章和第 5 章中更详细地探讨这个过程，但现在先让我们创建这些单元格。\n\n`UITableViewDataSource`\
  \ 协议包含两个必需函数和九个可选函数。由于这是一个简单的示例，你将只实现两个必需函数和一个可选函数。\n\n- 第一个必需函数 `tableView(_:numberOfRowsInSection:)`\
  \ 返回该分区最终将包含的行数。\n- 第二个必需函数 `tableView(_:cellForRowAtIndexPath:)` 创建并返回单元格本身。\n\
  - 可选函数是 `numberOfSectionsInTableView(_:)`。在你的应用中它是可选的，因为你使用的是只有一个分区的表格，而默认情况下表格的分区数为\
  \ 1。\n\n稍后，当你处理更复杂的分区表格时，这个函数将变得必不可少，所以我在这里包含了它，尽管严格来说并非必需。\n\n##### `numberOfSectionsInTableView(\
  \ :)`\n\n你有一个包含一个分区的简单表格，所以这个函数将非常简单。切换到 `ViewController.swift` 或 `ViewController.m`，在这里你可以创建该函数，如代码清单\
  \ 1-4 所示。\n\n代码清单 1-4. `numberOfSectionsInTableView( :)` 函数\n\n```\n//MARK: UITableViewDatasource\
  \ functions\n\nfunc numberOfSectionsInTableView(tableView: UITableView) -> Int {\n\
  \    return 1\n}\n```\n\n**注意：** `MARK` 行是编译器指令。它们在编译期间不会被使用，但会在编写过程中标记代码的各个部分。如果你下拉面包屑菜单或在编辑窗格顶部按\
  \ `Ctrl+6`，你会看到这些行将函数列表分隔开，使代码更易于导航。目前使用这些指令不是什么大事，但随着你的类不断增长，在众多函数中寻找特定函数时，它们可能会成为真正的救星。\n\
  \n##### `tableView:numberOfRowsInSection( :)`\n\n为了成功绘制自身，表格视图需要知道该分区中将出现多少行（你的简单表格视图只有一个分区）。\n\
  \n之前，你创建了一个数组来保存数据，并用这个字符串填充了它。该分区的行数将与数组中的元素数量相同。`Array` 类有一个用于返回数组中元素数量的实用函数：`tableData.count`。在视图控制器类中，添加如代码清单\
  \ 1-5 所示的函数。\n\n代码清单 1-5. `tableView:numberOfRowsInSection:` 函数\n\n```\nfunc tableView(tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return tableData.count\n\
  }\n```\n\n相当直接，对吧？\n\n##### 创建单元格\n\n现在你已经将表格视图连接到 `ViewController`，是时候开始创建单元格了。\n\
  \n每当表格需要一个单元格时，它都会通过调用 `cellForRowAtIndexPath:` 函数要求其数据源提供一个。数据源要么创建一个全新的单元格实例，进行配置，然后交还给表格视图，要么从其缓存中取出一个之前创建的实例，再进行配置并交还。\n\
  \n你将在第 5 章中更详细地研究缓存和出队机制，但现在只需记住，数据源利用其缓存来极大地提高表格视图的性能。\n\n首先，将代码清单 1-6 中的函数添加到视图控制器类中，然后我将逐步解释其功能。\n\
  \n代码清单 1-6. `tableView:cellForRowAtIndexPath:` 函数\n\n```\nfunc tableView(tableView:\
  \ UITableView, cellForRowAtIndexPath\nindexPath: NSIndexPath) -> UITableViewCell\
  \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"CellIdentifier\"\
  ,\nforIndexPath: indexPath)\n\n    cell.textLabel!.text = tableData[indexPath.row]\n\
  \    return cell\n}\n```\n\n让我们先看看这个函数本身：\n\n```\nfunc tableView(tableView: UITableView,\
  \ cellForRowAtIndexPath\nindexPath: NSIndexPath) -> UITableViewCell {\n```\n\n该函数返回一个\
  \ `UITableViewCell` 实例，并接受以下两个参数：\n- 调用该单元格的 `tableView`（因为此类可能是多个表格的数据源，所以需要标识当前处理的是哪个表格）\n\
  - 一个 `indexPath`，它具有一个 `row` 属性，用于标识请求单元格的表格行\n\n函数的第一行尝试使用 `dequeueReusableCellWithIdentifier:`\
  \ 函数从 `tableView` 的缓存中获取一个先前实例化的单元格：\n\n```\nlet cell = tableView.dequeueReusableCellWithIdentifier(\"\
  CellIdentifier\", forIndexPath: indexPath)\n```\n\n**提示：** 关于单元格标识符的使用，你将在第 5 章中更深入地探索。现在，你可以将其理解为一个用于标识你正在使用哪种单元格的标签。该表格只有一种单元格，因此使用单一标识符。\n\
  \n在幕后，数据源要么会取出一个现有的单元格实例，要么会为你创建一个全新的实例。你无需为此担心，因为该函数保证会返回一个你可以操作的单元格实例，因此你可以准备配置其内容了。\n\
  \n\n\n### 创建原型单元格\n\n原型单元格是一种“蓝图”，当被调用时，`UITableViewDataSource`会使用它来创建实际的单元格。数据源使用你在`cellForRowAtIndexPath`函数中提供的`cellIdentifier`字符串来确定哪个原型对应哪种类型的单元格。\n\
  \n切换到 **Storyboard**，并通过点击 **文档大纲** 中的 Table View 项来选择 `UITableView`。你会看到画布中的表格视图显示着“Prototype\
  \ Content”，同时**属性检查器**的 Content 下拉菜单中显示着“Dynamic Protoypes”。\n\n将 **Prototype Cells**\
  \ 框中的数字增加到 1 来创建一个原型单元格，如图 1-16 所示。\n\n![A978-1-4842-1242-4_1_Fig16_HTML.jpg](img/A978-1-4842-1242-4_1_Fig16_HTML.jpg)\n\
  \n图 1-16. 增加原型单元格数量\n\n现在，你可以通过在图 1-17 所示的**文档大纲**中选择，来选中这个新创建的原型单元格：\n\n![A978-1-4842-1242-4_1_Fig17_HTML.jpg](img/A978-1-4842-1242-4_1_Fig17_HTML.jpg)\n\
  \n图 1-17. 选中原型单元格\n\n**属性检查器**会显示该原型单元格的属性——因此你可以在此处添加单元格的 `Identifier`，以便数据源能够找到它。\n\
  \n如图 1-18 所示，将 `CellIdentifier` 添加到 `Identifier` 字段——确保单元格标识符与你之前在 ViewController\
  \ 中使用的字符串完全一致。然后保存 Storyboard，并切换回 `ViewController`。\n\n![A978-1-4842-1242-4_1_Fig18_HTML.jpg](img/A978-1-4842-1242-4_1_Fig18_HTML.jpg)\n\
  \n图 1-18. 设置单元格标识符\n\n###### 配置单元格\n\n一旦数据源创建或重用了一个单元格实例，你可以在将其交还给表格视图之前配置它的内容。\n\
  \n关于单元格的更多细节，将在第 6 章中深入探讨，但目前你只需要知道 `UITableViewCell` 包含一个名为 `textLabel` 的 `UILabel`\
  \ 输出口，你可以像下面这样设置它的 `text` 属性：\n\n```\ncell.textLabel!.text = tableData[indexPath.row]\n\
  ```\n\n`tableView` 会向 `cellForRowAtIndexPath()` 函数传递一个 `NSIndexPath` 参数；该参数指明了单元格所属表格的\
  \ `section`（分区）和 `row`（行）。\n\n你对 `section` 并不关心，因为你的表格只有一个分区，但你可以使用 `indexPath`\
  \ 参数的 `row` 属性，从 `tableData` 数组中检索对应的 `String`（或 `NSString`）。\n\n最后，将配置好的单元格通过以下方式返回给\
  \ `tableView`：\n\n```\nreturn cell\n```\n\n###### 运行应用\n\n至此，你已经拥有了一些数据和表格视图，并且已经将向表格视图提供数据的函数连接起来。运行应用程序，你将看到表格视图充满了内容，如图\
  \ 1-19 所示。\n\n![A978-1-4842-1242-4_1_Fig19_HTML.jpg](img/A978-1-4842-1242-4_1_Fig19_HTML.jpg)\n\
  \n图 1-19. 充满内容的表格\n\n在这个成功的节点上，是时候让表格对用户的输入做出响应了。\n\n### 添加交互性\n\n在这一点上，你完全有理由对自己感到满意。你已经拥有了一个能够接收数据、在屏幕上显示数据并且可以滚动（如果还没试过，可以尝试滚动表格）的表格视图。你还可以通过轻点来选择单元格，并且表格视图会高亮显示选中的行。\n\
  \n所有这些功能都是 `UITableView` 实例免费提供的，这为你启动并运行一个表格视图节省了大量时间。但最终，你肯定会希望它能做更多事情。这正是 `UITableViewDelegate`\
  \ 发挥作用的地方。\n\n每当表格接收到某种交互（例如轻点某一行以选中它）时，它都会请求其委托（delegate）来处理该交互。你可以将表格视图视为将如何响应的细节“外包”给了委托。\n\
  \n`UITableViewDelegate` 提供了大量函数，允许表格和单元格（以及其他组件）对用户输入做出反应。除了配置表格视图的外观外，这些函数还支持选中、编辑、重新排序和删除单元格。目前，我们只研究其中一个函数，它能让行在被用户轻点时做出响应。\n\
  \n\n\n#### `tableView:didSelectRowAtIndexPath:`\n\n你的表格视图已经能以有限的方式响应用户输入。当你轻点某个单元格时，它会以浅灰色高亮显示。在后台，表格视图会向代理发送一个调用，表明两件事：某一行已被选中，以及选中的是哪一行。\n\
  \n如果代理实现了 `tableView:didSelectRowAtIndexPath:` 函数，它就可以利用该函数触发其他活动。例如，在 iPhone 的“通讯录”应用中，会显示一个展示联系人详情的视图。在\
  \ iTunes 中，该行所显示的歌曲会开始播放。诸如此类。\n\n在这里，我们不会做如此复杂的事情。当某一行被轻点时，你将在调试器中记录该事件，然后弹出一个模态对话框，显示被轻点的是哪一行。\n\
  \n首先，将列表 1-7 中的函数输入到 `ViewController` 中。\n\n列表 1-7. `tableView:didSelectRowAtIndexPath:`\
  \ 函数\n\n```\n// MARK:\n// MARK: UITableViewDelegate functions\nfunc tableView(tableView:\
  \ UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath) {\n    let messageString\
  \ = \"You tapped row \\(indexPath.row)\"\n    let alertController = UIAlertController(title:\
  \ \"Row tapped\", message: messageString, preferredStyle: .Alert)\n    let okAction\
  \ = UIAlertAction(title: \"OK\", style: .Default, handler: nil)\n    alertController.addAction(okAction)\n\
  \    self.presentViewController(alertController, animated: true) {\n        print(\"\
  \\(messageString)\")\n    }\n}\n```\n\n我们来拆解这个函数。`tableView(_:didSelectRowAtIndexPath:)`\
  \ 函数不返回任何值，并接受以下两个参数：\n\n*   调用该函数的 `UITableView` 实例（与数据源一样，代理可能响应多个表格视图，因此需要能够区分它们）\n\
  *   `indexPath`，其 `row` 属性对应于被轻点的那一行\n\n首先，你创建了一个字符串，它将显示在日志和警告控制器中：\n\n```\nlet\
  \ messageString = \"You tapped row \\(indexPath.row)\"\n```\n\n接着，你创建了 `UIAlertController`：\n\
  \n```\nlet alertController = UIAlertController(title: \"Row tapped\", message: messageString,\
  \ preferredStyle: UIAlertControllerStyle.Alert)\n```\n\n警告控制器需要一个 `UIAlertAction`\
  \ 按钮：\n\n```\nlet okAction = UIAlertAction(title: \"OK\", style: UIAlertActionStyle.Default,\
  \ handler: nil)\nalertController.addAction(okAction)\n```\n\n最后，你呈现了 `UIAlertController`，并在呈现完成时向调试器发送一条消息：\n\
  \n```\nself.presentViewController(alertController, animated: true) {\n    print(\"\
  \\(messageString)\")\n}\n```\n\n**提示**\n\n大多数开发者在查看调试器输出上所花的时间，与他们实际编写代码的时间差不多。如果调试器控制台尚未显示，可通过以下任一方式将其显示出来：从菜单中选择**视图\
  \ ➤ 调试区域 ➤ 显示调试区域**，键入 `Command+Shift+Y`，或单击 Xcode 工具栏左上角三个视图图标中的中间那个。\n\n按 `Command\
  \ + R` 运行代码（如果模拟器仍在运行，请选择退出选项）。然后随机轻点一行。如果一切顺利，你会看到类似图 1-20 的内容。\n\n![A978-1-4842-1242-4_1_Fig20_HTML.jpg](img/A978-1-4842-1242-4_1_Fig20_HTML.jpg)\n\
  \n图 1-20. 轻点一行\n\n恭喜——你刚刚构建了一个功能完备、响应灵敏的表格！\n\n## 理解应用对象的组合方式\n\n在离开 SimpleTable\
  \ 应用去进行更具挑战性的练习之前，值得看看各个对象是如何组合在一起的。该应用有三个主要对象：\n\n*   应用代理\n*   视图控制器\n*   视图（其中嵌入了表格视图）\n\
  \n图 1-21 展示了这三个对象如何关联，以及它们的出口。\n\n![A978-1-4842-1242-4_1_Fig21_HTML.jpg](img/A978-1-4842-1242-4_1_Fig21_HTML.jpg)\n\
  \n图 1-21. 对象图\n\n`AppDelegate` 的 `window` 有一个 `rootViewController` 属性，它与 `ViewController`\
  \ 对象相连。而该对象又有一个 `view` 出口，与 Storyboard 文件中的 `view` 对象相连。Storyboard 中嵌入了 `UITableView`\
  \ 实例，它包含 `delegate` 和 `dataSource` 属性。这些属性又链接回 `ViewController`。\n\n显然，这是一个非常简单的应用，但随着应用变得复杂，花时间勾勒出对象图是值得的。俗话说，一图胜千言，而一张对象图至少能抵过千行注释！\n\
  \n## 总结\n\n在本章中，你逐步创建了一个非常基本的表格视图：\n\n*   首先，你创建了一些要在表格中显示的数据。\n*   然后，使用 Interface\
  \ Builder 在窗口中创建了一个 `UITableView` 实例。\n*   视图控制器遵循了 `UITableViewDataSource` 和 `UITableViewDelegate`\
  \ 协议，以便能够提供表格数据和响应交互。\n*   你实现了创建表格单元格所需的代码。\n*   最后，你让表格对用户输入做出了响应。\n\n接下来，我们将更详细地探讨表格和单元格的构建方式，以及如何对它们进行定制并使其响应用户交互。\n\
  \n"
- '# 2. 表格视图的组成


  在本章中，你将快速了解表格视图及其构成元素。尽管本章不会展示大量代码，但它将为后续定制表格视图提供有用的基础。


  在此过程中，你将了解以下内容：


  *   表格视图的类型和样式

  *   表格视图的结构与尺寸

  *   `UITableView` 与父类 `UIScrollView` 的关系

  *   通过代码和 Interface Builder 创建表格视图

  *   利用 `UITableViewController` 类的模板方法


  ## 理解表格视图


  简单来说，表格视图是一个（通常）可以垂直滚动的项目列表。由于这是一种常见的界面设计模式，UIKit 提供了一套强大的类与协议，以尽可能简单高效地创建和管理表格视图。


  表格视图的范围可以从使用 SDK 提供的标准样式创建的极简列表，到经过高度定制以至于几乎看不出是表格的样式。图 2-1 显示了一些表格视图的示例。


  ![A978-1-4842-1242-4_2_Fig1_HTML.jpg](img/A978-1-4842-1242-4_2_Fig1_HTML.jpg)


  图 2-1. 表格视图示例——内置的“设置”应用、1Password 密码管理器以及 Collins 德语词典应用


  “设置”应用使用了分组静态行，而 1Password 应用是一个带有搜索栏的普通表格视图。Collins 德语词典应用通过自定义单元格实现了独特的排版效果。尽管视觉外观各不相同，但这三个应用都基于
  `UITableViews`，并具有相同的交互模式。




  ## 使用 `UITableView` 系列


  表格视图的核心由构成 `UITableView` 系列的类、协议和视图对象组成：


  - `UITableView` 和 `UITableViewController` 类

  - `UITableViewDelegate` 和 `UITableViewDataSource` 协议

  - `UITableView` 和 `UITableViewCell` 视图对象


  这六个元素协同工作。类提供了表格视图的核心功能，协议定义了各种数据和交互方法，而视图对象则提供了具体的用户界面。


  ### `UITableView` 类层次结构


  `UITableView` 类是 `UIScrollView` 的子类，而 `UIScrollView` 又继承自 `UIView`、`UIResponder`，最终继承自
  `NSObject`，如图 2-2 所示。


  ![A978-1-4842-1242-4_2_Fig2_HTML.jpg](img/A978-1-4842-1242-4_2_Fig2_HTML.jpg)

  *图 2-2. `UITableView` 继承链*


  这意味着 `UITableView` 受益于其父类提供的许多功能。例如，`UIScrollView` 提供了表格的滚动功能，而 `UIResponder` 则允许表格单元格响应用户的触摸和滑动操作。


  > **注意：** 为了减少混淆，当提到类时我会使用 `UITableView`，当提到 `UITableView` 的特定实例时我会使用 `tableView`，而在一般讨论表格视图时，我会使用“表格视图”。


  ## 选择表格视图的类型


  尽管表格视图的视觉外观可以自定义到几乎难以认出是 `UITableView` 类的实例，但其基本形式只有两种：普通和分组。这些基本类型还有两种变体：索引和分段。


  ### 普通表格


  普通表格是 `UITableView` 最基本的原生形式。图 2-3 展示了一个例子（内容可能是有史以来最枯燥的）。


  ![A978-1-4842-1242-4_2_Fig3_HTML.jpg](img/A978-1-4842-1242-4_2_Fig3_HTML.jpg)

  *图 2-3. 普通表格视图及其组成部分*


  当在 Interface Builder 中将表格拖入视图时，默认创建的就是普通表格，不过在代码中创建表格视图时可以指定类型：


  ```

  var tableView: UITableView = UITableView(frame: tvFrame, style:.Plain)

  ```


  如果 `tableView` 中的行数超出框架范围，可以滚动表格以显示更多行。当表格滚动时，右侧滚动区域会出现滚动指示器。


  ### 索引表格


  索引表格在普通表格的基础上增加了额外的导航辅助工具，即索引，它出现在表格视图右侧、紧邻滚动区域的位置。图 2-4 展示了一个例子。


  ![A978-1-4842-1242-4_2_Fig4_HTML.jpg](img/A978-1-4842-1242-4_2_Fig4_HTML.jpg)

  *图 2-4. 索引表格*


  实现索引涉及 `UITableViewDataSource` 协议的方法，第 11 章将详细介绍。


  ### 分段表格


  顾名思义，分段表格将其行分组为多个段。这些段可以带有标题。图 2-5 展示了一个相对简单的文本标题示例，如果需要，这些标题可以替换为复杂的 `UIView` 对象。


  ![A978-1-4842-1242-4_2_Fig5_HTML.jpg](img/A978-1-4842-1242-4_2_Fig5_HTML.jpg)

  *图 2-5. 简单的分段表格*


  这种类型的表格视图使用多个 `UITableViewDataSource` 协议方法来配置段的行为，第 11 章将介绍。


  ### 分组表格


  分组表格更进一步，将各个段分隔成与表格视图背景风格不同的样式。图 2-6 展示了段和分组之间的区别。


  ![A978-1-4842-1242-4_2_Fig6_HTML.jpg](img/A978-1-4842-1242-4_2_Fig6_HTML.jpg)

  *图 2-6. 比较段与分组*


  每个段都有页眉和页脚。这些都是 `UIView` 对象，由两个 `UITableViewDelegate` 方法返回：


  ```

  func tableView(tableView: UITableView, viewForFooterInSection section: Int) -> UIView?

  func tableView(_ tableView: UITableView, viewForHeaderInSection section: Int) ->
  UIView?

  ```


  虽然你可以操作构成整个页眉和页脚的视图，但通常只需能够设置标题即可。`UITableViewDataSource` 提供了两个方法来支持这一点：


  ```

  func tableView(tableView: UITableView, titleForHeaderInSection section: Int) ->
  String?

  func tableView(tableView: UITableView, titleForFooterInSection section: Int) ->
  String?

  ```


  如果出于任何原因需要查找页眉和页脚的尺寸，`UITableView` 可以通过以下方法以 `CGRect` 值的形式返回：


  ```

  func rectForHeaderInSection(_ section: Int) -> CGRect

  func rectForFooterInSection(_ section: Int) -> CGRect

  ```


  整个段（页眉、页脚和内容）的尺寸可通过调用以下方法获得：


  ```

  func rectForSection(_ section: Int) -> CGRect

  ```


  ## 设置 `TableView` 的尺寸


  将 `tableView` 形象化的一种方式是将其视为一个窗口，透过它可以看到由单元格组成的传送带。窗口中可见的单元格数量取决于窗口的大小（由 `tableView`
  的 `frame` 属性指示）以及每个单元格的高度。`frame` 属性是一个包含高度和宽度值的 `CGRect`。


  传送带的总长度——或者更准确地说，`tableView` 以点为单位的高度——可以通过 `contentSize` 属性获取，它返回一个 `CGSize`。然后你可以访问其
  `width` 和 `height` 值。


  在每条“传送带”的顶部和底部，你可以添加一个 `UIView` 作为静态页眉和页脚。这些分别通过 `tableHeaderView` 和 `tableFooterView`
  属性设置。图 2-7 展示了 `tableView` 的尺寸。


  ![A978-1-4842-1242-4_2_Fig7_HTML.jpg](img/A978-1-4842-1242-4_2_Fig7_HTML.jpg)

  *图 2-7. `tableView` 的尺寸*


  在任何时刻可见的单元格可以通过 `tableView` 的 `visibleCells` 属性批量访问。这是一个 `Array`，并会随着表格上下滚动而更新。


  ## 控制 `UITableView` 的背景


  为 `UITableView` 设置背景图像是可行的，虽然过程有些繁琐。步骤如下：


  1. 创建一个 `UIImageView` 实例，并将其 `image` 属性设置为你希望显示在表格后面的图像：`let tableBackgroundImage
  = UIImageView(image: UIImage(named:"myImage"))`

  2. 设置 `UIImageView` 的 `frame` 属性，使其与 `tableView` 的尺寸相同：`tableBackgroundImage.frame
  = tableView.frame`

  3. 更新 `tableView` 的 `backgroundImage` 属性，使其指向新的 `UIImageView` 对象：`tableView.backgroundView
  = tableBackgroundImage`

  4. 将表格单元格的背景色设置为 `clearColor`，以便背景图像可见：`cell.backgroundColor = UIColor.clearColor()`




