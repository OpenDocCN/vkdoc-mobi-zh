  \ 子类的详细内容将在第 5 章中介绍。\n\n将 `UICollectionView` 添加为完整场景有两个步骤。\n\n![A978-1-4842-1242-4_4_Fig12_HTML.jpg](img/A978-1-4842-1242-4_4_Fig12_HTML.jpg)\n\
