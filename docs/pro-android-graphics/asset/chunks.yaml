    \ variables.\n\nThis can be done via a single line of Java code, as shown in Figure\
    \ [16-26](#A978-1-4302-5786-8_16_Chapter.html#Fig26):\n\n```\nRectF drawRect =\
    \ new RectF(0.0f, 0.0f, canvasW, canvasH);\n```\n\nNext, you will use the `Canvas`\
    \ object named `arg0` (the first argument for the method is the naming convention\
    \ Eclipse ADT followed) to invoke your `Canvas` class drawing method that will\
    \ perform an image rounding operation for you. Once you deal with your opacity,\
    \ you’ll be done creating your custom `Drawable`.\n\n![A978-1-4302-5786-8_16_Fig26_HTML.jpg](A978-1-4302-5786-8_16_Fig26_HTML.jpg)\n\
    \nFigure 16-26. Creating a `RectF` object named `drawRect` and configuring it\
