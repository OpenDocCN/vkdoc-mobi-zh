- fmt: '# Summary


    In this first chapter, I laid the foundation for the rest of the book by covering
    some of the key underlying principles of graphics design and digital imaging,
    and by making sure that you have the latest Java SDK and Android ADT SDK installed
    and updated so that we can start writing graphics design code.


    Most of the concepts in this chapter also apply to digital video, 2D and 3D animation,
    and special effects creation. Thus, you won’t have to duplicate any of this knowledge
    over the next few chapters, but it’s important that you understand it here and
    now.


    We first took a look at the various digital image file formats that are currently
    supported in the Android operating system. These include the outdated-but-still-supported
    Compuserve GIF format and the JPEG format, as well as the preferred PNG format
    and the new WebP format.


    You learned about lossy and lossless digital image compression algorithms, and
    found out why Android prefers us to use the latter in order to get a higher quality
    visual result for graphics-intensive applications.


    We then did a quick overview of the Android `View` and `ViewGroup` classes, which
    are used to hold and display digital images and digital video. We also reviewed
    the `android.widget` package, which holds many of the user interface classes that
    we will be utilizing frequently during this book.


    Next, we looked at the building block of digital imaging and video, the pixel,
    and the fundamental concepts of resolution and aspect ratio. You learned how to
    calculate the number of pixels in an image in order to find its raw data footprint
    size. You learned all about aspect ratio and how it defines the shape of your
    image using a ratio of Width-to-Height multipliers.


    Then we looked at how color is handled in digital images using some color theory
    and terminology. You also learned about color depth and additive color and how
    color is created using multiple color channels in an image.


    Next, we looked at hexadecimal notation, and how colors are represented in the
    Android OS using two hexadecimal value slots per color channel. You learned that
    24-bit RGB images use six slots and 32-bit ARGB images use eight slots. You learned
    that hexadecimal values are represented in Android by using a pound sign before
    the hexadecimal data values.


    We then looked at digital image compositing and the concepts of alpha channels
    and pixel blending modes. We explored the power of holding different image elements
    on digital layers of transparency, using alpha channels, and algorithmically blending
    any pixel in an image with any of those layers via dozens of different blending
    modes in the `Porter-Duff` class in Android.


    Next, we looked at the concept of using the alpha channel capabilities to create
    image masks, which allows us to extract subject material out of an image so we
    can later manipulate it individually using Java code or use it in compositing
    layers to create a more complicated images.


    Then, we looked at the concept of anti-aliasing and how it allows us to achieve
    a smooth, professional compositing result by blending pixel color values at the
    edges between two different objects, or between an object and its background.
    We saw how using anti-aliasing in an alpha channel mask allows us to obtain a
    smooth composite between that object and a background image.


    Next, we covered the main factors that are important in image compression, and
    you learned how to achieve a compact data footprint for these digital image assets.
    You learned about dithering and how it allows you to use 8-bit indexed color images
    with good results to reduce file size significantly.


    Finally, you downloaded and installed the latest Java and Android ADT SDK software
    and then configured it for use on your workstation. You did this so that you are
    now completely ready to develop graphics-oriented Android application software
    within the rest of the chapters in this book.


    In the next chapter, you will learn about digital video formats, concepts, and
    optimization. Thus, that chapter will be very similar to this one where you will
    get all the fundamental concepts regarding digital video under your belt, and
    you will also create the framework for your Android application, which you will
    be super-charging, from a graphics design perspective at least, during the duration
    of this Pro Android Graphics Design book.


    # 2. Android Digital Video: Formats, Concepts, and Optimization


    ## Abstract


    In this second chapter, we will take a closer look at how digital video is implemented
    inside the Android operating system. We will build upon the concepts you learned
    in the previous chapter, as all of a digital image''s characteristics apply equally
    to digital video.


    After all, digital video is really just a series of moving digital images. This
    motion aspect of digital video introduces a high level of complexity, as a fourth
    dimension (time) is added into the mathematical equation. This makes working with
    digital video an order of magnitude more complex than working with digital images,
    especially for the codec, which you will be learning about very soon.


    This is especially true when it comes to video compression, and thus, this chapter
    will focus even more on video codecs and the proper way to get the smallest possible
    data footprint using a new media data file format that’s traditionally been (and
    continues to be) a gigabyte-laden monstrosity.


    We will take a look at the digital video file formats that are currently supported
    in Android, as well as the `MediaPlayer` class, which allows video to be played
    back on the screen. You will learn all about the `VideoView` user interface widget,
    which Android has created to implement a `MediaPlayer` for our ease of use in
    a pre-built UI container.


    You’ll learn basic digital video concepts that you will need to understand in
    order to follow what we will be doing with digital video during this chapter.
    We will take a look at digital video optimization from a digital video asset data
    footprint standpoint (app size) as well as from Android device types (a market
    coverage standpoint). You’ll create a `pro.android.graphics` Java package and
    a `GraphicsDesign` Android application in this chapter.'
