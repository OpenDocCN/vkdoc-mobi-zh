  trans: '

    # 测试进度对话框：处理编译器错误


    右键点击你的 `GraphicsDesign` 项目文件夹，选择 `Run As ➤ Android Application` 菜单序列，启动 Nexus
    One 模拟器。加载完毕后，它应该会自动启动你的应用程序，除非你是第一次启动——这种情况下，你可能需要像操作真实安卓设备一样，滑动屏幕解锁。


    如图 19-13 所示，你添加（或重新配置）的 Java 代码中出现了问题，屏幕显示致命崩溃，并提示消息：“不幸的是，Graphics Design 已停止运行。”
    点击消息下方的“确定”按钮，返回 Eclipse ADT IDE，查看你的 `LogCat` 错误日志标签页，看看能否确定需要修改哪些内容才能使应用程序重新正常工作！我还在此截图中展示了你将遇到的其他一些应用程序错误，所以请确保不要偷看（或感到沮丧）！


    ![A978-1-4302-5786-8_19_Fig13_HTML.jpg](img/A978-1-4302-5786-8_19_Fig13_HTML.jpg)


    图 19-13. 在 Nexus One 模拟器中进行测试以及你预期要解决的一些错误


    为了在 IDE 中腾出空间查看 `LogCat` 标签页的内容，请将光标置于图 19-14 所示的 IDE 底部分割线上，点击并向上拖动，使 IDE 底部的六七个“问题”标签页有足够的空间正常工作（约打开
    60%）。


    你会看到大量红色标记的代码；向上滚动这片“红海”，如果你愿意的话，就像《圣经》中那样将其分开，寻找你*知道*是自己编写的代码行号。我的意思是，显然你没有在这个应用程序中编写
    5,041 行代码，甚至 511 行也没有，所以寻找一个你知道是自己编写的代码行号，因为错误很可能出现在你的代码中，而非 Android 的代码中！


    我找到了 `MainActivity.java` 代码的第 28 行，并在此截图中高亮显示；它指出某个对象的初始化或 `<init>` 存在问题，且问题发生在代码的第
    28 行。正是我们放在类顶部的那个 `VideoView` 对象声明和配置。也许我们当初应该听从 Eclipse 的建议，使用那个 `final` 访问修饰符！不过话说回来，也许我们根本不需要。我相当固执，所以别担心；我们很快就会解决一切。


    我的做法是：展开 `import` 语句部分，从类代码顶部向下数 28 行，并确保将每一条 import 语句也算在内。我最终停在了 `VideoView`
    对象实例化代码行，因此我知道这就是接下来需要修改的那行代码。


    ![A978-1-4302-5786-8_19_Fig14_HTML.jpg](img/A978-1-4302-5786-8_19_Fig14_HTML.jpg)


    图 19-14. 拉出 IDE 的 `LogCat` 标签页区域，并为你自己的代码寻找一个合理的行号（28）


    我首先要尝试的，当然是 Eclipse 的建议：在这行代码之前使用 `final` 访问修饰符，并将其放回到 `onCreate()` 方法中的 `setContentView()`
    方法调用之后。


    我的想法是，我们遇到的初始化问题，是由于在代码通过 `setContentView(R.layout.activity_main);` Java 编程语句引用
    UI 定义之前，就试图访问属于 `activity_main.xml` UI 定义一部分的 `splashScreenVideoView`（ID）UI 元素所致。


    所以，为了看看能否让代码工作，我将把这行代码放在 `setContentView()` 方法调用的正下方，如图 19-15 所示，然后第二次测试应用程序，看看我仓促地将
    `VideoView` 剪切粘贴到类顶部是否最终是一个致命的（错误）失误——至少从编程判断的角度来看是这样。


    做出此更改后，使用 `Run As ➤ Android Application` 工作流程，你会发现这确实是问题所在。但正如我所说，固执就是固执，我仍然想找到一种不用
    `final` 访问修饰符来编码 `VideoView` 对象的方法。那么，我们接下来就找出实现这一目标的方法，然后你就可以继续前进，去分开其他“海洋”了。


    ![A978-1-4302-5786-8_19_Fig15_HTML.jpg](img/A978-1-4302-5786-8_19_Fig15_HTML.jpg)


    图 19-15. 使用 `final` 访问修饰符，并将 `VideoView` 的声明和配置放在 `onCreate()` 方法内部


    如果你仔细查看有问题的这一行代码，会发现它相当密集，也可以写成两行代码，方式如下：


    ```

    VideoView splashScreen;

    splashScreen = (VideoView) findViewById(R.id.splashScreenVideoView);

    ```


    事实上，你可以让这段密集的代码变得更冗长——至少在这种情境下——这正是让你能够无需使用 `final` 访问修饰符关键字（以及额外内存）就能编码 `VideoView`
    对象的关键。正如你所见，有时固执（坚持不懈）能带来巧妙的解决方案，这些方案使用更少的内存和（或）高级功能，而实际上并不需要这些功能来优雅地实现当前的编程方案。就像生活一样，编程从来都不容易，你的决定必须在休息一段时间、以新的视角重新审视之后进行全面审查。


    如果你还记得，编译器抛出错误的原因是你试图在通过 `.setContentView()` 方法建立（就位）对象定义之前，初始化一个 `VideoView`
    对象。


    `VideoView` UI 对象的结构已通过 `activity_main.xml` 定义文件中的 XML 定义，你必须通过调用 `.setContentView()`
    方法来“启用”这个 UI 定义，然后才能实际引用这些数据。


    由于 `setContentView()` 方法会将这个 XML 定义放入内存（放入一个 `ContentView` 对象），因此这行代码必须存在于对该 `View`（`ViewGroup`）定义内的任何内容进行引用之前。


    不过，你仍然可以在类顶部声明 `VideoView` 对象供类使用，就像处理其他 `ProgressDialog` 和 `Animation` 对象一样，只要你在那个时间点（在你的代码执行过程或时间线上）不尝试通过调用
    `VideoView` 对象的 `findViewById()` 方法来加载那个 `VideoView` XML 定义即可。为了实现 `VideoView`
    对象的实例化（即通过 XML 定义它），你需要等到进入 `onCreate()` 方法，并执行完设置 `ContentView` 对象的语句之后再进行。最终的代码如图
    19-16 所示，它没有错误，并且能在 Nexus One 模拟器中正常运行。


    ![A978-1-4302-5786-8_19_Fig16_HTML.jpg](img/A978-1-4302-5786-8_19_Fig16_HTML.jpg)


    图 19-16. 以一种有效且无需 `final` 访问修饰符的方式设置你的 `VideoView` 对象


    在图 19-13 的中间部分，我展示了一个错误屏幕，通知我们视频文件无法播放。图 19-13 右侧的屏幕则展示了当你的应用程序正常工作时的画面。


    中间屏幕出现错误消息有两个原因。其中一个你需要彻底查明的是文件格式不兼容（MPEG-4），但你知道事实并非如此，因为上一章关于嵌入式视频播放时你曾使用过这个文件，并且它当时是正常工作的。

    '
- fmt: 'The second reason for the “can’t play this video” type of error message is
    that the Internet connection that you are using is either too slow or has some
    problem with data transfer currently. Mine was slow for some reason, possibly
    due to high traffic during peak usage hours, or a router issue (being serviced
    or upgraded) causing the Internet to have to re-route its traffic. Networking
    is a chaotic scenario and seldom provides a smooth, even stream of data.


    Just to make sure that the file formats you’re using are all correct, and so that
    I can provide you with a range of assets for these video chapters, using both
    MPEG-4 H.264 AVC and WebM VP8 video codecs (and file formats), in the next section
    I’m going to go through the process of creating a WebM digital video asset for
    this `pag480x800portrait` file that you’re using with the Nexus One emulator AVD
    currently.


    ## Streaming Digital Video Using the WebM VP8 Video Codec


    Let’s go back into Squeeze and create a WebM version of your 480x800 video asset,
    since you already have the uncompressed AVI ready to utilize. On the left side
    of Squeeze you will see a WebM (`.webm`) with a right-facing arrow next to it.
    Click this arrow, and open up the WebM presets, and find the `WebM_480p` preset,
    and either copy it or right-click and edit it to create your own custom `Android_WebM_480x800p`
    codec, as shown in Figure [19-17](#A978-1-4302-5786-8_19_Chapter.html#Fig17).


    ![A978-1-4302-5786-8_19_Fig17_HTML.jpg](A978-1-4302-5786-8_19_Fig17_HTML.jpg)


    Figure 19-17. Creating a WebM 480x800p codec preset at 768 KBPS and compressing
    a 480x800 `.webm` asset


    Let’s use that same three-quarters of a megabyte per second that you used for
    the MPEG4 target data rate, so set the `Data Rate` parameter to `768 KBPS` and
    set the `Frame Size` selector to `Same as source`, and finally, leave your `Key
    Frames` default parameter to `Key Frame Every 10 Seconds`.


    Name the preset `Android_WebM_480x800p` and use an Android WebM description, and
    then click the `OK` button to create the new preset, shown in Figure [19-17](#A978-1-4302-5786-8_19_Chapter.html#Fig17)
    on both the left and in the right side of the screen shot.


    Once you are back in Squeeze, use the `Import File` icon at the upper left, and
    navigate to your uncompressed `PAG480x800.avi` AVI file and load it for compression.
    Click the new preset you just created to select it in light blue and then click
    the `Apply` button at the bottom right of your presets panel in order to apply
    it to the source AVI file that you just imported.


    Now you are ready to click the `SqueezeIt!` button and apply the codec to the
    AVI file to create the WebM file. You will notice that the resulting file size
    is quite close to the MPEG4 file size, at around 3.8 megabytes.


    Now all you really have left to do is to modify the code in your application to
    reference a new file by using a modified URL, as shown in Figure [19-18](#A978-1-4302-5786-8_19_Chapter.html#Fig18)
    as well as in the following line of Java code that sets up your `Uri` object:


    `Uri splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag480x800portrait.webm`](http://www.e-bookclub.com/pag480x800portrait.webm)
    `);`


    This time when I tested the app in the emulator the video downloaded and then
    played perfectly! You can see what it looked like before the download finished
    in Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13), and after the download
    finished in Figure [19-3](#A978-1-4302-5786-8_19_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_19_Fig18_HTML.jpg](A978-1-4302-5786-8_19_Fig18_HTML.jpg)


    Figure 19-18. Setting your URI reference to point to the `pag480x800portrait.webm`
    video file instead of the `.mp4` file


    It may well be that the WebM codec is designed to work more efficiently in low-bandwidth
    situations, such as the one I was encountering the week that I was working on
    this chapter. Although the file size is nearly identical between the MPEG-4 and
    WebM versions of this video asset data, the WebM seemed to play more smoothly
    and have a little bit better quality.


    This could be what the development team for this WebM codec are trying to achieve;
    the codec and technology behind it, originally developed by ON2, are owned by
    Google. That is why it’s part of Android and Chrome. It’s easy to surmise, due
    to a static data rate (versus a target-to-max range allowed in MPEG4), that a
    strict setting parameter targets low-bandwidth networks.


    ## Making Your Video Playback App Aware of Its Orientation


    Next, I want to show you how to utilize the different portrait and landscape versions
    of the video assets that you have been creating during this book.


    This will involve changing how you implement your `Uri` object a little bit because
