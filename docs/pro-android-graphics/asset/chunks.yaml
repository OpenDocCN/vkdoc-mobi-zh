  raw: '## Instantiating ImageButton and TransitionDrawable Objects


    You will start by adding in the object instantiation lines of Java code for the
    ImageButton object that will control the triggering of your transition and the
    TransitionDrawable object that will perform that image transition opacity blending
    animation inside your GraphicsDesign application.


    The first thing to instantiate is your user interface element, the multi-state
    ImageButton that you designed in the ImageButton chapter. This is done in a very
    similar fashion to the ImageView UI element object, which is already in place
    at the bottom of your ContentsActivity.java code, but which you will later be
    moving to the top of your onCreate( ) method.


    Let’s name the ImageButton object transitionButton, as it will trigger the TransitionDrawable
    object to start animating, so this is a logical name. You will instantiate your
    ImageButton UI element object for use by using the following line of Java code
    to create, name, and load the Java object:


    `ImageButton transitionButton = (ImageButton)findViewById(R.id.bookmarkImageButton);`


    As you can see in Figure [13-7](#A978-1-4302-5786-8_13_Chapter.html#Fig7), you
    are getting wavy red error highlighting, so mouse-over the ImageButton class reference
    in your code and select the `Import ImageButton` `(android.widget package)` reference
    and have Eclipse ADT write the Import android.widget.ImageButton Java code statement
    for you.


    ![A978-1-4302-5786-8_13_Fig7_HTML.jpg](A978-1-4302-5786-8_13_Fig7_HTML.jpg)


    Figure 13-7.


    Instantiating an ImageButton object named transitionButton and using findViewById
    to reference its ID


    Next, let’s instantiate your TransitionDrawable object. Initially, you’ll do this
    in the most standard way, much like you did with your Paint object. So let’s add
    this short line of Java code, instantiating (and naming) your TransitionDrawable.
    You will use the name transition for this object, using the following Java statement
    at the top of your ContentsActivity class:


    `TransitionDrawable transition;`


    As you can see in Figure [13-8](#A978-1-4302-5786-8_13_Chapter.html#Fig8), this
    instantiation statement is now in place and error-free. Notice that your Import
    statement for the ImageButton is now visible at the top of your Activity subclass
    as well.


    The next line of Java code that you will need to put into place is the line of
    code that will load the TransitionDrawable object with the Drawable XML XML definition,
    which you created in the previous section of the chapter.


    This will load your TransitionDrawable object, which is currently declared or
    instantiated, but is empty (not loaded, or configured). To do this, you must get
    the Drawable (in this case TransitionDrawable) object definition.


    ![A978-1-4302-5786-8_13_Fig8_HTML.jpg](A978-1-4302-5786-8_13_Fig8_HTML.jpg)


    Figure 13-8.


    Instantiating a TransitionDrawable object named transition at the top of the ContentsActivity.java
    class


    This would normally be done with the `.getDrawable( )` method, called off of the
    `transition TransitionDrawable` object, using the following Java code:


    `transition.getDrawable(R.drawable.trans_contents);`


    As you can see in Figure [13-9](#A978-1-4302-5786-8_13_Chapter.html#Fig9), this
    code also comes up as error-free, at least as far as Eclipse ADT is concerned.
    You can see that there is one warning in Eclipse, shown in both Figures [13-8](#A978-1-4302-5786-8_13_Chapter.html#Fig8)
    and [13-9](#A978-1-4302-5786-8_13_Chapter.html#Fig9), because you have not yet
    utilized your transitionButton ImageButton object instantiation.


    ![A978-1-4302-5786-8_13_Fig9_HTML.jpg](A978-1-4302-5786-8_13_Fig9_HTML.jpg)


    Figure 13-9.


    Calling the .getDrawable( ) method off of the transition TransitionDrawable object
    to reference XML


    The next logical coding step for you to take at this point is adding event handling
    to the ImageButton object, which will get rid of that warning and more importantly,
    wire it up to be able to trigger your TransitionDrawable.


    The code to add the `.setOnClickListener( )` method to your transitionButton ImageButton
    object using dot notation is as follows:


    `transitionButton.setOnClickListener(new View.OnClickListener(){ code goes here
    });`


    This calls the .setOnClickListener and creates a new `.OnClickListener( )` inside
    the method, using the `new` keyword and off of the `View` class.


    As you can see in Figure [13-10](#A978-1-4302-5786-8_13_Chapter.html#Fig10), you
    will need to mouse-over this View class reference and `Import View (android.view)`
    in order to get rid of the wavy red line error highlighting.


    ![A978-1-4302-5786-8_13_Fig10_HTML.jpg](A978-1-4302-5786-8_13_Fig10_HTML.jpg)


    Figure 13-10.


    Adding Event Listening to the transitionButton ImageButton using the .setOnClickListener(
    ) method


    As you can see in Figure [13-11](#A978-1-4302-5786-8_13_Chapter.html#Fig11), this
    writes your Import android.view.View statement for you, but also brings up another
    wavy red error highlight. This time it is because there is nothing inside your
    curly braces, and Android expects to see your `.onClick( )` event handling method
    implemented inside those curly braces, but there isn’t one implemented in there
    yet.


    Again, mouse-over the wavy red error highlighting, and select the option to `Add
    unimplemented methods`, as shown in Figure [13-11](#A978-1-4302-5786-8_13_Chapter.html#Fig11).
    Eclipse ADT will write an .onClick( ) event handling method bootstrap for you
    automatically.


    Now, all you need to do is add in your Java programming logic, which will live
    inside of this empty .onClick( ) event handling method.


    The code that you add inside this event handling method will be called (triggered,
    or executed) when one of your users (initially, this will be yourself, during
    your software testing phase) clicks your multi-state transitionButton ImageButton
    UI element, which you created in [Chapter 9](#A978-1-4302-5786-8_9_Chapter.html).


    ![A978-1-4302-5786-8_13_Fig11_HTML.jpg](A978-1-4302-5786-8_13_Fig11_HTML.jpg)


    Figure 13-11.


    Adding an unimplemented onClick( ) method automatically using Eclipse''s error
    pop-up solution dialog


    What you want to happen when your user clicks your ImageButton is for the image
    transition that is controlled by the TransitionDrawable object that you are setting
    up here to start its playback, just like you would start your other animation
    assets (which we’ll be getting into in much greater depth over the next couple
    of chapters).


    After all, a TransitionDrawable object, that is, an image transition, will be
    considered an animation by most of your viewers. Technically, however, it is simply
    an image-opacity-blending compositing effect where an opacity value is slowly
    changed over time via a Java programming loop.


    The method call used is thus very similar to other animation `start` method calls,
    and is termed the `.startTransition( )` method call. This is what will be inside
    your .onClick( ) event handling method and is called off of the transition TransitionDrawable
    object that you have instantiated and loaded (or so it seems).


    The parameter that you pass into this method call is an integer value that determines
    how many milliseconds your image transition animation will take. This is also
    another indication that the Android OS considers image transition to be a type
    of animation asset, as animation assets deal with milliseconds, so as to give
    developers extremely fine-tuned timing control over their motion graphics assets.
    The event handler code looks like this:


    `@Override`


    `public void onClick(View arg0) {`


    `transition.startTransition(5000);`


    `}`'
