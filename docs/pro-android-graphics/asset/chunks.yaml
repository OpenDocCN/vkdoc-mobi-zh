    # 压缩视频资源：使用 Sorenson Squeeze


    启动 `Sorenson Squeeze 9 Pro` 软件包时，您将看到一个版权启动画面，如图 2-21 所示，并附有进度文字，提示您当前处于软件加载的哪个阶段，例如“正在初始化
    UI”。


    ![A978-1-4302-5786-8_2_Fig21_HTML.jpg](img/A978-1-4302-5786-8_2_Fig21_HTML.jpg)


    图 2-21. Squeeze Pro 9 启动版权画面


    您接下来会看到的画面（图 2-22）是“欢迎使用 Squeeze”对话框，其中包含视频教程和 Squeeze 资源。与我处理 `VirtualDub` 时一样，我建议您利用此类资源，以便在实际工作中运用该软件包之前先熟悉它。


    ![A978-1-4302-5786-8_2_Fig22_HTML.jpg](img/A978-1-4302-5786-8_2_Fig22_HTML.jpg)


    图 2-22. “欢迎使用 Squeeze”画面，提供七个视频教程和五个 Squeeze 资源


    当您使用右下角的 `关闭教程` 按钮关闭教程窗口后，您将看到 Squeeze 主用户界面窗口，如图 2-23 所示。该窗口包含输入选项和视频编辑区域。


    ![A978-1-4302-5786-8_2_Fig23_HTML.jpg](img/A978-1-4302-5786-8_2_Fig23_HTML.jpg)


    图 2-23. Sorenson Squeeze 应用程序，左侧显示视频编解码格式，左上角显示 `导入文件` 图标


    点击左上角的 `导入文件` 按钮，打开图 2-24 所示的对话框，以便您导航至 AVI 文件夹并打开一个文件。


    ![A978-1-4302-5786-8_2_Fig24_HTML.jpg](img/A978-1-4302-5786-8_2_Fig24_HTML.jpg)


    图 2-24. Squeeze 9.0 Professional 的 `导入文件` 对话框，显示 `Terragen3` 路径和 `PAG480x800`
    文件名


    找到 `PAG480x800.avi` 文件并高亮选中它，然后点击 `打开` 按钮，或者找到该文件后直接双击，AVI 文件将会在右侧的 Squeeze 9
    视频编辑区域中打开，如图 2-25 所示。请注意，您的源文件也会显示在软件底部的“处理”区域，并且我已在软件左侧“受众预设”部分的“格式”选项卡中打开了 MPEG-4
    编解码设置预设。


    ![A978-1-4302-5786-8_2_Fig25_HTML.jpg](img/A978-1-4302-5786-8_2_Fig25_HTML.jpg)


    图 2-25. Squeeze 显示已导入的 `PAG480x800.avi` 文件（底部蓝色高亮）以及右键点击 `编辑` 菜单项


    右键点击当前用于 480p 视频的预设（即您将要压缩的视频），然后选择 `编辑` 选项。您将编辑这些预设（压缩参数）以用于 Android。这意味着将比特率从
    1200 调整到 1024，并进行一些其他调整，您接下来将进行这些操作。


    在“预设”对话框中（如图 2-26 所示），您首先要做的是为新的 `Android480x800p` 预设命名，并在 `描述` 数据字段中输入新的说明“Android
    480 乘以 800”。


    确保 `格式约束` 下拉菜单显示为 `无`，并且 `流类型` 下拉菜单显示为 `非流式` 而非 `有提示的`，因为您正在创建的是内嵌视频。


    ![A978-1-4302-5786-8_2_Fig26_HTML.jpg](img/A978-1-4302-5786-8_2_Fig26_HTML.jpg)


    图 2-26. Squeeze 9 视频压缩预设对话框及设置


    确保 `编解码器` 已选中（勾选）并设置为 `MainConcepts H.264`，因为该编解码器具有最佳的大小与质量平衡。`帧速率` 选择应设置为默认的
    1:1 设置，指示编解码器压缩您的 Terragen 3 动画序列 AVI 中的每一帧。


    压缩方法应设置为多遍压缩，这会占用最多的数据处理周期（压缩时间最长），但也能产生最佳效果，您将在本节末尾看到这一点。


    将您的数据速率目标更改为 `768 KBPS`，并选择 `限制最大数据速率` 选项，通过在此数据字段中设置 `133%` 的值，将最大数据速率目标超调容限设置为
    33% 或三分之一。这将为您提供您希望 Android 处理的 `1024 KBPS` 或 `1 MBPS` 的数据量。


    在对话框的右侧，选择 `帧大小` 选项中的 `与源相同`，这样您的像素就不会以任何方式被缩放，并将 `关键帧` 选项设置为 `每 10 帧一个关键帧`，即每秒一次，因为您目前为动画使用了
    `10 FPS`，以实现缓慢但稳定的飞越效果。


    最后，保持选中（勾选）`场景变化时自动设置关键帧` 复选框，并将 `稀疏到频繁` 滑块设置为中位数 `50%` 的值，然后点击 `确定` 按钮。这会将您的设置保存到新的
    `Android480x800p` 预设中，该预设显示在 Squeeze 软件的左侧，如图 2-27 所示。


    ![A978-1-4302-5786-8_2_Fig27_HTML.jpg](img/A978-1-4302-5786-8_2_Fig27_HTML.jpg)


    图 2-27. Squeeze 显示新创建的 `Android480x800p` 视频编解码设置已应用于 `PAG480x800.avi`


    工作流程的下一步是将此新预设应用于您已导入的 `.AVI` 文件。这通过使用位于“格式”（或预设）窗格右下角的 `应用` 按钮来完成。


    在点击 `应用` 按钮之前，请确保 `Android480x800p` 预设处于选中状态（蓝色），以便它是应用于您的 `.AVI` 数字视频素材全帧未压缩源数据的预设。


    一旦您点击 `应用` 按钮，您将看到格式预设直接显示在您的源 AVI 文件下方，如图 2-27 所示。在点击软件右下角的 `开始压缩！` 按钮之前（您可以在图
    2-25 中看到此按钮），请确保您看到了这个情况。


    一旦您点击 `开始压缩！` 按钮，您将看到一个蓝色进度条，如图 2-27 右侧所示，位于 Squeeze 软件底部“项目设置”区域顶部的 `任务` 状态栏旁边。压缩过程完成后，您将看到您的视频素材图标上覆盖着一个播放按钮，如图
    2-28 所示。您可以点击它来预览压缩后的 MP4 文件。


    ![A978-1-4302-5786-8_2_Fig28_HTML.jpg](img/A978-1-4302-5786-8_2_Fig28_HTML.jpg)


    图 2-28. Squeeze 显示已完成的压缩 MP4 文件、播放图标、所用视频编解码器及其他设置


    使用资源管理器比较原始文件和压缩文件的大小，如图 2-29 所示。


    ![A978-1-4302-5786-8_2_Fig29_HTML.jpg](img/A978-1-4302-5786-8_2_Fig29_HTML.jpg)


    图 2-29. 使用 Windows 资源管理器比较相对文件大小（压缩后 vs. 原始）


    让我们计算一下，看看使用这些设置获得了多大的压缩比。如果将这两个数字相除，无论哪个方向（如果您愿意，可以互换分子和分母，结果相当于取倒数），您都会得到接近
    120:1 的压缩比，或者从另一个（取倒数的）方向来看，压缩后的文件大小仅为原始未压缩数据占用空间的 0.8367%，或者说比原始文件压缩了 99.16%。我早就说过，编解码器的能力会令您惊叹！

