    The one other thing that I want you to play around with is adding a move component
    to the current `AnimationSet` object that starts your animation higher up on the
    screen and moves it down the Y axis as the scale and fade occur to make the animation
    look like it is coming down out of the sky.


    To do this, you would declare an `Animation` object named `translateSkyToZero`
    at the top of your class, as you did with the other transformation objects, and
