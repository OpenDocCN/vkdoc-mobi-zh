    Figure 12-8.


    Changing the drawable layer order to place ninepatchframe image asset underneath
    the bookmark0


    Now you are ready to test your new layer compositing stack in the Graphical Layout
    Editor tab. Since that’s not available to you in the contents_layers XML editing
    pane shown in Figure [12-8](#A978-1-4302-5786-8_12_Chapter.html#Fig8), you will
    need to click the `activity_contents.xml` tab at the top of Eclipse and then the
    Graphical Layout Editor tab at the bottom in order to view your revised image
    assets multi-layer composite (LayerDrawable object), as shown in Figure [12-9](#A978-1-4302-5786-8_12_Chapter.html#Fig9).


    The first thing that you will notice is that the hoop part of the bookmark image
    does not overlay on top of the ninepatchframe image layer, as you may have expected
    it to. Think for a moment about what attributes of a 9-patch image asset might
    be influencing the rendering pipeline calculation for this particular layer stack
    compositing order. Did you figure it out yet?


    Think back to the chapter covering Android’s `NinePatch` class ([Chapter 10](#A978-1-4302-5786-8_10_Chapter.html)),
    when you defined your padding values for this 9-patch image asset using the right
    and bottom one-pixel black border line segments. If you recall, what this padding
    area does is to define (or force) anything placed inside this NinePatch asset
    inside the padding area you previously specified. Essentially the padding makes
    sure your NinePatch asset’s “perimeter artwork” is not obscured.


    This is what you are seeing here for the bookmark image asset layer on top of
    and thus rendered inside your ninepatchframe 9-patch image asset.


    So how do I get the hoop to overlay the 9-patch image asset frame, you may be
    wondering. To accomplish this, go back into your Draw 9-patch utility, and extend
    the black lines on the bottom and right all the way to the edges of the image
    asset. This will tell Android that you want your contents in (or on top of, in
    this case) the 9-patch asset to be able to overlap the asset’s image component,
    as well as its interior space. You can also define an alpha channel inside that
    interior 9-patch space so you can use this 9-patch for future compositing, such
    as you are doing here.


