- fmt: "# Transitions: Image Blending to Create an Illusion of Motion\n\nLet’s get\
    \ an overview of what digital imaging transitions are. In Android, these are technically\
    \ called Transition Drawables, and these `LayerDrawable` objects are constructed\
    \ and maintained using the `TransitionDrawable` class.\n\nWe’ll also take a look\
    \ at where image transitions can be utilized to best advantage in an Android application,\
    \ and ways to use them that will provide some wow-factor and graphics design professionalism\
    \ for your Android applications.\n\nImage transitions can be implemented by using\
    \ the types of digital imagery compositing pipelines that you have been implementing\
    \ over the past couple of chapters, so this chapter should be fairly easy for\
    \ you to assimilate into your professional Android graphics design work process.\n\
    \nA differentiating characteristic that makes digital image asset transition programming\
    \ different is that the blending and opacity variables that are usually static\
    \ in an image composite are run through a processing loop (in the Java code) where\
    \ an image transition processing pipeline is concerned.\n\nMaking the image compositing\
    \ pipeline dynamic in this way makes your image assets appear to be animated.\
    \ This is probably a reason why Google Android developers created the `TransitionDrawable`\
    \ class, so that we would not have to write this code ourselves, and to provide\
    \ a popular new media feature.\n\nImage transitions create this appearance of\
    \ animation using only two image assets, so it is great both from an ease-of-use\
    \ standpoint and a data-footprint-optimization standpoint.\n\nSince image transitions\
    \ can give your application an animated feature set, and a dynamic look and feel\
    \ using a fairly easy setup, I’m going to cover this topic before we dive into\
    \ frame animation and procedural animation in Android, which we will be doing\
    \ over the next two chapters, so stay tuned.\n\nImage transitions in Android use\
    \ `LayerDrawable` objects because these types of Drawables in Android have characteristics\
    \ that are needed to implement this animated compositing type of special effect.\
    \ These include opacity or alpha blending as well as location parameters (`top`,\
    \ `bottom`, `left`, or `right`) and the ability to assign an ID and reference\
    \ the drawable asset resource.\n\nImaging transitions within Android can be used\
    \ for many different purposes and in many different areas of the graphics design\
    \ and the user interface design work process, so it is important you master them\
    \ in this chapter.\n\n`TransitionDrawable` objects are essentially Drawable assets,\
    \ so they can be utilized in the source parameter for `ImageView` and `ImageButton`\
    \ UI elements or in the background plate (parameter) for `ImageView` classes (or\
    \ subclass) objects. These can also be used via an `android:background` parameter\
    \ for adding special effects to your layout containers, which can add a wow-factor\
    \ to your user interface screen design quickly, efficiently, and effectively.\n\
    \n## Android’s TransitionDrawable Class: A Transition Engine\n\nAndroid’s `TransitionDrawable`\
    \ class is an indirect subclass of the `Drawable` class, which is a direct subclass\
    \ of the `java.lang.Object` master class. The `TransitionDrawable` is a direct\
    \ subclass of the Android `LayerDrawable` class, which is a direct subclass of\
    \ the Android `Drawable` class.\n\nAs a `LayerDrawable` subclass, the `TransitionDrawable`\
    \ class thus implements all of the features of the `LayerDrawable` class, which\
    \ you learned about in the previous chapter. It also implements additional opacity\
    \ animation features necessary to implement digital image transitions; these are\
    \ specific to this `TransitionDrawable` class, as would be expected.\n\nThe Android\
    \ `TransitionDrawable` class hierarchy is structured as follows:\n\n```\njava.lang.Object\n\
    \  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.LayerDrawable\n\
    \      > android.graphics.drawable.TransitionDrawable\n```\n\nThe `TransitionDrawable`\
    \ class is also part of the `android.graphics.drawable` package. So its import\
    \ statement references an `android.graphics.drawable.TransitionDrawable` package\
    \ import path. You will see an example of this later in this chapter, when you\
    \ write your Java application code to implement a `TransitionDrawable` object\
    \ for use with your digital image animation for your Pro Android Graphics programming\
    \ objectives.\n\nA `TransitionDrawable` object is a type of Drawable object in\
    \ Android, which has the ability to create and manage an array of two Drawable\
    \ objects for the purpose of creating an image transition between the Drawable\
    \ objects.\n\nThe `TransitionDrawable` class was written to be an extension of\
    \ the Android `LayerDrawable` class, which is intended to crossfade (or transition)\
    \ between the first and second layer of an image drawable. This is the reason\
    \ it is a `LayerDrawable` subclass: because it will use the `LayerDrawable` class’s\
    \ code infrastructure as its foundation and then add an animation aspect by running\
    \ `LayerDrawable` attribute (parameter) values through additional Java processing\
    \ (Java loop structures).\n\nA `TransitionDrawable` object can be defined statically\
    \ in your XML file using a `<transition>` parent tag XML element. Each Layer Drawable\
    \ in a transition is defined using a nested `<item>` child tag. We will go over\
    \ this in detail in the next section of this chapter, so that you can see how\
    \ this is done.\n\nTo start the image transition in your Java code, you call the\
    \ method `.startTransition()` using a reference to your `TransitionDrawable` object\
    \ XML definition, which, as you may have guessed, will be in your drawable folder.\n\
    \nTo reset an `ImageView` to show your source layer instead of the destination\
    \ (final) layer, you call the method `.resetTransition()`, after you are sure\
    \ your user is no longer viewing the screen, to prevent image flashing."
  raw: '## Transitions: Image Blending to Create an Illusion of Motion


    Let’s get an overview of what digital imaging transitions are. In Android, these
    are technically called Transition Drawables, and these LayerDrawable objects are
    constructed and maintained using the TransitionDrawable class.


    We’ll also take a look at where image transitions can be utilized to best advantage
    in an Android application, and ways to use them that will provide some wow-factor
    and graphics design professionalism for your Android applications.


    Image transitions can be implemented by using the types of digital imagery compositing
    pipelines that you have been implementing over the past couple of chapters, so
    this chapter should be fairly easy for you to assimilate into your professional
    Android graphics design work process.


    A differentiating characteristic that makes digital image asset transition programming
    different is that the blending and opacity variables that are usually static in
    an image composite are run through a processing loop (in the Java code) where
    an image transition processing pipeline is concerned.


    Making the image compositing pipeline dynamic in this way makes your image assets
    appear to be animated. This is probably a reason why Google Android developers
    created the TransitionDrawable class, so that we would not have to write this
    code ourselves, and to provide a popular new media feature.


    Image transitions create this appearance of animation using only two image assets,
    so it is great both from an ease-of-use standpoint and a data-footprint-optimization
    standpoint.


    Since image transitions can give your application an animated feature set, and
    a dynamic look and feel using a fairly easy setup, I’m going to cover this topic
    before we dive into frame animation and procedural animation in Android, which
    we will be doing over the next two chapters, so stay tuned.


    Image transitions in Android use LayerDrawable objects because these types of
    Drawables in Android have characteristics that are needed to implement this animated
    compositing type of special effect. These include opacity or alpha blending as
    well as location parameters (top, bottom, left, or right) and the ability to assign
    an ID and reference the drawable asset resource.


    Imaging transitions within Android can be used for many different purposes and
    in many different areas of the graphics design and the user interface design work
    process, so it is important you master them in this chapter.


    TransitionDrawable objects are essentially Drawable assets, so they can be utilized
    in the source parameter for ImageView and ImageButton UI elements or in the background
    plate (parameter) for ImageView classes (or subclass) objects. These can also
    be used via an android:background parameter for adding special effects to your
    layout containers, which can add a wow-factor to your user interface screen design
    quickly, efficiently, and effectively.


    ## Android’s TransitionDrawable Class: A Transition Engine


    Android’s TransitionDrawable class is an indirect subclass of the Drawable class,
    which is a direct subclass of the java.lang.Object master class. The TransitionDrawable
    is a direct subclass of the Android LayerDrawable class, which is a direct subclass
    of the Android Drawable class.


    As a `LayerDrawable subclass`, the TransitionDrawable class thus implements all
    of the features of the LayerDrawable class, which you learned about in the previous
    chapter. It also implements additional opacity animation features necessary to
    implement digital image transitions; these are specific to this TransitionDrawable
    class, as would be expected.


    The Android TransitionDrawable class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.drawable.Drawable`


        `> android.graphics.drawable.LayerDrawable`


          `> android.graphics.drawable.TransitionDrawable`


    The TransitionDrawable class is also part of the `android.graphics.drawable` package.
    So its import statement references an `android.graphics.drawable.TransitionDrawable`
    package import path. You will see an example of this later in this chapter, when
    you write your Java application code to implement a TransitionDrawable object
    for use with your digital image animation for your Pro Android Graphics programming
    objectives.


    A TransitionDrawable object is a type of Drawable object in Android, which has
    the ability to create and manage an array of two Drawable objects for the purpose
    of creating an image transition between the Drawable objects.


    The TransitionDrawable class was written to be an extension of the Android LayerDrawable
    class, which is intended to crossfade (or transition) between the first and second
    layer of an image drawable. This is the reason it is a LayerDrawable subclass:
    because it will use the LayerDrawable class’s code infrastructure as its foundation
    and then add an animation aspect by running LayerDrawable attribute (parameter)
    values through additional Java processing (Java loop structures).


    A TransitionDrawable object can be defined statically in your XML file using a
    `<transition>` parent tag XML element. Each Layer Drawable in a transition is
    defined using a nested `<item>` child tag. We will go over this in detail in the
    next section of this chapter, so that you can see how this is done.


    To start the image transition in your Java code, you call the method `.startTransition(
    )` using a reference to your TransitionDrawable object XML definition, which,
    as you may have guessed, will be in your drawable folder.


    To reset an ImageView to show your source layer instead of the destination (final)
    layer, you call the method `.resetTransition( )`, after you are sure your user
    is no longer viewing the screen, to prevent image flashing.'
  trans: "\n# 过渡效果：通过图像混合创建运动幻觉\n\n让我们先概述一下数字图像过渡效果是什么。在 Android 中，它们在技术上被称为过渡 Drawable，这些\
    \ `LayerDrawable` 对象是使用 `TransitionDrawable` 类构建和维护的。\n\n我们还将探讨在 Android 应用程序中，图像过渡效果如何发挥最大优势，以及如何使用它们为你的\
    \ Android 应用增添一些令人惊叹的因素和图形设计的专业感。\n\n图像过渡效果可以通过使用你在过去几章中一直在实现的数字图像合成管线来实现，因此本章应该很容易融入到你专业的\
    \ Android 图形设计工作流程中。\n\n使数字图像资源过渡编程与众不同的一个特点是：在图像合成中通常是静态的混合和不透明度变量，会在一个处理循环（在\
    \ Java 代码中）中运行，这涉及到图像过渡处理管线。\n\n通过这种方式使图像合成管线动态化，可以让你的图像资源看起来像动画一样。这可能就是 Google\
    \ Android 开发者创建 `TransitionDrawable` 类的原因，这样我们就不必自己编写这些代码，并且可以提供一种流行的新媒体特性。\n\n\
    图像过渡效果仅使用两个图像资源就能创造出这种动画外观，因此从易用性和数据占用空间优化的角度来看，它都非常出色。\n\n由于图像过渡效果可以通过相当简单的设置，为你的应用程序提供动画特性集和动态外观，我将在我们深入探讨\
    \ Android 中的帧动画和程序化动画（这将在接下来的两章中进行）之前，先介绍这个主题，敬请期待。\n\nAndroid 中的图像过渡效果使用 `LayerDrawable`\
    \ 对象，因为 Android 中这些类型的 Drawable 具有实现这种动画合成特殊效果所需的特性。这些特性包括不透明度或 Alpha 混合，以及位置参数（`top`、`bottom`、`left`\
    \ 或 `right`），还有分配 ID 和引用 drawable 资源的能力。\n\nAndroid 中的图像过渡效果可以用于许多不同的目的，以及图形设计和用户界面设计工作流程的许多不同领域，因此在本章中掌握它们非常重要。\n\
    \n`TransitionDrawable` 对象本质上是 Drawable 资源，因此它们可以用于 `ImageView` 和 `ImageButton`\
    \ UI 元素的源参数，或者用于 `ImageView` 类（或子类）对象的背景板（参数）。它们还可以通过 `android:background` 参数用于为你的布局容器添加特殊效果，这可以快速、高效、有效地为你的用户界面屏幕设计增添令人惊叹的因素。\n\
    \n## Android 的 TransitionDrawable 类：过渡引擎\n\nAndroid 的 `TransitionDrawable` 类是\
    \ `Drawable` 类的间接子类，而 `Drawable` 类又是 `java.lang.Object` 主类的直接子类。`TransitionDrawable`\
    \ 是 Android `LayerDrawable` 类的直接子类，而 `LayerDrawable` 又是 Android `Drawable` 类的直接子类。\n\
    \n作为 `LayerDrawable` 的子类，`TransitionDrawable` 类因此实现了 `LayerDrawable` 类的所有特性，这些特性你在前一章已经了解过。它还实现了实现数字图像过渡所必需的额外不透明度动画特性；正如所料，这些特性是\
    \ `TransitionDrawable` 类特有的。\n\nAndroid `TransitionDrawable` 类的层次结构如下：\n\n```\n\
    java.lang.Object\n  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.LayerDrawable\n\
    \      > android.graphics.drawable.TransitionDrawable\n```\n\n`TransitionDrawable`\
    \ 类也是 `android.graphics.drawable` 包的一部分。因此，它的导入语句引用了一个 `android.graphics.drawable.TransitionDrawable`\
    \ 包的导入路径。在本章后面，当你编写 Java 应用程序代码来实现一个 `TransitionDrawable` 对象，用于你的数字图像动画以实现你的专业\
    \ Android 图形编程目标时，你会看到一个示例。\n\n`TransitionDrawable` 对象是 Android 中一种 Drawable 对象，它能够创建和管理一个包含两个\
    \ Drawable 对象的数组，目的是在这两个 Drawable 对象之间创建图像过渡效果。\n\n`TransitionDrawable` 类被设计为\
    \ Android `LayerDrawable` 类的扩展，旨在实现图像 drawable 的第一层和第二层之间的交叉淡入淡出（或过渡）。这就是它成为 `LayerDrawable`\
    \ 子类的原因：因为它将使用 `LayerDrawable` 类的代码基础设施作为基础，然后通过额外的 Java 处理（Java 循环结构）来运行 `LayerDrawable`\
    \ 的属性（参数）值，从而添加动画的方面。\n\n`TransitionDrawable` 对象可以在你的 XML 文件中使用 `<transition>`\
    \ 父标签 XML 元素进行静态定义。过渡中的每个层 drawable 都使用嵌套的 `<item>` 子标签来定义。我们将在本章的下一节中详细讨论这一点，以便你了解如何操作。\n\
    \n要在你的 Java 代码中启动图像过渡，你可以使用对 `TransitionDrawable` 对象 XML 定义的引用来调用 `.startTransition()`\
    \ 方法，你可能已经猜到，该 XML 定义位于你的 drawable 文件夹中。\n\n要重置 `ImageView` 以显示源层而不是目标（最终）层，你可以在确认用户不再查看屏幕后调用\
    \ `.resetTransition()` 方法，以防止图像闪烁。\n"
- fmt: "# The `<transition>` Parent Tag: Setting Up Transitions in XML\n\nLet’s continue\
    \ working in your `ContentsActivity.java` and `activity_contents` XML file tabs\
    \ in Eclipse, and implement a `TransitionDrawable` object in your Table of Contents\
    \ Activity screen so that you can see how this is achieved.\n\nFire up your Eclipse\
    \ ADT IDE, if it is not still open on your desktop, and right-click the `/res/drawable`\
    \ folder, as shown in Figure [13-1](#A978-1-4302-5786-8_13_Chapter.html#Fig1),\
    \ and select the **New ➤ Android XML File** menu sequence to open the file creation\
    \ dialog.\n\n![A978-1-4302-5786-8_13_Fig1_HTML.jpg](A978-1-4302-5786-8_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1. Right-clicking the `/res/drawable` folder, and then selecting the\
    \ **New ➤ Android XML File** menu sequence\n\nYou are going to create your new\
    \ `TransitionDrawable` XML definition file, and this work process will automatically\
    \ put it into your `drawable` folder. This `/res/drawable` folder is where you\
    \ have been storing all your drawable assets, such as `LayerDrawable` layer definitions,\
    \ 9-patch image assets, `ImageButton` states, frame animation definitions, and\
    \ now your `TransitionDrawable` object definition. Soon you’ll be storing procedural\
    \ animation definitions here!\n\nIt’s important to note that each of the assets\
    \ in the `/res/drawable` folder are related to `Drawable` objects, and to their\
    \ definitions (frames, states, layers, patches, vectors, etc.), but not to actual\
    \ image assets themselves, with the exception of the 9-patch asset, which is both\
    \ a patch definition and an image asset in one file format. Actual image assets\
    \ go into other `drawable-dpi` folders, which are located alongside the `/res/drawable`\
    \ folder.\n\nThus, any XML definitions in your `/res/drawable` folder will automatically\
    \ reference these image assets (using their different resolution densities), which\
    \ are stored in Android’s five standard `/res/drawable-dpi` imagery and animation\
    \ asset folders. These were created for you when you created your New Android\
    \ Application using the series of dialogs shown in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html).\n\
    \nOnce you select this menu command sequence, you will get a **New Android XML\
    \ File** dialog, which is shown in Figure [13-2](#A978-1-4302-5786-8_13_Chapter.html#Fig2).\
    \ This is already configured for the `GraphicsDesign` project and `Drawable` resource\
    \ type due to your folder hierarchy, and the fact that you clicked the correct\
    \ folder, shown in Figure [13-1](#A978-1-4302-5786-8_13_Chapter.html#Fig1), to\
    \ invoke the dialog. Now, all you have to do is to select the `<transition>` Parent\
    \ Tag root element and name the file `trans_contents.xml` to show that you are\
    \ defining a transition for your `ContentsActivity` class.\n\n![A978-1-4302-5786-8_13_Fig2_HTML.jpg](A978-1-4302-5786-8_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2. Looking for the `<transition>` root element in the New Android\
    \ XML File dialog\n\nAs you can see in Figure [13-2](#A978-1-4302-5786-8_13_Chapter.html#Fig2),\
    \ you’ve hit your first problem in implementing `TransitionDrawable` objects in\
    \ this chapter. Notice that there is no parent (root element) tag available for\
    \ a `<transition>`, although there should be.\n\nI assume this is an oversight\
    \ by the Eclipse ADT development team, and we can’t worry about that now; we just\
    \ need to conform to the next best work process that is available to us. Since\
    \ the `TransitionDrawable` is a `LayerDrawable`, select the `<layer-list>` parent\
    \ tag, or root element, and change this to be a `<transition>` parent tag once\
    \ you’re in the Eclipse editing pane. So, select the `<layer-list>` root element,\
    \ and name the file `trans_contents.xml`, and then click the **Finish** button.\n\
    \nOnce you are done setting your `Drawable` XML file parameters in the dialog,\
    \ you will see the new `trans_contents.xml` file in your Eclipse editing pane,\
    \ ready for use. Replace the `<layer-list>` with your `<transition>` text in the\
    \ parent tag (root element) containers, as shown in Figure [13-3](#A978-1-4302-5786-8_13_Chapter.html#Fig3).\n\
    \n![A978-1-4302-5786-8_13_Fig3_HTML.jpg](A978-1-4302-5786-8_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3. Modifying a `<layer-list>` parent tag (root element) to be a `<transition>`\
    \ parent tag\n\nThe next step in your \"work-around process,\" which is the work\
    \ process to get around the barrier you encountered when implementing a `TransitionDrawable`,\
    \ is to ascertain how \"deep\" this lack of support for the `<transition>` root\
    \ element goes inside Eclipse ADT. The way that I found out was to use the `left\
    \ chevron (<)` work process, and try to bring up the list of supported parent\
    \ tag parameters while inside the parent `<transition>` tag.\n\nBy doing this,\
    \ I can see if the `<transition>` root element selection option simply got left\
    \ out of the **New Android XML** dialog `Drawable` section, or if this `TransitionDrawable`\
    \ root element support has accidentally been left out of Eclipse ADT in its entirety.\n\
    \nAs you can see in Figure [13-3](#A978-1-4302-5786-8_13_Chapter.html#Fig3), when\
    \ I use the `<` key to try to pop up the child tag elements supported list helper\
    \ dialog, nothing appears. Luckily, I know `<item>` tags are used to specify layers,\
    \ and that `TransitionDrawable` is a subclass of `LayerDrawable` and uses the\
    \ same parameters, so I can get around this second barrier to implementation as\
    \ well using manual actions.\n\nSince Eclipse did not give us automatic `<item>`\
    \ `</item>` child tag container tags, we don’t need to split these into one `<item\
    \ />` container like we did in the previous chapter; we can just type them in\
    \ this way manually.\n\nName your first transition layer `imageSource`, since\
    \ it is the source image for the `TransitionDrawable` object using the `android:id`\
    \ parameter.\n\nNext, you will add the `android:drawable` parameter, which will\
    \ reference the `cloudsky.jpg` image asset that you want to be your background\
    \ (bottom) plate (the bottom-most layer at the bottom of your transition image\
    \ layer stack).\n\nOnce you have one of the transition `<item>` child tag constructs,\
    \ you can copy and paste it to create the other transition layer that you need.\
    \ Your XML child `<item>` tag should read:\n\n```\n<item\n    android:id=\"@+id/imageSource\"\
    \n    android:drawable=\"@drawable/cloudsky\" />\n```\n\nRemember that by referencing\
    \ your `cloudsky.jpg` image asset using `@drawable` that Android will find a correct\
    \ resolution density version of this asset in one or more of your `drawable-dpi`\
    \ sub-folders. In this case, since the image is quite scalable, as you have seen\
    \ in previous chapters, you will use only the one 1000-pixel high-density resolution\
    \ asset, and let Android find and scale that one high-resolution image asset,\
    \ as you know this image will scale well in any usage scenario.\n\nIn this case,\
    \ you’ll utilize the `CloudSky` digital image asset as your transition background\
    \ image, and define it using the first (bottom) layer, named `imageSource`, for\
    \ an XML definition for the `TransitionDrawable` object defined in the file `trans_contents.xml`.\n\
    \nNow you are ready to copy and paste this first `<item>` tag so you can create\
    \ your second transition layer. Let’s use a 9-patch asset so that you can see\
    \ if one will work inside a `TransitionDrawable` object.\n\nYour 9-patch image\
    \ asset features an alpha channel; this transparency area will lend some additional\
    \ capabilities (flexibility in implementation) to your `TransitionDrawable` object,\
    \ as you will see later in this chapter.\n\nSelect and copy the first child `<item>`\
    \ tag in your `<transition>` parent tag in its entirety, and then paste it again\
    \ underneath itself, creating an `imageDestination` transition layer for your\
    \ `TransitionDrawable` object’s XML definition. The XML markup for the first and\
    \ the second transition object layer definitions will ultimately look exactly\
    \ like the following markup:\n\n```\n<item\n    android:id=\"@+id/imageSource\"\
    \n    android:drawable=\"@drawable/cloudsky\" />\n<item\n    android:id=\"@+id/imageDestination\"\
    \n    android:drawable=\"@drawable/ninepatchframe\" />\n```"
  raw: '## The <transition> Parent Tag: Setting Up Transitions in XML


    Let’s continue working in your ContentsActivity.java and activity_contents XML
    file tabs in Eclipse, and implement a TransitionDrawable object in your Table
    of Contents Activity screen so that you can see how this is achieved.


    Fire up your Eclipse ADT IDE, if it is not still open on your desktop, and right-click
    the `/res/drawable` folder, as shown in Figure [13-1](#A978-1-4302-5786-8_13_Chapter.html#Fig1),
    and select the New ➤ Android XML File menu sequence to open the file creation
    dialog.


    ![A978-1-4302-5786-8_13_Fig1_HTML.jpg](A978-1-4302-5786-8_13_Fig1_HTML.jpg)


    Figure 13-1.


    Right-clicking the /res/drawable folder, and then selecting the New ➤ Android
    XML File menu sequence


    You are going to create your new TransitionDrawable XML definition file, and this
    work process will automatically put it into your drawable folder. This `/res/drawable`
    folder is where you have been storing all your drawable assets, such as LayerDrawable
    layer definitions, 9-patch image assets, ImageButton states, frame animation definitions,
    and now your TransitionDrawable object definition. Soon you’ll be storing procedural
    animation definitions here!


    It’s important to note that each of the assets in the /res/drawable folder are
    related to Drawable objects, and to their definitions (frames, states, layers,
    patches, vectors, etc.), but not to actual image assets themselves, with the exception
    of the 9-patch asset, which is both a patch definition and an image asset in one
    file format. Actual image assets go into other drawable-dpi folders, which are
    located alongside the /res/drawable folder.


    Thus, any XML definitions in your /res/drawable folder will automatically reference
    these image assets (using their different resolution densities), which are stored
    in Android’s five standard /res/drawable-dpi imagery and animation asset folders.
    These were created for you when you created your New Android Application using
    the series of dialogs shown in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html).


    Once you select this menu command sequence, you will get a New Android XML File
    dialog, which is shown in Figure [13-2](#A978-1-4302-5786-8_13_Chapter.html#Fig2).
    This is already configured for the GraphicsDesign project and Drawable resource
    type due to your folder hierarchy, and the fact that you clicked the correct folder,
    shown in Figure [13-1](#A978-1-4302-5786-8_13_Chapter.html#Fig1), to invoke the
    dialog. Now, all you have to do is to select the `<transition>` Parent Tag root
    element and name the file `trans_contents.xml` to show that you are defining a
    transition for your ContentsActivity class.


    ![A978-1-4302-5786-8_13_Fig2_HTML.jpg](A978-1-4302-5786-8_13_Fig2_HTML.jpg)


    Figure 13-2.


    Looking for the <transition> root element in the New Android XML File dialog


    As you can see in Figure [13-2](#A978-1-4302-5786-8_13_Chapter.html#Fig2), you’ve
    hit your first problem in implementing TransitionDrawable objects in this chapter.
    Notice that there is no parent (root element) tag available for a `<transition>`,
    although there should be.


    I assume this is an oversight by the Eclipse ADT development team, and we can’t
    worry about that now; we just need to conform to the next best work process that
    is available to us. Since the TransitionDrawable is a Layer Drawable, select the
    <layer-list> parent tag, or root element, and change this to be a <transition>
    parent tag once you’re in the Eclipse editing pane. So, select the `<layer-list>`
    root element, and name the file `trans_contents.xml`, and then click the Finish
    button.


    Once you are done setting your Drawable XML file parameters in the dialog, you
    will see the new `trans_contents.xml` file in your Eclipse editing pane, ready
    for use. Replace the <layer-list>with your <transition>text in the parent tag
    (root element) containers, as shown in Figure</transition></layer-list> [13-3](#A978-1-4302-5786-8_13_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_13_Fig3_HTML.jpg](A978-1-4302-5786-8_13_Fig3_HTML.jpg)


    Figure 13-3.


    Modifying a <layer-list> parent tag (root element) to be a <transition> parent
    tag


    The next step in your “work-around process,” which is the work process to get
    around the barrier you encountered when implementing a TransitionDrawable, is
    to ascertain how “deep” this lack of support for the <transition> root element
    goes inside Eclipse ADT. The way that I found out was to use the `left chevron
    (<)` work process, and try to bring up the list of supported parent tag parameters
    while inside the parent Transition tag.


    By doing this, I can see if the <transition> root element selection option simply
    got left out of the New Android XML dialog Drawable section, or if this TransitionDrawable
    root element support has accidentally been left out of Eclipse ADT in its entirety.


    As you can see in Figure [13-3](#A978-1-4302-5786-8_13_Chapter.html#Fig3), when
    I use the < key to try to pop up the child tag elements supported list helper
    dialog, nothing appears. Luckily, I know <item> tags are used to specify layers,
    and that TransitionDrawable is a subclass of LayerDrawable and uses the same parameters,
    so I can get around this second barrier to implementation as well using manual
    actions.


    Since Eclipse did not give us automatic `<item>` `</item>` child tag container
    tags, we don’t need to split these into one `<item />` container like we did in
    the previous chapter; we can just type them in this way manually.


    Name your first transition layer `imageSource`, since it is the source image for
    the TransitionDrawable object using the android:id parameter.


    Next, you will add the `android:drawable` parameter, which will reference the
    `cloudsky.jpg` image asset that you want to be your background (bottom) plate
    (the bottom-most layer at the bottom of your transition image layer stack).


    Once you have one of the transition <item> child tag constructs, you can copy
    and paste it to create the other transition layer that you need. Your XML child
    <item> tag should read


    `<item`


    `android:id="@+id/imageSource"`


    `android:drawable="@drawable/cloudsky" />`


    Remember that by referencing your `cloudsky.jpg` image asset using `@drawable`
    that Android will find a correct resolution density version of this asset in one
    or more of your drawable-dpi sub-folders. In this case, since the image is quite
    scalable, as you have seen in previous chapters, you will use only the one 1000-pixel
    high-density resolution asset, and let Android find and scale that one high-resolution
    image asset, as you know this image will scale well in any usage scenario.


    In this case, you’ll utilize the CloudSky digital image asset as your transition
    background image, and define it using the first (bottom) layer, named `imageSource`,
    for an XML definition for the TransitionDrawable object defined in the file `trans_contents.xml`.


    Now you are ready to copy and paste this first <item> tag so you can create your
    second transition layer. Let’s use a 9-patch asset so that you can see if one
    will work inside a TransitionDrawable object.


    Your 9-patch image asset features an alpha channel; this transparency area will
    lend some additional capabilities (flexibility in implementation) to your TransitionDrawable
    object, as you will see later in this chapter.


    Select and copy the first child <item> tag in your <transition> parent tag in
    its entirety, and then paste it again underneath itself, creating an `imageDestination`
    transition layer for your TransitionDrawable object’s XML definition. The XML
    markup for the first and the second transition object layer definitions will ultimately
    look exactly like the following markup:


    `<item`


    `android:id="@+id/imageSource"`


    `android:drawable="@drawable/cloudsky" />`


    `<item`


    `android:id="@+id/imageDestination"`


    `android:drawable="@drawable/ninepatchframe" />`'
  trans: "\n# `<transition>` 父标签：在 XML 中设置过渡动画\n\n接下来，我们继续在 Eclipse 中操作 `ContentsActivity.java`\
    \ 和 `activity_contents` XML 文件，在目录 Activity 屏幕上实现一个 `TransitionDrawable` 对象，从而了解如何实现这一功能。\n\
    \n如果 Eclipse ADT IDE 尚未打开，请启动它。右键点击 `/res/drawable` 文件夹，如图 13-1 所示，然后选择 **New\
    \ ➤ Android XML File** 菜单序列，打开文件创建对话框。\n\n![A978-1-4302-5786-8_13_Fig1_HTML.jpg](img/A978-1-4302-5786-8_13_Fig1_HTML.jpg)\n\
    \n**图 13-1.** 右键点击 `/res/drawable` 文件夹，然后选择 **New ➤ Android XML File** 菜单序列\n\n\
    您将创建新的 `TransitionDrawable` XML 定义文件，此操作会自动将其放入您的 `drawable` 文件夹。`/res/drawable`\
    \ 文件夹用于存储所有可绘制资源，例如 `LayerDrawable` 图层定义、9-patch 图像资源、`ImageButton` 状态、帧动画定义，以及现在的\
    \ `TransitionDrawable` 对象定义。不久之后，您还将在此处存储程序化动画定义！\n\n需要注意的是，`/res/drawable` 文件夹中的每个资源都与\
    \ `Drawable` 对象及其定义（帧、状态、图层、补丁、矢量等）相关，但不包括实际的图像资源本身，唯一的例外是 9-patch 资源，它在一个文件格式中同时包含了补丁定义和图像资源。实际的图像资源应放入其他\
    \ `drawable-dpi` 文件夹中，这些文件夹与 `/res/drawable` 文件夹同级。\n\n因此，`/res/drawable` 文件夹中的任何\
    \ XML 定义都会自动引用这些图像资源（使用不同的分辨率密度），这些资源存储在 Android 的五个标准 `/res/drawable-dpi` 图像和动画资源文件夹中。当您通过\
    \ 第 2 章 中所示的一系列对话框创建新 Android 应用程序时，这些文件夹就已自动生成。\n\n选中该菜单命令序列后，将出现一个 **New Android\
    \ XML File** 对话框，如图 13-2 所示。由于您的文件夹层次结构以及您点击了正确的文件夹（如图 13-1 所示）来调用该对话框，此对话框已自动配置为\
    \ `GraphicsDesign` 项目和 `Drawable` 资源类型。现在，您只需选择 `<transition>` 父标签根元素，并将文件命名为\
    \ `trans_contents.xml`，以表明您正在为 `ContentsActivity` 类定义一个过渡动画。\n\n![A978-1-4302-5786-8_13_Fig2_HTML.jpg](img/A978-1-4302-5786-8_13_Fig2_HTML.jpg)\n\
    \n**图 13-2.** 在 New Android XML File 对话框中查找 `<transition>` 根元素\n\n如图 13-2 所示，您在实现\
    \ `TransitionDrawable` 对象时遇到了第一个问题。请注意，虽然理论上应该存在，但该对话框中并没有提供 `<transition>` 的父（根元素）标签。\n\
    \n我猜测这是 Eclipse ADT 开发团队的疏忽，但目前我们无需为此担忧；我们只需适应现有的最佳工作流程。由于 `TransitionDrawable`\
    \ 是 `LayerDrawable` 的子类，因此请先选择 `<layer-list>` 父标签（即根元素），待进入 Eclipse 编辑窗格后，再将其修改为\
    \ `<transition>` 父标签。因此，选择 `<layer-list>` 根元素，将文件命名为 `trans_contents.xml`，然后点击\
    \ **Finish** 按钮。\n\n在对话框中完成 Drawable XML 文件参数设置后，您将在 Eclipse 编辑窗格中看到新建的 `trans_contents.xml`\
    \ 文件，可以开始使用。请将父标签（根元素）容器中的 `<layer-list>` 替换为 `<transition>` 文本，如图 13-3 所示。\n\n\
    ![A978-1-4302-5786-8_13_Fig3_HTML.jpg](img/A978-1-4302-5786-8_13_Fig3_HTML.jpg)\n\
    \n**图 13-3.** 将 `<layer-list>` 父标签（根元素）修改为 `<transition>` 父标签\n\n接下来“变通流程”（即绕开实现\
    \ `TransitionDrawable` 时遇到的障碍的工作流程）中的一步，是确认 Eclipse ADT 中对 `<transition>` 根元素的支持缺失到了何种程度。我找到的方法是使用“左尖括号\
    \ (<)”工作流程，尝试在 `<transition>` 父标签内部调出支持的父标签参数列表。\n\n通过此操作，我可以判断 `<transition>`\
    \ 根元素选择选项是否只是被遗漏在 **New Android XML** 对话框的 `Drawable` 部分，还是 Eclipse ADT 完全遗漏了对该根元素的支持。\n\
    \n如图 13-3 所示，当我使用 `<` 键尝试弹出支持的子标签元素列表辅助对话框时，没有任何反应。幸运的是，我知道 `<item>` 标签用于指定图层，并且\
    \ `TransitionDrawable` 是 `LayerDrawable` 的子类，使用相同的参数，因此我可以通过手动操作绕开这第二个实现障碍。\n\n\
    由于 Eclipse 没有自动提供 `<item>` `</item>` 子标签容器标签，我们无需像上一章那样将它们拆分为一个 `<item />` 容器；只需手动以这种方式输入即可。\n\
    \n使用 `android:id` 参数将您的第一个过渡图层命名为 `imageSource`，因为它是 `TransitionDrawable` 对象的源图像。\n\
    \n接下来，您将添加 `android:drawable` 参数，该参数将引用您想要用作背景（底层）图层的 `cloudsky.jpg` 图像资源（即过渡图像层叠堆栈中底部的图层）。\n\
    \n完成一个过渡 `<item>` 子标签结构后，您可以复制并粘贴它以创建所需的另一个过渡图层。您的 XML 子 `<item>` 标签应如下所示：\n\n\
    ```\n<item\n    android:id=\"@+id/imageSource\"\n    android:drawable=\"@drawable/cloudsky\"\
    \ />\n```\n\n请记住，通过使用 `@drawable` 引用 `cloudsky.jpg` 图像资源，Android 会从一个或多个 `drawable-dpi`\
    \ 子文件夹中找到该资源的正确分辨率密度版本。在这种情况下，由于该图像具有很好的可伸缩性（正如您在前几章中看到的），您将仅使用一个 1000 像素的高分辨率资源，并让\
    \ Android 找到并缩放这一个高分辨率图像资源，因为您知道该图像在任何使用场景下都能很好地缩放。\n\n在此例中，您将使用 `CloudSky` 数字图像资源作为您的过渡背景图像，并在第一个（底层）图层（命名为\
    \ `imageSource`）中定义它，用于 `trans_contents.xml` 文件中定义的 `TransitionDrawable` 对象的 XML\
    \ 定义。\n\n现在，您可以复制并粘贴第一个 `<item>` 标签，以创建第二个过渡图层。让我们使用一个 9-patch 资源，以便查看它是否能在 `TransitionDrawable`\
    \ 对象中工作。\n\n您的 9-patch 图像资源包含一个 alpha 通道；此透明区域将为您的 `TransitionDrawable` 对象提供一些额外的功能（实现灵活性），您将在本章后面看到。\n\
    \n完整选中并复制 `<transition>` 父标签中的第一个子 `<item>` 标签，然后将其粘贴到其下方，为您的 `TransitionDrawable`\
    \ 对象的 XML 定义创建一个 `imageDestination` 过渡图层。第一个和第二个过渡对象图层定义的 XML 标记最终将完全如下所示：\n\n\
    ```\n<item\n    android:id=\"@+id/imageSource\"\n    android:drawable=\"@drawable/cloudsky\"\
    \ />\n<item\n    android:id=\"@+id/imageDestination\"\n    android:drawable=\"\
    @drawable/ninepatchframe\" />\n```\n"
- fmt: '如图[13-4](#A978-1-4302-5786-8_13_Chapter.html#Fig4)所示，你的XML没有错误，现在可以进入UI布局容器的XML定义中，引用这个新的Drawable。


    ![A978-1-4302-5786-8_13_Fig4_HTML.jpg](A978-1-4302-5786-8_13_Fig4_HTML.jpg)


    图13-4. 在Eclipse的`trans_contents.xml`文件中完成的`TransitionDrawable`对象XML定义


    请注意在图[13-4](#A978-1-4302-5786-8_13_Chapter.html#Fig4)中，`trans_contents.xml`编辑窗格底部没有“图形布局编辑器”选项卡，只有XML编辑选项卡。这是因为Android的可绘制对象（定义）不可直接渲染，而视图对象（或`ViewGroup`布局容器对象）则可以。


    `trans_contents.xml`是一个定义文件，用于定义图像资源层，但你仍需在`ImageView`对象内部引用它，才能在ADT或Android操作系统中可视化该文件。


    因此，让我们修改`contents_activity.xml`文件中的`<ImageView>`子标签，通过修改`android:src`参数来显示`TransitionDrawable`对象XML定义。你已将现有参数放在标签的第二至第四行，并编辑了指向`trans_contents.xml`文件的图像资源源引用。你将通过以下XML标记来完成这一修改（如图[13-5](#A978-1-4302-5786-8_13_Chapter.html#Fig5)所示）：


    ```

    <ImageView android:src="@drawable/trans_contents"

    android:id="@+id/porterDuffImageView" android:layout_margin="8dp"

    android:layout_width="wrap_content" android:layout_height="wrap_content"

    android:contentDescription="@string/bookmark_utility" />

    ```


    现在，你的`TransitionDrawable`对象XML定义已连接好以供查看，并且你已进入Eclipse ADT的正确区域，能够访问“图形布局编辑器”选项卡——正如你现在在图[13-5](#A978-1-4302-5786-8_13_Chapter.html#Fig5)的XML编辑屏幕底部所看到的。


    正如你在最近几章所见，Android的`Drawable`类（及其子类）对象无法直接可视化。`Drawables`需要通过`View`类（或其子类，如`ViewGroup`）或`Bitmap`类（或其子类，如`BitmapFactory`）对象来引用。在Android中，像我所说的“连接一切”，有时需要多层引用以及转换。


    ![A978-1-4302-5786-8_13_Fig5_HTML.jpg](A978-1-4302-5786-8_13_Fig5_HTML.jpg)


    图13-5. 修改`<ImageView>`的`android:src`参数以引用`TransitionDrawable`的`trans_contents.xml`


    看看你到目前为止的工作，点击Eclipse的“图形布局编辑器”选项卡，这样你就可以可视化这个你在Android中使用XML为`TransitionDrawable`对象（类）实现的数字图像过渡图板。


    如图[13-6](#A978-1-4302-5786-8_13_Chapter.html#Fig6)所示，你的`ImageView`用户界面元素（显示在目录UI设计的底部）现在显示用于`TransitionDrawable`层合成堆栈的背景`cloudsky.jpg`图像资源。


    现在你可以看到，你的`TransitionDrawable`对象在`trans_content.xml`文件中使用XML定义，并通过你的`<LinearLayout>`
    UI容器`ViewGroup`（它使用你的`<ImageView>` UI微件容器及其源图像参数）被加载到视图对象中。


    现在，你的`TransitionDrawable`对象仅使用XML标记就安装并配置完毕，注意到（并感谢）这一点很重要：你完全使用底层XML标记定义了一个高级数字图像过渡特效，并且没有使用任何Java代码。现在，你可以进入Java编程，并跳过用于更复杂方面的各种图像合成环节。


    一旦完成了Java实例化、导入、引用、事件处理以及所有更复杂的工作，你就能测试并享受你的应用新的数字图像过渡功能。


    ![A978-1-4302-5786-8_13_Fig6_HTML.jpg](A978-1-4302-5786-8_13_Fig6_HTML.jpg)


    图13-6. 使用GLE检查引用`TransitionDrawable` XML定义的`<ImageView>` UI元素


    现在你准备好处理一些Java编码了，请进入Eclipse，点击中央编辑窗格顶部的`ContentsActivity.java`标签。'
  raw: 'As you can see in Figure [13-4](#A978-1-4302-5786-8_13_Chapter.html#Fig4),
    your XML is error-free, and you can now go into your UI layout container’s XML
    definition and reference this new Drawable.


    ![A978-1-4302-5786-8_13_Fig4_HTML.jpg](A978-1-4302-5786-8_13_Fig4_HTML.jpg)


    Figure 13-4.


    The completed TransitionDrawable object XML definition in the trans_contents.xml
    file in Eclipse


    Notice in Figure [13-4](#A978-1-4302-5786-8_13_Chapter.html#Fig4) that there is
    no Graphical Layout Editor tab located at the bottom of your trans_contents.xml
    editing pane, only the XML editing tab. This is because Android Drawable objects
    (definition) aren’t directly renderable, but a View object (or a ViewGroup layout
    container object) is.


    This trans_contents.xml file is a definition file, which defines the image asset
    layers, but you’ll still need to reference it from the inside an `ImageView` object
    in order to visualize it inside ADT or in Android OS.


    So, let’s modify your `<ImageView>` child tag in your `contents_activity.xml`
    file to display the TransitionDrawable object XML definition by modifying an `android:src`
    parameter. You have put your existing parameters on lines two through four of
    the tag, and edited the image asset source reference that is pointing to your
    trans_contents.xml file. You will accomplish this change by using the following
    XML markup (this is also shown in Figure [13-5](#A978-1-4302-5786-8_13_Chapter.html#Fig5)):


    `<ImageView android:src="@drawable/trans_contents"`


    `android:id="@+id/porterDuffImageView" android:layout_margin="8dp"`


    `android:layout_width="wrap_content" android:layout_height="wrap_content"`


    `android:contentDescription="@string/bookmark_utility" />`


    Now your TransitionDrawable object XML definition is wired up for viewing, and
    you are in the right area of the Eclipse ADT to be able to access your Graphical
    Layout Editor tab, as you can now see at the bottom of the XML editing screen
    in Figure [13-5](#A978-1-4302-5786-8_13_Chapter.html#Fig5).


    As you saw in recent chapters, Android Drawable class (and subclassed) objects
    cannot be visualized directly. Drawables need to be referenced via View class
    (or subclass, such as ViewGroup), or Bitmap class (or subclass, such as BitmapFactory)
    objects. Wiring things up, as I call it, in Android can sometimes take several
    layers of referencing as well as transmutation.


    ![A978-1-4302-5786-8_13_Fig5_HTML.jpg](A978-1-4302-5786-8_13_Fig5_HTML.jpg)


    Figure 13-5.


    Modifying the <ImageView> android:src parameter to reference TransitionDrawable
    trans_contents.xml


    Take a look at your work so far, and click your Eclipse Graphical Layout Editor
    tab so that you can visualize this digital image transition plate that you have
    implemented inside Android using XML for the Transition Drawable object (class).


    As you can see in Figure [13-6](#A978-1-4302-5786-8_13_Chapter.html#Fig6), your
    ImageView User Interface element, shown at the bottom of the Table of Contents
    UI design, now shows the background cloudsky.jpg image asset for a TransitionDrawable
    layer compositing stack.


    Now you can see that your TransitionDrawable object is defined using XML in your
    trans_content.xml file and is referenced through your <LinearLayout> UI container
    ViewGroup, which is using your <ImageView> UI widget container and its source
    image parameter to load your Drawable object into a View object.


    Now that your TransitionDrawable object is installed and configured using only
    XML markup, it is important to notice (and be grateful for) the fact that you
    just defined a high-level digital image transition special effect entirely using
    low-level XML markup, and zero Java code. You can now get into Java programming
    and jump through the various image compositing hoops required for that more complicated
    side of things.


    Once the Java instantiation and imports and referencing and event handling and
    all of that more complicated stuff is in place, you’ll be able to test and enjoy
    your application’s new digital image transition capabilities.


    ![A978-1-4302-5786-8_13_Fig6_HTML.jpg](A978-1-4302-5786-8_13_Fig6_HTML.jpg)


    Figure 13-6.


    Using the GLE to review <ImageView> UI element referencing your TransitionDrawable
    XML definition


    Now you are ready to tackle some Java coding, so go into Eclipse and click the
    ContentsActivity.java tab at the top of the central editing pane.'
