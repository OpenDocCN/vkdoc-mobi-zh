  raw: 'The second reason for the “can’t play this video” type of error message is
    that the Internet connection that you are using is either too slow or has some
    problem with data transfer currently. Mine was slow for some reason, possibly
    due to high traffic during peak usage hours, or a router issue (being serviced
    or upgraded) causing the Internet to have to re-route its traffic. Networking
    is a chaotic scenario and seldom provides a smooth, even stream of data.


    Just to make sure that the file formats you’re using are all correct, and so that
    I can provide you with a range of assets for these video chapters, using both
    MPEG-4 H.264 AVC and WebM VP8 video codecs (and file formats), in the next section
    I’m going to go through the process of creating a WebM digital video asset for
    this pag480x800portrait file that you’re using with the Nexus One emulator AVD
    currently.


    ## Streaming Digital Video Using the WebM VP8 Video Codec


    Let’s go back into Squeeze and create a WebM version of your 480x800 video asset,
    since you already have the uncompressed AVI ready to utilize. On the left side
    of Squeeze you will see a WebM (.webm) with a right-facing arrow next to it. Click
    this arrow, and open up the WebM presets, and find the WebM_480p preset, and either
    copy it or right-click and edit it to create your own custom Android_WebM_480x800p
    codec, as shown in Figure [19-17](#A978-1-4302-5786-8_19_Chapter.html#Fig17).


    ![A978-1-4302-5786-8_19_Fig17_HTML.jpg](A978-1-4302-5786-8_19_Fig17_HTML.jpg)


    Figure 19-17.


    Creating a WebM 480x800p codec preset at 768 KBPS and compressing a 480x800 .webm
    asset


    Let’s use that same three-quarters of a megabyte per second that you used for
    the MPEG4 target data rate, so set the Data Rate parameter to 768 KBPS and set
    the Frame Size selector to Same as source, and finally, leave your Key Frames
    default parameter to Key Frame Every 10 Seconds.


    Name the preset Android_WebM_480x800p and use an Android WebM description, and
    then click the OK button to create the new preset, shown in Figure [19-17](#A978-1-4302-5786-8_19_Chapter.html#Fig17)
    on both the left and in the right side of the screen shot.


    Once you are back in Squeeze, use the Import File icon at the upper left, and
    navigate to your uncompressed PAG480x800.avi AVI file and load it for compression.
    Click the new preset you just created to select it in light blue and then click
    the Apply button at the bottom right of your presets panel in order to apply it
    to the source AVI file that you just imported.


    Now you are ready to click the SqueezeIt! button and apply the codec to the AVI
    file to create the WebM file. You will notice that the resulting file size is
    quite close to the MPEG4 file size, at around 3.8 megabytes.


    Now all you really have left to do is to modify the code in your application to
    reference a new file by using a modified URL, as shown in Figure [19-18](#A978-1-4302-5786-8_19_Chapter.html#Fig18)
    as well as in the following line of Java code that sets up your Uri object:


    `Uri splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag480x800portrait.webm`](http://www.e-bookclub.com/pag480x800portrait.webm)
    `);`


    This time when I tested the app in the emulator the video downloaded and then
    played perfectly! You can see what it looked like before the download finished
    in Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13), and after the download
    finished in Figure [19-3](#A978-1-4302-5786-8_19_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_19_Fig18_HTML.jpg](A978-1-4302-5786-8_19_Fig18_HTML.jpg)


    Figure 19-18.


    Setting your URI reference to point to the pag480x800portrait.webm video file
    instead of the .mp4 file


    It may well be that the WebM codec is designed to work more efficiently in low-bandwidth
    situations, such as the one I was encountering the week that I was working on
    this chapter. Although the file size is nearly identical between the MPEG-4 and
    WebM versions of this video asset data, the WebM seemed to play more smoothly
    and have a little bit better quality.


    This could be what the development team for this WebM codec are trying to achieve;
    the codec and technology behind it, originally developed by ON2, are owned by
    Google. That is why it’s part of Android and Chrome. It’s easy to surmise, due
    to a static data rate (versus a target-to-max range allowed in MPEG4), that a
    strict setting parameter targets low-bandwidth networks.


    ## Making Your Video Playback App Aware of Its Orientation


    Next, I want to show you how to utilize the different portrait and landscape versions
    of the video assets that you have been creating during this book.


    This will involve changing how you implement your Uri object a little bit because
    you will now be setting a Uri location definition inside a for loop or a switch
    (case) loop statement, so the first thing that you need to do is to move your
    Uri object declaration up to the top of your MainActivity class and outside any
    particular method.


    This will involve deleting the Uri line of code that you just dealt with in Figure
    [19-18](#A978-1-4302-5786-8_19_Chapter.html#Fig18), starting over from scratch,
    and simplifying the line of code to just declare an object (for now), as shown
    in Figure [19-19](#A978-1-4302-5786-8_19_Chapter.html#Fig19), like this:


    `Uri SplashScreenUri;`


    ![A978-1-4302-5786-8_19_Fig19_HTML.jpg](A978-1-4302-5786-8_19_Fig19_HTML.jpg)


    Figure 19-19.


    Placing the Uri object named splashScreenUri declaration at the top of the MainActivity
    class code


    Now, when you put your Uri object definitions deep inside your switch loop full
    of case statements inside an OnCreate() method, references to the Uri object will
    be able to see the Uri object wherever they are. You’ll set the Uri object path
    depending upon each case statement’s comparison constants, which, once ascertained
    by the switch statement, will call the Uri.parse() method on the splashScreenUri
    Uri object that is now accessible globally.'
