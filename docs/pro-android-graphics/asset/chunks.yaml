  trans: '

    # 设备显示概念：尺寸、密度、方向与 DIP


    Android 设备屏幕尺寸仅指任何设备显示屏对角线的实际物理尺寸，以英寸为单位测量。屏幕尺寸通常在产品规格中给出，并且常常包含在产品名称本身中。例如，Nexus
    7 或 Nexus 10 平板电脑的显示屏对角线测量尺寸分别为 7 英寸和 10 英寸。


    Android 操作系统将常见屏幕尺寸归纳为四种通用尺寸常量，包括小、正常、大和超大。截至 Android 4.2.2，还存在一个 XXHDPI 的可绘制资源文件夹，因此请注意未来还将添加一个额外的超大尺寸常量！Android
    4.3 最近还添加了一个 XXXHDPI 常量，以支持当前市场上出现的新型 4K 网络电视。


    Android 设备屏幕密度定义为给定设备显示屏一英寸区域内包含的物理像素数量。物理像素是生成单个像素的实际硬件屏幕元素；因此在 LCD 屏幕上，这代表一个单元格，而在
    OLED 屏幕上，这代表一个有机发光二极管。低密度屏幕每英寸有 120 个像素，而高密度屏幕的像素数量是其两倍，即每英寸 240 个像素。


    图形行业中长期以来将屏幕密度称为 DPI，即每英寸点数。你可能对这个术语很熟悉，因为它与打印机规格相关，而现在由于显示屏的分辨率正接近打印机的分辨率，该术语在此也同样适用。我们将在本章中详细讨论屏幕密度。


    Android 操作系统将常见屏幕密度归纳为六种基本密度常量，包括低 (LDPI)、中 (MDPI)、电视 (TVDPI)、高 (HDPI)、超高 (XHDPI)
    和 XXHDPI。截至 Android 4.2.2，还存在一个 XXHDPI 的可绘制资源文件夹，因此请留意未来某个时候还将添加一个额外的超高屏幕密度常量，以及用于
    4K 网络电视的额外额外超高 (XXXHDPI) 常量。


    Android 设备屏幕方向定义为用户手持 Android 设备的方式，即从用户当前使用 Android 设备的角度来看屏幕的方向。用户只需将屏幕旋转 90
    度，方向即可随时改变。业界长期定义的方向术语称为横屏（宽屏视图）或竖屏（高长视图或上下视图）。


    就宽高比而言，这意味着屏幕宽高比可以是宽的或高的，具体取决于用户握持设备的方式。这显著增加了用户界面和内容开发的难度。


    值得注意的是，不同的 Android 设备在用户开机时默认使用不同的方向。此外，用户只需旋转设备，即可在运行时更改屏幕方向。Android 操作系统中存在
    API 可以检测这种情况，以便你可以根据需要基于设备屏幕方向更改内容和用户界面。如你所见，为 Android 开发图形是一项复杂的工作，这也是本书存在的原因。


    Android 设备屏幕分辨率使用物理像素定义，通常分别使用 X 轴和 Y 轴上的像素总数来指定。如果用户的屏幕方向改变，X 轴变为 Y 轴，Y 轴变为 X
    轴，因此分辨率规格也会改变。


    屏幕分辨率通常使用横屏或宽屏方向参数来指定，因此一个 WVGA 800x480 的屏幕在横屏时使用，而一个 480x800 的 WVGA 屏幕则以竖屏方向使用（观看）。


    对于希望在其应用中支持多种设备屏幕的开发者来说，务必注意：Android 应用程序并不直接通过屏幕分辨率工作。当前的开发方法是让你的 Android 应用程序只关注屏幕尺寸和密度，正如操作系统提供的大小和密度常量所指定的那样。


    Android 开发者实现这一目标的方法是使用 DIP（密度无关像素）单位，在代码和标记中也可以表示为 `DIP` 或 `dip`。可以将 `DIP` 视为一种“虚拟”像素表示形式，当你定义
    UI（用户界面）布局时，应该习惯使用它。正如你将在本书后面看到的，我们将使用 `DIP` 单位来表达布局尺寸和用户界面元素定位，从而提供一种跨设备创建 UI
    布局的密度无关方式。


    根据 Android 开发者网站的说法，一个密度无关像素等同于中等尺寸、MDPI 常量 160 DPI 屏幕上的一个物理像素。Android 操作系统将其用作基线屏幕密度，操作系统假定该密度为“中等”或“普通”设备屏幕。其工作原理是：在运行时，Android
    操作系统在查看运行应用程序的设备屏幕的当前密度后，会透明地处理所有以 `DIP` 定义的单位的缩放。


    `DIP` 单位转换为物理屏幕像素的方式，开发者可以通过以下公式计算：


    ```

    物理像素 = DIP * (DPI/160)

    ```


    例如，在使用 XHDPI（320 DPI）超高密度像素屏幕时，1 个 `DIP` 等于 2 个物理像素。在使用 XXHDPI（480 DPI）超超高密度像素图像屏幕时，1
    个 `DIP` 等于 3 个物理像素。本章下一节中有一个图表（表格），将所有与密度相关的信息集中在一起，敬请期待。


    总而言之，如果 Android 开发者希望确保其用户界面设计在具有不同像素密度（不同的点距或像素间距）的 Android 硬件设备显示屏上正确显示，那么在定义其应用程序
    UI 时需要使用 `DIP`（或 `DP`）单位。


    为了针对多种不同的屏幕尺寸和像素密度优化你的应用程序用户界面和内容，你需要为每种流行的尺寸和密度提供备选资源。此外，你还需要创建备选的用户界面布局以适应某些不同的屏幕宽高比，并为不同的屏幕密度创建备选的数字图像。因此，这就是需要考虑权衡之处的所在。


    诀窍在于，根据你目标设备的类型，选择你的应用需要支持的级别。开发者不必为屏幕尺寸和密度的每一种组合都提供备选资源；这样做会导致巨大的数据占用。如果你使用允许其被调整大小的技术创建了
    UI，Android 提供的兼容性功能可以处理在任何屏幕上渲染应用程序的工作。

    '
- fmt: '# Density Independence: Creating Similar User Experiences


    An Android application is said to achieve density independence when it is able
    to preserve the physical appearance (from an end-user perspective) of the user
    interface elements when they are displayed across display screens that feature
    differing pixel densities or different `DPI`s (dots per inch) or `PPI`s (pixels
    per inch).


    In case you are wondering why device independence is deemed so important, it is
    because without it, all of your UI elements will appear to be larger on a lower-density
    display and much smaller on a higher-density display. You will soon see that density-related
    user interface element size changes can cause visual (user experience or UX) problems
    within the application’s layout, and this could significantly affect your application’s
    usability.


    The Android operating system will help your application achieve density independence
    in a couple different ways. First of all, Android will scale `DIP` units up or
    down as it deems appropriate for a current screen density.


    Secondly, Android will scale your drawable resources to the appropriate size,
    based on the current screen density, if it is necessary. Optimally, it will not
    be necessary, which is why, in this chapter, I am going to go into great detail
    on how to attempt to create three or four different versions of your pixel-based
    assets, so that Android has several equally-spaced-apart resolution density targets
    to choose from. This is so that if Android is forced to scale, it can get close
    to the perfect visual result.


    You may be wondering: Why not just provide one high-resolution asset, and have
    Android scale that down to fit? The short answer is that Android does not perform
    scaling all that well, has no bicubic interpolation algorithm like Photoshop and
    GIMP have, and so we must currently create scaled asset targets ourselves for
    Android to use, by using Photoshop CS6 or GIMP 2.8.


    This is why I cover utilizing those external open source new media content production
    tools in my Android books; because to really nail that pristine result in Android,
    currently one has to leverage other software outside of the Android development
    environment in order to perform media optimization of one type or another. Android
    development spans many software packages!


    In many cases, developers can obtain density independence in an application simply
    by specifying all UI layout dimension values in `DIP` or `DP` units. As you have
    seen in previous chapters already, the use of `match_parent` and `wrap_content`
    constants can match or scale UI areas for us as well. If you have pixel (image)
    assets, it’s not quite as easy!


    Android will scale `PNG`, `GIF`, or `JPEG` bitmap drawables, as well as any video
    assets, in an attempt to display them at an optimal pixel resolution based on
    an optimal scaling factor relative to the current screen density. It is important
    to note that pixel scaling can often result in blur or pixelated results, again,
    due to a currently-less-than-advanced scaling algorithm.


    To avoid scaling artifacts, developers are encouraged to provide several alternative
    bitmap resource levels for three or four different densities. How many of these
    you provide is entirely your call, and deciding this is what this chapter is in
    the book for, so you can calculate this trade-off.


    For example, you should at least provide a high resolution level of bitmap assets
    for large (iTV) and high-density (HD smartphone) screens. Android will intelligently
    use those high resolution assets, instead of up-scaling raster (pixel-based) assets
    designed for medium-density “normal” screens.


    You should also at least have one other set of assets that targets normal size
    mainstream device screens, which feature `MDPI` (medium pixel density). With the
    advent of SmartWatches, you might also consider having well-optimized `LDPI` (low
    density pixel image) assets as well, especially if your application is targeting
    SmartWatches. SmartWatches are currently exploding onto the Android market, with
    a dozen major manufacturers releasing models this year.


    A 160 `DPI` `MDPI` screen density asset is exactly a 2X downsample of the 320
    `DPI` `XHDPI` screen density asset, and is exactly a 3X downsample of the 480
    `DPI` `XXHDPI` screen density asset, as you will see a bit later in the chapter
    when you create launcher icon assets for your `GraphicsDesign` application.


    Table [5-1](#A978-1-4302-5786-8_5_Chapter.html#Tab1) summarizes Android density
    qualifiers, screen size constants, pixel density `DPI`, pixel multiplier (relative
    to the default normal `MDPI`), as well as Android-defined minimum screen sizes
    for each level specified in `DIP`, and finally app system icon types, specified
    with physical pixels.


    Table 5-1. Android Device DPI Chart Showing Six Levels of Pixel Density Screens
    Specifically Supported in Android


    | Android Device DPI Chart | Screen Size | Pixel Density | Pixel Multiplier |
    Minimum DP Screen Size | Launcher Icon Pixel Size | Action Bar Icon Size | Notify
    Icon Size |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | `LDPI` (Low Density Pixels) | small | 120 | 0.75 | 426x320 | 36x36 | 24x24 |
    18x18 |

    | `MDPI` (Medium) (Default) | normal | 160 | 1.0 | 470x320 | 48x48 | 32x32 | 24x24
    |

    | `TVDPI` (HDTV 1280x720) | HDTV | 213 | 1.33 | 640x360 | 64x64 | 48x48 | 32x32
    |

    | `HDPI` (High Density Pixels) | large | 240 | 1.5 | 640x480 | 72x72 | 48x48 |
    36x36 |

    | `XHDPI` (Extra High Density) | xlarge | 320 | 2.0 | 960x720 | 96x96 | 64x64
    | 48x48 |

    | `XXHDPI` (Extra Extra High) | xxlarge | 480 | 3.0 | 1280x960 | 144x144 | 96x96
    | 72x72 |

    | `XXXHDPI` (Extra Extra Extra High) | xxxlarge | 640 | 4.0 | 1920x1440 | 192x192
    | 128x128 | 96x96 |


    When deciding which of these seven target digital image asset density levels to
    develop assets for, I also factor the delivery of new media assets onto platforms
    other than Android, such as HTML5 apps and even digital signage.


    It is important to remember the fact that currently doing your image asset down-sampling
    in Photoshop or GIMP, optimally by an even 2X or 4X, is sure to yield a far superior
    result to the resampling that the Android OS will provide. Thus, the ultimate
    consideration is total app data footprint, and how many different image, frame
    animation, icon or UI element image assets that your application requires. At
    a minimum I would suggest providing the assets for `MDPI`, `HDPI`, and `XHDPI`,
    or at least `MDPI` (160) and `XHDPI` (320).'
