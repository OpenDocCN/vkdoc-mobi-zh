    The next often used View property utilized for integrating graphics is the `android:alpha`
    parameter. This parameter allows you to set the transparency value for the UI
    widget as a whole, including its background image. So you would use android:alpha
    to make the entire UI widget translucent or opaque using a real number setting,
    such as `android:alpha="0.55"` for 55% opacity.


    Since this is a book on advanced graphics and compositing techniques, we will
    be using alpha parameters extensively as the book gets more and more advanced
    as you learn the foundations of Android development that pertain to graphics design.


    The next most often used View property is the `android:src` parameter, which is
    used to define a source image asset. In case you are wondering why this is not
    used more often than background imagery and alpha blending values, it is because
    all widget tags have the android:background parameter, but relatively few tags,
    such as the <ImageView> and the <ImageButton> as well as the <Bitmap> tag, support
    the use of the `android:src` image source referencing parameter.


    This is because the source imagery would cover up the UI widget itself, so to
    have the UI element in front of your image assets (or animation assets) you would
    instead use the android:background parameter. There are a few other places that
    you would use the android:src parameter as well, such as in your AndroidManifest.xml
    file to assign icon assets to the application.


    Finally, there is the `android:visibility` parameter, which is more memory and
    processor efficient than the `android:alpha` parameter. This is because the algorithms
    necessary for alpha blending, which is usually utilized to create semi-translucent
    effects where the background images or elements can show through for graphics
    design effects, are more complex than the simple code to display or not display
    an element on the screen. Alpha can also be animated in your Java code to smoothly
    fade in or fade out a given design element. So use alpha for graphics compositing
    and use visibility for layout or user interface usability implementations, as
    it is less “expensive.”


    If you just want to show and hide View objects, that is, instantly turn on or
    off the visibility on the screen, all View elements such as TextView, ImageButton,
    ImageView, Button, CheckBox, ViewGroup, and the like have a visibility property.
    The visibility of a View can be set to one of three predefined Android value constants:
    VISIBLE (currently visible onscreen), INVISIBLE (hidden with its screen layout
    space still enforced, even though it isn’t visible), and GONE (hidden completely,
    including from the parent layout container’s child layout placement calculation
    algorithm).'
