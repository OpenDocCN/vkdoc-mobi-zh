  trans: '

    # 3. Android 帧动画：XML、概念与优化


    **摘要**


    在第三章中，我们将深入探讨如何在 Android 操作系统中利用数字图像创建基于帧的动画。我们将以前两章学到的关键概念为基础，因为第一章中介绍的所有数字成像特性同样适用于基于帧的动画。


    与数字视频类似，基于帧的动画也是一系列编号的数字图像。因此，你在第二章中学到的许多关键概念同样适用于基于帧的动画。因此，我们以最合理的顺序来涵盖这些最初的图形设计主题章节！


    在考虑帧动画压缩时，需要结合第一章和第二章的知识，因此本章将再次聚焦于数字图像压缩编解码器，以及如何以最优的新媒体数据文件格式和帧率来获得尽可能小的数据占用，从而获得最佳最终效果。


    我们将详细了解如何在 Android 操作系统内部使用 XML 和一个 `<animation-list>` XML 标签父容器来设置基于帧的动画。`<animation-list>`
    标签允许将各个动画帧添加到你的基于 XML 的 2D 帧动画多媒体资源中。


    我们还将了解如何将这些 XML 帧动画数据定义连接到应用程序代码中的 Java 编程逻辑。为此，我们将仅使用一个 3D 标志的九个图像帧，为你的图形设计项目创建启动画面帧动画资源。


    ## 帧动画概念：赛璐珞片、帧率与分辨率


    基于帧的动画也可以称为基于赛璐珞片的动画，这源于华特·迪士尼最初创作的 2D 动画。迪士尼的动画师在当时称之为赛璐珞片的材料上作画，以表现其卡通动画中的每一帧。


    后来，随着电影的出现，术语“帧”在很大程度上取代了“赛璐珞片”。这是因为模拟电影放映机每秒显示 24 帧胶片。这些电影胶片通过观众席上方放映室里电影放映机中转动的大卷连续胶片来播放。


    数字帧动画的技术术语是光栅动画，因为帧或赛璐珞片由像素集合（也称为光栅图像）组成。光栅图像通常也称为位图，事实上，在 Microsoft Windows 中确实有一种位图（`BMP`）文件格式，尽管
    Android 操作系统目前不支持这种数字图像文件格式。


    因此，在多媒体制作行业中，光栅动画也常被称为位图动画。我在本书中将交替使用这些不同的术语，这样你会习惯使用所有这些不同（但准确）的术语来指代你的基于帧的 2D
    动画，这种动画使用数字图像来制作 2D 动画。


    Android 支持与你在应用程序中用于 2D 图像的相同的开源数字图像数据文件格式，以便在帧动画资源中使用。仔细想想，这合乎逻辑，因为 2D 动画是以这些独立的数字图像为基础来定义的。


    其意义在于，我们可以使用索引颜色图像，通过 `PNG8` 或 `GIF` 格式来创建 8 位帧动画。我们也可以使用真彩色图像，通过 `PNG24`、`PNG32`
    或 `JPEG` 数字图像数据文件格式来创建 24 位或 32 位帧动画。


    同数字图像数据文件格式一样，Android 在帧动画中更倾向于使用 `PNG` 数据格式，而非 `GIF` 或 `JPEG` 格式。这是因为它具有无损图像质量和相当不错的图像压缩效果，在开发人员能力足够的情况下，能提供高质量的用户体验。


    这里还需要注意一个重要点，Android 目前不支持动画 `GIF`（也称为 `animGIF` 或 `aGIF`）作为一种文件格式。


    网上有一些关于 Android 在添加对此格式支持之前的临时解决方案，但考虑到 `PNG8` 能提供更好的压缩效果，并且通过 XML 定义帧以及通过 Java
    控制帧能让我们对最终结果拥有更强的控制力，因此在本书的版本中，我将重点介绍目前 Android 支持的解决方案和方法。


    因此，在 Android 添加此支持之前，你最好的选择是使用数字视频或基于帧的动画，这就是为什么我们在本书很靠前的部分就如此详细地介绍这两个主题，因为我们在本书中会经常并以多种不同方式使用它们。


    对几种主流数字图像文件格式的选择，为我们优化帧动画的数据占用提供了相当大的自由度；由于支持 `PNG32`，它还允许我们利用 alpha 通道透明度来实现强大的图像合成工作流程。


    图像合成和数据占用优化将成为你专业的 Android 2D 图形设计工作流程中名副其实的基石，正如你将在本书中看到的，我们将利用编解码器、alpha 通道和混合技术来实现这一目标。

    '
- fmt: '# Optimizing Frame Animation: Color Depth and Frame Rate


    In frame animation, there are three primary ways to optimize for a smaller data
    footprint: reduce the resolution, reduce the color depth, and reduce the framerate.
    Since we have to provide four different resolution density targets as of Android
    4.3, we’ll focus on the other two, as we are kind of locked into having to provide
    resolutions spanning at least 100 pixels through 640 pixels or more, as you will
    see later on in this chapter.


    Since there’s a choice between lossless `PNG32`, or a truecolor PNG with a full
    8-bit alpha channel, and an indexed color `PNG8` with a 1-bit (on-off) alpha,
    you can use lossless `PNG8` for animated elements that do not need to be composited
    (using an 8-bit alpha channel) later on in your application.


    If you don’t need to composite your animation over other graphics, you can also
    consider using the lossy JPEG format to get a far smaller per-frame data footprint
    by throwing away some of the image data and resulting quality. It is important
    to note, however, that this approach can increase image artifacts in each frame
    of the animation. If you happen to apply too much compression when you animate
    artifacts, it causes something called pixel crawl. With JPEG animation, not only
    do you have artifacts but because the medium is animated and the artifacts are
    on different pixels on each frame, it’s like they are waving their hands and saying
    “Here I am! I’m an important artifact!” Not a good user experience.


    Just as you can optimize your 2D animation by using an indexed (8-bit) color depth,
    you can also optimize your 2D animation using framerate (`FPS`), as the same concepts
    hold true with bitmap animation as with digital video: fewer frames to store means
    less data, which leads to a smaller application size.


    Thus, the lower the framerate you can use to achieve realistic motion, the fewer
    frames will have to be defined in your XML markup. More importantly, fewer frames
    will take less processing power to play your frame-based animations, as well as
    fewer memory resources to hold those frames before they are displayed to the device’s
    view screen. In fact, you’ll get professional results in this chapter by using
    only nine frames of animation for your Pro Android Graphics animated 3D logo treatment.


    Data footprint optimization becomes more important as more frame animation is
    included in your application. New media applications such as games and eBooks
    tend to have several frame animations running at any given time in the application
    Activity screen. Thus, you need to consider that your user’s processor power and
    system memory are probably going to be scarce, so treat them like they are your
    most valuable resources! It will require careful optimization for your Android
    application not to use up your user’s Android device hardware resources, once
    your app is fully operational.


    Finally, the number of pixels within each frame, or the frame resolution of the
    frame-based animation, is of great importance to the optimization of your frame
    animation asset’s data footprint. Review the raw image data mathematics that we
    covered back in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html) and apply them
    to each frame in your animation in order to calculate the exact raw data system
    memory space (footprint) necessary to hold your frame-based animation.


    Just like you did with your static digital imagery, you will need to provide at
    least four density-matched raster animation image target resolutions to be able
    to span every popular Android device screen density. For this reason, if you can
    make your animation a few dozen pixels smaller in each dimension without affecting
    its visual quality, this will add up to memory savings in the end-game, no pun
    intended.


    It’s also important to trim any unutilized pixels within your animation so that
    the animated elements come as close (one pixel away) to touching the edges of
    your image container as possible. I have done this in all of the animation frame
    image assets used in this chapter, so you will be able to see exactly what I mean.


    I trimmed an SVGA 800 x 600 pixel 3D rendered animation frame set down to 640
    x 500; let’s calculate the memory I saved by doing this. 800 x 600 is 480,000
    pixels per frame, nearly half a million. 640 x 500 is 320,000 pixels per frame,
    so the difference (savings) is 160,000 pixels per frame, or 33% less data, right
    off the bat. Let’s calculate the memory savings.


    160,000 x 4 (`ARGB`) color channels yields 640,000 pixels of data per frame of
    system memory needed. Multiply that by 9, and I’ve saved 5,760,000 pixels of data
    (memory). Finally, divide that by 1,024, and I’ve saved 5.625 megabytes of memory
    by trimming away unused pixels. The pixels I trimmed would only be used for representing
    alpha channel or transparency value, as they were simply space around the animated
    objects.


    Similar to what you learned about static digital imagery in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html),
    Android will automatically handle the decision regarding which of your 2D frame
    animation pixel densities to implement for each device screen that the OS is running
    on. The largest 640 x 500 frame animation asset is for the `XHDPI` (iTV is 1920
    x 1080, HD tablets are 1920 x 1200) resolution densities. Note that I also created
    three lower-resolution assets, all the way down to an 80 pixel version for watches
    and flip-phones.


    As long as you support all of the major pixel density resolution levels within
    your frame animation cels, or frames, you will get superior visual results for
    your 2D bitmap animation assets every single time, on every type of Android device
    in the electronics market currently.'
  raw: '## Optimizing Frame Animation: Color Depth and Frame Rate


    In frame animation, there are three primary ways to optimize for a smaller data
    footprint: reduce the resolution, reduce the color depth, and reduce the framerate.
    Since we have to provide four different resolution density targets as of Android
    4.3, we’ll focus on the other two, as we are kind of locked into having to provide
    resolutions spanning at least 100 pixels through 640 pixels or more, as you will
    see later on in this chapter.


    Since there’s a choice between lossless PNG32, or a truecolor PNG with a full
    8-bit alpha channel, and an indexed color PNG8 with a 1-bit (on-off) alpha, you
    can use lossless PNG8 for animated elements that do not need to be composited
    (using an 8-bit alpha channel) later on in your application.


    If you don’t need to composite your animation over other graphics, you can also
    consider using the lossy JPEG format to get a far smaller per-frame data footprint
    by throwing away some of the image data and resulting quality. It is important
    to note, however, that this approach can increase image artifacts in each frame
    of the animation. If you happen to apply too much compression when you animate
    artifacts, it causes something called pixel crawl. With JPEG animation, not only
    do you have artifacts but because the medium is animated and the artifacts are
    on different pixels on each frame, it’s like they are waving their hands and saying
