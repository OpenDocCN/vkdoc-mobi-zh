    # Android ViewGroup 超类：布局的基础


    Android 提供了顶层布局类 `ViewGroup`，用于创建布局容器类。`FrameLayout`、`LinearLayout` 和 `RelativeLayout`
    是三种最广泛使用的布局类，本章将涵盖这些类以及更专门的 `ViewGroup` 子类。


    `ViewGroup` 类属于 `android.view` 包，因为 `ViewGroup` 类本身是另一个名为 `View` 类的超类的子类。


    `View` 类是另一个不直接在应用程序中使用（构造或实例化），而是作为超类（作为主类模板）的类，它不仅用于定义屏幕布局容器（如 `ViewGroup` 及其子类），还用于定义包含在这些布局容器中的许多
    Android 用户界面小部件。


    在接下来的几章中，我们还将介绍 `View` 及其与小部件相关的子类，因为它们对 Android 开发非常重要。然而，在介绍 `View`（小部件）之前，您必须掌握容纳这些
    UI 小部件的布局容器（布局），这正是我将在接下来的几章中深入探讨 `ViewGroups` 和专门布局的原因。


    `ViewGroup` 不直接在应用程序中使用，但它的许多子类确实被广泛使用，因此接下来我们将详细介绍主要子类。


    我们不会在此过多关注 `ViewGroup` 类作为主类的内容，但重要的是要知道，如果需要，您可以创建自己的自定义子类；但正如您将在本章中看到的，这项工作实际上已经为您完成了。


    由于本书的目的是让您在专业 Android 图形学知识方面一飞冲天，我们将重点介绍如何实现现有的布局类（现有的 `ViewGroup` 子类），这些类是最常用的，并且被其他开发者所实现。


    在介绍完这些已经为您编码好并可供开发使用的主要 `ViewGroup` 子类之后，您很可能会决定直接使用其中一种来进行 UI 布局。


    在接下来的几节中，我们将介绍主要的 `ViewGroup` 布局参数和常量，以及许多 `ViewGroup` 子类中哪些已被弃用（停止使用并将在未来某个时间点移除）和处于实验阶段（未完全实现并可能在未来某个时间点移除）。如果您想进一步研究
    `ViewGroup`，可以在 Android 开发者网站上找到以下 URL 的摘要页面：


    [`http://developer.android.com/reference/android/view/ViewGroup.html`](http://developer.android.com/reference/android/view/ViewGroup.html)


    为了尊重读者，我们将重点介绍那些稳定存在、广泛使用且当前提供布局功能的布局容器类，当优化使用时，它们能提供良好的用户体验。


    ## ViewGroup LayoutParams 类：布局参数


    `ViewGroup` 类有两种不同类型的布局参数，它们适用于其所有子类。这些被称为基础布局参数，Android 为每种参数提供了常量。


    第一种扩展 UI 布局容器，使其在某个维度（宽度或高度）上填满其上方父容器（屏幕）。我们在之前的 GraphicsDesign 应用程序开发中已经使用过参数常量
    `MATCH_PARENT`。您也可以使用小写的 `match_parent`。


    需要注意的是，在 Android 2.2 API 级别 8（Froyo）之前，这个常量被称为 `FILL_PARENT`；但我建议使用 `MATCH_PARENT`，因为当前大多数设备至少是
    Android 2.3.3（Gingerbread）或更高版本。事实上，目前市场上只有 5% 的设备是 Android 2.2 之前的版本！


    如果您想查看不同 API 级别的当前市场份额百分比，可以在 Android 仪表板网页上找到：


    [`http://developer.android.com/about/dashboards/index.html`](http://developer.android.com/about/dashboards/index.html)


    另一个布局参数常量的作用与 `match_parent` 参数常量完全相反，它会收缩以适配该宽度或高度维度中布局容器内部的内容。这个常量被称为 `wrap_content`，它名副其实，因为它可以包裹住您的内容。需要注意的是，由于
    Android 为 X（宽度）和 Y（高度）维度都提供了这些常量，因此可以结合使用，您将在本书后面看到这一点。


    例如，如果您希望 `Button` UI 元素横跨父布局容器，您可以编码 `android:layout_width="match_parent"` 参数，然后使用
    `android:layout_height="wrap_content"`，这样按钮的高度将符合其（文本标签）内容，宽度则完全由 UI 布局容器的宽度定义。


    正如您从上一章所知，您希望 UI 能够缩放以适应不同的显示屏，这些参数是实现这一目标的良好起点。掌握这些参数能使 UI 开发更简单、更精确、更灵活、更优雅，并最终更强大。


    您也可以为 `layout_width` 或 `layout_height` 参数提供精确数值，但鉴于您在第 5 章中读到的内容以及 `AbsoluteLayout`
    容器的弃用，我建议您不要使用这些“硬编码”值，除非您将应用程序交付给某个特定的“受控”硬件设备。


    需要注意的是，`LayoutParams` 针对 `ViewGroup` 的不同子类还有子类。例如，已弃用的 `AbsoluteLayout` 类有自己的
    `LayoutParams` 子类，其中添加了 X 和 Y 值。


    如果您想进一步了解 Android 的 `LayoutParams` 类，可以在以下 Android 开发者网站 URL 中找到：


    [`http://developer.android.com/reference/android/view/ViewGroup.LayoutParams.html`](http://developer.android.com/reference/android/view/ViewGroup.LayoutParams.html)


    接下来，我们将快速浏览一下本书中不会详细介绍或编码的布局类。这是因为它们要么已停止使用（已弃用），要么在 API 中尚未完全实现（即处于实验阶段）。

    '
- fmt: '## Deprecated Layouts: AbsoluteLayout and SlidingDrawer


    There are two layout container classes that are still in the Android API but have
    been deprecated. The `AbsoluteLayout` layout container class was deprecated long
    ago in API Level 3, or Android Version 1.5, known as Cupcake. The `SlidingDrawer`
    layout container class was deprecated quite recently in API Level 17, or Android
    Version 4.2, known as Jelly Bean.


    An `AbsoluteLayout` would be used for absolute positioning, that is, layouts that
    allow you specify the exact physical pixel locations (X and Y pixel coordinates)
    of the layout children tags. `AbsoluteLayout` is less flexible and more difficult
    to span across devices than other types of layouts that use a more relative positioning.


    In fact, after learning all about across-device layout and asset support, as you
    did in [Chapter 5](#A978-1-4302-5786-8_5_Chapter.html), it is clear that this
    class was deprecated when it became obvious to Android OS API developers that
    there were going to be a plethora (currently hundreds) of widely differing Android
    manufacturers, and their products, to support.


    Although there is no official statement from Google as to why the `SlidingDrawer`
    layout container was deprecated, there are a lot of developers asking in forums
    why it was deprecated. After all, it was a pretty cool UI container that could
    animate your UI into view from all sides of the screen.


    In my opinion, it was eliminated for one of the following reasons. First, it animates
    an entire screen area over another screen area, which has to be hard on the device’s
    processor. Secondly, it allows UI designers to do whatever they like, as far as
    UI location and functionality, and Android is moving towards more standardized
    UI approach across both OS and apps.


    Finally, it may well be stepping on someone else’s patent; there are other deprecated
    classes that seem to fall into this category, and there are a lot of lawsuits
    between major mobile OS players right now that pertain to UI design and UI layout
    methods and how they allow the UI to function.


    Lucky for us developers, there is the `DrawerLayout` layout container class, which
    appears to have replaced the `SlidingDrawer` layout container class. For this
    reason, we will have a section on the `DrawerLayout` container in this chapter,
    and we will leave in-depth coverage of `AbsoluteLayout` and `SlidingDrawer` classes
    out of this book, as they are no longer supported.


    ## Android’s Experimental Layout: SlidingPaneLayout


    Not only are there deprecated layout containers in Android, but there are experimental
    ones in the API as well. “Experimental” means that the layout container could
    be removed at any time. Use experimental classes at your own risk! One of these
    experimental classes is Android’s `SlidingPaneLayout` class and layout container.


    Since the `SlidingPaneLayout` is pretty cool, I’ll give it a page or two in this
    chapter, but until it becomes a permanent part of the API I won’t use it in any
    code, or go into further detail regarding it in future chapters, as I will do
    with most of the other layout containers we cover in this chapter.


    The Android `SlidingPaneLayout` class is a sub-class of `ViewGroup`, and it is
    found in the `android.support.v4.widget` package in the Android OS. So if you
    want to import this class, the import statement reference would read


    `import android.support.v4.widget.SlidingPaneLayout;`


    This is one of the longer import statement references in the Android OS.


    The `SlidingPaneLayout` container allows developers to create horizontal multiple
    pane layouts for use at the top level of their user interface.


    The left and primary pane is usually treated as the content list or the content
    browser, and is subordinate to the primary detail viewport used for displaying
    the actual displayed content.


    `SlidingPaneLayout` child tags (`View`) may overlap the pane if their combined
    width is greater than the available width within the `SlidingPaneLayout`.


    When this occurs, the user will be able to slide the upper view out of the way
    by dragging it or by navigating toward the direction of the overlapped view using
    a navigation key on their keyboard, if they have one installed.


    If the child view’s content can be scrolled horizontally, a user can grab the
    layout container by its edge and also drag that content horizontally.


    Because of its sliding attributes, `SlidingPaneLayout` could be deemed appropriate
    for creating layouts that will smoothly adapt across many different screen sizes.
    This would mean that the UI could expand completely when on larger display screens
    and “accordion” as necessary on smaller display screens.


    A `SlidingPaneLayout` layout container should be considered as distinct from a
    navigation drawer, which we will be looking at in a future section of this chapter.
    A `SlidingPaneLayout` and `DrawerLayout` should not be used in the same design
    scenarios, as you will soon see.


    A `SlidingPaneLayout` container should be conceived as a way for your UI design
    to allow a two-pane layout normally used on a larger screen to be able to adapt
    to a smaller screen in a logical way.


    The user interface interaction offered by this `SlidingPaneLayout` container should
    allow the end user to see an app’s informational hierarchy between the UI panes.
    This inter-pane content relationship may not always exist with a `DrawerLayout`
    container design approach where the navigation UI elements take the user to different
    places or functions within the app and do not as directly relate to the content
    in the app screen at hand.


    The Android Developer web site makes it clear that the logical UI design usage
    of the `SlidingPaneLayout` container should include pairings of panes with logical
    use bindings. An example of this would be a phone number list with related dial
    or tagging features, a city or street list with related map features, a contact
    list and UI allowing interaction with the contact, or a recent e-mail list with
    a content pane displaying the message in the selected e-mail.


    UI design usage of a `SlidingPaneLayout` container that might be better suited
    to the `DrawerLayout` container would include high-level (`Activity`) function
    screen switching between more global functions within your app. Examples of this
    might include jumping from a Table Of Contents (TOC) view screen in an e-book
    app to a view screen of your bookmark setting utility.'
