    [`http://developer.android.com/reference/android/content/Intent.html`](http://developer.android.com/reference/android/content/Intent.html)


    The next line of code starts the Activity using the .startActivity( ) method and
    the new intent object that you just created in the previous line of code. This
    launches the new Activity subclass onto the display screen. The method is called
    off the current context reference of this, like so:


    `this.startActivity(intent_toc);`


    This is all you need to launch the ContentsActivity.class onto the user’s device
    display, so all you need now is a break statement, which breaks you out of the
    switch statement case matching loop, and you’re ready to test!


    Notice that I also put the Options menu item in for your Bookmark Utility (BMU),
    which we will be designing later on in the book. I did this to show more than
    one menu item on the menu, and also to show how you need to use different intent
    object names to differentiate your intent objects between menu items and the different
    Activity subclasses they will launch.


    So the intent object for your BMU is named `intent_bmu`, and this intent will
    be loaded with a reference to a BookmarkActivity.class once you create the XML
    layout and Java code for that class.


    For now, I just pointed it to the ContentsActivity.class, since that exists so
    that you have working code; thus both menu options will launch the layout container
    we have been working on.


    ## Testing the Table of Contents Activity on the Nexus One


    Now you can right-click your GraphicsDesign project folder and use the Run As
    ➤ Android Application work process to see if your new menu and layout container
    are working properly together. As you see in Figure [6-24](#A978-1-4302-5786-8_6_Chapter.html#Fig24),
    when you select the menu using the emulator menu button, and click the Table of
    Contents menu item, shown in blue on the left side of the screen shot, it launches
    the ContentsActivity Java Activity subclass and your LinearLayout user interface
    design, shown on the right side.


    Also shown on the right side of the screen shot is the Back button icon, highlighted
    in blue, which you can use to return to the splash screen and test the other menu
    item, which for now will also call the same Activity. Once you convert this UI
    to a RelativeLayout, you will add a Button widget, which you will be learning
    about in the next chapter. This UI Button widget will perform the return-to-home
    (splash screen) user interface function.


    ![A978-1-4302-5786-8_6_Fig24_HTML.jpg](A978-1-4302-5786-8_6_Fig24_HTML.jpg)


    Figure 6-24.


    Testing your new menu, Activity subclass, and Table of Contents layout design
    on the Nexus One


    Later on in the book we’ll transmute this into a RelativeLayout and more; since
    layout containers are fundamental to graphics and UI design, we will be working
    with them throughout the book. I wanted to use this chapter to give you an overview
    and show how one is implemented in the overall process of Activities, Manifest,
    XML, Java, and so on.'
