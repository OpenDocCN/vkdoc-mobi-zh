    to fix it for you. Mouse-over your wavy red underlined `void` return type and
    have Eclipse ADT `change return type of onLongClick( ) to boolean`, as suggested
    in the pop-up error dialog shown in Figure [14-14](#A978-1-4302-5786-8_14_Chapter.html#Fig14).


    As you can see in Figure [14-15](#A978-1-4302-5786-8_14_Chapter.html#Fig15), this
    fixes your return type, which is now `boolean` as required by the `onLongClick(
    )` event handing method, but brings up a new error, which you’ll mouse-over and
    have Eclipse again fix for you.


    The pop-up error dialog informs you that you need to add a `return` statement,
    which is required since your method is of the type `boolean` and the calling entity
    is expecting a `true` (handled successfully) or `false` (failed) return value.
    As you can seen in Figure [14-15](#A978-1-4302-5786-8_14_Chapter.html#Fig15),
    one of the error dialog’s solution options is to `add a return statement`, and
    that is the option you should select.


    Unfortunately, the Eclipse helper dialog adds an incorrect return value of `false`,
    when you want to return a value of `true` once your AnimationDrawable object has
    been started. Nobody is perfect, not even the Eclipse ADT IDE, which does seem
    to have a mind of its own sometimes!


