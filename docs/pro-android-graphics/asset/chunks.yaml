    # 读者练习：使用两个 `LayerDrawable` 资源


    这里有一个小测试供你自行完成，以练习使用 Android 图形包中的类，如 `Canvas`、`Paint`、`Bitmap`、`Drawable`、`BitmapDrawable`、`LayerDrawable`
    以及所有 `PorterDuff` 类。


    我将告诉你如何操作：这只需要复制几行代码，并修改一些对象名称和引用，因此对你来说实现起来应该不会太难。


    我希望你首先做的是，注释掉你在前一章中用于原始 `PorterDuff` 混合管线的两个 `Bitmap`（以及可变的 `Bitmap`）对象。你这样做的原因是，你将仅使用通过
    `LayerDrawable` 对象提供的 `Drawable` 数字图像数据（资源）来实现 `PorterDuff` 混合管线。


    这意味着你将在 `LayerDrawable` 对象内部完全实现一个 `PorterDuff` 图像混合管线（或像素传输管线）。以下是具体实现方法；你需要的所有代码已经就位，所以你只需复制其中一部分即可。


    首先，创建一个引用 `layerThree` 的 `Drawable layerThree` 对象，如下所示：


    `Drawable layerThree = ((LayerDrawable)layerComposite).findDrawableByLayerId(R.id.layerThree);`


    接下来，复制那两行代码，它们将你的 `LayerDrawable` 依次通过类型转换、`.copy()` 和 `getBitmap()` 方法，将其从 `Drawable`
    转换为 `BitmapDrawable`，再转换为 `Bitmap`，最后变成一个可变的 `Bitmap`，代码如下：


    ```

    Bitmap compositeTwo = ((BitmapDrawable)layerThree).getBitmap();

    Bitmap mutableCompositeTwo = compositeTwo.copy(Bitmap.Config.ARGB_8888, true);

    ```


    然后，在你的 `.drawBitmap()` 方法中，将 `mutableForegroundImage` 对象替换为 `mutableCompositeTwo`
    Bitmap 对象，这样你最终就能在你的 `PorterDuff` 渲染管线中引用两个 `LayerDrawable` 源图像资源了。


    ## Android 中数字图像合成的若干注意事项


    首先，在我看来，Android 需要增加一些 `<layer-list>` XML 属性（参数），以便更轻松地（通过 XML）以高级方式使用图层。我至少希望看到
    `android:opacity` 和 `android:porterDuffMode` 参数，这样通过 XML 实现静态合成管线就会变得轻而易举——而你刚刚编写的那一大段复杂的
    Java 代码也就变得多余，除非你出于某种原因需要实现动态图像合成管线。


    你可能注意到的另一件事是，我在 Java 代码中并没有引用 `LayerDrawable` 中的 9-patch `layerTwo`。这是因为这会导致模拟器崩溃。我猜测
    Android 在处理通过所有这些 `Drawable` 类型转换 9-patch 图像时存在困难，因此，目前你需要找到一种方法来静态地实现你的 9-patch
    图像，例如使用 `android:background` 参数将其作为背景图像。


    请注意，9-patch 图像资源在静态（XML）实现 `LayerDrawable` 时确实有效，并且正如你所看到的，它们遵循了所有 9-patch “规则”。


    ## 总结


    在第十二章中，你学习了如何在 Android 中使用图层进行图像合成，以及 Android 的 `LayerDrawable` 类。你还通过类型转换有机会使用了
    `Drawable` 和 `BitmapDrawable` 类。


    我们首先探讨了图层在数字图像合成管线中的一些核心概念，然后学习了 Android 的 `LayerDrawable` 类及其为 Android 开发者在代码中实现基于图层的合成管线所提供的功能。


    接下来，我们学习了 `<layer-list>` 父级 XML 标签及其子标签 `<item>`，并了解了如何使用 XML 定义文件来定义 `LayerDrawable`
    对象。你使用 `contents_layers` XML 文件定义了自己的 `LayerDrawable`，在其中定义了图像图层、命名图层并为其分配了图像资源，随后在
    `PorterDuff` 渲染管线中使用了这些图层。


    然后，你深入学习了 Java 方面的内容，并修改了前一章编写的图像混合管线，将 `LayerDrawable` 对象集成到合成和混合管线中。你学习了如何将
    `LayerDrawable` 转换为 `Drawable` 对象，再转换为 `BitmapDrawable`，最终转换为 `Bitmap` 对象，然后将其转换为可变的
    `Bitmap` 对象，正如你在前一章针对 `PorterDuff` 图像混合管线所做的那样。


    你通过多种不同方式测试了你的代码，并以不同的方式连接它，以确定合成和渲染管线中究竟发生了什么。最后，你参与了一个练习，尝试实现这段代码，并了解了 Android
    中图层的一些注意事项。


    在下一章中，你将学习如何在 Android 操作系统中使用数字图像过渡，以及如何使用 Android 的 `TransitionDrawable` 类。这将使你能够通过图像动画将
    Android 图像合成图形设计和特效工作提升到一个更高的水平。


    # 13. 数字图像过渡：使用 `TransitionDrawable` 类


    摘要


    在第十三章中，我们将仔细探讨图像过渡在 Android 和数字图像动画中所扮演的角色，以及如何在 Android 中实现图像过渡。过渡允许开发者增强其核心数字图像动画能力。


    在第十三章中，我们将仔细探讨图像过渡在 Android 和数字图像动画中所扮演的角色，以及如何在 Android 中实现图像过渡。过渡允许开发者增强其核心数字图像动画能力。


    在 Android 应用中，过渡的创建和管理是通过使用 `Drawable` 父类的间接子类之一来完成的。`TransitionDrawable` 子类专门管理图像过渡，并且它是
    `LayerDrawable` 类的直接子类。由于你在上一章学习了 `LayerDrawable`，这一章是很好的后续内容。


    `TransitionDrawable` 对象允许在 Android 中使用前两章介绍的图层和混合功能执行更高级的数字图像动画。因此，`TransitionDrawable`
    对象允许开发者以最简单的方式创建图像动画：通过在两个图像图层之间进行混合或透明度变化来实现过渡。


    Android 中有更高级的动画形式，例如位图或帧动画（有时称为光栅动画），以及矢量或过程动画（有时称为补间动画）。你将在接下来的两章中详细了解这些内容，因为
    Android 中每种独特的动画形式都需要单独的章节来讲解。


    我们将从图像过渡的基础知识开始，然后具体学习 `TransitionDrawable` 类；之后，你将使用 XML 标记在你的 `GraphicsDesign`
    应用中定义过渡，并使用 Java 代码来运行它，从而实现你自己的 `TransitionDrawable` 对象。

