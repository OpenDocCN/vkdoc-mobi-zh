    ```\n\n```\njava.lang.Object\n  > android.graphics.RectF\n```\n\nAndroid 的 `Rect`\
    \ 和 `RectF` 类属于 `android.graphics` 包。这两个类的导入语句都引用了 `android.graphics.Rect` 或 `android.graphics.RectF`\
    \ 包导入路径。\n\n你即将在你的 `ImageRoundingDrawable` 类的 `.draw()` 方法中利用的 `RectF` 类，支持四个浮点坐标，它们共同定义了创建矩形对象的边界。\n\
    \n你的矩形对象是使用其四条边（左、上、右、下）的像素坐标定义的。对于一个专业图形设计师来说，更准确的理解方式是，你实际上只是使用前两个（左、上）值定义了矩形的左上角（原点），这些值通常是\
    \ `(0,0)`，代表屏幕的原点。\n\n第二组值定义了矩形的目标（右下）角，这很像你在屏幕上“拖放”右下角（值）来绘制一个选区，在你为图形设计工作流程定义了所需的矩形区域之后。\n\
