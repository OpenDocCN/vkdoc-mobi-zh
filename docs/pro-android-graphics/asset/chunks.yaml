    \nThat said, due to the differences stemming from using integers versus real numbers,\
    \ the methods for each class are different from each other. This is mainly due\
    \ to the different code mathematics involved in the calculations performed within\
    \ these different types of (numeric) methods.\n\nThe Android `Rect` and `RectF`\
    \ classes are direct subclasses of Java’s master class `java.lang.Object`. For\
