- fmt: '# 11. Advanced Image Blending: Using Android PorterDuff Classes


    To rotate your Nexus One emulator back in the other direction, utilize the `CTRL-F12`
    keystroke combination. This will return the Nexus One emulator to its original
    portrait orientation mode.


    Invoking `CTRL-F11` will cause your Nexus One emulator window to rotate 90 degrees
    and put the Nexus One emulator into landscape orientation mode, just as if you
    had turned your Smartphone on its side.


    The results are shown in Figure [10-20](#A978-1-4302-5786-8_10_Chapter.html#Fig20);
    as you can clearly see, your 9-patch image asset conforms itself to the new shape
    of the UI screen as if it had been created for that exact screen aspect ratio
    in the first place.


    ![A978-1-4302-5786-8_10_Fig20_HTML.jpg](A978-1-4302-5786-8_10_Fig20_HTML.jpg)


    **Figure 10-20.** Testing the 9-patch asset in a different screen aspect ratio
    by using an emulator landscape orientation


    Now that you know how to create and use 9-patch image assets, you’ll be able to
    use them in future chapters for other types of graphic designs, or for UI element
    design, so make sure to practice using your Draw 9-patch tool.


    ## Summary


    In this tenth chapter, you learned about the Android `NinePatchDrawable` and `NinePatch`
    classes, as well as how to use the Draw 9-patch software tool.


    We started by looking at the `NinePatchDrawable` class and how it allows developers
    to instantiate drawable objects (image assets) that utilize the `NinePatch` objects,
    which use 9-patch uneven image asset scaling technology.


    Next, we took a closer look at the NinePatch technology and concepts, which you
    will need to fully understand to be able to implement the 9-patch image assets
    in your Android application. You learned how to use a one-pixel black border line
    segment to define both X and Y scalable areas within your 9-patch image asset,
    and how this also defines the areas of your image that will remain fixed and will
    not scale at all.


    Then you learned how to utilize the right and bottom one-pixel border areas to
    define the center padding areas where the View content will live inside your 9-patch
    image asset. We looked at the `NinePatch` class, which allows us to create `NinePatch`
    objects that implement NinePatch technology.


