  trans: '

    # 11. 高级图像混合：使用 Android PorterDuff 类


    若要将 Nexus One 模拟器朝相反方向旋转，请使用 `CTRL-F12` 组合键。这将使 Nexus One 模拟器恢复到原始的竖屏模式。


    调用 `CTRL-F11` 将使 Nexus One 模拟器窗口旋转 90 度，并使其进入横屏模式，就像您将智能手机侧放一样。


    结果如图 10-20 所示；您可以清晰地看到，您的 9-patch 图片资源会自适应 UI 屏幕的新形状，仿佛它最初就是为该屏幕比例量身定制的一般。


    ![A978-1-4302-5786-8_10_Fig20_HTML.jpg](img/A978-1-4302-5786-8_10_Fig20_HTML.jpg)


    **图 10-20.** 通过使用模拟器横屏模式，在不同屏幕比例下测试 9-patch 资源


    现在您已经掌握了创建和使用 9-patch 图片资源的方法，未来章节中便可将其用于其他类型的图形设计或 UI 元素设计。请务必多加练习使用 Draw 9-patch
    工具。


    ## 本章小结


    在第十章中，您学习了 Android 的 `NinePatchDrawable` 和 `NinePatch` 类，以及如何使用 Draw 9-patch 软件工具。


    我们首先探讨了 `NinePatchDrawable` 类，它允许开发者实例化那些使用 `NinePatch` 对象（即采用 9-patch 非等比图片缩放技术）的可绘制对象（图片资源）。


    接着，我们深入探究了 NinePatch 技术与概念，充分理解这些是您在 Android 应用中实现 9-patch 图片资源的必要前提。您学习了如何使用一个像素宽的黑色边框线段来定义
    9-patch 图片资源中 X 和 Y 方向的可拉伸区域，以及如何界定图片中保持固定、完全不缩放的区域。


    然后，您学习了如何利用右侧和底部的单像素边框区域来定义视图内容在 9-patch 图片资源内部居中的内边距区域。我们还探讨了 `NinePatch` 类，它允许我们创建实现
    NinePatch 技术的 `NinePatch` 对象。


    接下来，我们介绍了 Draw 9-patch 软件实用工具，包括如何找到并启动它，以及如何使用它来创建 9-patch 资源。


    您亲自动手实践，为目录框架的左侧和顶部边框创建了单像素黑色线段，以此观察 Draw 9-patch 用户界面控件的运作方式，以及右侧预览区域如何响应。


    您还了解了左侧编辑区底部的选项复选框，这些复选框能让您更清晰地掌握 Draw 9-patch 软件工具左侧编辑区的操作。


    随后，您使用 Draw 9-patch 软件工具右侧和底部的单像素黑色边框线段定义了 9-patch 的内边距区域。您看到预览结果精炼成了专业水准的 9-patch
    图片资源效果，并在 Draw 9-patch 工具右侧的所有示例预览方向（包括方形、竖屏和横屏预览）中得以呈现。


    最后，您保存了 `NinePatchFrame.9.png` 这个 9-patch 图片资源，并将其传输到 `/workspace/GraphicsDesign/res/drawable`
    项目文件夹中。随后，按照 Android 的要求，您使用小写字母和数字对文件进行了重命名。


    接下来，您创建了 XML 标记，将此 9-patch 图片资源作为背景图片，为您的目录 `LinearLayout` 容器 UI 设计提供周边图形设计细节。


    在图形布局编辑器窗格中预览了 9-patch 效果后，您添加了值为 `13sp` 的 `android:textSize` 参数，以防止 `TextView`
    UI 元素换行。然后，您使用 Nexus One 模拟器在竖屏和横屏模式下预览了结果。这样做的目的是为了精确观察 9-patch 图片资源如何无缝、灵活地适应不同的屏幕形状（宽高比）。


    在下一章中，您将学习 Android 中的数字图像和动画资源混合，使用 Android 的 `PorterDuff` 类及其众多的图像合成与混合模式及常量。这将使您的
    Android 图形设计特效工作提升至全新水平，并在此基础上巩固本章关于 9-patch 设计与实现的学习内容。


    ---


    **摘要**


    在第十一章中，我们将深入探讨混合模式在数字图像合成中的作用，以及如何使用 Android `PorterDuff` 类在 Android 中实现这些数字图像混合模式。


    混合模式允许在数字图像合成中，在两个或多个图层之间执行高级合成操作。每个图层中的每个像素都会通过一种算法进行处理，以决定该像素将如何（或不如何）应用于其下方的图层。


    应用混合模式通常需要使用数字图像编辑与合成软件工具，例如 Adobe Photoshop CS6 或开源数字图像软件包 GIMP（本书通篇使用，因其功能相当强大且可免费用于商业用途）。


    Android 中集成了这些 PorterDuff 混合模式（有时也称为*传输模式*），再加上我们将在下一章介绍的、通过 Android 的 `LayerDrawable`
    类处理图层的能力，这使得通常仅在 Photoshop CS6 和 GIMP 2.8 等软件包中才有的强大功能，现在也掌握在了 Android 开发者手中。


    这使得 Android 开发者能够通过应用这类算法特效（例如在 GIMP 2.8.6 中使用图层混合模式实现的特效），将其图形设计创意提升至一个全新的层次，并应用于其
    Android 应用中的 UI 设计、图形设计、数字成像、数字视频和 2D 动画。


    图像混合的应用示例包括照片处理软件、游戏、电子书、GoogleTV 的 iTV 节目、壁纸、屏幕保护程序，以及其他与图形相关的、您能想到的用途。通过巧妙的编码，所有这些领域甚至可以实现交互，因此，与图形设计相关的图像混合可能性，实际上仅受限于您的数字化想象力。

