  raw: 'There are also .sendMessage( ) methods, including a `.sendMessage(Message)`,
    `.sendMessageAtTime(Message, long)`, `.sendMessageDelayed(Message, long)`, and
    `.sendEmptyMessage(int)`, which are Message object-specific, as you can see by
    the Message object that is passed inside the parameter list, rather than being
    `Runnable` object-specific, as the `.post( )` methods are.


    The .sendMessage( ) methods also permit developers to queue up Message objects
    containing a `Bundle` object containing data that will be processed by that Handler’s
    `.handleMessage(Message)` method, which requires that you implement a subclass
    of the Android Handler class.


    Now that I have covered a little bit of background on `Runnable` and how it will
    `.run( )` this `frameAnimation.startAnimation( )` processing statement, you can
    test your frame animation, now converted from XML to Java code, in the Nexus One
    emulator. Use the `Run As` ➤ `Android Application` work process to launch your
    application, and as you can see in Figure [14-9](#A978-1-4302-5786-8_14_Chapter.html#Fig9),
    the animation loops seamlessly forever when your app launches, just like it did
    before.


    ![A978-1-4302-5786-8_14_Fig9_HTML.jpg](A978-1-4302-5786-8_14_Fig9_HTML.jpg)


    Figure 14-9.


    Testing your AnimationDrawable in the Nexus One emulator


    Now that you have simulated the frame animation you had in place from before (you
    are going to add in the procedural animation part in the next chapter), let’s
    get a bit more advanced. You’re going to learn how to trigger animation using
    event handlers, so you can click your PAG logo to start it animating.


    ## Designing an AnimationDrawable to Loop Back to Frame 1


    You are going to first set up your AnimationDrawable to loop seamlessly one time,
    because as it is now, the last frame is not quite “vertical” as far as the logo
    is concerned. To accomplish this, you are going to copy the first `.addFrame(
    )` method call in your code and paste it after the last `.addFrame( )` method
    call, as shown in Figure [14-10](#A978-1-4302-5786-8_14_Chapter.html#Fig10). To
    keep the timing the same, use a duration value of 111 (like the others) in the
    first method call, and a value of 1 (the remainder to make a full second) in the
    last method call.


    ![A978-1-4302-5786-8_14_Fig10_HTML.jpg](A978-1-4302-5786-8_14_Fig10_HTML.jpg)


    Figure 14-10.


    Setting your .setOneShot( ) method to true and adding an end frame so logo is
    flat to screen at end


    This makes sure to draw the first frame of the animation to the screen right at
    the end of the animation, so your PAG logo looks like it did when you started
    the animation. This won’t matter when you have the `.setOneShot( )` method set
    to false, but as you can see in Figure [14-10](#A978-1-4302-5786-8_14_Chapter.html#Fig10),
    you are going to set it to `true`, which is why what you are doing is necessary!


    Use your `Run As` ➤ `Android Animation` work process, and when your application
    launches (watch carefully), your animation will loop one time and return to its
    upright position. Attention passengers: Please return your animations to their
    upright positions! Thank you for flying Apress.


    Next, you’re going to change back to forever looping animation and implement event
    handling so that you can control your animation using click and long-click events.
    This is so that if you are implementing something cool, like an animated children’s
    storybook app, for instance, your readers can click graphic elements in the page
    to start them animating (and stop them, using a long-click). We will go through
    the work process to implement all of this next, using only Java code, of course.


    ## Adding Event Handling to Allow Frame Animation by Click


    To allow your graphical element—in your case, it is your PAG logo, but it could
    also be a fish in your aquarium children’s storybook (free idea for you)—to animate
    on command (onClick), you need to attach an event handler to the ImageView that
    displays your AnimationDrawable object contents. You will do this by calling a
    `.setOnClickListener( )` method on your `pag` object, as shown in Figure [14-11](#A978-1-4302-5786-8_14_Chapter.html#Fig11).
    This is similar to the handlers you coded before.


    ![A978-1-4302-5786-8_14_Fig11_HTML.jpg](A978-1-4302-5786-8_14_Fig11_HTML.jpg)


    Figure 14-11.


    Adding a .setOnClickListener( ) method and View.OnClickListener( ) method to your
    pag ImageView


    Next, mouse-over your View class reference, and have Eclipse `Import View (android.view)`
    for you, and then you will get the wavy red error highlight shown in Figure [14-12](#A978-1-4302-5786-8_14_Chapter.html#Fig12).
    You can mouse-over this and have Eclipse again write your method bootstrap code
    for you automatically. It is always a pleasure when your IDE sees what you are
    doing and offers to do some of it for you!


    ![A978-1-4302-5786-8_14_Fig12_HTML.jpg](A978-1-4302-5786-8_14_Fig12_HTML.jpg)


    Figure 14-12.


    Adding an unimplemented onClick( ) event handling method by using the error pop-up
    helper dialog


    Now that you have your `onClick( )` event handling method written for you, as
    shown in Figure [14-13](#A978-1-4302-5786-8_14_Chapter.html#Fig13), you can add
    your trusty `frameAnimation.start( )` method call. The completed code block is
    as follows:


    `pag.setOnClickListener(new View.OnClickListener() }`


    `@Override`


    `public void onClick(View arg0) {`


    `frameAnimation.start();`


    `}});`


    Notice that I have combined both closing curly braces for both methods to exist
    on the same line of code to save a line of space in my code listing. It is good
    for you to get comfortable with different personal styles of coding in case you
    need to look at other programmers’ Java code, which you should be doing as often
    as you can in order to learn more about how other developers implement Java code.
    There are many different ways of doing the exact same thing where computer programming
    is concerned!


    ![A978-1-4302-5786-8_14_Fig13_HTML.jpg](A978-1-4302-5786-8_14_Fig13_HTML.jpg)


    Figure 14-13.


    Adding a .start( ) method call to your frameAnimation object inside your onClick(
    ) event handler


    Also, make sure to change your `.setOneShot( )` method’s parameter value back
    to `false`, so that you can have your AnimationDrawable object loop seamlessly
    forever. You’ll need to use a `false` setting to be able to see if your event
    handling code is indeed starting (and eventually, stopping) it correctly.


    Next, you can remove the `animStarter` class that implements `Runnable`, as you
    are now going to `.start( )` (and soon `.stop( )` as well) your AnimationDrawable
    object “manually.” More accurately, your users are going to be controlling (start
    and stop) the AnimationDrawable objects now using clicks and long-clicks! Thus,
    you are essentially making your graphic element interactive as far as animation
    is concerned; your user now controls when it animates and when it is static.


    As you might well imagine, I’m not going to show the code listing for this `animStarter`
    class now that it is deleted, as there would be nothing to see. Trust that it
    is now deleted; if you like, you can leave it in your code because you are not
    calling it, so it won’t be utilized anyway.


    It is important to note that it is always a good idea to remove any unused classes,
    methods, objects, and variables. You should always do this simply to make sure
    that your application’s memory is not allocated for something that is not even
    being utilized! That would be inefficient.'
