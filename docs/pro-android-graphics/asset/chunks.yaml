  trans: '

    # 在 `MainActivity.java` 中实例化动画对象


    点击 Eclipse 中央编辑区的 `MainActivity.java` 选项卡，如图 4-8 所示，该选项卡也显示了所有 XML 选项卡。然后添加一行代码，用于实例化一个名为
    `pagAni` 的 Android `Animation` 对象，并加载你在 `pag_anim.xml` 文件中刚刚定义的 XML `<scale>`
    动画。这通过以下 Java 代码实现：


    ```

    Animation pagAni = AnimationUtils.loadAnimation(this, R.anim.pag_anim);

    ```


    这行代码的作用是：在等号左侧构造 `Animation` 对象并命名为 `pagAni`，然后通过等号将 `.loadAnimation(context,
    reference)` 方法的调用结果加载到这个 `pagAni` Animation 对象中。该方法通过点标记法从 `AnimationUtils` 类中调用，因为它包含在该类中。当前上下文使用
    `this` 常量设置，而对 `<scale>` 程序化动画 XML 定义的引用则通过 `R`（资源）、`anim` 文件夹和 `pag_anim.xml`
    设置，它们使用句点字符连接在一起，如下所示：`R.anim.pag_anim`。


    ![A978-1-4302-5786-8_4_Fig8_HTML.jpg](img/A978-1-4302-5786-8_4_Fig8_HTML.jpg)


    **图 4-8.** 实例化名为 `pagAni` 的 `Animation` 对象，并引用 `pag_anim.xml` XML 定义


    如图 4-8 所示，Eclipse ADT（Android）发现 `Animation` 和 `AnimationUtil` 类在被使用前尚未导入。因此，让我们鼠标悬停在这两个类引用上，并选择导入选项，以便让
    Eclipse 为你编写一些 Java 代码。


    一旦这两个类被导入，你的代码就会变得整洁，然后你可以输入第二行代码。这行较短的代码将你新创建的 `pagAni` Animation 对象连接到现有的 `pag`
    ImageView 对象中。


    这通过以下单行 Java 代码实现，该代码从 `pag` ImageView 对象调用 `.startAnimation()` 方法，并将 `pagAni`
    Animation 对象传递给它，从而将这些构造连接在一起：


    ```

    pag.startAnimation(pagAni);

    ```


    使用仅两行代码完成的 Animation 对象的实现如图 4-9 所示。


    ![A978-1-4302-5786-8_4_Fig9_HTML.jpg](img/A978-1-4302-5786-8_4_Fig9_HTML.jpg)


    **图 4-9.** 使用 `.startAnimation()` 方法将 `pagAni` Animation 对象连接到 `pag` ImageView
    对象


    现在，你可以使用 `Run As` ➤ `Android Application` 工作流程，测试你新修改的启动屏动画了。如你所见，效果更加专业，动画现在凭空出现并旋转着落在屏幕中央。这里我就不提供屏幕截图了，因为目前无法提供动画截图，而且你已经在第
    3 章中看到过静态截图（参见图 3-14）。


    接下来，你将为这个 Pro Android Graphics 标志动画特效添加更多细化，使其更加逼真和专业。你将为动画添加 alpha 混合，使动画更加真实。这样做的目的是让旋转的标志在从远处出现时变得越来越清晰，从而在它靠近摄像机（你的显示屏）时看起来越来越实在。


    你将通过在当前 `<scale>` 标签外部放置一个 `<set>` 父标签结构，然后将一个 `<alpha>` 子标签添加到新的 `<set>` 组中来实现这一点。这样，这两个程序化变换将作为一个统一的程序化动画处理操作来执行。


    现在让我们开始吧。由于你已经有程序化动画 XML 定义文件，请单击 Eclipse 中央编辑窗格下的 `pag_anim.xml` 选项卡，返回并修改该标记，使其从
    `<scale>` 变换动画定义变为一个包含 `<scale>` 变换定义及更多内容的组 `<set>` 定义。

    '
- fmt: '# Using Set to Create a More Complex Procedural Animation


    Click the `pag_anim.xml` tab to put yourself back into XML editing mode, and put
    your cursor at the very end of the first tag that you have in this file, `<?xml
    version="1.0" encoding="utf-8"?>`, and then press the `return` key to add a new
    line of markup before the opening `<scale` tag.


    Type in the `<set>` tag, and then cut and paste the `xmlns:android` parameter
    from the first line of the `<scale>` tag into the parent `<set>` tag instead,
    as shown in Figure [4-10](#A978-1-4302-5786-8_4_Chapter.html#Fig10). You do not
    need to have this parameter in an XML file more than one time, and it should go
    into the first (usually parent) tag container.


    Once this is done, place your cursor at the end of the `<scale>` tag XML, and
    press the `return` key to add a line of space for your `<alpha>` tag, and then
    type a `<` character, as shown in Figure [4-10](#A978-1-4302-5786-8_4_Chapter.html#Fig10),
    to bring up the `<set>` tag parameter helper dialog. Double-click the `<alpha>`
    tag option to add it.


    ![A978-1-4302-5786-8_4_Fig10_HTML.jpg](A978-1-4302-5786-8_4_Fig10_HTML.jpg)


    Figure 4-10. Adding a `<set>` parent tag to the `pag_anim.xml` file to contain
    your `<scale>` and `<alpha>` parameters


    Next, make sure the tag is represented on the screen as `<alpha` and an `/>` closing
    tag delimiter, and then place your cursor after the word `<alpha` and press the
    `return` key to add an indented line of code. Type the word `android:` a colon
    to bring up the tag parameter helper dialog, and take a look at the 13 parameters
    that are available for use with this tag.


    Double-click the first parameter listed, `android:fromAlpha`, in order to add
    it to your `<alpha>` tag. Your screen should look something like Figure [4-11](#A978-1-4302-5786-8_4_Chapter.html#Fig11)
    right before you double-click the `fromAlpha` parameter to add it to the list
    of alpha blending parameters you are going to be adding.


    ![A978-1-4302-5786-8_4_Fig11_HTML.jpg](A978-1-4302-5786-8_4_Fig11_HTML.jpg)


    Figure 4-11. Using your `android:` work process to bring up tag helper dialog
    containing all the `<alpha>` parameters


    Since the logo should be invisible in the distance, you’re going to set your `fromAlpha`
    value to `0.0`, which will specify a 0% visibility. Since you need a range, let’s
    add the `toAlpha` parameter next and set its value to `1.0` or 100% visibility.


    Next, let’s add an interpolator to control your motion or, in this case, the timing
    of the fade. To have the fade-in start evenly and slow down at the end, you’ll
    try using the `deceleration` interpolator constant this time.


    The interpolator parameter is specified using the following markup:


    ```

    android:interpolator="@android:anim/decelerate_interpolator"

    ```


    Now you can add in your timing and looping parameters and you’ll be finished.
    Add an `android:duration` parameter, and set it to match up or sync with the same
    value you used in your `<scale>` tag of `9000`, or 9 seconds. You want your transforms
    to run in parallel in this case so everything looks natural.


    Do the same thing for the `android:startOffset` parameter and its `3000` or 3
    second value, so again everything remains in sync.


    Since you are not currently using the `android:repeatMode` parameter, due to a
    `repeatCount` value of zero, I have removed it from the `<scale>` transform tag,
    as you may have noticed in Figure [4-10](#A978-1-4302-5786-8_4_Chapter.html#Fig10)
    and Figure [4-11](#A978-1-4302-5786-8_4_Chapter.html#Fig11).


    Add an `android:repeatCount` parameter to the `<alpha>` tag container and set
    its value to zero as well, so that the Pro Android Graphics logo does not fade
    in and out once it reaches the front of the screen.


    The six `<alpha>` tag parameters can be seen in Figure [4-12](#A978-1-4302-5786-8_4_Chapter.html#Fig12)
    and, as you can see, their values are either synchronized with the `<scale>` tag,
    or moving exactly opposite of it, as in the case of the interpolator constant
    value.


    ![A978-1-4302-5786-8_4_Fig12_HTML.jpg](A978-1-4302-5786-8_4_Fig12_HTML.jpg)


    Figure 4-12. Entering six parameters needed to implement your `<alpha>` tag fade-in
    logo animation special effect


    Let’s take a look at the results in the Nexus One emulator by using your Run As
    ➤ Android Application work process, and see how this additional alpha blending
    gives you an even more realistic visual result for your animation.


    Right-click the GraphicsDesign project folder in the Eclipse Package Explorer
    and use the Run As ➤ Android Application to launch the emulator. Watch as the
    Android OS emulation loads and the application automatically launches and runs
    the splash screen on start-up.


    As you can see in Figure [4-13](#A978-1-4302-5786-8_4_Chapter.html#Fig13), now
    the animated logo both scales and fades into view, just as it would appear to
    do in real life. You’ve accomplished this using only 16 parameters, two transform
    containers, and a single group (`set`) container so far.


    Let’s add yet another transform type into your `<set>` parent tag container in
    order to demonstrate that you can build up as complicated a procedural animation
    structure as you like using this same work process and basic XML markup.


    The rotate transform allows us to rotate in two dimensions (2D) around a pivot
    point in the X and Y image space. It’s primary data range inputs are the X and
    Y location of the pivot points and the `toDegrees` and `fromDegrees` range for
    the rotational degrees.


    If you were animating a cream pitcher pouring, you would place the pivot point
    on the right-side of the pitcher halfway down from the spout, where the pitcher
    would normally tip/rotate, and then set the `fromDegrees` to `0` (upright pitcher)
    and the `toDegrees` to `90` (pitcher at full pour).


    ![A978-1-4302-5786-8_4_Fig13_HTML.jpg](A978-1-4302-5786-8_4_Fig13_HTML.jpg)


    Figure 4-13. Testing your Animation `<set>` in the Nexus One Emulator


    Next, let’s add your `<rotate>` transformation, and rotate your logo around two
    different axes at the same time. You are rotating in 3D space around the X axis
    in your frame animation so let’s rotate your logo (while it rotates in the frame
    animation) around the Z axis by using procedural animation!


    Admittedly this is probably taking this particular effect way too far, but I wanted
    to show you several of the primary transforms in the chapter and to create a relatively
    complex animation set at the same time.'
