  trans: '

    # 执行图像缩放：边距（Margin）与内边距（Padding）属性


    除了使用 `ScaleType` 参数在布局容器内全局缩放 `ImageView` 对象外，另一种方法是对 `ImageView` 容器内引用的数字图像源资源进行缩放。正如你将在本节中尝试的那样，**边距（margin）**
    和 **内边距（padding）** 值都可以让你在容器内部缩放 `ImageView` 的源图像资源。


    首先，将第二个 `ImageView` 标签（即前景的 `currentBookmarkImage` 资源中的 `android:layout_margin="9dp"`
    参数）改为 0 DPI，如图 8-12 所示。这样做是为了让你先观察图像资源在未缩放状态下的尺寸。


    使用 **Run As ➤ Android Application** 工作流程，仔细观察图像，如图 8-13 截图左侧所示。然后将 0 DIP 改为 50
    DIP，再次运行模拟器。


    你会看到，第二个包含源图像的 `ImageView` 为了适应新的边距设置而缩小了尺寸。你可能会想知道 `android:padding` 参数是否也能达到同样的效果，接下来我们将对此进行更深入的探讨。


    ![A978-1-4302-5786-8_8_Fig12_HTML.jpg](img/A978-1-4302-5786-8_8_Fig12_HTML.jpg)


    **图 8-12.** 将 `currentBookmarkImage ImageView` 的 `layout_margin` 值设为 0 DIP 以查看未缩放的资源


    接下来，为你的书签图像底板添加一个半透明颜色背景（见图 8-13）。


    ![A978-1-4302-5786-8_8_Fig13_HTML.jpg](img/A978-1-4302-5786-8_8_Fig13_HTML.jpg)


    **图 8-13.** 左侧显示未缩放的 `ImageView` 资源，右侧显示使用 50dp 边距缩放的 `ImageView`


    这样做是为了让你能看到 `ImageView` 容器的边缘，从而确定使用边距和内边距来缩放图像资源之间的区别。如图 8-14 所示，你将在 `currentBookmarkImage`
    ID 的 `ImageView` 标签内的 `android:background` 参数中添加十六进制颜色值 `#77FFFFFF`，得到一个 50% 半透明的白色背景。这是一项非常有用的技术，如果你需要可视化
    Android 系统绘制 UI 容器的位置，可以在用户界面开发工作流程中使用它。


    ![A978-1-4302-5786-8_8_Fig14_HTML.jpg](img/A978-1-4302-5786-8_8_Fig14_HTML.jpg)


    **图 8-14.** 添加 50% 透明的白色背景，以直观展示 50dip 的边距和内边距操作


    即使你的数字图像资源使用了透明 Alpha 通道（例如本例中带投影的圆环），这项技术也同样有效。你将 `android:layout_margin` 参数设置为
    50 DIP，这是展示使用边距和内边距在容器内缩放 `ImageView` 源图像资源之间差异的理想设置。


    如图 8-15 所示，这个圆环图像能够通过半透明的 `ImageView` 背景色以及 `RelativeLayout` 容器中的 `ImageView`
    背景底板正确地产生阴影效果。


    在左侧的模拟器视图中，你使用了 `android:padding="50dp"` 参数来缩放源图像资源。正如预期，由于内边距在容器内部添加空间，容器保持了
    `match_parent` 布局规范的大小，但仍将图像资源缩小了近 50%。


    在右侧的视图中，你使用 `android:layout_margin="50dp"` 参数来缩放源图像资源。边距在容器外部添加间距，因此你的容器会随着图像资源一起缩小。


    ![A978-1-4302-5786-8_8_Fig15_HTML.jpg](img/A978-1-4302-5786-8_8_Fig15_HTML.jpg)


    **图 8-15.** 展示使用 50DIP 图像缩放操作：左侧使用内边距，右侧使用边距


    如图 8-15 左侧所示，第二个 `ImageView` 容器没有完全填满屏幕的原因，是因为 `TextView` 与第一个 `ImageView` 图像背板的顶部，以
    30dp 的基线对齐（位于其下方）。


    第二个 `ImageView` 具有 `RelativeLayout` 参数 `android:layout_below`，它引用了 `TextView`
    UI 元素。这会将整个视图容器向下推，正如现在由于设置半透明背景色值所看到的那样。


    现在，使用 **Control-F11** 组合键将 Android Nexus One 模拟器旋转 90 度，以横屏模式观察内边距与边距缩放。如图 8-16
    所示，结果是相似的：内边距参数在视图对象容器内部缩放图像资源，而 `android:layout_margin` 参数则缩放 `ImageView` 对象容器及其包含的源图像资源。


    我在横屏模式下唯一能检测到的区别是，`android:layout_centerHorizontal` 参数似乎会使 `ImageView` 容器向其父 `RelativeLayout`
    容器的侧边方向居中。有时无法预料到诸如此类的差异，这也说明了在尽可能多的不同 Android 设备模拟器和方向下测试所有用户界面布局设计的重要性！


    ![A978-1-4302-5786-8_8_Fig16_HTML.jpg](img/A978-1-4302-5786-8_8_Fig16_HTML.jpg)


    **图 8-16.** 展示横屏模式下 50dip 图像缩放：上方为内边距，下方为边距


    正如你在本章中所看到的，只要具备一点创造力并深入了解数字图像处理操作的核心本质，你在 GIMP 或 Photoshop 中能够实现的大部分数字图像“操作”，同样可以通过使用
    XML 标记和 Java 代码在 Android 中完成。

