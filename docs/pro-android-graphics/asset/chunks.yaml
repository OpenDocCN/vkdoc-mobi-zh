    ![A978-1-4302-5786-8_14_Fig19_HTML.jpg](A978-1-4302-5786-8_14_Fig19_HTML.jpg)


    Figure 14-19.


    Changing the .setImageDrawable( ) method to directly reference the first frame
    of the animation


    Now, let’s use your Run As ➤ Android Application work process and see if you have
    achieved perfection yet. When your application launches, click the PAG logo and
    watch it animate. The next step in your testing cycle would be to long-click on
    the animating PAG logo and watch it stop and reset itself to Frame 1\. So far,
    so good! The final step in your testing cycle is to click on the PAG logo and
    see if it starts animating again so you can “toggle” the animation on and off.
    Alas, a click does not restart the PAG animation, so again you need to go back
    to the drawing (coding) board!


    Let’s think for a moment why your AnimationDrawable object would not start animating
    again on your second click. The reason is because the ImageView is not set to
    display your AnimationDrawable object anymore; it is now set to directly reference
    the Frame 1 Drawable image asset, so you will need to move the `.setImageDrawable(frameAnimation)`
    method call inside, and to the top of, your `onClick( )` event handling code structure.'
