  trans: '

    # NinePatch 图形资源：9-Patch 概念概述


    `NinePatchDrawable` 对象（通常也简称为“9-patch”）允许 Android 开发者创建一种特殊的可变形的 PNG8、PNG24 或
    PNG32 图形资源。9-patch 能够对给定数字图像中的不同区域应用不同的缩放比例。


    因此，一个 9-patch 图像资源本质上是与坐标轴无关的、可缩放的 `.PNG` 位图图像。它通过利用图像资源内部的九个不同象限来支持缩放，或者更准确地说，是支持像素平铺，以适应任何
    `View` 对象或布局容器可能具有的任意尺寸和形状。


    由于其内置的 `NinePatchDrawable` 类（以及 `NinePatch` 类）支持，Android 操作系统可以自动调整开发者使用的 9-patch
    图像资源大小，以适应任何 `View` 对象的内容，只要开发者将该 9-patch 图像资源作为背景图像资源引用放置在该 `View` 对象中。这是通过 Android
    `NinePatch` 类和 `NinePatchDrawable` 类内部存在的算法来实现的，此外，Android SDK 中 `/sdk/tools`
    文件夹内的 Draw 9-patch 软件工具中也包含了相关算法。


    NinePatch 图像资源的一个很好的用例是作为背景图像占位符（`android:background` XML 参数）的内部内容，该占位符常用于标准的
    Android `Button` 对象 UI 组件。`Button` UI 组件几乎总是需要至少在单个维度上拉伸，通常需要在 X 和 Y 两个维度上拉伸，以适应不同长度的文本字符串、不同的字体类型或不同的字体大小。


    此 `NinePatchDrawable` 对象引用了 Android 推荐的 PNG 数字图像格式，并且它还包含一个额外的单像素宽度的边框。Android
    操作系统支持三种不同“风格”的 PNG 图像：索引色（8 位）PNG8、真彩色（24 位或 RGB）PNG24，以及带有 Alpha 通道的真彩色（32 位或
    ARGB）PNG32 图像文件格式。


    为了能被 Android 识别为 9-patch 图像资源，`NinePatchDrawable` 资源需要以 `.9.png` 的文件扩展名保存，并保存到相应
    Android 项目的 `/res/drawable/` 目录中。


    我之前提到的单像素边框对于最终用户是不可见的，而是由 Android `NinePatch` 类的算法来使用，以定义图像资源的哪些区域是可伸缩的，哪些区域是静态的（固定不变、不缩放，仅移动）。


    我们将能够通过在此单像素边框的左侧和顶部区域内绘制一条（或多条）单像素宽的黑色线段，来指示 9-patch 图像资源的可伸缩部分。


    边框上所有未用于定义 9-patch 图像可伸缩部分的其余像素，必须使用完全透明的颜色值（`#00000000`）或白色（`#FFFFFF`）颜色值。


    如果我们想更巧妙一点，甚至可以同时使用 `#00FFFFFF` 十六进制颜色值（透明白色）来定义两者。幸运的是，我们稍后将介绍的 Draw 9-patch
    工具会为我们完成所有这些工作！


    有趣的是，我们可以使用这些单像素黑色线段随意定义任意数量的可伸缩部分。需要注意的是，每个可伸缩部分相对于其他部分的相对大小将始终保持“比例一致”。这意味着，无论缩放大小如何，最大的可伸缩部分在任何缩放比例下都将始终是最大的可伸缩部分。


    在为 9-patch 资源定义了（外部）可伸缩部分之后，接下来我们为 9-patch 图像定义（可选的）可绘制区域（内部），这些区域称为“内边距区域”。内边距可绘制区域告诉
    Android 可以将定义在 `View` 对象或 `ViewGroup`（View 子类）布局容器对象中的元素放置在何处。


    引入此内边距功能是为了确保我们的 `NinePatchDrawable` 资源不被其他应用资源覆盖或在视觉上被遮挡。内边距的定义方式与定义可伸缩部分的方式相同，即使用在
    9-patch 资源定义的右侧和底部单像素边框区域上绘制的单像素黑色“内边距线”。


    例如，如果一个 `View` 对象将 NinePatch 设置为其背景，然后指定了 `View` 对象的文本属性，它将拉伸该属性，以使所有文本属性都适合我们通过右侧和底部的单像素黑色边框定义所指定的这个区域内。


    需要注意的是，如果没有特别定义 9-patch 的内边距区域定义线，则 Android `NinePatch` 算法将转而使用左侧和顶部的缩放定义线段来定义图像资源的内边距（可绘制）区域。


    总结一下单像素黑色边框线的用途差异：左侧和顶部的线定义了图像资源中哪些像素可以被复制，以便拉伸或缩放 9-patch 图像。底部和右侧的单像素黑色边框线则定义了
    9-patch 图像资源内部（内侧）的可绘制区域，`View` 对象的内容（属性或资源引用）允许覆盖这些区域。


    # Android NinePatch 类：创建 NinePatch 资源


    `NinePatch` 类是 Java 主类 `java.lang.Object` 的直接子类，这意味着它用于定义 NinePatch Java 对象，并且是专门编码成为其自己的
    Android 资源的。它不是基于 Android 操作系统内的其他类层级结构。正如您可能已经猜到的，它位于 `android.graphics` 包内。其类层级结构如下：


    `java.lang.Object`


      `> android.graphics.NinePatch`


    由 Android `NinePatch` 类构造的对象允许 Android 操作系统使用九个独立的部分来缩放和渲染此 9-patch 图像资源。


    另一个很好的类比是指南针。9-patch 图像的四个角，即东北、西北、东南和西南方向，是不缩放的；而四条边，即北、东、南或西方向，是沿一个轴缩放的。指南针（9-patch
    图像）的中心则是沿其两个轴缩放的，就像 Android 中缩放普通图像一样。


    理想情况下，我们的 9-patch 源 PNG 图像资源的中间部分应该是 100% 透明的，就像您稍后在本章中使用 Draw 9-patch 软件工具时会遇到的情况一样。这样做是为了让我们的
    9-patch 能够围绕一个开放、矩形的内容区域提供一个可缩放的图像框架，供我们的 `View` 对象用于其样式化并引用的内容。


    这种设计方法将使开发者能够创建自定义图形，并按照他们定义的方式实现无缝缩放。


    当内容被添加到位于 9-patch 图像资源内部的 `View` 对象中，并且此内容超出了 9-patch 图形资源的内部内边距限制时，可以轻松调整而不会导致资源变形。


    Android SDK 中 `/tools` 文件夹内提供的 Draw 9-Patch 工具，为开发者提供了一个简单实用的工具，用于通过所见即所得（WYSIWYG）图形编辑器创建
    NinePatch 图像资源。


    我将在本章的下一节中详细介绍 Draw 9-patch 软件的使用，那么让我们开始吧！

    '
- fmt: '# The Draw 9-Patch Tool: Create NinePatchDrawable Assets


    This section will cover how to create a 9-patch graphic using the Android Draw
    9-patch tool. You will need the source PNG image with which you would like to
    create your `NinePatchDrawable` object; I have provided a sample PNG image asset
    named `NinePatchFrame.png`. This truecolor-with-alpha-channel PNG32 digital image
    asset can be located in a `NinePatch` sub-folder in the project assets repository
    for this book.


    The reason I’m using an alpha channel to define transparency in the center area
    of the 9-patch that you’re about to create is so that any image layers (intended
    composites) that are behind the image asset inside Android will composite perfectly
    with the 9-patch image asset in the compositing stack.


    Let’s get started by locating your Draw 9-patch tool in your Android SDK folder
    hierarchy, in the `tools` sub-folder. Open your OS’s File Navigation utility;
    for Windows 8 this is the Explorer and is shown in Figure [10-1](#A978-1-4302-5786-8_10_Chapter.html#Fig1).


    As you can see, I named my Android SDK folder `Android`, and it contains an `adt-bundle-windows-x86`
    folder that I unzipped to install the SDK. Under this folder is the `sdk` folder
    and underneath that is the `tools` sub-folder.


    ![A978-1-4302-5786-8_10_Fig1_HTML.jpg](A978-1-4302-5786-8_10_Fig1_HTML.jpg)


    Figure 10-1.


    Locating your `draw9patch` Windows batch file in the Android folder `SDK` sub-folder,
    `tools` sub-folder.


    Once you click the `tools` sub-folder, as shown in Figure [10-1](#A978-1-4302-5786-8_10_Chapter.html#Fig1),
    you will see a `draw9patch.bat` Windows batch file; that is what you’ll need to
    launch to run the `Draw9patch` software utility. Right-click the `draw9patch`
    file and select the `Run as administrator` menu option, as shown in Figure [10-2](#A978-1-4302-5786-8_10_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_10_Fig2_HTML.jpg](A978-1-4302-5786-8_10_Fig2_HTML.jpg)


    Figure 10-2.


    Right-clicking the `draw9patch` Windows batch file and selecting the `Run as administrator`
    option to run.


    This will launch the Windows terminal software which is needed to run `.bat` batch
    files, and since it is “executing” the `draw9patch.bat` batch file, it will subsequently
    launch the `draw9patch` application from the `tools` folder.


    As you can see in Figure [10-3](#A978-1-4302-5786-8_10_Chapter.html#Fig3), the
    Windows Command Line Terminal (`cmd.exe`) software opens and runs the `draw9patch.bat`,
    which then opens a Draw 9-patch software editing window on top of a Terminal window.
    You can minimize the Terminal window if you like, leaving the Draw 9-patch editing
    tool open.


    ![A978-1-4302-5786-8_10_Fig3_HTML.jpg](A978-1-4302-5786-8_10_Fig3_HTML.jpg)


    Figure 10-3.


    Launching the Draw 9-patch software and using the `File` menu to access the `Open
    9-patch` dialog.


    There are two ways to open your source `.PNG` files for 9-patch development; either
    drag your PNG image onto the Draw 9-patch window, where the drop it arrow is,
    in the center, or use the `File ➤ Open 9-patch` work process to locate the file
    in your `NinePatch` sub-folder. Both of these ways are shown in Figure [10-3](#A978-1-4302-5786-8_10_Chapter.html#Fig3);
    however, I am going to use the conservative route with the `Open` dialog, shown
    in the bottom-left corner of the screen shot.


    Once you find the `NinePatchFrame.png` 32-bit PNG source image asset, select it,
    and click the `Open` button. You will see your Draw 9-patch software, with your
    PNG file in the editing and preview areas. The left pane is your editing area,
    where you can create your one-pixel black lines that define patches or scaling
    areas, as well as your center (padding) content areas.


    The right pane is your resulting 9-patch preview area, shown in Figure [10-4](#A978-1-4302-5786-8_10_Chapter.html#Fig4),
    where you can see what your 9-patch image asset will look like when it is scaled
    according to the one-pixel black border line definitions that you are defining
    in the left editing pane of the software.


    ![A978-1-4302-5786-8_10_Fig4_HTML.jpg](A978-1-4302-5786-8_10_Fig4_HTML.jpg)'
  raw: '## The Draw 9-Patch Tool: Create NinePatchDrawable Assets


    This section will cover how to create a 9-patch graphic using the Android Draw
    9-patch tool. You will need the source PNG image with which you would like to
    create your NinePatchDrawable object; I have provided a sample PNG image asset
    named `NinePatchFrame.png`. This truecolor-with-alpha-channel PNG32 digital image
    asset can be located in a NinePatch sub-folder in the project assets repository
    for this book.


    The reason I’m using an alpha channel to define transparency in the center area
    of the 9-patch that you’re about to create is so that any image layers (intended
    composites) that are behind the image asset inside Android will composite perfectly
    with the 9-patch image asset in the compositing stack.


    Let’s get started by locating your Draw 9-patch tool in your Android SDK folder
    hierarchy, in the tools sub-folder. Open your OS’s File Navigation utility; for
    Windows 8 this is the Explorer and is shown in Figure [10-1](#A978-1-4302-5786-8_10_Chapter.html#Fig1).


    As you can see, I named my Android SDK folder Android, and it contains an adt-bundle-windows-x86
    folder that I unzipped to install the SDK. Under this folder is the sdk folder
    and underneath that is the tools sub-folder.


    ![A978-1-4302-5786-8_10_Fig1_HTML.jpg](A978-1-4302-5786-8_10_Fig1_HTML.jpg)


    Figure 10-1.


    Locating your draw9patch Windows batch file in the Android folder SDK sub-folder,
    tools sub-folder


    Once you click the tools sub-folder, as shown in Figure [10-1](#A978-1-4302-5786-8_10_Chapter.html#Fig1),
    you will see a `draw9patch.bat` Windows batch file; that is what you’ll need to
    launch to run the Draw9patch software utility. Right-click the draw9patch file
    and select the Run as administrator menu option, as shown in Figure [10-2](#A978-1-4302-5786-8_10_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_10_Fig2_HTML.jpg](A978-1-4302-5786-8_10_Fig2_HTML.jpg)


    Figure 10-2.


    Right-clicking the draw9patch Windows batch file and selecting the Run as administrator
    option to run


    This will launch the Windows terminal software which is needed to run .bat batch
    files, and since it is “executing” the `draw9patch.bat` batch file, it will subsequently
    launch the draw9patch application from the tools folder.


    As you can see in Figure [10-3](#A978-1-4302-5786-8_10_Chapter.html#Fig3), the
    Windows Command Line Terminal (cmd.exe) software opens and runs the draw9patch.bat,
    which then opens a Draw 9-patch software editing window on top of a Terminal window.
    You can minimize the Terminal window if you like, leaving the Draw 9-patch editing
    tool open.


    ![A978-1-4302-5786-8_10_Fig3_HTML.jpg](A978-1-4302-5786-8_10_Fig3_HTML.jpg)


    Figure 10-3.


    Launching the Draw 9-patch software and using the File menu to access the Open
    9-patch dialog


    There are two ways to open your source .PNG files for 9-patch development; either
    drag your PNG image onto the Draw 9-patch window, where the drop it arrow is,
    in the center, or use the File ➤ Open 9-patch work process to locate the file
    in your NinePatch sub-folder. Both of these ways are shown in Figure [10-3](#A978-1-4302-5786-8_10_Chapter.html#Fig3);
    however, I am going to use the conservative route with the Open dialog, shown
    in the bottom-left corner of the screen shot.


    Once you find the NinePatchFrame.png 32-bit PNG source image asset, select it,
    and click the Open button. You will see your Draw 9-patch software, with your
    PNG file in the editing and preview areas. The left pane is your editing area,
    where you can create your one-pixel black lines that define patches or scaling
    areas, as well as your center (padding) content areas.


    The right pane is your resulting 9-patch preview area, shown in Figure [10-4](#A978-1-4302-5786-8_10_Chapter.html#Fig4),
    where you can see what your 9-patch image asset will look like when it is scaled
    according to the one-pixel black border line definitions that you are defining
    in the left editing pane of the software.


    ![A978-1-4302-5786-8_10_Fig4_HTML.jpg](A978-1-4302-5786-8_10_Fig4_HTML.jpg)'
  trans: '

    # Draw 9-Patch 工具：创建 NinePatchDrawable 资源


    本节将介绍如何使用 Android Draw 9-patch 工具创建 9-patch 图形。你需要准备一张源 PNG 图像，用于创建 `NinePatchDrawable`
    对象；我提供了一张名为 `NinePatchFrame.png` 的示例 PNG 图像资源。这张包含透明通道的真彩色 PNG32 数字图像资源，位于本书项目资源库的
    `NinePatch` 子文件夹中。


    我之所以在即将创建的 9-patch 中心区域使用透明通道来定义透明度，是为了让 Android 中位于该图像资源后方的任何图像层（即预期的合成层）都能在合成堆栈中与
    9-patch 图像资源完美融合。


    首先，在 Android SDK 文件夹层级中找到 `tools` 子文件夹中的 Draw 9-patch 工具。打开操作系统的文件导航工具；在 Windows
    8 中即为资源管理器，如图 10-1 所示。


    如图所示，我将 Android SDK 文件夹命名为 `Android`，其中包含一个解压用于安装 SDK 的 `adt-bundle-windows-x86`
    文件夹。该文件夹下是 `sdk` 文件夹，再下一级便是 `tools` 子文件夹。


    ![A978-1-4302-5786-8_10_Fig1_HTML.jpg](img/A978-1-4302-5786-8_10_Fig1_HTML.jpg)


    图 10-1.


    在 Android 文件夹的 `SDK` 子文件夹下的 `tools` 子文件夹中，找到 `draw9patch` Windows 批处理文件。


    点击 `tools` 子文件夹后，如图 10-1 所示，你会看到一个 `draw9patch.bat` Windows 批处理文件；你需要启动该文件来运行
    `Draw9patch` 软件工具。右键点击 `draw9patch` 文件，选择 `以管理员身份运行` 菜单选项，如图 10-2 所示。


    ![A978-1-4302-5786-8_10_Fig2_HTML.jpg](img/A978-1-4302-5786-8_10_Fig2_HTML.jpg)


    图 10-2.


    右键点击 `draw9patch` Windows 批处理文件，选择 `以管理员身份运行` 选项来执行。


    这将启动运行 `.bat` 批处理文件所需的 Windows 终端软件，由于它正在“执行” `draw9patch.bat` 批处理文件，因此随后将从 `tools`
    文件夹启动 `draw9patch` 应用程序。


    如图 10-3 所示，Windows 命令行终端（`cmd.exe`）软件打开并运行 `draw9patch.bat`，随后在终端窗口之上打开一个 Draw
    9-patch 软件编辑窗口。你可以根据需要最小化终端窗口，只保留 Draw 9-patch 编辑工具。


    ![A978-1-4302-5786-8_10_Fig3_HTML.jpg](img/A978-1-4302-5786-8_10_Fig3_HTML.jpg)


    图 10-3.


    启动 Draw 9-patch 软件，并使用 `File` 菜单访问 `Open 9-patch` 对话框。


    打开用于 9-patch 开发的源 `.PNG` 文件有两种方式：将 PNG 图像拖放到 Draw 9-patch 窗口中央的“放置在此处”箭头位置；或者通过
    `File ➤ Open 9-patch` 工作流程，在 `NinePatch` 子文件夹中找到文件。这两种方式均在图 10-3 中展示；不过，我将采用更稳妥的方式，即使用截图左下角显示的
    `Open` 对话框。


    找到 `NinePatchFrame.png` 32 位 PNG 源图像资源后，选中它并点击 `Open` 按钮。你将看到 Draw 9-patch 软件，PNG
    文件已显示在编辑区和预览区。左侧窗格是编辑区，你可以在其中绘制定义补丁或缩放区域以及中心（内边距）内容区域的单像素黑色线条。


    右侧窗格是生成的 9-patch 预览区，如图 10-4 所示。在这里，你可以看到 9-patch 图像资源根据你在软件左侧编辑区定义的单像素黑色边框线条进行缩放后的效果。


    ![A978-1-4302-5786-8_10_Fig4_HTML.jpg](img/A978-1-4302-5786-8_10_Fig4_HTML.jpg)

    '
- fmt: '### 10-4. Drawing out the Horizontal Patch at the top one pixel black line
    segment to define active X axis area


    Let’s click in the top one-pixel transparent perimeter on the right side, near
    the corner, as shown in Figure [10-4](#A978-1-4302-5786-8_10_Chapter.html#Fig4),
    and then drag towards the left to draw the black line that defines the X dimension
    scalable patch. Once you draw in the rough approximation of what you want, you
    can fine-tune the line using the fine lines at each end of the one-pixel line
    segment. Put your mouse over these until your cursor changes into a double-arrow;
    then click and drag the grayed-out area until it fits pixel-perfectly with the
    transparency area in the center of your NinePatchFrame source image asset.


    You can also right-click, or hold the `Shift` key and click on a Macintosh, to
    erase the previously drawn line. As you can see in the preview area on the right,
    you’re still not getting the visual result that you’re going for, so let’s continue
    on and define the left one-pixel black border next.


    First, let’s use one of the more colorful options, located at the bottom of the
    Draw 9-patch software, so you can visualize your settings even better.


    Look for the empty checkbox next to the `Show patches` option, and check it to
    turn this feature on. As shown in Figure [10-5](#A978-1-4302-5786-8_10_Chapter.html#Fig5),
    this will provide colors for your selected areas by using a combination of purple
    and green colors. This will make it clear which areas in your image asset are
    being affected.


    ![A978-1-4302-5786-8_10_Fig5_HTML.jpg](A978-1-4302-5786-8_10_Fig5_HTML.jpg)


    **Figure 10-5.** Turning on the `Show Patches` checkbox option, and finishing
    the top one-pixel black line segment


    You can see in Figure [10-5](#A978-1-4302-5786-8_10_Chapter.html#Fig5) that several
    other useful controls exist at the bottom of your editing pane. One is a `Zoom`
    slider, which will allow you to adjust the zoom level of your source graphic in
    the editing area. The other slider is the `Patch scale` slider, which allows you
    to adjust the scale of the preview imagery shown in the preview area on the right.
    The `Show lock` option checkbox will allow you to visualize the non-drawable area
    of the graphic when you mouse-over it.


    The `Show patches` option checkbox, which you have just enabled, allows you to
    preview your scalable patch definitions in real time in a left pane editing area.
    The pink color represents an area of the patch that is scalable.


    The `Show content` option checkbox highlights your content area in a preview image,
    where purple shows the area in which View content will be allowed.


    Finally, at the top of the editing area there is a `Show bad patches` button that
    will add a red border around patch areas that may produce artifacts in the graphic
    when it is scaled. Visual excellence for your scaled images will be achieved if
    you strive to eliminate all bad patches in the design.


    ### 10-6. Drawing out the vertical patch at the left one-pixel black line segment
    to define active Y axis area


    Now it is time to draw in your left one-pixel border, shown in Figure [10-6](#A978-1-4302-5786-8_10_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_10_Fig6_HTML.jpg](A978-1-4302-5786-8_10_Fig6_HTML.jpg)


    **Figure 10-6.** Drawing out the vertical patch at the left one-pixel black line
    segment to define active Y axis area


    As you can see in Figure [10-6](#A978-1-4302-5786-8_10_Chapter.html#Fig6), I didn’t
    draw a one-pixel black border line all the way down the left side. I did this
    so that you could visualize how well the `Show patches` option works. The option
    will allow you to visualize exactly what you are doing right down to the pixel
    level; this precision is absolutely necessary if you want to define the perfect
    9-patch image asset.


    ### 10-7. Both the horizontal and vertical patch one-pixel black line segments
    now define active axis areas


    Figure [10-7](#A978-1-4302-5786-8_10_Chapter.html#Fig7) shows the 9-patch image
    asset with both the top and left one-pixel border black line definitions in place;
    as you can see, due to the `Show patches` option, you have now defined your static
    areas and your scalable areas with surgical precision.


    Also notice in Figure [10-7](#A978-1-4302-5786-8_10_Chapter.html#Fig7) on the
    right-hand preview side of the software tool that the result of your 9-patch image
    asset definition is giving you a very professional scaling result.


    If you grab the scrollbar on the right side of the screen, and pull it up or down,
    you will see that the 9-patch scales into a portrait as well as a landscape container
    shape with perfect visual results.


    Now that you have defined the scalable areas of the 9-patch image asset, it is
    time to define the padding areas of your 9-patch image asset, using the one-pixel
    black border lines on the right and bottom of the editing pane.


    ![A978-1-4302-5786-8_10_Fig7_HTML.jpg](A978-1-4302-5786-8_10_Fig7_HTML.jpg)


    **Figure 10-7.** Both the horizontal and vertical patch one-pixel black line segments
    now define active axis areas


    ### 10-8. Defining the padding areas using the one-pixel black line segments on
    the right and bottom areas


    As you can see in Figure [10-8](#A978-1-4302-5786-8_10_Chapter.html#Fig8), I have
    drawn in, on the right-hand side, the one-pixel black border line segment that
    is needed to define the Y image dimension for the center (padding) area for the
    9-patch image asset. Also notice in Figure [10-8](#A978-1-4302-5786-8_10_Chapter.html#Fig8)
    that I am in the process of drawing in the second bottom side one-pixel black
    border line segment in order to define the X dimension for the center (padding)
    area for the 9-patch image asset.


    Notice the muted colors that are used to show the different layers of the scalable
    versus padding area definitions. Your padding definitions utilize a grayish overlay
    on the green or purple (or pink, if you prefer) scalable area definition, which
    is more brightly colored, probably due to the fact that the scalable area is more
    important to define than the padding area.


    Also, notice on the right-hand side in the 9-patch results previewing area that
    the 9-patch scaling result is giving you exceptionally professional results, regardless
    of the image’s orientation or the dimensions that the 9-patch image asset is being
    scaled into.


    ![A978-1-4302-5786-8_10_Fig8_HTML.jpg](A978-1-4302-5786-8_10_Fig8_HTML.jpg)


    **Figure 10-8.** Defining the padding areas using the one-pixel black line segments
    on the right and bottom areas


    ### 10-9. Adjusting the padding areas via the right side one-pixel black line
    segment to show patch adjust guides


    Finally, notice in Figure [10-9](#A978-1-4302-5786-8_10_Chapter.html#Fig9) that
    I am pulling the right side one-pixel black border line segment up to show the
    patch adjustment guides and how the border allows you to adjust your 9-patch padding
    parameters precisely.


    ![A978-1-4302-5786-8_10_Fig9_HTML.jpg](A978-1-4302-5786-8_10_Fig9_HTML.jpg)


    **Figure 10-9.** Adjusting the padding areas via the right side one-pixel black
    line segment to show patch adjust guides


    ### 10-10. Final patch and padding areas defined and using mouse-over center area
    to get patch coordinates


    Figure [10-10](#A978-1-4302-5786-8_10_Chapter.html#Fig10) shows the finished 9-patch
    image asset definition with both a scaling set of border line segments and the
    padding set of border line segments.


    ![A978-1-4302-5786-8_10_Fig10_HTML.jpg](A978-1-4302-5786-8_10_Fig10_HTML.jpg)


    **Figure 10-10.** Final patch and padding areas defined and using mouse-over center
    area to get patch coordinates


    It is important to note that if you place your mouse in the left editable pane,
    over the center section of your 9-patch definition, and then hold it there, the
    tool-tip pop-up will appear, giving you the precise pixel patch coordinates for
    your final 9-patch definition.


    In my case, this shows that I have used 256 pixels minus 26 pixels, or 230 pixels
    of my total 280 pixel image dimension, for my center scalable area. This means
    that I have used 25 pixels, or half of the 50 remaining pixels, for the actual
    image assets (bars and screws) that will be scaled. This also means that the fixed
    areas of this 9-patch (in this case it is a corner of the frame with a standard
    screw in it to hold it down firmly, or so it appears at least) would thus each
    be 25 pixels square in size.'
