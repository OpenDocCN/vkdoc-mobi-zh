  trans: '

    # 使用位图类在图像间应用 PorterDuff 混合模式


    现在你已经设置好 `Paint` 对象，可以创建 `Bitmap` 对象了。这些 `Bitmap` 对象将保存你的 `backgroundImage` 和
    `foregroundImage` 图像资源，你需要使用 Android 的 `BitmapFactory` 类将这些资源加载到 `Bitmap` 对象中。


    你还需要使用 `.copy()` 方法将 `Bitmap` 对象转换为 Android 中所谓的可变（mutable）`Bitmap` 对象。可变意味着你的
    `Bitmap` 对象的像素可以被编辑（修改）。要实现这一点，它必须被加载到系统内存中，这就是为什么你要使用 `.copy()` 方法将图像资源从可绘制资源区域取出并放入系统内存的原因。


    所有涉及 `Bitmap` 的工作都通过以下四行 Java 代码完成：


    ```

    Bitmap backgroundImage = BitmapFactory.decodeResource(getResources(), R.drawable.cloudsky);

    Bitmap mutableBackgroundImage = backgroundImage.copy(Bitmap.Config.ARGB_8888,
    true);

    Bitmap foregroundImage = BitmapFactory.decodeResource(getResources(), R.drawable.cloudsky);

    Bitmap mutableForegroundImage = foregroundImage.copy(Bitmap.Config.ARGB_8888,
    true);

    ```


    第一条语句使用你的 `BitmapFactory` 类的 `.decodeResource()` 方法，通过调用 `.getResources()` 方法，将
    `drawable` 文件夹中的 `cloudsky.jpg` 图像资源加载到名为 `backgroundImage` 的 `Bitmap` 对象中。


    第二条语句获取这个 `Bitmap` 对象，并使用 `.copy()` 方法将其加载到系统内存中，并通过使用 `Bitmap.Config.ARGB_8888`
    常量以及设置为 `true` 的 `isMutable` 标志，指定它需要 32 位内存空间。


    如图 11-8 所示，你需要在 Eclipse 中鼠标悬停在你的 `Bitmap` 类和 `BitmapFactory` 类引用上，并为这两个类调用导入选项，以便让
    Eclipse 为你编写那些导入语句。


    ![A978-1-4302-5786-8_11_Fig8_HTML.jpg](img/A978-1-4302-5786-8_11_Fig8_HTML.jpg)


    *图 11-8. 使用 BitmapFactory 类为 backgroundImage 和 foregroundImage 创建 Bitmap 对象*


    现在，你的 `Bitmap` 对象已从 `/res/drawable` 资源区域加载，并作为带有 Alpha 通道的 32 位数据加载（复制）到内存中，且
    `isMutable` 标志设置为 `true`，以便你可以在 Android 的 `Paint` 和 `Xfermode` 操作中编辑（使用）这些数据。至此，你可以使用
    `Paint` 对象和 `.setXfermode()` 方法来加载你选择的 PorterDuff 模式，从而让 `Paint` 对象知道你希望它如何工作。


    ## 使用 `.setXfermode()` 方法应用 PorterDuffXfermode


    下一行 Java 代码将设置你的 `Paint` 对象（名为 `paintObject`），使其能够使用你之前了解过的 `PorterDuffXfermode`
    对象加载 `PorterDuff.Mode.XOR` 常量。这是通过调用 `Paint` 对象的 `.setXfermode()` 方法来完成的，如下所示：


    ```

    paintObject.setXfermode(new PorterDuffXfermode(PorterDuff.Mode.XOR));

    ```


    这行代码使用点表示法调用了 `paintObject`（即 `Paint` 对象）的 `.setXfermode()` 方法；同时，在该方法调用内部，创建了一个新的
    `PorterDuffXfermode` 对象，并通过其参数列表将其设置为 `PorterDuff.Mode.XOR` 常量。


    如图 11-9 所示，输入这行 Java 代码后，你需要鼠标悬停在 `PorterDuffXfermode` 类引用上，导入 `PorterDuffXfermode`（`android.graphics`）后，也能消除
    `.setXfermode()` 的错误高亮。正如你现在所知，你可能需要手动编写 `import android.graphics.PorterDuff`
    语句，因为 Eclipse 似乎无法检测到需要导入 `PorterDuff` 类。


    ![A978-1-4302-5786-8_11_Fig9_HTML.jpg](img/A978-1-4302-5786-8_11_Fig9_HTML.jpg)


    *图 11-9. 使用 paintObject 的 .setXfermode() 方法创建一个新的 PorterDuffXfermode XOR 对象*


    现在你的 `Paint` 对象已经配置完成，可以设置你的 `Canvas` 对象了。


    ## Canvas 类：为合成创建画布


    Android 的 `Canvas` 类用作在显示屏幕上绘制的引擎。如果你熟悉游戏设计，你之前应该听说过 Canvas；这是图形设计师常用的术语，不仅可用于
    Android，还可用于其他流行的编程范式，例如 HTML5 应用。


    为了将图形绘制到屏幕上，你需要四个基本组件。第一个是 `Bitmap` 对象，用于在系统内存中保存像素；第二个是 `Canvas`，用于执行绘制指令（将数据写入
    `Bitmap` 对象）；第三个是绘制“原语”对象，例如 `Rect`、`Path`、`Text` 或 `Bitmap` 对象；最后一个是 `Paint`
    对象，用于描述将由 `Canvas` 渲染引擎通过这个原语应用到 `Bitmap` 对象的颜色、模式和样式。可以肯定的是，Android 中的图形处理绝非易事。


    Android 的 `Canvas` 类是另一个 100% 原创代码的直接继承 `java.lang.Object` 的子类。这是因为它需要为 Android
    操作系统进行专门定制。因此，它的 Java 层次结构如下：


    ```

    java.lang.Object

    > android.graphics.Canvas

    `


    接下来你将使用这个 `Canvas` 类，因为你需要它的渲染引擎能力来为你编写的、用于演示如何混合图像的 Java 代码执行此 PorterDuff 混合模式操作。


    在 Android 中设置图像合成栈的下一步是创建一个供你绘制的 `Canvas`。这包括创建你的目标合成图像，它将是另一个 `Bitmap` 对象，你将其恰当地命名为
    `compositeImage`，因为它将保存你合成的图像。


    这是通过使用 `.createBitmap()` 方法完成的，你还会同时使用 `mutableForegroundImage` 对象来加载它，这样你正在混合的两幅图像中的一幅就已经加载并处于就绪状态。你将使用以下单行
    Java 编程逻辑来做到这一点，该逻辑声明了 `Bitmap` 对象，为其命名，并将其设置为 `Bitmap` 类调用其自身的 `.createBitmap()`
    方法的结果，同时在函数调用内部传入 `mutableForegroundImage` 参数：


    ```

    Bitmap compositeImage = Bitmap.createBitmap(mutableForegroundImage);

    ```


    接下来，你想创建（构造）并设置你的 `Canvas` 对象，将其命名为 `imageCanvas`，它将引用你的 `compositeImage` `Bitmap`
    对象。这是通过以下代码行中的 `new` 关键字完成的：


    ```

    Canvas imageCanvas = new Canvas(compositeImage);

    ```


    如图 11-10 所示，你需要将鼠标悬停在两个 `Canvas` 对象引用之一上，然后选择导入 Canvas（`android.graphics`）选项，以便你能够在
