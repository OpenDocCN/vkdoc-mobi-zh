  trans: '

    ![A978-1-4302-5786-8_4_Fig3_HTML.jpg](img/A978-1-4302-5786-8_4_Fig3_HTML.jpg)


    图 4-3. 添加 `android:fromXScale` 参数，并自动生成 `xmlns:android` 网址引用


    完成后，你的 XML 应类似图 4-4 中显示的标记。现在你可以添加其余 X 和 Y 缩放范围参数：`fromYScale`、`toXScale` 和 `toYScale`。


    ![A978-1-4302-5786-8_4_Fig4_HTML.jpg](img/A978-1-4302-5786-8_4_Fig4_HTML.jpg)


    图 4-4. 添加 X 和 Y 的起始与结束缩放参数，将你的 PAG 标志从零缩放到全尺寸


    利用同样的 `android:` 工作流程添加缩放范围定义参数，将 X 和 Y 的起始参数均设为 `0.0`（在远处不可见），X 和 Y 的结束参数均设为
    `1.0`（在近处完全可见）。


    接下来，添加你的轴心和插值器参数，以确定缩放从何处开始以及它如何从远处移动过来。使用你的 `android:` 工作流程，添加 `pivotX` 和 `pivotY`
    参数，以及一个 `android:interpolator` 参数（参见图 4-5）。由于你希望旋转的标志从屏幕中心均匀缩放进入，你会将 X 和 Y 轴心参数的值都设为
    `50%`。如果你使用 `0%` 的设置，旋转的标志会从显示屏左上角出现，这看起来远没有从更居中的位置缩放进入你的 Pro Android Graphics
    标志自然。


    ![A978-1-4302-5786-8_4_Fig5_HTML.jpg](img/A978-1-4302-5786-8_4_Fig5_HTML.jpg)


    图 4-5. 添加 `pivotX` 和 `pivotY` 参数以及一个 `accelerate_interpolation` 插值器常量


    设置 `android:interpolator` 参数的值可能会稍微棘手一些，因为它需要在操作系统中精确指定正确的常量引用路径。这通过使用 `@android:`
    来指定 Android 操作系统资源区域，再使用 `anim/` 来指定动画资源路径（此处是插值器常量），然后加上一个插值器常量名（此处是 `accelerate_interpolator`）来实现。


    你现在使用加速插值器，是因为你希望旋转的 Pro Android Graphics 标志流畅而自然地放大到屏幕中央，这个 `accelerate_interpolator`
    常量将引用一个运动控制曲线算法来为你提供这种运动效果。


    接下来，你将使用本章前面学到的 `android:duration` 和 `android:startOffset` 参数为动画指定时间值。你打算将持续时间参数设置为
    9 秒；这是因为你希望旋转动画缓慢而平滑地从远处显现。


    请记住，持续时间和插值器参数协同工作，在此例中为你的旋转标志从远方地平线飞入时提供平滑且逼真的飞行路径。


    你需要在此处指定一个 `3000`（即 3 秒）的 `startOffset` 参数，原因是这是一个闪屏动画，你不希望动画在屏幕加载的同时立即开始。因此，你将为最终用户提供几秒钟的时间来意识到应用已启动并查看显示屏，然后再开始将旋转的
    Pro Android Graphics 动画放大显示到视图中。


    由于你已将动画的起始缩放范围值缩小到零，因此帧动画立即开始旋转标志这一事实并不重要，因为用户反正也看不到它，所以不需要指定偏移量。你可以在图 4-6 中看到迄今为止为缩放变换指定的全部九个参数。


    ![A978-1-4302-5786-8_4_Fig6_HTML.jpg](img/A978-1-4302-5786-8_4_Fig6_HTML.jpg)


    图 4-6. 添加一个设置为 9 秒的 `android:duration` 参数和一个 3 秒的动画启动偏移值


    接下来，你将指定过程式动画的循环参数，即本章前面学到的 `android:repeatCount` 和 `android:repeatMode`。这些参数将允许你控制过程式动画变换执行的次数，对于这个介绍性动画而言，这恰好对实现连续的效果至关重要。`<scale>`
    标签的最终标记可以在图 4-7 中看到。


    由于你希望标志从远处飞入，并在达到全尺寸后停在屏幕中央并旋转，你需要将 `repeatCount` 设置为仅重复此缩放操作一次，否则你的旋转标志帧动画会在到达屏幕后几乎立即消失——实际上，是在到达三秒后消失，因为你已经指定
    `startOffset` 值为 `3000`，即三秒。


    由于计算机从零开始计数，正确的设置应为 `android:repeatCount="0"`，所以请确保不要使用 `1`。接下来，你将设置 `repeatMode`
    参数，通过使用 `restart` 值常量来指定无缝循环动画。请记住，使用 `reverse` 值常量会产生一种弹球动画效果，如果你希望旋转的标志被吸回地平线（在这种情况下，你将
    `repeatCount` 指定为 `1`，`repeatMode` 指定为 `reverse`），那可能会很酷。


    由于动画只播放一次，你其实根本不需要设置 `repeatMode` 参数！我在这里设置它，是为了让你了解这个重要参数，因为将来你设置的大多数变换动画都需要同时指定
    `repeatCount` 值和 `repeatMode` 参数，以及它的两个常量值之一。


    ![A978-1-4302-5786-8_4_Fig7_HTML.jpg](img/A978-1-4302-5786-8_4_Fig7_HTML.jpg)


    图 4-7. 添加一个值为零（指定一次播放周期）的 `android:repeatCount` 和一个 `restart` 的 repeatMode


    既然你已经设置好了过程式动画，接下来需要做的就是进入项目 `MainActivity.java` Activity 的 Java 代码，实例化你的 `Animation`
    对象，将其连接到你的 `pagImageView` 对象上，然后你就准备好用一些酷炫的过程式动画来增强你的帧动画了！

    '
- fmt: '# Instantiating the Animation Object in `MainActivity.java`


    Click the `MainActivity.java` tab in the central editing area of Eclipse, as shown
    in Figure [4-8](#A978-1-4302-5786-8_4_Chapter.html#Fig8), showing all of your
    XML tabs as well, and add in a line of code that instantiates an Android `Animation`
    object named `pagAni` and loads it with the XML `<scale>` animation that you just
    defined in the `pag_anim.xml` file. This is done using the following line of Java
    code:


    ```

    Animation pagAni = AnimationUtils.loadAnimation(this, R.anim.pag_anim);

    ```


    What this line of code does is to construct the `Animation` object and name it
    `pagAni` on the left side of the equals sign, and then, using the equals sign,
    load this `pagAni` Animation object with the result of the method call to the
    `.loadAnimation(context, reference)` method, which is called off of the `AnimationUtils`
    class using dot notation, since it is contained within that class. The current
    context is set using the `this` constant, and the reference to your `<scale>`
    procedural animation XML definition is set using the `R` (Resources), `anim` folder,
    and `pag_anim.xml`, which are concatenated together by using the period character,
    like this: `R.anim.pag_anim`.


    ![A978-1-4302-5786-8_4_Fig8_HTML.jpg](A978-1-4302-5786-8_4_Fig8_HTML.jpg)


    **Figure 4-8.** Instantiating an `Animation` object named `pagAni`, and referencing
    the `pag_anim.xml` XML definition


    As you can see in Figure [4-8](#A978-1-4302-5786-8_4_Chapter.html#Fig8), Eclipse
    ADT (Android) has a problem with the `Animation` and the `AnimationUtil` classes
    being utilized without first being imported, so let’s mouse-over both of the class
    references and select the import option in order to have Eclipse write some Java
    code for you.


    Once the two classes have been imported, your code will be clean, and you can
    enter the second line of code. This shorter line of code wires your newly created
    `pagAni` Animation object into your existing `pag` ImageView object.


    This is done using the following single line of Java code, which calls the `.startAnimation()`
    method off of the `pag` ImageView object and passes it the `pagAni` Animation
    object, thus essentially wiring the constructs together:


    ```

    pag.startAnimation(pagAni);

    ```


    The completed implementation of your Animation object using only two lines of
    code can be seen in Figure [4-9](#A978-1-4302-5786-8_4_Chapter.html#Fig9).


    ![A978-1-4302-5786-8_4_Fig9_HTML.jpg](A978-1-4302-5786-8_4_Fig9_HTML.jpg)


    **Figure 4-9.** Wiring the `pagAni` Animation object into the `pag` ImageView
    object using the `.startAnimation()` method


    Now, you are ready to use the `Run As` ➤ `Android Application` work process, and
    test your newly revised splash screen animation. As you can see, the effect is
    far more professional, and the animation now appears out of nowhere and lands
    spinning in the middle of the screen. I will forgo the screen shot here as there
    is currently no way to provide an animated screenshot, and you have already seen
    the static one in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html) (refer to Figure
    3-14).


    Next, you’re going to add even more refinement to this Pro Android Graphics logo
    animation special effect in order to make it even more believable and professional.
    You are going to add alpha blending to your animation to make the animation more
    realistic. You will do this so that the spinning logo is more and more visible
    as it comes in from the distance, so that it appears more and more solid the closer
    it gets to the camera (your display screen).


    You will accomplish this by putting a `<set>` parent tag construct outside of
    your current `<scale>` tag, and then adding an `<alpha>` child tag into your new
    `<set>` group. In this way, both of these procedural transformations will be performed
    as a single, unified procedural animation processing operation.


    Let’s get going on that now. Since you already have a procedural animation XML
    definition file, click the `pag_anim.xml` tab under the Eclipse central editing
    pane, and go back in and modify that markup from being a `<scale>` transform animation
    definition to becoming a group `<set>` definition that contains a `<scale>` transform
    definition and much more.'
