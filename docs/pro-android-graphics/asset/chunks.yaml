    @Override\npublic void onClick(View arg0) {\n    transition.startTransition(5000);\n\
    }\n```\n"
- fmt: '如图 [13-12](#A978-1-4302-5786-8_13_Chapter.html#Fig12) 所示，您的 Java 代码仍然没有错误，您可以准备将与
    `ImageView` 相关的 Java 编程逻辑（当前位于 `onCreate()` 方法底部）移动到顶部，即 `ImageButton` 和 `TransitionDrawable`
    逻辑所在的位置。这样做是为了让所有相关代码位于同一位置，并且让 `ImageView` 与其他两个用于实现数字图像过渡的 Java 对象一起实例化和初始化。


    ![A978-1-4302-5786-8_13_Fig12_HTML.jpg](A978-1-4302-5786-8_13_Fig12_HTML.jpg)


    **图 13-12.** 编写 `onClick()` 事件处理方法，调用 `transition` 对象的 `.startTransition()` 方法


    接下来，请转到 `onCreate()` 方法的底部，剪切并粘贴那两行用于创建 `ImageView` 并将其命名为 `porterDuffImageView`
    的代码，并调用 `porterDuffImageView` 对象的 `.setImageBitmap()` 方法。将这两行 Java 代码放在调用 `transition`（`TransitionDrawable`
    对象）的 `.getDrawable()` 方法的那行代码之后，如图 [13-13](#A978-1-4302-5786-8_13_Chapter.html#Fig13)
    所示。


    由于您的 `transition`（`TransitionDrawable` 对象）是 `Drawable` 对象类型，而不是 `Bitmap` 对象类型，因此请将
    `.setImageBitmap()` 方法调用改为 `.setImageDrawable()` 方法调用，然后将 `transition` 对象作为当前要接入
    `ImageView` 对象的 `Drawable` 对象（类型）进行引用。如图 [13-13](#A978-1-4302-5786-8_13_Chapter.html#Fig13)
    所示，您的代码仍然没有错误，现在可以准备使用 Nexus One 模拟器测试这段代码了。


    ![A978-1-4302-5786-8_13_Fig13_HTML.jpg](A978-1-4302-5786-8_13_Fig13_HTML.jpg)


    **图 13-13.** 将 `ImageView` 和过渡逻辑移到 `ImageButton` 上方，并调用 `.setImageDrawable()`


    右键单击您的 `GraphicsDesign` 项目文件夹，使用 `Run As` ➤ `Android Application` 工作流程启动 Nexus
    One 模拟器。当您点击 `MENU` 按钮并选择 `Table of Contents` 菜单项时，`GraphicsDesign` 应用崩溃了！现在我们需要进入调查模式，找出导致此问题的原因。我将在此带您完成整个过程，因为这在应用开发中很常见，所以我希望您能了解其中的工作（和思考）过程。


    我首先在在线开发者文档中查找 `TransitionDrawable` 类是在何时被添加到 Android 操作系统中的，因为这能告诉我该功能正常运行所需的
    API 级别支持。我的研究发现，要使用 Android 中的这些图像过渡功能，需要 API 级别 16 的支持。因此，下一步是在 Eclipse 中右键单击项目层次结构底部的
    `AndroidManifest.xml` 文件，在中央编辑窗格中打开该文件，查看为此应用定义的 API 级别支持（最低和目标）。


    当您执行此操作时，您会看到应用的最低 SDK 支持级别设置为 API 级别 8，因此需要通过将 `<uses-sdk>` 子标签的参数从 `android:minSdkVersion="8"`
    改为 `android:minSdkVersion="16"`，将其更改为 API 级别 16，如图 [13-14](#A978-1-4302-5786-8_13_Chapter.html#Fig14)
    所示。


    现在您可以再次使用 `Run As` ➤ `Android Application` 工作流程，测试您的 `GraphicsDesign` 应用，看看这个
    `AndroidManifest.xml` 应用配置参数的修改是否解决了问题。


