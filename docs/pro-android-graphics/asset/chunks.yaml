    实际上，Android 操作系统会在内部为每个 `View` 对象跟踪两对宽度和高度数值。第一对数值称为**测量宽度**和**测量高度**。你的测量宽度和测量高度尺寸将定义你的
    `View` 对象希望在其父容器内部有多大。这些测量尺寸可以通过在任何一个拥有 ID（允许在 Java 逻辑中引用并调用其方法）的 `View` 对象上调用
    `.getMeasuredWidth()` 和 `.getMeasuredHeight()` 方法来获取。


    第二对数值称为**宽度**和**高度**，或者更准确地说，是**绘制宽度**和**绘制高度**。这些绘制尺寸将定义 `View` 在屏幕上、绘制时以及布局计算后的实际大小。绘制宽度和绘制高度数值可能（但不一定）与测量宽度和测量高度数值不同。你可以在
    Java 代码的运行时阶段，通过在任何一个 `View` 对象上调用 `.getWidth()` 和 `.getHeight()` 方法来获取绘制宽度和绘制高度。


    在测量 `View` 的尺寸时，`View` 总是会考虑内边距。我们将在本章的下一节中介绍内边距和外边距。


    内边距以 DIP 为单位表示 `View` 的左侧、顶部、右侧和底部部分。内边距用于将 `View` 的内容间隔开一定数量的像素。尽管 `View` 子类可以定义内边距，但它不支持外边距。不过，Android
    的 `ViewGroup` 子类可以提供外边距参数，因此，外边距和内边距都可以在 `ViewGroups` 中定义。


    ## 视图定位特性：外边距与内边距


    为了对 UI 布局元素进行相对定位，有两类关键的布局参数——外边距和内边距——它们允许你微调 UI 在显示屏上的外观。


    全局定位由 Android 操作系统通过 `layout_width` 和 `layout_height` 常量完成。这样，Android 操作系统就能够适配不同的设备屏幕尺寸、密度、宽高比和方向。


    然后，开发者可以通过在每一个子 `View` 标签 UI 元素上使用 `android:padding` 参数，来对 UI 元素进行局部定位控制。请注意，这个参数叫做
    `android:padding`，而不是 `android:layout_padding`，所以你实际上不需要记住“布局用外边距，UI 元素用内边距”这种规则，因为该参数名称本身就内置了其用途的指示！既然
    `android:padding` 并没有被命名为 `android:view_padding`，你就知道内边距参数可以同时用于 `View`（控件）和 `ViewGroup`（布局容器）这两种子类类型。


    由于可以使用外边距的地方较少，而且你在前面的章节中已经体验过如何使用它们，那我们就先从外边距开始讲起。外边距将其所应用的对象在其容器外部推开，而内边距则相反，它会将容器的边界从其内部所包含的内容处推开。你将在本书中详细看到这一点，因为你将使用这两种间距参数来实现各种不同类型的图形设计最终效果。


    有四类不同的外边距设置参数：`layout_marginBottom`、`layout_marginTop`、`layout_marginLeft` 和 `layout_marginRight`。还有第五个选项，简称为
    `layout_margin`，它可以用一个单一的 DIP 值来设置所有四个方向的外边距，从而在你的布局容器周围提供均匀间隔的外边距。


    从 Android 4.2 API 级别 17（Jelly Bean 果冻豆）开始，新增了两个外边距参数：`layout_marginStart` 和 `layout_marginEnd`。这些“起始”和“结束”外边距参数是作为
    Android 支持从右到左（RTL）设计布局的一部分而添加的，用于支持那些从右向左、而非从左向右扫视屏幕的文化习惯。


    对于 RTL 屏幕设计流程，`layout_marginStart` 等同于 `layout_marginRight`，而 `layout_marginEnd`
    等同于 `layout_marginLeft`。


    对于从左到右（LTR）屏幕设计流程，`layout_marginStart` 等同于 `layout_marginLeft`，而 `layout_marginEnd`
    等同于 `layout_marginRight`。


    有关外边距布局参数的详细信息，请阅读以下 URL 中的 Android 开发者网站 `ViewGroup.MarginLayoutParams` 页面：


    [`developer.android.com/reference/android/view/ViewGroup.MarginLayoutParams.html`](http://developer.android.com/reference/android/view/ViewGroup.MarginLayoutParams.html)


    与外边距类似，Android 有四类不同的内边距设置参数：`android:paddingBottom`、`android:paddingTop`、`android:paddingLeft`
    和 `android:paddingRight`。还有一个第五个快捷选项，简称为 `android:padding`，它可以用一个单一的 DIP 值来设置所有四个方向的内边距，从而在你的
    `View` 对象内容周围提供均匀间隔的内边距。


    从 Android 4.2 API 级别 17（Jelly Bean 果冻豆）开始，新增了两个内边距参数：`android:paddingStart` 和
    `android:paddingEnd`。这些“起始”和“结束”内边距参数是作为 Android 支持 RTL 设计布局的一部分而添加的，用于支持那些从右向左、而非从左向右扫视屏幕的文化习惯。


    对于 RTL 屏幕设计流程，`android:paddingStart` 等同于 `android:paddingRight`，而 `android:paddingEnd`
    等同于 `android:paddingLeft`。


    对于从左到右（LTR）屏幕设计流程，`android:paddingStart` 等同于 `android:paddingLeft`，而 `android:paddingEnd`
    等同于 `android:paddingRight`。


    有关视图内边距参数的详细信息，请阅读以下 URL 中的 Android 开发者网站 `View` 超类页面：


    [`http://developer.android.com/reference/android/view/View.html`](http://developer.android.com/reference/android/view/View.html)


    接下来，你将研究那些允许你控制 `View` 控件如何利用你的图形设计资源，以及如何与你的图形设计（drawable）资源（图像和动画）和数字视频资源进行合成的参数。

