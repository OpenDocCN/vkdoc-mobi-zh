  trans: '

    # Android Drawable 类：图形蓝图


    Android 的 `Drawable` 类是 `java.lang.Object` 主类的另一个直接子类。这表明 `Drawable` 类是专门为 Android
    操作系统定义图形对象而设计的，因此，我们需要对其进行详细讨论。


    Android `Drawable` 类的层级结构如下：


    ```

    java.lang.Object

    > android.graphics.drawable.Drawable

    ```


    Android 的 `Drawable` 类属于 `android.graphics.drawable` 包。因此，`Drawable` 类的导入语句将其类导入路径引用为
    `android.graphics.drawable.Drawable` 包。


    `Drawable` 类是一个公共抽象类。这种访问修饰符配对意味着，除了用于初始声明 `Drawable` 对象，或用于创建子类（例如你在本章中将要使用和创建的类）之外，该类不能直接使用。


    `Drawable`（类或对象）是 Android 操作系统用于表示某种图形对象的术语。它可能源于这样一个假设：“可绘制的东西应该被称为 `Drawable`。”Android
    喜欢为操作系统组件和功能创建自己的术语，例如 `Activities`、`Receivers` 和 `Drawables`。


    正如你在本书中所看到的，当你需要某种与图形相关的对象（内存中）资源时，你将处理 `Drawable` 对象。当你希望在显示器上绘制某些内容时，你将实例化一个
    `Drawable`（或其子类 `Drawable` 类型，例如 `BitmapDrawable`）。


    `Drawable` 类代表了 Android 图形设计的基础，旨在提供用于处理底层图形资源的通用 API。正如我们在本章第一部分查看 Android 中可用的多种不同类型的
    `Drawable` 对象时所看到的，这种图形资源可以采用多种形式。


    Android 中的 `Drawable` 对象不具备接收事件的能力，也不允许与用户进行任何交互。这些功能由你的 `View` 对象处理，通常是 `ImageView`，它将在其内部“包含”（或引用）你的
    `Drawable` 对象，要么放在保存源图像板（容器）的前景参数中，要么放在保存背景图像板（或者只是一个简单的 ARGB 颜色值）的背景参数中。


    `Drawable` 主类为所有其他类型的 `Drawable` 子类提供了五个功能支持领域。这些包括 `Drawable` 对象的填充、边界、动画、状态控制和层级。


    我们在本书中已经看到过这些概念中的一部分，例如，对于填充值，`Drawable` 类的 `.getPadding()` 方法将从一个 `Drawable`
    对象返回（如果适用）有关如何放置该 `Drawable` 对象内所包含内容的信息。


    例如，一个 `Drawable` 对象，如 `NinePatchDrawable` 对象，它旨在用作按钮 UI 小部件的图形框架，将需要返回一个填充 `Rect`
    值，该值能够准确地将文本标签放置在按钮 UI 元素内的 `NinePatchDrawable` 资源中。这个 `.getPadding()` 方法调用使用
    `Rect` 对象作为参数，通过以下方法调用代码实现，你将在本章稍后学习到：


    `yourDrawableObjectNameHere.getPadding(Rect);`


    我们在本书中也多次提到 `AnimationDrawable`（帧动画）对象。任何 `Drawable` 子类都可以通过使用 `Drawable` 类中的两个嵌套类之一“回调”其父类来支持动画。


    对于你想要创建的任何会扩展 `Drawable` 类的动画 `Drawable` 对象子类，都应该实现这个 `Drawable.Callback` 接口。


    子类可以通过 `.setCallback(Drawable.Callback)` 方法调用来支持该接口，以便动画在你的 `Drawable` 子类中正常运行。最简单的方法是在自定义
    `Drawable` 对象上调用 `Drawable` 的 `.setBackgroundDrawable()` 方法。


    我们还研究过多状态 `ImageButton` 对象和类似的 `Drawables`，它们会考虑 UI 元素或图形的状态，以便设置 `Drawable` 资源引用并显示正确的图像资源。


    `Drawable` 类包含一个 `.setState()` 方法，该方法允许 `Drawable` 子类告诉它创建的 `Drawable` 对象，每个 `Drawable`
    资源需要为哪种状态绘制：例如，当鼠标悬停时，或当 UI 元素获得焦点时，或当对象被选中时，甚至是当用户正在使用自定义定义的状态时。


    支持设置状态的 `Drawable` 对象将根据此状态或状态变化信息修改其源图像。你在本书中已经创建过一个多状态 `Drawable`，即在第 9 章中，你创建了一个具有四种不同按钮
    UI 状态的 `ImageButton Drawable`。


    `Drawable` 对象还可以使用 `.setLevel()` 方法响应不同的层级。此方法允许 `Drawable` 对象响应任何控制器，控制器可以发送层级信息来触发需要显示的确切
    `Drawable` 资源。层级对于与 Android 硬件一起使用特别有用，例如，实时显示电池电量，或者如果硬件支持该功能（就像今年即将推出的新款 Android
    手表很可能会支持的那样）则设置高度计层级。


    最后，`Drawable` 类通过使用 `.setBounds()` 方法支持边界，该方法需要用于告知你的 `Drawable` 应该绘制在哪里，以及在屏幕上应该有多大。在本章下一节中，当你创建自己的自定义
    `Drawable` 子类 `ImageRoundingDrawable` 类时，你将利用 `.getBounds()` 方法。


    Android 开发者可以通过使用 `.getIntrinsicHeight()` 或 `.getIntrinsicWidth()` 方法，找出任何给定 `Drawable`
    对象的首选尺寸。

    '
- fmt: '# Creating Your Custom Drawable: ImageRoundingDrawable


    Let’s go back into Eclipse and create your own custom `Drawable` subclass so that
    you can see exactly how this is done. Right-click your project `/src/` folder,
    and select the **New ➤ Class** menu command sequence, as shown in Figure [16-16](#A978-1-4302-5786-8_16_Chapter.html#Fig16)
    on the left-hand side of the screen shot.


    ![A978-1-4302-5786-8_16_Fig16_HTML.jpg](A978-1-4302-5786-8_16_Fig16_HTML.jpg)


    Figure 16-16. Right-clicking the `/src` folder and selecting the **New ➤ Class**
    menu sequence to create your new class


    This will bring up a New Java Class dialog, shown in Figure [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17),
    and will auto-populate the Source folder field since you right-clicked the `GraphicsDesign/src/`
    folder earlier in order to invoke this dialog.


    Click the **Browse** button on the right of the Package field and select your
    `pro.android.graphics` Java Package from the bottom of the provided list.


    In the `Name` field, type the `Drawable` subclass name of `ImageRoundingDrawable`
    and leave the `public` modifier set (checked) as shown below the `Name` field.


    Next, click the **Browse** button on the right side of the Superclass field. This
    will open up the Superclass Selection dialog, shown on the right-hand side of
    Figure [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17), where you can search
    for the `Drawable` superclass.


    At the top of the Superclass Selection dialog you will see a **Choose a type**
    field, which acts as a search function to narrow down your search through the
    hundreds of classes that are a part of the Android OS.


    Type the letter “d,” as shown in Figure [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17),
    and then find the `Drawable` class reference, which will specify its `android.graphics.drawable`
    package origin. When you click the `Drawable` class reference, the package origin
    information will appear to the right of the class, confirming that this is the
    primary `Drawable` superclass that you wish to subclass. This is similar to the
    way package origins are detailed in Eclipse pop-up helper dialogs.


    ![A978-1-4302-5786-8_16_Fig17_HTML.jpg](A978-1-4302-5786-8_16_Fig17_HTML.jpg)


    Figure 16-17. Naming the class `ImageRoundingDrawable` and selecting the `android.graphics.drawable.Drawable`
    superclass


    After you have located and selected the `Drawable` superclass, as shown in Figure
    [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17) on the right, click the **OK**
    button, which will return you to your New Java Class dialog where you can finally
    click the **Finish** button to create the `public class ImageRoundingDrawable
    extends Drawable` bootstrap, as well as the four methods within it that Android
    wishes to see implemented, or at least in place, for your `Drawable` subclass.


    As you can see in the empty bootstrap `Drawable` subclass framework shown in Figure
    [16-18](#A978-1-4302-5786-8_16_Chapter.html#Fig18), Eclipse has written almost
    two dozen lines of Java code for you, providing an initial framework for you to
    build the `Drawable` subclass on top of, which you will be doing next.


    Besides the `package` statement, there are three `import` statements provided,
    which support the class (`extends`) and method (parameter objects) usage in your
    `Drawable` subclass. These include the `Canvas`, `ColorFilter`, and `Drawable`
    classes, all of which we have covered in detail at some point during this book.
    Next, you see the `ImageRoundingDrawable` class declaration, and inside that are
    four `@Override` methods that, if implemented, will override the same methods
    that live in the `Drawable` superclass.


    Two of these, the `.draw()` and `.getOpacity()` methods, you will be upgrading
    to implement your own Java code to control the opacity of your `Drawable` and
    to specify exactly how it will be drawn to the `Canvas`.


    The other two methods, `.setAlpha()` and `.setColorFilter()`, will not be implemented
    for this exercise because your `ImageRoundingDrawable` won’t use them.


    ![A978-1-4302-5786-8_16_Fig18_HTML.jpg](A978-1-4302-5786-8_16_Fig18_HTML.jpg)


    Figure 16-18. Examining the `ImageRoundingDrawable` Drawable subclass bootstrap
    code and its four methods


    Next, you will start to add in object declarations and build the constructor class
    for your custom `Drawable` subclass. You’ll start with declaring a `Paint` object,
    which you will later utilize to paint `Bitmaps` on your `Canvas` object.


    ## Creating a Paint Object to Use to Paint the Drawable Canvas


    The first thing you’ll add, on the first line of your `ImageRoundingDrawable`
    class definition, is a `Paint` object variable declaration. This is done by using
    the following simple Java code statement:


    `private Paint paintObject;`


    You will use `private` access control so that only your `ImageRoundingDrawable`
    class can access and utilize this soon-to-be-customized `Paint` object.


    As you can see in Figure [16-19](#A978-1-4302-5786-8_16_Chapter.html#Fig19), you
    will need to mouse-over and select the option to import the `Paint` class, which
    is a part of the `android.graphics` package. Once this has been done, you will
    be able to start to implement your `ImageRoundingDrawable()` constructor method,
    which will utilize this `Paint` object, in conjunction with the `Canvas` and `Bitmap`
    classes, as you saw in [Chapter 11](#A978-1-4302-5786-8_11_Chapter.html) when
    you worked with PorterDuff image blending modes.


    ![A978-1-4302-5786-8_16_Fig19_HTML.jpg](A978-1-4302-5786-8_16_Fig19_HTML.jpg)


    Figure 16-19. Declaring a private `Paint` object named `paintObject` for use in
    `ImageRoundingDrawable()` constructor


    Next, let’s declare your constructor method, as shown in Figure [16-20](#A978-1-4302-5786-8_16_Chapter.html#Fig20),
    using the same exact name as your `ImageRoundingDrawable` class name, and using
    the `public` access control modifier designation, so that it can be accessed by
    the other classes in your `GraphicsDesign` project and package. You will use a
    `sourceImage` `Bitmap` object as the parameter that is passed into the method,
    which allows you to specify the image that you want to be rounded. The code to
    create this empty constructor method is as follows:


    `public ImageRoundingDrawable(Bitmap sourceImage) { constructor code goes in here
    }`


    ![A978-1-4302-5786-8_16_Fig20_HTML.jpg](A978-1-4302-5786-8_16_Fig20_HTML.jpg)


    Figure 16-20. Creating a public `ImageRoundingDrawable` constructor method with
    `sourceImage` `Bitmap` object parameter


    As you can see in Figure [16-20](#A978-1-4302-5786-8_16_Chapter.html#Fig20), you
    will need to mouse-over your `Bitmap` class reference and select the **Import
    Bitmap (`android.graphics`)** option. Notice the `Paint` import statement at the
    top of your class, which is a result of doing this same exact work process in
    the previous step.'
