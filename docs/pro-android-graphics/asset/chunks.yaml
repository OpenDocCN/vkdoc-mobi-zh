- fmt: '# Creating an AnimationSet for Your PAG Logo Animation


    Let’s get back into Eclipse ADT and into your `MainActivity.java` editing tab
    and add in an `AnimationSet` object instantiation at the top of your Activity
    subclass, as shown in Figure [15-11](#A978-1-4302-5786-8_15_Chapter.html#Fig11),
    using the following line of Java code:


    ```

    AnimationSet pagAnimationSet = new AnimationSet(true);

    ```


    As you can see, you will need to mouse-over the `AnimationSet()` constructor and
    select the option to `Import AnimationSet (android.view.animation)`, and have
    the Import statement put into place for you at the top of your class.


    ![A978-1-4302-5786-8_15_Fig11_HTML.jpg](A978-1-4302-5786-8_15_Fig11_HTML.jpg)


    **Figure 15-11.** Creating your new `AnimationSet` object named `pagAnimationSet`
    at the top of the `MainActivity` class


    You are going to name your `AnimationSet` object `pagAnimationSet` and set it
    to `true`, which specifies in this constructor method’s parameter list that the
    `shareInterpolator` flag for the `AnimationSet` object should be set to `true`.
    This `shareInterpolator` parameter is used to specify whether or not you wish
    your child `Animation` objects for its parent `AnimationSet` object to share `Interpolator`
    constants that you set for the `AnimationSet` object.


    In your case, you do desire this since you want your scale, blend, and rotate
    procedural animations to act in the exact same fashion. So, you pass a `true`
    value in your constructor parameter list (item), since all the `Animation` child
    objects in this parent `AnimationSet` object should “share” the same `Interpolator`
    constant that you associate with this `AnimationSet`. If you’ve used a `.setInterpolator()`
    method within your `Animation` objects, pass a `false` value instead so each `Animation`
    uses its own `Interpolator`.


    Your next step is going to be adding your `ScaleAnimation` and `AlphaAnimation`
    child objects to your new parent `AnimationSet` object using the, you guessed
    it, `.addAnimation()` method call. Add two Java code statements to your Java method
    that call this method off of the `pagAnimationSet` object and pass in object names
    for each of your `Animation` objects, using the following code:


    ```

    pagAnimationSet.addAnimation(scaleZeroToFullAnimation);

    pagAnimationSet.addAnimation(alphaZeroToFullAnimation);

    ```


    As you can see in Figure [15-12](#A978-1-4302-5786-8_15_Chapter.html#Fig12), the
    Java code is error-free and you can now expand the code for the `pag.setOnClickListener()`
    code block using the `+` in the left margin to open this event handling method
    code back up for usage.


    ![A978-1-4302-5786-8_15_Fig12_HTML.jpg](A978-1-4302-5786-8_15_Fig12_HTML.jpg)


    **Figure 15-12.** Using `.addAnimation()` method to add `ScaleAnimation` and `AlphaAnimation`
    objects to `AnimationSet`


    Let’s remove the second `.startAnimation()` method call and change the first one
    to reference your new parent `pagAnimationSet` object instead. This will allow
    you to “wire up” your two `ScaleAnimation` and `AlphaAnimation` objects into one
    `AnimationSet` object construct that can then be called using a single `.startAnimation()`
    method call, as shown in Figure [15-13](#A978-1-4302-5786-8_15_Chapter.html#Fig13).


    ![A978-1-4302-5786-8_15_Fig13_HTML.jpg](A978-1-4302-5786-8_15_Fig13_HTML.jpg)


    **Figure 15-13.** Changing the `.startAnimation()` method called off the `pag`
    `ImageView` object to reference `pagAnimationSet`


    Now you are again ready to test your application using the `Run As ➤ Android Application`
    work process to launch the Nexus One emulator; let’s see what happens! This application,
    as coded currently, crashes the emulator! Eclipse is not finding any syntax errors
    in the code, but let’s see if we can ascertain what might be going on by looking
    closely at the Animation processing pipeline.


    The only possible issue I can see is that you’re adding your child `Animation`
    objects to your parent `AnimationSet` object **before** they have been initialized
    using the `new` keyword and their constructor methods. So let’s first try to cut
    and paste the two lines of code that call the `.addAnimation()` method off of
    your `pagAnimationSet` `AnimationSet` object, and relocate them right underneath
    (after) your four lines of Java code which instantiate and configure your `ScaleAnimation`
    and `AlphaAnimation` objects. If this turns out to be the problem, then this reinforces
    the factor of `code order` being as important as having correct Java code statements
    in the first place. In order to produce a correct object and event processing
    pipeline, you must have both the correct Java code and the correct Java code processing
    order.


    As you can see in Figure [15-14](#A978-1-4302-5786-8_15_Chapter.html#Fig14), Eclipse
    is still deeming your Java code to be error-free, so let’s again test your Java
    code in the Nexus One emulator and try to get your `GraphicsDesign` application
    working again! Use the `Run As ➤ Android Application` work process to launch the
    Nexus One emulator, and click the PAG logo once it appears to set it into motion.
    This application, as coded currently, now works, and your scale and blend animations
    implemented via an `AnimationSet` object work quite well together!


    ![A978-1-4302-5786-8_15_Fig14_HTML.jpg](A978-1-4302-5786-8_15_Fig14_HTML.jpg)


    **Figure 15-14.** Moving the `.addAnimation()` method calls after `AlphaAnimation`
    and `ScaleAnimation` instantiations


    Now that you have implemented the basic scaling and blending animations, it is
    time to add in your other options, which will allow you to control the `type of
    motion` and the `initial timing` for the `AnimationSet` that you have now successfully
    created (and debugged). You will begin with the method call that allows you to
    fine-tune the `start timing` of your `Animation` object, or `AnimationSet` object,
    depending on what object you call it from by using dot notation.


    This method call is called the `.setStartOffset()` method call, and it takes an
    `integer milliseconds` value. Since we really don’t require a `StartOffset` for
    the `AnimationSet` object, I’ll include it here by using an insignificant quarter-second
    (or 250 milliseconds) parameter value, just to show you how to implement this
    in your Java code. Let’s attach a `.setStartOffset(250)` method call off of your
    `pagAnimationSet` object by using the following basic Java programming statement:


    ```

    pagAnimationSet.setStartOffset(250);

    ```


    As you can see in Figure [15-15](#A978-1-4302-5786-8_15_Chapter.html#Fig15), the
    code is error-free, and you are ready to add other `AnimationSet` parameters to
    this `AnimationSet` object, such as the `Acceleration` Motion Interpolator constant,
    which you are going to add next. If you like, you can use the `Run As ➤ Android
    Application` work process to make sure the code runs at this juncture and does
    not crash the Nexus One emulator. However, it is doubtful that you will be able
    to visualize this quarter-second `startOffset` delay as scale and blend settings
    are initially set at zero, so a `startOffset` value would only be useful for fine-tuning.


    ![A978-1-4302-5786-8_15_Fig15_HTML.jpg](A978-1-4302-5786-8_15_Fig15_HTML.jpg)


    **Figure 15-15.** Adding an animation `StartOffset` to the `pagAnimationSet` object,
    using the `.setStartOffset()` method


    Now it’s time to add an `ACCELERATE` Interpolator constant, which in Java is done
    via the `AccelerateInterpolator` class and its `AccelerateInterpolator()` constructor
    method call. You will call the `AccelerateInterpolator` object, and construct
    it using the same line of code, by first calling the `.setInterpolator()` method
    off of your `pagAnimationSet` `AnimationSet` object and then utilizing the `new`
    keyword inside of this method call with your `AccelerateInterpolator()` constructor
    method call, which will all be accomplished using the following Java code:


    ```

    pagAnimationSet.setInterpolator( new AccelerateInterpolator() );

    ```'
