    In this eighteenth chapter, you learned how to use your `MediaPlayer`, which is
    inherently contained inside your `VideoView` UI object. You took a close look
    at the `MediaPlayer`, `Uri`, and `VideoView` classes in Android, and saw what
    each of them do, and how they all work together to allow us to locate, load into
    memory, access, play, and loop a digital video asset.


    You learned how to grab a `MediaPlayer` object reference by using the `OnPreparedListener`
    nested class, accessed using the `MediaPlayer` nested class `MediaPlayer.OnPreparedListener`,
    which exposes the `MediaPlayer` object.


    We took a far more detailed look at both the `MediaPlayer` and the `VideoView`
    classes in this chapter than we did way back in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html),
    when you were just a simple graphics neophyte, before re-introducing your video
    asset into your splash screen code so that you could use it as your animated backplate.


    You composited your video asset with the PAG logo animation treatment, which you
    created eons ago in [Chapters 3](#A978-1-4302-5786-8_3_Chapter.html) and [4](#A978-1-4302-5786-8_4_Chapter.html).
