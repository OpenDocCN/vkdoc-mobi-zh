- fmt: '# The Android Canvas Class: The Digital Artisan’s Canvas


    Android’s `Canvas` class is a direct subclass of the `java.lang.Object` class.
    As you now know, this indicates that the `Canvas` class was designed specifically
    for the purpose of providing `canvas` objects used in graphics applications in
    the Android OS (named after the canvas that artists paint upon using brush strokes,
    or in the case of Android application development, graphics operations).


    The Android Canvas class hierarchy is therefore structured as follows:


    `java.lang.Object`


    `> android.graphics.Canvas`


    Android’s `Canvas` class belongs to the `android.graphics` package. Therefore,
    an `import` statement for using the `Canvas` class in your app references the
    `android.graphics.Canvas` package, as you’ve already seen in this book.


    This `Canvas` class is a `public` class and has two nested subclasses that handle
    special advanced canvas characteristics. These are `Canvas.EdgeType`, which allows
    a special type of edge to be specified for the `Canvas` object, and `Canvas.VertexMode`,
    which allows a `Canvas` to use Vertex Mode. `Vertices` are commonly utilized in
    `3D` operations using `OpenGL ES 3.0`.


    The `Canvas` class holds all of the Android OS `.draw()` related method calls.
    In order to draw graphics onto a `Canvas` object, you will need to implement at
    least four essential components for the draw operation. These include a `Bitmap`
    object used to contain your image’s pixels; the `Canvas` object that will implement
    your `.draw()` method calls to modify the `Bitmap` object as you direct it to
    for your graphics design objective; an object to be used as a drawing primitive,
    for instance the `RectF` object or `Bitmap` object (as you have utilized in the
    book already) or a `Path` object or `Text` object; and finally, a `Paint` object
    to specify colors, images, and styles for the draw operation you are implementing.


    Some of the more mainstream `.draw()` related method calls include the `.drawCircle()`
    method, which you will be using to allow your user to draw on their screen using
    a brush stroke thickness of five pixels (initially), as well as the `.drawRoundRect()`
    method, which you used in Chapter 16, and the `.drawBitmap()` method, which you
    used back in Chapter 11, as well as useful methods such as `.drawPoints()`, `.drawColor()`,
    `.drawLines()`, `.drawPath()`, `.drawTextOnPath()`, `.drawPaint()`, `.drawText()`,
    `.drawVertices()`, `.drawArc()`, `.drawRGB()`, and many others.


    There are more than two dozen `.draw()` related method calls in this `Canvas`
    class, which you can implement within your `.onDraw()` method instance, for instance,
    in your `SketchPadView` `View` subclass, later on in the chapter, if you wish
    to experiment with them. This is a great way to see what they do! Experimentation
    will allow you to observe what each method call does and how it is implemented.
    In this way, you can learn more about graphics in Android and gain experience
    with your Java coding at the very same time.


    ## The Android Paint Class: The Digital Artisan’s Paintbrush


    The Android `Paint` class is a direct subclass of the `java.lang.Object` class,
    just like the `Canvas` class is. This means the `Paint` class was specifically
    designed for use with Android OS for the purpose of defining `paint` objects for
    use in your `Canvas` objects for your Pro Android graphics applications.


    The Android Paint class hierarchy is structured as follows:


    `java.lang.Object`


    `> android.graphics.Paint`


    Android’s `Paint` class belongs to the `android.graphics` package. Therefore,
    an `import` statement for using the `Paint` class in your app references the `android.graphics.Paint`
    package, as you have already seen in this book.


    The `Paint` class is a `public` class that holds `style` and `color` information
    that describes to the `Canvas` object how to draw geometry, text, or bitmaps.


    The `Paint` class features six nested subclasses. The nested subclasses are utilized
    when developers need to specify (further) special `Paint` object characteristics
    for their primary `Paint` object configuration definitions.


    `Paint.Align` is an `Enum` class, and as such it uses constants to specify how
    the `.drawText()` method call will align a `Text` object relative to X and Y coordinates
    within your `Canvas` (and ultimately your `View`) objects that you are drawing
    on. The default setting for `Paint.Align` is the `LEFT` constant, and the other
    two constants are `RIGHT` or `CENTER`.


    The `Paint.Cap` nested class is also an `Enum` class type and the `Cap` constant
    allows developers to specify the visual treatment (look) for the beginning and
    the ending of your lines (strokes) and paths (2D curves). Your default is the
    `BUTT` constant, and the other two constants are `ROUND` and `SQUARE`. In case
    you are wondering what `BUTT` means, it butts up against the connecting line or
    curve, providing as close to a seamless connection as you’re going to get. “Hanging
    starts and ends” use the `ROUND` and `SQUARE` constants.


    The `Paint.FontMetrics` class describes assorted “font metrics,” for all you fontographers
    out there. These are used to describe font attributes. There is no default, and
    the five constants are `ascent`, `bottom`, `descent`, `leading`, and `top`. According
    to the developer documentation, these constants are not capitalized, although
    they probably can all be used that way, if you wish.


    The closely related `Paint.FontMetricsInt` class provides the “convenience” method
    to `Paint.FontMetrics` for those elite method calls needing to have their `FontMetrics`
    data values provided via the in-vogue `Integer` data type.


    The `Paint.Join` is an `Enum` class that allows developers to specify exactly
    how their line segments and curve segments will join when stroked along a path.
    The default constant is `MITER`, which joins outer edges of a curve or a line
    (or both) using a sharp angle where they meet or intersect. A `BEVEL` constant
    will provide a straight line intersection at the outer edges of a join, whereas
    a `ROUND` constant will use a circular arc to join your edges.


    The `Paint.Style` is an `Enum` class that allows developers to specify if the
    `Shape` primitive being drawn to a `Canvas` is to be filled, stroked, or both
    by using predefined constants `FILL`, `STROKE`, or `FILL_AND_STROKE`. The default
    `Paint.Style` constant setting is `FILL`.


    The `Paint` class also defines eleven constants that allow you to configure the
    `Paint` object itself. These are all in the form of switches or flags, which you
    can turn on (`true`) or off (`false`) depending on how much graphics processing
    power (overhead) you wish your application’s graphics rendering pipeline to consume!
    Most of these are related to font support or quality.


    These features are turned on (they are off by default) by utilizing the constants
    to enable, by using a `true` Boolean value, or disable, by using a `false` Boolean
    value, each of these following graphics processing features.'
  raw: '## The Android Canvas Class: The Digital Artisan’s Canvas


    Android’s `Canvas` class is a direct subclass of the `java.lang.Object` class.
    As you now know, this indicates that the Canvas class was designed specifically
    for the purpose of providing `canvas` objects used in graphics applications in
    the Android OS (named after the canvas that artists paint upon using brush strokes,
    or in the case of Android application development, graphics operations).


    The Android Canvas class hierarchy is therefore structured as follows:


    `java.lang.Object`


      `> android.graphics.Canvas`


    Android’s Canvas class belongs to the `android.graphics` package. Therefore, an
    `import statement` for using the Canvas class in your app references the `android.graphics.Canvas`
    package, as you’ve already seen in this book.


    This Canvas class is a `public` class and has two nested subclasses that handle
    special advanced canvas characteristics. These are `Canvas.EdgeType`, which allows
    a special type of edge to be specified for the Canvas object, and `Canvas.VertexMode`,
    which allows a Canvas to use Vertex Mode. `Vertices` are commonly utilized in
    `3D` operations using `OpenGL ES 3.0`.


    The Canvas class holds all of the Android OS `.draw( )` related method calls.
    In order to draw graphics onto a Canvas object, you will need to implement at
    least `four` essential components for the draw operation. These include a `Bitmap`
    object used to contain your image’s pixels; the `Canvas` object that will implement
    your `.draw( )` method calls to modify the Bitmap object as you direct it to for
    your graphics design objective; an object to be used as a `drawing primitive`,
    for instance the `RectF` object or `Bitmap` object (as you have utilized in the
    book already) or a `Path` object or `Text` object; and finally, a `Paint` object
    to specify colors, images, and styles for the draw operation you are implementing.


    Some of the more mainstream .draw( ) related method calls include the `.drawCircle(
    )` method, which you will be using to allow your user to draw on their screen
    using a `brush stroke thickness` of `five pixels` (initially), as well as the
    `.drawRoundRect( )` method, which you used in [Chapter 16](#A978-1-4302-5786-8_16_Chapter.html),
    and the `.drawBitmap( )` method, which you used back in [Chapter 11](#A978-1-4302-5786-8_11_Chapter.html),
    as well as useful methods such as `.drawPoints( )`, `.drawColor( )`, `.drawLines(
    )`, `.drawPath( )`, `.drawTextOnPath( )`, `.drawPaint( )`, `.drawText( )`, `.drawVertices(
    )`, `.drawArc( )`, `.drawRGB( )`, and many others.


    There are more than two dozen .draw( ) related method calls in this Canvas class,
    which you can implement within your .onDraw( ) method instance, for instance,
    in your SketchPadView View subclass, later on in the chapter, if you wish to experiment
    with them. This is a great way to see what they do!


    Experimentation will allow you to observe what each method call does and how it
    is implemented. In this way, you can learn more about graphics in Android and
    gain experience with your Java coding at the very same time.


    ## The Android Paint Class: The Digital Artisan’s Paintbrush


    The Android `Paint` class is a direct subclass of the `java.lang.Object` class,
    just like the Canvas class is. This means the Paint class was specifically designed
    for use with Android OS for the purpose of defining `paint` objects for use in
    your Canvas objects for your Pro Android graphics applications.


    The Android Paint class hierarchy is structured as follows:


    `java.lang.Object`


    `> android.graphics.Paint`


    Android’s Paint class belongs to the `android.graphics` package. Therefore, an
    `import statement` for using the Paint class in your app references the `android.graphics.Paint`
    package, as you have already seen in this book.


    The Paint class is a `public` class that holds `style` and `color` information
    that describes to the Canvas object how to draw geometry, text, or bitmaps.


    The Paint class features `six nested subclasses`. The nested subclasses are utilized
    when developers need to specify (further) special Paint object characteristics
    for their primary Paint object configuration definitions.


    `Paint.Align` is an `Enum class`, and as such it uses constants to specify how
    the `.drawText( )` method call will align a Text object relative to X and Y coordinates
    within your Canvas (and ultimately your View) objects that you are drawing on.
    The default setting for Paint.Align is the `LEFT` constant, and the other two
    constants are `RIGHT` or `CENTER`.


    The `Paint.Cap` nested class is also an Enum class type and the `Cap constant`
    allows developers to specify the visual treatment (look) for the beginning and
    the ending of your lines (strokes) and paths (2D curves). Your default is the
    `BUTT` constant, and the other two constants are `ROUND` and `SQUARE`. In case
    you are wondering what BUTT means, it `butts up against` the connecting line or
    curve, providing as close to a `seamless connection` as you’re going to get. “Hanging
    starts and ends” use the ROUND and SQUARE constants.


    The `Paint.FontMetrics` class describes assorted “font metrics,” for all you fontographers
    out there. These are used to describe `font attributes`. There is `no default`,
    and the `five` constants are `ascent`, `bottom`, `descent`, `leading`, and `top`.
    According to the developer documentation, these constants are not capitalized,
    although they probably can all be used that way, if you wish.


    The closely related `Paint.FontMetricsInt` class provides the “convenience” method
    to `Paint.FontMetrics` for those elite method calls needing to have their FontMetrics
    data values provided via the in-vogue `Integer` data type.


    The `Paint.Join` is an Enum class that allows developers to specify exactly how
    their line segments and curve segments will `join` when stroked along a path.
    The default constant is `MITER`, which joins outer edges of a curve or a line
    (or both) using a `sharp angle` where they meet or intersect. A `BEVEL` constant
    will provide a `straight line` intersection at the outer edges of a join, whereas
    a `ROUND` constant will use a `circular arc` to join your edges.


    The `Paint.Style` is an Enum class that allows developers to specify if the `Shape`
    primitive being drawn to a Canvas is to be `filled`, `stroked`, or `both` by using
    predefined constants `FILL`, `STROKE`, or `FILL_AND_STROKE`. The default Paint.Style
    constant setting is FILL.


    The Paint class also defines `eleven constants` that allow you to configure the
    Paint object itself. These are all in the form of `switches` or `flags`, which
    you can turn `on` `(true)` or `off` `(false)` depending on how much graphics processing
    power (overhead) you wish your application’s graphics rendering pipeline to consume!
    Most of these are related to font support or quality.


    These features are turned on (they are `off by default` ) by utilizing the constants
    to `enable`, by using a `true` Boolean value, or `disable`, by using a `false`
    Boolean value, each of these following graphics processing features.'
  trans: '

    # Android Canvas 类：数字工匠的画布


    Android 的 `Canvas` 类是 `java.lang.Object` 类的直接子类。至此您已了解，这表明 `Canvas` 类被专门设计用于在
    Android 操作系统中提供图形应用所需的 `canvas` 对象（其名称源自艺术家用画笔挥毫作画的画布，在 Android 应用开发中则对应图形操作）。


    因此，Android Canvas 类的层级结构如下：


    `java.lang.Object`


    `> android.graphics.Canvas`


    Android 的 `Canvas` 类属于 `android.graphics` 包。因此，在您的应用中使用 `Canvas` 类时，需要引用 `android.graphics.Canvas`
    包的 `import` 语句，正如您在本节前面所学。


    该 `Canvas` 类是一个 `public` 类，并拥有两个处理特殊高级画布特性的嵌套子类。它们是 `Canvas.EdgeType`，允许为 `Canvas`
    对象指定一种特殊类型的边缘；以及 `Canvas.VertexMode`，允许 `Canvas` 使用顶点模式。`Vertices` 通常在使用 `OpenGL
    ES 3.0` 的 `3D` 操作中使用。


    `Canvas` 类包含了所有 Android 操作系统中的 `.draw()` 相关方法调用。要在 `Canvas` 对象上绘制图形，您至少需要为绘制操作实现四个基本组件。这些组件包括：一个用于包含图像像素的
    `Bitmap` 对象；一个将执行 `.draw()` 方法调用的 `Canvas` 对象，以便按照您的图形设计目标修改 `Bitmap` 对象；一个用作绘图基元的对象，例如
    `RectF` 对象或 `Bitmap` 对象（正如您在本节中已使用的），或者 `Path` 对象或 `Text` 对象；最后，一个用于指定颜色、图像和样式的
    `Paint` 对象，应用于您正在执行的绘制操作。


    一些主流的 `.draw()` 相关方法调用包括 `.drawCircle()` 方法（您将使用它让用户以 5 像素（初始）的笔触厚度在屏幕上绘制），以及您在第十六章中使用过的
    `.drawRoundRect()` 方法，您在第十一章中使用过的 `.drawBitmap()` 方法，以及其他有用的方法，例如 `.drawPoints()`、`.drawColor()`、`.drawLines()`、`.drawPath()`、`.drawTextOnPath()`、`.drawPaint()`、`.drawText()`、`.drawVertices()`、`.drawArc()`、`.drawRGB()`
    等等。


    在这个 `Canvas` 类中有二十多个 `.draw()` 相关的方法调用，您可以在您的 `.onDraw()` 方法实例中实现它们，例如，在您的 `SketchPadView`
    视图子类中，在本章的后面部分，如果您想试验它们的话。这是观察它们作用的绝佳方式！试验将使您能够观察到每个方法调用做了什么以及如何实现。通过这种方式，您可以学习更多关于
    Android 图形的内容，并同时获得 Java 编码的经验。


    ## Android Paint 类：数字工匠的画笔


    Android 的 `Paint` 类是 `java.lang.Object` 类的直接子类，就像 `Canvas` 类一样。这意味着 `Paint` 类是专门为在
    Android 操作系统中使用而设计的，目的是定义用于您 Pro Android 图形应用中 `Canvas` 对象的 `paint` 对象。


    Android Paint 类的层级结构如下：


    `java.lang.Object`


    `> android.graphics.Paint`


    Android 的 `Paint` 类属于 `android.graphics` 包。因此，在您的应用中使用 `Paint` 类时，需要引用 `android.graphics.Paint`
    包的 `import` 语句，正如您在本节前面所见。


    `Paint` 类是一个 `public` 类，它包含描述如何绘制几何图形、文本或位图的 `style` 和 `color` 信息，作用于 `Canvas`
    对象。


    `Paint` 类拥有六个嵌套子类。当开发者需要为主要 `Paint` 对象配置定义（进一步）指定特殊的 `Paint` 对象特征时，会使用这些嵌套子类。


    `Paint.Align` 是一个 `Enum` 类，因此它使用常量来指定 `.drawText()` 方法调用如何将 `Text` 对象相对于您正在绘制的
    `Canvas`（以及最终的 `View`）对象中的 X 和 Y 坐标进行对齐。`Paint.Align` 的默认设置为 `LEFT` 常量，另外两个常量是
    `RIGHT` 或 `CENTER`。


    `Paint.Cap` 嵌套类也是一个 `Enum` 类类型，`Cap` 常量允许开发者指定线条（描边）和路径（2D 曲线）起点和终点的视觉效果（外观）。默认值是
    `BUTT` 常量，另外两个常量是 `ROUND` 和 `SQUARE`。如果您想知道 `BUTT` 的含义，它表示与连接的线条或曲线平齐对接，提供尽可能无缝的连接。“悬空的首尾”则使用
    `ROUND` 和 `SQUARE` 常量。


    `Paint.FontMetrics` 类描述了各种“字体度量”，供各位字体设计师参考。这些度量用于描述字体属性。没有默认值，五个常量是 `ascent`、`bottom`、`descent`、`leading`
    和 `top`。根据开发者文档，这些常量不大写，不过如果您愿意，它们很可能都可以大写使用。


    与之密切相关的 `Paint.FontMetricsInt` 类为 `Paint.FontMetrics` 提供了一个“便捷”方法，用于那些需要通过流行的
    `Integer` 数据类型提供其 `FontMetrics` 数据值的精英方法调用。


    `Paint.Join` 是一个 `Enum` 类，允许开发者精确指定其线段和曲线段在沿路径描边时如何连接。默认常量是 `MITER`，它在曲线或直线（或两者）的相交处使用锐角连接它们的外边缘。`BEVEL`
    常量将在连接处的外边缘提供一条直线相交线，而 `ROUND` 常量将使用圆弧来连接边缘。


    `Paint.Style` 是一个 `Enum` 类，允许开发者指定绘制到 `Canvas` 上的 `Shape` 基元是填充、描边，还是两者兼具，通过使用预定义的常量
    `FILL`、`STROKE` 或 `FILL_AND_STROKE`。默认的 `Paint.Style` 常量设置为 `FILL`。


    `Paint` 类还定义了十一个常量，允许您配置 `Paint` 对象本身。它们都以开关或标志的形式存在，您可以根据希望应用的图形渲染管线消耗多少图形处理能力（开销）来将其打开（`true`）或关闭（`false`）！其中大部分与字体支持或质量相关。


    通过使用这些常量，以 `true` 布尔值启用，或以 `false` 布尔值禁用以下每个图形处理特性，即可开启这些功能（它们默认是关闭的）。

    '
- fmt: '`ANTI_ALIAS_FLAG`常量提供了一个标志，可用于启用`anti-aliasing`（抗锯齿）。该功能默认处于关闭（禁用）状态，因为它是一种会大量消耗系统资源（内存和处理器周期）的算法。


    `DEV_KERN_TEXT_FLAG`常量提供了一个标志，可用于启用字体的设备端`kerning`（字距调整）（针对`Text`对象）。字距调整是指给定字体定义中单个字符之间的间距。


    `DITHER_FLAG`常量提供了一个用于启用`dithering`（抖动）的标志。抖动默认也是关闭的，因为它同样需要消耗处理能力和内存资源来实现；它是一种算法，可以在设备运行于低于24位（`truecolor`，真彩色）显示色彩环境时（例如`indexed
    color`（索引色，8位）的256色空间，或`highcolor`（高彩色，15位或16位）色彩空间），提供模拟更多颜色的能力。


    `FAKE_BOLD_TEXT_FLAG`提供一个标志，允许开发者启用`fake-bold text algorithm`（伪粗体文本算法），该功能同样默认关闭，因为它会消耗系统资源——优秀的算法通常如此。当`Text`对象引用的字体在其当前安装于Android
    OS的字体定义文件中不包含粗体组件或粗体字体定义时，此算法可以为`Text`对象（字体）提供加粗效果。


    `FILTER_BITMAP_FLAG`允许开发者设置一个标志以启用`bitmap filtering`（位图过滤），该功能默认关闭。该常量允许开发者开启`bilinear
    interpolation`（双线性插值），也称为`bilinear filtering`（双线性过滤），其算法质量仅次于一流的`bicubic interpolation`（双三次插值，见于Photoshop）或`cubic
    interpolation`（三次插值，见于GIMP）。该功能默认关闭是因为它非常消耗处理器资源，但如果质量是您的目标，它会为您的应用程序提供更好的`scaling`（缩放）效果。我本应在SketchPad应用中包含此标志，但该应用并不缩放图像！


    `LINEAR_TEXT_FLAG`允许开发者设置一个标志来启用“`linear-text`”（线性文本）。此常量会设置一个标志，该标志将`disable
    system caching`（禁用系统缓存）`Text`对象（具体来说是它们的字体定义）。这允许字体绕过系统字体缓存，直接显示在您的屏幕上。


    `STRIKE_THRU_TEXT_FLAG`允许开发者设置标志，以启用名为“strike-thru text”（删除线文本）的功能。删除线会在`Text`对象包含的内容上绘制水平线。这是另一种“事后算法”，它以算法方式提供了缺失的字体特性定义增强，但可能会拖慢应用程序。


    `SUBPIXEL_TEXT_FLAG`允许开发者设置标志，以启用`subpixel-text`（次像素文本）的渲染，这本质上相当于`text anti-aliasing`（文本抗锯齿），能让文本在`low-DPI`（低DPI）硬件设备上看起来更清晰。该功能也默认关闭，因为它相当消耗处理器资源。如今市场上有众多高DPI显示屏，它们具有超精细的点距，因此通常无需使用此功能，尤其是在使用无衬线字体族时。


    `UNDERLINE_TEXT_FLAG`允许开发者设置标志，以启用`Text`对象的`underlined`（下划线）效果。这与`BOLD`和`STRIKE_THRU`常量类似，因为它为那些不包含下划线字体组件的字体提供了支持。再次强调，别问我为什么没有`ITALIC_TEXT_FLAG`，我的猜测是，用于斜体文本的算法可能太消耗资源，或者在不同字体上尚未完善。


    最后两个常量是`HINTING_OFF`和`HINTING_ON`，它们提供了`subpixel text hinting`（次像素文本微调）选项常量，供您在使用`.setHinting()`方法调用时使用。`Font
    hinting`（字体微调）是一项高级功能，通常与次像素文本渲染和抗锯齿结合使用。字体微调也称为`font instructing`（字体指令），旨在在较低屏幕分辨率下提供更高质量的视觉效果。在大多数具有高分辨率和同时拥有高密度（精细点距）的Android设备上，这个常量有些多余。别问我为什么这个微调标志采用了`_OFF`和`_ON`后缀，而其他常量没有，我无法回答您！


    现在，我们已经花了数页篇幅介绍`.onDraw()`以及`Paint`和`Canvas`类，是时候亲自上手进行一些Java编码了。既然您要为您的`GraphicsDesign`应用程序创建一个`SketchPad`工具，您首先需要修改几个应用程序的XML和Java文件，并创建几个新的Java类。


    您将需要在`MainActivity.java`主屏幕上添加一个新的`Menu Item`（菜单项）；创建一个新的`SketchPad` Activity子类和`SketchPadView`
    View子类；使用`<activity>`标签将新的`SketchPad` Activity类添加到您的`AndroidManifest.xml`文件中；在您的`strings.xml`中添加一个`String
    constant`（字符串常量）XML定义，并在您的`main.xml`菜单XML定义文件中添加一个`MenuItem` `<item>` 标签；在您的`onOptionsItemSelected()`方法中添加一个`case
    statement`（case语句）和一个新的`Intent`对象；最后从头编写您的`SketchPad`和`SketchPadView`类，或者至少从`New
    ➤ Class`对话框为您提供的引导代码开始编写。所以，在接下来的几十页中，您有大量的工作要做！'
  raw: 'The `ANTI_ALIAS_FLAG` constant provides the flag that can be used to enable
    `anti-aliasing`, which is off (disabled) as a default, as it is an algorithm that
    utilizes significant system resources (memory and processor cycles).


    The `DEV_KERN_TEXT_FLAG` constant provides a flag that can be used to enable device-side
    `kerning` for fonts (Text objects). Kerning is the spacing found between individual
    characters within a given font definition.


    The `DITHER_FLAG` constant provides a flag that is used to enable `dithering`.
    Dithering is also turned off as a default because it also involves processing
    and memory resources to implement; it is an algorithm that provides an ability
    to `simulate more colors` when a device is running in a less than 24-bit (`truecolor`
    ) display color environment, such as the `indexed color` (8-bit) 256 colorspace,
    or the `highcolor` (15-bit or 16-bit) colorspace.


    The `FAKE_BOLD_TEXT_FLAG` provides a flag that allows developers to enable the
    `fake-bold text algorithm`, which is also turned off as a default because it uses
    system resources, as the great algorithms usually do. This algorithm can provide
    Text object (font) bolding when the font that the Text object is referencing does
    not feature a bold component or font definition within its font definition files
    currently installed in the Android OS.


    The `FILTER_BITMAP_FLAG` will allow developers to set a flag enabling `bitmap
    filtering`, which is off by default. The constant allows developers to turn on
    `bilinear interpolation`, also known as `bilinear filtering`, which is only one
    algorithmic step down from the pristine `bicubic interpolation` found in Photoshop
    or the `cubic interpolation` found in GIMP. This is turned off as a default because
    it is processor intensive, but it will provide your application with better `scaling`
    results if quality is your objective. I would have included this flag in the SketchPad
    app, but the app doesn’t scale images!


    The `LINEAR_TEXT_FLAG` allows the developer to set the flag that will enable “`linear-text`.”
    This constant sets a flag that will `disable system caching` of Text objects,
    specifically their font definitions. This allows fonts to bypass the system font
    cache and display directly to your display screen.


    The `STRIKE_THRU_TEXT_FLAG` allows developers to set the flag that enables a feature
    called strike-thru text. A strike-through will put horizontal lines through the
    content contained within a Text object. This is another one of those “afterthought
    algorithms” that provides missing font feature definition enhancements algorithmically,
    but can slow an app down.


    The `SUBPIXEL_TEXT_FLAG` allows developers to set the flag that enables the rendering
    of `subpixel-text`, which essentially amounts to `text anti-aliasing` and makes
    text look crisper on `low-DPI` hardware devices. It is also off by default because
    it’s quite processor intensive. With all the high DPI displays in the market these
    days, with their super-fine dot pitches, it is usually unnecessary to use this
    feature, especially with sans-serif font families.


    The `UNDERLINE_TEXT_FLAG` allows developers to set the flag that enables a Text
    object to be `underlined`. This is similar to the BOLD and STRIKE_THRU constants,
    as it provides support for fonts that don’t feature underline font components.
    Again, don’t ask me why there is no ITALIC_TEXT_FLAG, but my speculation is that
    an algorithm for italicized text would be too resource intensive, or possibly
    not yet perfected across different fonts.


    The last two constants are the `HINTING_OFF` and `HINTING_ON` constants, which
    provide `subpixel text hinting` option constants for use when you are using the
    `.setHinting( )` method call. `Font hinting` is an advanced feature that is usually
    used in conjunction with subpixel text rendering and anti-aliasing. Font hinting
    is also called `font instructing` and is designed to provide a higher quality
    visual result at lower screen resolutions. This constant is somewhat unnecessary
    on most Android devices, which have high resolution and high density (a fine dot
    pitch) at the same time. Don’t ask me why this hinting flag was set up using _OFF
    and _ON extensions, whereas the others were not, as I don’t have the answer to
    that one for you!


    Now that we have spent a few pages covering .onDraw( ) as well as the Paint and
    Canvas classes, it is time to get your hands dirty with some Java coding. Since
    you are going to create a SketchPad utility for your GraphicsDesign application,
    you’ll need to first modify several of your application XML and Java files and
    create a couple of new Java classes.


    You will need to add a new `Menu Item` on your `MainActivity.java` home screen;
    create a new `SketchPad` Activity subclass and `SketchPadView` View subclass;
    add the new SketchPad Activity class to your `AndroidManifest.xml` file using
    an `< activity >` tag; add a `String constant` XML definition to your `strings.xml`
    and a MenuItem `< item >` tag to your `main.xml` Menu XML definition file; add
    a `case statement` and new `Intent` object to your onOptionsItemSelected( ) method;
    and finally code your SketchPad and SketchPadView classes from scratch, or at
    least from the bootstrap code that the `New ➤ Class` dialog provides for you.
    So, you have a ton of work to do over these next couple dozen pages!'
  trans: '

    `ANTI_ALIAS_FLAG`常量提供了一个标志，可用于启用`anti-aliasing`（抗锯齿）。该功能默认处于关闭（禁用）状态，因为它是一种会大量消耗系统资源（内存和处理器周期）的算法。


    `DEV_KERN_TEXT_FLAG`常量提供了一个标志，可用于启用字体的设备端`kerning`（字距调整）（针对`Text`对象）。字距调整是指给定字体定义中单个字符之间的间距。


    `DITHER_FLAG`常量提供了一个用于启用`dithering`（抖动）的标志。抖动默认也是关闭的，因为它同样需要消耗处理能力和内存资源来实现；它是一种算法，可以在设备运行于低于
    24 位（`truecolor`，真彩色）显示色彩环境时（例如`indexed color`（索引色，8 位）的 256 色空间，或`highcolor`（高彩色，15
    位或 16 位）色彩空间），提供模拟更多颜色的能力。


    `FAKE_BOLD_TEXT_FLAG`提供一个标志，允许开发者启用`fake-bold text algorithm`（伪粗体文本算法），该功能同样默认关闭，因为它会消耗系统资源——优秀的算法通常如此。当`Text`对象引用的字体在其当前安装于
    Android OS 的字体定义文件中不包含粗体组件或粗体字体定义时，此算法可以为`Text`对象（字体）提供加粗效果。


    `FILTER_BITMAP_FLAG`允许开发者设置一个标志以启用`bitmap filtering`（位图过滤），该功能默认关闭。该常量允许开发者开启`bilinear
    interpolation`（双线性插值），也称为`bilinear filtering`（双线性过滤），其算法质量仅次于一流的`bicubic interpolation`（双三次插值，见于
    Photoshop）或`cubic interpolation`（三次插值，见于 GIMP）。该功能默认关闭是因为它非常消耗处理器资源，但如果质量是您的目标，它会为您的应用程序提供更好的`scaling`（缩放）效果。我本应在
    SketchPad 应用中包含此标志，但该应用并不缩放图像！


    `LINEAR_TEXT_FLAG`允许开发者设置一个标志来启用“`linear-text`”（线性文本）。此常量会设置一个标志，该标志将`disable
    system caching`（禁用系统缓存）`Text`对象（具体来说是它们的字体定义）。这允许字体绕过系统字体缓存，直接显示在您的屏幕上。


    `STRIKE_THRU_TEXT_FLAG`允许开发者设置标志，以启用名为“strike-thru text”（删除线文本）的功能。删除线会在`Text`对象包含的内容上绘制水平线。这是另一种“事后算法”，它以算法方式提供了缺失的字体特性定义增强，但可能会拖慢应用程序。


    `SUBPIXEL_TEXT_FLAG`允许开发者设置标志，以启用`subpixel-text`（次像素文本）的渲染，这本质上相当于`text anti-aliasing`（文本抗锯齿），能让文本在`low-DPI`（低
    DPI）硬件设备上看起来更清晰。该功能也默认关闭，因为它相当消耗处理器资源。如今市场上有众多高 DPI 显示屏，它们具有超精细的点距，因此通常无需使用此功能，尤其是在使用无衬线字体族时。


    `UNDERLINE_TEXT_FLAG`允许开发者设置标志，以启用`Text`对象的`underlined`（下划线）效果。这与`BOLD`和`STRIKE_THRU`常量类似，因为它为那些不包含下划线字体组件的字体提供了支持。再次强调，别问我为什么没有`ITALIC_TEXT_FLAG`，我的猜测是，用于斜体文本的算法可能太消耗资源，或者在不同字体上尚未完善。


    最后两个常量是`HINTING_OFF`和`HINTING_ON`，它们提供了次像素文本微调（`subpixel text hinting`）选项常量，供您在使用`.setHinting()`方法调用时使用。字体微调（`Font
    hinting`）是一项高级功能，通常与次像素文本渲染和抗锯齿结合使用。字体微调也称为字体指令（`font instructing`），旨在在较低屏幕分辨率下提供更高质量的视觉效果。在大多数具有高分辨率和同时拥有高密度（精细点距）的
    Android 设备上，这个常量有些多余。别问我为什么这个微调标志采用了`_OFF`和`_ON`后缀，而其他常量没有，我无法回答您！


    现在，我们已经花了数页篇幅介绍`.onDraw()`以及`Paint`和`Canvas`类，是时候亲自上手进行一些 Java 编码了。既然您要为您的`GraphicsDesign`应用程序创建一个`SketchPad`工具，您首先需要修改几个应用程序的
    XML 和 Java 文件，并创建几个新的 Java 类。


    您将需要在`MainActivity.java`主屏幕上添加一个新的菜单项（`Menu Item`）；创建一个新的`SketchPad` Activity
    子类和`SketchPadView` View 子类；使用`<activity>`标签将新的`SketchPad` Activity 类添加到您的`AndroidManifest.xml`文件中；在您的`strings.xml`中添加一个字符串常量（`String
    constant`）XML 定义，并在您的`main.xml`菜单 XML 定义文件中添加一个`MenuItem` `<item>` 标签；在您的`onOptionsItemSelected()`方法中添加一个
    case 语句（`case statement`）和一个新的`Intent`对象；最后从头编写您的`SketchPad`和`SketchPadView`类，或者至少从`New
    ➤ Class`对话框为您提供的引导代码开始编写。所以，在接下来的几十页中，您有大量的工作要做！

    '
- fmt: "## Setting Up Your GraphicsDesign Project for Your SketchPad\n\nThe first\
    \ addition you’re going to make to your `GraphicsDesign` application’s `MainActivity.java`\
    \ Activity subclass is to add a `MenuItem` object called `The PAG SketchPad`.\
    \ Open your project’s `/res/menu` folder and right-click the `main.xml` file,\
    \ and select the `Open` menu option or left-click it and press the `F3` key. Copy\
    \ and paste the second `bookmark_utility` `<item>` tag and edit it to create a\
    \ third `MenuItem` object definition with an `ID` of `sketchPad`.\n\nYour XML\
    \ markup, shown in Figure [17-1](#A978-1-4302-5786-8_17_Chapter.html#Fig1), should\
    \ look like the following:\n\n```\n<item android:id = \"@ + id/sketchPad\"\n \
    \     android:orderInCategory = \"300\"\n      android:showAsAction = \"never\"\
    \n      android:title = \"@string/sketchPad_utility\" />\n```\n\n![A978-1-4302-5786-8_17_Fig1_HTML.jpg](A978-1-4302-5786-8_17_Fig1_HTML.jpg)\n\
    \n**Figure 17-1.** Adding the PAG SketchPad Utility to the application menu using\
    \ the `/res/menu` folder’s `main.xml` file\n\nSince you referenced this `String`\
    \ constant named `sketchPad_utility`, your next step will be to get into your\
    \ `strings.xml` file, which is in your `/res/values` folder, and add that `<string>`\
    \ tag to define this constant for use inside your menu title, or label, as I like\
    \ to call it. Let’s code this next.\n\nAs you can see in Figure [17-2](#A978-1-4302-5786-8_17_Chapter.html#Fig2),\
    \ I added the `<string>` tag to the `strings.xml` file, naming it `sketchPad_utility`\
    \ with a text value of `The PAG SketchPad`.\n\n![A978-1-4302-5786-8_17_Fig2_HTML.jpg](A978-1-4302-5786-8_17_Fig2_HTML.jpg)\n\
    \n**Figure 17-2.** Adding a `<string>` constant for `The PAG SketchPad` menu item\
    \ to the `/res/values` folder’s `strings.xml` file\n\nRight-click the `/src` folder,\
    \ and use a `New ➤ Class` menu sequence to create the framework for a `SketchPad\
    \ Activity` subclass, as shown in Figure [17-3](#A978-1-4302-5786-8_17_Chapter.html#Fig3).\n\
    \n![A978-1-4302-5786-8_17_Fig3_HTML.jpg](A978-1-4302-5786-8_17_Fig3_HTML.jpg)\n\
    \n**Figure 17-3.** Right-clicking the `/src` folder and creating a `New ➤ Class`\
    \ for a custom Activity subclass `SketchPad.java`\n\nName the class `SketchPad`\
    \ and select an `android.app.Activity` superclass, as shown in Figure [17-4](#A978-1-4302-5786-8_17_Chapter.html#Fig4).\
    \ Be sure to specify the `pro.android.graphics` package.\n\n![A978-1-4302-5786-8_17_Fig4_HTML.jpg](A978-1-4302-5786-8_17_Fig4_HTML.jpg)\n\
    \n**Figure 17-4.** Naming this new Java class `SketchPad`, and defining its superclass\
    \ selection as `android.app.Activity`\n\nNext, you need to add an `onCreate()`\
    \ method to your `SketchPad.java` bootstrap; you will need this to be in place\
    \ when you come back to fill this class in after you code your `SketchPadView`\
    \ class, which this class will utilize. Use this following standard `.onCreate()`\
    \ Java method code:\n\n```\n@Override\npublic void onCreate(Bundle savedInstanceState)\
    \ {\n    super.onCreate(savedInstanceState);\n}\n```\n\nAs you can see in Figure\
    \ [17-5](#A978-1-4302-5786-8_17_Chapter.html#Fig5), you’ll need to mouse-over\
    \ your `Bundle` class reference, and select the `Import 'Bundle' (android.os)`\
    \ option to add that import statement at the top of your new `SketchPad.java`\
    \ class.\n\n![A978-1-4302-5786-8_17_Fig5_HTML.jpg](A978-1-4302-5786-8_17_Fig5_HTML.jpg)\n\
    \n**Figure 17-5.** Adding the `.onCreate()` method to the new `SketchPad` Activity\
    \ subclass and importing the `Bundle` class\n\nNow that you have an empty `SketchPad.java`\
    \ Activity subclass, which will not throw any errors or exceptions and admittedly\
    \ does absolutely nothing at this point in time, you can move on and add the class\
    \ to your application `AndroidManifest` and `Menu` object XML definition files.\
    \ Let’s do this next.\n\nRight-click your `AndroidManifest.xml` file, located\
    \ near the bottom of your project folder hierarchy, and select the `Open` option,\
    \ or left-click it and use the `F3` function key, located at the top (left) of\
    \ your keyboard.\n\nAs you may remember, you need to declare an `Activity` for\
    \ use in your Manifest by using the `<activity>` tag and `android:name` and `android:label`\
    \ parameters.\n\nThe fastest and easiest way to implement this is to copy the\
    \ last tag for the `Activity` declaration that’s in your `AndroidManifest` file\
    \ currently, so select the `BookmarkActivity` `<activity>` tag in its entirety,\
    \ use the `CTRL-C` combination to copy it, and then insert a line right underneath\
    \ it, and use `CTRL-V` to paste it again, underneath itself, and then edit it\
    \ to point to the new class by using the following XML markup, which is shown\
    \ in Figure [17-6](#A978-1-4302-5786-8_17_Chapter.html#Fig6):\n\n```\n<activity\
    \ android:name = \"pro.android.graphics.SketchPad\"\n          android:label =\
    \ \"@string/sketchPad_utility\" />\n```\n\n![A978-1-4302-5786-8_17_Fig6_HTML.jpg](A978-1-4302-5786-8_17_Fig6_HTML.jpg)\n\
    \n**Figure 17-6.** Adding a `SketchPad` `<activity>` definition to the `AndroidManifest.xml`\
    \ file for the `GraphicsDesign` project\n\nNotice that you are using that same\
    \ Menu labeling `<string>` constant for the `Activity` subclass label, displayed\
    \ at the top of the `Activity`. Speaking of `MenuItem` objects, you need to go\
    \ back into your `MainActivity.java` class, and add a `switch` statement `case`\
    \ entry and `Intent` declaration and instantiation for the third `MenuItem` object\
    \ that you created earlier in your `main.xml` file so that this `MenuItem` becomes\
    \ functional and calls your new `SketchPad.java` Activity, which currently (and\
    \ proudly, I might add) does absolutely nothing for your application at the moment.\
    \ They (women) say good things take time.\n\nRight-click the `MainActivity.java`\
    \ file in your `/src` folder, and open it for editing, and copy the last `case`\
    \ statement in the `onOptionsItemSelected` method and paste it again underneath\
    \ itself so you can edit it, and create a new `SketchPad` Intent to be able to\
    \ call your `SketchPad.java` Activity.\n\nThe `case` statement should reference\
    \ your `sketchPad` MenuItem XML `<item>` tag defined in your `main.xml` file and\
    \ create a new `Intent` named `intent-spu` for `SketchPadUtility`, passing it\
    \ your current Activity `Context` (`this`), as well as the `SketchPad.class` reference\
    \ parameter. Then call the `.startActivity()` method off of the current `Activity`\
    \ `Context` object (we will delve into the `Context` class a bit later on in this\
    \ chapter) via the following Java code:\n\n```\ncase R.id.sketchPad:\n    Intent\
    \ intent_spu = new Intent(this, SketchPad.class);\n    this.startActivity(intent_spu);\n\
    \    break;\n```\n\nAs you can see in Figure [17-7](#A978-1-4302-5786-8_17_Chapter.html#Fig7),\
    \ your code is error-free, and you are ready to create your pivotal `SketchPadView.java`\
    \ View subclass, which will do all of the heavy lifting for the interactive graphics\
    \ pipeline that you are about to code, using a number of new (to you, that is)\
    \ Android and Java classes.\n\n![A978-1-4302-5786-8_17_Fig7_HTML.jpg](A978-1-4302-5786-8_17_Fig7_HTML.jpg)\n\
    \n**Figure 17-7.** Adding an `Intent` referencing the `SketchPad.class` to the\
    \ `.onOptionsItemSelected()` method case switch\n\nNext, you are going to create\
    \ a `SketchPadView` class that `extends` the `View` class and `implements` the\
    \ `OnTouchListener` class, so that you have the `View` subclass framework in place\
    \ that will hold your `.onDraw()` method calls to your `Canvas` and `Paint` objects,\
    \ which you are about to create from scratch."
  raw: '## Setting Up Your GraphicsDesign Project for Your SketchPad


    The first addition you’re going to make to your GraphicsDesign application’s MainActivity.java
    Activity subclass is to add a `MenuItem` object called `The PAG SketchPad`. Open
    your project’s `/res/menu` folder and right-click the `main.xml` file, and select
    the `Open` menu option or left-click it and press the `F3` key. Copy and paste
    the second `bookmark_utility` < item > tag and edit it to create a third MenuItem
    object definition with an `ID` of `sketchPad`.


    Your XML markup, shown in Figure [17-1](#A978-1-4302-5786-8_17_Chapter.html#Fig1),
    should look like the following:


    `<item android:id = "@ + id/sketchPad"`


    `android:orderInCategory = "300"`


    `android:showAsAction = "never"`


    `android:title = "@string/sketchPad_utility" />`


    ![A978-1-4302-5786-8_17_Fig1_HTML.jpg](A978-1-4302-5786-8_17_Fig1_HTML.jpg)


    Figure 17-1.


    Adding the PAG SketchPad Utility to the application menu using the /res/menu folder’s
    main.xml file


    Since you referenced this String constant named `sketchPad_utility`, your next
    step will be to get into your `strings.xml` file, which is in your `/res/values`
    folder, and add that < string > tag to define this constant for use inside your
    menu title, or label, as I like to call it. Let’s code this next.


    As you can see in Figure [17-2](#A978-1-4302-5786-8_17_Chapter.html#Fig2), I added
    the `< string >` tag to the `strings.xml` file, naming it `sketchPad_utility`
    with a text value of `The PAG SketchPad`.


    ![A978-1-4302-5786-8_17_Fig2_HTML.jpg](A978-1-4302-5786-8_17_Fig2_HTML.jpg)


    Figure 17-2.


    Adding a < string > constant for The PAG SketchPad menu item to the /res/values
    folder’s strings.xml file


    Right-click the `/src` folder, and use a `New ➤ Class` menu sequence to create
    the framework for a `SketchPad Activity` subclass, as shown in Figure [17-3](#A978-1-4302-5786-8_17_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_17_Fig3_HTML.jpg](A978-1-4302-5786-8_17_Fig3_HTML.jpg)


    Figure 17-3.


    Right-clicking the /src folder and creating a New ➤ Class for a custom Activity
    subclass SketchPad.java


    Name the class `SketchPad` and select an `android.app.Activity` superclass, as
    shown in Figure [17-4](#A978-1-4302-5786-8_17_Chapter.html#Fig4). Be sure to specify
    the `pro.android.graphics` package.


    ![A978-1-4302-5786-8_17_Fig4_HTML.jpg](A978-1-4302-5786-8_17_Fig4_HTML.jpg)


    Figure 17-4.


    Naming this new Java class SketchPad, and defining its superclass selection as
    android.app.Activity


    Next, you need to add an `onCreate( )` method to your SketchPad.java bootstrap;
    you will need this to be in place when you come back to fill this class in after
    you code your SketchPadView class, which this class will utilize. Use this following
    standard .onCreate( ) Java method code:


    `@Override`


    `public void onCreate(Bundle savedInstanceState) {`


    `super.onCreate(savedInstanceState);`


    `}`


    As you can see in Figure [17-5](#A978-1-4302-5786-8_17_Chapter.html#Fig5), you’ll
    need to mouse-over your `Bundle` class reference, and select the `Import ‘Bundle’`
    `(android.os)` option to add that import statement at the top of your new SketchPad.java
    class.


    ![A978-1-4302-5786-8_17_Fig5_HTML.jpg](A978-1-4302-5786-8_17_Fig5_HTML.jpg)


    Figure 17-5.


    Adding the .onCreate( ) method to the new SketchPad Activity subclass and importing
    the Bundle class


    Now that you have an empty SketchPad.java Activity subclass, which will not throw
    any errors or exceptions and admittedly does absolutely nothing at this point
    in time, you can move on and add the class to your application AndroidManifest
    and Menu object XML definition files. Let’s do this next.


    Right-click your `AndroidManifest.xml` file, located near the bottom of your project
    folder hierarchy, and select the `Open` option, or left-click it and use the `F3`
    function key, located at the top (left) of your keyboard.


    As you may remember, you need to `declare an Activity` for use in your Manifest
    by using the `< activity >` tag and `android:name` and `android:label` parameters.


    The fastest and easiest way to implement this is to copy the last tag for the
    Activity declaration that’s in your AndroidManifest file currently, so select
    the BookmarkActivity < activity > tag in its entirety, use the `CRTL-C` combination
    to copy it, and then insert a line right underneath it, and use `CTRL-V` to paste
    it again, underneath itself, and then edit it to point to the new class by using
    the following XML markup, which is shown in Figure [17-6](#A978-1-4302-5786-8_17_Chapter.html#Fig6):


    `<activity android:name = "pro.android.graphics.SketchPad"`


    `android:label = "@string/sketchPad_utility" />`


    ![A978-1-4302-5786-8_17_Fig6_HTML.jpg](A978-1-4302-5786-8_17_Fig6_HTML.jpg)


    Figure 17-6.


    Adding a SketchPad < activity > definition to the AndroidManifest.xml file for
    the GraphicsDesign project


    Notice that you are using that same Menu labeling < string > constant for the
    Activity subclass label, displayed at the top of the Activity. Speaking of MenuItem
    objects, you need to go back into your MainActivity.java class, and add a switch
    statement `case` entry and `Intent` declaration and instantiation for the third
    MenuItem object that you created earlier in your main.xml file so that this MenuItem
    becomes functional and calls your new SketchPad.java Activity, which currently
    (and proudly, I might add) does absolutely nothing for your application at the
    moment. They (women) say good things take time.


    Right-click the `MainActivity.java` file in your `/src` folder, and `Open` it
    for editing, and copy the last case statement in the `onOptionsItemSelected` method
    and paste it again underneath itself so you can edit it, and create a new SketchPad
    Intent to be able to call your SketchPad.java Activity.


    The case statement should reference your `sketchPad` MenuItem XML < item > tag
    defined in your main.xml file and create a new Intent named `intent-spu` for SketchPadUtility,
    passing it your current Activity `Context` (this), as well as the `SketchPad.class`
    reference parameter. Then call the `.startActivity( )` method off of the current
    Activity Context object (we will delve into the Context class a bit later on in
    this chapter) via the following Java code:


    `case R.id.sketchPad:`


    `Intent intent_spu` = `new Intent(this, SketchPad.class);`


    `this.startActivity(intent_spu);`


    `break;`


    As you can see in Figure [17-7](#A978-1-4302-5786-8_17_Chapter.html#Fig7), your
    code is error-free, and you are ready to create your pivotal SketchPadView.java
    View subclass, which will do all of the heavy lifting for the interactive graphics
    pipeline that you are about to code, using a number of new (to you, that is) Android
    and Java classes.


    ![A978-1-4302-5786-8_17_Fig7_HTML.jpg](A978-1-4302-5786-8_17_Fig7_HTML.jpg)


    Figure 17-7.


    Adding an Intent referencing the SketchPad.class to the .onOptionsItemSelected(
    ) method case switch


    Next, you are going to create a `SketchPadView` class that `extends` the `View`
    class and `implements` the OnTouchListener class, so that you have the View subclass
    framework in place that will hold your `.onDraw( )` method calls to your `Canvas`
    and `Paint` objects, which you are about to create from scratch.'
  trans: "\n## 为图形设计项目设置画板\n\n你要对 `GraphicsDesign` 应用的 `MainActivity.java` Activity\
    \ 子类进行的第一个新增操作，是添加一个名为 `The PAG SketchPad` 的 `MenuItem` 对象。打开项目的 `/res/menu` 文件夹，右键点击\
    \ `main.xml` 文件，选择 `Open` 菜单选项，或者左键点击它并按 `F3` 键。复制并粘贴第二个 `bookmark_utility` `<item>`\
    \ 标签，然后对其进行编辑，以创建第三个 `MenuItem` 对象定义，其 `ID` 为 `sketchPad`。\n\n如图 17-1 所示，你的 XML\
    \ 标记应如下所示：\n\n```\n<item android:id = \"@ + id/sketchPad\"\n      android:orderInCategory\
    \ = \"300\"\n      android:showAsAction = \"never\"\n      android:title = \"\
    @string/sketchPad_utility\" />\n```\n\n![A978-1-4302-5786-8_17_Fig1_HTML.jpg](img/A978-1-4302-5786-8_17_Fig1_HTML.jpg)\n\
    \n**图 17-1.** 使用 `/res/menu` 文件夹中的 `main.xml` 文件，将 PAG SketchPad 工具添加到应用菜单中\n\n\
    由于你引用了这个名为 `sketchPad_utility` 的 `String` 常量，下一步就是进入位于 `/res/values` 文件夹中的 `strings.xml`\
    \ 文件，添加 `<string>` 标签来定义这个常量，以便在菜单标题或标签（我个人喜欢这么称呼）中使用。接下来我们开始编写代码。\n\n如图 17-2\
