  trans: '

    # 总结


    在第七章中，你学习了 Android `View` 超类，以及它如何为用户界面小部件提供基础，你可以利用这些小部件填充 ViewGroup 布局容器，从而创建
    UI 设计。


    我们首先探讨了基本的 View 参数，包括**ID**，它允许其他 Java 代码或 XML 标记引用 View 对象；布局（全局）定位，使用 `layout_weight`；以及
    View 对象小部件如何通过 `layout_width` 或 `layout_height` 中的 `wrap_content` 或 `match_parent`
    常量来调整大小，这两个参数是任何 View 对象中必不可少的。


    接着，我们研究了 View（局部）定位属性或参数，这些参数可以使用外边距（View 边界外的空间）和内边距（View 边界内的空间）。这些参数允许 View
    对象（UI 小部件）在布局容器内相对于其他 UI 元素进行局部定位。


    然后，你了解了任何 View 对象的图形属性，这些属性由背景（图像）和源（图像）以及透明度和可见性参数控制。你在本书中将学到的大部分图形设计和特殊效果最终都将通过这些参数实现，因此我们详细介绍了它们，力求面面俱到。


    最后，我们探讨了如何通过设置焦点以及实现事件监听器和事件处理程序使 View 对象具有交互性。


    是时候开始编写 Java 代码和 XML 标记了，因此你创建了一个新的 Activity 子类来构建书签工具，这样你就能学习 `RelativeLayout`
    容器以及 `TextView` 和 `ImageView` UI 小部件，它们本身也是 View 的子类，在 Android 设计中非常重要。


    你学习了如何为 `TextView` UI 元素应用投影效果，并发现 `ImageView` UI 元素尚不支持此功能，因此你学会了如何跳出 Android
    的局限，通过另一个名为 GIMP 2.8.6 的开源数字成像软件包来实现此效果。


    你了解了使用 GIMP 中的一些高级功能以及分辨率最高的数字图像资源来创建投影的工作流程，以及如何为 Android 中所需的每种其他 DPI 密度分辨率创建该资源的新投影版本。


    最后，你学习了如何在 Windows 和 Linux 中使用 `Control-F11` 和 `Control-F12` 功能键序列，以及在 Macintosh
    OS 中使用 `Command-7` 和 `Command-9` 键，将 Nexus One 模拟器从竖屏模式切换为横屏模式。你还了解到，某些 Mac OS
    也支持 Windows/Linux 的 `CTRL-F11` 按键序列，或非常类似的按键。


    在下一章中，你将学习更多关于其他高级 `ImageView` 概念、参数、技术、方法和优化的知识。你将学习如何利用 `ImageView` UI 元素提供的所有不同属性和选项，因为它是
    Android 操作系统中图形的基石。


    # 8. 高级 ImageView：使用 ImageView 进行更多图形设计


    ## 摘要


    在第八章中，我们将继续更深入地研究 `ImageView` 小部件及其高级属性设置（参数），因为它是 Android 操作系统中实现图形设计最重要的用户界面元素，它的
    `ImageButton` 子类同样重要。


    你在前一章中已经抢先了解了 `ImageView` 用户界面小部件，并在你正在设计的书签工具 UI 中使用它来保存当前已添加书签章节的图像。


    你使用了 `android:src` 参数来定义源图像，一些 UI 布局参数来定位它，以及一个外边距参数来为它留出设计空间。但是，你并没有真正深入研究任何高级参数或技巧，例如同时使用源（前景）图像层和背景图像层。


    我们确实使用 GIMP 2.8 涵盖了一些相当高级的数字成像概念，这对于一本专业 Android 图形书籍来说总是好的，随着本书内容的推进，我将尝试在 GIMP
    和 VirtualDub 中更多地这样做。


    在本章中，我们将探讨 `ImageView` 用户界面小部件类的其他一些独特属性和参数，以及如何通过 XML 标记和 Java 代码来实现它们。你已经了解了
    `ImageView` 中主要使用的一个参数，即 `android:src` 参数或属性。这是因为 `ImageView` 是数字图像资源的容器，该图像资源通过源（`src`）属性（或属性，或参数）来引用。由于
    `ImageButton` 是 `ImageView` 的子类，因此它也将具有相同的 `android:src` 参数。

    '
- fmt: '# Graphics in Android: The Origins of the `ImageView` Class


    The Android `ImageView` class is a subclass of the `View` Superclass, which is
    itself a subclass of the `java.lang.Object` master class. The `View` class has
    its own package, the `android.view` package, but `ImageView` is kept in a separate
    Android package for UI widgets called the `android.widget` package.


    The `android.widget` package contains the `ImageView` class, as well as all of
    the other UI element classes that are subclassed from this `View` class. If you
    want to see exactly which widgets are included in the package, you can find this
    information at the following Android Developer web site URL:


    [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


    The `ImageView` class displays any supported digital image format for areas of
    our application that require custom imagery that we as developers wish to supply.
    This would include things like the application icon, background imagery for a
    layout container, UI custom buttons, and so forth.


    The `ImageView` class can access imagery from a variety of sources, such as internal
    application resources (the `/res/drawable` folders) or from content providers,
    such as HTTP. The `ImageView` class will compute its UI container measurement
    from the source image asset so it can be used with any layout container. Since
    this is a graphics book, we will be using digital imagery with every layout container
    that we utilize, for the most part.


    `ImageView` provides various display options such as custom scaling and RGB value
    re-tinting, both of which we will look at in detail in this chapter.


    It is interesting to note that the `ImageView` class has very few subclasses,
    which is the opposite of what one would assume for a pixel-centric OS such as
    Android. The `ImageView` subclass that we will be looking at the most is the `ImageButton`
    class, but there is also a `QuickContactBadge` subclass that is more niche-oriented,
    if your application is working with QuickContacts.


    `ImageView` has only one known indirect subclass as well, called `ZoomButton`,
    which is a subclass of `ImageButton`. `ZoomButton` is used to zoom in and out
    of digital image based button assets using a zoom factor and zoom speed.


    If you wish to examine the `ImageView` class in greater detail, please visit its
    page on the Android Developer web site, located at the following URL:


    [`http://developer.android.com/reference/android/widget/ImageView.html`](http://developer.android.com/reference/android/widget/ImageView.html)


    The `ImageView` class does, however, have one single `nested` class, which is
    called `ScaleType`. This `ImageView.ScaleType` nested class allows us to define
    how our digital image asset will be scaled to fit its `View`.


    This makes `ScaleType` important enough to merit its own section within this chapter,
    so let’s take a look at how this `ImageView.ScaleType` class works, and learn
    about all the powerful image scaling constants it offers us.


    ## The `ImageView.ScaleType` Nested Class: Scaling Control


    The Android `ImageView` has a nested class called `ScaleType`, which contains
    scaling constants, and related algorithms, for determining how to scale an `ImageView`
    object. This `ImageView.ScaleType` class is a subclass of the Java `Enum` class,
    which is a subclass of the `java.lang.Object` master class. The precise superclass
    ➤ subclass relationship between these is as follows:


    ```

    java.lang.Object

    > java.lang.Enum<E extends java.lang.Enum<E>>

    > android.widget.ImageView.ScaleType

    ```


    The `ImageView.ScaleType` class is a part of the `android.widget` package, as
    you would expect, and its import statement would thus reference a path of `android.widget.ImageView.ScaleType`
    if it is used in your Java code.


    The reason the `ScaleType` class is a subclass of `java.lang.Enum` is because
    it uses this Java Emuneration Types class to create numeric constants for the
    different scaling algorithm types or scaling options that the scaling algorithm
    uses to ascertain which type of scaling needs to be implemented.


    These numeric constants have also been assigned string (text) constants to make
    them easier to remember and to reference within your code. We will be covering
    each of these in detail in this section of the chapter.


    There are 71 direct subclasses of `java.lang.Enum` in Android, as it is used to
    provide these numeric constants, which can be a common practice in Java programming.
    If you want to learn more about this `Enum` class, you can find its page on the
    Android Developer web site, located at the following URL:


    [`http://developer.android.com/reference/java/lang/Enum.html`](http://developer.android.com/reference/java/lang/Enum.html)


    If you’ve used the `wrap_content` constant for the `android:layout_width` and
    `android:layout_height` parameters for your `ImageView` UI element, then using
    one of the `ScaleType` scaling type constants would equate to scaling the digital
    image asset itself. This is because your `ImageView` references, and thus contains,
    your source image, and the `wrap_content` constant tells Android to conform the
    `ImageView` UI “container” around the image asset, pixel for pixel, which means
    that the `ImageView` container takes on the physical specifications of the image
    asset. If one of the `ScaleType` constants is specified via this nested class,
    the image asset (via the `ImageView`) would then be scaled to that given display
    screen size, density, and aspect ratio in a way which is based on the scaling
    type (`ScaleType`) constant which has been specified.


    `ScaleType` is most useful for determining how to scale an image relative to different
    screen aspect ratio, that is, keeping the aspect ratio locked so as not to distort
    the image at all, or, on the other end of the spectrum, allowing the image scaling
    operation to rescale our image without regards to aspect ratio, as we did with
    our 1000 pixel square image in Chapter 7.


    The `ScaleType` class also has a scaling type (constant) that allows us to match
    up each pixel of our digital image asset with each pixel of a user’s Android device’s
    physical hardware display. This is the `CENTER` constant.


    If there are not enough pixels in an image asset, or rather in the closest resolution
    density image asset that matches up with the screen resolution, our image will
    perfectly center within the display. In this way the image is using one physical
    display pixel for each pixel in the image asset. Now this is my kind of digital
    imaging class!


    Let’s go over each one of these eight different types of Scaling Algorithm Constants
    individually, in detail. I’ll outline them in Table 8-1, so that they are all
    together in one place, and then we can discuss each of them. The number in parenthesis
    after each scaling constant in the table represents the actual integer value that
    is represented by the scaling constant.


    **Table 8-1.** `ImageView.ScaleType` Image Scaling Constants and Summary of How
    They Scale Digital Image Assets'
