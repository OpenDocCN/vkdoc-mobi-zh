  trans: '

    # Android FrameLayout 类：设计帧布局


    我们已经在第 2 章中使用 Android `FrameLayout` 容器来容纳我们的数字视频资源。`FrameLayout` 是用于在其内部容纳其他结构的容器或“框架”，例如图像或视频资源。


    `FrameLayout` 设计用于分配屏幕的某个区域来显示单个项目。尽管你可以将其用于自己的 UI 设计，但也要认识到，它通常也被用作 Android 中许多其他有用的
    UI 布局容器子类的超类，例如 `AppWidgetHostView`、`CalendarView`、`MediaController`、`GestureOverlayView`、`HorizontalScrollView`、`ViewAnimator`、`ScrollView`、`TabHost`、`DatePicker`
    和 `TimePicker`。


    一般来说，`FrameLayout` 应被用来容纳单个子 `View`，因为很难组织子视图使其在不同显示尺寸之间具有可扩展性，同时又不会让子视图相互重叠。


    不过，你可以向 `FrameLayout` 中添加多个 UI 元素（子标签），并通过为每个子标签分配 `gravity` 参数来控制它们在 `FrameLayout`
    内的位置。这将使你的 `FrameLayout` 在运行时能够由 Android 进行缩放，可以使用 27 个 `android:layout_gravity`
    常量之一，这些常量在以下 Android 开发者网站 URL 中有详细描述：


    [`http://developer.android.com/reference/android/view/Gravity.html`](http://developer.android.com/reference/android/view/Gravity.html)


    `FrameLayout` 的子标签（`View` 控件）会以堆栈的形式绘制，最近添加的子标签位于顶部。`FrameLayout` 的大小会扩展以适应其最大子元素的大小加上其内边距，无论该子元素是否可见，只要
    `FrameLayout` 父标签支持 `visibility` 参数。


    需要注意的是，那些当前不可见的子标签（`View` 控件），如果是因为使用了 Android 的 `View.GONE` 常量（而不是 `View.INVISIBLE`）而指定为不可见，那么仅当调用
    `.setConsiderGoneChildrenWhenMeasuring()` 方法并传入 `true` 参数时，它们才会被用于 `FrameLayout`
    容器的尺寸计算。


    如你所见，`FrameLayout` 容器具有看似简单实则复杂的特性，它实际上更多地被用作创建其他更专业布局容器的超类，而不是作为主流的开发者 UI 设计容器（如
    `LinearLayout` 或 `RelativeLayout`）。


    它对于容纳单 UI 元素布局非常有用，例如使用 `VideoView` UI 控件实现的全屏数字视频，尤其是当视频需要由 Android 操作系统缩放以适应不同屏幕尺寸或宽高比时，能保持其纵横比。然而，这属于一个相对特殊的用例场景，所以如果有其他布局容器类更适合你的
    UI 设计需求，就不要尝试使用 `FrameLayout`。


    接下来，让我们看看用于网格 UI 布局的 `GridLayout` 容器。


    # Android GridLayout 类：设计 UI 布局网格


    Android 的 `GridLayout` 容器类正如其名：它将 UI 元素子标签放置在一个矩形网格中。这个布局类与 `LinearLayout` 容器非常相似；事实上，它有许多参数与
    `LinearLayout` 的参数相同或相似。如果你在 XML 定义中将 `<LinearLayout>` 容器父标签更改为 `<GridLayout>`
    容器父标签，那么两种容器类型中的子标签很可能都能按照它们原有的代码正常工作！


    这个 `GridLayout` 的虚拟网格用户界面容器由一组无限细（即，占用零像素）的线条组成，这些线条将可视区域分割成离散的用户界面布局单元格。


    在 Android `GridLayout` API 中，网格线通过网格索引来引用。一个具有特定列数（N）的网格将有 N+1 个网格索引，范围从 0 到 N（包括
    N）。


    无论你的 `GridLayout` 容器如何配置，在考虑内边距后，网格索引 0 将固定于容器的前边缘，网格索引 N 将固定于其后边缘，这与我们在其他布局容器类型中看到的情况一致。


    你的 UI 元素（子标签）将占据一个或多个这样的 `GridLayout` 单元格，占据的数量将由 Android 的 `rowSpec`（行说明符）和 `columnSpec`（列说明符）网格布局参数决定。


    每个说明符参数定义了要占据的行或列集合，以及子元素在生成的单元格组中应该如何对齐。


    `GridLayout` 容器中的单元格不会相互重叠；然而，`GridLayout` 容器也不阻止子标签元素被定义为占据同一个单元格，或跨越一组单元格。因此，单元格不必是正方形（1:1
    宽高比）；它们可以是竖屏或横屏形状。


    在占据同一单元格或跨越单元格的场景中，网格布局操作完成后，无法保证子标签不会相互重叠，所以请务必充分测试你富有创意的 `GridLayout` 容器！


    如果 `GridLayout` 容器的子标签没有为它想要占据的某个单元格设置行或列索引，那么 `GridLayout` 类将自动分配一个单元格位置。这是按照类中指定的逻辑填充顺序进行的，该顺序遵循
    `GridLayout` 的 `orientation`、`rowCount` 和 `columnCount` 参数设置。


    你还可以通过指定 `leftMargin`、`topMargin`、`bottomMargin`、`rightMargin` 或 `Margin`（该参数将值同时添加到四个边距）布局参数来设置子标签元素之间的自定义间距。或者，你可以使用
    Android 的 `Space` 类在 `GridLayout` 的某些单元格内创建空白空间。


    Android `Space` 类是一个轻量级的 `View` 子类，可用于在 `GridLayout` 等布局容器中的用户界面元素之间创建空白空间。有关
    `Space` 类的更多信息，请访问以下 URL：


    [`http://developer.android.com/reference/android/widget/Space.html`](http://developer.android.com/reference/android/widget/Space.html)


    当 `GridLayout` 父标签的 `useDefaultMargins` 参数被设置后，会为每个子标签应用一个预定义的边距。这个边距空间由 Android
    操作系统根据 Android UI 风格指南自动计算。


    Android 定义的每个全局自动边距都可以在本地 UI 元素层面通过赋值上述边距参数来覆盖。


    需要注意的是，这些默认值通常会在子用户界面元素之间产生可接受的间距效果，但自动（风格指南）值也可能在 Android 平台的不同版本之间发生变化，因此最好多添加一些
    XML 标记（参数），由你自己来控制 UI 的间距。'
- fmt: '`GridLayout`容器对额外空间的分配基于优先级而非权重，因为与`LinearLayout`不同，该容器没有权重参数选项。实际上，这是`LinearLayout`与`GridLayout`用户界面容器之间的主要区别之一。


    `GridLayout`类将使用子UI元素的`android:gravity`参数（该参数设置其行和列分组的对齐属性）来确定其跨单元格的能力。如果沿某个X轴或Y轴定义了对齐，则该单元格中的UI元素在该方向被标记为灵活的。如果未使用`android:gravity`参数设置对齐，则该UI元素被视为固定在网格中，因此是不灵活的。


    要确保行或列能够调整大小，请确保在其中定义的每个UI元素（通过子标签）都定义了`android:gravity`参数。要防止行或列调整大小，需要确保该行或列中的至少一个用户界面元素没有定义（设置）`android:gravity`参数。


    如果同一行或列（分组）中有多个UI元素，它们将被视作并行处理。只有当分组内的所有组件都灵活且使用`android:gravity`参数定义时，该分组才被认为是灵活的。


    你可能此时会想：难道不应该是`android:layout_gravity`吗？实际上有两个布局重力参数：`android:layout_gravity`和`android:gravity`！这够让人困惑吧！当你在UI元素（`View`对象）内部设置布局重力时，应使用`android:gravity`作为参数选择；而在指定布局容器对象或`ViewGroup`对象外部的重力时，则使用`android:layout_gravity`。


    为了换一种方式思考，并确保你完全理解：`android:gravity`参数指定了UI元素（`View`）内容在子标签UI元素（`View`对象）内部的对齐方向。


    相反，`android:layout_gravity`应用于指定该`View`的外部重力。这意味着指定该`View`应与其父标签（`ViewGroup`对象）容器边框接触的方向。


    位于`GridLayout`边界或内部边框任一侧的行和列分组将被视为串行而非并行。


    遵循`GridLayout`的“灵活性原则”，由这两个元素组成的分组如果其中一个组件元素是灵活的，则该分组就是灵活的。当此灵活性原则未能完全消除用户界面的歧义时，`GridLayout`类算法将优先选择靠近布局容器右侧和底部的行和列。这是合理的，因为正如我们所知，Android中的图形和布局从屏幕坐标
    (0, 0)（即左上角）开始。


    正如我之前提到的，与`LinearLayout`不同，`GridLayout`容器目前不支持名为`weight`的参数。因此，通常无法配置`GridLayout`容器来在多个组件之间分配额外空间。如果你需要此功能，请使用`LinearLayout`容器。


    通过简单地使用`android:gravity`参数并设置`CENTER`常量值，你可以满足`GridLayout`的许多自动调整大小需求。这将在单元格或单元格分组中的子UI元素周围添加等量的间距。


    如果你想实现更复杂的效果，可以通过使用`LinearLayout`容器作为子UI元素来包含相关单元格或单元格分组中的UI组件，从而完全控制行或列中额外空间的分配。这很可能会消耗更多内存，因此在实现之前请确保确实有必要。


    另外值得注意的是，在配置`GridLayout`容器内的子标签（UI元素）时，你不需要使用`WRAP_CONTENT`或`MATCH_PARENT`这两个Android尺寸值常量。然而，`GridLayout`父标签通常会为宽度和高度布局参数使用`MATCH_PARENT`常量，以便填充整个Activity屏幕。


    你甚至可以在不指定UI元素放置到哪些单元格的情况下使用`GridLayout`，让`GridLayout`类算法为你完成此操作。声明`GridLayout`的安全方式是让每个UI元素（控件）的布局参数指定行和列的索引，这些索引共同精确地定义了UI元素的放置位置。当其中一个或两个值未指定时，`GridLayout`类将为你计算网格单元格位置值（而不是抛出错误或异常）。


    如果你没有指定行或列索引（值或整数），子UI元素将被添加到`GridLayout`中。为此，`GridLayout`会维护一个游标位置（类似于读取SQLite数据库），并利用它来将控件放置到尚未有内容的单元格中。它将基于`GridLayout`的方向参数设置进行计算，因为与`LinearLayout`类似，`GridLayout`可以是水平（横向）或垂直（纵向）。


    实际上，为了适配不同的设备方向（我们在[第5章](#A978-1-4302-5786-8_5_Chapter.html)中探讨过），你可能需要分别为这些特定的`GridLayout`方向设计一种：一种适配iTV和平板电脑（水平横向方向），另一种适配智能手机和电子阅读器（垂直纵向方向）。


    当你的`GridLayout`方向属性设置为水平，并且你指定了定义布局列数的`android:columnCount`参数时，会自动布局维护一个游标位置，并为每一列存储一个单独的高度索引。如果你提供了自己的索引，则永远不会用到这个游标，这也是我所推荐的。


    否则，当需要为你自动生成UI元素索引时，`GridLayout`类会首先通过查找UI元素的`android:layout_rowSpan`和`android:layout_columnSpan`参数来确定单元格分组的大小，然后从游标位置开始，从左到右、从上到下遍历所有可用的单元格位置，以找到第一个可用的行和列索引。


    当你的`GridLayout`方向参数设置为垂直时，所有相同的原理都适用，只是水平和垂直轴互换，因此填充顺序变为从上到下、从左到右，并且游标存储的是宽度位置（从左至右）而非从上到下的高度位置。


    所以，水平方向的填充方式如同西方人阅读书籍，而垂直方向的填充方式则如同阅读带有象形文字的古代卷轴。


    如果你希望将多个用户界面元素放置到完全相同的单元格中，则必须显式定义它们的索引。这是因为上述自动子元素分配过程被设计为将用户界面元素控件放置在不同的单元格中。


    你可能会想：使用`TableLayout`不是比`GridLayout`更高效吗？实际上，`GridLayout`比`TableLayout`更节省内存，并且不需要`TableRows`功能，所以我建议你熟悉`GridLayout`，因为它是Android中最灵活、最高效的用户界面布局容器之一。奇怪的是，它常常被大多数开发者忽视。但你不会；你将通过本章掌握它！只要在将相对关系定义为行和列时稍加创意，`RelativeLayout`也可以被编写成`GridLayout`。'
  raw: 'A GridLayout container’s distribution of extra space is based on priority,
    rather than weight, since this container, unlike the LinearLayout, has no weight
    parameter options. In fact, this is one of the primary differences between the
    LinearLayout and the GridLayout user interface containers.


    The child tag (UI element in grid cell) capability to span cells will be ascertained
    by the GridLayout class using the android:gravity parameter for the child UI element
    that sets the alignment property of its row and column groups. If alignment is
    defined along a certain X or Y axis, then the UI element in that cell is marked
    as flexible in that direction. If no alignment is set using the android:gravity
    parameter, then the UI element is instead assumed to be fixed in the grid and
    thus inflexible.


    To assure that a row or column will resize, make sure that each of the UI elements
    defined inside it (via child tags) define the android:gravity parameter. To prevent
    your row or column from resizing, you need to make sure that at least one of the
    user interface elements inside that row or column does not define (set) the android:gravity
    parameter.


    If you have multiple UI elements inside the same row or column (group), they will
    be considered to act in parallel. This type of grouping will be considered to
    be flexible if all of the components within it are flexible and defined using
    the android:gravity parameter.


    You may be thinking at this point: Don’t you mean android:layout_gravity? There
    are actually two layout gravity parameters, android:layout_gravity and android:gravity!
    How’s that for confusion! You’ll use android:gravity as your parameter selection
    when you are setting the layout gravity that is inside your UI element (View object)
    and android:layout_gravity for specifying gravity outside your layout container
    object or ViewGroup object.


    To think about this in a slightly different way, just to make absolutely sure
    that you have it straight, an `android:gravity` parameter specifies the direction
    in which the UI element (View) content should align inside of a child tag UI element
    (View object).


    Conversely, an `android:layout_gravity` should be used to specify an outside gravity
    for that View. This means specifying the direction for which that View should
    touch its parent tag’s (ViewGroup object’s) container border.


    Row and column groups that exist on either side of a GridLayout boundary or internal
    border will be considered to act serially and not in parallel.


    In keeping with the “flexibility principle” for GridLayouts, a group made up of
    these two elements will be flexible if one of its component elements is flexible.
    When this flexibility principle does not provide your UI with complete disambiguity,
    the GridLayout class algorithms will favor rows and columns that are located close
    to the layout container’s right and bottom edges. This is logical because, as
    we know, graphics and layouts in Android begin at X,Y screen coordinates of 0,0
    which is the upper-left corner.


    As I mentioned earlier, unlike LinearLayout, the GridLayout container does not
    currently provide support for the parameter called weight. In general, it is therefore
    not currently possible to configure a GridLayout container to distribute the excess
    space between multiple components. If you need this functionality, use a LinearLayout
    container.


    You can accommodate many of your auto-resizing needs for the GridLayout by simply
    using the android:gravity parameter with the CENTER value constant. This will
    add in equal amounts of spacing around your child UI element in your cell or cell
    group.


    If you want to get really tricky, you can command complete control over the excess
    space distribution in your row or column by using the LinearLayout container as
    a child UI element to contain your UI components within those associated cells
    or cell groups. This will most likely take more memory to achieve, so make sure
    that it is really necessary before you implement it.


    It is also interesting to note that you should not need to use either of the Android
    size value constants WRAP_CONTENT or MATCH_PARENT when you are configuring the
    child tags (UI elements) within your GridLayout container. The GridLayout parent
    tag, however, will normally utilize the MATCH_PARENT constant for the width and
    height layout parameters, so that it fills the Activity screen.


    You can even use a GridLayout without specifying which cells your UI elements
    will be placed in and let the GridLayout class algorithm do this for you. The
    safe way to declare a GridLayout has each UI element (widget) layout parameters
    specifying row and column indices, which together define precisely where the UI
    element needs to be placed. When either or both of these values are not specified,
    the GridLayout class will calculate grid cell location values for you (rather
    than throwing an error or exception).


    If you don’t specify row or column indices (values, or integer numbers), the child
    UI elements will be added to a GridLayout. To do this, GridLayout keeps track
    of a cursor position, much like reading a SQLite database, which it will utilize
    to place widgets into cells that don’t have anything in them. It will calculate
    this based on a GridLayout orientation parameter setting, since like a LinearLayout,
    a GridLayout can be either horizontal (landscape) or vertical (portrait).


    In fact, to fit different device orientations, something we looked at in [Chapter
    5](#A978-1-4302-5786-8_5_Chapter.html), you may want to design one of each of
    these specific GridLayout orientations to fit iTVs and tablets (horizontal landscape
    orientation) and one to fit smartphones and e-Readers (vertical portrait orientation).


    When your GridLayout orientation property is set to horizontal, and you’ve specified
    the `android:columnCount` parameter that defines how many columns your layout
    will have, a cursor position will be maintained for automatic layouts with a separate
    height index stored for each column. If you supply your own indices, this never
    gets used, which is what I recommend.


    Otherwise, when auto-generated UI element indices need to be created for you,
    the GridLayout class will first determines the size of a cell group by looking
    for any `android:layout_rowSpan` and `android:layout_columnSpan` parameters for
    the UI element, and then, starting at the cursor position, it will step through
    all of the available cell locations from left to right and then top to bottom,
    in order to find the row and column indices of the first location that is free
    for use.


    When your GridLayout orientation parameter is set to vertical, all of the same
    principles apply, except that the horizontal and vertical axes are switched, so
    the population goes top to bottom and left to right and the cursor stores a width
    position (from left towards the right) rather than a height position from top
    to bottom.


    So, a horizontal orientation is populated just like Westerners read a book, and
    a vertical orientation is populated like you would read ancient scrolls with hieroglyphics
    on them.


    If you want multiple user interface elements to be placed into the exact same
    cell, then you would have to define their indices explicitly. This is because
    the automatic child element allocation procedure described above is designed to
    place the user interface element widgets in separate cells.


    You may be wondering: Wouldn’t it be more efficient to use a TableLayout than
    a GridLayout? In fact, the GridLayout is more memory efficient than the TableLayout
    and does not require the TableRows feature, so I would suggest getting comfortable
    with GridLayout, as it is one of the most flexible and efficient user interface
    layout containers in Android. Strangely, it is often overlooked by most developers.
    But not by you; you are going to master it in this chapter! RelativeLayouts can
    also be coded as GridLayouts with a little bit of creativity in defining the relative
    relationships into rows and columns.'
  trans: '```markdown


    `GridLayout`容器对额外空间的分配基于优先级而非权重，因为与`LinearLayout`不同，该容器没有权重参数选项。实际上，这是`LinearLayout`与`GridLayout`用户界面容器之间的主要区别之一。


    `GridLayout`类将使用子 UI 元素的`android:gravity`参数（该参数设置其行和列分组的对齐属性）来确定其跨单元格的能力。如果沿某个
    X 轴或 Y 轴定义了对齐，则该单元格中的 UI 元素在该方向被标记为灵活的。如果未使用`android:gravity`参数设置对齐，则该 UI 元素被视为固定在网格中，因此是不灵活的。


    要确保行或列能够调整大小，请确保在其中定义的每个 UI 元素（通过子标签）都定义了`android:gravity`参数。要防止行或列调整大小，需要确保该行或列中的至少一个用户界面元素没有定义（设置）`android:gravity`参数。


    如果同一行或列（分组）中有多个 UI 元素，它们将被视作并行处理。只有当分组内的所有组件都灵活且使用`android:gravity`参数定义时，该分组才被认为是灵活的。


    你可能此时会想：难道不应该是`android:layout_gravity`吗？实际上有两个布局重力参数：`android:layout_gravity`和`android:gravity`！这够让人困惑吧！当你在
    UI 元素（`View`对象）内部设置布局重力时，应使用`android:gravity`作为参数选择；而在指定布局容器对象或`ViewGroup`对象外部的重力时，则使用`android:layout_gravity`。


    为了换一种方式思考，并确保你完全理解：`android:gravity`参数指定了 UI 元素（`View`）内容在子标签 UI 元素（`View`对象）内部的对齐方向。


    相反，`android:layout_gravity`应用于指定该`View`的外部重力。这意味着指定该`View`应与其父标签（`ViewGroup`对象）容器边框接触的方向。


    位于`GridLayout`边界或内部边框任一侧的行和列分组将被视为串行而非并行。


    遵循`GridLayout`的“灵活性原则”，由这两个元素组成的分组如果其中一个组件元素是灵活的，则该分组就是灵活的。当此灵活性原则未能完全消除用户界面的歧义时，`GridLayout`类算法将优先选择靠近布局容器右侧和底部的行和列。这是合理的，因为正如我们所知，Android
    中的图形和布局从屏幕坐标 (0, 0)（即左上角）开始。


    正如我之前提到的，与`LinearLayout`不同，`GridLayout`容器目前不支持名为`weight`的参数。因此，通常无法配置`GridLayout`容器来在多个组件之间分配额外空间。如果你需要此功能，请使用`LinearLayout`容器。


    通过简单地使用`android:gravity`参数并设置`CENTER`常量值，你可以满足`GridLayout`的许多自动调整大小需求。这将在单元格或单元格分组中的子
    UI 元素周围添加等量的间距。


    如果你想实现更复杂的效果，可以通过使用`LinearLayout`容器作为子 UI 元素来包含相关单元格或单元格分组中的 UI 组件，从而完全控制行或列中额外空间的分配。这很可能会消耗更多内存，因此在实现之前请确保确实有必要。


    另外值得注意的是，在配置`GridLayout`容器内的子标签（UI 元素）时，你不需要使用`WRAP_CONTENT`或`MATCH_PARENT`这两个
    Android 尺寸值常量。然而，`GridLayout`父标签通常会为宽度和高度布局参数使用`MATCH_PARENT`常量，以便填充整个 Activity
    屏幕。


    你甚至可以在不指定 UI 元素放置到哪些单元格的情况下使用`GridLayout`，让`GridLayout`类算法为你完成此操作。声明`GridLayout`的安全方式是让每个
    UI 元素（控件）的布局参数指定行和列的索引，这些索引共同精确地定义了 UI 元素的放置位置。当其中一个或两个值未指定时，`GridLayout`类将为你计算网格单元格位置值（而不是抛出错误或异常）。


    如果你没有指定行或列索引（值或整数），子 UI 元素将被添加到`GridLayout`中。为此，`GridLayout`会维护一个游标位置（类似于读取 SQLite
    数据库），并利用它来将控件放置到尚未有内容的单元格中。它将基于`GridLayout`的方向参数设置进行计算，因为与`LinearLayout`类似，`GridLayout`可以是水平（横向）或垂直（纵向）。


    实际上，为了适配不同的设备方向（我们在第 5 章中探讨过），你可能需要分别为这些特定的`GridLayout`方向设计一种：一种适配 iTV 和平板电脑（水平横向方向），另一种适配智能手机和电子阅读器（垂直纵向方向）。


    当你的`GridLayout`方向属性设置为水平，并且你指定了定义布局列数的`android:columnCount`参数时，会自动布局维护一个游标位置，并为每一列存储一个单独的高度索引。如果你提供了自己的索引，则永远不会用到这个游标，这也是我所推荐的。


    否则，当需要为你自动生成 UI 元素索引时，`GridLayout`类会首先通过查找 UI 元素的`android:layout_rowSpan`和`android:layout_columnSpan`参数来确定单元格分组的大小，然后从游标位置开始，从左到右、从上到下遍历所有可用的单元格位置，以找到第一个可用的行和列索引。


    当你的`GridLayout`方向参数设置为垂直时，所有相同的原理都适用，只是水平和垂直轴互换，因此填充顺序变为从上到下、从左到右，并且游标存储的是宽度位置（从左至右）而非从上到下的高度位置。


    所以，水平方向的填充方式如同西方人阅读书籍，而垂直方向的填充方式则如同阅读带有象形文字的古代卷轴。


    如果你希望将多个用户界面元素放置到完全相同的单元格中，则必须显式定义它们的索引。这是因为上述自动子元素分配过程被设计为将用户界面元素控件放置在不同的单元格中。


    你可能会想：使用`TableLayout`不是比`GridLayout`更高效吗？实际上，`GridLayout`比`TableLayout`更节省内存，并且不需要`TableRows`功能，所以我建议你熟悉`GridLayout`，因为它是
    Android 中最灵活、最高效的用户界面布局容器之一。奇怪的是，它常常被大多数开发者忽视。但你不会；你将通过本章掌握它！只要在将相对关系定义为行和列时稍加创意，`RelativeLayout`也可以被编写成`GridLayout`。


