- fmt: 'As you can see, the bookmark image alpha channel seems to be respected and
    the `CloudSky` image is being blended into the bookmark image, this time for a
    not-so-subtle effect in the text area and in the perimeter metal hoop.


    If you remember that the `OVERLAY` mode is like `SCREEN` and `MULTIPLY`, you can
    see that the `BLACK` area of your bookmark image is treated 100% differently (the
    exact opposite of) in the `SCREEN` mode than in the `OVERLAY` mode, which is something
    important for you to note here for any future compositing and blending endeavors.


    Next, let’s try a `LIGHTEN` blending mode, so again go into your Java code, and
    change your `PorterDuff.Mode.SCREEN` constant to `PorterDuff.Mode.LIGHTEN` constant,
    and again use a Run As ➤ Android Application to see the results, which are shown
    in Figure [11-17](#A978-1-4302-5786-8_11_Chapter.html#Fig17) on the left-hand
    side of the screen shot.


    As you can see, `SCREEN` and `LIGHTEN` blending modes are quite similar indeed,
    and at least with the `SCREEN` blending mode your text is readable, whereas with
    `LIGHTEN` blending mode it is difficult to discern. The blending mode does seem
    to be respecting the alpha channel data, however, so it’s looking like `PorterDuffXfermode`,
    `PorterDuff`, and `PorterDuff.Mode` classes are error-free and the problem we
    saw earlier may just be with the `ColorFilter` class or with the `PorterDuffColorFilter`
    class code.


    ![A978-1-4302-5786-8_11_Fig17_HTML.jpg](A978-1-4302-5786-8_11_Fig17_HTML.jpg)


    **Figure 11-17.** Testing the `LIGHTEN` (left) and the `DARKEN` (right) `PorterDuff.Mode`
    constants in the Nexus One emulator


    Finally, let’s take a look at the last of Android’s pixel blending modes, the
    `DARKEN` mode, and see how it works using these two source image assets.


    Go into your Java code in Eclipse, and change your `PorterDuff.Mode.LIGHTEN` constant
    to be a `PorterDuff.Mode.DARKEN` constant, and again use a Run As ➤ Android Application
    to see the results, which are shown in Figure [11-17](#A978-1-4302-5786-8_11_Chapter.html#Fig17)
    on the right-hand side of the screen shot. The `DARKEN` constant has the effect
    of making your foregroundImage (bookmark0.png) look transparent like glass.


    As you can see when comparing `OVERLAY` in Figure [11-16](#A978-1-4302-5786-8_11_Chapter.html#Fig16)
    and `DARKEN` in Figure [11-17](#A978-1-4302-5786-8_11_Chapter.html#Fig17), the
    `OVERLAY` renders your `CloudSky` onto your bookmark UI hoop as if it were a texture
    map, also called a reflection map, which is quite common in 3D. This blending
    mode seems to keep that metallic appearance of this hoop design element intact,
    and provides you with a nice 3D rendering effect.


    The `DARKEN` blending mode, on the other hand, makes your hoop look like it is
    transparent and made out of glass, and as you can now see, this is why many special
    effects can be effectively crafted and implemented using the blending modes, whether
    it is in Adobe Photoshop, GIMP, or even right here inside the Android application
    code. Pixel blending is a powerful tool.


    ## Summary


    In this eleventh chapter, you learned more about the Android `PorterDuff` and
    `PorterDuff.Mode` classes, as well as about the `PorterDuffXfermode` class and
    the `PorterDuffColorFilter` class. These classes are used to implement image blending
    in Android. This includes blending color value changes into image assets to allow
    color or contrast correction or the creation of a range of image assets using
    one single image source, as well as special effects.


    We started out by looking at the core digital image compositing concept of pixel
    blending as well as transfer modes, and how these capabilities allow developers
    to implement impressive special effects using the image assets in their `/res/drawable/`
    folders.


    Next, we took a closer look at the core `PorterDuff` class in Android, which implements
    the image blending technology and the pixel transfer concepts that you learned
    about in the first section. This class contains the core algorithms for the blending
    and transfer modes that are invoked using the other PorterDuff related classes
    in the Android OS.


    You then learned about the `PorterDuff.Mode` nested class, which contains the
    18 constants, and we looked at all 18 to see exactly what each of them does, and
    what algorithmic equations are used to blend or transfer the image source alpha
    (`Sa`), source color (`Sc`), destination alpha (`Da`), and destination color (`Dc`)
    pixel data values into a resulting composite image.


    We first looked at the five image blending algorithms and the one utility algorithm,
    and then we looked at the pixel transfer algorithms, and how they were similar
    to Boolean set operations. Once we had this overview of what was available to
    us via `PorterDuff.Mode` constants, it was time to take a look at the `PorterDuffColorFilter`
    class to implement pixel color blending.


    Then we were ready to implement the first of two specialized PorterDuff classes
    in Android, the `PorterDuffColorFilter` class. We looked at how to implement this
    class using the `.setColorFilter()` method along with color values and a `PorterDuff.Mode`
    constant specification as parameter values.


    Next, we took a look at the more advanced `PorterDuffXfermode` class, which allows
    us to apply PorterDuff transfer modes (`Xfermode`) and blending mode constants
    between other types of graphics assets. In this case, we utilized digital image
    assets, as bitmaps provide the latitude necessary to produce impressive image
    compositing special effects in the Android OS.


    You took a hands-on approach, and created around a dozen lines of advanced Java
    code, as well as added the XML `<ImageView>` tag, implementing digital image blending
    in your `GraphicsDesign` application’s `ContentsActivity` class.


    While you were doing this, you learned about all of the major graphics-related
    classes in the Android OS, including the `Bitmap`, `BitmapFactory`, `Paint`, and
    `Canvas` classes. You learned what each of these classes does for graphics in
    Android, and you saw how they all worked together to allow you to implement image
    blending modes, so that you could composite two of your digital image assets together.
    This allowed you to visualize the blending modes, which you will be using on images
    in your applications to invoke image composites and special effects.


    We looked at all six of the major blending modes that you will be using for digital
    image compositing and special effects, and you used them in your code to ascertain
    exactly what they will do with two existing images in your app.


    These transfer (`XOR`) and blending modes included `OVERLAY`, `SCREEN`, `LIGHTEN`,
    `DARKEN`, `MULTIPLY`, and `XOR`. I encourage readers to try all of the PorterDuff
    modes in the code that they wrote in this chapter in order to experiment with
    what these modes offer as far as image processing power goes.


    In the next chapter, you will learn about using digital image layers in the Android
    OS and how to use the `LayerDrawable` class in Android. This will allow you to
    ratchet your Android image compositing graphics design and special effects work
    to yet another level, which will include building upon what you have already learned
    in this chapter regarding the PorterDuff blending modes and their implementations,
    using the `PorterDuffXfermode` and the `PorterDuffColorFilter` classes, in conjunction
    with the `PorterDuff.Mode` nested class.'
