    Adding a .stop( ) method call to an onLongClick( ) event handler method and changing
    return to true


    What you need to do to fix this problem is to “reset” your AnimationDrawable to
    Frame 1, but wouldn’t you know it, Android left the `.reset( )` method out of
    the AnimationDrawable class! Quite a glaring oversight as far as frame animation
    is concerned, but I’m sure they will add it in there someday.


    You will need to figure out a different way of getting your frame animation set
    back to the first frame when your users perform a Long-Click operation on the
    `pag` ImageView UI element that contains your frame animation assets.


