    # 创建所有 ImageButton 状态资源：密度分辨率


    由于你在所有资源中都使用 32 位 PNG 高品质数字图像文件格式，你可以直接打开 360 像素的 XHDPI 图像资源，并按偶数倍进行下采样。这些将包括用于
    LDPI 的 120 像素（3 倍下采样）、用于 MDPI 的 180 像素（2 倍下采样）以及用于 HDPI 的 240 像素（1.5 倍下采样）。


    让我们启动 GIMP，使用 `文件 ➤ 打开` 菜单序列来访问 `打开图像` 对话框，如图 9-18 所示。接下来，使用左侧的 `位置` 窗格导航到你的 `/workspace/GraphicsDesign/res/drawable-xhdpi`
    文件夹，选择 `imagebutton_normal.png` 文件，然后点击 `打开` 按钮，在 GIMP 中打开此数字图像资源。


    ![A978-1-4302-5786-8_9_Fig18_HTML.jpg](img/A978-1-4302-5786-8_9_Fig18_HTML.jpg)


    图 9-18. 打开 XHDPI 的 `imagebutton_normal.png` 状态


    此工作流程的下一步是使用 `图像` 菜单和 `缩放图像` 工具对话框，将图像尺寸从 360 像素在 X 和 Y 图像轴上各缩小一半，变为 180 x 180
    像素，即对图像进行 2 倍或 100% 的下采样。


    需要注意的是，偶数倍（2 倍、4 倍、8 倍）的下采样操作会得到最佳结果，因此你应该先创建 MDPI 图像资源。你需要确保 X 和 Y 分辨率输入字段的锁定按钮已设置好，然后在第一个字段中输入
    180；当你按下回车键或点击第二个字段时，第二个 180 将自动为你输入。


    接下来，确保在该对话框底部附近的下拉菜单中选择了**三次插值**算法选项。GIMP 中的三次插值与 Photoshop 中的双三次插值相同，因此这是在 GIMP
    中能获得的最高质量的采样方式。完成对话框参数设置后，点击 `缩放` 按钮，如图 9-19 所示，图像将下采样至如图 9-20 所示的尺寸。


    ![A978-1-4302-5786-8_9_Fig19_HTML.jpg](img/A978-1-4302-5786-8_9_Fig19_HTML.jpg)


    图 9-19. 使用 `图像 ➤ 缩放图像` 菜单序列将图像资源从 XHDPI 缩放至 MDPI


    注意图 9-20 中新图像的高质量下采样结果。现在你可以使用 `文件 ➤ 导出` 工作流程来导出新的 MDPI 数字图像资源。我同样展开了菜单并在图 9-20
    中展示了该选项，以便从一张截图中获得更多信息。


    ![A978-1-4302-5786-8_9_Fig20_HTML.jpg](img/A978-1-4302-5786-8_9_Fig20_HTML.jpg)


    图 9-20. 使用 `文件 ➤ 导出` 菜单序列导出 180 像素的 MDPI `ImageButton` 正常状态


    你将使用图 9-12 所示的 `导出图像` 对话框，使用完全相同的文件名保存此 MDPI 图像资源，但保存到不同的（`res/drawable-mdpi`）文件夹中，使其成为一个不同的文件，至少对于
    Android 而言是这样。Android 会在多个文件夹中使用相同的文件名！


    如果将文件导出到 XHDPI 文件夹，它将替换你的 360 像素资源，因此在此工作流程中务必非常小心。图 9-21 以蓝色高亮显示了相同的文件名，并在其正下方的
    `保存到文件夹：` 行中显示了不同的文件夹路径。


    ![A978-1-4302-5786-8_9_Fig21_HTML.jpg](img/A978-1-4302-5786-8_9_Fig21_HTML.jpg)


    图 9-21. 将 180 像素的 `imagebutton_normal.png` 资源导出到 `drawable-mdpi` 文件夹


    一切设置正确后，点击 `导出` 按钮，该文件将以正确的 180 像素分辨率创建在你的 MDPI 文件夹中。


    工作流程的下一步是使用图 9-22 所示的 `编辑 ➤ 撤销缩放图像` 菜单序列，撤销 2 倍下采样，返回到你的 XHDPI 分辨率图像。你应始终使用高分辨率图像源进行下采样，这样才能从三次算法中获得良好结果。


    ![A978-1-4302-5786-8_9_Fig22_HTML.jpg](img/A978-1-4302-5786-8_9_Fig22_HTML.jpg)


    图 9-22. 撤销 `缩放图像` 操作，返回到 360 像素的正常状态版本，以便获得更好的采样


    一旦返回到 360 像素的 XHDPI 源图像，你将需要为 LDPI 120 像素和 HDPI 240 像素的 `imagebutton_normal.png`
    图像资源重复图 9-18 至图 9-22 所示的工作流程。包含这两种采样操作设置的 `缩放图像` 对话框如图 9-23 所示，以确保你设置正确！


    ![A978-1-4302-5786-8_9_Fig23_HTML.jpg](img/A978-1-4302-5786-8_9_Fig23_HTML.jpg)


    图 9-23. 将正常状态资源缩放至 120 像素（LDPI）和 240 像素（HDPI），以创建正常状态资源


    接下来的步骤涉及使用你的其他三个图像状态资源重复此工作流程。这些资源包括 `imagebutton_pressed.png`、`imagebutton_focused.png`
    和 `imagebutton_hovered.png`。这三个 `ImageButton` 状态资源需要下采样为 LDPI、MDPI 和 HDPI 资源分辨率。这可以按你希望的任何顺序进行，只要最终全部完成即可。


    完成剩余下采样的第一步（除了图 9-18 到图 9-22 所示的步骤之外）是完全关闭 `imagebutton_normal.png` 360 像素资源，并且不要意外将其保存为任何其他（更低）分辨率。有两种方法可以做到这一点；我将向你展示如何冗余操作并同时使用这两种方法，这样你总能
    100% 确保不会意外“丢失”任何高分辨率源资源。


    第一种方法是始终使用 `编辑 ➤ 撤销缩放图像` 工作流程，如图 9-22 所示。第二种是使用 `文件 ➤ 关闭` 工作流程，如图 9-24 所示，并在对话框中选择
    `不保存关闭` 选项（如右侧所示），即使你使用了 `撤销缩放图像` 工作流程也是如此。这将确保你在工作流程开始时打开的高分辨率资源始终保持不变，因为你永远不要覆盖保存它！


    ![A978-1-4302-5786-8_9_Fig24_HTML.jpg](img/A978-1-4302-5786-8_9_Fig24_HTML.jpg)


    图 9-24. 关闭正常图像资源而不覆盖原始数据，以便你可以打开下一个状态


    接下来，让我们使用此工作流程关闭 `imagebutton_normal.png` 资源，打开其他资源之一，并按照图 9-18 至图 9-24 概述的工作流程，为该
    `ImageButton` 状态创建其他三个 DPI 分辨率资源。


    一旦你为所有四个 `ImageButton` 状态完成此操作，你应该会对创建用于 Android 应用开发的多状态 `ImageButton` 所涉及的数字图像合成和下采样工作流程有相当好的掌握。


    创建完所有 16 个多状态 `ImageButton` 资源后，你可以返回 Eclipse ADT，查看所有这些较小的 `ImageButton` 状态图像资源是否会给你带来更小的
    `ImageButton` UI 元素，或者你是否必须通过使用额外的 XML 参数来构建该问题的解决方案。

