    class is working properly. This final crowning line of Java code will call the
    `.setBackground()` method off of the `backgroundImage` `ImageView` object.


    Inside that method call, you will use the `new` keyword in order to instantiate
    an `ImageRoundingDrawable` object, using your constructor method, along with the
    `sourceImage` `Bitmap` object, as its sole passed-in parameter. This can all accomplished
    by using one very well constructed line of Java code, as shown in Figure [16-33](#A978-1-4302-5786-8_16_Chapter.html#Fig33).


