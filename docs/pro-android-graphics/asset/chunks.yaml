    )` method is shown in Figure [14-16](#A978-1-4302-5786-8_14_Chapter.html#Fig16)
    and looks like the following programming logic `onLongClickListener` event handling
    construct:


    `pag.setOnLongClickListener(new View.OnLongClickListener() }`


    `@Override`


    `public boolean onLongClick(View arg0) {`


    `frameAnimation.stop();`


    `return true;`


    `}});`


    Now, test your new event handled AnimationDrawable by using your Run As ➤ Android
    Application work process. When the application starts, click the PAG logo to start
    it animating. So far, so good. Next, long-click, or click and hold for a second
