    Click the plus icon next to the onDraw( ) method block of code in Eclipse, as
    shown in Figure [17-33](#A978-1-4302-5786-8_17_Chapter.html#Fig33), and open up
    the method so that you can edit the for loop and the canvas.drawCircle( ) method
    call that live inside it.


    Change the third data parameter from a value of 5 to a value of `25`, so that
    the method call looks like the following Java programming statement:


    `canvas.drawCircle(point.x, point.y, 25, paintScreen);`


    Once this is done, you’ll be ready to “wire up” your inkShader BitmapShader!


    ![A978-1-4302-5786-8_17_Fig33_HTML.jpg](A978-1-4302-5786-8_17_Fig33_HTML.jpg)


    Figure 17-33.


    Changing brush stroke width from 5 pixels to 25 pixels in the .onDraw( ) method’s
    .drawCircle( ) call


    Let’s close up your onDraw( ) method by clicking the minus sign, and open up the
    `SketchPadView( )` constructor method by clicking the plus sign. Next, you are
    going to replace the `paintScreen.setColor( )` method call with a call to set
    the BitmapShader inkShader object instead via the following code:


    `paintScreen.setShader(inkShader);`


    This wires up an `inkShader` BitmapShader object that contains a `paintImage`
    Bitmap object into your `paintScreen` Paint object, which is in turn used in the
    onDraw( ) method to create your paintbrush, and turns it into a `cloning tool`.
    As you can see in Figure [17-34](#A978-1-4302-5786-8_17_Chapter.html#Fig34), your
    code is error-free; thus, you are ready to have some fun cloning your cloudsky.jpg
    image asset via your Canvas object surface using fat 25 pixel brushstrokes, just
    like you’d do in GIMP.


    ![A978-1-4302-5786-8_17_Fig34_HTML.jpg](A978-1-4302-5786-8_17_Fig34_HTML.jpg)


    Figure 17-34.


    Changing a paintScreen.setColor( ) method call to a paintScreen.setShader(inkShader)
    method call


    This will essentially look like you are erasing the white (default) system screen
    background color and exposing the cloudsky image behind it. However, this is not
    in fact what is happening; actually you are painting using your Bitmap image source
    onto this white canvas surface.


    Let’s use the `Run As ➤ Android Application` menu sequence and launch the Nexus
    One emulator so you can see your `shader drawing pipeline` in action.


    Click the `MENU` button on the emulator, and select `The PAG SketchPad` menu item,
    and launch the SketchPad.java Activity subclass so that you can test your new
    code using the Nexus One AVD emulator one final time (we hope).


    When the white screen appears, draw a huge PAG to expose some of the pixel color
    data that is being `culled` from your Bitmap object using the Shader and BitmapShader
    classes. As you can see in Figure [17-35](#A978-1-4302-5786-8_17_Chapter.html#Fig35),
    I also played around with the appearance of exposing the image behind the white
    overlay, which, although this is not really what is happening, you could always
    use this perceived effect to your advantage if you wanted to in your own apps!


    ![A978-1-4302-5786-8_17_Fig35_HTML.jpg](A978-1-4302-5786-8_17_Fig35_HTML.jpg)


    Figure 17-35.


    Testing your InkShader and image cloning drawing feature using the Nexus One AVD
    emulator


    ## Summary


    In this seventeenth chapter, you learned how to leverage an `.onDraw( )` method
    in conjunction with the `Paint` and `Canvas` classes to create your own custom
    `SketchPad` graphics program in Android. We took a more detailed look at both
    the Canvas and the Paint classes. Then you coded your own drawing on a canvas
    pipeline to learn how to create interactive graphics applications using Paint,
    Canvas, onDraw( ), and onTouch( ) with some other key classes.


    Along the way you learned about some other important classes for graphics, including
    the `Context` class for providing the context for what you are doing to the Android
    OS, plus the `List` and `ArrayList` classes for creating `collections` (lists)
    and `arrays` of those collections.


    You also learned more about the `MotionEvent` class, which you later utilized
    for `movement tracking` and touch event data processing in the Android OS and
    in interactive applications (in this case, your `SketchPadView` View subclass).
    You learned how to create your own `custom View` subclass, just like you learned
    how to create a custom Drawable subclass back in [Chapter 16](#A978-1-4302-5786-8_16_Chapter.html).


    In the next chapter, we’ll switch back into digital video editing and optimization
    mode, which you were learning about back in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html)
    before we got sidetracked by all of this other really cool graphics pipeline coding.'
