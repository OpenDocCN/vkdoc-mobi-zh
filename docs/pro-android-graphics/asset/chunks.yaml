- fmt: '# The Animation Class: Your Procedural Animation Engine


    An Android `Animation` class is a direct subclass of the `java.lang.Object` master
    class, which means that it was scratch-coded specifically for the purpose of providing
    a procedural animation foundation for the Android OS. By scratch-coded I mean
    coded from scratch, or not based on any other existing code (classes, methods,
    interfaces, constants, etc.).


    The Android Animation Java class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.animation.Animation`


    The `Animation` class is a part of the `android.view.animation` package. Since
    this is the case, an `import` statement for an `Animation` class thereby references
    the `android.view.animation.Animation` package import path.


    An `Animation` object is instantiated in order to create interpolated `vector`
    or `procedural` animation. This type of animation does not use frames or bitmaps,
    but rather applies mathematical vectors or algorithms to existing `Drawable` objects
    to achieve effects such as scaling (resizing), rotation, alpha blending (alpha
    channel fading), and translations (X and Y movement).


    The `Animation` class is a `public abstract` class, which means that it is not
    meant to be used directly other than declaring `Animation` objects initially;
    it was created to be used to create other subclasses, such as the classes that
    we will be using during this chapter to implement 2D procedural animation special
    effects.


    So the `Animation` class has five direct subclasses that are of importance, all
    of which you will be learning about in detail during this chapter. Subclasses
    include `ScaleAnimation` for scaling `View` objects, `AlphaAnimation` for alpha
    blending (fading in and fading out) `View` (or `ViewGroup`) objects, `RotateAnimation`
    for rotating `View` objects, and finally, `TranslateAnimation` for moving `View`
    objects around on the screen.


    There is also a fifth `AnimationSet` subclass, which is much more complicated
    as it allows `composite animations` to be created using the other four types of
    `Animation` subclasses. The `AnimationSet` class and object allows sets, or grouping,
    and even sub-grouping, of `Animation` objects to form more complex hierarchies
    of procedural animation to allow virtually any result that you can imagine to
    be achieved.


    We’ll get into all of these during this chapter as you code your animation pipeline
    application, which will combine the frame animation that you coded in the previous
    chapter with procedural animation that you will code around it and on top of it
    during this chapter.


    You will implement many of these `Animation` class and subclass objects for your
    use within a digital image animation. You will add procedural animation “moves”
    to your splash screen animation using most of the Android `Animation` class subclasses,
    each of which you will learn about as you use them during your progression through
    this chapter on procedural animation in Android.


    ## TranslateAnimation Class: Animation Subclass for Moving


    Since this is the one procedural animation transform that we are not going to
    be implementing directly within this chapter, other than the “try this” suggested
    exercise section I’m going to put at the end of the chapter, we will cover this
    `Animation` subclass first, as it’s fairly straightforward.


    As mentioned, the Android `TranslateAnimation` class is a direct subclass of the
    `android.view.animation.Animation` abstract class. This class is used to animate
    movement in the X and Y coordinate directions around the screen of the user’s
    Android device. As such, it is very simple and yet extremely useful for a variety
    of purposes, from animated elements to moving things on and off of the user’s
    display screen.


    The Android `TranslateAnimation` Java class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.TranslateAnimation`


    The `TranslateAnimation` class is part of the `android.view.animation` package
    and, since this is the case, its `import` statement thus references the `android.view.animation.TranslateAnimation`
    package import path.


    The constructor method that you want to use to create a `TranslateAnimation` object
    takes the following format, as you’ll see later on in the chapter:


    `TranslateAnimation(float fromX, float toX, float fromY, float toY);`


    ## The ScaleAnimation Class: Animation Subclass for Scaling


    As you know, the Android `ScaleAnimation` class is another direct subclass of
    the `android.view.animation.Animation` abstract class. This class is used to scale
    `View` objects, again by using the X and Y coordinates in 2D space.


    The Android `ScaleAnimation` Java class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.ScaleAnimation`


    A `ScaleAnimation` class is also part of the `android.view.animation` package.
    Its `import` statement references the `android.view.animation.ScaleAnimation`
    package import path, as you’ll see in the next section when you use it to scale
    your PAG frame animation to make it look like it is coming out of the distance
    and landing in the center of your display screen.


    The constructor method that you want to use to create your `ScaleAnimation` object
    takes the following format, as you will see in the next section:


    `ScaleAnimation(float fromX, float toX, float fromY, float toY, int pivotXType,
    float pivotXValue, int pivotYType, float pivotYValue);`'
