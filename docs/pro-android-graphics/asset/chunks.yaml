- fmt: '# Digital Video Conventions: Bit Rates, Streams, SD, and HD


    You will be amazed (later on in this chapter) at some of the digital video data
    compression ratios that you will achieve using MPEG video file format, once you
    know exactly how to best optimize a digital video compression work process by
    using the correct bit rate, frame rate, and frame resolution for your digital
    video content. We’ll get into WebM video optimization more in [Chapter 18](#A978-1-4302-5786-8_1_Chapter.html)
    when I dedicate an entire chapter to advanced digital video data footprint optimization
    techniques and work processes.


    Since we finished the last section talking about resolution, let’s start out covering
    the primary resolutions used in commercial video. Before HD or High Definition
    came along, video was called SD or Standard Definition and used a standard pixel
    height (a vertical resolution) of 480 pixels.


    Commercial or broadcast video is usually in one of two aspect ratios: 4:3, used
    in the older tube TVs, and 16:9, used in the newer HDTVs. Let’s use the math that
    you learned in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html) to figure out the
    pixel resolution for the 4:3 SD broadcast video.


    480 divided by 3 is 160 x 4 is 640, so SD 4:3 video is VGA resolution, which is
    why I was using that particular resolution as an example in the previous chapter.
    There is also another 16:9 Wide SD resolution, which has become an entry-level
    screen resolution in Android touchscreen smartphones as well as in the smaller
    tablet form factor called mini-tablets.


    Let’s figure out what Wide SD resolution would be by again dividing 480 by 9 this
    time, giving us 53.4 times 16 is 854, so the new Wide SD smartphones and tablets
    feature an 854x480 “Wide SD” pixel screen dimension. This is largely so that the
    now-mainstream HD content can be downsampled directly from the 16:9 1920x1080
    to 1280x720, or to 854x480.


    HD Video comes in two resolutions: 1280x720, which I call Pseudo HD, and 1920x1080,
    which the industry calls True HD. Both are 16:9 aspect ratio and are now used
    not only in TVs and iTVs, but also in smartphones (Razor HD is 1280x720) and tablets
    (a Kindle Fire HD is 1920x1200, which is a less wide, or taller, 16:10 aspect
    ratio).


    There’s also 16:10 Pseudo HD resolution that features 1280x800 pixels. In fact,
    this is a common laptop, netbook, and mid-size tablet resolution. Generally, most
    developers try to match their video content resolutions to the resolution of each
    Android device that the video will be viewed upon.


    Regardless of the resolution you use for your digital video content, video can
    be accessed by your application in a couple of different ways. The way I do it,
    because I’m data optimization nuts, is captive to an application; that is, inside
    the Android application `APK` file itself, inside the `raw` data resource folder.
    We will be taking a look at this a little bit later.


    The other way to access video within your Android app is by using a remote video
    data server; in this case, the video is streamed right from the remote server
    over the Internet and onto your user’s Android device as the video is playing
    back in real time. Let’s hope your server doesn’t crash!


    Video streaming is more complicated than playing captive video data files because
    the Android device is communicating in real time with remote data servers and
    receiving video data packets as the video plays. Video streaming is supported
    via WebM on Android 4.0 and later devices, using the WebM format. We will not
    be using streaming video in this book until [chapter 19](#A978-1-4302-5786-8_19_Chapter.html),
    as it requires a remote video server; you’ll use captive video data so you can
    test your app!


    The last concept that we need to cover in this overview is the concept of bit
    rate. Bit rate is a key setting used in the video compression process, as a bit
    rate represents the target bandwidth data pipe size that is able to accommodate
    a certain amount of bits streaming through it every second.


    A slow data pipe in today’s Internet 2.0 (mobile devices telecommunication network)
    `IP` infrastructure is 768 kbits/s or 768 KBPS, and the video file compressed
    to fit through this “narrower” data pipe will thus have a lower quality level
    and will probably also need to have lower resolution to further reduce its total
    data footprint. The older 3G networks feature these slower types of video data
    transfer speed.


    It is important to note that an oversaturated (crowded) data pipe can turn fast
    data pipes into medium-fast or even slow data pipes, as more and more users try
    to access data through that data pipe during peak usage periods.


    A medium data pipe in today’s Internet 2.0 `IP` infrastructure is 1536 kbits/second
    (1.5 MBPS, or megabits per second). Notice that we are using bits here, and not
    bytes, so to calculate how many bytes per second this represents, divide by eight
    (eight bits in a byte). Thus, one megabit per second equals 128 kilobytes of data
    transferred per second, so one and a half megabits per second is 192 kilobytes
    per second.


    Older 3G networks deliver between 600 kbits/s and 1.5 mbits/s, so, on average,
    these will be 1.5 mbits/s and classified as a medium data pipe.


    A faster data pipe is at least 2048 kbits/s, or 2 mbits/s or 2 MBPS, and video
    compressed at this higher bit rate exhibits a higher visual quality level. More
    modern 4G networks claim to be between 3 and 6 mbits/s, although I would optimize
    assets for 4G to 2 mbits/s just to make sure that your video assets will still
    play back (that is, stream) very smoothly if for some reason the network is yielding
    only 2 MBPS.


    Note that home networks often feature much faster MBPS performance, often in the
    6 MBPS–24 MBPS range. Mobile networks are currently at 4G and have not yet achieved
    this bandwidth, so you will need to optimize for much more constricted data pipes
    in your Android graphics application development.


    Bit rate must also take into consideration CPU processing power within any given
    Android phone, making video data optimization even more challenging. This is because
    once the “bits” travel through a data-pipe, they also need to be processed and
    then displayed to the device display screen. In fact, any captive video asset
    included in your Android application `.APK` file only needs optimization for processing
    power. The reason this is the case is because if you use captive digital video
    assets, there is no data pipe for your video assets to travel through, and no
    data is transferred! Your video assets are right there, inside your `APK` file,
    ready for playback.


    This means that the bit rate for your digital video asset needs to be well optimized
    not only for bandwidth (or the `APK` file size, if you are using a captive digital
    video asset), but also in anticipation of variances in CPU processing power. Some
    single-core low-power embedded CPUs may not be able to decode the higher resolution,
    high bit rate digital video assets without dropping frames, so having a lower
    resolution, low bit rate digital video asset with ten times less data for a given
    CPU to process is a great idea.'
