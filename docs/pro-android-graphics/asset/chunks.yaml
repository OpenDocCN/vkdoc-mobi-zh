    \ which together define the bounds for creating a rectangle object.\n\nYour rectangle\
    \ object is defined using the pixel coordinates for its four edges (left, top,\
    \ right, bottom). A more accurate way to look at this for a pro graphics designer\
    \ is that you are really just defining the top-left (origin) corner for your rectangle\
    \ using the first two (left, top) values, and these are usually `(0,0)`, which\
    \ represents the origin of your screen.\n\nThe second set of values defines the\
    \ destination (bottom, right) corner for your rectangle, much like the way you\
    \ would draw it out on the screen as a selection area when you “drop” the right-bottom\
    \ corner (value), after you have defined the rectangular area that you require\
    \ for your graphic design work process.\n\nThe `Rect` and `RectF` data fields\
    \ can be accessed directly by using `.width()` and `.height()` method calls to\
    \ retrieve a rectangle object width or height. It is important to note that most\
    \ `Rect` or `RectF` class methods do not check to see that your values are in\
    \ a correct (left, top, right, bottom) order.\n\n## Defining Your `RectF` Object\
