  trans: '

    # 使用 ImageView 控件：图形处理的基石


    在将`ImageView` UI 控件添加到 `RelativeLayout` 容器之前，你需要先将数字图像资源放入各自对应的密度像素文件夹中。将 `bookmark0_240px.png`、`bookmark0_320px.png`、`bookmark0_480px.png`
    和 `bookmark0_640px.png` 分别复制到 `/res/drawable-ldpi`、`drawable-mdpi`、`drawable-hdpi`
    和 `drawable-xhdpi` 文件夹中。


    请注意，我使用的分辨率是每种像素密度目标 DPI 的两倍：240 是 120 DPI 的两倍（即 2 英寸大小），320 是 160 DPI 的两倍，480
    是 240 DPI 的两倍，640 是 320 DPI 的两倍。除图标外，你不需要为 XXHDPI（480 DPI）级别提供应用图像资源。


    如果你确实提供了 XXHDPI 图像资源，它需要是 960 像素。图 7-10 显示了你项目的资源 `drawable-ldpi` 文件夹，以及应用图标和第一个书签页面图像占位符（启动屏幕），这是在
    `bookmark0_240px.png` 文件被复制并重命名为 `bookmark0.png` 之后的样子。


    ![A978-1-4302-5786-8_7_Fig10_HTML.jpg](img/A978-1-4302-5786-8_7_Fig10_HTML.jpg)


    图 7-10. 将 `bookmark0_240px.png` 文件复制到 `/res/drawable-ldpi` 文件夹并重命名为 `bookmark0.png`


    在将全部四个图像文件复制并重命名到 Android 要求你为基于像素的资源提供的四个目标像素密度文件夹之后，你可以将 `<ImageView>` 子标签添加到你的
    `<RelativeView>` 父布局容器标签中，如图 7-11 所示。


    如果你愿意，你可以使用 `<` 键调出 `RelativeLayout` 子标签支持辅助对话框，或者直接输入 `<ImageView` 和 `/>` 起始与结束标签分隔符，然后使用
    `android:` 工作流程开始添加参数，以调出参数辅助对话框。


    无论你是通过辅助对话框找到参数，还是凭记忆直接输入（随着你成为更熟练的开发者，你会这样做），你需要添加的第一个参数是 `android:id` 参数，以便你能够从
    Java 代码中引用这个 `ImageView` 对象，从而在用户为不同页面添加书签时更改所使用的图像。你将使用描述性的 ID 值 `currentBookmarkImage`，因此这个
    ID 反映了 `ImageView` 的功能。


    接下来，添加必需的 `android:layout_width` 和 `android:layout_height` 参数，设置为 `wrap_content`，然后使用设置为
    `@drawable/bookmark0` 的 `android:src` 参数来设置图像的源文件引用。这将根据用户的 Android 设备规格，引用你位于
    LDPI、MDPI、HDPI 和 XHDPI drawable 文件夹中的 `bookmark0.png` 文件。


    另请注意，在图 7-11 中，当你输入源文件引用参数的 `android:src="@drawable/` 部分时，在输入 `/` 字符后，Eclipse
    将弹出一个辅助对话框，列出你当前项目中安装的所有 drawable 资源。


    ![A978-1-4302-5786-8_7_Fig11_HTML.jpg](img/A978-1-4302-5786-8_7_Fig11_HTML.jpg)


    图 7-11. 为 ID 和布局宽度与高度添加参数，并使用辅助对话框定位 `@drawable` 文件


    如果你之前复制的图像资源没有列出，你可能需要右键单击项目文件夹并选择 `Refresh` 命令。每当系统上的 Eclipse 正在运行（已启动）时添加资源，都需要执行此操作，这是为了让
    Eclipse ADT 知道你添加了 Eclipse 开发环境外部（尚不可见）的新资源。由于你使用 Windows 资源管理器或其他文件管理工具将这些资源添加到
    Eclipse 项目文件夹层次结构（结构）中，`Refresh` 命令将告诉 Eclipse 重建其对此新文件夹和/或资源文件结构的内部文件引用，以便它知道其中包含什么。


    接下来，你需要使用“图形布局编辑器”选项卡或 `Run As` ➤ `Android Application` 工作流程，查看你的初始 `ImageView`
    对象和参数如何与你当前的 `TextView` 对象和参数协同工作。


    正如你在图 7-12 中看到的，`ImageView` 对象在屏幕顶部与 `TextView` 对象重叠。如果你使用的是更简单的垂直方向 `LinearLayout`
    容器，这种情况就不会发生。


    由于你使用的是 `RelativeLayout` 容器，你需要提供参数来告诉你的 `ImageView` 对象你希望它如何相对于相邻的 `TextView`
    对象定位。那么，让我们添加更多参数吧！


    ![A978-1-4302-5786-8_7_Fig12_HTML.jpg](img/A978-1-4302-5786-8_7_Fig12_HTML.jpg)


    图 7-12. Nexus One 预览显示 `TextView` 和 `ImageView` 重叠


    在你使用 `Run As` ➤ `Android Application` 工作流程运行你的 Nexus One 模拟器后，你会注意到由于在此过程中使用了强制保存功能，你的
    `ImageView` 标签上出现了一条警告消息。现在将鼠标悬停在其上，你会看到 Eclipse 建议你为视障人士添加一个 `contentDescription`
    参数（出于无障碍目的）。如图 7-13 所示，我添加了这个参数。


    ![A978-1-4302-5786-8_7_Fig13_HTML.jpg](img/A978-1-4302-5786-8_7_Fig13_HTML.jpg)


    图 7-13. Eclipse `contentDescription` 警告消息和 `android:contentDescription` 引用 `@string/bmi`


    请确保你在 `/res/values` 文件夹中的 `strings.xml` 文件中使用以下标记添加一个 `<string>` 标签常量：


    ```

    <string name="bmi">Image of Currently Bookmarked Page</string>

    ```


    现在你可以处理 `ImageView` 和 `TextView` 对象的相对布局定位了。让我们添加 `android:layout_below` 参数，它告诉你的
    `ImageView` 对象将其自身布局在参数中引用的对象下方；在本例中，引用的是 `@+id/currentBookmarkText`。


    这是你需要为 `TextView` 对象提供 ID 参数的另一个原因：这样你就可以使用相对布局对齐参数，通过其 ID 将布局中的其他对象与 `TextView`
    对齐。


    同时，让我们缩小 `ImageView` 对象 UI 控件容器内的图像内容，使其不触及竖屏布局的边缘，就像你在 Nexus One 模拟器中看到的那样。实现此目的的最佳方法是添加一个
    `android:layout_margin` 参数，它不仅能将 `ImageView` 推离屏幕边缘，还能将其从屏幕顶部的 `TextView` UI 元素处向下推开，从而为屏幕
    UI 设计提供更好的间距效果。这次使用值 `9dp`，如图 7-14 所示，以演示你可以使用 `9dip` 或 `9dp`，两者在你的 XML 标记中都能很好地工作。


    ![A978-1-4302-5786-8_7_Fig14_HTML.jpg](img/A978-1-4302-5786-8_7_Fig14_HTML.jpg)


    图 7-14. 添加参数以纠正 `TextView` 和 `ImageView` 重叠，并围绕 `ImageView` 添加间距


    接下来，你将添加一个 `android:layout_centerHorizontal` 参数并将其值设置为 `true`。正如你在图 7-12 中看到的，你的
    `ImageView` 在竖屏布局中已经居中，但当用户将设备横过来时，`ImageView` 将位于屏幕左侧。因此，对于你当前的竖屏设计，这个参数是多余的，但为了同时支持竖屏和横屏方向，它却可以成为救星！


    这种设计正是我在第 5 章中谈到的；你需要跨越所有不同的设备、密度和方向进行思考。

    '
- fmt: 'Finally, you’ll add an advanced parameter called `android:clickable` and set
    it to a value of `true` because later on you will want to allow your user to click
    the image of the bookmarked page and go to that page immediately. So you’ll use
    some foresight, adding a tag parameter now, while you are here learning about
    some of these `ImageView` parameters. The new parameters you have just added can
    be seen in Figure [7-15](#A978-1-4302-5786-8_7_Chapter.html#Fig15).


    ![A978-1-4302-5786-8_7_Fig15_HTML.jpg](A978-1-4302-5786-8_7_Fig15_HTML.jpg)


    Figure 7-15. Adding parameters to make `ImageView` clickable and to center horizontally
    in landscape layouts


    Now you’re ready to again use your `Run As ➤ Android Application` work process
    and see how your user interface design looks with the dropshadowed `TextView`
    and centered `ImageView` underneath it.


    As you can see in Figure [7-16](#A978-1-4302-5786-8_7_Chapter.html#Fig16), it
    looks very clean. All you have to do now is to test your UI design in the landscape
    orientation by turning your Nexus One emulator 90 degrees sideways and see if
    your new user interface design stays just as professional!


    Before you do that, there is one other detail that I want to add to the `ImageView`.
    Since you drop shadowed the `TextView`, you should also have the same effect on
    your `ImageView`, at 45 degrees under the left bottom side of the 3D hoop. Let’s
    type in `android:` to take a look at the parameter list, and see if you can find
    the `android:shadow` parameters so that you can add the drop shadow to the `ImageView`
    object as well.


    Although the `ImageView` has about 100 parameters, it does not seem to support
    the `android:shadow` parameters that the `TextView` supports yet. I am sure at
    some point in the future this will be added, but this is not an easy feature to
    support, given that Android can’t just simply drop shadow the `ImageView` container,
    which is square, and would be much easier.


    ![A978-1-4302-5786-8_7_Fig16_HTML.jpg](A978-1-4302-5786-8_7_Fig16_HTML.jpg)


    Figure 7-16. Testing your layout so far in the Nexus One emulator


    To correctly drop shadow this `ImageView` object, Android would have to look at
    the source image reference in the `ImageView` object and then incorporate (generate)
    the drop shadow effect based on the alpha channel (that image’s transparency).


    This is where Android’s flexibility in allowing developers to use external software
    such as GIMP 2.8.6 or Lightworks 11.1 becomes very valuable. What you are going
    to have to do to achieve this matching drop shadow effect for your `ImageView`
    is to go into GIMP and create it using that program’s tools.


    I’ll do that later on in this chapter; after all, this is a Pro Graphics book
    so you’ll go through the work process in GIMP of how to create a drop shadow effect
    for your image asset instead of creating it using an Android `ImageView` parameter.
    You’ll learn how to create semi-translucent alpha data while you’re at it, just
    to make sure you learn the most advanced techniques!


    Next, you’re going to take a look at how to turn your Nexus One emulator 90 degrees
    to achieve a landscape orientation. You will do this so you can test your UI to
    see how it looks in a landscape orientation.


    ## Testing Your UI Design in the Nexus One Landscape Mode


    Next, you are going to learn the keyboard shortcuts that will turn your Nexus
    One emulator from portrait orientation to landscape orientation, so I hope you
    still have it running on your screen! If not, fire it up again!


    The keyboard shortcut on Windows to toggle an emulator between landscape and portrait
    uses the (left side) Control or `CTRL` key modifier along with the `F11` function
    key. So hold down the `CTRL` key on the left side of your keyboard and then (while
    it is still being held down) tap the `F11` key and voila, your emulator will rotate
    right there in front of your eyes.


    Use `CTRL-F12` to rotate the display back to portrait orientation. As you can
    see in Figure [7-17](#A978-1-4302-5786-8_7_Chapter.html#Fig17), your `android:layout_centerHorizontal`
    works very well in landscape orientation and you have just as attractive a layout
    in that orientation as you do in portrait orientation.


    ![A978-1-4302-5786-8_7_Fig17_HTML.jpg](A978-1-4302-5786-8_7_Fig17_HTML.jpg)


    Figure 7-17. Switching the Nexus One emulator into Landscape mode to test the
    `centerHorizontal` parameter


    If you are using an Apple Macintosh, the `Command` key plus the `7` on the numeric
    keypad mimics the `CTRL-F11` on Windows and the `Command` plus the `9` on the
    numeric keypad mimics the `CTRL-F12` on Windows. Some users online claim that
    other keystrokes also work on Macintosh, such as `CTRL+FN+F11` or `CTRL+Command+F11`
    and `CTRL+FN+F12` or `CTRL+Command+F12`, so just experiment.


    If you are using the Linux OS, use `CRTL-F11`, just like you do in Windows. It
    is important to note that `CRTL-F11` means “switch forward” and `CRTL-F12` means
    “switch back,” so both keystroke combinations may work as a toggle between the
    portrait and landscape orientations.'
