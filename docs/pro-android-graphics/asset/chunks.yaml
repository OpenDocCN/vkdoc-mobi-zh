  trans: '

    # 动画类：你的程序化动画引擎


    Android 的 `Animation` 类（动画类）是主类 `java.lang.Object` 的直接子类，这意味着它是专门为 Android 操作系统提供程序化动画基础而从头编写的。这里所说的“从头编写”，是指从零开始编码，并非基于任何其他现有代码（如类、方法、接口、常量等）。


    Android 动画 Java 类的层次结构如下所示：


    `java.lang.Object`


      `> android.view.animation.Animation`


    `Animation` 类属于 `android.view.animation` 包的一部分。正因如此，`Animation` 类的 `import` 语句引用的就是
    `android.view.animation.Animation` 包的导入路径。


    实例化一个 `Animation` 对象是为了创建插值的`矢量`或`程序化`动画。这种类型的动画不使用帧或位图，而是将数学矢量或算法应用于现有的`Drawable`对象，以实现缩放（调整大小）、旋转、Alpha
    混合（Alpha 通道淡出）和平移（X 和 Y 轴移动）等效果。


    `Animation` 类是一个 `public abstract`（公有抽象）类，这意味着除了最初声明 `Animation` 对象之外，它不应被直接使用；它被创建出来是为了用于创建其他子类，例如我们将在本章中用来实现
    2D 程序化动画特效的那些类。


    因此，`Animation` 类有五个重要的直接子类，你将在本章中详细了解它们。这些子类包括用于缩放 `View` 对象的 `ScaleAnimation`、用于对
    `View`（或 `ViewGroup`）对象进行 Alpha 混合（淡入和淡出）的 `AlphaAnimation`、用于旋转 `View` 对象的 `RotateAnimation`，以及最后用于在屏幕上移动
    `View` 对象的 `TranslateAnimation`。


    还有第五个子类 `AnimationSet`，它要复杂得多，因为它允许使用其他四种类型的 `Animation` 子类创建`复合动画`。`AnimationSet`
    类和对象允许对 `Animation` 对象进行集合或分组，甚至进行子分组，以形成更复杂的程序化动画层次结构，从而实现你能想象到的几乎任何效果。


    在本章中，当你编写动画管线应用程序时，我们将深入了解所有这些内容。这个应用程序将把你在前一章中编写的帧动画与你在本章中将在其周围及其之上编写的程序化动画结合起来。


    你将在数字图像动画中实现许多 `Animation` 类及其子类对象。你将使用大多数 Android `Animation` 类的子类，为你的启动画面动画添加程序化动画“移动”，在你在本章中逐步学习
    Android 程序化动画的过程中，你将了解你所使用的每一个子类。


    ## TranslateAnimation 类：用于移动的动画子类


    由于这是我们不会在本章中直接实现的一个程序化动画变换（除了我将在本章末尾放置的“试试这个”建议练习部分之外），我们将首先介绍这个 `Animation` 子类，因为它相当直接明了。


    如前所述，Android 的 `TranslateAnimation` 类是 `android.view.animation.Animation` 抽象类的一个直接子类。该类用于在用户
    Android 设备的屏幕上，沿 X 和 Y 坐标方向为移动设置动画。因此，它非常简单，但对各种目的都极为有用，从为元素设置动画到将物体移入或移出用户的显示屏。


    Android 的 `TranslateAnimation` Java 类层次结构如下所示：


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.TranslateAnimation`


    `TranslateAnimation` 类是 `android.view.animation` 包的一部分，正因如此，它的 `import` 语句引用了
    `android.view.animation.TranslateAnimation` 包的导入路径。


    你想要用来创建 `TranslateAnimation` 对象的构造方法采用以下格式，你将在本章后面看到：


    `TranslateAnimation(float fromX, float toX, float fromY, float toY);`


    ## ScaleAnimation 类：用于缩放的动画子类


    如你所知，Android 的 `ScaleAnimation` 类是 `android.view.animation.Animation` 抽象类的另一个直接子类。该类用于缩放
    `View` 对象，同样是通过使用 2D 空间中的 X 和 Y 坐标。


    Android 的 `ScaleAnimation` Java 类层次结构如下所示：


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.ScaleAnimation`


    `ScaleAnimation` 类同样是 `android.view.animation` 包的一部分。它的 `import` 语句引用了 `android.view.animation.ScaleAnimation`
    包的导入路径，你将在下一节中使用它来缩放你的 PAG 帧动画，使其看起来像从远处出现并落在显示屏中心时看到的那样。


    你想要用来创建 `ScaleAnimation` 对象的构造方法采用以下格式，你将在下一节中看到：


    `ScaleAnimation(float fromX, float toX, float fromY, float toY, int pivotXType,
    float pivotXValue, int pivotYType, float pivotYValue);`

    '
- fmt: '# Scaling Up Your Logo: Using the `ScaleAnimation` Class


    Now it is time to fire up Eclipse and add procedural scaling animation to your
    PAG logo frame animation, exactly like you did in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html)
    using XML.


    Open your `MainActivity.java` code, in a tab in Eclipse’s central editing pane,
    and declare an `Animation` object named `scaleZeroToFullAnimation` right after
    your `AnimationDrawable` object declaration, as shown in Figure [15-1](#A978-1-4302-5786-8_15_Chapter.html#Fig1).


    ![A978-1-4302-5786-8_15_Fig1_HTML.jpg](A978-1-4302-5786-8_15_Fig1_HTML.jpg)


    Figure 15-1. Declaring your `scaleZeroToFullAnimation` Animation object at the
    top of your `MainActivity.java` Activity


    As you can see, you have not added the Import statement for the `Animation` class
    to your code, so mouse-over the wavy red error highlight and select the `Import
    Animation (android.view.animation package)` option so that ADT will write the
    `Import android.view.animation.Animation` Java statement for you. Now that you
    have declared and named your `Animation` object for use, you can initialize it
    inside your `setUpAnimation()` method.


    Next, add in a line of space after your `frameAnimation` `AnimationDrawable` initialization
    statement, and add a similar statement to initialize your now-declared `scaleZeroToFullAnimation`
    object, using the following single line of Java code:


    ```

    scaleZeroToFullAnimation = new ScaleAnimation();

    ```


    As you can see in Figure [15-2](#A978-1-4302-5786-8_15_Chapter.html#Fig2), there
    is some wavy red error highlighting to investigate! Let’s mouse-over the `ScaleAnimation()`
    constructor method, and select the `Import ScaleAnimation (android.view.animation
    package)` option.


    As you can see once you select that option, this does not remove this wavy red
    error highlighting; however, it does write an Import statement for you!


    ![A978-1-4302-5786-8_15_Fig2_HTML.jpg](A978-1-4302-5786-8_15_Fig2_HTML.jpg)


    Figure 15-2. Instantiating a `scaleZeroToFullAnimation` `Animation` object using
    a new `ScaleAnimation()` constructor


    The reason that the wavy red error highlighting does not go away (in fact, all
    that changes is the pop-up helper’s suggestion) is because you need to pass parameters
    (variables) into this constructor method outlining how you want this object to
    be constructed (configured initially, if you will).


    Let’s add float values; I used `0` (0%), and `1` (100%), for the `fromX` and `toX`
    parameter values and the same values for `fromY` and `toY` parameters, as shown
    in Figure [15-3](#A978-1-4302-5786-8_15_Chapter.html#Fig3). You should also specify
    `constants` and `float` values of `0.5f`, or 50% for each of these `pivotX` and
    `pivotY` parameter value positions. Notice that float value positions will accept
    integer values and convert them for you.


    ![A978-1-4302-5786-8_15_Fig3_HTML.jpg](A978-1-4302-5786-8_15_Fig3_HTML.jpg)


    Figure 15-3. Configuring a `ScaleAnimation()` constructor method call with scale
    variables and pivot point constants


    The scaling constant that you are using for both X and Y pivot points is the `Animation`
    class’s `RELATIVE_TO_SELF` constant, called off the `Animation` class reference
    using dot notation (`Animation.RELATIVE_TO_SELF`) using the following single (if
    you use a widescreen display) line of code:


    ```

    scaleZeroToFullAnimation = new ScaleAnimation(0, 1, 0, 1, Animation.RELATIVE_TO_SELF,
    0.5f, Animation.RELATIVE_TO_SELF, 0.5f);

    ```


    The next thing that you need to specify is the `duration` for the scaling to occur
    over, because if you compile and run your application now, nothing will happen,
    although the Java code as-is will not in fact crash your emulator.


    This is done using the `Animation` class’s `.setDuration()` method, called off
    of your `scaleZeroToFullAnimation` `Animation` object (which you might remember
    was actually initialized as being a `ScaleAnimation` object; confused yet?), using
    the following short but powerful Java programming statement:


    ```

    scaleZeroToFullAnimation.setDuration(5000);

    ```


    I am using a data value of `5000 milliseconds`, or five seconds, as shown in Figure
    [15-4](#A978-1-4302-5786-8_15_Chapter.html#Fig4). I am using this time value so
    that you can see the logo scaling happen over a reasonably long duration of elapsed
    time.


    ![A978-1-4302-5786-8_15_Fig4_HTML.jpg](A978-1-4302-5786-8_15_Fig4_HTML.jpg)


    Figure 15-4. Specifying the scaling operation duration using the `.setDuration()`
    method, using a value of 5000 milliseconds


    This next step is what throws developers for a loop (no pun intended): how exactly
    do you apply this procedural animation to your frame animation? The answer is
    by using your `ImageView`, as the `ImageView` will contain (hold) your frame animation,
    but you will procedurally animate that `ImageView` UI container itself, with the
    frame animation running inside it.


    I think the tendency of developers in trying to solve this "animation type combination
    problem" would be to try to somehow reference (or wire up) the frame animation
    object to the procedural animation object, or vice versa.


    As you can see in Figure [15-5](#A978-1-4302-5786-8_15_Chapter.html#Fig5), you''ve
    already installed your `frameAnimation` `AnimationDrawable` configured inside
    of the `pag` `ImageView` object using the `pag.setImageDrawable(frameAnimation)`
    Java code statement, so now you will utilize a `.startAnimation()` method called
    off the exact same `pag` `ImageView` object, wiring it up to the `scaleZeroToFullAnimation`
    `ScaleAnimation` object using the following short but critical (pivotal) Java
    code statement:


    ```

    pag.startAnimation(scaleZeroToFullAnimation);

    ```


    As you can see in Figure [15-5](#A978-1-4302-5786-8_15_Chapter.html#Fig5), Eclipse
    has no problems with this code, so let''s go ahead and test it, and see if you
    can get procedural animation to affect your frame animation using the `ImageView`
    UI element as a go-between.


    ![A978-1-4302-5786-8_15_Fig5_HTML.jpg](A978-1-4302-5786-8_15_Fig5_HTML.jpg)


    Figure 15-5. Setting the `ScaleAnimation` `scaleZeroToFullAnimation` `Animation`
    object to scale using `.startAnimation()`


    Use the `Run As ➤ Android Application` work process to launch the Nexus One emulator,
    and run and test your application (see Figure [15-6](#A978-1-4302-5786-8_15_Chapter.html#Fig6)).
    When you click the logo, it disappears into the distance immediately, as expected,
    and then animates in from your horizon, scaling up, and spinning in, exactly like
    it did in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html) when you implemented
    this cool special effect using XML markup for the most part. Here you did the
    entire special effect using only Java code, and you''re not done yet, not by a
    long shot!


    In case you are wondering why you haven''t added some of the parameters to the
    `ScaleAnimation` object that you did in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html),
    it is because you are going to add these to the `AnimationSet` later in the chapter
    as this is more efficient. Once you learn about those methods, you can add them
    to your `ScaleAnimation` (locally), simply by calling them off of your object''s
    name; this can be done at the local level to fine-tune component parts of your
    aggregate special effect, or if all of the component parts use the same offsets
    and interpolators, it can all be done using the `AnimationSet`.


    ![A978-1-4302-5786-8_15_Fig6_HTML.jpg](A978-1-4302-5786-8_15_Fig6_HTML.jpg)


    Figure 15-6. Testing the `ScaleAnimation` in the Nexus One emulator


    The next thing you did in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html) was
    to add an alpha blending effect to make this coming-in-from-the-distance special
    effect even more realistic. You accomplished this by additionally fading the scaling,
    spinning logo by using alpha blending in Android, which is also supported in the
    `Animation` classes and package, as you will see in the next two sections of the
    chapter.'
