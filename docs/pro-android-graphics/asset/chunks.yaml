  trans: '

    # 使用 XML 标记实现你的九宫格资源


    要让 XML 标记能够引用这张 9-patch PNG 图像资源，你首先要做的事情就是将其安装到正确的项目文件夹层级位置中，也就是 Android 操作系统会查找
    9-patch 图像资源的位置。


    进入你的 NinePatch 资源文件夹，也就是你刚才操作的那个文件夹，如图 10-13 所示。右键单击截图中高亮显示的 `NinePatchFrame.9.png`
    文件，然后选择 **复制** 选项，将该文件复制到系统剪贴板中。


    接下来，使用左侧的导航窗格，导航到 `/workspace` 文件夹和 `/GraphicsDesign` 项目子文件夹，最后进入 `/res`（资源）子文件夹和
    `/drawable` 子文件夹，如图 10-14 所示。然后只需右键单击 `/res/drawable` 文件夹并选择 **粘贴** 选项。这会将 `NinePatchFrame.9.png`
    文件的副本放置到该位置。


    ![A978-1-4302-5786-8_10_Fig14_HTML.jpg](img/A978-1-4302-5786-8_10_Fig14_HTML.jpg)


    **图 10-14.** 使用复制 + 粘贴将 `NinePatchFrame.9.png` 文件的副本放入你的 drawable 资源文件夹


    由于 Android 操作系统要求资源文件名只能使用小写字母、数字和下划线，接下来你需要将 9-patch 图像资源文件重命名为全部使用小写字母和数字的形式，即
    `ninepatchframe.9.png`，如图 10-15 所示。


    ![A978-1-4302-5786-8_10_Fig15_HTML.jpg](img/A978-1-4302-5786-8_10_Fig15_HTML.jpg)


    **图 10-15.** 右键单击并使用重命名命令将文件重命名为仅包含小写字符的名称


    现在，你可以使用父标签中的 `android:background` 参数，将 9-patch 图像资源添加到你的目录活动 UI 设计的 `LinearLayout`
    容器中，如下面的 XML 标记所示，如图 10-16 所示：


    ```

    android:background="@drawable/ninepatchframe"

    ```


    同样在图 10-16 中显示的还有刷新操作，你必须执行此操作，以便 Eclipse ADT 能够“看到”你添加到 `/res/drawable` 文件夹中的新
    9-patch 资源。那么我们也来执行此操作：右键单击 `GraphicsDesign` 项目文件夹，然后从菜单中选择 `Refresh` 选项。


    完成此操作后，9-patch 图像资源将在你的项目文件夹层级中可见。在本章稍后的图 10-17 中，你将看到你的 9-patch 资源被用作装饰性 UI 布局容器
    3D 框架图形设计元素时的样子。


    ![A978-1-4302-5786-8_10_Fig16_HTML.jpg](img/A978-1-4302-5786-8_10_Fig16_HTML.jpg)


    **图 10-16.** 添加 `android:background` 参数以引用 `ninepatchframe` 9-patch 资源并执行刷新


    让我们点击 XML 编辑窗格底部的 **图形布局编辑器** 选项卡，看看 GLE 是否能够“渲染” 9-patch 资源，因为有一些图形设计元素（例如 PorterDuff
    混合模式）是 GLE 无法预览的。


    正如你在图 10-17 中所见，图形布局编辑器窗格完美地渲染了 9-patch 资源，因此 GLE 确实可以向你展示 9-patch 图像资源在你的应用程序中的显示效果。这太棒了！因此，你可以在
    9-patch 工作流程中使用 GLE，而无需每次想要查看 9-patch 图像资源如何作为图形设计元素工作时都启动模拟器！


    如图 10-17 所示，你创建的 9-patch 图像资源作为目录 UI 设计的装饰性框架元素效果很好，看起来相当不错。唯一的问题是，你的 9-patch
    资源定义的中央（内边距）区域导致一些较长的文本 UI 元素换行，因此你需要添加一些 XML 参数，将这些文本的字体大小略微调小，以避免这种换行现象。


    ![A978-1-4302-5786-8_10_Fig17_HTML.jpg](img/A978-1-4302-5786-8_10_Fig17_HTML.jpg)


    **图 10-17.** 使用图形布局选项卡在父级 `LinearLayout` 容器中预览你的 9-patch 资源


    为此，你需要添加一个 `android:textSize` 参数，并将值设置为 13 标准像素 (`13sp`)，以略微减小你的 `TextView` UI
    元素的字体大小。在每个 `TextView` 标签中使用以下参数：


    ```

    android:textSize="13sp"

    ```


    一旦你将此参数添加到每个 `TextView` 标签中，你所有的文本元素都将具有相同的大小，并完美地适配在你的 9-patch 框架内。


    图 10-18 显示了在两个嵌套的（子标签）`LinearLayout` 容器内部，经过修改的 `TextView` 子标签。请记住，保持你的 `textSize`
    参数值一致，这样目录中的文本看起来才会统一。用户能够察觉到 UI 设计中微小的字体大小差异，并将其视为设计缺陷，从而认为你的应用程序不够专业。因此，请在所有八个
    `TextViews` 中使用相同的 `SP` 值。我使用了 `13sp` 来使文本尽可能大。


    ![A978-1-4302-5786-8_10_Fig18_HTML.jpg](img/A978-1-4302-5786-8_10_Fig18_HTML.jpg)


    **图 10-18.** 在嵌套的 `LinearLayout` 容器中的八个 `TextView` 标签内添加 `android:textSize` 参数


    现在你可以在图形布局编辑器选项卡中预览新的字体大小了。点击编辑窗格底部的选项卡，确保字体大小允许所有 `TextView` 对象适配在你本章中添加的装饰性
    9-patch UI 布局框架内。


    接下来，让我们看看 9-patch 资源在 Nexus One 模拟器中是什么效果，以了解它在真实 Android 手机上的显示效果。使用 **运行方式 ➤
    Android 应用程序** 工作流程来启动你的 AVD Nexus One 模拟器，并确保你的 `TextView` 字体大小、9-patch 图像资源背景以及多状态
    `ImageButton` 都无缝地协同工作。


    正如你在图 10-19 中所见，你的 UI 布局容器周围的 9-patch 图像资源框架看起来很棒，`TextView` UI 元素的大小非常适合目录，并且你的多状态
    `ImageButton` 完美地合成在一起，相对于 UI 布局设计的平衡性而言，仍然位置美观。正如你在截图右侧所见，`ImageButton` 在 UI
    设计中仍然功能正常。


    ![A978-1-4302-5786-8_10_Fig19_HTML.jpg](img/A978-1-4302-5786-8_10_Fig19_HTML.jpg)


    **图 10-19.** 在已放置 9-patch 资源的 Nexus One 模拟器中测试目录 UI 设计


    接下来需要测试的是，当 UI 设计的形状发生变化时，你的 9-patch 图像资源将如何重新调整自身形状。这可以通过将你的 Nexus One UI 布局从竖屏模式切换到横屏模式来实现。在
    Android 模拟器软件中，这是通过使用键盘上的 Control 键（左侧的那个）和 F11 功能键组合（作为按键组合）来完成的。


    要调用此按键组合，请按住 PC 键盘上的左 Control (CRTL) 键，同时按下 F11 功能键。将来，我会将此表示为 `CTRL-F11` 按键组合。

