- fmt: '# Installing a Video Asset in Android: Using the Raw Folder


    Next, to use this digital video asset in your GraphicsDesign application you must
    install this MP4 digital video asset file into the proper folder in your `/res`
    resources folder in your Android project folder hierarchy, which was shown in
    Figure [2-7](#A978-1-4302-5786-8_2_Chapter.html#Fig7). Digital video and other
    “developer compressed” assets that you do not want Android to “touch” or compress
    further are kept in a `/res/raw` folder. Since that folder doesn’t exist, you’ll
    need to create it, so right-click the `/res` folder and select a New ➤ Folder
    option. You can see the progression in Figure [2-30](#A978-1-4302-5786-8_2_Chapter.html#Fig30)
    (I left each selected in blue).


    ![A978-1-4302-5786-8_2_Fig30_HTML.jpg](A978-1-4302-5786-8_2_Fig30_HTML.jpg)


    Figure 2-30. Right-clicking the `/res` folder and selecting a New ➤ Folder menu
    sequence to create the `/res/raw` folder


    In a New Folder dialog, specify the raw folder name, shown in Figure [2-31](#A978-1-4302-5786-8_2_Chapter.html#Fig31).


    ![A978-1-4302-5786-8_2_Fig31_HTML.jpg](A978-1-4302-5786-8_2_Fig31_HTML.jpg)


    Figure 2-31. Using the New Folder dialog to specify a `GraphicsDesign/res/raw`
    path


    Find the MP4 you created in Squeeze, and copy it, as shown in Figure [2-32](#A978-1-4302-5786-8_2_Chapter.html#Fig32).


    ![A978-1-4302-5786-8_2_Fig32_HTML.jpg](A978-1-4302-5786-8_2_Fig32_HTML.jpg)


    Figure 2-32. Finding the MP4 file generated with Squeeze and right-clicking to
    copy and paste it into the `/res/raw` folder


    Put the MP4 in `/res/raw`, and name it `pag480portrait`, shown in Figure [2-33](#A978-1-4302-5786-8_2_Chapter.html#Fig33).


    ![A978-1-4302-5786-8_2_Fig33_HTML.jpg](A978-1-4302-5786-8_2_Fig33_HTML.jpg)


    Figure 2-33. Pasting the file into the `/workspace/GraphicsDesign/res/raw` folder
    and renaming it `pag480portrait`


    Finally, right-click the GraphicsDesign project folder and use a Refresh command
    to update Eclipse regarding this asset that you installed external to the IDE,
    so it will “see” it. Now that the digital video MPEG4 asset is in the `/res/raw`
    folder, you can write the Java code that will reference it.


    ## Referencing the Video Asset in Your Android Application


    The time has come to write code in the `onCreate()` method that you looked at
    earlier in the chapter! So, click the `MainActivity.java` tab at the top of Eclipse,
    and let’s start creating Java objects and wiring them together so that they do
    something cool. If `MainActivity.java` is not open currently, find it in the `/src`
    folder, left-click it, and press the F3 function key, or right-click it and select
    the Open menu option.


    The first thing that you need to do is to instantiate your `VideoView` object,
    which you defined in your `activity_main.xml` file and which will hold digital
    video, for playback using the `MediaPlayer` class, which you learned about in
    the first part of this chapter. This is done by declaring a `VideoView`, and then
    naming it `splashScreen`, and finally, using a `findViewById()` method to reference
    the `splashScreenVideoView` `<VideoView>` XML (object ID) definition or configuration,
    whichever way you wish to look at it. This is done using the following single
    line of Java code, and is also shown in Figure [2-34](#A978-1-4302-5786-8_2_Chapter.html#Fig34):


    ```

    VideoView splashScreen = (VideoView)findViewById(R.id.splashScreenVideoView);

    ```


    Figure 2-34. Instantiating a `VideoView` object named `splashScreen` and mousing-over
    the Import VideoView option


    Next, create a URI object using the Android `Uri` class, and name it `splashScreenUri`,
    and load it with the path to a digital video asset in much the same way that you
    did with your `VideoView`. This is done using the following code, and is also
    shown in Figure [2-35](#A978-1-4302-5786-8_2_Chapter.html#Fig35):


    ```

    Uri splashScreenUri = Uri.parse("android.resource://"+getPackageName()+"/"+R.raw.pag480portrait);

    ```


    Figure 2-35. Instantiating a `Uri` object named `splashScreenUri` and using a
    `Uri.parse()` method call to specify a path


    A URI is similar to the URL that you are familiar with using over the HTTP internet
    protocol, and is used in Android OS in a similar way to reference a data path
    to a resource. As you can see in Figure [2-35](#A978-1-4302-5786-8_2_Chapter.html#Fig35),
    both of the last two lines of code that you just wrote have wavy yellow warning
    highlighting under the object names, which is because you haven’t utilized either
    object definition as of yet. The next line of code that “wires” these two objects
    together, using the `.setVideoURI()` method call, will rectify this problem.


    As you can see in Figure [2-36](#A978-1-4302-5786-8_2_Chapter.html#Fig36), calling
    a `.setVideoURI()` method off of the `splashScreen` `VideoView` object and then
    passing it the `splashScreenUri` `Uri` object as the parameter for the method
    call indeed rectifies these warning highlights and eliminates them, so use the
    following line of Java code:


    ```

    splashScreen.setVideoURI(splashScreenUri);

    ```


    Now you’ve created your `VideoView` and wired in (referenced) your video asset,
    but you still cannot play it because you have to utilize the `MediaPlayer` in
    order to accomplish that. So let’s set up a `MediaController` object next.


    Figure 2-36. Using `.setVideoURI()` method to configure `splashScreen` `VideoView`
    to reference `splashScreenUri` `Uri`


    You’ll instantiate a `MediaController` by declaring a `MediaController` object,
    naming it `splashScreenMediaController`, and then using the Java `new` keyword
    and calling the `MediaController()` constructor method using the current app context,
    passed as a parameter, in the form of the Java keyword `this`.


    You will be learning all about the Android `Context` class in great detail a bit
    later on in this book. A `MediaController` object can be instantiated by using
    the following single line of Java code:


    ```

    MediaController splashScreenMediaController = new MediaController(this);

    ```'
