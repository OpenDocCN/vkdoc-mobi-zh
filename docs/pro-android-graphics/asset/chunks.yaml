    # 总结


    在本第一章中，我通过涵盖图形设计与数字成像的一些关键基础原则，并确保你已安装并更新了最新的 Java SDK 和 Android ADT SDK，为本书后续章节奠定了基础，以便我们能够开始编写图形设计代码。


    本章中的大多数概念同样适用于数字视频、2D 与 3D 动画以及特效制作。因此，在接下来的几章中你无需重复学习这些知识，但此刻理解它们至关重要。


    我们首先了解了当前 Android 操作系统支持的各类数字图像文件格式。这些格式包括已显陈旧但仍在使用的 Compuserve GIF 格式和 JPEG 格式，以及首选的
    PNG 格式和新的 WebP 格式。


    你学习了有损与无损数字图像压缩算法，并明白了为何 Android 推荐我们使用后者，以便在图形密集型应用中获取更高质量的视觉效果。


    接着，我们快速概述了用于容纳和显示数字图像与数字视频的 `View` 与 `ViewGroup` 类。我们还回顾了 `android.widget` 包，其中包含了许多我们在本书中会频繁使用的用户界面类。


    随后，我们研究了数字成像与视频的基本构成单元——像素，以及分辨率和宽高比的基本概念。你学会了如何计算图像中的像素数量以确定其原始数据体积大小。你还全面了解了宽高比，以及它如何通过宽高乘数比来定义图像形状。


    然后，我们运用一些色彩理论与术语探讨了数字图像中颜色的处理方式。你还学习了颜色深度、加色法，以及如何通过图像中的多个颜色通道来创建颜色。


    接下来，我们研究了十六进制表示法，以及 Android 操作系统中如何为每个颜色通道使用两个十六进制值槽来表示颜色。你了解到 24 位 RGB 图像使用六个值槽，而
    32 位 ARGB 图像使用八个值槽。你还得知在 Android 中，十六进制值通过在该数据值前加一个井号（#）来表示。


    之后，我们探讨了数字图像合成以及 Alpha 通道与像素混合模式的概念。我们探索了利用 Alpha 通道在数字透明层上承载不同图像元素的能力，并通过 Android
    中 `Porter-Duff` 类的数十种不同混合模式，以算法方式将图像中的任意像素与这些图层进行混合。


    接着，我们研究了运用 Alpha 通道功能创建图像遮罩的概念，这使我们能够从图像中提取主体素材，以便后续使用 Java 代码对其进行单独处理，或将其用于合成层中创建更复杂的图像。


    然后，我们了解了抗锯齿的概念，以及它如何通过在两个不同对象的边缘之间，或对象与其背景之间混合像素颜色值，来实现平滑、专业的合成效果。我们看到了在 Alpha
    通道遮罩中使用抗锯齿，如何使该对象与背景图像实现平滑复合。


    接下来，我们涵盖了图像压缩中的主要因素，你学会了如何为这些数字图像资源实现紧凑的数据体积。你了解了抖动技术，以及如何利用 8 位索引颜色图像在降低文件大小的同时获得良好效果。


    最后，你下载并安装了最新的 Java 与 Android ADT SDK 软件，并将其配置在你的工作站上使用。完成这些步骤后，你现在已完全准备好，在本书接下来的章节中开发面向图形的
    Android 应用程序软件。


    在下一章中，你将学习数字视频格式、概念与优化。因此，该章将与本章非常相似：你将掌握关于数字视频的所有基本概念，并且还将为你的 Android 应用程序搭建框架。在阅读这本《专业
    Android 图形设计》书籍期间，你将至少从图形设计的角度，对这个框架进行强力升级。


    # 2. Android 数字视频：格式、概念与优化


    ## 摘要


    在本第二章中，我们将更深入地探讨数字视频在 Android 操作系统内部的实现方式。我们将基于你在前一章学到的概念进行构建，因为数字图像的所有特性同样适用于数字视频。


    毕竟，数字视频实际上只是一系列动态的数字图像。这种运动的特性为数字视频带来了高度的复杂性，因为数学方程中增加了一个第四维度（时间）。这使得处理数字视频比处理数字图像要复杂一个数量级，尤其是对于你即将学习的编解码器而言。


    这一点在视频压缩方面尤为突出，因此本章将更加侧重于视频编解码器，并介绍如何以一种新的媒体数据文件格式（该格式传统上且至今仍是一个庞大的、以千兆字节计的数据实体）来获取尽可能小的数据体积。


    我们将审视当前 Android 支持的各类数字视频文件格式，以及允许在屏幕上播放视频的 `MediaPlayer` 类。你将全面了解 `VideoView`
    用户界面小部件，Android 创建它是为了在一个预构建的 UI 容器中实现 `MediaPlayer`，方便我们使用。


    你将学习理解本章后续操作所必需的基本数字视频概念。我们将从数字视频资源的数据体积（应用大小）以及 Android 设备类型（市场覆盖范围）两个角度，来审视数字视频优化。在本章中，你将创建一个
    `pro.android.graphics` Java 包和一个 `GraphicsDesign` Android 应用程序。

    '
- fmt: '# Android Digital Video Formats: MPEG4 H.264 and WebM VP8


    Android supports the same two open source digital video formats that HTML5 supports
    natively, namely MPEG-4 (Motion Picture Experts Group) H.264 and the ON2 VP8 format,
    which was acquired by Google from ON2 Technologies and renamed WebM. WebM was
    subsequently released as an open source digital video file format and is now in
    Android OS as well as all browsers.


    This is very convenient from a content production standpoint, as the video content
    that developers produce and optimize can be used in HTML5 engines such as browsers
    and HTML5-based OSes, as well as in Android applications.


    This open source digital video format cross-platform support scenario will afford
    content developers with a “produce it once, deliver it everywhere” content production
    situation. This will reduce content development costs and increase developer revenues,
    as long as these economies of scale are taken advantage of by the professional
    video graphics developer.


    Like I did in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html), I will cover the
    MPEG and WebM video file formats from oldest to most recent. The oldest format
    supported by Android is MPEG H.263, which should only be used for lower resolution,
    as it has the worst compression-to-quality result because it uses the oldest technology.


    Since most Android devices these days have screens that are using a medium (854x480)
    to high (1280x720) resolution, if you are going to use the MPEG file format, you
    should utilize the MPEG-4 H.264 format, which is the most widely used digital
    video file format in the world currently.


    MPEG-4 H.264 format is used by commercial broadcasters, HTML5 web browser software,
    Mobile HTML5 Apps, and Android OS. All of these summed together are rapidly approaching
    a majority market share position, to say the least.


    The MPEG-4 H.264 AVC (Advanced Video Coding) digital video file format is supported
    across all Android OS versions for video playback, and under Android 3.0 and later
    OS versions for video recording. Recording video is only supported if the Android
    device has video camera hardware capability.


    There is also an MPEG4 SP (Simple Profile) video format, which is supported for
    commercial video file playback. This format is available across every Android
    OS version for broadcast-type content playback (films, television programs, mini-series,
    TV series, workout videos, and similar products).


    If you are an individual Android content producer, however, you will find that
    the MPEG-4 H.264 AVC format has far better compression, especially if you are
    using one of the more advanced (better) encoding suites, like the Sorenson Squeeze
    Pro 9 software (which you’ll be using later in the chapter).


    MPEG-4 H.264 AVC will be the format that you will use for Android video content
    production if you decide to use the MPEG-4 digital video format in your Android
    application rather than the WebM (VP8) video format from Google. The reason for
    the MPEG4 SP support is most likely because many commercial videos and films were
    originally compressed using this older video format, and playback of these commercial
    video titles on user’s Android devices is a popular use for these devices these
    days, due to a dearth of interactive content. But you are going to do something
    about that, aren’t you?! Great!


    File extensions supported for MPEG-4 video files include `.3GP` (SP) and `.MP4`
    (AVC). I prefer to use the latter (`.MP4` AVC), as that is what I use in HTML5
    apps, and it is more common to use the superior AVC format, but either type of
    file (extension) should work just fine in the Android OS.


    The more modern (advanced) digital video format that Android now supports is called
    the WebM or VP8 digital video format, and this format provides a higher quality
    result with a smaller data footprint. This is probably the reason why Google acquired
    ON2, the company that developed the VP8 codec. You will learn all about codecs
    later in this chapter.


    Playback of WebM video is “natively” supported in Android 2.3.3 and later, so
    most the Android devices out there, including an Amazon Kindle Fire HD as well
    as the original Kindle Fire, should be able to support this higher quality digital
    video file format. This is because it’s natively a part of the operating system
    (OS) software installed on your smartphone or tablet.


    WebM also supports video streaming, which you’ll learn about in a later section
    of this chapter. WebM video format streaming playback capability is supported
    if users have Android OS version 4.0 (or later). For this reason I recommend using
    MPEG-4 H.264 AVC for captive (non-streaming) video assets and WebM if you are
    going to be streaming video. We will cover advanced video concepts such as streaming
    and the like in the last section of this book.'
