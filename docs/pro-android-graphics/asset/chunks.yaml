- fmt: 'This is because your AVD is virtualizing your entire Android hardware and
    software environment. It is doing this using only software emulation, and that
    takes an inordinately massive amount of memory space, as well as huge amounts
    of processing cycles. That said, there may well be some “room” for improvement
    in optimizing the code that runs the AVD emulator part of this development software
    package, so let’s hope that the Android team has some key team members deployed
    regarding that objective at Google headquarters.


    If you can set up your Android development workstation to use a 3.8GHZ (or faster)
    16-core AMD 64-bit CPU with 32GB or even 64GB of DDR3 1600 or 1800 (now very affordable)
    memory, then you may well want to do this, at least for the time being, until
    the emulator environment becomes more efficient! If you want the emulator to launch
    quickly, be sure to include an SSD HDD! The SSD HDD will ultimately make all your
    software (and OS) start rapidly.


    Next, let’s look at one more `<VideoView>` parameter you will want to know about.
    This `android:keepScreenOn` parameter will keep a user’s display from that “power
    saving time out” feature that most Android devices implement aggressively to increase
    the battery life for any given charging cycle. You can see this parameter in Figure
    [18-11](#A978-1-4302-5786-8_18_Chapter.html#Fig11) in an Eclipse tag helper dialog,
    along with the pale yellow explanation screen fly-out, which will appear when
    each parameter that you are investigating is clicked.


    ![A978-1-4302-5786-8_18_Fig11_HTML.jpg](A978-1-4302-5786-8_18_Fig11_HTML.jpg)


    Figure 18-11.


    Using the Eclipse parameter helper dialog to find the `android:keepScreenOn` `VideoView`
    parameter


    As you can see in the pale yellow explanation screen, this parameter will keep
    the user’s screen on (back-lit) while the `VideoView` is visible. This also shows
    that the parameter is Boolean, so be sure to use the `true` value to indicate
    that you want to “keep the screen on” to the Android OS. Next, you need to optimize
    some more target device resolution video assets.


    ## Optimizing Your Range of Video Asset Resolution Targets


    Next, you will finish optimizing your Wide VGA 800x480 video assets. Since VGA
    uses a 640x480 resolution, add another 160 pixels of width and you have the WVGA
    resolution, which is extremely popular in Android smartphones and tablets because
    it an affordable screen size and has (barely) enough pixels to provide decent
    graphics quality to the end user. For this reason, it is a good resolution for
    you to consider using for your graphics applications digital video assets. Let’s
    optimize your 800x480 landscape video asset.


    Launch the Sorenson Squeeze Pro video application, and click the `480x800p` Android
    preset you created back in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html). Once
    it is selected in light-blue, as shown on the far left side of Figure [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12),
    click the center (create a copy or third icon of the five icons) on the bottom-left
    of the panel, and create a copy of the codec preset so that you can use it to
    create another preset for the WVGA landscape version for this widely-used resolution.
    It will be easier to create a new preset, especially one that uses similar data
    rate settings, by using this method.


    ![A978-1-4302-5786-8_18_Fig12_HTML.jpg](A978-1-4302-5786-8_18_Fig12_HTML.jpg)


    Figure 18-12.


    Creating an 800x480p landscape digital video codec preset (also showing all completed
    presets)


    The first thing that you want to do is to provide a correct Name and Desc field
    data entry, so name this new preset `Android800x480p` (this `p` stands for progressive
    scan, not pixels) and add a description of `Android 800x480 Landscape`, as shown
    in Figure [18-13](#A978-1-4302-5786-8_18_Chapter.html#Fig13). All of the other
    settings are the same, as the data is the same between the two presets, just flipped
    90 degrees (or rotated from portrait display mode to landscape display mode).


    ![A978-1-4302-5786-8_18_Fig13_HTML.jpg](A978-1-4302-5786-8_18_Fig13_HTML.jpg)


    Figure 18-13.


    Android WVGA video codec presets using 768KPBS to 1MPBS data rate with high-quality
    codec


    A progressive scan video is one where every line in the image (or video, in this
    case) is written to the display screen sequentially, all at once. The opposite
    of a progressive scan is an interlaced scan, like the old TV sets that wrote the
    even lines on one pass (scan) and the odd numbered lines on a second pass (scan),
    thus interlacing them (which is why they flickered).


    Make sure your data rate ranges from 768 KBPS (3/4 MBPS) to 1 MBPS and that you
    have set 10 key frames every second of video (which is at 10 FPS) and that your
    frame size is set at `Same as source`.


    Once your new WVGA preset is set up, click the `OK` button to create that preset,
    and you will be ready to go into VirtualDub and create your AVI source file. Let’s
    do that now.


    Start VirtualDub 1.9 using the shortcut icon and use the `File` ➤ `Open Video
    File` option. When the dialog opens, navigate to your system HDD, and find the
    first frame of your PAG800 rendered BMP file sequence, and select it. Once the
    400-frame 3D rendering has loaded, use a `File` ➤ `Save AVI As` option to save
    an AVI to your `/AVIs` directory, just like you did in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html).
    If you need to revisit this work process, you can review the text or screen shots
    in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html). I show the VirtualDub software
    with the 800x480 Wide XGA landscape video loaded into its user interface in Figure
    [18-14](#A978-1-4302-5786-8_18_Chapter.html#Fig14).


    ![A978-1-4302-5786-8_18_Fig14_HTML.jpg](A978-1-4302-5786-8_18_Fig14_HTML.jpg)


    Figure 18-14.


    Loading your WVGA landscape video frames into VirtualDub to create an uncompressed
    `.AVI` file


    Once your `PAG800x480.AVI` file is exported, you can go back into Squeeze Pro
    9 and apply the new preset, after you import the `PAG800x480` video file and use
    the `Apply` button to attach the next preset you have created to it. Once all
    of this has been set up in Squeeze, you can click the `Squeeze It!` button and
    start the compression process. This will apply your WVGA preset setting to the
    AVI raw frame data via the MainConcept codec and MPEG-4 H.264 video encoding algorithm.


    Once an AVI file is generated, you can use some math to see if you’re getting
    the excellent compression you obtained in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html)
    on your 480x800 Portrait version of the file, which, as you can now see, actually
    compresses to be 35K smaller than a landscape version with the same number of
    pixels.


    You are still getting a 99.2% compression, or the MP4 data file is 0.8% of the
    size of the original full frames uncompressed AVI source file, which is exactly
    the same size as the `PAG480x800.AVI` file (450MB), which stands to reason, as
    it has the same number of pixels and frames inside it.


    Now you have digital video assets that will fit medium resolution, medium DPI,
    or MDPI, devices with WVGA resolution and 4-inch through 7-inch LED or LCD display
    screens.


    Next, let’s get the LDPI, or low DPI, screens out of the way so you can focus
    on your assets for the more mainstream HD Android devices and NetBook (1024 pixel)
    resolution devices after that.


    One last note before we move on: a 800x480 resolution is not a “true” 16:9 widescreen
    aspect ratio. To calculate this, `800/16=50`, and `50x9=450`, so a true 16:9 aspect
    ratio is an 800x450 resolution, which is not a common physical screen (pixels)
    resolution for many Android devices. Since `480/50=9.6`, the 800x480 resolution
    actually represents a 16:9.6 aspect ratio, or 60% of the way between a 16:9 and
    a 16:10 aspect ratio.'
  raw: 'This is because your AVD is virtualizing your entire Android hardware and
