    (which we explore in detail later on in this book), images, digital video (via
    the `VideoView` widget), and even frame-based animations. So yes, frame animations
    can be procedurally transformed in Android, if you set it up correctly, which
    we will be doing in this chapter. It is important to note that although procedural
    animation can be set up using XML via a much easier work process, it can also
    be done using Java code. Procedural animation parameters can be changed via Java
    at runtime in order to make the animation more interactive or responsive to other
    inputs or triggers.'
  raw: '## Summary


    In this third chapter you learned all about frame-based animation concepts, formats,
    XML setup, and optimization, as well as creating four resolution-density–optimized
    animations for your pro.android.graphics package startup splash screen for your
    GraphicsDesign Android application.


    We started out by looking at some of the basic concepts that relate to frame-based
    animation, such as the component Cels or Frames, how they are played over time
    using a framerate (expressed as FPS or frames per second) and frame resolution
    (or the size of each frame in pixels).


    Next, we looked at how all of these attributes can work together to allow us to
    optimize our frame-based animation’s new media assets so the Android app has a
    small data footprint. We talked about the different ways to optimize frame-based
    animation, such as adjusting the frame resolution, using a lower indexed color
    depth (8-bit color), and being really careful with the number of frames used to
    create the illusion of motion. We looked at PNG32 for compositing animation and
    the concept of pixel crawl.


    We then took a look at how frame animation is implemented in Android using XML
    markup. We looked at how the frame animation assets are held in their respective
    /res/drawable-dpi folders and how the XML file is held in the /res/drawable folder.
    We pointed out that frame animation uses the drawable folders and procedural animation,
    which we’re covering in the next chapter, uses the /res/anim folder.


    We took a look at the `AnimationDrawable` class, which contains the pre-built
    Java code that we use to implement frame-based animation. We looked at the .start(
    ) method and the duration variable and its milliseconds value.


    Then we looked at the XML <animation-list> and <item> tags that are used to implement
    frame animation structures in XML markup. You learned about the oneshot parameter
    and how the parent animation-list container holds the child item tag objects inside
    it.


    Next, you got down to business and actually created a frame-based animation for
    your Graphics Design project in Eclipse. You copied your nine frames into the
    resolution density folders and renamed them to be simpler and to conform to the
    Android lower-case letters and numbers only file naming rule.


    You then created a new Drawable XML file, named it anim_info.xml, added an <animation-list>
    root element (and parent tag container), and then added the android:oneshot parameter.
    You then filled this with nested child <item> tags, configured for a one-ninth
    of a second duration and that also referenced your nine animation frames, now
    named pag0.png through pag8.png.


    Once this was completed, you added an `ImageView` user interface element into
    your FrameLayout UI container inside your activity_main.xml UI screen layout XML
    definition file. You then referenced the anim_intro.xml file inside of this ImageView
    using the android:src parameter and added other parameters to make the screen
    layout of the ImageView look professional, as well as able to be referenced by
    your Java code.


    Finally, you wrote Java code in the MainActivity.java file, instantiating the
    ImageView object, as well as the AnimationDrawable object, and then you “wired”
    them together using Java code. You then started looping the frame animation object
    construct by using the trusty .start( ) method.


    In the next chapter, you will learn about Android procedural animation and its
    concepts, transforms, techniques, and optimization. You will learn how to combine
    transformational power, afforded to you via procedural animation in conjunction
    with your frame-based animation. This will allow you to boost the motion graphics
    effects that you are creating to a new level of power and complexity.


    # 4. Android Procedural Animation: XML, Concepts, and Optimization


    Abstract


    In this fourth chapter, we will take a close look at how XML markup can be used
    to create procedural animation in the Android operating system.


    In this fourth chapter, we will take a close look at how XML markup can be used
    to create procedural animation in the Android operating system.


    Procedural animation is significantly more complex than raster animation, which
    simply displays a sequence of images on the display, so that we can create the
    illusion of motion. Frame animation only allows us to control the individual timing
    of each frame that is displayed, after we specify what frames will be utilized
    for the animation. Procedural animation takes this to the next level of complexity,
    as you will see during this chapter.


    Procedural animation actually uses code, in most cases via XML markup, to define
    transformations in 2D space to actually change our Android assets. “Code” makes
    it sound a bit more complex than it actually is, as there are procedural animation
    parameters already defined in Android, and we supply these with various values
    that then cause all these procedural animation parameters to work together in
    order to achieve the resulting animation.


    The Android assets that can be animated procedurally include user interface widgets
    (which we explore in detail later on in this book), images, digital video (via
    the VideoView widget), and even frame-based animations. So yes, frame animations
    can be procedurally transformed in Android, if you set it up correctly, which
    we will be doing in this chapter. It is important to note that although procedural
    animation can be set up using XML via a much easier work process, it can also
    be done using Java code. Procedural animation parameters can be changed via Java
    at runtime in order to make the animation more interactive or responsive to other
    inputs or triggers.'
  trans: '

    # 总结


    在第三章中，你全面学习了基于帧的动画概念、格式、XML 设置和优化，并为你的 `GraphicsDesign` Android 应用的 `pro.android.graphics`
    包启动闪屏创建了四个针对分辨率密度优化的动画。


    我们首先探讨了与基于帧的动画相关的一些基本概念，例如组成动画的“帧”（Cels 或 Frames），它们如何通过帧率（以 FPS 即帧每秒表示）和帧分辨率（即每帧的像素尺寸）随时间播放。


    接下来，我们研究了如何协同运用所有这些属性，以优化基于帧的动画的新媒体资源，从而减小 Android 应用的数据占用空间。我们讨论了优化基于帧动画的不同方法，例如调整帧分辨率、使用更低的索引色深（8
    位色彩），并谨慎控制用于制造运动错觉的帧数。我们还探讨了用于合成动画的 PNG32 格式以及像素爬移（pixel crawl）的概念。


    然后，我们了解了如何在 Android 中使用 XML 标记实现帧动画。我们探讨了帧动画资源如何存放在各自的 `/res/drawable-dpi` 文件夹中，以及
    XML 文件如何存放在 `/res/drawable` 文件夹中。我们指出，帧动画使用 `drawable` 文件夹，而我们在下一章将要介绍的程序化动画则使用
    `/res/anim` 文件夹。


    我们研究了 `AnimationDrawable` 类，其中包含用于实现基于帧动画的预置 Java 代码。我们还介绍了 `.start()` 方法、`duration`
    变量及其以毫秒为单位的数值。


    随后，我们学习了用于在 XML 标记中实现帧动画结构的 `<animation-list>` 和 `<item>` 标签。你了解了 `oneshot` 参数，以及父级
    `animation-list` 容器如何包含其内部的子级 `item` 标签对象。


    接着，你开始动手实践，在 Eclipse 中为你的 `Graphics Design` 项目实际创建了一个基于帧的动画。你将九帧画面复制到不同分辨率密度的文件夹中，并将它们重命名以简化名称，同时遵循
    Android 仅允许小写字母和数字的文件命名规则。


    然后，你创建了一个新的 Drawable XML 文件，命名为 `anim_info.xml`，添加了 `<animation-list>` 根元素（父标签容器），并设置了
    `android:oneshot` 参数。接着，你在这个容器内填充了嵌套的子 `<item>` 标签，配置了九分之一的持续时间，并引用了你的九个动画帧（现在命名为
    `pag0.png` 到 `pag8.png`）。


    完成后，你在 UI 屏幕布局 XML 定义文件 `activity_main.xml` 中的 `FrameLayout` UI 容器内添加了一个 `ImageView`
    用户界面元素。然后，你通过 `android:src` 参数在这个 `ImageView` 中引用了 `anim_intro.xml` 文件，并添加了其他参数，使
    `ImageView` 的屏幕布局看起来更专业，同时也使其能够被你的 Java 代码引用。


    最后，你在 `MainActivity.java` 文件中编写了 Java 代码，实例化了 `ImageView` 对象和 `AnimationDrawable`
    对象，并通过 Java 代码将它们“连接”起来。然后，你使用可靠的 `.start()` 方法开始循环播放帧动画对象结构。


    在下一章，你将学习 Android 程序化动画及其概念、变换、技术和优化。你将学习如何将程序化动画赋予你的变换能力与基于帧的动画相结合。这将使你能够将正在创建的运动图形效果提升到一个更强大、更复杂的新水平。


    # 4. Android 程序化动画：XML、概念与优化


    ## 摘要


    在第四章中，我们将深入研究如何使用 XML 标记在 Android 操作系统中创建程序化动画。


    程序化动画比简单的位图动画（后者只是在显示屏上按序显示一系列图像以创造运动错觉）要复杂得多。在我们指定动画将使用哪些帧之后，帧动画只允许我们控制每个显示帧的单独时序。程序化动画将复杂程度提升到了一个新的水平，你将在本章中看到这一点。


    程序化动画实际上是通过代码（多数情况下是 XML 标记）来定义二维空间中的变换，从而实际改变我们的 Android 资源。说“代码”听起来可能比实际情况复杂一些，因为
    Android 中已经预定义了程序化动画的参数，我们只需为这些参数提供各种值，就能使所有这些程序化动画参数协同工作，从而实现最终的动画效果。


    可以进行程序化动画的 Android 资源包括：用户界面控件（我们将在本书后面详细探讨）、图像、数字视频（通过 `VideoView` 控件），甚至包括基于帧的动画。是的，只要设置正确，在
    Android 中可以对帧动画进行程序化变换，这正是我们本章将要做的。需要注意的是，虽然通过 XML 可以更简便地设置程序化动画，但它同样可以使用 Java
    代码来实现。程序化动画的参数可以在运行时通过 Java 进行更改，以使动画更具交互性，或更好地响应其他输入或触发器。

