  trans: '

    # 为 Drawable 创建并配置 BitmapShader


    在 `ImageRoundingDrawable` 构造方法的顶部声明 `BitmapShader` 对象，并将其命名为 `imageShader`，如图
    16-21 所示。


    `BitmapShader imageShader;`


    如你所知，`BitmapShader` 对象用于保存 `Bitmap` 对象，并告知 Android 如何在 `Paint` 对象中应用或渲染 `Bitmap`
    对象的图像资源。同样地，你的 `Paint` 对象用于控制图形如何被绘制或应用（涂绘）到 `Drawable` 的 `Canvas` 上。


    ![A978-1-4302-5786-8_16_Fig21_HTML.jpg](img/A978-1-4302-5786-8_16_Fig21_HTML.jpg)


    图 16-21. 声明 `BitmapShader` 对象，并将其命名为 `imageShader`，以便在构造方法中使用


    你可能知道，着色器（shader）的概念在 3D 渲染领域最为常见。在该领域中，着色器是纹理映射过程中的一个组件，负责在 3D 网格或线框对象之上放置一层“皮肤”或表面，使其具有实体外观，而非网格或线框外观。


    `BitmapShader` 对象执行同样的表面映射过程，只不过是在 2D 环境中而非 3D 环境中，用于将你的 2D 图像资源应用到 `Paint` 表面。你可以把
    `Paint` 对象想象成一支虚拟画笔，而着色器信息则指定了 `Bitmap` 对象将如何被绘制，或者更准确地说，如何映射到最终的 `Canvas` 对象的
    2D 表面上。


    接下来，我们来实例化你的 `imageShader` `BitmapShader` 对象，并用一个源图像资源以及一些常量对其进行配置。这些常量将告知着色器对象如何沿其
    X 和 Y 2D 坐标映射（或平铺）图像。


    你将为 X 和 Y 维度使用 `CLAMP` 这一 `TileMode` 常量值，并在你的 `BitmapShader` 构造方法调用内部，通过 `Shader`
    类来调用这些常量。你将使用 Java 的 `new` 关键字来调用该构造方法。


    你将把传入 `ImageRoundingDrawable` 构造方法（作为主要参数）的 `sourceImage` `Bitmap` 对象，作为第一个参数传递给
    `BitmapShader` 构造方法。然后，你需要通过下面这行 Java 代码，指定通过 `Shader` 类调用的 X 和 Y `TileMode` 常量，如图
    16-22 所示：


    `imageShader = new BitmapShader(sourceImage, Shader.TileMode.CLAMP, Shader.TileMode.CLAMP);`


    ![A978-1-4302-5786-8_16_Fig22_HTML.jpg](img/A978-1-4302-5786-8_16_Fig22_HTML.jpg)


    图 16-22. 实例化 `imageShader` `BitmapShader` 对象，并用 `sourceImage` 和常量对其进行配置


    值得注意的是，在图 16-22 中，即使你已实例化并配置了 `imageShader` `BitmapShader` 对象，Eclipse IDE 仍不认为该对象已被使用（利用）。对象可以被声明，甚至被实例化（加载）和配置，但并不一定被使用！


    这就是为什么波浪形的黄色警告高亮会一直保留在最初的 `imageShader` 声明下方，直到你真正对该对象执行某些操作。我之所以指出这一点并澄清状况，是因为你可能想知道为什么我们“使用”了前一行代码中声明的
    `imageShader`，但对象仍未使用的警告却依然存在。从技术上讲，对象实例化并不构成使用！仔细想想，这其实相当合理。


    现在，你的 `imageShader` `BitmapShader` 对象已经实例化并配置完成，你可以专注于设置 `paintObject` `Paint`
    对象了。首先，你必须使用 `new` 关键字实例化 `Paint` 对象；由于你已经在子类顶部声明了它并为其命名，你可以通过下面这个简单而精炼的 Java
    语句来实现：


    `paintObject = new Paint();`


    现在，你已经正确声明并实例化了一个名为 `paintObject` 的 `Paint` 对象，你可以调用其方法来为你使用而进行配置。你要设置的第一件事是抗锯齿（AntiAliasing）标志，你将通过
    `.setAntiAlias()` 方法调用将其设置为 `true`（开启）。这是一个相当直接但重要的步骤，因为它能为我们带来高质量的视觉效果，并通过以下语句完成：


    `paintObject.setAntiAlias(true);`


    如图 16-23 所示，就图像平铺和抗锯齿而言，你现在已经创建了 `Paint` 对象和 `BitmapShader` 对象结构，并根据你的需要对其进行了配置。


    ![A978-1-4302-5786-8_16_Fig23_HTML.jpg](img/A978-1-4302-5786-8_16_Fig23_HTML.jpg)


    图 16-23. 实例化 `paintObject`，并将 `.setAntiAlias()` 方法设置为 `true` 以开启抗锯齿功能


    现在，你剩下的工作就是通过你之前学过的 `.setShader()` 方法，将你的 `BitmapShader` 对象结构“连接”到 `Paint` 对象结构。


    这可以通过调用 `Paint` 对象的 `.setShader()` 方法，并将 `BitmapShader` 对象作为配置参数传递来实现，如图 16-24
    所示。执行此配置（将 `imageShader` 配置到 `paintObject` 中）的 Java 代码如下：


    `paintObject.setShader(imageShader);`


    这完成了你的 `ImageRoundingDrawable()` 构造方法实现的 Java 编码。接下来，你需要为你的 `Drawable` 子类实现 `.draw()`
    方法，以便它能够将 `ImageRoundingDrawable` 绘制到屏幕上。回想一下，`.draw()` 方法骨架已经为你编写好了，因此你只需在方法内部添加
    Java 代码，使其能够执行绘制即可！


    ![A978-1-4302-5786-8_16_Fig24_HTML.jpg](img/A978-1-4302-5786-8_16_Fig24_HTML.jpg)


    图 16-24. 使用 `.setShader()` 方法将 `paintObject` `Paint` 对象连接到 `imageShader` `BitmapShader`
    对象


    由于你使用的是 `CLAMP` 平铺模式，并且不希望图像的边缘像素被复制（出现超过一次），否则看起来会像是一个错误。因此，在 `.draw()` 方法的实现中，你要做的第一件事是通过调用
    `.getBounds()` 方法“获取”容纳你的 `Drawable` 对象的容器的边界。


    像 `.getBounds()` 这样的“获取”方法调用有一个很酷的地方：它们允许你的代码“向上追溯链条”，获取你在开发时（而非运行时）可能没有的信息，或者更重要的是，你不想使用固定单位（如像素）来指定的信息，因为每个用户设备都有不同的物理显示分辨率规格。


    在这种情况下，你希望使用 `.getBounds()` 向上查找你类的外部，以获取将要容纳 `ImageRoundingDrawable` 的容器的边界信息。你将在现有（`BookmarkActivity.java`）类中的一个现有
    `ImageView` 对象中使用背景图像底板。


    由于该 `ImageView` 是使用 XML 参数设计的，以便自适应于用户的设备屏幕，因此你需要找出该 `ImageView` 的宽度和高度值。该 `ImageView`
    使用了 `MATCH_PARENT` 参数，以便使用整个屏幕来显示其内容。因此，你的 `.getBounds()` 方法调用，在此特定的 UI 设计设置中，至少等同于“获取”你的
    `BookmarkActivity.java` `Activity` 子类显示屏幕区域的完整（全屏）宽度和高度数据值。

