    \ 或 OUTSIDE OF）的部分，但不会显示任何目标图像本身。产生此结果的算式为`[ Sa*(1-Da), Sc*(1-Da) ]`。\n\n`SRC_OVER`常量将源图像叠加在目标图像之上。产生最终结果的算法算式为`[\
    \ Sa + (1-Sa)*Da, Rc = Dc + (1-Da)*Sc ]`。\n\n最后是`XOR`混合模式常量，意为“两者择一”，它仅显示源图像或目标图像中的其中之一，但绝不会同时显示两者。因此，在源图像与目标图像重叠的区域，不会显示任何内容；而在不重叠的区域，则会显示源图像或目标图像（这是一种布尔“异或”操作）。该模式的算式为`[\
    \ Sa+Da - 2*Sa*Da, Sc*(1-Da) + (1-Sa)*Dc ]`。\n\n## `PorterDuffColorFilter`类：混合你的`ColorFilter`\n\
    \nAndroid 提供了一个专门的类来结合`PorterDuff`混合模式常量应用颜色值，即`PorterDuffColorFilter`类。该类是`android.graphics.ColorFilter`类的直接子类。它允许使用混合模式将颜色滤镜应用于图像资源，从而使开发者能够更灵活地通过算法对图像资源进行颜色更改，实现诸如颜色校正之类的目标，甚至可以使用一个源图像文件创建一百种不同颜色的图像资源，从而节省大量数据空间。\n\
    \n`PorterDuffColorFilter`类的 Java 层级结构如下：\n\n```\njava.lang.Object\n  > android.graphics.ColorFilter\n\
    \    > android.graphics.PorterDuffColorFilter\n```\n\nAndroid 的`PorterDuffColorFilter`类属于`android.graphics`包。因此，其导入语句将引用`android.graphics.PorterDuffColorFilter`包导入路径。\n\
    \n值得注意的是，你并不绝对需要构造一个`PorterDuffColorFilter`对象，才能将`PorterDuff.Mode`枚举常量应用于颜色过滤操作。正如你将在本章后续部分看到的，`ImageView`类中有一个版本的`setColorFilter()`方法，其参数列表中接受一个`PorterDuff.Mode`混合常量。该方法的使用方式如下：\n\
    \n```\nmyDigitalImageObjectName.setColorFilter( integer color, PorterDuff.Mode\
    \ mode );\n```\n\n实际上，设置这个过程相当容易，从而可以将`PorterDuff`类的强大功能应用于你的任何`ImageView`（以及其所继承的`ImageButton`子类）对象。就图形设计和图像合成而言，将`ColorFilter`算法与`PorterDuff`混合模式结合使用，是一种非常强大且实用的能力，因此我们现在就来介绍它。\n\
    \n让我们在你的`GraphicsDesign`应用程序的`BookmarkActivity`类中实现这一点，以演示如何仅用几行 Java 代码，通过`ColorFilter`方法应用`PorterDuff`混合模式。\n\
    \n## 使用PorterDuff将ColorFilter效果应用于图像资源\n\n如果尚未打开 Eclipse ADT，请先启动它，然后打开你的`GraphicsDesign`项目。右键点击`BookmarkActivity.java`文件，选择“打开”(Open)\
    \ 或按 F3 键，在 Eclipse 中央编辑窗格中编辑该文件。首先，你需要实例化在`activity_bookmark.xml` UI 定义 XML 文件中定义的`ImageView`。输入以下\
    \ Java 代码行来实现：\n\n```\nImageView porterDuffImage = (ImageView)findViewById(R.id.currentBookmarkImage);\n\
    ```\n\n如图 [11-1](#A978-1-4302-5786-8_11_Chapter.html#Fig1) 所示，你需要将鼠标悬停在波浪形的红色错误高亮上，并选择“导入\
    \ ImageView (android.widget)”选项；Eclipse 将为你编写`Import android.widget.ImageView`语句，稍后你将在本章的图\
    \ [11-2](#A978-1-4302-5786-8_11_Chapter.html#Fig2) 中看到。\n\n![A978-1-4302-5786-8_11_Fig1_HTML.jpg](A978-1-4302-5786-8_11_Fig1_HTML.jpg)\n\
    图 11-1. 在`BookmarkActivity`类中实例化`currentBookmarkImage` ImageView 以创建 Java 对象\n\
    \n现在你的`ImageView`对象实例化已经没有错误了，你可以使用这个`porterDuffImage` ImageView 对象来调用`setColorFilter()`方法，该方法你在本章前一节已经了解过。这通过下面这一行\
    \ Java 编程代码实现：\n\n```\nporterDuffImage.setColorFilter(Color.YELLOW, PorterDuff.Mode.MULTIPLY);\n\
    ```\n\n这行 Java 代码的作用是调用`setColorFilter()`方法，并传入两个参数。第一个参数是你希望通过`PorterDuff`混合模式应用的颜色值。在本例中，是\
    \ Android 操作系统提供的`Color.YELLOW`常量。第二个参数是你将用来指定混合模式算法的`PorterDuff.Mode`混合常量。\n\n\
    在这个初始示例中，你将使用`MULTIPLY`常量，因为它是在数字图像资源上应用颜色变化或特殊着色效果时最常用的混合模式。这种`MULTIPLY`模式通常还会增加图像的对比度，使结果看起来更真实。\n\
    \n如图 [11-2](#A978-1-4302-5786-8_11_Chapter.html#Fig2) 所示，你需要再次将鼠标悬停在`Color`类引用上，选择“导入\
    \ Color (android.graphics)”选项，以让 ADT 为你编写`Import android.graphics.Color` Java\
    \ 代码语句。\n\n同样有趣的是，当你将鼠标悬停在`PorterDuff`类引用上的错误高亮时，Eclipse ADT 并未提供“导入 PorterDuff\
    \ (android.graphics)”选项，尽管该选项本是消除`PorterDuff`类引用下波浪形红色错误高亮的正确解决方案。嘿，人无完人，ADT 也不例外！\n\
    \n这意味着 Eclipse ADT IDE 的错误辅助对话框并非 100%“可靠”，我们不能总是依赖它们来解决 Eclipse ADT IDE 中可能出现的所有\
    \ Java 代码错误问题。\n\n![A978-1-4302-5786-8_11_Fig2_HTML.jpg](A978-1-4302-5786-8_11_Fig2_HTML.jpg)\n\
    图 11-2. 通过导入`android.graphics.Color`和`android.graphics.PorterDuff`类修复错误高亮\n\n\
    在这种情况下，你需要自己添加`Import`语句来解决这个错误。这通过以下 Java 语句实现：\n\n```\nimport android.graphics.PorterDuff;\n\
    ```\n\n如图 [11-3](#A978-1-4302-5786-8_11_Chapter.html#Fig3) 所示，你的代码现在没有错误了，并且用于在\
    \ Activity 子类 Java 代码中使用`ImageView`、`Color`和`PorterDuff`类的导入语句已经就位。你已拥有一个使用`PorterDuff.Mode`常量调用`setColorFilter()`方法的`ImageView`对象。\n\
    \n![A978-1-4302-5786-8_11_Fig3_HTML.jpg](A978-1-4302-5786-8_11_Fig3_HTML.jpg)\n\
    图 11-3. 使用`setColorFilter()`方法，通过`PorterDuff`的`MULTIPLY`模式应用颜色值更改"
  raw: 'The SRC_OUT constant does exactly the opposite of what the SRC_IN constant
    does, and will take the portion of the source image that lies outside of (not
    intersecting with) a destination image, and displays only the portion of the source
    image that is not intersecting with (OUT or OUTSIDE OF) the destination image,
    but does not show any of the destination image itself. The equation that produces
    this result is [ Sa*(1-Da), Sc*(1-Da) ].


    The SRC_OVER constant overlays the source image on top of the destination image.
    The algorithmic equation that produces this end result is [ Sa + (1-Sa)*Da, Rc
    = Dc + (1-Da)*Sc ].


    Finally, there is the XOR blending mode constant, which stands for either-or,
    and shows either the source image or the destination image, but never both. As
    a result, where both the source and destination images overlap, nothing is shown,
    but wherever there is no overlap either the source or destination image shows
    through (it’s a Boolean exclude operation ). An equation for this is [ Sa+Da -
    2*Sa*Da, Sc*(1-Da) + (1-Sa)*Dc ].


    ## The PorterDuffColorFilter Class: Blending Your ColorFilter


    Android has a specialized class for applying color values, in conjunction with
    PorterDuff blending mode constants, called the PorterDuffColorFilter class. The
    class is a direct subclass of the android.graphics.ColorFilter class. This class
    allows color filters to be applied to image assets using blending modes, which
    gives developers more flexibility in applying color changes to their image assets
    algorithmically, allowing objectives such as color correction, or even creating
    a hundred different color image assets, using one image source file, which can
    save megabytes in data footprint.


    The PorterDuffColorFilter class Java hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.ColorFilter`


        `> android.graphics.PorterDuffColorFilter`


    The Android PorterDuffColorFilter class is a part of the android.graphics package.
    As such, its import statement is constructed to reference the android.graphics.PorterDuffColorFilter
    package import path.


    It’s interesting to note here that you do not absolutely have to construct a PorterDuffColorFilter
    object in order to apply your PorterDuff.Mode Enum constants to a color filtering
    operation. As you’ll see in a future section of this chapter, there is a version
    of the .setColorFilter() method, which is part of the ImageView class and accommodates
    a PorterDuff.Mode blending constant in its parameter list. The method is utilized
    as follows:


    `myDigitalImageObjectName.setColorFilter( integer color, PorterDuff.Mode mode
    );`


    It is actually fairly easy to set this up, and thus apply the power of the PorterDuff
    class to any of your ImageView (and thus, ImageButton subclass) objects. Applying
    a ColorFilter algorithm in conjunction with a PorterDuff blending mode is actually
    a very powerful and useful capability as far as graphics design and image compositing
    is concerned, so we’ll cover it now.


    Let’s do this in your GraphicsDesign application BookmarkActivity class to show
    you how to apply a PorterDuff blending mode with a ColorFilter method using only
    a couple lines of Java code.


    ## Applying ColorFilter Effects to Image Assets Using PorterDuff


    Fire up Eclipse ADT, if it isn’t open on your desktop already, and open up your
    GraphicsDesign project. Right-click your BookmarkActivity.java file and use Open
    or F3 to open it for editing in the central editing pane of Eclipse. The first
    thing you need to do is to instantiate your ImageView, which you defined in your
    activity_bookmark.xml UI definition XML file, so enter the following line of Java
    code to do this:


    `ImageView porterDuffImage = (ImageView)findViewById(R.id.currentBookmarkImage);`


    As you can see in Figure [11-1](#A978-1-4302-5786-8_11_Chapter.html#Fig1), you’ll
    need to mouse-over the wavy red error highlighting, and select the Import ImageView
    (android.widget) option; Eclipse will then write this Import android.widget.ImageView
    statement for you, as you will see a bit later on in this chapter in Figure [11-2](#A978-1-4302-5786-8_11_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_11_Fig1_HTML.jpg](A978-1-4302-5786-8_11_Fig1_HTML.jpg)


    Figure 11-1.


    Instantiating currentBookmarkImage ImageView to create a Java Object in the BookmarkActivity
    class


    Now that your ImageView object instantiation is error-free, you can utilize this
    porterDuffImage ImageView object to call your .setColorFilter() method, which
    you learned about in the previous section of this chapter. This is done using
    the following single line of Java programming code:


    `porterDuffImage.setColorFilter(Color.YELLOW, PorterDuff.Mode.MULTIPLY);`


    What this line of Java code does is to call your .setColorFilter() method and
    pass into it two parameters. The first is the color value that you want to apply
    via your PorterDuff blending mode. In this case, it is the Android OS Color.YELLOW
    constant. A second parameter is one of the PorterDuff.Mode blending constant that
    you will use to specify your blending mode algorithm.


    In this initial case, you will be using the MULTIPLY constant, as that is the
    most frequently used blending mode for applying a color change, or special coloration
    effect, on a digital image asset. This MULTIPLY mode will often increase image
    contrast as well, making the results look more realistic.


    As you can see in Figure [11-2](#A978-1-4302-5786-8_11_Chapter.html#Fig2), you
    again have to mouse-over the Color class reference and select the Import Color
    (android.graphics) option to get ADT to write the Import android.graphics.Color
    Java code statement for you.


    It is also interesting to note that when you mouse-over the error highlight for
    the PorterDuff class reference, Eclipse ADT does not give you an Import PorterDuff
    (android.graphics) option, even though that option would be the correct solution
    to get rid of the wavy red error highlighting under the PorterDuff class reference.
    Hey, nobody’s perfect; not even ADT!


    What this means that the Eclipse ADT IDE error helper dialogs are not 100% “bullet-proof,”
    and that we cannot always rely on them to solve all of the Java code error problems
    that might arise inside our Eclipse ADT IDE.


    ![A978-1-4302-5786-8_11_Fig2_HTML.jpg](A978-1-4302-5786-8_11_Fig2_HTML.jpg)


    Figure 11-2.


    Fixing error highlighting by importing android.graphics.Color and android.graphics.PorterDuff
    classes


    In this case, you’re going to need to add the Import statement yourself in order
    to fix this error. This is done using the following Java statement:


    `Import android.graphics.PorterDuff;`


    As you can see in Figure [11-3](#A978-1-4302-5786-8_11_Chapter.html#Fig3), your
    code is now error-free, and your Import statements are now in place for using
    the ImageView, Color, and PorterDuff classes in your Activity subclass Java code.
    You now have a ImageView object that calls the .setColorFilter() method using
    a PorterDuff.Mode constant.


    ![A978-1-4302-5786-8_11_Fig3_HTML.jpg](A978-1-4302-5786-8_11_Fig3_HTML.jpg)


    Figure 11-3.


    Using the .setColorFilter() method to apply a color value change using a PorterDuff
    MULTIPLY mode'
