  trans: '

    # 添加菜单项以访问 UI 布局容器


    要真正开发一个新的用户界面布局，你需要编写一个具有功能屏幕的新 Activity，而不是为你的应用使用启动屏幕。在编写新的 Android Activity
    之前，你需要能从你的 `MainActivity.java` 启动屏幕 Activity 中访问它。这可以通过选项菜单来实现。当你创建一个新的 Android
    应用（空白 Activity 选项）时，该菜单已添加到你的应用中，因此你只需修改现有的菜单 XML 标记和 Java 代码即可。


    要为你的应用添加几个新功能，你所需要做的就是在 `/res/menu` 文件夹的 XML 文件中添加一些菜单项，并且 `MainActivity` 中已有的
    `MenuInflater` 类代码会为你加载这些值，并使用这些参数值配置你的选项菜单对象。


    如果你想进一步研究 Android 的 `MenuInflater` 类，Android 开发者网站上有一个页面介绍了它，网址如下：


    [`http://developer.android.com/reference/android/view/MenuInflater.html`](http://developer.android.com/reference/android/view/MenuInflater.html)


    让我们通过打开 `/res/menu` 文件夹（如图 6-1 所示），右键单击文件夹中的 `main.xml` 文件，并选择“打开”命令或按下 F3 功能键，来打开在“新建
    Android 应用程序”系列对话框为你创建的菜单 XML 定义。


    ![A978-1-4302-5786-8_6_Fig1_HTML.jpg](img/A978-1-4302-5786-8_6_Fig1_HTML.jpg)


    图 6-1.


    编辑你的第一个 `<menu>` 标签 `<item>` 标签，使其成为一个目录选项菜单选择项


    编辑 `android:id` 参数，将其重命名为其新功能对应的名称 `table_of_contents`，并同样使用 `@string/` 引用前缀编辑
    `android:title` 参数以匹配，这会告诉 Android 在 `/res/values/strings.xml` 文件中查找 `<string>`
    常量定义。


    一旦创建好这第一个 `<menu>` 父标签的 `<item>` 子标签，你就可以通过复制整个 `<item>` 标签结构并粘贴到其下方来创建第二个菜单项，如图
    6-2 所示。


    ![A978-1-4302-5786-8_6_Fig2_HTML.jpg](img/A978-1-4302-5786-8_6_Fig2_HTML.jpg)


    图 6-2.


    复制并编辑第一个 `<menu>` 父容器 `<item>` 标签以创建第二个书签菜单项


    我们现在就这样做，并将第二个 `<item>` 标签的 `table_of_contents` ID 和菜单标题（标签）引用更改为 `bookmark_utility`，这样你的专业安卓图形电子书应用也就具备了书签功能。你还需要对
    `android:orderInCategory` 参数进行另一处更改，以便书签工具菜单选项位于目录菜单选项之后。将此参数的值设置为 `200`，如图 6-2
    所示。


    现在你所要做的就是编辑 `/res/values` 文件夹中的 `strings.xml` 文件，将现有的菜单选项字符串常量更改为“目录”，然后复制并粘贴到其下方，更改其值以支持你的书签工具菜单选项，如图
    6-3 所示。


    ![A978-1-4302-5786-8_6_Fig3_HTML.jpg](img/A978-1-4302-5786-8_6_Fig3_HTML.jpg)


    图 6-3.


    为“目录”和“书签工具”菜单项在 `strings.xml` 文件中添加 `<string>` 常量


    现在，让我们在 Eclipse 中点击 `MainActivity.java` 编辑选项卡，快速查看一下将解析你的 `main.xml` 文件中的新选项菜单项
    XML 并将其加载到一个名为 `menu` 的 Java `Menu` 对象中的代码。


    这段 Java 代码如图 6-4 所示，它使用了 `.inflate()` 方法，你需要将你在 `main.xml` 文件中创建的 XML `<menu>`
    父标签结构定义传递给该方法。


    ![A978-1-4302-5786-8_6_Fig4_HTML.jpg](img/A978-1-4302-5786-8_6_Fig4_HTML.jpg)


    图 6-4.


    在 `MainActivity` 中查看 `onCreateOptionsMenu()` 方法和 `getMenuInflater().inflate()`
    方法


    你将通过使用引用路径 `R.menu.main` 将你的菜单 XML 定义传递给 `.inflate()` 方法，该路径分解为 `R`（资源文件夹）、`.menu`（菜单子文件夹）、`.main`（`main.xml`
    文件）。


    这是在 `getMenuInflater()` 方法上调用的，使用点符号将这两个方法链接在一起，如下方代码行所示：


    `getMenuInflater().inflate(R.menu.main, menu);`


    在 `MenuInflater` 类使用你在 XML 中创建的定义填充了 `Menu` 对象之后，程序会处理 `return true;` 语句，从 `onCreateOptionsMenu()`
    方法返回一个布尔值 `true` 标志，以告知 Android 操作系统选项菜单对象已成功加载。


    接下来，让我们在 Eclipse 的 Nexus One 模拟器中查看菜单更改的结果，以确保一切正常。右键单击项目文件夹，使用 **Run As ➤ Android
    Application** 菜单序列启动模拟器，然后使用 Nexus One 模拟器右上角的 MENU 按钮。该按钮是模拟器顶部起的第二行按钮中的第二个。


    点击此按钮后，你应该会看到在启动屏幕底部弹出一个选项菜单，上面有你创建的两个项目（见图 6-5）。


    ![A978-1-4302-5786-8_6_Fig5_HTML.jpg](img/A978-1-4302-5786-8_6_Fig5_HTML.jpg)


    图 6-5.


    在 Nexus One 模拟器中测试你的新选项菜单


    既然你已经利用应用中已有的 Java 和 XML 代码加载了选项菜单，你需要在 `MainActivity.java` Java 代码中创建一个新方法，该方法将在用户选择这些选项菜单项时调用新的
    Activity 屏幕。


    不过，首先你需要有第二个 Activity 来在该代码中调用，因此让我们创建应用的第二个 Activity 类，用于存放专业安卓图形电子书应用的目录屏幕设计。

    '
- fmt: '# Creating a Table of Contents Activity for Your UI Design


    Let’s create a new Java Class in Eclipse. You do this by right-clicking your `GraphicsDesign`
    project folder at the top of the Package Explorer pane, as shown in Figure [6-6](#A978-1-4302-5786-8_6_Chapter.html#Fig6),
    and selecting the `New ➤ Class` menu command sequence.


    This will open up the `New Java Class` dialog, which will allow you to specify
    the characteristics of the new `Activity` subclass that you want to create.


    ![A978-1-4302-5786-8_6_Fig6_HTML.jpg](A978-1-4302-5786-8_6_Fig6_HTML.jpg)


    Figure 6-6. Right-clicking the `GraphicDesign` project folder and selecting `New
    ➤ Class` menu items to create a new `Activity`


    Make sure the Source folder is set to `GraphicsDesign/src` and the Package is
    set to your `pro.android.graphics` package name. Set the Name field to be `ContentsActivity`,
    which will create the name `ContentsActivity.java` for your file, and then click
    the Browse button next to the Superclass field and type an “a” character in the
    `Choose a type` field to narrow your search (see Figure [6-7](#A978-1-4302-5786-8_6_Chapter.html#Fig7)).


    ![A978-1-4302-5786-8_6_Fig7_HTML.jpg](A978-1-4302-5786-8_6_Fig7_HTML.jpg)


    Figure 6-7. Creating a New Java Activity Class named `ContentsActivity` using
    the `android.app.Activity` Superclass


    Scroll down until you see the `Activity` class and click it to select it for use
    as your Superclass value, and then click the OK button in the `Superclass Selection`
    sub-dialog to return to the `New Java Class` main dialog. Then click the Finish
    button to create the new Java Activity in Eclipse. Once this is done, you will
    see your new `ContentsActivity.java` class open in a tab in the central editing
    pane of Eclipse, as shown in Figure [6-8](#A978-1-4302-5786-8_6_Chapter.html#Fig8).
    Notice that your package declaration, import statement, and `public class ContentsActivity
    extends Activity` declaration are all in place and ready to add Java code into,
    which you are going to do next.


    ![A978-1-4302-5786-8_6_Fig8_HTML.jpg](A978-1-4302-5786-8_6_Fig8_HTML.jpg)


    Figure 6-8. Your new `public class ContentsActivity extends Activity` Superclass
    in a `pro.android.graphics` package


    To create your `Activity`, you will first need to call your Superclass `Activity`
    `onCreate()` method by using the `super.onCreate(saveInstanceState)`; line of
    code inside your `protected void onCreate(Bundle saveInstanceState)` method.


    You did the same thing in your `MainActivity.java` class. In fact, if you want
    to copy similar code from the `MainActivity.java` editing tab in Eclipse, it will
    save you some time typing it in!


    The next line of code in your `onCreate()` method will give the `Activity` that
    you created in the first line of code a screen layout (user interface) by using
    the `setContentView()` method with a reference path to the layout XML file that
    you are going to create next.


    Since you know that this is going to be in the `/res/layout` folder and that you
    are going to name it `activity_contents.xml`, you can insert the reference path
    now using the `R.layout.activity_contents`, so your method call looks like the
    following line of code:


    `setContentView(R.layout.activity_contents);`


    This is all you need to do in order to set up a new `Activity`; create it, and
    then set its `ContentView` to your XML screen layout definition. You may notice
    in Figure [6-9](#A978-1-4302-5786-8_6_Chapter.html#Fig9) that Eclipse has error
    flagged an XML file reference!


    ![A978-1-4302-5786-8_6_Fig9_HTML.jpg](A978-1-4302-5786-8_6_Fig9_HTML.jpg)


    Figure 6-9. Creating your `onCreate()` method, calling `super.onCreate()` Superclass
    method and `setContentView()`


    This is because you have not yet created this file. Since you are going to do
    that next, you can ignore that wavy red error underline flag for now.


    ## Creating an XML Table of Contents LinearLayout UI Design


    Next, you need to create a new XML layout definition, so let’s again right-click
    your top-level project folder, and this time you will select the `New ➤ Android
    XML File` menu sequence, as shown in Figure [6-10](#A978-1-4302-5786-8_6_Chapter.html#Fig10).


    ![A978-1-4302-5786-8_6_Fig10_HTML.jpg](A978-1-4302-5786-8_6_Fig10_HTML.jpg)


    Figure 6-10. Right-clicking the `GraphicDesign` project folder and creating a
    `New ➤ Android XML File` via menu sequence


    This will bring up the `New Android XML File` dialog, shown in Figure [6-11](#A978-1-4302-5786-8_6_Chapter.html#Fig11),
    where you can specify what type of XML file you want Eclipse to create.


    ![A978-1-4302-5786-8_6_Fig11_HTML.jpg](A978-1-4302-5786-8_6_Fig11_HTML.jpg)


    Figure 6-11. Creating a new Layout XML file named `activity_contents`


    Select the Layout Resource Type and the GraphicsDesign Project, and then name
    the file `activity_contents`, and select a Root Element of `LinearLayout`, and
    click on the Finish button to create the `activity_contents.xml` file that is
    shown in Figure [6-12](#A978-1-4302-5786-8_6_Chapter.html#Fig12) in the Graphical
    Layout Editor (I call it the GLE) pane inside Eclipse. The GLE can be accessed
    using the left bottom tab in Eclipse. Since you want to review the XML tags and
    parameters that we have been talking about in this chapter, click the other bottom
    tab and switch the editing view into XML editing mode so that you can work directly
    with your XML markup, rather than using the GLE’s drag-and-drop visual editing
    mode.


    ![A978-1-4302-5786-8_6_Fig12_HTML.jpg](A978-1-4302-5786-8_6_Fig12_HTML.jpg)


    Figure 6-12. Newly created `activity_contents.xml` file shown in Eclipse central
    editing pane in Graphical Layout


    Once you click the `activity_contents.xml` XML editing tab, which is at the bottom
    of the `activity_contents.xml` top tab editing pane (confused yet?) in Eclipse,
    you will see the `<LinearLayout>` parent tag and the parameters that the `New
    XML File` dialog created for you, as shown in Figure [6-13](#A978-1-4302-5786-8_6_Chapter.html#Fig13).


    ![A978-1-4302-5786-8_6_Fig13_HTML.jpg](A978-1-4302-5786-8_6_Fig13_HTML.jpg)


    Figure 6-13. Switching to XML markup editing mode and taking a look at your `LinearLayout`
    container parameters


    As you can see, the required `xmlns:android` and `android:layout_width` as well
    as the `android:layout_height` parameters are all included for you and set to
    their default values, which are correct, so let’s leave them as-is.


    The only `LinearLayout` parent tag parameter that you are going to change is the
    `android:orientation` parameter, which you are going to set to horizontal for
    the parent tag. You are using the horizontal orientation for the parent tag container
    because you are going to nest two vertical `LinearLayout`s next to each other,
    so the top-level orientation is going to be horizontal, as the two vertical sub-layouts
    are next to each other. Next, place the cursor after the `>` (closing chevron)
    on the opening `LinearLayout` tag and then press the return key to auto-indent
    your next line of code. Finally, press a `<` (opening chevron) to open the child
    tag helper dialog, as shown in Figure [6-14](#A978-1-4302-5786-8_6_Chapter.html#Fig14).


    ![A978-1-4302-5786-8_6_Fig14_HTML.jpg](A978-1-4302-5786-8_6_Fig14_HTML.jpg)


    Figure 6-14. Setting your parent `<LinearLayout>` container to a horizontal orientation
    and invoking a helper dialog


    Find the `LinearLayout` tag on the helper dialog, and double-click it to add a
    nested `LinearLayout` container underneath the current one. The nested `LinearLayout`
    tag is shown in Figure [6-15](#A978-1-4302-5786-8_6_Chapter.html#Fig15), with
    the parameters that you will need to add next in order to make it lay out vertically
    and fit the screen across many different types of Android devices, screen sizes,
    and shapes.


    ![A978-1-4302-5786-8_6_Fig15_HTML.jpg](A978-1-4302-5786-8_6_Fig15_HTML.jpg)


    Figure 6-15.'
