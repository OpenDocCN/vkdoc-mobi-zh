    点击图形布局编辑器选项卡，这样你就可以可视化使用`LayerDrawable`类在 Android 中实现的数字图像合成。


    如图 12-7 所示，你的`ImageView` UI 元素（在 XML 编辑窗格中，我们的编辑光标仍在其边界内，因此显示为选中状态）现在显示了一个三层图像合成层叠：底部是`cloudsky.jpg`图像，上面是`bookmark0.png`图像，再上面是`ninepatchframe`
    9-patch 图像素材，所有图层完美合成。


    不知何故，这个图像合成看起来没有达到预期的专业水平；因此，接下来让我们改变数字图像素材的顺序，这样环状图形就不会被合成周界周围的 9-patch 图像素材平铺所截断。

    '
- fmt: 'It’s important to note that this is now easy to do because of the way that
    your image layer stack, or `LayerDrawable` object, is set up. By using an XML
    definition file, you have decentralized the graphics design for your digital image
    layering, and so all you have to do is switch up two `android:drawable` parameter
    references for the second and third child `<item>` tags, and this is done in the
    blink of an eye.


    Let’s do that next so that you can see the results of this different layer stack
    order, rendered by Android (and by Eclipse ADT via the GLE). They might not be
    exactly what you are expecting!


    ![A978-1-4302-5786-8_12_Fig7_HTML.jpg](A978-1-4302-5786-8_12_Fig7_HTML.jpg)


    **Figure 12-7.** Using the Graphical Layout Editor to review the results of the
    `contents_layers.xml` `LayerDrawable`


    Next, click the `contents_layer.xml` tab at the top of Eclipse and switch back
    into `LayerDrawable` object XML definition editing mode to make these two parameter
    image asset reference changes, as shown in Figure [12-8](#A978-1-4302-5786-8_12_Chapter.html#Fig8).


    Your final `contents_layers.xml` `LayerDrawable` object definition XML markup
    for these three `<item>` child tags, as shown in Figure [12-8](#A978-1-4302-5786-8_12_Chapter.html#Fig8),
    should appear exactly like the following XML markup structure:


    ```

    <item

    android:id="@+id/layerOne"

    android:drawable="@drawable/cloudsky" />

    <item

    android:id="@+id/layerTwo"

    android:drawable="@drawable/ninepatchframe" />

    <item

    android:id="@+id/layerThree"

    android:drawable="@drawable/bookmark0" />

    ```


    ![A978-1-4302-5786-8_12_Fig8_HTML.jpg](A978-1-4302-5786-8_12_Fig8_HTML.jpg)


    **Figure 12-8.** Changing the drawable layer order to place `ninepatchframe` image
    asset underneath the `bookmark0`


    Now you are ready to test your new layer compositing stack in the Graphical Layout
    Editor tab. Since that’s not available to you in the `contents_layers` XML editing
    pane shown in Figure [12-8](#A978-1-4302-5786-8_12_Chapter.html#Fig8), you will
    need to click the `activity_contents.xml` tab at the top of Eclipse and then the
    Graphical Layout Editor tab at the bottom in order to view your revised image
    assets multi-layer composite (`LayerDrawable` object), as shown in Figure [12-9](#A978-1-4302-5786-8_12_Chapter.html#Fig9).


    The first thing that you will notice is that the hoop part of the bookmark image
    does not overlay on top of the `ninepatchframe` image layer, as you may have expected
    it to. Think for a moment about what attributes of a 9-patch image asset might
    be influencing the rendering pipeline calculation for this particular layer stack
    compositing order. Did you figure it out yet?


    Think back to the chapter covering Android’s `NinePatch` class ([Chapter 10](#A978-1-4302-5786-8_10_Chapter.html)),
    when you defined your padding values for this 9-patch image asset using the right
    and bottom one-pixel black border line segments. If you recall, what this padding
    area does is to define (or force) anything placed inside this `NinePatch` asset
    inside the padding area you previously specified. Essentially the padding makes
    sure your `NinePatch` asset’s “perimeter artwork” is not obscured.


    This is what you are seeing here for the bookmark image asset layer on top of
    and thus rendered inside your `ninepatchframe` 9-patch image asset.


    So how do I get the hoop to overlay the 9-patch image asset frame, you may be
    wondering. To accomplish this, go back into your Draw 9-patch utility, and extend
    the black lines on the bottom and right all the way to the edges of the image
    asset. This will tell Android that you want your contents in (or on top of, in
    this case) the 9-patch asset to be able to overlap the asset’s image component,
    as well as its interior space. You can also define an alpha channel inside that
    interior 9-patch space so you can use this 9-patch for future compositing, such
    as you are doing here.


    ![A978-1-4302-5786-8_12_Fig9_HTML.jpg](A978-1-4302-5786-8_12_Fig9_HTML.jpg)


    **Figure 12-9.** Using the Graphical Layout Editor to review new results of the
    `contents_layers.xml` `LayerDrawable`


    The next step that you should take is to now test this `LayerDrawable` in the
    Nexus One emulator and visualize the results, and make sure that your `LayerDrawable`
    object is working with your Java compositing code.


    Use your **Run As ➤ Android Application** work process and launch your Android
    application in the Nexus One emulator; notice on the left hand side of Figure
    [12-10](#A978-1-4302-5786-8_12_Chapter.html#Fig10) that your `LayerDrawable` rendering
    pipeline (which you saw before in the Graphical Layout Editor shown in Figure
    [12-9](#A978-1-4302-5786-8_12_Chapter.html#Fig9)) is not showing up in the Nexus
    One. This is not the fault of your XML markup, which you know due to the GLE is
    working fine, so it must be an issue with your Java code.


    ![A978-1-4302-5786-8_12_Fig10_HTML.jpg](A978-1-4302-5786-8_12_Fig10_HTML.jpg)


    **Figure 12-10.** Running your `GraphicsDesign` application in the Nexus One emulator
    to see your `LayerDrawable`


    Let’s click the `ContentsActivity.java` tab and take a look at your Java code.
    As you can see in Figure [12-11](#A978-1-4302-5786-8_12_Chapter.html#Fig11) at
    the bottom of the code listing, I found the problem and commented it out so the
    XML definition will display.


    ![A978-1-4302-5786-8_12_Fig11_HTML.jpg](A978-1-4302-5786-8_12_Fig11_HTML.jpg)


    **Figure 12-11.** Removing the `.setImageBitmap()` method call to allow the `LayerDrawable`
    XML definition to display


    What was happening was that in the last two lines of your Java code you were instantiating
    the `ImageView` object—this line of code will still work great for displaying
    your `LayerDrawable` definition—but then you were writing your `Canvas` object
    into that `ImageView` using a `.setImageView()` method call. The last line of
    code was thus obscuring your `LayerDrawable` from view, so I commented it out
    and obtained the intended results, as shown on the right-hand side of the screen
    shot in Figure [12-10](#A978-1-4302-5786-8_12_Chapter.html#Fig10).


    So, from a processing standpoint in Android, what was happening is that you were
    defining your `LayerDrawable` in XML and setting your `ImageView` object to display
    it correctly, which you confirmed by using the Graphical Layout tab in Eclipse
    earlier during your design and markup coding work process.


    However, in your image compositing Java code, which you have been writing in your
