    As you can see in Figure [16-28](#A978-1-4302-5786-8_16_Chapter.html#Fig28), you
    are going to change the zero to a 255 data value for the .getOpacity( ) method’s
    return value. You will do this by using the following Java statement inside the
    .getOpacity( ) method:


    `return 255;`


    As you can see in Figure [16-28](#A978-1-4302-5786-8_16_Chapter.html#Fig28), your
    Java code is error-free and your new ImageRoundingDrawable class is now complete.


