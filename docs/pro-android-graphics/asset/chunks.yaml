  trans: '

    ## 编写你的 SketchPad 活动：使用 `SketchPadView`


    现在你已经能够创建一种新的 `View` 对象，名为 `SketchPadView`，你可以点击 `SketchPad.java` 标签页（如图 17-25
    所示），并声明一个名为 `sketchPadView` 的 `SketchPadView` 对象。现在你可以使用 `SketchPadView` 了。


    ![A978-1-4302-5786-8_17_Fig25_HTML.jpg](img/A978-1-4302-5786-8_17_Fig25_HTML.jpg)


    图 17-25. 在你的 `SketchPad.java` 活动顶部声明一个名为 `sketchPadView` 的 `SketchPadView` 对象


    你要对 `sketchPadView` 对象做的第一件事，就是使用构造函数方法，通过 `new` 关键字来实例化它，如下所示：


    `sketchPadView` = `new SketchPadView(this);`


    请注意在图 17-26 中，你正在传递 `SketchPadView(Context context)` 构造函数方法所需的 `Context` 对象（`this`）。如你所知，`Context`
    对象（在此处通过 `this` 关键字表示，无意双关）包含了描述你的 `SketchPad.java` 活动类如何融入你的 `GraphicsDesign`
    应用的信息。


    ![A978-1-4302-5786-8_17_Fig26_HTML.jpg](img/A978-1-4302-5786-8_17_Fig26_HTML.jpg)


    图 17-26. 在 `onCreate()` 内部使用 `SketchPadView()` 构造函数实例化 `sketchPadView` 对象


    下一步是告诉你的活动的 `ContentView` 对象你想要显示什么。本书通篇可见，这通常被设置为一个 XML 用户界面布局定义。但在此例中，你将改为设置显示你的
    `sketchPadView` `SketchPadView` 对象，如图 17-27 所示。


    ![A978-1-4302-5786-8_17_Fig27_HTML.jpg](img/A978-1-4302-5786-8_17_Fig27_HTML.jpg)


    图 17-27. 将 SketchPad 活动子类的 `ContentView` 设置为 `sketchPadView` `SketchPadView` 对象


    这是通过使用 `.setContentView()` 方法将 `sketchPadView` 对象传递给 `ContentView` 对象来实现的，如下面的
    Java 代码行所示：


    `setContentView(sketchPadView);`


    接下来你需要做的是，为用户激活你的 SketchPad 活动屏幕表面，以便它能将 `MotionEvent` 对象发送到你的 `onTouch()` 事件处理方法。这可以通过从
    `sketchPadView` 对象调用 `.requestFocus()` 方法，向 Android 操作系统请求该视图的焦点来实现。使用以下 Java
    代码行完成此操作：


    `sketchPadView.requestFocus();`


    如图 17-28 所示，我在 Eclipse IDE 中点击了 Java 代码中的一个 `sketchPadView` 对象引用，以便它能为我（或者说在此例中，为你）高亮显示对象轨迹。我这样做是为了让你能看到对象的声明和实例化（棕褐色高亮），以及它的使用（灰色高亮，即后两处高亮）。


    ![A978-1-4302-5786-8_17_Fig28_HTML.jpg](img/A978-1-4302-5786-8_17_Fig28_HTML.jpg)


    图 17-28. 通过从 `sketchPadView` 对象调用 `.requestFocus()` 方法来请求触摸屏焦点


    将此 SketchPad 工具添加到你的 `GraphicsDesign` 应用的最后一步，是在 Eclipse 的 Nexus One 模拟器 AVD 中测试该应用。


    ## 测试 SketchPad 活动类：手写一个 PAG 徽标


    右键点击你的项目文件夹名称，选择 `Run As ➤ Android Application` 菜单序列以启动 Nexus One AVD。当应用主屏幕出现时，点击模拟器右上角的
    `MENU` 按钮（底部行第二个按钮），打开你的选项菜单，点击 `The PAG SketchPad` 菜单项，然后启动你的 SketchPad 活动子类。


    按住鼠标左键，模拟手指触摸屏幕表面，用你最拿手的笔迹，为我写出 `PAG`！


    如图 17-29 所示，你的 `GraphicsDesign` 应用套件的新增功能运行良好，并且如截图右侧所示，你移动手指的速度越快，绘制到屏幕上的 5 像素圆圈之间的间距就越大。在本次
    `PAG` 手写练习的末尾，我快速移动笔划，以便在屏幕上直观地展示这一点。


    ![A978-1-4302-5786-8_17_Fig29_HTML.jpg](img/A978-1-4302-5786-8_17_Fig29_HTML.jpg)


    图 17-29. 在 Nexus One AVD 模拟器中测试 `PAG` SketchPad 活动，并手写一个 `PAG` 徽标


    这已经相当酷了，但让我们通过实现一个在专业图像编辑软件（如 Photoshop 或 GIMP）中才能找到的功能，将这款 SketchPad 工具提升到一个新的水平。我在这些软件中使用的一个功能是
    `克隆工具`，它允许我选择想要用作画笔源的图像，并使用该图像的像素数据进行绘画。如果我们能在 `SketchPadView` 中实现类似的功能，它将比基本的青色墨水绘制更令人印象深刻（也更有用）。

    '
- fmt: '# Paint Using a Bitmap Source: Implementing Your InkShader


    To accomplish this, you must essentially create an `InkShader` for your pen (or
    finger), which will require a number of classes that you have already used inside
    the fairly aggressive graphics pipeline constructions during this book.


    The first thing that you need to do is to create a `paintImage` Bitmap object
    by using the `BitmapFactory` class and its `.decodeResource()` method call.


    Inside this `BitmapFactory.decodeResource()` method call, you will want to nest
    yet another `getResources()` method call, as well as a reference to the `R.drawable.cloudsky`
    image asset. You will do this using the following code:


    ```

    Bitmap paintImage = BitmapFactory.decodeResources(getResources(), R.drawable.cloudsky);

    ```


    As you can see in Figure 17-30, you are placing this code right after your `paintScreen`
    object instantiation to keep your `paintScreen` and `paintImage` objects together.
    Sometimes you just have to take the initiative to make your Java coding romantic.
    Now that you have a `paintImage` Bitmap object to clone colored pixel data from,
    you can go ahead and create your Shader code.


    ![A978-1-4302-5786-8_17_Fig30_HTML.jpg](A978-1-4302-5786-8_17_Fig30_HTML.jpg)


    *Figure 17-30. Creating the `paintImage` Bitmap object by using a `BitmapFactory.decodeResource()`
    method call*


    Now you can use your trusty `BitmapShader` class to create an `inkShader` object
    by instantiating a new (keyword) `BitmapShader` object using your `paintImage`
    as the Bitmap object parameter along with a `Shader.TileMode.CLAMP` constant for
    the X and the Y axis or dimension, as shown in Figure 17-31.


    The Java code to accomplish this `inkShader` configuration looks like this:


    ```

    BitmapShader inkShader = new BitmapShader(paintImage, Shader.TileMode.CLAMP, Shader.TileMode.CLAMP);

    ```


    ![A978-1-4302-5786-8_17_Fig31_HTML.jpg](A978-1-4302-5786-8_17_Fig31_HTML.jpg)


    *Figure 17-31. Creating an `inkShader` BitmapShader object using the `new` keyword
    and `BitmapShader` constructor*


    As you can see in Figure 17-31 and Figure 17-32, you need to mouse-over the `Shader`
    and `BitmapShader` class references, and have Eclipse import the `Shader` and
    `BitmapShader` classes from the `android.graphics` package.


    ![A978-1-4302-5786-8_17_Fig32_HTML.jpg](A978-1-4302-5786-8_17_Fig32_HTML.jpg)


    *Figure 17-32. Mouse-over `Shader` and `BitmapShader` class references and have
    Eclipse code import statements for you*


    Next, so you can visualize painting with a Bitmap image asset source, change your
    thin 5 pixel paintbrush stroke width to a much wider `25 pixel paintbrush stroke`
    width, just like you would do if you were working in GIMP 2.8.6 or Photoshop CS6,
    only via Java code.


    Click the plus icon next to the `onDraw()` method block of code in Eclipse, as
    shown in Figure 17-33, and open up the method so that you can edit the `for` loop
    and the `canvas.drawCircle()` method call that live inside it.


    Change the third data parameter from a value of 5 to a value of `25`, so that
    the method call looks like the following Java programming statement:


    ```

    canvas.drawCircle(point.x, point.y, 25, paintScreen);

    ```


    Once this is done, you’ll be ready to “wire up” your `inkShader` BitmapShader!


    ![A978-1-4302-5786-8_17_Fig33_HTML.jpg](A978-1-4302-5786-8_17_Fig33_HTML.jpg)


    *Figure 17-33. Changing brush stroke width from 5 pixels to 25 pixels in the `.onDraw()`
    method’s `.drawCircle()` call*


    Let’s close up your `onDraw()` method by clicking the minus sign, and open up
    the `SketchPadView()` constructor method by clicking the plus sign. Next, you
    are going to replace the `paintScreen.setColor()` method call with a call to set
    the `BitmapShader inkShader` object instead via the following code:


    ```

    paintScreen.setShader(inkShader);

    ```


    This wires up an `inkShader` BitmapShader object that contains a `paintImage`
    Bitmap object into your `paintScreen` Paint object, which is in turn used in the
    `onDraw()` method to create your paintbrush, and turns it into a cloning tool.
    As you can see in Figure 17-34, your code is error-free; thus, you are ready to
    have some fun cloning your `cloudsky.jpg` image asset via your Canvas object surface
    using fat 25 pixel brushstrokes, just like you’d do in GIMP.


    ![A978-1-4302-5786-8_17_Fig34_HTML.jpg](A978-1-4302-5786-8_17_Fig34_HTML.jpg)


    *Figure 17-34. Changing a `paintScreen.setColor()` method call to a `paintScreen.setShader(inkShader)`
    method call*


    This will essentially look like you are erasing the white (default) system screen
    background color and exposing the `cloudsky` image behind it. However, this is
    not in fact what is happening; actually you are painting using your Bitmap image
    source onto this white canvas surface.


    Let’s use the `Run As ➤ Android Application` menu sequence and launch the Nexus
    One emulator so you can see your shader drawing pipeline in action.


    Click the `MENU` button on the emulator, and select `The PAG SketchPad` menu item,
    and launch the `SketchPad.java` Activity subclass so that you can test your new
    code using the Nexus One AVD emulator one final time (we hope).


    When the white screen appears, draw a huge PAG to expose some of the pixel color
    data that is being culled from your Bitmap object using the `Shader` and `BitmapShader`
    classes. As you can see in Figure 17-35, I also played around with the appearance
    of exposing the image behind the white overlay, which, although this is not really
    what is happening, you could always use this perceived effect to your advantage
    if you wanted to in your own apps!


    ![A978-1-4302-5786-8_17_Fig35_HTML.jpg](A978-1-4302-5786-8_17_Fig35_HTML.jpg)


    *Figure 17-35. Testing your InkShader and image cloning drawing feature using
    the Nexus One AVD emulator*


    ## Summary


    In this seventeenth chapter, you learned how to leverage an `.onDraw()` method
    in conjunction with the `Paint` and `Canvas` classes to create your own custom
    `SketchPad` graphics program in Android. We took a more detailed look at both
    the `Canvas` and the `Paint` classes. Then you coded your own drawing on a canvas
    pipeline to learn how to create interactive graphics applications using `Paint`,
    `Canvas`, `onDraw()`, and `onTouch()` with some other key classes.


    Along the way you learned about some other important classes for graphics, including
    the `Context` class for providing the context for what you are doing to the Android
    OS, plus the `List` and `ArrayList` classes for creating collections (lists) and
    arrays of those collections.


    You also learned more about the `MotionEvent` class, which you later utilized
    for movement tracking and touch event data processing in the Android OS and in
    interactive applications (in this case, your `SketchPadView` View subclass). You
    learned how to create your own custom View subclass, just like you learned how
    to create a custom Drawable subclass back in Chapter 16.


    In the next chapter, we’ll switch back into digital video editing and optimization
    mode, which you were learning about back in Chapter 2 before we got sidetracked
    by all of this other really cool graphics pipeline coding.'
