- fmt: '接下来，你可以使用`android:typeface`参数将字体更改为等宽字体（如果你喜欢罗马字体，也可以使用衬线字体），该参数可以设置为`normal`、`sans`、`serif`或`monospace`。如果愿意，你可以在XML标记中尝试这些设置；我使用了`monospace`，因为它能使文本在屏幕顶部更均匀地分布，并且与屏幕顶部的Activity标签（使用`sans/normal`字体）形成视觉区分。


    为了让文本更粗，我们来实现`android:textStyle`参数，将其设置为`bold`，你也可以使用`normal`或`italics`来实现不同的文本样式效果。我使用了粗体，因为我想在添加投影效果之前加粗字体笔画。


    此外，通过将`android:textSize`参数设置为`21sp`来增大`TextView`的大小。需要注意的是，Android操作系统中的所有文本或字体设置都使用标准像素或`sp`单位，而不是密度无关像素`dip`或`dp`。原因在于（你在[第5章](#A978-1-4302-5786-8_5_Chapter.html)中已经学过），Android会对其使用的字体应用缩放因子，你可以通过`DisplayMetrics`类来获取该因子。现在，你已拥有一个可以添加投影效果的大尺寸、加粗的`TextView`对象！


    使用`android:`工作流程打开你的辅助对话框，输入文本字符串`android:shadow`，系统将仅为你筛选出与阴影相关的参数。共有四个参数：`Dx`（Delta-X）、`Dy`（Delta-Y）、`Color`和`Radius`。如果你不清楚，“Delta”指的是偏移量，即与实际文本的差值，因此设置为`0.0`将不产生任何效果。


    ![A978-1-4302-5786-8_7_Fig9_HTML.jpg](A978-1-4302-5786-8_7_Fig9_HTML.jpg)


    **图 7-9.** 为`TextView`添加高级标签参数：字体、样式、字号及投影特效


    需要注意的是，投影特效不会在图形布局编辑器（GLE）选项卡中渲染，因此你在Eclipse中无法看到这些参数！你必须使用“Run As ➤ Android Application”工作流程，然后在Nexus
    One模拟器中查看它们。这就是为什么我在截图7-8中包含了右侧远端的显示结果面板。


    首先，使用`android:shadowDx`参数（设置为实数值`-1.7`）和`android:shadowDy`参数（设置为实数值`1.675`）来指定投影相对于文本的偏移量。注意，我利用了实数类型的特性，为Y轴值提供了精确的小数，这使得投影几乎位于文本下方两个像素处。X轴负值则将投影向左拉动近两个像素，形成标准的45度投影效果，这意味着光源来自图像右上方。


    接下来，设置投影颜色。我使用`android:shadowColor`参数将其设置为浅灰色的十六进制值`#999999`。


    最后，你需要使用`android:shadowRadius`参数设置投影的模糊（柔化）半径，这里同样使用实数值`1.75`像素。


    这个设置将为你带来漂亮且逼真的投影模糊半径，效果就像你在Photoshop或GIMP中实现的那样。区别在于，你是在Android应用中使用几个字节的标记代码来实现，而不是使用千字节的数字图像资源数据。


    如果希望投影边缘清晰，你可以使用非常小的值，例如`0.1`来达到此效果。中等值如`0.5`会添加少量模糊，而大值如`2.0`则会为投影增加大量模糊或柔化。为了实现最逼真的阴影，我建议值设置在`1.25`到`1.75`之间，但使用这四个`android:shadow`参数可以创造出许多酷炫的效果。


    对我们这些图形设计师来说，另一个非常重要的UI控件是`ImageView`控件。你将在下一节中更详细地了解该控件及其一些重要参数，届时你将在书签实用工具Activity中添加一张书签页的图片。'
  raw: 'Next, you can change to a monospace font (or serif if you like Roman fonts)
    using the `android:typeface` parameter, which can take a value setting of normal,
    sans, serif, or monospace. You can experiment with these settings a bit in your
    XML markup, if you like; I used monospace because it spaces the text out a bit
    more across the top of the screen and looks different from the Activity label
    (which uses sans/normal) at the top of the screen.


    To make your text thicker, let’s implement the `android:textStyle` parameter and
    set it to the value of “bold ”, or you can also use normal or italics to achieve
    different text styling effects. I used bold because I am trying to thicken the
    strokes of the font before I add in a drop shadow effect.


    Let’s also make the TextView’s size larger by using the `android:textSize` parameter
    with a setting of 21sp. It’s important to note that all text or font settings
    in Android OS use standard pixel or sp notation, not density-independent pixel,
    or dip (or dp). The reason for this, which you learned in [Chapter 5](#A978-1-4302-5786-8_5_Chapter.html),
    is because Android will apply a font scaling factor to the fonts it uses in the
    OS, which you can poll by using the `DisplayMetrics` class. Now you have a big,
    wide, fat TextView object you can drop shadow!


    Use the android: work process to open your helper dialog, and type in the text
    string `android:shadow`, which will then find only the shadow parameters for you.
    There are four of them: Dx for Delta-X, Dy for Delta-Y, Color, and Radius. In
    case you are wondering, a “delta” is an offset, or a difference from the actual
    text, so a real value setting of 0.0 would do nothing.


    ![A978-1-4302-5786-8_7_Fig9_HTML.jpg](A978-1-4302-5786-8_7_Fig9_HTML.jpg)


    Figure 7-9.


    Adding advanced TextView tag parameters for typeface, style, size, and drop shadow
    special effects


    It is important to note that drop shadow FX do not render in the Graphical Layout
    Editor (GLE) tab, so you can’t see these parameters in Eclipse! You must use a
    Run As ➤ Android Application work process, and view them in the Nexus One emulator.
    This is why I included the pane in Figure [7-8](#A978-1-4302-5786-8_7_Chapter.html#Fig8)
    showing the results on the far right side of the screen shot.


    First, let’s specify the drop shadow offsets from the text itself, using the `android:shadowDx`
    parameter set to a real data value of `-1.7`, and then the `android:shadowDy`
    parameter set to a real data value of `1.675`. Notice that I am taking advantage
    of this real number and providing a precise decimal number for the y axis value,
    which puts the shadow almost two pixels under the text. The x axis negative value
    pulls the shadow almost two pixels to the left, giving you a standard 45 degree
    dropshadow, which puts your light source coming from the upper right of the image.


    Next, let’s set the drop shadow color, which I am going to set to a light grey
    hexadecimal value of `#999999` using the `android:shadowColor` parameter.


    Finally, you will need to set the shadow blur (soften) radius by using the `android:shadowRadius`
    parameter, again using a real value of 1.75 pixels.


    This setting will give you a nice, realistic shadow blur radius, just like you
    could achieve in Photoshop or GIMP. The difference is that you are doing this
    here in your Android app using a few bytes of markup rather than kilobytes of
    digital image asset data.


    If you wanted clean edges on your shadow, you would use a very small value such
    as 0.1 to achieve this effect. A medium value such as 0.5 would add a little blur,
    and a large value such as 2.0 would add a lot of blur of softening to the shadow.
    I recommend a value between 1.25 and 1.75 for the most realistic shadow, but lots
    of cool effects can be achieved using these four android:shadow parameters.


    Another very important UI widget to us graphics designers is the ImageView widget.
    You’ll take a closer look at that widget, and some of its important parameters
    in the next section when you add a picture of your bookmark page to the Bookmarking
    Utility Activity.'
  trans: '

    接下来，你可以使用`android:typeface`参数将字体更改为等宽字体（如果你喜欢罗马字体，也可以使用衬线字体），该参数可以设置为`normal`、`sans`、`serif`或`monospace`。如果愿意，你可以在
    XML 标记中尝试这些设置；我使用了`monospace`，因为它能使文本在屏幕顶部更均匀地分布，并且与屏幕顶部的 Activity 标签（使用`sans/normal`字体）形成视觉区分。


    为了让文本更粗，我们来实现`android:textStyle`参数，将其设置为`bold`，你也可以使用`normal`或`italics`来实现不同的文本样式效果。我使用了粗体，因为我想在添加投影效果之前加粗字体笔画。


    此外，通过将`android:textSize`参数设置为`21sp`来增大`TextView`的大小。需要注意的是，Android 操作系统中的所有文本或字体设置都使用标准像素或`sp`单位，而不是密度无关像素`dip`或`dp`。原因在于（你在第
    5 章中已经学过），Android 会对其使用的字体应用缩放因子，你可以通过`DisplayMetrics`类来获取该因子。现在，你已拥有一个可以添加投影效果的大尺寸、加粗的`TextView`对象！


    使用`android:`工作流程打开你的辅助对话框，输入文本字符串`android:shadow`，系统将仅为你筛选出与阴影相关的参数。共有四个参数：`Dx`（Delta-X）、`Dy`（Delta-Y）、`Color`和`Radius`。如果你不清楚，“Delta”指的是偏移量，即与实际文本的差值，因此设置为`0.0`将不产生任何效果。


    ![A978-1-4302-5786-8_7_Fig9_HTML.jpg](img/A978-1-4302-5786-8_7_Fig9_HTML.jpg)


    **图 7-9.** 为`TextView`添加高级标签参数：字体、样式、字号及投影特效


    需要注意的是，投影特效不会在图形布局编辑器（GLE）选项卡中渲染，因此你在 Eclipse 中无法看到这些参数！你必须使用“Run As ➤ Android
    Application”工作流程，然后在 Nexus One 模拟器中查看它们。这就是为什么我在截图 7-8 中包含了右侧远端的显示结果面板。


    首先，使用`android:shadowDx`参数（设置为实数值`-1.7`）和`android:shadowDy`参数（设置为实数值`1.675`）来指定投影相对于文本的偏移量。注意，我利用了实数类型的特性，为
    Y 轴值提供了精确的小数，这使得投影几乎位于文本下方两个像素处。X 轴负值则将投影向左拉动近两个像素，形成标准的 45 度投影效果，这意味着光源来自图像右上方。


    接下来，设置投影颜色。我使用`android:shadowColor`参数将其设置为浅灰色的十六进制值`#999999`。


    最后，你需要使用`android:shadowRadius`参数设置投影的模糊（柔化）半径，这里同样使用实数值`1.75`像素。


    这个设置将为你带来漂亮且逼真的投影模糊半径，效果就像你在 Photoshop 或 GIMP 中实现的那样。区别在于，你是在 Android 应用中使用几个字节的标记代码来实现，而不是使用千字节的数字图像资源数据。


    如果希望投影边缘清晰，你可以使用非常小的值，例如`0.1`来达到此效果。中等值如`0.5`会添加少量模糊，而大值如`2.0`则会为投影增加大量模糊或柔化。为了实现最逼真的阴影，我建议值设置在`1.25`到`1.75`之间，但使用这四个`android:shadow`参数可以创造出许多酷炫的效果。


    对我们这些图形设计师来说，另一个非常重要的 UI 控件是`ImageView`控件。你将在下一节中更详细地了解该控件及其一些重要参数，届时你将在书签实用工具
    Activity 中添加一张书签页的图片。

    '
- fmt: '# Using an ImageView Widget: The Cornerstone of Graphics


    Before you add your `ImageView` UI widget to your `RelativeLayout` container,
    you need to put the digital image assets into their respective density pixel folders.
    Copy `bookmark0_240px.png`, `bookmark0_320px.png`, `bookmark0_480px.png` and `bookmark0_640px.png`
    into your `/res/drawable-ldpi`, `drawable-mdpi`, `drawable-hdpi`, and `drawable-xhdpi`
    folders, respectively.


    Notice I am using resolutions that are twice the DPI targets for each of the pixel
    densities: 240 is twice 120 DPI (or two inches in size), 320 is twice 160 DPI,
    480 is twice 240 DPI, and 640 is twice 320 DPI. Except for icons, you are not
    providing app image assets for the XXHDPI 480 DPI level.


    If you did provide an XXHDPI image asset, it would need to be 960 pixels. Figure
    7-10 shows your project’s resource `drawable-ldpi` folder, and the app icon, and
    first bookmark page image placeholder (the splash screen), after the `bookmark0_240px.png`
    file has been copied and renamed to `bookmark0.png`.


    ![A978-1-4302-5786-8_7_Fig10_HTML.jpg](A978-1-4302-5786-8_7_Fig10_HTML.jpg)


    Figure 7-10. Copy the `bookmark0_240px.png` file into the `/res/drawable-ldpi`
    folder and rename it `bookmark0.png`


    After you copy and rename all four image files into the four target pixel density
    folders that Android wants you to provide for pixel-based assets, you can add
    your `<ImageView>` child tag to your `<RelativeView>` parent layout container
    tag, as shown in Figure 7-11.


    If you want, you can use the `<` key to bring up the `RelativeLayout` child tag
    support helper dialog, or just type in the `<ImageView` and `/>` begin and end
    tag delimiters and start adding parameters using the `android:` work process to
    bring up the parameter helper dialog.


    Whether you find the parameter via the helper dialog or just type it in from memory,
    which you will do as you become a more proficient developer, the first parameter
    you need to add is the `android:id` parameter so that you can reference this `ImageView`
    object from your Java code in order to change the image used when the user bookmarks
    a different page. You’ll use the descriptive ID value of `currentBookmarkImage`,
    so this ID reflects the `ImageView` functionality.


    Next, add in the required `android:layout_width` and `android:layout_height` parameters,
    set to `wrap_content`, and then set the source file reference for the image using
    the `android:src` parameter set to `@drawable/bookmark0`, which will reference
    your `bookmark0.png` files in your LDPI, MDPI, HDPI, and XHDPI drawable folders,
    based on the user’s Android device specifications.


    Also note in Figure 7-11 that when you type in the `android:src="@drawable/` portion
    of the source file referencing parameter, that after you type in the `/` character,
    Eclipse will bring up a helper dialog listing all of the drawable assets that
    you currently have installed inside your project.


    ![A978-1-4302-5786-8_7_Fig11_HTML.jpg](A978-1-4302-5786-8_7_Fig11_HTML.jpg)


    Figure 7-11. Add parameters for ID and layout width and height, and use the helper
    dialog to locate `@drawable` files


    If the image assets that you copied earlier are not listed, you may need to right-click
    your project folder and select the Refresh command. This needs to be done every
    time you add assets when Eclipse is running (already launched) on your system,
    and is done to show Eclipse ADT that you have added in new assets that are external
    (not yet visible) to the Eclipse development environment. Since you have used
    Windows Explorer, or another file management utility, to add these to the Eclipse
    project folder hierarchy (structure), the Refresh command will tell Eclipse to
    rebuild its internal file referencing to this new folder and/or asset file structure
    so that it knows what is in there.


    Next, you need to either use the Graphical Layout Editor tab or your `Run As`
    ➤ `Android Application` work process and see how your initial `ImageView` object
    and parameters are working with your current `TextView` object and parameters.


    As you can see in Figure 7-12, the `ImageView` object overlaps the `TextView`
    object at the top of the screen. If you had been using the simpler `LinearLayout`
    container with a vertical orientation, this would not have happened.


    Since you’re using a `RelativeLayout` container, you need to provide parameters
    that tell your `ImageView` object how you want it to position itself relative
    to the neighboring `TextView` object. So, let’s add in some more parameters!


    ![A978-1-4302-5786-8_7_Fig12_HTML.jpg](A978-1-4302-5786-8_7_Fig12_HTML.jpg)


    Figure 7-12. Nexus One preview showing `TextView` and `ImageView` overlap


    After you use a `Run As` ➤ `Android Application` work process to run your Nexus
    One emulator, you will notice that because of a forced Save function used during
    this process you now have a warning message on your `ImageView` tag. Mouse-over
    it now, and you will see that Eclipse wants you to add in a `contentDescription`
    parameter (for accessibility reasons) for the sight impaired. As you can see in
    Figure 7-13, I added in this parameter.


    ![A978-1-4302-5786-8_7_Fig13_HTML.jpg](A978-1-4302-5786-8_7_Fig13_HTML.jpg)


    Figure 7-13. Eclipse `contentDescription` warning message and `android:contentDescription`
    reference `@string/bmi`


    Make sure that you add in a `<string>` tag constant in your `strings.xml` file
    in your `/res/values` folder that adds in this text constant using the following
    markup:


    ```

    <string name="bmi">Image of Currently Bookmarked Page</string>

    ```


    Now you can deal with the relative layout positioning of your `ImageView` and
    `TextView` objects. Let’s add in the `android:layout_below` parameter, which tells
    your `ImageView` object to lay itself out below the object that is referenced
    in the parameter; in this case, it is `@+id/currentBookmarkText`.


    Here’s yet another reason that you needed to give your `TextView` object an ID
    parameter: so that you can use relative layout alignment parameters to align other
    objects in the layout with the `TextView` using its ID.


    Let’s also downsize the image content inside your `ImageView` object UI widget
    container so that it does not touch the edges of the portrait layout, as you saw
    that it was doing in the Nexus One emulator. The best way to achieve this is to
    add an `android:layout_margin` parameter that will not only push the `ImageView`
    away from the sides of the screen but also down from the `TextView` UI element
    at the top of the screen, giving you a much nicer spacing result for the screen
    UI design. Use the value of `9dp` this time, as shown in Figure 7-14, to demonstrate
    that you can use either `9dip` or `9dp`, and either one will work just as well
    in your XML markup.


    ![A978-1-4302-5786-8_7_Fig14_HTML.jpg](A978-1-4302-5786-8_7_Fig14_HTML.jpg)


    Figure 7-14. Adding parameters to correct `TextView` and `ImageView` overlap and
    add spacing around `ImageView`


    Next, you will add an `android:layout_centerHorizontal` parameter and set it to
    a value of `true`. As you can see in Figure 7-12, your `ImageView` is already
    centering in a portrait layout, but when the user turns the device on its side,
    the `ImageView` will be on the left side of the screen. Thus, for your current
    portrait design, this parameter would be redundant, but to support both portrait
    and landscape orientations, it turns out to be a lifesaver!


    This type of design is what I was talking about in Chapter 5; you need to think
    across all of the different devices, densities, and orientations.'
