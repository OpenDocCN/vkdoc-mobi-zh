    图 2-41. 使用 `pag480portrait.MP4` 视频数据测试 `MainActivity` `VideoView` 和 `MediaPlayer`
    对象


    请注意，如果你在数字视频停止播放时点击它，可以调出 `MediaController` UI，并使用常见的视频播放控制（如快退、播放、结束或使用点播轮）来控制视频。


    还请注意，正如我先前在介绍 `<FrameLayout>` 时所提到的，视频的宽高比被保留了下来，这可以从视频右侧透出的白色背景颜色中看出。在本书后面的内容中，你将学习如何使用不同类型的布局容器来缩放视频资源以适配屏幕尺寸和形状。


    ## 总结


    在本章中，你学习了数字视频的概念、格式、术语、设置及优化。你还创建了基础（也称为应用启动代码）基础设施，它将容纳你的 `pro.android.graphics`
    包和 `GraphicsDesign` 应用程序。


    我们首先研究了 Android 和 HTML5 中使用的两种主要视频格式：MPEG-4 H.264 AVC 和 Google 的 WebM VP8 格式。你了解到所有
    Android 版本均支持 MPEG-4 播放，而 WebM 在 2.3.3 及更高版本中得到支持，在 Android 4.0 及更高版本中支持流式播放。你还了解到
    H.263 主要用于视频会议。


    接着，我们概述了 Android 的 `VideoView` 和 `MediaPlayer` 类。这些类用于通过 XML 标记和 Java 代码在应用程序内播放数字视频。你还在
    `MainActivity` 用户界面设计中实现了一个 `VideoView` 用户界面元素，用于承载视频数据。


    随后，我们研究了数字视频的基础：帧和帧率（以帧每秒即 FPS 表示）。我们学习了如何计算不同分辨率和帧率的原始数据量“影响”，以便你了解如何衡量进入压缩工作流程的数据量。这使你能够计算实际的数据量压缩比率。


    我们考察了传统视频行业的标清和高清分辨率标准，以及流式视频与本地视频及比特率的概念。你了解到比特率不仅有助于将数据适配到给定网络带宽容量（数据管道大小）中，还需要考虑移动（嵌入式）设备的处理能力。这是因为用户能够流畅地解码每秒的数据量（比特率）对于获得良好用户体验至关重要。


    接着，我们研究了 Android 中的视频缩放问题，以及为视频提供几个分辨率密度目标的需求，这样 Android 就不需要将视频缩放太多。目前，Android
    没有双三次插值算法（但它有双线性滤波器）。


    最后，我们探讨了编解码器的作用以及用于数字视频优化的压缩设置类型。我们研究了按影响数据量大小从大到小排列的数字视频特性和编解码器设置。你了解到优化数字视频没有万能药，每个数据流都是唯一的（至少从编解码器的角度来看），而优化数字视频数据量与播放质量的比例充其量是一个迭代过程，既需要时间也需要经验。


    为了确保你在 Pro Android Graphics 应用程序上稳步前进，你还花了一些时间使用`New Android Application` 系列对话框为应用程序创建了一个外壳。我们查看了这些对话框提供的启动代码，并为你的
    `GraphicsDesign` 应用在你的新 `pro.android.graphics` 包中的 `MainActivity.java` Activity
    子类中配置了一个用于在启动画面上播放视频的 XML 用户界面设计。


    接着，你通过安装并使用 Terragen 3 3D 动画软件生成了 400 帧虚拟世界动画，然后安装并使用 VirtualDub 1.9 软件使用 AVI
    数字视频格式容器加载这些帧，从而创建了视频资源。你将这个 AVI 文件导入 Sorenson Squeeze Pro 9 软件，并将其压缩到原始大小的 1%
    以下，这样你就可以将其包含在应用程序的 APK 文件中（作为本地资源）。


    最后，你编写了 Java 代码来实现在 `onCreate()` 方法中播放视频，并学习了 `VideoView`、`URI` 和 `MediaController`
    类。


    在下一章中，你将学习帧动画的概念、格式、术语、技术和优化。你将使用 `AnimationDrawable` 类在 `GraphicsDesign` 应用程序中实现帧动画或位图动画。

