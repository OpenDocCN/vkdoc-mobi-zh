    Java 代码为你的帧动画处理添加程序化动画元素。


    ## 总结


    在第十四章中，你学习了如何仅使用 Java 代码（不使用 XML 标记），通过`AnimationDrawable`类的方法和构造函数，在 Android
    操作系统中实现启动画面帧动画。


    我们首先研究了 Android 的`AnimationDrawable`类本身，以及它如何作为`DrawableContainer`类的直接子类。你看到了它如何包含你的动画帧、持续时间和循环参数，以及启动和停止帧动画播放周期的方法。


    接下来，我们介绍了`DrawableContainer`类，你可以使用它来创建包含在`DrawableContainer`对象结构中的`Drawable`对象，这些对象与其他密切相关的`Drawable`对象共存。


    例子包括动画中的帧（即`AnimationDrawable`），或图形对象的状态和级别，例如在`StateListDrawable`类和`LevelListDrawable`类中所见到的。


    然后，你深入实践，仅使用 Java 代码重新创建了应用程序的启动画面帧动画。你移除了所有引用 XML 定义的代码，从零开始，创建了一个全新的名为`setUpAnimation()`的方法来设置你的`AnimationDrawable`对象。


    你还创建了一个实现`Runnable`接口和`.run()`方法的`animStart`类，这样当应用程序启动时，帧动画将自动开始运行。


    你了解了 Java 的`Runnable`和`.run()`方法，以及 Android 的`Handler`类和`.post()`方法。我们讨论了进程、`Thread`对象和`MessageQueue`对象，以了解这一切在
    Android 操作系统中是如何工作的。


    接着，你没有使用`Runnable`和`.run()`来自动启动动画，而是实现了事件处理代码，这允许你通过点击事件（Click）以及最终的长按事件（Long-Click）来触发动画播放。


    你看到了如何使用事件处理来处理循环（`.setOneShot(false)`）和单次播放（`.setOneShot(true)`）这两种动画配置。


    你学习了如何在 Java 中配置你的`AnimationDrawable`对象，以实现无缝循环、单次播放、帧 1 到帧 1（静止位置）的结果。你还看到了如何修改代码，使其能够通过长按停止动画循环，而不会让标志停留在除其正面第一帧之外的任何其他帧上。


    在下一章中，你将学习如何使用`Animation`类在 Android 操作系统内实现程序化（或矢量）动画。这将使你能够运用本章重新创建的基于 Android
    数字图像的帧动画，并结合你在第 4 章中通过 XML 创建的平移、旋转、缩放和透明度程序化动画特效，将它们与基于帧的 PAG 标志动画相结合。


    这将把你当前的 Android 2D 动画知识库提升到一个更先进的水平，因为你将实现一个仅使用 Java 编程逻辑的复杂程序化帧动画组合。


    # 15. 程序化动画：使用动画类


    摘要


    在第十五章中，我们将详细探讨在 Android 中使用 Java 编码实现程序化动画的方面。我们在第 4 章中已经考察了程序化动画背后的概念，以及如何使用
    XML 定义文件工作流程来设置程序化动画。我在这本书的早期就讲解了这部分内容，因为我认为你应该能够在你的专业 Android 图形设计工作流程的早期阶段，就学会在你的应用程序中运行基本的程序化动画。


    本章我们关注的任务是如何实现我们在第 4 章中实现的程序化动画“动作”，但现在仅使用 Java 代码，不使用任何 XML。这比我们在第 4 章中为应用程序启动画面实现程序化动画的方式要稍微高级一些，因为
    Java 代码通常由于其紧凑的链式代码结构而比 XML 标记复杂得多——无论你的 XML 嵌套结构变得多么复杂。


    用 Java 方法做所有事情将让你看到`Animation`类及其`五个`子类中的方法是如何工作的。`Animation`类是 Android 操作系统中程序化动画的父类。你将全面了解这个类和`Animation`对象，以及如何仅使用
    Android 应用程序图形编程逻辑的 Java 端来实现程序化动画功能。


    我们这样做的目的是，如果你希望在你的程序化动画 Java 编程管线之中或周围添加其他 Java 代码功能，那么你使用程序化动画处理管线所做的一切都将 100%在
    Java 编程语言中实现。

