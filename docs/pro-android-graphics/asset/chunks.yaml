- fmt: '# Adding a Drop Shadow Effect to an ImageView Image Asset


    Now let’s add a drop shadow effect to the `bookmark0.png` image asset using the
    GIMP 2.8.6 open source digital image editing and composition software.


    Launch GIMP 2.8 and open the `bookmark0_640px.png` file that you copied into your
    `/res/drawable-xhdpi` folder. You always want to work with the highest number
    of pixels that you can, since you will have to downsample the image to provide
    assets in the other three resolution density folders. Figure [7-18](#A978-1-4302-5786-8_7_Chapter.html#Fig18)
    shows, from left to right, the first few things you need to do to set up your
    digital imaging composite for this project. First, widen your image by 40 pixels
    in each of the x and y dimensions to accommodate your shadow. In the Set Image
    Canvas Size dialog, click the chain icon next to the Width and Height fields to
    lock them together, and then enter 720 into the Width field, and click the Center
    button to center the original 640 pixel resolution image inside the new 720 pixel
    resolution image. Click the Resize button to apply these new parameters to your
    digital canvas and in your Layers-Brushes window right-click under the current
    layer and find the Duplicate Layer menu option to copy that layer data into a
    new layer.


    ![A978-1-4302-5786-8_7_Fig18_HTML.jpg](A978-1-4302-5786-8_7_Fig18_HTML.jpg)


    Figure 7-18. Setting up your 640 pixel bookmark PNG image for creating a drop
    shadow effect inside GIMP 2.8


    Once you have your duplicate layer, drag it underneath your original image layer,
    as shown in the third pane of Figure [7-18](#A978-1-4302-5786-8_7_Chapter.html#Fig18).
    Double-click the copy (duplicated) layer, and name it `DROP SHADOW LAYER`, as
    shown in the fourth pane of Figure [7-18](#A978-1-4302-5786-8_7_Chapter.html#Fig18).
    Next, right-click underneath the layer and select the New Layer command to bring
    up a Create a New Layer dialog, which is shown in Figure [7-19](#A978-1-4302-5786-8_7_Chapter.html#Fig19).
    Enter a layer name of `White Background Layer`, and select a White Layer Fill
    Type (radio button option), and click the OK button.


    ![A978-1-4302-5786-8_7_Fig19_HTML.jpg](A978-1-4302-5786-8_7_Fig19_HTML.jpg)


    Figure 7-19. Create the White Background Layer, drag it to the bottom of the layer
    stack, and turn off top layer visibility


    This will create a new layer filled with the color white on top of the `DROP SHADOW
    LAYER`, but since you want the `White Background Layer` to be the background,
    you need to drag it down to the bottom of the layer stack, as shown in the center
    pane of Figure [7-19](#A978-1-4302-5786-8_7_Chapter.html#Fig19).


    Next, you want to isolate the `DROP SHADOW LAYER` so that you can transmute the
    original image data into a drop shadow, so click the eye icon for the top `bookmark0_640px.png`
    layer, which will turn its visibility off.


    Since the layer underneath it is identical (not for long), you will not see any
    difference in the main image preview window. So let’s change that: click the Colors
    menu at the top middle of GIMP and select the Desaturate sub-menu item, as shown
    in Figure [7-20](#A978-1-4302-5786-8_7_Chapter.html#Fig20).


    Notice in GIMP that if you hover your mouse over anything in the GIMP software
    package, including icons, menus, layers and so on, a tool-tip will pop up and
    tell you what that software function is used for.


    The Desaturate tool or algorithm is used to remove color, or saturation, from
    an image while leaving its lightness, or luminosity, values intact. This essentially
    turns your image from a color to a black and white image, which in your case is
    the first step in achieving a medium gray shadow for your 3D hoop encased image.


    ![A978-1-4302-5786-8_7_Fig20_HTML.jpg](A978-1-4302-5786-8_7_Fig20_HTML.jpg)


    Figure 7-20. Using a Colors ➤ Desaturate tool to turn the `DROP SHADOW LAYER`
    from color to black and white


    The Desaturate (Remove Colors) dialog has three options that allow you to choose
    a shade of gray based on lightness, luminosity, or an average of the two. I chose
    the luminosity (radio button selector) as it provided me with the lightest gray
    coloration.


    If you want visual feedback on what any given tool in GIMP will do, look for the
    Preview checkbox and make sure there is a check mark in it. Once you do this,
    you will be able to see the results of your settings in the main GIMP preview
    window, as shown in Figure [7-21](#A978-1-4302-5786-8_7_Chapter.html#Fig21).


    In case you haven’t figured out your next “move” to create your drop shadow effect,
    you are going to blur these grayscale pixels to create the shadow effect. However,
    if you do that now, your blur will get cut off due to the edges of the current
    layer, which are denoted in GIMP using dotted lines.


    ![A978-1-4302-5786-8_7_Fig21_HTML.jpg](A978-1-4302-5786-8_7_Fig21_HTML.jpg)


    Figure 7-21. Setting the Desaturation tool algorithm to choose a shade of gray
    based on the image''s luminosity


    As you can see in Figure [7-21](#A978-1-4302-5786-8_7_Chapter.html#Fig21) and
    Figure [7-22](#A978-1-4302-5786-8_7_Chapter.html#Fig22), although you have resized
    your canvas, which is the container that is holding your layers, the layers themselves
    are still at the original 640 pixel source data sizing.


    This is shown via the dotted lines, and although not a problem now, if you were
    to apply a blur operation with the edges set like this, you would get straight
    line areas on the resulting blur (shadow). This is because GIMP’s blur algorithm
    cannot “see” space outside the current layer boundaries.


    Somehow you need to find a way to push these boundaries out for just this layer,
    so that they match the edges of the new image (canvas) size that you specified
    earlier as 720 pixels. Fortunately, GIMP 2 has a command designed just for this
    purpose. It is located under the GIMP Layer menu, and it is called `Layer to Image
    Size`, and it is shown in action in Figure [7-22](#A978-1-4302-5786-8_7_Chapter.html#Fig22).


    ![A978-1-4302-5786-8_7_Fig22_HTML.jpg](A978-1-4302-5786-8_7_Fig22_HTML.jpg)


    Figure 7-22. Use a Layer ➤ Layer to Image Size menu sequence to resize layer size
    to match the new image size


    This is important to do before the blur operation, as a fuzzy blur looks unprofessional
    if it has razor sharp edges that show where its containing graphic’s edges are.
    So don’t forget this step!


    As you can see in Figure [7-23](#A978-1-4302-5786-8_7_Chapter.html#Fig23), your
    blur algorithm now has more space to spread (blur) your monochrome image’s pixels
    in order to turn it from a hard-edged metal hoop into a nice fuzzy shadow underneath
    your original image.


    To invoke the Blur algorithm in GIMP, go into the Filters menu, and find the Blur
    sub-menu, which will open up a fly-out sub-menu with the different types of Blur
    algorithms that GIMP supports. Blur’s an important effect in digital imaging for
    both fine-tuning photography and for creating special effects, as you are doing
    here.


    For your application, you are going to use the most popular Blur algorithm, which
    is called `Gaussian Blur`, named after the man who created the central mathematics
    algorithms that are utilized inside the Blur algorithm. It will give you the smooth,
    evenly-distributed blur effect that you are looking for without a complicated
    user interface, as you can see in Figure [7-23](#A978-1-4302-5786-8_7_Chapter.html#Fig23).


    ![A978-1-4302-5786-8_7_Fig23_HTML.jpg](A978-1-4302-5786-8_7_Fig23_HTML.jpg)


    Figure 7-23. Use the Filters ➤ Blur ➤ Gaussian Blur Tool to blur your monochrome
    layer to create a shadow effect'
  raw: '## Adding a Drop Shadow Effect to an ImageView Image Asset


    Now let’s add a drop shadow effect to the bookmark0.png image asset using the
    GIMP 2.8.6 open source digital image editing and composition software.


    Launch GIMP 2.8 and open the `bookmark0_640px.png` file that you copied into your
    `/res/drawable-xhdpi` folder. You always want to work with the highest number
    of pixels that you can, since you will have to downsample the image to provide
    assets in the other three resolution density folders. Figure [7-18](#A978-1-4302-5786-8_7_Chapter.html#Fig18)
    shows, from left to right, the first few things you need to do to set up your
    digital imaging composite for this project. First, widen your image by 40 pixels
    in each of the x and y dimensions to accommodate your shadow. In the Set Image
    Canvas Size dialog, click the chain icon next to the Width and Height fields to
    lock them together, and then enter 720 into the Width field, and click the Center
    button to center the original 640 pixel resolution image inside the new 720 pixel
    resolution image. Click the Resize button to apply these new parameters to your
    digital canvas and in your Layers-Brushes window right-click under the current
    layer and find the Duplicate Layer menu option to copy that layer data into a
    new layer.


    ![A978-1-4302-5786-8_7_Fig18_HTML.jpg](A978-1-4302-5786-8_7_Fig18_HTML.jpg)


    Figure 7-18.


    Setting up your 640 pixel bookmark PNG image for creating a drop shadow effect
    inside GIMP 2.8


    Once you have your duplicate layer, drag it underneath your original image layer,
    as shown in the third pane of Figure [7-18](#A978-1-4302-5786-8_7_Chapter.html#Fig18).
    Double-click the copy (duplicated) layer, and name it DROP SHADOW LAYER, as shown
    in the fourth pane of Figure [7-18](#A978-1-4302-5786-8_7_Chapter.html#Fig18).
    Next, right-click underneath the layer and select the New Layer command to bring
    up a Create a New Layer dialog, which is shown in Figure [7-19](#A978-1-4302-5786-8_7_Chapter.html#Fig19).
    Enter a layer name of White Background Layer, and select a White Layer Fill Type
    (radio button option), and click the OK button.


    ![A978-1-4302-5786-8_7_Fig19_HTML.jpg](A978-1-4302-5786-8_7_Fig19_HTML.jpg)


    Figure 7-19.


    Create the White Background Layer, drag it to the bottom of the layer stack, and
    turn off top layer visibility


    This will create a new layer filled with the color white on top of the DROP SHADOW
    LAYER, but since you want the White Background Layer to be the background, you
    need to drag it down to the bottom of the layer stack, as shown in the center
    pane of Figure [7-19](#A978-1-4302-5786-8_7_Chapter.html#Fig19).


    Next, you want to isolate the DROP SHADOW LAYER so that you can transmute the
    original image data into a drop shadow, so click the eye icon for the top bookmark0_640px.png
    layer, which will turn its visibility off.


    Since the layer underneath it is identical (not for long), you will not see any
    difference in the main image preview window. So let’s change that: click the Colors
    menu at the top middle of GIMP and select the Desaturate sub-menu item, as shown
    in Figure [7-20](#A978-1-4302-5786-8_7_Chapter.html#Fig20).


    Notice in GIMP that if you hover your mouse over anything in the GIMP software
    package, including icons, menus, layers and so on, a tool-tip will pop up and
    tell you what that software function is used for.


    The Desaturate tool or algorithm is used to remove color, or saturation, from
    an image while leaving its lightness, or luminosity, values intact. This essentially
    turns your image from a color to a black and white image, which in your case is
    the first step in achieving a medium gray shadow for your 3D hoop encased image.


    ![A978-1-4302-5786-8_7_Fig20_HTML.jpg](A978-1-4302-5786-8_7_Fig20_HTML.jpg)


    Figure 7-20.


    Using a Colors ➤ Desaturate tool to turn the DROP SHADOW LAYER from color to black
    and white


    The Desaturate (Remove Colors) dialog has three options that allow you to choose
    a shade of gray based on lightness, luminosity, or an average of the two. I chose
    the luminosity (radio button selector) as it provided me with the lightest gray
    coloration.


    If you want visual feedback on what any given tool in GIMP will do, look for the
    Preview checkbox and make sure there is a check mark in it. Once you do this,
    you will be able to see the results of your settings in the main GIMP preview
    window, as shown in Figure [7-21](#A978-1-4302-5786-8_7_Chapter.html#Fig21).


    In case you haven’t figured out your next “move” to create your drop shadow effect,
    you are going to blur these grayscale pixels to create the shadow effect. However,
    if you do that now, your blur will get cut off due to the edges of the current
    layer, which are denoted in GIMP using dotted lines.


    ![A978-1-4302-5786-8_7_Fig21_HTML.jpg](A978-1-4302-5786-8_7_Fig21_HTML.jpg)


    Figure 7-21.


    Setting the Desaturation tool algorithm to choose a shade of gray based on the
    image''s luminosity


    As you can see in Figure [7-21](#A978-1-4302-5786-8_7_Chapter.html#Fig21) and
    Figure [7-22](#A978-1-4302-5786-8_7_Chapter.html#Fig22), although you have resized
    your canvas, which is the container that is holding your layers, the layers themselves
    are still at the original 640 pixel source data sizing.


    This is shown via the dotted lines, and although not a problem now, if you were
    to apply a blur operation with the edges set like this, you would get straight
    line areas on the resulting blur (shadow). This is because GIMP’s blur algorithm
    cannot “see” space outside the current layer boundaries.


    Somehow you need to find a way to push these boundaries out for just this layer,
    so that they match the edges of the new image (canvas) size that you specified
    earlier as 720 pixels. Fortunately, GIMP 2 has a command designed just for this
    purpose. It is located under the GIMP Layer menu, and it is called Layer to Image
    Size, and it is shown in action in Figure [7-22](#A978-1-4302-5786-8_7_Chapter.html#Fig22).


    ![A978-1-4302-5786-8_7_Fig22_HTML.jpg](A978-1-4302-5786-8_7_Fig22_HTML.jpg)


    Figure 7-22.


    Use a Layer ➤ Layer to Image Size menu sequence to resize layer size to match
    the new image size


    This is important to do before the blur operation, as a fuzzy blur looks unprofessional
    if it has razor sharp edges that show where its containing graphic’s edges are.
    So don’t forget this step!


    As you can see in Figure [7-23](#A978-1-4302-5786-8_7_Chapter.html#Fig23), your
    blur algorithm now has more space to spread (blur) your monochrome image’s pixels
    in order to turn it from a hard-edged metal hoop into a nice fuzzy shadow underneath
    your original image.


    To invoke the Blur algorithm in GIMP, go into the Filters menu, and find the Blur
    sub-menu, which will open up a fly-out sub-menu with the different types of Blur
    algorithms that GIMP supports. Blur’s an important effect in digital imaging for
    both fine-tuning photography and for creating special effects, as you are doing
    here.


    For your application, you are going to use the most popular Blur algorithm, which
    is called Gaussian Blur, named after the man who created the central mathematics
    algorithms that are utilized inside the Blur algorithm. It will give you the smooth,
    evenly-distributed blur effect that you are looking for without a complicated
    user interface, as you can see in Figure [7-23](#A978-1-4302-5786-8_7_Chapter.html#Fig23).


    ![A978-1-4302-5786-8_7_Fig23_HTML.jpg](A978-1-4302-5786-8_7_Fig23_HTML.jpg)


    Figure 7-23.


    Use the Filters ➤ Blur ➤ Gaussian Blur Tool to blur your monochrome layer to create
    a shadow effect'
  trans: '好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，精确地将以下英文文本翻译成中文。



    # 为 ImageView 图像资源添加投影效果


    现在，让我们使用 GIMP 2.8.6 开源数字图像编辑与合成软件，为 `bookmark0.png` 图像资源添加投影效果。


    启动 GIMP 2.8 并打开您之前复制到 `/res/drawable-xhdpi` 文件夹中的 `bookmark0_640px.png` 文件。您应始终使用分辨率最高的图像文件，因为您需要对其进行下采样，以便为其他三个分辨率密度文件夹提供资源。图
    7-18 从左到右显示了为此项目设置数字图像合成所需的最初几个步骤。首先，在 x 轴和 y 轴方向上各将图像加宽 40 像素，以便为阴影留出空间。在“设置图像画布大小”对话框中，点击“宽度”和“高度”字段旁边的链图标以将它们锁定在一起，然后在“宽度”字段中输入
    720，并点击“居中”按钮，将原始的 640 像素分辨率图像居中放置到新的 720 像素分辨率图像内。点击“调整大小”按钮将这些新参数应用到您的数字画布上。接着，在“图层-画笔”窗口中，在当前图层下方右键点击，找到“复制图层”菜单选项，将该图层数据复制到一个新图层中。


    ![A978-1-4302-5786-8_7_Fig18_HTML.jpg](img/A978-1-4302-5786-8_7_Fig18_HTML.jpg)


    图 7-18. 设置您的 640 像素书签 PNG 图像，以便在 GIMP 2.8 中创建投影效果


    创建好复制的图层后，将其拖拽到原始图像图层的下方，如图 7-18 的第三个窗格所示。双击复制（已复制）的图层，并将其命名为 `DROP SHADOW LAYER`，如图
    7-18 的第四个窗格所示。接下来，在图层下方右键点击，选择“新建图层”命令，调出“创建新图层”对话框，如图 7-19 所示。输入图层名称 `White Background
    Layer`，选择“白色图层填充类型”（单选按钮选项），然后点击“确定”按钮。


    ![A978-1-4302-5786-8_7_Fig19_HTML.jpg](img/A978-1-4302-5786-8_7_Fig19_HTML.jpg)


    图 7-19. 创建白色背景图层，将其拖拽到图层堆栈的底部，并关闭顶部图层的可见性


    这将创建一个填充为白色的新图层，位于 `DROP SHADOW LAYER` 之上。但由于您希望 `White Background Layer` 作为背景，您需要将其拖拽到图层堆栈的最底部，如图
    7-19 的中间窗格所示。


    接下来，您需要隔离 `DROP SHADOW LAYER`，以便将原始图像数据转换为投影。因此，点击顶部 `bookmark0_640px.png` 图层上的眼睛图标，将其可见性关闭。


    由于它下方的图层（`DROP SHADOW LAYER`）与之完全相同（但不会持续太久），您在主图像预览窗口中不会看到任何差异。那么，让我们来改变这一点：点击
    GIMP 顶部中间的“颜色”菜单，选择“去色”子菜单项，如图 7-20 所示。


    请注意，在 GIMP 中，如果您将鼠标悬停在 GIMP 软件包中的任何元素（如图标、菜单、图层等）上，会弹出一个工具提示，告诉您该软件功能的用途。


    “去色”工具或算法用于移除图像中的颜色（即饱和度），同时保留其亮度值。这实际上会将您的图像从彩色转换为黑白图像。对您而言，这是为被 3D 圆环包裹的图像实现中灰色阴影的第一步。


    ![A978-1-4302-5786-8_7_Fig20_HTML.jpg](img/A978-1-4302-5786-8_7_Fig20_HTML.jpg)


    图 7-20. 使用“颜色” ➤ “去色”工具将 `DROP SHADOW LAYER` 从彩色转为黑白


    “去色（移除颜色）”对话框提供了三个选项，允许您根据亮度、明度或两者的平均值来选择灰色调。我选择了“明度”（单选按钮选择器），因为它提供了最浅的灰色着色。


    如果您想直观地了解 GIMP 中某个工具的作用，请查找“预览”复选框并确保其已被勾选。完成后，您将能够在 GIMP 主预览窗口中看到设置结果，如图 7-21
    所示。


    如果您还没想到创建投影效果的下一步“操作”，那就是模糊这些灰度像素来生成阴影效果。不过，如果您现在就这样做，模糊效果会被当前图层的边缘截断，在 GIMP 中这些边缘用虚线表示。


    ![A978-1-4302-5786-8_7_Fig21_HTML.jpg](img/A978-1-4302-5786-8_7_Fig21_HTML.jpg)


    图 7-21. 设置“去色”工具算法，根据图像的明度选择灰色调


    如图 7-21 和图 7-22 所示，尽管您已经调整了画布（即容纳图层的容器）的大小，但图层本身仍保持原始 640 像素的源数据尺寸。


    虚线显示了这一点。虽然现在不是问题，但如果在这种情况下边缘设置不变就应用模糊操作，最终生成的模糊（阴影）上会出现直线区域。这是因为 GIMP 的模糊算法无法“看到”当前图层边界之外的空间。


    您需要找到一种方法，仅针对此图层将这些边界向外扩展，使它们与您之前指定的新图像（画布）大小（720 像素）的边缘匹配。幸运的是，GIMP 2 为此专门提供了一个命令。它位于
    GIMP 的“图层”菜单下，称为 `Layer to Image Size`（图层适配图像大小），如图 7-22 所示。


    ![A978-1-4302-5786-8_7_Fig22_HTML.jpg](img/A978-1-4302-5786-8_7_Fig22_HTML.jpg)


    图 7-22. 使用“图层” ➤ “图层适配图像大小”菜单序列来调整图层大小，使其匹配新的图像尺寸


    在模糊操作之前执行此步骤非常重要，因为如果模糊效果带有显示其包含图形边缘的锋利边界，会显得很不专业。所以，请勿忘记此步骤！


    如图 7-23 所示，您的模糊算法现在有了更多的空间来扩散（模糊）单色图像的像素，从而将其从边缘锐利的金属环转变为原始图像下方柔和的阴影。


    要调用 GIMP 中的模糊算法，请进入“滤镜”菜单，找到“模糊”子菜单，这将打开一个弹出式子菜单，其中包含 GIMP 支持的不同类型的模糊算法。在数字图像处理中，模糊既是微调摄影效果的重要功能，也是创建特殊效果（如您正在做的）的重要功能。


    对于您的应用，您将使用最流行的模糊算法 `Gaussian Blur`（高斯模糊），该算法以创建模糊算法内部核心数学算法的人命名。它将为您提供所需的平滑、均匀分布的模糊效果，而且不需要复杂的用户界面，如图
    7-23 所示。


    ![A978-1-4302-5786-8_7_Fig23_HTML.jpg](img/A978-1-4302-5786-8_7_Fig23_HTML.jpg)


    图 7-23. 使用“滤镜” ➤ “模糊” ➤ “高斯模糊”工具来模糊您的单色图层，以创建阴影效果

    '
- fmt: 'I combined the menu drop-down screen shot with the Gaussian Blur dialog on
    the right side to save space. As you can see, I locked the Horizontal and Vertical
    values using the chain icon to get an even blur, selected the default RLE (Run
    Length Encoded) Blur Method (algorithm), and selected the Preview checkbox to
    show me the blur amount within the dialog preview.


    In the next major version of GIMP (2.10), there won’t be an IIR or RLE Blur Method
    selection option, as current machines are so fast that it will not be needed any
    more. It used to be that IIR was faster (optimized) for photographs and RLE for
    blurring edges and vector (shape based) artwork.


    I am using a Blur Radius (in pixels) of 16.0 (the default is 5.0) to get a fair
    amount of blur on the hoop part of this image, which is the only part that’s going
    to be visible underneath (and slightly to the left-bottom) of the original image.
    Remember that the original image is above this in the layer stack, but currently
    not visible, as the eye icon is turned off, so you can see exactly what you are
    doing on this layer for now. Click the OK button, and you can see a dropshadow
    effect in Figure [7-24](#A978-1-4302-5786-8_7_Chapter.html#Fig24) even before
    you move it!


    ![A978-1-4302-5786-8_7_Fig24_HTML.jpg](A978-1-4302-5786-8_7_Fig24_HTML.jpg)


    Figure 7-24.

    Select the Move Tool icon and Center Editing window before using arrow keys to
    position shadow


    Next, you will use the Move tool to position the drop shadow layer down and to
    the left by a few pixels (I used 6 in each direction, as you will see).


    First, you need to turn back on the original image layer visibility using the
    eye icon in the Layer palette, which you can see has been done in Figure [7-24](#A978-1-4302-5786-8_7_Chapter.html#Fig24).
    You can also see the highlighted Move tool icon as I left the tool-top fly-out
    active for the screen shot.


    It is also important to notice that after I turn on the visibility of the top
    layer and make sure that the shadow layer is still selected, or blue when the
    Layer Palette is active and gray (as in screen shot) when another window is active,
    that I click on the titlebar of the image preview window itself (now gold in the
    screen shot) to make that window active before I use the arrow keys on my keyboard
    to move the layer pixel by pixel.


    The reason that this work process is important is because digital image editing
    software such as GIMP is modal. This means that the software looks at which tools
    are selected and which windows are active (have the focus) in order to determine
    precisely what a user wants to do for that function.


    For example, if you select the Move tool, and then click your DROP SHADOW LAYER
    to make it active, and then use the left and down arrow keys to reposition the
    shadow, the shadow layer will not move because you have not clicked the main image
    editing window to show GIMP where you want the move to be applied. What will happen
    instead when you use the arrow keys is that GIMP will use them to move between
    layer selections, which is what you would want the arrow keys to do when you are
    in the Layers palette!


    So, select the Move tool, make sure the DROP SHADOW LAYER is selected and active,
    and then click the titlebar of the central editing window in GIMP, and press the
    down arrow key six times and the left arrow key six times in order to position
    the shadow as shown in Figure [7-25](#A978-1-4302-5786-8_7_Chapter.html#Fig25).


    Next, you are going to take the drop shadow greyscale values and transfer them
    to the alpha channel so that they will let some of the background color (or imagery)
    through into the shadow area of your image for a much more realistic compositing
    effect (result) once you are back in Android. This is done in GIMP by using the
    Layer menu and the Transparency sub-menu and the Color to Alpha algorithm on the
    fly-out, as shown in Figure [7-25](#A978-1-4302-5786-8_7_Chapter.html#Fig25).


    ![A978-1-4302-5786-8_7_Fig25_HTML.jpg](A978-1-4302-5786-8_7_Fig25_HTML.jpg)


    Figure 7-25.

    Use a Layer ➤ Transparency ➤ Color to Alpha tool to create translucent alpha values
    from shadow


    As you can see in the Color to Alpha dialog, which is shown on the right side
    of Figure [7-25](#A978-1-4302-5786-8_7_Chapter.html#Fig25) (I have again combined
    the menu selection screen shot and the dialog that it brings up to save some space),
    you now have a partial transparency in your alpha channel where your shadow is.
    This will serve to mix pixel colors behind that area (the shadow) more realistically,
    whether those are solid color values or image color values (differing pixel color
    values). We will be going back into Android Developer mode soon and will be showing
    how to implement this in Eclipse and the visual results in the Nexus One emulator
    as well.


    Now that you have created your drop shadow effect, you can get rid of some of
    that extra space around your image and its effect so that you don’t go from a
    640 pixel to a 720 pixel image just to add a drop shadow. To do this, you will
    again use the Set Image Canvas Size dialog, this time to cut the size back down
    from 720 pixels to 672 pixels, as shown in Figure [7-26](#A978-1-4302-5786-8_7_Chapter.html#Fig26).


    You’ll use 32 more pixels than your 640 pixel image size was to start with. Notice
    you are using power-of-2 pixel increments (1-2-4-8-16-32-64 etc.) here, so that
    when you resize to the other density levels you get even pixel boundary numbers.
    In the dialog, click the chain icon to lock the dimension of the canvas size and
    enter 672 and then click the Center button. This will auto-enter -24 Offset values
    for you in the X and Y fields. Why -24 and not -48? This is because this is giving
    you the offset around all four sides of the image, as shown visually in the dialog,
    and half of 48 is 24.


    ![A978-1-4302-5786-8_7_Fig26_HTML.jpg](A978-1-4302-5786-8_7_Fig26_HTML.jpg)


    Figure 7-26.

    Shrinking the canvas size to fit the shadow


    Now you can turn off your white background layer visibility, using the eye icon,
    and take a look at the resulting effect and alpha channel values.


    Select the primary image layer, as shown in Figure [7-27](#A978-1-4302-5786-8_7_Chapter.html#Fig27),
    and make sure the visibility is off for the White Background Layer, so you can
    see your alpha channel and transparency values, as denoted in GIMP using the checkerboard
    pattern. As you can see by the dotted-line, you haven’t added too much image data
    (pixel space) to your original image to add this drop shadow effect.


    ![A978-1-4302-5786-8_7_Fig27_HTML.jpg](A978-1-4302-5786-8_7_Fig27_HTML.jpg)


    Figure 7-27.

    Turning off the White Background Layer to access only transparent layers (original
    image and shadow)


    Next to the Layers tab (stacked white or clear vellum icon), you will see the
    Color Channels tab (stacked Red, Green, and Blue icon). Click this tab now so
    that you can examine the red, green, blue, and alpha channel for your image next.
    You are going to make sure that your alpha channel defines as transparent around
    your image, as opaque (black) for most of the image, and as translucent (gray)
    where the shadow effect is positioned.


    Once you are in the Channels tab you will notice that the channels work in much
    the same way that the layers do, and so let’s turn off the visibility of the red,
    green, and blue channels, leaving only the alpha channel on, so you can see the
    data your alpha channel contains. The result of this can be seen in Figure [7-28](#A978-1-4302-5786-8_7_Chapter.html#Fig28),
    and your alpha channel does contain your shadow data.


    ![A978-1-4302-5786-8_7_Fig28_HTML.jpg](A978-1-4302-5786-8_7_Fig28_HTML.jpg)


    Figure 7-28.

    Using the Channels tab and turning off visibility for red, green, and blue channels
    to see an alpha channel


    This translucent area of the alpha channel will let some of the color data from
    any pixel colors that may exist underneath your image mix (when you are compositing
    it, at least) into the gray shadow areas of the image itself.'
