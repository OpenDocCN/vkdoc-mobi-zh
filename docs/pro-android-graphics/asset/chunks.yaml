    If you are using a 64-bit OS such as Windows 7 64-bit or Windows 8 64-bit, which
    is what I am using, select the Windows x64 version of the EXE installer file to
    download.


    If you are using a 32-bit OS such as Windows XP or Windows Vista 32-bit, select
    the Windows x86 version of the EXE installer file to download. Be sure to match
    the bit level of the software to the bit level capability of the OS that you are
    running. Figure [1-5](#A978-1-4302-5786-8_1_Chapter.html#Fig5) shows the download
    screen as it appears once the license agreement option radio button has been selected.


    ![A978-1-4302-5786-8_1_Fig5_HTML.jpg](A978-1-4302-5786-8_1_Fig5_HTML.jpg)


    Figure 1-5.


    Java SE 6 download links for Linux, Solaris, and Windows (once software agreement
    is accepted)


    Once the EXE file has finished downloading, make sure any previous version of
    Java 6 SDK is uninstalled by using the Windows Control Panel Add/Remove Programs
    dialog. Then find and launch an installer for the current version Java 6 SDK installer,
    and install the latest version of Java 6, so that you can install the Android
    Developer Tools ADT Bundle.


    The Android Developer Tools (ADT) Bundle is comprised of the Eclipse Kepler 4.3
    IDE (Integrated Development Environment) for Java and the Android Developer Tools
    Plug-ins already installed into the Eclipse IDE. This used to be done separately,
    and it took about a 50 step process to complete, so downloading and installing
    one pre-made bundle is significantly less work.


    Next, you need to download the Android ADT Bundle from the Android Developer web
    site. In the past, developers had to assemble Eclipse and ADT plug-ins manually.
    Starting with Android 4.2, Jelly Bean + Google is now doing this for you, making
    installing an Android ADT IDE an order of magnitude easier that it was in the
    past. This is the URL to use to download an ADT Bundle:


    [`http://developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)


    The screen shown in Figure [1-6](#A978-1-4302-5786-8_1_Chapter.html#Fig6) is what
    you should see on the Android SDK download page. Simply click the blue Download
    the SDK button to get started with the download process.


    ![A978-1-4302-5786-8_1_Fig6_HTML.jpg](A978-1-4302-5786-8_1_Fig6_HTML.jpg)


    Figure 1-6.


    ADT Bundle Download the SDK Button on Get the Android SDK page of the Android
    Developer site


    Once you click the Download the SDK button, you will be taken to the Licensing
    Terms and Conditions Agreement page, where you can read the terms and conditions
    of using the Android development environment and finally click the I have read
    and agree with the above terms and conditions checkbox.


    Once you do this, the OS 32 or 64 bit-level selection radio buttons will be enabled
    so that you can select either the 32-bit or the 64-bit version of the Android
    ADT environment. Then the blue Download the SDK ADT Bundle for Windows (or your
    OS) will be enabled, and you can click it to start the installation file download
    process. This is the screen state that is shown in Figure [1-7](#A978-1-4302-5786-8_1_Chapter.html#Fig7).


    Click the blue Download the SDK ADT Bundle button and save the ZIP file to your
    system downloads folder. Once the download is finished you can begin the installation
    process, which we will go through in detail in the next section of this chapter.


    ![A978-1-4302-5786-8_1_Fig7_HTML.jpg](A978-1-4302-5786-8_1_Fig7_HTML.jpg)


    Figure 1-7.


    Terms and Conditions page and SDK download options for 32-bit or 64-bit software
    environments


    Now you are ready top unzip and install the ADT, and then update it to the latest
    version from inside of the Eclipse Java ADT IDE (after you install and launch
    it for the first time, of course). Are you getting excited yet?'
  trans: '

    有趣的是，在 8 位索引色图像中可以使用少于 256 种颜色。这样做是为了减少数据占用；例如，一张仅用 32 种颜色就能获得良好效果的图像，实际上是一张 5
    位图像，从技术上讲它属于`PNG5`，尽管其格式被称为`PNG8`。


    另外请注意，你可以设置抖动效果的百分比；我通常选择 0%或 100%的设置，但你可以在两个极端值之间任意微调抖动效果。你还可以选择一种抖动算法类型；我使用的是扩散抖动，因为它能在不规则形状的渐变区域（例如汽车挡泥板上的渐变）上产生平滑的效果。


    正如你可能想象到的，抖动会添加更难压缩的数据（图案），从而将数据占用提高几个百分点。请务必检查应用抖动和不应用抖动两种情况下的最终文件大小，看看它所带来的视觉效果改善是否值得。


    到目前为止你所学到的最后一个可能增加图像数据占用的概念是 Alpha 通道，因为添加 Alpha 通道会为正在压缩的图像再增加一个 8 位色彩通道（透明度）。


    然而，如果你需要 Alpha 通道来定义透明度，以支持该图像未来的合成需求，那么除了包含 Alpha 通道数据之外，没有太多选择。只需确保不要使用 32 位图像格式来存放一个具有空
    Alpha 通道（全为零，完全透明，因此不包含 Alpha 值数据）的 24 位图像。


    最后，许多用于遮罩图像中对象的 Alpha 通道会压缩得很好，因为它们主要是白色（不透明）和黑色（透明）的区域，在两种颜色之间的边缘上有一些灰度值来对遮罩进行抗锯齿处理。因此，它们能在对象及其背景图像之间提供视觉上平滑的边缘过渡。


    由于在 Alpha 通道图像遮罩中，从白色到黑色的 8 位透明度渐变定义了透明度，遮罩中每个对象边缘上的灰度值本质上是对对象及其目标背景的颜色进行平均，从而为所使用的任何目标背景提供实时抗锯齿效果。


    现在是时候在你的工作站上安装 Android 了，然后你就可以开始开发面向图形的 Android 应用程序了！


    ## 下载 Android 环境：Java 和 ADT 捆绑包


    让我们从确保你拥有最新的 Android 开发环境开始。这意味着要拥有最新版本的 Java、Eclipse 和 Android 开发者工具（`ADT`）。你可能已经安装了最新的`ADT
    Bundle`，但我在这里这样做只是为了确保你设置正确并从正确的位置开始，然后我们才能开始本书中将要进行的复杂开发。如果你每天都会更新你的`ADT`，你可以跳过这一部分。


    由于 Java 是`ADT`的基础，请先获取它。截至 Android 4.3，Android `IDE`仍然使用 Java 6，而不是 Java 7，所以请确保获取正确版本的
    Java SDK。它位于这里：


    [`www.oracle.com/technetwork/java/javasebusiness/downloads/java-archive-downloads-javase6-419409.html`](http://www.oracle.com/technetwork/java/javasebusiness/downloads/java-archive-downloads-javase6-419409.html)


    向下滚动到页面底部，找到 Java SE Development Kit 6u45 下载链接。屏幕的这一部分如图 1-4 所示。


    ![A978-1-4302-5786-8_1_Fig4_HTML.jpg](img/A978-1-4302-5786-8_1_Fig4_HTML.jpg)


    图 1-4.


    Oracle 技术网网站 Java SE 存档页面上的 Java SE 6 下载部分


    点击该部分底部和下载链接屏幕顶部的 Java SE Development Kit 6u45 下载链接。在下载屏幕顶部图 1-5 所示的灰色区域中，选择“接受许可协议”单选按钮选项。完成此操作后，你会注意到右侧的链接将变粗并且可以点击，以调用针对你的操作系统的下载。


    如果你使用的是 64 位操作系统，例如 Windows 7 64 位或 Windows 8 64 位（和我一样），请选择 Windows x64 版本的`EXE`安装程序文件进行下载。


    如果你使用的是 32 位操作系统，例如 Windows XP 或 Windows Vista 32 位，请选择 Windows x86 版本的`EXE`安装程序文件进行下载。确保软件的位级别与你正在运行的操作系统的位级别能力相匹配。图
    1-5 显示了选中许可协议单选按钮后出现的下载屏幕。


    ![A978-1-4302-5786-8_1_Fig5_HTML.jpg](img/A978-1-4302-5786-8_1_Fig5_HTML.jpg)


    图 1-5.


    适用于 Linux、Solaris 和 Windows 的 Java SE 6 下载链接（接受软件协议后）


    一旦`EXE`文件下载完成，请使用 Windows 控制面板“添加/删除程序”对话框确保卸载任何以前版本的 Java 6 SDK。然后找到并启动当前版本 Java
    6 SDK 的安装程序，并安装最新版本的 Java 6，以便你可以安装 Android 开发者工具 ADT 捆绑包。


    Android 开发者工具（`ADT`）捆绑包由 Eclipse Kepler 4.3 Java `IDE`（集成开发环境）以及已安装到 Eclipse `IDE`中的
    Android 开发者工具插件组成。过去这需要分别完成，并且需要大约 50 个步骤才能完成，因此下载并安装一个预制的捆绑包工作量要少得多。


    接下来，你需要从 Android 开发者网站下载 Android `ADT Bundle`。过去，开发者必须手动组装 Eclipse 和`ADT`插件。从
    Android 4.2（Jelly Bean + Google）开始，谷歌现在为你完成这项工作，使得安装 Android `ADT IDE`比过去容易一个数量级。这是用于下载`ADT
    Bundle`的 URL：


    [`http://developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)


    你应该会在 Android SDK 下载页面上看到如图 1-6 所示的屏幕。只需点击蓝色的“下载 SDK”按钮即可开始下载过程。


    ![A978-1-4302-5786-8_1_Fig6_HTML.jpg](img/A978-1-4302-5786-8_1_Fig6_HTML.jpg)


    图 1-6.


    Android 开发者网站“获取 Android SDK”页面上的 ADT Bundle 下载 SDK 按钮


    点击“下载 SDK”按钮后，你将被带到许可条款和条件协议页面，你可以在那里阅读使用 Android 开发环境的条款和条件，最后点击“我已阅读并同意上述条款和条件”复选框。


    完成此操作后，操作系统 32 位或 64 位选择单选按钮将被启用，以便你可以选择 32 位或 64 位版本的 Android `ADT`环境。然后，蓝色的“下载适用于
    Windows（或你的操作系统）的 SDK ADT Bundle”按钮将被启用，你可以点击它开始安装文件下载过程。这是图 1-7 中显示的屏幕状态。


    点击蓝色的“下载 SDK ADT Bundle”按钮，并将`ZIP`文件保存到你的系统下载文件夹。下载完成后，你就可以开始安装过程了，我们将在本章的下一节中详细介绍该过程。


    ![A978-1-4302-5786-8_1_Fig7_HTML.jpg](img/A978-1-4302-5786-8_1_Fig7_HTML.jpg)


    图 1-7.


    许可条款和条件页面以及适用于 32 位或 64 位软件环境的 SDK 下载选项


    现在你已经准备好解压并安装`ADT`，然后从 Eclipse Java `ADT IDE`内部将其更新到最新版本（当然，是在你首次安装并启动它之后）。你开始感到兴奋了吗？

