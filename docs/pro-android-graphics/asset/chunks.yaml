    \ highlighting and pop up the helper suggestion dialog, it will suggest making\
    \ your `pag` ImageView object instantiation (and loading) line of Java code use\
    \ a `final` access modifier. You will accept the suggestion and allow Eclipse\
    \ to do this for you, as shown in Figure [14-18](#A978-1-4302-5786-8_14_Chapter.html#Fig18).\n\
    \n![A978-1-4302-5786-8_14_Fig18_HTML.jpg](A978-1-4302-5786-8_14_Fig18_HTML.jpg)\n\
    \nFigure 14-18. Setting `ImageView pag` instantiation and inflation Java statement\
    \ to be the `final` access control modifier\n\n![A978-1-4302-5786-8_14_Fig17_HTML.jpg](A978-1-4302-5786-8_14_Fig17_HTML.jpg)\n\
    \nFigure 14-17. Adding a `.setImageDrawable()` method call to reset animation\
    \ to first frame and changing to `final`\n\nLet’s test this approach via the Run\
    \ As ➤ Android Application work process and you’ll notice that, although it runs\
    \ without crashing the app, it does not reset your `AnimationDrawable` back to\
    \ Frame 1, which is what you need. This is because an `AnimationDrawable` object\
    \ contains all of the references regarding which frame of animation is playing\
    \ (or is stopped) and when it is playing (or where it is stopped).\n\nSo you will\
    \ need to figure something else out to achieve your desired end result of a perfect\
    \ seamless Frame 1 to Frame 1 animation stop operation.\n\nThus, the next thing\
    \ that you will try is to set this `pag` ImageView to your Frame 1 image asset\
    \ directly, which you already have the Java code in place to do. This code is\
    \ currently used inside the `.addFrame()` method call.\n\nCopy the `getResources().getDrawable()`\
    \ method chaining code from inside the first parameter (Drawable) portion of your\
    \ `.addFrame()` method call and paste it inside the `.setImageDrawable()` method\
    \ call. This is done using the following single line of Java code:\n\n```\npag.setImageDrawable(getResources().getDrawable(R.drawable.pag0));\n\
    ```\n\nAs you can see in Figure [14-19](#A978-1-4302-5786-8_14_Chapter.html#Fig19),\
    \ your code is error-free and ready to test!\n\n![A978-1-4302-5786-8_14_Fig19_HTML.jpg](A978-1-4302-5786-8_14_Fig19_HTML.jpg)\n\
    \nFigure 14-19. Changing the `.setImageDrawable()` method to directly reference\
    \ the first frame of the animation\n\nNow, let’s use your Run As ➤ Android Application\
    \ work process and see if you have achieved perfection yet. When your application\
