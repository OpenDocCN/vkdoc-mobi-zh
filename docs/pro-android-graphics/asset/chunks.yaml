    # 图 3-17. 引用 `anim_intro` 帧动画的 `ImageView` 用户界面元素的最终 XML 标记


    接下来，让我们使用“运行方式 ➤ Android 应用程序”工作流程，查看新增的 `ImageView` 用户界面元素 XML 标记的最终结果。如图 3-18
    所示，您现在得到了一个专业级的最终效果。


    别忘了，为了更清晰地观察操作，您之前已经移除了 `VideoView` 用户界面元素的 XML 标记中的 `android:src` 参数。既然您知道 PNG32
    动画帧能在任何背景上提供完美的合成效果，目前可以先使用黑色背景。


    ![A978-1-4302-5786-8_3_Fig18_HTML.jpg](img/A978-1-4302-5786-8_3_Fig18_HTML.jpg)


    **图 3-18.** 显示 `ImageView` 标签参数的最终输出


    为了在本章展示我们的操作，我们可以使用纯黑色或纯白色背景，但黑色背景能让这个特定的帧动画序列显示得最清晰。


    在本章以及下一章关于程序化动画的内容中，我们将使用这种临时背景替换技术（仅在开发动画素材时使用），以向您展示 XML 如何让您在开发图形应用程序时拥有极大的灵活性和创新性。因此，如果您需要打开或关闭某个合成层，甚至是应用程序的
    UI 元素或功能，在 XML 中操作都非常容易。


    我们这样做是为了能够精确隔离 XML 代码的作用，从而让您（读者）更清晰地理解。一旦完成，您就可以将 `android:src` 参数重新添加到 XML 标记中。这将恢复背景视频的显示，让您看到最终的视觉效果。


    现在，让我们从编写 XML 标记切换到编写 Java 代码，以便您可以使用 `onCreate()` 方法，在现有的 `MainActivity.java`
    文件的 Java 程序逻辑中实现您使用 XML 标记构建的所有内容。


    ## 使用 Java 实例化帧动画定义


    如果尚未打开，请打开 Eclipse 并点击中央编辑窗格顶部的 `MainActivity.java` 选项卡。在设置 `ContentView` 的 Java
    代码之后，添加一行空白（一个回车），然后实例化您的 `ImageView` 用户界面元素，它将引用您一直在处理的 XML 定义。这通过以下一行代码完成：


    ```

    ImageView pag = (ImageView)findViewById(R.id.pagImageView);

    ```


    如图 3-19 所示，您会遇到一些红色波浪下划线错误标志需要处理，以及左侧空白处的红色叉号错误图标。


    ![A978-1-4302-5786-8_3_Fig19_HTML.jpg](img/A978-1-4302-5786-8_3_Fig19_HTML.jpg)


    **图 3-19.** 创建一个名为 `pag` 的 `ImageView` 对象，并将其引用到 `pagImageView` ID 的 XML 结构


    到目前为止，您应该已经熟悉在 Eclipse 中研究错误和警告出现原因的工作流程，因此请将鼠标悬停在（和/或）点击错误标志图标或高亮区域，看看 Eclipse
    认为此时您的应用程序逻辑中存在什么问题。


    如图 3-20 所示，Eclipse 现在报错称无法解析（使用）`ImageView` 对象类型，因为用于创建（实例化）该对象类型的类对它不可用（未导入）。


    幸运的是，Eclipse 按概率顺序（即，最可能提供正确解决方案的排在前面）提供了一个可点击的解决方案列表。在这种情部下，Eclipse 猜对了，因此请点击提供的第一个解决方案：从
    `android.widget` 包导入 `ImageView`。一旦添加此导入语句，您就可以使用 `ImageView` 类及其所有方法、构造函数、常量、字段和属性。


    ![A978-1-4302-5786-8_3_Fig20_HTML.jpg](img/A978-1-4302-5786-8_3_Fig20_HTML.jpg)


    **图 3-20.** 将鼠标悬停在 Eclipse 的错误高亮上，以调出错误消息和快速修复对话框


    一旦您点击此第一个解决方案，让 Eclipse 为您编写导入代码，您将看到为您添加了新的导入语句，如图 3-21 所示。但是，这行代码中仍然有一个黄色警告标志，位于
    `ImageView` 对象的页面名称下方。


    再次将鼠标悬停在（和/或）点击以阅读警告；在这种情况下，这只是说您尚未实现（使用）刚刚创建的 `pag` 对象。由于您即将使用此对象，因此可以安全地忽略此警告，并继续编写您的下一行
    Java 代码。


    ![A978-1-4302-5786-8_3_Fig21_HTML.jpg](img/A978-1-4302-5786-8_3_Fig21_HTML.jpg)


    **图 3-21.** 将鼠标悬停在 Eclipse 的警告高亮上，以调出警告消息和快速修复对话框


    接下来，您需要实例化 `AnimationDrawable` 对象，它将负责生成帧动画的所有繁重工作。将此对象命名为 `pagAnim`，然后使用从您的 `pag`
    `ImageView` 对象调用的 `.getDrawable()` 方法，用您的帧动画的可绘制素材加载这个新的 `AnimationDrawable` 对象。这通过以下一行
    Java 代码完成，如图 3-22 所示：


    ```

    AnimationDrawable pagAnim = (AnimationDrawable) pag.getDrawable();

    ```


    如图 3-22 所示，您在这行代码中再次遇到了错误标志，我们现在怀疑这与添加使用 `AnimationDrawable` 类所必需的导入语句有关。


    ![A978-1-4302-5786-8_3_Fig22_HTML.jpg](img/A978-1-4302-5786-8_3_Fig22_HTML.jpg)


    **图 3-22.** 创建一个名为 `pagAnim` 的 `AnimationDrawable` 对象，并通过 `.getDrawable()` 方法将其连接到
    `pag` 对象


    将鼠标悬停在错误消息上并点击，以生成错误消息和修复解决方案对话框，然后点击将为您编写 Java 导入语句的链接。您听说过敏捷开发？！这是懒惰开发。依我看来，它要优越得多。如果您感兴趣，可以在图
    3-23 中看到 Eclipse 再次为您编写的导入代码。


    一旦您的代码恢复为 100% 干净，您就可以添加下一行代码了。现在您已经将 `pag` `ImageView` UI 容器连接到了 `pagAnim` `AnimationDrawable`
    帧动画引擎（对象），可以调用 `.start()` 方法来启动您的帧动画播放循环。


    这通过调用 `pagAnim` 对象的 `.start()` 方法来完成，使用以下简短而强大的一行 Java 代码，如图 3-23 所示：


    ```

    pagAnim.start();

    ```


    现在，您已准备好使用“运行方式 ➤ Android 应用程序”工作流程，并测试您的帧动画以查看其是否正常工作。让我们下一步就做这个！


    ![A978-1-4302-5786-8_3_Fig23_HTML.jpg](img/A978-1-4302-5786-8_3_Fig23_HTML.jpg)


    **图 3-23.** 向新创建的 `pagAnim` `AnimationDrawable` 对象添加 `.start()` 方法调用


    在您的 Nexus One 模拟器中运行该应用程序，您将看到应用程序启动后，Pro Android Graphics 徽标在启动屏幕上流畅地播放动画。恭喜，您已经在
    Android 中实现了一个全屏启动（闪屏）动画，并且仅用了 2MB 就覆盖了所有现有的不同分辨率密度的 Android 设备！

