    接下来，你将配置`paintScreen Paint`对象，使你做的一切都具有抗锯齿效果，并将其颜色设置为系统`Color`类的常量`CYAN`。在 IDE
    (CYANIDE) 中使用`CYAN`时要小心。通过调用`Paint`对象的`.setColor()`和`.setAntiAlias()`方法来配置`Paint`，使用以下两行
    Java 代码：


    ```

    paintScreen.setAntiAlias(true);

    paintScreen.setColor(Color.CYAN);

    ```


    注意在图 17-14 中，在你输入 Android 的`Color`类并输入句点字符后，Eclipse 会弹出一个`ColorPicker Helper Dialog`，其中包含了
    Android 操作系统中所有可用的颜色常量值供你选择。这非常有用。


    ![A978-1-4302-5786-8_17_Fig14_HTML.jpg](img/A978-1-4302-5786-8_17_Fig14_HTML.jpg)


    图 17-14. 使用方法调用配置`paintScreen Paint`对象的抗锯齿和`CYAN`颜色常量


    接下来，你需要在构造方法中确保当 View (Activity) 屏幕出现时，用户可以使用你的`SketchPadView`对象。通过使 View 可获得焦点来实现这一点。这通过调用`.setFocusable()`方法完成。因为你使用了
    Android 触摸模式和`OnTouchListener()`事件处理，你还必须同时调用`.setFocusableInTouchMode()`方法以确保万无一失。这通过以下
    Java 代码行完成：


    ```

    setFocusableInTouchMode(true);

    setFocusable(true);

    ```


    如图 17-15 所示，你的代码没有错误，构造方法现已实现，它设置好你的`SketchPadView`自定义 View 对象，将其`Context`向上传递以处理触摸事件、对所有绘制的像素应用抗锯齿、使用`CYAN`颜色常量，最后将
    View 设置为可获焦以及可在触摸模式下获焦。


    ![A978-1-4302-5786-8_17_Fig15_HTML.jpg](img/A978-1-4302-5786-8_17_Fig15_HTML.jpg)


    图 17-15. 通过调用`.setFocusable(true)`和`.setFocusableInTouchMode(true)`配置`SketchPadView`的焦点


    接下来，你需要编写一个名为`Coordinate`的简单类，用于为你保存一个`X,Y`像素坐标`数据对`，使用`浮点`数值精度。让我们接下来做这个，然后再深入学习
    Android 的`List`和`ArrayList`类。


    ## 创建一个`Coordinate`类来跟踪触摸点的 X 和 Y 坐标


    在你实现用于保存`像素坐标`的`List`和`ArrayList`对象之前——当用户用手指在屏幕上绘制时，这些坐标将从你的`OnTouchListener()`方法中流出——让我们编写你一生中写过的最短的
    Java 类，仅用一行代码！实际上，你将只使用 32 个文本字符来编写整个`Coordinate`类！


    ```

    class Coordinate { float x, y; }

    ```


    这个类为触摸屏上的单个像素或点提供了一个`Coordinate`对象，使用`float`或浮点数值精度来存储该点（像素）屏幕位置的 X 和 Y 位置数据值，即其`坐标`。如图
    17-16 所示，你的类没有错误。现在你已准备好接下来学习更多关于 Android 的`List`和`ArrayList`类，因为你将在你的`SketchPadView`类中使用这些类。


    ![A978-1-4302-5786-8_17_Fig16_HTML.jpg](img/A978-1-4302-5786-8_17_Fig16_HTML.jpg)


    图 17-16. 创建一个`Coordinate`类，提供一个浮点 X 和 Y 数据对，用于跟踪鼠标/触摸点


    在你实现你将命名为`coordinates`的`ArrayList`对象坐标列表结构之前，让我们先回顾一下 Android 的`List`和`ArrayList`类的作用以及它们之间确切的关系。

