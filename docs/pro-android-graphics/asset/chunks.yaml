  trans: '

    # 优化帧动画：色彩深度与帧速率


    在帧动画中，主要有三种方式可优化以减小数据体积：降低分辨率、降低色彩深度和降低帧速率。由于在 Android 4.3 中我们必须提供四种不同的分辨率密度目标，因此我们将重点关注另外两种方法，因为我们几乎被锁定在必须提供至少涵盖
    100 像素到 640 像素甚至更高的分辨率范围内，正如你将在本章后面看到的那样。


    由于可以在无损的 `PNG32`（即具有完整 8 位 Alpha 通道的真彩色 PNG）和索引色 `PNG8`（具有 1 位开关式 Alpha）之间进行选择，你可以对应用程序中后续无需合成（使用
    8 位 Alpha 通道）的动画元素使用无损的 `PNG8`。


    如果你的动画不需要与其他图形进行合成，你还可以考虑使用有损的 JPEG 格式，通过舍弃部分图像数据及相应的质量，来获得每个帧更小的数据体积。然而，需要注意的是，这种方法可能会增加动画每一帧中的图像伪影。如果在制作动画伪影时施加了过多的压缩，就会导致所谓的像素爬行现象。对于
    JPEG 动画，不仅会出现伪影，而且由于媒介是动态的，伪影出现在每一帧的不同像素位置上，就像它们在挥手呐喊：“我在这儿！我是个重要的伪影！”这可不是良好的用户体验。


    正如你可以通过使用索引色（8 位）色彩深度来优化 2D 动画一样，你也可以通过使用帧速率 (`FPS`) 来优化 2D 动画，因为同样的概念适用于位图动画和数字视频：需要存储的帧数越少，意味着数据量越少，从而导致应用程序体积更小。


    因此，能够实现逼真运动效果的帧速率越低，你需要在 XML 标记中定义的帧数就越少。更重要的是，更少的帧数将需要更少的处理能力来播放基于帧的动画，并且在它们显示到设备视图屏幕之前，占用更少的内存资源来保存这些帧。实际上，在本章中，你只需要使用九帧动画，就能为你的
    Pro Android Graphics 动画 3D 徽标处理获得专业级的效果。


    随着应用程序中包含的帧动画越来越多，数据体积优化变得愈发重要。诸如游戏和电子书之类的新媒体应用，在应用程序的活动屏幕上通常会同时运行多个帧动画。因此，你需要考虑到用户的处理器能力和系统内存可能比较稀缺，所以要像对待最宝贵的资源一样对待它们！一旦你的应用完全运行起来，就需要进行仔细的优化，以免耗尽用户
    Android 设备的硬件资源。


    最后，每一帧中的像素数量，或者说基于帧的动画的帧分辨率，对于优化帧动画资产的数据体积至关重要。回顾我们在第 1 章中讨论过的原始图像数据计算，并将其应用于动画中的每一帧，以便计算保存基于帧的动画所需的精确原始数据系统内存空间（体积）。


    就像你对静态数字图像所做的那样，你需要提供至少四个密度匹配的光栅动画图像目标分辨率，才能覆盖所有流行的 Android 设备屏幕密度。基于这个原因，如果你能让动画在每个维度上都缩小几十个像素而不影响其视觉效果，那么这将在最终环节累积成可观的节省——这里没有双关之意。


    同样重要的是，要裁剪掉动画中任何未使用的像素，以便动画元素尽可能靠近（仅一个像素的距离）图像容器的边缘。我在本章使用的所有动画帧图像资产中都这样做了，因此你将能够确切理解我的意思。


    我将一套 SVGA 800 x 600 像素的 3D 渲染动画帧集裁剪到了 640 x 500 像素；让我们计算一下这样节省了多少内存。800 x 600
    是每帧 480,000 像素，将近 50 万像素。640 x 500 是每帧 320,000 像素，因此差值（节省量）是每帧 160,000 像素，即立即减少了
    33% 的数据。让我们计算一下节省的内存。


    160,000 像素乘以 4 个 (`ARGB`) 色彩通道，得到每帧需要 640,000 像素的系统内存数据。再乘以 9 帧，我节省了 5,760,000
    像素的数据（内存）。最后，除以 1,024，我通过裁剪未使用的像素节省了 5.625 兆字节的内存。被裁剪掉的像素原本仅用于表示 Alpha 通道或透明度值，因为它们只是动画对象周围的空间。


    类似于你在第 1 章中学到的关于静态数字图像的知识，Android 会自动决定为操作系统运行的每个设备屏幕使用哪个 2D 帧动画像素密度。最大的 640 x
    500 像素帧动画资产用于 `XHDPI`（iTV 是 1920 x 1080，高清平板是 1920 x 1200）分辨率密度。请注意，我还创建了三个较低分辨率的资产，一直低到用于手表和翻盖手机的
    80 像素版本。


    只要你在帧动画的各个单元（或帧）中支持所有主要的像素密度分辨率级别，你就能每次都在当前电子市场上所有类型的 Android 设备上，为你的 2D 位图动画资产获得卓越的视觉效果。

    '
- fmt: '# Creating Frame Animation in Android Using XML Markup


    Your frame-based animation is defined in Android via an XML file containing XML
    markup. This XML file is stored in your `/res/drawable` folder, and you will create
    this XML markup using Eclipse later in the chapter in a hands-on example.


    In case you are wondering why this XML file is kept in the `/res/drawable` folder,
    and not in the `/res/anim` folder, it is because there are two types of animation
    in Android. Frame animation uses the drawable resource folder, and procedural
    animation (covered in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html)) uses the
    `/res/anim` folder.


    The frame animation XML file will specify those individual frames in your frame-based
    animation definition (essentially, this is your 2D `AnimationDrawable` object
    constructor) by using special XML tags related to frame animation.


    This XML construct specifies to your app Java code how the frames for the animation
    are to be loaded into an Android `AnimationDrawable` object. If you want to research
    more detailed information regarding the Android OS’s `AnimationDrawable` class,
    you can find more details at the following URL:


    [`developer.android.com/reference/android/graphics/drawable/AnimationDrawable.html`](http://developer.android.com/reference/android/graphics/drawable/AnimationDrawable.html)


    The `AnimationDrawable` class is the Android frame animation class that allows
    you to instantiate an `AnimationDrawable` object. This object will hold the frame
    animation data, which will later be loaded into the system memory at runtime,
    after you have instantiated your `AnimationDrawable` object inside your application
    Java code.


    After this object has been instantiated, you can call it using a `.start()` method
    from within your application Java code, probably from the inside of an event handler
    if the animation is triggered interactively, or from the inside of an `onCreate()`
    method if the animation is intended to simply run on your Activity’s start-up
    screen somewhere, as yours is going to.


    Some types of frame animation in Android can also be auto-started simply by using
    XML markup, and do not have to be specifically started in your Java code by using
    the `.start()` method. We’ll be looking at both of these ways to set up your frame-based
    animation during the course of this book.


    The frame animation XML construct essentially creates an array of numbered digital
    image files, which represents the frames in the animation. There is also a parameter
    for each frame that specifies the duration that the frame is to be displayed on
    your screen. This duration value needs to be specified in milliseconds, using
    integer values representing increments of one-thousandth of a second. One second
    uses a `1000` integer value.


    ## Android `<animation-list>` Tag: The Parent Frame Container


    Most of your 2D frame-based animation assets will be created by using the `<animation-list>`
    XML parent tag and its parameters. The primary parameter you will be using is
    the `android:one-shot` parameter; it controls whether your animation will have
    a continuously looping or a “play once” animation playback setting.


    Later on, you will reference the XML file containing this `<animation-list>` parent
    tag, and its children tags, by using its first name (the first part of the filename)
    without the extension. You will create a frame animation XML definition that uses
    an `anim_intro.xml` file name but references this file in Android XML markup and
    Java code as `anim_intro`. Once this `<animation-list>` is defined in XML, you
    will be able to reference the frame-based animation it defines in any of your
    UI or UX Designs.


    Finally, there is an `android:id` parameter that you can utilize if you are going
    to reference your `<animation-list>` tag within your Java code—that is, if you’re
    going to control your animation using a `.start()` method call. As you’ll see
    later, there is also a way to auto-start your animation via XML so that you don’t
    have to use an ID parameter, which is generally used to provide a way for your
    Java code to reference your XML tag constructs.


    ## Android''s `<item>` Tag: Specifying Your Animation Frames


    The `<animation-list>` tag is always a parent tag because it is designed to contain
    `<item>` tags, which will always be child tags. The item tag is used to define
    the frames in your `<animation-list>` tag, with one `<item>` tag per each animation
    frame file name and frame display duration reference.


    Each of the frames in your frame animation XML definition for your Android `AnimationDrawable`
    object will have its own corresponding `<item>` child tag, which references the
    drawable image file asset for that frame, as well as a frame display duration
    value specifying how long it stays on the screen.


    These `<item>` tags will exist inside the parent `<animation-list>` container
    in the order in which they are to be displayed, just like you are loading your
    animation frames into a data array, which, essentially, you are.


    It is important to note the distinction that the `AnimationDrawable` object or
    class uses drawable (bitmap image) assets, whereas an `Animation` object (or class,
    which you will learn all about in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html))
    does not.


    An `AnimationDrawable` can be referenced by an `Animation` object, however, if
    you find that you need to apply procedural transformation or alpha blends to your
    frame animation to achieve a more complex effect. This is why we are going to
    cover the `Animation` class in the next chapter, regarding how to create procedural
    animation.


    ## Creating a Frame Animation for our GraphicsDesign App


    Let’s get down to business and create a frame animation that will play over the
    top of your startup (splash) screen digital video asset. That way you can get
    into some advanced compositing of your digital video and your 2D animation assets
    right off the bat!


    You will use PNG32 for your animation frames since you want a perfect result for
    your compositing. PNG32 has an 8-bit alpha channel, which will contain edge anti-aliasing
    data for your animated 3D text (Pro Android Graphics).


    You will set it up this way so that even if you decide to change the digital video
    asset at a later time, or if you decide to allow your users to select from several
    digital video background options, the resulting composite 2D animated result will
    appear as if it is a part of the digital video data. Only us Android developers
    will know that it is in fact two separate content assets, and after the next chapter
    is over, it will be even more than two!


    First, you will learn how to copy your nine animation frames into each of the
    proper project drawable resource folders. Next, you will create an XML file to
    hold your frame animation definition. Once that is accomplished, you will change
    the XML markup for your existing `activity_main.xml` user interface design to
    reference the new frame animation, using an `ImageView` widget.


    Once you have put your assets in place and written all of your XML markup, you’ll
    add in the Java code to load the XML data into an `AnimationDrawable` object and
    to start it on application startup. You’ll do this by editing the `MainActivity.java`
    class in Eclipse, and by editing the `onCreate()` method where you will create
    your `AnimationDrawable` object, load it, and start it!'
