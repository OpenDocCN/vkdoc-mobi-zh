    # 使用 `onOptionsItemSelected()` 添加菜单功能


    在 `onCreateOptionsMenu()` 方法之后添加一行新代码，并添加一个公共布尔值方法 `onOptionsItemSelected()`，再向其传入一个名为
    `item` 的 `MenuItem` 参数，使用以下 Java 代码行：


    `public boolean onOptionsItemSelected(MenuItem item) { your method code goes in
    here }`


    `onCreateOptionsMenu()` 方法是 `Activity` 类的一部分，该类已有对应的导入语句。但当你输入完这行代码后，会看到 `android.view`
    包中的 `MenuItem` 类需要一个导入语句。如果将鼠标悬停在波浪形红色下划线错误提示上，你将看到自动编写该导入语句的选项。


    这个 `MenuItem` 对象（在方法声明中命名为 `item`）会在用户点击 `onCreateOptionsMenu()` 方法填充的任何一个 `Menu`
    对象项时，由 Android 操作系统传递给此方法。然后，我们调用此 `MenuItem` 对象的 `.getItemId()` 方法，并将该值传入 Java
    的 `switch` 语句，使用以下代码：


    `switch(item.getItemId()) { individual case statements go inside of this structure
    }`


    设置好此方法和 `switch` 结构后，你就可以为每个菜单项添加 `case` 语句。在每个 `case` 语句中，你将添加所需的 Java 代码行，来处理用户选中每个菜单项时需要执行的任何操作。


    在你要编写的这些 `case` 语句中，所采取的 Java 操作将涉及使用 Android 的 `Intent` 对象来启动包含应用功能的 `Activity`
    子类，这些功能将以界面屏幕布局的形式呈现。


    每个 Java 的 `case` 语句将使用以下代码格式：


    ```

    case R.id.table_of_contents:

    Intent intent_toc = new Intent(this, ContentsActivity.class);

    this.startActivity(intent_toc);

    break;

    ```


    让我们分析一下这些 Java 代码的 case 块，如图 6-23 所示。


    ![A978-1-4302-5786-8_6_Fig23_HTML.jpg](img/A978-1-4302-5786-8_6_Fig23_HTML.jpg)


    **图 6-23.** 添加 `onOptionsItemSelected()` 方法，并增加一个 `Intent` 对象来启动新的 `ContentActivity`
    类


    `case` 语句本身被分配给 XML 文件（`main.xml`）中定义的菜单项的资源 ID，并在 `onOptionsMenuCreate()` 方法中被填充到名为
    `menu` 的 `Menu` 对象中。这个 `Menu` 对象的 ID 就像它的名称，用于标识用户选择了哪个菜单项，然后你执行该 `case` 语句内的代码。`case`
    语句内的代码位于冒号之后、`break` 语句之前，`break` 语句将退出任何特定的 `case` 语句。


    接下来，你创建一个 `Intent` 对象，该对象携带启动新 `Activity` 子类的意图传给 Android 操作系统。这通过以下代码实现：


    `Intent intent_toc = new Intent(this, ContentsActivity.class);`


    这行代码实例化了一个 `Intent` 对象，将其命名为 `intent_toc`，并加载一个新的意图，该意图配置了当前上下文（`this`）和你想要启动的目标
    `Activity` 类，即你之前编写的 `ContentsActivity.java` 类，在其编译后的格式中通过名称 `ContentsActivity.class`
    指定。Android 中的意图用于操作系统的不同区域之间进行通信。如果你对意图还不够熟悉，可以在 Android 开发者网站的以下页面查阅相关资料：


    [`developer.android.com/reference/android/content/Intent.html`](http://developer.android.com/reference/android/content/Intent.html)


    下一行代码使用 `.startActivity()` 方法以及上一行代码中创建的新意图对象来启动该 `Activity`。这将把新的 `Activity`
    子类加载到显示屏上。该方法通过当前上下文引用 `this` 来调用，如下所示：


    `this.startActivity(intent_toc);`


    这就是将 `ContentsActivity.class` 启动到用户设备屏幕上所需的全部代码。因此，你现在只需要一个 `break` 语句，用于跳出 `switch`
    语句的 case 匹配循环，然后就可以测试了！


    请注意，我还为你的书签工具（BMU）添加了选项菜单项，我们将在本书后面设计它。我这样做是为了在菜单上显示多个菜单项，同时也展示如何通过使用不同的意图对象名称来区分菜单项及其启动的不同
    `Activity` 子类。


    因此，你的 BMU 的意图对象被命名为 `intent_bmu`，一旦你为该类创建了 XML 布局和 Java 代码，这个意图将被加载一个对 `BookmarkActivity.class`
    的引用。


    目前，我只是将其指向 `ContentsActivity.class`，因为该类已存在，以便你有可工作的代码；因此这两个菜单选项都将启动我们一直在处理的布局容器。


    # 在 Nexus One 上测试目录 Activity


    现在，你可以右键单击 `GraphicsDesign` 项目文件夹，然后使用 **Run As ➤ Android Application** 工作流程，查看你的新菜单和布局容器是否能正常协同工作。如图
    6-24 所示，当你使用模拟器菜单按钮选择菜单，并单击**目录**菜单项（在屏幕截图的左侧以蓝色显示）时，它会启动 `ContentsActivity` Java
    `Activity` 子类以及你的 `LinearLayout` 用户界面设计（在右侧显示）。


    屏幕截图右侧还显示了**返回**按钮图标（以蓝色高亮显示），你可以使用它返回启动画面，并测试另一个菜单项（目前该菜单项也会调用同一个 `Activity`）。一旦你将此用户界面转换为
    `RelativeLayout`，你将添加一个 `Button` 小部件，你将在下一章学习相关内容。这个用户界面 `Button` 小部件将执行返回主页（启动画面）的用户界面功能。


    ![A978-1-4302-5786-8_6_Fig24_HTML.jpg](img/A978-1-4302-5786-8_6_Fig24_HTML.jpg)


    **图 6-24.** 在 Nexus One 上测试你的新菜单、`Activity` 子类以及目录布局设计


    在本书后面，我们将把它转换为 `RelativeLayout` 并做更多处理；由于布局容器是图形和用户界面设计的基础，我们将在整本书中与它们打交道。我写这一章的目的是给你一个概述，并展示如何在
    Activity、清单、XML、Java 等整体流程中实现一个布局容器。

    '
- fmt: '# Summary


    In this sixth chapter, you learned about Android layout containers, which hold
    user interface elements and content that is used on the device display screen
    by Android users.


    We started by looking at the foundation class for layouts in Android, the `ViewGroup`
    class. You learned that the dozens of different types of layout containers found
    in Android are derived from this superclass, used to “group” `View` objects, which
    you will learn about in the next chapter.


    We then took an overview of the Android `LayoutParams` class and its layout parameters,
    which are used by developers to configure and fine-tune how their user interface
    layout works and how it groups its child element `View` objects together. You
    learned about `match_parent` and `wrap_content` layout constants and how they
    are used in Android to allow layouts to auto-size.


    Next, we looked at the Android layout container classes that have been deprecated,
    as well as the ones that were experimental and not yet fully implemented (permanent)
    in the Android OS. With many layout containers to cover, we’ll be focusing on
    fully implemented layout classes in this book.


    We looked at the Android `RelativeLayout` class, one of the most used layout containers,
    and the one that is used in the New Android Application series of dialogs when
    a baseline (blank) application is created.


    Next, we looked at `LinearLayout`s, another often used layout container and one
    that is used for simple linear layouts of buttons or text.


    Next, we looked at `FrameLayout`s, a high-level layout container usually used
    for holding more complicated layout containers or a single element UI like locked-aspect-ratio,
    full-screen digital video playback, usually via the `VideoView` widget.


    Next, we looked at one of the newer Android layout containers, `GridLayout`s,
    which is quickly becoming popular for use in designing complex UI designs using
    a flat (non-nested) layout container design. We will be covering this UI layout
    container in detail in a future chapter on advanced layout design.


    Finally, we looked at `DrawerLayout`, another new layout container for the design
    of advanced sliding drawer UI layouts that the user can pull out from the left
    or right side of the display screen and that contain the widget elements for global
    app UI (left side drawer) or local content UI function (right side drawer).


    To get some hands-on experience you created your own layout container in XML,
    and then added a menu and coded an `Activity` class so that you could access a
    new Table of Contents screen for your application.


    In the next chapter, you will learn about the `View` class and how it is used
    to create widgets that can populate the inside of your layout containers.


    # 7. Android UI Widgets: Graphics Design Using the View Class


    ## Abstract


    In this seventh chapter, we will take a closer look at the Android `View` class
    and its many subclasses. We already looked at the Android `ViewGroup`, which is
    a `View` subclass, and some of its more mainstream layout container subclasses,
    and now we are going to take a look at some of Android’s `View` subclasses that
    we can implement in order to create our user interface widgets and graphic designs
    within those `ViewGroup` layout containers.


    Since layout containers (`ViewGroup` classes) are used to contain user interface
    elements, called widgets in Android, we logically had to cover those first in
    the previous chapter. Thanks to that foundation, we can now cover some of Android’s
    most often used user interface widgets. These can be placed inside the parent
    layout containers as child UI elements.


    Just like Android has dozens of `ViewGroup` layout container classes, so too does
    Android have hundreds of `View` (widget) subclasses. Thus, we will not be able
    to cover each of these widget classes in detail in this book, as this is not a
    book solely focused on UI design elements and how they work.


    We will take a look at the most popular Android UI design widgets from a graphics
    standpoint, that is, which of those UI element widgets should be used to implement
    your app’s graphics elements. We will also cover the UI widgets that allow developers
    to create customized graphical UI elements.


    Customized GUI (Graphical User Interface) elements are those elements that can
    be enhanced (or styled) by utilizing additional graphics design content assets
    along with graphics design attributes such as alpha channel (transparency) for
    seamlessly compositing graphics with UI elements.


    First, you’ll learn about the Android `View` superclass, and then we’ll cover
    its most often used UI design subclasses. The `View` widget classes that we will
    cover in detail during the course of this book include `ImageView`, `TextView`,
    `EditText`, `Button`, `ImageButton`, `VideoView`, `Space`, `AnalogClock`, `CalendarView`,
    `DigitalClock`, and `ProgressBar`.


    Now that you can add new `Activity` subclasses to your Pro Android GraphicsDesign
    application thanks to the Menu system you added in the last chapter, you can create
    UI layouts using all of these widgets by using new `Activity` classes. Each functional
    screen for your Android application will have its own menu option, activity, layout
    container, and collection of `View` widgets, which you will learn about in this
    chapter.'
