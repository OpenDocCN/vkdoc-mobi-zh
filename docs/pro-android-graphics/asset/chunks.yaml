    图 11-1. 在`BookmarkActivity`类中实例化`currentBookmarkImage` ImageView 以创建 Java 对象\n\
    \n现在你的`ImageView`对象实例化已经没有错误了，你可以使用这个`porterDuffImage` ImageView 对象来调用`setColorFilter()`方法，该方法你在本章前一节已经了解过。这通过下面这一行\
    \ Java 编程代码实现：\n\n```\nporterDuffImage.setColorFilter(Color.YELLOW, PorterDuff.Mode.MULTIPLY);\n\
    ```\n\n这行 Java 代码的作用是调用`setColorFilter()`方法，并传入两个参数。第一个参数是你希望通过`PorterDuff`混合模式应用的颜色值。在本例中，是\
    \ Android 操作系统提供的`Color.YELLOW`常量。第二个参数是你将用来指定混合模式算法的`PorterDuff.Mode`混合常量。\n\n\
    在这个初始示例中，你将使用`MULTIPLY`常量，因为它是在数字图像资源上应用颜色变化或特殊着色效果时最常用的混合模式。这种`MULTIPLY`模式通常还会增加图像的对比度，使结果看起来更真实。\n\
    \n如图 11-2 所示，你需要再次将鼠标悬停在`Color`类引用上，选择“导入 Color (android.graphics)”选项，以让 ADT 为你编写`Import\
    \ android.graphics.Color` Java 代码语句。\n\n同样有趣的是，当你将鼠标悬停在`PorterDuff`类引用上的错误高亮时，Eclipse\
    \ ADT 并未提供“导入 PorterDuff (android.graphics)”选项，尽管该选项本是消除`PorterDuff`类引用下波浪形红色错误高亮的正确解决方案。嘿，人无完人，ADT\
    \ 也不例外！\n\n这意味着 Eclipse ADT IDE 的错误辅助对话框并非 100%“可靠”，我们不能总是依赖它们来解决 Eclipse ADT\
    \ IDE 中可能出现的所有 Java 代码错误问题。\n\n![A978-1-4302-5786-8_11_Fig2_HTML.jpg](img/A978-1-4302-5786-8_11_Fig2_HTML.jpg)\n\
    图 11-2. 通过导入`android.graphics.Color`和`android.graphics.PorterDuff`类修复错误高亮\n\n\
    在这种情况下，你需要自己添加`Import`语句来解决这个错误。这通过以下 Java 语句实现：\n\n```\nimport android.graphics.PorterDuff;\n\
    ```\n\n如图 11-3 所示，你的代码现在没有错误了，并且用于在 Activity 子类 Java 代码中使用`ImageView`、`Color`和`PorterDuff`类的导入语句已经就位。你已拥有一个使用`PorterDuff.Mode`常量调用`setColorFilter()`方法的`ImageView`对象。\n\
    \n![A978-1-4302-5786-8_11_Fig3_HTML.jpg](img/A978-1-4302-5786-8_11_Fig3_HTML.jpg)\n\
    图 11-3. 使用`setColorFilter()`方法，通过`PorterDuff`的`MULTIPLY`模式应用颜色值更改\n"
- fmt: "Since the `Graphical Layout Editor` pane does not support applying imaging\
    \ algorithms, you will need to use the `Nexus One` emulator to see the result\
    \ of a `PorterDuff` blending mode color filtration digital image application.\n\
    \nAs you can see on the left side of Figure [11-4](#A978-1-4302-5786-8_11_Chapter.html#Fig4),\
    \ the yellow color value has been applied to the `porterDuffImage` `ImageView`\
    \ object that references your `currentBookmarkImage` `<ImageView>` XML tag definition,\
    \ which references your digital image asset.\n\n![A978-1-4302-5786-8_11_Fig4_HTML.jpg](A978-1-4302-5786-8_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4. Testing the `PorterDuff.MULTIPLY` mode (left) and `OVERLAY` mode\
    \ (right) in the `Nexus One` emulator\n\nNext, let’s see what one of the other\
    \ popular blending mode constants, the `OVERLAY` constant, will do for your color\
    \ filter application. I’ll also show you how to apply a precise 24-bit color value\
    \ within the `.setColorFilter()` method call, as that is normally what you are\
    \ going to want to apply as a graphics design professional. Change the second\
    \ line of Java code to read:\n\n```\nporterDuffImage.setColorFilter(Color.rgb(216,192,96),\
    \ PorterDuff.Mode.OVERLAY);\n```\n\nThis calls your `Color` class `.rbg()` method\
    \ inside your `.setColorFilter()` method, using a more advanced Java code construct\
    \ that allows for a more precise application of 24-bit color values with `PorterDuff`\
    \ blending modes.\n\nAs you can see in Figure [11-5](#A978-1-4302-5786-8_11_Chapter.html#Fig5),\
    \ the Java code is again error-free and you are ready to use a `Run As` ➤ `Android\
    \ Application` work process to test your code in the `Nexus One` emulator. The\
    \ results are shown on the right-hand side of the screen shot shown in Figure\
    \ [11-4](#A978-1-4302-5786-8_11_Chapter.html#Fig4). Alas, `OVERLAY` mode does\
    \ not respect your alpha channel data!\n\nSometimes there are bugs in the more\
    \ advanced Android classes, and this `OVERLAY` algorithm referenced by the `OVERLAY`\
    \ blending mode constant should “respect” the alpha channel that you’ve set up\
    \ in your original image asset.\n\nWhat I mean by respect is that the algorithm\
    \ should only apply the `OVERLAY` blending mode to pixels that are not 100% transparent,\
    \ so you should not see any of the goldenrod (RGB 216,192,96) color values where\
    \ the alpha channel transparency is defined in your original digital image compositing\
    \ asset.\n\nThis points out that this `PorterDuff` class and its modes are not\
    \ yet fully perfected in Android, probably because this is an advanced feature\
    \ that is not as often used by the majority of the Android developer community.\
    \ That said, I am sure that eventually the Android development team will get around\
    \ to adding a healthy dose of “respect” in the `OVERLAY` algorithm for the referenced\
    \ source image alpha channel so that this blending mode works with digital image\
    \ assets that include an alpha channel for compositing.\n\nWhat seems to be happening\
    \ currently is that the algorithm is applying the mode to a alpha channel using\
    \ its grayscale representation of transparency, rather than first looking at the\
    \ alpha channel as a guide and using it to determine if the color pixel value\
    \ should be deemed to be present (or not) in the image composite end result. Just\
    \ my guess, but there should not be an area of solid color in the resulting `OVERLAY`\
    \ mode application shown in Figure [11-4](#A978-1-4302-5786-8_11_Chapter.html#Fig4);\
    \ only the hoop and logo text should be lightened.\n\n![A978-1-4302-5786-8_11_Fig5_HTML.jpg](A978-1-4302-5786-8_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5. Replacing `Color.YELLOW` constant with an `.rgb()` method call\
    \ to allow any color value to be specified\n\nNext, let’s change your `PorterDuff.Mode`\
    \ constant reference back to `MULTIPLY`. Also, until the `SCREEN` and `OVERLAY`\
    \ algorithms are updated to include alpha channel support, you’ll use `MULTIPLY`\
    \ to blend color changes using your alpha channel objects (see Figure [11-6](#A978-1-4302-5786-8_11_Chapter.html#Fig6)).\
    \ It is important to note that the blending modes will work fine for images (such\
    \ as photographs) that do not use an alpha channel for image compositing or for\
    \ other special effects purposes.\n\n![A978-1-4302-5786-8_11_Fig6_HTML.jpg](A978-1-4302-5786-8_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6. Final `.setColorFilter()` Java structure to use to color-shift\
    \ digital image assets using alpha channels\n\nIn the next section, we will get\
    \ a bit more advanced and utilize the `Paint`, `Bitmap`, `BitmapFactory`, and\
    \ `Canvas` classes to apply a `PorterDuff` blending mode of choice between two\
    \ different digital image assets.\n\n## The `PorterDuffXfermode` Class: Apply\
    \ Blending Constants\n\nAndroid has a specialized class for applying the PorterDuff\
    \ image blending modes and transfer modes in conjunction with the `PorterDuff.MODE`\
    \ constants and the `PorterDuff` class itself. The class is called the Android\
    \ `PorterDuffXfermode` class and it’s a direct subclass of the Android `Xfermode`\
    \ class. This `Xfermode` subclass is modified to allow PorterDuff algorithms to\
    \ be applied to your image assets by using the predefined blending mode constants\
    \ that you learned about earlier.\n\nThe `PorterDuffXfermode` class Java hierarchy\
    \ is structured as follows:\n\n```\njava.lang.Object\n  > android.graphics.Xfermode\n\
    \    > android.graphics.PorterDuffXfermode\n```\n\nThe Android `PorterDuffXfermode`\
    \ class is also part of the `android.graphics` package. As such, its import statement\
    \ is constructed so that it will reference an `android.graphics.PorterDuffXfermode`\
    \ package import path.\n\nAs you will see a bit later on in the chapter when you\
    \ start writing Java code to implement PorterDuff transfer modes in your digital\
    \ image assets, the Android `Paint` class `.setXfermode()` method is used in conjunction\
    \ with your `PorterDuffXfermode` object and `PorterDuff.Mode` constant to “load”\
    \ the `Paint` object with a blending algorithm, which it will utilize to “paint”\
    \ one image asset onto another image asset using that blending algorithm.\n\n\
    ## The `Paint` Class: Apply a Blending Constant Onto an Image\n\nThe first thing\
    \ that you will need to do is to construct that `Paint` object, so open Eclipse,\
    \ and open your `ContentsActivity.java` class in the editor by using the right-click\
    \ `Open` command or left-click `F3` key, and then add the following line of Java\
    \ code to the first line of the class above `Override`:\n\n```\nPaint paintObject\
    \ = new Paint();\n```\n\nThis constructs an empty `Paint` object named `paintObject`\
    \ for you to use in your Activity for pixel painting operations. As you can see\
    \ in Figure [11-7](#A978-1-4302-5786-8_11_Chapter.html#Fig7), you will need to\
    \ mouse-over the error highlighting, and select the `Import Paint (android.graphics)`\
    \ option to have the `Import android.graphics.Paint` Java code statement automatically\
    \ written for you.\n\n![A978-1-4302-5786-8_11_Fig7_HTML.jpg](A978-1-4302-5786-8_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7. Creating a `Paint` object named `paintObject` using the `Paint()`\
    \ constructor in your `ContentsActivity.java`\n\nThe Android `Paint` class is\
    \ used to draw or “paint” pixels on the display screen, and as such it contains\
    \ the style, alpha, modes, fonts, and color information necessary to be able to\
    \ draw geometry, text, and bitmaps.\n\nThe `Paint` class is a direct subclass\
    \ of the `java.lang.Object` class and is thus a unique capability not based on\
    \ any other type of class in Android. It is one of the core classes used for graphics\
    \ in Android, along with the `Bitmap` and `Canvas` classes, which you will be\
    \ learning about in this chapter as well, since all three of these graphics classes\
    \ must work together to allow an advanced operation such as PorterDuff blending\
    \ to be performed.\n\nThe Android `Paint` class Java hierarchy is thus structured\
    \ as follows:\n\n```\njava.lang.Object\n  > android.graphics.Paint\n```\n\nYou\
    \ will see how this `Paint` class is used a bit later on in this chapter."
  raw: 'Since the Graphical Layout Editor pane does not support applying imaging algorithms,
    you will need to use the Nexus One emulator to see the result of a PorterDuff
    blending mode color filtration digital image application.


    As you can see on the left side of Figure [11-4](#A978-1-4302-5786-8_11_Chapter.html#Fig4),
    the yellow color value has been applied to the porterDuffImage ImageView object
    that references your currentBookmarkImage <ImageView> XML tag definition, which
    references your digital image asset.


    ![A978-1-4302-5786-8_11_Fig4_HTML.jpg](A978-1-4302-5786-8_11_Fig4_HTML.jpg)


    Figure 11-4.


    Testing the PorterDuff MULTIPLY mode (left) and OVERLAY mode (right) in the Nexus
    One emulator


    Next, let’s see what one of the other popular blending mode constants, the OVERLAY
    constant, will do for your color filter application. I’ll also show you how to
    apply a precise 24-bit color value within the .setColorFilter() method call, as
    that is normally what you are going to want to apply as a graphics design professional.
    Change the second line of Java code to read


    `porterDuffImage.setColorFilter(Color.rgb(216,192,96), PorterDuff.Mode.OVERLAY);`


    This calls your Color class .rbg() method inside your .setColorFilter() method,
    using a more advanced Java code construct that allows for a more precise application
    of 24-bit color values with PorterDuff blending modes.


    As you can see in Figure [11-5](#A978-1-4302-5786-8_11_Chapter.html#Fig5), the
    Java code is again error-free and you are ready to use a Run As ➤ Android Application
    work process to test your code in the Nexus One emulator. The results are shown
    on the right-hand side of the screen shot shown in Figure [11-4](#A978-1-4302-5786-8_11_Chapter.html#Fig4).
    Alas, OVERLAY mode does not respect your alpha channel data!


    Sometimes there are bugs in the more advanced Android classes, and this OVERLAY
    algorithm referenced by the OVERLAY blending mode constant should “respect” the
    alpha channel that you’ve set up in your original image asset.


    What I mean by respect is that the algorithm should only apply the OVERLAY blending
    mode to pixels that are not 100% transparent, so you should not see any of the
    goldenrod (RGB 216,192,96) color values where the alpha channel transparency is
    defined in your original digital image compositing asset.


    This points out that this PorterDuff class and its modes are not yet fully perfected
    in Android, probably because this is an advanced feature that is not as often
    used by the majority of the Android developer community. That said, I am sure
    that eventually the Android development team will get around to adding a healthy
    dose of “respect” in the OVERLAY algorithm for the referenced source image alpha
    channel so that this blending mode works with digital image assets that include
    an alpha channel for compositing.


    What seems to be happening currently is that the algorithm is applying the mode
    to a alpha channel using its grayscale representation of transparency, rather
    than first looking at the alpha channel as a guide and using it to determine if
    the color pixel value should be deemed to be present (or not) in the image composite
    end result. Just my guess, but there should not be an area of solid color in the
    resulting OVERLAY mode application shown in Figure [11-4](#A978-1-4302-5786-8_11_Chapter.html#Fig4);
    only the hoop and logo text should be lightened.


    ![A978-1-4302-5786-8_11_Fig5_HTML.jpg](A978-1-4302-5786-8_11_Fig5_HTML.jpg)


    Figure 11-5.


    Replacing Color.YELLOW constant with an .rgb() method call to allow any color
    value to be specified


    Next, let’s change your PorterDuff.Mode constant reference back to MULTIPLY. Also,
    until the SCREEN and OVERLAY algorithms are updated to include alpha channel support,
    you’ll use MULTIPLY to blend color changes using your alpha channel objects (see
    Figure [11-6](#A978-1-4302-5786-8_11_Chapter.html#Fig6)). It is important to note
    that the blending modes will work fine for images (such as photographs) that do
    not use an alpha channel for image compositing or for other special effects purposes.


    ![A978-1-4302-5786-8_11_Fig6_HTML.jpg](A978-1-4302-5786-8_11_Fig6_HTML.jpg)


    Figure 11-6.


    Final .setColorFilter() Java structure to use to color-shift digital image assets
    using alpha channels


    In the next section, we will get a bit more advanced and utilize the Paint, Bitmap,
    BitmapFactory, and Canvas classes to apply a PorterDuff blending mode of choice
    between two different digital image assets.


    ## The PorterDuffXfermode Class: Apply Blending Constants


    Android has a specialized class for applying the PorterDuff image blending modes
    and transfer modes in conjunction with the PorterDuff.MODE constants and the PorterDuff
    class itself. The class is called the Android PorterDuffXfermode class and it’s
    a direct subclass of the Android Xfermode class. This Xfermode subclass is modified
    to allow PorterDuff algorithms to be applied to your image assets by using the
    predefined blending mode constants that you learned about earlier.


    The PorterDuffXfermode class Java hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.Xfermode`


        `> android.graphics.PorterDuffXfermode`


    The Android PorterDuffXfermode class is also part of the android.graphics package.
    As such, its import statement is constructed so that it will reference an android.graphics.PorterDuffXfermode
    package import path.


    As you will see a bit later on in the chapter when you start writing Java code
    to implement PorterDuff transfer modes in your digital image assets, the Android
    Paint class .setXfermode() method is used in conjunction with your PorterDuffXfermode
    object and PorterDuff.Mode constant to “load” the Paint object with a blending
    algorithm, which it will utilize to “paint” one image asset onto another image
    asset using that blending algorithm.


    ## The Paint Class: Apply a Blending Constant Onto an Image


    The first thing that you will need to do is to construct that Paint object, so
    open Eclipse, and open your ContentsActivity.java class in the editor by using
    the right-click Open command or left-click F3 key, and then add the following
    line of Java code to the first line of the class above Override:


    `Paint paintObject = new Paint();`


    This constructs an empty Paint object named paintObject for you to use in your
    Activity for pixel painting operations. As you can see in Figure [11-7](#A978-1-4302-5786-8_11_Chapter.html#Fig7),
    you will need to mouse-over the error highlighting, and select the Import Paint
    (android.graphics) option to have the Import android.graphics.Paint Java code
    statement automatically written for you.


    ![A978-1-4302-5786-8_11_Fig7_HTML.jpg](A978-1-4302-5786-8_11_Fig7_HTML.jpg)


    Figure 11-7.


    Creating a Paint object named paintObject using the Paint() constructor in your
    ContentsActivity.java


    The Android Paint class is used to draw or “paint” pixels on the display screen,
    and as such it contains the style, alpha, modes, fonts, and color information
    necessary to be able to draw geometry, text, and bitmaps.


    The Paint class is a direct subclass of the java.lang.Object class and is thus
    a unique capability not based on any other type of class in Android. It is one
    of the core classes used for graphics in Android, along with the Bitmap and Canvas
    classes, which you will be learning about in this chapter as well, since all three
    of these graphics classes must work together to allow an advanced operation such
    as PorterDuff blending to be performed.


    The Android Paint class Java hierarchy is thus structured as follows:


    `java.lang.Object`


      `> android.graphics.Paint`


    You will see how this Paint class is used a bit later on in this chapter.'
  trans: "\n由于`Graphical Layout Editor`窗格不支持应用成像算法，你需要使用`Nexus One`模拟器来查看`PorterDuff`混合模式色彩滤镜数字图像应用的效果。\n\
    \n如图 11-4 左侧所示，黄色数值已被应用到引用你的`currentBookmarkImage` `<ImageView>` XML 标签定义的`porterDuffImage`\
    \ `ImageView`对象上，而该标签又引用了你的数字图像资源。\n\n![A978-1-4302-5786-8_11_Fig4_HTML.jpg](img/A978-1-4302-5786-8_11_Fig4_HTML.jpg)\n\
    \n图 11-4. 在`Nexus One`模拟器中测试`PorterDuff.MULTIPLY`模式（左）和`OVERLAY`模式（右）\n\n接下来，让我们看看另一个流行的混合模式常量——`OVERLAY`常量——对你的色彩滤镜应用会有什么效果。我还会向你展示如何在`.setColorFilter()`方法调用中应用一个精确的\
    \ 24 位色值，这通常是你作为图形设计专业人士想要做到的。将第二行 Java 代码修改为：\n\n```\nporterDuffImage.setColorFilter(Color.rgb(216,192,96),\
    \ PorterDuff.Mode.OVERLAY);\n```\n\n这行代码在你的`.setColorFilter()`方法内部调用了`Color`类的`.rbg()`方法，使用了一种更高级的\
    \ Java 代码结构，允许通过`PorterDuff`混合模式更精确地应用 24 位色值。\n\n如图 11-5 所示，Java 代码再次没有错误，你可以准备使用`Run\
    \ As` ➤ `Android Application`工作流程在`Nexus One`模拟器中测试你的代码。结果显示在图 11-4 所示的屏幕截图右侧。唉，`OVERLAY`模式并不尊重你的\
    \ alpha 通道数据！\n\n有时，更高级的 Android 类中会存在 bug，这个由`OVERLAY`混合模式常量引用的`OVERLAY`算法本应“尊重”你在原始图像资源中设置的\
    \ alpha 通道。\n\n我所说的“尊重”是指该算法只应将`OVERLAY`混合模式应用于非 100%透明的像素，因此，在原始数字图像合成资源中定义了\
    \ alpha 通道透明度的区域，你不应看到任何菊花黄（RGB 216,192,96）的色值。\n\n这表明 Android 中的这个`PorterDuff`类及其模式尚未完全完善，可能因为这是一个高级特性，在大多数\
    \ Android 开发者社区中并不常用。话虽这么说，我相信 Android 开发团队最终会腾出时间为`OVERLAY`算法添加对源图像 alpha 通道的“尊重”，以便这种混合模式能够与包含用于合成的\
    \ alpha 通道的数字图像资源一起正常工作。\n\n目前的情况似乎是该算法使用透明度的灰度表示将模式应用于 alpha 通道，而不是首先将 alpha\
    \ 通道视为一个指南，并利用它来确定该彩色像素值在最终图像合成结果中是否应该存在（或不存在）。这只是我的猜测，但在图 11-4 所示的`OVERLAY`模式应用结果中，不应该出现一个纯色区域；只有篮筐和\
    \ logo 文字应该被提亮。\n\n![A978-1-4302-5786-8_11_Fig5_HTML.jpg](img/A978-1-4302-5786-8_11_Fig5_HTML.jpg)\n\
    \n图 11-5. 用`.rgb()`方法调用替换`Color.YELLOW`常量，以允许指定任何色值\n\n接下来，让我们将`PorterDuff.Mode`常量引用改回`MULTIPLY`。另外，在`SCREEN`和`OVERLAY`算法更新以支持\
    \ alpha 通道之前，你将使用`MULTIPLY`通过 alpha 通道对象来混合颜色变化（参见图 11-6）。值得注意的是，对于那些不使用 alpha\
    \ 通道进行图像合成或其他特殊效果目的的图像（例如照片），这些混合模式可以正常工作。\n\n![A978-1-4302-5786-8_11_Fig6_HTML.jpg](img/A978-1-4302-5786-8_11_Fig6_HTML.jpg)\n\
    \n图 11-6. 用于使用 alpha 通道对数字图像资源进行色彩偏移的最终`.setColorFilter()` Java 结构\n\n在下一节中，我们将更进一步，利用`Paint`、`Bitmap`、`BitmapFactory`和`Canvas`类，在两个不同的数字图像资源之间应用一个选择的`PorterDuff`混合模式。\n\
    \n## `PorterDuffXfermode`类：应用混合常量\n\nAndroid 有一个专门的类，用于结合`PorterDuff.MODE`常量和`PorterDuff`类本身，来应用\
    \ PorterDuff 图像混合模式和传输模式。这个类称为 Android `PorterDuffXfermode`类，是 Android `Xfermode`类的直接子类。这个`Xfermode`子类被修改，允许通过使用你之前了解到的预定义混合模式常量，将\
    \ PorterDuff 算法应用于你的图像资源。\n\n`PorterDuffXfermode`类的 Java 层次结构如下：\n\n```\njava.lang.Object\n\
    \  > android.graphics.Xfermode\n    > android.graphics.PorterDuffXfermode\n```\n\
    \nAndroid `PorterDuffXfermode`类也是`android.graphics`包的一部分。因此，它的导入语句构建方式使其引用`android.graphics.PorterDuffXfermode`包导入路径。\n\
    \n正如你在本章稍后开始编写 Java 代码以实现数字图像资源中的 PorterDuff 传输模式时会看到的那样，Android `Paint`类的`.setXfermode()`方法与你的`PorterDuffXfermode`对象和`PorterDuff.Mode`常量结合使用，以使用某种混合算法“加载”`Paint`对象，该`Paint`对象将利用该算法将一个图像资源“绘制”到另一个图像资源上。\n\
    \n## `Paint`类：将混合常量应用到图像上\n\n你需要做的第一件事是构造那个`Paint`对象，所以打开 Eclipse，并在编辑器中使用右键单击`Open`命令或左键单击`F3`键打开你的`ContentsActivity.java`类，然后在类的第一行`Override`上方添加下面这行\
    \ Java 代码：\n\n```\nPaint paintObject = new Paint();\n```\n\n这将构造一个名为`paintObject`的空`Paint`对象，供你在\
    \ Activity 中进行像素绘制操作。如图 11-7 所示，你需要将鼠标悬停在错误高亮上，并选择`Import Paint (android.graphics)`选项，以便自动为你写入`Import\
    \ android.graphics.Paint` Java 代码语句。\n\n![A978-1-4302-5786-8_11_Fig7_HTML.jpg](img/A978-1-4302-5786-8_11_Fig7_HTML.jpg)\n\
    \n图 11-7. 在`ContentsActivity.java`中使用`Paint()`构造函数创建一个名为`paintObject`的`Paint`对象\n\
    \nAndroid `Paint`类用于在显示屏上绘制或“绘画”像素，因此它包含了绘制几何图形、文本和位图所需的样式、透明度、模式、字体和颜色信息。\n\n\
    `Paint`类是`java.lang.Object`类的直接子类，因此它是一项独特的功能，不基于 Android 中的任何其他类型的类。它是 Android\
    \ 中用于图形处理的核心类之一，与`Bitmap`和`Canvas`类齐名，你将在本章中同时学习这些类，因为这三个图形类必须协同工作，才能执行诸如 PorterDuff\
    \ 混合此类的高级操作。\n\nAndroid `Paint`类的 Java 层次结构因此构建如下：\n\n```\njava.lang.Object\n\
    \  > android.graphics.Paint\n```\n\n你将在本章稍后部分看到如何使用这个`Paint`类。\n"
- fmt: '# Using Bitmap Classes to Apply PorterDuff Between Images


    Now that you have your `Paint` object set up, you can create the `Bitmap` objects.
    These will hold your `backgroundImage` and `foregroundImage` image assets, which
    you will load into your `Bitmap` objects using Android’s `BitmapFactory` class.


    You’ll also need to use the `.copy()` method to make your `Bitmap` objects into
    what are termed mutable `Bitmap` objects in Android. Mutable means that your `Bitmap`
    object’s pixels can be edited (changed). For this to happen it must be loaded
    into system memory, which is why you use a `.copy()` method to take your image
    asset from its drawable resource area and place it into system memory.


    All the `Bitmap` work is done using these following four lines of Java code:


    ```

    Bitmap backgroundImage = BitmapFactory.decodeResource(getResources(), R.drawable.cloudsky);

    Bitmap mutableBackgroundImage = backgroundImage.copy(Bitmap.Config.ARGB_8888,
    true);

    Bitmap foregroundImage = BitmapFactory.decodeResource(getResources(), R.drawable.cloudsky);

    Bitmap mutableForegroundImage = foregroundImage.copy(Bitmap.Config.ARGB_8888,
    true);

    ```


    The first statement uses your `BitmapFactory` class `.decodeResource()` method
    to load your `Bitmap` object named `backgroundImage` with your `cloudsky.jpg`
    image asset in your `drawable` folder using the `.getResources()` method call.


    The second statement takes this `Bitmap` object, and uses the `.copy()` method
    to load it in system memory and specify that it needs 32-bit memory space by using
    the `Bitmap.Config.ARGB_888` constant along with an `isMutable` flag which is
    set to `true`.


    As you can see in Figure [11-8](#A978-1-4302-5786-8_11_Chapter.html#Fig8), you’ll
    need to mouse-over your `Bitmap` class and `BitmapFactory` class references in
    Eclipse and invoke the Import option for both classes to get Eclipse to write
    those Import statements for you.


    ![A978-1-4302-5786-8_11_Fig8_HTML.jpg](A978-1-4302-5786-8_11_Fig8_HTML.jpg)


    *Figure 11-8. Creating Bitmap objects for backgroundImage and foregroundImage
    using the BitmapFactory class*


    Now that your `Bitmap` objects are loaded from your `/res/drawable` resources
    area, as well as loaded (copied) into memory as 32-bit data with alpha channels
    and the `isMutable` flag set to `true` so that you can edit (use) this data in
    your Android `Paint` and `Xfermode` operations, you are ready to use your `Paint`
    object and `.setXfermode()` method to load your PorterDuff mode of choice, so
    that your `Paint` object knows how you want it to function.


    ## Using `.setXfermode()` Method to Apply PorterDuffXfermode


    The next line of Java code will set up your `Paint` object, named `paintObject`,
    to be able to load a `PorterDuff.Mode.XOR` constant using the `PorterDuffXfermode`
    object you learned about earlier. This is done using the `.setXfermode()` method
    called off the `Paint` object, as follows:


    ```

    paintObject.setXfermode(new PorterDuffXfermode(PorterDuff.Mode.XOR));

    ```


    This calls the `.setXfermode()` method off of the `paintObject` `Paint` object
    using dot notation while at the same time, inside the `.setXfermode()` method
    call, creates a new `PorterDuffXfermode` object and sets it equal to the `PorterDuff.Mode.XOR`
    constant using its parameter list.


    As you can see in Figure [11-9](#A978-1-4302-5786-8_11_Chapter.html#Fig9), after
    you type this line of Java code in, you will need to mouse-over the `PorterDuffXfermode`
    class reference, which after you import `PorterDuffXfermode` (`android.graphics`)
    will also remove that `.setXfermode()` error highlighting. As you now know, you
    might need to write the `import android.graphics.PorterDuff` statement by hand,
    as Eclipse does not seem to be seeing the `PorterDuff` class as needing to be
    imported.


    ![A978-1-4302-5786-8_11_Fig9_HTML.jpg](A978-1-4302-5786-8_11_Fig9_HTML.jpg)


    *Figure 11-9. Using the .setXfermode() method of the paintObject to create a new
    PorterDuffXfermode XOR object*


    Now that your `Paint` object is configured, you can set up your `Canvas` object.


    ## The Canvas Class: Creating a Canvas for Our Compositing


    The Android `Canvas` class is used as an engine to draw on a display screen. If
    you are familiar with game design, you have heard of the Canvas before; it is
    a common term for graphics designers, and is available not only for Android but
    also other popular programming paradigms, such as HTML5 Apps.


    In order to draw graphics to the screen, you will need to have four basic components.
    The first of these is a `Bitmap` object to hold your pixels in system memory;
    the second is the `Canvas` to execute the draw instructions (writing data onto
    the `Bitmap` object); the third is a drawing “primitive” object, for instance,
    a `Rect`, `Path`, `Text`, or `Bitmap` object; and finally, a `Paint` object, which
    is used to describe the colors, modes, and styles that will be applied by the
    `Canvas` rendering engine, through the primitive, to the `Bitmap` object. Graphics
    in Android is no walk in the park, to be sure.


    The Android `Canvas` class is another one of those 100% original code direct subclasses
    of `java.lang.Object`. This is because it needs to be customized specifically
    for the Android OS. Thus, its Java hierarchy is as follows:


    ```

    java.lang.Object

    > android.graphics.Canvas

    ```


    You will utilize this `Canvas` class next, since you need its rendering engine
    capabilities to be able to perform this PorterDuff blending mode execution for
    the Java code that you are writing to demonstrate how to blend imagery.


    The next step in setting up your image compositing stack in Android is the creation
    of a `Canvas` for you to paint on. This involves creating your target composite
    image, which is going to be another `Bitmap` object, one that you’re going to
    aptly name `compositeImage` since it will hold your composite image.


    This is done using the `.createBitmap()` method, and you’ll load it with your
    `mutableForegroundImage` object as well, so that one of the two images that you
    are blending together is already loaded and in place. You will do this using the
    following single line of Java programming logic, which declares the `Bitmap` object,
    names it, and sets it equal to the result of the `Bitmap` class, calling its own
    `.createBitmap()` method with a `mutableForegroundImage` parameter inside of the
    function call:


    ```

    Bitmap compositeImage = Bitmap.createBitmap(mutableForegroundImage);

    ```


    Next, you want to create (construct) and set up your `Canvas` object, which you
    will name `imageCanvas`, and which will reference your `compositeImage` `Bitmap`
    object. This is done using the `new` keyword in the following line of code:


    ```

    Canvas imageCanvas = new Canvas(compositeImage);

    ```


    As you can see in Figure [11-10](#A978-1-4302-5786-8_11_Chapter.html#Fig10), you
    will need to mouse-over one of the two `Canvas` object references, and select
    the Import Canvas (`android.graphics`) option, so that you are able to use this
    `Canvas` class in your Java Activity.


    ![A978-1-4302-5786-8_11_Fig10_HTML.jpg](A978-1-4302-5786-8_11_Fig10_HTML.jpg)


    *Figure 11-10. Creating a compositeImage Bitmap object using .createBitmap() and
    imageCanvas Canvas object*


    Now that you’ve set up your Bitmaps, `Paint` object, and `Canvas` object, you
    can write the line of code that brings them all together in one place and performs
    your compositing operation. This line of code uses the `Canvas` class `.drawBitmap()`
    method, which takes four parameters.


    The first parameter is your `Bitmap` object, in this case the other `Bitmap` object
    you are blending; the second is a source rectangle (`Rect` object), in this case
    `null` since your image is the source; the third is the destination rectangle,
    in this case you create a new `Rect` object with the dimensions of the `cloudsky.jpg`
    image asset; and the fourth is that `Paint` object you named `paintObject`, which
    you created earlier and loaded with a `PorterDuffXfermode` object that references
    a `PorterDuff.Mode.XOR` blending algorithm constant.


    ```

    imageCanvas.drawBitmap(mutableBackgroundImage, null, new Rect(0, 0, 1000, 1000),
    paintObject);

    ```'
