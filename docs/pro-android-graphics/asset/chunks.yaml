    ## RotateAnimation Class: Animation Subclass for Rotation


    As mentioned in the chapter introduction, an Android `RotateAnimation` class is
    yet another direct subclass of the `android.view.animation.Animation` public abstract
    class. The Android RotateAnimation Java class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.RotateAnimation`


    The RotateAnimation class is a part of the `android.view.animation` package.


    Its `import statement` references the `android.view.animation.RotateAnimation`
    package import path, as you’ll see in the next section when you use it to rotate
    your PAG frame animation, as it also scales and fades into view. This animation
    class is utilized to implement 2D rotation of View objects.


    This rotation will take place in an X-Y plane. This technically means that the
    rotation is taking place around the `Z axis`. In 3D, there are three axes including
    the normal X (left to right) axis and Y (top to bottom) axis you find in 2D, as
    well as a Z axis that is represented by a line coming out of the intersection
    of the X and Y axes, towards (and away from) your screen (or towards and away
    from your viewer).


    So technically the RotateAnimation object is implementing Z-axis rotation, around
    (using) a pivot point `origin`, which is set by the developer using X and Y coordinates,
    as you will see firsthand in the next section.


    Besides the `pivot point origin` around which your View object will rotate, you
    must also specify your amount of rotation using a `range`, which starts with the
    degrees to `rotate from`, usually zero or “normal” View positioning, and ends
    with the degrees to `rotate to`, such as 90 degrees (clockwise), or -90 degrees
    (counter-clockwise), or 180 degrees (upside down), or, in your case, 360 degrees,
    or a full seamless View object (ImageView) rotation.


    The RotateAnimation procedural animation class is thus useful for rotating Views
    as well as flipping them on their sides or upside down, which can be done quickly
    if that effect is desired by using a short duration value.


    This RotateAnimation procedural animation class can be used in conjunction with
    the other three procedural animation object types to create extremely impressive
    special effects, regardless of how simple this class may seem to be when it is
    standing (used) alone.


    The constructor method that you want to use to create the RotateAnimation object
    is similar to the eight-parameter ScaleAnimation constructor method that you have
    already implemented. RotateAnimation constructor methods will leverage the following
    advanced rotation specification format in your app:


    `RotateAnimation(float fromDegrees, float toDegrees, int pivotXType, float pivotXValue,
    int pivotYType, float pivotYValue);`'
