- fmt: '# Android Digital Imaging: Formats, Concepts, and Optimization


    ## Abstract


    In this first chapter, you will see how digital imaging is implemented inside
    of the Android operating system. We will take a look at the digital image formats
    that are supported in Android, the classes that allow imagery to be formatted
    on the screen, and the basic digital imaging concepts that you will need to understand
    to follow what we will be doing in Android graphics design.


    We will also take a look at how to optimize your digital image assets for Android
    application development. We’ll explore digital image optimization both from an
    individual image asset data footprint standpoint and from an Android device type
    market coverage standpoint.


    As you know, Android devices are no longer just smartphones, but run the gamut
    from watches to phones to tablets to game consoles to 4K iTV sets. The significance
    of this to the graphic design aspect of Android application development is that
    you must now create your digital image assets in a far wider range of pixels,
    from as low a resolution as 240 pixels to as high a resolution as 4096 pixels,
    and you must do this for each of your digital imaging assets.


    We will look at the facilities that Android has in place for doing this as a part
    of your application development workflow and your asset referencing XML (eXtensible
    Markup Language) markup. Markup is different from Java code in that it uses “tags”
    much as HTML (HyperText Markup Language) does. XML is very similar to HTML in
    that it uses these tag structures, but different in that it is customizable, which
    is why Google has selected it for use in Android OS.


    Since this is a Pro level book I assume that you have a decent level of experience
    with developing for the Android platform, and have already been through the learning
    process in an Android educational title such as my Learn Android App Development
    (Apress, 2013).


    Let’s get started by taking a look at what image formats Android supports.


    ## Android’s Digital Image Formats: Lossless Versus Lossy


    Android supports several popular digital imagery formats, some which have been
    around for decades, such as the Compuserve GIF (Graphic Information Format) and
    the Joint Photographic Experts Group (JPEG) format, and some are more recent,
    such as the PNG (Portable Network Graphics) and WebP (developed by ON2 and acquired
    and made open source by Google).


    I will talk about these in their order of origin, from the oldest (and thus least
    desirable) GIF through the newest (and thus most advanced) WebP format. Compuserve
    GIF is fully supported by the Android OS, but is not recommended. GIF is a lossless
    digital image file format, as it does not throw away image data to achieve better
    compression results.


    This is because the GIF compression algorithm is not as refined (read: powerful)
    as PNG, and it only supports indexed color, which you will be learning about in
    detail in this chapter. That said, if all your image assets are already created
    and in GIF format, you will be able to use them with no problem (other than the
    mediocre resulting quality) in your Android applications.


    The next oldest digital image file format that Android supports is JPEG, which
    uses a truecolor color depth instead of an indexed color depth. We will be covering
    color theory and color depth soon.


    JPEG is said to be a lossy digital image file format, as it throws away (loses)
    image data in order to achieve smaller file sizes. It is important to note that
    this original image data is unrecoverable after compression has taken place, so
    make sure to save an original uncompressed image file.


    If you zoom into a JPEG image after compression, you will see a discolored area
    effect that clearly was not present in the original imagery. These degraded areas
    in the image data are termed compression artifacts in the digital imaging industry
    and will only occur in lossy image compression.


    The most recommended image format in Android is called the PNG (Portable Network
    Graphic) file format. PNG has both an indexed color version, called `PNG8`, and
    a truecolor version, called `PNG24`. The `PNG8` and `PNG24` extensions represent
    the bit depth of color support, which we will be getting into in a little bit.
    PNG is pronounced “ping” in the digital image industry.


    PNG is the recommended format to use for Android because it has decent compression,
    and because it is lossless, and thus has both high image quality and a reasonable
    level of compression efficiency.


    The most recent image format was added to Android when Google acquired ON2 and
    is called the WebP image format. The format is supported under Android 2.3.7 for
    image read, or playback, support and in Android 4.0 or later for image write,
    or file saving, support. WebP is a static (image) version of the WebM video file
    format, also known in the industry as the VP8 codec. You will be learning all
    about codecs and compression in a later section.'
