    最后，`MATRIX`算法允许你通过调用`.setImageMatrix()`方法，将`Matrix`类变换（旋转、缩放、倾斜等）的输出赋给图像。`Matrix`类可用于对图像应用旋转、缩放和倾斜等变换，以在视图对象内实现特殊效果。本质上，此选项允许你用自己的自定义缩放和变换算法替代
    Android OS 为你提供的其他七种算法。


    这些缩放常量也可以通过 XML 标记中支持`android:scaleType`参数的任何标签的参数进行设置。例如，如果你想使用`FIT_START`常量，你可以使用`android:scaleType="fitStart"`参数来实现效果。


    需要注意的是，XML 中的`ScaleType`常量使用驼峰命名法，因此`CENTER_CROP`为`centerCrop`，`CENTER_INSIDE`为`centerInside`，`FIT_XY`为`fitXY`，`FIT_CENTER`为`fitCenter`，依此类推。

    '
- fmt: '# Using AdjustViewBounds and How it Relates to ScaleType


    There is a parameter or attribute that can be used with `ImageView` objects called
    `AdjustViewBounds`, which accepts a Boolean value (true or false). In XML, this
    is the `android:adjustViewBounds` parameter, and in Java, it is the `.setAdjustViewBounds()`
    method call.


    If you want the `ImageView` object to adjust its container boundary in order to
    preserve the aspect ratio of your referenced digital image asset, then set this
    Boolean flag value to be true.


    If you want your `ImageView` object to adjust its boundaries in order to fit the
    aspect ratio of its parent layout container, which if you have set the `layout_width`
    and `layout_height` parameter value of `match_parent` is probably the physical
    display screen of the Android device, then you would set that Boolean flag value
    to false, which is the default value, so you really do not ever need to have an
    `android:adjustViewBounds="false"` parameter in the XML markup for an `ImageView`.


    The more obvious reason to use a false value would be to toggle the on/off switch
    (or, more accurately, the true/false switch) using the `.setAdjustViewBounds()`
    method inside your application’s Java code.


    So, if you had used the `android:adjustViewBounds="true"` for your `ImageView`
    XML parameter definition, and you wanted to later tell Android to go ahead and
    unlock aspect ratio, and scale to fit your container dimensions (given you’re
    using `match_parent`), you would call `ImageView.setAdjustViewBounds()` method
    off of your `ImageView` object’s name using the following Java code:


    ```

    myImageViewObjectName.setAdjustViewBounds(false);

    ```


    Next, I want to outline some caveats regarding using the `android:scaleType` that
    we discussed in the previous section with an `android:adjustViewBounds` parameter,
    which we are covering here. When your `ImageView` object(s) call their constructor
    methods from the `ImageView` class, this constructor looks at your XML and sets
    the `android:adjustViewBounds` parameter setting before it looks at (and sets)
    your `android:scaleType` parameter’s constant value.


    What the constructor method does when you set `AdjustViewBounds` to true is it
    also sets your `ImageView` object’s `ScaleType` to the value of `FIT_CENTER`.


    For this reason, if you set your `android:scaleType` parameter to some other constant
    value, even if the parameter comes after `android:adjustViewBounds` in your parameter
    list within your `ImageView` tags, your `ScaleType` constant (if other than `FIT_CENTER`)
    will override an `android:adjustViewBounds="true"` parameter altogether. Keep
    this in mind to avoid unexpected scale results.


    This is because it’s not as much about the order of the parameters in your `ImageView`
    tag XML definition, but more about the order which the `ImageView` class fetches
    and implements these parameters from the XML definition, and this is determined
    by Java code inside the `ImageView.java` class itself.


    ## MaxWidth and MaxHeight: Controlling AdjustViewBounds


    Just as there is a relationship between the `ScaleType` and `AdjustViewBounds`
    parameters (or properties, or attributes), there is also a similar type of relationship
    between the `android:maxWidth` and `android:maxHeight` parameters and the `AdjustViewBounds`
    parameter setting for the `ImageView` object type.


    The `android:maxWidth` is an optional parameter that can be used if you want to
    stipulate a maximum width for the `ImageView` object. An `android:maxWidth` parameter
    setting data value needs to implement dimension value delimiters such as DIP,
    DP, SP, IN, PX, or MM.


    Thus, your `maxWidth` parameter would specify a floating point number, which would
    be appended with a unit indicator constant such as `120.0dip`.


    Available unit indicators for an `ImageView` include PX or px, representing `pixels`;
    DP, dp, DIP, or dip, representing density-independent pixels; SP or sp, representing
    scaled pixels that are scaled based upon a preferred font size and normally used
    for specifying font sizes in `TextView` parameters; IN or in, representing inches;
    and MM or mm, representing millimeters.


    The exact same rules, constants, and unit indicators would also apply for your
    `android:maxHeight` parameter, only they would be applied to the other dimension
    of the `ImageView` object.


    So, the caveat with `maxWidth` and `maxHeight` is that in order for these two
    parameters to function properly, your `ImageView` `AdjustViewBounds` attribute
    must be set to true. Note that this in turn means that your `ImageView` `ScaleType`
    must be set to `FIT_CENTER`.


    You learned in a previous section of the chapter that if you set a `ScaleType`
    constant other than `FIT_CENTER` in your XML `ImageView` definition, the `AdjustViewBounds`
    will not work. The caveat applies to the `maxWidth` and the `maxHeight` as well,
    so if you try to use `maxWidth` and `maxHeight` parameters with `ScaleType`, and
    it isn’t working properly, now you know why.


    ## Setting a Baseline in ImageView and Controlling Alignment


    The concept of a baseline is far more applicable to a `TextView`, as baseline
    alignment is often used to align things based on the bottom edge of a text font.
    However, the concept is also supported in `ImageView` via two different parameters,
    the `android:baseline` and the `android:baselineAlignBottom`.


    The term “baseline” refers to an imaginary line at base of any `View` subclass
    objects, such as `ImageButton`, `ImageView`, `TextView`, and similar UI elements
    or widgets. When you set a baseline parameter, you are giving Android OS a location
    for the baseline you want to utilize to refer to that object when its parent (layout
    container) tag uses an `alignBaseline` parameter.


    The `android:baseline` parameter allows a developer to set an offset of the baseline
    within the `View` object. This parameter probably should have been called `baselineOffset`
    to be more clear about that, especially since there is an `android:baselineAlignBottom`
    parameter as well, which we will take a look at next.


    What the `BaselineAlignBottom` attribute does is to set the flag that tells the
    Android OS to use the bottom edge of the image asset in your `ImageView` as its
    baseline alignment setting. As far as digital images are concerned, this is usually
    what you’re trying to do, so, if you are not getting the image alignment that
    you are looking for when using other `layout_alignBaseline` types of parameters
    inside your UI layout containers that contain `ImageView` UI elements, try setting
    this `android:baselineAlignBottom` parameter equal to true.'
