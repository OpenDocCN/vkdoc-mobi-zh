- fmt: '# Scaling the ImageButton Down to a UI Element-Like Scale


    Next, you need to go back and restart Eclipse ADT, or if Eclipse is already open
    on your desktop, be sure to right-click the project folder and use the Refresh
    option to allow Eclipse to “see” the new image assets that you have added into
    your various `/res/drawable-dpi` sub-folders.


    Next, use the Run As ➤ Android Application work process to see if Android OS is
    using any of these smaller image assets that you have just created.


    When you run the app again in the Nexus One emulator, you will see that it still
    looks like it did in Figure [9-17](#A978-1-4302-5786-8_9_Chapter.html#Fig17),
    so you need to see if there are any parameters that you can use to achieve your
    desired end result.


    To do this, use the `android:` work process inside of the `<ImageButton>` tag
    to bring up the list of parameters. Look through all of them and see if any would
    help you to make the `ImageButton` look smaller.


    Near the bottom of the parameter list, you will see an `android:scaleX` and an
    `android:scaleY` parameter. Double-click each of these to add them to the `<ImageButton>`
    tag, as shown in Figure [9-25](#A978-1-4302-5786-8_9_Chapter.html#Fig25), on the
    second line of the tag parameters.


    Since you know that even scaling works the best, you’ll use a real or float scaling
    value of `0.5`, which is the equivalent of doing a 2X downsample.


    ![A978-1-4302-5786-8_9_Fig25_HTML.jpg](A978-1-4302-5786-8_9_Fig25_HTML.jpg)


    **Figure 9-25.** Scaling an ImageButton down to more of a button size using the
    `android:scaleX` and `android:scaleY`


    To see the visual result of adding these `android:scale` tags without having to
    use the Run As ➤ Android Application work process, you can click the **Graphical
    Layout Editor** tab at the bottom of the XML editing pane. This will switch you
    over into Visual Editing Mode to see the results of the 50% scale operation (parameter).


    As you can see in Figure [9-26](#A978-1-4302-5786-8_9_Chapter.html#Fig26), these
    `android:scaleX` and `android:scaleY` parameters give you exactly the end results
    that you were looking for, and the `ImageButton` now looks like a UI element under
    your Table of Contents.


    ![A978-1-4302-5786-8_9_Fig26_HTML.jpg](A978-1-4302-5786-8_9_Fig26_HTML.jpg)


    **Figure 9-26.** Using the Graphical Layout Editor tab to preview the result of
    the ImageButton scaling parameters


    However, the `android:scale` parameters left your `ImageButton` container the
    original size, as you can see by the selection set (sizing handles) area shown
    in Figure [9-26](#A978-1-4302-5786-8_9_Chapter.html#Fig26). So you need to add
    some additional parameters into the mix to pull this `ImageButton` container up
    and to the left, which will involve using some negative margin parameters, which
    you will add in next.


    First, let’s add in an `android:layout_marginTop` parameter, with a negative value
    of `35 DIP` to pull the newly resized `ImageButton` back up closer to the Table
    of Contents. You can use the **Graphical Layout Editor** tab to preview this setting
    to make sure that it is working well for you.


    Next, let’s add in the `android:layout_marginLeft` parameter with a negative value
    of `35 DIP` to pull the newly resized `ImageButton` closer toward the left side
    of the screen. You can also use the **Graphical Layout Editor** tab to preview
    this setting to make sure that it’s working well for you.


    Figure [9-27](#A978-1-4302-5786-8_9_Chapter.html#Fig27) shows the `android:layout_margin`
    parameters in place inside of the `<ImageButton>` tag at the top of the tag next
    to the two `android:scale` parameters. Your `ImageButton` UI element now has ten
    custom parameters.


    ![A978-1-4302-5786-8_9_Fig27_HTML.jpg](A978-1-4302-5786-8_9_Fig27_HTML.jpg)


    **Figure 9-27.** Add `android:layout_marginTop` and `android:layout_marginLeft`
    parameters to position ImageButton


    Now that you have all of your parameters in place, to scale and position the `ImageButton`,
    let’s again leverage the **Graphical Layout Editor** to quickly preview the XML
    markup that you have written, and see if you are getting any closer to the desired
    end result.


    As you can see in Figure [9-28](#A978-1-4302-5786-8_9_Chapter.html#Fig28), the
    `ImageButton` UI element is now closer to the bottom of the Table of Contents,
    and will be perceived by the end user as a UI button that will eventually take
    the end user to the Bookmarking Utility Activity subclass.


    Since I have the `<ImageButton>` tag selected in the XML Editing pane, the UI
    element is also showing as selected in the **Graphical Layout Editor** pane, which
    shows how the negative margin parameter values have moved the unused portion of
    the UI widget container out of the way so that the scaled UI element can be positioned
    where it should be on the screen.


    The other option is, of course, to downsize your image assets themselves to be
    half their original pixel sizes, or `180`, `120`, `90` and `60` pixels.


    The way that you have the XML markup designed you can easily add more Table of
    Contents entries, as long as you keep the `<ImageButton>` child tag as the last
    tag inside of the first nested `<LinearLayout>` child tag container.


    ![A978-1-4302-5786-8_9_Fig28_HTML.jpg](A978-1-4302-5786-8_9_Fig28_HTML.jpg)


    **Figure 9-28.** Using the Graphical Layout Editor to preview negative margin
    settings positioning your ImageButton


    Finally, let’s test the `ImageButton` in Nexus One, as shown in Figure [9-29](#A978-1-4302-5786-8_9_Chapter.html#Fig29).


    ![A978-1-4302-5786-8_9_Fig29_HTML.jpg](A978-1-4302-5786-8_9_Fig29_HTML.jpg)


    **Figure 9-29.** Testing the ImageButton states, scaling, and positioning parameters
    using the Nexus One emulator'
