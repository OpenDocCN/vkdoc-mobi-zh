  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。



    # 旋转 PAG 标志：使用 `RotateAnimation` 类


    终于，是时候添加 `RotateAnimation` 对象，来完成您在第 4 章 中通过 XML 标记实现的动画的 Java 版本了。


    打开 Eclipse 和 `MainActivity.java` 编辑选项卡，在顶部，紧接缩放和透明度 `Animation` 对象之后，添加一个 `Animation`
    对象声明，并将其命名为 `rotateZeroToFullAnimation`，如图 15-18 所示。


    ![A978-1-4302-5786-8_15_Fig18_HTML.jpg](img/A978-1-4302-5786-8_15_Fig18_HTML.jpg)


    **图 15-18.** 添加 `rotateZeroToFullAnimation` `Animation` 对象声明和新的 `RotateAnimation()`
    构造方法


    接下来，收起您的事件监听器代码块，以便能看到所有的实例化代码，如图 15-18 底部所示，并使用以下 Java 代码添加 `RotateAnimation`
    对象的实例化：


    ```

    rotateZeroToFullAnimation = new RotateAnimation(0, 360, Animation.RELATIVE_TO_SELF,
    0.5f, Animation.RELATIVE_TO_SELF, 0.5f);

    ```


    接下来需要做的是，在 `rotateZeroToFullAnimation` 对象初始化后，调用它的 `.setDuration()` 方法，并使用以下代码向其传递
    `5000` 毫秒（5 秒）的值：


    ```

    rotateZeroToFullAnimation.setDuration(5000);

    ```


    最后，您需要使用 `.addAnimation()` 方法，通过下面这行 Java 代码，将此 `rotateZeroToFullAnimation` `Animation`
    对象添加到 `pagAnimationSet` `AnimationSet` 对象中，如图 15-19 所示：


    ```

    pagAnimationSet.addAnimation(rotateZeroToFullAnimation);

    ```


    ![A978-1-4302-5786-8_15_Fig19_HTML.jpg](img/A978-1-4302-5786-8_15_Fig19_HTML.jpg)


    **图 15-19.** 配置 `RotationAnimation` 的持续时间、角度和旋转中心，并使用 `.addAnimation()` 将其添加到
    `AnimationSet`


    由于所有偏移时间和运动插值参数都是在父级 `AnimationSet` 对象级别设置的，因此您无需担心任何这些全局参数，这是创建高级 `AnimationSet`
    程序化动画管道的优势之一，正如您在此处看到的。


    现在是时候测试您的 `AnimationSet` 对象程序化动画，看看它是否正常工作，以及您是否已经复现了在第 3 章 和第 4 章 中完成的所有操作——但现在仅使用
    Java 代码。


    使用 `Run As ➤ Android Application` 工作流程来运行 Nexus One AVD 模拟器，点击您的 PAG 标志，观察它从远处旋转、淡出、旋转和缩放，如图
    15-20 所示。


    您已经实现了与本书前几章中使用标记相同的 XML 标签和参数，这些章节向您展示了实现帧动画和程序化动画（结合使用）的更简单方法，即仅使用 Java 代码结构来创建您的
    `View` `Animation` 对象管道。


    现在，您已经对 Android 中的许多 `Drawable` 对象类型有了相当不错的了解，因此在下一章中，我想回到绘图板（即 Drawable 板，无意冒犯），更仔细地看看基础的
    `Drawable` 类，这样您的大脑里会亮起更多灯泡，因为这本书的真正目的就在于此，不是吗？


    我当然希望如此！出色地完成了帧动画和程序化动画的实现！


    ![A978-1-4302-5786-8_15_Fig20_HTML.jpg](img/A978-1-4302-5786-8_15_Fig20_HTML.jpg)


    **图 15-20.** 在 Nexus One 模拟器中测试您的 `pagAnimationSet`


    接下来，我将给您一些自己尝试的内容，这些内容我们之前已经做过，所以只是为了积累经验而重复，让您熟悉本书中学到的所有类和方法。


    ## 使用 Android Runnable 类运行 AnimationSet


    在上一章中，您利用 Java `Runnable` 公共接口及其 `run()` 方法在单独的线程中运行 `AnimationDrawable`。您编写了该方法，以便您的应用可以异步处理帧动画
    `Drawable` 对象（在该例中是 `BitmapDrawable` 帧）。


    为了练习，现在我希望您做的是注释掉您的事件处理方法，并重新实现您的 `animStarter` 类，使其实现 `Runnable` 公共 Java 接口和
    `run()` 方法，并将 `onClick()` 事件处理程序中的代码安装进去，以便在应用启动时自动启动帧动画和程序化动画。别忘了把 `.setImageDrawable()`
    方法调用放回到第 14 章 中的位置！


    ## 为您的 AnimationSet 创建一个 TranslateAnimation 对象


    另一件我希望您尝试的事情是，为当前的 `AnimationSet` 对象添加一个移动组件，该组件使您动画从屏幕更高的位置开始，并在缩放和淡出发生时沿着 Y
    轴向下移动，以使动画看起来像是从天而降。


    为此，您需要在类顶部声明一个名为 `translateSkyToZero` 的 `Animation` 对象，就像您处理其他变换对象一样，然后使用 `new`
    关键字初始化该对象，并使用构造方法配置参数列表，就像您对其他三个 `Animation` 子类对象所做的那样，并且在代码中的相同位置进行。


    确保使用 `.addAnimation()` 方法调用，并将 `translateSkyToZero` 值作为参数传递给该方法，从而将新的 `TranslateAnimation`
    对象添加到您的 `AnimationSet` 对象中，这会将其添加到 `AnimationSet`（组）对象的复杂动画定义中。


    最后，一旦您的 `TranslateAnimation` 对象被添加（连接）到 `AnimationSet` 对象之后，尝试调用该 `AnimationSet`
    对象的一些其他参数方法！一些我们没有特别声明（使用）的参数方法（因为我们依赖它们的默认值）包括您在第 4 章 中学习和实现过的 `.setRepeatMode()`
    或 `.setRepeatCount()` 方法。

