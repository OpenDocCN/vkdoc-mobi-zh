  trans: '

    # 导出新的 144 像素 XXHDPI 启动器图标资源后


    导出新的 144 像素 XXHDPI 启动器图标资源后，您可以返回 288 像素的源文件，对另外四个启动器图标资源进行进一步的重采样。最简便的方法是使用`编辑`菜单中的`撤销缩放图像`选项，如图
    5-5 所示。


    ![A978-1-4302-5786-8_5_Fig5_HTML.jpg](img/A978-1-4302-5786-8_5_Fig5_HTML.jpg)


    **图 5-5.** 使用`编辑 ➤ 撤销缩放图像`菜单序列将徽标图标图像数据恢复至 288 像素


    如果您想知道为什么不直接对 144 像素的图像数据进行连续缩放，那么原因是：您需要返回原始源文件进行后续重采样，这是因为我们希望为重采样算法提供尽可能多的数据，使其每次重采样都能获得最佳的视觉效果。


    这也是我之前讨论使用 576 像素、1152 像素或 2304 像素源素材图像的原因——输入图像重采样算法的分辨率越高，算法输出可接受结果的可能性就越大，前提是使用双三次插值算法数学（在
    GIMP 中称为 `cubic`）进行下采样。


    一般来说，应尽量避免上采样（如果可以的话）。本章前面讨论 HDPI 或 XHDPI 屏幕模拟（上采样）MDPI“正常”用户体验（及用户界面设计）时已提到这一点。上采样会迫使算法创建图像中原本不存在的图像数据（像素），而这些像素应该是什么、应该位于何处的猜测工作，会在最终数字图像中转化为伪影、模糊，或两者兼有。


    接下来，让我们将新下采样的应用程序启动器图标资源复制到相应的文件夹中，并编写在 Android `GraphicsDesign` 应用中实现这些图标所需的
    XML 标记。


    ## 在新应用图标安装至正确的密度文件夹


    打开操作系统的文件管理工具（对于 Windows 8，即`Windows 资源管理器`工具），找到您为图标资源创建的 `/Icons` 资源文件夹，以及保存启动图标的文件夹（对我而言，该文件夹名为
    `/PAGD/CH05/Icons`，如图 5-6 所示）。


    在开发包含大量新媒体元素和资源的复杂 Android 应用时，创建并维护一个逻辑清晰的资源文件夹层级结构非常重要。除了 Android 应用的 `/workspace/project`
    文件夹外，您还应该有一个独立的 `/project` 文件夹，其中包含图像、视频、音频、动画、3D、图标等子文件夹。这些新媒体类型的子文件夹还可以拥有自己的子子文件夹，例如
    `/project/audio/music` 或 `/project/audio/voiceovers`；对于数字图像，您可以有 `/project/images/mpdi`、`/project/images/hdpi`
    和 `/project/images/xhdpi`；对于数字视频，例如 `/project/video/mpeg4` 和 `/project/video/webm`。


    现在，让我们将启动器图标图像资源从新媒体图标资源文件夹复制到相应的 Eclipse ADT 工作区项目文件夹中，即 `/workspace/GraphicsDesign/res/drawable-ldpi`。


    选择 LDPI 36 像素分辨率密度资源，右键单击，选择`复制`选项，将文件位置引用放入操作系统的剪贴板，如图 5-6 所示。


    ![A978-1-4302-5786-8_5_Fig6_HTML.jpg](img/A978-1-4302-5786-8_5_Fig6_HTML.jpg)


    **图 5-6.** 从 `/icon` 文件夹中选择应用启动图标密度级别资源，复制到 `/drawable` 文件夹


    接下来，找到您的 `/workspace/GraphicsDesign/res/drawable-ldpi` 文件夹，右键单击，选择`粘贴`选项，将该文件复制并粘贴到文件夹中，如图
    5-7 所示。对所有五个启动器图标重复此工作流程，确保每个图标名称中的像素数与该分辨率的密度级别相匹配。如果您忘记了哪种密度对应哪种图标分辨率，请参考表 5-1（第六列）。


    ![A978-1-4302-5786-8_5_Fig7_HTML.jpg](img/A978-1-4302-5786-8_5_Fig7_HTML.jpg)


    **图 5-7.** 将启动图标密度资源粘贴到资源文件夹中对应的 `drawable-dpi` 文件夹中


    请注意，该 LDPI 文件夹中目前没有默认的 Android 应用程序启动图标，因此重要的是：即使是 Android ADT 的新建 Android 应用程序系列对话框，也没有提供低分辨率版本的启动器图标，这意味着它必须为此缩放一个较高分辨率的图标，很可能是
    72 像素的 HDPI 版本，因为这样正好可以 2 倍下采样，得到 36 像素。


    我由此推断（或假设），如果您提供了 240 DPI 的资源集合（HDPI），那么不为您的应用程序提供 LDPI 资源可能也是可以的，尤其是当前 Android
    设备的趋势是朝着 HDPI 平板手机（手机+平板）、XHDPI 平板电脑和 HDPI 智能电视发展。


    话虽如此，如果您正在为 Android 手表和翻盖手机开发应用，那么可能还是需要提供 LDPI 优化资源，至少等到 Android 在其操作系统中添加立方（双三次）插值算法为止。从图
    5-8 可以看出，Android 确实提供了一个 MDPI 图标资源，我们已将自定义启动器图标粘贴在其旁边，并准备将其重命名为更简单的名称。


    ![A978-1-4302-5786-8_5_Fig8_HTML.jpg](img/A978-1-4302-5786-8_5_Fig8_HTML.jpg)


    **图 5-8.** Android 创建的 `ic_launcher.png` 图标和开发者创建的 `launch_icon_pag_48` 位于 `/drawable-mdpi`
    中


    确保将所有文件复制到正确的分辨率密度文件夹后，将它们重命名为通用名称（不包含像素数字），以便每个文件夹中的文件名称相同，如图 5-9 所示。


    ![A978-1-4302-5786-8_5_Fig9_HTML.jpg](img/A978-1-4302-5786-8_5_Fig9_HTML.jpg)


    **图 5-9.** 将 `launch_icon_pag_48.png` 文件重命名为通用的（且更简单的）文件名 `pag_icon.png`


    如图 5-9 所示，我选择了简单的名称 `pag_icon.png`，并严格遵守 Android 资源命名规范，仅使用小写字母、数字和下划线字符。


    将所有五个文件重命名为 `pag_icon.png` 后，您就可以编辑 `AndroidManifest.xml` 文件中的 XML 参数，为您的 `GraphicsDesign`
    应用实现新的自定义 Pro Android 图形启动器图标了。

    '
- fmt: '# Configuring the AndroidManifest.xml for Custom App Icon


    Now that all of your assets are in place where they need to go, fire up Eclipse
    and right-click the `AndroidManifest.xml` file, which you will find located at
    the very bottom of your GraphicsDesign project folder on the left side of Eclipse
    in the Package Explorer navigation pane.


    It is interesting to note the `AndroidManifest.xml` is the one exception in Eclipse
    as to how the top editing tab is labeled. Notice that the Android Manifest XML
    tab reads `GraphicsDesign` (Project Folder Name) Manifest.


    The XML markup should look like what you see in Figure [5-10](#A978-1-4302-5786-8_5_Chapter.html#Fig10),
    and I have highlighted the `android:icon` parameter in the `<application>` tag,
    where you will reference your own custom launcher icon filename, which you’ll
    do next.


    ![A978-1-4302-5786-8_5_Fig10_HTML.jpg](A978-1-4302-5786-8_5_Fig10_HTML.jpg)


    Figure 5-10. Right-clicking the `AndroidManifest.xml` file in the Package Explorer
    to open it for editing in Eclipse


    You’ll leave the other default `AndroidManifest` entries as they are, but you
    will change the `ic_launcher` reference to `pag_icon` so that you know how to
    add your own custom launcher icon reference if you want to. Take a look at the
    other tags in your application’s Manifest that Eclipse set up for you.


    It is important to note that you could have also left the `ic_launcher` file reference
    as-is and named your launcher icon assets `ic_launcher.png` in each of the resolution
    density folders as well, as an alternative work process.


    While you’re here, add that `<supports-screens>` tag which you learned about earlier,
    and fix an additional tag that could make your Android application more professional.
    Take a look one parameter down (underneath) the `android:icon` parameter, and
    you will see the `android:label` parameter.


    This parameter controls the text value that is written at the top of your application’s
    splash screen, as well as the text label that is utilized under your application
    launch icon. The application launch icon is always located at the “front” (i.e.
    the launch icons area) of the user’s Android device; both the icon graphic and
    label underneath it need to be perfect. The changes to the initial `AndroidManifest.xml`,
    which was generated for you via the New Android Application dialog series, are
    shown in Figure [5-11](#A978-1-4302-5786-8_5_Chapter.html#Fig11).


    ![A978-1-4302-5786-8_5_Fig11_HTML.jpg](A978-1-4302-5786-8_5_Fig11_HTML.jpg)


    Figure 5-11. Adding a custom `android:icon` parameter and a `<supports-screens>`
    tag to your `AndroidManifest`


    As you can see, the `android:label` parameter references a string constant in
    the `strings.xml` file that is named `app_name`. You need to edit the value of
    this string constant to add a space between the words Graphics and Design. Click
    the `strings.xml` tab, at the top of the central editing pane in Eclipse, and
    add a space into the `app_name` `<string>` tag, so that it reads `Graphics Design`
    instead of `GraphicsDesign`, as shown in Figure [5-12](#A978-1-4302-5786-8_5_Chapter.html#Fig12).


    This will allow the Android OS to “wrap” the icon label more attractively on the
    end user’s icon launch collection in the front end of their Android device. When
    we test the app next, you will see that it looks 100% better than it did before.
    In fact, the way the Android OS was wrapping the icon label has been bothering
    me for a couple of chapters now. So we’re solving that problem here and now. Refinement
    of an Android app is done in stages.


    ![A978-1-4302-5786-8_5_Fig12_HTML.jpg](A978-1-4302-5786-8_5_Fig12_HTML.jpg)


    Figure 5-12. Changing the `app_name` `<string>` tag constant to `Graphics Design`
    (two words) to fix icon wrap


    Making this slight text modification will allow your application icon label to
    wrap more naturally underneath your new Pro Graphics Design icon, and it will
    also make your screen title at the top of your app far more readable as well,
    as you will soon see when you use a Run As ➤ Android Application work process
    in the next section.


    ## Testing the New Application Icon and Label on Nexus One


    Now it’s time to take a look at how good your density-matched launcher icon looks,
    as well as the improved label appearance now that you have added a space in between
    the words Graphics and Design! Right-click the project folder, use the Run As
    ➤ Android Application menu sequence, launch the Nexus One emulator in Eclipse,
    and look at your app now.


    At the top of the splash screen, shown on the right-hand side of the screen shot
    shown in Figure [5-13](#A978-1-4302-5786-8_5_Chapter.html#Fig13), you can see
    both the new launcher icon asset as well as the new Graphics Design Activity label
    for your application.


    To see the icon in the Android OS application icon area, hit the Go Back circular
    button on the top-right of the emulator. This button is the third button from
    the left in the second row of circular buttons in the upper-right corner of the
    emulator, and has an arrow on a curved line swooping back, indicating the Return
    or Go Back function.


    Once you click this button, you will be returned to the Android OS Home Screen,
    where you can click the icons button at the bottom-middle of the screen to open
    the app icon launch area of the OS, where you will see your new application icon.


    Figure [5-13](#A978-1-4302-5786-8_5_Chapter.html#Fig13) shows the launch icons
    area of the emulator on the left side, and the application’s splash screen animation
    and your new title bar label treatment on the right side of the screen shot.


    ![A978-1-4302-5786-8_5_Fig13_HTML.jpg](A978-1-4302-5786-8_5_Fig13_HTML.jpg)


    Figure 5-13. Testing the new Pro Android Graphics launch icon and label in the
    Nexus One emulator in Eclipse


    As you can see, subtle changes in code, scaling, and spacing can make all the
    visual difference regarding the professional appearance of your app! This is why
    I put this chapter in the book after the new media chapters, as I needed to give
    you some graphics foundation for the different types of imaging, video, and animation
    assets and their creation and optimization.'
