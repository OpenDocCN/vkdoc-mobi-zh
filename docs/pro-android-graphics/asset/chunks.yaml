- fmt: '# Testing Streaming Video in Portrait and Landscape Orientations


    Right-click your project folder, then use `Run As ➤ Android Application` so that
    you can see if your code works in the Nexus One emulator. Once the portrait version
    of the digital video streams successfully into your app, you can switch the emulator
    into a Landscape mode and see if the code gets the correct (landscape) version
    of your WSVGA digital video asset.


    To switch the emulator into Landscape mode, use the `CTRL-F11` keystroke combination;
    as you can see in Figure [19-26](#A978-1-4302-5786-8_19_Chapter.html#Fig26), your
    application will fetch the correct video data from the media server.


    ![A978-1-4302-5786-8_19_Fig26_HTML.jpg](A978-1-4302-5786-8_19_Fig26_HTML.jpg)


    Figure 19-26. Using a `CTRL-F11` keystroke combination to rotate Nexus One emulator
    90 degrees into landscape


    I was actually getting the “Can’t play this video” error shown in Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13);
    if you notice in my code in Figure [19-25](#A978-1-4302-5786-8_19_Chapter.html#Fig25),
    I had copied the URL references and changed portrait to landscape, but had not
    changed the resolution from 480x800 to 800x480! There is a saying that “the Devil
    is in the details” and this could not be more applicable than to app programming!
    Once I figured out this problem, which was preventing my landscape versions from
    playing, I had the application working perfectly in both orientations.


    Before I figured out this simple (dumb) mistake, I changed the file name extension
    to `.mp4` from `.webm` to see if that was the problem, as you can see in Figure
    [19-27](#A978-1-4302-5786-8_19_Chapter.html#Fig27). It is always a good idea to
    test both supported formats anyway, so I included this screen shot just so there
    was at least one screen shot in this chapter that had Java code in it that actually
    100% works!


    ![A978-1-4302-5786-8_19_Fig27_HTML.jpg](A978-1-4302-5786-8_19_Fig27_HTML.jpg)


    Figure 19-27. Final code showing MPEG4 asset names and the corrected landscape
    resolution in asset names


    As you can see in Figure [19-28](#A978-1-4302-5786-8_19_Chapter.html#Fig28), all
    the hard work was worth the effort, as the Terragen virtual world fly-through
    is very impressive in landscape mode!


    ![A978-1-4302-5786-8_19_Fig28_HTML.jpg](A978-1-4302-5786-8_19_Fig28_HTML.jpg)


    Figure 19-28. The Terragen 3 planet fly-through playing in Nexus One in Landscape
    mode


    The reason you can rotate an Android device (or the emulator, in this case) and
    go back and forth from playing the portrait and the landscape versions of the
    digital video asset is because Android will restart your `Activity` subclass every
    time the user device orientation changes. So the `onCreate()` method where you
    have your code will be re-evaluated and the results you are looking for (playing
    a correct video asset for the mode the user is using) are achieved.


    ## Some Caveats About Using Digital Video in Android


    There are a plethora of complicated issues regarding playing the range of video
    assets in your Android applications if you want your digital video media assets
    to sync up with a given Android hardware configuration. This is because the number
    of physical pixels in a given display will vary widely, as will the refresh rate
    and the default orientation of the device and the orientation that the user has
    chosen to hold the device in.


    If you are optimizing your digital video to get a small file size, refresh rate
    will be the least of your concerns. Android is currently pursuing the video game
    console market using API Level 19, and has added 60 FPS refresh rates to its screen
    buffer update and its touchscreen data update speeds. So if you are using a 10,
    15, 20, or even a 24 FPS frame rate in your optimized digital video assets, the
    hardware screen refresh rates will not be an issue for your video application
    development.


    If you are not rendering 3D video assets, like you are here using different camera
    lens shapes (portrait and landscape), then orientation will not be as much of
    an issue either, although there is no “default” device rotation anymore because
    some tablets default to landscape operation mode default, while smartphones usually
    use a portrait operation mode default. Thus, this will remain an issue and challenge
    for developers, which is why I covered this subject in this chapter as well as
    in the previous chapters on video.


    The most difficult (and costly, in data footprint) thing to do is provide a resolution-specific
    video asset for each physical display resolution out there. What I have suggested
    in the previous chapter is to ascertain a data “sweet spot” and select one asset
    that has both the compression ratio and the resolution (quality) to be able to
    scale up or down with great results. This will most likely be the 1024 or 1280
    pixel resolution, as you have seen in the previous chapter; if you are targeting
    iTV, a 1920 pixel video asset will be used, but down-sampling it to low resolutions
    may be costly.


    In case you are heck-bent (how politically correct of me) on providing a wide
    range of digital video assets within your application (or via a media server)
    and then polling the user device hardware to find out the physical pixel characteristics,
    I am going to cover the `DisplayMetrics` class before we finish up with this chapter
    so that you have the tools to do this via a `switch` loop or `if-then` loop structure,
    just like you did in this chapter.'
  raw: '## Testing Streaming Video in Portrait and Landscape Orientations


    Right-click your project folder, then use Run As ➤ Android Application so that
    you can see if your code works in the Nexus One emulator. Once the portrait version
    of the digital video streams successfully into your app, you can switch the emulator
    into a Landscape mode and see if the code gets the correct (landscape) version
    of your WSVGA digital video asset.


    To switch the emulator into Landscape mode, use the CTRL-F11 keystroke combination;
    as you can see in Figure [19-26](#A978-1-4302-5786-8_19_Chapter.html#Fig26), your
    application will fetch the correct video data from the media server.


    ![A978-1-4302-5786-8_19_Fig26_HTML.jpg](A978-1-4302-5786-8_19_Fig26_HTML.jpg)


    Figure 19-26.


    Using a CRTL-F11 keystroke combination to rotate Nexus One emulator 90 degrees
    into landscape


    I was actually getting the “Can’t play this video ” error shown in Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13);
    if you notice in my code in Figure [19-25](#A978-1-4302-5786-8_19_Chapter.html#Fig25),
    I had copied the URL references and changed portrait to landscape, but had not
    changed the resolution from 480x800 to 800x480! There is a saying that “the Devil
    is in the details” and this could not be more applicable than to app programming!
    Once I figured out this problem, which was preventing my landscape versions from
    playing, I had the application working perfectly in both orientations.


    Before I figured out this simple (dumb) mistake, I changed the file name extension
    to .mp4 from .webm to see if that was the problem, as you can see in Figure [19-27](#A978-1-4302-5786-8_19_Chapter.html#Fig27).
    It is always a good idea to test both supported formats anyway, so I included
    this screen shot just so there was at least one screen shot in this chapter that
    had Java code in it that actually 100% works!


    ![A978-1-4302-5786-8_19_Fig27_HTML.jpg](A978-1-4302-5786-8_19_Fig27_HTML.jpg)


    Figure 19-27.


    Final code showing MPEG4 asset names and the corrected landscape resolution in
    asset names


    As you can see in Figure [19-28](#A978-1-4302-5786-8_19_Chapter.html#Fig28), all
    the hard work was worth the effort, as the Terragen virtual world fly-through
    is very impressive in landscape mode!


    ![A978-1-4302-5786-8_19_Fig28_HTML.jpg](A978-1-4302-5786-8_19_Fig28_HTML.jpg)


    Figure 19-28.


    The Terragen 3 planet fly-through playing in Nexus One in Landscape mode


    The reason you can rotate an Android device (or the emulator, in this case) and
    go back and forth from playing the portrait and the landscape versions of the
    digital video asset is because Android will restart your Activity subclass every
    time the user device orientation changes. So the onCreate() method where you have
    your code will be re-evaluated and the results you are looking for (playing a
    correct video asset for the mode the user is using) are achieved.


    ## Some Caveats About Using Digital Video in Android


    There are a plethora of complicated issues regarding playing the range of video
    assets in your Android applications if you want your digital video media assets
    to sync up with a given Android hardware configuration. This is because the number
    of physical pixels in a given display will vary widely, as will the refresh rate
    and the default orientation of the device and the orientation that the user has
    chosen to hold the device in.


    If you are optimizing your digital video to get a small file size, refresh rate
    will be the least of your concerns. Android is currently pursuing the video game
    console market using API Level 19, and has added 60 FPS refresh rates to its screen
    buffer update and its touchscreen data update speeds. So if you are using a 10,
    15, 20, or even a 24 FPS frame rate in your optimized digital video assets, the
    hardware screen refresh rates will not be an issue for your video application
    development.


    If you are not rendering 3D video assets, like you are here using different camera
    lens shapes (portrait and landscape), then orientation will not be as much of
    an issue either, although there is no “default” device rotation anymore because
    some tablets default to landscape operation mode default, while smartphones usually
    use a portrait operation mode default. Thus, this will remain an issue and challenge
    for developers, which is why I covered this subject in this chapter as well as
    in the previous chapters on video.


    The most difficult (and costly, in data footprint) thing to do is provide a resolution-specific
    video asset for each physical display resolution out there. What I have suggested
    in the previous chapter is to ascertain a data “sweet spot” and select one asset
    that has both the compression ratio and the resolution (quality) to be able to
    scale up or down with great results. This will most likely be the 1024 or 1280
    pixel resolution, as you have seen in the previous chapter; if you are targeting
    iTV, a 1920 pixel video asset will be used, but down-sampling it to low resolutions
    may be costly.


    In case you are heck-bent (how politically correct of me) on providing a wide
    range of digital video assets within your application (or via a media server)
    and then polling the user device hardware to find out the physical pixel characteristics,
    I am going to cover the DisplayMetrics class before we finish up with this chapter
    so that you have the tools to do this via a switch loop or if-then loop structure,
    just like you did in this chapter.'
  trans: '

    # 测试竖屏和横屏模式下的流媒体视频


    右键单击你的项目文件夹，然后使用 `Run As ➤ Android Application`，这样你就可以在 Nexus One 模拟器中查看代码是否正常工作。一旦竖屏版的数字视频成功流式传输到你的应用中，你就可以将模拟器切换到横屏模式，并查看代码是否获取了正确的
    WSVGA 数字视频资产（横屏版）。


    要将模拟器切换到横屏模式，请使用 `CTRL-F11` 组合键；如图 19-26 所示，你的应用将从媒体服务器获取正确的视频数据。


    ![A978-1-4302-5786-8_19_Fig26_HTML.jpg](img/A978-1-4302-5786-8_19_Fig26_HTML.jpg)


    图 19-26. 使用 `CTRL-F11` 组合键将 Nexus One 模拟器旋转 90 度进入横屏模式


    实际上，我遇到了如图 19-13 所示的“无法播放此视频”错误；如果你留意我在图 19-25 中的代码，你会发现我复制了 URL 引用并将竖屏改为横屏，但没有将分辨率从
    480x800 改为 800x480！有句谚语说“**细节决定成败**”，这用在应用程序编程上再贴切不过了！一旦我找到了这个阻止横屏视频播放的问题，我的应用就能在两种方向上都完美运行了。


    在我发现这个简单（愚蠢）的错误之前，我曾将文件扩展名从 `.webm` 改为 `.mp4` 以测试是否是文件格式的问题，如图 19-27 所示。无论如何，测试两种支持的格式总是一个好主意，所以我截取了这张图，只是为了确保本章中至少有一张截图包含完全
    100% 可工作的 Java 代码！


    ![A978-1-4302-5786-8_19_Fig27_HTML.jpg](img/A978-1-4302-5786-8_19_Fig27_HTML.jpg)


    图 19-27. 最终代码，展示了 MPEG4 资源名称以及在资源名称中修正后的横屏分辨率


    如图 19-28 所示，所有辛苦的努力都是值得的，因为 Terragen 虚拟世界的飞越效果在横屏模式下非常令人印象深刻！


    ![A978-1-4302-5786-8_19_Fig28_HTML.jpg](img/A978-1-4302-5786-8_19_Fig28_HTML.jpg)


    图 19-28. 在 Nexus One 横屏模式下播放 Terragen 3 星球飞越效果


    你可以旋转 Android 设备（或此处的模拟器），并能在播放竖屏和横屏版的数字视频资产之间来回切换，原因是每当用户设备方向改变时，Android 会重新启动你的
    `Activity` 子类。因此，包含你代码的 `onCreate()` 方法会被重新评估，并且你期望的结果（为用户正在使用的模式播放正确的视频资产）就会实现。


    ## 关于在 Android 中使用数字视频的一些注意事项


    如果你想在 Android 应用中播放各种视频资产，并使数字视频媒体资产与给定的 Android 硬件配置同步，会存在大量复杂的问题。这是因为给定显示屏的物理像素数量可能会有很大差异，刷新率、设备的默认方向以及用户选择握持设备的方向也同样如此。


    如果你正在优化数字视频以获得较小的文件大小，刷新率将是最不关心的问题。Android 目前正在通过 API Level 19 进军视频游戏机市场，并将其屏幕缓冲区更新和触摸屏数据更新速度提高到
    60 FPS 的刷新率。因此，如果你在优化的数字视频资产中使用 10、15、20 甚至 24 FPS 的帧率，硬件屏幕刷新率将不会对你的视频应用开发构成问题。


    如果你不像这里那样使用不同的镜头形状（竖屏和横屏）来渲染 3D 视频资产，那么方向也不会是一个大问题，尽管现在已经没有“默认”的设备旋转了，因为一些平板电脑默认使用横屏操作模式，而智能手机通常默认使用竖屏操作模式。因此，这仍将是开发者面临的一个问题和挑战，这就是我在本章以及之前的视频章节中阐述这个主题的原因。


    最困难（且在数据占用方面成本最高）的事情是为市面上每一种物理显示分辨率提供特定分辨率的视频资产。我在前一章中建议的是，找到一个数据“最佳点”，并选择一个兼具良好压缩率和分辨率（质量）的资产，以便能够以出色的效果进行放大或缩小。这很可能是
    1024 或 1280 像素分辨率，正如你在前一章中看到的；如果你的目标是 iTV，则会使用 1920 像素的视频资产，但将其降采样到低分辨率可能会代价高昂。


    如果你执意（我这么说真是太政治正确了）要在你的应用（或通过媒体服务器）中提供广泛的数字视频资产，然后轮询用户设备硬件以获取物理像素特性，我打算在结束本章之前介绍
    `DisplayMetrics` 类，这样你就有了通过 `switch` 循环或 `if-then` 循环结构来实现此目的的工具，就像你在本章中所做的那样。

    '
- fmt: "# Android’s DisplayMetrics Class: A Display’s Specifications\n\nThe Android\
    \ OS has a class that allows developers to get all of the display-related information\
    \ from their user’s Android device. This class is called the `DisplayMetrics`\
    \ utility class, and it is yet another direct subclass of the `java.lang.Object`\
    \ master class.\n\nThe Android `DisplayMetrics` class hierarchy is thus structured\
    \ as follows:\n\n```\njava.lang.Object\n  > android.util.DisplayMetrics\n```\n\
    \nThe `DisplayMetrics` class belongs in the `android.util` package because it\
    \ is an Android operating system utility for determining hardware environments.\
    \ The import statement for using the `DisplayMetrics` class in your app should\
    \ reference the `android.util.DisplayMetrics` package path.\n\nThe Android `DisplayMetrics`\
    \ class is a public class, and it contains eight screen density constants: `DENSITY_DEFAULT`,\
    \ `DENSITY_LOW`, `DENSITY_MEDIUM`, `DENSITY_TV`, `DENSITY_HIGH`, `DENSITY_XHIGH`,\
    \ `DENSITY_XXHIGH`, and recently, `DENSITY_XXXHIGH`.\n\nThis `DENSITY_XXXHIGH`\
    \ constant was recently added in Android 4.3 (API Level 18) in order to accommodate\
    \ all the new “4K” UHD iTV products that are coming out and that feature “Ultra-High”\
    \ 4096x2160 physical resolutions.\n\nThis `DisplayMetrics` object will provide\
    \ developers with a data structure that contains fields that describe general\
    \ information about the display hardware and how the Android OS is scaling its\
    \ fonts to fit the hardware. This information includes the physical display size\
    \ in pixels, the pixel density, and the font scaling factor Android is currently\
    \ using for the display.\n\nTo access the `DisplayMetrics` object data, initialize\
    \ the object like this:\n\n```java\nDisplayMetrics displayMetricsObject = new\
    \ DisplayMetrics();\ngetWindowManager().getDefaultDisplay().getMetrics(displayMetricsObject);\n\
    ```\n\nThe data fields in the `DisplayMetrics` object that is returned by the\
    \ above Java code construct will contain seven key information values, including\
    \ a density floating point value for the logical screen density of the display\
    \ as well as a `densityDPI` integer value providing the dots per inch for the\
    \ display. There are also `heightPixels` and `widthPixels` integers, which give\
    \ you the physical resolution for the current (primary) display screen. There\
    \ are also `xdpi` and `ydpi` integers, which provide developers with the physical\
    \ pixels per inch values for each of the X and Y dimensions, and finally, the\
    \ `scaledDensity` floating point value that tells what font scaling is currently\
    \ being applied to fonts by the Android OS. All of these values will be needed\
    \ at some point or another by Android graphics designers inside their graphics\
    \ processing pipeline Java code.\n\n## Summary\n\nIn this nineteenth chapter,\
    \ you learned how to stream video using a media server. You learned how to implement\
    \ a `ProgressDialog` object to give your users an animated downloading progress\
    \ indicator, in case you did not want to stream your digital video but instead\
    \ download it first and then play it back more smoothly directly out of the system\
    \ memory.\n\nYou took a closer look at how to determine orientation using the\
    \ `Display`, `DisplayManager`, `WindowManager`, and `Surface` classes in Android.\
    \ You looked at what each of these classes do and how they all work together to\
    \ allow your code to ascertain the various display characteristics for an end\
    \ user’s current (primary) Android device screen.\n\nYou learned how to define\
    \ the `INTERNET` permission in your `AndroidManifest` XML file so that you could\
    \ stream video from a remote video media server. You then implemented video streaming\
    \ using an `HTTP://` URL in your URI, and then implemented downloaded video assets\
    \ using the `ProgressDialog` class. I showed you all the bloody red ink I generated\
    \ until I set up my `VideoView` object correctly, and how I ascertain which line(s)\
    \ of code might contain the error(s). You also saw how to set up the `VideoView`\
    \ object without the use of the `final` access modifier, and how stubborn programmers\
    \ can become.\n\nNext, you created WebM versions of your WSVGA digital video asset\
    \ so that you had a landscape version in that resolution. Then you looked at screen\
    \ orientation, and started learning about all of the Display-related classes,\
    \ and how they all work together to allow you to bridge the hardware being used\
    \ in your user’s device with your graphics design code pipelines.\n\nYou learned\
    \ about the Android `Display` class, the `DisplayManager` class, the `WindowManager`\
    \ class, and even the `DisplayMetrics` class, albeit at the very end of the chapter.\
    \ You then implemented these classes in your code to ascertain the rotation of\
    \ your user’s Android device so that you could set the correct URI value in your\
    \ `splashScreenUri` Uri object and stream the correct version of your digital\
    \ video asset to the user.\n\nI hope that you had a challenging and rewarding\
    \ experience while reading this book, as you implemented all of these cool graphics-related\
    \ features that are available to us developers inside the Android APIs!"
  raw: '## Android’s DisplayMetrics Class: A Display’s Specifications


    The Android OS has a class that allows developers to get all of the display-related
    information from their user’s Android device. This class is called the DisplayMetrics
    utility class, and it is yet another direct subclass of the java.lang.Object master
    class.


    The Android DisplayMetrics class hierarchy is thus structured as follows:


    `java.lang.Object`


      `> android.util.DisplayMetrics`


    The DisplayMetrics class belongs in the android.util package because it is an
    Android operating system utility for determining hardware environments. The import
    statement for using the DisplayMetrics class in your app should reference the
    android.util.DisplayMetrics package path.


    The Android DisplayMetrics class is a public class, and it contains eight screen
    density constants: DENSITY_DEFAULT, DENSITY_LOW, DENSITY_MEDIUM, DENSITY_TV, DENSITY_HIGH,
    DENSITY_XHIGH, DENSITY_XXHIGH, and recently, DENSITY_XXXHIGH.


    This DENSITY_XXXHIGH constant was recently added in Android 4.3 (API Level 18)
    in order to accommodate all the new “4K” UHD iTV products that are coming out
    and that feature “Ultra-High” 4096x2160 physical resolutions.


    This DisplayMetrics object will provide developers with a data structure that
    contains fields that describe general information about the display hardware and
    how the Android OS is scaling its fonts to fit the hardware. This information
    includes the physical display size in pixels, the pixel density, and the font
    scaling factor Android is currently using for the display.


    To access the DisplayMetrics object data, initialize the object like this:


    `DisplayMetrics displayMetricsObject = new DisplayMetrics();`


    `getWindowManager().getDefaultDisplay().getMetrics(displayMetricsObject);`


    The data fields in the DisplayMetrics object that is returned by the above Java
    code construct will contain seven key information values, including a density
    floating point value for the logical screen density of the display as well as
    a densityDPI integer value providing the dots per inch for the display. There
    are also heightPixels and widthPixels integers, which give you the physical resolution
    for the current (primary) display screen. There are also xdpi and ydpi integers,
    which provide developers with the physical pixels per inch values for each of
    the X and Y dimensions, and finally, the scaledDensity floating point value that
    tells what font scaling is currently being applied to fonts by the Android OS.
    All of these values will be needed at some point or another by Android graphics
    designers inside their graphics processing pipeline Java code.


    ## Summary


    In this nineteenth chapter, you learned how to stream video using a media server.
    You learned how to implement a ProgressDialog object to give your users an animated
    downloading progress indicator, in case you did not want to stream your digital
    video but instead download it first and then play it back more smoothly directly
    out of the system memory.


    You took a closer look at how to determine orientation using the Display, DisplayManager,
    WindowManager, and Surface classes in Android. You looked at what each of these
    classes do and how they all work together to allow your code to ascertain the
    various display characteristics for an end user’s current (primary) Android device
    screen.


    You learned how to define the INTERNET permission in your AndroidManifest XML
    file so that you could stream video from a remote video media server. You then
    implemented video streaming using an HTTP:// URL in your URI, and then implemented
    downloaded video assets using the ProgressDialog class. I showed you all the bloody
    red ink I generated until I set up my VideoView object correctly, and how I ascertain
    which line(s) of code might contain the error(s). You also saw how to set up the
    VideoView object without the use of the final access modifier, and how stubborn
    programmers can become.


    Next, you created WebM versions of your WSVGA digital video asset so that you
    had a landscape version in that resolution. Then you looked at screen orientation,
    and started learning about all of the Display-related classes, and how they all
    work together to allow you to bridge the hardware being used in your user’s device
    with your graphics design code pipelines.


    You learned about the Android Display class, the DisplayManager class, the WindowManager
    class, and even the DisplayMetrics class, albeit at the very end of the chapter.
    You then implemented these classes in your code to ascertain the rotation of your
    user’s Android device so that you could set the correct URI value in your splashScreenUri
    Uri object and stream the correct version of your digital video asset to the user.


    I hope that you had a challenging and rewarding experience while reading this
    book, as you implemented all of these cool graphics-related features that are
    available to us developers inside the Android APIs!'
  trans: "\n# Android 的 DisplayMetrics 类：显示屏的规格说明\n\nAndroid 操作系统提供了一个类，让开发者能够获取用户安卓设备上所有与显示相关的信息。这个类就是\
    \ `DisplayMetrics` 实用工具类，它是 `java.lang.Object` 主类的另一个直接子类。\n\nAndroid 的 `DisplayMetrics`\
    \ 类层次结构如下所示：\n\n```\njava.lang.Object\n  > android.util.DisplayMetrics\n```\n\n\
    `DisplayMetrics` 类属于 `android.util` 包，因为它是用于确定硬件环境的 Android 操作系统实用工具。在应用中要使用 `DisplayMetrics`\
    \ 类，其 import 语句应引用 `android.util.DisplayMetrics` 包路径。\n\nAndroid 的 `DisplayMetrics`\
    \ 类是一个公共类，它包含八个屏幕密度常量：`DENSITY_DEFAULT`、`DENSITY_LOW`、`DENSITY_MEDIUM`、`DENSITY_TV`、`DENSITY_HIGH`、`DENSITY_XHIGH`、`DENSITY_XXHIGH`，以及最近新增的\
    \ `DENSITY_XXXHIGH`。\n\n`DENSITY_XXXHIGH` 常量是最近在 Android 4.3（API 级别 18）中添加的，用以适配所有新推出的、具备“超高”4096x2160\
    \ 物理分辨率的“4K”超高清交互电视产品。\n\n这个 `DisplayMetrics` 对象将为开发者提供一个数据结构，其中包含一些字段，用于描述显示硬件的常规信息以及\
    \ Android 操作系统如何缩放字体以适应硬件。这些信息包括物理显示尺寸（以像素为单位）、像素密度，以及 Android 当前为该显示屏使用的字体缩放因子。\n\
    \n要访问 `DisplayMetrics` 对象数据，请像这样初始化该对象：\n\n```java\nDisplayMetrics displayMetricsObject\
    \ = new DisplayMetrics();\ngetWindowManager().getDefaultDisplay().getMetrics(displayMetricsObject);\n\
    ```\n\n上述 Java 代码构造返回的 `DisplayMetrics` 对象中的数据字段将包含七个关键信息值，包括表示显示屏逻辑屏幕密度的 density\
    \ 浮点值，以及提供显示屏每英寸点数的 `densityDPI` 整数值。此外还有 `heightPixels` 和 `widthPixels` 整数，它们提供当前（主）显示屏的物理分辨率。还有\
    \ `xdpi` 和 `ydpi` 整数，为开发者提供 X 和 Y 两个维度上每英寸的物理像素数。最后，`scaledDensity` 浮点值表示 Android\
    \ 操作系统当前对字体应用的缩放比例。在 Android 图形设计师的图形处理流水线 Java 代码中，所有这些值都会在某个时候用到。\n\n## 总结\n\
    \n在第十九章中，你学会了如何使用媒体服务器流式传输视频。你学会了如何实现 `ProgressDialog` 对象，为用户提供一个动画下载进度指示器，以防你不想流式传输数字视频，而是希望先下载它，然后更流畅地从系统内存中直接播放。\n\
    \n你更深入地了解了如何使用 Android 中的 `Display`、`DisplayManager`、`WindowManager` 和 `Surface`\
    \ 类来确定屏幕方向。你研究了这些类各自的功能，以及它们如何协同工作，让你的代码能够确定最终用户当前（主）Android 设备屏幕的各种显示特性。\n\n\
    你学会了如何在 `AndroidManifest` XML 文件中定义 `INTERNET` 权限，以便能够从远程视频媒体服务器流式传输视频。接着，你在 URI\
    \ 中使用 `HTTP://` URL 实现了视频流式传输，然后使用 `ProgressDialog` 类实现了下载的视频资源。我向你展示了我正确设置 `VideoView`\
    \ 对象之前产生的所有“红色错误墨水”，以及如何判断哪些代码行可能包含错误。你还看到了如何在不使用 `final` 访问修饰符的情况下设置 `VideoView`\
    \ 对象，以及固执的程序员会变得多么执着。\n\n接下来，你为 WSVGA 数字视频资产创建了 WebM 版本，以便拥有该分辨率的横向版本。然后你研究了屏幕方向，并开始学习所有与\
    \ Display 相关的类，以及它们如何协同工作，让你能够将用户设备中使用的硬件与你的图形设计代码流水线连接起来。\n\n你学习了 Android 的 `Display`\
    \ 类、`DisplayManager` 类、`WindowManager` 类，甚至 `DisplayMetrics` 类——尽管是在章节末尾。随后，你在代码中实现了这些类，以确定用户\
    \ Android 设备的旋转方向，从而能够在你的 `splashScreenUri` Uri 对象中设置正确的 URI 值，并向用户流式传输正确版本的数字视频资产。\n\
    \n我希望你在阅读本书的过程中，在实现所有这些酷炫的图形相关功能——这些功能可在 Android API 中供我们开发者使用——时，既充满挑战又收获颇丰！\n"
