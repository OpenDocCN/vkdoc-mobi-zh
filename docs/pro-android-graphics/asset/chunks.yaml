- fmt: '# 排版后的文档


    The first parameter in the parent (outer) tag is called the `xmlns:android` parameter,
    and this parameter sets a URL for the eXtended Markup Language Naming Schema (XMLNS).
    This is done so that other tags and parameters used in this file can be validated
    as being correct, that is, conforming to the XML schema for `RelativeLayout` containers.
    If the URL is not present, Eclipse will put a wavy red underline under each tag
    parameters it can’t validate.


    There is also an `xmlns:tools` URL reference, which serves much of the same purpose
    as the `xmlns:android` parameter does for parameters starting with `android:`,
    only `xmlns:tools` does this for parameters starting with a `tools:` precursor,
    such as the `tools:context` parameter, which you will see at the very end of the
    `<RelativeLayout>` container parent tag.


    There are also `android:layout_width` and `android:layout_height` parameters,
    which you set to `match_parent`. This makes sure the layout container scales to
    fit the display screen, which is the parent for this layout container.


    There are also default `android:padding` parameters, which, as you can see, reference
    a `dimen.xml` file in the `values` folder as well as a `tools:context` parameter,
    which declares this context to be your `MainActivity.java` code.


    ![A978-1-4302-5786-8_2_Fig8_HTML.jpg](A978-1-4302-5786-8_2_Fig8_HTML.jpg)


    Figure 2-8.


    Clicking the `activity_main.xml` tab at the bottom of the central editing pane
    to show the XML markup


    The `TextView` tag is a child tag, since it is contained (nested) within the `RelativeLayout`
    container. This tag also features the `android:layout_width` and `android:layout_height`
    parameters, set to `wrap_content`, which makes sure the UI element conforms around
    the content inside it.


    Note that `wrap_content` is essentially the exact opposite of a `match_parent`
    parameter, which does pretty much the opposite of this and expands to fill what
    is outside it rather than contracting around what is inside it.


    Finally, there is an `android:text` parameter, inside the `TextView` tag, which
    references the `strings.xml` file in your `values` folder, using the `@string/`
    path to the `hello_world` `<string>` tag name and `Hello World` value.


    ## Creating Your Video Start-Up Screen User Interface Design


    While you’re here in the `activity_main.xml` user interface layout container,
    let’s change the `RelativeLayout` parent tag to be a `FrameLayout` parent tag
    and the `TextView` UI element to be a `VideoView` UI element or widget (see Figure
    [2-9](#A978-1-4302-5786-8_2_Chapter.html#Fig9)).


    ![A978-1-4302-5786-8_2_Fig9_HTML.jpg](A978-1-4302-5786-8_2_Fig9_HTML.jpg)


    Figure 2-9.


    Changing the `RelativeLayout` container tag to a `FrameLayout` and `TextView`
    UI element to a `VideoView`


    The reason that you want to use a `FrameLayout` user interface design container
    for your `VideoView` is because a `VideoView` inside a `FrameLayout` maintains
    its aspect ratio when it is scaled by Android. Later on in the book I will show
    you how to scale video to fit different aspect ratio screens, as long as the content
    you are non-aspect-ratio scaling is not prone to noticeable distortion (like a
    talking head video would clearly be).


    Change the `RelativeLayout` opening and closing tags to `FrameLayout` and keep
    the `xmlns:android` and `android:layout` parameters, which as you now know are
    required. Then, change the `TextView` child tag to a `VideoView` and change its
    `android:id` to `@+id/splashScreenVideo`. Remove the `android:text` parameter
    and reference, as you will not be using it with your `VideoView` UI widget.


    Now you’re ready to take a look at how your Java code will implement your UI!


    ## Taking a Look at Your MainActivity.java Activity subclass


    Just to be thorough, since you are in the process of examining what the New Android
    Application series of dialogs created for you, let’s take a look at your Java
    code as well. To do this, right-click a `MainActivity.java` file located under
    the `/src/pro.android.graphics` folder in the Package Explorer and select the
    Open option, or left-click and use an F3 key if you prefer.


    This file is highlighted in the left side of the IDE in the Package Explorer pane
    in Figure [2-10](#A978-1-4302-5786-8_2_Chapter.html#Fig10), and is shown already
    open for editing in the Eclipse central code editing pane. Notice that your application
    package name has been declared for you, and the necessary Android classes have
    been imported as well, using `import` statements along with package names.


    ![A978-1-4302-5786-8_2_Fig10_HTML.jpg](A978-1-4302-5786-8_2_Fig10_HTML.jpg)


    Figure 2-10.


    Examining the Java Activity subclass code generated by the New Android Application
    dialogs


    Notice that `MainActivity` extends the Android `Activity` class, making it an
    `Activity` subclass, and that there is an `onCreate()` method written for you,
    which calls that `Activity` superclass’s `.onCreate()` method using this code:


    ```

    super.onCreate(savedInstanceState);

    ```


    This code creates an `Activity`, passing a `Bundle` object containing system settings
    for your `Activity`, which is logically named `savedInstanceState`.


    This `Bundle` object is used so that if this `Activity` needs to be terminated
    by the OS (to recover memory resources), it can later be restarted as needed,
    right where it left off, unbeknownst to the end user. The second line of code
    in the `onCreate()` method sets your application `ContentView` to your `activity_main.xml`
    definition. This is done using the `setContentView()` method call referencing
    an XML definition resource (`R` stands for resource) in the project `/res/layout`
    folder, with the file name `activity_main.xml`.'
