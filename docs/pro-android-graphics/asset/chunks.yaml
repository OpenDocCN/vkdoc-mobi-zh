    ( `Bitmap` 对象) 作为其唯一的传入参数。所有这些都可以通过一行精心构建的 Java 代码完成，如图 16-33 所示。


    ```

    backgroundImage.setBackground(new ImageRoundingDrawable(sourceImage));

    ```


