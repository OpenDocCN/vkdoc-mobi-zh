  trans: '

    # 在 RelativeLayout 中添加背景图像


    最后，您需要将一个名为 `cloudsky.jpg` 的背景图像安装到 UI 的 `RelativeLayout` 容器中。请在本节书的第 7 章资源文件夹中找到该文件，将其复制到您项目的
    `/res/drawable-xhdpi/` 文件夹中，然后利用 Eclipse ADT 中的 `Refresh` 功能，让开发环境在您引用该文件时能够“识别”它，而不会抛出错误。


    要引用这个新的 JPEG 图像，只需将 `android:background` 参数中的十六进制颜色值从 `#EECCAA` 改为资源引用值 `@drawable/cloudsky`
    即可！图 7-34 展示了新图像引用的 XML 标记，以及刷新后的 `/res/drawable-xhdpi` 文件夹中的图像资源内容。


    ![A978-1-4302-5786-8_7_Fig34_HTML.jpg](img/A978-1-4302-5786-8_7_Fig34_HTML.jpg)


    图 7-34. 将 `android:src` 参数设置为引用 `bookmarks0.png`，并设置 `android:background` 参数


    请注意，您的 Eclipse ADT 在 IDE 中对 JPEG 图像使用的图标与 PNG 图像不同。对于一个 1000 像素见方的图像，JPEG 格式大小为
    384 千字节。由于这只是一张普通的日落图像，我打算只使用一种 XHDPI 密度分辨率，然后让 Android 操作系统进行下采样。


    我在这里做的另一件巧妙的事情是，使用了一个 1:1 宽高比的方形图像，Android 可以将其非对称地缩放为竖屏或横屏模式。由于用户看不到存储在 Android
    `.APK` 文件资源区域中的 1000x1000 像素原始图像，因此可以在用户毫无察觉的情况下完成这种缩放，用户看到的并非原始（未失真）图像内容。我会在这本书中向您展示许多酷炫的技巧；我们还有几百页的内容可以探究！


    该图像在 x 和 y 方向上各有 1000 个像素，因此 Android 操作系统在进行缩放时有充足的像素可供使用，并且图像中不会出现锯齿边缘。这张照片的特点就是蓬松的云朵和日落的渐变色，这是完美的缩放场景，当您在
    Nexus One 模拟器中使用竖屏和横屏两种方向测试这个新的背景图像时，就会看到效果。


    不过，让我们回到正题。您在这里真正要测试的是阴影效果，以及 Alpha 通道中对灰度值（8 位，即 256 个灰度级别）的合成效能。这些灰度值允许底层像素颜色值以不同程度透过阴影效果显示出来，或者与之混合。如图
    7-35 所示，您用 GIMP 创建的阴影效果与背景日落图像完美地合成在了一起。


    相比而言，Android `TextView` 参数的算法阴影合成效果就不那么尽如人意了；不过，这可能也与当前的值设置有关！


    ![A978-1-4302-5786-8_7_Fig35_HTML.jpg](img/A978-1-4302-5786-8_7_Fig35_HTML.jpg)


    图 7-35. 在 Nexus One 模拟器中测试阴影的 Alpha 通道


    当前的 `TextView` 的 `shadowColor` 参数是针对白色背景优化的，使用了浅灰色的十六进制颜色值 `#999999`。


    您需要将这个值改为更深的灰色，以匹配您在 `ImageView` 上使用的阴影灰度值。您应该使用十六进制颜色值 `#333333`，这位于灰度谱的另一端。


    要计算出准确的灰度百分比值：从 0 到 16（十六进制），3 是 25%（请记住，从 0 开始计数时，3 实际上是第 4 个），所以这种灰色是 75%黑色和
    25%白色，因此它是一个 3/4 深度的灰色。


    而 `#999999` 是 16 中的 10，也就是 8 中的 5。8 中有 12.5 个 100，5 乘以 12.5 是 62.5%白色和 37.5%黑色，所以它是一个
    3/8 浅灰色的值。正如您在图 7-35 中所见，浅灰色不适合日落图像。此外，您需要将 Alpha 值添加到 RGB 值中，使其变成 ARGB 值。让我们通过添加一个
    `BB` Alpha 值使其达到 75%（12/16）的不透明度，从而得到新的 `android:shadowColor` 参数值的十六进制值 `#BB333333`，如图
    7-36 所示。


    ![A978-1-4302-5786-8_7_Fig36_HTML.jpg](img/A978-1-4302-5786-8_7_Fig36_HTML.jpg)


    图 7-36. 向 `TextView` 的 `android:shadowColor` 参数添加新的 Alpha 通道 ARGB 颜色值


    现在，您已经准备好测试 `TextView` 上支持 Alpha 通道的 `shadowColor` 参数，看看是否能更接近您在 `ImageView` 上达到的效果。使用
    `Run As` ➤ Android Application 工作流程，运行 Nexus One 模拟器，并在竖屏和横屏两种模式下测试用户界面设计。图 7-37
    展示了 Nexus One 模拟器中横屏模式下的 UI 设计；阴影的暗度和透明度都匹配了！


    ![A978-1-4302-5786-8_7_Fig37_HTML.jpg](img/A978-1-4302-5786-8_7_Fig37_HTML.jpg)


    图 7-37. 在 Nexus One 横屏模式下测试 `TextView` 的带 Alpha 通道的 `shadowColor` 及 `ImageView`

