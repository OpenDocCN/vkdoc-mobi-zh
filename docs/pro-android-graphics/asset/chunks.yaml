  trans: '

    我通过亲身经历发现，Eclipse 会抛出一个错误（而且不是漂亮的高亮显示错误），如果你试图使用辐射类型渐变，而没有事先安装这个 `android:gradientRadius`
    参数。


    稍后，如果你喜欢，可以（如果你是好奇型的）删除这个参数，并使用 CTRL-S 组合键 `保存` 你的 XML 标记，这样 Eclipse 就会评估它。这会在你
    IDE 底部的错误日志选项卡中为你提供这些错误消息。


    ![A978-1-4302-5786-8_16_Fig10_HTML.jpg](img/A978-1-4302-5786-8_16_Fig10_HTML.jpg)


    **图 16-10.** 使用图形布局编辑器预览你的椭圆形 ShapeDrawable 和扫描渐变设置


    那么，我们现在添加两个参数，你需要在你的 `ShapeDrawable` 对象内部实现一个径向渐变：一个是通过使用 `android:gradientRadius`
    参数设置的渐变半径，另一个是通过使用 `android:type="radial"` 参数设置的径向渐变，使用以下渐变 XML 标记：


    ```

    <gradient

    android:startColor="FF0000"

    android:centerColor="FFFF00"

    android:endColor="00FF00"

    android:centerX="0.5"

    android:centerY="0.5"

    android:gradientRadius="100"

    android:type="radial" />

    ```


    正如你在图 16-11 以及上面的标记中看到的，我为我的 `android:gradientRadius` 参数使用了整数值 `100`。稍后你可以自己尝试不同的设置，从零（根本不产生渐变），到
    5（在中心产生一个色点），再到 100 或更多。你尝试得越多，经验就越丰富！


    `android:gradientRadius` 参数设置为 `100` 将产生如图 16-12 所示的径向渐变三色分层，其中大约 35% 的径向渐变为红色，15%
    为黄色，50% 的径向渐变为绿色。数值越大，产生的红色越多。


    ![A978-1-4302-5786-8_16_Fig11_HTML.jpg](img/A978-1-4302-5786-8_16_Fig11_HTML.jpg)


    **图 16-11.** 添加 `android:gradientRadius` 参数以便实现 `android:type="radial"`


    点击 Eclipse 顶部的 `activity_contents.xml` 选项卡，然后点击底部的图形布局选项卡，即可看到结果，如图 16-12 所示。


    ![A978-1-4302-5786-8_16_Fig12_HTML.jpg](img/A978-1-4302-5786-8_16_Fig12_HTML.jpg)


    **图 16-12.** 使用图形布局编辑器预览你的椭圆形 ShapeDrawable 和径向渐变设置


    接下来，你将向你的 `ShapeDrawable` 添加另一个子标签属性，即 `stroke` 标签，以向这个 `ShapeDrawable` 的轮廓添加一些细节。


    为此，使用左尖括号 `<` 工作流程，如图 16-13 所示，以调出包含所有子标签选项的帮助对话框，选择底部的 stroke 标签选项，并（或）双击它以插入
    `<stroke>` 子标签。


    ![A978-1-4302-5786-8_16_Fig13_HTML.jpg](img/A978-1-4302-5786-8_16_Fig13_HTML.jpg)


    **图 16-13.** 使用左尖括号 `<` 工作流程调出帮助对话框，其中包含可在 `<shape>` 中使用的标签


    接下来，输入单词 `android`，然后输入冒号字符，以调出 ADT 帮助对话框，其中包含此 `<stroke>` 标签支持的四个参数，你将在此处全部实现它们，以便精确地可视化这些描边选项能为你的矢量插图带来什么效果。


    `android:color` 参数指定描边颜色，你将把它设置为黑色，以形成一个漂亮深色边框；`android:width` 参数指定轮廓周围描边的粗细。我将使用
    5 DIP 的设置，以便椭圆形周围的描边非常清晰可见。


    最后两个参数允许你添加虚线效果，你将使用它们让你的径向渐变椭圆的轮廓看起来像齿轮。`android:dashWidth` 定义虚线的宽度，我将其设置为 4
    DIP 的值，而 `android:dashGap` 定义每个虚线之间的间隙（空间）大小。我为我的 `dashGap` 参数使用了 3 DIP 的值。


    ```

    <stroke

    android:color="#000000"

    android:width="5dip"

    android:dashWidth="4dip"

    android:dashGap="3dip" />

    ```


    正如你在图 16-14 中所看到的，你已经使用了所有四个 `<stroke>` 参数，并且你的 XML 标记评估为无错误和无警告。


    ![A978-1-4302-5786-8_16_Fig14_HTML.jpg](img/A978-1-4302-5786-8_16_Fig14_HTML.jpg)


    **图 16-14.** 为 `android:color`、`android:width`、`android:dashWidth` 和 `dashGap`
    添加 `<stroke>` 标签参数


    点击 `activity_contents` 和 GLE 选项卡；图 16-15 显示了你的结果。


