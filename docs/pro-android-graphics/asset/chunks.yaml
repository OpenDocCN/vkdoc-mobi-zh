    出现"无法播放此视频"类型错误信息的第二个原因是，您当前使用的网络连接速度过慢，或数据传输方面存在问题。我的连接当时由于某种原因速度很慢，可能是高峰时段流量过大，或是路由器问题（维护或升级中）导致网络需要重新路由数据。网络环境本就复杂多变，很少能提供稳定流畅的数据流。


    为确保您使用的文件格式全部正确，同时为了能够为这些视频章节提供多样化的素材资源，我将在下一节中使用 MPEG-4 H.264 AVC 和 WebM VP8
    两种视频编解码器（及文件格式），为您正在 Nexus One 模拟器 AVD 上使用的 `pag480x800portrait` 文件创建 WebM 数字视频素材。


    ## 使用 WebM VP8 视频编解码器进行数字视频流传输


    由于您已准备好未压缩的 AVI 文件，我们回到 Squeeze 中为您的 480x800 视频素材创建一个 WebM 版本。在 Squeeze 界面左侧，您会看到一个带有向右箭头的
    WebM (`.webm`) 选项。点击该箭头，展开 WebM 预设，找到 `WebM_480p` 预设，然后复制它，或右键点击并编辑，创建您自己的自定义
    `Android_WebM_480x800p` 编解码器，如图 19-17 所示。


    ![A978-1-4302-5786-8_19_Fig17_HTML.jpg](img/A978-1-4302-5786-8_19_Fig17_HTML.jpg)


    图 19-17. 创建数据率为 768 KBPS 的 WebM 480x800p 编解码器预设，并压缩 480x800 的 `.webm` 素材


    我们采用与 MPEG4 目标数据率相同的每秒四分之三兆字节，因此将 `Data Rate` 参数设置为 `768 KBPS`，将 `Frame Size`
    选择器设置为 `Same as source`，最后，保留 `Key Frames` 的默认参数 `Key Frame Every 10 Seconds`。


    将此预设命名为 `Android_WebM_480x800p`，并使用 Android WebM 描述，然后点击 `OK` 按钮创建新预设，如图 19-17
    中屏幕截图左侧和右侧所示。


    返回 Squeeze 后，使用左上角的 `Import File` 图标，导航到您未压缩的 `PAG480x800.avi` AVI 文件并将其加载以进行压缩。点击您刚刚创建的新预设（呈浅蓝色高亮状态），然后点击预设面板右下角的
    `Apply` 按钮，以将其应用到您刚刚导入的源 AVI 文件。


    现在，您可以点击 `SqueezeIt!` 按钮，将编解码器应用到 AVI 文件，从而创建 WebM 文件。您会注意到，生成的文件大小与 MPEG4 文件非常接近，约为
    3.8 兆字节。


    接下来，您只需修改应用程序中的代码，通过一个修改后的 URL 来引用新文件，如图 19-18 以及下面用于设置 `Uri` 对象的 Java 代码行所示：


    `Uri splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag480x800portrait.webm`](http://www.e-bookclub.com/pag480x800portrait.webm)
    `);`


    这次，当我在模拟器中测试该应用时，视频成功下载并完美播放了！您可以在图 19-13 中看到下载完成前的效果，在图 19-3 中看到下载完成后的效果。


    ![A978-1-4302-5786-8_19_Fig18_HTML.jpg](img/A978-1-4302-5786-8_19_Fig18_HTML.jpg)


    图 19-18. 将您的 URI 引用设置为指向 `pag480x800portrait.webm` 视频文件，而非 `.mp4` 文件


    很可能 WebM 编解码器旨在低带宽环境下更高效地工作，正如我在编写本章节那一周所遇到的情况。尽管 MPEG-4 版本和 WebM 版本的视频素材数据文件大小几乎相同，但
    WebM 的播放似乎更流畅，画质也略好一些。


    这或许正是 WebM 编解码器开发团队力求实现的目标；该编解码器及其背后由 ON2 最初开发的技术版权归属于谷歌。这也是它成为 Android 和 Chrome
    组成部分的原因。很容易推断，由于采用固定数据率（与 MPEG4 允许的目标到最大数据率范围不同），这种严格的参数设置旨在针对低带宽网络。


    ## 让您的视频播放应用感知屏幕方向


    接下来，我将向您展示如何利用您在本教程中创建的竖屏和横屏两种版本的视频素材。


    这将涉及稍微改变您实现 `Uri` 对象的方式，因为您现在将要在 `for` 循环或 `switch` (`case`) 循环语句中设置 `Uri` 位置定义。因此，您需要做的第一件事是将
    `Uri` 对象声明移到 `MainActivity` 类的顶部，并置于任何特定方法之外。


    这需要删除您刚才在图 19-18 中处理过的 `Uri` 代码行，从头开始，并将该代码行简化为仅声明一个对象（目前如此），如图 19-19 所示：


    `Uri SplashScreenUri;`


    ![A978-1-4302-5786-8_19_Fig19_HTML.jpg](img/A978-1-4302-5786-8_19_Fig19_HTML.jpg)


    图 19-19. 将名为 `splashScreenUri` 的 `Uri` 对象声明放置在 `MainActivity` 类代码的顶部


    现在，当您将 `Uri` 对象定义放在 `OnCreate()` 方法内包含多个 `case` 语句的 `switch` 循环深处时，对 `Uri` 对象的引用将能够在任何位置访问到它。您将根据每个
    `case` 语句的比较常量来设置 `Uri` 对象路径；一旦 `switch` 语句确定这些常量，它就会对现在全局可访问的 `splashScreenUri`
    `Uri` 对象调用 `Uri.parse()` 方法。

