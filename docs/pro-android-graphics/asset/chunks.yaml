    \ have Eclipse again fix for you.\n\nThe pop-up error dialog informs you that\
    \ you need to add a `return` statement, which is required since your method is\
    \ of the type `boolean` and the calling entity is expecting a `true` (handled\
    \ successfully) or `false` (failed) return value. As you can seen in Figure [14-15](#A978-1-4302-5786-8_14_Chapter.html#Fig15),\
    \ one of the error dialog’s solution options is to `add a return statement`, and\
    \ that is the option you should select.\n\nUnfortunately, the Eclipse helper dialog\
    \ adds an incorrect return value of `false`, when you want to return a value of\
    \ `true` once your `AnimationDrawable` object has been started. Nobody is perfect,\
    \ not even the Eclipse ADT IDE, which does seem to have a mind of its own sometimes!\n\
    \n![A978-1-4302-5786-8_14_Fig15_HTML.jpg](A978-1-4302-5786-8_14_Fig15_HTML.jpg)\n\
    \nFigure 14-15. Adding a return statement to your `onLongClick()` event handling\
    \ method using the error pop-up helper\n\nLet’s edit this `false` return value,\
    \ and change it to `true`. You should also edit the copied `.start()` method call,\
    \ and change it to the `.stop()` method call, since Long-Click events are going\
    \ to stop your `AnimationDrawable`, and another Click event should start it right\
    \ up again. The final Java code in your `onLongClick()` method is shown in Figure\
    \ [14-16](#A978-1-4302-5786-8_14_Chapter.html#Fig16) and looks like the following\
    \ programming logic `onLongClickListener` event handling construct:\n\n```\npag.setOnLongClickListener(new\
    \ View.OnLongClickListener() {\n\n    @Override\n    public boolean onLongClick(View\
    \ arg0) {\n        frameAnimation.stop();\n        return true;\n    }\n});\n\
    ```\n\nNow, test your new event handled `AnimationDrawable` by using your Run\
    \ As ➤ Android Application work process. When the application starts, click the\
    \ PAG logo to start it animating. So far, so good. Next, long-click, or click\
    \ and hold for a second (or longer), and you will see the animation stop. But\
    \ there is a problem: the animation is not stopping on Frame 1, which looks unprofessional,\
    \ so you’re not done with your Java coding as yet!\n\n![A978-1-4302-5786-8_14_Fig16_HTML.jpg](A978-1-4302-5786-8_14_Fig16_HTML.jpg)\n\
    \nFigure 14-16. Adding a `.stop()` method call to an `onLongClick()` event handler\
    \ method and changing return to `true`\n\nWhat you need to do to fix this problem\
    \ is to “reset” your `AnimationDrawable` to Frame 1, but wouldn’t you know it,\
    \ Android left the `.reset()` method out of the `AnimationDrawable` class! Quite\
    \ a glaring oversight as far as frame animation is concerned, but I’m sure they\
    \ will add it in there someday.\n\nYou will need to figure out a different way\
    \ of getting your frame animation set back to the first frame when your users\
    \ perform a Long-Click operation on the `pag` ImageView UI element that contains\
    \ your frame animation assets.\n\nThe first thing I am going to try is to put\
    \ the statement that initializes the `frameAnimation` object via the `.setImageDrawable()`\
    \ method call inside the `onLongClick()` method and after the `frameAnimation.stop()`\
    \ method call.\n\nAs you can see in Figure [14-17](#A978-1-4302-5786-8_14_Chapter.html#Fig17),\
    \ once you place the method call inside an `onLongClick()` nested method, the\
