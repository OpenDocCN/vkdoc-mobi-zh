- fmt: '# Testing the Progress Dialog: Dealing with Compiler Errors


    Right-click your `GraphicsDesign` project folder and select the `Run As ➤ Android
    Application` menu sequence to launch the Nexus One emulator. After it loads, it
    should automatically launch your application, unless you are starting it for the
    first time, in which case you may need to swipe the screen to unlock it, just
    like you would do with a real Android device!


    As you can see in Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13), something
    is amiss in the Java code you have added (or reconfigured), and you are getting
    a fatal crash on your screen, as indicated by this message: “Unfortunately, Graphics
    Design has stopped.” Click the OK button underneath the message, and return to
    the Eclipse ADT IDE, and look in your `LogCat` error log tab to see if you can
    ascertain what exactly needs to be changed for your application to work again!
    I also show some of the other application errors you will be getting (next) in
    this screenshot, so make sure not to peek (or get depressed)!


    ![A978-1-4302-5786-8_19_Fig13_HTML.jpg](A978-1-4302-5786-8_19_Fig13_HTML.jpg)


    Figure 19-13. Testing in the Nexus One emulator and some of the errors you can
    look forward to solving


    To give you some room in the IDE to look at your `LogCat` tab contents, place
    your cursor on the dividing line shown at the bottom of the IDE in Figure [19-14](#A978-1-4302-5786-8_19_Chapter.html#Fig14),
    and click and drag it up so that the half-dozen “problem” tabs at the bottom of
    the IDE have enough room to function in (about 60% open).


    You will see a ton of red ink (code); scroll up through this “Red Sea” and part
    it, if you will (if you’re a fan of the Bible), and look for code line numbers
    that are lines of code that you know that you wrote. What I mean by this is that
    clearly you haven’t written 5,041, or even 511, lines of code in this app, so
    look for a number that you know is a line of code that you wrote, as the error
    is most likely in your code and not in Android’s!


    I found `MainActivity.java` code line 28 and highlighted it in this screen shot;
    it says that there is a problem in the initialization or `<init>` of one of the
    objects and that the problem occurs on line 28 of the code. This is that `VideoView`
    object declaration and configuration that we placed at the top of our class. Maybe
    we should have listened to Eclipse and used that `final` access modifier! Then
    again, maybe we don’t need to. I’m pretty stubborn, so no worries; we’ll figure
    it all out soon.


    The way I did this was to count down 28 lines from the top of the class’s code
    by expanding the `import` statements section and being sure to count each of those
    as well. I ended up at a `VideoView` object instantiation line of code, so I know
    that is the line of code I have to modify next.


    ![A978-1-4302-5786-8_19_Fig14_HTML.jpg](A978-1-4302-5786-8_19_Fig14_HTML.jpg)


    Figure 19-14. Pulling up the `LogCat` tab section of the IDE and looking for a
    reasonable line number (28) for your code


    The first thing that I am going to try is, of course, Eclipse’s suggestion of
    using the `final` access modifier before this line of code and putting it back
    down in the `onCreate()` method after the `setContentView()` method call.


    My thinking here is that the initialization problem we are encountering is coming
    from trying to access this `splashScreenVideoView` (ID) UI element, a part of
    the `activity_main.xml` UI definition, before that UI definition was referenced
    in our code, by using a `setContentView(R.layout.activity_main);` Java programming
    statement.


    So to see if I can get the code working, I’m going to put this line of code right
    under the `setContentView()` method call, as shown in Figure [19-15](#A978-1-4302-5786-8_19_Chapter.html#Fig15),
    to test the application a second time to see if my hasty cut-and-paste of the
    `VideoView` to the top of the class was ultimately a fatal (error) mistake, at
    least as far as programming judgment is concerned.


    Use the `Run As ➤ Android Application` work process after making this change and
    you will see that this was indeed the problem. But as I said, stubborn is as stubborn
    does, and I still want to find a way to code this without a `final` access modifier
    for the `VideoView` object. So let’s figure out a way to accomplish this next,
    and then you can move along and part other oceans.


    ![A978-1-4302-5786-8_19_Fig15_HTML.jpg](A978-1-4302-5786-8_19_Fig15_HTML.jpg)


    Figure 19-15. Using a `final` access modifier and placing a `VideoView` declaration
    and configuration inside `onCreate()`


    If you look at the line of code in question, you can see that it is fairly dense
    and could also be written using two lines of code, in this fashion:


    ```

    VideoView splashScreen;

    splashScreen = (VideoView) findViewById(R.id.splashScreenVideoView);

    ```


    The fact that you can make this dense code more verbose, in this situation, at
    least, is exactly what’s going to allow you to code your `VideoView` object without
    having to use the `final` access modifier keyword (and extra memory) at all. As
    you can see, sometimes stubbornness (relentlessness) can lead to clever solutions
    that use less memory and (or) advanced features, which are not really needed to
    elegantly implement the programming solution at hand. Like life, programming is
    never easy, and your decisions must be reviewed thoroughly after you have had
    time to take a break and revisit with a fresh viewpoint later.


    If you remember, the reason the compiler was throwing an error was because you
    were trying to initialize a `VideoView` object before your definition of that
    object was established (put into place) using the `.setContentView()` method.


    The `VideoView` UI object’s structure was defined using XML in your `activity_main.xml`
    definition file, and you must bring this UI definition “into play” by utilizing
    the `.setContentView()` method call before you actually reference this data.


    Since this `setContentView()` method puts this XML definition into memory (into
    a `ContentView` object) this line of code will need to exist before anything inside
    that `View` (`ViewGroup`) definition can be referenced.


    However, you can still declare the `VideoView` object for use in your class at
    the top of the class, with the other `ProgressDialog` and `Animation` objects,
    as long as you don’t try to load it with that `VideoView` XML definition at that
    point in time (in your code execution process or timeline) by calling the `findViewById()`
    method off of the `VideoView` object. To accomplish this `VideoView` object inflation,
    that is, its definition via XML, you’ll need to wait until you are inside the
    `onCreate()` method and after the statement that sets the `ContentView` object.
    The final code is shown in Figure [19-16](#A978-1-4302-5786-8_19_Chapter.html#Fig16),
    and is error free, and runs in the Nexus One emulator the way it should.


    ![A978-1-4302-5786-8_19_Fig16_HTML.jpg](A978-1-4302-5786-8_19_Fig16_HTML.jpg)


    Figure 19-16. Setting up your `VideoView` object in a way that works and does
    not require a `final` access modifier


    In the center of Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13), I
    showed an error screen informing us that the video file could not be played. The
    screen on the right of Figure [19-13](#A978-1-4302-5786-8_19_Chapter.html#Fig13)
    shows a view of what the screen will look like when your app is working correctly.


    There are two reasons for the error message in the middle screen. The one that
    you need to check out thoroughly is that a file format is incompatible (MPEG-4),
    which you know is not the case, as you used this file in the last chapter on captive
    video playback and it worked.'
