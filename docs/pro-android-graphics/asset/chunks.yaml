    ## `RotateAnimation` 类：用于旋转的动画子类


    如本章引言所述，Android `RotateAnimation` 类是 `android.view.animation.Animation` 公有抽象类的另一个直接子类。Android
    `RotateAnimation` Java 类层次结构如下：


    ```

    java.lang.Object

      > android.view.animation.Animation

        > android.view.animation.RotateAnimation

    ```


    `RotateAnimation` 类是 `android.view.animation` 包的一部分。其 `import` 语句引用了 `android.view.animation.RotateAnimation`
    包的导入路径，你将在下一节中使用它来旋转 PAG 帧动画（同时该动画也会缩放并淡入）时看到这一点。该动画类用于实现 `View` 对象的 2D 旋转。


    此旋转将在 X-Y 平面内进行。从技术上讲，这意味着旋转是围绕 `Z 轴`进行的。在 3D 中，有三个轴，包括你在 2D 中常见的标准 X（从左到右）轴和
    Y（从上到下）轴，以及一个 Z 轴，该轴由一条从 X 和 Y 轴交点穿出、朝向（和远离）你的屏幕（或朝向和远离你的观察者）的线表示。


    因此，从技术上讲，`RotateAnimation` 对象正在实现 Z 轴旋转，其围绕（使用）一个由开发者使用 X 和 Y 坐标设置的枢轴点 `origin`，你将在下一节中亲身体验。


    除了 `View` 对象将围绕其旋转的 `枢轴点 origin` 之外，你还必须使用一个 `范围` 来指定旋转量，该范围以要 `开始旋转` 的度数开始，通常为
    0 度或“正常” `View` 定位，并以要 `旋转到` 的度数结束，例如 90 度（顺时针）、或 -90 度（逆时针）、或 180 度（上下颠倒），或者在您的例子中，是
    360 度，即一次完整的无缝 `View` 对象（`ImageView`）旋转。


    因此，`RotateAnimation` 过程动画类对于旋转 `View` 以及将其侧向或上下翻转非常有用，如果需要这种效果，可以通过使用较短的持续时间值来快速实现。


    无论 `RotateAnimation` 类单独使用时看起来多么简单，它都可以与其他三种过程动画对象类型结合使用，以创建非常令人印象深刻的特效。


    你希望用来创建 `RotateAnimation` 对象的构造方法类似于你已经实现的八参数 `ScaleAnimation` 构造方法。`RotateAnimation`
    构造方法将在你的应用中利用以下高级旋转规范格式：


    ```

    RotateAnimation(float fromDegrees, float toDegrees, int pivotXType, float pivotXValue,
    int pivotYType, float pivotYValue);

    ```'
