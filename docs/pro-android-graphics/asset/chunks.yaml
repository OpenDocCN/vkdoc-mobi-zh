- fmt: "# Instantiating ImageButton and TransitionDrawable Objects\n\nYou will start\
    \ by adding in the object instantiation lines of Java code for the `ImageButton`\
    \ object that will control the triggering of your transition and the `TransitionDrawable`\
    \ object that will perform that image transition opacity blending animation inside\
    \ your `GraphicsDesign` application.\n\nThe first thing to instantiate is your\
    \ user interface element, the multi-state `ImageButton` that you designed in the\
    \ ImageButton chapter. This is done in a very similar fashion to the `ImageView`\
    \ UI element object, which is already in place at the bottom of your `ContentsActivity.java`\
    \ code, but which you will later be moving to the top of your `onCreate()` method.\n\
    \nLet’s name the `ImageButton` object `transitionButton`, as it will trigger the\
    \ `TransitionDrawable` object to start animating, so this is a logical name. You\
    \ will instantiate your `ImageButton` UI element object for use by using the following\
    \ line of Java code to create, name, and load the Java object:\n\n```\nImageButton\
    \ transitionButton = (ImageButton)findViewById(R.id.bookmarkImageButton);\n```\n\
    \nAs you can see in Figure [13-7](#A978-1-4302-5786-8_13_Chapter.html#Fig7), you\
    \ are getting wavy red error highlighting, so mouse-over the `ImageButton` class\
    \ reference in your code and select the `Import ImageButton` `(android.widget\
    \ package)` reference and have Eclipse ADT write the `import android.widget.ImageButton;`\
    \ Java code statement for you.\n\n![A978-1-4302-5786-8_13_Fig7_HTML.jpg](A978-1-4302-5786-8_13_Fig7_HTML.jpg)\n\
    \n**Figure 13-7.** Instantiating an `ImageButton` object named `transitionButton`\
    \ and using `findViewById` to reference its ID\n\nNext, let’s instantiate your\
    \ `TransitionDrawable` object. Initially, you’ll do this in the most standard\
    \ way, much like you did with your `Paint` object. So let’s add this short line\
    \ of Java code, instantiating (and naming) your `TransitionDrawable`. You will\
    \ use the name `transition` for this object, using the following Java statement\
    \ at the top of your `ContentsActivity` class:\n\n```\nTransitionDrawable transition;\n\
    ```\n\nAs you can see in Figure [13-8](#A978-1-4302-5786-8_13_Chapter.html#Fig8),\
    \ this instantiation statement is now in place and error-free. Notice that your\
    \ `Import` statement for the `ImageButton` is now visible at the top of your `Activity`\
    \ subclass as well.\n\nThe next line of Java code that you will need to put into\
    \ place is the line of code that will load the `TransitionDrawable` object with\
    \ the `Drawable` XML definition, which you created in the previous section of\
    \ the chapter.\n\nThis will load your `TransitionDrawable` object, which is currently\
    \ declared or instantiated, but is empty (not loaded, or configured). To do this,\
    \ you must get the `Drawable` (in this case `TransitionDrawable`) object definition.\n\
    \n![A978-1-4302-5786-8_13_Fig8_HTML.jpg](A978-1-4302-5786-8_13_Fig8_HTML.jpg)\n\
    \n**Figure 13-8.** Instantiating a `TransitionDrawable` object named `transition`\
