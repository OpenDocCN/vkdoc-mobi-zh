- fmt: '# Installing and Updating the Android Developer ADT Bundle


    Open the Windows File Explorer utility, which should look like a folder icon with
    files in it (it is the second icon from the left in Figure [1-13](#A978-1-4302-5786-8_1_Chapter.html#Fig13)).
    Next, find your Downloads folder, which should be showing at the top-left (underneath
    the Favorites section) of the file manager utility, as shown in Figure [1-8](#A978-1-4302-5786-8_1_Chapter.html#Fig8).


    Click the Downloads folder to highlight it in blue and find the ADT Bundle file
    that you just downloaded in the pane of files on the right side of the file management
    utility.


    ![A978-1-4302-5786-8_1_Fig8_HTML.jpg](A978-1-4302-5786-8_1_Fig8_HTML.jpg)


    Figure 1-8.


    Find the `adt-bundle-windows-x86_64` ZIP file in Downloads


    Right-click the `adt-bundle-windows-x86_64` file as shown in Figure [1-9](#A978-1-4302-5786-8_1_Chapter.html#Fig9)
    to bring up a context-sensitive menu and select the Extract All option.


    ![A978-1-4302-5786-8_1_Fig9_HTML.jpg](A978-1-4302-5786-8_1_Fig9_HTML.jpg)


    Figure 1-9.


    Right-click the `adt-bundle` ZIP file and select the Extract All option to begin
    the ADT installation


    When the Extract Compressed (Zipped) Folders dialog appears, replace the default
    folder for installation with one of your own creation. I created an Android folder
    under my root `C:\` hard drive (so, `C:\Android`) to keep my ADT IDE in, as that
    is a logical name for it. The before and after dialogs are shown in Figure [1-10](#A978-1-4302-5786-8_1_Chapter.html#Fig10),
    showing the difficult-to-remember path to my system Downloads folder and a new,
    easy-to-find `C:\Android` folder path.


    ![A978-1-4302-5786-8_1_Fig10_HTML.jpg](A978-1-4302-5786-8_1_Fig10_HTML.jpg)


    Figure 1-10.


    Change the target installation folder from your Downloads folder to an Android
    folder that you create


    Once you click the Extract button, shown in Figure [1-10](#A978-1-4302-5786-8_1_Chapter.html#Fig10),
    you will see a progress dialog that shows the install as it is taking place. Click
    the More Details option located at the bottom left to see what files are being
    installed, as well as the Time remaining and the Items remaining counters, as
    shown in Figure [1-11](#A978-1-4302-5786-8_1_Chapter.html#Fig11). The 600MB installation
    takes from 15 to 60 minutes, depending upon the data transfer speed of your hard
    disk drive.


    ![A978-1-4302-5786-8_1_Fig11_HTML.jpg](A978-1-4302-5786-8_1_Fig11_HTML.jpg)


    Figure 1-11.


    Expanded More Details option showing which files are installing


    Once the installation is complete, go back into your Windows Explorer File Management
    Utility and look under the `C:\Android` folder (or whatever you decided to name
    it) and you will see the `adt-bundle-windows-x86_64` folder, as shown in Figure
    [1-12](#A978-1-4302-5786-8_1_Chapter.html#Fig12). Open this and you will see an
    `eclipse` and an `sdk` sub-folder. Open those sub-folders as well, in order to
    see their sub-folders, so that you know what is in there.


    Next, click the `eclipse` folder on the left side of your file management utility
    to show the file contents in the right side of the file manager. Find the `eclipse
    Application` executable file, which will be the one that has its own custom icon
    next to it, on the left. It is a purple sphere.


    ![A978-1-4302-5786-8_1_Fig12_HTML.jpg](A978-1-4302-5786-8_1_Fig12_HTML.jpg)


    Figure 1-12.


    Finding the Eclipse Application executable file in the ADT Bundle folder hierarchy
    you just installed


    Click and drag the Eclipse icon to the bottom of your desktop (or wherever your
    Taskbar Launch area is mounted to your OS desktop), and hover it over your Installed
    Program Launch Icon Taskbar. Once you do this, you will see the Pin to Taskbar
    (Windows Vista, Windows 7) or Pin to `eclipse` (Windows 8) tool-tip message, as
    is shown in the top section of Figure [1-13](#A978-1-4302-5786-8_1_Chapter.html#Fig13).


    Once this tool-tip message is showing, you can release the drag operation, and
    drop the `eclipse` purple sphere icon into your Taskbar area, where it will become
    a permanent application launch icon, as shown in the bottom section of Figure
    [1-13](#A978-1-4302-5786-8_1_Chapter.html#Fig13).


    Now, all you have to do when I say “launch Eclipse ADT now, and let’s get started”
    is click your mouse once on the `eclipse` icon, and it will launch!


    ![A978-1-4302-5786-8_1_Fig13_HTML.jpg](A978-1-4302-5786-8_1_Fig13_HTML.jpg)


    Figure 1-13.


    Dragging the Eclipse application onto the Windows Taskbar to invoke the pin operation


    So let’s try it. Click the `eclipse` software icon once in your Taskbar and launch
    the software for the first time. You will see the ADT Android Developer Tools
    start-up screen, as shown at the left side of Figure [1-14](#A978-1-4302-5786-8_1_Chapter.html#Fig14).
    Once the software loads into your system memory, you will see the Workspace Launcher
    dialog, shown on the right, with the Select a workspace work process, which will
    allow you to set your default Android development workspace location on your workstation
    hard disk drive.


    ![A978-1-4302-5786-8_1_Fig14_HTML.jpg](A978-1-4302-5786-8_1_Fig14_HTML.jpg)


    Figure 1-14.


    Android Developer Tools start-up screen and Workspace Launcher dialog showing
    default workspace


    I accepted the default workspace location, which will be under your main hard
    disk drive letter (probably `C:\`) in your Users folder, under a sub-folder named
    using your PC’s assigned name; your Android development workspace folder will
    be underneath that.


    When you create projects in Android ADT, they will appear as sub-folders underneath
    this workspace folder hierarchy, so you’ll be able to find all of your files using
    your File Management Utility software as well as using the Eclipse package Explorer
    project navigation pane, which you’ll be using quite a bit in this book, to learn
    about how Android implements Graphics.


    Once you set your workspace location and click the OK button, the Eclipse Java
    ADT start-up Welcome! screen will appear, as shown in Figure [1-15](#A978-1-4302-5786-8_1_Chapter.html#Fig15).
    The first thing that you want to do is make sure your software is completely up
    to date, so click the Help menu at the top right of the screen, and select the
    Check for Updates option about two-thirds of the way down, as shown in Figure
    [1-15](#A978-1-4302-5786-8_1_Chapter.html#Fig15) (and highlighted in blue).


    ![A978-1-4302-5786-8_1_Fig15_HTML.jpg](A978-1-4302-5786-8_1_Fig15_HTML.jpg)


    Figure 1-15.


    Eclipse Java ADT Welcome screen and invoking the Help ➤ Check for Updates menu
    sequence


    Once you select this menu option, you will see the Contacting Software Sites dialog,
    shown in Figure [1-16](#A978-1-4302-5786-8_1_Chapter.html#Fig16) on the left-hand
    side. This shows the Checking for updates progress bar as it checks various Google
    Android software repository sites for any updated versions of the Eclipse ADT.


    It is important to note that you must (still) be connected to the Internet for
    this type of real-time software package updating to be able to occur. In my case,
    since I had just downloaded the ADT development environment, no new updates were
    found, and so I got a dialog advising me of this fact.


    ![A978-1-4302-5786-8_1_Fig16_HTML.jpg](A978-1-4302-5786-8_1_Fig16_HTML.jpg)


    Figure 1-16.


    The Contacting Software Sites dialog checking for updates to Eclipse ADT, with
    no updates found


    If for some reason there are updates to the Eclipse ADT environment, which there
    shouldn’t be if you just downloaded and installed it, simply follow the instructions
    to update any components of the ADT that need updating. In this way you will have
    the latest software development kit (SDK) versions at all times.


    It is important to note that you can run the `Help ➤ Check for Updates` menu command
    sequence at any time. Some developers do this weekly or even daily to make sure
    that they have the most updated (bug-free and feature-laden) Android development
    environment possible at all times.'
