  trans: '

    # Android 数字视频文件：分辨率密度目标


    为了让数字视频资源能在市面上各种 Android 操作系统设备上使用，你需要满足多个不同的分辨率目标，这样才能覆盖市面上大多数屏幕密度。


    关于 Android 中的默认屏幕密度（因为它们与图形相关），你将在下一章关于基于帧的动画中了解更多。如果你像我一样好奇，为什么 Android 不直接获取一个高分辨率资源，然后使用双三次插值（或者至少是双线性插值）进行缩小，原因在于，目前
    Android 的软肋恰恰是缩放，尤其是图像和视频。


    如你所知，Android 设备的屏幕尺寸涵盖从较小的翻盖手机和 Android 手表，到较大的平板电脑和 iTV 设备。在这个范围内，还有智能手机、电子书阅读器、迷你平板电脑和中型平板电脑，因此你至少需要四种（如果不是五种）不同的目标
    DPI（每英寸点数，即密度像素图像）分辨率。对于数字视频，这还包括不同的目标比特率，这样你就能尽力适配各种不同的设备屏幕密度，以及从单核到四核 CPU 产品的不同处理能力。


    就数字视频支持而言，与其说是逐像素地适配显示屏幕，不如说是拥有三到四个比特率目标，因为 `VideoView` 类可以放大（或者更理想的是缩小）视频，你将在本章和本书后面看到这一点。


    提供这种均匀分布的比特率范围非常重要，因为较小的 Android 设备往往处理能力较弱，难以流畅解码数据量大的（高）比特率视频，因此你希望一个 Android
    应用程序拥有一系列比特率，能够“曲线拟合”市面上所有潜在 Android 设备的处理能力。


    例如，Android 手表或翻盖手机很可能使用单核或双核 CPU，而 iTV 则至少使用四核处理器，甚至可能是八核。Galaxy S3 使用四核处理器，而
    Galaxy S4 则使用八核（或双四核）处理器。


    因此，你应该拥有能在任何处理器上流畅解码的比特率，范围从低分辨率的 512 KBPS 到高分辨率的 2 MBPS。无论压缩程度如何，分辨率密度越高（即像素越小），视频看起来就越好。


    这是因为，在任何给定的 Android 设备屏幕上，像素间距越小（或者说像素密度越高），编码伪影就越难被看到（基本上它们会隐藏起来）。一旦你掌握了视频编辑或压缩工具（例如开源软件
    `EditShare Lightworks 11` 或 `Sorenson Squeeze Pro`）的使用方法，这种在大多数 Android 设备硬件上常见的精细像素间距，就能让你在相对较小的数据量下获得高质量的视频。


    # 优化数字视频：编解码器与压缩


    数字视频是通过一种称为编解码器（codec，即编码-解码的缩写）的软件进行压缩的。视频编解码器有两端，一端是编码视频数据流，另一端是解码视频数据流。解码器将是使用它的操作系统或浏览器的一部分。


    解码器通常针对速度进行了优化，因为播放的流畅性是首要问题；而编码器则针对减少其生成的数字视频资源的数据量进行了优化。因此，编码过程可能需要很长时间，具体取决于你的工作站包含多少个处理器核心。如今一台专业工作站通常拥有八个核心。


    编解码器（编码器端）类似于插件，可以安装到不同的数字视频编辑软件包中，使它们能够编码不同类型的数字视频文件格式。


    由于 Android 支持 H.263 和 H.264 MPEG4 格式，以及 ON2 VP8 WebM 视频格式，你需要确保自己使用的是能够将视频数据编码成这些数字视频文件格式的视频编解码器之一。如果操作正确，Android
    操作系统将能够解码该数字视频数据流，因为这三种编解码器的解码器端是直接内置于 Android 操作系统中的，这就是为什么你要了解这三种格式。


    不止一家软件制造商生产 MPEG 编码软件，因此不同的 MPEG 编解码器（编码器软件）在文件大小方面会产生不同（更好或更差）的结果。


    我强烈建议你在想要专业地制作视频时获取的专业解决方案叫做 `Sorenson Squeeze`，目前版本是 9。Squeeze 有一个专业版，我将在本书中使用它，其价格低于一千美元。


    还有一个名为 `EditShare Lightworks 11` 的开源解决方案。它目前不原生支持输出到 WebM VP8 编解码器，因此在 `EditShare
    Lightworks` 增加对 Android 编解码器的支持之前（他们承诺很快就会增加），我打算在本书中使用 `Squeeze Pro 9`。


    我仍然建议你访问 [editshare.com](http://editshare.com) 或 [lwks.com](http://lwks.com) 网站注册并下载这个软件，因为它是与
    `Blender 3D`、`GIMP2` 和 `Audacity` 一样最强大的开源软件包之一。


    在针对数字视频文件大小进行优化（设置压缩参数）时，有大量变量会直接影响视频数据量。我将按照它们对视频文件大小影响的从大到小顺序来介绍这些变量，以便你了解应该调整哪些参数来获得期望的结果。


    与数字图像压缩一样，视频每一帧的分辨率（即像素数量）是开始优化过程的最佳起点。如果你的目标用户使用的是 854x480 或 1280x720 的智能手机和平板电脑，那么你不需要使用真正的
    1920x1080 高清分辨率视频来让你的数字视频资源获得良好的视觉效果。凭借那些超高密度的显示屏，你可以将 1280 视频放大 33% [通过 `1 -
    (1280 / 1920)` 计算得出]，它看起来仍然很棒。例外情况是，如果你正在为 GoogleTV 用户提供 iTV 应用，那么你可能需要使用 1920x1080
    分辨率。


    下一级的优化在于每秒视频所使用的帧数，假设视频本身的秒数无法缩短。这就是帧率，与其使用视频标准 30 FPS，不如考虑使用电影标准帧率 24 FPS，或者多媒体标准帧率
    20 FPS。根据你的内容，你甚至可能可以使用 10 FPS 的帧率。

