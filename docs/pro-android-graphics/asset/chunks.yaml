- fmt: "Now that you have output the extra-high resolution density assets for your\
    \ multi-state `ImageButton`, you should probably save a GIMP native file format\
    \ version of this image composite in case you need it in the future for any reason.\
    \ This is done in GIMP by using either the `Save` or the `Save As` menu options\
    \ under the `File` menu.\n\nDoing this will access the `Save Image` dialog, shown\
    \ in Figure [9-12](#A978-1-4302-5786-8_9_Chapter.html#Fig12), which will allow\
    \ you to save your current GIMP project as a native `.XCF` file in the folder\
    \ where your original image composite assets came from. This file contains all\
    \ of the layers and settings that you created during the digital image compositing\
    \ work process, which we went through in this section of the chapter in order\
    \ to learn how to create various `ImageButton` state digital image assets.\n\n\
    ![A978-1-4302-5786-8_9_Fig12_HTML.jpg](A978-1-4302-5786-8_9_Fig12_HTML.jpg)\n\n\
    **Figure 9-12.** Saving a GIMP native composite `imagebutton_states.xcf`\n\nNext,\
    \ you can go into Eclipse ADT and write the XML markup necessary to implement\
    \ the `ImageButton` states inside your `GraphicsDesign` app.\n\n## An ImageButton\
    \ Drawable: Setting Up the Multi-State XML\n\nFire up your Eclipse ADT IDE if\
    \ it isn’t open on your desktop already, and right-click and open the `activity_contents.xml`\
    \ UI definition file in your `/res/layout` folder. You’ll add an `ImageButton`\
    \ UI element at the bottom of your `Table of Contents`, which allows your user\
    \ to access your `Bookmarking Utility` so as to build in some inter-application\
    \ Activity navigation for your `GraphicsDesign` app.\n\nAdd an `<ImageButton>`\
    \ child tag inside of your first nested `<LinearLayout>` tag, as shown in Figure\
    \ [9-13](#A978-1-4302-5786-8_9_Chapter.html#Fig13), and add in the necessary `layout_`\
    \ parameters.\n\n![A978-1-4302-5786-8_9_Fig13_HTML.jpg](A978-1-4302-5786-8_9_Fig13_HTML.jpg)\n\
    \n**Figure 9-13.** Adding the `<ImageButton>` child tag to the first nested `<LinearLayout>`\
    \ child tag layout container\n\nLet’s use the `android:id` parameter, and name\
    \ your `<ImageButton>` UI element `bookmarkImageButton`, and make sure your alpha\
    \ channel, which is part of your `ImageButton` state assets, shows all the way\
    \ through your `ImageButton`. This is done by setting a background that is 100%\
    \ transparent using `ImageButton android:background` parameter set to an ARGB\
    \ hexadecimal value of `#00000000`, which is equivalent to transparent black.\n\
    \nSince you already set your `android:layout_width` and `android:layout_height`\
    \ parameters to the standard `wrap_content` constant, all you have to do now is\
    \ add an `android:contentDescription` parameter that is required for every `ImageView`\
    \ class (and subclass, such as `ImageButton`). Since you already have a `<string>`\
    \ constant that references your `Bookmarking Utility`, let’s use that for the\
    \ string value for the parameter as follows:\n\n`android:contentDescription=\"\
    @string/bookmark_utility\"`\n\nFinally, let’s add in an `android:src` parameter\
    \ that will reference the XML file that contains the markup defining the bookmark\
    \ `ImageButton` states. Call this file `bookmark_states.xml` and put it in the\
    \ `/res/drawable` folder. The XML markup for this parameter will read as follows:\n\
    \n`android:src=\"@drawable/bookmark_states\"`\n\nNow you’ll need to create this\
    \ `bookmark_states.xml` drawable XML definition, so you will use your New Android\
    \ XML File work process by right-clicking on the `/res/drawable` folder and then\
    \ selecting a New ➤ Android XML File menu sequence. This will open the dialog\
    \ shown in Figure [9-14](#A978-1-4302-5786-8_9_Chapter.html#Fig14), and will auto-set\
    \ the `Resource Type` drop-down to `Drawable` and `Project` drop-down to `GraphicDesign`.\n\
    \n![A978-1-4302-5786-8_9_Fig14_HTML.jpg](A978-1-4302-5786-8_9_Fig14_HTML.jpg)\n\
    \n**Figure 9-14.** Creating a New Android XML File of Resource Type Drawable with\
    \ `<selector>` Root Element\n\nName the File `bookmark_states` and select a Root\
    \ Element of type `<selector>` and click the `Finish` button to create the bootstrap\
    \ `bookmark_states.xml` file for your project in the `/res/drawable` folder.\n\
    \nNow you are ready to add in the `<item>` child tags for each of the states of\
    \ your `ImageButton` drawable assets, as shown in Figure [9-15](#A978-1-4302-5786-8_9_Chapter.html#Fig15).\
    \ As you can see, the order goes from hovered to pressed to focused to normal,\
    \ just as it would if you put your mouse over an object, then clicked down, then\
    \ released, and then removed your mouse from the object sphere of influence.\n\
    \n![A978-1-4302-5786-8_9_Fig15_HTML.jpg](A978-1-4302-5786-8_9_Fig15_HTML.jpg)\n\
    \n**Figure 9-15.** Adding `<item>` tags to a `bookmark_states.xml` file to define\
    \ the ImageButton state drawable assets\n\nThe XML markup for implementing the\
    \ four child `<item>` tags inside of the parent `<selector>` tag, in the order\
    \ in which they need to appear, is as follows:\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<selector xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    >\n    <item android:state_hovered=\"true\"\n          android:drawable=\"@drawable/imagebutton_hovered\"\
    \ />\n    <item android:state_pressed=\"true\"\n          android:drawable=\"\
    @drawable/imagebutton_pressed\" />\n    <item android:state_focused=\"true\"\n\
    \          android:drawable=\"@drawable/imagebutton_focused\" />\n    <item android:drawable=\"\
    @drawable/imagebutton_normal\" />\n</selector>\n```\n\nOnce this `bookmark_states.xml`\
    \ file is built, you can go back to your `activity_contents.xml` file and use\
    \ the Graphical Layout Editor tab, shown in Figure [9-16](#A978-1-4302-5786-8_9_Chapter.html#Fig16),\
    \ to see what your `ImageButton` UI element will look like now that it is referencing\
    \ your image assets via the `bookmark_states.xml` file.\n\n![A978-1-4302-5786-8_9_Fig16_HTML.jpg](A978-1-4302-5786-8_9_Fig16_HTML.jpg)\n\
    \n**Figure 9-16.** Using the Graphical Layout Editor tab to preview the `<ImageButton>`\
    \ child tag and its parameters\n\nYou will notice when you are in the Graphical\
    \ Layout Editor tab that when you click the `ImageButton`, it selects it for editing\
    \ rather than giving you the pressed state visual feedback that you are looking\
    \ for! What this means is that you will need to use a Run As ➤ Android Application\
    \ work process so you can test your application in the Nexus One emulator in order\
    \ to make sure that your XML markup is all working together correctly.\n\nAs you\
    \ can see in Figure [9-17](#A978-1-4302-5786-8_9_Chapter.html#Fig17), your `ImageButton`\
    \ color-shifts and turns gold when you click on it, but it looks a little bit\
    \ too big to appear to users as a button UI element, so you need to shrink it\
    \ down to a more button-like dimension. My first thought here was that Android\
    \ only had the extra-high resolution image asset to work with, and was not downscaling\
    \ it enough.\n\n![A978-1-4302-5786-8_9_Fig17_HTML.jpg](A978-1-4302-5786-8_9_Fig17_HTML.jpg)\n\
    \n**Figure 9-17.** Running the Nexus One emulator to test the ImageButton states\
    \ in an application run environment\n\nSo to make sure that this is not the problem,\
    \ the first thing that you need to do is go back into GIMP and finish the work\
    \ process that you started in the previous section of this chapter. As you know,\
    \ you created the highest resolution version of these four image asset `ImageButton`\
    \ states; however, you did not finish creating the other three resolution density\
    \ versions of these assets for the LDPI, MDPI, and HDPI drawable folders. So the\
    \ first thing that you need to do, since you have to do this anyway and are just\
    \ putting a tedious work process off, is to create all your assets!"
  raw: 'Now that you have output the extra-high resolution density assets for your
    multi-state ImageButton, you should probably save a GIMP native file format version
    of this image composite in case you need it in the future for any reason. This
    is done in GIMP by using either the Save or the Save As menu options under the
    File menu.


    Doing this will access the Save Image dialog, shown in Figure [9-12](#A978-1-4302-5786-8_9_Chapter.html#Fig12),
    which will allow you to save your current GIMP project as a native .XCF file in
    the folder where your original image composite assets came from.


    This file contains all of the layers and settings that you created during the
    digital image compositing work process, which we went through in this section
    of the chapter in order to learn how to create various ImageButton state digital
    image assets.


    ![A978-1-4302-5786-8_9_Fig12_HTML.jpg](A978-1-4302-5786-8_9_Fig12_HTML.jpg)


    Figure 9-12.


    Saving a GIMP native composite imagebutton_states.xcf,


    Next, you can go into Eclipse ADT and write the XML markup necessary to implement
    the ImageButton states inside your GraphicsDesign app.


    ## An ImageButton Drawable: Setting Up the Multi-State XML


    Fire up your Eclipse ADT IDE if it isn’t open on your desktop already, and right-click
    and open the activity_contents.xml UI definition file in your /res/layout folder.


    You’ll add an ImageButton UI element at the bottom of your Table of Contents,
    which allows your user to access your Bookmarking Utility so as to build in some
    inter-application Activity navigation for your GraphicsDesign app.


    Add an `<ImageButton>` child tag inside of your first nested `<LinearLayout>`
    tag, as shown in Figure [9-13](#A978-1-4302-5786-8_9_Chapter.html#Fig13), and
    add in the necessary `layout_` parameters.


    ![A978-1-4302-5786-8_9_Fig13_HTML.jpg](A978-1-4302-5786-8_9_Fig13_HTML.jpg)


    Figure 9-13.


    Adding the <ImageButton> child tag to the first nested <LinearLayout> child tag
    layout container


    Let’s use the android:id parameter, and name your <ImageButton> UI element `bookmarkImageButton`,
    and make sure your alpha channel, which is part of your ImageButton state assets,
    shows all the way through your ImageButton. This is done by setting a background
    that is 100% transparent using ImageButton android:background parameter set to
    an ARGB hexidecimal value of #00000000, which is equivalent to transparent black.


    Since you already set your android:layout_width and android:layout_height parameters
    to the standard `wrap_content` constant, all you have to do now is add an `android:contentDescription`
    parameter that is required for every ImageView class (and subclass, such as ImageButton).


    Since you already have a <string> constant that references your Bookmarking Utility,
    let’s use that for the string value for the parameter as follows:


    `android:contentDescription="@string/bookmark_utility"`


    Finally, let’s add in an `android:src` parameter that will reference the XML file
    that contains the markup defining the bookmark ImageButton states. Call this file
    `bookmark_states.xml` and put it in the /res/drawable folder. The XML markup for
    this parameter will read as follows:


    `android:src="@drawable/bookmark_states"`


    Now you’ll need to create this bookmark_states.xml drawable XML definition, so
    you will use your New Android XML File work process by right-clicking on the `/res/drawable`
    folder and then selecting a New ➤ Android XML File menu sequence. This will open
    the dialog shown in Figure [9-14](#A978-1-4302-5786-8_9_Chapter.html#Fig14), and
    will auto-set the Resource Type drop-down to Drawable and Project drop-down to
    GraphicDesign.


    ![A978-1-4302-5786-8_9_Fig14_HTML.jpg](A978-1-4302-5786-8_9_Fig14_HTML.jpg)


    Figure 9-14.


    Creating a New Android XML File of Resource Type Drawable with <selector> Root
    Element


    Name the File `bookmark_states` and select a Root Element of type `<selector>`
    and click the Finish button to create the bootstrap bookmark_states.xml file for
    your project in the `/res/drawable` folder.


    Now you are ready to add in the `<item>` child tags for each of the states of
    your ImageButton drawable assets, as shown in Figure [9-15](#A978-1-4302-5786-8_9_Chapter.html#Fig15).
    As you can see, the order goes from hovered to pressed to focused to normal, just
    as it would if you put your mouse over an object, then clicked down, then released,
    and then removed your mouse from the object sphere of influence.


    ![A978-1-4302-5786-8_9_Fig15_HTML.jpg](A978-1-4302-5786-8_9_Fig15_HTML.jpg)


    Figure 9-15.


    Adding <item> tags to a bookmark_states.xml file to define the ImageButton state
    drawable assets


    The XML markup for implementing the four child <item> tags inside of the parent
    <selector> tag, in the order in which they need to appear, is as follows:


    `<? xml version="1.0 encoding="utf-8" ?>`


    `<selector ExternalRef"> http://schemas.android.com/apk/res/android` `"`


    `<item android:state_hovered="true"`


    `android:drawable="@drawable/imagebutton_hovered" />`


    `<item android:state_hovered="true"`


    `android:drawable="@drawable/imagebutton_pressed" />`


    `<item android:state_hovered="true"`


    `android:drawable="@drawable/imagebutton_focused" />`


    `<item android:drawable="@drawable/imagebutton_normal" />`


    `</selector>`


    Once this bookmark_states.xml file is built, you can go back to your `activity_contents.xml`
    file and use the Graphical Layout Editor tab, shown in Figure [9-16](#A978-1-4302-5786-8_9_Chapter.html#Fig16),
    to see what your ImageButton UI element will look like now that it is referencing
    your image assets via the bookmark_states.xml file.


    ![A978-1-4302-5786-8_9_Fig16_HTML.jpg](A978-1-4302-5786-8_9_Fig16_HTML.jpg)


    Figure 9-16.


    Using the Graphical Layout Editor tab to preview the <ImageButton> child tag and
    its parameters


    You will notice when you are in the Graphical Layout Editor tab that when you
    click the ImageButton, it selects it for editing rather than giving you the pressed
    state visual feedback that you are looking for!


    What this means is that you will need to use a Run As ➤ Android Application work
    process so you can test your application in the Nexus One emulator in order to
    make sure that your XML markup is all working together correctly.


    As you can see in Figure [9-17](#A978-1-4302-5786-8_9_Chapter.html#Fig17), your
    ImageButton color-shifts and turns gold when you click on it, but it looks a little
    bit too big to appear to users as a button UI element, so you need to shrink it
    down to a more button-like dimension. My first thought here was that Android only
    had the extra-high resolution image asset to work with, and was not downscaling
    it enough.


    ![A978-1-4302-5786-8_9_Fig17_HTML.jpg](A978-1-4302-5786-8_9_Fig17_HTML.jpg)


    Figure 9-17.


    Running the Nexus One emulator to text the ImageButton states in an application
    run environment


    So to make sure that this is not the problem, the first thing that you need to
    do is go back into GIMP and finish the work process that you started in the previous
    section of this chapter. As you know, you created the highest resolution version
    of these four image asset ImageButton states; however, you did not finish creating
    the other three resolution density versions of these assets for the LDPI, MDPI,
    and HDPI drawable folders. So the first thing that you need to do, since you have
    to do this anyway and are just putting a tedious work process off, is to create
    all your assets!'
  trans: "\n既然你已经为多状态`ImageButton`输出了超高清密度资源，最好保存一个 GIMP 原生文件格式的图像合成版本，以防将来因任何原因需要用到。在\
    \ GIMP 中，可通过`文件`菜单下的`保存`或`另存为`选项来完成此操作。\n\n执行此操作将打开`保存图像`对话框（见图 9-12），该对话框允许你将当前的\
    \ GIMP 项目以原生`.XCF`文件格式保存到原始图像合成资源所在的文件夹中。此文件包含你在数字图像合成工作流程中创建的所有图层和设置——我们在本章的这一部分中学习了如何创建各种`ImageButton`状态的数字图像资源。\n\
    \n![A978-1-4302-5786-8_9_Fig12_HTML.jpg](img/A978-1-4302-5786-8_9_Fig12_HTML.jpg)\n\
    \n**图 9-12.** 保存 GIMP 原生合成文件 `imagebutton_states.xcf`\n\n接下来，你可以进入 Eclipse ADT，编写必要的\
    \ XML 标记，以在`GraphicsDesign`应用中实现`ImageButton`的状态。\n\n## ImageButton 的可绘制对象：设置多状态\
    \ XML\n\n如果桌面上尚未打开 Eclipse ADT IDE，请启动它，然后右键单击并打开`/res/layout`文件夹中的`activity_contents.xml`\
    \ UI 定义文件。你将在`目录`底部添加一个`ImageButton` UI 元素，使用户能够访问你的`书签工具`，从而为`GraphicsDesign`应用构建应用内\
    \ Activity 导航。\n\n在你的第一个嵌套的`<LinearLayout>`标签内添加一个`<ImageButton>`子标签（如图 9-13 所示），并添加必要的`layout_`参数。\n\
    \n![A978-1-4302-5786-8_9_Fig13_HTML.jpg](img/A978-1-4302-5786-8_9_Fig13_HTML.jpg)\n\
    \n**图 9-13.** 将`<ImageButton>`子标签添加到第一个嵌套的`<LinearLayout>`子标签布局容器中\n\n让我们使用`android:id`参数，将你的`<ImageButton>`\
    \ UI 元素命名为`bookmarkImageButton`，并确保作为`ImageButton`状态资源一部分的 Alpha 通道能够完全透过你的`ImageButton`显示。这通过将`ImageButton\
    \ android:background`参数设置为 ARGB 十六进制值`#00000000`（相当于透明黑色）来实现 100%透明背景。\n\n由于你已经将`android:layout_width`和`android:layout_height`参数设置为标准的`wrap_content`常量，现在只需添加一个`android:contentDescription`参数即可——这是每个`ImageView`类（及其子类，如`ImageButton`）所必需的。既然你已经有一个引用你的`书签工具`的`<string>`常量，那就用它作为该参数字符串值，如下所示：\n\
    \n`android:contentDescription=\"@string/bookmark_utility\"`\n\n最后，让我们添加一个`android:src`参数，该参数将引用包含定义书签`ImageButton`状态的标记的\
    \ XML 文件。将此文件命名为`bookmark_states.xml`，并将其放在`/res/drawable`文件夹中。此参数的 XML 标记如下所示：\n\
    \n`android:src=\"@drawable/bookmark_states\"`\n\n现在你需要创建这个`bookmark_states.xml`可绘制对象\
    \ XML 定义，因此使用“新建 Android XML 文件”工作流程：右键单击`/res/drawable`文件夹，然后选择“新建” ➤ “Android\
    \ XML 文件”菜单序列。这将打开如图 9-14 所示的对话框，并自动将`资源类型`下拉菜单设置为`Drawable`，将`项目`下拉菜单设置为`GraphicDesign`。\n\
    \n![A978-1-4302-5786-8_9_Fig14_HTML.jpg](img/A978-1-4302-5786-8_9_Fig14_HTML.jpg)\n\
    \n**图 9-14.** 创建资源类型为 Drawable、根元素为`<selector>`的新 Android XML 文件\n\n将文件命名为`bookmark_states`，选择根元素类型为`<selector>`，然后点击`完成`按钮，即可在项目的`/res/drawable`文件夹中创建引导性的`bookmark_states.xml`文件。\n\
    \n现在你可以为`ImageButton`可绘制对象的每个状态添加`<item>`子标签，如图 9-15 所示。如你所见，顺序依次为悬停、按下、聚焦、正常——这与你将鼠标悬停在对象上、点击、释放，然后将鼠标移出对象影响范围的顺序一致。\n\
    \n![A978-1-4302-5786-8_9_Fig15_HTML.jpg](img/A978-1-4302-5786-8_9_Fig15_HTML.jpg)\n\
    \n**图 9-15.** 向`bookmark_states.xml`文件添加`<item>`标签以定义 ImageButton 状态的可绘制对象资源\n\
    \n用于在父级`<selector>`标签内实现四个`<item>`子标签的 XML 标记，按它们需要出现的顺序排列，如下所示：\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"utf-8\"?>\n<selector xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    >\n    <item android:state_hovered=\"true\"\n          android:drawable=\"@drawable/imagebutton_hovered\"\
    \ />\n    <item android:state_pressed=\"true\"\n          android:drawable=\"\
    @drawable/imagebutton_pressed\" />\n    <item android:state_focused=\"true\"\n\
    \          android:drawable=\"@drawable/imagebutton_focused\" />\n    <item android:drawable=\"\
    @drawable/imagebutton_normal\" />\n</selector>\n```\n\n一旦构建好这个`bookmark_states.xml`文件，你可以返回`activity_contents.xml`文件，使用图形布局编辑器选项卡（如图\
    \ 9-16 所示），查看你的`ImageButton` UI 元素现在通过`bookmark_states.xml`文件引用图像资源后的外观。\n\n![A978-1-4302-5786-8_9_Fig16_HTML.jpg](img/A978-1-4302-5786-8_9_Fig16_HTML.jpg)\n\
    \n**图 9-16.** 使用图形布局编辑器选项卡预览`<ImageButton>`子标签及其参数\n\n你会注意到，在图形布局编辑器选项卡中，当你点击`ImageButton`时，它会选中该按钮进行编辑，而不是显示你期望的按下状态视觉反馈！这意味着你需要使用“运行为”\
    \ ➤ “Android 应用程序”工作流程，以便在 Nexus One 模拟器中测试你的应用程序，确保你的 XML 标记都能正确协同工作。\n\n如图 9-17\
    \ 所示，你的`ImageButton`在点击时会变色并变为金色，但它看起来尺寸过大，不像一个按钮 UI 元素，因此你需要将其缩小到更符合按钮的尺寸。我的第一个想法是，Android\
    \ 只有超高清图像资源可用，并且没有进行足够的缩小。\n\n![A978-1-4302-5786-8_9_Fig17_HTML.jpg](img/A978-1-4302-5786-8_9_Fig17_HTML.jpg)\n\
    \n**图 9-17.** 运行 Nexus One 模拟器以在应用程序运行环境中测试 ImageButton 状态\n\n因此，为了确保这不是问题所在，你需要做的第一件事是返回\
    \ GIMP，完成你在本章上一节开始的工作流程。如你所知，你创建了这四个图像资源`ImageButton`状态的最高分辨率版本；但是，你还没有完成这些资源在其他三种分辨率密度（LDPI、MDPI\
    \ 和 HDPI 可绘制对象文件夹）下的版本创建。所以，既然无论如何你都需要完成这项工作，只是暂时拖延了这个繁琐的工作流程，那么你首先要做的就是创建所有资源！\n"
- fmt: '# Create All ImageButton State Assets: Density Resolutions


    Since you’re using 32-bit PNG high quality digital image file format across all
    of your assets, you can simply open up the 360 pixel XHDPI image assets and downsample
    them to even multiples. These would include 120 pixels (3X downsample) for LDPI,
    180 pixels (2X downsample) for MDPI, and 240 pixels (a 1.5X downsample) for HDPI.


    Let’s launch GIMP and use the `File ➤ Open` menu sequence to access the `Open
    Image` dialog, as shown in Figure [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18).
    Next, use the left-side `Places` pane to navigate into your `/workspace/GraphicsDesign/res/drawable-xhdpi`
    folder, and select the `imagebutton_normal.png` file and click the `Open` button
    to open this digital image asset up inside of GIMP.


    ![A978-1-4302-5786-8_9_Fig18_HTML.jpg](A978-1-4302-5786-8_9_Fig18_HTML.jpg)


    Figure 9-18. Opening the XHDPI `imagebutton_normal.png` state


    The next step in this work process is to use the `Image` menu and the `Scale Image`
    tool dialog to downsample your image size from 360 pixels to half that size on
    each of the X and Y image axis to 180 x 180 pixels, which is a 2X or 100% downsampling
    of the image.


    It is important to note that even (2X, 4X, 8X) downsample operations will yield
    the best results, so you will create the MDPI image assets first. You can make
    sure the lock on the X and Y resolution input fields is set, and then enter the
    180 in the first field; when you press return, or click in the second field, the
    second 180 will be entered for you.


    Next, make sure that the cubic interpolation algorithm option is selected in the
    drop-down menu near the bottom of this dialog. Cubic interpolation in GIMP is
    the same as bicubic interpolation in Photoshop, so this is the highest quality
    sampling that you are going to get using GIMP. Once you’re done setting the dialog
    parameters, click the `Scale` button, as shown in Figure [9-19](#A978-1-4302-5786-8_9_Chapter.html#Fig19),
    and the image will downsample to a size shown in Figure [9-20](#A978-1-4302-5786-8_9_Chapter.html#Fig20).


    ![A978-1-4302-5786-8_9_Fig19_HTML.jpg](A978-1-4302-5786-8_9_Fig19_HTML.jpg)


    Figure 9-19. Using the `Image ➤ Scale Image` menu sequence to scale the image
    asset from XHDPI to MDPI


    Note the high quality downsample result for the new image in Figure [9-20](#A978-1-4302-5786-8_9_Chapter.html#Fig20).
    Now you are ready to use the `File ➤ Export` work process to export your new MDPI
    digital image asset. I dropped-down the menu and showed the selection in Figure
    [9-20](#A978-1-4302-5786-8_9_Chapter.html#Fig20) as well to get twice the mileage
    out of the screen shot.


    ![A978-1-4302-5786-8_9_Fig20_HTML.jpg](A978-1-4302-5786-8_9_Fig20_HTML.jpg)


    Figure 9-20. Using the `File ➤ Export` menu sequence to export the 180 pixel MDPI
    `ImageButton` normal state


    You are going to use the `Export Image` dialog, shown in Figure [9-12](#A978-1-4302-5786-8_9_Chapter.html#Fig12),
    to save this MDPI image asset using the same exact file name, but into a different
    (`res/drawable-mdpi`) folder, making it a different file, at least as far as Android
    is concerned. Android uses the same file name in multiple folders!


    If you export the file to the XHDPI folder, it will replace your 360 pixel asset,
    so do be very careful regarding what you are doing during this work process. Figure
    [9-21](#A978-1-4302-5786-8_9_Chapter.html#Fig21) shows the same file name highlighted
    in blue, and the different folder path in the `Save in folder:` line right underneath
    it.


    ![A978-1-4302-5786-8_9_Fig21_HTML.jpg](A978-1-4302-5786-8_9_Fig21_HTML.jpg)


    Figure 9-21. Exporting the 180 pixel `imagebutton_normal.png` asset to the `drawable-mdpi`
    folder


    Once you have everything set correctly, click the `Export` button and the file
    will be created in your MDPI folder at a proper 180 pixel resolution.


    The next step in your work process is to utilize an `Edit ➤ Undo Scale Image`
    menu sequence shown in Figure [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22)
    to undo the 2X downsample and return to your XHDPI resolution image. You always
    want to downsample using a high resolution image source, so you get a good result
    from the cubic algorithm.


    ![A978-1-4302-5786-8_9_Fig22_HTML.jpg](A978-1-4302-5786-8_9_Fig22_HTML.jpg)


    Figure 9-22. Undoing the `Scale Image` operation to return to 360 pixel version
    of the normal state for better sampling


    Once you return to the 360 pixel XHDPI source image, you will need to then repeat
    the work process shown in Figures [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18)
    through [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22) for the LDPI 120 pixel
    and the HDPI 240 pixel `imagebutton_normal.png` image assets. The `Scale Image`
    dialogs containing the settings for both of these sampling operations are shown
    in Figure [9-23](#A978-1-4302-5786-8_9_Chapter.html#Fig23), just to make sure
    you set them right!


    ![A978-1-4302-5786-8_9_Fig23_HTML.jpg](A978-1-4302-5786-8_9_Fig23_HTML.jpg)


    Figure 9-23. Scaling normal state asset to 120 pixels (LDPI) and 240 pixels (HDPI)
    to create normal state assets


    The next steps involve repeating this work process using your other three image
    state assets. These will include the `imagebutton_pressed.png`, `imagebutton_focused.png`,
    and `imagebutton_hovered.png` image assets. These three `ImageButton` state assets
    need to be downsampled into an LDPI, MDPI and HDPI asset resolution. This can
    be done in any sequence that you wish, as long as it all gets done in the end.


    The first step in doing this remaining downsampling (in addition to those steps
    shown in Figures [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18) through [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22))
    is to completely close out the `imagebutton_normal.png` 360 pixel asset, without
    saving it into any other (lower) resolution by accident. There are two ways to
    do this; I am going to show you how to be redundant and do both of them, so that
    you’ll always be 100% assured that you do not “blow away” any of your high-resolution
    source assets by accident.


    The first way is to always use your `Edit ➤ Undo Scale Image` work process, which
    is shown in Figure [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22). The second
    is to use the `File ➤ Close` work process, which is shown in Figure [9-24](#A978-1-4302-5786-8_9_Chapter.html#Fig24),
    and to use the `Close without Saving` option in the dialog, which is shown on
    the right, even if you do use the `Undo Scale Image` work process. This will assure
    that the high-resolution asset that you opened at the beginning of the work process
    always remains intact on your hard disk drive, because you Never Save Over It!


    ![A978-1-4302-5786-8_9_Fig24_HTML.jpg](A978-1-4302-5786-8_9_Fig24_HTML.jpg)


    Figure 9-24. Closing normal image asset without saving over the original data
    so that you can open the next state


    Next let’s use this work process to close the `imagebutton_normal.png` asset and
    open one of the other assets and create the other three DPI resolution assets
    for that `ImageButton` state by using the work process outlined in Figures [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18)
    through [9-24](#A978-1-4302-5786-8_9_Chapter.html#Fig24).


    Once you do this for all four `ImageButton` states, you should have a pretty good
    handle on the digital image compositing and downsampling work process involved
    in creating a multi-state `ImageButton` for use in Android application development.


    Once you have created all 16 multi-state `ImageButton` assets, you can go back
    into Eclipse ADT and see if having all of these smaller `ImageButton` state image
    assets will give you a smaller `ImageButton` UI element, or if you have to construct
    a solution to that problem through the use of additional XML parameters.'
