    ## Summary


    In this second chapter, you learned about digital video concepts, formats, terms,
    settings, and optimization. You also created the foundation (which is also known
    as the app bootstrap code) infrastructure that will contain your `pro.android.graphics`
    package and your `GraphicsDesign` application.


    We started by looking at two primary video formats used in Android and HTML5,
    the MPEG-4 H.264 AVC and Google’s WebM VP8 format. You learned that MPEG-4 playback
    is supported in all versions of Android and that WebM is supported in 2.3.3 and
    later, with streaming support in Android 4.0 and later versions. You learned that
    H.263 is mainly used for video conferencing.


    We then took an overview of the Android `VideoView` and `MediaPlayer` classes.
    These classes are utilized to play digital video via XML markup and Java code
    within an application. You also implemented a `VideoView` user interface element
    in your `MainActivity` user interface design to hold your video data.


    Next, we looked at the foundation of digital video, frames and frame rates expressed
    as frames per second, or FPS. We looked at how to calculate the raw data footprint
    “impact” of different resolutions and frame rates, so you know how to measure
    the data that is going into your compression work process. This allows you to
    calculate your actual data footprint reduction.


    We took a look at industry standard SD and HD resolutions for traditional video,
    and at the concepts of streaming versus captive video and bit rate. You learned
    that bit rates are not only useful in fitting your data through a given network
    bandwidth capacity (data pipe size), but also to take into account the amount
    of processing power in a mobile (embedded) device. This is because it’s important
    for the user to be able to decode this amount of data per second (bit rate) smoothly
    so they have a good user experience.


    Next, we looked at video scaling in Android and the need to provide a few resolution
    density targets for your video so that Android does not have to scale it video
    to any great (drastic) amount. Currently, Android does not have a bicubic interpolation
    algorithm (it does have a bilinear filter).


    Finally, we looked at what codecs do and the compression setting types used for
    digital video optimization. We looked at the digital video characteristics and
    codec settings that affect data footprint the most down to the least. You learned
    that there’s no silver bullet for optimizing digital video, that each data stream
    is unique (at least as far as the codec sees it), and that optimizing your digital-video-data
    footprint-to-playback-quality ratio is an iterative process at best, and takes
    both time and experience.


    To make sure that you made steady progress on your Pro Android Graphics app, you
    also took some time to create a shell for your application using the `New Android
    Application` series of dialogs. We took a look at what they gave you as a bootstrap,
    and configured an XML user interface design to play video on the splash screen
    in a `MainActivity.java` Activity subclass for your `GraphicsDesign` app in your
    new `pro.android.graphics` package.


    You then created your video asset by installing and using the Terragen 3 3D animation
    software to generate 400 frames of virtual world animation, and then installed
    and used the VirtualDub 1.9 software to load those frames using an AVI digital
    video format container. You imported that AVI into the Sorenson Squeeze Pro 9
    software and compressed it to less than 1% of its original size so that you could
    include it inside your app’s APK (captive).


    Finally, you wrote the Java code to implement this video in your `onCreate()`
    method and learned about the `VideoView`, `URI`, and `MediaController` classes.


    In the next chapter, you will learn about frame animation concepts, formats, terms,
    techniques, and optimization. You will implement a frame or bitmap animation in
    your `GraphicsDesign` app by using the `AnimationDrawable` class.'
