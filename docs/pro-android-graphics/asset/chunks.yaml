    still need to import the Context class.


    ![A978-1-4302-5786-8_19_Fig23_HTML.jpg](A978-1-4302-5786-8_19_Fig23_HTML.jpg)


    Figure 19-23.


    Removing the final error regarding an Import android.content.Context statement
    that needs to be added


    After you select the Import ‘Context’ (android.content) option and add the Import
    statement necessary to use this class, your Display object will be declared, named,
    and loaded with the default display information for your user’s current primary
    Android device.


    Next, we are going to take a brief look at the Android Surface class, since you
    will be using it in your switch case loop that you will be coding next.


    ## Android’s Surface Class: Grab Your Display’s Raw Buffer


    Android also has a class called the Surface class, which allows developers to
    directly access the “raw” or source memory “buffer” that draws what is on the
    Android device screen to the physical hardware itself. You are going to need to
    access this in order to determine how Android users have turned their devices
    (to the left, to the right, even upside down).


    The Android Surface class is another direct subclass of java.lang.Object, the
    master class, so it was created specifically to provide this “handle” to a display
    screen surface for developers if they really need to use it. The Surface class
    also extends the android.os.Parcelable interface.


    The Android Surface class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.Surface`


    The Display class belongs in the android.view package because it directly accesses
    and (depending on your code) affects what is in your View object. The import statement
    for using the Surface class (or object) in your apps should reference the android.view.Surface
    package.


    The Surface class is a public class and contains one nested class, called the
    Surface.OutOfResourcesException class. This class will throw an exception when
    the Surface object that you are trying to reference cannot be created, resized,
    rotated, or otherwise manipulated in the fashion that you are trying to achieve
    within your graphics processing code pipeline.


    The Surface class also has one public constructor method that allows you to create
    a Surface object using a SurfaceTexture object. This is done via the following
    form: Surface(SurfaceTexture surfaceTextureName).


    The Surface class has four key constants, which you’ll be leveraging in your code
    in the next section of this chapter, that are used to determine how the user is
    holding the Android device. These ROTATION constants not only determine if the
    Android device is being used in the portrait or landscape mode, but which direction
    that the device has been rotated into.


    The four constants, like so many other things in Android, are positioned at 3,
    6, 9, and 12 o’clock. They are named, as you might expect, ROTATION_0, ROTATION_90,
    ROTATION_180 and ROTATION_270\. Let’s get to work and utilize the Surface.ROTATION
    constants in your code so you can see how they’re used.


    ## Using a .getRotation() Method Call to Drive a Switch Loop


    Right after your Display object creation and configuration, you are going to add
    a switch loop (case statements) that will detect the current rotation or orientation
    (portrait or landscape) of the user’s Android device.


    The switch statement will evaluate a call to the .getRotation() method off of
    your rotationDegrees Display object that you created in the previous line of code.
    This method call returns one of four Surface.ROTATION constants, which you will
    then evaluate using case constructs, and then use to set your splashScreenUri
    Uri object’s reference value to the correct video asset. This is done by using
    the following Java code, as shown in Figure [19-24](#A978-1-4302-5786-8_19_Chapter.html#Fig24):


    `switch(rotationDegrees.getRotation()){`


    `case(Surface.ROTATION_0):`


       `splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag480x800portrait.webm`](http://www.e-bookclub.com/pag480x800portrait.webm)
    `);`


       `break;`


    `case(Surface.ROTATION_90):`


       `splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag800x480landscape.webm`](http://www.e-bookclub.com/pag800x480landscape.webm)
    `);`


       `break;`


    `}`


    ![A978-1-4302-5786-8_19_Fig24_HTML.jpg](A978-1-4302-5786-8_19_Fig24_HTML.jpg)


    Figure 19-24.


    Coding a switch statement to evaluate the results of a .getRotation() method call
    off a Display object


    As you can see in Figure [19-24](#A978-1-4302-5786-8_19_Chapter.html#Fig24), you
    will need to mouse-over the reference to the Surface class and select the Import
    Surface (android.view) option.


    Although using the ROTATION_0 and ROTATION_90 will tell you if the Android device
    has been rotated to the left (ROTATION_90) or has not been rotated, you also need
    to add support for those constants that tell you if the device has been rotated
    to the right (ROTATION_270) or been turned “upside down” (ROTATION_180), just
    to make 100% sure that your case statement will handle every single result that
    the .getRotation() method call is able to return.


    If you handle each of the four Surface class constants, you will not need to add
    any default return statement to your switch programming statement, as you will
    be handling 100% of the values that can come into your statement’s evaluation
    mechanism. So let’s add the final two case statements to your switch construct
    using the following Java code, as shown in Figure [19-25](#A978-1-4302-5786-8_19_Chapter.html#Fig25):


    `case(Surface.ROTATION_180):`


       `splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag480x800portrait.webm`](http://www.e-bookclub.com/pag480x800portrait.webm)
    `);`


       `break;`


    `case(Surface.ROTATION_270):`


       `splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag800x480landscape.webm`](http://www.e-bookclub.com/pag800x480landscape.webm)
    `);`


       `break;`


    ![A978-1-4302-5786-8_19_Fig25_HTML.jpg](A978-1-4302-5786-8_19_Fig25_HTML.jpg)


    Figure 19-25.


    Adding all four screen rotation orientations to the switch statement to cover
    0, 90, 180, and 270 degrees


    Now you need to test the code to see if it’s working the way you want it to!'
