  trans: '

    如你所见，书签图像的 Alpha 通道似乎被正确识别，`CloudSky` 图像被混合到了书签图像中，这次在文本区域和周围的金属环上产生了不那么微妙的效果。


    如果你还记得 `OVERLAY` 模式类似于 `SCREEN` 和 `MULTIPLY` 的组合，你会发现书签图像中的 `BLACK` 区域在 `SCREEN`
    模式和 `OVERLAY` 模式下的处理方式截然不同（完全相反）。这对于你未来进行合成和混合操作来说，是一个需要重点记录的要点。


    接下来，我们尝试一下 `LIGHTEN` 混合模式。再次进入你的 Java 代码，将 `PorterDuff.Mode.SCREEN` 常量修改为 `PorterDuff.Mode.LIGHTEN`
    常量，然后再次使用“Run As ➤ Android Application”查看结果，如图 11-17 截图的左侧所示。


    如你所见，`SCREEN` 和 `LIGHTEN` 混合模式确实非常相似。至少在使用 `SCREEN` 混合模式时，文本是可读的，而使用 `LIGHTEN`
    混合模式时则难以辨认。然而，这种混合模式似乎确实尊重了 Alpha 通道数据，因此看起来 `PorterDuffXfermode`、`PorterDuff`
    和 `PorterDuff.Mode` 类是没有错误的，我们之前看到的问题可能只是出在 `ColorFilter` 类或 `PorterDuffColorFilter`
    类的代码中。


    ![A978-1-4302-5786-8_11_Fig17_HTML.jpg](img/A978-1-4302-5786-8_11_Fig17_HTML.jpg)


    **图 11-17.** 在 Nexus One 模拟器中测试 `LIGHTEN`（左）和 `DARKEN`（右）的 `PorterDuff.Mode` 常量


    最后，让我们看看 Android 像素混合模式中的最后一种——`DARKEN` 模式，并了解它如何使用这两个源图像资源工作。


    进入 Eclipse 中的 Java 代码，将 `PorterDuff.Mode.LIGHTEN` 常量修改为 `PorterDuff.Mode.DARKEN`
    常量，再次使用“Run As ➤ Android Application”查看结果，如图 11-17 截图的右侧所示。`DARKEN` 常量的效果是让你的前景图像（bookmark0.png）看起来像玻璃一样透明。


    当你比较图 11-16 中的 `OVERLAY` 和图 11-17 中的 `DARKEN` 时，可以看到 `OVERLAY` 将你的 `CloudSky`
    渲染到书签 UI 环上，就像纹理贴图（也称为反射贴图）一样，这在 3D 中非常常见。这种混合模式似乎能保持这个环状设计元素的金属外观，并为你提供不错的 3D
    渲染效果。


    另一方面，`DARKEN` 混合模式让你的环看起来像是透明的玻璃制成的。正如你现在所看到的，这就是为什么许多特殊效果可以使用混合模式有效地制作和实现，无论是在
    Adobe Photoshop、GIMP 中，还是直接在 Android 应用程序代码中。像素混合是一个强大的工具。


    ## 总结


    在这第十一章中，你学习了更多关于 Android 的 `PorterDuff` 和 `PorterDuff.Mode` 类，以及 `PorterDuffXfermode`
    类和 `PorterDuffColorFilter` 类的知识。这些类用于在 Android 中实现图像混合。这包括将颜色值变化混合到图像资源中，以实现颜色或对比度校正，或使用单个图像源创建一系列图像资源，以及实现特殊效果。


    我们首先探讨了像素混合和传输模式的核心数字图像合成概念，以及这些能力如何允许开发者利用其 `/res/drawable/` 文件夹中的图像资源来实现令人印象深刻的特殊效果。


    接着，我们仔细研究了 Android 中的核心 `PorterDuff` 类，它实现了你在第一节中学到的图像混合技术和像素传输概念。这个类包含了混合和传输模式的核心算法，这些算法通过
    Android 操作系统中其他与 PorterDuff 相关的类来调用。


    然后，你学习了 `PorterDuff.Mode` 嵌套类，它包含了 18 个常量。我们查看了所有 18 个常量，以确切了解每个常量的作用，以及用于将图像源
    Alpha（`Sa`）、源颜色（`Sc`）、目标 Alpha（`Da`）和目标颜色（`Dc`）像素数据值混合或传输到最终合成图像中的算法方程。


    我们首先查看了五种图像混合算法和一个实用算法，然后介绍了像素传输算法，以及它们与布尔集合运算的相似之处。在概述了通过 `PorterDuff.Mode` 常量可以使用的功能之后，是时候看看
    `PorterDuffColorFilter` 类来实现像素颜色混合了。


    然后，我们准备好实现 Android 中两个专用 PorterDuff 类中的第一个：`PorterDuffColorFilter` 类。我们学习了如何使用
    `.setColorFilter()` 方法，并将颜色值和 `PorterDuff.Mode` 常量规格作为参数值来实现这个类。


    接下来，我们研究了更高级的 `PorterDuffXfermode` 类，它允许我们在其他类型的图形资源之间应用 PorterDuff 传输模式（`Xfermode`）和混合模式常量。在这里，我们使用了数字图像资源，因为位图提供了在
    Android 操作系统中产生令人印象深刻的图像合成特殊效果所需的自由度。


    你采用了动手实践的方法，创建了大约十几行高级 Java 代码，并添加了 XML `<ImageView>` 标签，在你的 `GraphicsDesign`
    应用程序的 `ContentsActivity` 类中实现了数字图像混合。


    在此过程中，你了解了 Android 操作系统中所有主要的图形相关类，包括 `Bitmap`、`BitmapFactory`、`Paint` 和 `Canvas`
    类。你了解了每个类在 Android 图形处理中的作用，并看到了它们如何协同工作，使你能够实现图像混合模式，从而可以将两个数字图像资源合成在一起。这使你能够直观地了解这些混合模式，你将在应用程序中对图像使用这些模式来调用图像合成和特殊效果。


    我们查看了你将用于数字图像合成和特殊效果的六种主要混合模式，并且在你的代码中使用了它们，以确定它们对你的应用程序中两个现有图像的具体作用。


    这些传输（`XOR`）和混合模式包括 `OVERLAY`、`SCREEN`、`LIGHTEN`、`DARKEN`、`MULTIPLY` 和 `XOR`。我鼓励读者在他们本章编写的代码中尝试所有
    PorterDuff 模式，以便实验这些模式在图像处理能力方面提供什么。


    在下一章中，你将学习如何在 Android 操作系统中使用数字图像层，以及如何使用 Android 中的 `LayerDrawable` 类。这将使你将 Android
    图像合成图形设计和特殊效果工作提升到另一个层次，这将包括在你本章已学到的关于 PorterDuff 混合模式及其实现的知识基础上，结合使用 `PorterDuffXfermode`、`PorterDuffColorFilter`
    类以及 `PorterDuff.Mode` 嵌套类。

    '
- fmt: "# 12. Advanced Image Compositing: Using the `LayerDrawable` Class\n\n## Abstract\n\
    \nIn this twelfth chapter, we'll take a closer look at the role that layers play\
    \ in Android and digital image compositing, as well as how to implement layers\
    \ in Android to enhance our digital image compositing capabilities.\n\nIn this\
    \ twelfth chapter, we’ll take a closer look at the role that layers play in Android\
    \ and digital image compositing, as well as how to implement `LayerDrawable` objects\
    \ in Android to enhance our digital image compositing capabilities.\n\nLayers\
    \ are created and managed in Android applications by using one of the subclasses\
    \ of the `Drawable` superclass. This subclass specifically manages layer stacks\
    \ and is called the `LayerDrawable` class.\n\nA layer will allow more advanced\
    \ digital image compositing to be performed because it allows more than just an\
    \ image or two to be composited together, such as you did in the previous chapter\
    \ on PorterDuff image blending modes.\n\nA `LayerDrawable` object in Android is\
    \ a good example of the concept of Java objects being made up of other Java objects,\
    \ as the `LayerDrawable` contains other `Drawable` objects. This is often `BitmapDrawable`\
    \ objects, in the case of graphics design, and the objective is usually the creation\
    \ of composite graphics objects that are made up of component image parts.\n\n\
    This is usually done to either create a special effect or to allow for the optimization\
    \ of the application image assets total data footprint by using layers to break\
    \ images down into their component parts so that the indexed color space can be\
    \ used to save each image asset, and thereby to save 100% or more on the total\
    \ data footprint. The way this works is that if you can save image parts (as layers)\
    \ into files that can effectively provide great image quality using 256 (indexed)\
    \ colors instead of 16,777,216 (truecolor) colors, and later composite them into\
    \ an image that looks like it is using truecolor but is really a `LayerDrawable`\
    \ object using indexed color assets.\n\n## Layer Drawables: Take Image Compositing\
    \ to a New Level\n\nLet’s get an overview of how digital imaging layers are implemented\
    \ in Android. In Android, layers are called Layer Drawables, and use Android’s\
    \ `LayerDrawable` class. We will also take a look at where layers can be used\
    \ to their best advantage in an Android application and in your Pro Android Graphics\
    \ design work process.\n\nBy and large, layers are most often utilized with digital\
    \ image compositing objectives, which many digital imaging artisans perform using\
    \ professional digital imaging software packages such as Adobe Photoshop CS6,\
    \ GIMP 2.8.6, or Corel’s Painter, CorelDraw, or PaintShop Pro software packages.\n\
    \nThe same compositing objectives that can be accomplished in these popular digital\
    \ image compositing software packages can also be obtained inside the Android\
    \ OS. However, you need to be advanced enough to code your very own image compositing\
    \ rendering pipeline using XML and Java; you will be learning about some of the\
    \ Android classes and the work processes that can be utilized to accomplish this\
    \ later on in this chapter.\n\nBe advised that this is significantly more difficult\
    \ than just using one of these digital imaging software packages itself, and that\
    \ alone can be very complicated in and of itself, as you’ve seen earlier on in\
    \ this book.\n\nLayers are used in Android when there is more than one `Drawable`\
    \ asset that needs to be combined in your application in an advanced way to achieve\
    \ any end result. This could be anything from text overlays to image blending\
    \ to special effects applications. You can use any type of Android `Drawable`\
    \ for use in a `LayerDrawable` layer stack, so it is a very flexible layer system.\n\
    \nIt is important to note that as long as you’re great at implementing alpha channels,\
    \ you don’t have to necessarily implement blending modes to create an effective\
    \ image composite, as you’ve already seen in previous chapters.\n\nLayers in Android\
    \ can be made to be very similar to the layers found in popular digital imaging\
    \ software packages such as GIMP 2.8.6. Android layers can have opacity values\
    \ assigned; they can also access blending modes and utilize alpha channels as\
    \ well as most of the other core things that a graphics artist would need to implement\
    \ special digital imaging effects into their graphics rendering pipeline.\n\n\
    You’ll add `LayerDrawable` capabilities into what Android PorterDuff blending\
    \ modes do, since you already wrote the code in the previous chapter to blend\
    \ images on a pixel-by-pixel basis.\n\nSo, by the end of this chapter, you will\
    \ have combined the blending and transfer modes that you learned in the previous\
    \ chapter with the layer capabilities of the `LayerDrawable` object into one comprehensive\
    \ Java-based image compositing and blending rendering pipeline.\n\n## Android’s\
    \ `LayerDrawable` Class: A Foundation for Layers\n\nThe Android `LayerDrawable`\
    \ class is a direct subclass of the `Drawable` class, which is itself a direct\
    \ subclass of the `java.lang.Object` master class.\n\n`LayerDrawable` is therefore\
    \ a `Drawable` subclass that implements all of the features of the `Drawable`\
    \ class as well as the additional features necessary for layer management that\
    \ are specific to the `LayerDrawable` class.\n\nThe Android `LayerDrawable` class\
    \ hierarchy is structured as follows:\n\n```\njava.lang.Object\n  > android.graphics.drawable.Drawable\n\
    \    > android.graphics.drawable.LayerDrawable\n```\n\nThe Android `LayerDrawable`\
    \ class is a part of its `android.graphics.drawable` package, and as such, its\
    \ import statement logically references your `android.graphics.drawable.LayerDrawable`\
    \ package import path, as you’ll see later on in the chapter when you write the\
    \ Java app code that implements `LayerDrawable` objects for your own layer management\
    \ objectives.\n\nThe `LayerDrawable` class also has one direct subclass of its\
    \ own called the `TransitionDrawable` class. We will be covering the `TransitionDrawable`\
    \ class in the next chapter of this book, so stay tuned.\n\nA `LayerDrawable`\
    \ object is a type of `Drawable` object in Android that has the ability to create\
    \ and manage an array of other `Drawable` objects. The `Drawable` objects within\
    \ the array are always drawn to the screen using their array order, so the `Drawable`\
    \ element that features the largest index number will always be drawn on the top\
    \ of the layer stack. You’ll see exactly how this works later, after you implement\
    \ your `LayerDrawable` object.\n\nA `LayerDrawable` object is usually defined\
    \ by using an XML definition file, and by then using the `<layer-list>` parent\
    \ tag. Each `Drawable` object inside your `LayerDrawable` container object defined\
    \ by this `<layer-list>` parent tag will then be defined by using a nested `<item>`\
    \ child tag, as you’ll see in the next section of the chapter when you create\
    \ your own `LayerDrawable`.\n\nA `LayerDrawable` class has six XML attributes\
    \ or parameters. Obviously, the most important are your `android:drawable` parameter,\
    \ which allows you to specify your drawable image assets, and your `android:id`\
    \ parameter, which allows you to specify an ID for a layer so that it can be referenced\
    \ later inside your Java code.\n\nThe other four parameters specify each layer’s\
    \ coordinates or positioning, using pixels (PX), device-independent pixels (DIP\
    \ or DP), millimeter (MM), inches (IN), or scaled pixels (SP) as the unit of measurement\
    \ along with a floating point value. The parameters include `android:top`, `android:bottom`,\
    \ `android:left`, and `android:right`, and are not necessary if your image assets\
    \ each fill their `Drawable` (and thus their `LayerDrawable`) containers."
  raw: '# 12. Advanced Image Compositing: Using the LayerDrawable Class


    Abstract


    In this twelfth chapter, we''ll take a closer look at the role that layers play
    in Android and digital image compositing, as well as how to implement Layers in
    Android to enhance our digital image compositing capabilities.


    In this twelfth chapter, we’ll take a closer look at the role that layers play
    in Android and digital image compositing, as well as how to implement LayerDrawable
    objects in Android to enhance our digital image compositing capabilities.


    Layers are created and managed in Android applications by using one of the subclasses
    of the Drawable superclass. This subclass specifically manages layer stacks and
    is called the `LayerDrawable` class.


    A layer will allow more advanced digital image compositing to be performed because
    it allows more than just an image or two to be composited together, such as you
    did in the previous chapter on PorterDuff image blending modes.


    A LayerDrawable object in Android is a good example of the concept of Java objects
    being made up of other Java objects, as the LayerDrawable contains other Drawable
    objects. This is often BitmapDrawable objects, in the case of graphics design,
    and the objective is usually the creation of composite graphics objects that are
    made up of component image parts.


    This is usually done to either create a special effect or to allow for the optimization
    of the application image assets total data footprint by using layers to break
    images down into their component parts so that the indexed color space can be
    used to save each image asset, and thereby to save 100% or more on the total data
    footprint. The way this works is that if you can save image parts (as layers)
    into files that can effectively provide great image quality using 256 (indexed)
    colors instead of 16,777,216 (truecolor) colors, and later composite them into
    an image that looks like it is using truecolor but is really a LayerDrawable object
    using indexed color assets.


    ## Layer Drawables: Take Image Compositing to a New Level


    Let’s get an overview of how digital imaging layers are implemented in Android.
    In Android, layers are called Layer Drawables, and use Android’s `LayerDrawable`
    class. We will also take a look at where layers can be used to their best advantage
    in an Android application and in your Pro Android Graphics design work process.


    By and large, layers are most often utilized with digital image compositing objectives,
    which many digital imaging artisans perform using professional digital imaging
    software packages such as Adobe Photoshop CS6, GIMP 2.8.6, or Corel’s Painter,
    CorelDraw, or PaintShop Pro software packages.


    The same compositing objectives that can be accomplished in these popular digital
    image compositing software packages can also be obtained inside the Android OS.
    However, you need to be advanced enough to code your very own image compositing
    rendering pipeline using XML and Java; you will be learning about some of the
    Android classes and the work processes that can be utilized to accomplish this
    later on in this chapter.


    Be advised that this is significantly more difficult than just using one of these
    digital imaging software packages itself, and that alone can be very complicated
    in and of itself, as you’ve seen earlier on in this book.


    Layers are used in Android when there is more than one Drawable asset that needs
    to be combined in your application in an advanced way to achieve any end result.
    This could be anything from text overlays to image blending to special effects
    applications. You can use any type of Android Drawable for use in a LayerDrawable
    layer stack, so it is a very flexible layer system.


    It is important to note that as long as you’re great at implementing alpha channels,
    you don’t have to necessarily implement blending modes to create an effective
    image composite, as you’ve already seen in previous chapters.


    Layers in Android can be made to be very similar to the layers found in popular
    digital imaging software packages such as GIMP 2.8.6\. Android layers can have
    opacity values assigned; they can also access blending modes and utilize alpha
    channels as well as most of the other core things that a graphics artist would
    need to implement special digital imaging effects into their graphics rendering
    pipeline.


    You’ll add LayerDrawable capabilities into what Android PorterDuff blending modes
    do, since you already wrote the code in the previous chapter to blend images on
    a pixel-by-pixel basis.


    So, by the end of this chapter, you will have combined the blending and transfer
    modes that you learned in the previous chapter with the layer capabilities of
    the LayerDrawable object into one comprehensive Java-based image compositing and
    blending rendering pipeline.


    ## Android’s LayerDrawable Class: A Foundation for Layers


    The Android `LayerDrawable` class is a direct subclass of the `Drawable` class,
    which is itself a direct subclass of the `java.lang.Object` master class.


    LayerDrawable is therefore a Drawable subclass that implements all of the features
    of the Drawable class as well as the additional features necessary for layer management
    that are specific to the LayerDrawable class.


    The Android LayerDrawable class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.drawable.Drawable`


        `> android.graphics.drawable.LayerDrawable`


    The Android LayerDrawable class is a part of its `android.graphics.drawable` package,
    and as such, its import statement logically references your `android.graphics.drawable.LayerDrawable`
    package import path, as you’ll see later on in the chapter when you write the
    Java app code that implements LayerDrawable objects for your own layer management
    objectives.


    The LayerDrawable class also has one direct subclass of its own called the TransitionDrawable
    class. We will be covering the TransitionDrawable class in the next chapter of
    this book, so stay tuned.


    A LayerDrawable object is a type of Drawable object in Android that has the ability
    to create and manage an array of other Drawable objects. The Drawable objects
    within the array are always drawn to the screen using their array order, so the
    Drawable element that features the largest index number will always be drawn on
    the top of the layer stack. You’ll see exactly how this works later, after you
    implement your LayerDrawable object.


    A LayerDrawable object is usually defined by using an XML definition file, and
    by then using the `<layer-list>` parent tag. Each Drawable object inside your
    LayerDrawable container object defined by this <layer-list>parent tag will then
    be defined by using a nested</layer-list> `<item>` child tag, as you’ll see in
    the next section of the chapter when you create your own LayerDrawable.


    A LayerDrawable class has six XML attributes or parameters. Obviously, the most
    important are your `android:drawable` parameter, which allows you to specify your
    drawable image assets, and your `android:id` parameter, which allows you to specify
    an ID for a layer so that it can be referenced later inside your Java code.


    The other four parameters specify each layer’s coordinates or positioning, using
    pixels (PX), device-independent pixels (DIP or DP), millimeter (MM), inches (IN),
    or scaled pixels (SP) as the unit of measurement along with a floating point value.
    The parameters include `android:top`, `android:bottom`, `android:left`, and `android:right`,
    and are not necessary if your image assets each fill their Drawable (and thus
    their LayerDrawable) containers.'
  trans: "\n# 12. 高级图像合成：使用 `LayerDrawable` 类\n\n## 摘要\n\n在第十二章中，我们将深入探讨图层在 Android\
    \ 和数字图像合成中所扮演的角色，以及如何在 Android 中实现图层以增强我们的数字图像合成能力。\n\n在第十二章中，我们将更仔细地审视图层在 Android\
    \ 和数字图像合成中的作用，以及如何在 Android 中实现 `LayerDrawable` 对象来增强我们的数字图像合成能力。\n\n在 Android\
    \ 应用中，通过使用 `Drawable` 父类的子类来创建和管理图层。这个专门管理图层堆栈的子类被称为 `LayerDrawable` 类。\n\n图层可以实现更高级的数字图像合成，因为它允许将不止一两张图像合成在一起，就像你在上一章关于\
    \ PorterDuff 图像混合模式中所做的那样。\n\nAndroid 中的 `LayerDrawable` 对象很好地诠释了 Java 对象由其他 Java\
    \ 对象组成这一概念，因为 `LayerDrawable` 包含其他 `Drawable` 对象。在图形设计场景中，这通常是 `BitmapDrawable`\
    \ 对象，其目标通常是创建由多个图像部件组成的复合图形对象。\n\n这样做通常是为了创建特殊效果，或者通过使用图层将图像分解为其组成部分，从而可以使用索引颜色空间来保存每个图像资源，进而节省\
    \ 100% 或更多的总数据占用空间，以优化应用图像资源的总数据量。其工作原理是：如果你能将图像部件（作为图层）保存为能够使用 256（索引）色而非 16777216（真彩色）色有效提供出色图像质量的文件，然后将它们合成为一个看起来像是使用真彩色，而实际上是使用了索引颜色资源的\
    \ `LayerDrawable` 对象的图像。\n\n## 图层绘制对象：将图像合成提升至新高度\n\n我们先概述一下数字成像图层在 Android 中是如何实现的。在\
    \ Android 中，图层被称为图层绘制对象（Layer Drawables），并使用 Android 的 `LayerDrawable` 类。我们还将探讨在\
    \ Android 应用以及你的 Pro Android Graphics 设计工作流程中，如何最好地发挥图层的优势。\n\n总的来说，图层最常用于数字图像合成目标，许多数字成像工匠使用专业的数字成像软件包（如\
    \ Adobe Photoshop CS6、GIMP 2.8.6 或 Corel 的 Painter、CorelDraw、PaintShop Pro 软件包）来执行这些操作。\n\
    \n在这些流行的数字图像合成软件包中能够实现的合成目标，同样可以在 Android 操作系统内实现。但是，你需要足够高级，能够使用 XML 和 Java 编写你自己的图像合成渲染管线；在本章稍后部分，你将了解一些可用来实现此目标的\
    \ Android 类和工作流程。\n\n请注意，这比仅仅使用这些数字成像软件包要困难得多，而仅使用软件包本身可能就已经非常复杂了，正如你在本书前面所见。\n\
    \n当应用中需要以高级方式组合多个 `Drawable` 资源以实现任何最终结果时，就会在 Android 中使用图层。这可以是任何事情，从文本叠加到图像混合，再到特殊效果应用。你可以在\
    \ `LayerDrawable` 图层堆栈中使用任何类型的 Android `Drawable`，因此它是一个非常灵活的图层系统。\n\n重要的是要注意，只要你擅长实现\
    \ Alpha 通道，就未必需要实现混合模式来创建有效的图像合成，正如你在前几章中已经看到的那样。\n\nAndroid 中的图层可以制作得与流行数字成像软件包（如\
    \ GIMP 2.8.6）中的图层非常相似。Android 图层可以分配不透明度值；它们还可以访问混合模式、利用 Alpha 通道，以及图形艺术家在其图形渲染管线中实现特殊数字成像效果所需的大多数其他核心功能。\n\
    \n你将把 `LayerDrawable` 的功能添加到 Android PorterDuff 混合模式中，因为你在上一章已经编写了代码来逐像素混合图像。\n\
    \n因此，到本章结束时，你将把上一章学到的混合和传输模式与 `LayerDrawable` 对象的图层能力结合起来，形成一个全面的、基于 Java 的图像合成和混合渲染管线。\n\
    \n## Android 的 `LayerDrawable` 类：图层的基础\n\nAndroid 的 `LayerDrawable` 类是 `Drawable`\
    \ 类的直接子类，而 `Drawable` 类本身又是 `java.lang.Object` 主类的直接子类。\n\n因此，`LayerDrawable`\
    \ 是一个 `Drawable` 子类，它实现了 `Drawable` 类的所有特性以及 `LayerDrawable` 类特有的图层管理所需的额外特性。\n\
    \nAndroid `LayerDrawable` 类的层次结构如下：\n\n```\njava.lang.Object\n  > android.graphics.drawable.Drawable\n\
    \    > android.graphics.drawable.LayerDrawable\n```\n\nAndroid 的 `LayerDrawable`\
    \ 类是其 `android.graphics.drawable` 包的一部分，因此，其导入语句逻辑上引用的是 `android.graphics.drawable.LayerDrawable`\
    \ 包导入路径，正如你将在本章后面编写实现 `LayerDrawable` 对象的 Java 应用代码以实现你自己的图层管理目标时所看到的那样。\n\n`LayerDrawable`\
    \ 类本身也有一个直接子类，称为 `TransitionDrawable` 类。我们将在本书的下一章介绍 `TransitionDrawable` 类，敬请期待。\n\
    \n`LayerDrawable` 对象是 Android 中一种 `Drawable` 对象，它具有创建和管理其他 `Drawable` 对象数组的能力。数组中的\
    \ `Drawable` 对象总是按照它们的数组顺序绘制到屏幕上，因此索引号最大的 `Drawable` 元素将始终绘制在图层堆栈的顶部。在稍后你实现自己的\
    \ `LayerDrawable` 对象之后，你将确切地看到这是如何工作的。\n\n`LayerDrawable` 对象通常通过使用 XML 定义文件来定义，然后使用\
    \ `<layer-list>` 父标签。由这个 `<layer-list>` 父标签定义的 `LayerDrawable` 容器对象内的每个 `Drawable`\
    \ 对象，随后将通过使用嵌套的 `<item>` 子标签来定义，正如你将在本章下一节创建自己的 `LayerDrawable` 时所看到的那样。\n\n`LayerDrawable`\
    \ 类有六个 XML 属性或参数。显然，最重要的是 `android:drawable` 参数（允许你指定可绘制图像资源）和 `android:id` 参数（允许你为图层指定\
    \ ID，以便稍后在 Java 代码中引用）。\n\n其他四个参数使用像素、设备独立像素（DIP 或 DP）、毫米、英寸或缩放像素作为度量单位，并配合浮点值来指定每个图层的坐标或定位。这些参数包括\
    \ `android:top`、`android:bottom`、`android:left` 和 `android:right`，如果你的每个图像资源都填满了它们的\
    \ `Drawable`（以及相应的 `LayerDrawable`）容器，则这些参数不是必需的。\n"
- fmt: "# The `<layer-list>` Parent Tag: Setting Up Layers Using XML\n\nLet’s continue\
    \ working in your `ContentsActivity.java` and `activity_contents` XML file tabs\
    \ in Eclipse to implement a `LayerDrawable` object in your image composite. Fire\
    \ up Eclipse ADT if it is not still open on your desktop, and right-click the\
    \ `/res/drawable` folder as shown in Figure 12-1, and select the **New ➤ Android\
    \ XML File** menu sequence. This will allow you to create your new `LayerDrawable`\
    \ XML file and will automatically put it into your `drawable` folder. This root\
    \ `/res/drawable` folder is where you’ve been storing assets, such as 9-patch\
    \ image assets, `ImageButton` states, frame animation, and now this `LayerDrawable`\
    \ object definition, each of which are related to Android Drawable objects and\
    \ their configuration (frames, states, layers, patches, and other XML that defines\
    \ how an image asset or assets will be implemented).\n\n![A978-1-4302-5786-8_12_Fig1_HTML.jpg](A978-1-4302-5786-8_12_Fig1_HTML.jpg)\n\
    \n**Figure 12-1.** Creating a **New ➤ Android XML File** in the `/res/drawable`\
    \ folder using the right-click context menu\n\nOnce you select this menu command\
    \ sequence, you will get a **New Android XML File** dialog, which is shown in\
    \ Figure 12-2. This is already configured for the `GraphicsDesign` project and\
    \ Drawable resource type, due to your folder hierarchy and the fact that you clicked\
    \ the correct folder (as shown in Figure 12-1) to invoke the dialog. Now, all\
    \ you have to do is to select the `<layer-list>` Parent Tag Root Element and name\
    \ the file `contents_layers` to show that you are defining the layers for your\
    \ `ContentsActivity` class.\n\n![A978-1-4302-5786-8_12_Fig2_HTML.jpg](A978-1-4302-5786-8_12_Fig2_HTML.jpg)\n\
    \n**Figure 12-2.** Selecting a `<layer-list>` Root Element for your New Android\
    \ XML File\n\nOnce you are done setting your Drawable XML file parameters in the\
    \ dialog, click the **Finish** button and you will see a new `contents_layers.xml`\
    \ file in your Eclipse central editing pane, ready for use, as shown in Figure\
    \ 12-3. Split your `<item> </item>` child tag container into one `<item />` container\
    \ so that you can add parameters, and then use the `android:` work process to\
    \ invoke the helper dialog with the six parameters you learned about earlier.\
    \ You’ll add the `android:id` parameter first, so your layer object has a name.\n\
    \n![A978-1-4302-5786-8_12_Fig3_HTML.jpg](A978-1-4302-5786-8_12_Fig3_HTML.jpg)\n\
    \n**Figure 12-3.** Adding `<item>` child tags inside of a `<layer-list>` parent\
    \ tag, and accessing an `android:` helper dialog\n\nLet’s name the first layer\
    \ `layerOne`, and add an `android:drawable` parameter that references your `cloudsky.jpg`\
    \ image asset, which you want to be your background plate (the bottom-most layer\
    \ at the bottom of the layer stack).\n\nOnce you have one of the layer `<item>`\
    \ constructs, you can copy and paste it to create as many layers as you need.\
    \ The XML child `<item>` tag should read:\n\n```\n<item\n    android:id=\"@+id/layerOne\"\
    \n    android:drawable=\"@drawable/cloudsky\" />\n```\n\nRemember that by referencing\
    \ your `cloudsky.jpg` image asset using `@drawable` that Android will go find\
    \ a correct resolution density version of this asset in one or more of your `drawable-dpi`\
    \ subfolders. In this case, since the image is quite scalable, as you have seen\
    \ in previous chapters, you will use only the one 1000-pixel high-density resolution\
    \ asset and let Android scale that to its heart’s content. In this case, you’ll\
    \ use it as your composite background image, and define it using the first (bottom)\
    \ layer, named `layerOne` in your `LayerDrawable` XML definition file `contents_layers`\
    \ (as shown in Figure 12-4).\n\n![A978-1-4302-5786-8_12_Fig4_HTML.jpg](A978-1-4302-5786-8_12_Fig4_HTML.jpg)\n\
    \n**Figure 12-4.** Completing a first layer `<item>` child tag, referencing a\
    \ `cloudsky.jpg` background image in ID `layerOne`"
  raw: '## The <layer-list> Parent Tag: Setting Up Layers Using XML


    Let’s continue working in your ContentsActivity.java and activity_contents XML
    file tabs in Eclipse to implement a LayerDrawable object in your image composite.
    Fire up Eclipse ADT if it is not still open on your desktop, and right-click the
    /res/drawable folder as shown in Figure [12-1](#A978-1-4302-5786-8_12_Chapter.html#Fig1),
    and select the New ➤ Android XML File menu sequence. This will allow you to create
    your new LayerDrawable XML file and will automatically put it into your drawable
    folder. This root /res/drawable folder is where you’ve been storing assets, such
    as 9-patch image assets, ImageButton states, frame animation, and now this LayerDrawable
    object definition, each of which are related to Android Drawable objects and their
    configuration (frames, states, layers, patches, and other XML that defines how
    an image asset or assets will be implemented).


    ![A978-1-4302-5786-8_12_Fig1_HTML.jpg](A978-1-4302-5786-8_12_Fig1_HTML.jpg)


    Figure 12-1.


    Creating a New ➤ Android XML File in the /res/drawable folder using the right-click
    context menu


    Once you select this menu command sequence, you will get a New Android XML File
    dialog, which is shown in Figure [12-2](#A978-1-4302-5786-8_12_Chapter.html#Fig2).
    This is already configured for the GraphicsDesign project and Drawable resource
    type, due to your folder hierarchy and the fact that you clicked the correct folder
    (as shown in Figure [12-1](#A978-1-4302-5786-8_12_Chapter.html#Fig1)) to invoke
    the dialog. Now, all you have to do is to select the <layer-list> Parent Tag Root
    Element and name the file contents_layers to show that you are defining the layers
    for your ContentsActivity class.


    ![A978-1-4302-5786-8_12_Fig2_HTML.jpg](A978-1-4302-5786-8_12_Fig2_HTML.jpg)


    Figure 12-2.


    Selecting a <layer-list> Root Element for your New Android XML File


    Once you are done setting your Drawable XML file parameters in the dialog, click
    the Finish button and you will see a new `contents_layers.xml` file in your Eclipse
    central editing pane, ready for use, as shown in Figure [12-3](#A978-1-4302-5786-8_12_Chapter.html#Fig3).
    Split your `<item> </item>` child tag container into one `<item />` container
    so that you can add parameters, and then use the `android:` work process to invoke
    the helper dialog with the six parameters you learned about earlier. You’ll add
    the `android:id` parameter first, so your layer object has a name.


    ![A978-1-4302-5786-8_12_Fig3_HTML.jpg](A978-1-4302-5786-8_12_Fig3_HTML.jpg)


    Figure 12-3.


    Adding <item> child tags inside of a <layer-list> parent tag, and accessing an
    android: helper dialog


    Let’s name the first layer layerOne, and add an `android:drawable` parameter that
    references your cloudsky.jpg image asset, which you want to be your background
    plate (the bottom-most layer at the bottom of the layer stack).


    Once you have one of the layer <item> constructs, you can copy and paste it to
    create as many layers as you need. The XML child <item> tag should read


    `<item`


    `android:id="@+id/layerOne"`


    `android:drawable="@drawable/cloudsky" />`


    Remember that by referencing your cloudsky.jpg image asset using @drawable that
    Android will go find a correct resolution density version of this asset in one
    or more of your drawable-dpi subfolders. In this case, since the image is quite
    scalable, as you have seen in previous chapters, you will use only the one 1000-pixel
    high-density resolution asset and let Android scale that to its heart’s content.
    In this case, you’ll use it as your composite background image, and define it
    using the first (bottom) layer, named layerOne in your LayerDrawable XML definition
    file `contents_layers` (as shown in Figure [12-4](#A978-1-4302-5786-8_12_Chapter.html#Fig4)).


    ![A978-1-4302-5786-8_12_Fig4_HTML.jpg](A978-1-4302-5786-8_12_Fig4_HTML.jpg)


    Figure 12-4.


    Completing a first layer <item> child tag, referencing a cloudsky.jpg background
    image in ID layerOne'
  trans: "\n# `<layer-list>` 父标签：使用 XML 设置图层\n\n让我们继续在 Eclipse 中操作 `ContentsActivity.java`\
    \ 和 `activity_contents` XML 文件标签页，在图像合成中实现一个 `LayerDrawable` 对象。如果 Eclipse ADT\
    \ 尚未打开，请启动它，然后右键点击 `/res/drawable` 文件夹，如图 12-1 所示，选择 **New ➤ Android XML File**\
    \ 菜单序列。这将允许你创建新的 `LayerDrawable` XML 文件，并自动将其放入你的 `drawable` 文件夹中。这个根目录 `/res/drawable`\
    \ 文件夹正是你一直存放资源的地方，例如九宫格图片资源、`ImageButton` 状态、帧动画，以及现在的这个 `LayerDrawable` 对象定义，每个都与\
    \ Android Drawable 对象及其配置（帧、状态、图层、补丁块，以及其他定义图片资源如何被实现的 XML）相关。\n\n![A978-1-4302-5786-8_12_Fig1_HTML.jpg](img/A978-1-4302-5786-8_12_Fig1_HTML.jpg)\n\
    \n**图 12-1.** 使用右键上下文菜单在 `/res/drawable` 文件夹中创建一个 **New ➤ Android XML File**\n\
    \n选择此菜单命令序列后，您将看到一个 **New Android XML File** 对话框，如图 12-2 所示。由于您的文件夹层级结构以及您通过点击正确的文件夹（如图\
    \ 12-1 所示）来调用对话框，该对话框已自动配置为 `GraphicsDesign` 项目和 Drawable 资源类型。现在，您只需选择 `<layer-list>`\
    \ 父标签作为根元素，并将文件命名为 `contents_layers`，以表明您正在为您的 `ContentsActivity` 类定义图层。\n\n![A978-1-4302-5786-8_12_Fig2_HTML.jpg](img/A978-1-4302-5786-8_12_Fig2_HTML.jpg)\n\
    \n**图 12-2.** 为您的新的 Android XML 文件选择 `<layer-list>` 根元素\n\n在对话框中设置好 Drawable XML\
    \ 文件参数后，点击 **Finish** 按钮，您将在 Eclipse 的中央编辑窗格中看到一个新的 `contents_layers.xml` 文件，准备就绪，如图\
    \ 12-3 所示。将您的 `<item> </item>` 子标签容器拆分为一个 `<item />` 容器，以便添加参数，然后使用 `android:`\
    \ 工作流程来调用辅助对话框，该对话框包含了您之前了解的六个参数。首先添加 `android:id` 参数，这样您的图层对象就有了名称。\n\n![A978-1-4302-5786-8_12_Fig3_HTML.jpg](img/A978-1-4302-5786-8_12_Fig3_HTML.jpg)\n\
    \n**图 12-3.** 在 `<layer-list>` 父标签内部添加 `<item>` 子标签，并访问 `android:` 辅助对话框\n\n我们将第一个图层命名为\
    \ `layerOne`，并添加一个引用您的 `cloudsky.jpg` 图片资源的 `android:drawable` 参数，您希望将此图片作为背景底板（图层堆叠中最底部的图层）。\n\
    \n一旦完成了一个图层 `<item>` 结构的创建，您可以复制并粘贴它以创建任意所需数量的图层。XML 子标签 `<item>` 应如下所示：\n\n```\n\
    <item\n    android:id=\"@+id/layerOne\"\n    android:drawable=\"@drawable/cloudsky\"\
    \ />\n```\n\n请记住，通过使用 `@drawable` 引用您的 `cloudsky.jpg` 图片资源，Android 会在您的某个 `drawable-dpi`\
    \ 子文件夹中找到此资源的正确分辨率密度版本。在这种情况下，由于该图片具有很好的可缩放性（正如您在之前章节中所见），您只需使用一个 1000 像素的高清分辨率资源，然后让\
    \ Android 尽情地进行缩放。在此，您将把它用作合成后的背景图片，并在您的 `LayerDrawable` XML 定义文件 `contents_layers`\
    \ 中（如图 12-4 所示）通过第一个（底部）图层（命名为 `layerOne`）来定义它。\n\n![A978-1-4302-5786-8_12_Fig4_HTML.jpg](img/A978-1-4302-5786-8_12_Fig4_HTML.jpg)\n\
    \n**图 12-4.** 完成第一个图层 `<item>` 子标签，在 ID 为 `layerOne` 的图层中引用 `cloudsky.jpg` 背景图片\n"
- fmt: '现在你已准备好复制并粘贴第一个`<item>`标签，以便创建第二层和第三层，从而观察 9-patch 素材和具有 alpha 通道的图像素材在你正在创建的
    Android 合成层叠层上的工作方式。实际上，你的 9-patch 素材已经定义了 alpha 通道和填充区域；因此，在这个第一个示例中，你需要竭尽全力使用一些非常高级的图形技术。


    选择并复制父标签`<layer-list>`中的第一个子`<item>`标签的全部内容，然后在它下方再粘贴两次，以在`LayerDrawable`对象中创建`layerTwo`和`layerThree`图像合成层。第二层和第三层的
    XML 标记如下所示：


    ```

    <item

    android:id="@+id/layerTwo"

    android:drawable="@drawable/bookmark0" />

    <item

    android:id="@+id/layerThree"

    android:drawable="@drawable/ninepatchframe" />

    ```


    你只需编辑`ID`，将其改为`layerTwo`和`layerThree`，然后分别将引用从`cloudsky`改为`bookmark0`和`ninepatchframe`，如图[12-5](#A978-1-4302-5786-8_12_Chapter.html#Fig5)所示。现在，你已准备好查看
    Android 内部数字图像合成工作流程的结果。


    ![A978-1-4302-5786-8_12_Fig5_HTML.jpg](A978-1-4302-5786-8_12_Fig5_HTML.jpg)

    *图 12-5. 复制并粘贴第一层`<item>`标签以创建第二层和第三层`<item>`定义*


    注意在图[12-5](#A978-1-4302-5786-8_12_Chapter.html#Fig5)中，`contents_layers.xml`编辑窗格底部没有图形布局编辑器选项卡，只有一个
    XML 编辑选项卡。这应该能提示你，为了能够在 Eclipse ADT 和 Nexus One AVD 模拟器中可视化`LayerDrawable`对象，最后还需要执行哪一步操作。


    `contents_layers.xml`文件是一个 XML 定义文件，用于定义图像素材层，但你仍然需要在`ImageView`对象内部引用它，才能在 ADT
    或 Android 操作系统中进行可视化。


    因此，我们来修改`contents_activity.xml`文件中的`<ImageView>`子标签，使用`android:src`参数来显示这个`LayerDrawable`对象定义。你将把现有参数放在标签的第二到第四行，并使用以下
    XML 标记（如图[12-6](#A978-1-4302-5786-8_12_Chapter.html#Fig6)所示）添加一个指向`contents_layers`
    XML 文件的源图像引用。


    ```

    <ImageView android:src="@drawable/contents_layers"

    android:id="@+id/porterDuffImageView" android:layout_margin="8dp"

    android:layout_width="wrap_content" android:layout_height="wrap_content"

    android:contentDescription="@string/bookmark_utility" />

    ```


    现在，我们的`LayerDrawable`对象 XML 定义已连接好可供查看，并且我们已进入 Eclipse IDE 的正确区域，可以访问图形布局编辑器选项卡，如图[12-6](#A978-1-4302-5786-8_12_Chapter.html#Fig6)中
    XML 编辑屏幕底部所示。


    ![A978-1-4302-5786-8_12_Fig6_HTML.jpg](A978-1-4302-5786-8_12_Fig6_HTML.jpg)

    *图 12-6. 向`<ImageView>`子标签添加`android:src`参数以引用`contents_layers.xml`*


    点击图形布局编辑器选项卡，这样你就可以可视化使用`LayerDrawable`类在 Android 中实现的数字图像合成。


    如图[12-7](#A978-1-4302-5786-8_12_Chapter.html#Fig7)所示，你的`ImageView` UI 元素（在 XML
    编辑窗格中，我们的编辑光标仍在其边界内，因此显示为选中状态）现在显示了一个三层图像合成层叠：底部是`cloudsky.jpg`图像，上面是`bookmark0.png`图像，再上面是`ninepatchframe`
    9-patch 图像素材，所有图层完美合成。


    不知何故，这个图像合成看起来没有达到预期的专业水平；因此，接下来让我们改变数字图像素材的顺序，这样环状图形就不会被合成周界周围的 9-patch 图像素材平铺所截断。'
  raw: 'Now you are ready to copy and paste this first <item> tag in order to create
    a second and a third layer, so you can see how a 9-patch asset and an image asset
    that has an alpha channelwill work on the Android compositing layer stack you
    are creating here. Actually, your 9-patch asset has an alpha channel and padding
    areas defined as well; thus you are pulling out all the stops to use some very
    advanced graphics techniques in this first example.


    Select and copy the first child <item> tag in your <layer-list> parent tag in
    its entirety, and paste it two more times underneath itself to create a layerTwo
    and layerThree image composite layer in your LayerDrawable object. The XML markup
    for a second and third layer will look like the following:


    `<item`


    `android:id="@+id/layerTwo"`


    `android:drawable="@drawable/bookmark0" />`


    `<item`


    `android:id="@+id/layerThree"`


    `android:drawable="@drawable/ninepatchframe" />`


    All you have to do is edit the `ID` to change it to `layerTwo` and `layerThree`,
    and then edit the reference from `cloudsky` to `bookmark0` and `ninepatchframe`,
    respectively, as shown in Figure [12-5](#A978-1-4302-5786-8_12_Chapter.html#Fig5).
    You are now ready to see the results of your digital image compositing work process
    inside Android.


    ![A978-1-4302-5786-8_12_Fig5_HTML.jpg](A978-1-4302-5786-8_12_Fig5_HTML.jpg)


    Figure 12-5.


    Copying and pasting the first layer <item> tag to create the second and the third
    layer <item> definitions


    Notice in Figure [12-5](#A978-1-4302-5786-8_12_Chapter.html#Fig5) that there is
    no Graphical Layout Editor tab located at the bottom of the contents_layers.xml
    editing pane, only an XML editing tab. This should give you a clue as to the final
    step that you’re going to need to perform in order to be able to visualize a LayerDrawable
    object inside Eclipse ADT and the Nexus One AVD emulator.


    The contents_layers.xml file is an XML definition file which defines the image
    asset layers, but you’ll still need to reference it from the inside of an ImageView
    object in order to visualize it inside ADT or in Android OS.


    So, let’s modify the `<ImageView>` child tag in your `contents_activity.xml` file
    to display this LayerDrawable object definition using an `android:src` parameter.
    You’ll put your existing parameters on lines two through four of the tag and add
    a source image reference pointing to your contents_layers XML file using the following
    XML markup, as shown in Figure [12-6](#A978-1-4302-5786-8_12_Chapter.html#Fig6).


    `<ImageView android:src="@drawable/contents_layers"`


    `android:id="@+id/porterDuffImageView" android:layout_margin="8dp"`


    `android:layout_width="wrap_content" android:layout_height="wrap_content"`


    `android:contentDescription="@string/bookmark_utility" />`


    Now, our LayerDrawable object XML definition is wired-up for viewing, and we are
    in the right area of the Eclipse IDE to be able to access your GLE tab as you
    can see at the bottom of the XML editing screen in Figure [12-6](#A978-1-4302-5786-8_12_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_12_Fig6_HTML.jpg](A978-1-4302-5786-8_12_Fig6_HTML.jpg)


    Figure 12-6.


    Adding an android:src parameter to your <ImageView> child tag to reference the
    contents_layers.xml


    Click the Graphical Layout Editor tab so you can visualize digital image compositing
    as implemented in Android using the LayerDrawable class.


    As you can see in Figure [12-7](#A978-1-4302-5786-8_12_Chapter.html#Fig7), your
    ImageView UI element, shown selected as we still have our editing cursor in its
    boundaries in the XML editing pane, now shows a three-layer image compositing
    stack with a cloudsky.jpg image on the bottom, a bookmark0.png image on top of
    that, and a ninepatchframe 9-patch image asset on top of both of those, all seamlessly
    composited.


    Somehow this image composite does not look as professional as one would like it
    to, so next let’s change the order of the digital image assets so that the hoop
    does not get cut off by the tiling of the 9-patch image asset frame around your
    composite’s perimeter.'
