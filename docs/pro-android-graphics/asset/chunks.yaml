    # 总结


    在第十六章中，你学习了如何使用 `Drawable` 类在 Android 中创建自定义的 `Drawable` 对象。我们涵盖了 Android 中所有不同类型的
    `Drawable` 对象，以及如何通过在 XML `ShapeDrawable` 对象定义文件中使用父标签 `<shape>` 来创建自定义的 `ShapeDrawable`。


    我们了解了一些可以在父标签 `<shape>` 内部使用的子标签，包括用于定义不同类型渐变（实际上是 `Shader` 对象类型）的 `<gradient>`
    标签，以及用于为 `ShapeDrawable` 对象创建边框的 `<stroke>` 标签。


    在此过程中，你还学习了其他一些重要的图形类，包括用于创建纹理贴图（`Shader`）以配合 `Paint` 类使用的 `Shader` 类，用于创建矩形对象的
    `Rect` 和 `RectF` 类，以及用于导入原始数据流的 `InputStream` 类。


    你学习了至关重要的 Android `Drawable` 类，然后学习了如何创建你自己的自定义 `ImageRoundingDrawable` 类（即 `Drawable`
    的子类），首先在 Eclipse 中使用“新建 ➤ 类”功能进行创建。


    你创建了一个 `ImageRoundingDrawable()` 构造方法，并利用 `Paint`、`Bitmap`、`Shader` 和 `Canvas`
    类来设计并将你自己的自定义 `Drawable` 对象添加到 Android 操作系统（至少是你自己的版本）中。


    你了解了 Android `Shader` 类、`Shader.TileMode` 嵌套类及其图块模式常量，并在代码中实现了这些内容。你还学习了 `Shader`
    的子类 `BitmapShader`，以及如何使用它将 `Bitmap` 图像资源作为着色器应用。你将在下一章运用这些知识来实现一些非常酷的功能。


    你还学习了用于定义矩形区域的 `Rect` 和 `RectF` 类（这些区域常用于绘图及其他图形相关操作），以及 `InputStream` 类，它允许你打开原始数据输入流，并以更强大、更新的方式将图形数据导入你的应用程序。


    在下一章中，我们将重点深入理解 Android 的 `Paint` 和 `Canvas` 类，以及如何让用户使用 `onDraw()` 方法在屏幕上实时绘制图形。


    # 17. 交互式绘图：交互使用 Paint 和 Canvas 类


    ## 摘要


    在第十七章中，你将学习如何利用 Android 设备的触摸屏，以实时、交互的方式使用 Android 的 `Paint` 和 `Canvas` 类。你将通过
    `OnTouchListener()` 方法和类来实现触摸屏事件处理，并学习如何让你的用户在其 Android 设备屏幕上进行交互式、实时的“绘图”。


    你将学习 Android 的 `MotionEvent`、`List`、`ArrayList` 和 `Context` 类，以及关于 Android 的 `Paint`
    和 `Canvas` 类的更多细节。我们还将特别关注 Android 中的 `.onDraw()` 方法，以及绘图如何在 Android 操作系统内部向用户显示器呈现。


    你将创建自己的自定义 `View` 子类，命名为 `SketchPadView`，并使用这个 `View` 子类来创建你自己的 `SketchPad Activity`，从而让用户能够在屏幕上创建自己的图形设计。


    你将从学习 `Canvas` 和 `Paint` 类如何配合 Android 的 `.onDraw()` 方法工作开始。本章第一部分将涵盖这些基础信息，向你展示
    Android 如何允许开发者创建自己的自定义图形应用程序。


    在审视完这些允许开发者创建图形应用程序的核心类和方法之后，你将创建你自己的 `SketchPad 工具`。在讲解该部分内容时，我们将涵盖一些为使 `Canvas`
    绘图功能对应用程序用户群体具有交互性而需要利用的辅助类和方法。到本章结束时，你将创建出自己的自定义 `View`，并使用 `Canvas`、`Paint`、`Context`、`List`、`ArrayList`
    和 `Context` 类在上面进行绘制！


    ## Android 的 onDraw() 方法：在屏幕上绘图


    在你的自定义 `SketchPadView` 子类（你将在本章稍后创建）上进行绘图中，最核心或最关键的函数是重写 `View` 子类的 `onDraw()`
    方法，并在你的 `SketchPadView.java` 类中实现你自己的版本。


    这个 `onDraw()` 方法包含一个参数，你可以猜到，它是一个 `Canvas` 对象，通常命名为 `canvas`。你的 `View` 子类可以使用这个
    `Canvas` 对象，让你的用户在 `View` 表面上进行绘制。


    正如你将在下一节中看到的，`Canvas` 类定义了大量 `.draw()` 方法，这些方法可用于绘制颜色、文本、形状、顶点、位图、路径、点或任何其他类型的
    `Drawable` 图形对象。


    你可以在你的 `onDraw()` 实现中使用这些方法中的任何一个或全部，来创建你自己的自定义绘图应用程序，以及你能想到的任何其他东西，比如说交互式涂色书。


    正如你在这本书中已经学到的，在调用你的 `onDraw()` 方法之前，你必须首先声明并实例化你的 `Paint` 对象。


    正如你在本书后半部分所见，Android 的 `android.graphics` 包和图形设计框架将绘制和显示功能划分为两个独立的功能区域：由你的 `Canvas`
    对象定义的绘制目的地，以及由你的 `Paint` 对象定义的要在 `Canvas` 对象上绘制的内容。在本章接近尾声时，你将看到为什么 Android 这样做是明智之举——因为你只需要几行
    `Paint` 和 `Shader` 代码，就能为你的 `SketchPad 工具`添加图像克隆功能。


    在你开始编写你的 `SketchPad Activity` 子类和 `SketchPadView` `View` 子类，以实现用户在显示器上的自定义绘制之前，我需要先为你概述
    `Canvas` 和 `Paint` 这两个类，以便你掌握这些基础信息。如果你打算精通 Android 操作系统中的图形处理，你会想要熟悉这两个核心类；请访问
    developer.android.com 网站获取更多信息。

