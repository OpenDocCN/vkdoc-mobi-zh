- fmt: '# The Android Drawable Class: The Blueprint for Graphics


    The Android `Drawable` class is yet another one of the direct subclasses of the
    `java.lang.Object` master class. This indicates that this `Drawable` class was
    designed specifically for the purpose of defining graphics objects for the Android
    OS, and as such, it is important for us to cover in detail.


    The Android `Drawable` class hierarchy is structured as follows:


    ```

    java.lang.Object

    > android.graphics.drawable.Drawable

    ```


    Android’s `Drawable` class belongs to the `android.graphics.drawable` package.
    Thus the import statement for a `Drawable` class references the `android.graphics.drawable.Drawable`
    package as its class import path.


    A `Drawable` class is a public abstract class. This type of access modifier pair
    signifies that this class is not meant to be used directly other than to declare
    `Drawable` objects initially, or to be used to create subclasses, such as classes
    that you will be using (and creating) during this chapter.


    A `Drawable` (class or object) is the term that the Android OS has chosen to represent
    a graphic object of some sort or another. It was probably coined as a term derivative
    from a supposition that “something that can be drawn should be called a `Drawable`.”
    Android likes to create its own terms for OS components and functions, such as
    `Activities` and `Receivers` and `Drawables`.


    As you have seen throughout this book, you will deal with `Drawable` objects when
    you require some type of graphic-related object (in memory) resource. You’ll instantiate
    a `Drawable` (or one of its subclass `Drawable` types, such as the `BitmapDrawable`)
    when you wish to draw something onto your display.


    The `Drawable` class represents a foundation for graphics design in Android, and
    was designed to provide the generic API for dealing with an underlying graphics
    resource. This graphic resource could take a variety of forms, as we saw in the
    first section of the chapter when we looked at many of the different types of
    `Drawable` objects that can be utilized within Android.


    The `Drawable` object in Android does not have any capabilities of receiving events,
    nor does it allow any interaction with your users. This is instead handled by
    your `View` object, oftentimes an `ImageView`, which will “contain” (or reference)
    your `Drawable` objects inside it, either in a foreground parameter, which holds
    your source image plate (holder), or background parameter, which holds your background
    image plate (or alternately, just a simple ARGB color value).


    There are five functional areas of support provided by the `Drawable` master class
    for all of the other types of `Drawable` subclasses. These include the `Drawable`
    object’s padding, boundaries, animation, state control, and level.


    We’ve already taken a look at some of these concepts during this book, for instance,
    with padding values the `Drawable` class `.getPadding()` method will return from
    a `Drawable` object, if applicable, information regarding how to place the content
    contained inside that `Drawable` object.


    For example, a `Drawable` object such as the `NinePatchDrawable` object, which
    is intended to be utilized as a graphic frame for a Button UI widget, will need
    to return a padding `Rect` value that accurately places the text label inside
    the `NinePatchDrawable` asset, within your Button UI element. This `.getPadding()`
    method call uses the `Rect` object, which you will learn about later on in the
    chapter, as its parameter via the following method call code:


    `yourDrawableObjectNameHere.getPadding(Rect);`


    We have also looked at `AnimationDrawable` (frame animation) objects quite a bit
    in this book. Any `Drawable` subclass can support animation by “calling back”
    to its parent using one of two nested classes in the `Drawable` class.


    This `Drawable.Callback` interface should be implemented for any subclass in which
    you wish to create an animated `Drawable` object that will extend the `Drawable`
    class.


    A subclass can support the interface via a `.setCallback(Drawable.Callback)` method
    call, so that animation will function properly within your `Drawable` subclass.
    The simplest way to do this is by using your method call (off of the custom `Drawable`
    object) to `Drawable`''s `.setBackgroundDrawable()` method.


    We’ve also looked at multi-state `ImageButton` objects and similar `Drawables`
    that take the state of the UI element or graphic into account in order to set
    the `Drawable` asset to reference and display the correct image asset.


    The `Drawable` class contains a `.setState()` method that allows the `Drawable`
    subclass to tell the `Drawable` object that it creates precisely which state each
    of your `Drawable` assets needs to be drawn for: for instance, when the mouse
    is hovered, or when the UI element is focused, or when the object is selected,
    or even when a custom-defined state is being used by your users.


    The `Drawable` objects that support setting states will modify their source images
    based upon this state or state-change information. You have created a multi-state
    `Drawable` already in this book, in [Chapter 9](#A978-1-4302-5786-8_9_Chapter.html)
    when you created an `ImageButton Drawable` that featured four different button
    UI states.


    `Drawable` objects can also respond to different levels using a `.setLevel()`
    method. This method allows a `Drawable` object to respond to any controller, which
    can send level information to trigger exactly which `Drawable` asset is displayed.
    Levels would be especially useful for use with Android hardware, for instance,
    to display a battery level in real time, or set an altimeter level, if the hardware
    supported that feature, such as will most likely be the case with the new Android
    watches coming out this year.


    Finally, the `Drawable` class supports boundaries by using the `.setBounds()`
    method, which needs to be utilized to tell your `Drawable` where it needs to be
    drawn and how large it should be on your screen. You will be leveraging the `.getBounds()`
    method in the next section of this chapter when you create your own custom `Drawable`
    subclass, the `ImageRoundingDrawable` class.


    Android developers can find out the preferred size for any given `Drawable` object
    by using the `.getIntrinsicHeight()` or `.getIntrinsicWidth()` methods.'
