- fmt: '# Exercise for the Reader: Using Two `LayerDrawable` Assets


    Here is a little test for you to do on your own, to get some practice working
    with Android graphics package classes like `Canvas`, `Paint`, `Bitmap`, `Drawable`,
    `BitmapDrawable`, `LayerDrawable`, and all of the `PorterDuff` classes.


    I’ll tell you how to do it; it only involves copying a few lines of code and changing
    some object names and references, so it should not be too difficult for you to
    implement.


    What I want you to do first is to comment out both `Bitmap` (as well as the mutable
    `Bitmap`) objects that you used for the original `PorterDuff` blending pipelines
    in the previous chapter. You will do this because you are about to implement the
    `PorterDuff` blending pipeline using only the `Drawable` digital image data (assets),
    which are available via the `LayerDrawable` object.


    This means that you are implementing a `PorterDuff` image blending pipeline (or
    pixel transfer pipeline) completely within this `LayerDrawable` object. Here’s
    how you would accomplish this; all of the code you need is already in place, so
    you just need to duplicate some of it.


    First, make a `Drawable layerThree` object referencing `layerThree`, like this:


    `Drawable layerThree = ((LayerDrawable)layerComposite).findDrawableByLayerId(R.id.layerThree);`


    Next, copy the two lines of code that take your `LayerDrawable` through its casting,
    `.copy()`, and `getBitmap()` methods, in order to transmute it from `Drawable`
    to `BitmapDrawable` to `Bitmap`, and finally into a mutable `Bitmap`, using the
    following code:


    ```

    Bitmap compositeTwo = ((BitmapDrawable)layerThree).getBitmap();

    Bitmap mutableCompositeTwo = compositeTwo.copy(Bitmap.Config.ARGB_8888, true);

    ```


    Next, replace the `mutableForegroundImage` object with a `mutableCompositeTwo`
    Bitmap object inside your `.drawBitmap()` method, and you will finally be referencing
    both `LayerDrawable` source image assets, within your `PorterDuff` rendering pipeline.


    ## Some Final Digital Image Compositing Caveats in Android


    First, in my opinion, Android needs to add some `<layer-list>` XML attributes
    (parameters) to make using layers in an advanced way easier (via XML). I’d like
    to see an `android:opacity` and `android:porterDuffMode` parameter at the very
    least, which would make static compositing pipelines a breeze via XML—and all
    of that crazy Java code that you just crafted unnecessary, unless you need to
    implement a dynamic image compositing pipeline for some reason.


    The other thing that you may have noticed is that I did not reference the 9-patch
    `layerTwo` in the `LayerDrawable` in the Java code. This is because it crashes
    the emulator. My guess is that Android has a difficult time casting a 9-patch
    through all of those `Drawable` types, and so for now, you will need to find a
    way to implement your 9-patches statically, as a background image using the `android:background`
    parameter, for instance.


    Notice that 9-patch image assets do work in a static (XML) implementation of `LayerDrawable`s
    and, as you saw, conformed to all of the 9-patch “rules.”


    ## Summary


    In this twelfth chapter, you learned about using layers in Android for image compositing,
    and the Android `LayerDrawable` class. You also got the chance to use the `Drawable`
    and `BitmapDrawable` classes through casting.


    We started out looking at some of the core concepts of how layers are used for
    digital image compositing pipelines, and then we looked at the Android `LayerDrawable`
    class and the features it provides to Android developers for implementing layer-based
    compositing pipelines in our code.


    Next, we looked at the `<layer-list>` parent XML tag and its child `<item>` tags,
    and you learned how to define a `LayerDrawable` object by using an XML definition
    file. You defined your own `LayerDrawable` using a `contents_layers` XML file
    to define your image layers and name them and assign image assets to them, which
    you later used in your `PorterDuff` rendering pipeline.


    Next, you dove into the Java side of things and modified the Image blending pipeline
    that you wrote in the previous chapter to implement `LayerDrawable` objects into
    the compositing and blending pipeline. You learned how to cast a `LayerDrawable`
    into a `Drawable` object and then into a `BitmapDrawable` and finally into a `Bitmap`
    object that you could then turn into a mutable `Bitmap` object, as you did in
    the previous chapter for the `PorterDuff` image blending pipeline.


    You tested your code in a lot of different ways, and wired it up different ways
    in order to ascertain exactly what was happening in the compositing and rendering
    pipeline. Finally, you took part in an exercise to try implementing this code,
    and you learned some of the caveats about layers in Android.


    In the next chapter, you will learn about using digital Image Transitions in the
    Android OS, and how to use the `TransitionDrawable` class in Android. This will
    allow you to take your Android image compositing graphics design and special effects
    work to a higher level via image animation.


    # 13. Digital Image Transitions: Using the `TransitionDrawable` Class


    Abstract


    In this thirteenth chapter, we will take a close look at the role that an image
    Transition plays in Android, and in digital image animation, as well as how to
    implement an image transition in Android. Transitions allow developers to enhance
    their core digital image animation capabilities.


    In this thirteenth chapter, we will take a close look at the role that an image
    Transition plays in Android, and in digital image animation, as well as how to
    implement an image transition in Android. Transitions allow developers to enhance
    their core digital image animation capabilities.


    Transitions are created and managed in Android applications using one of the indirect
    subclasses of the `Drawable` superclass. The `TransitionDrawable` subclass specifically
    manages image transitions and it’s a direct subclass of the `LayerDrawable` class.
    Since you learned about `LayerDrawable`s in the last chapter, this is a good follow-up
    chapter.


    The `TransitionDrawable` object allows more advanced digital image animation to
    be performed in Android using the layering and blending features covered in the
    previous two chapters. Thus, a `TransitionDrawable` object allows developers to
    create image animation in the most simple of ways: by transitioning between two
    image layers using a blending or opacity change.


    There are far more advanced forms of animation in Android, such as Bitmap or frame
    animation (sometimes called raster animation), and Vector or procedural animation
    (sometimes called tweening). You will be learning about these in detail over the
    next two chapters, as the unique forms of animation in Android each require their
    own chapter.


    We will start with the basics of image transitions, and then get into the `TransitionDrawable`
    class specifically; after that you will implement your own `TransitionDrawable`
    object in your `GraphicsDesign` application using XML markup to define a transition
    and Java to run it.'
