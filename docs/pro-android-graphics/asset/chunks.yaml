    the methods for each class are different from each other. This is mainly due to
    the different code mathematics involved in the calculations performed within these
    different types of (numeric) methods.


    The Android Rect and RectF classes are direct subclasses of Java’s master class
    java.lang.Object. For this reason, you know they were created just for implementing
    rectangular areas in Android. These areas are most often utilized for graphics,
    and are often used in drawing operations with the Paint and Canvas classes.


    The Android Rect and RectF class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.Rect`


    `java.lang.Object`


      `> android.graphics.RectF`


    The Android Rect and RectF classes belong to the android.graphics package. The
    import statements for both the Rect and RectF classes reference the android.graphics.Rect
    or android.graphics.RectF package import paths.


    The RectF class, which you are about to leverage in the .draw( ) method for your
    ImageRoundingDrawable class, supports four floating point coordinates, which together
    define the bounds for creating a rectangle object.


    Your rectangle object is defined using the pixel coordinates for its four edges
    (left, top, right, bottom). A more accurate way to look at this for a pro graphics
    designer is that you are really just defining the top-left (origin) corner for
    your rectangle using the first two (left, top) values, and these are usually (0,0),
    which represents the origin of your screen.


    The second set of values defines the destination (bottom, right) corner for your
    rectangle, much like the way you would draw it out on the screen as a selection
    area when you “drop” the right-bottom corner (value), after you have defined the
    rectangular area that you require for your graphic design work process.


    The Rect and RectF data fields can be accessed directly by using .width() and
    .height() method calls to retrieve a rectangle object width or height. It is important
    to note that most Rect or RectF class methods do not check to see that your values
    are in a correct (left, top, right, bottom) order.


    ## Defining Your RectF Object and Calling .drawRoundRect( )


    Next, let’s finish off your .draw( ) method by defining and instantiating your
    RectF object, and then calling the actual drawing method, which you require for
    your class. You’ll do this by harnessing all of the RectF, Paint, Canvas, and
    Shader objects that you have set up thus far. This is getting exciting in its
    complexity, and yet it’s really all so very logical once you get it in the right
    sequence in your mind’s eye (understanding, or Ah-Ha moment).


    This is done by declaring the RectF object, naming it drawRect, and then using
    the new keyword and RectF() constructor method, with the 0,0 screen origin that
    you learned about earlier, and destination bottom-right corner.


    The destination corner location data values will logically be set by using the
    .getBounds().width() and the .getBounds().height() method calls, which you already
    coded, and stored in your canvasW and canvasH integer variables.


    This can be done via a single line of Java code, as shown in Figure [16-26](#A978-1-4302-5786-8_16_Chapter.html#Fig26):


    `RectF drawRect = new RectF(0.0f, 0.0f, canvasW, canvasH);`


    Next, you will use the Canvas object named arg0 (the first argument for the method
    is the naming convention Eclipse ADT followed) to invoke your Canvas class drawing
    method that will perform an image rounding operation for you. Once you deal with
    your opacity, you’ll be done creating your custom Drawable.


    ![A978-1-4302-5786-8_16_Fig26_HTML.jpg](A978-1-4302-5786-8_16_Fig26_HTML.jpg)


    Figure 16-26.


    Creating a RectF object named drawRect and configuring it with Drawable width
    and height boundary


    To call the Canvas class’s .drawRoundRect() method off your arg0 Canvas object,
    you need to have your drawRect RectF object, X and Y corner rounding values (higher
    values yield rounder corners), and finally, your paintObject Paint object. Since
    you have all of those in place, let’s write this method call by using the following
    line of Java code, as shown in Figure [16-27](#A978-1-4302-5786-8_16_Chapter.html#Fig27):


    `arg0.drawRoundRect(drawRect, 50, 50, paintObject);`


    As you can also see in Figure [16-27](#A978-1-4302-5786-8_16_Chapter.html#Fig27),
    I clicked the paintObject variable inside the method call to highlight the chain
