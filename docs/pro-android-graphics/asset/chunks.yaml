    \ 方法来实现这一点，如图 14-11 所示。这与你之前编写的事件处理器类似。\n\n![A978-1-4302-5786-8_14_Fig11_HTML.jpg](img/A978-1-4302-5786-8_14_Fig11_HTML.jpg)\n\
    \n**图 14-11.** 为你的 `pag` 的 `ImageView` 添加 `.setOnClickListener()` 方法和 `View.OnClickListener()`\
    \ 方法\n\n接下来，将鼠标悬停在 `View` 类引用上，让 Eclipse 为你导入 `View (android.view)`，然后你会看到如图 14-12\
    \ 所示的波浪形红色错误高亮。你可以将鼠标悬停在此处，再次让 Eclipse 自动为你编写方法引导代码。当你的 IDE 理解你的操作并主动帮你分担部分工作时，总是令人愉快的！\n\
    \n![A978-1-4302-5786-8_14_Fig12_HTML.jpg](img/A978-1-4302-5786-8_14_Fig12_HTML.jpg)\n\
    \n**图 14-12.** 使用错误弹出助手对话框添加一个未实现 `onClick()` 事件处理方法\n\n现在，你已经编写好了 `onClick()`\
    \ 事件处理方法，如图 14-13 所示，你可以添加你信赖的 `frameAnimation.start()` 方法调用。完成的代码块如下所示：\n\n```\n\
    pag.setOnClickListener(new View.OnClickListener() {\n    @Override\n    public\
    \ void onClick(View arg0) {\n        frameAnimation.start();\n    }\n});\n```\n\
    \n请注意，我将两个方法的右花括号合并到了一行代码中，以节省代码列表中的一行空间。能适应不同的个人编码风格是很好的，因为当你看其他程序员的 Java 代码时，你应该尽量多这样做，以便了解其他开发者是如何实现\
    \ Java 代码的。在计算机编程中，完成完全相同的事往往有许多不同的方式！\n\n![A978-1-4302-5786-8_14_Fig13_HTML.jpg](img/A978-1-4302-5786-8_14_Fig13_HTML.jpg)\n\
    \n**图 14-13.** 在 `onClick()` 事件处理器中为 `frameAnimation` 对象添加 `.start()` 方法调用\n\n\
    另外，确保将 `.setOneShot()` 方法的参数值改回 `false`，这样你的 `AnimationDrawable` 对象就能无限无缝循环。你需要使用\
    \ `false` 设置来验证你的事件处理代码是否确实能正确启动（并最终停止）它。\n\n接下来，你可以删除实现了 `Runnable` 的 `animStarter`\
    \ 类，因为你现在将要“手动” `.start()`（以及稍后的 `.stop()`）你的 `AnimationDrawable` 对象。更准确地说，你的用户现在将通过点击和长按来控制（启动和停止）`AnimationDrawable`\
    \ 对象！因此，就动画而言，你基本上使图形元素变得可交互了；用户现在可以控制它何时动画以及何时静止。\n\n你可能已经想到，既然这个 `animStarter`\
    \ 类已被删除，我就不再展示它的代码列表了，因为没什么可看的。请相信它已经被删除了；如果你愿意，也可以将它留在代码中，因为你没有调用它，所以它也不会被用到。\n\
    \n值得注意的是，始终建议删除任何未使用的类、方法、对象和变量。你应该始终这样做，以确保应用程序的内存不会被分配给未使用的对象！那样会是低效的。\n"
- fmt: "Next, you’re going to save yourself some keystrokes, and cut and paste the\
    \ `onClick()` event handling code block, in order to create your `onLongClick()`\
    \ event handling code block, as shown in Figure [14-14](#A978-1-4302-5786-8_14_Chapter.html#Fig14).\
    \ Add the word `Long` before `Click` in all copied code (`onLongClickListener`,\
    \ `onLongClick`, etc.).\n\n![A978-1-4302-5786-8_14_Fig14_HTML.jpg](A978-1-4302-5786-8_14_Fig14_HTML.jpg)\n\
    \nFigure 14-14. Changing the `onLongClick()` method return type from `void` to\
    \ `boolean` using the error pop-up helper\n\nAs you can see, Eclipse has detected\
    \ an inaccurate method modifier and is offering to fix it for you. Mouse-over\
    \ your wavy red underlined `void` return type and have Eclipse ADT `change return\
    \ type of onLongClick() to boolean`, as suggested in the pop-up error dialog shown\
    \ in Figure [14-14](#A978-1-4302-5786-8_14_Chapter.html#Fig14).\n\nAs you can\
