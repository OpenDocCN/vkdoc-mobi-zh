  trans: '

    # PorterDuff.Mode 类：Android 混合常量


    Android 的 `PorterDuff.Mode` 类是 `java.lang.Enum` 类的直接子类，而 `java.lang.Enum` 类又是主类
    `java.lang.Object` 的子类。因此，它是一个旨在持有枚举常量的枚举器类，与其嵌套的 `PorterDuff` 类紧密配合使用。


    `PorterDuff.Mode` 类也是一个完全独特的类，它为开发者提供了 Android 操作系统中实现高级像素合成操作所需的混合模式常量。


    `PorterDuff.Mode` 类的 Java 层次结构如下：


    `java.lang.Object`


    `> java.lang.Enum<E extends java.lang.Enum<E>>`


    `> android.graphics.PorterDuff`


    `PorterDuff.Mode` 类也是 `android.graphics` 包的一部分，其导入语句引用的包导入路径为 `android.graphics.PorterDuff.Mode`，稍后在本章中编写实现
    `PorterDuff.Mode` 混合模式常量的 Java 代码时，你将会看到这一点。


    目前在这个类中定义了 18 个 `PorterDuff.Mode` 常量。我们将首先介绍像素混合常量，包括 `SCREEN`、`OVERLAY`、`LIGHTEN`、`DARKEN`、`MULTIPLY`
    和 `ADD`，因为这些常量允许在图像合成过程中应用最特殊的成像效果。


    之后，我们将介绍 `CLEAR`、`XOR` 以及 `SRC`（源）和 `DST`（目标）图像传输模式，这些模式对于应用高级图形设计工作流程或特殊效果也非常有用。


    如果你在阅读本章本节内容时，无法在脑海中形象化地理解每个算法方程对像素混合的作用，请不要担心，我们将在本章后面部分通过视觉方式了解这些作用，因此你将获得丰富的“混合”经验！


    需要注意的是，真正熟悉这些混合模式在给定合成应用中会做什么的唯一方法，就是花一些时间对其进行实验或使用。随着你使用混合模式的时间和经验增多，你将能够更准确地推测，在给定两张完全不同图像组合的情况下，任何特定混合模式会产生什么结果。


    我们要查看的第一个混合常量是使用最频繁的常量之一，即 `ADD` 常量。它将源图像的饱和度与目标图像资产相加，用方程形式表示为 `Saturate(S+D)`。你可能已经猜到，在这些方程中，`S`
    代表源，`D` 代表目标。


    我们要查看的第二个常量不是混合或传输常量，而是一个实用常量。`CLEAR` 常量会清除合成结果区域中的所有像素数据，因此其方程形式为 `[0,0]`。


    第三个常量在图像合成中很受欢迎，即 `DARKEN` 常量。它使用源图像资产来变暗目标图像资产，用方程形式表示为 `[ Sa+Da - Sa*Da, Sc*(1-Da)
    + Dc*(1-Sa) + min(Sc, Dc) ]`。


    还有一个 `LIGHTEN` 常量，图像合成者同样也经常使用它。你可能已经猜到，这与 `DARKEN` 常量相反。这个混合算法使用源图像资产作为变亮指南来提亮目标图像资产，用方程形式表示为
    `[ Sa+Da - Sa*Da, Sc*(1-Da) + Dc*(1-Sa) + max(Sc, Dc) ]`，与 `DARKEN` 算法相同，只是使用了
    `max` 函数而不是 `min`。


    还有一个 `MULTIPLY` 混合常量，这是我最喜欢的常量之一；它使用以下方程将源图像和目标图像资产之间的像素值相乘：`[ Sa*Da, Sc*Dc ]`。这通常会产生变暗的效果。小写的
    `a` 和 `c` 分别代表 Alpha（通道）和颜色（RGB）。


    比 `MULTIPLY` 混合模式稍微复杂一点的是 `SCREEN` 混合模式常量，它允许你基本上将源图像幽灵般叠加在目标图像之上，这使我们能够获得一些非常酷的特殊效果。此
    `SCREEN` 混合算法使用以下方程：`[ Sa+Da - Sa*Da, Sc+Dc - Sc*Dc ]`。


    我的另一个最爱是 `OVERLAY` 混合常量，这是特殊效果中最常用的混合常量之一。它结合了 `SCREEN` 混合模式和 `MULTIPLY` 混合模式。你可能已经从它的名字猜到，它将源图像和目标图像的像素值叠加在一起，使得源图像看起来像幽灵般浮现在目标图像之上。


    `OVERLAY` 是 `SCREEN` 混合常量更高级的版本，其中像素会根据其亮度值被相乘或滤色；图像较亮的部分变得更亮（滤色），较暗的部分变得更暗（相乘）。


    有五个与 `DST`（目标）相关的常量，它们专注于目标图像资产。第一个是 `DST` 常量，它仅隔离目标图像，意味着只显示目标图像，隐藏源图像，因此其方程为
    `[Da, Dc]`。


    `DST_ATOP` 常量获取目标图像中位于源图像上方（与源图像相交）的部分，并仅将此部分显示在源图像的**上方**（即 ATOP）。产生此结果的方程如下：`[
    Sa, Sa*Dc + Sc*(1-Da) ]`。


    `DST_IN` 常量获取目标图像中位于源图像内部（与源图像相交）的部分，并仅显示该目标图像中包含在源图像**内部**（IN 或 INSIDE）的部分，但不显示源图像本身的任何部分。这等价于布尔交集运算。产生此数字图像交集结果的方程为
    `[ Sa*Da, Sa*Dc ]`。


    `DST_OUT` 常量所做的与 `DST_IN` 常量完全相反，它获取目标图像中位于源图像外部（不与源图像相交）的部分，并仅显示目标图像中不与源图像相交（OUT
    或 OUTSIDE OF）的部分，但不显示源本身。这等价于布尔减法运算，因为叠加在目标图像上的源图像部分本质上是从目标图像中减去的。产生此最终结果的算法或方程书写如下：`[
    Da*(1-Sa), Dc*(1-Sa) ]`。


    `DST_OVER` 常量将目标图像叠加在源图像之上。因此，这等价于布尔并集运算，有时也称为布尔加法运算。方程如下：`[ Sa + (1-Sa)*Da, Rc
    = Dc+(1-Da)*Sc ]`。


    有五个与 `SRC`（源）相关的常量，它们专注于源图像资产。这些常量本质上与 `DST` 常量相同，只是在涉及源图像而非目标图像的意义上相反。其中第一个是
    `SRC` 常量，它仅隔离源图像，意味着只显示源图像，隐藏目标图像，因此其非常简单的方程为 `[Sa, Sc]`。


    `SRC_ATOP` 常量获取源图像中位于目标图像上方（与目标图像相交）的部分，并仅将此部分显示在目标图像的**上方**（即 ATOP）。产生此结果的算法或方程如下：`[
    Da, Sc*Da + (1-Sa)*Dc ]`。


    `SRC_IN` 常量获取源图像中位于目标图像内部（与目标图像相交）的部分，并仅显示源图像中包含在目标图像**内部**（IN）的部分，但不显示目标图像本身的任何部分。如果你想知道的话，其对应的布尔运算对于
    `SRC` 和 `DST` 模式类型是相同的。产生此结果的方程为 `[ Sa*Da, Sa*Dc ]`。

