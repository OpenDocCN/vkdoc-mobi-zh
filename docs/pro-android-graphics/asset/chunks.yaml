    # 将 ImageButton 缩小至类似 UI 元素的尺寸


    接下来，你需要返回并重启 Eclipse ADT；如果 Eclipse 已在桌面上打开，请务必右键点击项目文件夹，选择“刷新”选项，让 Eclipse “识别”你已添加到各个
    `/res/drawable-dpi` 子文件夹中的新图像资源。


    然后，使用“运行方式 ➤ Android 应用程序”工作流程，检查 Android 操作系统是否使用了你刚刚创建的这些较小图像资源。


    当你在 Nexus One 模拟器中再次运行该应用时，你会发现它看起来仍然像图 9-17 中那样，因此你需要查看是否有任何参数可以帮助你实现期望的最终效果。


    为此，请在 `<ImageButton>` 标签内使用 `android:` 工作流程，调出参数列表。浏览所有参数，看看是否有任何参数能帮助你让 `ImageButton`
    看起来更小。


    在参数列表的底部附近，你会看到 `android:scaleX` 和 `android:scaleY` 两个参数。双击每个参数，将它们添加到 `<ImageButton>`
    标签中，如图 9-25 所示，位于标签参数的第二行。


    由于你知道均匀缩放效果最好，因此你将使用实数或浮点缩放值 `0.5`，这相当于进行 2 倍下采样。


    ![A978-1-4302-5786-8_9_Fig25_HTML.jpg](img/A978-1-4302-5786-8_9_Fig25_HTML.jpg)


    **图 9-25.** 使用 `android:scaleX` 和 `android:scaleY` 将 ImageButton 缩小到更接近按钮的尺寸


    要查看添加这些 `android:scale` 标签后的视觉效果，而无需使用“运行方式 ➤ Android 应用程序”工作流程，你可以点击 XML 编辑窗格底部的**图形布局编辑器**选项卡。这将切换到可视化编辑模式，以查看
    50% 缩放操作（参数）的结果。


    如图 9-26 所示，这些 `android:scaleX` 和 `android:scaleY` 参数恰好为你提供了你一直寻找的最终结果，`ImageButton`
    现在看起来像是一个位于目录下的 UI 元素。


    ![A978-1-4302-5786-8_9_Fig26_HTML.jpg](img/A978-1-4302-5786-8_9_Fig26_HTML.jpg)


    **图 9-26.** 使用图形布局编辑器选项卡预览 ImageButton 缩放参数的结果


    然而，`android:scale` 参数将你的 `ImageButton` 容器保留为原始尺寸，正如你在图 9-26 所示的选择集（尺寸调整手柄）区域中看到的那样。因此，你需要向标签中添加一些额外的参数，将这个
    `ImageButton` 容器向左上方拉动，这将涉及使用一些负边距参数，接下来你将添加这些参数。


    首先，让我们添加一个 `android:layout_marginTop` 参数，其值为负的 `35 DIP`，以将新调整大小的 `ImageButton`
    向上拉近至目录。你可以使用**图形布局编辑器**选项卡预览此设置，以确保它对你有效。


    接下来，让我们添加 `android:layout_marginLeft` 参数，其值为负的 `35 DIP`，以将新调整大小的 `ImageButton`
    向左拉近屏幕左侧。你也可以使用**图形布局编辑器**选项卡预览此设置，以确保它对你有效。


    图 9-27 显示了在 `<ImageButton>` 标签内的顶部，位于两个 `android:scale` 参数旁边的 `android:layout_margin`
    参数。你的 `ImageButton` UI 元素现在有了十个自定义参数。


    ![A978-1-4302-5786-8_9_Fig27_HTML.jpg](img/A978-1-4302-5786-8_9_Fig27_HTML.jpg)


    **图 9-27.** 添加 `android:layout_marginTop` 和 `android:layout_marginLeft` 参数来定位
    ImageButton


    现在你已经设置好了所有用于缩放和定位 `ImageButton` 的参数，让我们再次利用**图形布局编辑器**快速预览你编写的 XML 标记，看看是否离期望的最终结果更近了一步。


    如图 9-28 所示，`ImageButton` UI 元素现在更靠近目录底部，最终用户将把它视为一个 UI 按钮，该按钮最终会将用户引导至书签工具 Activity
    子类。


    由于我在 XML 编辑窗格中选中了 `<ImageButton>` 标签，该 UI 元素在**图形布局编辑器**窗格中也显示为选中状态，这展示了负边距参数值如何移开
    UI 控件容器未使用的部分，以便缩放后的 UI 元素能够被定位到其在屏幕上应有的位置。


    另一种选择当然是，将你的图像资源本身的像素尺寸缩小一半，即缩小为 `180`、`120`、`90` 和 `60` 像素。


    按照你设计 XML 标记的方式，你可以轻松地添加更多目录条目，只要保持 `<ImageButton>` 子标签作为第一个嵌套的 `<LinearLayout>`
    子标签容器中的最后一个标签即可。


    ![A978-1-4302-5786-8_9_Fig28_HTML.jpg](img/A978-1-4302-5786-8_9_Fig28_HTML.jpg)


    **图 9-28.** 使用图形布局编辑器预览定位 ImageButton 的负边距设置


    最后，让我们在 Nexus One 上测试 `ImageButton`，如图 9-29 所示。


    ![A978-1-4302-5786-8_9_Fig29_HTML.jpg](img/A978-1-4302-5786-8_9_Fig29_HTML.jpg)


    **图 9-29.** 使用 Nexus One 模拟器测试 ImageButton 的状态、缩放和定位参数

