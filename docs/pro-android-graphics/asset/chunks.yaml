- fmt: "# The Java List Utility Class: Get Your Collections in Order\n\nThe Java `List`\
    \ construct is not a class but rather a `public interface` that implements `Collection<E>`\
    \ and is part of the `java.util` package.\n\nThe Java List public interface hierarchy\
    \ is structured as follows:\n\n`java.util.List<E>`\n\nThis Java List interface\
    \ belongs to the `java.util` package. Therefore, the `import statement` for using\
    \ this List interface in your app references the `java.util.List` package.\n\n\
    The List public interface is a `collection`, which maintains an ordering for its\
    \ individual data elements. Each element in this List includes an `index`.\n\n\
    Each List element can later be accessed by using its index, with the first index\
    \ numbered `zero`. Normally, a List will allow you to insert `duplicate` elements.\
    \ This is different than using the data Set class, where each of the data elements\
    \ needs to be 100% completely unique.\n\n## Java’s ArrayList Utility Class: An\
    \ Array of Collection List\n\nThe Java `ArrayList` class is a `public class`,\
    \ which extends `AbstractList<E>` and implements the `Serializable`, `Cloneable`,\
    \ and `RandomAccess` interfaces.\n\nThe Java ArrayList utility class hierarchy\
    \ is thus structured as follows:\n\n`java.lang.Object`  \n  `> java.util.AbstractCollection<E>`\
    \  \n    `> java.util.AbstractList<E>`  \n      `> java.util.ArrayList<E>`\n\n\
    The Java ArrayList class belongs to the `java.util` package. Therefore, its `import\
    \ statement` for using this ArrayList class in an app references the `java.util.ArrayList`\
    \ package path designation.\n\nThe ArrayList class (or object) is an implementation\
    \ of the List interface, which is implemented using an array. It is kind of like\
    \ having a database in system memory, as it features database-like operations,\
    \ such as `adding`, `removing`, and `overwriting` elements, just like a database\
    \ does with records.\n\nAll types of data objects are permitted to be used within\
    \ the array object, including a `null` object. You will be using `.add()` method\
    \ calls to `add` your `Coordinate` (point X,Y float data pair) class Java objects\
    \ to an ArrayList object that you’ll create later on in the chapter.\n\nArrayList\
    \ would be a good choice to use for a default List implementation.\n\n## Creating\
    \ an ArrayList Object to Hold Your Touch Point Data\n\nAdd a line of code at the\
    \ top of your `SketchPadView` class, right under the `paintScreen` object instantiation,\
    \ to set up a `coordinates` ArrayList object by using a `new` keyword to create\
    \ the ArrayList, as shown in Figure [17-17](#A978-1-4302-5786-8_17_Chapter.html#Fig17).\n\
    \n![A978-1-4302-5786-8_17_Fig17_HTML.jpg](A978-1-4302-5786-8_17_Fig17_HTML.jpg)\n\
    \nFigure 17-17. Using the `new` keyword to create an `ArrayList<List<Coordinate>>`\
    \ object named `coordinates` to hold points\n\nThe Java code that you are going\
    \ to write to accomplish this is as follows:\n\n`List<Coordinate> coordinates\
    \ = new ArrayList<Coordinate>();`\n\nWhat this does is to instantiate a new `ArrayList`\
    \ object based upon your `Coordinate` class and name it `coordinates`, as it is\
    \ going to contain the coordinates of where your user touches the screen (over\
    \ time) in the form of a List of Coordinate objects, designated in code as `List<Coordinate>`.\n\
    \nAs you will see in Figure [17-17](#A978-1-4302-5786-8_17_Chapter.html#Fig17)\
    \ and in Figure [17-18](#A978-1-4302-5786-8_17_Chapter.html#Fig18), you will also\
    \ need to mouse-over this ArrayList class in your code, and `import ArrayList`\
    \ (from a `java.util` package), as well as your List class, to `import List` (`java.util`)\
    \ before you can utilize either the `List<Coordinate>` List collection object\
    \ or the `ArrayList<Coordinate>` array object for your `SketchViewView` class.\n\
    \n![A978-1-4302-5786-8_17_Fig18_HTML.jpg](A978-1-4302-5786-8_17_Fig18_HTML.jpg)\n\
    \nFigure 17-18. Using mouse-over to invoke the Eclipse pop-up helper dialog to\
    \ import the List class from `java.util` package\n\nNow you have the code infrastructure\
    \ in place to create your `onDraw()` method, which will contain the `processing\
    \ core` of your `SketchPadView` View subclass.\n\n## Implementing Your `onDraw()`\
    \ Method: Painting Your Canvas\n\nThe first thing that you need to do to implement\
    \ your `onDraw()` method is to put the framework in place to hold your Java processing\
    \ logic.\n\nThis is done by coding the following method declaration and parameter\
    \ list right underneath your `SketchPadView` constructor method, as shown in Figure\
    \ [17-19](#A978-1-4302-5786-8_17_Chapter.html#Fig19). The method bootstrap Java\
    \ code will look just like the following:\n\n`public void onDraw(Canvas canvas)\
    \ { draw processing pipeline code will go in here }`\n\nMouse-over the `Canvas`\
    \ class (object) usage in your method declaration and `import Canvas` (`android.graphics`),\
    \ and you will be ready to code your drawing processing pipeline engine by using\
    \ a `for loop` to process X,Y coordinates.\n\n![A978-1-4302-5786-8_17_Fig19_HTML.jpg](A978-1-4302-5786-8_17_Fig19_HTML.jpg)\n\
    \nFigure 17-19. Creating an empty method called `public void onDraw()` and passing\
    \ in a `Canvas` object named `canvas`\n\nNext, code the `for` loop controlled\
    \ by data in the `coordinates` ArrayList you just created. Inside the `for` loop\
    \ code is a construct calling a `.drawCircle()` method off of the `Canvas` object\
    \ named `canvas`, as shown in Figure [17-20](#A978-1-4302-5786-8_17_Chapter.html#Fig20).\n\
    \n![A978-1-4302-5786-8_17_Fig20_HTML.jpg](A978-1-4302-5786-8_17_Fig20_HTML.jpg)\n\
    \nFigure 17-20. Creating a `for` loop that reads a `coordinates` ArrayList object\
    \ and calls a `.drawCircle()` using point data\n\nThis is done using the following\
    \ `for` loop Java code processing construct:\n\n```\nfor (Coordinate point : coordinates)\
    \ {\n   canvas.drawCircle(point.x, point.y, 5, paintScreen);\n}\n```\n\nYou will\
    \ be instantiating a `point` object using your `Coordinate` class in the next\
    \ section when you code an `OnTouchListener()` Touch event handler method. This\
    \ will finish your Java coding for your `SketchPadView` View subclass. For now,\
    \ what this does is use the contents of your `coordinates` ArrayList array inside\
    \ this `for` loop structure as your “counter” for this `for` loop.\n\nInside the\
    \ `for` loop curly brackets is one powerful Java statement that calls the `.drawCircle()`\
    \ method off of the `Canvas` object named `canvas`, which was passed into the\
    \ `onDraw()` method as a parameter or attribute.\n\nThe `.drawCircle()` method\
    \ is configured to draw a circle (your paintbrush) `5` pixels in diameter and\
    \ at a `point.x` and `point.y` coordinate location, using the settings collection\
    \ that you created for your `paintScreen` Paint object.\n\n## Creating Your `OnTouchListener()`\
    \ Method: Event Handling\n\nNext, you will collapse (using the minus icon on the\
    \ left) the methods that you aren’t working on and expand (using the plus icon\
    \ also on the left) your `onTouch()` method call, as shown in Figure [17-21](#A978-1-4302-5786-8_17_Chapter.html#Fig21).\
    \ As you can see, the first thing that you want to do each time you process a\
    \ Touch(screen) event is to instantiate a `Coordinate` object named `point` using\
    \ a `new` keyword like this:\n\n`Coordinate point = new Coordinate();`\n\n![A978-1-4302-5786-8_17_Fig21_HTML.jpg](A978-1-4302-5786-8_17_Fig21_HTML.jpg)\n\
    \nFigure 17-21. Constructing a `point` to a new `Coordinate` object inside the\
    \ `onTouch()` event handling method"
  raw: '## The Java List Utility Class: Get Your Collections in Order


    The Java `List` construct is not a class but rather a `public interface` that
    implements `Collection < E >` and is part of the `java.util` package.


    The Java List public interface hierarchy is structured as follows:


    `java.util.List < E>`


    This Java List interface belongs to the `java.util` package. Therefore, the `import
    statement` for using this List interface in your app references the `java.util.List`
    package.


    The List public interface is a `collection`, which maintains an ordering for its
    individual data elements. Each element in this List includes an `index`.


    Each List element can later be accessed by using its index, with the first index
    numbered `zero`. Normally, a List will allow you to insert `duplicate` elements.
    This is different than using the data Set class, where each of the data elements
    needs to be 100 % completely unique.


    ## Java’s ArrayList Utility Class: An Array of Collection List


    The Java `ArrayList` class is a `public class`, which extends `AbstractList <
    E >` and implements the `Serializable Cloneable RandomAccess`.


    The Java ArrayList utility class hierarchy is thus structured as follows:


    `java.lang.Object`


      `> java.util.AbstractCollection < E>`


        `> java.util.AbstractList < E>`


          `> java.util.ArrayList < E>`


    The Java ArrayList class belongs to the `java.util` package. Therefore, its `import
    statement` for using this ArrayList class in an app references the `java.util.ArrayList`
    package path designation.


    The ArrayList class (or object) is an implementation of the List interface, which
    is implemented using an array. It is kind of like having a database in system
    memory, as it features database-like operations, such as `adding`, `removing`,
    and `overwriting` elements, just like a database does with records.


    All types of data objects are permitted to be used within the array object, including
    a `null` object. You will be using `.add( )` method calls to `add` your `Coordinate`
    (point X,Y float data pair) class Java objects to an ArrayList object that you’ll
    create later on in the chapter.


    ArrayList would be a good choice to use for a default List implementation.


    ## Creating an ArrayList Object to Hold Your Touch Point Data


    Add a line of code at the top of your SketchPadView class, right under the `paintScreen`
    object instantiation, to set up a `coordinates` ArrayList object by using a `new`
    keyword to create the ArrayList, as shown in Figure [17-17](#A978-1-4302-5786-8_17_Chapter.html#Fig17).


    ![A978-1-4302-5786-8_17_Fig17_HTML.jpg](A978-1-4302-5786-8_17_Fig17_HTML.jpg)


    Figure 17-17.


    Using the new keyword to create an ArrayList List < Coordinate > object named
    coordinates to hold points


    The Java code that you are going to write to accomplish this is as follows:


    `List < Coordinate` > `coordinates` = `new ArrayList < Coordinate > ();`


    What this does is to instantiate a new `ArrayList` object based upon your `Coordinate`
    class and name it `coordinates`, as it is going to contain the coordinates of
    where your user touches the screen (over time) in the form of a List of Coordinate
    objects, designated in code as `List < Coordinate >`.


    As you will see in Figure [17-17](#A978-1-4302-5786-8_17_Chapter.html#Fig17) and
    in Figure [17-18](#A978-1-4302-5786-8_17_Chapter.html#Fig18), you will also need
    to mouse-over this ArrayList class in your code, and `import ArrayList` (from
    a `java.util` package), as well as your List class, to `import List` `( java.util)`
    before you can utilize either the List < Coordinate > List collection object or
    the ArrayList < Coordinate > array object for your SketchViewView class.


    ![A978-1-4302-5786-8_17_Fig18_HTML.jpg](A978-1-4302-5786-8_17_Fig18_HTML.jpg)


    Figure 17-18.


    Using mouse-over to invoke the Eclipse pop-up helper dialog to import the List
    class from java.util package


    Now you have the code infrastructure in place to create your `onDraw( )` method,
    which will contain the `processing core` of your SketchPadView View subclass.


    ## Implementing Your .onDraw( ) Method: Painting Your Canvas


    The first thing that you need to do to implement your onDraw( ) method is to put
    the framework in place to hold your Java processing logic.


    This is done by coding the following method declaration and parameter list right
    underneath your SketchPadView constructor method, as shown in Figure [17-19](#A978-1-4302-5786-8_17_Chapter.html#Fig19).
    The method bootstrap Java code will look just like the following:


    `public void onDraw(Canvas canvas) { draw processing pipeline code will go in
    here }`


    Mouse-over the Canvas class (object) usage in your method declaration and `import
    Canvas` `(android.graphics)`, and you will be ready to code your drawing processing
    pipeline engine by using a `for loop` to process X,Y coordinates.


    ![A978-1-4302-5786-8_17_Fig19_HTML.jpg](A978-1-4302-5786-8_17_Fig19_HTML.jpg)


    Figure 17-19.


    Creating an empty method called public void onDraw( ) and passing in a Canvas
    object named canvas


    Next, code the for loop controlled by data in the `coordinates` ArrayList you
    just created. Inside the for loop code is a construct calling a `.drawCircle(
    )` method off of the Canvas object named `canvas`, as shown in Figure [17-20](#A978-1-4302-5786-8_17_Chapter.html#Fig20).


    ![A978-1-4302-5786-8_17_Fig20_HTML.jpg](A978-1-4302-5786-8_17_Fig20_HTML.jpg)


    Figure 17-20.


    Creating a for loop that reads a coordinates ArrayList object and calls a .drawCircle(
    ) using point data


    This is done using the following for loop Java code processing construct:


    `for ( Coordinate point : coordinates ) {`


       `canvas.drawCircle(point.x, point.y, 5, paintScreen); }`


    You will be instantiating a `point` object using your `Coordinate` class in the
    next section when you code an `OnTouchListener( )` Touch event handler method.
    This will finish your Java coding for your SketchPadView View subclass. For now,
    what this does is use the contents of your `coordinates` ArrayList array inside
    this for loop structure as your “counter” for this for loop.


    Inside the for loop curly brackets is one powerful Java statement that calls the
    .drawCircle( ) method off of the Canvas object named canvas, which was passed
    into the .onDraw( ) method as a parameter or attribute.


    The `.drawCircle( )` method is configured to draw a circle (your paintbrush) `5`
    pixels in diameter and at a `point.x` and `point.y` coordinate location, using
    the settings collection that you created for your `paintScreen` Paint object.


    ## Creating Your OnTouchListener( ) Method: Event Handling


    Next, you will collapse (using the minus icon on the left) the methods that you
    aren’t working on and expand (using the plus icon also on the left) your onTouch(
    ) method call, as shown in Figure [17-21](#A978-1-4302-5786-8_17_Chapter.html#Fig21).
    As you can see, the first thing that you want to do each time you process a Touch(screen)
    event is to instantiate a `Coordinate` object named `point` using a `new` keyword
    like this:


    `Coordinate point` = `new Coordinate();`


    ![A978-1-4302-5786-8_17_Fig21_HTML.jpg](A978-1-4302-5786-8_17_Fig21_HTML.jpg)


    Figure 17-21.


    Constructing a point to a new Coordinate object inside the onTouch( ) event handling
    method'
  trans: "\n# Java 列表工具类：让集合井然有序\n\nJava 中的 `List` 构造并非一个类，而是一个实现了 `Collection<E>`\
    \ 的 `public interface`，属于 `java.util` 包的一部分。\n\nJava List 公共接口的层次结构如下：\n\n`java.util.List<E>`\n\
    \n此 Java List 接口属于 `java.util` 包。因此，在你的应用中要使用此 List 接口，其 `import 语句` 应引用 `java.util.List`\
    \ 包。\n\nList 公共接口是一个 `collection`（集合），它为每个独立的数据元素维护了一个顺序。该 List 中的每个元素都包含一个 `index`（索引）。\n\
    \n之后，每个 List 元素都可以通过其索引进行访问，第一个索引编号为 `零`。通常，List 允许你插入 `重复的` 元素。这与使用数据 Set 类不同，Set\
    \ 类中的每个数据元素都必须 100% 完全唯一。\n\n## Java 的 ArrayList 工具类：一种基于集合列表的数组\n\nJava 的 `ArrayList`\
    \ 类是一个 `public class`，它继承了 `AbstractList<E>` 并实现了 `Serializable`、`Cloneable` 和\
    \ `RandomAccess` 接口。\n\n因此，Java ArrayList 工具类的层次结构如下：\n\n`java.lang.Object`  \n\
      `> java.util.AbstractCollection<E>`  \n    `> java.util.AbstractList<E>`  \n\
          `> java.util.ArrayList<E>`\n\nJava ArrayList 类属于 `java.util` 包。因此，在应用中使用此\
    \ ArrayList 类时，其 `import 语句` 引用了 `java.util.ArrayList` 包路径标识。\n\nArrayList 类（或对象）是\
    \ List 接口的一个实现，它是使用数组来实现的。这有点像在系统内存中拥有一个数据库，因为它具有类似数据库的操作，例如 `添加`、`移除` 和 `覆盖`\
    \ 元素，就像数据库对记录的操作一样。\n\n允许在数组对象中使用所有类型的数据对象，包括 `null` 对象。你将使用 `.add()` 方法调用来把你的\
    \ `Coordinate`（点 X,Y 浮点数据对）类 Java 对象 `添加` 到一个 ArrayList 对象中，在本章稍后你将创建这个对象。\n\n\
    ArrayList 是作为默认 List 实现的一个不错选择。\n\n## 创建 ArrayList 对象来保存触摸点数据\n\n在你的 `SketchPadView`\
    \ 类顶部，紧挨着 `paintScreen` 对象实例化下方，添加一行代码，通过使用 `new` 关键字创建 ArrayList，来设置一个 `coordinates`\
    \ ArrayList 对象，如图 17-17 所示。\n\n![A978-1-4302-5786-8_17_Fig17_HTML.jpg](img/A978-1-4302-5786-8_17_Fig17_HTML.jpg)\n\
    \n图 17-17. 使用 `new` 关键字创建一个名为 `coordinates` 的 `ArrayList<List<Coordinate>>` 对象来保存点数据\n\
    \n你要编写的用于实现这一点的 Java 代码如下：\n\n`List<Coordinate> coordinates = new ArrayList<Coordinate>();`\n\
    \n这行代码的作用是，基于你的 `Coordinate` 类实例化一个新的 `ArrayList` 对象，并将其命名为 `coordinates`，因为该对象将以\
    \ Coordinate 对象的 List 形式（在代码中指定为 `List<Coordinate>`）包含用户触摸屏幕的位置（随时间变化）坐标。\n\n\
    如图 17-17 和图 17-18 所示，你还需将鼠标悬停在代码中的这个 ArrayList 类上，并 `import ArrayList`（来自 `java.util`\
    \ 包），以及导入你的 List 类，即 `import List`（`java.util`），之后才能为你的 `SketchViewView` 类使用 `List<Coordinate>`\
    \ List 集合对象或 `ArrayList<Coordinate>` 数组对象。\n\n![A978-1-4302-5786-8_17_Fig18_HTML.jpg](img/A978-1-4302-5786-8_17_Fig18_HTML.jpg)\n\
    \n图 17-18. 使用鼠标悬停调用 Eclipse 弹出式帮助对话框，从 `java.util` 包导入 List 类\n\n现在你已经拥有了必要的代码基础设施，可以创建你的\
    \ `onDraw()` 方法了，该方法将包含 `SketchPadView` View 子类的 `核心处理` 逻辑。\n\n## 实现 `onDraw()`\
    \ 方法：绘制画布\n\n要实现 `onDraw()` 方法，你需要做的第一件事是搭建好能容纳 Java 处理逻辑的框架。\n\n这是通过在你的 `SketchPadView`\
    \ 构造方法正下方编写如下方法声明和参数列表来完成的，如图 17-19 所示。方法引导 Java 代码看起来就像下面这样：\n\n`public void\
    \ onDraw(Canvas canvas) { 绘制处理流程代码将放在这里 }`\n\n将鼠标悬停在你方法声明中的 `Canvas` 类（对象）用法上，并\
    \ `import Canvas`（`android.graphics`），然后你就可以准备使用一个 `for 循环` 来处理 X,Y 坐标，从而编写你的绘制处理流程引擎了。\n\
    \n![A978-1-4302-5786-8_17_Fig19_HTML.jpg](img/A978-1-4302-5786-8_17_Fig19_HTML.jpg)\n\
    \n图 17-19. 创建一个名为 `public void onDraw()` 的空方法，并传入一个名为 `canvas` 的 `Canvas` 对象\n\
    \n接下来，编写由你刚创建的 `coordinates` ArrayList 中的数据所控制的 `for` 循环。在 `for` 循环代码内部，有一个结构调用名为\
    \ `canvas` 的 `Canvas` 对象上的 `.drawCircle()` 方法，如图 17-20 所示。\n\n![A978-1-4302-5786-8_17_Fig20_HTML.jpg](img/A978-1-4302-5786-8_17_Fig20_HTML.jpg)\n\
    \n图 17-20. 创建一个 `for` 循环，读取 `coordinates` ArrayList 对象，并使用点数据调用 `.drawCircle()`\n\
    \n这是通过使用以下 `for` 循环 Java 代码处理结构完成的：\n\n```\nfor (Coordinate point : coordinates)\
    \ {\n   canvas.drawCircle(point.x, point.y, 5, paintScreen);\n}\n```\n\n在下一小节中，当你编写\
    \ `OnTouchListener()` 触摸事件处理方法时，你将使用 `Coordinate` 类实例化一个 `point` 对象。这将完成你为 `SketchPadView`\
    \ View 子类的 Java 编码工作。目前，这段代码的作用是，在此 `for` 循环结构中使用你的 `coordinates` ArrayList 数组的内容作为此\
    \ `for` 循环的“计数器”。\n\n在 `for` 循环的花括号内部是一个强大的 Java 语句，它调用了名为 `canvas` 的 `Canvas`\
    \ 对象上的 `.drawCircle()` 方法，该 `canvas` 对象是作为参数或属性传入 `onDraw()` 方法的。\n\n`.drawCircle()`\
    \ 方法配置为使用你为 `paintScreen` Paint 对象创建的设置集合，在 `point.x` 和 `point.y` 坐标位置绘制一个直径为\
    \ `5` 像素的圆（即你的画笔）。\n\n## 创建 `OnTouchListener()` 方法：事件处理\n\n接下来，你将折叠（使用左侧的减号图标）你正在处理的方法，并展开（也使用左侧的加号图标）你的\
    \ `onTouch()` 方法调用，如图 17-21 所示。如你所见，每次处理触摸（屏幕）事件时，你想做的第一件事就是使用 `new` 关键字实例化一个名为\
    \ `point` 的 `Coordinate` 对象，如下所示：\n\n`Coordinate point = new Coordinate();`\n\n\
    ![A978-1-4302-5786-8_17_Fig21_HTML.jpg](img/A978-1-4302-5786-8_17_Fig21_HTML.jpg)\n\
    \n图 17-21. 在 `onTouch()` 事件处理方法内部，将 `point` 构造为一个新的 `Coordinate` 对象\n"
- fmt: "# Android’s MotionEvent Class: Movement Data in Android\n\nThe Android `MotionEvent`\
    \ class is a `public class`, which extends `InputEvent` and implements `Parcelable`.\n\
    \nAndroid’s `MotionEvent` class hierarchy is structured as follows:\n\n`java.lang.Object`\n\
    \  `> android.view.InputEvent`\n    `> android.view.MotionEvent`\n\nThe Android\
    \ `MotionEvent` belongs to the `android.view` package, which is why you are using\
    \ it in your `SketchPadView` `View` subclass. Therefore, the `import` statement\
    \ for using this `MotionEvent` class in your app references the `android.view.MotionEvent`\
    \ package path structure.\n\nA `MotionEvent` is an object that can be utilized\
    \ to report movement in the Android OS. This movement could come from a user’s\
    \ finger in `TouchMode`, or from a `Mouse`, `Trackball`, `NavKeys`, `LightPen`,\
    \ `Game Controller`, `3D Trackball`, or similar Android hardware feature that\
    \ can (will) generate `MotionEvent`s.\n\n`MotionEvent` objects can hold either\
    \ absolute or relative movement data, as well as other types of related data.\
    \ The data that will be loaded into the `MotionEvent` object data structure will\
    \ ultimately depend upon what type of hardware device is generating this movement\
    \ datastream in the first place.\n\n`MotionEvent` objects encode movement data\
    \ using an action code along with a set of axis values. Unless your user is using\
    \ a 3D controller, axis values will usually be X and Y, as they are in your application\
    \ in this chapter.\n\nThe action code will specify the state change that has occurred\
    \ since the last `MotionEvent`, for instance, if the mouse pointer has gone down\
    \ or up.\n\nThe axis values describe the coordinate position as well as other\
    \ movement properties, and these are the values that you will be extracting from\
    \ your `arg1` `MotionEvent` object during the next section of this chapter.\n\n\
    Modern Android devices can track multiple movement data at the same time. Some\
    \ Android hardware supports `MultiTouch` displays that can broadcast one movement\
    \ data stream for each user’s finger. Individual fingers and other objects that\
    \ generate movement data streams are referred to as pointers.\n\nWe are not using\
    \ `MultiTouch` movement data in the `SketchPad` app because the AVD emulator does\
    \ not currently support it. We need to be able to run the software we are creating\
    \ in this book using a platform (method) that every reader can access and utilize,\
    \ so we’re using the AVD in the Eclipse IDE.\n\n`MotionEvent` objects contain\
    \ information about all of the pointers that are currently in use, even if some\
    \ of these pointers have not been moved since the last `MotionEvent` object was\
    \ delivered by the Android operating system.\n\nThe Android `MotionEvent` class\
    \ defines several different methods that can be used to access the coordinate\
    \ position, as well as other properties of pointers. These include `.getX()` and\
    \ `.getY()` method calls, which we’ll use.\n\nOther method calls for the `MotionEvent`\
    \ class offer more fine-tuned or detailed data to be extracted from the `MotionEvent`\
    \ object, such as `.getAction()`, `.getFlags()`, `.getOrientation()`, `.getSize()`,\
    \ `.getAxisValue()`, `.getDeviceId()`, `.getSource()`, `.getMetaState()`, and\
    \ a plethora of others.\n\n`MotionEvent` method calls take a pointer index as\
    \ the parameter rather than using the pointer ID value. The pointer index of each\
    \ pointer contained in the `MotionEvent` object ranges from zero to one less than\
    \ a value returned by a `.getPointerCount()` method call. As you have seen, it\
    \ is necessary to use an array when dealing with `MotionEvent` objects due to\
    \ the sheer volume of data that’s flowing through your draw processing pipeline\
    \ in real time.\n\nThe order in which individual pointer data might appear in\
    \ the `MotionEvent` object is undefined. For this reason, the pointer index of\
    \ the pointer may change from one `MotionEvent` object to another. However, a\
    \ pointer id for a pointer will always remain constant as long as the pointer\
    \ remains active.\n\n## Processing Your Movement Data: Using .getX() and .getY()\n\
    \nOnce you have created a `point` `Coordinate` object to hold the floating point\
    \ X and Y values that will be coming into your `onTouch()` method via the `arg1`\
    \ `MotionEvent` object, you call `.getX()` or `.getY()` methods, as shown in Figure\
    \ [17-22](#A978-1-4302-5786-8_17_Chapter.html#Fig22), to extract the X and Y coordinate\
    \ data from this `MotionEvent` object structure, which has been passed into your\
    \ `onTouch()` event handling method.\n\n![A978-1-4302-5786-8_17_Fig22_HTML.jpg](A978-1-4302-5786-8_17_Fig22_HTML.jpg)\n\
    \n*Figure 17-22. Calling a .getX() and .getY() method on the MotionEvent object\
    \ named arg1 to set point object data*\n\nNow that you have created your `point`\
    \ `Coordinate` object and loaded it with X and Y coordinate values, you can use\
    \ the `ArrayList` class’s `.add()` method to add this point (X,Y) object to your\
    \ `coordinates` `ArrayList` object, which you created at the top of your `SketchPadView`\
    \ class, as shown in Figure [17-23](#A978-1-4302-5786-8_17_Chapter.html#Fig23).\n\
    \nYou will accomplish this by using the following compact line of Java code:\n\
    \n`coordinates.add(point);`\n\nNow that you have added this `MotionEvent` coordinate\
    \ data to your `coordinates` `ArrayList` object, you can call the `View` class\
    \ methods that will update your screen and return the `true` value to the calling\
    \ entity, letting it know that your `MotionEvent` object data processing has been\
    \ completed.\n\n![A978-1-4302-5786-8_17_Fig23_HTML.jpg](A978-1-4302-5786-8_17_Fig23_HTML.jpg)\n\
    \n*Figure 17-23. Using an ArrayList class .add() method to add a Coordinate object\
    \ named point to coordinates array*\n\nThe next line of code that you will need\
    \ to write in your `onTouch()` method is an `invalidate()` method call, which\
    \ is shown in Figure [17-24](#A978-1-4302-5786-8_17_Chapter.html#Fig24). Calling\
    \ an `invalidate()` method will trigger a refresh for your custom `View` object.\n\
    \nEssentially what this means is that an `invalidate()` method call will serve\
    \ to redraw the display screen using the latest graphics data available.\n\nI’m\
    \ not sure why this method call is named `invalidate`, other than possibly instructing\
    \ the Android OS to invalidate what is currently displayed in a `View` object.\
    \ This would signal that you wanted Android to perform a display screen refresh\
    \ operation using the new information that you have drawn into the framebuffer.\
    \ It’s not the most intuitive method call in the OS, that’s for sure, but as long\
    \ as you know what it’s doing, you’re all set to draw.\n\nA framebuffer is a 2D\
    \ area held in system memory (such as a `Canvas` object) that has the same dimensions\
    \ as the display screen and is used to compose graphics that will eventually be\
    \ drawn to a screen (invalidated).\n\n![A978-1-4302-5786-8_17_Fig24_HTML.jpg](A978-1-4302-5786-8_17_Fig24_HTML.jpg)\n\
    \n*Figure 17-24. Calling View class’s invalidate() method to update SketchPadView\
    \ object once the XY data processed*\n\nFinally, if you haven’t done so already,\
    \ change your `return` statement at the end of the `onTouch()` method from a `false`\
    \ value over to a `true` value."
  raw: '## Android’s MotionEvent Class: Movement Data in Android


    The Android `MotionEvent` class is a `public class, which extends InputEvent and
    implements Parcelable`.


    Android’s MotionEvent class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.InputEvent`


        `> android.view.MotionEvent`


    The Android MotionEvent belongs to the `android.view` package, which is why you
    are using it in your SketchPadView View subclass. Therefore, the `import statement`
    for using this MotionEvent class in your app references the `android.view.MotionEvent`
    package path structure.


    A MotionEvent is an object that can be utilized to report `movement` in the Android
    OS. This movement could come from a user’s `finger` in TouchMode, or from a `Mouse`,
    `Trackball`, `NavKeys`, `LightPen`, `Game Controller`, `3D Trackball`, or similar
    Android hardware feature that can (will) generate MotionEvents.


    MotionEvent objects can hold either `absolute` or `relative` movement data, as
    well as other types of related data. The data that will be loaded into the MotionEvent
    object data structure will ultimately depend upon what type of hardware device
    is generating this movement datastream in the first place.


    MotionEvent objects encode movement data using an `action code` along with a set
    of `axis values`. Unless your user is using a 3D controller, axis values will
    usually be X and Y, as they are in your application in this chapter.


    The action code will specify the `state change` that has occurred since the last
    MotionEvent, for instance, if the mouse pointer has gone down or up.


    The axis values describe the `coordinate position` as well as other movement properties,
    and these are the values that you will be extracting from your `arg1 MotionEvent`
    object during the next section of this chapter.


    Modern Android devices can track `multiple movement data` at the same time. Some
    Android hardware supports `MultiTouch` displays that can broadcast one movement
    data stream for each user’s finger. Individual fingers and other objects that
    generate movement data streams are referred to as `pointers`.


    We are not using MultiTouch movement data in the SketchPad app because the AVD
    emulator does not currently support it. We need to be able to run the software
    we are creating in this book using a platform (method) that every reader can access
    and utilize, so we’re using the AVD in the Eclipse IDE.


    MotionEvent objects contain information about all of the pointers that are currently
    in use, even if some of these pointers have not been moved since the last MotionEvent
    object was delivered by the Android operating system.


    The Android MotionEvent class defines several different methods that can be used
    to access the coordinate position, as well as other properties of pointers. These
    include `.getX( )` and `.getY( )` method calls, which we’ll use.


    Other method calls for the MotionEvent class offer more fine-tuned or detailed
    data to be extracted from the MotionEvent object, such as `.getAction( )`, `.getFlags(
    )`, `.getOrientation( )`, `.getSize( )`, `.getAxisValue( )`, `.getDeviceId( )`,
    `.getSource( )`, `.getMetaState( )`, and a plethora of others.


    MotionEvent method calls take a `pointer index` as the parameter rather than using
    the pointer ID value. The pointer index of each pointer contained in the MotionEvent
    object ranges from zero to one less than a value returned by a `.getPointerCount(
    )` method call. As you have seen, it is necessary to use an `array` when dealing
    with MotionEvent objects due to the sheer volume of data that’s flowing through
    your draw processing pipeline in real time.


    The order in which individual pointer data might appear in the MotionEvent object
    is undefined. For this reason, the pointer index of the pointer may change from
    one MotionEvent object to another. However, a pointer id for a pointer will always
    remain constant as long as the pointer remains active.


    ## Processing Your Movement Data: Using .getX( ) and .getY( )


    Once you have created a `point Coordinate` object to hold the floating point X
    and Y values that will be coming into your `onTouch( )` method via the `arg1`
    MotionEvent object, you call `.getX( )` or `.getY( )` methods, as shown in Figure
    [17-22](#A978-1-4302-5786-8_17_Chapter.html#Fig22), to `extract` the X and Y coordinate
    data from this MotionEvent object structure, which has been passed into your onTouch(
    ) event handling method.


    ![A978-1-4302-5786-8_17_Fig22_HTML.jpg](A978-1-4302-5786-8_17_Fig22_HTML.jpg)


    Figure 17-22.


    Calling a .getX( ) and .getY( ) method on the MotionEvent object named arg1 to
    set point object data


    Now that you have created your `point Coordinate` object and loaded it with X
    and Y coordinate values, you can use the ArrayList class’s `.add( )` method to
    add this point (X,Y) object to your `coordinates` ArrayList object, which you
    created at the top of your SketchPadView class, as shown in Figure [17-23](#A978-1-4302-5786-8_17_Chapter.html#Fig23).


    You will accomplish this by using the following compact line of Java code:


    `coordinates.add(point);`


    Now that you have added this MotionEvent coordinate data to your coordinates ArrayList
    object, you can call the View class methods that will update your screen and return
    the `true` value to the calling entity, letting it know that your MotionEvent
    object data processing has been completed.


    ![A978-1-4302-5786-8_17_Fig23_HTML.jpg](A978-1-4302-5786-8_17_Fig23_HTML.jpg)


    Figure 17-23.


    Using an ArrayList class .add( ) method to add a Coordinate object named point
    to coordinates array


    The next line of code that you will need to write in your onTouch( ) method is
    an `invalidate( )` method call, which is shown in Figure [17-24](#A978-1-4302-5786-8_17_Chapter.html#Fig24).
    Calling an invalidate( ) method will trigger a `refresh` for your custom View
    object.


    Essentially what this means is that an invalidate( ) method call will serve to
    `redraw` the display screen using the latest graphics data available.


    I’m not sure why this method call is named invalidate, other than possibly instructing
    the Android OS to invalidate what is currently displayed in a View object. This
    would signal that you wanted Android to perform a display screen `refresh operation`
    using the new information that you have drawn into the `framebuffer`. It’s not
    the most intuitive method call in the OS, that’s for sure, but as long as you
    know what it’s doing, you’re all set to draw.


    A framebuffer is a 2D area held in system memory (such as a Canvas object) that
    has the same dimensions as the display screen and is used to compose graphics
    that will eventually be drawn to a screen (invalidated).


    ![A978-1-4302-5786-8_17_Fig24_HTML.jpg](A978-1-4302-5786-8_17_Fig24_HTML.jpg)


    Figure 17-24.


    Calling View class’s invalidate( ) method to update SketchPadView object once
    the XY data processed


    Finally, if you haven’t done so already, change your return statement at the end
    of the onTouch( ) method from a false value over to a `true` value.'
  trans: "\n# Android 的 MotionEvent 类：Android 中的移动数据\n\nAndroid 的 `MotionEvent` 类是一个\
    \ `public class`，它继承自 `InputEvent` 并实现了 `Parcelable` 接口。\n\nAndroid 的 `MotionEvent`\
    \ 类层次结构如下所示：\n\n`java.lang.Object`\n  `> android.view.InputEvent`\n    `> android.view.MotionEvent`\n\
    \nAndroid 的 `MotionEvent` 属于 `android.view` 包，这就是你在 `SketchPadView` 的 `View` 子类中使用它的原因。因此，在你的应用中为了使用这个\
    \ `MotionEvent` 类，所需的 `import` 语句引用的是 `android.view.MotionEvent` 包路径结构。\n\n`MotionEvent`\
    \ 是一个可用于报告 Android 操作系统中移动事件的对象。这种移动可能来自用户在 `TouchMode` 下的手指，也可能来自`鼠标`、`轨迹球`、`导航键`、`光笔`、`游戏控制器`、`3D\
    \ 轨迹球`或类似的能够（将会）生成 `MotionEvent` 的 Android 硬件特性。\n\n`MotionEvent` 对象可以容纳绝对或相对移动数据，以及其他类型的相关数据。加载到\
    \ `MotionEvent` 对象数据结构中的数据最终将取决于最初是哪种类型的硬件设备生成了这个移动数据流。\n\n`MotionEvent` 对象使用一个动作代码和一组轴值来编码移动数据。除非你的用户使用的是\
    \ 3D 控制器，否则轴值通常为 X 和 Y，与你本章应用中的情况一致。\n\n该动作代码将指定自上次 `MotionEvent` 以来发生的状态变化，例如，鼠标指针是按下了还是释放了。\n\
    \n轴值描述了坐标位置以及其他移动属性，这些值正是你将在本章下一部分中从 `arg1` 这个 `MotionEvent` 对象中提取的值。\n\n现代 Android\
    \ 设备可以同时跟踪多个移动数据。某些 Android 硬件支持`多点触控`显示屏，可以为每个用户的手指广播一个移动数据流。产生移动数据流的单个手指和其他对象被称为指针。\n\
    \n我们在 `SketchPad` 应用中不使用`多点触控`移动数据，因为 AVD 模拟器目前不支持此功能。我们需要使用每个读者都能访问和利用的平台（方法）来运行本书中创建的软件，因此我们使用的是\
    \ Eclipse IDE 中的 AVD。\n\n`MotionEvent` 对象包含关于所有当前正在使用的指针的信息，即使其中某些指针自上次 Android\
    \ 操作系统传递 `MotionEvent` 对象以来未曾移动过。\n\nAndroid 的 `MotionEvent` 类定义了多种可用于访问坐标位置以及指针其他属性的不同方法。其中包括我们将用到的\
    \ `.getX()` 和 `.getY()` 方法调用。\n\n`MotionEvent` 类的其他方法调用允许从 `MotionEvent` 对象中提取更精细或更详细的数据，例如\
    \ `.getAction()`、`.getFlags()`、`.getOrientation()`、`.getSize()`、`.getAxisValue()`、`.getDeviceId()`、`.getSource()`、`.getMetaState()`\
    \ 以及其他众多方法。\n\n`MotionEvent` 方法调用使用指针索引作为参数，而不是使用指针 ID 值。`MotionEvent` 对象中包含的每个指针的指针索引范围从零到\
    \ `.getPointerCount()` 方法调用返回的值减一。正如你所见，在处理 `MotionEvent` 对象时，由于通过绘制处理管道实时流动的数据量巨大，因此有必要使用数组。\n\
    \n单个指针数据在 `MotionEvent` 对象中出现的顺序是不确定的。因此，指针的索引可能会从一个 `MotionEvent` 对象变为另一个。然而，只要指针保持活跃状态，其指针\
    \ ID 将始终保持不变。\n\n## 处理你的移动数据：使用 .getX() 和 .getY()\n\n一旦你创建了一个 `point` 的 `Coordinate`\
    \ 对象来容纳通过 `arg1` 这个 `MotionEvent` 对象传入 `onTouch()` 方法的浮点型 X 和 Y 值，你便可以调用 `.getX()`\
    \ 或 `.getY()` 方法，如图 17-22 所示，从这个已传递到你的 `onTouch()` 事件处理方法中的 `MotionEvent` 对象结构中提取\
    \ X 和 Y 坐标数据。\n\n![A978-1-4302-5786-8_17_Fig22_HTML.jpg](img/A978-1-4302-5786-8_17_Fig22_HTML.jpg)\n\
    \n*图 17-22. 在名为 arg1 的 MotionEvent 对象上调用 .getX() 和 .getY() 方法来设置点对象的数据*\n\n现在你已经创建了\
    \ `point` 的 `Coordinate` 对象，并用 X 和 Y 坐标值加载了它，你可以使用 `ArrayList` 类的 `.add()` 方法将此点\
    \ (X,Y) 对象添加到你的 `coordinates` 的 `ArrayList` 对象中，该对象是在你的 `SketchPadView` 类顶部创建的，如图\
    \ 17-23 所示。\n\n你将通过以下一行紧凑的 Java 代码来实现这一点：\n\n`coordinates.add(point);`\n\n现在你已经将这个\
    \ `MotionEvent` 坐标数据添加到了你的 `coordinates` 的 `ArrayList` 对象中，你可以调用 `View` 类的方法来更新你的屏幕，并将\
    \ `true` 值返回给调用实体，让它知道你的 `MotionEvent` 对象数据处理已完成。\n\n![A978-1-4302-5786-8_17_Fig23_HTML.jpg](img/A978-1-4302-5786-8_17_Fig23_HTML.jpg)\n\
    \n*图 17-23. 使用 ArrayList 类的 .add() 方法将名为 point 的 Coordinate 对象添加到坐标数组*\n\n你需要在\
    \ `onTouch()` 方法中编写的下一行代码是 `invalidate()` 方法调用，如图 17-24 所示。调用 `invalidate()` 方法将触发自定义\
    \ `View` 对象的刷新。\n\n本质上这意味着，`invalidate()` 方法调用将用于使用最新的可用图形数据重绘显示屏幕。\n\n我不太确定为什么这个方法调用被命名为\
    \ `invalidate`，也许只是为了指示 Android 操作系统使 `View` 对象中当前显示的内容失效。这将表明你希望 Android 使用你已绘制到帧缓冲区中的新信息来执行显示屏幕刷新操作。可以肯定地说，这并非操作系统中最直观的方法调用，但只要你知道它的作用，你就可以开始绘制了。\n\
    \n帧缓冲区是系统内存（如 `Canvas` 对象）中保存的一个二维区域，其尺寸与显示屏幕相同，用于合成最终将绘制到屏幕（通过失效）上的图形。\n\n![A978-1-4302-5786-8_17_Fig24_HTML.jpg](img/A978-1-4302-5786-8_17_Fig24_HTML.jpg)\n\
    \n*图 17-24. 在 XY 数据处理完毕后，调用 View 类的 invalidate() 方法更新 SketchPadView 对象*\n\n最后，如果你还没有这样做，请将\
    \ `onTouch()` 方法末尾的 `return` 语句从 `false` 值改为 `true` 值。\n"
- fmt: '## Coding Your SketchPad Activity: Using the `SketchPadView`


    Now that you can create a new type of `View` object, called `SketchPadView`, you
    can click the `SketchPad.java` tab, as shown in Figure [17-25](#A978-1-4302-5786-8_17_Chapter.html#Fig25),
    and declare the `SketchPadView` object, named `sketchPadView`. You can now use
    a `SketchPadView`.


    ![A978-1-4302-5786-8_17_Fig25_HTML.jpg](A978-1-4302-5786-8_17_Fig25_HTML.jpg)


    Figure 17-25. Declaring a `SketchPadView` object named `sketchPadView` at the
    top of your `SketchPad.java` Activity


    The first thing you want to do with your `sketchPadView` object is to use the
    constructor method to instantiate it, by using a `new` keyword, as follows:


    `sketchPadView` = `new SketchPadView(this);`


    Notice in Figure [17-26](#A978-1-4302-5786-8_17_Chapter.html#Fig26) that you are
    passing the `Context` object (`this`) that is required for your `SketchPadView(Context
    context)` constructor method. The `Context` object (which is represented via the
    `this` keyword, on this side of things, no pun intended), as you know, contains
    information describing how your `SketchPad.java` Activity class fits into your
    `GraphicsDesign` app.


    ![A978-1-4302-5786-8_17_Fig26_HTML.jpg](A978-1-4302-5786-8_17_Fig26_HTML.jpg)


    Figure 17-26. Instantiating the `sketchPadView` object using the `SketchPadView()`
    constructor inside the `onCreate()`


    Your next step will be to tell the `ContentView` object for your Activity what
    you want it to display. This is often set to an XML UI layout definition, as you’ve
    seen throughout this book. In this case, you’ll set this to display your `sketchPadView`
    `SketchPadView` object instead, as shown in Figure [17-27](#A978-1-4302-5786-8_17_Chapter.html#Fig27).


    ![A978-1-4302-5786-8_17_Fig27_HTML.jpg](A978-1-4302-5786-8_17_Fig27_HTML.jpg)


    Figure 17-27. Setting `ContentView` for the SketchPad Activity subclass to the
    `sketchPadView` `SketchPadView` object


    This is done by passing the `sketchPadView` object to the `ContentView` object
    by using a `.setContentView()` method, as shown in the following line of Java
    code:


    `setContentView(sketchPadView);`


    The next thing that you will need to do is to activate your SketchPad Activity
    screen surface for the user so it will send `MotionEvent` objects to your `onTouch()`
    event handing method. You do this by requesting the focus for the View from the
    Android OS, by calling the `.requestFocus()` method off of the `sketchPadView`
    object. This is done using the following line of Java code:


    `sketchPadView.requestFocus();`


    As you can see, in Figure [17-28](#A978-1-4302-5786-8_17_Chapter.html#Fig28),
    I clicked one of the `sketchPadView` object references in the Java code in the
    Eclipse IDE so that it would highlight an object trail for me (or in this case,
    for you). I did this so that you could see the object declaration and instantiation
    (tan highlighting), as well as its usage (grey highlighting, that is, the second
    two highlights).


    ![A978-1-4302-5786-8_17_Fig28_HTML.jpg](A978-1-4302-5786-8_17_Fig28_HTML.jpg)


    Figure 17-28. Calling the TouchScreen Focus using a `.requestFocus()` method call
    off of the `sketchPadView` object


    The final step in adding this SketchPad Utility to your `GraphicsDesign` app is
    to test the application in a Nexus One emulator AVD inside Eclipse.


    ## Testing the SketchPad Activity Class: Handwriting a PAG Logo


    Right-click your project folder name, and select the `Run As ➤ Android Application`
    menu sequence to launch the Nexus One AVD. When the app home screen appears, click
    the `MENU` button on the top-right of the emulator (second button in the bottom
    row), open your Options menu, click `The PAG SketchPad` menu item, and launch
    your SketchPad Activity subclass.


    Click and hold your left mouse button, simulating your finger touch on the surface
    of your screen, and using your best handwriting, write `PAG` for me!


    As you can see in Figure [17-29](#A978-1-4302-5786-8_17_Chapter.html#Fig29), the
    new addition to your `GraphicsDesign` app suite works great, and as you can see
    on the right side of the screenshot, the faster you move your finger, the more
    space appears between the 5-pixel circles that are drawn to the screen. I moved
    rapidly in my stroke at the end of this `PAG` handwriting exercise to show this
    visually on the screen.


    ![A978-1-4302-5786-8_17_Fig29_HTML.jpg](A978-1-4302-5786-8_17_Fig29_HTML.jpg)


    Figure 17-29. Testing the `PAG` SketchPad Activity in the Nexus One AVD emulator
    and handwriting a `PAG` logo


    This is all fairly cool, but let’s take this SketchPad Utility to the next level
    by implementing something that we would find in a professional image editing software
    package, such as Photoshop or GIMP. One of the features I use in those packages
    is the `clone tool`, which allows me to select imagery that I want to turn into
    a paintbrush source, and paint using that image’s pixel data. If we could implement
    something like this in the `SketchPadView`, it would be much more impressive (and
    useful) than basic cyan ink drawing.'
