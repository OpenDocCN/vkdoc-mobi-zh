  raw: 'For example, when looking for a low-density LDPI image asset, if one isn’t
    available, Android will (correctly) scale down the high-density version of that
    image asset, because Android knows that scaling higher-density assets down to
    lower-density targets provides superior visual results.


    Let’s take a look at this from a math perspective. If we downsample by 2X from
    240 DPI to 120 DPI, we are going to obtain a superior result than if we had downsampled
    by 1.5X from 160 DPI to 120 DPI. In image resampling, downsampling, or upsampling,
    you always want to use a factor of 2 or 4 if you can to provide the best quality
    result from the resampling algorithm.


    You might be wondering: What if I don’t want my image assets to be scaled, to
    compensate for different pixel density displays? If you want your image to be
    big on low-density displays, and tiny on high-density displays, for whatever your
    reason, there is indeed a way to accomplish this in Android.


    The way to instruct Android to never pre-scale when appropriate resolution density
    assets are not available for use is to put image assets that are never to be scaled
    into a resource directory with the -nodpi configuration qualifier. This would,
    of course, equate to the `/res/drawable-nodpi` folder naming convention. When
    Android uses an image asset from this configuration qualifier folder, it will
    not scale it for any reason, even if it deems that it should based on the current
    device density and its internal when-to-scale algorithms.


    Besides density configuration modifiers (LDPI, MDPI, HDPI, XHDPI, etc.), there
    are orientation configuration modifiers (PORT and LAND ) in Android, as well as
    aspect ratio configuration modifiers (LONG and NOTLONG ).


    These can be used to create folder structures that contain custom designs that
    fit orientation (portrait or landscape) and aspect ratio (widescreen) display
    screen scenarios. These configuration modifiers can also be used in conjunction
    with the other modifiers, for instance, they can be chained together, so `/res/drawable-land-hdpi`
    would contain landscape HDPI assets.


    ## The DisplayMetrics Class: Size, Density, and Font Scaling


    You might be wondering if the Android OS has an API or class that allows developers
    to poll the device their application is running on and obtain information about
    its display characteristics. In fact, there is, and it is called the DisplayMetrics
    class.


    The DisplayMetrics class is a member of the `android.util` operating system utilities
    package, which is no surprise, and it provides an object structure that, when
    polled (accessed) by the developer, gives the display metrics information regarding
    the current (end user) device’s display screen. Information provided includes
    the display physical size in both the X and Y dimensions, the pixel density in
    both the X and Y dimensions, and the font scaling factor that is currently being
    used by the Android OS.


    To access the DisplayMetrics class members, initialize the DisplayMetrics object
    using the DisplayMetrics( ) constructor,using the following code:


    `DisplayMetrics currentDeviceDisplayMetrics = new DisplayMetrics();`


    `getWindowManager().getDefaultDisplay().getMetrics(currentDeviceDisplayMetrics);`


    There are eight constants in this class: DENSITY_DEFAULT, DENSITY_HIGH, DENSITY_LOW,
    DENSITY_MEDIUM, DENSITY_TV, DENSITY_XHIGH, DENSITY_XXHIGH, and DENSITY_XXXHIGH.


    If you wanted to research this DisplayMetrics class further on the Android Developer
    web site, it can be accessed by using the following URL (this is also the source
    of the information in Table [5-1](#A978-1-4302-5786-8_5_Chapter.html#Tab1)):


    [`http://developer.android.com/reference/android/util/DisplayMetrics.html`](http://developer.android.com/reference/android/util/DisplayMetrics.html)


    Table 5-2.


    Android DisplayMetrics Class and Object Data Fields Plus Access Modifiers and
    Functions


    | Access/Type Modifier | Object Field Proper Name | Object Data Field Information
    Provided on Polling |

    | --- | --- | --- |

    | public float | Density | The logical density of the display |

    | public int | densityDpi | The screen density expressed as dots per inch |

    | public int | heightPixels | The absolute height of the display, in pixels |

    | public int | widthPixels | The absolute width of the display, in pixels |

    | public float | xdpi | Physical pixels per inch in the X dimension |

    | public float | ydpi | Physical pixels per inch in the Y dimension |

    | public float | scaledDensity | A scaling factor for fonts on the display |


    The DisplayMetrics object also has seven data fields that can be accessed once
    the object has been instantiated. These are shown in Table [5-2](#A978-1-4302-5786-8_5_Chapter.html#Tab2).


    As you can see, once you create a DisplayMetrics object, your applications can
    see precisely what the current Android device has in the way of screen size and
    pixel density, and how the OS is currently scaling fonts as well.'
  trans: "\n例如，当寻找低密度 LDPI 图像资源时，如果没有找到，Android 会（正确地）缩小该图像资源的高密度版本，因为 Android 知道将高密度资源缩小到低密度目标能提供更优的视觉结果。\n\
    \n让我们从数学角度来审视这一点。如果将图像从 240 DPI 以 2 倍系数下采样到 120 DPI，获得的结果将优于从 160 DPI 以 1.5 倍系数下采样到\
    \ 120 DPI。在图像重采样、下采样或上采样过程中，你应始终尽可能使用 2 或 4 这样的倍数因子，以便从重采样算法中获得最佳质量的结果。\n\n你可能会想：如果不希望图像资源为了适配不同像素密度的屏幕而被缩放该怎么办？无论出于何种原因，如果你希望图像在低密度屏幕上显示得大，在高密度屏幕上显示得小，Android\
    \ 中确实有一种方法可以实现这一点。\n\n指示 Android 在未找到合适分辨率密度的资源时绝不进行预缩放的方法是：将永远不应被缩放的图像资源放入带有\
    \ `-nodpi` 配置限定符的资源目录中。这自然对应着 `/res/drawable-nodpi` 文件夹命名约定。当 Android 从该配置限定符文件夹中获取图像资源时，无论出于何种原因，它都不会对其进行缩放，即使它根据当前设备密度及其内部缩放算法认为应该缩放。\n\
    \n除了密度配置修饰符（LDPI、MDPI、HDPI、XHDPI 等），Android 中还有方向配置修饰符（PORT 和 LAND），以及宽高比配置修饰符（LONG\
    \ 和 NOTLONG）。\n\n这些修饰符可用于创建包含定制设计的文件夹结构，以适应特定方向（竖屏或横屏）和宽高比（宽屏）的显示屏幕场景。这些配置修饰符也可以与其他修饰符结合使用；例如，它们可以串联起来，因此\
    \ `/res/drawable-land-hdpi` 将包含横屏 HDPI 资源。\n\n## DisplayMetrics 类：尺寸、密度和字体缩放\n\
    \n你可能想知道 Android 操作系统是否有 API 或类允许开发者查询其应用运行的设备并获取其显示特性信息。实际上，是有的，它被称为 `DisplayMetrics`\
    \ 类。\n\n`DisplayMetrics` 类是 `android.util` 操作系统工具包的一员，这一点并不意外。它提供了一种对象结构，当开发者查询（访问）时，能够提供关于当前（最终用户）设备显示屏的显示指标信息。提供的信息包括\
    \ X 和 Y 两个维度上的显示物理尺寸、X 和 Y 两个维度上的像素密度，以及 Android 操作系统当前使用的字体缩放因子。\n\n要访问 `DisplayMetrics`\
    \ 类成员，请使用 `DisplayMetrics()` 构造器初始化 `DisplayMetrics` 对象，代码如下：\n\n```\nDisplayMetrics\
    \ currentDeviceDisplayMetrics = new DisplayMetrics();\ngetWindowManager().getDefaultDisplay().getMetrics(currentDeviceDisplayMetrics);\n\
    ```\n\n该类中有八个常量：`DENSITY_DEFAULT`、`DENSITY_HIGH`、`DENSITY_LOW`、`DENSITY_MEDIUM`、`DENSITY_TV`、`DENSITY_XHIGH`、`DENSITY_XXHIGH`\
    \ 和 `DENSITY_XXXHIGH`。\n\n如果你想在 Android 开发者网站上进一步研究 `DisplayMetrics` 类，可以通过以下\
    \ URL 访问（这也是表 5-1 中信息的来源）：\n\n[`http://developer.android.com/reference/android/util/DisplayMetrics.html`](http://developer.android.com/reference/android/util/DisplayMetrics.html)\n\
    \n表 5-2.  \nAndroid DisplayMetrics 类与对象数据字段，以及访问修饰符和函数\n\n| 访问/类型修饰符 | 对象字段名称\
    \ | 查询时提供的对象数据字段信息 |\n| --- | --- | --- |\n| `public float` | `Density` | 显示的逻辑密度\
    \ |\n| `public int` | `densityDpi` | 以每英寸点数表示的屏幕密度 |\n| `public int` | `heightPixels`\
    \ | 显示的绝对高度，以像素为单位 |\n| `public int` | `widthPixels` | 显示的绝对宽度，以像素为单位 |\n| `public\
    \ float` | `xdpi` | X 维度上每英寸的物理像素数 |\n| `public float` | `ydpi` | Y 维度上每英寸的物理像素数\
    \ |\n| `public float` | `scaledDensity` | 显示屏上字体的缩放因子 |\n\n`DisplayMetrics` 对象还有七个数据字段，一旦对象被实例化即可访问。这些字段如表\
    \ 5-2 所示。\n\n如你所见，一旦创建了 `DisplayMetrics` 对象，你的应用程序就能精确了解当前 Android 设备在屏幕尺寸和像素密度方面的具体情况，以及操作系统当前如何缩放字体。\n"
- fmt: '# Optimizing Android Application Icons for LDPI to XXXHDPI


    Although I cannot optimize all of the graphics assets that we’ll be using throughout
    this book in this chapter, I will go through the down-sampling work process using
    the open source digital imaging software package `GIMP2` here for the launcher
    icons, since they are one of the few assets that you will want to have all five
    drawable target levels created under. The reason you are creating five levels
    for the application launcher icons is because on Android tablets, Android looks
    for launcher icons one folder higher than it uses for the rest of the application’s
    drawable assets.


    This means that to support XHDPI, which is one of the drawable levels that you
    will always want to support, you have to include a 144x144 pixel launch icon `PNG32`
    file in the `XXHDPI` folder. You do this in order to make sure your application
    icon (your app branding, if you will) looks crystal clear on the larger Android
    tablets, such as the Google Nexus 10.


    If you don’t have `GIMP2` on your system yet, go to [`www.gimp.org`](http://www.gimp.org/)
    and download the latest version (currently 2.8.6) for your operating system.


    After you install and launch `GIMP2`, use the `File` ➤ `Open` menu sequence to
    open the `PAG_logo_288.png` `PNG32` file of the Pro Android Graphics logo we used
    in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html) and [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html).


    In case you are wondering why I am using a 288 pixel version of this logo, it
    is because when downsampling to the five different icon sizes required by Android,
    this particular pixel dimension will resample evenly, that is, it will leave no
    remainder (partial pixels) for the resampling algorithm.


    Note


    If you want to use the XXXHDPI for 4K iTVs add a downsample to 192x192 pixels
    to the work process which follows.


    Let’s do the math. XXHDPI requires 144 pixels, which is half of 288, giving us
    a 2X downsample. XHDPI requires 96 pixels, which is a third of 288, giving us
    a 3X downsample. HDPI requires 72 pixels, which is half of 144 pixels and a fourth
    of 288 pixels, giving us a 4X downsample. MDPI requires 48 pixels, which is a
    sixth of 288, giving us a 6X downsample, and LDPI requires 36 pixels, which is
    an eighth of 288, giving us an 8X downsample.


    If you had wanted to develop your icon artwork at 576, which is twice the 288
    resolution, that would also work, or even at 1152, which is four times the 288
    resolution, if you need to have print resolution icon assets.


    Note that 2 x 1152 is 2304, which happens to also be a common digital camera native
    pixel resolution. Remember, image and video (pixel) scaling works much better
    along Power-of-Two sampling multiples (1-2-4-8-16-32, etc.).


    Once your launch icon logo at 288 pixels is open in `GIMP2`, it should look like
    the screen shot shown in Figure [5-1](#A978-1-4302-5786-8_5_Chapter.html#Fig1).
    The checkerboard pattern behind the logo denotes a transparency in GIMP, so you
    can see that we have just the pixels for our Pro Android Graphics logo for our
    application icon.


    Android suggests using an alpha channel to provide transparency for your launch
    icons, in case users have wallpaper, or other background imagery, set up on their
    Android devices.


    Now you are ready to resize the 288 pixel launcher icon image down to half of
    its original size, using the `Image` menu and the `Scale Image` option, as shown
    in Figure [5-1](#A978-1-4302-5786-8_5_Chapter.html#Fig1).


    ![A978-1-4302-5786-8_5_Fig1_HTML.jpg](A978-1-4302-5786-8_5_Fig1_HTML.jpg)


    Figure 5-1.


    Using an `Image` ➤ `Scale Image` function to resize the 288 pixel asset to fit
    XXHDPI 144 pixel icon size


    Selecting this menu sequence will bring up the `Scale Image` dialog, shown in
    Figure [5-2](#A978-1-4302-5786-8_5_Chapter.html#Fig2), which you will use to set
    your downsample resolution of 144 width and 144 height, as well as to set an interpolation
    algorithm to the value `Cubic` for your interpolation method or setting.


    `Cubic` interpolation uses a high-quality downsampling algorithm that will take
    the edges in your image into account, and will anti-alias them during the downsampling
    process to provide smooth transitions to sharp edges or drastic changes between
    pixel areas in your image. A great example of this would be the edges of your
    Pro Android Graphics logo, for instance.


    `Cubic` interpolation in `GIMP2` is similar to the bicubic interpolation in Photoshop.
    If you are using Photoshop instead of `GIMP2`, then also select the `Bicubic Sharper`
    (for downsampling) option from the drop-down menu at the bottom of Photoshop’s
    `Image Resizing` dialog.


    ![A978-1-4302-5786-8_5_Fig2_HTML.jpg](A978-1-4302-5786-8_5_Fig2_HTML.jpg)


    Figure 5-2.


    Setting the parameters in the `Scale Image` dialog


    The image should now be four times smaller than it was originally, or two times
    smaller along each of the X and Y axis, as shown in Figure [5-3](#A978-1-4302-5786-8_5_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_5_Fig3_HTML.jpg](A978-1-4302-5786-8_5_Fig3_HTML.jpg)


    Figure 5-3.


    Using a `File` ➤ `Export` function to export the newly scaled 144 pixel XXHDPI
    application icon asset


    You are now ready to export the downsampled 144 pixel app launch icon file, using
    the `File` ➤ `Export` menu sequence. You are doing this so that you can give your
    `XXHDPI` app launcher icon file a file name that tells you later on the resolution
    of this digital image asset.


    If for some reason you are still using an older version of `GIMP2`, such as 2.6.12,
    then you would use the `File` ➤ `Save As` option, which was changed and became
    the `File` ➤ `Export` option as of `GIMP2` version 2.8.0 and later.


    Selecting the `Export` option will bring up the `Export Image` dialog, which is
    shown in Figure [5-4](#A978-1-4302-5786-8_5_Chapter.html#Fig4). If you haven’t
    created a folder yet for your app icons, you can use the `Create Folder` button
    on the top-right of the dialog to do this now. I used it to create the `/Icons`
    folder under my Pro Android Graphics Design (PAGD) folder and its `/CH05` sub-folder.


    ![A978-1-4302-5786-8_5_Fig4_HTML.jpg](A978-1-4302-5786-8_5_Fig4_HTML.jpg)


    Figure 5-4.


    Setting the `launch_icon_pag_144.png` file name and selecting export options in
    `Export Image` dialog


    Once you have a folder for your app icons, enter the descriptive file name `launch_icon_pag_144.png`
    in the `Name:` field at the top of the dialog. `GIMP2` uses your file extension
    to determine which type of file format (codec) to use to save the file. You can
    also use the `Select File Type (By Extension)` widget at the bottom-left of the
    dialog to do this the long way. Once you have set everything, click the `Export`
    button at the bottom-right of the dialog, which will bring up the `Export Image
    as PNG` settings dialog, shown on the right side of the Figure [5-4](#A978-1-4302-5786-8_5_Chapter.html#Fig4)
    screen shot. Make sure that the `Save resolution` and the `Save color values from
    transparent pixels` are checked, and then set the `Compression level` slider to
    the maximum compression (9).


    You might be wondering why a lossless file format such as `PNG32` has this compression
    level setting in `GIMP2` at all, as one would expect this with JPEG but not with
    PNG; one would assume max compression would be a given. It turns out that it controls
    the speed of the lossless compression, much like when you use the `ZIP` compression
    algorithm, which is also lossless. With a `ZIP` utility, you define a trade-off
    between how long the compression process is going to take and how much better
    (slightly smaller files) job the compression algorithm is going to do in compressing
    it. Since 9 is the default value for this slider in `GIMP2`, I simply left it
    alone. Feel free to play around with this, and observe the results, later on,
    if you wish.'
