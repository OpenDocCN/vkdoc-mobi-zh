  trans: '

    # 为自定义应用图标配置 AndroidManifest.xml


    现在所有资源都已就位，启动 Eclipse 并右键点击 `AndroidManifest.xml` 文件，你可以在 Eclipse 左侧的 Package
    Explorer 导航窗格中找到它，位于 GraphicsDesign 项目文件夹的最底部。


    值得注意的是，`AndroidManifest.xml` 是 Eclipse 中顶部编辑标签命名方式的唯一例外。请注意，Android Manifest XML
    标签显示为 `GraphicsDesign`（项目文件夹名称）Manifest。


    XML 标记应如图 5-10 所示，我已在 `<application>` 标签中高亮显示了 `android:icon` 参数，你将在此处引用你自己的自定义启动器图标文件名，下一步就将进行操作。


    ![A978-1-4302-5786-8_5_Fig10_HTML.jpg](img/A978-1-4302-5786-8_5_Fig10_HTML.jpg)


    图 5-10. 在 Package Explorer 中右键点击 `AndroidManifest.xml` 文件，然后在 Eclipse 中打开它进行编辑


    你将保留其他默认的 `AndroidManifest` 条目不变，但会将 `ic_launcher` 引用更改为 `pag_icon`，这样你就知道如何根据需要添加自己的自定义启动器图标引用了。查看一下
    Eclipse 为你的应用程序 Manifest 设置的其他标签。


    需要注意的是，你也可以保留 `ic_launcher` 文件引用不变，并在每个分辨率密度文件夹中将启动器图标资源命名为 `ic_launcher.png`，这同样是一种替代工作流程。


    在此处，添加之前学过的 `<supports-screens>` 标签，并修复另一个标签，这能让你的 Android 应用更显专业。查看 `android:icon`
    参数下方的一个参数，你会看到 `android:label` 参数。


    该参数控制应用启动画面顶部的文本值，以及应用启动图标下方的文本标签。应用启动图标始终位于用户 Android 设备的“前端”（即启动图标区域）；图标图形及其下方的标签都必须完美无缺。对初始
    `AndroidManifest.xml`（通过“新建 Android 应用程序”对话框系列生成）所做的更改如图 5-11 所示。


    ![A978-1-4302-5786-8_5_Fig11_HTML.jpg](img/A978-1-4302-5786-8_5_Fig11_HTML.jpg)


    图 5-11. 向你的 `AndroidManifest` 添加自定义 `android:icon` 参数和 `<supports-screens>` 标签


    如你所见，`android:label` 参数引用了 `strings.xml` 文件中名为 `app_name` 的字符串常量。你需要编辑该字符串常量的值，在单词
    Graphics 和 Design 之间添加一个空格。点击 Eclipse 中央编辑窗格顶部的 `strings.xml` 标签，在 `app_name`
    的 `<string>` 标签中添加一个空格，使其显示为 `Graphics Design` 而非 `GraphicsDesign`，如图 5-12 所示。


    这将使 Android 操作系统能够在用户 Android 设备前端的图标启动集合中更美观地“换行”显示图标标签。我们接下来测试应用时，你会发现效果比以前好
    100%。事实上，Android 操作系统之前换行显示图标标签的方式已经困扰了我好几章。所以我们在此解决这个问题。Android 应用的优化是分阶段进行的。


    ![A978-1-4302-5786-8_5_Fig12_HTML.jpg](img/A978-1-4302-5786-8_5_Fig12_HTML.jpg)


    图 5-12. 将 `app_name` `<string>` 标签常量更改为 `Graphics Design`（两个单词）以修复图标换行问题


    进行这种细微的文本修改后，你的应用图标标签将在新的 Pro Graphics Design 图标下方更自然地换行显示，并且应用的屏幕标题也会更加清晰易读，正如你接下来在下一节中使用“运行方式
    ➤ Android 应用程序”工作流程时所看到的那样。


    ## 在 Nexus One 上测试新应用图标和标签


    现在，来看看你密度匹配的启动器图标有多美观，以及在 Graphics 和 Design 单词之间添加空格后标签外观的改进！右键点击项目文件夹，使用“运行方式
    ➤ Android 应用程序”菜单，在 Eclipse 中启动 Nexus One 模拟器，然后查看你的应用。


    在启动画面的顶部（如图 5-13 屏幕截图的右侧所示），你可以看到新的启动器图标资源以及应用新的 Graphics Design Activity 标签。


    要查看 Android 操作系统应用图标区域中的图标，请点击模拟器右上角的圆形“返回”按钮。该按钮是模拟器右上角第二行圆形按钮中从左数起的第三个按钮，上面有一个向后弯曲的箭头，表示“返回”功能。


    点击此按钮后，你将返回 Android 操作系统主屏幕，在此处点击屏幕底部中间的图标按钮，即可打开操作系统的应用图标启动区域，你将看到新的应用图标。


    图 5-13 的左侧显示了模拟器的启动图标区域，屏幕截图的右侧显示了应用的启动画面动画和新的标题栏标签样式。


    ![A978-1-4302-5786-8_5_Fig13_HTML.jpg](img/A978-1-4302-5786-8_5_Fig13_HTML.jpg)


    图 5-13. 在 Eclipse 的 Nexus One 模拟器中测试新的 Pro Android Graphics 启动图标和标签


    如你所见，代码、缩放和间距上的细微改动，能对应用的专业外观产生显著的视觉效果！这就是为什么我把这一章放在书中新媒体章节之后，因为我需要为你提供一些图形基础，涵盖不同类型的图像、视频和动画资源及其创建与优化。

