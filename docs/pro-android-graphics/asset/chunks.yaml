  trans: '

    # 数字视频规范：比特率、流、标清与高清


    一旦你确切知道如何通过为数字视频内容使用正确的比特率、帧率和帧分辨率来最佳优化数字视频压缩工作流程，你将会对你使用 MPEG 视频文件格式所实现的一些数字视频数据压缩比感到惊讶（本章后面会介绍）。我们将在第
    18 章中更深入地探讨 WebM 视频优化，届时我会用一整章的篇幅来介绍高级数字视频数据占用空间优化技术和工作流程。


    既然上一节我们刚讨论完分辨率，那么我们就从商用视频中使用的主要分辨率开始讲起。在高清（HD）出现之前，视频被称为标清（SD），它使用标准的像素高度（垂直分辨率）即
    480 像素。


    商用或广播视频通常采用两种宽高比之一：老式显像管电视使用的 4:3，以及新型高清电视使用的 16:9。让我们用你在第 1 章学到的数学知识来计算 4:3 SD
    广播视频的像素分辨率。


    480 除以 3 等于 160，乘以 4 等于 640，所以 4:3 的 SD 视频就是 VGA 分辨率，这就是我在前一章用这个特定分辨率作为例子的原因。还有另一种
    16:9 的宽屏 SD 分辨率，它已成为安卓触摸屏智能手机以及被称为迷你平板的小尺寸平板电脑的入门级屏幕分辨率。


    让我们来计算宽屏 SD 分辨率是多少：这次用 480 除以 9，得到 53.4，再乘以 16 得到 854，所以新型宽屏 SD 智能手机和平板电脑采用了 854x480
    的“宽屏 SD”像素屏幕尺寸。这很大程度上是为了让现在已经主流的 HD 内容能够直接从 16:9 的 1920x1080 向下采样到 1280x720，或者到
    854x480。


    高清视频有两种分辨率：1280x720，我称之为伪高清，以及 1920x1080，业界称之为真高清。两者都是 16:9 宽高比，现在不仅用于电视和智能电视，还用于智能手机（Razor
    HD 是 1280x720）和平板电脑（Kindle Fire HD 是 1920x1200，这是不那么宽或者说更长的 16:10 宽高比）。


    还有 16:10 的伪高清分辨率，其像素为 1280x800。实际上，这是笔记本电脑、上网本和中等尺寸平板电脑的常见分辨率。通常，大多数开发者会尽量让他们的视频内容分辨率与每个观看视频的安卓设备的分辨率相匹配。


    无论你为数字视频内容使用何种分辨率，你的应用程序可以通过几种不同的方式访问视频。由于我是个数据优化狂人，我采用的方式是将视频内置于应用程序中；也就是说，放在安卓应用
    `APK` 文件内部的 `raw` 数据资源文件夹里。我们稍后会对此进行探讨。


    在安卓应用中访问视频的另一种方式是使用远程视频数据服务器；在这种情况下，视频会通过互联网从远程服务器实时流式传输到用户的安卓设备上进行播放。希望你的服务器不会崩溃！


    视频流比播放内置视频数据文件更复杂，因为安卓设备需要与远程数据服务器实时通信，并在视频播放的同时接收视频数据包。安卓 4.0 及更高版本的设备通过 WebM
    格式支持视频流播放。本书直到第 19 章才会涉及流媒体视频，因为它需要远程视频服务器；在此之前，你将使用内置视频数据，以便能够测试你的应用！


    在本概述中，我们需要介绍的最后一个概念是比特率。比特率是视频压缩过程中使用的一个关键设置，因为它代表了目标带宽数据管道的大小，该管道每秒能够容纳一定数量的比特流通过。


    当今互联网 2.0（移动设备电信网络）`IP` 基础设施中的慢速数据管道为 768 kbits/s 或 768 KBPS，为了适配这种“较窄”的数据管道而压缩的视频文件质量水平会较低，并且可能还需要更低的分辨率来进一步减少其总数据占用空间。较旧的
    3G 网络就具有这种较慢的视频数据传输速度。


    需要注意的是，一个过饱和（拥挤）的数据管道可能会将快速数据管道变成中速甚至慢速数据管道，因为在高峰使用时段，越来越多的用户试图通过该数据管道访问数据。


    当今互联网 2.0 `IP` 基础设施中的中等数据管道为 1536 kbits/秒（1.5 MBPS，即兆比特每秒）。请注意，我们这里使用的是比特，而不是字节，所以要计算这代表每秒多少字节，需要除以八（一个字节有八个比特）。因此，一兆比特每秒等于每秒传输
    128 千字节的数据，那么 1.5 兆比特每秒就是 192 千字节每秒。


    较旧的 3G 网络传输速度在 600 kbits/s 到 1.5 mbits/s 之间，因此平均而言，这些网络的传输速度为 1.5 mbits/s，被归类为中等数据管道。


    快速的数据管道至少为 2048 kbits/s，即 2 mbits/s 或 2 MBPS，以这种较高比特率压缩的视频显示出更高的视觉质量水平。更现代的 4G
    网络声称速度在 3 到 6 mbits/s 之间，不过我会为 4G 网络将资源优化到 2 mbits/s，以确保即使网络因某种原因只提供 2 MBPS 的速度，你的视频资源仍然能够非常流畅地播放（即流传输）。


    请注意，家庭网络通常提供快得多的 MBPS 性能，通常在 6 MBPS 到 24 MBPS 的范围内。移动网络目前处于 4G 阶段，尚未达到这一带宽，因此你在进行安卓图形应用开发时，需要针对更受限的数据管道进行优化。


    比特率还必须考虑到任何一款安卓手机中的 CPU 处理能力，这使得视频数据优化更具挑战性。这是因为一旦“比特”通过数据管道传输，它们还需要被处理并显示到设备屏幕上。事实上，包含在安卓应用
    `.APK` 文件中的任何内置视频资源只需要针对处理能力进行优化。之所以如此，是因为如果你使用内置数字视频资源，就没有数据管道供你的视频资源传输，也没有数据被传输！你的视频资源就在那里，就在你的
    `APK` 文件中，随时可以播放。


    这意味着你的数字视频资源的比特率不仅需要针对带宽（或者如果你使用内置数字视频资源，则针对 `APK` 文件大小）进行良好优化，还需要考虑到 CPU 处理能力的变化。一些单核低功耗嵌入式
    CPU 可能无法解码高分辨率、高比特率的数字视频资源而不会丢帧，因此为给定的 CPU 准备一个分辨率更低、比特率更低、数据量只有十分之一的数字视频资源是个好主意。

    '
- fmt: '# Digital Video Files for Android: Resolution Density Targets


    To prepare your digital video assets for use across the various Android OS devices
    currently on the market, you must hit several different resolution targets, which
    will then cover most of the screen densities on the market.


    You will be learning more about the default screen densities in Android as they
    pertain to graphics in the next chapter on frame-based animation. In case you
    are wondering (as I was) why Android did not simply take one high-resolution asset
    and then scale it down using bicubic interpolation (or at least bilinear interpolation),
    the reason is that currently Android’s Achilles’ Heel happens to be scaling things,
    primarily imagery and video.


    As you know, the screen sizes for Android devices span those smaller flip-phones
    and Android watches to the larger tablets and iTV sets. Within this spectrum are
    smartphones, eBook readers, mini-tablets, and medium tablets, so you will need
    at least four, if not five, different target DPI (dots per inch, or density pixel
    imagery) resolutions. For digital video, this also includes different target bit
    rates, so that you can try to fit all of the different device screen densities
    and the different processing power capabilities of single-core through quad-core
    CPU product offerings.


    As far as digital video support is concerned, it is actually more about having
    three or four bit rate targets than it is about hitting display screens pixel
    for pixel, because the `VideoView` class can scale video up (or more preferably,
    down), as you’ll see later on in the chapter and book.


    Providing this evenly spaced range of bit rates is important because smaller Android
    devices tend to have less processing power to decode data-heavy (high) bit rate
    video smoothly, so you want an Android app to have a range of bit rates that can
    “curve-fit” to the processing power across all of the potential types of Android
    devices out there.


    For instance, an Android watch or flip-phone will most likely have a single-core
    or maybe a dual-core CPU whereas an iTV will probably have at least a quad-core,
    if not an octa-core processor. The Galaxy S3 has a quad-core processor, and a
    Galaxy S4 has an octa-core (or dual quad-core) processor.


    Thus, you should have bit rates that will decode smoothly on any processor, ranging
    from a low resolution 512 KBPS to a high resolution 2 MBPS target. The higher
    the resolution density, that is, the smaller the pixels, the better the video
    will look, regardless of the amount of compression.


    This is because encoding artifacts will be more difficult to see (essentially
    they will be hidden from view) the smaller the pixel pitch (or the higher the
    pixel density) on any given Android device’s screen. This fine pixel pitch, found
    on most Android device hardware, will allow you to get good quality video into
    a relatively small data footprint, once you know what you are doing with video
    editing or compression utilities such as the open source `EditShare Lightworks
    11` or `Sorenson Squeeze Pro`.


    # Optimizing Digital Video: Codecs and Compression


    Digital video is compressed by using a piece of software called a codec, which
    stands for code-decode. There are two sides to a video codec, one that encodes
    the video data stream and the other that decodes the video data stream. The decoder
    will be part of the OS or browser that uses it.


    The decoder is usually optimized for speed, as smoothness of playback is the primary
    issue, and the encoder is optimized to reduce data footprint for the digital video
    asset it is generating. For this reason, the encoding process could take a long
    time, depending on how many processor cores your workstation contains. A serious
    workstation these days offers eight cores.


    Codecs (the encoder side) are like plug-ins in the sense that they can be installed
    into different digital video editing software packages in order to enable them
    to encode different types of digital video file formats.


    Since Android supports H.263 and H.264 MPEG4 formats, and the ON2 VP8 WebM format
    for video, you need to make sure that you’re using one of the video codecs that
    encodes video data into these digital video file formats. If you do this correctly,
    the Android OS will be able to decode the digital video data stream because the
    decoder side of these three codecs is built right into the Android OS, which is
    why you learned about these three formats.


    More than one software manufacturer makes MPEG encoding software, so different
    MPEG codecs (encoder software) will yield different (better or worse) results
    as far as file size is concerned.


    The professional solution, which I highly recommend that you secure if you want
    to produce video professionally, is called `Sorenson Squeeze`, which is currently
    at version 9. Squeeze has a professional version, which I will be using in this
    book, which costs less than a thousand dollars.


    There is also an open source solution called `EditShare Lightworks 11` that does
    not currently natively support output to the WebM VP8 codec, so I am going to
    use `Squeeze Pro 9` for this book, until the codec support for Android is added
    to `EditShare Lightworks`, which they promise will be soon.


    I still recommend that you go to the [editshare.com](http://editshare.com) or
    [lwks.com](http://lwks.com) web site and sign up for and download this software,
    as it’s one of the most powerful open source software packages, along with `Blender
    3D`, `GIMP2`, and `Audacity`.


    When optimizing (setting compression settings) for digital video data file size,
    there are a large number of variables that directly affect the video data footprint.
    I will cover these in the order that they affect the video file size, from the
    most impact to the least impact, so that you know which parameters to tweak in
    order to obtain the result that you desire.


    As in digital image compression, the resolution, or number of pixels, in each
    frame of video is the best place to start your optimization process. If your target
    users are using 854x480 or 1280x720 smartphones and tablets, then you don’t need
    to use True HD 1920x1080 resolution video in order to get a good visual result
    for your digital video assets. With the super-fine density (dot pitch) displays
    out there, you can scale 1280 video up 33% [calculated via `1 - (1280 / 1920)`],
    and it will still look great. The exception to this would be if you are delivering
    an iTV app to GoogleTV users, in which case you might want to use 1920x1080.


    The next level of optimization comes in the number of frames used for each second
    of video, assuming that the actual seconds of the video itself cannot be shortened.
    This is the frame rate, and instead of using the video standard 30 FPS, consider
    using a film standard frame rate of 24 FPS, or a multimedia standard frame rate
    of 20 FPS. You might even be able to get away with using a 10 FPS rate, depending
    upon your content.'
