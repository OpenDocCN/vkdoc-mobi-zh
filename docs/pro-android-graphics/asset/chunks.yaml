    device screen’s physical resolution, aspect ratio, and orientation (portrait or
    landscape). There is quite a bit involved in this process, and we will be covering
    all the various factors in this chapter.'
  trans: '

    ## 总结


    在第四章中，你学习了程序化动画的概念、可以通过程序化动画实现动画效果的 Android 应用资源、XML 标签、如何使用 XML 参数设置复杂的程序化动画，以及其他相关的程序化动画设计与优化技巧。


    你还将这些知识付诸实践，在你的 `GraphicsDesign` Android 应用的 `pro.android.graphics` 包启动画面中创建了程序化动画，这些动画利用了
    Android 的多种变换类型。


    我们首先探讨了一些与程序化动画相关的基本概念，例如补间和插值，以及它们如何划分动画参数指定的数据范围，以便动画能够随时间流畅且美观地播放。


    你学习了 Android 中的运动曲线及其 `Interpolator` 类，这些类为我们实现了数学运算，使我们能够轻松地将插值常量应用于程序化动画的数据范围，以生成逼真的运动效果，否则这些效果将难以实现。


    接着，我们了解了如何使用数据值来建立动画参数将被变换的范围。我们学习了使用轴心点来告知变换从何处开始（缩放）或围绕哪个点执行变换（旋转）。


    然后，我们研究了 Android 中为程序化动画支持的变换类型，即移动或平移、大小或缩放，以及方向或旋转。我们还探讨了如何通过程序化动画及与其他类型的 2D
    空间变换一起，控制 Alpha 通道混合（透明度）。


    接着，我们学习了如何使用 `duration` 和 `startOffset` 参数来控制程序化动画的时序。你了解到需要以毫秒为单位的数据值来指定程序化动画的时序，以及如何在秒和毫秒之间进行转换。


    接下来，我们研究了如何界定你所创建的动画类型，从播放一次到循环动画类型。你学习了如何设置无缝循环动画，以及如何指定来回往复动画类型（通常也称为弹球动画）。


    最后，你进入了你的 `GraphicsDesign` 应用，编写了一些 XML 标记和 Java 代码，将程序化动画与你之前在第 3 章 中创建的帧动画资源结合在一起实际实现。


    在下一章中，我们将更深入地研究如何为所有不同分辨率的屏幕和像素密度目标设计图形元素，这些目标由 Android 通过其 `/res/drawable` 子文件夹（包括
    LDPI、MDPI、HDPI、XHDPI、XXHDPI 和 TVDPI）以及 `/res/layout` 子文件夹（这些子文件夹可以有自定义名称用于自定义布局）定义并强制执行。


    # Android DIP：设备独立像素图形设计


    ## 摘要


    在本章中，我们将更深入地探讨如何设计图形资源，使其能够覆盖当前市场上种类繁多的 Android 设备屏幕尺寸。从手表那么小的 Android 设备到 iTV
    这么大的设备，提供一套适用于市场上所有屏幕且看起来效果极佳的基于像素的资源，无疑是创建专业 Android 图形时面临的主要挑战之一。


    除非你只使用矢量（形状）图形（这些图形可缩放以适应任何屏幕尺寸）以及带有诸如 `android:gravity` 等 XML 参数的用户界面小部件（这些参数会自动为你处理屏幕布局计算），否则这一挑战无法回避。如果你的应用要使用任何类型的基于像素的资源，那么本章及其包含的所有信息，对你这位崭露头角的专业
    Android 图形设计师来说，应该具有重大意义。


    当你完成本章后，你会发现为市面上成千上万种不同的 Android 设备（产品）屏幕进行设计，是一场“权衡”与“估算”的游戏。本章中的信息将让你能够决定支持哪些像素密度图像分辨率，以及额外的资源创建工作是否值得——这取决于因缩放（或缺乏缩放）而在屏幕上产生的视觉质量与预估市场份额（总最终用户）占比之间的权衡。


    我们将探讨 Android 操作系统和 API 中目前已定义的七种像素密度级别。我们还将研究与像素调整大小和缩放相关的各种密度和缩放概念及技巧，以及常见的显示分辨率以及如何有效地定位它们。


    ## Android 如何支持设备显示：UI 设计与 UX


    众所周知，Android 操作系统支持多种流行的消费电子设备。其中大多数设备都提供不同的屏幕尺寸、屏幕形状、屏幕宽高比和屏幕像素密度。本章我们将逐一探讨这些屏幕差异的各个方面。


    对于应用开发而言，Android 操作系统试图在每个受支持的硬件设备上提供一致的用户体验开发环境。操作系统将尝试处理将应用程序的用户界面调整到其显示的每种屏幕类型的任务。


    此外，操作系统还提供了自定义 API，允许你针对特定的屏幕尺寸和密度自定义应用程序 UI。这样做是为了让开发者能够针对不同的屏幕配置优化 UI 设计。例如，开发者可能希望专门为平板电脑
    UI 进行开发，而平板电脑 UI 可能不同于智能手机 UI、智能手表 UI 或 iTV UI。


    尽管 Android 会负责缩放和调整你的 UI 设计的大小，但为了使你的应用能够完美适配每一款不同的屏幕，你仍需要努力针对不同的屏幕尺寸和像素密度优化应用程序。这样，Android
    操作系统就不必对任何给定的图像资源进行过于剧烈的缩放或调整大小，因此用户可能甚至不会注意到这些细微的像素调整（如果有的话）。事实上，最小化缩放和调整是关键所在，而你将在本章学到的内容还包括更多优化技巧！Android
    开发在很大程度上就是关于优化的。


    通过在您的 `.APK` 文件中为 Android 操作系统提供一系列合理且高度优化的基于像素的图像资源，您可以让 Android 操作系统在最大化所有 Android
    硬件设备上的用户体验方面完成其余工作。


    如果基于像素的资源优化过程执行得当，所有最终用户都会确信他们正在使用的应用是专门为其设备设计的，而不是经过缩放、拉伸和旋转来适应其设备屏幕的物理分辨率、宽高比和方向（竖屏或横屏）。这个过程涉及的内容相当多，我们将在本章中涵盖所有不同的因素。'
- fmt: '# Device Display Concepts: Size, Density, Orientation, DIP


    An Android device screen size is simply the actual physical size, measured in
    inches, of any device display screen diagonal size measurement. The screen size
    is commonly given in product specifications, and is often included in the product
    name itself. For instance, the Nexus 7 or Nexus 10 tablets are 7 and 10 inches
    in their display screen diagonal measurement, respectively.


    The Android OS classifies common screen sizes into four generalized size constants,
    including small, normal, large, and extra large. As of Android 4.2.2 there is
    also an XXHDPI drawable resource folder, so look out for an extra extra large
    size constant to be added in the future as well! Android 4.3 added an XXXHDPI
    constant as well recently, to support the new 4K iTVs currently appearing on the
    market.


    Android device screen density is defined as the number of physical pixels contained
    in a one inch area of a given device’s display screen. Physical pixels are actual
    hardware screen elements that generate one single pixel; so on LCD screens this
    would be one cell, and on OLED screens this would be one organic LED. A low density
    screen would have 120 pixels per inch, and a high density screen would have twice
    than many pixels, or 240 pixels per inch.


    Screen density in the graphics industry has long been referred to as DPI, which
    stands for dots per inch. You are probably familiar with this term as it relates
    to printer specifications, and now that display screens are approaching similar
    resolutions as printers, the term now applies here as well. We will be discussing
    screen density in detail within this chapter.


    The Android OS classifies common screen densities into six basic density constants,
    including low or LDPI, medium or MDPI, tv or TVDPI, high or HDPI, extra high or
    XHDPI and XXHDPI. As of Android 4.2.2 there is also an XXHDPI drawable resource
    folder, so look for an extra extra high screen density constant to be added as
    well at some time in the future, as well as an extra extra extra high (XXXHDPI)
    constant for 4K iTVs.


    Android device screen orientation is defined as the way that the Android device
    is being held by the user, that is, the orientation of the screen from the user’s
    current Android device usage point of view. Orientation can change at any time
    simply by a user rotating the screen by 90 degrees. The industry terms that have
    been defined over time for either orientation are called landscape (widescreen
    view) or portrait (tall, or up and down).


    In terms of the aspect ratio, this means that a screen aspect ratio can be either
    wide or tall, depending on how the user is holding the device. This makes user
    interface and content development significantly more difficult.


    It is important to note that different Android devices will operate using different
    orientations by default when they are powered up by the user. Also, the screen
    orientation can be changed at runtime by the user simply rotating the device.
    There are APIs in the Android OS to detect when this happens, so that you can
    change your content and user interfaces based on the device screen orientation
    if you so desire. As you can see, developing graphics for Android can get complicated,
    which is why this book exists.


    Android device screen resolution is defined using physical pixels, and is usually
    specified using the total number of pixels along the X axis and Y axis, respectively.
    If a user’s screen orientation changes, X axis becomes Y axis and Y axis becomes
    X axis, so the resolution specifications change.


    Screen resolution is generally specified using the landscape or widescreen orientation
    parameters, so a WVGA 800x480 screen is held in landscape and a 480x800 WVGA screen
    is being used (viewed) in a portrait declination.


    It is important to note for those developers who wish to include multiple device
    screen support in their apps that Android applications do not work directly via
    the screen resolution. The current development approach is to make your Android
    application concerned only with screen size and density, as specified by the size
    and density constants provided in and by the OS.


    The way for Android developers to accomplish this is to use DIP (density-independent
    pixel) units, which can also be denoted in code and markup as `DIP` or `dip`.
    A `DIP` can be thought of as a “virtual” pixel representation of sorts, which
    you should get used to utilizing when you define the UI (user interface) layouts.
    As you will see later on in this book, we will use `DIP` units to express layout
    dimensions and user interface element positioning, providing a density-independent
    way of creating UI layouts across devices.


    According to the Android Developer web site, a density-independent pixel is the
    equivalent to a physical pixel on a medium size, MDPI constant 160 DPI screen.
    This is used by Android OS as a baseline screen density assumed by the operating
    system to be a “medium” density, or “normal,” device screen. How this works is
    that at runtime the Android operating system transparently handles all scaling
    of units defined in `DIP`s after it looks at the current density of the device
    screen that is being used to run the application.


    The way in which `DIP` units are translated into physical screen pixels can be
    calculated by developers in the following way:


    ```

    Physical Pixels = DIP * (DPI/160)

    ```


    For example, using an XHDPI (320 DPI) extra high density pixel screen, 1 `DIP`
    would equal 2 physical pixels. On an XXHDPI (480 DPI) extra extra high density
    pixel image screen, 1 `DIP` would equal 3 physical pixels. There’s a chart (a
    table) in the next section of this chapter that collects all of this density-related
    information together into one place, so stay tuned.


    In summary, Android developers need to use `DIP` (or `DP`) units when they define
    their application UI if they wish to ensure proper display of their user interface
    design across Android hardware device display screens that feature different pixel
    densities (different dot pitch, or pixel pitch).


    To optimize your application user interface and content for many different screen
    sizes and pixel densities, you will provide alternate resources for each of the
    popular sizes and densities. Additionally, you will also create alternative user
    interface layouts to fit some of the different screen aspect ratios, as well as
    alternative digital imagery for different screen densities. So, this is where
    considering the trade-offs comes into play.


    The trick is selecting what levels your app needs to support, based on the devices
    you are targeting. Developers don’t have to provide an alternative asset for every
    single combination of screen size and density; to do this would yield a huge data
    footprint. Android provides compatibility features that can handle the work of
    rendering an application on any screen, if you have created your UI using a technique
    that will allow it to be resized.'
