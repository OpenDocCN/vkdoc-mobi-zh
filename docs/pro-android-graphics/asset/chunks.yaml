  raw: '## ImageButton States: Normal, Pressed, Focused, and Hovered


    The ImageButton class allows you to define custom image assets for each of the
    states of use: normal (default or not in use), pressed (user is touching or pressing
    down on click selection hardware), focused (recent touch released or click released),
    and hovered (user is over an ImageButton with a mouse or navigation key, but has
    not touched or clicked it). The hovered state was added recently in Android 4.0
    API Level 14, possibly in anticipation of using the Android OS for the Google
    Chromebooks. The four primary ImageButton states, along with their mouse event
    equivalents, are shown in Table [9-1](#A978-1-4302-5786-8_9_Chapter.html#Tab1).


    Table 9-1.


    Android ImageButton Class Primary Image Asset State Constants and their Mouse
    Usage Equivalents


    | ImageButton State | Description of the ImageButton State | Mouse Event Equivalent
    |

    | --- | --- | --- |

    | NORMAL | Default ImageButton State when it is not in use | Mouse Out |

    | PRESSED | ImageButton State when it is touched or clicked | Mouse Down |

    | FOCUSED | ImageButton State when it is touched and released | Mouse Up |

    | HOVERED (API 14) | ImageButton State if it is focused (not touched) | Mouse
    Over |


    ImageButton UI elements are not easy to implement because you will need to create
    a unique digital image asset for each of these ImageButton states. You must do
    this to visually indicate to a user your different ImageButton states, and as
    you will see in this chapter, this involves some digital imaging work!


    You will be using GIMP 2.8 a bit later on in the chapter to create the many digital
    image states for each of the ImageButtons that you are going to implement in each
    of the resolution densities required by Android to span across different device
    types and screen sizes and resolutions. You will soon see that the number of digital
    image assets that must be created is calculated by the number of image buttons
    times four states times four density targets, or sixteen image assets per ImageButton
    implemented.


    The standard work process to define ImageButton states is by using the XML drawable
    definition file that lives in your `/res/drawable` folder and that uses a parent
    `<selector>` tag and child `<item>` tags to define each of the ImageButton states
    with a custom digital image asset reference. You’ll look at an example of exactly
    how to set this up a bit later on in the chapter.


    Once you set up this XML definition, Android will automatically change the image
    asset for you based on the state of an ImageButton. The order of the state definitions
    is important, as they’re evaluated in order. This is why the normal image asset
    comes last, because it will only be displayed after `android:state_pressed` and
    `android:state_focused` have both evaluated false.


    ## ImageButton Drawable Assets: Compositing Button States


    Let’s get down to business, and jump into the work process for creating a multi-state
    ImageButton. This starts with creating the different digital image assets for
    each of these button states. To do this, you will use the GIMP open source image
    editing and compositing software package, so start GIMP now by using the quick
    launch icon on your Taskbar.


    Use the File ➤ Open menu sequence to access the Open Image dialog shown in Figure
    [9-1](#A978-1-4302-5786-8_9_Chapter.html#Fig1), and find the ImageButton_Bookmark.png
    image, which will be your bottom (lowest) foundational image compositing layer
    for this ImageButton digital image asset. Once you locate the asset, select it
    so it turns blue, and click the Open button to load it into GIMP as an original
    image layer.


    ![A978-1-4302-5786-8_9_Fig1_HTML.jpg](A978-1-4302-5786-8_9_Fig1_HTML.jpg)


    Figure 9-1.


    Opening the ImageButton_Bookmark primary image layer


    The next thing that you want to do is to add an outer button element, say a metal
    ring around the perimeter of the button so that it actually looks like a button.


    If you click on the other two original assets that are shown in Figure [9-1](#A978-1-4302-5786-8_9_Chapter.html#Fig1),
    the dialog will show a preview of them at the right-hand side, and you can see
    that they are a gold and silver ring UI design element that you will be compositing
    over the basic bookmark icon during the next few steps of this work process.


    GIMP has a very useful tool or command for bringing in an external imaging asset
    and placing it into a compositing layer for use all in one very easy step. This
    tool or command is located under the File menu and is called an Open as Layer
    function.


    Let’s use this menu sequence, as shown in Figure [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2),
    to go back into your ImageButton assets folder, and bring in your next image compositing
    layer.


    ![A978-1-4302-5786-8_9_Fig2_HTML.jpg](A978-1-4302-5786-8_9_Fig2_HTML.jpg)


    Figure 9-2.


    Using the File ➤ Open as Layers menu sequence to add a composite layer


    As you can see in Figure [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2), your
    foundation bookmark layer is already in place at 360 pixels in size for your XHDPI
    extra-high density pixel image asset size, so now you are going to select the
    next layer up in your image composite, which will be the ImageButton_Silver.png
    file shown in the Open Image dialog in Figure [9-3](#A978-1-4302-5786-8_9_Chapter.html#Fig3),
    which is accessed by using the File ➤ Open as Layers menu sequence shown in Figure
    [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_9_Fig3_HTML.jpg](A978-1-4302-5786-8_9_Fig3_HTML.jpg)


    Figure 9-3.


    Locating the ImageButton_Silver.png button exterior ring to add to composite


    Once you open the silver outer button hoop (or ring) asset, which is shown in
    Figure [9-3](#A978-1-4302-5786-8_9_Chapter.html#Fig3) on the right, it will be
    inserted by GIMP into the composite layer above the bookmark icon graphic. The
    resulting composite, as you can see in Figure [9-4](#A978-1-4302-5786-8_9_Chapter.html#Fig4),
    now looks much more like a UI button, and you’re now ready to use the File ➤ Export
    menu sequence to create your normal state.


    ![A978-1-4302-5786-8_9_Fig4_HTML.jpg](A978-1-4302-5786-8_9_Fig4_HTML.jpg)


    Figure 9-4.


    Using the File ➤ Export menu sequence to export the newly composited button'
  trans: '

    # ImageButton 状态：正常、按下、聚焦与悬停


    `ImageButton` 类允许您为每种使用状态定义自定义图像资源：正常（默认或未使用）、按下（用户正在触摸或按压点击选择硬件）、聚焦（最近触摸释放或点击释放）和悬停（用户将鼠标或导航键悬停在`ImageButton`上，但尚未触摸或点击）。悬停状态是最近在
    Android 4.0 API Level 14 中新增的，可能是为了在 Google Chromebook 上使用 Android 操作系统而做的准备。四种主要的`ImageButton`状态及其对应的鼠标事件如表
    9-1 所示。


    表 9-1. Android `ImageButton` 类主图像资源状态常量及其鼠标使用对应关系


    | `ImageButton` 状态 | `ImageButton` 状态描述 | 鼠标事件对应关系 |

    | --- | --- | --- |

    | `NORMAL` | 默认的`ImageButton`状态（未使用） | 鼠标移出 |

    | `PRESSED` | 触摸或点击时的`ImageButton`状态 | 鼠标按下 |

    | `FOCUSED` | 触摸并释放后的`ImageButton`状态 | 鼠标抬起 |

    | `HOVERED` (API 14) | 聚焦（但未触摸）时的`ImageButton`状态 | 鼠标悬停 |


    `ImageButton` UI 元素的实现并不简单，因为您需要为每个`ImageButton`状态创建唯一的数字图像资源。这样做是为了在视觉上向用户指示不同的`ImageButton`状态，正如您将在本章中看到的，这涉及一些数字图像处理工作！


    稍后在本章中，您将使用 GIMP 2.8 为每个`ImageButton`创建多个数字图像状态，这些状态需要涵盖 Android 要求的各种分辨率密度，以适应不同的设备类型、屏幕尺寸和分辨率。您很快就会看到，必须创建的数字图像资源数量等于图像按钮数量乘以四种状态再乘以四种密度目标，即每个实现的`ImageButton`需要
    16 个图像资源。


    定义`ImageButton`状态的标准工作流程是使用位于`/res/drawable`文件夹中的 XML drawable 定义文件，该文件使用父级`<selector>`标签和子级`<item>`标签，通过自定义数字图像资源引用来定义每个`ImageButton`状态。本章稍后将详细介绍如何设置这一流程的示例。


    一旦设置了此 XML 定义，Android 将根据`ImageButton`的状态自动为您更换图像资源。状态定义的顺序很重要，因为它们按顺序进行评估。这就是为什么正常图像资源放在最后，因为它仅在`android:state_pressed`和`android:state_focused`均评估为
    false 时才会显示。


    ## ImageButton Drawable 资源：合成按钮状态


    让我们开始正题，直接进入创建多状态`ImageButton`的工作流程。首先需要为每个按钮状态创建不同的数字图像资源。为此，您将使用 GIMP 开源图像编辑和合成软件包，现在通过任务栏上的快速启动图标启动
    GIMP。


    使用 `文件 ➤ 打开` 菜单序列访问“打开图像”对话框（如图 9-1 所示），找到 `ImageButton_Bookmark.png` 图像，它将作为此`ImageButton`数字图像资源的最底层（最低层）基础图像合成层。找到该资源后，选中它使其变为蓝色，然后单击“打开”按钮将其作为原始图像层加载到
    GIMP 中。


    ![A978-1-4302-5786-8_9_Fig1_HTML.jpg](img/A978-1-4302-5786-8_9_Fig1_HTML.jpg)


    图 9-1. 打开 `ImageButton_Bookmark` 主图像层


    接下来要做的是添加一个外部按钮元素，例如按钮外围的金属环，使其看起来像一个真正的按钮。


    如果您单击图 9-1 中显示的其他两个原始资源，对话框将在右侧显示它们的预览，您会看到它们分别是金色和银色的环形 UI 设计元素，在接下来的几个步骤中，您将把它们合成到基础书签图标之上。


    GIMP 提供了一个非常有用的工具或命令，可以非常轻松地将外部图像资源导入并放置到合成层中。此工具或命令位于 `文件` 菜单下，称为 `作为图层打开` 功能。


    让我们使用这个菜单序列（如图 9-2 所示）返回您的 `ImageButton` 资源文件夹，并导入下一个图像合成层。


    ![A978-1-4302-5786-8_9_Fig2_HTML.jpg](img/A978-1-4302-5786-8_9_Fig2_HTML.jpg)


    图 9-2. 使用 `文件 ➤ 作为图层打开` 菜单序列添加合成层


    如图 9-2 所示，您的底层书签图层已经就位，大小为 360 像素（这是 XHDPI 超高密度像素图像资源尺寸），现在您要选择图像合成中的下一层，即图 9-3
    所示的“打开图像”对话框中的 `ImageButton_Silver.png` 文件。该对话框是通过图 9-2 所示的 `文件 ➤ 作为图层打开` 菜单序列访问的。


    ![A978-1-4302-5786-8_9_Fig3_HTML.jpg](img/A978-1-4302-5786-8_9_Fig3_HTML.jpg)


    图 9-3. 定位 `ImageButton_Silver.png` 按钮外部环以添加到合成中


    打开银色的外部按钮环（或圈）资源（如图 9-3 右侧所示）后，GIMP 会将其插入到书签图标图形上方的合成层中。如图 9-4 所示，生成的合成图像现在看起来更像一个
    UI 按钮，您现在可以使用 `文件 ➤ 导出` 菜单序列来创建正常状态。


    ![A978-1-4302-5786-8_9_Fig4_HTML.jpg](img/A978-1-4302-5786-8_9_Fig4_HTML.jpg)


    图 9-4. 使用 `文件 ➤ 导出` 菜单序列导出新合成的按钮

    '
- fmt: 'Once an Export Image dialog has opened, use the navigation pane on the left
    to find your Users folder and system name folder (mine is `Default.Default-PC`).
    Under that, you should see your `/workspace` folder for your Eclipse ADT development
    projects. Find your `/GraphicsDesign` folder under that, and then navigate to
    the resource (`/res`) folder, and find your `/drawable-xhdpi` image assets folder
    underneath that, as shown in Figure [9-5](#A978-1-4302-5786-8_9_Chapter.html#Fig5).
    Next, enter an `imagebutton_normal.png` (lower case) file name into the Name field,
    and then click the Export button at the lower-right of the dialog to create a
    file.


    ![A978-1-4302-5786-8_9_Fig5_HTML.jpg](A978-1-4302-5786-8_9_Fig5_HTML.jpg)


    Figure 9-5. Using the Export Image dialog to save the `imagebutton_normal.png`
    ImageButton normal state asset


    Once you click the Export button, you’ll get an Export Image as PNG dialog with
    export options, shown on the right of Figure [9-5](#A978-1-4302-5786-8_9_Chapter.html#Fig5).
    I just use the Save color values from transparent pixels option to make sure all
    of the nuances of the alpha channels are saved along with the ARGB image data
    correctly.


    Now you are ready to create your next ImageButton hovered state image asset, so
    again use the File ➤ Import as Layers work process shown in Figure [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2),
    and this time open the `ImageButton_Gold.png` compositing asset, which will place
    this asset into a compositing layer above the `ImageButton_Silver.png` asset,
    as shown in the Layers palette on the right side of Figure [9-6](#A978-1-4302-5786-8_9_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_9_Fig6_HTML.jpg](A978-1-4302-5786-8_9_Fig6_HTML.jpg)


    Figure 9-6. Using the File ➤ Open as Layer to add the `ImageButton_Gold.png` image
    asset to a compositing layer


    As you can see, this overwrites or replaces the pixels of the silver hoop, which
    still exist in layer two but are now obscured by layer three, so you don’t need
    to turn off the layer two visibility (which can be accomplished by clicking that
    eye icon at the left side of the layer, in case you might be wondering). You have
    just created your Hovered ImageButton state where, if the user has a mouse or
    the ability to hover, this hoop around the button will turn from silver to gold
    when the user puts their mouse (focus) onto that button. Now all you have to do
    is to create this hovered image asset!


    To accomplish this, you will need to again utilize your File ➤ Export work process,
    shown back in Figure [9-4](#A978-1-4302-5786-8_9_Chapter.html#Fig4), and this
    time you will use a different file name, again using only lowercase letters and
    underscore characters, as Android OS requires, to name your image asset `imagebutton_hovered.png`,
    as shown in Figure [9-7](#A978-1-4302-5786-8_9_Chapter.html#Fig7) at the top of
    the screen shot (highlighted in blue).


    Once you click the Export button, you will again get the settings dialog where
    you can select your Save color values from transparent pixels option. Then, click
    the Export button to create your hovered ImageButton state digital image asset,
    shown in 360 pixel resolution in Figure [9-6](#A978-1-4302-5786-8_9_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_9_Fig7_HTML.jpg](A978-1-4302-5786-8_9_Fig7_HTML.jpg)


    Figure 9-7. Using an Export Image dialog to export the `imagebutton_hovered.png`
    ImageButton hover state asset


    The next ImageButton state that you need to create is the pressed state. A color
    change to the bookmark icon in the center of the ImageButton happens when the
    user touches (or clicks and holds, known as a mouse-down event) a button UI element.
    The color change will be created via the Hue-Saturation tool in GIMP. This tool
    is located under the GIMP Colors menu, and the Hue dialog is shown on the left-hand
    side of the screen shot in Figure [9-8](#A978-1-4302-5786-8_9_Chapter.html#Fig8).


    Make sure that your bottom layer is selected, as shown in gray in Figure [9-8](#A978-1-4302-5786-8_9_Chapter.html#Fig8),
    before you invoke and apply this Hue-Saturation tool, or you will end up color
    shifting one of your “UI hoop” compositing elements instead of your bookmark icon.
    If this happens, you can always use the Edit ➤ Undo feature.


    ![A978-1-4302-5786-8_9_Fig8_HTML.jpg](A978-1-4302-5786-8_9_Fig8_HTML.jpg)


    Figure 9-8. Using the Colors ➤ Hue-Saturation dialog to shift the ImageButton_Bookmark
    layer Hue 180 degrees


    I chose to shift the Hue 180 degrees, but you can use any color shift that you
    like, as long as it looks good with the golden outer ring UI element.


    Once you click the OK button, which will apply this new Hue color shift to your
    bookmark icon’s layer, use your File ➤ Export work process to access the Export
    Image dialog shown in Figure [9-9](#A978-1-4302-5786-8_9_Chapter.html#Fig9), and
    export the asset using the name `imagebutton_pressed.png` in a folder used for
    high-resolution density image assets in Android (`/workspace/GraphicsDesign/res/drawable-xhdpi`).


    ![A978-1-4302-5786-8_9_Fig9_HTML.jpg](A978-1-4302-5786-8_9_Fig9_HTML.jpg)


    Figure 9-9. Using an Export Image dialog to export an `imagebutton_pressed.png`
    ImageButton pressed state asset


    Now you only have one of the four ImageButton states that you need to create left,
    the focused ImageButton state. You can do this using the three layers that you
    have in your composite, in a different combination of layer assets.


    You will accomplish this by simply turning off the layer visibility for the `ImageButton_Gold.png`
    layer, by using the eye icon at the left side of the layer. Click this eye icon
    now, so that the eye disappears, as shown in the Layers - Brushes palette on the
    right-hand side of the screen shot in Figure [9-10](#A978-1-4302-5786-8_9_Chapter.html#Fig10).
    The result is an entirely new button state.


    What will happen when you do this is that the `ImageButton_Silver.png` layer will
    now be visible, and you’ll have an all new ImageButton focused state, which uses
    a color-shifted bookmark icon base that you used for the pressed button state
    along with the silver button hoop that you used for the normal button state. As
    you can see in Figure [9-10](#A978-1-4302-5786-8_9_Chapter.html#Fig10), this looks
    very professional.


    It is very important to note that layer visibility can be very useful when creating
    different versions of image composites, such as you are doing here with these
    ImageButton state assets. This is due to the fact that when you export your final
    image composite, the layers that are visible will be the ones that will be used
    to create the digital image composite result, which will be the final pixels used
    to create a flat (single layer) image asset.


    ![A978-1-4302-5786-8_9_Fig10_HTML.jpg](A978-1-4302-5786-8_9_Fig10_HTML.jpg)


    Figure 9-10. Using the visibility (eye) icon to turn off the `ImageButton_Gold`
    composite layer to create focused state


    Now you’re ready to use a File ➤ Export menu sequence to access the Export Image
    dialog, shown in Figure [9-11](#A978-1-4302-5786-8_9_Chapter.html#Fig11), to create
    your `imagebutton_focused.png` ImageButton focused state asset. If you want to
    see a preview of how these image assets will work, you can click the `imagebutton_`
    file names shown in the center of the Export Image dialog, and watch a preview
    on the right that will change in real time, essentially emulating how your ImageButton
    state assets are going to work (look) in your Android Nexus One emulator. Now
    all you have to do is type in your `imagebutton_focused.png` file name, and click
    the Export button once you set the file export option, which you are getting comfortable
    with due to the repetitive nature of this process.


    ![A978-1-4302-5786-8_9_Fig11_HTML.jpg](A978-1-4302-5786-8_9_Fig11_HTML.jpg)


    Figure 9-11. Using an Export Image dialog to export an `imagebutton_focused.png`
    ImageButton focused state asset'
