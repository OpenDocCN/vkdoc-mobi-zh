    Set this parameter to the `@drawable/anim_intro` value, which will then reference
    the `anim_intro.xml` file that you created earlier, which is in the `/res/drawable`
    folder. This parameter is shown in Figure [3-11](#A978-1-4302-5786-8_3_Chapter.html#Fig11).


    ![A978-1-4302-5786-8_3_Fig11_HTML.jpg](A978-1-4302-5786-8_3_Fig11_HTML.jpg)


    Figure 3-11.


    Mousing over a wavy yellow underline warning under `ImageView` tag in Eclipse
    to see the warning dialog


    Also shown in Figure [3-11](#A978-1-4302-5786-8_3_Chapter.html#Fig11) is a warning
    in Eclipse that is denoted by a wavy yellow underline under the opening `ImageView`
    tag as well as a triangular yellow warning icon in the left margin of your code
    editing pane. To read the warning, mouse-over or click the wavy yellow underline
    or warning icon; an info dialog will appear to explain the problem.


    In this case, it is an accessibility issue, as you can see in Figure [3-11](#A978-1-4302-5786-8_3_Chapter.html#Fig11).
    Android wants you to provide an `android:contentDescription` parameter that will
    tell the disabled (sight) what this `ImageView` user interface element contains,
    so add this parameter so that you will have warning-free XML markup. Add a return
    character at the end of the `android:src` parameter line of markup, but before
    the closing `/>` tag delimiter.


    Then type in `android` and a colon to bring up the parameter selector dialog,
    and then find and double-click on the `contentDescription` parameter to insert
    it into the tag parameter list, as shown in Figure [3-12](#A978-1-4302-5786-8_3_Chapter.html#Fig12).
    Once you have done this, you can insert the reference to a string constant, which
    you will be creating next, inside the quotation marks, using the following markup:


    ```

    android:contentDescription="@string/anim_intro_desc"

    ```


    ![A978-1-4302-5786-8_3_Fig12_HTML.jpg](A978-1-4302-5786-8_3_Fig12_HTML.jpg)


    Figure 3-12.


    Adding an `android:contentDescription` parameter to the `ImageView` tag to remove
    warning in Eclipse


    Next you will need to create the string constant for the `contentDescription`
    parameter inside of the `strings.xml` file in the `/res/values` folder using a
    `<string>` tag, as shown in Figure [3-13](#A978-1-4302-5786-8_3_Chapter.html#Fig13).
    Open the `/values` folder by clicking the arrow-head icon next to it and right-click
    the `strings.xml` file and select the Open option from the menu, or simply select
    it and press the `F3` key on the top of your keyboard. This will open up the `strings.xml`
    file for editing in the Eclipse central editing pane where you can add in the
    `<string>` tag for the `anim_intro_desc` string constant. Let’s do that next.


    ![A978-1-4302-5786-8_3_Fig13_HTML.jpg](A978-1-4302-5786-8_3_Fig13_HTML.jpg)


    Figure 3-13.


    Adding the `anim_intro_desc` `<string>` tag to the `strings.xml` string resource
    file in the `/res/values` folder


    The `<string>` tag requires only a `name` to reference it by and the string’s
    text value inside of the tag. Thus your string constant would be defined as follows
    using this additional line of XML markup in the `strings.xml` file:


    ```xml

    <string name="anim_intro_desc">Splash Screen Animation</string>

    ```


    Once you have added this string constant and pressed `CTRL-S` or **File ➤ Save**
    menu sequence, you will have an error-free project. You can right-click the project
    folder and **Run As ➤ Android Application**, so that you can see how the `match_parent`
    layout parameters makes the first frame of your frame animation fill the display
    screen. This is shown in Figure [3-14](#A978-1-4302-5786-8_3_Chapter.html#Fig14)
    on the left hand side of the screen shot. Next, you’ll use the `wrap_content`
    parameter to see how it provides a different result, so don’t take a peek at the
    right hand side of Figure [3-14](#A978-1-4302-5786-8_3_Chapter.html#Fig14) or
    you’ll spoil the surprise!


    ![A978-1-4302-5786-8_3_Fig14_HTML.jpg](A978-1-4302-5786-8_3_Fig14_HTML.jpg)


    Figure 3-14.


    Running the XML markup in the Android Nexus One Emulator to see just how the parameters
    look


    Next, let’s change the `android:layout_width` and the `android:layout_height`
    parameters from `match_parent` to `wrap_content` so that you can see how these
    very important parameter values differ. You need to get a good handle on this
    early on in the game, as it affects how `ImageView` user interface elements scale
    their content; making sure you have control over your asset scaling is one of
    the cornerstones of professional graphics design.


    As you can see in Figure [3-14](#A978-1-4302-5786-8_3_Chapter.html#Fig14), the
    `ImageView` content is now pixel-for-pixel and not scaled, and placed in the upper-left
    corner of the display at the pixel location of `0,0` (X,Y). You can see the XML
    markup in Figure [3-15](#A978-1-4302-5786-8_3_Chapter.html#Fig15).


    ![A978-1-4302-5786-8_3_Fig15_HTML.jpg](A978-1-4302-5786-8_3_Fig15_HTML.jpg)


    Figure 3-15.


    Changing the `android:layout_width` and `height` constants from `match_parent`
    to `wrap_content` values


    This animation is going to look kind of funny sitting in the upper left corner
    of the display screen, so let’s use the `android:` work process, and add an `android:layout_gravity`
    parameter to the bottom of the `ImageView` tag, and set it to center the `ImageView`.
    This will center the `ImageView` user interface element; see Figure [3-16](#A978-1-4302-5786-8_3_Chapter.html#Fig16).


    Layout `gravity` is useful for positioning user interface elements without having
    to specify any pixel or DPI (also DP) values. It is often used for centering UI
    elements; it is also used for aligning elements to the left or the right side,
    or to the top or bottom of a display or parent container.


    ![A978-1-4302-5786-8_3_Fig16_HTML.jpg](A978-1-4302-5786-8_3_Fig16_HTML.jpg)


    Figure 3-16.


    Using the `android:` work process to find the `android:id` parameter for the `ImageView`
    tag


    Next, you need to add an `android:id` parameter, so that you can reference the
    `ImageView` user interface element widget inside your `MainActivity` Java code.
    Place your cursor after the word `ImageView` in the opening tag, and press the
    return key in order to add a new parameter line on to the beginning of the tag
    container, as shown in Figure [3-16](#A978-1-4302-5786-8_3_Chapter.html#Fig16).


    Type in the word `android`, and press the colon key to bring up the parameter
    selector helper dialog; scroll to the bottom, find the `android:id` parameter,
    and double-click it to add it. You should be getting used to this work process
    by now—and enjoying how easy it makes writing your XML markup!


    All you have to do now is to name your `ImageView` logically, so call it `pagImageView`.
    Now you’re ready to animate through the frames using the `AnimationDrawable` class
    and object inside your `MainActivity.java` code.


    Type the `@+id/pagImageView` reference name value inside of the quotation marks
    of the empty `android:id` parameter that you just generated, as shown in Figure
    [3-17](#A978-1-4302-5786-8_3_Chapter.html#Fig17). Android always uses the `@+id`
    prefix to reference XML tag `android:id` parameter values, so memorize this now,
    as you will utilize it often in your Android application development process from
    here on out!


    ![A978-1-4302-5786-8_3_Fig17_HTML.jpg](A978-1-4302-5786-8_3_Fig17_HTML.jpg)'
