  trans: '

    # 为你的 UI 设计创建目录 Activity


    让我们在 Eclipse 中创建一个新的 Java 类。操作方法是：右键点击“包资源管理器”窗格顶部的 `GraphicsDesign` 项目文件夹，如图
    6-6 所示，然后选择 `New ➤ Class` 菜单命令序列。


    这将打开 `New Java Class` 对话框，你可以在此指定要创建的新 `Activity` 子类的特性。


    ![A978-1-4302-5786-8_6_Fig6_HTML.jpg](img/A978-1-4302-5786-8_6_Fig6_HTML.jpg)


    图 6-6. 右键点击 `GraphicDesign` 项目文件夹并选择 `New ➤ Class` 菜单项以创建新的 `Activity`


    确保源文件夹设置为 `GraphicsDesign/src`，包设置为你的 `pro.android.graphics` 包名。将名称字段设置为 `ContentsActivity`，这会为你的文件创建名称
    `ContentsActivity.java`，然后点击超类字段旁边的浏览按钮，并在“选择类型”字段中输入字母“a”以缩小搜索范围（见图 6-7）。


    ![A978-1-4302-5786-8_6_Fig7_HTML.jpg](img/A978-1-4302-5786-8_6_Fig7_HTML.jpg)


    图 6-7. 使用 `android.app.Activity` 超类创建一个名为 `ContentsActivity` 的新 Java Activity
    类


    向下滚动直到看到 `Activity` 类，点击它将其选为超类值，然后在“超类选择”子对话框中点击“确定”按钮，返回“New Java Class”主对话框。接着点击“完成”按钮，在
    Eclipse 中创建新的 Java Activity。完成后，你将在 Eclipse 中央编辑窗格的选项卡中看到新的 `ContentsActivity.java`
    类被打开，如图 6-8 所示。请注意，你的包声明、导入语句和 `public class ContentsActivity extends Activity`
    声明都已就位，可以添加 Java 代码了，接下来你将进行此操作。


    ![A978-1-4302-5786-8_6_Fig8_HTML.jpg](img/A978-1-4302-5786-8_6_Fig8_HTML.jpg)


    图 6-8. 位于 `pro.android.graphics` 包中的新 `public class ContentsActivity extends Activity`
    超类


    要创建你的 `Activity`，首先需要通过在 `protected void onCreate(Bundle saveInstanceState)` 方法内使用
    `super.onCreate(saveInstanceState);` 这一行代码来调用超类 `Activity` 的 `onCreate()` 方法。


    你在 `MainActivity.java` 类中也做了同样的事情。事实上，如果你想从 Eclipse 中的 `MainActivity.java` 编辑选项卡复制类似代码，可以节省打字时间！


    `onCreate()` 方法中的下一行代码将使用 `setContentView()` 方法，并传入你即将创建的布局 XML 文件的引用路径，为你在第一行代码中创建的
    `Activity` 提供一个屏幕布局（用户界面）。


    既然你知道这个文件将位于 `/res/layout` 文件夹中，并且将命名为 `activity_contents.xml`，那么你现在可以使用 `R.layout.activity_contents`
    插入引用路径，因此你的方法调用看起来像下面这行代码：


    `setContentView(R.layout.activity_contents);`


    这就是设置新 `Activity` 所需做的全部工作：创建它，然后将其 `ContentView` 设置为你的 XML 屏幕布局定义。你可能会在图 6-9
    中注意到，Eclipse 对 XML 文件引用标记了一个错误！


    ![A978-1-4302-5786-8_6_Fig9_HTML.jpg](img/A978-1-4302-5786-8_6_Fig9_HTML.jpg)


    图 6-9. 创建你的 `onCreate()` 方法，调用 `super.onCreate()` 超类方法和 `setContentView()`


    这是因为你尚未创建此文件。由于你接下来将创建它，所以暂时可以忽略那条波浪形的红色错误下划线标记。


    ## 创建 XML 格式的目录 LinearLayout UI 设计


    接下来，你需要创建一个新的 XML 布局定义，因此再次右键点击你的顶级项目文件夹，这次选择 `New ➤ Android XML File` 菜单序列，如图
    6-10 所示。


    ![A978-1-4302-5786-8_6_Fig10_HTML.jpg](img/A978-1-4302-5786-8_6_Fig10_HTML.jpg)


    图 6-10. 右键点击 `GraphicDesign` 项目文件夹并通过菜单序列创建 `New ➤ Android XML File`


    这将打开 `New Android XML File` 对话框，如图 6-11 所示，你可以在此指定希望 Eclipse 创建的 XML 文件类型。


    ![A978-1-4302-5786-8_6_Fig11_HTML.jpg](img/A978-1-4302-5786-8_6_Fig11_HTML.jpg)


    图 6-11. 创建一个名为 `activity_contents` 的新布局 XML 文件


    选择“布局资源类型”和“GraphicsDesign 项目”，然后将文件命名为 `activity_contents`，选择根元素为 `LinearLayout`，并点击“完成”按钮创建
    `activity_contents.xml` 文件，该文件如图 6-12 所示，显示在 Eclipse 内部的图形布局编辑器（我称之为 GLE）窗格中。GLE
    可以通过 Eclipse 左下角的选项卡访问。由于你想要查看本章讨论的 XML 标签和参数，请点击另一个底部选项卡，将编辑视图切换到 XML 编辑模式，这样你就可以直接处理
    XML 标记，而不是使用 GLE 的拖放式可视化编辑模式。


    ![A978-1-4302-5786-8_6_Fig12_HTML.jpg](img/A978-1-4302-5786-8_6_Fig12_HTML.jpg)


    图 6-12. 新创建的 `activity_contents.xml` 文件显示在 Eclipse 中央编辑窗格的图形布局中


    一旦你点击 `activity_contents.xml` XML 编辑选项卡（位于 Eclipse 中 `activity_contents.xml` 顶部选项卡编辑窗格的底部，是不是有点晕了？），你将看到
    `<LinearLayout>` 父标签以及“新 XML 文件”对话框为你创建的参数，如图 6-13 所示。


    ![A978-1-4302-5786-8_6_Fig13_HTML.jpg](img/A978-1-4302-5786-8_6_Fig13_HTML.jpg)


    图 6-13. 切换到 XML 标记编辑模式并查看你的 `LinearLayout` 容器参数


    如你所见，必需的 `xmlns:android`、`android:layout_width` 以及 `android:layout_height` 参数都已自动包含，并设置为正确的默认值，因此我们保持它们不变。


    唯一要更改的 `LinearLayout` 父标签参数是 `android:orientation` 参数，我们将为父标签将其设置为水平。使用水平方向作为父标签容器的方向，是因为我们将要嵌套两个垂直的
    `LinearLayout`，并使它们并排放置，因此顶层方向将是水平，因为两个垂直子布局是彼此相邻的。接下来，将光标放在开头的 `<LinearLayout>`
    标签的 `>`（闭合尖括号）之后，然后按回车键自动缩进下一行代码。最后，输入一个 `<`（开放尖括号）以打开子标签帮助对话框，如图 6-14 所示。


    ![A978-1-4302-5786-8_6_Fig14_HTML.jpg](img/A978-1-4302-5786-8_6_Fig14_HTML.jpg)


    图 6-14. 将父 `<LinearLayout>` 容器设置为水平方向并调用帮助对话框


    在帮助对话框中找到 `LinearLayout` 标签，双击它以在当前容器下方添加一个嵌套的 `LinearLayout` 容器。嵌套的 `LinearLayout`
    标签如图 6-15 所示，接下来你需要添加相应的参数，使其垂直布局，并能适配各种不同类型的 Android 设备、屏幕尺寸和形状。


    ![A978-1-4302-5786-8_6_Fig15_HTML.jpg](img/A978-1-4302-5786-8_6_Fig15_HTML.jpg)


    图 6-15.

    '
- fmt: '添加一个子`<LinearLayout>`容器，并将其设置为垂直方向、`0dip`和80%权重。


    从父标签中复制`android:orientation`参数，然后粘贴到子标签中，并将其值改为`vertical`常量。


    接下来，从父标签中复制`android:layout_height="match_parent"`，然后在子标签中也使用它，因为你希望嵌套的子`LinearLayout`的高度适应屏幕的完整高度。


    由于你想使用`android:layout_weight="0.8"`参数将这个嵌套的垂直布局设置为占用屏幕宽度的80%，你需要添加一个`android:layout_width="0dip"`参数。使用`0dip`设置是一个鲜为人知的技巧，它会告诉Android关闭布局的设备独立像素尺寸计算，几乎就像`0dip`对Android意味着“无dip”。这将告诉Android操作系统根据当前设备屏幕尺寸以及`android:layout_weight`设置来计算屏幕尺寸。


    接下来，你需要为屏幕右侧添加另一个嵌套的`LinearLayout`。最快的方法是简单地复制刚刚创建的`<LinearLayout>`标签，然后粘贴到其下方，如图[6-16](#A978-1-4302-5786-8_6_Chapter.html#Fig16)所示。将第二个嵌套布局中的`android:layout_weight`参数修改为使用显示屏的剩余部分。


    这可以通过设置`android:layout_weight="0.2"`来表示屏幕的20%来实现。你也可以在权重参数中使用整数，Android会将它们相加得到总数，然后通过除法获得要使用的屏幕权重比例。因此，如果你想用8和2，或者80和20，而不是0.8和0.2来指定这些比例，那也是可行的。事实上，使用4和1也可以，因为4/5等于0.8，1/5等于0.2。


    ![A978-1-4302-5786-8_6_Fig16_HTML.jpg](A978-1-4302-5786-8_6_Fig16_HTML.jpg)


    图6-16.


    使用复制粘贴的方式添加第二个子`<LinearLayout>`容器，并设置20%权重


    现在，你拥有了一个空的嵌套布局容器结构，由一个水平的`LinearLayout`包含两个垂直的`LinearLayout`组成。Android不喜欢空的布局容器，因此在某个时候，Eclipse会在你的`LinearLayout`标签下放置波浪形的黄色警告下划线，以提醒你需要在这些容器内放置子标签（控件），否则就是在浪费宝贵的系统内存。


    接下来，让我们向这些布局容器中添加几个`TextView`用户界面控件，以便向你展示如何使用你创建的两个嵌套`LinearLayout`结构来创建一个简单的目录。


    ## 向TOC UI布局容器添加文本UI控件


    现在，你需要将`TextView` UI元素（在Android中称为TextView控件）添加到嵌套布局容器结构内部。你可能已经注意到（如果这些警告尚未显示，请使用`CTRL-S`快捷键保存你的`activity_contents`
    XML文件），你空的布局容器正在Eclipse中抛出警告（未使用的布局容器警告）。为了解决这个问题，让我们添加一些基础的文本UI元素来创建一个目录屏幕，左侧为章节标题，右侧为页码。`layout_weight`参数将允许你轻松地微调这两个数据列之间的精确间距。


    你需要做的第一件事是创建将用于标记`TextView` UI对象的`<string>`标签XML文本常量。因此，点击Eclipse中的`strings.xml`标签，并在文件底部添加八个`<string>`标签。最简单的方法是复制最后一个`<string>`标签八次，然后编辑`name`参数和数据值。


    添加完这八个`<string>`标签并将其`name`参数分别改为`chap_one`到`chap_four`以及`page_one`到`page_four`之后，你可以为它们添加数据值，这些值代表一本《Pro
    Android Graphics》书的前四章，如图[6-17](#A978-1-4302-5786-8_6_Chapter.html#Fig17)所示。同时添加一些模拟的页码范围，以便UI元素中有数据可以预览UI设计。这样，你就可以准备添加`<TextView>`标签了。


    ![A978-1-4302-5786-8_6_Fig17_HTML.jpg](A978-1-4302-5786-8_6_Fig17_HTML.jpg)


    图6-17.


    为四个章节标题和四个页码`TextView` UI元素添加`<string>`标签（常量）


    让我们添加第一个`<TextView>`用户界面元素标签，它将作为第一个嵌套`<LinearLayout>`标签内的子标签。完成此标签的编码后，你可以再复制三次，只需编辑复制出的子标签的参数即可，从而节省应用开发时间。


    你知道必须使用`android:layout_width`和`android:layout_height`参数，因此我们先添加这些参数，并将其常量值设置为`wrap_content`，因为你希望这个UI元素容器能够适应其内部包含的文本数据内容。


    接下来，你需要添加一个`android:text`参数来引用之前在`strings.xml`文件中添加的`<string>`标签常量。这可以通过在`<string>`标签的`name`参数前加上`@string/`路径前缀来实现。因此，你的第一个`<TextView>`标签UI容器XML标记看起来像这样（如图[6-18](#A978-1-4302-5786-8_6_Chapter.html#Fig18)所示）：


    ```

    <TextView android:layout:width="wrap_content"

    android:layout_height="wrap_content"

    android:text="@string/chap_one" />

    ```


    现在，你可以将这个UI容器标签结构复制粘贴三次到其下方，并将`android:text`参数值改为引用`chap_two`、`chap_three`和`chap_four`的`<string>`标签名称。完成此操作后，你会注意到其中一个错误警告消失了！


    ![A978-1-4302-5786-8_6_Fig18_HTML.jpg](A978-1-4302-5786-8_6_Fig18_HTML.jpg)


    图6-18.


    向第一个嵌套的`LinearLayout`容器添加`TextView`标签，并显示Eclipse警告图标和波浪形黄色警告下划线


    现在，Eclipse中只剩下两个警告标志需要处理，如图[6-18](#A978-1-4302-5786-8_6_Chapter.html#Fig18)所示。将鼠标悬停在第一个警告上，你会得到Eclipse
    ADT的建议，让你在父标签布局容器中使用`android:baselineAligned="false"`参数。现在让我们添加它，就在顶层父`LinearLayout`容器标签中，如图[6-19](#A978-1-4302-5786-8_6_Chapter.html#Fig19)所示。'
  raw: 'Adding a child <LinearLayout> container and setting it to a vertical orientation,
    0 dip, and 80% weight


    Copy the android:orientation parameter from the parent tag, and then paste it
    into the child tag, and change it to use the `vertical` constant value.


    Next, copy the `android:layout_height="match_parent"` from the parent tag, and
    then use it inside the child tag as well, as you want the height of the nested
    child LinearLayout to conform to the full height of the screen.


    Since you want to use an `android:layout_weight="0.8"` parameter to set this nested
    vertical layout to use 80% of the screen width, you need to add an `android:layout_width="0dip"`
    parameter. Using the 0dip setting is a little-known trick, and it will tell Android
    to turn off device independent pixel sizing for the layout, almost as if 0dip
    means “no dip” to Android. This will serve to tell the Android OS to calculate
    the screen sizing based on the current device screen size, along with the `android:layout_weight`
    setting.


    Next, you need to add another nested LinearLayout for the right side of the screen.
    The fastest way to do this is to simply to copy the <LinearLayout> tag that you
    just created, and paste it again underneath itself, as shown in Figure [6-16](#A978-1-4302-5786-8_6_Chapter.html#Fig16).
    Change the android:layout_weight parameter in the second nested layout to utilize
    the remainder of the display screen.


    This is done by setting `android:layout_weight="0.2"` to signify 20% of the screen.
    You can also use integers in the weight parameter, and Android will add them together
    to get a total and then obtain the fraction of the screen weight to use via division,
    so if you wanted to use 8 and 2, or 80 and 20, instead of 0.8 and 0.2 to specify
    these fractions, that would work as well. In fact, so would 4 and 1, as 4/5 is
    0.8 and 1/5 is 0.2.


    ![A978-1-4302-5786-8_6_Fig16_HTML.jpg](A978-1-4302-5786-8_6_Fig16_HTML.jpg)


    Figure 6-16.


    Adding a second child <LinearLayout> container using copy and paste, and setting
    a 20% weight


    Now you have your empty, nested layout container structure of one horizontal LinearLayout
    that holds two vertical LinearLayouts together. Android does not like empty layout
    containers, so at some point Eclipse will place wavy yellow warning highlighting
    under your LinearLayout tags to let you know that you need to place child tags
    (widgets) inside these containers or you’re just wasting valuable system memory.


    Let’s add a few TextView user interface widgets to these layout containers next,
    so we can show you how a simple Table of Contents is created by using the two
    nested LinearLayout structures that you have created.


    ## Adding Text UI Widgets to the TOC UI Layout Container


    Now you need to add your `TextView` UI elements, known as TextView widgets in
    Android, to the inside of your nested layout container structures. As you might
    have seen by now (if these are not showing up as yet, use the CTRL-S keystroke
    combination to Save your activity_contents XML file), your empty layout container
    is throwing warnings in Eclipse (unused layout container warnings). To alleviate
    this problem, let’s add some basic Text UI elements to create a Table of Contents
    screen, with chapter titles on the left side and page numbers on the right side.
    The layout_weight parameter will allow you to easily fine-tune the precise spacing
    between these two data columns.


    The first thing that you need to do is to create the `<string>` tag XML text constants
    that you are going to use to label your TextView UI objects, so click the `strings.xml`
    tab in Eclipse, and add eight <string>tags to the bottom of the file. The easiest
    way to do this is to copy the last <string>tag eight times, and edit the name
    parameters and data values.</string></string>


    Once you have added these eight <string> tags and changed their name parameters
    to chap_one through chap_four and page_one through page_four, you can add data
    values to them that represent the first four chapters of a Pro Android Graphics
    book, as shown in Figure [6-17](#A978-1-4302-5786-8_6_Chapter.html#Fig17). Add
    in some mock-up page ranges as well, so that there is data in the UI element to
    preview the UI design with, and then you will be ready to add in <TextView> tags.


    ![A978-1-4302-5786-8_6_Fig17_HTML.jpg](A978-1-4302-5786-8_6_Fig17_HTML.jpg)


    Figure 6-17.


    Adding <string> tags (constants) for four chapter titles and four page number
    TextView UI elements


    Let’s add in your first <TextView> user interface element tag, which will be a
    child tag inside your first nested <LinearLayout> tag. Once this tag has been
    coded, you can copy it three more time and simply edit the parameters for the
    copied child tags to save app development time.


    You know that you need the android:layout_width and android:layout_height parameters
    as a requirement, so let’s add these first with the constant value of `wrap_content`,
    since you want this UI element container to conform to the text data content that
    is held inside of it.


    Next, you have to add an android:text parameter to reference the <string> tag
    constants that you have added in your strings.xml file earlier. This is done using
    the @string/ path preface to the <string> tag name parameter that you assigned
    to each of the string constants. So your first <TextView> tag UI container XML
    markup looks like this (also shown in Figure [6-18](#A978-1-4302-5786-8_6_Chapter.html#Fig18)):


    `<TextView android:layout:width="wrap_content"`


    `android:layout_height="wrap_content"`


    `android:text="@string/chap_one" />`


    Now you can copy and paste this UI container tag structure three more times underneath
    itself and change the android:text parameter values to reference the chap_two,
    chap_three, and chap_four <string> tag names. Once this is done, you will notice
    one of your error warnings has disappeared!


    ![A978-1-4302-5786-8_6_Fig18_HTML.jpg](A978-1-4302-5786-8_6_Fig18_HTML.jpg)


    Figure 6-18.


    Adding TextView tags to the first nested LinearLayout container along with Eclipse
    warning icons and wavy yellow warning underline highlighting


    Now you only have two warning flags in Eclipse left to deal with, as you can see
    in Figure [6-18](#A978-1-4302-5786-8_6_Chapter.html#Fig18). Mouse-over the first,
    and you will get an Eclipse ADT recommendation that you utilize the `android:baselineAligned="false"`
    parameter in your parent tag layout container. Let’s add that now, in the top-level
    parent LinearLayout container tag, as shown in Figure [6-19](#A978-1-4302-5786-8_6_Chapter.html#Fig19).'
