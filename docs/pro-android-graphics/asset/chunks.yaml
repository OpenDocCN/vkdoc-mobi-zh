    \n[`http://developer.android.com/reference/android/util/DisplayMetrics.html`](http://developer.android.com/reference/android/util/DisplayMetrics.html)\n\
    \nTable 5-2.  \nAndroid DisplayMetrics Class and Object Data Fields Plus Access\
    \ Modifiers and Functions\n\n| Access/Type Modifier | Object Field Proper Name\
    \ | Object Data Field Information Provided on Polling |\n| --- | --- | --- |\n\
    | `public float` | `Density` | The logical density of the display |\n| `public\
    \ int` | `densityDpi` | The screen density expressed as dots per inch |\n| `public\
