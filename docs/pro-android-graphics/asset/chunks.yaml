  trans: '

    ## 复制分辨率密度目标帧


    首先，你需要将四组共九张 PNG 动画帧复制到相应的文件夹中。从 Android 4.3 开始，这些文件夹分别是 `/res/drawable-xhpdi`、`/res/drawable-hdpi`、`/res/drawable-mdpi`
    和 `/res/drawable-ldpi`。


    现在就进行操作，这样你在下一节中编写的 XML 标记才能有可引用的内容。打开你操作系统的文件管理软件；对于 Windows 7 或 8，它被称为资源管理器，由于我使用的是
    Windows 8，其界面如图 3-1 所示。


    按住 Control (CTRL) 键，选中文件名以 `_640px` 结尾的九张 PNG 文件，如图 3-1 所示。在选中 PNG 文件时按住 Control（修饰）键，你可以随机选择文件，而非连续选择。


    **提示：** 如果你想知道如何选择连续的文件范围，可以使用 Shift 键作为修饰键。


    ![A978-1-4302-5786-8_3_Fig1_HTML.jpg](img/A978-1-4302-5786-8_3_Fig1_HTML.jpg)


    *图 3-1. 按住 Control 键选中八个动画文件，准备复制到 XHDPI 分辨率密度目标文件夹*


    选中这九个文件后，右键单击其中任意一个，选择“复制”选项。文件已放入操作系统剪贴板后，你可以导航到 `/Users` 文件夹，找到你的 Eclipse `/workspace`
    文件夹。在 `/workspace` 文件夹下，找到你的 `/GraphicsDesign` Android 应用项目文件夹，其下有 `/res` 资源文件夹。最后，找到
    `/drawable-xhdpi` 文件夹，右键单击并选择“粘贴”选项，将这九个文件复制到此目标位置。


    文件复制到正确文件夹后，你需要将所有九个文件重命名为更简短易用——并符合 Android 的资源文件命名规范。Android 中的文件名必须仅使用小写字母、数字，并且可选地使用下划线字符。因此，将文件命名为
    `pag0.png` 到 `pag8.png`，如图 3-2 所示。


    ![A978-1-4302-5786-8_3_Fig2_HTML.jpg](img/A978-1-4302-5786-8_3_Fig2_HTML.jpg)


    *图 3-2. 在 `/drawable-xhdpi` 中将 `PAG0_640px.png` 系列文件重命名为 `pag0.png` 到 `pag8.png`*


    现在，为了完整性，为 `_320px` 文件执行完全相同的操作流程，并将它们放入 `/res/drawable-hdpi` 文件夹。完成后，多选并复制 `_160px`
    文件到 `/res/drawable-mdpi` 文件夹。最后，将 `_80px` 文件复制到 `/res/drawable-ldpi` 文件夹。


    这里还需注意一点：你也可以选择不将资源放入 `/res/drawable-ldpi` 文件夹，因为 Android 会直接使用你的 MDPI 资源并进行缩放。MDPI
    资源用于 160 DPI 显示屏，而 LDPI 资源用于 120 DPI 的 Android 设备，这类设备因高密度像素屏幕而变得有些少见，但随着智能手表的出现，它们可能会重新流行起来。


    HDPI 资源用于 240 DPI 屏幕，XHDPI 资源用于 320 DPI 屏幕。XXHDPI 文件夹及其规范是 Android 4.2 新增的，用于
    480 DPI 屏幕；XXXHDPI 文件夹及其规范是 Android 4.3 新增的，用于 640 DPI 屏幕。不过，需要注意的是，截至目前的 Android
    Jelly Bean 版本，XXHDPI 仅用于存放 144 x 144 像素的应用启动图标资源——如果你疑惑为什么目前没有使用这个可绘制资源文件夹，原因就在于此。


    ## 使用 XML 创建帧动画定义


    让我们接着第 2 章的内容继续，创建一个新的 XML 文件来存放帧动画的 XML 资源。如果 Eclipse ADT 尚未打开，请启动它。右键单击位于 IDE
    左侧“包资源管理器”窗格中的顶层 `GraphicsDesign` 文件夹。选择 **New ➤ Android XML File** 菜单序列，如图 3-3
    所示。


    ![A978-1-4302-5786-8_3_Fig3_HTML.jpg](img/A978-1-4302-5786-8_3_Fig3_HTML.jpg)


    *图 3-3. 右键单击 GraphicDesign 项目文件夹，调出 **New ➤ Android XML File** 菜单序列*


    当“新建 Android XML 文件”对话框打开后，从顶部的下拉菜单选择器中选择“Drawable”资源类型，如图 3-4 所示。接下来，将文件命名为 `anim_intro`，并从对话框底部的“根元素”列表中选择
    `animation-list` 标签。项目名称应自动设置。一切完成后，单击“Finish”按钮。


    ![A978-1-4302-5786-8_3_Fig4_HTML.jpg](img/A978-1-4302-5786-8_3_Fig4_HTML.jpg)


    *图 3-4. 为新 XML 文件 `anim_intro.xml` 设置参数*


    请注意，你无需在文件名后指定 `.xml` 文件扩展名；Eclipse 会自动添加。单击“Finish”按钮后，Eclipse 会在中央编辑窗格中打开 `anim_intro.xml`
    文件，你可以在图 3-5 中看到，XML 文件类型声明和 XML 命名模式（`xmlns`）URL 已自动为你添加。接下来，你只需为父标签 `<animation-list>`
    添加参数，并为动画帧添加子标签 `<item>`。


    ![A978-1-4302-5786-8_3_Fig5_HTML.jpg](img/A978-1-4302-5786-8_3_Fig5_HTML.jpg)


    *图 3-5. 在 Eclipse 中为你新建并打开的 `anim_intro.xml` 文件，已包含 `animation-list` 父容器标签*


    将光标放在 `android:xmlns` 参数声明的末尾（即最后一个结束引号之后），然后按回车键。Eclipse 会自动缩进你的下一行代码，非常方便。


    输入 `android` 作为下一个参数，然后按冒号键，会弹出一个辅助对话框，其中包含 `<animation-list>` 标签的所有参数选项，这也是一个非常酷且实用的功能。


    找到 `android:oneshot` 参数（它应该是列表中的最后一个）；双击将其选中并添加到 `<animation-list>` 标签中作为参数。如图
    3-6 所示，这是在双击将 `android:oneshot` 参数添加到父容器标签之前的状态。


    你会注意到，你仍需输入该参数所需的布尔值，因为会提供引号，但其中没有内容。如果你希望动画只播放一次，则输入 `true`；如果你希望动画循环播放，则输入 `false`。接下来，你需要使用
    `<item>` 子标签来指定帧。


    ![A978-1-4302-5786-8_3_Fig6_HTML.jpg](img/A978-1-4302-5786-8_3_Fig6_HTML.jpg)


    *图 3-6. 输入 `android:` 会调出 Eclipse 辅助对话框，其中包含 `animation-list` 标签参数选项*


    将光标放在 `<animation-list>` 标签的末尾（即 `>` 字符之后），然后按回车键，让 Eclipse 自动缩进你的第一个 `<item>`
    标签。输入以下 XML 标记行，使用 `android:drawable` 源文件引用参数和 `android:duration` 帧持续时间值来指定你的第一个动画帧：


    ```

    <item android:drawable="@drawable/pag0" android:duration="112" />

    ```

