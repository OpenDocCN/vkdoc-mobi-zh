  trans: '

    ### 为 `SkyCloud` 图像应用色调以改善阴影对比度


    启动 Eclipse ADT，如果桌面上尚未打开你的 `GraphicsDesign` 应用程序，请将其打开。你将执行一些数字成像处理，就像在 GIMP 2.8
    或 Photoshop 中所做的那样，只不过你将使用 Android XML 标记来完成。


    为了完成你在前一章创建的投影效果的最终润色，真正需要做的第一件事是提亮作为 `BookmarkActivity.java` Activity 子类背景板的
    `CloudSky` 数字图像。


    当前，你使用 `android:background` 参数将背景图像放置在 `RelativeLayout` 父标签中，该参数会自动为你执行 `FIT_XY`
    的 `ScaleType`，并使图像资源填满屏幕，完全不考虑宽高比——实际上，这正是你想要的。


    然而，尽管 Android 的 `RelativeLayout` 容器非常强大，并且拥有众多强大的参数，但你需要的 `android:tint` 却不在其中，因为
    `RelativeLayout` 用于 UI 布局，而 `ImageView` 才用于数字成像。


    因此，让我们从父标签中移除 `android:background` 参数，并在容器顶部添加一个 `ImageView` 子标签，这样从 Z 轴顺序来看，它会位于其他
    UI 元素之后。接下来，你将开始添加参数，如图 8-1 所示，以配置其使用。


    ![A978-1-4302-5786-8_8_Fig1_HTML.jpg](img/A978-1-4302-5786-8_8_Fig1_HTML.jpg)


    **图 8-1.** 添加一个 `ImageView` 来保存 Activity 的数字图像背板，以便应用色调和效果


    让我们添加一个设置为 `backgroundImage` 的 ID 参数，并添加所需的 `layout_width` 和 `layout_height` 参数，将它们设置为
    `match_parent` 常量，使 `ImageView` 容器填满 `RelativeLayout` 容器。


    你会注意到（如果按下 CRTL-S 或 文件 ➤ 保存），Eclipse 会用波浪形的黄色下划线标记你的代码，因为它要求所有 `ImageView` 类及其子类（例如
    `ImageButton`）都包含 `contentDescription` 参数。因此，从另一个 `ImageView` 中复制并粘贴 `android:contentDescription`
    参数到当前的这个 `ImageView` 中，以解决该问题。


    最后，你需要添加对数字图像资源本身的引用，因此请添加一个 `ImageView` 的 `android:src="@drawable/cloudsky"`
    参数，以引用你的数字图像。这些参数为你的背景图像设置了基本画板，如图 8-1 所示。


    现在，让我们使用 `运行方式 ➤ Android 应用程序` 工作流程，查看修改后的 UI 设计，确保它与你开始之前的状态一致。如图 8-2 左侧所示，Android
    正在使用 `FIT_CENTER` 的 `ScaleType` 常量缩放你的源图像资源，因此你看到的是 `RelativeLayout` 容器的默认白色背景。


    ![A978-1-4302-5786-8_8_Fig2_HTML.jpg](img/A978-1-4302-5786-8_8_Fig2_HTML.jpg)


    **图 8-2.** 在 Nexus One 模拟器中测试新的 `ImageView` 设置：应用色调和 `scaleType` 前后的对比


    你会在这里看到，`android:src` 参数使用 `FIT_CENTER`，而 `android:background` 参数使用 `FIT_XY` 的
    `ScaleType` 算法常量，这恰恰是此特定应用程序（或 UI 设计场景）所需要的。因此，在开始色彩校正之前，你需要修复这个问题。


    你可以使用 `android:background` 参数来保存你的图像资源，这需要将 `android:src` 改为 `android:background`；或者，你可以添加
    `android:scaleType="fitXY"` 来覆盖当前使用的 `fitCenter`。既然你正在学习这些 `ImageView` 特有的参数，而不是从
    `View` 超类继承的参数（如 `background`），那么我们就继续添加一个 `ScaleType` 参数，并将其设置为 `fitXY` 缩放常量，如图
    8-3 所示。


    ![A978-1-4302-5786-8_8_Fig3_HTML.jpg](img/A978-1-4302-5786-8_8_Fig3_HTML.jpg)


    **图 8-3.** 添加参数将图像提亮 31.25% 并缩放以适配父容器，与第 7 章保持一致


    既然已经解决了缩放问题，现在是时候使用 `android:tint` 参数，通过 `ImageView` 容器的属性（Attributes）对源图像进行一些色彩校正了。


    控制覆盖在源图像上色调量的方法是使用 alpha 通道来调整色调颜色的级别（或透明度）。在这里，色调颜色是白色，或者说是十六进制值 `#FFFFFF`。添加白色值将对源图像中的所有像素产生均匀的提亮效果，就像
    GIMP 2.8.6 或 Photoshop CS6 中的提亮算法会为你做的那样。


    你将指定对图像进行 31.25% 的提亮，方法是使用十六进制中的级别 4（或 44）值，因为 4 相当于 5，而 5/16 正好是 16/16（100%）的
    31.25%。因此，你需要在 `android:tint` 参数中指定的 ARGB 值是 `#44FFFFFF`，即对图像应用 31.25% 的白色。


    如图 8-2 右侧所示，完成 `android:scaleType` 和 `android:tint` 参数的应用后，你的图像缩放正确，看起来 100% 更加真实，阴影现在也可见了。


    在继续之前，我想提到的最后一点是，本书中将使用的许多数字成像特效在 Eclipse ADT 的“图形布局编辑器”选项卡中无法准确渲染，甚至完全无法渲染，如图
    8-4 浅黄色警告区域所示。


    ![A978-1-4302-5786-8_8_Fig4_HTML.jpg](img/A978-1-4302-5786-8_8_Fig4_HTML.jpg)


    **图 8-4.** “图形布局”选项卡中的错误（参见黄色区域）提示阴影和 PorterDuff 效果需要模拟器支持


    其原因在于，渲染阴影和混合模式所需的代码需要添加到 Eclipse ADT 的 GLE 模块中，而这需要大量的工作和代码量。因此，目前你需要使用 `运行方式
    ➤ Android 应用程序` 工作流程来测试或审查你的代码。

    '
- fmt: '# Cropping Your SkyCloud Image Asset Using CropByPadding


    Now that you have seen how to apply basic image lightening color correction in
    Android using XML markup and the `ImageView` widget, let’s also learn to crop
    your image using the `android:cropByPadding` parameter, and at the same time get
    some practice in using the five `android:padding` parameters.


    Cropping seems like something really simple, in and of itself, and it is; however,
    it can also become an integral part of more complicated “moves,” as I like to
    call them, that can be made towards obtaining complex digital imaging special
    effects, like drop shadows, embossing, faux 3D, and so on.


    Indeed, you have already seen what I am talking about in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html),
    when we took our source image and duplicated, grayscaled, blurred, moved and alpha
    channeled it into a semi-translucent, alpha-channel-integrated, drop-shadow, special-effect
    digital image using the very affordable GIMP 2.8.6 package.


    Now you are going to implement image cropping using XML markup along with the
    `android:cropToPadding="true"` parameter, so add that to your `ImageView` tag
    after the `android:tint` parameter that you added in a previous section, as shown
    in Figure [8-5](#A978-1-4302-5786-8_8_Chapter.html#Fig5). This parameter will
    do nothing in and of itself; if you wish to prove that to yourself, click the
    GLE tab at the bottom of the editing pane, as the GLE works great with padding
    and cropping tags!


    ![A978-1-4302-5786-8_8_Fig5_HTML.jpg](A978-1-4302-5786-8_8_Fig5_HTML.jpg)


    Figure 8-5. Adding `android:padding` and `android:cropToPadding` parameter to
    crop 9dip of perimeter border area


    So, let’s add in an `android:padding="9dp"` parameter next to give a 9 DIP of
    border around your UI design. Since there is no `android:border` or `layout border`
    parameter, this is a way that you can add borders into your design.


    Notice that the default white color of the `RelativeLayout` container, which is
    behind the `ImageView`, is now showing through that area of the `ImageView` that
    has been cropped out of the way and is allowing those pixels to show through.
    If your `RelativeLayout` had a background image installed, it would composite
    with the `ImageView` source image, just like layers do in GIMP.


    Use the Graphical Layout Editor tab or your Run As ➤ Android Application work
    process to see that the `android:cropToPadding` parameter is now doing its thing,
    as shown on the left side of the screen shot in Figure [8-6](#A978-1-4302-5786-8_8_Chapter.html#Fig6).


    Let’s color this border with some of the color that is in the setting sun. You
    do this by adding an `android:background` into your `RelativeLayout`.


    ![A978-1-4302-5786-8_8_Fig6_HTML.jpg](A978-1-4302-5786-8_8_Fig6_HTML.jpg)


    Figure 8-6. Testing your `CropToPadding` parameter and `RelativeLayout` background
    color value in the Nexus One emulator


    Add an `android:background="#FFEEAA"` parameter in the `RelativeLayout` parent
    tag, much like you had it set there before, except using a different color value.
    As you can see on the right-hand side of Figure [8-6](#A978-1-4302-5786-8_8_Chapter.html#Fig6),
    this new color value approximates (matches) colors in the clouds around the setting
    Sun.


    Next, you are going to use the `android:paddingTop` parameter to push (crop) down
    the image so that the drop-shadowed `TextView` is in the yellow area of color
    at the top of the UI design, so that you get some practice with some of the more
    directional padding parameters.


    As you can see in Figure [8-7](#A978-1-4302-5786-8_8_Chapter.html#Fig7), I have
    changed the `android:padding="9dp"` to an `android:paddingTop="50dp"` parameter,
    which changes the design to match what is shown on the left side of Figure [8-8](#A978-1-4302-5786-8_8_Chapter.html#Fig8).


    Since you lose your border effect, let’s add in another `android:padding="8dp"`
    parameter, and again use either the Graphical Layout Editor tab or the Run As
    ➤ Android Application work process to see the result. What you will see when you
    do this is that your `android:paddingTop` parameter is not rendered correctly,
    and your UI screen reverts to looking like what is shown on the right-hand side
    of Figure [8-6](#A978-1-4302-5786-8_8_Chapter.html#Fig6). Back to the drawing
    (cropping) board!


    What this means is that the `android:padding` parameter is applied after the other
    more specific `android:paddingTop` (and the others) parameters, so if you want
    to specify different padding values, you must specify each side individually,
    or the `android:padding` parameter will override the others.


    So change `android:padding="8dp"` to `android:paddingLeft="8dp"` and then copy
    it two more times beside itself, as shown in Figure [8-7](#A978-1-4302-5786-8_8_Chapter.html#Fig7),
    and change the Left to be Right and Bottom, respectively.


    ![A978-1-4302-5786-8_8_Fig7_HTML.jpg](A978-1-4302-5786-8_8_Fig7_HTML.jpg)


    Figure 8-7. Add `paddingTop`, `paddingLeft`, `paddingRight`, and `paddingBottom`
    parameters to create a custom crop


    Now your backplate (background image) `ImageView` has more parameters set for
    it than your `currentBookmarkImage` (subject matter) `ImageView` does! The XML
    markup for the first `ImageView`, which is on the bottom (in back) of the UI element
    compositing stock, should now include the following parameters:


    ```

    <ImageView android:id="@+id/backgroundImage"

    android:src="@drawable/cloudsky"

    android:layout_width="match_parent"

    android:layout_height="match_parent"

    android:contentDescription="@string/bmi"

    android:scaleType="fitXY"

    android:tint="#44FFFFFF"

    android:cropToPadding="true"

    android:paddingTop="50dp"

    android:paddingLeft="8dp"

    android:paddingRight="8dp"

    android:paddingBottom="8dp" />

    ```


    To see the new custom image crop (using padding values and `cropToPadding`), take
    a look at the right side of Figure [8-8](#A978-1-4302-5786-8_8_Chapter.html#Fig8).
    You now have the desired image effect of the `TextView` drop shadowed over a sunset
    yellow hue and the 8dip border the rest of the way around the image to add a little
    decoration. You were able to achieve your cropping, color correction, layout,
    ID, reference to the source digital image asset, and scaling by using a dozen
    parameters.


    ![A978-1-4302-5786-8_8_Fig8_HTML.jpg](A978-1-4302-5786-8_8_Fig8_HTML.jpg)


    Figure 8-8. Testing your custom `android:padding` and `android:cropToPadding`
    parameters in the Nexus One emulator


    Next let’s take a look at how to customize where the baseline alignment is set
    for your `ImageView` using the `android:baseline` `ImageView` parameter.'
