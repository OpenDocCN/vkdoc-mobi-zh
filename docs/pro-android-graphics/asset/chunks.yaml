- fmt: 'As I mentioned earlier, basic `FrameLayout` configurations can be nested and
    accommodated inside the cells of a `GridLayout` because a single cell can contain
    multiple `View` or `ViewGroup` objects.


    To switch between two `View` or `ViewGroup` objects, you would place both of them
    into the same cell, and then leverage each via a visibility parameter by using
    the constant `GONE` in order to switch between one `ViewGroup` to the other `ViewGroup`
    (or `View`) from inside your Java code.


    As you can see, with a little creativity, something that seems as basic as a `GridLayout`
    container can become much more powerful due to nesting and the number of parameters
    and constants that it supports within Android OS.


    Next, we’ll take a look at another powerful layout container that was recently
    added to Android in Version 4, the `DrawerLayout`. In fact, a `DrawerLayout` could
    contain a `GridLayout` for a complex UI drawer treatment that would still be memory
    efficient, given that you set it up correctly.


    ## The `DrawerLayout` Class: Designing UI Drawer Layouts


    The `DrawerLayout` class is also a subclass of `ViewGroup`, and it is stored in
    the `android.support.v4.widget` package, which indicates that this is an all-new
    layout container as of Android 4.0 and later. A full import statement reference
    to this class is `android.support.v4.widget.DrawerLayout`.


    A `DrawerLayout` container is designed to function as the top-level layout container
    for the user interface content that you wish to be contained inside an interactive
    "sliding drawer" user interface layout container.


    These UI containers can be "pulled out" of the left or right sides of the screen
    by your users, using handles located at either side of the display screen. The
    UI Drawer position, as well as its layout, is controlled by using the `android:layout_gravity`
    attribute in your child views. These should correspond to the side of the screen
    from which you want your UI Drawer to dragged out from, so use either `android:layout_gravity="LEFT"`
    or `android:layout_gravity="RIGHT"`. Be sure to not specify the `CENTER` constant,
    or any of the other gravity constants.


    To use a `DrawerLayout`, position your primary content layout container `View`
    (`ViewGroup`) as the first child of the `DrawerLayout` tag, using `layout_width`
    and `layout_height` parameters set to `match_parent`.


    Next, add your UI drawers as child tags (`View`s or `ViewGroup`s) right after
    this primary content layout container, and set a `layout_gravity` parameter to
    be either the `LEFT` or the `RIGHT` `layout_gravity` constant.


    Make absolutely sure not to use the `TOP` or `BOTTOM` (or any other constants)
    `layout_gravity` settings, as this class is not intended to provide vertical drawers,
    only horizontal ones, and will likely throw an exception.


    To create one single UI drawer that spans the entire side of your screen, your
    UI Drawer content tag should make use of the `match_parent` constant for the `android:layout_height`
    parameter to set the full height of the screen.


    For the `android:layout_width` parameter, you would next use the fixed width that
    you want to use for the UI Drawer width, specified using a DIP value.


    The `DrawerLayout.DrawerListener` Java interface can be utilized to monitor the
    state and the motion of your UI drawer implementation so that your Java code can
    do things when the drawer is open, closed, or being dragged.


    The Android `DrawerListener` has four methods that you can place custom Java code
    in to control what your Drawer UI does during these states. The methods are all
    declared as abstract and void and include `onDrawerClosed()` and `onDrawerOpened()`
    as well as `onDrawerSlide()`, which is called when your user is dragging the handle,
    and `onDrawerStateChanged()` to signal when the drawer goes from closed to open
    or vice versa.


    It would be smart to avoid using expensive processing functions in your `DrawerListener`
    methods, such as using animation inside a drawer, as this may cause stilted performance
    as the UI Drawer is being dragged out.


    If for some reason you must implement processor-expensive operations in a UI Drawer,
    be sure to invoke this code during the `DrawerLayout` `STATE_IDLE` state. The
    other state constants for `DrawerLayout` include `STATE_DRAGGING`, `STATE_SETTLING`,
    and for locking, `LOCK_MODE_UNLOCKED`, `LOCK_MODE_LOCKED_OPEN`, and `LOCK_MODE_LOCKED_CLOSED`.


    There is also `DrawerLayout.SimpleDrawerListener`, which offers the default (no
    special options) implementation of each of the `DrawerListener` callback methods.
    Use this if you are just accessing the core functionality of the UI `DrawerLayout`
    class as it provides simpler, more memory efficient code.


    To remain consistent with the Android OS design principles, any UI drawers located
    on the left side of the screen should contain UI elements that are intended for
    (global) navigation of your application. Conversely, UI Drawers that contain UI
    elements that invoke operations or functionality local to the current screen content
    should be positioned on the right side of the screen.


    Staying true to these Android navigation rules will keep user confusion to a minimum
    by utilizing the exact same "navigation on the left, actions on the right" UI
    structure that is currently in use in the Android Action Bar and elsewhere within
    the Android OS UI design.


    Navigation drawer user interface design is such an in-depth topic that there is
    a chapter on it later in the book, once you get a few more foundational user interface
    layout principles under your belt. However, if you wish to take a closer look
    now, you can find some more in-depth information on it at the following Android
    Developer web site URL:


    [`http://developer.android.com/reference/android/support/v4/widget/DrawerLayout.html`](http://developer.android.com/reference/android/support/v4/widget/DrawerLayout.html)'
