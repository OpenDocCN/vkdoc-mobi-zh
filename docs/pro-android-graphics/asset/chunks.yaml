    ### 10-4. 绘制顶部水平拉伸区域：用单像素黑色线段定义活动 X 轴区域


    让我们点击右侧靠近边角的顶部单像素透明边框区域，如图 10-4 所示，然后向左拖动，绘制出定义 X 维度可拉伸区域的黑色线段。一旦你粗略绘制出所需形状，就可以利用该单像素线段两端微小的线条进行微调。将鼠标移至这些微小线条上，直到光标变为双向箭头；然后点击并拖动灰色区域，直到它与你
    NinePatchFrame 源图片资源中心的透明区域完美对齐。


    你也可以通过右键单击，或者在 Macintosh 电脑上按住 `Shift` 键并单击，来擦除之前绘制的线段。正如你在右侧预览区所看到的，目前仍无法获得理想的可视化结果。因此，我们继续下一步，定义左侧的单像素黑色边框。


    首先，让我们使用 Draw 9-patch 软件底部提供的更多彩色选项之一，以便更好地可视化你的设置。


    找到 `Show patches` 选项旁的空复选框，并勾选它以启用此功能。如图 10-5 所示，这将通过组合使用紫色和绿色为你的选定区域着色。这将清晰地显示出你图片资源中的哪些区域正在受到影响。


    ![A978-1-4302-5786-8_10_Fig5_HTML.jpg](img/A978-1-4302-5786-8_10_Fig5_HTML.jpg)


    **图 10-5.** 启用 `Show Patches` 复选框选项，并完成顶部单像素黑色线段的绘制


    你可以在图 10-5 中看到，编辑面板底部还有几个其他有用的控件。一个是 `Zoom` 滑块，它允许你调整编辑区域中源图形的缩放级别。另一个是 `Patch
    scale` 滑块，它允许你调整右侧预览区域中预览图像的缩放比例。`Show lock` 选项复选框允许你在鼠标悬停时查看图形中不可绘制的区域。


    你刚刚启用的 `Show patches` 选项复选框，允许你在左侧面板编辑区域实时预览你的可拉伸区块定义。粉红色代表区块中可拉伸的区域。


    `Show content` 选项复选框会在预览图像中高亮显示你的内容区域，紫色表示允许放置 View 内容的区域。


    最后，在编辑区域的顶部有一个 `Show bad patches` 按钮，它会在可能产生图形缩放伪像的区块区域周围添加红色边框。如果你力求在设计时消除所有不良区块，你的缩放图像将达到卓越的视觉效果。


    ### 10-6. 绘制左侧垂直拉伸区域：用单像素黑色线段定义活动 Y 轴区域


    现在，我们来绘制左侧的单像素边框，如图 10-6 所示。


    ![A978-1-4302-5786-8_10_Fig6_HTML.jpg](img/A978-1-4302-5786-8_10_Fig6_HTML.jpg)


    **图 10-6.** 绘制左侧垂直拉伸区域：用单像素黑色线段定义活动 Y 轴区域


    正如你在图 10-6 中所见，我并没有在左侧从上到下完整地绘制一条单像素黑色边框线。我这样做是为了让你能直观地了解 `Show patches` 选项的强大功能。该选项能让你精确到像素级别地看到你所做的操作；如果你想定义完美的
    9-patch 图片资源，这种精确性是绝对必要的。


    ### 10-7. 水平和垂直拉伸区域的单像素黑色线段现已定义好活动轴区域


    图 10-7 显示了已定义好顶部和左侧单像素黑色边框线的 9-patch 图片资源；如你所见，得益于 `Show patches` 选项，你现在已经以手术般的精确度定义了你的固定区域和可拉伸区域。


    另外请注意，在图 10-7 中软件工具的右侧预览区域，你的 9-patch 图片资源定义结果呈现出非常专业的缩放效果。


    如果你拖动屏幕右侧的滚动条，上下拉动，你会看到 9-patch 图片在纵向和横向容器中都能完美缩放，视觉效果出色。


    既然已经定义了 9-patch 图片资源的可拉伸区域，那么接下来就是使用编辑面板右侧和底部的单像素黑色边框线，来定义 9-patch 图片资源的内边距区域。


    ![A978-1-4302-5786-8_10_Fig7_HTML.jpg](img/A978-1-4302-5786-8_10_Fig7_HTML.jpg)


    **图 10-7.** 水平和垂直拉伸区域的单像素黑色线段现已定义好活动轴区域


    ### 10-8. 使用右侧和底部的单像素黑色线段定义内边距区域


    如图 10-8 所示，我已经在右侧绘制了定义 9-patch 图片资源中心（内边距）区域 Y 轴图像尺寸所需的单像素黑色边框线段。同样注意，在图 10-8
    中，我正着手绘制第二条底部的单像素黑色边框线段，以定义 9-patch 图片资源中心（内边距）区域的 X 轴尺寸。


    请注意用于区分可拉伸区域和内边距区域定义的不同图层所使用的柔和色彩。你的内边距定义在绿色或紫色（如果你喜欢，也可以是粉红色）的可拉伸区域定义之上叠加了一层灰色调，可拉伸区域的颜色更鲜艳，这大概是因为可拉伸区域的定义比内边距区域更为重要。


    此外，请注意在右侧的 9-patch 结果预览区域中，无论图像的朝向如何，也无论 9-patch 图片资源被缩放至何种尺寸，其缩放结果都呈现出极其专业的效果。


    ![A978-1-4302-5786-8_10_Fig8_HTML.jpg](img/A978-1-4302-5786-8_10_Fig8_HTML.jpg)


    **图 10-8.** 使用右侧和底部的单像素黑色线段定义内边距区域


    ### 10-9. 通过右侧单像素黑色线段调整内边距区域以显示拉伸区域调整指引


    最后，注意在图 10-9 中，我正向上拉动右侧的单像素黑色边框线段，以显示拉伸区域调整指引，并展示边框如何允许你精确调整 9-patch 的内边距参数。


    ![A978-1-4302-5786-8_10_Fig9_HTML.jpg](img/A978-1-4302-5786-8_10_Fig9_HTML.jpg)


    **图 10-9.** 通过右侧单像素黑色线段调整内边距区域以显示拉伸区域调整指引


    ### 10-10. 最终定义的拉伸区域和内边距区域，并通过鼠标悬停中心区域获取拉伸区域坐标


    图 10-10 展示了完成后的 9-patch 图片资源定义，其中包含了用于缩放的边框线段集合和用于内边距的边框线段集合。


    ![A978-1-4302-5786-8_10_Fig10_HTML.jpg](img/A978-1-4302-5786-8_10_Fig10_HTML.jpg)


    **图 10-10.** 最终定义的拉伸区域和内边距区域，并通过鼠标悬停中心区域获取拉伸区域坐标


    需要注意的是，如果你将鼠标放在左侧可编辑面板中，悬停在 9-patch 定义的中心区域上方，就会弹出工具提示，为你最终完成的 9-patch 定义提供精确的像素级拉伸区域坐标。


    就我的情况而言，这显示我使用了总尺寸为 280 像素的图片中的 256 像素减去 26 像素，即 230 像素，作为我的中心可拉伸区域。这意味着我使用了 25
    像素（即剩余 50 像素的一半）来作为实际的图片资源（横条和螺丝）以进行缩放。这同样意味着这个 9-patch 的固定区域（本例中是一个框架的角落，上面有一个标准螺丝将其牢固固定，至少看起来是这样）每个尺寸将是
    25 像素见方。

    '
- fmt: 'This is enough pixels, two dozen or more, to be able to scale up if necessary
    and to be able to have detail to appear photo-real if scaled down, or used at
    higher pixel densities, where it will look smaller.


    As you can see in Figure [10-10](#A978-1-4302-5786-8_10_Chapter.html#Fig10) and
    Figure [10-11](#A978-1-4302-5786-8_10_Chapter.html#Fig11), on the right-hand side
    of the Draw 9-patch application preview pane, the scaling graphic looks crisp
    and realistic. If you scroll the preview pane, this holds across previews.


    Now it is time to save the 9-patch image asset using the File menu and the File
    ➤ Save 9-patch menuing sequence, which is shown in Figure [10-11](#A978-1-4302-5786-8_10_Chapter.html#Fig11).


    ![A978-1-4302-5786-8_10_Fig11_HTML.jpg](A978-1-4302-5786-8_10_Fig11_HTML.jpg)


    **Figure 10-11.** Final patch definition, and using the File menu and Save 9-patch
    menu options to save a 9-patch


    Your Draw 9-patch software tool File Save dialog, which is shown in Figure [10-12](#A978-1-4302-5786-8_10_Chapter.html#Fig12),
    will automatically save your 9-patch image assets with the required `.9.png` file
    name extension required by the Android OS.


    When Android sees this type of PNG file name in your `/res/drawable` folder, it
    automatically sets it up using the `NinePatch` class to load it, and also makes
    it into a `NinePatchDrawable` image asset once it’s referenced in XML.


    It is important to note here, since there is also the Open 9-patch menu option
    in the screen shot, that opening a normal (non-9-patched) PNG file (`*.png`) will
    load your PNG asset and add an empty one-pixel border around the image, into which
    you can draw your scalable patches and content area.


    If you use this menu command to open up previously saved 9-patch PNG files (`*.9.png`),
    your 9-patch PNG asset will be loaded in as previously modified, with no one-pixel
    border drawing areas added, because that one-pixel patch definition area already
    exists within your file due to a previous editing session.


    One final caveat for the Save dialog is that it will not show this `.9.png` extension
    in the dialog itself, but will insert it on your hard disk drive when it saves
    your file out as a new 9-patch image asset. This can be somewhat confusing the
    first time that you use this software utility, as the file it says in the Save
    dialog that it’s going to save a `NinePatchFrame.png` but what it actually saves
    out is `NinePatchFrame.9.png`.


    ![A978-1-4302-5786-8_10_Fig12_HTML.jpg](A978-1-4302-5786-8_10_Fig12_HTML.jpg)


    **Figure 10-12.** Exporting the `NinePatchFrame.9.png` file using the Save dialog


    Make sure to keep this caveat in mind when you go to save out your file, so that
    you don’t get a `NinePatchFrame.9.9.png` file. Even if you do, the next step in
    the work process will be to go into your OS file management utility to see your
    original file and the new 9-patch version, and see how much data footprint “weight”
    the 9-patch definition added to the file.


    Launch your OS file management utility from your Taskbar; for Windows 8 it happens
    to be the Windows Explorer file utility, as shown in Figure [10-13](#A978-1-4302-5786-8_10_Chapter.html#Fig13).
    As you can see, in my `/PAGD/NinePatch` folder there’s an original Photoshop file
    with the 280 pixel image asset source composite; a `NinePatchFrame.png` PNG32
    image asset with alpha channel, ready for import into Draw 9-patch; and a `NinePatchFrame.9`
    PNG32 file generated by the Draw 9-patch tool.


    ![A978-1-4302-5786-8_10_Fig13_HTML.jpg](A978-1-4302-5786-8_10_Fig13_HTML.jpg)


    **Figure 10-13.** Checking the NinePatch folder to see the original NinePatchFrame
    and the new `NinePatchFrame.9.png`


    Let’s find out how much data was added to the `.9.png` file, because, as the screen
    shot says, the 9-patch definition process added one full KB to my PNG file size,
    but this assessment is not accurate enough for me.


    To find out your exact file size delta, or difference, between these two files,
    right-click each of these two PNG file assets, and use the properties option.
    This will allow you to see the actual file size data footprint for each file.


    The original PNG is 19.7KB and the new PNG is 20.2KB. This means that the 9-patch
    definition added .5KB to this 280 pixel square image asset, or about 2.5% more
    data. Not bad for adding such a flexible image asset scaling capability right
    into the PNG digital image asset itself.


    Now that you have created a usable 9-patch image asset, let’s go into your XML
    assets and implement it in a couple of places to see how well it works within
    the context of your GraphicsDesign Android application.'
