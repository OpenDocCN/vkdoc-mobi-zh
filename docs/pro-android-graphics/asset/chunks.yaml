  raw: '## A View’s Functional Characteristics: Listeners and Focus


    Once you have designed the collection of View UI widgets using your layout container
    in an XML file containing XML tag markup, they will still need to be inflated
    and “wired up” to the operating system and device hardware.


    This is accomplished inside your Java code by “trapping” your end user interaction
    with your user interface elements via Android OS input events.


    Android input events are triggered by your end users as they interface with your
    application by using their Android device hardware navigation features, such as
    keypads, navigation keys, trackballs, and touchscreens.


    Trapping these input events will allow your UI design to become functional and
    respond to user interaction. Trapping operating system input events can be accomplished
    by using Android event listeners in your Java code.


    The Android `EventListener` superclass is a part of the `android.util` package;
    if you want to research the core superclass, you can find more information on
    the Android Developer web site at the following URL:


    [`http://developer.android.com/reference/java/util/EventListener.html`](http://developer.android.com/reference/java/util/EventListener.html)


    Event listeners are methods that you can attach to your View objects after you
    import, instantiate, and inflate them from the XML definition using the `findViewById(
    )` method.


    Once the Java code setting up the View object is in place, you can attach an event
    listener method to that object, which will perform event handling for the View
    object, which in most cases is one of the UI design elements.


    There are a half-dozen event handling methods that are used the most often in
    Android, including `.onClick( )`, `.onLongClick( )`, `.onTouch( )`, `.onKeyUp(
    )`, `.onKeyDown( )`, `.onCreateContextMenu( )`, and `.onFocusChange( )`. If you
    want to research Android OS input events in more detail, visit the following URL:


    [`http://developer.android.com/guide/topics/ui/ui-events.html`](http://developer.android.com/guide/topics/ui/ui-events.html)


    The last event handler I mentioned was the `.onFocusChange( )` method, which tracks
    a change in user focus. This brings up another concept called focus, which is
    used to ascertain which of the UI widgets in the layout container your user is
    using or focusing on (interfacing with or using) currently.


    The Android OS will handle determining which of the parent ViewGroup child View
    objects currently has the focus of your application end user. This is accomplished
    by tracking input events that can tell Android which UI widget the user is touching
    (using) currently, as well as how the user may be progressing from one UI element
    to the next.


    You can also force your application to set its focus to any UI View object (user
    interface element) at any time. To do this, you would call the View’s `.requestFocus(
    )` method, which would then highlight the UI element for use.


    Additionally, all View objects will let you set the .onFocusChange( ) event listener
    so that your application logic, if it needs to, can be notified and take appropriate
    action when the View object that it is attached to gains or loses the user’s focus.


    We will be looking at input events, event listeners, event handling, and focus
    in detail throughout this book as they are all fundamental to your application
    development, user interface, and user experience optimization.


    Next, let’s implement the Bookmarking Utility Activity subclass and also create
    your new RelativeLayout container so you can get some practice with that layout
    container type. You’ll get this new Activity working with your Options menu, add
    it to your AndroidManifest.xml configuration file, and add a `TextView` widget
    as well. Later, you’ll add other types of UI widgets (View subclasses) to this
    new Bookmarking Utility Activity as well.


    ## Bookmark Utility UI: Using a RelativeLayout and TextView


    Next, you are going to create your Bookmarking Utility and in the process learn
    about RelativeLayout container parameters and the `TextView` UI widget because
    these are the most commonly used classes in all of Android.


    After you accomplish that, you can then move on to more advanced widgets and layout
    containers, but first I need to make sure all of my readers have this proper basic
    graphics design foundation and that I have covered the more basic ViewGroup and
    View subclasses.


    Some of you might be wondering: What does text have to do with graphics design?
    If you take a close look at Photoshop or GIMP, you will find extensive text creation
    and alignment tools in these packages. The TextView class in Android provides
    nearly a hundred parameters that allow developers to simulate this type of design
    power and flexibility in their Android application development work process, which
    is fantastic.


    You need to finish implementing your second MainActivity class options menu item,
    the Bookmark Utility, by creating a new `BookmarkActivity.java` class and an `activity_bookmark.xml`
    layout definition to hold your RelativeLayout container. You’ll do that quickly
    over the next page or two so that you have the foundation to not only learn about
    the important TextView widget but also about the even more important ImageView
    widget that will hold your graphic imagery.


    So fire up Eclipse if it’s not open already, and enter your GraphicsDesign project,
    and right-click the GraphicsDesign folder, and use the familiar New ➤ Java Class
    menu sequence to bring up the New Java Class dialog shown in Figure [7-1](#A978-1-4302-5786-8_7_Chapter.html#Fig1).
    Specify your `pro.android.graphics` package and the BookmarkActivity name for
    the new Activity subclass, and then select the `android.app.Activity` for your
    superclass, and then click the Finish button when you are done configuring to
    show the empty class, which should look Figure 6-8 from the previous chapter.


    ![A978-1-4302-5786-8_7_Fig1_HTML.jpg](A978-1-4302-5786-8_7_Fig1_HTML.jpg)


    Figure 7-1.


    Creating your new BookmarkActivity Java Class


    Next, you need to add an onCreate( ) method to your BookmarkActivity that will
    call the `super.onCreate(savedInstanceState)` superclass’s onCreate( ) method
    and use the `setContentView(R.layout.activity_bookmark)` method to reference the
    `activity_bookmark.xml` file that you are about to create. A quick way to accomplish
    this is to copy this block of code from your `MainActivity.java` file and then
    change the R.layout reference, as shown in Figure [7-2](#A978-1-4302-5786-8_7_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_7_Fig2_HTML.jpg](A978-1-4302-5786-8_7_Fig2_HTML.jpg)


    Figure 7-2.


    Entering your onCreate( ) method Java code and setting the ContentView to your
    activity_bookmark.xml


    Since you have the red wavy line error highlighting in your BookmarkActivity class,
    let’s create your `activity_bookmark.xml` file next to get rid of it and to create
    the RelativeLayout container for the markup you will be creating in the rest of
    this chapter.


    Right-click your GraphicsDesign project folder, and this time use the New ➤ Android
    XML File menu sequence to bring up the New Android XML File dialog, shown in Figure
    [7-3](#A978-1-4302-5786-8_7_Chapter.html#Fig3). Select the Layout resource type
    and name the file `activity_bookmark` to mirror the BookmarkActivity class name,
    and then select a Root Element parent tag of type RelativeLayout in the center
    selection area of the dialog. Click the Finish button when you have set all the
    file creation parameters.


    ![A978-1-4302-5786-8_7_Fig3_HTML.jpg](A978-1-4302-5786-8_7_Fig3_HTML.jpg)


    Figure 7-3.


    Creating a New RelativeLayout XML File


    For now, you are going to leave this new RelativeLayout container empty, and you’ll
    finish implementing the new BookmarkActivity class and MainActivity options menu
    so that everything will work in the Nexus One emulator.'
  trans: '

    ## 视图的功能特性：监听器与焦点


    使用包含 XML 标签标记的布局容器设计好 View UI 组件集合后，这些组件仍需进行实例化并与操作系统和设备硬件“连接”。


    这一过程在 Java 代码中通过 Android 操作系统输入事件来“捕获”终端用户与用户界面元素的交互来实现。


    当终端用户通过操作 Android 设备硬件导航功能（如键盘、导航键、轨迹球和触摸屏）与应用程序交互时，会触发 Android 输入事件。


    捕获这些输入事件将使您的 UI 设计具备功能性，并能响应用户交互。捕获操作系统输入事件可通过在 Java 代码中使用 Android 事件监听器来实现。


    Android `EventListener` 超类是 `android.util` 包的一部分；如果您想研究核心超类，可访问以下网址在 Android 开发者网站上获取更多信息：


    [`http://developer.android.com/reference/java/util/EventListener.html`](http://developer.android.com/reference/java/util/EventListener.html)


    事件监听器是您可以附加到 View 对象上的方法，先通过 `findViewById()` 方法从 XML 定义中导入、实例化并实例化这些对象后，再进行附加。


    一旦设置好 View 对象的 Java 代码就位，您就可以将事件监听器方法附加到该对象上，该方法将为 View 对象执行事件处理，在大多数情况下，该对象就是
    UI 设计元素之一。


    Android 中最常用的事件处理方法有六种，包括 `.onClick()`、`.onLongClick()`、`.onTouch()`、`.onKeyUp()`、`.onKeyDown()`、`.onCreateContextMenu()`
    和 `.onFocusChange()`。如果您想更详细地研究 Android 操作系统输入事件，请访问以下网址：


    [`http://developer.android.com/guide/topics/ui/ui-events.html`](http://developer.android.com/guide/topics/ui/ui-events.html)


    我提到的最后一个事件处理方法是 `.onFocusChange()` 方法，它用于追踪用户焦点的变化。这引出了另一个概念：焦点，它用于确定用户在布局容器中正在使用或聚焦于（即当前正在交互或使用的）哪一个
    UI 组件。


    Android 操作系统会负责确定哪个父 `ViewGroup` 的子 `View` 对象当前拥有应用程序终端用户的焦点。这是通过追踪输入事件来实现的，这些事件可以告知
    Android 用户当前正在触摸（使用）哪个 UI 组件，以及用户如何从一个 UI 元素导航到下一个 UI 元素。


    您也可以在任意时刻强制应用程序将其焦点设置到任何 UI `View` 对象（用户界面元素）上。要做到这一点，您可以调用 View 的 `.requestFocus()`
    方法，该方法会高亮显示该 UI 元素以供使用。


    此外，所有 `View` 对象都允许您设置 `.onFocusChange()` 事件监听器，以便在附加该监听器的 `View` 对象获得或失去用户焦点时，应用程序逻辑（如果需要）可以收到通知并采取相应措施。


    本书将详细探讨输入事件、事件监听器、事件处理和焦点，因为它们对于您的应用程序开发、用户界面和用户体验优化都至关重要。


    接下来，让我们实现书签工具 Activity 子类，并创建您的全新 `RelativeLayout` 容器，以便您在实践操作中熟悉这种布局容器类型。您将让这个新的
    Activity 与您的选项菜单协同工作，将其添加到您的 `AndroidManifest.xml` 配置文件中，并同时添加一个 `TextView` 组件。稍后，您还将向这个新的书签工具
    Activity 中添加其他类型的 UI 组件（View 子类）。


    ## 书签工具 UI：使用 RelativeLayout 和 TextView


    接下来，您将创建书签工具，并在此过程中学习 `RelativeLayout` 容器参数和 `TextView` UI 组件，因为它们是在整个 Android
    中最常用的类。


    完成这部分内容后，您可以继续学习更高级的组件和布局容器，但首先，我必须确保所有读者都掌握了这些正确的基础图形设计知识，并且我已经介绍了更基础的 `ViewGroup`
    和 `View` 子类。


    你们中的一些人可能会想：文本跟图形设计有什么关系？仔细看看 Photoshop 或 GIMP，你会发现这些软件中包含了大量的文本创建和对齐工具。Android
    中的 `TextView` 类提供了近一百个参数，使开发者能够在 Android 应用程序开发工作流程中模拟这种类型的设计能力和灵活性，这非常棒。


    您需要完成实现第二个 `MainActivity` 类选项菜单项——书签工具，方法是创建一个新的 `BookmarkActivity.java` 类和一个
    `activity_bookmark.xml` 布局定义来容纳您的 `RelativeLayout` 容器。我们将在接下来的几页中快速完成这些操作，以便为您打下基础，不仅学习重要的
    `TextView` 组件，还要学习更为重要的 `ImageView` 组件，它将用于容纳您的图形图像。


    因此，如果 Eclipse 尚未打开，请启动它，进入您的 `GraphicsDesign` 项目，右键点击 `GraphicsDesign` 文件夹，并使用熟悉的
    **New ➤ Java Class** 菜单序列，调出如图 7-1 所示的 New Java Class 对话框。指定您的 `pro.android.graphics`
    包，为新 Activity 子类指定名称 `BookmarkActivity`，然后选择 `android.app.Activity` 作为其超类，完成配置后点击
    **Finish** 按钮，显示空白类，它应该看起来像前一章的图 6-8。


    ![A978-1-4302-5786-8_7_Fig1_HTML.jpg](img/A978-1-4302-5786-8_7_Fig1_HTML.jpg)


    图 7-1. 创建您的全新 BookmarkActivity Java 类


    接下来，您需要向 `BookmarkActivity` 添加一个 `onCreate()` 方法，该方法将调用超类的 `onCreate()` 方法 `super.onCreate(savedInstanceState)`，并使用
    `setContentView(R.layout.activity_bookmark)` 方法来引用您即将创建的 `activity_bookmark.xml`
    文件。实现此目的的一个快速方法是从您的 `MainActivity.java` 文件中复制此代码块，然后更改 `R.layout` 引用，如图 7-2 所示。


    ![A978-1-4302-5786-8_7_Fig2_HTML.jpg](img/A978-1-4302-5786-8_7_Fig2_HTML.jpg)


    图 7-2. 输入您的 `onCreate()` 方法 Java 代码，并将 `ContentView` 设置为您的 `activity_bookmark.xml`


    由于您的 `BookmarkActivity` 类中存在红色波浪线错误提示，让我们接下来创建您的 `activity_bookmark.xml` 文件，以消除该错误，并为将在本章其余部分创建的标记创建
    `RelativeLayout` 容器。


    右键点击您的 `GraphicsDesign` 项目文件夹，这次使用 **New ➤ Android XML File** 菜单序列，调出如图 7-3 所示的
    New Android XML File 对话框。选择 **Layout** 资源类型，将文件命名为 `activity_bookmark` 以与 `BookmarkActivity`
    类名镜像，然后在对话框中间的选区中选择一个类型为 `RelativeLayout` 的 Root Element 父标签。设置完所有文件创建参数后，点击 **Finish**
    按钮。


    ![A978-1-4302-5786-8_7_Fig3_HTML.jpg](img/A978-1-4302-5786-8_7_Fig3_HTML.jpg)


    图 7-3. 创建一个新的 RelativeLayout XML 文件


    现在，您将暂时保持这个新的 `RelativeLayout` 容器为空，然后完成实现新的 `BookmarkActivity` 类和 `MainActivity`
    选项菜单，以便所有功能都能在 Nexus One 模拟器中正常运行。

