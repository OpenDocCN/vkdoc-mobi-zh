    无论您在此图像及其新阴影效果下方放置什么内容，都将产生逼真的照片级阴影效果。完成以上操作后，接下来您需要在 Eclipse 中创建不同密度的目标图像、保存主文件以及其他类似的例行工作来进行测试。


    使用图 7-29 所示的 GIMP 文件导出对话框，将此文件导出到您的 `/workspace/GraphicsDesign/res/drawable-xhdpi`
    文件夹。将文件命名为 `bookmarks0.png`（用于书签阴影），以便保留两个图像版本。在子对话框中，使用“保存透明像素的颜色值”选项，如屏幕截图的右侧所示。


    务必注意，如果您让白色背景图层保持可见（眼睛图标处于打开状态），则导出的文件将在结果图像中显示白色背景。因此，在执行导出之前，请确保图像看起来与图 7-27
    所示一致！


    ![A978-1-4302-5786-8_7_Fig29_HTML.jpg](img/A978-1-4302-5786-8_7_Fig29_HTML.jpg)


    图 7-29.


    将图像以 `bookmarks0.png` 导出至您的 `/workspace/GraphicsDesign/res/drawable-xhdpi` 文件夹


    导出 XHDPI PNG32 资源后，使用图 7-30 中所示的 GIMP 缩放图像对话框，将图像数据调整到其他分辨率密度，以便为此新图像获取 HDPI、MDPI
    和 LDPI 图像资源。我们先进行 2 倍降采样，因此在使用链式图标锁定图像大小 x 和 y 值后，在“宽度”字段中输入 336。336 是 672 的一半，因此可以实现均匀的
    100% 尺寸缩减。


    ![A978-1-4302-5786-8_7_Fig30_HTML.jpg](img/A978-1-4302-5786-8_7_Fig30_HTML.jpg)


    图 7-30.


    将图像缩小以创建 336 像素的 MDPI 资源


    您将使用高质量的三次插值器来执行这些图像缩放操作。将文件以文件名 `bookmarks0.png` 导出到 `/res/drawable-mdpi/` 文件夹后，使用“编辑”菜单和“撤销”功能返回到原始（最高）分辨率
    XHDPI 图像资源，如图 7-31 所示。此外，在调用“撤销缩放图像”选项之后，最好使用 GIMP 的“文件”➤“另存为”操作，将包含图层、通道等内容的
    GIMP 原生 `.XCF` 文件保存在您的图像工作目录中。如您所见，对于本书，我的目录是 `/PAGD/CH07`。


    ![A978-1-4302-5786-8_7_Fig31_HTML.jpg](img/A978-1-4302-5786-8_7_Fig31_HTML.jpg)


    图 7-31.


    撤销 2 倍降采样，保存原始尺寸，并将图像缩放到 HDPI 和 LDPI 目标分辨率


    现在您需要输出 HDPI 资源。要计算尺寸，请将 672 像素的图像大小除以其 320 DPI，得到缩放因子 2.1。将 240 DPI 的 HDPI 密度乘以
    2.1，得到 504 像素，因此接下来使用“缩放图像”选项将 672 像素的图像调整为 504 像素，并使用相同的 `bookmarks0.png` 文件名将其导出到
    HDPI 文件夹。


    然后，再次撤销缩放图像操作，将 120 DPI 的 LDPI 密度乘以 2.1，得到 252 像素，或者取 240 DPI、504 像素的一半，也能得到相同数值。对这个
    252 像素的数字图像资源执行相同的“缩放图像”和“导出”操作，您就拥有了所有四个分辨率密度的目标资源。


    如果您已经在硬盘上将文件保存为原生 XCF 格式，请在退出 GIMP 时对弹出的保存对话框选择“否”，否则您将把较低分辨率的图像版本保存到该文件名（容器）中，从而丢失原始的更高分辨率格式。


    现在，您可以返回 Eclipse，对 XML 文件进行必要的更改以实现新的投影效果图像版本，并学习如何在您的 `RelativeLayout` 容器中设置背景色或背景图像，以便让
    Android 为您执行一些图像合成操作。您现在可以开始利用在最初几章中学到的基础知识了。


    ## 更改 ImageView 的 XML 以加入新资源


    如果 Eclipse ADT 包尚未运行，请启动它，进入 `activity_bookmark.xml` 编辑选项卡，编辑您的 `android:src`
    参数，如图 7-32 所示，使其引用您刚刚创建的新 `bookmarks0.png` 图像。


    要查看 `RelativeLayout` 在白色背景（默认）颜色下的阴影效果，您可以使用编辑屏幕底部的“图形布局”选项卡，或者使用“运行方式”➤“Android
    应用程序”工作流程，在 Nexus One 模拟器中查看效果。


    要在此新图像中显示部分 Alpha 通道的渗透效果，您需要在父级 `RelativeLayout` 容器标签中添加一个 `android:background`
    参数。首先，您将使用柔和橙色颜色值 `#EECCAA`，确保您的颜色阴影呈现灰橙色，稍后再添加一张图像，确保该图像数据也能与您的阴影 Alpha 值混合。新的父标签参数如图
    7-32 所示。


    ![A978-1-4302-5786-8_7_Fig32_HTML.jpg](img/A978-1-4302-5786-8_7_Fig32_HTML.jpg)


    图 7-32.


    更改 `android:src` 图像引用名称并在父标签中添加 `android:background` 参数


    接下来，使用“运行方式”➤“Android 应用程序”工作流程在 Nexus One 模拟器中预览新的 UI 设计。现在您已经知道如何操作了，可以在竖屏和横屏模式下查看效果，看看它有多酷。效果看起来非常棒（见图
    7-33）。


    如果您希望使 TextView 的阴影与 ImageView 的阴影匹配，可以调整 `android:shadow` 参数及其值，使阴影更相似（稍微增加偏移量以及
    `Dx` 和 `Dy` 值）。您可以在添加背景图像后执行此操作，以进一步测试您的 Alpha 通道。


    ![A978-1-4302-5786-8_7_Fig33_HTML.jpg](img/A978-1-4302-5786-8_7_Fig33_HTML.jpg)


    图 7-33.


    使用背景颜色测试阴影 Alpha 通道


    现在您已经知道您的 Alpha 通道可以与纯色配合使用，在下一节中，您将把一张美丽的日落 JPEG 图像复制到 XHDPI 文件夹中，看看您的投影效果是否也能与照片图像配合良好。

