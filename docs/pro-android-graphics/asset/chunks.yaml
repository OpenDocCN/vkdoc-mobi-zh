- fmt: "# Android’s Display Class: Physical Display Characteristics\n\nAndroid has\
    \ a class called the `Display` class, which allows you to access a display’s characteristics\
    \ in real time from within your application code. There are several related classes\
    \ that we will cover in this part of the chapter as well, including the `DisplayManager`\
    \ class, the `DisplayMetrics` class, the `Surface` class, and the `WindowManager`\
    \ class and nested classes.\n\nThis Android `Display` class is a direct subclass\
    \ of the `java.lang.Object` master class, so it was created specifically to give\
    \ display information. The Android `Display` class hierarchy is structured as\
    \ follows:\n\n```\njava.lang.Object\n  > android.view.Display\n```\n\nThe `Display`\
    \ class belongs in the `android.view` package because any `View` in Android could\
    \ essentially be considered a “child” of the hardware display. The import statement\
    \ for using the `Display` class (or object) in your apps should reference the\
    \ `android.view.Display` package, as you’ll soon see.\n\nThis `Display` class\
    \ is a public final class and is used to provide various information regarding\
    \ the pixel size, pixel density, rotation (portrait or landscape orientation),\
    \ and refresh rate of the display being used by your app. There are two types\
    \ of display area terms for an Android application. The larger area is called\
    \ the real display area, and inside it is the application display area.\n\nThe\
    \ real display area data will come the closest to specifying your user’s physical\
    \ hardware specifications. This data includes information regarding the part of\
    \ the current display that contains content which include system decorations,\
    \ some of which are outside of the control of your application.\n\nIt is important\
    \ to note that the real display area may be smaller than the physical (hardware)\
    \ specifications for a display, if Android `WindowManager` is emulating a smaller\
    \ display area for any given reason. If you need this top-level real display area,\
    \ you can utilize a `.getRealSize()` method call, as well as a `.getRealMetrics()`\
    \ method call to get other `DisplayMetrics`. We will cover the Android `WindowManager`\
    \ and `DisplayMetrics` classes very soon.\n\nThe application display area, on\
    \ the other hand, will specify the portion of a display that contains your application’s\
    \ “window,” excluding any system decoration screen real estate. The application\
    \ display area will be smaller than the real display area because Android will\
    \ subtract any space necessary for system UI elements, such as the Android OS\
    \ status bar.\n\nThe method calls most often used by developers to find their\
    \ application’s display characteristics include `.getSize()`, `.getRotation()`,\
    \ `.getRectSize()`, and `.getMetrics()` method calls. You’ll use the `.getRotation()`\
    \ method call in your code to find out if your user is viewing their device in\
    \ a portrait or landscape orientation, so that you know what video to stream!\n\
    \n## The Android DisplayManager Class: Managing the Display\n\nAndroid also has\
    \ a class called the `DisplayManager` class, which allows you to manage all of\
    \ the displays, including any second (external) or presentation displays that\
    \ may be attached to your user’s Android devices.\n\nAndroid’s `DisplayManager`\
    \ is another direct subclass of `java.lang.Object`, the master class, so it was\
    \ also created specifically to provide display hardware management features to\
    \ developers for the Android OS. The Android Display class hierarchy is structured\
    \ as follows:\n\n```\njava.lang.Object\n  > android.hardware.display.DisplayManager\n\
    ```\n\nThe `Display` class belongs in the `android.hardware.display` package because\
    \ it provides access to management of the Android device display hardware. A bridge\
    \ between the display hardware and the operating system software is necessary\
    \ due to the vast differences between screen sizes, pixel density, screen orientations,\
    \ refresh rates, and similar display hardware specifics that need to be quantified\
    \ and incorporated into your interactive graphics design programming logic pipelines.\n\
    \nThe import statement for using the `DisplayManager` class (or object) in the\
    \ app should reference the `android.hardware.display.DisplayManager` package.\n\
    \nThe `DisplayManager` class is a public final class and is used to manage the\
    \ properties of the primary Android device display as well as any externally attached\
    \ displays that might also be in use with the Android device.\n\nIf you are familiar\
    \ with the term “second screen” or technologies such as MiraCast or similar “shoot\
    \ your content up onto the local big screen” iTV type of technologies, this Android\
    \ class was created to allow these technologies to work with your applications.\n\
    \nThe `DisplayManager` has one nested class, a `DisplayManager.DisplayListener`\
    \ public interface, that allows your application to “listen” for changes in the\
    \ display hardware configuration, such as when an external presentation display\
    \ is attached to an Android device or is accessed wirelessly.\n\nThe `DisplayManager`\
    \ also has one constant, a `DISPLAY_CATEGORY_PRESENTATION` constant, that is meant\
    \ to be used to identify a secondary display that is deemed suitable for use as\
    \ a presentation display. To implement this class, you need to get an instance\
    \ of this object by calling the `.getSystemService()` method, using a parameter\
    \ that references a `DISPLAY_SERVICE` constant called off of a `Context` object\
    \ using the `WindowManager` class, which we will be covering next.\n\nThe Java\
    \ code that you will be implementing in your app a bit later on will use `WindowManager`,\
    \ a `Display` object, `Context` object, and the `DisplayManager` class’s `.getSystemService()`\
    \ method to obtain your user’s display rotation."
  raw: '## Android’s Display Class: Physical Display Characteristics


    Android has a class called the Display class, which allows you to access a display’s
    characteristics in real time from within your application code. There are several
    related classes that we will cover in this part of the chapter as well, including
    the DisplayManager class, the DisplayMetrics class, the Surface class, and the
    WindowManager class and nested classes.


    This Android Display class is a direct subclass of the java.lang.Object master
    class, so it was created specifically to give display information. The Android
    Display class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.Display`


    The Display class belongs in the android.view package because any View in Android
    could essentially be considered a “child” of the hardware display. The import
    statement for using the Display class (or object) in your apps should reference
    the android.view.Display package, as you’ll soon see.


    This Display class is a public final class and is used to provide various information
    regarding the pixel size, pixel density, rotation (portrait or landscape orientation),
    and refresh rate of the display being used by your app. There are two types of
    display area terms for an Android application. The larger area is called the real
    display area, and inside it is the application display area.


    The real display area data will come the closest to specifying your user’s physical
    hardware specifications. This data includes information regarding the part of
    the current display that contains content which include system decorations, some
    of which are outside of the control of your application.


    It is important to note that the real display area may be smaller than the physical
    (hardware) specifications for a display, if Android WindowManager is emulating
    a smaller display area for any given reason. If you need this top-level real display
    area, you can utilize a .getRealSize() method call, as well as a .getRealMetrics()
    method call to get other DisplayMetrics. We will cover the Android WindowManager
    and DisplayMetrics classes very soon.


    The application display area, on the other hand, will specify the portion of a
    display that contains your application’s “window,” excluding any system decoration
    screen real estate. The application display area will be smaller than the real
    display area because Android will subtract any space necessary for system UI elements,
    such as the Android OS status bar.


    The method calls most often used by developers to find their application’s display
    characteristics include .getSize(), .getRotation(), .getRectSize(), and .getMetrics()
    method calls. You’ll use the .getRotation() method call in your code to find out
    if your user is viewing their device in a portrait or landscape orientation, so
    that you know what video to stream!


    ## The Android DisplayManager Class: Managing the Display


    Android also has a class called the DisplayManager class, which allows you to
    manage all of the displays, including any second (external) or presentation displays
    that may be attached to your user’s Android devices.


    Android’s DisplayManager is another direct subclass of java.lang.Object, the master
    class, so it was also created specifically to provide display hardware management
    features to developers for the Android OS. The Android Display class hierarchy
    is structured as follows:


    `java.lang.Object`


      `> android.hardware.display.DisplayManager`


    The Display class belongs in the android.hardware.display package because it provides
    access to management of the Android device display hardware. A bridge between
    the display hardware and the operating system software is necessary due to the
    vast differences between screen sizes, pixel density, screen orientations, refresh
    rates, and similar display hardware specifics that need to be quantified and incorporated
    into your interactive graphics design programming logic pipelines.


    The import statement for using the DisplayManager class (or object) in the app
    should reference the android.hardware.display.DisplayManager package.


    The DisplayManager class is a public final class and is used to manage the properties
    of the primary Android device display as well as any externally attached displays
    that might also be in use with the Android device.


    If you are familiar with the term “second screen” or technologies such as MiraCast
    or similar “shoot your content up onto the local big screen” iTV type of technologies,
    this Android class was created to allow these technologies to work with your applications.


    The DisplayManager has one nested class, a DisplayManager.DisplayListener public
    interface, that allows your application to “listen” for changes in the display
    hardware configuration, such as when an external presentation display is attached
    to an Android device or is accessed wirelessly.


    The DisplayManager also has one constant, a DISPLAY_CATEGORY_PRESENTATION constant,
    that is meant to be used to identify a secondary display that is deemed suitable
    for use as a presentation display. To implement this class, you need to get an
    instance of this object by calling the .getSystemService() method, using a parameter
    that references a DISPLAY_SERVICE constant called off of a Context object using
    the WindowManager class, which we will be covering next.


    The Java code that you will be implementing in your app a bit later on will use
    WindowManager, a Display object, Context object, and the DisplayManager class’s
    .getSystemService() method to obtain your user’s display rotation.'
  trans: "\n# Android 显示类：物理显示特性\n\nAndroid 有一个名为 `Display` 的类，它允许你在应用程序代码中实时访问显示器的特性。本章节还将介绍几个相关的类，包括\
    \ `DisplayManager` 类、`DisplayMetrics` 类、`Surface` 类以及 `WindowManager` 类及其嵌套类。\n\
    \nAndroid 的 `Display` 类是主类 `java.lang.Object` 的直接子类，因此它是专门为提供显示信息而创建的。Android\
    \ `Display` 类的层次结构如下：\n\n```\njava.lang.Object\n  > android.view.Display\n```\n\
    \n`Display` 类属于 `android.view` 包，因为 Android 中的任何 `View` 本质上都可以被视为硬件显示的“子级”。在你的应用中使用\
    \ `Display` 类（或对象）的导入语句应引用 `android.view.Display` 包，你很快就会看到这一点。\n\n`Display` 类是一个公共终态类，用于提供关于你的应用所使用的显示器的像素大小、像素密度、旋转方向（竖屏或横屏）以及刷新率等各种信息。Android\
    \ 应用程序有两种显示区域术语。较大的区域称为真实显示区域，其内部是应用程序显示区域。\n\n真实显示区域的数据最能接近指定用户的物理硬件规格。这些数据包含当前显示器中显示内容部分的信息，其中包括系统装饰，其中部分内容不受你的应用程序控制。\n\
    \n需要注意的是，如果 Android 的 `WindowManager` 由于任何原因模拟了一个较小的显示区域，那么真实显示区域可能小于显示的物理（硬件）规格。如果你需要这个顶层的真实显示区域，可以使用\
    \ `.getRealSize()` 方法调用，以及 `.getRealMetrics()` 方法调用来获取其他 `DisplayMetrics`。我们很快将介绍\
    \ Android 的 `WindowManager` 和 `DisplayMetrics` 类。\n\n另一方面，应用程序显示区域将指定显示器中包含你的应用程序“窗口”的部分，不包括任何系统装饰占用的屏幕空间。应用程序显示区域会比真实显示区域小，因为\
    \ Android 会减去系统 UI 元素（例如 Android 操作系统的状态栏）所需的任何空间。\n\n开发人员最常用来查找其应用程序显示特性的方法调用包括\
    \ `.getSize()`、`.getRotation()`、`.getRectSize()` 和 `.getMetrics()` 方法调用。你将在代码中使用\
    \ `.getRotation()` 方法调用来了解用户是在竖屏还是横屏模式下观看设备，这样你就知道应该流式传输什么视频！\n\n## Android DisplayManager\
    \ 类：管理显示器\n\nAndroid 还有一个名为 `DisplayManager` 的类，它允许你管理所有显示器，包括可能连接到用户 Android\
    \ 设备上的任何辅助（外部）或演示显示器。\n\nAndroid 的 `DisplayManager` 是主类 `java.lang.Object` 的另一个直接子类，因此它也是专门为开发者提供\
    \ Android 操作系统的显示硬件管理功能而创建的。Android Display 类的层次结构如下：\n\n```\njava.lang.Object\n\
    \  > android.hardware.display.DisplayManager\n```\n\n`DisplayManager` 类属于 `android.hardware.display`\
    \ 包，因为它提供了对 Android 设备显示硬件管理的访问。由于屏幕尺寸、像素密度、屏幕方向、刷新率以及类似的显示硬件特性差异巨大，并需要量化和纳入你的交互式图形设计编程逻辑管道中，因此在显示硬件和操作系统软件之间建立一座桥梁是必要的。\n\
    \n在应用中使用 `DisplayManager` 类（或对象）的导入语句应引用 `android.hardware.display.DisplayManager`\
    \ 包。\n\n`DisplayManager` 类是一个公共终态类，用于管理主 Android 设备显示器的属性，以及任何可能正在与 Android 设备一起使用的外部连接显示器。\n\
    \n如果你熟悉“第二屏幕”这个术语，或者像 MiraCast 或类似的“将内容投射到本地大屏幕上”的 iTV 类型技术，那么这个 Android 类就是为了让这些技术能够与你的应用程序配合工作而创建的。\n\
    \n`DisplayManager` 有一个嵌套类，即 `DisplayManager.DisplayListener` 公共接口，它允许你的应用程序“监听”显示硬件配置的变化，例如当外部演示显示器连接到\
    \ Android 设备或通过无线方式访问时。\n\n`DisplayManager` 还有一个常量，即 `DISPLAY_CATEGORY_PRESENTATION`\
    \ 常量，用于标识适合用作演示显示器的辅助显示器。要实现这个类，你需要通过调用 `.getSystemService()` 方法来获取此对象的一个实例，该方法使用的参数引用了一个\
    \ `DISPLAY_SERVICE` 常量，该常量是通过 `WindowManager` 类从 `Context` 对象中获取的。我们接下来将介绍 `WindowManager`\
    \ 类。\n\n稍后你将需要在你的应用中实现的 Java 代码将使用 `WindowManager`、`Display` 对象、`Context` 对象以及\
    \ `DisplayManager` 类的 `.getSystemService()` 方法来获取用户的显示器旋转方向。\n"
- fmt: '# Android’s WindowManager Interface: Managing a Window


    Android OS has a windowing management interface called the `WindowManager` interface.
    The `WindowManager` interface is a public interface implementing the `ViewManager`
    interface. The `ViewManager` interface allows you to add and delete child Views
    for your `Activity` subclass. A Window is a type of View.


    A `WindowManager` interface will allow your applications to communicate with the
    Android OS window manager, which is part of Android’s low-level (Linux) OS window
    or display layer. This lower-level layer interfaces the Linux OS Kernel at the
    fundamental (low) level with your Android device’s hardware, upon which the Linux
    Kernel is running. I’m assuming here that you know that the Android OS runs on
    top of the open source Linux kernel.


    If you are familiar with Linux, you will be used to windowing managers, which
    can be swapped in and out of a Linux OS to give an entirely new look and feel
    (in other words, a new UI design for the Linux OS).


    Each instance of a `WindowManager` object references one instance of a given `Display`
    object. If you wish to obtain a `WindowManager` object for different displays,
    you will want to utilize a `.createDisplayContext(Display)` method call to obtain
    the `Context` object for that `Display` object. You should then leverage the `.getSystemService(Context.WINDOW_SERVICE)`
    method call to get the `WindowManager`, which you will be doing in your code in
    the next section of this chapter.


    If you want to show a window using an external display, the easiest way to accomplish
    this is to create a `Presentation` object. The `Presentation` class automatically
    obtains the `WindowManager` and the `Context` for that `Display`. A `Presentation`
    class is a subclass of the Android `Dialog` class.


    The Android `WindowManager` interface is a part of the following package:


    `java.lang.Object`


    `> android.view.WindowManager`


    The `Display` class belongs in the `android.view` package because it provides
    access to View management by implementing a `ViewManager` public interface. The
    import statement for using the `WindowManager` class (or object) in the app should
    reference the `android.view.WindowManager` package.


    The `WindowManager` interface has three nested classes, including the Layout Parameter
    nested class `WindowManager.LayoutParams`, which contains all the constants that
    are used as flags to tell your application how the `Window` object is currently
    configured. The `WindowManager.BadTokenException` nested class throws an exception
    when your application tries to add a `View` object whose `WindowManager.LayoutParams`
    token is not valid, and the `WindowManager.InvalidDisplayException` nested class
    throws an exception when your app calls an `.addView(View, ViewGroup.LayoutParams)`
    method on secondary `Display` objects that can’t be found (do not exist).


    ## Setting Up a Display Object to Ascertain the Device Rotation


    Now let’s use all of this newfound knowledge to accomplish something critical
    for your current streaming video application. What you are going to do is to finally
    implement the landscape version(s) of the video assets you have been creating
    by “polling” the `Display` object by using the `WindowManager` and `.getSystemService()`
    method call in order to ascertain a rotation vector (zero, 90, 180, or 270) so
    that your app can “see” the declination of the Android device in your user’s hands.
    You will use this information to stream your digital video assets in the correct
    orientation.


    The first thing you’ll want to do, right after your `downloadProgress.show()`
    method call, is to declare your `Display` object and name it `rotationDegrees`.
    You will name the object `rotationDegrees` because you’ll be using this object
    to find out the device rotational declination that your user is utilizing.


    You will set this object equal to the current application’s `Context` object,
    and call the `WINDOW_SERVICE` constant off this `Context` object inside the `.getSystemService()`
    method call, cast off the `WindowManager`, and then call the `.getDefaultDisplay()`
    method off of that programming construct using the following line of exceptionally
    dense Java code shown in Figure 19-20:


    ```

    Display rotationDegrees = ((WindowManager)getSystemService(Context.WINDOW_SERVICE)).getDefaultDisplay();

    ```


    This loads the `rotationDegrees Display` object with the default (primary) display
    screen’s characteristics, one of which is its current rotation, which will also
    give you its current (portrait or landscape) orientation.


    ![A978-1-4302-5786-8_19_Fig20_HTML.jpg](A978-1-4302-5786-8_19_Fig20_HTML.jpg)


    Figure 19-20. Writing your `Display` object named `rotationDegrees` code and importing
    the `android.view.Display` class


    As you can see in Figure 19-20, you will need to mouse-over your `Display` class
    reference and select the Import ‘Display’ (`android.view`) option first.


    As you will see in Figure 19-21, this fixes part of the error highlighting, as
    you expected, but there is still a reference to the `WindowManager` class.


    If you mouse-over the error highlighting again, you expect to see the Import ‘WindowManager’
    (`android.view`) option, however, the only admonition that you get is `WindowManager
    cannot be resolved to a type`, shown in Figure 19-21.


    Clearly, the Import statement will solve this referencing problem, and the only
    reason I can think of that this option is not provided in this error helper dialog
    is that `WindowManager` is an interface and not a class. Thus, you’ll have to
    write an Import statement yourself, by hand, heaven forbid!


    ![A978-1-4302-5786-8_19_Fig21_HTML.jpg](A978-1-4302-5786-8_19_Fig21_HTML.jpg)


    Figure 19-21. Mousing-over to ascertain remaining error; note that Eclipse is
    not offering to import the `WindowManager` class


    Scroll up to the very top of your `MainActivity.java` code listing and click the
    plus icon next to the Import statements section to expand it, as shown in Figure
    19-22. At the end, add an Import statement for the `WindowManager` class, using
    the following Java programming statement:


    ```

    Import android.view.WindowManager;

    ```


    While you are here, looking at all of the Import statements for your `Activity`
    subclass, take a gander at the 20 different classes that you are using to implement
    animation and video streaming and progress dialogs and other complex graphics
    design pipelines and implementations, just in this one class. You’ve come a long
    way, baby! (Note that I am not advocating smoking; very few programmers smoke,
    in case you haven’t noticed!)'
