    如图 11-11 所示，只需导入一个类——`Rect`类。将鼠标悬停在`Rect`上，选择**Import `Rect` (android.graphics)**
    选项以添加该导入语句，并清除所有图像合成 Java 代码中的那些烦人的红色错误高亮。


    现在，你已使用系统内存中的`Canvas`引擎设置好了所有这些精彩的位图图像合成混合绘制，但除非你将数据传输到`ImageView`对象中以便在屏幕上显示，否则你会对自己所做的这一切工作感到非常失望。这意味着你需要进行一些简单的
    XML 标记，至少与刚刚为实现 Android 图像混合而编写的 Java 代码相比是这样！因此，让我们在 XML 中设置一个`ImageView`子标签，用于显示图像合成结果！


    ![A978-1-4302-5786-8_11_Fig11_HTML.jpg](img/A978-1-4302-5786-8_11_Fig11_HTML.jpg)


    **图 11-11.** 使用`imageCanvas`对象上的`.drawBitmap()`方法将`paintObject`应用到图像上


    在 Eclipse 的中心编辑窗格中打开`activity_contents.xml` XML 定义文件，如果它已经打开，请单击其选项卡将其激活以进行编辑，接下来你将添加`<ImageView>`子标签。


    ## 在 XML 和 Java 中创建 ImageView 以显示 Canvas


    在第一个嵌套的`<LinearLayout>`容器内的`<ImageButton>`子标签正下方，添加一个`<ImageView>`子标签，如图 11-12
    所示。这将在你的`ImageButton`下方、目录 UI 屏幕的左下角放置一个用于混合合成的`ImageView`。


    将`android:id`参数命名为`porterDuffImageView`，并为其分配一个 8DIP 的边距以确保布局美观。务必包含所有其他必需参数，包括将`android:layout_width`和`android:layout_height`设置为`WRAP_CONTENT`，以及为视障用户设置的`android:contentDescription`参数，引用现有的`@string/bookmark_utility`。


    由于你没有通过`android:src`或`android:background`参数配置此`<ImageView>` UI 元素（因为你将在 Java 代码中定义它），因此在**图形布局编辑器**选项卡中你将看不到它，除非你在切换到
    GLE 编辑模式之前选中（或光标位于）`ImageView`标签或其五个参数之一。


    如果你选中了`ImageView`标签，你仍会看到一个带有手柄的选择控件包围在其周围，表明你的`ImageView` UI 控件确实已包含在用户界面定义中。


    ![A978-1-4302-5786-8_11_Fig12_HTML.jpg](img/A978-1-4302-5786-8_11_Fig12_HTML.jpg)


    **图 11-12.** 在第一个嵌套的`<LinearLayout>`标签中添加 ID 为`porterDuffImageView`的`<ImageView>`子标签


    现在，你可以实例化`ImageView`对象，如图 11-13 所示。


    ![A978-1-4302-5786-8_11_Fig13_HTML.jpg](img/A978-1-4302-5786-8_11_Fig13_HTML.jpg)


    **图 11-13.** 实例化名为`porterDuffImageComposite`的`ImageView` Java 对象并引用 XML


    如图 11-13 所示，在此`Activity`子类中你尚未使用任何`ImageView`对象，因此请将鼠标悬停在`ImageView`类引用上并选择**Import
    `ImageView` (android.widget)**。另外，请注意你使用以下代码为`ImageView`对象指定了一个逻辑名称（`porterDuffImageComposite`）：


    ```

    ImageView porterDuffImageComposite = (ImageView) findViewById(R.id.porterDuffImageView);

    ```


    现在，你只需将`compositeImage` `Bitmap`对象连接到`porterDuffImageComposite` `ImageView`对象，就可以准备测试大量`PorterDuff`混合模式了，所用
    Java 代码不超过十几行。对于实现像使用`PorterDuff`混合模式进行图像合成这样高级的图像图形操作来说，这相当简洁！


    ## 通过`.setImageBitmap()`将 Canvas 写入 ImageView


    最后，单击 ADT 顶部的`ContentsActivity.java`编辑选项卡，添加最后一行代码：使用点号调用`porterDuffImageComposite`
    `ImageView`对象上的`.setImageBitmap()`方法，并将`compositeImage` `Bitmap`对象作为参数传递给它，如图
    11-14 和以下 Java 代码行所示：


    ```

    porterDuffImageComposite.setImageBitmap(compositeImage);

    ```


    ![A978-1-4302-5786-8_11_Fig14_HTML.jpg](img/A978-1-4302-5786-8_11_Fig14_HTML.jpg)


    **图 11-14.** 使用`.setImageBitmap()`方法将名为`imageCanvas`的`Canvas`对象写入`ImageView`


    这将把`Canvas`对象用作画布的`compositeImage` `Bitmap`对象映射（设置、指向、引用、连接）到`ImageView`，以便`Canvas`中发生的任何操作都显示在`ImageView`中。


    现在一切都已连接起来（正确地相互引用），你可以使用**Run As ➤ Android Application**工作流程在 Nexus One 模拟器中测试你的
    Java 代码。如图 11-15 所示，`XOR` `PorterDuff`模式在两幅图像重叠处显示为空白。


    ![A978-1-4302-5786-8_11_Fig15_HTML.jpg](img/A978-1-4302-5786-8_11_Fig15_HTML.jpg)


    **图 11-15.** 在 Nexus One 中测试`XOR`（左）和`MULTIPLY`（右）`PorterDuff.Mode`常量


    这也表明`XOR` `PorterDuff.Mode`常量正确地“尊重”了 alpha 通道。如果它没有考虑 alpha 通道透明度，那么整个图像将是白色的，而不仅仅是图像中由
    alpha 通道定义为不透明的圆形部分。


    接下来，进入你的 Java 代码，将`PorterDuff.Mode.XOR`常量替换为`PorterDuff.Mode.MULTIPLY`常量，再次使用**Run
    As ➤ Android Application**工作流程，看看`MULTIPLY`混合模式如何将这两幅图像相乘，如图 11-15 屏幕截图右侧所示。你可以清楚地看到，`PorterDuff.Mode.MULTIPLY`常量也正确地尊重（考虑了）数字图像资产的
    alpha 通道数据。


    如果你发现，当使用`PorterDuffXfermode`类时，其他`PorterDuff`混合模式也尊重你的 alpha 通道，那么本章前面在`PorterDuffColorFilter`部分看到的问题可能仅限于`PorterDuffColorFilter`类。


    这意味着你将能够通过使用`PorterDuffXfermode`类来正确混合具有 alpha 通道的图像。让我们来验证一下，在`ContentsActivity`
    Java 代码中使用另外四种混合模式，通过实际使用这些模式，你将亲眼看到结果。


    进入你刚才编写的图像合成和混合代码，将`PorterDuff.Mode.MULTIPLY`常量更改为`PorterDuff.Mode.OVERLAY`，再次使用**Run
    As ➤ Android Application**查看结果，如图 11-16 屏幕截图左侧所示。


    如你所示，alpha 通道似乎得到了尊重，`CloudSky`图像被混合到`bookmark`图像中，在文本区域和周边金属环上产生了微妙的效果。


    ![A978-1-4302-5786-8_11_Fig16_HTML.jpg](img/A978-1-4302-5786-8_11_Fig16_HTML.jpg)


    **图 11-16.** 在 Nexus One 中测试`OVERLAY`（左）和`SCREEN`（右）`PorterDuff.Mode`常量


    接下来，让我们尝试`SCREEN`混合模式。再次进入你的 Java 代码，将`PorterDuff.Mode.OVERLAY`常量更改为`PorterDuff.Mode.SCREEN`，并再次使用**Run
    As ➤ Android Application**查看结果，如图 11-16 屏幕截图右侧所示。

