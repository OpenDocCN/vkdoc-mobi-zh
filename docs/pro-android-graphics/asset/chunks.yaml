- fmt: '# Summary


    In this seventh chapter, you learned about the Android `View` superclass, and
    how it provides the foundation for user interface widgets that you can use to
    fill your ViewGroup layout containers to create UI designs.


    We started by looking at the basic View parameters, including the ID, which allows
    other Java code or XML markup to reference a View object; layout (global) positioning,
    using `layout_weight`; and how View object widgets can be sized using `wrap_content`
    or `match_parent` constants in the `layout_width` or `layout_height`, which are
    the two required parameters in any View object.


    We then looked at View (local) positioning properties or parameters, which can
    use margins (space outside the View bounds) and padding (space inside the View
    bounds). These parameters allow localized View object (UI widget) positioning
    inside the layout container and relative to other UI elements.


    Next, you looked at the graphics properties for any View object, which are controlled
    by background (image) and source (image) as well as alpha and visibility parameters.
    Most of the graphics design and special effects you will be learning about in
    this book will ultimately be implemented using these parameters, so we covered
    them in detail to leave no pixel unturned.


    Finally, we looked at how one makes a View object interactive by setting the focus
    and by implementing event listeners and event handling routines.


    The time had come to start writing Java code and XML markup, so you created a
    new Activity subclass to create a Bookmarking Utility, so that you could learn
    about the `RelativeLayout` container and the `TextView` and `ImageView` UI widgets,
    both View subclasses themselves and important in Android design.


    You learned how to apply drop shadow effects to the `TextView` UI element and
    discovered that the `ImageView` UI element does not yet support this feature,
    so you learned how to go outside Android and accomplish this effect via another
    open source digital imaging software package called GIMP 2.8.6.


    You learned the work process for creating a drop shadow using some advanced features
    in GIMP and your highest resolution digital image asset, and how to create new
    drop shadow versions of this asset for each of the other DPI density resolutions
    that are required for optimal graphics in Android.


    Finally, you learned how to switch the Nexus One Emulator from portrait mode into
    landscape mode by using the `Control-F11` and `Control-F12` function key sequences
    in Windows and Linux and the `Command-7` and `Command-9` keys in the Macintosh
    OS. You also learned that some Mac OSes also support the Windows/Linux `CTRL-F11`
    keystroke sequence, or something very similar.


    In the next chapter, you will learn more about the other advanced `ImageView`
    concepts, parameters, techniques, methods, and optimization. You will learn how
    to utilize all the different properties and options that the `ImageView` UI element
    affords you, as it is the cornerstone of graphics in Android OS.


    # 8. Advanced ImageView: More Graphics Design Using ImageView


    ## Abstract


    In this eighth chapter, we will continue to look even more closely at the `ImageView`
    widget and its advanced property settings (parameters), as it is the most important
    user interface element for implementing graphics design inside the Android OS,
    along with its `ImageButton` subclass.


    You got a head start learning about the `ImageView` user interface widget in the
    previous chapter, where you used it to hold an image for the currently bookmarked
    chapter in the bookmarking utility UI that you are designing.


    You used the `android:src` parameter to define a source image, some UI layout
    parameters to position it, and a margins parameter to give it some breathing room
    in your design. However, you didn’t really get into any of the advanced parameters
    or tricks, such as using both the source (foreground) image plate and the background
    image plate at the same time.


    We did cover some fairly advanced digital imaging concepts using GIMP 2.8, which
    is always good to do in a Pro Android Graphics book, and I will try to do even
    more of that as the book goes on, in both GIMP and VirtualDub.


    We will take a look in this chapter at some of the other unique properties and
    parameters of the `ImageView` user interface widget class, as well as how to implement
    them via XML markup and Java code. You already learned about one parameter that
    is primarily utilized in an `ImageView`, the `android:src` parameter or attribute.
    This is because the `ImageView` is a container for a digital image asset, and
    that image asset is referenced via a source (`src`) attribute or property (or
    parameter). Since `ImageButton` is subclassed from `ImageView`, it will also feature
    this same `android:src` parameter.'
