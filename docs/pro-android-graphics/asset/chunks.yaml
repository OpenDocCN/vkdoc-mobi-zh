- fmt: "# The Android Shader Superclass: Texture Maps for Painting\n\nBefore you create\
    \ a `BitmapShader` Shader object in a future section of this chapter, I wanted\
    \ to introduce you to the Android `Shader` class, since the `BitmapShader` class,\
    \ which you will be using soon, is one of its subclasses.\n\nAndroid’s `Shader`\
    \ class is another direct subclass of the `java.lang.Object` master class. This\
    \ signifies that a `Shader` class was designed specifically for the purpose of\
    \ defining `texture map` (or shader) objects for Android OS and, as such, is important\
    \ for us to cover in some detail before we use it.\n\nThe Android `Shader` class\
    \ hierarchy is structured as follows:\n\n```\njava.lang.Object\n  > android.graphics.Shader\n\
    ```\n\nAndroid’s `Shader` class belongs to the `android.graphics` package. Therefore,\
    \ an `import statement` for using the `Shader` class in your app references the\
    \ `android.graphics.Shader` package as the correct class import path.\n\nThis\
    \ `Shader` class is a `public` class and has several indirect subclasses including\
    \ the `BitmapShader`, which you will use next, and the three gradient classes\
    \ you utilized earlier in the chapter: `LinearGradient`, `SweepGradient`, and\
    \ `RadialGradient`.\n\nThe `Shader` class is used to create objects that generate\
    \ horizontal color rendering during draw (`Paint`) operations. Any `Shader` subclass\
    \ (object) can be installed inside a `Paint` object by calling the `.setShader()`\
    \ method.\n\nAfter this `.setShader()` method call configures a `Shader` object\
    \ for a `Paint` object, any `Canvas` object that is drawn using that `Paint` object\
    \ will draw on your canvas using color information retrieved from that `Shader`\
    \ object.\n\nThe `Shader` class has one nested class called `Shader.TileMode`\
    \ that provides tiling mode constants which developers can use when declaring\
    \ their `Shader` objects. Since this is an important class, we will cover it in\
    \ detail next.\n\n## The Shader.TileMode Nested Class: Shader Tiling Modes\n\n\
    Android’s `Shader.TileMode` class is a `public static final enum` class and is\
    \ another of those `java.lang.Enum` direct subclasses of the `java.lang.Object`\
    \ master class that provides Enumerated Constants for use with related Java classes.\
    \ In this case, the related Java classes are the `Shader` class and its subclasses,\
    \ many of which you will be implementing in this chapter.\n\nThis means that the\
    \ `Shader.TileMode` nested class was designed specifically for the purpose of\
    \ defining texture (or shader) tiling mode constants. The `Shader.TileMode` Enum\
    \ class hierarchy is structured as follows:\n\n```\njava.lang.Object\n  > java.lang.Enum<E\
    \ extends java.lang.Enum<E>>\n    > android.graphics.Shader.TileMode\n```\n\n\
    This `Shader.TileMode` nested class belongs to the `android.graphics` package.\
    \ Because of this, the import statement for the `Shader` class is sufficient to\
    \ access the `TileMode` constants, and references the `android.graphics.Shader`\
    \ package and class name as its class import path, as you will see in a bit when\
    \ you implement a `BitmapShader` with `Shader.TileMode` constants.\n\nThere are\
    \ three `TileMode` constants that define the texture map, or shader, tiling modes\
    \ that are currently available within the Android OS: `CLAMP`, `MIRROR`, and `REPEAT`.\n\
    \nThe `TileMode.CLAMP` will replicate the image edge color if the shader draws\
    \ outside its original bounds. This might look a bit strange when using a `Bitmap`\
    \ object, so if you plan to exceed boundaries, you may want to have a one-pixel\
    \ solid color border (much like what is used in a `NinePatch`). What the `CLAMP`\
    \ mode essentially means is zero tiling or do not tile this image!\n\nThe `TileMode.MIRROR`\
    \ will repeat your shader image horizontally as well as vertically. This mode\
    \ will flip, or mirror, image tiles in an alternating fashion. This is done so\
    \ that adjacent image tiles never exhibit a “seam.” Thus, your image tiling results\
    \ with the `MIRROR` constant will be seamless, even if you utilize images that\
    \ were not originally designed (or meant) to be tiled. This mode can also create\
    \ some cool kaleidoscope effects if you implement the right digital image assets.\n\
    \nThe `TileMode.REPEAT` will repeat your shader image horizontally as well as\
    \ vertically. This is known as “straight tiling” and can be used for images that\
    \ you have designed (using GIMP 2.8) to be seamlessly tiled in the first place.\
    \ Note that `MIRROR` also works well for image tiles that you have designed to\
    \ be seamless, so always preview both constants!\n\n## The BitmapShader Class:\
    \ Texture Mapping Using Bitmaps\n\nBefore you create your `BitmapShader` Shader\
    \ object in the next section, I want to introduce you to Android’s `BitmapShader`\
    \ class in greater detail first.\n\nThe Android `BitmapShader` class is a direct\
    \ subclass from the `Shader` class. As such, the `BitmapShader` class inherits\
    \ all of the capabilities, methods, constants, and so on from its `Shader` superclass.\n\
    \nThe Android `BitmapShader` class hierarchy is structured as follows:\n\n```\n\
    java.lang.Object\n  > android.graphics.Shader\n    > android.graphics.BitmapShader\n\
    ```\n\nAndroid’s `BitmapShader` class also belongs to the `android.graphics` package.\
    \ Therefore, the import statement for the `BitmapShader` class references the\
    \ `android.graphics.BitmapShader` package as its class import path.\n\nThe `BitmapShader`\
    \ class is a `public` class, and creates a `Shader` object that can be utilized\
    \ to draw a `Bitmap` object as a texture map in a `Paint` object to be applied\
    \ to a `Canvas` object. This `Bitmap` object can be `CLAMP`, `REPEAT`, or `MIRROR`\
    \ tiled by setting the appropriate (desired) `TileMode` constants.\n\nIt is important\
    \ to point out that you can use a different constant for the X axis than for the\
    \ Y axis, so you can `MIRROR` in one dimension and `REPEAT` in another, giving\
    \ you fine-tuned control over your image tiling.\n\nThe `BitmapShader` constructor\
    \ method specifies a source image `Bitmap` object as well as X and Y `Shader.TileMode`\
    \ constants using the following format:\n\n```\nBitmapShader(Bitmap bmpName, Shader.TileMode\
    \ Xconstant, Shader.TileMode Yconstant)\n```\n\nNow you can implement `Shader`\
    \ objects in your `ImageRoundingDrawable` subclass."
  raw: '## The Android Shader Superclass: Texture Maps for Painting


    Before you create a BitmapShader Shader object in a future section of this chapter,
    I wanted to introduce you to the Android Shader class, since the BitmapShader
    class, which you will be using soon, is one of its subclasses.


    Android’s Shader class is another direct subclass of the java.lang.Object master
    class. This signifies that a Shader class was designed specifically for the purpose
    of defining `texture map` (or shader) objects for Android OS and, as such, is
    important for us to cover in some detail before we use it.


    The Android Shader class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.Shader`


    Android’s Shader class belongs to the `android.graphics` package. Therefore, an
    `import statement` for using the Shader class in your app references the `android.graphics.Shader`
    package as the correct class import path.


    This Shader class is a `public` class and has several indirect subclasses including
    the BitmapShader, which you will use next, and the three gradient classes you
    utilized earlier in the chapter: LinearGradient, SweepGradient, and RadialGradient.


    The Shader class is used to create objects that generate horizontal color rendering
    during draw (Paint) operations. Any Shader subclass (object) can be installed
    inside a Paint object by calling the .setShader( ) method.


    After this .setShader( ) method call configures a Shader object for a Paint object,
    any Canvas object that is drawn using that Paint object will draw on your canvas
    using color information retrieved from that Shader object.


    The Shader class has `one nested class` called Shader.TileMode that provides tiling
    mode constants which developers can use when declaring their Shader objects. Since
    this is an important class, we will cover it in detail next.


    ## The Shader.TileMode Nested Class: Shader Tiling Modes


    Android’s Shader.TileMode class is a public static final enum class and is another
    of those java.lang.Enum direct subclasses of the java.lang.Object master class
    that provides Enumerated Constants for use with related Java classes. In this
    case, the related Java classes are the Shader class and its subclasses, many of
    which you will be implementing in this chapter.


    This means that the Shader.TileMode nested class was designed specifically for
    the purpose of defining texture (or shader) tiling mode constants. The Shader.TileMode
    Enum class hierarchy is structured as follows:


    `java.lang.Object`


      `> java.lang.Enum<E extends java.lang.Enum<E>>`


        `> android.graphics.Shader.TileMode`


    This Shader.TileMode nested class belongs to the android.graphics package. Because
    of this, the import statement for the Shader class is sufficient to access the
    TileMode constants, and references the android.graphics.Shader package and class
    name as its class import path, as you will see in a bit when you implement a BitmapShader
    with Shader.TileMode constants.


    There are `three` TileMode constants that define the texture map, or shader, tiling
    modes that are currently available within the Android OS: CLAMP, MIRROR, and REPEAT.


    The TileMode.CLAMP will replicate the image edge color if the shader draws outside
    its original bounds. This might look a bit strange when using a Bitmap object,
    so if you plan to exceed boundaries, you may want to have a one-pixel solid color
    border (much like what is used in a NinePatch). What the CLAMP mode essentially
    means is zero tiling or do not tile this image!


    The TileMode.MIRROR will repeat your shader image horizontally as well as vertically.
    This mode will flip, or mirror, image tiles in an alternating fashion. This is
    done so that adjacent image tiles never exhibit a “seam.” Thus, your image tiling
    results with the MIRROR constant will be seamless, even if you utilize images
    that were not originally designed (or meant) to be tiled. This mode can also create
    some cool kaleidoscope effects if you implement the right digital image assets.


    The TileMode.REPEAT will repeat your shader image horizontally as well as vertically.
    This is known as “straight tiling” and can be used for images that you have designed
    (using GIMP 2.8) to be seamlessly tiled in the first place. Note that MIRROR also
    works well for image tiles that you have designed to be seamless, so always preview
    both constants!


    ## The BitmapShader Class: Texture Mapping Using Bitmaps


    Before you create your BitmapShader Shader object in the next section I want to
    introduce you to Android’s BitmapShader class in greater detail first.


    The Android BitmapShader class is a direct subclass from the Shader class. As
    such, the BitmapShader class inherits all of the capabilities, methods, constants,
    and so on from its Shader superclass.


    The Android BitmapShader class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.Shader`


        `> android.graphics.BitmapShader`


    Android’s BitmapShader class also belongs to the android.graphics package. Therefore,
    the import statement for the BitmapShader class references the android.graphics.BitmapShader
    package as its class import path.


    The BitmapShader class is a public class, and creates a Shader object that can
    be utilized to draw a Bitmap object as a texture map in a Paint object to be applied
    to a Canvas object. This Bitmap object can be CLAMP, REPEAT, or MIRROR tiled by
    setting the appropriate (desired) TileMode constants.


    It is important to point out that you can use a different constant for the X axis
    than for the Y axis, so you can MIRROR in one dimension and REPEAT in another,
    giving you fine-tuned control over your image tiling.


    The BitmapShader constructor method specifies a source image Bitmap object as
    well as X and Y Shader.TileMode constants using the following format:


    `BitmapShader(Bitmap bmpName, Shader.TileMode Xconstant, Shader.TileMode Yconstant)`


    Now you can implement Shader objects in your ImageRoundingDrawable subclass.'
  trans: "\n# Android Shader 超类：用于绘制的纹理映射\n\n在后续章节创建 `BitmapShader` 着色器对象之前，我想先向你介绍\
    \ Android 的 `Shader` 类，因为你即将使用的 `BitmapShader` 类是它的子类之一。\n\nAndroid 的 `Shader`\
    \ 类是 `java.lang.Object` 主类的另一个直接子类。这表明 `Shader` 类是专门为定义 Android 操作系统的 `纹理映射`（或着色器）对象而设计的，因此在我们使用它之前，有必要详细讲解一下。\n\
    \nAndroid 的 `Shader` 类层级结构如下：\n\n```\njava.lang.Object\n  > android.graphics.Shader\n\
    ```\n\nAndroid 的 `Shader` 类属于 `android.graphics` 包。因此，在应用中使用 `Shader` 类的 `import\
    \ 语句` 需要引用 `android.graphics.Shader` 包作为正确的类导入路径。\n\n这个 `Shader` 类是一个 `public`\
    \ 类，拥有几个间接子类，包括你接下来要使用的 `BitmapShader`，以及本章前面用到的三个渐变类：`LinearGradient`、`SweepGradient`\
    \ 和 `RadialGradient`。\n\n`Shader` 类用于创建在绘制（`Paint`）操作期间生成水平颜色渲染的对象。通过调用 `.setShader()`\
    \ 方法，可以将任何 `Shader` 子类（对象）安装到 `Paint` 对象中。\n\n当 `.setShader()` 方法调用为 `Paint` 对象配置好\
    \ `Shader` 对象后，任何使用该 `Paint` 对象进行绘制的 `Canvas` 对象，都将从该 `Shader` 对象获取颜色信息来绘制画布。\n\
    \n`Shader` 类有一个名为 `Shader.TileMode` 的嵌套类，它提供了开发者声明 `Shader` 对象时可使用的平铺模式常量。由于这是一个重要的类，我们将在下文详细讲解。\n\
    \n## Shader.TileMode 嵌套类：着色器平铺模式\n\nAndroid 的 `Shader.TileMode` 类是一个 `public static\
    \ final enum` 类，也是 `java.lang.Object` 主类的另一个 `java.lang.Enum` 直接子类，它为相关的 Java\
    \ 类提供了枚举常量。在本文上下文中，相关的 Java 类是 `Shader` 类及其子类，本章将实现其中许多类。\n\n这意味着 `Shader.TileMode`\
    \ 嵌套类是专门为定义纹理（或着色器）平铺模式常量而设计的。`Shader.TileMode` 枚举类层级结构如下：\n\n```\njava.lang.Object\n\
    \  > java.lang.Enum<E extends java.lang.Enum<E>>\n    > android.graphics.Shader.TileMode\n\
    ```\n\n这个 `Shader.TileMode` 嵌套类属于 `android.graphics` 包。因此，导入 `Shader` 类的语句就足以访问\
    \ `TileMode` 常量，它引用 `android.graphics.Shader` 包和类名作为其类导入路径，稍后你在使用 `Shader.TileMode`\
    \ 常量实现 `BitmapShader` 时就会看到。\n\n目前 Android 操作系统中有三个可用的 `TileMode` 常量，用于定义纹理映射或着色器的平铺模式：`CLAMP`、`MIRROR`\
    \ 和 `REPEAT`。\n\n如果着色器在其原始边界外绘制，`TileMode.CLAMP` 将复制图像边缘的颜色。在使用 `Bitmap` 对象时，这可能会显得有点奇怪，因此如果你计划超出边界，可能需要一个像素宽的实色边框（类似于\
    \ `NinePatch` 中的做法）。`CLAMP` 模式基本意味着零平铺，即不平铺此图像！\n\n`TileMode.MIRROR` 会水平及垂直重复你的着色器图像。此模式会以交替方式翻转或镜像图像瓦片。这样做是为了确保相邻的图像瓦片永远不会出现“接缝”。因此，使用\
    \ `MIRROR` 常量进行图像平铺的结果是无缝的，即使你使用的图像最初并非为平铺而设计。如果使用了合适的数字图像素材，此模式还能创造出很酷的万花筒效果。\n\
    \n`TileMode.REPEAT` 会水平及垂直重复你的着色器图像。这被称为“直接平铺”，可用于那些你预先设计好（使用 GIMP 2.8）要无缝平铺的图像。请注意，`MIRROR`\
    \ 同样适用于你设计为无缝的图像瓦片，因此始终要预览这两个常量！\n\n## BitmapShader 类：使用位图进行纹理映射\n\n在下一节创建 `BitmapShader`\
    \ 着色器对象之前，我想先更详细地介绍 Android 的 `BitmapShader` 类。\n\nAndroid 的 `BitmapShader` 类是\
    \ `Shader` 类的直接子类。因此，`BitmapShader` 类继承了其超类 `Shader` 的所有能力、方法、常量等。\n\nAndroid\
    \ 的 `BitmapShader` 类层级结构如下：\n\n```\njava.lang.Object\n  > android.graphics.Shader\n\
    \    > android.graphics.BitmapShader\n```\n\nAndroid 的 `BitmapShader` 类也属于 `android.graphics`\
    \ 包。因此，`BitmapShader` 类的导入语句引用 `android.graphics.BitmapShader` 包作为其类导入路径。\n\n\
    `BitmapShader` 类是一个 `public` 类，它创建一个 `Shader` 对象，可用于将 `Bitmap` 对象作为纹理映射绘制到 `Paint`\
    \ 对象中，然后应用到 `Canvas` 对象上。通过设置适当（期望）的 `TileMode` 常量，可以对 `Bitmap` 对象进行 `CLAMP`、`REPEAT`\
    \ 或 `MIRROR` 平铺。\n\n需要指出的是，你可以为 X 轴和 Y 轴设置不同的常量，因此你可以在一个维度上使用 `MIRROR`，在另一个维度上使用\
    \ `REPEAT`，从而对图像平铺进行精细控制。\n\n`BitmapShader` 构造方法使用以下格式指定源图像 `Bitmap` 对象以及 X 和\
    \ Y 方向的 `Shader.TileMode` 常量：\n\n```\nBitmapShader(Bitmap bmpName, Shader.TileMode\
    \ Xconstant, Shader.TileMode Yconstant)\n```\n\n现在，你可以在 `ImageRoundingDrawable`\
    \ 子类中实现 `Shader` 对象了。\n"
- fmt: '# Creating and Configuring a BitmapShader for the Drawable


    Declare your `BitmapShader` object at the top of your `ImageRoundingDrawable`
    constructor method and name it `imageShader`, as shown in Figure 16-21.


    `BitmapShader imageShader;`


    As you now know, the `BitmapShader` object is used to hold the `Bitmap` object
    and will tell Android how to apply, or render, a `Bitmap` object image asset within
    the `Paint` object. As you know, your `Paint` object is used to control how graphics
    are drawn, or applied (painted), onto your `Drawable`’s `Canvas`.


    ![A978-1-4302-5786-8_16_Fig21_HTML.jpg](A978-1-4302-5786-8_16_Fig21_HTML.jpg)


    Figure 16-21. Declaring the `BitmapShader` object and naming it `imageShader`
    for use in your constructor method


    As you may know, the concept of a shader is most prevalent in the world of 3D
    rendering, where a shader is a component of the texture mapping process of placing
    a skin or surface on top of the 3D mesh or wireframe object so that it has a solid
    appearance instead of a mesh or wireframe appearance.


    A `BitmapShader` object performs this same surface mapping process, only in 2D
    instead of in 3D, and is used to apply your 2D image asset to the `Paint` surface.
    You can think of a `Paint` object as a virtual paintbrush, and this shader information
    as designating how the `Bitmap` object will be painted or, more accurately, mapped
    to the resulting `Canvas` object’s 2D surface.


    Next, let’s instantiate your `imageShader` `BitmapShader` object and configure
    it with a source image asset, as well as constants that tell it how to map (or
    tile) the image along the X and Y 2D coordinates of your shader object.


    You will use a `TileMode` constant values of `CLAMP` for your X and Y dimension,
    and call these off of the `Shader` class on the inside of your `BitmapShader`
    constructor method call, which you will invoke by using a Java `new` keyword.


    You will pass your `sourceImage` `Bitmap` object, which has been passed into your
    `ImageRoundingDrawable` constructor method as a primary parameter, into this `BitmapShader`
    constructor method as its first parameter. You will then need to specify the X
    and Y `TileMode` constants called off of the `Shader` class by using the following
    single line of Java code, as shown in Figure 16-22:


    `imageShader = new BitmapShader(sourceImage, Shader.TileMode.CLAMP, Shader.TileMode.CLAMP);`


    ![A978-1-4302-5786-8_16_Fig22_HTML.jpg](A978-1-4302-5786-8_16_Fig22_HTML.jpg)


    Figure 16-22. Instantiating the `imageShader` `BitmapShader` object and configuring
    it with `sourceImage` and constant


    It is interesting to note in Figure 16-22 that even though you instantiated and
    configured your `imageShader` `BitmapShader` object, the Eclipse IDE does not
    considering the object as having been used (utilized) as of yet. Objects can be
    declared, and even instantiated (loaded) and configured, and not be used!


    This is the reason that your wavy yellow warning highlighting will remain under
    the original `imageShader` declaration until you actually do something with this
    object. I just wanted to point this out and to clarify what was going on here,
    in case you were wondering why we “used” the `imageShader` we declared in the
    previous line of code, but the warning that the object was still not used remained.
    So technically an object instantiation does not constitute usage! This is quite
    logical, if you think about it.


    Now that your `imageShader` `BitmapShader` object has been instantiated and is
    configured, you can focus on setting up your `paintObject` `Paint` object. First,
    you must instantiate the `Paint` object using the `new` keyword; since you have
    already declared it for use and named it at the top of your subclass, you can
    accomplish this using one simple, short-but-sweet Java statement:


    `paintObject = new Paint();`


    Now that you have a properly declared and instantiated a `Paint` object named
    `paintObject`, you can invoke method calls off of it to configure it for your
    usage. The first thing that you want to set is the AntiAliasing flag, which you
    will set to a value of `true` (on) using the `.setAntiAlias()` method call. This
    is a fairly straightforward but important step, as it gives us a high-quality
    visual result, and is accomplished using the following statement:


    `paintObject.setAntiAlias(true);`


    As you can see in Figure 16-23, you have now created your `Paint` object and your
    `BitmapShader` object constructs, and configured them to work the way you want
    them to, as far as image tiling and anti-aliasing are concerned.


    ![A978-1-4302-5786-8_16_Fig23_HTML.jpg](A978-1-4302-5786-8_16_Fig23_HTML.jpg)


    Figure 16-23. Instantiating the `paintObject` and setting the `.setAntiAlias()`
    method to `true` to turn on AntiAliasing feature


    Now, all you have left to do is “wire up” your `BitmapShader` object construct
    to your `Paint` construct via a `.setShader()` method you learned about earlier.


    This is accomplished by calling the `.setShader()` method off of the `Paint` object,
    and passing the `BitmapShader` object as the configuring parameter, as shown in
    Figure 16-24. The Java code to perform this configuration of the `paintObject`
    with the `imageShader` is as follows:


    `paintObject.setShader(imageShader);`


    This completes the Java coding for your `ImageRoundingDrawable()` constructor
    method implementation. Next, you will need to implement your `.draw()` method
    for your `Drawable` subclass so it can draw an `ImageRoundingDrawable` to the
    screen. As you recall, the `.draw()` method bootstrap was coded for you, so you
    can simply add the Java code inside the method and make it draw!


    ![A978-1-4302-5786-8_16_Fig24_HTML.jpg](A978-1-4302-5786-8_16_Fig24_HTML.jpg)


    Figure 16-24. Wiring `paintObject` `Paint` object to the `imageShader` `BitmapShader`
    object using `.setShader()` method


    Since you are using the `CLAMP` tiling mode, and do not want the edge pixels of
    your image to be replicated (to appear more than once), which would look like
    a mistake, the first thing that you’ll want to accomplish in a `.draw()` method
    implementation is to “get” the boundaries of the container holding your `Drawable`
    object by using the `.getBounds()` method call.


    One of the cool things about these “get” method calls, such as `.getBounds()`,
    is that they allow your code to go “up the chain” and get information that you
    may not have at develop-time (versus runtime), or more importantly, do not want
    to specify in fixed units such as pixels because each user device has different
    physical display resolution specifications.


    In this case, you want to use `.getBounds()` to crawl up outside your class and
    get the boundary information for the container that is going to hold your `ImageRoundingDrawable`.
    You are going to use a background image plate in an existing `ImageView` object
    in an existing (`BookmarkActivity.java`) class.


    Since that `ImageView` is designed using XML parameters to conform itself to the
    user’s device screen, you will need to find out width and height values for that
    `ImageView`. The `ImageView` uses the `MATCH_PARENT` parameter so that it will
    display its contents using the entire screen. For this reason, your `.getBounds()`
    method call also equates, in this particular UI design setup at least, to “getting”
    your `BookmarkActivity.java` `Activity` subclass display screen area’s total (full
    screen) width and height data values.'
