- fmt: '# Compositing a Background Image in Your RelativeLayout


    Finally, you are going to install a background image called `cloudsky.jpg` in
    your UI’s `RelativeLayout` container. Find this file in the book’s [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html)
    assets folder, and copy it to your project’s `/res/drawable-xhdpi/` folder, and
    then utilize your `Refresh` function in Eclipse ADT so the development environment
    can “see” it when you reference it and not throw an error.


    To reference the new JPEG image, simply change the hexadecimal color value that
    you had in the `android:background` parameter for its data value from a `#EECCAA`
    value to an asset reference value of `@drawable/cloudsky` and you’re done! The
    XML markup for the new image reference and the refreshed `/res/drawable-xhdpi`
    folder image assets contents are shown in Figure [7-34](#A978-1-4302-5786-8_7_Chapter.html#Fig34).


    ![A978-1-4302-5786-8_7_Fig34_HTML.jpg](A978-1-4302-5786-8_7_Fig34_HTML.jpg)


    Figure 7-34. Setting the `android:src` parameter to reference `bookmarks0.png`
    and an `android:background` parameter


    Notice that your Eclipse ADT utilizes a different icon for JPEG imagery in the
    IDE than it does for PNG imagery. The JPEG is 384 Kilobytes for a 1000 pixel square
    image, so I’m just going to use one XHDPI density resolution and let the Android
    OS downsample it since it’s just a stock sunset image.


    The other thing I did here that was kind of tricky was I used a 1:1 square aspect
    ratio image that could be scaled asymmetrically by Android into a portrait or
    landscape orientation. This can be done without a user knowing that what they
    are looking at is not original (undistorted) image content, since they can’t see
    the 1000x1000 pixel image that is stored in the Android `.APK` file resource area.
    I’m going to show you a lot of cool tricks in this book; we have hundreds of pages
    to work with!


    The image has 1000 pixels in each x and y dimension, thus there are plenty of
    pixels for the Android OS to work with when scaling, and no sharp edges in the
    picture. This photograph features just puffy clouds with gradients of sunset color,
    which is the perfect scaling scenario, as you will see when you test this new
    background image out in the Nexus One emulator using both portrait and landscape
    viewing orientations.


    Let’s get back on point, however. What you are really testing here are your drop
    shadow effects and the alpha channel compositing efficacy of the gray values (8-bit
    or 256 of them) in your alpha channel, which are allowing the underlying pixel
    color values to show through, or combine, with your shadow effect to various extents.
    As you can see in Figure [7-35](#A978-1-4302-5786-8_7_Chapter.html#Fig35), your
    GIMP-created drop shadow is compositing beautifully with the background sunset
    image.


    This is more than I can say for Android’s `TextView` parameter’s algorithmic shadow
    compositing; however, this may be due to the current value settings!


    ![A978-1-4302-5786-8_7_Fig35_HTML.jpg](A978-1-4302-5786-8_7_Fig35_HTML.jpg)


    Figure 7-35. Testing drop shadow alpha channel in the Nexus One emulator


    The current `TextView` `shadowColor` parameter is optimized for a white color
    background, using a light grey `#999999` hexadecimal color value setting.


    You will need to change this value to a much darker grey setting to match the
    shadow greyscale value used on your `ImageView`. You should probably use a `#333333`
    hexadecimal color value, which is all the way on the other end of the greyscale
    spectrum.


    To figure out the exact percentage gray value, from 0 to 16 (Hexadecimal), 3 is
    25% (remember, 3 is really four, when counting from zero) of the way, so this
    gray would use 75% black and 25% white, so it’s a 3/4 dark gray.


    The `#999999`, on the other hand, is 10 of 16 which is 5 of 8, and 8 goes into
    100 12.5 times, and 5 times 12.5 is 62.5% white and 37.5% black, so it’s a 3/8
    light gray, and as you can see in Figure [7-35](#A978-1-4302-5786-8_7_Chapter.html#Fig35),
    light gray doesn’t work with the sunset image. Additionally, you need to add the
    alpha values into the RGB value to make it an ARGB value. Let’s make it 75% (12/16)
    opaque, via a `BB` alpha value, yielding a resulting hexadecimal value of `#BB333333`
    for the new `android:shadowColor` parameter value, as shown in Figure [7-36](#A978-1-4302-5786-8_7_Chapter.html#Fig36).


    ![A978-1-4302-5786-8_7_Fig36_HTML.jpg](A978-1-4302-5786-8_7_Fig36_HTML.jpg)


    Figure 7-36. Adding the new alpha channel ARGB color value to your `TextView`
    `android:shadowColor` parameter


    Now you’re ready to test your alpha-channel-capable `shadowColor` parameter on
    your `TextView` to see if you can get closer to the result you are achieving on
    your `ImageView`. Use your `Run As` ➤ Android Application work process and run
    the Nexus One emulator and test the user interface design in both portrait and
    landscape modes. Figure [7-37](#A978-1-4302-5786-8_7_Chapter.html#Fig37) shows
    the UI design in landscape mode in the Nexus One emulator; the shadow darkness
    and transparency match up!


    ![A978-1-4302-5786-8_7_Fig37_HTML.jpg](A978-1-4302-5786-8_7_Fig37_HTML.jpg)


    Figure 7-37. Testing your `TextView` `shadowColor` with alpha and `ImageView`
    in Nexus One''s landscape orientation'
