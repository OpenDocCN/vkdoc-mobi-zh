    that import statement, and clear all of your image compositing Java code of those
    pesky red error highlights.


    Now you have set up all of this fantastic bitmap image compositing blending painting
    using the `Canvas` engine in system memory, but unless you send that data into
    an `ImageView` object so that you can see it on the screen, you will be sorely
    disappointed in all of this work that you’ve done. This means you get to do some
    easy XML markup, at least in comparison to the Java coding that you’ve just done
    to implement image blending in Android! So let’s set up an `ImageView` child tag
