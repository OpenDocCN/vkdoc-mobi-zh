  trans: '

    # 使用 Set 创建更复杂的程序化动画


    点击 `pag_anim.xml` 选项卡，切换回 XML 编辑模式，将光标放在该文件第一个标签 `<?xml version="1.0" encoding="utf-8"?>`
    的末尾，然后按 `return` 键，在开始的 `<scale` 标签之前添加一行新的标记。


    输入 `<set>` 标签，然后将 `<scale>` 标签第一行中的 `xmlns:android` 参数剪切并粘贴到父级 `<set>` 标签中，如图
    4-10 所示。在 XML 文件中无需多次包含此参数，它应放在第一个（通常是父级）标签容器中。


    完成后，将光标放在 `<scale>` 标签 XML 的末尾，按 `return` 键为你的 `<alpha>` 标签添加一行空格，然后输入一个 `<` 字符，如图
    4-10 所示，以调出 `<set>` 标签参数助手对话框。双击 `<alpha>` 标签选项将其添加。


    ![A978-1-4302-5786-8_4_Fig10_HTML.jpg](img/A978-1-4302-5786-8_4_Fig10_HTML.jpg)


    图 4-10. 向 `pag_anim.xml` 文件中添加一个 `<set>` 父标签，用于容纳你的 `<scale>` 和 `<alpha>` 参数


    接下来，确保标签在屏幕上显示为 `<alpha` 和 `/>` 结束标签分隔符，然后将光标放在 `<alpha` 一词之后，按 `return` 键添加一个缩进代码行。输入
    `android:` 冒号以调出标签参数助手对话框，查看该标签可用的 13 个参数。


    双击列表中第一个参数 `android:fromAlpha`，将其添加到你的 `<alpha>` 标签中。在你双击 `fromAlpha` 参数并将其添加到即将添加的
    Alpha 混合参数列表之前，屏幕应该如图 4-11 所示。


    ![A978-1-4302-5786-8_4_Fig11_HTML.jpg](img/A978-1-4302-5786-8_4_Fig11_HTML.jpg)


    图 4-11. 使用 `android:` 工作流程调出包含所有 `<alpha>` 参数的标签助手对话框


    由于 Logo 在远处应该是不可见的，你将 `fromAlpha` 值设置为 `0.0`，表示 0% 的可见度。由于需要一个范围，接下来添加 `toAlpha`
    参数，并将其值设置为 `1.0`，即 100% 可见度。


    接下来，添加一个插值器来控制运动，或者在此场景中控制淡入的时序。为了使淡入效果均匀开始并在结束时减慢，这次你将尝试使用 `deceleration` 插值器常量。


    插值器参数使用以下标记指定：


    ```

    android:interpolator="@android:anim/decelerate_interpolator"

    ```


    现在，你可以添加时序和循环参数，然后就完成了。添加一个 `android:duration` 参数，并将其设置为与 `<scale>` 标签中使用的 `9000`（即
    9 秒）值相匹配或同步。在这种情况下，你希望变换并行运行，以使一切看起来自然。


    对 `android:startOffset` 参数及其 `3000`（即 3 秒）值执行相同操作，确保一切再次保持同步。


    由于当前`repeatCount` 值为 0，你没有使用 `android:repeatMode` 参数，我已将其从 `<scale>` 变换标签中移除，你可能在图
    4-10 和图 4-11 中已经注意到。


    向 `<alpha>` 标签容器添加一个 `android:repeatCount` 参数，并将其值也设置为 0，这样 Pro Android Graphics
    Logo 在到达屏幕前方后就不会淡入淡出。


    六个 `<alpha>` 标签参数如图 4-12 所示，如你所见，它们的值要么与 `<scale>` 标签同步，要么与之完全相反，例如插值器常量的值。


    ![A978-1-4302-5786-8_4_Fig12_HTML.jpg](img/A978-1-4302-5786-8_4_Fig12_HTML.jpg)


    图 4-12. 输入实现 `<alpha>` 标签 Logo 淡入动画特效所需的六个参数


    让我们通过“以 Android 应用程序运行”工作流程，在 Nexus One 模拟器中查看结果，看看这个额外的 Alpha 混合如何为你的动画带来更逼真的视觉效果。


    在 Eclipse 包浏览器中右键单击 GraphicsDesign 项目文件夹，选择“以 Android 应用程序运行”启动模拟器。观察 Android
    操作系统模拟加载，应用程序自动启动并在启动时运行闪屏。


    如图 4-13 所示，现在动画 Logo 会同时缩放并淡入视野，就像在现实中一样。到目前为止，你仅使用了 16 个参数、两个变换容器和一个组（`set`）容器就完成了这一效果。


    让我们在 `<set>` 父标签容器中再添加一种变换类型，以证明你可以使用相同的工作流程和基本 XML 标记构建任意复杂的程序化动画结构。


    旋转变换允许我们在二维（2D）空间中，围绕图像 X 和 Y 轴空间中的一个枢轴点进行旋转。其主要数据范围输入是枢轴点的 X 和 Y 位置，以及旋转角度的 `toDegrees`
    和 `fromDegrees` 范围。


    如果你正在为一个正在倒奶的奶油壶制作动画，你会将枢轴点放在壶嘴下方壶的右侧，也就是通常倾倒/旋转的位置，然后设置 `fromDegrees` 为 `0`（壶直立），`toDegrees`
    为 `90`（壶完全倾倒）。


    ![A978-1-4302-5786-8_4_Fig13_HTML.jpg](img/A978-1-4302-5786-8_4_Fig13_HTML.jpg)


    图 4-13. 在 Nexus One 模拟器中测试你的动画 `<set>`


    接下来，添加你的 `<rotate>` 变换，同时围绕两个不同的轴旋转 Logo。你在帧动画中围绕 X 轴进行 3D 空间旋转，所以让我们通过程序化动画，围绕
    Z 轴旋转你的 Logo（在其于帧动画中旋转的同时）！


    诚然，这可能是将这个特定效果发挥得有些过头了，但我希望在本章中向你展示几种主要的变换，并同时创建一个相对复杂的动画集。

    '
- fmt: '# Rotation Transformation: Going a Bit Too Far with FX


    Let’s add the `<rotate>` transform tag by placing your cursor at the end of the
    `<alpha>` tag XML markup and pressing the return key. This will add the line of
    space you need for your `<rotate>` tag. Next, type the `<` character, as shown
    in Figure [4-14](#A978-1-4302-5786-8_4_Chapter.html#Fig14), in order to bring
    up the `<set>` child tag parameter helper dialog. Finally, double-click the `<rotate>`
    tag option to add it.


    ![A978-1-4302-5786-8_4_Fig14_HTML.jpg](A978-1-4302-5786-8_4_Fig14_HTML.jpg)


    Figure 4-14. Adding a `<rotate>` procedural animation transform tag to your animation
    `<set>` parent container group


    Next, type in `android` and a colon, and bring up the `<rotate>` tag parameter
    helper dialog, and take a look at its 15 parameters, shown in Figure [4-15](#A978-1-4302-5786-8_4_Chapter.html#Fig15).


    ![A978-1-4302-5786-8_4_Fig15_HTML.jpg](A978-1-4302-5786-8_4_Fig15_HTML.jpg)


    Figure 4-15. Using `android:` work process to open the `<rotate>` tag helper dialog
    showing 15 potential parameters


    The most important thing that you need do is to define your data range, and that
    is why the `fromDegrees` and `toDegrees` attributes are the first two parameters
    that are listed in the helper dialog, as shown in Figure [4-15](#A978-1-4302-5786-8_4_Chapter.html#Fig15).


    Double-click the `android:fromDegrees` parameter, and add that tag, and set the
    initial value for its rotation parameter to zero degrees. Zero degrees is the
    default orientation position for the logo frame animation, which you are about
    to rotate in a full circle. Now add the `android:toDegrees` parameter, and set
    its value to equal a full circle of rotation, that is, 360 degrees, as shown in
    Figure [4-16](#A978-1-4302-5786-8_4_Chapter.html#Fig16).


    Next, set your pivot point X and Y, which is the next most important attribute
    in a rotational transform, as it defines where the center of the rotation transform
    will be located in your 2D image or frame animation. Add in the `android:pivotX`
    and `android:pivotY` parameters, and set them both to be 50% of the way into the
    image (frame animation) for both axes. This will set your pivot point to be in
    the exact center of the image, or frame animation (or widget, or shape, or text,
    or whatever you are rotating).


    If you wanted to rotate from the upper-left hand corner, you would use 0% for
    both values, and if you wanted to rotate around the lower-right hand corner, you
    would use 100% for both values.


    ![A978-1-4302-5786-8_4_Fig16_HTML.jpg](A978-1-4302-5786-8_4_Fig16_HTML.jpg)


    Figure 4-16. Adding nine parameters to your `<rotate>` transform tag in your procedural
    animation `<set>` parent tag


    The next most important parameter is the motion interpolator, which for this case
    you will use a linear interpolation constant to rotate your logo smoothly and
    evenly. The markup specifying this tag is written as follows:


    `android:interpolator="@android:anim/linear_interpolator"`


    Now all you have to do is set your timing and looping parameters, and you will
    be ready to test your double-axis-rotating logo animation in the Nexus One emulator.


    Add an `android:duration` parameter and set it to 9000 or 9 seconds to match up
    with your other two transform parameters. Now add an `android:startOffset` parameter
    set to 3000 (3 seconds) so your timing’s synchronized completely.


    Finally, add an `android:repeatCount` parameter, and set it to 1 so you can see
    what the `repeatMode` parameter does and reverse your rotation transform. Add
    the `android:repeatMode` parameter and set the constant value to `reverse`, and
    then save the XML file and use your Run As ➤ Android Application to test the rotation
    inside the Nexus One emulator, as shown in Figure [4-17](#A978-1-4302-5786-8_4_Chapter.html#Fig17).
    As you can see, your frame animation is now rotating into view around its Z axis.


    ![A978-1-4302-5786-8_4_Fig17_HTML.jpg](A978-1-4302-5786-8_4_Fig17_HTML.jpg)


    Figure 4-17. Viewing the rotate transform in the Nexus One Emulator


    Next, you’ll change your `<rotate>` transform parameters so that the rotation
    in both directions happens on the way in from the distance, just to show how easy
    it is to refine (called tweaking) animation values once they are initially put
    into place using your XML markup.


    ## Tweaking Transform Values: The Ease of Adjusting XML


    Go back into your `<set>` and change the `android:duration` value to 4400 and
    the `android:startOffset` value to 200. Notice that 4400 + 4400 + 200 = 9000,
    so you are syncing your two rotation timings and the pause in between them to
    match up with your other two transform’s 9 second durations.


    Run the application again in the Nexus One emulator using a Run As ➤ Android Application
    work process, and notice that now both rotational directions happen coming into
    the final resting place of the frame animation. If you have trouble seeing both
    of them, you can also tweak the `startOffset` value of 3000 for the `<scale>`
    and `<alpha>` transforms to be O, so there is no delay in starting these animations,
    and there is 100% sync with all of the data values at this point (see Figure [4-18](#A978-1-4302-5786-8_4_Chapter.html#Fig18)).
    Try more value tweaking until you are satisfied with the results and comfortable
    with the work process of tweaking values!


    ![A978-1-4302-5786-8_4_Fig18_HTML.jpg](A978-1-4302-5786-8_4_Fig18_HTML.jpg)


    Figure 4-18. Tweaking your `<rotate>` transform tag parameters to achieve a different
    animation special effect'
