  trans: '

    最后，你需要添加一个名为 `android:clickable` 的高级参数，并将其值设置为 `true`，因为稍后你将允许用户点击已添加书签页面的图片，并立即跳转到该页面。因此，你需要有点前瞻性，趁着在这里学习一些
    `ImageView` 参数的时候，现在就添加这个参数。你刚刚添加的新参数如图 7-15 所示。


    ![A978-1-4302-5786-8_7_Fig15_HTML.jpg](img/A978-1-4302-5786-8_7_Fig15_HTML.jpg)


    图 7-15. 添加参数以使 `ImageView` 可点击，并在横向布局中水平居中


    现在，你可以再次使用 `Run As ➤ Android Application` 工作流程，看看带有阴影效果的 `TextView` 以及其下方居中的 `ImageView`
    的用户界面设计效果如何。


    如图 7-16 所示，界面看起来非常简洁。接下来，你只需将 Nexus One 模拟器旋转 90 度，在横向模式下测试你的 UI 设计，看看新的用户界面设计是否依然专业！


    在此之前，我还想为 `ImageView` 添加另一个细节。既然你已经为 `TextView` 添加了阴影效果，那么你的 `ImageView` 也应该有相同的效果，阴影位于
    3D 篮圈左下方 45 度角处。让我们输入 `android:` 查看参数列表，看看是否能找到 `android:shadow` 参数，以便也为 `ImageView`
    对象添加阴影效果。


    尽管 `ImageView` 有大约 100 个参数，但它似乎还不支持 `TextView` 所支持的 `android:shadow` 参数。我相信未来某个时候会添加这个功能，但考虑到
    Android 不能简单地为方形的 `ImageView` 容器添加阴影（如果可以会容易得多），支持这个功能并非易事。


    ![A978-1-4302-5786-8_7_Fig16_HTML.jpg](img/A978-1-4302-5786-8_7_Fig16_HTML.jpg)


    图 7-16. 在 Nexus One 模拟器中测试目前的布局


    要正确地为这个 `ImageView` 对象添加阴影，Android 必须查看 `ImageView` 对象中的源图像引用，然后根据 Alpha 通道（图像的透明度）合并（生成）阴影效果。


    这正是 Android 灵活性的体现，它允许开发者使用诸如 GIMP 2.8.6 或 Lightworks 11.1 等外部软件，这一点非常有价值。要为你的
    `ImageView` 实现匹配的阴影效果，你将需要进入 GIMP 并使用该程序的工具来创建它。


    我将在本章后面部分进行操作；毕竟这是一本专业图形设计的书籍，所以你将通过 GIMP 的工作流程来学习如何为你的图像资源创建阴影效果，而不是使用 Android
    的 `ImageView` 参数。在这个过程中，你还会学习如何创建半透明的 Alpha 数据，确保你掌握最前沿的技术！


    接下来，你将学习如何将 Nexus One 模拟器旋转 90 度以实现横向模式。这样做是为了测试你的 UI 在横向模式下的显示效果。


    ## 在 Nexus One 横向模式下测试你的 UI 设计


    接下来，你将学习使用键盘快捷键将 Nexus One 模拟器从竖屏模式切换为横屏模式，所以我希望模拟器仍在你的屏幕上运行！如果没有，请重新启动它！


    在 Windows 系统中，用于切换模拟器横竖屏的键盘快捷键是使用（左侧）Control 或 `CTRL` 键修饰符加上 `F11` 功能键。因此，按住键盘左侧的
    `CTRL` 键，然后（在按住的同时）轻按 `F11` 键，瞧，你的模拟器就会在你眼前旋转。


    使用 `CTRL-F12` 可以将显示旋转回竖屏模式。如图 7-17 所示，你的 `android:layout_centerHorizontal` 在横向模式下工作得很好，该方向的布局与竖屏方向一样吸引人。


    ![A978-1-4302-5786-8_7_Fig17_HTML.jpg](img/A978-1-4302-5786-8_7_Fig17_HTML.jpg)


    图 7-17. 将 Nexus One 模拟器切换到横向模式以测试 `centerHorizontal` 参数


    如果你使用的是 Apple Macintosh，`Command` 键加上数字键盘上的 `7` 键对应 Windows 上的 `CTRL-F11`，`Command`
    键加上数字键盘上的 `9` 键对应 Windows 上的 `CTRL-F12`。一些网上用户声称其他按键组合在 Macintosh 上也有效，例如 `CTRL+FN+F11`
    或 `CTRL+Command+F11`，以及 `CTRL+FN+F12` 或 `CTRL+Command+F12`，你可以自行尝试。


    如果你使用的是 Linux 操作系统，请像在 Windows 中一样使用 `CRTL-F11`。需要注意的是，`CRTL-F11` 表示“向前切换”，而 `CRTL-F12`
    表示“向后切换”，因此这两种按键组合都可以在竖屏和横屏方向之间切换。

