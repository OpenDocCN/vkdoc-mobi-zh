    # 提供针对设备优化的用户界面布局设计


    Android 会调整应用程序的用户界面布局，以适应其用户的各种设备屏幕。在许多情况下，这应该可以正常工作。然而，在其他情况下，您的 UI 设计可能看起来不如您期望的那样专业，并且在这些情况下，可能需要进一步调整以正确适配不同的屏幕方向或宽高比。


    例如，在较大的设备屏幕上，或宽高比差异巨大的屏幕（宽屏 vs. 方形屏）上，您可能希望调整某些用户界面元素的位置和大小，以便充分利用新的屏幕形状或额外的屏幕空间。相反，面对较小的屏幕，您可能需要调整用户界面元素和字体大小，以确保所有内容都能美观地适配在这个较小的显示屏幕上。


    您可以使用配置限定符常量来提供特定尺寸的布局资源，这些常量包括 `small`、`normal`、`large`、`xlarge`、`xxlarge` 和
    `xxxlarge`。例如，针对超大设备屏幕的用户界面屏幕布局 XML 定义可以放在 `/res/layout-xlarge` 项目文件夹中。从 Android
    3.2（Honeycomb 或 API 13）版本开始，上述尺寸分组已被弃用，您应该转而使用我们将在下文进一步讨论的更新的 `ScreenWidth-Number-DP`
    命名方案。


    若您不熟悉这个术语，需要说明的是，“已弃用”意味着不再推荐但仍在支持。建议当 Android 中的功能被弃用时，您应重新编写应用程序代码以使用新的实现方式；在这种情况下，就是按照
    `ScreenWidth-Number-DIP` (`sw-#-dp`) 所描述的，使用新的文件夹命名标准来命名布局资源文件夹。


    这种文件夹名称配置限定符方法使用与密度无关的像素来定义布局资源所需的最小宽度。举例来说，如果某个平板电脑布局至少需要 480DP 的屏幕宽度，您就应该将其放在
    `/res/layout-sw480dp` 文件夹中。


    与 Android 3.2 Honeycomb API Level 13 之前支持的已弃用的屏幕尺寸组（`small`、`normal`、`large` 和
    `xlarge`）相比，新的 `DIP` 尺寸特定限定符为 Android 开发者提供了对应用程序所能支持的特定屏幕尺寸的更多控制权。


    需要注意的是，您使用这些新限定符指定的 DIP 尺寸并非物理屏幕尺寸规格。相反，这些限定符是用于您的 `Activity` 的，即您的 Java `Activity`
    窗口可用的、以 DIP 为单位的宽度或高度，也就是物理显示屏上供其使用的那部分区域。


    这样做的原因是 Android 操作系统可能会占用部分物理显示屏的像素区域来显示其自身的 UI 元素，例如位于屏幕底部的系统工具栏或位于屏幕顶部的状态栏。


    这意味着物理显示屏的某些部分可能无法用于您的应用程序用户界面布局。因此，您声明的尺寸应专门针对您的应用的 Java `Activity` 所需的物理显示屏区域的大小。


    当开发者声明其 `Activity` 布局需要多少空间时，Android 操作系统会负责计算操作系统 UI 占用的任何其他显示屏空间。


    需要注意的重要一点是，Android `Action Bar`（操作栏）将被视为应用程序窗口空间的一部分，即使您的布局没有特别声明它。这意味着 Android
    `Action Bar` 会减少布局原本可用的屏幕空间（区域），您必须记住在整体用户体验设计中将其考虑在内。


    虽然使用新的 DIP 限定符看起来比使用已弃用的屏幕尺寸常量更复杂，但一旦您确定了 UI 布局设计的密度像素要求，它实际上可能会更简单。


    在设计用户界面布局时，您首要考虑的因素将是您的应用程序从智能手机界面切换到平板电脑界面再到智能电视界面的实际像素值。使用我们将在接下来的几节中详细讨论的限定符，您将能够完全控制不同
    XML 设计之间布局发生变化的确切密度像素尺寸。


    让我们来看看三种可用的屏幕配置修饰符，它们分别关注最小（最窄）宽度、总屏幕宽度和屏幕高度，并看看它们有何不同。在这三种不同方法之间，您应该能够精确地指定所需的所有屏幕布局变化触发范围。


    ## 使用 Android 的 SmallestWidth 屏幕配置修饰符


    Android `smallestWidth` 屏幕配置限定符，其格式为 `sw#dp`（例如 `sw480dp`），旨在通过指明可用屏幕的最短宽度尺寸来定义屏幕的目标尺寸。Android
    设备的 `smallestWidth` 组件是可用显示高度或可用宽度的最短尺寸，具体取决于屏幕方向。也可以将其概念化为屏幕可能的最小显示宽度，这显然就是该常量名称的由来。


    您可以使用 `smallestWidth` 限定符来确保，无论显示屏的当前方向如何，您的应用程序都将至少有这么多 DIP 的显示宽度可用于您的 `Activity`
    的 UI 布局。因此，如果您的用户界面布局要求显示区域的最小宽度尺寸至少为 720 DIP，那么您将使用此限定符创建名为 `/res/layout-sw720dp`
    的布局资源文件夹，以存放您的应用程序 `Activity` 的用户界面布局定义 XML 文件。


    只有当可用显示屏的最小尺寸至少为 720 DIP 时，Android 操作系统才会使用此文件夹中的 XML 资源。需要注意的是，无论这 720 DIP 的边是用户感知的高度还是宽度，都会进行此判断。`smallestWidth`
    是 Android 设备显示屏的一个固定屏幕尺寸特性。当用户显示屏方向改变时，设备的 `smallestWidth` 修饰符不会改变。


    Android 操作系统针对特定设备计算的 `smallestWidth` 会考虑 Android 操作系统 UI 元素。例如，如果某设备有一些 Android
    UI 元素是显示屏的一部分，占用了部分空间，从而影响 `smallestWidth` 的测量值，系统将计算出一个小于设备屏幕尺寸的 `smallestWidth`，因为这些像素是您的
    UI 无法使用的显示像素。


    由于屏幕宽度通常是 UI 布局设计中的一个决定性因素，使用 `smallestWidth` 配置修饰符来确定合适的屏幕尺寸适配，对 Android 开发者来说通常非常有用。


    可用显示宽度参数也可以是确定使用单窗格 UI 布局（例如，用于智能手机）还是多窗格布局（用于平板电脑或智能电视）的一个因素。因此，开发者需要这个修饰符来确定设备的
    `smallestWidth` DIP 参数。

    '
- fmt: '### Using the Available Screen Width Screen Configuration Modifier


    There is another configuration parameter that will allow the developer to specify
    a minimum available display width in DIP units, which does take the screen orientation
    into account. Unlike the `smallestWidth` configuration modifier, the `w#dp` (example:
    `w480dp`) width configuration modifier will in fact change when the display orientation
    changes between a landscape and a portrait orientation, thus reflecting the current
    visual width that is available for your UI layout from the end user''s visual
    perspective.


    This configuration parameter can be useful in determining which multiple pane
    UI layout design that your application will use in landscape mode or in portrait
    mode, depending on how an end user is holding their device.


    This is due to the fact that even on the larger tablet devices, you often don''t
    want to use the same multiple pane UI layout design for the portrait orientation
    as you do for the landscape orientation. With the width screen configuration modifier,
    you can use something like `w640dp` to specify a 640 DIP minimum available screen
    area width for your layout, instead of having to implement both the screen size
    qualifier and orientation qualifier.


    ### Using the Available Screen Height Screen Configuration Modifier


    There''s a third configuration parameter that allows developers to specify minimum
    available display height in DIP units, which also takes the screen orientation
    into account. This `h#dp` (example: `h600dp`) height configuration modifier will
    also change when the display orientation changes between the landscape and the
    portrait orientation, thus reflecting the current visual height that is available
    for the developer''s UI layout from an end user''s visual perspective. Using the
    `h#dp` configuration modifier to define the height required by a layout is useful
    in the same way as the `w#dp` is for defining the width.


    ## Providing Device-Optimized Image Drawable Assets


    As you know, Android will scale your PNG, GIF, and JPEG bitmap drawable assets
    so they will render at an optimal physical size for each device. If an application
    provides bitmap drawables only for the baseline, medium screen density (MDPI),
    then Android scales them up when on a high-density screen, and will scale them
    down when on a low-density screen. This will cause artifacts in your bitmaps,
    especially regarding the upscaling side of things, as data that isn''t there needs
    to be created to do upsampling.


    To ensure that your raster image assets look pristine, you will essentially be
    forced to include alternative image versions, at different resolutions, to be
    used for different screen densities. I''ll be showing you the optimal way to approach
    this work process throughout this book.


    Current Android system configuration qualifiers that you can utilize for density-specific
    resources include LDPI (low), MDPI (medium), TVDPI (TV), HDPI (high), XHDPI (extra
    high), XXHDPI (extra extra high), and XXXHDPI (extra extra extra high). Based
    on size and density of the current user''s device screen, the Android OS will
    leverage all size-specific and density-specific drawable assets that you provide
    in your application''s `/res/drawable` folder(s) hierarchy.


    For example, if your user''s device has a high-density display screen, and your
    app implements drawable resources, Android will look for the drawable resource
    folder that matches to that device display density configuration.


    Android also factors in the alternative resources available, so a resource directory
    with the `-hdpi` configuration qualifier, for instance a `/res/drawable-hdpi`
    folder, would provide assets matching that particular density level, so Android
    will use your drawable assets from that folder.


    If, however, no density-matching assets can be located in your `/res/drawable`
    folders, Android will use your default assets, which are kept in the `/res/drawable`
    folder; if none are found there, Android will use the MDPI density resources in
    the `/res/drawable-mdpi` folder, and will then scale these up or down as needed
    to match the current screen size and density.


    Since scaling down is preferable to scaling up, if you are going to leave out
    assets, I suggest that you leave out LDPI assets, unless you are developing for
    SmartWatch, and at least include MDPI, HDPI, and XHDPI assets, as we will be doing
    throughout this book. If you can, set it up so that Android, if it scales at all,
    is scaling pixels down, and not up, and then you should always obtain decent visual
    results.


    It is important to note that any digital image resources kept in the `/res/drawable`
    folder are considered by the Android OS to be "default" drawable resources. I
    guess if you wanted to try using only HDPI or XHDPI assets and have Android downsample
    these, you could simply put them in the `/res/drawable` folder to accomplish this,
    leaving the other folders empty.


    In my development practices, I keep only XML definitions for things like animations
    and transitions in this `/res/drawable` folder, and then keep all of my pixel-based
    digital imaging assets in those various density-specific `/res/drawable-dpi` folders.
    This is a more "surgical" way of doing things.


    In this case, the MPDI assets would be considered the default. How do I know this?
    By looking at the density constants inside the `DisplayMetrics` class, which we
    will be covering in detail very soon. The `DENSITY_NORMAL` and `DENSITY_MDPI`
    constants have the exact same data value of `160 DPI`.


    Fortunately, when Android is looking for a density-specific image asset and it
    does not find a suitable one in the default density-specific directory (either
    `/res/drawable` or `/res/drawable-mdpi`), it won''t necessarily utilize the default
    (MDPI) resources. Android might instead use one of your other density-specific
    resources, if it ascertains that it will provide superior resampling results.
    Thank Heavens for small miracles.'
  raw: '### Using the Available Screen Width Screen Configuration Modifier


    There is another configuration parameter that will allow the developer to specify
    a minimum available display width in DIP units, which does take the screen orientation
    into account. Unlike the smallestWidth configuration modifier, the w#dp (example:
    w480dp ) width configuration modifier will in fact change when the display orientation
    changes between a landscape and a portrait orientation, thus reflecting the current
    visual width that is available for your UI layout from the end user’s visual perspective.


    This configuration parameter can be useful in determining which multiple pane
    UI layout design that your application will use in landscape mode or in portrait
    mode, depending on how an end user is holding their device.


    This is due to the fact that even on the larger tablet devices, you often don’t
    want to use the same multiple pane UI layout design for the portrait orientation
    as you do for the landscape orientation. With the width screen configuration modifier,
    you can use something like w640dp to specify a 640 DIP minimum available screen
    area width for your layout, instead of having to implement both the screen size
    qualifier and orientation qualifier.


    ### Using the Available Screen Height Screen Configuration Modifier


    There’s a third configuration parameter that allows developers to specify minimum
    available display height in DIP units, which also takes the screen orientation
    into account. This h#dp (example: h600dp ) height configuration modifier will
    also change when the display orientation changes between the landscape and the
    portrait orientation, thus reflecting the current visual height that is available
    for the developer’s UI layout from an end user’s visual perspective. Using the
    h#dp configuration modifier to define the height required by a layout is useful
    in the same way as the w#dp is for defining the width.


    ## Providing Device-Optimized Image Drawable Assets


    As you know, Android will scale your PNG, GIF, and JPEG bitmap drawable assets
    so they will render at an optimal physical size for each device. If an application
    provides bitmap drawables only for the baseline, medium screen density (MDPI),
    then Android scales them up when on a high-density screen, and will scale them
    down when on a low-density screen. This will cause artifacts in your bitmaps,
    especially regarding the upscaling side of things, as data that isn’t there needs
    to be created to do upsampling.


    To ensure that your raster image assets look pristine, you will essentially be
    forced to include alternative image versions, at different resolutions, to be
    used for different screen densities. I’ll be showing you the optimal way to approach
    this work process throughout this book.


    Current Android system configuration qualifiers that you can utilize for density-specific
    resources include LDPI (low), MDPI (medium), TVDPI (TV), HDPI (high), XHDPI (extra
    high), XXHDPI (extra extra high), and XXXHDPI (extra extra extra high). Based
    on size and density of the current user’s device screen, the Android OS will leverage
    all size-specific and density-specific drawable assets that you provide in your
    application’s `/res/drawable` folder(s) hierarchy.


    For example, if your user’s device has a high-density display screen, and your
    app implements drawable resources, Android will look for the drawable resource
    folder that matches to that device display density configuration.


    Android also factors in the alternative resources available, so a resource directory
    with the -hdpi configuration qualifier, for instance a `/res/drawable-hdpi` folder,
    would provide assets matching that particular density level, so Android will use
    your drawable assets from that folder.


    If, however, no density-matching assets can be located in your /res/drawable folders,
    Android will use your default assets, which are kept in the `/res/drawable` folder;
    if none are found there, Android will use the MDPI density resources in the `/res/drawable-mdpi`
    folder, and will then scale these up or down as needed to match the current screen
    size and density.


    Since scaling down is preferable to scaling up, if you are going to leave out
    assets, I suggest that you leave out LDPI assets, unless you are developing for
    SmartWatch, and at least include MDPI, HDPI, and XHDPI assets, as we will be doing
    throughout this book. If you can, set it up so that Android, if it scales at all,
    is scaling pixels down, and not up, and then you should always obtain decent visual
    results.


    It is important to note that any digital image resources kept in the `/res/drawable`
    folder are considered by the Android OS to be “default” drawable resources. I
    guess if you wanted to try using only HDPI or XHDPI assets and have Android downsample
    these, you could simply put them in the /res/drawable folder to accomplish this,
    leaving the other folders empty.


    In my development practices, I keep only XML definitions for things like animations
    and transitions in this /res/drawable folder, and then keep all of my pixel-based
    digital imaging assets in those various density-specific /res/drawable-dpi folders.
    This is a more “surgical” way of doing things.


    In this case, the MPDI assets would be considered the default. How do I know this?
    By looking at the density constants inside the DisplayMetrics class, which we
    will be covering in detail very soon. The DENSITY_NORMAL and DENSITY_MDPI constants
    have the exact same data value of 160 DPI.


    Fortunately, when Android is looking for a density-specific image asset and it
    does not find a suitable one in the default density-specific directory (either
    /res/drawable or /res/drawable-mdpi), it won’t necessarily utilize the default
    (MDPI) resources. Android might instead use one of your other density-specific
    resources, if it ascertains that it will provide superior resampling results.
    Thank Heavens for small miracles.'
  trans: '

    ### 使用可用屏幕宽度配置修饰符


    还存在另一个配置参数，它允许开发者以 DIP 单位指定最小可用显示宽度，并且该参数会考虑屏幕方向。与 `smallestWidth` 配置修饰符不同，`w#dp`（例如：`w480dp`）宽度配置修饰符会在屏幕方向在横竖屏之间切换时发生改变，从而从最终用户的视觉角度反映当前可用于
    UI 布局的可视宽度。


    此配置参数有助于确定你的应用在横屏或竖屏模式下（取决于最终用户握持设备的方式）将使用哪种多窗格 UI 布局设计。


    这是因为，即使在较大的平板设备上，你通常也不希望竖屏模式下使用与横屏模式相同的多窗格 UI 布局设计。借助宽度屏幕配置修饰符，你可以使用类似 `w640dp`
    这样的值来为你的布局指定 640 DIP 的最小可用屏幕区域宽度，而无需同时实现屏幕尺寸限定符和方向限定符。


    ### 使用可用屏幕高度配置修饰符


    还有第三个配置参数，它允许开发者以 DIP 单位指定最小可用显示高度，该参数同样会考虑屏幕方向。这个 `h#dp`（例如：`h600dp`）高度配置修饰符也会在屏幕方向在横竖屏之间切换时发生改变，从而从最终用户的视觉角度反映当前可用于开发者
    UI 布局的可视高度。使用 `h#dp` 配置修饰符来定义布局所需的高度，其用途与使用 `w#dp` 定义宽度类似。


    ## 提供针对设备优化的可绘制图像资源


    如你所知，Android 会缩放你的 PNG、GIF 和 JPEG 位图可绘制资源，以便它们在每个设备上以最佳的物理尺寸渲染。如果应用仅为基准中屏幕密度（MDPI）提供位图可绘制资源，那么在高密度屏幕上
    Android 会将其放大，而在低密度屏幕上则会将其缩小。这会在你的位图中产生伪影，尤其是在放大方面，因为需要创建不存在的数据来进行上采样。


    为了确保你的光栅图像资源看起来完美无瑕，你基本上必须为不同的屏幕密度提供不同分辨率的替代图像版本。我将在本书中向你展示处理此工作流程的最佳方法。


    当前可用于密度特定资源的 Android 系统配置限定符包括 LDPI（低）、MDPI（中）、TVDPI（电视）、HDPI（高）、XHDPI（超高）、XXHDPI（超超高）和
    XXXHDPI（超超超高）。根据当前用户设备屏幕的尺寸和密度，Android 操作系统将利用你在应用 `/res/drawable` 文件夹层次结构中提供的所有尺寸特定和密度特定的可绘制资源。


    例如，如果你的用户设备具有高密度显示屏，并且你的应用实现了可绘制资源，Android 将寻找与该设备显示屏密度配置匹配的可绘制资源文件夹。


    Android 还会考虑可用的替代资源，因此带有 `-hdpi` 配置限定符的资源目录（例如 `/res/drawable-hdpi` 文件夹）将提供匹配该特定密度级别的资源，因此
    Android 将使用该文件夹中的可绘制资源。


    然而，如果在你的 `/res/drawable` 文件夹中找不到密度匹配的资源，Android 将使用你保存在 `/res/drawable` 文件夹中的默认资源；如果那里也找不到，Android
    将使用 `/res/drawable-mdpi` 文件夹中的 MDPI 密度资源，然后根据需要将其放大或缩小以匹配当前的屏幕尺寸和密度。


    由于缩小比放大更可取，因此如果你打算省略某些资源，我建议你省略 LDPI 资源（除非你正在为智能手表开发），并至少包含 MDPI、HDPI 和 XHDPI
    资源，正如我们在本书中所做的那样。如果可能，请进行设置，以便 Android 在需要缩放时是缩小像素而不是放大，这样你应该总能获得不错的视觉效果。


    需要注意的是，保存在 `/res/drawable` 文件夹中的任何数字图像资源都会被 Android 操作系统视为“默认”可绘制资源。我想，如果你想尝试仅使用
    HDPI 或 XHDPI 资源并让 Android 对其进行下采样，只需将它们放在 `/res/drawable` 文件夹中即可实现，而将其他文件夹留空。


    在我的开发实践中，我只将动画和过渡等内容的 XML 定义保存在这个 `/res/drawable` 文件夹中，然后将所有基于像素的数字成像资源保存在那些特定于密度的
    `/res/drawable-dpi` 文件夹中。这是一种更“精细”的处理方式。


    在这种情况下，MPDI 资源将被视为默认资源。我怎么知道这一点？通过查看 `DisplayMetrics` 类中的密度常量，我们很快就会详细讨论这一点。`DENSITY_NORMAL`
    和 `DENSITY_MDPI` 常量具有完全相同的数据值 `160 DPI`。


    幸运的是，当 Android 查找特定密度的图像资源而在默认密度特定目录（`/res/drawable` 或 `/res/drawable-mdpi`）中未找到合适的资源时，它不一定会使用默认的（MDPI）资源。如果
    Android 确定使用你其他密度特定资源能提供更优异的重新采样结果，它可能会转而使用这些资源。真是谢天谢地的小奇迹。

    '
- fmt: "For example, when looking for a low-density LDPI image asset, if one isn’t\
    \ available, Android will (correctly) scale down the high-density version of that\
    \ image asset, because Android knows that scaling higher-density assets down to\
    \ lower-density targets provides superior visual results.\n\nLet’s take a look\
    \ at this from a math perspective. If we downsample by 2X from 240 DPI to 120\
    \ DPI, we are going to obtain a superior result than if we had downsampled by\
    \ 1.5X from 160 DPI to 120 DPI. In image resampling, downsampling, or upsampling,\
    \ you always want to use a factor of 2 or 4 if you can to provide the best quality\
    \ result from the resampling algorithm.\n\nYou might be wondering: What if I don’t\
    \ want my image assets to be scaled, to compensate for different pixel density\
    \ displays? If you want your image to be big on low-density displays, and tiny\
    \ on high-density displays, for whatever your reason, there is indeed a way to\
    \ accomplish this in Android.\n\nThe way to instruct Android to never pre-scale\
    \ when appropriate resolution density assets are not available for use is to put\
    \ image assets that are never to be scaled into a resource directory with the\
    \ `-nodpi` configuration qualifier. This would, of course, equate to the `/res/drawable-nodpi`\
    \ folder naming convention. When Android uses an image asset from this configuration\
    \ qualifier folder, it will not scale it for any reason, even if it deems that\
    \ it should based on the current device density and its internal when-to-scale\
    \ algorithms.\n\nBesides density configuration modifiers (LDPI, MDPI, HDPI, XHDPI,\
    \ etc.), there are orientation configuration modifiers (PORT and LAND) in Android,\
    \ as well as aspect ratio configuration modifiers (LONG and NOTLONG).\n\nThese\
    \ can be used to create folder structures that contain custom designs that fit\
    \ orientation (portrait or landscape) and aspect ratio (widescreen) display screen\
    \ scenarios. These configuration modifiers can also be used in conjunction with\
    \ the other modifiers, for instance, they can be chained together, so `/res/drawable-land-hdpi`\
    \ would contain landscape HDPI assets.\n\n## The DisplayMetrics Class: Size, Density,\
    \ and Font Scaling\n\nYou might be wondering if the Android OS has an API or class\
    \ that allows developers to poll the device their application is running on and\
    \ obtain information about its display characteristics. In fact, there is, and\
    \ it is called the `DisplayMetrics` class.\n\nThe `DisplayMetrics` class is a\
    \ member of the `android.util` operating system utilities package, which is no\
    \ surprise, and it provides an object structure that, when polled (accessed) by\
    \ the developer, gives the display metrics information regarding the current (end\
    \ user) device’s display screen. Information provided includes the display physical\
    \ size in both the X and Y dimensions, the pixel density in both the X and Y dimensions,\
    \ and the font scaling factor that is currently being used by the Android OS.\n\
    \nTo access the `DisplayMetrics` class members, initialize the `DisplayMetrics`\
    \ object using the `DisplayMetrics()` constructor, using the following code:\n\
    \n```\nDisplayMetrics currentDeviceDisplayMetrics = new DisplayMetrics();\ngetWindowManager().getDefaultDisplay().getMetrics(currentDeviceDisplayMetrics);\n\
    ```\n\nThere are eight constants in this class: `DENSITY_DEFAULT`, `DENSITY_HIGH`,\
    \ `DENSITY_LOW`, `DENSITY_MEDIUM`, `DENSITY_TV`, `DENSITY_XHIGH`, `DENSITY_XXHIGH`,\
    \ and `DENSITY_XXXHIGH`.\n\nIf you wanted to research this `DisplayMetrics` class\
    \ further on the Android Developer web site, it can be accessed by using the following\
