  trans: '

    # 图像合成：Alpha 通道与混合模式


    在本节中，我们将探讨数字图像的合成技术。这是将多个数字图像图层混合在一起，从而在显示器上获得一个最终图像的过程，该图像看起来如同一幅完整的画面，但实际上是由多个无缝合成的图像图层组合而成。


    要实现这一点，我们需要一个 Alpha 通道（透明度）值，以便精确控制该像素与上下图层中同一位置的像素进行混合。


    与其他 `RGB` 通道一样，Alpha 通道也具有 256 级透明度，体现在 `ARGB` 数据值的十六进制表示中的两个位段上。 `ARGB` 数据值有八个位段（32
    位），而 24 位图像则使用六个位段，后者可被视为不含 Alpha 通道数据的 32 位图像。


    事实上，如果没有 Alpha 通道数据，何必浪费另外 8 位的数据存储空间，即使它被填满了 `F`（即完全不透明的像素值，这本质上等同于未使用的 Alpha
    透明度值）。因此，24 位图像没有 Alpha 通道，不能用于合成（例如合成图层堆栈中的底层），而 32 位图像则用作其他内容顶部的合成图层，需要能够通过透明度值在图像合成的某些像素位置显示底层内容。


    您可能会好奇，拥有 Alpha 通道并使用图像合成对 Android 图形设计有何影响。其主要优势在于能够将看似单一的图像拆分成多个组成部分的图层。这样做的原因在于，可以对单个图层元素应用
    Java 编程逻辑，从而控制图像的某些部分，而如果图像只是一个单一的 24 位图像，这些部分将无法独立控制。


    图像合成的另一部分是混合模式，它在专业图像合成能力中也占有重要地位。熟悉 Photoshop 或 GIMP 的用户都知道，每个图层都可以设置不同的混合模式，这些模式规定了该图层的像素如何与下方前面的图层进行（数学上的）混合。将这种数学像素混合与
    256 级透明度控制相结合，您就能实现任何可以想象得出的合成效果或结果。


    在 Android 中，混合模式通过 `PorterDuff` 类实现，为 Android 开发者提供了与 Photoshop 或 GIMP 赋予数字图像艺术家的绝大多数相同的合成模式。这使得
    Android 成为一个强大的图像合成引擎，就像 Photoshop 一样，只不过可以通过自定义 Java 代码进行精细控制。Android 的一些 `PorterDuff`
    混合模式包括 `ADD`、`SCREEN`、`OVERLAY`、`DARKEN`、`XOR`、`LIGHTEN` 和 `MULTIPLY`。


    # 数字图像蒙版：Alpha 通道的流行应用


    Alpha 通道的主要应用之一是蒙版，用于遮罩图像的某些区域以进行合成。蒙版是指使用 Alpha 通道从图像中抠出主体内容，并将其放置到单独的图层上的过程。


    这使得我们可以将图像元素或主体内容用于其他图像、甚至动画中，或应用于特效领域。诸如 Photoshop 和 GIMP 之类的数字图像软件包拥有许多专门用于蒙版及后续图像合成的工具和功能。如果不先进行蒙版处理，就无法有效地进行图像合成，因此这是图形设计师需要掌握的重要领域。


    蒙版艺术已有非常悠久的历史。事实上，如果你熟悉天气预报员使用的蓝屏和绿屏背景（他们看似站在天气地图前，实际只是站在绿幕前），你就会认识到蒙版技术不仅存在于数字图像领域，也存在于数字视频和电影制作中。


    蒙版可以通过使用蓝屏或绿屏背景以及计算机软件自动完成，这些软件能自动提取这些精确的颜色值，从而创建蒙版和 Alpha 通道（透明度）；在数字图像中，也可以使用选择工具、锐化与模糊算法手动完成蒙版。


    在本书中，你将通过使用流行的开源软件包（如 GIMP 2 和 EditShare Lightworks 11）来大量学习这一工作流程。GIMP 2.8 是一款数字图像合成软件工具，而
    Lightworks 11 是一款数字视频编辑软件工具。在本书中，你还将使用其他类型的工具，例如视频压缩软件，以便熟悉 Android 图形设计工作流程中需要整合的、Android
    系统外部的各类软件工具。


    数字图像合成是一个非常复杂且涉及面广的过程，因此需要跨越多个章节来讲解。在蒙版过程中，最重要的考量是围绕被蒙版对象获得光滑、锐利的边缘，这样当你将其放置到新的背景图像上时，它看起来就像最初在那里拍摄的一样。其关键在于选择工作流程，以及以正确的方式（工作流程）和恰当的使用场景使用数字图像软件的选择工具（至少有六种以上）。


    例如，如果你要蒙版的对象周围有颜色均匀的区域（也许你是在蓝屏或绿屏背景下拍摄的），你可以使用魔术棒工具和适当的阈值设置来选择除对象之外的所有内容，然后反转该选择集，从而获得包含对象的选择集。有时候，处理问题的正确方法就是逆向思维，你在本书后面将会看到这一点。


    其他选择工具包含复杂的算法，可以检测像素之间的颜色变化，这在边缘检测中非常有用。你可以在其他类型的选择工具中运用边缘检测，例如 GIMP 2.8.6 中的
    `Scissor Tool`（剪刀工具），它允许你沿着要蒙版对象的边缘拖动光标，同时工具的算法会精确地、像素级完美地放置选择边缘，之后你可以使用控制点对其进行编辑。

    '
- fmt: '# Smoothing Edges in a Mask: The Concept of Anti-Aliasing


    Anti-aliasing is a technique where two adjacent colors in an image which are on
    an edge between two colors are blended right on the edge to make the edge look
    smoother when the image is zoomed out. What this does is to trick the eye into
    seeing a smoother edge and gets rid of what is commonly called “the jaggies.”
    Anti-aliasing provides very impressive results by using averaged color values
    of a few pixels along any edge that needs to be made smoother (by averaged I mean
    some color or spectrum of colors that is part of the way between the two colors
    that are colliding at a jagged edge in an image).


    I created a simple example of this technique to show you visually what I mean.
    In Figure [1-1](#A978-1-4302-5786-8_1_Chapter.html#Fig1), you will see that I
    created a seemingly smooth red circle on a bright yellow background. I then zoomed
    into the edge of that circle and took a screenshot and placed it alongside of
    the zoomed out circle to show the anti-aliasing (orange) values of a color between
    (or made from) the red and yellow colors that border each other at the edge of
    the circle.


    ![A978-1-4302-5786-8_1_Fig1_HTML.jpg](A978-1-4302-5786-8_1_Fig1_HTML.jpg)


    Figure 1-1. A red circle on a yellow background (left) and a zoomed-in view (right)
    showing the anti-aliasing


    We will be looking at anti-aliasing in detail during the book. However, I wanted
    to cover all the key image concepts all in one place, and all in context, to provide
    a baseline knowledge foundation for you upfront. Hope you don’t mind an initial
    chapter on theory before we start coding.


    ## Optimizing Digital Images: Compression and Dithering


    There are a number of factors that affect image compression, and some techniques
    that can be used to get a better quality result with a smaller data footprint.
    This is the objective in optimizing digital imagery: to get the smallest data
    footprint with the highest quality visual result.


    We will start with the aspects that most affect the data footprint and examine
    how each of them contributes to data footprint optimization of any given digital
    image. Interestingly, these are similar to the order of the digital imaging concepts
    that we have covered so far in this chapter.


    The single most critical contributor to the resulting file size, or data footprint,
    is the number of pixels, or the resolution, of a digital image. This is logical
    because each of these pixels need to be stored along with the color values for
    each of their channels. Thus, the smaller you can get your image resolution (while
    still having it look sharp), the smaller its resulting file size will be. This
    is what we call a “no brainer.”


    Raw (uncompressed) image size is calculated by `Width x Height x 3` for 24-bit
    RBG images, or possibly `Width x Height x 4` for a 32-bit ARGB image. Thus, an
    uncompressed truecolor 24-bit VGA image will have `640 x 480 x 3`, equaling 921,600
    bytes of original uncompressed data. If you divide 921,600 by 1024 (bytes in a
    kilobyte), you get the number of Kilobytes that is in a raw VGA image, and that
    number is an even 900KB.


    As you can see, image color depth is the next most critical contributor to the
    data footprint of an image, because the number of pixels in that image is multiplied
    by 1 (8-bit) or 2 (16-bit) or 3 (24-bit) or 4 (32-bit) color data channels. This
    is one of the reasons that indexed color (8-bit) images are still widely used,
    especially using the `PNG8` image format, which features a superior lossless compression
    algorithm than the `GIF` format utilizes.


    Indexed color images can simulate truecolor images, if the colors that are used
    to make up the image do not vary too widely. Indexed color images use only 8 bits
    of data (256 colors) to define the image pixel colors, using a palette of 256
    optimally selected colors rather than 3 RGB color channels.


    Depending on how many colors are used in any given image, using only 256 colors
    to represent an image versus 16,777,216 can cause an effect called banding, where
    transfers between adjoining colors are not smooth. Indexed color images have an
    option to correct for this visually called dithering.


    Dithering is a process of creating dot patterns along the edges of two adjoining
    colors in an image in order to trick the eye into thinking there is a third color
    used. This gives us a maximum perceptual amount of colors of 65,536 colors (256
    x 256) but only if each of those 256 colors borders on each of the other 256 colors.
    Still, you can see the potential for creating additional colors, and you will
    be amazed at the results an indexed color image can achieve in some scenarios
    (with certain images).


    Let’s take a truecolor image, such as the one shown in Figure [1-2](#A978-1-4302-5786-8_1_Chapter.html#Fig2),
    and save it as a `PNG8` indexed color image to show the dithering effect. We will
    take a look at the dithering effect on the driver’s side rear fender on the Audi
    3D image, as it contains a gradient of gray color.


    ![A978-1-4302-5786-8_1_Fig2_HTML.jpg](A978-1-4302-5786-8_1_Fig2_HTML.jpg)


    Figure 1-2. A truecolor image source that uses 16.8 million colors, which we are
    going to optimize to `PNG8` format


    We will set the `PNG8` image, shown in Figure [1-3](#A978-1-4302-5786-8_1_Chapter.html#Fig3),
    to use 5-bit color (32 colors) so that we can see the dithering effect clearly.
    As you can see, dot patterns are made between adjacent colors to create additional
    colors.


    ![A978-1-4302-5786-8_1_Fig3_HTML.jpg](A978-1-4302-5786-8_1_Fig3_HTML.jpg)


    Figure 1-3. Showing the effect of dithering with an indexed color image compression
    setting of 32 colors (5-bit)'
  raw: '## Smoothing Edges in a Mask: The Concept of Anti-Aliasing


    Anti-aliasing is a technique where two adjacent colors in an image which are on
    an edge between two colors are blended right on the edge to make the edge look
    smoother when the image is zoomed out. What this does is to trick the eye into
    seeing a smoother edge and gets rid of what is commonly called “the jaggies.”
    Anti-aliasing provides very impressive results by using averaged color values
    of a few pixels along any edge that needs to be made smoother (by averaged I mean
    some color or spectrum of colors that is part of the way between the two colors
    that are colliding at a jagged edge in an image).


    I created a simple example of this technique to show you visually what I mean.
    In Figure [1-1](#A978-1-4302-5786-8_1_Chapter.html#Fig1), you will see that I
    created a seemingly smooth red circle on a bright yellow background. I then zoomed
    into the edge of that circle and took a screenshot and placed it alongside of
    the zoomed out circle to show the anti-aliasing (orange) values of a color between
    (or made from) the red and yellow colors that border each other at the edge of
    the circle.


    ![A978-1-4302-5786-8_1_Fig1_HTML.jpg](A978-1-4302-5786-8_1_Fig1_HTML.jpg)


    Figure 1-1.


    A red circle on a yellow background (left) and a zoomed-in view (right) showing
    the anti-aliasing


    We will be looking at anti-aliasing in detail during the book. However, I wanted
    to cover all the key image concepts all in one place, and all in context, to provide
    a baseline knowledge foundation for you upfront. Hope you don’t mind an initial
    chapter on theory before we start coding.


    ## Optimizing Digital Images: Compression and Dithering


    There are a number of factors that affect image compression, and some techniques
    that can be used to get a better quality result with a smaller data footprint.
    This is the objective in optimizing digital imagery: to get the smallest data
    footprint with the highest quality visual result.


    We will start with the aspects that most affect the data footprint and examine
    how each of them contributes to data footprint optimization of any given digital
    image. Interestingly, these are similar to the order of the digital imaging concepts
    that we have covered so far in this chapter.


    The single most critical contributor to the resulting file size, or data footprint,
    is the number of pixels, or the resolution, of a digital image. This is logical
    because each of these pixels need to be stored along with the color values for
    each of their channels. Thus, the smaller you can get your image resolution (while
    still having it look sharp), the smaller its resulting file size will be. This
    is what we call a “no brainer.”


    Raw (uncompressed) image size is calculated by Width x Height x 3 for 24-bit RBG
    images, or possibly Width x Height x 4 for a 32-bit ARGB image. Thus, an uncompressed
    truecolor 24-bit VGA image will have 640 x 480 x 3, equaling 921,600 bytes of
    original uncompressed data. If you divide 921,600 by 1024 (bytes in a kilobyte),
    you get the number of Kilobytes that is in a raw VGA image, and that number is
    an even 900KB.


    As you can see, image color depth is the next most critical contributor to the
    data footprint of an image, because the number of pixels in that image is multiplied
    by 1 (8-bit) or 2 (16-bit) or 3 (24-bit) or 4 (32-bit) color data channels. This
    is one of the reasons that indexed color (8-bit) images are still widely used,
    especially using the PNG8 image format, which features a superior lossless compression
    algorithm than the GIF format utilizes.


    Indexed color images can simulate truecolor images, if the colors that are used
    to make up the image do not vary too widely. Indexed color images use only 8 bits
    of data (256 colors) to define the image pixel colors, using a palette of 256
    optimally selected colors rather than 3 RGB color channels.


    Depending on how many colors are used in any given image, using only 256 colors
    to represent an image versus 16,777,216 can cause an effect called banding, where
    transfers between adjoining colors are not smooth. Indexed color images have an
    option to correct for this visually called dithering.


    Dithering is a process of creating dot patterns along the edges of two adjoining
    colors in an image in order to trick the eye into thinking there is a third color
    used. This gives us a maximum perceptual amount of colors of 65,536 colors (256
    x 256) but only if each of those 256 colors borders on each of the other 256 colors.
    Still, you can see the potential for creating additional colors, and you will
    be amazed at the results an indexed color image can achieve in some scenarios
    (with certain images).


    Let’s take a truecolor image, such as the one shown in Figure [1-2](#A978-1-4302-5786-8_1_Chapter.html#Fig2),
    and save it as a PNG8 indexed color image to show the dithering effect. We will
    take a look at the dithering effect on the driver’s side rear fender on the Audi
    3D image, as it contains a gradient of gray color.


    ![A978-1-4302-5786-8_1_Fig2_HTML.jpg](A978-1-4302-5786-8_1_Fig2_HTML.jpg)


    Figure 1-2.


    A truecolor image source that uses 16.8 million colors, which we are going to
    optimize to PNG8 format


    We will set the PNG8 image, shown in Figure [1-3](#A978-1-4302-5786-8_1_Chapter.html#Fig3),
    to use 5-bit color (32 colors) so that we can see the dithering effect clearly.
    As you can see, dot patterns are made between adjacent colors to create additional
    colors.


    ![A978-1-4302-5786-8_1_Fig3_HTML.jpg](A978-1-4302-5786-8_1_Fig3_HTML.jpg)


    Figure 1-3.


    Showing the effect of dithering with an indexed color image compression setting
    of 32 colors (5-bit)'
