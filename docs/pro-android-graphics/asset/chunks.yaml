    your compositing. PNG32 has an 8-bit alpha channel, which will contain edge anti-aliasing
    data for your animated 3D text (Pro Android Graphics).


    You will set it up this way so that even if you decide to change the digital video
    asset at a later time, or if you decide to allow your users to select from several
    digital video background options, the resulting composite 2D animated result will
    appear as if it is a part of the digital video data. Only us Android developers
    will know that it is in fact two separate content assets, and after the next chapter
    is over, it will be even more than two!


    First, you will learn how to copy your nine animation frames into each of the
    proper project drawable resource folders. Next, you will create an XML file to
    hold your frame animation definition. Once that is accomplished, you will change
    the XML markup for your existing activity_main.xml user interface design to reference
    the new frame animation, using an ImageView widget.


    Once you have put your assets in place and written all of your XML markup, you’ll
    add in the Java code to load the XML data into an AnimationDrawable object and
    to start it on application startup. You’ll do this by editing the MainActivity.java
    class in Eclipse, and by editing the onCreate( ) method where you will create
    your AnimationDrawable object, load it, and start it!'
  trans: '

    # 使用 XML 标记在 Android 中创建逐帧动画


    基于帧的动画在 Android 中通过包含 XML 标记的 XML 文件来定义。该 XML 文件存储在项目的`/res/drawable`文件夹中，本章稍后将通过一个动手实践示例，指导你使用
    Eclipse 创建这个 XML 标记。


    你可能会好奇为什么这个 XML 文件放在`/res/drawable`文件夹而不是`/res/anim`文件夹，这是因为 Android 中有两种动画类型。逐帧动画使用可绘制资源文件夹，而程序化动画（详见第
    4 章）则使用`/res/anim`文件夹。


    逐帧动画 XML 文件会利用与逐帧动画相关的特殊 XML 标签，在动画定义中指定各个单独的帧（本质上，这就是你的 2D `AnimationDrawable`对象构造器）。


    这个 XML 结构指示你的应用 Java 代码如何将动画帧加载到 Android 的`AnimationDrawable`对象中。如果你想了解更多关于 Android
    操作系统`AnimationDrawable`类的详细信息，可以通过以下网址查找：


    [`developer.android.com/reference/android/graphics/drawable/AnimationDrawable.html`](http://developer.android.com/reference/android/graphics/drawable/AnimationDrawable.html)


    `AnimationDrawable`类是 Android 的逐帧动画类，它允许你实例化一个`AnimationDrawable`对象。该对象将保存逐帧动画数据，在你在应用程序
    Java 代码中实例化`AnimationDrawable`对象后，这些数据会在运行时加载到系统内存中。


    实例化该对象后，你可以从应用程序 Java 代码中调用它的`.start()`方法。如果动画由交互触发，通常会在事件处理器内部调用；如果动画旨在启动画面中自动运行（就像你的动画将要实现的那样），则可能在`onCreate()`方法内部调用。


    Android 中某些类型的逐帧动画也可以仅通过 XML 标记自动启动，无需在 Java 代码中使用`.start()`方法专门触发。在本书的后续内容中，我们将会探讨这两种设置基于帧的动画的方式。


    逐帧动画的 XML 结构实质上会创建一个编号数字图像文件数组，这些文件代表了动画中的各帧。每个帧还有一个参数，用于指定该帧在屏幕上显示的时长。该时长值需以毫秒为单位指定，使用表示千分之一秒增量的整数值。一秒对应整数值`1000`。


    ## Android `<animation-list>` 标签：父级帧容器


    大部分 2D 基于帧的动画资源将通过使用`<animation-list>` XML 父级标签及其参数来创建。你将用到的主要参数是`android:one-shot`，它控制动画是连续循环播放，还是“播放一次”的播放设置。


    稍后，你将通过文件名（不含扩展名）引用包含这个`<animation-list>`父级标签及其子标签的 XML 文件。你将创建一个使用`anim_intro.xml`文件名的逐帧动画
    XML 定义，但在 Android XML 标记和 Java 代码中将其引用为`anim_intro`。一旦在 XML 中定义了该`<animation-list>`，你将能够在任何
    UI 或 UX 设计中引用它所定义的基于帧的动画。


    最后，还有一个`android:id`参数，如果你打算在 Java 代码中引用你的`<animation-list>`标签（即通过`.start()`方法调用来控制动画），就可以使用它。正如你稍后将看到的，还有另一种通过
    XML 自动启动动画的方式，这样你就不必使用 ID 参数了——ID 参数通常是为了让 Java 代码能够引用 XML 标签结构而提供的。


    ## Android `<item>` 标签：指定动画帧


    `<animation-list>`标签始终是一个父级标签，因为它被设计用来包含`<item>`标签，这些`<item>`标签永远是子标签。item 标签用于定义`<animation-list>`标签中的帧，每个帧对应一个`<item>`标签，包含该动画帧的文件名和帧显示时长引用。


    在你的 Android `AnimationDrawable`对象的逐帧动画 XML 定义中，每个帧都会有自己对应的`<item>`子标签。该标签引用该帧的可绘制图像文件资源，以及一个帧显示时长值，用于指定它在屏幕上停留的时间。


    这些`<item>`标签将按照显示顺序存在于父级`<animation-list>`容器内，就像你将动画帧加载到一个数据数组中一样——实际上，你确实是在这样做。


    需要特别注意的一点区别是：`AnimationDrawable`对象（或类）使用的是可绘制（位图图像）资源，而`Animation`对象（或类，你将在第 4
    章中全面了解）则不使用。


    不过，如果你需要对逐帧动画应用程序化变换或 alpha 混合以实现更复杂的效果，`AnimationDrawable`对象可以被`Animation`对象引用。这就是为什么我们将在下一章中介绍如何创建程序化动画时，会讲解`Animation`类。


    ## 为我们的 GraphicsDesign 应用创建逐帧动画


    让我们言归正传，创建一个将在你的启动（闪屏）屏幕数字视频资源上播放的逐帧动画。这样，你就可以立即开始进行数字视频和 2D 动画资源的高级合成操作！


    为了获得完美的合成效果，你将使用 PNG32 格式作为动画帧。PNG32 具有 8 位 alpha 通道，其中包含用于动画 3D 文字（Pro Android
    Graphics）的边缘抗锯齿数据。


    你将这样设置，即使后续决定更换数字视频资源，或者允许用户从多个数字视频背景选项中选择，合成的 2D 动画结果看起来仍会像数字视频数据的一部分。只有我们 Android
    开发者才知道，这实际上是两个独立的内容资源，而等到下一章结束后，这些资源数量将不止两个！


    首先，你将学习如何将九个动画帧复制到项目对应的可绘制资源文件夹中。接下来，你将创建一个 XML 文件来保存逐帧动画定义。完成后，你将修改现有的`activity_main.xml`用户界面设计的
    XML 标记，使用`ImageView`小部件来引用新的逐帧动画。


    当你放置好所有资源并编写完所有 XML 标记后，将添加 Java 代码，将 XML 数据加载到`AnimationDrawable`对象中，并在应用启动时启动它。具体操作是：在
    Eclipse 中编辑`MainActivity.java`类，并修改`onCreate()`方法，在其中创建、加载并启动你的`AnimationDrawable`对象！

    '
- fmt: '## Copying Resolution Density Target Frames


    The first thing that you need to do is to copy four sets of nine PNG animation
    frames into the appropriate folders. As of Android 4.3, this is the `/res/drawable-xhpdi`
    folder, the `/res/drawable-hdpi` folder, the `/res/drawable-mdpi` folder, and
    the `/res/drawable-ldpi` folder.


    Let’s do that now, so that your XML markup, which you will write in the next section,
    has something that it can reference. Open your operating system’s file management
    software; for Windows 7 or 8 it’s called Explorer, and since I’m using Windows
    8, it looks like what is shown in Figure [3-1](#A978-1-4302-5786-8_3_Chapter.html#Fig1).


    Hold down the Control (CTRL) key and select the nine PNG files that end in `_640px`,
    as shown in Figure [3-1](#A978-1-4302-5786-8_3_Chapter.html#Fig1). Holding a Control
    (modifier) key while you select the PNG files will let you select random files,
    instead of a range.


    **Tip:** If you''re wondering how you would select a range of contiguous files,
    the modifier key that you would use to accomplish that would be the Shift key.


    ![A978-1-4302-5786-8_3_Fig1_HTML.jpg](A978-1-4302-5786-8_3_Fig1_HTML.jpg)


    *Figure 3-1. Control-selecting the eight animation files for copying to the XHDPI
    resolution density target folder*


    Once these nine files are selected, right-click one of them, and select the Copy
    option. Now that the files are in the operating system clipboard, you can navigate
    to your `/Users` folder and find your Eclipse `/workspace` folder. Under the `/workspace`
    folder, you will find your `/GraphicsDesign` Android app project folder, and under
    that, the `/res` Resource folder. Finally, find the `/drawable-xhdpi` folder,
    right-click it, and select the Paste option, which will copy these nine files
    to this destination.


    Once the files are copied into the proper folder, you then need to rename all
    nine files to be simpler and shorter—and to conform to Android’s asset file naming
    convention. File names in Android must use only lower case letters, numbers, and
    optionally, an underscore character. So name your files `pag0.png` through `pag8.png`,
    as shown in Figure [3-2](#A978-1-4302-5786-8_3_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_3_Fig2_HTML.jpg](A978-1-4302-5786-8_3_Fig2_HTML.jpg)


    *Figure 3-2. Renaming the `PAG0_640px.png` series of files to be `pag0.png` through
    `pag8.png` in `/drawable-xhdpi`*


    Now, to be thorough, perform the exact same work process for the `_320px` files,
    and put them into the `/res/drawable-hdpi` folder. After that is all done, multi-select
    and copy your `_160px` files into the `/res/drawable-mdpi` folder. Finally, copy
    the `_80px` files into the `/res/drawable-ldpi` folder.


    It is also important to note here that you could get away with not placing assets
    in the `/res/drawable-ldpi` folder, as Android would simply use your MDPI assets
    and scale them down. MDPI assets are intended for use with 160 DPI displays, and
    the LDPI assets are for use with 120 DPI Android devices, which are becoming somewhat
    rare due to high-density pixel pitch screens, but which will be making a comeback
    with the advent of SmartWatches.


    HDPI assets are intended for 240 DPI screens and XHDPI assets for 320 DPI screens.
    The XXHDPI folder and specification is new in Android 4.2 and is intended for
    480 DPI screens, and the XXXHDPI folder and specification is new in Android 4.3
    and is intended for 640 DPI screens. However, it is important to note that currently,
    as of Android Jelly Bean, XXHDPI is only used to hold the 144 x 144 pixel application
    launch icon assets, in case you’re wondering why you are not using this drawable
    assets folder (yet).


    ## Creating Frame Animation Definitions Using XML


    Let’s pick up where we left off in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html),
    and create a new XML file to hold the Frame Animation XML asset. Launch Eclipse
    ADT, if it is not open on your workstation already. Right-click your top-level
    `GraphicsDesign` folder, located in the Package Explorer pane on the left side
    of the IDE. Select the **New ➤ Android XML File** menu sequence, as shown in Figure
    [3-3](#A978-1-4302-5786-8_3_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_3_Fig3_HTML.jpg](A978-1-4302-5786-8_3_Fig3_HTML.jpg)


    *Figure 3-3. Right-clicking the GraphicDesign project folder to bring up the **New
    ➤ Android XML File** menu sequence*


    Once the New Android XML File dialog opens, select the Drawable resource type
    from the top drop-down menu selector, as shown in Figure [3-4](#A978-1-4302-5786-8_3_Chapter.html#Fig4).
    Next, name the file `anim_intro` and select the `animation-list` tag from the
    Root Element list near the bottom of the dialog. The Project name should be set
    automatically for you. Once everything’s complete, click the Finish button.


    ![A978-1-4302-5786-8_3_Fig4_HTML.jpg](A978-1-4302-5786-8_3_Fig4_HTML.jpg)


    *Figure 3-4. Setting parameters for the new XML file, `anim_intro.xml`*


    Notice that you did not have to specify the `.xml` file extension on the name
    that you gave for the file; Eclipse will add this in for you. When you click the
    Finish button, Eclipse will open up the `anim_intro.xml` file in the central editing
    pane, and you can see in Figure [3-5](#A978-1-4302-5786-8_3_Chapter.html#Fig5)
    that the XML file type declarations and the XML naming schema (`xmlns`) URL have
    been added for you automatically. Next, all you have to do is to add parameters
    to the parent `<animation-list>` tag, and add child `<item>` tags for your animation
    frames.


    ![A978-1-4302-5786-8_3_Fig5_HTML.jpg](A978-1-4302-5786-8_3_Fig5_HTML.jpg)


    *Figure 3-5. New `anim_intro.xml` file opened up for you in Eclipse, with `animation-list`
    parent container tag in place*


    Place your cursor right after the end of the `android:xmlns` parameter declaration,
    after the final (ending) quotation mark, and hit return. Eclipse will auto-indent
    your next line of code for you; pretty cool.


    Type in the word `android` for the next parameter, and then hit the colon key,
    and up pops a helper dialog containing all of the potential parameter options
    for the `<animation-list>` tag, also a very cool and useful feature.


    Find the `android:oneshot` parameter (it should be the last one on the list);
    double-click it to select and add it to the `<animation-list>` tag as a parameter.
    This is shown in Figure [3-6](#A978-1-4302-5786-8_3_Chapter.html#Fig6), right
    before the double-click adds the `android:oneshot` parameter into your parent
    container tag.


    You will notice that you still have to enter the boolean value, which is required
    for this parameter, as there will be quote marks provided, but nothing inside
    of them. You will then enter either `true` if you want your animation to play
    only once, or `false`, if you want your animation to loop continuously. Next,
    you need to specify frames using `<item>` child tags.


    ![A978-1-4302-5786-8_3_Fig6_HTML.jpg](A978-1-4302-5786-8_3_Fig6_HTML.jpg)


    *Figure 3-6. Typing `android:` will bring up an Eclipse helper dialog containing
    `animation-list` tag parameter options*


    Place your cursor at the end of the `<animation-list>` tag, after the `>` character,
    and hit return to make Eclipse auto-indent your first `<item>` tag for you. Type
    in the following line of XML markup to specify your first frame of animation using
    the `android:drawable` source file reference parameter and `android:duration`
    frame duration value:


    ```

    <item android:drawable="@drawable/pag0" android:duration="112" />

    ```'
