    # 排版后的文档


    父（外部）标签中的第一个参数称为 `xmlns:android` 参数，该参数为扩展标记语言命名模式（XMLNS）设置了一个 URL。这样做是为了确保此文件中使用的其他标签和参数可以被验证为正确的，即符合
    `RelativeLayout` 容器的 XML 模式。如果该 URL 不存在，Eclipse 会在无法验证的每个标签参数下方添加波浪形的红色下划线。


    还有一个 `xmlns:tools` 的 URL 引用，其用途与 `xmlns:android` 参数对于以 `android:` 开头的参数的作用大致相同，只是
    `xmlns:tools` 是针对以 `tools:` 前缀开头的参数（例如 `tools:context` 参数）起作用的，你将在 `<RelativeLayout>`
    容器父标签的最后看到这个参数。


    还有 `android:layout_width` 和 `android:layout_height` 参数，你需要将它们设置为 `match_parent`。这确保了布局容器能够缩放以适应显示屏，该显示屏就是此布局容器的父容器。


    还有一些默认的 `android:padding` 参数，正如你所看到的，它们引用了 `values` 文件夹中的一个 `dimen.xml` 文件，以及一个
    `tools:context` 参数，该参数将此上下文声明为你的 `MainActivity.java` 代码。


    ![A978-1-4302-5786-8_2_Fig8_HTML.jpg](img/A978-1-4302-5786-8_2_Fig8_HTML.jpg)


    图 2-8.


    点击中央编辑面板底部的 `activity_main.xml` 选项卡，以显示 XML 标记


    `TextView` 标签是一个子标签，因为它包含（嵌套）在 `RelativeLayout` 容器内。该标签还包含设置为 `wrap_content` 的
    `android:layout_width` 和 `android:layout_height` 参数，这确保了 UI 元素能够适应其内部的内容。


    注意，`wrap_content` 本质上与 `match_parent` 参数完全相反，后者所做的恰恰相反，它会扩展以填充外部的内容，而不是收缩以适配内部的内容。


    最后，在 `TextView` 标签内部有一个 `android:text` 参数，它使用 `@string/` 路径指向 `hello_world` `<string>`
    标签名和 `Hello World` 值，引用了 `values` 文件夹中的 `strings.xml` 文件。


    ## 创建你的视频启动画面用户界面设计


    当你在 `activity_main.xml` 用户界面布局容器中时，让我们将 `RelativeLayout` 父标签改为 `FrameLayout` 父标签，并将
    `TextView` UI 元素改为 `VideoView` UI 元素或小部件（参见图 2-9）。


    ![A978-1-4302-5786-8_2_Fig9_HTML.jpg](img/A978-1-4302-5786-8_2_Fig9_HTML.jpg)


    图 2-9.


    将 `RelativeLayout` 容器标签改为 `FrameLayout`，将 `TextView` UI 元素改为 `VideoView`


    你的 `VideoView` 要使用 `FrameLayout` 用户界面设计容器的原因在于，当 `VideoView` 被 Android 缩放时，放置在
    `FrameLayout` 内的 `VideoView` 能够保持其宽高比。本书后面部分我将向你展示如何缩放视频以适应不同宽高比的屏幕，前提是你进行非宽高比缩放的内容不易出现明显变形（例如，访谈头部特写视频就很容易出现变形）。


    将 `RelativeLayout` 的开始和结束标签改为 `FrameLayout`，并保留 `xmlns:android` 和 `android:layout`
    参数（你现在知道这些是必需的）。然后，将 `TextView` 子标签改为 `VideoView`，并将其 `android:id` 改为 `@+id/splashScreenVideo`。删除
    `android:text` 参数及其引用，因为你将在 `VideoView` UI 小部件中不会用到它。


    现在你已经准备好看看你的 Java 代码将如何实现你的 UI 了！


    ## 查看你的 MainActivity.java 活动子类


    为了彻底起见，既然你正在检查“新建 Android 应用程序”系列对话框为你创建的内容，那么我们也来看看你的 Java 代码吧。为此，在包资源管理器中右键单击
    `/src/pro.android.graphics` 文件夹下的 `MainActivity.java` 文件，然后选择“打开”选项，或者如果你愿意，也可以左键单击并按
    F3 键。


    在图 2-10 中，IDE 左侧的包资源管理器窗格中高亮显示了该文件，并且它已经在 Eclipse 中央代码编辑面板中打开以供编辑。请注意，你的应用程序包名已被声明，并且必要的
    Android 类也已通过使用带包名的 `import` 语句被导入。


    ![A978-1-4302-5786-8_2_Fig10_HTML.jpg](img/A978-1-4302-5786-8_2_Fig10_HTML.jpg)


    图 2-10.


    查看由“新建 Android 应用程序”对话框生成的 Java Activity 子类代码


    请注意，`MainActivity` 扩展了 Android 的 `Activity` 类，使其成为一个 `Activity` 子类，并且已经为你编写了一个
    `onCreate()` 方法，该方法使用以下代码调用 `Activity` 超类的 `.onCreate()` 方法：


    ```

    super.onCreate(savedInstanceState);

    ```


    这段代码创建了一个 `Activity`，并传递了一个包含系统设置的 `Bundle` 对象，该对象用于你的 `Activity`，逻辑上被命名为 `savedInstanceState`。


    使用这个 `Bundle` 对象是为了，如果这个 `Activity` 需要被操作系统终止（以回收内存资源），它可以在需要时从上次离开的地方重新启动，而用户对此毫无察觉。`onCreate()`
    方法中的第二行代码将你的应用程序的 `ContentView` 设置为你定义的 `activity_main.xml`。这是通过调用 `setContentView()`
    方法并引用项目 `/res/layout` 文件夹中的 XML 定义资源（`R` 代表资源）来实现的，该资源文件名为 `activity_main.xml`。

