- fmt: '如果您在嵌套的 UI 容器中使用了 `android:layout_weight` 参数，就会出现此特定警告。这是因为当涉及权重时，`LinearLayout`
    被设置为在内部计算子容器的基线对齐。由于您的子容器的 `layout_height` 常量设置为 `match_parent`，它们的基线无论如何都会对齐，因此该警告建议您关闭此功能，以便
    Android 操作系统不会花费处理时间来执行此不必要或冗余的操作。


    现在，您可以将另外四个 `TextView` UI 容器添加到第二个嵌套的 `LinearLayout` 容器中，这将消除最后的警告高亮，并允许您测试基本
    UI 布局，查看是否需要添加其他参数（例如 `layout_margin` 参数）来微调它。


    最简单的方法是复制第一个嵌套 `LinearLayout` 中的四个 `TextView` 标签，将它们粘贴到第二个嵌套 UI 容器中，然后将 `android:text`
    参数引用值从 `chap` 更改为 `page`。


    ![A978-1-4302-5786-8_6_Fig19_HTML.jpg](A978-1-4302-5786-8_6_Fig19_HTML.jpg)


    **图 6-19.** 将剩余的 `TextView` 标签添加到第二个嵌套的 `LinearLayout` 容器中


    现在，您可以使用 XML 编辑窗格左下角的 **GLE** 选项卡来预览您的 UI 设计。这是一种快捷方式，可让您避免采用耗时的“作为 Android 应用程序运行”工作流程并调用
    Nexus One 模拟器，除非您在配备 16GB 内存和超快速 SSD 的 8 核工作站上进行开发，否则加载可能需要很长时间！


    如图 [6-20](#A978-1-4302-5786-8_6_Chapter.html#Fig20) 所示，您的嵌套 UI 容器完全按照您的意图工作：将
    `TextView` UI 元素分组到两个独立的列中，就像目录的配置方式一样。


    您需要在第一个嵌套布局的顶部和左侧以及第二个嵌套布局的顶部添加一些边距（以匹配第一个顶部边距对齐），并且看起来您还应该将布局权重分布从 80%/20% 混合比例更改为
    75%/25% 混合比例，以使它们更靠近一些。


    让我们添加 `layout_marginTop` 和 `layout_marginLeft` 参数来进一步优化您的嵌套 `LinearLayout`，以完善您的
    UI 设计。


    ![A978-1-4302-5786-8_6_Fig20_HTML.jpg](A978-1-4302-5786-8_6_Fig20_HTML.jpg)


    **图 6-20.** 使用图形布局编辑器选项卡预览您的 UI 设计，这样就不必调用模拟器


    由于您想要在屏幕左侧添加空间，以使 `TextView` 元素不接触屏幕左侧（就像现在这样），您需要向第一个（左侧）`LinearLayout` 容器添加一个
    `android:layout_marginLeft="10dip"` 参数，如图 [6-21](#A978-1-4302-5786-8_6_Chapter.html#Fig21)
    所示。


    您将此参数添加到 `LinearLayout` 容器父标签而不是每个单独的 `TextView` 用户界面元素（这也可以工作）的原因是，`TextView`
    是 `LinearLayout` 的子元素，因此您只需移动父元素，其所有子元素将随之移动。


    接下来，您想要做同样的事情，只是在 UI 屏幕顶部添加空间，以便 `TextView` 元素不接触屏幕顶部。向同一个 `LinearLayout` 容器添加一个类似的
    `android:layout_marginTop="10dip"` 边距参数，以将容器的内容（章节标题）在显示屏上向下移动一点。


    最后，您需要将右侧 `LinearLayout` 容器的顶部向下移动，以匹配对左侧 `LinearLayout` 容器所做的操作，因此从第一个 `LinearLayout`
    标签中剪切并粘贴 `android:layout_marginTop="10dip"` 参数到第二个标签中，以复制相同的 DIP 对齐。


    既然您已经将嵌套 UI 容器的边界推离屏幕边缘，接下来要做的就是通过调整 `android:layout_weight` 参数为 75%/25% 混合比例而不是最初尝试的
    80%/20% 混合比例，来调整左右嵌套容器之间的间距。这将有助于将屏幕的右侧向左侧（和中间）拉近。只要这两个值加起来为 100%，您就可以调整它们，直到获得您想要的确切间距结果。


    ![A978-1-4302-5786-8_6_Fig21_HTML.jpg](A978-1-4302-5786-8_6_Fig21_HTML.jpg)


    **图 6-21.** 添加 `marginTop` 和 `marginLeft` 参数并更改 `android:weight` 值以微调间距


    添加这些顶部和左边距参数以及调整权重参数的结果，可以在图 [6-22](#A978-1-4302-5786-8_6_Chapter.html#Fig22)
    中看到。在单击 **GLE** 选项卡之前，我特意在 XML 编辑器中保留了选中的左侧 UI 容器，以便可以在图 [6-22](#A978-1-4302-5786-8_6_Chapter.html#Fig22)
    中看到布局容器的边界。


    要执行此操作，请将光标放在 XML 编辑窗格中您希望在切换到 GLE 时显示为选中的标签内。请确保在单击位于中央编辑窗格左下角的“图形布局”选项卡之前执行此操作。


    在两种编辑视图之间切换时，您在 XML 编辑模式下最后处理的内容将在另一种图形布局编辑模式中显示为高亮或选中。


    这个有价值的小技巧表明，您不仅可以在 GLE 中选择和检查 UI 元素的边界，还可以选择和检查它们所在的布局容器。请密切关注 Eclipse IDE 的功能！


    ![A978-1-4302-5786-8_6_Fig22_HTML.jpg](A978-1-4302-5786-8_6_Fig22_HTML.jpg)


    **图 6-22.** 在 Eclipse 的图形布局编辑器中检查新的权重和边距参数设置


    现在，您需要做的就是添加十几行 Java 代码，这些代码将获取用户的菜单选择，然后启动新的 Activity。在这种情况下，就是您之前创建的 `ContentsActivity.java`
    类。


    一旦您实现了 `onOptionsItemSelected()` 方法（这是完成菜单导航实现所必需的），您就可以在 Nexus One 模拟器内测试您新的
    `LinearLayout` UI 设计了。'
  raw: 'This particular warning will appear if you use the `android:layout_weight`
    parameter inside a nested UI container. This is because a LinearLayout is set
    to internally calculate child container baseline alignment when weights are involved.
    Since your child containers layout_height constants are set to match_parent, their
    baselines will be aligned anyway, so the warning suggests that you turn off this
    feature so that the Android OS does not take the processing time to do this needlessly
    or redundantly.


    Now you can add four more TextView UI containers to your second nested LinearLayout
    container, which will eliminate the final warning highlight and allow you to test
    the basic UI layout and see if you need to add any other parameters, such as layout_margin
    parameters, to fine-tune it.


    The easiest way to do this is to copy the four TextView tags from the first nested
    LinearLayout and paste them into the second nested UI container, changing the
    android:text parameter reference values from chap to page.


    ![A978-1-4302-5786-8_6_Fig19_HTML.jpg](A978-1-4302-5786-8_6_Fig19_HTML.jpg)


    Figure 6-19.


    Adding the rest of the TextView tags to the second nested LinearLayout container


    Now you can use the GLE tab at the bottom-left of the XML editing pane to preview
    your UI design. This is a shortcut that allows you to not have to take the time
    consuming Run As Android Application work process and invoke the Nexus One emulator,
    which unless you are developing on an 8-core workstation with 16GB of memory and
    a hyper-fast SSD, can take a very long time to load!


    As you can see in Figure [6-20](#A978-1-4302-5786-8_6_Chapter.html#Fig20), your
    nested UI containers are doing exactly what you intended them to do: grouping
    your TextView UI elements together in two discrete columns, just like a Table
    of Contents would be configured.


    You need to add some margins to the top and left of the first nested layout and
    to the top of the second one (to match the first top margin alignment), and it
    also looks like you should change your layout weight distribution from an 80%/20%
    mix to a 75%/25% mix to bring them a bit closer together.


    Let’s add in `layout_marginTop` and `layout_marginLeft` parameters to refine your
    nested LinearLayouts a bit more in order to perfect your UI design.


    ![A978-1-4302-5786-8_6_Fig20_HTML.jpg](A978-1-4302-5786-8_6_Fig20_HTML.jpg)


    Figure 6-20.


    Using Graphical Layout Editor tab to preview your UI design so you don''t have
    to invoke the emulator


    Since you want to add space on the left of the screen so that the TextView elements
    to not touch the left side of the screen, as they are now, you need to add an
    `android:layout_marginLeft="10dip"` parameter to the first (left) LinearLayout
    container, as shown in Figure [6-21](#A978-1-4302-5786-8_6_Chapter.html#Fig21).


    The reason that you’re adding this to the LinearLayout container parent tag and
    not to every single TextView user interface element (which should also work) is
    because the TextViews are children of the LinearLayout, so you can just move the
    parent, and all of its children will move along with it.


    Next, you want to do the same thing, only adding space to the top of the UI screen,
    so that the TextView elements don’t touch the top of the screen. Add a similar
    `android:layout_marginTop="10dip"` margin parameter to the same LinearLayout container
    in order to bring the container’s contents (the chapter titles) down a little
    bit on the display screen.


    Finally, you need to bring the top of the right LinearLayout container down to
    match what you have done to the left LinearLayout container, so cut and paste
    the android:layout_marginTop=“10dip” parameter from the first Linear Layout tag
    into the second one to duplicate the same DIP alignment.


    Now that you have pushed the borders of the nested UI containers away from the
    side of the screen, all you have to do is adjust the spacing between the left
    and right nested containers by tweaking the `android:layout_weight` parameters
    to be a 75%/25% mix rather than the 80%/20% mix you tried first. This will serve
    to bring the right side of the screen closer to the left (and middle). You can
    tweak these two values, as long as they sum up to be 100%, until you get exactly
    the spacing result that you are looking for.


    ![A978-1-4302-5786-8_6_Fig21_HTML.jpg](A978-1-4302-5786-8_6_Fig21_HTML.jpg)


    Figure 6-21.


    Adding marginTop and marginLeft parameters and changing android:weight value to
    fine-tune spacing


    The results of adding these top and left margin parameters, and tweaking the weight
    parameters, can be seen in Figure [6-22](#A978-1-4302-5786-8_6_Chapter.html#Fig22).
    I specifically left the left UI container selected in the XML editor, before I
    clicked the GLE tab, so that the layout container’s boundary could be seen in
    Figure [6-22](#A978-1-4302-5786-8_6_Chapter.html#Fig22).


    To do this, put your cursor inside the tag in the XML editing pane that you want
    to show as selected when you switch over into the GLE. Be sure to do this before
    you click the Graphical Layout tab, which is located at the bottom-left of the
    central editing pane.


    Once you switch between the two editing vides, what you were last working on in
    XML editing mode will be shown as highlighted or selected in the other Graphical
    Layout Editing mode.


    This valuable little trick shows that you can not only select and examine the
    bounds of your UI elements in the GLE, but also the layout containers in which
    they live. Pay close attention to the Eclipse IDE features!


    ![A978-1-4302-5786-8_6_Fig22_HTML.jpg](A978-1-4302-5786-8_6_Fig22_HTML.jpg)


    Figure 6-22.


    Checking your new weight and margin parameter settings in the Graphical Layout
    Editor in Eclipse


    Now, all you need to do is add in a dozen or so lines of Java code that will take
    your user’s menu selections and then launch new Activities. In this case, it’s
    the `ContentsActivity.java` class that you created earlier.


    Once you implement the `onOptionsItemSelected()` method, which will be needed
    to accomplish your menu navigation implementation, you will then be able to test
    your new LinearLayout UI design inside the Nexus One emulator.'
  trans: '

    如果您在嵌套的 UI 容器中使用了 `android:layout_weight` 参数，就会出现此特定警告。这是因为当涉及权重时，`LinearLayout`
    被设置为在内部计算子容器的基线对齐。由于您的子容器的 `layout_height` 常量设置为 `match_parent`，它们的基线无论如何都会对齐，因此该警告建议您关闭此功能，以便
    Android 操作系统不会花费处理时间来执行此不必要或冗余的操作。


    现在，您可以将另外四个 `TextView` UI 容器添加到第二个嵌套的 `LinearLayout` 容器中，这将消除最后的警告高亮，并允许您测试基本
    UI 布局，查看是否需要添加其他参数（例如 `layout_margin` 参数）来微调它。


    最简单的方法是复制第一个嵌套 `LinearLayout` 中的四个 `TextView` 标签，将它们粘贴到第二个嵌套 UI 容器中，然后将 `android:text`
    参数引用值从 `chap` 更改为 `page`。


    ![A978-1-4302-5786-8_6_Fig19_HTML.jpg](img/A978-1-4302-5786-8_6_Fig19_HTML.jpg)


    **图 6-19.** 将剩余的 `TextView` 标签添加到第二个嵌套的 `LinearLayout` 容器中


    现在，您可以使用 XML 编辑窗格左下角的 **GLE** 选项卡来预览您的 UI 设计。这是一种快捷方式，可让您避免采用耗时的“作为 Android 应用程序运行”工作流程并调用
    Nexus One 模拟器，除非您在配备 16GB 内存和超快速 SSD 的 8 核工作站上进行开发，否则加载可能需要很长时间！


    如图 6-20 所示，您的嵌套 UI 容器完全按照您的意图工作：将 `TextView` UI 元素分组到两个独立的列中，就像目录的配置方式一样。


    您需要在第一个嵌套布局的顶部和左侧以及第二个嵌套布局的顶部添加一些边距（以匹配第一个顶部边距对齐），并且看起来您还应该将布局权重分布从 80%/20% 混合比例更改为
    75%/25% 混合比例，以使它们更靠近一些。


    让我们添加 `layout_marginTop` 和 `layout_marginLeft` 参数来进一步优化您的嵌套 `LinearLayout`，以完善您的
    UI 设计。


    ![A978-1-4302-5786-8_6_Fig20_HTML.jpg](img/A978-1-4302-5786-8_6_Fig20_HTML.jpg)


    **图 6-20.** 使用图形布局编辑器选项卡预览您的 UI 设计，这样就不必调用模拟器


    由于您想要在屏幕左侧添加空间，以使 `TextView` 元素不接触屏幕左侧（就像现在这样），您需要向第一个（左侧）`LinearLayout` 容器添加一个
    `android:layout_marginLeft="10dip"` 参数，如图 6-21 所示。


    您将此参数添加到 `LinearLayout` 容器父标签而不是每个单独的 `TextView` 用户界面元素（这也可以工作）的原因是，`TextView`
    是 `LinearLayout` 的子元素，因此您只需移动父元素，其所有子元素将随之移动。


    接下来，您想要做同样的事情，只是在 UI 屏幕顶部添加空间，以便 `TextView` 元素不接触屏幕顶部。向同一个 `LinearLayout` 容器添加一个类似的
    `android:layout_marginTop="10dip"` 边距参数，以将容器的内容（章节标题）在显示屏上向下移动一点。


    最后，您需要将右侧 `LinearLayout` 容器的顶部向下移动，以匹配对左侧 `LinearLayout` 容器所做的操作，因此从第一个 `LinearLayout`
    标签中剪切并粘贴 `android:layout_marginTop="10dip"` 参数到第二个标签中，以复制相同的 DIP 对齐。


    既然您已经将嵌套 UI 容器的边界推离屏幕边缘，接下来要做的就是通过调整 `android:layout_weight` 参数为 75%/25% 混合比例而不是最初尝试的
    80%/20% 混合比例，来调整左右嵌套容器之间的间距。这将有助于将屏幕的右侧向左侧（和中间）拉近。只要这两个值加起来为 100%，您就可以调整它们，直到获得您想要的确切间距结果。


    ![A978-1-4302-5786-8_6_Fig21_HTML.jpg](img/A978-1-4302-5786-8_6_Fig21_HTML.jpg)


    **图 6-21.** 添加 `marginTop` 和 `marginLeft` 参数并更改 `android:weight` 值以微调间距


    添加这些顶部和左边距参数以及调整权重参数的结果，可以在图 6-22 中看到。在单击 **GLE** 选项卡之前，我特意在 XML 编辑器中保留了选中的左侧
    UI 容器，以便可以在图 6-22 中看到布局容器的边界。


    要执行此操作，请将光标放在 XML 编辑窗格中您希望在切换到 GLE 时显示为选中的标签内。请确保在单击位于中央编辑窗格左下角的“图形布局”选项卡之前执行此操作。


    在两种编辑视图之间切换时，您在 XML 编辑模式下最后处理的内容将在另一种图形布局编辑模式中显示为高亮或选中。


    这个有价值的小技巧表明，您不仅可以在 GLE 中选择和检查 UI 元素的边界，还可以选择和检查它们所在的布局容器。请密切关注 Eclipse IDE 的功能！


    ![A978-1-4302-5786-8_6_Fig22_HTML.jpg](img/A978-1-4302-5786-8_6_Fig22_HTML.jpg)


    **图 6-22.** 在 Eclipse 的图形布局编辑器中检查新的权重和边距参数设置


    现在，您需要做的就是添加十几行 Java 代码，这些代码将获取用户的菜单选择，然后启动新的 Activity。在这种情况下，就是您之前创建的 `ContentsActivity.java`
    类。


    一旦您实现了 `onOptionsItemSelected()` 方法（这是完成菜单导航实现所必需的），您就可以在 Nexus One 模拟器内测试您新的
    `LinearLayout` UI 设计了。

