    ![A978-1-4302-5786-8_2_Fig10_HTML.jpg](A978-1-4302-5786-8_2_Fig10_HTML.jpg)


    Figure 2-10.


    Examining the Java Activity subclass code generated by the New Android Application
    dialogs


    Notice that MainActivity extends the Android Activity class, making it an Activity
