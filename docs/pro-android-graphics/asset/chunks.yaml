    现在，我们的`LayerDrawable`对象 XML 定义已连接好可供查看，并且我们已进入 Eclipse IDE 的正确区域，可以访问图形布局编辑器选项卡，如图
    12-6 中 XML 编辑屏幕底部所示。


    ![A978-1-4302-5786-8_12_Fig6_HTML.jpg](img/A978-1-4302-5786-8_12_Fig6_HTML.jpg)

