    # 将 Drawable 转换为 BitmapDrawable 并提取 Bitmap


    为了获取 `Bitmap` 对象数据以利用现有的 PorterDuff 图像混合管线，下一步是再次将该 `Drawable` 对象转换为 `BitmapDrawable`
    对象。这样做的目的是能够使用 `.getBitmap()` 方法从 `BitmapDrawable` 对象中提取 `Bitmap` 对象，而所有这些操作只需一行
    Java 代码即可完成，如下所示：


    `Bitmap composite = ((BitmapDrawable)layerOne).getBitmap();`


    这段极为简洁的 Java 代码的作用是：创建一个名为 `composite` 的 `Bitmap` 对象，然后将该 `Bitmap` 对象赋值为（或载入）你之前实例化的名为
    `layerOne` 的 `Drawable` 对象，接着使用点表示法调用 `.getBitmap()` 方法，该方法会获取 `Drawable` 对象中的
    `Bitmap`（该对象现在实际上已被转换为 `BitmapDrawable` 对象），并将该数字图像数据加载到名为 `composite` 的 `Bitmap`
    对象中。如图 12-14 所示，你还需要将鼠标悬停在错误高亮提示上，以便 Eclipse 为你自动编写 `Import BitmapDrawable` `(android.graphics.drawable)`
    的 Java 语句。


    ![A978-1-4302-5786-8_12_Fig14_HTML.jpg](img/A978-1-4302-5786-8_12_Fig14_HTML.jpg)


    **图 12-14.** 将 `Drawable` 转换为 `BitmapDrawable`，然后使用 `.getBitmap()` 方法将其转换为 `Bitmap`
    对象


    现在，你的复合 `Bitmap` 对象已经载入了 `layerOne` `Drawable` 对象（该对象此前已载入了你最终希望在 PorterDuff 混合管线中使用的
    `LayerDrawable` 图层），接下来可以创建一个可变的 `Bitmap` 对象（在内存中），以便对其进行处理！


    你已经知道如何使用 `.copy()` 方法创建可变的 `Bitmap` 对象，只需指定一个基于 `Bitmap` 类调用的 `Config.ARGB_8888`
    常量即可。以防你忘记了其在 Java 中的结构，代码如下：


    `Bitmap mutableComposite = composite.copy(Bitmap.Config.ARGB_8888, true);`


    现在你已经到达了 PorterDuff 图像混合章节中所涉及的最终可变 `Bitmap` 对象“目的地”，因此接下来的所有操作就是：在你现有的 PorterDuff
    图像混合（以及像素传输）管线中，用 `mutableComposite` `Bitmap` 对象替换 `mutableForegroundImage` 或
    `mutableBackgroundImage` 对象的引用。


    如图 12-15 所示，我尚未完成此操作，因此你会看到 `mutableComposite` `Bitmap` 对象上标有波浪形黄色下划线警告提示，表示该对象目前未被使用，直到我将其接入渲染管线（接下来你将执行此操作）。


    ![A978-1-4302-5786-8_12_Fig15_HTML.jpg](img/A978-1-4302-5786-8_12_Fig15_HTML.jpg)


    **图 12-15.** 使用 `.copy()` 方法并指定 `ARGB_8888` 创建名为 `mutableComposite` 的可变 `Bitmap`
    对象


    接下来，让我们用你的 `mutableComposite` 对象（实际上是 LayerDrawable 转换为 Drawable 再转换为 BitmapDrawable
    最终转换为 Bitmap 的转换对象）替换 `foregroundImage` 和 `mutableForegroundImage` 对象。你应该将这些对象从
    Java 代码中注释掉，这样它们在你暂时搁置时就不会占用任何系统内存。你可以在图 12-16 中看到你执行的注释操作以绿色显示；只需在每行代码开头加上两个斜杠，它们就会从
    Android 的视野中消失！


    接下来，让我们修改你的 PorterDuff 管线，使其引用你转换后的 `LayerDrawable`，并将图层合成整合到你的图像混合 Java 代码中！


    ## 修改 PorterDuff 管线以使用 LayerDrawable


    让我们替换你之前创建并刚刚从 Java 代码中（暂时）注释掉的 `mutableForegroundImage` 对象，将其放入现有的 `compositeImage`
    `Bitmap` 对象中。该对象由你的 `imageCanvas` `Canvas` 对象引用。你将使用以下 Java 代码行完成此操作：


    `Bitmap compositeImage = Bitmap.createBitmap(mutableComposite);`


    这行代码的作用是：将定义在 `LayerDrawable` 对象 `layerThree` 中的可绘制图像资源（即 `bookmark0.jpg` 图像资源）整合到图像混合
    PorterDuff 管线中。如图 12-16 所示，你的代码没有错误，已准备好可在 Nexus One 模拟器中进行测试。如果算上被注释掉的代码行，你仅用了
    15 行（密集的）Java 代码就实现了图层支持和图像混合。


    ![A978-1-4302-5786-8_12_Fig16_HTML.jpg](img/A978-1-4302-5786-8_12_Fig16_HTML.jpg)


    **图 12-16.** 修改 `compositeImage` `Canvas` 目标，使其引用你的 `LayerDrawable` `mutableComposite`
    `Bitmap`


    现在，是时候检查你的数字图像合成管线 Java 代码是否真正生效了！使用 **Run As ➤ Android Application** 工作流程启动你的
    Nexus One 模拟器。应用程序加载后，点击 **MENU** 按钮并选择 **Table of Contents** 菜单选项。让我们查看一下你的数字图像图层混合与合成结果。你将尝试使用一个像素传输模式和一个图像混合模式来测试两者！


    如图 12-17 所示，你在 `paintObject` `Paint` 对象中设置的 `PorterDuff.Mode.SCREEN` 常量，正通过 `LayerDrawable`
    对象中的 `layerThree` 图层完美运行——该 `LayerDrawable` 对象是你在本章前面使用 `contents_layer.xml` 文件及其
    `<layer-list>` 父标签 XML 定义创建的。


    ![A978-1-4302-5786-8_12_Fig17_HTML.jpg](img/A978-1-4302-5786-8_12_Fig17_HTML.jpg)


    **图 12-17.** 使用混合与传输模式测试现有 PorterDuff 管线中的 `LayerDrawable` 资源


    接下来，让我们将此 `PorterDuff.Mode` 常量更改为 `XOR` 常量，并确保像素混合也能正常工作。如图 12-17 右侧所示，`XOR` 图像传输模式也按预期运行，因此你已经通过使用
    `LayerDrawable` 对象实现了图像混合和像素传输。


    如果你仔细观察图 12-17 的左侧，会发现 `backgroundImage` 面板出现了一些问题。你的 `cloudsky.jpg` 不再像 **Graphical
    Layout Editor** 预览中那样缩放到适合 `ImageView` UI 显示容器。它使用了未缩放的原始图像像素，因此，在你从 `LayerDrawable`
    中提取的书签前景图像后面，只能看到 `CloudSky` 图像左上角 (0,0) 位置的云朵。


    让我们调整一些设置，看看能否找出为什么你的一个合成图像资源在 PorterDuff 渲染管线中缩放比例发生了变化。目前看来，我找不到发生这种情况的明显原因，但让我们稍微调整一下并进行调查！

    '
- fmt: '# Switch LayerDrawable Image Asset: Source to Destination


    So let''s try switching your source and destination image plates, so that the
    `mutableComposite` (a cast `LayerDrawable`) is called in the `.drawBitmap()` method
    along with the `paintObject`, and put the `mutableForegroundImage` into the `.createBitmap()`
    method, called off of the `compositeImage Bitmap` object that is used in the `Canvas`
    object as its canvas (surface) image data. This switch can be seen in Figure [12-18](#A978-1-4302-5786-8_12_Chapter.html#Fig18);
    also, notice that we have commented out the `backgroundImage` and `mutableBackgroundImage`
    `Bitmap` objects.


    ![A978-1-4302-5786-8_12_Fig18_HTML.jpg](A978-1-4302-5786-8_12_Fig18_HTML.jpg)


    **Figure 12-18.** Switching the `mutableComposite LayerDrawable` cast `Bitmap`
    into the `.drawBitmap()` method


    Now, uncomment your `foregroundImage` and `mutableForegroundImage` `Bitmap` objects
    so that you can temporarily use your bookmark PNG for both your source and destination
    digital image compositing plates. You are doing this so that you can visualize
    exactly what will happen when you use the same image in both source and destination
    image plates inside the digital image compositing pipeline that you have coded.


    As you can see in Figure [12-19](#A978-1-4302-5786-8_12_Chapter.html#Fig19), one
    of the `bookmark0` PNG image datasets is getting scaled to fit the `ImageView`
    UI container and the other one, which is exactly the same data, shows the raw,
    unscaled source pixels, displayed pixel-for-pixel using the image origin of `0,0`
    and with zero scaling.


    This allows you to see a couple of things here. One is the quality of the image
    scaling using the same image within one composite, both scaled and unscaled. The
    scaling actually looks pretty decent to me! Two, this shows some of the cool special
    imaging effects that you can get by using the XOR pixel transfer mode, even using
    the same exact image data.


    ![A978-1-4302-5786-8_12_Fig19_HTML.jpg](A978-1-4302-5786-8_12_Fig19_HTML.jpg)


    **Figure 12-19.** Testing the `LayerDrawable` asset in a different `PorterDuff`
    pipeline plate with blend and transfer modes


    Let''s do some experimenting, and also see how to change the `LayerDrawable` object
    layer that you are referencing in your image compositing and blending pipeline.
    Change the `LayerDrawable` layer to use the background sky layer (named `layerOne`)
    instead of using the top-most layer, which uses the `bookmark0.png` as its image
    asset (named `layerThree`).


    ## Changing the LayerDrawable Layer Used in Our Pipeline


    Go back into your Java code; in the line of code that uses the method called `.findDrawableByLayerId()`,
    change its parameter from `layerThree` to `layerOne`, as shown in Figure [12-20](#A978-1-4302-5786-8_12_Chapter.html#Fig20).


    Notice that you have not changed the `Bitmap` objects that are referenced in the
    `.drawBitmap()` and `.createBitmap()` method calls because you want to only change
    one variable at a time and see the result; this time you are changing a `LayerDrawable`
    layer reference from `layerThree` to `layerOne`.


    This change is happening much "higher up" in your "processing chain," and shows
    that you can change `LayerDrawable` object layer references without having to
    touch any of your image compositing, blending, painting, drawing, transfer, canvas,
    or other core Java image processing pipeline code.


    ![A978-1-4302-5786-8_12_Fig20_HTML.jpg](A978-1-4302-5786-8_12_Fig20_HTML.jpg)


    **Figure 12-20.** Changing the `LayerDrawable` cast `Drawable` to reference `layerOne`
    using `.findDrawableByLayerId()`


    This changes your background plate, which is coming from the `LayerDrawable` and
    being called in the `imageCanvas` object''s `drawBitmap()` method call, and as
    you can see in Figure [12-21](#A978-1-4302-5786-8_12_Chapter.html#Fig21), in the
    middle rendered (OVERLAY Mode) view especially, an entire `cloudsky.jpg` sunset
    is now shown in the final render pipeline for your composite image. This proves
    that it is the `LayerDrawable` that is getting scaled, and the `Bitmap` composited
    plate image that is not.


    I''ve found that the best way to figure out why this may be happening is to work
    backwards (from the bottom of the code up, in this instance) from the `ImageView`,
    which we know scales an image both in XML (GLE) and in Java (in the emulator and
    on the device). So let''s trace things from the `ImageView`, and step our way
    backwards, up through the compositing rendering pipeline.


    The last line of rendering code calls the `.setImageBitmap()` method, which references
    the `compositeImage Bitmap` object. This method is called off of your `porterDuffImageComposite
    ImageView` object. This `compositeImage Bitmap` is wired into (is utilized by)
    the `imageCanvas Canvas` object (the engine).


    This `imageCanvas` object is then used to call a `.drawBitmap()` method, which
    references the `mutableComposite Bitmap` object. The `mutableComposite Bitmap`
    object references the composite `Bitmap` that was cast from a `BitmapDrawable`,
    which was cast from the `layerOne Drawable` object. The `layerOne Drawable` was
    cast from a `layerComposite layerDrawable` object, which was instantiated and
    loaded using a `.findDrawableByLayerId()` method.


    So, you have traced your `ImageView` source data back up through your rendering
    pipeline to the `LayerDrawable` object layer source image, which makes sense as
    this is the image source that is scaling correctly, which means that it is the
    `ImageView` object at the end of this pipeline that is most likely scaling this
    object.


    On the other hand, the other `Bitmap` object that you reference image data for
    directly, from the drawable resource folder, must be the image plate (source)
    that is not being scaled. Change the `PorterDuff.Mode` to `OVERLAY` and use the
    **Run As ➤ Android Application** work process to generate the view in the middle
    of Figure [12-21](#A978-1-4302-5786-8_12_Chapter.html#Fig21). The left side shows
    the XOR mode constant.


    ![A978-1-4302-5786-8_12_Fig21_HTML.jpg](A978-1-4302-5786-8_12_Fig21_HTML.jpg)


    **Figure 12-21.** Testing `LayerDrawable` and `PorterDuff` render pipelines using
    `layerOne` with blend and transfer modes


    Next, let''s switch the two `Bitmap` image references back the way that they were,
    with the `mutableComposite` inside the `Canvas` object `compositeImage` canvas
    image and the `mutableForegroundImage` inside the `drawBitmap()` method call,
    which invokes (applies) your `paintObject Paint` object to the `imageCanvas Canvas`
    object.


    As you can see on the right-hand side of Figure [12-21](#A978-1-4302-5786-8_12_Chapter.html#Fig21),
    switching the image plate referencing makes this bookmark image fit, and the `cloudsky`
    imagery scales pixel for pixel. Thus, what you analyzed seems to be exactly what
    is happening.


    By the way, we are using a `PorterDuff.Mode.SCREEN` constant to obtain the pixel-blending
    effect, which you see on the right-hand screen shot of the Nexus One emulator
    in Figure [12-21](#A978-1-4302-5786-8_12_Chapter.html#Fig21).


    The final Java code for this final image compositing pipeline testing scenario
    can be seen in Figure [12-22](#A978-1-4302-5786-8_12_Chapter.html#Fig22).


    ![A978-1-4302-5786-8_12_Fig22_HTML.jpg](A978-1-4302-5786-8_12_Fig22_HTML.jpg)


    **Figure 12-22.** Switching `mutableComposite` back to `compositeImage` and `mutableForegroundImage`
    to `drawBitmap()`


    The only thing left to do is to implement the entire rendering pipeline out of
    the `LayerDrawable` layers; however, I think I will make this into an exercise
    for the reader, just to make sure that everyone understands this entire pipeline
    and the casting and referencing processes within it.'
