    # 程序化动画时序：使用持续时间与偏移


    您可能想知道如何设置所有这些不同范围数据值之间所使用的时序。为某个范围设置时序值，在一定程度上也会定义在该范围内生成多少个插值数据点。需要注意的是，Android
    操作系统会根据设备的处理能力，以及它认为能提供**最优视觉效果与处理能力消耗比**或**权衡结果**的因素来决定这个数值。


    任何给定程序化动画范围值的持续时间，都通过 `duration` 参数设置，该参数接受一个以毫秒为单位的整数值。一毫秒是千分之一秒，而不是像听起来可能认为的百万分之一秒。包括
    Java 在内的大多数编程语言，在其所有时序函数和操作中都使用毫秒值。


    因此，如果你希望上一节讨论的淡出效果持续四秒钟，XML 参数应为 `android:duration="4000"`，因为四千毫秒等于四秒钟。如果你希望淡出效果持续
    4.352 秒，则应使用毫秒值 4352，这样你就能获得千分之一秒级别的精确度。


    你定义的每个变换（或 Alpha 混合）范围都有其独立的持续时间设置，这使得在 XML 标记定义中，能够以高精度实现你想要达到的效果。


    还有一个与时序相关的重要参数，它允许你延迟指定范围的开始播放时间。这被称为偏移，由 `startOffset` 参数数据值控制。


    假设你希望将四秒钟的淡出效果也延迟四秒钟。你只需在 `<alpha>` 父标签（你将在本章稍后部分实际用到它）中添加 `android:startOffset="4000"`，这样就能实现时序延迟控制。


    当 `startOffset` 参数与循环动画行为结合使用时，它会特别有用，我们接下来将要讨论循环动画。这是因为，在动画循环场景中使用时，`startOffset`
    参数将允许我们在每个动画元素的循环周期内定义一个暂停。接下来，让我们看看循环，以及可用于控制循环动画元素的参数。


    ## 程序化动画循环：repeatCount 与 repeatMode


    与帧动画类似，程序化动画可以播放一次后停止，也可以持续循环播放。有两个参数控制循环：一个控制动画是否循环，另一个控制动画循环的方式。


    控制动画或其组成部分循环次数的程序化动画参数称为 `repeatCount` 参数。该参数需要一个整数值。


    如果你在程序化动画定义中省略（即未指定）此 `repeatCount` 参数，动画将播放一次后停止，这意味着该参数的默认设置为 `android:repeatCount="1"`。该参数的一个例外值是常量
    `infinite`。因此，如果你希望动画无限循环，应使用 `android:repeatCount="infinite"` 设置。如果你好奇，预定义常量
    `infinite` 对应的数值是 -1，所以 `android:repeatCount="-1"` 同样有效。


    定义循环类型的参数是 `repeatMode` 参数。此参数可以设置为两个预定义常量之一；最常见的是 `restart`，它会使程序化动画无缝循环（除非你定义了
    `startOffset` 参数）。如果你好奇，预定义常量 `restart` 对应的数值是 1，所以 `android:repeatMode="1"` 同样有效。


    另一种动画循环模式是 `reverse`，也称为乒乓球动画，因为它会使动画在其范围结束时反向运行，直到再次回到起点，然后再正向运行。就像乒乓球游戏一样，来回往复。如果你好奇，预定义常量
    `reverse` 对应的数值是 2，所以 `android:repeatMode="2"` 同样有效。


    所有这些参数单独来看可能相当简单，但当它们结合到我们接下来要讨论的动画集合的复杂结构中时，很快就会变得非常复杂，并产生一些极其精细复杂的动画效果。因此，不要低估这些参数在精明开发者正确组合时所蕴含的力量。很快，你也会成为那位精明开发者，所以让我们来看看动画集合吧！

