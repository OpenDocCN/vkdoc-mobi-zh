    The image should now be four times smaller than it was originally, or two times
    smaller along each of the X and Y axis, as shown in Figure [5-3](#A978-1-4302-5786-8_5_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_5_Fig3_HTML.jpg](A978-1-4302-5786-8_5_Fig3_HTML.jpg)


    Figure 5-3.


    Using a File ➤ Export function to export the newly scaled 144 pixel XXHDPI application
    icon asset


    You are now ready to export the downsampled 144 pixel app launch icon file, using
    the File ➤ Export menu sequence. You are doing this so that you can give your
    XXHDPI app launcher icon file a file name that tells you later on the resolution
    of this digital image asset.


    If for some reason you are still using an older version of GIMP2, such as 2.6.12,
    then you would use the File ➤ Save As option, which was changed and became the
    File ➤ Export option as of GIMP2 version 2.8.0 and later.


    Selecting the Export option will bring up the Export Image dialog, which is shown
    in Figure [5-4](#A978-1-4302-5786-8_5_Chapter.html#Fig4). If you haven’t created
    a folder yet for your app icons, you can use the Create Folder button on the top-right
    of the dialog to do this now. I used it to create the /Icons folder under my Pro
    Android Graphics Design (PAGD) folder and its /CH05 sub-folder.


    ![A978-1-4302-5786-8_5_Fig4_HTML.jpg](A978-1-4302-5786-8_5_Fig4_HTML.jpg)


    Figure 5-4.


    Setting the launch_icon_pag_144.png file name and selecting export options in
    Export Image dialog


    Once you have a folder for your app icons, enter the descriptive file name `launch_icon_pag_144.png`
    in the Name: field at the top of the dialog. GIMP2 uses your file extension to
    determine which type of file format (codec) to use to save the file. You can also
    use the Select File Type (By Extension) widget at the bottom-left of the dialog
    to do this the long way. Once you have set everything, click the Export button
    at the bottom-right of the dialog, which will bring up the Export Image as PNG
    settings dialog, shown on the right side of the Figure [5-4](#A978-1-4302-5786-8_5_Chapter.html#Fig4)
    screen shot. Make sure that the Save resolution and the Save color values from
    transparent pixels are checked, and then set the Compression level slider to the
    maximum compression (9).


    You might be wondering why a lossless file format such as PNG32 has this compression
    level setting in GIMP2 at all, as one would expect this with JPEG but not with
    PNG; one would assume max compression would be a given. It turns out that it controls
    the speed of the lossless compression, much like when you use the ZIP compression
    algorithm, which is also lossless. With a ZIP utility, you define a trade-off
    between how long the compression process is going to take and how much better
    (slightly smaller files) job the compression algorithm is going to do in compressing
    it. Since 9 is the default value for this slider in GIMP2, I simply left it alone.
    Feel free to play around with this, and observe the results, later on, if you
    wish.'
  trans: '

    # 优化适用于 LDPI 到 XXXHDPI 的 Android 应用图标


    虽然我无法在这一章中优化本书将要使用的所有图形资源，但我将在此介绍如何使用开源数字成像软件包 `GIMP2` 对启动器图标进行降采样处理的工作流程。这是因为启动器图标是少数几个你需要为其创建全部五种可绘制目标级别的资源之一。你需要为应用启动器图标创建五个级别的原因是，在
    Android 平板电脑上，系统会从比应用其他可绘制资源高一级的文件夹中查找启动器图标。


    这意味着，为了支持 XHDPI（这是你始终需要支持的可绘制级别之一），你必须在 `XXHDPI` 文件夹中包含一个 144x144 像素的启动图标 `PNG32`
    文件。这样做是为了确保你的应用图标（即你的应用品牌标识）在较大的 Android 平板电脑（如 Google Nexus 10）上看起来清晰锐利。


    如果你的系统上还没有 `GIMP2`，请访问 [`www.gimp.org`](http://www.gimp.org/) 并为你的操作系统下载最新版本（目前是
    2.8.6）。


    安装并启动 `GIMP2` 后，使用 `文件` ➤ `打开` 菜单序列打开我们在第 3 章和第 4 章中使用的 Pro Android Graphics 标志的
    `PAG_logo_288.png` `PNG32` 文件。


    你可能想知道我为什么使用这个标志的 288 像素版本。这是因为在降采样到 Android 所需的五种不同图标大小时，这个特定的像素尺寸能够均匀地重新采样，也就是说，它不会为重采样算法留下余数（部分像素）。


    注意


    如果你想使用 XXXHDPI 来处理 4K iTV，则在以下工作流程中添加一个降采样到 192x192 像素的步骤。


    让我们来计算一下。XXHDPI 需要 144 像素，这是 288 的一半，即 2 倍降采样。XHDPI 需要 96 像素，这是 288 的三分之一，即 3
    倍降采样。HDPI 需要 72 像素，这是 144 像素的一半，也是 288 像素的四分之一，即 4 倍降采样。MDPI 需要 48 像素，这是 288 的六分之一，即
    6 倍降采样。LDPI 需要 36 像素，这是 288 的八分之一，即 8 倍降采样。


    如果你曾想以 576 像素来开发你的图标素材（这是 288 分辨率的两倍），那也是可行的，甚至可以以 1152 像素（这是 288 分辨率的四倍）来开发，如果你需要打印分辨率的图标资源的话。


    请注意，2 x 1152 等于 2304，这也恰好是常见的数码相机原生像素分辨率。记住，图像和视频（像素）缩放在使用 2 的幂次采样倍数（1-2-4-8-16-32
    等）时效果要好得多。


    当你的 288 像素启动图标标志在 `GIMP2` 中打开后，它应该看起来像图 5-1 中显示的屏幕截图。标志后面的棋盘格图案在 GIMP 中表示透明度，因此你可以看到我们只拥有应用图标的
    Pro Android Graphics 标志的像素。


    Android 建议使用 Alpha 通道为你的启动图标提供透明度，以防用户在 Android 设备上设置了壁纸或其他背景图像。


    现在，你已准备好将 288 像素的启动器图标图像缩小到其原始大小的一半，使用 `图像` 菜单和 `缩放图像` 选项，如图 5-1 所示。


    ![A978-1-4302-5786-8_5_Fig1_HTML.jpg](img/A978-1-4302-5786-8_5_Fig1_HTML.jpg)


    图 5-1.


    使用 `图像` ➤ `缩放图像` 功能将 288 像素的资源调整为适合 XXHDPI 的 144 像素图标大小


    选择此菜单序列将弹出 `缩放图像` 对话框，如图 5-2 所示。你将使用该对话框设置降采样分辨率为 144 宽度和 144 高度，并将插值算法设置为 `立方`
    作为你的插值方法或设置。


    `立方` 插值使用高质量降采样算法，该算法会考虑图像中的边缘，并在降采样过程中对其进行抗锯齿处理，从而为图像中像素区域间的锐利边缘或剧烈变化提供平滑过渡。一个很好的例子就是你的
    Pro Android Graphics 标志的边缘。


    `GIMP2` 中的 `立方` 插值类似于 Photoshop 中的双三次插值。如果你使用的是 Photoshop 而不是 `GIMP2`，那么也请从 Photoshop
    的 `图像大小` 对话框底部的下拉菜单中选择 `两次立方（较锐利）`（用于降采样）选项。


    ![A978-1-4302-5786-8_5_Fig2_HTML.jpg](img/A978-1-4302-5786-8_5_Fig2_HTML.jpg)


    图 5-2.


    在 `缩放图像` 对话框中设置参数


    现在图像应该比原来小四倍，或者沿 X 轴和 Y 轴各小两倍，如图 5-3 所示。


    ![A978-1-4302-5786-8_5_Fig3_HTML.jpg](img/A978-1-4302-5786-8_5_Fig3_HTML.jpg)


    图 5-3.


    使用 `文件` ➤ `导出` 功能导出新缩放的 144 像素 XXHDPI 应用图标资源


    你现在已准备好使用 `文件` ➤ `导出` 菜单序列导出降采样后的 144 像素应用启动图标文件。这样做是为了给你的 `XXHDPI` 应用启动器图标文件命名，以便以后能识别出这个数字图像资源的分辨率。


    如果由于某些原因你仍在使用的旧版 `GIMP2`（例如 2.6.12），那么你需要使用 `文件` ➤ `另存为` 选项。自 `GIMP2` 版本 2.8.0
    及更高版本起，该选项已更改为 `文件` ➤ `导出` 选项。


    选择 `导出` 选项将弹出 `导出图像` 对话框，如图 5-4 所示。如果你尚未为应用图标创建文件夹，可以立即使用对话框右上角的 `创建文件夹` 按钮进行操作。我用它在我的
    Pro Android Graphics Design (PAGD) 文件夹及其 `/CH05` 子文件夹下创建了 `/Icons` 文件夹。


    ![A978-1-4302-5786-8_5_Fig4_HTML.jpg](img/A978-1-4302-5786-8_5_Fig4_HTML.jpg)


    图 5-4.


    在 `导出图像` 对话框中设置 `launch_icon_pag_144.png` 文件名并选择导出选项


    一旦你为应用图标创建了文件夹，就在对话框顶部的 `名称:` 字段中输入描述性文件名 `launch_icon_pag_144.png`。`GIMP2` 使用你的文件扩展名来确定保存文件时应使用的文件格式类型（编解码器）。你也可以使用对话框左下角的
    `选择文件类型（按扩展名）` 小部件以更繁琐的方式来设置。完成所有设置后，单击对话框右下角的 `导出` 按钮，这将弹出 `将图像导出为 PNG` 设置对话框，如图
    5-4 屏幕截图的右侧所示。确保选中 `保存分辨率` 和 `保存透明像素的颜色值`，然后将 `压缩级别` 滑块设置为最大压缩（9）。


    你可能想知道为什么像 `PNG32` 这样的无损文件格式在 `GIMP2` 中会有这个压缩级别设置，因为人们通常会认为这应该出现在 JPEG 中，而不是 PNG
    中；人们会假设最大压缩是默认设置。实际上，它控制的是无损压缩的速度，就像你使用 `ZIP` 压缩算法（也是无损的）时所做的那样。使用 `ZIP` 工具时，你会在压缩过程花费的时间与压缩算法在压缩时能做得更好（文件稍微更小）之间进行权衡。由于
    9 是 `GIMP2` 中此滑块的默认值，我就没有改动它。如果你愿意，之后可以随意尝试调整此设置并观察结果。

    '
- fmt: '# Once you have exported the new 144 pixel XXHDPI launcher icon asset


    Once you have exported the new 144 pixel XXHDPI launcher icon asset, you can return
    to your 288 pixel source file for further resampling of the other four launcher
    icon assets. This is most easily accomplished by using the `Edit` menu and the
    `Undo Scale Image` option, as shown in Figure [5-5](#A978-1-4302-5786-8_5_Chapter.html#Fig5).


    ![A978-1-4302-5786-8_5_Fig5_HTML.jpg](A978-1-4302-5786-8_5_Fig5_HTML.jpg)


    **Figure 5-5.** Using the `Edit ➤ Undo Scale Image` menu sequence to revert logo
    icon image data back to 288 pixels


    In case you are wondering why you did not simply continue resizing the 144 pixel
    image data right on down the line, the reason you need to return to your original
    source file for subsequent resampling is because you want to give the resampling
    algorithm the most data to work with possible, which allows it to achieve the
    best visual result each time you resample.


    This is why earlier I discussed using a 576 pixel, a 1152 pixel, or a 2304 pixel
    source artwork image, as the higher resolution you have going into an image resampling
    algorithm, the better chance you have for an acceptable result coming out of that
    algorithm, given you have bicubic interpolation algorithm mathematics (called
    `cubic` in GIMP) with which to downsample.


    Generally you want to stay away from upsampling if you can help it, which you
    saw earlier in this chapter when we talked about an HDPI or XHDPI screen emulating
    (upsampling) an MDPI “normal” user experience (and user interface design). Upsampling
    forces the algorithm to create image data (pixels) that do not currently exist
    in the image, and this guesswork as to what these pixels should be, and where
    they should be, translates into either artifacts, or blurring, or both, in the
    resulting digital imagery.


    Next, let’s copy the newly downsampled application launcher icon assets into their
    proper folders, and write the XML markup that will be needed to implement them
    inside your Android `GraphicsDesign` application.


    ## Installing the New App Icon in the Correct Density Folders


    Open the file management utility for your operating system (for Windows 8, it
    is the `Windows Explorer` tool) and find the `/Icons` asset folder that you created
    for your icon assets and saved your launch icons in, (for me, this folder was
    called the `/PAGD/CH05/Icons` folder, and is shown in Figure [5-6](#A978-1-4302-5786-8_5_Chapter.html#Fig6)).


    It is important to create and maintain a logical asset folder hierarchy when developing
    a complex Android application that involves lots of new media elements and assets.
    Besides your `/workspace/project` folder for your Android app, you should have
    a separate `/project` folder, with sub-folders for images, video, audio, animation,
    3D, icons, and so on. These new media type sub-folders could then have their own
    sub-sub-folders such as `/project/audio/music`, or `/project/audio/voiceovers`;
    for your digital imagery you might have `/project/images/mpdi`, `/project/images/hdpi`,
    and `/project/images/xhdpi`; and for digital video `/project/video/mpeg4` and
    `/project/video/webm`, for instance.


    Let’s start copying the launcher icon image assets from the new media icon assets
    folder over to the appropriate Eclipse ADT workspace project folder, which is
    `/workspace/GraphicsDesign/res/drawable-ldpi` now.


    Select the LDPI 36 pixel resolution density asset, right-click it, and select
    the `Copy` option to put the file location reference into your operating system’s
    clipboard, as shown in Figure [5-6](#A978-1-4302-5786-8_5_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_5_Fig6_HTML.jpg](A978-1-4302-5786-8_5_Fig6_HTML.jpg)


    **Figure 5-6.** Selecting app launch icon density level assets from the `/icon`
    folder for copying to `/drawable` folders


    Next, find your `/workspace/GraphicsDesign/res/drawable-ldpi` folder, right-click
    it, and select the `Paste` option to copy and paste this file into the folder,
    as shown in Figure [5-7](#A978-1-4302-5786-8_5_Chapter.html#Fig7). Repeat this
    work process for all five of the launcher icons, so that the pixel number in each
    of their name matches the density level for that resolution. If you forgot which
    density requires which icon resolution, refer back to Table [5-1](#A978-1-4302-5786-8_5_Chapter.html#Tab1)
    (the sixth column).


    ![A978-1-4302-5786-8_5_Fig7_HTML.jpg](A978-1-4302-5786-8_5_Fig7_HTML.jpg)


    **Figure 5-7.** Pasting the launch icon density assets into their respective `drawable-dpi`
    folders in the resource folder


    Notice that there is no default Android application launch icon in this LDPI folder
    currently, so it is important to note that even the Android ADT New Android Application
    creation series of dialogs does not provide a low-resolution version of the launcher
    icon, meaning it must scale one of the higher resolution icons for this purpose,
    probably the 72 pixel, HDPI version, as this would be an even 2X downsample, to
    a resulting 36 pixels.


    What I take (infer or assume) from this is that if you provide a 240 DPI asset
    collection (HDPI), it is probably OK not to provide LDPI assets for your application,
    especially as the trend in today’s Android devices is towards HDPI phablets (phone+tablet),
    XHDPI tablets, and HDPI iTVs.


    That said, if you are developing for Android watches and flip phones, you may
    want to provide LDPI optimized assets, at least until Android adds a cubic (bicubic)
    interpolation algorithm to its OS. As you can see from Figure [5-8](#A978-1-4302-5786-8_5_Chapter.html#Fig8),
    Android does provide an MDPI icon asset, which we have pasted our custom launcher
    icon beside and will be renaming to something simpler.


    ![A978-1-4302-5786-8_5_Fig8_HTML.jpg](A978-1-4302-5786-8_5_Fig8_HTML.jpg)


    **Figure 5-8.** Android created `ic_launcher.png` icon and developer created `launch_icon_pag_48`
    in `/drawable-mdpi`


    Make sure that after you copy all of your files into the proper resolution density
    folders that you rename them with generic names (no pixel numbers) so they all
    have the same name in each folder, as shown in Figure [5-9](#A978-1-4302-5786-8_5_Chapter.html#Fig9).


    ![A978-1-4302-5786-8_5_Fig9_HTML.jpg](A978-1-4302-5786-8_5_Fig9_HTML.jpg)


    **Figure 5-9.** Renaming the `launch_icon_pag_48.png` file to generic (and simpler)
    file name of `pag_icon.png`


    As you can see in Figure [5-9](#A978-1-4302-5786-8_5_Chapter.html#Fig9), I chose
    the simple name `pag_icon.png`, and I closely followed the Android asset name
    convention of only using lowercase letters, numbers, and the underscore character.


    Once you rename all five files to `pag_icon.png`, you will be ready to edit the
    XML parameters in your `AndroidManifest.xml` file to implement the new custom
    Pro Android Graphics launcher icon for your `GraphicsDesign` app.'
