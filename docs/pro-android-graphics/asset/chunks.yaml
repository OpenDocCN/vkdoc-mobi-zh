  trans: '

    # 使用 `MediaPlayer` 类：无缝循环播放视频


    学习如何使用 `VideoView` 组件实现 `MediaPlayer` 的唯一真正方法，就是亲自动手编写 Java 代码和 XML 标记！接下来，让我们进入实战模式，编写代码、优化视频，并为你的视频资源添加多分辨率支持。


    接下来，重新接入你在第 2 章中创建的数字视频（你在后续章节中禁用了它，以便在没有背景视频及其处理开销的视觉干扰下探索动画、合成、混合等功能），并将那七行代码放回主
    `Activity` 类的 `onCreate()` 方法中，使其在启动画面的 PAG 标志后面播放。如图 18-1 所示，我将这七行代码放在了 `.setUpAnimation()`
    方法调用之后，稍后你会在图 18-5 的左侧看到，一切都在无缝协同工作。


    ![A978-1-4302-5786-8_18_Fig1_HTML.jpg](img/A978-1-4302-5786-8_18_Fig1_HTML.jpg)


    **图 18-1.** 将来自第 2 章的视频播放 Java 逻辑添加到当前动画启动画面代码中


    接下来，我们希望实现的是，数字视频在标志后面无缝循环播放，而不是为其添加传输控制界面。为此，你将注释掉三行代码，如图 18-2 所示。这些代码用于创建 `MediaController`
    对象并将其连接到 `VideoView` 对象。


    然后，使用 **Run As ➤ Android Application** 工作流程，你会发现数字视频资源仍然可以播放，但只播放一次，仅使用了剩下的四行代码。这是在应用程序中实现数字视频资源播放（一次）所需的最少代码量。


    ![A978-1-4302-5786-8_18_Fig2_HTML.jpg](img/A978-1-4302-5786-8_18_Fig2_HTML.jpg)


    **图 18-2.** 从数字视频播放中移除 `MediaController` UI 控件，为永久循环播放做准备


    在 Android 系统中实现数字视频循环播放最快（也最简单）的方法是使用 `.setLooping()` 方法，并将参数设为 `true`。由于 `MediaController`
    功能不支持此方法（理由也很充分，如果视频无限循环，控制它就不太可行），你需要使用支持此方法的 `MediaPlayer` 类。


    你可能会认为声明、实例化并构造一个 `MediaPlayer` 对象，然后调用其函数是最好的方法，但有一种更巧妙的方式可以获取 `VideoView` 对象（内部）用于播放视频的
    `MediaPlayer` 对象的引用。


    这可以通过使用你之前在本章学到的嵌套类来实现。由于你只需要设置一次循环参数，因此实现此目的最合理的嵌套类是 `MediaPlayer.OnPreparedListener()`
    嵌套类。


    使用这个嵌套类，你可以在 Android 准备视频时设置循环参数，也就是在 Android 确定如何（或何时）以最佳方式播放视频时。这是一个设置参数（如循环参数）的绝佳时机，可以将其视为
    `MediaPlayer` “配置”（也称为准备）阶段，即 `MediaPlayer` 即将开始的生命周期的一部分。


    这可以通过在 `splashScreen` `VideoView` 对象上调用 `.setOnPreparedListener()` 方法，并在该方法调用中使用
    `MediaPlayer.OnPreparedListener()` 引用实例化一个新的嵌套类来实现。


    实现此功能的 Java 语句如图 18-3 所示，代码如下：


    ```

    splashScreen.setOnPreparedListener(new MediaPlayer.OnPreparedListener(){Override});

    ```


    如图 18-3 所示，Eclipse 会为你提供编写未实现方法引导代码的选项，因此点击“添加未实现的方法”选项，并花点时间感谢这些小确幸吧。


    ![A978-1-4302-5786-8_18_Fig3_HTML.jpg](img/A978-1-4302-5786-8_18_Fig3_HTML.jpg)


    **图 18-3.** 向 `splashScreen` `VideoView` 对象添加 `.setOnPreparedListener()` 方法以设置循环参数


    在这个 `public void onPrepared(MediaPlayer arg0)` 方法结构中，添加你的 `.setLooping(true);`
    方法调用。同时请注意，我自作主张将传入此方法的 `MediaPlayer` 对象命名为 `splashScreenMediaPlayer`，因为它就是那个对象，而不是海盗在辱骂（啊，零）。玩笑有点冷，但代码很扎实。因此，如图
    18-4 所示，你的方法调用是


    ```

    splashScreenMediaPlayer.setLooping(true);

    ```


    ![A978-1-4302-5786-8_18_Fig4_HTML.jpg](img/A978-1-4302-5786-8_18_Fig4_HTML.jpg)


    **图 18-4.** 编写 `onPrepared()` 方法以暴露 `MediaPlayer` 对象并调用其 `.setLooping()` 方法


    如图 18-5 所示，数字视频现在将无缝循环播放。什么？你还没有使用新的动画纸张？那么，使用 **Run As ➤ Android Application**
    工作流程亲自看看这些结果吧。


    如果你在网上搜索视频循环的解决方案，会看到大量建议：使用 `MediaPlayer.OnCompletionListener()` 嵌套类在视频每次结束时调用
    `.start()` 方法，这同样有效。但是，我想你会同意，本方法更简单、对操作系统负担更小、内存占用更少，并且不太可能引发内存泄漏；这是正确设置视频循环一次然后就可以忘掉它的方法！


    ![A978-1-4302-5786-8_18_Fig5_HTML.jpg](img/A978-1-4302-5786-8_18_Fig5_HTML.jpg)


    **图 18-5.** Nexus One 模拟器中启动画面的前后对比，展示了 `MediaController` 和循环视频


    接下来，你将修改 XML UI 布局容器代码和 UI 组件，以使你的数字视频资源能够非均匀缩放，以适应用户显示屏宽高比的细微差异。这个 3D 虚拟世界视频，就像你之前在本书中使用的
    `cloudsky.jpg` 资源一样，是进行此类缩放的理想资源，因为很难想象原始运动影像（视频数据）最初究竟是什么样子。

    '
- fmt: '# Setting Up Scaling Video Assets to Fit any Screen Aspect Ratio


    You are now going to see how to change your XML user interface definition to allow
    your digital video assets to “scale to fit” slightly different screen aspect ratios.


    I’m not talking about drastic asymmetric scaling here, as you’ll see later on
    in the chapter. You’re going to develop a number of 16:9 or 16:10 aspect ratio
    video assets to hit the most popular Android device physical resolution specifications.
    You’ll do this using Terragen 3, VirtualDub 1.9, and Sorenson Squeeze Pro 9, like
    we did in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html).


    So you may be scaling 10% or so along one axis, but this should not be that noticeable,
    unless the content is a “talking head,” of course. The virtual world video content
    we are using here isn’t prone to noticeable distortion.


    Right-click your `activity_main.xml` layout definition in your `/res/layout` folder
    and select the **Open** menu command, or left-click it and press the `F3` key.
    Edit the opening and closing `<FrameLayout>` container parent tag, and turn it
    into a `<RelativeLayout>` container by replacing the word `Frame` with the word
    `Relative`, as shown in Figure [18-6](#A978-1-4302-5786-8_18_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_18_Fig6_HTML.jpg](A978-1-4302-5786-8_18_Fig6_HTML.jpg)


    Figure 18-6. Changing your `<FrameLayout>` parent container tag to be a `<RelativeLayout>`
    parent container tag


    Next, use a **Run As ➤ Android Application** work process (or use the **Graphical
    Layout Editor** tab, if you wish), and see if your UI layout results are the same
    when using a different type of user interface layout container (`ViewGroup`).


    As you can see on the far left side of Figure [18-7](#A978-1-4302-5786-8_18_Chapter.html#Fig7),
    the parameters in your `<ImageView>` child tag UI widget are not compatible with
    a `<RelativeLayout>` parent tag container type. Thus, you will have to make some
    changes to that child tag and its parameters first to get it to center correctly
    again.


    Let’s look at the parameters in the `<ImageView>` child tag in Figure [18-6](#A978-1-4302-5786-8_18_Chapter.html#Fig6)
    one at a time and see if we can find the problem. We know the ID, the SRC, and
    the `LAYOUT_WIDTH` and `LAYOUT_HEIGHT` are standard for layout containers, and
    the `contentDescription` is required for image-based UI elements, so it must be
    the `layout_gravity="center"` parameter that is not compatible with a `RelativeLayout`.
    A concept of gravity is not supported in `RelativeLayout`, which stands to reason,
    as UI widgets are laid out relative to each other!


    ![A978-1-4302-5786-8_18_Fig7_HTML.jpg](A978-1-4302-5786-8_18_Fig7_HTML.jpg)


    Figure 18-7. Testing your new `<RelativeLayout>` in the Nexus One as you adjust
    your child tag parameters to refine


    Let’s delete the `layout_gravity="center"` part of this last parameter, and then
    type the colon key again. This will again invoke Eclipse ADT’s helper dialog,
    as shown in Figure [18-8](#A978-1-4302-5786-8_18_Chapter.html#Fig8).


    As you can see in this long parameter list for the `<RelativeLayout>` layout container,
    there is indeed a different tag that can be used for centering the `<ImageView>`
    UI widget child tag within its `<RelativeLayout>` UI layout parent tag. The correct
    parameter to implement within a `RelativeLayout` container is an `android:layout_centerInParent`
    parameter with a Boolean value of `"true"`. If you now use your **Run As ➤ Android
    Application** work process, you can see you have fixed that problem, and your
    PAG logo is centered again, as shown in the middle of Figure [18-7](#A978-1-4302-5786-8_18_Chapter.html#Fig7).
    Your video still loops seamlessly behind it.


    The next thing you need to figure out is how to implement the “fill the View”
    scaling effect that is shown on the right-hand side of Figure [18-7](#A978-1-4302-5786-8_18_Chapter.html#Fig7).


    Let’s get back into the Eclipse `RelativeLayout` parameter helper dialog, and
    figure out which of these parameters (there are dozens) can achieve this end result
    and provide something that can be used in any resolution and in any orientation.
    Then you will be able to move on to create your video asset targets and learn
    how to tell Android which to use with different devices (physical resolution and
    orientation asset auto-switching).


    ![A978-1-4302-5786-8_18_Fig8_HTML.jpg](A978-1-4302-5786-8_18_Fig8_HTML.jpg)


    Figure 18-8. Changing the `<ImageView>` `layout_gravity="center"` parameter to
    the `android:layout_centerInParent` parameter


    To get your video to scale to fit the entire screen, you will need to add a parameter
    to your `<VideoView>` child tag. What you want to do is to align the `<VideoView>`
    container with the `<RelativeLayout>` container, which has been configured using
    the `MATCH_PARENT` constant in both the X and Y dimensions. This makes the `<RelativeLayout>`
    parent tag fill the entire display screen.


    It is important to notice that even though you also have these `MATCH_PARENT`
    constants set in your `VideoView` child tag as well, Android is “respecting” the
    aspect ratio of the digital video asset, so you must find a different parameter
    to “override” this behavior and scale the video (in the X dimension, in this case)
    to cover that white stripe of default background color that is showing behind
    the video.


    Use your Eclipse helper dialog, by adding a line of space after your `<VideoView>`
    closing tag `/>` symbol, and typing `android` and then a colon and then the letter
    “a,” as shown in Figure [18-9](#A978-1-4302-5786-8_18_Chapter.html#Fig9). As you
    can see, this will bring up the available parameters that begin with the letter
    “a,” such as all of the `align`, `above`, and `alpha` parameters.


    You will see four `alignParent` parameters; they can be used to “pull” the `VideoView`
    over to match each edge of the parent `RelativeLayout`. I do wish there was an
    `alignParentAll` or just an `alignParent` parameter, so that we do not have to
    code four parameters to achieve our end result, but not everything in Android
    is going to be logical, optimal, or implemented the way that we want it to be
    100% of the time. That’s life for an Android, I guess! Being a programmer and
    a graphics designer in a single person will demand flexibility and creativity
    in working with the available tools and paradigms in order to figure out creative
    ways to interleave these disparate worlds together to create never-before-seen
    works of digital art.


    As you can see in Figure [18-9](#A978-1-4302-5786-8_18_Chapter.html#Fig9), the
    first `alignParentLeft` parameter has been selected. Double-click this parameter
    to insert it into your child tag and set its value equal to `"true"`. Next, do
    the same work process, and go back into the helper dialog and add the `alignParentTop`,
    `alignParentRight`, and `alignParentBottom` parameters to make sure the `VideoView`
    is scaled evenly.


    ![A978-1-4302-5786-8_18_Fig9_HTML.jpg](A978-1-4302-5786-8_18_Fig9_HTML.jpg)


    Figure 18-9. Using the Eclipse parameter helper dialog to find the four `android:layout_alignParent`
    parameters


    As you can see in Figure [18-10](#A978-1-4302-5786-8_18_Chapter.html#Fig10), the
    four parameters are in place, and your markup is error-free, so now you can use
    the **Run As ➤ Android Application** work process to watch your video scale and
    play behind your PAG logo. In my emulator, the video actually played back even
    more smoothly as it filled the container, probably because it didn’t have that
    white stripe to render.


    ![A978-1-4302-5786-8_18_Fig10_HTML.jpg](A978-1-4302-5786-8_18_Fig10_HTML.jpg)


    Figure 18-10. Adding all four sides for the `android:layout_alignParent` parameters
    to scale `<VideoView>` to fit screen


    It is important to note that even if you have an eight-core, 64-bit 3.4GHz workstation,
    as I do, with 16GB of DDR3 1333 RAM, and an SSD (Solid State Drive) HDD (Hard
    Disk Drive), you still may not get the Eclipse AVD emulator performance you desire.'
  raw: '## Setting Up Scaling Video Assets to Fit any Screen Aspect Ratio


    You are now going to see how to change your XML user interface definition to allow
    your digital video assets to “scale to fit” slightly different screen aspect ratios.


    I’m not talking about drastic asymmetric scaling here, as you’ll see later on
    in the chapter. You’re going to develop a number of 16:9 or 16:10 aspect ratio
    video assets to hit the most popular Android device physical resolution specifications.
    You’ll do this using Terragen 3, VirtualDub 1.9, and Sorenson Squeeze Pro 9, like
    we did in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html).


    So you may be scaling 10% or so along one axis, but this should not be that noticeable,
    unless the content is a “talking head,” of course. The virtual world video content
    we are using here isn’t prone to noticeable distortion.


    Right-click your activity_main.xml layout definition in your /res/layout folder
    and select the Open menu command, or left-click it and press the F3 key. Edit
    the opening and closing <FrameLayout> container parent tag, and turn it into a
    <RelativeLayout> container by replacing the word Frame with the word Relative,
    as shown in Figure [18-6](#A978-1-4302-5786-8_18_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_18_Fig6_HTML.jpg](A978-1-4302-5786-8_18_Fig6_HTML.jpg)


    Figure 18-6.


    Changing your <FrameLayout> parent container tag to be a <RelativeLayout> parent
    container tag


    Next, use a Run As ➤ Android Application work process (or use the Graphical Layout
    Editor tab, if you wish), and see if your UI layout results are the same when
    using a different type of user interface layout container (ViewGroup).


    As you can see on the far left side of Figure [18-7](#A978-1-4302-5786-8_18_Chapter.html#Fig7),
    the parameters in your <ImageView> child tag UI widget are not compatible with
    a <RelativeLayout> parent tag container type. Thus, you will have to make some
    changes to that child tag and its parameters first to get it to center correctly
    again.


    Let’s look at the parameters in the <ImageView> child tag in Figure [18-6](#A978-1-4302-5786-8_18_Chapter.html#Fig6)
    by one at a time and see if we can find the problem. We know the ID, the SRC,
    and the LAYOUT_WIDTH and LAYOUT_HEIGHT are standard for layout containers, and
    the contentDescription is required for image-based UI elements, so it must be
    the layout_gravity=“center” parameter that is not compatible with a RelativeLayout.
    A concept of gravity is not supported in RelativeLayout, which stands to reason,
    as UI widgets are laid out relative to each other!


    ![A978-1-4302-5786-8_18_Fig7_HTML.jpg](A978-1-4302-5786-8_18_Fig7_HTML.jpg)


    Figure 18-7.


    Testing your new <RelativeLayout> in the Nexus One as you adjust your child tag
    parameters to refine


    Let’s delete the :layout_gravity=“center” part of this last parameter, and then
    type the colon key again. This will again invoke Eclipse ADT’s helper dialog,
    as shown in Figure [18-8](#A978-1-4302-5786-8_18_Chapter.html#Fig8).


    As you can see in this long parameter list for the <RelativeLayout> layout container,
    there is indeed a different tag that can be used for centering the <ImageView>
    UI widget child tag within its <RelativeLayout> UI layout parent tag. The correct
    parameter to implement within a RelativeLayout container is an android:layout_centerInParent
    parameter with a Boolean value of “true.” If you now use your Run As ➤ Android
    Application work process, you can see you have fixed that problem, and your PAG
    logo is centered again, as shown in the middle of Figure [18-7](#A978-1-4302-5786-8_18_Chapter.html#Fig7).
    Your video still loops seamlessly behind it.


    The next thing you need to figure out is how to implement the “fill the View”
    scaling effect that is shown on the right-hand side of Figure [18-7](#A978-1-4302-5786-8_18_Chapter.html#Fig7).


    Let’s get back into the Eclipse RelativeLayout parameter helper dialog, and figure
    out which of these parameters (there are dozens) can achieve this end result and
    provide something that can be used in any resolution and in any orientation. Then
    you will be able to move on to create your video asset targets and learn how to
    tell Android which to use with different devices (physical resolution and orientation
    asset auto-switching).


    ![A978-1-4302-5786-8_18_Fig8_HTML.jpg](A978-1-4302-5786-8_18_Fig8_HTML.jpg)


    Figure 18-8.


    Changing the <ImageView> layout_gravity=“center” parameter to the android:layout_centerInParent
    parameter


    To get your video to scale to fit the entire screen, you will need to add a parameter
    to your <VideoView> child tag. What you want to do is to align the <VideoView>
    container with the <RelativeLayout> container, which has been configured using
    the MATCH_PARENT constant in both the X and Y dimensions. This makes the <RelativeLayout>
    parent tag fill the entire display screen.


    It is important to notice that even though you also have these MATCH_PARENT constants
    set in your VideoView child tag as well, Android is “respecting” the aspect ratio
    of the digital video asset, so you must find a different parameter to “override”
    this behavior and scale the video (in the X dimension, in this case) to cover
    that white stripe of default background color that is showing behind the video.


    Use your Eclipse helper dialog, by adding a line of space after your <VideoView>
    closing tag /> symbol, and typing android and then a colon and then the letter
    “a,” as shown in Figure [18-9](#A978-1-4302-5786-8_18_Chapter.html#Fig9). As you
    can see, this will bring up the available parameters that begin with the letter
    “a,” such as all of the align, above, and alpha parameters.


    You will see four alignParent parameters; they can be used to “pull” the VideoView
    over to match each edge of the parent RelativeLayout. I do wish there was an alignParentAll
    or just an alignParent parameter, so that we do not have to code four parameters
    to achieve our end result, but not everything in Android is going to be logical,
    optimal, or implemented the way that we want it to be 100% of the time. That’s
    life for an Android, I guess! Being a programmer and a graphics designer in a
    single person will demand flexibility and creativity in working with the available
    tools and paradigms in order to figure out creative ways to interleave these disparate
    worlds together to create never-before-seen works of digital art.


    As you can see in Figure [18-9](#A978-1-4302-5786-8_18_Chapter.html#Fig9), the
    first alignParentLeft parameter has been selected. Double-click this parameter
    to insert it into your child tag and set its value equal to “true.” Next, do the
    same work process, and go back into the helper dialog and add the alignParentTop,
    alignParentRight, and alignParentBottom parameters to make sure the VideoView
    is scaled evenly.


    ![A978-1-4302-5786-8_18_Fig9_HTML.jpg](A978-1-4302-5786-8_18_Fig9_HTML.jpg)


    Figure 18-9.


    Using the Eclipse parameter helper dialog to find the four android:layout_alignParent
    parameters


    As you can see in Figure [18-10](#A978-1-4302-5786-8_18_Chapter.html#Fig10), the
    four parameters are in place, and your markup is error-free, so now you can use
    the Run As ➤ Android Application work process to watch your video scale and play
    behind your PAG logo. In my emulator, the video actually played back even more
    smoothly as it filled the container, probably because it didn’t have that white
    strip to render.


    ![A978-1-4302-5786-8_18_Fig10_HTML.jpg](A978-1-4302-5786-8_18_Fig10_HTML.jpg)


    Figure 18-10.


    Adding all four sides for the android:layout_alignParent parameters to scale <VideoView>
    to fit screen


    It is important to note that even if you have an eight-core, 64-bit 3.4GHz workstation,
    as I do, with 16GB of DDR3 1333 RAM, and a SSD (Solid State Drive ) HDD (Hard
    Disk Drive), you still may not get the Eclipse AVD emulator performance you desire.'
  trans: '

    # 设置视频素材缩放以适配任意屏幕宽高比


    接下来你将学习如何修改 XML 用户界面定义，让你的数字视频素材能够“缩放适配”略有不同的屏幕宽高比。


    我讨论的并非本章稍后会看到的剧烈非对称缩放。你将制作一系列 16:9 或 16:10 宽高比的视频素材，以适配最主流的 Android 设备物理分辨率规格。我们将沿用第
    2 章的方法，使用 Terragen 3、VirtualDub 1.9 和 Sorenson Squeeze Pro 9 来完成。


    因此你可能会沿某一轴向缩放约 10%，但这通常不会太明显——除非内容涉及“人物特写”镜头。我们此处使用的虚拟世界视频内容不易产生可察觉的畸变。


    右键点击 `/res/layout` 文件夹中的 `activity_main.xml` 布局定义文件，选择 **打开** 菜单命令，或者左键单击后按 `F3`
    键。编辑 `<FrameLayout>` 容器父标签的起始和结束标签，将其改为 `<RelativeLayout>` 容器：将单词 `Frame` 替换为
    `Relative`，如图 18-6 所示。


    ![A978-1-4302-5786-8_18_Fig6_HTML.jpg](img/A978-1-4302-5786-8_18_Fig6_HTML.jpg)


    图 18-6. 将 `<FrameLayout>` 父容器标签更改为 `<RelativeLayout>` 父容器标签


    接着，使用 **运行方式 ➤ Android 应用程序** 工作流程（如果愿意，也可以使用**图形布局编辑器**标签），检查改用不同类型用户界面布局容器 (`ViewGroup`)
    后，你的 UI 布局结果是否一致。


    如图 18-7 最左侧所示，`<ImageView>` 子标签 UI 控件中的参数与 `<RelativeLayout>` 父标签容器类型不兼容。因此，你需要先对该子标签及其参数进行某些修改，才能让它再次正确居中。


    让我们逐一检查图 18-6 中 `<ImageView>` 子标签的参数，看能否找到问题所在。我们知道 ID、SRC、`LAYOUT_WIDTH` 和 `LAYOUT_HEIGHT`
    是布局容器的标准参数，且 `contentDescription` 是图像类 UI 元素必需的，那么问题必定出在与 `RelativeLayout` 不兼容的
    `layout_gravity="center"` 参数上。`RelativeLayout` 不支持重力概念——这合情合理，因为其中的 UI 控件是相互关联布局的！


    ![A978-1-4302-5786-8_18_Fig7_HTML.jpg](img/A978-1-4302-5786-8_18_Fig7_HTML.jpg)


    图 18-7. 在 Nexus One 上测试新的 `<RelativeLayout>`，同时调整子标签参数以完善效果


    让我们删除最后这个参数中的 `layout_gravity="center"` 部分，然后再次输入冒号键。这将再次调用 Eclipse ADT 的帮助对话框，如图
    18-8 所示。


    如您在 `<RelativeLayout>` 布局容器这个长参数列表中看到的，确实存在一个不同的标签，可用于在其 `<RelativeLayout>` UI
    布局父标签内居中 `<ImageView>` UI 控件子标签。在 `RelativeLayout` 容器中实现的正确参数是 `android:layout_centerInParent`，其布尔值为
    `"true"`。如果现在使用 **运行方式 ➤ Android 应用程序** 工作流程，您会发现问题已修复，PAG 标志再次居中，如图 18-7 中间所示。视频仍在标志后方无缝循环播放。


    接下来需要弄清楚的是如何实现图 18-7 右侧所示的“填充视图”缩放效果。


    让我们重新进入 Eclipse `RelativeLayout` 参数帮助对话框，找出这些参数（有几十个）中哪一个能实现最终效果，并提供可在任何分辨率和任何方向下使用的功能。然后您就能继续创建您的视频素材目标，并学习如何告知
    Android 针对不同设备（物理分辨率和方向素材自动切换）应该使用哪个。


    ![A978-1-4302-5786-8_18_Fig8_HTML.jpg](img/A978-1-4302-5786-8_18_Fig8_HTML.jpg)


    图 18-8. 将 `<ImageView>` 的 `layout_gravity="center"` 参数改为 `android:layout_centerInParent`
    参数


    要让您的视频缩放以填满整个屏幕，您需要在 `<VideoView>` 子标签中添加一个参数。您要做的是将 `<VideoView>` 容器与已使用 `MATCH_PARENT`
    常量（在 X 和 Y 两个维度都设置）配置的 `<RelativeLayout>` 容器对齐。这使得 `<RelativeLayout>` 父标签填满整个显示屏。


    需要特别注意的是，尽管您也在 `VideoView` 子标签中设置了这些 `MATCH_PARENT` 常量，但 Android 会“尊重”数字视频素材的宽高比，因此您必须找到一个不同的参数来“覆盖”这一行为，并在
    X 维度上缩放视频，以覆盖视频背后显示的那条默认背景色白色条纹。


    使用您的 Eclipse 帮助对话框：在 `<VideoView>` 结束标签 `/>` 符号后添加一行空格，然后输入 `android`、冒号以及字母“a”，如图
    18-9 所示。如您所见，这将调出以字母“a”开头的可用参数，例如所有 `align`、`above` 和 `alpha` 参数。


    您会看到四个 `alignParent` 参数；它们可用于“拉动”`VideoView`，使其与父容器 `RelativeLayout` 的各边缘对齐。我确实希望有一个
    `alignParentAll` 或仅仅一个 `alignParent` 参数，这样我们就不必编码四个参数来达到最终效果，但在 Android 中，并非所有东西都总是那么合乎逻辑、最优或按照我们期望的方式实现。我猜，这就是
    Android 的宿命吧！一个人同时担任程序员和图形设计师，需要具备灵活性和创造力，善于利用可用的工具和范式，以创造性的方式将这些不同的世界交织在一起，创造出前所未有的数字艺术作品。


    如图 18-9 所示，第一个 `alignParentLeft` 参数已被选中。双击此参数将其插入到您的子标签中，并将其值设置为 `"true"`。接下来，执行相同的工作流程，返回帮助对话框，添加
    `alignParentTop`、`alignParentRight` 和 `alignParentBottom` 参数，以确保 `VideoView` 均匀缩放。


    ![A978-1-4302-5786-8_18_Fig9_HTML.jpg](img/A978-1-4302-5786-8_18_Fig9_HTML.jpg)


    图 18-9. 使用 Eclipse 参数帮助对话框查找四个 `android:layout_alignParent` 参数


    如图 18-10 所示，四个参数已就位，您的标记代码无误。现在您可以使用 **运行方式 ➤ Android 应用程序** 工作流程观看视频在 PAG 标志后方缩放并播放。在我的模拟器中，视频在填满容器后实际上播放得更流畅，可能是因为无需渲染那条白色条纹。


    ![A978-1-4302-5786-8_18_Fig10_HTML.jpg](img/A978-1-4302-5786-8_18_Fig10_HTML.jpg)


    图 18-10. 为 `android:layout_alignParent` 参数添加全部四个边缘，使 `<VideoView>` 缩放适配屏幕


    需要指出的是，即使您像我一样配备八核 64 位 3.4GHz 工作站、16GB DDR3 1333 内存和固态硬盘（SSD），您可能仍然无法获得理想的 Eclipse
    AVD 模拟器性能。

