    Playback of WebM video is “natively” supported in Android 2.3.3 and later, so
    most the Android devices out there, including an Amazon Kindle Fire HD as well
    as the original Kindle Fire, should be able to support this higher quality digital
    video file format. This is because it’s natively a part of the operating system
    (OS) software installed on your smartphone or tablet.


    WebM also supports video streaming, which you’ll learn about in a later section
    of this chapter. WebM video format streaming playback capability is supported
    if users have Android OS version 4.0 (or later). For this reason I recommend using
    MPEG-4 H.264 AVC for captive (non-streaming) video assets and WebM if you are
    going to be streaming video. We will cover advanced video concepts such as streaming
    and the like in the last section of this book.'
  trans: '

    # Android 数字视频格式：MPEG4 H.264 与 WebM VP8


    Android 支持与 HTML5 原生支持的两种相同开源数字视频格式，即 MPEG-4（动态图像专家组）H.264 以及 ON2 VP8 格式（该格式由谷歌从
    ON2 Technologies 收购并更名为 WebM）。WebM 随后作为开源数字视频文件格式发布，现已被集成至 Android 操作系统及所有浏览器中。


    从内容制作的角度来看，这非常便捷，因为开发者制作并优化的视频内容既可用于浏览器及基于 HTML5 的操作系统等 HTML5 引擎，也可用于 Android
    应用。


    这种开源数字视频格式的跨平台支持场景将为内容开发者带来“一次制作，随处交付”的内容生产局面。只要专业视频图形开发者充分利用这些规模经济效应，就能降低内容开发成本并增加开发者收入。


    正如我在第 1 章中所做的那样，我将按从旧到新的顺序介绍 MPEG 和 WebM 视频文件格式。Android 支持的最旧格式是 MPEG H.263，该格式仅应用于较低分辨率，因为它采用最古老的技术，压缩质量比最差。


    由于如今大多数 Android 设备都采用中等（854x480）到高（1280x720）分辨率的屏幕，如果你打算使用 MPEG 文件格式，则应采用 MPEG-4
    H.264 格式，这是目前全球使用最广泛的数字视频文件格式。


    MPEG-4 H.264 格式被商业广播公司、HTML5 网页浏览器软件、移动 HTML5 应用以及 Android 操作系统所采用。毫不夸张地说，所有这些应用领域加在一起正迅速接近多数市场份额的地位。


    MPEG-4 H.264 AVC（高级视频编码）数字视频文件格式在所有 Android 操作系统版本中均受支持，可用于视频播放；在 Android 3.0
    及更高版本中则支持视频录制。只有当 Android 设备具备摄像硬件功能时，才支持视频录制。


    此外，还有一种 MPEG4 SP（简单画质）视频格式，用于支持商业视频文件的播放。该格式适用于所有 Android 操作系统版本，可播放广播类内容（如电影、电视节目、迷你剧、电视剧、健身视频及类似产品）。


    然而，如果你是个人 Android 内容制作人，会发现 MPEG-4 H.264 AVC 格式具有远胜一筹的压缩能力，尤其是当你使用更高级（更好）的编码套件时，例如
    Sorenson Squeeze Pro 9 软件（本章稍后你将用到它）。


    如果你决定在 Android 应用中使用 MPEG-4 数字视频格式而非谷歌的 WebM (VP8) 视频格式，那么 MPEG-4 H.264 AVC 将是你制作
    Android 视频内容时采用的格式。之所以支持 MPEG4 SP 格式，很可能是因为许多商业视频和电影最初都采用这种较旧的视频格式压缩，而如今在用户 Android
    设备上播放这些商业视频内容已成为这些设备的常见用途——这是因为互动内容相对匮乏。但你将会改变这一现状，对吧？！太棒了！


    MPEG-4 视频文件支持的文件扩展名包括 `.3GP`（SP）和 `.MP4`（AVC）。我个人倾向于使用后者（`.MP4` AVC），因为这也是我在 HTML5
    应用中使用的格式，并且采用更优秀的 AVC 格式更为普遍，但两种文件（扩展名）类型在 Android 操作系统中都应能正常工作。


    Android 现在支持的更现代（更先进）的数字视频格式称为 WebM 或 VP8 数字视频格式，这种格式能以更小的数据占用提供更高质量的结果。这很可能就是谷歌收购
    ON2（开发了 VP8 编解码器的公司）的原因。本章稍后你将全面了解编解码器的相关知识。


    从 Android 2.3.3 版本开始，系统对 WebM 视频播放提供了“原生”支持，因此市面上大多数 Android 设备（包括 Amazon Kindle
    Fire HD 及初代 Kindle Fire）都应能支持这种更高质量的数字视频文件格式。这是因为该格式已原生集成到智能手机或平板电脑上安装的操作系统（OS）软件中。


    WebM 还支持视频流式传输，你将在本章后续部分学习相关内容。如果用户拥有 Android 4.0 或更高版本的操作系统，则支持 WebM 视频格式的流式播放功能。出于这个原因，我建议对于非流式视频素材使用
    MPEG-4 H.264 AVC，而对于流式视频则采用 WebM。我们将在本书最后一节介绍流式传输等高级视频概念。

    '
- fmt: '# Android VideoView and MediaPlayer Class: Video Players


    There are two major classes in Android, both subclassed directly from the `java.lang.Object`
    superclass, that deal directly with digital video format playback. They are the
    `VideoView` widget class, from the `android.widget` package, and the `MediaPlayer`
    media class, from the `android.media` package.


    Most of your basic digital video playback usage should be accomplished by using
    the `<VideoView>` XML tag and its parameters, and designed right into your user
    interface designs, as you will be doing later on in the chapter.


    Android’s `VideoView` class is a direct subclass of the Android `SurfaceView`
    class, which is a display class that provides a dedicated drawing surface embedded
    inside a specialized Android `View` hierarchy used for implementing an advanced,
    direct-to-the-screen drawing graphics pipeline.


    A `SurfaceView` is z-ordered so that it lives behind the `View` windows that are
    holding the `SurfaceView`, and thus a `SurfaceView` cuts this viewport through
    its `View` window to allow content to be displayed to a user.


    Z-order is a concept that we will get into later on in the book when you start
    working extensively with layered composites, but in a nutshell, the z-order is
    the order in the layer stack of a given image or video source.


    Layers are arranged, at least conceptually, from the top layer down to the bottom
    layer. This is the reason an image (or video) asset’s order in this layer hierarchy
    is called the z-order, as layers containing the x and y 2D image data are stacked
    along the 3D z axis. Forget about learning about 3D z axes and z-order later on
    in this book; it looks like I just explained it!


    As you now know, 2D images and video only use an x and y axis to "address" their
    data, so you will need to look at z-order and compositing from a 3D standpoint,
    as layers in a composite need to exist along a third z axis.


    A `SurfaceView` class is a subclass of the `View` class, which, as you know, is
    a subclass of the `Java Object` master class. The `VideoView` subclass is thus
    a specialized incarnation of the `SurfaceView` subclass, adding more methods to
    the `SurfaceView` class methods, and thus is farther down within the `View` class
    hierarchy. There is more detailed information regarding this Android `VideoView`,
    and its methods and constructors, at the following web site URL:


    [`http://developer.android.com/reference/android/widget/VideoView.html`](http://developer.android.com/reference/android/widget/VideoView.html)


    Android’s `VideoView` class implements a Java interface in an `android.widget`
    package called `MediaController.MediaPlayerControl`. This is so developers using
    the `VideoView` widget will have access to the Android `MediaController` class
    methods relating to `MediaPlayerControl` for digital video playback.


    If you are going to code your own digital video playback engine, you should access
    the Android `MediaPlayer` class itself directly. In this scenario, you are essentially
    writing your own (custom) video playback engine (`MediaPlayer` subclass) to replace
    your use of the `VideoView` widget with your own (more advanced) digital video
    playback functionality.


    There is more information about how this Android `MediaPlayer` class works, as
    well as a state engine diagram, at the following developer web site URL:


    [`http://developer.android.com/reference/android/media/MediaPlayer.html`](http://developer.android.com/reference/android/media/MediaPlayer.html)


    I could write an entire advanced programming book on how to code a video playback
    engine using this Android `MediaPlayer` class. However, since this intermediate
    book specifically covers Android graphic design and the inter-relationships between
    images, animation, digital video, compositing, blending, and the like, we’ll utilize
    the `VideoView` class. Indeed, this is what Android prefers that we utilize, which
    is why it provided this class.


    # The Foundation of Digital Video: Motion, Frames and FPS


    Digital video is an extension of digital imaging into the fourth dimension (time).
    Digital video is actually a collection of digital imagery that is displayed rapidly
    over time, much like the old flip-books where you could flip rapidly through the
    book’s pages to animate a character or scene that was drawn on its pages to create
    motion. Each of the images in the digital video sequence is called a frame. This
    terminology probably comes from the olden days of film, where frames of film were
    run through a film projector at a rate of 24 frames per second, which served to
    create the illusion of motion.


    Since each frame of digital video actually contains digital imagery, all the concepts
    you learned in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html) can also be applied
    to video. Related concepts include pixels, resolution, aspect ratios, color depth,
    alpha channels, pixel blending, image compositing, and even data footprint optimization.
    All of these can be just as readily applied to your work in digital video content
    development and implemented in your graphic designs.


    Since digital video is made up of this collection of digital image frames, the
    concept of a digital video frame rate, expressed as frames per second, or more
    commonly referred to as FPS, is also very important when it comes to your digital
    video data footprint optimization work process.


    The optimization concept with frames in a digital video is very similar to the
    one regarding pixels in an image (the resolution of the digital image) because
    video frames multiply the data footprint with each frame used. In digital video,
    not only does the frame’s (image) resolution greatly impact the file size, but
    so does the number of frames per second, or frame rate.


    In [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html), you saw that if we multiply
    the number of pixels in an image by the number of color channels, it gives us
    the raw data footprint for that image. With digital video, we must now multiply
    that number again by the number of frames per second that the digital video is
    running at, as well as by the number of total seconds in the digital video.


    To continue the VGA example from [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html),
    we know one 24-bit VGA raw image is 900KB exactly. That makes the math easy to
    take it to the next level in this example. Digital video traditionally runs at
    30 FPS, so one second of Standard Definition (SD) or VGA raw uncompressed digital
    video is 30 image frames, each of which is 900K, yielding a data footprint of
    27000KB.


    To find out how many megabytes (MB) this would be, we need to divide 27000 by
    1024, which gives us 26.3671875MB of data for one second of raw digital video.
    Let’s multiply this by 60 seconds, giving us 1582.0313 Megabytes of raw data per
    minute of 24-bit VGA digital video. Divide this again by 1024 and we have the
    amount of gigabytes (GB) per minute, which equals 1.54495.


    You think VGA resolution video has lots of raw data, at over 1.5GB/minute? HD
    (High Definition) video resolution is 1920x1080, times 3 RGB channels, times 30
    frames, times 60 seconds, and that yields 10.43GB per minute!


    You can see why having a video file format that can compress this massive raw
    data footprint that digital video creates is extremely important! This is why
    Google acquired ON2, to obtain their VP8 video codec and the folks who created
    it! VP8 maintains a high level of video image quality while at the same time reducing
    file size by an order of magnitude or more. An order of magnitude, in case you
    might be wondering, equates to ten times (10X).'
