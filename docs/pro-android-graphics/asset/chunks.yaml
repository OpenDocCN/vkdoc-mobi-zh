    works behind the animated elements you created, because of your compositing work
    process and intelligent use of alpha channel data inside your PNG32 assets. You
    have learned well, Young Lukes and Lukessas. May the GeForce (nVidia graphics
    processor) be with you all.


    Next, we got back into the digital video data footprint optimization work process
    and ascertained five target resolutions that “cover” 95% of the mainstream Android
    device screen resolutions (using physical pixels). Each of these also happens
    to be a “named” screen resolution standard, with the exception of the smallest,
    which is the 640x360 resolution.


    We targeted Wide VGA, or WVGA, at 800x480; Wide Super VGA, or WSVGA, at 1024x600;
    Pseudo HD at 1280x720; and True HD at 1920x1080. The last two also happen to be
    video (television) broadcasting standards.


    You set up codec presets for the portrait and landscape versions of these resolutions,
    and set standard data rates to match the size of the video with the intended playback
    device. You looked at the resulting file sizes and determined which result would
    best fit across the target Android devices that you intended to deliver your application
    across.


    In the next chapter, you’ll take a look at streaming a digital video asset over
    the Internet using the HTTP protocol, in case you have too much digital video
    to use “captive” assets in your application, and so that you can see how network
    bandwidth comes into play, using video compression and data streaming.'
  raw: '## Using the WebM VP8 Codec to Compress True HD Video


