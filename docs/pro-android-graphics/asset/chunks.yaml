  trans: '

    # 旋转变换：用 FX 稍微走远一点


    让我们添加 `<rotate>` 变换标签，将光标放在 `<alpha>` 标签 XML 标记的末尾，然后按回车键。这将为你需要的 `<rotate>` 标签添加一行空白空间。接下来，输入
    `<` 字符，如图 4-14 所示，以调出 `<set>` 子标签参数辅助对话框。最后，双击 `<rotate>` 标签选项进行添加。


    ![A978-1-4302-5786-8_4_Fig14_HTML.jpg](img/A978-1-4302-5786-8_4_Fig14_HTML.jpg)


    图 4-14. 向动画 `<set>` 父容器组添加一个 `<rotate>` 程序化动画变换标签


    接下来，输入 `android` 和一个冒号，调出 `<rotate>` 标签参数辅助对话框，并查看其 15 个参数，如图 4-15 所示。


    ![A978-1-4302-5786-8_4_Fig15_HTML.jpg](img/A978-1-4302-5786-8_4_Fig15_HTML.jpg)


    图 4-15. 使用 `android:` 工作流程打开 `<rotate>` 标签辅助对话框，显示 15 个可能的参数


    你需要做的最重要的事情是定义你的数据范围，这就是为什么 `fromDegrees` 和 `toDegrees` 属性是辅助对话框中列出的前两个参数，如图 4-15
    所示。


    双击 `android:fromDegrees` 参数，添加该标签，并将其旋转参数的初始值设置为零度。零度是徽标帧动画的默认方向位置，你即将使其旋转一整圈。现在添加
    `android:toDegrees` 参数，并将其值设置为旋转一整圈，即 360 度，如图 4-16 所示。


    接下来，设置你的枢轴点 X 和 Y，这是旋转变换中下一个最重要的属性，因为它定义了旋转变换的中心将在你的 2D 图像或帧动画中的位置。添加 `android:pivotX`
    和 `android:pivotY` 参数，并将它们都设置为图像（帧动画）在两个轴向上的 50% 位置。这将把你的枢轴点设置在图像或帧动画（或小部件、形状、文本，或任何你正在旋转的对象）的正中心。


    如果你想从左上角旋转，两个值都使用 0%；如果你想围绕右下角旋转，两个值都使用 100%。


    ![A978-1-4302-5786-8_4_Fig16_HTML.jpg](img/A978-1-4302-5786-8_4_Fig16_HTML.jpg)


    图 4-16. 在程序化动画 `<set>` 父标签中为你的 `<rotate>` 变换标签添加九个参数


    下一个最重要的参数是运动插值器，在这种情况下，你将使用线性插值常量来平滑且均匀地旋转你的徽标。指定此标签的标记写法如下：


    `android:interpolator="@android:anim/linear_interpolator"`


    现在你只需要设置时间和循环参数，就可以准备好在 Nexus One 模拟器中测试你的双轴旋转徽标动画了。


    添加一个 `android:duration` 参数，并将其设置为 9000 或 9 秒，以匹配你的其他两个变换参数。现在添加一个 `android:startOffset`
    参数，设置为 3000（3 秒），这样你的时间就完全同步了。


    最后，添加一个 `android:repeatCount` 参数，并将其设置为 1，这样你就可以看到 `repeatMode` 参数的作用，并反转你的旋转变换。添加
    `android:repeatMode` 参数，并将常量值设置为 `reverse`，然后保存 XML 文件，并使用“运行方式 ➤ Android 应用程序”在
    Nexus One 模拟器中测试旋转，如图 4-17 所示。如你所见，你的帧动画现在正围绕其 Z 轴旋转进入视野。


    ![A978-1-4302-5786-8_4_Fig17_HTML.jpg](img/A978-1-4302-5786-8_4_Fig17_HTML.jpg)


    图 4-17. 在 Nexus One 模拟器中查看旋转变换


    接下来，你将更改 `<rotate>` 变换参数，使得两个方向的旋转都在从远处进入时发生，这只是为了展示一旦使用 XML 标记初步设定好动画值后，对其进行调整（称为微调）是多么容易。


    ## 微调变换值：调整 XML 的便捷性


    回到你的 `<set>` 中，将 `android:duration` 值改为 4400，将 `android:startOffset` 值改为 200。注意
    4400 + 4400 + 200 = 9000，因此你正在同步你的两次旋转计时以及它们之间的暂停，以匹配其他两个变换的 9 秒持续时间。


    使用“运行方式 ➤ Android 应用程序”工作流程，在 Nexus One 模拟器中再次运行应用程序，注意现在两个旋转方向都在帧动画到达最终静止位置时发生。如果你难以同时看到两者，你也可以将
    `<scale>` 和 `<alpha>` 变换的 `startOffset` 值调整为 0，这样启动这些动画就没有延迟，此时所有数据值都实现 100% 同步（见图
    4-18）。尝试更多的数值微调，直到你对结果满意并熟悉微调值的工作流程！


    ![A978-1-4302-5786-8_4_Fig18_HTML.jpg](img/A978-1-4302-5786-8_4_Fig18_HTML.jpg)


    图 4-18. 微调你的 `<rotate>` 变换标签参数以实现不同的动画特效

