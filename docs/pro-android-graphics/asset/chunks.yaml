    you place the method call inside an `onLongClick( )` nested method, the nested
    `pag` object reference used to call the `.setImageDrawable( )` method becomes
    unable to see this ImageView object instantiation at the top of your `setUpAnimation(
    )` method. So Eclipse puts a wavy red error highlight under the `pag` ImageView
