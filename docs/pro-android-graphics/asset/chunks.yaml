    to apply the `paintObject` to the image


    Open your `activity_contents.xml` XML definition file in your center editing pane
    of Eclipse, or if it is already open, click the tab to bring it up for editing,
    and you’ll add your `<ImageView>` child tag next.


    ## Creating an ImageView in XML and Java to Display Canvas


    Add an `<ImageView>` child tag, right underneath the `<ImageButton>` child tag
    inside your first nested child `<LinearLayout>` container, as shown in Figure
    [11-12](#A978-1-4302-5786-8_11_Chapter.html#Fig12). This will place a blend compositing
    `ImageView` underneath your `ImageButton`, in the bottom left corner of your Table
    of Contents UI screen.


    Name the `android:id` parameter `porterDuffImageView`, and then assign it an 8DIP
    margin for good measure. Be sure to include all of the other required parameters,
    which include `android:layout_width` and `android:layout_height` set to `WRAP_CONTENT`,
    as well as the `android:contentDescription` parameter, for the sight impaired,
    referencing your existing `@string/bookmark_utility`.


    Since you are not configuring this `<ImageView>` UI element with `android:src`
    or `android:background` parameters, because you are going to define this in your
    Java code, you won’t be able to see it in the **Graphical Layout Editor** tab,
    unless you select (or have your cursor inside) the `ImageView` tag or one of its
    five parameters before you switch into the GLE editing mode.


    If you have any of the `ImageView` selected, you will still be able to see a selection
    widget with handles around its perimeter, showing you that your `ImageView` UI
    widget is indeed included in your user interface definition.


    ![A978-1-4302-5786-8_11_Fig12_HTML.jpg](A978-1-4302-5786-8_11_Fig12_HTML.jpg)


    **Figure 11-12.** Adding an `<ImageView>` child tag with ID `porterDuffImageView`
    to your first nested `<LinearLayout>` tag


    Now you can instantiate your `ImageView` object, as shown in Figure [11-13](#A978-1-4302-5786-8_11_Chapter.html#Fig13).


    ![A978-1-4302-5786-8_11_Fig13_HTML.jpg](A978-1-4302-5786-8_11_Fig13_HTML.jpg)


    **Figure 11-13.** Instantiating your `ImageView` Java object named `porterDuffImageComposite`
    and referencing XML


    As you can see in Figure [11-13](#A978-1-4302-5786-8_11_Chapter.html#Fig13), you
    have not used any `ImageView` objects yet in this `Activity` subclass, so mouse-over
    the `ImageView` class reference and **Import `ImageView` (android.widget)**. Also,
    notice that you gave the `ImageView` object a logical name (`porterDuffImageComposite`)
    using the following code:


    ```

    ImageView porterDuffImageComposite = (ImageView) findViewById(R.id.porterDuffImageView);

    ```


    Now all you have to do is wire your `compositeImage` `Bitmap` object to the `porterDuffImageComposite`
    `ImageView` object and you will be ready to test a bunch of the `PorterDuff` blending
    modes using less than a dozen lines of Java code, which is pretty concise for
    pulling off such an advanced image graphics operation like image compositing using
    `PorterDuff` blending modes!


    ## Writing the Canvas to an ImageView Via `.setImageBitmap()`


    Finally, click your `ContentsActivity.java` editing tab at the top of ADT and
    add the final line of code, which uses the `.setImageBitmap()` method called off
    of the `porterDuffImageComposite` `ImageView` object using dot notation, and pass
    it the `compositeImage` `Bitmap` object as its parameter, as shown in Figure [11-14](#A978-1-4302-5786-8_11_Chapter.html#Fig14)
    and in the following line of Java code:


    ```

    porterDuffImageComposite.setImageBitmap(compositeImage);

    ```


    ![A978-1-4302-5786-8_11_Fig14_HTML.jpg](A978-1-4302-5786-8_11_Fig14_HTML.jpg)


    **Figure 11-14.** Using a `.setImageBitmap()` method to write the `Canvas` object
    named `imageCanvas` to `ImageView`


    This takes the `compositeImage` `Bitmap` object that is used as a canvas by the
    `Canvas` object and maps it (sets it, points it, references it, wires it) to the
    `ImageView`, so that whatever happens in the `Canvas` is displayed in the `ImageView`.


    Now everything is wired up together (referencing each other correctly) and you
    can use the **Run As ➤ Android Application** work process to test your Java code
    in the Nexus One emulator. As you can see in Figure [11-15](#A978-1-4302-5786-8_11_Chapter.html#Fig15),
    the `XOR` `PorterDuff` mode shows nothing where your two images overlap.


    ![A978-1-4302-5786-8_11_Fig15_HTML.jpg](A978-1-4302-5786-8_11_Fig15_HTML.jpg)


    **Figure 11-15.** Testing the `XOR` (left) and the `MULTIPLY` (right) `PorterDuff.Mode`
    constants in the Nexus One


    This also demonstrates that the `XOR` `PorterDuff.Mode` constant correctly “respects”
    the alpha channel. If it didn’t factor in the alpha channel transparency, the
    entire image would be white, not just the circular part of the image that is defined
    by the alpha channel as being opaque.


    Next, go into your Java code and replace the `PorterDuff.Mode.XOR` constant with
    the `PorterDuff.Mode.MULTIPLY` constant, and again use your **Run As ➤ Android
    Application** work process to take a look at how the `MULTIPLY` blend mode multiplies
    these two images together, as shown in Figure [11-15](#A978-1-4302-5786-8_11_Chapter.html#Fig15)
    on the right-hand side of the screen shot. As you can clearly see, a `PorterDuff.Mode.MULTIPLY`
    constant also correctly respects (factors in) your alpha channel data for the
    digital image asset.


    If you find that the other `PorterDuff` blending modes also respect your alpha
    channel when you use the `PorterDuffXfermode` class, then the problem you saw
    earlier in the `PorterDuffColorFilter` section of this chapter might just be confined
    to the `PorterDuffColorFilter` class.


    This means that you will be able to blend images that have an alpha channel correctly
    by using the `PorterDuffXfermode` class. Let’s find out, and use the other four
    blending modes in your `ContentsActivity` Java code, and you will see what happens
    first hand, by actually using these modes.


    Go into the image compositing and blending that you just wrote, and change your
    `PorterDuff.Mode.MULTIPLY` constant to `PorterDuff.Mode.OVERLAY`, and again use
    the **Run As ➤ Android Application** to see the results, which are shown in Figure
    [11-16](#A978-1-4302-5786-8_11_Chapter.html#Fig16) on the left-hand side of the
    screen shot.


    As you can see, the alpha channel seems to be respected and the `CloudSky` image
    is blended into the `bookmark` image for a subtle effect in the text area and
    perimeter metal hoop.


    ![A978-1-4302-5786-8_11_Fig16_HTML.jpg](A978-1-4302-5786-8_11_Fig16_HTML.jpg)


    **Figure 11-16.** Testing the `OVERLAY` (left) and the `SCREEN` (right) `PorterDuff.Mode`
    constants in the Nexus One


    Next, let’s try the `SCREEN` blending mode, so again go into your Java code, and
    change your `PorterDuff.Mode.OVERLAY` constant to `PorterDuff.Mode.SCREEN`, and
    again use the **Run As ➤ Android Application** to see the results, which are shown
    in Figure [11-16](#A978-1-4302-5786-8_11_Chapter.html#Fig16) on the right-hand
    side of the screen shot.'
