    # 安装与更新 Android 开发者 ADT 套件


    打开 Windows 文件资源管理器，它看起来应该像一个内含文件的文件夹图标（如图 1-13 中从左数第二个图标）。接下来，找到你的**下载**文件夹，它通常位于文件管理器左上角（**收藏夹**部分下方），如图
    1-8 所示。


    点击**下载**文件夹使其高亮显示为蓝色，然后在文件管理器右侧的文件窗格中找到你刚刚下载的 ADT 套件文件。


    ![A978-1-4302-5786-8_1_Fig8_HTML.jpg](img/A978-1-4302-5786-8_1_Fig8_HTML.jpg)


    图 1-8. 在“下载”中找到 `adt-bundle-windows-x86_64` ZIP 文件


    右键点击 `adt-bundle-windows-x86_64` 文件（如图 1-9 所示），弹出上下文菜单，并选择**全部提取**选项。


    ![A978-1-4302-5786-8_1_Fig9_HTML.jpg](img/A978-1-4302-5786-8_1_Fig9_HTML.jpg)


    图 1-9. 右键点击 `adt-bundle` ZIP 文件并选择“全部提取”开始 ADT 安装


    当**提取压缩（Zipped）文件夹**对话框出现时，将默认的安装文件夹替换为你自己创建的文件夹。我在我的根硬盘 `C:\` 下创建了一个名为 `Android`
    的文件夹（即 `C:\Android`）来存放我的 ADT IDE，因为这是一个符合逻辑的名称。图 1-10 显示了操作前后的对话框，对比了难以记忆的系统下载文件夹路径和新的、易于查找的
    `C:\Android` 文件夹路径。


    ![A978-1-4302-5786-8_1_Fig10_HTML.jpg](img/A978-1-4302-5786-8_1_Fig10_HTML.jpg)


    图 1-10. 将目标安装文件夹从“下载”文件夹更改为你创建的 Android 文件夹


    点击图 1-10 中显示的**提取**按钮后，你会看到一个显示安装进度的对话框。点击左下角的**更多详细信息**选项，可以查看正在安装的文件，以及**剩余时间**和**剩余项目**计数器，如图
    1-11 所示。600MB 的安装任务需要 15 到 60 分钟，具体取决于你的硬盘数据传输速度。


    ![A978-1-4302-5786-8_1_Fig11_HTML.jpg](img/A978-1-4302-5786-8_1_Fig11_HTML.jpg)


    图 1-11. 展开“更多详细信息”选项，显示正在安装的文件


    安装完成后，回到你的 Windows 文件资源管理器，查看 `C:\Android` 文件夹（或你命名的其他文件夹），你会看到 `adt-bundle-windows-x86_64`
    文件夹，如图 1-12 所示。打开它，你会看到 `eclipse` 和 `sdk` 两个子文件夹。也打开这些子文件夹，以查看它们的子文件夹内容，从而了解其中包含了什么。


    接下来，点击文件管理器左侧的 `eclipse` 文件夹，在右侧窗格中显示文件内容。找到 `eclipse Application` 可执行文件，该文件的左侧有一个自定义图标，是一个紫色的球体。


    ![A978-1-4302-5786-8_1_Fig12_HTML.jpg](img/A978-1-4302-5786-8_1_Fig12_HTML.jpg)


    图 1-12. 在刚刚安装的 ADT 套件文件夹层次中找到 Eclipse Application 可执行文件


    点击并拖动 Eclipse 图标到桌面底部（或任务栏启动区域所在的位置），并将其悬停在已安装的程序启动图标上方。执行此操作后，你会看到**固定到任务栏**（Windows
    Vista、Windows 7）或**固定到 `eclipse`**（Windows 8）的工具提示消息，如图 1-13 上半部分所示。


    当此工具提示消息出现后，松开鼠标完成拖放操作，将 `eclipse` 紫色球体图标放入任务栏区域，它将成为一个永久的应用程序启动图标，如图 1-13 下半部分所示。


    现在，当我告诉你“启动 Eclipse ADT，让我们开始吧”时，你只需用鼠标单击一次 `eclipse` 图标，它就会启动！


    ![A978-1-4302-5786-8_1_Fig13_HTML.jpg](img/A978-1-4302-5786-8_1_Fig13_HTML.jpg)


    图 1-13. 将 Eclipse 应用程序拖到 Windows 任务栏以执行固定操作


    那么，我们试试看。在任务栏中单击一次 `eclipse` 软件图标，首次启动该软件。你会看到 ADT Android 开发者工具启动屏幕，如图 1-14 左侧所示。当软件加载到系统内存后，你会看到**工作区启动器**对话框（如右侧所示），其中包含**选择工作区**的工作流程，允许你在工作站硬盘上设置默认的
    Android 开发工作区位置。


    ![A978-1-4302-5786-8_1_Fig14_HTML.jpg](img/A978-1-4302-5786-8_1_Fig14_HTML.jpg)


    图 1-14. Android 开发者工具启动屏幕和显示默认工作区的“工作区启动器”对话框


    我接受了默认的工作区位置，它位于主硬盘盘符（通常是 `C:\`）下的 `Users` 文件夹中，并以你 PC 的分配名称命名的子文件夹下；你的 Android
    开发工作区文件夹就在其下。


    当你在 Android ADT 中创建项目时，它们将作为子文件夹出现在此工作区文件夹层次结构下。这样，你既可以通文件管理软件，也可以通过 Eclipse 包资源管理器项目导航窗格找到所有文件。在本书中，你将频繁使用后者来学习
    Android 如何实现图形功能。


    设置好工作区位置并点击**确定**按钮后，Eclipse Java ADT 的启动欢迎屏幕将出现，如图 1-15 所示。你首先要做的是确保软件完全是最新版本，因此请点击屏幕右上角的**帮助**菜单，并选择约三分之二位置处的**检查更新**选项，如图
    1-15（蓝色高亮显示）所示。


    ![A978-1-4302-5786-8_1_Fig15_HTML.jpg](img/A978-1-4302-5786-8_1_Fig15_HTML.jpg)


    图 1-15. Eclipse Java ADT 欢迎屏幕及执行“帮助” ➤ “检查更新”菜单命令


    选择此菜单选项后，你会看到**正在联系软件站点**对话框，如图 1-16 左侧所示。该对话框显示**正在检查更新**的进度条，同时检查各个 Google Android
    软件仓库站点是否有 Eclipse ADT 的更新版本。


    需要特别注意的是，你（仍然）必须连接到互联网，才能进行这种实时的软件包更新。就我而言，由于我刚刚下载了 ADT 开发环境，没有找到任何新更新，因此收到了一个告知此情况的对话框。


    ![A978-1-4302-5786-8_1_Fig16_HTML.jpg](img/A978-1-4302-5786-8_1_Fig16_HTML.jpg)


    图 1-16. “正在联系软件站点”对话框正在检查 Eclipse ADT 的更新，未找到任何更新


    如果 Eclipse ADT 环境有更新（如果你刚刚下载并安装，应该不会有），只需按照说明更新 ADT 中需要更新的组件即可。这样，你将始终拥有最新的软件开发套件（SDK）版本。


    需要特别注意的是，你可以随时运行 `帮助 ➤ 检查更新` 菜单命令序列。有些开发者每周甚至每天都会执行此操作，以确保始终拥有最新（无 bug、功能丰富）的
    Android 开发环境。

