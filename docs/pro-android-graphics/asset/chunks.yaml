    \ `0,0`，以及目标右下角。\n\n目标角的位置数据值在逻辑上将通过调用你已经编写好并存储在 `canvasW` 和 `canvasH` 整型变量中的\
    \ `.getBounds().width()` 和 `.getBounds().height()` 方法来设置。\n\n这可以通过一行 Java 代码完成，如图\
    \ 16-26 所示：\n\n```\nRectF drawRect = new RectF(0.0f, 0.0f, canvasW, canvasH);\n\
    ```\n\n接下来，你将使用名为 `arg0` 的 `Canvas` 对象（该方法的第一个参数是 Eclipse ADT 遵循的命名约定）来调用你的 `Canvas`\
    \ 类绘图方法，该方法将为你执行图像圆角处理。一旦处理了不透明度，你就完成了自定义 `Drawable` 的创建。\n\n![A978-1-4302-5786-8_16_Fig26_HTML.jpg](img/A978-1-4302-5786-8_16_Fig26_HTML.jpg)\n\
