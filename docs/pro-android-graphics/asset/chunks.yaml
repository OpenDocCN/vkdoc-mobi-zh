    # 使用位图源绘制：实现你的 InkShader


    要实现这一点，你本质上需要为你的笔（或手指）创建一个 `InkShader`，这需要用到一些你在本书中那些相当复杂的图形管线构建中已经使用过的类。


    你首先需要做的是，使用 `BitmapFactory` 类及其 `.decodeResource()` 方法调用来创建一个 `paintImage` Bitmap
    对象。


    在这个 `BitmapFactory.decodeResource()` 方法调用中，你需要嵌套另一个 `getResources()` 方法调用，以及对
    `R.drawable.cloudsky` 图片资源的引用。你可以使用以下代码来实现：


    ```

    Bitmap paintImage = BitmapFactory.decodeResources(getResources(), R.drawable.cloudsky);

    ```


    如图 17-30 所示，你将这段代码放在 `paintScreen` 对象实例化之后，以便将 `paintScreen` 和 `paintImage` 对象放在一起。有时候，你就是得主动让你的
    Java 编码变得浪漫起来。现在你已经有了一个可以从中克隆彩色像素数据的 `paintImage` Bitmap 对象，接下来就可以继续创建你的 Shader
    代码了。


    ![A978-1-4302-5786-8_17_Fig30_HTML.jpg](img/A978-1-4302-5786-8_17_Fig30_HTML.jpg)


    *图 17-30. 使用 `BitmapFactory.decodeResource()` 方法调用创建 `paintImage` Bitmap 对象*


    现在，你可以使用你信赖的 `BitmapShader` 类，通过实例化一个新的（关键字）`BitmapShader` 对象来创建一个 `inkShader`
    对象，该对象使用你的 `paintImage` 作为 Bitmap 对象参数，并针对 X 和 Y 轴（或维度）使用 `Shader.TileMode.CLAMP`
    常量，如图 17-31 所示。


    实现此 `inkShader` 配置的 Java 代码如下所示：


    ```

    BitmapShader inkShader = new BitmapShader(paintImage, Shader.TileMode.CLAMP, Shader.TileMode.CLAMP);

    ```


    ![A978-1-4302-5786-8_17_Fig31_HTML.jpg](img/A978-1-4302-5786-8_17_Fig31_HTML.jpg)


    *图 17-31. 使用 `new` 关键字和 `BitmapShader` 构造函数创建 `inkShader` BitmapShader 对象*


    如图 17-31 和图 17-32 所示，你需要将鼠标悬停在 `Shader` 和 `BitmapShader` 类引用上，让 Eclipse 从 `android.graphics`
    包中导入 `Shader` 和 `BitmapShader` 类。


    ![A978-1-4302-5786-8_17_Fig32_HTML.jpg](img/A978-1-4302-5786-8_17_Fig32_HTML.jpg)


    *图 17-32. 将鼠标悬停在 `Shader` 和 `BitmapShader` 类引用上，让 Eclipse 为你导入代码声明*


    接下来，为了能够直观地看到使用位图图片资源源进行绘制，请将你的细 5 像素画笔描边宽度改为更宽的 `25 像素画笔描边`宽度，就像你在 GIMP 2.8.6
    或 Photoshop CS6 中所做的那样，只不过这里是通过 Java 代码实现的。


    点击 Eclipse 中 `onDraw()` 方法代码块旁边的加号图标，如图 17-33 所示，展开该方法，以便你可以编辑其中的 `for` 循环和 `canvas.drawCircle()`
    方法调用。


    将第三个数据参数从值 5 改为值 `25`，使方法调用看起来像下面这条 Java 编程语句：


    ```

    canvas.drawCircle(point.x, point.y, 25, paintScreen);

    ```


    完成这一步后，你就可以“连接”你的 `inkShader` BitmapShader 了！


    ![A978-1-4302-5786-8_17_Fig33_HTML.jpg](img/A978-1-4302-5786-8_17_Fig33_HTML.jpg)


    *图 17-33. 在 `.onDraw()` 方法的 `.drawCircle()` 调用中，将画笔描边宽度从 5 像素改为 25 像素*


    让我们通过点击减号来收起你的 `onDraw()` 方法，然后通过点击加号展开 `SketchPadView()` 构造方法。接下来，你将用以下代码替换 `paintScreen.setColor()`
    方法调用，改为设置 `BitmapShader inkShader` 对象：


    ```

    paintScreen.setShader(inkShader);

    ```


    这将把一个包含 `paintImage` Bitmap 对象的 `inkShader` BitmapShader 对象连接到你的 `paintScreen`
    Paint 对象中，该 Paint 对象随后在 `onDraw()` 方法中用于创建你的画笔，并将其变成一个克隆工具。如图 17-34 所示，你的代码没有错误；因此，你已经准备好在你的
    Canvas 对象表面上，使用粗 25 像素的画笔描边来克隆你的 `cloudsky.jpg` 图片资源，就像你在 GIMP 中所做的那样。


    ![A978-1-4302-5786-8_17_Fig34_HTML.jpg](img/A978-1-4302-5786-8_17_Fig34_HTML.jpg)


    *图 17-34. 将 `paintScreen.setColor()` 方法调用改为 `paintScreen.setShader(inkShader)`
    方法调用*


    这看起来就像是你正在擦除白色（默认）系统屏幕背景色，并暴露出其背后的 `cloudsky` 图片。然而，实际情况并非如此；实际上，你是在使用你的位图图片源在这个白色画布表面上进行绘制。


    让我们使用 `Run As ➤ Android Application` 菜单序列，启动 Nexus One 模拟器，这样你就可以看到你的着色器绘制管线在运行了。


    点击模拟器上的 `MENU` 按钮，选择 `The PAG SketchPad` 菜单项，启动 `SketchPad.java` Activity 子类，这样你就可以最后一次（希望如此）使用
    Nexus One AVD 模拟器测试你的新代码了。


    当白色屏幕出现时，画一个巨大的 PAG，以暴露出通过 `Shader` 和 `BitmapShader` 类从你的 Bitmap 对象中提取的部分像素颜色数据。如图
    17-35 所示，我还尝试了让白色覆盖层背后的图像显现出来的效果，尽管这并不是实际发生的情况，但如果你愿意，你完全可以在你自己的应用中利用这种感知到的效果！


    ![A978-1-4302-5786-8_17_Fig35_HTML.jpg](img/A978-1-4302-5786-8_17_Fig35_HTML.jpg)


    *图 17-35. 使用 Nexus One AVD 模拟器测试你的 InkShader 和图片克隆绘制功能*


    ## 总结


    在第十七章中，你学习了如何利用 `.onDraw()` 方法结合 `Paint` 和 `Canvas` 类，在 Android 中创建你自己的自定义 `SketchPad`
    图形程序。我们更详细地研究了 `Canvas` 和 `Paint` 类。然后，你编写了在画布上绘制的管线代码，学习了如何使用 `Paint`、`Canvas`、`onDraw()`
    和 `onTouch()` 以及其他一些关键类来创建交互式图形应用程序。


    在此过程中，你还了解了一些其他重要的图形类，包括用于向 Android 操作系统提供操作上下文的 `Context` 类，以及用于创建集合（列表）和这些集合数组的
    `List` 和 `ArrayList` 类。


    你还进一步了解了 `MotionEvent` 类，后来你将其用于 Android 操作系统和交互式应用程序（在本例中是你的 `SketchPadView`
    View 子类）中的运动跟踪和触摸事件数据处理。你学习了如何创建自己的自定义 View 子类，就像你在第 16 章中学习如何创建自定义 Drawable 子类一样。


    在下一章中，我们将切回数字视频编辑和优化模式，这是我们之前在第二章中学习的内容，之后我们就被所有这些非常酷的图形管线编码带偏了。'
- fmt: "# 18. Playing Captive Video Using the VideoView and MediaPlayer Classes\n\n\
    ## Abstract\n\nIn this eighteenth chapter, you'll gain more experience using the\
    \ Android `VideoView`, `Uri`, and `MediaPlayer` classes, as well as optimizing\
    \ multiple \"target\" digital video asset resolutions for use with popular Android\
    \ devices featuring different physical display screen resolutions and pixel pitch\
    \ specifications.\n\nIn this eighteenth chapter, you’ll gain more experience using\
    \ the Android `VideoView`, `Uri`, and `MediaPlayer` classes, as well as optimizing\
    \ multiple “target” digital video asset resolutions for use with popular Android\
    \ devices featuring different physical display screen resolutions and pixel pitch\
    \ specifications.\n\nWe will also optimize for a range of digital video playback\
    \ data rates, or bit rates, to accommodate processor power ranging from a single-core\
    \ up to a quad-core and beyond (there are already octa-core devices available\
    \ out there, such as the Galaxy S4 from Samsung Electronics).\n\nWe will first\
    \ take a look at the various stages of a digital video asset’s life cycle, which\
    \ will give you that basic overview you’ll need in order to understand the various\
    \ method calls available for use with the Android `MediaPlayer` digital video\
    \ playback engine.\n\nYou will learn about the Android `MediaPlayer` class and\
    \ its nested classes, which allow you to implement Listeners that will run your\
    \ custom Java code if needed during different stages of the digital video playback\
    \ lifecycle.\n\nYou’ll also implement one of the Listener nested classes in your\
    \ application code. This will allow a digital video asset to loop seamlessly by\
    \ setting up the video looping parameter in the video preparation stage of the\
    \ video playback lifecycle. You’ll learn how to make a digital video asset scale\
    \ to fit different aspect ratios, as promised in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html).\
    \ Finally, you will optimize digital video assets across 10 different industry\
    \ standard device screen resolutions, including WVGA, WSVGA, Pseudo HD (1280 x\
    \ 720), or True HD (1920 x 1080) resolution.\n\n## A Life of a Video: The Stages\
    \ of a Video Playback Lifecycle\n\nBefore we look at the `VideoView` and `MediaPlayer`\
    \ classes in depth, you need to first understand the different “stages” that a\
    \ digital video asset goes through inside the Android operating system. Playing\
    \ a digital video may seem quite simple on the surface: press Play, Pause, Rewind,\
    \ and so on. Certainly these steps are part of the overall process. However, there\
    \ are some “behind the scenes” steps that allow the Android OS to load the video\
    \ asset in memory, set parameters for it, and other more system-level considerations\
    \ which ultimately make for an optimal user experience.\n\nWhen you implement\
    \ a `VideoView`, which you have already done in this book by using around a dozen\
    \ lines of XML markup and Java code, you also implement a `MediaPlayer` object\
    \ that will play a digital video asset associated with this asset via the URI\
    \ object reference.\n\nWhen a `MediaPlayer` object is first instantiated, but\
    \ is doing nothing, the `MediaPlayer` object is in what’s called an idle state.\
    \ Once you use the URI object via the `Uri.parse()` method call, or a `.setDataSource()`\
    \ method call, your `MediaPlayer` object goes into what is termed an initialized\
    \ state. You will learn about the Android `Uri` class a bit later on in this chapter.\n\
    \nThere is an intermediary state between the initialized `MediaPlayer` object\
    \ state and a started `MediaPlayer` object state called a prepared `MediaPlayer`\
    \ object state. This state is accessed using `MediaPlayer.OnPreparedListener`,\
    \ a nested class that you will be learning about in the next section of this chapter\
    \ and actually using inside your application’s Java code.\n\nOnce your `MediaPlayer`\
    \ object has been initialized (loaded with data), and prepared (configured), it\
    \ can then be started. Once started (playing), it can be stopped using the `.stop()`\
    \ method call, or paused using the `.pause()` method call. These three video states\
    \ should be the most familiar to you.\n\nThe final type of `MediaPlayer` object\
    \ state is a playback completed state, which means that the video asset will stop\
    \ playing, unless a `.setLooping()` method call off of (to) the `MediaPlayer`\
    \ object has been set to the `true` Boolean value, in which case your video will\
    \ continue to loop seamlessly.\n\nThere are also `.start()` and `.reset()` method\
    \ calls for a `MediaPlayer` object that can start and reset the `MediaPlayer`\
    \ object again, at any time, based on the needs in your Java programming logic.\
    \ Finally, there’s a `.release()` method call, which invokes the end state for\
    \ the `MediaPlayer` object, which will end the `MediaPlayer` object lifecycle\
    \ and remove it from memory.\n\nThere are other nested classes that will also\
    \ allow you to “listen” for errors (`MediaPlayer.OnErrorListener`), as well other\
    \ states of the `MediaPlayer`, such as when it reaches a playback completed state\
    \ (`MediaPlayer.OnCompletionListener`). You’ll be looking at these in a future\
    \ section when you look at the `MediaPlayer` class in detail to understand exactly\
    \ how it works before you use it in your code!\n\n## Where Video Lives: The Data\
    \ URI and Android’s Uri Class\n\nBefore you look at the `MediaPlayer` class you\
    \ must understand what a URI is, and what URI objects and Android’s `Uri` class\
    \ provide to us as developers.\n\nURI stands for Uniform Resource Identifier,\
    \ and is “uniform” because it is a standard, a “resource” because it references\
    \ a data path to the data that your application will operate on (or utilize),\
    \ and “identifier” because it identifies where you can get the data, also known\
    \ as its data path.\n\nA URI has four parts. First is the URI schema, such as\
    \ `HTTP://`; next comes the authority, such as [`apress.com`](http://apress.com);\
    \ next comes a path, such as `/data/files`; and finally the data object, usually\
    \ some sort of file, such as `video.mp4`.\n\nThe Android `Uri` class is a direct\
    \ subclass of the `java.lang.Object` master class. There is also a `Uri` class\
    \ in the Java programming language, but as we are using Android here, we will\
    \ take a look at the Android `Uri` class. A `java.net.Uri` class also exists;\
    \ however I suggest that you use the Android-specific version of the class, as\
    \ it is conformed for use with Android OS.\n\nThe Android `Uri` class hierarchy\
    \ is structured as follows:\n\n```\njava.lang.Object\n  > android.net.Uri\n```\n\
    \nThe Android `Uri` class belongs to the `android.net` package, making it a tool\
    \ for accessing data across a network. For this reason, the import statement for\
    \ using the `Uri` class inside your Android application references a package path\
    \ of `android.net.Uri`, as you’ll see later on in this chapter.\n\nThe `Uri` class\
    \ is a public abstract class and has over three dozen methods that allow developers\
    \ to work with URI objects (and data path references).\n\nThe Android `Uri` class\
    \ allows developers to create URI objects that provide an immutable URI reference.\
    \ You’ve had experience making your `Bitmap` objects immutable by placing them\
    \ in system memory for use, and you need to do the same thing for your URI data\
    \ path references by using Android’s `Uri` class.\n\nYour URI object reference\
    \ includes a URI specifier as well as a data path reference, which is the component\
    \ of your URI following the `://`. The `Uri` class will take care of building\
    \ and parsing a URI object that references data in a manner that conforms to the\
    \ RFC 2396 technical specification.\n\nTo optimize Android operating system and\
    \ application performance, this `Uri` class performs very little data path validation.\
    \ What this means is that a behavior is not defined for handling an invalid data\
    \ input. This means the `Uri` class is very forgiving in the face of an invalid\
    \ input specification.\n\nThus, as a developer you have to be very careful in\
    \ what you are doing, as URI objects will return garbage rather than throw an\
    \ exception, unless you specify otherwise using your Java code. Error trapping\
    \ and data path validation are left up to the developer to do inside their code."
  raw: '# 18. Playing Captive Video Using the VideoView and MediaPlayer Classes


    Abstract


    In this eighteenth chapter, you''ll gain more experience using the Android VideoView,
    Uri, and MediaPlayer classes, as well as optimizing multiple "target" digital
    video asset resolutions for use with popular Android devices featuring different
    physical display screen resolutions and pixel pitch specifications.


    In this eighteenth chapter, you’ll gain more experience using the Android VideoView,
    Uri, and MediaPlayer classes, as well as optimizing multiple “target” digital
    video asset resolutions for use with popular Android devices featuring different
    physical display screen resolutions and pixel pitch specifications.


    We will also optimize for a range of digital video playback data rates, or bit
    rates, to accommodate processor power ranging from a single-core up to a quad-core
    and beyond (there are already octa-core devices available out there, such as the
    Galaxy S4 from Samsung Electronics).


    We will first take a look at the various stages of a digital video asset’s life
    cycle, which will give you that basic overview you’ll need in order to understand
    the various method calls available for use with the Android MediaPlayer digital
    video playback engine.


    You will learn about the Android MediaPlayer class and its nested classes, which
    allow you to implement Listeners that will run your custom Java code if needed
    during different stages of the digital video playback lifecycle.


    You’ll also implement one of the Listener nested classes in your application code.
    This will allow a digital video asset to loop seamlessly by setting up the video
    looping parameter in the video preparation stage of the video playback lifecycle.
    You’ll learn how to make a digital video asset scale to fit different aspect ratios,
    as promised in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html). Finally, you will
    optimize digital video assets across 10 different industry standard device screen
    resolutions, including WVGA, WSVGA, Pseudo HD (1280 x 720), or True HD (1920 x
    1080) resolution.


    ## A Life of a Video: The Stages of a Video Playback Lifecycle


    Before we look at the VideoView and MediaPlayer classes in depth, you need to
    first understand the different “stages” that a digital video asset goes through
    inside the Android operating system. Playing a digital video may seem quite simple
    on the surface: press Play, Pause, Rewind, and so on. Certainly these steps are
    part of the overall process. However, there are some “behind the scenes” steps
    that allow the Android OS to load the video asset in memory, set parameters for
    it, and other more system-level considerations which ultimately make for an optimal
    user experience.


    When you implement a VideoView, which you have already done in this book by using
    around a dozen lines of XML markup and Java code, you also implement a MediaPlayer
    object that will play a digital video asset associated with this asset via the
    URI object reference.


    When a MediaPlayer object is first instantiated, but is doing nothing, the MediaPlayer
    object is in what’s called an idle state. Once you use the URI object via the
    Uri.parse() method call, or a .setDataSource() method call, your MediaPlayer object
    goes into what is termed an initialized state. You will learn about the Android
    URI class a bit later on in this chapter.


    There is an intermediary state between the initialized MediaPlayer object state
    and a started MediaPlayer object state called a prepared MediaPlayer object state.
    This state is accessed using MediaPlayer.OnPreparedListener, a nested class that
    you will be learning about in the next section of this chapter and actually using
    inside your application’s Java code.


    Once your MediaPlayer object has been initialized (loaded with data), and prepared
    (configured), it can then be started. Once started (playing), it can be stopped
    using the .stop() method call, or paused using the .pause() method call. These
    three video states should be the most familiar to you.


    The final type of MediaPlayer object state is a playback completed state, which
    means that the video asset will stop playing, unless a .setLooping() method call
    off of (to) the MediaPlayer object has been set to the true Boolean value, in
    which case your video will continue to loop seamlessly.


    There are also .start() and .reset() method calls for a MediaPlayer object that
    can start and reset the MediaPlayer object again, at any time, based on the needs
    in your Java programming logic. Finally, there’s a .release() method call, which
    invokes the end state for the MediaPlayer object, which will end the MediaPlayer
    object lifecycle and remove it from memory.


    There are other nested classes that will also allow you to “listen” for errors
    (MediaPlayer.OnErrorListener ), as well other states of the MediaPlayer, such
    as when it reaches a playback completed state (MediaPlayer.OnCompletionListener
    ). You’ll be looking at these in a future section when you look at the MediaPlayer
    class in detail to understand exactly how it works before you use it in your code!


    ## Where Video Lives: The Data URI and Android’s Uri Class


    Before you look at the MediaPlayer class you must understand what a URI is, and
    what URI objects and Android’s Uri class provide to us as developers.


    URI stands for Uniform Resource Identifier, and is “uniform” because it is a standard,
    a “resource” because it references a data path to the data that your application
    will operate on (or utilize), and “identifier” because it identifies where you
    can get the data, also known as its data path.


    A URI has four parts. First is the URI schema, such as HTTP:// ; next comes the
    authority, such as [`apress.com`](http://apress.com) ; next comes a path, such
    as /data/files ; and finally the data object, usually some sort of file, such
    as video.mp4.


    The Android Uri class is a direct subclass of the java.lang.Object master class.
    There is also a Uri class in the Java programming language, but as we are using
    Android here, we will take a look at the Android Uri class. A java.net.Uri class
    also exists; however I suggest that you use the Android-specific version of the
    class, as it is conformed for use with Android OS.


    The Android Uri class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.net.Uri`


    The Android Uri class belongs to the android.net package, making it a tool for
    accessing data across a network. For this reason, the import statement for using
    the Uri class inside your Android application references a package path of android.net.Uri,
    as you’ll see later on in this chapter.


    The Uri class is a public abstract class and has over three dozen methods that
    allow developers to work with URI objects (and data path references).


    The Android Uri class allows developers to create URI objects that provide an
    immutable URI reference. You’ve had experience making your Bitmap objects immutable
    by placing them in system memory for use, and you need to do the same thing for
    your URI data path references by using Android’s Uri class.


    Your URI object reference includes a URI specifier as well as a data path reference,
    which is the component of your URI following the ://. The Uri class will take
    care of building and parsing a URI object that references data in a manner that
    conforms to the RFC 2396 technical specification.


    To optimize Android operating system and application performance, this Uri class
    performs very little data path validation. What this means is that a behavior
    is not defined for handling an invalid data input. This means the Uri class is
    very forgiving in the face of an invalid input specification.


    Thus, as a developer you have to be very careful in what you are doing, as URI
    objects will return garbage rather than throw an exception, unless you specify
    otherwise using your Java code. Error trapping and data path validation are left
    up to the developer to do inside their code.'
  trans: "\n# 18. 使用 VideoView 和 MediaPlayer 类播放视频\n\n## 摘要\n\n在第十八章中，你将获得更多关于使用 Android\
    \ `VideoView`、`Uri` 和 `MediaPlayer` 类的经验，并学习如何优化多个“目标”数字视频资源的分辨率，以适应那些具有不同物理显示屏分辨率和像素间距规格的流行\
    \ Android 设备。\n\n在第十八章中，你将获得更多关于使用 Android `VideoView`、`Uri` 和 `MediaPlayer` 类的经验，并学习如何优化多个“目标”数字视频资源的分辨率，以适应那些具有不同物理显示屏分辨率和像素间距规格的流行\
    \ Android 设备。\n\n我们还将优化一系列数字视频播放的数据速率（即比特率），以适应从单核到四核及更高性能的处理器（市面上已有八核设备，例如三星电子的\
    \ Galaxy S4）。\n\n我们首先将了解数字视频资产生命周期的各个阶段，这将为你提供基本概述，以便你理解可用于 Android `MediaPlayer`\
    \ 数字视频播放引擎的各种方法调用。\n\n你将学习 Android `MediaPlayer` 类及其嵌套类，这些类允许你实现监听器，以便在数字视频播放生命周期的不同阶段按需运行自定义\
    \ Java 代码。\n\n你还将在应用程序代码中实现其中一个监听器嵌套类。这将通过在视频播放生命周期的视频准备阶段设置循环参数，使数字视频资源无缝循环播放。你将学习如何使数字视频资源缩放以适应不同的宽高比，正如在第\
    \ 2 章中所承诺的那样。最后，你将在 10 种不同的行业标准设备屏幕分辨率下优化数字视频资源，包括 WVGA、WSVGA、准高清（1280 x 720）或真高清（1920\
    \ x 1080）分辨率。\n\n## 视频的一生：视频播放生命周期的各个阶段\n\n在深入探讨 `VideoView` 和 `MediaPlayer` 类之前，你首先需要了解数字视频资源在\
    \ Android 操作系统内部经历的各个不同“阶段”。在表面上，播放数字视频似乎非常简单：按下播放、暂停、快退等。当然，这些步骤是整个流程的一部分。然而，还有一些“幕后”步骤，允许\
    \ Android 操作系统将视频资源加载到内存中、为其设置参数，以及其他更多系统级别的考量，这些最终都是为了实现最佳用户体验。\n\n当你实现一个 `VideoView`\
    \ 时（你在本书中已经通过大约十几行的 XML 标记和 Java 代码完成过），你实际上也实现了一个 `MediaPlayer` 对象，该对象将通过 URI\
    \ 对象引用播放与之关联的数字视频资源。\n\n当 `MediaPlayer` 对象首次被实例化但未执行任何操作时，它处于所谓的空闲状态。一旦你通过 `Uri.parse()`\
    \ 方法调用或 `.setDataSource()` 方法调用使用了 URI 对象，你的 `MediaPlayer` 对象就会进入所谓的初始化状态。稍后你将在本章中了解\
    \ Android 的 `Uri` 类。\n\n在初始化的 `MediaPlayer` 对象状态和启动的 `MediaPlayer` 对象状态之间，存在一个中间状态，称为已准备的\
    \ `MediaPlayer` 对象状态。通过使用 `MediaPlayer.OnPreparedListener`（你将在本章下一节中学到的嵌套类，并在你的应用程序\
    \ Java 代码中实际使用它）来访问此状态。\n\n一旦你的 `MediaPlayer` 对象被初始化（加载了数据）并准备好（配置完成），它就可以启动了。一旦启动（开始播放），可以使用\
    \ `.stop()` 方法调用停止它，或者使用 `.pause()` 方法调用暂停它。这三种视频状态应该是你最熟悉的。\n\n`MediaPlayer`\
    \ 对象状态的最后一种类型是播放完成状态，这意味着视频资源将停止播放，除非通过 `.setLooping()` 方法调用将 `MediaPlayer` 对象的循环属性设置为\
    \ `true` 布尔值。在这种情况下，你的视频将继续无缝循环。\n\n对于 `MediaPlayer` 对象，还有 `.start()` 和 `.reset()`\
    \ 方法调用，可以根据 Java 编程逻辑的需要，随时启动和重置 `MediaPlayer` 对象。最后，还有一个 `.release()` 方法调用，它会触发\
    \ `MediaPlayer` 对象的结束状态，从而结束 `MediaPlayer` 对象的生命周期并将其从内存中移除。\n\n还有其他嵌套类允许你“监听”错误（`MediaPlayer.OnErrorListener`）以及\
    \ `MediaPlayer` 的其他状态，例如当其达到播放完成状态时（`MediaPlayer.OnCompletionListener`）。在接下来的部分中，当你在代码中使用\
    \ `MediaPlayer` 类之前，你将详细查看该类的具体工作原理！\n\n## 视频的存储位置：数据 URI 与 Android 的 Uri 类\n\n\
    在查看 `MediaPlayer` 类之前，你必须理解什么是 URI，以及 URI 对象和 Android 的 `Uri` 类能为我们开发者提供什么。\n\n\
    URI 代表统一资源标识符。它是“统一”的，因为它是一种标准；是“资源”，因为它引用了应用程序将要操作（或使用）的数据路径；是“标识符”，因为它标识了你可以从哪里获取数据，也就是其数据路径。\n\
    \n一个 URI 有四个部分。首先是 URI 模式，例如 `HTTP://`；其次是授权机构，例如 [`apress.com`](http://apress.com)；接着是路径，例如\
    \ `/data/files`；最后是数据对象，通常是某种文件，例如 `video.mp4`。\n\nAndroid 的 `Uri` 类是 `java.lang.Object`\
    \ 主类的直接子类。Java 编程语言中也存在一个 `Uri` 类，但既然我们使用的是 Android，我们将重点了解 Android 的 `Uri` 类。此外，还存在一个\
    \ `java.net.Uri` 类；但我建议你使用 Android 特定版本的类，因为它已针对 Android 操作系统的使用进行了适配。\n\nAndroid\
    \ 的 `Uri` 类层次结构如下：\n\n```\njava.lang.Object\n  > android.net.Uri\n```\n\nAndroid\
    \ 的 `Uri` 类属于 `android.net` 包，因此它是用于通过网络访问数据的工具。为此，在你的 Android 应用程序中使用 `Uri` 类所需的导入语句引用的包路径是\
    \ `android.net.Uri`，稍后你将在本章中看到这一点。\n\n`Uri` 类是一个公共抽象类，拥有超过三十个方法，允许开发者处理 URI 对象（和数据路径引用）。\n\
    \nAndroid 的 `Uri` 类允许开发者创建提供不可变 URI 引用的 URI 对象。你之前有过经验，通过将 `Bitmap` 对象放入系统内存中使其成为不可变对象供使用；你需要通过使用\
    \ Android 的 `Uri` 类对你的 URI 数据路径引用做同样的事情。\n\n你的 URI 对象引用包括一个 URI 说明符以及一个数据路径引用，后者是\
    \ URI 中 `://` 之后的部分。`Uri` 类负责构建和解析一个 URI 对象，该对象以符合 RFC 2396 技术规范的方式引用数据。\n\n为了优化\
    \ Android 操作系统和应用程序的性能，此 `Uri` 类执行非常少的数据路径验证。这意味着，对于处理无效数据输入的行为是未定义的。也就是说，面对无效的输入规范，`Uri`\
    \ 类非常宽容。\n\n因此，作为开发者，你在操作时必须非常小心，因为 URI 对象会返回垃圾数据而不是抛出异常，除非你在 Java 代码中另行指定。错误捕获和数据路径验证留待开发者在代码内部自行处理。\n"
- fmt: "# Android’s `MediaPlayer` Class: Controlling Video Playback\n\nWe looked (briefly)\
    \ at the `MediaPlayer` and `MediaController` classes back in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html),\
    \ and now it’s time to get into the `MediaPlayer` core media player class at an\
    \ advanced level so that you can leverage it directly within your `GraphicsDesign`\
    \ app’s `MainActivity.java` class.\n\nLater on in the chapter you will put your\
    \ 3D virtual world fly-through video back in behind your logo to create an animated\
    \ backdrop for your application splash screen. To do this you’ll need to make\
    \ it loop seamlessly, and you’ll need to remove the `MediaController` UI component,\
    \ making the digital video asset simply a part of your overall animated splash\
    \ screen compositing operation.\n\nThe Android `MediaPlayer` class is a direct\
    \ subclass of the `java.lang.Object` master class. This indicates that Android’s\
    \ `MediaPlayer` class was designed specifically for the purpose of providing `MediaPlayer`\
    \ objects. These are a part of the `VideoView` widget, as you will see in the\
    \ next section.\n\nAndroid’s `MediaPlayer` class hierarchy is therefore structured\
    \ as follows:\n\n```\njava.lang.Object\n  > android.media.MediaPlayer\n```\n\n\
    The `MediaPlayer` class belongs to the `android.media` package. Therefore, the\
    \ import statement for using a `MediaPlayer` class in your app references the\
    \ `android.media.MediaPlayer` package, as you will soon see in this book.\n\n\
    The `MediaPlayer` class is a public class and features nine nested classes. Eight\
    \ of these nested classes offer callbacks for determining information regarding\
    \ the operation of the `MediaPlayer` video playback engine. The ninth nested class,\
    \ a `MediaPlayer.TrackInfo` nested class, is utilized to return video, audio,\
    \ or subtitle track metadata information.\n\nThe callback that you will be implementing\
    \ later on in the chapter is the `MediaPlayer.OnPreparedListener`, which allows\
    \ you to configure a `MediaPlayer` object before playback starts the first time.\
    \ Other often-called callbacks include `MediaPlayer.OnErrorListener`, which can\
    \ respond to (handle) error messages, and `MediaPlayer.OnCompletionListener`,\
    \ which can run other Java statements once your video asset playback is completed.\n\
    \nThere is also `MediaPlayer.OnSeekCompletedListener`, which is called when a\
    \ seek operation is completed, and `MediaPlayer.OnBufferingUpdateListener`, which\
    \ is called in order to obtain data buffering status for a video asset that is\
    \ being streamed over a network.\n\nThere are also a couple of less often utilized\
    \ nested classes, such as the `MediaPlayer.OnTimedTextListener` (used when timed\
    \ text becomes available for display) and `MediaPlayer.OnInfoListener` (used to\
    \ display information or warnings about certain video media). These are not used\
    \ often, at least not to my knowledge, but are available if necessary.\n\n## The\
    \ Android `VideoView` Class: The Video Asset Container\n\nBehind the scenes (no\
    \ pun intended), the Android `MediaPlayer` and `VideoView` classes are married\
    \ together, wedded in a digital matrimonial bliss, which may not be apparent on\
    \ the surface, as is the case with most marriages. In this section we’ll investigate\
    \ how these two classes are inexorably linked together so that you understand\
    \ the best way to access the `MediaPlayer` in the `VideoView` object, which you’ll\
    \ be doing a bit later on in this chapter.\n\nThe Android `VideoView` class is\
    \ a direct subclass of an Android `SurfaceView` layout container class, which\
    \ is in turn the direct subclass of an Android `View` class, which is, finally,\
    \ the direct subclass of the `java.lang.Object` master class.\n\nThe Android `VideoView`\
    \ class hierarchy is therefore structured as follows:\n\n```\njava.lang.Object\n\
    \  > android.view.View\n    > android.view.SurfaceView\n      > android.widget.VideoView\n\
    ```\n\nThe Android `VideoView` class belongs to the `android.widget` package,\
    \ making it a User Interface element, or widget. Therefore, the import statement\
    \ for using the `VideoView` class in your Android application references `android.widget.VideoView`\
    \ as its package, as you saw earlier in this book.\n\nThe `VideoView` class is\
    \ a public class and has over two dozen method calls or callbacks, which one would\
    \ think would be part of the `MediaPlayer` class, and in a way, as you know now,\
    \ they’re married together, deep in Java code.\n\nWe will take a look at some\
    \ of the more important and useful method calls since we already covered the callbacks\
    \ (in the previous section), just so that you’re familiar with them in case you\
    \ need to implement any of these extended digital video features in your own video\
    \ playback applications.\n\nThe simplest method calls were discussed in the first\
    \ section on `MediaPlayer` states; these include `.pause()`, `.resume()`, `.start()`,\
    \ `.stop()`, `.suspend()`, and `.stopPlayback()`. We’ve already used the `.setMediaController()`\
    \ and the `.setVideoURI()` method calls, and there is a `.setVideoPath()` method\
    \ call as well, which accomplishes much the same end result.\n\nThere are four\
    \ `.get()` method calls: `.getDuration()`, `.getCurrentPosition()`, `.getBufferPercentage()`,\
    \ and `.getAudioSessionId()` as well as an `.isPlaying()` method call to see if\
    \ the video is playing back currently. There are also three `.can()` method calls\
    \ to ascertain what the `MediaPlayer` is able to do: `.canPause()`, `.canSeekBackward()`,\
    \ and `.canSeekForward()`.\n\nThere are standard event handling method calls that\
    \ are inherited from the `View` class, such as `.onTouchEvent()`, `onKeyDown()`,\
    \ and `onTrackballEvent()`. Finally, there are specialized method calls such as\
    \ `.resolveAdjustedSize()` or `.onInitializeAccessibilityEvent()` to implement\
    \ accessibility standards."
  raw: '## Android’s MediaPlayer Class: Controlling Video Playback


    We looked (briefly) at the MediaPlayer and MediaController classes back in [Chapter
    2](#A978-1-4302-5786-8_2_Chapter.html), and now it’s time to get into the MediaPlayer
    core media player class at an advanced level so that you can leverage it directly
    within your GraphicsDesign app’s MainActivity.java class.


    Later on in the chapter you will put your 3D virtual world fly-through video back
    in behind your logo to create an animated backdrop for your application splash
    screen. To do this you’ll need to make it loop seamlessly, and you’ll need to
    remove the MediaController UI component, making the digital video asset simply
    a part of your overall animated splash screen compositing operation.


    The Android MediaPlayer class is a direct subclass of the java.lang.Object master
    class. This indicates that Android’s MediaPlayer class was designed specifically
    for the purpose of providing MediaPlayer objects. These are a part of the VideoView
    widget, as you will see in the next section.


    Android’s MediaPlayer class hierarchy is therefore structured as follows:


    `java.lang.Object`


      `> android.media.MediaPlayer`


    The MediaPlayer class belongs to the android.media package. Therefore, the import
    statement for using a MediaPlayer class in your app references the android.media.MediaPlayer
    package, as you will soon see in this book.


    The MediaPlayer class is a public class and features nine nested classes. Eight
    of these nested classes offer callbacks for determining information regarding
    the operation of the MediaPlayer video playback engine. The ninth nested class,
    a MediaPlayer.TrackInfo nested class, is utilized to return video, audio, or subtitle
    track metadata information.


    The callback that you will be implementing later on in the chapter is the MediaPlayer.OnPreparedListener,
    which allows you to configure a MediaPlayer object before playback starts the
    first time. Other often-called callbacks include MediaPlayer.OnErrorListener,
    which can respond to (handle) error messages, and MediaPlayer.OnCompletionListener,
    which can run other Java statements once your video asset playback is completed.


    There is also MediaPlayer.OnSeekCompletedListener, which is called when a seek
    operation is completed, and MediaPlayer.OnBufferingUpdateListener, which is called
    in order to obtain data buffering status for a video asset that is being streamed
    over a network.


    There are also a couple of less often utilized nested classes, such as the MediaPlayer.OnTimedTextListener
    (used when timed text becomes available for display) and MediaPlayer.OnInfoListener
    (used to display information or warnings about certain video media). These are
    not used often, at least not to my knowledge, but are available if necessary.


    ## The Android VideoView Class: The Video Asset Container


    Behind the scenes (no pun intended), the Android MediaPlayer and VideoView classes
    are married together, wedded in a digital matrimonial bliss, which may not be
    apparent on the surface, as is the case with most marriages. In this section we’ll
    investigate how these two classes are inexorably linked together so that you understand
    the best way to access the MediaPlayer in the VideoView object, which you’ll be
    doing a bit later on in this chapter.


    The Android VideoView class is a direct subclass of an Android SurfaceView layout
    container class, which is in turn the direct subclass of an Android View class,
    which is, finally, the direct subclass of the java.lang.Object master class.


    The Android VideoView class hierarchy is therefore structured as follows:


    `java.lang.Object`


      `> android.view.View`


        `> android.view.SurfaceView`


          `> android.widget.VideoView`


    The Android VideoView class belongs to the android.widget package, making it a
    User Interface element, or widget. Therefore, the import statement for using the
    VideoView class in your Android application references android.widget.VideoView
    as its package, as you saw earlier in this book.


    The VideoView class is a public class and has over two dozen method calls or callbacks,
    which one would think would be part of the MediaPlayer class, and in a way, as
    you know now, they’re married together, deep in Java code.


    We will take a look at some of the more important and useful method calls since
    we already covered the callbacks (in the previous section), just so that you’re
    familiar with them in case you need to implement any of these extended digital
    video features in your own video playback applications.


    The simplest method calls were discussed in the first section on MediaPlayer states;
    these include .pause(), .resume(), .start(), .stop(), .suspend(), and .stopPlayback().
    We’ve already used the .setMediaController() and the .setVideoURI() method calls,
    and there is a .setVideoPath() method call as well, which accomplishes much the
    same end result.


    There are four .get() method calls: .getDuration(), .getCurrentPosition(), .getBufferPercentage(),
    and .getAudioSessionId() as well as an .isPlaying() method call to see if the
    video is playing back currently. There are also three .can() method calls to ascertain
    what the MediaPlayer is able to do: .canPause(), .canSeekBackward(), and .canSeekForward().


    There are standard event handling method calls that are inherited from the View
    class, such as .onTouchEvent(), onKeyDown(), and onTrackballEvent(). Finally,
    there are specialized method calls such as .resolveAdjustedSize() or .onInitializeAccessibilityEvent()
    to implement accessibility standards.'
  trans: "\n# Android `MediaPlayer` 类：控制视频播放\n\n我们曾在第 2 章中简要介绍过`MediaPlayer`和`MediaController`类，现在，是时候深入探讨`MediaPlayer`核心媒体播放器类的高级用法了，以便你能够直接在`GraphicsDesign`应用的`MainActivity.java`类中利用它。\n\
    \n在本章后续内容中，你将把 3D 虚拟世界穿越视频重新置于 Logo 之后，为应用启动画面创建动画背景。为此，你需要让视频无缝循环，并移除`MediaController`\
    \ UI 组件，使数字视频资产仅成为整体动画启动画面合成操作的一部分。\n\nAndroid `MediaPlayer`类是`java.lang.Object`主类的直接子类。这表明\
    \ Android 的`MediaPlayer`类是专门为提供`MediaPlayer`对象而设计的。这些对象是`VideoView`小部件的一部分，你将在下一节中看到。\n\
    \n因此，Android `MediaPlayer`类的层次结构如下：\n\n```\njava.lang.Object\n  > android.media.MediaPlayer\n\
    ```\n\n`MediaPlayer`类属于`android.media`包。因此，在应用中引用`MediaPlayer`类的导入语句指向`android.media.MediaPlayer`包，你很快就会在本书中看到这一点。\n\
    \n`MediaPlayer`类是一个公共类，包含九个嵌套类。其中八个嵌套类提供回调，用于确定`MediaPlayer`视频播放引擎操作的相关信息。第九个嵌套类是`MediaPlayer.TrackInfo`，用于返回视频、音频或字幕轨道的元数据信息。\n\
    \n你在本章后续将实现的回调是`MediaPlayer.OnPreparedListener`，它允许你在播放首次开始前配置`MediaPlayer`对象。其他常用的回调包括`MediaPlayer.OnErrorListener`（可响应并处理错误消息）和`MediaPlayer.OnCompletionListener`（可在视频资产播放完成后运行其他\
    \ Java 语句）。\n\n还有`MediaPlayer.OnSeekCompletedListener`（在搜索操作完成时调用）和`MediaPlayer.OnBufferingUpdateListener`（用于获取通过网络流式传输的视频资产的数据缓冲状态）。\n\
    \n另外还有一些不太常用的嵌套类，例如`MediaPlayer.OnTimedTextListener`（当定时文本可用于显示时调用）和`MediaPlayer.OnInfoListener`（用于显示关于某些视频媒体的信息或警告）。这些类不常用，至少据我所知如此，但在需要时可以使用。\n\
    \n## Android `VideoView` 类：视频资产容器\n\n在幕后（无意双关），Android 的`MediaPlayer`和`VideoView`类紧密结合在一起，如同数字婚姻般幸福，但这种联系可能不像大多数婚姻那样表面可见。在本节中，我们将研究这两个类是如何密不可分地联系在一起的，以便你理解访问`VideoView`对象中`MediaPlayer`的最佳方式，这正是你将在本章稍后部分进行的操作。\n\
    \nAndroid `VideoView`类是 Android `SurfaceView`布局容器类的直接子类，而`SurfaceView`又是 Android\
    \ `View`类的直接子类，最后，`View`类是`java.lang.Object`主类的直接子类。\n\n因此，Android `VideoView`类的层次结构如下：\n\
    \n```\njava.lang.Object\n  > android.view.View\n    > android.view.SurfaceView\n\
    \      > android.widget.VideoView\n```\n\nAndroid `VideoView`类属于`android.widget`包，使其成为用户界面元素（即小部件）。因此，在\
    \ Android 应用中使用`VideoView`类的导入语句引用`android.widget.VideoView`作为其包，正如你在本书前面所看到的。\n\
    \n`VideoView`类是一个公共类，拥有超过二十个方法调用或回调，你可能会以为这些属于`MediaPlayer`类，但从某种意义上来说，正如你现在所知，它们在\
    \ Java 代码深处紧密结合在一起。\n\n我们将介绍一些更重要且有用的方法调用（因为我们已经在前一节中介绍了回调），以便你熟悉它们，以防你需要在自有视频播放应用中实现任何这些扩展的数字视频功能。\n\
    \n最简单的调用方法在第一部分关于`MediaPlayer`状态的讨论中已经涵盖；这些包括`.pause()`、`.resume()`、`.start()`、`.stop()`、`.suspend()`和`.stopPlayback()`。我们已经使用过`.setMediaController()`和`.setVideoURI()`方法调用，此外还有一个`.setVideoPath()`方法调用，它能达到大致相同的最终结果。\n\
    \n有四个`.get()`方法调用：`.getDuration()`、`.getCurrentPosition()`、`.getBufferPercentage()`和`.getAudioSessionId()`，以及一个`.isPlaying()`方法调用来检查视频当前是否正在播放。还有三个`.can()`方法调用来确定`MediaPlayer`能做什么：`.canPause()`、`.canSeekBackward()`和`.canSeekForward()`。\n\
    \n还有一些继承自`View`类的标准事件处理方法调用，例如`.onTouchEvent()`、`onKeyDown()`和`onTrackballEvent()`。最后，还有一些专门的方法调用，例如`.resolveAdjustedSize()`或`.onInitializeAccessibilityEvent()`，用于实现无障碍标准。\n"
- fmt: '# Using the `MediaPlayer` Class: Looping a Video Seamlessly


    The only real way to learn how to implement the `MediaPlayer` by using a `VideoView`
    widget is to get your hands dirty with Java code and XML markup! Let’s shift into
    production mode, write code and optimize video, and add multi-resolution support
    for your video asset next.


    Let’s reinstall the digital video that you created in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html)
    (and disabled in the chapters that followed so that you could explore animation,
    compositing, blending, and the like without the visual distraction of background
    video and its processing overhead) and put those seven lines of code back in the
    `onCreate()` method of your primary `Activity` class so that it plays behind the
    PAG logo on your splash screen. As you can see in Figure [18-1](#A978-1-4302-5786-8_18_Chapter.html#Fig1),
    I’ve placed these seven lines of code right after the `.setUpAnimation()` method
    call, and you’ll see later in the left-hand side of Figure [18-5](#A978-1-4302-5786-8_18_Chapter.html#Fig5)
    that everything is working together seamlessly.


    ![A978-1-4302-5786-8_18_Fig1_HTML.jpg](A978-1-4302-5786-8_18_Fig1_HTML.jpg)


    **Figure 18-1.** Adding your Video Playback Java logic from [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html)
    into your current animated splash screen code


    The next thing that you want to have happen is that instead of a transport UI
    control for your digital video, you want it to loop seamlessly behind the logo.
    To accomplish this, you’ll remove three lines of code, which are shown in Figure
    [18-2](#A978-1-4302-5786-8_18_Chapter.html#Fig2), by commenting them out. These
    are the lines of code to create and wire-in your `MediaController` object to your
    `VideoView` object.


    Next, use the **Run As ➤ Android Application** work process and notice that the
    digital video asset still plays, albeit once, using only the four lines of code
    that are left. This represents the least amount of code that you’ll need to implement
    in order to get digital video assets to play back (once) in an application.


    ![A978-1-4302-5786-8_18_Fig2_HTML.jpg](A978-1-4302-5786-8_18_Fig2_HTML.jpg)


    **Figure 18-2.** Removing the `MediaController` UI controls from your digital
    video playback to prepare to loop it forever


    The fastest (and the simplest) way to get digital video to loop within the Android
    OS is to use the `.setLooping()` method with a `true` parameter. Since this is
    not available with the `MediaController` functionality (and for good reason, as
    if a video is looping forever, controlling it is not an option), you will need
    to use the `MediaPlayer` class, which does support this method.


    You may think that declaring, instantiating, and constructing a `MediaPlayer`
    object and calling this function on it would be the best way to accomplish this,
    but there is a slicker way to obtain a reference to the `MediaPlayer` object that
    the `VideoView` object is utilizing (internally) to play video.


    This is done by using one of those nested classes that you learned about earlier
    in this chapter. Since you only want to set this looping parameter one time, the
    logical nested class for you to utilize to achieve this is the `MediaPlayer.OnPreparedListener()`
    nested class.


    Using this nested class, you can set your looping parameter just as Android is
    preparing the video, when Android is ascertaining how (or when) to play it optimally.
    This is a perfect time to set up parameters, such as looping parameters, in what
    I prefer to think of as a `MediaPlayer` “configuration” (also known as preparation)
    stage of your `MediaPlayer`’s imminent lifecycle.


    This can be done by calling this `.setOnPreparedListener()` method off of your
    `splashScreen` `VideoView` object and instantiating a new nested class inside
    that method call using the `MediaPlayer.OnPreparedListener()` reference.


    The Java statement to do this is shown in Figure [18-3](#A978-1-4302-5786-8_18_Chapter.html#Fig3)
    and looks like this:


    ```

    splashScreen.setOnPreparedListener(new MediaPlayer.OnPreparedListener(){Override});

    ```


    As you can see in Figure [18-3](#A978-1-4302-5786-8_18_Chapter.html#Fig3), Eclipse
    is offering to write unimplemented method bootstrap code for you, so click the
    “Add unimplemented method” option and take a brief moment to thank goodness for
    small miracles.


    ![A978-1-4302-5786-8_18_Fig3_HTML.jpg](A978-1-4302-5786-8_18_Fig3_HTML.jpg)


    **Figure 18-3.** Adding `.setOnPreparedListener()` method to the `splashScreen`
    `VideoView` object to set loop parameter


    Inside this `public void onPrepared(MediaPlayer arg0)` method structure, add your
    `.setLooping(true);` method call, and also notice that I took the liberty of naming
    the `MediaPlayer` object that is passed into this method `splashScreenMediaPlayer`,
    as that is what it is, not a pirate hurling some insult (Aarrrgh Zero). Weak joke,
    but strong code. So, as you can see in Figure [18-4](#A978-1-4302-5786-8_18_Chapter.html#Fig4),
    your method call is


    ```

    splashScreenMediaPlayer.setLooping(true);

    ```


    ![A978-1-4302-5786-8_18_Fig4_HTML.jpg](A978-1-4302-5786-8_18_Fig4_HTML.jpg)


    **Figure 18-4.** Coding an `onPrepared()` method to expose the `MediaPlayer` object
    and call the `.setLooping()` method off of it


    As you can see in Figure [18-5](#A978-1-4302-5786-8_18_Chapter.html#Fig5), the
    digital video now will loop seamlessly. What? You are not using the new animated
    paper yet? Well, then use the **Run As ➤ Android Application** work process and
    see these results for yourself.


    If you look online for solutions to looping video, you will see a ton of recommendations
    to call the `.start()` method every time the video ends using the `MediaPlayer.OnCompletionListener()`
    nested class, which will also work. However, I think you will agree that this
    method is less complicated, less work for the OS, less memory-intensive, and less
    likely to incur a memory leak; and it’s the proper way to set up your video to
    loop once so you can forget about it!


    ![A978-1-4302-5786-8_18_Fig5_HTML.jpg](A978-1-4302-5786-8_18_Fig5_HTML.jpg)


    **Figure 18-5.** Before and after splash screen in Nexus One emulator, showing
    `MediaController` and looping video


    Next, you will modify your XML UI layout container code and UI widgets so your
    digital video asset will non-uniformly scale to fit slight variances in a user’s
    display screen aspect ratio. This 3D virtual world video, much like your `cloudsky.jpg`
    asset that you used earlier in the book, is a good asset to scale in this fashion
    because it is difficult to fathom what the exact original motion imagery (video
    data) looked like in the first place.'
