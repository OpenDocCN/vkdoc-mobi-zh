  trans: '

    这是因为你的 AVD（Android 虚拟设备）正在虚拟化整个 Android 硬件和软件环境。它仅通过软件模拟来实现这一点，这需要占用极其庞大的内存空间以及大量的处理周期。话虽如此，这个开发软件包中负责运行
    AVD 模拟器部分的代码可能存在一些优化“空间”，所以我们希望 Android 团队在谷歌总部已经部署了关键团队成员来负责这一目标。


    如果你的 Android 开发工作站可以配置使用 3.8GHz（或更快）的 16 核 AMD 64 位 CPU，并配备 32GB 甚至 64GB 的 DDR3
    1600 或 1800（现在非常实惠）内存，那么你很可能希望这样做，至少在模拟器环境变得更高效之前是这样的！如果你希望模拟器快速启动，请务必包含一块固态硬盘（SSD）！固态硬盘最终能让你的所有软件（以及操作系统）快速启动。


    接下来，让我们看看另一个你可能会想了解的 `<VideoView>` 参数。这个 `android:keepScreenOn` 参数将阻止用户的显示屏进入“省电超时”功能，大多数
    Android 设备都会积极实施此功能以延长每次充电周期的电池寿命。你可以在图 18-11 的 Eclipse 标签辅助对话框中看到这个参数，以及淡黄色的解释屏幕飞出提示，当你点击正在查看的每个参数时，该提示就会出现。


    ![A978-1-4302-5786-8_18_Fig11_HTML.jpg](img/A978-1-4302-5786-8_18_Fig11_HTML.jpg)


    图 18-11.

    使用 Eclipse 参数辅助对话框查找 `android:keepScreenOn` `VideoView` 参数


    正如你在淡黄色解释屏幕中看到的，当 `VideoView` 可见时，此参数将保持用户的屏幕开启（背光点亮）。这也表明该参数是布尔类型的，因此请务必使用 `true`
    值向 Android 操作系统表示你要“保持屏幕开启”。接下来，你需要优化更多目标设备分辨率的视频素材。


    ## 优化视频素材分辨率目标范围


    接下来，你将完成对宽 VGA 800x480 视频素材的优化。由于 VGA 使用 640x480 分辨率，再增加 160 像素宽度，你就得到了 WVGA 分辨率，这在
    Android 智能手机和平板电脑中非常流行，因为它屏幕尺寸适中，并且（勉强）拥有足够的像素为最终用户提供不错的图形质量。因此，对于考虑用于图形应用程序的数字视频素材来说，这是一个不错的分辨率。让我们优化你的
    800x480 横向视频素材。


    启动 Sorenson Squeeze Pro 视频应用程序，点击你在第 2 章中创建的 `480x800p` Android 预设。如图 18-12 左侧所示，当它以浅蓝色被选中时，点击面板左下角的中间图标（五个图标中的第三个，即创建副本图标），创建该编解码器预设的一个副本，以便你可以使用它为这个广泛使用的分辨率创建一个
    WVGA 横向版本的预设。通过这种方法创建新预设会更容易，尤其是创建那些使用类似数据速率设置的预设。


    ![A978-1-4302-5786-8_18_Fig12_HTML.jpg](img/A978-1-4302-5786-8_18_Fig12_HTML.jpg)


    图 18-12.

    创建 800x480p 横向数字视频编解码器预设（同时显示所有已完成的预设）


    你首先要做的是提供正确的“名称”和“描述”字段数据输入，因此将此新预设命名为 `Android800x480p`（此处的 `p` 代表逐行扫描，而非像素），并添加描述
    `Android 800x480 Landscape`，如图 18-13 所示。所有其他设置都相同，因为两个预设之间的数据是相同的，只是旋转了 90 度（即从竖屏显示模式切换到横屏显示模式）。


    ![A978-1-4302-5786-8_18_Fig13_HTML.jpg](img/A978-1-4302-5786-8_18_Fig13_HTML.jpg)


    图 18-13.

    使用高质量编解码器、数据速率在 768KBPS 到 1MBPS 之间的 Android WVGA 视频编解码器预设


    逐行扫描视频是指图像（在此案例中为视频）中的每一行都依次一次性写入显示屏。与逐行扫描相反的是隔行扫描，就像旧电视那样，一次（扫描）写入偶数行，第二次（扫描）写入奇数行，从而将它们交织在一起（这就是它们闪烁的原因）。


    确保你的数据速率范围在 768 KBPS（3/4 MBPS）到 1 MBPS 之间，并且你已为每秒视频设置了 10 个关键帧（即 10 FPS），同时你的帧大小设置为
    `Same as source`。


    一旦你的新 WVGA 预设设置完成，点击 `OK` 按钮创建该预设，然后你就可以进入 VirtualDub 并创建你的 AVI 源文件了。我们现在就开始。


    使用快捷方式图标启动 VirtualDub 1.9，并使用 `File` ➤ `Open Video File` 选项。当对话框打开时，导航到你的系统硬盘，找到
    PAG800 渲染的 BMP 文件序列的第一帧并选中它。一旦 400 帧的 3D 渲染加载完成，使用 `File` ➤ `Save AVI As` 选项将
    AVI 文件保存到你的 `/AVIs` 目录，就像你在第 2 章中所做的那样。如果你需要重新回顾这个工作流程，可以查看第 2 章中的文本或截图。我在图 18-14
    中展示了加载了 800x480 宽 XGA 横向视频的 VirtualDub 软件界面。


    ![A978-1-4302-5786-8_18_Fig14_HTML.jpg](img/A978-1-4302-5786-8_18_Fig14_HTML.jpg)


    图 18-14.

    将你的 WVGA 横向视频帧加载到 VirtualDub 中，以创建一个未压缩的 `.AVI` 文件


    一旦你的 `PAG800x480.AVI` 文件被导出，你可以返回到 Squeeze Pro 9，在导入 `PAG800x480` 视频文件后应用新的预设，并使用
    `Apply` 按钮将你创建的下一预设附加到它上面。当所有这些都在 Squeeze 中设置完毕后，你可以点击 `Squeeze It!` 按钮开始压缩过程。这将通过
    MainConcept 编解码器和 MPEG-4 H.264 视频编码算法，将你的 WVGA 预设设置应用到 AVI 原始帧数据上。


    一旦生成了 AVI 文件，你可以通过一些数学计算来检查你是否获得了与第 2 章中处理 480x800 竖屏版本文件时相同的出色压缩效果，如你现所见，在像素数量相同的情况下，横向版本实际压缩后比竖屏版本小了
    35K。


    你仍然可以获得 99.2% 的压缩比，也就是说 MP4 数据文件的大小仅为原始未压缩 AVI 源文件大小的 0.8%，这与 `PAG480x800.AVI`
    文件（450MB）的大小完全相同，这合乎情理，因为它们内部包含的像素和帧数相同。


    现在，你拥有了适合中等分辨率、中等 DPI（MDPI）设备的数字视频素材，这些设备具有 WVGA 分辨率和 4 英寸到 7 英寸的 LED 或 LCD 显示屏。


    接下来，让我们先处理 LDPI（低 DPI）屏幕的素材，这样你就可以专注于为主流的 HD Android 设备以及之后的 NetBook（1024 像素分辨率）设备准备素材了。


    在继续之前，还有最后一点说明：800x480 分辨率并不是“真正的”16:9 宽高比。要计算这个，`800/16=50`，而 `50x9=450`，所以真正的
    16:9 宽高比是 800x450 分辨率，这对于许多 Android 设备来说并不是常见的物理屏幕（像素）分辨率。由于 `480/50=9.6`，800x480
    分辨率实际上代表了 16:9.6 的宽高比，或者说介于 16:9 和 16:10 宽高比之间 60% 的位置。

