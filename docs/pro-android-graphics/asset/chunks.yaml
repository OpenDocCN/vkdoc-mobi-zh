    ## The Java InputStream Class: Reading Raw Data Streams


    The Java `InputStream` class is a direct subclass of the Java master class `java.lang.Object`.
    `InputStream` is part of the `java.io` package, which, as its name indicates,
    deals with input and output. There is an output counterpart to the `InputStream`
    class that is called `OutputStream`.


    The Java `InputStream` class hierarchy is structured as follows:


    ```

    java.lang.Object

    > java.io.InputStream

    ```


    The Java `InputStream` class belongs to the `java.io` input and output utility
    package. The import statement for the Java IO `InputStream` class references the
    `java.io.InputStream` package import path, as you’ll see next.


    The `InputStream` class (and thus object) was created to provide developers with
    a source of raw data bytes that are readable by their applications.


    Most applications will leverage input streams that read data using a file system,
    such as you will be doing next. `InputStream` can also handle reading raw data
    over a network using a `.getInputStream()` method call, as well as access data
    from a byte array, which will be located in system memory.


    You will load your `InputStream` object, which you will name `rawImage`, by using
    the `.openRawResource()` method called off of the invaluable `.getResources()`
    method, which you have used quite often at this point to process your data.


