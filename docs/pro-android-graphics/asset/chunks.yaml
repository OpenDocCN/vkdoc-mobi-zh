  trans: '

    # 分析目标分辨率压缩比结果


    现在，您已经使用未压缩的 `.AVI` 文件创建了压缩后的 `.MP4` 文件，可以计算压缩比和压缩百分比，看看哪种分辨率能带来更优的压缩效果。您会发现，更高的分辨率效果会稍好一些。在做决定时，您还需要关注数字视频素材的文件大小。表
    18-1 汇总了计算结果；您可以在工作室中使用电子表格软件（例如开源软件 `OpenOffice Calc 4.0`，可从 [www.openoffice.org](http://www.openoffice.org)
    获取）进行类似操作。


    **表 18-1.** 行业标准硬件屏幕分辨率、原始数据大小、压缩后大小及压缩比


    | 分辨率 | 原始数据 | 压缩后 | 压缩比 | 百分比 | 屏幕方向 |

    | --- | --- | --- | --- | --- | --- |

    | 640x360 | 270MB | 2.5MB | 108:1 | 0.93% | 横向 |

    | 800x480 | 450MB | 3.8MB | 119:1 | 0.84% | 横向 |

    | 1024x600 | 720MB | 5.0MB | 143:1 | 0.70% | 横向 |

    | 1280x720 | 1080MB | 7.5MB | 143:1 | 0.70% | 横向 |

    | 1920x1080 | 2430MB | 9.9MB | 243:1 | 0.41% | 横向 |

    | 360x640 | 270MB | 2.5MB | 108:1 | 0.93% | 纵向 |

    | 480x800 | 450MB | 3.8MB | 119:1 | 0.84% | 纵向 |

    | 600x1024 | 720MB | 5.0MB | 143:1 | 0.70% | 纵向 |

    | 720x1280 | 1080MB | 7.5MB | 143:1 | 0.70% | 纵向 |

    | 1080x1920 | 2430MB | 10 MB | 243:1 | 0.41% | 纵向 |


    您需要寻找的是兼具最佳压缩比、最小文件大小，且分辨率具有足够像素以进行高质量放大或缩小的选项。除了 True HD 达到的 243:1 压缩比，我个人倾向于
    5MB 的 WSVGA 压缩结果。1920 分辨率下达到 243:1 的结果让我怀疑该编解码器对高清分辨率有额外的优化——毕竟该产品的 99% 用户会使用此编解码器来处理他们的主流视频工作！


    我会选择 WSVGA，因为 1024 分辨率可以以 2 倍的均匀系数放大到 1920（或 2048）分辨率屏幕，接近 1280 分辨率，并能高质量缩小到其他任何分辨率。再加上大多数
    Android 设备具有精细的像素间距（通常为 HDPI，能隐藏任何缩放伪影），这样您只需 5MB（即每帧 13KB）就能拥有 400 帧的 3D 动画。


    5MB 的视频文件占您 Android APK 最大 50MB 文件大小限制的 10%，因此作为启动画面背景视频板来说，这相当合理。


    需要注意的是，您的应用程序还可以最多访问两个额外的外部数据文件，每个最大为 2GB。因此，只要视频优化得当，即使应用包含大量自有视频，也不会成为问题。


    让我们针对 1024x600 这个目标分辨率再尝试一件事。使用您在本章（以及第 2 章）学到的工作流程，选择 1024x600 预设，并使用底部的复制图标复制一份预设，创建一个
    HQ（高质量）预设。


    右键点击复制的预设，选择“编辑”，将目标数据速率设置为更高的 1200 KBPS，并为最大数据速率提供 170% 的余量（即 2048 KBPS），让我们看看使用这些更高质量设置后，当前
    5MB 文件大小会增加多少数据开销。


    导入 `PAG1024x600.avi` AVI 未压缩源文件，应用这个新的编解码器预设，然后点击 `SqueezeIt!` 按钮压缩 MP4 文件。如果您能在文件小于
    6MB 的前提下获得更高的质量，那么 Android 就将拥有一个可用于高质量放大或缩小的优质视频数据源。


    如图 8-23 所示，生成的 MP4 文件大小为 5.878 MB。因此，您或许可以在（目标）低端再提高一些质量；也许使用 1250 或 1280 KBPS
    的目标数据速率，以确保即使在像素较大、伪影明显的大型（LDPI）屏幕上查看数据时，也看不到任何可见的伪影。


    这个 1024x600 的目标分辨率应该能相当好地放大到 1280 或 1920，尤其是在 HDPI 屏幕（这是标配）上，因为像素非常小，伪影甚至不可见。可以这样理解：当您在
    CES 展会上处理 Android 相关业务时，就像在看拉斯维加斯的大型 LED 广告牌。近距离观看时，像素看起来很糟糕；但离远些时，同样的多媒体内容看起来绝对完美无瑕。如今常见的这些更小像素间距的显示器，效果就像是让您的眼睛离内容更远了。


    正如您所看到的，凭借 243:1 的压缩比，Sorenson Squeeze 展示了其能以很小的数据量提供惊人的视频质量，而且这还是在较老的 MPEG-4
    编解码器上实现的。使用更新的 WebM 视频编解码器可能会获得更好的效果——当然，这取决于视频内容。它也可能给出相同或更差的结果；除了进入 Squeeze，将未压缩的
    AVI 源文件通过编解码器处理并查看结果之外，没有其他真正的方法可以确定。我们接下来就这么做。


    # 使用 WebM VP8 编解码器压缩伪高清视频


    让我们回到 Sorenson，尝试一个 `Sorenson Squeeze Pro` 附带的、用于 1280x720 分辨率且数据速率为 2000 KBPS
    的 WebM 预设。右键点击此预设，使用“编辑”命令修改编解码器预设，先使用您目标的 1536 KBPS 数据速率，稍后再使用您最大的 2048 KBPS
    数据速率。WebM 编解码器不像 MPEG-4 编解码器那样支持数据速率范围，因此您需要测试这两个数据速率。


    这里要尝试的是，看看能否获得比使用 Squeeze 的 MainConcept MPEG4 H.264 编解码器更小的数据量。如果可以，并且其数据量显著更低，您可以考虑使用
    WebM 格式。如果不能，您应该使用 MPEG4 格式，因为它受更多版本的 Android 操作系统（2.3 版本之前）支持。启动 `Sorenson Squeeze`，使用左上角的“导入文件”图标打开
    `PAG1280x720.avi` 未压缩的 AVI 文件，如图 18-19 所示。


    ![A978-1-4302-5786-8_18_Fig19_HTML.jpg](img/A978-1-4302-5786-8_18_Fig19_HTML.jpg)


    **图 18-19.** 加载未压缩源文件 `PAG1280x720.avi` 并选择 WebM 1280x720p 编解码器


    一旦未压缩的 `.AVI` 数据加载完毕，应用您创建的 WebM 预设，该预设使用低端（目标）数据速率 1536 KBPS，如图 18-20 左侧所示。点击
    `SqueezeIt!` 按钮编码 WebM 文件。然后，要么创建一个新的预设，要么编辑您现有的预设（如果您愿意，也可以在 Squeeze 主编辑视图底部右键点击已应用的编解码器），创建一个
    2048KBPS 高端（最大）数据速率预设。将其应用到您的未压缩源文件上，然后使用 `SqueezeIt!` 按钮创建一个 2048KBPS 数据速率的 WebM
    文件版本，这样您就可以看到您获得了怎样的数据量优化。有趣的是，WebM 只支持“静态”或单一的数据速率，而不像 MPEG-4 编解码器那样支持一个范围。


    ![A978-1-4302-5786-8_18_Fig20_HTML.jpg](img/A978-1-4302-5786-8_18_Fig20_HTML.jpg)


    **图 18-20.** 创建 1536 目标数据速率的 WebM 预设以及 2048 目标数据速率的 WebM 预设


    由于在使用 MPEG-4 编解码器时，从伪高清到真高清，您获得了如此巨大的压缩比提升（从 143:1 提升到 243:1），最后让我们尝试在 WebM 编解码器上使用真高清视频源，看看它是否能给出相同的结果。

    '
- fmt: '# Using the WebM VP8 Codec to Compress True HD Video


    Find the `Squeeze WebM` codec preset for 1080p, as shown on the right side of
    Figure [18-21](#A978-1-4302-5786-8_18_Chapter.html#Fig21), and edit the target
    data rate to be 3072 KBPS, or 3 MBPS, and use the optimal 2-Pass Variable Bit-Rate
    (VBR) setting, and a `Maintain Aspect Ratio` setting, which you can see does the
    exact same thing, in this situation, as using the `Same as source` setting, which
    you used before. Use the same work process to copy this preset, creating a 2048
    TDR preset.


    ![A978-1-4302-5786-8_18_Fig21_HTML.jpg](A978-1-4302-5786-8_18_Fig21_HTML.jpg)


    Figure 18-21. Creating True HD video compression presets for the WebM codec at
    3072 and 2048 Kbps data rate


    Next, use the `Import File` button on the upper-left of Squeeze and find the `PAG1920x1080.avi`
    uncompressed source file and load it so you can compress a WebM True HD video
    asset.


    Apply your 3072 KBPS WebM preset to the True HD source data, and click the `SqueezeIt!`
    button and generate the WebM version of the digital video data.


    As you will see later in the chapter, this gives you a 14MB data footprint, so
    next let’s compress the uncompressed source AVI using a 2048 KBPS codec preset
    and see if you can get a much smaller data footprint result.


    Apply your 2048 KBPS WebM preset to the True HD source data, and click the `SqueezeIt!`
    button and generate the WebM version of the digital video data.


    The result of this data rate setting is an 8MB file, which is a remarkable result
    if you consider that 400 frames of 3D imagery, at 6.22MB per frame, is essentially
    two and a half billion bytes of data being compressed down to only eight million
    bytes (see Figure [18-22](#A978-1-4302-5786-8_18_Chapter.html#Fig22)).


    I played the WebM video in the Opera browser, which specializes in support for
    WebM videos, and it played back smooth as a banana milkshake! So, for a True HD
    video asset, especially one that will stream, I would choose this WebM codec and
    preset over the MPEG-4, or possibly find a way to provide both formats if I was
    hosting the data externally on a media server.


    We will be taking a look at streaming video data using a remote web server in
    the next chapter, so this chapter and [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html),
    will serve as a great foundational knowledge for that far more advanced video
    streaming chapter.


    ![A978-1-4302-5786-8_18_Fig22_HTML.jpg](A978-1-4302-5786-8_18_Fig22_HTML.jpg)


    Figure 18-22. Importing the uncompressed `PAG1920x1080.avi` True HD AVI file and
    applying the WebM preset to it


    Finally, as a summary, let’s take a look at all 38 of the source, data, and project
    files that you have generated, which are shown in Figure [18-23](#A978-1-4302-5786-8_18_Chapter.html#Fig23).
    At the top of this list are the `.sqz` Squeeze project files, and under those,
    in numeric X-axis order are ten different video asset file resolutions, and their
    uncompressed AVIs, and compressed MPEG-4s, and where you got curious, even compressed
    WebM files as well.


    If you want to practice doing the math, switch numerator and denominator, or divisor
    and dividend, to change back and forth from compression ratios into compression
    percentages. To get the amount compressed, subtract your compression percentage
    from 100%, or in this case, from the number one.


    Most of the calculations I have already done for you and placed in Table [18-1](#A978-1-4302-5786-8_18_Chapter.html#Tab1)
    to show you how to create a similar data table to keep your data footprint optimization
    results at hand in case your client asks to see them. Or, just in case you wanted
    to follow a “surgical” work process, like I do.


    Now you have enough knowledge to proceed to the next chapter where you will take
    a look at video remote streaming coding and optimization, so that you can store
    your digital video assets on your server instead of in your app!


    ![A978-1-4302-5786-8_18_Fig23_HTML.jpg](A978-1-4302-5786-8_18_Fig23_HTML.jpg)


    Figure 18-23. Windows Explorer file manager showing AVIs folder with compression
    result file sizes and formats


