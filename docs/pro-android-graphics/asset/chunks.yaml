    # 通过 `<supports-screens>` 标签实现安卓多屏支持


    如本章前半部分所述，安卓会通过缩放布局以适应屏幕尺寸和密度，处理大部分将应用的用户体验正确呈现在不同设备屏幕配置上的工作。如有必要，安卓还会针对任何给定的屏幕密度缩放图片、视频和逐帧动画的可绘制对象。


    开发者还可以通过其他方式优化其 XML 标记和 Java 代码，使安卓操作系统能够在多种不同的屏幕配置类型上进一步优化视觉效果。因此，让我们在本章接下来的几个小节中来介绍这些内容。


    安卓开发者被允许在应用的 `AndroidManifest` XML 文件中显式声明应用所支持的不同屏幕尺寸。你可能已经在 Eclipse 项目文件夹底部的根目录中注意到了
    `AndroidManifest.xml` 文件。这个“清单”文件本质上配置并启动或“引导”安卓应用，类似于 `index.html` 文件之于网站的作用。


    声明应用支持的确切屏幕尺寸，可以确保只有拥有应用能支持屏幕的设备所有者才能购买和下载你的应用。这样做的明显缺点是，实施此操作可能会严重限制潜在的市场规模，即你的应用的购买受众。


    专门声明不同屏幕尺寸的屏幕尺寸支持还会影响的另一件事，是安卓操作系统如何在更大的屏幕上渲染你的应用。具体声明屏幕尺寸将决定应用是否在安卓的屏幕兼容模式下运行。屏幕兼容模式是针对那些未针对大尺寸显示屏（例如平板电脑和
    iTV 设备中的显示屏）有效设计缩放的应用的一种“权宜之计”。


    从操作系统 1.6 版本开始，安卓已添加对多种屏幕尺寸的支持，并完成了应用布局调整的大部分工作，使其能正确适配任何屏幕。但是，如果应用未遵循支持多个显示屏的指南，安卓可能会在某些较大的显示屏上遇到一些渲染问题。


    对于遇到此特定问题的应用设计，屏幕兼容模式可能会让应用在较大屏幕上稍加可用，但也可能不会，因此请务必充分测试你的应用。


    要声明你的应用支持的显示屏尺寸，你需要在你的 `AndroidManifest` XML 文件中包含 `<supports-screens>` XML 元素。此标签是
    `<manifest>` 父标签的子标签，允许你指定你的应用支持的所有屏幕尺寸，并为大于你应用当前资源所支持的屏幕启用屏幕兼容模式。


    在你的安卓应用清单 XML 文件中利用此元素来指定你的应用支持的每个屏幕尺寸，这一点非常重要。如果应用拥有正确调整其内容和 UI 大小以充满整个屏幕区域所需的所有资源（至少包括
    MDPI、HDPI 和 XHDPI 图片资源），则该应用可以被认为“支持”给定的屏幕尺寸常量。


    因此，如果你打算包含这三种“建议的”（必须的）普通屏、`largeScreen` 和 `xlargeScreen` 分辨率密度资源，请务必在 `AndroidManifest.xml`
    文件中的 `<manifest>` 标签之后（作为子标签）添加以下 `<supports-screens>` 标签（及参数）配置：


    `<supports-screens android:largeScreens="true" android:xlargeScreens="true" />`


    请注意，你无需指定 `android:normalScreens=“true”`，因为这是 `<supports-screens>` 尺寸规格的默认值，因此是固有指定的，只需通过此标签添加
    largeScreen 和 xlargeScreen 支持即可。你将在本章稍后编辑 `AndroidManifest.xml` 文件时添加此标签，因为你需要将其包含在你的应用中。


    安卓应用的缩放通常对大多数应用都有效，你无需做任何额外工作即可让你的应用在比高清智能手机或平板电脑更大的屏幕上运行。


    然而，通过提供备选布局资源来针对不同屏幕尺寸优化应用的用户界面设计非常重要。举例来说，你可能希望修改 Activity 在平板电脑上与在智能手机上运行时的布局。我们将在本章下一节中更详细地研究备选布局。


    如果你的应用在缩放以适应不同屏幕尺寸时效果不佳，你可以使用 `<supports-screens>` 标签的参数来控制你的应用是否应分发到较小的屏幕上，或者使用系统的屏幕兼容模式将其
    UI 放大或缩放以适配更大的安卓屏幕。如果你愿意，可以通过以下网址访问安卓开发者网站查看所有标签参数：


    [`http://developer.android.com/guide/topics/manifest/supports-screens-element.html`](http://developer.android.com/guide/topics/manifest/supports-screens-element.html)


    如果你尚未设计你的应用资源、布局和用户界面以支持更大的屏幕尺寸，并且普通的安卓缩放无法达到可接受的效果，则可以调用安卓屏幕兼容模式，以便将你的应用放大以适应更大的屏幕尺寸。安卓通过模拟普通尺寸屏幕（中密度
    MDPI）来实现此目的。此模拟通过缩放 MDPI 密度（普通尺寸）的资源及 UI 设计来实现，使其填满整个 HDPI 或 XHDPI 屏幕。


    务必注意，这种放大操作会导致你的内容和用户界面设计出现像素化和模糊，因为放大操作必然如此。这就是为什么安卓强烈建议（我也建议）你至少要为你的应用提供针对 MDPI、HDPI
    和 XHDPI 优化的内容和用户界面布局，以便拥有可供安卓操作系统为在更大显示屏上使用而优化（缩放）的图片资源。

