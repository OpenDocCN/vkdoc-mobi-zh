    Figure 1-13.


    Dragging the Eclipse application onto the Windows Taskbar to invoke the pin operation


    So let’s try it. Click the Eclipse software icon once in your Taskbar and launch
    the software for the first time. You will see the ADT Android Developer Tools
    start-up screen, as shown at the left side of Figure [1-14](#A978-1-4302-5786-8_1_Chapter.html#Fig14).
    Once the software loads into your system memory, you will see the Workspace Launcher
    dialog, shown on the right, with the Select a workspace work process, which will
    allow you to set your default Android development workspace location on your workstation
    hard disk drive.


    ![A978-1-4302-5786-8_1_Fig14_HTML.jpg](A978-1-4302-5786-8_1_Fig14_HTML.jpg)


    Figure 1-14.


    Android Developer Tools start-up screen and Workspace Launcher dialog showing
    default workspace


    I accepted the default workspace location, which will be under your main hard
    disk drive letter (probably C:\) in your Users folder, under a sub-folder named
    using your PC’s assigned name; your Android development workspace folder will
    be underneath that.


    When you create projects in Android ADT, they will appear as sub-folders underneath
    this workspace folder hierarchy, so you’ll be able to find all of your files using
    your File Management Utility software as well as using the Eclipse package Explorer
    project navigation pane, which you’ll be using quite a bit in this book, to learn
    about how Android implements Graphics.


    Once you set your workspace location and click the OK button, the Eclipse Java
    ADT start-up Welcome! screen will appear, as shown in Figure [1-15](#A978-1-4302-5786-8_1_Chapter.html#Fig15).
    The first thing that you want to do is make sure your software is completely up
    to date, so click the Help menu at the top right of the screen, and select the
    Check for Updates option about two-thirds of the way down, as shown in Figure
    [1-15](#A978-1-4302-5786-8_1_Chapter.html#Fig15) (and highlighted in blue).


    ![A978-1-4302-5786-8_1_Fig15_HTML.jpg](A978-1-4302-5786-8_1_Fig15_HTML.jpg)


    Figure 1-15.


    Eclipse Java ADT Welcome screen and invoking the Help ➤ Check for Updates menu
    sequence


    Once you select this menu option, you will see the Contacting Software Sites dialog,
    shown in Figure [1-16](#A978-1-4302-5786-8_1_Chapter.html#Fig16) on the left-hand
    side. This shows the Checking for updates progress bar as it checks various Google
    Android software repository sites for any updated versions of the Eclipse ADT.


    It is important to note that you must (still) be connected to the Internet for
    this type of real-time software package updating to be able to occur. In my case,
    since I had just downloaded the ADT development environment, no new updates were
    found, and so I got a dialog advising me of this fact.


    ![A978-1-4302-5786-8_1_Fig16_HTML.jpg](A978-1-4302-5786-8_1_Fig16_HTML.jpg)


    Figure 1-16.


    The Contacting Software Sites dialog checking for updates to Eclipse ADT, with
    no updates found


    If for some reason there are updates to the Eclipse ADT environment, which there
    shouldn’t be if you just downloaded and installed it, simply follow the instructions
    to update any components of the ADT that need updating. In this way you will have
    the latest software development kit (SDK) versions at all times.


    It is important to note that you can run the Help ➤ Check for Updates menu command
    sequence at any time. Some developers do this weekly or even daily to make sure
    that they have the most updated (bug-free and feature-laden) Android development
    environment possible at all times.'
