- fmt: 'This will result in a photo-realistic shadowing effect, regardless of what
    you place underneath this image and its new shadow effect. You will want to test
    this next in Eclipse once you finish up here by creating your different density
    target images, and saving the master file, and similar busy work.


    Let’s export this file to your `/workspace/GraphicsDesign/res/drawable-xhdpi`
    folder using the GIMP File Export dialog shown in Figure [7-29](#A978-1-4302-5786-8_7_Chapter.html#Fig29).
    You’ll name the file `bookmarks0.png` (for bookmark shadow) so that you have both
    image versions intact. You will use the Save color values from transparent pixels
    option in the sub-dialog, shown on the right hand side of the screen shot.


    It is important to note that if you had left the White Background Layer visible
    (eye icon in the on position), your file export would have a white background
    visible in the resulting exported image. So make sure that the image looks as
    it does in Figure [7-27](#A978-1-4302-5786-8_7_Chapter.html#Fig27) before you
    do the export!


    ![A978-1-4302-5786-8_7_Fig29_HTML.jpg](A978-1-4302-5786-8_7_Fig29_HTML.jpg)


    Figure 7-29.


    Exploring image as `bookmarks0.png` to your `/workspace/GraphicsDesign/res/drawable-xhdpi`
    folder


    Once you have exported your XHDPI PNG32 asset, it is time to use the GIMP Scale
    Image dialog, shown in Figure [7-30](#A978-1-4302-5786-8_7_Chapter.html#Fig30),
    to resize your image data into the other resolution densities, so that you have
    HDPI, MDPI, and LPDI image assets for this new image. Let’s do the 2X downsample
    first, so enter 336 into the Width field after you lock the image size x and y
    values using a chain icon. 336 is half of 672, so you have an even 100% reduction
    in size.


    ![A978-1-4302-5786-8_7_Fig30_HTML.jpg](A978-1-4302-5786-8_7_Fig30_HTML.jpg)


    Figure 7-30.


    Scaling image down to create 336 pixel MDPI asset


    You will use the high quality cubic interpolator to do these image rescale operations.
    Once you export the files to your `/res/drawable-mdpi/` folder, using the filename
    `bookmarks0.png`, use the Edit menu and Undo function to take you back to your
    original (highest) resolution XHDPI image asset, as shown in Figure [7-31](#A978-1-4302-5786-8_7_Chapter.html#Fig31).
    Also, this is a good time (after the Undo Scale Image option is invoked) to use
    the GIMP File ➤ Save As operation to save a GIMP native `.XCF` file of your layers,
    channels, and so on in your working directory for images. As you can see, for
    this book, mine is `/PAGD/CH07`.


    ![A978-1-4302-5786-8_7_Fig31_HTML.jpg](A978-1-4302-5786-8_7_Fig31_HTML.jpg)


    Figure 7-31.


    Undo the 2X downsample, save the original size, and rescale image to HDPI and
    LDPI target resolution


    Now you need to output your HDPI asset. To figure out the size, divide your 672
    image size by its 320 DPI to get a sizing factor of 2.1. Multiply the 240 DPI
    HDPI density by 2.1 and you get 504 pixels, so next use the Scale Image option
    to take the 672 pixel image to 504 pixels and export it to the HDPI folder with
    the same `bookmarks0.png` filename.


    Again, you will undo the Scale Image operation, and multiply the LDPI 120DPI density
    by 2.1 to get 252 pixels or take half of the 240 DPI 504 pixels to reach this
    same number. Perform the same Scale Image and Export operations on this 252 pixel
    digital image asset, and you will have all four of your resolution density targets
    provided for.


    If you have already saved the file as a native XCF (eXperimental Computing Facility)
    on your hard disk, make sure to answer No to the Save dialog you get when you
    exit GIMP, or you will save a lower resolution version of the image to that file
    name (container) and lose your original hi-rez format.


    Now you can go back into Eclipse and make the necessary changes to your XML file
    to implement the new drop shadow effect image version and learn how to put a background
    color or image in your `RelativeLayout` container so that you can have Android
    perform some image compositing for you. You can start to leverage the foundational
    knowledge you’ve learned in the initial chapters.


    ## Changing Your ImageView XML to Incorporate a New Asset


    Fire up your Eclipse ADT package if it’s not still running and go into the `activity_bookmark.xml`
    editing tab, and edit your `android:src` parameter, as shown in Figure [7-32](#A978-1-4302-5786-8_7_Chapter.html#Fig32),
    so that it references your new `bookmarks0.png` image, which you have just created.


    To see the resulting shadow against a white background (default) color for your
    `RelativeLayout`, you can use the Graphical Layout tab at the bottom of the editing
    screen, or use a Run As ➤ Android Application work process and take a look at
    it in the Nexus One emulator.


    To show the partial alpha channel bleed-through in this new image, you will need
    to add an `android:background` parameter into your parent `RelativeLayout` container
    tag. First, you will use a pastel orange color value of `#EECCAA` to make sure
    that your color shadow is tinted grayish-orange, and then later you will add an
    image to make sure that image data is blending with your shadow alpha as well.
    The new parent tag parameter can be seen in Figure [7-32](#A978-1-4302-5786-8_7_Chapter.html#Fig32).


    ![A978-1-4302-5786-8_7_Fig32_HTML.jpg](A978-1-4302-5786-8_7_Fig32_HTML.jpg)


    Figure 7-32.


    Changing the `android:src` image reference name and adding an `android:background`
    parameter in the parent tag


    Next, use the Run As ➤ Android Application work process to preview the new UI
    design in the Nexus One emulator. Now that you know how, you can take a look at
    it in both portrait and landscape modes, and see how ultra cool it looks. It looks
    really great (see Figure [7-33](#A978-1-4302-5786-8_7_Chapter.html#Fig33)).


    If you want to match the TextView drop shadow to the ImageView drop shadow, you
    can tweak the `android:shadow` parameters and their values so that the shadows
    are more similar (increase the offset and `Dx` and `Dy` values a bit). You can
    do this after you add a background image, to further test your alpha.


    ![A978-1-4302-5786-8_7_Fig33_HTML.jpg](A978-1-4302-5786-8_7_Fig33_HTML.jpg)


    Figure 7-33.


    Testing shadow alpha channel using background color


    Now that you know your alpha channel is working with a solid color, in the next
    section you’ll copy a JPEG image of a beautiful sunset into your XHDPI folder
    and see if your drop shadow effect works with photographic imagery.'
