    in this book; it looks like I just explained it!


    As you now know, 2D images and video only use an x and y axis to “address” their
    data, so you will need to look at z-order and compositing from a 3D standpoint,
    as layers in a composite need to exist along a third z axis.


    A SurfaceView class is a subclass of the View class, which, as you know, is a
    subclass of the Java Object master class. The VideoView subclass is thus a specialized
    incarnation of the SurfaceView subclass, adding more methods to the SurfaceView
    class methods, and thus is farther down within the View class hierarchy. There
    is more detailed information regarding this Android VideoView, and its methods
    and constructors, at the following web site URL:


    [`http://developer.android.com/reference/android/widget/VideoView.html`](http://developer.android.com/reference/android/widget/VideoView.html)


    Android’s VideoView class implements a Java interface in an android.widget package
    called MediaController.MediaPlayerControl. This is so developers using the VideoView
    widget will have access to the Android MediaController class methods relating
    to MediaPlayerControl for digital video playback.


    If you are going to code your own digital video playback engine, you should access
    the Android MediaPlayer class itself directly. In this scenario, you are essentially
    writing your own (custom) video playback engine (MediaPlayer subclass) to replace
    your use of the VideoView widget with your own (more advanced) digital video playback
    functionality.


    There is more information about how this Android MediaPlayer class works, as well
    as a state engine diagram, at the following developer web site URL:


    [`http://developer.android.com/reference/android/media/MediaPlayer.html`](http://developer.android.com/reference/android/media/MediaPlayer.html)


    I could write an entire advanced programming book on how to code a video playback
    engine using this Android MediaPlayer class. However, since this intermediate
    book specifically covers Android graphic design and the inter-relationships between
    images, animation, digital video, compositing, blending, and the like, we’ll utilize
    the VideoView class. Indeed, this is what Android prefers that we utilize, which
    is why it provided this class.


    ## The Foundation of Digital Video: Motion, Frames and FPS


    Digital video is an extension of digital imaging into the fourth dimension (time).
    Digital video is actually a collection of digital imagery that is displayed rapidly
    over time, much like the old flip-books where you could flip rapidly through the
    book’s pages to animate a character or scene that was drawn on its pages to create
    motion. Each of the images in the digital video sequence is called a frame. This
    terminology probably comes from the olden days of film, where frames of film were
    run through a film projector at a rate of 24 frames per second, which served to
    create the illusion of motion.


    Since each frame of digital video actually contains digital imagery, all the concepts
    you learned in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html) can also be applied
    to video. Related concepts include pixels, resolution, aspect ratios, color depth,
    alpha channels, pixel blending, image compositing, and even data footprint optimization.
    All of these can be just as readily applied to your work in digital video content
    development and implemented in your graphic designs.


    Since digital video is made up of this collection of digital image frames, the
    concept of a digital video frame rate, expressed as frames per second, or more
    commonly referred to as FPS, is also very important when it comes to your digital
    video data footprint optimization work process.


    The optimization concept with frames in a digital video is very similar to the
    one regarding pixels in an image (the resolution of the digital image) because
    video frames multiply the data footprint with each frame used. In digital video,
    not only does the frame’s (image) resolution greatly impact the file size, but
    so does the number of frames per second, or frame rate.


    In [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html), you saw that if we multiply
    the number of pixels in an image by the number of color channels, it gives us
    the raw data footprint for that image. With digital video, we must now multiply
    that number again by the number of frames per second that the digital video is
    running at, as well as by the number of total seconds in the digital video.


    To continue the VGA example from [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html),
    we know one 24-bit VGA raw image is 900KB exactly. That makes the math easy to
    take it to the next level in this example. Digital video traditionally runs at
    30 FPS, so one second of Standard Definition (SD) or VGA raw uncompressed digital
    video is 30 image frames, each of which is 900K, yielding a data footprint of
    27000KB.


    To find out how many megabytes (MB) this would be, we need to divide 27000 by
    1024, which gives us 26.3671875MB of data for one second of raw digital video.
    Let’s multiply this by 60 seconds, giving us 1582.0313 Megabytes of raw data per
    minute of 24-bit VGA digital video. Divide this again by 1024 and we have the
    amount of gigabytes (GB) per minute, which equals 1.54495.


    You think VGA resolution video has lots of raw data, at over 1.5GB/minute? HD
    (High Definition) video resolution is 1920x1080, times 3 RGB channels, times 30
    frames, times 60 seconds, and that yields 10.43GB per minute !


    You can see why having a video file format that can compress this massive raw
    data footprint that digital video creates is extremely important! This is why
    Google acquired ON2, to obtain their VP8 video codec and the folks who created
    it! VP8 maintains a high level of video image quality while at the same time reducing
    file size by an order of magnitude or more. An order of magnitude, in case you
    might be wondering, equates to ten times (10X).'
