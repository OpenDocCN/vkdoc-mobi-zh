- fmt: "# Using the `.reverseTransition()` Method for Pong Transitions\n\nNow that\
    \ you have your image transitions working, you can play around with the code or\
    \ image assets a bit in order to see what `TransitionDrawable` objects can do.\
    \ You may have noticed that I am using a 9-patch image as one of the transition\
    \ image assets, and yes, this was my first test to see if 9-patch assets would\
    \ work with `TransitionDrawable` objects.\n\nAs you can see in the middle of Figure\
    \ [13-16](A978-1-4302-5786-8_13_Chapter.html#Fig16), a 9-patch image asset works\
    \ just fine when installed as a sub-object (layer) in an `TransitionDrawable`\
    \ object. Next, I want to play around with the alternate method calls that are\
    \ available with the `TransitionDrawable` object, namely this `.reverseTransition()`\
    \ method call that allows the equivalent of a PONG animation effect to be achieved\
    \ within your digital image transition.\n\nInside your `onClick()` event handler\
    \ method, change your `.startTransition()` method call to instead be a `.reverseTransition()`\
    \ method call by using the following line of Java code:\n\n```\ntransition.reverseTransition(5000);\n\
    ```\n\nThe code is error-free and can be seen inside Eclipse in Figure [13-17](A978-1-4302-5786-8_13_Chapter.html#Fig17).\n\
    \n![A978-1-4302-5786-8_13_Fig17_HTML.jpg](A978-1-4302-5786-8_13_Fig17_HTML.jpg)\n\
    \nFigure 13-17. Changing the `.startTransition()` method call to `.reverseTransition()`\
    \ method call to ping-pong transition\n\nNext, use your `Run As ➤ Android Application`\
    \ work process, and test your new code in the Nexus One emulator. As you can see,\
    \ now every time you click an `ImageButton` UI element, the 9-patch frame asset\
    \ will fade in and then fade out, just like a Pong animation will do. Using the\
    \ `.startTransition()` method, the fade only goes in one direction (fade in),\
    \ so this alternate method call actually gives you a great deal of latitude in\
    \ how you implement the animation of your `TransitionDrawable` objects.\n\nNext,\
    \ let’s edit your `TransitionDrawable` object’s XML definition, and use a normal\
    \ (non-9-patch) image asset in place of the `ninepatchframe` object. You will\
    \ edit the second `<item>` tag to reference the `bookmark0.png` asset file, rather\
    \ than the `ninepatchframe.9.png` file as it is currently. Click the `trans_contents.xml`\
    \ tab at the top of Eclipse and make the necessary edits.\n\nThe final `trans_contents.xml`\
    \ `TransitionDrawable` object’s XML definition markup for these two `<item>` child\
    \ tags, shown in Figure [13-18](A978-1-4302-5786-8_13_Chapter.html#Fig18), should\
    \ appear exactly as follows:\n\n```\n<item\n    android:id=\"@+id/imageSource\"\
    \n    android:drawable=\"@drawable/cloudsky\" />\n<item\n    android:id=\"@+id/imageDestination\"\
    \n    android:drawable=\"@drawable/bookmark0\" />\n```\n\n![A978-1-4302-5786-8_13_Fig18_HTML.jpg](A978-1-4302-5786-8_13_Fig18_HTML.jpg)\n\
    \nFigure 13-18. Editing a `trans_contents.xml` `TransitionDrawable` definition\
    \ to change the destination image to bookmark\n\nNow you can use the `Run As ➤\
    \ Android Application` sequence to review the new transition image crossfade using\
    \ the bookmark image asset, which fades in over the `cloudsky` background plate\
    \ nicely. It is important to note that using PNG32 images, which have an alpha\
    \ channel installed inside them, can really enhance what you can achieve with\
    \ Android image transition code; instead of one image replacing another, much\
    \ more advanced effects can be achieved.\n\nNow let’s combine image transitions\
    \ with compositing with your `ImageView` UI element by using both its source (foreground)\
    \ and background image plates.\n\n# Advanced TransitionDrawable Compositing via\
    \ ImageView\n\nLet’s go back into your `activity_contents.xml` UI layout definition\
    \ file and edit your `<ImageView>` child tag to change your `android:src` parameter\
    \ to use your `ninepatchframe` image asset as the foreground image plate, and\
    \ then add an `android:background` parameter that references your `trans_contents.xml`\
    \ XML `TransitionDrawable` object definition, as shown in Figure [13-19](A978-1-4302-5786-8_13_Chapter.html#Fig19).\n\
    \n![A978-1-4302-5786-8_13_Fig19_HTML.jpg](A978-1-4302-5786-8_13_Fig19_HTML.jpg)\n\
    \nFigure 13-19. Changing the `android:src` parameter to a `ninepatchframe` and\
    \ `android:background` to `trans_contents`\n\nNext, go into your `ContentsActivity.java`\
    \ Activity subclass editing tab, and change your `.setImageDrawable(transition)`\
    \ method call and its parameter to `.setBackground(transition)` so that it now\
    \ sets up your `TransitionDrawable` object as (in) your background plate, rather\
    \ than your foreground (source) image plate for your `ImageView` object. This\
    \ is shown in Figure [13-20](A978-1-4302-5786-8_13_Chapter.html#Fig20).\n\n![A978-1-4302-5786-8_13_Fig20_HTML.jpg](A978-1-4302-5786-8_13_Fig20_HTML.jpg)\n\
    \nFigure 13-20. Changing the `ImageView` object `.setImageDrawable()` method call\
    \ to a `.setBackground()` method call\n\nNow let’s test this more advanced use\
    \ of the `TransitionDrawable` object with three image assets, two of which use\
    \ alpha channels, and one of which is a 9-patch asset. We’re throwing everything\
    \ that we can at `TransitionDrawable` to see if it can handle it: foreground and\
    \ background image plates, 9-patch image assets, 32-bit PNG images with 8-bit\
    \ alpha channel—all triggered using a multi-state `ImageButton`.\n\nAs you can\
    \ see in Figure [13-21](A978-1-4302-5786-8_13_Chapter.html#Fig21), all of these\
    \ new code and image assets are working well together as expected, using the `ninepatchframe.9.png`\
    \ image asset as the new foreground image plate overlaying the `TransitionDrawable`,\
    \ which is now installed in the background image plate of the `ImageView` UI object,\
    \ and fading in and out at each click of the `ImageButton` UI element.\n\n![A978-1-4302-5786-8_13_Fig21_HTML.jpg](A978-1-4302-5786-8_13_Fig21_HTML.jpg)\n\
    \nFigure 13-21. Testing your `ImageView` foreground and background image composite\
    \ with your `TransitionDrawable`\n\nAs you can see, the `TransitionDrawable` object\
    \ animated image asset can be used as a foreground (source image plate) graphics\
    \ design element or as a background graphics design element for any Android `ImageView`\
    \ class (this includes `ImageButton`), so make sure to use this amazing power\
    \ creatively in your future Android applications graphics design.\n\nAs you get\
    \ more advanced as you move through this book, keep in mind that everything that\
    \ you have learned (and will be learning) can be utilized in conjunction with\
    \ each other using the correct XML markup and Java coding constructs. This includes\
    \ layers, `PorterDuff` blending and transfer modes, alpha channels (PNG32), 9-patches,\
    \ animation, digital video, and much more!"
