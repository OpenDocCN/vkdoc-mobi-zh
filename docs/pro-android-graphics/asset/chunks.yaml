- fmt: '# Summary


    In this fifteenth chapter, you learned how to use only Java code, and no XML markup,
    to implement a splash screen procedural animation in Android OS by using methods
    and constructors from the `Animation` class and its five subclasses: `ScaleAnimation`,
    `AlphaAnimation`, `AnimationSet`, `RotateAnimation`, and `TranslateAnimation`.


    We started out by looking at Android’s `Animation` class itself, and how it is
    a direct subclass of the `java.lang.Object` master class, which means it was essentially
    written from scratch to provide view animation, or vector animation, also known
    as procedural animation, to the Android OS.


    Next, we looked at the `TranslateAnimation` subclass and how it allows us to move
    `View` objects in an animated fashion around the X-Y screen space. We then looked
    at the `ScaleAnimation` subclass and how it allows us to scale a `View` object
    within this X-Y 2D screen dimension, and we looked at how the constructor methods
    for both of these procedural animation classes work.


    Next, you jumped right into your Java coding by implementing a `ScaleAnimation`
    object in your `GraphicDesign` application to see how `Animation` objects and
    their transform subclasses work together in your Java coding environment.


    You then learned about the `AlphaAnimation` class and how it allows us to add
    alpha blending to our procedural animation bag of tricks. You also learned how
    to use a relatively simple constructor method to implement fade-in or fade-out
    effects to a `View` object (in your case an `ImageView`), thereby animating it.


    Then, you again dove back into your Java coding and added another `Animation`
    object to define your `AlphaAnimation` objectives, and attempted to implement
    two serial calls to the `.startAnimation()` method, which failed, forcing you
    to then learn about the Android `AnimationSet` class, which turned out to be a
    really positive experience. Peace, Love, and AnimationSet, man (or woman)!


    After we reviewed the `AnimationSet` class particulars, we got right back in Eclipse
    ADT, and you started implementing even more advanced Java procedural animation
    programming. You created an `AnimationSet` animation group pipeline to implement
    complex procedural animation, and you did this using only Java programming logic.


    Once you had your `AnimationSet` working, it was much easier to add a rotation
    to your animation set by using the `RotateAnimation` class and constructor method,
    and then adding it into your `AnimationSet` using the `.addAnimation()` method
    call. By this time, you were getting pretty good at using the `Animation` class
    and its functional subclasses inside your Android application.


    Finally, you implemented that exact same frame and procedural animation combination
    sequence using Java, which you had implemented using XML back in [Chapters 3](#A978-1-4302-5786-8_3_Chapter.html)
    and [4](#A978-1-4302-5786-8_4_Chapter.html). At this point I suggested (for practice)
    trying to add a `TranslateAnimation` object to your `AnimationSet` and trying
    to make an app auto-start logo animation by re-implementing your `animStarter`
    class.


    In the next chapter, we’ll focus on gaining a more advanced understanding of the
    Android `Drawable` class, now that you have learned about and utilized many of
    its subclasses to implement animation and blending and other very advanced graphics-related
    Android programming gymnastics. This will allow you to “finish off” your comprehension
    of `Drawable` classes and objects in Android, which are the cornerstone of graphics
    design and implementation within the Android operating system, and thus very important.


    # 16. Advanced Graphics: Mastering the Drawable Class


    ## Abstract


    In this sixteenth chapter, we will take a lower-level look at the `Drawable` class
    within the Android OS, as it provides a foundation for all graphics-related objects
    in the operating system.


    Now that you’ve had some deep experience with, and exposure to, a variety of advanced
    `Drawable` object types in Android, it’s time for us to examine the base class
    that these came from, and to take a look at some of the other types of `Drawable`
    objects that are available to you in Android OS.


    Many of these different types of `Drawable`s, such as the `ShapeDrawable`, we
    simply have not had a compelling reason to cover as of yet. This is mainly due
    to the fact that digital images, digital video, 2D animation, blending, and transitions
    are more in-demand topics for you, the reader, than topics such as vector illustration
    (shapes), fonts (text objects), or gradients. Still, vector illustration is a
    popular topic, so we’ll cover it in this chapter.


    So, never fear, we’ll get around to it all, and that is one of the reasons that
    I was sure to include a chapter on Android’s `Drawable` class, so that I could
    be sure to cover all of the different types of `Drawable` subclasses and objects,
    as they all can affect graphics design in one way or another.


    You will also be learning about several other important Android classes in this
    chapter that directly relate to professional Android graphics design, classes
    that are used with the `Drawable` class and its many subclasses. These include
    Android’s `Shader` and `BitmapShader` classes, `Rect` and `RectF` classes, the
    `InputStream` class, and the `ShapeDrawable` class. You will also reinforce your
    usage and knowledge of the `Bitmap`, `Paint`, and `Canvas` classes as well.'
