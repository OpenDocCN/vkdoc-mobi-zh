    # 程序化动画概念：补间与插值器


    程序化动画的基础是补间（tween）的概念，它是"中间"（in-between）的缩写。在赛璐珞动画的早期时代，资深动画师绘制主要或关键赛璐珞片（也可称为关键帧），而初级动画师则生成补间赛璐珞片，以在资深动画师创建的赛璐珞片之间提供平滑的运动。


    这种生成中间赛璐珞片的过程后来被称为补间动画，值得注意的是，有时程序化动画也被称为补间动画，正是出于这个原因。由于帧动画使用光栅技术，而程序化动画使用矢量技术，因此你也会看到矢量动画这个术语常被用来指代程序化动画。


    当补间动画成为一种数字现象时，这个过程就变成了我们在数学课上学到的`插值`。由于现在一切都是通过数值完成的，我们只需为关键帧提供数值，Android 系统就会通过使用`Animation`类代码，借助插值器自动为我们完成剩余工作，即插值生成补间（中间帧）。


    插值的数学原理相当直接：确定范围，比如从起始值 1 到结束值 8，将其除以补间帧的分辨率，每个帧就变成了该范围的一个分数。为了在 1 到 8 之间生成 8
    个插值，你会在每个整数处计算出一个新值；如果要让 1 到 8 之间有 16 帧，你会在 1、1.5、2、2.5、3 等位置计算新值。


    计算出的插值越多，分辨率就越高，由此插值提供的动画运动也就越平滑。另一方面，用于进行这些计算的处理能力越多，留给其他功能的处理能力就越少。幸运的是，Android
    会为你确定（优化）这一点，因此你只需要指定起始（from）值和结束（to）值即可。


    然而，Android 中的插值还有更复杂的一面。Android 中的 13 种插值器类型进一步允许你微调数值在你所提供的数据范围内的插值方式。


    Android 中的插值类型在操作系统的资源（`R`）区域中以预定义的`插值器常量`形式提供。你可以在以下网址查看具体提供了哪些插值器类型：


    [`http://developer.android.com/reference/android/R.interpolator.html`](http://developer.android.com/reference/android/R.interpolator.html)


    目前 Android 中有 13 种不同类型的插值器；预计未来会添加更多类型，以便为你的程序化动画提供更多样化的运动选项。这 13 个插值器常量实际上是数学方程式，以实现它们的
    Android Java 类的形式存在。它们会沿着你提供的数值范围，以不同方式对你的值进行插值或补间，从而在该范围内提供不同类型的运动。


    你可以查阅以下网址，了解实际的 Android 插值器类，我们接下来将详细讨论它们。这些类基于`android.animation`包中的`TimeInterpolator`类：


    [`http://developer.android.com/reference/android/animation/TimeInterpolator.html`](http://developer.android.com/reference/android/animation/TimeInterpolator.html)


    你之前学到的那种插值类型在 Android 中被称为线性插值器，因为它以线性（均匀）方式在任何指定的数据范围内均匀分布数值。然而，还有十几种其他插值器会改变插值数据值之间的均匀间隔，以创建不同类型的运动，例如弹跳、预备或加速效果。


    Android 的`AccelerateInterpolator`类是前三个插值器常量的基础，即`accelerate_cubic`、`accelerate_quad`和`accelerate_quint`，它们提供了一个缓出运动函数，使运动从起始点开始逐渐加速（从而在你指定的数据范围内，随着时间推移加速运动）。


    Android 的`DecelerateInterpolator`类本质上是`AccelerateInterpolator`类的对应物，它也有三个插值器常量，不过这次是`decelerate_cubic`、`decelerate_quad`和`decelerate_quint`。它们提供了一个缓入运动函数，使运动在到达终点时逐渐减速，从而在你指定的数值范围末端，随着时间推移使运动减缓。


    三次方、二次方和五次方规范定义了这些加速或减速曲线的数学形状。与任何这些插值器一样，你需要通过实验来确定它们在特定程序化动画场景中的具体效果。


    还有一个`AccelerateDecelerateInterpolator`类，它在运动范围的开始部分提供加速曲线，在运动范围的结束部分提供减速曲线。因此，这种运动类型会在开始时缓慢加速，然后以类似的速度减慢，最后到达最终目的地（范围结束处的"to"值）。


    Android 的`AnticipateInterpolator`类提供了一种看起来像是在预备某事的运动类型，也就是说，它在运动范围开始时会有少许后退（想象一下当你认为自己即将受到压力时，身体会如何移动或调整），然后在剩余的数据范围内向前弹射（就像一种反应）。


    正如`AccelerateInterpolator`有对应的`AccelerateDecelerateInterpolator`一样，`AnticipateInterpolator`也有对应的`AnticipateOvershootInterpolator`类。后者在范围末端增加了一个过冲运动，即运动超过其目标，然后漂移回最终范围值，作为对该过冲的修正。如果你想要过冲运动效果但不需要范围开始部分的预备动作，可以使用`OvershootInterpolator`来实现这种运动效果。


    请记住，所有这些不同类型的插值器，你可以将它们视为运动曲线，它们只是试图通过使用基本数学方法，沿着三次方或二次方的数据值曲线应用补间帧插值，来模拟你在现实世界中每天都能看到的运动。


    插值器在控制运动方面表现出色。你只需要多加练习，就能知道在特定的程序化动画情况下应该使用哪个插值器常量。


    还有一个`BounceInterpolator`类，用于模拟海滩球等物体的弹跳效果；当你需要让某个物体从其他物体上弹开时，应该专门使用这个插值器。最后，还有一个`CycleInterpolator`类，它通过使用开发者指定的循环值的正弦数学模式来模拟循环运动。


    接下来，我们将更深入地研究数值范围是如何指定的，以及如何使用枢轴点规范来进一步控制（偏斜）它们。一旦你掌握了所有这些高级程序化动画参数（控件），你就会发现，在
    Android 中使用程序化动画几乎可以完成你能想象到的任何事。

    '
- fmt: '# Procedural Animation Data Values: Ranges and Pivot Point


    In order to be able to interpolate, we need to specify more than a single numeric
    value because interpolation, or tweening, involves creating new interim values
    between a starting and ending value. So, information from the previous section
    (interpolation) will be applied to information found in this section (ranges),
    and then in the next section, we will cover the transformation types that all
    these fine-tuned controls can be applied to.


    To have any procedural animation, we will always need to specify a range, from
    a starting value, called a `From` value, to an ending value, called a `To` value.
    This seems logical, as we need something to animate over time!


    Besides a range, many procedural animation transformations involve a pivot point.
    A pivot point tells the Android OS how to skew the transform into a given direction,
    as you will see in the next section when we get into the three primary different
    types of transforms and how they function.


    Like the value range, a pivot point also requires two values to establish. However,
    unlike a value range, which utilizes a `From` and `To` value, a pivot point uses
    a 2D (two dimensional) location on our 2D image, using `X` and `Y` coordinates.


    Pivot points are also used extensively in 3D animation, where setting the pivot
    point requires three (X, Y, and Z) data coordinates, in order to be specified
    accurately. Currently, Android uses 2D procedural animation in its `Animation`
    class, with 3D animation being accomplished via a different `android.opengl` package,
    a discussion of which is best suited for an Android 3D book. In this book, we’re
    covering Graphics Design, which is primarily 2D.


    When we look at the various types of transforms, which we will do in the next
    section, you will see how this pivot point allows a more fine-tuned result to
    be obtained. This gives the developer additional power over the procedural animation
    transform effect that they are trying to achieve.


    # Procedural Animation Transforms: Rotate, Scale, Translate


    There are three primary or core types of transformations that are used in both
    2D and 3D animation. One of them involves movement, and the technical animation
    term for this is translation. One of them involves size, and the technical animation
    term for this is scale. The last one involves orientation (which direction that
    something is facing), and the technical animation term for this is rotation.


    We will cover each of these transformation types individually within this section
    so that you have a clear understanding of what each of them does before you implement
    each of these transforms, both individually as well as collectively, later on
    in the chapter in your `GraphicsDesign` application.


    Let’s start with the most common form of transformation, which is a movement or
    translation from one location on the screen to another locale. To create a movement
    between two points along a straight line or `vector`, we need to have a starting
    point, using an X, Y coordinate, as well as an ending point, also using an X,
    Y coordinate pair. Since we move along a vector, also sometimes called a ray,
    which is a `directional vector`, you can see why procedural animation is sometimes
    called vector animation.


    The next most common form of transformation is to scale an object up or down by
    a scaling factor. Scaling can take place along the X-axis as well as the Y-axis,
    so to scale an object uniformly, make sure to keep your X and Y scaling value
    ranges exactly the same.


    To scale an object along its X-axis (left to right) requires a starting (`fromXScale`)
    value for the X-axis scaling, say, for instance 1.0 or 100%, as well as an ending
    (`toXScale`) value, say 0.5 or 50%. Similarly, to scale an object along its Y-axis
    (up and down) requires a starting (`fromYScale`) value for the Y-axis scaling,
    say, for instance 1.0 or 100%, as well as an ending (`toYScale`) value, say 0.5
    or 50%.


    So, in order to uniformly scale an object to half of its original size, we would
    use those X-axis and Y-axis `Scale From` and `Scale To` setting values.


    The next most common form of transformation is to rotate an object by a specified
    number of degrees, ranging from zero to 360 (or a full circle). This is done by
    specifying a `fromDegrees` value, say 0, and a `toDegrees` value, say 360, which
    would generate a full rotation of the object.


    If you wanted to rotate your object around its center-point, you would specify
    the `pivotX` and `pivotY` values to both be set at 50%, which would place the
    pivot point in the center of the object you are rotating.


    # Procedural Animation Compositing: Alpha Blending


    There is one other attribute that can be animated procedurally in Android, but
    it is not a transformation, and is more akin to a compositing feature. Transforming
    an object changes it physically in some way, moving it to a different location,
    changing its size, or how it is oriented (rotated).


    Alpha blending an object with its background using a change in the object alpha
    value, commonly known as a fade-in or a fade-out, is a compositing function. However,
    in Android it is included with the procedural animation toolset, as the alpha
    value is a logical attribute to animate, especially if you are creating a ghost
    story, or a transporter beam special effect.


    The alpha attribute of an object that you are animating procedurally can be controlled,
    allowing alpha (transparency) blending to be combined with the translation, scaling,
    and rotation transformations already available for your use in creating animation
    procedurally, that is, by using XML or Java code to specify data values to the
    `Animation` class.


    Like most of the other procedural animation attributes, with the exception of
    pivots, which are denoted using a percentage such as 50%, and degrees, which are
    denoted using integers between 0 and 360, alpha blending amounts are set using
    real numbers between 0.0 (transparent) and 1.0 (visible).


    It is important to note that using more than one decimal place is allowed, so
    if you wanted your object to be one-third visible, you could use 0.333 or, for
    three-quarters visible, you could specify 0.75 as the starting or ending value
    for your object’s alpha value.


    Alpha starting and ending values are set by using the `fromAlpha` and the `toAlpha`
    parameters, so to fade-out an object, you would set `fromAlpha` to 1.0 and `toAlpha`
    to 0.0.


    To combine multiple different types of procedural animation parameters together,
    you would create a set of animation transformation parameters. Using a procedural
    animation set will allow you to group transforms and compositing together in a
    logical and organized fashion. This will allow far more complex procedural animation
    to be created. I will cover how to create procedural animation sets in detail
    a bit later on in this chapter.'
