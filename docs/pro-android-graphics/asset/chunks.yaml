- fmt: '# Summary


    In this sixteenth chapter, you learned how to use the `Drawable` class to create
    your own custom `Drawable` objects in Android. We covered all of the different
    types of `Drawable` objects available in Android, as well as how to create custom
    `ShapeDrawable`s by using the `<shape>` parent tag in an XML `ShapeDrawable` object
    definition file.


    We took a look at some of the child tags that can be utilized inside a parent
    `<shape>` tag, including the `<gradient>` tag to define different types of gradients,
    which you learned were actually `Shader` object types, as well as the `<stroke>`
    tag, which allows us to create a border around the `ShapeDrawable` object.


    Along the way you learned about some other important classes for graphics, including
    the `Shader` class for creating texture maps (`Shader`s) for use with the `Paint`
    class, the `Rect` and `RectF` classes for creating rectangle objects, and the
    `InputStream` class for importing raw data streams.


    You learned about the all-important Android `Drawable` class, and then you learned
    how to create your very own custom `ImageRoundingDrawable` class `Drawable` subclass,
    starting by using a New ➤ Class function in Eclipse.


    You created an `ImageRoundingDrawable()` constructor method, and leveraged the
    `Paint`, `Bitmap`, `Shader`, and `Canvas` classes to craft and add your own custom
    type of `Drawable` object to the Android OS (your version, at least).


    You learned about the Android `Shader` class and the `Shader.TileMode` nested
    class and its tiling mode constants, and you implemented these in your code. You
    also learned about the `BitmapShader` subclass of `Shader` and how to use it to
    apply `Bitmap` image assets as shaders. You will be using this knowledge to do
    something really cool in the next chapter.


    You also learned about the `Rect` and `RectF` classes, used for defining rectangular
    areas often used for drawing and other graphics-related operations, and you learned
    about the `InputStream` class, which allows you to open up raw data input streams
    and to bring graphics data into your application in new and more powerful ways.


    In the next chapter, we’ll focus on gaining more advanced understanding of Android’s
    `Paint` and `Canvas` classes and how to allow our users to use the `onDraw()`
    method to draw graphics to their screens in real time.


    # 17. Interactive Drawing: Using Paint and Canvas Classes Interactively


    ## Abstract


    In this seventeenth chapter, you will learn how to use the Android `Paint` and
    `Canvas` classes interactively, in real time, using your Android device''s touchscreen.
    You will implement touchscreen event handling using the `OnTouchListener()` method
    and class, and learn how to enable your user to `draw` on their Android device''s
    screen interactively and in real time.


    You will learn about the Android `MotionEvent`, `List`, `ArrayList`, and `Context`
    classes, as well as much more detail regarding Android’s `Paint` and `Canvas`
    classes. We will also look specifically at the `.onDraw()` method in Android as
    well as how drawing to the user’s display functions within Android OS.


    You will be creating your own custom `View` subclass called `SketchPadView`, and
    you will use this `View` subclass to create your own `SketchPad Activity` that
    will allow your users to create their own graphic designs on their screen.


    You will start off learning how the `Canvas` and `Paint` classes function with
    the Android `.onDraw()` method. This foundational information, which we will cover
    in the first portion of this chapter, will show you how Android allows developers
    to create their own custom graphics applications.


    After we’ve looked at these core classes and methods that allow developers to
    create graphics applications, you will create your own `SketchPad Utility`. During
    that portion of the chapter we will cover some of the ancillary classes and methods
    that will need to be leveraged in order to make `Canvas` drawing functions interactive
    for your application’s user base. By the end of this chapter, you will have created
    your own custom `View`, and painted on it using the `Canvas`, `Paint`, `Context`,
    `List`, `ArrayList`, and `Context` classes!


    ## The Android onDraw() Method: Drawing onto Your Screen


    The function that is the most central or critical to drawing on your custom `SketchPadView`
    subclass, which you will be creating later in the chapter, is to override the
    `View` subclass’s `onDraw()` method, implementing your own version of it within
    your `SketchPadView.java` class.


    This `onDraw()` method contains one single parameter, which is, as you might imagine,
    a `Canvas` object, usually named `canvas`. Your `View` subclass can use this `Canvas`
    object to allow your users to draw on the `View` surface.


    As you will see in the next section, the `Canvas` class defines a great many `.draw()`
    methods, which can be used to draw colors, text, shapes, vertices, bitmaps, paths,
    points, or any other type of `Drawable` graphic object.


    You can use any and all of these methods in your `onDraw()` implementation to
    create your own custom drawing applications, as well as anything else that you
    can imagine, such as interactive coloring books, for that matter.


    As you have already learned in this book, prior to calling your `onDraw()` method,
    you must first declare and instantiate your `Paint` object.


    As you’ve seen in the second half of this book, Android’s `android.graphics` package
    and graphics design framework separates the drawing and display function into
    two discrete functional areas: where to draw the graphics to, as defined by your
    `Canvas` object, and what to draw upon the `Canvas` object, which is defined by
    your `Paint` object. Near the end of the chapter you’ll see why this is a smart
    thing for Android to do, as you add image cloning to your `SketchPad Utility`
    using only a few lines of `Paint` and `Shader` code.


    Before you start coding your `SketchPad Activity` subclass and `SketchPadView`
    `View` subclass to implement custom drawing on the display for your user, I need
    to give you the overview of both the `Canvas` and the `Paint` classes so that
    you have this foundational information under your belt. If you intend on mastering
    graphics in Android OS, you will want to familiarize yourself with both of these
    core classes; go to the developer.android.com web site for more information.'
