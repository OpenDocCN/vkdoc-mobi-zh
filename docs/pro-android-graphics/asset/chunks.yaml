- fmt: '# Summary


    In this third chapter you learned all about frame-based animation concepts, formats,
    XML setup, and optimization, as well as creating four resolution-density–optimized
    animations for your `pro.android.graphics` package startup splash screen for your
    `GraphicsDesign` Android application.


    We started out by looking at some of the basic concepts that relate to frame-based
    animation, such as the component Cels or Frames, how they are played over time
    using a framerate (expressed as FPS or frames per second) and frame resolution
    (or the size of each frame in pixels).


    Next, we looked at how all of these attributes can work together to allow us to
    optimize our frame-based animation’s new media assets so the Android app has a
    small data footprint. We talked about the different ways to optimize frame-based
    animation, such as adjusting the frame resolution, using a lower indexed color
    depth (8-bit color), and being really careful with the number of frames used to
    create the illusion of motion. We looked at PNG32 for compositing animation and
    the concept of pixel crawl.


    We then took a look at how frame animation is implemented in Android using XML
    markup. We looked at how the frame animation assets are held in their respective
    `/res/drawable-dpi` folders and how the XML file is held in the `/res/drawable`
    folder. We pointed out that frame animation uses the `drawable` folders and procedural
    animation, which we’re covering in the next chapter, uses the `/res/anim` folder.


    We took a look at the `AnimationDrawable` class, which contains the pre-built
    Java code that we use to implement frame-based animation. We looked at the `.start()`
    method and the `duration` variable and its milliseconds value.


    Then we looked at the XML `<animation-list>` and `<item>` tags that are used to
    implement frame animation structures in XML markup. You learned about the `oneshot`
    parameter and how the parent `animation-list` container holds the child `item`
    tag objects inside it.


    Next, you got down to business and actually created a frame-based animation for
    your `Graphics Design` project in Eclipse. You copied your nine frames into the
    resolution density folders and renamed them to be simpler and to conform to the
    Android lower-case letters and numbers only file naming rule.


    You then created a new Drawable XML file, named it `anim_info.xml`, added an `<animation-list>`
    root element (and parent tag container), and then added the `android:oneshot`
    parameter. You then filled this with nested child `<item>` tags, configured for
    a one-ninth of a second duration and that also referenced your nine animation
    frames, now named `pag0.png` through `pag8.png`.


    Once this was completed, you added an `ImageView` user interface element into
    your `FrameLayout` UI container inside your `activity_main.xml` UI screen layout
    XML definition file. You then referenced the `anim_intro.xml` file inside of this
    `ImageView` using the `android:src` parameter and added other parameters to make
    the screen layout of the `ImageView` look professional, as well as able to be
    referenced by your Java code.


    Finally, you wrote Java code in the `MainActivity.java` file, instantiating the
    `ImageView` object, as well as the `AnimationDrawable` object, and then you “wired”
    them together using Java code. You then started looping the frame animation object
    construct by using the trusty `.start()` method.


    In the next chapter, you will learn about Android procedural animation and its
    concepts, transforms, techniques, and optimization. You will learn how to combine
    transformational power, afforded to you via procedural animation in conjunction
    with your frame-based animation. This will allow you to boost the motion graphics
    effects that you are creating to a new level of power and complexity.


    # 4. Android Procedural Animation: XML, Concepts, and Optimization


    ## Abstract


    In this fourth chapter, we will take a close look at how XML markup can be used
    to create procedural animation in the Android operating system.


    Procedural animation is significantly more complex than raster animation, which
    simply displays a sequence of images on the display, so that we can create the
    illusion of motion. Frame animation only allows us to control the individual timing
    of each frame that is displayed, after we specify what frames will be utilized
    for the animation. Procedural animation takes this to the next level of complexity,
    as you will see during this chapter.


    Procedural animation actually uses code, in most cases via XML markup, to define
    transformations in 2D space to actually change our Android assets. “Code” makes
    it sound a bit more complex than it actually is, as there are procedural animation
    parameters already defined in Android, and we supply these with various values
    that then cause all these procedural animation parameters to work together in
    order to achieve the resulting animation.


