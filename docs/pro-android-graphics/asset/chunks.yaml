    *图 12-5. 复制并粘贴第一层`<item>`标签以创建第二层和第三层`<item>`定义*


    注意在图 12-5 中，`contents_layers.xml`编辑窗格底部没有图形布局编辑器选项卡，只有一个 XML 编辑选项卡。这应该能提示你，为了能够在
