  trans: '

    # Android 的 WindowManager 接口：管理窗口


    Android 操作系统有一个名为 `WindowManager` 接口的窗口管理接口。`WindowManager` 接口是一个实现 `ViewManager`
    接口的公开接口。`ViewManager` 接口允许你为 `Activity` 子类添加和删除子视图（View）。窗口（Window）是视图（View）的一种类型。


    `WindowManager` 接口将使你的应用程序能够与 Android 操作系统窗口管理器通信，该管理器是 Android 底层（Linux）操作系统窗口或显示层的一部分。这个较低层次将
    Linux 内核与 Android 设备的硬件（Linux 内核运行其上）在基础（底层）层面连接起来。我在此假设你知道 Android 操作系统运行在开源的
    Linux 内核之上。


    如果你熟悉 Linux，你应该对窗口管理器习以为常，它们可以在 Linux 操作系统中切换进出，以提供全新的外观和感觉（换句话说，就是为 Linux 操作系统提供新的
    UI 设计）。


    每个 `WindowManager` 对象实例都引用一个给定的 `Display` 对象实例。如果你想为不同的显示器获取 `WindowManager` 对象，你需要使用
    `.createDisplayContext(Display)` 方法调用来获取该 `Display` 对象的 `Context` 对象。然后，你应该利用
    `.getSystemService(Context.WINDOW_SERVICE)` 方法调用来获取 `WindowManager`，这将在本章下一节的代码中实现。


    如果你想使用外部显示器显示窗口，最简单的方法是创建一个 `Presentation` 对象。`Presentation` 类会自动获取该 `Display`
    的 `WindowManager` 和 `Context`。`Presentation` 类是 Android `Dialog` 类的子类。


    Android `WindowManager` 接口属于以下包：


    `java.lang.Object`


    `> android.view.WindowManager`


    `Display` 类属于 `android.view` 包，因为它通过实现 `ViewManager` 公开接口提供了对视图管理的访问。在应用程序中使用
    `WindowManager` 类（或对象）的导入语句应引用 `android.view.WindowManager` 包。


    `WindowManager` 接口有三个嵌套类，包括布局参数嵌套类 `WindowManager.LayoutParams`，它包含了所有用作标志的常量，用于告诉你的应用程序当前
    `Window` 对象是如何配置的。当你的应用程序尝试添加一个 `WindowManager.LayoutParams` 令牌无效的 `View` 对象时，`WindowManager.BadTokenException`
    嵌套类会抛出异常；当你的应用程序在找不到（即不存在）的辅助 `Display` 对象上调用 `.addView(View, ViewGroup.LayoutParams)`
    方法时，`WindowManager.InvalidDisplayException` 嵌套类会抛出异常。


    ## 设置 Display 对象以确定设备旋转方向


    现在，让我们利用这些新学的知识，为你当前的流媒体视频应用程序完成一些关键任务。你要做的是，最终通过使用 `WindowManager` 和 `.getSystemService()`
    方法调用来“轮询”`Display` 对象，从而确定旋转向量（0 度、90 度、180 度或 270 度），让你的应用程序能够“看到”用户手中 Android
    设备的倾斜角度。你将利用这些信息以正确的方向流式传输你的数字视频资源。


    在调用 `downloadProgress.show()` 方法之后，你要做的第一件事就是声明你的 `Display` 对象并将其命名为 `rotationDegrees`。你将此对象命名为
    `rotationDegrees`，因为你要用它来找出用户所使用的设备旋转倾斜角度。


    你需要将此对象设置为当前应用程序的 `Context` 对象，并在 `.getSystemService()` 方法调用中对此 `Context` 对象调用
    `WINDOW_SERVICE` 常量，将其转换为 `WindowManager`，然后在该编程结构上调用 `.getDefaultDisplay()` 方法，使用图
    19-20 中所示的如下异常紧密的 Java 代码行：


    ```

    Display rotationDegrees = ((WindowManager)getSystemService(Context.WINDOW_SERVICE)).getDefaultDisplay();

    ```


    这将使用默认（主）显示屏的特性来加载 `rotationDegrees Display` 对象，其中一个特性就是其当前的旋转角度，这也会告诉你其当前的（竖屏或横屏）方向。


    ![A978-1-4302-5786-8_19_Fig20_HTML.jpg](img/A978-1-4302-5786-8_19_Fig20_HTML.jpg)


    图 19-20. 编写名为 `rotationDegrees` 的 `Display` 对象代码并导入 `android.view.Display` 类


    如图 19-20 所示，你需要将鼠标悬停在 `Display` 类引用上，并首先选择“导入 ‘Display’ (`android.view`)”选项。


    如图 19-21 所示，正如你所料，这修复了部分错误高亮，但仍然是必须引用 `WindowManager` 类。


    如果再次将鼠标悬停在错误高亮上，你期望看到“导入 ‘WindowManager’ (`android.view`)”选项，然而，你得到的唯一提示是“WindowManager
    cannot be resolved to a type”，如图 19-21 所示。


    显然，Import 语句将解决这个引用问题，而我能想到的这个选项没有出现在错误辅助对话框中的唯一原因是 `WindowManager` 是一个接口而不是一个类。因此，你不得不手动编写一个
    Import 语句，真是天理不容！


    ![A978-1-4302-5786-8_19_Fig21_HTML.jpg](img/A978-1-4302-5786-8_19_Fig21_HTML.jpg)


    图 19-21. 鼠标悬停以确定剩余错误；注意，Eclipse 没有提供导入 `WindowManager` 类的选项


    滚动到 `MainActivity.java` 代码列表的最顶部，点击 Import 语句部分旁边的加号图标以展开它，如图 19-22 所示。在末尾处，使用以下
    Java 编程语句为 `WindowManager` 类添加一个 Import 语句：


    ```

    Import android.view.WindowManager;

    ```


    当你在这里查看 `Activity` 子类的所有 Import 语句时，不妨看一下你在这个类中用来实现动画、视频流、进度对话框以及其他复杂图形设计管道和实现的
    20 个不同类。宝贝，你已经走了很长的路！（注意，我并非提倡吸烟；你可能没注意到，很少有程序员吸烟！）

    '
- fmt: "现在你已经添加了`WindowManager`导入语句，可以使用Control-S（保存）快捷键组合，Eclipse将重新评估错误信息，你可以检查是否完全消除了与这行复杂Java代码相关的所有错误。\n\
    \n如图[19-22](#A978-1-4302-5786-8_19_Chapter.html#Fig22)所示，你即将完成这行密集的代码；只需再导入最后一个类，就可以准备继续前进，实现你的`switch`编程结构。\n\
    \n![A978-1-4302-5786-8_19_Fig22_HTML.jpg](A978-1-4302-5786-8_19_Fig22_HTML.jpg)\n\
    \n图19-22. 编写`import android.view.WindowManager`语句以消除`Display`对象中的错误\n\n如图[19-23](#A978-1-4302-5786-8_19_Chapter.html#Fig23)所示，你仍然需要导入`Context`类。\n\
    \n![A978-1-4302-5786-8_19_Fig23_HTML.jpg](A978-1-4302-5786-8_19_Fig23_HTML.jpg)\n\
    \n图19-23. 消除关于需要添加`import android.content.Context`语句的最后一个错误\n\n在选择`Import 'Context'\
    \ (android.content)`选项并添加使用该类所需的导入语句后，你的`Display`对象将被声明、命名，并加载用户当前主Android设备的默认显示信息。\n\
    \n接下来，我们将简要介绍Android的`Surface`类，因为你将在接下来编写的`switch` case循环中使用它。\n\n## Android的`Surface`类：获取显示器的原始缓冲区\n\
    \nAndroid还有一个名为`Surface`的类，它允许开发者直接访问将Android设备屏幕内容绘制到物理硬件本身的“原始”或源内存“缓冲区”。你需要访问它，以确定Android用户如何旋转他们的设备（向左、向右，甚至上下颠倒）。\n\
    \nAndroid的`Surface`类是主类`java.lang.Object`的另一个直接子类，因此它被专门创建，以便在开发者真正需要时为显示屏幕表面提供这个“句柄”。`Surface`类还实现了`android.os.Parcelable`接口。\n\
    \nAndroid `Surface`类的层次结构如下：\n\n```\njava.lang.Object\n  > android.view.Surface\n\
    ```\n\n`Display`类属于`android.view`包，因为它直接访问并（取决于你的代码）影响`View`对象中的内容。在你的应用中使用`Surface`类（或对象）的导入语句应引用`android.view.Surface`包。\n\
    \n`Surface`类是一个`public`类，并包含一个嵌套类，称为`Surface.OutOfResourcesException`类。当你尝试引用的`Surface`对象无法按照图形处理代码管线中的预期方式创建、调整大小、旋转或进行其他操作时，此类将抛出异常。\n\
    \n`Surface`类还有一个公共构造方法，允许你使用`SurfaceTexture`对象创建`Surface`对象。这通过以下形式完成：`Surface(SurfaceTexture\
    \ surfaceTextureName)`。\n\n`Surface`类有四个关键常量，你将在本章下一节的代码中利用它们来确定用户如何握持Android设备。这些`ROTATION`常量不仅决定了Android设备是处于竖屏还是横屏模式，还决定了设备被旋转到了哪个方向。\n\
    \n这四个常量，如同Android中的许多其他事物一样，分别位于3点、6点、9点和12点钟方向。正如你所料，它们被命名为`ROTATION_0`、`ROTATION_90`、`ROTATION_180`和`ROTATION_270`。让我们开始工作，在你的代码中使用`Surface.ROTATION`常量，这样你就能看到它们是如何使用的。\n\
    \n## 使用`.getRotation()`方法调用驱动`Switch`循环\n\n在创建并配置`Display`对象之后，你将添加一个`switch`循环（`case`语句），该循环将检测用户Android设备的当前旋转或方向（竖屏或横屏）。\n\
    \n`switch`语句将评估对你在上一行代码中创建的`rotationDegrees` `Display`对象调用`.getRotation()`方法的结果。此方法调用返回四个`Surface.ROTATION`常量之一，然后你将使用`case`构造对这些常量进行评估，并使用它们将你的`splashScreenUri`\
    \ `Uri`对象的引用值设置为正确的视频资源。这通过使用以下Java代码完成，如图[19-24](#A978-1-4302-5786-8_19_Chapter.html#Fig24)所示：\n\
    \n```\nswitch(rotationDegrees.getRotation()){\n  case(Surface.ROTATION_0):\n \
    \   splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag480x800portrait.webm\"\
    );\n    break;\n  case(Surface.ROTATION_90):\n    splashScreenUri = Uri.parse(\"\
    HTTP://www.e-bookclub.com/pag800x480landscape.webm\");\n    break;\n}\n```\n\n\
    ![A978-1-4302-5786-8_19_Fig24_HTML.jpg](A978-1-4302-5786-8_19_Fig24_HTML.jpg)\n\
    \n图19-24. 编写`switch`语句以评估对`Display`对象调用`.getRotation()`方法的结果\n\n如图[19-24](#A978-1-4302-5786-8_19_Chapter.html#Fig24)所示，你需要将鼠标悬停在`Surface`类的引用上，并选择`Import\
    \ Surface (android.view)`选项。\n\n虽然使用`ROTATION_0`和`ROTATION_90`会告诉你Android设备是向左旋转（`ROTATION_90`）还是未旋转，但你还需要添加对另外两个常量的支持：它们会告诉你设备是否向右旋转（`ROTATION_270`）或上下颠倒（`ROTATION_180`），以确保你的`case`语句能100%处理`.getRotation()`方法调用能够返回的每一个结果。\n\
    \n如果你处理了`Surface`类的全部四个常量，就不需要为你的`switch`编程语句添加任何`default`返回语句，因为你将处理100%可能进入语句评估机制的值。现在让我们使用以下Java代码，将最后两个`case`语句添加到你的`switch`结构中，如图[19-25](#A978-1-4302-5786-8_19_Chapter.html#Fig25)所示：\n\
    \n```\ncase(Surface.ROTATION_180):\n  splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag480x800portrait.webm\"\
    );\n  break;\ncase(Surface.ROTATION_270):\n  splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag800x480landscape.webm\"\
    );\n  break;\n```\n\n![A978-1-4302-5786-8_19_Fig25_HTML.jpg](A978-1-4302-5786-8_19_Fig25_HTML.jpg)\n\
    \n图19-25. 将四种屏幕旋转方向全部添加到`switch`语句中，覆盖0、90、180和270度\n\n现在你需要测试代码，看看它是否按照你期望的方式工作！"
