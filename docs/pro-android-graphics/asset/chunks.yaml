    Exporting the 180 pixel imagebutton_normal.png asset to the drawable-mdpi folder


    Once you have everything set correctly, click the Export button and the file will
    be created in your MDPI folder at a proper 180 pixel resolution.


    The next step in your work process is to utilize an Edit ➤ Undo Scale Image menu
    sequence shown in Figure [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22) to undo
    the 2X downsample and return to your XHDPI resolution image. You always want to
    downsample using a high resolution image source, so you get a good result from
    the cubic algorithm.


    ![A978-1-4302-5786-8_9_Fig22_HTML.jpg](A978-1-4302-5786-8_9_Fig22_HTML.jpg)


    Figure 9-22.


    Undoing the Scale Image operation to return to 360 pixel version of the normal
    state for better sampling


    Once you return to the 360 pixel XHDPI source image, you will need to then repeat
    the work process shown in Figures [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18)
    through [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22) for the LDPI 120 pixel
    and the HDPI 240 pixel imagebutton_normal.png image assets. The Scale Image dialogs
    containing the settings for both of these sampling operations are shown in Figure
    [9-23](#A978-1-4302-5786-8_9_Chapter.html#Fig23), just to make sure you set them
    right!


    ![A978-1-4302-5786-8_9_Fig23_HTML.jpg](A978-1-4302-5786-8_9_Fig23_HTML.jpg)


    Figure 9-23.


    Scaling normal state asset to 120 pixels (LDPI) and 240 pixels (HDPI) to create
    normal state assets


    The next steps involve repeating this work process using your other three image
    state assets. These will include the `imagebutton_pressed.png`, `imagebutton_focused.png`,
    and `imagebutton_hovered.png` image assets. These three ImageButton state assets
    need to be downsampled into an LDPI, MDPI and HDPI asset resolution. This can
    be done in any sequence that you wish, as long as it all gets done in the end.


    The first step in doing this remaining downsampling (in addition to those steps
    shown in Figures [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18) through [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22))
    is to completely close out the imagebutton_normal.png 360 pixel asset, without
    saving it into any other (lower) resolution by accident. There are two ways to
    do this; I am going to show you how to be redundant and do both of them, so that
    you’ll always be 100% assured that you do not “blow away” any of your high-resolution
    source assets by accident.


    The first way is to always use your Edit ➤ Undo Scale Image work process, which
    is shown in Figure [9-22](#A978-1-4302-5786-8_9_Chapter.html#Fig22). The second
    is to use the File ➤ Close work process, which is shown in Figure [9-24](#A978-1-4302-5786-8_9_Chapter.html#Fig24),
    and to use the Close without Saving option in the dialog, which is shown on the
    right, even if you do use the Undo Scale Image work process. This will assure
    that the high-resolution asset that you opened at the beginning of the work process
    always remains intact on your hard disk drive, because you Never Save Over It
    !


    ![A978-1-4302-5786-8_9_Fig24_HTML.jpg](A978-1-4302-5786-8_9_Fig24_HTML.jpg)


    Figure 9-24.


    Closing normal image asset without saving over the original data so that you can
    open the next state


    Next let’s use this work process to close the `imagebutton_normal.png` asset and
    open one of the other assets and create the other three DPI resolution assets
    for that ImageButton state by using the work process outlined in Figures [9-18](#A978-1-4302-5786-8_9_Chapter.html#Fig18)
    through [9-24](#A978-1-4302-5786-8_9_Chapter.html#Fig24).


    Once you do this for all four ImageButton states, you should have a pretty good
    handle on the digital image compositing and downsampling work process involved
    in creating a multi-state ImageButton for use in Android application development.


    Once you have created all 16 multi-state ImageButton assets, you can go back into
    Eclipse ADT and see if having all of these smaller ImageButton state image assets
    will give you a smaller ImageButton UI element, or if you have to construct a
    solution to that problem through the use of additional XML parameters.'
