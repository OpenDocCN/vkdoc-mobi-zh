  trans: '

    # 摘要


    在第五章中，我们深入探讨了为何 Android 操作系统要求我们为基于像素的素材提供如此多不同密度版本，并为用户界面设计布局提供不同版本。这是 Android
    图形设计中最繁琐的领域之一，而这一点是由全球种类繁多的 Android 硬件设备类型、型号及消费电子制造商所决定的。正是同一因素使得 Android 对开发者具有吸引力——成千上万种能运行其应用的
    Android 设备——同时也使得 Android 的图形设计部分比大多数人想象的要困难一个数量级。


    我们首先研究了一些 Android 设备的显示特性，例如物理分辨率、像素密度、DPI、DIP、屏幕方向、宽高比等。我们探讨了 Android 中常用的屏幕尺寸限定符常量，包括
    `small`、`normal`、`large` 和 `extra large`。


    接着，我们研究了 Android 中使用的屏幕密度限定符常量，包括 `low` 或 `LDPI`、`medium` 或 `MDPI`、`high` 或 `HDPI`、`extra
    high` 或 `XHDPI`、`extra extra high` 或 `XXHDPI`，以及自 Android 4.3 起最新的 `extra extra
    extra high` 或 `XXXHDPI`。


    你了解到，需要尽可能多地向这些 `/res/drawable-dpi` 文件夹提供基于像素的栅格图像素材，以便在 Android 需要缩放你的数字图像素材时，为其提供尽可能多的可用图像素材。


    随后，我们探讨了 Android 的 `<supports-screens>` 标签，以及它如何允许我们在 `AndroidManifest.xml` 文件中精确指定我们的应用将支持哪些屏幕密度的设备。你了解到，任何未包含在内的屏幕密度显示器都将被排除在外，无法下载和使用你的应用，因此你学会了使用此标签时必须非常小心！


    接下来，我们研究了提供自定义布局的方法，以及 Android 中现在可用的各种屏幕布局配置限定符，例如 `smallestWidth` 或 `sw#dp`
    限定符，以及 `width`（`w#dp`）和 `height`（`h#dp`）配置限定符。你了解了这些限定符的工作原理，它们允许你为可能使用不同布局设计的各种
    Android 设备定义密度范围，从而使开发者能够精确控制应用程序 UI 设计如何适配不同的 Android 设备屏幕。


    我们更深入地研究了针对设备的密度级别，以及屏幕方向和宽高比配置限定符，以便我们能够控制 UI 设计和内容素材如何适配不同的显示屏尺寸、像素密度、宽高比和屏幕方向。


    然后，我们研究了 Android 的 `DisplayMetrics` 类以及如何使用它来获取用户当前设备的显示信息，从而找出特定 Android 硬件设备实际使用的显示特性。


    接下来，你运用了这些新知识，优化了你的 `GraphicsDesign` 应用程序的启动图标。你针对 Android 当前支持的所有五个密度常量文件夹（至少是使用
    Eclipse 中“新建 Android 应用程序”创建过程时 ADT 为其设置文件夹的那些密度常量）进行了此项操作。


    在下一章中，你将学习如何使用 Android 的 `ViewGroup` 子类来设计布局。你将了解从 Android `ViewGroup` 类派生出的不同布局容器，以及如何使用它们来设计能够适配不同类型
    Android 设备的用户界面布局容器。完成这些之后，你就可以准备学习 `View` 子类和用户界面小部件了！


    # 6. Android UI 布局：使用 ViewGroup 类的图形设计


    ## 摘要


    在本第六章中，我们将更深入地探讨 Android 提供的不同类型的屏幕布局容器，以及如何使用它们来容纳我们的应用程序新媒体内容和用户界面设计。这是对第五章内容的合理延续，在第五章中我讨论了为不同屏幕尺寸、形状、方向和密度提供
    UI 布局的问题。


    用户界面布局是通过利用使用 Android `ViewGroup` 超类创建的多个布局子类，在应用程序的 `Activity` 子类中实现的。`ViewGroup`
    设计为可被子类化，而且这一操作已经为我们完成了数十次，提供了自定义的 Android 布局容器类。本章我们将详细探讨其中的几种，因为每种都有其合理的用途和实现方式。


    Android 中的屏幕布局可能有点棘手，不仅因为我们需要为不同的屏幕尺寸、形状、密度和方向设计不同的布局，还因为 Android API 中有几个布局容器类要么已被弃用，要么尚未完全实现。


    这使得关于使用哪些用户界面布局容器以及如何在市场上的 Android 硬件设备上实现它们的决策，成为了开发者需要做出的最重要的前期决策。同时，这可能是你在当前的
    Android 图形设计工作流程中，为你的 Android 应用程序所遇到的最困难的基础性决策之一。


    一个很好的类比可以在数据库设计中找到。如果你前期错误地设计了数据库结构，然后加载了数据，但却遗漏了某些东西，你就必须回过头来从头开始。至少，你将不得不编写代码来读取设计错误的数据库结构，添加缺失的数据结构（和数据），然后写出新的数据库结构。


    正如你的 `Activity` 子类为控制应用程序在屏幕上的活动提供了 Java 基础一样，你的应用程序的 XML 布局容器（`ViewGroup` 子类）则是
    Activity UI 的 XML 基础。

    '
- fmt: '# Android ViewGroup Superclass: A Foundation for Layouts


    Android provides the top-level layout class, `ViewGroup`, for use in creating
    layout container classes. `FrameLayout`, `LinearLayout`, and `RelativeLayout`
    are the three most widely used layout classes, and we will be covering these as
    well as more specialized `ViewGroup` sub-classes throughout this chapter.


    The `ViewGroup` class is part of the `android.view` package, since a `ViewGroup`
    class is itself a sub-class of another superclass called the `View` class.


    The `View` class is another class that is not directly used (constructed or instantiated)
    in your application but is used as a superclass (as a master class template) to
    not only define screen layout containers, such as `ViewGroup` and its subclasses,
    but also to define the many Android user interface widgets that are contained
    inside these layout containers.


    We will be covering `View` and its widget-related subclasses over the next few
    chapters as well, as it is important to Android development. However, before we
    can cover `View` (widgets) you must master the layout container that holds these
    UI widgets in place (layouts), and that’s exactly why I am spending the next couple
    of chapters delving deeply into `ViewGroups` and specialized layouts.


    `ViewGroup` is not used directly in applications, but its many subclasses certainly
    are, so we are going to cover the major ones in detail next.


    We are not going to focus on the `ViewGroup` class as a master class a whole lot
    here, but it’s important to realize that you could create your own custom subclasses
    if you wanted to; however, that has essentially already been done for you, as
    you will see in this chapter.


    Since what I am trying to do with this book is sling-shot you way ahead in your
    knowledge of Pro Android Graphics, we’re going to focus on covering how to implement
    the existing layout classes (existing `ViewGroup` subclasses), which are the most
    commonly used and are implemented by other developers.


    After we cover those primary `ViewGroup` subclasses, which are already coded for
    you and are available for your development use, chances are good that you will
    probably decide to simply utilize one of those for the UI layout.


    In the next couple of sections, we will cover the primary `ViewGroup` layout parameters
    and constants as well as which of the many `ViewGroup` sub-classes are deprecated
    (discontinued and will be removed at some point in time) and experimental (not
    fully implemented and may be removed at some point in time). If you want to research
    `ViewGroup` even further, you will find a summary page on the Android Developer
    web site at the following URL:


    [`http://developer.android.com/reference/android/view/ViewGroup.html`](http://developer.android.com/reference/android/view/ViewGroup.html)


    In deference to the reader, we will focus on those layout container classes that
    are here to stay and widely used, and that currently provide layout functionality
    which, when used optimally, provides a good user experience.


    ## The ViewGroup LayoutParams Class: Layout Parameters


    There are two different types of layout parameters for the `ViewGroup` class that
    span across all of its many subclasses. These are termed base layout parameters,
    and there are constants in Android to use for each of these.


    The first one expands the UI layout container so that it fills the screen (the
    parent) above it in that dimension (width or height). We have already utilized
    the parameter constant `MATCH_PARENT` before in our GraphicsDesign application
    development. You may also use this as lower-case `match_parent`.


    It is important to note that prior to Android 2.2 API Level 8 (Froyo) this was
    called `FILL_PARENT`; however, I suggest using `MATCH_PARENT`, since most current
    devices are Android 2.3.3 (Gingerbread) or later anyway. In fact, only 5% of the
    market currently is comprised of pre-Android 2.2 devices!


    If you want to see the current market share percentages for the different API
    Levels, you can find them at the Android Dashboards web page:


    [`http://developer.android.com/about/dashboards/index.html`](http://developer.android.com/about/dashboards/index.html)


    The other layout parameter constant does the exact opposite of the `match_parent`
    parameter constant, and contracts to fit around the content, which is inside the
    layout container in that width or height dimension. This constant is called `wrap_content`
    and it is aptly named as it can wrap itself around your content. It is important
    to note that since Android provides these constants for both the X (width) and
    Y (height) dimensions, they can be used together, as you’ll be seeing later on
    in this book.


    For example, if you wanted your `Button` UI element to span across a parent layout
    container, you would code the `android:layout_width="match_parent"` parameter,
    and then use `android:layout_height="wrap_content"` so the height of the button
    would then conform to the `Button`’s (text label) content, and the width would
    then be defined by the entire UI layout container’s width.


    Since, as you know from the last chapter, you want your UI to scale to fit different
    display screens, these parameters are a good place to start to achieve this objective.
    Mastering these parameters makes the UI development easier, more accurate, more
    flexible, more elegant, and ultimately more powerful.


    You can also provide an exact number for the `layout_width` or `layout_height`
    parameters, but in light of what you read in [Chapter 5](#A978-1-4302-5786-8_5_Chapter.html)
    and the deprecation of `AbsoluteLayout` containers, I suggest you do not use these
    “hard-coded” values unless you’re delivering your application to one specific
    “captive” hardware device.


    It is important to note there are subclasses of `LayoutParams` for different subclasses
    of `ViewGroup`. For example, the deprecated `AbsoluteLayout` class has its own
    subclass of `LayoutParams`, which adds in an X and Y value.


    If you wish to review the Android `LayoutParams` class further, you can find it
    located at the following Android Developer web site URL:


    [`http://developer.android.com/reference/android/view/ViewGroup.LayoutParams.html`](http://developer.android.com/reference/android/view/ViewGroup.LayoutParams.html)


    Next, we’ll take a quick look at the layout classes that we are not going to cover
    (in detail) or code with in this book. This is because they have either been discontinued
    for use (deprecated) or are not fully implemented (i.e. they are experimental)
    in the API as yet.'
