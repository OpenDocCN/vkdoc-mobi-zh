- fmt: '# Summary


    In this fifth chapter, we took a close look at why the Android OS requires us
    to provide so many different density versions of our pixel-based assets as well
    as different versions of our user interface design layouts. This is one of the
    most tedious areas in Android graphics design, and it is necessitated by the plethora
    of Android hardware device types, models, and consumer electronics manufacturers
    located around the world. The same thing that makes Android attractive for developers—the
    thousands of different Android devices that can run their apps—is also what makes
    the graphics design part of Android an order of magnitude more difficult that
    what most people would assume that it would be.


    We first took a look at some Android device display characteristics, such as physical
    resolution, pixel density, DPI, DIP, orientation, aspect ratio, and so on. We
    looked at the common screen size qualifier constants used in Android, which include
    `small`, `normal`, `large`, and `extra large`.


    Next we looked at the screen density qualifier constants used in Android, including
    `low` or `LDPI`, `medium` or `MDPI`, `high` or `HDPI`, `extra high` or `XHDPI`,
    `extra extra high` or `XXHDPI`, and the newest as of Android 4.3, `extra extra
    extra high`, or `XXXHDPI`.


    You learned that you need to provide pixel-based raster image assets across as
    many of these `/res/drawable-dpi` folders as possible to give Android the most
    image assets possible to use in case Android needs to scale your digital image
    assets.


    Then we looked at the Android `<supports-screens>` tag, and how it allows us to
    specify in our `AndroidManifest.xml` file exactly which screen density devices
    our applications are going to support. You learned that any screen density display
    not included will be excluded from being able to download and use your app, so
    you learned to be very careful about using this tag!


    Next, we looked at providing custom layouts, and the various screen layout configuration
    qualifiers that are now available in Android, such as the `smallestWidth`, or
    `sw#dp` qualifier, and the `width` (`w#dp`) and `height` (`h#dp`) configuration
    qualifiers. You learned just how these qualifiers work in allowing you to define
    density ranges across different Android devices that might be using different
    layout designs, allowing developers to control exactly how an application UI design
    is going to span across different Android device screens.


    We looked more closely at device-optimized density levels, and orientation and
    aspect ratio configuration qualifiers, so that we can control how our UI designs
    and content assets can span different display screen sizes, pixel densities, aspect
    ratios, and screen orientations.


    Then we looked at the Android `DisplayMetrics` class and how to use it to be able
    to poll our user’s current device display in order to find out which device display
    characteristics are actually being used with any particular Android hardware device.


    Next, you put some of this new knowledge to use, and optimized the launcher icon
    for your `GraphicsDesign` application. You did this across all five of the density
    constant folders currently supported in Android, or at least the density constants
    that ADT sets up folders for when you use the `New Android Application` creation
    process in Eclipse.


    In the next chapter, you will learn how to design layouts in Android using the
    Android `ViewGroup` subclasses. You will learn about the different layout containers
    that are derived from the Android `ViewGroup` class, and how to use them in order
    to design user interface layout containers that span across different types of
    Android devices. After you do that, you’ll be ready to learn about the `View`
    subclasses and user interface widgets!


    # 6. Android UI Layouts: Graphics Design Using the ViewGroup Class


    ## Abstract


    In this sixth chapter, we will take a closer look at the different types of screen
    layout containers that Android offers, and how they can be used to hold our application
    new media content and user interface designs. This is a logical follow-on to Chapter
    5, where I discussed providing UI layouts for different screen sizes, shapes,
    orientations, and densities.


    User interface layouts are implemented in application `Activity` subclasses by
    leveraging a number of layout subclasses created using the Android `ViewGroup`
    superclass. `ViewGroup` is designed to be subclassed, and that has been done for
    us dozens of times already, providing custom Android layout container classes.
    We will be taking a look at several of these in detail in this chapter, as each
    has a logical use and implementation.


    Screen layouts in Android can be a bit tricky, not only because we need to design
    different layouts for different screen sizes, shapes, densities, and orientations,
    but also because there are several layout container classes in Android’s API that
    are either deprecated, or not yet fully implemented.


    This makes decisions regarding which user interface layout containers to use,
    and how to implement them across Android hardware devices in the market, the most
    important up-front decisions that you will make as a developer. At the same time,
    this is one of the most difficult foundational decisions for your Android application
    that you are likely to encounter in your Android Graphics Design work process
    currently.


    A good analogy can be found in Database design. If you design your database structure
    incorrectly upfront, and then load data into it, but you forget something, you
    will have to go back and start over from scratch. At the very least, you will
    have to write code to read the incorrectly-designed database structure, add in
    the missing data structure (and data), and then write out the new database structure.


    Just as your `Activity` subclass provides a Java foundation for controlling your
    application’s activities on the screen, your application’s XML layout container
    (`ViewGroup` subclass) is the XML foundation for the Activity UI.'
