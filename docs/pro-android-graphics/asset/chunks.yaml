  raw: '## Summary


    In this thirteenth chapter, you learned about using digital image transitions
    in Android via the `TransitionDrawable` class.


    We started out looking at some of the core concepts of how transitions are used
    to simulate animation for digital new media applications, and how the transition
    effect is closely related to layer-based compositing pipelines.


    Since we covered image compositing, layers, and blending in the past couple of
    chapters, this TransitionDrawable chapter was a good way to segue into the frame
    animation and vector (procedural) animation chapters coming next, which cover
    more advanced types of 2D animation, such as using more than two image assets
    to create a 2D animation effect that goes beyond basic image crossfading.


    Next, we took a look at the TransitionDrawable class and how it is closely related
    to the LayerDrawable class, which was covered in the previous chapter. We looked
    at the TransitionDrawable class `.startTransition( )` Java method call as well
    as the `.resetTransition( )` Java method call.


    Next, we looked at the root element `<transition>` parent XML tag as well as its
    child `<item>` tag. Then you learned how to define the TransitionDrawable object
    using an XML definition file, and you defined your own TransitionDrawable object
    using the `trans_contents.xml` file to define source and destination image layers.
    You named these layers and assigned image assets to them, which you later referenced,
    loaded, and used in your TransitionDrawable Java code.


    Next, you opened your Activity Java code and implemented TransitionDrawable objects
    and event handler code for your multi-state ImageButton UI element. You learned
    how to instantiate the TransitionDrawable object and load it with Drawable asset
    data using the .getResources( ) and .getDrawable( ) methods. You used a 9-patch
    image asset to make sure 9-patch assets worked inside the TransitionDrawable class
    framework, and you also tried using normal assets.


    Then you tried using the alternate `.reverseTransition( )` method call for the
    TransitionDrawable class, which allowed you to “pong” back and forth between source
    and destination image blending transitions.


    You tested your code in many different ways and wired it up different ways in
    order to ascertain exactly what was happening in the image blend transitions and
    rendering pipeline. Then you got really advanced and went into your ImageView
    and implemented both the foreground and the background image plates so that you
    could use three image assets, two of them using alpha channels, with the TransitionDrawable
    object. It worked just fine.


    In the next chapter, you will learn how to use Frame Animation in Android OS and
    how to use the `AnimationDrawable` class in Android. This will allow you to take
    your Android digital-image-based animation graphics design and special effects
    work to a higher level via digital image animation.


    # 14. Frame-Based Animation: Using the AnimationDrawable Class


    Abstract


    In this fourteenth chapter, we will take a closer look at the Java coding side
    of implementing frame animation in Android. We looked at the concepts behind frame-based
    animation and how to set up frame animation using the XML definition file work
    process back in Chapter 3, because I thought you should be able to at least get
    basic animation running in your application early on in the game (in this book).


    In this fourteenth chapter, we will take a closer look at the Java coding side
    of implementing frame animation in Android. We looked at the concepts behind frame-based
    animation and how to set up frame animation using the XML definition file work
    process back in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html), because I thought
    you should be able to at least get basic animation running in your application
    early on in the game (in this book).


    The task we’re going to focus on in this chapter is how to implement frame animation
    using only Java code, and zero XML, which is a bit more advanced than the way
    that we implemented frame animation for an application splash screen back in [Chapter
    3](#A978-1-4302-5786-8_3_Chapter.html), as Java coding is generally far more complicated
    structurally than XML markup is ever going to be.


    Doing everything with Java methods will allow you to see how the methods available
    in the `AnimationDrawable` class, which is the frame animation class for the Android
    OS, function via the Java side of your Android application code. In this way,
    if you want to add other Java code functionality inside or around this frame animation
    code, everything that you are doing using your frame animation processing pipeline
    will be implemented with the Java programming language.


    One of the reasons I am doing this is because if you Google topics such as frame
    animation, procedural animation, transitions, and similar graphics-related Android
    topics, invariably one of the prominent developer requests always seems to be
    the “how can I implement this using only Java code and no XML” request. We are
    going to do that here.


    ## The AnimationDrawable Class: A Frame Animation Engine


    An Android `AnimationDrawable` class is an indirect subclass of the `Drawable`
    class, which is a direct subclass of the `java.lang.Object` master class. The
    AnimationDrawable is a direct subclass of a `DrawableContainer` class, which is
    a direct subclass of the Android Drawable class. The AnimationDrawable Android
    Java class hierarchy is thus structured as follows:


    `java.lang.Object`


      `> android.graphics.drawable.Drawable`


        `> android.graphics.drawable.DrawableContainer`


          `> android.graphics.drawable.AnimationDrawable`


    As a Drawable subclass, the AnimationDrawable class thus implements all of the
    features of the Drawable and DrawableContainer class, which you will be learning
    more about soon.


    The AnimationDrawable class implements some additional frame animation features,
    such as the frame asset definition, a looping parameter, and frame display duration.
    These are needed to implement frame animation and are specific to this AnimationDrawable
    class, as would be expected.


    An AnimationDrawable class is also a part of the `android.graphics.drawable` package.
    Since this is the case, its import statement thus references the `android.graphics.drawable.AnimationDrawable`
    package import path, as you will see later on in this chapter when you write your
    Java application to implement an AnimationDrawable object for use with your digital
    image animation for your splash screen animation programming objectives.


    An AnimationDrawable object is instantiated in order to create individual frame-by-frame
    animation, commonly referred to as frame animation and also sometimes termed bitmap
    animation or raster animation.


    An AnimationDrawable object will always be defined by a series of Drawable objects,
    which can then be used as the View object background image plate, or as a foreground
    (source) image plate in View or ViewGroup type objects.


    Whichever View (ViewGroup) image container you leverage, remember that you can
    use alpha channels in your image assets. If you take advantage of this, you will
    be able to composite your animation, both within the View object that it is contained
    within and the parent View objects that your View is contained within. This goes
    for ViewGroup layout containers as well.


    As you learned in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html), the simple
    way to create frame animation is to define the animation in an XML file using
    the <animation-list> parent tag, or root element. Once that is completed, you
    can then place that animation XML definition, which becomes a Drawable asset for
    your application, into your project `/res/drawable` folder and set it as the background,
    or even a source image asset, for one of your View objects. To trigger the animation,
    you call a `.start( )` method to run the animation. Let’s do all of this using
    Java!'
  trans: "\n# 小结\n\n在第十三章中，你学习了如何在安卓系统中通过`TransitionDrawable`类使用数字图像过渡效果。\n\n我们首先探讨了过渡效果如何用于模拟数字新媒体应用中的动画这一核心概念，以及过渡效果与基于图层的合成流水线之间的密切联系。\n\
    \n由于在前几章中我们已经介绍了图像合成、图层和混合等内容，本章关于`TransitionDrawable`的内容恰好为接下来将要学习的帧动画和矢量（程序化）动画章节做好了铺垫。这些后续章节将涵盖更高级的\
    \ 2D 动画类型，例如使用超过两个图像资源来创建超越基本图像淡入淡出效果的 2D 动画。\n\n接着，我们深入了解了`TransitionDrawable`类及其与上一章介绍的`LayerDrawable`类之间的紧密关系。我们学习了`TransitionDrawable`类的`.startTransition()`和`.resetTransition()`这两个\
    \ Java 方法调用。\n\n随后，我们研究了根元素`<transition>`父级 XML 标签及其子标签`<item>`。然后你学会了如何使用 XML\
    \ 定义文件来定义`TransitionDrawable`对象，并使用`trans_contents.xml`文件定义了你自己的`TransitionDrawable`对象，指定了源图像层和目标图像层。你为这些层命名并分配了图像资源，之后在你的`TransitionDrawable`\
    \ Java 代码中引用了这些资源并进行加载和使用。\n\n接着，你打开了 Activity 的 Java 代码，为你的多状态`ImageButton` UI\
    \ 元素实现了`TransitionDrawable`对象和事件处理代码。你学习了如何实例化`TransitionDrawable`对象，并使用`.getResources()`和`.getDrawable()`方法加载`Drawable`资源数据。你使用了一个九宫格（9-patch）图像资源来确保其在`TransitionDrawable`类框架内正常工作，同时也尝试了使用普通图像资源。\n\
    \n然后，你尝试使用`TransitionDrawable`类的另一种方法调用`.reverseTransition()`，这使你能够在源图像和目标图像的混合过渡之间来回“反弹”。\n\
    \n你以多种不同方式测试了代码并以不同方式进行了连接，以确定图像混合过渡和渲染流水线中究竟发生了什么。接着，你进行了更高级的操作，进入`ImageView`，同时实现了前景图像层和背景图像层，这样你就可以结合`TransitionDrawable`对象使用三个图像资源，其中两个资源带有\
    \ Alpha 通道。这种方法运行良好。\n\n在下一章中，你将学习如何在安卓操作系统中使用帧动画以及如何使用`AnimationDrawable`类。这将使你能够通过数字图像动画将你的安卓数字图像动画图形设计和特效工作提升到一个更高的水平。\n\
    \n# 基于帧的动画：使用 AnimationDrawable 类\n\n## 摘要\n\n在第十四章中，我们将更深入地了解在安卓中实现帧动画的 Java\
    \ 编码方面。我们在第三章中已经探讨了基于帧的动画背后的概念，以及如何使用 XML 定义文件工作流程来设置帧动画，因为我认为你应该能够在本书的早期阶段就让基本动画在你的应用中运行起来。\n\
    \n在第十四章中，我们将更深入地了解在安卓中实现帧动画的 Java 编码方面。我们在第三章中已经探讨了基于帧的动画背后的概念，以及如何使用 XML 定义文件工作流程来设置帧动画，因为我认为你应该能够在本书的早期阶段就让基本动画在你的应用中运行起来。\n\
    \n我们本章重点要完成的任务是如何只使用 Java 代码（不使用任何 XML）来实现帧动画，这比我们在第三章中为应用启动画面实现帧动画的方式要更高级一些，因为\
    \ Java 编码在结构上通常比 XML 标记要复杂得多。\n\n使用 Java 方法完成所有操作，将让你能够了解`AnimationDrawable`类（即安卓操作系统的帧动画类）中可用的方法如何通过你的安卓应用程序代码的\
    \ Java 端来运作。这样，如果你想在这段帧动画代码内部或周围添加其他 Java 代码功能，那么你在帧动画处理流水线中所做的一切都将使用 Java 编程语言来实现。\n\
    \n我这样做的一个原因是，如果你用谷歌搜索诸如帧动画、程序化动画、过渡效果以及类似的安卓图形相关主题，开发者提出的常见需求之一似乎总是“如何仅使用 Java\
    \ 代码而不使用 XML 来实现这个功能”。我们接下来就要做这件事。\n\n## AnimationDrawable 类：帧动画引擎\n\n安卓的`AnimationDrawable`类是`Drawable`类的一个间接子类，而`Drawable`类又是`java.lang.Object`主类的一个直接子类。`AnimationDrawable`类是`DrawableContainer`类的一个直接子类，而`DrawableContainer`类又是安卓`Drawable`类的一个直接子类。因此，`AnimationDrawable`这个安卓\
    \ Java 类的层次结构如下：\n\n```\njava.lang.Object\n  > android.graphics.drawable.Drawable\n\
    \    > android.graphics.drawable.DrawableContainer\n      > android.graphics.drawable.AnimationDrawable\n\
    ```\n\n因此，作为`Drawable`的子类，`AnimationDrawable`类实现了`Drawable`和`DrawableContainer`类的所有特性，你很快就会学到更多相关内容。\n\
    \n`AnimationDrawable`类还实现了一些额外的帧动画特性，例如帧资源定义、循环参数和帧显示持续时间。这些特性是实现帧动画所必需的，并且正如预期的那样，是`AnimationDrawable`类所特有的。\n\
    \n`AnimationDrawable`类也是`android.graphics.drawable`包的一部分。正因如此，其导入语句引用了`android.graphics.drawable.AnimationDrawable`包导入路径，你将在本章后续编写\
    \ Java 应用以实现`AnimationDrawable`对象用于数字图像动画（以实现启动画面动画编程目标）时看到这一点。\n\n实例化`AnimationDrawable`对象是为了创建逐帧动画，通常称为帧动画，有时也称为位图动画或光栅动画。\n\
    \n一个`AnimationDrawable`对象总是由一系列`Drawable`对象定义，这些`Drawable`对象可以用作`View`对象的背景图像层，或用作`View`或`ViewGroup`类型对象中的前景（源）图像层。\n\
    \n无论你使用哪个`View`（`ViewGroup`）图像容器，请记住你可以在图像资源中使用 Alpha 通道。如果利用这一点，你将能够在包含该动画的`View`对象内部以及包含该`View`的父级`View`对象内部对动画进行合成。这对于`ViewGroup`布局容器也同样适用。\n\
    \n正如你在第三章中学到的，创建帧动画的简单方法是使用`<animation-list>`父标签或根元素在 XML 文件中定义动画。完成后，你可以将这个动画\
    \ XML 定义（它将变成你的应用的一个`Drawable`资源）放入项目的`/res/drawable`文件夹中，并将其设置为某个`View`对象的背景或甚至源图像资源。要触发动画，你可以调用`.start()`方法来运行动画。现在，让我们用\
    \ Java 来完成所有这一切！\n"
- fmt: "## The DrawableContainer Class: A Multi-Drawable Drawable\n\nAs the `AnimationDrawable`\
    \ class is a direct subclass of the `DrawableContainer` class, and thus inherits\
    \ all of its functionality, I’m going to spend some time covering this class as\
    \ well, before you start writing code to implement frame animation using only\
    \ the Java programming language.\n\nThe Android `DrawableContainer` class is a\
    \ direct subclass of the `Drawable` class, which is a direct subclass of the `java.lang.Object`\
    \ master class. Android’s `DrawableContainer` class is part of the `android.graphics.drawable`\
    \ package. Note that you would never use it in an Import statement, as it is a\
    \ class that is designed to be used to create other subclasses that are imported.\
    \ A `DrawableContainer` class hierarchy is structured as follows:\n\n```\njava.lang.Object\n\
    \  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.DrawableContainer\n\
    ```\n\nAs a `Drawable` subclass, this `DrawableContainer` class implements all\
    \ of the features of the `Drawable` class, which you’ll be learning about in detail\
    \ in a future chapter, once you get done learning about all of its subclasses!\n\
    \nThere are three direct subclasses of `DrawableContainer` in Android OS. They\
    \ are the `AnimationDrawable` class, which we’re covering in this chapter, as\
    \ well as the `LevelListDrawable` class and the `StateListDrawable` class.\n\n\
    The `LevelListDrawable` class was created to allow developers to be able to manage\
    \ a number of different `Drawable` objects. Each is assigned a maximum and a minimum\
    \ numerical value in the XML definition file using parameters called `android:maxLevel`\
    \ and `android:minLevel`. To then change your `Drawable` based on those levels\
    \ you have set, use the `public boolean .onLevelChange()` method, which will return\
    \ a `true` value if, when called, the `Drawable` is in fact changed. An example\
    \ of a `LevelListDrawable` would be the battery level indicator used in the Android\
    \ OS to visualize hardware power remaining.\n\nThe `StateListDrawable` class allows\
    \ you to assign any number of images to a single `Drawable`, and later swap out\
    \ the visible item by referencing string ID values. A `StateListDrawable` object\
    \ is defined by using an XML file with a `<selector>` parent tag. A `StateListDrawable`\
    \ child `Drawable` object is then defined using nested `<item>` elements. The\
    \ `StateListDrawable` class features more XML parameters, most of which are `android:state_`\
    \ parameters, such as `state_active`, `state_activated`, `state_checked`, `state_checkable`,\
    \ `state_last`, `state_first`, `state_middle`, `state_focused`, `state_pressed`,\
    \ and many others.\n\n`DrawableContainer` is essentially what Android terms a\
    \ “helper” class. This class was created to contain several `Drawable` objects\
    \ and to then be able to easily select which one to use. The class was not meant\
    \ to be used directly; however, you can subclass it in order to create your own\
    \ classes, or you can use one its child classes, which are already coded for you,\
    \ simply by using your handy Import statement at the top of your class.\n\n##\
    \ Creating Your `AnimationDrawable` Splashscreen Using Java\n\nOver the next two\
    \ chapters you are going to completely replace the XML-generated animation currently\
    \ used on your `MainActivity.java` Activity subclass splash screen with an identical\
    \ Java-generated animation, so you can see exactly how to do the same frame and\
    \ procedural animation programming, but using only Java code and zero XML definition\
    \ files.\n\nFire up Eclipse and right-click your `MainActivity.java` file to open\
    \ it, and then delete the Import statements for the `ImageView` (you’ll add these\
    \ back soon as part of the new workflow) as well as the `AnimationDrawable` and\
    \ the `Animation` and `AnimationUtils` classes.\n\nNext, delete all code statements\
    \ in the class except for the core `onCreate()` statements that Eclipse created\
    \ for you back in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html); you can leave\
    \ your `onCreateOptionsMenu()` and `onOptionsItemSelected()` methods so you can\
    \ continue to access (test) your other application’s Activity subclasses.\n\n\
    Now you have a blank slate, at least as far as your splash screen is concerned,\
    \ and you can re-create it all using Java code in the frame animation chapter\
    \ and the next chapter on procedural animation (the `Animation` class).\n\nThe\
    \ first thing that you want to do is declare your `AnimationDrawable` object for\
    \ use at the top of the `MainActivity` class and name it something logical like\
    \ `frameAnimation`, as shown in Figure [14-1](#A978-1-4302-5786-8_14_Chapter.html#Fig1).\n\
    \n![A978-1-4302-5786-8_14_Fig1_HTML.jpg](A978-1-4302-5786-8_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1.\n\nInstantiating an `AnimationDrawable` object and naming it `frameAnimation`\
    \ at the top of the `MainActivity.java` class\n\nYou do this using the following\
    \ basic object-declaring Java statement:\n\n```\nAnimationDrawable frameAnimation;\n\
    ```\n\nNext, you need to create a class called `animStarter` that implements `Runnable`;\
    \ inside of that, you will code a `run()` method that will contain your `.start()`\
    \ method, which you will need to call off your `frameAnimation` object in order\
    \ to start your `frameAnimation` `AnimationDrawable` object.\n\nLet’s learn more\
    \ about the `Runnable` class first, and then write this code."
  raw: '## The DrawableContainer Class: A Multi-Drawable Drawable


    As the AnimationDrawable class is a direct subclass of the `DrawableContainer`
    class, and thus inherits all of its functionality, I’m going to spend some time
    covering this class as well, before you start writing code to implement frame
    animation using only the Java programming language.


    The Android DrawableContainer class is a direct subclass of the `Drawable` class,
    which is a direct subclass of the `java.lang.Object` master class. Android’s DrawableContainer
    class is part of the `android.graphics.drawable` package. Note that you would
    never use it in an Import statement, as it is a class that is designed to be used
    to create other subclasses that are imported. A DrawableContainer class hierarchy
    is structured as follows:


    `java.lang.Object`


      `> android.graphics.drawable.Drawable`


        `> android.graphics.drawable.DrawableContainer`


    As a Drawable subclass, this DrawableContainer class implements all of the features
    of the Drawable class, which you’ll be learning about in detail in a future chapter,
    once you get done learning about all of its subclasses!


    There are three direct subclasses of DrawableContainer in Android OS. They are
    the `AnimationDrawable` class, which we’re covering in this chapter, as well as
    the `LevelListDrawable` class and the `StateListDrawable` class.


    The LevelListDrawable class was created to allow developers to be able to manage
    a number of different Drawable objects. Each is assigned a maximum and a minimum
    numerical value in the XML definition file using parameters called `android:maxLevel`
    and `android:minLevel`. To then change your Drawable based on those levels you
    have set, use the `public boolean .onLevelChange( )` method, which will return
    a `true` value if, when called, the Drawable is in fact changed. An example of
    a LevelListDrawable would be the battery level indicator used in the Android OS
    to visualize hardware power remaining.


    The StateListDrawable class allows you to assign any number of images to a single
    Drawable, and later swap out the visible item by referencing string ID values.
    A StateListDrawable object is defined by using an XML file with a `<selector>`
    parent tag. A StateListDrawable child Drawable object is then defined using nested
    `<item>` elements. The StateListDrawable class features more XML parameters, most
    of which are `android:state_` parameters, such as `state_active`, `state_activated`,
    `state_checked`, `state_checkable`, `state_last`, `state_first`, `state_middle`,
    `state_focused`, `state_pressed`, and many others.


    DrawableContainer is essentially what Android terms a “helper” class. This class
    was created to contain several Drawable objects and to then be able to easily
    select which one to use. The class was not meant to be used directly; however,
    you can subclass it in order to create your own classes, or you can use one its
    child classes, which are already coded for you, simply by using your handy Import
    statement at the top of your class.


    ## Creating Your AnimationDrawable Splashscreen Using Java


    Over the next two chapters you are going to completely replace the XML-generated
    animation currently used on your MainActivity.java Activity subclass splash screen
    with an identical Java-generated animation, so you can see exactly how to do the
    same frame and procedural animation programming, but using only Java code and
    zero XML definition files.


    Fire up Eclipse and right-click your MainActivity.java file to open it, and then
    delete the Import statements for the ImageView (you’ll add these back soon as
    part of the new workflow) as well as the AnimationDrawable and the Animation and
    AnimationUtils classes.


    Next, delete all code statements in the class except for the core `onCreate( )`
    statements that Eclipse created for you back in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html);
    you can leave your `onCreateOptionsMenu( )` and `onOptionsItemSelected( )` methods
    so you can continue to access (test) your other application’s Activity subclasses.


    Now you have a blank slate, at least as far as your splash screen is concerned,
    and you can re-create it all using Java code in the frame animation chapter and
    the next chapter on procedural animation (the `Animation` class).


    The first thing that you want to do is declare your `AnimationDrawable` object
    for use at the top of the MainActivity class and name it something logical like
    `frameAnimation`, as shown in Figure [14-1](#A978-1-4302-5786-8_14_Chapter.html#Fig1).


    ![A978-1-4302-5786-8_14_Fig1_HTML.jpg](A978-1-4302-5786-8_14_Fig1_HTML.jpg)


    Figure 14-1.


    Instantiating an AnimationDrawable object and naming it frameAnimation at the
    top of the MainActivity.java class


    You do this using the following basic object-declaring Java statement:


    `AnimationDrawable frameAnimation;`


    Next, you need to create a class called `animStarter` that implements `Runnable`
    ; inside of that, you will code a `run( )` method that will contain your `.start(
    )` method, which you will need to call off your `frameAnimation` object in order
    to start your frameAnimation AnimationDrawable object.


    Let’s learn more about the Runnable class first, and then write this code.'
  trans: "\n## DrawableContainer 类：一个可包含多个 Drawable 的 Drawable\n\n由于 `AnimationDrawable`\
    \ 类是 `DrawableContainer` 类的直接子类，并因此继承了其所有功能，在开始编写仅使用 Java 编程语言实现帧动画的代码之前，我将花一些时间来介绍这个类。\n\
    \nAndroid 的 `DrawableContainer` 类是 `Drawable` 类的直接子类，而 `Drawable` 类又是 `java.lang.Object`\
    \ 主类的直接子类。Android 的 `DrawableContainer` 类属于 `android.graphics.drawable` 包。请注意，你永远不会在\
    \ Import 语句中使用它，因为它被设计用于创建其他可导入的子类。`DrawableContainer` 类的层级结构如下所示：\n\n```\njava.lang.Object\n\
    \  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.DrawableContainer\n\
    ```\n\n作为 `Drawable` 的子类，`DrawableContainer` 类实现了 `Drawable` 类的所有特性。在你学完其所有子类后，将在未来的一章中详细了解这些特性。\n\
    \n在 Android 操作系统中，`DrawableContainer` 有三个直接子类。它们是本章将要介绍的 `AnimationDrawable` 类，以及\
    \ `LevelListDrawable` 类和 `StateListDrawable` 类。\n\n`LevelListDrawable` 类旨在让开发者能够管理多个不同的\
    \ `Drawable` 对象。每个对象在 XML 定义文件中使用名为 `android:maxLevel` 和 `android:minLevel` 的参数分配一个最大值和一个最小值。然后，要根据你设置的这些级别更改\
    \ `Drawable`，请使用 `public boolean .onLevelChange()` 方法。如果调用该方法时 `Drawable` 确实发生了更改，它将返回\
    \ `true` 值。`LevelListDrawable` 的一个示例是 Android 操作系统中用于可视化硬件剩余电量的电池电量指示器。\n\n`StateListDrawable`\
    \ 类允许你为单个 `Drawable` 分配任意数量的图像，之后通过引用字符串 ID 值来切换可见项。`StateListDrawable` 对象通过使用带有\
    \ `<selector>` 父标签的 XML 文件来定义。然后，使用嵌套的 `<item>` 元素来定义 `StateListDrawable` 的子 `Drawable`\
    \ 对象。`StateListDrawable` 类拥有更多 XML 参数，其中大部分是 `android:state_` 参数，例如 `state_active`、`state_activated`、`state_checked`、`state_checkable`、`state_last`、`state_first`、`state_middle`、`state_focused`、`state_pressed`\
    \ 等等。\n\n`DrawableContainer` 本质上是 Android 所谓的“辅助”类。创建这个类是为了包含多个 `Drawable` 对象，并且能够轻松选择要使用哪一个。这个类并不旨在被直接使用；不过，你可以继承它以创建自己的类，或者你可以使用其已为你编码好的子类之一，只需在类的顶部使用方便的\
    \ Import 语句即可。\n\n## 使用 Java 创建你的 `AnimationDrawable` 闪屏\n\n在接下来的两章中，你将完全替换当前在\
    \ `MainActivity.java` Activity 子类闪屏上使用的由 XML 生成的动画，改用完全相同的由 Java 生成的动画。这样你就能确切地了解如何仅使用\
    \ Java 代码且无需任何 XML 定义文件来进行相同的帧动画和过程动画编程。\n\n启动 Eclipse，右键单击你的 `MainActivity.java`\
    \ 文件将其打开，然后删除 `ImageView` 的 Import 语句（你很快会将其作为新工作流程的一部分重新添加回来），以及 `AnimationDrawable`、`Animation`\
    \ 和 `AnimationUtils` 类的 Import 语句。\n\n接下来，删除类中除了 Eclipse 在第 2 章为你创建的核心 `onCreate()`\
    \ 语句之外的所有代码语句；你可以保留 `onCreateOptionsMenu()` 和 `onOptionsItemSelected()` 方法，这样你就能继续访问（测试）应用的其他\
    \ Activity 子类。\n\n现在你拥有了一块空白画布，至少对于你的闪屏来说是这样。你可以在帧动画章节和下一章关于过程动画（`Animation` 类）的内容中，全部使用\
    \ Java 代码重新创建它。\n\n你要做的第一件事是在 `MainActivity` 类的顶部声明你的 `AnimationDrawable` 对象，并给它起一个逻辑名称，比如\
    \ `frameAnimation`，如图 14-1 所示。\n\n![A978-1-4302-5786-8_14_Fig1_HTML.jpg](img/A978-1-4302-5786-8_14_Fig1_HTML.jpg)\n\
    \n图 14-1.\n\n在 `MainActivity.java` 类的顶部实例化一个 `AnimationDrawable` 对象并将其命名为 `frameAnimation`\n\
    \n你使用以下基本的对象声明 Java 语句来实现这一点：\n\n```\nAnimationDrawable frameAnimation;\n```\n\
    \n接下来，你需要创建一个名为 `animStarter` 的类，它实现 `Runnable` 接口；在该类内部，你将编写一个 `run()` 方法，其中包含\
    \ `.start()` 方法。你需要通过你的 `frameAnimation` 对象调用该方法，以启动你的 `frameAnimation` `AnimationDrawable`\
    \ 对象。\n\n让我们先进一步了解 `Runnable` 类，然后再编写这段代码。\n"
- fmt: "# Using the Android Runnable Class to Run Your Animation\n\nYou are going\
    \ to utilize the Java `Runnable` public interface, and its `run()` method to run\
    \ your `AnimationDrawable` in a separate thread, so that it can process the `Drawable`\
    \ (`BitmapDrawable` frames in this case) asynchronously.\n\nThis Java `Runnable`\
    \ interface is not a direct subclass (or even a class at all, for that matter,\
    \ it is an interface) of your `java.lang.Object` master class; I guess there is\
    \ a first time for everything!\n\n`Runnable` is actually on the same `java.lang`\
    \ level as `Object`, and thus would be referenced as the `java.lang.Runnable`\
    \ interface; as a core member of the `java.lang` package it does not need to be\
    \ inherently imported into your class in order for you to harness its power, as\
    \ you'll see in Figure [14-2](#A978-1-4302-5786-8_14_Chapter.html#Fig2).\n\nThe\
    \ Java `Runnable` interface has ten indirect subclasses, other than the `AnimationDrawable`\
    \ subclass, that implement its interface, and one of these just happens to be\
    \ the Android `Thread` class.\n\nThis might give you some clue as to what the\
    \ `Runnable` class, and the `run()` method, are supposed to be used for. That\
    \ is right; they are used to spawn threads! Threads are operating system processes\
    \ that are able to allocate their own separate memory space and sometimes their\
    \ own CPU (especially on multi-core system hardware) upon which processing-intensive\
    \ tasks, such as animation, downloading, or video playback (codecs), can run asynchronously.\n\
    \nWhile asynchronous simply means out of sync, it more accurately signifies a\
    \ process that does not interfere (is not forced to synchronize) with the processing\
    \ tasks currently underway inside your User Interface Thread. The UI Thread is\
    \ the primary thread for your application and handles tasks such as writing your\
    \ UI elements to the display screen and scaling them if needed (for instance,\
    \ if your user rotates their device screen 90 degrees).\n\nThe Java code to implement\
    \ `Runnable` and call your `.start()` method inside its `.run()` method is deceptively\
    \ simple compared to how powerful it is.\n\n```\nclass animStarter implements\
    \ Runnable {\n    public void run() {\n        frameAnimation.start();\n    }\n\
    }\n```\n\nAs you can see in Figure [14-2](#A978-1-4302-5786-8_14_Chapter.html#Fig2),\
    \ the code is error-free and the declaration of your `frameAnimation` `AnimationDrawable`\
    \ at the top of your class code now is used via the `.start()` method inside your\
    \ `run()` method inside your `animStarter` class, which is implementing the Java\
    \ `Runnable` interface.\n\n![A978-1-4302-5786-8_14_Fig2_HTML.jpg](A978-1-4302-5786-8_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2. Coding the animStarter class implementing Runnable and a run()\
    \ method inside with .start() method\n\nNow that you have your `animStarter` class\
    \ that implements the `Runnable` public Java interface, and the `run()` method\
    \ for running (starting and playing) your `frameAnimation` `AnimationDrawable`,\
    \ you can create a `setUpAnimation()` method, which will set up everything necessary\
    \ for this `.start()` method to be able to start (play) a splash screen animation.\n\
    \n# Creating a setUpAnimation() Method for Your Animation\n\nThe first thing that\
    \ you need to do inside your `onCreate()` method is to call the `setUpAnimation()`\
    \ method. Do this using the following Java code:\n\n```\nsetUpAnimation();\n```\n\
    \nAs you can see in Figure [14-3](#A978-1-4302-5786-8_14_Chapter.html#Fig3), Eclipse\
    \ places its wavy red underline error highlighting under the method call because\
    \ the method does not currently exist.\n\nMouse-over the error highlighting and\
    \ see if you can get Eclipse ADT to write some code for you, as you often are\
    \ able to invoke using these pop-up dialogs. Sure enough, there is a Create method\
    \ `setUpAnimation()` option, so click that option's link and have this bootstrap\
    \ method code written for you, saving you approximately three dozen keystrokes.\n\
    \n![A978-1-4302-5786-8_14_Fig3_HTML.jpg](A978-1-4302-5786-8_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3. Adding a setUpAnimation() method call to your onCreate() method\
    \ and having Eclipse create it for you\n\nOnce a `private void setUpAnimation()`\
    \ method is in place, delete the comment and replace it with your `ImageView`\
    \ object instantiation, which you deleted earlier. Remember, practice makes perfect!\
    \ Here's the line of code in case you forgot how to instantiate, name, and load\
    \ it with your XML definition:\n\n```\nImageView pag = (ImageView) findViewById(R.id.pagImageView);\n\
    ```\n\nAs you can see in Figure [14-4](#A978-1-4302-5786-8_14_Chapter.html#Fig4),\
    \ you will need to mouse-over your `ImageView` class reference and select the\
    \ `Import ImageView (android.widget)` option.\n\n![A978-1-4302-5786-8_14_Fig4_HTML.jpg](A978-1-4302-5786-8_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4. Adding the ImageView object instantiation and naming and loading\
    \ it using a findViewById() method\n\nNow that your `ImageView` object is set\
    \ up to receive image output from your `frameAnimation` `AnimationDrawable` object,\
    \ you can proceed with the Java code that sets up the `AnimationDrawable` object\
    \ itself, which you had handled via XML markup previously, but which you are now\
    \ going to do using Java code.\n\n# Creating a New AnimationDrawable Object and\
    \ Referencing Its Frames\n\nThe first thing that you'll need to do is to initialize\
    \ your `frameAnimation` object, which you declared at the top of the `MainActivity`\
    \ class but did not initialize. You'll initialize this object by using the Java\
    \ `new` keyword and creating an `AnimationDrawable` object via the `AnimationDrawable()`\
    \ constructor method, and then assigning it to the `frameAnimation` object that\
    \ you created in the first line of code for your `Activity` subclass. This can\
    \ be accomplished by using the following line of Java code:\n\n```\nframeAnimation\
    \ = new AnimationDrawable();\n```\n\nAs you can see in Figure [14-5](#A978-1-4302-5786-8_14_Chapter.html#Fig5),\
    \ the code is error-free, and your Java object is now instantiated, constructed,\
    \ and even triggered via the `animStarter()` method. However, it is still basically\
    \ an empty `AnimationDrawable` object, so let's write the Java code next that\
    \ loads it with animation frame data.\n\n![A978-1-4302-5786-8_14_Fig5_HTML.jpg](A978-1-4302-5786-8_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5. Initializing the frameAnimation AnimationDrawable object using\
    \ the new keyword and AnimationDrawable() constructor\n\nNotice in Figure [14-5](#A978-1-4302-5786-8_14_Chapter.html#Fig5)\
    \ that your `pag` `ImageView` object is not used as yet, thus it has the wavy\
    \ yellow warning underline highlighting attached to it. You can ignore that for\
    \ now as you will be using that object very soon when you wire (reference) the\
    \ `AnimationDrawable` up to display via the `ImageView`."
  raw: '## Using the Android Runnable Class to Run Your Animation


    You are going to utilize the Java `Runnable` public interface, and its `run( )`
    method to run your AnimationDrawable in a separate thread, so that it can process
    the Drawable (BitmapDrawable frames in this case) asynchronously.


    This Java `Runnable` interface is not a direct subclass (or even a class at all,
    for that matter, it is an interface ) of your `java.lang.Object` master class;
    I guess there is a first time for everything!


    Runnable is actually on the same java.lang level as Object, and thus would be
    referenced as the `java.lang.Runnable` interface; as a core member of the java.lang
    package it does not need to be inherently imported into your class in order for
    you to harness its power, as you’ll see in Figure [14-2](#A978-1-4302-5786-8_14_Chapter.html#Fig2).


    The Java Runnable interface has ten indirect subclasses, other than the AnimationDrawable
    subclass, that implement its interface, and one of these just happens to be the
    Android `Thread` class.


    This might give you some clue as to what the Runnable class, and the run( ) method,
    are supposed to be used for. That is right; they are used to spawn threads! Threads
    are operating system processes that are able to allocate their own separate memory
    space and sometimes their own CPU (especially on multi-core system hardware) upon
    which processing-intensive tasks, such as animation, downloading, or video playback
    (codecs), can run asynchronously.


    While asynchronous simply means out of sync, it more accurately signifies a process
    that does not interfere (is not forced to synchronize) with the processing tasks
    currently underway inside your User Interface Thread. The UI Thread is the primary
    thread for your application and handles tasks such as writing your UI elements
    to the display screen and scaling them if needed (for instance, if your user rotates
    their device screen 90 degrees).


    The Java code to implement `Runnable` and call your `.start( )` method inside
    its `.run( )` method is deceptively simple compared to how powerful it is.


    `class animStarter implements Runnable {`


        `public void run() {`


             `frameAnimation.start();`


        `}`


    `}`


    As you can see in Figure [14-2](#A978-1-4302-5786-8_14_Chapter.html#Fig2), the
    code is error-free and the declaration of your `frameAnimation` AnimationDrawable
    at the top of your class code now is used via the `.start( )` method inside your
    `run( )` method inside your `animStarter` class, which is implementing the Java
    Runnable interface.


    ![A978-1-4302-5786-8_14_Fig2_HTML.jpg](A978-1-4302-5786-8_14_Fig2_HTML.jpg)


    Figure 14-2.


    Coding the animStarter class implementing Runnable and a run( ) method inside
    with .start( ) method


    Now that you have your `animStarter` class that implements the `Runnable` public
    Java interface, and the `run( )` method for running (starting and playing) your
    `frameAnimation` AnimationDrawable, you can create a `setUpAnimation( )` method,
    which will set up everything necessary for this `.start( )` method to be able
    to start (play) a splash screen animation.


    ## Creating a setUpAnimation( ) Method for Your Animation


    The first thing that you need to do inside your `onCreate( )` method is to call
    the `setUpAnimation( )` method. Do this using the following Java code:


    `setUpAnimation();`


    As you can see in Figure [14-3](#A978-1-4302-5786-8_14_Chapter.html#Fig3), Eclipse
    places its wavy red underline error highlighting under the method call because
    the method does not currently exist.


    Mouse-over the error highlighting and see if you can get Eclipse ADT to write
    some code for you, as you often are able to invoke using these pop-up dialogs.
    Sure enough, there is a Create method setUpAnimation( ) option, so click that
    option’s link and have this bootstrap method code written for you, saving you
    approximately three dozen keystrokes.


    ![A978-1-4302-5786-8_14_Fig3_HTML.jpg](A978-1-4302-5786-8_14_Fig3_HTML.jpg)


    Figure 14-3.


    Adding a setUpAnimation( ) method call to your onCreate( ) method and having Eclipse
    create it for you


    Once a `private void setUpAnimation( )` method is in place, delete the comment
    and replace it with your ImageView object instantiation, which you deleted earlier.
    Remember, practice makes perfect! Here’s the line of code in case you forgot how
    to instantiate, name, and load it with your XML definition:


    `ImageView pag = (ImageView) findViewById(R.id.pagImageView);`


    As you can see in Figure [14-4](#A978-1-4302-5786-8_14_Chapter.html#Fig4), you
    will need to mouse-over your ImageView class reference and select the `Import
    ImageView (android.widget)` option.


    ![A978-1-4302-5786-8_14_Fig4_HTML.jpg](A978-1-4302-5786-8_14_Fig4_HTML.jpg)


    Figure 14-4.


    Adding the ImageView object instantiation and naming and loading it using a findViewById(
    ) method


    Now that your ImageView object is set up to receive image output from your `frameAnimation`
    AnimationDrawable object, you can proceed with the Java code that sets up the
    AnimationDrawable object itself, which you had handled via XML markup previously,
    but which you are now going to do using Java code.


    ## Creating a New AnimationDrawable Object and Referencing Its Frames


    The first thing that you’ll need to do is to initialize your `frameAnimation`
    object, which you declared at the top of the MainActivity class but did not initialize.
    You’ll initialize this object by using the Java `new` keyword and creating an
    AnimationDrawable object via the `AnimationDrawable( )` constructor method, and
    then assigning it to the `frameAnimation` object that you created in the first
    line of code for your Activity subclass. This can be accomplished by using the
    following line of Java code:


    `frameAnimation = new AnimationDrawable();`


    As you can see in Figure [14-5](#A978-1-4302-5786-8_14_Chapter.html#Fig5), the
    code is error-free, and your Java object is now instantiated, constructed, and
    even triggered via the `animStarter( )` method. However, it is still basically
    an empty AnimationDrawable object, so let’s write the Java code next that loads
    it with animation frame data.


    ![A978-1-4302-5786-8_14_Fig5_HTML.jpg](A978-1-4302-5786-8_14_Fig5_HTML.jpg)


    Figure 14-5.


    Initializing the frameAnimation AnimationDrawable object using the new keyword
    and AnimationDrawable( ) constructor


    Notice in Figure [14-5](#A978-1-4302-5786-8_14_Chapter.html#Fig5) that your `pag`
    ImageView object is not used as yet, thus it has the wavy yellow warning underline
    highlighting attached to it. You can ignore that for now as you will be using
    that object very soon when you wire (reference) the AnimationDrawable up to display
    via the ImageView.'
  trans: "\n# 使用 Android Runnable 类运行动画\n\n你将利用 Java 的 `Runnable` 公共接口及其 `run()` 方法，在一个独立的线程中运行动画\
    \ (`AnimationDrawable`)，从而让它能够异步处理 `Drawable`（在此例中为 `BitmapDrawable` 帧）。\n\n这个\
    \ Java `Runnable` 接口并非你的主类 `java.lang.Object` 的直接子类（甚至根本不是一个类，而是一个接口）；我想凡事总有第一次吧！\n\
    \n实际上，`Runnable` 与 `Object` 处于同一个 `java.lang` 层级，因此应引用为 `java.lang.Runnable` 接口；作为\
    \ `java.lang` 包的核心成员，你无需显式将其导入类中即可利用其强大功能，你将如图 14-2 所示看到这一点。\n\n除了 `AnimationDrawable`\
    \ 子类外，Java 的 `Runnable` 接口还有十个实现其接口的间接子类，而其中一个恰好是 Android 的 `Thread` 类。\n\n这可能会让你对\
    \ `Runnable` 类和 `run()` 方法的用途有所了解。没错，它们就是用来生成线程的！线程是操作系统进程，能够分配自己独立的内存空间，有时还能分配自己的\
    \ CPU（尤其是在多核系统硬件上），从而使动画、下载或视频播放（编解码器）等处理密集型任务能够异步运行。\n\n虽然异步字面意思就是不同步，但它更准确地表示一个不会与用户界面线程中当前正在进行的处理任务发生干扰（不必被迫同步）的进程。UI\
    \ 线程是应用程序的主线程，负责处理诸如将 UI 元素写入显示屏以及根据需要对其进行缩放（例如，当用户将设备屏幕旋转 90 度时）等任务。\n\n实现 `Runnable`\
    \ 并在其 `run()` 方法中调用 `.start()` 方法的 Java 代码，与它强大的功能相比，简单得令人难以置信。\n\n```\nclass\
    \ animStarter implements Runnable {\n    public void run() {\n        frameAnimation.start();\n\
    \    }\n}\n```\n\n如图 14-2 所示，代码没有错误，并且在你的类代码顶部声明的 `frameAnimation` `AnimationDrawable`，现在通过实现\
    \ Java `Runnable` 接口的 `animStarter` 类中 `run()` 方法内的 `.start()` 方法被使用。\n\n![A978-1-4302-5786-8_14_Fig2_HTML.jpg](img/A978-1-4302-5786-8_14_Fig2_HTML.jpg)\n\
    \n图 14-2. 编写 animStarter 类，实现 Runnable 接口，并在其内部使用 `.start()` 方法编写一个 `run()` 方法\n\
    \n现在你已经有了实现 Java 公共接口 `Runnable` 的 `animStarter` 类，以及用于运行（启动和播放）你的 `frameAnimation`\
    \ `AnimationDrawable` 的 `run()` 方法，你可以创建一个 `setUpAnimation()` 方法，该方法将设置好所有必要的条件，使得这个\
    \ `.start()` 方法能够启动（播放）一个启动屏动画。\n\n# 为你的动画创建 setUpAnimation() 方法\n\n你需要在 `onCreate()`\
    \ 方法中做的第一件事就是调用 `setUpAnimation()` 方法。请使用以下 Java 代码来实现：\n\n```\nsetUpAnimation();\n\
    ```\n\n如图 14-3 所示，Eclipse 会在该方法调用下方放置波浪形的红色下划线错误高亮，因为该方法当前不存在。\n\n将鼠标悬停在错误高亮上，看看是否能让\
    \ Eclipse ADT 为你编写一些代码，因为通常可以通过这些弹出对话框来调用。果然，有一个“创建方法 `setUpAnimation()`”的选项，点击该选项的链接，这个启动方法代码就会被为你编写好，为你省去大约三十多次击键。\n\
    \n![A978-1-4302-5786-8_14_Fig3_HTML.jpg](img/A978-1-4302-5786-8_14_Fig3_HTML.jpg)\n\
    \n图 14-3. 在你的 `onCreate()` 方法中添加一个 `setUpAnimation()` 方法调用，并让 Eclipse 为你创建它\n\n\
    一旦 `private void setUpAnimation()` 方法就位，删除其中的注释，并将其替换为你之前删除的 `ImageView` 对象实例化代码。记住，熟能生巧！如果你忘记了如何实例化、命名并将其与你的\
    \ XML 定义关联，以下是这行代码：\n\n```\nImageView pag = (ImageView) findViewById(R.id.pagImageView);\n\
    ```\n\n如图 14-4 所示，你需要将鼠标悬停在 `ImageView` 类引用上，并选择“导入 ImageView (android.widget)”选项。\n\
    \n![A978-1-4302-5786-8_14_Fig4_HTML.jpg](img/A978-1-4302-5786-8_14_Fig4_HTML.jpg)\n\
    \n图 14-4. 添加 ImageView 对象实例化，并使用 `findViewById()` 方法为其命名并加载\n\n现在你的 `ImageView`\
    \ 对象已经准备好接收来自 `frameAnimation` `AnimationDrawable` 对象的图像输出，你可以继续编写设置 `AnimationDrawable`\
    \ 对象本身的 Java 代码了。这部分之前是通过 XML 标记处理的，但现在你将使用 Java 代码来完成。\n\n# 创建一个新的 AnimationDrawable\
    \ 对象并引用其帧\n\n你需要做的第一件事是初始化你的 `frameAnimation` 对象，该对象在 `MainActivity` 类的顶部声明了，但尚未初始化。你将使用\
    \ Java 的 `new` 关键字，通过 `AnimationDrawable()` 构造方法创建一个 `AnimationDrawable` 对象，然后将其赋值给你为\
    \ `Activity` 子类编写的第一行代码中创建的 `frameAnimation` 对象。这可以通过以下 Java 代码行来实现：\n\n```\n\
    frameAnimation = new AnimationDrawable();\n```\n\n如图 14-5 所示，代码没有错误，你的 Java 对象现在已经实例化、构造完成，甚至通过\
    \ `animStarter()` 方法触发。然而，它基本上仍然是一个空的 `AnimationDrawable` 对象，所以接下来让我们编写 Java 代码来为其加载动画帧数据。\n\
    \n![A978-1-4302-5786-8_14_Fig5_HTML.jpg](img/A978-1-4302-5786-8_14_Fig5_HTML.jpg)\n\
    \n图 14-5. 使用 `new` 关键字和 `AnimationDrawable()` 构造函数初始化 frameAnimation AnimationDrawable\
    \ 对象\n\n请注意，在图 14-5 中，你的 `pag` `ImageView` 对象尚未被使用，因此它附带了波浪形的黄色警告下划线高亮。你可以暂时忽略它，因为你很快会在将\
    \ `AnimationDrawable` 连接到 `ImageView` 进行显示时使用到这个对象。\n"
- fmt: '# Using the `AnimationDrawable` Class’s `.addFrame()` Method


    Now that you have constructed an empty `AnimationDrawable` object, you can use
    the `.addFrame()` method to add frames and their durations to your object in much
    the same way that you did using your XML `<animation-list>` parent tag and `<item>`
    child tags.


    You’ll extract your `Drawable` references using the same method chaining that
    you used in the previous chapter, on the inside of the `.addFrame()` method call,
    using the following somewhat long Java code construct:


    ```

    frameAnimation.addFrame(getResources().getDrawable(R.drawable.pag0), 112);

    ```


    This calls an `.addFrame()` method off of a `frameAnimation` `AnimationDrawable`
    object. Inside the `.addFrame()` method, in order to reference a `Drawable` object
    parameter, you use the `getResources().getDrawable()` method chaining to obtain
    your `pag0.png` image asset that is in your `/res/drawable-xhdpi` folder.


    The second parameter is the duration in milliseconds, and as you know, you are
    using the 112 millisecond value for the first frame and 111 for the remaining
    frames, which you’ll cut and paste to put into place. As you can see in Figure
    14-6, your code is error-free and you can continue on.


    ![A978-1-4302-5786-8_14_Fig6_HTML.jpg](A978-1-4302-5786-8_14_Fig6_HTML.jpg)


    Figure 14-6. Invoking the `.addFrame()` method and the `getResources().getDrawable()`
    method chain to load frames


    Now, select the entire line of code that you just wrote, and cut and paste it
    eight more times underneath itself, specifying the `pag1.png` through `pag8.png`
    image asset file names (without the `.png` extension, of course), and a 111 millisecond
    frame duration value for each, totaling one second. The completed frame loading
    lines of code can be seen in Figure 14-7.


    ![A978-1-4302-5786-8_14_Fig7_HTML.jpg](A978-1-4302-5786-8_14_Fig7_HTML.jpg)


    Figure 14-7. Copying the `frameAnimation.addFrame()` method call statement eight
    times underneath itself and editing it


    Next, you will configure how your `AnimationDrawable` loops and then wire it up
    to the `ImageView`, and you will learn about the Android `.post()` method call.


    # Configuring an `AnimationDrawable` by Using `.setOneShot()`


    The next step is to define the way that your frame animation loops so that it
    is seamless and continuous. In Java code, this is done by using a method called
    `.setOneShot()`, with a Boolean value of `true` (do not loop) or `false` (seamless
    looping animation). This is akin to what you would set up in your XML definition
    file using the `android:oneShot` parameter.


    Let’s go ahead and use this method to set your animation frames to continue to
    play forever by using a `false` parameter value via the following code:


    ```

    frameAnimation.setOneShot(false);

    ```


    Your next step is to wire up your `pag` `ImageView` animation display UI widget
    with the `frameAnimation` `AnimationDrawable` object that contains the data that
    will be sent to the `ImageView` to be displayed. You will do this using the now-familiar
    `.setImageDrawable()` method with the `frameAnimation` `AnimationDrawable` object
    passed as the parameter value. This is done using the following line of Java code,
    as shown in Figure 14-8:


    ```

    pag.setImageDrawable(frameAnimation);

    ```


    Next, you need to start the `AnimationDrawable` object by using its `.start()`
    method, which means calling your `animStarter` `Runnable` class `.run()` method.


    ![A978-1-4302-5786-8_14_Fig8_HTML.jpg](A978-1-4302-5786-8_14_Fig8_HTML.jpg)


    Figure 14-8. Configuring the `AnimationDrawable` using `.setOneShot()` and `ImageView`
    using `.setImageDrawable()`


    This is done using a method that is a part of the Android `Handler` class, called
    the `.post()` method, so let’s take a moment and learn exactly what the `.post()`
    method and its `Handler` class do for us within Android.


    # Scheduling an `AnimationDrawable` Using the `Handler` Class


    The Android `Handler` class is also a direct subclass of `java.lang.Object`, which
    is Java’s master `Object` class, and this makes a `Handler` an `Object`.


    Android’s `Handler` class is part of the `android.os.Handler` package. It is imported
    when you have an `import android.os` statement in your application, which imports
    all of the OS related functions necessary for your application development, such
    as `Bundle`, `Handler`, and similar OS utilities.


    The Android OS `Handler` class hierarchy is structured as follows:


    ```

    java.lang.Object

    > android.os.Handler

    ```


    The Android OS `Handler` object enables you to send and process a `Runnable` (or
    a `Message`) object. A `Handler` object will always be associated with the application
    UI thread `MessageQueue` object that spawned the `Handler` object.


    This `MessageQueue` object will hold any processing or messaging tasks that need
    to be processed in a First In, First Out (FIFO) scheduling algorithm.


    You only need to implement one `Handler` object per `Activity` subclass, where
    your background thread will communicate with it to update your UI Thread.


    If you want to research Android’s `MessageQueue` class and how it works, you can
    find more information on the developer web site at the following URL:


    [http://developer.android.com/reference/android/os/MessageQueue.html](http://developer.android.com/reference/android/os/MessageQueue.html)


    Each Android `Handler` object instantiation is associated using its spawning Thread,
    and with that parent’s `Thread` and `MessageQueue` objects. What this means is
    that when you create a new `Handler`, it is bound to the `Thread` and `MessageQueue`
    objects of a parent Thread, which is usually (but not always) an application’s
    UI (primary) Thread, which is spawning (or creating) this `Handler` object as
    child `Thread` and `MessageQueue` object instantiations.


    From that time on, your `Handler` object will deliver its messages and (or) runnables
    to that `MessageQueue` and will process them on a FIFO basis as they come out
    of that `MessageQueue` object.


    The primary usage of a `Handler` is to schedule `Runnables` to be executed, as
    you are doing with your `AnimationDrawable` here, or to schedule a `Message` to
    be processed at some point further down the processing line. You could also utilize
    `Handler` objects to queue up some action to be performed using a different Thread
    than the one Thread that you are currently using.


    After your app UI Process is created when you launch your application, its main
    (or UI) thread begins running a `MessageQueue` object. The `MessageQueue` object
    takes care of managing all of your Android application Java classes (`Activity`,
    `Service`, `BroadcastReceiver`, `ContentProvider`, etc.) and objects, as well
    as any windows that your `Activity` may create on a display screen.


    You can create your own Threads, and these will communicate with your main application
    (UI) thread using a `Handler`. This is accomplished via calls to the same `.post()`
    (or the custom `.sendMessage()` methods for `Message` objects) methods as before,
    but from your new thread.


    Any given `Runnable` object, or `Message` object, will eventually be scheduled
    in that `Handler`’s message queue and then processed later when appropriate.


    Three methods have been created to handle `Runnable` object scheduling in Android:
    the one that you are using, `.post(Runnable)`, as well as `.postAtTime(Runnable,
    long)` and `.postDelayed(Runnable, long)`.


    These three `.post(Runnable)` method versions allow you to queue up the `Runnable`
    object to be called by a `MessageQueue` object when it is received. In your application
    example, the `Runnable` is implemented in the `animStarter` class and contains
    the `.run()` method, which in turn contains the `.start()`.'
  raw: '## Using the AnimationDrawable Class’s .addFrame() Method


    Now that you have constructed an empty AnimationDrawable object, you can use the
    `.addFrame( )` method to add frames and their durations to your object in much
    the same way that you did using your XML <animation-list>parent tag and <item>child
    tags.</item></animation-list>


    You’ll extract your Drawable references using the same method chaining that you
    used in the previous chapter, on the inside of the `.addFrame( )` method call,
    using the following somewhat long Java code construct:


    `frameAnimation.addFrame(getResources().getDrawable(R.drawable.pag0), 112);`


    This calls an `.addFrame( )` method off of a `frameAnimation` AnimationDrawable
    object. Inside the `.addFrame( )` method, in order to reference a Drawable object
    parameter, you use the `getResources( ).getDrawable( )` method chaining to obtain
    your pag0.png image asset that is in your /res/drawable-xhdpi folder.


    The second parameter is the duration in milliseconds, and as you know, you are
    using the 112 millisecond value for the first frame and 111 for the remaining
    frames, which you’ll cut and paste to put into place. As you can see in Figure
    [14-6](#A978-1-4302-5786-8_14_Chapter.html#Fig6), your code is error-free and
    you can continue on.


    ![A978-1-4302-5786-8_14_Fig6_HTML.jpg](A978-1-4302-5786-8_14_Fig6_HTML.jpg)


    Figure 14-6.


    Invoking the .addFrame( ) method and the getResources( ).getDrawable( ) method
    chain to load frames


    Now, select the entire line of code that you just wrote, and cut and paste it
    eight more times underneath itself, specifying the pag1.png through pag8.png image
    asset file names (without the .png extension, of course), and a 111 millisecond
    frame duration value for each, totaling one second. The completed frame loading
    lines of code can be seen in Figure [14-7](#A978-1-4302-5786-8_14_Chapter.html#Fig7).


    ![A978-1-4302-5786-8_14_Fig7_HTML.jpg](A978-1-4302-5786-8_14_Fig7_HTML.jpg)


    Figure 14-7.


    Copying the frameAnimation.addFrame( ) method call statement eight times underneath
    itself and editing it


    Next, you will configure how your AnimationDrawable loops and then wire it up
    to the ImageView, and you will learn about the Android `.post( )` method call.


    ## Configuring an AnimationDrawable by Using .setOneShot()


    The next step is to define the way that your frame animation loops so that it
    is seamless and continuous. In Java code, this is done by using a method called
    `.setOneShot( )`, with a Boolean value of `true` (do not loop) or `false` (seamless
    looping animation). This is akin to what you would set up in your XML definition
    file using the `android:oneShot` parameter.


    Let’s go ahead and use this method to set your animation frames to continue to
    play forever by using a `false` parameter value via the following code:


    `frameAnimation.setOneShot(false);`


    Your next step is to wire up your `pag` ImageView animation display UI widget
    with the `frameAnimation` AnimationDrawable object that contains the data that
    will be sent to the ImageView to be displayed. You will do this using the now-familiar
    `.setImageDrawable( )` method with the `frameAnimation` AnimationDrawable object
    passed as the parameter value. This is done using the following line of Java code,
    as shown in Figure [14-8](#A978-1-4302-5786-8_14_Chapter.html#Fig8):


    `pag.setImageDrawable(frameAnimation);`


    Next, you need to start the AnimationDrawable object by using its `.start( )`
    method, which means calling your `animStarter` Runnable class .run( ) method.


    ![A978-1-4302-5786-8_14_Fig8_HTML.jpg](A978-1-4302-5786-8_14_Fig8_HTML.jpg)


    Figure 14-8.


    Configuring the AnimationDrawable using .setOneShot( ) and ImageView using .setImageDrawable(
    )


    This is done using a method that is a part of the Android `Handler` class, called
    the `.post( )` method, so let’s take a moment and learn exactly what the `.post(
    )` method and its Handler class do for us within Android.


    ## Scheduling an AnimationDrawable Using the Handler Class


    The Android `Handler` class is also a direct subclass of java.lang.Object, which
    is Java’s master `Object` class, and this makes a Handler an Object.


    Android’s Handler class is part of the `android.os.Handler` package. It is imported
    when you have an `Import android.os` statement in your application, which imports
    all of the OS related functions necessary for your application development, such
    as Bundle, Handler, and similar OS utilities.


    The Android OS Handler class hierarchy is structured as follows:


    `java.lang.Object`


    `> android.os.Handler`


    The Android OS Handler object enables you to send and process a Runnable (or a
    Message) object. A Handler object will always be associated with the application
    UI thread `MessageQueue` object that spawned the Handler object.


    This MessageQueue object will hold any processing or messaging tasks that need
    to be processed in a First In, First Out (FIFO) scheduling algorithm.


    You only need to implement one Handler object per Activity subclass, where your
    background thread will communicate with it to update your UI Thread.


    If you want to research Android’s MessageQueue class and how it works, you can
    find more information on the developer web site at the following URL:


    [`http://developer.android.com/reference/android/os/MessageQueue.html`](http://developer.android.com/reference/android/os/MessageQueue.html)


    Each Android `Handler` object instantiation is associated using its spawning Thread,
    and with that parent’s `Thread` and `MessageQueue` objects. What this means is
    that when you create a new Handler, it is bound to the Thread and MessageQueue
    objects of a parent Thread, which is usually (but not always) an application’s
    UI (primary) Thread, which is spawning (or creating) this Handler object as child
    Thread and MessageQueue object instantiations.


    From that time on, your `Handler` object will deliver its messages and (or) runnables
    to that MessageQueue and will process them on a FIFO basis as they come out of
    that MessageQueue object.


    The primary usage of a Handler is to schedule Runnables to be executed, as you
    are doing with your AnimationDrawable here, or to schedule a Message to be processed
    at some point further down the processing line. You could also utilize Handler
    objects to queue up some action to be performed using a different Thread than
    the one Thread that you are currently using.


    After your app UI Process is created when you launch your application, its main
    (or UI) thread begins running a MessageQueue object. The MessageQueue object takes
    care of managing all of your Android application Java classes (Activity, Service,
    BroadcastReceiver, ContentProvider, etc.) and objects, as well as any windows
    that your Activity may create on a display screen.


    You can create your own Threads, and these will communicate with your main application
    (UI) thread using a Handler. This is accomplished via calls to the same `.post(
    )` (or the custom `.sendMessage( )` methods for Message objects) methods as before,
    but from your new thread.


    Any given Runnable object, or Message object, will eventually be scheduled in
    that Handler’s message queue and then processed later when appropriate.


    Three methods have been created to handle Runnable object scheduling in Android:
    the one that you are using, `.post(Runnable)`, as well as `.postAtTime(Runnable,
    long)` and `.postDelayed(Runnable, long)`.


    These three `.post(Runnable)` method versions allow you to queue up the `Runnable`
    object to be called by a `MessageQueue` object when it is received. In your application
    example, the `Runnable` is implemented in the `animStarter` class and contains
    the `.run( )` method, which in turn contains the `.start( )`.'
  trans: '

    # 使用 `AnimationDrawable` 类的 `.addFrame()` 方法


    现在你已经构建了一个空的 `AnimationDrawable` 对象，可以使用 `.addFrame()` 方法向该对象添加帧及其持续时间，其方式与你之前使用
    XML `<animation-list>` 父标签和 `<item>` 子标签的方式大致相同。


    你将像上一章那样，在 `.addFrame()` 方法调用的内部，使用方法链来提取你的 `Drawable` 引用，使用以下略显冗长的 Java 代码结构：


    ```

    frameAnimation.addFrame(getResources().getDrawable(R.drawable.pag0), 112);

    ```


    这调用了 `frameAnimation` `AnimationDrawable` 对象上的 `.addFrame()` 方法。在 `.addFrame()`
    方法内部，为了引用一个 `Drawable` 对象参数，你使用 `getResources().getDrawable()` 方法链来获取位于 `/res/drawable-xhdpi`
    文件夹中的 `pag0.png` 图像资源。


    第二个参数是以毫秒为单位的持续时间，如你所知，第一帧使用 112 毫秒值，其余帧使用 111 毫秒，你将复制并粘贴这些值。如图 14-6 所示，你的代码没有错误，可以继续。


    ![A978-1-4302-5786-8_14_Fig6_HTML.jpg](img/A978-1-4302-5786-8_14_Fig6_HTML.jpg)


    图 14-6. 调用 `.addFrame()` 方法和 `getResources().getDrawable()` 方法链来加载帧


    现在，选中你刚写的整行代码，在其下方再复制粘贴八次，依次指定图像资源文件名 `pag1.png` 到 `pag8.png`（当然，不带 `.png` 扩展名），并为每个文件指定
    111 毫秒的帧持续时间，总共加起来为一秒。完整的帧加载代码行如图 14-7 所示。


    ![A978-1-4302-5786-8_14_Fig7_HTML.jpg](img/A978-1-4302-5786-8_14_Fig7_HTML.jpg)


    图 14-7. 将 `frameAnimation.addFrame()` 方法调用语句在其下方复制八次并进行编辑


    接下来，你将配置 `AnimationDrawable` 的循环方式，然后将其连接到 `ImageView`，并且你将了解 Android 的 `.post()`
    方法调用。


    # 使用 `.setOneShot()` 配置 `AnimationDrawable`


    下一步是定义帧动画的循环方式，使其无缝且连续。在 Java 代码中，这是通过使用名为 `.setOneShot()` 的方法完成的，其布尔值为 `true`（不循环）或
    `false`（无缝循环动画）。这类似于你在 XML 定义文件中使用 `android:oneShot` 参数进行的设置。


    现在让我们使用此方法，通过以下代码将动画帧设置为永远持续播放，参数值为 `false`：


    ```

    frameAnimation.setOneShot(false);

    ```


    你的下一步是将 `pag` `ImageView` 动画显示 UI 组件与包含数据的 `frameAnimation` `AnimationDrawable`
    对象连接起来，这些数据将被发送到 `ImageView` 进行显示。你将使用现在已经熟悉的 `.setImageDrawable()` 方法，并将 `frameAnimation`
    `AnimationDrawable` 对象作为参数值传入。这通过以下 Java 代码行完成，如图 14-8 所示：


    ```

    pag.setImageDrawable(frameAnimation);

    ```


    接下来，你需要使用 `AnimationDrawable` 对象的 `.start()` 方法来启动它，这意味着调用你的 `animStarter` `Runnable`
    类的 `.run()` 方法。


    ![A978-1-4302-5786-8_14_Fig8_HTML.jpg](img/A978-1-4302-5786-8_14_Fig8_HTML.jpg)


    图 14-8. 使用 `.setOneShot()` 配置 `AnimationDrawable`，并使用 `.setImageDrawable()` 配置
    `ImageView`


    这是通过使用 Android `Handler` 类中的一个方法（称为 `.post()` 方法）完成的，所以让我们花一点时间，准确了解 `.post()`
    方法及其 `Handler` 类在 Android 中为我们做了什么。


    # 使用 `Handler` 类调度 `AnimationDrawable`


    Android 的 `Handler` 类也是 `java.lang.Object` 的直接子类，而 `java.lang.Object` 是 Java 的主
    `Object` 类，这使得 `Handler` 成为一个 `Object`。


    Android 的 `Handler` 类属于 `android.os.Handler` 包。当你的应用程序中有 `import android.os` 语句时，它会被导入，该语句会导入应用程序开发所需的所有与操作系统相关的函数，例如
    `Bundle`、`Handler` 和类似的操作系统工具。


    Android 操作系统 `Handler` 类的层次结构如下所示：


    ```

    java.lang.Object

    > android.os.Handler

    ```


    Android 操作系统的 `Handler` 对象使你能够发送和处理 `Runnable`（或 `Message`）对象。一个 `Handler` 对象将始终与生成该
    `Handler` 对象的应用程序 UI 线程 `MessageQueue` 对象相关联。


    这个 `MessageQueue` 对象将保存任何需要按先进先出（FIFO）调度算法处理的处理或消息传递任务。


    每个 `Activity` 子类只需要实现一个 `Handler` 对象，你的后台线程将通过它与 UI 线程进行通信以更新 UI。


    如果你想研究 Android 的 `MessageQueue` 类及其工作原理，可以在以下网址的开发网站上找到更多信息：


    [`developer.android.com/reference/android/os/MessageQueue.html`](http://developer.android.com/reference/android/os/MessageQueue.html)


    每个 Android `Handler` 对象的实例化都与其生成的线程以及该父线程的 `Thread` 和 `MessageQueue` 对象相关联。这意味着当你创建一个新的
    `Handler` 时，它会被绑定到父线程的 `Thread` 和 `MessageQueue` 对象，这个父线程通常（但不总是）是生成此 `Handler`
    对象作为子 `Thread` 和 `MessageQueue` 对象实例的应用程序 UI（主）线程。


    从那时起，你的 `Handler` 对象将把它的消息和/或可运行对象传递到那个 `MessageQueue`，并在它们从该 `MessageQueue` 对象中取出时，按
    FIFO 原则进行处理。


    `Handler` 的主要用途是调度要执行的 `Runnables`，就像你在这里对 `AnimationDrawable` 所做的那样，或者调度一个 `Message`
    在处理流程的稍后某个时间点进行处理。你也可以利用 `Handler` 对象，使用与你当前正在使用的线程不同的线程来排队执行某些操作。


    当你启动应用程序后，应用程序的 UI 进程创建完成，其主线程（或 UI 线程）开始运行一个 `MessageQueue` 对象。该 `MessageQueue`
    对象负责管理你 Android 应用程序的所有 Java 类（`Activity`、`Service`、`BroadcastReceiver`、`ContentProvider`
    等）和对象，以及你的 `Activity` 可能在显示屏上创建的任何窗口。


    你可以创建自己的线程，这些线程将使用一个 `Handler` 与你的主应用程序（UI）线程进行通信。这是通过与之前相同的 `.post()`（或针对 `Message`
    对象的自定义 `.sendMessage()` 方法）调用实现的，但这次是从你的新线程中调用。


    任何给定的 `Runnable` 对象或 `Message` 对象，最终都将被调度到该 `Handler` 的消息队列中，然后在适当的时候进行处理。


    在 Android 中，有三个方法被创建用于处理 `Runnable` 对象的调度：你正在使用的 `.post(Runnable)`，以及 `.postAtTime(Runnable,
    long)` 和 `.postDelayed(Runnable, long)`。


    这三个 `.post(Runnable)` 方法变体允许你将 `Runnable` 对象排队，以便在 `MessageQueue` 对象收到时被调用。在你的应用程序示例中，`Runnable`
    是在 `animStarter` 类中实现的，并包含了 `.run()` 方法，而该方法内部又包含了 `.start()`。

