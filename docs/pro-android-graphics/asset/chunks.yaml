    # `<set>`标签：使用 XML 对程序化动画进行分组


    动画集合定义了一组需要作为整体或集合一起播放的程序化动画。集合通过程序化动画 XML 文件进行定义；实际上，它们为我们的核心变换标签提供了分组结构。这是通过使用一个`<set>`父标签来包含（或分组）任何我们希望在你的程序化动画整体设计中逻辑组织起来的变换来实现的。


    集合可以嵌套，以创建更精确、更复杂的结构。我们所要做的就是确保`<set>`标签及其包含的变换标签能够正确嵌套。如果你在编写代码时使用了恰当的代码缩进，那么嵌套的可视化和追踪应该相当容易。稍后在本章中，当你为了在`GraphicsDesign`应用中创建一些炫酷的程序化动画目标而开始编写
    XML 标记时，你就会看到这一点。


    安卓操作系统有一个专门的`Animation`类用于创建动画集合。正如你可能想到的，这个类叫做`AnimationSet`类！`AnimationSet`类与`Animation`类位于同一个包中。这个包被称为`android.view.animation`包，因为动画是在`View`中播放的。我们将在后面关于用户界面设计的章节中更深入地探讨`View`类，敬请期待。


    每个`AnimationSet`中包含的程序化动画变换由`AnimationSet`类作为一个统一的变换来执行。如果`AnimationSet`类观察到为容器`AnimationSet`设置的任何参数，同时也为其子级变换（即包含在容器`<set>`标签内的那些变换标签）设置了，那么为父级`AnimationSet`
    `<set>`标签设置的参数将覆盖子级变换的值。


    因此，你将学会如何避免冗余以及如何不将相同参数放在多个地方，方法是遵循一些简单的规则，这些规则将最大限度地减少你出错的机会，从而最大限度地提高你在首次编写代码（标记）时就获得你期望的动画结果的几率。


    `AnimationSet`如何从`Animation`变换继承参数，反之亦然，这一点很重要。通过包含在`<set>`标签中，在`AnimationSet`中设置的某些参数或属性会影响整个`AnimationSet`本身。然而，其中一些参数会被“向下传递”并应用于子级变换，有些甚至被忽略！因此，让我们学习在使用动画集合时应该在何处应用某些参数，这样你就能在开始之前确切地知道安卓期望什么。


    当在`AnimationSet`对象上设置（即在父级`<set>`标签内指定）时，`duration`、`repeatMode`、`fillBefore`和`fillAfter`参数（也称为属性）会被向下传递给所有子级变换。解决此问题的一个方法是始终在你的变换标签内局部地设置这些参数，并且永远不要在父级`<set>`标签中设置它们。如果你这样做，安卓就没有什么可向下传递的，这样就不会混淆这些参数在处理周期中将被应用于何处。


    `repeatCount`和`fillEnabled`参数或属性对于`AnimationSet`来说是完全被忽略的，因此你应该始终将这些参数局部应用于你想要正确访问的每个动画变换。


    另一方面，`startOffset`和`shareInterpolator`参数可以应用于`AnimationSet`本身。请注意，`startOffset`也可以局部地应用于变换，通过在循环周期中或动画开始播放时引入延迟来微调动画的时序。


    因此，一个好的经验法则是局部应用你的变换参数，而不是在组或`AnimationSet` `<set>`级别应用，除非是`shareInterpolator`参数，它显然旨在用于组级别操作，因为这是在程序化动画中“共享”事物的唯一方式。所以，务必局部设置变换参数！


    遵循此经验法则的另一个原因是，在安卓 4.0 之前，放置在`<set>` XML 标签内的所有参数都会被忽略，但可以在运行时使用 Java 代码应用。因此，如果你要交付给
    V4 之前的操作系统，你必须在`AnimationSet`对象上调用`.setStartOffset(80)`方法，以获得与在你的 XML 标记中、为你的程序化动画
    XML 资源（针对你的动画集合对象）在`<set>`标签内声明`android:startOffset="80"`参数相同的效果。


    # 程序化动画与逐帧动画：权衡取舍


    在我们深入探讨在`GraphicsDesign`应用中实现程序化动画所需的 XML 标记和 Java 编码之前，我想讨论一些高水平理论、原则、概念和权衡取舍，这些有助于区分逐帧动画和程序化动画。


    逐帧动画通常是内存密集型，而非处理密集型，因为要显示在屏幕上的帧被加载到内存中，以便之后在应用中使用。将图像从内存显示到`View`上相当直接，不需要任何复杂的计算，因此所有处理都涉及将每一帧的图像资源从内存移到显示屏上。


    逐帧动画让我们在安卓之外拥有更多控制权，因为我们可以使用制作软件（3D、数字成像、数字视频、特效、粒子系统、流体动力学等）来精确地操纵我们所有的像素，以达到我们想要实现的动画效果。由于安卓目前尚未拥有所有这些高级工具和前期制作能力，使用逐帧动画将允许我们利用安卓外部的强大制作工具，然后将结果导入我们的安卓应用。


    程序化动画通常是处理密集型，因为涉及值插值以及将插值器运动曲线应用于生成的临时数据值。此外，如果使用集合和子集来创建复杂的动画，可能会涉及更多的处理，以及保存执行处理所需的大量数据的内存空间。


    程序化动画让我们在安卓内部拥有更多控制权，因为一切都是用代码和数据完成的，所以它可以具有交互性。这是因为其他代码和数据（甚至是 UI 元素）可以被设计成实时与程序化动画交互，使其变得互动，而逐帧动画（至少就其本身而言）则没那么强的互动性。逐帧动画本身更像是一种线性媒介，就像视频一样。


    由于程序化动画可以应用于安卓中几乎任何`View`对象，包括文本、UI 小部件、图像、视频和逐帧动画，如果你正确地设置（例如，最佳地利用图像合成技术），你可以通过将逐帧动画与程序化动画结合使用来实现令人印象深刻的交互性。


    如果你像将要进行的那样结合使用逐帧动画和程序化动画，处理器和内存资源都将承受负载，因此你必须尽量优化你所做的事情，以免消耗太多运行应用程序其余代码和 UI
    所需的系统资源。这就是为什么我们在第 3 章中介绍了数据占用空间优化，以及为什么你在这里要学习相同类型的优化。

    '
- fmt: '# Creating Procedural Animation in your GraphicsDesign App


    Now it’s time to implement procedural animation within your GraphicsDesign application,
    to enhance the frame animation on your splash screen by making it look as though
    the frame animation spins in from out of the distance. To do this using only frames
    would take about one hundred frames, instead of just nine for the seamless spin
    movement. You will utilize the `<scale>` transform tag to create this illusion.


    Later on in the chapter you will implement an animation `<set>` tag in order to
    group this `<scale>` transformation tag with another transformation tag, the `<alpha>`
    (transparency or alpha blending) tag, which will fade the incoming spinning (frame)
    scaling (procedural) animation in, over time, in order to create an even more
    realistic out-of-the-distance special effect.


    Finally, you’ll use a `<rotate>` procedural tag to give this animation even more
    transformations by rotating your logo around the Z axis as it gets closer to its
    final resting place. This will allow you to create a `<set>` of three different
    transform types to demonstrate a complex animation set.


    The first thing that you will need to do is to create a new XML file using Eclipse
    to define your procedural animation. So, let’s get started!


    ## Creating a Procedural Animation Definition Using XML


    Let’s use the work process of right-clicking the GraphicsDesign project folder
    and menu selecting the New ➤ Android XML File, a work process that we utilized
    in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html) (refer to Figure 3-3 to see
    this visually).


    In the New Android XML File dialog, select the Tween Animation option by using
    the Resource Type drop-down menu, and then name this file `pag_anim` so that you
    can reference the file name in your Java code, which you will be writing a little
    bit later to set up the Animation object and wire it into your existing ImageView
    object.


    Note that since this XML file will be placed in the `/res/anim` folder for you,
    rather than in the `/res/drawable` folder, that you could have named it `anim_intro.xml`,
    since the two files would actually be considered different assets since they are
    referenced inside of different folders in Android. However, I don’t want to confuse
    any of the readers so I’ll use a different name for the procedural animation XML
    than I did for the frame animation.


    Next, you want to select your Root Element, which in this case is the type of
    procedural animation transform that you want to start out with. Since the most
    visual impact for bringing the logo in from the distance is going to be the `<scale>`
    transform, you need to select a scale tag option as your root element. Completed
    settings for the dialog are shown in Figure [4-1](#A978-1-4302-5786-8_4_Chapter.html#Fig1).


    ![A978-1-4302-5786-8_4_Fig1_HTML.jpg](A978-1-4302-5786-8_4_Fig1_HTML.jpg)


    Figure 4-1. Creating a Tween Animation XML file for the `<scale>` transform


    Once you are finished setting all of these dialog options, click the Finish button
    to create the `pag_anim.xml` file and open it up in Eclipse.


    Once the `pag_anim.xml` tab opens up in Eclipse, you will see the `<scale>` and
    `</scale>` opening and closing tags for a scale transform parent container.


    Since your scale transform is going to have lots of parameters but no child tags,
    let’s change the way that this `<scale>` tag is written to better suit your purposes.
    You will do this by deleting the `</scale>` closing tag, and by changing your
    `<scale>` opening tag to be both an opening and a closing tag.


    The simplest way to do this is by putting your cursor between the `e` at the end
    of the word `scale` and the `>` character, and pressing the `return` key. After
    you separate the opening tag onto two different lines, insert a `/` character
    before the `>` so that it becomes a `/>` or short-hand closing tag.


    This will change `<scale>` to `<scale` and `/>` and allow you to enter parameters
    for your scale transformation’s attributes or properties. The way that this should
    look when you are finished can be seen in Figure [4-2](#A978-1-4302-5786-8_4_Chapter.html#Fig2),
    along with the next steps you are about to perform.


    Next, place your cursor after the open `<scale` tag and press return to type in
    another line, and have Eclipse auto-indent for you. Type the word `android` and
    the colon key to bring up the scale tag parameter helper dialog, as shown in Figure
    [4-2](#A978-1-4302-5786-8_4_Chapter.html#Fig2), so you can see all 17 parameters
    that define what the scale transformation is going to do.


    ![A978-1-4302-5786-8_4_Fig2_HTML.jpg](A978-1-4302-5786-8_4_Fig2_HTML.jpg)


    Figure 4-2. Use the `android:` work process to bring up options for a `<scale>`
    transform tag and select `fromXScale`


    Double-click the first `android:fromXScale` parameter to add it to the `<scale>`
    tag. Notice in Figure [4-3](#A978-1-4302-5786-8_4_Chapter.html#Fig3) that Eclipse
    also added another needed parameter automatically, the `xmlns:android` XML Naming
    Scheme declaration and its URL, which is needed in every (XML file) opening tag
    that is used in Android. Let’s set the value for the `fromXScale` parameter to
    `0.0`, and also cut and paste the `xmlns:android` parameter to the top of the
    scale tag next to the opening `<scale` tag (make sure and include at least one
    space).'
  raw: '## Creating Procedural Animation in your GraphicsDesign App


    Now it’s time to implement procedural animation within your GraphicsDesign application,
    to enhance the frame animation on your splash screen by making it look as though
    the frame animation spins in from out of the distance. To do this using only frames
    would take about one hundred frames, instead of just nine for the seamless spin
    movement. You will utilize the <scale> transform tag to create this illusion.


    Later on in the chapter you will implement an animation <set> tag in order to
    group this <scale> transformation tag with another transformation tag, the <alpha>
    (transparency or alpha blending) tag, which will fade the incoming spinning (frame)
    scaling (procedural) animation in, over time, in order to create an even more
    realistic out-of-the-distance special effect.


    Finally, you’ll use a <rotate> procedural tag to give this animation even more
    transformations by rotating your logo around the Z axis as it gets closer to its
    final resting place. This will allow you to create a <set> of three different
    transform types to demonstrate a complex animation set.


    The first thing that you will need to do is to create a new XML file using Eclipse
    to define your procedural animation. So, let’s get started!


    ## Creating a Procedural Animation Definition Using XML


    Let’s use the work process of right-clicking the GraphicsDesign project folder
    and menu selecting the New ➤ Android XML File, a work process that we utilized
    in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html) (refer to Figure 3-3 to see
    this visually).


    In the New Android XML File dialog, select the Tween Animation option by using
    the Resource Type drop-down menu, and then name this file pag_anim so that you
    can reference the file name in your Java code, which you will be writing a little
    bit later to set up the Animation object and wire it into your existing ImageView
    object.


    Note that since this XML file will be placed in the `/res/anim` folder for you,
    rather than in the /res/drawable folder, that you could have named it anim_intro.xml,
    since the two files would actually be considered different assets since they are
    referenced inside of different folders in Android. However, I don’t want to confuse
    any of the readers so I’ll use a different name for the procedural animation XML
    than I did for the frame animation.


    Next, you want to select your Root Element,which in this case is the type of procedural
    animation transform that you want to start out with. Since the most visual impact
    for bringing the logo in from the distance is going to be the <scale> transform,
    you need to select a scale tag option as your root element. Completed settings
    for the dialog are shown in Figure [4-1](#A978-1-4302-5786-8_4_Chapter.html#Fig1).


    ![A978-1-4302-5786-8_4_Fig1_HTML.jpg](A978-1-4302-5786-8_4_Fig1_HTML.jpg)


    Figure 4-1.


    Creating a Tween Animation XML file for the <scale> transform


    Once you are finished setting all of these dialog options, click the Finish button
    to create the pag_anim.xml file and open it up in Eclipse.


    Once the pag_anim.xml tab opens up in Eclipse, you will see the `<scale>` and
    `</scale>` opening and closing tags for a scale transform parent container.


    Since your scale transform is going to have lots of parameters but no child tags,
    let’s change the way that this <scale> tag is written to better suit your purposes.
    You will do this by deleting the `</scale>` closing tag, and by changing your
    <scale>opening tag to be both an opening and a closing tag.</scale>


    The simplest way to do this is by putting your cursor between the e at the end
    of the word scale and the > character, and pressing the `return` key. After you
    separate the opening tag onto two different lines, insert a `/` character before
    the > so that it becomes a `/> or short-hand closing tag`.


    This will change <scale> to `<scale` and `/>` and allow you to enter parameters
    for your scale transformation’s attributes or properties. The way that this should
    look when you are finished can be seen in Figure [4-2](#A978-1-4302-5786-8_4_Chapter.html#Fig2),
    along with the next steps you are about to perform.


    Next, place your cursor after the open `<scale` tag and press return to type in
    another line, and have Eclipse auto-indent for you. Type the word “android” and
    the colon key to bring up the scale tag parameter helper dialog, as shown in Figure
    [4-2](#A978-1-4302-5786-8_4_Chapter.html#Fig2), so you can see all 17 parameters
    that define what the scale transformation is going to do.


    ![A978-1-4302-5786-8_4_Fig2_HTML.jpg](A978-1-4302-5786-8_4_Fig2_HTML.jpg)


    Figure 4-2.


    Use the android: work process to bring up options for a <scale> transform tag
    and select fromXScale


    Double-click the first `android:fromXScale` parameter to add it to the <scale>tag.
    Notice in Figure</scale> [4-3](#A978-1-4302-5786-8_4_Chapter.html#Fig3) that Eclipse
    also added another needed parameter automatically, the `xmlns:android` XML Naming
    Scheme declaration and its URL, which is needed in every (XML file) opening tag
    that is used in Android. Let’s set the value for the `fromXScale` parameter to
    0.0, and also cut and paste the xmlns:android parameter to the top of the scale
    tag next to the opening <scale tag (make sure and include at least one space).'
  trans: '

    # 在图形设计应用中创建过程动画


    现在，是时候在你的 GraphicsDesign 应用中实现过程动画了，以此来增强启动屏幕上的帧动画效果，使其看起来像是从远方旋转而来。如果仅使用帧来实现这一效果，大约需要一百帧，而实现无缝旋转运动只需九帧。你将利用
    `<scale>` 变换标签来营造这种错觉。


    在本章稍后部分，你将实现一个动画 `<set>` 标签，以便将这个 `<scale>` 变换标签与另一个变换标签 —— `<alpha>`（透明度或 Alpha
    混合）标签组合在一起，后者会随着时间的推移，让进入的旋转（帧）缩放（过程）动画逐渐淡入，从而创造出更加逼真的远距离特效。


    最后，你将使用一个 `<rotate>` 过程标签，通过让标志在接近最终静止位置时绕 Z 轴旋转，为这个动画增添更多变换。这将使你能够创建一个包含三种不同变换类型的
    `<set>`，以此演示一个复杂的动画集。


    你需要做的第一件事是使用 Eclipse 创建一个新的 XML 文件来定义你的过程动画。那么，让我们开始吧！


    ## 使用 XML 创建过程动画定义


    让我们采用在 GraphicsDesign 项目文件夹上右键单击，然后从菜单中选择 New ➤ Android XML File 的工作流程，我们在第 3
    章中曾使用过这个工作流程（可参考图 3-3 查看具体操作）。


    在“新建 Android XML 文件”对话框中，使用“资源类型”下拉菜单选择“补间动画”选项，然后将此文件命名为 `pag_anim`，以便你稍后在 Java
    代码中引用该文件名来设置动画对象，并将其接入现有的 `ImageView` 对象。


    请注意，由于此 XML 文件将为你放置在 `/res/anim` 文件夹中，而不是 `/res/drawable` 文件夹中，因此你其实可以将其命名为 `anim_intro.xml`，因为这两个文件在
    Android 中因位于不同文件夹而被视为不同的资源。不过，我不想让读者感到困惑，所以我会为过程动画 XML 文件使用一个与帧动画不同的名称。


    接下来，你需要选择根元素，这里指的就是你希望开始使用的过程动画变换类型。由于让标志从远处出现最具视觉冲击力的将是 `<scale>` 变换，因此你需要选择缩放标签选项作为根元素。对话框的完整设置如图
    4-1 所示。


    ![A978-1-4302-5786-8_4_Fig1_HTML.jpg](img/A978-1-4302-5786-8_4_Fig1_HTML.jpg)


    图 4-1. 为 `<scale>` 变换创建补间动画 XML 文件


    完成所有这些对话框选项的设置后，点击“完成”按钮创建 `pag_anim.xml` 文件，并在 Eclipse 中将其打开。


    当 `pag_anim.xml` 标签页在 Eclipse 中打开后，你将看到缩放变换父容器的 `<scale>` 和 `</scale>` 开始与结束标签。


    由于你的缩放变换将有许多参数但没有子标签，让我们通过修改 `<scale>` 标签的写法来更好地满足你的需求。具体操作是删除 `</scale>` 结束标签，并将
    `<scale>` 开始标签修改为既可作开始又可作结束的标签。


    最简单的方法是将光标放在单词 `scale` 末尾的字母 `e` 和字符 `>` 之间，然后按下 `回车` 键。将开始标签分开到两行之后，在 `>` 前插入一个
    `/` 字符，使其变成 `/>` 或简写形式的结束标签。


    这将把 `<scale>` 变成 `<scale` 和 `/>`，并允许你为缩放变换的属性输入参数。完成后的效果应如图 4-2 所示，图中还包含了你即将执行的下一个步骤。


    接下来，将光标放在开放的 `<scale` 标签之后，按回车键另起一行，让 Eclipse 自动缩进。输入单词 `android` 和冒号键，调出缩放标签参数辅助对话框，如图
    4-2 所示，这样你就可以看到定义缩放变换行为的全部 17 个参数。


    ![A978-1-4302-5786-8_4_Fig2_HTML.jpg](img/A978-1-4302-5786-8_4_Fig2_HTML.jpg)


    图 4-2. 使用 `android:` 工作流程调出 `<scale>` 变换标签的选项，并选择 `fromXScale`


    双击第一个 `android:fromXScale` 参数，将其添加到 `<scale>` 标签中。注意在图 4-3 中，Eclipse 还自动添加了另一个必需的参数，即
    `xmlns:android` XML 命名空间声明及其 URL，这在 Android 中使用的每个（XML 文件）开始标签中都是必需的。让我们将 `fromXScale`
    参数的值设置为 `0.0`，并将 `xmlns:android` 参数剪切并粘贴到缩放标签的顶部，紧挨着开头的 `<scale` 标签（确保至少包含一个空格）。

    '
- fmt: '![A978-1-4302-5786-8_4_Fig3_HTML.jpg](A978-1-4302-5786-8_4_Fig3_HTML.jpg)


    Figure 4-3. Adding the `android:fromXScale` parameter, and auto-generating the
    `xmlns:android` URL reference


    When you are done, your XML should look like the markup shown in Figure 4-4. Now
    you are ready to add in the rest of your X and Y scale range parameters: `fromYScale`,
    `toXScale`, and `toYScale`.


    ![A978-1-4302-5786-8_4_Fig4_HTML.jpg](A978-1-4302-5786-8_4_Fig4_HTML.jpg)


    Figure 4-4. Adding the X and Y To and From Scaling parameters to scale your PAG
    logo from zero to full scale


    Utilize that same `android:` work process to add in scale range definition parameters,
    and set both X and Y From parameters to `0.0` (invisible in the distance), and
    both X and Y To parameters to `1.0` (fully visible upfront).


    Next, add your Pivot and Interpolator parameters to determine where the scale
    will emanate from and how it will move in from the distance. Use your `android:`
    work process and add `pivotX` and `pivotY` parameters and an `android:interpolator`
    parameter as well (see Figure 4-5). Since you want the spinning logo to scale
    in evenly from the center of the screen, you will use a value of `50%` for both
    X and Y pivot parameters. If you used the `0%` setting, the spinning logo would
    appear to come out of the upper-left corner of the display, and that would not
    look nearly as natural as the more centered appearance for the scaling in of your
    Pro Android Graphics logo.


    ![A978-1-4302-5786-8_4_Fig5_HTML.jpg](A978-1-4302-5786-8_4_Fig5_HTML.jpg)


    Figure 4-5. Adding `pivotX` and `pivotY` parameters as well as an `accelerate_interpolation`
    interpolator constant


    Setting the value for the `android:interpolator` parameter can be a little bit
    more tricky, as it requires the correct constant reference path within the OS
    to be specified accurately. This is done by using the `@android:` to specify the
    Android OS resources area, as well as an `anim/` to path specify the animation
    resources, in this case interpolator constants, and then an interpolator constant
    name, in this case `accelerate_interpolator`.


    You are using an acceleration interpolator now because you want your spinning
    Pro Android Graphics logo to zoom into the center of the screen, smoothly and
    naturally, and this `accelerate_interpolator` constant will reference a motion
    control curve algorithm that will provide this motion for you.


    Next, you are going to specify your timing values for the animation using the
    `android:duration` and `android:startOffset` parameters, which you learned about
    earlier in the chapter. The duration parameter you are going to set at 9 seconds;
    this is because you want your spinning animation to appear slowly and smoothly
    out of the distance.


    Remember that the duration and interpolator parameters work hand-in-hand, in this
    case to provide a smooth, realistic flight path for your spinning logo as it flies
    in from the distant horizon.


    The reason you need to specify a `startOffset` parameter of `3000`, which is 3
    seconds, in this case is because this is a splash screen animation, and you do
    not want the animation to start the exact same moment that this screen loads.
    For this reason, you are going to give your end user a few seconds to realize
    that the app has launched and to look at the display screen before you start up-scaling
    your spinning Pro Android Graphics animation into view.


    Since you have scaled this animation down to zero for its starting scale range
    value, the fact that your frame animation starts the logo spinning immediately
    does not matter, as the user cannot see it anyway, so it will not need an offset
    specified. You can see all of the nine parameters that you have specified for
    your scale transformation so far in Figure 4-6.


    ![A978-1-4302-5786-8_4_Fig6_HTML.jpg](A978-1-4302-5786-8_4_Fig6_HTML.jpg)


    Figure 4-6. Adding an `android:duration` parameter set to 9 seconds and a 3 second
    animation start offset value


    Next, you are going to specify your procedural animation looping parameters, the
    `android:repeatCount` and the `android:repeatMode`, which you learned about earlier
    in the chapter. These parameters will allow you to control how many times the
    procedural animation transforms are executed, which, in the case of this intro
    animation, happen to be critical to achieving a processional result. The final
    markup for your `<scale>` tag can be seen in Figure 4-7.


    Since you want your logo to appear to fly in from the distance, and stop and spin
    in the center of the screen once it is full scale, you need to set the `repeatCount`
    to repeat this scaling operation only one single time, or your spinning logo frame
    animation will disappear again, virtually as soon as it arrives on the screen—actually,
    three seconds after it arrives, since you have specified the `startOffset` value
    to be `3000`, or three seconds.


    Since computers start counting at zero, the correct setting for this will be `android:repeatCount="0"`,
    so make sure not to use a `1` value. Next, you will set the `repeatMode` parameter
    to specify a seamless looping animation by using a `restart` value constant. Remember
    that a `reverse` value constant would give you a pong animation result, which
    might be cool to use if you wanted the spinning logo to be sucked back into the
    horizon (in which case you would specify `repeatCount` as `1`, and `repeatMode`
    as `reverse`).


    Since the animation is only playing once, you don’t really even need to set the
    `repeatMode` parameter at all! I am doing so here so that you will have exposure
    to this important parameter, as most of the transform animations that you will
    set up will need to specify both the `repeatCount` value and a `repeatMode` parameter,
    as well as one of its two constant values.


    ![A978-1-4302-5786-8_4_Fig7_HTML.jpg](A978-1-4302-5786-8_4_Fig7_HTML.jpg)


    Figure 4-7. Adding an `android:repeatCount` value of zero specifying one playback
    cycle and a `restart` repeatMode


    Now that you have set up your procedural animation, all you have to do is to go
    into your project `MainActivity.java` Activity’s Java code, instantiate your `Animation`
    object, wire it up to your `pagImageView` object, and you’re ready to enhance
    your frame animation with some cool procedural animation!'
