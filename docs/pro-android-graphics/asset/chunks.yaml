- fmt: 'It is interesting to note that less than 256 colors can be used in an 8-bit
    indexed color image. This is done to reduce the data footprint; for instance,
    an image that can attain good results using only 32 colors is actually a 5-bit
    image and is technically a `PNG5`, even though the format is called `PNG8`.


    Also notice that you can set the percentage of dithering used; I usually select
    either the 0% or 100% setting, but you can fine-tune the dithering effect anywhere
    between these two extreme values. You can also choose a dithering algorithm type;
    I use diffusion dithering, as it yields a smooth effect along irregularly shaped
    gradients such as those on the car fender.


    Dithering, as you may imagine, adds data (patterns) that is more difficult to
    compress, and thus, it increases the data footprint by a few percentage points.
    Be sure to check the resulting filesize with and without dithering applied to
    see if it is worth the improved visual results that it affords.


    The final concept (that you have learned about so far) that can increase the data
    footprint of the image is the alpha channel, as adding an alpha adds another 8-bit
    color channel (transparency) to the image being compressed.


    However, if you need an alpha channel to define transparency in order to support
    future compositing needs with that image, there is not much choice but to include
    the alpha channel data. Just make sure not to use a 32-bit image format to contain
    a 24-bit image that has an empty (all zeroes, and completely transparent, and
    thus empty of alpha value data) alpha channel.


    Finally, many alpha channels that are used to mask objects in an image will compress
    very well, as they are largely areas of white (opaque) and black (transparent)
    with some grey values along the edge between the two colors to anti-alias the
    mask. As a result, they provide a visually smooth edge transition between the
    object and the imagery used behind it.


    Since in an alpha channel image mask the 8-bit transparency gradient from white
    to black defines transparency, the grey values on the edges of each object in
    the mask essentially average the colors of the object and its target background,
    which provides real-time anti-aliasing with any target background used.


    Now it’s time to get Android installed on your workstation, and then you can start
    developing graphics-oriented Android applications!


    ## Download the Android Environment: Java and ADT Bundle


    Let’s get started by making sure you have the current Android development environment.
    This means having the latest version of Java, Eclipse, and the Android Developer
    Tools (`ADT`). You may already have the most recent `ADT Bundle` installed, but
    I am going to do this here simply to make sure you are set up and starting from
    the right place, before we undertake the complex development we are about to embark
    upon within this book. If you keep your `ADT` up to date on a daily basis, you
    can skip this section if you wish.


    Since Java is used as the foundation for `ADT`, get that first. As of Android
    4.3, the Android `IDE` still uses Java 6, and not Java 7, so make sure to get
    the correct version of the Java SDK. It is located here:


    [http://www.oracle.com/technetwork/java/javasebusiness/downloads/java-archive-downloads-javase6-419409.html](http://www.oracle.com/technetwork/java/javasebusiness/downloads/java-archive-downloads-javase6-419409.html)


    Scroll down towards the bottom of the page, and look for the Java SE Development
    Kit 6u45 download link. This section of the screen is shown in Figure [1-4](#A978-1-4302-5786-8_1_Chapter.html#Fig4).


    ![A978-1-4302-5786-8_1_Fig4_HTML.jpg](A978-1-4302-5786-8_1_Fig4_HTML.jpg)


    Figure 1-4.


    Java SE 6 Download Section of the Oracle TechNetwork web site Java SE archives
    page


    Click the Java SE Development Kit 6u45 Download link on the bottom of the section
    and at the top of the download links screen. At the top of the downloads screen
    in the gray area shown in Figure [1-5](#A978-1-4302-5786-8_1_Chapter.html#Fig5),
    select the Accept License Agreement radio button option. Once you do this you
    will notice that the links at the right side will become bolder and can be clicked
    to invoke the download for your operating system.


    If you are using a 64-bit OS such as Windows 7 64-bit or Windows 8 64-bit, which
    is what I am using, select the Windows x64 version of the `EXE` installer file
    to download.


    If you are using a 32-bit OS such as Windows XP or Windows Vista 32-bit, select
    the Windows x86 version of the `EXE` installer file to download. Be sure to match
    the bit level of the software to the bit level capability of the OS that you are
    running. Figure [1-5](#A978-1-4302-5786-8_1_Chapter.html#Fig5) shows the download
    screen as it appears once the license agreement option radio button has been selected.


    ![A978-1-4302-5786-8_1_Fig5_HTML.jpg](A978-1-4302-5786-8_1_Fig5_HTML.jpg)


    Figure 1-5.


    Java SE 6 download links for Linux, Solaris, and Windows (once software agreement
    is accepted)


    Once the `EXE` file has finished downloading, make sure any previous version of
    Java 6 SDK is uninstalled by using the Windows Control Panel Add/Remove Programs
    dialog. Then find and launch an installer for the current version Java 6 SDK installer,
    and install the latest version of Java 6, so that you can install the Android
    Developer Tools ADT Bundle.


    The Android Developer Tools (`ADT`) Bundle is comprised of the Eclipse Kepler
    4.3 `IDE` (Integrated Development Environment) for Java and the Android Developer
    Tools Plug-ins already installed into the Eclipse `IDE`. This used to be done
    separately, and it took about a 50 step process to complete, so downloading and
    installing one pre-made bundle is significantly less work.


    Next, you need to download the Android `ADT Bundle` from the Android Developer
    web site. In the past, developers had to assemble Eclipse and `ADT` plug-ins manually.
    Starting with Android 4.2, Jelly Bean + Google is now doing this for you, making
    installing an Android `ADT IDE` an order of magnitude easier that it was in the
    past. This is the URL to use to download an `ADT Bundle`:


    [`http://developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)


    The screen shown in Figure [1-6](#A978-1-4302-5786-8_1_Chapter.html#Fig6) is what
    you should see on the Android SDK download page. Simply click the blue Download
    the SDK button to get started with the download process.


    ![A978-1-4302-5786-8_1_Fig6_HTML.jpg](A978-1-4302-5786-8_1_Fig6_HTML.jpg)


    Figure 1-6.


    ADT Bundle Download the SDK Button on Get the Android SDK page of the Android
    Developer site


    Once you click the Download the SDK button, you will be taken to the Licensing
    Terms and Conditions Agreement page, where you can read the terms and conditions
    of using the Android development environment and finally click the I have read
    and agree with the above terms and conditions checkbox.


    Once you do this, the OS 32 or 64 bit-level selection radio buttons will be enabled
    so that you can select either the 32-bit or the 64-bit version of the Android
    `ADT` environment. Then the blue Download the SDK ADT Bundle for Windows (or your
    OS) will be enabled, and you can click it to start the installation file download
    process. This is the screen state that is shown in Figure [1-7](#A978-1-4302-5786-8_1_Chapter.html#Fig7).


    Click the blue Download the SDK ADT Bundle button and save the `ZIP` file to your
    system downloads folder. Once the download is finished you can begin the installation
    process, which we will go through in detail in the next section of this chapter.


    ![A978-1-4302-5786-8_1_Fig7_HTML.jpg](A978-1-4302-5786-8_1_Fig7_HTML.jpg)


    Figure 1-7.


    Terms and Conditions page and SDK download options for 32-bit or 64-bit software
    environments


    Now you are ready top unzip and install the `ADT`, and then update it to the latest
    version from inside of the Eclipse Java `ADT IDE` (after you install and launch
    it for the first time, of course). Are you getting excited yet?'
