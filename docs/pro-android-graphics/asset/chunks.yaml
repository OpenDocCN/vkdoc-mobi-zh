    右键点击项目的`/src`文件夹，选择`New ➤ Class`菜单序列，就像你为`SketchPad.java`类所做的那样（可视化操作见图[17-3](#A978-1-4302-5786-8_17_Chapter.html#Fig3)），你将看到一个“新建
    Java 类”对话框及几个子对话框，如图 [17-8](#A978-1-4302-5786-8_17_Chapter.html#Fig8) 所示。将新类命名为`SketchPadView`，并从`android.view.View`包路径中选择父类`android.view.View`以及接口`OnTouchListener`，最后点击`Finish`按钮。


    ![A978-1-4302-5786-8_17_Fig8_HTML.jpg](A978-1-4302-5786-8_17_Fig8_HTML.jpg)


    图 17-8.

    在“新建 Java 类”对话框中配置名称`SketchPadView`、父类`View`以及`OnTouchListener`——`android.view.View`


    这将在 Eclipse ADT 编辑器中打开`SketchPadView`的引导 Java 文件。你可能会认为 Eclipse 会使用其“新建 Java 类”辅助工具对话框为你生成无错误的代码，但在这种情况下，你的`SketchPadView`类定义下方会出现一条红色的波浪下划线！


    如果将鼠标悬停在此错误提示上，你会发现 Eclipse 要求你为该类实现`constructor method`，并使用与类名完全相同的名称（参见图 [17-9](#A978-1-4302-5786-8_17_Chapter.html#Fig9)）。这恰好是你下一步要做的，所以不必对此错误消息过于担心，至少目前不用。


    ![A978-1-4302-5786-8_17_Fig9_HTML.jpg](A978-1-4302-5786-8_17_Fig9_HTML.jpg)


    图 17-9.

    在 Eclipse 中查看`SketchPadView`公共类的引导代码


    如图 [17-10](#A978-1-4302-5786-8_17_Chapter.html#Fig10) 所示，Eclipse 会为你提供一个包含`Context`对象参数的引导构造方法代码，并且很可能还会提供`Import`语句。现在点击这个`Add
    constructor`选项。


    ![A978-1-4302-5786-8_17_Fig10_HTML.jpg](A978-1-4302-5786-8_17_Fig10_HTML.jpg)


    图 17-10.

    添加`SketchPadView(Context)`构造方法引导代码以消除类的错误高亮


    如图 [17-11](#A978-1-4302-5786-8_17_Chapter.html#Fig11) 所示，你现在已经编写了本章中第二个什么都不做的
    Java 类。首要目标是生成无错误的代码，次要目标是编写能实际执行某些操作的代码，第三级目标是编写能跨所有设备运行的代码，最终目标是实现销售。


    让我们看一下你无错误的`SketchPadView`类及其`OnTouch()`方法，该方法接收`View`对象（即它自身）和`MotionEvent`对象作为参数，并返回`false`值。Eclipse
    这样编码的原因可能是该方法目前什么也不做，因此`false`（表示此方法调用期间未完成任何操作）在这种特定用例下在技术上是正确的。稍后，你将把这个返回值改为`true`。


    `SketchPadView()`方法则更有趣一些，因为它将创建并设置你正在通过此类创建的自定义`SketchPadView`视图对象。该方法只有一个由 Android
    操作系统传入的参数：一个名为`context`的`Context`对象。现在让我们来进一步了解`Context`！


    ![A978-1-4302-5786-8_17_Fig11_HTML.jpg](A978-1-4302-5786-8_17_Fig11_HTML.jpg)


    图 17-11.

    查看`SketchPadView()`构造方法、`super(context)`调用以及`Context`导入语句


    ### Android 的 `Context` 类：告知 Activity 所处位置


    Android 的`Context`类是`java.lang.Object`类的直接子类，就像`Paint`和`Canvas`类一样。`Context`类专门设计用于
    Android 应用，目的是定义`Context`对象，以供例如你的 Pro Android 图形应用等场景使用。


    Android 的 `Context` 类层次结构如下：


    `java.lang.Object`

    `> android.content.Context`


    Android 的`Context`类属于`android.content`包。因此，在应用中使用此`Context`类时，其`import statement`引用了`android.content.Context`包，正如你在本书中已经看到的那样。


    `Context`类是一个`public abstract`类，它持有应用的`contextual information`。`Context`对象中包含的信息用于描述`关于你的应用的所有信息`，这些信息与
    Android 操作系统正确组织应用的能力相关。


    本质上，`Context`对象允许引用它的应用组件“向上”查看应用的构造。`Context`类中包含超过两打与`.get()`相关的方法；所有这些方法都允许访问特定于应用的系统配置、应用结构，甚至应用资源的访问或信息。


    从某种意义上说，`Context`对象代表了你眼前“看不见”的一切；即所谓的“引擎盖之下”。因此，`Context`对象为引用它的组件提供了与应用环境“全局”信息的接口。


    `Context`类将允许访问特定于应用的资源和你自定义的类。`Context`类提供了实现应用级操作“向上调用”的方法。这方面的例子包括启动一个`Activity`子类、广播应用级消息、发送和接收一个`Intent`对象，或启动一个`Service`对象的处理。


    现在你可以理解为什么 Android 为此类及其构造的对象选择`Context`这个名称了。一个很好的使用`Context`的例子是在创建`View`子类时；这就是我们在本章中讨论`Context`对象的原因，恰在你创建`SketchPadView`视图子类之前。


    正如你在本章中所学到的，通过在类声明中使用`extends`关键字来扩展`View`类来创建自定义视图。你还必须提供一个以`Context`对象为参数的构造方法。这样做是为了在实例化自定义视图时，你也被迫传入包含应用上下文的`Context`对象。这是因为你的`View`子类需要能够访问应用的资源、类、主题以及其他类似的视图需要使用的应用配置细节。


    创建`View`子类实际上是一个完美的例子，用来说明为什么需要将`Context`对象传入构造方法。每个`Context`对象都包含由 Android 操作系统设置的各种数据字段，用于描述应用参数，例如显示尺寸或屏幕密度，或者要与视图对象一起使用的视觉操作系统主题（如果已定义）。


    接下来，我们将查看`Context`类公开的一些关键方法。这将为你概述`Context`对象可能包含哪些数据。对于你的`application`，有`.getApplicationInfo()`方法调用和`.getApplicationContext()`方法调用。


    要获取你的`application resources`，有`.getAssets()`、`.getResources()`、`.getSharedResources()`方法调用，以及`.getText()`、`.getString()`方法调用，甚至还有一个`.getContentResolver()`方法调用。


    要访问你的`package`，有`.getPackageName()`、`.getPackageManager()`、`.getPackageCodePath()`和`.getPackageResourcePath()`方法调用。'
  raw: '## Creating a Custom View Class: Your SketchPadView Class


    Right-click the /src folder for your project and select the `New ➤ Class` menu
    sequence just like you did for the SketchPad.java class (for a visual, see Figure
    [17-3](#A978-1-4302-5786-8_17_Chapter.html#Fig3)), and you will get a New Java
    Class dialog and several subdialogs, as shown in Figure [17-8](#A978-1-4302-5786-8_17_Chapter.html#Fig8).
    Name your new class `SketchPadView`, and select the `superclass android.view.View`
    as well as the `Interface OnTouchListener` from the `android.view.View` package
    path, and finally, click the `Finish` button.


    ![A978-1-4302-5786-8_17_Fig8_HTML.jpg](A978-1-4302-5786-8_17_Fig8_HTML.jpg)


    Figure 17-8.


    Configuring the New Java Class dialog with SketchPadView name, View superclass,
    and OnTouchListener - android.view.View


    This will open up the SketchPadView bootstrap Java file in the Eclipse ADT editor,
    and whereas you would think that Eclipse would generate error-free code for you
    using its New Java Class helper utility dialog, in this case, you have a wavy
    red underline under your SketchPadView class definition!


    If you mouse-over this error highlighting, it turns out that Eclipse wants you
    to implement the `constructor method` for the class, using the exact same name
    as the class name (see Figure [17-9](#A978-1-4302-5786-8_17_Chapter.html#Fig9)).
    This is what you were going to do next, so you don’t really need to fret much
    over this error message, at least for the moment.


    ![A978-1-4302-5786-8_17_Fig9_HTML.jpg](A978-1-4302-5786-8_17_Fig9_HTML.jpg)


    Figure 17-9.


    Examining the SketchPadView public class bootstrap code in Eclipse


    As you see in Figure [17-10](#A978-1-4302-5786-8_17_Chapter.html#Fig10), Eclipse
    offers to code a bootstrap constructor method for you, complete with its `Context`
    object parameter, and most likely `Import` statements as well. Click this first
    `Add constructor` option now.


    ![A978-1-4302-5786-8_17_Fig10_HTML.jpg](A978-1-4302-5786-8_17_Fig10_HTML.jpg)


    Figure 17-10.


    Adding the SketchPadView(Context) constructor method bootstrap code to eliminate
    class’s error highlighting


    As you can see in Figure [17-11](#A978-1-4302-5786-8_17_Chapter.html#Fig11), you
    have now coded your second Java class in this chapter that does absolutely nothing.
    The primary goal is error-free code, the secondary goal is code that actually
    does something, the tertiary goal is code that works across all devices, and the
    final goal is sales.


    Let’s take a look at your error-free SketchPadView class and its `OnTouch( )`
    method, which takes the `View` object (which it is) and a `MotionEvent` object
    as parameters, and returns a `false` value, which Eclipse coded in this way probably
    because the method currently does nothing, so false (says nothing was accomplished
    during this method call) is technically correct in this particular use-case. Later,
    you will be changing this return value to `true`.


    The `SketchPadView( )` method is a bit more interesting as it will create and
    set up your SketchPadView custom View object that you are creating with this class.
    The method has only one parameter passed into it by the Android OS, a `Context`
    object named `context`. Let’s learn a bit more about Context now!


    ![A978-1-4302-5786-8_17_Fig11_HTML.jpg](A978-1-4302-5786-8_17_Fig11_HTML.jpg)


    Figure 17-11.


    Examining a SketchPadView( ) constructor method, super(context) call, and Context
    Import statement


    ## The Android Context Class: Telling Your Activity Where It Is


    Android’s `Context` class is a direct subclass of the `java.lang.Object` class,
    just like the Paint and Canvas classes. The Context class was specifically designed
    for use in your Android apps for the purpose of defining `Context` objects for
    use in apps such as your Pro Android graphics applications.


    The Android Context class hierarchy is structured as follows:


    `java.lang.Object`


    `> android.content.Context`


    Android’s Context class belongs to the `android.content` package. Therefore, an
    `import statement` for using this Context class in an app references the `android.content.Context`
    package, as you’ve already seen in this book.


    The Context class is a `public abstract` class, which holds an application’s `contextual
    information`. This information contained within a Context object serves to describe
    `all information regarding your app` that is relevant to the Android OS and its
    ability to wire the application together properly.


    Essentially, a Context object allows the application component referencing it
    to look “above” itself into the construction of your application. More than two
    dozen `.get( )` related methods are included within a Context class; all of these
    allow access to application-specific system configuration, or application structure,
    and even application resource access or information.


    In a sense, a Context object represents everything you cannot “see” before your
    very eyes; everything that is “under the hood,” so to speak. A Context object
    thus provides the component that references it with an interface to “global” information
    about your application’s environment.


    The Context class will allow access to your application-specific resources and
    your custom classes. The Context class features methods that implement “up-calls”
    to application-level operations. Examples of this include launching an Activity
    subclass, broadcasting an app-wide message, sending and receiving an Intent object,
    or starting a Service object’s processing.


    Now you can see why Android chose the name Context for this class and for the
    object that it constructs. A good example of the use of Context can be seen in
    creating a View subclass; this is why we’re discussing the Context object here
    in this chapter, right before you create a SketchPadView View subclass.


    As you are learning in this chapter, you create a custom View by extending the
    View class using an `extends` keyword in the class declaration. You also saw that
    you must provide a constructor method that takes a Context object as its parameter.
    This is so that once you instantiate the custom View, you also are forced to pass
    in your Context object containing the context for your application. This is due
    to the fact that your View subclass needs to be able to have access to your application
    resources, classes, themes, and other similar application configuration details
    that a View needs to use.


    Creating a View subclass is actually the perfect example to use for why a Context
    object needs to be passed into a constructor method. Each Context object features
    various data fields that are set up by the Android OS to describe your application
    parameters, such as display dimension or screen density, or what visual OS theme
    (if defined) to use with the View object.


    Next, we will take a look at some of the key methods exposed by the Context class.
    This will provide an overview for you regarding what data a Context object might
    contain. For your `application`, there’s a `.getApplicationInfo( )` method call,
    as well as a `.getApplicationContext( )` method call.


    To grab onto your `application resources`, there is a `.getAssets( )` as well
    as a `.getResources( )` and `.getSharedResources( )` method call, a `.getText(
    )` and a `.getString( )` method call, and even a `.getContentResolver( )` method
    call.


    To access your `package`, there’s a `.getPackageName( )`, `.getPackageManager(
    )`, `.getPackageCodePath( )`, and `.getPackageResourcePath( )` method call.'
