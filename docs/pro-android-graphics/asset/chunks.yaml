- fmt: '# Figure 3-17. Final XML markup for an `ImageView` user interface element
    referencing `anim_intro` frame animation


    Next, let’s use the Run As ➤ Android Application work process to see the final
    result of the newly added `ImageView` user interface element XML markup. As you
    can see in Figure [3-18](#A978-1-4302-5786-8_3_Chapter.html#Fig18), you now have
    a professional end result.


    Don’t forget that you removed the `android:src` parameter in the XML tag markup
    for your `VideoView` user interface element in order to more clearly see what
    you are doing. Since you know that a PNG32 animation frame is going to provide
    perfect compositing results over any background, you can use a black background
    for now.


    ![A978-1-4302-5786-8_3_Fig18_HTML.jpg](A978-1-4302-5786-8_3_Fig18_HTML.jpg)


    **Figure 3-18.** The final output showing the `ImageView` tag parameters


    We could use a solid black or white background for the purpose of showing what
    we are doing in this chapter, but black will show this particular frame animation
    sequence the most clearly.


    We will utilize this temporary background replacement (only while we are developing
    the animation assets) technique in this chapter, and in the next chapter on Procedural
    animation, to show you that XML allows you to be very flexible and innovative
    in how you go about developing graphics applications. So, if you need to turn
    on or off certain compositing layers or even application UI elements or features,
    it’s quite easy to do in XML.


    We do this so that we can isolate exactly what the XML code is doing to make it
    more clear to you, the reader. Once that is accomplished, you can add the `android:src`
    parameter back into the XML markup. This will serve to turn back on the background
    video so you can see a final visual result.


    Now let’s switch from writing XML markup to writing Java code, so that you can
    implement everything you’ve built using XML markup within the existing `MainActivity.java`
    file’s Java program logic, using the `onCreate()` method.


    ## Instantiating the Frame Animation Definition Using Java


    If it is not open already, open Eclipse and click the `MainActivity.java` tab
    at the top of the central editing pane. Add a line of space (a return) after the
    Java code that sets your `ContentView`, and instantiate your `ImageView` user
    interface element, which will reference the XML definition you’ve been working
    on. This is done via the following single line of code:


    ```

    ImageView pag = (ImageView)findViewById(R.id.pagImageView);

    ```


    As you can see in Figure [3-19](#A978-1-4302-5786-8_3_Chapter.html#Fig19), there
    are some red wavy underline error flags that you need to address, as well as a
    red X error icon in the left margin.


    ![A978-1-4302-5786-8_3_Fig19_HTML.jpg](A978-1-4302-5786-8_3_Fig19_HTML.jpg)


    **Figure 3-19.** Creating an `ImageView` object named `pag` and referencing it
    to the `pagImageView` ID XML construct


    By now you should be getting familiar with the work process in Eclipse for researching
    why errors and warnings are appearing, so mouse-over and (or) click the error
    flag icons, or highlighting, and let’s see what Eclipse thinks is amiss inside
    your application logic at this point in time.


    As you can see in Figure [3-20](#A978-1-4302-5786-8_3_Chapter.html#Fig20), Eclipse
    is now complaining that it cannot resolve (use) the `ImageView` object type because
    the class that is used to create (instantiate) that object type is not available
    to it (imported).


    Fortunately, it provides a list of clickable solutions using the order of probability
    (that is, those most likely to provide the correct solution are listed first).
    In this case, Eclipse has guessed it correctly, so click the first solution offered,
    Import `ImageView` from the `android.widget` package. Once you add this import
    statement, you’ll then be able to use the `ImageView` class and all of its methods,
    constructors, constants, fields, and attributes.


    ![A978-1-4302-5786-8_3_Fig20_HTML.jpg](A978-1-4302-5786-8_3_Fig20_HTML.jpg)


    **Figure 3-20.** Mousing over the error highlighting in Eclipse to bring up the
    error message and quick fixes dialog


    Once you click this first solution and have Eclipse write your import code for
    you, you will see the new import statement added for you, as shown in Figure [3-21](#A978-1-4302-5786-8_3_Chapter.html#Fig21).
    However, there is still a yellow warning flag in this line of code, now under
    the page name of the `ImageView` object.


    Again mouse-over and (or) click to read the warning; in this case, it is simply
    that you have not yet implemented (utilized) this `pag` object that you have just
    created. Since you are about to use this object next, you can safely ignore this
    warning, and proceed to your next line of Java code.


    ![A978-1-4302-5786-8_3_Fig21_HTML.jpg](A978-1-4302-5786-8_3_Fig21_HTML.jpg)


    **Figure 3-21.** Mousing over the warning highlighting in Eclipse to bring up
    the warning message and quick fix dialog


    Next, you need to instantiate your `AnimationDrawable` object, which will do all
    of the heavy lifting of generating your frame animation. Name this object `pagAnim`,
    and then use the `.getDrawable()` method, called off of your `pag` `ImageView`
    object, to load this new `AnimationDrawable` object with your frame animation’s
    drawable assets. This is accomplished by using the following single line of Java
    code, as shown in Figure [3-22](#A978-1-4302-5786-8_3_Chapter.html#Fig22):


    ```

    AnimationDrawable pagAnim = (AnimationDrawable) pag.getDrawable();

    ```


    As you can see in Figure [3-22](#A978-1-4302-5786-8_3_Chapter.html#Fig22), you
    again have error flags in this line of code, which we now suspect are related
    to adding an import statement that is necessary to utilize the `AnimationDrawable`
    class.


    ![A978-1-4302-5786-8_3_Fig22_HTML.jpg](A978-1-4302-5786-8_3_Fig22_HTML.jpg)


    **Figure 3-22.** Creating an `AnimationDrawable` object named `pagAnim` and wiring
    it to `pag` object via `.getDrawable()`


    Mouse-over and click the error messages to generate the error message and fix-it
    solution dialog, and then click the link that will write the Java import statement
    for you. You’ve heard of agile development?! This is lazy development. It’s far
    superior, in my opinion. You can see the import code that Eclipse has again written
    for you in Figure [3-23](#A978-1-4302-5786-8_3_Chapter.html#Fig23) if you’re interested.


    Once you are back to having 100% clean code, you can add in the next line of code,
    which, now that you have wired your `pag` `ImageView` UI container to your `pagAnim`
    `AnimationDrawable` frame animation engine (object), you can call using the `.start()`
    method to start your frame animation playback cycle.


    This is done by calling a `.start()` method off of the `pagAnim` object, using
    the following short but powerful line of Java code, shown in Figure [3-23](#A978-1-4302-5786-8_3_Chapter.html#Fig23):


    ```

    pagAnim.start();

    ```


    Now you are ready to use the Run As ➤ Android Application work process and test
    your frame animation to see if it works properly. Let’s do that next!


    ![A978-1-4302-5786-8_3_Fig23_HTML.jpg](A978-1-4302-5786-8_3_Fig23_HTML.jpg)


    **Figure 3-23.** Adding the `.start()` method call to the newly created `pagAnim`
    `AnimationDrawable` object


    Run the application in your Nexus One emulator, and you will see that the Pro
    Android Graphics logo is animating smoothly on your startup screen after your
    application launches. Congratulations, you have implemented a full-screen startup
    (splash screen) animation in Android, using only 2MB to cover all of the resolution
    density Android devices that are out there!'
