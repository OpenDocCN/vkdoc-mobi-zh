  trans: '

    # Android 数字成像：格式、概念与优化


    ## 摘要


    在第一章中，你将了解数字成像如何在 Android 操作系统中实现。我们将探讨 Android 支持的 数字图像格式、允许在屏幕上格式化图像的类，以及你需要理解的基本数字成像概念，以便跟上后续
    Android 图形设计的内容。


    我们还将探讨如何为 Android 应用开发优化你的数字图像资源。我们将从单个图像资源的数据占用空间和 Android 设备类型的市场覆盖范围这两个角度来探索数字图像优化。


    如你所知，Android 设备早已不仅仅是智能手机，而是涵盖了从手表、手机、平板电脑、游戏机到 4K iTV 电视的各种设备。这对 Android 应用开发的图形设计方面的重要意义在于，你现在必须为你的数字图像资源创建像素范围更广的图片，分辨率从低至
    240 像素到高至 4096 像素，并且必须针对每一个数字图像资源都这样做。


    我们将研究 Android 为此提供的工具，作为应用开发工作流程和资源引用 XML（可扩展标记语言）标记的一部分。标记与 Java 代码的不同之处在于，它像
    HTML（超文本标记语言）一样使用“标签”。XML 与 HTML 非常相似，都使用这些标签结构，但不同之处在于 XML 是可定制的，这也是谷歌选择在 Android
    操作系统中使用它的原因。


    由于这是一本专业级别的书籍，我假设你对 Android 平台开发有相当丰富的经验，并且已经通过一本 Android 教学书籍（例如我的《学习 Android
    应用开发》（Apress，2013 年））完成了学习过程。


    让我们从了解 Android 支持哪些图像格式开始。


    ## Android 的数字图像格式：无损与有损


    Android 支持几种流行的数字图像格式，其中一些已经存在了几十年，例如 CompuServe 的 GIF（图形交换格式）和 JPEG（联合图像专家组）格式，还有一些是较新的格式，例如
    PNG（便携式网络图形）和 WebP（由 ON2 开发，后被谷歌收购并开源）。


    我将按照它们的起源顺序来讨论，从最古老（因此也是最不理想的）的 GIF 到最新（因此也是最先进的）的 WebP 格式。CompuServe 的 GIF 格式完全受
    Android 操作系统支持，但不推荐使用。GIF 是一种无损的数字图像文件格式，因为它不会丢弃图像数据来实现更好的压缩效果。


    这是因为 GIF 压缩算法不如 PNG 精细（或者说强大），并且它只支持索引颜色，你将在本章中详细了解这一点。也就是说，如果你所有的图像资源都已经创建好且为
    GIF 格式，你仍然可以在 Android 应用中使用它们，除了最终画质一般外，不会有其他问题。


    Android 支持的下一个最古老的数字图像文件格式是 JPEG，它使用真彩色深度而不是索引颜色深度。我们稍后将讨论颜色理论和颜色深度。


    JPEG 被认为是有损的数字图像文件格式，因为它会丢弃（丢失）图像数据以实现更小的文件体积。需要注意的是，压缩后原始图像数据将无法恢复，因此请务必保存一份原始的未压缩图像文件。


    如果你在压缩后放大 JPEG 图像，你会看到原始图像中没有的变色区域效果。这些图像数据中退化的区域在数字成像领域被称为压缩伪影，并且只会在有损图像压缩中出现。


    Android 中最推荐的图像格式是 PNG（便携式网络图形）文件格式。PNG 包含索引颜色版本（称为 `PNG8`）和真彩色版本（称为 `PNG24`）。`PNG8`
    和 `PNG24` 扩展名代表了颜色支持的位深度，我们稍后会详细讨论。在数字图像行业中，PNG 读作“ping”。


    PNG 是 Android 推荐使用的格式，因为它具有不错的压缩率、无损特性，因此既保证了高图像质量，又具有合理的压缩效率。


    最新的图像格式是在谷歌收购 ON2 后加入 Android 的，称为 WebP 图像格式。该格式在 Android 2.3.7 及以上版本中支持图像读取（或回放），在
    Android 4.0 及以上版本中支持图像写入（或文件保存）。WebP 是 WebM 视频文件格式的静态（图像）版本，在行业内也被称为 VP8 编解码器。你将在后续章节中学习所有关于编解码器和压缩的知识。

    '
- fmt: '## Android View and ViewGroup Classes: Image Containers


    Everything in this section is just a review of Android Java class concepts and
    constructs, which you, as an intermediate level Android programmer, probably understand
    already. Android OS has a class that is dedicated to displaying digital imagery
    and digital video called the `View` class. The `View` class is subclassed directly
    from the `java.lang.Object` class; it is designed to hold imagery and video, and
    to format it for display within your user interface screen designs. If you wish
    to review what the `View` class can do, visit the following URL:


    [`http://developer.android.com/reference/android/view/View.html`](http://developer.android.com/reference/android/view/View.html)


    All user interface elements are based on (subclassed from) the `View` class, and
    are called widgets and have their own package called `android.widget`, as most
    developers know. If you are not that familiar with Views and Widgets, you might
    consider going through the Learn Android App Development book before embarking
    on this one. If you wish to review what Android Widgets can do, visit the following
    URL:


    [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


    The `ViewGroup` class is also subclassed from the `View` class. It is used to
    provide developers with the user interface element container that they can use
    to design their screen layout and organize their user interface widget `View`
    objects. If you wish to review the various types of Android `ViewGroup` Screen
    Layout Container classes, visit the following URL:


    [`http://developer.android.com/reference/android/view/ViewGroup.html`](http://developer.android.com/reference/android/view/ViewGroup.html)


    Views, ViewGroups and widgets in Android are usually defined using XML. This is
    set up this way so that designers can work right alongside the coders in the application
    development, as XML is far easier to code in than Java is.


    In fact, XML isn’t really programming code at all; it’s markup, and, just like
    HTML5, it uses tags, nested tags, and tag parameters to build constructs that
    are later used in your Android application.


    Not only is XML utilized in Android to create user interface screen design but
    also menu structures, string constants, and to define your application version,
    components, and permissions inside the `AndroidManifest.xml` file.


    The process of turning your XML data structures into Java–code–compatible objects
    that can be used with your Android application Java components is called inflating
    XML markup, and Android has a number of inflater classes that perform this function,
    usually in component startup methods, such as the `onCreate()` method. You will
    see this in some detail throughout the Java coding examples in this book, as it
    bridges our XML markup and Java code.


    ## The Foundation of Digital Images: Pixels and Aspect Ratio


    Digital images are made up of two-dimensional arrays of pixels, which is short
    for picture (pix) elements (els). The number of pixels in an image is expressed
    by its resolution, which is the number of pixels in both the Height (H) and Width
    (W) dimensions.


    To find the number of pixels in an image, simply multiply the Width pixels by
    the Height pixels. For instance, an HDTV 1920 x 1080 image will contain 2,073,600
    pixels, or slightly more than 2 million pixels. Two million pixels could also
    be referred to as two megapixels.


    The more pixels that are in an image, the higher its resolution; just like with
    digital cameras, the more megapixels are in the data bank, the higher the quality
    level that can be achieved. Android supports everything from low resolution 320
    x 240 pixel display screens (Android Watches and smaller flip-phones) to medium
    resolution 854 x 480 pixel display screens (mini-tablets and smartphones), up
    to high resolution 1280 x 720 pixel display screens (HD smartphones and mid-level
    tablets), and extra high resolution 1920 x 1080 pixel display screens (large tablets
    and iTV sets). Android 4.3 adds support for 4K resolution iTVs, which feature
    4096 by 2160 resolution.


    A slightly more complicated aspect (no pun intended) of image resolution is the
    image aspect ratio, a concept that also applies to display screens. This is the
    ratio of width to height, or W:H, and will define how square or rectangular (popularly
    termed widescreen) an image or a display screen is.


    A 1:1 aspect ratio display (or image) is perfectly square, as is a 2:2 or a 3:3
    aspect ratio image. You see, it is the ratio between the two numbers that defines
    the shape of the image or screen, not the numbers themselves. An example of an
    Android device that has a 1:1 square aspect ratio would be an Android SmartWatch.


    Most Android screens are HDTV aspect ratio, which is 16:9, but some are a little
    less wide, as in 16:10 (or 8:5 if you prefer). Wider screens will also surely
    appear, so look for 16:8 (or 2:1, if you prefer) ultra-wide screens that have
    a 2160 by 1080 resolution LCD or LED display.


    The aspect ratio is usually expressed as the smallest pair of numbers that can
    be achieved (reached) on either side of the aspect ratio colon. If you paid attention
    in high school when you were learning about lowest common denominators, then this
    aspect ratio should be fairly easy to calculate.


    I usually do this by continuing to divide each side by two. So, taking the fairly
    odd-ball 1280 x 1024 SXGA resolution as an example, half of 1280 x 1024 is 640
    x 512, and half of that is 320 x 256, half of that is 160 x 128, half of that
    is 80 x 64, half of that is 40 x 32, half of that is 20 x 16, half of that is
    10 x 8, and half of that is 5 x 4, so an SXGA screen is a 5:4 aspect ratio.


    Original PC screens primarily offered a 4:3 aspect ratio; early CRT tube TVs were
    nearly square, featuring a 3:2 aspect ratio. The current market trend is certainly
    towards wider screens and higher resolution displays; however, the new Android
    Watches may change that back towards square aspect ratios.'
