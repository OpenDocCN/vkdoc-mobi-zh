    /src/pro.android.graphics folder in the Package Explorer and select the Open option,
    or left-click and use an F3 key if you prefer.


    This file is highlighted in the left side of the IDE in the Package Explorer pane
    in Figure [2-10](#A978-1-4302-5786-8_2_Chapter.html#Fig10), and is shown already
    open for editing in the Eclipse central code editing pane. Notice that your application
