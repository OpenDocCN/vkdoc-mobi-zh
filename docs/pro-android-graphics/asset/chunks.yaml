  trans: '

    需要注意的是，由于你的图像图层堆栈（即`LayerDrawable`对象）的设置方式，现在实现这一点变得非常容易。通过使用 XML 定义文件，你已将数字图像分层中的图形设计工作分散化，因此你只需快速切换第二和第三个子`<item>`标签中的两个`android:drawable`参数引用即可。


    接下来，让我们进行此操作，以便你可以看到由 Android（以及通过 GLE 的 Eclipse ADT）渲染出的这种不同图层堆栈顺序的结果。它们可能与你预期的并不完全一致！


    ![A978-1-4302-5786-8_12_Fig7_HTML.jpg](img/A978-1-4302-5786-8_12_Fig7_HTML.jpg)


    **图 12-7.** 使用图形布局编辑器查看`contents_layers.xml`中`LayerDrawable`的结果


    接下来，点击 Eclipse 顶部的`contents_layer.xml`标签，切换回`LayerDrawable`对象 XML 定义编辑模式，进行这两个参数图像资源的引用修改，如图
    12-8 所示。


    你最终的`contents_layers.xml`中这三个`<item>`子标签的`LayerDrawable`对象定义 XML 标记，如图 12-8 所示，应完全如下
    XML 标记结构所示：


    ```

    <item

    android:id="@+id/layerOne"

    android:drawable="@drawable/cloudsky" />

    <item

    android:id="@+id/layerTwo"

    android:drawable="@drawable/ninepatchframe" />

    <item

    android:id="@+id/layerThree"

    android:drawable="@drawable/bookmark0" />

    ```


    ![A978-1-4302-5786-8_12_Fig8_HTML.jpg](img/A978-1-4302-5786-8_12_Fig8_HTML.jpg)


    **图 12-8.** 更改可绘制对象的图层顺序，将`ninepatchframe`图像资源置于`bookmark0`之下


    现在你已准备好，可以在图形布局编辑器标签页中测试新的图层合成堆栈。由于在图 12-8 所示的`contents_layers` XML 编辑窗格中无法使用该编辑器，你需要点击
    Eclipse 顶部的`activity_contents.xml`标签，然后点击底部的图形布局编辑器标签页，以便查看修改后的图像资源多层合成（`LayerDrawable`对象），如图
    12-9 所示。


    你首先会注意到的是，书签图像的环扣部分并未像你可能预期的那样覆盖在`ninepatchframe`图像图层之上。思考片刻，9-patch 图像资源的哪些属性可能影响了这个特定图层堆栈合成顺序的渲染管线计算？你猜到了吗？


    回顾一下讲解 Android `NinePatch`类的章节（第 10 章），当时你使用右侧和底部的单像素黑色边框线段为这个 9-patch 图像资源定义了内边距值。如果你还记得，这个内边距区域的作用是定义（或强制）任何放置在该`NinePatch`资源内部的内容，都必须位于你之前指定的内边距区域内。本质上，内边距确保了你的`NinePatch`资源的“外围图稿”不会被遮挡。


    这就是你现在看到的书签图像资源图层位于`ninepatchframe` 9-patch 图像资源之上，并因此在其内部渲染的原因。


    那么，你可能会想，我如何让环扣覆盖在 9-patch 图像资源框架之上呢？要实现这一点，请返回你的 Draw 9-patch 工具，将底部和右侧的黑色线条一直延伸到图像资源的边缘。这将告知
    Android，你希望放入（或在此情况下，覆盖在）该 9-patch 资源上的内容能够与资源的图像组件及其内部空间重叠。你还可以在该 9-patch 内部空间内定义一个
    alpha 通道，以便将来进行合成操作，就像你现在所做的那样。


    ![A978-1-4302-5786-8_12_Fig9_HTML.jpg](img/A978-1-4302-5786-8_12_Fig9_HTML.jpg)


    **图 12-9.** 使用图形布局编辑器查看`contents_layers.xml`中`LayerDrawable`的新结果


    你接下来应该做的是，在 Nexus One 模拟器中测试这个`LayerDrawable`并查看结果，确保你的`LayerDrawable`对象能够与你的
    Java 合成代码协同工作。


    使用 **Run As ➤ Android Application** 工作流程，在 Nexus One 模拟器中启动你的 Android 应用程序；注意在图
    12-10 的左侧，你的`LayerDrawable`渲染管线（之前在图形布局编辑器中看到的，如图 12-9 所示）并未在 Nexus One 中显示。这不是你的
    XML 标记的问题（通过 GLE 你已经知道它工作正常），所以问题一定出在你的 Java 代码上。


    ![A978-1-4302-5786-8_12_Fig10_HTML.jpg](img/A978-1-4302-5786-8_12_Fig10_HTML.jpg)


    **图 12-10.** 在 Nexus One 模拟器中运行`GraphicsDesign`应用程序以查看你的`LayerDrawable`


    让我们点击`ContentsActivity.java`标签查看你的 Java 代码。如图 12-11 代码列表底部所示，我找到了问题并将其注释掉，这样 XML
    定义就能显示出来了。


    ![A978-1-4302-5786-8_12_Fig11_HTML.jpg](img/A978-1-4302-5786-8_12_Fig11_HTML.jpg)


    **图 12-11.** 移除`.setImageBitmap()`方法调用，以允许`LayerDrawable` XML 定义显示


    发生的情况是，在你的 Java 代码的最后两行，你实例化了`ImageView`对象——这行代码对于显示你的`LayerDrawable`定义仍然效果很好——但随后你通过`.setImageView()`方法调用将`Canvas`对象写入到该`ImageView`中。因此，最后一行代码遮挡了`LayerDrawable`的显示，所以我将其注释掉并得到了预期的结果，如图
    12-10 屏幕截图的右侧所示。


    因此，从 Android 的处理角度来看，发生的情况是：你在 XML 中定义了你的`LayerDrawable`，并设置了你的`ImageView`对象来正确显示它——你在之前的设计和标记编码工作过程中通过使用
    Eclipse 的图形布局标签页确认了这一点。


    然而，在你一直在`ContentsActivity`中编写的图像合成 Java 代码中，这个`LayerDrawable`对象被你的编程调用所覆盖，该调用将`Canvas`对象的图像内容放置到（覆盖）了这个`LayerDrawable`合成之上，而你（至少在你编写代码时）对此并不知情。


    最终，你将不得不重做部分代码，以整合`LayerDrawable`的使用，并了解如何提取`LayerDrawable`对象的图像图层并将它们放入一个`PorterDuff`图像混合管线中。目前，我只是简单地使用了注释功能，在代码行的开头放置了两个正斜杠。这当然使其不再参与执行，从而暂时解决了问题。我这样做只是为了确认`LayerDrawable`在
    XML 标记中确实设置正确，并且使用当前的 Java 代码（或至少大部分 Java 代码）是可见的。


    下一个挑战是将`LayerDrawable`对象的图层集成到一个`PorterDuff`混合管线中，因此你必须在下一节中修改你的 Java 代码，以实例化你的`LayerDrawable`对象，提取你想要通过你创建的`PorterDuff`混合基础设施处理的图层，将这些`Drawable`对象转换为`Bitmap`对象并使其可变（作为
    32 位图像数据放入系统内存），然后确保它们处于 **Paint ➤ Canvas** 渲染循环中。

