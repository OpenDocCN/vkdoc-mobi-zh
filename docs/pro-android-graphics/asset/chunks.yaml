    \ `Message` 对象的，你可以从参数列表中传入的 `Message` 对象看出这一点，而非像 `.post()` 方法那样针对 `Runnable`\
    \ 对象。\n\n`.sendMessage()` 方法还允许开发者将包含 `Bundle` 对象的 `Message` 对象加入队列，该 `Bundle`\
    \ 对象中携带的数据将由 Handler 的 `.handleMessage(Message)` 方法处理。这要求你实现 Android 中 `Handler`\
    \ 类的子类。\n\n现在，我已经介绍了 `Runnable` 的一点背景知识以及它如何 `.run()` 这个 `frameAnimation.startAnimation()`\
    \ 处理语句，你可以在 Nexus One 模拟器中测试你的帧动画了（该动画现已从 XML 转换为 Java 代码）。使用 `Run As` ➤ `Android\
    \ Application` 工作流程启动你的应用程序，如图 14-9 所示，动画将在应用启动时无缝循环播放，就像之前一样。\n\n![A978-1-4302-5786-8_14_Fig9_HTML.jpg](img/A978-1-4302-5786-8_14_Fig9_HTML.jpg)\n\
    \n**图 14-9.** 在 Nexus One 模拟器中测试你的 `AnimationDrawable`\n\n在模拟了之前已有的帧动画之后（下一章你将添加程序化动画部分），我们来探讨更高级的内容。你将学习如何使用事件处理器触发动画，这样你就可以点击你的\
    \ PAG 标志来启动动画了。\n\n## 设计一个循环回到第一帧的 AnimationDrawable\n\n首先，你将设置你的 `AnimationDrawable`\
    \ 使其无缝循环一次，因为当前最后一帧并没有使标志完全“垂直”。为此，你需要复制代码中的第一个 `.addFrame()` 方法调用，并将其粘贴到最后一个\
    \ `.addFrame()` 方法调用之后，如图 14-10 所示。为保持时间一致，第一个方法调用使用持续时间值 111（与其他帧相同），最后一个方法调用使用值\
    \ 1（补齐一秒钟的余量）。\n\n![A978-1-4302-5786-8_14_Fig10_HTML.jpg](img/A978-1-4302-5786-8_14_Fig10_HTML.jpg)\n\
    \n**图 14-10.** 将 `.setOneShot()` 方法设置为 `true` 并添加一个结束帧，使标志在动画结束时平铺于屏幕\n\n这样可以确保在动画结束时将第一帧绘制到屏幕上，使你的\
    \ PAG 标志看起来与动画开始时一致。当 `.setOneShot()` 方法设置为 `false` 时，这并不重要，但如图 14-10 所示，你将把它设置为\
    \ `true`，因此你所做的操作是必要的！\n\n使用 `Run As` ➤ `Android Animation` 工作流程，当你的应用程序启动时（仔细观察），你的动画将循环一次并回到直立位置。乘客们请注意：请将你们的动画调回直立位置！感谢您乘坐\
    \ Apress 航空。\n\n接下来，你将改回无限循环动画并实现事件处理，以便你可以通过点击和长按事件来控制动画。这样做是为了在你实现诸如动画儿童故事书应用等酷炫功能时，读者可以点击页面中的图形元素来启动动画（并通过长按来停止动画）。接下来，我们将介绍实现所有这些功能的工作流程，当然，仅使用\
    \ Java 代码。\n\n## 添加事件处理以实现点击触发帧动画\n\n为了让你的图形元素——在你这里指的是 PAG 标志，但也可能是你儿童故事书中的鱼缸里的鱼（免费创意送给你啦）——能够响应命令进行动画（`onClick`），你需要为显示\
