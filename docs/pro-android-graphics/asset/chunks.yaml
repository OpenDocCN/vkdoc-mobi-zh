    When you start the Sorenson Squeeze 9 Pro package, you will see a copyright start-up
    screen, as shown in Figure [2-21](#A978-1-4302-5786-8_2_Chapter.html#Fig21), with
    progress text telling you what stage of loading the software you are in, like
    initializing the UI.


    ![A978-1-4302-5786-8_2_Fig21_HTML.jpg](A978-1-4302-5786-8_2_Fig21_HTML.jpg)


    Figure 2-21.


    Squeeze Pro 9 start-up copyright screen


    The next screen that you will see (Figure [2-22](#A978-1-4302-5786-8_2_Chapter.html#Fig22))
    is the Welcome to Squeeze dialog, which contains video tutorials and squeeze resources.
    As I did with VirtualDub, I recommend that you take advantage of assets such as
    this in order to familiarize yourself with the software package before you leverage
    it in your work.


    ![A978-1-4302-5786-8_2_Fig22_HTML.jpg](A978-1-4302-5786-8_2_Fig22_HTML.jpg)


    Figure 2-22.


    Welcome to Squeeze screen offering seven video tutorials and five Squeeze resources


    When you close the tutorial window using the Close Tutorial button on the bottom
    right, you will see the main Squeeze user interface window that is shown in Figure
    [2-23](#A978-1-4302-5786-8_2_Chapter.html#Fig23). This has areas for input options
    and video editing.


    ![A978-1-4302-5786-8_2_Fig23_HTML.jpg](A978-1-4302-5786-8_2_Fig23_HTML.jpg)


    Figure 2-23.


    Sorenson Squeeze application showing video codec formats on left and the Import
    File icon at top left


    Click the Import File button at the top left to open the dialog shown in Figure
    [2-24](#A978-1-4302-5786-8_2_Chapter.html#Fig24), allowing you to navigate to
    the AVIs folder and open a file.


    ![A978-1-4302-5786-8_2_Fig24_HTML.jpg](A978-1-4302-5786-8_2_Fig24_HTML.jpg)


    Figure 2-24.


    Squeeze 9.0 Professional''s Import File dialog, showing Terragen3 path and PAG480x800
    file name


    Once you find the PAG480x800.avi file and highlight it and click the Open button,
    or double-click the file itself once you find it, the AVI will be opened up in
    the video editing section of Squeeze 9 on the right side, as shown in Figure [2-25](#A978-1-4302-5786-8_2_Chapter.html#Fig25).
    Note that your source file is also designated in the bottom “processing” area
    of the software and that I have opened the MPEG-4 codec setting presets up in
    the Formats tab in the Audience Presets section of the software, which is shown
    on the left side of the software.


    ![A978-1-4302-5786-8_2_Fig25_HTML.jpg](A978-1-4302-5786-8_2_Fig25_HTML.jpg)


    Figure 2-25.


    Squeeze showing imported PAG480x800.avi file at bottom (in blue) and the right-clicking
    of the Edit menu item


    Right-click the current preset for 480p video, which is what you are going to
    compress, and select the Edit option. You will be editing these presets (compression
    parameters) for use in Android. This means taking a bit rate from 1200 to 1024,
    and a few other adjustments, which you will make next.


    The first thing that you will want to do in the Presets dialog, which you can
    see in Figure [2-26](#A978-1-4302-5786-8_2_Chapter.html#Fig26), is to give your
    new Android480x800p preset a name, as well as a new description of Android 480
    by 800 in the Desc data field.


    Make sure the Format Constraints drop-down shows None, and the Stream Type drop-down
    shows Non-Streaming not Hinted, as you’re creating captive video.


    ![A978-1-4302-5786-8_2_Fig26_HTML.jpg](A978-1-4302-5786-8_2_Fig26_HTML.jpg)


    Figure 2-26.


    Squeeze 9 Video Compression Presets dialog and settings


    Make sure that the Codec is selected (checked) and set to MainConcepts H.264,
    as that codec has the best size-to-quality performance. The Frame Rate selection
    should be set to the default 1:1 setting, instructing the codec to compress every
    frame in your Terragen 3 animation sequence AVI.


    The compression method should be set to a multi-pass, which takes the most data
    processing cycles (the longest time to compress), but also yields the best results,
    as you will be seeing at the end of this section.


    Change your data rate target to 768 KBPS, and select the Constrain Maximum Data
    Rate option and set a max data rate target overshoot allowance of 33% or one-third
    by setting a value of 133% in this data field. This will give you the 1024 KBPS,
    or 1 MBPS, data amount that you want Android to process.


    On the right side of the dialog, select the Frame Size option of Same as source
    so that your pixels are not scaled in any way, and set the Key Frames option to
    Key Frame Every 10 Frames, or once per second, as you are using 10 FPS currently
    for your animation to give a slow but steady fly-through effect.


    Finally, leave the Auto Key Frame on Scene Change box selected (checked), and
    the Rare to Frequent slider set to the median 50% value, and click the OK button.
    This will save your settings into the new Android480x800p preset, which is shown
    on the left side of the Squeeze software in Figure [2-27](#A978-1-4302-5786-8_2_Chapter.html#Fig27).


    ![A978-1-4302-5786-8_2_Fig27_HTML.jpg](A978-1-4302-5786-8_2_Fig27_HTML.jpg)


    Figure 2-27.


    Squeeze showing newly created Android480x800p video codec settings applied to
    PAG480x800.avi


    The next step in the work process is to apply this new preset to your .AVI file
    that you have imported. This is done using the Apply button located at the bottom
    right corner of the Formats (or the presets) pane.


    Before you click the Apply button, be sure that the Android480x800p preset is
    selected (blue), so that it is the preset that’s applied to your .AVI digital
    video asset’s full frames uncompressed source data.


    Once you click the Apply button, you will see the format preset applied to your
    Source AVI right underneath it, as shown in Figure [2-27](#A978-1-4302-5786-8_2_Chapter.html#Fig27).
    Make sure that you see this before you click the Squeeze It! button in the bottom
    right corner of the software (you can see this button in Figure [2-25](#A978-1-4302-5786-8_2_Chapter.html#Fig25)).


    Once you click the Squeeze It! button you will get a blue progress bar, which
    is shown on the right-hand side in Figure [2-27](#A978-1-4302-5786-8_2_Chapter.html#Fig27),
    and next to the Job status bar at the top of your Project Settings area at the
    bottom of the Squeeze software. Once the compression process has been completed,
    you will see an icon of your video asset with a Play button over it, as shown
    in Figure [2-28](#A978-1-4302-5786-8_2_Chapter.html#Fig28). You can click it to
    preview your compressed MP4 file.


    ![A978-1-4302-5786-8_2_Fig28_HTML.jpg](A978-1-4302-5786-8_2_Fig28_HTML.jpg)


    Figure 2-28.


    Squeeze showing completed compressed MP4 file, Play icon, video codec used, and
    other settings


    Use Explorer to compare original and compressed size, as shown in Figure [2-29](#A978-1-4302-5786-8_2_Chapter.html#Fig29).


    ![A978-1-4302-5786-8_2_Fig29_HTML.jpg](A978-1-4302-5786-8_2_Fig29_HTML.jpg)


    Figure 2-29.


    Using Windows Explorer to compare relative file size (compressed vs. raw)


    Let’s do the math to see what magnitude of compression you have obtained using
    these settings. If you divide these two numbers into each other, in either direction
    (swap numerator and denominator if you wish; it is the same as inverting the result)
    you get close to a 120:1 compression ratio, or, looking at it from the other (inverted)
    direction, the compressed file is 0.8367% of original raw data footprint, or 99.16%
    more compressed than the original file. I told you that you’d be amazed at what
    codecs can do!'
