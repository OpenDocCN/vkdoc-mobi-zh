- fmt: '请注意，您省略了文件名引用中的`.png`文件扩展名，并在其前面加上`@drawable/`路径，这告诉 Android 操作系统在`/res/drawable`文件夹中查找资源。请确保不要引用特定的分辨率密度文件夹，因为
    Android 会在运行时根据用户使用的设备自动处理。


    您可能想知道我用于`android:duration`值的 112 毫秒从何而来。由于我希望这个动画在一秒内流畅播放，我将九帧除以 1000 毫秒，得到 111
    的值。因为 111 x 9 等于 999，所以我将第一帧设为 112，其余帧设为 111，这样加起来正好是 1000 毫秒（这是毫秒的行业术语），即一秒钟的总动画时长。


    接下来，您需要复制并粘贴第一个`<item>`标签，放在它下方，使用相同的缩进，并将`android:duration`的值改为 111，同时将`android:drawable`引用改为`@drawable/pag1`，以便它引用动画序列第二帧的文件。


    完成后，再复制这个第二个`<item>`标签七次，放在它下方，确保缩进与前两个对齐。然后将`@drawable/`文件名改为`pag2`到`pag8`，如图
    3-7 所示，其中我展示了最终的`<animation-list>`父标签以及九个子`<item>`标签，它们指定了动画帧及其持续时间。


    ![A978-1-4302-5786-8_3_Fig7_HTML.jpg](A978-1-4302-5786-8_3_Fig7_HTML.jpg)


    **图 3-7.** 在`<animation-list>`父容器标签内添加`<item>`子标签，以向动画添加帧


    现在您已经以 XML 文件定义的形式创建了帧动画资源，是时候从现有的`activity_main.xml`用户界面 XML 定义中引用这个新资源了。接下来我们使用
    Android 的`ImageView`小部件来实现，这样您可以获得一些使用`ImageView`的经验。


    ## 在 ImageView 中引用帧动画定义


    现在让我们在您的`activity_main.xml`用户界面定义中添加一个`ImageView`小部件。点击 Eclipse 中央编辑面板顶部的`activity_main.xml`选项卡，暂时移除`VideoView`标签中的`android:src`参数。


    您此时这样做的目的是为了更清楚地看到帧动画的效果；稍后您可以替换回数字视频源文件的引用。这是将内容定义在 XML 文件中的最方便之处之一；它允许您在开发过程中“微调”用户界面，使开发更轻松，同时也可以在开发过程中尝试不同的设置，而不是在更耗时的测试过程中进行。


    将光标放在`<VideoView>`结束的`>`字符之后，按回车键，让 Eclipse 为您缩进下一个标签。


    然后输入`<`字符，如您所知，这将调出`<FrameLayout>`标签助手对话框，它会准确告诉您在这个`FrameLayout` UI 容器父标签内有哪些标签可用。


    在这个`FrameLayout`标签助手对话框中向下滚动，直到看到`ImageView`标签，然后双击它以选中它。这会将`ImageView`小部件标签插入到您的`FrameLayout`用户界面容器中。此工作过程如图
    3-8 和图 3-9 所示。


    ![A978-1-4302-5786-8_3_Fig8_HTML.jpg](A978-1-4302-5786-8_3_Fig8_HTML.jpg)


    **图 3-8.** 在 Eclipse 中键入`<`字符以调出`FrameLayout`父容器标签的助手对话框


    现在您的`ImageView`小部件标签已经就位，让我们输入`android`关键字和冒号，以调用`ImageView`标签助手对话框，它会准确告诉您`ImageView`小部件有哪些参数选项可用；如您所见，参数非常多！


    要想估算任何给定标签或参数助手对话框中的条目数量，一个很酷的技巧是统计对话框中显示的标签或参数数量，然后乘以可见对话框所占的分数。这个分数由对话框右侧滚动条的大小决定。在这种情况下，滚动条手柄大约占整个滚动条区域的五分之一，因此要得到一个相当接近的`ImageView`小部件参数数量的估算值，将
    17（参数）乘以 5，大约为 85 个参数。


    任何用户界面小部件的两个必需参数是布局宽度和布局高度，因此请先双击添加它们，如图 3-9 和图 3-10 所示。通常与这些参数一起使用的两个主要值是`match_parent`和`wrap_content`。两者都是
    Android 常量，并且彼此作用相反。`match_parent`参数会将小部件的宽度或高度扩展到匹配小部件标签所嵌套的父容器大小，因此在这种情况下，它会将`ImageView`（及其内容）放大很多，以匹配`FrameLayout`屏幕的大小。


    ![A978-1-4302-5786-8_3_Fig9_HTML.jpg](A978-1-4302-5786-8_3_Fig9_HTML.jpg)


    **图 3-9.** 在`<ImageView>`标签内键入`android:`以调出所有`ImageView`标签参数的助手对话框


    而`wrap_content`则会将用户界面小部件缩放到匹配该 UI 小部件中包含的内容大小。我将首先使用`match_parent`来向您展示该参数的作用，然后稍后我会将其改为`wrap_content`，以便您了解该参数的作用。


    ![A978-1-4302-5786-8_3_Fig10_HTML.jpg](A978-1-4302-5786-8_3_Fig10_HTML.jpg)


    **图 3-10.** 添加`android:src`源参数以引用您之前创建的`anim_intro.xml`文件'
  raw: 'Notice that you omit the .png file name extension inside the file name reference,
    and preface it with an @drawable/ path, which tells the Android OS to look in
    the /res/drawable folders in order to find an asset. Make sure not to reference
    a particular resolution density specific folder, as Android does that at runtime,
    depending on what device the user is using.


    You may be wondering where I got the 112 milliseconds value from, which you are
    using for your android:duration value. Since I wanted this animation to play smoothly
    over a one-second duration, I divided the nine frames into 1000 milliseconds and
    got a value of 111\. Since 111 x 9 is 999, I made the first frame 112 and the
    rest 111 so that it adds up to an even 1000 millis (an industry term for milliseconds)
    or one second total animation duration.


    Next, you need to copy and paste this first <item> tag underneath itself, using
    the same indentation, and change the value of android:duration to be 111, and
    change the android:drawable reference to @drawable/pag1, so that it will reference
    the file for the second frame of your animation sequence.


    Once this is done, copy this second <item> tag seven more times underneath itself,
    making sure that the indentation lines up with the first two. Then change the
    @drawable/file names to pag2 through pag8, as shown in Figure [3-7](#A978-1-4302-5786-8_3_Chapter.html#Fig7),
    where I show the final <animation-list> parent tag along with nine child <item>
    tags, which specify the animation frames and their durations.


    ![A978-1-4302-5786-8_3_Fig7_HTML.jpg](A978-1-4302-5786-8_3_Fig7_HTML.jpg)


    Figure 3-7.


    Adding <item> child tags inside <animation-list> parent container tag to add frames
    to the animation


    Now that you have created your frame animation asset in the form of an XML file
    definition, it’s time to reference that new asset from your existing activity_main.xml
    user interface XML definition. Let’s do that next, using an Android ImageView
    widget so you can get some experience with ImageView.


    ## Reference the Frame Animation Definition in an ImageView


    Now let’s add an ImageView widget to your activity_main.xml user interface definition.
    Click the activity_main.xml tab at the top of your Eclipse central editing pane,
    and temporarily remove the android:src parameter in the VideoView tag.


    You’re doing this at this time so that you can see what you are doing with your
    frame animation more clearly; you can replace the reference to the digital video
    source file later. This is one of the most convenient things about having things
    defined in an XML file; it allows you to “tweak” things about your UI during development
    to make development easier, as well as to experiment with different settings during
    the development process, instead of during the testing process, which can be more
    time-consuming.


    Place your cursor after the end of the <VideoView> closing > character, and hit
    the return key, allowing Eclipse to indent your next tag for you.


    Then you can type in the < character, which, as you know, will bring up the <FrameLayout>
    tag helper dialog, which will tell you exactly which tags are available for use
    inside this Framelayout UI container parent tag.


    Scroll down inside this FrameLayout tag helper dialog until you see the ImageView
    tag, and then double-click it to select it. This will insert the ImageView widget
    tag inside your FrameLayout user interface container. This work process is shown
    in Figure [3-8](#A978-1-4302-5786-8_3_Chapter.html#Fig8) and Figure [3-9](#A978-1-4302-5786-8_3_Chapter.html#Fig9).


    ![A978-1-4302-5786-8_3_Fig8_HTML.jpg](A978-1-4302-5786-8_3_Fig8_HTML.jpg)


    Figure 3-8.


    Typing a < character to bring up the helper dialog for the FrameLayout parent
    container tag in Eclipse


    Now that your ImageView widget tag is in place, let’s type in the `android` keyword
    and the colon to invoke the ImageView tag helper dialog, which will tell you exactly
    which parameter options are available for the ImageView widget; as you can see,
    there are a whole lot of them!


    To get an estimate of how many entries are in any given tag or parameter helper
    dialog, a cool trick is to count the tags or parameters showing in the dialog,
    and multiply that by the denominator for the fraction of the dialog that is visible.
    This fraction is determined by the size of the scrollbar on the right side of
    the dialog. In this case, the scrollbar handle is about one-fifth of the total
    scrollbar area, so to get a pretty close estimate as to the number of parameters
    the ImageView widget has, multiply 17 (parameters) x 5, which is approximately
    85 parameters.


    The two required parameters for any user interface widget are the layout width
    and layout height, so double-click and add those in first, as shown in Figure
    [3-9](#A978-1-4302-5786-8_3_Chapter.html#Fig9) and Figure [3-10](#A978-1-4302-5786-8_3_Chapter.html#Fig10).
    The two primary values that are generally utilized with these parameters are called
    match_parent and wrap_content. Both are Android constants, and they do the opposite
    of each other. A match_parent parameter will scale the width or height of the
    widget up to match the parent container that the widget tag is nested inside of,
    so in this case it will scale the ImageView (and its content) up quite a bit in
    order to match the size of the FrameLayout screen.


    ![A978-1-4302-5786-8_3_Fig9_HTML.jpg](A978-1-4302-5786-8_3_Fig9_HTML.jpg)


    Figure 3-9.


    Typing android: inside an <ImageView> tag to bring up helper dialog of all ImageView
    tag parameters


    The wrap_content, on the other hand, will scale the user interface widget to match
    the size of the content that is contained within that UI widget. I will use match_parent
    first to show you what that parameter will do, then later I’ll change it to wrap_content
    so you can see what that parameter does.


    ![A978-1-4302-5786-8_3_Fig10_HTML.jpg](A978-1-4302-5786-8_3_Fig10_HTML.jpg)


    Figure 3-10.


    Adding an android:src source parameter to reference the anim_intro.xml file you
    created earlier'
