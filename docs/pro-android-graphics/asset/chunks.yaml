- fmt: '# The `<set>` Tag: Using XML to Group Procedural Animation


    An animation set defines a group of procedural animations that need to be played
    together as a set or group. Sets are defined using the procedural animation XML
    file; in fact, they provide the grouping structures for our core transformation
    tags. This is done using a `<set>` parent tag to contain (or to group) any transformations
    we want to structure together logically in your procedural animation’s overall
    design.


    Sets can be nested to create even more precise and complicated structures. All
    we have to do is to make sure that the `<set>` tags and their transform tags that
    they contain are properly nested. If you use proper code indents when you write
    your code, nesting should be fairly easy to visualize and to track. You will see
    this later on in the chapter when you start writing XML markup in order to create
    some cool procedural animation objectives in your `GraphicsDesign` app.


    Android OS has a specialized `Animation` class just for creating Animation Sets.
    As you might imagine, this class is called the `AnimationSet` class! The `AnimationSet`
    class is in the same package that holds the `Animation` class. This package is
    known as the `android.view.animation` package, as animations are played back in
    a `View`. We will be delving much deeper into the `View` class in a later chapter
    on user interface design, so stay tuned.


    Procedural animation transformations contained within each `AnimationSet` are
    executed together as a unified transform by the `AnimationSet` class. If the `AnimationSet`
    class observes any parameters that are set for the containing `AnimationSet` that
    are also set for its children''s transforms, that is, those transform tags contained
    within the containing `<set>` tag, the parameters that are set for the parent
    `AnimationSet` `<set>` tag will override the child transform values.


    For this reason you''ll learn how not to be redundant and not place the same parameters
    in more than one place by following some simple rules that will minimize your
    chance of error, and thus maximize your chance of getting the animation results
    you are looking for on your first code (markup) go-round.


    The way `AnimationSet` inherits parameters from an `Animation` transform, and
    vice-versa, is important to understand. Some parameters or attributes set in the
    `AnimationSet`, by inclusion in the `<set>` tag, will affect the entire `AnimationSet`
    itself. However, some of these will be "pushed down" and thus applied to the children''s
    transforms, and some are even ignored! For this reason, let''s learn where to
    apply certain parameters when using animation sets, so that you know exactly what
    Android wants upfront before you start.


    The `duration`, `repeatMode`, `fillBefore`, and `fillAfter` parameters, also called
    properties, will be pushed down to all child transforms when they are set on an
    `AnimationSet` object; that is, specified inside of the parent `<set>` tag. A
    solution to this is to always set these parameters locally, within your transform
    tags, and to never set these in the parent `<set>` tag. If you do this, then Android
    has nothing to push down, and there is no confusion as to where the parameter
    is going to be applied in the processing cycle.


    The `repeatCount` and `fillEnabled` parameters, or properties, are ignored for
    an `AnimationSet` altogether, and thus you will always apply these parameters
    locally to each animation transform that you wish to access properly.


    On the other hand, the `startOffset` and `shareInterpolator` parameters can be
    applied to the `AnimationSet` itself. Note that the `startOffset` can also be
    applied locally to transforms to fine-tune the timing of the animation by introducing
    a delay into the looping cycle or when it starts animating.


    So a good rule of thumb is to apply your transformational parameters locally,
    rather than at the group or `AnimationSet` `<set>` level unless it is a `shareInterpolator`
    parameter, which is obviously intended for usage in a group level operation, as
    that is the only way to "share" things in a procedural animation. So, always set
    transform parameters locally!


    Another reason for following this rule of thumb is that prior to Android 4.0,
    all parameters placed inside of the `<set>` XML tag were ignored, but could be
    applied at runtime using Java code. Thus, if you are delivering to OSes prior
    to V4, you have to call the `.setStartOffset(80)` method on an `AnimationSet`
    object to obtain the same effect as declaring, in your XML markup, the `android:startOffset="80"`
    parameter inside your `<set>` tag for your procedural animation XML resource for
    your Animation Set object.


    # Procedural Animation vs. Frame Animation: The Trade-Off


    Before we get into the XML markup and Java coding necessary to implement procedural
    animation in your `GraphicsDesign` application, I want to discuss some of the
    high-level theory, principles, concepts, and trade-offs that serve to differentiate
    frame animation from procedural animation.


    Frame animation tends to be memory intensive, more than it is processing intensive,
    as the frames that are to be placed on the screen are loaded into memory so that
    they can later be used in an application. Displaying the image from memory onto
    the `View` is fairly straightforward and does not require any complex calculations,
    so all processing involves moving each frame''s image asset from memory over to
    display screen.


    Frame animation gives us more control outside of Android, as we can use production
    software (3D, digital imaging, digital video, special effects, particle systems,
    fluid dynamics, etc.) to manipulate all our pixels into exactly the animation
    effect that we''re looking to achieve. Since Android does not have all of these
    advanced tools and pre-production capabilities as of yet, using frame animation
    will allow us to use powerful production tools outside of Android, and then bring
    the result into our Android app.


    Procedural animation tends to be more processing intensive, as there is value
    interpolation and the application of interpolator motion curves to the resulting
    interim data values. Additionally, if sets and sub-sets are utilized to create
    a complex animation, there can be even more processing involved, as well as the
    memory space required to hold the plethora of data necessary to perform the processing.


    Procedural animation gives us more control inside of Android because, since we
    are doing everything with code and data, it can be interactive. This is because
    other code and data (and even UI elements) can be crafted to interface with the
    procedural animation in real time, allowing it to be made interactive, whereas
    frame animation, at least by itself, is not as interactive. Frame animation by
    itself is a more linear medium, like video.


    Since procedural animation can be applied to just about any `View` object in Android,
    including text, UI widgets, images, video and frame animation, if you set things
    up correctly, such as using image compositing techniques to their best results,
    you can achieve some impressive interactivity by using frame animation in conjunction
    with procedural animation.


    If you are combining frame and procedural animation, as you will be doing, you
    will have a load on both processor and memory resources, so you must try to optimize
    what you are doing so that you don''t use up too much of the system resources
    needed to run the rest of your application code and UI. This is why we covered
    data footprint optimization in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html)
    and why you''re learning about the same type of optimization here.'
