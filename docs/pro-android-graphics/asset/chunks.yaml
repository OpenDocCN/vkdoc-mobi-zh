  trans: '

    # Android 可绘制资源：可绘制对象的类型


    Android 拥有超过十二种不同类型的可绘制资源，您可以将它们应用于 Android 应用程序的图形设计管线。 在本书的这个阶段，您已经利用了大量的这些更高级的可绘制对象类型；我们将确保您了解
    Android 中所有可用的可绘制对象。


    Android 可绘制资源是可绘制到用户显示屏上的图形的基础概念，您可以通过诸如 `.getDrawable()` 之类的方法调用来检索它们，或者使用 XML
    定义以及 `android:icon`、`android:background` 或 `android:src` 等参数来应用它们。


    Android 中有许多不同的可绘制对象类型，仅列举部分，包括 `Bitmap`（位图）、`9-Patch`（九宫格）、`Layer`（图层）、`State`（状态）、`Level`（级别）、`Animation`（动画）、`Transition`（过渡）、`Shape`（形状）、`Scale`（缩放）、`Rotate`（旋转）、`Inset`（内嵌）、`Clip`（裁剪）、`Picture`（图片）、`Paint`（画笔）和
    `Color`（颜色）。


    在本章的第一部分概述中，我们将逐一介绍 Android 中这些主要的可绘制对象类型，并确切了解它们是什么以及它们的作用。 我们这样做是为了让您作为专业的图形设计师，对
    Android 为您提供的工具有更广阔的视角。 我们将首先介绍您已经使用过的可绘制类型，然后向您介绍一些新的、令人兴奋的可绘制对象。


    `BitmapDrawable`（位图可绘制对象）使用数字图像资源（PNG、JPG 或 GIF），用称为位图的像素数组填充可绘制对象。 在第 11 章构建图像合成与混合管线时，您已经了解了如何将可绘制对象转换为
    `BitmapDrawable` 等操作。


    如您在第 10 章中所见，`NinePatchDrawable`（九宫格可绘制对象）利用 PNG32 图像文件格式，并使用单像素黑色边框区域对其进行自定义，以创建可缩放的
    X 和/或 Y 区域，从而允许根据图像资源内容设计在 X 或 Y 维度上动态调整图像大小。 `NinePatch` 对象图像资源使用特殊的文件名 `thefilename.9.png`，也可以使用
    PNG24（真彩色，无 Alpha 通道）和 PNG8（索引色）。


    如您在第 12 章中所见，`LayerDrawable`（图层可绘制对象）允许集合其他类型的可绘制对象，这些对象可用于分层合成。 这些可绘制对象按照 `LayerDrawable`
    对象的数组顺序绘制，因此索引最大的子图层元素将绘制在最上层。


    如您在第 13 章中所见，`TransitionDrawable`（过渡可绘制对象）通常使用 XML 文件定义，该文件允许在两个可绘制资源之间进行交叉淡入淡出。


    如您在第 14 章和第 3 章中所见，`AnimationDrawable`（动画可绘制对象）可以通过 XML 标记或 Java 代码使用，以定义一系列帧，这些帧按照开发者使用参数指定的方式播放，从而形成
    2D 帧动画资源。 `AnimationDrawable` 对象可以进一步使用 `Animation` 对象进行处理，后者将应用矢量（算法）变换。


    `StateListDrawable`（状态列表可绘制对象）通常也使用 XML 定义文件来定义，该文件引用一系列突出显示不同功能状态的位图图像资源。 您在第
    9 章中创建多状态 `ImageButton` UI 元素时使用了状态，该元素为每个按钮状态（例如，按钮悬停、按下或获得焦点时）实现了不同的图像。


    `LevelListDrawable`（级别列表可绘制对象）通常使用 XML 文件定义，该文件实例化一个可绘制对象，该对象管理多个备用可绘制对象，每个备用可绘制对象都被分配了一个最小值和最大值，在运行时用于确定
    `LevelListDrawable` 当前引用的级别。


    `InsetDrawable`（内嵌可绘制对象）使用 XML 定义文件定义，该文件定义一个可绘制的 XML 资源，用于在另一个可绘制对象内以指定的 DIP
    距离创建内嵌。 当您的 View 对象需要的背景可绘制对象小于 View 对象的实际边界时，这很有用。


    `ClipDrawable`（裁剪可绘制对象）使用 XML 文件定义，该文件定义一个可绘制对象，该对象根据您的 `ClipDrawable` 对象的当前级别值在另一个可绘制对象上实现裁剪平面或区域。
    这通常用于创建特殊效果或实用工具，例如进度条。


    `ScaleDrawable`（缩放可绘制对象）也使用 XML 定义文件定义，该文件指定一个可绘制对象，该对象根据 `ScaleDrawable` 对象的当前级别值更改另一个可绘制对象的缩放比例。


    `ShapeDrawable`（形状可绘制对象）通过定义几何形状的 XML 文件来定义。 形状定义还可以包括其他嵌套形状、边框、颜色或颜色渐变。 `ShapeDrawable`
    对象基本上为 Android 操作系统提供了许多在 Freehand、Illustrator 或 InkScape 等软件包中常见的矢量功能。


    我们将在本章的后续部分介绍 `Shape` 和 `ShapeDrawable` 对象，因为数字插画在新媒体中是一个热门话题。


    在我们深入探讨 `ShapeDrawable` 对象之前，需要注意的是，您通常在 `Colors.xml` 文件中定义的任何颜色资源，也可以通过 XML 定义中的引用作为可绘制对象使用。


    举个例子，在创建您的 `StateListDrawable` 对象时，您可以为 `android:drawable` 属性引用一个颜色资源，这使其在某种程度上成为一种颜色可绘制资源。
    这将通过在您的 XML 标记中的 View 对象标签内使用以下参数来完成：


    `android:drawable="@color/green"`


    接下来，让我们看看如何使用 XML 标记和 `<shape>` 根元素在 Android 中创建矢量插画，以创建 `ShapeDrawable` 对象。 一旦您在
    Android 中创建了自己的矢量插画，我们将更详细地研究 Android 中的 `Shape` 和 `ShapeDrawable` 类。 既然我们在上一章中介绍了矢量动画，那么在本章中介绍静态矢量图像也是顺理成章的。

    '
- fmt: '# Creating a ShapeDrawable Object: XML `<shape>` Parent Tag


    Let’s fire up Eclipse again, or if it is open on your desktop already, you can
    simply right-click your `GraphicsDesign` `/res/drawable` folder. Select the New
    ➤ Android XML File menu command sequence, as shown in Figure 16-1.


    ![A978-1-4302-5786-8_16_Fig1_HTML.jpg](A978-1-4302-5786-8_16_Fig1_HTML.jpg)


    Figure 16-1. Creating a New ➤ Android XML File so that you can create a `ShapeDrawable`
    object XML definition


    In the New Android XML File dialog, shown in Figure 16-2, name the file `contents_shape`,
    and then select the `<shape>` root element, which makes this a `ShapeDrawable`
    XML definition file. Notice that since you clicked on the `/res/drawable` folder
    in your `GraphicsDesign` project, Eclipse was able to infer these first two Resource
    Type and Project setting fields for you. When you are finished, select the Finish
    button in order to create your `ShapeDrawable` XML definition file.


    ![A978-1-4302-5786-8_16_Fig2_HTML.jpg](A978-1-4302-5786-8_16_Fig2_HTML.jpg)


    Figure 16-2. Creating a `<shape>` Drawable XML definition file using the New Android
    XML File dialog


    Once the `ShapeDrawable` XML definition file opens up in the central editing pane
    of Eclipse, put your cursor at the end of the `xmlns:android` parameter, and press
    the return key, and type `android`, and then press the colon key to pop up the
    helper dialog that contains all of the parameters that can be used with this tag,
    as shown in Figure 16-3. Select the `android:shape` option, which allows you to
    define the shape, and double-click it, which will add it as a parameter for your
    `<shape>` parent tag.


    ![A978-1-4302-5786-8_16_Fig3_HTML.jpg](A978-1-4302-5786-8_16_Fig3_HTML.jpg)


    Figure 16-3. Adding an `android:shape` parameter to define what shape you want
    your `ShapeDrawable` to utilize


    When the parameter appears, add a shape type of `oval` inside the quotation marks.
    Next, put your cursor inside your `<shape>` parent tag container, or on the line
    of space that’s underneath the “end” chevron of the opening `<shape>` tag, where
    you can start working on adding nested, or child, tags.


    Add a left facing `<` chevron character to call up the Eclipse helper dialog that
    contains all of the child tags available for use with a `<shape>` root element,
    as shown in Figure 16-4.


    Let’s learn about the different types of gradients that we can apply, and how
    to set the colors for the outer, inner, and middle portions of the gradient color
    spectrum. Since an oval does not have corners, and solid colors are boring, add
    the `<gradient>` child tag to your `<shape>` parent tag.


    Select the `gradient` option and (or) double-click it to add a `<gradient>` child
    tag to your `ShapeDrawable` XML definition. You will notice that only the `<gradient`
    portion of the child tag is added, so you must complete the container for Eclipse
    by adding a `space` and then a `/>` closing tag portion.


    Once this is done, you can place your cursor after your `<gradient` opening tag
    and press the return key to access the auto-indent feature of Eclipse.


    ![A978-1-4302-5786-8_16_Fig4_HTML.jpg](A978-1-4302-5786-8_16_Fig4_HTML.jpg)


    Figure 16-4. Adding a `<gradient>` child tag to a parent `<shape>` tag to fill
    a `ShapeDrawable` object with a gradient


    Type in the word `android` and hit the colon key to bring up the list of the parameters
    that we can use with the `<gradient>` tag. As you can see, there are nine of them,
    seven of which you will use before you are done with this section. Double-click
    the `android:startColor` parameter, which will add it into your `<gradient>` tag,
    as shown in Figure 16-5, and you will start the process of configuring the gradient
    for your oval `ShapeDrawable` object.


    ![A978-1-4302-5786-8_16_Fig5_HTML.jpg](A978-1-4302-5786-8_16_Fig5_HTML.jpg)


    Figure 16-5.'
