  trans: '

    # 程序化动画数据值：范围与枢轴点


    为了能够实现插值，我们需要指定的不只是一个单一的数值，因为插值（或称补间动画）涉及在起始值和结束值之间创建新的中间值。因此，上一节（插值）中的信息将应用于本节（范围）中的内容，而在下一节中，我们将介绍所有这些精细控制可以应用的变换类型。


    要创建任何程序化动画，我们始终需要指定一个范围，从一个称为`From`（起始）值的起始值，到一个称为`To`（结束）值的结束值。这似乎是合乎逻辑的，因为我们需要一些可以随时间变化的东西！


    除了范围之外，许多程序化动画变换还涉及一个枢轴点。枢轴点告诉 Android 操作系统如何将变换倾斜到给定的方向，正如你将在下一节中看到的那样，当我们讨论三种主要的变换类型及其工作原理时。


    与数值范围类似，枢轴点也需要两个值来确定。然而，与使用`From`和`To`值的数值范围不同，枢轴点使用我们 2D 图像上的一个二维位置，该位置由`X`和`Y`坐标指定。


    枢轴点也广泛用于 3D 动画中，在那里设置枢轴点需要三个（X、Y 和 Z）数据坐标才能准确定位。目前，Android 在其`Animation`类中使用 2D
    程序化动画，而 3D 动画则通过另一个`android.opengl`包来实现，对这个包的讨论最适合放在一本 Android 3D 书籍中。在本书中，我们主要涵盖的是**图形设计**，它主要是
    2D 的。


    当我们查看下一节将要介绍的各种变换类型时，你将看到枢轴点如何能够获得更精细的结果。这为开发者提供了额外的控制能力，以达成他们想要实现的程序化动画变换效果。


    # 程序化动画变换：旋转、缩放、平移


    在 2D 和 3D 动画中，有三种主要或核心的变换类型。其中一种涉及运动，其技术动画术语是**平移**；一种涉及大小，其技术术语是**缩放**；最后一种涉及方向（物体朝向），其技术术语是**旋转**。


    本节将逐一介绍每种变换类型，以便你在本章后续的`GraphicsDesign`应用中，无论是单独实现还是集体实现每种变换之前，都能清晰了解它们各自的作用。


    让我们从最常见的变换形式开始，即从屏幕上的一个位置**移动**或**平移到**另一个位置。要在两点之间沿一条直线或`向量`创建运动，我们需要一个起始点（使用
    X，Y 坐标）和一个结束点（也使用一对 X，Y 坐标）。由于我们是沿向量（有时也称为射线，它是一个`方向向量`）移动，因此你可以理解为什么程序化动画有时也被称为向量动画。


    第二常见的变换形式是按缩放因子将对象**放大或缩小**。缩放可以沿 X 轴以及 Y 轴进行，因此为了均匀缩放对象，请确保你的 X 和 Y 缩放值范围完全相同。


    要沿对象的 X 轴（从左到右）缩放，需要指定 X 轴缩放的起始值（`fromXScale`），例如 1.0 或 100%，以及结束值（`toXScale`），例如
    0.5 或 50%。类似地，要沿对象的 Y 轴（从上到下）缩放，需要指定 Y 轴缩放的起始值（`fromYScale`），例如 1.0 或 100%，以及结束值（`toYScale`），例如
    0.5 或 50%。


    因此，为了将对象均匀缩放到其原始大小的一半，我们需要使用这些 X 轴和 Y 轴的`Scale From`和`Scale To`设置值。


    另一个常见的变换形式是将对象旋转指定的度数，范围从 0 到 360（即一整圈）。这是通过指定一个`fromDegrees`值（如 0）和一个`toDegrees`值（如
    360）来实现的，这将产生对象的完整旋转。


    如果你想让对象围绕其中心点旋转，则需要将`pivotX`和`pivotY`值都设置为 50%，这将使枢轴点位于你正在旋转的对象的中心。


    # 程序化动画合成：Alpha 混合


    在 Android 中，还有另一个可以进行程序化动画处理的属性，但它不是变换，更类似于合成特性。变换对象会以某种方式物理改变它——将其移动到不同位置，改变其大小，或改变其方向（旋转）。


    通过改变对象的 Alpha 值来将对象与其背景进行 Alpha 混合，通常称为**淡入**或**淡出**，这是一种合成功能。然而，在 Android 中，它被包含在程序化动画工具集中，因为
    Alpha 值是一个合乎逻辑的动画属性，特别是当你在创建鬼故事或传送光束特效时。


    你正在程序化制作动画的对象的 Alpha 属性可以被控制，允许 Alpha（透明度）混合与你已经在程序化创建动画时可用的平移、缩放和旋转变换结合使用，也就是通过使用
    XML 或 Java 代码向`Animation`类指定数据值。


    与大多数其他程序化动画属性不同——枢轴点使用百分比（如 50%）表示，角度使用 0 到 360 之间的整数表示——Alpha 混合量使用 0.0（透明）到
    1.0（可见）之间的实数设定。


    需要注意的是，允许使用多个小数位，所以如果你希望对象仅三分之一可见，你可以使用 0.333；或者，如果是四分之三可见，你可以指定 0.75 作为对象 Alpha
    值的起始或结束值。


    Alpha 的起始值和结束值通过`fromAlpha`和`toAlpha`参数设定。因此，要使对象淡出，你需要将`fromAlpha`设为 1.0，`toAlpha`设为
    0.0。


    要将多种不同类型的程序化动画参数组合在一起，你需要创建一个动画变换参数集。使用程序化动画集将允许你以逻辑且有序的方式将变换和合成分组在一起。这将允许创建更复杂的程序化动画。我将在本章稍后部分详细介绍如何创建程序化动画集。

    '
- fmt: '# Procedural Animation Timing: Using Duration and Offsets


    You might be wondering how to set the timing that is used between all of these
    different range data values. Setting a timing value for a range will also to some
    extent define how many interpolated data values are created over that range. It
    is important to note that the Android OS decides this value based on the device
    processing power and what it thinks will provide the most optimal visual-result-to-processing-power-use
    ratio or trade-off.


    The duration of any given procedural animation range value setting is set using
    a `duration` parameter, which takes an integer value in milliseconds. A millisecond
    is one-thousandth of a second, not one-millionth of a second as it sounds like
    it would be. Most programming languages, Java included, use millisecond values
    for all of their timing functions and operations.


    Thus, if you wanted the fade-out discussed in the previous section to take four
    seconds, the XML parameter would be `android:duration="4000"`, as four thousand
    milliseconds equals four seconds. If you wanted the fade-out to take 4.352 seconds,
    you would use a millisecond value of 4352, and thus you would have a one-thousandth
    of a second granularity available for accuracy.


    Each transformation (or alpha blend) range that you define has its own separate
    duration setting, allowing for a great deal of precision in the XML markup definition
    of the effect that you are trying to achieve.


    There is one other important timing-related parameter that allows you to delay
    when the specified range will start play. This is called an offset, and it is
    controlled by the `startOffset` parameter data value.


    Say you wanted to delay your four second fade-out by four seconds as well. All
    you would have to do is to add an `android:startOffset="4000"` to your `<alpha>`
    parent tag (which you will be using for real a bit later on in this chapter),
    and this timing delay control would then be implemented.


    This `startOffset` parameter is especially useful when it is utilized in conjunction
    with looping animation behaviors, which we are going to be covering next. The
    reason for this is that when used in an animation loop scenario, the `startOffset`
    parameter will allow us to define a pause during each of the animated element’s
    loop cycles. Let’s take a look at loops and the parameters available to us to
    control looping animated elements next.


    ## Procedural Animation Loops: RepeatCount and RepeatMode


    Like a frame animation, a procedural animation can be played once and then stop,
    or it can be played continuously in a loop. There are two parameters that control
    looping: one that controls whether the animation will loop or not, and another
    that controls the way in which the animation will loop.


    The procedural animation parameter that controls the number of times that an animation,
    or a component (part) of that animation set, will loop is called the `repeatCount`
    parameter. The parameter requires an integer value.


    If you leave this `repeatCount` parameter out of (that is, unspecified in) your
    procedural animation definition, your animation will play once, and then stop,
    meaning that the default setting is `android:repeatCount="1"` for this parameter.
    The exception to the integer value for this parameter is the `infinite` constant.
    Therefore, if you want to have your animation loop forever, you should use the
    `android:repeatCount="infinite"` setting. In case you are wondering, the numeric
    value that the predefined constant `infinite` defines is -1, so `android:repeatCount="-1"`
    should work as well.


    The parameter that defines what type of looping is used is the `repeatMode` parameter.
    This parameter can be set to one of two predefined constants; the most common
    of these is `restart`, which will cause procedural animation to loop seamlessly
    (unless you have defined the `startOffset` parameter). In case you are wondering,
    the numeric value that the predefined constant `restart` defines is 1, so `android:repeatMode="1"`
    should work as well.


    The other type or mode of animation looping is the `reverse` mode, which is also
    called pong animation, as it causes the animation to reverse at the end of its
    range, and run backwards until it reaches the beginning again, at which time it
    runs forwards again. Like the game Pong. Back and forth. In case you are wondering,
    the numeric value that the predefined constant `reverse` defines is 2, so `android:repeatMode="2"`
    should work as well.


    All these parameters may seem fairly simple on their own, but combined in complicated
    structures using the animation set, which we are going to talk about next, they
    can quickly become very complicated and produce some very complex and detailed
    animation results. So, don’t underestimate the power of these parameters when
    they are put together by a savvy developer in the right way. Soon, you will be
    that savvy developer, so let’s look at sets!'
