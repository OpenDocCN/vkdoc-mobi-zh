- fmt: "### Summary\n\nIn this eighth chapter, you learned more about Android’s digital\
    \ image user interface element container `ImageView`, which you had initially\
    \ implemented in your application XML markup and Java code during the previous\
    \ chapter.\n\nWe started by looking at the `ImageView` class and its various subclasses,\
    \ nested classes, methods, attributes, and parameters. You learned that the `ImageView`\
    \ class is used to create Android’s `ImageButton` UI widget subclass (which you’ll\
    \ be learning about in the next chapter) and `QuickContactBadge`.\n\nNext, we\
    \ looked at the `ImageView.ScaleType` nested class, which is a very important\
    \ class in Android, as scaling is an important concept in digital imaging. This\
    \ is because scaling images correctly is the foundation for obtaining clean-looking\
    \ visuals under any new media development platform.\n\nYou learned about the `java.lang.Enum`\
    \ class and enumeration types, and then you looked at the Scaling Constants, which\
    \ use this class to specify to the Android OS what type of scaling to use for\
    \ your `ImageView` UI widget assets.\n\nThen we looked at several of the attributes\
    \ that are specifically part of the `ImageView` class. We started with the `AdjustViewBounds`\
    \ flag and the `maxWidth` and `maxHeight`, which, if this flag is set to `true`\
    \ (on), will let you specify your own custom width and height values; note that\
    \ one generally doesn’t want to do this in Android, but we covered it here just\
    \ to be thorough.\n\nNext, we looked at the concept of ImageView baselines, and\
    \ the `android:baseline` and `android:baselineAlignBottom` attributes, which allow\
    \ you to set your own custom baselines within the `ImageView` or set the baseline\
    \ to be at the absolute very bottom of the image, rather than at the top of the\
    \ image.\n\nThen we looked at the `cropToPadding` attribute and how to utilize\
    \ it with Android padding parameters in order to implement a digital image cropping\
    \ operation using only XML markup.\n\nFinally, we looked at the `android:tint`\
    \ parameter and the `PorterDuff` blend modes, which allow us to use XML markup\
    \ to perform basic color adjustment and correction to our digital image source\
    \ asset.\n\nTo get some practice applying many of these `ImageView` class properties\
    \ and attributes, you implemented some of them in the Bookmarking Utility and\
    \ its `RelativeLayout` user interface design that we began creating in [Chapter\
    \ 7](#A978-1-4302-5786-8_7_Chapter.html).\n\nIn the next chapter, you will learn\
    \ about the `ImageView` subclass `ImageButton` and how to create complex, interactive,\
    \ image-based buttons using XML markup and Java code.\n\n# 9. Advanced ImageButton:\
    \ Creating a Custom Multi-State ImageButton\n\n## Abstract\n\nIn this ninth chapter,\
    \ we will continue to look at the `ImageView` class by delving into one of its\
    \ most important subclasses: the `ImageButton` class.\n\nThe `ImageButton` is\
    \ one of Android’s most important user interface elements for implementing your\
    \ leading-edge graphics design inside of a Button user interface element itself.\
    \ Whereas Android has a standard `Button` class, it does not allow as much flexibility\
    \ in implementing graphics design assets as the `ImageButton` class does.\n\n\
    Since this is a book focused on graphics, we are going to single out this `ImageButton`\
    \ class. We’ll take an entire chapter to learn how to define its many states and\
    \ how to attach graphics elements to each state in order to achieve impressive\
    \ visual results that the standard Android `Button` class cannot match.\n\nWe\
    \ used the `android:src` parameter to define a source image, and used some UI\
    \ layout parameters to position it and the margins parameter to give it some breathing\
    \ room in the design. However, we didn’t really get into any of the advanced parameters\
    \ or tricks, such as using both the source (foreground) image plate and the background\
    \ image plate at the same time.\n\nWe did cover some fairly advanced digital imaging\
    \ concepts using GIMP 2.8, which is always good to do in a Pro Android Graphics\
    \ book, and I will try to do even more of that as the book goes on, in both GIMP\
    \ and VirtualDub.\n\n## Button Graphics in Android: ImageButton Class Overview\n\
    \nThe Android `ImageButton` class is a subclass of the `ImageView` class, which\
    \ is itself a subclass of the View Superclass, which, as you learned in the previous\
    \ chapter, is a subclass of the `java.lang.Object` master class. The class hierarchy\
    \ for the `ImageButton` class is structured as follows:\n\n```\njava.lang.Object\n\
    \  > android.view.View\n    > android.widget.ImageView\n      > android.widget.ImageButton\n\
    ```\n\nThe `ImageButton`, like its parent class `ImageView`, is kept in that separate\
    \ Android package for UI widgets called the `android.widget` package because it\
    \ is a UI widget used for custom Button UI elements crafted using images.\n\n\
    An `ImageButton` UI widget would be used when a developer wishes to create a custom\
    \ UI Button element that displays that Button as an image instead of as a text\
    \ label on a square background, such as a standard UI Button would appear, as\
    \ you have seen in previous chapters.\n\nJust like the Android `Button` class\
    \ UI widget, an `ImageButton` UI widget can also be pressed (using a click or\
    \ touch event) by the user, and has focus and hover characteristics as well.\n\
    \nHowever, the `Button` UI widget is subclassed from the `TextView` class, so\
    \ it primarily targets text, as it is essentially a `TextView` UI element with\
    \ a background that makes it look like a Button UI element. Your `ImageButton`\
    \ UI widget, on the other hand, is subclassed from the `ImageView` class, so this\
    \ gives it graphics features, which we are looking to harness in this book.\n\n\
    If you don’t utilize any of its custom parameters, an `ImageButton` UI widget\
    \ will have the visual appearance of the standard UI Button, but that gray button\
    \ background will change color to blue when the button is pressed. Thus, don’t\
    \ use an `ImageButton` unless you are going to implement the various image assets\
    \ and the multi-state features that we are going to cover within this chapter.\n\
    \nThe default image for your `ImageButton` UI widget, which defines its normal\
    \ state, can be defined statically by using the `android:src` XML parameter in\
    \ an `<ImageButton>` child tag inside of your XML layout container UI definition.\
    \ It can also be defined dynamically at runtime in your Java code, and this is\
    \ done by using the `.setImageResource()` method.\n\nWe’ll be using XML to define\
    \ UI designs, as Android prefers that we do, in this book. If you use the `android:src`\
    \ parameter to reference image assets, this will replace your standard `ImageButton`\
    \ background image. You can also define your own background image if you wanted\
    \ to do some compositing, and you can also set the background color value to be\
    \ transparent (`#00000000`)."
  raw: '## Summary


    In this eighth chapter, you learned more about Android’s digital image user interface
    element container ImageView, which you had initially implemented in your application
    XML markup and Java code during the previous chapter.


    We started by looking at the `ImageView` class and its various subclasses, nested
    classes, methods, attributes, and parameters. You learned that the ImageView class
    is used to create Android’s ImageButton UI widget subclass (which you’ll be learning
    about in the next chapter) and `QuickContactBadge`.


    Next, we looked at the `ImageView.ScaleType` nested class, which is a very important
    class in Android, as scaling is an important concept in digital imaging. This
    is because scaling images correctly is the foundation for obtaining clean-looking
    visuals under any new media development platform.


    You learned about the `java.lang.Enum` class and enumeration types, and then you
    looked at the Scaling Constants, which use this class to specify to the Android
    OS what type of scaling to use for your ImageView UI widget assets.


    Then we looked at several of the attributes that are specifically part of the
    ImageView class. We started with the `AdjustViewBounds` flag and the maxWidth
    and maxHeight, which, if this flag is set to true (on), will let you specify your
    own custom width and height values; note that one generally doesn’t want to do
    this in Android, but we covered it here just to be thorough.


    Next, we looked at the concept of ImageView baselines, and the `android:baseline`
    and `android:baselineAlignBottom` attributes, which allow you to set your own
    custom baselines within the ImageView or set the baseline to be at the absolute
    very bottom of the image, rather than at the top of the image.


    Then we looked at the cropToPadding attribute and how to utilize it with Android
    padding parameters in order to implement a digital image cropping operation using
    only XML markup.


    Finally, we looked at the `android:tint` parameter and the PorterDuff blend modes,
    which allow us to use XML markup to perform basic color adjustment and correction
    to our digital image source asset.


    To get some practice applying many of these ImageView class properties and attributes,
    you implemented some of them in the Bookmarking Utility and its RelativeLayout
    user interface design that we began creating in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html).


    In the next chapter, you will learn about the ImageView subclass ImageButton and
    how to create complex, interactive, image-based buttons using XML markup and Java
    code.


    # 9. Advanced ImageButton: Creating a Custom Multi-State ImageButton


    Abstract


    In this ninth chapter, we will continue to look at the `ImageView` class by delving
    into one of its most important subclasses: the `ImageButton` class.


    In this ninth chapter, we will continue to look at the `ImageView` class by delving
    into one of its most important subclasses: the `ImageButton` class.


    The ImageButton is one of Android’s most important user interface elements for
    implementing your leading-edge graphics design inside of a Button user interface
    element itself. Whereas Android has a standard Button class, it does not allow
    as much flexibility in implementing graphics design assets as the ImageButton
    class does.


    Since this is a book focused on graphics, we are going to single out this ImageButton
    class. We’ll take an entire chapter to learn how to define its many states and
    how to attach graphics elements to each state in order to achieve impressive visual
    results that the standard Android Button class cannot match.


    We used the `android:src` parameter to define a source image, and used some UI
    layout parameters to position it and the margins parameter to give it some breathing
    room in the design. However, we didn’t really get into any of the advanced parameters
    or tricks, such as using both the source (foreground) image plate and the background
    image plate at the same time.


    We did cover some fairly advanced digital imaging concepts using GIMP 2.8, which
    is always good to do in a Pro Android Graphics book, and I will try to do even
    more of that as the book goes on, in both GIMP and VirtualDub.


    ## Button Graphics in Android: ImageButton Class Overview


    The Android `ImageButton` class is a subclass of the `ImageView` class, which
    is itself a subclass of the View Superclass, which, as you learned in the previous
    chapter, is a subclass of the `java.lang.Object` master class. The class hierarchy
    for the ImageButton class is structured as follows:


    `java.lang.Object`


      `> android.view.View`


        `> android.widget.ImageView`


          `> android.widget.ImageButton`


    The ImageButton, like its parent class ImageView, is kept in that separate Android
    package for UI widgets called the `android.widget` package because it is a UI
    widget used for custom Button UI elements crafted using images.


    An ImageButton UI widget would be used when a developer wishes to create a custom
    UI Button element that displays that Button as an image instead of as a text label
    on a square background, such as a standard UI Button would appear, as you have
    seen in previous chapters.


    Just like the Android Button class UI widget, an ImageButton UI widget can also
    be pressed (using a click or touch event) by the user, and has focus and hover
    characteristics as well.


    However, the Button UI widget is subclassed from the TextView class, so it primarily
    targets text, as it is essentially a TextView UI element with a background that
    makes it look like a Button UI element. Your ImageButton UI widget, on the other
    hand, is subclassed from the ImageView class, so this gives it graphics features,
    which we are looking to harness in this book.


    If you don’t utilize any of its custom parameters, an ImageButton UI widget will
    have the visual appearance of the standard UI Button, but that gray button background
    will change color to blue when the button is pressed. Thus, don’t use an ImageButton
    unless you are going to implement the various image assets and the multi-state
    features that we are going to cover within this chapter.


    The default image for your ImageButton UI widget, which defines its normal state,
    can be defined staticly by using the `android:src` XML parameter in an `<ImageButton>`
    child tag inside of your XML layout container UI definition. It can also be defined
    dynamically at runtime in your Java code, and this is done by using the `.setImageResource(
    )` method.


    We’ll be using XML to define UI designs, as Android prefers that we do, in this
    book. If you use the android:src parameter to reference image assets, this will
    replace your standard ImageButton background image. You can also define your own
    background image if you wanted to do some compositing, and you can also set the
    background color value to be transparent (#00000000).'
  trans: "\n### 本章小结\n\n在第八章中，你进一步学习了 Android 的数字图像用户界面元素容器 `ImageView`，你在前一章的应用 XML\
    \ 标记和 Java 代码中已经初步实现了它。\n\n我们首先探讨了 `ImageView` 类及其各种子类、嵌套类、方法、属性和参数。你了解到，`ImageView`\
    \ 类用于创建 Android 的 `ImageButton` UI 控件子类（你将在下一章学习）以及 `QuickContactBadge`。\n\n接着，我们研究了\
    \ `ImageView.ScaleType` 嵌套类，这是 Android 中一个非常重要的类，因为缩放是数字图像处理中的一个关键概念。正确缩放图像是在任何新媒体开发平台下获得清晰视觉效果的基础。\n\
    \n你学习了 `java.lang.Enum` 类和枚举类型，然后了解了缩放常量，这些常量使用该类向 Android 操作系统指定对 `ImageView`\
    \ UI 控件资源使用何种缩放类型。\n\n然后，我们探讨了 `ImageView` 类特有的一些属性。我们从 `AdjustViewBounds` 标志以及\
    \ `maxWidth` 和 `maxHeight` 开始，如果将该标志设置为 `true`（开启），你就可以指定自定义的宽度和高度值；请注意，在 Android\
    \ 中通常不推荐这样做，但此处我们进行了全面讨论。\n\n接下来，我们研究了 ImageView 基线的概念，以及 `android:baseline` 和\
    \ `android:baselineAlignBottom` 属性，它们允许你在 `ImageView` 中设置自定义基线，或者将基线设置为图像的绝对底部，而不是顶部。\n\
    \n然后，我们探讨了 `cropToPadding` 属性以及如何将其与 Android 的填充参数结合使用，仅通过 XML 标记即可实现数字图像裁剪操作。\n\
    \n最后，我们研究了 `android:tint` 参数和 `PorterDuff` 混合模式，这使得我们可以使用 XML 标记对数字图像源资源进行基本的颜色调整和校正。\n\
    \n为了练习应用 `ImageView` 类的许多属性和特性，你在我们在 第 7 章 开始创建的**书签工具**及其 `RelativeLayout` 用户界面设计中实现了其中一些功能。\n\
    \n在下一章中，你将学习 `ImageView` 的子类 `ImageButton`，以及如何使用 XML 标记和 Java 代码创建复杂的、交互式的、基于图像的按钮。\n\
    \n# 9. 高级 ImageButton：创建自定义多状态 ImageButton\n\n## 摘要\n\n在第九章中，我们将继续研究 `ImageView`\
    \ 类，深入探讨其最重要的子类之一：`ImageButton` 类。\n\n`ImageButton` 是 Android 最重要的用户界面元素之一，用于在按钮用户界面元素内部实现前沿的图形设计。虽然\
    \ Android 有一个标准的 `Button` 类，但它在实现图形设计资源方面的灵活性不如 `ImageButton` 类。\n\n由于这是一本专注于图形的书，我们将单独讨论这个\
    \ `ImageButton` 类。我们将用一整章来学习如何定义它的多种状态，以及如何将图形元素附加到每个状态，以达到标准 Android `Button`\
    \ 类无法比拟的出色视觉效果。\n\n我们使用了 `android:src` 参数来定义源图像，并使用一些 UI 布局参数进行定位，以及使用边距参数在设计中为其留出一些空间。但是，我们并没有真正深入探讨任何高级参数或技巧，例如同时使用源（前景）图像层和背景图像层。\n\
    \n我们确实介绍了一些使用 GIMP 2.8 的相当高级的数字图像处理概念，在一本《Pro Android Graphics》书中这样做总是好的，并且随着本书的深入，我将在\
    \ GIMP 和 VirtualDub 中都尽可能多地介绍这方面的内容。\n\n## Android 中的按钮图形：ImageButton 类概述\n\n\
    Android 的 `ImageButton` 类是 `ImageView` 类的子类，而 `ImageView` 类本身又是视图超类的子类，正如你在前一章所学，视图超类是\
    \ `java.lang.Object` 主类的子类。`ImageButton` 类的类层次结构如下所示：\n\n```\njava.lang.Object\n\
    \  > android.view.View\n    > android.widget.ImageView\n      > android.widget.ImageButton\n\
    ```\n\n`ImageButton` 与其父类 `ImageView` 一样，被放在名为 `android.widget` 包的独立 Android UI\
    \ 控件包中，因为它是一个用于使用图像定制的按钮 UI 元素的 UI 控件。\n\n当开发者希望创建一个自定义的 UI 按钮元素，该按钮显示为图像而不是方形背景上的文本标签（例如标准\
    \ UI 按钮的外观，正如你在前几章所见）时，就会使用 `ImageButton` UI 控件。\n\n就像 Android 的 `Button` 类 UI\
    \ 控件一样，`ImageButton` UI 控件也可以被用户按下（通过点击或触摸事件），并且也具有焦点和悬停特性。\n\n然而，`Button` UI\
    \ 控件继承自 `TextView` 类，因此它主要针对文本，本质上是一个带有使其看起来像按钮 UI 元素背景的 `TextView` UI 元素。而你的\
    \ `ImageButton` UI 控件则继承自 `ImageView` 类，这赋予了它图形特性，这正是我们在本书中希望利用的。\n\n如果你不利用其任何自定义参数，`ImageButton`\
    \ UI 控件将具有标准 UI Button 的外观，但当按钮被按下时，那个灰色按钮背景会变成蓝色。因此，除非你要实现本章将要介绍的各种图像资源和多状态特性，否则不要使用\
    \ `ImageButton`。\n\n`ImageButton` UI 控件的默认图像（定义其正常状态）可以通过在 XML 布局容器 UI 定义中的 `<ImageButton>`\
    \ 子标签内使用 `android:src` XML 参数进行静态定义。也可以在 Java 代码中通过使用 `.setImageResource()` 方法在运行时动态定义。\n\
    \n在本书中，我们将按照 Android 的推荐方式，使用 XML 来定义 UI 设计。如果你使用 `android:src` 参数来引用图像资源，这将替换你的标准\
    \ `ImageButton` 背景图像。如果你想进行一些合成，也可以定义自己的背景图像，并且还可以将背景颜色值设置为透明（`#00000000`）。\n"
- fmt: '# ImageButton States: Normal, Pressed, Focused, and Hovered


    The `ImageButton` class allows you to define custom image assets for each of the
    states of use: normal (default or not in use), pressed (user is touching or pressing
    down on click selection hardware), focused (recent touch released or click released),
    and hovered (user is over an `ImageButton` with a mouse or navigation key, but
    has not touched or clicked it). The hovered state was added recently in Android
    4.0 API Level 14, possibly in anticipation of using the Android OS for the Google
    Chromebooks. The four primary `ImageButton` states, along with their mouse event
    equivalents, are shown in Table [9-1](#A978-1-4302-5786-8_9_Chapter.html#Tab1).


    Table 9-1. Android `ImageButton` Class Primary Image Asset State Constants and
    their Mouse Usage Equivalents


    | `ImageButton` State | Description of the `ImageButton` State | Mouse Event Equivalent
    |

    | --- | --- | --- |

    | `NORMAL` | Default `ImageButton` State when it is not in use | Mouse Out |

    | `PRESSED` | `ImageButton` State when it is touched or clicked | Mouse Down |

    | `FOCUSED` | `ImageButton` State when it is touched and released | Mouse Up |

    | `HOVERED` (API 14) | `ImageButton` State if it is focused (not touched) | Mouse
    Over |


    `ImageButton` UI elements are not easy to implement because you will need to create
    a unique digital image asset for each of these `ImageButton` states. You must
    do this to visually indicate to a user your different `ImageButton` states, and
    as you will see in this chapter, this involves some digital imaging work!


    You will be using GIMP 2.8 a bit later on in the chapter to create the many digital
    image states for each of the `ImageButton`s that you are going to implement in
    each of the resolution densities required by Android to span across different
    device types and screen sizes and resolutions. You will soon see that the number
    of digital image assets that must be created is calculated by the number of image
    buttons times four states times four density targets, or sixteen image assets
    per `ImageButton` implemented.


    The standard work process to define `ImageButton` states is by using the XML drawable
    definition file that lives in your `/res/drawable` folder and that uses a parent
    `<selector>` tag and child `<item>` tags to define each of the `ImageButton` states
    with a custom digital image asset reference. You’ll look at an example of exactly
    how to set this up a bit later on in the chapter.


    Once you set up this XML definition, Android will automatically change the image
    asset for you based on the state of an `ImageButton`. The order of the state definitions
    is important, as they’re evaluated in order. This is why the normal image asset
    comes last, because it will only be displayed after `android:state_pressed` and
    `android:state_focused` have both evaluated false.


    ## ImageButton Drawable Assets: Compositing Button States


    Let’s get down to business, and jump into the work process for creating a multi-state
    `ImageButton`. This starts with creating the different digital image assets for
    each of these button states. To do this, you will use the GIMP open source image
    editing and compositing software package, so start GIMP now by using the quick
    launch icon on your Taskbar.


    Use the `File ➤ Open` menu sequence to access the Open Image dialog shown in Figure
    [9-1](#A978-1-4302-5786-8_9_Chapter.html#Fig1), and find the `ImageButton_Bookmark.png`
    image, which will be your bottom (lowest) foundational image compositing layer
    for this `ImageButton` digital image asset. Once you locate the asset, select
    it so it turns blue, and click the Open button to load it into GIMP as an original
    image layer.


    ![A978-1-4302-5786-8_9_Fig1_HTML.jpg](A978-1-4302-5786-8_9_Fig1_HTML.jpg)


    Figure 9-1. Opening the `ImageButton_Bookmark` primary image layer


    The next thing that you want to do is to add an outer button element, say a metal
    ring around the perimeter of the button so that it actually looks like a button.


    If you click on the other two original assets that are shown in Figure [9-1](#A978-1-4302-5786-8_9_Chapter.html#Fig1),
    the dialog will show a preview of them at the right-hand side, and you can see
    that they are a gold and silver ring UI design element that you will be compositing
    over the basic bookmark icon during the next few steps of this work process.


    GIMP has a very useful tool or command for bringing in an external imaging asset
    and placing it into a compositing layer for use all in one very easy step. This
    tool or command is located under the `File` menu and is called an `Open as Layer`
    function.


    Let’s use this menu sequence, as shown in Figure [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2),
    to go back into your `ImageButton` assets folder, and bring in your next image
    compositing layer.


    ![A978-1-4302-5786-8_9_Fig2_HTML.jpg](A978-1-4302-5786-8_9_Fig2_HTML.jpg)


    Figure 9-2. Using the `File ➤ Open as Layers` menu sequence to add a composite
    layer


    As you can see in Figure [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2), your
    foundation bookmark layer is already in place at 360 pixels in size for your XHDPI
    extra-high density pixel image asset size, so now you are going to select the
    next layer up in your image composite, which will be the `ImageButton_Silver.png`
    file shown in the Open Image dialog in Figure [9-3](#A978-1-4302-5786-8_9_Chapter.html#Fig3),
    which is accessed by using the `File ➤ Open as Layers` menu sequence shown in
    Figure [9-2](#A978-1-4302-5786-8_9_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_9_Fig3_HTML.jpg](A978-1-4302-5786-8_9_Fig3_HTML.jpg)


    Figure 9-3. Locating the `ImageButton_Silver.png` button exterior ring to add
    to composite


    Once you open the silver outer button hoop (or ring) asset, which is shown in
    Figure [9-3](#A978-1-4302-5786-8_9_Chapter.html#Fig3) on the right, it will be
    inserted by GIMP into the composite layer above the bookmark icon graphic. The
    resulting composite, as you can see in Figure [9-4](#A978-1-4302-5786-8_9_Chapter.html#Fig4),
    now looks much more like a UI button, and you’re now ready to use the `File ➤
