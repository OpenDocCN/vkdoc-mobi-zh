    # 查看视图图形属性：背景、Alpha 与可见性


    小部件的图形属性定义与命名、布局、间距、方向等其他属性一样，通过 XML 参数完成。本书中我们最关注的图形属性（即参数）是那些能让我们将用户界面设计无缝融入整个应用图形设计流程的属性。这些属性包括：背景图像功能、Alpha
    混合值设置，以及对某些小部件和应用图标而言的图片来源文件引用。


    正如你在第 3 章中学到的，小部件中任何可容纳图像资源的槽位或占位符同样可以容纳动画资源。这种为图形和 UI 元素增添动态效果的能力，使开发者能够利用用户界面设计创造出令人惊叹的用户体验。


    最常用于整合图形的视图属性是 `android:background` 参数。该参数允许我们设置背景图片来源文件，或背景颜色值（包括 Alpha 值）。


    在某些情况下，为了让 UI 小部件视图对象背后的图像、动画或视频能够透显出来，你需要将 UI 小部件的背景属性设置为透明。这可以通过使用包含 Alpha 通道的八位十六进制颜色值来实现：使用
    `android:background="#00000000"` 标签参数，该参数将 ARGB 值设置为 100% 透明（实质上定义了零背景图像/像素）。


    下一个常用于整合图形的视图属性是 `android:alpha` 参数。该参数允许你整体设置 UI 小部件的透明度值，包括其背景图像。因此，你可以使用 `android:alpha`
    配合实数设置（例如 `android:alpha="0.55"` 表示 55% 不透明度）来让整个 UI 小部件呈现半透明或不透明状态。


    由于本书是关于高级图形与合成技术的，随着你逐步了解 Android 开发中与图形设计相关的基础知识，全书内容会越来越深入，届时我们将大量运用 Alpha 参数。


    下一个最常用的视图属性是 `android:src` 参数，用于定义来源图像资源。如果你想知道为何该参数的使用频率不及背景图像和 Alpha 混合值，那是因为所有小部件标签都拥有
    `android:background` 参数，但相对较少的标签（如 `<ImageView>`、`<ImageButton>` 以及 `<Bitmap>`）支持使用
    `android:src` 图片来源引用参数。


    这是因为来源图像会覆盖 UI 小部件本身，因此若要让 UI 元素显示在图像资源（或动画资源）前方，你应该改用 `android:background` 参数。此外，`android:src`
    参数还有其他用途，例如在 `AndroidManifest.xml` 文件中为应用分配图标资源。


    最后是 `android:visibility` 参数，它比 `android:alpha` 参数在内存和处理器效率上更高。这是因为 Alpha 混合（通常用于创建半透明效果，使背景图像或元素得以透显以实现图形设计效果）所需的算法，比屏幕上显示或不显示元素的简单代码更为复杂。此外，Alpha
    还可以在 Java 代码中进行动画处理，使特定设计元素平滑淡入或淡出。因此，请在图形合成中使用 Alpha，在布局或 UI 界面可用性实现中使用可见性，因为后者的“开销”更低。


    如果你只想显示或隐藏视图对象（即瞬间开启或关闭屏幕上的可见性），所有视图元素（如 `TextView`、`ImageButton`、`ImageView`、`Button`、`CheckBox`、`ViewGroup`
    等）都具有可见性属性。视图的可见性可设置为三个预定义的 Android 值常量之一：`VISIBLE`（当前在屏幕上可见）、`INVISIBLE`（隐藏，但其屏幕布局空间仍被保留，尽管不可见）和
    `GONE`（完全隐藏，包括从父布局容器的子布局放置计算算法中移除）。

    '
- fmt: '## A View’s Functional Characteristics: Listeners and Focus


    Once you have designed the collection of View UI widgets using your layout container
    in an XML file containing XML tag markup, they will still need to be inflated
    and “wired up” to the operating system and device hardware.


    This is accomplished inside your Java code by “trapping” your end user interaction
    with your user interface elements via Android OS input events.


    Android input events are triggered by your end users as they interface with your
    application by using their Android device hardware navigation features, such as
    keypads, navigation keys, trackballs, and touchscreens.


    Trapping these input events will allow your UI design to become functional and
    respond to user interaction. Trapping operating system input events can be accomplished
    by using Android event listeners in your Java code.


    The Android `EventListener` superclass is a part of the `android.util` package;
    if you want to research the core superclass, you can find more information on
    the Android Developer web site at the following URL:


    [`http://developer.android.com/reference/java/util/EventListener.html`](http://developer.android.com/reference/java/util/EventListener.html)


    Event listeners are methods that you can attach to your View objects after you
    import, instantiate, and inflate them from the XML definition using the `findViewById()`
    method.


    Once the Java code setting up the View object is in place, you can attach an event
    listener method to that object, which will perform event handling for the View
    object, which in most cases is one of the UI design elements.


    There are a half-dozen event handling methods that are used the most often in
    Android, including `.onClick()`, `.onLongClick()`, `.onTouch()`, `.onKeyUp()`,
    `.onKeyDown()`, `.onCreateContextMenu()`, and `.onFocusChange()`. If you want
    to research Android OS input events in more detail, visit the following URL:


    [`http://developer.android.com/guide/topics/ui/ui-events.html`](http://developer.android.com/guide/topics/ui/ui-events.html)


    The last event handler I mentioned was the `.onFocusChange()` method, which tracks
    a change in user focus. This brings up another concept called focus, which is
    used to ascertain which of the UI widgets in the layout container your user is
    using or focusing on (interfacing with or using) currently.


    The Android OS will handle determining which of the parent `ViewGroup` child `View`
    objects currently has the focus of your application end user. This is accomplished
    by tracking input events that can tell Android which UI widget the user is touching
    (using) currently, as well as how the user may be progressing from one UI element
    to the next.


    You can also force your application to set its focus to any UI `View` object (user
    interface element) at any time. To do this, you would call the View’s `.requestFocus()`
    method, which would then highlight the UI element for use.


    Additionally, all `View` objects will let you set the `.onFocusChange()` event
    listener so that your application logic, if it needs to, can be notified and take
    appropriate action when the `View` object that it is attached to gains or loses
    the user’s focus.


    We will be looking at input events, event listeners, event handling, and focus
    in detail throughout this book as they are all fundamental to your application
    development, user interface, and user experience optimization.


    Next, let’s implement the Bookmarking Utility Activity subclass and also create
    your new `RelativeLayout` container so you can get some practice with that layout
    container type. You’ll get this new Activity working with your Options menu, add
    it to your `AndroidManifest.xml` configuration file, and add a `TextView` widget
    as well. Later, you’ll add other types of UI widgets (View subclasses) to this
    new Bookmarking Utility Activity as well.


    ## Bookmark Utility UI: Using a RelativeLayout and TextView


    Next, you are going to create your Bookmarking Utility and in the process learn
    about `RelativeLayout` container parameters and the `TextView` UI widget because
    these are the most commonly used classes in all of Android.


    After you accomplish that, you can then move on to more advanced widgets and layout
    containers, but first I need to make sure all of my readers have this proper basic
    graphics design foundation and that I have covered the more basic `ViewGroup`
    and `View` subclasses.


    Some of you might be wondering: What does text have to do with graphics design?
    If you take a close look at Photoshop or GIMP, you will find extensive text creation
    and alignment tools in these packages. The `TextView` class in Android provides
    nearly a hundred parameters that allow developers to simulate this type of design
    power and flexibility in their Android application development work process, which
    is fantastic.


    You need to finish implementing your second `MainActivity` class options menu
