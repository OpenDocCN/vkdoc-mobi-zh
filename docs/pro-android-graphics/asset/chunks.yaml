  trans: '

    # 密度无关性：打造相似的用户体验


    当一个 Android 应用能够在具有不同像素密度或不同 `DPI`（每英寸点数）或 `PPI`（每英寸像素数）的显示屏上，保持用户界面元素（从最终用户的角度来看）的物理外观时，我们就说该应用实现了密度无关性。


    如果你想知道为什么设备无关性如此重要，那是因为如果没有它，你所有的 UI 元素在低密度显示屏上会显得更大，而在高密度显示屏上则会小得多。你很快就会看到，与密度相关的用户界面元素尺寸变化可能会导致应用布局内出现视觉（用户体验或
    UX）问题，并且这会严重影响你应用的可用性。


    Android 操作系统会通过几种不同的方式帮助你的应用实现密度无关性。首先，Android 会根据当前屏幕密度，酌情将 `DIP` 单位向上或向下缩放。


    其次，如果有必要，Android 会根据当前屏幕密度，将你的可绘制资源缩放到合适的尺寸。理想情况下，这并非必需，因此在本章中，我将详细阐述如何尝试为基于像素的资产创建三到四个不同的版本，这样
    Android 就有多个间距相等的分辨率密度目标可供选择。这样做的目的是，即便 Android 被迫进行缩放，它也能尽可能地接近完美的视觉效果。


    你可能会想：为什么不只提供一个高分辨率资源，然后让 Android 将其缩小适配呢？简短的回答是：Android 的缩放效果并不理想，它没有像 Photoshop
    和 GIMP 那样的双三次插值算法，因此我们目前必须自己使用 Photoshop CS6 或 GIMP 2.8 创建缩放后的资源目标，供 Android 使用。


    这就是为什么我在我的 Android 书籍中会介绍如何使用这些外部的开源新媒体内容生产工具；因为要在 Android 中真正达到完美的效果，目前需要利用 Android
    开发环境之外的其它软件来进行某种形式的媒体优化。Android 开发涉及许多软件包！


    在许多情况下，开发者只需在 `DIP` 或 `DP` 单位中指定所有 UI 布局尺寸值，即可在应用中实现密度无关性。正如你在前几章中已经看到的，使用 `match_parent`
    和 `wrap_content` 常量也可以为我们匹配或缩放 UI 区域。但如果你使用基于像素（图像）的资源，事情就没那么简单了！


    Android 会缩放 `PNG`、`GIF` 或 `JPEG` 位图可绘制对象，以及任何视频资源，试图根据当前屏幕密度的最佳缩放因子，以最佳像素分辨率来显示它们。需要注意的是，像素缩放常常会导致模糊或像素化的结果，这再次源于当前尚不够先进的缩放算法。


    为了避免缩放伪影，我们鼓励开发者为三到四种不同的密度提供多个替代位图资源层级。提供多少这样的资源完全由你决定，而这正是本章节在书中的目的，以便你可以权衡计算。


    例如，你至少应该为大型（iTV）和高密度（高清智能手机）屏幕提供高分辨率级别的位图资源。Android 会智能地使用这些高分辨率资源，而不是将专为中等密度“普通”屏幕设计的栅格（基于像素的）资源进行放大。


    你至少还应该拥有另一套资源，用于针对采用 `MDPI`（中等像素密度）的主流正常尺寸设备屏幕。随着智能手表的出现，你可能还需要考虑优化良好的 `LDPI`（低密度像素图像）资源，特别是如果你的应用目标是智能手表。目前智能手表正迅速涌入
    Android 市场，今年已有十几家主要制造商发布了相关型号。


    一个 160 `DPI` 的 `MDPI` 屏幕密度资源，正好是 320 `DPI` 的 `XHDPI` 屏幕密度资源的 2 倍下采样，也正好是 480 `DPI`
    的 `XXHDPI` 屏幕密度资源的 3 倍下采样，稍后在本章中你为 `GraphicsDesign` 应用创建启动器图标资源时将会看到这一点。


    表 5-1 总结了 Android 密度限定符、屏幕尺寸常量、像素密度 `DPI`、像素倍数（相对于默认的普通 `MDPI`），以及 Android 为每个以
    `DIP` 指定的层级定义的最小屏幕尺寸，最后是用物理像素指定的应用系统图标类型。


    表 5-1. 显示 Android 专门支持的六级像素密度屏幕的 Android 设备 DPI 表


    | Android 设备 DPI 表 | 屏幕尺寸 | 像素密度 | 像素倍数 | 最小 DP 屏幕尺寸 | 启动器图标像素尺寸 | 操作栏图标尺寸 | 通知图标尺寸
    |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | `LDPI` (低密度像素) | 小 | 120 | 0.75 | 426x320 | 36x36 | 24x24 | 18x18 |

    | `MDPI` (中等) (默认) | 普通 | 160 | 1.0 | 470x320 | 48x48 | 32x32 | 24x24 |

    | `TVDPI` (高清电视 1280x720) | 高清电视 | 213 | 1.33 | 640x360 | 64x64 | 48x48 | 32x32
    |

    | `HDPI` (高密度像素) | 大 | 240 | 1.5 | 640x480 | 72x72 | 48x48 | 36x36 |

    | `XHDPI` (超高密度) | 超大 | 320 | 2.0 | 960x720 | 96x96 | 64x64 | 48x48 |

    | `XXHDPI` (超超高密度) | 超超大 | 480 | 3.0 | 1280x960 | 144x144 | 96x96 | 72x72 |

    | `XXXHDPI` (超超超高密度) | 超超超大 | 640 | 4.0 | 1920x1440 | 192x192 | 128x128 | 96x96
    |


    在决定为这七个目标数字图像资源密度层级中的哪几个开发资源时，我还会考虑将新媒体资源交付到 Android 之外的平台，例如 HTML5 应用，甚至数字标牌。


    重要的是要记住，目前使用 Photoshop 或 GIMP 对你的图像资源进行下采样（最好以偶数 2 倍或 4 倍进行），其效果肯定远优于 Android
    操作系统提供的重采样。因此，最终的考量因素是应用的总数据占用空间，以及你的应用需要多少不同的图像、帧动画、图标或 UI 元素图像资源。我最低限度建议提供针对
    `MDPI`、`HDPI` 和 `XHDPI` 的资源，或者至少提供针对 `MDPI` (160) 和 `XHDPI` (320) 的资源。

    '
- fmt: '# Android Multi-Screen Support Via `<supports-screens>` Tag


    As you have seen so far in this chapter, Android will handle the majority of the
    work of rendering the application’s user experience properly on device screen
    configurations by scaling layouts to fit a screen size and density. Android will
    also scale image, video, and frame animation drawables for any given screen density,
    if it becomes necessary.


    There are some additional ways developers can optimize their XML markup, and Java
    code, that will allow the Android OS to further optimize visual results across
    many different screen configuration types. So, let’s cover those here, over the
    next several sections of this chapter.


    Android developers are allowed to explicitly declare in their application `AndroidManifest`
    XML file the different screen sizes that the application supports. You may have
    noticed the `AndroidManifest.xml` file in Eclipse in the project folder at the
    bottom in the root of the project folder itself. This “manifest” file essentially
    configures and launches, or “bootstraps,” the Android application, much like an
    `index.html` file does for a web site.


    Declaring the exact screen sizes that your application supports ensures that only
    device owners with screens that your app can support will be able to purchase
    and download your application. An obvious downside to doing this is that implementing
    this can severely restrict the potential market size, that is, your application’s
    purchasing audience.


    The other thing that specifically declaring screen size support across the different
    screen sizes will affect is how the Android operating system can render your application
    on larger screens. Specifically declaring a screen size will determine whether
    or not an application runs in Android’s screen compatibility mode. Screen compatibility
    mode is a “band-aid” solution for Android applications that are not efficiently
    designed to scale for large display screens, such as those found in tablets and
    iTV sets.


    Starting with OS Version 1.6, Android has added support for a wide variety of
    screen sizes and performs most the work of resizing application layouts so that
    they correctly fit on any screen. However, if the application does not follow
    the guidelines for supporting multiple display screens, Android could stumble
    across some rendering issues on some larger display screens.


    For application designs that encounter this particular problem, the screen compatibility
    mode may make the application a little more usable on larger screens, but then
    again, it might not, so make sure to test your app well.


    To declare the display screen sizes that your application supports, you’ll need
    to include the `<supports-screens>` XML element in your `AndroidManifest` XML
    file. This tag is a child tag of the `<manifest>` parent tag, and allows you to
    specify all of the screen sizes your application supports and to enable screen
    compatibility mode for screens that are larger than what your application currently
    has the assets in place to support.


    It is important that you leverage this element in your Android application manifest
    XML file, to specify every screen size your application supports. An application
    can be said to “support” a given screen size constant if it has all the assets
    it needs to resize your content and UI properly to fill an entire screen area,
    meaning at least MDPI, HDPI, and XHDPI image assets.


    Thus, if you intend to include these three “suggested” (required) normal, largeScreen,
    and `xlargeScreen` resolution density assets, be sure to also include the following
    `<supports-screens>` tag (and parameter) configuration in your `AndroidManifest.xml`
    file, after the `<manifest>` tag as a child tag:


    `<supports-screens android:largeScreens="true" android:xlargeScreens="true" />`


    Note that you do not have to specify `android:normalScreens=“true”` as this is
    the default `<supports-screens>` size specification, and thus is inherently specified,
    so just add largeScreen and xlargeScreen support via this tag. You will add this
    tag a little later on in the chapter, when you are editing your `AndroidManifest.xml`
    file, since you need to include this in your app.


    Resampling applied by Android will usually work well for most applications, and
    you should not have to do any extra work to make your application work across
    screens that are larger than an HD smartphone or a tablet.


    However, it’s important that you optimize your application’s UI design for different
    screen sizes by providing alternative layout resources. To offer an example, you
    may wish to modify the layout of an Activity when it is on a tablet, compared
    to when it’s running on smartphones. We will be looking more closely at alternate
    layouts in the next section of this chapter.


    If your application does not work well when it is resized to fit different screen
    sizes, you can use the parameters of the `<supports-screens>` tag to control whether
    your application should be distributed to smaller screens or have its UI scaled
    up or zoomed to fit larger Android screens using the system’s screen compatibility
    mode. You can take a look at all of the tag parameters if you like by visiting
    the Android Developer site at this URL:


    [`http://developer.android.com/guide/topics/manifest/supports-screens-element.html`](http://developer.android.com/guide/topics/manifest/supports-screens-element.html)


    If you haven’t designed your application assets, layout, and user interface design
    to support larger screen sizes, and the normal Android scaling does not achieve
    an acceptable result, an Android screen compatibility mode can be invoked in order
    to scale your app up to fit on the larger screen size. Android does this by emulating
    a normal size screen (medium density MDPI). This emulation is implemented by zooming
    the MDPI density (normal sized) assets and UI designs, so that they fill the entire
    HDPI or XHDPI screen.


    It’s important to note that this upscaling causes pixelation and blurring of your
    content and user interface designs, as up-scaling invariably will. This is why
    Android strongly suggests (as do I) that you provide optimized content and user
    interface layouts for your application, across MDPI, HDPI, and XHDPI at the very
    least, so that you have image assets in place that can be optimized (scaled) by
    Android OS for use on larger display screens.'
  raw: '## Android Multi-Screen Support Via <supports-screens> Tag


    As you have seen so far in this chapter, Android will handle the majority of the
    work of rendering the application’s user experience properly on device screen
    configurations by scaling layouts to fit a screen size and density. Android will
    also scale image, video, and frame animation drawables for any given screen density,
    if it becomes necessary.


    There are some additional ways developers can optimize their XML markup, and Java
    code, that will allow the Android OS to further optimize visual results across
    many different screen configuration types. So, let’s cover those here, over the
    next several sections of this chapter.


    Android developers are allowed to explicitly declare in their application `AndroidManifest`
    XML file the different screen sizes that the application supports. You may have
    noticed the `AndroidManifest.xml` file in Eclipse in the project folder at the
    bottom in the root of the project folder itself. This “manifest” file essentially
    configures and launches, or “bootstraps,” the Android application, much like an
    `index.html` file does for a web site.


    Declaring the exact screen sizes that your application supports ensures that only
    device owners with screens that your app can support will be able to purchase
    and download your application. An obvious downside to doing this is that implementing
    this can severely restrict the potential market size, that is, your application’s
    purchasing audience.


    The other thing that specifically declaring screen size support across the different
    screen sizes will affect is how the Android operating system can render your application
    on larger screens. Specifically declaring a screen size will determine whether
    or not an application runs in Android’s screen compatibility mode. Screen compatibility
    mode is a “band-aid” solution for Android applications that are not efficiently
    designed to scale for large display screens, such as those found in tablets and
    iTV sets.


    Starting with OS Version 1.6, Android has added support for a wide variety of
    screen sizes and performs most the work of resizing application layouts so that
    they correctly fit on any screen. However, if the application does not follow
    the guidelines for supporting multiple display screens, Android could stumble
    across some rendering issues on some larger display screens.


    For application designs that encounter this particular problem, the screen compatibility
    mode may make the application a little more usable on larger screens, but then
    again, it might not, so make sure to test your app well.


    To declare the display screen sizes that your application supports, you’ll need
    to include the `<supports-screens>` XML element in your `AndroidManifest` XML
    file. This tag is a child tag of the <manifest> parent tag, and allows you to
    specify all of the screen sizes your application supports and to enable screen
    compatibility mode for screens that are larger than what your application currently
    has the assets in place to support.


    It is important that you leverage this element in your Android application manifest
    XML file, to specify every screen size your application supports. An application
    can be said to “support” a given screen size constant if it has all the assets
    it needs to resize your content and UI properly to fill an entire screen area,
    meaning at least MDPI, HDPI, and XHDPI image assets.


    Thus, if you intend to include these three “suggested” (required) normal, largeScreen,
    and `xlargeScreen` resolution density assets, be sure to also include the following
    <supports-screens>tag (and parameter) configuration in your AndroidManifest.xml
    file, after the</supports-screens> `<manifest>` tag as a child tag:


    `<supports-screens android:largeScreens="true" android:xlargeScreens="true" />`


    Note that you do not have to specify android:normalScreens=“true” as this is the
    default <supports-screens> size specification, and thus is inherently specified,
    so just add largeScreen and xlargeScreen support via this tag. You will add this
    tag a little later on in the chapter, when you are editing your AndroidManifest.xml
    file, since you need to include this in your app.


    Resampling applied by Android will usually work well for most applications, and
    you should not have to do any extra work to make your application work across
    screens that are larger than an HD smartphone or a tablet.


    However, it’s important that you optimize your application’s UI design for different
    screen sizes by providing alternative layout resources. To offer an example, you
    may wish to modify the layout of an Activity when it is on a tablet, compared
    to when it’s running on smartphones. We will be looking more closely at alternate
    layouts in the next section of this chapter.


    If your application does not work well when it is resized to fit different screen
    sizes, you can use the parameters of the <supports-screens> tag to control whether
    your application should be distributed to smaller screens or have its UI scaled
    up or zoomed to fit larger Android screens using the system’s screen compatibility
    mode. You can take a look at all of the tag parameters if you like by visiting
    the Android Developer site at this URL:


    [`http://developer.android.com/guide/topics/manifest/supports-screens-element.html`](http://developer.android.com/guide/topics/manifest/supports-screens-element.html)


    If you haven’t designed your application assets, layout, and user interface design
    to support larger screen sizes, and the normal Android scaling does not achieve
    an acceptable result, an Android screen compatibility mode can be invoked in order
    to scale your app up to fit on the larger screen size. Android does this by emulating
    a normal size screen (medium density MDPI ). This emulation is implemented by
    zooming the MDPI density (normal sized) assets and UI designs, so that they fill
    the entire HDPI or XHDPI screen.


    It’s important to note that this upscaling causes pixelation and blurring of your
    content and user interface designs, as up-scaling invariably will. This is why
    Android strongly suggests (as do I) that you provide optimized content and user
    interface layouts for your application, across MDPI, HDPI, and XHDPI at the very
    least, so that you have image assets in place that can be optimized (scaled) by
    Android OS for use on larger display screens.'
