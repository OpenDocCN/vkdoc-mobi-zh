  trans: '

    这个像素数量（24 个或更多）足以在需要时进行放大，并在缩小时呈现照片级的细节，或在更高像素密度下使用（此时画面会显得更小）。


    如图 10-10 和图 10-11 所示，在 Draw 9-patch 应用程序预览窗格的右侧，缩放图形看起来清晰而逼真。当你滚动预览窗格时，这种清晰效果会一直保持。


    现在，是时候通过 **文件** 菜单和 **文件 ➤ 保存 9-patch** 菜单序列来保存 9-patch 图像资源了，如图 10-11 所示。


    ![A978-1-4302-5786-8_10_Fig11_HTML.jpg](img/A978-1-4302-5786-8_10_Fig11_HTML.jpg)


    **图 10-11.** 最终补丁定义，以及使用文件菜单和保存 9-patch 菜单选项来保存 9-patch 文件


    你的 Draw 9-patch 软件工具的文件保存对话框（如图 10-12 所示）会自动将你的 9-patch 图像资源保存为 Android 操作系统所需的
    `.9.png` 文件扩展名。


    当 Android 在 `/res/drawable` 文件夹中看到这种类型的 PNG 文件名时，它会自动使用 `NinePatch` 类加载该文件，并且一旦其在
    XML 中被引用，就会将其转换为一个 `NinePatchDrawable` 图像资源。


    这里需要注意一点，因为截图中同时存在 **打开 9-patch** 菜单选项：打开一个普通的（非 9-patched）PNG 文件（`*.png`）时，将加载你的
    PNG 资源，并在图像周围添加一个空的单像素边框，你可以在其中绘制你的可伸缩补丁和内容区域。


    如果你使用此菜单命令打开先前保存的 9-patch PNG 文件（`*.9.png`），你的 9-patch PNG 资源将按之前的修改状态加载，不会添加单像素的绘制区域边框，因为由于之前的编辑会话，该单像素补丁定义区域已经存在于你的文件中。


    关于保存对话框的最后一个注意事项是：它不会在对话框本身中显示 `.9.png` 扩展名，但会在将文件作为新的 9-patch 图像资源保存到硬盘驱动器时自动插入该扩展名。当你第一次使用这个软件工具时，这可能会有些令人困惑，因为保存对话框中显示它将保存一个
    `NinePatchFrame.png`，但它实际保存的是 `NinePatchFrame.9.png`。


    ![A978-1-4302-5786-8_10_Fig12_HTML.jpg](img/A978-1-4302-5786-8_10_Fig12_HTML.jpg)


    **图 10-12.** 使用保存对话框导出 `NinePatchFrame.9.png` 文件


    在保存文件时，请务必牢记这个注意事项，以免得到 `NinePatchFrame.9.9.png` 这样的文件。即使你真的得到了，工作流程中的下一步将是进入你的操作系统文件管理工具，查看你的原始文件和新生成的
    9-patch 版本，并了解 9-patch 定义为文件增加了多少数据体积。


    从任务栏启动你的操作系统文件管理工具；对于 Windows 8，它恰好是 Windows 资源管理器文件工具，如图 10-13 所示。如你所见，在我的 `/PAGD/NinePatch`
    文件夹中，有一个包含 280 像素图像资源源的原始 Photoshop 文件；一个带有 alpha 通道的 `NinePatchFrame.png` PNG32
    图像资源，已准备好导入 Draw 9-patch；以及一个由 Draw 9-patch 工具生成的 `NinePatchFrame.9` PNG32 文件。


    ![A978-1-4302-5786-8_10_Fig13_HTML.jpg](img/A978-1-4302-5786-8_10_Fig13_HTML.jpg)


    **图 10-13.** 检查 NinePatch 文件夹，查看原始的 NinePatchFrame 和新的 `NinePatchFrame.9.png`
    文件


    让我们找出 `.9.png` 文件增加了多少数据量，因为正如截图中所述，9-patch 定义过程为我的 PNG 文件大小增加了整整 1KB，但这个评估对我来说不够精确。


    要找出这两个文件之间确切的文件大小差异，请右键单击每个 PNG 文件资源，然后使用 **属性** 选项。这将允许你查看每个文件的实际文件大小数据量。


    原始 PNG 文件为 19.7KB，新 PNG 文件为 20.2KB。这意味着 9-patch 定义为这个 280 像素的方形图像资源增加了 0.5KB 的数据，即增加了大约
    2.5% 的数据。能将如此灵活的图像资源缩放能力直接嵌入到 PNG 数字图像资源本身，已经相当不错了。


    现在你已经创建了一个可用的 9-patch 图像资源，让我们进入你的 XML 资源文件，并在几个地方将其实现，看看它在你的 GraphicsDesign Android
    应用程序上下文中的效果如何。

