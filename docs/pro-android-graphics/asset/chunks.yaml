    Figure 12-13.


    Creating a Drawable object named layerOne, cast to a LayerDrawable via findDrawableByLayerId()


    Now that your layerOne Drawable object is loaded with a LayerDrawable layer that
    you want to use in your PorterDuff blending pipeline, you can proceed!'
  trans: '

    绝非易事；而且，正如你将在后续章节中看到的，在 Android 操作系统中也尚未达到 100% 完美！这是与 Android 这样的新操作系统和平台打交道时需要注意的问题之一；作为一名开发者，你必须在当前可用的工具中（及其限制下）工作，并利用那些运行足够稳定、可供使用的功能，同时等待新功能的加入——新功能最终总会在某个时间点被添加。


    现在，你已经准备好将这个 `LayerDrawable` 对象引入你的 Java 代码，并将其与上一章编写的 PorterDuff Java 代码整合。这将向你展示如何在
    Java 中实例化 `LayerDrawable`，以及如何访问 XML 定义中的各个图层。你还将学习如何提取这些图层中定义的图像数据，并如何在更高级的图像合成与混合管线中应用进一步的处理，例如将图层与
    Android 的 PorterDuff 混合（或称传输）模式结合使用。


    ## 实例化用于 PorterDuff 合成的 `LayerDrawable`


    在 Java 代码中，你需要做的第一件事就是实例化这个 `LayerDrawable` 对象，通过加载你的 `contents_layers.xml` 定义来创建该对象的属性。因此，启动
    Eclipse ADT，点击 `ContentsActivity.java` 标签，回到你的合成代码中。


    在 `onCreate()` 方法顶部的 `setContentView()` 方法调用之后，添加一个新行（回车），并加入以下这行 Java 代码。这行代码将实例化一个名为
    `layerComposite` 的 `LayerDrawable` 对象，然后使用 `getResources().getDrawable()` 方法链来加载你的
    XML 定义：


    ```

    LayerDrawable layerComposite = (LayerDrawable)getResources().getDrawable(R.drawable.contents_layers);

    ```


    正如你在图 12-12 中所见，接下来你需要将鼠标悬停在 `LayerDrawable` 类引用下方波浪形的红色错误提示上，这将指示 ADT 为你编写 `Import
    android.graphics.drawable.LayerDrawable` 这条 Java 语句。完成此操作后，你会注意到你的对象名 `layerComposite`
    也会出现波浪形的黄色警告提示，因为它目前尚未使用——至少在你编写下一行代码之前是这样。


    ![A978-1-4302-5786-8_12_Fig12_HTML.jpg](img/A978-1-4302-5786-8_12_Fig12_HTML.jpg)


    图 12-12. 在 Java 中实例化一个 `LayerDrawable` 对象，将其命名为 `layerComposite` 并调用 `.getDrawable()`


    接下来，你需要创建一个 `Drawable` 对象来保存 `LayerDrawable` 的内容，你将把这个对象集成到当前的 PorterDuff 图像混合渲染管线中。你在上一章编写了这段代码，而本章将对其进行增强，使其能够与
    `LayerDrawable` 对象协同工作。


    ## 创建一个 `Drawable` 对象来保存 `LayerDrawable` 资源


    现在，你已经创建并加载了 `LayerDrawable` 对象到内存中，下一步是提取该对象中的某个图层，以便在你之前创建的 PorterDuff 图像混合（或像素传输）管线中使用它。你将要扩展这个管线，使其支持
    `LayerDrawable` 对象（图层）。


    此过程的第一步是创建一个 Android `Drawable` 对象，并将其命名为 `layerOne`，如图 12-13 所示。你将对这个 `Drawable`
    对象做的是：用它来将 `LayerDrawable` 转换为 `Drawable` 对象，然后使用 `.findDrawableByLayerId()` 方法在单行代码中指定你想要使用的图层，如下所示：


    ```

    Drawable layerOne = ((LayerDrawable)layerComposite).findDrawableByLayerId(R.id.layerThree);

    ```


    这行代码的作用是：在单行代码中，创建一个 `Drawable` 对象，将其命名为 `layerOne`，然后将该对象设置为（加载）你之前实例化的 `LayerDrawable`
    对象 `layerComposite`，接着使用点号表示法调用 `.findDrawableByLayerId()` 方法，并传入对本章前面定义的 `layerThree`
    `<item>` 的引用。


    ![A978-1-4302-5786-8_12_Fig13_HTML.jpg](img/A978-1-4302-5786-8_12_Fig13_HTML.jpg)


    图 12-13. 创建一个名为 `layerOne` 的 `Drawable` 对象，通过 `findDrawableByLayerId()` 将其转换为
    `LayerDrawable`


    现在，你的 `layerOne` `Drawable` 对象已加载了你想在 PorterDuff 混合管线中使用的 `LayerDrawable` 图层，可以继续了！

    '
- fmt: '# Cast a Drawable to a BitmapDrawable and Extract a Bitmap


    The next step towards getting the `Bitmap` object data that you are going to need
    in order to utilize your existing PorterDuff image blending pipeline is to again
    cast this `Drawable` object into a `BitmapDrawable` object. You do this so that
    you can extract a `Bitmap` object from the `BitmapDrawable` object using the `.getBitmap()`
    method, and you will do all of this again using only one single line of Java code,
    written as follows:


    `Bitmap composite = ((BitmapDrawable)layerOne).getBitmap();`


    What this does, using very compact Java code, is to create a `Bitmap` object and
    name it `composite`, and then set the `Bitmap` object equal to (or load it with)
    the `Drawable` object you instantiated earlier named `layerOne`, and then use
    dot notation to call the `.getBitmap()` method, which gets the `Bitmap` in the
    `Drawable` object, which is actually now cast as a `BitmapDrawable` object and
    loads that digital image data into the `Bitmap` object named `composite`. As you
    can see in Figure [12-14](#A978-1-4302-5786-8_12_Chapter.html#Fig14), you will
    also need to mouse-over the error highlighting, so that Eclipse will write the
    `Import BitmapDrawable` `(android.graphics.drawable)` Java statement for you.


    ![A978-1-4302-5786-8_12_Fig14_HTML.jpg](A978-1-4302-5786-8_12_Fig14_HTML.jpg)


    **Figure 12-14.** Casting a `Drawable` to a `BitmapDrawable`, then using `.getBitmap()`
    method to convert to a `Bitmap` object


    Now that your composite `Bitmap` object is loaded with your `layerOne` `Drawable`
    object, which was previously loaded with your `LayerDrawable` layer, which you
    ultimately wish to use in your PorterDuff blending pipeline, you can now proceed
    to create a mutable `Bitmap` object (in memory) so you can process it!


    You already know how to create a mutable `Bitmap` object by using the `.copy()`
    method, specifying a `Config.ARGB_8888` constant, called off a `Bitmap` class.
    Just in case you forgot how this is structured in Java, here is the code:


    `Bitmap mutableComposite = composite.copy(Bitmap.Config.ARGB_8888, true);`


    Now you have reached the final mutable `Bitmap` object “destination” that you
    reached in the PorterDuff image blending chapter, so all you really have to do
    next is to substitute the `mutableComposite` `Bitmap` object for either the `mutableForegroundImage`
    or the `mutableBackgroundImage` object references in your existing PorterDuff
    image blending (and pixel transfer) pipeline.


    As you can see in Figure [12-15](#A978-1-4302-5786-8_12_Chapter.html#Fig15), I
    have not done this as yet, which is why you see wavy yellow underline warning
    highlighting on the `mutableComposite` `Bitmap` object, as it is currently unused,
    until I plug it into the render pipeline, which you will do next.


    ![A978-1-4302-5786-8_12_Fig15_HTML.jpg](A978-1-4302-5786-8_12_Fig15_HTML.jpg)


    **Figure 12-15.** Creating a mutable `Bitmap` object named `mutableComposite`
    using `.copy()` method with `ARGB_8888`


    Let’s substitute your `mutableComposite` object (LayerDrawable to Drawable to
    BitmapDrawable to Bitmap cast object, actually) for the `foregroundImage` and
    `mutableForegroundImage` objects, which you really should comment out of your
    Java code so they do not take up any system memory while you put them on the shelf,
    so to speak. You can see the commenting operation you invoked in Figure [12-16](#A978-1-4302-5786-8_12_Chapter.html#Fig16)
    in green; all you had to do was put two forward slashes at the beginning of each
    line of code, and they vanished from Android’s view!


    Let’s modify your PorterDuff pipeline to reference your cast `LayerDrawable` and
    incorporate layer compositing into your image-blending Java code next!


    ## Modifying the PorterDuff Pipeline to Use a LayerDrawable


    Let’s replace the `mutableForegroundImage` object you created previously, and
    recently commented out of your Java code (for now), inside your existing `compositeImage`
    `Bitmap` object. This object is referenced by your `imageCanvas` `Canvas` object.
    You will do this by using the following line of Java code:


    `Bitmap compositeImage = Bitmap.createBitmap(mutableComposite);`


    What this does is to incorporate the drawable image asset that is defined in your
    `LayerDrawable` object in `layerThree`, which is the `bookmark0.jpg` image asset,
    into the image blending PorterDuff pipeline. As you can see in Figure [12-16](#A978-1-4302-5786-8_12_Chapter.html#Fig16),
    your code is error-free and ready to test out in the Nexus One emulator. If you
    count the commented-out lines of code, you have implemented layer support and
    image blending using only 15 lines of (dense) Java code.


    ![A978-1-4302-5786-8_12_Fig16_HTML.jpg](A978-1-4302-5786-8_12_Fig16_HTML.jpg)


    **Figure 12-16.** Modifying `compositeImage` `Canvas` target to reference your
    `LayerDrawable` `mutableComposite` `Bitmap`


    Now, it is time to see if your digital image compositing pipeline Java code actually
    works! Utilize your **Run As ➤ Android Application** work process to launch your
    Nexus One emulator. Once your application loads, click your **MENU** button and
    select the **Table of Contents** menu selection. Let’s take a look at your digital
    image layer blending and compositing results. You’ll try using one pixel transfer
    mode and an image blending mode to test both!


    As you can see in Figure [12-17](#A978-1-4302-5786-8_12_Chapter.html#Fig17), the
    `PorterDuff.Mode.SCREEN` constant, which you have set in your `paintObject` `Paint`
    object, is working perfectly using the `layerThree` layer from the `LayerDrawable`
    object you created earlier in the chapter using the `contents_layer.xml` file
    and its `<layer-list>` parent tag XML definition.


    ![A978-1-4302-5786-8_12_Fig17_HTML.jpg](A978-1-4302-5786-8_12_Fig17_HTML.jpg)


    **Figure 12-17.** Testing the `LayerDrawable` asset in your existing PorterDuff
    pipeline with blend and transfer modes


    Next, let’s change this `PorterDuff.Mode` constant to the `XOR` constant, and
    make sure pixel blending is working as well. As you can see on the right-hand
    side of Figure [12-17](#A978-1-4302-5786-8_12_Chapter.html#Fig17), the `XOR` image
    transfer mode is also working as expected, so you have implemented both image
    blending and pixel transfers using your `LayerDrawable` object.


    If you look very closely at the left-hand side of Figure [12-17](#A978-1-4302-5786-8_12_Chapter.html#Fig17),
    there is something wrong with the `backgroundImage` plate. Your `cloudsky.jpg`
    is no longer being scaled to fit the `ImageView` UI display container, as it is
    in the **Graphical Layout Editor** preview. It is using original unscaled image
    pixels, so all you see behind your bookmark foreground image, which is being extracted
    from the `LayerDrawable`, is the clouds from the upper-left (0,0) corner of the
    `CloudSky` image.


    Let’s change some things around and see if we can figure out why the scale has
    changed for one of your composite image assets inside your PorterDuff rendering
    pipeline. Offhand, I don’t see any obvious reason why this would have occurred,
    but let’s change some things around a bit and investigate!'
