    will not be using it with your VideoView UI widget.


    Now you’re ready to take a look at how your Java code will implement your UI!


    ## Taking a Look at Your MainActivity.java Activity subclass


    Just to be thorough, since you are in the process of examining what the New Android
    Application series of dialogs created for you, let’s take a look at your Java
