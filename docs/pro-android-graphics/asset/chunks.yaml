- fmt: 'You’ll get all of this work out of the way now so that you can test your new
    Activity UI screen as you progress through the rest of this chapter.


    The next logical thing to do, since you have the `BokmarkActivity.java` class
    created and error-free now, is to add that Activity subclass to your `AndroidManifest.xml`
    file using the `<activity>` child tag that will make it visible to the Android
    OS for use.


    Right-click the `AndroidManifest.xml` file, and Open it, and then add the `<activity>`
    tag as you did for the Table of Contents Activity subclass in the previous chapter.
    When you are finished, it will look very similar to your `ContentsActivity` tag
    located right above it, but it will reference a different class name and label
    `<string>` tag constant, as shown in Figure [7-4](#A978-1-4302-5786-8_7_Chapter.html#Fig4).
    You are going to create the `<string>` constants in your `strings.xml` file and
    then you will be ready to get to work crafting your `RelativeLayout` container
    design.


    ![A978-1-4302-5786-8_7_Fig4_HTML.jpg](A978-1-4302-5786-8_7_Fig4_HTML.jpg)


    **Figure 7-4.** Adding a `BookmarkActivity` label and referencing your `AndroidManifest.xml`
    file using an `<activity>` tag


    Next, click your `strings.xml` tab in the central editing area of Eclipse, or,
    if it is not open, go into your `/res/values` folder, right-click the `strings.xml`
    file name, and Open it, or use the F3 key to open the file.


    Copy and paste the last `<string>` tag constant entry, and then paste it two times
    underneath itself. You’ll do this so you can add the `bmu_title` (label) string
    constant referenced in your AndroidManifest, as well as the TextView string constant
    that you will use next when you start crafting your widgets inside your `RelativeLayout`
    container XML definition.


    Set the text value for the `<string>` tag named `bmu_title` to be “BOOKMARKING
    UTILITY” and the text value for the `<string>`tag named `bookmark_text` to be
    “Current Bookmark Page” using the following two lines of XML markup:


    ```

    <string name="bmu_title">BOOKMARKING UTILITY</string>

    <string name="bookmark_text">Current Bookmark Page</string>

    ```


    Once your `<string>` tag XML constants are in place, as shown in Figure [7-5](#A978-1-4302-5786-8_7_Chapter.html#Fig5),
    you can then proceed to your `MainActivity.java` class, and make your second menu
    item operable by referencing your new `BookmarkActivity` class, which has now
    been set up in Eclipse as well as in your `AndroidManifest.xml` file.


    ![A978-1-4302-5786-8_7_Fig5_HTML.jpg](A978-1-4302-5786-8_7_Fig5_HTML.jpg)


    **Figure 7-5.** Adding `<string>` tag constants for your Activity screen label
    in your manifest and screen title in `TextView`


    Click your `MainActivity.java` tab located at the top of Eclipse; it may be hiding
    under the `>> Number` (the open tabs not showing) menu, which is a `>>1` in Figure
    [7-5](#A978-1-4302-5786-8_7_Chapter.html#Fig5). If `MainActivity.java` is not
    open for editing currently, go into the `/src` folder and find it, and right-click
    it to open it, or use the F3 function key once you have selected (highlighted)
    it.


    In the `onOptionsItemSelected()` method in the second switch statement case code
    block, change the reference from your `ContentsActivity.class` to your new `BookmarkActivity.class`
    so that your options menu will now launch the Bookmarking Utility Activity screen
    you have just wired into place.


    You have now done everything necessary to be able to access the `RelativeLayout`
    container that you are about to begin filling with the basic UI widgets that we
    will cover in this chapter.


    You needed to be able to access the `BookmarkActivity.java` class that calls the
    `activity_bookmark.xml` `RelativeLayout` container definition from the second
    options menu item, as shown in Figure [7-6](#A978-1-4302-5786-8_7_Chapter.html#Fig6),
    and so you had to not only call that Activity subclass from your `MainActivity`
    class Java code, but you also had to set it up in your `AndroidManifest` XML file.


    Finally, to get clean code, you had to add two new `<string>` tag constants to
    your `/res/values/strings.xml` file and create the (currently empty) XML definition
    container by creating the new `activity_bookmark.xml` file.


    Next, you’ll add a `TextView` UI widget to the `RelativeLayout` container, and
    then you will test everything in the Nexus One emulator to make sure that everything
    is wired up correctly and that you are getting the results that you want to see
    from the `TextView` UI widget child tag’s parameters.


    ![A978-1-4302-5786-8_7_Fig6_HTML.jpg](A978-1-4302-5786-8_7_Fig6_HTML.jpg)


    **Figure 7-6.** Adding a reference to your newly created `BookmarkActivity.class`
    to the Options menu in `MainActivity`


    Now you’re ready to add a `TextView` UI element to the `RelativeLayout` in your
    `activity_bookmark.xml` screen layout definition file to add a bookmarked page
    label to the top of your Bookmarking Utility user interface design.


    Click the `activity_bookmark.xml` tab at the top of Eclipse, and add an indented
    line of space after the opening `RelativeLayout` tab, and type in a `<` character
    to bring up the helper dialog, and double-click the `TextView` child tag in order
    to add it inside your `RelativeLayout` container, as shown in Figure [7-7](#A978-1-4302-5786-8_7_Chapter.html#Fig7).
    Now you’ll add parameters to configure your TextView for use.


    Type `android` and a colon after the opening `<TextView` tag, and bring up the
    helper dialog. Then find an `android:id` parameter and double-click it to add
    it. Add the `@+id/currentBookmarkText` inside the quotation marks to ID the `TextView`
    so you can later change its value using your Java code. Finally, make sure you
    create the closing `/>` for this tag (after the ID parameter).


    Use the same work process to add the required `android:layout_width` and the `android:layout_height`
    parameters, and set them both to `wrap_content`, as you just want the text object
    to float above your design as its own entity.


    ![A978-1-4302-5786-8_7_Fig7_HTML.jpg](A978-1-4302-5786-8_7_Fig7_HTML.jpg)


    **Figure 7-7.** Adding a `TextView` tag and basic parameters for layout, text
    content, ID, and horizontal centering


    To give your TextView UI element some content (a text value), again use your `android:`
    work process; this time, find the `android:text` parameter and set it equal to
    that `<string>`constant you created earlier by using the `@string/bookmark_text`
    reference path inside the quotation marks.


    Finally, use the helper dialog to find the `android:layout_centerHorizontal` parameter,
    or type it in yourself, and set it to `true` so that your `TextView` centers itself
    automatically at the top of your layout container. Now you can **Run As** ➤ **Android
    Application** and see your `TextView`, as shown in Figure [7-8](#A978-1-4302-5786-8_7_Chapter.html#Fig8).


    ![A978-1-4302-5786-8_7_Fig8_HTML.jpg](A978-1-4302-5786-8_7_Fig8_HTML.jpg)


    **Figure 7-8.** Testing your `RelativeLayout` and `TextView` in `activity_bookmark.xml`
    in the Nexus One emulator


    Next, let’s add some more advanced parameters to bring your text down a bit from
    the top of the screen, make it larger, change it to a monospace font, and give
    it some drop shadow special effects, just like you’d do if you were designing
    your UI in Photoshop CS6 or GIMP 2.8.6. To save some space, I’m going to use two
    parameters per line, as shown in Figure [7-9](#A978-1-4302-5786-8_7_Chapter.html#Fig9),
    since you are going to be adding more tags to this `RelativeLayout` container
    very soon.


    To push the `TextView` away from the top of the screen, you are going to use an
    `android:marginTop` parameter and set it to a value of `10dip` (or `10dp`).'
  raw: 'You’ll get all of this work out of the way now so that you can test your new
    Activity UI screen as you progress through the rest of this chapter.


    The next logical thing to do, since you have the BokmarkActivity.java class created
