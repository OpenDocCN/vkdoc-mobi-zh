- fmt: '## 使用 16:9 低分辨率 640x360 数字视频素材


    接下来这个分辨率也将使用`VGA 640x480`分辨率来创建其宽屏版本，但这次你不需要在宽度上增加`160`像素，而是要从高度上减去`120`像素！这将得到`640`像素宽度和`360`像素高度，并形成`16:9`的宽高比。计算方法是：`640/16=40x9=360`，所以`640x360`是流行的`16:9`高清宽高比的一个低分辨率版本。


    让我们回到`Squeeze`，使用你在上一部分学到的工作流程，复制`Android480x800p`预设，以便创建一个`Android360x640p`预设，用于较低分辨率的
    Android 设备。


    这类设备包括`HDPI`手表（2英寸屏幕，`640`像素对应`320 DPI`，因此是`HDPI`）、入门级 Android 手机（较小的4英寸屏幕，`640`像素对应`160
    DPI`，因此是`MDPI`）以及迷你平板（5英寸屏幕，`640`像素对应`128 DPI`，因此是`LDPI`）。


    复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图 [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12)
    所示。一旦`Presets`对话框打开（如图 [18-15](#A978-1-4302-5786-8_18_Chapter.html#Fig15) 左侧所示），将预设命名为`Android360x640p`，并输入描述`Android
    360x640 Portrait`，然后你就可以设置数据速率和相关参数了。将目标数据速率设置为`512 KBPS`，最大数据速率设置为比它多`150%`，即`768
    KBPS`。你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。完成竖屏预设后，返回并创建一个横屏预设。


    ![A978-1-4302-5786-8_18_Fig15_HTML.jpg](A978-1-4302-5786-8_18_Fig15_HTML.jpg)


    图 18-15.


    Android 360x480 视频编解码器预设，使用`512KBPS`到`768KBPS`的数据速率和高质量编解码器


    ## 使用上网本分辨率 1024x600 数字视频素材


    `1024x600`分辨率因大约十年前出现的超便携上网本产品而流行，其特点是宽屏`SVGA`分辨率。`SVGA`，即“超级`VGA`”，分辨率为`800x600`，因此如果你在宽度上再增加`224`像素，你将得到一个宽屏超级`VGA`（或`WSVGA`）显示屏。


    上网本拥有10.1英寸屏幕，使其成为`LDPI`（`1024/10=102`像素每英寸）。现在戴尔已经推出了 Android PC，你可能会看到 Android
    上网本市场也开始成形。也有一些采用此分辨率的智能手机和平板，屏幕尺寸为4到5英寸，这使它们处于`HDPI`（`240`像素每英寸）的屏幕密度范围。


    此分辨率的宽高比并不完全是`16:9`，因为`1024/16=64`，`64x9=576`，所以`1024x576`代表一个“真正的”`16:9`宽高比。由于`64`在`600`中出现了`9.375`次，这代表一个`16:9.375`的宽高比，或者说从宽屏`16:9`到`16:10`宽高比之间的八分之三处。


    复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图 [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12)
    所示。一旦`Presets`对话框打开（如图 [18-16](#A978-1-4302-5786-8_18_Chapter.html#Fig16) 左侧所示），将预设命名为`Android600x1024p`，并输入描述`Android
    600x1024 Portrait`。将目标数据速率设置为`1024KBPS`，最大数据速率设置为比它多`150%`，即`1536KBPS`。你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。完成竖屏预设后，返回并创建一个横屏预设。


    ![A978-1-4302-5786-8_18_Fig16_HTML.jpg](A978-1-4302-5786-8_18_Fig16_HTML.jpg)


    图 18-16.


    Android WSVGA 视频编解码器预设，使用`1MBPS`到`1.5MBPS`的数据速率和高质量编解码器


    ## 使用低高清分辨率 1280x720 数字视频素材


    大约十多年前，第一个进入数字领域的高清分辨率是“准高清”，即`1280x720`。这个分辨率有足够的像素（将近一百万）来提供清晰的视频内容，但又不会过多地拖慢处理器或数据传输带宽。它也是一个真正的`16:9`宽高比，因为`1280/16=80x9=720`。


    使用此分辨率的设备包括`Phablets`（手机平板），如三星`Galaxy Note II`，它有一个5.5英寸的屏幕，使其成为`240 DPI`的`HDPI`设备。还有更大的8英寸平板，其特点是`160
    DPI`的`MDPI`屏幕密度。采用此分辨率的10英寸大平板则属于`LDPI`或`120 DPI`屏幕密度类别。


    复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图 [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12)
    所示。一旦`Presets`对话框打开（如图 [18-17](#A978-1-4302-5786-8_18_Chapter.html#Fig17) 左侧所示），将预设命名为`Android720x1280p`，并输入描述`Android
    720x1280 Portrait`。将目标数据速率设置为`1536KBPS`，最大数据速率设置为比它多`133%`，即`2048KBPS`。


    ![A978-1-4302-5786-8_18_Fig17_HTML.jpg](A978-1-4302-5786-8_18_Fig17_HTML.jpg)


    图 18-17.


    Android 准高清视频编解码器预设，使用`1.5MBPS`到`2MBPS`的数据速率和高质量编解码器


    你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。


    完成准高清竖屏预设后，你可以返回并执行相同的工作流程来创建你的准高清横屏预设。


    最后，你将为一款`iTV`或高端平板创建一组真正的高清预设。


    ## 为 iTV 使用真正高清 1920x1080 数字视频素材


    大约十多年前，第二个进入数字领域的高清分辨率是行业所称的真正高清，即`1920x1080`。这个分辨率也是一个精确的`16:9`宽高比，并拥有超过两百万的像素，足以提供水晶般清晰的视频播放。真正高清分辨率也有如此多的像素，以至于它可能会拖慢一个较弱的（单核）处理器，并且也可能“挤占”任何较小的数据传输带宽。


    使用此高清分辨率的设备包括`iTV`（互动电视）以及`Kindle Fire HD`，后者实际上在8.9英寸屏幕上采用了真正的`16:10`的`1920x1200`分辨率，使其更接近`240
    DPI`的`HDPI`设备。对于`iTV`设备，屏幕尺寸决定了`DPI`，所以这次我们换个方向来计算：`1920/240=8`，所以一个8英寸宽的`iTV`（11英寸对角线）是`HDPI`；`1920/160=12`，所以一个12英寸宽的`iTV`（16英寸对角线）是`MDPI`；`1920/120=16`，所以一个16英寸宽的`iTV`（20英寸对角线）是`LDPI`。这意味着大多数市面上的`iTV`都是`LDPI`。


    复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图 [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12)
    所示。一旦`Presets`对话框打开（如图 [18-18](#A978-1-4302-5786-8_18_Chapter.html#Fig18) 左侧所示），将预设命名为`Android1080x1920p`，并输入描述`Android
    1080x1920 Portrait`。将目标数据速率设置为`2048KBPS`，最大数据速率设置为比它多`150%`，即`3072KBPS`。


    ![A978-1-4302-5786-8_18_Fig18_HTML.jpg](A978-1-4302-5786-8_18_Fig18_HTML.jpg)


    图 18-18.


    Android 真正高清视频编解码器预设，使用`2MBPS`到`3MBPS`的数据速率和高质量编解码器


    你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。


    完成真正高清竖屏预设后，你可以通过相同的工作流程来创建你的真正高清横屏预设。现在你已经生成了所有的`MPEG-4`数字视频素材，你可以查看你所获得的压缩比率，并决定哪些最适合用于你的应用程序。'
  raw: '## Using 16:9 Low Resolution 640x360 Digital Video Assets


    This next resolution will also use the VGA 640x480 resolution to create its wide-screen
    resolution version, except that you’re not going to add 160 pixels to the width,
    but instead, you are going to subtract 120 pixels from the height! This will give
    you 640 pixels of width and 360 pixels of height and will result in a 16:9 aspect
    ratio. To calculate this 640/16=40x9=360, so 640x360 is a low-resolution version
    of a popular 16:9 HD aspect ratio.


    Let’s go back into Squeeze and use the work process that you learned in the previous
    section to copy the Android480x800p preset so that you can create an Android360x640p
    preset for use with lower resolution Android devices.


    Such devices would include HDPI watches (2-inch screens with 640 pixels is 320
    DPI and thus HDPI), entry-level Android phones with smaller 4-inch screens (4-inch
    screens with 640 pixels is 160 DPI and thus MDPI) and mini-tablets with 5-inch
    screens (5-inch screens with 640 pixels is 128 DPI and thus LDPI).


    Create a copy of the WVGA preset, right-click it, and select the Edit menu option,
    as was shown in Figure [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12). Once
    the Presets dialog opens up, as shown on the left side of Figure [18-15](#A978-1-4302-5786-8_18_Chapter.html#Fig15),
    name the preset Android360x640p and enter the description of Android 360x640 Portrait,
    and then you will be ready to set your data rates and related parameters. Set
    a target data rate of 512 KBPS, and a maximum data rate of 150% more than that,
    or 768 KBPS. You can leave your settings on the right hand side of this Presets
    dialog the same, as you want to match resolution and use one keyframe per second.
    Once you finish the portrait preset, go back and create a landscape preset.


    ![A978-1-4302-5786-8_18_Fig15_HTML.jpg](A978-1-4302-5786-8_18_Fig15_HTML.jpg)


    Figure 18-15.


    Android 360x480 video codec presets using 512KPBS to 768KBPS data rate and high-quality
    codec


    ## Using NetBook Resolution 1024x600 Digital Video Asset


    The 1024x600 resolution was made popular by the ultra-portable netbook products
    that appeared almost a decade ago, featuring a Wide SVGA resolution. SVGA, or
    “Super VGA,” was 800x600, so if you add another 224 pixels of width, you will
    have a Wide Super VGA (or WSVGA) display screen.


    Netbooks have 10.1-inch screens, making them LDPI (1024/10=102 pixels per inch),
    and now that Dell has an Android PC out, you will probably see the Android Netbooks
    market start to materialize as well. There are also some smartphones and tablets
    with this resolution that have 4- to 5-inch screens, and this puts them in the
    HDPI 240-pixels-per-inch screen density range.


    The aspect ratio for this resolution is not quite 16:9, as 1024/16=64 and 64x9=576,
    so 1024x576 would represent a “true” 16:9 aspect ratio. Since 64 goes into 600
    9.375 times, this would represent a 16:9.375 aspect ratio, or 3/8ths of the way
    from a widescreen 16:9 to a 16:10 aspect ratio.


    Create a copy of the WVGA preset, right-click it, and select the Edit menu option,
    as was shown in Figure [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12). Once
    the Presets dialog opens up, as shown on the left side of Figure [18-16](#A978-1-4302-5786-8_18_Chapter.html#Fig16),
    name the preset Android600x1024p and enter the description of Android 600x1024
    Portrait. Set a target data rate of 1024KBPS, and a maximum data rate of 150%
    more than that, or 1536KBPS. You can leave your settings on the right hand side
    of this Presets dialog the same, as you want to match resolution and use one keyframe
    per second. Once you finish the portrait preset, go back and create a landscape
    preset.


    ![A978-1-4302-5786-8_18_Fig16_HTML.jpg](A978-1-4302-5786-8_18_Fig16_HTML.jpg)


    Figure 18-16.


    Android WSVGA video codec presets using 1MBPS to 1.5MBPS data rate and high-quality
    codec


    ## Using Low HD Resolution 1280x720 Digital Video Assets


    The first HD resolution to hit the digital scene, around a decade or more ago,
    was what I like to call “Pseudo HD,” or 1280x720\. This resolution has enough
    pixels (almost one million) to provide clear video content, but not so many so
    as to bog down the processor or data transfer bandwidth. It is also a true 16:9
    aspect ratio, as 1280/16=80x9=720.


    Devices that use this resolution include Phablets (Phone-Tablets) such as the
    Samsung Galaxy Note II, which has a 5.5-inch screen, making it a 240 DPI HDPI
    device, as well as larger 8-inch tablets, which feature a 160 DPI MDPI screen
    density. Larger 10-inch tablets featuring this resolution fall into the LDPI or
    120 DPI screen density category.


    Create a copy of the WVGA preset, right-click it, and select the Edit menu option,
    as shown in Figure [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12). Once the
    Presets dialog opens up, as shown on the left side of Figure [18-17](#A978-1-4302-5786-8_18_Chapter.html#Fig17),
    name the preset Android720x1280p and enter the description of Android 720x1280
    Portrait. Set a target data rate of 1536KBPS, and a maximum data rate of 133%
    more than that, or 2048KBPS.


    ![A978-1-4302-5786-8_18_Fig17_HTML.jpg](A978-1-4302-5786-8_18_Fig17_HTML.jpg)


    Figure 18-17.


    Android Pseudo HD video codec presets using 1.5MBPS to 2MBPS data rate and high-quality
    codec


    You can leave your settings on the right hand side of this Presets dialog the
    same, as you want to match resolution, and use one keyframe per second.


    Once you finish the Pseudo HD portrait preset, you can go back and perform the
    same work process in order to create your Pseudo HD landscape preset.


    Finally, you’ll create a True HD set of presets for iTV or high-end tablets.


    ## Using a True HD 1920x1080 Digital Video Asset for iTVs


    The second HD resolution to hit the digital scene, around a decade or more ago,
    was what the industry calls True HD, or 1920x1080\. This resolution is also an
    exact 16:9 aspect ratio and has more than enough pixels, at over 2 million, to
    provide crystal clear video playback. True HD resolution also has so many pixels
    that it could potentially bog down a weak (single core) processor and could also
    “crowd out” any smaller data transfer bandwidth.


    Devices that use this HD resolution include iTVs (interactive television) as well
    as the Kindle Fire HD, which actually sports True HD 16:10 1920x1200 resolution
    on an 8.9-inch screen, making it closer to a 240 DPI HDPI device. For an iTV set,
    screen size determines your DPI, so let’s go in the other direction this time.
    1920/240=8, so an 8-inch wide iTV (11-inch diagonal) is HDPI, and 1920/160=12,
    so a 12-inch wide iTV (16-inch diagonal) is MDPI, and 1920/120=16, so a 16-inch
    wide iTV (20-inch diagonal) is LDPI. This means most iTVs out there are LDPI.


    Create a copy of the WVGA preset, right-click it, and select the Edit menu option,
    as shown in Figure [18-12](#A978-1-4302-5786-8_18_Chapter.html#Fig12). Once the
    Presets dialog opens up, as shown on the left side of Figure [18-18](#A978-1-4302-5786-8_18_Chapter.html#Fig18),
    name your preset Android1080x1920p and enter a description of Android 1080x1920
    Portrait. Set a target data rate of 2048KBPS, and a maximum data rate of 150%
    more than that, or 3072KBPS.


    ![A978-1-4302-5786-8_18_Fig18_HTML.jpg](A978-1-4302-5786-8_18_Fig18_HTML.jpg)


    Figure 18-18.


    Android True HD video codec presets using 2MBPS to 3MBPS data rate and a high-quality
    codec


    You can leave your settings on the right hand side of this Presets dialog the
    same, as you want to match resolution and use one keyframe per second.


    Once you finish the True HD portrait preset, you can go through the same work
    process in order to create your True HD landscape preset. Now that you have generated
    all of your MPEG-4 digital video assets, you can see what kind of compression
    ratios you are getting and decide which ones would be the best to use for your
    application.'
