    # 总结


    在第六章中，你学习了 Android 布局容器，这些容器用于容纳 Android 用户在设备显示屏上使用的用户界面元素和内容。


    首先，我们探讨了 Android 中布局的基类——`ViewGroup` 类。你了解到，Android 中数十种不同类型的布局容器都派生自这个超类，用于“分组”`View`
    对象，而关于“View”对象的学习将在下一章进行。


    接着，我们概述了 Android 的 `LayoutParams` 类及其布局参数。开发者使用这些参数来配置和微调用户界面布局的工作方式，以及布局如何将其子元素
    `View` 对象组合在一起。你学习了 `match_parent` 和 `wrap_content` 这两个布局常量，以及它们在 Android 中如何用于实现布局的自动调整大小。


    随后，我们考察了那些已被弃用的 Android 布局容器类，以及在 Android 操作系统中尚处于实验阶段、未完全实现（即永久性）的布局容器类。由于需要介绍的布局容器众多，本书将重点讲解那些已完全实现的布局类。


    我们研究了 Android 的 `RelativeLayout` 类，这是最常用的布局容器之一，也是在创建基线（空白）应用程序时，“新建 Android 应用程序”系列对话框中默认使用的布局。


    接着，我们了解了 `LinearLayout`，这是另一个常用的布局容器，通常用于按钮或文本的简单线性布局。


    之后，我们学习了 `FrameLayout`，这是一种高级布局容器，通常用于容纳更复杂的布局容器，或者实现单一元素用户界面，例如通过 `VideoView`
    控件实现的固定宽高比、全屏数字视频播放。


    然后，我们介绍了一种较新的 Android 布局容器——`GridLayout`。它因采用扁平（非嵌套）布局容器设计来构建复杂用户界面而迅速流行起来。我们将在未来关于高级布局设计的章节中详细讨论这个用户界面布局容器。


    最后，我们学习了 `DrawerLayout`，这是另一种用于设计高级滑动抽屉式用户界面布局的新容器。用户可以从显示屏的左侧或右侧拉出这种抽屉，其中包含用于全局应用用户界面（左侧抽屉）或局部内容用户界面功能（右侧抽屉）的控件元素。


    为了获得实践经验，你用 XML 创建了自己的布局容器，然后添加了一个菜单并编写了一个 `Activity` 类，以便能够访问应用程序中新的目录屏幕。


    在下一章，你将学习 `View` 类及其如何用于创建可填充至布局容器内部的控件。


    # 7. Android UI 控件：使用 View 类进行图形设计


    ## 摘要


    在第七章中，我们将更深入地探讨 Android 的 `View` 类及其众多子类。我们已经学习了 Android 的 `ViewGroup`（它是 `View`
    的一个子类）及其一些主流的布局容器子类。现在，我们将研究一些 Android 的 `View` 子类，我们可以通过实现这些子类来创建用户界面控件，并在这些
    `ViewGroup` 布局容器内进行图形设计。


    由于布局容器（`ViewGroup` 类）用于容纳用户界面元素（在 Android 中称为控件），我们在前一章必须首先介绍它们。有了这个基础，我们现在可以介绍一些
    Android 最常用的用户界面控件了。这些控件可以作为子用户界面元素放置到父布局容器中。


    正如 Android 拥有数十种 `ViewGroup` 布局容器类一样，它也同样拥有数百个 `View`（控件）子类。因此，本书无法详细涵盖每一个控件类——毕竟本书并非仅专注于用户界面设计元素及其工作原理。


    我们将从图形设计的角度来考察最流行的 Android 用户界面设计控件，即，应该使用哪些用户界面元素控件来实现应用程序的图形元素。我们还将介绍那些允许开发者创建自定义图形用户界面元素的控件。


    自定义图形用户界面的元素是指那些可以通过使用额外的图形设计内容资产，以及像 alpha 通道（透明度）这样的图形设计属性来增强（或定制样式）的元素，从而实现图形与用户界面元素的无缝合成。


    首先，你将学习 Android 的 `View` 超类，然后我们将介绍其最常用的用户界面设计子类。在本书中我们将详细讲解的 `View` 控件类包括：`ImageView`、`TextView`、`EditText`、`Button`、`ImageButton`、`VideoView`、`Space`、`AnalogClock`、`CalendarView`、`DigitalClock`
    和 `ProgressBar`。


    现在，借助上一章添加的菜单系统，你已经能够向“Pro Android GraphicsDesign”应用程序添加新的 `Activity` 子类。通过使用新的
    `Activity` 类，你可以使用所有这些控件来创建用户界面布局。你将在本章中学习到，Android 应用程序的每个功能屏幕都将拥有自己的菜单选项、活动、布局容器以及一系列的
    `View` 控件。

    '
- fmt: '# The Android View Class: The Foundation for UI Widgets


    The Android `View` class is a direct subclass of the `java.lang.Object` class,
    and it defines an area on the display screen called a View, whose core properties
    are defined by the View superclass. The View superclass is part of the `android.view`
    package and is imported into your application by using an `import android.view.View`
    Java code statement.


    A View object in Android occupies a rectangular area on the user’s display screen;
    it is responsible for drawing to that area of the screen and for event handling
    the interactions that happen in that area of the screen.


    This View superclass is not used directly, but can be used to create other subclasses,
    which can then be used in your Android applications. There are so many View subclasses
    already, so chances are good that you won’t have to do any of this programming
    work yourself! You can just find and utilize the View subclass that provides the
    functionality you require, and import and utilize that View subclass for your
    application development needs.


    The View class is especially valuable to graphics designers as it provides the
    basic building block for user interface components in the Android OS. UI components
    (or elements, as I like to call them as a graphics designer) are termed "widgets"
    in the Android ecosystem. There are many specialized widget subclasses of View
    that act as UI controls and are capable of containing and displaying text, images,
    video, animation, or other content.


    Since the View class is a base class for building widgets, which are used to create
    all of your interactive UI elements (button, text fields, etc.), you will be seeing
    the class name View quite a bit in your graphics design Android application development
    experience, so get familiar with View.


    As you’ve learned already, a ViewGroup (View subclass) is a base class used for
    creating layout containers, which are those invisible containers that hold all
    of the Views (or nested ViewGroups) and define their layout properties. A ViewGroup
    object is exactly what it says it is: a group of View objects! In that sense,
    everything on your screen in Android boils down to being a View child object inside
    a parent ViewGroup container.


    So many UI widgets have been developed for Android over the years that they are
    bundled together in their own Java package in Android called the `android.widget`
    package. If you want to see all the widgets that are currently in the package,
    you can visit the widget package summary page on the Android Developer web site
    at the following URL:


    [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


    You can add Android View objects either using Java code or by specifying a collection
    of View objects using one or more XML files containing layout container parent
    tags. The latter way (by using XML UI description) is the more common (and easier)
    way to define your user interface design for your Android apps, and it is the
    way that you will be doing UI design in this book.


    ## View Basic Properties: ID, Layout Positioning, and Size


    Once you have defined the layout container (ViewGroup) that will contain your
    child UI elements (View objects), as you did in the previous chapter, the first
    thing that you will generally do is to define the properties of your child UI
    widget View objects by using Android parameters. Parameters in Android are always
    prefaced by `android:`, as you already have seen.


    The reason for this, in case you were wondering, is due to that XML Naming Schema
    `xmlns:android` parameter, found in the parent container in every XML file definition
    that is coded for Android. This specifies your path to the current XML definition,
    kept in a central repository, which is located at


    [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)


    Thus, the `xmlns:android` parameter is really saying, "Everywhere that you see
    `android:`, expand this to the path [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)
    in order to provide the direct reference to the most current and centrally located
    XML parameter definition for any given parameter in this XML file."


    So, your `android:layout_weight` parameter is really seen by Android OS as


    [`http://schemas.android.com/apk/res/android:layout_weight`](http://schemas.android.com/apk/res/android:layout_weight)


    Now you know exactly what is going on in your XML files, and why that XMLNS parameter
    is needed in every parent tag that you add, and why Eclipse will throw errors
    if it is not there (a "this parameter does not exist" error).


    If you are going to reference any View from your Java code for any reason, and
    this includes ViewGroup parent tags as well as View widget child tags, you need
    to utilize the `android:id` parameter to assign an ID to the widget (View object).
    This is done so that you can use the `findViewById()` method, which is used to
    connect the XML user interface element definition that you are writing with the
    Java object you are instantiating in your Java code to "inflate" your XML definition,
    which will populate the fields in Java objects. The `findViewById()` (View) and
    `inflate()` (Menu) methods in Android serve to "bridge" your XML markup with your
    Java program logic.


    Populating a Java object with an XML definition of the object’s attributes is
    generally termed inflating the object within the Android OS lingo.


    An ID parameter is not required, so if you are not going to reference your View
    object in the Java code, you don’t have to bother using an `android:id` tag to
    define it. A good example of this is using a `TextView` element (View) that is
    being included in your UI design simply for the purpose of placing a text label
    somewhere on your screen and is defined in the XML UI layout definition but is
    not used interactively within the Android application. You observed this in the
    previous chapter’s XML UI definition.


    Other parameters, like `layout_width` and `layout_height`, on the other hand,
    are always required to be defined for each of your View object’s XML tags.


    After you give your View (child tag) its ID parameter, you generally will want
    to give it layout positioning parameters for height and width. These are usually
    assigned one of two constants, `match_parent` or `wrap_content`.


    This is so that Android can do the positioning for you. You can also use pixel
    or DIP values, but remembering our discussion in [Chapter 5](#A978-1-4302-5786-8_5_Chapter.html),
    try to use the Android system layout constants whenever you possibly can. These
    two parameters are always required to be supplied for each UI widget (View object)
    that will be contained within your ViewGroup layout container.


    The size of a View object is expressed using a width and height; however, rarely
    does the developer have to specify these parameters if they have set their layout
    positioning parameters, because Android will do this for you.'
