    接下来，添加一个`android:src`参数；`android:`辅助对话框的工作流程也如图 3-10 所示，通过它可以引用包含帧动画定义 XML 的 XML
    源文件，该文件是在本章上一节中创建的。


    将此参数设置为`@drawable/anim_intro`值，它将引用你之前创建的、位于`/res/drawable`文件夹中的`anim_intro.xml`文件。该参数如图
    3-11 所示。


    ![A978-1-4302-5786-8_3_Fig11_HTML.jpg](img/A978-1-4302-5786-8_3_Fig11_HTML.jpg)


    图 3-11.


    在 Eclipse 中将鼠标悬停在`ImageView`标签下的波浪形黄色下划线警告上，查看警告对话框


    如图 3-11 所示，Eclipse 中还有一个警告：在开头的`ImageView`标签下有一条波浪形黄色下划线，并且代码编辑窗格左侧页边距有一个三角形黄色警告图标。要阅读警告内容，可将鼠标悬停或单击波浪形黄色下划线或警告图标；此时会弹出一个信息对话框来解释问题。


    在这个案例中，这是一个无障碍问题，如图 3-11 所示。Android 要求你提供一个`android:contentDescription`参数，向有视觉障碍的用户说明此`ImageView`用户界面元素包含什么内容。因此，添加此参数以确保
    XML 标记不再有警告。在`android:src`参数所在标记行的末尾、但在结束的`/>`标记分隔符之前添加一个回车符。


    然后输入`android`和冒号以调出参数选择器对话框，接着找到并双击`contentDescription`参数，将其插入到标签参数列表中，如图 3-12
    所示。完成此操作后，你就可以在引号内插入对字符串常量的引用（下一步将创建该常量），使用以下标记：


    ```

    android:contentDescription="@string/anim_intro_desc"

    ```


    ![A978-1-4302-5786-8_3_Fig12_HTML.jpg](img/A978-1-4302-5786-8_3_Fig12_HTML.jpg)


    图 3-12.


    向`ImageView`标签添加`android:contentDescription`参数以消除 Eclipse 中的警告


    接下来，你需要在`/res/values`文件夹中的`strings.xml`文件内，使用`<string>`标签为`contentDescription`参数创建字符串常量，如图
    3-13 所示。点击`/values`文件夹旁边的箭头图标将其展开，右键点击`strings.xml`文件，从菜单中选择“打开”选项，或者直接选中该文件并按键盘顶部的`F3`键。这将在
    Eclipse 中央编辑窗格中打开`strings.xml`文件进行编辑，你可以在其中为`anim_intro_desc`字符串常量添加`<string>`标签。下面就来操作。


    ![A978-1-4302-5786-8_3_Fig13_HTML.jpg](img/A978-1-4302-5786-8_3_Fig13_HTML.jpg)


    图 3-13.


    在`/res/values`文件夹的`strings.xml`字符串资源文件中添加`anim_intro_desc` `<string>`标签


    `<string>`标签只需要一个用于引用的`name`属性和标签内的字符串文本值。因此，你的字符串常量可以在`strings.xml`文件中通过添加以下
    XML 标记行来定义：


    ```xml

    <string name="anim_intro_desc">Splash Screen Animation</string>

    ```


    添加此字符串常量后，按`CTRL-S`或通过**文件 ➤ 保存**菜单顺序操作，你的项目就不会再有错误。你可以右键点击项目文件夹，选择**运行方式 ➤ Android
    应用程序**，从而查看`match_parent`布局参数如何使帧动画的第一帧填满显示屏。这如图 3-14 左侧截图所示。接下来，你将使用`wrap_content`参数来查看它如何产生不同的结果，所以暂时不要偷看
    3-14 的右侧，以免破坏惊喜！


    ![A978-1-4302-5786-8_3_Fig14_HTML.jpg](img/A978-1-4302-5786-8_3_Fig14_HTML.jpg)


    图 3-14.


    在 Android Nexus One 模拟器中运行 XML 标记，查看参数的实际效果


    接下来，我们将`android:layout_width`和`android:layout_height`参数从`match_parent`改为`wrap_content`，以便了解这些非常重要的参数值之间的差异。你需要尽早掌握这一点，因为它会影响`ImageView`用户界面元素缩放内容的方式；确保你能控制资源缩放是专业图形设计的基石之一。


    如图 3-14 所示，`ImageView`的内容现在是逐像素显示且未经缩放，并放置在显示屏左上角像素坐标为`0,0`（X,Y）的位置。你可以在图 3-15
    中看到相应的 XML 标记。


    ![A978-1-4302-5786-8_3_Fig15_HTML.jpg](img/A978-1-4302-5786-8_3_Fig15_HTML.jpg)


    图 3-15.


    将`android:layout_width`和`height`常量从`match_parent`改为`wrap_content`值


    这个动画显示在显示屏左上角会显得有些奇怪，因此我们使用`android:`工作流程，在`ImageView`标签底部添加一个`android:layout_gravity`参数，并将其设置为居中显示`ImageView`。这会使`ImageView`用户界面元素居中；见图
    3-16。


    布局 `gravity` 属性对于定位用户界面元素非常有用，无需指定任何像素或 DPI（也称为 DP）值。它常用于居中 UI 元素；也用于将元素对齐到显示屏或父容器的左侧或右侧、顶部或底部。


    ![A978-1-4302-5786-8_3_Fig16_HTML.jpg](img/A978-1-4302-5786-8_3_Fig16_HTML.jpg)


    图 3-16.


    使用`android:`工作流程查找`ImageView`标签的`android:id`参数


    接下来，你需要添加一个`android:id`参数，以便在`MainActivity` Java 代码中引用`ImageView`用户界面元素微件。将光标放在开头标签中`ImageView`一词之后，按回车键，在标签容器的开头添加一行新参数，如图
    3-16 所示。


    输入单词`android`，然后按冒号键调出参数选择器辅助对话框；滚动到底部，找到`android:id`参数，并双击将其添加。到现在你应该已经习惯这个工作流程了——并且享受它让编写
    XML 标记变得如此简单！


    你现在要做的就是为`ImageView`取一个逻辑名称，就叫它`pagImageView`。现在你已准备好使用`AnimationDrawable`类和对象在`MainActivity.java`代码中逐帧播放动画。


    在刚刚生成的空`android:id`参数的引号内输入`@+id/pagImageView`引用名称值，如图 3-17 所示。Android 始终使用`@+id`前缀来引用
    XML 标签的`android:id`参数值，所以现在请记住这一点，因为在今后的 Android 应用程序开发过程中你会经常用到它！


    ![A978-1-4302-5786-8_3_Fig17_HTML.jpg](img/A978-1-4302-5786-8_3_Fig17_HTML.jpg)

