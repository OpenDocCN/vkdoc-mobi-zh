- fmt: '# Providing Device-Optimized User Interface Layout Designs


    Android will resize your application’s user interface layout to fit any of your
    user’s device screens. In many cases, this should work just fine. In other cases,
    however, your UI design might not look as professional as you might like it to,
    and in these cases it might need some further adjustment in order to fit different
    screen orientations, or aspect ratios, properly.


    For example, on a larger device screen, or a screen with a vastly different aspect
    ratio (wide vs. square), you may wish to adjust the position and size of some
    user interface elements in order to take advantage of the new screen shape or
    additional screen space. Conversely, given smaller screens you would probably
    need to adjust user interface element and font sizes in such a way that everything
    fits attractively on a smaller display screen.


    The configuration qualifier constants you can use to provide size-specific layout
    resources include `small`, `normal`, `large`, `xlarge`, `xxlarge`, and `xxxlarge`.
    For example, a user interface screen layout XML definition for those extra large
    device screens could go into the `/res/layout-xlarge` project folder. Starting
    in Android Version 3.2 (Honeycomb or API 13), the above-mentioned size groupings
    have been deprecated and you should instead utilize a newer `ScreenWidth-Number-DP`
    naming schema, which we will discuss further here.


    Deprecated means discontinued but still supported, in case that you’re not familiar
    with the terminology. It is recommended that when features become deprecated in
    Android, that you recode your application to use the new way of doing things,
    in this case naming layout resource folders using the new folder name standard,
    as described by `ScreenWidth-Number-DIP` (`sw-#-dp`).


    This folder name configuration qualifier method defines the smallest width required
    by the layout resources using density-independent pixels. To give an example,
    if a given tablet layout will require a minimum of 480DP worth of screen width,
    you would place it inside the `/res/layout-sw480dp` folder.


    The new `DIP`-size-specific qualifiers offer Android developers more control over
    the specific screen sizes their application can support, compared to the deprecated
    screen size groups (`small`, `normal`, `large`, and `xlarge`) supported prior
    to Android 3.2 Honeycomb API Level 13.


    It is important to note that the DIP sizes that you can specify, by using these
    new qualifiers, are not the physical screen size specifications. The qualifiers
    are instead for use regarding your `Activity`, that is, the width or height specified
    in DIP units that are available to your Java `Activity` window, that is, its area
    (portion) of the physical display screen.


    The reason for this is that the Android operating system might be using a portion
    of a physical display screen’s pixel area for its own UI elements, such as the
    system utility bar, located at the bottom of a display screen, or the status bar,
    located at the top of the display screen.


    What this means is that some portion of the physical display screen might not
    be available for your application user interface layout. The sizes you declare
    should therefore be specifically targeting the size of the area of the physical
    display screen that is needed by your app’s Java `Activity`.


    Android’s operating system will take care of accounting for any of the other display
    screen space that is used by the operating system UI when the developer declares
    how much space is needed for their `Activity` layout.


    It is important to note that the Android `Action Bar` will be considered a part
    of the application window space, even if your layout does not declare it specifically.
    This means the Android `Action Bar` will reduce the screen real estate (area)
    that would otherwise be available for your layout, and you must remember to account
    for it within the overall user experience design.


    While using the new DIP qualifiers might seem more complicated than using the
    deprecated screen size constants, it might in reality be simpler once you determine
    the density pixel requirements for your UI layout design.


    When you design user interface layouts, your primary consideration will be the
    actual size at which your application switches from a smartphone UI to a tablet
    UI to an iTV UI. Using the qualifiers we are going to go over in detail in the
    next few sections, you will be in complete control over the exact density pixel
    sizes at which the layout changes between XML designs.


    Let’s go over the three available screen configuration modifiers that look at
    minimum (smallest) width, total screen width, and screen height, and see how they
    differ. Between the three different methods you should be able to accurately specify
    any screen layout change trigger ranges that you need.


    ## Using Android’s SmallestWidth Screen Configuration Modifier


    The Android `smallestWidth` screen configuration qualifier, which takes the format
    `sw#dp` (such as `sw480dp`), is meant to define the target size of a screen by
    indicating the shortest width dimension of the available screen. An Android device
    `smallestWidth` component is the shortest dimension of the display available height
    or available width, depending on the orientation. One might also conceptualize
    this as the smallest possible display width for the screen, which is obviously
    where the constant name came from.


    You can use the `smallestWidth` qualifier to ensure that regardless of the display’s
    current orientation, your application will have at least this number of DIPs of
    display width available for your `Activity`’s UI layout. So, if your user interface
    layout requires a smallest width dimension of the display area be at least 720
    DIP, then you would use this qualifier to create the layout resource folder named
    `/res/layout-sw720dp` to hold your user interface layout definition XML files
    for your app’s `Activity`s.


    The Android OS will use the XML resources in this folder only when a smallest
    dimension of the available display is at least 720 DIP. It is important to note
    that this determination is done regardless of whether the 720 DIP side is the
    user-perceived height or width. The `smallestWidth` is a fixed screen size characteristic
    of the Android device display. A device’s `smallestWidth` modifier does not change
    when the user display screen orientation changes.


    A `smallestWidth` calculation made by the Android OS for a given device will take
    into account the Android OS UI elements. For example, if a device has some Android
    UI elements that are part of the display that account for some of the space that
    infringe upon the `smallestWidth` measurement, the system will calculate the `smallestWidth`
    to be smaller than the device’s screen size, because those are display pixels
    not available to your UI.


    Since the screen width is many times a determining factor in a UI layout design,
    using the `smallestWidth` configuration modifier to determine the appropriate
    screen size fit can often be helpful to the Android developer.


    An available display width parameter can also be a factor in ascertaining whether
    or not to use a single pane UI layout, for example for smartphone, or a multiple
    pane layout for a tablet or iTV. For this reason, developers need this modifier
    to ascertain a `smallestWidth` device DIP parameter.'
