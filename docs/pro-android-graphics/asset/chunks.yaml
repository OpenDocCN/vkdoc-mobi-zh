  trans: '# 总结


    在第十五章中，你学习了如何仅使用 Java 代码（无需 XML 标记）在 Android 操作系统中实现启动画面程序化动画，具体方法是使用 `Animation`
    类及其五个子类（`ScaleAnimation`、`AlphaAnimation`、`AnimationSet`、`RotateAnimation` 和 `TranslateAnimation`）中的方法和构造方法。


    我们首先探讨了 Android 的 `Animation` 类本身，以及它如何直接继承自 `java.lang.Object` 主类，这意味着它基本上是从零开始编写的，旨在为
    Android 操作系统提供视图动画或矢量动画（也称为程序化动画）。


    接着，我们学习了 `TranslateAnimation` 子类，以及它如何让我们在 X-Y 屏幕空间中通过动画方式移动 `View` 对象。然后，我们研究了
    `ScaleAnimation` 子类，以及它如何在 X-Y 二维屏幕维度内缩放 `View` 对象，同时我们也了解了这两个程序化动画类的构造方法的工作原理。


    随后，你直接投入 Java 编码，在 `GraphicDesign` 应用中实现了 `ScaleAnimation` 对象，从而观察 `Animation`
    对象及其变换子类如何在你的 Java 编码环境中协同工作。


    接着，你学习了 `AlphaAnimation` 类，以及它如何让我们为程序化动画技巧库添加 alpha 混合效果。你还学会了使用相对简单的构造方法，为 `View`
    对象（在你的案例中是 `ImageView`）实现淡入或淡出效果，从而使其产生动画。


    然后，你再次深入 Java 编码，添加了另一个 `Animation` 对象来定义你的 `AlphaAnimation` 目标，并尝试连续两次调用 `.startAnimation()`
    方法，但失败了，这迫使你转而学习 Android 的 `AnimationSet` 类，结果证明这真是一次积极的体验。和平、爱与 AnimationSet，朋友（无论男女）！


    在回顾了 `AnimationSet` 类的细节之后，我们立刻回到 Eclipse ADT 中，你开始实现更高级的 Java 程序化动画编程。你创建了一个
    `AnimationSet` 动画组流水线来实现复杂的程序化动画，并且全程只使用了 Java 编程逻辑。


    一旦你的 `AnimationSet` 正常工作，通过使用 `RotateAnimation` 类和构造方法，然后调用 `.addAnimation()`
    方法将其添加到 `AnimationSet` 中，为动画集添加旋转动画就变得容易多了。到这时，你已经相当擅长在 Android 应用中使用 `Animation`
    类及其功能性子类了。


    最后，你使用 Java 实现了与第 3 章和第 4 章中使用 XML 实现的完全相同的帧动画与程序化动画组合序列。这时，我建议（作为练习）尝试向你的 `AnimationSet`
    添加一个 `TranslateAnimation` 对象，并通过重新实现 `animStarter` 类来制作应用自动启动徽标动画。


    在下一章中，我们将深入理解 Android 的 `Drawable` 类，因为你现在已经学习并使用了它的许多子类来实现动画、混合以及其他非常高级的图形相关
    Android 编程技巧。这将帮助你“彻底掌握”Android 中的 `Drawable` 类与对象——这些是 Android 操作系统内图形设计与实现的基石，因而非常重要。


    # 16. 高级图形：掌握 Drawable 类


    ## 摘要


    在第十六章中，我们将从更底层的视角审视 Android 操作系统中的 `Drawable` 类，因为它为操作系统中所有与图形相关的对象提供了基础。


    既然你已经深入接触并体验了 Android 中多种高级 `Drawable` 对象类型，现在是时候来考察这些对象所源自的基类，并了解 Android 操作系统中其他一些可用的
    `Drawable` 对象类型了。


    其中许多不同类型的 `Drawable`（例如 `ShapeDrawable`）我们之前一直没有足够的理由去介绍。这主要是因为对于作为读者的你而言，数字图像、数字视频、二维动画、混合以及过渡等主题比矢量插画（形状）、字体（文本对象）或渐变等主题更受欢迎。尽管如此，矢量插画仍是一个热门话题，因此我们将在本章中加以介绍。


    所以，不用担心，我们终将涵盖所有内容，这也是我特意安排一章专门讲解 Android 的 `Drawable` 类的原因之一——这样我就能确保覆盖所有不同类型的
    `Drawable` 子类和对象，因为它们都会以某种方式影响图形设计。


    在本章中，你还将学习其他几个与专业 Android 图形设计直接相关的重要 Android 类，这些类通常与 `Drawable` 类及其众多子类一起使用。它们包括
    Android 的 `Shader` 和 `BitmapShader` 类、`Rect` 和 `RectF` 类、`InputStream` 类以及 `ShapeDrawable`
    类。同时，你也会进一步巩固对 `Bitmap`、`Paint` 和 `Canvas` 类的使用和认知。'
- fmt: '# Android Drawable Resources: Types of Drawable Objects


    Android has over one dozen different types of Drawable Resources that you can
    apply to the Android application graphics design pipeline. You already have leveraged
    a significant number of these more advanced Drawable object types at this juncture
    of the book; we will just make sure you’re aware of everything that is available
    in Android, where Drawables are concerned.


    Android Drawable Resources are a foundational concept for a graphic that can be
    drawn to your user’s display screen and that you can retrieve with method calls
    such as `.getDrawable()` or apply using an XML definition along with parameters
    like `android:icon`, `android:background`, or `android:src`.


    There are a number of different Drawable object types in Android including `Bitmap`,
    `9-Patch`, `Layer`, `State`, `Level`, `Animation`, `Transition`, `Shape`, `Scale`,
    `Rotate`, `Inset`, `Clip`, `Picture`, `Paint`, and `Color`, just to name a few.


    We will go over each of these primary types of Drawable objects in Android and
    see exactly what they are and what they do, during this first overview section
    for this chapter. We’re doing this so that you will have a broader perspective
    regarding what is available for you in Android as a professional graphics designer.
    We’ll cover the Drawable types you’ve already utilized first, and then introduce
    you to some new and exciting Drawables after that.


    A `BitmapDrawable` uses a digital image asset, either a PNG, JPG, or GIF, to populate
    a Drawable object with an array of pixels, called a Bitmap. You’ve already seen
    how to cast Drawables to `BitmapDrawables` and more during your construction of
    an image compositing and blending pipeline in [Chapter 11](#A978-1-4302-5786-8_11_Chapter.html).


    As you saw in [Chapter 10](#A978-1-4302-5786-8_10_Chapter.html), `NinePatchDrawable`
    objects leverage a PNG32 image file format, and customize it using one-pixel black
    border areas to create scalable X and/or Y regions to allow dynamic image resizing
    in either an X or Y dimension based on the image asset content design. A `NinePatch`
    object image asset uses a special file name designation of `thefilename.9.png`,
    and can also use PNG24 (truecolor, no alpha channel) and PNG8 (indexed color).


    As you saw in [Chapter 12](#A978-1-4302-5786-8_12_Chapter.html), `LayerDrawable`
    objects allow collections of other types of Drawable objects, which can be used
    for layered compositing. These Drawable objects are drawn using the `LayerDrawable`
    object’s array order so that the child layer element with the largest index will
    be drawn on top.


    As you saw in [Chapter 13](#A978-1-4302-5786-8_13_Chapter.html), `TransitionDrawable`
    objects are typically defined using an XML file that allows a cross-fade to take
    place between two Drawable asset resources.


    As you saw in [Chapter 14](#A978-1-4302-5786-8_14_Chapter.html) and [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html),
    `AnimationDrawable` objects can be used either via XML markup or Java code to
    define a series of frames that play back as specified by the developer using parameters
    to form 2D frame animation assets. `AnimationDrawable` objects can be further
    processed using `Animation` objects, which will apply vector (algorithmic) transformations.


    A `StateListDrawable` is also usually defined using an XML definition file that
    references a series of bitmap graphic image assets that highlight different functional
    states. You utilized states back in [Chapter 9](#A978-1-4302-5786-8_9_Chapter.html)
    when you created a multi-state `ImageButton` UI element that implements a different
    image for each button state, such as when a button is hovered over, or is pressed,
    or has the focus.


    A `LevelListDrawable` is usually defined using an XML file that inflates a Drawable
    object that manages a number of alternate Drawable objects, each assigned a minimum
    and a maximum numerical value utilized at runtime to ascertain what level the
    `LevelListDrawable` currently references.


    The `InsetDrawable` object is defined using an XML definition file that defines
    a Drawable XML asset that creates an inset within another Drawable object at a
    specified DIP distance. This is useful when your View object needs a background
    Drawable that is smaller than your View object’s actual boundaries.


    A `ClipDrawable` object is defined using an XML file that defines a Drawable object
    that implements a clipping plane or region on another Drawable that is based on
    your `ClipDrawable` object’s current level values. This is often utilized to create
    special effects, or utilities, such as a progress bar.


    A `ScaleDrawable` object is also defined using an XML definition file that specifies
    a Drawable object that changes the scaling of another Drawable object based on
    the current level value of the `ScaleDrawable` object.


    A `ShapeDrawable` object is defined via an XML file that defines a geometric shape.
    The shape definition can also include other nested shapes, borders, colors, or
    color gradients. The `ShapeDrawable` object essentially gives the Android OS many
    of the vector capabilities found in software packages such as Freehand, Illustrator,
    or InkScape.


    We are going to cover `Shape` and `ShapeDrawable` objects in the next sections
    of this chapter, as digital illustration is a popular topic in new media.


    It’s important to note, before we get into `ShapeDrawable` objects, that any of
    your Color Resources, usually defined in your `Colors.xml` file, can also be used
    as a Drawable object by using referencing inside XML definitions.


    To give an example, when creating your `StateListDrawable` object, you could reference
    a color resource for the `android:drawable` attribute, which makes it a Color
    Drawable asset of sorts. This would be done using the following parameter in your
    View object tag inside your XML markup:


    `android:drawable="@color/green"`


    Next, let’s take a look at how to create vector illustration in Android by using
    XML markup and the `<shape>` root element to create the `ShapeDrawable` object.
    Once you’ve created your own vector illustrations in Android, we’ll take a look
    at the `Shape` and `ShapeDrawable` classes in Android in greater detail. Since
    we covered vector animation in the previous chapter, it is only logical that we
    cover static vector imagery as well in this chapter.'
