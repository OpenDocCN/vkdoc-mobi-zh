  raw: 'This either means that the ScaleAnimation object processing was skipped over
    or that it was started and then immediately replaced by the alpha blending operation
    contained in the AlphaAnimation object. Either way you slice it, you are only
    going to be able to make one procedural animation .startAnimation( ) method call,
    which means that you will have to implement an AnimationSet object to be able
    to combine procedural animation types.


    This is really no surprise, but I had to try it anyway, both for my own curiosity
    as well as a part of the overall learning and discovery process regarding procedural
    and frame animation pipelines in the Android OS, and seeing exactly how far we
    can push these classes and methods into achieving our desired end result. Besides,
    this is as good a time as any to get into an AnimationSet discussion, and after
    we do we can get back into covering the RotateAnimation class, implementing that
    procedural animation object into the AnimationSet object that it looks like we’re
    going to be implementing!


    ![A978-1-4302-5786-8_15_Fig10_HTML.jpg](A978-1-4302-5786-8_15_Fig10_HTML.jpg)


    Figure 15-10.


    Testing the Scale and Alpha Animations in Nexus One


    Since you need to implement the AnimationSet class and construct an AnimationSet
    object next, let’s take some time to go over this class and get some technical
    background on what it does and why we need to use it.


    ## The AnimationSet Class: Creating Complex Animation Sets


    As you’re already aware, the Android `AnimationSet` class is another direct subclass
    of the `android.view.animation.Animation` public abstract class.


    This animation class is used to “group” your other four types of Animation subclasses
    into “sets” in order to create far more complex multi-transform animations for
    application to Android View objects.


    An AnimationSet object would thus represent logical groupings of Animation subclass
    (ScaleAnimation, AlphaAnimation, RotateAnimation, etc.) objects, which are intended
    to be played together, in parallel, at the same time.


    Essentially this makes this procedural animation class useful for creating complex
    animations which cannot be achieved using any of the other Animation subclasses
    individually. These four transforms are each fairly basic conceptually, but in
    structured combination with each other they can do almost anything that you can
    imagine!


    The Android AnimationSet class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.AnimationSet`


    The AnimationSet class is also part of the `android.view.animation` package. So
    its `import statement` references the `android.view.animation.AnimationSet` package
    import path, as you’ll see in the next section when you use it to create a complex
    scaling and blending procedural animation set.


    The procedural transformations that are specified using each individual (child)
    Animation object are composed together into one single unified transform by using
    the (parent) AnimationSet object (class).


    If the AnimationSet object sets properties that its children also set (for example,
    duration or startOffset), values that are set for an AnimationSet parent object
    will always override its child Animation object values.


    The way AnimationSet inherits parameters from an Animation transform, and vice
    versa, is important to understand. Some parameters or attributes set in an AnimationSet
    object will affect the entire AnimationSet object. Some parameters will be pushed
    down and thus applied to the child’s transforms, and some are ignored. For this
    reason, you’ll need to learn `where to apply certain parameters` when utilizing
    these AnimationSet objects.


    The `duration`, `repeatMode`, `fillBefore`, and `fillAfter` parameters, also called
    `properties`, will be `pushed down` to all child transforms when they are set
    on an AnimationSet object. The solution to this behavior is to always set these
    parameters `locally`, within your Animation objects, and to `never` set these
    in the parent AnimationSet object. If you do this, then Android has nothing to
    push down, and there is no confusion as to where the parameter is going to be
    applied in the procedural animation processing pipeline.


    The `repeatCount` and `fillEnabled` parameters, or properties, are `ignored` for
    an AnimationSet altogether, and thus you will always apply these parameters locally
    to each Animation object if you wish to access them properly.


    On the other hand, the `startOffset` and `shareInterpolator` parameters can be
    applied to the AnimationSet object. Note that the startOffset can also be applied
    locally to transforms to fine-tune the timing of the animation by introducing
    a delay into the looping cycle or to when it starts animating.


    So a good `rule of thumb` would be to apply your transformational parameters locally,
    rather than at the AnimationSet object level, unless it is the `shareInterpolator`
    parameter, which is obviously intended for usage in a group level operation, as
    that is the only way that we can “share” things in a procedural animation. So,
    `always set transform parameters locally`.'
