- fmt: '# Android FrameLayout Class: Designing Frame Layouts


    We have already used the Android `FrameLayout` container to hold our Digital Video
    asset in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html). `FrameLayout`s are holders
    or “frames” intended to hold one other structure inside them, such as an image
    or video asset.


    The `FrameLayout` was designed to allocate an area of the screen to display one
    single item. Although you can use it for your own UI designs, realize that is
    also often used as a superclass for many other useful UI layout container subclasses
    in Android, such as `AppWidgetHostView`, `CalendarView`, `MediaController`, `GestureOverlayView`,
    `HorizontalScrollView`, `ViewAnimator`, `ScrollView`, `TabHost`, `DatePicker`,
    and `TimePicker`.


    Generally, a `FrameLayout` should be utilized to hold one single child `View`,
    because it can be difficult to organize your child views in a way that is scalable
    between differing display sizes without the children overlapping each other.


    You can, however, add multiple UI elements (child tags) to the `FrameLayout` and
    control their position within the `FrameLayout` by assigning the gravity parameter
    to each child tag. This would make your `FrameLayout` scalable by Android at runtime,
    using one of the 27 `android:layout_gravity` constants, which are described in
    detail at the following Android Developer web site URL:


    [`http://developer.android.com/reference/android/view/Gravity.html`](http://developer.android.com/reference/android/view/Gravity.html)


    The `FrameLayout` children tags (`View` widgets) are drawn as a stack with the
    most recently added child on the top. The size of a `FrameLayout` expands to fit
    the size of its largest child plus its padding, visible or not, if the `FrameLayout`
    parent tag supports a visibility parameter.


    It is important to note that child tags (`View` widgets) that are currently invisible
    because they’ve been specified via an Android `View.GONE` constant instead of
    using `View.INVISIBLE` will be utilized for `FrameLayout` container sizing purposes
    only if the `.setConsiderGoneChildrenWhenMeasuring()` method is called using a
    `true` parameter.


    As you can see, the `FrameLayout` container is deceptively complex, and is actually
    intended more for usage as a superclass for creating other more specialized layout
    containers than it is for use as a mainstream developer UI design container (like
    `LinearLayout` or `RelativeLayout`).


    It can be useful for holding single UI element layouts such as full-screen digital
    video using a `VideoView` UI element widget, especially if the video needs to
    maintain its aspect ratio when it is scaled by the Android OS to fit different
    screen sizes or aspect ratios. This is a somewhat specialized use-case scenario,
    however, so don’t try to use a `FrameLayout` if there is another layout container
    class that will fit your UI design usage better.


    Next, let’s take a look at the `GridLayout` container for use in grid UI layouts.


    # Android GridLayout Class: Designing UI Layout Grids


    The Android `GridLayout` container class does just what its name suggests: it
    places its UI element child tags into a rectangular grid. This layout class is
    quite similar to the `LinearLayout` container; in fact, it has many parameters
    that are the same as or similar to `LinearLayout`’s. If you change a `<LinearLayout>`
    container parent tag to a `<GridLayout>` container parent container tag in the
    XML definition, the chances are good that your child tags in both container types
    will work just as they are coded!


    This `GridLayout`’s virtual grid user interface container is comprised of a set
    of infinitely thin (that is, zero pixels used) lines that separate a viewing area
    into discrete user interface layout cells.


    Within the Android `GridLayout` API, the grid lines are referred to by using grid
    indices. A grid with a certain number (N) of columns will have N + 1 grid indices,
    which will run from 0 through N inclusive.


    Regardless of how your `GridLayout` container might be configured, a grid index
    of 0 will be fixed to the leading edge of the container and a grid index of N
    will be fixed to its trailing edge, after padding is taken into account, as we
    have seen in the other layout container types.


    Your UI elements (child tags) will occupy one or more of these `GridLayout` cells,
    the number of which will be determined by the Android `rowSpec` (row specifier)
    and `columnSpec` (column specifier) grid layout parameters.


    Each of these specifier parameters defines the set of rows or columns that are
    to be occupied, and how children should be aligned within the resulting group
    of cells.


    The cells in a `GridLayout` container do not overlap; however, a `GridLayout`
    container also does not prevent child tag elements from being defined to occupy
    the same cell, or to span across a group of cells. So cells do not have to be
    square (1:1 aspect ratio); they can be portrait or landscape.


    In the scenarios of same-cell occupation or spanning, there’s no guarantee that
    child tags will not overlap each other after a grid layout operation completes,
    so make sure you test your creative `GridLayout` containers well!


    If a `GridLayout` container child tag does not set any row or column indices for
    a given cell that it wishes to occupy, the `GridLayout` class will then assign
    a cell location automatically. This is done in a logical fill order specified
    within the class following the `GridLayout` orientation, `rowCount`, and `columnCount`
    parameter settings.


    You can also set custom spacing between child tag elements by specifying a `leftMargin`,
    `topMargin`, `bottomMargin`, `rightMargin`, or `Margin` (which adds the value
    to all four margins) layout parameter. You can alternatively use the Android `Space`
    class to create empty space within certain `GridLayout` cells.


    The Android `Space` class is a lightweight `View` subclass that can be used to
    create empty space between user interface elements in layout containers like `GridLayout`.
    There is more information on the `Space` class at this URL:


    [`http://developer.android.com/reference/android/widget/Space.html`](http://developer.android.com/reference/android/widget/Space.html)


    When the `GridLayout` parent tag’s `useDefaultMargins` parameter has been set,
    a predefined margin is applied around each child tag. This margin space is calculated
    automatically by the Android OS based on an Android UI style guide.


    Each of the global automatic margins defined by Android can be overridden at the
    local UI element level by an assignment of the aforementioned margin parameters.


    It is important to note that these default values will generally produce an acceptable
    spacing result between your child user interface elements, but the automatic (style
    guide) values could also change between different releases of the Android platform,
    so it may be better to add a little more XML markup (parameters), and take control
    over your UI spacing yourself.'
