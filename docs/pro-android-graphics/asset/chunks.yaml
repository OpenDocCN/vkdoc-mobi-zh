    `android:id="@+id/layerOne"`


    `android:drawable="@drawable/cloudsky" />`


    `<item`


    `android:id="@+id/layerTwo"`


    `android:drawable="@drawable/ninepatchframe" />`


    `<item`


    `android:id="@+id/layerThree"`


    `android:drawable="@drawable/bookmark0" />`


