  trans: '

    # 创建 ShapeDrawable 对象：XML `<shape>` 父标签


    让我们再次启动 Eclipse，或者如果它已经在桌面上打开，你可以直接右键点击 `GraphicsDesign` 项目中的 `/res/drawable`
    文件夹。选择 **新建 ➤ Android XML 文件** 菜单命令序列，如图 16-1 所示。


    ![A978-1-4302-5786-8_16_Fig1_HTML.jpg](img/A978-1-4302-5786-8_16_Fig1_HTML.jpg)


    图 16-1. 新建一个 ➤ Android XML 文件，以便创建 `ShapeDrawable` 对象的 XML 定义


    在“新建 Android XML 文件”对话框中（如图 16-2 所示），将文件命名为 `contents_shape`，然后选择 `<shape>` 根元素，这将使其成为一个
    `ShapeDrawable` 的 XML 定义文件。请注意，由于你已经在 `GraphicsDesign` 项目中点击了 `/res/drawable`
    文件夹，Eclipse 能够自动为你推断出前两个“资源类型”和“项目”设置字段。完成后，选择“完成”按钮以创建你的 `ShapeDrawable` XML
    定义文件。


    ![A978-1-4302-5786-8_16_Fig2_HTML.jpg](img/A978-1-4302-5786-8_16_Fig2_HTML.jpg)


    图 16-2. 使用“新建 Android XML 文件”对话框创建一个 `<shape>` Drawable 的 XML 定义文件


    当 `ShapeDrawable` XML 定义文件在 Eclipse 中央编辑窗格中打开后，将光标放在 `xmlns:android` 参数末尾，按下回车键，输入
    `android`，然后按下冒号键以弹出包含此标签所有可用参数的助手对话框，如图 16-3 所示。选择 `android:shape` 选项，该选项允许你定义形状，双击它，它将被添加为你的
    `<shape>` 父标签的一个参数。


    ![A978-1-4302-5786-8_16_Fig3_HTML.jpg](img/A978-1-4302-5786-8_16_Fig3_HTML.jpg)


    图 16-3. 添加 `android:shape` 参数来定义你的 `ShapeDrawable` 要使用的形状


    当参数出现后，在引号内添加形状类型 `oval`。接下来，将光标放在 `<shape>` 父标签容器内部，或者放在起始 `<shape>` 标签“结束”尖括号下方的空行上，你就可以开始添加嵌套的子标签了。


    添加一个左尖括号 `<` 字符来调用 Eclipse 助手对话框，其中包含 `<shape>` 根元素可用的所有子标签，如图 16-4 所示。


    让我们来了解一下可以应用的不同类型的渐变，以及如何设置渐变色谱外部、内部和中间部分的颜色。由于椭圆没有角，且纯色过于单调，因此为你的 `<shape>` 父标签添加
    `<gradient>` 子标签。


    选择 `gradient` 选项并（或）双击它，以将 `<gradient>` 子标签添加到你的 `ShapeDrawable` XML 定义中。你会注意到只添加了
    `<gradient` 这部分子标签，因此你必须通过添加一个 `空格` 和一个 `/>` 结束标签来完成 Eclipse 的容器闭合。


    完成此操作后，你可以将光标放在 `<gradient` 起始标签之后，按下回车键以使用 Eclipse 的自动缩进功能。


    ![A978-1-4302-5786-8_16_Fig4_HTML.jpg](img/A978-1-4302-5786-8_16_Fig4_HTML.jpg)


    图 16-4. 在父 `<shape>` 标签中添加 `<gradient>` 子标签，以用渐变填充 `ShapeDrawable` 对象


    输入单词 `android` 并按下冒号键，调出可与 `<gradient>` 标签一起使用的参数列表。如你所见，共有九个参数，在完成本节之前你会用到其中七个。双击
    `android:startColor` 参数，它将被添加到你的 `<gradient>` 标签中，如图 16-5 所示，至此你将开始为你的椭圆 `ShapeDrawable`
    对象配置渐变。


    ![A978-1-4302-5786-8_16_Fig5_HTML.jpg](img/A978-1-4302-5786-8_16_Fig5_HTML.jpg)


    图 16-5.

