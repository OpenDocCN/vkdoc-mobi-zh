    \ 文件等等。\n\n这些对话框会询问您一系列问题，或者更准确地说，允许您从一系列选项中进行选择，并使用数据字段指定信息，以便 Eclipse ADT（本质上是\
    \ Android 操作系统）能够按照 Android 希望实施的标准惯例，以最优方式创建您的应用程序引导代码。正如您在本书中将看到的，Android 对于它希望开发者如何构建或编码其应用程序非常讲究。\n\
    \n第一个对话框（如图 2-2 所示）允许您命名应用程序和 Eclipse 中的项目文件夹，并最终为您的项目建立 Java 包名称。\n\n这些是第一个对话框中的前三个字段。让我们将此应用和项目命名为\
    \ `GraphicsDesign`，并根据本书名称将您的 Java 包命名为 `pro.android.graphics`。在本书中，您将开发此应用程序项目，实现令人惊叹的图形处理管线！\n\
    \n接下来的四个下拉菜单选择器允许您选择要开发的 API 级别和操作系统主题。我接受默认（或建议）的最低所需 SDK：API 级别 8（Android 2.2\
    \ Froyo），目标 SDK 为 API 级别 17（Android 4.2 Jelly Bean）。我将使用最新的 API 级别 17 进行编译，并使用最现代的\
    \ `Holo Light` 操作系统主题。\n\n![A978-1-4302-5786-8_2_Fig2_HTML.jpg](img/A978-1-4302-5786-8_2_Fig2_HTML.jpg)\n\
    \n图 2-2.  \n命名您的应用程序、项目和包，并选择最低和目标 SDK\n\n完成所有这些非常重要的应用程序规格指定后，点击**下一步 ➤** 按钮，进入**新建\
    \ Android 应用程序**系列对话框中的下一个。\n\n该系列中的第二个对话框是**新建 Android 应用程序配置项目**对话框，如图 2-3 所示。此对话框允许您选择有关\
    \ Android ADT 如何在 Eclipse 中为您创建项目文件（目录结构）系统、引导 Java 代码和应用程序图标的选项。\n\n尽管您将在本书后面设计自己的自定义应用程序图标（毕竟这是一本关于图形设计的书），但现在您将选择让\
    \ Android 为您创建占位应用程序启动器图标的选项，因此请在此对话框的第一个复选框中打上勾。\n"
- fmt: '对话框中的下一个复选框将指示 Android ADT 为您编写一些初始的 Java Activity 子类代码，因此让我们偷懒并勾选此选项，以便精确查看
    Eclipse ADT 将为您做些什么。


    最后，接受默认的“在工作区中创建项目”（`Create Project in Workspace`）选项，保持此复选框的勾选状态，因为它默认已被勾选。


    ![A978-1-4302-5786-8_2_Fig3_HTML.jpg](A978-1-4302-5786-8_2_Fig3_HTML.jpg)


    图 2-3. 使用“配置项目”对话框创建图标、Activity 和项目工作区


    此项目并不庞大，无需将其标记为更大应用程序（包含多个代码库）中的库，也无需使用工作集，因此请取消选择这些选项。完成第二个对话框后，单击“下一步”（`Next
    ➤`）按钮，以进入下一个对话框，即“配置启动器图标”（`Configure Launcher Icon`）对话框。


    此对话框如图 [2-4](A978-1-4302-5786-8_2_Chapter.html#Fig4) 所示，将允许您从 Android 提供的资源中进行选择，您将使用该资源来临时定义应用程序启动图标，并临时用于您的
    Pro Graphics 应用程序。


    由于专业应用程序始终会拥有自定义图标，而非默认的 Android 图标，因此只需为此屏幕选择默认值即可。现在就这样做，因为此图标将充当应用程序的占位图标，直到您创建自己的自定义应用程序图标——您很快就会执行此操作，以便让您的应用程序具有自己的身份。


    如果您已经有可用的应用程序图标图片，可以通过选择顶部的“图片”（`Image`）按钮，然后使用“浏览”（`Browse`）按钮选择图标资源的图片文件，利用此对话框进行安装。


    这里提供了修剪周围空白区域、添加内边距、裁剪或居中前景缩放、选择图标形状以及使用背景色的选项。您目前还不需要使用它们（但可以随意尝试）。


    ![A978-1-4302-5786-8_2_Fig4_HTML.jpg](A978-1-4302-5786-8_2_Fig4_HTML.jpg)


    图 2-4. 使用“配置启动器图标”对话框配置占位图标图片


    由于这是一本图形设计书籍，您将把所有这些图片编辑优化操作应用到您的应用程序图标上，并在您的图片编辑软件包中完成，因为您对工作流程有更多的控制权和选项。


    完成“配置启动器图标”对话框后，单击“下一步”（`Next ➤`）按钮，继续查看应用程序创建系列中的下一个对话框，即“创建 Activity”（`Create
    Activity`）对话框，如图 [2-5](A978-1-4302-5786-8_2_Chapter.html#Fig5) 所示。


    此对话框将允许您选择 Android Activity 子类 Java 代码的类型，这些代码将由 Eclipse ADT 环境为您编写。让我们看一下 ADT
    将为您编写的最简启动 Activity 代码。为此，请选择“空白 Activity”（`Blank Activity`）选项。


    由于您将从头开始创建您的 Pro Android Graphics 应用程序，以便学习如何在 Android 内部自定义图形资源，这正是您所需要的：一张白纸，如果您愿意的话。


    ![A978-1-4302-5786-8_2_Fig5_HTML.jpg](A978-1-4302-5786-8_2_Fig5_HTML.jpg)


    图 2-5. 使用“创建 Activity”对话框为您的应用程序创建一个新的空白 Activity


    一旦您从“创建 Activity”复选框下方的选择区域选择了第一个“空白 Activity”选项，单击“下一步”（`Next ➤`）按钮，您将进入这个“新建
    Android 应用程序”系列对话框中的最后一个应用程序配置对话框。


    “空白 Activity”对话框如图 [2-6](A978-1-4302-5786-8_2_Chapter.html#Fig6) 所示，允许您通过在上一对话框中选择的空白
    Activity 进行配置，为其指定名称和导航类型。由于您是从头开始编写 Pro Android Graphics 应用程序的代码，请选择导航类型为“无”。这样，您就可以在本书的学习过程中自行构建应用程序导航。


    对于“Activity 名称”（`Activity Name`）和“布局名称”（`Layout Name`）参数，我们采用 Android ADT 建议的命名约定，分别为
    Java 代码和 XML 标记文件使用 `MainActivity.java` 和 `activity_main.xml`。


    在本书的第一部分中，我们将遵循此命名约定，因为这便于明确哪些 Java Activity 类及其相关的 Activity 布局用户界面设计是相互配对的。


    在此对话框屏幕中完成操作（实际上什么都不用做）后，单击“完成”（`Finish`）按钮。现在，让我们仔细看看 Android Eclipse ADT 通过这五个对话框系列为您慷慨创建的新建
    Android 应用程序项目启动基础设施。


    ![A978-1-4302-5786-8_2_Fig6_HTML.jpg](A978-1-4302-5786-8_2_Fig6_HTML.jpg)


    图 2-6. 使用“空白 Activity”对话框命名您的 Java Activity 子类和 XML 布局


    一旦您选择了“完成”按钮，系统将返回到 Eclipse ADT IDE，您将在 Eclipse 的图形布局编辑器（`Graphical Layout Editor`，简称
    `GLE`）中看到您的新项目以图形格式显示，如图 [2-7](A978-1-4302-5786-8_2_Chapter.html#Fig7) 所示。


    您还会在 IDE 的左侧看到“包资源管理器”（`Package Explorer`）窗格，其中显示了您刚刚完成的“新建 Android 应用程序”系列对话框所创建的项目层次结构和文件夹结构。


    顶部是 `GraphicsDesign` 文件夹，下面依次是您的源代码（`src`）、资源（`res`）或项目资产，以及底部的 `AndroidManifest.xml`
    文件，该文件负责配置和启动您的 Android 应用程序。


    在 `res` 文件夹下，您将找到用于所有数字图像 DPI 资源的子文件夹（文件夹名为 `drawable`）、菜单、应用程序常量（`values` 文件夹）以及用户界面设计（`layout`
    文件夹）。


    在 `layout` 文件夹下，请注意 `activity_main.xml` 文件名被高亮显示；这是当前显示在中央编辑窗格中的 XML 标记，当前使用的是图形布局编辑器模式或视图，位于一个视图或“窗格”中。在最右侧，您会看到“大纲”（`Outline`）视图或窗格。


    大纲视图显示，ADT 为您的 `MainActivity` UI 设计选择了一个 `RelativeLayout` UI 布局容器，并在其中放置了一个带有“Hello
    World”消息的 `TextView` UI 元素。这意味着 Android ADT 已经为您编写了 Hello World 应用程序，而您甚至无需编写任何代码！


    ![A978-1-4302-5786-8_2_Fig7_HTML.jpg](A978-1-4302-5786-8_2_Fig7_HTML.jpg)


    图 2-7. 新应用程序创建后，在 Eclipse 中央编辑区域显示的新 `activity_main.xml` 编辑选项卡


    接下来，让我们以代码形式查看您的用户界面 XML 标记。在 Eclipse 中央编辑窗格的右下角，单击 `activity_main.xml` 选项卡。一旦您这样做，您就可以看到
    XML 标记，它会渲染成在 GLE 中显示的用户界面屏幕视图。


    ADT 为您的“空白 Activity”用户界面屏幕布局定义编写的默认 XML 标记如图 [2-8](A978-1-4302-5786-8_2_Chapter.html#Fig8)
    所示。此 UI 布局包含一个 `RelativeLayout`（这是 Android 的默认或推荐布局类型），以及此布局容器内的一个简单 `TextView`
    UI 元素或小部件。


    您需要更改此启动 XML 标记，以支持一个 `VideoView` 用户界面元素，因为您希望新的 `MainActivity.java` 启动（或闪屏）屏幕在启动后显示一些非常酷的内容。


    在您更改此 XML 标记之前，让我们快速浏览一下 Eclipse ADT 在此 `RelativeLayout` 父标签内为您的 `MainActivity`
    类的 UI 布局容器为您精心创建的内容。'
  raw: 'The next checkbox in the dialog will instruct Android ADT to write some of
    your initial Java Activity subclass code for you, so let’s be lazy and check this
    option as well, just to see precisely what Eclipse ADT will do for you.


    Finally, accept the default Create Project in Workspace option by leaving this
    checkbox checked, as it will be checked already as the default.


    ![A978-1-4302-5786-8_2_Fig3_HTML.jpg](A978-1-4302-5786-8_2_Fig3_HTML.jpg)


    Figure 2-3.


    Using the Configure Project dialog to create your icon, activity, and project
    workspace


    This project is not so large that you need to mark it as a library within a larger
    application (with multiple libraries of code) or use working sets, so leave these
    options unselected. Once you are finished with this second dialog, click the Next
    ➤ button, in order to proceed into the next dialog, which is the Configure Launcher
    Icon dialog.


    This dialog, shown in Figure [2-4](#A978-1-4302-5786-8_2_Chapter.html#Fig4), will
    allow you to select from an Android-supplied asset, which you will use for now
    to define your application launch icon, which will be used temporarily for your
    Pro Graphics application.


    Since a professional application will always have a custom icon, and not a default
    Android icon, just select the defaults for this screen. Do this now because this
    icon will serve as a placeholder icon for your application until you get around
    to creating your own custom application icon, which you will be doing very soon
    so your application has an identity.


    If you already have an image to use for your application icon, you could use this
    dialog to install it by selecting the Image button at the top, and then selecting
    the image file for the icon asset using the Browse button.


    There are options to trim surrounding blank space, add padding, crop or center
    foreground scaling, pick an icon shape, and use a background color. You won’t
    use them at this time (but feel free to play around with them).


    ![A978-1-4302-5786-8_2_Fig4_HTML.jpg](A978-1-4302-5786-8_2_Fig4_HTML.jpg)


    Figure 2-4.


    Using the Configure Launcher Icon dialog to configure your placeholder icon image


    Since this is a graphics design book, you will apply all of these image editing
    refinements to your application icon in your image editing software package where
    you have more control and options regarding the work process.


    After you are finished with the Configure Launcher Icon dialog, click the Next
    ➤ button, moving on to take a look at the next dialog in the app creation series,
    which is the Create Activity dialog, shown in Figure [2-5](#A978-1-4302-5786-8_2_Chapter.html#Fig5).


    This dialog will allow you to select the type of Android Activity subclass Java
    code, which the Eclipse ADT environment will write for you. Let’s look at the
    minimum bootstrap Activity code that ADT will write for you. To do this, select
    the Blank Activity option.


    Since you’re going to be creating your Pro Android Graphics application from scratch,
    so that you can learn how to customize your graphics assets inside Android, this
    is what you really want: a blank slate, if you will.


    ![A978-1-4302-5786-8_2_Fig5_HTML.jpg](A978-1-4302-5786-8_2_Fig5_HTML.jpg)


    Figure 2-5.


    Using the Create Activity dialog to create a new blank Activity for your application


    Once you have selected the first Blank Activity option, from the selection area
    underneath the Create Activity checkbox, click the Next ➤ button and you will
    proceed to the final application configuration dialog within this New Android
    Application series of dialogs.


    The Blank Activity dialog, shown in Figure [2-6](#A978-1-4302-5786-8_2_Chapter.html#Fig6),
    allows you to configure the blank Activity you selected in the previous dialog,
    by giving it a name and navigation type. Since you are coding your Pro Android
    Graphics application from scratch, select a navigation type of none. This is so
    that you can craft your own application navigation during the duration of this
    book.


    For the Activity Name and Layout Name parameters, let’s use an Android ADT suggested
    naming convention of MainActivity.java and activity_main.xml for your Java code
    and your XML markup files, respectively.


    We will be following this naming convention throughout this first part of the
    book, as it makes it easy to see which Java Activity classes and their related
    Activity Layout User Interface Designs are paired with each other.


    Once you have finished (doing absolutely nothing) on this dialog screen, click
    the Finish button. Now let’s take a close look at the New Android Application
    Project bootstrap infrastructure that Android Eclipse ADT has so generously created
    for you using this series of five dialogs.


    ![A978-1-4302-5786-8_2_Fig6_HTML.jpg](A978-1-4302-5786-8_2_Fig6_HTML.jpg)


    Figure 2-6.


    Using the Blank Activity dialog to name your Java Activity subclass and XML layout


    Once you select the Finish button, you will be returned to the Eclipse ADT IDE
    and you will see your new project displayed inside Eclipse’s Graphical Layout
    Editor (or GLE) in a graphical format, as shown in Figure [2-7](#A978-1-4302-5786-8_2_Chapter.html#Fig7).


    You will also see, on the left side of the IDE, the Package Explorer pane, which
    shows the project hierarchy and folder structure that was created by the New Android
    Application series of dialogs, which you just completed.


    At the top is the GraphicsDesign folder, and under it are your source code (src),
    resources (res) or project assets, and the AndroidManifest.xml file at the bottom,
    which configures and launches your Android application.


    Under the resources folder, you will find sub-folders for all your digital imaging
    DPI assets (folders named drawable ), your menu, constants for your application
    (values folder), and user interface designs (layout folder).


    Under your layout folder, notice that the activity_main.xml file name is highlighted;
    this is the XML markup that will be showing in the central editing pane, currently
    using the Graphical Layout Editor mode or view, in a view or “pane.” On the far
    right you will see the Outline view or pane.


    The Outline view shows you that the ADT selected a RelativeLayout UI layout container
    for your MainActivity UI design, and put a TextView UI element in it with a Hello
    World message. This means that Android ADT just wrote the Hello World application
    for you, and you didn’t even have to write any code!


    ![A978-1-4302-5786-8_2_Fig7_HTML.jpg](A978-1-4302-5786-8_2_Fig7_HTML.jpg)


    Figure 2-7.


    New activity_main.xml editing tab shown in central editing area of Eclipse after
    the new app is created


    Next, let’s take a look at your user interface XML markup in code format by clicking
    the activity_main.xml tab at the bottom right of your central editing pane in
    Eclipse. Once you do this, you can see the XML markup, which renders into the
    user interface screen view that was displayed in the GLE.


    The default XML markup ADT wrote for your “Blank Activity” user interface screen
    layout definition is shown in Figure [2-8](#A978-1-4302-5786-8_2_Chapter.html#Fig8).
    This UI layout includes a RelativeLayout, which is Android’s default or recommended
    layout type, and a simple TextView UI element or widget inside this layout container.


    You are going to need to change this bootstrap XML markup to support a VideoView
    user interface element since you want your new MainActivity.java start up, or
    splash, screen to show something really cool after it launches.


    Before you change this XML markup, let’s take a quick look at what Eclipse ADT
    has crafted for you here, inside this RelativeLayout parent tag for your MainActivity
    class’s UI layout container.'
