- fmt: "Using the `android:` work process to bring up all of the parameter options\
    \ for the `<gradient>` tag.\n\nSet a hexadecimal color value of 100% red channel\
    \ using `#FF0000` in the `android:startColor` parameter, and use 100% yellow (red\
    \ plus green) for the `android:centerColor` parameter using the hexadecimal value\
    \ `#FFFF00`. For the `android:endColor`, use a 100% green hexadecimal color value,\
    \ or `#00FF00`, so that you’re using colors that will blend well in your gradient.\n\
    \nNext, let’s specify the pivot point, or a center point as it is called with\
    \ a gradient, using the `android:centerX` and `android:centerY` parameters both\
    \ set to the exact middle (50%) of the shape, by using float values of `0.5`.\n\
    \nWhen you are done adding these five parameters, the XML definition for the oval\
    \ Shape with a linear (default) gradient of red, yellow, and green color values\
    \ will look exactly like this following block of XML markup:\n\n```\n<? xml version=\"\
    1.0\" encoding=\"utf-8\" ?>\n<shape xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:shape=\"oval\" >\n    <gradient\n        android:startColor=\"#FF0000\"\
    \n        android:centerColor=\"#FFFF00\"\n        android:endColor=\"#00FF00\"\
    \n        android:centerX=\"0.5\"\n        android:centerY=\"0.5\" />\n</shape>\n\
    ```\n\nAs you can see in Figure 16-6, the markup is error- and warning-free, and\
    \ you are ready to test your ShapeDrawable definition using the Graphical Layout\
    \ Editor pane inside the Eclipse ADT.\n\n![A978-1-4302-5786-8_16_Fig6_HTML.jpg](A978-1-4302-5786-8_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6. Adding start, center, and end colors and pivot point centering\
    \ parameters to the `<gradient>` child tag\n\nBefore you can access the GLE, you\
    \ have to open and be editing inside your `activity_contents.xml` definition tab,\
    \ so right-click that file in your `/res/layout` folder and select the Open option,\
    \ or click that tab at the top of the Eclipse central editing area if it is already\
    \ open in your IDE.\n\nSince your ShapeDrawable is not currently being referenced\
    \ by the ImageView UI element in your layout container definition, you will need\
    \ to change your NinePatchDrawable reference to instead point to your new ShapeDrawable\
    \ XML definition file. This is done by changing your `android:src` parameter to\
    \ a value of `@drawable/contents_shape` by using the following XML markup:\n\n\
    ```\nandroid:src=\"@drawable/contents_shape\"\n```\n\nYou can leave your `android:background`\
    \ parameter configured the way that it is currently, so that you can see how Android\
    \ anti-aliases (pixel smoothes) its vector artwork when bitmap assets are in use\
    \ in the background plate.\n\nAs you can see in Figure 16-7, your ImageView user\
    \ interface object is now referencing two different types of Drawable Resources,\
    \ a ShapeDrawable and a TransitionDrawable. Both of your Drawable Resources are\
    \ using XML markup to define their image assets, and thus you are not referencing\
    \ any of your image assets (directly) in your ImageView UI element anymore, although\
    \ you are referencing them inside your TransitionDrawable object XML definition.\n\
    \n![A978-1-4302-5786-8_16_Fig7_HTML.jpg](A978-1-4302-5786-8_16_Fig7_HTML.jpg)\n\
    \nFigure 16-7. Editing `activity_contents.xml` UI definition to change your `<ImageView>`\
    \ tag to reference `contents_shape`\n\nIn fact, if you wanted to see the TransitionDrawable\
    \ that you created back in Chapter 13 provide an image transition behind your\
    \ ShapeDrawable vector illustration, you could use the Run As ➤ Android Application\
    \ work process at any time during this process and check the results out for yourself.\
    \ I am not going to waste any time doing that now, as we have a lot to cover in\
    \ this chapter, but it might be fun for you to do, both to get some more practice\
    \ with using the AVD emulator and to see what a great job Android does in compositing\
    \ Bitmap (Transition Drawable) and Vector (Shape Drawable) graphics design elements.\
    \ You will be pleased with the results!\n\nOnce you have reconfigured your ImageView\
    \ source image parameter, click your Graphical Layout Editor tab, as shown in\
    \ Figure 16-8, so you can review the results of your ShapeDrawable object’s XML\
    \ definition thus far.\n\nAs you can see, ShapeDrawable objects render in the\
    \ GLE and you get a nice gradient blending of colors, and the edges of your oval\
    \ ShapeDrawable are perfectly anti-aliased with a `cloudsky.jpg` image in your\
    \ background plate.\n\n![A978-1-4302-5786-8_16_Fig8_HTML.jpg](A978-1-4302-5786-8_16_Fig8_HTML.jpg)\n\
    \nFigure 16-8. Using the Graphical Layout Editor to preview your oval ShapeDrawable\
    \ and linear gradient settings\n\nThe next thing to try while you are here working\
    \ with the `<gradient>` tag is a different type of gradient. There are currently\
    \ three different types of gradients in the Android OS. A linear gradient is the\
    \ default, as you can clearly see in Figure 16-8, so there is no need to utilize\
    \ an `android:type` parameter if you wish to implement a LinearGradient gradient\
    \ type.\n\nIn fact, as you will learn later on in the chapter, a `LinearGradient`\
    \ object is not a gradient type at all; it is one of the `Shader` subclasses.\n\
    \nThere are also sweep gradients, created by the `SweepGradient` class (`Shader`\
    \ subclass), which sweeps around a clock, so to speak, starting at a default position\
    \ of 3 o’clock. Finally, there is a `RadialGradient` class, and this gradient\
    \ starts at the center of the ShapeDrawable and radiates outwards.\n\nIt is important\
    \ to note that if the center of your ShapeDrawable, as specified by the `android:centerX`\
    \ and `android:centerY` parameters, is not set using the value of `0.5` (or 50%),\
    \ the radial gradient will emanate from wherever you have set your centering X\
    \ and Y coordinates and radiate outward from that point. This gives you a lot\
    \ of control over placing your radial gradient and thus over the types of special\
    \ effects you can create.\n\nLet’s add an `android:type` parameter and set it\
    \ to a value of `sweep`, as shown in Figure 16-9, in order to see what different\
    \ gradient effects this setting, and its various constants, will have on your\
    \ ShapeDrawable object.\n\nNotice that because you have your X and Y centering\
    \ parameters set to the middle of your ShapeDrawable, that your sweep will be\
    \ centered within your oval. However, just as with a radial setting, if you want\
    \ to get different sweep effects, you can change the value to be anywhere between\
    \ `0.0` and `1.0`.\n\n![A978-1-4302-5786-8_16_Fig9_HTML.jpg](A978-1-4302-5786-8_16_Fig9_HTML.jpg)\n\
    \nFigure 16-9. Changing the `<gradient>` type via `android:type` from the default\
    \ linear setting to the sweep setting\n\nAfter you’ve made your `android:type=\"\
    sweep\"` parameter addition, click back over to activate your `activity_contents.xml`\
    \ editing tab, and then click the Graphical Layout Editor tab at the bottom in\
    \ order to preview your new ShapeDrawable object with the sweep gradient type\
    \ displayed inside it, as shown in Figure 16-10.\n\nFinally, you will try to implement\
    \ the radial constant for the `android:type` parameter and generate a radial gradient,\
    \ so that you can visualize exactly what this type of gradient effect looks like,\
    \ and provides, for your vector illustration pipeline in Android. Remember, a\
    \ radial `android:type` constant is actually referencing an Android `RadialGradient`\
    \ class, which is a `Shader` subclass. You’ll be learning about the `Shader` class\
    \ and subclasses later.\n\nThere is one related parameter that you will need to\
    \ add in when using the `android:type=\"radial\"` parameter. The parameter is\
    \ an `android:gradientRadius` parameter, which specifies a radius for the radial\
    \ gradient. It’s just not that surprising that your radial gradient needs its\
    \ radius to be specified!\n\n![A978-1-4302-5786-8_16_Fig10_HTML.jpg](A978-1-4302-5786-8_16_Fig10_HTML.jpg)\n\
    \nFigure 16-10. Previewing the sweep gradient within the oval ShapeDrawable"
  raw: 'Using the android: work process to bring up all of the parameter options for
    the <gradient> tag


    Set a hexadecimal color value of 100% red channel using #FF0000 in the android:startColor
    parameter, and use 100% yellow (red plus green) for the android:centerColor parameter
    using the hexadecimal value #FFFF00\. For the android:endColor, use a 100% green
    hexadecimal color value, or #00FF00, so that you’re using colors that will blend
    well in your gradient.


    Next, let’s specify the pivot point, or a `center point` as it is called with
    a gradient, using the android:centerX and android:centerY parameter both set to
    the `exact middle` (50%) of the shape, by using float values of 0.5.


    When you are done adding these five parameters, the XML definition for the oval
    Shape with a linear (default) gradient of red, yellow, and green color values
    will look exactly like this following block of XML markup:


    `<? xml version="1.0" encoding="utf-8" ?>`


    `<shape xmlns:android=` [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)


    `android:shape="oval" >`


    `<gradient`


    `android:startColor="#FF0000"`


    `android:centerColor="#FFFF00"`


    `android:endColor="#00FF00"`


    `android:centerX="0.5"`


    `android:centerY="0.5" />`


    `</shape>`


    As you can see in Figure [16-6](#A978-1-4302-5786-8_16_Chapter.html#Fig6), the
    markup is error- and warning-free, and you are ready to test your ShapeDrawable
    definition using the Graphical Layout Editor pane inside the Eclipse ADT.


    ![A978-1-4302-5786-8_16_Fig6_HTML.jpg](A978-1-4302-5786-8_16_Fig6_HTML.jpg)


    Figure 16-6.


    Adding start, center, and end colors and pivot point centering parameters to the
    <gradient> child tag


    Before you can access the GLE, you have to open and be editing inside your activity_contents.xml
    definition tab, so right-click that file in your /res/layout folder and select
    the Open option, or click that tab at the top of the Eclipse central editing area
    if it is already open in your IDE.


    Since your ShapeDrawable is not currently being referenced by the ImageView UI
    element in your layout container definition, you will need to change your NinePatchDrawable
    reference to instead point to your new ShapeDrawable XML definition file. This
    is done by changing your android:src parameter to a value of @drawable/contents_shape
    by using the following XML markup:


    `android:src="@drawable/contents_shape"`


    You can leave your android:background parameter configured the way that it is
    currently, so that you can see how Android anti-aliases (pixel smoothes) its vector
    artwork when bitmap assets are in use in the background plate.


    As you can see in Figure [16-7](#A978-1-4302-5786-8_16_Chapter.html#Fig7), your
    ImageView user interface object is now referencing two different types of Drawable
    Resources, a ShapeDrawable and a TransitionDrawable. Both of your Drawable Resources
    are using XML markup to define their image assets, and thus you are not referencing
    any of your image assets (directly) in your ImageView UI element anymore, although
    you are referencing them inside your TransitionDrawable object XML definition.


    ![A978-1-4302-5786-8_16_Fig7_HTML.jpg](A978-1-4302-5786-8_16_Fig7_HTML.jpg)


    Figure 16-7.


    Editing activity_contents.xml UI definition to change your <ImageView> tag to
    reference contents_shape


    In fact, if you wanted to see the TransitionDrawable that you created back in
    [Chapter 13](#A978-1-4302-5786-8_13_Chapter.html) provide an image transition
    behind your ShapeDrawable vector illustration, you could use the Run As ➤ Android
    Application work process at any time during this process and check the results
    out for yourself. I am not going to waste any time doing that now, as we have
    a lot to cover in this chapter, but it might be fun for you to do, both to get
    some more practice with using the AVD emulator and to see what a great job Android
    does in compositing Bitmap (Transition Drawable) and Vector (Shape Drawable) graphics
    design elements. You will be pleased with the results!


    Once you have reconfigured your ImageView source image parameter, click your Graphical
    Layout Editor tab, as shown in Figure [16-8](#A978-1-4302-5786-8_16_Chapter.html#Fig8),
    so you can review the results of your ShapeDrawable object’s XML definition thus
    far.


    As you can see, ShapeDrawable objects render in the GLE and you get a nice gradient
    blending of colors, and the edges of your oval ShapeDrawable are perfectly anti-aliased
    with a cloudsky.jpg image in your background plate.


    ![A978-1-4302-5786-8_16_Fig8_HTML.jpg](A978-1-4302-5786-8_16_Fig8_HTML.jpg)


    Figure 16-8.


    Using the Graphical Layout Editor to preview your oval ShapeDrawable and linear
    gradient settings


    The next thing to try while you are here working with the <gradient> tag is a
    different type of gradient. There are currently `three` different types of gradients
    in the Android OS. A linear gradient is the `default`, as you can clearly see
    in Figure [16-8](#A978-1-4302-5786-8_16_Chapter.html#Fig8), so there is no need
    to utilize an android:type parameter if you wish to implement a LinearGradient
    gradient type.


    In fact, as you will learn later on in the chapter, a LinearGradient object is
    not a gradient type at all; it is one of the Shader subclasses.


    There are also sweep gradients, created by the SweepGradient class (Shader subclass),
    which sweeps around a clock, so to speak, starting at a default position of 3
    o’clock. Finally, there is a RadialGradient class, and this gradient starts at
    the center of the ShapeDrawable and radiates outwards.


    It is important to note that if the center of your ShapeDrawable, as specified
    by the `android:centerX` and android:centerY parameters, is not set using the
    value of 0.5 (or 50%), the radial gradient will emanate from wherever you have
    set your centering X and Y coordinates and radiate outward from that point. This
    gives you a lot of control over placing your radial gradient and thus over the
    types of special effects you can create.


    Let’s add an android:type parameter and set it to a value of sweep, as shown in
    Figure [16-9](#A978-1-4302-5786-8_16_Chapter.html#Fig9), in order to see what
    different gradient effects this setting, and its various constants, will have
    on your ShapeDrawable object.


    Notice that because you have your X and Y centering parameters set to the middle
    of your ShapeDrawable, that your sweep will be centered within your oval. However,
    just as with a radial setting, if you want to get different sweep effects, you
    can change the value to be anywhere between 0.0 and 1.0.


    ![A978-1-4302-5786-8_16_Fig9_HTML.jpg](A978-1-4302-5786-8_16_Fig9_HTML.jpg)


    Figure 16-9.


    Changing the <gradient > type via android:type from the default linear setting
    to the sweep setting


    After you’ve made your `android:type="sweep"` parameter addition, click back over
    to activate your activity_contents.xml editing tab, and then click the Graphical
    Layout Editor tab at the bottom in order to preview your new ShapeDrawable object
    with the sweep gradient type displayed inside it, as shown in Figure [16-10](#A978-1-4302-5786-8_16_Chapter.html#Fig10).


    Finally, you will try to implement the radial constant for the android:type parameter
    and generate a radial gradient, so that you can visualize exactly what this type
    of gradient effect looks like, and provides, for your vector illustration pipeline
    in Android. Remember, a radial android:type constant is actually referencing an
    Android RadialGradient class, which is a Shader subclass. You’ll be learning about
    the Shader class and subclasses later.


    There is one related parameter that you will need to add in when using the `android:type="radial"`
    parameter. The parameter is an android:gradientRadius parameter, which specifies
    a radius for the radial gradient. It’s just not that surprising that your radial
    gradient needs its radius to be specified!'
  trans: "\n使用 `android:` 工作流程调出 `<gradient>` 标签的全部参数选项。\n\n在 `android:startColor`\
    \ 参数中设置十六进制颜色值 `#FF0000` 表示 100%红色通道，在 `android:centerColor` 参数中使用十六进制值 `#FFFF00`\
    \ 表示 100%黄色（红色加绿色）。对于 `android:endColor`，使用 100%绿色的十六进制颜色值 `#00FF00`，这样你使用的颜色将在渐变中良好融合。\n\
    \n接下来，让我们使用 `android:centerX` 和 `android:centerY` 参数指定支点（即渐变中的中心点），将两者均设为形状的正中间（50%），使用的浮点值为\
    \ `0.5`。\n\n完成这五个参数的添加后，带有红色、黄色和绿色线性（默认）渐变的椭圆形 Shape 的 XML 定义将完全如下面的 XML 标记块所示：\n\
    \n```\n<? xml version=\"1.0\" encoding=\"utf-8\" ?>\n<shape xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:shape=\"oval\" >\n    <gradient\n        android:startColor=\"#FF0000\"\
    \n        android:centerColor=\"#FFFF00\"\n        android:endColor=\"#00FF00\"\
    \n        android:centerX=\"0.5\"\n        android:centerY=\"0.5\" />\n</shape>\n\
    ```\n\n如图 16-6 所示，标记无错误和警告，你可以准备好在 Eclipse ADT 中的图形布局编辑器窗格中测试你的 ShapeDrawable\
    \ 定义。\n\n![A978-1-4302-5786-8_16_Fig6_HTML.jpg](img/A978-1-4302-5786-8_16_Fig6_HTML.jpg)\n\
    \n图 16-6. 向 `<gradient>` 子标签添加起始色、中心色、结束色以及支点居中参数\n\n在访问 GLE 之前，你必须打开并编辑你的 `activity_contents.xml`\
    \ 定义标签页，因此在你的 `/res/layout` 文件夹中右键点击该文件并选择“打开”选项，或者如果它已经在你的 IDE 中打开，则点击 Eclipse\
    \ 中央编辑区域顶部的该标签页。\n\n由于你的 ShapeDrawable 当前未被布局容器定义中的 ImageView UI 元素引用，你需要将 NinePatchDrawable\
    \ 引用更改为指向你的新 ShapeDrawable XML 定义文件。这通过使用以下 XML 标记将 `android:src` 参数的值改为 `@drawable/contents_shape`\
    \ 来实现：\n\n```\nandroid:src=\"@drawable/contents_shape\"\n```\n\n你可以让 `android:background`\
    \ 参数保持当前配置，这样你就可以看到当背景板中使用位图资源时，Android 如何对矢量图形进行抗锯齿（像素平滑）处理。\n\n如图 16-7 所示，你的\
    \ ImageView 用户界面对象现在引用了两种不同类型的 Drawable 资源：ShapeDrawable 和 TransitionDrawable。你的两个\
    \ Drawable 资源都使用 XML 标记来定义它们的图像资源，因此你不再在 ImageView UI 元素中（直接）引用任何图像资源，尽管你在 TransitionDrawable\
    \ 对象 XML 定义中引用了它们。\n\n![A978-1-4302-5786-8_16_Fig7_HTML.jpg](img/A978-1-4302-5786-8_16_Fig7_HTML.jpg)\n\
    \n图 16-7. 编辑 `activity_contents.xml` UI 定义，将 `<ImageView>` 标签改为引用 `contents_shape`\n\
    \n实际上，如果你想查看在第 13 章中创建的 TransitionDrawable 在你的 ShapeDrawable 矢量图后面提供图像过渡效果，你可以在过程中的任何时候使用“运行方式\
    \ ➤ Android 应用程序”工作流程，并亲自检查结果。我现在不会浪费时间这样做，因为本章内容很多，但你可以自己尝试一下，这既是为了练习使用 AVD 模拟器，也是为了看看\
    \ Android 在合成 Bitmap（Transition Drawable）和 Vector（Shape Drawable）图形设计元素方面的出色表现。你会对结果感到满意的！\n\
    \n一旦你重新配置了 ImageView 源图像参数，点击图形布局编辑器标签页，如图 16-8 所示，以便检查你的 ShapeDrawable 对象 XML\
    \ 定义迄今为止的结果。\n\n如图所示，ShapeDrawable 对象在 GLE 中渲染，呈现出漂亮的渐变颜色混合，且椭圆形 ShapeDrawable\
    \ 的边缘与背景板中的 `cloudsky.jpg` 图像完美抗锯齿。\n\n![A978-1-4302-5786-8_16_Fig8_HTML.jpg](img/A978-1-4302-5786-8_16_Fig8_HTML.jpg)\n\
    \n图 16-8. 使用图形布局编辑器预览椭圆形 ShapeDrawable 和线性渐变设置\n\n接下来在处理 `<gradient>` 标签时要尝试的是不同类型的渐变。目前\
    \ Android 操作系统中有三种不同类型的渐变。线性渐变是默认类型，如图 16-8 所示，因此如果你希望实现 LinearGradient 渐变类型，则无需使用\
    \ `android:type` 参数。\n\n实际上，正如你将在本章后面学到的，`LinearGradient` 对象根本不是一种渐变类型；它是 `Shader`\
    \ 的子类之一。\n\n还有扫描渐变，由 `SweepGradient` 类（`Shader` 子类）创建，可以理解为绕时钟扫描，起始默认位置为三点钟方向。最后还有\
    \ `RadialGradient` 类，这种渐变从 ShapeDrawable 的中心开始向外辐射。\n\n需要注意的是，如果由 `android:centerX`\
    \ 和 `android:centerY` 参数指定的 ShapeDrawable 中心未使用值 `0.5`（或 50%）设置，则径向渐变将从你设置的居中\
    \ X 和 Y 坐标位置开始，并从该点向外辐射。这使你可以很好地控制径向渐变的放置位置，从而控制你可以创建的特殊效果类型。\n\n让我们添加一个 `android:type`\
    \ 参数并将其值设为 `sweep`，如图 16-9 所示，以便查看此设置及其各种常量对你的 ShapeDrawable 对象产生的不同渐变效果。\n\n\
    请注意，由于你将 X 和 Y 居中参数设置为 ShapeDrawable 的中间，扫描将位于椭圆形内居中。然而，就像径向设置一样，如果你想获得不同的扫描效果，可以将值改为\
    \ `0.0` 到 `1.0` 之间的任何值。\n\n![A978-1-4302-5786-8_16_Fig9_HTML.jpg](img/A978-1-4302-5786-8_16_Fig9_HTML.jpg)\n\
    \n图 16-9. 通过 `android:type` 将 `<gradient>` 类型从默认的线性设置更改为扫描设置\n\n添加完 `android:type=\"\
    sweep\"` 参数后，点击切换回激活你的 `activity_contents.xml` 编辑标签页，然后点击底部的图形布局编辑器标签页，预览带有扫描渐变类型的新\
    \ ShapeDrawable 对象，如图 16-10 所示。\n\n最后，你将尝试为 `android:type` 参数实现径向常量并生成径向渐变，以便你直观地了解这种渐变效果在\
    \ Android 矢量图形管线中的作用。记住，`android:type=\"radial\"` 常量实际上引用的是 Android 的 `RadialGradient`\
    \ 类，它是 `Shader` 的子类。稍后你将学习 `Shader` 类及其子类。\n\n使用 `android:type=\"radial\"` 参数时，需要添加一个相关参数。这个参数是\
    \ `android:gradientRadius`，用于指定径向渐变的半径。径向渐变需要指定半径，这一点并不令人惊讶！\n\n![A978-1-4302-5786-8_16_Fig10_HTML.jpg](img/A978-1-4302-5786-8_16_Fig10_HTML.jpg)\n\
    \n图 16-10. 在椭圆形 ShapeDrawable 中预览扫描渐变\n"
- fmt: 'As I found out the hard way, Eclipse will throw an error (and not a pretty
    highlighted one, either) if you attempt to use the radial type of gradient without
    first installing this `android:gradientRadius` parameter.


    Later, if you like, you can remove this parameter, if you are the curious type,
    and use the CRTL-S keystroke combination to `save` your XML markup so that Eclipse
    will evaluate it. This will provide you with these error messages, inside an Error
    Log tab located at the bottom of your IDE.


    ![A978-1-4302-5786-8_16_Fig10_HTML.jpg](A978-1-4302-5786-8_16_Fig10_HTML.jpg)


    **Figure 16-10.** Using the Graphical Layout Editor to preview your oval ShapeDrawable
    and sweep gradient settings


    So let’s add in the two parameters now that you will need to implement a radial
    gradient inside your `ShapeDrawable` object, a gradient radius by using the `android:gradientRadius`
    parameter, and the radial gradient by using the `android:type="radial"` parameter,
    using the following gradient XML markup:


    ```

    <gradient

    android:startColor="FF0000"

    android:centerColor="FFFF00"

    android:endColor="00FF00"

    android:centerX="0.5"

    android:centerY="0.5"

    android:gradientRadius="100"

    android:type="radial" />

    ```


    As you can see in Figure [16-11](#A978-1-4302-5786-8_16_Chapter.html#Fig11), as
    well as in the above markup, I am using an integer value of `100` for my `android:gradientRadius`
    parameter. You could experiment with different settings yourself later on, starting
    at zero (for no gradient produced at all), to 5 (for a dot of color at the center),
    to 100 or more. The more experimentation you do, the more experience you have!


    An `android:gradientRadius` parameter setting of `100` will produce the radial
    gradient three color stratification shown in Figure [16-12](#A978-1-4302-5786-8_16_Chapter.html#Fig12),
    where approximately 35% of your radial gradient is red, 15% is yellow, and 50%
    of the radial gradient is green. Higher numbers will yield more red color.


    ![A978-1-4302-5786-8_16_Fig11_HTML.jpg](A978-1-4302-5786-8_16_Fig11_HTML.jpg)


    **Figure 16-11.** Adding an `android:gradientRadius` parameter so that you can
    implement an `android:type="radial"`


    Click your `activity_contents.xml` tab at the top of Eclipse and then click a
    Graphical Layout tab at the bottom to see a result, shown in Figure [16-12](#A978-1-4302-5786-8_16_Chapter.html#Fig12).


    ![A978-1-4302-5786-8_16_Fig12_HTML.jpg](A978-1-4302-5786-8_16_Fig12_HTML.jpg)


    **Figure 16-12.** Using the Graphical Layout Editor to preview your oval ShapeDrawable
    and radial gradient settings


    Next, you are going to add another child tag attribute, a `stroke` tag, to your
    `ShapeDrawable` to add some detail to the perimeter of this `ShapeDrawable`.


    To do this, use the left chevron `<` work process, as shown in Figure [16-13](#A978-1-4302-5786-8_16_Chapter.html#Fig13),
    to bring up the helper dialog with all of the child tag options in it, and select
    the stroke tag option at the bottom, and (or) double-click it to insert the `<stroke>`
    child tag.


    ![A978-1-4302-5786-8_16_Fig13_HTML.jpg](A978-1-4302-5786-8_16_Fig13_HTML.jpg)


    **Figure 16-13.** Using the left chevron `<` work process to bring up a helper
    dialog with tags you can use in `<shape>`


    Next, type the word `android` and then a colon character to bring up the ADT helper
    dialog, containing the four parameters that are supported for this `<stroke>`
    tag, all of which you’ll implement here so that you can visualize precisely what
    these stroke options can do for your vector illustrations.


    The `android:color` parameter specifies the stroke color, which you will set to
    be black to give you a nice dark border; the `android:width` parameter specifies
    the thickness of the stroke around the perimeter. I will utilize a setting of
    5 DIP so that the stroke around the oval is highly visible.


    The last two parameters allow you to add dashed line effects, which you’ll use
    to make the perimeter of your radial gradient oval look like it is a gear. The
    `android:dashWidth` defines the width of the dashes, which I set to a value of
    4 DIP, and the `android:dashGap` defines how much gap (space) is between each
    dash. I used a value of 3 DIP for my `dashGap` parameter.


    ```

    <stroke

    android:color="#000000"

    android:width="5dip"

    android:dashWidth="4dip"

    android:dashGap="3dip" />

    ```


    As you can see in Figure [16-14](#A978-1-4302-5786-8_16_Chapter.html#Fig14), you
    have utilized all four of the `<stroke>` parameters, and your XML markup is evaluating
    as error- and warning-free.


    ![A978-1-4302-5786-8_16_Fig14_HTML.jpg](A978-1-4302-5786-8_16_Fig14_HTML.jpg)


    **Figure 16-14.** Adding `<stroke>` tag parameters for `android:color`, `android:width`,
    `android:dashWidth`, and `dashGap`


    Click the `activity_contents` and GLE tabs; Figure [16-15](#A978-1-4302-5786-8_16_Chapter.html#Fig15)
    shows your results.


    ![A978-1-4302-5786-8_16_Fig15_HTML.jpg](A978-1-4302-5786-8_16_Fig15_HTML.jpg)


    **Figure 16-15.** Using the Graphical Layout Editor to preview your oval ShapeDrawable
    and dash `<stroke>` settings'
