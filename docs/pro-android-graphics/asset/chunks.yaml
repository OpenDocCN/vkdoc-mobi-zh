- fmt: '# Rotating Your PAG Logo: Using the `RotateAnimation` Class


    Finally, it is time to add your `RotateAnimation` object, and finish off the Java
    version of the animation you implemented via XML markup in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html).


    Open up Eclipse and the `MainActivity.java` editing tab and add an `Animation`
    object declaration at the top, right after your scale and alpha `Animation` objects,
    and name it `rotateZeroToFullAnimation`, as shown in Figure [15-18](#A978-1-4302-5786-8_15_Chapter.html#Fig18).


    ![A978-1-4302-5786-8_15_Fig18_HTML.jpg](A978-1-4302-5786-8_15_Fig18_HTML.jpg)


    **Figure 15-18.** Adding `rotateZeroToFullAnimation` `Animation` object declaration
    and new `RotateAnimation()` constructor


    Next, close up your event listener code blocks so that you can see all your instantiation
    code, which is shown at the bottom of Figure [15-18](#A978-1-4302-5786-8_15_Chapter.html#Fig18),
    and add in the `RotateAnimation` object instantiation using the following Java
    code:


    ```

    rotateZeroToFullAnimation = new RotateAnimation(0, 360, Animation.RELATIVE_TO_SELF,
    0.5f, Animation.RELATIVE_TO_SELF, 0.5f);

    ```


    The next thing that you need to do is to call the `.setDuration()` method off
    of the `rotateZeroToFullAnimation` object, now that it is initialized, and pass
    it a value of `5000` milliseconds (5 seconds) using the following code:


    ```

    rotateZeroToFullAnimation.setDuration(5000);

    ```


    Finally, you need to add this `rotateZeroToFullAnimation` `Animation` object to
    the `pagAnimationSet` `AnimationSet` object, using the `.addAnimation()` method,
    by using the following single line of Java code, as shown in Figure [15-19](#A978-1-4302-5786-8_15_Chapter.html#Fig19):


    ```

    pagAnimationSet.addAnimation(rotateZeroToFullAnimation);

    ```


    ![A978-1-4302-5786-8_15_Fig19_HTML.jpg](A978-1-4302-5786-8_15_Fig19_HTML.jpg)


    **Figure 15-19.** Configuring `RotationAnimation` with duration, degrees and pivot
    and adding to `AnimationSet` with `.addAnimation()`


    Since all of your offset timing and motion interpolation parameters are set at
    the parent `AnimationSet` object level, you do not need to worry about any of
    those global parameters, which is one of the advantages to creating an advanced
    `AnimationSet` procedural animation pipeline, as you can see here.


    Now it is time to test your `AnimationSet` object procedural animation and see
    if it works and if you have replicated everything that you did in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html)
    and [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html)—but now using only Java code.


