    类的 `.drawBitmap()` 方法，该方法接受四个参数。


    第一个参数是你的 `Bitmap` 对象，这里是你正在混合的另一个 `Bitmap` 对象；第二个是源矩形（`Rect` 对象），此处为 `null`，因为你的图像就是源；第三个是目标矩形，此处你创建了一个新的
    `Rect` 对象，其尺寸与 `cloudsky.jpg` 图像资源相同；第四个是 `Paint` 对象，也就是你之前创建并加载了引用 `PorterDuff.Mode.XOR`
    混合算法常量的 `PorterDuffXfermode` 对象的那个 `paintObject`。


