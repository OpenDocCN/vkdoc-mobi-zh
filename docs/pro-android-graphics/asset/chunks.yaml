    set it equal to the result of your `.decodeStream()` method call, which you’ll
    call off of Android’s `BitmapFactory` class. You will use your `rawImage` object
    as the method call parameter, and you will accomplish all of this using one single
    line of Java code, as shown in Figure [16-32](#A978-1-4302-5786-8_16_Chapter.html#Fig32):


    ```

    Bitmap sourceImage = BitmapFactory.decodeStream(rawImage);

    ```


