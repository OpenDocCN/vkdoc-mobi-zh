    To give the user feedback while they are waiting for a video asset to download
    will require that you implement a progress dialog, and thus you will be learning
    in this chapter about Android’s ProgressDialog class. This class allows you to
    implement the dialog that will alert users to the fact that they are downloading
    a video, and give them information regarding that download, such as what is being
    downloaded, using a progress animation.


    Later on in this chapter, using Squeeze, you will also optimize your 480x800 digital
    video asset to utilize the WebM codec and file format. You’ll also be learning
    about Android’s Display and WindowManager classes, as you need to use them to
    detect what screen orientation a user is using.


    ## Can I Stream Video? Setting a Manifest Internet Permission


    Before you will be able to use the Internet with your application at all, you
    will first be required by the Android OS to declare an INTERNET permission constant
    in your AndroidManifest.xml file. This can be accomplished by using the Android
    <uses-permission> child tag, along with the INTERNET constant, using the following
    line of XML markup:


    `<uses-permission android:name="android.permission.INTERNET" />`


    This permission flag, located at the top of the Android Manifest XML file after
    your <uses-sdk> specifications (see Figure [19-1](#A978-1-4302-5786-8_19_Chapter.html#Fig1)),
    will inform Android OS that you intend to go outside your user’s device to access
    streaming data or other content for your application.


    ![A978-1-4302-5786-8_19_Fig1_HTML.jpg](A978-1-4302-5786-8_19_Fig1_HTML.jpg)


    Figure 19-1.


    Adding the <uses-permission> child tag to the AndroidManifest file with android.permission.INTERNET


    The reason that this is necessary is essentially because you need to inform the
    Android OS that it needs to watch out for potential security breaches. Once you
    put a hardware device onto a public network, such as the Internet, it can be compromised
    by third parties, such as hackers. This is why I keep most of my 3D content development
    workstations on their own private network, one that is not connected (visible
    or accessible) to the outside world. The same concept can be applied to a user’s
    Android device.


    ## When Video Lives Far Away: The HTTP URL and Your URI


    Content internal to the Android OS (for video, this will be in the /res/raw folder)
    will usually use the android.resource:// URI path reference since this content
    will always live in the R or resource area of the Android OS.


    Database content, which uses what is termed a content provider in Android, uses
    the content:// URI path reference. You will not be looking at that URI path reference
    location in this book (that is an entirely different book on database design for
    Android), although it’s good to know about it!


    We are going to be using a web server to host your digital video assets, so you
    are going to change this android.resource:// to the familiar HTTP:// used to denote
    the HyperText Transfer Protocol schema.


    This means that upgrading your current application code to utilize digital video
    streaming is as simple as changing the parameter that is passed to your Uri.parse()
    method call in the splashScreenUri object declaration and configuration line of
    code, as shown in Figure [19-2](#A978-1-4302-5786-8_19_Chapter.html#Fig2). Your
    new Java code should look something like the following Java code statement:


    `Uri splashScreenUri = Uri.parse(` [`HTTP://www.e-bookclub.com/pag480x800portrait.mp4`](http://www.e-bookclub.com/pag480x800portrait.mp4)
    `);`


    This is the only change you will need to make to the code you crafted in [Chapter
    18](#A978-1-4302-5786-8_18_Chapter.html) in order to stream digital video assets
    from a new media web server to your Nexus One emulator (or Android hardware testing
    devices).


    ![A978-1-4302-5786-8_19_Fig2_HTML.jpg](A978-1-4302-5786-8_19_Fig2_HTML.jpg)


    Figure 19-2.


    Changing the URI reference for your internal video asset to an external HTTP video
    asset reference


    As you can see in Figure [19-3](#A978-1-4302-5786-8_19_Chapter.html#Fig3), the
    MPEG-4 digital video asset is streaming from the web server to the Nexus One emulator
    AVD frame by frame, as each frame comes over the Internet. I utilized a slower
    Internet connection to confirm this, and the video displayed frame by frame as
    each frame came over the Internet into my emulator.


    ![A978-1-4302-5786-8_19_Fig3_HTML.jpg](A978-1-4302-5786-8_19_Fig3_HTML.jpg)


    Figure 19-3.


    Streaming your pag480x800portrait.mp4 video in the Nexus One emulator


    Once the entire video has streamed over the Internet and has been loaded into
    system memory, any subsequent loop of the video plays back at a rate consistent
    with the playback of captive video from memory, as you saw in the previous chapter.
    If this is slower than it would be on the Android device hardware, remember that
    the Android device does not need to both emulate itself and run your app, as the
    AVD has to do (thus its weak performance).


    Next, you’ll look at how to preload digital video assets over the Internet, just
    in case you want to make sure your users have smooth video playback.'
