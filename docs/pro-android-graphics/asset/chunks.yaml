  trans: '

    # 缩放你的标志：使用 `ScaleAnimation` 类


    现在，是时候启动 Eclipse，为你的 PAG 标志逐帧动画添加程序化缩放动画了，操作方式与你在 第 4 章 中使用 XML 完成的一模一样。


    在 Eclipse 中央编辑窗格的选项卡中打开你的 `MainActivity.java` 代码，在 `AnimationDrawable` 对象声明之后立即声明一个名为
    `scaleZeroToFullAnimation` 的 `Animation` 对象，如图 15-1 所示。


    ![A978-1-4302-5786-8_15_Fig1_HTML.jpg](img/A978-1-4302-5786-8_15_Fig1_HTML.jpg)


    图 15-1. 在 `MainActivity.java` 活动顶部声明你的 `scaleZeroToFullAnimation` `Animation`
    对象


    如你所见，你尚未在代码中添加 `Animation` 类的导入语句，因此请将鼠标悬停在波浪形的红色错误高亮上，并选择 `Import Animation (android.view.animation
    package)` 选项，以便 ADT 为你编写 `Import android.view.animation.Animation` Java 语句。现在你已经声明并命名了你的
    `Animation` 对象以供使用，你可以在 `setUpAnimation()` 方法中对其进行初始化。


    接下来，在你的 `frameAnimation` `AnimationDrawable` 初始化语句之后添加一个空行，并使用下面一行 Java 代码添加一条类似的语句来初始化你现已声明的
    `scaleZeroToFullAnimation` 对象：


    ```

    scaleZeroToFullAnimation = new ScaleAnimation();

    ```


    正如你在图 15-2 中看到的，有一些波浪形的红色错误高亮需要检查！让我们将鼠标悬停在 `ScaleAnimation()` 构造函数方法上，并选择 `Import
    ScaleAnimation (android.view.animation package)` 选项。


    如你所见，选择该选项后，这并没有消除波浪形的红色错误高亮；然而，它确实为你编写了一条导入语句！


    ![A978-1-4302-5786-8_15_Fig2_HTML.jpg](img/A978-1-4302-5786-8_15_Fig2_HTML.jpg)


    图 15-2. 使用新的 `ScaleAnimation()` 构造函数实例化一个 `scaleZeroToFullAnimation` `Animation`
    对象


    波浪形红色错误高亮没有消失的原因（实际上，唯一改变的是弹出帮助程序的建议）是因为你需要向此构造函数方法传递参数（变量），概述你希望如何构建（如果你愿意，可以说是初始配置）此对象。


    让我们添加浮点数值；我使用了 `0`（0%）和 `1`（100%）作为 `fromX` 和 `toX` 参数值，并为 `fromY` 和 `toY` 参数使用了相同的值，如图
    15-3 所示。你还应为每个 `pivotX` 和 `pivotY` 参数值位置指定 `常量` 和 `float` 值 `0.5f`（即 50%）。请注意，浮点数值位置可以接受整数值并为您进行转换。


    ![A978-1-4302-5786-8_15_Fig3_HTML.jpg](img/A978-1-4302-5786-8_15_Fig3_HTML.jpg)


    图 15-3. 使用缩放变量和枢轴点常量配置 `ScaleAnimation()` 构造函数方法调用


    你为 X 和 Y 枢轴点使用的缩放常量是 `Animation` 类的 `RELATIVE_TO_SELF` 常量，通过使用点符号（`Animation.RELATIVE_TO_SELF`）从
    `Animation` 类引用中调用，具体代码（如果你使用宽屏显示器）如下所示：


    ```

    scaleZeroToFullAnimation = new ScaleAnimation(0, 1, 0, 1, Animation.RELATIVE_TO_SELF,
    0.5f, Animation.RELATIVE_TO_SELF, 0.5f);

    ```


    接下来需要指定的是缩放发生的 `duration`（持续时间），因为如果你现在编译并运行你的应用程序，什么都不会发生，尽管当前的 Java 代码实际上不会导致你的模拟器崩溃。


    这可以通过使用 `Animation` 类的 `.setDuration()` 方法来实现，该方法在你的 `scaleZeroToFullAnimation`
    `Animation` 对象上调用（你可能还记得该对象实际上被初始化为一个 `ScaleAnimation` 对象；现在搞混了吗？），使用下面简短而强大的
    Java 编程语句：


    ```

    scaleZeroToFullAnimation.setDuration(5000);

    ```


    我使用了一个数据值 `5000 毫秒`，即五秒，如图 15-4 所示。我使用这个时间值是为了让你能够看到标志缩放过程在相当长的持续时间内发生。


    ![A978-1-4302-5786-8_15_Fig4_HTML.jpg](img/A978-1-4302-5786-8_15_Fig4_HTML.jpg)


    图 15-4. 使用 `.setDuration()` 方法指定缩放操作持续时间，值为 5000 毫秒


    下一步正是让开发者感到困惑的地方：到底如何将这个程序化动画应用到你的逐帧动画上？答案是使用你的 `ImageView`，因为 `ImageView` 将包含（持有）你的逐帧动画，但你要程序化地动画化这个
    `ImageView` UI 容器本身，而逐帧动画则在其内部运行。


    我认为开发人员在尝试解决这个“动画类型组合问题”时的倾向是，尝试以某种方式引用（或连接）逐帧动画对象到程序化动画对象，或者反之亦然。


    正如你在图 15-5 中看到的，你已经使用 `pag.setImageDrawable(frameAnimation)` Java 代码语句将你的 `frameAnimation`
    `AnimationDrawable` 配置安装到了 `pag` `ImageView` 对象内部，因此现在你将使用在同一个 `pag` `ImageView`
    对象上调用的 `.startAnimation()` 方法，将其连接到你使用下面简短但关键（至关重要）的 Java 代码语句定义的 `scaleZeroToFullAnimation`
    `ScaleAnimation` 对象：


    ```

    pag.startAnimation(scaleZeroToFullAnimation);

    ```


    正如你在图 15-5 中看到的，Eclipse 对此代码没有问题，所以让我们继续测试它，看看能否利用 `ImageView` UI 元素作为中介，让程序化动画影响你的逐帧动画。


    ![A978-1-4302-5786-8_15_Fig5_HTML.jpg](img/A978-1-4302-5786-8_15_Fig5_HTML.jpg)


    图 15-5. 设置 `ScaleAnimation` `scaleZeroToFullAnimation` `Animation` 对象，使用 `.startAnimation()`
    进行缩放


    使用 `Run As ➤ Android Application` 工作流程启动 Nexus One 模拟器，并运行和测试你的应用程序（见图 15-6）。当你点击标志时，它会立即消失到远方，正如预期的那样，然后从你的视平线中动画出现，放大并旋转着进入，这与你在
    第 4 章 中主要使用 XML 标记实现这一酷炫特效时的效果一模一样。在这里，你仅用 Java 代码就完成了整个特效，而且你还没完成，远未完成！


    如果你想知道为什么你没有像在 第 4 章 中那样向 `ScaleAnimation` 对象添加一些参数，那是因为你将在本章后面将这些参数添加到 `AnimationSet`
    中，因为这样效率更高。一旦你了解了这些方法，你可以简单地在你的对象名称上调用它们，从而将它们（本地地）添加到你的 `ScaleAnimation` 中；这可以在本地级别完成，以微调你的复合特效的各个组成部分，或者如果所有组成部分都使用相同的偏移量和插值器，则全部可以使用
    `AnimationSet` 来完成。


    ![A978-1-4302-5786-8_15_Fig6_HTML.jpg](img/A978-1-4302-5786-8_15_Fig6_HTML.jpg)


    图 15-6. 在 Nexus One 模拟器中测试 `ScaleAnimation`


    你在 第 4 章 中做的下一件事是添加 alpha 混合效果，使这个从远处飞来的特效更加逼真。你通过在 Android 中额外使用 alpha 混合淡入放大的旋转标志来实现这一点，这在
    `Animation` 类和包中也得到了支持，你将在本章接下来的两节中看到。

    '
- fmt: "您将通过将旋转、缩放和矢量组合动画从远处拉近，使其从100%透明变为完全不透明，从而在屏幕上呈现更逼真的效果。\n\n让我们了解Android的`AlphaAnimation`类，以便在实现Java代码之前掌握其技术基础。该代码将用于使您的PAG徽标在从远处出现时淡入视图。\n\
    \n之后，您可以重新投入Java编码，并进一步享受利用数十行密集Java代码创建的纯Java帧动画与程序化动画组合管道带来的乐趣。\n\n## AlphaAnimation类：用于混合的动画子类\n\
    \n如您所知，Android的`AlphaAnimation`类是`android.view.animation.Animation`公共抽象类的直接子类。该动画类用于实现`View`对象的Alpha混合。它通过使用任何`View`对象的Alpha（透明度）值来实现这一点。本质上，这使得该程序化动画类对于淡入或淡出非常有用，并且它可以与其他三种变换类型结合使用，创造出相当惊人的效果，无论它本身多么简单。\n\
    \nAndroid `AlphaAnimation`类的层次结构如下：\n\n```\njava.lang.Object\n  > android.view.animation.Animation\n\
    \    > android.view.animation.AlphaAnimation\n```\n\n`AlphaAnimation`类也属于`android.view.animation`包。\n\
    \n其导入语句引用了`android.view.animation.AlphaAnimation`包导入路径，您很快将在下一节使用它来淡入您的PAG帧动画时看到。\n\
    \n您将使用一个`AlphaAnimation`对象进一步增强您的缩放特效，使其看起来像是徽标来自比您刚刚实现的缩放动画更远的地方。\n\n您想要用来创建`AlphaAnimation`对象的构造函数方法比八参数的`ScaleAnimation`构造函数方法要基础得多。`AlphaAnimation`构造函数方法将采用以下格式，请留意，因为您将在本章的下一节中实现它：\n\
    \n`AlphaAnimation(float fromAlpha, float toAlpha);`\n\n从技术上讲，Alpha通道混合操作通常不被归类为变换类型的动画，如移动（平移）、旋转或缩放操作。在3D软件包中尤其如此，因为对象混合是通过应用材质和不透明度纹理映射以及类似操作来处理的。然而，出于某种原因，Android操作系统将Alpha混合（这实际上更像是一种图像合成功能，而非2D变换）与三个基础变换操作归为一组。\n\
    \n尽管如此，它与这些变换操作结合使用时非常有用，因此我们将在这章中涵盖所有这四种操作以及`AnimationSet`分组操作，以提供一个完整的概述。\n\n\
    ## 淡入您的PAG徽标：使用AlphaAnimation类\n\n让我们回到Eclipse，进入`MainActivity.java`编辑标签，在您的`Activity`子类的顶部添加一个`Animation`对象，如图[15-7](#A978-1-4302-5786-8_15_Chapter.html#Fig7)所示。将该对象命名为`alphaZeroToFullAnimation`，然后进入您正在编码的`setUpAnimation()`方法，在`scaleZeroToFullAnimation`对象附近添加上一个对象实例化。\n\
    \n![A978-1-4302-5786-8_15_Fig7_HTML.jpg](A978-1-4302-5786-8_15_Fig7_HTML.jpg)\n\
    \n**图 15-7.** 使用`AlphaAnimation()`构造函数添加`alphaZeroToFullAnimation` `Animation`对象实例化\n\
    \n这与您对`scaleZeroToFullAnimation`对象实例化所做的操作完全相同，只是改用`AlphaAnimation()`构造函数方法而不是`ScaleAnimation()`类的构造函数方法。结果如图[15-7](#A978-1-4302-5786-8_15_Chapter.html#Fig7)所示，使用以下Java编程语句：\n\
    \n`alphaZeroToFullAnimation = new AlphaAnimation(0, 1);`\n\n请注意，您需要将鼠标悬停在代码中调用的新`AlphaAnimation()`构造函数（和类）上，并选择`Import\
    \ Alpha Animation (android.view.animation package)`选项，以便在您的`Activity`子类代码列表顶部生成该类的导入语句。这将清除代码中的所有错误标记，然后您可以通过`.setDuration()`方法调用设置5秒的Alpha混合淡入时间。\n\
    \n这类似于您对缩放动画所做的操作，只是使用`alphaZeroToFullAnimation`对象，通过以下代码完成：\n\n`alphaZeroToFullAnimation.setDuration(5000);`\n\
    \n如图[15-8](#A978-1-4302-5786-8_15_Chapter.html#Fig8)所示，您的Java代码似乎没有错误（至少目前如此），您已经准备好将这个由`AlphaAnimation`构造的`alphaZeroToFullAnimation`\
    \ `Animation`对象附加到您的`pag` `ImageView`对象上。\n\n![A978-1-4302-5786-8_15_Fig8_HTML.jpg](A978-1-4302-5786-8_15_Fig8_HTML.jpg)\n\
    \n**图 15-8.** 使用0到100%不透明度配置`alphaZeroToFullAnimation`对象并调用`.setDuration(5000)`\n\
    \n现在，您需要进入`onClick()`事件处理代码结构，并添加一个类似于您为`scaleZeroToFullAnimation`对象所做的调用，通过以下一行Java代码，在`pag`\
    \ `ImageView`对象上调用`.startAnimation()`方法：\n\n`pag.startAnimation(alphaZeroToFullAnimation);`\n\
    \n如图[15-6](#A978-1-4302-5786-8_15_Chapter.html#Fig6)所示，您的代码仍然没有错误，因此是时候在Nexus\
    \ One AVD模拟器中测试您的代码了。看看有多个`.startAnimation()`方法调用是否能实际工作，以及如果不能的话，它将如何对方法调用进行优先级排序以处理（启动）多个程序化`Animation`对象，这将非常有趣。\n\
    \n使用`Run As ➤ Android Application`工作流程，在Nexus One模拟器中启动您的应用程序。当徽标出现时，点击它以启动帧动画和程序化动画对象构造，您已在Java处理管道中同时将它们放置到位。\n\
    \n![A978-1-4302-5786-8_15_Fig9_HTML.jpg](A978-1-4302-5786-8_15_Fig9_HTML.jpg)\n\
    \n**图 15-9.** 在`pag` `ImageView`对象上使用`alphaZeroToFullAnimation`调用`.startAnimation()`方法\n\
    \n如图[15-9](#A978-1-4302-5786-8_15_Chapter.html#Fig9)所示，我在Alpha混合操作中非常早地截取了这张屏幕截图，以便您可以观察PAG徽标的大小（缩放比例），以确定它是在混合、缩放还是两者都在进行！\n\
    \n您必须非常仔细地查看这张屏幕截图，才能发现混合正在发生，但缩放没有发生，这意味着代码中最后编写的`.startAnimation()`方法调用才是实际执行的那个。"
  raw: 'You will bring your spinning, scaling frame and vector combination animation
    in from the distance more realistically by taking it from 100% transparent to
    being 100% opaque once it reaches a final resting place on the screen.


    Let’s learn about the Android AlphaAnimation class, so that you have a good technical
    foundation regarding the class before you implement the Java code that will fade
    your PAG logo into view as it emerges out of the distance.


    After that you can get back into some Java coding and have some more fun with
    your Java-only frame animation and procedural animation combination pipeline,
    which you are creating using dozens of lines of dense Java code.


    ## AlphaAnimation Class: Animation Subclass for Blending


    As you know, the Android `AlphaAnimation` class is another direct subclass of
    the `android.view.animation.Animation` public abstract class. This animation class
    is used to implement alpha blending for View objects. It does this by using the
    alpha (transparency) values for any View object. Essentially, this makes this
    procedural animation class useful for fading, either in or out, and it can be
    used in conjunction with the other three transform types to create some pretty
    spectacular effects, regardless of how simple it is in and of itself.


    The Android AlphaAnimation class hierarchy is structured as follows:


    `java.lang.Object`


      `> android.view.animation.Animation`


        `> android.view.animation.AlphaAnimation`


    An AlphaAnimation class is also part of the `android.view.animation` package.


    Its `import statement` references your `android.view.animation.AlphaAnimation`
    package import path, as you’ll soon see in the next section when you use it to
    fade in your PAG frame animation.


    You are going to use an AlphaAnimation object to enhance your scale special effect
    even further, to make it look like the logo is coming from an even greater distance
    than that of the scale animation you just implemented.


    The constructor method that you want to use to create your AlphaAnimation object
    is significantly more basic than the eight-parameter ScaleAnimation constructor
    method. The AlphaAnimation constructor method will take the following format,
    so pay attention as you will be implementing this in the next section of this
    chapter:


    `AlphaAnimation(float fromAlpha, float toAlpha);`


    Technically, an Alpha Channel blending operation is not usually classified as
    a transform type of animation, like a movement (translation), rotation, or scaling
    operation would be. This is especially true where 3D software packages are concerned,
    where object blending is handled by the application of materials and opacity texture
    mapping, and similar operations.


    However, for some reason the Android OS groups alpha blending, which is really
    more of an image compositing function than a 2D transform, with the three foundational
    transform operations.


    That said, it is very useful in conjunction with these transformational operations,
    and so we will cover all four in this chapter, as well as the AnimationSet grouping
    operation, to provide a complete overview.


    ## Fading In Your PAG Logo: Using the AlphaAnimation Class


    Let’s go back into Eclipse and into your MainActivity.java editing tab and add
    an `Animation` object at the top of your Activity subclass, as shown in Figure
    [15-7](#A978-1-4302-5786-8_15_Chapter.html#Fig7). Name the object `alphaZeroToFullAnimation`
    and then go into the `setUpAnimation( )` method you are coding and add an object
    instantiation for the object close to (above or below) the scaleZeroToFullAnimation
    object.


    ![A978-1-4302-5786-8_15_Fig7_HTML.jpg](A978-1-4302-5786-8_15_Fig7_HTML.jpg)


    Figure 15-7.


    Adding an alphaZeroToFullAnimation Animation object instantiation using an AlphaAnimation(
    ) constructor


    This would be identical to what you did with your scaleZeroToFullAnimation object
    instantiation, except using the `AlphaAnimation( )` constructor method instead
    of the ScaleAnimation( ) class constructor method. The results are shown in Figure
    [15-7](#A978-1-4302-5786-8_15_Chapter.html#Fig7), using the following Java programming
    statement:


    `alphaZeroToFullAnimation = new AlphaAnimation(0, 1);`


    Note that you will have to mouse-over the new AlphaAnimation( ) constructor (and
    class) that you have invoked in your code and select the `Import Alpha Animation
    (android.view.animation package)` option to generate your Import statement for
    the class at the top of your Activity subclass code listing. That will clean all
    of the error flags out of your code, and you can then add a `.setDuration( )`
    method call to set a 5 second alpha blended fade-in time.


    This is done in a similar fashion to what you did with your scale animation, only
    using your alphaZeroToFullAnimation object, through the following code:


    `alphaZeroToFullAnimation.setDuration(5000);`


    As you can see in Figure [15-8](#A978-1-4302-5786-8_15_Chapter.html#Fig8), your
    Java code seems to be error-free (thus far, at least), and you are ready to attach
    this AlphaAnimation constructed alphaZeroToFullAnimation Animation object to your
    pag ImageView object.


    ![A978-1-4302-5786-8_15_Fig8_HTML.jpg](A978-1-4302-5786-8_15_Fig8_HTML.jpg)


    Figure 15-8.


    Configuring the alphaZeroToFullAnimation object with zero to 100% opacity and
    calling .setDuration(5000)


    Now you need to go up into your onClick( ) event handling code construct, and
    add a call similar to the one that you did for the scaleZeroToFullAnimation object,
    using the `.startAnimation( )` method called off of the pag ImageView object via
    the following single line of Java code:


    `pag.startAnimation(alphaZeroToFullAnimation);`


    As you can see in Figure [15-6](#A978-1-4302-5786-8_15_Chapter.html#Fig6), your
    code is error-free (still), and so the time has come to test your code in the
    Nexus One AVD emulator. It should be interesting to see if having more than one
    .startAnimation( ) method call will actually work, and if it doesn’t, how it prioritizes
    the method calls to process (start) more than one procedural Animation object.


    Use the `Run As ➤ Android Application` work process, and launch your app in the
    Nexus One emulator. When the logo appears, click it to start both the frame animation
    and the procedural animation object constructs, which you have put into place
    simultaneously inside your Java processing pipeline.


    ![A978-1-4302-5786-8_15_Fig9_HTML.jpg](A978-1-4302-5786-8_15_Fig9_HTML.jpg)


    Figure 15-9.


    Calling a .startAnimation( ) method off the pag ImageView object with an alphaZeroToFullAnimation


    As you can see in Figure [15-9](#A978-1-4302-5786-8_15_Chapter.html#Fig9), I pulled
    this screen shot very early in the alpha blending operation so that you could
    observe the size (scale) of your PAG logo to ascertain if it is blending or scaling
    or doing both!


    You will have to look (strain) very closely at this screen shot to see that the
    blending is happening but the scaling is not, which means that the last .startAnimation(
    ) method call written in your code is the one that is being executed.'
