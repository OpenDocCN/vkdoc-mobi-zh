    **Abstract**


    In this eleventh chapter, we''ll take a close look at the role that blending modes
    play in digital image compositing, as well as how to implement these digital image
    blending modes in Android, using the Android `PorterDuff` classes.


    A blending mode allows advanced digital image compositing to be performed between
    two or more layers within a digital image composite. Each pixel in each layer
    is run through an algorithm to determine how it will be applied (or not applied)
    to the layer or layers underneath it.


    Applying blending modes is usually done using a digital image editing and compositing
    software tool, such as Adobe Photoshop CS6 or the open source digital image software
    package GIMP, which we have been using throughout in this book, because it is
    quite advanced, and free for commercial use.


    The fact that these PorterDuff blending modes (sometimes termed *transfer modes*)
    are in Android, along with the ability to work with layers via the Android `LayerDrawable`
    class, which we are covering in the next chapter, puts a lot of the power, which
    is normally only found in software packages such as Photoshop CS6 and GIMP 2.8,
    into the hands of Android developers.


    This allows Android developers to take their graphics design creativity to an
    entirely new level by applying these types of algorithmic special effects, which
    are possible using layer blending mode in GIMP 2.8.6, to UI design, graphics design,
    digital imaging, digital video, and 2D animation in their Android applications.


    Examples of use of image blending include photo software, games, e-books, iTV
    programs for GoogleTV, wallpapers, screensavers, and other graphics-related uses
    that your imagination can come up with. With clever coding, all of these areas
    can even be made to be interactive, so your graphics-design-related image blending
    possibilities are literally limited only by your digitalized imagination.'
