    your bookmarking utility TextView and ImageView user interface elements in the
    previous chapter.


    The PorterDuff.Mode nested class is yet another collection of number value constants,
    similar to ScaleType, only with far more constants defined. In this case, the
    constants represent algorithmic pixel compositing blending modes, which are algorithms
    that define how the two different pixel color values should be added (or subtracted,
    or multiplied) together.


    Both GIMP and Photoshop have similar compositing modes that you set using the
    layer palettes within each of those respective digital image software packages.
    It is impressive that this same digital imaging power that is in Photoshop and
    GIMP is also available to Android developers via PorterDuff.


    `PorterDuff.Mode` is one of the 71 Enum subclasses we talked about earlier; this
    nested class is kept in the `android.graphics` package and is specified via an
    import statement as `android.graphics.PorterDuff.Mode`.


    If you want to peruse all of the blending modes currently available via the Android
    PorterDuff class, and see what the actual algorithms are for each of them, you
    can visit the following Android Developer web site URL:


    [`http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html`](http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html)


    Next, you will get into implementing some of these ImageView attributes in the
    XML user interface definition that you started working on in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html).
    You’ll lighten your background image using tint and play with aspect ratios!'
  trans: '

    ## 使用 `CropToPadding` 方法裁剪您的 ImageView


    另一个有用的 `ImageView` 参数是 `android:cropToPadding` 属性，它允许您通过使用 XML 标记或 Java 代码，对数字图像资源调用数字图像裁剪操作。


    如果您还记得，在第 7 章中，您曾将数字图像裁剪作为实现投影特效工作流程中不可或缺的一部分。当时您是使用 GIMP 2.8.6 的画布大小（裁剪）命令来完成此操作的。


    如果您认为在 `ImageView` 中裁剪图像资源本身是一项微不足道的功能，那么请考虑它在更复杂的工作流程中的价值——一个可以通过在图形设计应用程序中使用
    XML 和 Java 代码来实现的工作流程。


    使用此属性的方式在其名称 `CropToPadding` 中就显而易见。您使用 `android:padding` 参数来设置裁剪操作，然后设置 `android:cropToPadding=“true”`
    参数来调用裁剪操作。


    因此，要均匀地裁剪图像四周，请使用带有 DIP 值的 `android:padding` 参数；要在图像的不同侧进行不同程度的裁剪，请使用 `android:paddingTop`、`android:paddingLeft`、`android:paddingBottom`
    或 `android:paddingRight`。


    如果您在布局容器中设置了背景图像，那么这样做将允许该背景图像在 `ImageView` 被裁剪的部分（或曾经存在的部分）显示出来，因此这也可以用于合成或特效目的。当您通过
    Java 代码将内边距值附加到应用程序的交互元素上，甚至使用预定义的编程逻辑来动画化这些内边距值时，这一点尤其重要。


    接下来，我们将仔细研究更改图像资源中的颜色（色调），并使用 `PorterDuff` 类来调用 Android 的混合模式。


    ## 使用 `PorterDuff` 为 ImageView 着色与颜色混合


    `ImageView` 类中不从 `View` 超类继承的最后一个参数是 `android:tint` 参数，它允许我们通过 XML 参数使用 ARGB 十六进制颜色值来增强图像资源的颜色。


    也可以更改用于将 ARGB 颜色值应用到基础图像的 `PorterDuff` 类混合模式；然而，这只能通过 Java 代码使用 `.setColorFilter()`
    方法实现。


    `.setColorFilter()` Java 方法接受两个参数，一个定义要使用的颜色值，另一个指定 `PorterDuff.Mode` 常量，该方法使用以下
    Java 代码格式调用：


    ```

    .setColorFilter(int color, PorterDuff.Mode mode)

    ```


    如果您使用 XML 参数 `android:tint`，那么默认定义的 `PorterDuff.Mode` 是 `SRC_ATOP` 像素混合模式常量。您可能已经猜到，该模式会将指定的颜色值合成到
    SRC（源）图像的 TOP（顶部），正如参数名称所暗示的那样，这会为其着色。


    您可以分别使用白色 (`#FFFFFF`) 或黑色 (`#000000`) 颜色数据值进行着色，以提亮或变暗图像。稍后您将使用此技术来改善您在上一章中为书签工具
    `TextView` 和 `ImageView` 用户界面元素所创建的投影效果的对比度。


    `PorterDuff.Mode` 嵌套类是又一堆数值常量的集合，类似于 `ScaleType`，只是定义的常量多得多。在这种情况下，这些常量代表了算法性的像素合成混合模式，这些算法定义了如何将两个不同的像素颜色值相加（或相减、相乘）。


    GIMP 和 Photoshop 都有类似的合成模式，您可以通过各自数字图像软件包中的图层调色板进行设置。令人印象深刻的是，Photoshop 和 GIMP
    中这些强大的数字图像处理能力，同样可以通过 `PorterDuff` 提供给 Android 开发者使用。


    `PorterDuff.Mode` 是我们之前讨论过的 71 个 `Enum` 子类之一；这个嵌套类保存在 `android.graphics` 包中，并通过导入语句指定为
    `android.graphics.PorterDuff.Mode`。


    如果您想仔细查看 Android `PorterDuff` 类当前可用的所有混合模式，并了解每种模式的实际算法，可以访问以下 Android 开发者网站 URL：


    [`http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html`](http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html)


    接下来，您将在第 7 章中开始构建的 XML 用户界面定义中实现这些 `ImageView` 属性中的一部分。您将使用着色来提亮背景图像，并尝试使用宽高比！

    '
- fmt: '### Apply Tint to `SkyCloud` Image to Improve Shadow Contrast


    Launch Eclipse ADT and open up your `GraphicsDesign` application if it’s not open
    on your desktop already. You are going to perform some digital imaging procedures,
    just like you’d do in GIMP 2.8 or Photoshop, only you will do it using Android
    XML markup.


    The first thing that you really need to do to put the final touches on the drop
    shadow effects that you created in the previous chapter is to lighten up the `CloudSky`
    digital image that you are using as a background plate for your `BookmarkActivity.java`
    Activity subclass.


    Currently you are holding your background image inside the `RelativeLayout` parent
    tag using the `android:background` parameter, which is performing an automatic
    `ScaleType` of `FIT_XY` for you and filling the screen with your image asset with
    zero regard for aspect ratio, which is what you want, actually.


    However, as powerful as Android’s `RelativeLayout` container is, and as many powerful
    parameters as it does have, the `android:tint` that you need to use is not one
    of them, because `RelativeLayout` is for UI Layouts and `ImageView` is for Digital
    Imaging.


    So let’s remove that `android:background` parameter from your parent tag, and
    add an `ImageView` child tag at the top of the container, which will place it
    behind the other UI elements as far as Z-order is concerned. Next, you will start
    adding parameters, as shown in Figure [8-1](#A978-1-4302-5786-8_8_Chapter.html#Fig1),
    to configure it for use.


    ![A978-1-4302-5786-8_8_Fig1_HTML.jpg](A978-1-4302-5786-8_8_Fig1_HTML.jpg)


    **Figure 8-1.** Adding an `ImageView` to hold the digital image backplate for
    the Activity, so you can apply tint and effects


    Let’s add an ID parameter set to `backgroundImage` and add in those required `layout_width`
    and `layout_height` parameters and set them to the `match_parent` constant so
    the `ImageView` container fills the `RelativeLayout` container.


    You will notice (if you press CRTL-S or File ➤ Save ) that Eclipse will flag your
    code with a wavy yellow underline because it wants `contentDescription` parameters
    for all `ImageView` classes and subclasses (such as `ImageButton`), so copy and
    paste the `android:contentDescription` parameter from the other `ImageView` into
    this one to solve that particular problem.


    Finally, you’ll need to add the reference to the digital image asset itself, so
    add an `ImageView` `android:src="@drawable/cloudsky"` parameter in order to reference
    your digital image. These parameters set up the basic plate for your background
    image and are shown in Figure [8-1](#A978-1-4302-5786-8_8_Chapter.html#Fig1).


    Now, let’s use a `Run As ➤ Android Application` work process, and take a look
    at the revised UI design, and make sure it is the same as it was before you started.
    As you can see on the left side of Figure [8-2](#A978-1-4302-5786-8_8_Chapter.html#Fig2),
    Android is scaling your source image asset using the `FIT_CENTER` `ScaleType`
    constant, so you are seeing the default white background color of the `RelativeLayout`
    container.


    ![A978-1-4302-5786-8_8_Fig2_HTML.jpg](A978-1-4302-5786-8_8_Fig2_HTML.jpg)


    **Figure 8-2.** Testing your new `ImageView` settings in the Nexus One emulator
    before and after tint and `scaleType`


    You are seeing here that the `android:src` parameter uses a `FIT_CENTER` and an
    `android:background` parameter uses a `FIT_XY` `ScaleType` algorithm constant,
    which is what you really want in this particular application (or UI Design scenario).
    So you need to fix this before you start your color corrections.


    You can either use the `android:background` parameter to hold your image asset,
    which would involve changing your `android:src` to an `android:background`, or
    you can add an `android:scaleType="fitXY"` to override the `fitCenter` that is
    being used currently. Since you are learning about these `ImageView` specific
    parameters, and not about parameters that are inherited (like `background`) from
    the `View` Superclass, you’ll go ahead and add in a `ScaleType` parameter, and
    set it to the `fitXY` scaling constant, as shown in Figure [8-3](#A978-1-4302-5786-8_8_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_8_Fig3_HTML.jpg](A978-1-4302-5786-8_8_Fig3_HTML.jpg)


    **Figure 8-3.** Adding parameters to lighten the image by 31.25% and scale to
    fit the parent container to match [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html)


    Now that you’ve resolved the scale issue, it’s time to use the `android:tint`
    parameter to do some color correction on the source image using the `ImageView`
    container’s properties (attributes).


    The way to control the amount of tinting that overlays your source image is by
    using an alpha channel to adjust the level (or the transparency) of the tint color,
    which in this case is white, or in hexadecimal value, `#FFFFFF`. Adding a white
    color value will invoke a uniform lightening effect across all of the pixels in
    your source image, just like the lightening algorithm in GIMP 2.8.6 or Photoshop
    CS6 would perform for you.


    You’ll specify a 31.25% lightening of the image by using a level 4 (or 44) value
    in Hexadecimal, as 4 is 5, and 5/16ths is 31.25% of 16/16ths (100%). So your ARGB
    value, which you would need to specify inside this `android:tint` parameter, is
    `#44FFFFFF` or a 31.25% application of white to the image.


    As you can see on the right side of Figure [8-2](#A978-1-4302-5786-8_8_Chapter.html#Fig2),
    the completed application of your `android:scaleType` and `android:tint` parameters
    has your image scaling properly, is looking 100% more realistic, and the shadows
    are now visible.


    One last thing I wanted to cover before moving on is that a number of the digital
    imaging special effects that we are going to be using in this book do not render
    accurately, or at all, in the `Graphical Layout Editor` tab in Eclipse ADT, as
    you can see in Figure [8-4](#A978-1-4302-5786-8_8_Chapter.html#Fig4) in the pale
    yellow warning area.


    ![A978-1-4302-5786-8_8_Fig4_HTML.jpg](A978-1-4302-5786-8_8_Fig4_HTML.jpg)


    **Figure 8-4.** Errors in `Graphical Layout` tab (see yellow area) advise that
    shadows and PorterDuff require an emulator


    The reason for this is that the code needed to render shadows and blending modes
    would have to be added into Eclipse ADT for the GLE module, and that is a significant
    amount of work and code, so for now, you will need to use the `Run As ➤ Android
    Application` work process to test or review your code.'
