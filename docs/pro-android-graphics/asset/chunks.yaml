- fmt: '# Wallace Jackson


    Wallace Jackson has been writing for vanguard multimedia publications about his
    work in new media content development since the advent of `Multimedia Producer
    Magazine` more than two decades ago, when he wrote about computer processor architectures
    for the magazine centerfold (a removable "mini-issue" insert) distributed at `SIGGRAPH`.


    Since then, Wallace has written for numerous publications regarding his content
    production work in interactive 3D and new media advertising campaign design. He
    has written for industry trades such as `3D Artist`, `Desktop Publishers Journal`,
    `CrossMedia Magazine`, `Kiosk Magazine`, `Digital Signage Magazine`, and `AVvideo
    Magazine`.


    Wallace Jackson was a `COBOL` and `RPGII` programmer in his early teens, and later
    he coded applications using `Java`, `JavaScript`, and `HTML5`. Wallace has written
    several popular application programming books on `Java` and `Android` development
    for Apress (Springer) over the past few years.


    Wallace Jackson is currently the CEO of `Mind Taffy Design`, a multimedia content
    production and digital campaign design and development agency in Northern Santa
    Barbara County, located halfway between their clientele in Silicon Valley and
    Hollywood, Irvine, and San Diego. Over the past two decades, `Mind Taffy Design`
    has created `i3D` digital new media content deliverables using leading open source
    technologies such as `PDF`, `HTML5`, `WebGL`, `Java`, `JavaFX`, and `Android`
    for many of the top branded manufacturers in the world, including Sony, Samsung,
    IBM, Epson, Nokia, Tyco, Sun, KDS, Micron, CTX, EIZO, TEAC, SGI, and Mitsubishi.


    Wallace Jackson received his undergraduate degree in Business Economics from the
    University of California at Los Angeles (UCLA), and his graduate degree in MIS
    Design and Implementation from the University of Southern California (USC). His
    post-graduate degree in Marketing Strategy is also from USC, where he completed
    the USC Graduate Entrepreneurship Program.


    ## About the Technical Reviewer


    Michael Thomas has worked in software development for over 20 years as an individual
    contributor, team lead, program manager, and Vice President of Engineering. Michael
    has over 10 years experience working with mobile devices. His current focus is
    in the medical sector using mobile devices to accelerate information transfer
    between patients and health care providers.


    ## Acknowledgments


    I would like to acknowledge all of the fantastic editors and their support staff
    at Apress who worked so very long and hard on this book, making it the ultimate
    all-around `Pro Android Graphics` book.


    Tom Welsh, for his work as the Lead Editor on the book, and for his vast experience
    and invaluable guidance during the process of making the book leading-edge.


    Katie Sullivan, for her work as the Coordinating Editor on the book, and for her
    unwavering diligence in making sure I either hit my writing deadlines, or even
    surpassed them.


    Mary Behr, for her work as the Copy Editor on this graphics book, and for her
    attention to detail and to conforming the text to the current Apress writing standards.


    Michael Thomas, for his work as the Technical Reviewer on this book, and for making
    sure I don’t make any mistakes because code with mistakes does not run properly,
    if at all, unless they are very lucky mistakes, which is quite rare in computer
    programming, but when it happens, it’s beautiful....


    And finally Steve Anglin, Acquisitions Editor, for acquiring me as an author for
    Apress and Springer.'
