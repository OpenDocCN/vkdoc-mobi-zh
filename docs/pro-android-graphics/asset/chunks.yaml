- fmt: '# Android UI 布局容器设计


    ## 导航抽屉模式


    应用功能区域之间的导航 UI 设计应使用导航抽屉模式（`Navigation Drawer`）。正如本章后续内容及本书后续章节所述，`DrawerLayout`
    容器可以以一种炫酷的方式提供对顶级应用导航图标的访问。


    ## `SlidingPaneLayout` 容器


    与本章稍后将要介绍的 `LinearLayout` 容器类似，`SlidingPaneLayout` 容器支持为其任何子视图使用权重布局参数 `android:layout_weight`。它利用此参数设置来确定在屏幕宽度测量完成后如何划分剩余空间。在该布局容器中，`android:layout_weight`
    参数值仅适用于宽度。


    当视图不重叠时，`android:layout_weight` 参数的行为与 `LinearLayout` 中相同。当窗格重叠时，可滑动窗格上的权重表示该窗格需要在其关闭状态下填充可用空间。而被覆盖窗格上的权重则表示该窗格应调整大小，以适配所有可用容器宽度，但须保留一个窄条区域，供用户抓取可滑动视图并将其拉回关闭状态。


    在 Android 开发者网站将该布局列为完全实现（而非实验性）之前，你可能需要考虑使用其他布局容器，或者准备好重新编码你的 UI 设计，以防 Android
    决定将该布局容器从 API 中移除。


    接下来，我们将介绍最常用的布局容器之一：**相对布局（`RelativeLayout`）容器**。它允许使用单个父布局容器标签 `<RelativeLayout>`
    来组装复杂的 UI 设计，该标签包含子标签 UI 组件及其相对定位参数。


    ## Android `RelativeLayout` 类：设计相对布局


    如果在“新建 Android 应用”系列对话框中选择空白应用模板，则会使用 `RelativeLayout` 类型作为布局容器。正如本书第一部分创建空 Android
    应用启动文件集时所展示的那样。


    Android `RelativeLayout` 是一个 `ViewGroup` 类，它将其子视图对象（组件）渲染在相对于彼此的位置上。本书前面提到过，Android
    ADT IDE 会查看 UI 组件所在的父布局容器，然后弹出一个参数列表（该列表通过在任何 UI 或布局容器标签内输入 `android:` 来调用）。你还记得当你在
    `RelativeLayout` 容器类型内时参数列表有多长吗？这预示着 `RelativeLayout` 参数和常量所提供的强大功能——实际上有数十个之多。


    `RelativeLayout` 容器中某个给定视图对象的位置可以指定为相对于同级元素。有二十多个常量可用于指定相对位置，包括：

    - `ABOVE`

    - `BELOW`

    - `ALIGN_LEFT`

    - `ALIGN_RIGHT`

    - `ALIGN_BASELINE`

    - `START_OF`

    - `END_OF`

    - `ALIGN_PARENT_TOP`

    - `ALIGN_PARENT_BOTTOM`

    - `ALIGN_END`

    - `CENTER_VERTICAL`

    - `CENTER_HORIZONTAL`


    以及另外十个常量。如需查看完整的 `RelativeLayout` 常量列表，请访问 Android 开发者网站：

    [`http://developer.android.com/reference/android/widget/RelativeLayout.html`](http://developer.android.com/reference/android/widget/RelativeLayout.html)


    `RelativeLayout` 容器通过为包含在 `<RelativeLayout>` 父标签内的组件标签提供大量布局参数，从而允许在一个布局容器中实现复杂的
    UI 设计。因此，该 UI 布局容器在开发者中广受欢迎，用于设计复杂的 UI 界面，因为它可以减少嵌套的 `ViewGroup`（布局容器），从而保持布局容器层级结构的扁平化。减少任何类型的嵌套结构（尤其是其他布局容器结构）可以节省系统内存，从而提升应用性能并降低处理器开销。


    如果你发现自己被迫使用多个嵌套的 `LinearLayout` 容器来实现 UI 设计目标，那么可以考虑用一个 `RelativeLayout` 容器替换多个
    `LinearLayout` 容器。然后，利用 `RelativeLayout` 兼容的参数和常量，在单个 `RelativeLayout` 容器中实现原本需要多个（嵌套层级）UI
    布局容器才能达到的相同布局效果。


    由于本书将大量使用 `RelativeLayout` 容器，关于此 XML 标签（无意双关）的其余学习内容，将留待本书后续章节的手动 XML 标记和 Java
    编码实践来展示。


    ## Android `LinearLayout` 类：设计线性布局


    Android `LinearLayout` 类支持在 Java 中实例化使用 `<LinearLayout>` XML 标签样式化的布局容器。该布局容器用于定义简单的水平或垂直
    UI 布局，例如 Activity 屏幕顶部的按钮行，或屏幕左侧的 UI 图像图标列。


    `LinearLayout` 容器始终将其子视图排列成单列或单行。行（水平方向常量）或列（垂直方向常量）的方向可以通过在 Java 代码中调用 `.setOrientation()`
    方法来设置，也可以在设置和配置 `LinearLayout` 容器的 XML 标记中设置。


    如果未特别设置，默认的方向参数为水平，因为大多数线性布局横跨屏幕顶部或底部。如果需要垂直 UI 布局，请使用 `android:orientation` 参数并将其设置为
    `vertical` 常量。


    `LinearLayout` 标签的所有子视图将垂直堆叠（垂直方向）或水平依次排列（水平方向）。垂直 `LinearLayout` 中每行只有一个 UI 元素（子标签），无论该
    UI 元素有多宽——但如果所有 UI 元素宽度一致，外观会更专业。水平 `LinearLayout` 始终只有一行高，其高度由最高 UI 元素（子标签）的高度（含内边距）决定。


    `LinearLayout` 会考虑其 UI 元素（子标签）之间的任何外边距，以及任何子标签的重力对齐（居中、右对齐或左对齐）。你还可以通过 `.setGravity()`
    方法指定 `LinearLayout` 的重力属性。设置布局重力将决定该布局中所有子元素的对齐方式（居中、左对齐、右对齐等）。


    你还可以通过设置权重参数，指定某些子元素扩展以填充布局中的剩余空间。`LinearLayout` 的权重指示当布局容器未填满其父容器时，应如何分配额外空间（如果有的话）。如果
    `LinearLayout` 是 Activity 的主要布局容器，那么父容器通常是屏幕。


    设置权重时：

    - 如果不希望布局容器被拉伸，请使用 `0`。

    - 如果想在所有 UI 元素（子标签）之间按比例分配额外像素，请使用 `0.0` 到 `1.0` 之间的小数。


    如果需要比单行或单列 UI 元素更复杂的布局，请考虑使用 `RelativeLayout` 容器，因为它的内存效率高于嵌套多个 `LinearLayout`
    容器。'
  raw: 'UI designs for navigating amongst the functional areas of your application
    should use the navigation drawer pattern. As you will see later on in this chapter,
    as well as later on in the book, this DrawerLayout container can be used to provide
    access to top-level app navigation icons in a cool way.


    Similar to the LinearLayout container, which we will be covering a little bit
    later in the chapter, the SlidingPaneLayout container will support the use of
    weight layout parameter `android:layout_weight` for any of its child views. It
    uses this parameter setting to determine how to divide remaining space after the
    screen width measurement is complete. The parameter value for android:layout_weight
    only applies to width in this layout container.


    When views do not overlap, the android:layout_weight parameter will behave as
    it would with a LinearLayout. When the panes do overlap, weight on a slideable
    pane indicates that the pane needs to be sized to fill available space in its
    closed state.


    Weight on a pane that is covered indicates that the pane should be resized to
    fit all of the available container width, except for a thin strip that the user
    should use to grab the slideable view and pull it back over into its closed state.


    Until the Android Developer web site lists this layout as fully implemented (not
    experimental), you may want to consider using another layout container or be ready
    to recode your user interface design in the event that Android decides to pull
    this layout container back out of the API.


    Next, we’ll take a look at one of the most used layout containers of them all,
    the Relative Layout container, which allows complex UI designs to be assembled
    using a single parent layout container tag <RelativeLayout> containing the child
    tag UI widgets and parameters that position them relatively to each other.


    ## Android RelativeLayout Class: Designing Relative Layouts


    The Android `RelativeLayout` class is the type of layout container that is utilized
    if you specify the blank application template in the New Android App series of
    dialogs, as we saw in the first part of this book when we created an empty Android
    application bootstrap set of files to work from.


    Android RelativeLayout is a `ViewGroup` class that renders its children View objects
    (widgets) in screen positions that are relative to one another. Earlier in the
    book you learned that the Android ADT IDE will look at the parent layout container
    that your UI widget is contained in, and then bring up a parameter list (which
    you learned is invoked by typing `android:` inside any given UI or layout container
    tag). Do you remember how long the parameter list was when you were inside the
    RelativeLayout container type? This portends the power that is afforded by RelativeLayout
    parameters and constants, of which there are literally dozens.


    The position of a given View object contained in a RelativeLayout container can
    be specified as relative to sibling elements. There are two dozen constants that
    can be utilized for specifying relative positioning, including ABOVE, BELOW, ALIGN_LEFT,
    ALIGH_RIGHT, ALIGN_BASELINE, START_OF, END_OF, ALIGN_PARENT_TOP, ALIGN_PARENT_BOTTOM,
    ALIGN_END, CENTER_VERTICAL, CENTER_HORIZONTAL, and ten others. If you want to
    see the complete list of RelativeLayout constants, visit the Android Developer
    web site via this URL:


    [`http://developer.android.com/reference/android/widget/RelativeLayout.html`](http://developer.android.com/reference/android/widget/RelativeLayout.html)


    The RelativeLayout container allows complex user interface designs in a single
    layout container by providing lots of layout parameters for the widget tags that
    are contained within the <RelativeLayout> parent tag.


    For this reason, this user interface layout container has become popular with
    developers for designing complex user interface designs, because it can eliminate
    nested ViewGroups (layout containers), which keeps a layout container hierarchy
    flat. Less nested structures of any kind, especially other layout container structures,
    can save system memory, which improves application performance and reduces processor
    overhead.


    If you find yourself being forced to utilize multiple nested LinearLayout containers
    in order to achieve your UI design objective, then you may wish to replace the
    many LinearLayout containers with one single RelativeLayout container. You would
    then utilize RelativeLayout compatible parameters and constants within the RelativeLayout
    container in order to achieve the same layout end result that would otherwise
    require using multiple (nested hierarchies) user interface layout containers.


    Since we’ll be leveraging RelativeLayout containers throughout this book, I will
    leave all other learning content relative to this XML tag (no pun intended) to
    the hands-on XML markup and Java coding that we will be doing in the rest of this
    book.


    ## Android LinearLayout Class: Designing Linear Layouts


    The Android LinearLayout class supports an instantiation in Java of layout containers
    styled using the <LinearLayout> XML tag. This layout container is meant to be
    used to define simple horizontal or vertical user interface layouts, such as a
    row of buttons along the top of the Activity screen, or a column of UI image icons
    at the left side of the screen, for instance.


    A LinearLayout container always arranges its children in a single column or in
    a single row. The orientation of the row (the horizontal orientation constant)
    or the column (the vertical orientation constant) can be set by calling the `.setOrientation()`
    method in your Java code, or it can be set in your XML markup that sets up and
    configures your LinearLayout container.


    The default orientation parameter, if you do not set it up specifically, will
    be horizontal, as most linear layouts span across the top or bottom of the screen.
    If you want a vertical UI layout, use an `android:orientation` parameter and set
    it to the `vertical` constant.


    All children of the LinearLayout tag will be stacked on top of each other (in
    vertical orientation) or one after the other (horizontal orientation).


    A vertical LinearLayout will have one UI element (child tag) per row, no matter
    how wide the UI element may be, although it looks more professional if the UI
    elements are all of uniform width. Horizontal LinearLayouts will always be one
    row high, and the height will be determined using the height of the tallest UI
    element (child tag) and will include any padding.


    A LinearLayout will take into account any margins between its UI elements (the
    child tags) and the gravity (center, right, or left) alignment of any of the child
    tags.


    You can also specify your LinearLayout’s gravity using the `.setGravity()` method.
    As you know, specifying the layout gravity will set the alignment (center, left,
    right, etc.) of all of the child elements in that layout.


    You can also specify that certain children grow to fill up any remaining space
    in the layout by setting a weight parameter. The LinearLayout weight indicates
    how much of the extra space (if there is any) in a LinearLayout should be allocated
    to the layout container if it does not fill its parent container. This is usually
    the screen if the LinearLayout is an Activity’s primary layout container.


    To set a weight, use a zero if the layout container is not to be stretched or
    use a decimal number between 0.0 and 1.0 to prorate any of those extra pixels
    amongst all of the UI elements (child tags) within the container.


    If you need something more complex than a single row or column of user interface
    elements, consider using a RelativeLayout container, as it will be more memory
    efficient than nesting multiple LinearLayout containers.'
