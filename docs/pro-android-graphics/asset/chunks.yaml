- fmt: '# Procedural Animation Concepts: Tweens and Interpolators


    The foundation of procedural animation is the concept of the tween, which is short
    for in-between. Back in the old days of cel animation, the senior animators drew
    the primary or key cels (or keyframes if you will), and the junior animators would
    then generate the tween cels to provide smooth motion between the cels that senior
    animators created.


    This in-between cel creation process came to be termed tweening, and it is important
    to note that sometimes procedural animation is called tween animation because
    of this. Because frame animation uses raster technology, and procedural animation
    uses vector technology, you will also see vector animation as a term that is often
    used for procedural animation.


    When tweening became a digital phenomenon, the process turned into what in Math
    class we learned about as `interpolation`. Since now everything is done numerically,
    we supply number values for our key frames and the Android OS does the rest for
    us by using the `Animation` class code to interpolate the tweens (the interim
    frames) automatically, using an interpolator.


    The math for interpolation is fairly straightforward: determine the range, say
    from a starting value of 1 and an ending value of 8, divide it by the resolution
    of tween frames, and each frame becomes some fraction of that range. To generate
    8 interpolated values between 1 and 8, you would have a new value calculated at
    each whole number; to have 16 frames between 1 and 8, you would have newly calculated
    values at 1, 1.5, 2, 2.5, 3, and so on.


    The more interpolated values that are calculated, the higher the resolution and
    the smoother the animation movement provided by this interpolation. On the other
    hand, the more processing power that is used to do these calculations, the less
    processing power that is left over for other functions. Fortunately, Android determines
    (optimizes) this for you, and so all you have to do is to specify start (from)
    and end (to) values.


    However, there is a more complex side to interpolation in Android. The 13 interpolator
    types in Android further allow you to fine-tune the way that your values are interpolated
    over the numeric data range that you provide.


    The interpolation types in Android are provided as predefined `interpolator constants`
    in the Resources, or `R`, area of the operating system. You can see exactly which
    types of interpolators are offered at the following URL:


    [`http://developer.android.com/reference/android/R.interpolator.html`](http://developer.android.com/reference/android/R.interpolator.html)


    There are currently 13 different types of interpolators in Android; look for more
    to be added over time to allow more varied types of movement options for your
    procedural animation. These 13 interpolator constants are actually mathematical
    equations, in the form of Android Java classes that implement them. These interpolate,
    or tween, your values in different ways along your range, providing different
    types of movement during that range.


    You can see the actual Android interpolator classes, which we are about to go
    over in great detail next, and which are based on the `android.animation` package’s
    `TimeInterpolator` class, at the following URL:


    [`http://developer.android.com/reference/android/animation/TimeInterpolator.html`](http://developer.android.com/reference/android/animation/TimeInterpolator.html)


    The type of interpolation (or interpolator) that you learned about earlier is
    called the linear interpolator in Android, because it evenly spaces the values
    out across any specified data range in a linear (even) fashion. However, there
    are another dozen interpolators that change this even spacing between interpolated
    data values in order to create different types of movement, such as bouncing,
    anticipation, or acceleration effects.


    The Android `AccelerateInterpolator` class is the basis of the first three interpolator
    constants, which are `accelerate_cubic`, `accelerate_quad`, and `accelerate_quint`,
    and which provide an ease out motion function that eases the motion out of the
    starting gate (thus accelerating the motion as time goes on, over your specified
    range of data values).


    The Android `DecelerateInterpolator` class is essentially the counterpart of the
    `AccelerateInterpolator` class, and also features the three interpolator constants,
    only this time they are `decelerate_cubic`, `decelerate_quad`, and `decelerate_quint`.
    These provide an ease in motion function that eases the motion into the finish
    line, thus decelerating the motion as time goes on, towards the end of your specified
    range of values.


    The cubic, quadratic, and quintic specifications define the mathematical shapes
    for these acceleration or deceleration curves. As with any of these interpolators,
    you will need to experiment with them in order to ascertain exactly what they
    will do in any given procedural animation scenario.


    There is also an `AccelerateDecelerateInterpolator` class, which provides both
    an acceleration curve at the start of the motion range and a deceleration curve
    at the end of the motion range. Thus this motion type will accelerate slowly out
    of the gate, and slow down at a similar rate, before it reaches its final destination
    (the end of range “to” value).


    The Android `AnticipateInterpolator` class provides a type of motion that will
    act like it is anticipating something, that is, it will start back a little bit
    at the start of the range of motion (imagine how you move, or adjust your body,
    when you think that you are about to get press), and then will fling forward (like
    a reaction) over the remainder of the data range.


    Just as the `AccelerateInterpolator` has an `AccelerateDecelerateInterpolator`
    counterpart, `AnticipateInterpolator` has an `AnticipateOvershootInterpolator`
    class counterpart. This adds an overshoot motion at the end of the range, where
    the motion overshoots its target, and then drifts back to the final range value
    as a correction of that overshoot. If you wanted the overshoot motion feature
    without an anticipation part at the beginning of the range, there is an `OvershootInterpolator`
    that will accomplish this motion effect.


    Remember that all of these different types of interpolators, which you can think
    of as motion curves, are simply trying to mimic the motion that you see in real-world
    scenarios every day by using basic mathematics to apply tween frame interpolation
    along a cubic or quadratic curve of data values.


    Interpolators do an amazing job of controlling motion. You simply need to practice
    using them in order to see which particular interpolator constants you should
    use for any given procedural animation situation.


    There is also a `BounceInterpolator` class that simulates a bouncing object, such
    as a beachball, and this interpolator should be used specifically when you need
    something to bounce off of something else. Finally, there is a `CycleInterpolator`
    class, which mimics cyclical motion by using the sinusoidal mathematical pattern
    with a developer-specified cycling value.


    Next, we will take a closer look at how ranges of values are specified, as well
    as how they can be controlled (skewed) even further using pivot point specifications.
    Once you have all of these advanced procedural animation parameters (controls)
    in your quiver, you will find that you can do just about anything that you can
    imagine using procedural animation in Android.'
