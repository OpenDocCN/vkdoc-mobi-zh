- fmt: "# Summary\n\nIn this ninth chapter, you learned about the Android `ImageButton`\
    \ UI widget and how to use it to implement multi-state graphical buttons using\
    \ XML.\n\nWe started by looking at the `ImageButton` class and how it differs\
    \ from its `Button` UI widget counterpart. You learned that the `ImageView` class\
    \ is used to create the Android `ImageButton` UI widget subclass, and that the\
    \ `android:src` parameter references its source images and `android:background`\
    \ controls the transparency used for compositing it over elements behind it.\n\
    \nNext, we looked at the `ImageButton` States that are used to provide users with\
    \ visual feedback as to which use-state the `ImageButton` is currently in, using\
    \ different images provided by the developer for each of these states.\n\nYou\
    \ learned about the hovered state, and how it only applies to Android devices\
    \ that feature a mouse, and how that state was introduced in API Level 14 probably\
    \ to provide support for the use of Android on Chromebook.\n\nYou learned about\
    \ the pressed state, which shows that the `ImageButton` is being clicked (the\
    \ down part of the click) or touched if on a touchscreen. You learned that the\
    \ pressed state is the equivalent of a mouse-down state on a “normal” PC programming\
    \ environment.\n\nYou learned about the focused state, which shows that your `ImageButton`\
    \ has been released (the up part of the click), and that the `ImageButton` is\
    \ in use (has focus) until another UI element is accessed by the user.\n\nYou\
    \ also learned about the normal state, or the unused `ImageButton` state, which\
    \ is the default. All `ImageButton`s will use this state unless they are being\
    \ used in some way (hovered, pressed, or have focus).\n\nNext, we went through\
    \ how to create the four `ImageButton` states using the GIMP digital imaging software\
    \ package to create a digital image composite document that you could use to export\
    \ four unique but pixel-synchronized image assets that would create a seamless\
    \ multi-state `ImageButton` user experience.\n\nThen we looked at how to implement\
    \ an `ImageButton` into one of your existing layout containers, adding this new\
    \ `<ImageButton>` child tag into one of your existing nested `<LinearLayout>`\
    \ child tags.\n\nNext, we created your `bookmark_states.xml` XML definition file,\
    \ which created the multi-state drawable image asset definition that referenced\
    \ the image assets created earlier in the chapter using GIMP 2.8.6.\n\nIn the\
    \ next chapter, you will learn about the 9-Patch technology, and how to create\
    \ 9-Patch image assets that can scale accurately without regards to aspect ratio.\
    \ 9-Patch technology is also available for HTML5 apps.\n\n# 10. Using 9-Patch\
    \ Imaging Techniques to Create Scalable Imaging Elements\n\n## Abstract\n\nIn\
    \ this tenth chapter, we will take a closer look at the Android `NinePatch` class,\
    \ as well as the `NinePatchDrawable` class, and the Draw 9-patch tool.\n\nSince\
    \ this is a book focused on graphics, and we have now covered Android `ImageView`\
    \ and `ImageButton` classes, which are used to hold and implement an image or\
    \ animation graphics asset, we will start to focus more on graphics-related classes\
    \ within Android OS. The first of these is `NinePatch`.\n\nA `NinePatch` is one\
    \ of Android’s most important graphics design tools when it comes to developing\
    \ image assets that can scale without distortion due to Android device display\
    \ screen aspect ratio or orientation changes.\n\nA `NinePatch` is a resizable\
    \ bitmap whose scaling during resizing operations can be controlled via nine areas\
    \ that we can define in our bitmap image (imagine a tic-tac-toe grid that has\
    \ nine discreet areas).\n\nThe `NinePatch` type of image asset can be used for\
    \ anything from a scalable button background to a UI layout container background\
    \ that will scale to fit different screen resolution densities, aspect ratios,\
    \ and orientations.\n\nThe advantage of a `NinePatchDrawable` object is that developers\
    \ can define a single graphic element (in an example later in the chapter, this\
    \ will be a 20KB `.PNG` file) that can be utilized across many different UI elements,\
    \ including buttons, `ImageButton`s, sliders, backgrounds, and similar items.\n\
    \n## Android NinePatchDrawable: A Foundation for NinePatch\n\nThe Android `NinePatchDrawable`\
    \ class is a subclass of the Android `Drawable` class, and is therefore a part\
    \ of the `android.graphics.drawable` package.\n\nAn import statement references\
    \ `android.graphics.drawable.NinePatchDrawable` as the Android package “path”\
    \ to an Android `NinePatchDrawable` class, which exhibits the following Android\
    \ Java Class hierarchy:\n\n```\njava.lang.Object\n  > android.graphics.drawable.Drawable\n\
    \    > android.graphics.drawable.NinePatchDrawable\n```\n\nThis `NinePatchDrawable`\
    \ class has four Java constructors (methods) for the creation of a `NinePatchDrawable`\
    \ object in Android. Two of the constructors are deprecated, as of Android Version\
    \ 1.6 API Level 4, so do not use the following two constructors to create your\
    \ `NinePatchDrawable` objects:\n\n```\nNinePatchDrawable(Bitmap bitmap, byte[]\
    \ chunk, Rect padding, String srcName) - OR -\nNinePatchDrawable(NinePatch patch)\n\
    ```\n\nNotice that they both access a `NinePatch` image asset directly, without\
    \ using the Android `R` or Resource (`/res/drawable`) area of the OS. This end-run\
    \ around the Android “Resource Bin” is what has been deprecated, not the `NinePatch`\
    \ technology itself. The correct way to access the `NinePatch` asset is by using\
    \ either of the following (non-deprecated) constructor methods:\n\n```\nNinePatchDrawable(Resources\
    \ res, Bitmap bmp, byte[] chunk, Rect padding, String s)\n```\n\nThis constructor\
    \ method creates `NinePatchDrawable` objects using raw `Bitmap` object data for\
    \ the `NinePatch`, setting the initial target density based on the display metrics\
    \ of the resources. This constructor should be primarily utilized for advanced\
    \ `NinePatch` usage via Java code. Since we’re using XML to implement graphics\
    \ design resources up-front, via a static declaration, we will be using the `NinePatch`\
    \ class, which I’ll be covering in the next section. It uses the following much\
    \ simpler constructor method:\n\n```\nNinePatchDrawable(Resources res, NinePatch\
    \ patch)\n```\n\nThis constructor will create the `NinePatchDrawable` asset using\
    \ an existing `NinePatch` asset, which can be found in the `/res/drawable` folder,\
    \ using the correct file naming protocols for `NinePatch` assets. This `NinePatchDrawable`\
    \ Java constructor will automatically analyze and then set an initial target image\
    \ resolution density based on display metrics for the resource itself.\n\nI’ll\
    \ focus on the second way as it is more standardized, straightforward, and much\
    \ faster way to get to the end result that we are looking for here. In the next\
    \ section I’ll go over the `NinePatch` image asset concepts in detail, and then\
    \ I’ll cover the `NinePatch` class itself, and then I will finally get into how\
    \ to create `NinePatchDrawable` image assets. This is done using the Draw 9-patch\
    \ imaging tool that is hidden deep inside the Android SDK folder hierarchy, in\
    \ the `/sdk/tools` folder."
  raw: '## Summary


    In this ninth chapter, you learned about the Android ImageButton UI widget and
    how to use it to implement multi-state graphical buttons using XML.


    We started by looking at the `ImageButton` class and how it differs from its Button
    UI widget counterpart. You learned that the `ImageView` class is used to create
    the Android `ImageButton` UI widget subclass, and that the `android:src` parameter
    references its source images and `android:background` controls the transparency
    used for compositing it over elements behind it.


    Next, we looked at the ImageButton States that are used to provide users with
    visual feedback as to which use-state the ImageButton is currently in, using different
    images provided by the developer for each of these states.


    You learned about the hovered state, and how it only applies to Android devices
    that feature a mouse, and how that state was introduced in API Level 14 probably
    to provide support for the use of Android on Chromebook.


    You learned about the pressed state, which shows that the ImageButton is being
    clicked (the down part of the click) or touched if on a touchscreen. You learned
    that the pressed state is the equivalent of a mouse-down state on a “normal” PC
    programming environment.


    You learned about the focused state, which shows that your ImageButton has been
    released (the up part of the click), and that the ImageButton is in use (has focus)
    until another UI element is accessed by the user.


    You also learned about the normal state, or the unused ImageButton state, which
    is the default. All ImageButtons will use this state unless they are being used
    in some way (hovered, pressed, or have focus).


    Next, we went through how to create the four ImageButton states using the GIMP
    digital imaging software package to create a digital image composite document
    that you could use to export four unique but pixel-synchronized image assets that
    would create a seamless multi-state ImageButton user experience.


    Then we looked at how to implement an ImageButton into one of your existing layout
    containers, adding this new <ImageButton> child tag into one of your existing
    nested <LinearLayout> child tags.


    Next, we created your bookmark_states.xml XML definition file, which created the
    multi-state drawable image asset definition that referenced the image assets created
    earlier in the chapter using GIMP 2.8.6.


    In the next chapter, you will learn about the 9-Patch technology, and how to create
    9-Patch image assets that can scale accurately without regards to aspect ratio.
    9-Patch technology is also available for HTML5 apps.


    # 10. Using 9-Patch Imaging Techniques to Create Scalable Imaging Elements


    Abstract


    In this tenth chapter, we will take a closer look at the Android `NinePatch` class,
    as well as the `NinePatchDrawable` class, and the Draw 9-patch tool.


    In this tenth chapter, we will take a closer look at the Android `NinePatch` class,
    as well as the `NinePatchDrawable` class, and the Draw 9-patch tool.


    Since this is a book focused on graphics, and we have now covered Android ImageView
    and ImageButton classes, which are used to hold and implement an image or animation
    graphics asset, we will start to focus more on graphics-related classes within
    Android OS. The first of these is NinePatch.


    A NinePatch is one of Android’s most important graphics design tools when it comes
    to developing image assets that can scale without distortion due to Android device
    display screen aspect ratio or orientation changes.


    A NinePatch is a resizable bitmap whose scaling during resizing operations can
    be controlled via nine areas that we can define in our bitmap image (imagine a
    tic-tac-toe grid that has nine discreet areas).


    The NinePatch type of image asset can be used for anything from a scalable button
    background to a UI layout container background that will scale to fit different
    screen resolution densities, aspect ratios, and orientations.


    The advantage of a NinePatch Drawable object is that developers can define a single
    graphic element (in an example later in the chapter, this will be a 20KB .PNG
    file) that can be utilized across many different UI elements, including buttons,
    ImageButtons, sliders, backgrounds, and similar items.


    ## Android NinePatchDrawable: A Foundation for NinePatch


    The Android `NinePatchDrawable` class is a subclass of the Android `Drawable`
    class, and is therefore a part of the `android.graphics.drawable` package.


    An import statement references `android.graphics.drawable.NinePatchDrawable` as
    the Android package “path” to an Android NinePatchDrawable class, which exhibits
    the following Android Java Class hierarchy:


    `java.lang.Object`


      `> android.graphics.drawable.Drawable`


        `> android.graphics.drawable.NinePatchDrawable`


    This NinePatchDrawable class has four Java constructors (methods) for the creation
    of a NinePatchDrawable object in Android. Two of the constructors are deprecated,
    as of Android Version 1.6 API Level 4, so do not use the following two constructors
    to create your NinePatchDrawable objects:


    `NinePatchDrawable(Bitmap bitmap, byte[] chunk, Rect padding, String srcName)
    - OR -`


    `NinePatchDrawable(NinePatch patch)`


    Notice that they both access a NinePatch image asset directly, without using the
    Android R or Resource (/res/drawable) area of the OS. This end-run around the
    Android “Resource Bin” is what has been deprecated, not the NinePatch technology
    itself. The correct way to access the NinePatch asset is by using either of the
    following (non-deprecated) constructor methods:


    `NinePatchDrawable(Resources res, Bitmap bmp, byte[] chunk, Rect padding, String
    s)`


    This constructor method creates NinePatchDrawable objects using raw Bitmap object
    data for the NinePatch, setting the initial target density based on the display
    metrics of the resources. This constructor should be primarily utilized for advanced
    NinePatch usage via Java code. Since we’re using XML to implement graphics design
    resources up-front, via a static declaration, we will be using the `NinePatch`
    class, which I’ll be covering in the next section. It uses the following much
    simpler constructor method:


    `NinePatchDrawable(Resources res, NinePatch patch)`


    This constructor will create the NinePatchDrawable asset using an existing NinePatch
    asset, which can be found in the `/res/drawable` folder, using the correct file
    naming protocols for NinePatch assets. This NinePatchDrawable Java constructor
    will automatically analyze and then set an initial target image resolution density
    based on display metrics for the resource itself.


    I’ll focus on the second way as it is more standardized, straightforward, and
    much faster way to get to the end result that we are looking for here. In the
    next section I’ll go over the NinePatch image asset concepts in detail, and then
    I’ll cover the NinePatch class itself, and then I will finally get into how to
    create NinePatchDrawable image assets. This is done using the Draw 9-patch imaging
    tool that is hidden deep inside the Android SDK folder hierarchy, in the /sdk/tools
    folder.'
  trans: "\n# 总结\n\n在第九章中，你学习了 Android `ImageButton` UI 构件，以及如何使用 XML 实现多状态图形按钮。\n\
    \n我们首先研究了 `ImageButton` 类及其与 `Button` UI 构件的区别。你了解到 `ImageView` 类用于创建 Android\
    \ `ImageButton` UI 构件子类，`android:src` 参数引用其源图像，而 `android:background` 则控制用于在其后方元素上进行合成的透明度。\n\
    \n接着，我们研究了用于向用户提供视觉反馈的 `ImageButton` 状态，这些状态表明 `ImageButton` 当前处于何种使用状态，每种状态由开发者提供不同的图像。\n\
    \n你了解了悬停状态，以及它如何仅适用于配备鼠标的 Android 设备；该状态是在 API 级别 14 中引入的，可能是为了支持在 Chromebook\
    \ 上使用 Android。\n\n你了解了按下状态，该状态表示 `ImageButton` 正在被点击（点击的按下部分），或者在触摸屏上被触摸。你了解到在“常规”PC\
    \ 编程环境中，按下状态相当于鼠标按下状态。\n\n你了解了聚焦状态，该状态表示你的 `ImageButton` 已被释放（点击的弹起部分），并且 `ImageButton`\
    \ 正在被使用（拥有焦点），直到用户访问了另一个 UI 元素。\n\n你还了解了正常状态，或称为未使用状态，这是默认状态。所有 `ImageButton`\
    \ 除非以某种方式被使用（悬停、按下或聚焦），否则都将使用此状态。\n\n接下来，我们逐步讲解了如何使用 GIMP 数字成像软件包创建四个 `ImageButton`\
    \ 状态，以创建一份数字图像合成文档，利用该文档可以导出四个独一无二但像素坐标同步的图像资源，从而实现无缝的多状态 `ImageButton` 用户体验。\n\
    \n然后，我们研究了如何将 `ImageButton` 实现到现有的布局容器中，将这个新的 `<ImageButton>` 子标签添加到现有的嵌套 `<LinearLayout>`\
    \ 子标签中。\n\n接着，我们创建了 `bookmark_states.xml` XML 定义文件，该文件创建了多状态可绘制图像资源定义，引用了本章前面使用\
    \ GIMP 2.8.6 创建的图像资源。\n\n在下一章中，你将了解 9-Patch 技术，以及如何创建能够在不考虑宽高比的情况下精确缩放的 9-Patch\
    \ 图像资源。9-Patch 技术同样适用于 HTML5 应用。\n\n# 10. 使用 9-Patch 成像技术创建可扩展成像元素\n\n## 摘要\n\n\
    在第十章中，我们将更深入地研究 Android `NinePatch` 类、`NinePatchDrawable` 类以及 Draw 9-patch 工具。\n\
    \n由于这是一本专注于图形学的书籍，并且我们已经介绍了用于承载和实现图像或动画图形资源的 Android `ImageView` 和 `ImageButton`\
    \ 类，我们将开始更多地关注 Android 操作系统中的图形相关类。其中第一个就是 `NinePatch`。\n\n在开发能够因 Android 设备显示屏宽高比或方向变化而缩放且不失真的图像资源时，`NinePatch`\
    \ 是 Android 最重要的图形设计工具之一。\n\n`NinePatch` 是一种可调整大小的位图，其缩放操作过程中的缩放行为可以通过我们在位图图像中定义的九个区域（想象一个包含九个独立区域的井字网格）来控制。\n\
    \n`NinePatch` 类型的图像资源可用于从可缩放按钮背景到 UI 布局容器背景的任何场景，这些背景将缩放以适应不同的屏幕分辨率密度、宽高比和方向。\n\
    \n`NinePatchDrawable` 对象的优势在于，开发者可以定义一个单一的图形元素（在后面的章节示例中，这将是一个 20KB 的 `.PNG` 文件），该元素可用于许多不同的\
    \ UI 元素，包括按钮、`ImageButton`、滑块、背景以及类似的项目。\n\n## Android NinePatchDrawable：NinePatch\
    \ 的基础\n\nAndroid `NinePatchDrawable` 类是 Android `Drawable` 类的子类，因此属于 `android.graphics.drawable`\
    \ 包的一部分。\n\n一条 import 语句将 `android.graphics.drawable.NinePatchDrawable` 作为 Android\
    \ 包“路径”来引用 Android `NinePatchDrawable` 类，该类展示了以下 Android Java 类层次结构：\n\n```\n\
    java.lang.Object\n  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.NinePatchDrawable\n\
    ```\n\n`NinePatchDrawable` 类有四个用于在 Android 中创建 `NinePatchDrawable` 对象的 Java 构造函数（方法）。其中两个构造函数自\
    \ Android 1.6 API 级别 4 起已被弃用，因此不要使用以下两个构造函数来创建你的 `NinePatchDrawable` 对象：\n\n```\n\
    NinePatchDrawable(Bitmap bitmap, byte[] chunk, Rect padding, String srcName) -\
    \ 或 -\nNinePatchDrawable(NinePatch patch)\n```\n\n请注意，它们都直接访问 `NinePatch` 图像资源，而未通过\
    \ Android 的 `R` 或资源（`/res/drawable`）区域。这种绕过 Android“资源仓”的方式已被弃用，而非 `NinePatch`\
    \ 技术本身。访问 `NinePatch` 资源的正确方法是使用以下任一（未弃用的）构造函数方法：\n\n```\nNinePatchDrawable(Resources\
    \ res, Bitmap bmp, byte[] chunk, Rect padding, String s)\n```\n\n此构造函数方法使用 `NinePatch`\
    \ 的原始 `Bitmap` 对象数据创建 `NinePatchDrawable` 对象，并根据资源的显示度量设置初始目标密度。此构造函数主要应通过 Java\
    \ 代码用于高级 `NinePatch` 用法。由于我们通过静态声明使用 XML 预先实现图形设计资源，因此我们将使用 `NinePatch` 类，我将在下一节中介绍它。它使用以下简单得多的构造函数方法：\n\
    \n```\nNinePatchDrawable(Resources res, NinePatch patch)\n```\n\n此构造函数将使用现有的 `NinePatch`\
    \ 资源创建 `NinePatchDrawable` 资源，该资源可在 `/res/drawable` 文件夹中找到，并需使用 `NinePatch` 资源正确的文件命名协议。此\
    \ `NinePatchDrawable` Java 构造函数将自动分析并基于资源自身的显示度量设置初始目标图像分辨率密度。\n\n我将重点介绍第二种方式，因为它更加标准化、直接，并且可以更快地得到我们想要的结果。在下一节中，我将详细介绍\
    \ `NinePatch` 图像资源的概念，然后介绍 `NinePatch` 类本身，最后讲解如何创建 `NinePatchDrawable` 图像资源。这需要使用隐藏在\
    \ Android SDK 文件夹层次结构深处的 Draw 9-patch 成像工具，该工具位于 `/sdk/tools` 文件夹中。\n"
- fmt: '# NinePatch Graphics Assets: A 9-Patch Concepts Overview


    The `NinePatchDrawable` object, also commonly referred to by using a number, that
    is, “9-patch,” allows Android developers to develop a special type of morphable
    PNG8, PNG24, or PNG32 graphics asset. A 9-patch is able to apply different scaling
    factors to different areas within a given digital image.


    So a 9-patch image asset is essentially an axis-independent, scalable `.PNG` bitmap
    image that uses nine distinct quadrants within the image asset to support scaling,
    or more accurately, pixel tiling, of any size and shape a `View` object or layout
    container might be.


    Due to its built-in `NinePatchDrawable` class (and `NinePatch` class) support,
    the Android OS can automatically resize a developer’s 9-patch image assets to
    accommodate the contents of any `View` object inside of which a developer has
    placed a 9-patch image asset as its background image asset reference. This is
    accomplished via algorithms that exist inside the Android `NinePatch` class and
    Android `NinePatchDrawable` class, as well as inside the Draw 9-patch software
    utility found in the `/sdk/tools` folder in the Android SDK.


    A good example of a use for a NinePatch image asset would be on the inside of
    the background image placeholder (the `android:background` XML parameter) that
    is commonly used with the standard Android `Button` object UI widget. `Button`
    UI widgets almost always need to stretch in at least one dimension, and often
    in both X and Y dimensions, in order to accommodate text strings of various lengths,
    or different font types, or different font sizes.


    This `NinePatchDrawable` object references Android’s recommended PNG digital image
    format, and it also includes an extra one-pixel-wide border. There are three different
    “flavors” of PNG images that are supported in the Android OS: indexed color (8-bit)
    PNG8, truecolor (24-bit or RGB) PNG24, and a truecolor with alpha channel (32-bit
    or ARGB) PNG32 image file format.


    To be recognized by Android as a 9-patch image asset, a `NinePatchDrawable` asset
    needs to be saved with the file name extension of `.9.png` and saved into the
    `/res/drawable/` directory of the appropriate Android project.


    The one-pixel border I mentioned earlier will not be visible to our end users,
    and instead will be utilized by Android `NinePatch` class algorithms to define
    which areas of our image asset will be scalable and which areas of our image asset
    will be static (fixed and not scaled, just moved).


    We will be able to indicate the scalable sections of our 9-patch imaging asset
    by drawing one (or more) single-pixel-wide black line segments within the left
    and the top portions of this one pixel border.


    All of the other border pixels not utilized to define a scalable section of our
    9-patch image will need to use the completely transparent color value (`#00000000`)
    or a white (`#FFFFFF`) color value.


    We could even define both by using the `#00FFFFFF` hexadecimal color value (transparent
    white), if we want to be really tricky. Fortunately the Draw 9-patch tool that
    we will be looking at later will do all of this for us!


    Interestingly, we may define any number of these scalable sections as we wish
    using these single-pixel black line segments. It is important to note that this
    relative sizing of each of these scalable sections to each other will always remain
    “ratio consistent.” What this means is that the largest scalable section will
    always remain our largest scalable section, at each scale, no matter how large
    or how small this scale might become.


    After we define our scalable (exterior) sections for the 9-patch asset, we then
    define (optional) drawable areas (interior) for the 9-patch image that are called
    “padding areas.” Padding drawable areas tell Android where it can place the elements
    that are defined inside the `View` object or the `ViewGroup` (View subclass) layout
    container object.


    This padding feature is included so that our `NinePatchDrawable` asset does not
    get overwritten by other application assets, or obscured visually. The padding
    definitions are created in the same way that scalable sections are defined, by
    using one-pixel black “padding lines” that are drawn onto the right and bottom
    one-pixel border areas of the 9-patch asset definition.


    If a `View` object sets a NinePatch as its background, and it then specifies a
    `View` object text attribute, for instance, it will stretch this attribute so
    that all of the text attributes fit inside this area, which we have designated
    using our right and bottom one-pixel black border definitions.


    It is important to note that if the 9-patch padding area definition lines are
    not specifically defined, the Android `NinePatch` algorithm will instead use our
    left and top scaling definition line segments to define the image asset padding
    (drawable) areas.


    To summarize the differences between the use of the one-pixel black border lines,
    the left and top lines define which pixels in our image assets are allowed to
    be replicated in order to stretch or scale the 9-patch imagery. The bottom and
    the right one-pixel black border lines define our drawable areas on the inside
    (interior) of our 9-patch image asset where the `View` object contents (attributes
    or asset references) are allowed to overwrite.


    # The Android NinePatch Class: Creating a NinePatch Asset


    A `NinePatch` class is a direct subclass of the Java `java.lang.Object` master
    class, which means that it is used to define the NinePatch Java Object and was
    coded uniquely to be its own Android asset. It is not based on another class hierarchy
    within the Android OS. As you might have guessed, it lives inside the `android.graphics`
    package. Its class hierarchy is as follows:


    `java.lang.Object`


      `> android.graphics.NinePatch`


    An object constructed by the Android `NinePatch` class allows the Android OS to
    scale and render this 9-patch image asset using nine discreet sections.


    Another great analogy is that of a compass. The four corners of a 9-patch image,
    at NE, NW, SE, and SW are unscaled, whereas the four edges, N, E, S or W, are
    scaled along one axis. The middle of the compass (9-patch image) is scaled along
    both of its axes, just like a normal image would be scaled in Android.


    Optimally, the middle of our 9-patch source PNG image assets will be 100% transparent,
    as yours will be later in this chapter when you get into using the Draw 9-patch
    software tool. This is so that our 9-patch can provide a scalable image framework
    around an open, rectangular content area for our `View` object to use for the
    content that it styles and references.


    This design approach will allow developers to create custom graphics that will
    scale seamlessly in the way that they define them.


    When content is added to our `View` object inside a 9-patch image asset, and this
    content exceeds the internal padding limitations of the 9-patch graphic asset,
    it can be easily adjusted with zero asset distortion.


    The Draw 9-Patch tool, provided with the Android SDK in the `/tools` folder, gives
    developers a simple, useful tool for creating NinePatch image assets using a WYSIWYG
    (What You See Is What You Get) graphics editor.


    I’m going to cover the use of the Draw 9-patch software in detail in the next
    section of this chapter, so let’s get started!'
