    现在你将完成所有这些工作，以便在继续本章后续内容时，能够测试你的新 Activity UI 界面。


    既然你已经创建了 `BookmarkActivity.java` 类且代码无误，接下来合乎逻辑的一步是，使用 `<activity>` 子标签将该 Activity
    子类添加到 `AndroidManifest.xml` 文件中，这样 Android 操作系统就能识别并使用它。


    右键点击 `AndroidManifest.xml` 文件，打开它，然后像上一章为目录 Activity 子类添加标签那样，添加 `<activity>`
    标签。完成后的代码看起来会和它上方现有的 `ContentsActivity` 标签非常相似，只是会引用不同的类名和 `<string>` 标签常量，如图
    7-4 所示。你需要在 `strings.xml` 文件中创建这些 `<string>` 常量，然后就可以开始设计 `RelativeLayout` 容器布局了。


    ![A978-1-4302-5786-8_7_Fig4_HTML.jpg](img/A978-1-4302-5786-8_7_Fig4_HTML.jpg)


    **图 7-4.** 添加 `BookmarkActivity` 标签，并使用 `<activity>` 标签在 `AndroidManifest.xml`
    文件中进行引用


    接下来，点击 Eclipse 中央编辑区的 `strings.xml` 选项卡；如果该文件未打开，请进入 `/res/values` 文件夹，右键点击 `strings.xml`
    文件名并选择打开，或者使用 F3 键打开该文件。


    复制并粘贴最后一个 `<string>` 标签常量，然后在下方粘贴两次。这样做的目的是添加 AndroidManifest 中引用的 `bmu_title`（标签）字符串常量，以及接下来在
    `RelativeLayout` 容器 XML 定义中创建小部件时需要用到的 TextView 字符串常量。


    使用以下两行 XML 标记，将名为 `bmu_title` 的 `<string>` 标签的文本值设置为“BOOKMARKING UTILITY”，将名为
    `bookmark_text` 的 `<string>` 标签的文本值设置为“Current Bookmark Page”：


    ```

    <string name="bmu_title">BOOKMARKING UTILITY</string>

    <string name="bookmark_text">Current Bookmark Page</string>

    ```


    一旦 `<string>` 标签 XML 常量就位，如图 7-5 所示，你就可以继续操作 `MainActivity.java` 类，通过引用新的 `BookmarkActivity`
    类来让第二个菜单项可操作。这个新类现在已在 Eclipse 以及 `AndroidManifest.xml` 文件中设置完成。


    ![A978-1-4302-5786-8_7_Fig5_HTML.jpg](img/A978-1-4302-5786-8_7_Fig5_HTML.jpg)


    **图 7-5.** 为清单文件中的 Activity 界面标签和 `TextView` 中的界面标题添加 `<string>` 标签常量


    点击 Eclipse 顶部的 `MainActivity.java` 选项卡；它可能隐藏在 `>> Number`（未显示的打开选项卡）菜单下，在图 7-5
    中显示为 `>>1`。如果 `MainActivity.java` 当前未打开编辑，请进入 `/src` 文件夹找到它，右键点击并打开，或者先选中（高亮）它，然后使用
    F3 功能键。


    在 `onOptionsItemSelected()` 方法的第二个 switch 语句 case 代码块中，将引用从 `ContentsActivity.class`
    改为新的 `BookmarkActivity.class`。这样，你的选项菜单现在就会启动刚刚配置好的 Bookmarking Utility Activity
    界面。


    现在，你已经完成了所有必要步骤，可以访问 `RelativeLayout` 容器了。接下来你将开始向其中填充本章将要介绍的基本 UI 小部件。


    你需要能够访问 `BookmarkActivity.java` 类，该类从第二个选项菜单项调用 `activity_bookmark.xml` 中的 `RelativeLayout`
    容器定义，如图 7-6 所示。因此，你不仅需要在 `MainActivity` 类的 Java 代码中调用该 Activity 子类，还需要在 `AndroidManifest`
    XML 文件中对其进行设置。


    最后，为了保持代码整洁，你需要在 `/res/values/strings.xml` 文件中添加两个新的 `<string>` 标签常量，并通过创建新的 `activity_bookmark.xml`
    文件来创建（当前为空的）XML 定义容器。


    接下来，你将在 `RelativeLayout` 容器中添加一个 `TextView` UI 小部件，然后在 Nexus One 模拟器中测试所有内容，确保一切连接正确，并且
    `TextView` UI 小部件子标签的参数能产生你期望的结果。


    ![A978-1-4302-5786-8_7_Fig6_HTML.jpg](img/A978-1-4302-5786-8_7_Fig6_HTML.jpg)


    **图 7-6.** 在 `MainActivity` 的选项菜单中添加对新创建的 `BookmarkActivity.class` 的引用


    现在，你已经准备好将 `TextView` UI 元素添加到 `activity_bookmark.xml` 屏幕布局定义文件的 `RelativeLayout`
    中，以便在 Bookmarking Utility 用户界面设计的顶部添加一个书签页面标签。


    点击 Eclipse 顶部的 `activity_bookmark.xml` 选项卡，在 `RelativeLayout` 起始标签后添加一行缩进的空格，然后输入
    `<` 字符调出辅助对话框，双击 `TextView` 子标签，将其添加到 `RelativeLayout` 容器中，如图 7-7 所示。接下来，你将添加参数来配置你的
    TextView。


    在 `<TextView` 起始标签后，输入 `android` 和冒号，调出辅助对话框。然后找到 `android:id` 参数并双击添加。在引号内添加
    `@+id/currentBookmarkText` 来标识该 `TextView`，以便之后可以使用 Java 代码更改其值。最后，确保为该标签添加结束符号
    `/>`（在 ID 参数之后）。


    使用相同的工作流程，添加必需的 `android:layout_width` 和 `android:layout_height` 参数，并将它们都设置为 `wrap_content`，因为你希望文本对象作为一个独立的实体浮动在你的设计之上。


    ![A978-1-4302-5786-8_7_Fig7_HTML.jpg](img/A978-1-4302-5786-8_7_Fig7_HTML.jpg)


    **图 7-7.** 添加 `TextView` 标签以及布局、文本内容、ID 和水平居中的基本参数


    为了给你的 TextView UI 元素添加内容（文本值），再次使用 `android:` 工作流程；这次，找到 `android:text` 参数，并将其值设置为之前使用引号内的
    `@string/bookmark_text` 引用路径创建的 `<string>` 常量。


    最后，使用辅助对话框找到 `android:layout_centerHorizontal` 参数，或者手动输入，并将其设置为 `true`，这样你的 `TextView`
    就会自动在布局容器顶部居中。现在，你可以选择 **Run As** ➤ **Android Application**，查看你的 `TextView`，如图
    7-8 所示。


    ![A978-1-4302-5786-8_7_Fig8_HTML.jpg](img/A978-1-4302-5786-8_7_Fig8_HTML.jpg)


    **图 7-8.** 在 Nexus One 模拟器中测试 `activity_bookmark.xml` 中的 `RelativeLayout` 和 `TextView`


    接下来，让我们添加一些更高级的参数，将你的文本从屏幕顶部向下移动一些，使其变大，改为等宽字体，并添加一些投影特效，就像你在 Photoshop CS6 或
    GIMP 2.8.6 中设计 UI 一样。为了节省空间，我将每行使用两个参数，如图 7-9 所示，因为很快你就要向这个 `RelativeLayout` 容器中添加更多标签了。


    要将 `TextView` 从屏幕顶部向下推开，你将使用 `android:marginTop` 参数，并将其值设置为 `10dip`（或 `10dp`）。

