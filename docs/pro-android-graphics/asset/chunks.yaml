    # Android 中的图形：`ImageView` 类的起源


    Android 的 `ImageView` 类是 `View` 父类的一个子类，而 `View` 本身又是主类 `java.lang.Object` 的子类。`View`
    类有自己的包，即 `android.view` 包，但 `ImageView` 则被置于另一个独立的用于 UI 组件的 Android 包中，即 `android.widget`
    包。


    `android.widget` 包包含了 `ImageView` 类，以及所有其他继承自 `View` 类的 UI 元素类。如果你想确切了解该包中包含哪些组件，可以在以下
    Android 开发者网站 URL 中找到相关信息：


    [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


    `ImageView` 类用于显示我们作为开发者希望提供的、应用程序中需要自定义图像区域的任何受支持的数字化图像格式。这包括应用图标、布局容器的背景图像、UI
    自定义按钮等等。


    `ImageView` 类可以从多种来源获取图像，例如内部应用资源（`/res/drawable` 文件夹）或内容提供者（如 HTTP）。`ImageView`
    类将根据源图像资源计算其 UI 容器尺寸，以便与任何布局容器配合使用。由于这是一本关于图形的书籍，在大多数情况下，我们将对我们使用的每个布局容器使用数字化图像。


    `ImageView` 提供了多种显示选项，例如自定义缩放和 RGB 值重新着色，这两者都将在本章中详细探讨。


    有趣的是，`ImageView` 类只有极少的子类，这对于像 Android 这样以像素为核心的 OS 来说，与人们的预期恰恰相反。我们最常关注的 `ImageView`
    子类是 `ImageButton` 类，但还有一个更偏向特定领域（如果你的应用在使用 QuickContacts）的 `QuickContactBadge`
    子类。


    `ImageView` 也仅有一个已知的间接子类，名为 `ZoomButton`，它是 `ImageButton` 的子类。`ZoomButton` 用于通过缩放因子和缩放速度来放大和缩小基于数字化图像的按钮资源。


    如果你想更详细地研究 `ImageView` 类，请访问其在 Android 开发者网站上的页面，网址如下：


    [`http://developer.android.com/reference/android/widget/ImageView.html`](http://developer.android.com/reference/android/widget/ImageView.html)


    然而，`ImageView` 类确实包含一个单一的 `嵌套` 类，名为 `ScaleType`。这个 `ImageView.ScaleType` 嵌套类允许我们定义如何缩放数字化图像资源以适配其
    `View`。


    这使得 `ScaleType` 足够重要，值得在本章中单独设立一节。那么，让我们来看看这个 `ImageView.ScaleType` 类是如何工作的，并了解它为我们提供的所有强大的图像缩放常量。


    ## `ImageView.ScaleType` 嵌套类：缩放控制


    Android 的 `ImageView` 有一个名为 `ScaleType` 的嵌套类，它包含了用于确定如何缩放 `ImageView` 对象的缩放常量及相关算法。这个
    `ImageView.ScaleType` 类是 Java `Enum` 类的一个子类，而 `Enum` 类又是主类 `java.lang.Object`
    的子类。它们之间精确的父类 ➤ 子类关系如下：


    ```

    java.lang.Object

    > java.lang.Enum<E extends java.lang.Enum<E>>

    > android.widget.ImageView.ScaleType

    ```


    正如你所料，`ImageView.ScaleType` 类是 `android.widget` 包的一部分，如果你的 Java 代码中使用它，其导入语句将引用路径
    `android.widget.ImageView.ScaleType`。


    `ScaleType` 类是 `java.lang.Enum` 的子类的原因在于，它使用这个 Java 枚举类型类来为不同的缩放算法类型或缩放选项创建数值常量，缩放算法利用这些常量来确定需要实施哪种类型的缩放。


    这些数值常量也被赋予了字符串（文本）常量，以便于记忆和在代码中引用。在本章的这一节中，我们将详细讨论每一个常量。


    Android 中有 71 个 `java.lang.Enum` 的直接子类，因为它被用来提供这些数值常量，这可能是 Java 编程中的一种常见做法。如果你想了解更多关于这个
    `Enum` 类的信息，可以在 Android 开发者网站上找到它的页面，网址如下：


    [`http://developer.android.com/reference/java/lang/Enum.html`](http://developer.android.com/reference/java/lang/Enum.html)


    如果你曾为 `ImageView` UI 元素的 `android:layout_width` 和 `android:layout_height` 参数使用过
    `wrap_content` 常量，那么使用 `ScaleType` 缩放类型常量之一就相当于缩放数字化图像资源本身。这是因为你的 `ImageView`
    引用并包含了你的源图像，而 `wrap_content` 常量告诉 Android 将 `ImageView` UI “容器”精确地（逐像素）贴合在图像资源周围，这意味着
    `ImageView` 容器会采用图像资源的物理规格。如果通过这个嵌套类指定了某个 `ScaleType` 常量，那么图像资源（通过 `ImageView`）将根据所指定的缩放类型（`ScaleType`）常量，按给定的显示屏幕尺寸、密度和宽高比进行缩放。


    `ScaleType` 在确定如何根据不同的屏幕宽高比缩放图像时最为有用，也就是说，可以保持宽高比锁定，以免图像失真；或者，在另一个极端，允许图像缩放操作在缩放时忽略宽高比，就像我们在第
    7 章中对 1000 像素方形图像所做的那样。


    `ScaleType` 类还有一种缩放类型（常量），允许我们将数字化图像资源中的每个像素与用户 Android 设备物理硬件显示屏的每个像素一一对应。这就是
    `CENTER` 常量。


    如果图像资源中的像素不足，或者更确切地说，与屏幕分辨率匹配的最接近分辨率密度的图像资源中的像素不足，我们的图像将在显示屏中完美居中。这样，图像资源中的每个像素都使用了物理显示屏的一个像素。这正是我喜欢的一种数字化图像类！


    让我们逐一详细讨论这八种不同类型的缩放算法常量。我将用表 8-1 概述它们，以便它们集中在一个位置，然后我们再来逐一讨论。表中每个缩放常量后面括号中的数字代表该常量所表示的实际整数值。


    **表 8-1.** `ImageView.ScaleType` 图像缩放常量及其如何缩放数字化图像资源的概要

    '
- fmt: '| 缩放常量 | 对数字图像资产的缩放算法结果 |

    | --- | --- |

    | `CENTER` (5) | 锁定宽高比的缩放，使图像像素与物理硬件像素匹配，同时将图像居中。 |

    | `CENTER_CROP` (6) | 锁定宽高比的缩放算法，将图像在X和Y两个维度上适配到视图内部。 |

    | `CENTER_INSIDE` (7) | 锁定宽高比的缩放算法，将图像在X或Y至少一个维度上适配到视图内部。 |

    | `FIT_CENTER` (3) | 缩放图像以适配视图内部，同时保持图像宽高比。至少一个轴（X或Y）将精确匹配视图。图像也会在视图内居中。 |

    | `FIT_START` (2) | 缩放图像以适配视图内部，同时保持图像宽高比。至少一个轴（X或Y）将精确匹配视图。图像将从视图左上角开始放置。 |

    | `FIT_END` (4) | 缩放图像以适配视图内部，同时保持图像宽高比。至少一个轴（X或Y）将精确匹配视图。图像将从视图右下角开始放置。 |

    | `FIT_XY` (1) | 缩放图像的X和Y维度以匹配视图的尺寸，此操作不会保持图像的宽高比。 |

    | `MATRIX` (0) | 使用提供的`Matrix`类缩放图像。可通过`setImageMatrix`方法提供矩阵。`Matrix`类可用于对图像应用旋转等变换。
    |


    `CENTER_CROP`算法在显示区域中将图像居中，缩放操作锁定宽高比，适配较短的边（X或Y），并裁剪图像较长的边。


    数字成像中的裁剪是一种操作，只要图像分辨率能被2整除，就会从每一边裁剪一定数量的像素（在此情况下居中裁剪操作）。


    `CENTER_INSIDE`算法在显示区域中将图像居中，缩放操作锁定宽高比。此缩放算法适配较长的边（无论是X还是Y），并在图像尺寸的较短边上填充等量的背景色像素（位于两侧或顶部/底部）。如果图像中的像素小于（少于）物理硬件像素，该算法与`CENTER`缩放常量的行为相同。


    `FIT_CENTER`算法也在显示区域中将图像居中，缩放操作锁定宽高比。此缩放算法与`CENTER_INSIDE`类似，区别在于：如果图像像素少于显示器，该算法会对较长的边（无论X或Y）进行上采样，并在图像尺寸的较短边上填充等量的背景色像素（位于两侧或顶部/底部）。


    `FIT_START`与`FIT_CENTER`算法相同，只是结果不平铺居中，而是定位在视图的`(0,0)`原点处，即左上角——在数字成像术语中通常称为视图容器的原点。因此它适配到图像数组的起点（Start），故得其名。


    `FIT_END`是`FIT_START`所用算法的逆操作：它不将结果定位在左上角`(0,0)`，而是从最后一个（END）像素开始，向前处理。视图END（最后一个或最终）像素的坐标本质上总是视图的X、Y分辨率规格，因此`FIT_END`常量将从该END位置（即视图容器的右下角）开始显示，并向前朝向视图中心。因此`FIT_END`常量会适配到图像数组的末尾，故得其名。


    `FIT_XY`算法会解除宽高比锁定，将图像适配到视图尺寸，这可能会导致一些失真，使用时需谨慎。话虽如此，某些图像（例如我们在[第7章](#A978-1-4302-5786-8_7_Chapter.html)中使用的图像）并不容易产生失真，因此这个缩放常量可以巧妙运用，特别是在图像合成场景以及某些纹理和摄影图像背景中。


    最后，`MATRIX`算法允许你通过调用`.setImageMatrix()`方法，将`Matrix`类变换（旋转、缩放、倾斜等）的输出赋给图像。`Matrix`类可用于对图像应用旋转、缩放和倾斜等变换，以在视图对象内实现特殊效果。本质上，此选项允许你用自己的自定义缩放和变换算法替代Android
    OS为你提供的其他七种算法。


    这些缩放常量也可以通过XML标记中支持`android:scaleType`参数的任何标签的参数进行设置。例如，如果你想使用`FIT_START`常量，你可以使用`android:scaleType="fitStart"`参数来实现效果。


    需要注意的是，XML中的`ScaleType`常量使用驼峰命名法，因此`CENTER_CROP`为`centerCrop`，`CENTER_INSIDE`为`centerInside`，`FIT_XY`为`fitXY`，`FIT_CENTER`为`fitCenter`，依此类推。'
  raw: '| Scaling Constant | Scaling Algorithm Result on the Digital Image Asset |

    | --- | --- |

    | CENTER (5) | Aspect Ratio Locked Scaling, which matches the image’s pixels to
    the physical hardware’s pixels while also centering the image. |

    | CENTER_CROP (6) | Aspect Ratio Locked Scaling Algorithm, which fits an image
    inside the View for both of that image’s X and Y dimensions. |

    | CENTER_INSIDE (7) | Aspect Ratio Locked Scaling Algorithm, which fits an image
    inside the View for at least one of the X or Y image dimensions. |

    | FIT_CENTER (3) | Scales an image to fit inside a View while maintaining image’s
    aspect ratio. At least one (X or Y) axis will exactly match the View. The image
    will also be centered inside the View. |

    | FIT_START (2) | Scales an image to fit inside a View while maintaining image’s
    aspect ratio. At least one (X or Y) axis will exactly match the View. The image
    will originate from the View upper-left corner. |

    | FIT_END (4) | Scales an image to fit inside a View while maintaining image’s
    aspect ratio. At least one (X or Y) axis will exactly match the View. The image
    will originate from the View lower-right corner. |

    | FIT_XY (1) | Scales an image’s X and Y dimensions to match the View dimension,
    which will not maintain the image’s aspect ratio |

    | MATRIX (0) | Scales an image using a supplied Matrix class. The matrix can be
    supplied using the setImageMatrix method. A Matrix class can be used to apply
    transformations such as rotations to an image. |


    The CENTER_CROP algorithm centers the image in the display with the aspect ratio
    locked for the scaling operation, and fits the shorter side (X or Y) and crops
    the longer side of the image.


    Cropping in digital imaging is an operation that truncates each side of an image
    by a certain number of pixels (centering the cropping operation, in this case)
    as long as your image resolution is divisible by two.


    The CENTER_INSIDE algorithm centers the image inside the display, with the aspect
    ratio locked for the scaling operation. This scaling algorithm fits the longer
    side (whichever, X or Y) and pads the shorter side of the image dimension with
    an equal amount of background colored pixels on either side or on the top/bottom.
    If the pixels in the image are smaller than (fewer than or lesser than) the physical
    hardware pixels, this algorithm does the same thing as the CENTER scaling constant.


    The FIT_CENTER algorithm also centers the image inside the display, with the aspect
    ratio locked for the scaling operation. This scaling algorithm is similar to CENTER_INSIDE,
    except that if the image has fewer pixels than the display, this algorithm will
    upsample to fit the longer side (whichever X or Y) and pad the short side of the
    image dimension with an equal amount of background colored pixels on either side
    or on the top/bottom.


    The FIT_START is the same algorithm as the FIT_CENTER, except that instead of
    centering the result, it locates it at the 0,0 origin of the View, which is the
    upper-left corner, commonly known as the origin of a View container in digital
    imaging jargon. So it Fits to the Start (origin) of the Image’s Array, hence its
    name.


    The FIT_END is the inverse of the algorithm used for FIT_START, so instead of
    locating the result at the top left (0,0), it will locate it starting with the
    last (END) pixel and work backwards. The coordinates of the View END (last or
    final) pixel would essentially always be the image’s X,Y resolution specification
    for the View, and so the FIT_END constant will display starting at that END location,
    which is the bottom-right corner of the View container, and work backwards towards
    the center of the View. Thus a FIT_END constant will Fit to the End of the Image’s
    Array; hence its name.


    The FIT_XY algorithm is the one that unlocks aspect ratio and will fit the image
    to the size of the View, which may cause some distortion, so be careful with this
    one. That said, there are images, such as the one we used in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html),
    that are not nearly as prone to distortion, so this scaling constant can be used
    cleverly, especially in image compositing scenarios and with certain textures
    and photographic image backgrounds.


    Finally, the MATRIX algorithm allows you to assign the output of a Matrix class
    transformation (Rotate, Scale, Skew, etc.) using a `.setImageMatrix()` method
    call. The Matrix class can be used to apply transformations such as rotations,
    scaled and skewed to an image, to achieve special effects within the View object.
    Essentially this option will allow you to substitute your own custom scaling and
    transformational algorithms in place of these other seven, which have generously
    been provided for you by the Android OS.


    These scaling constants can also be set using tag parameters in your XML markup
    for any tag that supports the `android:scaleType` parameter. So, for instance,
    if you wanted to use the FIT_START constant, you would use the `android:scaleType="fitStart"`
    parameter in order to achieve this effect.


    It is important to note that the ScaleType constants in XML use CamelCase, so
    CENTER_CROP would be centerCrop, CENTER_INSIDE would be centerInside, FIT_XY would
    be fitXY, FIT_CENTER would be fitCenter, and so on.'
