  trans: '

    # 使用 AdjustViewBounds 及其与 ScaleType 的关系


    有一个可用于 `ImageView` 对象的参数或属性，叫做 `AdjustViewBounds`，它接受一个布尔值（true 或 false）。在 XML
    中，这是 `android:adjustViewBounds` 参数；在 Java 中，则是调用 `.setAdjustViewBounds()` 方法。


    如果你希望 `ImageView` 对象调整其容器边界，以保持所引用的数字图像资源的宽高比，那么请将此布尔标志的值设为 true。


    如果你希望 `ImageView` 对象调整其边界以适配其父布局容器的宽高比，那么你应该将布尔标志设为 false。如果你将 `layout_width`
    和 `layout_height` 参数的值设置为 `match_parent`，那么父布局很可能就是 Android 设备的物理显示屏。false 是默认值，因此实际上你永远不需要在
    `ImageView` 的 XML 标记中添加 `android:adjustViewBounds="false"` 参数。


    使用 false 值更明显的原因是在应用的 Java 代码中通过 `.setAdjustViewBounds()` 方法来切换开关（或者更准确地说，切换 true/false
    开关）。


    因此，如果你已经为 `ImageView` 的 XML 参数定义使用了 `android:adjustViewBounds="true"`，并且稍后希望告诉
    Android 解除宽高比锁定，按比例缩放以适应容器尺寸（假设你使用了 `match_parent`），则可以通过以下 Java 代码，基于你的 `ImageView`
    对象名称调用 `ImageView.setAdjustViewBounds()` 方法：


    ```

    myImageViewObjectName.setAdjustViewBounds(false);

    ```


    接下来，我想概述一下关于将上一节讨论的 `android:scaleType` 与本节介绍的 `android:adjustViewBounds` 参数结合使用时的一些注意事项。当你的
    `ImageView` 对象从 `ImageView` 类调用其构造方法时，该构造方法会先检查你的 XML 文件并设置 `android:adjustViewBounds`
    参数，然后才会检查并设置你的 `android:scaleType` 参数的常量值。


    当你将 `AdjustViewBounds` 设置为 true 时，构造方法还会将 `ImageView` 对象的 `ScaleType` 设置为 `FIT_CENTER`。


    出于这个原因，即使你将 `android:scaleType` 参数设置为其他常量值，并且该参数在你的 `ImageView` 标签的参数列表中位于 `android:adjustViewBounds`
    之后，你的 `ScaleType` 常量（如果不是 `FIT_CENTER`）也会完全覆盖 `android:adjustViewBounds="true"`
    参数。请记住这一点，以避免出现意外的缩放结果。


    这是因为问题的关键不在于 `ImageView` 标签 XML 定义中参数的顺序，而在于 `ImageView` 类从 XML 定义中获取并实现这些参数的顺序，而这由
    `ImageView.java` 类本身的 Java 代码决定。


    ## MaxWidth 和 MaxHeight：控制 AdjustViewBounds


    就像 `ScaleType` 和 `AdjustViewBounds` 参数之间存在关系一样，`android:maxWidth` 和 `android:maxHeight`
    参数与 `ImageView` 对象类型的 `AdjustViewBounds` 参数设置之间也存在类似的关系。


    `android:maxWidth` 是一个可选参数，当你希望为 `ImageView` 对象指定最大宽度时可以使用。`android:maxWidth`
    参数设置的数据值需要使用尺寸单位限定符，例如 DIP、DP、SP、IN、PX 或 MM。


    因此，你的 `maxWidth` 参数会指定一个浮点数，并附加一个单位指示常量，例如 `120.0dip`。


    `ImageView` 可用的单位指示符包括：PX 或 px，代表像素；DP、dp、DIP 或 dip，代表密度无关像素；SP 或 sp，代表根据首选字体大小缩放的像素，通常用于在
    `TextView` 参数中指定字体大小；IN 或 in，代表英寸；MM 或 mm，代表毫米。


    完全相同的规则、常量和单位指示符也适用于你的 `android:maxHeight` 参数，只是它们会应用于 `ImageView` 对象的另一个维度。


    因此，`maxWidth` 和 `maxHeight` 的注意事项是：要使这两个参数正常工作，你的 `ImageView` 的 `AdjustViewBounds`
    属性必须设置为 true。请注意，这反过来意味着你的 `ImageView` 的 `ScaleType` 必须设置为 `FIT_CENTER`。


    你在本章前一节中了解到，如果在 XML `ImageView` 定义中设置了除 `FIT_CENTER` 之外的 `ScaleType` 常量，`AdjustViewBounds`
    将不会起作用。这个注意事项同样适用于 `maxWidth` 和 `maxHeight`，因此如果你尝试将 `maxWidth` 和 `maxHeight`
    参数与 `ScaleType` 一起使用，但它无法正常工作，那么你现在知道原因了。


    ## 在 ImageView 中设置基准线并控制对齐方式


    基准线的概念更适用于 `TextView`，因为基准线对齐常用于根据文本字体的底边来对齐元素。然而，`ImageView` 也通过两个不同的参数支持这一概念：`android:baseline`
    和 `android:baselineAlignBottom`。


    术语“基准线”指的是任何 `View` 子类对象（如 `ImageButton`、`ImageView`、`TextView` 以及类似的 UI 元素或小部件）底部的一条假想线。当你设置一个基准线参数时，你是在为
    Android 操作系统提供一个基准线的位置，以便在其父布局容器标签使用 `alignBaseline` 参数时引用该对象。


    `android:baseline` 参数允许开发者在 `View` 对象内部设置基准线的偏移量。这个参数或许应该被称为 `baselineOffset`
    才更清楚，特别是因为还有一个 `android:baselineAlignBottom` 参数，我们接下来会讲到。


    `BaselineAlignBottom` 属性的作用是设置一个标志，告诉 Android 操作系统将 `ImageView` 中图像资源的底边作为其基准线对齐设置。对于数字图像而言，这通常就是你想做的。因此，如果你在包含
    `ImageView` UI 元素的 UI 布局容器中使用其他 `layout_alignBaseline` 类型的参数时，没有得到你期望的图像对齐效果，请尝试将此
    `android:baselineAlignBottom` 参数设置为 true。

    '
- fmt: '## Using the `CropToPadding` Method to Crop Your ImageView


    Another useful `ImageView` parameter is the `android:cropToPadding` attribute,
    which allows you to invoke a digital image crop operation to your digital image
    asset by using XML markup or Java code.


    If you remember, in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html) you used digital
    image cropping as an integral part of your work process for achieving your drop
    shadow special effect. You did this by using the GIMP 2.8.6 Canvas Size (Crop)
    command.


    If being able to crop the image asset in your `ImageView` seems like it is a trivial
    capability in and of itself, then consider its value within a more complex work
    process, one that is made possible by using XML and Java code within your graphics
    design application.


    The way that you utilize this attribute is clearly evident within its name, `CropToPadding`.
    You use your `android:padding` parameters to set up your crop operation, and then
    you set your `android:cropToPadding=“true”` parameter to invoke the crop operation.


    So, to crop evenly around an image, use the `android:padding` parameter with a
    DIP value, or to crop a different amount on different sides of the image, use
    `android:paddingTop` or `android:paddingLeft` or `android:paddingBottom` or `android:paddingRight`.


    If you have the background image set up in your layout container, what this will
    do is to let that image show through where the cropped portion of the `ImageView`
    is (was), so this can be used for compositing or special effects purposes as well.
    This is especially relevant when you animate the padding values using Java code
    by attaching them to interactive elements of your application, or even animate
    them using predefined programming logic.


    Next, we’ll take a closer look at changing the colors (tint) in your image asset,
    and using the `PorterDuff` class to invoke Android’s blending modes.


    ## Tinting an ImageView and Color Blending Using `PorterDuff`


    The last of the parameters for the `ImageView` class that are not inherited from
    the `View` Superclass is the `android:tint` parameter, which allows us to augment
    the color of our image asset using an ARGB hexadecimal color value via an XML
    parameter.


    It is also possible to change the `PorterDuff` class blending mode that is used
    to apply the ARGB color value to the underlying image; however, this is possible
    only if we use a `.setColorFilter()` method, via Java code.


    The `.setColorFilter()` Java method takes two parameters, one defining the color
    value to use and the other specifying the `PorterDuff.Mode` constant and the method
    is called using the following Java code format:


    ```

    .setColorFilter(int color, PorterDuff.Mode mode)

    ```


    If you use the XML parameter `android:tint`, then the `PorterDuff.Mode` that is
    defined as the default is the `SRC_ATOP` pixel-blending mode constant. This, as
    you may have guessed, composites the color value specified onto the TOP of the
    SRC (source) image, which as the parameter specifies will tint it.


    You can lighten or darken your image by tinting using white (`#FFFFFF`) or black
    (`#000000`) color data values, respectively. You will use this technique in a
    little bit to improve the contrast of your drop shadow effect, which you created
    for your bookmarking utility `TextView` and `ImageView` user interface elements
    in the previous chapter.


    The `PorterDuff.Mode` nested class is yet another collection of number value constants,
    similar to `ScaleType`, only with far more constants defined. In this case, the
    constants represent algorithmic pixel compositing blending modes, which are algorithms
    that define how the two different pixel color values should be added (or subtracted,
    or multiplied) together.


    Both GIMP and Photoshop have similar compositing modes that you set using the
    layer palettes within each of those respective digital image software packages.
    It is impressive that this same digital imaging power that is in Photoshop and
    GIMP is also available to Android developers via `PorterDuff`.


    `PorterDuff.Mode` is one of the 71 `Enum` subclasses we talked about earlier;
    this nested class is kept in the `android.graphics` package and is specified via
    an import statement as `android.graphics.PorterDuff.Mode`.


    If you want to peruse all of the blending modes currently available via the Android
    `PorterDuff` class, and see what the actual algorithms are for each of them, you
    can visit the following Android Developer web site URL:


    [`http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html`](http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html)


    Next, you will get into implementing some of these `ImageView` attributes in the
    XML user interface definition that you started working on in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html).
    You’ll lighten your background image using tint and play with aspect ratios!'
