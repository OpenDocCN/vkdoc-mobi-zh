- fmt: "请注意，15 FPS 的数据量是 30 FPS 的一半（即输入到编解码器的数据减少了 100%），并且某些视频内容播放时的效果可能与 30 FPS\
    \ 的内容相同！找出这一点的唯一真正方法是在内容优化（编码）工作流程中尝试这些设置。\n\n下一个对减小数据占用空间最有效的设置是您为编解码器设定的**比特率**。比特率等同于应用的压缩量，因此也等同于视频数据的质量水平。需要注意的是，您可以简单地使用\
    \ 30 FPS、1920 分辨率的高清视频，并指定一个非常低的比特率上限；然而，与先尝试使用较低帧率和分辨率，同时配合更高质量比特率设置的方法相比，前者的效果会逊色不少。\n\
    \n由于每个视频数据流都完全不同，要找出任何一个给定编解码器会对您的视频数据产生什么影响，唯一实际的方法是将数据送入编解码器并查看最终结果。如果使用这些设置（`WebM`或`MPEG4\
    \ AVC`可实现）能够获得紧凑的数据占用空间，我会建议在低端使用 `512 KBPS` 或 `768 KBPS`，中端使用 `1.5 MBPS` 到 `2.0\
    \ MBPS`，高端使用 `2.5 MBPS` 到 `3.5 MBPS`。\n\n下一个在获取更小数据占用空间方面最有效的设置是编解码器用于采样数字视频的**关键帧**数量。视频通过查看一个帧，然后仅编码接下来几帧中的变化（或偏移）来实现压缩，这样就不必对视频数据流中的每一帧都进行编码。这就是为什么“说话头像”视频的编码效果会优于每一帧中每个像素都在移动的视频（例如使用快速摇摄或快速缩放）。\n\
    \n关键帧是编解码器中的一个设置，它强制编解码器每隔一段时间对视频数据资产进行一次全新的采样。通常关键帧有一个自动设置，允许编解码器决定采样多少个关键帧，以及一个手动设置，允许您指定每隔多少帧进行一次关键帧采样，通常是每秒一定次数，或者在整个视频时长内（总帧数）进行一定次数。对于本章后面将要优化的\
    \ `480x800` 数字视频资产，我将设置一个 400 帧的 3D 渲染行星飞越动画，总时长对应的关键帧为每 10 帧一个，即共 40 次。\n\n大多数编解码器通常都有一个**质量**或**锐度**设置（或滑块），用于控制在压缩前应用于视频的模糊量。如果您不知道这个技巧，对图像或视频应用非常轻微的模糊（`0.2`\
    \ 设置）——尽管通常不理想——可以实现更好的压缩，因为图像中的锐利过渡（边缘）比柔和过渡更难编码（需要更多数据来重现）。话虽如此，我建议将质量或锐度滑块保持在\
    \ `80%` 到 `100%` 质量之间，并尝试使用我们在这里讨论的其他变量来减小数据占用空间。\n\n归根结底，为了对任何给定的视频数据资产实现最佳的数据占用空间优化，您需要微调许多不同的变量，并且每个视频（从数学角度）对编解码器来说都是不同的。因此，不存在可以开发出来以实现特定结果的“标准”设置。话虽如此，随着时间的推移，调整各种设置的经验最终会让您对需要更改哪些设置以获得期望结果有所感悟。\n\
    \n## 在 Eclipse ADT 中创建您的 Pro Android Graphics 应用\n\n让我们从[第 1 章](#A978-1-4302-5786-8_1_Chapter.html)结束的地方继续，在您当前桌面打开的全新\
    \ Eclipse ADT 环境中创建新的 Pro Android Graphics 应用程序项目。如果您关闭了 Eclipse，请使用快速启动图标打开它，接受默认工作区（或您指定的工作区），然后打开如图\
    \ 1-16 所示的空白 Eclipse 环境（请参见[第 1 章](#A978-1-4302-5786-8_1_Chapter.html)）。\n\n点击\
    \ Eclipse 左上方**文件**菜单，选择**新建**子菜单，然后从出现的飞出菜单中选择**Android 应用程序项目**菜单选项，如图 [2-1](#A978-1-4302-5786-8_2_Chapter.html#Fig1)\
    \ 所示。我希望您对于最终能够开始为本书中的专业 Android 图形开发体验创建应用程序感到兴奋！\n\n![A978-1-4302-5786-8_2_Fig1_HTML.jpg](A978-1-4302-5786-8_2_Fig1_HTML.jpg)\n\
    \n图 2-1.  \n使用 **文件 ➤ 新建 ➤ Android 应用程序项目** 工作流程创建您的 Pro Android Graphics 应用\n\
    \n选择此项后，您将看到一系列五个**新建 Android 应用程序**对话框中的第一个。这些对话框将引导您完成创建新 Android 应用程序“引导程序”或框架的过程，该框架将包含您的所有资产、类、方法、XML\
    \ 文件等等。\n\n这些对话框会询问您一系列问题，或者更准确地说，允许您从一系列选项中进行选择，并使用数据字段指定信息，以便 Eclipse ADT（本质上是\
    \ Android 操作系统）能够按照 Android 希望实施的标准惯例，以最优方式创建您的应用程序引导代码。正如您在本书中将看到的，Android 对于它希望开发者如何构建或编码其应用程序非常讲究。\n\
    \n第一个对话框（如图 [2-2](#A978-1-4302-5786-8_2_Chapter.html#Fig2) 所示）允许您命名应用程序和 Eclipse\
    \ 中的项目文件夹，并最终为您的项目建立 Java 包名称。\n\n这些是第一个对话框中的前三个字段。让我们将此应用和项目命名为 `GraphicsDesign`，并根据本书名称将您的\
    \ Java 包命名为 `pro.android.graphics`。在本书中，您将开发此应用程序项目，实现令人惊叹的图形处理管线！\n\n接下来的四个下拉菜单选择器允许您选择要开发的\
    \ API 级别和操作系统主题。我接受默认（或建议）的最低所需 SDK：API 级别 8（Android 2.2 Froyo），目标 SDK 为 API 级别\
    \ 17（Android 4.2 Jelly Bean）。我将使用最新的 API 级别 17 进行编译，并使用最现代的 `Holo Light` 操作系统主题。\n\
    \n![A978-1-4302-5786-8_2_Fig2_HTML.jpg](A978-1-4302-5786-8_2_Fig2_HTML.jpg)\n\n\
    图 2-2.  \n命名您的应用程序、项目和包，并选择最低和目标 SDK\n\n完成所有这些非常重要的应用程序规格指定后，点击**下一步 ➤** 按钮，进入**新建\
    \ Android 应用程序**系列对话框中的下一个。\n\n该系列中的第二个对话框是**新建 Android 应用程序配置项目**对话框，如图 [2-3](#A978-1-4302-5786-8_2_Chapter.html#Fig3)\
    \ 所示。此对话框允许您选择有关 Android ADT 如何在 Eclipse 中为您创建项目文件（目录结构）系统、引导 Java 代码和应用程序图标的选项。\n\
    \n尽管您将在本书后面设计自己的自定义应用程序图标（毕竟这是一本关于图形设计的书），但现在您将选择让 Android 为您创建占位应用程序启动器图标的选项，因此请在此对话框的第一个复选框中打上勾。"
  raw: 'Note that 15 FPS is half as much data as 30 FPS (or 100% reduction in data
    going into the codec), and some video content will play (look) the same as 30
    FPS content! The only real way to find this out is to try these settings during
    your content optimization (encoding) work process.


    The next most effective setting for obtaining a smaller data footprint is the
    bit rate that you set for a codec to achieve. Bit rate equates to the amount of
    compression applied, and thus to the quality level of the video data. It is important
    to note that you could simply use 30 FPS, 1920 resolution HD video, and specify
    a very low bit rate ceiling; however, your results would not be as good looking
    as if you first experimented with low frame rates and resolutions using the higher
    (quality) bit rate settings.


    Since each video data stream is completely different, the only real way to find
    out what any given codec is going to do to your video data is to send it through
    the codec and view the end result. I would try to use 512 KBPS or 768 KBPS for
    your low end, 1.5 MBPS to 2.0 MBPS for your middle data, and 2.5 MBPS to 3.5 MBPS
    for your high end, if you can achieve a compact data footprint using these settings,
    which WebM or MPEG4 AVC will provide.


    The next most effective setting in obtaining a smaller data footprint is the number
    of keyframes that the codec uses to sample your digital video. Video gains compression
    by looking at a frame, and then encoding only the changes, or offsets, over the
    next few frames, so that it does not have to encode every single frame in the
    video data stream. This is why a talking head video will encode better than video
    where every pixel moves on every frame (such as video using fast panning or rapid
    zooming).


    A keyframe is a setting in a codec that forces that codec to take a fresh sampling
    of your video data asset every so often. There is usually an auto setting for
    keyframes that allows a codec to decide how many keyframes to sample, as well
    as a manual setting that allows you to specify a keyframe sampling every so often,
    usually a certain number of times per second or a certain number of times over
    the duration of the video (total frames). For the 480x800 digital video asset
    that you will be optimizing later in this chapter, I will set keyframes every
    10 frames for a 400 frame 3D rendering planet fly-through total frames duration,
    or 40 times.


    Most codecs usually have a quality or a sharpness setting, or slider, that controls
    the amount of blur applied to a video before compression. In case you don’t know
    this trick, applying a very slight blur (0.2 setting) to an image or a video,
    which is usually not desirable, can allow for better compression as sharp transitions
    (edges) in an image are harder to encode (take more data to reproduce) than soft
    transitions. That said, I’d keep the quality or sharpness slider between an 80%
    and 100% quality, and try to get your data footprint reduction using the other
    variables that we have discussed here.


    Ultimately there are a number of different variables that you will need to fine-tune
    in order to achieve the best data footprint optimization for any given video data
    asset, and each video will be different (mathematically) to the codec. Thus, there
    are no “standard” settings that can be developed to achieve a given result. That
    said, experience in tweaking various settings will eventually allow you to get
    a feel, over time, as to the settings you need to change to get your desired result.


    ## Creating Your Pro Android Graphics App in Eclipse ADT


    Let’s pick up where we left off in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html)
    and create your new Pro Android Graphics application project in your virgin Eclipse
    ADT environment, which is currently open on your desktop. If you closed Eclipse,
    open it with your quick launch icon, and accept the default workspace (or the
    one you specified) and open up the blank Eclipse environment shown in Figure 1-16,
    way back in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html).


    Click the File menu located at the top-left of Eclipse, and select the New sub-menu,
    and then select the Android Application Project menu option from the fly-out menu
    that will appear, as shown in Figure [2-1](#A978-1-4302-5786-8_2_Chapter.html#Fig1).
    I hope you are excited about finally getting down to creating the application
    for your professional Android graphics development experience during the book!


    ![A978-1-4302-5786-8_2_Fig1_HTML.jpg](A978-1-4302-5786-8_2_Fig1_HTML.jpg)


    Figure 2-1.


    Using File ➤ New ➤ Android Application Project work process to create your Pro
    Android Graphics app


    Once you select this, you’ll see the first in a series of five New Android Application
    dialogs. These dialogs will guide you through the process of creating a new Android
    application “bootstrap,” or framework, that will hold all of your assets and classes
    and methods and XML files and so on.


    The dialogs will ask you a series of questions or, more accurately, allow you
    to select from a series of options, and specify information using data fields,
    so that Eclipse ADT (the Android OS, essentially) can create your application
    bootstrap code in the most optimal fashion using the standard conventions that
    Android wants to see implemented in the way that it wants to see them implemented.
    As you will see during this book, Android is very particular about how it wishes
    developers to structure or code their apps.


    The first dialog, shown in Figure [2-2](#A978-1-4302-5786-8_2_Chapter.html#Fig2),
    allows you to name your application and the project folder in Eclipse, and finally
    to establish the Java package name for your project.


    These are the first three fields in the first dialog. Let’s name this app and
    project GraphicsDesign and name your Java package `pro.android.graphics` after
    the name of this book. Throughout the book, you’ll be developing this application
    project, implementing amazing graphics processing pipelines!


    The next four drop-down menu selectors allow you to select API levels and OS themes
    that you will be developing for. I am accepting the default (or suggested) minimum
    required SDK of API Level 8 (Android 2.2 Froyo) with a target SDK of API Level
    17 (Android 4.2 Jelly Bean). I’m going to compile with the latest API Level 17
    and use the most modern Holo Light OS theme.


    ![A978-1-4302-5786-8_2_Fig2_HTML.jpg](A978-1-4302-5786-8_2_Fig2_HTML.jpg)


    Figure 2-2.


    Naming your application, project, and package, and selecting a minimum and target
    SDK


    Once you have finished specifying all of these super important application specifications,
    click the Next ➤ button to proceed to the next dialog in the New Android Application
    series of dialogs.


    The second dialog in the series is the New Android Application Configure Project
    dialog, as you can see in Figure [2-3](#A978-1-4302-5786-8_2_Chapter.html#Fig3).
    This dialog will allow you to select options regarding how Android ADT will create
    the project file (directory structure) system, bootstrap Java code, and application
    icons for you inside Eclipse.


    Although you will be designing your own custom application icon later in the book
    (after all, this is a book on graphics design), for now you will select the option
    for Android to create a placeholder application launcher icon for you, so place
    your checkmark in the first checkbox in this dialog.'
