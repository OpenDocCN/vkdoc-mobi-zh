  trans: '

    # 切换 LayerDrawable 图像资源：源图与目标图


    现在，让我们尝试交换源图像板和目标图像板的位置，以便在 `.drawBitmap()` 方法中将 `mutableComposite`（一个被转换的 `LayerDrawable`）与
    `paintObject` 一同调用，并将 `mutableForegroundImage` 放入 `.createBitmap()` 方法中。该方法在 `Canvas`
    对象中使用的 `compositeImage Bitmap` 对象上调用，该 `Bitmap` 对象作为其画布（表面）图像数据。这一交换操作如图 12-18
    所示；同时请注意，我们已经注释掉了 `backgroundImage` 和 `mutableBackgroundImage` 这两个 `Bitmap` 对象。


    ![A978-1-4302-5786-8_12_Fig18_HTML.jpg](img/A978-1-4302-5786-8_12_Fig18_HTML.jpg)


    **图 12-18.** 将 `mutableComposite LayerDrawable` 转换后的 `Bitmap` 交换到 `.drawBitmap()`
    方法中


    现在，取消注释你的 `foregroundImage` 和 `mutableForegroundImage` 这两个 `Bitmap` 对象，这样你就可以临时使用你的书签
    PNG 图像作为源图像和目标数字图像合成板。这样做是为了让你能够直观地看到，在你编码的数字图像合成流水线中，对源图像板和目标图像板使用相同图像时会发生什么。


    如图 12-19 所示，其中一个 `bookmark0` PNG 图像数据集被缩放以适配 `ImageView` UI 容器，而另一个完全相同的数据集则显示了原始的、未缩放的源像素，使用图像原点
    `0,0` 并以零缩放进行逐像素显示。


    这让你可以观察到几点。其一，是在同一个合成图像内，对相同的图像同时进行缩放和未缩放处理时的图像缩放质量。对我来说，这个缩放效果看起来相当不错！其二，这展示了使用
    XOR 像素传输模式可以实现的炫酷特殊成像效果，即使使用的是完全相同的图像数据。


    ![A978-1-4302-5786-8_12_Fig19_HTML.jpg](img/A978-1-4302-5786-8_12_Fig19_HTML.jpg)


    **图 12-19.** 在另一个使用了混合与传输模式的 `PorterDuff` 流水线板中测试 `LayerDrawable` 资源


    让我们进行一些实验，同时也了解如何更改你在图像合成与混合流水线中引用的 `LayerDrawable` 对象层。将 `LayerDrawable` 层改为使用背景天空层（名为
    `layerOne`），而不是使用最顶层（该层使用 `bookmark0.png` 作为其图像资源，名为 `layerThree`）。


    ## 更改流水线中使用的 LayerDrawable 层


    回到你的 Java 代码中；在使用 `.findDrawableByLayerId()` 方法的那行代码中，将其参数从 `layerThree` 改为 `layerOne`，如图
    12-20 所示。


    请注意，你没有更改 `.drawBitmap()` 和 `.createBitmap()` 方法调用中引用的 `Bitmap` 对象，因为你希望一次只更改一个变量并观察结果；这次你将
    `LayerDrawable` 层引用从 `layerThree` 更改为 `layerOne`。


    这一更改发生在你的“处理链”中“更靠前”的位置，这表明你可以更改 `LayerDrawable` 对象的层引用，而无需触碰任何图像合成、混合、绘制、绘图、传输、画布或其他核心
    Java 图像处理流水线代码。


    ![A978-1-4302-5786-8_12_Fig20_HTML.jpg](img/A978-1-4302-5786-8_12_Fig20_HTML.jpg)


    **图 12-20.** 使用 `.findDrawableByLayerId()` 将 `LayerDrawable` 转换的 `Drawable` 更改为引用
    `layerOne`


    这将更改你的背景板，该背景板来自 `LayerDrawable`，并在 `imageCanvas` 对象的 `drawBitmap()` 方法调用中被调用。如图
    12-21 所示，特别是在中间渲染的（叠加模式）视图中，整个 `cloudsky.jpg` 日落图现在显示在你合成图像的最终渲染流水线中。这证明了是 `LayerDrawable`
    被缩放了，而 `Bitmap` 合成板图像没有被缩放。


    我发现弄清楚为什么会发生这种情况的最佳方法是，从 `ImageView` 逆向工作（在此情况下是从代码底部向上追溯）。我们知道 `ImageView` 会在
    XML（GLE）和 Java（仿真器和设备中）中对图像进行缩放。因此，让我们从 `ImageView` 开始，逐步向上追溯整个合成渲染流水线。


    渲染代码的最后一行调用了 `.setImageBitmap()` 方法，该方法引用了 `compositeImage Bitmap` 对象。此方法是通过你的
    `porterDuffImageComposite ImageView` 对象调用的。这个 `compositeImage Bitmap` 被连接到（被）`imageCanvas
    Canvas` 对象（引擎）使用。


    然后，这个 `imageCanvas` 对象被用来调用 `.drawBitmap()` 方法，该方法引用了 `mutableComposite Bitmap`
    对象。`mutableComposite Bitmap` 对象引用了合成后的 `Bitmap`，该 `Bitmap` 是从 `BitmapDrawable`
    转换而来的，而 `BitmapDrawable` 又是从 `layerOne Drawable` 对象转换而来的。`layerOne Drawable` 是从
    `layerComposite layerDrawable` 对象转换而来的，该对象通过 `.findDrawableByLayerId()` 方法进行实例化和加载。


    因此，你已经将你的 `ImageView` 源数据向上追溯了你的渲染流水线，回到了 `LayerDrawable` 对象层的源图像，这是有道理的，因为这是正确缩放的图像源，这意味着很可能是流水线末端的
    `ImageView` 对象在缩放这个对象。


    另一方面，你直接从可绘制资源文件夹中引用图像数据的另一个 `Bitmap` 对象，则一定是那个未被缩放的图像板（源）。将 `PorterDuff.Mode`
    改为 `OVERLAY`，并使用 **Run As ➤ Android Application** 的工作流程来生成图 12-21 中间的视图。左侧显示了
    XOR 模式常量。


    ![A978-1-4302-5786-8_12_Fig21_HTML.jpg](img/A978-1-4302-5786-8_12_Fig21_HTML.jpg)


    **图 12-21.** 使用 `layerOne` 并配合混合与传输模式测试 `LayerDrawable` 和 `PorterDuff` 渲染流水线


    接下来，让我们将两个 `Bitmap` 图像引用交换回原来的方式，即将 `mutableComposite` 放在 `Canvas` 对象的 `compositeImage`
    画布图像中，将 `mutableForegroundImage` 放在 `drawBitmap()` 方法调用中，该方法调用将你的 `paintObject
    Paint` 对象应用到 `imageCanvas Canvas` 对象上。


    如图 12-21 右侧所示，交换图像板引用会使书签图像适配，而 `cloudsky` 图像则进行逐像素缩放。因此，你分析的结果似乎与实际情况完全一致。


    顺便提一句，我们使用了 `PorterDuff.Mode.SCREEN` 常量来获得像素混合效果，你可以在图 12-21 中 Nexus One 仿真器右侧的屏幕截图中看到这个效果。


    这个最终图像合成流水线测试场景的最终 Java 代码如图 12-22 所示。


    ![A978-1-4302-5786-8_12_Fig22_HTML.jpg](img/A978-1-4302-5786-8_12_Fig22_HTML.jpg)


    **图 12-22.** 将 `mutableComposite` 切换回 `compositeImage`，并将 `mutableForegroundImage`
    切换回 `drawBitmap()`


    唯一剩下要做的事情就是完全基于 `LayerDrawable` 层实现整个渲染流水线；不过，我想把这个留作给读者的练习，以确保每个人都理解整个流水线及其中的类型转换和引用过程。

