    \ a moment why your `AnimationDrawable` object would not start animating again\
    \ on your second click. The reason is because the `ImageView` is not set to display\
    \ your `AnimationDrawable` object anymore; it is now set to directly reference\
    \ the Frame 1 Drawable image asset, so you will need to move the `.setImageDrawable(frameAnimation)`\
    \ method call inside, and to the top of, your `onClick()` event handling code\
    \ structure."
