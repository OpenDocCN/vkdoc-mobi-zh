- fmt: "# Pixel Blending: Take Image Compositing to the Next Level\n\nLet’s get an\
    \ overview of what pixel blending is, and what blending modes, or transfer modes\
    \ as they are sometimes called, are useful for in graphics design, before we get\
    \ deeper into classes and constructors and nested enum classes and constants and\
    \ all of those fun technical Java constructs that allow us to implement image\
    \ asset blending inside of an Android application.\n\nBy and large, blending or\
    \ transfer modes are most often utilized with image compositing objectives, which\
    \ most digital imaging artisans perform using Adobe Photoshop CS6 or GIMP 2.8.6\
    \ or later professional imaging software.\n\nBlending is used when there is more\
    \ than one compositing layer holding image assets that need to be combined in\
    \ some advanced way to achieve some end result, which could be anything from text\
    \ overlays to special effects.\n\nIt is important to note that as long as you’re\
    \ great at implementing alpha channels, you don’t have to necessarily implement\
    \ blending modes to create an effective image composite, as we’ve already seen\
    \ in previous chapters.\n\nThus, alpha channels are still important to the foundation\
    \ of digital image compositing, and then on top of that blending allows us to\
    \ generate better or more subtle effects. So always start with getting your composite\
    \ clean by fine-tuning the alpha-channel-based compositing, and then add blending\
    \ modes in as the next step in your work process to refine your compositing effect\
    \ and end result.\n\nBlending modes combine images, actually on a pixel-by-pixel\
    \ basis, using algorithms that allow the resulting pixels (images) to be something\
    \ more than a “normal mode” (zero blending modes invoked) image composite. So\
    \ if you had an image where you wanted to add yellow pixels to the red pixels\
    \ in another image layer to create orange pixels in your resulting image composite,\
    \ you would utilize a blending mode to accomplish the desired end result, while\
    \ still being able to keep the original yellow and red source digital image assets\
    \ separate and individually unaffected.\n\nWe will cover the blending modes that\
    \ are currently available in Android in a future section, which covers the class\
    \ in Android that specifically holds enum constants that we can use to call or\
    \ implement these blending algorithms for our own graphics design objectives inside\
    \ our Android apps.\n\nIt is important to again note that blended pixels should\
    \ “obey” your alpha channel, so that they know their place in the image compositing\
    \ hierarchy. The alpha channel should take precedence over blending modes in that\
    \ chain of calculation, which is implemented in an image compositing process,\
    \ whether that is inside Android OS or in Adobe Photoshop CS6 or GIMP 2.8.6 or\
    \ later.\n\nA pixel will only be blended if it has some level of translucency\
    \ defined. 100% transparent pixels, as defined by the alpha channel, are not factored\
    \ into a blending algorithm. Let’s get into how Android implements blending!\n\
    \n## Android’s PorterDuff Class: The Foundation for Blending\n\nThe Android `PorterDuff`\
    \ class is a direct subclass of the `java.lang.Object` master class; it is an\
    \ algorithm class that was essentially scratch-coded, and thus it was not based\
    \ on any other types of superclass functionality currently found within the Android\
    \ OS. The `PorterDuff` class is thus a completely unique class, and provides the\
    \ foundational implementation in Android OS for pixel blending algorithms.\n\n\
    The `PorterDuff` class Java hierarchy is structured as follows:\n\n```\njava.lang.Object\n\
    \  > android.graphics.PorterDuff\n```\n\nAndroid’s `PorterDuff` class is part\
    \ of the `android.graphics` package, and as such, its import statement references\
    \ the `android.graphics.PorterDuff` package import path, as we will see later\
    \ on in the chapter when we write Java code that implements `PorterDuff` blending\
    \ for a variety of purposes.\n\nIn case you are wondering who Porter Duff is,\
    \ it is actually two people who laid the mathematical foundation for blending\
    \ modes and transfer modes. One was named Thomas Porter and the other was named\
    \ Tom Duff, and in 1984, they wrote a white paper detailing the mathematics behind\
    \ pixel blending.\n\nThe Android `PorterDuff` class is deceptively simple, as\
    \ it contains only a single `PorterDuff()` constructor method, as well as just\
    \ one single nested class, which is called the `PorterDuff.Mode` Enum class.\n\
    \nWe will go into these classes and other `PorterDuff` related classes in detail\
    \ over the many sections of this chapter. These `PorterDuff` classes contain all\
    \ of the available blending mode algorithms, functions, transfer constants and\
    \ blending constants that allow developers to implement advanced image compositing\
    \ in their Android application graphics design and UI design.\n\nAs I mentioned,\
    \ blending modes are also sometimes called transfer modes because some of these\
    \ modes don’t really blend any pixel values together. Instead, some of them act\
    \ much like a Boolean set operator (intersections, unions, differences, and so\
    \ on) would function. Thus these modes could be considered transfer modes, as\
    \ they are not really blending pixel values but simply transferring them from\
    \ the source and destination image into the final image compositing result (the\
    \ target or created composite image asset).\n\nFor this reason, some of these\
    \ `PorterDuff` constants act more like transfer mode constants than they do blending\
    \ mode constants. As a result, we’ll go over each of these `PorterDuff` constants\
    \ in fine detail in order to see what capabilities they afford to us as Pro Android\
    \ graphics designers, and if they blend, or transfer, the pixels between our source\
    \ and destination image assets. Once we have gone over the `PorterDuff.Mode` nested\
    \ class, we can start to implement some of this cool digital image blending knowledge!\n\
    \nYou may be wondering how CPU intensive these blending and transfer modes are,\
    \ as well as which of them are more processor intensive. From what I have heard\
    \ from other developers, the blending modes are about three times more processor\
    \ intensive than the transfer modes because they are calculating a new pixel color\
    \ value rather than simply calculating if a pixel needs to be displayed or not."
  raw: '## Pixel Blending: Take Image Compositing to the Next Level


    Let’s get an overview of what pixel blending is, and what blending modes, or transfer
    modes as they are sometimes called, are useful for in graphics design, before
    we get deeper into classes and constructors and nested enum classes and constants
    and all of those fun technical Java constructs that allow us to implement image
    asset blending inside of an Android application.


    By and large, blending or transfer modes are most often utilized with image compositing
    objectives, which most digital imaging artisans perform using Adobe Photoshop
    CS6 or GIMP 2.8.6 or later professional imaging software.


    Blending is used when there is more than one compositing layer holding image assets
    that need to be combined in some advanced way to achieve some end result, which
    could be anything from text overlays to special effects.


    It is important to note that as long as you’re great at implementing alpha channels,
    you don’t have to necessarily implement blending modes to create an effective
    image composite, as we’ve already seen in previous chapters.


    Thus, alpha channels are still important to the foundation of digital image compositing,
    and then on top of that blending allows us to generate better or more subtle effects.
    So always start with getting your composite clean by fine-tuning the alpha-channel-based
    compositing, and then add blending modes in as the next step in your work process
    to refine your compositing effect and end result.


    Blending modes combine images, actually on a pixel-by-pixel basis, using algorithms
    that allow the resulting pixels (images) to be something more than a “normal mode”
    (zero blending modes invoked) image composite. So if you had an image where you
    wanted to add yellow pixels to the red pixels in another image layer to create
    orange pixels in your resulting image composite, you would utilize a blending
    mode to accomplish the desired end result, while still being able to keep the
    original yellow and red source digital image assets separate and individually
    unaffected.


    We will cover the blending modes that are currently available in Android in a
    future section, which covers the class in Android that specifically holds enum
    constants that we can use to call or implement these blending algorithms for our
    own graphics design objectives inside our Android apps.


    It is important to again note that blended pixels should “obey” your alpha channel,
    so that they know their place in the image compositing hierarchy. The alpha channel
    should take precedence over blending modes in that chain of calculation, which
    is implemented in an image compositing process, whether that is inside Android
    OS or in Adobe Photoshop CS6 or GIMP 2.8.6 or later.


    A pixel will only be blended if it has some level of translucency defined. 100%
    transparent pixels, as defined by the alpha channel, are not factored into a blending
    algorithm. Let’s get into how Android implements blending!


    ## Android’s PorterDuff Class: The Foundation for Blending


    The Android PorterDuff class is a direct subclass of the java.lang.Object master
    class; it is an algorithm class that was essentially scratch-coded, and thus it
    was not based on any other types of superclass functionality currently found within
    the Android OS. The PorterDuff class is thus a completely unique class, and provides
    the foundational implementation in Android OS for pixel blending algorithms.


    The PorterDuff class Java hierarchy is structured as follows:


    `java.lang.Object`


      `> android.graphics.PorterDuff`


    Android’s PorterDuff class is part of the android.graphics package, and as such,
    its import statement references the android.graphics.PorterDuff package import
    path, as we will see later on in the chapter when we write Java code that implements
    PorterDuff blending for a variety of purposes.


    In case you are wondering who Porter Duff is, it is actually two people who laid
    the mathematical foundation for blending modes and transfer modes. One was named
    Thomas Porter and the other was named Tom Duff, and in 1984, they wrote a white
    paper detailing the mathematics behind pixel blending.


    The Android PorterDuff class is deceptively simple, as it contains only a single
    PorterDuff() constructor method, as well as just one single nested class, which
    is called the PorterDuff.Mode Enum class.


    We will go into these classes and other PorterDuff related classes in detail over
    the many sections of this chapter. These PorterDuff classes contain all of the
    available blending mode algorithms, functions, transfer constants and blending
    constants that allow developers to implement advanced image compositing in their
    Android application graphics design and UI design.


    As I mentioned, blending modes are also sometimes called transfer modes because
    some of these modes don’t really blend any pixel values together. Instead, some
    of them act much like a Boolean set operator (intersections, unions, differences,
    and so on) would function. Thus these modes could be considered transfer modes,
    as they are not really blending pixel values but simply transferring them from
    the source and destination image into the final image compositing result (the
    target or created composite image asset).


    For this reason, some of these PorterDuff constants act more like transfer mode
    constants than they do blending mode constants. As a result, we’ll go over each
    of these PorterDuff constants in fine detail in order to see what capabilities
    they afford to us as Pro Android graphics designers, and if they blend, or transfer,
    the pixels between our source and destination image assets. Once we have gone
    over the PorterDuff.Mode nested class, we can start to implement some of this
    cool digital image blending knowledge!


    You may be wondering how CPU intensive these blending and transfer modes are,
    as well as which of them are more processor intensive. From what I have heard
    from other developers, the blending modes are about three times more processor
    intensive than the transfer modes because they are calculating a new pixel color
    value rather than simply calculating if a pixel needs to be displayed or not.'
  trans: "\n# 像素混合：将图像合成提升至新高度\n\n在深入探讨类、构造器、嵌套枚举类、常量以及所有那些有趣的技术性 Java 结构（这些结构使我们能够在\
    \ Android 应用内实现图像资源混合）之前，我们先总体了解一下什么是像素混合，以及混合模式（有时也称为传输模式）在图形设计中有何用处。\n\n总的来说，混合模式或传输模式最常用于图像合成目标，大多数数字图像艺术家使用\
    \ Adobe Photoshop CS6 或 GIMP 2.8.6 及更高版本的专业成像软件来执行此操作。\n\n当有多个合成层包含需要以某种高级方式组合以达到最终结果（可能是文本叠加、特效等任何内容）的图像资源时，就会使用混合。\n\
    \n重要的是要注意，只要你擅长实现 Alpha 通道，就不必一定实现混合模式来创建有效的图像合成，正如我们在前几章中已经看到的那样。\n\n因此，Alpha\
    \ 通道对于数字图像合成的基础仍然很重要，在此基础上，混合使我们能够生成更好或更微妙的效果。所以，始终先从通过微调基于 Alpha 通道的合成来使合成图像清晰干净开始，然后在工作流程中下一步添加混合模式，以完善合成效果和最终结果。\n\
    \n混合模式实际上是在逐个像素的基础上，使用算法来组合图像，使得生成的像素（图像）不仅仅是“正常模式”（未调用任何混合模式）下的图像合成。因此，如果你有一张图像，想要将黄色像素添加到另一图像层中的红色像素，以在最终的图像合成中创建橙色像素，那么你会使用混合模式来实现所需的最终结果，同时仍能保持原始的黄色和红色源数字图像资产独立且不受各自影响。\n\
    \n我们将在后续部分介绍 Android 中当前可用的混合模式，其中包括 Android 中专门包含枚举常量的类，我们可以使用这些枚举常量来调用或实现这些混合算法，以满足我们在\
    \ Android 应用中的图形设计目标。\n\n再次强调，混合像素应该“遵循”你的 Alpha 通道，以便它们在图像合成层级中知晓自己的位置。在计算链中，Alpha\
    \ 通道应优先于混合模式，该计算链在图像合成过程中实现，无论是在 Android 操作系统内，还是在 Adobe Photoshop CS6 或 GIMP\
    \ 2.8.6 及更高版本中。\n\n只有当像素具有一定程度的半透明度时，它才会被混合。由 Alpha 通道定义的 100% 透明像素不会被纳入混合算法。让我们深入了解\
    \ Android 如何实现混合！\n\n## Android 的 PorterDuff 类：混合的基础\n\nAndroid 的 `PorterDuff`\
    \ 类是 `java.lang.Object` 主类的直接子类；它是一个本质上是从头编写的算法类，因此它并非基于目前在 Android 操作系统中发现的任何其他类型的超类功能。因此，`PorterDuff`\
    \ 类是一个完全独特的类，并为 Android 操作系统中的像素混合算法提供了基础实现。\n\n`PorterDuff` 类的 Java 层次结构如下所示：\n\
    \n```\njava.lang.Object\n  > android.graphics.PorterDuff\n```\n\nAndroid 的 `PorterDuff`\
    \ 类是 `android.graphics` 包的一部分，因此，其导入语句引用了 `android.graphics.PorterDuff` 包导入路径，正如我们稍后在本章中编写实现用于各种目的的\
    \ `PorterDuff` 混合的 Java 代码时会看到的那样。\n\n如果你想知道 Porter Duff 是谁，实际上是两个人，他们为混合模式和传输模式奠定了数学基础。一位名叫\
    \ Thomas Porter，另一位名叫 Tom Duff，他们在 1984 年撰写了一份白皮书，详细描述了像素混合背后的数学原理。\n\nAndroid\
    \ 的 `PorterDuff` 类看似简单，因为它只包含一个 `PorterDuff()` 构造器方法，以及一个名为 `PorterDuff.Mode`\
    \ 枚举类的单一嵌套类。\n\n我们将在本章的多个部分中详细探讨这些类以及其他与 `PorterDuff` 相关的类。这些 `PorterDuff` 类包含了所有可用的混合模式算法、函数、传输常量和混合常量，使开发人员能够在其\
    \ Android 应用的图形设计和 UI 设计中实现高级图像合成。\n\n正如我提到的，混合模式有时也被称为传输模式，因为其中一些模式并非真正将像素值混合在一起。相反，其中一些模式的作用更像是布尔集合运算符（交集、并集、差集等）。因此，这些模式可以被视为传输模式，因为它们实际上并未混合像素值，而只是将像素从源图像和目标图像传输到最终的图像合成结果（目标或创建的合成图像资源）中。\n\
    \n出于这个原因，一些 `PorterDuff` 常量更像是传输模式常量，而不是混合模式常量。因此，我们将详细探讨每个 `PorterDuff` 常量，以便了解它们作为专业\
    \ Android 图形设计师能为*我们*提供哪些能力，以及它们是在源和目标图像资源之间混合像素，还是传输像素。一旦我们探讨完 `PorterDuff.Mode`\
    \ 嵌套类，我们就可以开始应用这些酷炫的数字图像混合知识了！\n\n你可能想知道这些混合和传输模式对 CPU 的消耗程度，以及哪些模式对处理器消耗更大。从我听到的其他开发者反映的情况来看，混合模式对处理器的消耗大约是传输模式的三倍，因为它们要计算一个新的像素颜色值，而不仅仅是计算是否需要显示一个像素。\n"
- fmt: '# The PorterDuff.Mode Class: Android Blending Constants


    Android’s `PorterDuff.Mode` class is a direct subclass of the `java.lang.Enum`
    class, which is a subclass of the `java.lang.Object` master class, and it is therefore
    an Enumerator class designed to hold Enum constants, so it works hand-in-hand
    with the `PorterDuff` class it is nested underneath.


    The `PorterDuff.Mode` class is also a completely unique class, and provides developers
    with the blending mode constants that are needed in Android OS to implement advanced
    pixel blending for their compositing operations.


    The `PorterDuff.Mode` class Java hierarchy is structured as follows:


    `java.lang.Object`


    `> java.lang.Enum<E extends java.lang.Enum<E>>`


    `> android.graphics.PorterDuff`


    This `PorterDuff.Mode` class is also a part of the `android.graphics` package,
    and its import statement references an `android.graphics.PorterDuff.Mode` package
    import path, as you will see later on in the chapter when you write Java code
    that implements the `PorterDuff.Mode` blending mode constants.


    There are currently 18 `PorterDuff.Mode` constants defined within this class.
    We will go over the pixel blending constants, which include `SCREEN`, `OVERLAY`,
    `LIGHTEN`, `DARKEN`, `MULTIPLY`, and `ADD` first, as these allow the most special
    imaging effects to be applied to the image compositing process.


    After that, we will take a look at the `CLEAR`, `XOR`, and the `SRC` (source)
    and `DST` (destination) image transfer modes, which are also very useful for the
    application of advanced graphics design work processes or special effects.


    If, while you’re reading this section of the chapter, you can’t visualize in your
    head what each of these algorithmic equations is doing with the pixel blending,
    don’t worry, as we’ll be taking a look visually at what these do later on in this
    chapter, so you will get plenty of “blending” experience!


    It is important to note that the only way to really get familiar with what these
    blending modes are going to do in any given compositing application is to spend
    some time experimenting with or working with them. As you gain more time with
    and experience in using the blending modes, you will be more able to accurately
    speculate what any given blending mode is going to result in, given the combination
    of two totally different images.


    The first blending constant we will look at is one of the most frequently used,
    the `ADD` constant, which adds the saturation of the source with the destination
    image asset, or in equation form, `Saturate(S+D)`. As you may have guessed, in
    these equations `S` means Source and `D` means Destination.


    The second constant we’re going to look at isn’t a blending or a transfer, but
    rather a utility constant. A `CLEAR` constant clears the blending result area
    of all pixel data, and thus takes the equation form of `[0,0]`.


    The third constant is popular with image compositors, the `DARKEN` constant, which
    darkens the destination image asset using the source image asset, or in equation
    form, `[ Sa+Da - Sa*Da, Sc*(1-Da) + Dc*(1-Sa) + min(Sc, Dc) ]`.


    There is also a `LIGHTEN` constant, which is also used quite often by image compositors.
    As you might have guessed, this is the opposite of the `DARKEN` constant. This
    blending algorithm lightens the destination image asset by using the source image
    asset as a lightening guide, or in equation form, `[ Sa+Da - Sa*Da, Sc*(1-Da)
    + Dc*(1-Sa) + max(Sc, Dc) ]`, which is the same as the `DARKEN` algorithm, except
    using the `max` function instead of the `min`.


    There is also a `MULTIPLY` blending constant, which is one of my favorites; it
    multiplies the pixel values between the source and destination imaging assets
    by using the following equation: `[ Sa*Da, Sc*Dc ]`. This usually results in a
    darkening effect. The lowercase `a` and `c` stand for alpha (Channel) and color
    (RGB).


    A slightly more complicated version of the `MULTIPLY` blending mode is the `SCREEN`
    blending mode constant, which allows you to essentially ghost the source image
    over the destination image, which allows us to obtain some really cool special
    effects. This `SCREEN` blending algorithm uses the following equation: `[ Sa+Da
    - Sa*Da, Sc+Dc - Sc*Dc ]`.


    Another favorite of mine is the `OVERLAY` blending constant, which is one of the
    most-used blending constants for special effects. It combines a `SCREEN` blending
    mode with a `MULTIPLY` blending mode. As you may have guessed given its name,
    it overlays pixel values between a source and destination image, so that a source
    image looks like it’s ghosted on top of the destination.


    `OVERLAY` is a more advanced version of the `SCREEN` blending constant, where
    pixels are either multiplied or screened based on their luminosity values; lighter
    parts of the image become lighter (screen) and darker parts of the image become
    darker (multiply).


    There are five `DST` related (destination-related) constants, which focus on the
    destination image asset. The first of these is the `DST` constant, which isolates
    only the destination image, meaning it shows only the destination image, hiding
    the source image, and thus its equation is `[Da, Dc]`.


    The `DST_ATOP` constant takes that portion of the destination image that is over
    (intersecting with) the source image, and displays only this portion on TOP of
    (or, ATOP) the source image. The equation to produce this result is as follows:
    `[ Sa, Sa*Dc + Sc*(1-Da) ]`.


    The `DST_IN` constant takes the portion of the destination image that lies inside
    (intersecting with) the source image, and displays only the portion of that destination
    image that is contained within (IN or INSIDE) the source image, but does not show
    any of the source image itself. This is an equivalent to the Boolean intersection
    operation. The equation to produce this digital image intersection result is `[
    Sa*Da, Sa*Dc ]`.


    The `DST_OUT` constant does the exact opposite of what the `DST_IN` constant does,
    and takes the portion of the destination image that lies outside of (not intersecting
    with) the source image, and displays only the portion of the destination image
    that is not intersecting with (OUT or OUTSIDE OF) the source image, but does not
    show any of the source itself. This is the equivalent of a Boolean subtraction
    operation, as the source image portion that overlays the destination image is
    essentially subtracted from the destination image. An algorithm or equation that
    produces this end result is written as follows: `[ Da*(1-Sa), Dc*(1-Sa) ]`.


    The `DST_OVER` constant overlays the destination image on top of the source image.
    This is thus an equivalent of the Boolean union operation, which is sometimes
    called a Boolean add operation. The equation is as follows: `[ Sa + (1-Sa)*Da,
    Rc = Dc+(1-Da)*Sc ]`.


    There are five `SRC` related (source-related) constants, which focus on source
    image assets. These are essentially the same as `DST` constants, only the opposite
    in the sense that they involve the source image, rather than the destination image.
    The first of them is a `SRC` constant, which isolates only the source image, meaning
    it shows only the source image, hiding the destination image, and thus, its very
    simple equation is `[Sa, Sc]`.


    The `SRC_ATOP` constant takes the portion of the source image that is over (intersecting
    with) the destination image, and displays only this portion, on TOP of (or ATOP)
    the destination image. The algorithm or equation that produces this result is
    as follows: `[ Da, Sc*Da + (1-Sa)*Dc ]`.


    The `SRC_IN` constant takes the portion of the source image that lies inside (intersecting
    with) the destination image and displays only the portion of the source image
    that is contained within (IN) the destination image, but does not show any of
    the destination image itself. A Boolean operation equivalent would be the same
    for both the `SRC` and `DST` mode type, if you’re wondering. The equation to produce
    this result is `[ Sa*Da, Sa*Dc ]`.'
