    Figure 14-17.


    Adding a .setImageDrawable( ) method call to reset animation to first frame and
    changing to final


    Let’s test this approach via the Run As ➤ Android Application work process and
    you’ll notice that, although it runs without crashing the app, it does not reset
    your AnimationDrawable back to Frame 1, which is what you need. This is because
    an AnimationDrawable object contains all of the references regarding which frame
    of animation is playing (or is stopped) and when it is playing (or where it is
    stopped).


    So you will need to figure something else out to achieve your desired end result
    of a perfect seamless Frame 1 to Frame 1 animation stop operation.


    Thus, the next thing that you will try is to set this pag ImageView to your Frame
    1 image asset directly, which you already have the Java code in place to do. This
    code is currently used inside the `.addFrame( )` method call.


    Copy the `getResources( ).getDrawable( )` method chaining code from inside the
    first parameter (Drawable) portion of your `.addFrame( )` method call and paste
    it inside the `.setImageDrawable( )` method call. This is done using the following
