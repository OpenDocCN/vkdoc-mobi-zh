- fmt: '# Using `onOptionsItemSelected()` to Add Menu Functionality


    Add a new line after the `onCreateOptionsMenu()` method and add a public boolean
    `onOptionsItemSelected()` method and pass it a `MenuItem` parameter named `item`
    by using the following line of Java code:


    `public boolean onOptionsItemSelected(MenuItem item) { your method code goes in
    here }`


    The `onCreateOptionsMenu()` method is part of the `Activity` class, for which
    you already have an import statement, but you will see when you finish typing
    in this line of code that the `MenuItem` class in the `android.view` package will
    need an import statement. If you mouse-over the wavy red underline error highlighting,
    you will see an option to have that import statement written for you.


    This `MenuItem` object, named `item` in the method declaration, is passed from
    the Android OS to this method whenever a user clicks one of the `Menu` object
    items that were inflated by the `onCreateOptionsMenu()` method. We then call the
    `.getItemId()` method off of this `MenuItem` object and pass that value into a
    Java `switch` statement using the following code:


    `switch(item.getItemId()) { individual case statements go inside of this structure
    }`


    Once you have set this method and `switch` structure up, you can add your `case`
    statements for each menu item. Within each of these `case` statements, you will
    add the lines of Java code that are needed to process whatever needs to be done
    when each menu item is selected by your user.


    Inside of these `case` statements that you are going to write here, the Java actions
    you are going to take will involve using an Android `Intent` object to launch
    the `Activity` subclass that contains your application’s functions, which will
    take the form of UI screen layouts.


    Each of these Java `case` statements will use the following code format:


    ```

    case R.id.table_of_contents:

    Intent intent_toc = new Intent(this, ContentsActivity.class);

    this.startActivity(intent_toc);

    break;

    ```


    Let’s analyze these case blocks of Java code, shown in Figure 6-23.


    ![A978-1-4302-5786-8_6_Fig23_HTML.jpg](A978-1-4302-5786-8_6_Fig23_HTML.jpg)


    **Figure 6-23.** Adding an `onOptionsItemSelected()` method to add an `Intent`
    object to start a new `ContentActivity` class


    The `case` statement itself is assigned to the resource ID for the menu item defined
    in your XML file (`main.xml`) and inflated into the `Menu` object named `menu`
    in your `onOptionsMenuCreate()` method. This ID for the `Menu` object is like
    its name, which tells you which menu item the user has selected, and you then
    execute the code inside this `case` statement. Code inside of a `case` statement
    comes after the colon and before a `break` statement, which will exit you from
    any particular `case` statement.


    Next, you create an `Intent` object that carries your intent to start a new `Activity`
    subclass to the Android OS. This is done via the following code:


    `Intent intent_toc = new Intent(this, ContentsActivity.class);`


    This line of code instantiates an `Intent` object, names it `intent_toc`, and
    loads it with a new intent configured with the current context (`this`) and the
    target `Activity` class that you want to launch, the `ContentsActivity.java` class
    that you coded earlier, as specified in its compiled format via the name `ContentsActivity.class`.
    An intent in Android is used to communicate between different areas of the OS.
    If you are not as familiar as you should be with intents, you can read up on them
    on this page of the Android Developer web site located at the following URL:


    [http://developer.android.com/reference/android/content/Intent.html](http://developer.android.com/reference/android/content/Intent.html)


    The next line of code starts the `Activity` using the `.startActivity()` method
    and the new intent object that you just created in the previous line of code.
    This launches the new `Activity` subclass onto the display screen. The method
    is called off the current context reference of `this`, like so:


    `this.startActivity(intent_toc);`


    This is all you need to launch the `ContentsActivity.class` onto the user’s device
    display, so all you need now is a `break` statement, which breaks you out of the
    `switch` statement case matching loop, and you’re ready to test!


    Notice that I also put the Options menu item in for your Bookmark Utility (BMU),
    which we will be designing later on in the book. I did this to show more than
    one menu item on the menu, and also to show how you need to use different intent
    object names to differentiate your intent objects between menu items and the different
    `Activity` subclasses they will launch.


    So the intent object for your BMU is named `intent_bmu`, and this intent will
    be loaded with a reference to a `BookmarkActivity.class` once you create the XML
    layout and Java code for that class.


    For now, I just pointed it to the `ContentsActivity.class`, since that exists
    so that you have working code; thus both menu options will launch the layout container
    we have been working on.


    # Testing the Table of Contents Activity on the Nexus One


    Now you can right-click your `GraphicsDesign` project folder and use the **Run
    As ➤ Android Application** work process to see if your new menu and layout container
    are working properly together. As you see in Figure 6-24, when you select the
    menu using the emulator menu button, and click the **Table of Contents** menu
    item, shown in blue on the left side of the screen shot, it launches the `ContentsActivity`
    Java `Activity` subclass and your `LinearLayout` user interface design, shown
    on the right side.


    Also shown on the right side of the screen shot is the **Back** button icon, highlighted
    in blue, which you can use to return to the splash screen and test the other menu
    item, which for now will also call the same `Activity`. Once you convert this
    UI to a `RelativeLayout`, you will add a `Button` widget, which you will be learning
    about in the next chapter. This UI `Button` widget will perform the return-to-home
    (splash screen) user interface function.


    ![A978-1-4302-5786-8_6_Fig24_HTML.jpg](A978-1-4302-5786-8_6_Fig24_HTML.jpg)


    **Figure 6-24.** Testing your new menu, `Activity` subclass, and Table of Contents
    layout design on the Nexus One


    Later on in the book we’ll transmute this into a `RelativeLayout` and more; since
    layout containers are fundamental to graphics and UI design, we will be working
    with them throughout the book. I wanted to use this chapter to give you an overview
    and show how one is implemented in the overall process of Activities, Manifest,
    XML, Java, and so on.'
