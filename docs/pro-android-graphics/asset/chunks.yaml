    If you want to learn more about this Enum class, you can find its page on the
    Android Developer web site, located at the following URL:


    [`http://developer.android.com/reference/java/lang/Enum.html`](http://developer.android.com/reference/java/lang/Enum.html)


    If you’ve used the `wrap_content` constant for the android:layout_width and android:layout_height
    parameters for your ImageView UI element, then using one of the ScaleType scaling
    type constants would equate to scaling the digital image asset itself. This is
    because your ImageView references, and thus contains, your source image, and the
    wrap_contant tells Android to conform the ImageView UI “container” around the
    image asset, pixel for pixel, which means that the ImageView container takes on
    the physical specifications of the image asset. If one of the ScaleType constants
    is specified via this nested class, the image asset (via the ImageView) would
    then be scaled to that given display screen size, density, and aspect ratio in
    a way which is based on the scaling type (ScaleType) constant which has been specified.


    ScaleType is most useful for determining how to scale an image relative to different
    screen aspect ratio, that is, keeping the aspect ratio locked so as not to distort
    the image at all, or, on the other end of the spectrum, allowing the image scaling
    operation to rescale our image without regards to aspect ratio, as we did with
    our 1000 pixel square image in [Chapter 7](#A978-1-4302-5786-8_7_Chapter.html).


    The ScaleType class also has a scaling type (constant) that allows us to match
    up each pixel of our digital image asset with each pixel of a user’s Android device’s
    physical hardware display. This is the `CENTER` constant.


    If there are not enough pixels in an image asset, or rather in the closest resolution
    density image asset that matches up with the screen resolution, our image will
    perfectly center within the display. In this way the image is using one physical
    display pixel for each pixel in the image asset. Now this is my kind of digital
    imaging class!


    Let’s go over each one of these eight different types of Scaling Algorithm Constants
    individually, in detail. I’ll outline them in Table [8-1](#A978-1-4302-5786-8_8_Chapter.html#Tab1),
    so that they are all together in one place, and then we can discuss each of them.
    The number in parenthesis after each scaling constant in the table represents
    the actual integer value that is represented by the scaling constant.


    Table 8-1.


    ImageView.ScaleType Image Scaling Constants and Summary of How They Scale Digital
    Image Assets'
