  trans: '

    # 使用 WebM VP8 编解码器压缩真高清视频


    找到 1080p 的 `Squeeze WebM` 编解码器预设，如图 18-21 右侧所示，然后将目标数据速率编辑为 3072 KBPS（即 3 MBPS），并使用最佳的
    2 遍可变比特率（VBR）设置，以及 `Maintain Aspect Ratio`（保持宽高比）设置。你可以看到，在这种情况下，它的作用与你之前使用的 `Same
    as source`（与源相同）设置完全相同。使用相同的工作流程复制此预设，创建一个 2048 TDR 预设。


    ![A978-1-4302-5786-8_18_Fig21_HTML.jpg](img/A978-1-4302-5786-8_18_Fig21_HTML.jpg)


    图 18-21. 为 WebM 编解码器创建数据速率为 3072 和 2048 Kbps 的真高清视频压缩预设


    接下来，使用 Squeeze 左上角的 `Import File`（导入文件）按钮，找到 `PAG1920x1080.avi` 未压缩源文件并将其加载，以便压缩
    WebM 真高清视频素材。


    将你的 3072 KBPS WebM 预设应用于真高清源数据，点击 `SqueezeIt!` 按钮，生成数字视频数据的 WebM 版本。


    正如你将在本章后面看到的，这会生成一个 14MB 的数据占用空间，因此接下来我们使用 2048 KBPS 编解码器预设来压缩未压缩的源 AVI 文件，看看是否能得到更小的数据占用空间结果。


    将你的 2048 KBPS WebM 预设应用于真高清源数据，点击 `SqueezeIt!` 按钮，生成数字视频数据的 WebM 版本。


    此数据速率设置的结果是一个 8MB 的文件。如果你考虑到 400 帧 3D 图像，每帧 6.22MB，本质上是从 25 亿字节的数据压缩到仅 800 万字节（见图
    18-22），那么这是一个非常显著的结果。


    我在 Opera 浏览器（该浏览器专门支持 WebM 视频）中播放了该 WebM 视频，其播放流畅无比！因此，对于真高清视频素材，特别是需要流式传输的视频，我会选择这种
    WebM 编解码器和预设，而非 MPEG-4；或者，如果我在媒体服务器上外部托管数据，可能会设法同时提供两种格式。


    我们将在下一章中研究使用远程 Web 服务器流式传输视频数据，因此本章和第 2 章将为那一章（关于更高级的视频流式传输）打下极好的基础。


    ![A978-1-4302-5786-8_18_Fig22_HTML.jpg](img/A978-1-4302-5786-8_18_Fig22_HTML.jpg)


    图 18-22. 导入未压缩的 `PAG1920x1080.avi` 真高清 AVI 文件并向其应用 WebM 预设


    最后，作为总结，让我们看看你生成的所有 38 个源文件、数据文件和项目文件，它们如图 18-23 所示。该列表的顶部是 `.sqz` Squeeze 项目文件，在这些文件下方，按
    X 轴数值顺序排列着十种不同的视频素材文件分辨率，以及它们未压缩的 AVI 文件、压缩的 MPEG-4 文件，甚至还有（如果你好奇的话）压缩的 WebM 文件。


    如果你想练习计算，可以交换分子和分母，或除数和被除数，以便在压缩比和压缩百分比之间来回转换。要获得压缩量，请用 100% 减去你的压缩百分比，或者在本例中，用
    1 减去压缩百分比。


    大部分计算我已经为你完成，并放在表 18-1 中，向你展示如何创建类似的数据表，以便在客户要求查看时，你能随时掌握数据占用空间的优化结果。或者，以防你想像我一样遵循“精细”的工作流程。


    现在，你已掌握足够的知识，可以进入下一章了。在那里，你将研究视频远程流式传输的编码和优化，以便将数字视频素材存储在你的服务器上，而不是你的应用中！


    ![A978-1-4302-5786-8_18_Fig23_HTML.jpg](img/A978-1-4302-5786-8_18_Fig23_HTML.jpg)


    图 18-23. Windows 资源管理器文件管理器显示 AVI 文件夹及压缩结果的文件大小和格式


    ## 摘要


    在第十八章中，你学习了如何使用 `MediaPlayer`（它本质上包含在你的 `VideoView` UI 对象中）。你深入研究了 Android 中的
    `MediaPlayer`、`Uri` 和 `VideoView` 类，了解了它们各自的功能，以及它们如何协同工作，使我们能够定位、加载到内存、访问、播放和循环播放数字视频素材。


    你学习了如何使用 `OnPreparedListener` 嵌套类（通过 `MediaPlayer` 嵌套类 `MediaPlayer.OnPreparedListener`
    访问）来获取 `MediaPlayer` 对象引用，该类暴露了 `MediaPlayer` 对象。


    与早在第 2 章（那时你只是一个简单的图形初学者）时相比，本章我们对 `MediaPlayer` 和 `VideoView` 类进行了更详细的探讨，然后我们将你的视频素材重新引入启动屏代码，以便将其用作动画背景板。


    你将你的视频素材与我们很久以前在第 3 章和第 4 章中创建的 PAG 标志动画处理进行了合成。正如预期的那样，你在第 2 章中创建的视频在你创建的动画元素后面正常播放，这归功于你的合成工作流程以及对
    PNG32 素材中 Alpha 通道数据的智能运用。你们学得很好，年轻的卢克们和卢克莎们。愿英伟达（GeForce）图形处理器与你们同在。


    接下来，我们重新回到数字视频数据占用空间优化的工作流程，并确定了五个目标分辨率，这些分辨率“覆盖”了 95% 的主流 Android 设备屏幕分辨率（使用物理像素）。除了最小的
    640x360 分辨率外，每一个也都是一个“命名的”屏幕分辨率标准。


    我们瞄准了宽 VGA（WVGA），分辨率为 800x480；宽超级 VGA（WSVGA），分辨率为 1024x600；伪高清，分辨率为 1280x720；以及真高清，分辨率为
    1920x1080。最后两种恰好也是视频（电视）广播标准。


    你为这些分辨率的竖屏和横屏版本设置了编解码器预设，并设置了标准数据速率以匹配视频尺寸和目标播放设备。你查看了生成的文件大小，并确定了哪种结果最适合你打算交付应用的目标
    Android 设备。


    在下一章中，你将了解如何通过 HTTP 协议在互联网上流式传输数字视频素材，以备你的应用中有过多的数字视频无法使用“本地”素材，同时也让你了解在视频压缩和数据流式传输中，网络带宽是如何发挥作用的。'
- fmt: '# 19. Streaming Digital Video from an External Media Server


    ## Abstract


    In this nineteenth chapter, you will gain even deeper experience using the Android
    `VideoView`, `Uri`, and `MediaPlayer` classes. However, this time you''ll be using
    digital video that is hosted external to your Android application.


    In this nineteenth chapter, you will gain even deeper experience using the Android
    `VideoView`, `Uri`, and `MediaPlayer` classes. However, this time you’ll be using
    digital video that is hosted external to your Android application.


    If a video is played back on your user’s Android device as the video asset data
    comes over the Internet for the first time (during its first playback loop, in
    the case of your code configuration), this is popularly known as a streaming digital
    video. The other way of using videos from remote digital video media servers is
    to download the digital video asset first, before a playback cycle (seamless looping,
    in your particular use-case) is started.


    Either way, this approach differs from using captive video (as you did in the
    previous chapter) because you are using the network connection as the source of
    your digital video data stream and using an Android application as the playback
    engine (recipient) of this streaming (or downloaded) video data.


    To give the user feedback while they are waiting for a video asset to download
    will require that you implement a progress dialog, and thus you will be learning
    in this chapter about Android’s `ProgressDialog` class. This class allows you
    to implement the dialog that will alert users to the fact that they are downloading
    a video, and give them information regarding that download, such as what is being
    downloaded, using a progress animation.


    Later on in this chapter, using Squeeze, you will also optimize your 480x800 digital
    video asset to utilize the WebM codec and file format. You’ll also be learning
    about Android’s `Display` and `WindowManager` classes, as you need to use them
    to detect what screen orientation a user is using.


    ## Can I Stream Video? Setting a Manifest Internet Permission


    Before you will be able to use the Internet with your application at all, you
    will first be required by the Android OS to declare an `INTERNET` permission constant
    in your `AndroidManifest.xml` file. This can be accomplished by using the Android
    `<uses-permission>` child tag, along with the `INTERNET` constant, using the following
    line of XML markup:


    ```

    <uses-permission android:name="android.permission.INTERNET" />

    ```


    This permission flag, located at the top of the Android Manifest XML file after
    your `<uses-sdk>` specifications (see Figure 19-1), will inform Android OS that
    you intend to go outside your user’s device to access streaming data or other
    content for your application.


    ![A978-1-4302-5786-8_19_Fig1_HTML.jpg](A978-1-4302-5786-8_19_Fig1_HTML.jpg)


    Figure 19-1. Adding the `<uses-permission>` child tag to the `AndroidManifest`
    file with `android.permission.INTERNET`


    The reason that this is necessary is essentially because you need to inform the
    Android OS that it needs to watch out for potential security breaches. Once you
    put a hardware device onto a public network, such as the Internet, it can be compromised
    by third parties, such as hackers. This is why I keep most of my 3D content development
    workstations on their own private network, one that is not connected (visible
    or accessible) to the outside world. The same concept can be applied to a user’s
    Android device.


    ## When Video Lives Far Away: The HTTP URL and Your URI


    Content internal to the Android OS (for video, this will be in the `/res/raw`
    folder) will usually use the `android.resource://` URI path reference since this
    content will always live in the R or resource area of the Android OS.


    Database content, which uses what is termed a content provider in Android, uses
    the `content://` URI path reference. You will not be looking at that URI path
    reference location in this book (that is an entirely different book on database
    design for Android), although it’s good to know about it!


    We are going to be using a web server to host your digital video assets, so you
    are going to change this `android.resource://` to the familiar `HTTP://` used
    to denote the HyperText Transfer Protocol schema.


    This means that upgrading your current application code to utilize digital video
    streaming is as simple as changing the parameter that is passed to your `Uri.parse()`
    method call in the `splashScreenUri` object declaration and configuration line
    of code, as shown in Figure 19-2. Your new Java code should look something like
    the following Java code statement:


    ```

    Uri splashScreenUri = Uri.parse("HTTP://www.e-bookclub.com/pag480x800portrait.mp4");

    ```


    This is the only change you will need to make to the code you crafted in Chapter
    18 in order to stream digital video assets from a new media web server to your
    Nexus One emulator (or Android hardware testing devices).


    ![A978-1-4302-5786-8_19_Fig2_HTML.jpg](A978-1-4302-5786-8_19_Fig2_HTML.jpg)


    Figure 19-2. Changing the URI reference for your internal video asset to an external
    HTTP video asset reference


    As you can see in Figure 19-3, the MPEG-4 digital video asset is streaming from
    the web server to the Nexus One emulator AVD frame by frame, as each frame comes
    over the Internet. I utilized a slower Internet connection to confirm this, and
    the video displayed frame by frame as each frame came over the Internet into my
    emulator.


    ![A978-1-4302-5786-8_19_Fig3_HTML.jpg](A978-1-4302-5786-8_19_Fig3_HTML.jpg)


    Figure 19-3. Streaming your `pag480x800portrait.mp4` video in the Nexus One emulator


    Once the entire video has streamed over the Internet and has been loaded into
    system memory, any subsequent loop of the video plays back at a rate consistent
    with the playback of captive video from memory, as you saw in the previous chapter.
    If this is slower than it would be on the Android device hardware, remember that
    the Android device does not need to both emulate itself and run your app, as the
    AVD has to do (thus its weak performance).


    Next, you’ll look at how to preload digital video assets over the Internet, just
    in case you want to make sure your users have smooth video playback.'
