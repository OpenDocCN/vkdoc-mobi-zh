- fmt: "# The `ProgressDialog` Class: Show Your Download Progress\n\nAndroid has a\
    \ class called the `ProgressDialog` class, which makes it easy for you to show\
    \ your users that a download is progressing so that they do not think that the\
    \ application has \"hung\" but instead are assured that it is performing some\
    \ sort of task in the background (downloading data) while they are waiting.\n\n\
    The Android `ProgressDialog` class is a direct subclass of the `AlertDialog` class,\
    \ so it is a specialized type of `AlertDialog` object for Android OS. The `AlertDialog`\
    \ class is itself a subclass of the `Dialog` class, which is used to create `Dialog`\
    \ classes, and the `Dialog` class is a subclass of the `java.lang.Object` master\
    \ class.\n\nThe Android `ProgressDialog` class hierarchy is thus structured as\
    \ follows:\n\n```\njava.lang.Object\n  > android.app.Dialog\n    > android.app.AlertDialog\n\
    \      > android.app.ProgressDialog\n```\n\nThe `ProgressDialog` class, along\
    \ with all the other types of `Dialog` classes in Android, belongs to the `android.app`\
    \ package because it's something that is a part of every application, in one way\
    \ or another. The import statement for using the `ProgressDialog` class (or object)\
    \ in your app references the `android.app.ProgressDialog` package, as you will\
    \ see in this chapter.\n\nThe `ProgressDialog` class is a public class and allows\
    \ your application to implement a progress dialog, which displays an animated\
    \ progress indicator and an optional text message. The animated progress indicator\
    \ should use a spinning wheel for video downloading, since that's the industry\
    \ \"norm\" for a video download.\n\nA spinning wheel indicator, which you'll be\
    \ using later on in this chapter, is the default indicator type for a `ProgressBar`\
    \ object. The other progress indicator type is a horizontal bar indicator, which\
    \ will show a percentage of the download that has been completed at any given\
    \ time.\n\nA `ProgressDialog` object can also implement a `View` object in place\
    \ of your text message. This means that if you wanted to get fancy and use your\
    \ own graphics or animation assets that you designed using what you learned over\
    \ the past eighteen chapters in the book, you can make really awesome visual progress\
    \ dialogs, if you so choose.\n\nOnly text messages or a `View` object can be used\
    \ in `ProgressDialog` objects; currently both cannot be used at the same time.\
    \ Of course, you will simply implement your text (drawable) in your `View` object,\
    \ so that's not a problem for a Pro Android Graphics designer such as yourself!\
    \ The `ProgressDialog` object can be made cancelable via a \"back\" key press\
    \ or via a click \"off\" (outside) your `ProgressDialog` object (screen area)\
    \ itself. The horizontal progress bar's numeric range is from 0 to 10000, in case\
    \ you're wondering.\n\n## Implementing a `ProgressDialog` in the `GraphicsDesign`\
    \ App\n\nLet's implement a `ProgressDialog` object in your current streaming digital\
    \ video codebase so that you can turn it from a streaming video into a video preload\
    \ operation. The first thing that you will need to do is to declare a `ProgressDialog`\
    \ object and name it `downloadProgress` via the following code:\n\n```\nProgressDialog\
    \ downloadProgress;\n```\n\nAs you can see in Figure [19-4](#A978-1-4302-5786-8_19_Chapter.html#Fig3),\
    \ you will need to mouse-over a reference to the `ProgressDialog` class and select\
    \ the option to Import `ProgressDialog` (`android.app`) so that Eclipse will write\
    \ your Import statement for you. You can then proceed to utilize this class in\
    \ the rest of your code.\n\n![A978-1-4302-5786-8_19_Fig4_HTML.jpg](A978-1-4302-5786-8_19_Fig4_HTML.jpg)\n\
    \n**Figure 19-4.** Declaring a `ProgressDialog` object named `downloadProgress`\
    \ at the top of your `MainActivity` class\n\nNext, you need to make sure that\
    \ your video does not start to play until the download is completed. This might\
    \ seem on first thought to involve a lot of complicated code to watch the download\
    \ and start the video when it is finished, but it actually simply involves moving\
    \ the `.start()` function call to the inside of the `onPrepared()` method from\
    \ where it sits currently.\n\nWhat this will do is start the digital video once\
    \ it is \"prepared.\" In this case, prepared means loaded into system memory,\
    \ which, in this case, also means downloaded completely! So, let's accomplish\
    \ this next; copy the `splashScreen.start();` line of code from the outside of\
    \ your `.onPrepared()` method that you wrote in the previous chapter, and paste\
    \ it inside the `onPrepared()` method, right after your `.setLooping()` method\
    \ call, as shown in Figure [19-5](#A978-1-4302-5786-8_19_Chapter.html#Fig5). As\
    \ you can see, you have some error highlighting to address!\n\n![A978-1-4302-5786-8_19_Fig5_HTML.jpg](A978-1-4302-5786-8_19_Fig5_HTML.jpg)\n\
    \n**Figure 19-5.** Relocating `.start()` method call to the inside of the `onPrepared()`\
    \ method so video starts after download\n\nBy putting a `splashScreen` object\
    \ reference call to the `.start()` method inside your `onPrepared()` method, it\
    \ becomes difficult for the `Activity` subclass to \"locate\" it because your\
    \ `VideoView` object is hidden further down inside your code (nesting) hierarchy.\n\
    \nIf you mouse-over the error highlighting, you will see the suggestion that you\
    \ use a `final` access modifier so that your `splashScreen` `VideoView` object\
    \ can be seen (found or referenced) anywhere within your `MainActivity` class.\n\
    \nThis is one solution that might also take a little bit of extra memory to implement,\
    \ so let's try something different first: move your `VideoView` object declaration,\
    \ naming, and configuration statement from inside your `onCreate()` method up\
    \ to the top of the class along with the `ProgressDialog` and `Animation` related\
    \ declarations.\n\nAs you can see in Figure [19-6](#A978-1-4302-5786-8_19_Chapter.html#Fig6),\
    \ this takes care of your error messages, just like clicking that \"Change modifier\
    \ of `splashScreen` to `final`\" option in Figure [19-5](#A978-1-4302-5786-8_19_Chapter.html#Fig5)\
    \ would have, except in this way your `VideoView` object is visible to each method\
    \ in your `MainActivity` `Activity` subclass as well as accessible to all of your\
    \ methods in this class, if access is needed.\n\nNow you can get into the work\
    \ process of instantiating and configuring your `ProgressDialog` object so that\
    \ you can use it to inform your users that you are downloading a video file for\
    \ their viewing pleasure. Let's accomplish this next to prevent your users from\
    \ fidgeting in their seats, which is never a good user experience indicator.\n\
    \n![A978-1-4302-5786-8_19_Fig6_HTML.jpg](A978-1-4302-5786-8_19_Fig6_HTML.jpg)\n\
    \n**Figure 19-6.** Relocating the `VideoView` declaration and configuration statement\
    \ to the top of your `MainActivity` class"
  raw: '## The ProgressDialog Class: Show Your Download Progress


    Android has a class called the ProgressDialog class, which makes it easy for you
    to show your users that a download is progressing so that they do not think that
    the application has “hung” but instead are assured that it is performing some
    sort of task in the background (downloading data) while they are waiting.


    The Android ProgressDialog class is a direct subclass of the AlertDialog class,
    so it is a specialized type of AlertDialog object for Android OS. The AlertDialog
    class is itself a subclass of the Dialog class, which is used to create Dialog
    classes, and the Dialog class is a subclass of the java.lang.Object master class.


    The Android ProgressDialog class hierarchy is thus structured as follows:


    `java.lang.Object`


      `> android.app.Dialog`


        `> android.app.AlertDialog`


          `> android.app.ProgressDialog`


    The ProgressDialog class, along with all the other types of Dialog classes in
    Android, belongs to the android.app package because it’s something that is a part
    of every application, in one way or another. The import statement for using the
    ProgressDialog class (or object) in your app references the android.app.ProgressDialog
    package, as you will see in this chapter.


    The ProgressDialog class is a public class and allows your application to implement
    a progress dialog, which displays an animated progress indicator and an optional
    text message. The animated progress indicator should use a spinning wheel for
    video downloading, since that’s the industry “norm” for a video download.


    A spinning wheel indicator, which you’ll be using later on in this chapter, is
    the default indicator type for a ProgressBar object. The other progress indicator
    type is a horizontal bar indicator, which will show a percentage of the download
    that has been completed at any given time.


    A ProgressDialog object can also implement a View object in place of your text
    message. This means that if you wanted to get fancy and use your own graphics
    or animation assets that you designed using what you learned over the past eighteen
    chapters in the book, you can make really awesome visual progress dialogs, if
    you so choose.


    Only text messages or a View object can be used in ProgressDialog objects; currently
    both cannot be used at the same time. Of course, you will simply implement your
    text (drawable) in your View object, so that’s not a problem for a Pro Android
    Graphics designer such as yourself! The ProgressDialog object can be made cancelable
    via a “back” key press or via a click “off” (outside) your ProgressDialog object
    (screen area) itself. The horizontal progress bar’s numeric range is from 0 to
    10000, in case you’re wondering.


    ## Implementing a ProgressDialog in the GraphicsDesign App


    Let’s implement a ProgressDialog object in your current streaming digital video
    codebase so that you can turn it from a streaming video into a video preload operation.
    The first thing that you will need to do is to declare a ProgressDialog object
    and name it downloadProgress via the following code:


    `ProgressDialog downloadProgress;`


    As you can see in Figure [19-4](#A978-1-4302-5786-8_19_Chapter.html#Fig3), you
    will need to mouse-over a reference to the ProgressDialog class and select the
    option to Import ‘ProgressDialog’ (android.app ) so that Eclipse will write your
    Import statement for you. You can then proceed to utilize this class in the rest
    of your code.


    ![A978-1-4302-5786-8_19_Fig4_HTML.jpg](A978-1-4302-5786-8_19_Fig4_HTML.jpg)


    Figure 19-4.


    Declaring a ProgressDialog object named downloadProgress at the top of your MainActivity
    class


    Next, you need to make sure that your video does not start to play until the download
    is completed. This might seem on first thought to involve a lot of complicated
    code to watch the download and start the video when it is finished, but it actually
    simply involves moving the .start() function call to the inside of the onPrepared()
    method from where it sits currently.


    What this will do is start the digital video once it is “prepared.” In this case,
    prepared means loaded into system memory, which, in this case, also means downloaded
    completely! So, let’s accomplish this next; copy the `splashScreen.start();` line
    of code from the outside of your .onPrepared() method that you wrote in the previous
    chapter, and paste it inside the onPrepared() method, right after your .setLooping()
    method call, as shown in Figure [19-5](#A978-1-4302-5786-8_19_Chapter.html#Fig5).
    As you can see, you have some error highlighting to address!


    ![A978-1-4302-5786-8_19_Fig5_HTML.jpg](A978-1-4302-5786-8_19_Fig5_HTML.jpg)


    Figure 19-5.


    Relocating .start() method call to the inside of the onPrepared() method so video
    starts after download


    By putting a splashScreen object reference call to the .start() method inside
    your onPrepared() method, it becomes difficult for the Activity subclass to “locate”
    it because your VideoView object is hidden further down inside your code (nesting)
    hierarchy.


    If you mouse-over the error highlighting, you will see the suggestion that you
    use a final access modifier so that your splashScreen VideoView object can be
    seen (found or referenced) anywhere within your MainActivity class.


    This is one solution that might also take a little bit of extra memory to implement,
    so let’s try something different first: move your VideoView object declaration,
    naming, and configuration statement from inside your onCreate() method up to the
    top of the class along with the ProgressDialog and Animation related declarations.


    As you can see in Figure [19-6](#A978-1-4302-5786-8_19_Chapter.html#Fig6), this
    takes care of your error messages, just like clicking that “Change modifier of
    splashScreen to final ” option in Figure [19-5](#A978-1-4302-5786-8_19_Chapter.html#Fig5)
    would have, except in this way your VideoView object is visible to each method
    in your MainActivity Activity subclass as well as accessible to all of your methods
    in this class, if access is needed.


    Now you can get into the work process of instantiating and configuring your ProgressDialog
    object so that you can use it to inform your users that you are downloading a
    video file for their viewing pleasure. Let’s accomplish this next to prevent your
    users from fidgeting in their seats, which is never a good user experience indicator.


    ![A978-1-4302-5786-8_19_Fig6_HTML.jpg](A978-1-4302-5786-8_19_Fig6_HTML.jpg)


    Figure 19-6.


    Relocating the VideoView declaration and configuration statement to the top of
    your MainActivity class'
  trans: "\n# `ProgressDialog` 类：展示你的下载进度\n\nAndroid 有一个名为 `ProgressDialog` 的类，它让你能够轻松向用户展示下载正在进行的进度，这样他们就不会认为应用“卡住”了，反而会确信在你等待时，它在后台执行某项任务（下载数据）。\n\
    \nAndroid 的 `ProgressDialog` 类是 `AlertDialog` 类的一个直接子类，因此它是针对 Android 操作系统的一种专门类型的\
    \ `AlertDialog` 对象。`AlertDialog` 类本身是 `Dialog` 类的子类，用于创建 `Dialog` 类，而 `Dialog`\
    \ 类又是主类 `java.lang.Object` 的子类。\n\n因此，Android `ProgressDialog` 类的层级结构如下所示：\n\n\
    ```\njava.lang.Object\n  > android.app.Dialog\n    > android.app.AlertDialog\n\
    \      > android.app.ProgressDialog\n```\n\n`ProgressDialog` 类以及 Android 中所有其他类型的\
    \ `Dialog` 类都归属于 `android.app` 包，因为它以某种方式成为了每个应用的一部分。在你的应用中使用 `ProgressDialog`\
    \ 类（或对象）时，其导入语句会引用 `android.app.ProgressDialog` 包，你将在本章中看到这一点。\n\n`ProgressDialog`\
    \ 类是一个公共类，允许你的应用实现一个进度对话框，该对话框会显示一个动画进度指示器以及一段可选的文本消息。对于视频下载，动画进度指示器应使用旋转轮，因为这是视频下载的行业“规范”。\n\
    \n你将在本章稍后使用的旋转轮指示器是 `ProgressBar` 对象的默认指示器类型。另一种进度指示器类型是水平条指示器，它会显示在任何给定时间点已完成下载的百分比。\n\
    \n`ProgressDialog` 对象也可以使用 `View` 对象来替代你的文本消息。这意味着，如果你想发挥创意，使用自己通过本书前十八章节所学知识设计的图形或动画素材，你可以制作出非常炫酷的视觉进度对话框——只要你愿意这么选。\n\
    \n在 `ProgressDialog` 对象中只能使用文本消息或 `View` 对象；目前两者不能同时使用。当然，你可以简单地在你的 `View` 对象中实现你的文本（可绘制对象），所以对于像你这样专业的\
    \ Android 图形设计师来说，这不成问题！`ProgressDialog` 对象可以通过按下“返回”键使其可取消，也可以通过在 `ProgressDialog`\
    \ 对象（屏幕区域）之外点击（或外部区域）来使其可取消。如果你想知道的话，水平进度条的数值范围是从 0 到 10000。\n\n## 在 `GraphicsDesign`\
    \ 应用中实现 `ProgressDialog`\n\n让我们在你当前的流式数字视频代码库中实现一个 `ProgressDialog` 对象，这样你就可以将其从流式视频操作转变为视频预加载操作。你需要做的第一件事是声明一个\
    \ `ProgressDialog` 对象，并通过以下代码将其命名为 `downloadProgress`：\n\n```\nProgressDialog\
    \ downloadProgress;\n```\n\n如图 19-4 所示，你需要将鼠标悬停在 `ProgressDialog` 类的引用上，并选择导入\
    \ `ProgressDialog`（`android.app`）的选项，这样 Eclipse 就会为你编写导入语句。然后，你就可以在你的其余代码中使用这个类了。\n\
    \n![A978-1-4302-5786-8_19_Fig4_HTML.jpg](img/A978-1-4302-5786-8_19_Fig4_HTML.jpg)\n\
    \n**图 19-4.** 在 `MainActivity` 类的顶部声明一个名为 `downloadProgress` 的 `ProgressDialog`\
    \ 对象\n\n接下来，你需要确保在下载完成之前视频不会开始播放。乍一看，这似乎需要大量复杂的代码来监控下载并在下载完成后启动视频，但实际上，只需将 `.start()`\
    \ 函数调用从当前位置移动到 `onPrepared()` 方法内部即可。\n\n这样做的效果是，一旦数字视频“准备好”就会开始播放。在这种情况下，准备好意味着已加载到系统内存中，而在这里，这也意味着已完全下载！所以，让我们接下来完成这一步；将上一章编写的\
    \ `.onPrepared()` 方法外部的 `splashScreen.start();` 代码行复制并粘贴到 `onPrepared()` 方法内部，紧跟在你的\
    \ `.setLooping()` 方法调用之后，如图 19-5 所示。正如你所见，有一些错误高亮需要处理！\n\n![A978-1-4302-5786-8_19_Fig5_HTML.jpg](img/A978-1-4302-5786-8_19_Fig5_HTML.jpg)\n\
    \n**图 19-5.** 将 `.start()` 方法调用重新定位到 `onPrepared()` 方法内部，以便视频在下载后开始播放\n\n将对 `splashScreen`\
    \ 对象的 `.start()` 方法的引用调用放入 `onPrepared()` 方法内部后，`Activity` 子类就很难“定位”到它，因为你的 `VideoView`\
    \ 对象隐藏在你的代码层级结构中更深的位置。\n\n如果你将鼠标悬停在错误高亮上，你会看到建议使用 `final` 访问修饰符，这样你的 `splashScreen`\
    \ `VideoView` 对象就可以在你的 `MainActivity` 类中的任何位置被看到（找到或引用）。\n\n这是一种解决方案，但实现它可能也会占用一点额外的内存，所以让我们先尝试不同的方法：将你的\
    \ `VideoView` 对象声明、命名和配置语句从 `onCreate()` 方法内部移到类的顶部，与 `ProgressDialog` 和 `Animation`\
    \ 相关的声明放在一起。\n\n如图 19-6 所示，这解决了你的错误消息问题，就如同在图 19-5 中点击“将 `splashScreen` 的修饰符更改为\
    \ `final`”选项一样，只不过通过这种方式，你的 `VideoView` 对象对 `MainActivity` `Activity` 子类中的每个方法都是可见的，并且在需要访问时，该类中的所有方法都可以访问它。\n\
    \n现在，你可以着手进行实例化和配置 `ProgressDialog` 对象的工作流程，以便用它来通知用户，你正在下载一个视频文件供他们观看。让我们接下来完成这一步，以防止用户坐立不安——这从来都不是一个好的用户体验指标。\n\
    \n![A978-1-4302-5786-8_19_Fig6_HTML.jpg](img/A978-1-4302-5786-8_19_Fig6_HTML.jpg)\n\
    \n**图 19-6.** 将 `VideoView` 声明和配置语句重新定位到 `MainActivity` 类的顶部\n"
- fmt: '在`setUpAnimation()`方法调用后添加一行空行，并使用`new`关键字实例化一个`ProgressDialog`对象，使用以下Java代码行，如图[19-7](#A978-1-4302-5786-8_19_Chapter.html#Fig7)所示：


    ```

    downloadProgress = new ProgressDialog(this);

    ```


    ![A978-1-4302-5786-8_19_Fig7_HTML.jpg](A978-1-4302-5786-8_19_Fig7_HTML.jpg)


    **图19-7.** 使用`new`关键字和`this`Context对象实例化`downloadProgress`ProgressDialog对象


    你使用`this`关键字作为参数，将当前`Activity`子类的`Context`对象传递给`ProgressDialog`构造函数。这为`ProgressDialog`对象提供了所需的正确上下文，使其知道何时（以及在哪里）弹出并显示其消息，正如你在本书前面学习`Context`类和`this`关键字时所学到的。


    一旦`downloadProgress`ProgressDialog对象被实例化，你就可以开始为其定制你想要它在应用程序中执行的操作。首先，使用以下Java代码行，通过`.setTitle()`方法调用为`ProgressDialog`对象创建一个标题（标题文本）：


    ```

    downloadProgress.setTitle("Terragen 3 Virtual World Fly-Through Video");

    ```


    接着，使用以下Java语句，通过`.setMessage()`方法调用定义一条在动画进度指示器旁边显示的消息：


    ```

    downloadProgress.setMessage("Downloading Video from Media Server...");

    ```


    如图[19-8](#A978-1-4302-5786-8_19_Chapter.html#Fig8)所示，你的Java代码保持无错误状态，你可以继续设置一些标志来定义`ProgressDialog`对象的功能。你要控制的第一个功能是用户取消此对话框的能力，因为你希望此对话框在视频从远程媒体网络服务器下载完成后自动取消。


    ![A978-1-4302-5786-8_19_Fig8_HTML.jpg](A978-1-4302-5786-8_19_Fig8_HTML.jpg)


    **图19-8.** 使用`.setTitle()`方法调用设置对话框标题，并使用`.setMessage()`方法调用设置对话框消息


    这是通过使用`.setCancelable()`方法并传入布尔值`false`来完成的，如图[19-9](#A978-1-4302-5786-8_19_Chapter.html#Fig9)所示。如截图中所见，如果你输入`ProgressDialog`对象名称（`downloadProgress`），然后输入一个句点字符，即可弹出可用方法辅助对话框。


    ![A978-1-4302-5786-8_19_Fig9_HTML.jpg](A978-1-4302-5786-8_19_Fig9_HTML.jpg)


    **图19-9.** 使用`downloadProgress`对象名称和句点字符调用可用方法辅助


    让我们使用相同的工作流程找到`.setIndeterminate()`方法调用，并将其同样设置为布尔值`false`，如图[19-10](#A978-1-4302-5786-8_19_Chapter.html#Fig10)所示。将不确定进度设置为`false`将为你提供一个旋转的轮状进度条，这是下载视频时的常规指示器。


    ![A978-1-4302-5786-8_19_Fig10_HTML.jpg](A978-1-4302-5786-8_19_Fig10_HTML.jpg)


    **图19-10.** 使用方法可用辅助对话框定位并添加`.setIndeterminate(false)`方法调用


    配置好`ProgressDialog`对象的标题、消息、取消行为和动画进度图标类型后，你终于可以通过使用以下Java代码行调用`ProgressDialog`对象的`.show()`方法向用户显示进度对话框，如图[19-11](#A978-1-4302-5786-8_19_Chapter.html#Fig11)所示：


    ```

    downloadProgress.show();

    ```


    如图[19-11](#A978-1-4302-5786-8_19_Chapter.html#Fig11)所示，我点击了代码中的`downloadProgress`对象，以显示其声明、实例化和配置的逻辑流程，使用棕色（声明和实例化）和灰色（配置）对象高亮显示。


    ![A978-1-4302-5786-8_19_Fig11_HTML.jpg](A978-1-4302-5786-8_19_Fig11_HTML.jpg)


    **图19-11.** 使用`.show()`方法调用显示你的`downloadProgress`ProgressDialog对象


    接下来你需要处理的是，视频下载完成后，将`ProgressDialog`对象从屏幕移除。这是在`onPrepared()`方法中完成的，就像`.start()`方法调用一样，原因大致相同。一旦你知道视频已在系统内存中准备好并可以播放，你也知道是时候将该`ProgressDialog`对象从用户屏幕上移除了。


    从屏幕移除`ProgressDialog`是通过调用`downloadProgress`ProgressDialog对象的`.dismiss()`方法完成的。你应该在`onPrepared()`方法内执行此操作，在将视频循环值设置为`true`之后，但在实际启动视频播放循环之前。在`.setLooping()`方法调用后添加一行空行，并输入以下Java代码行，如图[19-12](#A978-1-4302-5786-8_19_Chapter.html#Fig12)所示：


    ```

    downloadProgress.dismiss();

    ```


    ![A978-1-4302-5786-8_19_Fig12_HTML.jpg](A978-1-4302-5786-8_19_Fig12_HTML.jpg)


    **图19-12.** 在`onPrepared()`方法内部调用`downloadProgress`对象的`.dismiss()`方法


    现在，是时候在Nexus One模拟器中测试你的新`ProgressDialog`对象以及声明、命名、实例化和配置它的Java代码了。'
  raw: 'Add a line of space after the setUpAnimation() method call and instantiate
    a ProgressDialog object using the new keyword, using the following line of Java
    code, as shown in Figure [19-7](#A978-1-4302-5786-8_19_Chapter.html#Fig7):


    `downloadProgress = new ProgressDialog(this);`


    ![A978-1-4302-5786-8_19_Fig7_HTML.jpg](A978-1-4302-5786-8_19_Fig7_HTML.jpg)


    Figure 19-7.


    Instantiating the downloadProgress ProgressDialog object using new keyword and
    this Context object


    You are passing your current Activity subclass’s Context object into this ProgressDialog
    constructor method using the this keyword as a parameter. This gives your ProgressDialog
    object the proper context that it needs to know when (and where) to pop up and
    to display its messages, as you learned earlier in the book when I covered the
    Context class and “this” keyword.


    Once your downloadProgress ProgressDialog object is instantiated, you can begin
    to customize it to do what you want it to do for your application. You will first
    create a title (caption) for your ProgressDialog object using the .setTitle()
    method call, by using the following line of Java code:


    `downloadProgress.setTitle("Terragen 3 Virtual World Fly-Through Video");`


    Next, you’ll define a message shown next to an animated progress indicator using
    the .setMessage() method call, using the following Java statement:


    `downloadProgress.setMessage("Downloading Video from Media Server...");`


    As you can see in Figure [19-8](#A978-1-4302-5786-8_19_Chapter.html#Fig8), your
    Java code remains error-free and you can move on to set some flags that will define
    how the ProgressDialog object functions. The first function you want to control
    is your user’s ability to cancel this dialog, as you want this dialog to cancel
    itself once the video has finished downloading from the remote media web server.


    ![A978-1-4302-5786-8_19_Fig8_HTML.jpg](A978-1-4302-5786-8_19_Fig8_HTML.jpg)


    Figure 19-8.


    Setting a dialog title using .setTitle() method call and dialog message using
    .setMessage() method call


    This is done by using the .setCancelable() method, with a Boolean value of false,
    as shown in Figure [19-9](#A978-1-4302-5786-8_19_Chapter.html#Fig9). As you can
    see in this screen shot, if you type in the ProgressDialog object name (downloadProgress
    ), and then type a period character, you can pop up the available methods helper
    dialog.


    ![A978-1-4302-5786-8_19_Fig9_HTML.jpg](A978-1-4302-5786-8_19_Fig9_HTML.jpg)


    Figure 19-9.


    Using a downloadProgress object name and a period character to invoke a methods
    available helper


    Let’s use the same work process to find a .setIndeterminate() method call, and
    set it to a Boolean value of false as well, as shown in Figure [19-10](#A978-1-4302-5786-8_19_Chapter.html#Fig10).
    An indeterminate progress setting of false will provide you with a spinning wheel
    progress bar, which is the normal indicator when downloading video.


    ![A978-1-4302-5786-8_19_Fig10_HTML.jpg](A978-1-4302-5786-8_19_Fig10_HTML.jpg)


    Figure 19-10.


    Using the methods available helper dialog to locate and add the .setIndeterminate(false)
    method call


    Once you have configured your ProgressDialog object’s title, message, cancel behavior,
    and animating progress icon type, you can finally show the user a progress dialog
    by calling the .show() method call off the ProgressDialog object by using the
    following line of Java code, as shown in Figure [19-11](#A978-1-4302-5786-8_19_Chapter.html#Fig11):


    `downloadProgress.show();`


    As you can see in Figure [19-11](#A978-1-4302-5786-8_19_Chapter.html#Fig11), I
    have clicked the downloadProgress object in the code to show the logical progression
    of its declaration, instantiation, and configuration using tan (declare and instantiate)
    and grey (configuration) object highlighting.


    ![A978-1-4302-5786-8_19_Fig11_HTML.jpg](A978-1-4302-5786-8_19_Fig11_HTML.jpg)


    Figure 19-11.


    Displaying your downloadProgress ProgressDialog object by using the .show() method
    call


    The next thing that you need to deal with is removing the ProgressDialog object
    from the screen once the video has finished downloading. This is done in the onPrepared()
    method, just like the .start() method call, for much the same reason. Once you
    know the video is prepared in system memory and is ready for playback, you also
    know that it is time to remove this ProgressDialog object from the user’s screen.


    Removing the ProgressDialog from the screen is accomplished by using the .dismiss()
    method call off of the downloadProgress ProgressDialog object. You should do this
    inside the onPrepare() method, after you set the video looping value to true,
    but before you actually start the video playback cycle. Add a line of space after
    the .setLooping() method call, and type in the following line of Java code, as
    shown in Figure [19-12](#A978-1-4302-5786-8_19_Chapter.html#Fig12):


    `downloadProgress.dismiss();`


    ![A978-1-4302-5786-8_19_Fig12_HTML.jpg](A978-1-4302-5786-8_19_Fig12_HTML.jpg)


    Figure 19-12.


    Using a .dismiss() method call off the downloadProgress object inside the onPrepared()
    method


    Now it’s time to test your new ProgressDialog object and the Java code that declares,
    names, instantiates, and configures it, inside the Nexus One emulator.'
