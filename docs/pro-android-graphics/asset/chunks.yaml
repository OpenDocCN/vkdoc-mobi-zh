    Java Package from the bottom of the provided list.


    In the `Name` field, type the Drawable subclass name of ImageRoundingDrawable
    and leave the public modifier set (checked) as shown below the Name field.


    Next, click the Browse button on the right side of the Superclass field. This
    will open up the Superclass Selection dialog, shown on the right-hand side of
    Figure [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17), where you can search
    for the Drawable Superclass.


    At the top of the Superclass Selection dialog you will see a Choose a Type field,
    which acts as a search function to narrow down your search through the hundreds
    of classes that are a part of the Android OS.


    Type the letter “d,” as shown in Figure [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17),
    and then find the Drawable class reference, which will specify its android.graphics.drawable
    package origin. When you click the Drawable class reference, the package origin
    information will appear to the right of the class, confirming that this is the
    primary Drawable superclass that you wish to subclass. This is similar to the
    way package origins are detailed in Eclipse pop-up helper dialogs.


    ![A978-1-4302-5786-8_16_Fig17_HTML.jpg](A978-1-4302-5786-8_16_Fig17_HTML.jpg)


    Figure 16-17.


    Naming the class ImageRoundingDrawable and selecting the android.graphics.drawable.Drawable
    superclass


    After you have located and selected the Drawable superclass, as shown in Figure
    [16-17](#A978-1-4302-5786-8_16_Chapter.html#Fig17) on the right, click the OK
    button, which will return you to your New Java Class dialog where you can finally
    click the Finish button to create the `public class ImageRoundingDrawable extends
    Drawable` bootstrap, as well as the four methods within it that Android wishes
    to see implemented, or at least in place, for your Drawable subclass.


    As you can see in the empty bootstrap Drawable subclass framework shown in Figure
    [16-18](#A978-1-4302-5786-8_16_Chapter.html#Fig18), Eclipse has written almost
    two dozen lines of Java code for you, providing an initial framework for you to
    build the Drawable subclass on top of, which you will be doing next.


    Besides the package statement, there are three import statements provided, which
    support the class (extends) and method (parameter objects) usage in your Drawable
    subclass. These include the Canvas, ColorFilter, and Drawable classes, all of
    which we have covered in detail at some point during this book. Next, you see
    the ImageRoundingDrawable class declaration, and inside that are four @Override
    methods that, if implemented, will override the same methods that live in the
    Drawable superclass.


    Two of these, the .draw() and .getOpacity() methods, you will be upgrading to
    implement your own Java code to control the opacity of your Drawable and to specify
    exactly how it will be drawn to the Canvas.


    The other two methods, .setAlpha() and .setColorFilter(), will not be implemented
    for this exercise because your ImageRoundingDrawable won’t use them.


    ![A978-1-4302-5786-8_16_Fig18_HTML.jpg](A978-1-4302-5786-8_16_Fig18_HTML.jpg)


    Figure 16-18.


    Examining the ImageRoundingDrawable Drawable subclass bootstrap code and its four
    methods


    Next, you will start to add in object declarations and build the constructor class
    for your custom Drawable subclass. You’ll start with declaring a Paint object,
    which you will later utilize to paint Bitmaps on your Canvas object.


    ## Creating a Paint Object to Use to Paint the Drawable Canvas


    The first thing you’ll add, on the first line of your ImageRoundingDrawable class
    definition, is a Paint object variable declaration. This is done by using the
    following simple Java code statement:


    `private Paint paintObject;`


    You will use `private` access control so that only your ImageRoundingDrawable
    class can access and utilize this soon-to-be-customized Paint object.


    As you can see in Figure [16-19](#A978-1-4302-5786-8_16_Chapter.html#Fig19), you
    will need to mouse-over and select the option to import the Paint class, which
    is a part of the android.graphics package. Once this has been done, you will be
    able to start to implement your ImageRoundingDrawable() constructor method, which
    will utilize this Paint object, in conjunction with the Canvas and Bitmap classes,
    as you saw in [Chapter 11](#A978-1-4302-5786-8_11_Chapter.html) when you worked
    with PorterDuff image blending modes.


    ![A978-1-4302-5786-8_16_Fig19_HTML.jpg](A978-1-4302-5786-8_16_Fig19_HTML.jpg)


    Figure 16-19.


    Declaring a private Paint object named paintObject for use in ImageRoundingDrawable(
    ) constructor


    Next, let’s declare your constructor method, as shown in Figure [16-20](#A978-1-4302-5786-8_16_Chapter.html#Fig20),
    using the same exact name as your ImageRoundingDrawable class name, and using
    the public access control modifier designation, so that it can be accessed by
    the other classes in your GraphicsDesign project and package. You will use a sourceImage
    Bitmap object as the parameter that is passed into the method, which allows you
    to specify the image that you want to be rounded. The code to create this empty
    constructor method is as follows:


    `public ImageRoundingDrawable(Bitmap sourceImage) { constructor code goes in here
    }`


    ![A978-1-4302-5786-8_16_Fig20_HTML.jpg](A978-1-4302-5786-8_16_Fig20_HTML.jpg)


    Figure 16-20.


    Creating a public ImageRoundingDrawable constructor method with sourceImage Bitmap
    object parameter


    As you can see in Figure [16-20](#A978-1-4302-5786-8_16_Chapter.html#Fig20), you
    will need to mouse-over your Bitmap class reference and select the Import Bitmap
    (android.graphics ) option. Notice the Paint import statement at the top of your
    class, which is a result of doing this same exact work process in the previous
    step.'
  trans: '

    # 创建自定义 Drawable：ImageRoundingDrawable


    让我们回到 Eclipse 中，创建你自己的自定义 `Drawable` 子类，以便你能够确切了解其实现方式。右键点击你的项目 `/src/` 文件夹，然后选择
    **新建 ➤ 类** 菜单命令序列，如截图左侧的图 16-16 所示。


    ![A978-1-4302-5786-8_16_Fig16_HTML.jpg](img/A978-1-4302-5786-8_16_Fig16_HTML.jpg)


    图 16-16. 右键点击 `/src` 文件夹并选择 **新建 ➤ 类** 菜单序列以创建新的类


    这将弹出一个“新建 Java 类”对话框，如图 16-17 所示，并且会自动填充“源文件夹”字段，因为你之前右键点击了 `GraphicsDesign/src/`
    文件夹来调用此对话框。


    点击“包”字段右侧的 **浏览** 按钮，并从提供的列表底部选择你的 `pro.android.graphics` Java 包。


    在“名称”字段中，输入 `Drawable` 子类名称 `ImageRoundingDrawable`，并保持“公开”修饰符处于选中（勾选）状态，如下方“名称”字段所示。


    接下来，点击“超类”字段右侧的 **浏览** 按钮。这将打开“超类选择”对话框，如图 16-17 右侧所示，你可以在其中搜索 `Drawable` 超类。


    在“超类选择”对话框的顶部，你会看到一个 **选择类型** 字段，它充当搜索功能，帮助你在构成 Android 操作系统的数百个类中缩小搜索范围。


    输入字母“d”，如图 16-17 所示，然后找到 `Drawable` 类引用，该类引用会指明其 `android.graphics.drawable` 包来源。当你点击
    `Drawable` 类引用时，包来源信息会出现在类的右侧，确认这就是你想要子类化的主要 `Drawable` 超类。这与 Eclipse 弹出式辅助对话框中显示包来源的方式类似。


    ![A978-1-4302-5786-8_16_Fig17_HTML.jpg](img/A978-1-4302-5786-8_16_Fig17_HTML.jpg)


    图 16-17. 将类命名为 `ImageRoundingDrawable` 并选择 `android.graphics.drawable.Drawable`
    超类


    在你找到并选择了 `Drawable` 超类后（如图 16-17 右侧所示），点击 **确定** 按钮，这将返回到你的“新建 Java 类”对话框，你终于可以点击
    **完成** 按钮来创建 `public class ImageRoundingDrawable extends Drawable` 引导代码，以及其中 Android
    希望你在你的 `Drawable` 子类中实现（或至少存在）的四个方法。


    正如你在图 16-18 所示的空引导 `Drawable` 子类框架中看到的，Eclipse 为你编写了近二十多行 Java 代码，为你提供了一个初始框架，你可以在此基础上构建
    `Drawable` 子类，这正是你接下来要做的。


    除了 `package` 语句之外，还提供了三个 `import` 语句，它们支持在你的 `Drawable` 子类中对类（`extends`）和方法（参数对象）的使用。这些包括
    `Canvas`、`ColorFilter` 和 `Drawable` 类，我们在本书的某个阶段已经详细介绍了这些类。接下来，你会看到 `ImageRoundingDrawable`
    类声明，其中包含四个 `@Override` 方法，如果实现了这些方法，它们将覆盖 `Drawable` 超类中的同名方法。


    其中两个方法，`.draw()` 和 `.getOpacity()`，你将通过实现你自己的 Java 代码来升级，以控制你的 `Drawable` 的不透明度，并精确指定它将如何绘制到
    `Canvas` 上。


    另外两个方法，`.setAlpha()` 和 `.setColorFilter()`，在此练习中不会被实现，因为你的 `ImageRoundingDrawable`
    不会用到它们。


    ![A978-1-4302-5786-8_16_Fig18_HTML.jpg](img/A978-1-4302-5786-8_16_Fig18_HTML.jpg)


    图 16-18. 检查 `ImageRoundingDrawable` Drawable 子类引导代码及其四个方法


    接下来，你将开始添加对象声明，并为你自定义的 `Drawable` 子类构建构造器类。你将首先声明一个 `Paint` 对象，稍后将用它来在 `Canvas`
    对象上绘制 `Bitmaps`。


    ## 创建用于绘制 Drawable 画布的 Paint 对象


    你要添加的第一件事，是在 `ImageRoundingDrawable` 类定义的第一行，声明一个 `Paint` 对象变量。这是通过以下简单的 Java
    代码语句完成的：


    `private Paint paintObject;`


    你将使用 `private` 访问控制，以便只有你的 `ImageRoundingDrawable` 类能够访问和利用这个即将被自定义的 `Paint` 对象。


    如图 16-19 所示，你需要鼠标悬停并选择导入 `Paint` 类的选项，该类属于 `android.graphics` 包。完成此操作后，你将能够开始实现你的
    `ImageRoundingDrawable()` 构造器方法，该方法将结合 `Canvas` 和 `Bitmap` 类来使用这个 `Paint` 对象，就像你在第
    11 章中处理 PorterDuff 图像混合模式时看到的那样。


    ![A978-1-4302-5786-8_16_Fig19_HTML.jpg](img/A978-1-4302-5786-8_16_Fig19_HTML.jpg)


    图 16-19. 声明一个名为 `paintObject` 的私有 `Paint` 对象，供 `ImageRoundingDrawable()` 构造器使用


    接下来，让我们声明你的构造器方法，如图 16-20 所示，使用与你的 `ImageRoundingDrawable` 类名完全相同的名称，并使用 `public`
    访问控制修饰符标识，以便它能够被你的 `GraphicsDesign` 项目和包中的其他类访问。你将使用一个 `sourceImage` `Bitmap`
    对象作为传递到方法中的参数，这允许你指定想要进行圆角处理的图像。创建这个空构造器方法的代码如下：


    `public ImageRoundingDrawable(Bitmap sourceImage) { 构造器代码写在这里 }`


    ![A978-1-4302-5786-8_16_Fig20_HTML.jpg](img/A978-1-4302-5786-8_16_Fig20_HTML.jpg)


    图 16-20. 创建一个带有 `sourceImage` `Bitmap` 对象参数的公共 `ImageRoundingDrawable` 构造器方法


    如图 16-20 所示，你需要鼠标悬停你的 `Bitmap` 类引用，并选择 **导入 Bitmap (`android.graphics`)** 选项。注意类顶部的
    `Paint` 导入语句，这是你在上一步执行了完全相同的工作流程后得到的结果。

