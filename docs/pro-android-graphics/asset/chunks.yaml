- fmt: '# 3. Android Frame Animation: XML, Concepts, and Optimization


    **Abstract**


    In this third chapter, we will take a close look at how digital images are utilized
    to create frame-based animation in the Android operating system. We will build
    upon the key concepts that you learned about in the previous two chapters, as
    all of the digital imaging characteristics you learned about in Chapter 1 apply
    equally well to frame-based animation.


    In this third chapter, we will take a close look at how digital images are utilized
    to create frame-based animation in the Android operating system. We will build
    upon the key concepts that you learned about in the previous two chapters, as
    all of the digital imaging characteristics you learned about in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html)
    apply equally well to frame-based animation.


    Like digital video, frame-based animation is a series of numbered digital images.
    For this reason, many of the key concepts that you learned about in [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html)
    also apply to frame-based animation. Thus, we are covering these initial graphics
    design topical chapters in the most logical order!


    A combination of this knowledge from [Chapters 1](#A978-1-4302-5786-8_1_Chapter.html)
    and [2](#A978-1-4302-5786-8_2_Chapter.html) is needed when we consider frame-based
    animation compression, and thus, this chapter will focus once again on digital
    image compression codecs and the proper way to get the smallest possible data
    footprint using the optimal new media data file format and framerate for the best
    end result.


    We will take a look at exactly how your frame-based animation needs to be set
    up inside of the Android OS, using XML and an `<animation-list>` XML Tag Parent
    Container. An `<animation-list>` tag allows individual animation frames to be
    added into your XML-based 2D frame-based animation multimedia assets.


    We will also take a look at how to wire these XML frame animation data definitions
    up to your Java programming logic in your application code. We will do this by
    actually creating the splash screen frame animation asset for your graphics design
    project using only nine image frames of a 3D logo!


    ## Frame Animation Concepts: Cels, Framerate, and Resolution


    Frame-based animation could also be called cel-based animation because of the
    original 2D animation created by Walt Disney. Disney animators drew on what at
    that time were called cels in order to represent each individual frame in their
    cartoon animation.


    Later on, with the advent of film, the term frames replaced the term cels for
    the most part. This was because analog film projectors displayed 24 frames per
    second of film. These frames of film were played via large reels of sequential
    film that was run through a film projector in the theater’s projection room above
    the audience.


    The technical term for digital frame-based animation is raster animation, as the
    frames or cels are made up of collections of pixels, also known as raster images.
    Raster images are also commonly called bitmaps, and in fact there is a bitmap
    (`BMP`) file format in Microsoft Windows, although this digital image file format
    isn’t currently supported within the Android OS.


    For this reason, raster animation is also commonly called bitmap animation in
    the multimedia production industry. I will utilize these various terms interchangeably
    throughout this book, so that you will get used to using all of these different
    (but accurate) terms to refer to your frame-based 2D animation, which uses digital
    imagery to produce the 2D animation.


    Android supports the same open source digital image data file formats that you
    use for 2D images in your application for usage within the frame-based animation
    asset. If you think about it, this is logical, as a 2D animation is defined by
    using those individual digital images as a foundation.


    The significance of this is that we can use indexed color images in order to create
    an 8-bit frame animation, using the `PNG8` or `GIF` formats. We can also use truecolor
    imagery to create 24-bit or 32-bit frame animation, by using the `PNG24`, `PNG32`,
    or `JPEG` digital image data file formats.


    As with the digital image data file formats, Android prefers a `PNG` data format
    over a `GIF` or `JPEG` format for use in frame-based animation. This is due to
    its lossless image quality and reasonably good image compression results, which
    will yield a high quality user experience given a capable developer.


    It is also important to note here that Android does not currently support Animated
    `GIF`, also known as `animGIF`, or `aGIF`, as a file format.


    There are some work-arounds being discussed online until support for this format
    is added to Android, but given that a `PNG8` gives better compression results,
    and defining frames via XML and controlling them via Java gives us far more control
    over the end results that we are trying to achieve, I am going to focus on currently
    supported Android solutions and methodologies in this edition of the book.


    So, until Android adds this support, your best bet is to use digital video or
    frame-based animation, which is why we’re covering these two topics in such fine
    detail very early on in this book, as we’ll be using them often and in many different
    ways throughout this book.


    This selection of several mainstream digital image file formats gives us a decent
    amount of latitude to be able to optimize our frame animation data footprint;
    due to the `PNG32` support, it also allows us to implement robust image compositing
    work processes by utilizing alpha channel transparency.


    Image compositing and data footprint optimization will become veritable cornerstones
    in your Pro Android 2D Graphics Design work process, as you will see throughout
    this book, as we leverage codecs, alphas, and blending.'
