    ## Summary


    In this fourteenth chapter, you learned how to use only Java code, and no XML
    markup, to implement your splash screen frame animation in Android OS via methods
    and constructors from the `AnimationDrawable` class.


    We started out by looking at Android’s `AnimationDrawable` class itself, and how
    it is a direct subclass of the `DrawableContainer` class. You have seen how it
    contains your animation frames, durations, and looping parameters, as well as
    methods to start and stop your frame animation playback cycle.


    Next, we covered the `DrawableContainer` class, which you can use to create `Drawable`
    objects that are contained in `DrawableContainer` object structures with other
    closely-related `Drawable` objects.


    Examples include frames in an animation, or `AnimationDrawable`s, or states and
    levels of a graphic object, such as are found in the `StateListDrawable` class
    and in the `LevelListDrawable` class.


    Then, you dove right into re-creating your application’s splash screen frame animation
    using only Java code. You removed all of the code referencing your XML definition,
    and started over from scratch, creating an all-new method named `setUpAnimation()`
    to set up your `AnimationDrawable` object.


    You also created an `animStart` class implementing the `Runnable` interface and
    `.run()` method, so that a frame animation will start running automatically when
    your application launches.


    You learned about the Java `Runnable` and `.run()` method, and the Android `Handler`
    class and the `.post()` method. We went over processes and `Thread` objects and
    `MessageQueue` objects to see how all of that works in the Android OS.


    Next, instead of using `Runnable` and `.run()` to auto-start your animation, you
    implemented event handling code, which allows you to trigger the animation playback
    using Click and eventually Long-Click events.


    You saw how to use event handling with both looping, or `.setOneShot(false)`,
    as well as play it once, or `.setOneShot(true)`, animation configurations.


    You learned how to configure your `AnimationDrawable` object in Java to get a
    seamless-loop, one-time, Frame-1-to-Frame-1 (resting place) result. You also saw
    how to modify your code to be able to Long-Click and top the animation cycle without
    it hanging the logo on any frame other than its front-facing first frame.


    In the next chapter, you will learn how to use the `Animation` class for implementing
    procedural, or vector, animation inside the Android OS. This will allow you to
    take your Android digital-image-based frame animation that you re-created in this
    chapter and finish implementing the translate, rotate, scale, and alpha procedural
    animation special effects that you created via XML back in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html)
    to combine with your frame-based PAG logo animation.


    This will take your current Android 2D animation knowledge base to an even more
    advanced level as you will be implementing a complex procedural frame-based animation
    combination implemented using only Java programming logic.


    # 15. Procedural Animation: Using the Animation Classes


    Abstract


    In this fifteenth chapter, we will take a detailed look at the Java coding side
    of implementing procedural animation within Android. We examined the concepts
    behind procedural animation, and how to set up a procedural animation using an
    XML definition file work process, back in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html).
    I did this early in the book because I thought that you should at least be able
    to get basic procedural animation running inside your application early on in
    your professional Android graphics design work process.


    The task we’re going to focus on in this chapter is how to implement the procedural
    animation “moves” that we implemented in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html),
    but now using only Java code and zero XML. This is a bit more advanced than the
    way in which we implemented procedural animation for your application splash screen
    back in [Chapter 4](#A978-1-4302-5786-8_4_Chapter.html), as Java code is generally
    far more complicated due to its compact, chained code structures than XML markup
    will ever be, no matter how complex your XML nested structure may become.


    Doing everything with Java methods will allow you to see how the methods available
    in the `Animation` class and its `five` subclasses work. The `Animation` class
    is the procedural animation superclass for the Android OS. You will be learning
    all about this class and `Animation` objects, as well as how to implement procedural
    animation functions using only the Java side of your Android application’s graphics
    programming logic.


    We are doing this so that if you wish to add other Java code functionality in
    with, or around, your procedural animation’s Java programming pipeline, everything
    that you are doing using your procedural animation processing pipeline will be
    implemented 100% within the Java programming language.'
