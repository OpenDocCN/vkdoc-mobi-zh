- fmt: '# Analyzing Target Resolution Compression Ratio Results


    Now that you have created compressed `.MP4` files using your uncompressed `.AVI`
    files, you can calculate the compression ratios and percentage compressed to see
    which resolution yields the superior compression results. As you will see, higher
    resolutions give slightly better results. You also need to look at the digital
    video asset file size as well when making a decision. Table [18-1](#A978-1-4302-5786-8_18_Chapter.html#Tab1)
    collects the results of the calculations; you could do something similar in your
    studio using a spreadsheet, such as the open source `OpenOffice Calc 4.0`, available
    at [www.openoffice.org](http://www.openoffice.org).


    **Table 18-1.** Industry Standard Hardware Screen Resolutions, Original Data Size,
    Compressed Size, and Ratios


    | Resolution | Original Data | Compressed | Compression Ratio | Percentage | Screen
    Orientation |

    | --- | --- | --- | --- | --- | --- |

    | 640x360 | 270MB | 2.5MB | 108:1 | 0.93% | Landscape |

    | 800x480 | 450MB | 3.8MB | 119:1 | 0.84% | Landscape |

    | 1024x600 | 720MB | 5.0MB | 143:1 | 0.70% | Landscape |

    | 1280x720 | 1080MB | 7.5MB | 143:1 | 0.70% | Landscape |

    | 1920x1080 | 2430MB | 9.9MB | 243:1 | 0.41% | Landscape |

    | 360x640 | 270MB | 2.5MB | 108:1 | 0.93% | Portrait |

    | 480x800 | 450MB | 3.8MB | 119:1 | 0.84% | Portrait |

    | 600x1024 | 720MB | 5.0MB | 143:1 | 0.70% | Portrait |

    | 720x1280 | 1080MB | 7.5MB | 143:1 | 0.70% | Portrait |

    | 1080x1920 | 2430MB | 10 MB | 243:1 | 0.41% | Portrait |


    What you want to look for is the best compression ratio, plus the smallest file
    size, with a resolution that has enough pixels to scale either up or down with
    good quality. Besides the 243:1 compression that the True HD is obtaining, I am
    leaning towards the 5MB WSVGA compression result. A 243:1 result for this 1920
    resolution makes me suspect that this codec has some additional optimizations
    for HD resolution, the resolution 99% of users of this product will be using the
    codec with for their mainstream video work!


    I''d choose WSVGA as 1024 scales up to 1920 (or 2048) resolution screens by an
    even factor of 2X, is close to 1280 resolution, and will scale down to any other
    resolution with great quality. Add to this the fine dot pitch of most Android
    devices, which tend to be HDPI and hide any scaling artifacts, and you have 400
    frames of 3D animation using only 5MB, or 13KB per frame.


    A video file of 5MB represents 10% of the total file size for your maximum 50MB
    Android APK file size limitation, so that is fairly reasonable for a splash screen
    background video plate.


    It is important to note that you can also have your applications access up to
    two additional external data files of up to 2GB each, so if the app has a ton
    of captive video, it is not really an issue (problem) as long as you optimize
    your video well.


    Let''s try one more thing regarding this 1024x600 target resolution. Create an
    HQ (High Quality) preset using the work process you learned during this chapter
    (and [Chapter 2](#A978-1-4302-5786-8_2_Chapter.html)) by selecting the 1024x600
    preset and using the copy icon at the bottom to make a copy of the preset.


    Right-click the copy, and select Edit, and use a higher quality data rate setting
    of 1200 KBPS for the target data rate, and give it 170% headroom to the maximum
    data rate of 2048 KBPS, and let''s see how much data overhead you add to your
    current 5MB file size by using these higher quality settings.


    Import the `PAG1024x600.avi` AVI uncompressed source data and apply this new codec
    preset to it, and then press the `SqueezeIt!` button to compress the MP4 file.
    If you can get even more quality out of the file in under 6MB, Android will have
    an excellent quality video data source to scale up or down from.


    As you can see in Figure 8-23, the MP4 comes in at 5.878 megabytes, so you could
    probably give it a little more quality at the lower (target) end; maybe use a
    1250 or 1280 KBPS target data rate to make sure you have no visible artifacts
    even when you are viewing the data on large (LDPI) screens where pixels are large
    and artifacts are apparent.


    This 1024x600 target resolution should scale up to 1280 or 1920 reasonably well,
    especially on HDPI screens (which are the norm), where pixels are so small that
    artifacts aren''t even visible. Think of it like you are looking at one of the
    massive LED billboards in Las Vegas, while you''re at the CES trade show doing
    your Android-related business. When you are up close, the pixels look terrible,
    but when you are farther away, this same multimedia content looks absolutely pristine.
    These smaller dot pitch displays so commonplace today serve to take your eye farther
    away from the content.


    As you have seen, with 243:1 compression ratios, Sorenson Squeeze has shown that
    it can provide amazing video quality with a small data footprint, and that is
    with an older MPEG-4 codec. Using the newer WebM video codec could provide even
    better results, depending on the video content, of course. It could also provide
    the same or worse results; there is no real way to find out other than going into
    Squeeze and running your uncompressed AVI source file through a codec and seeing
    the results. Let''s do that next.


    # Using the WebM VP8 Codec to Compress Pseudo HD Video


    Let''s go back into Sorenson and try one of the WebM presets for HD 1280x720 resolution
    and 2000 KBPS, which is included with `Sorenson Squeeze Pro`. Right-click this
    preset, and use the Edit command to modify the codec preset to use your target
    1536 KBPS data rate, and, later on, to use your maximum 2048 KBPS data rate. The
    WebM codec does not support the data rate range like the MPEG-4 codec does, so
    you need to test both data rates.


    What you are trying to accomplish here is to see if you can get any smaller of
    a data footprint than you did by using Squeeze''s MainConcept MPEG4 H.264 codec.
    If you can, you might consider using the WebM format, if it gives you a significantly
    lower data footprint. If not, you should use the MPEG4 format as it is supported
    across more versions of Android OS (Pre-2.3 versions). Launch `Sorenson Squeeze`,
    and use the Import File icon on the upper-left to open the `PAG1280x720.avi` uncompressed
    AVI file, as shown in Figure [18-19](#A978-1-4302-5786-8_18_Chapter.html#Fig19).


    ![A978-1-4302-5786-8_18_Fig19_HTML.jpg](A978-1-4302-5786-8_18_Fig19_HTML.jpg)


    **Figure 18-19.** Loading an uncompressed source `PAG1280x720.avi` file and selecting
    a WebM 1280x720p codec


    Once the uncompressed `.AVI` data has loaded, apply the WebM preset that you have
    created, which uses the low-end (target) data rate of 1536 KBPS, as shown on the
    left side of Figure [18-20](#A978-1-4302-5786-8_18_Chapter.html#Fig20). Press
    the `SqueezeIt!` button and code the WebM file, and then either create a new preset
    or edit your existing one (you can right-click the applied codec in the bottom
    area of Squeeze''s main editing view as well, if you like) and create a second
    2048KBPS high-end (maximum) data rate preset. Apply that to your uncompressed
    source and then use the `SqueezeIt!` button to create a 2048KBPS data rate version
    of a WebM file so that you can see what kind of data footprint optimization you
    are getting. It is interesting to note that WebM supports only a "static," or
    unary (single) data rate, and not a range, like the MPEG-4 codec does.


    ![A978-1-4302-5786-8_18_Fig20_HTML.jpg](A978-1-4302-5786-8_18_Fig20_HTML.jpg)


    **Figure 18-20.** Creating a 1536 target data rate WebM preset as well as a 2048
    target data rate WebM preset


    Since you got such a huge compression ratio boost (143:1 to 243:1), between Pseudo
    HD and True HD using the MPEG-4 codec, let''s finally try using True HD video
    source on the WebM codec and see if it gives you the same results.'
