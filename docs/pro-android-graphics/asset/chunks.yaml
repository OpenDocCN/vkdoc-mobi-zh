    within your digital image transition.


    Inside your onClick( ) event handler method, change your `.startTransition( )`
    method call to instead be a `.reverseTransition( )` method call by using the following
    line of Java code:


    `transition.reverseTransition(5000);`


    The code is error-free and can be seen inside Eclipse in Figure [13-17](#A978-1-4302-5786-8_13_Chapter.html#Fig17).


    ![A978-1-4302-5786-8_13_Fig17_HTML.jpg](A978-1-4302-5786-8_13_Fig17_HTML.jpg)


    Figure 13-17.


    Changing the .startTransition( ) method call to .reverseTransition( ) method call
    to ping-pong transition


    Next, use your Run As ➤ Android Application work process, and test your new code
    in the Nexus One emulator. As you can see, now every time you click an ImageButton
    UI element, the 9-patch frame asset will fade in and then fade out, just like
    a Pong animation will do. Using the .StartTransition( ) method, the fade only
    goes in one direction (fade in), so this alternate method call actually gives
    you a great deal of latitude in how you implement the animation of your TransitionDrawable
    objects.


    Next, let’s edit your TransitionDrawable object’s XML definition, and use a normal
    (non-9-patch) image asset in place of the ninepatchframe object. You will edit
    the second <item> tag to reference the bookmark0.png asset file, rather than the
    ninepatchframe.9.png file as it is currently. Click the trans_contents.xml tab
    at the top of Eclipse and make the necessary edits.


    The final trans_contents.xml Transition Drawable object’s XML definition markup
    for these two <item> child tags, shown in Figure [13-18](#A978-1-4302-5786-8_13_Chapter.html#Fig18),
    should appear exactly as follows:


    `<item`


        `android:id="@+id/imageSource"`


        `android:drawable="@drawable/cloudsky" />`


    `<item`


        `android:id="@+id/imageDestination"`


        `android:drawable="@drawable/bookmark0" />`


    ![A978-1-4302-5786-8_13_Fig18_HTML.jpg](A978-1-4302-5786-8_13_Fig18_HTML.jpg)


    Figure 13-18.


    Editing a trans_contents.xml TransitionDrawable definition to change the destination
    image to bookmark


    Now you can use the Run As ➤ Android Application sequence to review the new transition
    image crossfade using the bookmark image asset, which fades in over the cloudsky
    background plate nicely. It is important to note that using PNG32 images, which
    have an alpha channel installed inside them, can really enhance what you can achieve
    with Android image transition code; instead of one image replacing another, much
    more advanced effects can be achieved.


    Now let’s combine image transitions with compositing with your ImageView UI element
    by using both its source (foreground) and background image plates.


    ## Advanced TransitionDrawable Compositing via ImageView


    Let’s go back into your `activity_contents.xml` UI layout definition file and
    edit your <imageview>child tag to change your</imageview> `android:src` parameter
    to use your `ninepatchframe` image asset as the foreground image plate, and then
    add an `android:background` parameter that references your `trans_contents.xml`
    XML TransitionDrawable object definition, as shown in Figure [13-19](#A978-1-4302-5786-8_13_Chapter.html#Fig19).


    ![A978-1-4302-5786-8_13_Fig19_HTML.jpg](A978-1-4302-5786-8_13_Fig19_HTML.jpg)


    Figure 13-19.


    Changing the android:src parameter to a ninepatchframe and android:background
    to trans_contents


    Next, go into your `ContentsActivity.java` Activity subclass editing tab, and
    change your `.setImageDrawable(transition)` method call and its parameter to `.setBackground(transition)`
    so that it now sets up your TransitionDrawable object as (in) your background
    plate, rather than your foreground (source) image plate for your ImageView object.
    This is shown in Figure [13-20](#A978-1-4302-5786-8_13_Chapter.html#Fig20).


    ![A978-1-4302-5786-8_13_Fig20_HTML.jpg](A978-1-4302-5786-8_13_Fig20_HTML.jpg)


    Figure 13-20.


    Changing the ImageView object .setImageDrawable( ) method call to a .setbackground(
    ) method call


    Now let’s test this more advanced use of the TransitionDrawable object with three
    image assets, two of which use alpha channels, and one of which is a 9-patch asset.
    We’re throwing everything that we can at TransitionDrawable to see if it can handle
    it: foreground and background image plates, 9-patch image assets, 32-bit PNG images
    with 8-bit alpha channel—all triggered using a multi-state ImageButton.


    As you can see in Figure [13-21](#A978-1-4302-5786-8_13_Chapter.html#Fig21), all
    of these new code and image assets are working well together as expected, using
    the ninepatchframe.9.png image asset as the new foreground image plate overlaying
    the TransitionDrawable, which is now installed in the background image plate of
    the ImageView UI object, and fading in and out at each click of the ImageButton
    UI element.


    ![A978-1-4302-5786-8_13_Fig21_HTML.jpg](A978-1-4302-5786-8_13_Fig21_HTML.jpg)


    Figure 13-21.


    Testing your ImageView foreground and background image composite with your TransitionDrawable


    As you can see, the TransitionDrawable object animated image asset can be used
    as a foreground (source image plate) graphics design element or as a background
    graphics design element for any Android ImageView class (this includes ImageButton),
    so make sure to use this amazing power creatively in your future Android applications
    graphics design.


    As you get more advanced as you move through this book, keep in mind that everything
    that you have learned (and will be learning) can be utilized in conjunction with
    each other using the correct XML markup and Java coding constructs. This includes
    layers, PorterDuff blending and transfer modes, alpha channels (PNG32), 9-patches,
    animation, digital video, and much more!'
