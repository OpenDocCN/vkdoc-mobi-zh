  trans: '

    # Android View 类：UI 组件的基础


    Android `View` 类是 `java.lang.Object` 类的直接子类，它定义了显示屏上一个称为视图的区域，其核心属性由 View 超类定义。该
    View 超类属于 `android.view` 包，并通过 `import android.view.View` 这条 Java 代码语句导入到您的应用中。


    Android 中的 View 对象在用户的显示屏上占据一个矩形区域；它负责向该屏幕区域进行绘制，并处理该区域中发生的交互事件。


    这个 View 超类不会被直接使用，但可用于创建其他子类，这些子类随后可在您的 Android 应用中使用。目前已经存在非常多的 View 子类，因此您很可能无需自行进行任何这类编程工作！您只需找到并使用提供所需功能的
    View 子类，然后根据您的应用开发需求导入并使用该 View 子类即可。


    View 类对于图形设计师尤其有价值，因为它为 Android 操作系统中的用户界面组件提供了基本的构建块。UI 组件（或者，作为图形设计师，我喜欢称之为
    UI 元素）在 Android 生态系统中被称为“组件”。View 有许多专门的组件子类，充当 UI 控件，能够包含并显示文本、图片、视频、动画或其他内容。


    由于 View 类是构建组件的基础类，而组件用于创建所有交互式 UI 元素（按钮、文本字段等），因此在您的 Android 应用开发图形设计经历中，您会经常看到类名
    View，所以请熟悉 View。


    您已经了解到，ViewGroup（View 的子类）是一个用于创建布局容器的基类，这些容器是那些容纳所有 View（或嵌套的 ViewGroup）并定义其布局属性的不可见容器。ViewGroup
    对象正如其名：一组 View 对象！从这个意义上说，Android 屏幕上的所有内容最终都可以归结为父 ViewGroup 容器内的一个 View 子对象。


    多年来，为 Android 开发了非常多的 UI 组件，它们被捆绑在 Android 中一个名为 `android.widget` 包的 Java 包中。如果您想查看该包中的所有当前组件，可以访问
    Android 开发者网站上组件包摘要页面，网址如下：


    [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


    您可以通过两种方式添加 Android View 对象：使用 Java 代码，或者使用一个或多个包含布局容器父标签的 XML 文件来指定一组 View 对象。后一种方式（使用
    XML UI 描述）是定义 Android 应用用户界面设计更常见（也更简单）的方法，也是本书中您将采用的 UI 设计方式。


    ## View 基本属性：ID、布局定位和尺寸


    一旦您定义了包含子 UI 元素（View 对象）的布局容器（ViewGroup），正如上一章所做的那样，您首先要做的通常就是使用 Android 参数来定义子
    UI 组件 View 对象的属性。正如您已经看到的，Android 中的参数总是以 `android:` 开头。


    如果您好奇原因，这是由于在 Android 编写的每个 XML 文件定义中，父容器里都有那个 `xmlns:android` XML 命名空间参数。该参数指定了指向当前
    XML 定义的路径，该定义保存在一个中央仓库中，位置位于


    [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)


    因此，`xmlns:android` 参数实际上是在说：“无论你在哪里看到 `android:`，都要将其展开为路径 [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)，以便为此
    XML 文件中的任何给定参数提供指向最新且集中的 XML 参数定义的直接引用。”


    所以，您的 `android:layout_weight` 参数在 Android 操作系统中实际被视为


    [`http://schemas.android.com/apk/res/android:layout_weight`](http://schemas.android.com/apk/res/android:layout_weight)


    现在您确切知道 XML 文件中发生了什么，以及为什么每个添加的父标签都需要那个 XMLNS 参数，以及为什么没有它 Eclipse 会抛出错误（“此参数不存在”错误）。


    如果您因任何原因要从 Java 代码中引用任何 View（这包括 ViewGroup 父标签以及 View 组件子标签），则需要使用 `android:id`
    参数为组件（View 对象）分配一个 ID。这样做是为了能够使用 `findViewById()` 方法，该方法用于将您正在编写的 XML 用户界面元素定义与您在
    Java 代码中实例化的 Java 对象连接起来，以“填充”您的 XML 定义，从而填充 Java 对象中的字段。Android 中的 `findViewById()`（View）和
    `inflate()`（Menu）方法用于“桥接”您的 XML 标记和 Java 程序逻辑。


    用对象属性的 XML 定义来填充 Java 对象，在 Android 操作系统术语中通常称为填充该对象。


    ID 参数不是必需的，因此如果您不打算在 Java 代码中引用该 View 对象，则不必费心使用 `android:id` 标签来定义它。一个很好的例子是使用
    `TextView` 元素（View），它被包含在 UI 设计中仅仅是为了在屏幕上放置一个文本标签，并在 XML UI 布局定义中定义，但在 Android
    应用中没有交互使用。您在上一章的 XML UI 定义中观察到了这一点。


    另一方面，其他参数如 `layout_width` 和 `layout_height`，则始终需要为每个 View 对象的 XML 标签进行定义。


    在您为 View（子标签）指定 ID 参数后，通常需要为其设置高度和宽度的布局定位参数。这些参数通常被分配两个常量之一：`match_parent` 或 `wrap_content`。


    这样 Android 就可以为您进行定位。您也可以使用像素或 DIP 值，但请记住我们在第 5 章中的讨论，尽可能使用 Android 系统布局常量。对于您
    ViewGroup 布局容器中包含的每个 UI 组件（View 对象），始终需要提供这两个参数。


    View 对象的大小使用宽度和高度来表示；但是，如果开发者已经设置了布局定位参数，则很少需要再指定这些参数，因为 Android 会为您处理。

    '
- fmt: 'In fact, Android OS internally tracks two pairs of width and height values
    for each `View` object. The first pair of values is known as measured width and
    measured height. Your measured width and height dimensions will define how big
    your `View` object wants to be inside its parent container. These measured dimensions
    can be obtained by calling the `.getMeasuredWidth()` and `.getMeasuredHeight()`
    methods on any given `View` object that has an ID that allows it to be referenced
    (to call methods on it) from within Java logic.


    The second pair is known as width and height, or to be more exact, drawing width
    and drawing height. These drawing dimensions will define the actual size of a
    `View` on screen, at drawing time, and after layout calculations. The drawing
    width and drawing height values may be, but do not have to be, different from
    the measured width and measured height values. The drawing width and drawing height
    can be obtained at runtime in your Java code by calling the `.getWidth()` and
    `.getHeight()` methods on any given `View` object.


    To measure a `View` dimension, a `View` will always take into account padding.
    We’ll be covering padding and margins in the next section of this chapter.


    Padding is expressed in DIP for the left, top, right, and bottom portions of a
    `View`. Padding is used to space the content of a `View` by a certain amount of
    pixels. Even though a `View` subclass can define padding, it does not have support
    for a margin. However, Android `ViewGroup` subclasses can provide a margin parameter,
    and so margins and padding can be defined in `ViewGroups`.


    ## View Positioning Characteristics: Margins and Padding


    To position your UI layout elements relative to each other, there are two key
    classifications of layout parameters, margin and padding, that allow you to fine-tune
    how your UI looks on the display screen.


    The global positioning is done by the Android OS via the `layout_width` and `layout_height`
    constants. This is so that Android OS is able to accommodate different device
    screen sizes, densities, aspect ratios, and orientations.


    The developer is then allowed local UI element positioning control via use of
    the `android:padding` parameters for each child `View` tag UI element. Note that
    this parameter is called `android:padding`, not `android:layout_padding`, so you
    really don’t have to remember “use margins for layouts, and padding for UI elements,”
    as the designation of what they can be used for is built right into the parameter
    name itself! Since `android:padding` is not named `android:view_padding`, you
    know that padding parameters can be used for both the `View` (widget) and `ViewGroup`
    (layout container) subclass types.


    Since there are less places that you can use margins, and since you have already
    experienced using them in previous chapters, let’s start with those first. Margins
    push what they are assigned to away from themselves on the outside of the container,
    whereas padding does the opposite and pushes the boundaries of the container away
    from what is contained inside it. You will see this in detail during this book
    as you used both types of spacing parameters to achieve various types of graphic
    design end results.


    There are four different margin setting parameters: `layout_marginBottom`, `layout_marginTop`,
    `layout_marginLeft`, and `layout_marginRight`. There is also a fifth option simply
    called `layout_margin`, which will set all four sides of margin with one single
    DIP value, providing evenly spaced margins all the way around your layout container.


    Starting in Android 4.2 API Level 17 (Jelly Bean), there are two additional margin
    parameters, `layout_marginStart` and `layout_marginEnd` parameters. These “start”
    and “end” margin parameters were added as part of Android’s support for right-to-left
    (RTL) design layouts for cultures that scan the screen from the right to the left,
    rather than from the left to the right.


    For RTL screen design flows, `layout_marginStart` is equal to `layout_marginRight`,
    and `layout_marginEnd` is equal to `layout_marginLeft`.


    For left-to-right (LTR) screen design flows, `layout_marginStart` is equal to
    `layout_marginLeft`, and `layout_marginEnd` is equal to `layout_marginRight`.


    For detailed information on margin layout parameters, read the Android Developer
    web site `ViewGroup.MarginLayoutParams` page at the following URL:


    [`developer.android.com/reference/android/view/ViewGroup.MarginLayoutParams.html`](http://developer.android.com/reference/android/view/ViewGroup.MarginLayoutParams.html)


    Just like with margin, Android has four different types of padding setting parameters:
    `android:paddingBottom`, `android:paddingTop`, `android:paddingLeft`, and `android:paddingRight`.
    There is also a fifth short-cut option, simply called `android:padding`, that
    will set all four sides of padding with one single DIP value, providing evenly
    spaced padding all the way around your `View` object’s content.


    Starting in Android 4.2 API Level 17 (Jelly Bean), there are two additional padding
    parameters, `android:paddingStart` and `android:paddingEnd`. These “start” and
    “end” padding parameters were added as part of Android’s support for RTL design
    layouts for cultures that scan the screen from the right to the left, rather than
    from the left to the right.


    For RTL screen design flows, `android:paddingStart` is equal to `android:paddingRight`,
    and `android:paddingEnd` is equal to `android:paddingLeft`.


    For left-to-right (LTR) screen design flows, `android:paddingStart` is equal to
    `android:paddingLeft`, and `android:paddingEnd` is equal to `android:paddingRight`.


    For detailed information regarding the view padding parameters, read the Android
    Developer web site `View` superclass page at the following URL:


    [`http://developer.android.com/reference/android/view/View.html`](http://developer.android.com/reference/android/view/View.html)


    Next, you’ll take a look at the parameters that allow you to control how your
    `View` widgets utilize your graphics design assets, as well as composite with
    your graphics design (drawable) assets (imagery and animation) and digital video
    assets.'
