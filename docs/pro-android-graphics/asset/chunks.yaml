    is to create this hovered image asset!


    To accomplish this, you will need to again utilize your File ➤ Export work process,
    shown back in Figure [9-4](#A978-1-4302-5786-8_9_Chapter.html#Fig4), and this
    time you will use a different file name, again using only lowercase letters and
    underscore characters, as Android OS requires, to name your image asset imagebutton_hovered.png,
    as shown in Figure [9-7](#A978-1-4302-5786-8_9_Chapter.html#Fig7) at the top of
    the screen shot (highlighted in blue).


    Once you click the Export button, you will again get the settings dialog where
    you can select your Save color values from transparent pixels option. Then, click
    the Export button to create your hovered ImageButton state digital image asset,
    shown in 360 pixel resolution in Figure [9-6](#A978-1-4302-5786-8_9_Chapter.html#Fig6).


    ![A978-1-4302-5786-8_9_Fig7_HTML.jpg](A978-1-4302-5786-8_9_Fig7_HTML.jpg)


    Figure 9-7.


    Using an Export Image dialog to export the imagebutton_hovered.png ImageButton
    hover state asset


    The next ImageButton state that you need to create is the pressed state. A color
    change to the bookmark icon in the center of the ImageButton happens when the
    user touches (or clicks and holds, known as a mouse-down event) a button UI element.
    The color change will be created via the Hue-Saturation tool in GIMP. This tool
    is located under the GIMP Colors menu, and the Hue dialog is shown on the left-hand
    side of the screen shot in Figure [9-8](#A978-1-4302-5786-8_9_Chapter.html#Fig8).


    Make sure that your bottom layer is selected, as shown in gray in Figure [9-8](#A978-1-4302-5786-8_9_Chapter.html#Fig8),
    before you invoke and apply this Hue-Saturation tool, or you will end up color
    shifting one of your “UI hoop” compositing elements instead of your bookmark icon.
    If this happens, you can always use the Edit ➤ Undo feature.


    ![A978-1-4302-5786-8_9_Fig8_HTML.jpg](A978-1-4302-5786-8_9_Fig8_HTML.jpg)


    Figure 9-8.


    Using the Colors ➤ Hue-Saturation dialog to shift the ImageButton_Bookmark layer
    Hue 180 degrees


    I chose to shift the Hue 180 degrees, but you can use any color shift that you
    like, as long as it looks good with the golden outer ring UI element.


    Once you click the OK button, which will apply this new Hue color shift to your
    bookmark icon’s layer, use your File ➤ Export work process to access the Export
    Image dialog shown in Figure [9-9](#A978-1-4302-5786-8_9_Chapter.html#Fig9), and
    export the asset using the name `imagebutton_pressed.png` in a folder used for
    high-resolution density image assets in Android (/workspace/GraphicsDesign/res/drawable-xhdpi).


    ![A978-1-4302-5786-8_9_Fig9_HTML.jpg](A978-1-4302-5786-8_9_Fig9_HTML.jpg)


    Figure 9-9.


    Using an Export Image dialog to export an imagebutton_pressed.png ImageButton
    pressed state asset


    Now you only have one of the four ImageButton states that you need to create left,
    the focused ImageButton state. You can do this using the three layers that you
    have in your composite, in a different combination of layer assets.


    You will accomplish this by simply turning off the layer visibility for the ImageButton_Gold.png
    layer, by using the eye icon at the left side of the layer. Click this eye icon
    now, so that the eye disappears, as shown in the Layers - Brushes palette on the
    right-hand side of the screen shot in Figure [9-10](#A978-1-4302-5786-8_9_Chapter.html#Fig10).
    The result is an entirely new button state.


    What will happen when you do this is that the `ImageButton_Silver.png` layer will
    now be visible, and you’ll have an all new ImageButton focused state, which uses
    a color-shifted bookmark icon base that you used for the pressed button state
    along with the silver button hoop that you used for the normal button state. As
    you can see in Figure [9-10](#A978-1-4302-5786-8_9_Chapter.html#Fig10), this looks
    very professional.


    It is very important to note that layer visibility can be very useful when creating
    different versions of image composites, such as you are doing here with these
    ImageButton state assets. This is due to the fact that when you export your final
    image composite, the layers that are visible will be the ones that will be used
    to create the digital image composite result, which will be the final pixels used
    to create a flat (single layer) image asset.


    ![A978-1-4302-5786-8_9_Fig10_HTML.jpg](A978-1-4302-5786-8_9_Fig10_HTML.jpg)


    Figure 9-10.


    Using the visibility (eye) icon to turn off the ImageButton_Gold composite layer
    to create focused state


    Now you’re ready to use a File ➤ Export menu sequence to access the Export Image
    dialog, shown in Figure [9-11](#A978-1-4302-5786-8_9_Chapter.html#Fig11), to create
    your `imagebutton_focused.png` ImageButton focused state asset. If you want to
    see a preview of how these image assets will work, you can click the imagebutton_
    file names shown in the center of the Export Image dialog, and watch a preview
    on the right that will change in real time, essentially emulating how your ImageButton
    state assets are going to work (look) in your Android Nexus One emulator. Now
    all you have to do is type in your `imagebutton_focused.png` file name, and click
    the Export button once you set the file export option, which you are getting comfortable
    with due to the repetitive nature of this process.


    ![A978-1-4302-5786-8_9_Fig11_HTML.jpg](A978-1-4302-5786-8_9_Fig11_HTML.jpg)


    Figure 9-11.


    Using an Export Image dialog to export a imagebutton_focused.png ImageButton focused
    state asset'
  trans: '

    一旦“导出图像”对话框打开，请使用左侧的导航窗格找到你的“用户”文件夹和系统名称文件夹（我的文件夹是 `Default.Default-PC`）。在该文件夹下，你应该能看到用于
    Eclipse ADT 开发项目的 `/workspace` 文件夹。接着在该文件夹下找到你的 `/GraphicsDesign` 文件夹，然后导航到资源（`/res`）文件夹，并在其下方找到你的
    `/drawable-xhdpi` 图像资源文件夹，如图 9-5 所示。接下来，在“名称”字段中输入一个全小写的 `imagebutton_normal.png`
    文件名，然后点击对话框右下角的“导出”按钮来创建文件。


    ![A978-1-4302-5786-8_9_Fig5_HTML.jpg](img/A978-1-4302-5786-8_9_Fig5_HTML.jpg)


    图 9-5. 使用“导出图像”对话框保存 `imagebutton_normal.png` ImageButton 正常状态资源


    点击“导出”按钮后，你会看到一个带有导出选项的“导出图像为 PNG”对话框，如图 9-5 右侧所示。我只需使用“保存透明像素中的颜色值”选项，以确保所有 Alpha
    通道的细微差别都能与 ARGB 图像数据一起正确保存。


    现在，你已经准备好创建下一个 ImageButton 悬停状态的图像资源了。再次使用“文件 ➤ 作为图层导入”工作流程，如图 9-2 所示。这次打开 `ImageButton_Gold.png`
    合成资源，该资源会将其自身放置在 `ImageButton_Silver.png` 资源上方的合成图层中，如图 9-6 右侧的“图层”面板所示。


    ![A978-1-4302-5786-8_9_Fig6_HTML.jpg](img/A978-1-4302-5786-8_9_Fig6_HTML.jpg)


    图 9-6. 使用“文件 ➤ 作为图层打开”将 `ImageButton_Gold.png` 图像资源添加到合成图层


    如你所见，这会覆盖或替换银色环的像素（这些像素仍然存在于第二层中，但现在已被第三层遮挡），因此你无需关闭第二层的可见性（或许你正感到疑惑，这可以通过点击图层左侧的眼睛图标来实现）。你刚刚创建了悬停
    ImageButton 状态，即如果用户有鼠标或悬停能力，当用户将鼠标（焦点）移动到该按钮上时，按钮周围的圆环会从银色变为金色。现在，你所要做的就是创建这个悬停图像资源！


    为此，你需要再次使用“文件 ➤ 导出”工作流程，如图 9-4 所示。这次你将使用一个不同的文件名，同样只使用小写字母和下划线字符（这是 Android 操作系统所要求的），将你的图像资源命名为
    `imagebutton_hovered.png`，如图 9-7 截图顶部所示（以蓝色高亮显示）。


    点击“导出”按钮后，你将再次看到设置对话框，在其中你可以选择“保存透明像素中的颜色值”选项。然后，点击“导出”按钮创建你的悬停 ImageButton 状态数字图像资源，如图
    9-6 所示，分辨率为 360 像素。


    ![A978-1-4302-5786-8_9_Fig7_HTML.jpg](img/A978-1-4302-5786-8_9_Fig7_HTML.jpg)


    图 9-7. 使用“导出图像”对话框导出 `imagebutton_hovered.png` ImageButton 悬停状态资源


    你需要创建的下一个 ImageButton 状态是按下状态。当用户触摸（或点击并按住，即鼠标按下事件）一个按钮 UI 元素时，ImageButton 中心的书签图标会发生颜色变化。该颜色变化将通过
    GIMP 中的“色相-饱和度”工具实现。该工具位于 GIMP 的“颜色”菜单下，“色相”对话框如图 9-8 屏幕截图的左侧所示。


    在调用和应用此“色相-饱和度”工具之前，请确保你已选中底层，如图 9-8 中的灰色显示；否则，你最终会改变其中一个“UI 圆环”合成元素的颜色，而不是你的书签图标。如果发生这种情况，你始终可以使用“编辑
    ➤ 撤销”功能。


    ![A978-1-4302-5786-8_9_Fig8_HTML.jpg](img/A978-1-4302-5786-8_9_Fig8_HTML.jpg)


    图 9-8. 使用“颜色 ➤ 色相-饱和度”对话框将 ImageButton_Bookmark 图层的色相偏移 180 度


    我选择将色相偏移 180 度，但你可以使用任何你喜欢的颜色偏移，只要它与金色外环 UI 元素搭配起来好看即可。


    点击“确定”按钮将此新的色相偏移应用到你的书签图标图层后，请使用“文件 ➤ 导出”工作流程访问“导出图像”对话框，如图 9-9 所示，并将资源导出为 `imagebutton_pressed.png`，存放在
    Android 中用于高分辨率密度图像资源的文件夹中（`/workspace/GraphicsDesign/res/drawable-xhdpi`）。


    ![A978-1-4302-5786-8_9_Fig9_HTML.jpg](img/A978-1-4302-5786-8_9_Fig9_HTML.jpg)


    图 9-9. 使用“导出图像”对话框导出 `imagebutton_pressed.png` ImageButton 按下状态资源


    现在，你需要创建的四个 ImageButton 状态中只剩下一个了，即聚焦状态。你可以使用合成图像中已有的三个图层，通过不同的图层资源组合来实现。


    你只需通过点击图层左侧的眼睛图标来关闭 `ImageButton_Gold.png` 图层的可见性，即可完成此操作。现在点击此眼睛图标，使眼睛消失，如图 9-10
    屏幕截图右侧的“图层 - 画笔”面板所示。结果会得到一个全新的按钮状态。


    这样做的结果是，`ImageButton_Silver.png` 图层将变为可见，你将拥有一个全新的 ImageButton 聚焦状态，它使用了你为按下按钮状态所用的颜色偏移书签图标，以及你为正常按钮状态所用的银色按钮环。如图
    9-10 所示，这看起来非常专业。


    非常重要的一点是，在创建图像合成的不同版本时（例如你在此处处理这些 ImageButton 状态资源），图层可见性非常有用。这是因为当你导出最终的图像合成时，可见的图层将是用于生成数字图像合成结果的图层，而这些结果将是用于创建平面（单层）图像资源的最终像素。


    ![A978-1-4302-5786-8_9_Fig10_HTML.jpg](img/A978-1-4302-5786-8_9_Fig10_HTML.jpg)


    图 9-10. 使用可见性（眼睛）图标关闭 `ImageButton_Gold` 合成图层以创建聚焦状态


    现在，你可以使用“文件 ➤ 导出”菜单序列访问“导出图像”对话框，如图 9-11 所示，来创建你的 `imagebutton_focused.png` ImageButton
    聚焦状态资源。如果你想预览这些图像资源的工作效果，可以点击“导出图像”对话框中央显示的 `imagebutton_` 文件名，并观察右侧的预览图像实时变化，这实际上是在模拟你的
    ImageButton 状态资源在你的 Android Nexus One 模拟器中的工作（外观）效果。现在，你只需输入你的 `imagebutton_focused.png`
    文件名，并在设置好文件导出选项后点击“导出”按钮即可——由于此过程的重复性，你对此已驾轻就熟。


    ![A978-1-4302-5786-8_9_Fig11_HTML.jpg](img/A978-1-4302-5786-8_9_Fig11_HTML.jpg)


    图 9-11. 使用“导出图像”对话框导出 `imagebutton_focused.png` ImageButton 聚焦状态资源

