- fmt: '# Adding Menu Items to Access the UI Layout Container


    To really be able to develop a new user interface layout, you need to code a new
    Activity that has a functional screen, rather than using the Splash Screen for
    your application. Before you can code a new Android Activity, you will need to
    be able to access it from your `MainActivity.java` Splash Screen Activity. This
    will be done using an Options Menu, which was added to your app when you created
    a New Android App (blank Activity option), so all you have to do is modify the
    existing Menu XML markup and Java code.


    All you have to do to add a couple new functions to your app is to add some Menu
    items in the XML file in your `/res/menu` folder, and the `MenuInflater` class
    code that is already in your `MainActivity` will inflate those values for you
    and configure your Options Menu object using those parameter values.


    If you want to research the Android `MenuInflater` class further, there is a page
    that covers it on the Android Developer web site at the following URL:


    [`http://developer.android.com/reference/android/view/MenuInflater.html`](http://developer.android.com/reference/android/view/MenuInflater.html)


    Let’s open the Menu XML definition that was created for you in the New Android
    Application series of dialogs by opening the `/res/menu` folder, as shown in Figure
    [6-1](#A978-1-4302-5786-8_6_Chapter.html#Fig1), and right-clicking the `main.xml`
    file inside the folder, and selecting the Open command or pressing the F3 function
    key.


    ![A978-1-4302-5786-8_6_Fig1_HTML.jpg](A978-1-4302-5786-8_6_Fig1_HTML.jpg)


    Figure 6-1.


    Editing your first `<menu>` tag `<item>` tag to make it a Table of Contents options
    menu selection item


    Edit the `android:id` parameter to rename it with what its new function is, `table_of_contents`,
    and also edit the `android:title` parameter to match that as well using the `@string/`
    reference prefix, which tells Android to look in the `/res/values/strings.xml`
    file to find the `<string>` constant definition.


    Once you have this first `<menu>` parent tag `<item>` child tag created, you can
    then create a second menu item simply by copying this entire `<item>` tag structure
    and pasting it underneath itself, as shown in Figure [6-2](#A978-1-4302-5786-8_6_Chapter.html#Fig2).


    ![A978-1-4302-5786-8_6_Fig2_HTML.jpg](A978-1-4302-5786-8_6_Fig2_HTML.jpg)


    Figure 6-2.


    Copying and editing the first `<menu>` parent container `<item>` tag to create
    a second Bookmark menu item


    Let’s do that now, and change the second `<item>` tag’s `table_of_contents` ID
    and menu title (label) references to `bookmark_utility`, so that you have bookmarking
    set up as well for your Pro Android Graphics e-book app. There’s one other change
    you need to make to the `android:orderInCategory` parameter so that the Bookmark
    Utility menu option comes after the Table of Contents menu option. Set a value
    for this parameter to `200`, as shown in Figure [6-2](#A978-1-4302-5786-8_6_Chapter.html#Fig2).


    Now all you have to do is edit the `strings.xml` file in your `/res/values` folder
    to change the existing menu option string constant to read Table of Contents,
    and then copy and paste it underneath itself to change its values to support your
    Bookmark Utility menu option, as shown in Figure [6-3](#A978-1-4302-5786-8_6_Chapter.html#Fig3).


    ![A978-1-4302-5786-8_6_Fig3_HTML.jpg](A978-1-4302-5786-8_6_Fig3_HTML.jpg)


    Figure 6-3.


    Adding `<string>` constants for Table of Contents and Bookmark Utility menu items
    to `strings.xml` file


    Now let’s click the `MainActivity.java` editing tab in Eclipse and take a quick
    look at the code that will inflate your new options menu items XML in your `main.xml`
    file and load it into a Java `Menu` object named `menu`.


    This Java code is shown in Figure [6-4](#A978-1-4302-5786-8_6_Chapter.html#Fig4),
    and uses the `.inflate()` method, into which you will pass the XML `<menu>` parent
    tag structure definition that you created in your `main.xml` file.


    ![A978-1-4302-5786-8_6_Fig4_HTML.jpg](A978-1-4302-5786-8_6_Fig4_HTML.jpg)


    Figure 6-4.


    Looking at the `onCreateOptionsMenu()` method and `getMenuInflater().inflate()`
    method in `MainActivity`


    You will pass your menu XML definition into the `.inflate()` method by using a
    reference path of `R.menu.main`, which breaks down into `R` (resource folder),
    `.menu` (menu sub-folder), `.main` (`main.xml` file).


    This is called off of the `getMenuInflater()` method, using dot notation to chain
    the two methods together, as shown in the following line of code:


    `getMenuInflater().inflate(R.menu.main, menu);`


    After the `MenuInflater` class has populated the `Menu` object with the definition
    you created in XML, the `return true;` statement is processed to return a Boolean
    `true` flag value from the `onCreateOptionsMenu()` method to let the Android OS
    know that an Options menu object was inflated successfully.


    Next, let’s take a look at the results of your menu alterations in the Nexus One
    emulator in Eclipse to make sure everything is working correctly. Right-click
    the project folder, and use the **Run As ➤ Android Application** menu sequence
    to launch the emulator, and use the MENU button in the Nexus One emulator on the
    upper-right of the emulator. It is the second button in the second row of buttons
    from the top of the emulator.


    After you click this button, you should see an Options menu pop up at the bottom
    of your Splash Screen with the two items on it that you created (see Figure [6-5](#A978-1-4302-5786-8_6_Chapter.html#Fig5)).


    ![A978-1-4302-5786-8_6_Fig5_HTML.jpg](A978-1-4302-5786-8_6_Fig5_HTML.jpg)


    Figure 6-5.


    Testing your new Options menu in the Nexus One emulator


    Now that you have your Options menu inflated with the existing Java and XML code
    that was in your app already, you will need to create a new method in your `MainActivity.java`
    Java code that will call new Activity screens once these Options menu items are
    selected by your users.


    First, however, you will need a second Activity to call in that code, so let’s
    create your app’s second Activity class to hold a Table of Contents screen design
    for your Pro Android Graphics e-book app.'
