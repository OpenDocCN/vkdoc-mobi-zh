  trans: '

    # 使用 CropByPadding 裁剪你的 SkyCloud 图片资源


    你已经了解了如何在 Android 中使用 XML 标记和 `ImageView` 控件应用基础图片增亮色彩校正，现在让我们学习使用 `android:cropByPadding`
    参数来裁剪图片，同时练习使用五个 `android:padding` 参数。


    裁剪本身看起来很简单，事实也确实如此；然而，它也可以成为更复杂“操作”（我习惯这么称呼）中不可或缺的一部分，这些操作可用于实现复杂的数字图像特效，比如投影、浮雕、伪
    3D 等。


    事实上，在第 7 章中，你已经看到了我所说的内容：我们使用非常实惠的 GIMP 2.8.6 软件包，对原始图片进行复制、灰度化、模糊、移动和 Alpha 通道处理，最终将其制作为一张半透明、集成
    Alpha 通道的投影特效数字图像。


    现在，你将使用 XML 标记以及 `android:cropToPadding="true"` 参数来实现图片裁剪。因此，将这一参数添加到你在前面章节中添加的
    `android:tint` 参数之后的 `ImageView` 标签中，如图 8-5 所示。该参数本身不会产生任何效果；如果你想验证这一点，可以点击编辑面板底部的
    GLE 选项卡，因为 GLE 能很好地处理内边距和裁剪标签！


    ![A978-1-4302-5786-8_8_Fig5_HTML.jpg](img/A978-1-4302-5786-8_8_Fig5_HTML.jpg)


    图 8-5. 添加 `android:padding` 和 `android:cropToPadding` 参数来裁剪 9dip 的周边边框区域


    接下来，我们再添加一个 `android:padding="9dp"` 参数，为你的 UI 设计添加 9 DIP 的边框。由于没有 `android:border`
    或 `layout border` 参数，这是一种在设计中添加边框的方法。


    请注意，`ImageView` 背后的 `RelativeLayout` 容器的默认白色，现在会透过 `ImageView` 中被裁剪掉的区域显示出来，让这些像素变得可见。如果你的
    `RelativeLayout` 设置了背景图片，它将会与 `ImageView` 的源图片进行合成，就像在 GIMP 中图层的工作方式一样。


    使用图形布局编辑器选项卡或 **Run As** ➤ **Android Application** 工作流程，可以看到 `android:cropToPadding`
    参数正在发挥作用，如图 8-6 截图左侧所示。


    让我们用落日中的一些颜色为这个边框着色。你可以通过在 `RelativeLayout` 中添加 `android:background` 来实现。


    ![A978-1-4302-5786-8_8_Fig6_HTML.jpg](img/A978-1-4302-5786-8_8_Fig6_HTML.jpg)


    图 8-6. 在 Nexus One 模拟器中测试你的 `CropToPadding` 参数和 `RelativeLayout` 背景色值


    在 `RelativeLayout` 父标签中添加一个 `android:background="#FFEEAA"` 参数，就像你之前设置的那样，只是使用了不同的颜色值。如图
    8-6 右侧所示，这个新的颜色值大致（匹配）了落日周围云彩的颜色。


    接下来，你将使用 `android:paddingTop` 参数向下推动（裁剪）图片，使带有投影的 `TextView` 位于 UI 设计顶部的黄色区域中，从而练习使用一些更具方向性的内边距参数。


    如图 8-7 所示，我将 `android:padding="9dp"` 改为了 `android:paddingTop="50dp"` 参数，这会使设计变为图
    8-8 左侧所示的样子。


    由于边框效果消失了，我们添加另一个 `android:padding="8dp"` 参数，并再次使用图形布局编辑器选项卡或 **Run As** ➤ **Android
    Application** 工作流程来查看结果。当你这样做时，会发现 `android:paddingTop` 参数没有正确渲染，你的 UI 界面恢复到了图
    8-6 右侧所示的样子。回到绘图板（裁剪板）上！


    这意味着 `android:padding` 参数是在其他更具体的 `android:paddingTop`（以及其他）参数之后应用的。因此，如果你想指定不同的内边距值，必须单独指定每一边，否则
    `android:padding` 参数会覆盖其他参数。


    所以将 `android:padding="8dp"` 改为 `android:paddingLeft="8dp"`，然后在其旁边再复制两次，如图 8-7
    所示，并分别将 Left 改为 Right 和 Bottom。


    ![A978-1-4302-5786-8_8_Fig7_HTML.jpg](img/A978-1-4302-5786-8_8_Fig7_HTML.jpg)


    图 8-7. 添加 `paddingTop`、`paddingLeft`、`paddingRight` 和 `paddingBottom` 参数来创建自定义裁剪


    现在，你的底板（背景图片）`ImageView` 所设置的参数比你的 `currentBookmarkImage`（主题内容）`ImageView` 还要多！位于
    UI 元素合成堆栈底部（后方）的第一个 `ImageView` 的 XML 标记现在应包含以下参数：


    ```

    <ImageView android:id="@+id/backgroundImage"

    android:src="@drawable/cloudsky"

    android:layout_width="match_parent"

    android:layout_height="match_parent"

    android:contentDescription="@string/bmi"

    android:scaleType="fitXY"

    android:tint="#44FFFFFF"

    android:cropToPadding="true"

    android:paddingTop="50dp"

    android:paddingLeft="8dp"

    android:paddingRight="8dp"

    android:paddingBottom="8dp" />

    ```


    要查看新的自定义图片裁剪效果（使用了内边距值和 `cropToPadding`），请查看图 8-8 的右侧。你现在实现了期望的图片效果：`TextView`
    投影在落日的黄色调上，图片其余四周带有 8dip 的边框以增加一些装饰。你只用了十几个参数就完成了裁剪、色彩校正、布局、ID、源数字图片资源引用和缩放操作。


    ![A978-1-4302-5786-8_8_Fig8_HTML.jpg](img/A978-1-4302-5786-8_8_Fig8_HTML.jpg)


    图 8-8. 在 Nexus One 模拟器中测试自定义的 `android:padding` 和 `android:cropToPadding` 参数


    接下来，让我们看看如何使用 `android:baseline` `ImageView` 参数来定制 `ImageView` 的基线对齐位置。

    '
- fmt: '# Changing the Baseline Alignment Index for Your `ImageView`


    Instead of aligning your `TextView` relative to the layout container by using
    a `layout_marginTop="10dip"` parameter, let’s instead align this `TextView` to
    the `backgroundImage` `ImageView` compositing backplate by using the baseline
    capabilities you have been learning about in this chapter.


    Let’s set the `TextView`’s `layout_marginTop` parameter to `0DIP` and add an `android:layout_alignBaseline`
    parameter that references the `backgroundImage` ID so that your `TextView` aligns
    to your first `ImageView` baseline definition, which you are going to set next.
    This is done using the following XML markup, which you can see I added at the
    end of the tag in Figure [8-9](#A978-1-4302-5786-8_8_Chapter.html#Fig9):


    `android:layout_alignBaseline="@+id/backgroundImage"`


    To specify a custom baseline position for your `backgroundImage` `ImageView`,
    add an `android:baseline` parameter to the end of the `ImageView` tag parameter
    list, using the following XML markup, as shown in Figure [8-9](#A978-1-4302-5786-8_8_Chapter.html#Fig9):


    `android:baseline="30dp"`


    ![A978-1-4302-5786-8_8_Fig9_HTML.jpg](A978-1-4302-5786-8_8_Fig9_HTML.jpg)


    Figure 8-9.


    Adding an `android:baseline` definition to your `ImageView` and referencing it
    from your `TextView` object


    Now use your `Run As ➤ Android Application` work process to launch the Nexus One
    emulator, and you can see that the results are very similar to what you got when
    you were using your `android:layout_marginTop=“10dp”` parameter.


    As you can clearly see in Figure [8-10](#A978-1-4302-5786-8_8_Chapter.html#Fig10)
    (portrait) as well as in Figure [8-11](#A978-1-4302-5786-8_8_Chapter.html#Fig11)
    (landscape), the `TextView` object is now aligning its baseline, which is at the
    bottom of its text content, to an imaginary (invisible) baseline, which is `30dp`
    from the top of the image.


    It is a bit counterintuitive that a baseline would be set from the top of an image
    rather than the bottom, since a baseline represents the bottom of a font (where
    it sits) to most of us. The reason for this is because as we know, an image is
    indexed (numbered) starting in the upper-left corner at pixel `0,0` and so zero
    pixels in your baseline alignment setting would thus align with the top of the
    image.


    That is probably why there’s a shortcut `android:baselineAlignBottom="true"` parameter;
    all this does is simply get the Y (height) resolution of the image, and then set
    this value as the `android:baseline` parameter setting.


    It is also interesting to note that if you forgot to set your `marginTop` to zero,
    it has no effect on the positioning, that is, the margin is not added to the baseline
    alignment setting, but rather is replaced by it.


    To confirm this, set an `android:layout_marginTop="50dip"` and render the UI design,
    and you will see that it has no effect, which means that Android OS is prioritizing
    your `android:baseline` alignment parameter setting over the `android:layout_marginTop`
    alignment parameter setting.


    ![A978-1-4302-5786-8_8_Fig10_HTML.jpg](A978-1-4302-5786-8_8_Fig10_HTML.jpg)


    Figure 8-10.


    Testing your portrait UI layout in the Nexus One emulator


    It’s important that you get used to noticing the different effects of your parameter
    settings in Android, as this is ultimately how you will get more familiar with
    how the OS is going to render your user interface designs in any given scenario.


    Let’s take a look at how this new user interface design will look when our user
    turns their Android device orientation 90 degrees on its side, so press the `CRTL-F11`
    keystroke combination to rotate the Nexus One emulator.


    As you can see in Figure [8-11](#A978-1-4302-5786-8_8_Chapter.html#Fig11), the
    new user interface design using the baseline alignment for the `TextView` object
    works just as well as the top margin parameter. This demonstrates that there are
    often a number of different ways of achieving the same user interface layout in
    Android.


    This makes Android user interface design both more flexible and more complicated,
    as there’s often ultimately an optimal way to get a user interface to layout amongst
    all of the different device screen sizes and orientations. If possible, we as
    developers want to get a user interface design working across devices using only
    XML layout tags and parameters.


    ![A978-1-4302-5786-8_8_Fig11_HTML.jpg](A978-1-4302-5786-8_8_Fig11_HTML.jpg)


    Figure 8-11.


    Testing the `android:baseline` parameter in the Nexus One emulator using the landscape
    mode


    Next you’ll take a look at how you can use the `android:layout_margin` and the
    `android:padding` parameter to perform image scaling for you via XML markup.'
  raw: '## Changing the Baseline Alignment Index for Your ImageView


    Instead of aligning your TextView relative to the layout container by using a
    `layout_marginTop="10dip"` parameter, let’s instead align this TextView to the
    `backgroundImage` ImageView compositing backplate by using the baseline capabilities
    you have been learning about in this chapter.


    Let’s set the TextView’s `layout_marginTop` parameter to 0DIP and add an `android:layout_alignBaseline`
    parameter that references the `backgroundImage` ID so that your TextView aligns
    to your first ImageView baseline definition, which you are going to set next.
    This is done using the following XML markup, which you can see I added at the
    end of the tag in Figure [8-9](#A978-1-4302-5786-8_8_Chapter.html#Fig9):


    `android:layout_alignBaseline="@+id/backgroundImage"`


    To specify a custom baseline position for your backgroundImage ImageView, add
    an `android:baseline` parameter to the end of the ImageView tag parameter list,
    using the following XML markup, as shown in Figure [8-9](#A978-1-4302-5786-8_8_Chapter.html#Fig9):


    `android:baseline="30dp"`


    ![A978-1-4302-5786-8_8_Fig9_HTML.jpg](A978-1-4302-5786-8_8_Fig9_HTML.jpg)


    Figure 8-9.


    Adding an android:baseline definition to your ImageView and referencing it from
    your TextView object


    Now use your Run As ➤ Android Application work process to launch the Nexus One
    emulator, and you can see that the results are very similar to what you got when
    you were using your android:layout_marginTop=“10dp” parameter.


    As you can clearly see in Figure [8-10](#A978-1-4302-5786-8_8_Chapter.html#Fig10)
    (portrait) as well as in Figure [8-11](#A978-1-4302-5786-8_8_Chapter.html#Fig11)
    (landscape), the TextView object is now aligning its baseline, which is at the
    bottom of its text content, to an imaginary (invisible) baseline, which is 30dp
    from the top of the image.


    It is a bit counterintuitive that a baseline would be set from the top of an image
    rather than the bottom, since a baseline represents the bottom of a font (where
    it sits) to most of us. The reason for this is because as we know, an image is
    indexed (numbered) starting in the upper-left corner at pixel 0,0 and so zero
    pixels in your baseline alignment setting would thus align with the top of the
    image.


    That is probably why there’s a shortcut `android:baselineAlignBottom="true"` parameter;
    all this does is simply get the Y (height) resolution of the image, and then set
    this value as the android:baseline parameter setting.


    It is also interesting to note that if you forgot to set your marginTop to zero,
    it has no effect on the positioning, that is, the margin is not added to the baseline
    alignment setting, but rather is replaced by it.


    To confirm this, set an `android:layout_marginTop="50dip"` and render the UI design,
    and you will see that it has no effect, which means that Android OS is prioritizing
    your android:baseline alignment parameter setting over the android:layout_marginTop
    alignment parameter setting.


    ![A978-1-4302-5786-8_8_Fig10_HTML.jpg](A978-1-4302-5786-8_8_Fig10_HTML.jpg)


    Figure 8-10.


    Testing your portrait UI layout in the Nexus One emulator


    It’s important that you get used to noticing the different effects of your parameter
    settings in Android, as this is ultimately how you will get more familiar with
    how the OS is going to render your user interface designs in any given scenario.


    Let’s take a look at how this new user interface design will look when our user
    turns their Android device orientation 90 degrees on its side, so press the CRTL-F11
    keystroke combination to rotate the Nexus One emulator.


    As you can see in Figure [8-11](#A978-1-4302-5786-8_8_Chapter.html#Fig11), the
    new user interface design using the baseline alignment for the TextView object
    works just as well as the top margin parameter. This demonstrates that there are
    often a number of different ways of achieving the same user interface layout in
    Android.


    This makes Android user interface design both more flexible and more complicated,
    as there’s often ultimately an optimal way to get a user interface to layout amongst
    all of the different device screen sizes and orientations. If possible, we as
    developers want to get a user interface design working across devices using only
    XML layout tags and parameters.


    ![A978-1-4302-5786-8_8_Fig11_HTML.jpg](A978-1-4302-5786-8_8_Fig11_HTML.jpg)


    Figure 8-11.


    Testing the android:baseline parameter in the Nexus One emulator using the landscape
    mode


    Next you’ll take a look at how you can use the android:layout_margin and the android:padding
    parameter to perform image scaling for you via XML markup.'
  trans: '

    # 更改 ImageView 的基线对齐索引


    不要使用 `layout_marginTop="10dip"` 参数将 `TextView` 相对于布局容器对齐，而是利用你在本章中学到的基线功能，将此 `TextView`
    与作为合成底板的 `backgroundImage` 的 `ImageView` 对齐。


    让我们将 `TextView` 的 `layout_marginTop` 参数设置为 `0DIP`，并添加一个 `android:layout_alignBaseline`
    参数，该参数引用 `backgroundImage` 的 ID，这样你的 `TextView` 就会与你即将设置的第一个 `ImageView` 基线定义对齐。这通过以下
    XML 标记实现，你可以在图 8-9 中看到我将其添加到了标签的末尾：


    `android:layout_alignBaseline="@+id/backgroundImage"`


    要为你的 `backgroundImage` 的 `ImageView` 指定一个自定义基线位置，请在 `ImageView` 标签参数列表的末尾添加一个
    `android:baseline` 参数，使用以下 XML 标记，如图 8-9 所示：


    `android:baseline="30dp"`


    ![A978-1-4302-5786-8_8_Fig9_HTML.jpg](img/A978-1-4302-5786-8_8_Fig9_HTML.jpg)


    图 8-9.


    向 `ImageView` 添加 `android:baseline` 定义，并从 `TextView` 对象引用它


    现在使用 `Run As ➤ Android Application` 工作流程启动 Nexus One 模拟器，你会发现结果与使用 `android:layout_marginTop=“10dp”`
    参数时非常相似。


    正如图 8-10（竖屏）以及图 8-11（横屏）中清晰所示，`TextView` 对象现在将其位于文本内容底部的基线，对齐到一条虚构的（不可见的）基线上，该基线距图像顶部
    `30dp`。


    基线是从图像顶部而非底部设置的，这有点反直觉，因为对我们大多数人来说，基线代表字体底部（字坐的地方）。之所以这样，是因为我们知道，图像是从左上角像素 `0,0`
    开始索引（编号）的，因此基线对齐设置中的零像素将与图像顶部对齐。


    这可能就是存在快捷参数 `android:baselineAlignBottom="true"` 的原因；它所做的事情就是获取图像的 Y（高度）分辨率，然后将该值设置为
    `android:baseline` 参数设置。


    同样有趣的是，如果你忘记将 `marginTop` 设置为零，它对定位没有影响，也就是说，外边距不会被添加到基线对齐设置中，而是被其取代。


    为了确认这一点，设置 `android:layout_marginTop="50dip"` 并渲染 UI 设计，你会看到它没有效果，这意味着 Android
    操作系统会优先考虑你的 `android:baseline` 对齐参数设置，而非 `android:layout_marginTop` 对齐参数设置。


    ![A978-1-4302-5786-8_8_Fig10_HTML.jpg](img/A978-1-4302-5786-8_8_Fig10_HTML.jpg)


    图 8-10.


    在 Nexus One 模拟器中测试竖屏 UI 布局


    重要的是，你要习惯留意 Android 中不同参数设置的效果差异，因为这最终能让你更熟悉操作系统在任何给定场景下如何渲染你的用户界面设计。


    让我们看看当用户将 Android 设备方向旋转 90 度（横屏）时，这个新的用户界面设计会是什么样子，因此按下 `CRTL-F11` 组合键来旋转 Nexus
    One 模拟器。


    正如图 8-11 所示，为 `TextView` 对象使用基线对齐的新用户界面设计与使用顶部外边距参数效果一样好。这表明在 Android 中通常有几种不同的方法可以实现相同的用户界面布局。


    这使得 Android 用户界面设计既更灵活也更复杂，因为通常在所有不同的设备屏幕尺寸和方向中，存在一种实现用户界面布局的最佳方法。如果可能，作为开发人员，我们希望通过仅使用
    XML 布局标签和参数，让用户界面设计能够跨设备工作。


    ![A978-1-4302-5786-8_8_Fig11_HTML.jpg](img/A978-1-4302-5786-8_8_Fig11_HTML.jpg)


    图 8-11.


    使用横屏模式在 Nexus One 模拟器中测试 `android:baseline` 参数


    接下来你将了解如何使用 `android:layout_margin` 和 `android:padding` 参数，通过 XML 标记来执行图像缩放。

    '
- fmt: '# Performing Image Scaling: Margins and Padding Attributes


    Besides using a `ScaleType` parameter for scaling `ImageView` objects globally
    within their layout containers, there is another way to scale digital image source
    assets referenced inside the `ImageView` container. Both margin as well as padding
    values will allow you to scale an `ImageView` source image asset within its container,
    as you’re about to experiment with in this section.


    First, let’s change the `android:layout_margin="9dp"` parameter in your second
    `ImageView` tag (your foreground `currentBookmarkImage` asset) to zero DPI, as
    shown in Figure 8-12. You will do this so that you can first observe the image
    asset in its unscaled state (size).


    Use the Run As ➤ Android Application work process and take a close look at the
    image, as shown on the left side of the screen shot in Figure 8-13. Then change
    the 0DIP to 50 DIP, and run the emulator again.


    You will see that the result is the second `ImageView` with the source image in
    it is scaled down in size to accommodate your new margin settings. You may be
    wondering if the `android:padding` parameter will accomplish the same results,
    and we are going to take a closer look at that possibility next.


    ![A978-1-4302-5786-8_8_Fig12_HTML.jpg](A978-1-4302-5786-8_8_Fig12_HTML.jpg)


    **Figure 8-12.** Setting the `currentBookmarkImage ImageView layout_margin` value
    to zero DIP to see unscaled asset


    Next, let’s add a translucent color background to your bookmark image plate (see
    Figure 8-13).


    ![A978-1-4302-5786-8_8_Fig13_HTML.jpg](A978-1-4302-5786-8_8_Fig13_HTML.jpg)


    **Figure 8-13.** Showing an unscaled `ImageView` asset on the left and an `ImageView`
    scaled using a 50dp margin


    You will do this so that you can see the edges of your `ImageView` container,
    allowing you to ascertain the difference between using margins and padding to
    scale your image asset. As you can see in Figure 8-14, you will add a 50% translucent
    white background via a hexadecimal color value of `#77FFFFFF` inside an `android:background`
    parameter to your `currentBookmarkImage` ID `ImageView` tag. This is a very useful
    technique that you can utilize in the user interface development work process
    if you need to visualize where the Android OS is drawing your UI container.


    ![A978-1-4302-5786-8_8_Fig14_HTML.jpg](A978-1-4302-5786-8_8_Fig14_HTML.jpg)


    **Figure 8-14.** Adding a 50% transparent white background to visually show 50dip
    margin and padding operations


    This technique will work even if your digital image assets use transparent alpha
    channels, as yours does in this instance with your drop-shadowed hoop. You will
    leave your `android:layout_margin` parameter set to 50DIP, as this is a perfect
    setting to show the difference between using margins and padding to scale an `ImageView`
    source image asset within its container.


    As you can see in Figure 8-15, this hoop image produces its shadow effects correctly
    through both your translucent `ImageView` background color and the `ImageView`
    background plate held in the `RelativeLayout` container.


    In the emulator view on the left, you are using an `android:padding="50dp"` parameter
    to scale your source image asset, and as expected, since padding adds space on
    the inside the container, the container stays the size of the `match_parent` layout
    specifications and still scales your image asset down close to 50%.


    In the view on the right, you are scaling your source image asset using the `android:layout_margin="50dp"`
    parameter. Margins add spacing on the outside of the container, so your container
    scales down along with your image asset.


    ![A978-1-4302-5786-8_8_Fig15_HTML.jpg](A978-1-4302-5786-8_8_Fig15_HTML.jpg)


    **Figure 8-15.** Showing your 50DIP image scale operation using padding on the
    left and using margin on the right


    The reason that the second `ImageView` container doesn’t completely fill the screen,
    as you can see in Figure 8-15 on the left, is because the `TextView` is baseline
    aligned 30dp into (below the top of) the first `ImageView` image backplate for
    your UI composite.


    The second `ImageView` has the `RelativeLayout` parameter `android:layout_below`,
    which is referencing the `TextView` UI element. This pushes that entire View container
    down, as can now be seen due to your translucent background color value setting.


    Now let’s use a Control-F11 keystroke combination to turn the Android Nexus One
    emulator 90 degrees, and take a look at padding versus margins scaling in landscape
    mode. As you can see in Figure 8-16, the results are similar, and the padding
    parameter scales the image asset inside the View object container, while the `android:layout_margin`
    parameter scales the `ImageView` object container as well as the source image
    asset it contains.


    The only difference that I can detect in the landscape mode is that the `android:layout_centerHorizontal`
    parameter seems to be centering the `ImageView` container away from the sides
    of its parent `RelativeLayout` container. Sometimes differences such as this cannot
    be anticipated, and this points out why it is always important to test all user
    interface layout designs in as many different Android device emulators and orientations
    possible!


    ![A978-1-4302-5786-8_8_Fig16_HTML.jpg](A978-1-4302-5786-8_8_Fig16_HTML.jpg)


    **Figure 8-16.** Showing 50dip image scale in landscape mode for padding on the
    top and for margin on the bottom


    As you have seen in this chapter, with a little bit of creativity and good knowledge
    regarding what digital imaging operations consist of at heart, a significant portion
    of the digital image manipulation "moves" that you can implement in GIMP or Photoshop
    can also be accomplished in Android using XML markup and Java code.'
