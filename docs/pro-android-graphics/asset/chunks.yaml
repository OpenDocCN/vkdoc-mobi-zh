    \n如图 16-25 所示，`canvasH` 和 `canvasW` 变量尚未实现，并且显示带有波浪线的黄色警告下划线高亮。下一步定义你的绘图区域将解决此问题。\n\
    \n![A978-1-4302-5786-8_16_Fig25_HTML.jpg](img/A978-1-4302-5786-8_16_Fig25_HTML.jpg)\n\
