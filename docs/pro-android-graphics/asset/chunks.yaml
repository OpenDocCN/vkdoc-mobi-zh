- fmt: '## Summary


    In this fourth chapter, you learned about procedural animation concepts, the Android
    application assets that can be animated procedurally, XML tags, how to set up
    complex procedural animation using XML parameters, and other related procedural
    animation design and optimization techniques.


    You also put this information to actual use, creating procedural animations for
    your `pro.android.graphics` package start-up screen in your `GraphicsDesign` Android
    application, which utilizes several of Android’s transform types.


    We started by out looking at some of the basic concepts that relate to procedural
    animation, such as tweening and interpolation, and how these divide up the data
    ranges that your animation parameters specify so that they can be played back
    smoothly and attractively over time.


    You learned about motion curves and their `Interpolator` classes in Android, which
    implement the mathematics for us that allow us to easily apply the interpolator
    constants to procedural animation data ranges to generate real-world movements,
    which otherwise would be quite difficult to achieve.


    We then took a look at how data values were used to establish ranges over which
    our animation parameters would be transformed. We looked at using a pivot point
    to tell the transform where to start transforming from (scale) or around which
    point it should execute the transform (rotate).


    Next, we looked at the types of transforms that are supported in Android for procedural
    animation, namely movement or translation, size or scale, and orientation or rotation.
    We also looked at how alpha channel blending (alpha transparency) can be controlled
    via procedural animation along with the other types of 2D spacial transformations.


    Then we looked at how to control the timing of procedural animation using the
    `duration` and `startOffset` parameters. You learned that you need to use a milliseconds
    data value to specify procedural animation timing, and how to convert back and
    forth between seconds and milliseconds.


    Next, we looked at how to delineate what type of animation you are creating, from
    play once to looping animation types. You learned how to set seamless looping
    animation, as well as how to specify the back and forth animation type, also commonly
    referred to as pong animation.


    Finally, you went into your `GraphicsDesign` application and wrote some XML markup
    along with Java code to actually implement procedural animation in conjunction
    with your frame animation assets, which you created in [Chapter 3](#A978-1-4302-5786-8_3_Chapter.html).


    In the next chapter, we will look more closely at how to design graphics elements
    across all of the different resolution screens, and resolution density targets,
    which Android defines and enforces via its `/res/drawable` sub-folders, including
    LDPI, MDPI, HDPI, XHDPI, XXHDPI and TVDPI, as well as `/res/layout` sub-folders,
    which can have custom names for custom layouts.


    # Android DIP: Device-Independent Pixel Graphics Design


    ## Abstract


    In this chapter, we''ll take a closer look at how to design graphics assets to
    be able to span the wide range of Android device screen sizes currently on the
    market. With Android devices as small as watches up to as large as iTV sets, providing
    a range of pixel-based assets that will fit all of the screens on the market well
    and look great is certainly one of the major challenges in creating professional
    Android graphics.


    There is no way around this challenge, short of using only vector (shape) graphics,
    which scale to fit any size screen, and user interface widgets with XML parameters
    such as `android:gravity` that do the screen layout math for you automatically.
    If you’re going to use pixel-based assets of any kind in your app, this chapter,
    and all the information within it, should be of significant interest to you as
    a budding Pro Android Graphics designer.


    You will find when you finish with this chapter that designing for all of the
    thousands of different Android device (product) screens out there is a game of
    trade-offs and “guestimation.” The information in this chapter will allow you
    to make the decisions regarding which pixel density imaging resolutions to support,
    and if doing the extra asset creation work is worth the end result as a percentage
    of estimated market share (total end users) relative to visual quality on the
    screen due to scaling (or lack thereof).


    We will take a look at the seven currently defined pixel density levels that are
    a part of the Android OS and API. We will also look at various density and scaling
    concepts and techniques as they relate to resizing and scaling pixels, and common
    display resolutions and how to target them effectively.


    ## How Android Supports Device Displays: UI Design and UX


    As we all know, the Android OS supports a wide variety of popular consumer electronics
    devices. Most all of them offer different screen sizes, screen shapes, screen
    aspect ratios, and screen pixel densities. We’ll be looking at each of these areas
    of screen differences in this chapter.


    For application development, Android’s operating system attempts to provide a
    consistent user experience development environment across each supported hardware
    device. The OS will attempt to handle the task of adjusting your application’s
    user interface to each screen type on which it is displayed.


    Additionally, the operating system provides custom APIs that allow you to customize
    your application UI for a specific screen size and density. This is done to allow
    developers to optimize the UI design for different screen configurations. For
    instance, developers may want to specifically develop for a tablet UI, which may
    be different from a smartphone UI, smartwatch UI, or an iTV UI.


    Even though Android will take care of scaling and resizing your UI design, in
    order to make your applications fit each disparate screen like a glove, you need
    to make an effort to optimize an application for different screen sizes and pixel
    densities. In this way, Android OS does not have to scale or resize any given
    imaging asset too drastically, and thus the user probably won’t even notice such
    slight pixel adjustments, if any are made at all. Indeed, minimizing the scaling
    and adjustments is the name of the game, and what you’re going to learn about
    in this chapter includes even more optimization techniques! Android development
    is a lot about optimization.


    By providing the Android OS with a reasonable range of highly optimized pixel-based
    imaging assets inside your `.APK` file, you can allow the Android OS to go the
    rest of the way in maximizing the user experience across all Android hardware
    devices.


    If the pixel-based asset optimization process is performed correctly, all your
    end users will be summarily convinced that the app that they are using was specifically
    designed for their device, rather than scaled, stretched, and rotated to fit their
    device screen’s physical resolution, aspect ratio, and orientation (portrait or
    landscape). There is quite a bit involved in this process, and we will be covering
    all the various factors in this chapter.'
