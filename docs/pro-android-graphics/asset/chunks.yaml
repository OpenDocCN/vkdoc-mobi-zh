- fmt: 'Not simple, by any means; and, as you will see in the coming sections, not
    yet 100% perfected in the Android OS either! That is one of the caveats of working
    with a new OS and platform, such as Android; you have to work with (and around)
    what is currently available to you as a developer, and working well enough to
    be utilized, while waiting for new features to be added, as they invariably will
    at some point in time.


    Now, you are set up to be able to bring this `LayerDrawable` object into your
    Java code, and incorporate it with the PorterDuff Java code that you wrote in
    the previous chapter. This will show you how to instantiate your `LayerDrawable`
    in Java and how to access the individual layers within your XML definition. You
    will also learn how to extract the image data that you have defined within these
    layers, and how to apply further processing in a more advanced image compositing
    and blending pipeline, such as using the layers in conjunction with Android’s
    PorterDuff blending (or transfer) modes.


    ## Instantiating a `LayerDrawable` for PorterDuff Compositing


    The first thing that you need to do in your Java code is to instantiate this `LayerDrawable`
    object, inflating it with your `contents_layers.xml` definition to create the
    object’s attributes, so fire up Eclipse ADT, and click the `ContentsActivity.java`
    tab to get back into your compositing code.


    Add a newline (return) character after your `setContentView()` method call, at
    the top of the `onCreate()` method, and add this line of Java code, which will
    instantiate a `LayerDrawable` object named `layerComposite`, and then use the
    `getResources().getDrawable()` method chain to load your XML definition:


    ```

    LayerDrawable layerComposite = (LayerDrawable)getResources().getDrawable(R.drawable.contents_layers);

    ```


    As you can see in Figure [12-12](#A978-1-4302-5786-8_12_Chapter.html#Fig12), you
    will then need to mouse-over your wavy red error highlighting underneath the `LayerDrawable`
    class reference, which will tell ADT to write your `Import android.graphics.drawable.LayerDrawable`
    Java statement for you. Once you do this, you will notice that your object name
    of `layerComposite` will also have a wavy yellow warning highlighting, as it is
    currently unused, at least until you write your next line of code.


    ![A978-1-4302-5786-8_12_Fig12_HTML.jpg](A978-1-4302-5786-8_12_Fig12_HTML.jpg)


    Figure 12-12. Instantiating a `LayerDrawable` object in Java and naming it `layerComposite`
    and invoke `.getDrawable()`


    Next, you will need to create a `Drawable` object to hold the contents of your
    `LayerDrawable`, which you will implement inside your current PorterDuff image
    blending rendering pipeline. You wrote this code in the previous chapter, and
    you will enhance it to work with `LayerDrawable` objects in this chapter.


    ## Create a `Drawable` Object to Hold the `LayerDrawable` Asset


    Now that you have your `LayerDrawable` object created and loaded into memory,
    the next step is to extract one of the layers that is a part of the object so
    that you can use it in your previously created PorterDuff image blending (or pixel
    transfer) pipeline, which you are going to expand to include support for `LayerDrawable`
    objects (layers).


    The first step in this process is to create an Android `Drawable` object, which
    you will name `layerOne`, as shown in Figure [12-13](#A978-1-4302-5786-8_12_Chapter.html#Fig13).
    What you are going to do with this `Drawable` is use it to cast a `LayerDrawable`
    into a `Drawable` object, and then specify the layer within it that you wish to
    use using the `.findDrawableByLayerId()` method using a single line of code, as
    follows:


    ```

    Drawable layerOne = ((LayerDrawable)layerComposite).findDrawableByLayerId(R.id.layerThree);

    ```


    What this does, all in a single line of code, is create a `Drawable` object, and
    name it `layerOne`, and then set the object equal to (load it with) the `LayerDrawable`
    object you instantiated earlier named `layerComposite`, and then use dot notation
    to call the `.findDrawableByLayerId()` method, passing the reference to the `layerThree`
    `<item>` that you defined earlier in the chapter.


    ![A978-1-4302-5786-8_12_Fig13_HTML.jpg](A978-1-4302-5786-8_12_Fig13_HTML.jpg)


    Figure 12-13. Creating a `Drawable` object named `layerOne`, cast to a `LayerDrawable`
    via `findDrawableByLayerId()`


    Now that your `layerOne` `Drawable` object is loaded with a `LayerDrawable` layer
    that you want to use in your PorterDuff blending pipeline, you can proceed!'
