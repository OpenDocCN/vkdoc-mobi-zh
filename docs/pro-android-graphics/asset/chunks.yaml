- fmt: '# Creating Your Video Assets: Using Terragen 3 3D Software


    Now I’m going to introduce you to one of the major secrets in professional software,
    used by all of the major studios to do 3D scene work. `Terragen 3` just came out
    in the Summer of 2013. I got one of the first stable builds, since I am writing
    a 3D concepts book using the software, and, as you can see in Figure [2-11](#A978-1-4302-5786-8_2_Chapter.html#Fig11),
    the results you can get are truly photo-realistic.


    ![A978-1-4302-5786-8_2_Fig11_HTML.jpg](A978-1-4302-5786-8_2_Fig11_HTML.jpg)


    Figure 2-11. `Terragen 3` start-up screen showing the credits panel as well as
    the technical support panel


    Go to the Planetside Software web site and either download the free version or
    purchase the professional version. Then you will be able to render your own seamless
    fly-through using the 39KB source file, which I am including along with the other
    application data files used for this book.


    If you’re wondering how a file that’s less than 40KB can contain an entire world
    definition (wait until you render 340MB of animation using it), that is what’s
    so amazing about 3D. Like Java code, 3D is essentially all math, and as such,
    it is text and compresses very, very well.


    Once you download and install `Terragen 3`, create a shortcut icon for it on your
    system launch Taskbar. After you do that, launch the software, and open the `loopingOrbit_v03.tgd`
    file, as shown in Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12). `TGD`
    stands for `TerraGen Data` file, in case you might be wondering.


    Click the `Renderers` tab on the top right of the software, as shown in blue in
    Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12), and then click the `Render01`
    object at the top left of the software to open up the render settings control
    area shown under it in Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12).
    Set an image width value of 480 and a height value of 800.


    ![A978-1-4302-5786-8_2_Fig12_HTML.jpg](A978-1-4302-5786-8_2_Fig12_HTML.jpg)


    Figure 2-12. `Terragen 3` Rendering Panel and Render Settings area, as well as
    Render View window on the right


    Leave the other top panel settings as-is, and in the bottom of the panel, click
    the `Sequence/Output` tab on the right-hand side and set an `Output Image` file
    name. Mine goes to an `Anim` folder under my `Terragen3` file folder hierarchy
    (`Terragen3/Project_Files/ProAndroidGraphics/Anim` folder).


    I named my file `Anim\480temp.%04d.bmp`, which is a filename format that will
    generate numbered files using the format `480temp.0000.bmp` and so on, as you
    will see in a future screenshot (Figure [2-16](#A978-1-4302-5786-8_2_Chapter.html#Fig16),
    if you are chomping at the bit). `Terragen3` is a professional 3D program and
    has complex features.


    Thus, the `%04d` part of this file name signifies that you wish to have four decimal
    places in your file name, or four zeroes for the first file name, in this case.
    Once this is set, you can set the `Sequence first` and `Sequence last` data fields
    to 1 and 400 respectively. Make sure all the other fields are blank, and that
    the `Sequence step` data field is set to a value of 1.


    If the `Extra output images` checkbox is not checked, then the `Create subfolders`
    checkbox can be either checked or unchecked as it will not be used unless the
    `Extra output images` checkbox is activated, so you can leave that one checked.


    In case you are wondering, extra output images are useful for generating advanced
    ancillary imagery used in the advanced compositing of `Terragen 3` output. This
    includes things like Z-buffers or G-buffers, which define composite layer or object
    order (Z-buffer) and depth of field (G-buffer; Blur) for each frame in a `Terragen
    3` sequence. I told you it was complex!


    Once everything is set up, click the `Render Sequence` button, which I highlighted
    in blue in Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12), and watch
    your workstation render!


    # Creating Uncompressed Video: Using VirtualDub Software


    Once your 400 frames of 3D animation have finished rendering, which will take
    between 8 hours and 8 days, depending on how many processor cores you have and
    how fast each of them are running (my system has 8 cores running at 3.4GHz each
    and my render time was around 12 hours), you will be ready to download and install
    the `VirtualDub 1.9` open source software that you will use to install all 400
    of these files into an uncompressed AVI video file format.


    Google “VirtualDub Video” or go to the [`VirtualDub.com`](http://virtualdub.com)
    web site and download either the 32-bit version, or, if you have a 64-bit AMD
    processor based workstation (as I do) with a 64-bit OS (I’m using the 64-bit version
    of Windows 8.1), then download the 64-bit AMD version, which as you can see in
    Figure [2-14](#A978-1-4302-5786-8_2_Chapter.html#Fig14), is the version I am currently
    running.


    Once it is downloaded, install the software by unzipping it onto your hard disk
    drive, preferable in your `/Program_Files` folder under the `VirtualDub` sub-folder,
    and then create a quick launch icon for it on your Taskbar.


    Once you launch the software, you will see three key dialogs. The first is the
    GNU open source licensing, which you accept by clicking the `OK` button. The next
    dialog gives you the option of viewing your Help File, which is always a good
    idea before using any advanced graphics software package.


    Figure [2-13](#A978-1-4302-5786-8_2_Chapter.html#Fig13) shows the three dialogs
    that you should familiarize yourself with, before you click the `Start VirtualDub`
    button to launch the software.


    ![A978-1-4302-5786-8_2_Fig13_HTML.jpg](A978-1-4302-5786-8_2_Fig13_HTML.jpg)


    Figure 2-13. `VirtualDub 1.9.11` GNU General Public License, Before we start,
    and the VirtualDub Help dialogs


    Once you click the `Start VirtualDub` button and launch the software, you’ll be
    greeted by an expansive, empty window with nine menus at the top. This is `VirtualDub`
    before any video files are loaded; let’s configure your environment using the
    `Video` menu and several of its sub-menu options next.


    We will configure your video compression, framerate, color depth, and range. As
    you can see in Figure [2-14](#A978-1-4302-5786-8_2_Chapter.html#Fig14), I included
    one of these menus in the screen shot so as not to waste any space on a huge empty
    screen. The `Video ➤ Compression` menu will open a `Select video compression`
    dialog; keep the default `Uncompressed RGB/YCbCr` setting, and click `OK`.


    ![A978-1-4302-5786-8_2_Fig14_HTML.jpg](A978-1-4302-5786-8_2_Fig14_HTML.jpg)


    Figure 2-14. `VirtualDub` on launch (empty project) showing the `Video ➤ Compression`
    menu sequence and dialog


    Next, set the `Frame Rate`, `Color Depth`, and `Select Range` menu options, which
    are also shown in Figure [2-14](#A978-1-4302-5786-8_2_Chapter.html#Fig14) and
    whose dialogs are shown in Figure [2-15](#A978-1-4302-5786-8_2_Chapter.html#Fig15).
    Accept the default `10FPS` in the `Frame Rate` dialog, select a `24-bit RGB (888)`
    setting for both sides of the `Color Depth` dialog, and leave the auto-detected
    zero to 400 frames range in the `Select Range` dialog. You can leave the audio
    options checked, but you’re not using audio.


    ![A978-1-4302-5786-8_2_Fig15_HTML.jpg](A978-1-4302-5786-8_2_Fig15_HTML.jpg)


    Figure 2-15. `VirtualDub` Video Frame Rate Control, Video Color Depth, Select
    Range of Video to Process dialogs'
  raw: '## Creating Your Video Assets: Using Terragen 3 3D Software


    Now I’m going to introduce you to one of the major secrets in professional software,
    used by all of the major studios to do 3D scene work. Terragen 3 just came out
    in the Summer of 2013\. I got one of the first stable builds, since I am writing
    a 3D concepts book using the software, and, as you can see in Figure [2-11](#A978-1-4302-5786-8_2_Chapter.html#Fig11),
    the results you can get are truly photo-realistic.


    ![A978-1-4302-5786-8_2_Fig11_HTML.jpg](A978-1-4302-5786-8_2_Fig11_HTML.jpg)


    Figure 2-11.


    Terragen 3 start-up screen showing the credits panel as well as the technical
    support panel


    Go to the Planetside Software web site and either download the free version or
    purchase the professional version. Then you will be able to render your own seamless
    fly-through using the 39KB source file, which I am including along with the other
    application data files used for this book.


    If you’re wondering how a file that’s less than 40KB can contain an entire world
    definition (wait until you render 340MB of animation using it), that is what’s
    so amazing about 3D. Like Java code, 3D is essentially all math, and as such,
    it is text and compresses very, very well.


    Once you download and install Terragen 3, create a shortcut icon for it on your
    system launch Taskbar. After you do that, launch the software, and open the loopingOrbit_v03.tgd
    file, as shown in Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12). TGD
    stands for TerraGen Data file, in case you might be wondering.


    Click the Renderers tab on the top right of the software, as shown in blue in
    Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12), and then click the Render01
    object at the top left of the software to open up the render settings control
    area shown under it in Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12).
    Set an image width value of 480 and a height value of 800.


    ![A978-1-4302-5786-8_2_Fig12_HTML.jpg](A978-1-4302-5786-8_2_Fig12_HTML.jpg)


    Figure 2-12.


    Terragen 3 Rendering Panel and Render Settings area, as well as Render View window
    on the right


    Leave the other top panel settings as-is, and in the bottom of the panel, click
    the Sequence/Output tab on the right-hand side and set an Output Image file name.
    Mine goes to an Anim folder under my Terragen3 file folder hierarchy (Terragen3/Project_Files/ProAndroidGraphics/Anim
    folder).


    I named my file Anim\480temp.%04d.bmp, which is a filename format that will generate
    numbered files using the format 480temp.0000.bmp and so on, as you will see in
    a future screenshot (Figure [2-16](#A978-1-4302-5786-8_2_Chapter.html#Fig16),
    if you are chomping at the bit). Terragen3 is a professional 3D program and has
    complex features.


    Thus, the %04d part of this file name signifies that you wish to have four decimal
    places in your file name, or four zeroes for the first file name, in this case.
    Once this is set, you can set the Sequence first and Sequence last data fields
    to 1 and 400 respectively. Make sure all the other fields are blank, and that
    the Sequence step data field is set to a value of 1.


    If the Extra output images checkbox is not checked, then the Create subfolders
    checkbox can be either checked or unchecked as it will not be used unless the
    Extra output images checkbox is activated, so you can leave that one checked.


    In case you are wondering, extra output images are useful for generating advanced
    ancillary imagery used in the advanced compositing of Terragen 3 output. This
    includes things like Z-buffers or G-buffers, which define composite layer or object
    order (Z-buffer) and depth of field (G-buffer; Blur) for each frame in a Terragen
    3 sequence. I told you it was complex!


    Once everything is set up, click the Render Sequence button, which I highlighted
    in blue in Figure [2-12](#A978-1-4302-5786-8_2_Chapter.html#Fig12), and watch
    your workstation render!


    ## Creating Uncompressed Video: Using VirtualDub Software


    Once your 400 frames of 3D animation have finished rendering, which will take
    between 8 hours and 8 days, depending on how many processor cores you have and
    how fast each of them are running (my system has 8 cores running at 3.4GHz each
    and my render time was around 12 hours), you will be ready to download and install
    the VirtualDub 1.9 open source software that you will use to install all 400 of
    these files into an uncompressed AVI video file format.


    Google “VirtualDub Video” or go to the [`VirtualDub.com`](http://virtualdub.com)
    web site and download either the 32-bit version, or, if you have a 64-bit AMD
    processor based workstation (as I do) with a 64-bit OS (I’m using the 64-bit version
    of Windows 8.1), then download the 64-bit AMD version, which as you can see in
    Figure [2-14](#A978-1-4302-5786-8_2_Chapter.html#Fig14), is the version I am currently
    running.


    Once it is downloaded, install the software by unzipping it onto your hard disk
    drive, preferable in your /Program_Files folder under the VirtualDub sub-folder,
    and then create a quick launch icon for it on your Taskbar.


    Once you launch the software, you will see three key dialogs. The first is the
    GNU open source licensing, which you accept by clicking the OK button. The next
    dialog gives you the option of viewing your Help File, which is always a good
    idea before using any advanced graphics software package.


    Figure [2-13](#A978-1-4302-5786-8_2_Chapter.html#Fig13) shows the three dialogs
    that you should familiarize yourself with, before you click the Start VirtualDub
    button to launch the software.


    ![A978-1-4302-5786-8_2_Fig13_HTML.jpg](A978-1-4302-5786-8_2_Fig13_HTML.jpg)


    Figure 2-13.


    VirtualDub 1.9.11 GNU General Public License, Before we start, and the VirtualDub
    Help dialogs


    Once you click the Start VirtualDub button and launch the software, you’ll be
    greeted by an expansive, empty window with nine menus at the top. This is VirtualDub
    before any video files are loaded; let’s configure your environment using the
    Video menu and several of its sub-menu options next.


    We will configure your video compression, framerate, color depth, and range. As
    you can see in Figure [2-14](#A978-1-4302-5786-8_2_Chapter.html#Fig14), I included
    one of these menus in the screen shot so as not to waste any space on a huge empty
    screen. The Video ➤ Compression menu will open a Select video compression dialog;
    keep the default Uncompressed RGB/YCbCr setting, and click OK.


    ![A978-1-4302-5786-8_2_Fig14_HTML.jpg](A978-1-4302-5786-8_2_Fig14_HTML.jpg)


    Figure 2-14.


    VirtualDub on launch (empty project) showing the Video ➤ Compression menu sequence
    and dialog


    Next, set the Frame Rate, Color Depth, and Select Range menu options, which are
    also shown in Figure [2-14](#A978-1-4302-5786-8_2_Chapter.html#Fig14) and whose
    dialogs are shown in Figure [2-15](#A978-1-4302-5786-8_2_Chapter.html#Fig15).
    Accept the default 10FPS in the Frame Rate dialog, select a 24-bit RGB (888) setting
    for both sides of the Color Depth dialog, and leave the auto-detected zero to
    400 frames range in the Select Range dialog. You can leave the audio options checked,
    but you’re not using audio.


    ![A978-1-4302-5786-8_2_Fig15_HTML.jpg](A978-1-4302-5786-8_2_Fig15_HTML.jpg)


    Figure 2-15.


    VirtualDub Video Frame Rate Control, Video Color Depth, Select Range of Video
    to Process dialogs'
  trans: '

    # 创建你的视频素材：使用 Terragen 3 3D 软件


    现在我将为你介绍专业软件中的一大秘密，所有主流工作室都使用它来完成 3D 场景工作。`Terragen 3` 于 2013 年夏季刚刚发布。我拿到了首批稳定版本之一，因为我正在使用该软件编写一本
    3D 概念书籍，如图 2-11 所示，你可以看到，你能获得的结果确实是照片级的真实感。


    ![A978-1-4302-5786-8_2_Fig11_HTML.jpg](img/A978-1-4302-5786-8_2_Fig11_HTML.jpg)


    图 2-11. `Terragen 3` 启动界面，显示了鸣谢面板以及技术支持面板


    访问 Planetside Software 网站，下载免费版本或购买专业版本。然后，你将能够使用 39KB 的源文件渲染出无缝的虚拟飞行画面，这个源文件与本书使用的其他应用程序数据文件一起提供。


    如果你想知道一个不到 40KB 的文件如何能包含整个世界的定义（等你用它渲染出 340MB 的动画就知道了），这正是 3D 的惊人之处。就像 Java 代码一样，3D
    本质上全是数学运算，因此它是文本形式的，并且压缩率非常高。


    下载并安装 `Terragen 3` 后，在系统启动任务栏上为其创建一个快捷方式图标。之后，启动软件，打开 `loopingOrbit_v03.tgd` 文件，如图
    2-12 所示。`TGD` 代表 `TerraGen Data` 文件，以防你对此感到疑惑。


    点击软件右上角的 `Renderers` 选项卡（如图 2-12 中蓝色高亮所示），然后点击软件左上角的 `Render01` 对象，打开图 2-12 中其下方显示的渲染设置控制区域。设置图像宽度值为
    480，高度值为 800。


    ![A978-1-4302-5786-8_2_Fig12_HTML.jpg](img/A978-1-4302-5786-8_2_Fig12_HTML.jpg)


    图 2-12. `Terragen 3` 渲染面板和渲染设置区域，以及右侧的渲染视图窗口


    保持其他顶部面板设置不变，在面板底部，点击右侧的 `Sequence/Output` 选项卡，并设置一个 `Output Image` 文件名。我的文件放在
    `Terragen3` 文件夹层级下的 `Anim` 文件夹中（`Terragen3/Project_Files/ProAndroidGraphics/Anim`
    文件夹）。


    我将文件命名为 `Anim\480temp.%04d.bmp`，这是一种文件名格式，会生成编号文件，格式如 `480temp.0000.bmp` 等，你将在后续的截图中看到（如果你急切地想看，可以参考图
    2-16）。`Terragen3` 是一个专业的 3D 程序，具有复杂的功能。


    因此，文件名中的 `%04d` 部分表示你希望文件名中有四位小数，或者在此例中，第一个文件名为四个零。设置完成后，你可以将 `Sequence first`
    和 `Sequence last` 数据字段分别设置为 1 和 400。确保所有其他字段为空，并且 `Sequence step` 数据字段设置为值 1。


    如果 `Extra output images` 复选框未被勾选，那么 `Create subfolders` 复选框可以勾选或不勾选，因为除非 `Extra
    output images` 复选框被激活，否则它不会被使用，所以你可以保持其勾选状态。


    如果你感到好奇，额外输出图像用于生成高级辅助图像，这些图像用于 `Terragen 3` 输出的高级合成。这包括诸如 Z-buffer 或 G-buffer
    之类的内容，它们定义了 `Terragen 3` 序列中每一帧的合成层或对象顺序（Z-buffer）和景深（G-buffer；模糊）。我告诉过你，它很复杂！


    一切设置完成后，点击 `Render Sequence` 按钮（我在图 2-12 中将其用蓝色高亮），然后观看你的工作站进行渲染！


    # 创建未压缩视频：使用 VirtualDub 软件


    当你的 400 帧 3D 动画渲染完成后（根据你拥有多少个处理器核心以及每个核心的运行速度，这需要 8 小时到 8 天不等；我的系统有 8 个核心，每个核心以
    3.4GHz 运行，我的渲染时间大约为 12 小时），你就可以下载并安装 `VirtualDub 1.9` 开源软件了，你将使用该软件将这 400 个文件全部安装到未压缩的
    AVI 视频文件格式中。


    搜索“VirtualDub Video”或访问 [`VirtualDub.com`](http://virtualdub.com) 网站，下载 32 位版本，或者，如果你像我一样拥有基于
    64 位 AMD 处理器的工作站，并安装了 64 位操作系统（我正在使用 64 位版本的 Windows 8.1），那么下载 64 位 AMD 版本，如图
    2-14 所示，这正是我当前运行的版本。


    下载完成后，通过将软件解压到你的硬盘驱动器上来安装它，最好解压到 `/Program_Files` 文件夹下的 `VirtualDub` 子文件夹中，然后在任务栏上为其创建一个快速启动图标。


    启动软件后，你将看到三个关键的对话框。第一个是 GNU 开源许可协议，点击 `OK` 按钮接受。下一个对话框让你选择是否查看帮助文件，在使用任何高级图形软件包之前，这总是一个好主意。


    图 2-13 显示了三个你应该熟悉的对话框，然后再点击 `Start VirtualDub` 按钮启动软件。


    ![A978-1-4302-5786-8_2_Fig13_HTML.jpg](img/A978-1-4302-5786-8_2_Fig13_HTML.jpg)


    图 2-13. `VirtualDub 1.9.11` GNU 通用公共许可证、开始之前，以及 VirtualDub 帮助对话框


    点击 `Start VirtualDub` 按钮启动软件后，你会看到一个宽敞的空窗口，顶部有九个菜单。这是加载任何视频文件之前的 `VirtualDub`
    界面；接下来，让我们通过 `Video` 菜单及其几个子菜单选项来配置你的环境。


    我们将配置视频压缩、帧率、颜色深度和范围。如图 2-14 所示，我在截图中包含了其中一个菜单，以避免在巨大的空屏幕上浪费空间。`Video ➤ Compression`
    菜单将打开一个 `Select video compression` 对话框；保持默认的 `Uncompressed RGB/YCbCr` 设置，然后点击
    `OK`。


    ![A978-1-4302-5786-8_2_Fig14_HTML.jpg](img/A978-1-4302-5786-8_2_Fig14_HTML.jpg)


    图 2-14. 启动时的 `VirtualDub`（空项目）显示 `Video ➤ Compression` 菜单序列和对话框


    接下来，设置 `Frame Rate`、`Color Depth` 和 `Select Range` 菜单选项，这些选项也在图 2-14 中显示，其对话框如图
    2-15 所示。在 `Frame Rate` 对话框中接受默认的 `10FPS`，在 `Color Depth` 对话框的两侧都选择 `24-bit RGB
    (888)` 设置，并在 `Select Range` 对话框中保持自动检测的 0 到 400 帧范围。你可以保持音频选项勾选，但你不使用音频。


    ![A978-1-4302-5786-8_2_Fig15_HTML.jpg](img/A978-1-4302-5786-8_2_Fig15_HTML.jpg)


    图 2-15. `VirtualDub` 视频帧率控制、视频颜色深度、选择要处理的视频范围对话框

    '
- fmt: '使用 `File ➤ Open video file` 菜单序列，如图 [2-18](#A978-1-4302-5786-8_2_Chapter.html#Fig18)
    所示，找到 `Anim` 文件夹中编号的 `BMP Terragen 3 3D` 动画文件，如图 [2-16](#A978-1-4302-5786-8_2_Chapter.html#Fig16)
    所示。选择编号文件系列中的第一个文件名，即 `480temp.0001` 到 `480temp.0400` 的 `BMP` 文件。您可以在图中看到这些文件（以及
    `360` 像素肖像分辨率数据文件，您将在第 18 章（高级数字视频优化章节）中对这些文件进行优化）。


    ![A978-1-4302-5786-8_2_Fig16_HTML.jpg](A978-1-4302-5786-8_2_Fig16_HTML.jpg)


    **图 2-16.** 使用 VirtualDub 1.9 的 `Open video file` 对话框定位 Terragen `Anim` 文件夹中的编号
    `.BMP` 文件


    单击 `Open` 按钮后，图像序列将被加载到 VirtualDub 软件中，第一帧将显示在软件的主窗口中，如图 [2-17](#A978-1-4302-5786-8_2_Chapter.html#Fig17)
    所示。


    VirtualDub 加载数字图像帧序列后，就可以使用其功能将这些静态图像帧加载到 `AVI` 容器中。这是一种支持数字视频 `FFU`（全帧未压缩）版本的格式。


    `AVI` 代表音频视频交错（Audio-Video Interleaved），这是一种最初由 Microsoft Windows 操作系统及其流行的 Windows
    Media Player 推广的视频文件格式。


    在压缩过程中使用全帧未压缩数字视频的原因很简单：您希望在一个算法过程中完成所有压缩，以避免压缩先前压缩过程中产生的伪影，这些伪影会增加最终的数据占用空间。


    使用 VirtualDub 执行此中间步骤的原因是 Sorenson Squeeze Pro 9 不支持加载图像序列数据。出于显而易见的原因，我已强烈建议他们在未来版本的软件中添加对此功能的支持。


    EditShare Lightworks 11.1 确实支持导入编号图像文件的功能，因此一旦他们添加对 Android 专用（或 HTML5 专用）编解码器的支持，您就可以使用
    Lightworks 11 进行数字视频优化工作流程，直接从 Terragen 3.0 导入到 Lightworks 11.1。现在 VirtualDub
    已加载 Terragen 数据，您可以准备创建 `AVI` 文件了。


    ![A978-1-4302-5786-8_2_Fig17_HTML.jpg](A978-1-4302-5786-8_2_Fig17_HTML.jpg)


    **图 2-17.** 在 VirtualDub 1.9.11 中打开的 Terragen 3.0 3D 世界飞越渲染图，分辨率为 `480x800`


    要以 `AVI` 格式保存，请按下键盘上的 `F7` 功能键，或单击 VirtualDub 左上角的 `File` 菜单，然后选择 `Save as AVI`
    选项。如图 [2-18](#A978-1-4302-5786-8_2_Chapter.html#Fig18) 所示，VirtualDub 会显示功能键快捷键，这些快捷键能帮助您更高效地使用该软件。


    ![A978-1-4302-5786-8_2_Fig18_HTML.jpg](A978-1-4302-5786-8_2_Fig18_HTML.jpg)


    **图 2-18.** 使用 VirtualDub 的 `File ➤ Save as AVI` 菜单序列将 Terragen 3 飞越动画保存为视频格式


    调用 `Save as AVI` 对话框（如图 [2-19](#A978-1-4302-5786-8_2_Chapter.html#Fig19) 所示）后，您需要在与
    `Anim` 文件夹相同的层级创建一个名为 `AVIs` 的文件夹，以便将 `AVI` 文件与编号的 `BMP` 文件分开存放，这主要是出于组织管理的目的。


    我使用了 `Terragen3/Project_Files/ProAndroidGraphics/AVIs` 文件夹结构，如图 [2-19](#A978-1-4302-5786-8_2_Chapter.html#Fig19)
    左侧所示。选择此文件夹或您自己创建的文件夹，然后输入您想要用于 `AVI` 文件的文件名（我使用了 `PAG480x800`），VirtualDub 软件将自动添加
    `.avi` 文件扩展名。


    完成所有设置后，单击 `Save` 按钮，然后准备观看视频帧在屏幕上飞过（如果您的电脑是八核处理器）。


    ![A978-1-4302-5786-8_2_Fig19_HTML.jpg](A978-1-4302-5786-8_2_Fig19_HTML.jpg)


    **图 2-19.** VirtualDub `Save AVI 2.0 File` 对话框和 `Terragen3/Project_Files/ProAndroidGraphics/AVIs`
    路径


    一旦您启动将静态图像帧加载到全帧未压缩的 `AVI` 容器中的过程（以便与 Sorenson Squeeze Pro 9 软件兼容），您将在软件主屏幕上看到帧被加载到
    `AVI` 中。


    同时会出现一个进度对话框，其中包含一些统计信息。该对话框会显示当前正在处理的数字视频帧，以及到目前为止已处理的视频数据量；在图 [2-20](#A978-1-4302-5786-8_2_Chapter.html#Fig20)
    中，这是第 `136` 帧和 `149` MB 数据。


    此对话框还会预测最终渲染的 `AVI` 文件大小；在这种情况下，它估计为 `329.59` 兆字节，非常接近。实际结果（您将在下一节使用 Sorenson
    Squeeze 优化视频时看到）是 `439.47070313` 或 `450,018,000` 字节，除以 `1024`，即可得出兆字节数。


    该对话框还显示视频渲染速率，这基本上是系统处理器速度的指标。我的系统接近 `15 FPS`，所以看起来就像摄像机在 Terragen 3 创建的 3D 世界中飞越。


    最后，对于系统较慢的用户，还提供了经过时间和估计时间值，这些用户在此期间处理视频数据时，甚至可以去享用一顿美餐。


    ![A978-1-4302-5786-8_2_Fig20_HTML.jpg](A978-1-4302-5786-8_2_Fig20_HTML.jpg)


    **图 2-20.** 在 VirtualDub 中渲染 Terragen 3 项目的 `300` 帧，显示渲染状态对话框和第 `136` 帧


    现在，您已将数据转换成 Squeeze Pro 可以处理的 `AVI` 数字视频文件格式，可以进入专业的数字视频数据优化软件包，真正开始数据占用空间的优化工作了。


    如果您在 Android 应用程序中使用受版权保护的数字视频资源，这是一个关键步骤，因为这将是整个应用程序中 `.APK`（Android 包）数据占用空间（文件大小）的主要影响因素。'
  raw: 'The next thing you want to do is to use a File ➤ Open video file menu sequence,
    which, if you need to visualize it, is shown in Figure [2-18](#A978-1-4302-5786-8_2_Chapter.html#Fig18),
    and find your numbered BMP Terragen 3 3D animation files in your Anim folder,
    as shown in Figure [2-16](#A978-1-4302-5786-8_2_Chapter.html#Fig16). Select the
    first name in the numbered file series of 480temp.0001 through 480temp.0400 BMP
    files, which you can see (along with my 360 pixel portrait resolution data files,
    which you’ll be optimizing in [Chapter 1](#A978-1-4302-5786-8_1_Chapter.html)8,
    an advanced digital video optimization chapter).


    ![A978-1-4302-5786-8_2_Fig16_HTML.jpg](A978-1-4302-5786-8_2_Fig16_HTML.jpg)


    Figure 2-16.


    Using VirtualDub 1.9 Open video file dialog to locate numbered .BMP files in Terragen
    Anim folder


    Once you click the Open button, the image sequence will be loaded into the VirtualDub
    software, and the first frames will be shown in the main window of the software,
    as shown in Figure [2-17](#A978-1-4302-5786-8_2_Chapter.html#Fig17).


    Once VirtualDub is loaded with the digital image frame sequence, it’s time to
    use its ability to load these still image frames into an AVI container. This is
    one of the formats for digital video that supports an FFU version (Full Frames
    Uncompressed ) of your digital video data.


    AVI stand for Audio-Video Interleaved, and it is a video file format that was
    originally made popular by the Microsoft Windows OS and its popular Windows Media
    Player.


    The reason you want to have full frames of uncompressed digital video going into
    your compression process is simply because you want to do all of your compression
    in one algorithm pass so that you’re not compressing prior compression artifacts,
    which can add to the final data footprint tally.


    The reason that you are using VirtualDub to perform this intermediate step is
    because Sorenson Squeeze Pro 9 does not support loading image sequence data, which
    I have strongly recommended to them that they add support for in a future version
    of their software, for obvious reasons.


    EditShare Lightworks 11.1 does support this importing-numbered-image-files feature,
    so once they add support for Android-specific (or HTML5-specific) codecs, you
    could use Lightworks 11 for a digital video optimization work process that would
    go directly from Terragen 3.0 into Lightworks 11.1\. Now that VirtualDub’s loaded
    with Terragen data, you’re ready to create an AVI.


    ![A978-1-4302-5786-8_2_Fig17_HTML.jpg](A978-1-4302-5786-8_2_Fig17_HTML.jpg)


    Figure 2-17.


    Terragen 3.0 3D world fly-through, rendered at 480x800, opened up inside VirtualDub
    1.9.11


    To save as AVI, press the F7 function key on the keyboard, or click the File menu
    at the top left of VirtualDub and select the Save as AVI option. As you can see
    on the menu in Figure [2-18](#A978-1-4302-5786-8_2_Chapter.html#Fig18), VirtualDub
    shows you the function key shortcuts that will make your work in the software
    package go faster.


    ![A978-1-4302-5786-8_2_Fig18_HTML.jpg](A978-1-4302-5786-8_2_Fig18_HTML.jpg)


    Figure 2-18.


    Using VirtualDub File ➤ Save as AVI menu sequence to save Terragen 3 fly-through
    in video format


    Once you invoke the Save as AVI dialog, which is shown in Figure [2-19](#A978-1-4302-5786-8_2_Chapter.html#Fig19),
    you will need to create a folder called AVIs at the same level as your Anim folder,
    so that the AVI files will be kept separate from the numbered BMP files, primarily
    for organization purposes.


    I used a Terragen3/Project_Files/ProAndroidGraphics/AVIs folder structure, as
    you can see on the left side of Figure [2-19](#A978-1-4302-5786-8_2_Chapter.html#Fig19).
    Select this folder or the one you created, and then type in the filename that
    you want to use for the AVI file (I used PAG480x800), and the VirtualDub software
    will add the .avi file extension.


    Once you have set everything up, click the Save button, and get ready to watch
    the video frames fly by your screen (if you have an eight core PC).


    ![A978-1-4302-5786-8_2_Fig19_HTML.jpg](A978-1-4302-5786-8_2_Fig19_HTML.jpg)


    Figure 2-19.


    VirtualDub Save AVI 2.0 File dialog and Terragen3/Project_Files/ProAndroidGraphics/AVIs
    path


    Once you have started the process of loading the static image frames into a full
    frames uncompressed AVI container so that it is compatible with the Sorenson Squeeze
    Pro 9 software, you will see the frames being loaded into the AVI on the main
    screen of the software.


    There will also be a progress dialog with a number of statistics on it, which
    will tell you the current frame of digital video that is being processed is, as
    well as the amount of video data processed so far; in Figure [2-20](#A978-1-4302-5786-8_2_Chapter.html#Fig20),
    it is frame 136 and 149MB of data.


    This dialog will also project the final rendered AVI file size; in this case,
    it gets pretty close, estimated at 329.59 megabytes, the actual result, as you
    will see at the end of the next section when you optimize your video using Sorenson
    Squeeze, is actually 439.47070313, or 450,018,000 bytes, divided by 1024, which
    allows you to find the amount of megabytes.


    The dialog also tells you the video rendering rate, which is essentially a barometer
    as to how fast your system processor is. My system got close to 15FPS, so it actually
    looked like the camera was flying through this 3D world that was created using
    Terragen 3.


    Finally, there are time elapsed and estimated time values provided for those who
    have slower systems, and who are hungry and need to get a good meal in during
    this processing of video data.


    ![A978-1-4302-5786-8_2_Fig20_HTML.jpg](A978-1-4302-5786-8_2_Fig20_HTML.jpg)


    Figure 2-20.


    Rendering 300 frames of Terragen 3 project in VirtualDub, showing rendering status
    dialog and frame 136


    Now that you have your data in an AVI digital video file format that Squeeze Pro
    can accommodate, you can get into the professional digital video data optimization
    software package and really get down to the business of data footprint optimization.


    This is a critical step if you are using captive digital video assets in your
    Android applications because this will be the major factor in your .APK (Android
    package) data footprint (file size) for your entire app.'
