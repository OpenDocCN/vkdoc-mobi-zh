- fmt: '# Implementing Your NinePatch Asset Using XML Markup


    The first thing that you will need to do for your XML markup to be able to reference
    this 9-patch PNG imaging asset is to install it into the proper project folder
    hierarchy location, where you know the Android OS is going to look for 9-patch
    image assets.


    Go into your NinePatch assets folder, the one that you were just in, which is
    shown in Figure [10-13](#A978-1-4302-5786-8_10_Chapter.html#Fig13), and right-click
    the `NinePatchFrame.9.png` file, which is highlighted in the screenshot, and select
    the Copy option to copy the file into your system clipboard.


    Next, use your left side navigation pane and navigate into your `/workspace` folder
    and `/GraphicsDesign` project sub-folder, and finally into your `/res` (resource)
    sub-folder and `/drawable` sub-folder, as shown in Figure [10-14](#A978-1-4302-5786-8_10_Chapter.html#Fig14).
    Then simply right-click the `/res/drawable` folder and select the Paste option.
    This will put a copy of the `NinePatchFrame.9.png` file there.


    ![A978-1-4302-5786-8_10_Fig14_HTML.jpg](A978-1-4302-5786-8_10_Fig14_HTML.jpg)


    **Figure 10-14.** Using Copy + Paste to put a copy of the `NinePatchFrame.9.png`
    file into your drawable assets folder


    Since Android OS requires asset file names to use only lowercase letters, numbers,
    and the underscore character, the next thing that you will need to do is to rename
    the 9-patch image asset file to use all lowercase letters and numbers, as `ninepatchframe.9.png`,
    as shown in Figure [10-15](#A978-1-4302-5786-8_10_Chapter.html#Fig15).


    ![A978-1-4302-5786-8_10_Fig15_HTML.jpg](A978-1-4302-5786-8_10_Fig15_HTML.jpg)


    **Figure 10-15.** Right-clicking and using the Rename command to rename the file
    using only lowercase characters


    Now you can add the 9-patch image asset into your Table of Contents Activity UI
    design `LinearLayout` container using the `android:background` parameter in the
    parent tag, as shown in Figure [10-16](#A978-1-4302-5786-8_10_Chapter.html#Fig16),
    using the following XML markup:


    ```

    android:background="@drawable/ninepatchframe"

    ```


    Also shown in Figure [10-16](#A978-1-4302-5786-8_10_Chapter.html#Fig16) is the
    Refresh operation, which you must invoke so that Eclipse ADT can “see” the new
    9-patch asset that you have added in the `/res/drawable` folder. So let’s do that
    as well, and right-click the `GraphicsDesign` project folder and select the `Refresh`
    option from the menu.


    Once you do this, the 9-patch image asset will be visible in your project folder
    hierarchy, as you will see a bit later on in the chapter, in Figure [10-17](#A978-1-4302-5786-8_10_Chapter.html#Fig17),
    when you take a look at your 9-patch asset in use as a decorative UI layout container
    3D frame graphics design element.


    ![A978-1-4302-5786-8_10_Fig16_HTML.jpg](A978-1-4302-5786-8_10_Fig16_HTML.jpg)


    **Figure 10-16.** Adding an `android:background` parameter to reference the `ninepatchframe`
    9-patch asset and Refresh


    Let’s click the Graphical Layout Editor tab at the bottom of your XML editing
    pane, and see if the GLE can “render” 9-patch assets, since there are some graphics
    design elements, such as the PorterDuff blending modes, that the GLE is unable
    to preview.


    As you can see in Figure [10-17](#A978-1-4302-5786-8_10_Chapter.html#Fig17), the
    Graphical Layout Editor pane renders a 9-patch asset perfectly, and thus the GLE
    can indeed show you how a 9-patch image asset will look in your application. That’s
    great; so you can use the GLE in your 9-patch work process without having to launch
    the emulator every time you want to see how a 9-patch image asset works as a graphics
    design element!


    As you can see in Figure [10-17](#A978-1-4302-5786-8_10_Chapter.html#Fig17), the
    9-patch image asset you created works well as the decorative framing element for
    your Table of Contents UI design, and it looks quite nice. The only problem is
    that the center (padding) area that your 9-patch asset defines is making a couple
    of the longer text UI elements wrap, so you will need to add some XML parameters
    to adjust the font size for this text down slightly in size so that this wrapping
    to the next line does not occur.


    ![A978-1-4302-5786-8_10_Fig17_HTML.jpg](A978-1-4302-5786-8_10_Fig17_HTML.jpg)


    **Figure 10-17.** Using the Graphical Layout tab to preview your 9-patch asset
    in your parent `LinearLayout` container


    To do this, you’ll need to add an `android:textSize` parameter and a value of
    13 standard pixels (`13sp`) to decrease your `TextView` UI element font size slightly,
    by using the following parameter in each of your `TextView` tags:


    ```

    android:textSize="13sp"

    ```


    Once you add this parameter into each of the `TextView` tags, all of your Text
    elements will be the same size and fit inside your 9-patch frame perfectly.


    Figure [10-18](#A978-1-4302-5786-8_10_Chapter.html#Fig18) shows the modified `TextView`
    child tags inside each of the two nested (child tag) `LinearLayout` containers.
    Remember to keep your `textSize` parameter values the same so that the text in
    your Table of Contents looks uniform. Users will be able to detect slight font
    size differences in your UI design, and will perceive this as a design flaw, and
    thus will deem your app as less than professional, so use the same `SP` value
    in all eight `TextViews`. I used `13sp` to get the text as large as possible.


    ![A978-1-4302-5786-8_10_Fig18_HTML.jpg](A978-1-4302-5786-8_10_Fig18_HTML.jpg)


    **Figure 10-18.** Adding an `android:textSize` parameter into eight `TextView`
    tags in the nested `LinearLayout` containers


    Now you are ready to preview the new font size in the Graphical Layout Editor
    tab, so click the tab at the bottom of the editing pane and make sure that the
    font size allows all of the `TextView` objects to fit within the decorative 9-patch
    UI layout frame that you added in this chapter.


    Next, let’s take a look at what the 9-patch asset looks like in the Nexus One
    emulator, to see what it would look like on an actual Android phone. Use the Run
    As ➤ Android Application work process to launch your AVD Nexus One emulator, and
    make sure your `TextView` font sizes, 9-patch image asset background, and multi-state
    `ImageButton` all work together seamlessly.


    As you can see in Figure [10-19](#A978-1-4302-5786-8_10_Chapter.html#Fig19), the
    9-patch image asset frame around your UI layout container looks great, the `TextView`
    UI elements are the perfect size for a table of Contents, and your multi-state
    `ImageButton` composites perfectly and is still positioned attractively, relative
    to the balance of your UI layout design. As you can see on the right side of the
    screen shot, the `ImageButton` is still functioning correctly within the UI design.


    ![A978-1-4302-5786-8_10_Fig19_HTML.jpg](A978-1-4302-5786-8_10_Fig19_HTML.jpg)


    **Figure 10-19.** Testing the Table of Contents UI design in the Nexus One emulator
    with the 9-patch asset in place


    The next thing that you need to test is how your 9-patch image asset will reshape
    itself when there is a change in the shape of the UI design, and this can be accomplished
    by changing the orientation of your Nexus One UI layout from a portrait mode over
    into a landscape mode. This is accomplished in the Android emulator software by
    using the Control key (the left one) on your keyboard in conjunction with the
    F11 function key, used together as a keystroke combination.


    To invoke this keystroke combination, hold the left Control (CRTL) key on your
    PC’s keyboard down, while pressing the F11 function key at the same time. In the
    future, I will denote this as a `CTRL-F11` keystroke combination.'
