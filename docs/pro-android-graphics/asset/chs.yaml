  \ float x, y; }\n```\n\n这个类为触摸屏上的单个像素或点提供了一个`Coordinate`对象，使用`float`或浮点数值精度来存储该点（像素）屏幕位置的\
  \ X 和 Y 位置数据值，即其`坐标`。如图 17-16 所示，你的类没有错误。现在你已准备好接下来学习更多关于 Android 的`List`和`ArrayList`类，因为你将在你的`SketchPadView`类中使用这些类。\n\
