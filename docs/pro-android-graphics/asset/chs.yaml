  \n图 17-16. 创建一个`Coordinate`类，提供一个浮点 X 和 Y 数据对，用于跟踪鼠标/触摸点\n\n在你实现你将命名为`coordinates`的`ArrayList`对象坐标列表结构之前，让我们先回顾一下\
  \ Android 的`List`和`ArrayList`类的作用以及它们之间确切的关系。\n\n\n\n### Java 列表工具类：让集合井然有序\n\n\
  Java 中的 `List` 构造并非一个类，而是一个实现了 `Collection<E>` 的 `public interface`，属于 `java.util`\
  \ 包的一部分。\n\nJava List 公共接口的层次结构如下：\n\n`java.util.List<E>`\n\n此 Java List 接口属于 `java.util`\
  \ 包。因此，在你的应用中要使用此 List 接口，其 `import 语句` 应引用 `java.util.List` 包。\n\nList 公共接口是一个\
  \ `collection`（集合），它为每个独立的数据元素维护了一个顺序。该 List 中的每个元素都包含一个 `index`（索引）。\n\n之后，每个 List\
  \ 元素都可以通过其索引进行访问，第一个索引编号为 `零`。通常，List 允许你插入 `重复的` 元素。这与使用数据 Set 类不同，Set 类中的每个数据元素都必须\
  \ 100% 完全唯一。\n\n### Java 的 ArrayList 工具类：一种基于集合列表的数组\n\nJava 的 `ArrayList` 类是一个\
  \ `public class`，它继承了 `AbstractList<E>` 并实现了 `Serializable`、`Cloneable` 和 `RandomAccess`\
  \ 接口。\n\n因此，Java ArrayList 工具类的层次结构如下：\n\n`java.lang.Object`  \n  `> java.util.AbstractCollection<E>`\
  \  \n    `> java.util.AbstractList<E>`  \n      `> java.util.ArrayList<E>`\n\nJava\
  \ ArrayList 类属于 `java.util` 包。因此，在应用中使用此 ArrayList 类时，其 `import 语句` 引用了 `java.util.ArrayList`\
  \ 包路径标识。\n\nArrayList 类（或对象）是 List 接口的一个实现，它是使用数组来实现的。这有点像在系统内存中拥有一个数据库，因为它具有类似数据库的操作，例如\
  \ `添加`、`移除` 和 `覆盖` 元素，就像数据库对记录的操作一样。\n\n允许在数组对象中使用所有类型的数据对象，包括 `null` 对象。你将使用 `.add()`\
  \ 方法调用来把你的 `Coordinate`（点 X,Y 浮点数据对）类 Java 对象 `添加` 到一个 ArrayList 对象中，在本章稍后你将创建这个对象。\n\
  \nArrayList 是作为默认 List 实现的一个不错选择。\n\n### 创建 ArrayList 对象来保存触摸点数据\n\n在你的 `SketchPadView`\
  \ 类顶部，紧挨着 `paintScreen` 对象实例化下方，添加一行代码，通过使用 `new` 关键字创建 ArrayList，来设置一个 `coordinates`\
  \ ArrayList 对象，如图 17-17 所示。\n\n![A978-1-4302-5786-8_17_Fig17_HTML.jpg](img/A978-1-4302-5786-8_17_Fig17_HTML.jpg)\n\
  \n图 17-17. 使用 `new` 关键字创建一个名为 `coordinates` 的 `ArrayList<List<Coordinate>>` 对象来保存点数据\n\
  \n你要编写的用于实现这一点的 Java 代码如下：\n\n`List<Coordinate> coordinates = new ArrayList<Coordinate>();`\n\
  \n这行代码的作用是，基于你的 `Coordinate` 类实例化一个新的 `ArrayList` 对象，并将其命名为 `coordinates`，因为该对象将以\
  \ Coordinate 对象的 List 形式（在代码中指定为 `List<Coordinate>`）包含用户触摸屏幕的位置（随时间变化）坐标。\n\n如图\
  \ 17-17 和图 17-18 所示，你还需将鼠标悬停在代码中的这个 ArrayList 类上，并 `import ArrayList`（来自 `java.util`\
  \ 包），以及导入你的 List 类，即 `import List`（`java.util`），之后才能为你的 `SketchViewView` 类使用 `List<Coordinate>`\
  \ List 集合对象或 `ArrayList<Coordinate>` 数组对象。\n\n![A978-1-4302-5786-8_17_Fig18_HTML.jpg](img/A978-1-4302-5786-8_17_Fig18_HTML.jpg)\n\
