  XML 标记行，使用 `android:drawable` 源文件引用参数和 `android:duration` 帧持续时间值来指定你的第一个动画帧：


  ```

  <item android:drawable="@drawable/pag0" android:duration="112" />

  ```




  请注意，您省略了文件名引用中的`.png`文件扩展名，并在其前面加上`@drawable/`路径，这告诉 Android 操作系统在`/res/drawable`文件夹中查找资源。请确保不要引用特定的分辨率密度文件夹，因为
  Android 会在运行时根据用户使用的设备自动处理。


