  \ `Same as source`，最后，保留 `Key Frames` 的默认参数 `Key Frame Every 10 Seconds`。\n\n将此预设命名为\
  \ `Android_WebM_480x800p`，并使用 Android WebM 描述，然后点击 `OK` 按钮创建新预设，如图 19-17 中屏幕截图左侧和右侧所示。\n\
