  \ 嵌套类在视频每次结束时调用 `.start()` 方法，这同样有效。但是，我想你会同意，本方法更简单、对操作系统负担更小、内存占用更少，并且不太可能引发内存泄漏；这是正确设置视频循环一次然后就可以忘掉它的方法！\n\
