- "# 10. 使用 9-Patch 成像技术创建可扩展成像元素\n\n### 摘要\n\n在第十章中，我们将更深入地研究 Android `NinePatch`\
  \ 类、`NinePatchDrawable` 类以及 Draw 9-patch 工具。\n\n由于这是一本专注于图形学的书籍，并且我们已经介绍了用于承载和实现图像或动画图形资源的\
  \ Android `ImageView` 和 `ImageButton` 类，我们将开始更多地关注 Android 操作系统中的图形相关类。其中第一个就是 `NinePatch`。\n\
  \n在开发能够因 Android 设备显示屏宽高比或方向变化而缩放且不失真的图像资源时，`NinePatch` 是 Android 最重要的图形设计工具之一。\n\
  \n`NinePatch` 是一种可调整大小的位图，其缩放操作过程中的缩放行为可以通过我们在位图图像中定义的九个区域（想象一个包含九个独立区域的井字网格）来控制。\n\
  \n`NinePatch` 类型的图像资源可用于从可缩放按钮背景到 UI 布局容器背景的任何场景，这些背景将缩放以适应不同的屏幕分辨率密度、宽高比和方向。\n\n\
  `NinePatchDrawable` 对象的优势在于，开发者可以定义一个单一的图形元素（在后面的章节示例中，这将是一个 20KB 的 `.PNG` 文件），该元素可用于许多不同的\
  \ UI 元素，包括按钮、`ImageButton`、滑块、背景以及类似的项目。\n\n### Android NinePatchDrawable：NinePatch\
  \ 的基础\n\nAndroid `NinePatchDrawable` 类是 Android `Drawable` 类的子类，因此属于 `android.graphics.drawable`\
  \ 包的一部分。\n\n一条 import 语句将 `android.graphics.drawable.NinePatchDrawable` 作为 Android\
  \ 包“路径”来引用 Android `NinePatchDrawable` 类，该类展示了以下 Android Java 类层次结构：\n\n```\njava.lang.Object\n\
  \  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.NinePatchDrawable\n\
  ```\n\n`NinePatchDrawable` 类有四个用于在 Android 中创建 `NinePatchDrawable` 对象的 Java 构造函数（方法）。其中两个构造函数自\
  \ Android 1.6 API 级别 4 起已被弃用，因此不要使用以下两个构造函数来创建你的 `NinePatchDrawable` 对象：\n\n```\n\
  NinePatchDrawable(Bitmap bitmap, byte[] chunk, Rect padding, String srcName) - 或\
  \ -\nNinePatchDrawable(NinePatch patch)\n```\n\n请注意，它们都直接访问 `NinePatch` 图像资源，而未通过\
  \ Android 的 `R` 或资源（`/res/drawable`）区域。这种绕过 Android“资源仓”的方式已被弃用，而非 `NinePatch` 技术本身。访问\
  \ `NinePatch` 资源的正确方法是使用以下任一（未弃用的）构造函数方法：\n\n```\nNinePatchDrawable(Resources res,\
  \ Bitmap bmp, byte[] chunk, Rect padding, String s)\n```\n\n此构造函数方法使用 `NinePatch`\
  \ 的原始 `Bitmap` 对象数据创建 `NinePatchDrawable` 对象，并根据资源的显示度量设置初始目标密度。此构造函数主要应通过 Java\
  \ 代码用于高级 `NinePatch` 用法。由于我们通过静态声明使用 XML 预先实现图形设计资源，因此我们将使用 `NinePatch` 类，我将在下一节中介绍它。它使用以下简单得多的构造函数方法：\n\
  \n```\nNinePatchDrawable(Resources res, NinePatch patch)\n```\n\n此构造函数将使用现有的 `NinePatch`\
  \ 资源创建 `NinePatchDrawable` 资源，该资源可在 `/res/drawable` 文件夹中找到，并需使用 `NinePatch` 资源正确的文件命名协议。此\
  \ `NinePatchDrawable` Java 构造函数将自动分析并基于资源自身的显示度量设置初始目标图像分辨率密度。\n\n我将重点介绍第二种方式，因为它更加标准化、直接，并且可以更快地得到我们想要的结果。在下一节中，我将详细介绍\
  \ `NinePatch` 图像资源的概念，然后介绍 `NinePatch` 类本身，最后讲解如何创建 `NinePatchDrawable` 图像资源。这需要使用隐藏在\
  \ Android SDK 文件夹层次结构深处的 Draw 9-patch 成像工具，该工具位于 `/sdk/tools` 文件夹中。\n\n\n\n### NinePatch\
  \ 图形资源：9-Patch 概念概述\n\n`NinePatchDrawable` 对象（通常也简称为“9-patch”）允许 Android 开发者创建一种特殊的可变形的\
  \ PNG8、PNG24 或 PNG32 图形资源。9-patch 能够对给定数字图像中的不同区域应用不同的缩放比例。\n\n因此，一个 9-patch 图像资源本质上是与坐标轴无关的、可缩放的\
  \ `.PNG` 位图图像。它通过利用图像资源内部的九个不同象限来支持缩放，或者更准确地说，是支持像素平铺，以适应任何 `View` 对象或布局容器可能具有的任意尺寸和形状。\n\
  \n由于其内置的 `NinePatchDrawable` 类（以及 `NinePatch` 类）支持，Android 操作系统可以自动调整开发者使用的 9-patch\
  \ 图像资源大小，以适应任何 `View` 对象的内容，只要开发者将该 9-patch 图像资源作为背景图像资源引用放置在该 `View` 对象中。这是通过 Android\
  \ `NinePatch` 类和 `NinePatchDrawable` 类内部存在的算法来实现的，此外，Android SDK 中 `/sdk/tools`\
  \ 文件夹内的 Draw 9-patch 软件工具中也包含了相关算法。\n\nNinePatch 图像资源的一个很好的用例是作为背景图像占位符（`android:background`\
  \ XML 参数）的内部内容，该占位符常用于标准的 Android `Button` 对象 UI 组件。`Button` UI 组件几乎总是需要至少在单个维度上拉伸，通常需要在\
  \ X 和 Y 两个维度上拉伸，以适应不同长度的文本字符串、不同的字体类型或不同的字体大小。\n\n此 `NinePatchDrawable` 对象引用了 Android\
  \ 推荐的 PNG 数字图像格式，并且它还包含一个额外的单像素宽度的边框。Android 操作系统支持三种不同“风格”的 PNG 图像：索引色（8 位）PNG8、真彩色（24\
  \ 位或 RGB）PNG24，以及带有 Alpha 通道的真彩色（32 位或 ARGB）PNG32 图像文件格式。\n\n为了能被 Android 识别为 9-patch\
  \ 图像资源，`NinePatchDrawable` 资源需要以 `.9.png` 的文件扩展名保存，并保存到相应 Android 项目的 `/res/drawable/`\
  \ 目录中。\n\n我之前提到的单像素边框对于最终用户是不可见的，而是由 Android `NinePatch` 类的算法来使用，以定义图像资源的哪些区域是可伸缩的，哪些区域是静态的（固定不变、不缩放，仅移动）。\n\
  \n我们将能够通过在此单像素边框的左侧和顶部区域内绘制一条（或多条）单像素宽的黑色线段，来指示 9-patch 图像资源的可伸缩部分。\n\n边框上所有未用于定义\
  \ 9-patch 图像可伸缩部分的其余像素，必须使用完全透明的颜色值（`#00000000`）或白色（`#FFFFFF`）颜色值。\n\n如果我们想更巧妙一点，甚至可以同时使用\
  \ `#00FFFFFF` 十六进制颜色值（透明白色）来定义两者。幸运的是，我们稍后将介绍的 Draw 9-patch 工具会为我们完成所有这些工作！\n\n\
  有趣的是，我们可以使用这些单像素黑色线段随意定义任意数量的可伸缩部分。需要注意的是，每个可伸缩部分相对于其他部分的相对大小将始终保持“比例一致”。这意味着，无论缩放大小如何，最大的可伸缩部分在任何缩放比例下都将始终是最大的可伸缩部分。\n\
  \n在为 9-patch 资源定义了（外部）可伸缩部分之后，接下来我们为 9-patch 图像定义（可选的）可绘制区域（内部），这些区域称为“内边距区域”。内边距可绘制区域告诉\
  \ Android 可以将定义在 `View` 对象或 `ViewGroup`（View 子类）布局容器对象中的元素放置在何处。\n\n引入此内边距功能是为了确保我们的\
  \ `NinePatchDrawable` 资源不被其他应用资源覆盖或在视觉上被遮挡。内边距的定义方式与定义可伸缩部分的方式相同，即使用在 9-patch 资源定义的右侧和底部单像素边框区域上绘制的单像素黑色“内边距线”。\n\
  \n例如，如果一个 `View` 对象将 NinePatch 设置为其背景，然后指定了 `View` 对象的文本属性，它将拉伸该属性，以使所有文本属性都适合我们通过右侧和底部的单像素黑色边框定义所指定的这个区域内。\n\
  \n需要注意的是，如果没有特别定义 9-patch 的内边距区域定义线，则 Android `NinePatch` 算法将转而使用左侧和顶部的缩放定义线段来定义图像资源的内边距（可绘制）区域。\n\
  \n总结一下单像素黑色边框线的用途差异：左侧和顶部的线定义了图像资源中哪些像素可以被复制，以便拉伸或缩放 9-patch 图像。底部和右侧的单像素黑色边框线则定义了\
  \ 9-patch 图像资源内部（内侧）的可绘制区域，`View` 对象的内容（属性或资源引用）允许覆盖这些区域。\n\n### Android NinePatch\
  \ 类：创建 NinePatch 资源\n\n`NinePatch` 类是 Java 主类 `java.lang.Object` 的直接子类，这意味着它用于定义\
  \ NinePatch Java 对象，并且是专门编码成为其自己的 Android 资源的。它不是基于 Android 操作系统内的其他类层级结构。正如您可能已经猜到的，它位于\
  \ `android.graphics` 包内。其类层级结构如下：\n\n`java.lang.Object`\n\n  `> android.graphics.NinePatch`\n\
  \n由 Android `NinePatch` 类构造的对象允许 Android 操作系统使用九个独立的部分来缩放和渲染此 9-patch 图像资源。\n\n\
  另一个很好的类比是指南针。9-patch 图像的四个角，即东北、西北、东南和西南方向，是不缩放的；而四条边，即北、东、南或西方向，是沿一个轴缩放的。指南针（9-patch\
  \ 图像）的中心则是沿其两个轴缩放的，就像 Android 中缩放普通图像一样。\n\n理想情况下，我们的 9-patch 源 PNG 图像资源的中间部分应该是\
  \ 100% 透明的，就像您稍后在本章中使用 Draw 9-patch 软件工具时会遇到的情况一样。这样做是为了让我们的 9-patch 能够围绕一个开放、矩形的内容区域提供一个可缩放的图像框架，供我们的\
  \ `View` 对象用于其样式化并引用的内容。\n\n这种设计方法将使开发者能够创建自定义图形，并按照他们定义的方式实现无缝缩放。\n\n当内容被添加到位于\
  \ 9-patch 图像资源内部的 `View` 对象中，并且此内容超出了 9-patch 图形资源的内部内边距限制时，可以轻松调整而不会导致资源变形。\n\n\
  Android SDK 中 `/tools` 文件夹内提供的 Draw 9-Patch 工具，为开发者提供了一个简单实用的工具，用于通过所见即所得（WYSIWYG）图形编辑器创建\
  \ NinePatch 图像资源。\n\n我将在本章的下一节中详细介绍 Draw 9-patch 软件的使用，那么让我们开始吧！\n\n\n\n### Draw\
  \ 9-Patch 工具：创建 NinePatchDrawable 资源\n\n本节将介绍如何使用 Android Draw 9-patch 工具创建 9-patch\
  \ 图形。你需要准备一张源 PNG 图像，用于创建 `NinePatchDrawable` 对象；我提供了一张名为 `NinePatchFrame.png` 的示例\
  \ PNG 图像资源。这张包含透明通道的真彩色 PNG32 数字图像资源，位于本书项目资源库的 `NinePatch` 子文件夹中。\n\n我之所以在即将创建的\
  \ 9-patch 中心区域使用透明通道来定义透明度，是为了让 Android 中位于该图像资源后方的任何图像层（即预期的合成层）都能在合成堆栈中与 9-patch\
  \ 图像资源完美融合。\n\n首先，在 Android SDK 文件夹层级中找到 `tools` 子文件夹中的 Draw 9-patch 工具。打开操作系统的文件导航工具；在\
  \ Windows 8 中即为资源管理器，如图 10-1 所示。\n\n如图所示，我将 Android SDK 文件夹命名为 `Android`，其中包含一个解压用于安装\
  \ SDK 的 `adt-bundle-windows-x86` 文件夹。该文件夹下是 `sdk` 文件夹，再下一级便是 `tools` 子文件夹。\n\n![A978-1-4302-5786-8_10_Fig1_HTML.jpg](img/A978-1-4302-5786-8_10_Fig1_HTML.jpg)\n\
  \n图 10-1.\n\n在 Android 文件夹的 `SDK` 子文件夹下的 `tools` 子文件夹中，找到 `draw9patch` Windows 批处理文件。\n\
  \n点击 `tools` 子文件夹后，如图 10-1 所示，你会看到一个 `draw9patch.bat` Windows 批处理文件；你需要启动该文件来运行\
  \ `Draw9patch` 软件工具。右键点击 `draw9patch` 文件，选择 `以管理员身份运行` 菜单选项，如图 10-2 所示。\n\n![A978-1-4302-5786-8_10_Fig2_HTML.jpg](img/A978-1-4302-5786-8_10_Fig2_HTML.jpg)\n\
  \n图 10-2.\n\n右键点击 `draw9patch` Windows 批处理文件，选择 `以管理员身份运行` 选项来执行。\n\n这将启动运行 `.bat`\
