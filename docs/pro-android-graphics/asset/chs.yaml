  \ 文件夹中的 `pag0.png` 图像资源。\n\n第二个参数是以毫秒为单位的持续时间，如你所知，第一帧使用 112 毫秒值，其余帧使用 111 毫秒，你将复制并粘贴这些值。如图\
  \ 14-6 所示，你的代码没有错误，可以继续。\n\n![A978-1-4302-5786-8_14_Fig6_HTML.jpg](img/A978-1-4302-5786-8_14_Fig6_HTML.jpg)\n\
  \n图 14-6. 调用 `.addFrame()` 方法和 `getResources().getDrawable()` 方法链来加载帧\n\n现在，选中你刚写的整行代码，在其下方再复制粘贴八次，依次指定图像资源文件名\
  \ `pag1.png` 到 `pag8.png`（当然，不带 `.png` 扩展名），并为每个文件指定 111 毫秒的帧持续时间，总共加起来为一秒。完整的帧加载代码行如图\
  \ 14-7 所示。\n\n![A978-1-4302-5786-8_14_Fig7_HTML.jpg](img/A978-1-4302-5786-8_14_Fig7_HTML.jpg)\n\
  \n图 14-7. 将 `frameAnimation.addFrame()` 方法调用语句在其下方复制八次并进行编辑\n\n接下来，你将配置 `AnimationDrawable`\
  \ 的循环方式，然后将其连接到 `ImageView`，并且你将了解 Android 的 `.post()` 方法调用。\n\n### 使用 `.setOneShot()`\
  \ 配置 `AnimationDrawable`\n\n下一步是定义帧动画的循环方式，使其无缝且连续。在 Java 代码中，这是通过使用名为 `.setOneShot()`\
  \ 的方法完成的，其布尔值为 `true`（不循环）或 `false`（无缝循环动画）。这类似于你在 XML 定义文件中使用 `android:oneShot`\
  \ 参数进行的设置。\n\n现在让我们使用此方法，通过以下代码将动画帧设置为永远持续播放，参数值为 `false`：\n\n```\nframeAnimation.setOneShot(false);\n\
  ```\n\n你的下一步是将 `pag` `ImageView` 动画显示 UI 组件与包含数据的 `frameAnimation` `AnimationDrawable`\
  \ 对象连接起来，这些数据将被发送到 `ImageView` 进行显示。你将使用现在已经熟悉的 `.setImageDrawable()` 方法，并将 `frameAnimation`\
  \ `AnimationDrawable` 对象作为参数值传入。这通过以下 Java 代码行完成，如图 14-8 所示：\n\n```\npag.setImageDrawable(frameAnimation);\n\
  ```\n\n接下来，你需要使用 `AnimationDrawable` 对象的 `.start()` 方法来启动它，这意味着调用你的 `animStarter`\
  \ `Runnable` 类的 `.run()` 方法。\n\n![A978-1-4302-5786-8_14_Fig8_HTML.jpg](img/A978-1-4302-5786-8_14_Fig8_HTML.jpg)\n\
  \n图 14-8. 使用 `.setOneShot()` 配置 `AnimationDrawable`，并使用 `.setImageDrawable()` 配置\
  \ `ImageView`\n\n这是通过使用 Android `Handler` 类中的一个方法（称为 `.post()` 方法）完成的，所以让我们花一点时间，准确了解\
  \ `.post()` 方法及其 `Handler` 类在 Android 中为我们做了什么。\n\n### 使用 `Handler` 类调度 `AnimationDrawable`\n\
  \nAndroid 的 `Handler` 类也是 `java.lang.Object` 的直接子类，而 `java.lang.Object` 是 Java 的主\
  \ `Object` 类，这使得 `Handler` 成为一个 `Object`。\n\nAndroid 的 `Handler` 类属于 `android.os.Handler`\
  \ 包。当你的应用程序中有 `import android.os` 语句时，它会被导入，该语句会导入应用程序开发所需的所有与操作系统相关的函数，例如 `Bundle`、`Handler`\
  \ 和类似的操作系统工具。\n\nAndroid 操作系统 `Handler` 类的层次结构如下所示：\n\n```\njava.lang.Object\n>\
  \ android.os.Handler\n```\n\nAndroid 操作系统的 `Handler` 对象使你能够发送和处理 `Runnable`（或 `Message`）对象。一个\
  \ `Handler` 对象将始终与生成该 `Handler` 对象的应用程序 UI 线程 `MessageQueue` 对象相关联。\n\n这个 `MessageQueue`\
  \ 对象将保存任何需要按先进先出（FIFO）调度算法处理的处理或消息传递任务。\n\n每个 `Activity` 子类只需要实现一个 `Handler` 对象，你的后台线程将通过它与\
  \ UI 线程进行通信以更新 UI。\n\n如果你想研究 Android 的 `MessageQueue` 类及其工作原理，可以在以下网址的开发网站上找到更多信息：\n\
  \n[`developer.android.com/reference/android/os/MessageQueue.html`](http://developer.android.com/reference/android/os/MessageQueue.html)\n\
  \n每个 Android `Handler` 对象的实例化都与其生成的线程以及该父线程的 `Thread` 和 `MessageQueue` 对象相关联。这意味着当你创建一个新的\
  \ `Handler` 时，它会被绑定到父线程的 `Thread` 和 `MessageQueue` 对象，这个父线程通常（但不总是）是生成此 `Handler`\
  \ 对象作为子 `Thread` 和 `MessageQueue` 对象实例的应用程序 UI（主）线程。\n\n从那时起，你的 `Handler` 对象将把它的消息和/或可运行对象传递到那个\
  \ `MessageQueue`，并在它们从该 `MessageQueue` 对象中取出时，按 FIFO 原则进行处理。\n\n`Handler` 的主要用途是调度要执行的\
  \ `Runnables`，就像你在这里对 `AnimationDrawable` 所做的那样，或者调度一个 `Message` 在处理流程的稍后某个时间点进行处理。你也可以利用\
  \ `Handler` 对象，使用与你当前正在使用的线程不同的线程来排队执行某些操作。\n\n当你启动应用程序后，应用程序的 UI 进程创建完成，其主线程（或\
  \ UI 线程）开始运行一个 `MessageQueue` 对象。该 `MessageQueue` 对象负责管理你 Android 应用程序的所有 Java 类（`Activity`、`Service`、`BroadcastReceiver`、`ContentProvider`\
  \ 等）和对象，以及你的 `Activity` 可能在显示屏上创建的任何窗口。\n\n你可以创建自己的线程，这些线程将使用一个 `Handler` 与你的主应用程序（UI）线程进行通信。这是通过与之前相同的\
  \ `.post()`（或针对 `Message` 对象的自定义 `.sendMessage()` 方法）调用实现的，但这次是从你的新线程中调用。\n\n任何给定的\
  \ `Runnable` 对象或 `Message` 对象，最终都将被调度到该 `Handler` 的消息队列中，然后在适当的时候进行处理。\n\n在 Android\
  \ 中，有三个方法被创建用于处理 `Runnable` 对象的调度：你正在使用的 `.post(Runnable)`，以及 `.postAtTime(Runnable,\
  \ long)` 和 `.postDelayed(Runnable, long)`。\n\n这三个 `.post(Runnable)` 方法变体允许你将 `Runnable`\
  \ 对象排队，以便在 `MessageQueue` 对象收到时被调用。在你的应用程序示例中，`Runnable` 是在 `animStarter` 类中实现的，并包含了\
  \ `.run()` 方法，而该方法内部又包含了 `.start()`。\n\n\n\n此外，还有一系列 `.sendMessage()` 方法，包括 `.sendMessage(Message)`、`.sendMessageAtTime(Message,\
  \ long)`、`.sendMessageDelayed(Message, long)` 和 `.sendEmptyMessage(int)`，这些方法都是针对\
  \ `Message` 对象的，你可以从参数列表中传入的 `Message` 对象看出这一点，而非像 `.post()` 方法那样针对 `Runnable` 对象。\n\
  \n`.sendMessage()` 方法还允许开发者将包含 `Bundle` 对象的 `Message` 对象加入队列，该 `Bundle` 对象中携带的数据将由\
  \ Handler 的 `.handleMessage(Message)` 方法处理。这要求你实现 Android 中 `Handler` 类的子类。\n\n\
