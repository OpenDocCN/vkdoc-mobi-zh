  \n\n\n### `ProgressDialog` 类：展示你的下载进度\n\nAndroid 有一个名为 `ProgressDialog` 的类，它让你能够轻松向用户展示下载正在进行的进度，这样他们就不会认为应用“卡住”了，反而会确信在你等待时，它在后台执行某项任务（下载数据）。\n\
  \nAndroid 的 `ProgressDialog` 类是 `AlertDialog` 类的一个直接子类，因此它是针对 Android 操作系统的一种专门类型的\
  \ `AlertDialog` 对象。`AlertDialog` 类本身是 `Dialog` 类的子类，用于创建 `Dialog` 类，而 `Dialog` 类又是主类\
  \ `java.lang.Object` 的子类。\n\n因此，Android `ProgressDialog` 类的层级结构如下所示：\n\n```\njava.lang.Object\n\
  \  > android.app.Dialog\n    > android.app.AlertDialog\n      > android.app.ProgressDialog\n\
  ```\n\n`ProgressDialog` 类以及 Android 中所有其他类型的 `Dialog` 类都归属于 `android.app` 包，因为它以某种方式成为了每个应用的一部分。在你的应用中使用\
  \ `ProgressDialog` 类（或对象）时，其导入语句会引用 `android.app.ProgressDialog` 包，你将在本章中看到这一点。\n\
  \n`ProgressDialog` 类是一个公共类，允许你的应用实现一个进度对话框，该对话框会显示一个动画进度指示器以及一段可选的文本消息。对于视频下载，动画进度指示器应使用旋转轮，因为这是视频下载的行业“规范”。\n\
  \n你将在本章稍后使用的旋转轮指示器是 `ProgressBar` 对象的默认指示器类型。另一种进度指示器类型是水平条指示器，它会显示在任何给定时间点已完成下载的百分比。\n\
  \n`ProgressDialog` 对象也可以使用 `View` 对象来替代你的文本消息。这意味着，如果你想发挥创意，使用自己通过本书前十八章节所学知识设计的图形或动画素材，你可以制作出非常炫酷的视觉进度对话框——只要你愿意这么选。\n\
  \n在 `ProgressDialog` 对象中只能使用文本消息或 `View` 对象；目前两者不能同时使用。当然，你可以简单地在你的 `View` 对象中实现你的文本（可绘制对象），所以对于像你这样专业的\
  \ Android 图形设计师来说，这不成问题！`ProgressDialog` 对象可以通过按下“返回”键使其可取消，也可以通过在 `ProgressDialog`\
  \ 对象（屏幕区域）之外点击（或外部区域）来使其可取消。如果你想知道的话，水平进度条的数值范围是从 0 到 10000。\n\n### 在 `GraphicsDesign`\
  \ 应用中实现 `ProgressDialog`\n\n让我们在你当前的流式数字视频代码库中实现一个 `ProgressDialog` 对象，这样你就可以将其从流式视频操作转变为视频预加载操作。你需要做的第一件事是声明一个\
  \ `ProgressDialog` 对象，并通过以下代码将其命名为 `downloadProgress`：\n\n```\nProgressDialog downloadProgress;\n\
  ```\n\n如图 19-4 所示，你需要将鼠标悬停在 `ProgressDialog` 类的引用上，并选择导入 `ProgressDialog`（`android.app`）的选项，这样\
  \ Eclipse 就会为你编写导入语句。然后，你就可以在你的其余代码中使用这个类了。\n\n![A978-1-4302-5786-8_19_Fig4_HTML.jpg](img/A978-1-4302-5786-8_19_Fig4_HTML.jpg)\n\
