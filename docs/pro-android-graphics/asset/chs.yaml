  XML 标记和 Java 代码在 Android 中完成。




  ### 本章小结


  在第八章中，你进一步学习了 Android 的数字图像用户界面元素容器 `ImageView`，你在前一章的应用 XML 标记和 Java 代码中已经初步实现了它。


  我们首先探讨了 `ImageView` 类及其各种子类、嵌套类、方法、属性和参数。你了解到，`ImageView` 类用于创建 Android 的 `ImageButton`
  UI 控件子类（你将在下一章学习）以及 `QuickContactBadge`。


  接着，我们研究了 `ImageView.ScaleType` 嵌套类，这是 Android 中一个非常重要的类，因为缩放是数字图像处理中的一个关键概念。正确缩放图像是在任何新媒体开发平台下获得清晰视觉效果的基础。


  你学习了 `java.lang.Enum` 类和枚举类型，然后了解了缩放常量，这些常量使用该类向 Android 操作系统指定对 `ImageView` UI
  控件资源使用何种缩放类型。


  然后，我们探讨了 `ImageView` 类特有的一些属性。我们从 `AdjustViewBounds` 标志以及 `maxWidth` 和 `maxHeight`
  开始，如果将该标志设置为 `true`（开启），你就可以指定自定义的宽度和高度值；请注意，在 Android 中通常不推荐这样做，但此处我们进行了全面讨论。


  接下来，我们研究了 ImageView 基线的概念，以及 `android:baseline` 和 `android:baselineAlignBottom`
  属性，它们允许你在 `ImageView` 中设置自定义基线，或者将基线设置为图像的绝对底部，而不是顶部。


  然后，我们探讨了 `cropToPadding` 属性以及如何将其与 Android 的填充参数结合使用，仅通过 XML 标记即可实现数字图像裁剪操作。


  最后，我们研究了 `android:tint` 参数和 `PorterDuff` 混合模式，这使得我们可以使用 XML 标记对数字图像源资源进行基本的颜色调整和校正。


  为了练习应用 `ImageView` 类的许多属性和特性，你在我们在 第 7 章 开始创建的**书签工具**及其 `RelativeLayout` 用户界面设计中实现了其中一些功能。


  在下一章中，你将学习 `ImageView` 的子类 `ImageButton`，以及如何使用 XML 标记和 Java 代码创建复杂的、交互式的、基于图像的按钮。


