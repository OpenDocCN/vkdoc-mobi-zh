  \n然后，您学习了如何利用右侧和底部的单像素边框区域来定义视图内容在 9-patch 图片资源内部居中的内边距区域。我们还探讨了 `NinePatch` 类，它允许我们创建实现\
  \ NinePatch 技术的 `NinePatch` 对象。\n\n接下来，我们介绍了 Draw 9-patch 软件实用工具，包括如何找到并启动它，以及如何使用它来创建\
  \ 9-patch 资源。\n\n您亲自动手实践，为目录框架的左侧和顶部边框创建了单像素黑色线段，以此观察 Draw 9-patch 用户界面控件的运作方式，以及右侧预览区域如何响应。\n\
