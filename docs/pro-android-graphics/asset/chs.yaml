  \ 函数调用从当前位置移动到 `onPrepared()` 方法内部即可。\n\n这样做的效果是，一旦数字视频“准备好”就会开始播放。在这种情况下，准备好意味着已加载到系统内存中，而在这里，这也意味着已完全下载！所以，让我们接下来完成这一步；将上一章编写的\
