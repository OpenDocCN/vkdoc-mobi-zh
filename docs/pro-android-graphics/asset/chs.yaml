  即使你的数字图像资源使用了透明 Alpha 通道（例如本例中带投影的圆环），这项技术也同样有效。你将 `android:layout_margin` 参数设置为
  50 DIP，这是展示使用边距和内边距在容器内缩放 `ImageView` 源图像资源之间差异的理想设置。


  如图 8-15 所示，这个圆环图像能够通过半透明的 `ImageView` 背景色以及 `RelativeLayout` 容器中的 `ImageView` 背景底板正确地产生阴影效果。


  在左侧的模拟器视图中，你使用了 `android:padding="50dp"` 参数来缩放源图像资源。正如预期，由于内边距在容器内部添加空间，容器保持了 `match_parent`
  布局规范的大小，但仍将图像资源缩小了近 50%。


  在右侧的视图中，你使用 `android:layout_margin="50dp"` 参数来缩放源图像资源。边距在容器外部添加间距，因此你的容器会随着图像资源一起缩小。


  ![A978-1-4302-5786-8_8_Fig15_HTML.jpg](img/A978-1-4302-5786-8_8_Fig15_HTML.jpg)


  **图 8-15.** 展示使用 50DIP 图像缩放操作：左侧使用内边距，右侧使用边距


  如图 8-15 左侧所示，第二个 `ImageView` 容器没有完全填满屏幕的原因，是因为 `TextView` 与第一个 `ImageView` 图像背板的顶部，以
  30dp 的基线对齐（位于其下方）。


