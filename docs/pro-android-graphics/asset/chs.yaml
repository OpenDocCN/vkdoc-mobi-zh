  ```\n\nJava `InputStream` 类属于 `java.io` 输入和输出工具包。Java IO `InputStream` 类的导入语句引用了\
  \ `java.io.InputStream` 包的导入路径，您很快就会看到。\n\n创建 `InputStream` 类（进而创建对象）是为了向开发者提供一个可由其应用程序读取的原始数据字节源。\n\
  \n大多数应用程序会利用输入流通过文件系统读取数据，就像您接下来要做的那样。`InputStream` 还可以处理通过网络使用 `.getInputStream()`\
  \ 方法调用读取原始数据，以及访问位于系统内存中的字节数组中的数据。\n\n您将使用 `.openRawResource()` 方法来加载您的 `InputStream`\
