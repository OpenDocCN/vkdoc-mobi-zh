  ```\n\n注意在图 17-14 中，在你输入 Android 的`Color`类并输入句点字符后，Eclipse 会弹出一个`ColorPicker Helper\
  \ Dialog`，其中包含了 Android 操作系统中所有可用的颜色常量值供你选择。这非常有用。\n\n![A978-1-4302-5786-8_17_Fig14_HTML.jpg](img/A978-1-4302-5786-8_17_Fig14_HTML.jpg)\n\
