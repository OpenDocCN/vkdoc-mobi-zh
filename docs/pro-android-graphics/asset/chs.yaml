  由于你想使用`android:layout_weight="0.8"`参数将这个嵌套的垂直布局设置为占用屏幕宽度的 80%，你需要添加一个`android:layout_width="0dip"`参数。使用`0dip`设置是一个鲜为人知的技巧，它会告诉
  Android 关闭布局的设备独立像素尺寸计算，几乎就像`0dip`对 Android 意味着“无 dip”。这将告诉 Android 操作系统根据当前设备屏幕尺寸以及`android:layout_weight`设置来计算屏幕尺寸。


