  \ 18-2 所示。这些代码用于创建 `MediaController` 对象并将其连接到 `VideoView` 对象。\n\n然后，使用 **Run As\
  \ ➤ Android Application** 工作流程，你会发现数字视频资源仍然可以播放，但只播放一次，仅使用了剩下的四行代码。这是在应用程序中实现数字视频资源播放（一次）所需的最少代码量。\n\
  \n![A978-1-4302-5786-8_18_Fig2_HTML.jpg](img/A978-1-4302-5786-8_18_Fig2_HTML.jpg)\n\
  \n**图 18-2.** 从数字视频播放中移除 `MediaController` UI 控件，为永久循环播放做准备\n\n在 Android 系统中实现数字视频循环播放最快（也最简单）的方法是使用\
  \ `.setLooping()` 方法，并将参数设为 `true`。由于 `MediaController` 功能不支持此方法（理由也很充分，如果视频无限循环，控制它就不太可行），你需要使用支持此方法的\
  \ `MediaPlayer` 类。\n\n你可能会认为声明、实例化并构造一个 `MediaPlayer` 对象，然后调用其函数是最好的方法，但有一种更巧妙的方式可以获取\
  \ `VideoView` 对象（内部）用于播放视频的 `MediaPlayer` 对象的引用。\n\n这可以通过使用你之前在本章学到的嵌套类来实现。由于你只需要设置一次循环参数，因此实现此目的最合理的嵌套类是\
  \ `MediaPlayer.OnPreparedListener()` 嵌套类。\n\n使用这个嵌套类，你可以在 Android 准备视频时设置循环参数，也就是在\
  \ Android 确定如何（或何时）以最佳方式播放视频时。这是一个设置参数（如循环参数）的绝佳时机，可以将其视为 `MediaPlayer` “配置”（也称为准备）阶段，即\
  \ `MediaPlayer` 即将开始的生命周期的一部分。\n\n这可以通过在 `splashScreen` `VideoView` 对象上调用 `.setOnPreparedListener()`\
  \ 方法，并在该方法调用中使用 `MediaPlayer.OnPreparedListener()` 引用实例化一个新的嵌套类来实现。\n\n实现此功能的 Java\
  \ 语句如图 18-3 所示，代码如下：\n\n```\nsplashScreen.setOnPreparedListener(new MediaPlayer.OnPreparedListener(){Override});\n\
  ```\n\n如图 18-3 所示，Eclipse 会为你提供编写未实现方法引导代码的选项，因此点击“添加未实现的方法”选项，并花点时间感谢这些小确幸吧。\n\n\
