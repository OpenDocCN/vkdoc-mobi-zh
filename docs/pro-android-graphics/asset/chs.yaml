  \n图 9-9. 使用“导出图像”对话框导出 `imagebutton_pressed.png` ImageButton 按下状态资源\n\n现在，你需要创建的四个\
  \ ImageButton 状态中只剩下一个了，即聚焦状态。你可以使用合成图像中已有的三个图层，通过不同的图层资源组合来实现。\n\n你只需通过点击图层左侧的眼睛图标来关闭\
