  Activity 与您的选项菜单协同工作，将其添加到您的 `AndroidManifest.xml` 配置文件中，并同时添加一个 `TextView` 组件。稍后，您还将向这个新的书签工具
  Activity 中添加其他类型的 UI 组件（View 子类）。


