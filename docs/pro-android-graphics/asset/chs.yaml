  \ 软件工具右侧和底部的单像素黑色边框线段定义了 9-patch 的内边距区域。您看到预览结果精炼成了专业水准的 9-patch 图片资源效果，并在 Draw\
  \ 9-patch 工具右侧的所有示例预览方向（包括方形、竖屏和横屏预览）中得以呈现。\n\n最后，您保存了 `NinePatchFrame.9.png` 这个\
  \ 9-patch 图片资源，并将其传输到 `/workspace/GraphicsDesign/res/drawable` 项目文件夹中。随后，按照 Android\
  \ 的要求，您使用小写字母和数字对文件进行了重命名。\n\n接下来，您创建了 XML 标记，将此 9-patch 图片资源作为背景图片，为您的目录 `LinearLayout`\
  \ 容器 UI 设计提供周边图形设计细节。\n\n在图形布局编辑器窗格中预览了 9-patch 效果后，您添加了值为 `13sp` 的 `android:textSize`\
  \ 参数，以防止 `TextView` UI 元素换行。然后，您使用 Nexus One 模拟器在竖屏和横屏模式下预览了结果。这样做的目的是为了精确观察 9-patch\
  \ 图片资源如何无缝、灵活地适应不同的屏幕形状（宽高比）。\n\n在下一章中，您将学习 Android 中的数字图像和动画资源混合，使用 Android 的 `PorterDuff`\
  \ 类及其众多的图像合成与混合模式及常量。这将使您的 Android 图形设计特效工作提升至全新水平，并在此基础上巩固本章关于 9-patch 设计与实现的学习内容。\n\
  \n---\n\n**摘要**\n\n在第十一章中，我们将深入探讨混合模式在数字图像合成中的作用，以及如何使用 Android `PorterDuff` 类在\
  \ Android 中实现这些数字图像混合模式。\n\n混合模式允许在数字图像合成中，在两个或多个图层之间执行高级合成操作。每个图层中的每个像素都会通过一种算法进行处理，以决定该像素将如何（或不如何）应用于其下方的图层。\n\
  \n应用混合模式通常需要使用数字图像编辑与合成软件工具，例如 Adobe Photoshop CS6 或开源数字图像软件包 GIMP（本书通篇使用，因其功能相当强大且可免费用于商业用途）。\n\
  \nAndroid 中集成了这些 PorterDuff 混合模式（有时也称为*传输模式*），再加上我们将在下一章介绍的、通过 Android 的 `LayerDrawable`\
  \ 类处理图层的能力，这使得通常仅在 Photoshop CS6 和 GIMP 2.8 等软件包中才有的强大功能，现在也掌握在了 Android 开发者手中。\n\
  \n这使得 Android 开发者能够通过应用这类算法特效（例如在 GIMP 2.8.6 中使用图层混合模式实现的特效），将其图形设计创意提升至一个全新的层次，并应用于其\
  \ Android 应用中的 UI 设计、图形设计、数字成像、数字视频和 2D 动画。\n\n图像混合的应用示例包括照片处理软件、游戏、电子书、GoogleTV\
  \ 的 iTV 节目、壁纸、屏幕保护程序，以及其他与图形相关的、您能想到的用途。通过巧妙的编码，所有这些领域甚至可以实现交互，因此，与图形设计相关的图像混合可能性，实际上仅受限于您的数字化想象力。\n\
  \n\n\n### 像素混合：将图像合成提升至新高度\n\n在深入探讨类、构造器、嵌套枚举类、常量以及所有那些有趣的技术性 Java 结构（这些结构使我们能够在\
  \ Android 应用内实现图像资源混合）之前，我们先总体了解一下什么是像素混合，以及混合模式（有时也称为传输模式）在图形设计中有何用处。\n\n总的来说，混合模式或传输模式最常用于图像合成目标，大多数数字图像艺术家使用\
  \ Adobe Photoshop CS6 或 GIMP 2.8.6 及更高版本的专业成像软件来执行此操作。\n\n当有多个合成层包含需要以某种高级方式组合以达到最终结果（可能是文本叠加、特效等任何内容）的图像资源时，就会使用混合。\n\
  \n重要的是要注意，只要你擅长实现 Alpha 通道，就不必一定实现混合模式来创建有效的图像合成，正如我们在前几章中已经看到的那样。\n\n因此，Alpha 通道对于数字图像合成的基础仍然很重要，在此基础上，混合使我们能够生成更好或更微妙的效果。所以，始终先从通过微调基于\
  \ Alpha 通道的合成来使合成图像清晰干净开始，然后在工作流程中下一步添加混合模式，以完善合成效果和最终结果。\n\n混合模式实际上是在逐个像素的基础上，使用算法来组合图像，使得生成的像素（图像）不仅仅是“正常模式”（未调用任何混合模式）下的图像合成。因此，如果你有一张图像，想要将黄色像素添加到另一图像层中的红色像素，以在最终的图像合成中创建橙色像素，那么你会使用混合模式来实现所需的最终结果，同时仍能保持原始的黄色和红色源数字图像资产独立且不受各自影响。\n\
  \n我们将在后续部分介绍 Android 中当前可用的混合模式，其中包括 Android 中专门包含枚举常量的类，我们可以使用这些枚举常量来调用或实现这些混合算法，以满足我们在\
  \ Android 应用中的图形设计目标。\n\n再次强调，混合像素应该“遵循”你的 Alpha 通道，以便它们在图像合成层级中知晓自己的位置。在计算链中，Alpha\
  \ 通道应优先于混合模式，该计算链在图像合成过程中实现，无论是在 Android 操作系统内，还是在 Adobe Photoshop CS6 或 GIMP 2.8.6\
  \ 及更高版本中。\n\n只有当像素具有一定程度的半透明度时，它才会被混合。由 Alpha 通道定义的 100% 透明像素不会被纳入混合算法。让我们深入了解 Android\
  \ 如何实现混合！\n\n### Android 的 PorterDuff 类：混合的基础\n\nAndroid 的 `PorterDuff` 类是 `java.lang.Object`\
  \ 主类的直接子类；它是一个本质上是从头编写的算法类，因此它并非基于目前在 Android 操作系统中发现的任何其他类型的超类功能。因此，`PorterDuff`\
  \ 类是一个完全独特的类，并为 Android 操作系统中的像素混合算法提供了基础实现。\n\n`PorterDuff` 类的 Java 层次结构如下所示：\n\
  \n```\njava.lang.Object\n  > android.graphics.PorterDuff\n```\n\nAndroid 的 `PorterDuff`\
  \ 类是 `android.graphics` 包的一部分，因此，其导入语句引用了 `android.graphics.PorterDuff` 包导入路径，正如我们稍后在本章中编写实现用于各种目的的\
  \ `PorterDuff` 混合的 Java 代码时会看到的那样。\n\n如果你想知道 Porter Duff 是谁，实际上是两个人，他们为混合模式和传输模式奠定了数学基础。一位名叫\
  \ Thomas Porter，另一位名叫 Tom Duff，他们在 1984 年撰写了一份白皮书，详细描述了像素混合背后的数学原理。\n\nAndroid 的\
  \ `PorterDuff` 类看似简单，因为它只包含一个 `PorterDuff()` 构造器方法，以及一个名为 `PorterDuff.Mode` 枚举类的单一嵌套类。\n\
  \n我们将在本章的多个部分中详细探讨这些类以及其他与 `PorterDuff` 相关的类。这些 `PorterDuff` 类包含了所有可用的混合模式算法、函数、传输常量和混合常量，使开发人员能够在其\
  \ Android 应用的图形设计和 UI 设计中实现高级图像合成。\n\n正如我提到的，混合模式有时也被称为传输模式，因为其中一些模式并非真正将像素值混合在一起。相反，其中一些模式的作用更像是布尔集合运算符（交集、并集、差集等）。因此，这些模式可以被视为传输模式，因为它们实际上并未混合像素值，而只是将像素从源图像和目标图像传输到最终的图像合成结果（目标或创建的合成图像资源）中。\n\
  \n出于这个原因，一些 `PorterDuff` 常量更像是传输模式常量，而不是混合模式常量。因此，我们将详细探讨每个 `PorterDuff` 常量，以便了解它们作为专业\
  \ Android 图形设计师能为*我们*提供哪些能力，以及它们是在源和目标图像资源之间混合像素，还是传输像素。一旦我们探讨完 `PorterDuff.Mode`\
  \ 嵌套类，我们就可以开始应用这些酷炫的数字图像混合知识了！\n\n你可能想知道这些混合和传输模式对 CPU 的消耗程度，以及哪些模式对处理器消耗更大。从我听到的其他开发者反映的情况来看，混合模式对处理器的消耗大约是传输模式的三倍，因为它们要计算一个新的像素颜色值，而不仅仅是计算是否需要显示一个像素。\n\
  \n\n\n### PorterDuff.Mode 类：Android 混合常量\n\nAndroid 的 `PorterDuff.Mode` 类是 `java.lang.Enum`\
  \ 类的直接子类，而 `java.lang.Enum` 类又是主类 `java.lang.Object` 的子类。因此，它是一个旨在持有枚举常量的枚举器类，与其嵌套的\
  \ `PorterDuff` 类紧密配合使用。\n\n`PorterDuff.Mode` 类也是一个完全独特的类，它为开发者提供了 Android 操作系统中实现高级像素合成操作所需的混合模式常量。\n\
  \n`PorterDuff.Mode` 类的 Java 层次结构如下：\n\n`java.lang.Object`\n\n`> java.lang.Enum<E\
  \ extends java.lang.Enum<E>>`\n\n`> android.graphics.PorterDuff`\n\n`PorterDuff.Mode`\
  \ 类也是 `android.graphics` 包的一部分，其导入语句引用的包导入路径为 `android.graphics.PorterDuff.Mode`，稍后在本章中编写实现\
  \ `PorterDuff.Mode` 混合模式常量的 Java 代码时，你将会看到这一点。\n\n目前在这个类中定义了 18 个 `PorterDuff.Mode`\
  \ 常量。我们将首先介绍像素混合常量，包括 `SCREEN`、`OVERLAY`、`LIGHTEN`、`DARKEN`、`MULTIPLY` 和 `ADD`，因为这些常量允许在图像合成过程中应用最特殊的成像效果。\n\
  \n之后，我们将介绍 `CLEAR`、`XOR` 以及 `SRC`（源）和 `DST`（目标）图像传输模式，这些模式对于应用高级图形设计工作流程或特殊效果也非常有用。\n\
  \n如果你在阅读本章本节内容时，无法在脑海中形象化地理解每个算法方程对像素混合的作用，请不要担心，我们将在本章后面部分通过视觉方式了解这些作用，因此你将获得丰富的“混合”经验！\n\
  \n需要注意的是，真正熟悉这些混合模式在给定合成应用中会做什么的唯一方法，就是花一些时间对其进行实验或使用。随着你使用混合模式的时间和经验增多，你将能够更准确地推测，在给定两张完全不同图像组合的情况下，任何特定混合模式会产生什么结果。\n\
  \n我们要查看的第一个混合常量是使用最频繁的常量之一，即 `ADD` 常量。它将源图像的饱和度与目标图像资产相加，用方程形式表示为 `Saturate(S+D)`。你可能已经猜到，在这些方程中，`S`\
  \ 代表源，`D` 代表目标。\n\n我们要查看的第二个常量不是混合或传输常量，而是一个实用常量。`CLEAR` 常量会清除合成结果区域中的所有像素数据，因此其方程形式为\
  \ `[0,0]`。\n\n第三个常量在图像合成中很受欢迎，即 `DARKEN` 常量。它使用源图像资产来变暗目标图像资产，用方程形式表示为 `[ Sa+Da\
  \ - Sa*Da, Sc*(1-Da) + Dc*(1-Sa) + min(Sc, Dc) ]`。\n\n还有一个 `LIGHTEN` 常量，图像合成者同样也经常使用它。你可能已经猜到，这与\
  \ `DARKEN` 常量相反。这个混合算法使用源图像资产作为变亮指南来提亮目标图像资产，用方程形式表示为 `[ Sa+Da - Sa*Da, Sc*(1-Da)\
  \ + Dc*(1-Sa) + max(Sc, Dc) ]`，与 `DARKEN` 算法相同，只是使用了 `max` 函数而不是 `min`。\n\n还有一个\
  \ `MULTIPLY` 混合常量，这是我最喜欢的常量之一；它使用以下方程将源图像和目标图像资产之间的像素值相乘：`[ Sa*Da, Sc*Dc ]`。这通常会产生变暗的效果。小写的\
  \ `a` 和 `c` 分别代表 Alpha（通道）和颜色（RGB）。\n\n比 `MULTIPLY` 混合模式稍微复杂一点的是 `SCREEN` 混合模式常量，它允许你基本上将源图像幽灵般叠加在目标图像之上，这使我们能够获得一些非常酷的特殊效果。此\
  \ `SCREEN` 混合算法使用以下方程：`[ Sa+Da - Sa*Da, Sc+Dc - Sc*Dc ]`。\n\n我的另一个最爱是 `OVERLAY`\
  \ 混合常量，这是特殊效果中最常用的混合常量之一。它结合了 `SCREEN` 混合模式和 `MULTIPLY` 混合模式。你可能已经从它的名字猜到，它将源图像和目标图像的像素值叠加在一起，使得源图像看起来像幽灵般浮现在目标图像之上。\n\
  \n`OVERLAY` 是 `SCREEN` 混合常量更高级的版本，其中像素会根据其亮度值被相乘或滤色；图像较亮的部分变得更亮（滤色），较暗的部分变得更暗（相乘）。\n\
  \n有五个与 `DST`（目标）相关的常量，它们专注于目标图像资产。第一个是 `DST` 常量，它仅隔离目标图像，意味着只显示目标图像，隐藏源图像，因此其方程为\
  \ `[Da, Dc]`。\n\n`DST_ATOP` 常量获取目标图像中位于源图像上方（与源图像相交）的部分，并仅将此部分显示在源图像的**上方**（即 ATOP）。产生此结果的方程如下：`[\
  \ Sa, Sa*Dc + Sc*(1-Da) ]`。\n\n`DST_IN` 常量获取目标图像中位于源图像内部（与源图像相交）的部分，并仅显示该目标图像中包含在源图像**内部**（IN\
  \ 或 INSIDE）的部分，但不显示源图像本身的任何部分。这等价于布尔交集运算。产生此数字图像交集结果的方程为 `[ Sa*Da, Sa*Dc ]`。\n\n\
  `DST_OUT` 常量所做的与 `DST_IN` 常量完全相反，它获取目标图像中位于源图像外部（不与源图像相交）的部分，并仅显示目标图像中不与源图像相交（OUT\
  \ 或 OUTSIDE OF）的部分，但不显示源本身。这等价于布尔减法运算，因为叠加在目标图像上的源图像部分本质上是从目标图像中减去的。产生此最终结果的算法或方程书写如下：`[\
  \ Da*(1-Sa), Dc*(1-Sa) ]`。\n\n`DST_OVER` 常量将目标图像叠加在源图像之上。因此，这等价于布尔并集运算，有时也称为布尔加法运算。方程如下：`[\
  \ Sa + (1-Sa)*Da, Rc = Dc+(1-Da)*Sc ]`。\n\n有五个与 `SRC`（源）相关的常量，它们专注于源图像资产。这些常量本质上与\
  \ `DST` 常量相同，只是在涉及源图像而非目标图像的意义上相反。其中第一个是 `SRC` 常量，它仅隔离源图像，意味着只显示源图像，隐藏目标图像，因此其非常简单的方程为\
  \ `[Sa, Sc]`。\n\n`SRC_ATOP` 常量获取源图像中位于目标图像上方（与目标图像相交）的部分，并仅将此部分显示在目标图像的**上方**（即\
  \ ATOP）。产生此结果的算法或方程如下：`[ Da, Sc*Da + (1-Sa)*Dc ]`。\n\n`SRC_IN` 常量获取源图像中位于目标图像内部（与目标图像相交）的部分，并仅显示源图像中包含在目标图像**内部**（IN）的部分，但不显示目标图像本身的任何部分。如果你想知道的话，其对应的布尔运算对于\
  \ `SRC` 和 `DST` 模式类型是相同的。产生此结果的方程为 `[ Sa*Da, Sa*Dc ]`。\n\n\n\n`SRC_OUT`常量与`SRC_IN`常量功能相反：它会获取源图像中位于目标图像之外（即不与目标图像相交）的部分，并仅显示源图像中不与目标图像相交（OUT\
  \ 或 OUTSIDE OF）的部分，但不会显示任何目标图像本身。产生此结果的算式为`[ Sa*(1-Da), Sc*(1-Da) ]`。\n\n`SRC_OVER`常量将源图像叠加在目标图像之上。产生最终结果的算法算式为`[\
  \ Sa + (1-Sa)*Da, Rc = Dc + (1-Da)*Sc ]`。\n\n最后是`XOR`混合模式常量，意为“两者择一”，它仅显示源图像或目标图像中的其中之一，但绝不会同时显示两者。因此，在源图像与目标图像重叠的区域，不会显示任何内容；而在不重叠的区域，则会显示源图像或目标图像（这是一种布尔“异或”操作）。该模式的算式为`[\
  \ Sa+Da - 2*Sa*Da, Sc*(1-Da) + (1-Sa)*Dc ]`。\n\n### `PorterDuffColorFilter`类：混合你的`ColorFilter`\n\
  \nAndroid 提供了一个专门的类来结合`PorterDuff`混合模式常量应用颜色值，即`PorterDuffColorFilter`类。该类是`android.graphics.ColorFilter`类的直接子类。它允许使用混合模式将颜色滤镜应用于图像资源，从而使开发者能够更灵活地通过算法对图像资源进行颜色更改，实现诸如颜色校正之类的目标，甚至可以使用一个源图像文件创建一百种不同颜色的图像资源，从而节省大量数据空间。\n\
  \n`PorterDuffColorFilter`类的 Java 层级结构如下：\n\n```\njava.lang.Object\n  > android.graphics.ColorFilter\n\
  \    > android.graphics.PorterDuffColorFilter\n```\n\nAndroid 的`PorterDuffColorFilter`类属于`android.graphics`包。因此，其导入语句将引用`android.graphics.PorterDuffColorFilter`包导入路径。\n\
  \n值得注意的是，你并不绝对需要构造一个`PorterDuffColorFilter`对象，才能将`PorterDuff.Mode`枚举常量应用于颜色过滤操作。正如你将在本章后续部分看到的，`ImageView`类中有一个版本的`setColorFilter()`方法，其参数列表中接受一个`PorterDuff.Mode`混合常量。该方法的使用方式如下：\n\
  \n```\nmyDigitalImageObjectName.setColorFilter( integer color, PorterDuff.Mode mode\
  \ );\n```\n\n实际上，设置这个过程相当容易，从而可以将`PorterDuff`类的强大功能应用于你的任何`ImageView`（以及其所继承的`ImageButton`子类）对象。就图形设计和图像合成而言，将`ColorFilter`算法与`PorterDuff`混合模式结合使用，是一种非常强大且实用的能力，因此我们现在就来介绍它。\n\
  \n让我们在你的`GraphicsDesign`应用程序的`BookmarkActivity`类中实现这一点，以演示如何仅用几行 Java 代码，通过`ColorFilter`方法应用`PorterDuff`混合模式。\n\
  \n### 使用 PorterDuff 将 ColorFilter 效果应用于图像资源\n\n如果尚未打开 Eclipse ADT，请先启动它，然后打开你的`GraphicsDesign`项目。右键点击`BookmarkActivity.java`文件，选择“打开”(Open)\
  \ 或按 F3 键，在 Eclipse 中央编辑窗格中编辑该文件。首先，你需要实例化在`activity_bookmark.xml` UI 定义 XML 文件中定义的`ImageView`。输入以下\
  \ Java 代码行来实现：\n\n```\nImageView porterDuffImage = (ImageView)findViewById(R.id.currentBookmarkImage);\n\
  ```\n\n如图 11-1 所示，你需要将鼠标悬停在波浪形的红色错误高亮上，并选择“导入 ImageView (android.widget)”选项；Eclipse\
  \ 将为你编写`Import android.widget.ImageView`语句，稍后你将在本章的图 11-2 中看到。\n\n![A978-1-4302-5786-8_11_Fig1_HTML.jpg](img/A978-1-4302-5786-8_11_Fig1_HTML.jpg)\n\
  图 11-1. 在`BookmarkActivity`类中实例化`currentBookmarkImage` ImageView 以创建 Java 对象\n\n\
  现在你的`ImageView`对象实例化已经没有错误了，你可以使用这个`porterDuffImage` ImageView 对象来调用`setColorFilter()`方法，该方法你在本章前一节已经了解过。这通过下面这一行\
  \ Java 编程代码实现：\n\n```\nporterDuffImage.setColorFilter(Color.YELLOW, PorterDuff.Mode.MULTIPLY);\n\
  ```\n\n这行 Java 代码的作用是调用`setColorFilter()`方法，并传入两个参数。第一个参数是你希望通过`PorterDuff`混合模式应用的颜色值。在本例中，是\
  \ Android 操作系统提供的`Color.YELLOW`常量。第二个参数是你将用来指定混合模式算法的`PorterDuff.Mode`混合常量。\n\n\
  在这个初始示例中，你将使用`MULTIPLY`常量，因为它是在数字图像资源上应用颜色变化或特殊着色效果时最常用的混合模式。这种`MULTIPLY`模式通常还会增加图像的对比度，使结果看起来更真实。\n\
  \n如图 11-2 所示，你需要再次将鼠标悬停在`Color`类引用上，选择“导入 Color (android.graphics)”选项，以让 ADT 为你编写`Import\
  \ android.graphics.Color` Java 代码语句。\n\n同样有趣的是，当你将鼠标悬停在`PorterDuff`类引用上的错误高亮时，Eclipse\
  \ ADT 并未提供“导入 PorterDuff (android.graphics)”选项，尽管该选项本是消除`PorterDuff`类引用下波浪形红色错误高亮的正确解决方案。嘿，人无完人，ADT\
  \ 也不例外！\n\n这意味着 Eclipse ADT IDE 的错误辅助对话框并非 100%“可靠”，我们不能总是依赖它们来解决 Eclipse ADT IDE\
  \ 中可能出现的所有 Java 代码错误问题。\n\n![A978-1-4302-5786-8_11_Fig2_HTML.jpg](img/A978-1-4302-5786-8_11_Fig2_HTML.jpg)\n\
  图 11-2. 通过导入`android.graphics.Color`和`android.graphics.PorterDuff`类修复错误高亮\n\n在这种情况下，你需要自己添加`Import`语句来解决这个错误。这通过以下\
  \ Java 语句实现：\n\n```\nimport android.graphics.PorterDuff;\n```\n\n如图 11-3 所示，你的代码现在没有错误了，并且用于在\
  \ Activity 子类 Java 代码中使用`ImageView`、`Color`和`PorterDuff`类的导入语句已经就位。你已拥有一个使用`PorterDuff.Mode`常量调用`setColorFilter()`方法的`ImageView`对象。\n\
  \n![A978-1-4302-5786-8_11_Fig3_HTML.jpg](img/A978-1-4302-5786-8_11_Fig3_HTML.jpg)\n\
  图 11-3. 使用`setColorFilter()`方法，通过`PorterDuff`的`MULTIPLY`模式应用颜色值更改\n\n\n\n由于`Graphical\
  \ Layout Editor`窗格不支持应用成像算法，你需要使用`Nexus One`模拟器来查看`PorterDuff`混合模式色彩滤镜数字图像应用的效果。\n\
  \n如图 11-4 左侧所示，黄色数值已被应用到引用你的`currentBookmarkImage` `<ImageView>` XML 标签定义的`porterDuffImage`\
  \ `ImageView`对象上，而该标签又引用了你的数字图像资源。\n\n![A978-1-4302-5786-8_11_Fig4_HTML.jpg](img/A978-1-4302-5786-8_11_Fig4_HTML.jpg)\n\
  \n图 11-4. 在`Nexus One`模拟器中测试`PorterDuff.MULTIPLY`模式（左）和`OVERLAY`模式（右）\n\n接下来，让我们看看另一个流行的混合模式常量——`OVERLAY`常量——对你的色彩滤镜应用会有什么效果。我还会向你展示如何在`.setColorFilter()`方法调用中应用一个精确的\
  \ 24 位色值，这通常是你作为图形设计专业人士想要做到的。将第二行 Java 代码修改为：\n\n```\nporterDuffImage.setColorFilter(Color.rgb(216,192,96),\
  \ PorterDuff.Mode.OVERLAY);\n```\n\n这行代码在你的`.setColorFilter()`方法内部调用了`Color`类的`.rbg()`方法，使用了一种更高级的\
  \ Java 代码结构，允许通过`PorterDuff`混合模式更精确地应用 24 位色值。\n\n如图 11-5 所示，Java 代码再次没有错误，你可以准备使用`Run\
  \ As` ➤ `Android Application`工作流程在`Nexus One`模拟器中测试你的代码。结果显示在图 11-4 所示的屏幕截图右侧。唉，`OVERLAY`模式并不尊重你的\
  \ alpha 通道数据！\n\n有时，更高级的 Android 类中会存在 bug，这个由`OVERLAY`混合模式常量引用的`OVERLAY`算法本应“尊重”你在原始图像资源中设置的\
  \ alpha 通道。\n\n我所说的“尊重”是指该算法只应将`OVERLAY`混合模式应用于非 100%透明的像素，因此，在原始数字图像合成资源中定义了 alpha\
  \ 通道透明度的区域，你不应看到任何菊花黄（RGB 216,192,96）的色值。\n\n这表明 Android 中的这个`PorterDuff`类及其模式尚未完全完善，可能因为这是一个高级特性，在大多数\
  \ Android 开发者社区中并不常用。话虽这么说，我相信 Android 开发团队最终会腾出时间为`OVERLAY`算法添加对源图像 alpha 通道的“尊重”，以便这种混合模式能够与包含用于合成的\
  \ alpha 通道的数字图像资源一起正常工作。\n\n目前的情况似乎是该算法使用透明度的灰度表示将模式应用于 alpha 通道，而不是首先将 alpha 通道视为一个指南，并利用它来确定该彩色像素值在最终图像合成结果中是否应该存在（或不存在）。这只是我的猜测，但在图\
  \ 11-4 所示的`OVERLAY`模式应用结果中，不应该出现一个纯色区域；只有篮筐和 logo 文字应该被提亮。\n\n![A978-1-4302-5786-8_11_Fig5_HTML.jpg](img/A978-1-4302-5786-8_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 用`.rgb()`方法调用替换`Color.YELLOW`常量，以允许指定任何色值\n\n接下来，让我们将`PorterDuff.Mode`常量引用改回`MULTIPLY`。另外，在`SCREEN`和`OVERLAY`算法更新以支持\
  \ alpha 通道之前，你将使用`MULTIPLY`通过 alpha 通道对象来混合颜色变化（参见图 11-6）。值得注意的是，对于那些不使用 alpha 通道进行图像合成或其他特殊效果目的的图像（例如照片），这些混合模式可以正常工作。\n\
  \n![A978-1-4302-5786-8_11_Fig6_HTML.jpg](img/A978-1-4302-5786-8_11_Fig6_HTML.jpg)\n\
  \n图 11-6. 用于使用 alpha 通道对数字图像资源进行色彩偏移的最终`.setColorFilter()` Java 结构\n\n在下一节中，我们将更进一步，利用`Paint`、`Bitmap`、`BitmapFactory`和`Canvas`类，在两个不同的数字图像资源之间应用一个选择的`PorterDuff`混合模式。\n\
  \n### `PorterDuffXfermode`类：应用混合常量\n\nAndroid 有一个专门的类，用于结合`PorterDuff.MODE`常量和`PorterDuff`类本身，来应用\
  \ PorterDuff 图像混合模式和传输模式。这个类称为 Android `PorterDuffXfermode`类，是 Android `Xfermode`类的直接子类。这个`Xfermode`子类被修改，允许通过使用你之前了解到的预定义混合模式常量，将\
  \ PorterDuff 算法应用于你的图像资源。\n\n`PorterDuffXfermode`类的 Java 层次结构如下：\n\n```\njava.lang.Object\n\
  \  > android.graphics.Xfermode\n    > android.graphics.PorterDuffXfermode\n```\n\
  \nAndroid `PorterDuffXfermode`类也是`android.graphics`包的一部分。因此，它的导入语句构建方式使其引用`android.graphics.PorterDuffXfermode`包导入路径。\n\
  \n正如你在本章稍后开始编写 Java 代码以实现数字图像资源中的 PorterDuff 传输模式时会看到的那样，Android `Paint`类的`.setXfermode()`方法与你的`PorterDuffXfermode`对象和`PorterDuff.Mode`常量结合使用，以使用某种混合算法“加载”`Paint`对象，该`Paint`对象将利用该算法将一个图像资源“绘制”到另一个图像资源上。\n\
  \n### `Paint`类：将混合常量应用到图像上\n\n你需要做的第一件事是构造那个`Paint`对象，所以打开 Eclipse，并在编辑器中使用右键单击`Open`命令或左键单击`F3`键打开你的`ContentsActivity.java`类，然后在类的第一行`Override`上方添加下面这行\
  \ Java 代码：\n\n```\nPaint paintObject = new Paint();\n```\n\n这将构造一个名为`paintObject`的空`Paint`对象，供你在\
  \ Activity 中进行像素绘制操作。如图 11-7 所示，你需要将鼠标悬停在错误高亮上，并选择`Import Paint (android.graphics)`选项，以便自动为你写入`Import\
  \ android.graphics.Paint` Java 代码语句。\n\n![A978-1-4302-5786-8_11_Fig7_HTML.jpg](img/A978-1-4302-5786-8_11_Fig7_HTML.jpg)\n\
  \n图 11-7. 在`ContentsActivity.java`中使用`Paint()`构造函数创建一个名为`paintObject`的`Paint`对象\n\
  \nAndroid `Paint`类用于在显示屏上绘制或“绘画”像素，因此它包含了绘制几何图形、文本和位图所需的样式、透明度、模式、字体和颜色信息。\n\n`Paint`类是`java.lang.Object`类的直接子类，因此它是一项独特的功能，不基于\
  \ Android 中的任何其他类型的类。它是 Android 中用于图形处理的核心类之一，与`Bitmap`和`Canvas`类齐名，你将在本章中同时学习这些类，因为这三个图形类必须协同工作，才能执行诸如\
  \ PorterDuff 混合此类的高级操作。\n\nAndroid `Paint`类的 Java 层次结构因此构建如下：\n\n```\njava.lang.Object\n\
  \  > android.graphics.Paint\n```\n\n你将在本章稍后部分看到如何使用这个`Paint`类。\n\n\n\n### 使用位图类在图像间应用\
  \ PorterDuff 混合模式\n\n现在你已经设置好 `Paint` 对象，可以创建 `Bitmap` 对象了。这些 `Bitmap` 对象将保存你的 `backgroundImage`\
  \ 和 `foregroundImage` 图像资源，你需要使用 Android 的 `BitmapFactory` 类将这些资源加载到 `Bitmap` 对象中。\n\
  \n你还需要使用 `.copy()` 方法将 `Bitmap` 对象转换为 Android 中所谓的可变（mutable）`Bitmap` 对象。可变意味着你的\
  \ `Bitmap` 对象的像素可以被编辑（修改）。要实现这一点，它必须被加载到系统内存中，这就是为什么你要使用 `.copy()` 方法将图像资源从可绘制资源区域取出并放入系统内存的原因。\n\
  \n所有涉及 `Bitmap` 的工作都通过以下四行 Java 代码完成：\n\n```\nBitmap backgroundImage = BitmapFactory.decodeResource(getResources(),\
  \ R.drawable.cloudsky);\nBitmap mutableBackgroundImage = backgroundImage.copy(Bitmap.Config.ARGB_8888,\
  \ true);\nBitmap foregroundImage = BitmapFactory.decodeResource(getResources(),\
  \ R.drawable.cloudsky);\nBitmap mutableForegroundImage = foregroundImage.copy(Bitmap.Config.ARGB_8888,\
  \ true);\n```\n\n第一条语句使用你的 `BitmapFactory` 类的 `.decodeResource()` 方法，通过调用 `.getResources()`\
  \ 方法，将 `drawable` 文件夹中的 `cloudsky.jpg` 图像资源加载到名为 `backgroundImage` 的 `Bitmap` 对象中。\n\
  \n第二条语句获取这个 `Bitmap` 对象，并使用 `.copy()` 方法将其加载到系统内存中，并通过使用 `Bitmap.Config.ARGB_8888`\
  \ 常量以及设置为 `true` 的 `isMutable` 标志，指定它需要 32 位内存空间。\n\n如图 11-8 所示，你需要在 Eclipse 中鼠标悬停在你的\
  \ `Bitmap` 类和 `BitmapFactory` 类引用上，并为这两个类调用导入选项，以便让 Eclipse 为你编写那些导入语句。\n\n![A978-1-4302-5786-8_11_Fig8_HTML.jpg](img/A978-1-4302-5786-8_11_Fig8_HTML.jpg)\n\
  \n*图 11-8. 使用 BitmapFactory 类为 backgroundImage 和 foregroundImage 创建 Bitmap 对象*\n\
  \n现在，你的 `Bitmap` 对象已从 `/res/drawable` 资源区域加载，并作为带有 Alpha 通道的 32 位数据加载（复制）到内存中，且\
  \ `isMutable` 标志设置为 `true`，以便你可以在 Android 的 `Paint` 和 `Xfermode` 操作中编辑（使用）这些数据。至此，你可以使用\
  \ `Paint` 对象和 `.setXfermode()` 方法来加载你选择的 PorterDuff 模式，从而让 `Paint` 对象知道你希望它如何工作。\n\
  \n### 使用 `.setXfermode()` 方法应用 PorterDuffXfermode\n\n下一行 Java 代码将设置你的 `Paint` 对象（名为\
  \ `paintObject`），使其能够使用你之前了解过的 `PorterDuffXfermode` 对象加载 `PorterDuff.Mode.XOR` 常量。这是通过调用\
  \ `Paint` 对象的 `.setXfermode()` 方法来完成的，如下所示：\n\n```\npaintObject.setXfermode(new\
  \ PorterDuffXfermode(PorterDuff.Mode.XOR));\n```\n\n这行代码使用点表示法调用了 `paintObject`（即\
  \ `Paint` 对象）的 `.setXfermode()` 方法；同时，在该方法调用内部，创建了一个新的 `PorterDuffXfermode` 对象，并通过其参数列表将其设置为\
  \ `PorterDuff.Mode.XOR` 常量。\n\n如图 11-9 所示，输入这行 Java 代码后，你需要鼠标悬停在 `PorterDuffXfermode`\
  \ 类引用上，导入 `PorterDuffXfermode`（`android.graphics`）后，也能消除 `.setXfermode()` 的错误高亮。正如你现在所知，你可能需要手动编写\
  \ `import android.graphics.PorterDuff` 语句，因为 Eclipse 似乎无法检测到需要导入 `PorterDuff` 类。\n\
  \n![A978-1-4302-5786-8_11_Fig9_HTML.jpg](img/A978-1-4302-5786-8_11_Fig9_HTML.jpg)\n\
  \n*图 11-9. 使用 paintObject 的 .setXfermode() 方法创建一个新的 PorterDuffXfermode XOR 对象*\n\
  \n现在你的 `Paint` 对象已经配置完成，可以设置你的 `Canvas` 对象了。\n\n### Canvas 类：为合成创建画布\n\nAndroid\
  \ 的 `Canvas` 类用作在显示屏幕上绘制的引擎。如果你熟悉游戏设计，你之前应该听说过 Canvas；这是图形设计师常用的术语，不仅可用于 Android，还可用于其他流行的编程范式，例如\
  \ HTML5 应用。\n\n为了将图形绘制到屏幕上，你需要四个基本组件。第一个是 `Bitmap` 对象，用于在系统内存中保存像素；第二个是 `Canvas`，用于执行绘制指令（将数据写入\
  \ `Bitmap` 对象）；第三个是绘制“原语”对象，例如 `Rect`、`Path`、`Text` 或 `Bitmap` 对象；最后一个是 `Paint`\
  \ 对象，用于描述将由 `Canvas` 渲染引擎通过这个原语应用到 `Bitmap` 对象的颜色、模式和样式。可以肯定的是，Android 中的图形处理绝非易事。\n\
  \nAndroid 的 `Canvas` 类是另一个 100% 原创代码的直接继承 `java.lang.Object` 的子类。这是因为它需要为 Android\
  \ 操作系统进行专门定制。因此，它的 Java 层次结构如下：\n\n```\njava.lang.Object\n> android.graphics.Canvas\n\
  `\n\n接下来你将使用这个 `Canvas` 类，因为你需要它的渲染引擎能力来为你编写的、用于演示如何混合图像的 Java 代码执行此 PorterDuff\
  \ 混合模式操作。\n\n在 Android 中设置图像合成栈的下一步是创建一个供你绘制的 `Canvas`。这包括创建你的目标合成图像，它将是另一个 `Bitmap`\
  \ 对象，你将其恰当地命名为 `compositeImage`，因为它将保存你合成的图像。\n\n这是通过使用 `.createBitmap()` 方法完成的，你还会同时使用\
  \ `mutableForegroundImage` 对象来加载它，这样你正在混合的两幅图像中的一幅就已经加载并处于就绪状态。你将使用以下单行 Java 编程逻辑来做到这一点，该逻辑声明了\
  \ `Bitmap` 对象，为其命名，并将其设置为 `Bitmap` 类调用其自身的 `.createBitmap()` 方法的结果，同时在函数调用内部传入 `mutableForegroundImage`\
  \ 参数：\n\n```\nBitmap compositeImage = Bitmap.createBitmap(mutableForegroundImage);\n\
  ```\n\n接下来，你想创建（构造）并设置你的 `Canvas` 对象，将其命名为 `imageCanvas`，它将引用你的 `compositeImage`\
  \ `Bitmap` 对象。这是通过以下代码行中的 `new` 关键字完成的：\n\n```\nCanvas imageCanvas = new Canvas(compositeImage);\n\
  ```\n\n如图 11-10 所示，你需要将鼠标悬停在两个 `Canvas` 对象引用之一上，然后选择导入 Canvas（`android.graphics`）选项，以便你能够在\
  \ Java Activity 中使用这个 `Canvas` 类。\n\n![A978-1-4302-5786-8_11_Fig10_HTML.jpg](img/A978-1-4302-5786-8_11_Fig10_HTML.jpg)\n\
  \n*图 11-10. 使用 .createBitmap() 方法创建 compositeImage Bitmap 对象以及 imageCanvas Canvas\
  \ 对象*\n\n现在你已经设置好了 Bitmaps、`Paint` 对象和 `Canvas` 对象，可以编写代码将它们整合到一起并执行合成操作了。这行代码使用了\
  \ `Canvas` 类的 `.drawBitmap()` 方法，该方法接受四个参数。\n\n第一个参数是你的 `Bitmap` 对象，这里是你正在混合的另一个\
  \ `Bitmap` 对象；第二个是源矩形（`Rect` 对象），此处为 `null`，因为你的图像就是源；第三个是目标矩形，此处你创建了一个新的 `Rect`\
  \ 对象，其尺寸与 `cloudsky.jpg` 图像资源相同；第四个是 `Paint` 对象，也就是你之前创建并加载了引用 `PorterDuff.Mode.XOR`\
  \ 混合算法常量的 `PorterDuffXfermode` 对象的那个 `paintObject`。\n\n```\nimageCanvas.drawBitmap(mutableBackgroundImage,\
  \ null, new Rect(0, 0, 1000, 1000), paintObject);\n```\n\n\n\n如图 11-11 所示，只需导入一个类——`Rect`类。将鼠标悬停在`Rect`上，选择**Import\
  \ `Rect` (android.graphics)** 选项以添加该导入语句，并清除所有图像合成 Java 代码中的那些烦人的红色错误高亮。\n\n现在，你已使用系统内存中的`Canvas`引擎设置好了所有这些精彩的位图图像合成混合绘制，但除非你将数据传输到`ImageView`对象中以便在屏幕上显示，否则你会对自己所做的这一切工作感到非常失望。这意味着你需要进行一些简单的\
  \ XML 标记，至少与刚刚为实现 Android 图像混合而编写的 Java 代码相比是这样！因此，让我们在 XML 中设置一个`ImageView`子标签，用于显示图像合成结果！\n\
  \n![A978-1-4302-5786-8_11_Fig11_HTML.jpg](img/A978-1-4302-5786-8_11_Fig11_HTML.jpg)\n\
  \n**图 11-11.** 使用`imageCanvas`对象上的`.drawBitmap()`方法将`paintObject`应用到图像上\n\n在 Eclipse\
  \ 的中心编辑窗格中打开`activity_contents.xml` XML 定义文件，如果它已经打开，请单击其选项卡将其激活以进行编辑，接下来你将添加`<ImageView>`子标签。\n\
  \n### 在 XML 和 Java 中创建 ImageView 以显示 Canvas\n\n在第一个嵌套的`<LinearLayout>`容器内的`<ImageButton>`子标签正下方，添加一个`<ImageView>`子标签，如图\
  \ 11-12 所示。这将在你的`ImageButton`下方、目录 UI 屏幕的左下角放置一个用于混合合成的`ImageView`。\n\n将`android:id`参数命名为`porterDuffImageView`，并为其分配一个\
  \ 8DIP 的边距以确保布局美观。务必包含所有其他必需参数，包括将`android:layout_width`和`android:layout_height`设置为`WRAP_CONTENT`，以及为视障用户设置的`android:contentDescription`参数，引用现有的`@string/bookmark_utility`。\n\
  \n由于你没有通过`android:src`或`android:background`参数配置此`<ImageView>` UI 元素（因为你将在 Java 代码中定义它），因此在**图形布局编辑器**选项卡中你将看不到它，除非你在切换到\
  \ GLE 编辑模式之前选中（或光标位于）`ImageView`标签或其五个参数之一。\n\n如果你选中了`ImageView`标签，你仍会看到一个带有手柄的选择控件包围在其周围，表明你的`ImageView`\
  \ UI 控件确实已包含在用户界面定义中。\n\n![A978-1-4302-5786-8_11_Fig12_HTML.jpg](img/A978-1-4302-5786-8_11_Fig12_HTML.jpg)\n\
  \n**图 11-12.** 在第一个嵌套的`<LinearLayout>`标签中添加 ID 为`porterDuffImageView`的`<ImageView>`子标签\n\
  \n现在，你可以实例化`ImageView`对象，如图 11-13 所示。\n\n![A978-1-4302-5786-8_11_Fig13_HTML.jpg](img/A978-1-4302-5786-8_11_Fig13_HTML.jpg)\n\
  \n**图 11-13.** 实例化名为`porterDuffImageComposite`的`ImageView` Java 对象并引用 XML\n\n如图\
  \ 11-13 所示，在此`Activity`子类中你尚未使用任何`ImageView`对象，因此请将鼠标悬停在`ImageView`类引用上并选择**Import\
  \ `ImageView` (android.widget)**。另外，请注意你使用以下代码为`ImageView`对象指定了一个逻辑名称（`porterDuffImageComposite`）：\n\
  \n```\nImageView porterDuffImageComposite = (ImageView) findViewById(R.id.porterDuffImageView);\n\
  ```\n\n现在，你只需将`compositeImage` `Bitmap`对象连接到`porterDuffImageComposite` `ImageView`对象，就可以准备测试大量`PorterDuff`混合模式了，所用\
  \ Java 代码不超过十几行。对于实现像使用`PorterDuff`混合模式进行图像合成这样高级的图像图形操作来说，这相当简洁！\n\n### 通过`.setImageBitmap()`将\
  \ Canvas 写入 ImageView\n\n最后，单击 ADT 顶部的`ContentsActivity.java`编辑选项卡，添加最后一行代码：使用点号调用`porterDuffImageComposite`\
  \ `ImageView`对象上的`.setImageBitmap()`方法，并将`compositeImage` `Bitmap`对象作为参数传递给它，如图\
