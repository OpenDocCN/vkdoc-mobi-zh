  \n**图 16-15.** 使用图形布局编辑器预览你的椭圆形 ShapeDrawable 和虚线 `<stroke>` 设置\n\n\n\n### Android\
  \ Drawable 类：图形蓝图\n\nAndroid 的 `Drawable` 类是 `java.lang.Object` 主类的另一个直接子类。这表明 `Drawable`\
  \ 类是专门为 Android 操作系统定义图形对象而设计的，因此，我们需要对其进行详细讨论。\n\nAndroid `Drawable` 类的层级结构如下：\n\
  \n```\njava.lang.Object\n> android.graphics.drawable.Drawable\n```\n\nAndroid 的\
  \ `Drawable` 类属于 `android.graphics.drawable` 包。因此，`Drawable` 类的导入语句将其类导入路径引用为 `android.graphics.drawable.Drawable`\
  \ 包。\n\n`Drawable` 类是一个公共抽象类。这种访问修饰符配对意味着，除了用于初始声明 `Drawable` 对象，或用于创建子类（例如你在本章中将要使用和创建的类）之外，该类不能直接使用。\n\
  \n`Drawable`（类或对象）是 Android 操作系统用于表示某种图形对象的术语。它可能源于这样一个假设：“可绘制的东西应该被称为 `Drawable`。”Android\
  \ 喜欢为操作系统组件和功能创建自己的术语，例如 `Activities`、`Receivers` 和 `Drawables`。\n\n正如你在本书中所看到的，当你需要某种与图形相关的对象（内存中）资源时，你将处理\
  \ `Drawable` 对象。当你希望在显示器上绘制某些内容时，你将实例化一个 `Drawable`（或其子类 `Drawable` 类型，例如 `BitmapDrawable`）。\n\
  \n`Drawable` 类代表了 Android 图形设计的基础，旨在提供用于处理底层图形资源的通用 API。正如我们在本章第一部分查看 Android 中可用的多种不同类型的\
  \ `Drawable` 对象时所看到的，这种图形资源可以采用多种形式。\n\nAndroid 中的 `Drawable` 对象不具备接收事件的能力，也不允许与用户进行任何交互。这些功能由你的\
  \ `View` 对象处理，通常是 `ImageView`，它将在其内部“包含”（或引用）你的 `Drawable` 对象，要么放在保存源图像板（容器）的前景参数中，要么放在保存背景图像板（或者只是一个简单的\
  \ ARGB 颜色值）的背景参数中。\n\n`Drawable` 主类为所有其他类型的 `Drawable` 子类提供了五个功能支持领域。这些包括 `Drawable`\
  \ 对象的填充、边界、动画、状态控制和层级。\n\n我们在本书中已经看到过这些概念中的一部分，例如，对于填充值，`Drawable` 类的 `.getPadding()`\
  \ 方法将从一个 `Drawable` 对象返回（如果适用）有关如何放置该 `Drawable` 对象内所包含内容的信息。\n\n例如，一个 `Drawable`\
  \ 对象，如 `NinePatchDrawable` 对象，它旨在用作按钮 UI 小部件的图形框架，将需要返回一个填充 `Rect` 值，该值能够准确地将文本标签放置在按钮\
  \ UI 元素内的 `NinePatchDrawable` 资源中。这个 `.getPadding()` 方法调用使用 `Rect` 对象作为参数，通过以下方法调用代码实现，你将在本章稍后学习到：\n\
  \n`yourDrawableObjectNameHere.getPadding(Rect);`\n\n我们在本书中也多次提到 `AnimationDrawable`（帧动画）对象。任何\
  \ `Drawable` 子类都可以通过使用 `Drawable` 类中的两个嵌套类之一“回调”其父类来支持动画。\n\n对于你想要创建的任何会扩展 `Drawable`\
  \ 类的动画 `Drawable` 对象子类，都应该实现这个 `Drawable.Callback` 接口。\n\n子类可以通过 `.setCallback(Drawable.Callback)`\
  \ 方法调用来支持该接口，以便动画在你的 `Drawable` 子类中正常运行。最简单的方法是在自定义 `Drawable` 对象上调用 `Drawable`\
  \ 的 `.setBackgroundDrawable()` 方法。\n\n我们还研究过多状态 `ImageButton` 对象和类似的 `Drawables`，它们会考虑\
  \ UI 元素或图形的状态，以便设置 `Drawable` 资源引用并显示正确的图像资源。\n\n`Drawable` 类包含一个 `.setState()`\
  \ 方法，该方法允许 `Drawable` 子类告诉它创建的 `Drawable` 对象，每个 `Drawable` 资源需要为哪种状态绘制：例如，当鼠标悬停时，或当\
  \ UI 元素获得焦点时，或当对象被选中时，甚至是当用户正在使用自定义定义的状态时。\n\n支持设置状态的 `Drawable` 对象将根据此状态或状态变化信息修改其源图像。你在本书中已经创建过一个多状态\
  \ `Drawable`，即在第 9 章中，你创建了一个具有四种不同按钮 UI 状态的 `ImageButton Drawable`。\n\n`Drawable`\
  \ 对象还可以使用 `.setLevel()` 方法响应不同的层级。此方法允许 `Drawable` 对象响应任何控制器，控制器可以发送层级信息来触发需要显示的确切\
  \ `Drawable` 资源。层级对于与 Android 硬件一起使用特别有用，例如，实时显示电池电量，或者如果硬件支持该功能（就像今年即将推出的新款 Android\
  \ 手表很可能会支持的那样）则设置高度计层级。\n\n最后，`Drawable` 类通过使用 `.setBounds()` 方法支持边界，该方法需要用于告知你的\
  \ `Drawable` 应该绘制在哪里，以及在屏幕上应该有多大。在本章下一节中，当你创建自己的自定义 `Drawable` 子类 `ImageRoundingDrawable`\
  \ 类时，你将利用 `.getBounds()` 方法。\n\nAndroid 开发者可以通过使用 `.getIntrinsicHeight()` 或 `.getIntrinsicWidth()`\
  \ 方法，找出任何给定 `Drawable` 对象的首选尺寸。\n\n\n\n### 创建自定义 Drawable：ImageRoundingDrawable\n\
  \n让我们回到 Eclipse 中，创建你自己的自定义 `Drawable` 子类，以便你能够确切了解其实现方式。右键点击你的项目 `/src/` 文件夹，然后选择\
  \ **新建 ➤ 类** 菜单命令序列，如截图左侧的图 16-16 所示。\n\n![A978-1-4302-5786-8_16_Fig16_HTML.jpg](img/A978-1-4302-5786-8_16_Fig16_HTML.jpg)\n\
