  接下来，让我们添加一些更高级的参数，将你的文本从屏幕顶部向下移动一些，使其变大，改为等宽字体，并添加一些投影特效，就像你在 Photoshop CS6 或 GIMP
  2.8.6 中设计 UI 一样。为了节省空间，我将每行使用两个参数，如图 7-9 所示，因为很快你就要向这个 `RelativeLayout` 容器中添加更多标签了。


  要将 `TextView` 从屏幕顶部向下推开，你将使用 `android:marginTop` 参数，并将其值设置为 `10dip`（或 `10dp`）。




  接下来，你可以使用`android:typeface`参数将字体更改为等宽字体（如果你喜欢罗马字体，也可以使用衬线字体），该参数可以设置为`normal`、`sans`、`serif`或`monospace`。如果愿意，你可以在
  XML 标记中尝试这些设置；我使用了`monospace`，因为它能使文本在屏幕顶部更均匀地分布，并且与屏幕顶部的 Activity 标签（使用`sans/normal`字体）形成视觉区分。


  为了让文本更粗，我们来实现`android:textStyle`参数，将其设置为`bold`，你也可以使用`normal`或`italics`来实现不同的文本样式效果。我使用了粗体，因为我想在添加投影效果之前加粗字体笔画。


  此外，通过将`android:textSize`参数设置为`21sp`来增大`TextView`的大小。需要注意的是，Android 操作系统中的所有文本或字体设置都使用标准像素或`sp`单位，而不是密度无关像素`dip`或`dp`。原因在于（你在第
  5 章中已经学过），Android 会对其使用的字体应用缩放因子，你可以通过`DisplayMetrics`类来获取该因子。现在，你已拥有一个可以添加投影效果的大尺寸、加粗的`TextView`对象！


  使用`android:`工作流程打开你的辅助对话框，输入文本字符串`android:shadow`，系统将仅为你筛选出与阴影相关的参数。共有四个参数：`Dx`（Delta-X）、`Dy`（Delta-Y）、`Color`和`Radius`。如果你不清楚，“Delta”指的是偏移量，即与实际文本的差值，因此设置为`0.0`将不产生任何效果。


  ![A978-1-4302-5786-8_7_Fig9_HTML.jpg](img/A978-1-4302-5786-8_7_Fig9_HTML.jpg)


  **图 7-9.** 为`TextView`添加高级标签参数：字体、样式、字号及投影特效


  需要注意的是，投影特效不会在图形布局编辑器（GLE）选项卡中渲染，因此你在 Eclipse 中无法看到这些参数！你必须使用“Run As ➤ Android Application”工作流程，然后在
  Nexus One 模拟器中查看它们。这就是为什么我在截图 7-8 中包含了右侧远端的显示结果面板。


  首先，使用`android:shadowDx`参数（设置为实数值`-1.7`）和`android:shadowDy`参数（设置为实数值`1.675`）来指定投影相对于文本的偏移量。注意，我利用了实数类型的特性，为
  Y 轴值提供了精确的小数，这使得投影几乎位于文本下方两个像素处。X 轴负值则将投影向左拉动近两个像素，形成标准的 45 度投影效果，这意味着光源来自图像右上方。


  接下来，设置投影颜色。我使用`android:shadowColor`参数将其设置为浅灰色的十六进制值`#999999`。


  最后，你需要使用`android:shadowRadius`参数设置投影的模糊（柔化）半径，这里同样使用实数值`1.75`像素。


  这个设置将为你带来漂亮且逼真的投影模糊半径，效果就像你在 Photoshop 或 GIMP 中实现的那样。区别在于，你是在 Android 应用中使用几个字节的标记代码来实现，而不是使用千字节的数字图像资源数据。


  如果希望投影边缘清晰，你可以使用非常小的值，例如`0.1`来达到此效果。中等值如`0.5`会添加少量模糊，而大值如`2.0`则会为投影增加大量模糊或柔化。为了实现最逼真的阴影，我建议值设置在`1.25`到`1.75`之间，但使用这四个`android:shadow`参数可以创造出许多酷炫的效果。


