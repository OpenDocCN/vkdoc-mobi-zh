  \ 9-11 所示，来创建你的 `imagebutton_focused.png` ImageButton 聚焦状态资源。如果你想预览这些图像资源的工作效果，可以点击“导出图像”对话框中央显示的\
  \ `imagebutton_` 文件名，并观察右侧的预览图像实时变化，这实际上是在模拟你的 ImageButton 状态资源在你的 Android Nexus\
  \ One 模拟器中的工作（外观）效果。现在，你只需输入你的 `imagebutton_focused.png` 文件名，并在设置好文件导出选项后点击“导出”按钮即可——由于此过程的重复性，你对此已驾轻就熟。\n\
