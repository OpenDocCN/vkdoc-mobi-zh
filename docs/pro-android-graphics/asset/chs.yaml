  \nFigure 15-10.\n\n在 Nexus One 上测试缩放和透明度动画\n\n由于接下来你需要实现 `AnimationSet` 类并构造一个 `AnimationSet`\
  \ 对象，让我们花点时间深入了解一下这个类，获取一些关于它的功能以及为何使用它的技术背景。\n\n### AnimationSet 类：创建复杂的动画集\n\n\
  正如你已经了解的，Android 的 `AnimationSet` 类是 `android.view.animation.Animation` 公共抽象类的另一个直接子类。\n\
  \n这个动画类用于将其他四种 `Animation` 子类“分组”成“集合”，从而创建更复杂的多重变换动画，并将其应用于 Android 的 `View` 对象。\n\
  \n因此，一个 `AnimationSet` 对象代表了 `Animation` 子类（如 `ScaleAnimation`、`AlphaAnimation`、`RotateAnimation`\
  \ 等）对象的逻辑分组，这些对象旨在同时并行播放。\n\n本质上，这使得这个程序化动画类对于创建无法单独通过其他 `Animation` 子类实现的复杂动画非常有用。这四种变换各自在概念上相当基础，但通过结构化组合，它们几乎可以实现你能想象到的任何效果！\n\
  \nAndroid 的 `AnimationSet` 类层次结构如下：\n\n```\njava.lang.Object\n  > android.view.animation.Animation\n\
  \    > android.view.animation.AnimationSet\n```\n\n`AnimationSet` 类也属于 `android.view.animation`\
  \ 包。因此，其 `import` 语句引用了 `android.view.animation.AnimationSet` 包导入路径，你将在下一节使用它创建复杂的缩放与混合程序化动画集时看到这一点。\n\
  \n通过使用（父级）`AnimationSet` 对象（类），使用每个单独的（子级）`Animation` 对象指定的程序化变换会被组合成一个统一的变换。\n\n\
  如果 `AnimationSet` 对象设置了其子对象也设置的属性（例如 `duration` 或 `startOffset`），则 `AnimationSet`\
  \ 父对象设置的值将始终覆盖其子 `Animation` 对象的对应值。\n\n理解 `AnimationSet` 如何从 `Animation` 变换继承参数（反之亦然）非常重要。在\
  \ `AnimationSet` 对象中设置的一些参数会影响整个 `AnimationSet` 对象。某些参数会向下传递并应用于子对象的变换，而另一些则会被忽略。因此，在使用这些\
  \ `AnimationSet` 对象时，你需要学习“在何处应用特定参数”。\n\n当 `duration`、`repeatMode`、`fillBefore`\
  \ 和 `fillAfter` 参数（也称为属性）在 `AnimationSet` 对象上设置时，它们会被“向下推送”到所有子变换。针对此行为的解决方案是，始终在\
  \ `Animation` 对象内“本地”设置这些参数，而“永远不要”在父级 `AnimationSet` 对象中设置它们。如果你这样做，Android 就没有任何东西可以推送下去，也就不会混淆参数将在程序化动画处理管线的哪个环节被应用。\n\
  \n`repeatCount` 和 `fillEnabled` 参数（或属性）对于 `AnimationSet` 来说会被“完全忽略”，因此，如果你想正确访问它们，必须始终在本地为每个\
  \ `Animation` 对象设置这些参数。\n\n另一方面，`startOffset` 和 `shareInterpolator` 参数可以应用于 `AnimationSet`\
  \ 对象。请注意，`startOffset` 也可以本地应用于变换，通过在循环周期或动画开始时间中引入延迟来微调动画的时间。\n\n因此，一个好的“经验法则是”将变换参数本地应用，而不是在\
  \ `AnimationSet` 对象级别应用，除非是 `shareInterpolator` 参数，该参数显然用于组级别的操作，因为这是我们在程序化动画中进行“共享”的唯一方式。所以，“始终在本地设置变换参数”。\n\
