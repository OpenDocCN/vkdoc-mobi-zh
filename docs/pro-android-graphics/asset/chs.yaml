  \n图 2-25. Squeeze 显示已导入的 `PAG480x800.avi` 文件（底部蓝色高亮）以及右键点击 `编辑` 菜单项\n\n右键点击当前用于\
  \ 480p 视频的预设（即您将要压缩的视频），然后选择 `编辑` 选项。您将编辑这些预设（压缩参数）以用于 Android。这意味着将比特率从 1200 调整到\
  \ 1024，并进行一些其他调整，您接下来将进行这些操作。\n\n在“预设”对话框中（如图 2-26 所示），您首先要做的是为新的 `Android480x800p`\
  \ 预设命名，并在 `描述` 数据字段中输入新的说明“Android 480 乘以 800”。\n\n确保 `格式约束` 下拉菜单显示为 `无`，并且 `流类型`\
  \ 下拉菜单显示为 `非流式` 而非 `有提示的`，因为您正在创建的是内嵌视频。\n\n![A978-1-4302-5786-8_2_Fig26_HTML.jpg](img/A978-1-4302-5786-8_2_Fig26_HTML.jpg)\n\
  \n图 2-26. Squeeze 9 视频压缩预设对话框及设置\n\n确保 `编解码器` 已选中（勾选）并设置为 `MainConcepts H.264`，因为该编解码器具有最佳的大小与质量平衡。`帧速率`\
  \ 选择应设置为默认的 1:1 设置，指示编解码器压缩您的 Terragen 3 动画序列 AVI 中的每一帧。\n\n压缩方法应设置为多遍压缩，这会占用最多的数据处理周期（压缩时间最长），但也能产生最佳效果，您将在本节末尾看到这一点。\n\
  \n将您的数据速率目标更改为 `768 KBPS`，并选择 `限制最大数据速率` 选项，通过在此数据字段中设置 `133%` 的值，将最大数据速率目标超调容限设置为\
  \ 33% 或三分之一。这将为您提供您希望 Android 处理的 `1024 KBPS` 或 `1 MBPS` 的数据量。\n\n在对话框的右侧，选择 `帧大小`\
  \ 选项中的 `与源相同`，这样您的像素就不会以任何方式被缩放，并将 `关键帧` 选项设置为 `每 10 帧一个关键帧`，即每秒一次，因为您目前为动画使用了 `10\
  \ FPS`，以实现缓慢但稳定的飞越效果。\n\n最后，保持选中（勾选）`场景变化时自动设置关键帧` 复选框，并将 `稀疏到频繁` 滑块设置为中位数 `50%`\
  \ 的值，然后点击 `确定` 按钮。这会将您的设置保存到新的 `Android480x800p` 预设中，该预设显示在 Squeeze 软件的左侧，如图 2-27\
  \ 所示。\n\n![A978-1-4302-5786-8_2_Fig27_HTML.jpg](img/A978-1-4302-5786-8_2_Fig27_HTML.jpg)\n\
  \n图 2-27. Squeeze 显示新创建的 `Android480x800p` 视频编解码设置已应用于 `PAG480x800.avi`\n\n工作流程的下一步是将此新预设应用于您已导入的\
  \ `.AVI` 文件。这通过使用位于“格式”（或预设）窗格右下角的 `应用` 按钮来完成。\n\n在点击 `应用` 按钮之前，请确保 `Android480x800p`\
  \ 预设处于选中状态（蓝色），以便它是应用于您的 `.AVI` 数字视频素材全帧未压缩源数据的预设。\n\n一旦您点击 `应用` 按钮，您将看到格式预设直接显示在您的源\
  \ AVI 文件下方，如图 2-27 所示。在点击软件右下角的 `开始压缩！` 按钮之前（您可以在图 2-25 中看到此按钮），请确保您看到了这个情况。\n\n\
  一旦您点击 `开始压缩！` 按钮，您将看到一个蓝色进度条，如图 2-27 右侧所示，位于 Squeeze 软件底部“项目设置”区域顶部的 `任务` 状态栏旁边。压缩过程完成后，您将看到您的视频素材图标上覆盖着一个播放按钮，如图\
  \ 2-28 所示。您可以点击它来预览压缩后的 MP4 文件。\n\n![A978-1-4302-5786-8_2_Fig28_HTML.jpg](img/A978-1-4302-5786-8_2_Fig28_HTML.jpg)\n\
  \n图 2-28. Squeeze 显示已完成的压缩 MP4 文件、播放图标、所用视频编解码器及其他设置\n\n使用资源管理器比较原始文件和压缩文件的大小，如图\
