  \ Adobe Photoshop、GIMP 中，还是直接在 Android 应用程序代码中。像素混合是一个强大的工具。\n\n### 总结\n\n在这第十一章中，你学习了更多关于\
  \ Android 的 `PorterDuff` 和 `PorterDuff.Mode` 类，以及 `PorterDuffXfermode` 类和 `PorterDuffColorFilter`\
  \ 类的知识。这些类用于在 Android 中实现图像混合。这包括将颜色值变化混合到图像资源中，以实现颜色或对比度校正，或使用单个图像源创建一系列图像资源，以及实现特殊效果。\n\
  \n我们首先探讨了像素混合和传输模式的核心数字图像合成概念，以及这些能力如何允许开发者利用其 `/res/drawable/` 文件夹中的图像资源来实现令人印象深刻的特殊效果。\n\
  \n接着，我们仔细研究了 Android 中的核心 `PorterDuff` 类，它实现了你在第一节中学到的图像混合技术和像素传输概念。这个类包含了混合和传输模式的核心算法，这些算法通过\
  \ Android 操作系统中其他与 PorterDuff 相关的类来调用。\n\n然后，你学习了 `PorterDuff.Mode` 嵌套类，它包含了 18\
  \ 个常量。我们查看了所有 18 个常量，以确切了解每个常量的作用，以及用于将图像源 Alpha（`Sa`）、源颜色（`Sc`）、目标 Alpha（`Da`）和目标颜色（`Dc`）像素数据值混合或传输到最终合成图像中的算法方程。\n\
  \n我们首先查看了五种图像混合算法和一个实用算法，然后介绍了像素传输算法，以及它们与布尔集合运算的相似之处。在概述了通过 `PorterDuff.Mode` 常量可以使用的功能之后，是时候看看\
  \ `PorterDuffColorFilter` 类来实现像素颜色混合了。\n\n然后，我们准备好实现 Android 中两个专用 PorterDuff 类中的第一个：`PorterDuffColorFilter`\
  \ 类。我们学习了如何使用 `.setColorFilter()` 方法，并将颜色值和 `PorterDuff.Mode` 常量规格作为参数值来实现这个类。\n\
  \n接下来，我们研究了更高级的 `PorterDuffXfermode` 类，它允许我们在其他类型的图形资源之间应用 PorterDuff 传输模式（`Xfermode`）和混合模式常量。在这里，我们使用了数字图像资源，因为位图提供了在\
  \ Android 操作系统中产生令人印象深刻的图像合成特殊效果所需的自由度。\n\n你采用了动手实践的方法，创建了大约十几行高级 Java 代码，并添加了 XML\
  \ `<ImageView>` 标签，在你的 `GraphicsDesign` 应用程序的 `ContentsActivity` 类中实现了数字图像混合。\n\n\
  在此过程中，你了解了 Android 操作系统中所有主要的图形相关类，包括 `Bitmap`、`BitmapFactory`、`Paint` 和 `Canvas`\
  \ 类。你了解了每个类在 Android 图形处理中的作用，并看到了它们如何协同工作，使你能够实现图像混合模式，从而可以将两个数字图像资源合成在一起。这使你能够直观地了解这些混合模式，你将在应用程序中对图像使用这些模式来调用图像合成和特殊效果。\n\
  \n我们查看了你将用于数字图像合成和特殊效果的六种主要混合模式，并且在你的代码中使用了它们，以确定它们对你的应用程序中两个现有图像的具体作用。\n\n这些传输（`XOR`）和混合模式包括\
  \ `OVERLAY`、`SCREEN`、`LIGHTEN`、`DARKEN`、`MULTIPLY` 和 `XOR`。我鼓励读者在他们本章编写的代码中尝试所有\
  \ PorterDuff 模式，以便实验这些模式在图像处理能力方面提供什么。\n\n在下一章中，你将学习如何在 Android 操作系统中使用数字图像层，以及如何使用\
  \ Android 中的 `LayerDrawable` 类。这将使你将 Android 图像合成图形设计和特殊效果工作提升到另一个层次，这将包括在你本章已学到的关于\
  \ PorterDuff 混合模式及其实现的知识基础上，结合使用 `PorterDuffXfermode`、`PorterDuffColorFilter` 类以及\
  \ `PorterDuff.Mode` 嵌套类。\n\n\n\n# 12. 高级图像合成：使用 `LayerDrawable` 类\n\n### 摘要\n\n\
  在第十二章中，我们将深入探讨图层在 Android 和数字图像合成中所扮演的角色，以及如何在 Android 中实现图层以增强我们的数字图像合成能力。\n\n\
  在第十二章中，我们将更仔细地审视图层在 Android 和数字图像合成中的作用，以及如何在 Android 中实现 `LayerDrawable` 对象来增强我们的数字图像合成能力。\n\
  \n在 Android 应用中，通过使用 `Drawable` 父类的子类来创建和管理图层。这个专门管理图层堆栈的子类被称为 `LayerDrawable` 类。\n\
  \n图层可以实现更高级的数字图像合成，因为它允许将不止一两张图像合成在一起，就像你在上一章关于 PorterDuff 图像混合模式中所做的那样。\n\nAndroid\
  \ 中的 `LayerDrawable` 对象很好地诠释了 Java 对象由其他 Java 对象组成这一概念，因为 `LayerDrawable` 包含其他 `Drawable`\
  \ 对象。在图形设计场景中，这通常是 `BitmapDrawable` 对象，其目标通常是创建由多个图像部件组成的复合图形对象。\n\n这样做通常是为了创建特殊效果，或者通过使用图层将图像分解为其组成部分，从而可以使用索引颜色空间来保存每个图像资源，进而节省\
  \ 100% 或更多的总数据占用空间，以优化应用图像资源的总数据量。其工作原理是：如果你能将图像部件（作为图层）保存为能够使用 256（索引）色而非 16777216（真彩色）色有效提供出色图像质量的文件，然后将它们合成为一个看起来像是使用真彩色，而实际上是使用了索引颜色资源的\
  \ `LayerDrawable` 对象的图像。\n\n### 图层绘制对象：将图像合成提升至新高度\n\n我们先概述一下数字成像图层在 Android 中是如何实现的。在\
  \ Android 中，图层被称为图层绘制对象（Layer Drawables），并使用 Android 的 `LayerDrawable` 类。我们还将探讨在\
  \ Android 应用以及你的 Pro Android Graphics 设计工作流程中，如何最好地发挥图层的优势。\n\n总的来说，图层最常用于数字图像合成目标，许多数字成像工匠使用专业的数字成像软件包（如\
  \ Adobe Photoshop CS6、GIMP 2.8.6 或 Corel 的 Painter、CorelDraw、PaintShop Pro 软件包）来执行这些操作。\n\
  \n在这些流行的数字图像合成软件包中能够实现的合成目标，同样可以在 Android 操作系统内实现。但是，你需要足够高级，能够使用 XML 和 Java 编写你自己的图像合成渲染管线；在本章稍后部分，你将了解一些可用来实现此目标的\
  \ Android 类和工作流程。\n\n请注意，这比仅仅使用这些数字成像软件包要困难得多，而仅使用软件包本身可能就已经非常复杂了，正如你在本书前面所见。\n\n\
  当应用中需要以高级方式组合多个 `Drawable` 资源以实现任何最终结果时，就会在 Android 中使用图层。这可以是任何事情，从文本叠加到图像混合，再到特殊效果应用。你可以在\
  \ `LayerDrawable` 图层堆栈中使用任何类型的 Android `Drawable`，因此它是一个非常灵活的图层系统。\n\n重要的是要注意，只要你擅长实现\
  \ Alpha 通道，就未必需要实现混合模式来创建有效的图像合成，正如你在前几章中已经看到的那样。\n\nAndroid 中的图层可以制作得与流行数字成像软件包（如\
  \ GIMP 2.8.6）中的图层非常相似。Android 图层可以分配不透明度值；它们还可以访问混合模式、利用 Alpha 通道，以及图形艺术家在其图形渲染管线中实现特殊数字成像效果所需的大多数其他核心功能。\n\
  \n你将把 `LayerDrawable` 的功能添加到 Android PorterDuff 混合模式中，因为你在上一章已经编写了代码来逐像素混合图像。\n\n\
  因此，到本章结束时，你将把上一章学到的混合和传输模式与 `LayerDrawable` 对象的图层能力结合起来，形成一个全面的、基于 Java 的图像合成和混合渲染管线。\n\
  \n### Android 的 `LayerDrawable` 类：图层的基础\n\nAndroid 的 `LayerDrawable` 类是 `Drawable`\
  \ 类的直接子类，而 `Drawable` 类本身又是 `java.lang.Object` 主类的直接子类。\n\n因此，`LayerDrawable` 是一个\
  \ `Drawable` 子类，它实现了 `Drawable` 类的所有特性以及 `LayerDrawable` 类特有的图层管理所需的额外特性。\n\nAndroid\
  \ `LayerDrawable` 类的层次结构如下：\n\n```\njava.lang.Object\n  > android.graphics.drawable.Drawable\n\
  \    > android.graphics.drawable.LayerDrawable\n```\n\nAndroid 的 `LayerDrawable`\
  \ 类是其 `android.graphics.drawable` 包的一部分，因此，其导入语句逻辑上引用的是 `android.graphics.drawable.LayerDrawable`\
  \ 包导入路径，正如你将在本章后面编写实现 `LayerDrawable` 对象的 Java 应用代码以实现你自己的图层管理目标时所看到的那样。\n\n`LayerDrawable`\
  \ 类本身也有一个直接子类，称为 `TransitionDrawable` 类。我们将在本书的下一章介绍 `TransitionDrawable` 类，敬请期待。\n\
  \n`LayerDrawable` 对象是 Android 中一种 `Drawable` 对象，它具有创建和管理其他 `Drawable` 对象数组的能力。数组中的\
  \ `Drawable` 对象总是按照它们的数组顺序绘制到屏幕上，因此索引号最大的 `Drawable` 元素将始终绘制在图层堆栈的顶部。在稍后你实现自己的 `LayerDrawable`\
  \ 对象之后，你将确切地看到这是如何工作的。\n\n`LayerDrawable` 对象通常通过使用 XML 定义文件来定义，然后使用 `<layer-list>`\
  \ 父标签。由这个 `<layer-list>` 父标签定义的 `LayerDrawable` 容器对象内的每个 `Drawable` 对象，随后将通过使用嵌套的\
  \ `<item>` 子标签来定义，正如你将在本章下一节创建自己的 `LayerDrawable` 时所看到的那样。\n\n`LayerDrawable` 类有六个\
  \ XML 属性或参数。显然，最重要的是 `android:drawable` 参数（允许你指定可绘制图像资源）和 `android:id` 参数（允许你为图层指定\
  \ ID，以便稍后在 Java 代码中引用）。\n\n其他四个参数使用像素、设备独立像素（DIP 或 DP）、毫米、英寸或缩放像素作为度量单位，并配合浮点值来指定每个图层的坐标或定位。这些参数包括\
  \ `android:top`、`android:bottom`、`android:left` 和 `android:right`，如果你的每个图像资源都填满了它们的\
  \ `Drawable`（以及相应的 `LayerDrawable`）容器，则这些参数不是必需的。\n\n\n\n### `<layer-list>` 父标签：使用\
  \ XML 设置图层\n\n让我们继续在 Eclipse 中操作 `ContentsActivity.java` 和 `activity_contents` XML\
  \ 文件标签页，在图像合成中实现一个 `LayerDrawable` 对象。如果 Eclipse ADT 尚未打开，请启动它，然后右键点击 `/res/drawable`\
  \ 文件夹，如图 12-1 所示，选择 **New ➤ Android XML File** 菜单序列。这将允许你创建新的 `LayerDrawable` XML\
  \ 文件，并自动将其放入你的 `drawable` 文件夹中。这个根目录 `/res/drawable` 文件夹正是你一直存放资源的地方，例如九宫格图片资源、`ImageButton`\
  \ 状态、帧动画，以及现在的这个 `LayerDrawable` 对象定义，每个都与 Android Drawable 对象及其配置（帧、状态、图层、补丁块，以及其他定义图片资源如何被实现的\
  \ XML）相关。\n\n![A978-1-4302-5786-8_12_Fig1_HTML.jpg](img/A978-1-4302-5786-8_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 使用右键上下文菜单在 `/res/drawable` 文件夹中创建一个 **New ➤ Android XML File**\n\n\
  选择此菜单命令序列后，您将看到一个 **New Android XML File** 对话框，如图 12-2 所示。由于您的文件夹层级结构以及您通过点击正确的文件夹（如图\
  \ 12-1 所示）来调用对话框，该对话框已自动配置为 `GraphicsDesign` 项目和 Drawable 资源类型。现在，您只需选择 `<layer-list>`\
  \ 父标签作为根元素，并将文件命名为 `contents_layers`，以表明您正在为您的 `ContentsActivity` 类定义图层。\n\n![A978-1-4302-5786-8_12_Fig2_HTML.jpg](img/A978-1-4302-5786-8_12_Fig2_HTML.jpg)\n\
  \n**图 12-2.** 为您的新的 Android XML 文件选择 `<layer-list>` 根元素\n\n在对话框中设置好 Drawable XML\
  \ 文件参数后，点击 **Finish** 按钮，您将在 Eclipse 的中央编辑窗格中看到一个新的 `contents_layers.xml` 文件，准备就绪，如图\
  \ 12-3 所示。将您的 `<item> </item>` 子标签容器拆分为一个 `<item />` 容器，以便添加参数，然后使用 `android:` 工作流程来调用辅助对话框，该对话框包含了您之前了解的六个参数。首先添加\
  \ `android:id` 参数，这样您的图层对象就有了名称。\n\n![A978-1-4302-5786-8_12_Fig3_HTML.jpg](img/A978-1-4302-5786-8_12_Fig3_HTML.jpg)\n\
  \n**图 12-3.** 在 `<layer-list>` 父标签内部添加 `<item>` 子标签，并访问 `android:` 辅助对话框\n\n我们将第一个图层命名为\
  \ `layerOne`，并添加一个引用您的 `cloudsky.jpg` 图片资源的 `android:drawable` 参数，您希望将此图片作为背景底板（图层堆叠中最底部的图层）。\n\
  \n一旦完成了一个图层 `<item>` 结构的创建，您可以复制并粘贴它以创建任意所需数量的图层。XML 子标签 `<item>` 应如下所示：\n\n```\n\
  <item\n    android:id=\"@+id/layerOne\"\n    android:drawable=\"@drawable/cloudsky\"\
  \ />\n```\n\n请记住，通过使用 `@drawable` 引用您的 `cloudsky.jpg` 图片资源，Android 会在您的某个 `drawable-dpi`\
  \ 子文件夹中找到此资源的正确分辨率密度版本。在这种情况下，由于该图片具有很好的可缩放性（正如您在之前章节中所见），您只需使用一个 1000 像素的高清分辨率资源，然后让\
  \ Android 尽情地进行缩放。在此，您将把它用作合成后的背景图片，并在您的 `LayerDrawable` XML 定义文件 `contents_layers`\
  \ 中（如图 12-4 所示）通过第一个（底部）图层（命名为 `layerOne`）来定义它。\n\n![A978-1-4302-5786-8_12_Fig4_HTML.jpg](img/A978-1-4302-5786-8_12_Fig4_HTML.jpg)\n\
