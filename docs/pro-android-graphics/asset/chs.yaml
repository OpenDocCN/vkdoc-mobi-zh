- '# 8. 高级 ImageView：使用 ImageView 进行更多图形设计


  ### 摘要


  在第八章中，我们将继续更深入地研究 `ImageView` 小部件及其高级属性设置（参数），因为它是 Android 操作系统中实现图形设计最重要的用户界面元素，它的
  `ImageButton` 子类同样重要。


  你在前一章中已经抢先了解了 `ImageView` 用户界面小部件，并在你正在设计的书签工具 UI 中使用它来保存当前已添加书签章节的图像。


  你使用了 `android:src` 参数来定义源图像，一些 UI 布局参数来定位它，以及一个外边距参数来为它留出设计空间。但是，你并没有真正深入研究任何高级参数或技巧，例如同时使用源（前景）图像层和背景图像层。


  我们确实使用 GIMP 2.8 涵盖了一些相当高级的数字成像概念，这对于一本专业 Android 图形书籍来说总是好的，随着本书内容的推进，我将尝试在 GIMP
  和 VirtualDub 中更多地这样做。


  在本章中，我们将探讨 `ImageView` 用户界面小部件类的其他一些独特属性和参数，以及如何通过 XML 标记和 Java 代码来实现它们。你已经了解了 `ImageView`
  中主要使用的一个参数，即 `android:src` 参数或属性。这是因为 `ImageView` 是数字图像资源的容器，该图像资源通过源（`src`）属性（或属性，或参数）来引用。由于
  `ImageButton` 是 `ImageView` 的子类，因此它也将具有相同的 `android:src` 参数。




  ### Android 中的图形：`ImageView` 类的起源


  Android 的 `ImageView` 类是 `View` 父类的一个子类，而 `View` 本身又是主类 `java.lang.Object` 的子类。`View`
  类有自己的包，即 `android.view` 包，但 `ImageView` 则被置于另一个独立的用于 UI 组件的 Android 包中，即 `android.widget`
  包。


  `android.widget` 包包含了 `ImageView` 类，以及所有其他继承自 `View` 类的 UI 元素类。如果你想确切了解该包中包含哪些组件，可以在以下
  Android 开发者网站 URL 中找到相关信息：


  [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


  `ImageView` 类用于显示我们作为开发者希望提供的、应用程序中需要自定义图像区域的任何受支持的数字化图像格式。这包括应用图标、布局容器的背景图像、UI
  自定义按钮等等。


  `ImageView` 类可以从多种来源获取图像，例如内部应用资源（`/res/drawable` 文件夹）或内容提供者（如 HTTP）。`ImageView`
  类将根据源图像资源计算其 UI 容器尺寸，以便与任何布局容器配合使用。由于这是一本关于图形的书籍，在大多数情况下，我们将对我们使用的每个布局容器使用数字化图像。


  `ImageView` 提供了多种显示选项，例如自定义缩放和 RGB 值重新着色，这两者都将在本章中详细探讨。


  有趣的是，`ImageView` 类只有极少的子类，这对于像 Android 这样以像素为核心的 OS 来说，与人们的预期恰恰相反。我们最常关注的 `ImageView`
  子类是 `ImageButton` 类，但还有一个更偏向特定领域（如果你的应用在使用 QuickContacts）的 `QuickContactBadge` 子类。


  `ImageView` 也仅有一个已知的间接子类，名为 `ZoomButton`，它是 `ImageButton` 的子类。`ZoomButton` 用于通过缩放因子和缩放速度来放大和缩小基于数字化图像的按钮资源。


  如果你想更详细地研究 `ImageView` 类，请访问其在 Android 开发者网站上的页面，网址如下：


  [`http://developer.android.com/reference/android/widget/ImageView.html`](http://developer.android.com/reference/android/widget/ImageView.html)


  然而，`ImageView` 类确实包含一个单一的 `嵌套` 类，名为 `ScaleType`。这个 `ImageView.ScaleType` 嵌套类允许我们定义如何缩放数字化图像资源以适配其
  `View`。


  这使得 `ScaleType` 足够重要，值得在本章中单独设立一节。那么，让我们来看看这个 `ImageView.ScaleType` 类是如何工作的，并了解它为我们提供的所有强大的图像缩放常量。


  ### `ImageView.ScaleType` 嵌套类：缩放控制


  Android 的 `ImageView` 有一个名为 `ScaleType` 的嵌套类，它包含了用于确定如何缩放 `ImageView` 对象的缩放常量及相关算法。这个
  `ImageView.ScaleType` 类是 Java `Enum` 类的一个子类，而 `Enum` 类又是主类 `java.lang.Object` 的子类。它们之间精确的父类
  ➤ 子类关系如下：


  ```

  java.lang.Object

  > java.lang.Enum<E extends java.lang.Enum<E>>

  > android.widget.ImageView.ScaleType

  ```


  正如你所料，`ImageView.ScaleType` 类是 `android.widget` 包的一部分，如果你的 Java 代码中使用它，其导入语句将引用路径
  `android.widget.ImageView.ScaleType`。


  `ScaleType` 类是 `java.lang.Enum` 的子类的原因在于，它使用这个 Java 枚举类型类来为不同的缩放算法类型或缩放选项创建数值常量，缩放算法利用这些常量来确定需要实施哪种类型的缩放。


  这些数值常量也被赋予了字符串（文本）常量，以便于记忆和在代码中引用。在本章的这一节中，我们将详细讨论每一个常量。


  Android 中有 71 个 `java.lang.Enum` 的直接子类，因为它被用来提供这些数值常量，这可能是 Java 编程中的一种常见做法。如果你想了解更多关于这个
  `Enum` 类的信息，可以在 Android 开发者网站上找到它的页面，网址如下：


  [`http://developer.android.com/reference/java/lang/Enum.html`](http://developer.android.com/reference/java/lang/Enum.html)


  如果你曾为 `ImageView` UI 元素的 `android:layout_width` 和 `android:layout_height` 参数使用过
  `wrap_content` 常量，那么使用 `ScaleType` 缩放类型常量之一就相当于缩放数字化图像资源本身。这是因为你的 `ImageView` 引用并包含了你的源图像，而
  `wrap_content` 常量告诉 Android 将 `ImageView` UI “容器”精确地（逐像素）贴合在图像资源周围，这意味着 `ImageView`
  容器会采用图像资源的物理规格。如果通过这个嵌套类指定了某个 `ScaleType` 常量，那么图像资源（通过 `ImageView`）将根据所指定的缩放类型（`ScaleType`）常量，按给定的显示屏幕尺寸、密度和宽高比进行缩放。


  `ScaleType` 在确定如何根据不同的屏幕宽高比缩放图像时最为有用，也就是说，可以保持宽高比锁定，以免图像失真；或者，在另一个极端，允许图像缩放操作在缩放时忽略宽高比，就像我们在第
  7 章中对 1000 像素方形图像所做的那样。


  `ScaleType` 类还有一种缩放类型（常量），允许我们将数字化图像资源中的每个像素与用户 Android 设备物理硬件显示屏的每个像素一一对应。这就是 `CENTER`
  常量。


  如果图像资源中的像素不足，或者更确切地说，与屏幕分辨率匹配的最接近分辨率密度的图像资源中的像素不足，我们的图像将在显示屏中完美居中。这样，图像资源中的每个像素都使用了物理显示屏的一个像素。这正是我喜欢的一种数字化图像类！


  让我们逐一详细讨论这八种不同类型的缩放算法常量。我将用表 8-1 概述它们，以便它们集中在一个位置，然后我们再来逐一讨论。表中每个缩放常量后面括号中的数字代表该常量所表示的实际整数值。


  **表 8-1.** `ImageView.ScaleType` 图像缩放常量及其如何缩放数字化图像资源的概要




  | 缩放常量 | 对数字图像资产的缩放算法结果 |

  | --- | --- |

  | `CENTER` (5) | 锁定宽高比的缩放，使图像像素与物理硬件像素匹配，同时将图像居中。 |

  | `CENTER_CROP` (6) | 锁定宽高比的缩放算法，将图像在 X 和 Y 两个维度上适配到视图内部。 |

  | `CENTER_INSIDE` (7) | 锁定宽高比的缩放算法，将图像在 X 或 Y 至少一个维度上适配到视图内部。 |

  | `FIT_CENTER` (3) | 缩放图像以适配视图内部，同时保持图像宽高比。至少一个轴（X 或 Y）将精确匹配视图。图像也会在视图内居中。 |

  | `FIT_START` (2) | 缩放图像以适配视图内部，同时保持图像宽高比。至少一个轴（X 或 Y）将精确匹配视图。图像将从视图左上角开始放置。 |

  | `FIT_END` (4) | 缩放图像以适配视图内部，同时保持图像宽高比。至少一个轴（X 或 Y）将精确匹配视图。图像将从视图右下角开始放置。 |

  | `FIT_XY` (1) | 缩放图像的 X 和 Y 维度以匹配视图的尺寸，此操作不会保持图像的宽高比。 |

  | `MATRIX` (0) | 使用提供的`Matrix`类缩放图像。可通过`setImageMatrix`方法提供矩阵。`Matrix`类可用于对图像应用旋转等变换。
  |


  `CENTER_CROP`算法在显示区域中将图像居中，缩放操作锁定宽高比，适配较短的边（X 或 Y），并裁剪图像较长的边。


  数字成像中的裁剪是一种操作，只要图像分辨率能被 2 整除，就会从每一边裁剪一定数量的像素（在此情况下居中裁剪操作）。


  `CENTER_INSIDE`算法在显示区域中将图像居中，缩放操作锁定宽高比。此缩放算法适配较长的边（无论是 X 还是 Y），并在图像尺寸的较短边上填充等量的背景色像素（位于两侧或顶部/底部）。如果图像中的像素小于（少于）物理硬件像素，该算法与`CENTER`缩放常量的行为相同。


  `FIT_CENTER`算法也在显示区域中将图像居中，缩放操作锁定宽高比。此缩放算法与`CENTER_INSIDE`类似，区别在于：如果图像像素少于显示器，该算法会对较长的边（无论
  X 或 Y）进行上采样，并在图像尺寸的较短边上填充等量的背景色像素（位于两侧或顶部/底部）。


  `FIT_START`与`FIT_CENTER`算法相同，只是结果不平铺居中，而是定位在视图的`(0,0)`原点处，即左上角——在数字成像术语中通常称为视图容器的原点。因此它适配到图像数组的起点（Start），故得其名。


  `FIT_END`是`FIT_START`所用算法的逆操作：它不将结果定位在左上角`(0,0)`，而是从最后一个（END）像素开始，向前处理。视图 END（最后一个或最终）像素的坐标本质上总是视图的
  X、Y 分辨率规格，因此`FIT_END`常量将从该 END 位置（即视图容器的右下角）开始显示，并向前朝向视图中心。因此`FIT_END`常量会适配到图像数组的末尾，故得其名。


  `FIT_XY`算法会解除宽高比锁定，将图像适配到视图尺寸，这可能会导致一些失真，使用时需谨慎。话虽如此，某些图像（例如我们在第 7 章中使用的图像）并不容易产生失真，因此这个缩放常量可以巧妙运用，特别是在图像合成场景以及某些纹理和摄影图像背景中。


  最后，`MATRIX`算法允许你通过调用`.setImageMatrix()`方法，将`Matrix`类变换（旋转、缩放、倾斜等）的输出赋给图像。`Matrix`类可用于对图像应用旋转、缩放和倾斜等变换，以在视图对象内实现特殊效果。本质上，此选项允许你用自己的自定义缩放和变换算法替代
  Android OS 为你提供的其他七种算法。


  这些缩放常量也可以通过 XML 标记中支持`android:scaleType`参数的任何标签的参数进行设置。例如，如果你想使用`FIT_START`常量，你可以使用`android:scaleType="fitStart"`参数来实现效果。


  需要注意的是，XML 中的`ScaleType`常量使用驼峰命名法，因此`CENTER_CROP`为`centerCrop`，`CENTER_INSIDE`为`centerInside`，`FIT_XY`为`fitXY`，`FIT_CENTER`为`fitCenter`，依此类推。




  ### 使用 AdjustViewBounds 及其与 ScaleType 的关系


  有一个可用于 `ImageView` 对象的参数或属性，叫做 `AdjustViewBounds`，它接受一个布尔值（true 或 false）。在 XML 中，这是
  `android:adjustViewBounds` 参数；在 Java 中，则是调用 `.setAdjustViewBounds()` 方法。


  如果你希望 `ImageView` 对象调整其容器边界，以保持所引用的数字图像资源的宽高比，那么请将此布尔标志的值设为 true。


  如果你希望 `ImageView` 对象调整其边界以适配其父布局容器的宽高比，那么你应该将布尔标志设为 false。如果你将 `layout_width` 和
  `layout_height` 参数的值设置为 `match_parent`，那么父布局很可能就是 Android 设备的物理显示屏。false 是默认值，因此实际上你永远不需要在
  `ImageView` 的 XML 标记中添加 `android:adjustViewBounds="false"` 参数。


  使用 false 值更明显的原因是在应用的 Java 代码中通过 `.setAdjustViewBounds()` 方法来切换开关（或者更准确地说，切换 true/false
  开关）。


  因此，如果你已经为 `ImageView` 的 XML 参数定义使用了 `android:adjustViewBounds="true"`，并且稍后希望告诉 Android
  解除宽高比锁定，按比例缩放以适应容器尺寸（假设你使用了 `match_parent`），则可以通过以下 Java 代码，基于你的 `ImageView` 对象名称调用
  `ImageView.setAdjustViewBounds()` 方法：


  ```

  myImageViewObjectName.setAdjustViewBounds(false);

  ```


  接下来，我想概述一下关于将上一节讨论的 `android:scaleType` 与本节介绍的 `android:adjustViewBounds` 参数结合使用时的一些注意事项。当你的
  `ImageView` 对象从 `ImageView` 类调用其构造方法时，该构造方法会先检查你的 XML 文件并设置 `android:adjustViewBounds`
  参数，然后才会检查并设置你的 `android:scaleType` 参数的常量值。


  当你将 `AdjustViewBounds` 设置为 true 时，构造方法还会将 `ImageView` 对象的 `ScaleType` 设置为 `FIT_CENTER`。


  出于这个原因，即使你将 `android:scaleType` 参数设置为其他常量值，并且该参数在你的 `ImageView` 标签的参数列表中位于 `android:adjustViewBounds`
  之后，你的 `ScaleType` 常量（如果不是 `FIT_CENTER`）也会完全覆盖 `android:adjustViewBounds="true"`
  参数。请记住这一点，以避免出现意外的缩放结果。


  这是因为问题的关键不在于 `ImageView` 标签 XML 定义中参数的顺序，而在于 `ImageView` 类从 XML 定义中获取并实现这些参数的顺序，而这由
  `ImageView.java` 类本身的 Java 代码决定。


  ### MaxWidth 和 MaxHeight：控制 AdjustViewBounds


  就像 `ScaleType` 和 `AdjustViewBounds` 参数之间存在关系一样，`android:maxWidth` 和 `android:maxHeight`
  参数与 `ImageView` 对象类型的 `AdjustViewBounds` 参数设置之间也存在类似的关系。


  `android:maxWidth` 是一个可选参数，当你希望为 `ImageView` 对象指定最大宽度时可以使用。`android:maxWidth` 参数设置的数据值需要使用尺寸单位限定符，例如
  DIP、DP、SP、IN、PX 或 MM。


  因此，你的 `maxWidth` 参数会指定一个浮点数，并附加一个单位指示常量，例如 `120.0dip`。


  `ImageView` 可用的单位指示符包括：PX 或 px，代表像素；DP、dp、DIP 或 dip，代表密度无关像素；SP 或 sp，代表根据首选字体大小缩放的像素，通常用于在
  `TextView` 参数中指定字体大小；IN 或 in，代表英寸；MM 或 mm，代表毫米。


  完全相同的规则、常量和单位指示符也适用于你的 `android:maxHeight` 参数，只是它们会应用于 `ImageView` 对象的另一个维度。


  因此，`maxWidth` 和 `maxHeight` 的注意事项是：要使这两个参数正常工作，你的 `ImageView` 的 `AdjustViewBounds`
  属性必须设置为 true。请注意，这反过来意味着你的 `ImageView` 的 `ScaleType` 必须设置为 `FIT_CENTER`。


  你在本章前一节中了解到，如果在 XML `ImageView` 定义中设置了除 `FIT_CENTER` 之外的 `ScaleType` 常量，`AdjustViewBounds`
  将不会起作用。这个注意事项同样适用于 `maxWidth` 和 `maxHeight`，因此如果你尝试将 `maxWidth` 和 `maxHeight` 参数与
  `ScaleType` 一起使用，但它无法正常工作，那么你现在知道原因了。


  ### 在 ImageView 中设置基准线并控制对齐方式


  基准线的概念更适用于 `TextView`，因为基准线对齐常用于根据文本字体的底边来对齐元素。然而，`ImageView` 也通过两个不同的参数支持这一概念：`android:baseline`
  和 `android:baselineAlignBottom`。


  术语“基准线”指的是任何 `View` 子类对象（如 `ImageButton`、`ImageView`、`TextView` 以及类似的 UI 元素或小部件）底部的一条假想线。当你设置一个基准线参数时，你是在为
  Android 操作系统提供一个基准线的位置，以便在其父布局容器标签使用 `alignBaseline` 参数时引用该对象。


  `android:baseline` 参数允许开发者在 `View` 对象内部设置基准线的偏移量。这个参数或许应该被称为 `baselineOffset` 才更清楚，特别是因为还有一个
  `android:baselineAlignBottom` 参数，我们接下来会讲到。


  `BaselineAlignBottom` 属性的作用是设置一个标志，告诉 Android 操作系统将 `ImageView` 中图像资源的底边作为其基准线对齐设置。对于数字图像而言，这通常就是你想做的。因此，如果你在包含
  `ImageView` UI 元素的 UI 布局容器中使用其他 `layout_alignBaseline` 类型的参数时，没有得到你期望的图像对齐效果，请尝试将此
  `android:baselineAlignBottom` 参数设置为 true。




  ### 使用 `CropToPadding` 方法裁剪您的 ImageView


  另一个有用的 `ImageView` 参数是 `android:cropToPadding` 属性，它允许您通过使用 XML 标记或 Java 代码，对数字图像资源调用数字图像裁剪操作。


  如果您还记得，在第 7 章中，您曾将数字图像裁剪作为实现投影特效工作流程中不可或缺的一部分。当时您是使用 GIMP 2.8.6 的画布大小（裁剪）命令来完成此操作的。


  如果您认为在 `ImageView` 中裁剪图像资源本身是一项微不足道的功能，那么请考虑它在更复杂的工作流程中的价值——一个可以通过在图形设计应用程序中使用 XML
  和 Java 代码来实现的工作流程。


  使用此属性的方式在其名称 `CropToPadding` 中就显而易见。您使用 `android:padding` 参数来设置裁剪操作，然后设置 `android:cropToPadding=“true”`
  参数来调用裁剪操作。


  因此，要均匀地裁剪图像四周，请使用带有 DIP 值的 `android:padding` 参数；要在图像的不同侧进行不同程度的裁剪，请使用 `android:paddingTop`、`android:paddingLeft`、`android:paddingBottom`
  或 `android:paddingRight`。


  如果您在布局容器中设置了背景图像，那么这样做将允许该背景图像在 `ImageView` 被裁剪的部分（或曾经存在的部分）显示出来，因此这也可以用于合成或特效目的。当您通过
  Java 代码将内边距值附加到应用程序的交互元素上，甚至使用预定义的编程逻辑来动画化这些内边距值时，这一点尤其重要。


  接下来，我们将仔细研究更改图像资源中的颜色（色调），并使用 `PorterDuff` 类来调用 Android 的混合模式。


  ### 使用 `PorterDuff` 为 ImageView 着色与颜色混合


  `ImageView` 类中不从 `View` 超类继承的最后一个参数是 `android:tint` 参数，它允许我们通过 XML 参数使用 ARGB 十六进制颜色值来增强图像资源的颜色。


  也可以更改用于将 ARGB 颜色值应用到基础图像的 `PorterDuff` 类混合模式；然而，这只能通过 Java 代码使用 `.setColorFilter()`
  方法实现。


  `.setColorFilter()` Java 方法接受两个参数，一个定义要使用的颜色值，另一个指定 `PorterDuff.Mode` 常量，该方法使用以下
  Java 代码格式调用：


  ```

  .setColorFilter(int color, PorterDuff.Mode mode)

  ```


  如果您使用 XML 参数 `android:tint`，那么默认定义的 `PorterDuff.Mode` 是 `SRC_ATOP` 像素混合模式常量。您可能已经猜到，该模式会将指定的颜色值合成到
  SRC（源）图像的 TOP（顶部），正如参数名称所暗示的那样，这会为其着色。


  您可以分别使用白色 (`#FFFFFF`) 或黑色 (`#000000`) 颜色数据值进行着色，以提亮或变暗图像。稍后您将使用此技术来改善您在上一章中为书签工具
  `TextView` 和 `ImageView` 用户界面元素所创建的投影效果的对比度。


  `PorterDuff.Mode` 嵌套类是又一堆数值常量的集合，类似于 `ScaleType`，只是定义的常量多得多。在这种情况下，这些常量代表了算法性的像素合成混合模式，这些算法定义了如何将两个不同的像素颜色值相加（或相减、相乘）。


  GIMP 和 Photoshop 都有类似的合成模式，您可以通过各自数字图像软件包中的图层调色板进行设置。令人印象深刻的是，Photoshop 和 GIMP 中这些强大的数字图像处理能力，同样可以通过
  `PorterDuff` 提供给 Android 开发者使用。


  `PorterDuff.Mode` 是我们之前讨论过的 71 个 `Enum` 子类之一；这个嵌套类保存在 `android.graphics` 包中，并通过导入语句指定为
  `android.graphics.PorterDuff.Mode`。


  如果您想仔细查看 Android `PorterDuff` 类当前可用的所有混合模式，并了解每种模式的实际算法，可以访问以下 Android 开发者网站 URL：


  [`http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html`](http://developer.android.com/reference/android/graphics/PorterDuff.Mode.html)


  接下来，您将在第 7 章中开始构建的 XML 用户界面定义中实现这些 `ImageView` 属性中的一部分。您将使用着色来提亮背景图像，并尝试使用宽高比！




