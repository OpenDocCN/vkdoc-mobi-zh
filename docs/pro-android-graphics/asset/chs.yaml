- '# 7. Android UI 控件：使用 View 类进行图形设计


  ### 摘要


  在第七章中，我们将更深入地探讨 Android 的 `View` 类及其众多子类。我们已经学习了 Android 的 `ViewGroup`（它是 `View`
  的一个子类）及其一些主流的布局容器子类。现在，我们将研究一些 Android 的 `View` 子类，我们可以通过实现这些子类来创建用户界面控件，并在这些 `ViewGroup`
  布局容器内进行图形设计。


  由于布局容器（`ViewGroup` 类）用于容纳用户界面元素（在 Android 中称为控件），我们在前一章必须首先介绍它们。有了这个基础，我们现在可以介绍一些
  Android 最常用的用户界面控件了。这些控件可以作为子用户界面元素放置到父布局容器中。


  正如 Android 拥有数十种 `ViewGroup` 布局容器类一样，它也同样拥有数百个 `View`（控件）子类。因此，本书无法详细涵盖每一个控件类——毕竟本书并非仅专注于用户界面设计元素及其工作原理。


  我们将从图形设计的角度来考察最流行的 Android 用户界面设计控件，即，应该使用哪些用户界面元素控件来实现应用程序的图形元素。我们还将介绍那些允许开发者创建自定义图形用户界面元素的控件。


  自定义图形用户界面的元素是指那些可以通过使用额外的图形设计内容资产，以及像 alpha 通道（透明度）这样的图形设计属性来增强（或定制样式）的元素，从而实现图形与用户界面元素的无缝合成。


  首先，你将学习 Android 的 `View` 超类，然后我们将介绍其最常用的用户界面设计子类。在本书中我们将详细讲解的 `View` 控件类包括：`ImageView`、`TextView`、`EditText`、`Button`、`ImageButton`、`VideoView`、`Space`、`AnalogClock`、`CalendarView`、`DigitalClock`
  和 `ProgressBar`。


  现在，借助上一章添加的菜单系统，你已经能够向“Pro Android GraphicsDesign”应用程序添加新的 `Activity` 子类。通过使用新的
  `Activity` 类，你可以使用所有这些控件来创建用户界面布局。你将在本章中学习到，Android 应用程序的每个功能屏幕都将拥有自己的菜单选项、活动、布局容器以及一系列的
  `View` 控件。




  ### Android View 类：UI 组件的基础


  Android `View` 类是 `java.lang.Object` 类的直接子类，它定义了显示屏上一个称为视图的区域，其核心属性由 View 超类定义。该
  View 超类属于 `android.view` 包，并通过 `import android.view.View` 这条 Java 代码语句导入到您的应用中。


  Android 中的 View 对象在用户的显示屏上占据一个矩形区域；它负责向该屏幕区域进行绘制，并处理该区域中发生的交互事件。


  这个 View 超类不会被直接使用，但可用于创建其他子类，这些子类随后可在您的 Android 应用中使用。目前已经存在非常多的 View 子类，因此您很可能无需自行进行任何这类编程工作！您只需找到并使用提供所需功能的
  View 子类，然后根据您的应用开发需求导入并使用该 View 子类即可。


  View 类对于图形设计师尤其有价值，因为它为 Android 操作系统中的用户界面组件提供了基本的构建块。UI 组件（或者，作为图形设计师，我喜欢称之为 UI
  元素）在 Android 生态系统中被称为“组件”。View 有许多专门的组件子类，充当 UI 控件，能够包含并显示文本、图片、视频、动画或其他内容。


  由于 View 类是构建组件的基础类，而组件用于创建所有交互式 UI 元素（按钮、文本字段等），因此在您的 Android 应用开发图形设计经历中，您会经常看到类名
  View，所以请熟悉 View。


  您已经了解到，ViewGroup（View 的子类）是一个用于创建布局容器的基类，这些容器是那些容纳所有 View（或嵌套的 ViewGroup）并定义其布局属性的不可见容器。ViewGroup
  对象正如其名：一组 View 对象！从这个意义上说，Android 屏幕上的所有内容最终都可以归结为父 ViewGroup 容器内的一个 View 子对象。


  多年来，为 Android 开发了非常多的 UI 组件，它们被捆绑在 Android 中一个名为 `android.widget` 包的 Java 包中。如果您想查看该包中的所有当前组件，可以访问
  Android 开发者网站上组件包摘要页面，网址如下：


  [`http://developer.android.com/reference/android/widget/package-summary.html`](http://developer.android.com/reference/android/widget/package-summary.html)


  您可以通过两种方式添加 Android View 对象：使用 Java 代码，或者使用一个或多个包含布局容器父标签的 XML 文件来指定一组 View 对象。后一种方式（使用
  XML UI 描述）是定义 Android 应用用户界面设计更常见（也更简单）的方法，也是本书中您将采用的 UI 设计方式。


  ### View 基本属性：ID、布局定位和尺寸


  一旦您定义了包含子 UI 元素（View 对象）的布局容器（ViewGroup），正如上一章所做的那样，您首先要做的通常就是使用 Android 参数来定义子
  UI 组件 View 对象的属性。正如您已经看到的，Android 中的参数总是以 `android:` 开头。


  如果您好奇原因，这是由于在 Android 编写的每个 XML 文件定义中，父容器里都有那个 `xmlns:android` XML 命名空间参数。该参数指定了指向当前
  XML 定义的路径，该定义保存在一个中央仓库中，位置位于


  [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)


  因此，`xmlns:android` 参数实际上是在说：“无论你在哪里看到 `android:`，都要将其展开为路径 [`http://schemas.android.com/apk/res/android`](http://schemas.android.com/apk/res/android)，以便为此
  XML 文件中的任何给定参数提供指向最新且集中的 XML 参数定义的直接引用。”


  所以，您的 `android:layout_weight` 参数在 Android 操作系统中实际被视为


  [`http://schemas.android.com/apk/res/android:layout_weight`](http://schemas.android.com/apk/res/android:layout_weight)


  现在您确切知道 XML 文件中发生了什么，以及为什么每个添加的父标签都需要那个 XMLNS 参数，以及为什么没有它 Eclipse 会抛出错误（“此参数不存在”错误）。


  如果您因任何原因要从 Java 代码中引用任何 View（这包括 ViewGroup 父标签以及 View 组件子标签），则需要使用 `android:id`
  参数为组件（View 对象）分配一个 ID。这样做是为了能够使用 `findViewById()` 方法，该方法用于将您正在编写的 XML 用户界面元素定义与您在
  Java 代码中实例化的 Java 对象连接起来，以“填充”您的 XML 定义，从而填充 Java 对象中的字段。Android 中的 `findViewById()`（View）和
  `inflate()`（Menu）方法用于“桥接”您的 XML 标记和 Java 程序逻辑。


  用对象属性的 XML 定义来填充 Java 对象，在 Android 操作系统术语中通常称为填充该对象。


  ID 参数不是必需的，因此如果您不打算在 Java 代码中引用该 View 对象，则不必费心使用 `android:id` 标签来定义它。一个很好的例子是使用
  `TextView` 元素（View），它被包含在 UI 设计中仅仅是为了在屏幕上放置一个文本标签，并在 XML UI 布局定义中定义，但在 Android 应用中没有交互使用。您在上一章的
  XML UI 定义中观察到了这一点。


  另一方面，其他参数如 `layout_width` 和 `layout_height`，则始终需要为每个 View 对象的 XML 标签进行定义。


  在您为 View（子标签）指定 ID 参数后，通常需要为其设置高度和宽度的布局定位参数。这些参数通常被分配两个常量之一：`match_parent` 或 `wrap_content`。


  这样 Android 就可以为您进行定位。您也可以使用像素或 DIP 值，但请记住我们在第 5 章中的讨论，尽可能使用 Android 系统布局常量。对于您 ViewGroup
  布局容器中包含的每个 UI 组件（View 对象），始终需要提供这两个参数。


  View 对象的大小使用宽度和高度来表示；但是，如果开发者已经设置了布局定位参数，则很少需要再指定这些参数，因为 Android 会为您处理。




  实际上，Android 操作系统会在内部为每个 `View` 对象跟踪两对宽度和高度数值。第一对数值称为**测量宽度**和**测量高度**。你的测量宽度和测量高度尺寸将定义你的
  `View` 对象希望在其父容器内部有多大。这些测量尺寸可以通过在任何一个拥有 ID（允许在 Java 逻辑中引用并调用其方法）的 `View` 对象上调用 `.getMeasuredWidth()`
  和 `.getMeasuredHeight()` 方法来获取。


  第二对数值称为**宽度**和**高度**，或者更准确地说，是**绘制宽度**和**绘制高度**。这些绘制尺寸将定义 `View` 在屏幕上、绘制时以及布局计算后的实际大小。绘制宽度和绘制高度数值可能（但不一定）与测量宽度和测量高度数值不同。你可以在
  Java 代码的运行时阶段，通过在任何一个 `View` 对象上调用 `.getWidth()` 和 `.getHeight()` 方法来获取绘制宽度和绘制高度。


  在测量 `View` 的尺寸时，`View` 总是会考虑内边距。我们将在本章的下一节中介绍内边距和外边距。


  内边距以 DIP 为单位表示 `View` 的左侧、顶部、右侧和底部部分。内边距用于将 `View` 的内容间隔开一定数量的像素。尽管 `View` 子类可以定义内边距，但它不支持外边距。不过，Android
  的 `ViewGroup` 子类可以提供外边距参数，因此，外边距和内边距都可以在 `ViewGroups` 中定义。


  ### 视图定位特性：外边距与内边距


  为了对 UI 布局元素进行相对定位，有两类关键的布局参数——外边距和内边距——它们允许你微调 UI 在显示屏上的外观。


  全局定位由 Android 操作系统通过 `layout_width` 和 `layout_height` 常量完成。这样，Android 操作系统就能够适配不同的设备屏幕尺寸、密度、宽高比和方向。


  然后，开发者可以通过在每一个子 `View` 标签 UI 元素上使用 `android:padding` 参数，来对 UI 元素进行局部定位控制。请注意，这个参数叫做
  `android:padding`，而不是 `android:layout_padding`，所以你实际上不需要记住“布局用外边距，UI 元素用内边距”这种规则，因为该参数名称本身就内置了其用途的指示！既然
  `android:padding` 并没有被命名为 `android:view_padding`，你就知道内边距参数可以同时用于 `View`（控件）和 `ViewGroup`（布局容器）这两种子类类型。


  由于可以使用外边距的地方较少，而且你在前面的章节中已经体验过如何使用它们，那我们就先从外边距开始讲起。外边距将其所应用的对象在其容器外部推开，而内边距则相反，它会将容器的边界从其内部所包含的内容处推开。你将在本书中详细看到这一点，因为你将使用这两种间距参数来实现各种不同类型的图形设计最终效果。


  有四类不同的外边距设置参数：`layout_marginBottom`、`layout_marginTop`、`layout_marginLeft` 和 `layout_marginRight`。还有第五个选项，简称为
  `layout_margin`，它可以用一个单一的 DIP 值来设置所有四个方向的外边距，从而在你的布局容器周围提供均匀间隔的外边距。


  从 Android 4.2 API 级别 17（Jelly Bean 果冻豆）开始，新增了两个外边距参数：`layout_marginStart` 和 `layout_marginEnd`。这些“起始”和“结束”外边距参数是作为
  Android 支持从右到左（RTL）设计布局的一部分而添加的，用于支持那些从右向左、而非从左向右扫视屏幕的文化习惯。


  对于 RTL 屏幕设计流程，`layout_marginStart` 等同于 `layout_marginRight`，而 `layout_marginEnd`
  等同于 `layout_marginLeft`。


  对于从左到右（LTR）屏幕设计流程，`layout_marginStart` 等同于 `layout_marginLeft`，而 `layout_marginEnd`
  等同于 `layout_marginRight`。


  有关外边距布局参数的详细信息，请阅读以下 URL 中的 Android 开发者网站 `ViewGroup.MarginLayoutParams` 页面：


  [`developer.android.com/reference/android/view/ViewGroup.MarginLayoutParams.html`](http://developer.android.com/reference/android/view/ViewGroup.MarginLayoutParams.html)


  与外边距类似，Android 有四类不同的内边距设置参数：`android:paddingBottom`、`android:paddingTop`、`android:paddingLeft`
  和 `android:paddingRight`。还有一个第五个快捷选项，简称为 `android:padding`，它可以用一个单一的 DIP 值来设置所有四个方向的内边距，从而在你的
  `View` 对象内容周围提供均匀间隔的内边距。


  从 Android 4.2 API 级别 17（Jelly Bean 果冻豆）开始，新增了两个内边距参数：`android:paddingStart` 和 `android:paddingEnd`。这些“起始”和“结束”内边距参数是作为
  Android 支持 RTL 设计布局的一部分而添加的，用于支持那些从右向左、而非从左向右扫视屏幕的文化习惯。


  对于 RTL 屏幕设计流程，`android:paddingStart` 等同于 `android:paddingRight`，而 `android:paddingEnd`
  等同于 `android:paddingLeft`。


  对于从左到右（LTR）屏幕设计流程，`android:paddingStart` 等同于 `android:paddingLeft`，而 `android:paddingEnd`
  等同于 `android:paddingRight`。


  有关视图内边距参数的详细信息，请阅读以下 URL 中的 Android 开发者网站 `View` 超类页面：


  [`http://developer.android.com/reference/android/view/View.html`](http://developer.android.com/reference/android/view/View.html)


  接下来，你将研究那些允许你控制 `View` 控件如何利用你的图形设计资源，以及如何与你的图形设计（drawable）资源（图像和动画）和数字视频资源进行合成的参数。




  ### 查看视图图形属性：背景、Alpha 与可见性


  小部件的图形属性定义与命名、布局、间距、方向等其他属性一样，通过 XML 参数完成。本书中我们最关注的图形属性（即参数）是那些能让我们将用户界面设计无缝融入整个应用图形设计流程的属性。这些属性包括：背景图像功能、Alpha
  混合值设置，以及对某些小部件和应用图标而言的图片来源文件引用。


  正如你在第 3 章中学到的，小部件中任何可容纳图像资源的槽位或占位符同样可以容纳动画资源。这种为图形和 UI 元素增添动态效果的能力，使开发者能够利用用户界面设计创造出令人惊叹的用户体验。


  最常用于整合图形的视图属性是 `android:background` 参数。该参数允许我们设置背景图片来源文件，或背景颜色值（包括 Alpha 值）。


  在某些情况下，为了让 UI 小部件视图对象背后的图像、动画或视频能够透显出来，你需要将 UI 小部件的背景属性设置为透明。这可以通过使用包含 Alpha 通道的八位十六进制颜色值来实现：使用
  `android:background="#00000000"` 标签参数，该参数将 ARGB 值设置为 100% 透明（实质上定义了零背景图像/像素）。


  下一个常用于整合图形的视图属性是 `android:alpha` 参数。该参数允许你整体设置 UI 小部件的透明度值，包括其背景图像。因此，你可以使用 `android:alpha`
  配合实数设置（例如 `android:alpha="0.55"` 表示 55% 不透明度）来让整个 UI 小部件呈现半透明或不透明状态。


  由于本书是关于高级图形与合成技术的，随着你逐步了解 Android 开发中与图形设计相关的基础知识，全书内容会越来越深入，届时我们将大量运用 Alpha 参数。


  下一个最常用的视图属性是 `android:src` 参数，用于定义来源图像资源。如果你想知道为何该参数的使用频率不及背景图像和 Alpha 混合值，那是因为所有小部件标签都拥有
  `android:background` 参数，但相对较少的标签（如 `<ImageView>`、`<ImageButton>` 以及 `<Bitmap>`）支持使用
  `android:src` 图片来源引用参数。


  这是因为来源图像会覆盖 UI 小部件本身，因此若要让 UI 元素显示在图像资源（或动画资源）前方，你应该改用 `android:background` 参数。此外，`android:src`
  参数还有其他用途，例如在 `AndroidManifest.xml` 文件中为应用分配图标资源。


  最后是 `android:visibility` 参数，它比 `android:alpha` 参数在内存和处理器效率上更高。这是因为 Alpha 混合（通常用于创建半透明效果，使背景图像或元素得以透显以实现图形设计效果）所需的算法，比屏幕上显示或不显示元素的简单代码更为复杂。此外，Alpha
  还可以在 Java 代码中进行动画处理，使特定设计元素平滑淡入或淡出。因此，请在图形合成中使用 Alpha，在布局或 UI 界面可用性实现中使用可见性，因为后者的“开销”更低。


  如果你只想显示或隐藏视图对象（即瞬间开启或关闭屏幕上的可见性），所有视图元素（如 `TextView`、`ImageButton`、`ImageView`、`Button`、`CheckBox`、`ViewGroup`
  等）都具有可见性属性。视图的可见性可设置为三个预定义的 Android 值常量之一：`VISIBLE`（当前在屏幕上可见）、`INVISIBLE`（隐藏，但其屏幕布局空间仍被保留，尽管不可见）和
  `GONE`（完全隐藏，包括从父布局容器的子布局放置计算算法中移除）。




  ### 视图的功能特性：监听器与焦点


  使用包含 XML 标签标记的布局容器设计好 View UI 组件集合后，这些组件仍需进行实例化并与操作系统和设备硬件“连接”。


  这一过程在 Java 代码中通过 Android 操作系统输入事件来“捕获”终端用户与用户界面元素的交互来实现。


  当终端用户通过操作 Android 设备硬件导航功能（如键盘、导航键、轨迹球和触摸屏）与应用程序交互时，会触发 Android 输入事件。


  捕获这些输入事件将使您的 UI 设计具备功能性，并能响应用户交互。捕获操作系统输入事件可通过在 Java 代码中使用 Android 事件监听器来实现。


  Android `EventListener` 超类是 `android.util` 包的一部分；如果您想研究核心超类，可访问以下网址在 Android 开发者网站上获取更多信息：


  [`http://developer.android.com/reference/java/util/EventListener.html`](http://developer.android.com/reference/java/util/EventListener.html)


  事件监听器是您可以附加到 View 对象上的方法，先通过 `findViewById()` 方法从 XML 定义中导入、实例化并实例化这些对象后，再进行附加。


  一旦设置好 View 对象的 Java 代码就位，您就可以将事件监听器方法附加到该对象上，该方法将为 View 对象执行事件处理，在大多数情况下，该对象就是 UI
  设计元素之一。


  Android 中最常用的事件处理方法有六种，包括 `.onClick()`、`.onLongClick()`、`.onTouch()`、`.onKeyUp()`、`.onKeyDown()`、`.onCreateContextMenu()`
  和 `.onFocusChange()`。如果您想更详细地研究 Android 操作系统输入事件，请访问以下网址：


  [`http://developer.android.com/guide/topics/ui/ui-events.html`](http://developer.android.com/guide/topics/ui/ui-events.html)


  我提到的最后一个事件处理方法是 `.onFocusChange()` 方法，它用于追踪用户焦点的变化。这引出了另一个概念：焦点，它用于确定用户在布局容器中正在使用或聚焦于（即当前正在交互或使用的）哪一个
  UI 组件。


  Android 操作系统会负责确定哪个父 `ViewGroup` 的子 `View` 对象当前拥有应用程序终端用户的焦点。这是通过追踪输入事件来实现的，这些事件可以告知
  Android 用户当前正在触摸（使用）哪个 UI 组件，以及用户如何从一个 UI 元素导航到下一个 UI 元素。


  您也可以在任意时刻强制应用程序将其焦点设置到任何 UI `View` 对象（用户界面元素）上。要做到这一点，您可以调用 View 的 `.requestFocus()`
  方法，该方法会高亮显示该 UI 元素以供使用。


  此外，所有 `View` 对象都允许您设置 `.onFocusChange()` 事件监听器，以便在附加该监听器的 `View` 对象获得或失去用户焦点时，应用程序逻辑（如果需要）可以收到通知并采取相应措施。


  本书将详细探讨输入事件、事件监听器、事件处理和焦点，因为它们对于您的应用程序开发、用户界面和用户体验优化都至关重要。


