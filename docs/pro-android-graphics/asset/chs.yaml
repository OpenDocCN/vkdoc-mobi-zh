  \ canvas) { 绘制处理流程代码将放在这里 }`\n\n将鼠标悬停在你方法声明中的 `Canvas` 类（对象）用法上，并 `import Canvas`（`android.graphics`），然后你就可以准备使用一个\
  \ `for 循环` 来处理 X,Y 坐标，从而编写你的绘制处理流程引擎了。\n\n![A978-1-4302-5786-8_17_Fig19_HTML.jpg](img/A978-1-4302-5786-8_17_Fig19_HTML.jpg)\n\
