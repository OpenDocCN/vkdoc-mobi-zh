  \ `Paint` 导入语句，这是你在上一步执行了完全相同的工作流程后得到的结果。\n\n\n\n### Android Shader 超类：用于绘制的纹理映射\n\
  \n在后续章节创建 `BitmapShader` 着色器对象之前，我想先向你介绍 Android 的 `Shader` 类，因为你即将使用的 `BitmapShader`\
  \ 类是它的子类之一。\n\nAndroid 的 `Shader` 类是 `java.lang.Object` 主类的另一个直接子类。这表明 `Shader`\
  \ 类是专门为定义 Android 操作系统的 `纹理映射`（或着色器）对象而设计的，因此在我们使用它之前，有必要详细讲解一下。\n\nAndroid 的 `Shader`\
  \ 类层级结构如下：\n\n```\njava.lang.Object\n  > android.graphics.Shader\n```\n\nAndroid\
  \ 的 `Shader` 类属于 `android.graphics` 包。因此，在应用中使用 `Shader` 类的 `import 语句` 需要引用 `android.graphics.Shader`\
  \ 包作为正确的类导入路径。\n\n这个 `Shader` 类是一个 `public` 类，拥有几个间接子类，包括你接下来要使用的 `BitmapShader`，以及本章前面用到的三个渐变类：`LinearGradient`、`SweepGradient`\
  \ 和 `RadialGradient`。\n\n`Shader` 类用于创建在绘制（`Paint`）操作期间生成水平颜色渲染的对象。通过调用 `.setShader()`\
  \ 方法，可以将任何 `Shader` 子类（对象）安装到 `Paint` 对象中。\n\n当 `.setShader()` 方法调用为 `Paint` 对象配置好\
  \ `Shader` 对象后，任何使用该 `Paint` 对象进行绘制的 `Canvas` 对象，都将从该 `Shader` 对象获取颜色信息来绘制画布。\n\n\
  `Shader` 类有一个名为 `Shader.TileMode` 的嵌套类，它提供了开发者声明 `Shader` 对象时可使用的平铺模式常量。由于这是一个重要的类，我们将在下文详细讲解。\n\
  \n### Shader.TileMode 嵌套类：着色器平铺模式\n\nAndroid 的 `Shader.TileMode` 类是一个 `public static\
  \ final enum` 类，也是 `java.lang.Object` 主类的另一个 `java.lang.Enum` 直接子类，它为相关的 Java 类提供了枚举常量。在本文上下文中，相关的\
  \ Java 类是 `Shader` 类及其子类，本章将实现其中许多类。\n\n这意味着 `Shader.TileMode` 嵌套类是专门为定义纹理（或着色器）平铺模式常量而设计的。`Shader.TileMode`\
  \ 枚举类层级结构如下：\n\n```\njava.lang.Object\n  > java.lang.Enum<E extends java.lang.Enum<E>>\n\
  \    > android.graphics.Shader.TileMode\n```\n\n这个 `Shader.TileMode` 嵌套类属于 `android.graphics`\
  \ 包。因此，导入 `Shader` 类的语句就足以访问 `TileMode` 常量，它引用 `android.graphics.Shader` 包和类名作为其类导入路径，稍后你在使用\
  \ `Shader.TileMode` 常量实现 `BitmapShader` 时就会看到。\n\n目前 Android 操作系统中有三个可用的 `TileMode`\
  \ 常量，用于定义纹理映射或着色器的平铺模式：`CLAMP`、`MIRROR` 和 `REPEAT`。\n\n如果着色器在其原始边界外绘制，`TileMode.CLAMP`\
  \ 将复制图像边缘的颜色。在使用 `Bitmap` 对象时，这可能会显得有点奇怪，因此如果你计划超出边界，可能需要一个像素宽的实色边框（类似于 `NinePatch`\
  \ 中的做法）。`CLAMP` 模式基本意味着零平铺，即不平铺此图像！\n\n`TileMode.MIRROR` 会水平及垂直重复你的着色器图像。此模式会以交替方式翻转或镜像图像瓦片。这样做是为了确保相邻的图像瓦片永远不会出现“接缝”。因此，使用\
  \ `MIRROR` 常量进行图像平铺的结果是无缝的，即使你使用的图像最初并非为平铺而设计。如果使用了合适的数字图像素材，此模式还能创造出很酷的万花筒效果。\n\
  \n`TileMode.REPEAT` 会水平及垂直重复你的着色器图像。这被称为“直接平铺”，可用于那些你预先设计好（使用 GIMP 2.8）要无缝平铺的图像。请注意，`MIRROR`\
  \ 同样适用于你设计为无缝的图像瓦片，因此始终要预览这两个常量！\n\n### BitmapShader 类：使用位图进行纹理映射\n\n在下一节创建 `BitmapShader`\
  \ 着色器对象之前，我想先更详细地介绍 Android 的 `BitmapShader` 类。\n\nAndroid 的 `BitmapShader` 类是 `Shader`\
  \ 类的直接子类。因此，`BitmapShader` 类继承了其超类 `Shader` 的所有能力、方法、常量等。\n\nAndroid 的 `BitmapShader`\
  \ 类层级结构如下：\n\n```\njava.lang.Object\n  > android.graphics.Shader\n    > android.graphics.BitmapShader\n\
  ```\n\nAndroid 的 `BitmapShader` 类也属于 `android.graphics` 包。因此，`BitmapShader` 类的导入语句引用\
  \ `android.graphics.BitmapShader` 包作为其类导入路径。\n\n`BitmapShader` 类是一个 `public` 类，它创建一个\
  \ `Shader` 对象，可用于将 `Bitmap` 对象作为纹理映射绘制到 `Paint` 对象中，然后应用到 `Canvas` 对象上。通过设置适当（期望）的\
  \ `TileMode` 常量，可以对 `Bitmap` 对象进行 `CLAMP`、`REPEAT` 或 `MIRROR` 平铺。\n\n需要指出的是，你可以为\
  \ X 轴和 Y 轴设置不同的常量，因此你可以在一个维度上使用 `MIRROR`，在另一个维度上使用 `REPEAT`，从而对图像平铺进行精细控制。\n\n`BitmapShader`\
  \ 构造方法使用以下格式指定源图像 `Bitmap` 对象以及 X 和 Y 方向的 `Shader.TileMode` 常量：\n\n```\nBitmapShader(Bitmap\
  \ bmpName, Shader.TileMode Xconstant, Shader.TileMode Yconstant)\n```\n\n现在，你可以在\
  \ `ImageRoundingDrawable` 子类中实现 `Shader` 对象了。\n\n\n\n### 为 Drawable 创建并配置 BitmapShader\n\
  \n在 `ImageRoundingDrawable` 构造方法的顶部声明 `BitmapShader` 对象，并将其命名为 `imageShader`，如图\
  \ 16-21 所示。\n\n`BitmapShader imageShader;`\n\n如你所知，`BitmapShader` 对象用于保存 `Bitmap`\
  \ 对象，并告知 Android 如何在 `Paint` 对象中应用或渲染 `Bitmap` 对象的图像资源。同样地，你的 `Paint` 对象用于控制图形如何被绘制或应用（涂绘）到\
