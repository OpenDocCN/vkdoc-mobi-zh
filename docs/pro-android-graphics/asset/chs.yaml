  \ Android 2D 动画知识库提升到一个更先进的水平，因为你将实现一个仅使用 Java 编程逻辑的复杂程序化帧动画组合。\n\n# 15. 程序化动画：使用动画类\n\
  \n摘要\n\n在第十五章中，我们将详细探讨在 Android 中使用 Java 编码实现程序化动画的方面。我们在第 4 章中已经考察了程序化动画背后的概念，以及如何使用\
  \ XML 定义文件工作流程来设置程序化动画。我在这本书的早期就讲解了这部分内容，因为我认为你应该能够在你的专业 Android 图形设计工作流程的早期阶段，就学会在你的应用程序中运行基本的程序化动画。\n\
  \n本章我们关注的任务是如何实现我们在第 4 章中实现的程序化动画“动作”，但现在仅使用 Java 代码，不使用任何 XML。这比我们在第 4 章中为应用程序启动画面实现程序化动画的方式要稍微高级一些，因为\
  \ Java 代码通常由于其紧凑的链式代码结构而比 XML 标记复杂得多——无论你的 XML 嵌套结构变得多么复杂。\n\n用 Java 方法做所有事情将让你看到`Animation`类及其`五个`子类中的方法是如何工作的。`Animation`类是\
  \ Android 操作系统中程序化动画的父类。你将全面了解这个类和`Animation`对象，以及如何仅使用 Android 应用程序图形编程逻辑的 Java\
  \ 端来实现程序化动画功能。\n\n我们这样做的目的是，如果你希望在你的程序化动画 Java 编程管线之中或周围添加其他 Java 代码功能，那么你使用程序化动画处理管线所做的一切都将\
  \ 100%在 Java 编程语言中实现。\n\n\n\n### 动画类：你的程序化动画引擎\n\nAndroid 的 `Animation` 类（动画类）是主类\
  \ `java.lang.Object` 的直接子类，这意味着它是专门为 Android 操作系统提供程序化动画基础而从头编写的。这里所说的“从头编写”，是指从零开始编码，并非基于任何其他现有代码（如类、方法、接口、常量等）。\n\
  \nAndroid 动画 Java 类的层次结构如下所示：\n\n`java.lang.Object`\n\n  `> android.view.animation.Animation`\n\
  \n`Animation` 类属于 `android.view.animation` 包的一部分。正因如此，`Animation` 类的 `import` 语句引用的就是\
  \ `android.view.animation.Animation` 包的导入路径。\n\n实例化一个 `Animation` 对象是为了创建插值的`矢量`或`程序化`动画。这种类型的动画不使用帧或位图，而是将数学矢量或算法应用于现有的`Drawable`对象，以实现缩放（调整大小）、旋转、Alpha\
  \ 混合（Alpha 通道淡出）和平移（X 和 Y 轴移动）等效果。\n\n`Animation` 类是一个 `public abstract`（公有抽象）类，这意味着除了最初声明\
  \ `Animation` 对象之外，它不应被直接使用；它被创建出来是为了用于创建其他子类，例如我们将在本章中用来实现 2D 程序化动画特效的那些类。\n\n\
  因此，`Animation` 类有五个重要的直接子类，你将在本章中详细了解它们。这些子类包括用于缩放 `View` 对象的 `ScaleAnimation`、用于对\
  \ `View`（或 `ViewGroup`）对象进行 Alpha 混合（淡入和淡出）的 `AlphaAnimation`、用于旋转 `View` 对象的 `RotateAnimation`，以及最后用于在屏幕上移动\
  \ `View` 对象的 `TranslateAnimation`。\n\n还有第五个子类 `AnimationSet`，它要复杂得多，因为它允许使用其他四种类型的\
  \ `Animation` 子类创建`复合动画`。`AnimationSet` 类和对象允许对 `Animation` 对象进行集合或分组，甚至进行子分组，以形成更复杂的程序化动画层次结构，从而实现你能想象到的几乎任何效果。\n\
  \n在本章中，当你编写动画管线应用程序时，我们将深入了解所有这些内容。这个应用程序将把你在前一章中编写的帧动画与你在本章中将在其周围及其之上编写的程序化动画结合起来。\n\
  \n你将在数字图像动画中实现许多 `Animation` 类及其子类对象。你将使用大多数 Android `Animation` 类的子类，为你的启动画面动画添加程序化动画“移动”，在你在本章中逐步学习\
  \ Android 程序化动画的过程中，你将了解你所使用的每一个子类。\n\n### TranslateAnimation 类：用于移动的动画子类\n\n由于这是我们不会在本章中直接实现的一个程序化动画变换（除了我将在本章末尾放置的“试试这个”建议练习部分之外），我们将首先介绍这个\
  \ `Animation` 子类，因为它相当直接明了。\n\n如前所述，Android 的 `TranslateAnimation` 类是 `android.view.animation.Animation`\
  \ 抽象类的一个直接子类。该类用于在用户 Android 设备的屏幕上，沿 X 和 Y 坐标方向为移动设置动画。因此，它非常简单，但对各种目的都极为有用，从为元素设置动画到将物体移入或移出用户的显示屏。\n\
  \nAndroid 的 `TranslateAnimation` Java 类层次结构如下所示：\n\n`java.lang.Object`\n\n  `> android.view.animation.Animation`\n\
  \n    `> android.view.animation.TranslateAnimation`\n\n`TranslateAnimation` 类是 `android.view.animation`\
  \ 包的一部分，正因如此，它的 `import` 语句引用了 `android.view.animation.TranslateAnimation` 包的导入路径。\n\
  \n你想要用来创建 `TranslateAnimation` 对象的构造方法采用以下格式，你将在本章后面看到：\n\n`TranslateAnimation(float\
  \ fromX, float toX, float fromY, float toY);`\n\n### ScaleAnimation 类：用于缩放的动画子类\n\
  \n如你所知，Android 的 `ScaleAnimation` 类是 `android.view.animation.Animation` 抽象类的另一个直接子类。该类用于缩放\
  \ `View` 对象，同样是通过使用 2D 空间中的 X 和 Y 坐标。\n\nAndroid 的 `ScaleAnimation` Java 类层次结构如下所示：\n\
  \n`java.lang.Object`\n\n  `> android.view.animation.Animation`\n\n    `> android.view.animation.ScaleAnimation`\n\
  \n`ScaleAnimation` 类同样是 `android.view.animation` 包的一部分。它的 `import` 语句引用了 `android.view.animation.ScaleAnimation`\
  \ 包的导入路径，你将在下一节中使用它来缩放你的 PAG 帧动画，使其看起来像从远处出现并落在显示屏中心时看到的那样。\n\n你想要用来创建 `ScaleAnimation`\
  \ 对象的构造方法采用以下格式，你将在下一节中看到：\n\n`ScaleAnimation(float fromX, float toX, float fromY,\
  \ float toY, int pivotXType, float pivotXValue, int pivotYType, float pivotYValue);`\n\
