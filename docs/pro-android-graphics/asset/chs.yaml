- "# 9. 高级 ImageButton：创建自定义多状态 ImageButton\n\n### 摘要\n\n在第九章中，我们将继续研究 `ImageView`\
  \ 类，深入探讨其最重要的子类之一：`ImageButton` 类。\n\n`ImageButton` 是 Android 最重要的用户界面元素之一，用于在按钮用户界面元素内部实现前沿的图形设计。虽然\
  \ Android 有一个标准的 `Button` 类，但它在实现图形设计资源方面的灵活性不如 `ImageButton` 类。\n\n由于这是一本专注于图形的书，我们将单独讨论这个\
  \ `ImageButton` 类。我们将用一整章来学习如何定义它的多种状态，以及如何将图形元素附加到每个状态，以达到标准 Android `Button` 类无法比拟的出色视觉效果。\n\
  \n我们使用了 `android:src` 参数来定义源图像，并使用一些 UI 布局参数进行定位，以及使用边距参数在设计中为其留出一些空间。但是，我们并没有真正深入探讨任何高级参数或技巧，例如同时使用源（前景）图像层和背景图像层。\n\
  \n我们确实介绍了一些使用 GIMP 2.8 的相当高级的数字图像处理概念，在一本《Pro Android Graphics》书中这样做总是好的，并且随着本书的深入，我将在\
  \ GIMP 和 VirtualDub 中都尽可能多地介绍这方面的内容。\n\n### Android 中的按钮图形：ImageButton 类概述\n\nAndroid\
  \ 的 `ImageButton` 类是 `ImageView` 类的子类，而 `ImageView` 类本身又是视图超类的子类，正如你在前一章所学，视图超类是\
  \ `java.lang.Object` 主类的子类。`ImageButton` 类的类层次结构如下所示：\n\n```\njava.lang.Object\n\
  \  > android.view.View\n    > android.widget.ImageView\n      > android.widget.ImageButton\n\
  ```\n\n`ImageButton` 与其父类 `ImageView` 一样，被放在名为 `android.widget` 包的独立 Android UI\
  \ 控件包中，因为它是一个用于使用图像定制的按钮 UI 元素的 UI 控件。\n\n当开发者希望创建一个自定义的 UI 按钮元素，该按钮显示为图像而不是方形背景上的文本标签（例如标准\
  \ UI 按钮的外观，正如你在前几章所见）时，就会使用 `ImageButton` UI 控件。\n\n就像 Android 的 `Button` 类 UI 控件一样，`ImageButton`\
  \ UI 控件也可以被用户按下（通过点击或触摸事件），并且也具有焦点和悬停特性。\n\n然而，`Button` UI 控件继承自 `TextView` 类，因此它主要针对文本，本质上是一个带有使其看起来像按钮\
  \ UI 元素背景的 `TextView` UI 元素。而你的 `ImageButton` UI 控件则继承自 `ImageView` 类，这赋予了它图形特性，这正是我们在本书中希望利用的。\n\
  \n如果你不利用其任何自定义参数，`ImageButton` UI 控件将具有标准 UI Button 的外观，但当按钮被按下时，那个灰色按钮背景会变成蓝色。因此，除非你要实现本章将要介绍的各种图像资源和多状态特性，否则不要使用\
  \ `ImageButton`。\n\n`ImageButton` UI 控件的默认图像（定义其正常状态）可以通过在 XML 布局容器 UI 定义中的 `<ImageButton>`\
  \ 子标签内使用 `android:src` XML 参数进行静态定义。也可以在 Java 代码中通过使用 `.setImageResource()` 方法在运行时动态定义。\n\
  \n在本书中，我们将按照 Android 的推荐方式，使用 XML 来定义 UI 设计。如果你使用 `android:src` 参数来引用图像资源，这将替换你的标准\
  \ `ImageButton` 背景图像。如果你想进行一些合成，也可以定义自己的背景图像，并且还可以将背景颜色值设置为透明（`#00000000`）。\n\n\n\
  \n### ImageButton 状态：正常、按下、聚焦与悬停\n\n`ImageButton` 类允许您为每种使用状态定义自定义图像资源：正常（默认或未使用）、按下（用户正在触摸或按压点击选择硬件）、聚焦（最近触摸释放或点击释放）和悬停（用户将鼠标或导航键悬停在`ImageButton`上，但尚未触摸或点击）。悬停状态是最近在\
  \ Android 4.0 API Level 14 中新增的，可能是为了在 Google Chromebook 上使用 Android 操作系统而做的准备。四种主要的`ImageButton`状态及其对应的鼠标事件如表\
  \ 9-1 所示。\n\n表 9-1. Android `ImageButton` 类主图像资源状态常量及其鼠标使用对应关系\n\n| `ImageButton`\
  \ 状态 | `ImageButton` 状态描述 | 鼠标事件对应关系 |\n| --- | --- | --- |\n| `NORMAL` | 默认的`ImageButton`状态（未使用）\
  \ | 鼠标移出 |\n| `PRESSED` | 触摸或点击时的`ImageButton`状态 | 鼠标按下 |\n| `FOCUSED` | 触摸并释放后的`ImageButton`状态\
  \ | 鼠标抬起 |\n| `HOVERED` (API 14) | 聚焦（但未触摸）时的`ImageButton`状态 | 鼠标悬停 |\n\n`ImageButton`\
  \ UI 元素的实现并不简单，因为您需要为每个`ImageButton`状态创建唯一的数字图像资源。这样做是为了在视觉上向用户指示不同的`ImageButton`状态，正如您将在本章中看到的，这涉及一些数字图像处理工作！\n\
  \n稍后在本章中，您将使用 GIMP 2.8 为每个`ImageButton`创建多个数字图像状态，这些状态需要涵盖 Android 要求的各种分辨率密度，以适应不同的设备类型、屏幕尺寸和分辨率。您很快就会看到，必须创建的数字图像资源数量等于图像按钮数量乘以四种状态再乘以四种密度目标，即每个实现的`ImageButton`需要\
  \ 16 个图像资源。\n\n定义`ImageButton`状态的标准工作流程是使用位于`/res/drawable`文件夹中的 XML drawable 定义文件，该文件使用父级`<selector>`标签和子级`<item>`标签，通过自定义数字图像资源引用来定义每个`ImageButton`状态。本章稍后将详细介绍如何设置这一流程的示例。\n\
  \n一旦设置了此 XML 定义，Android 将根据`ImageButton`的状态自动为您更换图像资源。状态定义的顺序很重要，因为它们按顺序进行评估。这就是为什么正常图像资源放在最后，因为它仅在`android:state_pressed`和`android:state_focused`均评估为\
  \ false 时才会显示。\n\n### ImageButton Drawable 资源：合成按钮状态\n\n让我们开始正题，直接进入创建多状态`ImageButton`的工作流程。首先需要为每个按钮状态创建不同的数字图像资源。为此，您将使用\
  \ GIMP 开源图像编辑和合成软件包，现在通过任务栏上的快速启动图标启动 GIMP。\n\n使用 `文件 ➤ 打开` 菜单序列访问“打开图像”对话框（如图 9-1\
  \ 所示），找到 `ImageButton_Bookmark.png` 图像，它将作为此`ImageButton`数字图像资源的最底层（最低层）基础图像合成层。找到该资源后，选中它使其变为蓝色，然后单击“打开”按钮将其作为原始图像层加载到\
  \ GIMP 中。\n\n![A978-1-4302-5786-8_9_Fig1_HTML.jpg](img/A978-1-4302-5786-8_9_Fig1_HTML.jpg)\n\
  \n图 9-1. 打开 `ImageButton_Bookmark` 主图像层\n\n接下来要做的是添加一个外部按钮元素，例如按钮外围的金属环，使其看起来像一个真正的按钮。\n\
  \n如果您单击图 9-1 中显示的其他两个原始资源，对话框将在右侧显示它们的预览，您会看到它们分别是金色和银色的环形 UI 设计元素，在接下来的几个步骤中，您将把它们合成到基础书签图标之上。\n\
  \nGIMP 提供了一个非常有用的工具或命令，可以非常轻松地将外部图像资源导入并放置到合成层中。此工具或命令位于 `文件` 菜单下，称为 `作为图层打开` 功能。\n\
  \n让我们使用这个菜单序列（如图 9-2 所示）返回您的 `ImageButton` 资源文件夹，并导入下一个图像合成层。\n\n![A978-1-4302-5786-8_9_Fig2_HTML.jpg](img/A978-1-4302-5786-8_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 使用 `文件 ➤ 作为图层打开` 菜单序列添加合成层\n\n如图 9-2 所示，您的底层书签图层已经就位，大小为 360 像素（这是 XHDPI\
  \ 超高密度像素图像资源尺寸），现在您要选择图像合成中的下一层，即图 9-3 所示的“打开图像”对话框中的 `ImageButton_Silver.png` 文件。该对话框是通过图\
  \ 9-2 所示的 `文件 ➤ 作为图层打开` 菜单序列访问的。\n\n![A978-1-4302-5786-8_9_Fig3_HTML.jpg](img/A978-1-4302-5786-8_9_Fig3_HTML.jpg)\n\
  \n图 9-3. 定位 `ImageButton_Silver.png` 按钮外部环以添加到合成中\n\n打开银色的外部按钮环（或圈）资源（如图 9-3 右侧所示）后，GIMP\
  \ 会将其插入到书签图标图形上方的合成层中。如图 9-4 所示，生成的合成图像现在看起来更像一个 UI 按钮，您现在可以使用 `文件 ➤ 导出` 菜单序列来创建正常状态。\n\
