  \n接下来，你将使用 `RectF` 类为该方法定义你的可绘制区域。\n\n### Android 的 Rect 和 RectF 类：定义绘图区域\n\n在编写矩形绘图区域对象的代码之前，我需要先让你熟悉\
  \ Android 的 `Rect` 和 `RectF` 类。这两个类的主要区别，至少在基本层面上，在于 `Rect` 类使用整数值定义 `Rect`（矩形）对象，而\
  \ `RectF` 类使用浮点（实数）数值定义 `RectF` 对象。\n\n也就是说，由于使用整数与实数带来的差异，每个类的方法也彼此不同。这主要是由于在这些不同类型的（数值）方法中，所涉及的计算所采用的数学逻辑不同。\n\
  \nAndroid 的 `Rect` 和 `RectF` 类是 Java 主类 `java.lang.Object` 的直接子类。因此，可以知道它们是专门为在\
  \ Android 中实现矩形区域而创建的。这些区域最常用于图形处理，并且经常与 `Paint` 和 `Canvas` 类一起用于绘图操作。\n\nAndroid\
  \ 的 `Rect` 和 `RectF` 类层次结构如下所示：\n\n```\njava.lang.Object\n  > android.graphics.Rect\n\
  ```\n\n```\njava.lang.Object\n  > android.graphics.RectF\n```\n\nAndroid 的 `Rect`\
  \ 和 `RectF` 类属于 `android.graphics` 包。这两个类的导入语句都引用了 `android.graphics.Rect` 或 `android.graphics.RectF`\
  \ 包导入路径。\n\n你即将在你的 `ImageRoundingDrawable` 类的 `.draw()` 方法中利用的 `RectF` 类，支持四个浮点坐标，它们共同定义了创建矩形对象的边界。\n\
  \n你的矩形对象是使用其四条边（左、上、右、下）的像素坐标定义的。对于一个专业图形设计师来说，更准确的理解方式是，你实际上只是使用前两个（左、上）值定义了矩形的左上角（原点），这些值通常是\
  \ `(0,0)`，代表屏幕的原点。\n\n第二组值定义了矩形的目标（右下）角，这很像你在屏幕上“拖放”右下角（值）来绘制一个选区，在你为图形设计工作流程定义了所需的矩形区域之后。\n\
  \n你可以通过调用 `.width()` 和 `.height()` 方法直接访问 `Rect` 和 `RectF` 的数据字段，以获取矩形对象的宽度或高度。值得注意的是，大多数\
  \ `Rect` 或 `RectF` 类方法不会检查你的值是否按正确的（左、上、右、下）顺序排列。\n\n### 定义你的 `RectF` 对象并调用 `drawRoundRect()`\n\
  \n接下来，让我们通过定义和实例化你的 `RectF` 对象，然后调用你的类所需的实际绘图方法，来完成你的 `.draw()` 方法。你将通过利用到目前为止已设置好的所有\
  \ `RectF`、`Paint`、`Canvas` 和 `Shader` 对象来实现这一点。随着复杂程度的增加，这变得令人兴奋，然而一旦你在头脑中理清了正确的顺序（理解，或顿悟时刻），这一切确实都非常合乎逻辑。\n\
  \n这通过声明 `RectF` 对象，将其命名为 `drawRect`，然后使用 `new` 关键字和 `RectF()` 构造方法实现，构造参数为你之前了解的屏幕原点\
  \ `0,0`，以及目标右下角。\n\n目标角的位置数据值在逻辑上将通过调用你已经编写好并存储在 `canvasW` 和 `canvasH` 整型变量中的 `.getBounds().width()`\
  \ 和 `.getBounds().height()` 方法来设置。\n\n这可以通过一行 Java 代码完成，如图 16-26 所示：\n\n```\nRectF\
  \ drawRect = new RectF(0.0f, 0.0f, canvasW, canvasH);\n```\n\n接下来，你将使用名为 `arg0`\
  \ 的 `Canvas` 对象（该方法的第一个参数是 Eclipse ADT 遵循的命名约定）来调用你的 `Canvas` 类绘图方法，该方法将为你执行图像圆角处理。一旦处理了不透明度，你就完成了自定义\
