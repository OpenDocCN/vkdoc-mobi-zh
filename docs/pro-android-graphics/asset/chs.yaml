  \ Squeeze 主用户界面窗口，如图 2-23 所示。该窗口包含输入选项和视频编辑区域。\n\n![A978-1-4302-5786-8_2_Fig23_HTML.jpg](img/A978-1-4302-5786-8_2_Fig23_HTML.jpg)\n\
