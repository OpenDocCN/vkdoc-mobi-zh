  \n## 关于作者\n\n\n### 华莱士·杰克逊\n\n华莱士·杰克逊自二十多年前《**多媒体制作人杂志**》创刊以来，一直为先锋多媒体出版物撰写关于新媒体内容开发工作的文章。当时，他为该杂志在`SIGGRAPH`大会上发行的中心插页（一份可拆卸的\"\
  迷你特刊\"增刊）撰写了关于计算机处理器架构的文章。\n\n此后，华莱士为众多刊物撰写了关于他在交互式 3D 和新媒体广告活动设计方面的内容制作工作。他曾为以下行业刊物撰稿，如《**3D\
  \ 艺术家**》、《**桌面出版者杂志**》、《**跨媒体杂志**》、《**信息亭杂志**》、《**数字标牌杂志**》和《**AV 视频杂志**》。\n\n华莱士·杰克逊在十几岁时曾是一名`COBOL`和`RPGII`程序员，后来他使用`Java`、`JavaScript`和`HTML5`编写应用程序。在过去几年里，华莱士为\
  \ Apress 出版社（斯普林格）撰写了数本关于`Java`和`Android`开发的流行应用程序编程书籍。\n\n华莱士·杰克逊目前是**Mind Taffy\
  \ Design**公司的首席执行官，这是一家位于北圣巴巴拉县的多媒体内容制作与数字活动设计开发机构，正好位于其客户群所在地硅谷与好莱坞、尔湾和圣地亚哥的中间位置。在过去的二十年里，**Mind\
  \ Taffy Design**公司使用领先的开源技术，如`PDF`、`HTML5`、`WebGL`、`Java`、`JavaFX`和`Android`，为全球众多顶级品牌制造商创建了`i3D`数字新媒体内容交付成果，客户包括索尼、三星、IBM、爱普生、诺基亚、泰科、Sun、KDS、美光、CTX、EIZO、TEAC、SGI\
  \ 和三菱。\n\n华莱士·杰克逊在加州大学洛杉矶分校（UCLA）获得商业经济学学士学位，并在南加州大学（USC）获得管理信息系统设计与实施硕士学位。他的市场营销战略研究生学位同样来自南加州大学，并在那里完成了南加州大学研究生创业项目。\n\
  \n## 关于技术审校\n\n迈克尔·托马斯在软件开发领域拥有超过 20 年的工作经验，曾担任个人贡献者、团队负责人、项目经理及工程副总裁。迈克尔拥有超过 10\
  \ 年的移动设备工作经验。他目前专注于医疗领域，利用移动设备加速患者与医疗服务提供者之间的信息传递。\n\n## 致谢\n\n我要感谢 Apress 出版社所有出色的编辑及其支持团队，他们为这本书付出了长期而艰辛的努力，使其成为终极的全能型《**Pro\
  \ Android Graphics**》书籍。\n\n感谢汤姆·威尔士，他担任本书的首席编辑，在使本书保持领先水平的过程中，凭借其丰富的经验和宝贵的指导做出了贡献。\n\
  \n感谢凯蒂·沙利文，她担任本书的协调编辑，并以坚定不移的勤奋确保我按时甚至提前完成写作截稿日期。\n\n感谢玛丽·贝尔，她担任本书的文字编辑，对细节的关注以及确保文本符合当前\
  \ Apress 出版标准方面付出了努力。\n\n感谢迈克尔·托马斯，他担任本书的技术审校，确保我不会犯任何错误，因为带有错误的代码无法正常运行，即便能运行，那也是非常幸运的失误，这在计算机编程中相当罕见，但一旦发生，便是妙不可言……\n\
  \n最后，感谢史蒂夫·安格林，采编编辑，是他将我签约为 Apress 和斯普林格的作者。\n\n\n\n"
