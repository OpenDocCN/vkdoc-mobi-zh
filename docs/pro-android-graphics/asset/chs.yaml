  \ 使用上网本分辨率 1024x600 数字视频素材\n\n`1024x600`分辨率因大约十年前出现的超便携上网本产品而流行，其特点是宽屏`SVGA`分辨率。`SVGA`，即“超级`VGA`”，分辨率为`800x600`，因此如果你在宽度上再增加`224`像素，你将得到一个宽屏超级`VGA`（或`WSVGA`）显示屏。\n\
  \n上网本拥有 10.1 英寸屏幕，使其成为`LDPI`（`1024/10=102`像素每英寸）。现在戴尔已经推出了 Android PC，你可能会看到 Android\
  \ 上网本市场也开始成形。也有一些采用此分辨率的智能手机和平板，屏幕尺寸为 4 到 5 英寸，这使它们处于`HDPI`（`240`像素每英寸）的屏幕密度范围。\n\
  \n此分辨率的宽高比并不完全是`16:9`，因为`1024/16=64`，`64x9=576`，所以`1024x576`代表一个“真正的”`16:9`宽高比。由于`64`在`600`中出现了`9.375`次，这代表一个`16:9.375`的宽高比，或者说从宽屏`16:9`到`16:10`宽高比之间的八分之三处。\n\
  \n复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图 18-12 所示。一旦`Presets`对话框打开（如图 18-16 左侧所示），将预设命名为`Android600x1024p`，并输入描述`Android\
  \ 600x1024 Portrait`。将目标数据速率设置为`1024KBPS`，最大数据速率设置为比它多`150%`，即`1536KBPS`。你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。完成竖屏预设后，返回并创建一个横屏预设。\n\
  \n![A978-1-4302-5786-8_18_Fig16_HTML.jpg](img/A978-1-4302-5786-8_18_Fig16_HTML.jpg)\n\
  \n图 18-16.\n\nAndroid WSVGA 视频编解码器预设，使用`1MBPS`到`1.5MBPS`的数据速率和高质量编解码器\n\n### 使用低高清分辨率\
  \ 1280x720 数字视频素材\n\n大约十多年前，第一个进入数字领域的高清分辨率是“准高清”，即`1280x720`。这个分辨率有足够的像素（将近一百万）来提供清晰的视频内容，但又不会过多地拖慢处理器或数据传输带宽。它也是一个真正的`16:9`宽高比，因为`1280/16=80x9=720`。\n\
  \n使用此分辨率的设备包括`Phablets`（手机平板），如三星`Galaxy Note II`，它有一个 5.5 英寸的屏幕，使其成为`240 DPI`的`HDPI`设备。还有更大的\
  \ 8 英寸平板，其特点是`160 DPI`的`MDPI`屏幕密度。采用此分辨率的 10 英寸大平板则属于`LDPI`或`120 DPI`屏幕密度类别。\n\n\
  复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图 18-12 所示。一旦`Presets`对话框打开（如图 18-17 左侧所示），将预设命名为`Android720x1280p`，并输入描述`Android\
  \ 720x1280 Portrait`。将目标数据速率设置为`1536KBPS`，最大数据速率设置为比它多`133%`，即`2048KBPS`。\n\n![A978-1-4302-5786-8_18_Fig17_HTML.jpg](img/A978-1-4302-5786-8_18_Fig17_HTML.jpg)\n\
  \n图 18-17.\n\nAndroid 准高清视频编解码器预设，使用`1.5MBPS`到`2MBPS`的数据速率和高质量编解码器\n\n你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。\n\
