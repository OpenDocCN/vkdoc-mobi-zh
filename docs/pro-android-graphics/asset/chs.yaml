  ### 向 TOC UI 布局容器添加文本 UI 控件


  现在，你需要将`TextView` UI 元素（在 Android 中称为 TextView 控件）添加到嵌套布局容器结构内部。你可能已经注意到（如果这些警告尚未显示，请使用`CTRL-S`快捷键保存你的`activity_contents`
  XML 文件），你空的布局容器正在 Eclipse 中抛出警告（未使用的布局容器警告）。为了解决这个问题，让我们添加一些基础的文本 UI 元素来创建一个目录屏幕，左侧为章节标题，右侧为页码。`layout_weight`参数将允许你轻松地微调这两个数据列之间的精确间距。


  你需要做的第一件事是创建将用于标记`TextView` UI 对象的`<string>`标签 XML 文本常量。因此，点击 Eclipse 中的`strings.xml`标签，并在文件底部添加八个`<string>`标签。最简单的方法是复制最后一个`<string>`标签八次，然后编辑`name`参数和数据值。


  添加完这八个`<string>`标签并将其`name`参数分别改为`chap_one`到`chap_four`以及`page_one`到`page_four`之后，你可以为它们添加数据值，这些值代表一本《Pro
  Android Graphics》书的前四章，如图 6-17 所示。同时添加一些模拟的页码范围，以便 UI 元素中有数据可以预览 UI 设计。这样，你就可以准备添加`<TextView>`标签了。


  ![A978-1-4302-5786-8_6_Fig17_HTML.jpg](img/A978-1-4302-5786-8_6_Fig17_HTML.jpg)


  **图 6-17.** 为四个章节标题和四个页码`TextView` UI 元素添加`<string>`标签（常量）


  让我们添加第一个`<TextView>`用户界面元素标签，它将作为第一个嵌套`<LinearLayout>`标签内的子标签。完成此标签的编码后，你可以再复制三次，只需编辑复制出的子标签的参数即可，从而节省应用开发时间。


  你知道必须使用`android:layout_width`和`android:layout_height`参数，因此我们先添加这些参数，并将其常量值设置为`wrap_content`，因为你希望这个
  UI 元素容器能够适应其内部包含的文本数据内容。


  接下来，你需要添加一个`android:text`参数来引用之前在`strings.xml`文件中添加的`<string>`标签常量。这可以通过在`<string>`标签的`name`参数前加上`@string/`路径前缀来实现。因此，你的第一个`<TextView>`标签
