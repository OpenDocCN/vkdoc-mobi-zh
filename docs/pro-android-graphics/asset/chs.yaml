  \ 对象本身的 Java 代码了。这部分之前是通过 XML 标记处理的，但现在你将使用 Java 代码来完成。\n\n### 创建一个新的 AnimationDrawable\
  \ 对象并引用其帧\n\n你需要做的第一件事是初始化你的 `frameAnimation` 对象，该对象在 `MainActivity` 类的顶部声明了，但尚未初始化。你将使用\
