  \ 38 个源文件、数据文件和项目文件，它们如图 18-23 所示。该列表的顶部是 `.sqz` Squeeze 项目文件，在这些文件下方，按 X 轴数值顺序排列着十种不同的视频素材文件分辨率，以及它们未压缩的\
