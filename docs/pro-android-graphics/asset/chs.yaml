  \n### 关于在 Android 中使用数字视频的一些注意事项\n\n如果你想在 Android 应用中播放各种视频资产，并使数字视频媒体资产与给定的 Android\
  \ 硬件配置同步，会存在大量复杂的问题。这是因为给定显示屏的物理像素数量可能会有很大差异，刷新率、设备的默认方向以及用户选择握持设备的方向也同样如此。\n\n\
  如果你正在优化数字视频以获得较小的文件大小，刷新率将是最不关心的问题。Android 目前正在通过 API Level 19 进军视频游戏机市场，并将其屏幕缓冲区更新和触摸屏数据更新速度提高到\
  \ 60 FPS 的刷新率。因此，如果你在优化的数字视频资产中使用 10、15、20 甚至 24 FPS 的帧率，硬件屏幕刷新率将不会对你的视频应用开发构成问题。\n\
  \n如果你不像这里那样使用不同的镜头形状（竖屏和横屏）来渲染 3D 视频资产，那么方向也不会是一个大问题，尽管现在已经没有“默认”的设备旋转了，因为一些平板电脑默认使用横屏操作模式，而智能手机通常默认使用竖屏操作模式。因此，这仍将是开发者面临的一个问题和挑战，这就是我在本章以及之前的视频章节中阐述这个主题的原因。\n\
  \n最困难（且在数据占用方面成本最高）的事情是为市面上每一种物理显示分辨率提供特定分辨率的视频资产。我在前一章中建议的是，找到一个数据“最佳点”，并选择一个兼具良好压缩率和分辨率（质量）的资产，以便能够以出色的效果进行放大或缩小。这很可能是\
  \ 1024 或 1280 像素分辨率，正如你在前一章中看到的；如果你的目标是 iTV，则会使用 1920 像素的视频资产，但将其降采样到低分辨率可能会代价高昂。\n\
  \n如果你执意（我这么说真是太政治正确了）要在你的应用（或通过媒体服务器）中提供广泛的数字视频资产，然后轮询用户设备硬件以获取物理像素特性，我打算在结束本章之前介绍\
  \ `DisplayMetrics` 类，这样你就有了通过 `switch` 循环或 `if-then` 循环结构来实现此目的的工具，就像你在本章中所做的那样。\n\
  \n\n\n### Android 的 DisplayMetrics 类：显示屏的规格说明\n\nAndroid 操作系统提供了一个类，让开发者能够获取用户安卓设备上所有与显示相关的信息。这个类就是\
  \ `DisplayMetrics` 实用工具类，它是 `java.lang.Object` 主类的另一个直接子类。\n\nAndroid 的 `DisplayMetrics`\
  \ 类层次结构如下所示：\n\n```\njava.lang.Object\n  > android.util.DisplayMetrics\n```\n\n\
  `DisplayMetrics` 类属于 `android.util` 包，因为它是用于确定硬件环境的 Android 操作系统实用工具。在应用中要使用 `DisplayMetrics`\
  \ 类，其 import 语句应引用 `android.util.DisplayMetrics` 包路径。\n\nAndroid 的 `DisplayMetrics`\
  \ 类是一个公共类，它包含八个屏幕密度常量：`DENSITY_DEFAULT`、`DENSITY_LOW`、`DENSITY_MEDIUM`、`DENSITY_TV`、`DENSITY_HIGH`、`DENSITY_XHIGH`、`DENSITY_XXHIGH`，以及最近新增的\
  \ `DENSITY_XXXHIGH`。\n\n`DENSITY_XXXHIGH` 常量是最近在 Android 4.3（API 级别 18）中添加的，用以适配所有新推出的、具备“超高”4096x2160\
  \ 物理分辨率的“4K”超高清交互电视产品。\n\n这个 `DisplayMetrics` 对象将为开发者提供一个数据结构，其中包含一些字段，用于描述显示硬件的常规信息以及\
  \ Android 操作系统如何缩放字体以适应硬件。这些信息包括物理显示尺寸（以像素为单位）、像素密度，以及 Android 当前为该显示屏使用的字体缩放因子。\n\
  \n要访问 `DisplayMetrics` 对象数据，请像这样初始化该对象：\n\n```java\nDisplayMetrics displayMetricsObject\
  \ = new DisplayMetrics();\ngetWindowManager().getDefaultDisplay().getMetrics(displayMetricsObject);\n\
  ```\n\n上述 Java 代码构造返回的 `DisplayMetrics` 对象中的数据字段将包含七个关键信息值，包括表示显示屏逻辑屏幕密度的 density\
  \ 浮点值，以及提供显示屏每英寸点数的 `densityDPI` 整数值。此外还有 `heightPixels` 和 `widthPixels` 整数，它们提供当前（主）显示屏的物理分辨率。还有\
  \ `xdpi` 和 `ydpi` 整数，为开发者提供 X 和 Y 两个维度上每英寸的物理像素数。最后，`scaledDensity` 浮点值表示 Android\
  \ 操作系统当前对字体应用的缩放比例。在 Android 图形设计师的图形处理流水线 Java 代码中，所有这些值都会在某个时候用到。\n\n### 总结\n\n\
