  \ WebM 编解码器和预设，而非 MPEG-4；或者，如果我在媒体服务器上外部托管数据，可能会设法同时提供两种格式。\n\n我们将在下一章中研究使用远程 Web\
  \ 服务器流式传输视频数据，因此本章和第 2 章将为那一章（关于更高级的视频流式传输）打下极好的基础。\n\n![A978-1-4302-5786-8_18_Fig22_HTML.jpg](img/A978-1-4302-5786-8_18_Fig22_HTML.jpg)\n\
