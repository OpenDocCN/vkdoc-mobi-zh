  \ 800。\n\n![A978-1-4302-5786-8_2_Fig12_HTML.jpg](img/A978-1-4302-5786-8_2_Fig12_HTML.jpg)\n\
  \n图 2-12. `Terragen 3` 渲染面板和渲染设置区域，以及右侧的渲染视图窗口\n\n保持其他顶部面板设置不变，在面板底部，点击右侧的 `Sequence/Output`\
  \ 选项卡，并设置一个 `Output Image` 文件名。我的文件放在 `Terragen3` 文件夹层级下的 `Anim` 文件夹中（`Terragen3/Project_Files/ProAndroidGraphics/Anim`\
  \ 文件夹）。\n\n我将文件命名为 `Anim\\480temp.%04d.bmp`，这是一种文件名格式，会生成编号文件，格式如 `480temp.0000.bmp`\
  \ 等，你将在后续的截图中看到（如果你急切地想看，可以参考图 2-16）。`Terragen3` 是一个专业的 3D 程序，具有复杂的功能。\n\n因此，文件名中的\
  \ `%04d` 部分表示你希望文件名中有四位小数，或者在此例中，第一个文件名为四个零。设置完成后，你可以将 `Sequence first` 和 `Sequence\
  \ last` 数据字段分别设置为 1 和 400。确保所有其他字段为空，并且 `Sequence step` 数据字段设置为值 1。\n\n如果 `Extra\
  \ output images` 复选框未被勾选，那么 `Create subfolders` 复选框可以勾选或不勾选，因为除非 `Extra output images`\
  \ 复选框被激活，否则它不会被使用，所以你可以保持其勾选状态。\n\n如果你感到好奇，额外输出图像用于生成高级辅助图像，这些图像用于 `Terragen 3`\
  \ 输出的高级合成。这包括诸如 Z-buffer 或 G-buffer 之类的内容，它们定义了 `Terragen 3` 序列中每一帧的合成层或对象顺序（Z-buffer）和景深（G-buffer；模糊）。我告诉过你，它很复杂！\n\
  \n一切设置完成后，点击 `Render Sequence` 按钮（我在图 2-12 中将其用蓝色高亮），然后观看你的工作站进行渲染！\n\n### 创建未压缩视频：使用\
  \ VirtualDub 软件\n\n当你的 400 帧 3D 动画渲染完成后（根据你拥有多少个处理器核心以及每个核心的运行速度，这需要 8 小时到 8 天不等；我的系统有\
  \ 8 个核心，每个核心以 3.4GHz 运行，我的渲染时间大约为 12 小时），你就可以下载并安装 `VirtualDub 1.9` 开源软件了，你将使用该软件将这\
  \ 400 个文件全部安装到未压缩的 AVI 视频文件格式中。\n\n搜索“VirtualDub Video”或访问 [`VirtualDub.com`](http://virtualdub.com)\
  \ 网站，下载 32 位版本，或者，如果你像我一样拥有基于 64 位 AMD 处理器的工作站，并安装了 64 位操作系统（我正在使用 64 位版本的 Windows\
  \ 8.1），那么下载 64 位 AMD 版本，如图 2-14 所示，这正是我当前运行的版本。\n\n下载完成后，通过将软件解压到你的硬盘驱动器上来安装它，最好解压到\
  \ `/Program_Files` 文件夹下的 `VirtualDub` 子文件夹中，然后在任务栏上为其创建一个快速启动图标。\n\n启动软件后，你将看到三个关键的对话框。第一个是\
  \ GNU 开源许可协议，点击 `OK` 按钮接受。下一个对话框让你选择是否查看帮助文件，在使用任何高级图形软件包之前，这总是一个好主意。\n\n图 2-13\
  \ 显示了三个你应该熟悉的对话框，然后再点击 `Start VirtualDub` 按钮启动软件。\n\n![A978-1-4302-5786-8_2_Fig13_HTML.jpg](img/A978-1-4302-5786-8_2_Fig13_HTML.jpg)\n\
  \n图 2-13. `VirtualDub 1.9.11` GNU 通用公共许可证、开始之前，以及 VirtualDub 帮助对话框\n\n点击 `Start\
  \ VirtualDub` 按钮启动软件后，你会看到一个宽敞的空窗口，顶部有九个菜单。这是加载任何视频文件之前的 `VirtualDub` 界面；接下来，让我们通过\
  \ `Video` 菜单及其几个子菜单选项来配置你的环境。\n\n我们将配置视频压缩、帧率、颜色深度和范围。如图 2-14 所示，我在截图中包含了其中一个菜单，以避免在巨大的空屏幕上浪费空间。`Video\
  \ ➤ Compression` 菜单将打开一个 `Select video compression` 对话框；保持默认的 `Uncompressed RGB/YCbCr`\
  \ 设置，然后点击 `OK`。\n\n![A978-1-4302-5786-8_2_Fig14_HTML.jpg](img/A978-1-4302-5786-8_2_Fig14_HTML.jpg)\n\
  \n图 2-14. 启动时的 `VirtualDub`（空项目）显示 `Video ➤ Compression` 菜单序列和对话框\n\n接下来，设置 `Frame\
  \ Rate`、`Color Depth` 和 `Select Range` 菜单选项，这些选项也在图 2-14 中显示，其对话框如图 2-15 所示。在 `Frame\
  \ Rate` 对话框中接受默认的 `10FPS`，在 `Color Depth` 对话框的两侧都选择 `24-bit RGB (888)` 设置，并在 `Select\
  \ Range` 对话框中保持自动检测的 0 到 400 帧范围。你可以保持音频选项勾选，但你不使用音频。\n\n![A978-1-4302-5786-8_2_Fig15_HTML.jpg](img/A978-1-4302-5786-8_2_Fig15_HTML.jpg)\n\
  \n图 2-15. `VirtualDub` 视频帧率控制、视频颜色深度、选择要处理的视频范围对话框\n\n\n\n使用 `File ➤ Open video\
  \ file` 菜单序列，如图 2-18 所示，找到 `Anim` 文件夹中编号的 `BMP Terragen 3 3D` 动画文件，如图 2-16 所示。选择编号文件系列中的第一个文件名，即\
  \ `480temp.0001` 到 `480temp.0400` 的 `BMP` 文件。您可以在图中看到这些文件（以及 `360` 像素肖像分辨率数据文件，您将在第\
  \ 18 章（高级数字视频优化章节）中对这些文件进行优化）。\n\n![A978-1-4302-5786-8_2_Fig16_HTML.jpg](img/A978-1-4302-5786-8_2_Fig16_HTML.jpg)\n\
  \n**图 2-16.** 使用 VirtualDub 1.9 的 `Open video file` 对话框定位 Terragen `Anim` 文件夹中的编号\
  \ `.BMP` 文件\n\n单击 `Open` 按钮后，图像序列将被加载到 VirtualDub 软件中，第一帧将显示在软件的主窗口中，如图 2-17 所示。\n\
  \nVirtualDub 加载数字图像帧序列后，就可以使用其功能将这些静态图像帧加载到 `AVI` 容器中。这是一种支持数字视频 `FFU`（全帧未压缩）版本的格式。\n\
  \n`AVI` 代表音频视频交错（Audio-Video Interleaved），这是一种最初由 Microsoft Windows 操作系统及其流行的 Windows\
  \ Media Player 推广的视频文件格式。\n\n在压缩过程中使用全帧未压缩数字视频的原因很简单：您希望在一个算法过程中完成所有压缩，以避免压缩先前压缩过程中产生的伪影，这些伪影会增加最终的数据占用空间。\n\
  \n使用 VirtualDub 执行此中间步骤的原因是 Sorenson Squeeze Pro 9 不支持加载图像序列数据。出于显而易见的原因，我已强烈建议他们在未来版本的软件中添加对此功能的支持。\n\
  \nEditShare Lightworks 11.1 确实支持导入编号图像文件的功能，因此一旦他们添加对 Android 专用（或 HTML5 专用）编解码器的支持，您就可以使用\
  \ Lightworks 11 进行数字视频优化工作流程，直接从 Terragen 3.0 导入到 Lightworks 11.1。现在 VirtualDub\
  \ 已加载 Terragen 数据，您可以准备创建 `AVI` 文件了。\n\n![A978-1-4302-5786-8_2_Fig17_HTML.jpg](img/A978-1-4302-5786-8_2_Fig17_HTML.jpg)\n\
  \n**图 2-17.** 在 VirtualDub 1.9.11 中打开的 Terragen 3.0 3D 世界飞越渲染图，分辨率为 `480x800`\n\n\
  要以 `AVI` 格式保存，请按下键盘上的 `F7` 功能键，或单击 VirtualDub 左上角的 `File` 菜单，然后选择 `Save as AVI`\
  \ 选项。如图 2-18 所示，VirtualDub 会显示功能键快捷键，这些快捷键能帮助您更高效地使用该软件。\n\n![A978-1-4302-5786-8_2_Fig18_HTML.jpg](img/A978-1-4302-5786-8_2_Fig18_HTML.jpg)\n\
  \n**图 2-18.** 使用 VirtualDub 的 `File ➤ Save as AVI` 菜单序列将 Terragen 3 飞越动画保存为视频格式\n\
  \n调用 `Save as AVI` 对话框（如图 2-19 所示）后，您需要在与 `Anim` 文件夹相同的层级创建一个名为 `AVIs` 的文件夹，以便将\
  \ `AVI` 文件与编号的 `BMP` 文件分开存放，这主要是出于组织管理的目的。\n\n我使用了 `Terragen3/Project_Files/ProAndroidGraphics/AVIs`\
  \ 文件夹结构，如图 2-19 左侧所示。选择此文件夹或您自己创建的文件夹，然后输入您想要用于 `AVI` 文件的文件名（我使用了 `PAG480x800`），VirtualDub\
  \ 软件将自动添加 `.avi` 文件扩展名。\n\n完成所有设置后，单击 `Save` 按钮，然后准备观看视频帧在屏幕上飞过（如果您的电脑是八核处理器）。\n\
  \n![A978-1-4302-5786-8_2_Fig19_HTML.jpg](img/A978-1-4302-5786-8_2_Fig19_HTML.jpg)\n\
  \n**图 2-19.** VirtualDub `Save AVI 2.0 File` 对话框和 `Terragen3/Project_Files/ProAndroidGraphics/AVIs`\
  \ 路径\n\n一旦您启动将静态图像帧加载到全帧未压缩的 `AVI` 容器中的过程（以便与 Sorenson Squeeze Pro 9 软件兼容），您将在软件主屏幕上看到帧被加载到\
  \ `AVI` 中。\n\n同时会出现一个进度对话框，其中包含一些统计信息。该对话框会显示当前正在处理的数字视频帧，以及到目前为止已处理的视频数据量；在图 2-20\
  \ 中，这是第 `136` 帧和 `149` MB 数据。\n\n此对话框还会预测最终渲染的 `AVI` 文件大小；在这种情况下，它估计为 `329.59` 兆字节，非常接近。实际结果（您将在下一节使用\
  \ Sorenson Squeeze 优化视频时看到）是 `439.47070313` 或 `450,018,000` 字节，除以 `1024`，即可得出兆字节数。\n\
  \n该对话框还显示视频渲染速率，这基本上是系统处理器速度的指标。我的系统接近 `15 FPS`，所以看起来就像摄像机在 Terragen 3 创建的 3D 世界中飞越。\n\
  \n最后，对于系统较慢的用户，还提供了经过时间和估计时间值，这些用户在此期间处理视频数据时，甚至可以去享用一顿美餐。\n\n![A978-1-4302-5786-8_2_Fig20_HTML.jpg](img/A978-1-4302-5786-8_2_Fig20_HTML.jpg)\n\
  \n**图 2-20.** 在 VirtualDub 中渲染 Terragen 3 项目的 `300` 帧，显示渲染状态对话框和第 `136` 帧\n\n现在，您已将数据转换成\
  \ Squeeze Pro 可以处理的 `AVI` 数字视频文件格式，可以进入专业的数字视频数据优化软件包，真正开始数据占用空间的优化工作了。\n\n如果您在\
  \ Android 应用程序中使用受版权保护的数字视频资源，这是一个关键步骤，因为这将是整个应用程序中 `.APK`（Android 包）数据占用空间（文件大小）的主要影响因素。\n\
  \n\n\n### 压缩视频资源：使用 Sorenson Squeeze\n\n启动 `Sorenson Squeeze 9 Pro` 软件包时，您将看到一个版权启动画面，如图\
  \ 2-21 所示，并附有进度文字，提示您当前处于软件加载的哪个阶段，例如“正在初始化 UI”。\n\n![A978-1-4302-5786-8_2_Fig21_HTML.jpg](img/A978-1-4302-5786-8_2_Fig21_HTML.jpg)\n\
  \n图 2-21. Squeeze Pro 9 启动版权画面\n\n您接下来会看到的画面（图 2-22）是“欢迎使用 Squeeze”对话框，其中包含视频教程和\
  \ Squeeze 资源。与我处理 `VirtualDub` 时一样，我建议您利用此类资源，以便在实际工作中运用该软件包之前先熟悉它。\n\n![A978-1-4302-5786-8_2_Fig22_HTML.jpg](img/A978-1-4302-5786-8_2_Fig22_HTML.jpg)\n\
