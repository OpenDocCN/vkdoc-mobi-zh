  \ 和 `Context` 类在上面进行绘制！\n\n### Android 的 onDraw() 方法：在屏幕上绘图\n\n在你的自定义 `SketchPadView`\
  \ 子类（你将在本章稍后创建）上进行绘图中，最核心或最关键的函数是重写 `View` 子类的 `onDraw()` 方法，并在你的 `SketchPadView.java`\
  \ 类中实现你自己的版本。\n\n这个 `onDraw()` 方法包含一个参数，你可以猜到，它是一个 `Canvas` 对象，通常命名为 `canvas`。你的\
  \ `View` 子类可以使用这个 `Canvas` 对象，让你的用户在 `View` 表面上进行绘制。\n\n正如你将在下一节中看到的，`Canvas` 类定义了大量\
  \ `.draw()` 方法，这些方法可用于绘制颜色、文本、形状、顶点、位图、路径、点或任何其他类型的 `Drawable` 图形对象。\n\n你可以在你的 `onDraw()`\
  \ 实现中使用这些方法中的任何一个或全部，来创建你自己的自定义绘图应用程序，以及你能想到的任何其他东西，比如说交互式涂色书。\n\n正如你在这本书中已经学到的，在调用你的\
  \ `onDraw()` 方法之前，你必须首先声明并实例化你的 `Paint` 对象。\n\n正如你在本书后半部分所见，Android 的 `android.graphics`\
  \ 包和图形设计框架将绘制和显示功能划分为两个独立的功能区域：由你的 `Canvas` 对象定义的绘制目的地，以及由你的 `Paint` 对象定义的要在 `Canvas`\
  \ 对象上绘制的内容。在本章接近尾声时，你将看到为什么 Android 这样做是明智之举——因为你只需要几行 `Paint` 和 `Shader` 代码，就能为你的\
  \ `SketchPad 工具`添加图像克隆功能。\n\n在你开始编写你的 `SketchPad Activity` 子类和 `SketchPadView` `View`\
  \ 子类，以实现用户在显示器上的自定义绘制之前，我需要先为你概述 `Canvas` 和 `Paint` 这两个类，以便你掌握这些基础信息。如果你打算精通 Android\
  \ 操作系统中的图形处理，你会想要熟悉这两个核心类；请访问 developer.android.com 网站获取更多信息。\n\n\n\n### Android\
  \ Canvas 类：数字工匠的画布\n\nAndroid 的 `Canvas` 类是 `java.lang.Object` 类的直接子类。至此您已了解，这表明\
  \ `Canvas` 类被专门设计用于在 Android 操作系统中提供图形应用所需的 `canvas` 对象（其名称源自艺术家用画笔挥毫作画的画布，在 Android\
  \ 应用开发中则对应图形操作）。\n\n因此，Android Canvas 类的层级结构如下：\n\n`java.lang.Object`\n\n`> android.graphics.Canvas`\n\
  \nAndroid 的 `Canvas` 类属于 `android.graphics` 包。因此，在您的应用中使用 `Canvas` 类时，需要引用 `android.graphics.Canvas`\
  \ 包的 `import` 语句，正如您在本节前面所学。\n\n该 `Canvas` 类是一个 `public` 类，并拥有两个处理特殊高级画布特性的嵌套子类。它们是\
  \ `Canvas.EdgeType`，允许为 `Canvas` 对象指定一种特殊类型的边缘；以及 `Canvas.VertexMode`，允许 `Canvas`\
  \ 使用顶点模式。`Vertices` 通常在使用 `OpenGL ES 3.0` 的 `3D` 操作中使用。\n\n`Canvas` 类包含了所有 Android\
  \ 操作系统中的 `.draw()` 相关方法调用。要在 `Canvas` 对象上绘制图形，您至少需要为绘制操作实现四个基本组件。这些组件包括：一个用于包含图像像素的\
  \ `Bitmap` 对象；一个将执行 `.draw()` 方法调用的 `Canvas` 对象，以便按照您的图形设计目标修改 `Bitmap` 对象；一个用作绘图基元的对象，例如\
  \ `RectF` 对象或 `Bitmap` 对象（正如您在本节中已使用的），或者 `Path` 对象或 `Text` 对象；最后，一个用于指定颜色、图像和样式的\
  \ `Paint` 对象，应用于您正在执行的绘制操作。\n\n一些主流的 `.draw()` 相关方法调用包括 `.drawCircle()` 方法（您将使用它让用户以\
  \ 5 像素（初始）的笔触厚度在屏幕上绘制），以及您在第十六章中使用过的 `.drawRoundRect()` 方法，您在第十一章中使用过的 `.drawBitmap()`\
  \ 方法，以及其他有用的方法，例如 `.drawPoints()`、`.drawColor()`、`.drawLines()`、`.drawPath()`、`.drawTextOnPath()`、`.drawPaint()`、`.drawText()`、`.drawVertices()`、`.drawArc()`、`.drawRGB()`\
  \ 等等。\n\n在这个 `Canvas` 类中有二十多个 `.draw()` 相关的方法调用，您可以在您的 `.onDraw()` 方法实例中实现它们，例如，在您的\
  \ `SketchPadView` 视图子类中，在本章的后面部分，如果您想试验它们的话。这是观察它们作用的绝佳方式！试验将使您能够观察到每个方法调用做了什么以及如何实现。通过这种方式，您可以学习更多关于\
  \ Android 图形的内容，并同时获得 Java 编码的经验。\n\n### Android Paint 类：数字工匠的画笔\n\nAndroid 的 `Paint`\
  \ 类是 `java.lang.Object` 类的直接子类，就像 `Canvas` 类一样。这意味着 `Paint` 类是专门为在 Android 操作系统中使用而设计的，目的是定义用于您\
  \ Pro Android 图形应用中 `Canvas` 对象的 `paint` 对象。\n\nAndroid Paint 类的层级结构如下：\n\n`java.lang.Object`\n\
  \n`> android.graphics.Paint`\n\nAndroid 的 `Paint` 类属于 `android.graphics` 包。因此，在您的应用中使用\
  \ `Paint` 类时，需要引用 `android.graphics.Paint` 包的 `import` 语句，正如您在本节前面所见。\n\n`Paint`\
  \ 类是一个 `public` 类，它包含描述如何绘制几何图形、文本或位图的 `style` 和 `color` 信息，作用于 `Canvas` 对象。\n\n\
  `Paint` 类拥有六个嵌套子类。当开发者需要为主要 `Paint` 对象配置定义（进一步）指定特殊的 `Paint` 对象特征时，会使用这些嵌套子类。\n\n\
  `Paint.Align` 是一个 `Enum` 类，因此它使用常量来指定 `.drawText()` 方法调用如何将 `Text` 对象相对于您正在绘制的 `Canvas`（以及最终的\
  \ `View`）对象中的 X 和 Y 坐标进行对齐。`Paint.Align` 的默认设置为 `LEFT` 常量，另外两个常量是 `RIGHT` 或 `CENTER`。\n\
  \n`Paint.Cap` 嵌套类也是一个 `Enum` 类类型，`Cap` 常量允许开发者指定线条（描边）和路径（2D 曲线）起点和终点的视觉效果（外观）。默认值是\
  \ `BUTT` 常量，另外两个常量是 `ROUND` 和 `SQUARE`。如果您想知道 `BUTT` 的含义，它表示与连接的线条或曲线平齐对接，提供尽可能无缝的连接。“悬空的首尾”则使用\
  \ `ROUND` 和 `SQUARE` 常量。\n\n`Paint.FontMetrics` 类描述了各种“字体度量”，供各位字体设计师参考。这些度量用于描述字体属性。没有默认值，五个常量是\
  \ `ascent`、`bottom`、`descent`、`leading` 和 `top`。根据开发者文档，这些常量不大写，不过如果您愿意，它们很可能都可以大写使用。\n\
  \n与之密切相关的 `Paint.FontMetricsInt` 类为 `Paint.FontMetrics` 提供了一个“便捷”方法，用于那些需要通过流行的\
  \ `Integer` 数据类型提供其 `FontMetrics` 数据值的精英方法调用。\n\n`Paint.Join` 是一个 `Enum` 类，允许开发者精确指定其线段和曲线段在沿路径描边时如何连接。默认常量是\
  \ `MITER`，它在曲线或直线（或两者）的相交处使用锐角连接它们的外边缘。`BEVEL` 常量将在连接处的外边缘提供一条直线相交线，而 `ROUND` 常量将使用圆弧来连接边缘。\n\
  \n`Paint.Style` 是一个 `Enum` 类，允许开发者指定绘制到 `Canvas` 上的 `Shape` 基元是填充、描边，还是两者兼具，通过使用预定义的常量\
  \ `FILL`、`STROKE` 或 `FILL_AND_STROKE`。默认的 `Paint.Style` 常量设置为 `FILL`。\n\n`Paint`\
  \ 类还定义了十一个常量，允许您配置 `Paint` 对象本身。它们都以开关或标志的形式存在，您可以根据希望应用的图形渲染管线消耗多少图形处理能力（开销）来将其打开（`true`）或关闭（`false`）！其中大部分与字体支持或质量相关。\n\
  \n通过使用这些常量，以 `true` 布尔值启用，或以 `false` 布尔值禁用以下每个图形处理特性，即可开启这些功能（它们默认是关闭的）。\n\n\n\n\
  `ANTI_ALIAS_FLAG`常量提供了一个标志，可用于启用`anti-aliasing`（抗锯齿）。该功能默认处于关闭（禁用）状态，因为它是一种会大量消耗系统资源（内存和处理器周期）的算法。\n\
  \n`DEV_KERN_TEXT_FLAG`常量提供了一个标志，可用于启用字体的设备端`kerning`（字距调整）（针对`Text`对象）。字距调整是指给定字体定义中单个字符之间的间距。\n\
  \n`DITHER_FLAG`常量提供了一个用于启用`dithering`（抖动）的标志。抖动默认也是关闭的，因为它同样需要消耗处理能力和内存资源来实现；它是一种算法，可以在设备运行于低于\
  \ 24 位（`truecolor`，真彩色）显示色彩环境时（例如`indexed color`（索引色，8 位）的 256 色空间，或`highcolor`（高彩色，15\
  \ 位或 16 位）色彩空间），提供模拟更多颜色的能力。\n\n`FAKE_BOLD_TEXT_FLAG`提供一个标志，允许开发者启用`fake-bold text\
  \ algorithm`（伪粗体文本算法），该功能同样默认关闭，因为它会消耗系统资源——优秀的算法通常如此。当`Text`对象引用的字体在其当前安装于 Android\
  \ OS 的字体定义文件中不包含粗体组件或粗体字体定义时，此算法可以为`Text`对象（字体）提供加粗效果。\n\n`FILTER_BITMAP_FLAG`允许开发者设置一个标志以启用`bitmap\
  \ filtering`（位图过滤），该功能默认关闭。该常量允许开发者开启`bilinear interpolation`（双线性插值），也称为`bilinear\
  \ filtering`（双线性过滤），其算法质量仅次于一流的`bicubic interpolation`（双三次插值，见于 Photoshop）或`cubic\
  \ interpolation`（三次插值，见于 GIMP）。该功能默认关闭是因为它非常消耗处理器资源，但如果质量是您的目标，它会为您的应用程序提供更好的`scaling`（缩放）效果。我本应在\
  \ SketchPad 应用中包含此标志，但该应用并不缩放图像！\n\n`LINEAR_TEXT_FLAG`允许开发者设置一个标志来启用“`linear-text`”（线性文本）。此常量会设置一个标志，该标志将`disable\
  \ system caching`（禁用系统缓存）`Text`对象（具体来说是它们的字体定义）。这允许字体绕过系统字体缓存，直接显示在您的屏幕上。\n\n`STRIKE_THRU_TEXT_FLAG`允许开发者设置标志，以启用名为“strike-thru\
  \ text”（删除线文本）的功能。删除线会在`Text`对象包含的内容上绘制水平线。这是另一种“事后算法”，它以算法方式提供了缺失的字体特性定义增强，但可能会拖慢应用程序。\n\
  \n`SUBPIXEL_TEXT_FLAG`允许开发者设置标志，以启用`subpixel-text`（次像素文本）的渲染，这本质上相当于`text anti-aliasing`（文本抗锯齿），能让文本在`low-DPI`（低\
  \ DPI）硬件设备上看起来更清晰。该功能也默认关闭，因为它相当消耗处理器资源。如今市场上有众多高 DPI 显示屏，它们具有超精细的点距，因此通常无需使用此功能，尤其是在使用无衬线字体族时。\n\
  \n`UNDERLINE_TEXT_FLAG`允许开发者设置标志，以启用`Text`对象的`underlined`（下划线）效果。这与`BOLD`和`STRIKE_THRU`常量类似，因为它为那些不包含下划线字体组件的字体提供了支持。再次强调，别问我为什么没有`ITALIC_TEXT_FLAG`，我的猜测是，用于斜体文本的算法可能太消耗资源，或者在不同字体上尚未完善。\n\
  \n最后两个常量是`HINTING_OFF`和`HINTING_ON`，它们提供了次像素文本微调（`subpixel text hinting`）选项常量，供您在使用`.setHinting()`方法调用时使用。字体微调（`Font\
  \ hinting`）是一项高级功能，通常与次像素文本渲染和抗锯齿结合使用。字体微调也称为字体指令（`font instructing`），旨在在较低屏幕分辨率下提供更高质量的视觉效果。在大多数具有高分辨率和同时拥有高密度（精细点距）的\
  \ Android 设备上，这个常量有些多余。别问我为什么这个微调标志采用了`_OFF`和`_ON`后缀，而其他常量没有，我无法回答您！\n\n现在，我们已经花了数页篇幅介绍`.onDraw()`以及`Paint`和`Canvas`类，是时候亲自上手进行一些\
  \ Java 编码了。既然您要为您的`GraphicsDesign`应用程序创建一个`SketchPad`工具，您首先需要修改几个应用程序的 XML 和 Java\
  \ 文件，并创建几个新的 Java 类。\n\n您将需要在`MainActivity.java`主屏幕上添加一个新的菜单项（`Menu Item`）；创建一个新的`SketchPad`\
  \ Activity 子类和`SketchPadView` View 子类；使用`<activity>`标签将新的`SketchPad` Activity 类添加到您的`AndroidManifest.xml`文件中；在您的`strings.xml`中添加一个字符串常量（`String\
  \ constant`）XML 定义，并在您的`main.xml`菜单 XML 定义文件中添加一个`MenuItem` `<item>` 标签；在您的`onOptionsItemSelected()`方法中添加一个\
  \ case 语句（`case statement`）和一个新的`Intent`对象；最后从头编写您的`SketchPad`和`SketchPadView`类，或者至少从`New\
  \ ➤ Class`对话框为您提供的引导代码开始编写。所以，在接下来的几十页中，您有大量的工作要做！\n\n\n\n### 为图形设计项目设置画板\n\n你要对\
