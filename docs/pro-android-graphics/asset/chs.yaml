  \ Java 类。首要目标是生成无错误的代码，次要目标是编写能实际执行某些操作的代码，第三级目标是编写能跨所有设备运行的代码，最终目标是实现销售。\n\n让我们看一下你无错误的`SketchPadView`类及其`OnTouch()`方法，该方法接收`View`对象（即它自身）和`MotionEvent`对象作为参数，并返回`false`值。Eclipse\
