  \ 类\n\n摘要\n\n在第十三章中，我们将仔细探讨图像过渡在 Android 和数字图像动画中所扮演的角色，以及如何在 Android 中实现图像过渡。过渡允许开发者增强其核心数字图像动画能力。\n\
  \n在第十三章中，我们将仔细探讨图像过渡在 Android 和数字图像动画中所扮演的角色，以及如何在 Android 中实现图像过渡。过渡允许开发者增强其核心数字图像动画能力。\n\
  \n在 Android 应用中，过渡的创建和管理是通过使用 `Drawable` 父类的间接子类之一来完成的。`TransitionDrawable` 子类专门管理图像过渡，并且它是\
  \ `LayerDrawable` 类的直接子类。由于你在上一章学习了 `LayerDrawable`，这一章是很好的后续内容。\n\n`TransitionDrawable`\
  \ 对象允许在 Android 中使用前两章介绍的图层和混合功能执行更高级的数字图像动画。因此，`TransitionDrawable` 对象允许开发者以最简单的方式创建图像动画：通过在两个图像图层之间进行混合或透明度变化来实现过渡。\n\
  \nAndroid 中有更高级的动画形式，例如位图或帧动画（有时称为光栅动画），以及矢量或过程动画（有时称为补间动画）。你将在接下来的两章中详细了解这些内容，因为\
  \ Android 中每种独特的动画形式都需要单独的章节来讲解。\n\n我们将从图像过渡的基础知识开始，然后具体学习 `TransitionDrawable`\
  \ 类；之后，你将使用 XML 标记在你的 `GraphicsDesign` 应用中定义过渡，并使用 Java 代码来运行它，从而实现你自己的 `TransitionDrawable`\
  \ 对象。\n\n\n\n### 过渡效果：通过图像混合创建运动幻觉\n\n让我们先概述一下数字图像过渡效果是什么。在 Android 中，它们在技术上被称为过渡\
  \ Drawable，这些 `LayerDrawable` 对象是使用 `TransitionDrawable` 类构建和维护的。\n\n我们还将探讨在 Android\
  \ 应用程序中，图像过渡效果如何发挥最大优势，以及如何使用它们为你的 Android 应用增添一些令人惊叹的因素和图形设计的专业感。\n\n图像过渡效果可以通过使用你在过去几章中一直在实现的数字图像合成管线来实现，因此本章应该很容易融入到你专业的\
  \ Android 图形设计工作流程中。\n\n使数字图像资源过渡编程与众不同的一个特点是：在图像合成中通常是静态的混合和不透明度变量，会在一个处理循环（在 Java\
  \ 代码中）中运行，这涉及到图像过渡处理管线。\n\n通过这种方式使图像合成管线动态化，可以让你的图像资源看起来像动画一样。这可能就是 Google Android\
  \ 开发者创建 `TransitionDrawable` 类的原因，这样我们就不必自己编写这些代码，并且可以提供一种流行的新媒体特性。\n\n图像过渡效果仅使用两个图像资源就能创造出这种动画外观，因此从易用性和数据占用空间优化的角度来看，它都非常出色。\n\
  \n由于图像过渡效果可以通过相当简单的设置，为你的应用程序提供动画特性集和动态外观，我将在我们深入探讨 Android 中的帧动画和程序化动画（这将在接下来的两章中进行）之前，先介绍这个主题，敬请期待。\n\
  \nAndroid 中的图像过渡效果使用 `LayerDrawable` 对象，因为 Android 中这些类型的 Drawable 具有实现这种动画合成特殊效果所需的特性。这些特性包括不透明度或\
  \ Alpha 混合，以及位置参数（`top`、`bottom`、`left` 或 `right`），还有分配 ID 和引用 drawable 资源的能力。\n\
  \nAndroid 中的图像过渡效果可以用于许多不同的目的，以及图形设计和用户界面设计工作流程的许多不同领域，因此在本章中掌握它们非常重要。\n\n`TransitionDrawable`\
  \ 对象本质上是 Drawable 资源，因此它们可以用于 `ImageView` 和 `ImageButton` UI 元素的源参数，或者用于 `ImageView`\
  \ 类（或子类）对象的背景板（参数）。它们还可以通过 `android:background` 参数用于为你的布局容器添加特殊效果，这可以快速、高效、有效地为你的用户界面屏幕设计增添令人惊叹的因素。\n\
  \n### Android 的 TransitionDrawable 类：过渡引擎\n\nAndroid 的 `TransitionDrawable` 类是 `Drawable`\
  \ 类的间接子类，而 `Drawable` 类又是 `java.lang.Object` 主类的直接子类。`TransitionDrawable` 是 Android\
  \ `LayerDrawable` 类的直接子类，而 `LayerDrawable` 又是 Android `Drawable` 类的直接子类。\n\n作为 `LayerDrawable`\
  \ 的子类，`TransitionDrawable` 类因此实现了 `LayerDrawable` 类的所有特性，这些特性你在前一章已经了解过。它还实现了实现数字图像过渡所必需的额外不透明度动画特性；正如所料，这些特性是\
  \ `TransitionDrawable` 类特有的。\n\nAndroid `TransitionDrawable` 类的层次结构如下：\n\n```\n\
  java.lang.Object\n  > android.graphics.drawable.Drawable\n    > android.graphics.drawable.LayerDrawable\n\
  \      > android.graphics.drawable.TransitionDrawable\n```\n\n`TransitionDrawable`\
  \ 类也是 `android.graphics.drawable` 包的一部分。因此，它的导入语句引用了一个 `android.graphics.drawable.TransitionDrawable`\
  \ 包的导入路径。在本章后面，当你编写 Java 应用程序代码来实现一个 `TransitionDrawable` 对象，用于你的数字图像动画以实现你的专业 Android\
  \ 图形编程目标时，你会看到一个示例。\n\n`TransitionDrawable` 对象是 Android 中一种 Drawable 对象，它能够创建和管理一个包含两个\
  \ Drawable 对象的数组，目的是在这两个 Drawable 对象之间创建图像过渡效果。\n\n`TransitionDrawable` 类被设计为 Android\
  \ `LayerDrawable` 类的扩展，旨在实现图像 drawable 的第一层和第二层之间的交叉淡入淡出（或过渡）。这就是它成为 `LayerDrawable`\
  \ 子类的原因：因为它将使用 `LayerDrawable` 类的代码基础设施作为基础，然后通过额外的 Java 处理（Java 循环结构）来运行 `LayerDrawable`\
  \ 的属性（参数）值，从而添加动画的方面。\n\n`TransitionDrawable` 对象可以在你的 XML 文件中使用 `<transition>` 父标签\
  \ XML 元素进行静态定义。过渡中的每个层 drawable 都使用嵌套的 `<item>` 子标签来定义。我们将在本章的下一节中详细讨论这一点，以便你了解如何操作。\n\
  \n要在你的 Java 代码中启动图像过渡，你可以使用对 `TransitionDrawable` 对象 XML 定义的引用来调用 `.startTransition()`\
  \ 方法，你可能已经猜到，该 XML 定义位于你的 drawable 文件夹中。\n\n要重置 `ImageView` 以显示源层而不是目标（最终）层，你可以在确认用户不再查看屏幕后调用\
  \ `.resetTransition()` 方法，以防止图像闪烁。\n\n\n\n### `<transition>` 父标签：在 XML 中设置过渡动画\n\
