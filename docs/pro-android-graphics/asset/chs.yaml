  \ XXHDPI 启动器图标资源后\n\n导出新的 144 像素 XXHDPI 启动器图标资源后，您可以返回 288 像素的源文件，对另外四个启动器图标资源进行进一步的重采样。最简便的方法是使用`编辑`菜单中的`撤销缩放图像`选项，如图\
