  \ `Apply` 按钮，以将其应用到您刚刚导入的源 AVI 文件。\n\n现在，您可以点击 `SqueezeIt!` 按钮，将编解码器应用到 AVI 文件，从而创建\
  \ WebM 文件。您会注意到，生成的文件大小与 MPEG4 文件非常接近，约为 3.8 兆字节。\n\n接下来，您只需修改应用程序中的代码，通过一个修改后的\
  \ URL 来引用新文件，如图 19-18 以及下面用于设置 `Uri` 对象的 Java 代码行所示：\n\n`Uri splashScreenUri = Uri.parse(`\
  \ [`HTTP://www.e-bookclub.com/pag480x800portrait.webm`](http://www.e-bookclub.com/pag480x800portrait.webm)\
  \ `);`\n\n这次，当我在模拟器中测试该应用时，视频成功下载并完美播放了！您可以在图 19-13 中看到下载完成前的效果，在图 19-3 中看到下载完成后的效果。\n\
  \n![A978-1-4302-5786-8_19_Fig18_HTML.jpg](img/A978-1-4302-5786-8_19_Fig18_HTML.jpg)\n\
  \n图 19-18. 将您的 URI 引用设置为指向 `pag480x800portrait.webm` 视频文件，而非 `.mp4` 文件\n\n很可能 WebM\
  \ 编解码器旨在低带宽环境下更高效地工作，正如我在编写本章节那一周所遇到的情况。尽管 MPEG-4 版本和 WebM 版本的视频素材数据文件大小几乎相同，但 WebM\
  \ 的播放似乎更流畅，画质也略好一些。\n\n这或许正是 WebM 编解码器开发团队力求实现的目标；该编解码器及其背后由 ON2 最初开发的技术版权归属于谷歌。这也是它成为\
  \ Android 和 Chrome 组成部分的原因。很容易推断，由于采用固定数据率（与 MPEG4 允许的目标到最大数据率范围不同），这种严格的参数设置旨在针对低带宽网络。\n\
  \n### 让您的视频播放应用感知屏幕方向\n\n接下来，我将向您展示如何利用您在本教程中创建的竖屏和横屏两种版本的视频素材。\n\n这将涉及稍微改变您实现 `Uri`\
  \ 对象的方式，因为您现在将要在 `for` 循环或 `switch` (`case`) 循环语句中设置 `Uri` 位置定义。因此，您需要做的第一件事是将 `Uri`\
  \ 对象声明移到 `MainActivity` 类的顶部，并置于任何特定方法之外。\n\n这需要删除您刚才在图 19-18 中处理过的 `Uri` 代码行，从头开始，并将该代码行简化为仅声明一个对象（目前如此），如图\
  \ 19-19 所示：\n\n`Uri SplashScreenUri;`\n\n![A978-1-4302-5786-8_19_Fig19_HTML.jpg](img/A978-1-4302-5786-8_19_Fig19_HTML.jpg)\n\
  \n图 19-19. 将名为 `splashScreenUri` 的 `Uri` 对象声明放置在 `MainActivity` 类代码的顶部\n\n现在，当您将\
  \ `Uri` 对象定义放在 `OnCreate()` 方法内包含多个 `case` 语句的 `switch` 循环深处时，对 `Uri` 对象的引用将能够在任何位置访问到它。您将根据每个\
  \ `case` 语句的比较常量来设置 `Uri` 对象路径；一旦 `switch` 语句确定这些常量，它就会对现在全局可访问的 `splashScreenUri`\
  \ `Uri` 对象调用 `Uri.parse()` 方法。\n\n\n\n### Android 显示类：物理显示特性\n\nAndroid 有一个名为 `Display`\
  \ 的类，它允许你在应用程序代码中实时访问显示器的特性。本章节还将介绍几个相关的类，包括 `DisplayManager` 类、`DisplayMetrics`\
  \ 类、`Surface` 类以及 `WindowManager` 类及其嵌套类。\n\nAndroid 的 `Display` 类是主类 `java.lang.Object`\
  \ 的直接子类，因此它是专门为提供显示信息而创建的。Android `Display` 类的层次结构如下：\n\n```\njava.lang.Object\n\
  \  > android.view.Display\n```\n\n`Display` 类属于 `android.view` 包，因为 Android 中的任何\
  \ `View` 本质上都可以被视为硬件显示的“子级”。在你的应用中使用 `Display` 类（或对象）的导入语句应引用 `android.view.Display`\
  \ 包，你很快就会看到这一点。\n\n`Display` 类是一个公共终态类，用于提供关于你的应用所使用的显示器的像素大小、像素密度、旋转方向（竖屏或横屏）以及刷新率等各种信息。Android\
  \ 应用程序有两种显示区域术语。较大的区域称为真实显示区域，其内部是应用程序显示区域。\n\n真实显示区域的数据最能接近指定用户的物理硬件规格。这些数据包含当前显示器中显示内容部分的信息，其中包括系统装饰，其中部分内容不受你的应用程序控制。\n\
  \n需要注意的是，如果 Android 的 `WindowManager` 由于任何原因模拟了一个较小的显示区域，那么真实显示区域可能小于显示的物理（硬件）规格。如果你需要这个顶层的真实显示区域，可以使用\
  \ `.getRealSize()` 方法调用，以及 `.getRealMetrics()` 方法调用来获取其他 `DisplayMetrics`。我们很快将介绍\
  \ Android 的 `WindowManager` 和 `DisplayMetrics` 类。\n\n另一方面，应用程序显示区域将指定显示器中包含你的应用程序“窗口”的部分，不包括任何系统装饰占用的屏幕空间。应用程序显示区域会比真实显示区域小，因为\
  \ Android 会减去系统 UI 元素（例如 Android 操作系统的状态栏）所需的任何空间。\n\n开发人员最常用来查找其应用程序显示特性的方法调用包括\
  \ `.getSize()`、`.getRotation()`、`.getRectSize()` 和 `.getMetrics()` 方法调用。你将在代码中使用\
  \ `.getRotation()` 方法调用来了解用户是在竖屏还是横屏模式下观看设备，这样你就知道应该流式传输什么视频！\n\n### Android DisplayManager\
  \ 类：管理显示器\n\nAndroid 还有一个名为 `DisplayManager` 的类，它允许你管理所有显示器，包括可能连接到用户 Android 设备上的任何辅助（外部）或演示显示器。\n\
  \nAndroid 的 `DisplayManager` 是主类 `java.lang.Object` 的另一个直接子类，因此它也是专门为开发者提供 Android\
  \ 操作系统的显示硬件管理功能而创建的。Android Display 类的层次结构如下：\n\n```\njava.lang.Object\n  > android.hardware.display.DisplayManager\n\
  ```\n\n`DisplayManager` 类属于 `android.hardware.display` 包，因为它提供了对 Android 设备显示硬件管理的访问。由于屏幕尺寸、像素密度、屏幕方向、刷新率以及类似的显示硬件特性差异巨大，并需要量化和纳入你的交互式图形设计编程逻辑管道中，因此在显示硬件和操作系统软件之间建立一座桥梁是必要的。\n\
  \n在应用中使用 `DisplayManager` 类（或对象）的导入语句应引用 `android.hardware.display.DisplayManager`\
  \ 包。\n\n`DisplayManager` 类是一个公共终态类，用于管理主 Android 设备显示器的属性，以及任何可能正在与 Android 设备一起使用的外部连接显示器。\n\
  \n如果你熟悉“第二屏幕”这个术语，或者像 MiraCast 或类似的“将内容投射到本地大屏幕上”的 iTV 类型技术，那么这个 Android 类就是为了让这些技术能够与你的应用程序配合工作而创建的。\n\
  \n`DisplayManager` 有一个嵌套类，即 `DisplayManager.DisplayListener` 公共接口，它允许你的应用程序“监听”显示硬件配置的变化，例如当外部演示显示器连接到\
  \ Android 设备或通过无线方式访问时。\n\n`DisplayManager` 还有一个常量，即 `DISPLAY_CATEGORY_PRESENTATION`\
  \ 常量，用于标识适合用作演示显示器的辅助显示器。要实现这个类，你需要通过调用 `.getSystemService()` 方法来获取此对象的一个实例，该方法使用的参数引用了一个\
  \ `DISPLAY_SERVICE` 常量，该常量是通过 `WindowManager` 类从 `Context` 对象中获取的。我们接下来将介绍 `WindowManager`\
  \ 类。\n\n稍后你将需要在你的应用中实现的 Java 代码将使用 `WindowManager`、`Display` 对象、`Context` 对象以及 `DisplayManager`\
  \ 类的 `.getSystemService()` 方法来获取用户的显示器旋转方向。\n\n\n\n### Android 的 WindowManager 接口：管理窗口\n\
  \nAndroid 操作系统有一个名为 `WindowManager` 接口的窗口管理接口。`WindowManager` 接口是一个实现 `ViewManager`\
  \ 接口的公开接口。`ViewManager` 接口允许你为 `Activity` 子类添加和删除子视图（View）。窗口（Window）是视图（View）的一种类型。\n\
  \n`WindowManager` 接口将使你的应用程序能够与 Android 操作系统窗口管理器通信，该管理器是 Android 底层（Linux）操作系统窗口或显示层的一部分。这个较低层次将\
  \ Linux 内核与 Android 设备的硬件（Linux 内核运行其上）在基础（底层）层面连接起来。我在此假设你知道 Android 操作系统运行在开源的\
  \ Linux 内核之上。\n\n如果你熟悉 Linux，你应该对窗口管理器习以为常，它们可以在 Linux 操作系统中切换进出，以提供全新的外观和感觉（换句话说，就是为\
  \ Linux 操作系统提供新的 UI 设计）。\n\n每个 `WindowManager` 对象实例都引用一个给定的 `Display` 对象实例。如果你想为不同的显示器获取\
  \ `WindowManager` 对象，你需要使用 `.createDisplayContext(Display)` 方法调用来获取该 `Display` 对象的\
  \ `Context` 对象。然后，你应该利用 `.getSystemService(Context.WINDOW_SERVICE)` 方法调用来获取 `WindowManager`，这将在本章下一节的代码中实现。\n\
  \n如果你想使用外部显示器显示窗口，最简单的方法是创建一个 `Presentation` 对象。`Presentation` 类会自动获取该 `Display`\
  \ 的 `WindowManager` 和 `Context`。`Presentation` 类是 Android `Dialog` 类的子类。\n\nAndroid\
  \ `WindowManager` 接口属于以下包：\n\n`java.lang.Object`\n\n`> android.view.WindowManager`\n\
  \n`Display` 类属于 `android.view` 包，因为它通过实现 `ViewManager` 公开接口提供了对视图管理的访问。在应用程序中使用\
  \ `WindowManager` 类（或对象）的导入语句应引用 `android.view.WindowManager` 包。\n\n`WindowManager`\
  \ 接口有三个嵌套类，包括布局参数嵌套类 `WindowManager.LayoutParams`，它包含了所有用作标志的常量，用于告诉你的应用程序当前 `Window`\
  \ 对象是如何配置的。当你的应用程序尝试添加一个 `WindowManager.LayoutParams` 令牌无效的 `View` 对象时，`WindowManager.BadTokenException`\
  \ 嵌套类会抛出异常；当你的应用程序在找不到（即不存在）的辅助 `Display` 对象上调用 `.addView(View, ViewGroup.LayoutParams)`\
  \ 方法时，`WindowManager.InvalidDisplayException` 嵌套类会抛出异常。\n\n### 设置 Display 对象以确定设备旋转方向\n\
  \n现在，让我们利用这些新学的知识，为你当前的流媒体视频应用程序完成一些关键任务。你要做的是，最终通过使用 `WindowManager` 和 `.getSystemService()`\
  \ 方法调用来“轮询”`Display` 对象，从而确定旋转向量（0 度、90 度、180 度或 270 度），让你的应用程序能够“看到”用户手中 Android\
  \ 设备的倾斜角度。你将利用这些信息以正确的方向流式传输你的数字视频资源。\n\n在调用 `downloadProgress.show()` 方法之后，你要做的第一件事就是声明你的\
  \ `Display` 对象并将其命名为 `rotationDegrees`。你将此对象命名为 `rotationDegrees`，因为你要用它来找出用户所使用的设备旋转倾斜角度。\n\
  \n你需要将此对象设置为当前应用程序的 `Context` 对象，并在 `.getSystemService()` 方法调用中对此 `Context` 对象调用\
  \ `WINDOW_SERVICE` 常量，将其转换为 `WindowManager`，然后在该编程结构上调用 `.getDefaultDisplay()` 方法，使用图\
  \ 19-20 中所示的如下异常紧密的 Java 代码行：\n\n```\nDisplay rotationDegrees = ((WindowManager)getSystemService(Context.WINDOW_SERVICE)).getDefaultDisplay();\n\
  ```\n\n这将使用默认（主）显示屏的特性来加载 `rotationDegrees Display` 对象，其中一个特性就是其当前的旋转角度，这也会告诉你其当前的（竖屏或横屏）方向。\n\
