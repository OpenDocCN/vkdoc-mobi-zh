  \n图 9-8. 使用“颜色 ➤ 色相-饱和度”对话框将 ImageButton_Bookmark 图层的色相偏移 180 度\n\n我选择将色相偏移 180\
  \ 度，但你可以使用任何你喜欢的颜色偏移，只要它与金色外环 UI 元素搭配起来好看即可。\n\n点击“确定”按钮将此新的色相偏移应用到你的书签图标图层后，请使用“文件\
  \ ➤ 导出”工作流程访问“导出图像”对话框，如图 9-9 所示，并将资源导出为 `imagebutton_pressed.png`，存放在 Android 中用于高分辨率密度图像资源的文件夹中（`/workspace/GraphicsDesign/res/drawable-xhdpi`）。\n\
