  \ 所示，你仍然需要导入`Context`类。\n\n![A978-1-4302-5786-8_19_Fig23_HTML.jpg](img/A978-1-4302-5786-8_19_Fig23_HTML.jpg)\n\
  \n**图 19-23.** 消除关于需要添加`import android.content.Context`语句的最后一个错误\n\n在选择`Import 'Context'\
  \ (android.content)`选项并添加使用该类所需的导入语句后，你的`Display`对象将被声明、命名，并加载用户当前主 Android 设备的默认显示信息。\n\
  \n接下来，我们将简要介绍 Android 的`Surface`类，因为你将在接下来编写的`switch` case 循环中使用它。\n\n### Android\
  \ 的`Surface`类：获取显示器的原始缓冲区\n\nAndroid 还有一个名为`Surface`的类，它允许开发者直接访问将 Android 设备屏幕内容绘制到物理硬件本身的“原始”或源内存“缓冲区”。你需要访问它，以确定\
  \ Android 用户如何旋转他们的设备（向左、向右，甚至上下颠倒）。\n\nAndroid 的`Surface`类是主类`java.lang.Object`的另一个直接子类，因此它被专门创建，以便在开发者真正需要时为显示屏幕表面提供这个“句柄”。`Surface`类还实现了`android.os.Parcelable`接口。\n\
  \nAndroid `Surface`类的层次结构如下：\n\n```\njava.lang.Object\n  > android.view.Surface\n\
  ```\n\n`Display`类属于`android.view`包，因为它直接访问并（取决于你的代码）影响`View`对象中的内容。在你的应用中使用`Surface`类（或对象）的导入语句应引用`android.view.Surface`包。\n\
  \n`Surface`类是一个`public`类，并包含一个嵌套类，称为`Surface.OutOfResourcesException`类。当你尝试引用的`Surface`对象无法按照图形处理代码管线中的预期方式创建、调整大小、旋转或进行其他操作时，此类将抛出异常。\n\
  \n`Surface`类还有一个公共构造方法，允许你使用`SurfaceTexture`对象创建`Surface`对象。这通过以下形式完成：`Surface(SurfaceTexture\
  \ surfaceTextureName)`。\n\n`Surface`类有四个关键常量，你将在本章下一节的代码中利用它们来确定用户如何握持 Android 设备。这些`ROTATION`常量不仅决定了\
  \ Android 设备是处于竖屏还是横屏模式，还决定了设备被旋转到了哪个方向。\n\n这四个常量，如同 Android 中的许多其他事物一样，分别位于 3 点、6\
  \ 点、9 点和 12 点钟方向。正如你所料，它们被命名为`ROTATION_0`、`ROTATION_90`、`ROTATION_180`和`ROTATION_270`。让我们开始工作，在你的代码中使用`Surface.ROTATION`常量，这样你就能看到它们是如何使用的。\n\
  \n### 使用`.getRotation()`方法调用驱动`Switch`循环\n\n在创建并配置`Display`对象之后，你将添加一个`switch`循环（`case`语句），该循环将检测用户\
  \ Android 设备的当前旋转或方向（竖屏或横屏）。\n\n`switch`语句将评估对你在上一行代码中创建的`rotationDegrees` `Display`对象调用`.getRotation()`方法的结果。此方法调用返回四个`Surface.ROTATION`常量之一，然后你将使用`case`构造对这些常量进行评估，并使用它们将你的`splashScreenUri`\
  \ `Uri`对象的引用值设置为正确的视频资源。这通过使用以下 Java 代码完成，如图 19-24 所示：\n\n```\nswitch(rotationDegrees.getRotation()){\n\
  \  case(Surface.ROTATION_0):\n    splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag480x800portrait.webm\"\
  );\n    break;\n  case(Surface.ROTATION_90):\n    splashScreenUri = Uri.parse(\"\
  HTTP://www.e-bookclub.com/pag800x480landscape.webm\");\n    break;\n}\n```\n\n![A978-1-4302-5786-8_19_Fig24_HTML.jpg](img/A978-1-4302-5786-8_19_Fig24_HTML.jpg)\n\
  \n**图 19-24.** 编写`switch`语句以评估对`Display`对象调用`.getRotation()`方法的结果\n\n如图 19-24 所示，你需要将鼠标悬停在`Surface`类的引用上，并选择`Import\
  \ Surface (android.view)`选项。\n\n虽然使用`ROTATION_0`和`ROTATION_90`会告诉你 Android 设备是向左旋转（`ROTATION_90`）还是未旋转，但你还需要添加对另外两个常量的支持：它们会告诉你设备是否向右旋转（`ROTATION_270`）或上下颠倒（`ROTATION_180`），以确保你的`case`语句能\
  \ 100%处理`.getRotation()`方法调用能够返回的每一个结果。\n\n如果你处理了`Surface`类的全部四个常量，就不需要为你的`switch`编程语句添加任何`default`返回语句，因为你将处理\
  \ 100%可能进入语句评估机制的值。现在让我们使用以下 Java 代码，将最后两个`case`语句添加到你的`switch`结构中，如图 19-25 所示：\n\
  \n```\ncase(Surface.ROTATION_180):\n  splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag480x800portrait.webm\"\
  );\n  break;\ncase(Surface.ROTATION_270):\n  splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag800x480landscape.webm\"\
  );\n  break;\n```\n\n![A978-1-4302-5786-8_19_Fig25_HTML.jpg](img/A978-1-4302-5786-8_19_Fig25_HTML.jpg)\n\
  \n**图 19-25.** 将四种屏幕旋转方向全部添加到`switch`语句中，覆盖 0、90、180 和 270 度\n\n现在你需要测试代码，看看它是否按照你期望的方式工作！\n\
