  \n如果将鼠标悬停在此错误提示上，你会发现 Eclipse 要求你为该类实现`constructor method`，并使用与类名完全相同的名称（参见图 17-9）。这恰好是你下一步要做的，所以不必对此错误消息过于担心，至少目前不用。\n\
