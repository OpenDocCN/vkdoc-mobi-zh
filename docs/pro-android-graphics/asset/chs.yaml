  \n\n# 18. 使用 VideoView 和 MediaPlayer 类播放视频\n\n### 摘要\n\n在第十八章中，你将获得更多关于使用 Android\
  \ `VideoView`、`Uri` 和 `MediaPlayer` 类的经验，并学习如何优化多个“目标”数字视频资源的分辨率，以适应那些具有不同物理显示屏分辨率和像素间距规格的流行\
  \ Android 设备。\n\n在第十八章中，你将获得更多关于使用 Android `VideoView`、`Uri` 和 `MediaPlayer` 类的经验，并学习如何优化多个“目标”数字视频资源的分辨率，以适应那些具有不同物理显示屏分辨率和像素间距规格的流行\
  \ Android 设备。\n\n我们还将优化一系列数字视频播放的数据速率（即比特率），以适应从单核到四核及更高性能的处理器（市面上已有八核设备，例如三星电子的\
  \ Galaxy S4）。\n\n我们首先将了解数字视频资产生命周期的各个阶段，这将为你提供基本概述，以便你理解可用于 Android `MediaPlayer`\
  \ 数字视频播放引擎的各种方法调用。\n\n你将学习 Android `MediaPlayer` 类及其嵌套类，这些类允许你实现监听器，以便在数字视频播放生命周期的不同阶段按需运行自定义\
  \ Java 代码。\n\n你还将在应用程序代码中实现其中一个监听器嵌套类。这将通过在视频播放生命周期的视频准备阶段设置循环参数，使数字视频资源无缝循环播放。你将学习如何使数字视频资源缩放以适应不同的宽高比，正如在第\
  \ 2 章中所承诺的那样。最后，你将在 10 种不同的行业标准设备屏幕分辨率下优化数字视频资源，包括 WVGA、WSVGA、准高清（1280 x 720）或真高清（1920\
  \ x 1080）分辨率。\n\n### 视频的一生：视频播放生命周期的各个阶段\n\n在深入探讨 `VideoView` 和 `MediaPlayer` 类之前，你首先需要了解数字视频资源在\
  \ Android 操作系统内部经历的各个不同“阶段”。在表面上，播放数字视频似乎非常简单：按下播放、暂停、快退等。当然，这些步骤是整个流程的一部分。然而，还有一些“幕后”步骤，允许\
  \ Android 操作系统将视频资源加载到内存中、为其设置参数，以及其他更多系统级别的考量，这些最终都是为了实现最佳用户体验。\n\n当你实现一个 `VideoView`\
  \ 时（你在本书中已经通过大约十几行的 XML 标记和 Java 代码完成过），你实际上也实现了一个 `MediaPlayer` 对象，该对象将通过 URI 对象引用播放与之关联的数字视频资源。\n\
  \n当 `MediaPlayer` 对象首次被实例化但未执行任何操作时，它处于所谓的空闲状态。一旦你通过 `Uri.parse()` 方法调用或 `.setDataSource()`\
  \ 方法调用使用了 URI 对象，你的 `MediaPlayer` 对象就会进入所谓的初始化状态。稍后你将在本章中了解 Android 的 `Uri` 类。\n\
  \n在初始化的 `MediaPlayer` 对象状态和启动的 `MediaPlayer` 对象状态之间，存在一个中间状态，称为已准备的 `MediaPlayer`\
  \ 对象状态。通过使用 `MediaPlayer.OnPreparedListener`（你将在本章下一节中学到的嵌套类，并在你的应用程序 Java 代码中实际使用它）来访问此状态。\n\
  \n一旦你的 `MediaPlayer` 对象被初始化（加载了数据）并准备好（配置完成），它就可以启动了。一旦启动（开始播放），可以使用 `.stop()` 方法调用停止它，或者使用\
  \ `.pause()` 方法调用暂停它。这三种视频状态应该是你最熟悉的。\n\n`MediaPlayer` 对象状态的最后一种类型是播放完成状态，这意味着视频资源将停止播放，除非通过\
  \ `.setLooping()` 方法调用将 `MediaPlayer` 对象的循环属性设置为 `true` 布尔值。在这种情况下，你的视频将继续无缝循环。\n\
  \n对于 `MediaPlayer` 对象，还有 `.start()` 和 `.reset()` 方法调用，可以根据 Java 编程逻辑的需要，随时启动和重置\
  \ `MediaPlayer` 对象。最后，还有一个 `.release()` 方法调用，它会触发 `MediaPlayer` 对象的结束状态，从而结束 `MediaPlayer`\
  \ 对象的生命周期并将其从内存中移除。\n\n还有其他嵌套类允许你“监听”错误（`MediaPlayer.OnErrorListener`）以及 `MediaPlayer`\
  \ 的其他状态，例如当其达到播放完成状态时（`MediaPlayer.OnCompletionListener`）。在接下来的部分中，当你在代码中使用 `MediaPlayer`\
  \ 类之前，你将详细查看该类的具体工作原理！\n\n### 视频的存储位置：数据 URI 与 Android 的 Uri 类\n\n在查看 `MediaPlayer`\
  \ 类之前，你必须理解什么是 URI，以及 URI 对象和 Android 的 `Uri` 类能为我们开发者提供什么。\n\nURI 代表统一资源标识符。它是“统一”的，因为它是一种标准；是“资源”，因为它引用了应用程序将要操作（或使用）的数据路径；是“标识符”，因为它标识了你可以从哪里获取数据，也就是其数据路径。\n\
  \n一个 URI 有四个部分。首先是 URI 模式，例如 `HTTP://`；其次是授权机构，例如 [`apress.com`](http://apress.com)；接着是路径，例如\
  \ `/data/files`；最后是数据对象，通常是某种文件，例如 `video.mp4`。\n\nAndroid 的 `Uri` 类是 `java.lang.Object`\
  \ 主类的直接子类。Java 编程语言中也存在一个 `Uri` 类，但既然我们使用的是 Android，我们将重点了解 Android 的 `Uri` 类。此外，还存在一个\
  \ `java.net.Uri` 类；但我建议你使用 Android 特定版本的类，因为它已针对 Android 操作系统的使用进行了适配。\n\nAndroid\
  \ 的 `Uri` 类层次结构如下：\n\n```\njava.lang.Object\n  > android.net.Uri\n```\n\nAndroid\
  \ 的 `Uri` 类属于 `android.net` 包，因此它是用于通过网络访问数据的工具。为此，在你的 Android 应用程序中使用 `Uri` 类所需的导入语句引用的包路径是\
  \ `android.net.Uri`，稍后你将在本章中看到这一点。\n\n`Uri` 类是一个公共抽象类，拥有超过三十个方法，允许开发者处理 URI 对象（和数据路径引用）。\n\
  \nAndroid 的 `Uri` 类允许开发者创建提供不可变 URI 引用的 URI 对象。你之前有过经验，通过将 `Bitmap` 对象放入系统内存中使其成为不可变对象供使用；你需要通过使用\
  \ Android 的 `Uri` 类对你的 URI 数据路径引用做同样的事情。\n\n你的 URI 对象引用包括一个 URI 说明符以及一个数据路径引用，后者是\
  \ URI 中 `://` 之后的部分。`Uri` 类负责构建和解析一个 URI 对象，该对象以符合 RFC 2396 技术规范的方式引用数据。\n\n为了优化\
  \ Android 操作系统和应用程序的性能，此 `Uri` 类执行非常少的数据路径验证。这意味着，对于处理无效数据输入的行为是未定义的。也就是说，面对无效的输入规范，`Uri`\
  \ 类非常宽容。\n\n因此，作为开发者，你在操作时必须非常小心，因为 URI 对象会返回垃圾数据而不是抛出异常，除非你在 Java 代码中另行指定。错误捕获和数据路径验证留待开发者在代码内部自行处理。\n\
  \n\n\n### Android `MediaPlayer` 类：控制视频播放\n\n我们曾在第 2 章中简要介绍过`MediaPlayer`和`MediaController`类，现在，是时候深入探讨`MediaPlayer`核心媒体播放器类的高级用法了，以便你能够直接在`GraphicsDesign`应用的`MainActivity.java`类中利用它。\n\
  \n在本章后续内容中，你将把 3D 虚拟世界穿越视频重新置于 Logo 之后，为应用启动画面创建动画背景。为此，你需要让视频无缝循环，并移除`MediaController`\
  \ UI 组件，使数字视频资产仅成为整体动画启动画面合成操作的一部分。\n\nAndroid `MediaPlayer`类是`java.lang.Object`主类的直接子类。这表明\
  \ Android 的`MediaPlayer`类是专门为提供`MediaPlayer`对象而设计的。这些对象是`VideoView`小部件的一部分，你将在下一节中看到。\n\
  \n因此，Android `MediaPlayer`类的层次结构如下：\n\n```\njava.lang.Object\n  > android.media.MediaPlayer\n\
  ```\n\n`MediaPlayer`类属于`android.media`包。因此，在应用中引用`MediaPlayer`类的导入语句指向`android.media.MediaPlayer`包，你很快就会在本书中看到这一点。\n\
  \n`MediaPlayer`类是一个公共类，包含九个嵌套类。其中八个嵌套类提供回调，用于确定`MediaPlayer`视频播放引擎操作的相关信息。第九个嵌套类是`MediaPlayer.TrackInfo`，用于返回视频、音频或字幕轨道的元数据信息。\n\
  \n你在本章后续将实现的回调是`MediaPlayer.OnPreparedListener`，它允许你在播放首次开始前配置`MediaPlayer`对象。其他常用的回调包括`MediaPlayer.OnErrorListener`（可响应并处理错误消息）和`MediaPlayer.OnCompletionListener`（可在视频资产播放完成后运行其他\
  \ Java 语句）。\n\n还有`MediaPlayer.OnSeekCompletedListener`（在搜索操作完成时调用）和`MediaPlayer.OnBufferingUpdateListener`（用于获取通过网络流式传输的视频资产的数据缓冲状态）。\n\
  \n另外还有一些不太常用的嵌套类，例如`MediaPlayer.OnTimedTextListener`（当定时文本可用于显示时调用）和`MediaPlayer.OnInfoListener`（用于显示关于某些视频媒体的信息或警告）。这些类不常用，至少据我所知如此，但在需要时可以使用。\n\
  \n### Android `VideoView` 类：视频资产容器\n\n在幕后（无意双关），Android 的`MediaPlayer`和`VideoView`类紧密结合在一起，如同数字婚姻般幸福，但这种联系可能不像大多数婚姻那样表面可见。在本节中，我们将研究这两个类是如何密不可分地联系在一起的，以便你理解访问`VideoView`对象中`MediaPlayer`的最佳方式，这正是你将在本章稍后部分进行的操作。\n\
  \nAndroid `VideoView`类是 Android `SurfaceView`布局容器类的直接子类，而`SurfaceView`又是 Android\
  \ `View`类的直接子类，最后，`View`类是`java.lang.Object`主类的直接子类。\n\n因此，Android `VideoView`类的层次结构如下：\n\
  \n```\njava.lang.Object\n  > android.view.View\n    > android.view.SurfaceView\n\
  \      > android.widget.VideoView\n```\n\nAndroid `VideoView`类属于`android.widget`包，使其成为用户界面元素（即小部件）。因此，在\
  \ Android 应用中使用`VideoView`类的导入语句引用`android.widget.VideoView`作为其包，正如你在本书前面所看到的。\n\
  \n`VideoView`类是一个公共类，拥有超过二十个方法调用或回调，你可能会以为这些属于`MediaPlayer`类，但从某种意义上来说，正如你现在所知，它们在\
  \ Java 代码深处紧密结合在一起。\n\n我们将介绍一些更重要且有用的方法调用（因为我们已经在前一节中介绍了回调），以便你熟悉它们，以防你需要在自有视频播放应用中实现任何这些扩展的数字视频功能。\n\
  \n最简单的调用方法在第一部分关于`MediaPlayer`状态的讨论中已经涵盖；这些包括`.pause()`、`.resume()`、`.start()`、`.stop()`、`.suspend()`和`.stopPlayback()`。我们已经使用过`.setMediaController()`和`.setVideoURI()`方法调用，此外还有一个`.setVideoPath()`方法调用，它能达到大致相同的最终结果。\n\
  \n有四个`.get()`方法调用：`.getDuration()`、`.getCurrentPosition()`、`.getBufferPercentage()`和`.getAudioSessionId()`，以及一个`.isPlaying()`方法调用来检查视频当前是否正在播放。还有三个`.can()`方法调用来确定`MediaPlayer`能做什么：`.canPause()`、`.canSeekBackward()`和`.canSeekForward()`。\n\
  \n还有一些继承自`View`类的标准事件处理方法调用，例如`.onTouchEvent()`、`onKeyDown()`和`onTrackballEvent()`。最后，还有一些专门的方法调用，例如`.resolveAdjustedSize()`或`.onInitializeAccessibilityEvent()`，用于实现无障碍标准。\n\
  \n\n\n### 使用 `MediaPlayer` 类：无缝循环播放视频\n\n学习如何使用 `VideoView` 组件实现 `MediaPlayer` 的唯一真正方法，就是亲自动手编写\
  \ Java 代码和 XML 标记！接下来，让我们进入实战模式，编写代码、优化视频，并为你的视频资源添加多分辨率支持。\n\n接下来，重新接入你在第 2 章中创建的数字视频（你在后续章节中禁用了它，以便在没有背景视频及其处理开销的视觉干扰下探索动画、合成、混合等功能），并将那七行代码放回主\
