  \n如图 19-20 所示，你需要将鼠标悬停在 `Display` 类引用上，并首先选择“导入 ‘Display’ (`android.view`)”选项。\n\
  \n如图 19-21 所示，正如你所料，这修复了部分错误高亮，但仍然是必须引用 `WindowManager` 类。\n\n如果再次将鼠标悬停在错误高亮上，你期望看到“导入\
  \ ‘WindowManager’ (`android.view`)”选项，然而，你得到的唯一提示是“WindowManager cannot be resolved\
  \ to a type”，如图 19-21 所示。\n\n显然，Import 语句将解决这个引用问题，而我能想到的这个选项没有出现在错误辅助对话框中的唯一原因是\
