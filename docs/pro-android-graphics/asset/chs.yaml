  一旦 `private void setUpAnimation()` 方法就位，删除其中的注释，并将其替换为你之前删除的 `ImageView` 对象实例化代码。记住，熟能生巧！如果你忘记了如何实例化、命名并将其与你的\
  \ XML 定义关联，以下是这行代码：\n\n```\nImageView pag = (ImageView) findViewById(R.id.pagImageView);\n\
