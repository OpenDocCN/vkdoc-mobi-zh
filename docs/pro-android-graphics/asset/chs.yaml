  \n现在，你已掌握足够的知识，可以进入下一章了。在那里，你将研究视频远程流式传输的编码和优化，以便将数字视频素材存储在你的服务器上，而不是你的应用中！\n\n\
  ![A978-1-4302-5786-8_18_Fig23_HTML.jpg](img/A978-1-4302-5786-8_18_Fig23_HTML.jpg)\n\
  \n图 18-23. Windows 资源管理器文件管理器显示 AVI 文件夹及压缩结果的文件大小和格式\n\n### 摘要\n\n在第十八章中，你学习了如何使用\
  \ `MediaPlayer`（它本质上包含在你的 `VideoView` UI 对象中）。你深入研究了 Android 中的 `MediaPlayer`、`Uri`\
  \ 和 `VideoView` 类，了解了它们各自的功能，以及它们如何协同工作，使我们能够定位、加载到内存、访问、播放和循环播放数字视频素材。\n\n你学习了如何使用\
  \ `OnPreparedListener` 嵌套类（通过 `MediaPlayer` 嵌套类 `MediaPlayer.OnPreparedListener`\
  \ 访问）来获取 `MediaPlayer` 对象引用，该类暴露了 `MediaPlayer` 对象。\n\n与早在第 2 章（那时你只是一个简单的图形初学者）时相比，本章我们对\
  \ `MediaPlayer` 和 `VideoView` 类进行了更详细的探讨，然后我们将你的视频素材重新引入启动屏代码，以便将其用作动画背景板。\n\n你将你的视频素材与我们很久以前在第\
  \ 3 章和第 4 章中创建的 PAG 标志动画处理进行了合成。正如预期的那样，你在第 2 章中创建的视频在你创建的动画元素后面正常播放，这归功于你的合成工作流程以及对\
  \ PNG32 素材中 Alpha 通道数据的智能运用。你们学得很好，年轻的卢克们和卢克莎们。愿英伟达（GeForce）图形处理器与你们同在。\n\n接下来，我们重新回到数字视频数据占用空间优化的工作流程，并确定了五个目标分辨率，这些分辨率“覆盖”了\
  \ 95% 的主流 Android 设备屏幕分辨率（使用物理像素）。除了最小的 640x360 分辨率外，每一个也都是一个“命名的”屏幕分辨率标准。\n\n我们瞄准了宽\
  \ VGA（WVGA），分辨率为 800x480；宽超级 VGA（WSVGA），分辨率为 1024x600；伪高清，分辨率为 1280x720；以及真高清，分辨率为\
  \ 1920x1080。最后两种恰好也是视频（电视）广播标准。\n\n你为这些分辨率的竖屏和横屏版本设置了编解码器预设，并设置了标准数据速率以匹配视频尺寸和目标播放设备。你查看了生成的文件大小，并确定了哪种结果最适合你打算交付应用的目标\
  \ Android 设备。\n\n在下一章中，你将了解如何通过 HTTP 协议在互联网上流式传输数字视频素材，以备你的应用中有过多的数字视频无法使用“本地”素材，同时也让你了解在视频压缩和数据流式传输中，网络带宽是如何发挥作用的。\n\
  \n\n# 19. 从外部媒体服务器流式传输数字视频\n\n### 摘要\n\n在第十九章中，你将通过使用 Android 的 `VideoView`、`Uri`\
  \ 和 `MediaPlayer` 类获得更深入的实践经验。不过，这次你将使用托管在 Android 应用外部的数字视频。\n\n如果视频资产数据首次通过互联网传输到用户\
  \ Android 设备上时（在你的代码配置情况下，即在首次播放循环期间）就开始播放，这通常被称为流式数字视频。另一种使用远程数字视频媒体服务器上视频的方式是，在播放周期（在你的特定用例中即无缝循环）开始之前，先下载数字视频资产。\n\
  \n无论采用哪种方式，这种方法都与你之前章节中使用内置视频的方式不同，因为你将网络连接作为数字视频数据流的来源，并使用 Android 应用作为该流式（或已下载）视频数据的播放引擎（接收端）。\n\
  \n为了在用户等待视频资产下载时提供反馈，你需要实现一个进度对话框，因此在本章中你将学习 Android 的 `ProgressDialog` 类。该类允许你实现一个对话框，用于提醒用户他们正在下载视频，并通过进度动画告知他们下载的相关信息，例如正在下载的内容。\n\
  \n在本章稍后部分，你将使用 Squeeze 来优化你的 480x800 数字视频资产，以利用 WebM 编解码器和文件格式。你还将学习 Android 的 `Display`\
  \ 和 `WindowManager` 类，因为你需要使用它们来检测用户当前使用的屏幕方向。\n\n### 可以流式传输视频吗？设置清单的网络权限\n\n在你可以使用应用访问互联网之前，Android\
  \ 操作系统会要求你首先在 `AndroidManifest.xml` 文件中声明一个 `INTERNET` 权限常量。这可以通过使用 Android 的 `<uses-permission>`\
  \ 子标签以及 `INTERNET` 常量来完成，使用以下 XML 标记行：\n\n```\n<uses-permission android:name=\"\
  android.permission.INTERNET\" />\n```\n\n这个权限标志位于 Android 清单 XML 文件的顶部，在你的 `<uses-sdk>`\
  \ 规范之后（见图 19-1），它将告知 Android 操作系统你打算访问用户设备外部的流式数据或其他应用内容。\n\n![A978-1-4302-5786-8_19_Fig1_HTML.jpg](img/A978-1-4302-5786-8_19_Fig1_HTML.jpg)\n\
  \n图 19-1. 使用 `android.permission.INTERNET` 向 `AndroidManifest` 文件添加 `<uses-permission>`\
  \ 子标签\n\n之所以需要这样做的根本原因在于，你需要告知 Android 操作系统注意潜在的安全漏洞。一旦你将硬件设备接入公共网络（如互联网），它就可能受到第三方（如黑客）的攻击。这就是为什么我将大部分\
  \ 3D 内容开发工作站保留在它们自己的私有网络上——一个与外界不连接（不可见或不可访问）的网络。同样的概念也适用于用户的 Android 设备。\n\n###\
  \ 当视频远在他方：HTTP URL 与你的 URI\n\nAndroid 操作系统内部的内容（对于视频，将位于 `/res/raw` 文件夹中）通常使用 `android.resource://`\
  \ URI 路径引用，因为这些内容始终位于 Android 操作系统的 R 或资源区域中。\n\n使用 Android 中所谓内容提供者的数据库内容，则使用 `content://`\
  \ URI 路径引用。本书不会涉及该 URI 路径引用位置（这完全是另一本关于 Android 数据库设计的书的内容），不过了解一下也是好的！\n\n我们将使用一台网络服务器来托管你的数字视频资产，因此你需要将这个\
  \ `android.resource://` 更改为熟悉的 `HTTP://`，后者用于表示超文本传输协议模式。\n\n这意味着，升级你当前的应用程序代码以利用数字视频流式传输，就像更改传递给\
  \ `splashScreenUri` 对象声明和配置代码行中 `Uri.parse()` 方法调用的参数一样简单，如图 19-2 所示。你的新 Java 代码应类似于以下\
  \ Java 代码语句：\n\n```\nUri splashScreenUri = Uri.parse(\"HTTP://www.e-bookclub.com/pag480x800portrait.mp4\"\
  );\n```\n\n这是你为了能够从新的媒体网络服务器向 Nexus One 模拟器（或 Android 硬件测试设备）流式传输数字视频资产，而对第 18 章中编写的代码所做的唯一更改。\n\
  \n![A978-1-4302-5786-8_19_Fig2_HTML.jpg](img/A978-1-4302-5786-8_19_Fig2_HTML.jpg)\n\
