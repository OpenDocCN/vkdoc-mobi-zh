  \ 方法调用放回到第 14 章 中的位置！\n\n### 为您的 AnimationSet 创建一个 TranslateAnimation 对象\n\n另一件我希望您尝试的事情是，为当前的\
  \ `AnimationSet` 对象添加一个移动组件，该组件使您动画从屏幕更高的位置开始，并在缩放和淡出发生时沿着 Y 轴向下移动，以使动画看起来像是从天而降。\n\
  \n为此，您需要在类顶部声明一个名为 `translateSkyToZero` 的 `Animation` 对象，就像您处理其他变换对象一样，然后使用 `new`\
  \ 关键字初始化该对象，并使用构造方法配置参数列表，就像您对其他三个 `Animation` 子类对象所做的那样，并且在代码中的相同位置进行。\n\n确保使用\
  \ `.addAnimation()` 方法调用，并将 `translateSkyToZero` 值作为参数传递给该方法，从而将新的 `TranslateAnimation`\
  \ 对象添加到您的 `AnimationSet` 对象中，这会将其添加到 `AnimationSet`（组）对象的复杂动画定义中。\n\n最后，一旦您的 `TranslateAnimation`\
  \ 对象被添加（连接）到 `AnimationSet` 对象之后，尝试调用该 `AnimationSet` 对象的一些其他参数方法！一些我们没有特别声明（使用）的参数方法（因为我们依赖它们的默认值）包括您在第\
  \ 4 章 中学习和实现过的 `.setRepeatMode()` 或 `.setRepeatCount()` 方法。\n\n\n### 总结\n\n在第十五章中，你学习了如何仅使用\
  \ Java 代码（无需 XML 标记）在 Android 操作系统中实现启动画面程序化动画，具体方法是使用 `Animation` 类及其五个子类（`ScaleAnimation`、`AlphaAnimation`、`AnimationSet`、`RotateAnimation`\
  \ 和 `TranslateAnimation`）中的方法和构造方法。\n\n我们首先探讨了 Android 的 `Animation` 类本身，以及它如何直接继承自\
  \ `java.lang.Object` 主类，这意味着它基本上是从零开始编写的，旨在为 Android 操作系统提供视图动画或矢量动画（也称为程序化动画）。\n\
  \n接着，我们学习了 `TranslateAnimation` 子类，以及它如何让我们在 X-Y 屏幕空间中通过动画方式移动 `View` 对象。然后，我们研究了\
  \ `ScaleAnimation` 子类，以及它如何在 X-Y 二维屏幕维度内缩放 `View` 对象，同时我们也了解了这两个程序化动画类的构造方法的工作原理。\n\
  \n随后，你直接投入 Java 编码，在 `GraphicDesign` 应用中实现了 `ScaleAnimation` 对象，从而观察 `Animation`\
  \ 对象及其变换子类如何在你的 Java 编码环境中协同工作。\n\n接着，你学习了 `AlphaAnimation` 类，以及它如何让我们为程序化动画技巧库添加\
  \ alpha 混合效果。你还学会了使用相对简单的构造方法，为 `View` 对象（在你的案例中是 `ImageView`）实现淡入或淡出效果，从而使其产生动画。\n\
  \n然后，你再次深入 Java 编码，添加了另一个 `Animation` 对象来定义你的 `AlphaAnimation` 目标，并尝试连续两次调用 `.startAnimation()`\
  \ 方法，但失败了，这迫使你转而学习 Android 的 `AnimationSet` 类，结果证明这真是一次积极的体验。和平、爱与 AnimationSet，朋友（无论男女）！\n\
  \n在回顾了 `AnimationSet` 类的细节之后，我们立刻回到 Eclipse ADT 中，你开始实现更高级的 Java 程序化动画编程。你创建了一个\
  \ `AnimationSet` 动画组流水线来实现复杂的程序化动画，并且全程只使用了 Java 编程逻辑。\n\n一旦你的 `AnimationSet` 正常工作，通过使用\
  \ `RotateAnimation` 类和构造方法，然后调用 `.addAnimation()` 方法将其添加到 `AnimationSet` 中，为动画集添加旋转动画就变得容易多了。到这时，你已经相当擅长在\
  \ Android 应用中使用 `Animation` 类及其功能性子类了。\n\n最后，你使用 Java 实现了与第 3 章和第 4 章中使用 XML 实现的完全相同的帧动画与程序化动画组合序列。这时，我建议（作为练习）尝试向你的\
  \ `AnimationSet` 添加一个 `TranslateAnimation` 对象，并通过重新实现 `animStarter` 类来制作应用自动启动徽标动画。\n\
  \n在下一章中，我们将深入理解 Android 的 `Drawable` 类，因为你现在已经学习并使用了它的许多子类来实现动画、混合以及其他非常高级的图形相关\
  \ Android 编程技巧。这将帮助你“彻底掌握”Android 中的 `Drawable` 类与对象——这些是 Android 操作系统内图形设计与实现的基石，因而非常重要。\n\
  \n# 16. 高级图形：掌握 Drawable 类\n\n### 摘要\n\n在第十六章中，我们将从更底层的视角审视 Android 操作系统中的 `Drawable`\
  \ 类，因为它为操作系统中所有与图形相关的对象提供了基础。\n\n既然你已经深入接触并体验了 Android 中多种高级 `Drawable` 对象类型，现在是时候来考察这些对象所源自的基类，并了解\
  \ Android 操作系统中其他一些可用的 `Drawable` 对象类型了。\n\n其中许多不同类型的 `Drawable`（例如 `ShapeDrawable`）我们之前一直没有足够的理由去介绍。这主要是因为对于作为读者的你而言，数字图像、数字视频、二维动画、混合以及过渡等主题比矢量插画（形状）、字体（文本对象）或渐变等主题更受欢迎。尽管如此，矢量插画仍是一个热门话题，因此我们将在本章中加以介绍。\n\
  \n所以，不用担心，我们终将涵盖所有内容，这也是我特意安排一章专门讲解 Android 的 `Drawable` 类的原因之一——这样我就能确保覆盖所有不同类型的\
  \ `Drawable` 子类和对象，因为它们都会以某种方式影响图形设计。\n\n在本章中，你还将学习其他几个与专业 Android 图形设计直接相关的重要 Android\
  \ 类，这些类通常与 `Drawable` 类及其众多子类一起使用。它们包括 Android 的 `Shader` 和 `BitmapShader` 类、`Rect`\
  \ 和 `RectF` 类、`InputStream` 类以及 `ShapeDrawable` 类。同时，你也会进一步巩固对 `Bitmap`、`Paint`\
  \ 和 `Canvas` 类的使用和认知。\n\n\n### Android 可绘制资源：可绘制对象的类型\n\nAndroid 拥有超过十二种不同类型的可绘制资源，您可以将它们应用于\
  \ Android 应用程序的图形设计管线。 在本书的这个阶段，您已经利用了大量的这些更高级的可绘制对象类型；我们将确保您了解 Android 中所有可用的可绘制对象。\n\
  \nAndroid 可绘制资源是可绘制到用户显示屏上的图形的基础概念，您可以通过诸如 `.getDrawable()` 之类的方法调用来检索它们，或者使用 XML\
  \ 定义以及 `android:icon`、`android:background` 或 `android:src` 等参数来应用它们。\n\nAndroid\
  \ 中有许多不同的可绘制对象类型，仅列举部分，包括 `Bitmap`（位图）、`9-Patch`（九宫格）、`Layer`（图层）、`State`（状态）、`Level`（级别）、`Animation`（动画）、`Transition`（过渡）、`Shape`（形状）、`Scale`（缩放）、`Rotate`（旋转）、`Inset`（内嵌）、`Clip`（裁剪）、`Picture`（图片）、`Paint`（画笔）和\
  \ `Color`（颜色）。\n\n在本章的第一部分概述中，我们将逐一介绍 Android 中这些主要的可绘制对象类型，并确切了解它们是什么以及它们的作用。 我们这样做是为了让您作为专业的图形设计师，对\
  \ Android 为您提供的工具有更广阔的视角。 我们将首先介绍您已经使用过的可绘制类型，然后向您介绍一些新的、令人兴奋的可绘制对象。\n\n`BitmapDrawable`（位图可绘制对象）使用数字图像资源（PNG、JPG\
  \ 或 GIF），用称为位图的像素数组填充可绘制对象。 在第 11 章构建图像合成与混合管线时，您已经了解了如何将可绘制对象转换为 `BitmapDrawable`\
  \ 等操作。\n\n如您在第 10 章中所见，`NinePatchDrawable`（九宫格可绘制对象）利用 PNG32 图像文件格式，并使用单像素黑色边框区域对其进行自定义，以创建可缩放的\
  \ X 和/或 Y 区域，从而允许根据图像资源内容设计在 X 或 Y 维度上动态调整图像大小。 `NinePatch` 对象图像资源使用特殊的文件名 `thefilename.9.png`，也可以使用\
  \ PNG24（真彩色，无 Alpha 通道）和 PNG8（索引色）。\n\n如您在第 12 章中所见，`LayerDrawable`（图层可绘制对象）允许集合其他类型的可绘制对象，这些对象可用于分层合成。\
  \ 这些可绘制对象按照 `LayerDrawable` 对象的数组顺序绘制，因此索引最大的子图层元素将绘制在最上层。\n\n如您在第 13 章中所见，`TransitionDrawable`（过渡可绘制对象）通常使用\
  \ XML 文件定义，该文件允许在两个可绘制资源之间进行交叉淡入淡出。\n\n如您在第 14 章和第 3 章中所见，`AnimationDrawable`（动画可绘制对象）可以通过\
  \ XML 标记或 Java 代码使用，以定义一系列帧，这些帧按照开发者使用参数指定的方式播放，从而形成 2D 帧动画资源。 `AnimationDrawable`\
  \ 对象可以进一步使用 `Animation` 对象进行处理，后者将应用矢量（算法）变换。\n\n`StateListDrawable`（状态列表可绘制对象）通常也使用\
  \ XML 定义文件来定义，该文件引用一系列突出显示不同功能状态的位图图像资源。 您在第 9 章中创建多状态 `ImageButton` UI 元素时使用了状态，该元素为每个按钮状态（例如，按钮悬停、按下或获得焦点时）实现了不同的图像。\n\
  \n`LevelListDrawable`（级别列表可绘制对象）通常使用 XML 文件定义，该文件实例化一个可绘制对象，该对象管理多个备用可绘制对象，每个备用可绘制对象都被分配了一个最小值和最大值，在运行时用于确定\
  \ `LevelListDrawable` 当前引用的级别。\n\n`InsetDrawable`（内嵌可绘制对象）使用 XML 定义文件定义，该文件定义一个可绘制的\
  \ XML 资源，用于在另一个可绘制对象内以指定的 DIP 距离创建内嵌。 当您的 View 对象需要的背景可绘制对象小于 View 对象的实际边界时，这很有用。\n\
  \n`ClipDrawable`（裁剪可绘制对象）使用 XML 文件定义，该文件定义一个可绘制对象，该对象根据您的 `ClipDrawable` 对象的当前级别值在另一个可绘制对象上实现裁剪平面或区域。\
  \ 这通常用于创建特殊效果或实用工具，例如进度条。\n\n`ScaleDrawable`（缩放可绘制对象）也使用 XML 定义文件定义，该文件指定一个可绘制对象，该对象根据\
  \ `ScaleDrawable` 对象的当前级别值更改另一个可绘制对象的缩放比例。\n\n`ShapeDrawable`（形状可绘制对象）通过定义几何形状的\
  \ XML 文件来定义。 形状定义还可以包括其他嵌套形状、边框、颜色或颜色渐变。 `ShapeDrawable` 对象基本上为 Android 操作系统提供了许多在\
  \ Freehand、Illustrator 或 InkScape 等软件包中常见的矢量功能。\n\n我们将在本章的后续部分介绍 `Shape` 和 `ShapeDrawable`\
  \ 对象，因为数字插画在新媒体中是一个热门话题。\n\n在我们深入探讨 `ShapeDrawable` 对象之前，需要注意的是，您通常在 `Colors.xml`\
  \ 文件中定义的任何颜色资源，也可以通过 XML 定义中的引用作为可绘制对象使用。\n\n举个例子，在创建您的 `StateListDrawable` 对象时，您可以为\
  \ `android:drawable` 属性引用一个颜色资源，这使其在某种程度上成为一种颜色可绘制资源。 这将通过在您的 XML 标记中的 View 对象标签内使用以下参数来完成：\n\
  \n`android:drawable=\"@color/green\"`\n\n接下来，让我们看看如何使用 XML 标记和 `<shape>` 根元素在 Android\
  \ 中创建矢量插画，以创建 `ShapeDrawable` 对象。 一旦您在 Android 中创建了自己的矢量插画，我们将更详细地研究 Android 中的\
  \ `Shape` 和 `ShapeDrawable` 类。 既然我们在上一章中介绍了矢量动画，那么在本章中介绍静态矢量图像也是顺理成章的。\n\n\n\n###\
  \ 创建 ShapeDrawable 对象：XML `<shape>` 父标签\n\n让我们再次启动 Eclipse，或者如果它已经在桌面上打开，你可以直接右键点击\
  \ `GraphicsDesign` 项目中的 `/res/drawable` 文件夹。选择 **新建 ➤ Android XML 文件** 菜单命令序列，如图\
  \ 16-1 所示。\n\n![A978-1-4302-5786-8_16_Fig1_HTML.jpg](img/A978-1-4302-5786-8_16_Fig1_HTML.jpg)\n\
  \n图 16-1. 新建一个 ➤ Android XML 文件，以便创建 `ShapeDrawable` 对象的 XML 定义\n\n在“新建 Android\
  \ XML 文件”对话框中（如图 16-2 所示），将文件命名为 `contents_shape`，然后选择 `<shape>` 根元素，这将使其成为一个 `ShapeDrawable`\
  \ 的 XML 定义文件。请注意，由于你已经在 `GraphicsDesign` 项目中点击了 `/res/drawable` 文件夹，Eclipse 能够自动为你推断出前两个“资源类型”和“项目”设置字段。完成后，选择“完成”按钮以创建你的\
  \ `ShapeDrawable` XML 定义文件。\n\n![A978-1-4302-5786-8_16_Fig2_HTML.jpg](img/A978-1-4302-5786-8_16_Fig2_HTML.jpg)\n\
  \n图 16-2. 使用“新建 Android XML 文件”对话框创建一个 `<shape>` Drawable 的 XML 定义文件\n\n当 `ShapeDrawable`\
  \ XML 定义文件在 Eclipse 中央编辑窗格中打开后，将光标放在 `xmlns:android` 参数末尾，按下回车键，输入 `android`，然后按下冒号键以弹出包含此标签所有可用参数的助手对话框，如图\
  \ 16-3 所示。选择 `android:shape` 选项，该选项允许你定义形状，双击它，它将被添加为你的 `<shape>` 父标签的一个参数。\n\n\
  ![A978-1-4302-5786-8_16_Fig3_HTML.jpg](img/A978-1-4302-5786-8_16_Fig3_HTML.jpg)\n\
  \n图 16-3. 添加 `android:shape` 参数来定义你的 `ShapeDrawable` 要使用的形状\n\n当参数出现后，在引号内添加形状类型\
  \ `oval`。接下来，将光标放在 `<shape>` 父标签容器内部，或者放在起始 `<shape>` 标签“结束”尖括号下方的空行上，你就可以开始添加嵌套的子标签了。\n\
  \n添加一个左尖括号 `<` 字符来调用 Eclipse 助手对话框，其中包含 `<shape>` 根元素可用的所有子标签，如图 16-4 所示。\n\n让我们来了解一下可以应用的不同类型的渐变，以及如何设置渐变色谱外部、内部和中间部分的颜色。由于椭圆没有角，且纯色过于单调，因此为你的\
  \ `<shape>` 父标签添加 `<gradient>` 子标签。\n\n选择 `gradient` 选项并（或）双击它，以将 `<gradient>` 子标签添加到你的\
  \ `ShapeDrawable` XML 定义中。你会注意到只添加了 `<gradient` 这部分子标签，因此你必须通过添加一个 `空格` 和一个 `/>`\
  \ 结束标签来完成 Eclipse 的容器闭合。\n\n完成此操作后，你可以将光标放在 `<gradient` 起始标签之后，按下回车键以使用 Eclipse\
  \ 的自动缩进功能。\n\n![A978-1-4302-5786-8_16_Fig4_HTML.jpg](img/A978-1-4302-5786-8_16_Fig4_HTML.jpg)\n\
  \n图 16-4. 在父 `<shape>` 标签中添加 `<gradient>` 子标签，以用渐变填充 `ShapeDrawable` 对象\n\n输入单词\
  \ `android` 并按下冒号键，调出可与 `<gradient>` 标签一起使用的参数列表。如你所见，共有九个参数，在完成本节之前你会用到其中七个。双击\
  \ `android:startColor` 参数，它将被添加到你的 `<gradient>` 标签中，如图 16-5 所示，至此你将开始为你的椭圆 `ShapeDrawable`\
  \ 对象配置渐变。\n\n![A978-1-4302-5786-8_16_Fig5_HTML.jpg](img/A978-1-4302-5786-8_16_Fig5_HTML.jpg)\n\
  \n图 16-5.\n\n\n\n使用 `android:` 工作流程调出 `<gradient>` 标签的全部参数选项。\n\n在 `android:startColor`\
  \ 参数中设置十六进制颜色值 `#FF0000` 表示 100%红色通道，在 `android:centerColor` 参数中使用十六进制值 `#FFFF00`\
  \ 表示 100%黄色（红色加绿色）。对于 `android:endColor`，使用 100%绿色的十六进制颜色值 `#00FF00`，这样你使用的颜色将在渐变中良好融合。\n\
  \n接下来，让我们使用 `android:centerX` 和 `android:centerY` 参数指定支点（即渐变中的中心点），将两者均设为形状的正中间（50%），使用的浮点值为\
  \ `0.5`。\n\n完成这五个参数的添加后，带有红色、黄色和绿色线性（默认）渐变的椭圆形 Shape 的 XML 定义将完全如下面的 XML 标记块所示：\n\
  \n```\n<? xml version=\"1.0\" encoding=\"utf-8\" ?>\n<shape xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  \n    android:shape=\"oval\" >\n    <gradient\n        android:startColor=\"#FF0000\"\
  \n        android:centerColor=\"#FFFF00\"\n        android:endColor=\"#00FF00\"\n\
  \        android:centerX=\"0.5\"\n        android:centerY=\"0.5\" />\n</shape>\n\
  ```\n\n如图 16-6 所示，标记无错误和警告，你可以准备好在 Eclipse ADT 中的图形布局编辑器窗格中测试你的 ShapeDrawable 定义。\n\
  \n![A978-1-4302-5786-8_16_Fig6_HTML.jpg](img/A978-1-4302-5786-8_16_Fig6_HTML.jpg)\n\
  \n图 16-6. 向 `<gradient>` 子标签添加起始色、中心色、结束色以及支点居中参数\n\n在访问 GLE 之前，你必须打开并编辑你的 `activity_contents.xml`\
  \ 定义标签页，因此在你的 `/res/layout` 文件夹中右键点击该文件并选择“打开”选项，或者如果它已经在你的 IDE 中打开，则点击 Eclipse\
  \ 中央编辑区域顶部的该标签页。\n\n由于你的 ShapeDrawable 当前未被布局容器定义中的 ImageView UI 元素引用，你需要将 NinePatchDrawable\
  \ 引用更改为指向你的新 ShapeDrawable XML 定义文件。这通过使用以下 XML 标记将 `android:src` 参数的值改为 `@drawable/contents_shape`\
  \ 来实现：\n\n```\nandroid:src=\"@drawable/contents_shape\"\n```\n\n你可以让 `android:background`\
  \ 参数保持当前配置，这样你就可以看到当背景板中使用位图资源时，Android 如何对矢量图形进行抗锯齿（像素平滑）处理。\n\n如图 16-7 所示，你的 ImageView\
  \ 用户界面对象现在引用了两种不同类型的 Drawable 资源：ShapeDrawable 和 TransitionDrawable。你的两个 Drawable\
  \ 资源都使用 XML 标记来定义它们的图像资源，因此你不再在 ImageView UI 元素中（直接）引用任何图像资源，尽管你在 TransitionDrawable\
  \ 对象 XML 定义中引用了它们。\n\n![A978-1-4302-5786-8_16_Fig7_HTML.jpg](img/A978-1-4302-5786-8_16_Fig7_HTML.jpg)\n\
