  需要指出的是，即使您像我一样配备八核 64 位 3.4GHz 工作站、16GB DDR3 1333 内存和固态硬盘（SSD），您可能仍然无法获得理想的 Eclipse\
  \ AVD 模拟器性能。\n\n\n\n这是因为你的 AVD（Android 虚拟设备）正在虚拟化整个 Android 硬件和软件环境。它仅通过软件模拟来实现这一点，这需要占用极其庞大的内存空间以及大量的处理周期。话虽如此，这个开发软件包中负责运行\
  \ AVD 模拟器部分的代码可能存在一些优化“空间”，所以我们希望 Android 团队在谷歌总部已经部署了关键团队成员来负责这一目标。\n\n如果你的 Android\
  \ 开发工作站可以配置使用 3.8GHz（或更快）的 16 核 AMD 64 位 CPU，并配备 32GB 甚至 64GB 的 DDR3 1600 或 1800（现在非常实惠）内存，那么你很可能希望这样做，至少在模拟器环境变得更高效之前是这样的！如果你希望模拟器快速启动，请务必包含一块固态硬盘（SSD）！固态硬盘最终能让你的所有软件（以及操作系统）快速启动。\n\
