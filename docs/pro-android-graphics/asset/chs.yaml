  \n\n\n出现\"无法播放此视频\"类型错误信息的第二个原因是，您当前使用的网络连接速度过慢，或数据传输方面存在问题。我的连接当时由于某种原因速度很慢，可能是高峰时段流量过大，或是路由器问题（维护或升级中）导致网络需要重新路由数据。网络环境本就复杂多变，很少能提供稳定流畅的数据流。\n\
  \n为确保您使用的文件格式全部正确，同时为了能够为这些视频章节提供多样化的素材资源，我将在下一节中使用 MPEG-4 H.264 AVC 和 WebM VP8\
  \ 两种视频编解码器（及文件格式），为您正在 Nexus One 模拟器 AVD 上使用的 `pag480x800portrait` 文件创建 WebM 数字视频素材。\n\
  \n### 使用 WebM VP8 视频编解码器进行数字视频流传输\n\n由于您已准备好未压缩的 AVI 文件，我们回到 Squeeze 中为您的 480x800\
  \ 视频素材创建一个 WebM 版本。在 Squeeze 界面左侧，您会看到一个带有向右箭头的 WebM (`.webm`) 选项。点击该箭头，展开 WebM\
  \ 预设，找到 `WebM_480p` 预设，然后复制它，或右键点击并编辑，创建您自己的自定义 `Android_WebM_480x800p` 编解码器，如图\
  \ 19-17 所示。\n\n![A978-1-4302-5786-8_19_Fig17_HTML.jpg](img/A978-1-4302-5786-8_19_Fig17_HTML.jpg)\n\
