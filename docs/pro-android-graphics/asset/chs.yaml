  \n图 16-21. 声明 `BitmapShader` 对象，并将其命名为 `imageShader`，以便在构造方法中使用\n\n你可能知道，着色器（shader）的概念在\
  \ 3D 渲染领域最为常见。在该领域中，着色器是纹理映射过程中的一个组件，负责在 3D 网格或线框对象之上放置一层“皮肤”或表面，使其具有实体外观，而非网格或线框外观。\n\
  \n`BitmapShader` 对象执行同样的表面映射过程，只不过是在 2D 环境中而非 3D 环境中，用于将你的 2D 图像资源应用到 `Paint` 表面。你可以把\
  \ `Paint` 对象想象成一支虚拟画笔，而着色器信息则指定了 `Bitmap` 对象将如何被绘制，或者更准确地说，如何映射到最终的 `Canvas` 对象的\
  \ 2D 表面上。\n\n接下来，我们来实例化你的 `imageShader` `BitmapShader` 对象，并用一个源图像资源以及一些常量对其进行配置。这些常量将告知着色器对象如何沿其\
