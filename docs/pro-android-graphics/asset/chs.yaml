  \ `PorterDuff.Mode`常量正确地“尊重”了 alpha 通道。如果它没有考虑 alpha 通道透明度，那么整个图像将是白色的，而不仅仅是图像中由\
  \ alpha 通道定义为不透明的圆形部分。\n\n接下来，进入你的 Java 代码，将`PorterDuff.Mode.XOR`常量替换为`PorterDuff.Mode.MULTIPLY`常量，再次使用**Run\
  \ As ➤ Android Application**工作流程，看看`MULTIPLY`混合模式如何将这两幅图像相乘，如图 11-15 屏幕截图右侧所示。你可以清楚地看到，`PorterDuff.Mode.MULTIPLY`常量也正确地尊重（考虑了）数字图像资产的\
