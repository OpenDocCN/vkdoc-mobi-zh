  ### 为 iTV 使用真正高清 1920x1080 数字视频素材\n\n大约十多年前，第二个进入数字领域的高清分辨率是行业所称的真正高清，即`1920x1080`。这个分辨率也是一个精确的`16:9`宽高比，并拥有超过两百万的像素，足以提供水晶般清晰的视频播放。真正高清分辨率也有如此多的像素，以至于它可能会拖慢一个较弱的（单核）处理器，并且也可能“挤占”任何较小的数据传输带宽。\n\
  \n使用此高清分辨率的设备包括`iTV`（互动电视）以及`Kindle Fire HD`，后者实际上在 8.9 英寸屏幕上采用了真正的`16:10`的`1920x1200`分辨率，使其更接近`240\
  \ DPI`的`HDPI`设备。对于`iTV`设备，屏幕尺寸决定了`DPI`，所以这次我们换个方向来计算：`1920/240=8`，所以一个 8 英寸宽的`iTV`（11\
  \ 英寸对角线）是`HDPI`；`1920/160=12`，所以一个 12 英寸宽的`iTV`（16 英寸对角线）是`MDPI`；`1920/120=16`，所以一个\
  \ 16 英寸宽的`iTV`（20 英寸对角线）是`LDPI`。这意味着大多数市面上的`iTV`都是`LDPI`。\n\n复制`WVGA`预设，右键点击它，然后选择`Edit`菜单选项，如图\
  \ 18-12 所示。一旦`Presets`对话框打开（如图 18-18 左侧所示），将预设命名为`Android1080x1920p`，并输入描述`Android\
  \ 1080x1920 Portrait`。将目标数据速率设置为`2048KBPS`，最大数据速率设置为比它多`150%`，即`3072KBPS`。\n\n![A978-1-4302-5786-8_18_Fig18_HTML.jpg](img/A978-1-4302-5786-8_18_Fig18_HTML.jpg)\n\
  \n图 18-18.\n\nAndroid 真正高清视频编解码器预设，使用`2MBPS`到`3MBPS`的数据速率和高质量编解码器\n\n你可以保持此`Presets`对话框右侧的设置不变，因为你希望匹配分辨率并使用每秒一个关键帧。\n\
  \n完成真正高清竖屏预设后，你可以通过相同的工作流程来创建你的真正高清横屏预设。现在你已经生成了所有的`MPEG-4`数字视频素材，你可以查看你所获得的压缩比率，并决定哪些最适合用于你的应用程序。\n\
  \n\n\n### 分析目标分辨率压缩比结果\n\n现在，您已经使用未压缩的 `.AVI` 文件创建了压缩后的 `.MP4` 文件，可以计算压缩比和压缩百分比，看看哪种分辨率能带来更优的压缩效果。您会发现，更高的分辨率效果会稍好一些。在做决定时，您还需要关注数字视频素材的文件大小。表\
  \ 18-1 汇总了计算结果；您可以在工作室中使用电子表格软件（例如开源软件 `OpenOffice Calc 4.0`，可从 [www.openoffice.org](http://www.openoffice.org)\
  \ 获取）进行类似操作。\n\n**表 18-1.** 行业标准硬件屏幕分辨率、原始数据大小、压缩后大小及压缩比\n\n| 分辨率 | 原始数据 | 压缩后 |\
  \ 压缩比 | 百分比 | 屏幕方向 |\n| --- | --- | --- | --- | --- | --- |\n| 640x360 | 270MB |\
  \ 2.5MB | 108:1 | 0.93% | 横向 |\n| 800x480 | 450MB | 3.8MB | 119:1 | 0.84% | 横向 |\n\
  | 1024x600 | 720MB | 5.0MB | 143:1 | 0.70% | 横向 |\n| 1280x720 | 1080MB | 7.5MB |\
  \ 143:1 | 0.70% | 横向 |\n| 1920x1080 | 2430MB | 9.9MB | 243:1 | 0.41% | 横向 |\n| 360x640\
  \ | 270MB | 2.5MB | 108:1 | 0.93% | 纵向 |\n| 480x800 | 450MB | 3.8MB | 119:1 | 0.84%\
  \ | 纵向 |\n| 600x1024 | 720MB | 5.0MB | 143:1 | 0.70% | 纵向 |\n| 720x1280 | 1080MB\
  \ | 7.5MB | 143:1 | 0.70% | 纵向 |\n| 1080x1920 | 2430MB | 10 MB | 243:1 | 0.41% |\
  \ 纵向 |\n\n您需要寻找的是兼具最佳压缩比、最小文件大小，且分辨率具有足够像素以进行高质量放大或缩小的选项。除了 True HD 达到的 243:1 压缩比，我个人倾向于\
  \ 5MB 的 WSVGA 压缩结果。1920 分辨率下达到 243:1 的结果让我怀疑该编解码器对高清分辨率有额外的优化——毕竟该产品的 99% 用户会使用此编解码器来处理他们的主流视频工作！\n\
  \n我会选择 WSVGA，因为 1024 分辨率可以以 2 倍的均匀系数放大到 1920（或 2048）分辨率屏幕，接近 1280 分辨率，并能高质量缩小到其他任何分辨率。再加上大多数\
  \ Android 设备具有精细的像素间距（通常为 HDPI，能隐藏任何缩放伪影），这样您只需 5MB（即每帧 13KB）就能拥有 400 帧的 3D 动画。\n\
  \n5MB 的视频文件占您 Android APK 最大 50MB 文件大小限制的 10%，因此作为启动画面背景视频板来说，这相当合理。\n\n需要注意的是，您的应用程序还可以最多访问两个额外的外部数据文件，每个最大为\
  \ 2GB。因此，只要视频优化得当，即使应用包含大量自有视频，也不会成为问题。\n\n让我们针对 1024x600 这个目标分辨率再尝试一件事。使用您在本章（以及第\
  \ 2 章）学到的工作流程，选择 1024x600 预设，并使用底部的复制图标复制一份预设，创建一个 HQ（高质量）预设。\n\n右键点击复制的预设，选择“编辑”，将目标数据速率设置为更高的\
  \ 1200 KBPS，并为最大数据速率提供 170% 的余量（即 2048 KBPS），让我们看看使用这些更高质量设置后，当前 5MB 文件大小会增加多少数据开销。\n\
  \n导入 `PAG1024x600.avi` AVI 未压缩源文件，应用这个新的编解码器预设，然后点击 `SqueezeIt!` 按钮压缩 MP4 文件。如果您能在文件小于\
  \ 6MB 的前提下获得更高的质量，那么 Android 就将拥有一个可用于高质量放大或缩小的优质视频数据源。\n\n如图 8-23 所示，生成的 MP4 文件大小为\
  \ 5.878 MB。因此，您或许可以在（目标）低端再提高一些质量；也许使用 1250 或 1280 KBPS 的目标数据速率，以确保即使在像素较大、伪影明显的大型（LDPI）屏幕上查看数据时，也看不到任何可见的伪影。\n\
  \n这个 1024x600 的目标分辨率应该能相当好地放大到 1280 或 1920，尤其是在 HDPI 屏幕（这是标配）上，因为像素非常小，伪影甚至不可见。可以这样理解：当您在\
  \ CES 展会上处理 Android 相关业务时，就像在看拉斯维加斯的大型 LED 广告牌。近距离观看时，像素看起来很糟糕；但离远些时，同样的多媒体内容看起来绝对完美无瑕。如今常见的这些更小像素间距的显示器，效果就像是让您的眼睛离内容更远了。\n\
  \n正如您所看到的，凭借 243:1 的压缩比，Sorenson Squeeze 展示了其能以很小的数据量提供惊人的视频质量，而且这还是在较老的 MPEG-4\
  \ 编解码器上实现的。使用更新的 WebM 视频编解码器可能会获得更好的效果——当然，这取决于视频内容。它也可能给出相同或更差的结果；除了进入 Squeeze，将未压缩的\
  \ AVI 源文件通过编解码器处理并查看结果之外，没有其他真正的方法可以确定。我们接下来就这么做。\n\n### 使用 WebM VP8 编解码器压缩伪高清视频\n\
