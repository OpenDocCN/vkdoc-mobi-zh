- '# 3. Android 帧动画：XML、概念与优化


  **摘要**


  在第三章中，我们将深入探讨如何在 Android 操作系统中利用数字图像创建基于帧的动画。我们将以前两章学到的关键概念为基础，因为第一章中介绍的所有数字成像特性同样适用于基于帧的动画。


  与数字视频类似，基于帧的动画也是一系列编号的数字图像。因此，你在第二章中学到的许多关键概念同样适用于基于帧的动画。因此，我们以最合理的顺序来涵盖这些最初的图形设计主题章节！


  在考虑帧动画压缩时，需要结合第一章和第二章的知识，因此本章将再次聚焦于数字图像压缩编解码器，以及如何以最优的新媒体数据文件格式和帧率来获得尽可能小的数据占用，从而获得最佳最终效果。


  我们将详细了解如何在 Android 操作系统内部使用 XML 和一个 `<animation-list>` XML 标签父容器来设置基于帧的动画。`<animation-list>`
  标签允许将各个动画帧添加到你的基于 XML 的 2D 帧动画多媒体资源中。


  我们还将了解如何将这些 XML 帧动画数据定义连接到应用程序代码中的 Java 编程逻辑。为此，我们将仅使用一个 3D 标志的九个图像帧，为你的图形设计项目创建启动画面帧动画资源。


  ### 帧动画概念：赛璐珞片、帧率与分辨率


  基于帧的动画也可以称为基于赛璐珞片的动画，这源于华特·迪士尼最初创作的 2D 动画。迪士尼的动画师在当时称之为赛璐珞片的材料上作画，以表现其卡通动画中的每一帧。


  后来，随着电影的出现，术语“帧”在很大程度上取代了“赛璐珞片”。这是因为模拟电影放映机每秒显示 24 帧胶片。这些电影胶片通过观众席上方放映室里电影放映机中转动的大卷连续胶片来播放。


  数字帧动画的技术术语是光栅动画，因为帧或赛璐珞片由像素集合（也称为光栅图像）组成。光栅图像通常也称为位图，事实上，在 Microsoft Windows 中确实有一种位图（`BMP`）文件格式，尽管
  Android 操作系统目前不支持这种数字图像文件格式。


  因此，在多媒体制作行业中，光栅动画也常被称为位图动画。我在本书中将交替使用这些不同的术语，这样你会习惯使用所有这些不同（但准确）的术语来指代你的基于帧的 2D
  动画，这种动画使用数字图像来制作 2D 动画。


  Android 支持与你在应用程序中用于 2D 图像的相同的开源数字图像数据文件格式，以便在帧动画资源中使用。仔细想想，这合乎逻辑，因为 2D 动画是以这些独立的数字图像为基础来定义的。


  其意义在于，我们可以使用索引颜色图像，通过 `PNG8` 或 `GIF` 格式来创建 8 位帧动画。我们也可以使用真彩色图像，通过 `PNG24`、`PNG32`
  或 `JPEG` 数字图像数据文件格式来创建 24 位或 32 位帧动画。


  同数字图像数据文件格式一样，Android 在帧动画中更倾向于使用 `PNG` 数据格式，而非 `GIF` 或 `JPEG` 格式。这是因为它具有无损图像质量和相当不错的图像压缩效果，在开发人员能力足够的情况下，能提供高质量的用户体验。


  这里还需要注意一个重要点，Android 目前不支持动画 `GIF`（也称为 `animGIF` 或 `aGIF`）作为一种文件格式。


  网上有一些关于 Android 在添加对此格式支持之前的临时解决方案，但考虑到 `PNG8` 能提供更好的压缩效果，并且通过 XML 定义帧以及通过 Java
  控制帧能让我们对最终结果拥有更强的控制力，因此在本书的版本中，我将重点介绍目前 Android 支持的解决方案和方法。


  因此，在 Android 添加此支持之前，你最好的选择是使用数字视频或基于帧的动画，这就是为什么我们在本书很靠前的部分就如此详细地介绍这两个主题，因为我们在本书中会经常并以多种不同方式使用它们。


  对几种主流数字图像文件格式的选择，为我们优化帧动画的数据占用提供了相当大的自由度；由于支持 `PNG32`，它还允许我们利用 alpha 通道透明度来实现强大的图像合成工作流程。


  图像合成和数据占用优化将成为你专业的 Android 2D 图形设计工作流程中名副其实的基石，正如你将在本书中看到的，我们将利用编解码器、alpha 通道和混合技术来实现这一目标。




  ### 优化帧动画：色彩深度与帧速率


  在帧动画中，主要有三种方式可优化以减小数据体积：降低分辨率、降低色彩深度和降低帧速率。由于在 Android 4.3 中我们必须提供四种不同的分辨率密度目标，因此我们将重点关注另外两种方法，因为我们几乎被锁定在必须提供至少涵盖
  100 像素到 640 像素甚至更高的分辨率范围内，正如你将在本章后面看到的那样。


  由于可以在无损的 `PNG32`（即具有完整 8 位 Alpha 通道的真彩色 PNG）和索引色 `PNG8`（具有 1 位开关式 Alpha）之间进行选择，你可以对应用程序中后续无需合成（使用
  8 位 Alpha 通道）的动画元素使用无损的 `PNG8`。


  如果你的动画不需要与其他图形进行合成，你还可以考虑使用有损的 JPEG 格式，通过舍弃部分图像数据及相应的质量，来获得每个帧更小的数据体积。然而，需要注意的是，这种方法可能会增加动画每一帧中的图像伪影。如果在制作动画伪影时施加了过多的压缩，就会导致所谓的像素爬行现象。对于
  JPEG 动画，不仅会出现伪影，而且由于媒介是动态的，伪影出现在每一帧的不同像素位置上，就像它们在挥手呐喊：“我在这儿！我是个重要的伪影！”这可不是良好的用户体验。


  正如你可以通过使用索引色（8 位）色彩深度来优化 2D 动画一样，你也可以通过使用帧速率 (`FPS`) 来优化 2D 动画，因为同样的概念适用于位图动画和数字视频：需要存储的帧数越少，意味着数据量越少，从而导致应用程序体积更小。


  因此，能够实现逼真运动效果的帧速率越低，你需要在 XML 标记中定义的帧数就越少。更重要的是，更少的帧数将需要更少的处理能力来播放基于帧的动画，并且在它们显示到设备视图屏幕之前，占用更少的内存资源来保存这些帧。实际上，在本章中，你只需要使用九帧动画，就能为你的
  Pro Android Graphics 动画 3D 徽标处理获得专业级的效果。


  随着应用程序中包含的帧动画越来越多，数据体积优化变得愈发重要。诸如游戏和电子书之类的新媒体应用，在应用程序的活动屏幕上通常会同时运行多个帧动画。因此，你需要考虑到用户的处理器能力和系统内存可能比较稀缺，所以要像对待最宝贵的资源一样对待它们！一旦你的应用完全运行起来，就需要进行仔细的优化，以免耗尽用户
  Android 设备的硬件资源。


  最后，每一帧中的像素数量，或者说基于帧的动画的帧分辨率，对于优化帧动画资产的数据体积至关重要。回顾我们在第 1 章中讨论过的原始图像数据计算，并将其应用于动画中的每一帧，以便计算保存基于帧的动画所需的精确原始数据系统内存空间（体积）。


  就像你对静态数字图像所做的那样，你需要提供至少四个密度匹配的光栅动画图像目标分辨率，才能覆盖所有流行的 Android 设备屏幕密度。基于这个原因，如果你能让动画在每个维度上都缩小几十个像素而不影响其视觉效果，那么这将在最终环节累积成可观的节省——这里没有双关之意。


  同样重要的是，要裁剪掉动画中任何未使用的像素，以便动画元素尽可能靠近（仅一个像素的距离）图像容器的边缘。我在本章使用的所有动画帧图像资产中都这样做了，因此你将能够确切理解我的意思。


  我将一套 SVGA 800 x 600 像素的 3D 渲染动画帧集裁剪到了 640 x 500 像素；让我们计算一下这样节省了多少内存。800 x 600 是每帧
  480,000 像素，将近 50 万像素。640 x 500 是每帧 320,000 像素，因此差值（节省量）是每帧 160,000 像素，即立即减少了 33%
  的数据。让我们计算一下节省的内存。


  160,000 像素乘以 4 个 (`ARGB`) 色彩通道，得到每帧需要 640,000 像素的系统内存数据。再乘以 9 帧，我节省了 5,760,000 像素的数据（内存）。最后，除以
  1,024，我通过裁剪未使用的像素节省了 5.625 兆字节的内存。被裁剪掉的像素原本仅用于表示 Alpha 通道或透明度值，因为它们只是动画对象周围的空间。


  类似于你在第 1 章中学到的关于静态数字图像的知识，Android 会自动决定为操作系统运行的每个设备屏幕使用哪个 2D 帧动画像素密度。最大的 640 x 500
  像素帧动画资产用于 `XHDPI`（iTV 是 1920 x 1080，高清平板是 1920 x 1200）分辨率密度。请注意，我还创建了三个较低分辨率的资产，一直低到用于手表和翻盖手机的
  80 像素版本。


  只要你在帧动画的各个单元（或帧）中支持所有主要的像素密度分辨率级别，你就能每次都在当前电子市场上所有类型的 Android 设备上，为你的 2D 位图动画资产获得卓越的视觉效果。




  ### 使用 XML 标记在 Android 中创建逐帧动画


  基于帧的动画在 Android 中通过包含 XML 标记的 XML 文件来定义。该 XML 文件存储在项目的`/res/drawable`文件夹中，本章稍后将通过一个动手实践示例，指导你使用
  Eclipse 创建这个 XML 标记。


  你可能会好奇为什么这个 XML 文件放在`/res/drawable`文件夹而不是`/res/anim`文件夹，这是因为 Android 中有两种动画类型。逐帧动画使用可绘制资源文件夹，而程序化动画（详见第
  4 章）则使用`/res/anim`文件夹。


  逐帧动画 XML 文件会利用与逐帧动画相关的特殊 XML 标签，在动画定义中指定各个单独的帧（本质上，这就是你的 2D `AnimationDrawable`对象构造器）。


  这个 XML 结构指示你的应用 Java 代码如何将动画帧加载到 Android 的`AnimationDrawable`对象中。如果你想了解更多关于 Android
  操作系统`AnimationDrawable`类的详细信息，可以通过以下网址查找：


  [`developer.android.com/reference/android/graphics/drawable/AnimationDrawable.html`](http://developer.android.com/reference/android/graphics/drawable/AnimationDrawable.html)


  `AnimationDrawable`类是 Android 的逐帧动画类，它允许你实例化一个`AnimationDrawable`对象。该对象将保存逐帧动画数据，在你在应用程序
  Java 代码中实例化`AnimationDrawable`对象后，这些数据会在运行时加载到系统内存中。


  实例化该对象后，你可以从应用程序 Java 代码中调用它的`.start()`方法。如果动画由交互触发，通常会在事件处理器内部调用；如果动画旨在启动画面中自动运行（就像你的动画将要实现的那样），则可能在`onCreate()`方法内部调用。


  Android 中某些类型的逐帧动画也可以仅通过 XML 标记自动启动，无需在 Java 代码中使用`.start()`方法专门触发。在本书的后续内容中，我们将会探讨这两种设置基于帧的动画的方式。


  逐帧动画的 XML 结构实质上会创建一个编号数字图像文件数组，这些文件代表了动画中的各帧。每个帧还有一个参数，用于指定该帧在屏幕上显示的时长。该时长值需以毫秒为单位指定，使用表示千分之一秒增量的整数值。一秒对应整数值`1000`。


  ### Android `<animation-list>` 标签：父级帧容器


  大部分 2D 基于帧的动画资源将通过使用`<animation-list>` XML 父级标签及其参数来创建。你将用到的主要参数是`android:one-shot`，它控制动画是连续循环播放，还是“播放一次”的播放设置。


  稍后，你将通过文件名（不含扩展名）引用包含这个`<animation-list>`父级标签及其子标签的 XML 文件。你将创建一个使用`anim_intro.xml`文件名的逐帧动画
  XML 定义，但在 Android XML 标记和 Java 代码中将其引用为`anim_intro`。一旦在 XML 中定义了该`<animation-list>`，你将能够在任何
  UI 或 UX 设计中引用它所定义的基于帧的动画。


  最后，还有一个`android:id`参数，如果你打算在 Java 代码中引用你的`<animation-list>`标签（即通过`.start()`方法调用来控制动画），就可以使用它。正如你稍后将看到的，还有另一种通过
  XML 自动启动动画的方式，这样你就不必使用 ID 参数了——ID 参数通常是为了让 Java 代码能够引用 XML 标签结构而提供的。


  ### Android `<item>` 标签：指定动画帧


  `<animation-list>`标签始终是一个父级标签，因为它被设计用来包含`<item>`标签，这些`<item>`标签永远是子标签。item 标签用于定义`<animation-list>`标签中的帧，每个帧对应一个`<item>`标签，包含该动画帧的文件名和帧显示时长引用。


  在你的 Android `AnimationDrawable`对象的逐帧动画 XML 定义中，每个帧都会有自己对应的`<item>`子标签。该标签引用该帧的可绘制图像文件资源，以及一个帧显示时长值，用于指定它在屏幕上停留的时间。


  这些`<item>`标签将按照显示顺序存在于父级`<animation-list>`容器内，就像你将动画帧加载到一个数据数组中一样——实际上，你确实是在这样做。


  需要特别注意的一点区别是：`AnimationDrawable`对象（或类）使用的是可绘制（位图图像）资源，而`Animation`对象（或类，你将在第 4 章中全面了解）则不使用。


  不过，如果你需要对逐帧动画应用程序化变换或 alpha 混合以实现更复杂的效果，`AnimationDrawable`对象可以被`Animation`对象引用。这就是为什么我们将在下一章中介绍如何创建程序化动画时，会讲解`Animation`类。


  ### 为我们的 GraphicsDesign 应用创建逐帧动画


  让我们言归正传，创建一个将在你的启动（闪屏）屏幕数字视频资源上播放的逐帧动画。这样，你就可以立即开始进行数字视频和 2D 动画资源的高级合成操作！


  为了获得完美的合成效果，你将使用 PNG32 格式作为动画帧。PNG32 具有 8 位 alpha 通道，其中包含用于动画 3D 文字（Pro Android
  Graphics）的边缘抗锯齿数据。


  你将这样设置，即使后续决定更换数字视频资源，或者允许用户从多个数字视频背景选项中选择，合成的 2D 动画结果看起来仍会像数字视频数据的一部分。只有我们 Android
  开发者才知道，这实际上是两个独立的内容资源，而等到下一章结束后，这些资源数量将不止两个！


  首先，你将学习如何将九个动画帧复制到项目对应的可绘制资源文件夹中。接下来，你将创建一个 XML 文件来保存逐帧动画定义。完成后，你将修改现有的`activity_main.xml`用户界面设计的
  XML 标记，使用`ImageView`小部件来引用新的逐帧动画。


  当你放置好所有资源并编写完所有 XML 标记后，将添加 Java 代码，将 XML 数据加载到`AnimationDrawable`对象中，并在应用启动时启动它。具体操作是：在
  Eclipse 中编辑`MainActivity.java`类，并修改`onCreate()`方法，在其中创建、加载并启动你的`AnimationDrawable`对象！




