  \ `onDraw()` 方法了，该方法将包含 `SketchPadView` View 子类的 `核心处理` 逻辑。\n\n### 实现 `onDraw()`\
  \ 方法：绘制画布\n\n要实现 `onDraw()` 方法，你需要做的第一件事是搭建好能容纳 Java 处理逻辑的框架。\n\n这是通过在你的 `SketchPadView`\
