  \ `/GraphicsDesign` 文件夹，然后导航到资源（`/res`）文件夹，并在其下方找到你的 `/drawable-xhdpi` 图像资源文件夹，如图\
  \ 9-5 所示。接下来，在“名称”字段中输入一个全小写的 `imagebutton_normal.png` 文件名，然后点击对话框右下角的“导出”按钮来创建文件。\n\
