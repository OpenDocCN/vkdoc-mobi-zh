  ### 为 ImageView 图像资源添加投影效果


  现在，让我们使用 GIMP 2.8.6 开源数字图像编辑与合成软件，为 `bookmark0.png` 图像资源添加投影效果。


  启动 GIMP 2.8 并打开您之前复制到 `/res/drawable-xhdpi` 文件夹中的 `bookmark0_640px.png` 文件。您应始终使用分辨率最高的图像文件，因为您需要对其进行下采样，以便为其他三个分辨率密度文件夹提供资源。图
