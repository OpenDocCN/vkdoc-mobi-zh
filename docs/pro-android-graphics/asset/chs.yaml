  \ 对象\n\n请注意，在图 14-5 中，你的 `pag` `ImageView` 对象尚未被使用，因此它附带了波浪形的黄色警告下划线高亮。你可以暂时忽略它，因为你很快会在将\
  \ `AnimationDrawable` 连接到 `ImageView` 进行显示时使用到这个对象。\n\n\n\n### 使用 `AnimationDrawable`\
  \ 类的 `.addFrame()` 方法\n\n现在你已经构建了一个空的 `AnimationDrawable` 对象，可以使用 `.addFrame()`\
  \ 方法向该对象添加帧及其持续时间，其方式与你之前使用 XML `<animation-list>` 父标签和 `<item>` 子标签的方式大致相同。\n\n\
  你将像上一章那样，在 `.addFrame()` 方法调用的内部，使用方法链来提取你的 `Drawable` 引用，使用以下略显冗长的 Java 代码结构：\n\
  \n```\nframeAnimation.addFrame(getResources().getDrawable(R.drawable.pag0), 112);\n\
  ```\n\n这调用了 `frameAnimation` `AnimationDrawable` 对象上的 `.addFrame()` 方法。在 `.addFrame()`\
