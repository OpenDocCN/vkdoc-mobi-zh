  ### 创建用于绘制 Drawable 画布的 Paint 对象\n\n你要添加的第一件事，是在 `ImageRoundingDrawable` 类定义的第一行，声明一个\
  \ `Paint` 对象变量。这是通过以下简单的 Java 代码语句完成的：\n\n`private Paint paintObject;`\n\n你将使用 `private`\
  \ 访问控制，以便只有你的 `ImageRoundingDrawable` 类能够访问和利用这个即将被自定义的 `Paint` 对象。\n\n如图 16-19\
