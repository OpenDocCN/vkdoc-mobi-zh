  \ 像素的圆（即你的画笔）。\n\n### 创建 `OnTouchListener()` 方法：事件处理\n\n接下来，你将折叠（使用左侧的减号图标）你正在处理的方法，并展开（也使用左侧的加号图标）你的\
  \ `onTouch()` 方法调用，如图 17-21 所示。如你所见，每次处理触摸（屏幕）事件时，你想做的第一件事就是使用 `new` 关键字实例化一个名为\
  \ `point` 的 `Coordinate` 对象，如下所示：\n\n`Coordinate point = new Coordinate();`\n\n\
  ![A978-1-4302-5786-8_17_Fig21_HTML.jpg](img/A978-1-4302-5786-8_17_Fig21_HTML.jpg)\n\
  \n图 17-21. 在 `onTouch()` 事件处理方法内部，将 `point` 构造为一个新的 `Coordinate` 对象\n\n\n\n### Android\
  \ 的 MotionEvent 类：Android 中的移动数据\n\nAndroid 的 `MotionEvent` 类是一个 `public class`，它继承自\
  \ `InputEvent` 并实现了 `Parcelable` 接口。\n\nAndroid 的 `MotionEvent` 类层次结构如下所示：\n\n`java.lang.Object`\n\
  \  `> android.view.InputEvent`\n    `> android.view.MotionEvent`\n\nAndroid 的 `MotionEvent`\
  \ 属于 `android.view` 包，这就是你在 `SketchPadView` 的 `View` 子类中使用它的原因。因此，在你的应用中为了使用这个 `MotionEvent`\
  \ 类，所需的 `import` 语句引用的是 `android.view.MotionEvent` 包路径结构。\n\n`MotionEvent` 是一个可用于报告\
  \ Android 操作系统中移动事件的对象。这种移动可能来自用户在 `TouchMode` 下的手指，也可能来自`鼠标`、`轨迹球`、`导航键`、`光笔`、`游戏控制器`、`3D\
  \ 轨迹球`或类似的能够（将会）生成 `MotionEvent` 的 Android 硬件特性。\n\n`MotionEvent` 对象可以容纳绝对或相对移动数据，以及其他类型的相关数据。加载到\
  \ `MotionEvent` 对象数据结构中的数据最终将取决于最初是哪种类型的硬件设备生成了这个移动数据流。\n\n`MotionEvent` 对象使用一个动作代码和一组轴值来编码移动数据。除非你的用户使用的是\
  \ 3D 控制器，否则轴值通常为 X 和 Y，与你本章应用中的情况一致。\n\n该动作代码将指定自上次 `MotionEvent` 以来发生的状态变化，例如，鼠标指针是按下了还是释放了。\n\
  \n轴值描述了坐标位置以及其他移动属性，这些值正是你将在本章下一部分中从 `arg1` 这个 `MotionEvent` 对象中提取的值。\n\n现代 Android\
  \ 设备可以同时跟踪多个移动数据。某些 Android 硬件支持`多点触控`显示屏，可以为每个用户的手指广播一个移动数据流。产生移动数据流的单个手指和其他对象被称为指针。\n\
  \n我们在 `SketchPad` 应用中不使用`多点触控`移动数据，因为 AVD 模拟器目前不支持此功能。我们需要使用每个读者都能访问和利用的平台（方法）来运行本书中创建的软件，因此我们使用的是\
  \ Eclipse IDE 中的 AVD。\n\n`MotionEvent` 对象包含关于所有当前正在使用的指针的信息，即使其中某些指针自上次 Android\
  \ 操作系统传递 `MotionEvent` 对象以来未曾移动过。\n\nAndroid 的 `MotionEvent` 类定义了多种可用于访问坐标位置以及指针其他属性的不同方法。其中包括我们将用到的\
  \ `.getX()` 和 `.getY()` 方法调用。\n\n`MotionEvent` 类的其他方法调用允许从 `MotionEvent` 对象中提取更精细或更详细的数据，例如\
  \ `.getAction()`、`.getFlags()`、`.getOrientation()`、`.getSize()`、`.getAxisValue()`、`.getDeviceId()`、`.getSource()`、`.getMetaState()`\
  \ 以及其他众多方法。\n\n`MotionEvent` 方法调用使用指针索引作为参数，而不是使用指针 ID 值。`MotionEvent` 对象中包含的每个指针的指针索引范围从零到\
  \ `.getPointerCount()` 方法调用返回的值减一。正如你所见，在处理 `MotionEvent` 对象时，由于通过绘制处理管道实时流动的数据量巨大，因此有必要使用数组。\n\
  \n单个指针数据在 `MotionEvent` 对象中出现的顺序是不确定的。因此，指针的索引可能会从一个 `MotionEvent` 对象变为另一个。然而，只要指针保持活跃状态，其指针\
  \ ID 将始终保持不变。\n\n### 处理你的移动数据：使用 .getX() 和 .getY()\n\n一旦你创建了一个 `point` 的 `Coordinate`\
  \ 对象来容纳通过 `arg1` 这个 `MotionEvent` 对象传入 `onTouch()` 方法的浮点型 X 和 Y 值，你便可以调用 `.getX()`\
