  \ 2-24 所示的对话框，以便您导航至 AVI 文件夹并打开一个文件。\n\n![A978-1-4302-5786-8_2_Fig24_HTML.jpg](img/A978-1-4302-5786-8_2_Fig24_HTML.jpg)\n\
