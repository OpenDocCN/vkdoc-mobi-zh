  \ GIMP 原生文件格式的图像合成版本，以防将来因任何原因需要用到。在 GIMP 中，可通过`文件`菜单下的`保存`或`另存为`选项来完成此操作。\n\n执行此操作将打开`保存图像`对话框（见图\
  \ 9-12），该对话框允许你将当前的 GIMP 项目以原生`.XCF`文件格式保存到原始图像合成资源所在的文件夹中。此文件包含你在数字图像合成工作流程中创建的所有图层和设置——我们在本章的这一部分中学习了如何创建各种`ImageButton`状态的数字图像资源。\n\
