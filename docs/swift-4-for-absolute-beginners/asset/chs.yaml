  \    18 print(\"totalSum = \\(totalSum)\")\n    ```\n\n    代码清单 3-3. Playground\
  \ 加法演示\n\n你的 playground 应该如图 3-6 所示。\n\nPlaygrounds 的一个巧妙特性是，当你输入代码时，Swift 会立即执行你输入的每一行代码，因此你可以马上看到结果。\n\
  \n![A341013_4_En_3_Fig6_HTML.jpg](img/A341013_4_En_3_Fig6_HTML.jpg)\n\n图 3-6. 显示\
  \ Swift 代码结果的 Playground\n\n在 Swift 编程中使用的 `//` 使程序员可以为代码添加注释。注释不会被应用程序编译，它们作为程序员的笔记，或者更重要的是，作为后续开发人员的参考。注释有助于原始开发者和后来的开发者理解应用程序的开发方式。\n\
  \n有时，注释可能需要跨越多行，或仅覆盖一行中的部分内容。这可以通过 `/*` 和 `*/` 来实现。`/*` 和 `*/` 之间的所有文本都被视为注释，不会被编译。\n\
  \n`print` 是一个函数，它可以接受一个参数并打印其内容。\n\n**注意**：如果你的编辑器的菜单或装订线（包含程序行号的左列）与之前的截图不同，你可以在\
  \ `Xcode` 偏好设置中开启这些设置。你可以通过点击菜单栏中的 `Xcode` 菜单，然后选择“偏好设置”来打开 `Xcode` 偏好设置。参见图 3-7。\n\
  \n![A341013_4_En_3_Fig7_HTML.jpg](img/A341013_4_En_3_Fig7_HTML.jpg)\n\n图 3-7. 为装订线添加行号\n\
  \n## 总结\n\n在本章中，你学习了应用程序如何使用数据。你了解了如何初始化变量以及如何向它们赋值。我们解释了变量在声明时会关联一个数据类型，并且只有相同类型的数据才能赋值给变量。我们还讨论了变量与常量之间的区别，并介绍了可选类型。\n\
  \n在下一章中，我们将探讨如何使用布尔逻辑来控制应用程序中的数据流。\n\n## 练习\n\n* 在 Swift playground 中编写代码，将两个整数相乘并显示结果。\n\
  * 在 Swift playground 中编写代码，计算一个浮点数的平方并显示结果浮点数。\n* 在 Swift playground 中编写代码，将两个浮点数相减，并将结果存储为整数。请注意，不会进行四舍五入。\n\
  \n"
- '# 做出决策、程序流程与应用程序设计


  作为一名 iOS 开发者，最棒的事情之一就是你可以精确地告诉你的设备你想要做什么，它们就会照做——你的设备会不厌其烦地重复执行任务。这是因为 iOS 设备不在乎它们昨天有多辛苦，也不会让情绪干扰工作。这些设备不需要拥抱。


  而作为开发者，也有一个缺点：你必须考虑应用程序中所有可能出现的结果。许多开发者喜欢拥有这种控制权。他们乐于专注于应用程序的诸多细节；然而，需要处理如此多的细节有时会令人沮丧。正如本书引言中提到的，开发应用程序需要付出代价，这个代价就是时间。你花在开发和调试上的时间越多，就越能掌握所有细节，你的应用程序表现也越好。你必须付出这个代价才能成为一名成功的开发者。


  计算机世界是黑白分明的，没有灰色地带。你的设备产生的结果，很多都基于真和假的条件。


  在本章中，你将学习计算机逻辑以及如何控制应用程序的流程。处理信息并得出结果是一切应用程序的核心。你的应用程序需要基于值和条件来处理数据。要做到这一点，你需要理解计算机如何执行逻辑运算，并根据应用程序获取的信息来执行代码。




  '
- '# 布尔逻辑


  布尔逻辑是一种用于逻辑运算的系统。它使用二元运算符（如`AND`和`OR`）以及一元运算符`NOT`来判断条件是否满足。二元运算符需要两个操作数，一元运算符需要一个操作数。


  前面我们引入了几个可能令人困惑的新术语；不过，你很可能每天都在使用布尔逻辑。让我们看几个父母与青春期孩子对话中运用二元运算符`AND`和`OR`的布尔逻辑示例：


  “如果你的房间打扫干净了`AND`盘子也收拾好了，今晚你就可以去看电影。”


  “如果你的房间打扫干净了`OR`盘子也收拾好了，今晚你就可以去看电影。”


  布尔运算符的结果要么是`TRUE`，要么是`FALSE`。在第 3 章中，我们简要介绍了布尔数据类型。定义为布尔类型的变量只能包含`TRUE`和`FALSE`这两个值。


  ```

  var seeMovies: Bool = false

  ```


  在前面的示例中，`AND`运算符需要两个操作数：一个在`AND`左侧，一个在右侧。每个操作数都可以独立判断为`TRUE`或`FALSE`。


  要使`AND`运算的结果为`TRUE`，`AND`两侧的操作数都必须为`TRUE`。在第一个示例中，青少年必须打扫房间`AND`洗完盘子。只要其中一个条件为`FALSE`，结果就是`FALSE`——青少年不能去看电影。


  要使`OR`运算的结果为`TRUE`，只需要一个操作数为`TRUE`，或者两个条件都为`TRUE`即可。在第二个示例中，只需卧室干净就能去看电影。


  注意


  在 Objective-C 和其他编程语言中，布尔变量可以存放整型变量；`0`代表`FALSE`，任何非零值代表`TRUE`。Swift 强大的类型检查不允许这样做。Swift
  中的布尔变量只能赋值为`true`或`false`。


  `NOT`语句是一元运算符。它只需要一个操作数就能产生布尔结果。示例如下：


  “你`NOT`能去看电影。”


  这个示例只用一个操作数。`NOT`运算符将`TRUE`操作数变为`FALSE`，将`FALSE`操作数变为`TRUE`。这里的结果是`FALSE`。


  `AND`、`OR`和`NOT`是三种常见的布尔运算符。有时你可能需要使用更复杂的运算符。`XOR`、`NAND`和`NOR`是 iOS 开发者常用的其他运算。


  布尔运算符`XOR`表示异或。记忆`XOR`运算符工作方式的一个简单方法是：只有当且仅当一个参数为`TRUE`（而非两者同时为`TRUE`）时，`XOR`运算符才返回`TRUE`结果。


  Swift 没有内置`NAND`和`NOR`运算符，但只需知道它们分别表示“与非”和“或非”即可。在评估`AND`或`OR`的参数后，直接对结果取反。


  ## 真值表


  你可以使用一种称为真值表的工具来评估所有布尔运算符，它是逻辑学中用于评估布尔运算符的数学表格。在试图确定布尔运算符的所有可能性时，真值表非常有用。我们来看一些常见的`AND`、`OR`、`NOT`、`XOR`、`NAND`和`NOR`真值表。


  在`AND`真值表中，共有四种`TRUE`和`FALSE`的组合。


  *   `TRUE AND TRUE` = `TRUE`

  *   `TRUE AND FALSE` = `FALSE`

  *   `FALSE AND TRUE` = `FALSE`

  *   `FALSE AND FALSE` = `FALSE`


  将这些组合放入真值表中，结果如表 4-1 所示。


  **表 4-1.** AND 真值表


  | A | B | A AND B |

  | --- | --- | --- |

  | `TRUE` | `TRUE` | `TRUE` |

  | `TRUE` | `FALSE` | `FALSE` |

  | `FALSE` | `TRUE` | `FALSE` |

  | `FALSE` | `FALSE` | `FALSE` |


  `AND`真值表只有在两个操作数均为`TRUE`时才产生`TRUE`结果。


  表 4-2 展示了`OR`真值表及其所有可能的操作数。


  **表 4-2.** OR 真值表


  | A | B | A OR B |

  | --- | --- | --- |

  | `TRUE` | `TRUE` | `TRUE` |

  | `TRUE` | `FALSE` | `TRUE` |

  | `FALSE` | `TRUE` | `TRUE` |

  | `FALSE` | `FALSE` | `FALSE` |


  `OR`真值表当一个或两个操作数为`TRUE`时产生`TRUE`结果。


  表 4-3 展示了`NOT`真值表及其所有可能的操作数。


  **表 4-3.** NOT 真值表


  | A | NOT A |

  | --- | --- |

  | `TRUE` | `FALSE` |

  | `FALSE` | `TRUE` |


  `NOT`运算会翻转比特位或取反原始操作数的布尔值。


  表 4-4 展示了`XOR`（异或）真值表及其所有可能的操作数。


  **表 4-4.** XOR 真值表


  | A | B | A XOR B |

  | --- | --- | --- |

  | `TRUE` | `TRUE` | `FALSE` |

  | `TRUE` | `FALSE` | `TRUE` |

  | `FALSE` | `TRUE` | `TRUE` |

  | `FALSE` | `FALSE` | `FALSE` |


  运算符`XOR`只有当且仅当一个操作数为`TRUE`时才会产生`TRUE`结果。


  表 4-5 展示了`NAND`真值表及其所有可能的操作数。


  **表 4-5.** NAND 真值表


  | A | B | A NAND B |

  | --- | --- | --- |

  | `TRUE` | `TRUE` | `FALSE` |

  | `TRUE` | `FALSE` | `TRUE` |

  | `FALSE` | `TRUE` | `TRUE` |

  | `FALSE` | `FALSE` | `TRUE` |


  表 4-6 展示了`NOR`真值表及其所有可能的操作数。


  **表 4-6.** NOR 真值表


  | A | B | A NOR B |

  | --- | --- | --- |

  | `TRUE` | `TRUE` | `FALSE` |

  | `TRUE` | `FALSE` | `FALSE` |

  | `FALSE` | `TRUE` | `FALSE` |

  | `FALSE` | `FALSE` | `TRUE` |


  理解`NAND`和`NOR`运算符最简单的方法，就是分别对`AND`和`OR`真值表的结果直接取反。


  ## 比较运算符


  在软件开发中，你可以使用比较运算符来比较不同的数据项。这些运算符会产生逻辑上的`TRUE`或`FALSE`结果。表 4-7 列出了比较运算符。


  **表 4-7.** 比较运算符


  | 运算符 | 定义 |

  | --- | --- |

  | `>` | 大于 |

  | `<` | 小于 |

  | `>=` | 大于或等于 |

  | `<=` | 小于或等于 |

  | `==` | 等于 |

  | `!=` | 不等于 |


  注意


  如果你总记不清大于号和小于号的方向，可以用我们小学时学到的一个小窍门：把大于号和小于号想象成鳄鱼的嘴巴，鳄鱼总是吃掉更大的数值。听起来可能有点傻，但很管用。


  '
- "# 设计应用\n\n既然我们已经介绍了布尔逻辑和比较运算符，你就可以开始设计应用了。有时，无需编写实际代码，向他人表达应用的全部或部分功能也是非常重要的。\n\
  \n编写伪代码有助于开发者理清思路，并与其他开发者就关注的代码段进行头脑风暴。这有助于在编码开始前分析问题并寻找可能的解决方案。\n\n\n\n### 伪代码\n\
  \n伪代码是指以高级方式描述待求解算法的代码。伪代码不包含编程所需的语法规范，但它能表达解决当前问题所必需的算法逻辑。\n\n你可以在纸上（或白板上）手写伪代码，也可以在电脑上录入。\n\
  \n使用伪代码时，你可以运用关于布尔数据类型、真值表以及比较运算符的知识。请参考清单 4-1 中的伪代码示例。\n\n> **注意**  \n> 伪代码用于表述和传授编程思路。伪代码无法实际运行！\n\
  \n```\nx = 5\ny = 6\nisComplete = TRUE\nif x < y\n{\n// 在此示例中，x 小于 6\n执行相应操作\n}\n\
  else\n{\n执行其他操作\n}\nif isComplete == TRUE\n{\n// 在此示例中，isComplete 等于 TRUE\n执行相应操作\n\
  }\nelse\n{\n执行其他操作\n}\n// 另一种判断 isComplete == TRUE 的方式\nif isComplete\n{\n// 在此示例中，isComplete\
  \ 为 TRUE\n执行相应操作\n}\n// 两种判断值为 false 的方式\nif isComplete == FALSE\n{\n执行相应操作\n}\n\
  else\n{\n// 在此示例中，isComplete 为 TRUE，因此将执行 else 代码块\n执行其他操作\n}\n// 另一种判断 isComplete\
  \ == FALSE 的方式\nif !isComplete\n{\n执行相应操作\n}\nelse\n{\n// 在此示例中，isComplete 为 TRUE，因此将执行\
  \ else 代码块\n执行其他操作\n}\n清单 4-1.\n在 if-then-else 代码中使用条件运算符的伪代码示例\n```\n\n请注意，`!`\
  \ 会反转其作用的布尔值，因此使用 `!` 会将 `TRUE` 变为 `FALSE`，将 `FALSE` 变为 `TRUE`。这是 Swift 中的逻辑非运算符。\n\
  \n通常，我们需要组合使用比较测试。复合关系测试是指由 `&&` 或 `||`（两个管道符）连接的一个或多个简单关系测试。\n\n在 Swift 中，`&&`\
  \ 和 `||` 分别代表逻辑与和逻辑或。清单 4-2 中的伪代码演示了逻辑与和逻辑或运算符的使用。\n\n```\nx = 5\ny = 6\nisComplete\
  \ = TRUE\n// 使用逻辑与\nif x < y && isComplete == TRUE\n{\n// 在此示例中，x 小于 6 且 isComplete\
  \ == TRUE\n执行相应操作\n}\nif x < y || isComplete == FALSE\n{\n// 在此示例中，x 小于 6。\n// 对于逻辑或，只需一个操作数为\
  \ TRUE 即可使结果为 TRUE。\n// 参见表 4–2 逻辑或真值表\n执行相应操作\n}\n// 另一种判断 TRUE 的方式\nif x < y &&\
  \ isComplete\n{\n// 在此示例中，x 小于 6 且 isComplete == TRUE\n执行相应操作\n}\n// 另一种判断 FALSE\
  \ 的方式\nif x < y && !isComplete\n{\n执行相应操作\n}\nelse\n{\n// isComplete == TRUE\n执行其他操作\n\
  }\n清单 4-2.\n使用 && 和 || 逻辑运算符的伪代码\n```\n\n### 可选值与强制解包\n\n第 3 章介绍了可选值。可选值是指可能不包含值的变量。由于可选值可能不含值，因此在访问它们之前需要进行检查。\n\
  \n首先，通过 `if` 语句将可选值与 `nil` 进行比较，以判断该可选值是否包含值。如果可选值有值，则视为“不等于” `nil`，如清单 4-3 所示。\n\
  \n清单 4-3 中的第 4 行检查可选变量是否不等于 `nil`。在此示例中，`someInteger` 的值不存在，等于 `nil`，因此执行第 8 行的代码。\n\
  \n```\n1 var myString = \"Hello world\"\n2 let someInteger = Int(myString)\n3 //\
  \ someInteger 的值现在不存在\n4 if someInteger != nil {\n5     print(\"someInteger 包含一个整数值。\"\
  )\n6 }\n7 else {\n8     print(\"someInteger 不包含整数值。\")\n9 }\n清单 4-3.\n检查可选值是否包含值\n\
  ```\n\n现在你已经添加了检查来确认可选值是否包含值，可以通过在可选值名称末尾添加感叹号（`!`）来访问其值。这里的 `!` 表示你已经检查过并确认可选变量有值，现在要使用它。这被称为强制解包可选值。参见清单\
  \ 4-4。\n\n```\n1 var myString = \"42\"\n2 let someInteger = Int(myString)\n3 //\
  \ someInteger 包含一个值\n4 if someInteger != nil {\n5     print(\"someInteger 包含一个值。这里是：\\\
  (someInteger!)\")\n6 }\n7 else {\n8     print(\"someInteger 不包含整数值。\")\n9 }\n清单\
  \ 4-4.\n强制解包\n```\n\n> **注意**  \n> 在 `print` 函数中显示变量的内容是通过 `\\()` 实现的。\n\n#### 可选绑定\n\
  \n你可以通过一个操作同时判断可选值是否包含值，并在包含值时将该值赋给一个临时常量或变量。（参见清单 4-5。）这称为可选绑定。可选绑定可用于 `if` 和 `while`\
  \ 语句中，以判断可选值是否有值，并在有值时将值提取到常量或变量中。\n\n```\n1 let someOptional: String? = \"hello\
  \ world\"\n2 if let constantName = someOptional {\n3     print(\"constantName 包含一个值，这里是：\\\
  (constantName)\")\n4 }\n清单 4-5.\n可选绑定语法（绑定到常量）\n```\n\n如果希望将可选值赋值给一个变量以便操作该变量，你可以将可选值赋值给\
  \ `var`，如清单 4-6 所示。\n\n```\n1 let someOptional: String? = \"hello world\"\n2 if\
  \ var variableName = someOptional {\n3     variableName += \"!\"               \
  \ // 在字符串末尾追加 \"!\"\n4     print(\"variableName 包含一个值，这里是：\\(variableName)\")\n\
  5 }\n清单 4-6.\n可选绑定语法（绑定到变量）\n```\n\n请注意，在清单 4-5 和 4-6 中，你不需要使用 `!` 进行强制解包。如果转换成功，变量或常量会被初始化为可选值中包含的值，因此不需要\
  \ `!`。\n\n逻辑非运算符和强制解包运算符都使用 `!` 字符可能会造成混淆。请记住，逻辑非运算符位于变量或常量之前，而强制解包运算符位于可选常量或变量之后。\n\
  \n#### 隐式解包可选值\n\n在代码中，有些情况下你确切知道某个可选值总会包含值。在这种情况下，可以省去每次访问该可选值时都需要检查和解包的操作，这很有用。这类可选值被称为隐式解包可选值。\n\
  \n由于程序的结构，你知道该可选值有值，因此可以授权该可选值在需要被访问时能够安全地自动解包。你不需要在每次使用时都添加 `!`，而是在声明可选值时在其类型后面放置一个\
  \ `!`。清单 4-7 展示了一个可选 `String` 和一个隐式解包可选 `String` 的对比。\n\n```\n1 var optionalString:\
  \ String? = \"我的可选字符串。\"\n2 var forcedUnWrappedString: String = optionalString!\
  \ // 需要使用 !\n\n4 var nextOptionalString: String! = \"一个隐式解包的可选值。\"\n5 var implicitUnwrappedString:\
  \ String = nextOptionalString // 不需要使用 !\n清单 4-7.\n可选字符串与隐式解包可选字符串的对比\n```\n\n\n\
  \n### 流程图\n\n在前几章讨论的设计需求确定后，你就可以为应用创建伪代码部分，以解决复杂的开发问题。流程图是一种常用的算法图示方法。算法通过不同类型的方框，由线条和箭头连接而成。开发者经常使用流程图来直观地表达代码，如图\
  \ 4-1 所示。\n\n![A341013_4_En_4_Fig1_HTML.gif](img/A341013_4_En_4_Fig1_HTML.gif)\n\
  \n图 4-1. 流程图示例，展示了常用图形及其对应名称\n\n流程图应始终包含一个开始和一个结束。分支路径绝不能在没有结束点的情况下终止。这有助于开发者确保代码中的所有分支都已妥善处理，并能够干净地结束执行。\n\
  \n### 设计与绘制示例应用的流程图\n\n我们已经了解了大量关于决策和程序流程的知识。现在该做程序员最擅长的事了：编写应用！\n\n你需要编写的应用会生成一个\
  \ 0 到 100 之间的随机数，并要求用户猜这个数字。用户需要一直猜，直到猜中为止。当用户猜对答案后，系统会询问他们是否想再玩一次。\n\n### 应用设计\n\
  \n根据你的设计需求，你可以为应用绘制一个流程图。见图 4-2。\n\n![A341013_4_En_4_Fig2_HTML.jpg](img/A341013_4_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 猜随机数应用的流程图\n\n观察图 4-2，你会发现，当流程图中的某个逻辑块接近末尾时，会有箭头指回之前的某个部分，并重复执行该部分，直到满足某个条件为止。这被称为**循环**。它让你能够重复执行某段程序逻辑，而无需重写这些代码段，直到某个条件被满足。\n\
  \n### 使用循环重复执行程序语句\n\n循环是一段程序语句序列，它只需被指定一次，但可以连续重复执行多次。循环可以重复指定的次数（计数控制），也可以重复执行直到满足某个条件（条件控制）。\n\
  \n在本节中，你将学习计数控制循环和条件控制循环。你还将学习如何使用布尔逻辑来控制循环。\n\n#### 计数控制循环\n\n计数控制循环会重复执行指定的次数。在\
  \ Swift 中，这是通过 `for-in` 循环实现的。`for-in` 循环会遍历序列或项目集合，例如数字范围、数组中的项目或字符串中的字符。参见代码清单\
  \ 4-8。\n\n```\nfor i in 0..<10 {\nprint(\"索引是: \\(i)\")\n}\n//....继续执行\n代码清单 4-8.\
  \ 一个计数控制循环\n```\n\n代码清单 4-8 中的循环将执行 10 次。“半开区间运算符” `..<` 返回从“下界”值 0 开始，到但不包括“上界”值\
  \ 10 的值序列，结果是 `i` 的取值范围为 0 到 9。\n\n或者，代码清单 4-9 使用“闭区间运算符” `...` 打印了 10 乘法表的前 10\
  \ 项。该运算符返回从下界值 1 开始，到并包括上界值 10 的值序列，结果是 `i` 的取值范围为 1 到 10。\n\n```\nfor i in 1...10\
  \ {\nprint(\"\\(i) 乘以 10 等于 \\(i * 10)\")\n}\n//....继续执行\n代码清单 4-9. 使用闭区间运算符的计数控制循环\n\
  ```\n\n#### 条件控制循环\n\nSwift 能够重复执行循环，直到某个条件发生变化。你可能希望重复执行某段代码，直到某个变量达到一个假条件。这种类型的循环称为\
  \ `while` 循环。`while` 循环是一种控制流语句，它基于给定的布尔条件重复执行。你可以将 `while` 循环视为一个重复执行的 `if` 语句。参见代码清单\
  \ 4-10。\n\n```\nvar isTrue = true\nwhile isTrue {\n// 执行某些操作\nisTrue = false //\
  \ 某个条件发生，有时会将 isTrue 设置为 FALSE\n}\n//....继续执行\n代码清单 4-10. 一个重复执行的 Swift while 循环\n\
  ```\n\n代码清单 4-10 中的 `while` 循环首先检查变量 `isTrue` 是否为 `true`—— 此时它为 `true` —— 因此进入 `{循环体}`\
  \ 执行代码。最终，某个条件发生导致 `isTrue` 变为 `false`。在循环体内的所有代码执行完毕后，会再次检查条件 (`isTrue`)，然后循环重复。这个过程会一直重复，直到变量\
  \ `isTrue` 被设置为 `false`。\n\n#### 无限循环\n\n无限循环会无休止地重复，原因可能是循环没有导致终止的条件，或者循环拥有一个永远无法满足的终止条件。\n\
  \n通常，无限循环会导致应用无响应。它们是代码或逻辑中存在 Bug 的副作用之一。\n\n代码清单 4-11 是一个由永远无法满足的终止条件导致的无限循环示例。变量\
  \ `x` 在每次 `while` 循环迭代时都会被检查，但它永远不会等于 5。变量 `x` 将始终是偶数，因为它被初始化为零，并且在循环中每次增加 2。这会导致循环无休止地重复。参见代码清单\
  \ 4-12。\n\n```\nvar x = 0\nwhile x != 5 {\n// 执行某些操作\nx = x + 2\n}\n//....继续执行\n\
  代码清单 4-11. 一个无限循环示例\n```\n\n```\nwhile true {\n// 永远执行某些操作\n}\n//....继续执行\n代码清单\
  \ 4-12. 一个由永远无法满足的终止条件导致的无限循环示例\n```\n\n\n\n"
- "# 使用 Swift 编写示例应用\n\n根据你的需求和所学内容，尝试用 Swift 编写一个随机数生成器。\n\n要编写这个应用程序，你需要离开 Playground，并以\
  \ Mac 控制台应用的形式进行开发。遗憾的是，目前 Playground 无法让你与正在运行的应用进行交互，因此你无法获取键盘输入。\n\n**注意：** 你可以在\
  \ [`http://forum.xcelme.com`](http://forum.xcelme.com) 下载完整的随机数生成器应用。相关代码是第 4 章的主题。\n\
  \n你的 Swift 应用将在命令行中运行，因为它需要用户猜一个随机数。\n\n1. 打开 Xcode 并选择 **创建一个新的 Xcode 项目**。选择 **命令行工具**\
  \ macOS 项目，如图 4-3 所示，然后点击 **下一步**。\n\n   ![A341013_4_En_4_Fig3_HTML.jpg](img/A341013_4_En_4_Fig3_HTML.jpg)\n\
  \n   图 4-3. 新建一个 macOS 命令行工具项目\n\n2. 将你的项目命名为 **RandomNumber**（见图 4-4）。确保 **语言**\
  \ 下拉菜单选择 **Swift**，然后点击 **下一步**。将项目保存到你硬盘上任意喜欢的位置，然后点击 **创建**。\n\n   ![A341013_4_En_4_Fig4_HTML.jpg](img/A341013_4_En_4_Fig4_HTML.jpg)\n\
  \n   图 4-4. RandomNumber 的项目选项\n\n3. 打开 `main.swift` 文件。编写列表 4-13 中的代码。\n\n   ```\n\
  \   1 //\n   2 //  main.swift\n   3 //  RandomNumber\n   4 //\n   \n   6 import\
  \ Foundation\n   \n   8 var randomNumber = 1\n   9 var continueGuessing = true\n\
  \   10 var keepPlaying = true\n   11 var input = \"\"\n   \n   13 while keepPlaying\
  \ {\n   14     randomNumber = Int(arc4random_uniform(101)) // 获取一个 0-100 之间的随机数\n\
  \   15     print(\"要猜的随机数是: \\(randomNumber)\")\n   16     while continueGuessing\
  \ {\n   17         print(\"在 0 到 100 之间选一个数字。\")\n   18         input = NSString(data:\
  \ FileHandle.standardInput.availableData, encoding:String.Encoding.utf8.rawValue)!\
  \ as String // 获取键盘输入\n   19         input = input.replacingOccurrences(of: \"\\\
  n\", with: \"\", options: NSString.CompareOptions.literal, range: nil) // 去除 \\\
  n\n   20         if let userGuess = Int(input) {\n   21             if userGuess\
  \ == randomNumber {\n   22                 continueGuessing = false\n   23     \
  \            print(\"猜对了!\")\n   24             }\n   25             // 嵌套的 if 语句\n\
  \   26             else if userGuess > randomNumber {\n   27                 //\
  \ 用户猜高了\n   28                 print(\"你猜的数字太大了!\")\n   29             }\n   30\
  \             else{\n   31                 // 无需检查 userGuess < randomNumber，情况必然如此。\n\
  \   32                 print(\"你猜的数字太小了!\")\n   33             }\n   34        \
  \ } else {\n   35             print(\"无效猜测，请重试。\")\n   36         }\n   37     }\n\
  \   38     print (\"再来一次？Y 或 N\")\n   39     input = NSString(data: FileHandle.standardInput.availableData,\
  \ encoding:String.Encoding.utf8.rawValue)! as String\n   40     input = input.replacingOccurrences(of:\
  \ \"\\n\", with: \"\", options: NSString.CompareOptions.literal, range: nil)\n \
  \  \n   42     if input == \"N\" || input == \"n\" {\n   43         keepPlaying\
  \ = false\n   44     }\n   45     continueGuessing = true\n   46 }\n   ```\n\n \
  \  列表 4-13. 随机数生成器应用的源代码\n\n在列表 4-13 中，有一些我们之前没讨论过的新代码。第一行新代码（第 14 行）如下：\n\n```\n\
  randomNumber = Int(arc4random_uniform(101))\n```\n\n这一行会生成一个 0 到 100 之间的随机数。`arc4random_uniform()`\
  \ 是一个返回随机数的函数。\n\n下一行新代码在第 18 行：\n\n```\n18         input = NSString(data: FileHandle.standardInput.availableData,\
  \ encoding:String.Encoding.utf8.rawValue)! as String // 获取键盘输入\n```\n\n这使你能够获取用户的键盘输入。我们将在后续章节中讨论这种语法。\n\
  \n下一行新代码在第 20 行：\n\n```\nif let userGuess = Int(input)\n```\n\n`Int` 接受一个字符串初始化器，并将其转换为整数。\n\
  \n## 嵌套的 `if` 语句和 `else if` 语句\n\n有时需要对 `if` 语句进行嵌套。这意味着你需要在已有的 `if` 语句内部嵌套 `if`\
  \ 语句。此外，有时还需要在 `if` 语句的 `else` 部分中首先进行比较。这被称为 `else if` 语句（回顾列表 4-13 中的第 26 行）。\n\
  \n```\nelse if userGuess > randomNumber\n```\n\n## 移除多余字符\n\n列表 4-13 中的第 19 行如下：\n\
  \n```\ninput = input.replacingOccurrences(of: \"\\n\", with: \"\", options: NSString.CompareOptions.literal,\
  \ range: nil) // 去除 \\n\n```\n\n读取键盘输入有时会比较麻烦。在这种情况下，它会在字符串末尾留下一个残余字符 `\\n`，你需要将其移除。这是用户在键盘上按下\
  \ **回车** 键时生成的换行符。\n\n## 通过重构改进代码\n\n通常，在让代码运行起来之后，你会检查代码并找到更高效的编写方式。重写代码使其更高效、更易维护、更易读的过程被称为\
  \ *代码重构*。\n\n当你审查 Swift 代码时，经常会发现可以删掉一些不必要的代码。\n\n**注意：** 作为开发者，我们发现最好的代码行就是你不需要写的那一行——更少的代码意味着更少的调试和维护工作。\n\
  \n## 运行应用\n\n要运行应用，请点击 Swift 项目屏幕左上角的 **播放** 按钮。参见图 4-5。\n\n![A341013_4_En_4_Fig5_HTML.jpg](img/A341013_4_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. Swift 随机数生成器应用的控制台输出\n\n**注意：** 如果运行应用时没有看到输出控制台，请确保你在编辑器右上角和右下角选择了相同的选项（选择\
  \ **视图** → **调试区域** → **激活控制台**）。\n\n\n\n### 设计需求\n\n正如第 1 章所讨论的，软件开发周期中最昂贵的过程是编写代码。而最便宜的过程则是收集应用程序的需求；然而，后者在软件开发中却是最容易被忽视、最不常用的环节。\n\
  \n设计需求通常始于向客户、用户和/或利益相关者询问应用程序应如何工作，以及它应解决哪些问题。\n\n对于应用而言，需求可以包括长篇或短篇的描述性文字、屏幕模型和公式。在编码开始前，打开文字处理器修改需求和屏幕模型，远比修改一个\
  \ iOS 应用要容易得多。以下是一个 iPhone 手机银行应用某个视图的设计需求示例：\n\n- **视图**：账户视图。\n- **描述**：显示用户拥有的账户列表。账户列表将分为以下几个部分：商业账户、个人账户以及汽车贷款、IRA（个人退休账户）和房屋净值贷款。\n\
  - **单元格**：每个单元格将包含账户名称、账户的后四位数字、可用余额和当前余额。\n\n一图胜千言。屏幕模型对开发者和用户都很有帮助，因为它们能展示视图完成后的样子。有许多工具可以快速设计模型，其中一种工具是\
  \ OmniGraffle。请参见图 4-6，该示例展示了由 OmniGraffle 生成的用于设计需求的屏幕模型。\n\n![A341013_4_En_4_Fig6_HTML.jpg](img/A341013_4_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6.** 使用 OmniGraffle 和 Ultimate iPhone Stencil 插件制作的手机银行应用屏幕模型。此模型是为 2010\
  \ 年的原始 Woodforest 银行应用制作的。\n\n许多开发者认为设计需求耗时过长且不必要。事实并非如此。图 4-6 中的账户屏幕展示了大量信息。许多业务规则决定了信息如何展示给用户，以及出现问题时如何处理所有错误。在设计你的应用时，在开发过程开始时与所有业务利益相关者合作，对于首次就做好至关重要。\n\
  \n图 4-7 是所有利益相关者参与应用开发的一个示例。从开始就让所有利益相关者参与每个视图，将消除多次重写和应用错误。\n\n![A341013_4_En_4_Fig7_HTML.jpg](img/A341013_4_En_4_Fig7_HTML.jpg)\n\
  \n**图 4-7.** 2015 年 App Store 上的 Woodforest 手机银行应用界面；请将此与图 4-6 中的应用需求账户屏幕进行比较。\n\
  \n此外，苹果公司建议开发者至少将 50% 的开发时间用于用户界面的设计和开发。\n\nBalsamiq 也为设计 iOS 应用的外观提供了出色的工具。请参见图\
  \ 4-8。\n\n![A341013_4_En_4_Fig8_HTML.jpg](img/A341013_4_En_4_Fig8_HTML.jpg)\n\n\
  **图 4-8.** Balsamiq.com 网站，用于创建线框模型。\n\n## 总结\n\n本章涵盖了关于如何控制应用程序的大量重要信息；程序流程和决策制定对每个\
  \ iOS 应用都至关重要。确保你已经完成了本章中的 Swift 示例。你或许会复习这些示例，并认为自己无需实际编写这个应用就已理解了一切。这将是一个致命错误，它会阻碍你成为一名成功的\
  \ iOS 开发者。你必须花时间编写这个示例的代码。开发者是通过实践而非阅读来学习的。\n\n本章中的术语很重要。你应该能够描述以下内容：\n\n- `AND`（与）\n\
  - `OR`（或）\n- `XOR`（异或）\n- `NAND`（与非）\n- `NOR`（或非）\n- `NOT`（非）\n- 真值表\n- 否定\n- 所有比较运算符\n\
