  \n图 9-4. 三元运算输出\n\n你可以修改这一行代码，以测试本章已经讨论过的任何比较，或者你稍后将进行的任何示例。\n\n让我们尝试另一个示例。\n\n\
  ```\nvar i = 5\nvar y = 6\nprint(\"The result is \\(y > i ? \"True\" : \"False\"\
  )\")\n```\n\n在这个示例中，你创建了一个变量并将其值赋为 5。接着你创建了另一个变量并将值赋为 6。然后，你修改了打印示例，使其比较变量 `i` 和\
  \ `y`，而不是使用具体的数字。\n\n注意：当你在实际的 Xcode 项目中使用此代码时，可能会收到编译器警告。编译器会告诉你，三元运算符的 false 部分永远不会被执行。在你输入代码时，编译器就能查看这些值，并知道这个比较结果始终为\
  \ true。\n\n现在你将探索其他类型的比较，然后你将回到本节的应用中并测试其中的一些比较。\n\n### 使用布尔表达式\n\n布尔表达式是所有比较中最简单的一种。布尔表达式用于确定一个值是\
  \ true 还是 false。示例如下：\n\n```\nvar j = 5\nif  j > 0 {\n    someCode()\n}\n```\n\n\
  `if` 语句的计算结果始终为 `true`，因为变量 `j` 大于零。因此，程序将运行 `someCode()` 方法。\n\n注意：在 Swift 中，如果变量是可选的，因此不保证会被赋值，你应在变量声明后添加一个问号。例如，`var\
  \ j` 变为 `var j: Int?`。\n\n如果将 `j` 的值改为 0，则语句的计算结果将为 `false`，因为 `j` 现在是 0。\n\n```\n\
  var j = 0\nif j > 0 {\n    someCode()\n}\n```\n\n在布尔表达式前放置一个感叹号会将其值取反（`false` 变成\
  \ `true`，`true` 变成 `false`）。\n\n```\nvar j = 0\nif !(j > 0) {\n    someCode()\n\
  }\n```\n\n第二行现在询问“如果不满足 `j>0`”，在这种情况下，结果是 `true`，因为 `j` 等于 0。这是一个使用整数充当布尔变量的示例。如前所述，Swift\
  \ 也有名为 `Bool` 的变量，它只有两个可能的值：`true` 或 `false`。\n\n注意：与许多其他编程语言一样，Swift 在为布尔变量赋值时也使用\
  \ `true` 或 `false`。\n\n让我们来看一个与书店相关的例子。假设你有一个常客俱乐部，所有会员在购买任何书籍时均可享受 15% 的折扣。这很容易检查。你只需在会员身份成立时将变量\
  \ `clubMember` 设置为 `true`，否则设置为 `false`。以下代码将仅对俱乐部会员应用折扣：\n\n```\nvar discountPercent\
  \ = 0\nvar clubMember = false\nif clubMember {\n    discountPercent = 15\n}\n```\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您的注意事项，完成以下翻译工作。\n\n\n### 比较字符串\n\n对于大多数 C 语言来说，字符串是一种困难的数据类型。在\
  \ ANSI C（或标准 C）中，字符串只是一个字符数组。Objective-C 进一步推动了字符串的发展，使其成为一个名为`NSString`的对象。Swift\
  \ 则更进一步，让`String`类更易于使用。在操作对象时，您可以获得更多可用的属性和方法。对您来说幸运的是，`String`有许多用于比较数据的方法，这使您的工作变得轻松得多。\n\
  \n让我们看一个例子。在这里，您正在比较密码，以确定是否应允许用户登录：\n\n```\nvar enteredPassword = \"Duck\"\nvar\
  \ myPassword = \"duck\"\nvar continueLogin = false\nif enteredPassword == myPassword\
  \ {\ncontinueLogin = true\n}\n```\n\n第一行只是声明了一个`String`并将其值设置为`Duck`。下一行声明了另一个`String`并将其值设置为`duck`。在您的实际代码中，您需要从用户那里获取`enteredPassword`字符串。\n\
  \n下一行是实际执行工作的代码部分。您只需询问这些字符串是否彼此相等。该示例代码将始终为`false`，因为`enteredPassword`中的大写`D`与`myPassword`中的小写`d`不同。\n\
  \n您可能还需要对字符串执行许多其他不同的比较。例如，您可能想检查某个字符串的长度。这很容易做到。\n\n```\nvar enteredPassword =\
  \ \"Duck\"\nvar myPassword = \"duck\"\nvar continueLogin = false\nif enteredPassword.count\
  \ > 5 {\ncontinueLogin = true\n}\n```\n\n注意\n\n`count`是一个可用于计算字符串、数组和字典数量的属性。\n\n\
  此代码检查输入的密码长度是否超过五个字符。\n\n在其他时候，您将不得不在字符串内搜索某些数据。幸运的是，Swift 让这件事变得简单。`String`提供了一个名为`contains`的函数，它允许您在字符串中搜索另一个字符串。`contains`函数只接受一个参数，即您要搜索的字符串。\n\
  \n```\nvar searchTitle: String\nvar bookTitle: String\nsearchTitle = \"Sea\"\nbookTitle\
  \ = \"2000 Leagues Under the Sea\"\nif bookTitle.contains(searchTitle) {\naddToResults()\n\
  }\n```\n\n此代码的开头与您之前查看的其他示例类似。我们创建了两个变量。然后，此示例接受一个搜索词，并检查书名中是否包含相同的搜索词。如果包含，则将这本书添加到结果中。这个方法可以进行调整，以允许用户搜索书名、作者甚至描述中的特定术语。\n\
  \n有关`String`支持的方法的完整列表，请参阅[`https://swift.org/documentation/#the-swift-programming-language`](https://swift.org/documentation/#the-swift-programming-language)上的苹果文档。\n\
  \n## 使用 switch 语句\n\n到目前为止，您已经看到了几个仅通过使用`if`语句比较数据的示例。\n\n```\nif someValue == SOME_CONSTANT\
  \ {\n...\n} else if someValue == SOME_OTHER_CONSTANT {\n...\n} else if someValue\
  \ == YET_SOME_OTHER_CONSTANT {\n...\n}\n```\n\n如果您需要将一个变量与多个常量值进行比较，可以使用另一种可以简化比较代码的方法：`switch`语句。\n\
  \n注意\n\n在 Objective-C 中，您只能在`switch`语句中使用值进行比较。Swift 允许开发人员在`switch`语句的使用上拥有更多自由。使用\
  \ Swift，开发人员现在可以比较大多数对象，包括自定义对象。\n\n`switch`语句允许您将一个或多个值与另一个变量进行比较。\n\n```\nvar\
  \ customerType = \"Repeat\"\nswitch  customerType {     // switch 语句后跟一个左花括号\ncase\
  \ \"Repeat\":       // 等同于 if (customerType == \"Repeat\")\n...               //\
  \ 在此 case 之后调用函数并放置任何其他语句。\n...\ncase \"New\":\n...\n...\ncase \"Seasonal\":   \
  \                ...\n...\ndefault:             // Swift 中需要默认分支\n}  // switch 语句结束。\n\
  ```\n\n`switch`语句功能强大，它可以简化并精简与多个不同值的比较。\n\n在 Swift 中，`switch`语句是一个强大的语句，可用于简化重复的`if`/`else`语句。\n\
  \n### 比较日期\n\n在任何编程语言中，日期都是一个相当复杂的变量类型，而且不幸的是，根据您正在编写的应用程序类型，它们很常见。Swift 4 拥有自己的原生`Date`类型。Swift\
  \ 的`Date`类有许多很好的方法，使得比较日期变得容易。我们将重点介绍`compare`函数。`compare`函数返回一个`ComparisonResult`，它有三个可能的值：`orderedSame`、`orderedDescending`和`orderedAscending`。\n\
  \n```\n// 今天的日期\nlet today: Date = Date()\n// 促销日期 = 明天\nlet timeToAdd: TimeInterval\
  \ = 60*60*24\nlet saleDate: Date = today.addingTimeInterval(timeToAdd)\nvar saleStarted\
  \ = false\nlet result: ComparisonResult  = today.compare(saleDate)\nswitch result\
  \ {\ncase ComparisonResult.orderedAscending:\n// 促销日期在未来\nsaleStarted = false\n\
  case ComparisonResult.orderedDescending:\n// 促销开始日期已过，促销正在进行\nsaleStarted = true\n\
  default:\n// 促销开始日期就是现在\nsaleStarted = true\n}\n```\n\n这看起来似乎只是为了比较一些日期而做了很多工作。让我们逐步分析代码，看看是否能理解它。\n\
  \n```\nlet today: Date = Date()\nlet timeToAdd: TimeInterval = 60*60*24\nlet saleDate:\
  \ Date = today.addingTimeInterval(timeToAdd)\n```\n\n在这里，您声明了两个不同的`Date`对象。第一个名为`today`，使用系统日期或您的设备日期进行初始化。在创建第二个日期之前，您需要向第一个日期添加一些时间。您通过创建一个`TimeInterval`来做到这一点。这是一个以秒为单位的数字。要增加一天，您需要添加`60*60*24`。第二个日期名为`saleDate`，使用未来的某个日期进行初始化。您将使用此日期来确定此促销是否已开始。我们不会详细讨论`Date`对象的初始化。\n\
  \n使用`Date`对象的`compare`函数的结果是一个`ComparisonResult`。您必须声明一个`ComparisonResult`来捕获`compare`函数的输出。\n\
  \n```\nlet result = today.compare(saleDate)\n```\n\n这只是简单地比较了两个日期。它将得到的`ComparisonResult`放入名为`result`的常量中。\n\
  \n```\nswitch result {\ncase ComparisonResult.orderedAscending:\n// 促销日期在未来\nsaleStarted\
  \ = false\ncase ComparisonResult.orderedDescending:\n// 促销开始日期已过，促销正在进行\nsaleStarted\
  \ = true\ndefault:\n// 促销开始日期就是现在\nsaleStarted = true\n}\n```\n\n现在您需要找出变量`result`中的值。为此，您执行一个`switch`语句，将结果与`ComparisonResult`的三个不同选项进行比较。第一行判断促销日期是否大于今天的日期。这意味着促销日期在未来，因此促销尚未开始。然后将变量`saleStarted`设置为`false`。下一行判断促销日期是否小于今天。如果是，则促销已开始，并将`saleStarted`变量设置为`true`。再下一行只是`default`。它捕获所有其他选项。但是，您知道，唯一剩下的选项是`orderedSame`。这意味着两个日期和时间相同，因此促销刚刚开始。\n\
  \n还有其他可用于比较`Date`对象的方法。这些方法中的每一种在某些特定任务中会更高效。我们选择了`compare`方法，因为它可以满足您大部分基本的日期比较需求。\n\
  \n注意\n\n请记住，`Date`同时包含日期和时间。这可能会影响您的日期比较，因为它不仅会比较日期，还会比较时间。\n\n\n\n### 组合比较\n\n\
  正如第 4 章所讨论的，有时你需要比单一比较更复杂的逻辑。这时就需要逻辑运算符登场了。逻辑运算符让你能够检查多个条件。例如，如果对于既是你的读书俱乐部会员、又消费超过\
  \ 30 美元的人群有特别折扣，你可以编写一条语句来检查。\n\n```\nvar totalSpent = 31\nvar discountThreshhold\
  \ = 30\nvar discountPercent = 0\nvar clubMember = true\nif totalSpent > discountThreshhold\
  \ && clubMember {\ndiscountPercent = 15\n}\n```\n\n我们将前面两个示例合并了。这条新的比较行含义如下：\"如果`totalSpent`大于`discountThreshold`并且`clubMember`为`true`，则将`discountPercent`设为\
  \ 15。\"要让此条件返回`true`，两项条件都需要为`true`。你可以使用`||`代替`&&`来表示\"或\"。你可以将上一条语句改为：\n\n```\n\
  if totalSpent > discountThreshhold || clubMember  {\ndiscountPercent = 15\n}\n```\n\
  \n现在这一行的含义变为：\"如果`totalSpent`大于`discountThreshold`或者`clubMember`为`true`，则将`discountPercent`设为\
  \ 15。\"只要任一选项为`true`，该条件就会返回`true`。\n\n你可以继续使用逻辑运算，将任意多个比较组合在一起。某些情况下，你可能需要使用括号对比较进行分组。\n\
  \n## 本章小结\n\n本章到此结束！以下是涵盖主题的总结：\n\n- **比较**：比较数据是任何应用程序不可或缺的一部分。\n- **关系运算符**：你学习了六种标准关系运算符及其用法。\n\
  - **数字**：数字是最容易比较的信息类型。你学习了如何在程序中对数字进行比较。\n- **示例**：你创建了一个示例游乐场，可以在此测试你的比较逻辑并确保其正确无误。随后你学会了如何修改游乐场以添加不同类型的比较。\n\
  - **布尔值**：你学习了如何检查布尔值。\n- **字符串**：你学习了字符串与你之前测试的其他信息类型有何不同表现。\n- **日期**：你学习了比较日期可能相当复杂，必须小心谨慎以确保得到预期的结果。\n\
  \n**练习**\n\n- 修改示例游乐场，对某些字符串信息进行比较。\n- 编写一个 Swift 应用程序，判断以下年份是否为闰年：1800、1801、1899、1900、2000、2001、2003\
  \ 和 2010。输出格式应为：`The year 2000 is a leap year` 或 `The year 2001 is not a leap year`。关于判断闰年的方法，请参见\
  \ [`http://en.wikipedia.org/wiki/Leap_year`](http://en.wikipedia.org/wiki/Leap_year)。\n\
  \n# 10. 创建用户界面\n\nInterface Builder 使 iOS 开发者能够利用强大的图形用户界面轻松创建用户界面。它允许开发者通过简单地从\
  \ Interface Builder 的库中将对象拖拽到编辑器来构建用户界面。\n\nInterface Builder 将用户界面设计存储在一个或多个名为故事板的资源文件中。这些资源文件包含界面对象、它们的属性以及相互之间的关系。\n\
  \n要构建用户界面，只需将对象从 Interface Builder 的“对象库”面板拖拽到你的视图或场景中。操作（Actions）和输出口（Outlets）是\
  \ Interface Builder 的两个关键组件，有助于简化开发流程。\n\n对象会在视图中触发操作，而操作会连接到应用代码中的方法。输出口在`.swift`文件中声明，并作为属性连接到特定的控件。参见图\
  \ 10-1。\n\n**注意**\n\nInterface Builder 曾是一款独立的应用程序，开发者用它来设计用户界面。从 Xcode 4.0 开始，Interface\
  \ Builder 已被集成到 Xcode 中。\n\n![A341013_4_En_10_Fig1_HTML.jpg](img/A341013_4_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1. Interface Builder\n\n## 理解 Interface Builder\n\nInterface Builder 将用户界面文件保存为一个\
  \ bundle，其中包含应用程序中使用的界面对象及其关系。这些 bundle 以前的文件扩展名为`.nib`。Interface Builder 3.0 版本采用了新的\
  \ XML 文件格式，文件扩展名也变更为`.xib`。不过，开发者仍将这些文件称为 nib 文件。后来，苹果公司引入了故事板。故事板允许你将所有视图放在一个扩展名为`.storyboard`的文件中。\n\
  \n与大多数其他图形用户界面应用程序不同，XIB 和故事板常被称为“冻干”文件，因为它们包含了已归档的对象本身，并且可以随时运行。\n\n采用 XML 文件格式是为了便于与\
  \ Subversion 和 Git 等源代码控制系统配合进行存储。\n\n下一节，我们将讨论一种名为“模型-视图-控制器”的应用设计模式。这种设计模式使开发者能够更轻松地维护代码，并在应用生命周期内复用对象。\n\
  \n\n\n# 模型-视图-控制器模式\n\n`Model-View-Controller`（`MVC`）是 iOS 开发中最流行的设计模式，掌握它将让您的开发工作轻松很多。`MVC`\
  \ 被用于软件开发，并被视为一种架构模式。\n\n架构模式描述了开发者可在代码中使用的软件设计问题的解决方案。`MVC` 模式并非 iOS 开发者独有；它已被许多集成开发环境（`IDE`）的制造商采用，包括那些运行在\
  \ Windows 和 Linux 平台上的环境。\n\n对于企业而言，软件开发被视为一项昂贵且高风险的投资。通常，应用程序的编写时间比预期更长，超出预算，并且无法按预期运行。面向对象编程（`OOP`）曾引起很大轰动，并给人一种印象：如果公司采用其方法论，就能实现节约，这主要是因为对象的可重用性和代码更易于维护。然而，最初这并未实现。\n\
  \n当工程师们探究为何 `OOP` 未能达到预期时，他们发现了开发者在设计对象时的一个关键缺陷：开发者经常以这样一种方式混杂对象，以至于随着应用程序的成熟、代码迁移到不同平台或硬件显示发生变化，代码变得难以维护。\n\
  \n对象的设计方式常常导致，若以下任何一项发生变化，就很难隔离受影响的这些对象：\n\n*   业务规则\n*   用户界面\n*   客户端-服务器或基于互联网的通信\n\
  \n对象可以被划分为三个与任务相关的类别。开发者的责任是确保每个类别中的对象不会跨界到其他类别。\n\n随着对象被归入这些类别，应用程序可以随着时间推移更容易地被开发和维护。以下是一个\
  \ iPhone 银行应用程序中对象及其对应 `MVC` 类别的示例：\n\n`Model`（模型）\n\n*   账户余额\n*   用户加密\n*   账户转账\n\
  *   账户登录\n\n`View`（视图）\n\n*   账户余额表格单元格\n*   账户登录旋转控件\n\n`Controller`（控制器）\n\n*\
  \   账户余额视图控制器\n*   账户转账视图控制器\n*   登录视图控制器\n\n在 `MVC` 设计模式中记忆和分类对象的最简单方法如下：\n\n*\
  \   `Model`（模型）：代表现实世界的独特业务或应用程序规则或代码。这是数据所在之处。\n*   `View`（视图）：独特的用户界面代码。\n*  \
  \ `Controller`（控制器）：任何控制模型或视图对象，或与之通信的对象。\n\n图 10-2 展示了 `MVC` 范式。\n\n![A341013_4_En_10_Fig2_HTML.jpg](img/A341013_4_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. `MVC` 范式\n\n无论是 `Xcode` 还是 `Interface Builder` 都不会强制开发者使用 `MVC` 设计模式。由开发者自行决定如何组织其对象以使用此设计模式。\n\
  \n值得一提的是，Apple 非常推崇 `MVC` 设计模式，并且所有框架都是为了在 `MVC` 世界中工作而设计的。这意味着，如果您也采用 `MVC` 设计模式，与\
  \ Apple 的类协同工作将变得容易得多。否则，您将逆水行舟。\n\n## 人机界面指南\n\n在您过于兴奋并开始为应用设计动态用户界面之前，需要先了解一些基本规则。Apple\
  \ 通过 `iOS 11` 开发了世界上最先进的操作系统之一。此外，Apple 的产品以其直观和用户友好而闻名。Apple 希望用户在不同的应用之间拥有相同的体验。\n\
  \n为了确保一致的用户体验，Apple 为开发者提供了关于其应用外观和操作感受的指南。这些指南被称为`人机界面指南`（`HIG`），适用于 `iOS`、`macOS`、`watchOS`、`tvOS`\
  \ 和 `CarPlay`。您可以在 [`https://developer.apple.com/design/`](https://developer.apple.com/design/)\
  \ 下载这些文档，如图 10-3 所示。\n\n![A341013_4_En_10_Fig3_HTML.jpg](img/A341013_4_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. Apple 的`人机界面指南`\n\n注意\n\nApple 的 `HIG` 不仅仅是建议或提议。Apple 对此非常重视。虽然 `HIG`\
  \ 没有描述如何在代码中实现您的用户界面设计，但它对于理解实现视图和控件的正确方法非常有帮助。\n\n以下是一些应用在 Apple `iTunes App Store`\
  \ 中被拒的主要原因：\n\n*   应用崩溃。\n*   应用违反了 `HIG`。\n*   应用使用了 Apple 的私有 API。\n*   应用的功能与在\
  \ `iTunes App Store` 上宣传的不符。\n\n注意\n\n您可以在开发应用之前阅读、学习并遵循 `HIG`，也可以在应用被 Apple 拒绝、不得不重写部分或全部代码之后，再来阅读、学习并遵循\
  \ `HIG`。无论哪种方式，所有 iOS 开发者最终都会熟悉 `HIG`。\n\n许多新的 iOS 开发者是通过惨痛教训才认识到这一点的，但如果您从一开始就遵循\
  \ `HIG`，您的 iOS 开发体验将会愉快得多。\n\n## 使用 Interface Builder 创建示例 iPhone 应用\n\n让我们开始构建一个生成并显示随机数的\
  \ iPhone 应用，如图 10-4 所示。这个应用将类似于您在第 4 章创建的应用，但您会看到拥有 iOS 用户界面（`UI`）后，这个应用变得有趣得多。\n\
  \n1. 打开 `Xcode` 并选择创建一个新的 `Xcode` 项目。确保您为 iOS 选择了 `Single View Application`，然后单击\
  \ Next，如图 10-5 所示。\n\n   ![A341013_4_En_10_Fig5_HTML.jpg](img/A341013_4_En_10_Fig5_HTML.jpg)\n\
  \n   图 10-5. 基于 `Single View Application` 模板创建 iPhone 应用\n\n2. 将您的项目命名为 `RandomNumber`，选择\
  \ `Swift` 作为语言，然后在创建项目前单击 Next，如图 10-6 所示。\n\n   ![A341013_4_En_10_Fig6_HTML.jpg](img/A341013_4_En_10_Fig6_HTML.jpg)\n\
  \n   图 10-6. 命名您的新 `Swift` 项目\n\n3. 您的项目文件和设置将被创建并显示，如图 10-7 所示。\n\n   ![A341013_4_En_10_Fig7_HTML.jpg](img/A341013_4_En_10_Fig7_HTML.jpg)\n\
  \n   图 10-7. 源文件\n\n   虽然这个项目中只有一个控制器，但在开发初期就创建您的 `MVC` 分组是一种良好的编程实践。这有助于提醒您遵守 `MVC`\
  \ 范式，而不是不必要地将所有代码都放在控制器中。\n\n4. 右键单击 `RandomNumber` 文件夹，然后选择 New Group，如图 10-8 所示。\n\
  \n   ![A341013_4_En_10_Fig8_HTML.jpg](img/A341013_4_En_10_Fig8_HTML.jpg)\n\n   图\
  \ 10-8. 创建新分组\n\n5. 创建一个 `Models` 分组、一个 `Views` 分组和一个 `Controllers` 分组。\n\n6. 将\
  \ `ViewController.swift` 文件拖到 `Controllers` 分组。将 `Main.storyboard` 和 `LaunchScreen.storyboard`\
  \ 文件拖到 `Views` 分组。拥有这些分组可以提醒您在开发代码时遵循 `MVC` 设计模式，并防止您将所有代码都放在控制器中，如图 10-9 所示。\n\n\
  \   ![A341013_4_En_10_Fig9_HTML.jpg](img/A341013_4_En_10_Fig9_HTML.jpg)\n\n   图\
  \ 10-9. 包含已组织好的控制器和故事板文件的 `MVC` 分组\n\n7. 点击 `Main.storyboard` 文件以打开 `Interface Builder`。\n\
  \n![A341013_4_En_10_Fig4_HTML.jpg](img/A341013_4_En_10_Fig4_HTML.jpg)\n\n图 10-4.\
  \ 完成的 iOS 随机数生成器应用\n\n\n\n### 使用 Interface Builder\n\n启动 Interface Builder 并开始编辑视图最常见的方法是点击关联的故事板文件，如图\
  \ 10-10 所示。\n\n![A341013_4_En_10_Fig10_HTML.jpg](img/A341013_4_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10. 工作区窗口中的 Interface Builder\n\n当 Interface Builder 打开后，你可以在画布上看到你的场景。现在你可以设计用户界面了。首先，你需要了解\
  \ Interface Builder 中的一些子窗口。\n\n### 文档大纲\n\n故事板显示了视图所包含的所有对象。以下是这些对象的一些示例：\n\n-\
