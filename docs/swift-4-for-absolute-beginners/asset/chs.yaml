  **图 12-13.** 为两个视图添加缺失的约束\n\n## 工作原理\n\n以下是代码的工作原理：\n\n*   当用户点击“猜随机数”链接时，会调用 `prepareForSegue`。参见代码清单\
  \ 12-9 中的第 73 行。\n*   因为 `ViewController` 遵循 `GuessDelegate` 协议（参见代码清单 12-10 中的第\
  \ 11 行），你可以将 `self` 作为代理传递给 `GuessInputViewController`。\n*   随后会显示 `GuessInputViewController`\
  \ 场景。\n*   当用户猜一个数字并点击“保存猜测”时，会调用 `saveGuess` 方法（参见代码清单 12-8 中的第 38 行）。\n*   由于你将\
  \ `ViewController` 作为代理传递，它可以通过 `userDidFinish` 方法将 `guess` 传回 `ViewController.swift`\
  \ 文件（参见代码清单 12-8 中的第 45 行）。\n*   现在你可以判断用户是否猜对了答案，并将 `GuessInputViewController`\
  \ 视图从堆栈中弹出（参见代码清单 12-5 中的第 62 行）。\n\n## 总结\n\n本章介绍了为什么 Swift 不使用多继承，以及协议和代理的工作原理。当你想到代理时，可以将其视为辅助类。当你的类遵循某个协议时，代理的函数会协助你的类工作。\n\
  \n你应该熟悉以下术语：\n\n*   多继承\n*   协议\n*   代理\n\n## 练习\n\n*   将计算机猜的随机数范围从 0–100 改为 0–50。\n\
  *   在主场景中，显示用户猜测随机数所尝试的次数。\n*   在主场景中，显示用户已经玩了多少局游戏。\n\n# 13. 初识 Xcode 调试器\n\n苹果开发者网站和\
  \ Mac App Store 不仅免费提供 Xcode，而且它还是一款出色的工具。除了能用它来创建下一款优秀的 Mac、iPhone、iPad、Apple TV\
  \ 和 Apple Watch 应用外，Xcode 还内置了调试器。\n\n调试器到底是什么？我们首先需要明确一点：程序会严格按照编写的方式执行，但有时我们编写的内容并非程序真正意图要做的事情。这可能导致程序崩溃，或者无法实现预期功能。无论哪种情况，当程序无法按计划运行时，我们就说程序有\
  \ bug。而审查代码并修复这些问题的过程，就叫做调试。\n\n关于“bug”这个术语的真正起源仍存争议，但有一个 1947 年记录详实的案例涉及已故的海军少将格蕾丝·霍珀，她当时是一名海军预备役军官和程序员。霍珀和她的团队当时正尝试解决哈佛\
  \ Mark II 计算机上的一个问题。一名团队成员在电路中发现了一只飞蛾，导致了其中一个继电器的问题。后来霍珀被引述说：“从那时起，只要计算机出了任何问题，我们都说它里面有\
  \ bug。”¹\n\n无论起源如何，这个术语就这样被沿用下来，世界各地的程序员都在使用调试工具（例如内置于 Xcode 的调试器）来帮助定位程序中的 bug。但真正的调试者是人；调试工具仅仅是帮助程序员定位问题的辅助手段。无论名称听起来如何，没有任何调试器能自主修复问题。\n\
  \n本章将重点介绍 Xcode 调试器的一些重要功能，并解释如何使用它们。学完本章后，你应该对 Xcode 调试器以及一般的调试过程有足够的理解，从而能够查找并修复大多数编程问题。\n\
  \n## 调试入门\n\n如果你曾经慢速播放电影，只为了捕捉到在正常速度播放时无法看到的细节，那么你就已经使用过类似调试的工具了。逐帧播放电影以揭示你寻找的细节，这种思路与调试程序时的思路类似。对于程序而言，有时有必要放慢速度来观察发生了什么。调试器允许你通过两个主要功能来实现这一点：设置断点以及逐行执行程序——稍后会详细介绍这两个功能。我们先来看看如何进入调试器以及它的界面。\n\
  \n首先，你需要加载一个应用程序。本章示例使用了第 8 章的 `BookStore` 项目，因此请打开 Xcode 并加载 `BookStore` 项目。\n\n\
  其次，确保为运行方案选择了“调试”构建配置，如图 13-1 所示。要编辑当前方案，请从主菜单选择“产品”➤“方案”➤“编辑方案”。“调试”是默认选择，因此你可能无需更改。这一步很重要，因为如果配置设置为“发布”，调试将完全无法工作。\n\
  \n![A341013_4_En_13_Fig1_HTML.jpg](img/A341013_4_En_13_Fig1_HTML.jpg)\n**图 13-1.**\
  \ 选择调试配置\n\n虽然本书不深入讨论 Xcode 方案，但你需要知道的是，默认情况下 Xcode 会为你创建的任何 macOS、iOS、watchOS 或\
  \ tvOS 项目提供“发布”和“调试”两种构建配置。就本章而言，主要区别在于，“发布”配置不会添加任何调试应用程序所必需的程序信息，而“调试”配置则会添加。\n\
  \n\n\n# 设置断点\n\n要查看程序中正在发生什么，你需要让程序在你作为程序员感兴趣的位置暂停。断点就可以实现这一点。在图 13-2 中，程序第 24 行设置了一个断点。要设置此断点，只需将鼠标光标悬停在行号上（不是程序文本，而是程序文本左侧的数字\
  \ 24）并单击一次。你会看到行号后面出现一个小蓝色箭头，这表示断点已设置。\n\n如果未显示行号，只需从主菜单中选择 Xcode ➤ 偏好设置，点击文本编辑标签页，然后选中行号复选框。\n\
  \n![A341013_4_En_13_Fig2_HTML.jpg](img/A341013_4_En_13_Fig2_HTML.jpg)\n\n图 13-2.\
  \ 你的第一个断点\n\n可以通过将断点拖到行号列的左侧或右侧然后释放来移除断点。你也可以右键单击（或按住 Control 键单击）断点，然后会看到删除或禁用断点的选项。图\
  \ 13-3 显示了断点的右键单击菜单。如果你认为将来可能还会用到该断点，禁用它会很方便。\n\n![A341013_4_En_13_Fig3_HTML.jpg](img/A341013_4_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3. 右键单击一个断点\n\n设置和删除断点是非常直接的操作。\n\n# 使用断点导航器\n\n对于小型项目，了解所有断点的位置并非难事。然而，一旦项目变大，比如比你那个小的\
  \ `BookStore` 应用还要大，管理所有断点就会变得有些困难。幸运的是，Xcode 提供了一种简单的方法来列出应用中的所有断点，它就是断点导航器。只需点击导航选择栏中的断点导航器图标，如图\
  \ 13-4 所示。\n\n![A341013_4_En_13_Fig4_HTML.jpg](img/A341013_4_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4. 在 Xcode 中访问断点导航器\n\n点击图标后，导航器将列出应用中当前定义的所有断点，并按源文件分组。你可以使用展开箭头来显示或隐藏断点。在此处，点击一个断点会跳转到包含该断点的源文件。你也可以从这里轻松删除或禁用断点。\n\
  \n要在断点导航器中启用/禁用断点，请点击列表中的蓝色断点图标（或它出现的任何位置）。不要点击行，必须是那个小的蓝色图标，如图 13-5 所示。\n\n![A341013_4_En_13_Fig5_HTML.jpg](img/A341013_4_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5. 使用断点导航器启用/禁用断点\n\n有时禁用断点比删除它更方便，尤其是当你计划稍后在同一位置再次设置该断点时。调试器不会在这些变灰的断点处停止，但它们会保留在原地，以便可以方便地启用，并作为代码中重要区域的标记。\n\
  \n也可以从断点导航器中删除断点。只需选择一个或多个断点，然后按 Delete 键。确保选择了要删除的正确断点，因为没有撤销功能。\n\n还可以选择与断点关联的文件。在这种情况下，如果你在断点导航器中选中列出的文件并按\
  \ Delete，则该文件中的所有断点都将被删除。\n\n请注意，断点按其所在的文件进行分类。在图 13-5 中，文件是 `DetailViewController.swift`\
  \ 和 `MasterViewController.swift`，断点列在这些文件名下方。图 13-6 展示了一个文件包含多个断点的示例。\n\n![A341013_4_En_13_Fig6_HTML.jpg](img/A341013_4_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6. 包含多个断点的文件\n\n# 调试基础\n\n在图 13-2 所示的语句上设置一个断点。接下来，如图 13-7 所示，点击“运行”按钮编译项目并在\
  \ Xcode 调试器中启动它。\n\n![A341013_4_En_13_Fig7_HTML.jpg](img/A341013_4_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7. Xcode 工具栏中的构建并运行和停止按钮\n\n项目构建完成后，调试器将启动。屏幕会显示调试窗口，程序将在有断点的行停止执行，如图 13-8\
  \ 所示。\n\n![A341013_4_En_13_Fig8_HTML.jpg](img/A341013_4_En_13_Fig8_HTML.jpg)\n\n\
  图 13-8. 执行在第 24 行停止时的调试器视图\n\n调试器视图会添加一些额外的窗口。以下是图 13-8 中调试器视图的不同部分：\n\n*   **调试器控制**（在图\
  \ 13-8 中用圆圈标出）：调试控件可以暂停、继续、单步跳过、单步进入和单步跳出程序中的语句。单步控制是最常用的。左边的第一个按钮用于显示或隐藏调试器视图。在图\
  \ 13-8 中，调试器视图是显示的。图 13-9 标注了调试器视图的不同部分。\n\n    ![A341013_4_En_13_Fig9_HTML.jpg](img/A341013_4_En_13_Fig9_HTML.jpg)\n\
  \n    图 13-9. 调试器的各个位置\n\n*   **变量**：变量视图显示当前作用域内的变量。点击变量名左侧的小三角形可以展开它。\n*   **控制台**：输出窗口会在发生崩溃或异常时显示有用的信息。此外，所有\
  \ `NSLog` 或 `print` 的输出都会显示在这里。\n*   **调试导航器**：堆栈跟踪显示了调用栈以及程序中当前活动的所有线程。栈是所调用方法的层次结构视图。例如，`UIApplicationMain`\
  \ 调用了 `UIViewController` 类。这些方法调用会不断“堆积”，直到它们最终返回。\n\n\n\n### 使用调试器控制\n\n如前所述，一旦调试器启动，视图便会发生变化。此时出现的是调试控件（如图\
  \ 13-8 中圈出的部分）。这些控件非常直观，其功能说明见表 13-1。\n\n**表 13-1.** Xcode 调试控件\n\n| 控件 | 说明 |\n\
  | --- | --- |\n| ![A341013_4_En_13_Figa_HTML.jpg](img/A341013_4_En_13_Figa_HTML.jpg)\
  \ | 单击停止按钮将终止程序的执行。如果 iPhone 或 iPad 模拟器正在运行该应用程序，它也会像用户强制退出应用一样停止。单击运行按钮（外观类似播放按钮）可启动调试。如果应用程序当前处于调试模式，再次单击运行按钮将从头开始重新调试应用程序；这相当于先停止再重新启动。\
  \ |\n| ![A341013_4_En_13_Figb_HTML.jpg](img/A341013_4_En_13_Figb_HTML.jpg) | 单击此按钮将使程序继续执行。程序将持续运行，直到程序结束、单击停止按钮或程序遇到另一个断点。\
  \ |\n| ![A341013_4_En_13_Figc_HTML.jpg](img/A341013_4_En_13_Figc_HTML.jpg) | 当调试器停在某个断点时，单击单步跳过按钮将使调试器执行当前代码行，并停在下一行代码处。\
  \ |\n| ![A341013_4_En_13_Figd_HTML.jpg](img/A341013_4_En_13_Figd_HTML.jpg) | 单击单步进入按钮将使调试器进入指定的函数或方法。如果需要跟踪代码进入特定方法或函数，此功能非常重要。只有项目拥有源代码的方法才能单步进入。\
  \ |\n| ![A341013_4_En_13_Fige_HTML.jpg](img/A341013_4_En_13_Fige_HTML.jpg) | 单步跳出按钮将使当前方法执行完毕，然后调试器将返回到最初调用该方法的那个方法。\
  \ |\n\n## 使用单步控制\n\n为了练习使用单步控制，我们来单步进入一个方法。顾名思义，单步进入按钮会跟踪程序执行，进入高亮显示的方法或函数。从项目管理器中选择\
  \ `DetailViewController.swift` 文件。然后，在第 31 行（即调用 `self.configureView()` 的位置）设置一个断点。单击运行按钮，并从列表中选择一本书。您的屏幕应类似于图\
  \ 13-10。\n\n![A341013_4_En_13_Fig10_HTML.jpg](img/A341013_4_En_13_Fig10_HTML.jpg)\n\
  \n**图 13-10.** 调试器停在第 31 行\n\n单击单步进入按钮 ![A341013_4_En_13_Figf_HTML.jpg](img/A341013_4_En_13_Figf_HTML.jpg)，这将使调试器进入\
  \ `DetailViewController` 对象的 `configureView()` 方法。屏幕应类似于图 13-11。\n\n![A341013_4_En_13_Fig11_HTML.jpg](img/A341013_4_En_13_Fig11_HTML.jpg)\n\
  \n**图 13-11.** 单步进入 `DetailViewController` 对象的 `configureView` 方法\n\n单步跳过控件 ![A341013_4_En_13_Figg_HTML.jpg](img/A341013_4_En_13_Figg_HTML.jpg)，会让程序继续执行，但不会进入某个方法。它仅仅是执行该方法，然后继续执行下一行。单步跳出控件\
  \ ![A341013_4_En_13_Figh_HTML.jpg](img/A341013_4_En_13_Figh_HTML.jpg) 有点类似于单步进入的反向操作。如果单击单步跳出按钮，当前方法会继续执行直至结束。然后调试器会返回到当初单击单步进入按钮之后的那一行。例如，如果在图\
  \ 13-9 所示的行上单击了单步进入按钮，然后又单击了单步跳出按钮，调试器将在图 13-9 所示的语句（示例中的第 31 行，即单击单步进入时所在的行）之后，返回到\
  \ `DetailViewController.swift` 文件的 `viewDidLoad()` 方法。\n\n### 查看线程窗口和调用栈\n\n如前所述，调试导航器会显示当前线程。不过，它也会显示调用栈。如果比较图\
  \ 13-9 和图 13-10 在线程窗口方面的差异，您会发现图 13-10 中列出了 `configureView` 方法，因为 `DetailViewController`\
  \ 调用了 `configureView` 方法。\n\n现在，调用栈不仅仅是一个已被调用的函数列表；更准确地说，它是一个当前正在被调用的函数列表。这是一个重要的区别。一旦\
  \ `configureView` 方法执行完毕并返回（第 26 行），`configureView` 将不再出现在调用栈中。您可以将调用栈大致想象成一条面包屑轨迹。这条轨迹会指引您如何回到起点。\n\
  \n### 调试变量\n\n当应用程序处于调试暂停状态时，可以通过将鼠标光标悬停在代码中的变量上来查看该变量的一些信息（除了其内存地址之外）。当您进入某个局部作用域中变量已被赋值的状态时，很可能在底部的变量视图中看到该变量。在图\
  \ 13-12 中，您可以看到 `newBook` 变量，其标题为 Swift for Absolute Beginners。您还可以看到没有分配作者或描述。在调试过程中，当您停在一行代码上时，该行代码尚未执行。这意味着，即使您暂停在了为\
  \ `author` 属性赋值的行上，该属性也尚未被赋值。\n\n![A341013_4_En_13_Fig12_HTML.jpg](img/A341013_4_En_13_Fig12_HTML.jpg)\n\
  \n**图 13-12.** 查看变量值\n\n将鼠标光标放在代码中 `newBook` 变量出现的任何位置，并单击展开三角形以显示 `Book` 对象。您应该会看到如图\
  \ 13-13 所示的显示内容。\n\n![A341013_4_En_13_Fig13_HTML.jpg](img/A341013_4_En_13_Fig13_HTML.jpg)\n\
  \n**图 13-13.** 悬停在 `newBook` 变量上可以显示一些信息\n\n悬停在 `newBook` 变量上会显示其信息。在图 13-13 中，您可以看到\
  \ `newBook` 变量已被展开。\n\n## 处理代码错误和警告\n\n虽然代码错误和警告并不是 Xcode 调试器的核心部分，但修复它们是整个调试过程的一部分。在程序（无论是否使用调试器）能够运行之前，必须修复所有错误。警告不会阻止程序构建，但它们可能会导致程序执行期间出现的问题。最佳做法是完全没有警告。\n\
  \n\n\n### 错误\n\n让我们来看看几种类型的错误。首先，我们在代码中引入一个错误。在 `MasterViewController.swift` 文件的第\
  \ 15 行，将以下代码：\n\n```\nvar myBookStore: BookStore = BookStore()\n```\n\n修改为：\n\n\
  ```\nvar myBookStore: BookStore = BookStore[]\n```\n\n保存更改，然后按下 `⌘+B` 构建项目。如图 13-14\
  \ 所示，将会出现一个错误，该错误可能在构建过程中或构建完成后立即显示。\n\n![A341013_4_En_13_Fig14_HTML.jpg](img/A341013_4_En_13_Fig14_HTML.jpg)\n\
  \n图 13-14. 在 Xcode 中查看错误\n\n接下来，点击带有感叹号的三角形图标，切换到问题导航器（Issue Navigator）窗口，如图 13-15\
  \ 所示。此视图显示程序中当前的所有错误和警告 —— 不仅限于当前文件 `MainViewController.swift`，而是所有文件。错误以红色八边形内的白色感叹号显示。在本例中，您有一个错误。如果错误信息在屏幕上显示不全或难以阅读，只需将鼠标悬停在问题导航器中的该错误上，完整错误信息便会显示出来。\n\
  \n![A341013_4_En_13_Fig15_HTML.jpg](img/A341013_4_En_13_Fig15_HTML.jpg)\n\n图 13-15.\
  \ 查看问题导航器\n\n通常，错误会指向问题所在。在上面的案例中，`BookStore` 对象被初始化为数组而非对象。\n\n请继续将 `[]` 改为 `()`\
  \ 来修复这个错误。\n\n### 警告\n\n警告指明了程序中潜在的问题。如前所述，警告不会阻止程序的构建，但可能在程序执行期间引发问题。本书不涉及那些可能在程序执行期间导致或不会导致问题的具体警告；然而，清除程序中的所有警告是一个好习惯。\n\
  \n在 `MasterViewController.swift` 的 `viewDidLoad` 方法中添加以下代码：\n\n```\nif false {\n\
  print(\"False\")\n}\n```\n\n`print` 命令永远不会被执行，因为 `false` 永远不会等于 `true`。按下 `⌘+B`\
  \ 构建项目。如图 13-16 所示，将会显示一个警告。\n\n![A341013_4_En_13_Fig16_HTML.jpg](img/A341013_4_En_13_Fig16_HTML.jpg)\n\
  \n图 13-16. 在问题导航器中查看警告\n\n点击问题导航器中的第一个警告，将会显示导致第一个问题的代码，如图 13-17 所示。\n\n![A341013_4_En_13_Fig17_HTML.jpg](img/A341013_4_En_13_Fig17_HTML.jpg)\n\
  \n图 13-17. 查看您的第一个警告\n\n在主窗口中，您可以看到这个警告。实际上，这个警告为您提供了代码问题的线索。警告内容如下：\n\n> “将永远不被执行”\n\
  \n这是一个简单的警告示例。您可能会因为许多事情收到警告，例如未使用的变量、不完整的委托实现以及不可执行的代码。清理代码中的警告以避免日后出现问题是一个好习惯。\n\
  \n## 总结\n\n本章介绍了免费的苹果 Xcode 调试器的高级特性。无论价格如何，Xcode 都是一个出色的调试器。具体来说，在本章中，您学习了以下内容：\n\
  \n* “bug”一词的起源以及什么是调试器\n* Xcode 调试器的高级特性，包括断点和单步执行程序\n* 使用名为“继续”、“单步跳过”、“单步进入”和“单步跳出”的调试控制\n\
  * 使用各种调试器视图，包括线程（调用栈）、变量视图、文本编辑器和控制台输出\n* 查看程序变量\n* 处理错误和警告\n\n脚注 1\n\nMichael Moritz,\
  \ Alexander L. Taylor III, 和 Peter Stoler, “机器内部的巫师,” *时代*, 第 123 卷, 第 16 期, 第 56–63\
  \ 页.\n\n# 14. 一个 Swift iPhone 应用\n\n在第 8 章中，您使用 Swift 创建了一个基本的书店 iPhone 应用。在本章中，您将为该应用添加一些功能，使其更具实用性，并运用您在本书中学到的许多技术，例如创建类、使用委托和协议、以及使用动作和插座。您还将学习一些新技术，例如开关、`UIAlertController`\
  \ 和地标。\n\n\n\n# 让我们开始吧\n\n第 8 章的书店示例让您能够以表格视图浏览书店中的书籍，然后点击书籍查看其详细信息。在本章中，您将为第 8\
  \ 章的书店应用添加以下功能：\n\n-   添加书籍\n-   删除书籍\n-   修改书籍\n\n请参见图 14-1 和图 14-2。\n\n![A341013_4_En_14_Fig2_HTML.jpg](img/A341013_4_En_14_Fig2_HTML.jpg)\n\
  \n**图 14-2.** 添加编辑和删除功能，同时使用 `UISwitch`\n\n![A341013_4_En_14_Fig1_HTML.jpg](img/A341013_4_En_14_Fig1_HTML.jpg)\n\
  \n**图 14-1.** 添加书籍功能\n\n用户将能够使用一个新的 `AddBookViewController` 向他们的 BookStore 添加书籍。首先，将以下代码添加到\
  \ `MasterViewController.swift` 文件的 `prepareForSegue` 方法中，如代码清单 14-1 所示。\n\n```swift\n\
  45    // MARK: - Segues\n\n47    override func prepare(for segue: UIStoryboardSegue,\
  \ sender: Any?) {\n48        if segue.identifier == \"showDetail\" {\n49       \
  \     if let indexPath = tableView.indexPathForSelectedRow {\n50               \
  \ let selectedBook: Book = myBookStore.bookList[indexPath.row]\n51             \
  \   let controller = (segue.destination as! UINavigationController).topViewController\
  \ as! DetailViewController\n52                controller.detailItem = selectedBook\n\
  \n54                controller.navigationItem.leftBarButtonItem = splitViewController?.displayModeButtonItem\n\
  55                controller.navigationItem.leftItemsSupplementBackButton = true\n\
  56                controller.delegate = self\n57            }\n58        } else\
  \ if segue.identifier == \"addBookSegue\" {\n59            let vc = segue.destination\
  \ as! AddBookViewController\n60            vc.delegate = self\n61        }\n62 \
  \   }\n```\n**代码清单 14-1.** `prepareForSegue` 方法\n\n注意\n\n有助于组织代码的东西可以在第 47 行找到：`\"\
  // MARK: - Segues\"`。`// MARK:` 被称为标记点。它是用于 Objective-C 的 `#pragma mark` 的替代品。标记点有助于在跳转栏中分割代码，并使您能够快速跳转到由标记点指示的代码部分。当您在\
  \ `// MARK:` 后面输入内容时，Xcode 会将该标记点放入跳转栏的下拉菜单中，如图 14-3 所示。如果您只输入 `// MARK: -`，Xcode\
  \ 会在跳转栏的下拉菜单中添加一条行分隔线。Swift 还支持 `// TODO:` 和 `// FIXME:` 标记点来注释您的代码，并将它们列在跳转栏中。\n\
  \n![A341013_4_En_14_Fig3_HTML.jpg](img/A341013_4_En_14_Fig3_HTML.jpg)\n\n**图 14-3.**\
