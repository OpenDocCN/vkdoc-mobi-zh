  \n## 图 11-19. 连接表格视图\n\n2.  现在你的表格视图应该已经准备好了。你需要连接你的按钮，使其能够执行操作。在 Xcode 窗口的右上角，点击辅助编辑器按钮（看起来像两个圆圈）。这将在右侧打开你的代码，并在左侧打开你的故事板。现在按住\
  \ Control 键将你的“添加”按钮拖拽到右侧的视图控制器代码中，如图 11-20 所示。\n\n![A341013_4_En_11_Fig20_HTML.jpg](img/A341013_4_En_11_Fig20_HTML.jpg)\n\
  \n## 图 11-20. 为按钮对象添加操作\n\n3.  只要将“添加”按钮放置在你的类中并且不在任何方法内部，它放在代码中的位置就无关紧要。为了有序组织，它应该放在类属性之后。当你松开鼠标时，系统会提示你选择要创建的连接类型。将连接（Connection）设置为操作（Action）。然后为你新方法添加一个名称，例如\
  \ `addNew`，如图 11-21 所示。点击连接（Connect）完成连接。\n\n![A341013_4_En_11_Fig21_HTML.jpg](img/A341013_4_En_11_Fig21_HTML.jpg)\n\
  \n## 图 11-21. 更改连接的类型和名称\n\n4.  你还需要为你的表格视图创建一个输出口。将表格视图从视图控制器场景拖拽到代码顶部（紧挨类定义下方，如图\
  \ 11-22 所示）。确保连接设置为输出口（Outlet），并将表格视图命名为 `myTableView`。稍后你将需要这个输出口来告诉你的表格视图进行刷新。点击连接（Connect）完成连接。\n\
  \n![A341013_4_En_11_Fig22_HTML.jpg](img/A341013_4_En_11_Fig22_HTML.jpg)\n\n## 图\
  \ 11-22. 为表格视图创建输出口\n\n界面现在已经完成了，但你仍然需要添加代码来让界面执行操作。回到标准编辑器（点击 Xcode 工具栏右上角两个圆圈图标左侧的列表图标），并从左侧文件列表中选择\
  \ `ViewController.swift` 文件。由于现在你有一个需要关注的表格视图，你需要告诉你的类它可以处理表格视图。将文件顶部的类声明修改为以下内容：\n\
  \n```\nclass ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource\
  \ {\n```\n\n你在声明中添加了 `UITableViewDelegate` 和 `UITableViewDataSource`。这告诉你的控制器它可以充当表格视图委托和数据源。这些被称为协议（protocols）。协议告诉一个对象它必须实现某些方法来与其他对象交互。例如，要遵守\
  \ `UITableViewDataSource` 协议，你需要实现以下方法：\n\n```\nfunc tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int\n```\n\n没有这个方法，表格视图将不知道要绘制多少行。\n\n\
  在继续之前，你需要告诉你的 `ViewController.swift` 文件关于 Core Data 的信息。为此，在文件顶部 `import UIKit`\
  \ 下方添加以下一行：\n\n```\nimport CoreData\n```\n\n你还需要向 `ViewController` 类添加一个托管对象上下文（managed\
  \ object context）。在 `class ViewController` 这行之后立即添加以下行：\n\n```\nvar managedObjectContext:\
  \ NSManagedObjectContext!\n```\n\n现在你已经有了一个变量来保存你的 `NSManagedObjectContext`，你需要实例化它以便可以向其中添加对象。为此，你需要将以下行添加到你的\
  \ `override func viewDidLoad()` 方法中：\n\n```\nlet appDelegate: AppDelegate = UIApplication.shared.delegate\
  \ as! AppDelegate\nmanagedObjectContext = appDelegate.persistentContainer.viewContext\
  \ as NSManagedObjectContext\n```\n\n第一行创建了一个指向应用程序委托的常量。第二行将你的 `managedObjectContext`\
  \ 变量指向应用程序委托的 `managedObjectContext`。在整个应用程序中使用同一个托管对象上下文通常是一个好主意。\n\n你要添加的第一个新方法是一个用于查询数据库记录的方法。调用这个方法\
  \ `loadBooks`。\n\n```\n1 func loadBooks() -> [Book] {\n2     let fetchRequest: NSFetchRequest\
  \ = Book.fetchRequest()\n3     var result: [Book] = []\n4     do {\n5          result\
  \ = try managedObjectContext.fetch(fetchRequest)\n6     } catch {\n7          NSLog(\"\
  My Error: %@\", error as NSError)\n8     }\n9     return result\n10 }\n```\n\n这段代码比你之前看到的稍微复杂一些，所以我们来逐步解析一下。第\
  \ 1 行声明了一个名为 `loadBooks` 的新函数，它返回一个 `Book` 数组。然后在加载完成后返回该数组。\n\n现在你需要为你的表格视图添加数据源方法。这些方法告诉你的表格视图有多少个分区，每个分区有多少行，以及每个单元格应该是什么样子。将以下代码添加到\
  \ `ViewController.swift` 文件中：\n\n```\n1 func tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\n2     return loadBooks().count\n\
  3 }\n\n5 func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\n6     guard let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"Cell\") else { return UITableViewCell() }\n7     let book: Book = loadBooks()[indexPath.row]\n\
  8     cell.textLabel?.text = book.title\n9     return cell\n10 }\n```\n\n在第 2 行，你调用\
  \ `Book` 数组的 `count` 方法来获取表格视图的行数。在第 5 到第 9 行，你创建并返回你的单元格。第 6 行为你创建一个可用的单元格。这是创建单元格的标准代码。标识符允许你在一个表格视图中有多种类型的单元格，但这更复杂。第\
  \ 7 行从 `loadBooks()` 数组中获取你的 `Book` 对象。第 8 行将图书标题赋值给单元格中的 `textLabel`。`textLabel`\
  \ 是单元格中的默认标签。这就是在表格视图中显示 `loadBooks` 方法结果所需做的全部工作。但你仍然有一个问题。你的数据库中还没有任何图书。\n\n为了解决这个问题，你将向之前创建的\
  \ `addNew` 方法添加代码。在你创建的 `addNew` 方法内部添加以下代码：\n\n```\n1     @IBAction func addNew(_\
  \ sender: Any) {\n2         let book: Book = NSEntityDescription.insertNewObject(forEntityName:\
  \ \"Book\", into: managedObjectContext) as! Book\n3         book.title = \"My Book\"\
  \ + String(loadBooks().count)\n4         do {\n5             try managedObjectContext.save()\n\
  6         } catch let error as NSError {\n7             NSLog(\"My Error: %@\",\
  \ error)\n8         }\n9         myTableView.reloadData()\n10     }\n```\n\n第 2\
  \ 行根据“实体（Entity）”名称在数据库中为你的图书创建了一个新的 `Book` 对象，并将该对象插入到你之前创建的 `managedObjectContext`\
  \ 中。请记住，一旦对象被插入到托管对象上下文中，其更改就会被跟踪，并且可以被保存。第 3 行将图书标题设置为 `My Book` 并加上数组中的项目数量。显然，在实际应用中，你会希望将其设置为用户提供的名称或来自其他列表的名称。第\
  \ 4-8 行保存了托管对象上下文。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您给出的格式和注意事项，对提供的英文文本进行翻译。\n\n\n在\
  \ Swift 3.0 中，Apple 更改了错误处理方式。Swift 4.0 的错误处理方式与 Swift 3.0 几乎相同。现在，当执行可能引发错误的操作时，可以使用`try`然后`throw`一个错误。第\
  \ 9 行告诉`UITableView`重新加载自身以显示新添加的`Book`。现在构建并运行应用程序。多次点击 + 按钮。你将向对象存储中添加新的`Book`对象，如图\
  \ 11-23 所示。如果你退出应用并重新启动，你会注意到数据仍然存在。\n\n![A341013_4_En_11_Fig23_HTML.jpg](img/A341013_4_En_11_Fig23_HTML.jpg)\n\
  \nFigure 11-23. 最终应用\n\n这是对 iOS 中 Core Data 的简要介绍。Core Data 是一个强大的 API，但也需要花费大量时间去掌握。\n\
  \n## 总结\n\n以下是本章涵盖的主题摘要：\n\n*   偏好设置：你学习了使用`UserDefaults`在 iOS、macOS、tvOS 和 watchOS\
  \ 上保存和读取偏好设置文件。\n*   数据库：你了解了什么是数据库，以及为何使用数据库比将信息保存到偏好设置文件更可取。\n*   数据库引擎：你学习了 Apple\
  \ 集成到 macOS、tvOS 和 iOS 中的 SQLite 数据库引擎及其优缺点。\n*   Core Data：Apple 提供了用于与 SQLite\
  \ 数据库交互的框架。该框架简化了接口的使用。\n*   书店应用：你创建了一个简单的 Core Data 应用，并使用 Xcode 为你的书店创建了一个数据模型。你还学习了如何在两个实体之间建立关系。最后，你使用\
  \ Xcode 为你的 Core Data 模型创建了一个简单的接口。\n\n## 练习\n\n*   向应用添加一个新视图，允许用户输入书名。\n*   提供一种从列表中删除图书的方法。\n\
  *   创建一个`Author`对象并将其添加到`Book`对象中。\n\n# 12. 协议和委托\n\n恭喜！你正在掌握成为 iOS 开发者所需的技能！然而，iOS\
  \ 开发者还需要理解两个额外主题才能获得成功：协议（Protocols）和委托（Delegates）。新开发者很容易被这些主题压倒，因此我们首先介绍了 Swift\
  \ 语言的基础知识。阅读本章后，你会看到协议和委托非常有用，并且不难理解和实现。\n\n## 多重继承\n\n我们在第 5 章讨论了对象继承。简而言之，对象继承意味着子类可以继承父类的所有特性，如图\
  \ 12-1 所示。\n\n![A341013_4_En_12_Fig1_HTML.jpg](img/A341013_4_En_12_Fig1_HTML.jpg)\n\
  \nFigure 12-1. 典型的 Swift 继承\n\nC++、Perl 和 Python 都具有称为多重继承的特性，它允许一个类从多个父类继承行为和特性，如图\
  \ 12-2 所示。\n\n![A341013_4_En_12_Fig2_HTML.jpg](img/A341013_4_En_12_Fig2_HTML.jpg)\n\
  \nFigure 12-2. 多重继承\n\n多重继承可能会出现问题，因为它会导致歧义。因此，Swift 不实现多重继承，而是实现了称为协议（Protocol）的机制。\n\
  \n## 理解协议\n\nApple 将协议定义为一组函数声明的列表，与类定义无关。协议类似于类，不同之处在于协议不提供任何需求的实现；它只描述实现应具有的外观。\n\
  \n类可以采用该协议来提供这些需求的实际实现。任何满足协议要求的类型都被称为符合该协议。\n\n## 协议语法\n\n协议的定义方式与类类似，如清单 12-1\
  \ 所示。\n\n```\nprotocol RandomNumberGenerator {\n    var mustBeSettable: Int { get\
  \ set }\n    var doesNotNeedToBeSettable: Int { get }\n    func random() -> Double\n\
  }\n```\n*Listing 12-1. 协议定义*\n\n如果某个类有父类，则需要在它采用的任何协议之前列出父类名称，后跟逗号，如清单 12-2 所示。\n\
  \n```\nclass MyClass: MySuperclass, RandomNumberGenerator, AnotherProtocol {\n \
  \   // 类定义写在这里\n}\n```\n*Listing 12-2. 协议在父类之后列出*\n\n协议还指定每个属性必须具有 gettable（可获取）或\
  \ gettable 和 settable（可获取和可设置）的实现。gettable 属性是只读的，而 gettable 和 settable 属性则不是（如前面的清单\
  \ 12-1 所示）。\n\n属性始终声明为变量属性，前缀为`var`。gettable 和 settable 属性在其类型声明后通过`{ get set }`表示，而\
  \ gettable 属性则通过`{ get }`表示。\n\n## 委托\n\n委托是一种设计模式，它允许一个类或结构体将其部分职责转交（或委托）给另一种类型的实例。这种设计模式通过定义一个封装了委托职责的协议来实现。委托可用于响应特定操作或从外部源检索数据，而无需了解该外部源的底层类型。\n\
  \n清单 12-3 定义了两个用于随机数字猜测游戏的协议。\n\n```\nprotocol RandomNumberGame {\n    var machine:\
  \ Machine { get }\n    func play()\n}\n\nprotocol RandomNumberGameDelegate {\n \
  \   func gameDidStart(game: RandomNumberGame)\n    func game(game: RandomNumberGame,\
  \ didStartNewTurnWithGuess randomGuess: Int)\n    func gameDidEnd(game: RandomNumberGame)\n\
  }\n```\n*Listing 12-3. 协议定义*\n\n`RandomNumberGame`协议可以被任何涉及随机数生成和猜测的游戏采用。`RandomNumberGameDelegate`协议可以被任何类型的类采用，以跟踪`RandomNumberGame`协议的进度。\n\
  \n## 协议和委托示例\n\n本节将向你展示如何创建一个更复杂的随机数字猜测应用，以说明如何使用协议和委托。应用的主视图显示用户的猜测以及该猜测是高了、低了还是正确，如图\
  \ 12-3 所示。\n\n![A341013_4_En_12_Fig3_HTML.jpg](img/A341013_4_En_12_Fig3_HTML.jpg)\n\
  \nFigure 12-3. 猜测游戏应用主视图\n\n当用户点击“Guess Random Number”按钮时，他们将被带到一个输入屏幕以输入他们的猜测，如图\
  \ 12-4 所示。\n\n![A341013_4_En_12_Fig4_HTML.jpg](img/A341013_4_En_12_Fig4_HTML.jpg)\n\
