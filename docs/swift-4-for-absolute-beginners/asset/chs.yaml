- '# 成为一名出色的 iOS 开发者


  既然你已经准备好成为一名软件开发人员，并且阅读了本书的引言，那么你需要熟悉几个关键概念。你的计算机程序会精确地执行你告诉它的指令——不多也不少。它会遵循由操作系统和
  Swift 编程语言定义的编程规则。你的程序不会在意你今天是否心情不好，也不会在意你要求它执行某个操作的次数。通常，你认为你告诉程序要做的事情，和它实际执行的事情，是两回事。


  ## 成功的关键


  如果你还没有读过，请花几分钟时间阅读本书的引言。引言会告诉你如何访问与每章相关的免费网络研讨会、论坛以及 YouTube 视频。此外，你还会更好地理解本书为何使用
  Swift Playground 编程环境，以及如何在开发 iOS 应用时取得成功。


  根据你的背景，处理这种绝对非黑即白的事情可能会让你感到沮丧。很多时候，编程学生都会抱怨：“这不是我想要它做的！”当你开始在编程中积累经验和信心时，你会开始像程序员一样思考。你将理解软件设计和逻辑，体验让你的程序完全按照你的意愿执行的成就感。


  ## 像开发者一样思考


  软件开发涉及编写计算机程序，然后让计算机执行该程序。计算机程序是你希望计算机执行的一组指令。在开始编写计算机程序之前，列出你希望程序执行步骤的顺序是很有帮助的。这种分步过程被称为**算法**。


  如果你想编写一个烤面包片的计算机程序，你首先要编写一个算法。该算法可能如下所示：


  1.  从袋子里拿出面包。

  2.  将一片面包放入烤面包机。

  3.  按下“烤面包”按钮。

  4.  等待面包片弹起。

  5.  从烤面包机中取出烤好的面包。


  乍一看，这个算法似乎解决了问题。然而，该算法遗漏了许多细节，并做出了许多假设。以下是一些例子：


  -   用户想要哪种面包？用户想要白面包、全麦面包还是其他种类的面包？

  -   用户希望面包烤到什么程度？浅色还是深色？

  -   面包烤好后，用户想在面包上放什么：黄油、人造黄油、蜂蜜还是草莓酱？

  -   这个算法对所有用户，无论其文化和语言背景，都适用吗？某些文化中可能有另一个表示“烤面包”的词语，或者根本不知道烤面包是什么。


  现在，你可能会想，对于一个简单的烤面包程序来说，这未免太详细了。多年来，软件开发一直背负着耗时长、成本高、不符合用户需求的声誉。之所以会有这种名声，是因为计算机程序员经常在还没有彻底思考清楚他们的算法之前就开始编写程序。


  制作成功应用的关键要素是**设计需求**。设计需求可以是正式而详细的，也可以简单到像一张纸上的列表。设计需求之所以重要，是因为它们能帮助开发人员在应用开发完成时明确它应该做什么和不应该做什么。设计需求不应由程序员闭门造车，而应通过开发者、用户和客户之间的协作产生。


  你成功应用的另一个关键要素是**用户界面**设计。苹果建议你将超过 50% 的整个开发过程时间用于关注 UI 设计。设计可以使用简单的纸和笔，或者使用 Xcode
  的 `storyboard` 功能来布局你的屏幕元素。许多软件开发人员从 UI 设计开始，在布局完所有屏幕元素并让众多用户查看纸面原型后，他们根据屏幕布局撰写设计需求。


  ### 注意


  如果你要从本章中带走什么，那就是在开始软件开发之前考虑设计需求和用户界面设计的重要性。这在软件开发周期中是对时间最有效（且成本最低）的运用。使用铅笔和橡皮擦比在开始编程前没有让其他人审阅设计而后来修改代码要容易得多、快得多。


  在尽最大努力完善所有设计需求、布局完所有用户界面屏幕、并让客户或潜在用户审阅你的设计并给出反馈之后，你就可以开始编码了。一旦开始编码，设计需求和用户界面屏幕可能会发生变化，但这些变化通常是微小的，并且很容易通过开发过程来适应。参见图
  1-1 和图 1-2。


  图 1-1 展示了开发前一个租赁报告应用屏幕的纸面原型。在设计需求的同时开发纸面原型屏幕，可以迫使开发人员在编码开始前就考虑到应用程序的许多可用性问题。这有助于缩短应用程序的开发时间，带来更好的用户体验，并在
  App Store 上获得更好的评价。图 1-2 展示了租赁报告应用视图完成后的样子。请注意纸面原型工具如何使你能够将应用模型做得与实际效果一模一样。


  ![A341013_4_En_1_Fig2_HTML.jpg](img/A341013_4_En_1_Fig2_HTML.jpg)


  **图 1-2。** 这是已完成的 iPhone 租赁报告应用。此应用名为 `WalkAround`。


  ![A341013_4_En_1_Fig1_HTML.jpg](img/A341013_4_En_1_Fig1_HTML.jpg)


  **图 1-1。** 这是开发开始前，iPhone 移动租赁报告应用`登录`屏幕的 UI 纸面原型。此 UI 设计纸面原型是使用 InVision 完成的。




  '
- '# 完成开发周期


  现在你已经掌握了设计需求、用户界面设计，并编写了程序，接下来该做什么？编程之后，你需要确保程序符合设计需求和用户界面设计，同时确认没有任何错误。用编程的术语来说，错误被称为
  bug（缺陷）。Bug 是指程序中不希望出现的结果，必须在应用发布到 App Store 之前修复。在程序中查找错误并确保程序满足设计需求的过程称为测试。通常情况下，测试由经验丰富的软件测试方法论专家执行，且此人并非应用的编写者。软件测试通常被称为质量保证（`QA`）。


  > **注意：** 当应用准备好提交到 App Store 时，Xcode 会为文件添加 `.app` 或 `.ipa` 扩展名，例如 `appName.app`。这就是为什么
  iPhone、iPad 和 Mac 应用程序被称为应用（app）。本书中，程序（program）、应用（application）和应用（app）均指代同一概念。


  在测试阶段，开发者需要与 `QA` 人员协作，确定应用为何未能按设计运行。这个过程称为调试。它要求开发者逐步执行程序，找出应用无法按设计工作的原因。图 1-3
  展示了完整的软件开发周期。


  ![A341013_4_En_1_Fig3_HTML.jpg](img/A341013_4_En_1_Fig3_HTML.jpg)


  **图 1-3.** 典型的软件开发周期


  在测试和调试过程中，经常需要修改需求（设计），以使应用对客户更易用。完成设计需求和用户界面更改后，整个过程将重新开始。


  最终，所有人共同努力开发的应用必须提交到 App Store。关于在周期中的哪个时间点进行提交，需要考虑许多因素：


  - 开发成本

  - 预算

  - 应用的稳定性

  - 投资回报率


  开发者和管理层之间总会有权衡。开发者希望应用尽善尽美，而管理层希望尽快从投资中获得收益。如果将发布日期交给开发者决定，应用可能永远不会提交到 App Store。开发者会一直不断调整应用，使其更快、更高效、更易用。然而，总有一个时刻，代码必须从开发者手中“撬”出来，上传到
  App Store，以便实现其应有的使命。


  '
- '# 介绍面向对象编程


  正如引言中详细讨论的，Playground 让你能够专注于面向对象编程（`OOP`），而无需一次性掌握所有 Swift 编程语法和复杂的 Xcode 开发环境。相反，你可以专注于学习
  `OOP` 的基本原则，并快速运用这些原则编写你的第一个程序。


  几十年来，开发者一直在寻找更好的方法来编写可重用、可管理且在项目生命周期内易于维护的代码。`OOP` 旨在帮助实现代码重用性和可维护性，同时降低软件开发成本。


  `OOP` 可以被视为程序中对象的集合。对这些对象执行操作，以实现设计需求。


  对象是任何可以被操作的事物。例如，飞机、人或 iPad 上的屏幕/视图都可以是对象。你可能希望操作飞机使其倾斜转弯，希望让人行走，或者希望改变 iPad 上应用屏幕的颜色。


  ![A341013_4_En_1_Fig4_HTML.jpg](img/A341013_4_En_1_Fig4_HTML.jpg)


  **图 1-4.** 此 Playground 视图中有多个对象


  在你完成每一行代码时，Playground 就会执行该行代码，如图 1-4 所示。当你运行 Playground 应用时，用户可以对应用中的对象应用操作。Xcode
  是一个集成开发环境（`IDE`），让你能够在编程环境中运行应用。你可以先在电脑上测试应用，然后在 iOS 设备上运行，方法是使用 Xcode 的模拟器运行应用，如图
  1-5 所示。


  ![A341013_4_En_1_Fig5_HTML.jpg](img/A341013_4_En_1_Fig5_HTML.jpg)


  **图 1-5.** 这个示例 iPhone 应用包含一个表格对象，用于组织购物清单。可以对对象应用诸如“向左旋转”或“用户选择了第 3 行”之类的操作。


  对对象执行的操作称为方法。方法操纵对象以实现你希望应用完成的任务。例如，对于一个 `jet` 对象，你可能有以下方法：


  ```

  goUp

  goDown

  bankLeft

  turnOnAfterburners

  lowerLandingGear

  ```


  图 1-5 中的 `table` 对象在程序中实际上被称为 `UITableView`，它可能具有以下方法：


  ```

  numberOfRowsInSection

  cellForRowAtIndexPath

  canEditRowAtIndexPath

  commitEditingStyle

  didSelectRowAtIndexPath

  ```


  大多数对象具有描述这些对象的数据。这些数据被定义为属性。每个属性以特定方式描述关联的对象。例如，`jet` 对象的属性可能如下：


  ```

  altitude = 10,000 feet

  heading = North

  speed = 500 knots

  pitch = 10 degrees

  yaw = 20 degrees

  latitude = 33.575776

  longitude = -111.875766

  ```


  对于图 1-5 中的 `UITableView` 对象，其属性可能如下：


  ```

  backgroundColor = White

  selectedRow = 3

  animateView = No

  ```


  对象的属性可以在程序运行时的任何时刻更改，无论是用户与应用交互时，还是程序员为实现设计需求而设计应用时。在特定时刻，对象属性中存储的值统称为对象的状态。


  状态是计算机编程中的一个重要概念。在教授学生有关状态的知识时，我们让他们走到窗边，在天空中找一架飞机。然后我们让他们打个响指，并想象该飞机在那特定时刻可能具有的一些属性值。这些值可能如下：


  ```

  altitude = 10,000 feet

  latitude = 33.575776

  longitude = -111.875766

  ```


  这些值代表了对象在打响指那一特定时刻的状态。


  等待几分钟后，我们让学生找到同一架飞机，再次打响指，并记录飞机在那个特定时间点可能的状态。


  此时属性的值可能如下所示：


  ```

  altitude = 10,500 feet

  latitude = 33.575665

  longitude = -111.875777

  ```


  注意对象的状态如何随时间变化。


  '
- "# 使用 Playground 界面\n\nPlayground 提供了一种极好的方式来应用刚刚讨论的概念，而无需同时学习 Xcode 和 Swift 语言的所有复杂性。你只需花几分钟熟悉\
  \ Playground 界面，就可以开始编写程序。\n\n从技术上讲，Playground 界面并不是像你用来编写 iOS 应用那样的真正 `IDE`，但它非常接近，并且学起来容易得多。真正的\
  \ `IDE` 将代码开发、用户界面布局、调试工具、文档以及模拟器/控制台启动整合到单个应用中，如图 1-6 所示。然而，Playground 在视觉、感觉和功能上与你用来开发应用的\
  \ Xcode `IDE` 非常相似。\n\n![A341013_4_En_1_Fig6_HTML.jpg](img/A341013_4_En_1_Fig6_HTML.jpg)\n\
  \n**图 1-6.** 带有 iPhone 模拟器的 Xcode IDE\n\n在下一章中，你将逐步了解 Playground 界面并编写你的第一个程序。\n\
  \n\n\n## 总结\n\n恭喜你，你已经完成了本书的第一章。理解以下术语至关重要，因为本书后续内容将不断强化这些概念：\n\n- 计算机程序\n- 算法\n\
  - 设计要求\n- 用户界面\n- Bug（程序错误）\n- 质量保证（QA）\n- 调试\n- 面向对象编程（OOP）\n- 对象\n- 属性\n- 方法\n\
  - 对象的状态\n- 集成开发环境（IDE）\n\n## 下一章节\n\n剩余章节将提供你学习 Swift 和编写 iOS 应用所需的信息。术语和概念会反复出现并不断强化，因此你会逐渐熟悉它们。请坚持下去，对自己保持耐心。\n\
  \n## 练习题\n\n- 回答以下问题：\n  - 为什么在用户需求上花费时间如此重要？\n  - 设计要求和算法有什么区别？\n  - 方法和属性有什么区别？\n\
  \  - 什么是 Bug？\n  - 什么是状态？\n- 编写一个自动售货机的算法，描述从投入硬币到汽水售出的整个过程。假设每瓶汽水的价格为 80 美分。\n\
  - 为一个用于操控自动售货机的应用编写设计要求。\n\n"
- '# 2. 编程基础


  本章重点介绍成为一名优秀 Swift 程序员所必备的基础知识。本章涵盖如何使用 Playground 用户界面、如何编写你的第一个 Swift 程序，以及如何使用
  Xcode 集成开发环境（IDE）。


  > 注：我们将向你介绍如何使用 Playground，它能让你立即开始编程，而无需担心 Xcode 项目的所有复杂性。我们采用这种方式是为了帮助你快速掌握概念，避免挫败感，并为你打下坚实的基础。


  ## Xcode 漫游


  Xcode 中的 Playground 让编写 Swift 代码变得极其简单且有趣。输入一行代码，结果会立即显示。如果你的代码需要运行一段时间（例如在循环或分支中），你可以在时间线区域观察其进度。在
  Playground 中完成代码后，你可以轻松地将代码迁移到 Swift iOS 项目中。借助 Xcode Playground，你可以实现以下操作：


  - 设计或修改算法，并实时观察每一步的结果

  - 创建新的测试，在将其纳入测试套件之前验证其有效性


  首先，你需要进一步了解 Xcode 用户界面。当你打开一个 Xcode iOS 项目时，你会看到如图 2-1 所示的界面。


  Xcode 用户界面旨在帮助你高效编写 Swift 应用。该用户界面还能帮助新程序员学习 iOS 应用的用户界面。接下来，你将探索 Xcode 的 IDE 工作区和
  Playground 的主要区域。


  ![图 2-1. 包含 Swift 项目的 Xcode 集成开发环境](img/A341013_4_En_2_Fig1_HTML.jpg)


  ### 探索工作区窗口


  工作区窗口（如图 2-2 所示）允许你打开和关闭文件、设置应用偏好、开发和编辑应用，以及查看文本输出和错误控制台。


  工作区窗口是你创建和管理项目的主要界面。它会自动适应当前的任务，并且你可以进一步配置窗口以适应你的工作风格。你可以根据需要打开多个工作区窗口。


  ![图 2-2. Xcode 的工作区窗口](img/A341013_4_En_2_Fig2_HTML.jpg)


  工作区窗口包含四个主要区域：编辑器、导航器、调试区和实用工具区。


  当你选择一个项目文件时，其内容会出现在编辑器区域，Xcode 会在相应的编辑器中打开该文件。


  你可以通过工具栏中视图选择器的按钮来隐藏或显示其他三个区域。这些按钮位于窗口的右上角。


  - ![导航器按钮](img/A341013_4_En_2_Figa_HTML.jpg) 单击此按钮可显示或隐藏导航器区域。在这里，你可以查看和浏览项目中的文件及其他方面。

  - ![调试按钮](img/A341013_4_En_2_Figb_HTML.jpg) 单击此按钮可显示或隐藏调试区域。在这里，你可以控制程序执行并调试代码。

  - ![实用工具按钮](img/A341013_4_En_2_Figc_HTML.jpg) 单击此按钮可显示或隐藏实用工具区域。实用工具区域有多种用途，最常见的是查看和修改文件的属性，以及向项目中添加现成的资源。


  ### 导航工作区


  你可以从导航器区域访问项目中的文件、符号、单元测试、诊断信息及其他功能。在导航器选择栏中，你可以选择适合当前任务的导航器。每个导航器的内容区域都能让你访问项目中相关的部分，而每个导航器的过滤栏则允许你限制显示的内容。


  在导航器选择栏中，可以选择以下选项：


  - ![项目导航器图标](img/A341013_4_En_2_Figd_HTML.jpg) **项目导航器。** 添加、删除、分组和管理项目中的文件；或选择文件在编辑器区域中查看或编辑其内容。

  - ![源代码管理导航器图标](img/A341013_4_En_2_Fige_HTML.jpg) **源代码管理导航器。** 当你使用版本控制系统（VCS）（如
  Git 或 Subversion (SVN)）时，查看对项目文件所做的详细更改历史。

  - ![符号导航器图标](img/A341013_4_En_2_Figf_HTML.jpg) **符号导航器。** 浏览项目中的类层次结构。

  - ![查找导航器图标](img/A341013_4_En_2_Figg_HTML.jpg) **查找导航器。** 使用搜索选项和过滤器快速查找项目中的文本。

  - ![问题导航器图标](img/A341013_4_En_2_Figh_HTML.jpg) **问题导航器。** 查看在打开、分析和构建项目时发现的诊断信息、警告和错误等问题。

  - ![测试导航器图标](img/A341013_4_En_2_Figi_HTML.jpg) **测试导航器。** 创建、管理、运行和审查单元测试。

  - ![调试导航器图标](img/A341013_4_En_2_Figj_HTML.jpg) **调试导航器。** 在程序执行期间的指定时间点检查正在运行的线程及相关的堆栈信息。

  - ![断点导航器图标](img/A341013_4_En_2_Figk_HTML.jpg) **断点导航器。** 通过指定触发条件等特性来微调断点，并在一处查看项目中所有的断点。

  - ![报告导航器图标](img/A341013_4_En_2_Figl_HTML.jpg) **报告导航器。** 查看构建历史记录。




  ### 编辑项目文件


  在 Xcode 中，大部分开发工作都在编辑区进行。编辑区是工作区窗口中始终可见的主要区域。你最常使用的编辑器如下：


  - **源代码编辑器**：编写和编辑 Swift 源代码。

  - **界面构建器**：以图形化方式创建和编辑用户界面文件（参见图 2-3）。

  - **项目编辑器**：查看和编辑应用的构建方式，例如指定构建选项、目标架构和应用程序授权。


  当你选中某个文件时，Xcode 会在相应的编辑器中打开该文件。在图 2-3 中，`Main.storyboard` 文件在项目导航器中处于选中状态，并且在界面构建器中打开。


  ![A341013_4_En_2_Fig3_HTML.jpg](img/A341013_4_En_2_Fig3_HTML.jpg)


  图 2-3. Xcode 的界面构建器展示一个故事板文件


  编辑器提供了三个控件：


  - ![A341013_4_En_2_Figm_HTML.jpg](img/A341013_4_En_2_Figm_HTML.jpg) 点击此按钮可打开**标准编辑器**。你将看到单个编辑器窗格，其中包含所选文件的内容。

  - ![A341013_4_En_2_Fign_HTML.jpg](img/A341013_4_En_2_Fign_HTML.jpg) 点击此按钮可打开**辅助编辑器**。你将看到一个独立的编辑器窗格，其内容与标准编辑器窗格中的内容在逻辑上相关。

  - ![A341013_4_En_2_Figo_HTML.jpg](img/A341013_4_En_2_Figo_HTML.jpg) 点击此按钮可打开**版本编辑器**。你将看到一个窗格中显示所选文件与另一窗格中同一文件的另一个版本之间的差异。通常在处理源代码控制时使用。


  ## 创建你的第一个 Swift Playground 程序


  既然你已经对 Xcode 有了一些了解，那么是时候编写你的第一个 Swift playground 程序，并开始理解 Swift 语言、Xcode 以及一些语法知识了。首先，你需要安装
  Xcode。


  ### 安装并启动 Xcode 9


  Xcode 9 可从 Mac App Store 免费下载，如图 2-4 所示。


  ![A341013_4_En_2_Fig4_HTML.jpg](img/A341013_4_En_2_Fig4_HTML.jpg)


  图 2-4. Xcode 9 可从 Mac App Store 免费下载


  > **注意**

  > 此软件包包含编写 iOS、watchOS、tvOS 和 macOS 应用所需的一切。要将应用发布到 iOS 或 macOS App Store，你需要申请
  Apple Developer Program，并在准备提交时支付 $99 美元。


  图 2-5 展示了 Apple Developer Program 网站 `https://developer.apple.com/`。


  ![A341013_4_En_2_Fig5_HTML.jpg](img/A341013_4_En_2_Fig5_HTML.jpg)


