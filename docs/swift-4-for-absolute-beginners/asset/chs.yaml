  \n## 练习\n\n- 扩展随机数生成器应用，使其在启动时在`Label`对象中显示日期和时间。\n- 在显示日期和时间标签后，添加一个按钮，用于用新时间更新该日期和时间标签。\n\
  \n# 11. 存储信息\n\n作为开发者，你会遇到许多需要存储数据的不同场景。用户会期望你的应用每次启动时能记住偏好设置和其他信息。前面的章节讨论了`BookStore`应用。对于这个应用，用户会期望你的应用记住书店中的所有书籍。你的应用需要一种方法来存储这些信息、检索信息，并可能对数据进行搜索和排序。处理数据有时会有些困难。幸运的是，Apple\
  \ 提供了方法和框架来简化这个过程。\n\n本章讨论两种需要存储数据的不同格式。首先介绍如何在 iOS 设备上保存偏好设置文件，然后讨论如何在应用中使用 SQLite\
  \ 数据库来存储和检索数据。\n\n## 存储考量\n\nMac 和 iPhone 在存储方面有一些主要差异，这些差异会影响你处理数据的方式。我们先讨论 Mac\
  \ 以及如何针对它进行开发。\n\n在 Mac 上，默认情况下，应用程序存储在`Applications`文件夹中。每个用户都有自己的 home 文件夹，用于存储与该用户相关的偏好设置和信息。并非所有用户都有权限写入`Applications`文件夹或应用程序包本身。\n\
  \n在 iPhone 和 iPad 上，开发者不需要处理不同用户的问题。每个使用 iPhone 的人都有相同的权限和相同的文件夹。不过，对于 iPhone，还有其他因素需要考虑。iOS\
  \ 设备上的每个应用程序都在自己的沙盒中。这意味着应用程序写入的文件只能被该应用程序本身查看和使用。这为 iPhone、iPad、Apple TV 和 Apple\
  \ Watch 提供了更安全的环境，但同时也改变了处理数据存储的方式。\n\n## 数据库\n\n你已经学习了如何存储一些小段信息并在以后检索它们。如果有更多信息需要存储怎么办？如果需要对信息进行搜索或排序怎么办？这种场景下就需要用到数据库。\n\
  \n数据库是一种以易于搜索或检索的方式存储大量信息的工具。从数据库读取数据时，返回的是数据片段，而不是整个文件。你日常生活中使用的许多应用都基于某种数据库。你的网上银行应用从数据库中检索账户活动。你的超市使用数据库检索不同商品的价格。一个简单的数据库例子是电子表格。电子表格中可能有很多列和很多行。电子表格中的列代表你要存储的不同类型的信息。在数据库中，这些被称为属性。电子表格中的行则会被视为数据库中的不同记录。\n\
  \n\n\n# 在数据库中存储信息\n\n对于开发者而言，数据库通常是个令人望而生畏的主题；大多数开发者会将数据库与 Microsoft SQL Server\
  \ 或 Oracle 这类企业级数据库服务器联系起来。这些应用程序需要花费时间进行设置，并且需要持续管理。对于大多数开发者来说，像 Oracle 这样的数据库系统可能过于复杂。幸运的是，苹果公司在\
  \ iOS、macOS 和 tvOS 中内置了一个小巧高效的数据库引擎，名为 SQLite。这让你能够获得复杂数据库服务器的许多功能，而无需承担其开销。\n\n\
  `SQLite` 在为应用程序存储信息方面提供了极大的灵活性。它将整个数据库存储在一个单一文件中。它速度快、可靠，并且易于在你的应用程序中实现。关于 `SQLite`\
  \ 数据库最棒的一点是，无需安装任何软件；苹果公司已经为你处理好了这一切。\n\n然而，作为开发者，你应当了解 `SQLite` 存在的一些局限性。\n\n-\
  \ `SQLite` 被设计为单用户数据库。你不应在需要多人同时访问同一数据库的环境中使用 `SQLite`。这可能导致数据丢失或损坏。\n- 在商业领域，数据库可能会变得非常庞大。数据库管理员处理规模高达半\
  \ TB 的数据库并不罕见，在某些情况下，数据库甚至可能变得更大。`SQLite` 应当能够毫无问题地处理较小的数据库，但如果你的数据库开始变得过大，你就会开始遇到性能问题。\n\
  - `SQLite` 缺乏企业级数据库解决方案所具备的一些备份和数据恢复功能。\n\n在本章中，你将专注于使用 `SQLite` 作为你的数据库引擎。如果你正在开发的应用程序中存在上述任何局限性，你可能需要考虑企业级数据库解决方案，但这已超出了本书的讨论范围。\n\
  \n**注意**\n\n`SQLite`（发音为“sequel-lite”）的名字源自结构化查询语言（`SQL`，发音为“sequel”）。`SQL` 是一种用于向数据库输入、搜索和检索数据的语言。\n\
  \n苹果公司已经努力解决了数据库开发中的许多挑战。作为开发者，你无需熟悉 `SQL`，因为苹果公司通过一个名为 Core Data 的框架为你处理了直接的数据库交互，这使得与数据库的交互变得更加容易。Core\
  \ Data 是苹果公司从 NeXT 的产品 Enterprise Object Framework 改编而来，并且使用 Core Data 比直接与 `SQLite`\
  \ 数据库交互要容易得多。通过 `SQL` 直接访问数据库超出了本书的讨论范围。\n\n# 开始使用 Core Data\n\n让我们从创建一个新的 Core\
  \ Data 项目开始。\n\n1.  打开 Xcode 并选择 **File** ➤ **New** ➤ **Project**。要创建一个 iOS Core\
  \ Data 项目，请从顶部菜单中选择 **iOS**。然后选择 **Single View App**，如图 11-1 所示。\n\n    ![A341013_4_En_11_Fig1_HTML.jpg](img/A341013_4_En_11_Fig1_HTML.jpg)\n\
  \n    **图 11-1.** 创建新项目\n\n2.  完成后点击 **Next** 按钮。下一个界面将允许你输入你想要使用的名称。在本章中，你将使用名称\
  \ `BookStore`。\n\n3.  靠近底部，你会看到一个名为 **Use Core Data** 的复选框。确保此项已勾选，然后点击 **Next**，如图\
  \ 11-2 所示。\n\n    **注意** Core Data 可以在任何时候添加到任何项目中。在创建项目时勾选该复选框，会将 Core Data 框架和一个默认数据模型添加到你的应用程序中。如果你知道自己将使用\
  \ Core Data，勾选此框将为你节省时间。\n\n    ![A341013_4_En_11_Fig2_HTML.jpg](img/A341013_4_En_11_Fig2_HTML.jpg)\n\
  \n    **图 11-2.** 将 Core Data 添加到项目中\n\n4.  选择保存项目的位置，然后点击 **Create**。\n\n完成后，你的新项目将会打开。它看起来类似于一个标准应用程序，不过现在你会多出一个\
  \ `BookStore.xcdatamodeld` 文件。这个文件被称为数据模型，它将包含你将要在 Core Data 中存储的数据的相关信息。\n\n##\
  \ 模型\n\n点击模型文件（`BookStore.xcdatamodeld`）将其打开。你将看到一个类似于图 11-3 所示的窗口。\n\n![A341013_4_En_11_Fig3_HTML.jpg](img/A341013_4_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3.** 空白的模型\n\n窗口分为四个部分。在左侧，是你的实体。用更常见的术语来说，这些就是你想在数据库中存储的对象或项目。\n\n右上部分包含实体的属性。属性是关于实体的信息片段。例如，一本书是一个实体，而书的标题是该实体的一个属性。\n\
  \n**注意**\n\n在数据库术语中，实体就是你的表，实体的属性被称为列。由这些实体创建的对象被称为行。\n\n右侧面板的中间部分将显示一个实体的所有关系。关系将一个实体与另一个实体连接起来。例如，你将创建一个\
  \ `Book` 实体和一个 `Author` 实体。然后你将它们关联起来，以便每本书都可以有一个作者。屏幕的右下部分处理的是提取属性。提取属性超出了本书的讨论范围，但它们允许你为数据创建过滤器或查询。\n\
  \n让我们创建一个实体。\n\n1.  点击窗口左下角的加号，或者从菜单中选择 **Editor** ➤ **Add Entity**，如图 11-4 所示。\n\
  \n    ![A341013_4_En_11_Fig4_HTML.jpg](img/A341013_4_En_11_Fig4_HTML.jpg)\n\n  \
  \  **图 11-4.** 添加新实体\n\n2.  在左侧，双击 **Entity** 名称并将其更改为 `Book`。\n\n    **注意** 实体名称必须大写首字母。\n\
  \n3.  现在让我们添加一些属性。属性可以被视为一本书的详细信息，因此你将存储书名、作者、价格和出版年份。显然，在你自己的应用程序中，你可能想要存储更多信息，例如出版商、页数和类型，但我们要从简单的开始。点击窗口右下角的加号，或者选择\
  \ **Editor** ➤ **Add Attribute**，如图 11-5 所示。如果你没有看到添加属性的选项，请确保你已经在左侧选中了 `Book` 实体。\n\
  \n    ![A341013_4_En_11_Fig5_HTML.jpg](img/A341013_4_En_11_Fig5_HTML.jpg)\n\n  \
  \  **图 11-5.** 添加属性\n\n\n\n## 添加新属性\n\n对于属性，你只需指定两个选项：名称和数据类型。不妨将此属性命名为 `title`。与实体不同，属性名称必须为小写。\n\
  \n接下来，你需要选择一种数据类型。选择正确的数据类型至关重要，它将影响数据在数据库中的存储和检索方式。列表中共有 13 个选项，可能让人望而生畏。我们将讨论最常用的选项，随着你对\
  \ Core Data 的熟悉，可以尝试其他选项。最常用的选项包括 `String`、`Integer 32`、`Decimal` 和 `Date`。对于书籍标题，请选择\
  \ `String`。\n\n- `String`：这是用于存储文本的属性类型。该类型应存储任何非数字或日期的信息。在此示例中，书名和作者姓名将是字符串。\n\
  - `Integer 32`：一个属性有三种可能的整数值类型。这些整数类型的区别仅在于最小值和最大值不同。在存储整数时，`Integer 32` 通常能满足大多数需求。整数是**无**小数点的数字。如果尝试将小数保存到整数属性中，小数部分将被截断。在此示例中，出版年份将是一个整数。\n\
  - `Decimal`：`Decimal` 是一种可以存储带有小数点的数字的属性类型。`Decimal` 与 `Double` 属性类似，但它们在最小值、最大值和精度上有所不同。`Decimal`\
  \ 应能处理任何货币值。在此示例中，你将使用 `Decimal` 来存储书籍价格。\n- `Date`：`Date` 属性顾名思义。它允许你存储日期和时间，并基于这些值执行搜索和查找。在此示例中，你不会使用此类型。\n\
  \n现在，让我们为书籍创建其余属性。接着，添加 `price`，它应为 `Decimal`。再添加书籍的出版年份。对于由两个单词组成的属性，标准做法是将第一个单词设为小写，第二个单词的首字母大写。例如，书籍出版年份属性的理想名称是\
  \ `yearPublished`。选择 `Integer 32` 作为属性类型。添加完所有属性后，你的屏幕应类似于图 11-6。\n\n> **注意：** 属性名称不能包含空格。\n\
  \n![A341013_4_En_11_Fig6_HTML.jpg](img/A341013_4_En_11_Fig6_HTML.jpg)\n\n**图 11-6.**\
  \ 完成后的 `Book` 实体\n\n> **注意：** 如果你有使用数据库的经验，会注意到你并没有添加主键。主键是一个字段（通常为数字），用于唯一标识数据库中的每条记录。在\
  \ Core Data 数据库中，无需创建主键。框架会为你处理这一切。\n\n现在，你已经完成了 `Book` 实体，让我们添加一个 `Author` 实体。\n\
  \n1. 添加一个新实体，并将其命名为 `Author`。\n2. 为此实体添加 `lastName` 和 `firstName`，两者均为字符串。\n\n完成后，你的实体列表中应该有两个实体。现在你需要添加关系。\n\
  \n1. 单击 `Book` 实体，然后按住屏幕右下角的加号（+）按钮。选择 `添加关系 (Add Relationship)`，如图 11-7 所示。（你也可以点击\
  \ Core Data 模型“关系 (Relationships)”部分下的加号。）\n\n![A341013_4_En_11_Fig7_HTML.jpg](img/A341013_4_En_11_Fig7_HTML.jpg)\n\
  \n**图 11-7.** 添加新关系\n\n2. 你将有机会为关系命名。通常，关系的名称与你引用的实体名称相同。输入 `author` 作为名称，然后从“目标\
  \ (Destination)”下拉菜单中选择 `Author`。\n\n3. 你已经创建了关系的一半。要创建另一半，请单击 `Author` 实体。点击屏幕右下角的加号（+），然后选择\
  \ `添加关系 (Add Relationship)`。使用你要连接的实体名称作为此关系的名称，因此将其命名为 `books`。（你在关系名称后添加了 `s`，因为一个作者可以有多本书。）在“目标\
  \ (Destination)”下选择 `Book`，在“反向 (Inverse)”下选择你上一步创建的 `author` 关系。在屏幕右侧的“实用工具 (Utilities)”窗口中，选择“数据模型检查器\
  \ (Data Model Inspector)”。将此关系的类型设置为“对多 (To Many)”。现在，你的模型应如图 11-8 所示。\n\n> **注意：**\
  \ 有时在 Xcode 中处理模型时，需要按 `Tab` 键来更新实体、属性和关系的名称。这个小特性可以追溯到 WebObjects 工具。\n\n![A341013_4_En_11_Fig8_HTML.jpg](img/A341013_4_En_11_Fig8_HTML.jpg)\n\
  \n**图 11-8.** 最终的关系\n\n默认情况下，Xcode 现在会识别并能使用你的新实体。如果你需要自定义 Core Data 对象，例如添加验证或自定义计算属性，则需要告诉\
  \ Xcode 为你生成 `NSManagedObject` 子类。在本章中，我们将使用 Xcode 的默认实现。你可以通过点击实体，然后查看右侧的“数据模型检查器\
  \ (Data Model Inspector)”（如图 11-9 所示），来确认 Xcode 将在运行时生成这些文件。确保 `Codegen` 设置为 `类定义\
  \ (Class Definition)`。\n\n![A341013_4_En_11_Fig9_HTML.jpg](img/A341013_4_En_11_Fig9_HTML.jpg)\n\
  \n**图 11-9.** 检查实体的 `Codegen` 状态\n\n当 Xcode 为你的实体生成类定义时，它会创建 `NSManagedObject` 的子类。`NSManagedObject`\
  \ 是处理所有 Core Data 数据库交互的对象。它提供了你在此示例中将使用的方法和属性。\n\n### 托管对象上下文\n\nXcode 将创建一个名为\
  \ `Book` 的托管对象类。在 Core Data 中，每个托管对象都应在托管对象上下文中存在。上下文负责跟踪对象的更改、执行撤销操作以及将数据写入数据库。这很有用，因为你现在可以一次保存大量更改，而不是逐个保存。这加快了保存记录的过程。作为开发者，你不需要跟踪对象何时被更改。托管对象上下文会为你处理所有这一切。\n\
