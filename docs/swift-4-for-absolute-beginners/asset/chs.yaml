  The result is \\(6 > 5 ? \"True\" : \"False\")\")\n```\n\n注意：上述代码 `(6>5 ? \"True\"\
  \ : \"False\")` 被称为三元运算。它本质上只是编写 `if/else` 语句的一种简化方式。\n\n4. 将这行代码放入你的代码中。这行代码告诉你的应用程序打印\
