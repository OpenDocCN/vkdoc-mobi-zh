  第 1 行末尾和第 4 行是大括号，用于定义代码块。这个代码块就定义了该方法。每个方法至少有一个代码块。


  第 2 行创建了一个名为 `hello` 的常量。正如你之前所学，常量是一个不能更改的值，即恒定不变的值。常量 `hello` 的值被赋为 `"Hello World!"`。由于你将
  `hello` 赋值为一个 `String` 值，因此 `hello` 变成了一个 `String` 类型，并可以使用与 `String` 相关的任何方法（回忆一下，你第一次接触字符串是在第
  3 章）。第 3 行可以重写为：


