- '# 8. Swift 编程基础


  Swift 是一种优雅的语言。它融合了编译型语言的效率以及许多脚本语言的灵活性和现代特性。


  本章介绍 Swift 中一些更常见的概念，例如属性和集合类。它还展示了在处理用户界面元素时，如何在 Xcode 中使用属性。这听起来任务繁重，但 Swift、Foundation
  框架和 Xcode 工具提供了丰富的对象和方法，以及一种轻松构建应用程序的方式。


  ### 使用 `let` 与 `var`


  如果你花了很多时间接触 Swift，会看到 `var` 一词出现在变量声明之前。你可能也在其他声明之前看到过 `let`。`var` 用于定义变量，而 `let`
  用于定义常量。这意味着，如果你用 `let` 声明一个值，将无法更改该值。以下代码定义了一个常量：


  ```

  let myName = "Brad"

  ```


  一旦定义了常量，就无法更改该值。


  注意


  如果你声明了一个变量且从未更改其值，Xcode 现在会发出警告。它会建议你使用 `let` 代替 `var`。


  ```

  myName = "John"

  ```


  这将会报错。如果你想创建一个可变的变量，需要使用 `var`。例如，你可以这样做：


  ```

  var myName = "Brad"

  myName = "John"

  ```


  这不会产生任何错误，因为 `myName` 现在是一个变量。这不仅适用于 `String` 和 `Int`，也可以用于集合和其他对象。


  变量提供了更大的灵活性，那么为什么有人会想使用常量呢？简单的答案是性能。如果你知道某个值不会改变，编译器可以将该值优化为常量。


  ### 理解集合


  理解集合是学习 Swift 的基础。事实上，集合对象几乎是所有现代面向对象语言库的基本构造（有时它们被称为容器）。简单来说，集合是一种能够容纳和管理其他对象的类。集合的全部意义在于它提供了一种高效存储和检索对象的通用方式。


  集合有多种类型。虽然它们都满足容纳其他对象的相同目的，但主要区别在于检索对象的方式。Swift 中最常用的集合是 `Array` 和 `Dictionary`。


  这些集合都可以作为常量或常规变量来创建。如果你将集合创建为常量，则必须在创建时用对象填充它。之后就无法再对其进行修改。




  '
- '# 使用数组


  `Array`类与其他集合类型一样，允许程序员管理一组对象。数组是一种有序集合，这意味着对象会按照特定顺序存入数组，并按照相同顺序取出。


  **注** – 有一些用于处理数组的方法，可以让你更改对象的顺序，或在数组的特定位置添加对象。


  `Array`类允许通过对象在数组中的索引来检索该对象。索引是对象在数组中所处的数值位置。例如，如果数组中有三个元素，则可以使用索引 0 到 2 来引用这些对象。与
  Swift 及其他编程语言中的大多数情况一样，索引从 0 开始，而不是从 1 开始。请参见代码清单 8-1。


  ```

  1    var myArray: [String] = ["One", "Two", "Three"]

  2    print(myArray[0])

  3    print(myArray[1])

  4    print(myArray[2])

  代码清单 8-1.

  访问数组中的对象

  ```


  如你所见，数组中的对象可以通过其索引来检索。索引从 0 开始，且不能超过数组大小减 1。你可以通过访问 `Array` 对象的 `count` 属性轻松计算出数组的大小，如下所示：


  ```

  var entries = myArray.count

  ```


  实际上，所有集合类型（包括 `Array` 和 `Dictionary`）都包含一个 `count` 属性。


  向数组末尾添加元素很简单。你只需在数组上调用 `append` 方法即可。请参见代码清单 8-2。


  ```

  1    var myArray: [String] = ["One", "Two", "Three"]

  2    myArray.append("Four")

  3    myArray.append("Five")

  4    myArray.append("Six")

  代码清单 8-2.

  向数组添加对象

  ```


  Swift 提供了多种不同的方法来向数组添加元素。如果你想向数组添加多个对象，可以使用标准的 `+=`（通常称为加等于）运算符。代码清单 8-3 创建了一个数组，然后在第
  2 行向该数组添加了三个 `String` 对象。注意新值是用方括号括起来的，而不是圆括号。


  ```

  1    var myArray: [String] = ["One", "Two", "Three"]

  2    myArray += ["Four", "Five", "Six"]

  代码清单 8-3.

  向数组添加多个对象

  ```


  如前所述，数组实际上是有序的。数组中对象的顺序很重要。有时你可能需要在数组的某个特定位置添加元素。你可以使用 `insert(at:)` 方法来实现这一点，如代码清单
  8-4 所示。


  ```

  1    var myArray: [String] = ["Two", "Three"]

  2    myArray.insert("One", at: 0)

  代码清单 8-4.

  在数组开头添加一个字符串

  ```


  现在数组包含 One, Two, Three。


  访问数组中的元素很简单。你可以使用标准的中括号来访问特定位置的对象。例如，`myArray[0]` 会返回数组中的第一个对象。如果你想遍历数组中的每一项，可以使用所谓的快速枚举或
  For-In 循环。代码清单 8-5 是一个快速枚举的例子。


  ```

  1    var myArray: [String] = ["One", "Two", "Three"]

  2    for myString in myArray {

  3         print(myString)

  4    }

  代码清单 8-5.

  快速枚举

  ```


  神奇之处在于代码清单 8-5 的第 2 行。你告诉 Swift 将 `myArray` 中的每个值赋给一个名为 `myString` 的新常量。然后你就可以对
  `myString` 进行任意操作。在这个例子中，你只是打印它。它会遍历数组中的所有对象，而无需知道对象的总数。这是一种从数组中提取元素的快速有效的方法。


  从数组中删除对象也很简单。你可以使用 `remove(at:)` 方法，如代码清单 8-6 所示。


  ```

  1    var myArray: [String] = ["One", "Two", "Three"]

  2    myArray.remove(at: 1)

  3    for myString in myArray {

  4         print(myString)

  5    }

  代码清单 8-6.

  删除一个对象

  ```


  代码清单 8-6 的输出将是 `One, Three`。这是因为你删除了索引为 1 的对象。记住，这是数组中的第二个对象，因为数组索引总是从 0 开始。


  你已经看到了 Swift 在与数组交互方面是多么灵活。数组是你作为程序员将经常使用的强大集合。本节涵盖了数组的基础知识，但数组还能做更多的事情。


  '
- '# 使用字典类


  Swift 的 `Dictionary` 类也是一种有用的集合类型。它允许存储对象，就像 `Array` 类一样，但 `Dictionary` 的不同之处在于它允许将一个键与条目关联起来。例如，你可以创建一个字典来存储某人的属性列表，例如
  `firstName`、`lastName` 等。与数组使用索引访问属性不同，字典可以使用像 `"firstName"` 这样的 `String` 来访问。然而，所有键必须是唯一的——也就是说，`"firstName"`
  不能存在多次。根据你的程序，找到唯一的键名通常不是问题。


  下面是一个如何创建字典的例子：


  ```

  var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

  ```


  这将创建一个名为 `person` 的简单字典。声明的下一部分告诉字典键和值将是什么类型的对象。在这个例子中，键是 `String`，值也是 `String`。然后你向字典中添加两个键。第一个键是
  `firstName`，该键对应的值是 `John`。第二个键是 `lastName`，对应的值是 `Doe`。你可以使用与数组类似的语法来访问字典中的值。


  ```

  print(person["firstName"])

  ```


  这段代码将打印名称 `Optional("John")`，因为这是键 `firstName` 对应的值。`Optional` 出现在前面的示例中，因为字典中键对应的值是一个可选值。你可以使用相同风格的代码来更改字典中的值。假设在这个例子中，John
  现在更喜欢别人叫他 Joe。你可以通过一行简单的代码来更改字典中的值。


  ```

  person["firstName"] = "Joe"

  ```


  你可以使用相同的表示法向字典添加一个新键。


  ```

  person["gender"] = "Male"

  ```


  如果你决定要从字典中删除一个键，比如刚才添加的 `gender` 键，可以通过将该键的值设置为 `nil` 来实现。


  ```

  person["gender"] = nil

  ```


  现在字典将只包含 `firstName` 和 `lastName`。记住，字典是无序的。你不能依赖其顺序，但有时你可能需要遍历字典。这可以通过与数组类似的方式完成。主要区别在于，在数组中，你分配一个变量，而在字典中，你需要同时分配键和值。请参见代码清单
  8-7。


  ```

  1    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

  2    for (myKey, myValue) in person {

  3         print(myKey + ": " + myValue)

  4    }

  代码清单 8-7.

  遍历字典

  ```


  这个例子将打印以下内容：


  ```

  firstName: John

  lastName: Doe

  ```


  字典是一种组织无需排序数据的绝佳方式。它也是基于特定键查找数据的好方法。在 Swift 中，它们非常灵活，应该用于组织和优化你的代码。




  '
- "# 创建书店应用\n\n你将创建一个演示数组用法的应用。你需要创建一个`UITableView`，并使用数组为其填充数据。首先，让我们创建基础应用项目。打开\
  \ Xcode，选择\"Master-Detail Application\"项目模板，如图 8-1 所示。在此项目中，你将创建几个简单的对象，作为你的书店应用的基础：一个`Book`对象和一个`BookStore`对象。你将再次学习属性的概念，了解如何在项目中进行属性的取值和赋值。最后，你将实际运用这些书店对象，学习如何在创建对象后使用它们。\n\
  \n1. 点击\"Next\"按钮，将项目命名为`BookStore`，如图 8-2 所示。公司名称是必填项——你可以使用任何真实或虚构的公司名称。示例中使用了`com.innovativeware`，这完全可以。确保设备系列选择\
  \ iPhone，语言设置为 Swift。不要勾选\"Use Core Data\"复选框。注意：此类应用很适合使用 Core Data，但 Core Data\
  \ 要到第 11 章才会介绍。在本应用中，你将使用数组进行数据存储。\n\n   ![A341013_4_En_8_Fig2_HTML.jpg](img/A341013_4_En_8_Fig2_HTML.jpg)\n\
  \n   图 8-2. 选择产品（应用）名称和选项\n\n2. 填写完所有信息后，点击\"Next\"按钮。Xcode 会提示你选择项目保存位置。任何你能记住的位置都可以——桌面就是个好地方。\n\
  \n3. 确定保存位置后，点击\"Create\"按钮创建新项目。这将创建基础的`BookStore`项目模板，如图 8-3 所示。\n\n   ![A341013_4_En_8_Fig3_HTML.jpg](img/A341013_4_En_8_Fig3_HTML.jpg)\n\
  \n   图 8-3. 项目模板的源代码列表\n\n4. 点击导航区域左下角的加号（+）按钮，为项目添加新对象。选择\"New File\"，然后选择顶部的 iOS\
  \ 分类，再选择右侧的\"Swift File\"，如图 8-4 所示。你也可以右键单击（或按住 Control 键单击）导航区域，然后选择\"New File\"\
  菜单选项。这两种方法没有区别——选择你觉得更自然的方式即可。\n\n   ![A341013_4_En_8_Fig4_HTML.jpg](img/A341013_4_En_8_Fig4_HTML.jpg)\n\
  \n   图 8-4. 创建新的 Swift 文件\n\n5. 你选择的是纯 Swift 文件，这将创建一个新的空 Swift 文件，用于定义`Book`类。选择后，点击\"\
  Next\"按钮。\n\n6. Xcode 会询问文件名。输入名称`Book`。Xcode 还会询问文件保存位置。为简单起见，选择项目中的`BookStore`文件夹。项目中所有其他类文件都存储在此处。\n\
  \n7. 双击`BookStore`文件夹，然后点击\"Create\"按钮。你将在 Xcode 的主编辑窗口中看到新文件`Book.swift`出现在导航区域中，如图\
  \ 8-5 所示。\n\n8. 重复上述步骤，创建第二个名为`BookStore`的对象。这将生成`BookStore.swift`文件。你将在本章后面使用这个类。现在，我们专注于`Book`类。\n\
  \n   ![A341013_4_En_8_Fig5_HTML.jpg](img/A341013_4_En_8_Fig5_HTML.jpg)\n\n   图 8-5.\
  \ 空的 Swift 文件\n\n9. 点击`Book.swift`文件，开始定义你的新类吧！\n\n![A341013_4_En_8_Fig1_HTML.jpg](img/A341013_4_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 基于 Master-Detail Application 模板创建初始项目\n\n## 创建你的类\n\n通过添加 Swift 文件（而不是\
  \ Cocoa Touch 类），Xcode 会创建一个空 Swift 文件。你可以在此文件中添加多个类。Swift 更加灵活，不要求每个文件只能有一个类。Xcode\
  \ 允许你根据需要添加类。\n\n注意：将 Swift 类放在独立文件中仍然是一个好习惯。这有助于组织和查找类，尤其是处理大型项目时。但有些情况下，某个较小的类只与另一个类配合使用，将它们放在同一个文件中也是合理的。\n\
  \n现在创建`Book`类。在`Book.swift`文件中输入以下代码：\n\n```\nclass Book {\n}\n```\n\n现在你就拥有了一个类，如图\
  \ 8-6 所示。创建类就是这么简单。\n\n![A341013_4_En_8_Fig6_HTML.jpg](img/A341013_4_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 空的 Book 类\n\n## 属性介绍\n\n这个类名称就是`Book`。没错，你有了一个类，但目前它无法存储任何数据。为了让这个类有用，它需要能够保存信息，这可以通过属性来实现。当使用对象时，必须先实例化。对象实例化后，就能访问其属性。只要对象保持在作用域内，这些变量就可用。正如你在第\
  \ 7 章所学，作用域定义了对象存在的上下文。在某些情况下，对象的作用域可能是整个程序的生命周期；在其他情况下，作用域可能只是一个函数或方法。这完全取决于对象声明的位置和使用方式。稍后我们会更详细地讨论作用域。现在，让我们为`Book`类添加一些属性，使其更有用。\n\
  \n```\n1   //\n2   //  Book.swift\n3   //  BookStore\n4   //\n5   //  Created by\
  \ Thorn on 7/27/17.\n6   //  Copyright © 2017 Innovativeware. All rights reserved.\n\
  7   //\n\n9   import Foundation\n\n11   class Book {\n12       var title: String\
  \ = \"\"\n13       var author: String = \"\"\n14       var description: String =\
  \ \"\"\n15   }\n代码清单 8-8. 向 Book.swift 文件添加实例变量\n```\n\n代码清单 8-8 展示了与之前相同的`Book`对象，但现在花括号内部（第\
  \ 12 至 14 行）新增了三个属性。它们都是`String`对象，这意味着它们可以为`Book`对象存储文本信息。因此，`Book`对象现在有了存储标题、作者和描述信息的位置。请注意，代码为属性分配了初始值。如果未分配初始值，则类需要初始化方法（init\
  \ method）来赋值。\n\n## 访问属性\n\n现在你有了属性，如何使用它们？如何访问它们？不幸的是，仅仅声明属性并不一定能让你访问它。有两种方式可以访问这些变量。\n\
  \n* 一种方式自然是在`Book`对象内部。\n* 第二种方式是从对象外部——即使用`Book`对象的程序其他部分。\n\n如果你正在为`Book`对象内部的方法编写代码，访问其属性非常简单。例如，你可以直接编写如下代码：\n\
  \n```\ntitle = \"Test Title\"\n```\n\n从对象外部，你仍然可以访问`title`变量。这是通过点符号实现的。\n\n```\n\
  myBookObject.title = \"Test Title\"\n```\n\n## 完成 BookStore 程序\n\n理解了属性后，现在我们将进一步创建实际的书店程序。思路很简单——创建一个名为`BookStore`的类，其中存放一些`Book`对象。\n\
  \n\n\n### 创建视图\n\n首先，让我们准备好视图。如果你需要复习如何在 Xcode 中构建界面，请参考第 6 章。\n\n1.  在导航区域中点击 `Main.storyboard`\
  \ 文件。这将显示 Xcode 的 Interface Builder，如图 8-7 所示。你将在 `Main.storyboard` 文件中看到五个场景。向右导航找到详情场景（Detail\
  \ Scene）。\n\n    ![A341013_4_En_8_Fig7_HTML.jpg](img/A341013_4_En_8_Fig7_HTML.jpg)\n\
  \n    图 8-7. 准备书店的详情视图。\n\n2.  默认情况下，当你创建空白的 Master-Detail 应用程序时，Xcode 会添加一个标签，其中包含文本“Detail\
  \ View content goes here.”。选中并删除这个 Label 对象，因为你将添加自己的内容。你需要添加一些新字段来显示所选书籍的详细信息。既然你删除了这个控件，还需要移除引用它的代码。\n\
  \    1.  在 `DetailViewController.swift` 文件中，移除以下代码行：\n\n        ```swift\n     \
  \   @IBOutlet weak var detailDescriptionLabel: UILabel!\n        ```\n\n    2. \
  \ 在 `var detailItem: AnyObject?` 属性声明中，移除以下代码行：\n\n        ```swift\n        configureView()\n\
  \        ```\n\n    3.  在名为 `configureView` 的方法中，移除以下代码行：\n\n        ```swift\n\
  \        // Update the user interface for the detail item.\n        if let detail\
  \ = detailItem {\n            if let label = detailDescriptionLabel {\n        \
  \        label.text = detail.description\n            }\n        }\n        ```\n\
  \n        你的 `DetailViewController.swift` 文件现在应该如图 8-8 所示。\n\n        ![A341013_4_En_8_Fig8_HTML.jpg](img/A341013_4_En_8_Fig8_HTML.jpg)\n\
  \n        图 8-8. 修改后的 DetailViewController。\n\n3.  从对象库（Object Library）中将一些 Label\
  \ 对象拖拽到详情视图上，如图 8-9 所示。确保下方的 Label 控件比默认宽度更宽。这样它们才能容纳较大量的文本。两个内容为“Label”的 Label\
  \ 对象是你将要连接以保存来自 `Book` 对象的两个值（`Title` 和 `Author`）的控件。\n\n    ![A341013_4_En_8_Fig9_HTML.jpg](img/A341013_4_En_8_Fig9_HTML.jpg)\n\
  \n    图 8-9. 添加一些 Label 对象。\n\n### 添加属性\n\n接下来，你将向 `DetailViewController` 类添加一些属性。这些属性将对应详情视图中的\
  \ Label 对象。\n\n1.  点击 Xcode 右上角的助理编辑器图标（看起来像两个圆圈）以打开助理编辑器。确保编辑器中显示的是 `DetailViewController.swift`\
  \ 文件。\n\n2.  按住 Control 键并将第一个空白的 Label 控件拖拽到右侧的代码中，如图 8-10 所示。将第一个命名为 `titleLabel`（见图\
  \ 8-11）并点击连接（Connect），然后对第二个重复此过程，将其命名为 `authorLabel`。这将向你的 `DetailViewController`\
  \ 类添加两个变量，如代码清单 8-9 所示，并将它们连接到界面中的 Label 控件。\n\n    ![A341013_4_En_8_Fig11_HTML.jpg](img/A341013_4_En_8_Fig11_HTML.jpg)\n\
  \n    图 8-11. 命名新属性。\n\n    ![A341013_4_En_8_Fig10_HTML.jpg](img/A341013_4_En_8_Fig10_HTML.jpg)\n\
  \n    图 8-10. 创建变量。\n\n    ```swift\n    1        @IBOutlet weak var titleLabel:\
  \ UILabel!\n    2        @IBOutlet weak var authorLabel: UILabel!\n    ```\n\n \
  \   代码清单 8-9. 修改 `DetailViewController.swift` 文件以包含新的标签。\n\n### 添加描述\n\n现在你需要向视图添加描述。描述略有不同，因为它可以跨越多行。为此，你将使用文本视图（Text\
  \ View）对象。\n\n1.  首先向视图中添加“Description:”标签，如图 8-12 所示。\n\n    ![A341013_4_En_8_Fig12_HTML.jpg](img/A341013_4_En_8_Fig12_HTML.jpg)\n\
  \n    图 8-12. 为描述添加一个新的 Label 对象。\n\n2.  接下来，将文本视图对象添加到详情场景中，如图 8-13 所示。文本视图对象的优点是易于显示多行文本。虽然\
  \ Label 对象也可以显示多行，但不如文本视图对象整洁。注意：默认情况下，文本视图控件中填满了看似随机的文本。这种文本被称为 Lorem Ipsum 文本。如果你需要填充页面，可以在网上找到任意数量的\
  \ Lorem Ipsum 生成器。对于文本视图控件，文本可以保持不变，因为你将在运行时移除它。此外，如果清空文本，则更难准确地在屏幕上定位文本视图控件的位置——它是白底白字！\n\
  \n    ![A341013_4_En_8_Fig13_HTML.jpg](img/A341013_4_En_8_Fig13_HTML.jpg)\n\n  \
  \  图 8-13. 向详情视图添加文本视图。\n\n3.  为了让程序利用文本视图，你需要为其创建一个输出口（outlet），就像你为标题和描述所做的那样。只需按住\
  \ Control 键并将文本视图拖拽到你的 `DetailViewController` 文件中，就像之前所做的那样。将此变量命名为 `descriptionTextView`。`DetailViewController`\
  \ 中完成的变量部分将如代码清单 8-10 所示。\n\n    ```swift\n    1    import UIKit\n\n    3    class\
  \ DetailViewController: UIViewController {\n\n    5        @IBOutlet weak var titleLabel:\
  \ UILabel!\n    6        @IBOutlet weak var authorLabel: UILabel!\n\n    8     \
  \   @IBOutlet weak var descriptionTextView: UITextView!\n    ```\n\n    代码清单 8-10.\
  \ 为文本视图添加输出口以保存描述。\n\n4.  注意类型是 `UITextView` 而不是 `UILabel`——这很重要。\n\n**警告**\n\n\
  如前所述，将 `descriptionTextView` 属性设置为 `UITextView` 类型非常重要。例如，如果它被意外地设置为 `UILabel` 对象，那么当尝试将屏幕上的文本视图连接到输出口时，Xcode\
  \ 将无法找到 `descriptionTextView` 输出口。为什么？Xcode 知道该控件是一个 `UITextView`，并且正在查找一个类型为 `UITextView`\
  \ 的输出口。\n\n\n\n### 创建简单的数据模型类\n\n要让应用程序运行，它需要一些数据来显示。为此，你将使用之前创建的 `BookStore` 对象作为数据模型类。数据模型类并没有什么特别之处，其全部目的就是让应用程序能够通过对象访问数据。\n\
  \n修改 `BookStore.swift` 文件，使其如代码清单 8-11 所示。\n\n```\n1 //\n2 //  BookStore.swift\n\
  3 //  BookStore\n4 //\n5 //  Created by Brad Lees on 8/20/16.\n6 //  Copyright ©\
  \ 2016 Innovativeware. All rights reserved.\n7 //\n9    import Foundation\n11  \
  \  class BookStore {\n12        var bookList: [Book] = []\n13    }\n代码清单 8-11.\n\
  修改 BookStore.swift 类以包含一个数组\n```\n\n在第 12 行，你添加了一个变量来保存书籍列表；该属性简单地命名为 `bookList`。请注意\
  \ `bookList` 是一个数组，这将允许你添加一系列对象，在本例中，是一组 `Book` 对象。\n\n接下来，我们继续向 Swift 文件 `BookStore.swift`\
  \ 中添加代码，如代码清单 8-12 所示。\n\n```\n1 //\n2 //  BookStore.swift\n3 //  BookStore\n4 //\n\
  5 //  Created by Thorn on 7/27/17.\n6 //  Copyright © 2017 Innovativeware. All rights\
  \ reserved.\n7 //\n9 import Foundation\n11 class BookStore {\n12     var bookList:\
  \ [Book] = []\n14     init() {\n15         var newBook = Book()\n16         newBook.title\
  \ = \"Swift for Absolute Beginners\"\n17         newBook.author = \"Bennett and\
  \ Lees\"\n18         newBook.description = \"iOS Programming made easy.\"\n19  \
  \       bookList.append(newBook)\n21         newBook = Book()\n22         newBook.title\
  \ = \"A Farewell to Arms\"\n23         newBook.author = \"Ernest Hemingway\"\n24\
  \         newBook.description = \"The story of an affair between an English nurse\
  \ and an American soldier on the Italian front during World War I.\"\n25       \
  \  bookList.append(newBook)\n26     }\n27 }\n代码清单 8-12.\n实现 BookStore 数据对象\n```\n\
  \n在代码清单 8-12 中，第 14 至 26 行定义了对象的 `init` 方法，该方法在对象首次初始化时被调用。在这个方法中，你初始化了打算添加到书店中的两本书。第\
  \ 15 行是第一个 `Book` 对象被分配和初始化的地方。第 16 至 18 行为你的第一本书添加了标题、作者和描述。最后，第 19 行将新的 `Book`\
  \ 对象添加到 `bookList` 数组中。这里需要注意的重要一点是，一旦对象被添加到数组中，代码就可以不再关心它；现在数组拥有了该对象。正因为如此，第 21\
  \ 行不会造成问题。\n\n第 21 行分配了一个新的 `Book` 对象，覆盖了旧值。这告诉编译器你不再关心旧值。\n\n第 22 至 25 行简单地初始化并将第二本书添加到数组中。\n\
  \n就是这样！这就是定义一个简单数据模型类所需的全部内容。接下来，你需要修改 `MasterViewController` 来访问这个类，以便它可以开始显示一些数据。\n\
  \n### 修改 MasterViewController\n\n这个简单的应用程序有两个视图控制器：主视图控制器，名为 `MasterViewController`，以及一个辅助视图控制器，名为\
  \ `DetailViewController`。视图控制器是控制视图行为的对象。为了让应用程序开始显示来自数据模型的数据，你首先需要修改 `MasterViewController`\
  \ —— 这是应用程序导航开始的地方。以下代码已经存在于 Xcode 提供的模板中。你只需修改它来添加你的数据模型。\n\n首先，你需要修改 `MasterViewController.swift`\
  \ 文件。你需要添加一个变量来保存 `Bookstore` 对象。代码清单 8-13 显示在第 15 行将实例变量添加为一个属性。\n\n```\n1 //\n\
  2 //  MasterViewController.swift\n3 //  BookStore\n4 //\n5 //  Created by Thorn\
  \ on 7/27/17.\n6 //  Copyright © 2017 Innovativeware. All rights reserved.\n7 //\n\
  9 import UIKit\n11 class MasterViewController: UITableViewController {\n13     var\
  \ detailViewController: DetailViewController? = nil\n14     var objects = [Any]()\n\
  15     var myBookStore = BookStore()\n代码清单 8-13.\n添加 BookStore 对象\n```\n\n现在 `BookStore`\
  \ 对象已经初始化，你需要告诉 `MasterViewController` 如何显示书籍列表——不是详细信息，而只是书名。为此，你需要修改几个方法。幸运的是，Xcode\
  \ 提供了一个很好的模板，因此修改量很小。\n\n`MasterViewController` 是所谓的 `UITableViewController` 类的子类，该类负责在屏幕上显示数据行。在本例中，这些是书名行（好吧，对于这个简单的程序来说只有两行，但总归是一个列表）。\n\
  \n有三个主要方法控制 `UITableViewController` 中显示什么数据以及如何显示。\n\n- 第一个是 `numberOfSections(in:)`：由于应用程序只有一个列表或分区，此方法返回\
  \ 1。\n- 第二个是 `tableView(_:numberOfRowsInSection:)`：在这个程序中，你返回书店数组中书籍的数量。因为这是唯一的分区，所以代码很直接。\n\
  - 第三个方法是 `tableView(_:cellForRowAt:)`：此方法为每个要显示在屏幕上的行调用，并且是逐行调用的。\n\n代码清单 8-14 详细说明了你需要进行的更改，以便在视图上显示书籍列表。更改从源文件的第\
  \ 63 行开始。\n\n```\n64      override func numberOfSections(in tableView: UITableView)\
  \ -> Int {\n65         return 1\n66     }\n68     override func tableView(_ tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n69         return myBookStore.bookList.count\n\
  70     }\n72     override func tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\n73         let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"Cell\", for: indexPath)\n74         cell.textLabel!.text = myBookStore.bookList[indexPath.row].title\n\
  75         cell.accessoryType = .disclosureIndicator\n76         return cell\n77\
  \     }\n代码清单 8-14.\n设置视图以显示书籍\n```\n\n在所有这些代码中，你只需要修改几行。其余部分保持不变。这是使用 Xcode 模板的优势之一。第\
  \ 68 行原本只返回 1；你需要将其修改为返回 `BookStore` 类中项目的计数。\n\n第 74 行看起来稍微复杂一些。基本上，`UITableView`\
  \ 的每一行被称为一个单元格（具体来说是一个 `UITableViewCell`）。第 74 行将单元格的文本设置为书籍的标题。让我们更具体地看一下这段代码：\n\
  \n```\ncell.textLabel!.text = myBookStore.bookList[indexPath.row].title\n```\n\n\
  \n```markdown\n\n首先，`myBookStore`是`BookStore`对象，这一点非常清楚。你正在引用`BookStore`对象中名为`bookList`的数组。由于`bookList`是一个数组，你可以通过`indexPath.row`在方括号中访问所需的书。`indexPath.row`的值指定了你感兴趣的行——`indexPath.row`总是小于总数减\
  \ 1。因此，调用`myBookStore.bookList[indexPath.row]`会返回一个`Book`对象。最后一部分`.title`会从返回的`Book`对象中访问`title`属性。以下代码与你刚才在一行中完成的代码等价：\n\
  \n```\n1    var book: Book\n2    book = myBookStore.bookList[indexPath.row]\n3 \
