- "# 7\\. Swift 类、对象与方法\n\n若您尚未阅读第 6 章，请先阅读该章后再阅读本章，因为该章对 Swift 的基础知识做了很好的介绍。本章将在此基础上进一步展开，重点讲解如何创建\
  \ Swift 类。通过本章的学习，您将更深入地理解 Swift 语言，并掌握如何运用基础知识编写简单的程序。最佳的学习方式是选取小型程序，用 Swift 编写（或重写），以观察该语言的实际运作方式。\n\
  \n本章涵盖 Swift 类的构成要素，以及如何通过方法与 Swift 对象进行交互。本章将以一个简单的电台类为例，演示如何编写 Swift 类，从而让您理解如何使用\
  \ Swift 类。同时，本章还将教授如何为解决问题所需的对象进行设计。此外，本章会简要介绍如何创建自定义对象，以及如何使用 Foundation 框架中提供的现有对象。\n\
  \n本章将扩展第 6 章的主题，并介绍一些将在第 8 章中详述的概念。\n\n## 创建 Swift 类\n\n在 Swift 中，创建类非常简单。通常，一个类会放在它自己的文件中，但如有需要，一个文件也可以包含多个类。\n\
  \n以下是一个类声明的第一行示例：\n\n```\nclass RadioStation\n```\n\n这里，类名是 `RadioStation`。默认情况下，Swift\
  \ 类不会继承自任何父类。如果您希望让 Swift 类继承自另一个类，可以这样写：\n\n```\nclass RadioStation: Station\n\
  ```\n\n在这个例子中，`RadioStation` 现在是 `Station` 的子类，并将继承 `Station` 的所有属性和方法。代码清单 7-1\
  \ 展示了一个类的完整定义。\n\n```\n1 import UIKit\n\n3 class RadioStation: NSObject {\n\n5 \
  \    var name: String\n6     var frequency: Double\n\n8     override init() {\n\
  9         name = \"Default\"\n10         frequency = 100\n11     }\n\n13     static\
  \ var minAMFrequency: Double = 520.0\n\n15     static var maxAMFrequency: Double\
  \ = 1610.0\n\n17     static var minFMFrequency: Double = 88.3\n\n19     static var\
  \ maxFMFrequency: Double = 107.9\n\n21     func isBandFM() -> Int {\n22        \
  \ if frequency >= RadioStation.minFMFrequency && frequency <= RadioStation.maxFMFrequency\
  \ {\n23             return 1 //FM\n24         } else {\n25             return 0\
  \ //AM\n\n27         }\n\n29     }\n30 }\n代码清单 7-1.\n一个 Swift 类\n```\n\n### 属性\n\
  \n代码清单 7-1 展示了一个包含两个不同属性的示例类：`name` 和 `frequency`。第 1 行导入了 `UIKit` 类定义（稍后会详细介绍），因为这是\
  \ Xcode 创建新类时默认添加的导入。第 3 行通过定义类名（有时称为类型）开始类的定义。第 5 行到第 6 行为 `RadioStation` 类定义了几个属性。\n\
  \n每当 `RadioStation` 类被实例化时，生成的 `RadioStation` 对象都可以访问这些属性，这些属性仅针对特定实例。如果有十个 `RadioStation`\
  \ 对象，每个对象都拥有自己独立的变量，互不影响。这也可以称为作用域，即对象的变量位于每个对象的作用域之内。\n\n第 13 行至第 19 行也包含属性。这些属性前面带有\
  \ `static` 关键字。这意味着该值属于类本身，并且每个对象都将保持这些属性的完全相同的值。\n\n### 方法\n\n几乎每个对象都有方法。在 Swift\
  \ 中，与对象交互最常见的方式是调用方法，例如：\n\n```\nmyStation.isBandFM()\n```\n\n上面这行代码将在 `RadioStation`\
  \ 类的一个实例上调用名为 `isBandFM` 的方法。\n\n方法还可以带有参数。为什么要传递参数？传递参数有几个原因。首先（也是最常见的），可能的取值范围太大，无法写成单独的方法。其次，需要存储在对象中的数据是可变的——比如电台名称。在下面的示例中，您会看到为每一种可能的无线电频率编写一个方法并不实际；相反，频率会作为参数传递。电台名称也是如此。\n\
  \n```\nmyStation.setFrequency(104.7)\n```\n\n方法名是 `setFrequency`。方法调用可以包含多个参数，如下例所示：\n\
  \n```\nmyStation = RadioStation.init(name: \"KZZP\", frequency: 104.7)\n```\n\n\
  在上面的例子中，方法调用包含两个参数：电台名称及其频率。Swift 相对于其他语言的一个有趣之处在于，它的方法包含命名参数。如果这是一个 C++ 或 Java\
  \ 程序，调用方式将会是：\n\n```\nmyObject = new RadioStation(\"KZZP\", 104.7)\n```\n\n虽然 `RadioStation`\
  \ 对象的参数可能显而易见，但拥有命名参数是一个优点，因为它们或多或少地表明了参数的含义。\n\n#### 使用类型方法\n\n类并不总是需要被实例化才能使用。在某些情况下，类拥有一些方法，它们可以在类被实例化之前执行一些简单的操作并返回值。这些方法被称为类型方法。在代码清单\
  \ 7-1 中，以 `static` 开头的方法名就是类型方法。\n\n类型方法有其局限性。最大的限制之一是它们不能使用任何实例变量。不能使用实例变量是合理的，因为您还没有实例化任何东西。类型方法可以在其内部拥有自己的局部变量，但不能使用任何被定义为实例变量的变量。\n\
  \n调用类型方法的格式如下：\n\n```\nRadioStation.minAMFrequency()\n```\n\n请注意，这个调用与在实例化对象上调用方法的方式类似。最大的区别在于，这里使用的是类名而不是实例变量。类型方法在\
  \ macOS 和 iOS 框架中使用非常广泛。它们主要用于返回一些固定或众所周知的值，或者返回一个新的对象实例。这类类型方法被称为初始化器。以下是一些初始化器方法的示例：\n\
  \n```\n1\\.  Date. addingTimeInterval()  // 返回一个 Date\n2\\.  String(format:\"http://%@\"\
  , \"www.apple.com\")      // 返回一个新的 String 对象\n3\\.  Dictionary()              \
  \       // 返回一个新的 Dictionary 对象。\n```\n\n以上所有消息都是正在被调用的类型方法。\n\n第 1 行简单地返回一个表示自参考日期\
  \ 2001 年 1 月 1 日以来秒数的值。\n\n第 2 行返回一个新的 `String` 对象，该对象已被格式化，其值为 `http://1000`。\n\
  \n第 3 行是一种常用的形式，因为它实际上分配了一个新对象。通常，这一行不会单独使用，而是像这样使用：\n\n```\nvar myDict = Dictionary()\n\
  ```\n\n那么，什么时候应该使用类型方法呢？一般来说，如果方法返回的信息不特定于类的任何特定实例，就应该将该方法设为类型方法。例如，前面例子中的 `minAMFrequency`\
  \ 对于任何 `RadioStation` 的所有实例都是一样的。这——对象——是使用类型方法的绝佳候选。然而，电台的名称或其分配的频率对于类的每个实例都是不同的。这些不应该（也确实不能）是类型方法。原因在于类型方法不能使用类定义的任何实例变量。\n\
  \n\n\n### 使用实例方法\n\n实例方法（清单 7-1 中的第 29 至 35 行）仅在类被实例化后才可用。以下是一个示例：\n\n```\n1   var\
  \ myStation: RadioStation         // 声明一个变量，用于保存 RadioStation 对象。\n2   myStation\
  \ = RadioStation()          // 创建一个新的 RadioStation 对象。\n3   var band = myStation.band()\
  \         // 该方法返回 RadioStation 的频段。\n```\n\n第 3 行对 `RadioStation` 对象调用了一个方法。方法\
  \ `band()` 返回 1 表示调频，返回 0 表示调幅。实例方法是指在其声明之前不包含 `class` 关键字的任何方法。\n\n### 使用你的新类\n\
