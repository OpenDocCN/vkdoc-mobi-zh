  \n在本章中，我们将讨论编程中最基础且最频繁的操作之一：数据比较。在书店示例中，如果顾客想找某本特定的书，你可能需要比较书名；如果顾客有兴趣购买某位作者的书，你可能还需要比较作者姓名。数据比较是开发者常见的工作任务。你在第\
  \ 8 章学到的许多循环都需要通过数据比较来判断代码何时停止循环。\n\n编程中的数据比较就像使用天平。一边放一个值，另一边放另一个值，中间是操作符。操作符决定了执行何种比较，例如\"\
  大于\"、\"小于\"或\"等于\"。\n\n天平两端的值通常是变量。你在第 3 章学习了不同类型的变量。通常，针对不同变量的比较函数会略有差异。熟悉比较数据的函数和语法至关重要，因为这将构成你开发工作的基础。\n\
  \n为了便于本章讲解，我们将以书店应用程序为例。该应用程序允许用户登录、搜索书籍并购买。我们将介绍不同的数据比较方式，并展示它们在此类应用中如何运用。\n\n\
  ## 重温布尔逻辑\n\n我们在第 4 章介绍了布尔逻辑。由于它在编程中广泛应用，本章将再次深入探讨。\n\n你为应用程序编写的最常见的比较操作就是基于布尔逻辑。布尔逻辑通常以\
  \ `if/then` 语句的形式出现。布尔逻辑的答案只有两种：是或否。以下是一些适合在程序中使用的布尔问题示例：\n\n* 5 大于 3 吗？\n* \"now\"\
  \ 这个单词是否超过五个字母？\n* 2010 年 6 月 1 日是否晚于今天？\n\n注意，这些问题只有\"是\"和\"否\"两种可能的答案。如果你提出的问题可能有多个答案，则需要用不同的措辞来进行编程。\n\
  \n每个问题都将由一个 `if/then` 语句表示。（例如：\"如果 5 大于 3，则向用户打印一条消息\"。）每个 `if` 语句都必须包含某种关系运算符。关系运算符可以是\"\
  大于\"或\"等于\"之类的形式。\n\n要在程序中使用这类问题，首先需要熟悉 Swift 语言中提供的各种关系运算符。我们将首先介绍它们。之后，你将学习不同类型的变量如何与这些运算符配合使用。\n\
  \n## 使用关系运算符\n\nSwift 使用六种标准比较运算符。这些是标准的代数运算符，只有一处实际改动：在 Swift 语言中（与大多数其他编程语言一样），\"\
  等于\"运算符由两个等号（`==`）表示。表 9-1 描述了开发者可用的运算符。\n\n**表 9-1.** 比较运算符\n\n| 运算符 | 描述 |\n|\
  \ --- | --- |\n| `>` | 大于 |\n| `<` | 小于 |\n| `>=` | 大于或等于 |\n| `<=` | 小于或等于 |\n\
  | `==` | 等于 |\n| `!=` | 不等于 |\n\n**注意：** 单个等号（`=`）用于给变量赋值。比较两个值则需要两个等号（`==`）。例如，`if(x=9)`\
  \ 会尝试将值 9 赋值给变量 `x`，但 Xcode 现在会报错。而 `if(x==9)` 则会执行比较，检查 `x` 是否等于 9。\n\n### 比较数字\n\
  \n开发者在比较时经常遇到的困难之一是处理不同的数据类型。本书前面讨论过不同类型的变量。你可能还记得 1 是一个整数。如果你想将一个整数与浮点数（如 1.2）进行比较，就会引发问题。这时，类型转换就派上用场了。\n\
  \n**注意：** 类型转换是指将对象或变量从一种类型转换为另一种类型。\n\n在书店应用中，你会需要以多种方式比较数字。例如，假设书店为单次消费超过 30 美元的顾客提供折扣。你需要计算顾客的总消费金额，然后将其与\
  \ 30 美元进行比较。如果消费金额大于 30 美元，则需要计算折扣。请看以下示例：\n\n```\nvar discountThreshold = 30\n\
  var discountPercent = 0\nvar totalSpent = calculateTotalSpent()\nif totalSpent >\
  \ discountThreshold {\n    discountPercent = 10\n}\n```\n\n我们来逐行分析这段代码。首先，声明变量（`discountThreshold`、`discountPercent`\
  \ 和 `totalSpent`）并为其赋值。注意，你不需要为变量指定具体的数值类型。类型会在你赋值时自动确定。你知道 `discountThreshold`\
  \ 和 `discountPercent` 不会包含小数，因此编译器会将它们视为 `Int` 类型。在此示例中，我们假设有一个名为 `calculateTotalSpent`\
  \ 的函数，它会计算当前订单的总消费额并以 `Int` 类型返回。然后，你只需检查总消费是否大于折扣阈值；如果是，则设置折扣百分比。如果你希望恰好消费 30 美元的顾客也能享受同样的折扣，可以使用\
  \ `>=` 代替 `>`。\n\n另一个需要比较数字的操作是循环。如第 4 章所述，循环是开发中的核心操作，许多类型的循环都需要某种比较来决定何时停止。我们来看一个\
  \ `for` 循环示例：\n\n```\nvar numberOfBooks: Int = 50\nfor y in 0..<numberOfBooks {\n\
  \    doSomething()\n}\n```\n\n在此示例中，你迭代（或称循环）书店中书籍的总数。`for` 语句是精彩部分开始的地方。我们来分解一下。\n\
  \n该 `for` 循环声明了一个初始值为 0 的变量，并在该变量小于 `numberOfBooks` 时递增它。与 Objective-C 相比，这是一种执行\
  \ `for` 循环更快捷的方式。\n\n\n\n### 创建一个示例 Xcode 应用\n\n现在让我们创建一个 Xcode 应用程序，以便你能开始比较数值数据。\n\
  \n1. 启动 Xcode，选择“文件” ➤ “新建” ➤ “Playground” 来创建一个新的 playground。本章将使用 playground 以便更轻松地进行比较操作。\n\
