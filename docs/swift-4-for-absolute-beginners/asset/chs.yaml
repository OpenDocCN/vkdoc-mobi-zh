  \n此外，你还可以通过使用 Core Data 或 `UserDefaults` 为应用添加数据持久化功能。\n\n## 练习\n\n- 参考原始程序，向书店中添加更多书籍。\n\
  - 增强 `Book` 类，使其能够存储另一个属性——例如价格或 ISBN。\n- 使用 Core Data 或 `UserDefaults` 为应用添加持久化功能。\n\
  \n# 15. Apple Watch 与 WatchKit\n\n2014 年 9 月，苹果公司发布了 Apple Watch，并将其视为苹果历史上的下一个篇章。这款手表不仅能处理电话和短信，还能通过跟踪心率和运动来评估佩戴者的健康状况。与此同时，苹果还发布了\
  \ WatchKit，这是一个专为开发 Apple Watch 应用而设计的框架。对于熟悉 UIKit 的开发者来说，WatchKit 会让他们感到非常熟悉。\n\
  \n最初，Apple Watch 在开发方面存在一些严重的限制。手表仅作为 iPhone 应用的附加屏幕。这要求手表靠近手机才能运行，并且导致应用运行缓慢。2015\
  \ 年 6 月，苹果发布了 watchOS 2.0。这次更新包含了许多新功能，但对开发者而言，最大的进步是能够创建代码在 Apple Watch 上而非手机上运行的应用。开发者能够创建性能更好、响应更快的独立应用。现在，苹果已经发布了\
  \ watchOS 4.0，为开发者带来了更多改进。\n\n## 创建 watchOS 应用时的注意事项\n\n为 watchOS 进行开发的一大优势是，所有开发工作都使用\
  \ Swift 或 Objective-C 完成，与其他 iOS 设备一样。不过，在开始开发之前，你需要考虑 Apple Watch 的一些特殊之处。\n\n\
  - Apple Watch 的屏幕非常小。根据手表尺寸的不同，仅限于 38 毫米或 42 毫米。这意味着你没有太多空间放置不必要的 UI 元素。你的界面需要紧凑且组织良好。此外，由于这两种尺寸很接近，你需要创建一个界面，并确保在两种尺寸下都有良好的显示效果。\n\
  - 在手机和手表之间共享数据需要提前规划。随着 watchOS 3.0 及现在的 4.0，苹果使数据共享变得更加容易。主要是增强了 `WCSession` 类。该类别的使用超出了本书的范围。\n\
  - 适用于 watchOS 4.0 的 WatchKit 提供了多种与用户交互的方式，不仅通过应用，还包括速览、可操作通知和复杂功能。编写良好的应用可以在合适的场景下利用多种交互方式。这些交互方式超出了本书的范围。\n\
  \n\n\n# 创建 Apple Watch 应用\n\n第一步是在 `Xcode` 中新建一个项目。在顶部，选择 watchOS 标题下的 Application\
  \ 作为项目类型。然后选择 iOS App with WatchKit App，如图 15-1 所示。\n\n![A341013_4_En_15_Fig1_HTML.jpg](img/A341013_4_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1. 创建 watchOS 应用\n\n接下来，系统会提示您为项目命名。我们将本章的项目命名为 `BookStore`。您还会注意到，watchOS\
  \ 应用与标准 iOS 应用相比，其选项有所不同。我们不会为此应用添加通知或复杂功能场景，因此请确保这些选项均未被勾选，如图 15-2 所示。\n\n**注意**：`WatchKit`\
  \ 提供了 iOS 应用中不具备的额外交互类型。Glances 是快速浏览应用内容的方式。例如，书店应用可能会有一个 Glance 界面来展示畅销书。Glances\
  \ 使用了手表上的特殊界面。Complications 则允许您的应用在表盘上直接提供简单信息。\n\n![A341013_4_En_15_Fig2_HTML.jpg](img/A341013_4_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2. watchOS 应用选项\n\n随后，`Xcode` 会提示您保存项目。保存后，您将看到新创建的项目。在左侧，您会注意到项目中有两个额外的目标。一个是\
  \ `BookStore WatchKit App`，它包含应用的界面（故事板和资源）。第二个新目标是 `BookStore WatchKit Extension`，它将包含应用在\
  \ watchOS 上运行所需的所有代码。参见图 15-3。\n\n![A341013_4_En_15_Fig3_HTML.jpg](img/A341013_4_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3. 新的 WatchOS 目标\n\n点击 `BookStore WatchKit App` 目标中的 `Interface.storyboard`，您应该会看到类似图\
  \ 15-4 的屏幕。这就是您空白的 watchOS 应用故事板。您会注意到其尺寸比标准 iOS 故事板小得多。\n\n![A341013_4_En_15_Fig4_HTML.jpg](img/A341013_4_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4. 界面故事板\n\n由于您要为 watchOS 应用创建一个书籍列表，因此需要在故事板中添加一个表格。在右下角搜索 table，然后将表格拖入\
  \ Interface Controller Scene，如图 15-5 所示。\n\n![A341013_4_En_15_Fig5_HTML.jpg](img/A341013_4_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5. 添加表格\n\n`Xcode` 现在会为表格提供一个 Table Row。这类似于您在 iOS 应用中创建表格视图时使用的原型行。您需要创建一个类来控制它，但在此之前，我们先向其中添加一个标签。在对象库中搜索标签，并将一个标签拖到行上。参见图\
  \ 15-6。\n\n![A341013_4_En_15_Fig6_HTML.jpg](img/A341013_4_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6. 向表格行添加标签\n\n默认情况下，标签位于 Table Row 的左上角。检查属性检查器，确保其高度和宽度能够根据内容自动调整（见图 15-7）。这将有助于确保您的应用在两种尺寸的\
  \ Apple Watch 上都能良好运行。\n\n![A341013_4_En_15_Fig7_HTML.jpg](img/A341013_4_En_15_Fig7_HTML.jpg)\n\
  \n图 15-7. 允许标签自动扩展\n\n现在标签将扩展以填满整行。但是，默认情况下，标签只会显示一行文本。由于您要添加书名，可能需要多行才能容纳所有文本。选中标签后，查看右侧的属性检查器。找到\
  \ `Lines` 属性并将其设置为 0，如图 15-8 所示。将行数设置为 0 是告诉 `Xcode` 可以使用所需任意多行。\n\n![A341013_4_En_15_Fig8_HTML.jpg](img/A341013_4_En_15_Fig8_HTML.jpg)\n\
  \n图 15-8. 设置 `Lines` 属性\n\n\n\n现在你需要添加一些代码以使用户界面工作。在左侧，展开`BookStore WatchKit Extension`文件夹并选择`InterfaceController.swift`文件，如图\
  \ 15-9 所示。`InterfaceController`是 WatchKit 故事板中初始场景的默认控制器。\n\n![A341013_4_En_15_Fig9_HTML.jpg](img/A341013_4_En_15_Fig9_HTML.jpg)\n\
  \n*图 15-9 打开 InterfaceController.swift 文件*\n\n你会注意到新的控制器文件中的默认方法与标准`UIViewController`中的不同。`willActivate()`相当于`viewWillAppear()`。\n\
  \n你首先需要添加一个行的类定义。为此，将以下代码添加到文件底部，位于`InterfaceController`类的闭合花括号（`}`）之外。\n\n```\n\
  1   class BookRow: NSObject {\n2       @IBOutlet weak var bookLabel: WKInterfaceLabel!\n\
  4   }\n```\n\n第 1 行声明了一个名为`BookRow`的新类，它是`NSObject`的子类。第 2 行创建了一个名为`bookLabel`的属性。`bookLabel`的类是`WKInterfaceLabel`，这类似于你之前使用过的`UILabel`，但它适用于\
  \ WatchKit。\n\n> **注意**：Swift 允许在同一个 Swift 文件中声明多个类。当你只在该文件中与其他类一起使用这个类时，这种方式效果很好。在本例中，我们只会在`InterfaceController`类中使用这个行类。\n\
  \n`InterfaceController.swift`文件现在将如图 15-10 所示。\n\n![A341013_4_En_15_Fig10_HTML.jpg](img/A341013_4_En_15_Fig10_HTML.jpg)\n\
  \n*图 15-10 修改后的 InterfaceController.swift 文件*\n\n现在你可以将插座变量连接到界面。选择`Interface.storyboard`。然后通过点击\
  \ Xcode 窗口右上角带有两个圆圈的图标来打开助理编辑器，如图 15-11 所示。\n\n![A341013_4_En_15_Fig11_HTML.jpg](img/A341013_4_En_15_Fig11_HTML.jpg)\n\
  \n*图 15-11 打开助理编辑器*\n\n使用助理编辑器时，Xcode 为开发者提供了一种快速创建对象并将其与界面中的插座变量关联的方法。你首先需要创建一个表示表格的表格属性。从界面控制器场景中的表格按住\
  \ Control 键并拖动到右侧的`InterfaceController`类上，如图 15-12 所示。\n\n![A341013_4_En_15_Fig12_HTML.jpg](img/A341013_4_En_15_Fig12_HTML.jpg)\n\
  \n*图 15-12 按住 Control 键拖动以创建插座变量*\n\n当你将`Table`对象释放到`InterfaceController`类上时，Xcode\
  \ 会提示你输入要创建的插座变量类型。保持默认设置不变，只需将名称改为`mainTable`，如图 15-13 所示。\n\n![A341013_4_En_15_Fig13_HTML.jpg](img/A341013_4_En_15_Fig13_HTML.jpg)\n\
  \n*图 15-13 命名你的插座变量*\n\n点击 Xcode 窗口右上角的“文字行”图标返回标准编辑器。在界面控制器场景下，选择表格行控制器，如图 15-14\
  \ 所示。\n\n![A341013_4_En_15_Fig14_HTML.jpg](img/A341013_4_En_15_Fig14_HTML.jpg)\n\
  \n*图 15-14 选择表格行控制器*\n\n通过选择右侧的身份检查器，并在类下拉菜单中选择`BookRow`，来设置表格行控制器的类，如图 15-15 所示。\n\
  \n![A341013_4_En_15_Fig15_HTML.jpg](img/A341013_4_En_15_Fig15_HTML.jpg)\n\n*图 15-15\
  \ 将表格行类更改为 BookRow*\n\n既然你的应用知道你在代码中使用的表格行类型，你需要为该行添加一个标识符。这在单个表格有多个行类型的情况下会很有帮助。选择属性检查器，并输入`MyBookRow`作为标识符，如图\
  \ 15-16 所示。\n\n![A341013_4_En_15_Fig16_HTML.jpg](img/A341013_4_En_15_Fig16_HTML.jpg)\n\
  \n*图 15-16*\n\n\n\n# 修改表格行标识符\n\n现在你可以连接之前创建的`WKInterfaceLabel`。在接口控制器场景（Interface\
  \ Controller Scene）下，按住 Control 键从书籍行拖拽到标签上，如图 15-17 所示。\n\n![A341013_4_En_15_Fig17_HTML.jpg](img/A341013_4_En_15_Fig17_HTML.jpg)\n\
  \n图 15-17. 从行控制拖拽到标签\n\n系统将提示你从可用输出口中选择一个输出口，如图 15-18 所示。当前只有一个可用输出口，因此请选择 `bookLabel`。\n\
  \n![A341013_4_En_15_Fig18_HTML.jpg](img/A341013_4_En_15_Fig18_HTML.jpg)\n\n图 15-18.\
  \ 连接 `bookLabel` 输出口\n\n现在表格和标签已全部连接完毕。接下来你需要一些数据来显示。你将复用第 8 章中创建的部分数据。使用 Mac 上的访达（Finder），将第\
  \ 8 章文件夹中的 `Book.swift` 和 `BookStore.swift` 文件拖拽到 Xcode 中的 `BookStore WatchKit Extension`\
  \ 文件夹内。勾选“如果需要则拷贝项目”复选框，将文件复制到新项目中。完成后，你的目标中将会包含 `Book.swift` 和 `BookStore.swift`\
  \ 文件，如图 15-19 所示。\n\n![A341013_4_En_15_Fig19_HTML.jpg](img/A341013_4_En_15_Fig19_HTML.jpg)\n\
  \n图 15-19. 添加数据文件\n\n数据和界面都已准备就绪。现在需要将它们连接起来，以便界面能够了解数据。你需要声明一个用于保存`BookStore`对象的新属性。在\
  \ `InterfaceController.swift` 文件中 `mainTable` 对象的声明下方，需要添加以下代码行：\n\n```\nvar myBookStore:\
  \ BookStore = BookStore()\n```\n\n这将创建一个名为 `myBookStore`、类型为 `BookStore` 的属性，并将其初始化为\
  \ `BookStore` 的一个实例。\n\n我们将使用 `configureTable()` 方法来设置表格。在类中添加以下代码，位置应在其他任何方法之外：\n\
  \n```\n1     func configureTable() {\n2         mainTable.setNumberOfRows(myBookStore.bookList.count,\
  \ withRowType: \"myBookRow\")\n3         for index in 0..<myBookStore.bookList.count\
  \ {\n4             if let myRow = mainTable.rowController(at: index) as? BookRow\
  \ {\n5                 myRow.bookLabel.setText(myBookStore.bookList[index].title)\n\
  6             }\n7         }\n8     }\n```\n\n第 1 行声明了新的方法。第 2 行将表格的行数设置为书店中书籍的数量。你将使用\
  \ `myBookStore.bookList.count` 来获取该数字。同时，我们还需告知表格要使用哪个行标识符。第 3 行是一个循环，将 `index`\
  \ 赋值为 0，并持续递增直到达到书籍数量减 1。之所以要减去 1，是因为 Swift（以及大多数现代编程语言）的数组索引从 0 开始。这意味着如果一个数组包含两个项目，那么项目的位置分别是\
  \ 0 和 1。如果你试图访问位置 2，则会收到错误提示。\n\n第 4 行尝试使用上一行创建的 `index` 变量为表格创建新行。第 5 行获取该行，并将\
  \ `Book` 的标题赋值给 `bookLabel`。现在我们需要在视图激活时调用 `configureTable`。请在 `willActivate` 函数中添加以下代码行：\n\
  \n```\nconfigureTable()\n```\n\n输入这些代码行后，`InterfaceController.swift` 文件将如图 15-20\
  \ 所示。\n\n![A341013_4_En_15_Fig20_HTML.jpg](img/A341013_4_En_15_Fig20_HTML.jpg)\n\
  \n图 15-20. `InterfaceController.swift` 文件\n\n现在你已拥有运行应用程序所需的全部要素。从目标菜单中选择 `BookStore\
  \ WatchKitApp`，然后选择希望模拟器使用的 Apple Watch 尺寸，如图 15-21 所示。如果这是你首次启动 Watch 模拟器，可能需要一些时间，并且在应用程序成功运行前，可能会要求授予电话模拟器相关权限。\n\
  \n![A341013_4_En_15_Fig21_HTML.jpg](img/A341013_4_En_15_Fig21_HTML.jpg)\n\n图 15-21.\
  \ 选择 WatchKit 目标\n\n应用程序启动后，你将看到一个手表屏幕，其中显示了 `myBookStore` 对象中的两本书。如果你想要尝试滚动操作，可以返回\
  \ `BookStore.swift` 文件并添加更多书籍。应用程序应如图 15-22 所示。\n\n![A341013_4_En_15_Fig22_HTML.jpg](img/A341013_4_En_15_Fig22_HTML.jpg)\n\
  \n图 15-22. 首次启动 WatchKit 应用程序\n\n\n\n# 添加更多功能\n\n在上一节中，你创建了一个 WatchKit 应用，但其功能十分有限。在本节中，你将向应用添加一个新场景，以便在选中一本书时显示书籍详情。由于需要添加场景，你将使用额外的控制器文件。右键点击\
  \ `BookStore WatchKit Extension` 文件夹，选择 `新建文件`，如图 15-23 所示。\n\n![A341013_4_En_15_Fig23_HTML.jpg](img/A341013_4_En_15_Fig23_HTML.jpg)\n\
  \n图 15-23. 添加新控制器文件\n\n确保新文件是 Swift 文件，并将其命名为 `DetailController.swift`。现在它应该出现在你的文件列表中。在\
  \ `import Foundation` 行之后添加以下代码：\n\n```\n10      import WatchKit\n\n13      class\
  \ DetailController: WKInterfaceController {\n14           @IBOutlet var labelTitle:\
  \ WKInterfaceLabel!\n15           @IBOutlet var labelAuthor: WKInterfaceLabel!\n\
  16           @IBOutlet var labelDescription: WKInterfaceLabel!\n\n18           var\
  \ book: Book!\n\n20           override func awake(withContext context: Any?) {\n\
  21                super.awake(withContext: context)\n22                if let book\
  \ = context as? Book {\n23                     labelTitle.setText(book.title)\n\
  24                     labelAuthor.setText(book.author)\n25                    \
  \ labelDescription.setText(book.description)\n26                }\n27          \
  \ }\n28      }\n```\n\n第 10 行导入了 `WatchKit` 框架。处理任何 `WatchKit` 类（如 `WKInterfaceController`\
  \ 或 `WKInterfaceLabel`）时都需要此操作。第 13 行声明了一个名为 `DetailController` 的新 `WKInterfaceController`\
  \ 子类。第 14–16 行创建了用于显示书籍信息的标签出口。第 18 行声明了名为 `book` 的 `Book` 属性。第 20 行是 `awakeWithContext`\
  \ 方法。它接收一个名为 `context` 的对象，其类型为 `Any`。`Book` 对象将在此处被传递。第 22 行将 `context` 赋值给 `book`\
  \ 对象。第 23–25 行从书籍中提取信息并将其赋值给标签。\n\n现在，你需要向 `InterfaceController` 类添加以下方法：\n\n```\n\
  override func contextForSegue(withIdentifier segueIdentifier: String,\nin table:\
  \ WKInterfaceTable,\nrowIndex: Int) -> Any? {\nreturn myBookStore.bookList[rowIndex]\n\
  }\n```\n\n当该方法接收到选中行的 `rowIndex` 时，会将书籍传递给 `DetailController`。现在你需要创建界面。在左侧选择 `Interface.storyboard`。从对象库中拖拽一个界面控制器到故事板，如图\
  \ 15-24 所示。\n\n![A341013_4_En_15_Fig24_HTML.jpg](img/A341013_4_En_15_Fig24_HTML.jpg)\n\
  \n图 15-24. 添加新控制器文件\n\n选择第二个界面控制器场景，并将其类设置为 `DetailController`，如图 15-25 所示。\n\n\
  ![A341013_4_En_15_Fig25_HTML.jpg](img/A341013_4_En_15_Fig25_HTML.jpg)\n\n图 15-25.\
  \ 设置新控制器类\n\n现在将三个标签对象拖拽到界面上。这些标签将用于显示书籍标题、作者和描述。参见图 15-26。watchOS 并未提供与 iOS、tvOS\
  \ 或 macOS 相同的全部布局选项。作为开发者，你需要花时间设计简洁的 watchOS 界面。\n\n![A341013_4_En_15_Fig26_HTML.jpg](img/A341013_4_En_15_Fig26_HTML.jpg)\n\
  \n图 15-26. 新标签\n\n现在你需要连接新标签的出口。按住 Control 键从详情控制器场景拖拽到每个标签，并将它们分配给各自的属性。参见图 15-27。\n\
  \n![A341013_4_En_15_Fig27_HTML.jpg](img/A341013_4_En_15_Fig27_HTML.jpg)\n\n图 15-27.\
  \ 连接出口\n\n现在所有数据应该都能显示了。你需要创建转场并再次测试应用。按住 Control 键从界面控制器场景下的 `MyBookRow` 拖拽到详情控制器。系统将提示你选择转场类型。选择\
  \ `Push`。参见图 15-28。\n\n![A341013_4_En_15_Fig28_HTML.jpg](img/A341013_4_En_15_Fig28_HTML.jpg)\n\
  \n图 15-28. 创建转场\n\n现在运行应用并选择一行。你应该会看到刚刚创建的详情控制器，如图 15-29 所示。\n\n![A341013_4_En_15_Fig29_HTML.jpg](img/A341013_4_En_15_Fig29_HTML.jpg)\n\
  \n图 15-29. 详情视图场景\n\n## 总结\n\n本章介绍了 Apple Watch 开发的基础知识。具体来说，你学习了以下内容：\n\n- 如何创建新的\
  \ WatchKit 应用\n- 如何使用 WatchKit 控件 `WKInterfaceController`、`WKInterfaceTable` 和 `WKInterfaceLabel`\n\
  - 如何创建多个场景并在它们之间添加转场\n- 如何处理从一个场景到下一个场景的数据传递\n\n## 练习题\n\n- 在详情场景中设置标签，使其显示所有数据，而不是截断部分内容。\n\
  - 向你的 `BookStore` 中添加更多书籍，以便在应用中体验滚动效果。\n\n\n\n# 索引 A\n\n## Apple 开发者计划\nApple 的\
