- fmt: "### Implementing the Classes\n\nNow that you understand the objects you are\
    \ going to be creating, you need to create your first object. To do so, you will\
    \ start with a new project.\n\n1.  Launch Xcode. Select File ➤ New ➤ Project.\n\
    2.  Select iOS on the top menu. On the right side, select Master-Detail Application.\
    \ For what you are doing in this chapter, you could have selected any of the application\
    \ types (see Figure [5-9](#A341013_4_En_5_Chapter.html#Fig9)). Click Next.\n\n\
    ![A341013_4_En_5_Fig9_HTML.jpg](A341013_4_En_5_Fig9_HTML.jpg)\n\nFigure 5-9.\n\
    \nCreating a new project\n\n3.  Enter a product name for your project. We will\
    \ use the name of `BookStore`. You will also have to enter a company name and\
    \ a company identifier. The company identifier is usually `com.companyname` (i.e.,\
    \ `com.inno`). Leave the check boxes on this screen as they appear by default.\
    \ You will not be worrying about Core Data right now; it’s discussed in Chapter\
    \ [11](#A341013_4_En_11_Chapter.html). Also, leave the current language selection\
    \ set to Swift. Click Next to select a location to save your project and then\
    \ save your project.\n4.  Select the `BookStore` folder from the Project navigator\
    \ on the left side of the screen (see Figure [5-10](#A341013_4_En_5_Chapter.html#Fig10)).\
    \ This is where the majority of your code will reside.\n\n![A341013_4_En_5_Fig10_HTML.jpg](A341013_4_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10.\n\nSelecting the BookStore project\n\n5.  Select File ➤ New ➤ File.\n\
    6.  From the pop-up window, make sure iOS is selected at the top and then click\
    \ the Cocoa Touch Class on the bottom (see Figure [5-11](#A341013_4_En_5_Chapter.html#Fig11)).\
    \ Then click Next.\n\n![A341013_4_En_5_Fig12_HTML.jpg](A341013_4_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12.\n\nCreating the file\n\n![A341013_4_En_5_Fig11_HTML.jpg](A341013_4_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11.\n\nCreating a new Swift class file\n\n7.  You will now be given\
    \ the opportunity to name your class (see Figure [5-12](#A341013_4_En_5_Chapter.html#Fig12)).\
    \ For this exercise, you will create the `Customer` class. Again, make sure the\
    \ Language is set to Swift. Click Next and save the file in the default location.\
    \  \n    **Note:** For ease of use and for understanding your code, remember that\
    \ class names should always be capitalized in Swift. Object names should always\
    \ start lowercase. For example, `Book` would be an appropriate name for a class,\
    \ and `book` would be a great name for an object based on the `Book` class. For\
    \ a two-word object, such as the book’s author, an appropriate name would be `bookAuthor`.\
    \ This type of capitalization is called lower camel case.\n8.  Now look in your\
    \ main project folder; you should have a new file. It is called `Customer.swift`.\
    \  \n    **Note:** If you had created a class in Objective-C, `Customer.h` and\
    \ `Customer.m` files would have been created. The `.h` file is the header file\
    \ that contains information about your class. The header file lists all of the\
    \ properties and methods in your class, but it does not actually contain the code\
    \ related to them. The `.m` file is the implementation file, which is where you\
    \ write the code for your methods. In Swift, the entire class is contained in\
    \ a single file.\n9.  The `Customer.swift` file should now be selected, and you\
    \ will see the window shown in Figure [5-13](#A341013_4_En_5_Chapter.html#Fig13).\
    \ Notice it does not contain a lot of information currently. The first part, with\
    \ the double slashes (`//`), consists of comments and is not considered part of\
    \ the code. Comments allow you to tell those who might read your code what each\
    \ portion of code is meant to accomplish. The second part of the file is your\
    \ new Customer class. The new class declaration is as follows:\n\n```\n    class\
    \ Customer: NSObject {\n    }\n```\n\n**Note:**  \nIn Swift, a class does not\
    \ need to be in its own file. Many classes can be defined in a single Swift file,\
    \ but this can be difficult to maintain when your project contains a lot of classes.\
    \ It is usually cleaner and more organized to have a separate file for each class.\n\
    \n![A341013_4_En_5_Fig13_HTML.jpg](A341013_4_En_5_Fig13_HTML.jpg)\n\nFigure 5-13.\n\
    \nYour empty Customer class\n\nNow let’s transfer the properties from the UML\
    \ diagram to the actual class.\n\n**Tip:**  \nProperties should always start with\
    \ a lowercase letter. There can be no spaces in a property name.\n\nFor the first\
    \ property, `First Name`, add this line to your file:\n\n```\nvar firstName =\
    \ \"\"\n```\n\nThis creates an object in your class called `firstName`. Notice\
    \ you did not tell Swift what type of property `firstName` is. In Swift, you can\
    \ declare a property and not specify the type, and a property can be assigned\
    \ a type based on the value we initially assign it. By giving the property an\
    \ initial value of `\"\"`, you tell the Swift compiler to make `firstName` a String.\
    \ In Swift, all non-optional properties require a default value either when they\
    \ are declared or in the class initializer. We will discuss optionals later in\
    \ this book.\n\n**Note:**  \nIn Objective-C, all properties are required to declare\
    \ a type. For example, to create the same `firstName` property, you would use\
    \ the following code:\n\n```\nNSString *firstName;\n```\n\nThis declares an `NSString`\
    \ with the name `firstName`. In Swift, you can declare only a variable and allow\
    \ the system to determine the type.\n\nSince all of the properties will be `var`s,\
    \ you just need to repeat the same procedure for the other ones. When that is\
    \ complete, your Swift file should look like Figure [5-14](#A341013_4_En_5_Chapter.html#Fig14).\n\
    \n![A341013_4_En_5_Fig14_HTML.jpg](A341013_4_En_5_Fig14_HTML.jpg)\n\nFigure 5-14.\n\
    \nThe Customer class interface with properties\n\nNow that the class declaration\
    \ is complete, you will need to add your method. Methods should be contained in\
    \ the same class file and location as the properties. You will add a new method\
    \ that returns an array. This code will look as follows:\n\n```\nfunc listPurchaseHistory()\
    \ -> [String] {\nreturn [\"Purchase 1\", \"Purchase 2\"]\n}\n```\n\nThis code\
    \ might seem a little confusing. The empty parentheses tell the compiler that\
    \ no parameters are passed to the method. The `->` tells the system what you return\
    \ from your method. `[String]` tells you that you are returning an array of strings.\
    \ In the final version, you will actually want to return purchase (or whatever\
    \ you chose to your purchase class) objects, but you are using `String` for now.\
    \ This code will not yet compile because you do not return an array, so you added\
    \ a return of a simple array. That is all that needs to be done in the Swift file\
    \ to create the class. Figure [5-15](#A341013_4_En_5_Chapter.html#Fig15) shows\
    \ the final Swift file.\n\n![A341013_4_En_5_Fig15_HTML.jpg](A341013_4_En_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15.\n\nThe finished Customer class Swift file"
