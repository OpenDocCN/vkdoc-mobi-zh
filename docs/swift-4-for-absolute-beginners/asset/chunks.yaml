- fmt: '### Bits


    A bit is defined as the basic unit of information used by computers to store and
    manipulate data. A bit has a value of either 0 or 1. When computers were first
    introduced, transistors and microprocessors didn’t exist. Data was manipulated
    and stored by vacuum tubes being turned on or off. If the vacuum tube was on,
    the value of the bit was 1; and if the vacuum tube was off, the value was 0. The
    amount of data a computer was able to store and manipulate was directly related
    to how many vacuum tubes the computer had.


    The first recognized computer was called the Electronic Numerical Integrator and
    Computer (ENIAC). It took up more than 136 square meters and had 18,000 vacuum
    tubes. It was about as powerful as your handheld calculator.


    Today, computers use transistors to store and manipulate data. The power of a
    computer processor depends on how many transistors are placed on its chip or CPU.
    Like the vacuum tube, transistors have an off or on state. When the transistor
    is off, its value is 0. If the transistor is on, its value is 1. At the time of
    this writing, Apple’s A11 Bionic processor that powers the iPhone 8, iPhone 8
    Plus, and iPhone X, is a 6-core ARM processor with approximately 4.3 billion transistors,
    up from 149 million transistors within the A4 from the first iPad. Figure [3-1](#A341013_4_En_3_Chapter.html#Fig1)
    shows Apple’s latest iPhone processor, the A11 Bionic.


    ![A341013_4_En_3_Fig1_HTML.jpg](A341013_4_En_3_Fig1_HTML.jpg)


    Figure 3-1. Apple’s proprietary A11 Bionic processor


    #### Moore’s Law


    The number of transistors within your iPhone’s or iPad’s processor is directly
    related to your device’s processing speed, graphics performance, memory capacity,
    and the sensors (accelerometer, gyroscope) available in the device. The more transistors
    there are, the more powerful your device is.


    In 1965, the cofounder of Intel, Gordon E. Moore, described the trend of transistors
    in a processor. He observed that the number of transistors in a processor doubled
    every 18 months from 1958 to 1965 and would likely continue “for at least 18 months.”
    The observation became famously known as Moore’s Law and has proven accurate for
    more than 55 years.


    > **Note:** There is a downside to Moore’s Law, and you have probably felt it
    in your wallet. The problem with rapidly increasing processing capability is that
    it renders technology obsolete quickly. So, when your iPhone’s two-year cell phone
    contract is up, the new iPhones on the market will be twice as powerful as the
    iPhone you had when you signed up. How convenient for everyone!


    ### Bytes


    A byte is another unit used to describe information storage on computers. A byte
    is composed of eight bits. Whereas a bit can represent up to two different values,
    a byte can represent up to 2⁸, or 256, different values. A byte can contain values
    from 0 to 255.


    The binary number system represents the numerical symbols 0 and 1. To illustrate
    how the number 71 would be represented in binary, you can use a simple table of
    eight bits (1 byte), with each bit represented as a power of two. To convert the
    byte value `01000111` to decimal, simply add up the on bits, as shown in Table
    [3-1](#A341013_4_En_3_Chapter.html#Tab1).


    **Table 3-1.** The Number 71 Represented as a Byte (64 + 4 + 2 + 1)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for "on" bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 1 | 0 | 0 | 0 | 1 | 1 | 1 |


    To represent the number 22 in binary, turn on the bits that add up to 22, or `00010110`,
    as shown in Table [3-2](#A341013_4_En_3_Chapter.html#Tab2).


    **Table 3-2.** The Number 22 Represented as a Byte (16 + 4 + 2)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for "on" bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 0 | 0 | 1 | 0 | 1 | 1 | 0 |


    To represent the number 255 in binary, turn on the bits that add up to 255, or
    `11111111`, as shown in Table [3-3](#A341013_4_En_3_Chapter.html#Tab3).


    **Table 3-3.** The Number 255 Represented as a Byte (128 + 64 + 32 + 16 + 8 +
    4 + 2 + 1)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for "on" bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 1 | 1 | 1 | 1 | 1 | 1 | 1 | 1 |


    To represent the number 0 in binary, turn on the bits that add up to 0, or `00000000`,
    as shown in Table [3-4](#A341013_4_En_3_Chapter.html#Tab4).


    **Table 3-4.** The Number 0 Represented as a Byte


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for "on" bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 0 | 0 | 0 | 0 | 0 | 0 | 0 |


    ### Hexadecimal


    Often, it will be necessary to represent characters in another format that is
    recognized by computers, namely, the hexadecimal format. The hex format is simply
    a "compressed" version of binary, where instead of eight characters used to represent
    a byte (eight bits), you can use two characters, for example, `00` or `2A` or
    `FF`. You will encounter hexadecimal numbers when you are debugging your apps.
    The hexadecimal system is a base-16 number system. It uses 16 distinct symbols:
    0 to 9 to represent the values 0 to 9 and A to F to represent the values 10 to
    15. For example, the hexadecimal number `2AF3` is equal in decimal to (2 × 16³)
    + (10 × 16²) + (15 × 16¹) + (3 × 16⁰), or 10,995. You may want to play with the
    Mac Calculator application in Programmer mode to see how hex relates to decimal
    and binary.


    Figure [3-2](#A341013_4_En_3_Chapter.html#Fig2) shows the ASCII table of characters.
    Because one byte can represent 256 characters, this works well for Western characters.
    For example, hexadecimal `20` represents a space. Hexadecimal `7D` represents
    a right curly brace (`}`). You can also see this by playing with the Mac Calculator
    app in Programmer mode as it can convert numerical values to ASCII.


    ![A341013_4_En_3_Fig2_HTML.jpg](A341013_4_En_3_Fig2_HTML.jpg)


    Figure 3-2. ASCII characters


    ### Unicode


    Representing characters with a byte worked well for computers until about the
    1990s, when the personal computer became widely adopted in non-Western countries
    where languages have more than 256 characters. Instead of a one-byte character
    set, Unicode can have up to a four-byte character set.


    To facilitate faster adoption, the first 256 code points are identical to the
    ASCII character table. Unicode can have different character encodings. The most
    common encoding used for Western text is called UTF-8. The "8" is how many bits
    are used per character, so it’s one byte per character, like ASCII.


    As an iPhone developer, you will probably use this character encoding the most.'
