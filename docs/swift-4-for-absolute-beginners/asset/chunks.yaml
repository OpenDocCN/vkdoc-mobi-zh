  trans: "\n### 创建视图\n\n首先，让我们准备好视图。如果你需要复习如何在 Xcode 中构建界面，请参考第 6 章。\n\n1.  在导航区域中点击\
    \ `Main.storyboard` 文件。这将显示 Xcode 的 Interface Builder，如图 8-7 所示。你将在 `Main.storyboard`\
    \ 文件中看到五个场景。向右导航找到详情场景（Detail Scene）。\n\n    ![A341013_4_En_8_Fig7_HTML.jpg](img/A341013_4_En_8_Fig7_HTML.jpg)\n\
    \n    图 8-7. 准备书店的详情视图。\n\n2.  默认情况下，当你创建空白的 Master-Detail 应用程序时，Xcode 会添加一个标签，其中包含文本“Detail\
    \ View content goes here.”。选中并删除这个 Label 对象，因为你将添加自己的内容。你需要添加一些新字段来显示所选书籍的详细信息。既然你删除了这个控件，还需要移除引用它的代码。\n\
    \    1.  在 `DetailViewController.swift` 文件中，移除以下代码行：\n\n        ```swift\n   \
    \     @IBOutlet weak var detailDescriptionLabel: UILabel!\n        ```\n\n   \
    \ 2.  在 `var detailItem: AnyObject?` 属性声明中，移除以下代码行：\n\n        ```swift\n    \
    \    configureView()\n        ```\n\n    3.  在名为 `configureView` 的方法中，移除以下代码行：\n\
    \n        ```swift\n        // Update the user interface for the detail item.\n\
    \        if let detail = detailItem {\n            if let label = detailDescriptionLabel\
    \ {\n                label.text = detail.description\n            }\n        }\n\
    \        ```\n\n        你的 `DetailViewController.swift` 文件现在应该如图 8-8 所示。\n\n \
    \       ![A341013_4_En_8_Fig8_HTML.jpg](img/A341013_4_En_8_Fig8_HTML.jpg)\n\n\
    \        图 8-8. 修改后的 DetailViewController。\n\n3.  从对象库（Object Library）中将一些 Label\
    \ 对象拖拽到详情视图上，如图 8-9 所示。确保下方的 Label 控件比默认宽度更宽。这样它们才能容纳较大量的文本。两个内容为“Label”的 Label\
    \ 对象是你将要连接以保存来自 `Book` 对象的两个值（`Title` 和 `Author`）的控件。\n\n    ![A341013_4_En_8_Fig9_HTML.jpg](img/A341013_4_En_8_Fig9_HTML.jpg)\n\
    \n    图 8-9. 添加一些 Label 对象。\n\n### 添加属性\n\n接下来，你将向 `DetailViewController` 类添加一些属性。这些属性将对应详情视图中的\
    \ Label 对象。\n\n1.  点击 Xcode 右上角的助理编辑器图标（看起来像两个圆圈）以打开助理编辑器。确保编辑器中显示的是 `DetailViewController.swift`\
    \ 文件。\n\n2.  按住 Control 键并将第一个空白的 Label 控件拖拽到右侧的代码中，如图 8-10 所示。将第一个命名为 `titleLabel`（见图\
    \ 8-11）并点击连接（Connect），然后对第二个重复此过程，将其命名为 `authorLabel`。这将向你的 `DetailViewController`\
    \ 类添加两个变量，如代码清单 8-9 所示，并将它们连接到界面中的 Label 控件。\n\n    ![A341013_4_En_8_Fig11_HTML.jpg](img/A341013_4_En_8_Fig11_HTML.jpg)\n\
    \n    图 8-11. 命名新属性。\n\n    ![A341013_4_En_8_Fig10_HTML.jpg](img/A341013_4_En_8_Fig10_HTML.jpg)\n\
    \n    图 8-10. 创建变量。\n\n    ```swift\n    1        @IBOutlet weak var titleLabel:\
    \ UILabel!\n    2        @IBOutlet weak var authorLabel: UILabel!\n    ```\n\n\
    \    代码清单 8-9. 修改 `DetailViewController.swift` 文件以包含新的标签。\n\n### 添加描述\n\n现在你需要向视图添加描述。描述略有不同，因为它可以跨越多行。为此，你将使用文本视图（Text\
    \ View）对象。\n\n1.  首先向视图中添加“Description:”标签，如图 8-12 所示。\n\n    ![A341013_4_En_8_Fig12_HTML.jpg](img/A341013_4_En_8_Fig12_HTML.jpg)\n\
    \n    图 8-12. 为描述添加一个新的 Label 对象。\n\n2.  接下来，将文本视图对象添加到详情场景中，如图 8-13 所示。文本视图对象的优点是易于显示多行文本。虽然\
    \ Label 对象也可以显示多行，但不如文本视图对象整洁。注意：默认情况下，文本视图控件中填满了看似随机的文本。这种文本被称为 Lorem Ipsum 文本。如果你需要填充页面，可以在网上找到任意数量的\
    \ Lorem Ipsum 生成器。对于文本视图控件，文本可以保持不变，因为你将在运行时移除它。此外，如果清空文本，则更难准确地在屏幕上定位文本视图控件的位置——它是白底白字！\n\
    \n    ![A341013_4_En_8_Fig13_HTML.jpg](img/A341013_4_En_8_Fig13_HTML.jpg)\n\n\
    \    图 8-13. 向详情视图添加文本视图。\n\n3.  为了让程序利用文本视图，你需要为其创建一个输出口（outlet），就像你为标题和描述所做的那样。只需按住\
    \ Control 键并将文本视图拖拽到你的 `DetailViewController` 文件中，就像之前所做的那样。将此变量命名为 `descriptionTextView`。`DetailViewController`\
    \ 中完成的变量部分将如代码清单 8-10 所示。\n\n    ```swift\n    1    import UIKit\n\n    3    class\
    \ DetailViewController: UIViewController {\n\n    5        @IBOutlet weak var\
    \ titleLabel: UILabel!\n    6        @IBOutlet weak var authorLabel: UILabel!\n\
    \n    8        @IBOutlet weak var descriptionTextView: UITextView!\n    ```\n\n\
    \    代码清单 8-10. 为文本视图添加输出口以保存描述。\n\n4.  注意类型是 `UITextView` 而不是 `UILabel`——这很重要。\n\
    \n**警告**\n\n如前所述，将 `descriptionTextView` 属性设置为 `UITextView` 类型非常重要。例如，如果它被意外地设置为\
    \ `UILabel` 对象，那么当尝试将屏幕上的文本视图连接到输出口时，Xcode 将无法找到 `descriptionTextView` 输出口。为什么？Xcode\
    \ 知道该控件是一个 `UITextView`，并且正在查找一个类型为 `UITextView` 的输出口。\n"
- fmt: '### Creating a Simple Data Model Class


    For the application to work, it needs to have some data to display. To do this,
    you’re going to use the `BookStore` object you created earlier as the data model
    class. There’s nothing different about a data model class except that its whole
    purpose is to allow an application to access data via an object.


    Modify the `BookStore.swift` file to look like Listing [8-11](#A341013_4_En_8_Chapter.html#Par104).


    ```

    1 //

    2 //  BookStore.swift

    3 //  BookStore

    4 //

    5 //  Created by Brad Lees on 8/20/16.

    6 //  Copyright © 2016 Innovativeware. All rights reserved.

    7 //

    9    import Foundation

    11    class BookStore {

    12        var bookList: [Book] = []

    13    }

    Listing 8-11.

    Modifying the BookStore.swift class to include an array

    ```


    On line 12, you add a variable that will hold the list of books; the property
    is simply named `bookList`. Note that `bookList` is an array, which will allow
    you to add a series of objects, in this case, a set of `Book` objects.


    Next, let’s continue adding the code to the Swift file, `BookStore.swift`, as
    shown in Listing [8-12](#A341013_4_En_8_Chapter.html#Par107).


    ```

    1 //

    2 //  BookStore.swift

    3 //  BookStore

    4 //

    5 //  Created by Thorn on 7/27/17.

    6 //  Copyright © 2017 Innovativeware. All rights reserved.

    7 //

    9 import Foundation

    11 class BookStore {

    12     var bookList: [Book] = []

    14     init() {

    15         var newBook = Book()

    16         newBook.title = "Swift for Absolute Beginners"

    17         newBook.author = "Bennett and Lees"

    18         newBook.description = "iOS Programming made easy."

    19         bookList.append(newBook)

    21         newBook = Book()

    22         newBook.title = "A Farewell to Arms"

    23         newBook.author = "Ernest Hemingway"

    24         newBook.description = "The story of an affair between an English nurse
    and an American soldier on the Italian front during World War I."

    25         bookList.append(newBook)

    26     }

    27 }

    Listing 8-12.

    Implementing the BookStore data object

    ```


    In Listing [8-12](#A341013_4_En_8_Chapter.html#Par107), lines 14 to 26 define
    the `init` method of the object, which is called whenever the object is first
    initialized. In this method, you initialize the two books you plan to add to your
    bookstore. Line 15 is where the first `Book` object is allocated and initialized.
    Lines 16 to 18 add a title, author, and description to your first book. Finally,
    line 19 adds the new `Book` object to the `bookList` array. The important thing
    to note here is that once the object is added to the array, the code can forget
    about it; the array now owns that object. Because of this, line 21 is not a problem.


    Line 21 allocates a new `Book` object overwriting the old value. This tells the
    compiler that you’re no longer interested in using the old value.


    Lines 22 to 25 simply initialize and add the second book to the array.


    That’s it! That’s all you need to define a simple data model class. Next, you
    need to modify `MasterViewController` to access this class so that it can start
    displaying some data.


    ### Modifying MasterViewController


    The simple application has two view controllers: the main view controller, which
    is called `MasterViewController`, and a secondary one called `DetailViewController`.
    View controllers are objects that simply control the behavior of a view. For the
    application to start displaying data from the data model, you need to first modify
    `MasterViewController` — this is where the navigation of the application begins.
    The following code is already in place in the template that Xcode has provided.
    You’re just going to modify it to add your data model.


    First you’ll need to modify the `MasterViewController.swift` file. You need to
