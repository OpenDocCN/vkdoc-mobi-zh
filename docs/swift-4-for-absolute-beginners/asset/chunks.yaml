    尺寸，如图 15-21 所示。如果这是你首次启动 Watch 模拟器，可能需要一些时间，并且在应用程序成功运行前，可能会要求授予电话模拟器相关权限。


    ![A341013_4_En_15_Fig21_HTML.jpg](img/A341013_4_En_15_Fig21_HTML.jpg)


    图 15-21. 选择 WatchKit 目标


    应用程序启动后，你将看到一个手表屏幕，其中显示了 `myBookStore` 对象中的两本书。如果你想要尝试滚动操作，可以返回 `BookStore.swift`
