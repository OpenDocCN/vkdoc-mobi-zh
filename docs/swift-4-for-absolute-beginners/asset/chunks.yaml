    in your `ViewController` object will be displayed, as shown in Figure [6-24](#A341013_4_En_6_Chapter.html#Fig24).
    Of the two choices, you want to choose `nameLabel`. This is the name of the variable
    in the `ViewController` object you are using.


    ![A341013_4_En_6_Fig24_HTML.jpg](A341013_4_En_6_Fig24_HTML.jpg)


    Figure 6-24.


    Selecting the object’s variable to complete the connection


    Once you’ve chosen `nameLabel`, you’re ready to run your program. Click the Run
    button (which looks like a Play button) at the top-left corner of the Xcode window
    (see Figure [6-8](#A341013_4_En_6_Chapter.html#Fig8)). This will automatically
    save your files and start the application in the iPhone Simulator, as shown in
    Figure [6-25](#A341013_4_En_6_Chapter.html#Fig25).


    ![A341013_4_En_6_Fig25_HTML.jpg](A341013_4_En_6_Fig25_HTML.jpg)


    Figure 6-25.


    The app running , before and after the button is clicked


    By clicking the Name button, the label’s text will change from its default value
    of “Label” to “My Name is Brad!” or whatever value you entered. If you want to,
    go back into the interface and clear the default label text.


    ## Summary


    The examples in this chapter were simple, but ideally they’ve whetted your appetite
    for more complex applications using Swift and Xcode. In later chapters, you can
    expect to learn more about object-oriented programming and more about what Swift
    can do. Pat yourself on the back because you’ve learned a lot already. Here is
    a summary of the topics discussed in this chapter:


    *   The origins and brief history of the Swift language

    *   Some common language symbols used in Swift

    *   A Swift class example

    *   Using Xcode a bit more, including discussing the `HelloWorld.swift` source
    file

    *   Connecting visual interface objects with methods and variables in your application
    object


    Exercises


    *   Clear the default text of “Label” in the program and rerun the example.

    *   Change the size of the Label object on the interface to be smaller in width.
    How does that affect your text message?

    *   Delete the referencing outlet connection of the label and rerun the project.
    What happens?

    *   If you think you have the hang of this, add a new button and label to the
    `ViewController` object and to the interface. Change the label from displaying
    your name to displaying something else.'
