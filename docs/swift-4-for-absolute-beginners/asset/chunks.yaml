    ```

    backgroundColor = White

    selectedRow = 3

    animateView = No

    ```


    An object’s properties can be changed at any time when your program is running,
    when the user interacts with the app, or when the programmer designs the app to
    accomplish the design requirements. The values stored in the properties of an
    object at a specific time are collectively called the state of an object .


    State is an important concept in computer programming. When teaching students
    about state, we ask them to go over to a window and find an airplane in the sky.
    We then ask them to snap their fingers and make up some of the values that the
    plane’s properties might have at that specific time. Those values might be as
    follows:


    ```

    altitude = 10,000 feet

    latitude = 33.575776

    longitude = -111.875766

    ```


    Those values represent the state of the object at the specific time that they
    snapped their fingers.


    After waiting a couple of minutes, we ask the students to find that same plane,
    snap their fingers again, and record the plane’s possible state at that specific
    point in time.


    The values of the properties might then be something like the following:


    ```

    altitude = 10,500 feet

    latitude = 33.575665

    longitude = -111.875777

    ```


    Notice how the state of the object changes over time.


    ## Working with the Playground Interface


    Playgrounds offer a great approach to using the concepts just discussed without
    all the complexity of learning Xcode and the Swift language at the same time.
    It takes only a few minutes to familiarize yourself with the playground interface
    and begin writing a program.


    Technically speaking, the playground interface is not a true IDE like you will
    be using to write your iOS apps, but it is pretty close and much easier to learn
    in. A true IDE combines code development, user interface layout, debugging tools,
    documentation, and simulator/console launching for a single application; see Figure
    [1-6](#A341013_4_En_1_Chapter.html#Fig6). However, playgrounds offer a similar
    look, feel, and features to the Xcode IDE you develop apps with.


    ![A341013_4_En_1_Fig6_HTML.jpg](A341013_4_En_1_Fig6_HTML.jpg)


    Figure 1-6.


    The Xcode IDE with the iPhone simulator


    In the next chapter, you will go through the playground interface and write your
    first program .'
  trans: '

    # 完成开发周期


    现在你已经掌握了设计需求、用户界面设计，并编写了程序，接下来该做什么？编程之后，你需要确保程序符合设计需求和用户界面设计，同时确认没有任何错误。用编程的术语来说，错误被称为
    bug（缺陷）。Bug 是指程序中不希望出现的结果，必须在应用发布到 App Store 之前修复。在程序中查找错误并确保程序满足设计需求的过程称为测试。通常情况下，测试由经验丰富的软件测试方法论专家执行，且此人并非应用的编写者。软件测试通常被称为质量保证（`QA`）。


    > **注意：** 当应用准备好提交到 App Store 时，Xcode 会为文件添加 `.app` 或 `.ipa` 扩展名，例如 `appName.app`。这就是为什么
    iPhone、iPad 和 Mac 应用程序被称为应用（app）。本书中，程序（program）、应用（application）和应用（app）均指代同一概念。


    在测试阶段，开发者需要与 `QA` 人员协作，确定应用为何未能按设计运行。这个过程称为调试。它要求开发者逐步执行程序，找出应用无法按设计工作的原因。图 1-3
    展示了完整的软件开发周期。


    ![A341013_4_En_1_Fig3_HTML.jpg](img/A341013_4_En_1_Fig3_HTML.jpg)


    **图 1-3.** 典型的软件开发周期


    在测试和调试过程中，经常需要修改需求（设计），以使应用对客户更易用。完成设计需求和用户界面更改后，整个过程将重新开始。


    最终，所有人共同努力开发的应用必须提交到 App Store。关于在周期中的哪个时间点进行提交，需要考虑许多因素：


    - 开发成本

    - 预算

    - 应用的稳定性

    - 投资回报率


    开发者和管理层之间总会有权衡。开发者希望应用尽善尽美，而管理层希望尽快从投资中获得收益。如果将发布日期交给开发者决定，应用可能永远不会提交到 App Store。开发者会一直不断调整应用，使其更快、更高效、更易用。然而，总有一个时刻，代码必须从开发者手中“撬”出来，上传到
    App Store，以便实现其应有的使命。


    # 介绍面向对象编程


    正如引言中详细讨论的，Playground 让你能够专注于面向对象编程（`OOP`），而无需一次性掌握所有 Swift 编程语法和复杂的 Xcode 开发环境。相反，你可以专注于学习
    `OOP` 的基本原则，并快速运用这些原则编写你的第一个程序。


    几十年来，开发者一直在寻找更好的方法来编写可重用、可管理且在项目生命周期内易于维护的代码。`OOP` 旨在帮助实现代码重用性和可维护性，同时降低软件开发成本。


    `OOP` 可以被视为程序中对象的集合。对这些对象执行操作，以实现设计需求。


    对象是任何可以被操作的事物。例如，飞机、人或 iPad 上的屏幕/视图都可以是对象。你可能希望操作飞机使其倾斜转弯，希望让人行走，或者希望改变 iPad 上应用屏幕的颜色。


    ![A341013_4_En_1_Fig4_HTML.jpg](img/A341013_4_En_1_Fig4_HTML.jpg)


    **图 1-4.** 此 Playground 视图中有多个对象


    在你完成每一行代码时，Playground 就会执行该行代码，如图 1-4 所示。当你运行 Playground 应用时，用户可以对应用中的对象应用操作。Xcode
    是一个集成开发环境（`IDE`），让你能够在编程环境中运行应用。你可以先在电脑上测试应用，然后在 iOS 设备上运行，方法是使用 Xcode 的模拟器运行应用，如图
    1-5 所示。


    ![A341013_4_En_1_Fig5_HTML.jpg](img/A341013_4_En_1_Fig5_HTML.jpg)


    **图 1-5.** 这个示例 iPhone 应用包含一个表格对象，用于组织购物清单。可以对对象应用诸如“向左旋转”或“用户选择了第 3 行”之类的操作。


    对对象执行的操作称为方法。方法操纵对象以实现你希望应用完成的任务。例如，对于一个 `jet` 对象，你可能有以下方法：


    ```

    goUp

    goDown

    bankLeft

    turnOnAfterburners

    lowerLandingGear

    ```


    图 1-5 中的 `table` 对象在程序中实际上被称为 `UITableView`，它可能具有以下方法：


    ```

    numberOfRowsInSection

    cellForRowAtIndexPath

    canEditRowAtIndexPath

    commitEditingStyle

    didSelectRowAtIndexPath

    ```


    大多数对象具有描述这些对象的数据。这些数据被定义为属性。每个属性以特定方式描述关联的对象。例如，`jet` 对象的属性可能如下：


    ```

    altitude = 10,000 feet

    heading = North

    speed = 500 knots

    pitch = 10 degrees

    yaw = 20 degrees

    latitude = 33.575776

    longitude = -111.875766

    ```


    对于图 1-5 中的 `UITableView` 对象，其属性可能如下：


    ```

    backgroundColor = White

    selectedRow = 3

    animateView = No

    ```


    对象的属性可以在程序运行时的任何时刻更改，无论是用户与应用交互时，还是程序员为实现设计需求而设计应用时。在特定时刻，对象属性中存储的值统称为对象的状态。


    状态是计算机编程中的一个重要概念。在教授学生有关状态的知识时，我们让他们走到窗边，在天空中找一架飞机。然后我们让他们打个响指，并想象该飞机在那特定时刻可能具有的一些属性值。这些值可能如下：


    ```

    altitude = 10,000 feet

    latitude = 33.575776

    longitude = -111.875766

    ```


    这些值代表了对象在打响指那一特定时刻的状态。


    等待几分钟后，我们让学生找到同一架飞机，再次打响指，并记录飞机在那个特定时间点可能的状态。


    此时属性的值可能如下所示：


    ```

    altitude = 10,500 feet

    latitude = 33.575665

    longitude = -111.875777

    ```


    注意对象的状态如何随时间变化。


    # 使用 Playground 界面


    Playground 提供了一种极好的方式来应用刚刚讨论的概念，而无需同时学习 Xcode 和 Swift 语言的所有复杂性。你只需花几分钟熟悉 Playground
    界面，就可以开始编写程序。


    从技术上讲，Playground 界面并不是像你用来编写 iOS 应用那样的真正 `IDE`，但它非常接近，并且学起来容易得多。真正的 `IDE` 将代码开发、用户界面布局、调试工具、文档以及模拟器/控制台启动整合到单个应用中，如图
    1-6 所示。然而，Playground 在视觉、感觉和功能上与你用来开发应用的 Xcode `IDE` 非常相似。


    ![A341013_4_En_1_Fig6_HTML.jpg](img/A341013_4_En_1_Fig6_HTML.jpg)


    **图 1-6.** 带有 iPhone 模拟器的 Xcode IDE


    在下一章中，你将逐步了解 Playground 界面并编写你的第一个程序。

