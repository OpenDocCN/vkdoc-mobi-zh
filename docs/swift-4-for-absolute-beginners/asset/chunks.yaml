  trans: '

    ### 使用调试器控制


    如前所述，一旦调试器启动，视图便会发生变化。此时出现的是调试控件（如图 13-8 中圈出的部分）。这些控件非常直观，其功能说明见表 13-1。


    **表 13-1.** Xcode 调试控件


    | 控件 | 说明 |

    | --- | --- |

    | ![A341013_4_En_13_Figa_HTML.jpg](img/A341013_4_En_13_Figa_HTML.jpg) | 单击停止按钮将终止程序的执行。如果
    iPhone 或 iPad 模拟器正在运行该应用程序，它也会像用户强制退出应用一样停止。单击运行按钮（外观类似播放按钮）可启动调试。如果应用程序当前处于调试模式，再次单击运行按钮将从头开始重新调试应用程序；这相当于先停止再重新启动。
    |

    | ![A341013_4_En_13_Figb_HTML.jpg](img/A341013_4_En_13_Figb_HTML.jpg) | 单击此按钮将使程序继续执行。程序将持续运行，直到程序结束、单击停止按钮或程序遇到另一个断点。
    |

    | ![A341013_4_En_13_Figc_HTML.jpg](img/A341013_4_En_13_Figc_HTML.jpg) | 当调试器停在某个断点时，单击单步跳过按钮将使调试器执行当前代码行，并停在下一行代码处。
    |

    | ![A341013_4_En_13_Figd_HTML.jpg](img/A341013_4_En_13_Figd_HTML.jpg) | 单击单步进入按钮将使调试器进入指定的函数或方法。如果需要跟踪代码进入特定方法或函数，此功能非常重要。只有项目拥有源代码的方法才能单步进入。
    |

    | ![A341013_4_En_13_Fige_HTML.jpg](img/A341013_4_En_13_Fige_HTML.jpg) | 单步跳出按钮将使当前方法执行完毕，然后调试器将返回到最初调用该方法的那个方法。
    |


    ## 使用单步控制


    为了练习使用单步控制，我们来单步进入一个方法。顾名思义，单步进入按钮会跟踪程序执行，进入高亮显示的方法或函数。从项目管理器中选择 `DetailViewController.swift`
    文件。然后，在第 31 行（即调用 `self.configureView()` 的位置）设置一个断点。单击运行按钮，并从列表中选择一本书。您的屏幕应类似于图
    13-10。


    ![A341013_4_En_13_Fig10_HTML.jpg](img/A341013_4_En_13_Fig10_HTML.jpg)


    **图 13-10.** 调试器停在第 31 行


    单击单步进入按钮 ![A341013_4_En_13_Figf_HTML.jpg](img/A341013_4_En_13_Figf_HTML.jpg)，这将使调试器进入
    `DetailViewController` 对象的 `configureView()` 方法。屏幕应类似于图 13-11。


    ![A341013_4_En_13_Fig11_HTML.jpg](img/A341013_4_En_13_Fig11_HTML.jpg)


    **图 13-11.** 单步进入 `DetailViewController` 对象的 `configureView` 方法


    单步跳过控件 ![A341013_4_En_13_Figg_HTML.jpg](img/A341013_4_En_13_Figg_HTML.jpg)，会让程序继续执行，但不会进入某个方法。它仅仅是执行该方法，然后继续执行下一行。单步跳出控件
    ![A341013_4_En_13_Figh_HTML.jpg](img/A341013_4_En_13_Figh_HTML.jpg) 有点类似于单步进入的反向操作。如果单击单步跳出按钮，当前方法会继续执行直至结束。然后调试器会返回到当初单击单步进入按钮之后的那一行。例如，如果在图
    13-9 所示的行上单击了单步进入按钮，然后又单击了单步跳出按钮，调试器将在图 13-9 所示的语句（示例中的第 31 行，即单击单步进入时所在的行）之后，返回到
    `DetailViewController.swift` 文件的 `viewDidLoad()` 方法。


    ### 查看线程窗口和调用栈


    如前所述，调试导航器会显示当前线程。不过，它也会显示调用栈。如果比较图 13-9 和图 13-10 在线程窗口方面的差异，您会发现图 13-10 中列出了
    `configureView` 方法，因为 `DetailViewController` 调用了 `configureView` 方法。


    现在，调用栈不仅仅是一个已被调用的函数列表；更准确地说，它是一个当前正在被调用的函数列表。这是一个重要的区别。一旦 `configureView` 方法执行完毕并返回（第
    26 行），`configureView` 将不再出现在调用栈中。您可以将调用栈大致想象成一条面包屑轨迹。这条轨迹会指引您如何回到起点。


    ### 调试变量


    当应用程序处于调试暂停状态时，可以通过将鼠标光标悬停在代码中的变量上来查看该变量的一些信息（除了其内存地址之外）。当您进入某个局部作用域中变量已被赋值的状态时，很可能在底部的变量视图中看到该变量。在图
    13-12 中，您可以看到 `newBook` 变量，其标题为 Swift for Absolute Beginners。您还可以看到没有分配作者或描述。在调试过程中，当您停在一行代码上时，该行代码尚未执行。这意味着，即使您暂停在了为
    `author` 属性赋值的行上，该属性也尚未被赋值。


    ![A341013_4_En_13_Fig12_HTML.jpg](img/A341013_4_En_13_Fig12_HTML.jpg)


    **图 13-12.** 查看变量值


    将鼠标光标放在代码中 `newBook` 变量出现的任何位置，并单击展开三角形以显示 `Book` 对象。您应该会看到如图 13-13 所示的显示内容。


    ![A341013_4_En_13_Fig13_HTML.jpg](img/A341013_4_En_13_Fig13_HTML.jpg)


    **图 13-13.** 悬停在 `newBook` 变量上可以显示一些信息


    悬停在 `newBook` 变量上会显示其信息。在图 13-13 中，您可以看到 `newBook` 变量已被展开。


    ## 处理代码错误和警告


    虽然代码错误和警告并不是 Xcode 调试器的核心部分，但修复它们是整个调试过程的一部分。在程序（无论是否使用调试器）能够运行之前，必须修复所有错误。警告不会阻止程序构建，但它们可能会导致程序执行期间出现的问题。最佳做法是完全没有警告。

    '
- fmt: '### Errors


    Let’s take a look at a couple of types of errors. To start, let’s add an error
    to the code. On line 15 of the `MasterViewController.swift` file, change the following:


    ```

    var myBookStore: BookStore = BookStore()

    ```


    to the following:


    ```

    var myBookStore: BookStore = BookStore[]

    ```


    Save the changes and then build the project by pressing `⌘+B`. There will be an
    error, as shown in Figure [13-14](#A341013_4_En_13_Chapter.html#Fig14), that may
    show up immediately or after the build.


    ![A341013_4_En_13_Fig14_HTML.jpg](A341013_4_En_13_Fig14_HTML.jpg)


    Figure 13-14. Viewing the error in Xcode


    Next, move over to the Issue Navigator window, as shown in Figure [13-15](#A341013_4_En_13_Chapter.html#Fig15),
    by clicking the triangle with the exclamation point. This view shows all the errors
    and warnings currently in the program — not just the current file, `MainViewController.swift`,
    but all the files. Errors are displayed as a white exclamation point inside a
    red octagon. In this case, you have one error. If the error doesn’t fit on the
    screen or is hard to read, simply hover over the error on the Issue Navigator,
    and the full error will be displayed.


    ![A341013_4_En_13_Fig15_HTML.jpg](A341013_4_En_13_Fig15_HTML.jpg)


    Figure 13-15. Viewing the Issue Navigator


    Generally, the error points to the problem. In the previous case, the `BookStore`
    object was initialized as an array rather than as an object.


    Go ahead and fix the error by changing `[]` to `()`.


    ### Warnings


    Warnings indicate potential problems with the program. As mentioned, warnings
    won’t stop a program from building but may cause issues during program execution.
    It’s outside the scope of this book to cover those warnings that may or may not
    cause problems during program execution; however, it’s good practice to eliminate
    all warnings from a program.


    Add the following code to the `MasterViewController.swift viewDidLoad` method:


    ```

    if false {

    print("False")

    }

    ```


    The `print` command will never be executed because `false` will never be equal
    to `true`. Build the project by pressing `⌘+B`. A warning will be displayed, as
    shown in Figure [13-16](#A341013_4_En_13_Chapter.html#Fig16).


    ![A341013_4_En_13_Fig16_HTML.jpg](A341013_4_En_13_Fig16_HTML.jpg)


    Figure 13-16. Viewing the warnings in the Issue Navigator


    Clicking the first warning in the Issue Navigator will show you the code that
    is causing the first problem, as shown in Figure [13-17](#A341013_4_En_13_Chapter.html#Fig17).


    ![A341013_4_En_13_Fig17_HTML.jpg](A341013_4_En_13_Fig17_HTML.jpg)


    Figure 13-17. Viewing your first warning


    In the main window, you can see the warning. In fact, this warning gives you a
    clue as to the problem with the code. The warning states the following:


    > “Will never be executed”


    This is a simple example of a warning. You can receive warnings for many things
    such as unused variables, incomplete delegate implementations, and unexecutable
    code. It is good practice to clean up the warnings in your code to avoid issues
    down the road.


    ## Summary


    This chapter covered the high-level features of the free Apple Xcode debugger.
    Regardless of price, Xcode is an excellent debugger. Specifically, in this chapter,
    you learned about the following:


    * The origins of the term bug and what a debugger is

    * The high-level features of the Xcode debugger, including breakpoints and stepping
    through a program

    * Using the debugging controls called Continue, Step Over, Step In, and Step Out

    * Working with the various debugger views, including threads (call stack), Variables
    view, Text editor, and Console Output

    * Looking at program variables

    * Dealing with errors and warnings


    Footnotes [1](#A341013_4_En_13_Chapter.html#Fn1_source)


    Michael Moritz, Alexander L. Taylor III, and Peter Stoler, “The Wizard Inside
    the Machine,” *Time*, Vol. 123, no. 16, pp. 56–63.


    # 14. A Swift iPhone App


    In Chapter [8](#A341013_4_En_8_Chapter.html), you created a basic bookstore iPhone
    app with Swift. In this chapter, you will add some features to the app to make
    it a bit more functional and use many of the technologies you have learned in
    this book, such as creating a class, using delegates and protocols, and using
    actions and outlets. You will also learn about some new techniques such as switches,
    `UIAlertController`, and landmarks.'
