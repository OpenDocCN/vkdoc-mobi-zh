    \ Swift 语言的基础知识。阅读本章后，你会看到协议和委托非常有用，并且不难理解和实现。\n\n## Multiple Inheritance\n\n\
    我们在第 [5](#A341013_4_En_5_Chapter.html) 章讨论了对象继承。简而言之，对象继承意味着子类可以继承父类的所有特性，如图 [12-1](#A341013_4_En_12_Chapter.html#Fig1)\
