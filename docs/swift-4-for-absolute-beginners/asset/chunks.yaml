  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵守您的注意事项，完成以下翻译工作。



    ### 比较字符串


    对于大多数 C 语言来说，字符串是一种困难的数据类型。在 ANSI C（或标准 C）中，字符串只是一个字符数组。Objective-C 进一步推动了字符串的发展，使其成为一个名为`NSString`的对象。Swift
    则更进一步，让`String`类更易于使用。在操作对象时，您可以获得更多可用的属性和方法。对您来说幸运的是，`String`有许多用于比较数据的方法，这使您的工作变得轻松得多。


    让我们看一个例子。在这里，您正在比较密码，以确定是否应允许用户登录：


    ```

    var enteredPassword = "Duck"

    var myPassword = "duck"

    var continueLogin = false

    if enteredPassword == myPassword {

    continueLogin = true

    }

    ```


    第一行只是声明了一个`String`并将其值设置为`Duck`。下一行声明了另一个`String`并将其值设置为`duck`。在您的实际代码中，您需要从用户那里获取`enteredPassword`字符串。


    下一行是实际执行工作的代码部分。您只需询问这些字符串是否彼此相等。该示例代码将始终为`false`，因为`enteredPassword`中的大写`D`与`myPassword`中的小写`d`不同。


    您可能还需要对字符串执行许多其他不同的比较。例如，您可能想检查某个字符串的长度。这很容易做到。


    ```

    var enteredPassword = "Duck"

    var myPassword = "duck"

    var continueLogin = false

    if enteredPassword.count > 5 {

    continueLogin = true

    }

    ```


    注意


    `count`是一个可用于计算字符串、数组和字典数量的属性。


    此代码检查输入的密码长度是否超过五个字符。


    在其他时候，您将不得不在字符串内搜索某些数据。幸运的是，Swift 让这件事变得简单。`String`提供了一个名为`contains`的函数，它允许您在字符串中搜索另一个字符串。`contains`函数只接受一个参数，即您要搜索的字符串。


    ```

    var searchTitle: String

    var bookTitle: String

    searchTitle = "Sea"

    bookTitle = "2000 Leagues Under the Sea"

    if bookTitle.contains(searchTitle) {

    addToResults()

    }

    ```


    此代码的开头与您之前查看的其他示例类似。我们创建了两个变量。然后，此示例接受一个搜索词，并检查书名中是否包含相同的搜索词。如果包含，则将这本书添加到结果中。这个方法可以进行调整，以允许用户搜索书名、作者甚至描述中的特定术语。


    有关`String`支持的方法的完整列表，请参阅[`https://swift.org/documentation/#the-swift-programming-language`](https://swift.org/documentation/#the-swift-programming-language)上的苹果文档。


    ## 使用 switch 语句


    到目前为止，您已经看到了几个仅通过使用`if`语句比较数据的示例。


    ```

    if someValue == SOME_CONSTANT {

    ...

    } else if someValue == SOME_OTHER_CONSTANT {

    ...

    } else if someValue == YET_SOME_OTHER_CONSTANT {

    ...

    }

    ```


    如果您需要将一个变量与多个常量值进行比较，可以使用另一种可以简化比较代码的方法：`switch`语句。


    注意


    在 Objective-C 中，您只能在`switch`语句中使用值进行比较。Swift 允许开发人员在`switch`语句的使用上拥有更多自由。使用 Swift，开发人员现在可以比较大多数对象，包括自定义对象。


    `switch`语句允许您将一个或多个值与另一个变量进行比较。


    ```

    var customerType = "Repeat"

    switch  customerType {     // switch 语句后跟一个左花括号

    case "Repeat":       // 等同于 if (customerType == "Repeat")

    ...               // 在此 case 之后调用函数并放置任何其他语句。

    ...

    case "New":

    ...

    ...

    case "Seasonal":                   ...

    ...

    default:             // Swift 中需要默认分支

    }  // switch 语句结束。

    ```


    `switch`语句功能强大，它可以简化并精简与多个不同值的比较。


    在 Swift 中，`switch`语句是一个强大的语句，可用于简化重复的`if`/`else`语句。


    ### 比较日期


    在任何编程语言中，日期都是一个相当复杂的变量类型，而且不幸的是，根据您正在编写的应用程序类型，它们很常见。Swift 4 拥有自己的原生`Date`类型。Swift
    的`Date`类有许多很好的方法，使得比较日期变得容易。我们将重点介绍`compare`函数。`compare`函数返回一个`ComparisonResult`，它有三个可能的值：`orderedSame`、`orderedDescending`和`orderedAscending`。


    ```

    // 今天的日期

    let today: Date = Date()

    // 促销日期 = 明天

    let timeToAdd: TimeInterval = 60*60*24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    var saleStarted = false

    let result: ComparisonResult  = today.compare(saleDate)

    switch result {

    case ComparisonResult.orderedAscending:

    // 促销日期在未来

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // 促销开始日期已过，促销正在进行

    saleStarted = true

    default:

    // 促销开始日期就是现在

    saleStarted = true

    }

    ```


    这看起来似乎只是为了比较一些日期而做了很多工作。让我们逐步分析代码，看看是否能理解它。


    ```

    let today: Date = Date()

    let timeToAdd: TimeInterval = 60*60*24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    ```


    在这里，您声明了两个不同的`Date`对象。第一个名为`today`，使用系统日期或您的设备日期进行初始化。在创建第二个日期之前，您需要向第一个日期添加一些时间。您通过创建一个`TimeInterval`来做到这一点。这是一个以秒为单位的数字。要增加一天，您需要添加`60*60*24`。第二个日期名为`saleDate`，使用未来的某个日期进行初始化。您将使用此日期来确定此促销是否已开始。我们不会详细讨论`Date`对象的初始化。


    使用`Date`对象的`compare`函数的结果是一个`ComparisonResult`。您必须声明一个`ComparisonResult`来捕获`compare`函数的输出。


    ```

    let result = today.compare(saleDate)

    ```


    这只是简单地比较了两个日期。它将得到的`ComparisonResult`放入名为`result`的常量中。


    ```

    switch result {

    case ComparisonResult.orderedAscending:

    // 促销日期在未来

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // 促销开始日期已过，促销正在进行

    saleStarted = true

    default:

    // 促销开始日期就是现在

    saleStarted = true

    }

    ```


    现在您需要找出变量`result`中的值。为此，您执行一个`switch`语句，将结果与`ComparisonResult`的三个不同选项进行比较。第一行判断促销日期是否大于今天的日期。这意味着促销日期在未来，因此促销尚未开始。然后将变量`saleStarted`设置为`false`。下一行判断促销日期是否小于今天。如果是，则促销已开始，并将`saleStarted`变量设置为`true`。再下一行只是`default`。它捕获所有其他选项。但是，您知道，唯一剩下的选项是`orderedSame`。这意味着两个日期和时间相同，因此促销刚刚开始。


    还有其他可用于比较`Date`对象的方法。这些方法中的每一种在某些特定任务中会更高效。我们选择了`compare`方法，因为它可以满足您大部分基本的日期比较需求。


    注意


    请记住，`Date`同时包含日期和时间。这可能会影响您的日期比较，因为它不仅会比较日期，还会比较时间。

    '
- fmt: '### Combining Comparisons


    As discussed in Chapter [4](#A341013_4_En_4_Chapter.html), you’ll sometimes need
    something more complex than a single comparison. This is where logical operators
    come in. Logical operators enable you to check for more than one requirement.
    For example, if you have a special discount for people who are members of your
    book club and who spend more than $30, you can write one statement to check this.


    ```

    var totalSpent = 31

    var discountThreshhold = 30

    var discountPercent = 0

    var clubMember = true

    if totalSpent > discountThreshhold && clubMember {

    discountPercent = 15

    }

    ```


    We have combined two of the examples shown earlier. The new comparison line reads
    as follows: "If `totalSpent` is greater than `discountThreshold` AND `clubMember`
    is `true`, then set the `discountPercent` to 15." For this to return `true`, both
    items need to be `true`. You can use `||` instead of `&&` to signify "or." You
    can change the previous line to this:


    ```

    if totalSpent > discountThreshhold || clubMember  {

    discountPercent = 15

    }

    ```


    Now this reads as follows: "If `totalSpent` is greater than `discountThreshold`
    OR `clubMember` is `true`, then set the `discountPercent` to 15." This will return
    `true` if either of the options is `true`.


    You can continue to use the logical operations to combine as many comparisons
    together as you need. In some cases, you may need to group comparisons using parentheses.


    ## Summary


    You’ve reached the end of the chapter! Here is a summary of the topics that were
    covered:


    - **Comparisons**: Comparing data is an integral part of any application.

    - **Relational operators**: You learned about the six standard relational operators
    and how each is used.

    - **Numbers**: Numbers are the easiest pieces of information to compare. You learned
    how to compare numbers in your programs.

    - **Examples**: You created a sample playground where you could test your comparisons
    and make sure that you are correct in your logic. Then you learned how to change
    the playground to add different types of comparisons.

    - **Boolean**: You learned how to check Boolean values.

    - **Strings**: You learned how strings behave differently from other pieces of
    information you have tested.

    - **Dates**: You learned how difficult it can be to compare dates and that you
    must be careful to make sure you are getting the response you desire.


    **Exercises**


    - Modify the example playground to compare some string information.

    - Write a Swift application that determines whether the following years are leap
    years: 1800, 1801, 1899, 1900, 2000, 2001, 2003, and 2010. Output should be written
    to the console in the following format: `The year 2000 is a leap year` or `The
    year 2001 is not a leap year`. See [`http://en.wikipedia.org/wiki/Leap_year`](http://en.wikipedia.org/wiki/Leap_year)
    for information on determining whether a year is a leap year.


    # 10. Creating User Interfaces


    Interface Builder enables iOS developers to easily create their user interfaces
    using a powerful graphical user interface. It provides the ability to build user
    interfaces by simply dragging objects from Interface Builder’s library to the
    editor.


    Interface Builder stores your user interface design in one or more resource files,
    called storyboards. These resource files contain the interface objects, their
    properties, and their relationships.


    To build a user interface, simply drag objects from Interface Builder’s Object
    Library pane onto your view or scene. Actions and outlets are two key components
    of Interface Builder that help you streamline the development process.


    Your objects trigger actions in your views, and the actions are connected to your
    methods in the app’s code. Outlets are declared in your `.swift` file and are
    connected to specific controls as properties. See Figure [10-1](#A341013_4_En_10_Chapter.html#Fig1).


    **Note**


    Interface Builder was once a stand-alone application that developers used to design
    their user interfaces. Starting with Xcode 4.0, Interface Builder has been integrated
    into Xcode.


    ![A341013_4_En_10_Fig1_HTML.jpg](A341013_4_En_10_Fig1_HTML.jpg)


    Figure 10-1. Interface Builder


    ## Understanding Interface Builder


    Interface Builder saves the user interface file as a bundle that contains the
    interface objects and relationships used in the application. These bundles previously
    had the file extension `.nib`. Version 3.0 of Interface Builder used a new XML
    file format, and the file extension changed to `.xib`. However, developers still
    call these files nib files. Later Apple introduced storyboards. Storyboards enable
    you to have all of your views in one file with a `.storyboard` extension.


    Unlike most other graphical user interface applications, XIBs and storyboards
    are often referred to as freeze-dried because they contain the archived objects
    themselves and are ready to run.


    The XML file format is used to facilitate storage with source control systems
    such as Subversion and Git.


    In the next section, we’ll discuss an app design pattern called Model-View-Controller.
    This design pattern enables developers to more easily maintain code and reuse
    objects over the life of an app.'
