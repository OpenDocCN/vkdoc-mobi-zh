- fmt: '点击屏幕右上角的最后一个查看按钮，如图[6-12](#A341013_4_En_6_Chapter.html#Fig12)所示。这将打开界面的“Utilities”视图。除其他功能外，“Utilities”视图会显示您在应用中可用的各种界面对象。您只需要关注最右侧的两个对象：`Button`和`Label`。图[6-13](#A341013_4_En_6_Chapter.html#Fig13)展示了对象库。虽然还有其他库可用，但目前您只需要使用从左数第三个库。


    ![A341013_4_En_6_Fig12_HTML.jpg](A341013_4_En_6_Fig12_HTML.jpg)


    图6-12. 您将要修改的界面


    ![A341013_4_En_6_Fig13_HTML.jpg](A341013_4_En_6_Fig13_HTML.jpg)


    图6-13. 对象库


    第一步是点击“Utilities”窗口中的`Button`对象。接着，将该对象拖拽到iPhone视图上，如图[6-14](#A341013_4_En_6_Chapter.html#Fig14)所示。不必担心；拖拽该对象并不会将其从“Utilities”视图的对象列表中移除。拖拽操作会在iPhone界面上创建该对象的一个新副本。


    ![A341013_4_En_6_Fig14_HTML.jpg](A341013_4_En_6_Fig14_HTML.jpg)


    图6-14. 将`Button`对象移动到iPhone视图上


    接下来，双击刚刚添加到iPhone界面上的`Button`对象。这允许您修改按钮的标题，例如改为`Name`，如图[6-15](#A341013_4_En_6_Chapter.html#Fig15)所示。许多不同的界面对象都遵循同样的操作方式。只需双击，即可更改对象的标题。这也可以在代码中实现，但在Interface
    Builder中操作要简单得多。


    ![A341013_4_En_6_Fig15_HTML.jpg](A341013_4_En_6_Fig15_HTML.jpg)


    图6-15. 修改`Button`对象的标题


    标题更改完成后，将一个`Label`对象拖拽到按钮的正下方，如图[6-16](#A341013_4_En_6_Chapter.html#Fig16)所示。


    ![A341013_4_En_6_Fig16_HTML.jpg](A341013_4_En_6_Fig16_HTML.jpg)


    图6-16. 向iPhone界面添加`Label`对象


    现在，您可以暂时将标签的文本保留为“Label”，因为这样做便于在界面上找到它。如果您清除了标签的文本，该对象仍然存在，但将没有任何可见内容可供点击以选中它。通过将中心的白色方块向右拖拽来扩展标签的尺寸，如图[6-17](#A341013_4_En_6_Chapter.html#Fig17)所示。


    ![A341013_4_En_6_Fig17_HTML.jpg](A341013_4_En_6_Fig17_HTML.jpg)


    图6-17. 扩展标签的尺寸


    现在您有了一个按钮和一个标签，接下来就可以将这些可视化对象连接到您的程序了。首先，右键单击（或按住Control键单击）`Button`控件。这会弹出一个连接菜单，如图[6-18](#A341013_4_En_6_Chapter.html#Fig18)所示。


    ![A341013_4_En_6_Fig18_HTML.jpg](A341013_4_En_6_Fig18_HTML.jpg)


    图6-18. `Button`对象的连接菜单


    接着，点击并按住`Touch Up Inside`连接圆圈，将其拖拽到`View Controller`图标上，如图[6-19](#A341013_4_En_6_Chapter.html#Fig19)所示。`Touch
    Up Inside`表示用户在`Button`对象内部点击。将连接拖拽到`View Controller`会将`Touch Up Inside`事件连接到`ViewController`对象。这将使得无论何时点击`Button`对象，该对象都会收到通知。


    ![A341013_4_En_6_Fig19_HTML.jpg](A341013_4_En_6_Fig19_HTML.jpg)


    图6-19. 将`Touch Up Inside`事件连接到对象


    连接释放后，会显示一个可用于连接的方法列表，如图[6-20](#A341013_4_En_6_Chapter.html#Fig20)所示。在此示例中，只有一个方法`showName`
    `:`。选择`showName:`方法会将`Touch Up Inside`事件连接到该对象。


    ![A341013_4_En_6_Fig20_HTML.jpg](A341013_4_En_6_Fig20_HTML.jpg)


    图6-20. 选择处理`Touch Up Inside`事件的方法


    连接建立后，详细信息会显示在按钮的连接菜单上，如图[6-21](#A341013_4_En_6_Chapter.html#Fig21)所示。


    ![A341013_4_En_6_Fig21_HTML.jpg](A341013_4_En_6_Fig21_HTML.jpg)


    图6-21. 连接现已完成


    接下来，为`Label`对象创建一个连接。这种情况下，您不关心`Label`的事件；相反，您需要将`ViewController`的`nameLabel`出口连接到iPhone界面上的那个对象。这个连接基本上是在告知对象：您想要设置文本的那个标签位于iPhone界面上。


    首先，右键单击iPhone界面上的`Label`对象。这会弹出`Label`对象的连接菜单，如图[6-22](#A341013_4_En_6_Chapter.html#Fig22)所示。`Label`对象的选项没有`Button`对象那么多。


    ![A341013_4_En_6_Fig22_HTML.jpg](A341013_4_En_6_Fig22_HTML.jpg)


    图6-22. `Label`对象的连接菜单


    如前所述，您这里不是为了连接事件。相反，您要连接的是一个被称为**引用出口**的东西。这将屏幕对象连接到您的`ViewController`对象中的一个变量。就像处理按钮时一样，您应该将连接拖拽到`View
    Controller`图标上，如图[6-23](#A341013_4_En_6_Chapter.html#Fig23)所示。


    ![A341013_4_En_6_Fig23_HTML.jpg](A341013_4_En_6_Fig23_HTML.jpg)


    图6-23. 将引用出口连接到对象


    当连接释放到`View Controller`图标上时，会显示`ViewController`对象中的出口列表，如图[6-24](#A341013_4_En_6_Chapter.html#Fig24)所示。在两个选项中，您需要选择`nameLabel`。这就是您在`ViewController`对象中使用的变量名。


    ![A341013_4_En_6_Fig24_HTML.jpg](A341013_4_En_6_Fig24_HTML.jpg)


    图6-24. 选择对象的变量以完成连接


    一旦您选择了`nameLabel`，就可以准备运行程序了。点击Xcode窗口左上角的“Run”按钮（看起来像一个“Play”按钮）（参见图[6-8](#A341013_4_En_6_Chapter.html#Fig8)）。这将自动保存您的文件并在iPhone模拟器中启动应用程序，如图[6-25](#A341013_4_En_6_Chapter.html#Fig25)所示。


    ![A341013_4_En_6_Fig25_HTML.jpg](A341013_4_En_6_Fig25_HTML.jpg)


    图6-25. 应用运行中，点击按钮前后的状态


    点击“Name”按钮后，标签的文本将从默认值“Label”更改为“My Name is Brad!”或您输入的任何值。如果您愿意，可以返回界面并清除默认的标签文本。


    ## 总结


    本章中的示例虽然简单，但希望能激发您使用Swift和Xcode开发更复杂应用的兴趣。在后续章节中，您将学习更多关于面向对象编程以及Swift的更多功能。请为自己鼓掌，因为您已经学到了很多。以下是本章讨论的主题摘要：


    *   Swift语言的起源与简史

    *   Swift中常用的一些语言符号

    *   一个Swift类示例

    *   更深入地使用Xcode，包括讨论`HelloWorld.swift`源文件

    *   将可视化界面对象与应用中的方法和变量进行连接


    ## 练习


    *   清除程序中“Label”的默认文本，并重新运行示例。

    *   将界面上`Label`对象的宽度调整为更小。这对您的文本消息有何影响？

    *   删除标签的引用出口连接，并重新运行项目。会发生什么？

    *   如果您认为自己已经掌握了方法，请向`ViewController`对象和界面添加一个新的按钮和标签。将标签从显示您的姓名改为显示其他内容。'
  raw: 'Click the last view button in the upper-right part of the screen, as shown
    in Figure [6-12](#A341013_4_En_6_Chapter.html#Fig12). This opens the Utilities
    view for the interface. Among other things, this Utilities view shows you the
    various interface objects you can use in your app. You’re going to be concerned
    with only the rightmost objects: Button and Label. Figure [6-13](#A341013_4_En_6_Chapter.html#Fig13)
    shows the Object Library. There are other libraries available, but for now you
    will be using only the third one from the left.


    ![A341013_4_En_6_Fig12_HTML.jpg](A341013_4_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    The Interface you’re going to modify


    ![A341013_4_En_6_Fig13_HTML.jpg](A341013_4_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    The Object Library


    The first step is to click the Button object in the Utilities window. Next, drag
    the object to the iPhone view, as shown in Figure [6-14](#A341013_4_En_6_Chapter.html#Fig14).
    Don’t worry; dragging the object doesn’t remove it from the list of objects in
    the Utilities view. Dragging it creates a new copy of that object on the iPhone
    interface.


    ![A341013_4_En_6_Fig14_HTML.jpg](A341013_4_En_6_Fig14_HTML.jpg)


    Figure 6-14.


    Moving a Button object onto the iPhone view


    Next, double-click the Button object that was just added to the iPhone interface.
    This allows you to change the title of the button, such as to `Name`, as shown
    in Figure [6-15](#A341013_4_En_6_Chapter.html#Fig15). Many different interface
    objects work just like this. Simply double-click, and the title of the object
    can be changed. This can also be done in the actual code, but it’s much simpler
    to do in Interface Builder.


    ![A341013_4_En_6_Fig15_HTML.jpg](A341013_4_En_6_Fig15_HTML.jpg)


    Figure 6-15.


    Modifying the Button object’s title


    Once the title has been changed, drag a Label object to right below the button
    , as shown in Figure [6-16](#A341013_4_En_6_Chapter.html#Fig16).


    ![A341013_4_En_6_Fig16_HTML.jpg](A341013_4_En_6_Fig16_HTML.jpg)


    Figure 6-16.


    Adding a Label object to the iPhone interface


    For now, you can leave the label’s text as “Label” since this makes it easy to
    find on the interface. If you clear the label’s text, the object will still be
    there, but there is nothing visible to click in order to select it. Expand the
    size of the label by dragging the center white square to the right, as shown in
    Figure [6-17](#A341013_4_En_6_Chapter.html#Fig17).


    ![A341013_4_En_6_Fig17_HTML.jpg](A341013_4_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    Expanding the label’s size


    Now that you have a button and the label, you can connect these visual objects
    to your program. Start by right-clicking (or Control-clicking) the Button control
    . This brings up a connection menu, as shown in Figure [6-18](#A341013_4_En_6_Chapter.html#Fig18).


    ![A341013_4_En_6_Fig18_HTML.jpg](A341013_4_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    Connection menu for the Button object


    Next, click and drag from the Touch Up Inside connection circle to the View Controller
    icon, as shown in Figure [6-19](#A341013_4_En_6_Chapter.html#Fig19). Touch Up
    Inside means the user clicked inside the Button object. Dragging the connection
    to the View Controller connects the Touch Up Inside event to the `ViewController`
    object. This causes the object to be notified whenever the Button object is clicked.


    ![A341013_4_En_6_Fig19_HTML.jpg](A341013_4_En_6_Fig19_HTML.jpg)


    Figure 6-19.


    Connecting the Touch Up Inside event to the object


    Once the connection is dropped, a list of methods that can be used in your connection
    is displayed, as shown in Figure [6-20](#A341013_4_En_6_Chapter.html#Fig20). In
    this example, there is only one method, `showName` `:`. Selecting the `showName:`
    method connects the Touch Up Inside event to the object.


    ![A341013_4_En_6_Fig20_HTML.jpg](A341013_4_En_6_Fig20_HTML.jpg)


    Figure 6-20.


    Selecting the method to handle the Touch Up Inside event


    Once the connection has been made, the details are shown on the button’s connection
    menu , as shown in Figure [6-21](#A341013_4_En_6_Chapter.html#Fig21).


    ![A341013_4_En_6_Fig21_HTML.jpg](A341013_4_En_6_Fig21_HTML.jpg)


    Figure 6-21.


    The connection is now complete


    Next, you create a connection for the Label object. In this case, you don’t care
    about the Label events; instead, you want to connect the `ViewController`’s `nameLabel`
    outlet to the object on the iPhone interface. This connection basically tells
    the object that the label you want to set text on is on the iPhone interface.


    Start by right-clicking the Label object on the iPhone interface. This brings
    up the connection menu for the Label object , as shown in Figure [6-22](#A341013_4_En_6_Chapter.html#Fig22).
    There are not as many options for a Label object as there were for the Button
    object.


    ![A341013_4_En_6_Fig22_HTML.jpg](A341013_4_En_6_Fig22_HTML.jpg)


    Figure 6-22.


    Connection menu for the Label object


    As mentioned, you are not here to connect an event. Instead, you connect what’s
    referred to as a referencing outlet . This connects a screen object to a variable
    in your `ViewController` object. Just like with the button, you should drag the
