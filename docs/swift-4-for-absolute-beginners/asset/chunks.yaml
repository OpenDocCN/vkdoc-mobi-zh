    \ in Listing [12-10](#A341013_4_En_12_Chapter.html#Par45)), you can pass `self`\
    \ to the delegate in `GuessInputViewController`.\n*   The `GuessInputViewController`\
    \ scene is displayed.\n*   When the user guesses a number and taps Save Guess,\
    \ the `saveGuess method` is called (see line 38 in Listing [12-8](#A341013_4_En_12_Chapter.html#Par36)).\n\
    *   Since you passed `ViewController` as the delegate, it can pass the `guess`\
    \ back to the `ViewController.swift` file via the userDidFinish method (see line\
    \ 45 in Listing [12-8](#A341013_4_En_12_Chapter.html#Par36)).\n*   Now you can\
    \ determine whether the user guessed the correct answer and pop the `GuessInputViewController`\
    \ view from the stack (see line 62 in Listing [12-5](#A341013_4_En_12_Chapter.html#Par27)).\n\
    \n## Summary\n\nThis chapter covered why multiple inheritance is not used in Swift\
    \ and how protocols and delegates work. When you think of delegates, think of\
    \ helper classes. When your class conforms to a protocol, the delegate’s functions\
    \ help your class.\n\nYou should be familiar with the following terms:\n\n*  \
    \ Multiple inheritance\n*   Protocols\n*   Delegates\n\nExercises\n\n*   Change\
    \ the random number the computer guesses from 0–100 to 0–50.\n*   In the main\
    \ scene, display how many guesses the user has made trying to guess the random\
    \ number.\n*   In the main scene, display how many games the user has played.\n\
    \n# 13. Introducing the Xcode Debugger\n\nNot only is Xcode provided free of charge\
    \ on Apple’s developer site and the Mac App Store, but it is also a great tool.\
    \ Aside from being able to use it to create the next great Mac, iPhone, iPad,\
    \ AppleTV, and Apple Watch apps, Xcode has a debugger built right into the tool.\n\
    \nWhat exactly is a debugger? Well, let’s get something straight — programs do\
    \ exactly what they are written to do, but sometimes what is written isn’t exactly\
    \ what the program is really meant to do. This can mean the program crashes or\
    \ just doesn’t do something that is expected. Whatever the case, when a program\
    \ doesn’t work as planned, the program is said to have bugs. The process of going\
    \ through the code and fixing these problems is called debugging .\n\nThere is\
    \ still some debate as to the real origin of the term bug , but one well-documented\
    \ case from 1947 involved the late Rear Admiral Grace Hopper, a Naval reservist\
    \ and programmer at the time. Hopper and her team were trying to solve a problem\
    \ with the Harvard Mark II computer. One team member found a moth in the circuitry\
    \ that was causing the problem with one of the relays. Hopper was later quoted\
    \ as saying, “From then on, when anything went wrong with a computer, we said\
    \ it had bugs in it.”[¹](#A341013_4_En_13_Chapter.html#Fn1)\n\nRegardless of the\
    \ origin, the term stuck and programmers all over the world use debuggers, such\
    \ as the one built into Xcode, to help find bugs in programs. But people are the\
    \ real debuggers; debugging tools merely help programmers locate problems. No\
    \ debugger, whatever the name might imply, fixes problems on its own.\n\nThis\
    \ chapter highlights some of the more important features of the Xcode debugger\
    \ and explains how to use them. Once you are finished with this chapter, you should\
    \ have a good enough understanding of the Xcode debugger and of the debugging\
    \ process in general to allow you to search for and fix the majority of programming\
    \ issues.\n\n## Getting Started with Debugging\n\nIf you’ve ever watched a movie\
    \ in slow motion just so you can catch a detail you can’t see when the movie is\
    \ played at full speed, you’ve used a tool to do something a little like debugging.\
    \ The idea that playing the movie frame by frame will reveal the detail you are\
    \ looking for is the same sort of idea you apply when debugging a program. With\
    \ a program, sometimes it becomes necessary to slow things down a bit to see what’s\
    \ happening. The debugger allows you to do this using two main features : setting\
    \ a breakpoint and stepping through the program line by line — more on these two\
    \ features in a bit. Let’s first look at how to get to the debugger and what it\
    \ looks like.\n\nFirst, you need to load an application. The examples in this\
    \ chapter use the `BookStore` project from Chapter [8](#A341013_4_En_8_Chapter.html),\
    \ so open Xcode and load the `BookStore` project.\n\nSecond, make sure the Debug\
    \ build configuration is chosen for the Run scheme, as shown in Figure [13-1](#A341013_4_En_13_Chapter.html#Fig1).\
    \ To edit the current scheme, choose Product ➤ Scheme ➤ Edit Scheme from the main\
    \ menu. Debug is the default selection, so you probably won’t have to change this.\
    \ This step is important because if the configuration is set to Release, debugging\
    \ will not work at all.\n\n![A341013_4_En_13_Fig1_HTML.jpg](A341013_4_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1.\n\nSelecting the Debug configuration\n\nWhile this book won’t discuss\
    \ Xcode schemes, just know that by default Xcode provides both a Release configuration\
    \ and a Debug configuration for any macOS, iOS, watchOS, or tvOS project you create.\
    \ The main difference as it pertains to this chapter is that a Release configuration\
    \ doesn’t add any program information that is necessary for debugging an application,\
    \ whereas the Debug configuration does."
  trans: "\n![A341013_4_En_12_Fig11_HTML.jpg](img/A341013_4_En_12_Fig11_HTML.jpg)\n\
    **图 12-11.** 创建点击“猜随机数”按钮时触发场景转场的 Segue\n\n12. 现在你需要为这个 Segue 指定一个标识符。点击 Segue\
    \ 箭头，选择属性检查器，并将 Segue 命名为 `MyGuessSegue`，如图 12-12 所示。\n\n![A341013_4_En_12_Fig12_HTML.jpg](img/A341013_4_En_12_Fig12_HTML.jpg)\n\
    **图 12-12.** 创建 Segue 标识符\n\n注意：输入 Segue 标识符后，务必按回车键。如果不按回车键，Xcode 可能无法识别属性更改。\n\
    \n现在你需要编写代码来处理这个 Segue。在 `ViewController` 类中，添加如代码清单 12-9 所示的代码。\n\n```\n    73\
    \    override func prepare(for segue: UIStoryboardSegue, sender: Any!) {\n   \
    \ 74        if segue.identifier == \"MyGuessSegue\" {\n    75            let vc\
    \ = segue.destination as! GuessInputViewController\n    76            vc.previousGuess\
    \ = previousGuess // 将 previousGuess 属性传递给 GuessInputViewController\n    77  \
    \          vc.delegate = self\n    78        }\n    79    }\n    代码清单 12-9. prepareForSegue\
    \ 方法\n```\n\n当用户点击“猜随机数”按钮时，Segue 会被触发，同时 `prepareForSegue` 方法会被调用。首先，检查这个 Segue\
    \ 是否是 `MyGuessSegue`。然后，用 `GuessInputViewController` 填充 `vc` 变量。第 76 行和第 77 行将\
    \ `previousGuess` 数值和代理传递给 `GuessInputViewController`。\n\n13. 如果你还没有将 `GuessDelegate`\
    \ 代理添加到 `ViewController` 类中，现在请添加，如代码清单 12-10 所示。\n\n```\n    11 class ViewController:\
    \ UIViewController, GuessDelegate {\n    12     var previousGuess = \"\"\n   \
    \ 13     var randomNumber = 0\n    代码清单 12-10. 带有 GuessDelegate 声明的 ViewController\
    \ 类\n```\n\n14. 最后，我们需要为两个视图添加约束。选中每个视图，点击“解决自动布局问题”按钮，为每个视图添加缺失的约束，如图 12-13 所示。\n\
    \n![A341013_4_En_12_Fig13_HTML.jpg](img/A341013_4_En_12_Fig13_HTML.jpg)\n**图 12-13.**\
    \ 为两个视图添加缺失的约束\n\n## 工作原理\n\n以下是代码的工作原理：\n\n*   当用户点击“猜随机数”链接时，会调用 `prepareForSegue`。参见代码清单\
    \ 12-9 中的第 73 行。\n*   因为 `ViewController` 遵循 `GuessDelegate` 协议（参见代码清单 12-10 中的第\
    \ 11 行），你可以将 `self` 作为代理传递给 `GuessInputViewController`。\n*   随后会显示 `GuessInputViewController`\
    \ 场景。\n*   当用户猜一个数字并点击“保存猜测”时，会调用 `saveGuess` 方法（参见代码清单 12-8 中的第 38 行）。\n*   由于你将\
    \ `ViewController` 作为代理传递，它可以通过 `userDidFinish` 方法将 `guess` 传回 `ViewController.swift`\
    \ 文件（参见代码清单 12-8 中的第 45 行）。\n*   现在你可以判断用户是否猜对了答案，并将 `GuessInputViewController`\
    \ 视图从堆栈中弹出（参见代码清单 12-5 中的第 62 行）。\n\n## 总结\n\n本章介绍了为什么 Swift 不使用多继承，以及协议和代理的工作原理。当你想到代理时，可以将其视为辅助类。当你的类遵循某个协议时，代理的函数会协助你的类工作。\n\
    \n你应该熟悉以下术语：\n\n*   多继承\n*   协议\n*   代理\n\n## 练习\n\n*   将计算机猜的随机数范围从 0–100 改为\
    \ 0–50。\n*   在主场景中，显示用户猜测随机数所尝试的次数。\n*   在主场景中，显示用户已经玩了多少局游戏。\n\n# 13. 初识 Xcode\
    \ 调试器\n\n苹果开发者网站和 Mac App Store 不仅免费提供 Xcode，而且它还是一款出色的工具。除了能用它来创建下一款优秀的 Mac、iPhone、iPad、Apple\
    \ TV 和 Apple Watch 应用外，Xcode 还内置了调试器。\n\n调试器到底是什么？我们首先需要明确一点：程序会严格按照编写的方式执行，但有时我们编写的内容并非程序真正意图要做的事情。这可能导致程序崩溃，或者无法实现预期功能。无论哪种情况，当程序无法按计划运行时，我们就说程序有\
    \ bug。而审查代码并修复这些问题的过程，就叫做调试。\n\n关于“bug”这个术语的真正起源仍存争议，但有一个 1947 年记录详实的案例涉及已故的海军少将格蕾丝·霍珀，她当时是一名海军预备役军官和程序员。霍珀和她的团队当时正尝试解决哈佛\
    \ Mark II 计算机上的一个问题。一名团队成员在电路中发现了一只飞蛾，导致了其中一个继电器的问题。后来霍珀被引述说：“从那时起，只要计算机出了任何问题，我们都说它里面有\
    \ bug。”¹\n\n无论起源如何，这个术语就这样被沿用下来，世界各地的程序员都在使用调试工具（例如内置于 Xcode 的调试器）来帮助定位程序中的 bug。但真正的调试者是人；调试工具仅仅是帮助程序员定位问题的辅助手段。无论名称听起来如何，没有任何调试器能自主修复问题。\n\
    \n本章将重点介绍 Xcode 调试器的一些重要功能，并解释如何使用它们。学完本章后，你应该对 Xcode 调试器以及一般的调试过程有足够的理解，从而能够查找并修复大多数编程问题。\n\
    \n## 调试入门\n\n如果你曾经慢速播放电影，只为了捕捉到在正常速度播放时无法看到的细节，那么你就已经使用过类似调试的工具了。逐帧播放电影以揭示你寻找的细节，这种思路与调试程序时的思路类似。对于程序而言，有时有必要放慢速度来观察发生了什么。调试器允许你通过两个主要功能来实现这一点：设置断点以及逐行执行程序——稍后会详细介绍这两个功能。我们先来看看如何进入调试器以及它的界面。\n\
    \n首先，你需要加载一个应用程序。本章示例使用了第 8 章的 `BookStore` 项目，因此请打开 Xcode 并加载 `BookStore` 项目。\n\
    \n其次，确保为运行方案选择了“调试”构建配置，如图 13-1 所示。要编辑当前方案，请从主菜单选择“产品”➤“方案”➤“编辑方案”。“调试”是默认选择，因此你可能无需更改。这一步很重要，因为如果配置设置为“发布”，调试将完全无法工作。\n\
    \n![A341013_4_En_13_Fig1_HTML.jpg](img/A341013_4_En_13_Fig1_HTML.jpg)\n**图 13-1.**\
    \ 选择调试配置\n\n虽然本书不深入讨论 Xcode 方案，但你需要知道的是，默认情况下 Xcode 会为你创建的任何 macOS、iOS、watchOS\
    \ 或 tvOS 项目提供“发布”和“调试”两种构建配置。就本章而言，主要区别在于，“发布”配置不会添加任何调试应用程序所必需的程序信息，而“调试”配置则会添加。\n"
- fmt: "# Setting Breakpoints\n\nTo see what’s going on in a program, you need to\
    \ make the program pause at certain points that you as a programmer are interested\
    \ in. A breakpoint allows you to do this. In Figure [13-2](#A341013_4_En_13_Chapter.html#Fig2),\
    \ there is a breakpoint on line 24 of the program. To set this, simply place the\
    \ mouse cursor over the line number (not the program text, but the number 24 to\
    \ the left of the program text) and click once. You will see a small blue arrow\
    \ behind the line number. This lets you know that a breakpoint is set.\n\nIf line\
    \ numbers are not being displayed, simply choose Xcode ➤ Preferences from the\
    \ main menu, click the Text Editing tab, and select the Line Numbers check box.\n\
    \n![A341013_4_En_13_Fig2_HTML.jpg](A341013_4_En_13_Fig2_HTML.jpg)\n\nFigure 13-2.\
    \ Your first breakpoint\n\nThe breakpoint can be removed by dragging the breakpoint\
    \ to the left or right of the line number column and then dropping it. You can\
    \ also right-click (or Control-click) the breakpoint, and you will be given the\
    \ option to delete or disable a breakpoint. Figure [13-3](#A341013_4_En_13_Chapter.html#Fig3)\
    \ shows the right-click menu for a breakpoint. Disabling a breakpoint is convenient\
    \ if you think you might need it again in the future.\n\n![A341013_4_En_13_Fig3_HTML.jpg](A341013_4_En_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3. Right-clicking a breakpoint\n\nSetting and deleting breakpoints\
    \ are pretty straightforward tasks.\n\n# Using the Breakpoint Navigator\n\nWith\
    \ small projects, knowing the locations of all the breakpoints isn’t necessarily\
    \ difficult. However, once a project gets larger than, say, your small `BookStore`\
    \ application, managing all the breakpoints could be a little more difficult.\
    \ Fortunately, Xcode provides a simple method to list all the breakpoints in an\
    \ application; it’s called the Breakpoint Navigator. Just click the Breakpoint\
    \ Navigator icon in the navigation selector bar, as shown in Figure [13-4](#A341013_4_En_13_Chapter.html#Fig4).\n\
    \n![A341013_4_En_13_Fig4_HTML.jpg](A341013_4_En_13_Fig4_HTML.jpg)\n\nFigure 13-4.\
    \ Accessing the Breakpoint Navigator in Xcode\n\nOnce you’ve clicked the icon,\
    \ the navigator will list all the breakpoints currently defined in the application\
    \ grouped by source file. You can use the disclosure arrows to show or hide breakpoints.\
    \ From here, clicking a breakpoint will take you to the source file with the breakpoint.\
    \ You can also easily delete and disable breakpoints from here.\n\nTo disable/enable\
    \ a breakpoint in the Breakpoint Navigator, click the blue breakpoint icon in\
    \ the list (or wherever it appears). Don’t click the line; it has to be the little\
    \ blue icon, as shown in Figure [13-5](#A341013_4_En_13_Chapter.html#Fig5).\n\n\
    ![A341013_4_En_13_Fig5_HTML.jpg](A341013_4_En_13_Fig5_HTML.jpg)\n\nFigure 13-5.\
    \ Using the Breakpoint Navigator to enable/disable a breakpoint\n\nIt is sometimes\
    \ handy to disable a breakpoint instead of deleting it, especially if you plan\
    \ to put the breakpoint back in the same place again. The debugger will not stop\
    \ on these faded breakpoints, but they remain in place so they can be conveniently\
    \ enabled and act as a marker to an important area in the code.\n\nIt’s also possible\
    \ to delete breakpoints from the Breakpoint Navigator. Simply select one or more\
    \ breakpoints and press the Delete key. Make sure you select the correct breakpoints\
    \ to delete since there is no undo feature.\n\nIt’s also possible to select the\
    \ file associated with the breakpoints. In this case, if you delete the file listed\
    \ in the Breakpoint Navigator and press Delete, all breakpoints in that file will\
    \ be deleted.\n\nNote that breakpoints are categorized by the file that they appear\
    \ in. In Figure [13-5](#A341013_4_En_13_Chapter.html#Fig5), the files are `DetailViewController.swift`\
    \ and `MasterViewController.swift`, with the breakpoints listed below those file\
    \ names. Figure [13-6](#A341013_4_En_13_Chapter.html#Fig6) shows an example of\
    \ what a file looks like with more than a single breakpoint.\n\n![A341013_4_En_13_Fig6_HTML.jpg](A341013_4_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6. A file with several breakpoints\n\n# Debugging Basics\n\nSet a\
    \ breakpoint on the statement shown in Figure [13-2](#A341013_4_En_13_Chapter.html#Fig2).\
    \ Next, as shown in Figure [13-7](#A341013_4_En_13_Chapter.html#Fig7), click the\
    \ “Run” button to compile the project and start running it in the Xcode debugger.\n\
    \n![A341013_4_En_13_Fig7_HTML.jpg](A341013_4_En_13_Fig7_HTML.jpg)\n\nFigure 13-7.\
    \ The Build and Run and Stop buttons in the Xcode toolbar\n\nOnce the project\
    \ builds, the debugger will start. The screen will show the debugging windows,\
    \ and the program will stop execution at the line with the breakpoint, as shown\
    \ in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8).\n\n![A341013_4_En_13_Fig8_HTML.jpg](A341013_4_En_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8. The Debugger view with execution stopped on line 24\n\nThe Debugger\
    \ view adds some additional windows. The following are the different parts of\
    \ the Debugger view shown in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8):\n\
    \n*   **Debugger controls** (circled in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8)):\
    \ The debugging controls can pause, continue, step over, step into, and step out\
    \ of statements in the program. The stepping controls are used most often. The\
    \ first button on the left is used to show or hide the debugger view. In Figure\
    \ [13-8](#A341013_4_En_13_Chapter.html#Fig8), the debugger view is shown. Figure\
    \ [13-9](#A341013_4_En_13_Chapter.html#Fig9) labels the different pieces of the\
    \ debugger view.\n\n    ![A341013_4_En_13_Fig9_HTML.jpg](A341013_4_En_13_Fig9_HTML.jpg)\n\
    \n    Figure 13-9. The debugger locations\n\n*   **Variables**: The Variables\
    \ view displays the variables currently in scope. Clicking the little triangle\
    \ just to the left of a variable name will expand it.\n*   **Console**: The output\
    \ window will show useful information in the event of a crash or exception. Also,\
    \ any `NSLog` or `print` output goes here.\n*   **Debug navigator**: The stack\
    \ trace shows the call stack as well as all the threads currently active in the\
    \ program. The stack is a hierarchical view of what methods are being called.\
    \ For example, `UIApplicationMain` calls the `UIViewController` class. These method\
    \ calls “stack” up until they finally return."
