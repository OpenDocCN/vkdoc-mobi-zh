    \ encoding:String.Encoding.utf8.rawValue)! as String // get keyboard input\n \
    \  19         input = input.replacingOccurrences(of: \"\\n\", with: \"\", options:\
    \ NSString.CompareOptions.literal, range: nil) // strip off the \\n\n   20   \
    \      if let userGuess = Int(input) {\n   21             if userGuess == randomNumber\
    \ {\n   22                 continueGuessing = false\n   23                 print(\"\
    Correct number!\")\n   24             }\n   25             //nested if statement\n\
    \   26             else if userGuess > randomNumber {\n   27                 //\
    \ user guessed too high\n   28                 print(\"Your guess is too high!\"\
