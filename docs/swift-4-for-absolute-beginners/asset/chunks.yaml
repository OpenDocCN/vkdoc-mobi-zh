    ## App Summary\n\nCompile and run the app. You should set breakpoints at the `delegate`\
    \ functions to watch the program flow. It is a great app to see how delegates\
    \ can be used to pass information from one view to another.\n\nAdditionally, you\
    \ can add functionality to the app to make the information persistent by using\
    \ Core Data or `UserDefaults`.\n\n## Exercises\n\n- Add more books to the bookstore\
    \ using the original program as a guide.\n- Enhance the `Book` class so it can\
    \ store another attribute—a price or ISBN, for example.\n- Add persistence to\
    \ the app by using Core Data or `UserDefaults`.\n\n# 15. Apple Watch and WatchKit\n\
    \nIn September 2014, Apple announced the Apple Watch, which it considers to be\
    \ the next chapter in Apple’s history. This watch not only handles phone calls\
    \ and text messages, but it also assesses the wearer’s health by tracking heart\
    \ rate and exercise. At the same time, Apple announced WatchKit, a framework designed\
    \ for developing apps for the Apple Watch. WatchKit will be very familiar to developers\
    \ already familiar with UIKit.\n\nInitially, the Apple Watch had some serious\
    \ limitations with development. The watch acted as an additional screen for an\
    \ iPhone app. This required the watch to be close to the phone to function and\
    \ also caused apps to run slowly. In June 2015, Apple announced watchOS 2.0. This\
    \ new update included many new features, but the biggest one for developers was\
    \ the ability to create apps that had code that ran on the Apple Watch instead\
    \ of on the phone. Developers were able to create stand-alone apps that performed\
    \ much better and were more responsive. Now, Apple has released watchOS 4.0 with\
    \ even more developer improvements.\n\n## Considerations When Creating a watchOS\
    \ App\n\nOne of the great things about developing for watchOS is that all of the\
    \ development is done in Swift or Objective-C, just like with other iOS devices.\
    \ The Apple Watch does have some different things that you need to consider before\
    \ you jump into development.\n\n- The Apple Watch screen is very small. You are\
    \ limited to 38mm or 42mm, depending on the size of the watch. This means you\
    \ will not have a lot of space for unnecessary UI elements. Your interface will\
    \ need to be compact and well organized. Also, due to the two sizes being close\
    \ in size, you have to create one interface and have it look good on either size.\n\
    - Sharing data between the phone and the watch requires some planning. With watchOS\
    \ 3.0 and now 4.0, Apple has made it even easier to share data. Primarily, Apple\
    \ has enhanced the `WCSession` class. The use of this class is beyond the scope\
    \ of this book.\n- WatchKit for watchOS 4.0 provides many different ways to interact\
    \ with users not only through apps, but also through glances, actionable notifications,\
    \ and complications. Well-written apps can take advantage of multiple interactions\
    \ where it makes sense. These interactions are beyond the scope of this book."
