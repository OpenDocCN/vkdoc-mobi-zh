- fmt: '# Data Types


    Now that we’ve discussed how computers store data, we will cover an important
    concept called data types. Humans can generally just look at data and the context
    in which it is being used to determine what type of data it is and how it will
    be used. Computers need to be told how to do this. So, the programmer needs to
    tell the computer the type of data it is being given. Here’s an example: `2 +
    2 = 4`.


    The computer needs to know you want to add two numbers together. In this example,
    they are integers. You might first believe that adding these numbers is obvious
    to even the most casual observer, let alone a sophisticated computer. However,
    it is common for users of iOS apps to store data as a series of characters, not
    a calculation. For example, a text message might read “Everyone knows that `2
    + 2 = 4`.”


    In this case, the example is a series of characters called a string. A data type
    is simply the declaration to your program that defines the data you want to store.
    A variable is used to store your data and is declared with an associated data
    type. All data is stored in a variable, and the variable has to have a variable
    type. For example, in Swift, the following are variable declarations with their
    associated data types:


    ```

    var x: Int = 10

    var y: Int = 2

    var z: Int = 0

    var submarineName: String = "USS Nevada SSBN-733"

    ```


    Data types cannot be mixed with one another. You cannot do the following:


    ```

    z = x + submarineName

    ```


    Mixing data types will cause either compiler warnings or compiler errors, and
    your app will not run.


    Table 3-5 gives examples of the basic data types in Swift.


    Table 3-5. Swift Data Types


    | Type | Examples |

    | --- | --- |

    | `Int` | 1, 5, 10, 100 |

    | `Float` or `Double` | 1.0, 2.222, 3.14159 |

    | `Bool` | `true`, `false` |

    | `String` | `"Star Wars," "Star Trek"` |

    | `ClassName` | `UIView`, `UILabel`, and so on |


    ## Declaring Constants and Variables


    Swift constants and variables must be declared before they are used. You declare
    constants with the `let` keyword and variables with the `var` keyword. Constants
    never change after they have been initialized, but variables can be changed as
    many times as needed.


    There are two ways to declare constant and variable types: explicitly and implicitly.


    Here is the syntax for declaring a variable’s type explicitly:


    ```

    var name: type = value

    var firstNumber: Int = 5

    ```


    However, declaring the type is often unnecessary. Declaring the type implicitly
    shortens the code and makes it easier to type and ultimately maintain.


    Here is the syntax for declaring a variable’s type implicitly:


    ```

    var name = value

    var firstNumber = 5

    ```


    You can use implicit most of the time because Swift is smart enough to figure
    out what the variable is by what you assign to it.


    If a variable isn’t going to change, you should declare it as a constant. Constants
    never change. Constants start with the keyword `let`, as shown here:


    ```

    let secondNumber = 10

    ```


    To best understand how variables and constants are declared, here are two examples:


    ```

    let maximumNumberOfStudents = 30

    var currentNumberOfStudents = 5

    ```


    This code can be read as follows: “Declare a new constant called `maximumNumberOfStudents`,
    and give it a value of 30. Then, declare a new variable called `currentNumberOfStudents`,
    and give it an initial value of 5.”


    In this example, the maximum number of students is declared as a constant because
    the maximum value never changes. The current number of students is declared as
    a variable because this value must be incremented or decremented after the student
    enrollment changes.


    Most data you will use in your programs can be classified into four different
    kinds — Booleans, numbers, strings, and objects. We will discuss how to work with
    numbers and object data types in the remainder of this chapter. In Chapter 4,
    we will talk more about Boolean data types when you learn how to write apps with
    decision making.


    > **Note:** Localizing your app is the process of writing your app so users can
    buy and use it in their native language. This process is too advanced for this
    book, but it is a simple one to complete when you plan from the beginning. Localizing
    your app greatly expands the total number of potential customers and revenue for
    your app without your having to rewrite it for each language. Be sure to localize
    your app. It is not hard to do and can easily double or triple the number of people
    who buy it. For more information on localizing your app, visit Apple’s “Build
    Apps for the World” site: [`https://developer.apple.com/internationalization/`](https://developer.apple.com/internationalization/).


    ## Optionals


    Swift introduces an important concept called optionals that developers need to
    understand. Even for experienced Objective-C iOS developers, this concept is new.
    Optionals are not a hard topic to understand, but they take some time to get used
    to.


    Use optionals when a value may be absent. An optional says the following:


    * A variable may or may not have a value assigned to it.


    There are times when a constant or variable might not have a value. Listing 3-1
    shows an example of the integer initializer called `Int()`, which converts a `String`
    value to an `Int`.


    ```

    1 let myString = "42"

    2 let someInteger = Int(myString)

    3 // someInteger is inferred to be of type "Int?", or "optional Int"

    Listing 3-1.

    Converting a string to an integer

    ```


    The constant `someInteger` is assigned the integer value `42`. `someInteger` is
    also assigned the type of `Int?`. The question mark indicates that it is an optional
    type, meaning that the variable or constant’s value may be absent. See Listing
    3-2.


    ```

    1 let myString = "Hello World"

    2 let someInteger = Int(myString)

    3 // someInteger''s value is now absent

    Listing 3-2.

    Unable to convert a string to an integer

    ```


    Line 2 in Listing 3-2 has a problem. It is not possible to convert “Hello World”
    from a `String` to an `Int`. So, the value of `someInteger` is said to be absent
    or `nil` because on line 2, `someInteger` is inferred to be an optional `Int`.


    > **Note:** Objective-C programmers may have used `nil` to return an object from
    a method, with `nil` meaning “the absence of a valid object.” This works for objects
    but not well for structures, basic C types, or enumeration values. Objective-C
    methods typically return a special value, like `NSNotFound`, indicating the absence
    of a valid object. This assumes that the method’s caller knows the special value
    to test against. Optionals indicate the absence of a value for any type at all,
    without using special constants.


    The `Integer Int()` initializer might fail to return a value, so the method returns
    an optional `Int`, rather than an `Int`. Again, the question mark indicates that
    the value it contains is optional, meaning that it might contain some `Int` value,
    or it may contain no value at all. The value is either some `Int` or is nothing
    at all.


    Swift’s `nil` is not the same as `nil` in Objective-C. With Objective-C, `nil`
    is a pointer to a nonexistent object. In Swift, `nil` is not a pointer; it is
    the absence of a value. Optionals of any type can be set to `nil`, not just object
    types.


    In Chapter 4, you will learn how to “unwrap” optionals and check for the presence
    of a valid object.'
