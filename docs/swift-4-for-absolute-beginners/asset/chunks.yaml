- fmt: "### Pseudocode\n\nPseudocode refers to writing code that is a high-level description\
    \ of an algorithm you are trying to solve. Pseudocode does not contain the necessary\
    \ programming syntax for coding; however, it does express the algorithm that is\
    \ necessary to solve the problem at hand.\n\nPseudocode can be written by hand\
    \ on paper (or a whiteboard) or typed on a computer.\n\nUsing pseudocode, you\
    \ can apply what you know about Boolean data types, truth tables, and comparison\
    \ operators. Refer to Listing [4-1](#A341013_4_En_4_Chapter.html#Par46) for some\
    \ pseudocode examples.\n\n> **Note**  \n> Pseudocode is for expressing and teaching\
    \ coding ideas. Pseudocode will not execute!\n\n```\nx = 5\ny = 6\nisComplete\
    \ = TRUE\nif x < y\n{\n// in this example, x is less than 6\ndo stuff\n}\nelse\n\
    {\ndo other stuff\n}\nif isComplete == TRUE\n{\n// in this example, isComplete\
    \ is equal to TRUE\ndo stuff\n}\nelse\n{\ndo other stuff\n}\n// another way to\
    \ check isComplete == TRUE\nif isComplete\n{\n// in this example, isComplete is\
    \ TRUE\ndo stuff\n}\n// two ways to check if a value is false\nif isComplete ==\
    \ FALSE\n{\ndo stuff\n}\nelse\n{\n// in this example, isComplete is TRUE so the\
    \ else block will be executed\ndo other stuff\n}\n// another way to check isComplete\
    \ == FALSE\nif !isComplete\n{\ndo stuff\n}\nelse\n{\n// in this example,  isComplete\
    \ is TRUE so the else block will be executed\ndo other stuff\n}\nListing 4-1.\n\
    Pseudocode Examples Using Conditional Operators in if-then-else Code\n```\n\n\
    Note that `!` switches the value of the Boolean it's applied to, so using `!`\
    \ makes a `TRUE` value into a `FALSE` and makes a `FALSE` value into a `TRUE`.\
    \ This is the logical NOT operator in Swift.\n\nOften, it is necessary to combine\
    \ your comparison tests. A compound relationship test is one or more simple relationship\
    \ tests joined by either `&&` or `||` (two pipe characters).\n\n`&&` and `||`\
    \ are the logical `AND` and logical `OR`, respectively in Swift. The pseudocode\
    \ in Listing [4-2](#A341013_4_En_4_Chapter.html#Par50) illustrates logical `AND`\
    \ and logical `OR` operators.\n\n```\nx = 5\ny = 6\nisComplete = TRUE\n// using\
    \ the logical AND\nif x < y && isComplete == TRUE\n{\n// in this example, x is\
    \ less than 6 and isComplete == TRUE\ndo stuff\n}\nif x < y || isComplete == FALSE\n\
    {\n// in this example, x is less than 6.\n// Only one operand has to be TRUE for\
    \ an OR to result in a TRUE.\n// See Table 4–2 A OR Truth Table\ndo stuff\n}\n\
    // another way to test for TRUE\nif x < y && isComplete\n{\n// in this example,\
    \ x is less than 6 and isComplete == TRUE\ndo stuff\n}\n// another way to test\
    \ for FALSE\nif x < y && !isComplete\n{\ndo stuff\n}\nelse\n{\n// isComplete ==\
    \ TRUE\ndo other stuff\n}\nListing 4-2.\nUsing && and || Logical Operators Pseudocode\n\
    ```\n\n### Optionals and Forced Unwrapping\n\nChapter [3](#A341013_4_En_3_Chapter.html)\
    \ introduced optionals. Optionals are variables that might not contain a value.\
    \ Since optionals may not contain a value, you need to check for that before you\
    \ access them.\n\nYou start by using an `if` statement to determine whether the\
    \ optional contains a value by comparing the optional against `nil`. If the optional\
    \ has a value, it is considered to be \"not equal to\" `nil`, as shown in Listing\
    \ [4-3](#A341013_4_En_4_Chapter.html#Par54).\n\nLine 4 in Listing [4-3](#A341013_4_En_4_Chapter.html#Par54)\
    \ checks to see whether the optional variable is not equal to `nil`. In this example,\
    \ the `someInteger` value is absent, and it is equal to `nil`, so line 8 code\
    \ is executed.\n\n```\n1 var myString = \"Hello world\"\n2 let someInteger = Int(myString)\n\
    3 // someInteger's value is now absent\n4 if someInteger != nil {\n5     print(\"\
    someInteger contains an integer value.\")\n6 }\n7 else {\n8     print(\"someInteger\
    \ doesn't contain an integer value.\")\n9 }\nListing 4-3.\nChecking Whether an\
    \ Optional Has a Value\n```\n\nNow that you have added a check to make sure your\
    \ optional does or doesn't contain a value, you can access its value by adding\
    \ an exclamation mark (`!`) to the end of the optional's name. The `!` means you\
    \ have checked to ensure the optional variable has a value and use it. This is\
    \ called forced unwrapping of the optional's value. See Listing [4-4](#A341013_4_En_4_Chapter.html#Par56).\n\
    \n```\n1 var myString = \"42\"\n2 let someInteger = Int(myString)\n3 // someInteger\
    \ contains a value\n4 if someInteger != nil {\n5     print(\"someInteger contains\
    \ a value. Here it is: \\(someInteger!)\")\n6 }\n7 else {\n8     print(\"someInteger\
    \ doesn't contain an integer value.\")\n9 }\nListing 4-4.\nForced Unwrapping\n\
    ```\n\n> **Note**  \n> Displaying the contents of a variable in a `print` function\
    \ is done with `\\()`.\n\n#### Optional Binding\n\nYou can find out whether an\
    \ optional contains a value and, if so, assign a temporary constant or variable\
    \ to that value in a single action. (See Listing [4-5](#A341013_4_En_4_Chapter.html#Par59).)\
    \ This is called optional binding. Optional binding can be used with `if` and\
    \ `while` statements to determine whether an optional has a value and, if so,\
    \ extract the value to a constant or variable.\n\n```\n1 let someOptional: String?\
    \ = \"hello world\"\n2 if let constantName = someOptional {\n3     print(\"constantName\
    \ contains a value, Here it is: \\(constantName)\")\n4 }\nListing 4-5.\nOptional\
    \ Binding Syntax to a Constant\n```\n\nIf you want to assign the optional to a\
    \ variable so you can manipulate that variable, you can assign the optional to\
    \ a `var`, as shown in Listing [4-6](#A341013_4_En_4_Chapter.html#Par61).\n\n\
    ```\n1 let someOptional: String? = \"hello world\"\n2 if var variableName = someOptional\
    \ {\n3     variableName += \"!\"                // appends a \"!\" to the end\
    \ of the String\n4     print(\"variableName contains a value, Here it is: \\(variableName)\"\
    )\n5 }\nListing 4-6.\nOptional Binding Syntax to a Variable\n```\n\nNotice in\
    \ Listings [4-5](#A341013_4_En_4_Chapter.html#Par59) and [4-6](#A341013_4_En_4_Chapter.html#Par61)\
    \ that you didn't need to force unwrap anything using the `!`. If the conversion\
    \ was successful, the variable or constant was initialized with the value contained\
    \ within the optional, so the `!` was not necessary.\n\nIt may be confusing that\
    \ the logical NOT and forced unwrapping operators both use the `!` character.\
    \ Just remember that the logical NOT operator is located before a variable or\
    \ constant, and the forced unwrapping operator is located after an optional constant\
    \ or variable.\n\n#### Implicitly Unwrapped Optionals\n\nThere are instances in\
    \ your code when you know that an optional will always have a value. In these\
    \ instances, it can be useful to remove the need to check and unwrap an optional\
    \ every time it needs to be accessed. These kinds of optionals are called implicitly\
    \ unwrapped optionals.\n\nBecause of the program's structure, you know that the\
    \ optional has a value, so you can give permission for the optional to be safely\
    \ unwrapped whenever it needs to be accessed. The `!` is not needed every time\
    \ you use it; instead, you place an `!` after the optional's type when you declare\
    \ it. Listing [4-7](#A341013_4_En_4_Chapter.html#Par66) shows the comparison between\
    \ an optional `String` and an implicitly unwrapped optional `String`.\n\n```\n\
    1 var optionalString: String? = \"My optional string.\"\n2 var forcedUnWrappedString:\
    \ String = optionalString! // requires an !\n\n4 var nextOptionalString: String!\
    \ = \"An implicitly unwrapped optional.\"\n5 var implicitUnwrappedString: String\
    \ = nextOptionalString // no need for an !\nListing 4-7.\nComparison of an Optional\
    \ String and an Implicitly Unwrapped Optional String\n```"
  raw: '### Pseudocode


    Pseudocode refers to writing code that is a high-level description of an algorithm
    you are trying to solve. Pseudocode does not contain the necessary programming
    syntax for coding; however, it does express the algorithm that is necessary to
    solve the problem at hand.


    Pseudocode can be written by hand on paper (or a whiteboard) or typed on a computer.


    Using pseudocode, you can apply what you know about Boolean data types, truth
    tables, and comparison operators. Refer to Listing [4-1](#A341013_4_En_4_Chapter.html#Par46)
    for some pseudocode examples.


    Note


    Pseudocode is for expressing and teaching coding ideas. Pseudocode will not execute!


    ```

    x = 5

    y = 6

    isComplete = TRUE

    if x < y

    {

    // in this example, x is less than 6

    do stuff

    }

    else

    {

    do other stuff

    }

    if isComplete == TRUE

    {

    // in this example, isComplete is equal to TRUE

    do stuff

    }

    else

    {

    do other stuff

    }

    // another way to check isComplete == TRUE

    if isComplete

    {

    // in this example, isComplete is TRUE

    do stuff

    }

    // two ways to check if a value is false

    if isComplete == FALSE

    {

    do stuff

    }

    else

    {

    // in this example, isComplete is TRUE so the else block will be executed

    do other stuff

    }

    // another way to check isComplete == FALSE

    if !isComplete

    {

    do stuff

    }

    else

    {

    // in this example,  isComplete is TRUE so the else block will be executed

    do other stuff

    }

    Listing 4-1.

    Pseudocode Examples Using Conditional Operators in if-then-else Code

    ```


    Note that `!` switches the value of the Boolean it’s applied to, so using `!`
    makes a `TRUE` value into a `FALSE` and makes a `FALSE` value into a `TRUE`. This
    is the logical NOT operator in Swift.


    Often, it is necessary to combine your comparison tests. A compound relationship
    test is one or more simple relationship tests joined by either `&&` or `||` (two
    pipe characters).


    `&&` and `||` are the logical `AND` and logical `OR`, respectively in Swift. The
    pseudocode in Listing [4-2](#A341013_4_En_4_Chapter.html#Par50) illustrates logical
    `AND` and logical `OR` operators.


    ```

    x = 5

    y = 6

    isComplete = TRUE

    // using the logical AND

    if x < y && isComplete == TRUE

    {

    // in this example, x is less than 6 and isComplete == TRUE

    do stuff

    }

    if x < y || isComplete == FALSE

    {

    // in this example, x is less than 6.

    // Only one operand has to be TRUE for an OR to result in a TRUE.

    // See Table 4–2 A OR Truth Table

    do stuff

    }

    // another way to test for TRUE

    if x < y && isComplete

    {

    // in this example, x is less than 6 and isComplete == TRUE

    do stuff

    }

    // another way to test for FALSE

    if x < y && !isComplete

    {

    do stuff

    }

    else

    {

    // isComplete == TRUE

    do other stuff

    }

    Listing 4-2.

    Using && and || Logical Operators Pseudocode

    ```


    ### Optionals and Forced Unwrapping


    Chapter [3](#A341013_4_En_3_Chapter.html) introduced optionals . Optionals are
    variables that might not contain a value. Since optionals may not contain a value,
    you need to check for that before you access them.


    You start by using an `if` statement to determine whether the optional contains
    a value by comparing the optional against `nil`. If the optional has a value,
    it is considered to be “not equal to” `nil`, as shown in Listing [4-3](#A341013_4_En_4_Chapter.html#Par54).


    Line 4 in Listing [4-3](#A341013_4_En_4_Chapter.html#Par54) checks to see whether
    the optional variable is not equal to `nil`. In this example, the `someInteger`
    value is absent, and it is equal to `nil`, so line 8 code is executed.


    ```

    1 var myString = "Hello world"

    2 let someInteger = Int(myString)

    3 // someInteger''s value is now absent

    4 if someInteger != nil {

    5     print("someInteger contains an integer value.")

    6 }

    7 else {

    8     print("someInteger doesn''t contain an integer value.")

    9 }

    Listing 4-3.

    Checking Whether an Optional Has a Value

    ```


    Now that you have added a check to make sure your optional does or doesn’t contain
    a value, you can access its value by adding an exclamation mark (`!`) to the end
    of the optional’s name. The `!` means you have checked to ensure the optional
    variable has a value and use it. This is called forced unwrapping of the optional’s
    value. See Listing [4-4](#A341013_4_En_4_Chapter.html#Par56).


    ```

    1 var myString = "42"

    2 let someInteger = Int(myString)

    3 // someInteger contains a value

    4 if someInteger != nil {

    5     print("someInteger contains a value. Here it is: \(someInteger!)")

    6 }

    7 else {

    8     print("someInteger doesn''t contain an integer value.")

    9 }

    Listing 4-4.

    Forced Unwrapping

    ```


    Note


    Displaying the contents of a variable in a `print` function is done with `\()`.


    #### Optional Binding


    You can find out whether an optional contains a value and, if so, assign a temporary
    constant or variable to that value in a single action. (See Listing [4-5](#A341013_4_En_4_Chapter.html#Par59).)
    This is called optional binding. Optional binding can be used with `if` and `while`
    statements to determine whether an optional has a value and, if so, extract the
    value to a constant or variable.


    ```

    1 let someOptional: String? = "hello world"

    2 if let constantName = someOptional {

    3     print("constantName contains a value, Here it is: \(constantName)")

    4 }

    Listing 4-5.

    Optional Binding Syntax to a Constant

    ```


    If you want to assign the optional to a variable so you can manipulate that variable,
    you can assign the optional to a `var`, as shown in Listing [4-6](#A341013_4_En_4_Chapter.html#Par61).


    ```

    1 let someOptional: String? = "hello world"

    2 if var variableName = someOptional {

    3     variableName += "!"                // appends a "!" to the end of the String

    4     print("variableName contains a value, Here it is: \(variableName)")

    5 }

    Listing 4-6.

    Optional Binding Syntax to a Variable

    ```


    Notice in Listings [4-5](#A341013_4_En_4_Chapter.html#Par59) and [4-6](#A341013_4_En_4_Chapter.html#Par61)
    that you didn’t need to force unwrap anything using the `!`. If the conversion
    was successful, the variable or constant was initialized with the value contained
    within the optional, so the `!` was not necessary.


    It may be confusing that the logical NOT and forced unwrapping operators both
    use the ! character. Just remember that the logical NOT operator is located before
    a variable or constant, and the forced unwrapping operator is located after an
    optional constant or variable.


    #### Implicitly Unwrapped Optionals


    There are instances in your code when you know that an optional will always have
    a value. In these instances, it can be useful to remove the need to check and
    unwrap an optional every time it needs to be accessed. These kinds of optionals
    are called implicitly unwrapped optionals.


    Because of the program’s structure, you know that the optional has a value, so
    you can give permission for the optional to be safely unwrapped whenever it needs
    to be accessed. The `!` is not needed every time you use it; instead, you place
    an `!` after the optional’s type when you declare it. Listing [4-7](#A341013_4_En_4_Chapter.html#Par66)
    shows the comparison between an optional `String` and an implicitly unwrapped
    optional `String`.


    ```

    1 var optionalString: String? = "My optional string."

    2 var forcedUnWrappedString: String = optionalString! // requires an !


    4 var nextOptionalString: String! = "An implicitly unwrapped optional."

    5 var implicitUnwrappedString: String = nextOptionalString // no need for an !

    Listing 4-7.

    Comparison of an Optional String and an Implicitly Unwrapped Optional String

    ```'
  trans: "\n### 伪代码\n\n伪代码是指以高级方式描述待求解算法的代码。伪代码不包含编程所需的语法规范，但它能表达解决当前问题所必需的算法逻辑。\n\
    \n你可以在纸上（或白板上）手写伪代码，也可以在电脑上录入。\n\n使用伪代码时，你可以运用关于布尔数据类型、真值表以及比较运算符的知识。请参考清单 4-1\
    \ 中的伪代码示例。\n\n> **注意**  \n> 伪代码用于表述和传授编程思路。伪代码无法实际运行！\n\n```\nx = 5\ny = 6\nisComplete\
    \ = TRUE\nif x < y\n{\n// 在此示例中，x 小于 6\n执行相应操作\n}\nelse\n{\n执行其他操作\n}\nif isComplete\
    \ == TRUE\n{\n// 在此示例中，isComplete 等于 TRUE\n执行相应操作\n}\nelse\n{\n执行其他操作\n}\n// 另一种判断\
    \ isComplete == TRUE 的方式\nif isComplete\n{\n// 在此示例中，isComplete 为 TRUE\n执行相应操作\n\
    }\n// 两种判断值为 false 的方式\nif isComplete == FALSE\n{\n执行相应操作\n}\nelse\n{\n// 在此示例中，isComplete\
    \ 为 TRUE，因此将执行 else 代码块\n执行其他操作\n}\n// 另一种判断 isComplete == FALSE 的方式\nif !isComplete\n\
    {\n执行相应操作\n}\nelse\n{\n// 在此示例中，isComplete 为 TRUE，因此将执行 else 代码块\n执行其他操作\n}\n\
    清单 4-1.\n在 if-then-else 代码中使用条件运算符的伪代码示例\n```\n\n请注意，`!` 会反转其作用的布尔值，因此使用 `!` 会将\
    \ `TRUE` 变为 `FALSE`，将 `FALSE` 变为 `TRUE`。这是 Swift 中的逻辑非运算符。\n\n通常，我们需要组合使用比较测试。复合关系测试是指由\
    \ `&&` 或 `||`（两个管道符）连接的一个或多个简单关系测试。\n\n在 Swift 中，`&&` 和 `||` 分别代表逻辑与和逻辑或。清单 4-2\
    \ 中的伪代码演示了逻辑与和逻辑或运算符的使用。\n\n```\nx = 5\ny = 6\nisComplete = TRUE\n// 使用逻辑与\nif\
    \ x < y && isComplete == TRUE\n{\n// 在此示例中，x 小于 6 且 isComplete == TRUE\n执行相应操作\n\
    }\nif x < y || isComplete == FALSE\n{\n// 在此示例中，x 小于 6。\n// 对于逻辑或，只需一个操作数为 TRUE\
    \ 即可使结果为 TRUE。\n// 参见表 4–2 逻辑或真值表\n执行相应操作\n}\n// 另一种判断 TRUE 的方式\nif x < y && isComplete\n\
    {\n// 在此示例中，x 小于 6 且 isComplete == TRUE\n执行相应操作\n}\n// 另一种判断 FALSE 的方式\nif x <\
    \ y && !isComplete\n{\n执行相应操作\n}\nelse\n{\n// isComplete == TRUE\n执行其他操作\n}\n\
    清单 4-2.\n使用 && 和 || 逻辑运算符的伪代码\n```\n\n### 可选值与强制解包\n\n第 3 章介绍了可选值。可选值是指可能不包含值的变量。由于可选值可能不含值，因此在访问它们之前需要进行检查。\n\
    \n首先，通过 `if` 语句将可选值与 `nil` 进行比较，以判断该可选值是否包含值。如果可选值有值，则视为“不等于” `nil`，如清单 4-3 所示。\n\
    \n清单 4-3 中的第 4 行检查可选变量是否不等于 `nil`。在此示例中，`someInteger` 的值不存在，等于 `nil`，因此执行第 8 行的代码。\n\
    \n```\n1 var myString = \"Hello world\"\n2 let someInteger = Int(myString)\n3\
    \ // someInteger 的值现在不存在\n4 if someInteger != nil {\n5     print(\"someInteger\
    \ 包含一个整数值。\")\n6 }\n7 else {\n8     print(\"someInteger 不包含整数值。\")\n9 }\n清单 4-3.\n\
    检查可选值是否包含值\n```\n\n现在你已经添加了检查来确认可选值是否包含值，可以通过在可选值名称末尾添加感叹号（`!`）来访问其值。这里的 `!` 表示你已经检查过并确认可选变量有值，现在要使用它。这被称为强制解包可选值。参见清单\
    \ 4-4。\n\n```\n1 var myString = \"42\"\n2 let someInteger = Int(myString)\n3 //\
    \ someInteger 包含一个值\n4 if someInteger != nil {\n5     print(\"someInteger 包含一个值。这里是：\\\
    (someInteger!)\")\n6 }\n7 else {\n8     print(\"someInteger 不包含整数值。\")\n9 }\n\
    清单 4-4.\n强制解包\n```\n\n> **注意**  \n> 在 `print` 函数中显示变量的内容是通过 `\\()` 实现的。\n\n####\
    \ 可选绑定\n\n你可以通过一个操作同时判断可选值是否包含值，并在包含值时将该值赋给一个临时常量或变量。（参见清单 4-5。）这称为可选绑定。可选绑定可用于\
    \ `if` 和 `while` 语句中，以判断可选值是否有值，并在有值时将值提取到常量或变量中。\n\n```\n1 let someOptional:\
    \ String? = \"hello world\"\n2 if let constantName = someOptional {\n3     print(\"\
    constantName 包含一个值，这里是：\\(constantName)\")\n4 }\n清单 4-5.\n可选绑定语法（绑定到常量）\n```\n\
    \n如果希望将可选值赋值给一个变量以便操作该变量，你可以将可选值赋值给 `var`，如清单 4-6 所示。\n\n```\n1 let someOptional:\
    \ String? = \"hello world\"\n2 if var variableName = someOptional {\n3     variableName\
    \ += \"!\"                // 在字符串末尾追加 \"!\"\n4     print(\"variableName 包含一个值，这里是：\\\
    (variableName)\")\n5 }\n清单 4-6.\n可选绑定语法（绑定到变量）\n```\n\n请注意，在清单 4-5 和 4-6 中，你不需要使用\
    \ `!` 进行强制解包。如果转换成功，变量或常量会被初始化为可选值中包含的值，因此不需要 `!`。\n\n逻辑非运算符和强制解包运算符都使用 `!` 字符可能会造成混淆。请记住，逻辑非运算符位于变量或常量之前，而强制解包运算符位于可选常量或变量之后。\n\
    \n#### 隐式解包可选值\n\n在代码中，有些情况下你确切知道某个可选值总会包含值。在这种情况下，可以省去每次访问该可选值时都需要检查和解包的操作，这很有用。这类可选值被称为隐式解包可选值。\n\
    \n由于程序的结构，你知道该可选值有值，因此可以授权该可选值在需要被访问时能够安全地自动解包。你不需要在每次使用时都添加 `!`，而是在声明可选值时在其类型后面放置一个\
    \ `!`。清单 4-7 展示了一个可选 `String` 和一个隐式解包可选 `String` 的对比。\n\n```\n1 var optionalString:\
    \ String? = \"我的可选字符串。\"\n2 var forcedUnWrappedString: String = optionalString!\
    \ // 需要使用 !\n\n4 var nextOptionalString: String! = \"一个隐式解包的可选值。\"\n5 var implicitUnwrappedString:\
    \ String = nextOptionalString // 不需要使用 !\n清单 4-7.\n可选字符串与隐式解包可选字符串的对比\n```\n"
- fmt: '### Flowcharting


    After the design requirements discussed in previous chapters are finalized, you
    can create pseudocode sections of your app to solve complex development issues.
    Flowcharting is a common method of diagramming an algorithm. An algorithm is represented
    as different types of boxes connected by lines and arrows. Developers often use
    flowcharting to express code visually, as shown in Figure [4-1](#A341013_4_En_4_Chapter.html#Fig1).


    ![A341013_4_En_4_Fig1_HTML.gif](A341013_4_En_4_Fig1_HTML.gif)


    Figure 4-1. Sample flowchart showing common figures and their associated names


    Flowcharts should always have a start and a stop. Branches should never come to
    an end without a stop. This helps developers make sure all of the branches in
    their code are accounted for and that they cleanly stop execution.


    ### Designing and Flowcharting an Example App


    We have covered a lot of information about decision making and program flow. It’s
    time to do what programmers do best: write apps!


    The app you have been assigned to write generates a random number between 0 and
    100 and asks the user to guess the number. Users have to do this until the number
    is guessed. When users guess the correct answer, they will be asked if they want
    to play again.


    ### The App’s Design


    Using your design requirements, you can make a flowchart for your app. See Figure
    [4-2](#A341013_4_En_4_Chapter.html#Fig2).


    ![A341013_4_En_4_Fig2_HTML.jpg](A341013_4_En_4_Fig2_HTML.jpg)


    Figure 4-2. Flowchart for guessing a random number app


    Reviewing Figure [4-2](#A341013_4_En_4_Chapter.html#Fig2), you’ll notice that
    as you approach the end of a block of logic in your flowchart, there are arrows
    that go back to a previous section and repeat that section until some condition
    is met. This is called looping. It enables you to repeat sections of programming
    logic — without having to rewrite those sections of code over — until a condition
    is met.


    ### Using Loops to Repeat Program Statements


    A loop is a sequence of program statements that is specified once but can be repeated
    several times in succession. A loop can repeat a specified number of times (count-controlled)
    or until some condition (condition-controlled) occurs.


    In this section, you’ll learn about count-controlled loops and condition-controlled
    loops. You will also learn how to control your loops with Boolean logic.


    #### Count-Controlled Loops


    A count-controlled loop repeats a specified number of times. In Swift, this is
    a `for-in` loop. A `for-in` loop iterates over sequences or collections of items,
    such as ranges of numbers, items in an array, or characters in a string. See Listing
    [4-8](#A341013_4_En_4_Chapter.html#Par76).


    ```

    for i in 0..<10 {

    print("The index is: \(i)")

    }

    //....continue

    Listing 4-8. A Count-Controlled Loop

    ```


    The loop in Listing [4-8](#A341013_4_En_4_Chapter.html#Par76) will loop 10 times.
    The “half-open range operator” `..<` returns a sequence of values from the “lower
    bound” value 0 up to, but not including, the “upper bound” value 10, resulting
    in values of `i` between 0 and 9.


    Alternatively, Listing [4-9](#A341013_4_En_4_Chapter.html#Par79) prints the first
    10 entries in the 10 times table by using the “closed range operator” `...` that
    returns a sequence of values from the lower bound value 1 up to and including
    the upper bound value 10, resulting in values of `i` between 1 and 10.


    ```

    for i in 1...10 {

    print("\(i) times 10 is \(i * 10)")

    }

    //....continue

    Listing 4-9. A Count-Controller Loop Using the Closed-Range Operator

    ```


    #### Condition-Controlled Loops


    Swift has the ability to repeat a loop until some condition changes. You may want
    to repeat a section of your code until a false condition is reached with one of
    your variables. This type of loop is called a `while` loop. A `while` loop is
    a control flow statement that repeats based on a given Boolean condition. You
    can think of a `while` loop as a repeating `if` statement. See Listing [4-10](#A341013_4_En_4_Chapter.html#Par81).


    ```

    var isTrue = true

    while isTrue {

    // do something

    isTrue = false // a condition occurs that sometimes sets isTrue to FALSE

    }

    //....continue

    Listing 4-10. A Swift while Loop Repeating

    ```


    The `while` loop in Listing [4-10](#A341013_4_En_4_Chapter.html#Par81) first checks
    whether the variable `isTrue` is `true` — which it is — so the `{loop body}` is
    entered where the code is executed. Eventually, some condition is reached that
    causes `isTrue` to become `false`. After completing all the code in the loop body,
    the condition (`isTrue`) is checked once more, and the loop is repeated. This
    process is repeated until the variable `isTrue` is set to `false`.


    #### Infinite Loops


    An infinite loop repeats endlessly, either because of the loop not having a condition
    that causes termination or because of the loop having a terminating condition
    that can never be met.


    Generally, infinite loops can cause apps to become unresponsive. They are the
    result of a side effect of a bug in either the code or the logic.


    Listing [4-11](#A341013_4_En_4_Chapter.html#Par86) is an example of an infinite
    loop caused by a terminating condition that can never be met. The variable `x`
    will be checked with each iteration through the `while` loop but will never be
    equal to 5. The variable `x` will always be an even number because it was initialized
    to zero and incremented by two in the loop. This will cause the loop to repeat
    endlessly. See Listing [4-12](#A341013_4_En_4_Chapter.html#Par87).


    ```

    var x = 0

    while x != 5 {

    // do something

    x = x + 2

    }

    //....continue

    Listing 4-11. An Example of an Infinite Loop

    ```


    ```

    while true {

    // do something forever

    }

    //....continue

    Listing 4-12. An Example of an Infinite Loop Caused by a Terminating Condition
    That Can Never Be Met

    ```'
