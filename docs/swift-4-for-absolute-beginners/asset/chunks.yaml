    有助于组织代码的东西可以在第 47 行找到：`"// MARK: - Segues"`。`// MARK:` 被称为标记点。它是用于 Objective-C
    的 `#pragma mark` 的替代品。标记点有助于在跳转栏中分割代码，并使您能够快速跳转到由标记点指示的代码部分。当您在 `// MARK:` 后面输入内容时，Xcode
    会将该标记点放入跳转栏的下拉菜单中，如图 14-3 所示。如果您只输入 `// MARK: -`，Xcode 会在跳转栏的下拉菜单中添加一条行分隔线。Swift
    还支持 `// TODO:` 和 `// FIXME:` 标记点来注释您的代码，并将它们列在跳转栏中。


