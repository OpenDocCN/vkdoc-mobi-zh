  trans: "\n### 创建一个示例 Xcode 应用\n\n现在让我们创建一个 Xcode 应用程序，以便你能开始比较数值数据。\n\n1. 启动 Xcode，选择“文件”\
    \ ➤ “新建” ➤ “Playground” 来创建一个新的 playground。本章将使用 playground 以便更轻松地进行比较操作。\n2.\
    \ 如图 9-1 所示，选择“空白”。点击“下一步”。\n\n![A341013_4_En_9_Fig1_HTML.jpg](img/A341013_4_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1. 创建一个新的 playground\n\n3. 在下一页中，输入你的 playground 名称。这里我们使用了 `Comparison`\
    \ 作为名称，但你可以选择任何你喜欢的名称。注意：Xcode Playground 默认保存在用户主目录的 `Documents` 文件夹中。\n4. 新的\
    \ playground 创建后，你会看到标准的 Xcode 窗口。\n5. 在 playground 的默认代码之后，添加下面这一行代码：\n\n```\n\
    print(\"Hello World\")\n```\n\n这一行代码会创建一个内容为 `Hello World` 的新 `String`，并将其传递给用于调试的\
    \ `print` 函数。\n\nXcode 会自动运行你添加的新行，并在右侧显示结果，如图 9-2 所示。\n\n1. 转到以 `print` 开头的那一行的起始位置。这一行负责打印\
    \ `Hello World` 这个字符串。你将要通过在该行代码前放置两个正斜杠 (`//`) 来注释掉这一行代码。注释代码告诉 Xcode 在执行代码时忽略它。换句话说，被注释掉的代码不会运行。\n\
    2. 一旦你注释掉这行代码，该代码就不再运行，因此 Hello World 将不再显示在 playground 中，如图 9-3 所示。\n\n![A341013_4_En_9_Fig3_HTML.jpg](img/A341013_4_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3. 包含注释代码的 playground 输出\n\n3. 我们希望使用日志来输出比较的结果。添加一行代码，如下所示：\n\n```\nprint(\"\
    The result is \\(6 > 5 ? \"True\" : \"False\")\")\n```\n\n注意：上述代码 `(6>5 ? \"True\"\
    \ : \"False\")` 被称为三元运算。它本质上只是编写 `if/else` 语句的一种简化方式。\n\n4. 将这行代码放入你的代码中。这行代码告诉你的应用程序打印\
    \ `The result is`。然后，如果 6 大于 5，它会打印 `True`；如果 5 大于 6，则会打印 `False`。参见图 9-4。\n\n\
    ![A341013_4_En_9_Fig2_HTML.jpg](img/A341013_4_En_9_Fig2_HTML.jpg)\n\n图 9-2. Playground\
    \ 输出\n\n因为 6 大于 5，所以它将打印“The result is `True`”。\n\n![A341013_4_En_9_Fig4_HTML.jpg](img/A341013_4_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4. 三元运算输出\n\n你可以修改这一行代码，以测试本章已经讨论过的任何比较，或者你稍后将进行的任何示例。\n\n让我们尝试另一个示例。\n\n\
    ```\nvar i = 5\nvar y = 6\nprint(\"The result is \\(y > i ? \"True\" : \"False\"\
    )\")\n```\n\n在这个示例中，你创建了一个变量并将其值赋为 5。接着你创建了另一个变量并将值赋为 6。然后，你修改了打印示例，使其比较变量 `i`\
    \ 和 `y`，而不是使用具体的数字。\n\n注意：当你在实际的 Xcode 项目中使用此代码时，可能会收到编译器警告。编译器会告诉你，三元运算符的 false\
    \ 部分永远不会被执行。在你输入代码时，编译器就能查看这些值，并知道这个比较结果始终为 true。\n\n现在你将探索其他类型的比较，然后你将回到本节的应用中并测试其中的一些比较。\n\
    \n### 使用布尔表达式\n\n布尔表达式是所有比较中最简单的一种。布尔表达式用于确定一个值是 true 还是 false。示例如下：\n\n```\n\
    var j = 5\nif  j > 0 {\n    someCode()\n}\n```\n\n`if` 语句的计算结果始终为 `true`，因为变量\
    \ `j` 大于零。因此，程序将运行 `someCode()` 方法。\n\n注意：在 Swift 中，如果变量是可选的，因此不保证会被赋值，你应在变量声明后添加一个问号。例如，`var\
    \ j` 变为 `var j: Int?`。\n\n如果将 `j` 的值改为 0，则语句的计算结果将为 `false`，因为 `j` 现在是 0。\n\n\
    ```\nvar j = 0\nif j > 0 {\n    someCode()\n}\n```\n\n在布尔表达式前放置一个感叹号会将其值取反（`false`\
    \ 变成 `true`，`true` 变成 `false`）。\n\n```\nvar j = 0\nif !(j > 0) {\n    someCode()\n\
    }\n```\n\n第二行现在询问“如果不满足 `j>0`”，在这种情况下，结果是 `true`，因为 `j` 等于 0。这是一个使用整数充当布尔变量的示例。如前所述，Swift\
    \ 也有名为 `Bool` 的变量，它只有两个可能的值：`true` 或 `false`。\n\n注意：与许多其他编程语言一样，Swift 在为布尔变量赋值时也使用\
    \ `true` 或 `false`。\n\n让我们来看一个与书店相关的例子。假设你有一个常客俱乐部，所有会员在购买任何书籍时均可享受 15% 的折扣。这很容易检查。你只需在会员身份成立时将变量\
    \ `clubMember` 设置为 `true`，否则设置为 `false`。以下代码将仅对俱乐部会员应用折扣：\n\n```\nvar discountPercent\
    \ = 0\nvar clubMember = false\nif clubMember {\n    discountPercent = 15\n}\n\
    ```\n"
- fmt: '### Comparing Strings


    Strings are a difficult data type for most C languages. In ANSI C (or standard
    C), a string is just an array of characters. Objective-C took the development
    of the string even further and made it an object called `NSString`. Swift has
    taken the `String` class even further and made it easier to work with. Many more
    properties and methods are available to you when working with an object. Fortunately
    for you, `String` has many methods for comparing data, which makes your job much
    easier.


    Let’s look at an example. Here, you are comparing passwords to see whether you
    should allow a user to log in:


    ```

    var enteredPassword = "Duck"

    var myPassword = "duck"

    var continueLogin = false

    if enteredPassword == myPassword {

    continueLogin = true

    }

    ```


    The first line just declares a `String` and sets it value to `Duck`. The next
    line declares another `String` and sets its value to `duck`. In your actual code,
    you will need to get the `enteredPassword` string from the user.


    The next line is the part of the code that actually does the work. You simply
    ask the strings if they are equal to each other. The example code will always
    be `false` because of the capital `D` in the `enteredPassword` versus the lowercase
    `d` in the `myPassword`.


    There are many other different comparisons you might have to perform on strings.
    For example, you may want to check the length of a certain string. This is easy
    to do.


    ```

    var enteredPassword = "Duck"

    var myPassword = "duck"

    var continueLogin = false

    if enteredPassword.count > 5 {

    continueLogin = true

    }

    ```


    Note


    `count` is a property that can be used to count strings, arrays, and dictionaries.


    This code checks to see whether the entered password is longer than five characters.


    There will be other times when you will have to search within a string for some
    data. Fortunately, Swift makes this easy to do. `String` provides a function called
    `contains`, which allows you to search within a string for another string. The
    function `contains` takes only one argument, which is the string for which you
    are searching.


    ```

    var searchTitle: String

    var bookTitle: String

    searchTitle = "Sea"

    bookTitle = "2000 Leagues Under the Sea"

    if bookTitle.contains(searchTitle) {

    addToResults()

    }

    ```


    This code starts off similarly to other examples you have examined. We create
    two variables. This example then takes a search term and checks to see whether
    the book title has that same search term in it. If it does, it adds the book to
    the results. This can be adapted to allow users to search for specific terms in
    book titles, authors, or even descriptions.


    For a complete listing of the methods supported by `String`, see the Apple documentation
    at [`https://swift.org/documentation/#the-swift-programming-language`](https://swift.org/documentation/#the-swift-programming-language).


    ## Using the switch Statement


    Up to this point, you’ve seen several examples of comparing data by simply using
    the `if` statement.


    ```

    if someValue == SOME_CONSTANT {

    ...

    } else if someValue == SOME_OTHER_CONSTANT {

    ...

    } else if someValue == YET_SOME_OTHER_CONSTANT {

    ...

    }

    ```


    If you need to compare a variable to several constant values, you can use a different
    method that can simplify the comparison code: the `switch` statement.


    Note


    In Objective-C, you could only use values to compare in a `switch` statement.
    Swift allows developers more freedom in using the `switch` statement. With Swift,
    developers can now compare most objects including custom objects.


    The `switch` statement allows you to compare one or more values against another
    variable.


    ```

    var customerType = "Repeat"

    switch  customerType {     // The switch statement followed by a begin brace

    case "Repeat":       // Equivalent to if (customerType == "Repeat")

    ...               // Call functions and put any other statements here after the
    case.

    ...

    case "New":

    ...

    ...

    case "Seasonal":                   ...

    ...

    default:             // Default is required in Swift

    }  // End of the switch statement.

    ```


    The `switch` statement is powerful, and it simplifies and streamlines comparisons
    to several different values.


    In Swift, the `switch` statement is a powerful statement that can be used to simplify
    repeated `if`/`else` statements.


    ### Comparing Dates


    Dates are a fairly complicated variable type in any language, and unfortunately,
    depending on the type of application you are writing, they are common. Swift 4
    has its own native `Date` type. The Swift `Date` class has a lot of nice methods
    that make comparing dates easy. We will focus on the `compare` function. The `compare`
    function returns a `ComparisonResult`, which has three possible values: `orderedSame`,
    `orderedDescending`, and `orderedAscending`.


    ```

    // Today''s Date

    let today: Date = Date()

    // Sale Date = Tomorrow

    let timeToAdd: TimeInterval = 60*60*24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    var saleStarted = false

    let result: ComparisonResult  = today.compare(saleDate)

    switch result {

    case ComparisonResult.orderedAscending:

    // Sale Date is in the future

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // Sale Start Date is in the past so sale is on

    saleStarted = true

    default:

    // Sale Start Date is now

    saleStarted = true

    }

    ```


    This may seem like a lot of work just to compare some dates. Let’s walk through
    the code and see whether you can make sense of it.


    ```

    let today: Date = Date()

    let timeToAdd: TimeInterval = 60*60*24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    ```


    Here, you declare two different `Date` objects. The first one, named `today`,
    is initialized with the system date or your device date. Before creating the second
    date, you need to add some time to the first date. You do this by creating a `TimeInterval`.
    This is a number in seconds. To add a day, you add `60*60*24`. The second date,
    named `saleDate`, is initialized with a date some time in the future. You will
    use this date to see whether this sale has begun. We will not go into detail about
    the initialization of `Date` objects.


    The result of using the `compare` function of a `Date` object is a `ComparisonResult`.
    You have to declare a `ComparisonResult` to capture the output from the `compare`
    function.


    ```

    let result = today.compare(saleDate)

    ```


    This simple compares the two dates. It places the resulting `ComparisonResult`
    into the constant called `result`.


    ```

    switch result {

    case ComparisonResult.orderedAscending:

    // Sale Date is in the future

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // Sale Start Date is in the past so sale is on

    saleStarted = true

    default:

    // Sale Start Date is now

    saleStarted = true

    }

    ```


    Now you need to find out what value is in the variable `result`. To accomplish
    this, you perform a `switch` statement that compares the result to the three different
    options for `ComparisonResult`. The first line finds out whether the sale date
    is greater than today’s date. This means that the sale date is in the future,
    and thus the sale has not started. You then set the variable `saleStarted` to
    `false`. The next line finds out whether the sale date is less than today. If
    it is, the sale has started, and you set the `saleStarted` variable to `true`.
    The next line just says `default`. This captures all other options. You know,
    though, that the only other option is `orderedSame`. This means the two dates
    and times are the same, and thus the sale is just beginning.


    There are other methods that you can use to compare `Date` objects. Each of these
    methods will be more efficient at certain tasks. We have chosen the `compare`
    method because it will handle most of your basic date comparison needs.


    Note


    Remember that a `Date` holds both a date and a time. This can affect your comparisons
    with dates because it compares not only the date but also the time.'
