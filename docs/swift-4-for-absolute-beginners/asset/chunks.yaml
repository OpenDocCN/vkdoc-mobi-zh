    # 继承


    OOP 的另一个主要特性是继承。编程中的继承类似于遗传。你可能从母亲那里遗传了眼睛的颜色，或者从父亲那里遗传了头发的颜色，反之亦然。类可以以类似的方式从其父类继承属性和方法，但与遗传不同的是，你继承的不是这些属性的值。在
    OOP 中，父类被称为超类，子类被称为子类。


    注意


    在 Swift 中，除非特别声明，否则没有超类。在本章的示例中，我们使用了 `NSObject` 作为超类。


    例如，你可以创建一个印刷品类，然后使用子类来表示图书、杂志和报纸。印刷品可以有许多共同之处，因此你可以在印刷品超类中定义属性，而不必在每个单独的类中重复定义它们。这样做可以进一步减少你需要编写和调试的冗余代码。


    在图 5-16 中，你将看到 `Printed Material` 超类的属性布局，以及这些属性将如何影响 `Book`、`Magazine` 和 `Newspaper`
    这些子类。`Printed Material` 类的属性会被子类继承，因此无需在子类中显式定义它们。你会注意到 `Book` 类现在的属性显著减少了。通过使用超类，你将大幅减少程序中的冗余代码。


    ![A341013_4_En_5_Fig16_HTML.jpg](img/A341013_4_En_5_Fig16_HTML.jpg)


    图 5-16. 超类与子类的属性


    # 为什么要使用 OOP？


    在本章中，我们讨论了什么是 OOP，甚至讨论了如何创建类和对象。然而，讨论为什么要在开发中使用 OOP 原则也同样重要。


    如果你看看当今流行的编程语言，它们都在一定程度上使用了 OOP 原则。Swift、Objective-C、C++、Visual Basic、C# 和 Java
    都要求程序员理解类和对象，才能成功使用这些语言进行开发。要想成为当今世界的一名开发者，你需要理解 OOP。但为什么要使用它呢？


    ## OOP 无处不在


    如今你选择做的几乎所有开发工作，都需要理解面向对象的原则。在 macOS 和 iOS 中，你与之交互的一切几乎都是对象。例如，简单的窗口、按钮和文本框都是对象，并拥有属性和方法。如果你想成为一名成功的程序员，你需要理解
    OOP。


    ## 消除冗余代码


    通过使用对象，你可以减少需要重复输入的代码量。如果你编写了用于在客户结账时打印收据的代码，那么当你需要重新打印收据时，你会希望同样的代码也能用。如果你将打印收据的代码放在了
    `Sale` 类中，就不必再次重写这些代码了。这不仅节省了你的时间，而且常常有助于减少错误。如果你不使用 OOP，并且发票有改动（哪怕只是图形上的简单变化），你必须确保同时在桌面端和移动端应用中做出修改。如果你遗漏了其中一处，就可能导致两个界面的行为不一致。


    ## 易于调试


    通过将所有与图书相关的代码集中在一个类中，当图书出现问题时，你就知道该去哪里查找。对于一个小的应用程序来说，这可能听起来不是什么大事，但当你的应用程序达到数十万甚至数百万行代码时，这将为你节省大量时间。


    ## 易于替换


    如果你将所有代码都放在一个类中，那么随着应用程序的变化，你可以替换掉这些类，并赋予新类完全不同的功能。然而，修改后的类仍然可以以与当前类相同的方式与应用程序的其他部分进行交互。这类似于汽车零件。如果你想更换汽车上的消音器，你不需要买一辆新车。如果你与发票相关的代码分散在各处，那么修改一个类的相关项就会变得困难得多。


    # 高级主题


    我们在本章中讨论了 OOP 的基础知识，但还有一些其他主题对你的理解也很重要。


    ## 接口


    正如本章所讨论的，其他对象与类交互的方式是通过方法。在 Swift 中，你可以为你的方法设置访问级别。将方法声明为 `private` 会使其只能被从它派生出的对象访问。默认情况下，Swift
    方法是 internal（内部）的，可以被当前模块中的任何对象或方法访问。这通常被称为接口，因为它告诉其他对象如何与你的对象进行交互。在整个应用程序中实现标准接口，将使你的代码能够以类似的方式与不同的对象进行交互。这将显著减少你需要编写的特定于对象的代码量。


    ## 多态性


    多态性是指一个类的对象能够以另一个类的对象的形式出现并被使用的能力。这通常通过创建与另一个类相似的方法和属性来实现。你一直在使用的一个关于多态性的绝佳例子是书店。在书店中，你有三个相似的类：`Book`、`Magazine`
    和 `Newspaper`。如果你想对整个库存进行大促销，你可以遍历所有图书并降价，然后遍历所有杂志并降价，再遍历所有报纸并降价。这将会比实际需要做更多的工作。更好的做法是确保所有类都有一个降价方法。然后，只要这些对象是包含所需方法的某个类的子类，你就可以对所有对象调用该方法，而无需知道它们具体属于哪个类。这将节省大量时间和编码工作。


    在规划类时，要寻找共性以及可能适用于多种类的方法。长远来看，这将为你节省时间并加快应用程序的运行速度。


    ## 面向值编程


    Apple 最近为 iOS 开发者引入了一种新的范式。Apple 称之为面向值编程。Apple 现在建议开发者对于一些简单的数据，使用结构体而不是类。结构体与类类似，区别在于结构体是按值传递给方法的，并且结构体不能从任何超类继承。这意味着创建结构体比创建类有更少的开销。结构体的实例化和使用方式与类相同。图
    5-17 将本章中的顾客类展示为一个结构体。


    ![A341013_4_En_5_Fig17_HTML.jpg](img/A341013_4_En_5_Fig17_HTML.jpg)


    图 5-17. 顾客结构体


    目前，决定使用结构体还是类是相当主观的。通常，只有当结构体非常简单、没有太多属性和方法时，才应该使用结构体来代替类。

    '
- fmt: '## Summary


    You’ve finally reached the end of the chapter! Here is a summary of the things
    that were covered:


    - **Object-oriented programming (OOP)**: You learned about the importance of OOP
    and the reasons why all modern code should use this methodology.

    - **Objects**: You learned about OOP objects and how they correspond to real-world
    objects. You also learned about abstract objects that do not correspond to real-world
    objects.

    - **Classes**: You learned that a class determines the types of data (properties)
    and the methods that each object will have. Every object needs to have a class.
    It is the blueprint for the object.

    - **Creating a class**: You learned how to map out the properties and methods
    of your classes.

    - **Creating a class file**: You used Xcode to create a class file.

    - **Editing a file**: You edited the Swift file to add your properties and methods.


    ### Exercises


    - Try creating the class files for the rest of the classes you mapped out.

    - Map out an `Author` class. Choose the kind of information you would need to
    store about an author.


    **For the daring and advanced**:


    - Try creating a superclass called `PrintedMaterial`. Map out the properties that
    a class might have.

    - Create classes for the other types of printed materials a store might carry.


    # 6. Learning Swift and Xcode


    For the most part, all programming languages perform the typical tasks any computer
    needs to do — store information, compare information, make decisions about that
    information, and perform some action based on those decisions. The Swift language
    makes these tasks easier to understand and accomplish. The real trick with Swift
    (actually, the trick with most programming languages) is to understand the symbols
    and keywords used to accomplish those tasks. This chapter continues the examination
    of Swift and Xcode so you can become even more familiar with them.


    ## A Newcomer


    As you may know, Swift has not been around for long. Development of the Swift
    language began about four years ago by Chris Lattner, and on September 9, 2014,
    Swift 1.0 was officially released. Swift borrows many ideas from Objective-C,
    but it also incorporates many features used by modern programming languages. Swift
    was designed from the ground up to be accessible to the average programmer.


    Currently, there are two main types of programming languages. Compiled languages
    such as Objective-C and C++ are known for being rigid and requiring certain syntax.
    Compiled languages are also significantly faster in execution. Interpreted languages,
    such as Ruby, PHP, and Python are known for being easier to learn and code but
    slower in their execution. Swift is a language that bridges the gap between the
    two. Swift incorporates the flexibility that makes interpreted languages so popular
    with the performance required for demanding applications and games. In fact, Apple
    claims that Swift applications will perform faster than those written in Objective-C.
    In some of Apple’s tests, Swift performed almost four times faster than Python
    and 40 percent faster than Objective-C.


    ## Understanding the Language Symbols


    Understanding symbols is a basic part of any programming language. Symbols are
    punctuation used to portray specific meanings in source code. Understanding the
    symbols of a language is required to be able to use the language. Here are some
    of the symbols and language constructs used in Swift, most of which you’ve already
    encountered in one way or another:


    - `{`: This is the begin brace. It’s used to start what’s commonly referred to
    as a block of code. Blocks are used to define and surround a section of code and
    define its scope.

    - `}`: This is the end brace. It’s used to end a block of code. Wherever there
    is a begin brace (`{`), there must always be an accompanying end brace (`}`).

    - `[]`: These are the open and close brackets. They are used in the declaration
    and consumption of arrays.

    - `func methodName() -> String`: This is how a Swift function is defined. The
    word `methodName`, of course, can represent any name. The word `String` can also
    change. It represents what type of information the method returns. In this example,
    `String` indicates the method will return a string, or a group of characters (data
    types were introduced in Chapter [3](#A341013_4_En_3_Chapter.html) and will be
    covered in more depth in later chapters). This will be discussed in more detail
    later in the chapter.


    Figure [6-1](#A341013_4_En_6_Chapter.html#Fig1) shows an example of Swift code.


    ![A341013_4_En_6_Fig1_HTML.jpg](A341013_4_En_6_Fig1_HTML.jpg)


    **Figure 6-1.** Example of Swift code


    Line 1 represents a Swift function. The empty parentheses, `()`, indicate that
    this function does not receive any variables. The fact that the parentheses are
    not followed by `->` signifies that this function does not return any type of
    data and, if invoked, would not return a value to the caller.


    The end of line 1 and line 4 are the braces that define a block of code. This
    block is what defines the method. Every method has at least one block.


    Line 2 creates a constant named `hello`. As you learned in previous chapters,
    a constant is a value that cannot change or is constant. The value of the constant
    `hello` is assigned `"Hello World!"` Because you assign `hello` to a `String`
    value, `hello` becomes a `String` and can use any method related to `String`s
    (recall that you first saw strings in Chapter [3](#A341013_4_En_3_Chapter.html)).
    Line 3 could be rewritten as follows:


    ```

    let hello: String = "Hello World!"

    ```


    Line 3 is a call to the `print` function. You pass the method the object in order
    to print the `hello` `String` object.


    Although it does look a little cryptic to someone who is just learning Swift,
    the simple and terse syntax doesn’t take too much time to learn.'
