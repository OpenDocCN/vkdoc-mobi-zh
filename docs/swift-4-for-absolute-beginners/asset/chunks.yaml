    \ 12-1. 典型的 Swift 继承\n\nC++、Perl 和 Python 都具有称为多重继承的特性，它允许一个类从多个父类继承行为和特性，如图 [12-2](#A341013_4_En_12_Chapter.html#Fig2)\
    \ 所示。\n\n![A341013_4_En_12_Fig2_HTML.jpg](A341013_4_En_12_Fig2_HTML.jpg)\n\nFigure\
    \ 12-2. 多重继承\n\n多重继承可能会出现问题，因为它会导致歧义。因此，Swift 不实现多重继承，而是实现了称为协议（Protocol）的机制。\n\
    \n## Understanding Protocols\n\nApple 将协议定义为一组函数声明的列表，与类定义无关。协议类似于类，不同之处在于协议不提供任何需求的实现；它只描述实现应具有的外观。\n\
    \n类可以采用该协议来提供这些需求的实际实现。任何满足协议要求的类型都被称为符合该协议。\n\n## Protocol Syntax\n\n协议的定义方式与类类似，如清单\
    \ [12-1](#A341013_4_En_12_Chapter.html#Par8) 所示。\n\n```\nprotocol RandomNumberGenerator\
    \ {\n    var mustBeSettable: Int { get set }\n    var doesNotNeedToBeSettable:\
    \ Int { get }\n    func random() -> Double\n}\n```\n*Listing 12-1. 协议定义*\n\n如果某个类有父类，则需要在它采用的任何协议之前列出父类名称，后跟逗号，如清单\
    \ [12-2](#A341013_4_En_12_Chapter.html#Par10) 所示。\n\n```\nclass MyClass: MySuperclass,\
    \ RandomNumberGenerator, AnotherProtocol {\n    // 类定义写在这里\n}\n```\n*Listing 12-2.\
    \ 协议在父类之后列出*\n\n协议还指定每个属性必须具有 gettable（可获取）或 gettable 和 settable（可获取和可设置）的实现。gettable\
    \ 属性是只读的，而 gettable 和 settable 属性则不是（如前面的清单 [12-1](#A341013_4_En_12_Chapter.html#Par8)\
    \ 所示）。\n\n属性始终声明为变量属性，前缀为`var`。gettable 和 settable 属性在其类型声明后通过`{ get set }`表示，而\
    \ gettable 属性则通过`{ get }`表示。\n\n## Delegation\n\n委托是一种设计模式，它允许一个类或结构体将其部分职责转交（或委托）给另一种类型的实例。这种设计模式通过定义一个封装了委托职责的协议来实现。委托可用于响应特定操作或从外部源检索数据，而无需了解该外部源的底层类型。\n\
    \n清单 [12-3](#A341013_4_En_12_Chapter.html#Par15) 定义了两个用于随机数字猜测游戏的协议。\n\n```\n\
    protocol RandomNumberGame {\n    var machine: Machine { get }\n    func play()\n\
    }\n\nprotocol RandomNumberGameDelegate {\n    func gameDidStart(game: RandomNumberGame)\n\
    \    func game(game: RandomNumberGame, didStartNewTurnWithGuess randomGuess: Int)\n\
    \    func gameDidEnd(game: RandomNumberGame)\n}\n```\n*Listing 12-3. 协议定义*\n\n\
    `RandomNumberGame`协议可以被任何涉及随机数生成和猜测的游戏采用。`RandomNumberGameDelegate`协议可以被任何类型的类采用，以跟踪`RandomNumberGame`协议的进度。\n\
    \n## Protocol and Delegation Example\n\n本节将向你展示如何创建一个更复杂的随机数字猜测应用，以说明如何使用协议和委托。应用的主视图显示用户的猜测以及该猜测是高了、低了还是正确，如图\
