  trans: "\n### 实现类\n\n既然你已经了解了即将创建的对象，现在就需要创建你的第一个对象。为此，你将从一个新项目开始。\n\n1.  启动 Xcode。选择\
    \ 文件 ➤ 新建 ➤ 项目。\n2.  在顶部菜单中选择 iOS。在右侧，选择 主从应用。对于本章中你要做的事情，你可以选择任何一种应用类型（参见图 5-9）。点击\
    \ 下一步。\n\n![A341013_4_En_5_Fig9_HTML.jpg](img/A341013_4_En_5_Fig9_HTML.jpg)\n\n\
    图 5-9.\n\n创建新项目\n\n3.  为你的项目输入产品名称。我们将使用 `BookStore` 这个名称。你还必须输入公司名称和公司标识符。公司标识符通常是\
    \ `com.companyname`（例如`com.inno`）。保持此屏幕上的复选框为默认状态。你现在还不需要担心 Core Data；这将在第 11\
    \ 章讨论。同时，将当前语言选择保持为 Swift。点击 下一步 选择保存项目的位置，然后保存你的项目。\n4.  从屏幕左侧的项目导航器中选择 `BookStore`\
    \ 文件夹（参见图 5-10）。你的大部分代码将位于此处。\n\n![A341013_4_En_5_Fig10_HTML.jpg](img/A341013_4_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10.\n\n选择 BookStore 项目\n\n5.  选择 文件 ➤ 新建 ➤ 文件。\n6.  在弹出的窗口中，确保顶部已选中 iOS，然后点击底部的\
    \ Cocoa Touch 类（参见图 5-11）。然后点击 下一步。\n\n![A341013_4_En_5_Fig12_HTML.jpg](img/A341013_4_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12.\n\n创建文件\n\n![A341013_4_En_5_Fig11_HTML.jpg](img/A341013_4_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11.\n\n创建一个新的 Swift 类文件\n\n7.  现在你将有机会为你的类命名（参见图 5-12）。在本练习中，你将创建 `Customer`\
    \ 类。再次确保语言设置为 Swift。点击 下一步 并将文件保存在默认位置。  \n    **注意：** 为了便于使用和理解代码，请记住在 Swift\
    \ 中类名应始终以大写字母开头。对象名应始终以小写字母开头。例如，`Book` 是一个合适的类名，而 `book` 是基于 `Book` 类的对象的绝佳名称。对于两个单词的对象，例如书的作者，合适的名称是\
    \ `bookAuthor`。这种大小写形式称为小驼峰式。\n8.  现在查看你的主项目文件夹；你应该会看到一个名为 `Customer.swift` 的新文件。\
    \  \n    **注意：** 如果你在 Objective-C 中创建了一个类，则会生成 `Customer.h` 和 `Customer.m` 文件。`.h`\
    \ 文件是包含类信息的头文件。头文件列出了类中的所有属性和方法，但实际上并不包含它们的相关代码。`.m` 文件是实现文件，你在此编写方法的代码。在 Swift\
    \ 中，整个类包含在单个文件中。\n9.  现在应该已经选中了 `Customer.swift` 文件，你会看到如图 5-13 所示的窗口。请注意，它目前包含的信息不多。第一部分带有双斜杠（`//`）的是注释，不计入代码部分。注释允许你告诉可能阅读你代码的人，每段代码的目的是什么。文件的第二部分是你的新\
    \ Customer 类。新的类声明如下：\n\n```\n    class Customer: NSObject {\n    }\n```\n\n**注意：**\
    \  \n在 Swift 中，一个类不一定需要在其自己的文件中。可以在单个 Swift 文件中定义多个类，但当你的项目包含大量类时，这可能难以维护。为每个类设置单独的文件通常更清晰且更有条理。\n\
    \n![A341013_4_En_5_Fig13_HTML.jpg](img/A341013_4_En_5_Fig13_HTML.jpg)\n\n图 5-13.\n\
    \n你空的 Customer 类\n\n现在让我们将 UML 图中的属性转移到实际的类中。\n\n**提示：**  \n属性应始终以小写字母开头。属性名中不能有空格。\n\
    \n对于第一个属性 `First Name`，将这一行添加到你的文件中：\n\n```\nvar firstName = \"\"\n```\n\n这将在你的类中创建一个名为\
    \ `firstName` 的对象。请注意，你没有告诉 Swift `firstName` 是什么类型。在 Swift 中，你可以声明一个属性而不指定类型，属性可以根据我们最初赋予的值来分配类型。通过给属性一个初始值\
    \ `\"\"`，你告诉 Swift 编译器将 `firstName` 设为字符串类型。在 Swift 中，所有非可选属性都需要在声明时或在类的初始化器中有一个默认值。我们将在本书后面讨论可选类型。\n\
    \n**注意：**  \n在 Objective-C 中，所有属性都必须声明类型。例如，要创建相同的 `firstName` 属性，你将使用以下代码：\n\n\
    ```\nNSString *firstName;\n```\n\n这声明了一个名为 `firstName` 的 `NSString`。在 Swift 中，你可以只声明一个变量，并让系统确定其类型。\n\
    \n由于所有属性都将是 `var`，你只需对其余属性重复相同的过程。完成后，你的 Swift 文件应如图 5-14 所示。\n\n![A341013_4_En_5_Fig14_HTML.jpg](img/A341013_4_En_5_Fig14_HTML.jpg)\n\
    \n图 5-14.\n\n包含属性的 Customer 类接口\n\n现在类声明已经完成，你需要添加你的方法。方法应包含在与属性相同的类文件和位置中。你将添加一个新的方法，该方法返回一个数组。代码如下所示：\n\
    \n```\nfunc listPurchaseHistory() -> [String] {\nreturn [\"Purchase 1\", \"Purchase\
    \ 2\"]\n}\n```\n\n这段代码可能看起来有点令人困惑。空括号告诉编译器该方法没有参数传入。`->` 告诉系统你从方法中返回什么。`[String]`\
    \ 告诉你你正在返回一个字符串数组。在最终版本中，你实际上会想要返回 purchase（或你选择作为你 purchase 类的任何名称）对象，但你现在使用的是\
    \ `String`。这段代码现在还无法编译，因为你不返回数组，所以你添加了一个简单数组的返回。在 Swift 文件中创建类只需要做这些。图 5-15 显示了最终的\
    \ Swift 文件。\n\n![A341013_4_En_5_Fig15_HTML.jpg](img/A341013_4_En_5_Fig15_HTML.jpg)\n\
    \n图 5-15.\n\n完成的 Customer 类 Swift 文件\n"
- fmt: '# Inheritance


    Another major quality of OOP is inheritance. Inheritance in programming is similar
    to genetic inheritance. You might have inherited your eye color from your mother
    or hair color from your father, or vice versa. Classes can, in a similar way,
    inherit properties and methods from their parent classes, but unlike genetics,
    you do not inherit the values of those properties. In OOP, a parent class is called
    a superclass, and a child class is called a subclass.


    Note


    In Swift, there is no superclass unless specifically stated. In the example in
    this chapter, we used `NSObject` as the superclass.


    You could, for example, create a class of printed materials and use subclasses
    for books, magazines, and newspapers. Printed materials can have many things in
    common, so you could define properties in the superclass of printed materials
    and not have to redundantly define them in each individual class. By doing this,
    you further reduce the amount of redundant code that is necessary for you to write
    and debug.


    In Figure [5-16](#A341013_4_En_5_Chapter.html#Fig16), you will see a layout for
    the properties of a `Printed Material` superclass and how that will affect the
    subclasses of `Book`, `Magazine`, and `Newspaper`. The properties of the `Printed
    Material` class will be inherited by the subclasses, so there is no need to define
    them explicitly in the class. You will notice that the `Book` class now has significantly
    fewer properties. By using a superclass, you will significantly reduce the amount
    of redundant code in your programs.


    ![A341013_4_En_5_Fig16_HTML.jpg](A341013_4_En_5_Fig16_HTML.jpg)


    Figure 5-16. Properties of the super- and subclasses


    # Why Use OOP?


    Throughout this chapter, we have discussed what OOP is and have even discussed
    how to create classes and objects. However, it’s also important to discuss why
    you want to use OOP principles in your development.


    If you take a look at the popular programming languages of the day, all of them
    use the OOP principles to a certain extent. Swift, Objective-C, C++, Visual Basic,
    C#, and Java all require the programmer to understand classes and objects to successfully
    develop in those languages. In order to become a developer in today’s world, you
    need to understand OOP. But why use it?


    ## OOP Is Everywhere


    Just about any development you choose to do today will require you to understand
    object-oriented principles. On macOS and in iOS, everything you interact with
    will be an object. For example, simple windows, buttons, and text boxes are all
    objects and have properties and methods. If you want to be a successful programmer,
    you need to understand OOP.


    ## Eliminate Redundant Code


    By using objects, you can reduce the amount of code you have to retype. If you
    write code to print a receipt when a customer checks out, you will want that same
    code available when you need to reprint a receipt. If you placed your code to
    print the receipt in the `Sale` class, you will not have to rewrite this code
    again. This not only saves you time but often helps you eliminate mistakes. If
    you do not use OOP and there is a change to the invoice (even something as simple
    as a graphic change), you have to make sure you make the change in your desktop
    and mobile applications. If you miss one of them, you run the risk of having the
    two interfaces behave differently.


    ## Ease of Debugging


    By having all of the code relating to a book in one class, you know where to look
    when there is a problem with the book. This may not sound like such a big deal
    for a little application, but when your application gets to hundreds of thousands
    or even millions of lines of code, it will save you a lot of time.


    ## Ease of Replacement


    If you place all of your code in a class, then as things change in your application,
    you can change out classes and give your new class completely different functionality.
    However, the modified class can still interact with the rest of the application
    in the same way as your current class. This is similar to car parts. If you want
    to replace a muffler on a car, you do not need to get a new car. If you have code
    related to your invoice scattered all over the place, it makes it much more difficult
    to change items about a class.


    # Advanced Topics


    We have discussed the basics of OOP throughout this chapter, but there are some
    other topics that are important to your understanding.


    ## Interface


    As discussed in this chapter, the way the other objects interact with a class
    is with methods. In Swift, you can set access levels on your methods. Declaring
    a method `private` will make it accessible only to objects derived from it. By
    default, Swift methods are internal and can be accessed by any object or method
    in the current module. This is often called the interface because it tells other
    objects how they can interact with your objects. Implementing a standard interface
    throughout your application will allow your code to interact with different objects
    in similar ways. This will significantly reduce the amount of object-specific
    code you need to write.


    ## Polymorphism


    Polymorphism is the ability of an object of one class to appear and be used as
    an object of another class. This is usually done by creating methods and properties
    that are similar to those of another class. A great example of polymorphism that
    you have been using is the bookstore. In the bookstore, you have three similar
    classes: `Book`, `Magazine`, and `Newspaper`. If you wanted to have a big sale
    for your entire inventory, you could go through all of the books and mark them
    down. Then you could go through all of the magazines and mark them down and then
    go through all of the newspapers and mark them down. That would be more work than
    you would need to do. It would be better to make sure all of the classes have
    a markdown method. Then you could call that on all of the objects without needing
    to know which class they were as long as they were subclasses of a class that
    contained the methods needed. This would save a bunch of time and coding.


    As you are planning your classes, look for similarities and for methods that might
    apply to more than one type of class. This will save you time and speed up your
    application in the long run.


    ## Value Orientated Programming


    Apple has recently introduced a new paradigm for iOS developers. Apple calls it
    Value Orientated Programming. Apple is now recommending developers use Structs
    instead of classes for some simple pieces of data. A Struct is similar to a class
    except that a Struct is passed by value to a method and a Struct cannot inherit
    from any superclass. This means there is less overhead involved with creating
    a Struct than there is with a class. A Struct is instantiated and used the same
    way as a class. Figure [5-17](#A341013_4_En_5_Chapter.html#Fig17) shows the customer
    class from this chapter as a Struct.


    ![A341013_4_En_5_Fig17_HTML.jpg](A341013_4_En_5_Fig17_HTML.jpg)


    Figure 5-17. The Customer Struct


    The decision to use a Struct versus a class is fairly subjective right now. A
    Struct should generally only be used instead of a class when the Struct is pretty
    simple without many properties and methods.'
