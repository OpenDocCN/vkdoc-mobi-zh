- fmt: '# Changing the table row identifier


    You can now hook up the `WKInterfaceLabel` you created earlier. Under the Interface
    Controller Scene, control-drag from the book row to the label, as shown in Figure
    [15-17](#A341013_4_En_15_Chapter.html#Fig17).


    ![A341013_4_En_15_Fig17_HTML.jpg](A341013_4_En_15_Fig17_HTML.jpg)


    Figure 15-17. Control-dragging from the row to the label


    You will be prompted to select an outlet from the available outlets, as shown
    in Figure [15-18](#A341013_4_En_15_Chapter.html#Fig18). There is currently only
    one available outlet, so select `bookLabel`.


    ![A341013_4_En_15_Fig18_HTML.jpg](A341013_4_En_15_Fig18_HTML.jpg)


    Figure 15-18. Connecting the `bookLabel` outlet


    Your table and label are now all hooked up. Now you need some data to display.
    You are going to reuse some data you created in Chapter [8](#A341013_4_En_8_Chapter.html).
    Using the Finder on your Mac, drag the `Book.swift` and `BookStore.swift` files
    from the Chapter [8](#A341013_4_En_8_Chapter.html) folder into the `BookStore
    WatchKit Extension` folder in Xcode. Check the "Copy items if needed" check box
    to copy the files to the new project. Once you are done, you will have the `Book.swift`
    and `BookStore.swift` files in your target, as shown in Figure [15-19](#A341013_4_En_15_Chapter.html#Fig19).


    ![A341013_4_En_15_Fig19_HTML.jpg](A341013_4_En_15_Fig19_HTML.jpg)


    Figure 15-19. Adding in the data files


    You have the data and interface complete. You now need to hook them up so the
    interface knows about the data. You need to declare a new property that will hold
    the `BookStore` object. Under your declaration of the `mainTable` object in the
    `InterfaceController.swift` file, you need to add the following line:


    ```

    var myBookStore: BookStore = BookStore()

    ```


    This creates a property of type `BookStore` called `myBookStore` and initializes
    it to an instance of `BookStore`.


    We will use the `configureTable()` method to set up the table. Add the following
    code to the class, outside of any of the other methods:


    ```

    1     func configureTable() {

    2         mainTable.setNumberOfRows(myBookStore.bookList.count, withRowType: "myBookRow")

    3         for index in 0..<myBookStore.bookList.count {

    4             if let myRow = mainTable.rowController(at: index) as? BookRow {

    5                 myRow.bookLabel.setText(myBookStore.bookList[index].title)

    6             }

    7         }

    8     }

    ```


    Line 1 declares the new method. Line 2 sets the number of rows in the table to
    the number of books in the bookstore. You''ll use `myBookStore.bookList.count`
    to get that number. We also tell the table which row identifier to use with the
    table. Line 3 is a loop that assigns the `index` to 0 and goes until it gets assigned
    to the number of books: 1. The reason you subtract 1 from the number of books
    is because Swift (and most modern programming languages) starts its arrays with
    0. This means if you have an array with two items, the items will be in positions
    0 and 1. If you try to look at position 2, you will receive an error.


    Line 4 tries to create a new row for the table using the `index` variable you
    created in the previous line. Line 5 takes the row and assigns the `Book` title
    to `bookLabel`. Now we need to call `configureTable` when the view is being activated.
    Add the following line to the `willActivate` function:


    ```

    configureTable()

    ```


    After entering those lines, the `InterfaceController.swift` file will look like
    Figure [15-20](#A341013_4_En_15_Chapter.html#Fig20).


    ![A341013_4_En_15_Fig20_HTML.jpg](A341013_4_En_15_Fig20_HTML.jpg)


    Figure 15-20. `InterfaceController.swift` file


    You now have enough in place to run the app. From the target menu, select `BookStore
    WatchKitApp` and then select the size of the Apple Watch you would like the simulator
    to use, as shown in Figure [15-21](#A341013_4_En_15_Chapter.html#Fig21). If this
    is your first time launching the Watch Simulator, it may take some time and ask
    for permissions on the Phone Simulator before the app will run successfully.


    ![A341013_4_En_15_Fig21_HTML.jpg](A341013_4_En_15_Fig21_HTML.jpg)


    Figure 15-21. Selecting the WatchKit target


    Once the app is launched, you will see a watch screen with the two books in the
    `myBookStore` object. You can go back to the `BookStore.swift` file and add more
    books if you want to play around with scrolling. The app should look like Figure
    [15-22](#A341013_4_En_15_Chapter.html#Fig22).


    ![A341013_4_En_15_Fig22_HTML.jpg](A341013_4_En_15_Fig22_HTML.jpg)


    Figure 15-22. First WatchKit app launch'
