- fmt: "# Summary\n\nCongratulations, you have finished the first chapter of this\
    \ book. It is important that you have an understanding of the following terms\
    \ because they will be reinforced throughout this book:\n\n- Computer program\n\
    - Algorithm\n- Design requirements\n- User interface\n- Bug\n- Quality assurance\
    \ (QA)\n- Debugging\n- Object-oriented programming (OOP)\n- Object\n- Property\n\
    - Method\n- State of an object\n- Integrated development environment (IDE)\n\n\
    ## What’s Next\n\nThe remaining chapters provide the information you need to learn\
    \ Swift and write iOS applications. Terms and concepts are introduced and reinforced\
    \ over and over so you will begin to get more comfortable with them. Keep going\
    \ and be patient with yourself.\n\n## Exercises\n\n- Answer the following questions:\n\
    \  - Why is it so important to spend time on your user requirements?\n  - What\
    \ is the difference between design requirements and an algorithm?\n  - What is\
    \ the difference between a method and a property?\n  - What is a bug?\n  - What\
    \ is state?\n- Write an algorithm for how a soda machine works from the time a\
    \ coin is inserted until a soda is dispensed. Assume the price of a soda is 80\
    \ cents.\n- Write the design requirements for an app that will run the soda machine.\n\
    \n# 2. Programming Basics\n\nThis chapter focuses on the building blocks that\
    \ are necessary to become a great Swift programmer. This chapter covers how to\
    \ use the playground user interface, how to write your first Swift program, and\
    \ how to use the Xcode Integrated Development Environment (IDE).\n\n> Note: We\
    \ will introduce you to using playgrounds, which will enable you to program right\
    \ away without worrying about all of the complexities of Xcode projects. We use\
    \ this approach to help you learn the concepts quickly, without discouragement,\
    \ and to give you a great foundation to build upon.\n\n## Touring Xcode\n\nPlaygrounds\
    \ in Xcode make writing Swift code incredibly simple and fun. Type a line of code,\
    \ and the result appears immediately. If your code runs over a period of time,\
    \ perhaps in a loop or branch, you can watch its progress in the timeline area.\
    \ When you’ve completed your code in the playground, it is easy to move your code\
    \ to a Swift iOS project. With Xcode playgrounds, you can do the following:\n\n\
    - Design or modify an algorithm, observing the results every step of the way\n\
    - Create new tests, verifying that they work before promoting them into your test\
    \ suite\n\nFirst, you’ll need to learn a little more about the Xcode user interface.\
    \ When you open an Xcode iOS project, you are presented with a screen that looks\
    \ like Figure 2-1.\n\nThe Xcode user interface is set up to help you efficiently\
    \ write your Swift applications. The user interface helps new programmers learn\
    \ the user interface for an iOS application. You will now explore the major sections\
    \ of Xcode’s IDE workspace and playgrounds.\n\n![Figure 2-1. Xcode Integrated\
    \ Developer Environment with a Swift project](A341013_4_En_2_Fig1_HTML.jpg)\n\n\
    ### Exploring the Workspace Window\n\nThe workspace window, shown in Figure 2-2,\
    \ enables you to open and close files, set your application preferences, develop\
    \ and edit an app, and view the text output and error console.\n\nThe workspace\
    \ window is your primary interface for creating and managing projects. The workspace\
    \ window automatically adapts itself to the task at hand, and you can further\
    \ configure the window to fit your work style. You can open as many workspace\
    \ windows as you need.\n\n![Figure 2-2. Xcode’s workspace window](A341013_4_En_2_Fig2_HTML.jpg)\n\
    \nThe workspace window has four main areas: Editor, Navigator, Debug, and Utility.\n\
    \nWhen you select a project file, its contents appear in the Editor area, where\
    \ Xcode opens the file in the appropriate editor.\n\nYou hide or show the other\
    \ three areas by using buttons in the view selector in the toolbar. These buttons\
    \ are in the top-right corner of the window.\n\n- ![Navigator button](A341013_4_En_2_Figa_HTML.jpg)\
    \ Clicking this button shows or hides the Navigator area. This is where you view\
    \ and maneuver through files and other facets of your project.\n- ![Debug button](A341013_4_En_2_Figb_HTML.jpg)\
    \ Clicking this button shows or hides the Debug area. This is where you control\
    \ program execution and debug code.\n- ![Utility button](A341013_4_En_2_Figc_HTML.jpg)\
    \ Clicking this button shows or hides the Utility area. You use the Utility area\
    \ for several purposes, most commonly to view and modify attributes of a file\
    \ and to add ready-made resources to your project.\n\n### Navigating Your Workspace\n\
    \nYou can access files, symbols, unit tests, diagnostics, and other features of\
    \ your project from the Navigator area. In the navigator selector bar, you choose\
    \ the navigator suited to your task. The content area of each navigator gives\
    \ you access to relevant portions of your project, and each navigator’s filter\
    \ bar allows you to restrict the content that is displayed.\n\nChoose from these\
    \ options in the navigator selector bar:\n\n- ![Project navigator icon](A341013_4_En_2_Figd_HTML.jpg)\
    \ **Project navigator.** Add, delete, group, and otherwise manage files in your\
    \ project; or choose a file to view or edit its contents in the editor area.\n\
    - ![Source Control navigator icon](A341013_4_En_2_Fige_HTML.jpg) **Source Control\
    \ navigator.** View the detailed history of changes you have made to your project\
    \ files when using a Version Control System (VCS) like Git or Subversion (SVN).\n\
    - ![Symbol navigator icon](A341013_4_En_2_Figf_HTML.jpg) **Symbol navigator.**\
    \ Browse the class hierarchy in your project.\n- ![Find navigator icon](A341013_4_En_2_Figg_HTML.jpg)\
    \ **Find navigator.** Use search options and filters to quickly find text within\
    \ your project.\n- ![Issue navigator icon](A341013_4_En_2_Figh_HTML.jpg) **Issue\
    \ navigator.** View issues such as diagnostics, warnings, and errors found when\
    \ opening, analyzing, and building your project.\n- ![Test navigator icon](A341013_4_En_2_Figi_HTML.jpg)\
    \ **Test navigator.** Create, manage, run, and review unit tests.\n- ![Debug navigator\
    \ icon](A341013_4_En_2_Figj_HTML.jpg) **Debug navigator.** Examine the running\
    \ threads and associated stack information at a specified point of time during\
    \ program execution.\n- ![Breakpoint navigator icon](A341013_4_En_2_Figk_HTML.jpg)\
    \ **Breakpoint navigator.** Fine-tune breakpoints by specifying characteristics\
    \ such as triggering conditions and see all your project’s breakpoints in one\
    \ place.\n- ![Report navigator icon](A341013_4_En_2_Figl_HTML.jpg) **Report navigator.**\
    \ View the history of your builds."
