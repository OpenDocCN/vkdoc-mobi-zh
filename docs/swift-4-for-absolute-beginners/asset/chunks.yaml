    \ file associated with the breakpoints. In this case, if you delete the file listed\
    \ in the Breakpoint Navigator and press Delete, all breakpoints in that file will\
    \ be deleted.\n\nNote that breakpoints are categorized by the file that they appear\
    \ in. In Figure [13-5](#A341013_4_En_13_Chapter.html#Fig5), the files are `DetailViewController.swift`\
    \ and `MasterViewController.swift`, with the breakpoints listed below those file\
    \ names. Figure [13-6](#A341013_4_En_13_Chapter.html#Fig6) shows an example of\
    \ what a file looks like with more than a single breakpoint.\n\n![A341013_4_En_13_Fig6_HTML.jpg](A341013_4_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6.\n\nA file with several breakpoints\n\n### Debugging Basics\n\n\
    Set a breakpoint on the statement shown in Figure [13-2](#A341013_4_En_13_Chapter.html#Fig2).\
    \ Next, as shown in Figure [13-7](#A341013_4_En_13_Chapter.html#Fig7), click the\
    \ “Run” button to compile the project and start running it in the Xcode debugger\
    \ .\n\n![A341013_4_En_13_Fig7_HTML.jpg](A341013_4_En_13_Fig7_HTML.jpg)\n\nFigure\
    \ 13-7.\n\nThe Build and Run and Stop buttons in the Xcode toolbar\n\nOnce the\
    \ project builds, the debugger will start. The screen will show the debugging\
    \ windows, and the program will stop execution at the line with the breakpoint\
    \ , as shown in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8) .\n\n![A341013_4_En_13_Fig8_HTML.jpg](A341013_4_En_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8.\n\nThe Debugger view with execution stopped on line 24\n\nThe Debugger\
    \ view adds some additional windows. The following are the different parts of\
    \ the Debugger view shown in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8):\n\
    \n*   Debugger controls (circled in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8)\
    \ ): The debugging controls can pause, continue, step over, step into, and step\
    \ out of statements in the program. The stepping controls are used most often.\
    \ The first button on the left is used to show or hide the debugger view. In Figure\
    \ [13-8](#A341013_4_En_13_Chapter.html#Fig8), the debugger view is shown. Figure\
    \ [13-9](#A341013_4_En_13_Chapter.html#Fig9) labels the different pieces of the\
    \ debugger view.\n\n    ![A341013_4_En_13_Fig9_HTML.jpg](A341013_4_En_13_Fig9_HTML.jpg)\n\
    \n    Figure 13-9.\n\n    The debugger locations\n*   Variables : The Variables\
    \ view displays the variables currently in scope. Clicking the little triangle\
    \ just to the left of a variable name will expand it.\n*   Console: The output\
    \ window will show useful information in the event of a crash or exception. Also,\
    \ any `NSLog` or `print` output goes here.\n*   Debug navigator: The stack trace\
    \ shows the call stack as well as all the threads currently active in the program.\
    \ The stack is a hierarchical view of what methods are being called. For example,\
    \ `UIApplicationMain` calls the `UIViewController` class. These method calls “stack”\
    \ up until they finally return."
  trans: "\n# 设置断点\n\n要查看程序中正在发生什么，你需要让程序在你作为程序员感兴趣的位置暂停。断点就可以实现这一点。在图 13-2 中，程序第\
    \ 24 行设置了一个断点。要设置此断点，只需将鼠标光标悬停在行号上（不是程序文本，而是程序文本左侧的数字 24）并单击一次。你会看到行号后面出现一个小蓝色箭头，这表示断点已设置。\n\
    \n如果未显示行号，只需从主菜单中选择 Xcode ➤ 偏好设置，点击文本编辑标签页，然后选中行号复选框。\n\n![A341013_4_En_13_Fig2_HTML.jpg](img/A341013_4_En_13_Fig2_HTML.jpg)\n\
    \n图 13-2. 你的第一个断点\n\n可以通过将断点拖到行号列的左侧或右侧然后释放来移除断点。你也可以右键单击（或按住 Control 键单击）断点，然后会看到删除或禁用断点的选项。图\
    \ 13-3 显示了断点的右键单击菜单。如果你认为将来可能还会用到该断点，禁用它会很方便。\n\n![A341013_4_En_13_Fig3_HTML.jpg](img/A341013_4_En_13_Fig3_HTML.jpg)\n\
    \n图 13-3. 右键单击一个断点\n\n设置和删除断点是非常直接的操作。\n\n# 使用断点导航器\n\n对于小型项目，了解所有断点的位置并非难事。然而，一旦项目变大，比如比你那个小的\
    \ `BookStore` 应用还要大，管理所有断点就会变得有些困难。幸运的是，Xcode 提供了一种简单的方法来列出应用中的所有断点，它就是断点导航器。只需点击导航选择栏中的断点导航器图标，如图\
    \ 13-4 所示。\n\n![A341013_4_En_13_Fig4_HTML.jpg](img/A341013_4_En_13_Fig4_HTML.jpg)\n\
    \n图 13-4. 在 Xcode 中访问断点导航器\n\n点击图标后，导航器将列出应用中当前定义的所有断点，并按源文件分组。你可以使用展开箭头来显示或隐藏断点。在此处，点击一个断点会跳转到包含该断点的源文件。你也可以从这里轻松删除或禁用断点。\n\
    \n要在断点导航器中启用/禁用断点，请点击列表中的蓝色断点图标（或它出现的任何位置）。不要点击行，必须是那个小的蓝色图标，如图 13-5 所示。\n\n![A341013_4_En_13_Fig5_HTML.jpg](img/A341013_4_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5. 使用断点导航器启用/禁用断点\n\n有时禁用断点比删除它更方便，尤其是当你计划稍后在同一位置再次设置该断点时。调试器不会在这些变灰的断点处停止，但它们会保留在原地，以便可以方便地启用，并作为代码中重要区域的标记。\n\
    \n也可以从断点导航器中删除断点。只需选择一个或多个断点，然后按 Delete 键。确保选择了要删除的正确断点，因为没有撤销功能。\n\n还可以选择与断点关联的文件。在这种情况下，如果你在断点导航器中选中列出的文件并按\
    \ Delete，则该文件中的所有断点都将被删除。\n\n请注意，断点按其所在的文件进行分类。在图 13-5 中，文件是 `DetailViewController.swift`\
    \ 和 `MasterViewController.swift`，断点列在这些文件名下方。图 13-6 展示了一个文件包含多个断点的示例。\n\n![A341013_4_En_13_Fig6_HTML.jpg](img/A341013_4_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6. 包含多个断点的文件\n\n# 调试基础\n\n在图 13-2 所示的语句上设置一个断点。接下来，如图 13-7 所示，点击“运行”按钮编译项目并在\
    \ Xcode 调试器中启动它。\n\n![A341013_4_En_13_Fig7_HTML.jpg](img/A341013_4_En_13_Fig7_HTML.jpg)\n\
    \n图 13-7. Xcode 工具栏中的构建并运行和停止按钮\n\n项目构建完成后，调试器将启动。屏幕会显示调试窗口，程序将在有断点的行停止执行，如图 13-8\
    \ 所示。\n\n![A341013_4_En_13_Fig8_HTML.jpg](img/A341013_4_En_13_Fig8_HTML.jpg)\n\
    \n图 13-8. 执行在第 24 行停止时的调试器视图\n\n调试器视图会添加一些额外的窗口。以下是图 13-8 中调试器视图的不同部分：\n\n*  \
    \ **调试器控制**（在图 13-8 中用圆圈标出）：调试控件可以暂停、继续、单步跳过、单步进入和单步跳出程序中的语句。单步控制是最常用的。左边的第一个按钮用于显示或隐藏调试器视图。在图\
    \ 13-8 中，调试器视图是显示的。图 13-9 标注了调试器视图的不同部分。\n\n    ![A341013_4_En_13_Fig9_HTML.jpg](img/A341013_4_En_13_Fig9_HTML.jpg)\n\
    \n    图 13-9. 调试器的各个位置\n\n*   **变量**：变量视图显示当前作用域内的变量。点击变量名左侧的小三角形可以展开它。\n*   **控制台**：输出窗口会在发生崩溃或异常时显示有用的信息。此外，所有\
    \ `NSLog` 或 `print` 的输出都会显示在这里。\n*   **调试导航器**：堆栈跟踪显示了调用栈以及程序中当前活动的所有线程。栈是所调用方法的层次结构视图。例如，`UIApplicationMain`\
    \ 调用了 `UIViewController` 类。这些方法调用会不断“堆积”，直到它们最终返回。\n"
- fmt: '### Working with the Debugger Controls


    As mentioned previously, once the debugger starts, the view changes. What appears
    are the debugging controls (circled in Figure [13-8](#A341013_4_En_13_Chapter.html#Fig8)).
    The controls are fairly straightforward and are explained in Table [13-1](#A341013_4_En_13_Chapter.html#Tab1).


    **Table 13-1.** Xcode Debugging Controls


    | Control | Description |

    | --- | --- |

    | ![A341013_4_En_13_Figa_HTML.jpg](A341013_4_En_13_Figa_HTML.jpg) | Clicking the
    Stop button will stop the execution of the program. If the iPhone or iPad emulator
    is running the application, it will also stop as if the user force quit the app.
    Clicking the Run button (looks like a Play button) starts debugging. If the application
    is currently in debug mode, clicking the Run button again will restart debugging
    the application from the beginning; it’s like stopping and then starting again.
    |

    | ![A341013_4_En_13_Figb_HTML.jpg](A341013_4_En_13_Figb_HTML.jpg) | Clicking this
    button causes the program to continue execution. The program will continue running
    until it ends, the Stop button is clicked, or the program runs into another breakpoint.
    |

    | ![A341013_4_En_13_Figc_HTML.jpg](A341013_4_En_13_Figc_HTML.jpg) | When the debugger
    stops on a breakpoint, clicking the Step Over button will cause the debugger to
    execute the current line of code and stop at the next line of code. |

    | ![A341013_4_En_13_Figd_HTML.jpg](A341013_4_En_13_Figd_HTML.jpg) | Clicking the
    Step In button will cause the debugger to go into the specified function or method.
    This is important if there is a need to follow code into specific methods or functions.
    Only methods for which the project has source code can be stepped into. |

    | ![A341013_4_En_13_Fige_HTML.jpg](A341013_4_En_13_Fige_HTML.jpg) | The Step Out
    button will cause the current method to finish executing, and the debugger will
    go back to the method that originally called it. |


    ## Using the Step Controls


    To practice using the step controls, let’s step into a method. As the name implies,
    the Step In button follows program execution into the method or function that
    is highlighted. Select the `DetailViewController.swift` file from the Project
    Manager. Then set a breakpoint on line 31, which is the call to `self.configureView()`.
    Click the Run button and select a book from the list. Your screen should look
    similar to Figure [13-10](#A341013_4_En_13_Chapter.html#Fig10).


    ![A341013_4_En_13_Fig10_HTML.jpg](A341013_4_En_13_Fig10_HTML.jpg)


    **Figure 13-10.** The debugger stopped on line 31


    Click the Step Into button, ![A341013_4_En_13_Figf_HTML.jpg](A341013_4_En_13_Figf_HTML.jpg),
    which will cause the debugger to go into the `configureView()` method of the `DetailViewController`
    object. The screen should look like Figure [13-11](#A341013_4_En_13_Chapter.html#Fig11).


    ![A341013_4_En_13_Fig11_HTML.jpg](A341013_4_En_13_Fig11_HTML.jpg)


    **Figure 13-11.** Stepping into the `configureView` method of the `DetailViewController`
    object


    The control Step Over, ![A341013_4_En_13_Figg_HTML.jpg](A341013_4_En_13_Figg_HTML.jpg),
    continues execution of the program but doesn’t go into a method. It simply executes
    the method and continues to the next line. Step Out, ![A341013_4_En_13_Figh_HTML.jpg](A341013_4_En_13_Figh_HTML.jpg),
    is a little like the opposite of Step In. If the Step Out button is clicked, the
    current method continues execution until it finishes. The debugger then returns
    to the line after Step In was clicked. For example, if the Step In button is clicked
    on the line shown in Figure [13-9](#A341013_4_En_13_Chapter.html#Fig9) and then
    the Step Out button is clicked, the debugger will return to the `viewDidLoad()`
    method of the `DetailViewController.swift` file after the statement shown in Figure
    [13-9](#A341013_4_En_13_Chapter.html#Fig9) (line 31 in the example), which was
    the line where Step In was clicked.


    ### Looking at the Thread Window and Call Stack


    As mentioned earlier, the Debug navigator displays the current thread. However,
    it also displays the call stack. If you look at the difference between Figures
    [13-9](#A341013_4_En_13_Chapter.html#Fig9) and [13-10](#A341013_4_En_13_Chapter.html#Fig10)
    as far as the thread window goes, you can see that Figure [13-10](#A341013_4_En_13_Chapter.html#Fig10)
    has the `configureView` method listed because `DetailViewController` calls the
    `configureView` method.


    Now, the call stack is not simply a list of functions that have been called; rather,
    it’s a list of functions that are currently being called. That’s an important
    distinction. Once the `configureView` method is finished and returns (line 26),
    `configureView` will no longer appear in the call stack. You can think of a call
    stack almost like a breadcrumb trail. The trail shows you how to get back to where
    you started.


    ### Debugging Variables


    When an app is debugging and paused, it is possible to view some information about
    a variable (other than its memory address) by hovering your mouse cursor over
    the variable in the code. When you get to where the value of a variable has been
    assigned in the local scope, you will most likely see the variable in the bottom
    Variables view. In Figure [13-12](#A341013_4_En_13_Chapter.html#Fig12), you can
    see the `newBook` variable, and it has a title of Swift for Absolute Beginners.
    You can also see that there is no author or description assigned. In debugging,
    when you are stopped on a line, it is before the line is executed. This means
    that even though you are paused on the line to assign the `author` property, it
    has not been assigned yet.


    ![A341013_4_En_13_Fig12_HTML.jpg](A341013_4_En_13_Fig12_HTML.jpg)


    **Figure 13-12.** Viewing a variable value


    Position the mouse cursor over any place the `newBook` variable appears in the
    code and click the disclosure triangle to display the `Book` object. You should
    see what is displayed in Figure [13-13](#A341013_4_En_13_Chapter.html#Fig13).


    ![A341013_4_En_13_Fig13_HTML.jpg](A341013_4_En_13_Fig13_HTML.jpg)


    **Figure 13-13.** Hovering over the `newBook` variable reveals some information


    Hovering over the `newBook` variable reveals its information. In Figure [13-13](#A341013_4_En_13_Chapter.html#Fig13),
    you can see the `newBook` variable expanded.


    ## Dealing with Code Errors and Warnings


    While coding errors and warnings aren’t really part of the Xcode debugger, fixing
    them is part of the entire debugging process. Before a program can be run (with
    or without the debugger), all errors must be fixed. Warnings won’t stop a program
    from building, but they could cause issues during program execution. It’s best
    not to have warnings at all.'
