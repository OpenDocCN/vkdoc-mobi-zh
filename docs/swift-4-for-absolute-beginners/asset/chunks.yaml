  trans: '

    ### 错误


    让我们来看看几种类型的错误。首先，我们在代码中引入一个错误。在 `MasterViewController.swift` 文件的第 15 行，将以下代码：


    ```

    var myBookStore: BookStore = BookStore()

    ```


    修改为：


    ```

    var myBookStore: BookStore = BookStore[]

    ```


    保存更改，然后按下 `⌘+B` 构建项目。如图 13-14 所示，将会出现一个错误，该错误可能在构建过程中或构建完成后立即显示。


    ![A341013_4_En_13_Fig14_HTML.jpg](img/A341013_4_En_13_Fig14_HTML.jpg)


    图 13-14. 在 Xcode 中查看错误


    接下来，点击带有感叹号的三角形图标，切换到问题导航器（Issue Navigator）窗口，如图 13-15 所示。此视图显示程序中当前的所有错误和警告 ——
    不仅限于当前文件 `MainViewController.swift`，而是所有文件。错误以红色八边形内的白色感叹号显示。在本例中，您有一个错误。如果错误信息在屏幕上显示不全或难以阅读，只需将鼠标悬停在问题导航器中的该错误上，完整错误信息便会显示出来。


    ![A341013_4_En_13_Fig15_HTML.jpg](img/A341013_4_En_13_Fig15_HTML.jpg)


    图 13-15. 查看问题导航器


    通常，错误会指向问题所在。在上面的案例中，`BookStore` 对象被初始化为数组而非对象。


    请继续将 `[]` 改为 `()` 来修复这个错误。


    ### 警告


    警告指明了程序中潜在的问题。如前所述，警告不会阻止程序的构建，但可能在程序执行期间引发问题。本书不涉及那些可能在程序执行期间导致或不会导致问题的具体警告；然而，清除程序中的所有警告是一个好习惯。


    在 `MasterViewController.swift` 的 `viewDidLoad` 方法中添加以下代码：


    ```

    if false {

    print("False")

    }

    ```


    `print` 命令永远不会被执行，因为 `false` 永远不会等于 `true`。按下 `⌘+B` 构建项目。如图 13-16 所示，将会显示一个警告。


    ![A341013_4_En_13_Fig16_HTML.jpg](img/A341013_4_En_13_Fig16_HTML.jpg)


    图 13-16. 在问题导航器中查看警告


    点击问题导航器中的第一个警告，将会显示导致第一个问题的代码，如图 13-17 所示。


    ![A341013_4_En_13_Fig17_HTML.jpg](img/A341013_4_En_13_Fig17_HTML.jpg)


    图 13-17. 查看您的第一个警告


    在主窗口中，您可以看到这个警告。实际上，这个警告为您提供了代码问题的线索。警告内容如下：


    > “将永远不被执行”


    这是一个简单的警告示例。您可能会因为许多事情收到警告，例如未使用的变量、不完整的委托实现以及不可执行的代码。清理代码中的警告以避免日后出现问题是一个好习惯。


    ## 总结


    本章介绍了免费的苹果 Xcode 调试器的高级特性。无论价格如何，Xcode 都是一个出色的调试器。具体来说，在本章中，您学习了以下内容：


    * “bug”一词的起源以及什么是调试器

    * Xcode 调试器的高级特性，包括断点和单步执行程序

    * 使用名为“继续”、“单步跳过”、“单步进入”和“单步跳出”的调试控制

    * 使用各种调试器视图，包括线程（调用栈）、变量视图、文本编辑器和控制台输出

    * 查看程序变量

    * 处理错误和警告


    脚注 1


    Michael Moritz, Alexander L. Taylor III, 和 Peter Stoler, “机器内部的巫师,” *时代*, 第 123
    卷, 第 16 期, 第 56–63 页.


    # 14. 一个 Swift iPhone 应用


    在第 8 章中，您使用 Swift 创建了一个基本的书店 iPhone 应用。在本章中，您将为该应用添加一些功能，使其更具实用性，并运用您在本书中学到的许多技术，例如创建类、使用委托和协议、以及使用动作和插座。您还将学习一些新技术，例如开关、`UIAlertController`
    和地标。

    '
- fmt: '# Let’s Get Started


    The bookstore example in Chapter [8](#A341013_4_En_8_Chapter.html) enabled you
    to view books in your bookstore in a table view and then tap the book to see its
    details. In this chapter, you will add the following capabilities to the Chapter
    [8](#A341013_4_En_8_Chapter.html) bookstore app:


    - Adding a book

    - Deleting a book

    - Modifying a book


    See Figures [14-1](#A341013_4_En_14_Chapter.html#Fig1) and [14-2](#A341013_4_En_14_Chapter.html#Fig2).


    ![A341013_4_En_14_Fig2_HTML.jpg](A341013_4_En_14_Fig2_HTML.jpg)


    Figure 14-2. Adding edit and delete functionality along with using a `UISwitch`


    ![A341013_4_En_14_Fig1_HTML.jpg](A341013_4_En_14_Fig1_HTML.jpg)


    Figure 14-1. Add book functionality


    Users will be able to add books to their BookStore using a new `AddBookViewController`.
    First, add the code below to the `prepareForSegue` method in the `MasterViewController.swift`
    file, as shown in Listing [14-1](#A341013_4_En_14_Chapter.html#Par8).


    ```swift

    45    // MARK: - Segues


    47    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    48        if segue.identifier == "showDetail" {

    49            if let indexPath = tableView.indexPathForSelectedRow {

    50                let selectedBook: Book = myBookStore.bookList[indexPath.row]

    51                let controller = (segue.destination as! UINavigationController).topViewController
    as! DetailViewController

    52                controller.detailItem = selectedBook


    54                controller.navigationItem.leftBarButtonItem = splitViewController?.displayModeButtonItem

    55                controller.navigationItem.leftItemsSupplementBackButton = true

    56                controller.delegate = self

    57            }

    58        } else if segue.identifier == "addBookSegue" {

    59            let vc = segue.destination as! AddBookViewController

    60            vc.delegate = self

    61        }

    62    }

    ```

    Listing 14-1. The `prepareForSegue` Method


    Note


    Something that can help organize your code can be found on line 47: `"// MARK:
    - Segues"`. `// MARK:` is called a landmark. It is replacement of the `#pragma
    mark`, which is used in Objective-C. Landmarks help break up the code in the jump
    bar and enable you to quickly get to sections of code indicated by the landmark.
    When you type something following `// MARK:`, Xcode places the landmark in the
    jump bar’s drop-down, as shown in Figure [14-3](#A341013_4_En_14_Chapter.html#Fig3).
    If you just type `// MARK: -`, Xcode adds a line separator in the jump bar’s drop-down.
    Swift also supports `// TODO:` and `// FIXME:` landmarks to annotate your code
    and list them in the jump bar.


    ![A341013_4_En_14_Fig3_HTML.jpg](A341013_4_En_14_Fig3_HTML.jpg)


    Figure 14-3. Swift’s landmarks


    Now add the new view controller `AddBookViewController` mentioned on line 59 in
    Listing [14-1](#A341013_4_En_14_Chapter.html#Par8). Add a `View Controller` object
    to the storyboard by dragging a View Controller to the `Main.storyboard` file.
    Then add the objects in Figure [14-4](#A341013_4_En_14_Chapter.html#Fig4) to enable
    the user to add a new book. Feel free to move the scene around to make it clear
    how they relate to each other, as shown in Figure [14-4](#A341013_4_En_14_Chapter.html#Fig4).


    ![A341013_4_En_14_Fig4_HTML.jpg](A341013_4_En_14_Fig4_HTML.jpg)


    Figure 14-4. Adding the `AddBookViewController` and objects


    Drag a `Bar Button Item` from the Object Library to the top-right corner of the
    MasterViewController’s Navigation Bar, as shown in Figure [14-5](#A341013_4_En_14_Chapter.html#Fig5).


    ![A341013_4_En_14_Fig5_HTML.jpg](A341013_4_En_14_Fig5_HTML.jpg)


    Figure 14-5. Adding a `Bar Button Item` to the MasterViewController


    Next, select the newly added `Bar Button Item`, select the Attributes Inspector,
