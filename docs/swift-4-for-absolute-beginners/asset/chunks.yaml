- fmt: "### Using Instance Methods\n\nInstance methods (lines 29 to 35 in Listing\
    \ [7-1](#A341013_4_En_7_Chapter.html#Par10)) are available only once a class has\
    \ been instantiated. Here’s an example:\n\n```\n1   var myStation: RadioStation\
    \         // This declares a variable to hold the RadioStation object.\n2   myStation\
    \ = RadioStation()          // This creates a new RadioStation object.\n3   var\
    \ band = myStation.band()         // This method returns the Band of the RadioStation.\n\
    ```\n\nLine 3 calls a method on the `RadioStation` object. The method `band()`\
    \ returns a 1 for FM and a 0 for AM. An instance method is any method that does\
    \ not contain the `class` declaration before it.\n\n### Using Your New Class\n\
    \nYou’ve created a simple `RadioStation` class, but by itself it doesn’t accomplish\
    \ a whole lot. In this section, you will create the `Radio` class and have it\
    \ maintain a list of `RadioStation` classes.\n\n#### Creating Your Project\n\n\
    Let’s start Xcode and create a new project named `RadioStations`.\n\n1.  Launch\
    \ Xcode and select “Create a new Xcode project.”\n2.  Make sure you choose an\
    \ iOS application and select the Single View App template, as shown in Figure\
    \ [7-1](#A341013_4_En_7_Chapter.html#Fig1).\n3.  Once you’ve selected the template,\
    \ click the Next button.\n\n    ![A341013_4_En_7_Fig1_HTML.jpg](A341013_4_En_7_Fig1_HTML.jpg)\n\
    \n    Figure 7-1. Selecting a template in the new project window\n4.  Set the\
    \ product name (application name) to `RadioStations`.\n5.  Set the company identifier\
    \ (a pretend company will do) and set the device family to iPhone (as shown in\
    \ Figure [7-2](#A341013_4_En_7_Chapter.html#Fig2)). Make sure Swift is selected\
    \ in the Language drop-down list.\n\n    ![A341013_4_En_7_Fig2_HTML.jpg](A341013_4_En_7_Fig2_HTML.jpg)\n\
    \n    Figure 7-2. Naming the new iOS application\n6.  Click the Next button, and\
    \ Xcode will ask you where you want to save your new project. You can save the\
    \ project on your desktop or anywhere in your home folder. Once you’ve made your\
    \ choice, simply click the Create button.\n7.  Once you’ve clicked the Create\
    \ button, the Xcode workspace window should be visible, as shown in Figure [7-3](#A341013_4_En_7_Chapter.html#Fig3).\n\
    \n    ![A341013_4_En_7_Fig3_HTML.jpg](A341013_4_En_7_Fig3_HTML.jpg)\n\n    Figure\
    \ 7-3. The workspace window in Xcode\n\n#### Adding Objects\n\nNow you can add\
    \ your new objects.\n\n1.  First, create your `RadioStation` object. Right-click\
    \ the `RadioStations` folder and select New File (as shown in Figure [7-4](#A341013_4_En_7_Chapter.html#Fig4)).\n\
    \n    ![A341013_4_En_7_Fig4_HTML.jpg](A341013_4_En_7_Fig4_HTML.jpg)\n\n    Figure\
    \ 7-4. Adding a new file\n2.  The next screen, shown in Figure [7-5](#A341013_4_En_7_Chapter.html#Fig5),\
    \ asks for the new file type. Simply choose Cocoa Touch Class from the Source\
    \ group, and then click Next.\n\n    ![A341013_4_En_7_Fig5_HTML.jpg](A341013_4_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5. Selecting the new file type\n3.  The following screen will ask\
    \ you the name of the class. Enter `RadioStation`. Keep Subclass set to `NSObject`\
    \ and make sure Language is set to Swift. See Figure [7-6](#A341013_4_En_7_Chapter.html#Fig6).\n\
    4.  Xcode will not prompt you to save the file. The default location is inside\
    \ your project’s folder. Click on the Create button to save the file in the default\
    \ location.\n\n    ![A341013_4_En_7_Fig6_HTML.jpg](A341013_4_En_7_Fig6_HTML.jpg)\n\
    \n    Figure 7-6. Naming the New Class\n5.  Your project window should now look\
    \ like Figure [7-7](#A341013_4_En_7_Chapter.html#Fig7). Click the `RadioStation.swift`\
    \ file. Notice that the stub of your new `RadioStation` class is already present.\
    \ Now, fill in the empty class so it looks like Listing [7-1](#A341013_4_En_7_Chapter.html#Par10),\
    \ your `RadioStation` Swift file.\n\n    ![A341013_4_En_7_Fig7_HTML.jpg](A341013_4_En_7_Fig7_HTML.jpg)\n\
    \n    Figure 7-7. Your newly created file in the workspace window\n\n#### Writing\
    \ the Class\n\nNow that you have created your file and your class, you are ready\
    \ to begin customizing it.\n\n1.  The class file you’ll use here is the same one\
    \ you used at the beginning of this chapter and it will work perfectly for the\
    \ radio station application. Click the `RadioStation.swift` file, and enter the\
    \ code in your class, as shown in Figure [7-8](#A341013_4_En_7_Chapter.html#Fig8).\n\
    \n    ![A341013_4_En_7_Fig8_HTML.jpg](A341013_4_En_7_Fig8_HTML.jpg)\n\n    Figure\
    \ 7-8. The `RadioStation` class file\n\n    We will come back to a few items in\
    \ Figure [7-8](#A341013_4_En_7_Chapter.html#Fig8) and explain them further in\
    \ a moment; however, with the `RadioStation` class defined, you can now write\
    \ the code that will actually use it.\n\n2.  Click the `ViewController.swift`\
    \ file. You’ll need to define a few variables for this class to use, as shown\
    \ in Figure [7-9](#A341013_4_En_7_Chapter.html#Fig9).\n\n    ![A341013_4_En_7_Fig9_HTML.jpg](A341013_4_En_7_Fig9_HTML.jpg)\n\
    \n    Figure 7-9. Adding a `RadioStation` object to the View Controller\n\nLines\
    \ 13 to 15 are going to be used by your iOS interface to show some values on the\
    \ screen (more on these later). Line 17 defines the variable `myStation` of type\
    \ `RadioStation`. Lines 19 to 24 contain the required `init` method. In Swift,\
    \ classes do not require an initializer method, but it is a good place to set\
    \ the default values of your object. This method sets up the variables used in\
    \ that class. Also, don’t forget to include the curly braces (`{ ... }`)."
