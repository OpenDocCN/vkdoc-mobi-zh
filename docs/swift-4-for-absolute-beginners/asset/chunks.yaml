- fmt: "# The Model-View-Controller Pattern\n\n`Model-View-Controller` (`MVC`) is\
    \ the most prevalent design pattern used in iOS development, and learning about\
    \ it will make your life as a developer much easier. `MVC` is used in software\
    \ development and is considered an architectural pattern.\n\nArchitectural patterns\
    \ describe solutions to software design problems that developers can use in their\
    \ code. The `MVC` pattern is not unique to iOS developers; it is being adopted\
    \ by many makers of integrated development environments (`IDEs`), including those\
    \ running on Windows and Linux platforms.\n\nSoftware development is considered\
    \ an expensive and risky venture for businesses. Frequently, apps take longer\
    \ than expected to write, come in over budget, and don’t work as promised. Object-oriented\
    \ programming (`OOP`) produced a lot of hype and gave the impression that companies\
    \ would realize savings if they adopted its methodology, primarily because of\
    \ the reusability of objects and easier maintainability of the code. Initially,\
    \ this didn’t happen.\n\nWhen engineers looked at why `OOP` wasn’t living up to\
    \ these expectations, they discovered a key shortcoming with how developers were\
    \ designing their objects: Developers were frequently mixing objects in such a\
    \ way that the code became difficult to maintain as the application matured, the\
    \ code moved to different platforms, or hardware displays changed.\n\nObjects\
    \ were often designed so that if any of the following changed, it was difficult\
    \ to isolate the objects that were impacted:\n\n* Business rules\n* User interfaces\n\
    * Client-server or Internet-based communication\n\nObjects can be broken down\
    \ into three task-related categories. It is the responsibility of the developer\
    \ to ensure that each of these categories keeps their objects from drifting across\
    \ other categories.\n\nAs objects are categorized in these groups, apps can be\
    \ developed and maintained more easily over time. The following are examples of\
    \ objects and their associated `MVC` category for an iPhone banking application:\n\
    \n`Model`\n\n* Account balances\n* User encryption\n* Account transfers\n* Account\
    \ login\n\n`View`\n\n* Account balances table cell\n* Account login spinner control\n\
    \n`Controller`\n\n* Account balance view controller\n* Account transfer view controller\n\
    * Logon view controller\n\nThe easiest way to remember and classify your objects\
    \ in the `MVC` design pattern is the following:\n\n* `Model`: Unique business\
    \ or application rules or code that represent the real world. This is where the\
    \ data resides.\n* `View`: Unique user interface code\n* `Controller`: Anything\
    \ that controls or communicates with the model or view objects\n\nFigure [10-2](#A341013_4_En_10_Chapter.html#Fig2)\
    \ represents the `MVC` paradigm.\n\n![A341013_4_En_10_Fig2_HTML.jpg](A341013_4_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2. `MVC` paradigm\n\nNeither `Xcode` nor `Interface Builder` forces\
    \ developers to use the `MVC` design pattern. It is up to the developers to organize\
    \ their objects in such a way to use this design pattern.\n\nIt is worth mentioning\
    \ that Apple strongly embraces the `MVC` design pattern, and all of the frameworks\
    \ are designed to work in an `MVC` world. This means that if you also embrace\
    \ the `MVC` design pattern, working with Apple’s classes will be much easier.\
    \ If you don’t, you’ll be swimming upstream.\n\n## Human Interface Guidelines\n\
    \nBefore you get too excited and begin designing dynamic user interfaces for your\
    \ app, you need to learn some of the ground rules. Apple has developed one of\
    \ the most advanced operating systems in the world with `iOS 11`. Additionally,\
    \ Apple’s products are known for being intuitive and user friendly. Apple wants\
    \ users to have the same experience from one app to the next.\n\nTo ensure a consistent\
    \ user experience, Apple provides developers with guidelines on how their apps\
    \ should look and feel. These guidelines, called the `Human Interface Guidelines`\
    \ (`HIG`), are available for `iOS`, `macOS`, `watchOS`, `tvOS`, and `CarPlay`.\
    \ You can download these documents at [`https://developer.apple.com/design/`](https://developer.apple.com/design/),\
    \ as shown in Figure [10-3](#A341013_4_En_10_Chapter.html#Fig3).\n\n![A341013_4_En_10_Fig3_HTML.jpg](A341013_4_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3. Apple’s `Human Interface Guidelines`\n\nNote\n\nApple’s `HIG` is\
    \ more than recommendations or suggestions. Apple takes it very seriously. While\
    \ the `HIG` doesn’t describe how to implement your user interface designs in code,\
    \ it is great for understanding the proper way to implement your views and controls.\n\
    \nThe following are some of the top reasons apps are rejected in Apple’s `iTunes\
    \ App Store`:\n\n* The app crashes.\n* The app violates the `HIG`.\n* The app\
    \ uses Apple’s private APIs.\n* The app doesn’t function as advertised on the\
    \ `iTunes App Store`.\n\nNote\n\nYou can read, learn, and follow the `HIG` before\
    \ you develop your app, or you can read, learn, and follow the `HIG` after your\
    \ app gets rejected by Apple and you have to rewrite part or all of it. Either\
    \ way, all iOS developers will end up becoming familiar with the `HIG`.\n\nMany\
    \ new iOS developers find this out the hard way, but if you follow the `HIG` from\
    \ day one, your iOS development will be a far more pleasurable experience.\n\n\
    ## Creating an Example iPhone App with Interface Builder\n\nLet’s get started\
    \ by building an iPhone app that generates and displays a random number, as shown\
    \ in Figure [10-4](#A341013_4_En_10_Chapter.html#Fig4). This app will be similar\
    \ to the app you created in Chapter [4](#A341013_4_En_4_Chapter.html), but you’ll\
    \ see how much more interesting the app becomes with an iOS user interface (`UI`).\n\
    \n1. Open `Xcode` and select Create a new `Xcode` project. Make sure you select\
    \ `Single View Application` for iOS and then click Next, as shown in Figure [10-5](#A341013_4_En_10_Chapter.html#Fig5).\n\
    \n   ![A341013_4_En_10_Fig5_HTML.jpg](A341013_4_En_10_Fig5_HTML.jpg)\n\n   Figure\
    \ 10-5. Creating an iPhone app based on the `Single View Application` template\n\
    \n2. Name your project `RandomNumber`, select `Swift` for the language, and click\
    \ Next before creating your project, as shown in Figure [10-6](#A341013_4_En_10_Chapter.html#Fig6).\n\
    \n   ![A341013_4_En_10_Fig6_HTML.jpg](A341013_4_En_10_Fig6_HTML.jpg)\n\n   Figure\
    \ 10-6. Naming your new `Swift` project\n\n3. Your project files and settings\
    \ are created and displayed, as shown in Figure [10-7](#A341013_4_En_10_Chapter.html#Fig7).\n\
    \n   ![A341013_4_En_10_Fig7_HTML.jpg](A341013_4_En_10_Fig7_HTML.jpg)\n\n   Figure\
    \ 10-7. Source files\n\n   Although you have only one controller in this project,\
    \ it’s good programming practice to make your `MVC` groups at the beginning of\
    \ your development. This helps remind you to keep the `MVC` paradigm and not put\
    \ all of your code unnecessarily in your controller.\n\n4. Right-click the `RandomNumber`\
    \ folder and then select New Group, as shown in Figure [10-8](#A341013_4_En_10_Chapter.html#Fig8).\n\
    \n   ![A341013_4_En_10_Fig8_HTML.jpg](A341013_4_En_10_Fig8_HTML.jpg)\n\n   Figure\
    \ 10-8. Creating new groups\n\n5. Create a `Models` group, a `Views` group, and\
    \ a `Controllers` group.\n\n6. Drag the `ViewController.swift` file to the `Controllers`\
    \ group. Drag the `Main.storyboard` and `LaunchScreen.storyboard` files to the\
    \ `Views` group. Having these groups reminds you to follow the `MVC` design pattern\
    \ as you develop your code and prevents you from placing all of your code in the\
    \ controllers, as shown in Figure [10-9](#A341013_4_En_10_Chapter.html#Fig9).\n\
    \n   ![A341013_4_En_10_Fig9_HTML.jpg](A341013_4_En_10_Fig9_HTML.jpg)\n\n   Figure\
    \ 10-9. `MVC` groups with controller and storyboard files organized\n\n7. Click\
    \ the `Main.storyboard` file to open `Interface Builder`.\n\n![A341013_4_En_10_Fig4_HTML.jpg](A341013_4_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4. Completed iOS random number generator app"
  raw: "## The Model-View-Controller Pattern\n\nModel-View-Controller (MVC) is the\
    \ most prevalent design pattern used in iOS development, and learning about it\
    \ will make your life as a developer much easier. MVC is used in software development\
    \ and is considered an architectural pattern.\n\nArchitectural patterns describe\
    \ solutions to software design problems that developers can use in their code.\
    \ The MVC pattern is not unique to iOS developers; it is being adopted by many\
    \ makers of integrated development environments (IDEs), including those running\
    \ on Windows and Linux platforms.\n\nSoftware development is considered an expensive\
    \ and risky venture for businesses. Frequently, apps take longer than expected\
    \ to write, come in over budget, and don’t work as promised. Object-oriented programming\
    \ (OOP) produced a lot of hype and gave the impression that companies would realize\
    \ savings if they adopted its methodology, primarily because of the reusability\
    \ of objects and easier maintainability of the code. Initially, this didn’t happen.\n\
    \nWhen engineers looked at why OOP wasn’t living up to these expectations, they\
    \ discovered a key shortcoming with how developers were designing their objects:\
    \ Developers were frequently mixing objects in such a way that the code became\
    \ difficult to maintain as the application matured, the code moved to different\
    \ platforms, or hardware displays changed.\n\nObjects were often designed so that\
    \ if any of the following changed, it was difficult to isolate the objects that\
    \ were impacted:\n\n*   Business rules\n*   User interfaces\n*   Client-server\
    \ or Internet-based communication\n\nObjects can be broken down into three task-related\
    \ categories. It is the responsibility of the developer to ensure that each of\
    \ these categories keeps their objects from drifting across other categories.\n\
    \nAs objects are categorized in these groups, apps can be developed and maintained\
    \ more easily over time. The following are examples of objects and their associated\
    \ MVC category for an iPhone banking application :\n\nModel\n\n*   Account balances\n\
    *   User encryption\n*   Account transfers\n*   Account login\n\nView\n\n*   Account\
    \ balances table cell\n*   Account login spinner control\n\nController\n\n*  \
    \ Account balance view controller\n*   Account transfer view controller\n*   Logon\
    \ view controller\n\nThe easiest way to remember and classify your objects in\
    \ the MVC design pattern is the following:\n\n*   Model: Unique business or application\
    \ rules or code that represent the real world. This is where the data resides.\n\
    *   View: Unique user interface code\n*   Controller: Anything that controls or\
    \ communicates with the model or view objects\n\nFigure [10-2](#A341013_4_En_10_Chapter.html#Fig2)\
    \ represents the MVC paradigm .\n\n![A341013_4_En_10_Fig2_HTML.jpg](A341013_4_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2.\n\nMVC paradigm\n\nNeither Xcode nor Interface Builder forces developers\
    \ to use the MVC design pattern. It is up to the developers to organize their\
    \ objects in such a way to use this design pattern.\n\nIt is worth mentioning\
    \ that Apple strongly embraces the MVC design pattern, and all of the frameworks\
    \ are designed to work in an MVC world. This means that if you also embrace the\
    \ MVC design pattern, working with Apple’s classes will be much easier. If you\
    \ don’t, you’ll be swimming upstream.\n\n## Human Interface Guidelines\n\nBefore\
    \ you get too excited and begin designing dynamic user interfaces for your app,\
    \ you need to learn some of the ground rules. Apple has developed one of the most\
    \ advanced operating systems in the world with iOS 11\\. Additionally, Apple’s\
    \ products are known for being intuitive and user friendly. Apple wants users\
    \ to have the same experience from one app to the next.\n\nTo ensure a consistent\
    \ user experience, Apple provides developers with guidelines on how their apps\
    \ should look and feel. These guidelines, called the Human Interface Guidelines\
    \ (HIG) , are available for iOS, macOS, watchOS, tvOS, and CarPlay. You can download\
    \ these documents at [`https://developer.apple.com/design/`](https://developer.apple.com/design/)\
    \ , as shown in Figure [10-3](#A341013_4_En_10_Chapter.html#Fig3).\n\n![A341013_4_En_10_Fig3_HTML.jpg](A341013_4_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3.\n\nApple’s Human Interface Guidelines Note\n\nApple’s HIG is more\
    \ than recommendations or suggestions. Apple takes it very seriously. While the\
    \ HIG doesn’t describe how to implement your user interface designs in code, it\
    \ is great for understanding the proper way to implement your views and controls.\n\
    \nThe following are some of the top reasons apps are rejected in Apple’s iTunes\
    \ App Store:\n\n*   The app crashes.\n*   The app violates the HIG.\n*   The app\
    \ uses Apple’s private APIs.\n*   The app doesn’t function as advertised on the\
    \ iTunes App Store.\n\nNote\n\nYou can read, learn, and follow the HIG before\
    \ you develop your app, or you can read, learn, and follow the HIG after your\
    \ app gets rejected by Apple and you have to rewrite part or all of it. Either\
    \ way, all iOS developers will end up becoming familiar with the HIG.\n\nMany\
    \ new iOS developers find this out the hard way, but if you follow the HIG from\
    \ day one, your iOS development will be a far more pleasurable experience.\n\n\
    ## Creating an Example iPhone App with Interface Builder\n\nLet’s get started\
    \ by building an iPhone app that generates and displays a random number, as shown\
    \ in Figure [10-4](#A341013_4_En_10_Chapter.html#Fig4). This app will be similar\
    \ to the app you created in Chapter [4](#A341013_4_En_4_Chapter.html), but you’ll\
    \ see how much more interesting the app becomes with an iOS user interface (UI).\n\
    \n1.  Open Xcode and select Create a new Xcode project. Make sure you select Single\
    \ View Application for iOS and then click Next, as shown in Figure [10-5](#A341013_4_En_10_Chapter.html#Fig5).\n\
    \n    ![A341013_4_En_10_Fig5_HTML.jpg](A341013_4_En_10_Fig5_HTML.jpg)\n\n    Figure\
    \ 10-5.\n\n    Creating an iPhone app based on the Single View Application template\
    \  \n2.  Name your project `RandomNumber`, select Swift for the language, and\
    \ click Next before creating your project, as shown in Figure [10-6](#A341013_4_En_10_Chapter.html#Fig6).\n\
    \n    ![A341013_4_En_10_Fig6_HTML.jpg](A341013_4_En_10_Fig6_HTML.jpg)\n\n    Figure\
    \ 10-6.\n\n    Naming your new Swift project  \n3.  Your project files and settings\
    \ are created and displayed, as shown in Figure [10-7](#A341013_4_En_10_Chapter.html#Fig7).\n\
    \n    ![A341013_4_En_10_Fig7_HTML.jpg](A341013_4_En_10_Fig7_HTML.jpg)\n\n    Figure\
    \ 10-7.\n\n    Source files Although you have only one controller in this project,\
    \ it’s good programming practice to make your MVC groups at the beginning of your\
    \ development. This helps remind you to keep the MVC paradigm and not put all\
    \ of your code unnecessarily in your controller.  \n4.  Right-click the `RandomNumber`\
    \ folder and then select New Group, as shown in Figure [10-8](#A341013_4_En_10_Chapter.html#Fig8).\n\
    \n    ![A341013_4_En_10_Fig8_HTML.jpg](A341013_4_En_10_Fig8_HTML.jpg)\n\n    Figure\
    \ 10-8.\n\n    Creating new groups  \n5.  Create a Models group, a Views group,\
    \ and a Controllers group.  \n6.  Drag the `ViewController.swift` file to the\
    \ Controllers group. Drag the `Main.storyboard` and `LaunchScreen.storyboard`\
    \ files to the Views group. Having these groups reminds you to follow the MVC\
    \ design pattern as you develop your code and prevents you from placing all of\
    \ your code in the controllers , as shown in Figure [10-9](#A341013_4_En_10_Chapter.html#Fig9).\n\
    \n    ![A341013_4_En_10_Fig9_HTML.jpg](A341013_4_En_10_Fig9_HTML.jpg)\n\n    Figure\
    \ 10-9.\n\n    MVC groups with controller and storyboard files organized  \n7.\
    \  Click the `Main.storyboard` file to open Interface Builder.  \n\n![A341013_4_En_10_Fig4_HTML.jpg](A341013_4_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4.\n\nCompleted iOS random number generator app"
  trans: "\n# 模型-视图-控制器模式\n\n`Model-View-Controller`（`MVC`）是 iOS 开发中最流行的设计模式，掌握它将让您的开发工作轻松很多。`MVC`\
    \ 被用于软件开发，并被视为一种架构模式。\n\n架构模式描述了开发者可在代码中使用的软件设计问题的解决方案。`MVC` 模式并非 iOS 开发者独有；它已被许多集成开发环境（`IDE`）的制造商采用，包括那些运行在\
    \ Windows 和 Linux 平台上的环境。\n\n对于企业而言，软件开发被视为一项昂贵且高风险的投资。通常，应用程序的编写时间比预期更长，超出预算，并且无法按预期运行。面向对象编程（`OOP`）曾引起很大轰动，并给人一种印象：如果公司采用其方法论，就能实现节约，这主要是因为对象的可重用性和代码更易于维护。然而，最初这并未实现。\n\
    \n当工程师们探究为何 `OOP` 未能达到预期时，他们发现了开发者在设计对象时的一个关键缺陷：开发者经常以这样一种方式混杂对象，以至于随着应用程序的成熟、代码迁移到不同平台或硬件显示发生变化，代码变得难以维护。\n\
    \n对象的设计方式常常导致，若以下任何一项发生变化，就很难隔离受影响的这些对象：\n\n*   业务规则\n*   用户界面\n*   客户端-服务器或基于互联网的通信\n\
    \n对象可以被划分为三个与任务相关的类别。开发者的责任是确保每个类别中的对象不会跨界到其他类别。\n\n随着对象被归入这些类别，应用程序可以随着时间推移更容易地被开发和维护。以下是一个\
    \ iPhone 银行应用程序中对象及其对应 `MVC` 类别的示例：\n\n`Model`（模型）\n\n*   账户余额\n*   用户加密\n*  \
    \ 账户转账\n*   账户登录\n\n`View`（视图）\n\n*   账户余额表格单元格\n*   账户登录旋转控件\n\n`Controller`（控制器）\n\
    \n*   账户余额视图控制器\n*   账户转账视图控制器\n*   登录视图控制器\n\n在 `MVC` 设计模式中记忆和分类对象的最简单方法如下：\n\
    \n*   `Model`（模型）：代表现实世界的独特业务或应用程序规则或代码。这是数据所在之处。\n*   `View`（视图）：独特的用户界面代码。\n\
    *   `Controller`（控制器）：任何控制模型或视图对象，或与之通信的对象。\n\n图 10-2 展示了 `MVC` 范式。\n\n![A341013_4_En_10_Fig2_HTML.jpg](img/A341013_4_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2. `MVC` 范式\n\n无论是 `Xcode` 还是 `Interface Builder` 都不会强制开发者使用 `MVC` 设计模式。由开发者自行决定如何组织其对象以使用此设计模式。\n\
    \n值得一提的是，Apple 非常推崇 `MVC` 设计模式，并且所有框架都是为了在 `MVC` 世界中工作而设计的。这意味着，如果您也采用 `MVC` 设计模式，与\
    \ Apple 的类协同工作将变得容易得多。否则，您将逆水行舟。\n\n## 人机界面指南\n\n在您过于兴奋并开始为应用设计动态用户界面之前，需要先了解一些基本规则。Apple\
    \ 通过 `iOS 11` 开发了世界上最先进的操作系统之一。此外，Apple 的产品以其直观和用户友好而闻名。Apple 希望用户在不同的应用之间拥有相同的体验。\n\
    \n为了确保一致的用户体验，Apple 为开发者提供了关于其应用外观和操作感受的指南。这些指南被称为`人机界面指南`（`HIG`），适用于 `iOS`、`macOS`、`watchOS`、`tvOS`\
    \ 和 `CarPlay`。您可以在 [`https://developer.apple.com/design/`](https://developer.apple.com/design/)\
    \ 下载这些文档，如图 10-3 所示。\n\n![A341013_4_En_10_Fig3_HTML.jpg](img/A341013_4_En_10_Fig3_HTML.jpg)\n\
    \n图 10-3. Apple 的`人机界面指南`\n\n注意\n\nApple 的 `HIG` 不仅仅是建议或提议。Apple 对此非常重视。虽然 `HIG`\
    \ 没有描述如何在代码中实现您的用户界面设计，但它对于理解实现视图和控件的正确方法非常有帮助。\n\n以下是一些应用在 Apple `iTunes App\
    \ Store` 中被拒的主要原因：\n\n*   应用崩溃。\n*   应用违反了 `HIG`。\n*   应用使用了 Apple 的私有 API。\n\
    *   应用的功能与在 `iTunes App Store` 上宣传的不符。\n\n注意\n\n您可以在开发应用之前阅读、学习并遵循 `HIG`，也可以在应用被\
    \ Apple 拒绝、不得不重写部分或全部代码之后，再来阅读、学习并遵循 `HIG`。无论哪种方式，所有 iOS 开发者最终都会熟悉 `HIG`。\n\n\
    许多新的 iOS 开发者是通过惨痛教训才认识到这一点的，但如果您从一开始就遵循 `HIG`，您的 iOS 开发体验将会愉快得多。\n\n## 使用 Interface\
    \ Builder 创建示例 iPhone 应用\n\n让我们开始构建一个生成并显示随机数的 iPhone 应用，如图 10-4 所示。这个应用将类似于您在第\
    \ 4 章创建的应用，但您会看到拥有 iOS 用户界面（`UI`）后，这个应用变得有趣得多。\n\n1. 打开 `Xcode` 并选择创建一个新的 `Xcode`\
    \ 项目。确保您为 iOS 选择了 `Single View Application`，然后单击 Next，如图 10-5 所示。\n\n   ![A341013_4_En_10_Fig5_HTML.jpg](img/A341013_4_En_10_Fig5_HTML.jpg)\n\
    \n   图 10-5. 基于 `Single View Application` 模板创建 iPhone 应用\n\n2. 将您的项目命名为 `RandomNumber`，选择\
    \ `Swift` 作为语言，然后在创建项目前单击 Next，如图 10-6 所示。\n\n   ![A341013_4_En_10_Fig6_HTML.jpg](img/A341013_4_En_10_Fig6_HTML.jpg)\n\
    \n   图 10-6. 命名您的新 `Swift` 项目\n\n3. 您的项目文件和设置将被创建并显示，如图 10-7 所示。\n\n   ![A341013_4_En_10_Fig7_HTML.jpg](img/A341013_4_En_10_Fig7_HTML.jpg)\n\
    \n   图 10-7. 源文件\n\n   虽然这个项目中只有一个控制器，但在开发初期就创建您的 `MVC` 分组是一种良好的编程实践。这有助于提醒您遵守\
    \ `MVC` 范式，而不是不必要地将所有代码都放在控制器中。\n\n4. 右键单击 `RandomNumber` 文件夹，然后选择 New Group，如图\
    \ 10-8 所示。\n\n   ![A341013_4_En_10_Fig8_HTML.jpg](img/A341013_4_En_10_Fig8_HTML.jpg)\n\
    \n   图 10-8. 创建新分组\n\n5. 创建一个 `Models` 分组、一个 `Views` 分组和一个 `Controllers` 分组。\n\
    \n6. 将 `ViewController.swift` 文件拖到 `Controllers` 分组。将 `Main.storyboard` 和 `LaunchScreen.storyboard`\
    \ 文件拖到 `Views` 分组。拥有这些分组可以提醒您在开发代码时遵循 `MVC` 设计模式，并防止您将所有代码都放在控制器中，如图 10-9 所示。\n\
    \n   ![A341013_4_En_10_Fig9_HTML.jpg](img/A341013_4_En_10_Fig9_HTML.jpg)\n\n \
    \  图 10-9. 包含已组织好的控制器和故事板文件的 `MVC` 分组\n\n7. 点击 `Main.storyboard` 文件以打开 `Interface\
    \ Builder`。\n\n![A341013_4_En_10_Fig4_HTML.jpg](img/A341013_4_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4. 完成的 iOS 随机数生成器应用\n"
- fmt: "### Using Interface Builder\n\nThe most common way to launch Interface Builder\
    \ and begin working on your views is to click on the associated storyboard file,\
    \ as shown in Figure [10-10](#A341013_4_En_10_Chapter.html#Fig10).\n\n![A341013_4_En_10_Fig10_HTML.jpg](A341013_4_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10. Interface Builder in the workspace window\n\nWhen Interface Builder\
    \ opens, you can see your scenes displayed on the canvas. You are now able to\
    \ design your user interface. First, you need to understand some of the sub-windows\
    \ within Interface Builder.\n\n### The Document Outline\n\nThe storyboard shows\
    \ all the objects that your views contain. The following are some examples of\
    \ these objects:\n\n- Buttons\n- Labels\n- Text fields\n- Web views\n- Map views\n\
    - Picker views\n- Table views\n\n> **Note:** You can expand the width of the Document\
    \ Outline to see a detailed list of all your objects, as shown in Figure [10-10](#A341013_4_En_10_Chapter.html#Fig10).\
    \ To get more real estate for the canvas, you can shrink or hide your file navigator.\n\
    \n### The Object Library\n\nThe Object Library is where you can exploit your creativity.\
    \ It’s a smorgasbord of objects that you can drag and drop into the View.\n\n\
    - The Library pane can grow and shrink by moving the window splitter in the middle\
    \ of the view, as shown in Figure [10-11](#A341013_4_En_10_Chapter.html#Fig11).\n\
    \n![A341013_4_En_10_Fig11_HTML.jpg](A341013_4_En_10_Fig11_HTML.jpg)\n\nFigure\
    \ 10-11. Expand the Library pane to see more controls and slide the splitter to\
    \ resize the window with the mouse\n\nClicking the Icon View button in Figure\
    \ [10-12](#A341013_4_En_10_Chapter.html#Fig12) gives you a more compact view of\
    \ the object library contents, as shown in Figure [10-13](#A341013_4_En_10_Chapter.html#Fig13).\n\
    \n![A341013_4_En_10_Fig12_HTML.jpg](A341013_4_En_10_Fig12_HTML.jpg)\n\nFigure\
    \ 10-12. Object Library Icon View button\n\nFor Cocoa Touch objects, the Library\
    \ contains the following:\n\n![A341013_4_En_10_Fig13_HTML.jpg](A341013_4_En_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13. Various Cocoa Touch objects in the Object Library\n\n- Controls\n\
    - Data views\n- Gesture recognizers\n- Objects and controllers\n- Window and bars\n\
    \n### Inspector Pane and Selector Bar\n\nThe Inspector pane enables you to change\
    \ the properties of the controls to make your objects follow your command. The\
    \ Inspector pane has six tabs across the top, as shown in Figure [10-14](#A341013_4_En_10_Chapter.html#Fig14).\n\
    \n![A341013_4_En_10_Fig14_HTML.jpg](A341013_4_En_10_Fig14_HTML.jpg)\n\nFigure\
    \ 10-14. The Attributes inspector and Selector Bar\n\n- File inspector\n- Quick\
    \ Help inspector\n- Identity inspector\n- Attributes inspector\n- Size inspector\n\
    - Connections inspector\n\n### Creating the View\n\nThe random number generator\
    \ will have three objects in the view: one label and two buttons. One button will\
    \ generate the seed, another button will generate the random number, and the label\
    \ shows the random number generated by the app.\n\n1.  Scroll through the Object\
    \ Library and drag two Buttons and one Label to the View Controller scene, as\
    \ shown in Figure [10-15](#A341013_4_En_10_Chapter.html#Fig15).\n\n    ![A341013_4_En_10_Fig15_HTML.jpg](A341013_4_En_10_Fig15_HTML.jpg)\n\
    \n    Figure 10-15. Placing objects in the view\n\n2.  Double-click the first\
    \ button, and change its title to “Seed Random Number Generator,” then double-click\
    \ the second button, and change its title to “Generate Random Number” as shown\
    \ in Figure [10-16](#A341013_4_En_10_Chapter.html#Fig16).\n\n    ![A341013_4_En_10_Fig16_HTML.jpg](A341013_4_En_10_Fig16_HTML.jpg)\n\
    \n    Figure 10-16. Renaming the button titles\n\n    Now you get to use a great\
    \ feature of Xcode. You can quickly and easily connect your outlets and actions\
    \ to your code. Xcode actually goes one step further; it will create some of the\
    \ code for you. All you have to do is drag and drop.\n\n3.  Click the Assistant\
    \ Editor icon at the top right of the screen. This will display the associated\
    \ `.swift` file for the view selected in the storyboard, as shown in Figure [10-17](#A341013_4_En_10_Chapter.html#Fig17).\n\
    \n    > **Note:** If the correct associated `.swift` file doesn’t appear when\
    \ you click the Assistant Editor icon, make sure you selected and highlighted\
    \ the view. Automatic also has to be selected in the Assistant Editor’s jump bar.\n\
    \n    ![A341013_4_En_10_Fig17_HTML.jpg](A341013_4_En_10_Fig17_HTML.jpg)\n\n  \
    \  Figure 10-17. Using the Assistant Editor to display the `.swift` file\n\n###\
    \ Using Outlets\n\nNow you can connect your label to your code by creating an\
    \ outlet.\n\n1.  Control-drag from the label in the view to the top of your class\
    \ file, as shown in Figure [10-18](#A341013_4_En_10_Chapter.html#Fig18). This\
    \ is holding down the Control key on the keyboard while clicking and dragging\
    \ with the mouse. You can also right-click and drag.\n\n    ![A341013_4_En_10_Fig18_HTML.jpg](A341013_4_En_10_Fig18_HTML.jpg)\n\
    \n    Figure 10-18. Control-dragging to create an outlet\n\n2.  A pop-up window\
    \ will appear. This enables you to name and specify the type of outlet.\n\n  \
    \  ![A341013_4_En_10_Fig18_HTML.jpg](A341013_4_En_10_Fig18_HTML.jpg)\n\n    Figure\
    \ 10-18. (Repeated) Control-dragging to create an outlet\n\n3.  Name the outlet\
    \ `randomNumberLabel` as shown in Figure [10-19](#A341013_4_En_10_Chapter.html#Fig19)\
    \ and click the Connect button.\n\n    ![A341013_4_En_10_Fig19_HTML.jpg](A341013_4_En_10_Fig19_HTML.jpg)\n\
    \n    Figure 10-19. Pop-up for `randomNumberLabel` outlet\n\nThe code is created\
    \ for the outlet, and the outlet is now connected to the Label object in your\
    \ `Main.storyboard` file. The shaded circle next to line 12 indicates the outlet\
    \ is connected to an object in the `Main.storyboard` file, as shown in Figure\
    \ [10-20](#A341013_4_En_10_Chapter.html#Fig20).\n\n![A341013_4_En_10_Fig20_HTML.jpg](A341013_4_En_10_Fig20_HTML.jpg)\n\
    \nFigure 10-20. Outlet property code generated and connected to the Label object\n\
    \nThere is a declaration that may be new to you called `IBOutlet`, commonly referred\
    \ to simply as an outlet. Outlets signal to your controller that this property\
    \ is connected to an object in Interface Builder. `IBOutlet` will enable Interface\
    \ Builder to see the outlet and enable you to connect the property to the object\
    \ in Interface Builder.\n\nUsing the analogy of an electrical wall outlet, these\
    \ property outlets are connected to objects. Using Interface Builder, you can\
    \ connect these properties to the appropriate object. When you change the properties\
    \ of a connected outlet, the object that it is connected to will automatically\
    \ change.\n\n### Using Actions\n\nUser interface object events, also known as\
    \ actions, trigger methods.\n\nNow you need to connect the object actions to the\
    \ buttons.\n\n1.  Control-drag from the Seed Random Number Generator button to\
    \ the bottom of your class. Complete the pop-up as indicated in Figure [10-21](#A341013_4_En_10_Chapter.html#Fig21)\
    \ and click the Connect button. Make sure you change the connection to an Action\
    \ and not an Outlet.\n\n    ![A341013_4_En_10_Fig21_HTML.jpg](A341013_4_En_10_Fig21_HTML.jpg)\n\
    \n    Figure 10-21. Completing the pop-up for the Seed method\n\n2.  Repeat the\
    \ previous steps for the Generate Random Number button to create a `generateAction`\
    \ method in your `ViewController` class."
