  trans: "\n### 使用实例方法\n\n实例方法（清单 7-1 中的第 29 至 35 行）仅在类被实例化后才可用。以下是一个示例：\n\n```\n\
    1   var myStation: RadioStation         // 声明一个变量，用于保存 RadioStation 对象。\n2   myStation\
    \ = RadioStation()          // 创建一个新的 RadioStation 对象。\n3   var band = myStation.band()\
    \         // 该方法返回 RadioStation 的频段。\n```\n\n第 3 行对 `RadioStation` 对象调用了一个方法。方法\
    \ `band()` 返回 1 表示调频，返回 0 表示调幅。实例方法是指在其声明之前不包含 `class` 关键字的任何方法。\n\n### 使用你的新类\n\
    \n你已经创建了一个简单的 `RadioStation` 类，但它本身并不能完成太多功能。在本节中，你将创建 `Radio` 类，并让它维护一个 `RadioStation`\
    \ 类的列表。\n\n#### 创建你的项目\n\n启动 Xcode 并创建一个名为 `RadioStations` 的新项目。\n\n1.  启动 Xcode\
    \ 并选择“创建一个新的 Xcode 项目”。\n2.  确保选择 iOS 应用程序，并选择单视图应用模板，如图 7-1 所示。\n3.  选择模板后，点击“下一步”按钮。\n\
    \n    ![A341013_4_En_7_Fig1_HTML.jpg](img/A341013_4_En_7_Fig1_HTML.jpg)\n\n  \
    \  图 7-1. 在新项目窗口中选择模板\n4.  将产品名称（应用程序名称）设置为 `RadioStations`。\n5.  设置公司标识符（可以虚构一个公司）并将设备系列设置为\
    \ iPhone（如图 7-2 所示）。确保在语言下拉列表中选择了 Swift。\n\n    ![A341013_4_En_7_Fig2_HTML.jpg](img/A341013_4_En_7_Fig2_HTML.jpg)\n\
    \n    图 7-2. 命名新的 iOS 应用程序\n6.  点击“下一步”按钮，Xcode 会询问你想要将新项目保存在哪里。你可以将项目保存在桌面或主文件夹中的任何位置。做出选择后，只需点击“创建”按钮。\n\
    7.  点击“创建”按钮后，Xcode 工作区窗口应该会显示出来，如图 7-3 所示。\n\n    ![A341013_4_En_7_Fig3_HTML.jpg](img/A341013_4_En_7_Fig3_HTML.jpg)\n\
    \n    图 7-3. Xcode 中的工作区窗口\n\n#### 添加对象\n\n现在你可以添加你的新对象了。\n\n1.  首先，创建你的 `RadioStation`\
    \ 对象。右键单击 `RadioStations` 文件夹，然后选择“新建文件”（如图 7-4 所示）。\n\n    ![A341013_4_En_7_Fig4_HTML.jpg](img/A341013_4_En_7_Fig4_HTML.jpg)\n\
    \n    图 7-4. 添加新文件\n2.  下一个屏幕如图 7-5 所示，要求选择新文件的类型。只需从“源”组中选择 Cocoa Touch 类，然后点击“下一步”。\n\
    \n    ![A341013_4_En_7_Fig5_HTML.jpg](img/A341013_4_En_7_Fig5_HTML.jpg)\n\n  \
    \  图 7-5. 选择新文件类型\n3.  接下来，屏幕会询问类的名称。输入 `RadioStation`。将“子类”设置为 `NSObject`，并确保“语言”设置为\
    \ Swift。见图 7-6。\n4.  Xcode 不会提示你保存文件。默认位置在你的项目文件夹内。点击“创建”按钮将文件保存在默认位置。\n\n   \
    \ ![A341013_4_En_7_Fig6_HTML.jpg](img/A341013_4_En_7_Fig6_HTML.jpg)\n\n    图 7-6.\
    \ 命名新类\n5.  你的项目窗口现在应如图 7-7 所示。点击 `RadioStation.swift` 文件。注意，新 `RadioStation`\
    \ 类的存根已经存在。现在，填充这个空类，使其看起来像你的 `RadioStation` Swift 文件清单 7-1 所示。\n\n    ![A341013_4_En_7_Fig7_HTML.jpg](img/A341013_4_En_7_Fig7_HTML.jpg)\n\
    \n    图 7-7. 工作区窗口中你新创建的文件\n\n#### 编写类\n\n既然你已经创建了文件和类，就可以开始对其进行定制了。\n\n1.  你将在这里使用的类文件与本章开头使用的相同，并且它对于电台应用程序来说将完美适用。点击\
    \ `RadioStation.swift` 文件，并在你的类中输入代码，如图 7-8 所示。\n\n    ![A341013_4_En_7_Fig8_HTML.jpg](img/A341013_4_En_7_Fig8_HTML.jpg)\n\
    \n    图 7-8. `RadioStation` 类文件\n\n    我们将在稍后回到图 7-8 中的几个项目并进一步解释；不过，定义了 `RadioStation`\
    \ 类之后，你现在就可以编写实际使用它的代码了。\n\n2.  点击 `ViewController.swift` 文件。你需要为该类定义一些变量以供使用，如图\
    \ 7-9 所示。\n\n    ![A341013_4_En_7_Fig9_HTML.jpg](img/A341013_4_En_7_Fig9_HTML.jpg)\n\
    \n    图 7-9. 向视图控制器添加一个 `RadioStation` 对象\n\n第 13 至 15 行将被你的 iOS 界面用来在屏幕上显示一些值（更多细节稍后介绍）。第\
    \ 17 行定义了类型为 `RadioStation` 的变量 `myStation`。第 19 至 24 行包含必需的 `init` 方法。在 Swift\
    \ 中，类并不强制要求初始化方法，但该方法是一个设置对象默认值的好地方。该方法设置该类中使用的变量。另外，不要忘记包含花括号（`{ ... }`）。\n"
- fmt: "### Creating the User Interface\n\nNext, the main window has to be set up\
    \ in order to display your station information.\n\n1.  Click the `Main.storyboard`\
    \ file. This file produces the main iPhone screen. Click the Object Library icon,\
    \ as shown in Figure [7-10](#A341013_4_En_7_Chapter.html#Fig10).\n\n    ![A341013_4_En_7_Fig10_HTML.jpg](A341013_4_En_7_Fig10_HTML.jpg)\n\
    \n    Figure 7-10. Adding a `Label` object to your iPhone screen\n\n2.  Drag and\
    \ drop three `Label` objects onto the screen, as shown in Figure [7-11](#A341013_4_En_7_Chapter.html#Fig11).\
    \ The labels can be aligned in any manner, or as shown in Figure [7-11](#A341013_4_En_7_Chapter.html#Fig11).\n\
    \n3.  You’re going to need space, however. Once the `Label` objects are on the\
    \ iPhone screen, double-click each `Label` object in order to change its text\
    \ so that the iPhone screen looks something like Figure [7-11](#A341013_4_En_7_Chapter.html#Fig11).\n\
    \n    ![A341013_4_En_7_Fig11_HTML.jpg](A341013_4_En_7_Fig11_HTML.jpg)\n\n    Figure\
    \ 7-11. All three `Label` objects on the iPhone screen\n\n4.  Next, add a `Button`\
    \ object to the screen, as shown in Figure [7-12](#A341013_4_En_7_Chapter.html#Fig12).\
    \ This button, when clicked, will cause the screen to be updated with your radio\
    \ station information.\n\n    ![A341013_4_En_7_Fig12_HTML.jpg](A341013_4_En_7_Fig12_HTML.jpg)\n\
    \n    Figure 7-12. Adding a `Button` object to the screen\n\n5.  Just like with\
    \ the `Label` object, simply double-click the `Button` object in order to change\
    \ its Title to My Station. The button should automatically resize to fit the new\
    \ title.\n\n6.  Next, you need to add the `Label` fields that will hold the radio\
    \ station information. These fields are situated just after the existing `Label`\
    \ objects. Figure [7-13](#A341013_4_En_7_Chapter.html#Fig13) shows the placement\
    \ of the first label. Once the `Label` object is placed, it needs to be resized\
    \ so that it can show more text, as shown in Figure [7-14](#A341013_4_En_7_Chapter.html#Fig14).\n\
    \n    ![A341013_4_En_7_Fig14_HTML.jpg](A341013_4_En_7_Fig14_HTML.jpg)\n\n    Figure\
    \ 7-14. Stretching the `Label` object\n\n    ![A341013_4_En_7_Fig13_HTML.jpg](A341013_4_En_7_Fig13_HTML.jpg)\n\
    \n    Figure 7-13. Adding another `Label` object\n\n    > Note: Stretching the\
    \ `Label` object allows the `Label`’s text to contain a reasonably long string.\
    \ If you didn’t resize the `Label` object, the text would be cut off (since it\
    \ wouldn’t fit), or the font size would get smaller.[¹](#A341013_4_En_7_Chapter.html#Fn1)\n\
    \n7.  Repeat adding and sizing a `Label` object next to the existing Frequency\
    \ and Band Labels, as shown in Figure [7-15](#A341013_4_En_7_Chapter.html#Fig15).\
    \ It’s okay to leave the default text of the label set to “Label” for now.\n\n\
    \    ![A341013_4_En_7_Fig15_HTML.jpg](A341013_4_En_7_Fig15_HTML.jpg)\n\n    Figure\
    \ 7-15. Adding another `Label` object\n\n### Hooking Up the Code\n\nNow that all\
    \ the user interface objects are in place, you can begin to hook up these interface\
    \ elements to the variables in your program. As you saw in Chapter [6](#A341013_4_En_6_Chapter.html),\
    \ you do this by connecting the user interface objects with the objects in your\
    \ program.\n\n1.  Start by connecting the `Label` object to the right of Station\
    \ Name to your variable, as shown in Figure [7-16](#A341013_4_En_7_Chapter.html#Fig16).\
    \ Right-click (or Control-click) the View Controller object and drag it to the\
    \ `Label` object next to the Station Name text to bring up the list of outlets.\n\
    \n    ![A341013_4_En_7_Fig16_HTML.jpg](A341013_4_En_7_Fig16_HTML.jpg)\n\n    Figure\
    \ 7-16. Creating a connection\n\n2.  When the connection is dropped from the View\
    \ Controller icon, another small menu will be shown. Click the property name that\
    \ you want to display in this `Label` object—in this case, you want the `stationName`\
    \ property, as shown in Figure [7-17](#A341013_4_En_7_Chapter.html#Fig17).\n\n\
    \    ![A341013_4_En_7_Fig17_HTML.jpg](A341013_4_En_7_Fig17_HTML.jpg)\n\n    Figure\
    \ 7-17. Connecting the `Label` to your `stationName` property\n\n3.  Now, the\
    \ interface `Label` object is connected to the `stationName` property. Whenever\
    \ you set the property’s value, the screen will also be updated. Repeat the previous\
    \ connection steps for Frequency and Band. To hook up your button, you need a\
    \ method in the `ViewController` class to handle this. You could go to the `ViewController.swift`\
    \ file and add it there. There is also a shortcut to adding `@IBOutlet` properties\
    \ and `@IBAction` methods. On the right side of the Xcode toolbar, click the Assistant\
    \ Editor icon shown in Figure [7-18](#A341013_4_En_7_Chapter.html#Fig18) (it looks\
    \ like two circles).\n\n    ![A341013_4_En_7_Fig18_HTML.jpg](A341013_4_En_7_Fig18_HTML.jpg)\n\
    \n    Figure 7-18. The Assistant Editor icon\n\n    After clicking the Assistant\
    \ Editor icon, a second window will pop open showing the `ViewController` source.\
    \ Right-click (or Control-click) and drag the button to the code window, as shown\
    \ in Figure [7-19](#A341013_4_En_7_Chapter.html#Fig19).\n\n    ![A341013_4_En_7_Fig19_HTML.jpg](A341013_4_En_7_Fig19_HTML.jpg)\n\
    \n    Figure 7-19. Using the Assistant editor to create your method\n\n4.  When\
    \ you release the mouse, a little window will pop up, as shown in Figure [7-20](#A341013_4_En_7_Chapter.html#Fig20).\n\
    \n    ![A341013_4_En_7_Fig20_HTML.jpg](A341013_4_En_7_Fig20_HTML.jpg)\n\n    Figure\
    \ 7-20. Creating the action\n\n    Select Action and set the name to `buttonClick`.\
    \ Xcode will now create your method for you.\n\n    Finish your method by adding\
    \ the code shown in Figure [7-21](#A341013_4_En_7_Chapter.html#Fig21).\n\n   \
    \ ![A341013_4_En_7_Fig21_HTML.jpg](A341013_4_En_7_Fig21_HTML.jpg)\n\n    Figure\
    \ 7-21. Finished `buttonClick` method\n\n    Let’s walk through the code you just\
    \ added. First, on line 39, you’ll notice the `IBAction` attribute. This lets\
    \ Xcode know that this method can be called as a result of an action. So, when\
    \ you go to connect an action to your application, you will see this method.\n\
    \n    Lines 40 and 41 both set the text fields to the values found in your `RadioStation`\
    \ class. Line 40 is as follows:\n\n    ```\n    stationName.text = myStation.name\n\
    \    ```\n\n    The `stationName` variable is what you just connected to the user\
    \ interface `Label` object, and `myStation.name` is used to return the name of\
    \ the station.\n\n    Line 41 effectively does the same thing as line 40, but\
    \ you have to first convert the double value (the station’s frequency) to a `String`.\
    \ The `\\(myStation.frequency)` substitutes the value of the frequency property\
    \ into the string.\n\n    Lines 42 to 46 make use of both the instance variables\
    \ and the Type Methods of the `RadioStation` class. Here, you simply call the\
    \ method `isBandFM()` on the `myStation` object. If so, the station is an FM station\
    \ and `isBandFM()` will return a 1; otherwise, assume it’s the AM band. Lines\
    \ 43 and 45 show the band value on the screen.\n\n    > Tip: The Button sends\
    \ the Touch Up Inside event whenever a user touches the inside of the button and\
    \ then releases—not until the user lifts their finger is the event actually sent.\n\
    \n### Running the Program\n\nOnce the connection has been made, you’re ready to\
    \ run and test your program! To do this, simply click the Run button at the top\
    \ left of the Xcode window, as shown in Figure [7-22](#A341013_4_En_7_Chapter.html#Fig22).\n\
    \n![A341013_4_En_7_Fig22_HTML.jpg](A341013_4_En_7_Fig22_HTML.jpg)\n\nFigure 7-22.\
    \ Click the Play button to run your program\n\nIf there are no compile errors,\
    \ the iPhone Simulator should come up, and you should see your application. Simply\
    \ click the My Station button, and the radio station information will be displayed,\
    \ as shown in Figure [7-23](#A341013_4_En_7_Chapter.html#Fig23).\n\n![A341013_4_En_7_Fig23_HTML.jpg](A341013_4_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23. Showing your radio station information\n\nIf things don’t quite\
    \ look or work right, retrace your steps and make sure all the code and connections\
    \ described in this chapter are in place."
