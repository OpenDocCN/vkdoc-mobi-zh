    Flowchart for guessing a random number app


    Reviewing Figure [4-2](#A341013_4_En_4_Chapter.html#Fig2), you’ll notice that
    as you approach the end of a block of logic in your flowchart, there are arrows
    that go back to a previous section and repeat that section until some condition
    is met. This is called looping. It enables you to repeat sections of programming
    logic — without having to rewrite those sections of code over — until a condition
    is met.


    ### Using Loops to Repeat Program Statements


    A loop is a sequence of program statements that is specified once but can be repeated
    several times in succession. A loop can repeat a specified number of times (count-controlled)
    or until some condition (condition-controlled) occurs.


    In this section, you’ll learn about count-controlled loops and condition-controlled
    loops. You will also learn how to control your loops with Boolean logic.


    #### Count-Controlled Loops


    A count-controlled loop repeats a specified number of times. In Swift, this is
    a `for-in` loop. A `for-in` loop iterates over sequences or collections of items,
    such as ranges of numbers, items in an array, or characters in a string. See Listing
    [4-8](#A341013_4_En_4_Chapter.html#Par76).


    ```

    for i in 0..<10 {

    print("The index is: \(i)")

    }

    //....continue

    Listing 4-8.

    A Count-Controlled Loop

    ```


    The loop in Listing [4-8](#A341013_4_En_4_Chapter.html#Par76) will loop 10 times.
    The “half-open range operator” ..< returns a sequence of values from the “lower
    bound” value 0 up to, but not including, the “upper bound” value 10, resulting
    in values of i between 0 and 9.


    Alternatively, Listing [4-9](#A341013_4_En_4_Chapter.html#Par79) prints the first
    10 entries in the 10 times table by using the “closed range operator” … that returns
    a sequence of values from the lower bound value 1 up to and including the upper
    bound value 10, resulting in values of i between 1 and 10.


    ```

    for i in 1...10 {

    print("\(i) times 10 is \(i * 10)")

    }

    //....continue

    Listing 4-9.

    A Count-Controller Loop Using the Closed-Range Operator

    ```


    #### Condition-Controlled Loops


    Swift has the ability to repeat a loop until some condition changes. You may want
    to repeat a section of your code until a false condition is reached with one of
    your variables. This type of loop is called a `while` loop. A `while` loop is
    a control flow statement that repeats based on a given Boolean condition . You
    can think of a `while` loop as a repeating `if` statement. See Listing [4-10](#A341013_4_En_4_Chapter.html#Par81).


    ```

    var isTrue = true

    while isTrue {

    // do something

    isTrue = false // a condition occurs that sometimes sets isTrue to FALSE

    }

    //....continue

    Listing 4-10.

    A Swift while Loop Repeating

    ```


    The `while` loop in Listing [4-10](#A341013_4_En_4_Chapter.html#Par81) first checks
    whether the variable `isTrue` is `true` — which it is — so the `{loop body}` is
    entered where the code is executed. Eventually, some condition is reached that
    causes `isTrue` to become `false`. After completing all the code in the loop body,
    the condition (`isTrue`) is checked once more, and the loop is repeated. This
    process is repeated until the variable `isTrue` is set to `false`.


    #### Infinite Loops


    An infinite loop repeats endlessly, either because of the loop not having a condition
    that causes termination or because of the loop having a terminating condition
    that can never be met.


    Generally, infinite loops can cause apps to become unresponsive. They are the
    result of a side effect of a bug in either the code or the logic.


    Listing [4-11](#A341013_4_En_4_Chapter.html#Par86) is an example of an infinite
    loop caused by a terminating condition that can never be met. The variable `x`
    will be checked with each iteration through the `while` loop but will never be
    equal to 5\. The variable `x` will always be an even number because it was initialized
    to zero and incremented by two in the loop. This will cause the loop to repeat
    endlessly. See Listing [4-12](#A341013_4_En_4_Chapter.html#Par87).


    ```

    var x = 0

    while x != 5 {

    // do something

    x = x + 2

    }

    //....continue

    Listing 4-11.

    An Example of an Infinite Loop

    ```


    ```

    while true {

    // do something forever

    }

    //....continue

    Listing 4-12.

    An Example of an Infinite Loop Caused by a Terminating Condition That Can Never
    Be Met

    ```'
