  trans: "\n# 总结\n\n恭喜你，你已经完成了本书的第一章。理解以下术语至关重要，因为本书后续内容将不断强化这些概念：\n\n- 计算机程序\n- 算法\n\
    - 设计要求\n- 用户界面\n- Bug（程序错误）\n- 质量保证（QA）\n- 调试\n- 面向对象编程（OOP）\n- 对象\n- 属性\n- 方法\n\
    - 对象的状态\n- 集成开发环境（IDE）\n\n## 下一章节\n\n剩余章节将提供你学习 Swift 和编写 iOS 应用所需的信息。术语和概念会反复出现并不断强化，因此你会逐渐熟悉它们。请坚持下去，对自己保持耐心。\n\
    \n## 练习题\n\n- 回答以下问题：\n  - 为什么在用户需求上花费时间如此重要？\n  - 设计要求和算法有什么区别？\n  - 方法和属性有什么区别？\n\
    \  - 什么是 Bug？\n  - 什么是状态？\n- 编写一个自动售货机的算法，描述从投入硬币到汽水售出的整个过程。假设每瓶汽水的价格为 80 美分。\n\
    - 为一个用于操控自动售货机的应用编写设计要求。\n\n# 2. 编程基础\n\n本章重点介绍成为一名优秀 Swift 程序员所必备的基础知识。本章涵盖如何使用\
    \ Playground 用户界面、如何编写你的第一个 Swift 程序，以及如何使用 Xcode 集成开发环境（IDE）。\n\n> 注：我们将向你介绍如何使用\
    \ Playground，它能让你立即开始编程，而无需担心 Xcode 项目的所有复杂性。我们采用这种方式是为了帮助你快速掌握概念，避免挫败感，并为你打下坚实的基础。\n\
    \n## Xcode 漫游\n\nXcode 中的 Playground 让编写 Swift 代码变得极其简单且有趣。输入一行代码，结果会立即显示。如果你的代码需要运行一段时间（例如在循环或分支中），你可以在时间线区域观察其进度。在\
    \ Playground 中完成代码后，你可以轻松地将代码迁移到 Swift iOS 项目中。借助 Xcode Playground，你可以实现以下操作：\n\
    \n- 设计或修改算法，并实时观察每一步的结果\n- 创建新的测试，在将其纳入测试套件之前验证其有效性\n\n首先，你需要进一步了解 Xcode 用户界面。当你打开一个\
    \ Xcode iOS 项目时，你会看到如图 2-1 所示的界面。\n\nXcode 用户界面旨在帮助你高效编写 Swift 应用。该用户界面还能帮助新程序员学习\
    \ iOS 应用的用户界面。接下来，你将探索 Xcode 的 IDE 工作区和 Playground 的主要区域。\n\n![图 2-1. 包含 Swift\
    \ 项目的 Xcode 集成开发环境](img/A341013_4_En_2_Fig1_HTML.jpg)\n\n### 探索工作区窗口\n\n工作区窗口（如图\
    \ 2-2 所示）允许你打开和关闭文件、设置应用偏好、开发和编辑应用，以及查看文本输出和错误控制台。\n\n工作区窗口是你创建和管理项目的主要界面。它会自动适应当前的任务，并且你可以进一步配置窗口以适应你的工作风格。你可以根据需要打开多个工作区窗口。\n\
    \n![图 2-2. Xcode 的工作区窗口](img/A341013_4_En_2_Fig2_HTML.jpg)\n\n工作区窗口包含四个主要区域：编辑器、导航器、调试区和实用工具区。\n\
    \n当你选择一个项目文件时，其内容会出现在编辑器区域，Xcode 会在相应的编辑器中打开该文件。\n\n你可以通过工具栏中视图选择器的按钮来隐藏或显示其他三个区域。这些按钮位于窗口的右上角。\n\
    \n- ![导航器按钮](img/A341013_4_En_2_Figa_HTML.jpg) 单击此按钮可显示或隐藏导航器区域。在这里，你可以查看和浏览项目中的文件及其他方面。\n\
    - ![调试按钮](img/A341013_4_En_2_Figb_HTML.jpg) 单击此按钮可显示或隐藏调试区域。在这里，你可以控制程序执行并调试代码。\n\
    - ![实用工具按钮](img/A341013_4_En_2_Figc_HTML.jpg) 单击此按钮可显示或隐藏实用工具区域。实用工具区域有多种用途，最常见的是查看和修改文件的属性，以及向项目中添加现成的资源。\n\
    \n### 导航工作区\n\n你可以从导航器区域访问项目中的文件、符号、单元测试、诊断信息及其他功能。在导航器选择栏中，你可以选择适合当前任务的导航器。每个导航器的内容区域都能让你访问项目中相关的部分，而每个导航器的过滤栏则允许你限制显示的内容。\n\
    \n在导航器选择栏中，可以选择以下选项：\n\n- ![项目导航器图标](img/A341013_4_En_2_Figd_HTML.jpg) **项目导航器。**\
    \ 添加、删除、分组和管理项目中的文件；或选择文件在编辑器区域中查看或编辑其内容。\n- ![源代码管理导航器图标](img/A341013_4_En_2_Fige_HTML.jpg)\
    \ **源代码管理导航器。** 当你使用版本控制系统（VCS）（如 Git 或 Subversion (SVN)）时，查看对项目文件所做的详细更改历史。\n\
    - ![符号导航器图标](img/A341013_4_En_2_Figf_HTML.jpg) **符号导航器。** 浏览项目中的类层次结构。\n- ![查找导航器图标](img/A341013_4_En_2_Figg_HTML.jpg)\
    \ **查找导航器。** 使用搜索选项和过滤器快速查找项目中的文本。\n- ![问题导航器图标](img/A341013_4_En_2_Figh_HTML.jpg)\
    \ **问题导航器。** 查看在打开、分析和构建项目时发现的诊断信息、警告和错误等问题。\n- ![测试导航器图标](img/A341013_4_En_2_Figi_HTML.jpg)\
    \ **测试导航器。** 创建、管理、运行和审查单元测试。\n- ![调试导航器图标](img/A341013_4_En_2_Figj_HTML.jpg)\
    \ **调试导航器。** 在程序执行期间的指定时间点检查正在运行的线程及相关的堆栈信息。\n- ![断点导航器图标](img/A341013_4_En_2_Figk_HTML.jpg)\
    \ **断点导航器。** 通过指定触发条件等特性来微调断点，并在一处查看项目中所有的断点。\n- ![报告导航器图标](img/A341013_4_En_2_Figl_HTML.jpg)\
    \ **报告导航器。** 查看构建历史记录。\n"
- fmt: '### Editing Your Project Files


    Most development work in Xcode occurs in the Editor area, which is the main area
    that is always visible within the workspace window. The editors you will use most
    often are as follows:


    - **Source editor**: Write and edit Swift source code.

    - **Interface Builder**: Graphically create and edit user interface files (see
    Figure [2-3](#A341013_4_En_2_Chapter.html#Fig3)).

    - **Project editor**: View and edit how your apps should be built, such by specifying
    build options, target architectures, and app entitlements.


    When you select a file, Xcode opens the file in an appropriate editor. In Figure
    [2-3](#A341013_4_En_2_Chapter.html#Fig3), the file `Main.storyboard` is selected
    in the Project navigator, and the file is open in Interface Builder.


    ![A341013_4_En_2_Fig3_HTML.jpg](A341013_4_En_2_Fig3_HTML.jpg)


    Figure 2-3. Xcode’s Interface Builder showing a storyboard file


    The editor offers three controls:


    - ![A341013_4_En_2_Figm_HTML.jpg](A341013_4_En_2_Figm_HTML.jpg) Clicking this
    button opens the **Standard editor**. You will see a single editor pane with the
    contents of the selected file.

    - ![A341013_4_En_2_Fign_HTML.jpg](A341013_4_En_2_Fign_HTML.jpg) Clicking this
    button opens the **Assistant editor**. You will see a separate editor pane with
    content logically related to that in the Standard editor pane.

    - ![A341013_4_En_2_Figo_HTML.jpg](A341013_4_En_2_Figo_HTML.jpg) Clicking this
    button opens the **Version editor**. You will see the differences between the
    selected file in one pane and another version of that same file in a second pane.
    Used when working with source control.


    ## Creating Your First Swift Playground Program


    Now that you have learned a little about Xcode, it’s time to write your first
    Swift playground program and begin to understand the Swift language, Xcode, and
    some syntax. First, you have to install Xcode.


    ### Installing and Launching Xcode 9


    Xcode 9 is available for download from the Mac App Store for free, as shown in
    Figure [2-4](#A341013_4_En_2_Chapter.html#Fig4).


    ![A341013_4_En_2_Fig4_HTML.jpg](A341013_4_En_2_Fig4_HTML.jpg)


    Figure 2-4. Xcode 9 is available for download from the Mac App Store for free


    > **Note**

    > This package has everything you need to write iOS, watchOS, tvOS, and macOS
    apps. To publish apps on the iOS or macOS App Stores, you will need to apply for
    the Apple Developer Program and pay $99 when you’re ready to submit.


    Figure [2-5](#A341013_4_En_2_Chapter.html#Fig5) shows the Apple Developer Program
    website at `https://developer.apple.com/`.


    ![A341013_4_En_2_Fig5_HTML.jpg](A341013_4_En_2_Fig5_HTML.jpg)


    Figure 2-5. The Apple Developer Program


    Now that you have installed Xcode, let’s begin writing a Swift playground.


    Launch Xcode and click “Get started with a playground,” as shown in Figure [2-6](#A341013_4_En_2_Chapter.html#Fig6).


    ![A341013_4_En_2_Fig6_HTML.jpg](A341013_4_En_2_Fig6_HTML.jpg)


    Figure 2-6. Creating your first Swift playground


    ### Using Xcode 9


    After a new Xcode window opens, follow these steps:


    ![A341013_4_En_2_Fig7_HTML.jpg](A341013_4_En_2_Fig7_HTML.jpg)


    Figure 2-7. Choosing a Blank iOS playground template


    1.  Select a **Blank iOS** template and click Next, as shown in Figure [2-7](#A341013_4_En_2_Chapter.html#Fig7).

    2.  Name the playground `HelloWorld` and create it in a folder of your choice,
    like `Documents` or the `Desktop`.


    Xcode does a lot of work for you and creates a playground file with code ready
    for you to use. It also opens your playground file in your Xcode editor so you
    can start, as shown in Figure [2-8](#A341013_4_En_2_Chapter.html#Fig8).


    ![A341013_4_En_2_Fig8_HTML.jpg](A341013_4_En_2_Fig8_HTML.jpg)


    Figure 2-8. The playground window


    You now need to become familiar with the Xcode playground IDE. Let’s look at two
    of the most often used features:


    - The Editor area

    - The Results area


    ## Xcode Playground IDE: Editor and Results Areas


    The Editor area is the business end of the Xcode playground IDE — where your dreams
    are turned into reality. It is where you write your code. As you write your code,
    you will notice it changes color. Sometimes, Xcode will even try to autocomplete
    words for you. The colors have meanings that will become apparent as you use the
    IDE. The Editor area is also where you debug your code.


    > **Note**

    > Even if we’ve mentioned it already, it is worth saying again: You will learn
    Swift programming by reading this book, but you will really learn Swift by writing
    and debugging your code. Debugging is where developers learn and become great
    developers.


    Let’s add a line of code to see the power of Swift playgrounds. Add the following
    code at the end of the file, on line 6:


    ```swift

    print(str)

    ```


    As soon as you enter the line of code, Xcode automatically executes the line and
    shows the result, `"Hello, playground\n"`.


    When you write Swift code, everything is important — commas, capitalization, and
    parentheses. The collection of rules that enable the compiler to compile your
    code to an executable app is called syntax.


    Line 5 creates a string variable called `str` and assigns `"Hello, playground"`
    to the variable.


    Line 6 prints the `str` string variable to the **Results Area**.


    Let’s create a syntax error by changing line 6 to `print(stz)` as shown in Figure
    [2-9](#A341013_4_En_2_Chapter.html#Fig9) below.


    ![A341013_4_En_2_Fig9_HTML.jpg](A341013_4_En_2_Fig9_HTML.jpg)


    Figure 2-9. The playground with a syntax error caught by the Swift compiler


    In Swift, `print` is a function that will print the contents of its parameters
    in the Results area. As you enter code, the Results area automatically updates
    with the results for each line of code that you entered.


    Now, let’s fix the app by spelling the `str` variable correctly, as shown in Figure
    [2-10](#A341013_4_En_2_Chapter.html#Fig10).


    ![A341013_4_En_2_Fig10_HTML.jpg](A341013_4_En_2_Fig10_HTML.jpg)


    Figure 2-10. Syntax error fixed


    Feel free to play around and change the text that is printed. You may want to
    add multiple variables or add two strings together. Have fun!


    ## Summary


    In this chapter, you built your first basic Swift playground. We also covered
    new Xcode terms that are key to your understanding of Swift.


    > **Key to Success**

    > As mentioned in the introduction of the book, you can visit `http://www.xcelme.com/`
    and click the Free Videos tab to view videos related to this chapter. The videos
    will help you understand more about Xcode, IDEs, and playgrounds. Also visit `http://forum.xcelme.com/`
    to ask questions about these concepts.


    The concepts that you should understand are as follows:


    - Playground

    - Editor area

    - Results area


    **Exercise**


    - Extend your playground by adding a line of code that prints any text of your
    choosing.


    # 3. It’s All About the Data


    As you probably know, data is stored as zeros and ones in your computer’s memory.
    However, zeros and ones are not very useful to developers or app users, so you
    need to know how your program uses data and how to work with the data that is
    stored.


    In this chapter, you look at how data is stored on computers and how you can manipulate
    that data. You then use playgrounds to learn more about data storage.


    ## Numbering Systems Used in Programming


    Computers work with information differently than humans do. This section covers
    the various ways information is stored, tallied, and manipulated by devices such
    as your iPhone and iPad.'
