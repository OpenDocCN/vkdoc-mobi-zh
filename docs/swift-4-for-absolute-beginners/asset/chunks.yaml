  trans: '

    ## 小结


    你终于读完了这一章！以下是本章涵盖内容的总结：


    - **面向对象编程（OOP）**：你了解了 OOP 的重要性以及现代代码都应采用此方法论的原因。

    - **对象**：你学习了 OOP 中的对象及其与现实世界对象的对应关系。同时，你还了解了与现实世界对象不对应的抽象对象。

    - **类**：你了解了类决定了每个对象将拥有的数据类型（属性）和方法。每个对象都必须有一个类，类就是对象的蓝图。

    - **创建类**：你学习了如何规划类的属性与方法。

    - **创建类文件**：你使用 Xcode 创建了一个类文件。

    - **编辑文件**：你编辑了 Swift 文件以添加属性和方法。


    ### 练习


    - 尝试为你规划的其他类创建类文件。

    - 规划一个 `Author` 类，选择你需要存储的关于作者的信息类型。


    **面向大胆与进阶的读者**：


    - 尝试创建一个名为 `PrintedMaterial` 的超类，规划该类可能具有的属性。

    - 为商店可能销售的其他类型的印刷品创建类。


    # 6. 学习 Swift 与 Xcode


    在很大程度上，所有编程语言都能执行计算机所需的典型任务——存储信息、比较信息、对这些信息做出决策，并根据这些决策执行某些操作。Swift 语言让这些任务更易于理解和完成。使用
    Swift 的真正技巧（实际上也是大多数编程语言的技巧）在于理解用于完成这些任务的符号和关键字。本章将继续探讨 Swift 和 Xcode，帮助你更加熟悉它们。


    ## 新生语言


    你可能知道，Swift 诞生时间并不长。Swift 语言大约在四年前由克里斯·拉特纳开始开发，并于 2014 年 9 月 9 日正式发布了 Swift 1.0。Swift
    从 Objective-C 中借鉴了许多思想，同时也融合了现代编程语言的众多特性。Swift 从设计之初就致力于让普通程序员也能轻松上手。


    目前，主要有两种编程语言类型。编译型语言（如 Objective-C 和 C++）以语法严格、需遵循特定语法规则而著称，同时执行速度显著更快。解释型语言（如
    Ruby、PHP 和 Python）则以更易学习和编码而闻名，但执行速度较慢。Swift 是一种弥合两者差距的语言。它融合了解释型语言的灵活性——这也是其广受欢迎的原因——与满足高要求应用和游戏所需的性能。事实上，苹果声称
    Swift 应用的执行速度将快于用 Objective-C 编写的应用。在苹果的一些测试中，Swift 的执行速度几乎是 Python 的四倍，比 Objective-C
    快 40%。


    ## 理解语言符号


    理解符号是任何编程语言的基础。符号是在源代码中用于表达特定含义的标点符号。要使用一门语言，必须理解其符号。以下是 Swift 中使用的一些符号和语言结构，其中大部分你已通过不同方式接触过：


    - `{`：这是左大括号。用于开始通常所说的代码块。代码块用于定义并包围一段代码，并确定其作用域。

    - `}`：这是右大括号。用于结束一个代码块。只要有左大括号（`{`），就必须有对应的右大括号（`}`）。

    - `[]`：这是左方括号和右方括号。用于数组的声明和使用。

    - `func methodName() -> String`：这是 Swift 函数的定义方式。当然，`methodName` 一词可以代表任意名称，`String`
    一词也可更改。它表示方法返回的信息类型。在此示例中，`String` 表示该方法将返回一个字符串，即一组字符（数据类型已在第 3 章介绍，后续章节将进一步深入探讨）。本章稍后将对此进行更详细的讨论。


    图 6-1 展示了一个 Swift 代码示例。


    ![A341013_4_En_6_Fig1_HTML.jpg](img/A341013_4_En_6_Fig1_HTML.jpg)


    **图 6-1.** Swift 代码示例


    第 1 行代表一个 Swift 函数。空括号 `()` 表明该函数不接收任何变量。括号后没有 `->` 意味着该函数不返回任何类型的数据，如果被调用，也不会向调用者返回值。


    第 1 行末尾和第 4 行是大括号，用于定义代码块。这个代码块就定义了该方法。每个方法至少有一个代码块。


    第 2 行创建了一个名为 `hello` 的常量。正如你之前所学，常量是一个不能更改的值，即恒定不变的值。常量 `hello` 的值被赋为 `"Hello
    World!"`。由于你将 `hello` 赋值为一个 `String` 值，因此 `hello` 变成了一个 `String` 类型，并可以使用与 `String`
    相关的任何方法（回忆一下，你第一次接触字符串是在第 3 章）。第 3 行可以重写为：


    ```

    let hello: String = "Hello World!"

    ```


    第 3 行是对 `print` 函数的调用。你向该方法传入对象，以便打印 `hello` 这个 `String` 对象。


    虽然对于刚学 Swift 的人来说，这看起来有些难以理解，但这种简洁扼要的语法并不需要花费太多时间就能学会。

    '
- fmt: '# Implementing Objects in Swift


    Swift was built from the ground up to be object oriented. It incorporates the
    best parts of Objective-C without the constraints of being compatible with C.
    It also takes some of the best features of a scripted language. The following
    are some of the concepts that make Swift object oriented. Don’t worry if some
    of these terms seem unfamiliar; they will be discussed in later chapters (Chapters
    [7](#A341013_4_En_7_Chapter.html) and [8](#A341013_4_En_8_Chapter.html) cover
    the basics).


    - Pretty much everything is an object.

    - Objects contain instance variables.

    - Objects and instance variables have a defined scope.

    - Classes hide an object’s implementation.


    **Note:** As you saw in Chapter [5](#A341013_4_En_5_Chapter.html), the term class
    is used to represent, generically, the definition or type of an object. An object
    is created from the class. For example, an SUV is a class of vehicle. A class
    is a blueprint of sorts. A factory builds SUVs. The results are SUV objects that
    people drive. You can’t drive a class, but you can drive an object built from
    a class.


    So, how do these concepts translate to Swift? Swift is flexible in the implementation
    of classes.


    **Note:** Even though in Swift a single file may contain many different classes,
    a programmer will want to separate the code into different files to make access
    easier.


    Let’s look at a complete definition of a Swift class called `HelloWorld` (Figure
    [6-2](#A341013_4_En_6_Chapter.html#Fig2)).


    ![A341013_4_En_6_Fig2_HTML.jpg](A341013_4_En_6_Fig2_HTML.jpg)


    **Figure 6-2.** HelloWorld class


    In the preceding example, a class called `HelloWorld` is being defined. This class
    has only one method defined: `logMessage`. What do all these strange symbols mean?
    Using the line numbers as a reference, you can review this code line by line.


    Line 1 contains a compiler directive, `import Foundation`. For this little program
    to know about certain other objects, you need to have the compiler read other
    interface files. In this case, the `Foundation` file defines the objects and interfaces
    to the Foundation framework. This framework contains the definition of most non-user-interface
    base classes of the iOS and macOS systems. You will not be using any Foundation
    framework–specific objects in this example, but it is a default part of any new
    Swift file.


    The actual start of the object is on line 4, as follows:


    ```

    class HelloWorld {

    ```


    `HelloWorld` is the class. If you wanted `HelloWorld` to be a subclass of a logging
    class you had created, such as `LogFile`, you would change the declaration as
    follows:


    ```

    class HelloWorld: LogFile  {

    ```


    Line 6 contains a method definition for this object, as follows:


    ```

    func logMessage() {

    ```


    When you’re defining a method, you must decide whether you want the method to
    be a type or an instance method. In the case of the `HelloWorld` object, you are
    using the default method type, which is an instance. This method can only be used
    after an object is created. If the word `class` is added before the `func`, the
    method can be used before an object is created, but you will not have access to
    properties in the object. If you changed `logMessage` to a type method, it would
    be as follows:


    ```

    class func logMessage() {

    ```


    Lines 7 and 8 contain the body of the method. You learned about the details of
    the statements earlier in the chapter.


    That’s the complete description of class `HelloWorld`; there’s not a whole lot
    here. More complicated objects simply have more methods and more properties.


    But wait, there is more. Now that you have a new Swift class defined, how is it
    used? Figure [6-3](#A341013_4_En_6_Chapter.html#Fig3) shows another piece of code
    that uses the newly created class.


    ![A341013_4_En_6_Fig3_HTML.jpg](A341013_4_En_6_Fig3_HTML.jpg)


    **Figure 6-3.** Calling a Swift method


    The first line defines a constant called `myHelloWorld`. It then assigns the constant
    to an instance of the `HelloWorld` class. The second line simply calls the `logMessage`
    method of the `myHelloWorld` object. Those who have spent time in Objective-C
    will quickly see how much shorter and efficient both the class declaration and
    the object creation are in Swift.


    **Note:** Instantiation makes a class a real object in the computer’s memory.
    A class by itself is not really usable until there is an instance of it. Using
    the SUV example, an SUV means nothing until a factory builds one (instantiates
    the class). Only then can the SUV be used.


    Method calls can also accept multiple arguments. Consider, for example, `myCarObject.switchRadioBandTo(FM,
    104.7)`. The method here would be `switchRadioBandTo`. The two arguments are contained
    in the parentheses. Being consistent in naming methods is critical.


    ## Writing Another Program in Xcode


    When you first open Xcode, you will be presented with a Welcome to Xcode screen.
    This screen provides some nice shortcuts to access recently used Xcode projects.
    Until you are more comfortable with Xcode, keep the “Show this window when Xcode
    launches” check box selected.'
