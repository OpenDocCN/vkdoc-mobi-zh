  trans: '

    # 创建 Apple Watch 应用


    第一步是在 `Xcode` 中新建一个项目。在顶部，选择 watchOS 标题下的 Application 作为项目类型。然后选择 iOS App with
    WatchKit App，如图 15-1 所示。


    ![A341013_4_En_15_Fig1_HTML.jpg](img/A341013_4_En_15_Fig1_HTML.jpg)


    图 15-1. 创建 watchOS 应用


    接下来，系统会提示您为项目命名。我们将本章的项目命名为 `BookStore`。您还会注意到，watchOS 应用与标准 iOS 应用相比，其选项有所不同。我们不会为此应用添加通知或复杂功能场景，因此请确保这些选项均未被勾选，如图
    15-2 所示。


    **注意**：`WatchKit` 提供了 iOS 应用中不具备的额外交互类型。Glances 是快速浏览应用内容的方式。例如，书店应用可能会有一个 Glance
    界面来展示畅销书。Glances 使用了手表上的特殊界面。Complications 则允许您的应用在表盘上直接提供简单信息。


    ![A341013_4_En_15_Fig2_HTML.jpg](img/A341013_4_En_15_Fig2_HTML.jpg)


    图 15-2. watchOS 应用选项


    随后，`Xcode` 会提示您保存项目。保存后，您将看到新创建的项目。在左侧，您会注意到项目中有两个额外的目标。一个是 `BookStore WatchKit
    App`，它包含应用的界面（故事板和资源）。第二个新目标是 `BookStore WatchKit Extension`，它将包含应用在 watchOS 上运行所需的所有代码。参见图
    15-3。


    ![A341013_4_En_15_Fig3_HTML.jpg](img/A341013_4_En_15_Fig3_HTML.jpg)


    图 15-3. 新的 WatchOS 目标


    点击 `BookStore WatchKit App` 目标中的 `Interface.storyboard`，您应该会看到类似图 15-4 的屏幕。这就是您空白的
    watchOS 应用故事板。您会注意到其尺寸比标准 iOS 故事板小得多。


    ![A341013_4_En_15_Fig4_HTML.jpg](img/A341013_4_En_15_Fig4_HTML.jpg)


    图 15-4. 界面故事板


    由于您要为 watchOS 应用创建一个书籍列表，因此需要在故事板中添加一个表格。在右下角搜索 table，然后将表格拖入 Interface Controller
    Scene，如图 15-5 所示。


    ![A341013_4_En_15_Fig5_HTML.jpg](img/A341013_4_En_15_Fig5_HTML.jpg)


    图 15-5. 添加表格


    `Xcode` 现在会为表格提供一个 Table Row。这类似于您在 iOS 应用中创建表格视图时使用的原型行。您需要创建一个类来控制它，但在此之前，我们先向其中添加一个标签。在对象库中搜索标签，并将一个标签拖到行上。参见图
    15-6。


    ![A341013_4_En_15_Fig6_HTML.jpg](img/A341013_4_En_15_Fig6_HTML.jpg)


    图 15-6. 向表格行添加标签


    默认情况下，标签位于 Table Row 的左上角。检查属性检查器，确保其高度和宽度能够根据内容自动调整（见图 15-7）。这将有助于确保您的应用在两种尺寸的
    Apple Watch 上都能良好运行。


    ![A341013_4_En_15_Fig7_HTML.jpg](img/A341013_4_En_15_Fig7_HTML.jpg)


    图 15-7. 允许标签自动扩展


    现在标签将扩展以填满整行。但是，默认情况下，标签只会显示一行文本。由于您要添加书名，可能需要多行才能容纳所有文本。选中标签后，查看右侧的属性检查器。找到 `Lines`
    属性并将其设置为 0，如图 15-8 所示。将行数设置为 0 是告诉 `Xcode` 可以使用所需任意多行。


    ![A341013_4_En_15_Fig8_HTML.jpg](img/A341013_4_En_15_Fig8_HTML.jpg)


    图 15-8. 设置 `Lines` 属性

    '
- fmt: '现在你需要添加一些代码以使用户界面工作。在左侧，展开`BookStore WatchKit Extension`文件夹并选择`InterfaceController.swift`文件，如图15-9所示。`InterfaceController`是WatchKit故事板中初始场景的默认控制器。


    ![A341013_4_En_15_Fig9_HTML.jpg](A341013_4_En_15_Fig9_HTML.jpg)


    *图15-9 打开InterfaceController.swift文件*


    你会注意到新的控制器文件中的默认方法与标准`UIViewController`中的不同。`willActivate()`相当于`viewWillAppear()`。


    你首先需要添加一个行的类定义。为此，将以下代码添加到文件底部，位于`InterfaceController`类的闭合花括号（`}`）之外。


    ```

    1   class BookRow: NSObject {

    2       @IBOutlet weak var bookLabel: WKInterfaceLabel!

    4   }

    ```


    第1行声明了一个名为`BookRow`的新类，它是`NSObject`的子类。第2行创建了一个名为`bookLabel`的属性。`bookLabel`的类是`WKInterfaceLabel`，这类似于你之前使用过的`UILabel`，但它适用于WatchKit。


    > **注意**：Swift允许在同一个Swift文件中声明多个类。当你只在该文件中与其他类一起使用这个类时，这种方式效果很好。在本例中，我们只会在`InterfaceController`类中使用这个行类。


    `InterfaceController.swift`文件现在将如图15-10所示。


    ![A341013_4_En_15_Fig10_HTML.jpg](A341013_4_En_15_Fig10_HTML.jpg)


    *图15-10 修改后的InterfaceController.swift文件*


    现在你可以将插座变量连接到界面。选择`Interface.storyboard`。然后通过点击Xcode窗口右上角带有两个圆圈的图标来打开助理编辑器，如图15-11所示。


    ![A341013_4_En_15_Fig11_HTML.jpg](A341013_4_En_15_Fig11_HTML.jpg)


    *图15-11 打开助理编辑器*


    使用助理编辑器时，Xcode为开发者提供了一种快速创建对象并将其与界面中的插座变量关联的方法。你首先需要创建一个表示表格的表格属性。从界面控制器场景中的表格按住Control键并拖动到右侧的`InterfaceController`类上，如图15-12所示。


    ![A341013_4_En_15_Fig12_HTML.jpg](A341013_4_En_15_Fig12_HTML.jpg)


    *图15-12 按住Control键拖动以创建插座变量*


    当你将`Table`对象释放到`InterfaceController`类上时，Xcode会提示你输入要创建的插座变量类型。保持默认设置不变，只需将名称改为`mainTable`，如图15-13所示。


    ![A341013_4_En_15_Fig13_HTML.jpg](A341013_4_En_15_Fig13_HTML.jpg)


    *图15-13 命名你的插座变量*


    点击Xcode窗口右上角的“文字行”图标返回标准编辑器。在界面控制器场景下，选择表格行控制器，如图15-14所示。


    ![A341013_4_En_15_Fig14_HTML.jpg](A341013_4_En_15_Fig14_HTML.jpg)


    *图15-14 选择表格行控制器*


