  trans: "\n# 在 Playground 中使用变量\n\n现在你已经了解了数据类型，让我们在一个 playground 中编写代码，实现两个数相加并显示总和。\n\
    \n1.  打开 `Xcode`，并选择“开始使用 playground”，如图 3-3 所示。\n\n    ![A341013_4_En_3_Fig3_HTML.jpg](img/A341013_4_En_3_Fig3_HTML.jpg)\n\
    \n    图 3-3. 创建一个 Playground\n\n2.  选择一个空白的 iOS 模板，然后点击“下一步”，如图 3-4 所示。最后，将你的\
    \ playground 命名为 `DataTypes`，并点击“创建”。\n\n    ![A341013_4_En_3_Fig4_HTML.jpg](img/A341013_4_En_3_Fig4_HTML.jpg)\n\
    \n    图 3-4. 选择空白的 iOS Playground 模板\n\n3.  当你的 playground 创建完成后，其中已经预先放置了两行代码，如图\
    \ 3-5 所示。\n\n    ![A341013_4_En_3_Fig5_HTML.jpg](img/A341013_4_En_3_Fig5_HTML.jpg)\n\
    \n    图 3-5. 两行代码\n\n4.  向这个 playground 中添加如下代码，如代码清单 3-3 所示。\n\n    ```\n   \
    \ 1 //: Playground - noun: a place where people can play\n    3 import UIKit\n\
    \    5 var str = \"Hello, playground\"\n    7 var firstNumber = 2\n    8 var secondNumber\
    \ = 3\n    10 var totalSum = firstNumber + secondNumber\n    12 firstNumber =\
    \ firstNumber + 1\n    13 secondNumber = secondNumber + 1\n    15 totalSum = firstNumber\
    \ + secondNumber\n    18 print(\"totalSum = \\(totalSum)\")\n    ```\n\n    代码清单\
    \ 3-3. Playground 加法演示\n\n你的 playground 应该如图 3-6 所示。\n\nPlaygrounds 的一个巧妙特性是，当你输入代码时，Swift\
    \ 会立即执行你输入的每一行代码，因此你可以马上看到结果。\n\n![A341013_4_En_3_Fig6_HTML.jpg](img/A341013_4_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6. 显示 Swift 代码结果的 Playground\n\n在 Swift 编程中使用的 `//` 使程序员可以为代码添加注释。注释不会被应用程序编译，它们作为程序员的笔记，或者更重要的是，作为后续开发人员的参考。注释有助于原始开发者和后来的开发者理解应用程序的开发方式。\n\
    \n有时，注释可能需要跨越多行，或仅覆盖一行中的部分内容。这可以通过 `/*` 和 `*/` 来实现。`/*` 和 `*/` 之间的所有文本都被视为注释，不会被编译。\n\
    \n`print` 是一个函数，它可以接受一个参数并打印其内容。\n\n**注意**：如果你的编辑器的菜单或装订线（包含程序行号的左列）与之前的截图不同，你可以在\
    \ `Xcode` 偏好设置中开启这些设置。你可以通过点击菜单栏中的 `Xcode` 菜单，然后选择“偏好设置”来打开 `Xcode` 偏好设置。参见图 3-7。\n\
    \n![A341013_4_En_3_Fig7_HTML.jpg](img/A341013_4_En_3_Fig7_HTML.jpg)\n\n图 3-7.\
    \ 为装订线添加行号\n\n# 总结\n\n在本章中，你学习了应用程序如何使用数据。你了解了如何初始化变量以及如何向它们赋值。我们解释了变量在声明时会关联一个数据类型，并且只有相同类型的数据才能赋值给变量。我们还讨论了变量与常量之间的区别，并介绍了可选类型。\n\
    \n在下一章中，我们将探讨如何使用布尔逻辑来控制应用程序中的数据流。\n\n## 练习\n\n* 在 Swift playground 中编写代码，将两个整数相乘并显示结果。\n\
    * 在 Swift playground 中编写代码，计算一个浮点数的平方并显示结果浮点数。\n* 在 Swift playground 中编写代码，将两个浮点数相减，并将结果存储为整数。请注意，不会进行四舍五入。\n\
    \n# 做出决策、程序流程与应用程序设计\n\n作为一名 iOS 开发者，最棒的事情之一就是你可以精确地告诉你的设备你想要做什么，它们就会照做——你的设备会不厌其烦地重复执行任务。这是因为\
    \ iOS 设备不在乎它们昨天有多辛苦，也不会让情绪干扰工作。这些设备不需要拥抱。\n\n而作为开发者，也有一个缺点：你必须考虑应用程序中所有可能出现的结果。许多开发者喜欢拥有这种控制权。他们乐于专注于应用程序的诸多细节；然而，需要处理如此多的细节有时会令人沮丧。正如本书引言中提到的，开发应用程序需要付出代价，这个代价就是时间。你花在开发和调试上的时间越多，就越能掌握所有细节，你的应用程序表现也越好。你必须付出这个代价才能成为一名成功的开发者。\n\
    \n计算机世界是黑白分明的，没有灰色地带。你的设备产生的结果，很多都基于真和假的条件。\n\n在本章中，你将学习计算机逻辑以及如何控制应用程序的流程。处理信息并得出结果是一切应用程序的核心。你的应用程序需要基于值和条件来处理数据。要做到这一点，你需要理解计算机如何执行逻辑运算，并根据应用程序获取的信息来执行代码。\n"
- fmt: '# Boolean Logic


    Boolean logic is a system for logical operations. Boolean logic uses binary operators
    such as `AND` and `OR` and the unary operator `NOT` to determine whether your
    conditions have been met. Binary operators take two operands. Unary operators
    take one operand.


    We just introduced a couple of new terms that can sound confusing; however, you
    probably use Boolean logic every day. Let’s look at a couple of examples of Boolean
    logic with the binary operators `AND` and `OR` in a conversation parents sometimes
    have with their teenage children:


    “You can go to the movies tonight if your room is clean `AND` the dishes are put
    away.”


    “You can go to the movies tonight if your room is clean `OR` the dishes are put
    away.”


    Boolean operators’ results are either `TRUE` or `FALSE`. In Chapter [3](#A341013_4_En_3_Chapter.html),
    we briefly introduced the Boolean data type. A variable that is defined as Boolean
    can contain only the values `TRUE` and `FALSE`.


    ```

    var seeMovies: Bool = false

    ```


    In the preceding example, the `AND` operator takes two operands: one to the left
    and one to the right of the `AND`. Each operand can be evaluated independently
    with a `TRUE` or `FALSE`.


    For an `AND` operation to yield a `TRUE` result, both sides of the `AND` have
    to be `TRUE`. In the first example, the teenager has to clean his or her room
    `AND` have the dishes done. If either one of the conditions is `FALSE`, the result
    is `FALSE` — no movies for the teenager.


    For an `OR` operation to yield a `TRUE` result, only one operand has to be `TRUE`,
    or both conditions can be `TRUE` to yield a `TRUE` result. In the second example,
    just a clean bedroom would result in the ability to go to the movies.


    Note


    In Objective-C and other programming languages, Boolean variables can hold integer
    variables; `0` represents `FALSE`, and any nonzero value represents `TRUE`. Swift’s
    strong type checking doesn’t allow this. Boolean variables in Swift can be assigned
    only `true` or `false`.


    A `NOT` statement is a unary operator. It takes just one operand to yield a Boolean
    result. Here’s an example:


    “You can `NOT` go to the movies.”


    This example takes one operand. The `NOT` operator turns a `TRUE` operand to a
    `FALSE` and a `FALSE` operand to a `TRUE`. Here, the result is a `FALSE`.


    `AND`, `OR`, and `NOT` are three common Boolean operators. Occasionally, you need
    to use more complex operators. `XOR`, `NAND`, and `NOR` are other common operations
    for iOS developers.


    The Boolean operator `XOR` means exclusive-or. An easy way to remember how the
    `XOR` operator works is the `XOR` operator will return a `TRUE` result if only
    one argument is TRUE, not both.


    Swift does not have the `NAND` and `NOR` operators built in, but just know that
    they simply mean NOT AND and NOT OR, respectively. After evaluating the `AND`
    or `OR` arguments, simply negate the result.


    ## Truth Tables


    You can use a tool to help you evaluate all the Boolean operators called a truth
    table, and it is a mathematical table used in logic to evaluate Boolean operators.
    They are helpful when trying to determine all the possibilities of a Boolean operator.
    Let’s look at some common truth tables for `AND`, `OR`, `NOT`, `XOR`, `NAND`,
    and `NOR`.


    In an `AND` truth table, there are four possible combinations of `TRUE` and `FALSE`.


    *   `TRUE AND TRUE` = `TRUE`

    *   `TRUE AND FALSE` = `FALSE`

    *   `FALSE AND TRUE` = `FALSE`

    *   `FALSE AND FALSE` = `FALSE`


    Placing these combinations in a truth table results in Table [4-1](#A341013_4_En_4_Chapter.html#Tab1).


    **Table 4-1.** An AND Truth Table


    | A | B | A AND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `FALSE` |


    An `AND` truth table produces a `TRUE` result only if both of its operands are
    `TRUE`.


    Table [4-2](#A341013_4_En_4_Chapter.html#Tab2) illustrates an `OR` truth table
    and all possible operands.


    **Table 4-2.** An OR Truth Table


    | A | B | A OR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    An `OR` truth table produces a `TRUE` result if one or both of its operands are
    `TRUE`.


    Table [4-3](#A341013_4_En_4_Chapter.html#Tab3) illustrates a `NOT` truth table
    and all possible operands.


    **Table 4-3.** A NOT Truth Table


    | A | NOT A |

    | --- | --- |

    | `TRUE` | `FALSE` |

    | `FALSE` | `TRUE` |


    A `NOT` flips the bit or negates the original operand’s Boolean value.


    Table [4-4](#A341013_4_En_4_Chapter.html#Tab4) illustrates an `XOR` (or exclusive-or)
    truth table and all possible operands.


    **Table 4-4.** An XOR Truth Table


    | A | B | A XOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    The operator `XOR` yields a `TRUE` result if only one of the operands is `TRUE`.


    Table [4-5](#A341013_4_En_4_Chapter.html#Tab5) illustrates a `NAND` truth table
    and all possible operands.


    **Table 4-5.** A NAND Truth Table


    | A | B | A NAND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `TRUE` |


    Table [4-6](#A341013_4_En_4_Chapter.html#Tab6) illustrates a `NOR` truth table
    and all possible operands.


    **Table 4-6.** A NOR Truth Table


    | A | B | A NOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `TRUE` |


    The easiest way to look at the `NAND` and `NOR` operators is to simply negate
    the results from the `AND` and `OR` truth tables, respectively.


    ## Comparison Operators


    In software development, you can compare different data items using comparison
    operators. These operators produce a logical `TRUE` or `FALSE` result. Table [4-7](#A341013_4_En_4_Chapter.html#Tab7)
    shows the list of comparison operators.


    **Table 4-7.** Comparison Operators


    | Operator | Definition |

    | --- | --- |

    | `>` | Greater than |

    | `<` | Less than |

    | `>=` | Greater than or equal to |

    | `<=` | Less than or equal to |

    | `==` | Exactly equal to |

    | `!=` | Not equal to |


    Note


    If you’re constantly forgetting which way the greater than and less than signs
    go, use a crutch we learned in grade school: if the greater than and less than
    signs represent the mouth of an alligator, the alligator always eats the bigger
    value. It may sound silly, but it works.


    # Designing Apps


    Now that we’ve introduced Boolean logic and comparison operators, you can start
    designing your apps. Sometimes it’s important to express all or parts of your
    apps to others without having to write the actual code.


    Writing pseudocode helps a developer think out loud and brainstorm with other
    developers regarding sections of code that are of concern. This helps to analyze
    problems and possible solutions before coding begins.'
  raw: '## Boolean Logic


    Boolean logic is a system for logical operations. Boolean logic uses binary operators
    such as `AND` and `OR` and the unary operator `NOT` to determine whether your
    conditions have been met. Binary operators take two operands. Unary operators
    take one operand.


    We just introduced a couple of new terms that can sound confusing; however, you
    probably use Boolean logic every day. Let’s look at a couple of examples of Boolean
    logic with the binary operators `AND` and `OR` in a conversation parents sometimes
    have with their teenage children:


    “You can go to the movies tonight if your room is clean AND the dishes are put
    away.”


    “You can go to the movies tonight if your room is clean OR the dishes are put
    away.”


    Boolean operators’ results are either `TRUE` or `FALSE`. In Chapter [3](#A341013_4_En_3_Chapter.html),
    we briefly introduced the Boolean data type. A variable that is defined as Boolean
    can contain only the values `TRUE` and `FALSE`.


    ```

    var seeMovies: Bool = false

    ```


    In the preceding example, the `AND` operator takes two operands: one to the left
    and one to the right of the `AND`. Each operand can be evaluated independently
    with a `TRUE` or `FALSE`.


    For an `AND` operation to yield a `TRUE` result, both sides of the `AND` have
    to be `TRUE`. In the first example, the teenager has to clean his or her room
    `AND` have the dishes done. If either one of the conditions is `FALSE`, the result
    is `FALSE` — no movies for the teenager.


    For an `OR` operation to yield a `TRUE` result, only one operand has to be `TRUE`,
    or both conditions can be `TRUE` to yield a `TRUE` result. In the second example,
    just a clean bedroom would result in the ability to go to the movies.


    Note


    In Objective-C and other programming languages, Boolean variables can hold integer
    variables; `0` represents `FALSE`, and any nonzero value represents `TRUE`. Swift’s
    strong type checking doesn’t allow this. Boolean variables in Swift can be assigned
    only `true` or `false`.


    A `NOT` statement is a unary operator. It takes just one operand to yield a Boolean
    result. Here’s an example:


    “You can NOT go to the movies.”


    This example takes one operand. The `NOT` operator turns a `TRUE` operand to a
    `FALSE` and a `FALSE` operand to a `TRUE`. Here, the result is a `FALSE`.


    `AND`, `OR`, and `NOT` are three common Boolean operators. Occasionally, you need
    to use more complex operators. `XOR`, `NAND`, and `NOR` are other common operations
    for iOS developers.


    The Boolean operator `XOR` means exclusive-or. An easy way to remember how the
    `XOR` operator works is the `XOR` operator will return a `TRUE` result if only
    one argument is TRUE, not both.


    Swift does not have the `NAND` and `NOR` operators built in, but just know that
    they simply mean NOT AND and NOT OR, respectively. After evaluating the `AND`
    or `OR` arguments, simply negate the result.


    ### Truth Tables


    You can use a tool to help you evaluate all the Boolean operators called a truth
    table , and it is a mathematical table used in logic to evaluate Boolean operators.
    They are helpful when trying to determine all the possibilities of a Boolean operator.
    Let’s look at some common truth tables for `AND`, `OR`, `NOT`, `XOR`, `NAND`,
    and `NOR`.


    In an `AND` truth table, there are four possible combinations of `TRUE` and `FALSE`.


    *   `TRUE AND TRUE` = `TRUE`

    *   `TRUE AND FALSE` = `FALSE`

    *   `FALSE AND TRUE` = `FALSE`

    *   `FALSE AND FALSE` = `FALSE`


    Placing these combinations in a truth table results in Table [4-1](#A341013_4_En_4_Chapter.html#Tab1).


    Table 4-1.


    An AND Truth Table


    | A | B | A AND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `FALSE` |


    An `AND` truth table produces a `TRUE` result only if both of its operands are
    `TRUE`.


    Table [4-2](#A341013_4_En_4_Chapter.html#Tab2) illustrates an `OR` truth table
    and all possible operands.


    Table 4-2.


    An OR Truth Table


    | A | B | A OR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    An `OR` truth table produces a `TRUE` result if one or both of its operands are
    `TRUE`.


    Table [4-3](#A341013_4_En_4_Chapter.html#Tab3) illustrates a `NOT` truth table
    and all possible operands.


    Table 4-3.


    A NOT Truth Table


    | A | NOT A |

    | --- | --- |

    | `TRUE` | `FALSE` |

    | `FALSE` | `TRUE` |


    A `NOT` flips the bit or negates the original operand’s Boolean value.


    Table [4-4](#A341013_4_En_4_Chapter.html#Tab4) illustrates an `XOR` (or exclusive-or)
    truth table and all possible operands.


    Table 4-4.


    An XOR Truth Table


    | A | B | A XOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    The operator `XOR` yields a `TRUE` result if only one of the operands is `TRUE`.


    Table [4-5](#A341013_4_En_4_Chapter.html#Tab5) illustrates a `NAND` truth table
    and all possible operands.


    Table 4-5.


    A NAND Truth Table


    | A | B | A NAND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `TRUE` |


    Table [4-6](#A341013_4_En_4_Chapter.html#Tab6) illustrates a `NOR` truth table
    and all possible operands.


    Table 4-6.


    A NOR Truth Table


    | A | B | A NOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `TRUE` |


    The easiest way to look at the `NAND` and `NOR` operators is to simply negate
    the results from the `AND` and `OR` truth tables, respectively.


    ### Comparison Operators


    In software development, you can compare different data items using comparison
    operators . These operators produce a logical `TRUE` or `FALSE` result. Table
    [4-7](#A341013_4_En_4_Chapter.html#Tab7) shows the list of comparison operators.


    Table 4-7.


    Comparison Operators


    | Operator | Definition |

    | --- | --- |

    | > | Greater than |

    | < | Less than |

    | >= | Greater than or equal to |

    | <= | Less than or equal to |

    | == | Exactly equal to |

    | != | Not equal to |


    Note


    If you’re constantly forgetting which way the greater than and less than signs
    go, use a crutch we learned in grade school: if the greater than and less than
    signs represent the mouth of an alligator, the alligator always eats the bigger
    value. It may sound silly, but it works.


    ## Designing Apps


    Now that we’ve introduced Boolean logic and comparison operators, you can start
    designing your apps. Sometimes it’s important to express all or parts of your
    apps to others without having to write the actual code.


    Writing pseudocode helps a developer think out loud and brainstorm with other
    developers regarding sections of code that are of concern. This helps to analyze
    problems and possible solutions before coding begins.'
  trans: '

    # 布尔逻辑


    布尔逻辑是一种用于逻辑运算的系统。它使用二元运算符（如`AND`和`OR`）以及一元运算符`NOT`来判断条件是否满足。二元运算符需要两个操作数，一元运算符需要一个操作数。


    前面我们引入了几个可能令人困惑的新术语；不过，你很可能每天都在使用布尔逻辑。让我们看几个父母与青春期孩子对话中运用二元运算符`AND`和`OR`的布尔逻辑示例：


    “如果你的房间打扫干净了`AND`盘子也收拾好了，今晚你就可以去看电影。”


    “如果你的房间打扫干净了`OR`盘子也收拾好了，今晚你就可以去看电影。”


    布尔运算符的结果要么是`TRUE`，要么是`FALSE`。在第 3 章中，我们简要介绍了布尔数据类型。定义为布尔类型的变量只能包含`TRUE`和`FALSE`这两个值。


    ```

    var seeMovies: Bool = false

    ```


    在前面的示例中，`AND`运算符需要两个操作数：一个在`AND`左侧，一个在右侧。每个操作数都可以独立判断为`TRUE`或`FALSE`。


    要使`AND`运算的结果为`TRUE`，`AND`两侧的操作数都必须为`TRUE`。在第一个示例中，青少年必须打扫房间`AND`洗完盘子。只要其中一个条件为`FALSE`，结果就是`FALSE`——青少年不能去看电影。


    要使`OR`运算的结果为`TRUE`，只需要一个操作数为`TRUE`，或者两个条件都为`TRUE`即可。在第二个示例中，只需卧室干净就能去看电影。


    注意


    在 Objective-C 和其他编程语言中，布尔变量可以存放整型变量；`0`代表`FALSE`，任何非零值代表`TRUE`。Swift 强大的类型检查不允许这样做。Swift
    中的布尔变量只能赋值为`true`或`false`。


    `NOT`语句是一元运算符。它只需要一个操作数就能产生布尔结果。示例如下：


    “你`NOT`能去看电影。”


    这个示例只用一个操作数。`NOT`运算符将`TRUE`操作数变为`FALSE`，将`FALSE`操作数变为`TRUE`。这里的结果是`FALSE`。


    `AND`、`OR`和`NOT`是三种常见的布尔运算符。有时你可能需要使用更复杂的运算符。`XOR`、`NAND`和`NOR`是 iOS 开发者常用的其他运算。


    布尔运算符`XOR`表示异或。记忆`XOR`运算符工作方式的一个简单方法是：只有当且仅当一个参数为`TRUE`（而非两者同时为`TRUE`）时，`XOR`运算符才返回`TRUE`结果。


    Swift 没有内置`NAND`和`NOR`运算符，但只需知道它们分别表示“与非”和“或非”即可。在评估`AND`或`OR`的参数后，直接对结果取反。


    ## 真值表


    你可以使用一种称为真值表的工具来评估所有布尔运算符，它是逻辑学中用于评估布尔运算符的数学表格。在试图确定布尔运算符的所有可能性时，真值表非常有用。我们来看一些常见的`AND`、`OR`、`NOT`、`XOR`、`NAND`和`NOR`真值表。


    在`AND`真值表中，共有四种`TRUE`和`FALSE`的组合。


    *   `TRUE AND TRUE` = `TRUE`

    *   `TRUE AND FALSE` = `FALSE`

    *   `FALSE AND TRUE` = `FALSE`

    *   `FALSE AND FALSE` = `FALSE`


    将这些组合放入真值表中，结果如表 4-1 所示。


    **表 4-1.** AND 真值表


    | A | B | A AND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `FALSE` |


    `AND`真值表只有在两个操作数均为`TRUE`时才产生`TRUE`结果。


    表 4-2 展示了`OR`真值表及其所有可能的操作数。


    **表 4-2.** OR 真值表


    | A | B | A OR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    `OR`真值表当一个或两个操作数为`TRUE`时产生`TRUE`结果。


    表 4-3 展示了`NOT`真值表及其所有可能的操作数。


    **表 4-3.** NOT 真值表


    | A | NOT A |

    | --- | --- |

    | `TRUE` | `FALSE` |

    | `FALSE` | `TRUE` |


    `NOT`运算会翻转比特位或取反原始操作数的布尔值。


    表 4-4 展示了`XOR`（异或）真值表及其所有可能的操作数。


    **表 4-4.** XOR 真值表


    | A | B | A XOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    运算符`XOR`只有当且仅当一个操作数为`TRUE`时才会产生`TRUE`结果。


    表 4-5 展示了`NAND`真值表及其所有可能的操作数。


    **表 4-5.** NAND 真值表


    | A | B | A NAND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `TRUE` |


    表 4-6 展示了`NOR`真值表及其所有可能的操作数。


    **表 4-6.** NOR 真值表


    | A | B | A NOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `TRUE` |


    理解`NAND`和`NOR`运算符最简单的方法，就是分别对`AND`和`OR`真值表的结果直接取反。


    ## 比较运算符


    在软件开发中，你可以使用比较运算符来比较不同的数据项。这些运算符会产生逻辑上的`TRUE`或`FALSE`结果。表 4-7 列出了比较运算符。


    **表 4-7.** 比较运算符


    | 运算符 | 定义 |

    | --- | --- |

    | `>` | 大于 |

    | `<` | 小于 |

    | `>=` | 大于或等于 |

    | `<=` | 小于或等于 |

    | `==` | 等于 |

    | `!=` | 不等于 |


    注意


    如果你总记不清大于号和小于号的方向，可以用我们小学时学到的一个小窍门：把大于号和小于号想象成鳄鱼的嘴巴，鳄鱼总是吃掉更大的数值。听起来可能有点傻，但很管用。


    # 设计应用


    既然我们已经介绍了布尔逻辑和比较运算符，你就可以开始设计应用了。有时，无需编写实际代码，向他人表达应用的全部或部分功能也是非常重要的。


    编写伪代码有助于开发者理清思路，并与其他开发者就关注的代码段进行头脑风暴。这有助于在编码开始前分析问题并寻找可能的解决方案。

