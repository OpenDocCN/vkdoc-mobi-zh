    Your guess is too low!\")\n   33             }\n   34         } else {\n   35\
    \             print(\"Invalid guess, please try again.\")\n   36         }\n \
    \  37     }\n   38     print (\"Play Again? Y or N\")\n   39     input = NSString(data:\
    \ FileHandle.standardInput.availableData, encoding:String.Encoding.utf8.rawValue)!\
    \ as String\n   40     input = input.replacingOccurrences(of: \"\\n\", with: \"\
    \", options: NSString.CompareOptions.literal, range: nil)\n   \n   42     if input\
    \ == \"N\" || input == \"n\" {\n   43         keepPlaying = false\n   44     }\n\
    \   45     continueGuessing = true\n   46 }\n   ```\n\n   Listing 4-13. Source\
    \ Code for Your Random Number Generator App\n\nIn Listing [4-13](#A341013_4_En_4_Chapter.html#Par95),\
    \ there is new code that we haven’t discussed before. The first new line of code\
