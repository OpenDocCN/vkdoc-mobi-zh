  trans: "\n### 创建用户界面\n\n接下来，需要设置主窗口以显示你的电台信息。\n\n1.  点击 `Main.storyboard` 文件。该文件生成\
    \ iPhone 主屏幕。点击“对象库”图标，如图 7-10 所示。\n\n    ![A341013_4_En_7_Fig10_HTML.jpg](img/A341013_4_En_7_Fig10_HTML.jpg)\n\
    \n    图 7-10. 向 iPhone 屏幕添加一个 `Label` 对象\n\n2.  拖拽三个 `Label` 对象到屏幕上，如图 7-11 所示。标签可以任意对齐，或者按图\
    \ 7-11 所示方式排列。\n\n3.  不过你需要留出空间。当 `Label` 对象位于 iPhone 屏幕上后，双击每个 `Label` 对象以更改其文本，使\
    \ iPhone 屏幕看起来像图 7-11 一样。\n\n    ![A341013_4_En_7_Fig11_HTML.jpg](img/A341013_4_En_7_Fig11_HTML.jpg)\n\
    \n    图 7-11. iPhone 屏幕上的所有三个 `Label` 对象\n\n4.  接下来，向屏幕添加一个 `Button` 对象，如图 7-12\
    \ 所示。点击此按钮将触发屏幕更新，显示你的电台信息。\n\n    ![A341013_4_En_7_Fig12_HTML.jpg](img/A341013_4_En_7_Fig12_HTML.jpg)\n\
    \n    图 7-12. 向屏幕添加一个 `Button` 对象\n\n5.  与 `Label` 对象类似，只需双击 `Button` 对象，将其标题更改为“My\
    \ Station”。按钮应会自动调整大小以适应新标题。\n\n6.  接下来，需要添加用于显示电台信息的 `Label` 字段。这些字段应放置在现有的 `Label`\
    \ 对象之后。图 7-13 显示了第一个标签的位置。放置 `Label` 对象后，需要调整其大小，使其能够显示更多文本，如图 7-14 所示。\n\n  \
    \  ![A341013_4_En_7_Fig14_HTML.jpg](img/A341013_4_En_7_Fig14_HTML.jpg)\n\n   \
    \ 图 7-14. 拉伸 `Label` 对象\n\n    ![A341013_4_En_7_Fig13_HTML.jpg](img/A341013_4_En_7_Fig13_HTML.jpg)\n\
    \n    图 7-13. 添加另一个 `Label` 对象\n\n    > 注：拉伸 `Label` 对象可以使 `Label` 的文本容纳足够长的字符串。如果不调整\
    \ `Label` 对象的大小，文本可能会被截断（因为空间不够），或者字体大小会变小。¹\n\n7.  重复操作，在现有的“频率”和“波段”标签旁边添加并调整一个\
    \ `Label` 对象的大小，如图 7-15 所示。暂时保留标签的默认文本“Label”也没问题。\n\n    ![A341013_4_En_7_Fig15_HTML.jpg](img/A341013_4_En_7_Fig15_HTML.jpg)\n\
    \n    图 7-15. 添加另一个 `Label` 对象\n\n### 连接代码\n\n现在所有用户界面对象都已就位，可以开始将这些界面元素连接到程序中的变量。如第\
    \ 6 章所述，通过连接用户界面对象与程序中的对象来完成此操作。\n\n1.  首先，将“电台名称”右侧的 `Label` 对象连接到变量，如图 7-16\
    \ 所示。右键单击（或按住 Control 键单击）视图控制器对象，并将其拖拽到“Station Name”文本旁边的 `Label` 对象上，以调出插座列表。\n\
    \n    ![A341013_4_En_7_Fig16_HTML.jpg](img/A341013_4_En_7_Fig16_HTML.jpg)\n\n\
    \    图 7-16. 创建连接\n\n2.  从视图控制器图标释放连接时，会显示另一个小菜单。点击你希望在此 `Label` 对象中显示的属性名称——本例中，你想要的是\
    \ `stationName` 属性，如图 7-17 所示。\n\n    ![A341013_4_En_7_Fig17_HTML.jpg](img/A341013_4_En_7_Fig17_HTML.jpg)\n\
    \n    图 7-17. 将 `Label` 连接到 `stationName` 属性\n\n3.  现在，界面上的 `Label` 对象已连接到 `stationName`\
    \ 属性。无论何时你设置该属性的值，屏幕也会随之更新。对“频率”和“波段”重复上述连接步骤。要连接按钮，需要在 `ViewController` 类中提供一个方法来处理。你可以前往\
    \ `ViewController.swift` 文件并在此添加。此外，还有一个添加 `@IBOutlet` 属性和 `@IBAction` 方法的快捷方式。在\
    \ Xcode 工具栏的右侧，点击图 7-18 所示的辅助编辑器图标（看起来像两个圆圈）。\n\n    ![A341013_4_En_7_Fig18_HTML.jpg](img/A341013_4_En_7_Fig18_HTML.jpg)\n\
    \n    图 7-18. 辅助编辑器图标\n\n    点击辅助编辑器图标后，会弹出一个显示 `ViewController` 源代码的第二个窗口。右键单击（或按住\
    \ Control 键单击）并将按钮拖拽到代码窗口中，如图 7-19 所示。\n\n    ![A341013_4_En_7_Fig19_HTML.jpg](img/A341013_4_En_7_Fig19_HTML.jpg)\n\
    \n    图 7-19. 使用辅助编辑器创建方法\n\n4.  松开鼠标时，会弹出一个小窗口，如图 7-20 所示。\n\n    ![A341013_4_En_7_Fig20_HTML.jpg](img/A341013_4_En_7_Fig20_HTML.jpg)\n\
    \n    图 7-20. 创建操作\n\n    选择“Action”并将名称设置为 `buttonClick`。Xcode 现在将为你创建方法。\n\n\
    \    通过添加图 7-21 所示的代码来完成你的方法。\n\n    ![A341013_4_En_7_Fig21_HTML.jpg](img/A341013_4_En_7_Fig21_HTML.jpg)\n\
    \n    图 7-21. 完成的 `buttonClick` 方法\n\n    让我们逐行浏览你刚添加的代码。首先，在第 39 行，你会注意到 `IBAction`\
    \ 属性。这告诉 Xcode 此方法可以作为操作的结果被调用。因此，当你去连接应用程序中的某个操作时，你会看到这个方法。\n\n    第 40 行和第 41\
    \ 行都将文本字段设置为 `RadioStation` 类中的值。第 40 行如下：\n\n    ```\n    stationName.text =\
    \ myStation.name\n    ```\n\n    `stationName` 变量是你刚刚连接到用户界面 `Label` 对象的那个，而 `myStation.name`\
    \ 用于返回电台名称。\n\n    第 41 行实际上与第 40 行功能相同，但你需要先将双精度值（电台频率）转换为字符串。`\\(myStation.frequency)`\
    \ 会将频率属性的值代入字符串中。\n\n    第 42 到 46 行同时使用了 `RadioStation` 类的实例变量和类型方法。这里，你只需在 `myStation`\
    \ 对象上调用 `isBandFM()` 方法。如果是，则该电台是 FM 电台，`isBandFM()` 将返回 1；否则，假定其为 AM 波段。第 43\
    \ 行和第 45 行在屏幕上显示波段值。\n\n    > 提示：当用户触摸按钮内部然后释放时，按钮会发送 Touch Up Inside 事件——只有在用户抬起手指时，事件才会被实际发送。\n\
    \n### 运行程序\n\n连接完成后，你就可以运行并测试程序了！为此，只需点击 Xcode 窗口左上角的“运行”按钮，如图 7-22 所示。\n\n![A341013_4_En_7_Fig22_HTML.jpg](img/A341013_4_En_7_Fig22_HTML.jpg)\n\
    \n图 7-22. 点击播放按钮运行程序\n\n如果没有编译错误，iPhone 模拟器将会启动，你应该能看到你的应用程序。只需点击“My Station”按钮，电台信息就会显示出来，如图\
    \ 7-23 所示。\n\n![A341013_4_En_7_Fig23_HTML.jpg](img/A341013_4_En_7_Fig23_HTML.jpg)\n\
    \n图 7-23. 显示你的电台信息\n\n如果显示或运行效果不正确，请回溯操作步骤，确保本章描述的所有代码和连接都已正确就位。\n"
- fmt: "### Taking Type Methods to the Next Level\n\nIn your program, you haven’t\
    \ taken advantage of all the type methods for `RadioStation`, but this chapter\
    \ does describe what a type method is and how it is used. Use that knowledge to\
    \ try a few of the exercises mentioned at the end of this chapter. Just play around\
    \ with this simple working program by adding or changing type or instance methods\
    \ to get an idea of how they work.\n\n### Accessing the Xcode Documentation\n\n\
    There is a wealth of information provided in the Xcode developer documentation.\
    \ When Xcode is opened, select Help ➤ Documentation and API Reference (see Figure\
    \ [7-24](#A341013_4_En_7_Chapter.html#Fig24)) to open the Documentation window.\n\
    \n![A341013_4_En_7_Fig24_HTML.jpg](A341013_4_En_7_Fig24_HTML.jpg)\n\nFigure 7-24.\n\
    \nThe Xcode Help menu\n\nOnce it’s opened, the search window can be used to look\
    \ up any of the Swift classes you’ve used in this chapter, including the `String`\
    \ class documentation, as shown in Figure [7-25](#A341013_4_En_7_Chapter.html#Fig25).\n\
    \n![A341013_4_En_7_Fig25_HTML.jpg](A341013_4_En_7_Fig25_HTML.jpg)\n\nFigure 7-25.\n\
    \nXcode documentation\n\nThere are several different things to discover about\
    \ the `String` class shown in Figure [7-25](#A341013_4_En_7_Chapter.html#Fig25).\
    \ Go through the documentation and the various companion guides that Apple provides.\
    \ This will give you a more thorough understanding of the various classes and\
    \ the various methods supported by them.\n\n### Summary\n\nOnce again, congratulate\
    \ yourself for being able to single-handedly stuff your brain with a lot of information!\
    \ Here is a summary of what was covered in this chapter:\n\n*   Swift classes\
    \ review\n    *   Type methods\n    *   Instance methods\n*   Creating a class\n\
    \    *   Limitations of using type methods versus instance methods\n    *   Initializing\
    \ the class and making use of the instance variables\n*   Making use of your new\
    \ `RadioStation` object\n    *   Building an iPhone app that uses your new object\n\
    \    *   Connecting interface classes to properties\n    *   Connecting user interface\
    \ events to methods in your class\n\nExercises\n\n*   Change the code that creates\
    \ your `RadioStation` class and make the station’s name much longer than what\
    \ can appear on the screen. What happens?\n*   Change the current button and add\
    \ a new button. Label the buttons FM and AM. If the user clicks the FM button,\
    \ show an FM station. If the user clicks the AM button, display an AM station.\
    \ (Hint: you’ll need to add a second `RadioStation` object to the `ViewController.swift`\
    \ file.)\n*   Clean up the interface a little by making sure that the user doesn’t\
    \ see the text “Label” when the iPhone application first starts.\n    *   Fix\
    \ the issue by using the interface tool.\n    *   How could you fix this by adding\
    \ code to the application instead?\n*   Add more validation to the `@IBAction\
    \ func buttonClick(_ sender: AnyObject)` method. Right now, it validates FM ranges\
    \ but not AM ranges. Fix the code so that it also validates an AM range.\n   \
    \ *   If the radio station frequency is out of bounds, use the existing labels\
    \ to display some type of error message.\n\nFootnotes [1](#A341013_4_En_7_Chapter.html#Fn1_source)\n\
    \nBy using either code or Interface Builder, you can customize how the Label object\
    \ reacts to text that is too large to fit. The behavior described is based on\
    \ typical defaults for the Label object.\n\n# 8. Programming Basics in Swift\n\
    \nSwift is an elegant language. It mixes the efficiency of a compiled language\
    \ with the flexibility and modern features of many scripting languages.\n\nThis\
    \ chapter introduces some of the more common concepts in Swift, such as properties\
    \ and collection classes. It also shows how properties are used from within Xcode\
    \ when dealing with user interface elements. This sounds like a lot to accomplish,\
    \ but Swift, the Foundation framework, and the Xcode tool provide a wealth of\
    \ objects and methods and a way to build applications with ease.\n\n### Using\
    \ `let` vs. `var`\n\nIf you have spent much time with Swift, you have seen the\
    \ word `var` appear before variable declarations. You may also have seen `let`\
    \ before other declarations. The word `var` is used to define a variable, while\
    \ the word `let` is used to define a constant. This means that if you declare\
    \ a value with `let`, you will not be able to change the value. The following\
    \ code defines a constant:\n\n```\nlet myName = \"Brad\"\n```\n\nOnce you define\
    \ a constant, you cannot change the value.\n\nCaution\n\nXcode will now warn you\
    \ if you declare a variable and never change its value. It will recommend using\
    \ `let` instead of `var`.\n\n```\nmyName = \"John\"\n```\n\nThis will give you\
    \ an error. It you want to create a mutable or changeable variable, you need to\
    \ use `var`. For example, you can do the following:\n\n```\nvar myName = \"Brad\"\
    \nmyName = \"John\"\n```\n\nThis will not give you any errors because `myName`\
    \ is now a variable. This does not relate to only `String`s and `Int`s, but it\
    \ can also be used with collections and other objects.\n\nVariables give you more\
    \ flexibility, so why would anyone ever want to use a constant? The quick answer\
    \ is performance. If you know that you have a value that will not change, the\
    \ compiler can optimize that value as a constant.\n\n### Understanding Collections\n\
    \nUnderstanding collections is a fundamental part of learning Swift. In fact,\
    \ collection objects are fundamental constructs of nearly every modern object-oriented\
    \ language library (sometimes they are referred to as containers). Simply put,\
    \ a collection is a type of class that can hold and manage other objects. The\
    \ whole purpose of a collection is that it provides a common way to store and\
    \ retrieve objects efficiently.\n\nThere are several types of collections. While\
    \ they all fulfill the same purpose of being able to hold other objects, they\
    \ differ mostly in the way objects are retrieved. The most common collections\
    \ used in Swift are the `Array` and the `Dictionary`.\n\nBoth of these collections\
    \ can be created as constants or regular variables. If you create a collection\
    \ as a constant, you must fill it with the objects at the time of creation. It\
    \ cannot be modified after that point."
