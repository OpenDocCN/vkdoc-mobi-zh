    Note


    Something that can help organize your code can be found on line 47: `"// MARK:
    - Segues". // MARK:` is called a landmark . It is replacement of the #pragma mark,
    which is used in Objective-C. Landmarks help break up the code in the jump bar
    and enable you to quickly get to sections of code indicated by the landmark. When
    you type something following `// MARK:`, Xcode places the landmark in the jump
    bar’s drop-down, as shown in Figure [14-3](#A341013_4_En_14_Chapter.html#Fig3).
    If you just type `// MARK: -`, Xcode adds a line separator in the jump bar’s drop-down.
    Swift also supports `// TODO:` and `// FIXME:` landmarks to annotate your code
    and list them in the jump bar.


