- fmt: "# Storing Information in a Database\n\nDatabases are usually an intimidating\
    \ subject for a developer; most developers associate databases with enterprise\
    \ database servers such as Microsoft SQL Server or Oracle. These applications\
    \ can take time to set up and require constant management. For most developers,\
    \ a database system like Oracle would be too much to handle. Luckily, Apple has\
    \ included a small and efficient database engine called SQLite in iOS, macOS,\
    \ and tvOS. This allows you to gain many of the features of complex database servers\
    \ without the overhead.\n\n`SQLite` will provide you with a lot of flexibility\
    \ in storing information for your application. It stores the entire database in\
    \ a single file. It is fast, reliable, and easy to implement in your application.\
    \ The best thing about the `SQLite` database is that there is no need to install\
    \ any software; Apple has taken care of that for you.\n\nHowever, `SQLite` does\
    \ have some limitations that, as a developer, you should be aware of.\n\n- `SQLite`\
    \ was designed as a single-user database. You will not want to use `SQLite` in\
    \ an environment where more than one person will be accessing the same database.\
    \ This could lead to data loss or corruption.\n- In the business world, databases\
    \ can grow to become very large. It is not surprising for a database manager to\
    \ handle databases as large as half a terabyte, and in some cases databases can\
    \ become much larger than that. `SQLite` should be able to handle smaller databases\
    \ without any issues, but you will begin to see performance issues if your database\
    \ starts to get too large.\n- `SQLite` lacks some of the backup and data restore\
    \ features of the enterprise database solutions.\n\nFor the purposes of this chapter,\
    \ you will focus on using `SQLite` as your database engine. If any of the mentioned\
    \ limitations are present in the application you are developing, you may need\
    \ to look into an enterprise database solution, which is beyond the scope of this\
    \ book.\n\n**Note**\n\n`SQLite` (pronounced “sequel-lite”) gets its name from\
    \ Structured Query Language (`SQL`, pronounced “sequel”). `SQL` is the language\
    \ used to enter, search, and retrieve data from a database.\n\nApple has worked\
    \ hard to iron out a lot of the challenges of database development. As a developer,\
    \ you will not need to become familiar with `SQL` because Apple has taken care\
    \ of the direct database interaction for you through a framework called Core Data,\
    \ which makes interacting with the database much easier. Core Data has been adapted\
    \ by Apple from a NeXT product called Enterprise Object Framework, and working\
    \ with Core Data is a lot easier than interfacing directly with the `SQLite` database.\
    \ Directly accessing a database via `SQL` is beyond the scope of this book.\n\n\
    # Getting Started with Core Data\n\nLet’s start by creating a new Core Data project.\n\
    \n1.  Open Xcode and select **File** ➤ **New** ➤ **Project**. To create an iOS\
    \ Core Data project, select **iOS** from the menu on the top. Then select **Single\
    \ View App**, as shown in Figure 11-1.\n\n    ![A341013_4_En_11_Fig1_HTML.jpg](A341013_4_En_11_Fig1_HTML.jpg)\n\
    \n    **Figure 11-1.** Creating a new project\n\n2.  Click the **Next** button\
    \ when you’re done. The next screen will allow you to enter the name you want\
    \ to use. For the purposes of this chapter, you will use the name `BookStore`.\n\
    \n3.  Near the bottom, you will see the check box called **Use Core Data**. Make\
    \ sure this is checked and then click **Next**, as shown in Figure 11-2.\n\n \
    \   **Note** Core Data can be added to any project at any point. Checking that\
    \ box when creating a project will add the Core Data frameworks and a default\
    \ data model to your application. If you know you are going to use Core Data,\
    \ checking this box will save you time.\n\n    ![A341013_4_En_11_Fig2_HTML.jpg](A341013_4_En_11_Fig2_HTML.jpg)\n\
    \n    **Figure 11-2.** Adding Core Data to your project\n\n4.  Select a location\
    \ to save the project and click **Create**.\n\nOnce you are done with that, your\
    \ new project will open. It will look similar to a standard application, except\
    \ now you will have a `BookStore.xcdatamodeld` file. This file is called a data\
    \ model and will contain the information about the data that you will be storing\
    \ in Core Data.\n\n## The Model\n\nClick the model file (`BookStore.xcdatamodeld`)\
    \ to open it. You will see a window similar to the one shown in Figure 11-3.\n\
    \n![A341013_4_En_11_Fig3_HTML.jpg](A341013_4_En_11_Fig3_HTML.jpg)\n\n**Figure\
    \ 11-3.** The blank model\n\nThe window is divided into four sections. On the\
    \ left, you have your entities. In more common terms, these are the objects or\
    \ items that you want to store in the database.\n\nThe top-right section contains\
    \ the entity’s attributes. Attributes are pieces of information about the entities.\
    \ For example, a book would be an entity, and the title of the book would be an\
    \ attribute of that entity.\n\n**Note**\n\nIn database terms, entities are your\
    \ tables, and the attributes of the entities are called columns. The objects created\
    \ from those entities are referred to as rows.\n\nThe middle portion of the panel\
    \ on the right will show you all the relationships of an entity. A relationship\
    \ connects one entity to another. For example, you will create a `Book` entity\
    \ and an `Author` entity. You will then relate them so that every book can have\
    \ an author. The bottom-right portion of the screen will deal with fetched properties.\
    \ Fetched properties are beyond the scope of this book, but they allow you to\
    \ create filters or queries for your data.\n\nLet's create an entity.\n\n1.  Click\
    \ the plus sign in the bottom-left corner of the window, or select **Editor**\
    \ ➤ **Add Entity** from the menu, as shown in Figure 11-4.\n\n    ![A341013_4_En_11_Fig4_HTML.jpg](A341013_4_En_11_Fig4_HTML.jpg)\n\
    \n    **Figure 11-4.** Adding a new entity\n\n2.  On the left side, double-click\
    \ the **Entity** name and change the name to `Book`.\n\n    **Note** You must\
    \ capitalize your entities’ names.\n\n3.  Now let’s add some attributes. Attributes\
    \ would be considered the details of a book, so you will store the title, author,\
    \ price, and year the book was published. Obviously, in your own applications,\
    \ you may want to store more information, such as the publisher, page count, and\
    \ genre, but you want to start simple. Click the plus sign at the bottom right\
    \ of the window, or select **Editor** ➤ **Add Attribute**, as shown in Figure\
    \ 11-5. If you do not see the option to add an attribute, make sure you have selected\
    \ the `Book` entity on the left side.\n\n    ![A341013_4_En_11_Fig5_HTML.jpg](A341013_4_En_11_Fig5_HTML.jpg)\n\
    \n    **Figure 11-5.** Adding an attribute"
