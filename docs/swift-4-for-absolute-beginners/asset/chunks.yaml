  trans: "\n# 创建书店应用\n\n你将创建一个演示数组用法的应用。你需要创建一个`UITableView`，并使用数组为其填充数据。首先，让我们创建基础应用项目。打开\
    \ Xcode，选择\"Master-Detail Application\"项目模板，如图 8-1 所示。在此项目中，你将创建几个简单的对象，作为你的书店应用的基础：一个`Book`对象和一个`BookStore`对象。你将再次学习属性的概念，了解如何在项目中进行属性的取值和赋值。最后，你将实际运用这些书店对象，学习如何在创建对象后使用它们。\n\
    \n1. 点击\"Next\"按钮，将项目命名为`BookStore`，如图 8-2 所示。公司名称是必填项——你可以使用任何真实或虚构的公司名称。示例中使用了`com.innovativeware`，这完全可以。确保设备系列选择\
    \ iPhone，语言设置为 Swift。不要勾选\"Use Core Data\"复选框。注意：此类应用很适合使用 Core Data，但 Core Data\
    \ 要到第 11 章才会介绍。在本应用中，你将使用数组进行数据存储。\n\n   ![A341013_4_En_8_Fig2_HTML.jpg](img/A341013_4_En_8_Fig2_HTML.jpg)\n\
    \n   图 8-2. 选择产品（应用）名称和选项\n\n2. 填写完所有信息后，点击\"Next\"按钮。Xcode 会提示你选择项目保存位置。任何你能记住的位置都可以——桌面就是个好地方。\n\
    \n3. 确定保存位置后，点击\"Create\"按钮创建新项目。这将创建基础的`BookStore`项目模板，如图 8-3 所示。\n\n   ![A341013_4_En_8_Fig3_HTML.jpg](img/A341013_4_En_8_Fig3_HTML.jpg)\n\
    \n   图 8-3. 项目模板的源代码列表\n\n4. 点击导航区域左下角的加号（+）按钮，为项目添加新对象。选择\"New File\"，然后选择顶部的\
    \ iOS 分类，再选择右侧的\"Swift File\"，如图 8-4 所示。你也可以右键单击（或按住 Control 键单击）导航区域，然后选择\"New\
    \ File\"菜单选项。这两种方法没有区别——选择你觉得更自然的方式即可。\n\n   ![A341013_4_En_8_Fig4_HTML.jpg](img/A341013_4_En_8_Fig4_HTML.jpg)\n\
    \n   图 8-4. 创建新的 Swift 文件\n\n5. 你选择的是纯 Swift 文件，这将创建一个新的空 Swift 文件，用于定义`Book`类。选择后，点击\"\
    Next\"按钮。\n\n6. Xcode 会询问文件名。输入名称`Book`。Xcode 还会询问文件保存位置。为简单起见，选择项目中的`BookStore`文件夹。项目中所有其他类文件都存储在此处。\n\
    \n7. 双击`BookStore`文件夹，然后点击\"Create\"按钮。你将在 Xcode 的主编辑窗口中看到新文件`Book.swift`出现在导航区域中，如图\
    \ 8-5 所示。\n\n8. 重复上述步骤，创建第二个名为`BookStore`的对象。这将生成`BookStore.swift`文件。你将在本章后面使用这个类。现在，我们专注于`Book`类。\n\
    \n   ![A341013_4_En_8_Fig5_HTML.jpg](img/A341013_4_En_8_Fig5_HTML.jpg)\n\n   图\
    \ 8-5. 空的 Swift 文件\n\n9. 点击`Book.swift`文件，开始定义你的新类吧！\n\n![A341013_4_En_8_Fig1_HTML.jpg](img/A341013_4_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1. 基于 Master-Detail Application 模板创建初始项目\n\n## 创建你的类\n\n通过添加 Swift 文件（而不是\
    \ Cocoa Touch 类），Xcode 会创建一个空 Swift 文件。你可以在此文件中添加多个类。Swift 更加灵活，不要求每个文件只能有一个类。Xcode\
    \ 允许你根据需要添加类。\n\n注意：将 Swift 类放在独立文件中仍然是一个好习惯。这有助于组织和查找类，尤其是处理大型项目时。但有些情况下，某个较小的类只与另一个类配合使用，将它们放在同一个文件中也是合理的。\n\
    \n现在创建`Book`类。在`Book.swift`文件中输入以下代码：\n\n```\nclass Book {\n}\n```\n\n现在你就拥有了一个类，如图\
    \ 8-6 所示。创建类就是这么简单。\n\n![A341013_4_En_8_Fig6_HTML.jpg](img/A341013_4_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 空的 Book 类\n\n## 属性介绍\n\n这个类名称就是`Book`。没错，你有了一个类，但目前它无法存储任何数据。为了让这个类有用，它需要能够保存信息，这可以通过属性来实现。当使用对象时，必须先实例化。对象实例化后，就能访问其属性。只要对象保持在作用域内，这些变量就可用。正如你在第\
    \ 7 章所学，作用域定义了对象存在的上下文。在某些情况下，对象的作用域可能是整个程序的生命周期；在其他情况下，作用域可能只是一个函数或方法。这完全取决于对象声明的位置和使用方式。稍后我们会更详细地讨论作用域。现在，让我们为`Book`类添加一些属性，使其更有用。\n\
    \n```\n1   //\n2   //  Book.swift\n3   //  BookStore\n4   //\n5   //  Created\
    \ by Thorn on 7/27/17.\n6   //  Copyright © 2017 Innovativeware. All rights reserved.\n\
    7   //\n\n9   import Foundation\n\n11   class Book {\n12       var title: String\
    \ = \"\"\n13       var author: String = \"\"\n14       var description: String\
    \ = \"\"\n15   }\n代码清单 8-8. 向 Book.swift 文件添加实例变量\n```\n\n代码清单 8-8 展示了与之前相同的`Book`对象，但现在花括号内部（第\
    \ 12 至 14 行）新增了三个属性。它们都是`String`对象，这意味着它们可以为`Book`对象存储文本信息。因此，`Book`对象现在有了存储标题、作者和描述信息的位置。请注意，代码为属性分配了初始值。如果未分配初始值，则类需要初始化方法（init\
    \ method）来赋值。\n\n## 访问属性\n\n现在你有了属性，如何使用它们？如何访问它们？不幸的是，仅仅声明属性并不一定能让你访问它。有两种方式可以访问这些变量。\n\
    \n* 一种方式自然是在`Book`对象内部。\n* 第二种方式是从对象外部——即使用`Book`对象的程序其他部分。\n\n如果你正在为`Book`对象内部的方法编写代码，访问其属性非常简单。例如，你可以直接编写如下代码：\n\
    \n```\ntitle = \"Test Title\"\n```\n\n从对象外部，你仍然可以访问`title`变量。这是通过点符号实现的。\n\n```\n\
    myBookObject.title = \"Test Title\"\n```\n\n## 完成 BookStore 程序\n\n理解了属性后，现在我们将进一步创建实际的书店程序。思路很简单——创建一个名为`BookStore`的类，其中存放一些`Book`对象。\n"
- fmt: "### Creating the View\n\nLet’s start by first getting the view ready. If you\
    \ need a refresher on how to build an interface in Xcode, refer to Chapter [6](#A341013_4_En_6_Chapter.html).\n\
    \n1.  Click the `Main.storyboard` file in the Navigator area. This will display\
    \ Xcode’s Interface Builder, as shown in Figure [8-7](#A341013_4_En_8_Chapter.html#Fig7).\
    \ You will see five scenes in the `Main.storyboard` file. Navigate to the right\
    \ to find the Detail Scene.\n\n    ![A341013_4_En_8_Fig7_HTML.jpg](A341013_4_En_8_Fig7_HTML.jpg)\n\
    \n    Figure 8-7. Preparing the Bookstore’s Detail View.\n\n2.  By default, when\
    \ you create a blank Master-Detail application, Xcode adds a label with the text\
    \ “Detail View content goes here.” Select and delete this Label object because\
    \ you are going to add your own. You’re going to add some new fields to display\
    \ some details about a selected book. Since you deleted this control, you also\
    \ need to remove the code that references it.\n    1.  In the `DetailViewController.swift`\
    \ file, remove the following line:\n\n        ```swift\n        @IBOutlet weak\
    \ var detailDescriptionLabel: UILabel!\n        ```\n\n    2.  In the `var detailItem:\
    \ AnyObject?` property declaration, remove the following line:\n\n        ```swift\n\
    \        configureView()\n        ```\n\n    3.  In the method named `configureView`,\
    \ remove the following lines:\n\n        ```swift\n        // Update the user\
    \ interface for the detail item.\n        if let detail = detailItem {\n     \
    \       if let label = detailDescriptionLabel {\n                label.text =\
    \ detail.description\n            }\n        }\n        ```\n\n        Your `DetailViewController.swift`\
    \ file should now look like Figure [8-8](#A341013_4_En_8_Chapter.html#Fig8).\n\
    \n        ![A341013_4_En_8_Fig8_HTML.jpg](A341013_4_En_8_Fig8_HTML.jpg)\n\n  \
    \      Figure 8-8. Modified DetailViewController.\n\n3.  Drag some Label objects\
    \ from the Object Library onto the Detail View, as shown in Figure [8-9](#A341013_4_En_8_Chapter.html#Fig9).\
    \ Make sure that the lower Label controls are wider than the default. This is\
    \ so that they can hold a fairly large amount of text. The two Label objects with\
    \ the text “Label” in them are the ones you’re going to hook up to hold two of\
    \ the values from the `Book` object: `Title` and `Author`.\n\n    ![A341013_4_En_8_Fig9_HTML.jpg](A341013_4_En_8_Fig9_HTML.jpg)\n\
    \n    Figure 8-9. Adding some Label objects.\n\n### Adding Properties\n\nNext,\
    \ you’ll add some properties to the `DetailViewController` class. These properties\
    \ will correspond to the Detail View’s Label objects.\n\n1.  Click the Assistant\
    \ Editor icon (it looks like two circles) in the top-right corner of Xcode to\
    \ open the Assistant editor. Make sure the `DetailViewController.swift` file is\
    \ showing in the editor.\n\n2.  Hold the Control key and drag the first blank\
    \ Label control to the code on the right side, as shown in Figure [8-10](#A341013_4_En_8_Chapter.html#Fig10).\
    \ Name the first one `titleLabel` (see Figure [8-11](#A341013_4_En_8_Chapter.html#Fig11))\
    \ and click Connect, and then repeat the process with the second one, naming it\
    \ `authorLabel`. This will add two variables to your `DetailViewController` class,\
    \ as seen in Listing [8-9](#A341013_4_En_8_Chapter.html#Par93), and hook them\
    \ to the Label controls in the interface.\n\n    ![A341013_4_En_8_Fig11_HTML.jpg](A341013_4_En_8_Fig11_HTML.jpg)\n\
    \n    Figure 8-11. Naming the new property.\n\n    ![A341013_4_En_8_Fig10_HTML.jpg](A341013_4_En_8_Fig10_HTML.jpg)\n\
    \n    Figure 8-10. Creating variables.\n\n    ```swift\n    1        @IBOutlet\
    \ weak var titleLabel: UILabel!\n    2        @IBOutlet weak var authorLabel:\
    \ UILabel!\n    ```\n\n    Listing 8-9. Modifying the `DetailViewController.swift`\
    \ file to include the new labels.\n\n### Adding a Description\n\nNow you need\
    \ to add the description to the view. The description is a little different in\
    \ that it can span multiple lines. For this, you’re going to use the Text View\
    \ object.\n\n1.  Start by adding the “Description:” label to the view, as shown\
    \ in Figure [8-12](#A341013_4_En_8_Chapter.html#Fig12).\n\n    ![A341013_4_En_8_Fig12_HTML.jpg](A341013_4_En_8_Fig12_HTML.jpg)\n\
    \n    Figure 8-12. Adding a new Label object for the description.\n\n2.  Next,\
    \ add the Text View object to the Detail Scene, as shown in Figure [8-13](#A341013_4_En_8_Chapter.html#Fig13).\
    \ The advantage the Text View object has is that it’s easy to display multiple\
    \ lines of text. While the Label object can display multiple lines, it’s not as\
    \ clean as the Text View object. Note: By default, the Text View control is filled\
    \ with all kinds of seemingly random text. This text is called Lorem Ipsum text.\
    \ If you ever need to fill up a page with text, you can find any number of Lorem\
    \ Ipsum generators on the Web. As for the Text View control, the text can stay\
    \ as it is since you’ll remove it during runtime. Plus, if it’s cleared, it becomes\
    \ a little more difficult spotting exactly where the Text View control is on the\
    \ screen—it’s white on white!\n\n    ![A341013_4_En_8_Fig13_HTML.jpg](A341013_4_En_8_Fig13_HTML.jpg)\n\
    \n    Figure 8-13. Adding a Text View to the Detail View.\n\n3.  For the program\
    \ to take advantage of the Text View, you’ll need to create an outlet for it,\
    \ just like you did for the title and description. Simply Control-drag the Text\
    \ View to your `DetailViewController` file, as you did earlier. Name this variable\
    \ `descriptionTextView`. The finished variable portion of `DetailViewController`\
    \ will look like Listing [8-10](#A341013_4_En_8_Chapter.html#Par99).\n\n    ```swift\n\
    \    1    import UIKit\n\n    3    class DetailViewController: UIViewController\
    \ {\n\n    5        @IBOutlet weak var titleLabel: UILabel!\n    6        @IBOutlet\
    \ weak var authorLabel: UILabel!\n\n    8        @IBOutlet weak var descriptionTextView:\
    \ UITextView!\n    ```\n\n    Listing 8-10. Adding an outlet for the text view\
    \ to hold a description.\n\n4.  Notice that the type is `UITextView` instead of\
    \ `UILabel`—this is important.\n\n**Caution**\n\nAs mentioned, it’s important\
    \ to make the `descriptionTextView` property a `UITextView` type. If, for example,\
    \ it was accidentally made a `UILabel` object, when trying to connect the Text\
    \ View from the screen to the outlet, Xcode wouldn’t be able to find the `descriptionTextView`\
    \ outlet. Why? Xcode knows that the control is a `UITextView` and is looking for\
    \ an outlet that is of type `UITextView`."
