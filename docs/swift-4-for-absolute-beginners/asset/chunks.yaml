    # 修改表格行标识符


    现在你可以连接之前创建的`WKInterfaceLabel`。在接口控制器场景（Interface Controller Scene）下，按住 Control
    键从书籍行拖拽到标签上，如图 15-17 所示。


    ![A341013_4_En_15_Fig17_HTML.jpg](img/A341013_4_En_15_Fig17_HTML.jpg)


    图 15-17. 从行控制拖拽到标签


    系统将提示你从可用输出口中选择一个输出口，如图 15-18 所示。当前只有一个可用输出口，因此请选择 `bookLabel`。


    ![A341013_4_En_15_Fig18_HTML.jpg](img/A341013_4_En_15_Fig18_HTML.jpg)


    图 15-18. 连接 `bookLabel` 输出口


    现在表格和标签已全部连接完毕。接下来你需要一些数据来显示。你将复用第 8 章中创建的部分数据。使用 Mac 上的访达（Finder），将第 8 章文件夹中的
    `Book.swift` 和 `BookStore.swift` 文件拖拽到 Xcode 中的 `BookStore WatchKit Extension`
    文件夹内。勾选“如果需要则拷贝项目”复选框，将文件复制到新项目中。完成后，你的目标中将会包含 `Book.swift` 和 `BookStore.swift`
    文件，如图 15-19 所示。


    ![A341013_4_En_15_Fig19_HTML.jpg](img/A341013_4_En_15_Fig19_HTML.jpg)


    图 15-19. 添加数据文件


    数据和界面都已准备就绪。现在需要将它们连接起来，以便界面能够了解数据。你需要声明一个用于保存`BookStore`对象的新属性。在 `InterfaceController.swift`
    文件中 `mainTable` 对象的声明下方，需要添加以下代码行：


    ```

    var myBookStore: BookStore = BookStore()

    ```


    这将创建一个名为 `myBookStore`、类型为 `BookStore` 的属性，并将其初始化为 `BookStore` 的一个实例。


    我们将使用 `configureTable()` 方法来设置表格。在类中添加以下代码，位置应在其他任何方法之外：


    ```

    1     func configureTable() {

    2         mainTable.setNumberOfRows(myBookStore.bookList.count, withRowType: "myBookRow")

    3         for index in 0..<myBookStore.bookList.count {

    4             if let myRow = mainTable.rowController(at: index) as? BookRow {

    5                 myRow.bookLabel.setText(myBookStore.bookList[index].title)

    6             }

    7         }

    8     }

    ```


    第 1 行声明了新的方法。第 2 行将表格的行数设置为书店中书籍的数量。你将使用 `myBookStore.bookList.count` 来获取该数字。同时，我们还需告知表格要使用哪个行标识符。第
    3 行是一个循环，将 `index` 赋值为 0，并持续递增直到达到书籍数量减 1。之所以要减去 1，是因为 Swift（以及大多数现代编程语言）的数组索引从
    0 开始。这意味着如果一个数组包含两个项目，那么项目的位置分别是 0 和 1。如果你试图访问位置 2，则会收到错误提示。


    第 4 行尝试使用上一行创建的 `index` 变量为表格创建新行。第 5 行获取该行，并将 `Book` 的标题赋值给 `bookLabel`。现在我们需要在视图激活时调用
    `configureTable`。请在 `willActivate` 函数中添加以下代码行：


    ```

    configureTable()

    ```


