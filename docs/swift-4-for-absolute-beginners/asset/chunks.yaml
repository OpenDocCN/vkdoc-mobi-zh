    Figure 5-4.


    The Book class


    You can add another class called `Sale` (see Figure [5-5](#A341013_4_En_5_Chapter.html#Fig5)).
    This class is more abstract than the other classes discussed because it does not
    describe a tangible object. You will notice how we have added a reference to a
    customer and a book to the `Sale` class. Because the `Sale` class will track sales
    of books, you need to know which book was sold and to which customer.


    ![A341013_4_En_5_Fig5_HTML.jpg](A341013_4_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    The Sale class


    Now that you know the properties of the classes, you need to look at some methods
    that each of the classes will have.


    ### Planning Methods


    You will not add all of the methods now, but the more planning you can do at the
    beginning, the easier it will be for you later. Not all of your classes will have
    many methods. Some may not have any methods at all.


    Note


    When planning your methods, remember to have them focus on a specific task. The
    more specific the method, the more likely it is that it can be reused.


    For the time being, you will not add any methods to the `Book` class or the `Bookstore`
    class. You will focus on your other two classes.


    For the `Customer` class, you will add methods to list the purchase history of
    that client. There may be other methods that you will need to add in the future,
    but you will add just that one for now. Your completed `Customer` class diagram
    should look like Figure [5-6](#A341013_4_En_5_Chapter.html#Fig6). The line near
    the bottom separates the properties from the methods.


    ![A341013_4_En_5_Fig6_HTML.jpg](A341013_4_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    The completed Customer class


    For the `Sale` class, we have added three methods. We added `Charge Credit Card`,
    `Print Invoice`, and `Checkout` (see Figure [5-7](#A341013_4_En_5_Chapter.html#Fig7)).
    For the time being, you do not need to know how to implement these methods, but
    you need to know that you are planning on adding them to your class.


    ![A341013_4_En_5_Fig7_HTML.jpg](A341013_4_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    The completed Sale class


    Now that you have finished mapping out the classes and the methods you are going
    to add to them, you have the beginnings of a Unified Modeling Language (UML) diagram
    . Basically, this is a diagram used by developers to plan their classes, properties,
    and methods. Starting your development process by creating such a diagram will
    help you significantly in the long run. An in-depth discussion of UML diagrams
    is beyond the scope of this book. If you would like more information about this
    subject, `smartdraw.com` has a great in-depth overview of them; see [`http://www.smartdraw.com/uml-diagram/`](http://www.smartdraw.com/uml-diagram/)
    . Omnigroup ( [`www.omnigroup.com`](http://www.omnigroup.com) ) provides a great
    UML diagram program for macOS called Omnigraffle.


    Figure [5-8](#A341013_4_En_5_Chapter.html#Fig8) shows the complete diagram.


    ![A341013_4_En_5_Fig8_HTML.jpg](A341013_4_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    The completed UML diagram for the bookstore'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    # 规划属性


    让我们来看一下书店的例子，以及你需要创建的一些类。首先，创建一个 `Bookstore` 类非常重要。`Bookstore` 类包含了每个 `Bookstore`
    对象所存储信息的蓝图，例如书店的名称、地址、电话号码和徽标（见图 5-2）。将这些信息放在一个类中，而不是在应用程序中硬编码，将允许你在未来轻松地更改这些信息。你将在本章后面了解使用面向对象方法论的原因。此外，如果你的书店大获成功，并且你决定再开一家，你也会有所准备，因为你可以创建
    `Bookstore` 类的另一个对象。


    ![A341013_4_En_5_Fig2_HTML.jpg](img/A341013_4_En_5_Fig2_HTML.jpg)


    图 5-2. Bookstore 类


    同时，我们也来规划一个 `Customer` 类（见图 5-3）。注意，名称被拆分成了`名`和`姓`。在你的项目中，有时你可能只想使用客户的名，如果事先没有规划好，将名和姓分开就会很困难。假设你想给客户寄一封信，告知他们即将到来的促销活动。你肯定不希望问候语写成“亲爱的
    John Doe”。如果写成“亲爱的 John”，看起来会更具个性化。


    ![A341013_4_En_5_Fig3_HTML.jpg](img/A341013_4_En_5_Fig3_HTML.jpg)


    图 5-3. Customer 类


    你还会注意到，地址被分解成了不同的部分，而不是全部组合在一起。`地址行 1`、`地址行 2`、`城市`、`州` 和 `邮政编码` 是分开的。这一点很重要，会在你的应用程序中使用。让我们回到你打算寄给客户关于即将到来的促销活动的信件上。


    你可能不想把它寄给所有居住在不同州的客户。通过分开存储地址，你可以轻松地过滤掉那些你不想邮寄的客户。


    我们还在 `Customer` 类中添加了`喜爱书籍流派`属性。添加这个属性是为了向你展示如何在每个类中保存许多不同类型的信息。如果你有一本新的悬疑小说即将发行，并且你想发送电子邮件提醒那些对悬疑特别感兴趣的客户，那么这个字段可能会派上用场。通过存储这类信息，你将能够精准地定位你的客户群中的不同部分。


    创建书店也需要一个 `Book` 类（见图 5-4）。你将存储关于书籍的信息，例如作者、出版商、流派、页数和版次（以防有多个版本）。`Book` 类还将包含书的价格。


    ![A341013_4_En_5_Fig4_HTML.jpg](img/A341013_4_En_5_Fig4_HTML.jpg)


    图 5-4. Book 类


    你可以添加另一个名为 `Sale` 的类（见图 5-5）。这个类比前面讨论的其他类更抽象，因为它描述的不是一个有形的对象。你会注意到我们如何在 `Sale`
    类中添加了对客户和书籍的引用。因为 `Sale` 类将跟踪书籍的销售情况，所以你需要知道哪本书卖给了哪个客户。


    ![A341013_4_En_5_Fig5_HTML.jpg](img/A341013_4_En_5_Fig5_HTML.jpg)


    图 5-5. Sale 类


    既然你已经了解了类的属性，接下来需要看看每个类将会有的一些方法。


    ## 规划方法


    你现在不会添加所有的方法，但开始时规划得越多，后续工作就越容易。并非所有的类都会有很多方法。有些类可能根本没有方法。


    > **注意：** 在规划方法时，请记住要让他们专注于一个特定的任务。方法越具体，它就越有可能被重用。


    目前，你不会向 `Book` 类或 `Bookstore` 类添加任何方法。你将专注于其他两个类。


    对于 `Customer` 类，你将添加方法来列出该客户的购买历史记录。未来可能还需要添加其他方法，但目前你只添加这一个。完成的 `Customer` 类图应如图
    5-6 所示。靠近底部的那条线将属性和方法分隔开来。


    ![A341013_4_En_5_Fig6_HTML.jpg](img/A341013_4_En_5_Fig6_HTML.jpg)


    图 5-6. 完成的 Customer 类


    对于 `Sale` 类，我们添加了三个方法。我们添加了`扣款信用卡`、`打印发票`和`结账`（见图 5-7）。目前，你不需要知道如何实现这些方法，但你需要知道你计划将它们添加到你的类中。


    ![A341013_4_En_5_Fig7_HTML.jpg](img/A341013_4_En_5_Fig7_HTML.jpg)


    图 5-7. 完成的 Sale 类


    既然你已经完成了对类及其将要添加的方法的规划，你就有了一个统一建模语言（UML）图的雏形。基本上，这是开发人员用来规划其类、属性和方法的图表。从现在开始，通过创建这样的图表来启动你的开发过程，从长远来看会对你大有裨益。对
    UML 图的深入讨论超出了本书的范围。如果你想了解更多关于这个主题的信息，`smartdraw.com` 上有一个非常深入全面的概述；请参见 [`www.smartdraw.com/uml-diagram/`](http://www.smartdraw.com/uml-diagram/)。Omnigroup
    ([www.omnigroup.com](http://www.omnigroup.com)) 为 macOS 提供了一个出色的名为 Omnigraffle
    的 UML 图程序。


    图 5-8 显示了完整的图表。


    ![A341013_4_En_5_Fig8_HTML.jpg](img/A341013_4_En_5_Fig8_HTML.jpg)


    图 5-8. 为书店完成的 UML 图

