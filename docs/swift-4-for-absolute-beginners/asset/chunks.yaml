  raw: '## Coding the Example App in Swift


    Using your requirements and what you learned, try writing your random number generator
    in Swift.


    To program this app, you have to leave the playground and do this as a Mac Console
    app. Unfortunately, at this time, a playground doesn’t enable you to interact
    with a running app, so you can’t capture keyboard input.


    Note


    You can download the complete random number generator app at [`http://forum.xcelme.com`](http://forum.xcelme.com)
    . The code is the topic of Chapter [4](#A341013_4_En_4_Chapter.html).


    Your Swift app will run from the command line because it asks the user to guess
    a random number.


    1.  Open the `main.swift` file. Write the code in Listing [4-13](#A341013_4_En_4_Chapter.html#Par95).


    ![A341013_4_En_4_Fig4_HTML.jpg](A341013_4_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Project options for RandomNumber


    1.  Call your project RandomNumber (see Figure [4-4](#A341013_4_En_4_Chapter.html#Fig4)).
    Ensure that the Language drop-down is Swift and click Next. Save the project anywhere
    you prefer on your hard drive and click Create.


    ![A341013_4_En_4_Fig3_HTML.jpg](A341013_4_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Starting a new Command-Line Tool macOS project


    1.  Open Xcode and select Create a new Xcode project. Choose the Command Line
    Tool macOS project as seen in Figure [4-3](#A341013_4_En_4_Chapter.html#Fig3)
    and click Next.


    ```

    1 //

    2 //  main.swift

    3 //  RandomNumber

    4 //


    6 import Foundation


    8 var randomNumber = 1

    9 var continueGuessing = true

    10 var keepPlaying = true

    11 var input = ""


    13 while keepPlaying {

    14     randomNumber = Int(arc4random_uniform(101)) //get a random number between
    0-100

    15     print("The random number to guess is: \(randomNumber)")

    16     while continueGuessing {

    17         print("Pick a number between 0 and 100.")

    18         input = NSString(data: FileHandle.standardInput.availableData, encoding:String.Encoding.utf8.rawValue)!
    as String // get keyboard input

    19         input = input.replacingOccurrences(of: "\n", with: "", options: NSString.CompareOptions.literal,
    range: nil) // strip off the \n

    20         if let userGuess = Int(input) {

    21             if userGuess == randomNumber {

    22                 continueGuessing = false

    23                 print("Correct number!")

    24             }

    25             //nested if statement

    26             else if userGuess > randomNumber {

    27                 // user guessed too high

    28                 print("Your guess is too high!")

    29             }

    30             else{

    31                 // no reason to check if userGuess < randomNumber. It has to
    be.

    32                 print("Your guess is too low!")

    33             }

    34         } else {

    35             print("Invalid guess, please try again.")

    36         }

    37     }

    38     print ("Play Again? Y or N")

    39     input = NSString(data: FileHandle.standardInput.availableData, encoding:String.Encoding.utf8.rawValue)!
    as String

    40     input = input.replacingOccurrences(of: "\n", with: "", options: NSString.CompareOptions.literal,
    range: nil)


    42     if input == "N" || input == "n" {

    43         keepPlaying = false

    44     }

    45     continueGuessing = true

    46 }

    Listing 4-13.

    Source Code for Your Random Number Generator App

    ```


    In Listing [4-13](#A341013_4_En_4_Chapter.html#Par95), there is new code that
    we haven’t discussed before. The first new line of code (line 14) is as follows:


    ```

    randomNumber = Int(arc4random_uniform(101))

    ```


    This line will produce a random number between 0 and 100\. `arc4random_uniform()`is
    a function that returns a random number.


    The next line of new code is on line 18:


    ```

    18         input = NSString(data: FileHandle.standardInput.availableData, encoding:String.Encoding.utf8.rawValue)!
    as String // get keyboard input

    ```


    This enables you to get keyboard input for the user. We will talk about this syntax
    in later chapters.


    The next new line of code is on line 20:


    ```

    if let userGuess = Int(input)

    ```


    `Int` takes a string initializer and converts it to an integer.


    ### Nested if Statements and else if Statements


    Sometimes, it is necessary to nest `if` statements . This means that you need
    to have `if` statements nested inside an existing `if` statement. Additionally,
    it is sometimes necessary to have a comparison as the first step in the `else`
    section of the `if` statement. This is called an `else if` statement (recall line
    26 in Listing [4-13](#A341013_4_En_4_Chapter.html#Par95)).


    ```

    else if userGuess > randomNumber

    ```


    ### Removing Extra Characters


    Line 19 in Listing [4-13](#A341013_4_En_4_Chapter.html#Par95) is as follows:


    ```

    input = input.replacingOccurrences(of: "\n", with: "", options: NSString.CompareOptions.literal,
    range: nil) // strip off the \n

    ```


    Reading keyboard input can be difficult. In this case, it leaves a remnant at
    the end of your string, `\n`, and you need to remove it. This is a newline character
    that is generated when the users press the Return key on their keyboards.


    ### Improving the Code Through Refactoring


    Often, after you get your code to work, you examine the code and find more efficient
    ways to write it. The process of rewriting your code to make it more efficient,
    maintainable, and readable is called code refactoring .


    As you review your code in Swift, you will often notice that you can eliminate
    some unnecessary code.


    Note


    As developers, we have found that the best line of code is the line that you don’t
    have to write—less code means less to debug and maintain.


    ### Running the App


    To run your app, click the Play button at the top left of your screen in your
    Swift project. See Figure [4-5](#A341013_4_En_4_Chapter.html#Fig5).


    ![A341013_4_En_4_Fig5_HTML.jpg](A341013_4_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    The console output of the Swift random number generator app Note


    If you’re not seeing the output console when you run your app, make sure you have
    selected the same options at the top-right and bottom-right corners of the editor
    (choose View ➤ Debug Area ➤ Activate Console).'
  trans: "\n# 使用 Swift 编写示例应用\n\n根据你的需求和所学内容，尝试用 Swift 编写一个随机数生成器。\n\n要编写这个应用程序，你需要离开\
    \ Playground，并以 Mac 控制台应用的形式进行开发。遗憾的是，目前 Playground 无法让你与正在运行的应用进行交互，因此你无法获取键盘输入。\n\
    \n**注意：** 你可以在 [`http://forum.xcelme.com`](http://forum.xcelme.com) 下载完整的随机数生成器应用。相关代码是第\
    \ 4 章的主题。\n\n你的 Swift 应用将在命令行中运行，因为它需要用户猜一个随机数。\n\n1. 打开 Xcode 并选择 **创建一个新的 Xcode\
    \ 项目**。选择 **命令行工具** macOS 项目，如图 4-3 所示，然后点击 **下一步**。\n\n   ![A341013_4_En_4_Fig3_HTML.jpg](img/A341013_4_En_4_Fig3_HTML.jpg)\n\
    \n   图 4-3. 新建一个 macOS 命令行工具项目\n\n2. 将你的项目命名为 **RandomNumber**（见图 4-4）。确保 **语言**\
    \ 下拉菜单选择 **Swift**，然后点击 **下一步**。将项目保存到你硬盘上任意喜欢的位置，然后点击 **创建**。\n\n   ![A341013_4_En_4_Fig4_HTML.jpg](img/A341013_4_En_4_Fig4_HTML.jpg)\n\
    \n   图 4-4. RandomNumber 的项目选项\n\n3. 打开 `main.swift` 文件。编写列表 4-13 中的代码。\n\n  \
    \ ```\n   1 //\n   2 //  main.swift\n   3 //  RandomNumber\n   4 //\n   \n   6\
    \ import Foundation\n   \n   8 var randomNumber = 1\n   9 var continueGuessing\
    \ = true\n   10 var keepPlaying = true\n   11 var input = \"\"\n   \n   13 while\
    \ keepPlaying {\n   14     randomNumber = Int(arc4random_uniform(101)) // 获取一个\
    \ 0-100 之间的随机数\n   15     print(\"要猜的随机数是: \\(randomNumber)\")\n   16     while\
    \ continueGuessing {\n   17         print(\"在 0 到 100 之间选一个数字。\")\n   18     \
    \    input = NSString(data: FileHandle.standardInput.availableData, encoding:String.Encoding.utf8.rawValue)!\
    \ as String // 获取键盘输入\n   19         input = input.replacingOccurrences(of: \"\
    \\n\", with: \"\", options: NSString.CompareOptions.literal, range: nil) // 去除\
    \ \\n\n   20         if let userGuess = Int(input) {\n   21             if userGuess\
    \ == randomNumber {\n   22                 continueGuessing = false\n   23   \
    \              print(\"猜对了!\")\n   24             }\n   25             // 嵌套的\
    \ if 语句\n   26             else if userGuess > randomNumber {\n   27         \
    \        // 用户猜高了\n   28                 print(\"你猜的数字太大了!\")\n   29         \
    \    }\n   30             else{\n   31                 // 无需检查 userGuess < randomNumber，情况必然如此。\n\
    \   32                 print(\"你猜的数字太小了!\")\n   33             }\n   34      \
    \   } else {\n   35             print(\"无效猜测，请重试。\")\n   36         }\n   37 \
    \    }\n   38     print (\"再来一次？Y 或 N\")\n   39     input = NSString(data: FileHandle.standardInput.availableData,\
    \ encoding:String.Encoding.utf8.rawValue)! as String\n   40     input = input.replacingOccurrences(of:\
    \ \"\\n\", with: \"\", options: NSString.CompareOptions.literal, range: nil)\n\
    \   \n   42     if input == \"N\" || input == \"n\" {\n   43         keepPlaying\
    \ = false\n   44     }\n   45     continueGuessing = true\n   46 }\n   ```\n\n\
    \   列表 4-13. 随机数生成器应用的源代码\n\n在列表 4-13 中，有一些我们之前没讨论过的新代码。第一行新代码（第 14 行）如下：\n\n\
    ```\nrandomNumber = Int(arc4random_uniform(101))\n```\n\n这一行会生成一个 0 到 100 之间的随机数。`arc4random_uniform()`\
    \ 是一个返回随机数的函数。\n\n下一行新代码在第 18 行：\n\n```\n18         input = NSString(data: FileHandle.standardInput.availableData,\
    \ encoding:String.Encoding.utf8.rawValue)! as String // 获取键盘输入\n```\n\n这使你能够获取用户的键盘输入。我们将在后续章节中讨论这种语法。\n\
    \n下一行新代码在第 20 行：\n\n```\nif let userGuess = Int(input)\n```\n\n`Int` 接受一个字符串初始化器，并将其转换为整数。\n\
    \n## 嵌套的 `if` 语句和 `else if` 语句\n\n有时需要对 `if` 语句进行嵌套。这意味着你需要在已有的 `if` 语句内部嵌套 `if`\
    \ 语句。此外，有时还需要在 `if` 语句的 `else` 部分中首先进行比较。这被称为 `else if` 语句（回顾列表 4-13 中的第 26 行）。\n\
    \n```\nelse if userGuess > randomNumber\n```\n\n## 移除多余字符\n\n列表 4-13 中的第 19 行如下：\n\
    \n```\ninput = input.replacingOccurrences(of: \"\\n\", with: \"\", options: NSString.CompareOptions.literal,\
    \ range: nil) // 去除 \\n\n```\n\n读取键盘输入有时会比较麻烦。在这种情况下，它会在字符串末尾留下一个残余字符 `\\n`，你需要将其移除。这是用户在键盘上按下\
    \ **回车** 键时生成的换行符。\n\n## 通过重构改进代码\n\n通常，在让代码运行起来之后，你会检查代码并找到更高效的编写方式。重写代码使其更高效、更易维护、更易读的过程被称为\
    \ *代码重构*。\n\n当你审查 Swift 代码时，经常会发现可以删掉一些不必要的代码。\n\n**注意：** 作为开发者，我们发现最好的代码行就是你不需要写的那一行——更少的代码意味着更少的调试和维护工作。\n\
    \n## 运行应用\n\n要运行应用，请点击 Swift 项目屏幕左上角的 **播放** 按钮。参见图 4-5。\n\n![A341013_4_En_4_Fig5_HTML.jpg](img/A341013_4_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5. Swift 随机数生成器应用的控制台输出\n\n**注意：** 如果运行应用时没有看到输出控制台，请确保你在编辑器右上角和右下角选择了相同的选项（选择\
    \ **视图** → **调试区域** → **激活控制台**）。\n"
- fmt: '### Design Requirements


    As discussed in Chapter [1](#A341013_4_En_1_Chapter.html), the most expensive
    process in the software development life cycle is writing code. The least expensive
    process in the software development life cycle is gathering the requirements for
    your application; yet, this latter process is the most overlooked and least used
    in software development.


    Design requirements usually begin by asking clients, customers, and/or stakeholders
    how the application should work and what problems it should solve.


    With respect to apps, requirements can include long or short narrative descriptions,
    screen mock-ups, and formulas. It is far easier to open your word processor and
    change the requirements and screen mock-ups before coding begins than it is to
    modify an iOS app. The following is the design requirement for one view of an
    iPhone mobile banking app:


    - **View**: Accounts view.

    - **Description**: Displays the list of accounts the user has. The list of accounts
    will be in the following sections: Business Accounts, Personal Accounts and Car
    Loans, IRA, and Home Equity Loans.

    - **Cells**: Each cell will contain the account name, the last four digits of
    the account, the available balance, and the present balance.


    A picture is worth a thousand words. Screen mock-ups are helpful to developers
    and users because they can show how the views will look when they are completed.
    There are many tools that can quickly design mock-ups; one of these tools is OmniGraffle.
    See Figure [4-6](#A341013_4_En_4_Chapter.html#Fig6) for an example of a screen
    mock-up used for design requirements generated by OmniGraffle.


    ![A341013_4_En_4_Fig6_HTML.jpg](A341013_4_En_4_Fig6_HTML.jpg)


    **Figure 4-6.** Screen mock-up for a mobile banking app using OmniGraffle and
    the Ultimate iPhone Stencil plug-in. This mock-up was done for the original Woodforest
    Banking app in 2010.


    Many developers believe that design requirements take too long and are unnecessary.
    This is not the case. There is a lot of information presented on the Accounts
    screen in Figure [4-6](#A341013_4_En_4_Chapter.html#Fig6). Many business rules
    can determine how information is displayed to the users, along with all of the
    error handling when things go bad. When designing your app, working with all the
    business stakeholders at the beginning of the development process is critical
    to getting it right the first time.


    Figure [4-7](#A341013_4_En_4_Chapter.html#Fig7) is an example of all stakeholders
    being involved in your app’s development. Having all stakeholders involved in
    every view from the beginning will eliminate multiple rewrites and application
    bugs.


    ![A341013_4_En_4_Fig7_HTML.jpg](A341013_4_En_4_Fig7_HTML.jpg)


    **Figure 4-7.** Woodforest Mobile Banking app as it appeared on the App Store
    in 2015; compare this with the app requirements Accounts screen in Figure [4-6](#A341013_4_En_4_Chapter.html#Fig6).


    Additionally, Apple recommends that developers spend at least 50 percent of their
    development time on the user interface’s design and development.


    Balsamiq also has great tools for laying out your iOS app’s look. See Figure [4-8](#A341013_4_En_4_Chapter.html#Fig8).


    ![A341013_4_En_4_Fig8_HTML.jpg](A341013_4_En_4_Fig8_HTML.jpg)


    **Figure 4-8.** Balsamiq.com web site for creating wireframe mock-ups.


    ## Summary


    This chapter covered a lot of important information on how to control your applications;
    program flow and decision-making are essential to every iOS app. Make sure you
    have completed the Swift example in this chapter. You might review these examples
    and think you understand everything without having to write this app. This will
    be a fatal mistake that will prevent you from becoming a successful iOS developer.
    You must spend time coding this example. Developers learn by doing, not by reading.


    The terms in this chapter are important. You should be able to describe the following:


    - `AND`

    - `OR`

    - `XOR`

    - `NAND`

    - `NOR`

    - `NOT`

    - Truth tables

    - Negation

    - All comparison operators

    - Application requirement

    - Logical `AND` (`&&`)

    - Logical `OR` (`||`)

    - Optionals and forced unwrapping

    - Optional binding

    - Implicitly unwrapped optionals

    - Flowchart

    - Loop

    - Count-controlled loops

    - For loop

    - Condition-controlled loops

    - Infinite loops

    - `While` loops

    - Nested `if` statements

    - Code refactoring


    ### Exercises


    - Extend the random number generator app to print to the console how many times
    the user guessed before guessing the correct random number.

    - Extend the random number generator app to print to the console how many times
    the user played the app. Print this value to the console when the user quits the
    app.


    # 5. Object-Oriented Programming with Swift


    Over the past 16 years, the programming world focused on the development paradigm
    of object-oriented programming (OOP). Most modern development environments and
    languages implement OOP. Put simply, OOP forms the basis of everything you develop
    today.


    You may be asking yourself why we waited until Chapter [5](#A341013_4_En_5_Chapter.html)
    to present OOP using Swift if it is the primary development style of today. The
    simple answer is that it is not an easy concept for new developers. This chapter
    will go into detail about the different aspects of OOP and how they affect your
    development.


    Implementing OOP into your applications correctly will take some front-end planning,
    but you will save yourself a lot of time throughout the life of your projects.
    OOP has changed the way development is done. In this chapter, you will learn what
    OOP is. OOP was initially discussed in the first chapter of this book, but this
    chapter will go into more detail about it. You will revisit what objects are and
    how they relate to physical objects you find in the world. You will look into
    what classes are and how they relate to objects. You will also learn the steps
    you need to take when planning your classes and some visual tools you can use
    to accomplish these steps. When you have read this chapter and have worked through
    the exercises, you will have a better understanding of what OOP is and why it
    is necessary for you as a developer.


    At first, objects and object-oriented programming may seem difficult to understand,
    but the hope is that as you progress through this chapter, they will begin to
    make sense.'
