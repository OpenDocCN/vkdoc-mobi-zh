    # 12. Protocols and Delegates


    Congratulations! You are acquiring the skills to become an iOS developer! However,
    iOS developers need to understand two additional topics in order to be successful:
    protocols and delegates. It is not uncommon for new developers to get overwhelmed
    by these topics, which is why we introduced the foundational topics of the Swift
    language first. After reading this chapter, you will see that protocols and delegates
    are really useful and not hard to understand and implement.


    ## Multiple Inheritance


    We discussed object inheritance in Chapter [5](#A341013_4_En_5_Chapter.html).
    In a nutshell, object inheritance means that a child can inherit all the characteristics
    of its parent, as shown in Figure [12-1](#A341013_4_En_12_Chapter.html#Fig1).


    ![A341013_4_En_12_Fig1_HTML.jpg](A341013_4_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    Typical Swift inheritance


    C++, Perl, and Python all have a feature called multiple inheritance , which enables
    a class to inherit behaviors and features from more than one parent, as shown
    in Figure [12-2](#A341013_4_En_12_Chapter.html#Fig2).


    ![A341013_4_En_12_Fig2_HTML.jpg](A341013_4_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Multiple inheritance


    Problems can arise with multiple inheritance because it allows for ambiguities
    to occur. Therefore, Swift does not implement multiple inheritances. Instead,
    it implements something called a protocol.


    ## Understanding Protocols


    Apple defines a protocol as a list of function declarations, unattached to a class
    definition. A protocol is similar to a class with the exception that a protocol
    doesn’t provide an implementation for any of the requirements; it describes only
    what an implementation should look like.


    The protocol can be adopted by a class to provide an actual implementation of
    those requirements. Any type that satisfies the requirements of a protocol is
    said to conform to that protocol.


    ## Protocol Syntax


    Protocols are defined like classes are, as shown in Listing [12-1](#A341013_4_En_12_Chapter.html#Par8).


    ```

    protocol RandomNumberGenerator {

    var mustBeSettable: Int { get set }

    var doesNotNeedToBeSettable: Int { get }

    func random() -> Double

    }

    Listing 12-1.

    Protocol Definition

    ```


    If a class has a superclass, you list the superclass name before any protocols
    it adopts, followed by a comma, as shown in Listing [12-2](#A341013_4_En_12_Chapter.html#Par10).


    ```

    class MyClass: MySuperclass, RandomNumberGenerator, AnotherProtocol {

    // class definition goes here

    }

    Listing 12-2.

    Protocol Listed after Superclass

    ```


    The protocol also specifies whether each property must have a gettable or gettable
    and settable implementation. A gettable property is read-only, whereas a gettable
    and settable property is not (shown earlier in Listing [12-1](#A341013_4_En_12_Chapter.html#Par8)).


    Properties are always declared as variable properties, prefixed with `var`. Gettable
    and settable properties are indicated by `{ get set }` after their type declaration,
    and gettable properties are indicated by `{ get }`.


    ## Delegation


    Delegation is a design pattern that enables a class or structure to hand off (or
    delegate) some of its responsibilities to an instance of another type. This design
    pattern is implemented by defining a protocol that encapsulates the delegated
    responsibilities. Delegation can be used to respond to a particular action or
    to retrieve data from an external source without needing to know the underlying
    type of that source.


    Listing [12-3](#A341013_4_En_12_Chapter.html#Par15) defines two protocols for
    use with a random number guessing game.


    ```

    protocol RandomNumberGame {

    var machine: Machine { get }

    func play()

    }

    protocol RandomNumberGameDelegate {

    func gameDidStart(game: RandomNumberGame)

    func game(game: RandomNumberGame, didStartNewTurnWithGuess randomGuess: Int)

    func gameDidEnd(game: RandomNumberGame)

    }

    Listing 12-3.

    Protocol Definitions

    ```


    The `RandomNumberGame` protocol can be adopted by any game that involves random
    number generating and guessing. The `RandomNumberGameDelegate` protocol can be
    adopted by any type of class to track the progress of a `RandomNumberGame` protocol.


    ## Protocol and Delegation Example


    This section shows you how to create a more sophisticated random number guessing
    app to illustrate how to use protocols and delegation. The app’s home view displays
    the user’s guess and whether the guess was high, low, or correct, as shown in
    Figure [12-3](#A341013_4_En_12_Chapter.html#Fig3).


    ![A341013_4_En_12_Fig3_HTML.jpg](A341013_4_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    Guessing game app home view


    When the users tap the Guess Random Number button, they are taken to an input
    screen to enter their guess, as shown in Figure [12-4](#A341013_4_En_12_Chapter.html#Fig4).


    ![A341013_4_En_12_Fig4_HTML.jpg](A341013_4_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    Guessing game app user input view


    When the users enter their guess, the delegate method passes the guess back to
    the home view, and the home view displays the result.'
