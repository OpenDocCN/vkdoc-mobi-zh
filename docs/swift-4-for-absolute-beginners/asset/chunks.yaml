  trans: "\n# 在数据库中存储信息\n\n对于开发者而言，数据库通常是个令人望而生畏的主题；大多数开发者会将数据库与 Microsoft SQL Server\
    \ 或 Oracle 这类企业级数据库服务器联系起来。这些应用程序需要花费时间进行设置，并且需要持续管理。对于大多数开发者来说，像 Oracle 这样的数据库系统可能过于复杂。幸运的是，苹果公司在\
    \ iOS、macOS 和 tvOS 中内置了一个小巧高效的数据库引擎，名为 SQLite。这让你能够获得复杂数据库服务器的许多功能，而无需承担其开销。\n\
    \n`SQLite` 在为应用程序存储信息方面提供了极大的灵活性。它将整个数据库存储在一个单一文件中。它速度快、可靠，并且易于在你的应用程序中实现。关于 `SQLite`\
    \ 数据库最棒的一点是，无需安装任何软件；苹果公司已经为你处理好了这一切。\n\n然而，作为开发者，你应当了解 `SQLite` 存在的一些局限性。\n\n\
    - `SQLite` 被设计为单用户数据库。你不应在需要多人同时访问同一数据库的环境中使用 `SQLite`。这可能导致数据丢失或损坏。\n- 在商业领域，数据库可能会变得非常庞大。数据库管理员处理规模高达半\
    \ TB 的数据库并不罕见，在某些情况下，数据库甚至可能变得更大。`SQLite` 应当能够毫无问题地处理较小的数据库，但如果你的数据库开始变得过大，你就会开始遇到性能问题。\n\
    - `SQLite` 缺乏企业级数据库解决方案所具备的一些备份和数据恢复功能。\n\n在本章中，你将专注于使用 `SQLite` 作为你的数据库引擎。如果你正在开发的应用程序中存在上述任何局限性，你可能需要考虑企业级数据库解决方案，但这已超出了本书的讨论范围。\n\
    \n**注意**\n\n`SQLite`（发音为“sequel-lite”）的名字源自结构化查询语言（`SQL`，发音为“sequel”）。`SQL` 是一种用于向数据库输入、搜索和检索数据的语言。\n\
    \n苹果公司已经努力解决了数据库开发中的许多挑战。作为开发者，你无需熟悉 `SQL`，因为苹果公司通过一个名为 Core Data 的框架为你处理了直接的数据库交互，这使得与数据库的交互变得更加容易。Core\
    \ Data 是苹果公司从 NeXT 的产品 Enterprise Object Framework 改编而来，并且使用 Core Data 比直接与 `SQLite`\
    \ 数据库交互要容易得多。通过 `SQL` 直接访问数据库超出了本书的讨论范围。\n\n# 开始使用 Core Data\n\n让我们从创建一个新的 Core\
    \ Data 项目开始。\n\n1.  打开 Xcode 并选择 **File** ➤ **New** ➤ **Project**。要创建一个 iOS Core\
    \ Data 项目，请从顶部菜单中选择 **iOS**。然后选择 **Single View App**，如图 11-1 所示。\n\n    ![A341013_4_En_11_Fig1_HTML.jpg](img/A341013_4_En_11_Fig1_HTML.jpg)\n\
    \n    **图 11-1.** 创建新项目\n\n2.  完成后点击 **Next** 按钮。下一个界面将允许你输入你想要使用的名称。在本章中，你将使用名称\
    \ `BookStore`。\n\n3.  靠近底部，你会看到一个名为 **Use Core Data** 的复选框。确保此项已勾选，然后点击 **Next**，如图\
    \ 11-2 所示。\n\n    **注意** Core Data 可以在任何时候添加到任何项目中。在创建项目时勾选该复选框，会将 Core Data 框架和一个默认数据模型添加到你的应用程序中。如果你知道自己将使用\
    \ Core Data，勾选此框将为你节省时间。\n\n    ![A341013_4_En_11_Fig2_HTML.jpg](img/A341013_4_En_11_Fig2_HTML.jpg)\n\
    \n    **图 11-2.** 将 Core Data 添加到项目中\n\n4.  选择保存项目的位置，然后点击 **Create**。\n\n完成后，你的新项目将会打开。它看起来类似于一个标准应用程序，不过现在你会多出一个\
    \ `BookStore.xcdatamodeld` 文件。这个文件被称为数据模型，它将包含你将要在 Core Data 中存储的数据的相关信息。\n\n\
    ## 模型\n\n点击模型文件（`BookStore.xcdatamodeld`）将其打开。你将看到一个类似于图 11-3 所示的窗口。\n\n![A341013_4_En_11_Fig3_HTML.jpg](img/A341013_4_En_11_Fig3_HTML.jpg)\n\
    \n**图 11-3.** 空白的模型\n\n窗口分为四个部分。在左侧，是你的实体。用更常见的术语来说，这些就是你想在数据库中存储的对象或项目。\n\n右上部分包含实体的属性。属性是关于实体的信息片段。例如，一本书是一个实体，而书的标题是该实体的一个属性。\n\
    \n**注意**\n\n在数据库术语中，实体就是你的表，实体的属性被称为列。由这些实体创建的对象被称为行。\n\n右侧面板的中间部分将显示一个实体的所有关系。关系将一个实体与另一个实体连接起来。例如，你将创建一个\
    \ `Book` 实体和一个 `Author` 实体。然后你将它们关联起来，以便每本书都可以有一个作者。屏幕的右下部分处理的是提取属性。提取属性超出了本书的讨论范围，但它们允许你为数据创建过滤器或查询。\n\
    \n让我们创建一个实体。\n\n1.  点击窗口左下角的加号，或者从菜单中选择 **Editor** ➤ **Add Entity**，如图 11-4 所示。\n\
    \n    ![A341013_4_En_11_Fig4_HTML.jpg](img/A341013_4_En_11_Fig4_HTML.jpg)\n\n\
    \    **图 11-4.** 添加新实体\n\n2.  在左侧，双击 **Entity** 名称并将其更改为 `Book`。\n\n    **注意** 实体名称必须大写首字母。\n\
    \n3.  现在让我们添加一些属性。属性可以被视为一本书的详细信息，因此你将存储书名、作者、价格和出版年份。显然，在你自己的应用程序中，你可能想要存储更多信息，例如出版商、页数和类型，但我们要从简单的开始。点击窗口右下角的加号，或者选择\
    \ **Editor** ➤ **Add Attribute**，如图 11-5 所示。如果你没有看到添加属性的选项，请确保你已经在左侧选中了 `Book`\
    \ 实体。\n\n    ![A341013_4_En_11_Fig5_HTML.jpg](img/A341013_4_En_11_Fig5_HTML.jpg)\n\
    \n    **图 11-5.** 添加属性\n"
- fmt: '## Adding a New Attribute


    You will be given only two options for your attribute: the name and the data type.
    Let’s call this attribute `title`. Unlike entities, attribute names must be lowercase.


    Now, you will need to select a data type. Selecting the correct data type is important.
    It will affect how your data is stored and retrieved from the database. The list
    has 13 items in it and can be daunting. We will discuss the most common options
    and, as you become more familiar with Core Data, you can experiment with the other
    options. The most common options are `String`, `Integer 32`, `Decimal`, and `Date`.
    For the title of the book, select `String`.


    - `String`: This is the type of attribute used to store text. This should be used
    to store any kind of information that is not a number or a date. In this example,
    the book title and author will be strings.

    - `Integer 32`: There are three different integer values possible for an attribute.
    Each of the integer types differs only in the minimum and maximum values possible.
    `Integer 32` should cover most of your needs when storing an integer. An integer
    is a number without a decimal. If you try to save a decimal in an integer attribute,
    the decimal portion will be truncated. In this example, the year published will
    be an integer.

    - `Decimal`: A decimal is a type of attribute that can store numbers with decimals.
    A decimal is similar to a double attribute, but they differ in their minimum and
    maximum values and precision. A decimal should be able to handle any currency
    values. In this example, you will use a decimal to store the price of the book.

    - `Date`: A date attribute is exactly what it sounds like. It allows you to store
    a date and time and then performs searches and lookups based on these values.
    You will not use this type in this example.


    Let’s create the rest of the attributes for the book. Now, add `price`. It should
    be a `Decimal`. Add the year the book was published. For two-word attributes,
    it is standard to make the first word lowercase and the second word start with
    a capital letter. For example, an ideal name for the attribute for the year the
    book was published would be `yearPublished`. Select `Integer 32` as the attribute
    type. Once you have added all of your attributes, your screen should look like
    Figure [11-6](#A341013_4_En_11_Chapter.html#Fig6).


    > **Note:** Attribute names cannot contain spaces.


    ![A341013_4_En_11_Fig6_HTML.jpg](A341013_4_En_11_Fig6_HTML.jpg)


    **Figure 11-6.** The finished `Book` entity


    > **Note:** If you are used to working with databases, you will notice that you
    did not add a primary key. A primary key is a field (usually a number) that is
    used to uniquely identify each record in a database. In Core Data databases, there
    is no need to create primary keys. The Framework will manage all of that for you.


    Now that you have finished the `Book` entity, let’s add an `Author` entity.


    1. Add a new entity and call it `Author`.

    2. To this entity, add `lastName` and `firstName`, both of which are strings.


    Once this is done, you should have two entities in your entity list. Now you need
    to add the relationships.


    1. Click the `Book` entity, and then click and hold on the plus sign that is located
    on the bottom right of the screen. Select `Add Relationship`, as shown in Figure
    [11-7](#A341013_4_En_11_Chapter.html#Fig7). (You can also click the plus under
    the Relationships section of the Core Data model.)


    ![A341013_4_En_11_Fig7_HTML.jpg](A341013_4_En_11_Fig7_HTML.jpg)


    **Figure 11-7.** Adding a new relationship


    2. You will be given the opportunity to name your relationship. You usually give
    a relationship the same name as the entity that you are referencing. Type in `author`
    as the name and select `Author` from the Destination drop-down menu.


    3. You have created one-half of your relationship. To create the other half, click
    the `Author` entity. Click the plus sign located at the bottom right of the screen
    and select `Add Relationship`. You will use the entity name that you are connecting
    to as the name of this relationship, so you will call it `books`. (You are adding
    an `s` to the relationship name because an author can have many books.) Under
    `Destination`, select `Book`, and under `Inverse`, select the `author` relationship
    you made in the previous step. In the Utilities window on the right side of the
    screen, select the Data Model Inspector. Select `To Many` for the type of the
    relationship. Your model should now look like Figure [11-8](#A341013_4_En_11_Chapter.html#Fig8).


    > **Note:** Sometimes in Xcode, when working with models, it is necessary to press
    the `Tab` key for the names of entities, attributes, and relationships to update.
    This little quirk can be traced all the way back to WebObjects tools.


    ![A341013_4_En_11_Fig8_HTML.jpg](A341013_4_En_11_Fig8_HTML.jpg)


    **Figure 11-8.** The final relationship


    By default, Xcode will now know and be able to use your new entities. If you need
    to customize your Core Data objects such as adding validation or custom calculated
    properties, you will need to tell Xcode to generate `NSManagedObject` subclasses
    for you. For this chapter, we will use Xcode’s default implementation. You can
    check to make sure that Xcode will generate these files at runtime, by clicking
    on the Entity and then viewing the Data Model Inspector on the right as shown
    in Figure [11-9](#A341013_4_En_11_Chapter.html#Fig9). Make sure that `Codegen`
    is set to `Class Definition`.


    ![A341013_4_En_11_Fig9_HTML.jpg](A341013_4_En_11_Fig9_HTML.jpg)


    **Figure 11-9.** Checking an Entity’s `Codegen` Status


    When Xcode generates the Class Definitions for your entities, it will then make
    subclasses of `NSManagedObject`. `NSManagedObject` is an object that handles all
    of the Core Data database interaction. It provides the methods and properties
    you will be using in this example.


    ### Managed Object Context


    Xcode will create a managed object class called `Book`. In Core Data, every managed
    object should exist within a managed object context. The context is responsible
    for tracking changes to objects, carrying out undo operations, and writing the
    data to the database. This is helpful because you can now save a bunch of changes
    at once rather than saving each individual change. This speeds up the process
    of saving the records. As a developer, you do not need to track when an object
    has been changed. The managed object context will handle all of that for you.'
