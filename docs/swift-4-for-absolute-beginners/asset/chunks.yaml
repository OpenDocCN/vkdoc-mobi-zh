    \ 更改了错误处理方式。Swift 4.0 的错误处理方式与 Swift 3.0 几乎相同。现在，当执行可能引发错误的操作时，可以使用`try`然后`throw`一个错误。第\
    \ 9 行告诉`UITableView`重新加载自身以显示新添加的`Book`。现在构建并运行应用程序。多次点击 + 按钮。你将向对象存储中添加新的`Book`对象，如图\
    \ 11-23 所示。如果你退出应用并重新启动，你会注意到数据仍然存在。\n\n![A341013_4_En_11_Fig23_HTML.jpg](img/A341013_4_En_11_Fig23_HTML.jpg)\n\
    \nFigure 11-23. 最终应用\n\n这是对 iOS 中 Core Data 的简要介绍。Core Data 是一个强大的 API，但也需要花费大量时间去掌握。\n\
    \n## 总结\n\n以下是本章涵盖的主题摘要：\n\n*   偏好设置：你学习了使用`UserDefaults`在 iOS、macOS、tvOS 和 watchOS\
    \ 上保存和读取偏好设置文件。\n*   数据库：你了解了什么是数据库，以及为何使用数据库比将信息保存到偏好设置文件更可取。\n*   数据库引擎：你学习了\
    \ Apple 集成到 macOS、tvOS 和 iOS 中的 SQLite 数据库引擎及其优缺点。\n*   Core Data：Apple 提供了用于与\
    \ SQLite 数据库交互的框架。该框架简化了接口的使用。\n*   书店应用：你创建了一个简单的 Core Data 应用，并使用 Xcode 为你的书店创建了一个数据模型。你还学习了如何在两个实体之间建立关系。最后，你使用\
    \ Xcode 为你的 Core Data 模型创建了一个简单的接口。\n\n### 练习\n\n*   向应用添加一个新视图，允许用户输入书名。\n* \
    \  提供一种从列表中删除图书的方法。\n*   创建一个`Author`对象并将其添加到`Book`对象中。\n\n# 12. 协议和委托\n\n恭喜！你正在掌握成为\
    \ iOS 开发者所需的技能！然而，iOS 开发者还需要理解两个额外主题才能获得成功：协议（Protocols）和委托（Delegates）。新开发者很容易被这些主题压倒，因此我们首先介绍了\
    \ Swift 语言的基础知识。阅读本章后，你会看到协议和委托非常有用，并且不难理解和实现。\n\n## 多重继承\n\n我们在第 5 章讨论了对象继承。简而言之，对象继承意味着子类可以继承父类的所有特性，如图\
    \ 12-1 所示。\n\n![A341013_4_En_12_Fig1_HTML.jpg](img/A341013_4_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1. 典型的 Swift 继承\n\nC++、Perl 和 Python 都具有称为多重继承的特性，它允许一个类从多个父类继承行为和特性，如图\
    \ 12-2 所示。\n\n![A341013_4_En_12_Fig2_HTML.jpg](img/A341013_4_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2. 多重继承\n\n多重继承可能会出现问题，因为它会导致歧义。因此，Swift 不实现多重继承，而是实现了称为协议（Protocol）的机制。\n\
    \n## 理解协议\n\nApple 将协议定义为一组函数声明的列表，与类定义无关。协议类似于类，不同之处在于协议不提供任何需求的实现；它只描述实现应具有的外观。\n\
    \n类可以采用该协议来提供这些需求的实际实现。任何满足协议要求的类型都被称为符合该协议。\n\n## 协议语法\n\n协议的定义方式与类类似，如清单 12-1\
    \ 所示。\n\n```\nprotocol RandomNumberGenerator {\n    var mustBeSettable: Int {\
    \ get set }\n    var doesNotNeedToBeSettable: Int { get }\n    func random() ->\
    \ Double\n}\n```\n*Listing 12-1. 协议定义*\n\n如果某个类有父类，则需要在它采用的任何协议之前列出父类名称，后跟逗号，如清单\
    \ 12-2 所示。\n\n```\nclass MyClass: MySuperclass, RandomNumberGenerator, AnotherProtocol\
    \ {\n    // 类定义写在这里\n}\n```\n*Listing 12-2. 协议在父类之后列出*\n\n协议还指定每个属性必须具有 gettable（可获取）或\
    \ gettable 和 settable（可获取和可设置）的实现。gettable 属性是只读的，而 gettable 和 settable 属性则不是（如前面的清单\
    \ 12-1 所示）。\n\n属性始终声明为变量属性，前缀为`var`。gettable 和 settable 属性在其类型声明后通过`{ get set\
    \ }`表示，而 gettable 属性则通过`{ get }`表示。\n\n## 委托\n\n委托是一种设计模式，它允许一个类或结构体将其部分职责转交（或委托）给另一种类型的实例。这种设计模式通过定义一个封装了委托职责的协议来实现。委托可用于响应特定操作或从外部源检索数据，而无需了解该外部源的底层类型。\n\
    \n清单 12-3 定义了两个用于随机数字猜测游戏的协议。\n\n```\nprotocol RandomNumberGame {\n    var machine:\
    \ Machine { get }\n    func play()\n}\n\nprotocol RandomNumberGameDelegate {\n\
    \    func gameDidStart(game: RandomNumberGame)\n    func game(game: RandomNumberGame,\
    \ didStartNewTurnWithGuess randomGuess: Int)\n    func gameDidEnd(game: RandomNumberGame)\n\
    }\n```\n*Listing 12-3. 协议定义*\n\n`RandomNumberGame`协议可以被任何涉及随机数生成和猜测的游戏采用。`RandomNumberGameDelegate`协议可以被任何类型的类采用，以跟踪`RandomNumberGame`协议的进度。\n\
    \n## 协议和委托示例\n\n本节将向你展示如何创建一个更复杂的随机数字猜测应用，以说明如何使用协议和委托。应用的主视图显示用户的猜测以及该猜测是高了、低了还是正确，如图\
    \ 12-3 所示。\n\n![A341013_4_En_12_Fig3_HTML.jpg](img/A341013_4_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3. 猜测游戏应用主视图\n\n当用户点击“Guess Random Number”按钮时，他们将被带到一个输入屏幕以输入他们的猜测，如图\
    \ 12-4 所示。\n\n![A341013_4_En_12_Fig4_HTML.jpg](img/A341013_4_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4. 猜测游戏应用用户输入视图\n\n当用户输入他们的猜测时，委托方法将猜测传回主视图，然后主视图显示结果。\n"
- fmt: "# Getting Started\n\nFollow these steps to create the app:\n\n1. Create a\
    \ new Swift project based on the Single View Application template, name it `RandomNumberDelegate`,\
    \ and save it, as shown in Figure [12-5](#A341013_4_En_12_Chapter.html#Fig5).\n\
    \n![A341013_4_En_12_Fig5_HTML.jpg](A341013_4_En_12_Fig5_HTML.jpg)\n\nFigure 12-5.\
    \ Creating the project\n\n2. From the Document Outline, select the `View Controller`.\
    \ Then select Editor ➤ Embed In ➤ Navigation Controller. This embeds your `View\
    \ Controller` in a `Navigation Controller` and enables you to easily transition\
    \ back and forth between other View Controllers, as shown in Figure [12-6](#A341013_4_En_12_Chapter.html#Fig6).\n\
    \n![A341013_4_En_12_Fig6_HTML.jpg](A341013_4_En_12_Fig6_HTML.jpg)\n\nFigure 12-6.\
    \ Embedding the View Controller in a Navigation Controller\n\n3. In the `View\
    \ Controller`, add two `Label` objects and two `Button` objects along with their\
    \ four respective outlets to control the view, as shown in Figure [12-7](#A341013_4_En_12_Chapter.html#Fig7).\n\
    \n![A341013_4_En_12_Fig7_HTML.jpg](A341013_4_En_12_Fig7_HTML.jpg)\n\nFigure 12-7.\
    \ Outlets necessary to control the view\n\n4. Next, connect the Action in Listing\
    \ [12-4](#A341013_4_En_12_Chapter.html#Par25) to the `playAgainButton`.\n\n```\n\
    \    27     // event triggered by playAgainButton\n    28     @IBAction func playAgain(_\
    \ sender: Any) {\n    29         createRandomNumber()\n    30         playAgainButton.isHidden\
    \ = true // only show the button when the user guessed the right #\n    31   \
    \      guessButton.isHidden = false // show the button\n    32         resultLabel.text\
    \ = \"\"\n    33         userGuessLabel.text = \"New Game\"\n    34         previousGuess\
    \ = \"\" 35     }\n    Listing 12-4.\n    IBAction Function\n    ```\n\n5. Add\
    \ the code in Listing [12-5](#A341013_4_En_12_Chapter.html#Par27) for the functions\
    \ to handle when the user guesses a number and to handle creating a random number.\n\
    \n```\n    40    // function called from the GuessInputViewController when the\
    \ user taps on the Save Button button\n    41    func userDidFinish(_ controller:\
    \ GuessInputViewController, guess:  String) {\n    42        userGuessLabel.text\
    \ = \"The guess was \" +  guess\n    43        previousGuess = guess\n    44 \
    \       let numberGuess = Int(guess)\n    45        if (numberGuess! > randomNumber){\n\
    \    46            resultLabel.text = \"Guess too high\"\n    47        }\n  \
    \  48        else if (numberGuess! < randomNumber) {\n    49            resultLabel.text\
    \ = \"Guess too low\"\n    50        }\n    51        else {\n    52         \
    \   resultLabel.text = \"Guess is correct\"\n    53            playAgainButton.isHidden\
    \ = false //show the play again button\n    54            guessButton.isHidden\
    \ = true //hide the guess again number\n    55        }\n    56        // pops\
    \ the GuessInputViewController off the stack\n    57        if let navController\
    \ = self.navigationController {\n    58            navController.popViewController(animated:\
    \ true)\n    59        }\n    60    }\n\n62    // creates the random number\n\
    \    63    func createRandomNumber() {\n    64        randomNumber = Int(arc4random_uniform(100))\
    \ //get a random number between 0-100\n    65        print(\"The random number\
    \ is: \\(randomNumber)\") //lets us cheat\n    66        return\n    67    }\n\
    \    Listing 12-5.\n    User Guess Delegate Function and createRandomNumber Function\n\
    \    ```\n\n6. Declare and initialize the two variables on lines 12 and 13 in\
    \ Listing [12-6](#A341013_4_En_12_Chapter.html#Par29).\n\n```\n    11 class ViewController:\
    \ UIViewController {\n    12     var previousGuess = \"\"\n    13     var randomNumber\
    \ = 0\n\n15     @IBOutlet weak var userGuessLabel: UILabel!\n    16     @IBOutlet\
    \ weak var resultLabel: UILabel!\n    17     @IBOutlet weak var guessButton: UIButton!\n\
    \    18     @IBOutlet weak var playAgainButton: UIButton!\n    Listing 12-6.\n\
    \    Variable Declarations and Initializations\n    ```\n\n7. Modify the function\
    \ `viewDidLoad()` to handle how the view should look when it first appears and\
    \ create the random number to guess, as shown in Listing [12-7](#A341013_4_En_12_Chapter.html#Par31).\n\
    \n```\n    20    override func viewDidLoad() {\n    21        super.viewDidLoad()\n\
    \    22        // Do any additional setup after loading the view, typically from\
    \ a nib.\n\n24        createRandomNumber()\n    25        playAgainButton.isHidden\
    \ = true\n    26        resultLabel.text = \"\"\n    27    }\n    Listing 12-7.\n\
    \    viewDidLoad Function\n    ```\n\n8. Now you need to create a view to enable\
    \ the users to enter their guesses. In the `Main.storyboard` file, drag a new\
    \ View Controller next to the home View Controller and add a Label, a Text Field,\
    \ and a Button. For the Text Field object, in the Placeholder property, type \"\
    `Number between 0-100`\", as shown in Figure [12-8](#A341013_4_En_12_Chapter.html#Fig8).\n\
    \n![A341013_4_En_12_Fig8_HTML.jpg](A341013_4_En_12_Fig8_HTML.jpg)\n\nFigure 12-8.\
    \ Create the Guess View Controller and objects\n\n9. You next need to create a\
    \ class for the Guess Input View Controller. Create a Swift file and save it as\
    \ `GuessInputViewController.swift` by selecting File ➤ New ➤ File. Then choose\
    \ iOS and Cocoa Touch Class and name the class `GuessInputViewController` as a\
    \ subclass of `UIViewController`, as shown in Figure [12-9](#A341013_4_En_12_Chapter.html#Fig9).\n\
    \n![A341013_4_En_12_Fig9_HTML.jpg](A341013_4_En_12_Fig9_HTML.jpg)\n\nFigure 12-9.\
    \ Create the `GuessInputViewController.swift` file\n\n10. Let's associate the\
    \ `GuessInputViewController` class with the Guess View Controller created in Step\
    \ 8. From the `Main.storyboard` file, select the Guess Input View Controller,\
    \ select the Identity Inspector, and select or type `GuessInputViewController`\
    \ in the Class field, as shown in Figure [12-10](#A341013_4_En_12_Chapter.html#Fig10).\n\
    \n![A341013_4_En_12_Fig10_HTML.jpg](A341013_4_En_12_Fig10_HTML.jpg)\n\nFigure\
    \ 12-10. Setting the Guess Input View Controller class\n\nNow let's create and\
    \ connect the actions and outlets in the `GuessInputViewController` class, as\
    \ shown in Listing [12-8](#A341013_4_En_12_Chapter.html#Par36).\n\n```\n    9\
    \   import UIKit\n\n11   // protocol used to send data back to the home view controller's\
    \ userDidFinish\n    12   protocol GuessDelegate {\n    13           func userDidFinish(_\
    \ controller:GuessInputViewController, guess: String)\n    14   }\n\n16   class\
    \ GuessInputViewController: UIViewController,  UITextFieldDelegate {\n    17 \
    \          var delegate: GuessDelegate? = nil\n    18           var previousGuess:\
    \ String = \"\"\n\n20           @IBOutlet weak var guessLabel: UILabel!\n    21\
    \           @IBOutlet weak var guessTextField: UITextField!\n\n23           override\
    \ func viewDidLoad() {\n    24                   super.viewDidLoad()\n\n26   \
    \                // Do any additional setup after loading the view.\n    27  \
    \                 if(!previousGuess.isEmpty) {\n    28                       \
    \    guessLabel.text = \"Your previous guess was \\(previousGuess)\"\n    29 \
    \                  }\n    30                   guessTextField.becomeFirstResponder()\n\
    \    31           }\n\n33           override func didReceiveMemoryWarning() {\n\
    \    34                   super.didReceiveMemoryWarning()\n    35            \
    \       // Dispose of any resources that can be recreated.\n    36           }\n\
    \n38           @IBAction func saveGuess(_ sender: AnyObject) {\n    39       \
    \            if let delegate = delegate, let guessText = guessTextField.text {\n\
    \    40                           delegate.userDidFinish(self, guess: guessText)\n\
    \    41                   }\n    42           }\n    43   }\n    Listing 12-8.\n\
    \    Class Listing\n    ```\n\n11. You are almost done. You need to connect the\
    \ scene with a segue. A segue enables you to transition from one scene to another.\
    \ Control-drag from the Guess Random Number button to the Guess Input View Controller\
    \ and select Show as the type of Action Segue, as shown in Figure [12-11](#A341013_4_En_12_Chapter.html#Fig11)."
