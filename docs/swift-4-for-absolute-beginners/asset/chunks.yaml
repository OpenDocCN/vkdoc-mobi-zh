- fmt: '# 7\. Swift Classes, Objects, and Methods


    If you haven’t already read Chapter [6](#A341013_4_En_6_Chapter.html), please
    do so before reading this one because it provides a great introduction to some
    of the basics of Swift. This chapter builds on that foundation, especially with
    creating Swift classes. By the end of this chapter, you can expect to have a greater
    understanding of the Swift language and how to use the basics to write simple
    programs. The best way to learn is to take small programs and write (or rewrite)
    them in Swift just to see how the language works.


    This chapter covers what composes a Swift class and how to interact with Swift
    objects via methods. It uses a simple radio station class as an example of how
    a Swift class is written. This will impart an understanding of how to use a Swift
    class. This chapter also teaches you how to formulate a design for objects that
    are needed to solve a problem. The chapter touches on how to create custom objects,
    as well as how to use existing objects provided in the foundation classes.


    This chapter expands on Chapter [6](#A341013_4_En_6_Chapter.html)’s topics and
    introduces some of the concepts described in detail in Chapter [8](#A341013_4_En_8_Chapter.html).


    ## Creating a Swift Class


    Classes are simple to create in Swift. Generally, a class will be contained in
    its own file, but a single file can hold many classes if desired.


    Here is a sample of the first line from a class declaration:


    ```

    class RadioStation

    ```


    Here, the class name is `RadioStation`. Swift classes, by default, do not inherit
    from a superclass. If you want to make your Swift class inherit from another class,
    you can do this like so:


    ```

    class RadioStation: Station

    ```


    In this example, `RadioStation` is now a subclass of `Station` and will inherit
    all of the properties and methods of `Station`. Listing [7-1](#A341013_4_En_7_Chapter.html#Par10)
    shows the full definition of a class.


    ```

    1 import UIKit


    3 class RadioStation: NSObject {


    5     var name: String

    6     var frequency: Double


    8     override init() {

    9         name = "Default"

    10         frequency = 100

    11     }


    13     static var minAMFrequency: Double = 520.0


    15     static var maxAMFrequency: Double = 1610.0


    17     static var minFMFrequency: Double = 88.3


    19     static var maxFMFrequency: Double = 107.9


    21     func isBandFM() -> Int {

    22         if frequency >= RadioStation.minFMFrequency && frequency <= RadioStation.maxFMFrequency
    {

    23             return 1 //FM

    24         } else {

    25             return 0 //AM


    27         }


    29     }

    30 }

    Listing 7-1.

    A Swift class

    ```


    ### Properties


    Listing [7-1](#A341013_4_En_7_Chapter.html#Par10) shows a sample class with two
    different properties: `name` and `frequency`. Line 1 imports the `UIKit` class
    definitions (more on that in a bit) since this is the default import added by
    Xcode when a new class is created. Line 3 starts the definition of the class by
    defining its name (sometimes called the type). Lines 5 to 6 define a couple of
    properties for the `RadioStation` class.


    Whenever the `RadioStation` class is instantiated, the resulting `RadioStation`
    object has access to these properties, which are only for specific instances.
    If there are ten `RadioStation` objects, each object has its own variables independent
    of the other objects. This is also referred to as scope, in that the object’s
    variables are within the scope of each object.


    Lines 13-19 also contain properties. These properties are preceeded by the word
    `static`. This means this value belongs to a class and every object will maintain
    the same exact value of these properties.


    ### Methods


    Almost every object has methods. In Swift, the most common way to interact with
    an object is by calling a method, like so:


    ```

    myStation.isBandFM()

    ```


    The preceding line will call a method named `isBandFM` on an instance of the `RadioStation`
    class object.


    Methods can also have parameters passed along with them. Why pass parameters?
    Parameters are passed for several reasons. First (and most common), the range
    of possibilities is too large to write as separate methods. Second, the data you
    need to store in your object is variable — like a radio station’s name. In the
    following example, you will see that it isn’t practical to write a method for
    every possible radio frequency; instead, the frequency is passed as a parameter.
    The same applies to the station name.


    ```

    myStation.setFrequency(104.7)

    ```


    The method name is `setFrequency`. Method calls can have several parameters, as
    the following example illustrates:


    ```

    myStation = RadioStation.init(name: "KZZP", frequency: 104.7)

    ```


    In the preceding example, the method call consists of two parameters: the station
    name and its frequency. What’s interesting about Swift relative to other languages
    is that the methods contain named parameters. If this were a C++ or Java program,
    the call would be as follows:


    ```

    myObject = new RadioStation("KZZP", 104.7)

    ```


    While a `RadioStation` object’s parameters might seem obvious, having named parameters
    can be a bonus because they more or less state what the parameters are.


    #### Using Type Methods


    A class doesn’t always have to be instantiated to be used. In some cases, classes
    have methods that can actually perform some simple operations and return values
    before a class is instantiated. These methods are called type methods. In Listing
    [7-1](#A341013_4_En_7_Chapter.html#Par10), the method names that start with `static`
    are type methods.


    Type methods have limitations. One of their biggest limitations is that none of
    the instance variables can be used. Being unable to use instance variables makes
    sense since you haven’t instantiated anything. A type method can have its own
    local variables within the method itself but can’t use any of the variables defined
    as instance variables.


    A call to a type method would look like this:


    ```

    RadioStation.minAMFrequency()

    ```


    Notice that the call is similar to how a method is called on an instantiated object.
    The big difference is that instead of an instance variable, the class name is
    used. Type methods are used quite extensively in the macOS and iOS frameworks.
    They are used mostly for returning some fixed or well-known type of value or to
    return a new instance of an object. These types of type methods are referred to
    as initializers. Here are some initializer method examples:


    ```

    1\.  Date. addingTimeInterval()  // Returns a Date

    2\.  String(format:"http://%@", "www.apple.com")      // Returns a new String
    object

    3\.  Dictionary()                     // Returns a new Dictionary object.

    ```


    All of the preceding messages are Type Methods being called.


    Line 1 simply returns a value that represents the number of seconds since January
    1, 2001, which is the reference date.


    Line 2 returns a new `String` object that has been formatted and has a value of
    `http://1000`.


    Line 3 is a form that is commonly used because it actually allocates a new object.
    Typically, the line is not used by itself, but in a line like this:


    ```

    var myDict = Dictionary()

    ```


    So, when would you use a type method? As a general rule, if the method returns
    information that is not specific to any particular instance of the class, make
    the method a type method. For example, the `minAMFrequency` in the preceding example
    would be the same for all instances of any `RadioStation`.


    Object — this is a great candidate for a type method. However, the station’s name
    or its assigned frequency would be different for each instance of the class. These
    should not (and indeed could not) be type methods. The reason for this is that
    type methods cannot use any of the instance variables defined by the class.'
