- fmt: "# 9. Comparing Data\n\nIn this chapter, we will discuss one of the most basic\
    \ and frequent operations you will perform as you program: comparing data. In\
    \ the bookstore example, you may need to compare book titles if your clients are\
    \ looking for a specific book. You may also need to compare authors if your clients\
    \ are interested in purchasing books by a specific author. Comparing data is a\
    \ common task performed by developers. Many of the loops you learned about in\
    \ Chapter [8](#A341013_4_En_8_Chapter.html) will require you to compare data so\
    \ that you know when your code should stop looping.\n\nComparing data in programming\
    \ is like using a scale. You have one value on one side and another value on the\
    \ other side. In the middle, you have an operator. The operator determines what\
    \ kind of comparison is being done. Examples of operators are \"greater than,\"\
    \ \"less than,\" or \"equal to.\"\n\nThe values on either side of the scale are\
    \ usually variables. You learned about the different types of variables in Chapter\
    \ [3](#A341013_4_En_3_Chapter.html). In general, the comparison functions for\
    \ different variables will be slightly different. It is imperative that you become\
    \ familiar with the functions and syntax to compare data because this will form\
    \ the basis of your development.\n\nFor the purposes of this chapter, we will\
    \ use an example of a bookstore application. This application will allow users\
    \ to log in to the application, search for books, and purchase them. We will cover\
    \ the different ways of comparing data to show how they would be used in this\
    \ type of application.\n\n## Revisiting Boolean Logic\n\nIn Chapter [4](#A341013_4_En_4_Chapter.html),\
    \ we introduced Boolean logic. Because of its prevalence in programming, we will\
    \ revisit this subject in this chapter and go into more detail.\n\nThe most common\
    \ comparisons that you will program your application to perform are comparisons\
    \ using Boolean logic. Boolean logic usually comes in the form of `if/then` statements.\
    \ Boolean logic can have only one of two answers: yes or no. The following are\
    \ some good examples of Boolean questions that you will use in your applications:\n\
    \n* Is 5 larger than 3?\n* Does now have more than five letters?\n* Is 6/1/2010\
    \ later than today?\n\nNotice that there are only two possible answers to these\
    \ questions: yes and no. If you are asking a question that could have more than\
    \ these two answers, that question will need to be worded differently for programming.\n\
    \nEach of these questions will be represented by an `if/then` statement. (For\
    \ example, \"If 5 is greater than 3, then print a message to the user.\") Each\
    \ `if` statement is required to have some sort of relational operator. A relational\
    \ operator can be something like \"is greater than\" or \"is equal to.\"\n\nTo\
    \ start using these types of questions in your programs, you will first need to\
    \ become familiar with the different relational operators available to you in\
    \ the Swift language. We will cover them first. After that, you will learn how\
    \ different variables can behave with these operators.\n\n## Using Relational\
    \ Operators\n\nSwift uses six standard comparison operators. These are the standard\
    \ algebraic operators with only one real change: In the Swift language, as in\
    \ most other programming languages, the \"equal to\" operator is made by two equals\
    \ signs (`==`). Table [9-1](#A341013_4_En_9_Chapter.html#Tab1) describes the operators\
    \ available to you as a developer.\n\n**Table 9-1.** Comparison Operators\n\n\
    | Operator | Description |\n| --- | --- |\n| `>` | Greater than |\n| `<` | Less\
    \ than |\n| `>=` | Greater than or equal to |\n| `<=` | Less than or equal to\
    \ |\n| `==` | Equal to |\n| `!=` | Not Equal to |\n\n**Note:** A single equals\
    \ sign (`=`) is used to assign a value to a variable. Two equals signs (`==`)\
    \ are needed to compare two values. For example, `if(x=9)` will try to assign\
    \ the value of 9 to the variable `x`, but now Xcode throws an error in this case.\
    \ `if(x==9)` will do a comparison to see whether `x` equals 9.\n\n### Comparing\
    \ Numbers\n\nOne of the difficulties developers have is dealing with different\
    \ data types in comparisons. Earlier in this book, we discussed the different\
    \ types of variables. You may remember that 1 is an integer. If you wanted to\
    \ compare an integer with a float such as 1.2, this will cause some issues. This\
    \ is where type casting becomes handy.\n\n**Note:** Type casting is the conversion\
    \ of an object or variable from one type to another.\n\nIn the bookstore application,\
    \ you will need to compare numbers in many ways. For example, let's say the bookstore\
    \ offers a discount for people who spend more than $30 in a single transaction.\
    \ You will need to add the total amount the person is spending and then compare\
    \ this to $30. If the amount spent is larger than $30, you will need to calculate\
    \ the discount. See the following example:\n\n```\nvar discountThreshold = 30\n\
    var discountPercent = 0\nvar totalSpent = calculateTotalSpent()\nif totalSpent\
    \ > discountThreshold {\n    discountPercent = 10\n}\n```\n\nLet's walk through\
    \ the code. First, you declare the variables (`discountThreshold`, `discountPercent`,\
    \ and `totalSpent`) and assign a value to them. Notice you do not need to specify\
    \ the type of number for the variables. The type will be assigned when you assign\
    \ it a value. You know that `discountThreshold` and `discountPercent` will not\
    \ contain decimals, so the compiler will type them as `Int`s. In this example,\
    \ you can assume you have a function called `calculateTotalSpent`, which will\
    \ calculate the total spent in this current order and return the value as an `Int`.\
    \ You then simply check to see whether the total spent is larger than the discount\
    \ threshold; if it is, you set the discount percent. If we wanted a customer who\
    \ spent exactly $30 to get the same discount, we could use `>=` instead of `>`.\n\
    \nAnother action that requires the comparison of numbers is looping. As discussed\
    \ in Chapter [4](#A341013_4_En_4_Chapter.html), looping is a core action in development,\
    \ and many loop types require some sort of comparison to determine when to stop.\
    \ Let's take a look at a `for` loop:\n\n```\nvar numberOfBooks: Int = 50\nfor\
    \ y in 0..<numberOfBooks {\n    doSomething()\n}\n```\n\nIn this example, you\
    \ iterate, or loop, through the total number of books in the bookstore. The `for`\
    \ statement is where the interesting stuff starts to happen. Let's break it down.\n\
    \nThe `for` loop declares a variable with an initial value of 0 and will increment\
    \ it while it is less than `numberOfBooks`. This is a much quicker way of doing\
    \ `for` loops than was required in Objective-C."
  raw: '# 9. Comparing Data


    In this chapter, we will discuss one of the most basic and frequent operations
    you will perform as you program: comparing data. In the bookstore example, you
    may need to compare book titles if your clients are looking for a specific book.
    You may also need to compare authors if your clients are interested in purchasing
    books by a specific author. Comparing data is a common task performed by developers.
    Many of the loops you learned about in Chapter [8](#A341013_4_En_8_Chapter.html)
    will require you to compare data so that you know when your code should stop looping.


    Comparing data in programming is like using a scale. You have one value on one
    side and another value on the other side. In the middle, you have an operator.
    The operator determines what kind of comparison is being done. Examples of operators
    are “greater than,” “less than,” or “equal to.”


    The values on either side of the scale are usually variables. You learned about
    the different types of variables in Chapter [3](#A341013_4_En_3_Chapter.html).
    In general, the comparison functions for different variables will be slightly
    different. It is imperative that you become familiar with the functions and syntax
    to compare data because this will form the basis of your development.


    For the purposes of this chapter, we will use an example of a bookstore application.
    This application will allow users to log in to the application, search for books,
    and purchase them. We will cover the different ways of comparing data to show
    how they would be used in this type of application.


    ## Revisiting Boolean Logic


    In Chapter [4](#A341013_4_En_4_Chapter.html), we introduced Boolean logic. Because
    of its prevalence in programming, we will revisit this subject in this chapter
    and go into more detail.


    The most common comparisons that you will program your application to perform
    are comparisons using Boolean logic. Boolean logic usually comes in the form of
    if/then statements. Boolean logic can have only one of two answers: yes or no.
    The following are some good examples of Boolean questions that you will use in
    your applications:


    *   Is 5 larger than 3?

    *   Does now have more than five letters?

    *   Is 6/1/2010 later than today?


    Notice that there are only two possible answers to these questions: yes and no.
    If you are asking a question that could have more than these two answers, that
    question will need to be worded differently for programming.


    Each of these questions will be represented by an if/then statement. (For example,
    “If 5 is greater than 3, then print a message to the user.”) Each if statement
    is required to have some sort of relational operator. A relational operator can
    be something like “is greater than” or “is equal to.”


    To start using these types of questions in your programs, you will first need
    to become familiar with the different relational operators available to you in
    the Swift language . We will cover them first. After that, you will learn how
    different variables can behave with these operators.


    ## Using Relational Operators


    Swift uses six standard comparison operators. These are the standard algebraic
    operators with only one real change: In the Swift language, as in most other programming
    languages, the “equal to” operator is made by two equals signs (`==`). Table [9-1](#A341013_4_En_9_Chapter.html#Tab1)
    describes the operators available to you as a developer.


    Table 9-1.


    Comparison Operators


    | Operator | Description |

    | --- | --- |

    | > | Greater than |

    | < | Less than |

    | >= | Greater than or equal to |

    | <= | Less than or equal to |

    | == | Equal to |

    | != | Not Equal to |


    Note


    A single equals sign (`=`) is used to assign a value to a variable. Two equals
    signs (`==`) are needed to compare two values. For example, `if(x=9)` will try
    to assign the value of 9 to the variable `x`, but now Xcode throws an error in
    this case. `if(x==9)` will do a comparison to see whether `x` equals 9.


    ### Comparing Numbers


    One of the difficulties developers have is dealing with different data types in
    comparisons. Earlier in this book, we discussed the different types of variables.
    You may remember that 1 is an integer. If you wanted to compare an integer with
    a float such as 1.2, this will cause some issues. This is where type casting becomes
    handy.


    Note


    Type casting is the conversion of an object or variable from one type to another.


    In the bookstore application, you will need to compare numbers in many ways. For
    example, let’s say the bookstore offers a discount for people who spend more than
    $30 in a single transaction. You will need to add the total amount the person
    is spending and then compare this to $30\. If the amount spent is larger than
    $30, you will need to calculate the discount. See the following example:


    ```

    var discountThreshold = 30

    var discountPercent = 0

    var totalSpent = calculateTotalSpent()

    if totalSpent > discountThreshold {

    discountPercent = 10

    }

    ```


    Let’s walk through the code. First, you declare the variables (`discountThreshhold`,
    `discountPercent`, and `totalSpent`) and assign a value to them. Notice you do
    not need to specify the type of number for the variables. The type will be assigned
    when you assign it a value. You know that `discountThreshold` and `discountPercent`
    will not contain decimals, so the compiler will type them as `Int`s. In this example,
    you can assume you have a function called `calculateTotalSpent`, which will calculate
    the total spent in this current order and return the value as an Int. You then
    simply check to see whether the total spent is larger than the discount threshold;
    if it is, you set the discount percent. If we wanted a customer who spent exactly
    $30 to get the same discount, we could use `a >=` instead of `a >`.


    Another action that requires the comparison of numbers is looping. As discussed
    in Chapter [4](#A341013_4_En_4_Chapter.html), looping is a core action in development,
    and many loop types require some sort of comparison to determine when to stop.
    Let’s take a look at a `for` loop:


    ```

    var numberOfBooks: Int = 50

    for y in 0..<numberOfBooks {

    doSomething()

    }

    ```


    In this example, you iterate, or loop, through the total number of books in the
    bookstore. The `for` statement is where the interesting stuff starts to happen.
    Let’s break it down.


    The for loop declares a variable with an initial value of 0 and will increment
    it while it is less than `numberOfBooks`. This is a much quicker way of doing
    for loops than was required in Objective-C.'
  trans: "\n# 9. 数据比较\n\n在本章中，我们将讨论编程中最基础且最频繁的操作之一：数据比较。在书店示例中，如果顾客想找某本特定的书，你可能需要比较书名；如果顾客有兴趣购买某位作者的书，你可能还需要比较作者姓名。数据比较是开发者常见的工作任务。你在第\
    \ 8 章学到的许多循环都需要通过数据比较来判断代码何时停止循环。\n\n编程中的数据比较就像使用天平。一边放一个值，另一边放另一个值，中间是操作符。操作符决定了执行何种比较，例如\"\
    大于\"、\"小于\"或\"等于\"。\n\n天平两端的值通常是变量。你在第 3 章学习了不同类型的变量。通常，针对不同变量的比较函数会略有差异。熟悉比较数据的函数和语法至关重要，因为这将构成你开发工作的基础。\n\
    \n为了便于本章讲解，我们将以书店应用程序为例。该应用程序允许用户登录、搜索书籍并购买。我们将介绍不同的数据比较方式，并展示它们在此类应用中如何运用。\n\n\
    ## 重温布尔逻辑\n\n我们在第 4 章介绍了布尔逻辑。由于它在编程中广泛应用，本章将再次深入探讨。\n\n你为应用程序编写的最常见的比较操作就是基于布尔逻辑。布尔逻辑通常以\
    \ `if/then` 语句的形式出现。布尔逻辑的答案只有两种：是或否。以下是一些适合在程序中使用的布尔问题示例：\n\n* 5 大于 3 吗？\n* \"\
    now\" 这个单词是否超过五个字母？\n* 2010 年 6 月 1 日是否晚于今天？\n\n注意，这些问题只有\"是\"和\"否\"两种可能的答案。如果你提出的问题可能有多个答案，则需要用不同的措辞来进行编程。\n\
    \n每个问题都将由一个 `if/then` 语句表示。（例如：\"如果 5 大于 3，则向用户打印一条消息\"。）每个 `if` 语句都必须包含某种关系运算符。关系运算符可以是\"\
    大于\"或\"等于\"之类的形式。\n\n要在程序中使用这类问题，首先需要熟悉 Swift 语言中提供的各种关系运算符。我们将首先介绍它们。之后，你将学习不同类型的变量如何与这些运算符配合使用。\n\
    \n## 使用关系运算符\n\nSwift 使用六种标准比较运算符。这些是标准的代数运算符，只有一处实际改动：在 Swift 语言中（与大多数其他编程语言一样），\"\
    等于\"运算符由两个等号（`==`）表示。表 9-1 描述了开发者可用的运算符。\n\n**表 9-1.** 比较运算符\n\n| 运算符 | 描述 |\n\
    | --- | --- |\n| `>` | 大于 |\n| `<` | 小于 |\n| `>=` | 大于或等于 |\n| `<=` | 小于或等于 |\n\
    | `==` | 等于 |\n| `!=` | 不等于 |\n\n**注意：** 单个等号（`=`）用于给变量赋值。比较两个值则需要两个等号（`==`）。例如，`if(x=9)`\
    \ 会尝试将值 9 赋值给变量 `x`，但 Xcode 现在会报错。而 `if(x==9)` 则会执行比较，检查 `x` 是否等于 9。\n\n### 比较数字\n\
    \n开发者在比较时经常遇到的困难之一是处理不同的数据类型。本书前面讨论过不同类型的变量。你可能还记得 1 是一个整数。如果你想将一个整数与浮点数（如 1.2）进行比较，就会引发问题。这时，类型转换就派上用场了。\n\
    \n**注意：** 类型转换是指将对象或变量从一种类型转换为另一种类型。\n\n在书店应用中，你会需要以多种方式比较数字。例如，假设书店为单次消费超过 30\
    \ 美元的顾客提供折扣。你需要计算顾客的总消费金额，然后将其与 30 美元进行比较。如果消费金额大于 30 美元，则需要计算折扣。请看以下示例：\n\n```\n\
    var discountThreshold = 30\nvar discountPercent = 0\nvar totalSpent = calculateTotalSpent()\n\
    if totalSpent > discountThreshold {\n    discountPercent = 10\n}\n```\n\n我们来逐行分析这段代码。首先，声明变量（`discountThreshold`、`discountPercent`\
    \ 和 `totalSpent`）并为其赋值。注意，你不需要为变量指定具体的数值类型。类型会在你赋值时自动确定。你知道 `discountThreshold`\
    \ 和 `discountPercent` 不会包含小数，因此编译器会将它们视为 `Int` 类型。在此示例中，我们假设有一个名为 `calculateTotalSpent`\
    \ 的函数，它会计算当前订单的总消费额并以 `Int` 类型返回。然后，你只需检查总消费是否大于折扣阈值；如果是，则设置折扣百分比。如果你希望恰好消费 30\
    \ 美元的顾客也能享受同样的折扣，可以使用 `>=` 代替 `>`。\n\n另一个需要比较数字的操作是循环。如第 4 章所述，循环是开发中的核心操作，许多类型的循环都需要某种比较来决定何时停止。我们来看一个\
    \ `for` 循环示例：\n\n```\nvar numberOfBooks: Int = 50\nfor y in 0..<numberOfBooks\
    \ {\n    doSomething()\n}\n```\n\n在此示例中，你迭代（或称循环）书店中书籍的总数。`for` 语句是精彩部分开始的地方。我们来分解一下。\n\
    \n该 `for` 循环声明了一个初始值为 0 的变量，并在该变量小于 `numberOfBooks` 时递增它。与 Objective-C 相比，这是一种执行\
    \ `for` 循环更快捷的方式。\n"
- fmt: "### Creating an Example Xcode App\n\nNow let’s create an Xcode application\
    \ so you can start comparing numeric data.\n\n1. Launch Xcode and select File\
    \ ➤ New ➤ Playground to create a new playground. This chapter will use a playground\
    \ to make it easier to play around with comparisons.\n2. Select Blank as shown\
    \ in Figure [9-1](#A341013_4_En_9_Chapter.html#Fig1). Click Next.\n\n![A341013_4_En_9_Fig1_HTML.jpg](A341013_4_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1. Creating a new playground\n\n3. On the next page, enter the name\
    \ of your playground. Here we used Comparison as the name, but you can choose\
    \ any name you like. Note: Xcode Playgrounds, by default, are saved in the `Documents`\
    \ folder in your user home.\n4. Once the new playground is created, you will see\
    \ the standard Xcode window.\n5. Add the following line after the default code\
    \ in the playground:\n\n```\nprint(\"Hello World\")\n```\n\nThis line creates\
    \ a new `String` with the contents `Hello World` and passes it to the `print`\
    \ function that is used for debugging.\n\nXcode will automatically run the new\
    \ line you added and show the result on the right-hand side as seen in Figure\
    \ [9-2](#A341013_4_En_9_Chapter.html#Fig2).\n\n1. Go to the beginning of the line\
    \ that begins with `print`. This is the line that is responsible for printing\
    \ the `Hello World` string. You are going to comment out this line by placing\
    \ two forward slashes (`//`) in front of the line of code. Commenting out code\
    \ tells Xcode to ignore it when it executes the code. In other words, code that\
    \ is commented out will not run.\n2. Once you comment out the line of code, the\
    \ code will no longer be run so Hello World will no longer show in the playground\
    \ as seen in Figure [9-3](#A341013_4_En_9_Chapter.html#Fig3).\n\n![A341013_4_En_9_Fig3_HTML.jpg](A341013_4_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3. Playground output with commented out code\n\n3. We want to use the\
    \ log to output the results of comparisons. Add one line, as shown here:\n\n```\n\
    print(\"The result is \\(6 > 5 ? \"True\" : \"False\")\")\n```\n\nNote: The previous\
    \ code, `(6>5 ? \"True\" : \"False\")`, is called a ternary operation. It is essentially\
    \ just a simplified way of writing an `if/else` statement.\n\n4. Place this line\
    \ in your code. This line is telling your application to print `The result is`.\
    \ Then it will print `True` if 6 is greater than 5, or it will print `False` if\
    \ 5 is greater than 6. See Figure [9-4](#A341013_4_En_9_Chapter.html#Fig4).\n\n\
    ![A341013_4_En_9_Fig2_HTML.jpg](A341013_4_En_9_Fig2_HTML.jpg)\n\nFigure 9-2. Playground\
    \ output\n\nBecause 6 is greater than 5, it will print “The result is `True`.”\n\
    \n![A341013_4_En_9_Fig4_HTML.jpg](A341013_4_En_9_Fig4_HTML.jpg)\n\nFigure 9-4.\
    \ Ternary output\n\nYou can change this line to test any comparisons we have already\
    \ discussed in this chapter or any of the examples you will do later.\n\nLet’s\
    \ try another example.\n\n```\nvar i = 5\nvar y = 6\nprint(\"The result is \\\
    (y > i ? \"True\" : \"False\")\")\n```\n\nIn this example, you create a variable\
    \ and assign its value to 5. You then create another variable and assign the value\
    \ to 6. You then change the print example to compare the variables `I` and `y`\
    \ instead of using actual numbers.\n\nNote: You may get compiler warnings when\
    \ using this code in an actual Xcode project. The compiler will tell you that\
    \ the false portion of the ternary operator will never be executed. The compiler\
    \ can look at the values while you are typing the code and know that the comparison\
    \ will always be true.\n\nYou will now explore other kinds of comparisons, and\
    \ then you will come back to the application and test some of them.\n\n### Using\
    \ Boolean Expressions\n\nA Boolean expression is the easiest of all comparisons.\
    \ Boolean expressions are used to determine whether a value is true or false.\
    \ Here’s an example:\n\n```\nvar j = 5\nif  j > 0 {\n    someCode()\n}\n```\n\n\
    The `if` statement will always evaluate to `true` because the variable `j` is\
    \ greater than zero. Because of that, the program will run the `someCode()` method.\n\
    \nNote: In Swift, if a variable is optional and therefore not guaranteed to be\
    \ assigned a value, you should use a question mark after the variable declaration.\
    \ For example, `var j` becomes `var j: Int?`.\n\nIf you change the value of `j`\
    \ to 0, the statement will evaluate to `false` because `j` is now 0.\n\n```\n\
    var j = 0\nif j > 0 {\n    someCode()\n}\n```\n\nPlacing an exclamation point\
    \ in front of a Boolean expression will change it to the opposite value (a `false`\
    \ becomes a `true`, and a `true` becomes a `false`).\n\n```\nvar j = 0\nif !(j\
    \ > 0) {\n    someCode()\n}\n```\n\nThe second line now asks “If not `j>0`,” which,\
    \ in this case, is `true` because `j` is equal to 0. This is an example of using\
    \ an integer to act as a Boolean variable. As discussed earlier, Swift also has\
    \ variables called `Bool` that have only two possible values: `true` or `false`.\n\
    \nNote: Swift, like many other programming languages, uses `true` or `false` when\
    \ assigning a value to a Boolean variable.\n\nLet’s look at an example related\
    \ to the bookstore. Say you have a frequent buyers’ club that entitles all members\
    \ to a 15 percent discount on all books they purchase. This is easy to check.\
    \ You simply set the variable `clubMember` to `true` if the person is a member\
    \ and `false` if he or she is not. The following code will apply the discount\
    \ only to club members:\n\n```\nvar discountPercent = 0\nvar clubMember = false\n\
    if clubMember {\n    discountPercent = 15\n}\n```"
