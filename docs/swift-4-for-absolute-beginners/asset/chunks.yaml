    ### 流程图


    在前几章讨论的设计需求确定后，你就可以为应用创建伪代码部分，以解决复杂的开发问题。流程图是一种常用的算法图示方法。算法通过不同类型的方框，由线条和箭头连接而成。开发者经常使用流程图来直观地表达代码，如图
    4-1 所示。


    ![A341013_4_En_4_Fig1_HTML.gif](img/A341013_4_En_4_Fig1_HTML.gif)


    图 4-1. 流程图示例，展示了常用图形及其对应名称


    流程图应始终包含一个开始和一个结束。分支路径绝不能在没有结束点的情况下终止。这有助于开发者确保代码中的所有分支都已妥善处理，并能够干净地结束执行。


    ### 设计与绘制示例应用的流程图


    我们已经了解了大量关于决策和程序流程的知识。现在该做程序员最擅长的事了：编写应用！


    你需要编写的应用会生成一个 0 到 100 之间的随机数，并要求用户猜这个数字。用户需要一直猜，直到猜中为止。当用户猜对答案后，系统会询问他们是否想再玩一次。


    ### 应用设计


    根据你的设计需求，你可以为应用绘制一个流程图。见图 4-2。


    ![A341013_4_En_4_Fig2_HTML.jpg](img/A341013_4_En_4_Fig2_HTML.jpg)


    图 4-2. 猜随机数应用的流程图


    观察图 4-2，你会发现，当流程图中的某个逻辑块接近末尾时，会有箭头指回之前的某个部分，并重复执行该部分，直到满足某个条件为止。这被称为**循环**。它让你能够重复执行某段程序逻辑，而无需重写这些代码段，直到某个条件被满足。


    ### 使用循环重复执行程序语句


    循环是一段程序语句序列，它只需被指定一次，但可以连续重复执行多次。循环可以重复指定的次数（计数控制），也可以重复执行直到满足某个条件（条件控制）。


    在本节中，你将学习计数控制循环和条件控制循环。你还将学习如何使用布尔逻辑来控制循环。


    #### 计数控制循环


    计数控制循环会重复执行指定的次数。在 Swift 中，这是通过 `for-in` 循环实现的。`for-in` 循环会遍历序列或项目集合，例如数字范围、数组中的项目或字符串中的字符。参见代码清单
    4-8。


    ```

    for i in 0..<10 {

    print("索引是: \(i)")

    }

    //....继续执行

    代码清单 4-8. 一个计数控制循环

    ```


    代码清单 4-8 中的循环将执行 10 次。“半开区间运算符” `..<` 返回从“下界”值 0 开始，到但不包括“上界”值 10 的值序列，结果是 `i`
    的取值范围为 0 到 9。


    或者，代码清单 4-9 使用“闭区间运算符” `...` 打印了 10 乘法表的前 10 项。该运算符返回从下界值 1 开始，到并包括上界值 10 的值序列，结果是
    `i` 的取值范围为 1 到 10。


    ```

    for i in 1...10 {

    print("\(i) 乘以 10 等于 \(i * 10)")

    }

    //....继续执行

    代码清单 4-9. 使用闭区间运算符的计数控制循环

    ```


    #### 条件控制循环


    Swift 能够重复执行循环，直到某个条件发生变化。你可能希望重复执行某段代码，直到某个变量达到一个假条件。这种类型的循环称为 `while` 循环。`while`
    循环是一种控制流语句，它基于给定的布尔条件重复执行。你可以将 `while` 循环视为一个重复执行的 `if` 语句。参见代码清单 4-10。


    ```

    var isTrue = true

    while isTrue {

    // 执行某些操作

    isTrue = false // 某个条件发生，有时会将 isTrue 设置为 FALSE

    }

    //....继续执行

    代码清单 4-10. 一个重复执行的 Swift while 循环

    ```


    代码清单 4-10 中的 `while` 循环首先检查变量 `isTrue` 是否为 `true`—— 此时它为 `true` —— 因此进入 `{循环体}`
    执行代码。最终，某个条件发生导致 `isTrue` 变为 `false`。在循环体内的所有代码执行完毕后，会再次检查条件 (`isTrue`)，然后循环重复。这个过程会一直重复，直到变量
    `isTrue` 被设置为 `false`。


    #### 无限循环


    无限循环会无休止地重复，原因可能是循环没有导致终止的条件，或者循环拥有一个永远无法满足的终止条件。


    通常，无限循环会导致应用无响应。它们是代码或逻辑中存在 Bug 的副作用之一。


    代码清单 4-11 是一个由永远无法满足的终止条件导致的无限循环示例。变量 `x` 在每次 `while` 循环迭代时都会被检查，但它永远不会等于 5。变量
    `x` 将始终是偶数，因为它被初始化为零，并且在循环中每次增加 2。这会导致循环无休止地重复。参见代码清单 4-12。


    ```

    var x = 0

    while x != 5 {

    // 执行某些操作

    x = x + 2

    }

    //....继续执行

    代码清单 4-11. 一个无限循环示例

    ```


    ```

    while true {

    // 永远执行某些操作

    }

    //....继续执行

    代码清单 4-12. 一个由永远无法满足的终止条件导致的无限循环示例

    ```

