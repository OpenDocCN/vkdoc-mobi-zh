- fmt: "# Creating the BookStore Application\n\nYou are going to create an app that\
    \ will demonstrate how to use arrays. You will create a `UITableView` and use\
    \ an array to populate the `UITableView` with data. Let’s start by creating the\
    \ base application project. Open Xcode and select a new Master-Detail Application\
    \ project, as shown in Figure [8-1](#A341013_4_En_8_Chapter.html#Fig1). In this\
    \ project, you will create a few simple objects for what is to become your bookstore\
    \ application: a `Book` object and the `BookStore` object. You’ll visit properties\
    \ again and see how to get and set the value of one during this project. Lastly,\
    \ you’ll put the bookstore objects to use, and you’ll learn how to make use of\
    \ objects once you’ve created them.\n\n1. Click the Next button and name the project\
    \ `BookStore`, as shown in Figure [8-2](#A341013_4_En_8_Chapter.html#Fig2). The\
    \ company name is required—you can use any company name, real or otherwise. The\
    \ example uses `com.innovativeware`, which is perfectly fine. Make sure the device\
    \ family is iPhone and that the Language is set to Swift. Do not check the Use\
    \ Core Data checkbox. Note This type of app would be a good candidate for using\
    \ Core Data, but Core Data is not introduced until Chapter [11](#A341013_4_En_11_Chapter.html).\
    \ You will use an array for data storage in this app.\n\n   ![A341013_4_En_8_Fig2_HTML.jpg](A341013_4_En_8_Fig2_HTML.jpg)\n\
    \n   Figure 8-2. Selecting the product (application) name and options\n\n2. Once\
    \ everything is filled out, click the Next button. Xcode will prompt you to specify\
    \ a place to save the project. Anywhere you can remember is fine—the desktop is\
    \ a good place.\n\n3. Once you decide on a location, click the Create button to\
    \ create the new project. This will create the boilerplate `BookStore` project,\
    \ as shown in Figure [8-3](#A341013_4_En_8_Chapter.html#Fig3).\n\n   ![A341013_4_En_8_Fig3_HTML.jpg](A341013_4_En_8_Fig3_HTML.jpg)\n\
    \n   Figure 8-3. The source listing of the boilerplate project\n\n4. Click the\
    \ plus (+) sign at the lower left of the screen in the Navigator area to add a\
    \ new object to the project. Choose New File. Then choose the iOS section on the\
    \ top and choose Swift File on the right, as shown in Figure [8-4](#A341013_4_En_8_Chapter.html#Fig4).\
    \ It’s also possible to right-click (or Control-click) the Navigation area and\
    \ then select the New File menu option. There is no difference between this approach\
    \ and clicking the plus sign—do whatever feels more natural.\n\n   ![A341013_4_En_8_Fig4_HTML.jpg](A341013_4_En_8_Fig4_HTML.jpg)\n\
    \n   Figure 8-4. Creating a new Swift file\n\n5. You’re choosing a plain Swift\
    \ file, which will create a new empty Swift file that you’re going to use for\
    \ the `Book` class. After selecting this, click the Next button.\n\n6. Xcode will\
    \ ask you what to name your file. Use the name `Book`. Xcode will also ask to\
    \ which folder it should save the new file. To keep things simple, choose the\
    \ `BookStore` folder in your project. This is where all the other class files\
    \ for the project are stored.\n\n7. Double-click the `BookStore` folder and then\
    \ click the Create button. You’ll see the main edit window for Xcode and the new\
    \ file, `Book.swift`, in the Navigator area, as shown in Figure [8-5](#A341013_4_En_8_Chapter.html#Fig5).\n\
    \n8. Repeat the previous steps and create a second object called `BookStore`.\
    \ This will create a `BookStore.swift` file. You’ll be using this class later\
    \ in this chapter. For now, you’ll concentrate on the `Book` class.\n\n   ![A341013_4_En_8_Fig5_HTML.jpg](A341013_4_En_8_Fig5_HTML.jpg)\n\
    \n   Figure 8-5. The empty Swift file\n\n9. Click the `Book.swift` file and let’s\
    \ start defining your new class!\n\n![A341013_4_En_8_Fig1_HTML.jpg](A341013_4_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1. Creating the initial project based on the Master-Detail Application\
    \ template\n\n## Creating Your Class\n\nBy adding a Swift rather than a Cocoa\
    \ Touch class, Xcode creates an empty Swift file. You can add multiple classes\
    \ to this file. Swift is more flexible, and it is not necessary to have only one\
    \ class per file. Xcode allows you to add the classes as you want.\n\nNote: It\
    \ is still a good idea to keep your Swift classes in separate files. This makes\
    \ organizing and finding classes easier, especially when you’re dealing with large\
    \ projects, but there will be cases where a smaller class is only used with another\
    \ class and it makes sense to keep them in the same file.\n\nLet’s create the\
    \ `Book` class. Type the following code into the `Book.swift` file:\n\n```\nclass\
    \ Book {\n}\n```\n\nNow you have your class, as shown in Figure [8-6](#A341013_4_En_8_Chapter.html#Fig6).\
    \ That is all you need to do to create a class.\n\n![A341013_4_En_8_Fig6_HTML.jpg](A341013_4_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6. The empty Book class\n\n## Introducing Properties\n\nThe class is\
    \ simply called `Book`. True, you have a class, but it doesn’t store anything\
    \ at this point. For this class to be useful, it needs to be able to hold some\
    \ information, which is done with properties. When an object is used, it has to\
    \ be instantiated. Once the object is instantiated, it has access to its properties.\
    \ These variables are available to the object as long as the object stays in scope.\
    \ As you know from Chapter [7](#A341013_4_En_7_Chapter.html), scope defines the\
    \ context in which an object exists. In some cases, an object’s scope may be the\
    \ life of the program. In other cases, the scope might be just a function or method.\
    \ It all depends on where the object is declared and how it’s used. Scope will\
    \ be discussed in more detail later. For now, let’s add some properties to the\
    \ `Book` class to make it more useful.\n\n```\n1   //\n2   //  Book.swift\n3 \
    \  //  BookStore\n4   //\n5   //  Created by Thorn on 7/27/17.\n6   //  Copyright\
    \ © 2017 Innovativeware. All rights reserved.\n7   //\n\n9   import Foundation\n\
    \n11   class Book {\n12       var title: String = \"\"\n13       var author: String\
    \ = \"\"\n14       var description: String = \"\"\n15   }\nListing 8-8. Adding\
    \ instance variables to the Book.swift file\n```\n\nListing [8-8](#A341013_4_En_8_Chapter.html#Par69)\
    \ shows the same `Book` object from before, but now there are three new properties\
    \ placed inside the braces, on lines 12 to 14. These are all `String` objects,\
    \ which means they can hold text information for the `Book` object. So, the `Book`\
    \ object now has a place to store title, author, and description information.\
    \ Notice, the code assigns an initial value to the property. If an initial value\
    \ is not assigned, the class would need an init method to assign initial values.\n\
    \n## Accessing Properties\n\nNow that you have some properties, how can you use\
    \ them? How are they accessed? Unfortunately, simply declaring a property doesn’t\
    \ necessarily give you access to it. There are two ways to access these variables.\n\
    \n* One way, of course, is within the `Book` object.\n* The second way is from\
    \ outside the object—that is, another part of the program that uses the `Book`\
    \ object.\n\nIf you are writing the code for a method within the `Book` object,\
    \ accessing its property is quite simple. For example, you could simply write\
    \ the following:\n\n```\ntitle = \"Test Title\"\n```\n\nFrom outside the object,\
    \ you can still access the `title` variable. This is done through the use of dot\
    \ notation.\n\n```\nmyBookObject.title = \"Test Title\"\n```\n\n## Finishing the\
    \ BookStore Program\n\nWith the understanding of properties, you are going to\
    \ now venture forth to create the actual bookstore program. The idea is simple\
    \ enough — create a class called `BookStore` that will be stocked with a few `Book`\
    \ objects."
