    \n图 10-10. 工作区窗口中的 Interface Builder\n\n当 Interface Builder 打开后，你可以在画布上看到你的场景。现在你可以设计用户界面了。首先，你需要了解\
    \ Interface Builder 中的一些子窗口。\n\n### 文档大纲\n\n故事板显示了视图所包含的所有对象。以下是这些对象的一些示例：\n\n\
    - 按钮\n- 标签\n- 文本字段\n- 网页视图\n- 地图视图\n- 选择器视图\n- 表格视图\n\n> **注意：** 你可以展开文档大纲的宽度，以查看所有对象的详细列表，如图\
    \ 10-10 所示。若想为画布腾出更多空间，你可以缩小或隐藏文件导航器。\n\n### 对象库\n\n对象库是你发挥创造力的地方。它包含了一个琳琅满目的对象集合，你可以将它们拖放到视图中。\n\
    \n- 通过移动视图中间的分隔条，可以放大或缩小库面板，如图 10-11 所示。\n\n![A341013_4_En_10_Fig11_HTML.jpg](img/A341013_4_En_10_Fig11_HTML.jpg)\n\
    \n图 10-11. 展开库面板以查看更多控件，并滑动分隔条以使用鼠标调整窗口大小\n\n点击图 10-12 中的图标视图按钮，可以更紧凑地查看对象库内容，如图\
    \ 10-13 所示。\n\n![A341013_4_En_10_Fig12_HTML.jpg](img/A341013_4_En_10_Fig12_HTML.jpg)\n\
    \n图 10-12. 对象库图标视图按钮\n\n对于 Cocoa Touch 对象，库中包含以下内容：\n\n![A341013_4_En_10_Fig13_HTML.jpg](img/A341013_4_En_10_Fig13_HTML.jpg)\n\
    \n图 10-13. 对象库中的各种 Cocoa Touch 对象\n\n- 控件\n- 数据视图\n- 手势识别器\n- 对象与控制器\n- 窗口与栏\n\
    \n### 检查器面板与选择器栏\n\n检查器面板使你能够更改控件的属性，从而让对象听命于你。检查器面板顶部有六个标签，如图 10-14 所示。\n\n![A341013_4_En_10_Fig14_HTML.jpg](img/A341013_4_En_10_Fig14_HTML.jpg)\n\
    \n图 10-14. 属性检查器与选择器栏\n\n- 文件检查器\n- 快速帮助检查器\n- 身份检查器\n- 属性检查器\n- 尺寸检查器\n- 连接检查器\n\
    \n### 创建视图\n\n随机数生成器在视图中包含三个对象：一个标签和两个按钮。一个按钮用于生成种子，另一个按钮用于生成随机数，而标签则用于显示应用生成的随机数。\n\
    \n1.  在对象库中滚动，将两个按钮和一个标签拖拽到视图控制器场景中，如图 10-15 所示。\n\n    ![A341013_4_En_10_Fig15_HTML.jpg](img/A341013_4_En_10_Fig15_HTML.jpg)\n\
    \n    图 10-15. 在视图中放置对象\n\n2.  双击第一个按钮，将其标题更改为“种子随机数生成器”，然后双击第二个按钮，将其标题更改为“生成随机数”，如图\
    \ 10-16 所示。\n\n    ![A341013_4_En_10_Fig16_HTML.jpg](img/A341013_4_En_10_Fig16_HTML.jpg)\n\
    \n    图 10-16. 重命名按钮标题\n\n    现在你即将体验 Xcode 的一个出色功能。你可以快速便捷地将输出口和操作连接到代码。实际上，Xcode\
    \ 做得更绝——它会为你自动生成部分代码。你只需拖放即可。\n\n3.  点击屏幕右上角的助理编辑器图标。这会显示在故事板中选中的视图所关联的 `.swift`\
    \ 文件，如图 10-17 所示。\n\n    > **注意：** 如果点击助理编辑器图标后没有显示正确的关联 `.swift` 文件，请确保你已选中并高亮显示了该视图。同时，必须在助理编辑器的跳转栏中选择“自动”。\n\
    \n    ![A341013_4_En_10_Fig17_HTML.jpg](img/A341013_4_En_10_Fig17_HTML.jpg)\n\n\
    \    图 10-17. 使用助理编辑器显示 `.swift` 文件\n\n### 使用输出口\n\n现在，你可以通过创建输出口将标签连接到你的代码。\n\
    \n1.  按住 Control 键从视图中的标签拖拽至类文件的顶部，如图 10-18 所示。操作方法是：在键盘上按住 Control 键的同时，用鼠标点击并拖拽。你也可以右键点击并拖拽。\n\
    \n    ![A341013_4_En_10_Fig18_HTML.jpg](img/A341013_4_En_10_Fig18_HTML.jpg)\n\n\
    \    图 10-18. 按住 Control 键拖拽以创建输出口\n\n2.  将出现一个弹出窗口。你可以在此命名并指定输出口的类型。\n\n    ![A341013_4_En_10_Fig18_HTML.jpg](img/A341013_4_En_10_Fig18_HTML.jpg)\n\
    \n    图 10-18. （重复）按住 Control 键拖拽以创建输出口\n\n3.  将输出口命名为 `randomNumberLabel`，如图\
    \ 10-19 所示，然后点击“连接”按钮。\n\n    ![A341013_4_En_10_Fig19_HTML.jpg](img/A341013_4_En_10_Fig19_HTML.jpg)\n\
    \n    图 10-19. `randomNumberLabel` 输出口的弹出窗口\n\n输出口的代码已创建，并且该输出口现在已连接到 `Main.storyboard`\
    \ 文件中的标签对象。第 12 行旁边的阴影圆圈表示该输出口已连接到 `Main.storyboard` 文件中的一个对象，如图 10-20 所示。\n\n\
    ![A341013_4_En_10_Fig20_HTML.jpg](img/A341013_4_En_10_Fig20_HTML.jpg)\n\n图 10-20.\
    \ 生成并连接到标签对象的输出口属性代码\n\n这里有一个对你来说可能是新概念的声明，叫做 `IBOutlet`，通常简称为输出口。输出口向控制器发出信号，表明此属性已连接到\
    \ Interface Builder 中的一个对象。`IBOutlet` 将使 Interface Builder 能够看到该输出口，并允许你将属性连接到\
    \ Interface Builder 中的对象。\n\n用电墙插座来类比，这些属性输出口就是连接到对象的。使用 Interface Builder，你可以将这些属性连接到相应的对象。当你更改已连接输出口的属性时，其所连接的对象也会自动更改。\n\
    \n### 使用操作\n\n用户界面对象事件（也称为操作）会触发方法。\n\n现在你需要将对象操作连接到按钮上。\n\n1.  按住 Control 键从“种子随机数生成器”按钮拖拽到类的底部。按图\
    \ 10-21 所示完成弹出窗口的设置，然后点击“连接”按钮。确保你将连接类型更改为“操作”，而不是“输出口”。\n\n    ![A341013_4_En_10_Fig21_HTML.jpg](img/A341013_4_En_10_Fig21_HTML.jpg)\n\
    \n    图 10-21. 为种子方法完成弹出窗口的设置\n\n2.  对“生成随机数”按钮重复上述步骤，在 `ViewController` 类中创建一个\
    \ `generateAction` 方法。\n"
- fmt: '### The Class


    All that is left is to complete the code for your outlet and actions in the`.swift`file
    for the controller.


    Open the`ViewController.swift`file and complete the`seedAction`and`generateAction`methods,
    as shown in Figure [10-22](#A341013_4_En_10_Chapter.html#Fig22).


    ![A341013_4_En_10_Fig22_HTML.jpg](A341013_4_En_10_Fig22_HTML.jpg)


    Figure 10-22. The`seedAction`and`generateAction`methods completed


    There is some code you should examine a bit further. The following line seeds
    the random generator so that you get a random number each time you run the app.
    There are easier ways of to do this, but for the purposes of this section, you
    just want to see how actions and outlets work.


    ```

    srandom(CUnsignedInt(time(nil)))

    ```


    In the following code, the property`text`sets the`UILabel`value in your view.
    The connection you established in Interface Builder from your outlet to the`Label`object
    does all the work for you.


    ```

    randomNumberLabel.text

    ```


    There is just one more thing you need to do now. Select the`Main.storyboard`file
    and then select your View Controller scene. Then, click the Resolve Auto Layout
    Issues button followed by Add Missing Constraints. This will enable your controls
    to center correctly in your view, as shown in Figure [10-23](#A341013_4_En_10_Chapter.html#Fig23).


    ![A341013_4_En_10_Fig23_HTML.jpg](A341013_4_En_10_Fig23_HTML.jpg)


    Figure 10-23. Adding Missing Constraints


    That’s it!


    To run your iPhone app in the iPhone simulator, click the Play button. Your app
    should launch in the simulator, as shown in Figure [10-24](#A341013_4_En_10_Chapter.html#Fig24).


    ![A341013_4_En_10_Fig24_HTML.jpg](A341013_4_En_10_Fig24_HTML.jpg)


    Figure 10-24. The completed random number generator app running in the iOS simulator


    To generate the random number, tap the Generate Random Number button.


    ## Summary


    Great job! Interface Builder saves you a lot of time when creating user interfaces.
    You have a powerful set of objects to use in your application and are responsible
    for a minimal amount of coding.


    Interface Builder handles many of the details you would normally have to deal
    with.


    You should be familiar with the following terms:


    - Storyboard and XIB files

    - Model-View-Controller

    - Architectural patterns

    - Human Interface Guidelines (HIG)

    - Outlets

    - Actions


    ## Exercises


    - Extend the random number generator app to show a date and time in a`Label`object
    when the app starts.

    - After showing a date and time label, add a button to update the data and time
    label with the new time.


    # 11. Storing Information


    As a developer, there will be many different situations when you will need to
    store data. Users will expect your app to remember preferences and other information
    each time they launch it. Previous chapters discussed the`BookStore`app. With
    this app, users will expect your application to remember all of the books in the
    bookstore. Your application will need a way to store this information, retrieve
    it, and possibly search and sort this data. Working with data can sometimes be
    difficult. Fortunately, Apple has provided methods and frameworks to make this
    process easier.


    This chapter discusses two different formats in which data will need to be stored.
    It discusses how to save a preference file for an iOS device and then how to use
    a SQLite database in your application to store and retrieve data.


    ## Storage Considerations


    There are some major storage differences between the Mac and the iPhone, and these
    differences will affect how you work with data. Let’s start by discussing the
    Mac and how you will need to develop for it.


    On the Mac, by default, applications are stored in the`Applications`folder. Each
    user has their own home folder where preferences and information related to that
    user are stored. Not all of the users will have access to write to the`Applications`folder
    or to the application bundle itself.


    On the iPhone and iPad, developers do not need to deal with different users. Every
    person who uses the iPhone has the same permissions and the same folders. There
    are some other factors to consider with the iPhone, though. Every application
    on an iOS device is in its own sandbox. This means that files written by an app
    can be seen and used only by that individual app. This makes for a more secure
    environment for the iPhone, iPad, Apple TV, and Apple Watch, but it also presents
    some changes in the way you work with data storage.


    ## Databases


    You have learned how to store some small pieces of information and retrieve them
    at a later point. What if you have more information that needs to be stored? What
    if you need to conduct a search within this information or put it in some sort
    of order? These kinds of situations call for a database.


    A database is a tool for storing a significant amount of information in a way
    that it can be easily searched or retrieved. When reading data from a database,
    pieces of data are returned rather than the entire file. Many applications you
    use in your daily life are based on databases of some sort. Your online banking
    application retrieves your account activity from a database. Your supermarket
    uses a database to retrieve prices for different items. A simple example of a
    database is a spreadsheet. You may have many columns and many rows in your spreadsheet.
    The columns in your spreadsheet represent different types of information you want
    to store. In a database, these are considered attributes. The rows in your spreadsheet
    would be considered different records in your database.'
