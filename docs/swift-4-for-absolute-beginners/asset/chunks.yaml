  trans: '

    ### 设计需求


    正如第 1 章所讨论的，软件开发周期中最昂贵的过程是编写代码。而最便宜的过程则是收集应用程序的需求；然而，后者在软件开发中却是最容易被忽视、最不常用的环节。


    设计需求通常始于向客户、用户和/或利益相关者询问应用程序应如何工作，以及它应解决哪些问题。


    对于应用而言，需求可以包括长篇或短篇的描述性文字、屏幕模型和公式。在编码开始前，打开文字处理器修改需求和屏幕模型，远比修改一个 iOS 应用要容易得多。以下是一个
    iPhone 手机银行应用某个视图的设计需求示例：


    - **视图**：账户视图。

    - **描述**：显示用户拥有的账户列表。账户列表将分为以下几个部分：商业账户、个人账户以及汽车贷款、IRA（个人退休账户）和房屋净值贷款。

    - **单元格**：每个单元格将包含账户名称、账户的后四位数字、可用余额和当前余额。


    一图胜千言。屏幕模型对开发者和用户都很有帮助，因为它们能展示视图完成后的样子。有许多工具可以快速设计模型，其中一种工具是 OmniGraffle。请参见图
    4-6，该示例展示了由 OmniGraffle 生成的用于设计需求的屏幕模型。


    ![A341013_4_En_4_Fig6_HTML.jpg](img/A341013_4_En_4_Fig6_HTML.jpg)


    **图 4-6.** 使用 OmniGraffle 和 Ultimate iPhone Stencil 插件制作的手机银行应用屏幕模型。此模型是为 2010
    年的原始 Woodforest 银行应用制作的。


    许多开发者认为设计需求耗时过长且不必要。事实并非如此。图 4-6 中的账户屏幕展示了大量信息。许多业务规则决定了信息如何展示给用户，以及出现问题时如何处理所有错误。在设计你的应用时，在开发过程开始时与所有业务利益相关者合作，对于首次就做好至关重要。


    图 4-7 是所有利益相关者参与应用开发的一个示例。从开始就让所有利益相关者参与每个视图，将消除多次重写和应用错误。


    ![A341013_4_En_4_Fig7_HTML.jpg](img/A341013_4_En_4_Fig7_HTML.jpg)


    **图 4-7.** 2015 年 App Store 上的 Woodforest 手机银行应用界面；请将此与图 4-6 中的应用需求账户屏幕进行比较。


    此外，苹果公司建议开发者至少将 50% 的开发时间用于用户界面的设计和开发。


    Balsamiq 也为设计 iOS 应用的外观提供了出色的工具。请参见图 4-8。


    ![A341013_4_En_4_Fig8_HTML.jpg](img/A341013_4_En_4_Fig8_HTML.jpg)


    **图 4-8.** Balsamiq.com 网站，用于创建线框模型。


    ## 总结


    本章涵盖了关于如何控制应用程序的大量重要信息；程序流程和决策制定对每个 iOS 应用都至关重要。确保你已经完成了本章中的 Swift 示例。你或许会复习这些示例，并认为自己无需实际编写这个应用就已理解了一切。这将是一个致命错误，它会阻碍你成为一名成功的
    iOS 开发者。你必须花时间编写这个示例的代码。开发者是通过实践而非阅读来学习的。


    本章中的术语很重要。你应该能够描述以下内容：


    - `AND`（与）

    - `OR`（或）

    - `XOR`（异或）

    - `NAND`（与非）

    - `NOR`（或非）

    - `NOT`（非）

    - 真值表

    - 否定

    - 所有比较运算符

    - 应用需求

    - 逻辑 `AND` (`&&`)

    - 逻辑 `OR` (`||`)

    - 可选值与强制解包

    - 可选绑定

    - 隐式解包可选值

    - 流程图

    - 循环

    - 计数控制循环

    - For 循环

    - 条件控制循环

    - 无限循环

    - `While` 循环

    - 嵌套 `if` 语句

    - 代码重构


    ### 练习


    -   扩展随机数生成器应用，使其在控制台打印用户猜对随机数之前尝试的次数。

    -   扩展随机数生成器应用，使其在控制台打印用户玩该应用的次数。当用户退出应用时，将此值打印到控制台。


    # 5. 使用 Swift 进行面向对象编程


    在过去的 16 年里，编程界一直聚焦于面向对象编程（OOP）的开发范式。大多数现代开发环境和语言都实现了 OOP。简单来说，OOP 构成了你今天所开发的一切的基础。


    你可能会问，既然 OOP 是当今主要的开发风格，为什么我们等到第 5 章才介绍如何使用 Swift 进行 OOP？答案很简单：对于新开发者来说，它不是一个容易掌握的概念。本章将详细探讨
    OOP 的不同方面及其对你开发工作的影响。


    将 OOP 正确地应用到你的应用程序中需要一些前期规划，但在整个项目生命周期中，你会节省大量时间。OOP 已经改变了开发的方式。在本章中，你将学习什么是 OOP。本书第一章曾初步讨论过
    OOP，但本章将更深入地讲解。你将重新审视什么是对象，以及它们如何与现实世界中的物理对象相关联。你将探究什么是类，以及它们与对象的关系。你还将学习在规划类时需要采取的步骤，以及可以用来完成这些步骤的一些可视化工具。当你阅读完本章并完成了练习后，你将更好地理解什么是
    OOP，以及为什么它对你作为开发者是必要的。


    起初，对象和面向对象编程可能看起来难以理解，但希望随着你对本章内容的深入学习，它们会开始变得有意义。

    '
- fmt: '# The Object


    As discussed in Chapter [1](#A341013_4_En_1_Chapter.html), OOP is based on objects.
    Some of the discussion about objects will be a review, but it will also go into
    more depth. An object is anything that can be acted upon. To better understand
    what a programming object is, you will first look at some items in the physical
    world around you. A physical object can be anything around you that you can touch
    or feel. Take, for example, a television. Some characteristics of a television
    include type (plasma, LCD, or CRT), size (40 inches), brand (Sony or Vizio), weight,
    and cost. Televisions also have functions. They can be turned on or off. You can
    change the channel, adjust the volume, and change the brightness.


    Some of these characteristics and functions are unique to televisions, and some
    are not. For example, a couch in your house would probably not have the same characteristics
    as a television. You would want different information about a couch, such as material
    type, seating capability, and color. A couch might have only a few functions,
    such as converting to a bed or reclining.


    Now let’s talk specifically about objects as they relate to programming. An object
    is a specific item. It can describe something physical like a book, or it could
    be something such as a window for your application. Objects have properties and
    methods. Properties describe certain things about an object such as location,
    color, or name. Conversely, methods describe actions the object can perform such
    as close or recalculate. In this example, a `TV` object would have `type`, `size`,
    and `brand` properties, while a `Couch` object would have properties such as `color`,
    `material`, and `comfort level`. In programming terms, a property is a variable
    that is part of an object. For example, a TV would use a string variable to store
    the brand and an integer to store the height.


    Objects also have commands the programmer can use to control them. The commands
    are called methods. Methods are the way that other objects interact with a certain
    object. For example, with the television, a method would be any of the buttons
    on the remote control. Each of those buttons represents a way you can interact
    with your television. Methods can and often are used to change the values of properties,
    but methods do not store any values themselves.


    As described in Chapter [1](#A341013_4_En_1_Chapter.html), objects have a state,
    which is basically a snapshot of an object at any given point in time. A state
    would be the values of all the properties at a specific time.


    In Chapter [8](#A341013_4_En_8_Chapter.html), you will create a bookstore app.
    A bookstore contains many different objects. It contains book objects that have
    properties such as `title`, `author`, `page count`, and `publisher`. It also contains
    magazines with properties such as `title`, `issue`, `genre`, and `publisher`.
    A bookstore also has some nontangible objects such as a `sale`. A `sale` object
    would contain information about the books purchased, the customer, the amount
    paid, and the payment type. A `sale` object might also have some methods that
    calculate tax, print the receipt, or void the sale. A `sale` object does not represent
    a tangible object, but it is still an object and is necessary for creating an
    effective bookstore.


    Because the object is the basis of OOP, it is important to understand objects
    and how to interact with them. You will spend the rest of the chapter learning
    about objects and some of their characteristics.


    ## What Is a Class?


    We cannot discuss OOP without discussing what a class is. A class defines which
    properties and methods an object will have. A class is basically a cookie cutter
    that can be used to create objects that have similar characteristics. All objects
    of a certain class will have the same properties (notice, the values of the properties
    many times will be different) and the same methods. The values of those properties
    will change from object to object.


    A class is similar to a species in the animal world. A species is not an individual
    animal, but it does describe many similar characteristics of the animal. To understand
    classes more, let’s look at an example of classes in nature. The `Dog` class has
    many properties that all dogs have in common. For example, a dog may have a name,
    an age, an owner, a weight and a favorite activity. An object that is of a certain
    class is called an instance of that class. If you look at Figure [5-1](#A341013_4_En_5_Chapter.html#Fig1),
    you can see the difference between the class and the actual objects that are instances
    of the class. For example, `Lassie` is an instance of the `Dog` class. In Figure
    [5-1](#A341013_4_En_5_Chapter.html#Fig1), you can see a `Dog` class that has four
    properties (`Breed`, `Age`, `Owner`, and `Favorite Activity`). In real life, a
    dog will have many more properties, but these four are for this demonstration.


    ![A341013_4_En_5_Fig1_HTML.jpg](A341013_4_En_5_Fig1_HTML.jpg)


    Figure 5-1. An example of a class and its individual objects


    ## Planning Classes


    Planning your classes is one of the most important steps in your development process.
    While it is possible to go back and add properties and methods after the fact
    (and you will definitely need to do this), it is important that you know which
    classes are going to be used in your application and which basic properties and
    methods they will have. Spending time planning your different classes is important
    at the beginning of the process.'
