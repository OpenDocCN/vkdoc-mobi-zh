- fmt: '# Adding More Functionality


    In the last section, you created a WatchKit app, but it’s very limited in functionality.
    In this section, you will add a new scene to the app to show book detail when
    a book is selected. Because you will be adding a scene, you will use an additional
    controller file. Right-click the `BookStore WatchKit Extension` folder and select
    `New File`, as shown in Figure [15-23](#A341013_4_En_15_Chapter.html#Fig23).


    ![A341013_4_En_15_Fig23_HTML.jpg](A341013_4_En_15_Fig23_HTML.jpg)


    Figure 15-23. Adding new controller file


    Make sure the new file is a Swift file and name it `DetailController.swift`. It
    should now appear in your file list. Add the following code after the `import
    Foundation` line:


    ```

    10      import WatchKit


    13      class DetailController: WKInterfaceController {

    14           @IBOutlet var labelTitle: WKInterfaceLabel!

    15           @IBOutlet var labelAuthor: WKInterfaceLabel!

    16           @IBOutlet var labelDescription: WKInterfaceLabel!


    18           var book: Book!


    20           override func awake(withContext context: Any?) {

    21                super.awake(withContext: context)

    22                if let book = context as? Book {

    23                     labelTitle.setText(book.title)

    24                     labelAuthor.setText(book.author)

    25                     labelDescription.setText(book.description)

    26                }

    27           }

    28      }

    ```


    Line 10 imports the `WatchKit` framework. This is necessary when dealing with
    any `WatchKit` class such as `WKInterfaceController` or `WKInterfaceLabel`. Line
    13 declares a new `WKInterfaceController` subclass called `DetailController`.
    Lines 14–16 create the label outlets you will be using to display the book information.
    Line 18 declares the `Book` property called `book`. Line 20 is the `awakeWithContext`
    method. It is passed an object called `context`, which is of type `Any`. This
    is where the `Book` object will be passed. Line 22 takes the `context` and assigns
    it to a `book` object. Lines 23–25 take the pieces of information from the book
    and assign them to the labels.


    You now need to add the following method to the `InterfaceController` class:


    ```

    override func contextForSegue(withIdentifier segueIdentifier: String,

    in table: WKInterfaceTable,

    rowIndex: Int) -> Any? {

    return myBookStore.bookList[rowIndex]

    }

    ```


    This method passes the book to the `DetailController` when it receives the `rowIndex`
    of the selected row. Now you need to create the interface. Select `Interface.storyboard`
    on the left side. Drag an Interface Controller from the Object Library to the
    storyboard as shown in Figure [15-24](#A341013_4_En_15_Chapter.html#Fig24).


    ![A341013_4_En_15_Fig24_HTML.jpg](A341013_4_En_15_Fig24_HTML.jpg)


    Figure 15-24. Adding new controller file


    Select the second Interface Controller Scene and set the class to `DetailController`,
    as shown in Figure [15-25](#A341013_4_En_15_Chapter.html#Fig25).


    ![A341013_4_En_15_Fig25_HTML.jpg](A341013_4_En_15_Fig25_HTML.jpg)


    Figure 15-25. Setting the new controller class


    Now drag three label objects onto the interface. These labels will be for the
    book title, author, and description. See Figure [15-26](#A341013_4_En_15_Chapter.html#Fig26).
    watchOS does not provide all of the layout options that iOS, tvOS, or macOS do.
    As a developer, you will need to spend time designing simple watchOS interfaces.


    ![A341013_4_En_15_Fig26_HTML.jpg](A341013_4_En_15_Fig26_HTML.jpg)


    Figure 15-26. New labels


    Now you need to connect the outlets of the new labels. Control-drag from the Detail
    Controller Scene to each of the labels and assign them to their respective property.
    See Figure [15-27](#A341013_4_En_15_Chapter.html#Fig27).


    ![A341013_4_En_15_Fig27_HTML.jpg](A341013_4_En_15_Fig27_HTML.jpg)


    Figure 15-27. Connecting the outlets


    The data should all be displaying now. You need to create the segue and test the
    app once again. Control-drag from the `MyBookRow` under the Interface Controller
    Scene to the Detail Controller. You will be prompted to select the type of segue.
    Select `Push`. See Figure [15-28](#A341013_4_En_15_Chapter.html#Fig28).


    ![A341013_4_En_15_Fig28_HTML.jpg](A341013_4_En_15_Fig28_HTML.jpg)


    Figure 15-28. Creating the segue


    Now run the app and select a row. You should see the detail controller you just
    created, as shown in Figure [15-29](#A341013_4_En_15_Chapter.html#Fig29).


    ![A341013_4_En_15_Fig29_HTML.jpg](A341013_4_En_15_Fig29_HTML.jpg)


    Figure 15-29. Detail view scene


    ## Summary


    This chapter covered an introduction to developing for the Apple Watch. Specifically,
    in this chapter, you learned the following:


    - How to create a new WatchKit app

    - How to use the WatchKit controls `WKInterfaceController`, `WKInterfaceTable`,
    and `WKInterfaceLabel`

    - How to create multiple scenes and add segues between them

    - How to handle passing data from one scene to the next


    ## Exercises


    - Set up the labels on the detail scene to display all of the data instead of
    cutting some of it off.

    - Add more books to your `BookStore` so you can play with the scrolling in the
    app.'
  raw: '## Adding More Functionality


    In the last section, you created a WatchKit app, but it’s very limited in functionality.
    In this section, you will add a new scene to the app to show book detail when
    a book is selected. Because you will be adding a scene, you will use an additional
    controller file. Right-click the BookStore WatchKit Extension folder and select
    New File, as shown in Figure [15-23](#A341013_4_En_15_Chapter.html#Fig23).


    ![A341013_4_En_15_Fig23_HTML.jpg](A341013_4_En_15_Fig23_HTML.jpg)


    Figure 15-23.


    Adding new controller file


    Make sure the new file is a Swift file and name it `DetailController.swift` .
    It should now appear in your file list. Add the following code after the `import
    Foundation` line:


    ```

    10      import WatchKit


    13      class DetailController: WKInterfaceController {

    14           @IBOutlet var labelTitle: WKInterfaceLabel!

    15           @IBOutlet var labelAuthor: WKInterfaceLabel!

    16           @IBOutlet var labelDescription: WKInterfaceLabel!


    18           var book: Book!


    20           override func awake(withContext context: Any?) {

    21                super.awake(withContext: context)

    22                if let book = context as? Book {

    23                     labelTitle.setText(book.title)

    24                     labelAuthor.setText(book.author)

    25                     labelDescription.setText(book.description)

    26                }

    27           }

    28      }

    ```


    Line 10 imports the WatchKit framework. This is necessary when dealing with any
    WatchKit class such as `WKInterfaceController` or `WKInterfaceLabel`. Line 13
    declares a new `WKInterfaceController` subclass called `DetailController` . Lines
    14-16 create the label outlets you will be using to display the book information.
    Line 18 declares the `Book` property called `book`. Line 20 is the `awakeWithContext`
    method. It is passed an object called `context`, which is of type `Any`. This
    is where the `Book` object will be passed. Line 22 takes the context and assigns
    it to a `book` object. Lines 23-25 take the pieces of information from the book
    and assign them to the labels.


    You now need to add the following method to the `InterfaceController` class:


    ```

    override func contextForSegue(withIdentifier segueIdentifier: String,

    in table: WKInterfaceTable,

    rowIndex: Int) -> Any? {

    return myBookStore.bookList[rowIndex]

    }

    ```


    This method passes the book to the `DetailController` when it receives the `rowIndex`
    of the selected row. Now you need to create the interface. Select `Interface.storyboard`
    on the left side. Drag an Interface Controller from the Object Library to the
    storyboard as shown in Figure [15-24](#A341013_4_En_15_Chapter.html#Fig24).


    ![A341013_4_En_15_Fig24_HTML.jpg](A341013_4_En_15_Fig24_HTML.jpg)


    Figure 15-24.


    Adding new controller file


    Select the second Interface Controller Scene and set the class to DetailController,
    as shown in Figure [15-25](#A341013_4_En_15_Chapter.html#Fig25).


    ![A341013_4_En_15_Fig25_HTML.jpg](A341013_4_En_15_Fig25_HTML.jpg)


    Figure 15-25.


    Setting the new controller class


    Now drag three label objects onto the interface. These labels will be for the
    book title, author, and description. See Figure [15-26](#A341013_4_En_15_Chapter.html#Fig26).
    watchOS does not provide all of the layout options that iOS, tvOS, or macOS do.
    As a developer, you will need to spend time designing simple watchOS interfaces.


    ![A341013_4_En_15_Fig26_HTML.jpg](A341013_4_En_15_Fig26_HTML.jpg)


    Figure 15-26.


    New labels


    Now you need to connect the outlets of the new labels. Control-drag from the Detail
    Controller Scene to each of the labels and assign them to their respective property.
    See Figure [15-27](#A341013_4_En_15_Chapter.html#Fig27).


    ![A341013_4_En_15_Fig27_HTML.jpg](A341013_4_En_15_Fig27_HTML.jpg)


    Figure 15-27.


    Connecting the outlets


