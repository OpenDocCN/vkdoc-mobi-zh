  trans: "\n### 将类型方法提升至新高度\n\n在你的程序中，你尚未充分利用 `RadioStation` 的所有类型方法，但本章将描述什么是类型方法以及如何使用它。利用所学知识，尝试本章末尾提到的几个练习。只需通过添加或修改类型方法或实例方法来玩玩这个简单可运行的程序，就能了解它们的工作方式。\n\
    \n### 访问 Xcode 文档\n\nXcode 开发者文档中提供了丰富的信息。打开 Xcode 后，选择“帮助” ➤ “文档和 API 参考”（见图\
    \ 7-24）以打开“文档”窗口。\n\n![A341013_4_En_7_Fig24_HTML.jpg](img/A341013_4_En_7_Fig24_HTML.jpg)\n\
    \n图 7-24.\n\nXcode 帮助菜单\n\n打开后，可以使用搜索窗口查找本章中使用的任何 Swift 类，包括 `String` 类文档，如图 7-25\
    \ 所示。\n\n![A341013_4_En_7_Fig25_HTML.jpg](img/A341013_4_En_7_Fig25_HTML.jpg)\n\
    \n图 7-25.\n\nXcode 文档\n\n关于图 7-25 中显示的 `String` 类，有几件值得探究的事情。浏览 Apple 提供的文档和各种配套指南。这将帮助你更深入地理解各种类及其支持的各类方法。\n\
    \n### 总结\n\n再次祝贺你能够单枪匹马地将大量信息塞入脑中！以下是本章涵盖内容的总结：\n\n*   Swift 类回顾\n    *   类型方法\n\
    \    *   实例方法\n*   创建一个类\n    *   使用类型方法与实例方法的局限性\n    *   初始化类并使用实例变量\n*   使用你的新\
    \ `RadioStation` 对象\n    *   构建一个使用你新对象的 iPhone 应用\n    *   将界面类连接到属性\n    * \
    \  将用户界面事件连接到类中的方法\n\n练习\n\n*   修改创建 `RadioStation` 类的代码，使电台名称远长于屏幕所能显示的长度。会出现什么情况？\n\
    *   修改当前按钮并添加一个新按钮。将按钮标记为 FM 和 AM。如果用户点击 FM 按钮，则显示一个 FM 电台。如果用户点击 AM 按钮，则显示一个\
    \ AM 电台。（提示：你需要在 `ViewController.swift` 文件中添加第二个 `RadioStation` 对象。）\n*   通过确保用户在\
    \ iPhone 应用首次启动时看不到文本“Label”，来稍微清理一下界面。\n    *   使用界面工具修复此问题。\n    *   如何通过向应用程序添加代码来解决此问题？\n\
    *   为 `@IBAction func buttonClick(_ sender: AnyObject)` 方法增加更多验证。目前，它只验证 FM 范围，而不验证\
    \ AM 范围。修复代码，使其也能验证 AM 范围。\n    *   如果电台频率超出范围，则使用现有标签显示某种错误消息。\n\n脚注 1\n\n通过使用代码或\
    \ Interface Builder，你可以自定义 Label 对象对过大文本的反应方式。此处描述的行为基于 Label 对象的典型默认设置。\n\n#\
    \ 8. Swift 编程基础\n\nSwift 是一种优雅的语言。它融合了编译型语言的效率以及许多脚本语言的灵活性和现代特性。\n\n本章介绍 Swift\
    \ 中一些更常见的概念，例如属性和集合类。它还展示了在处理用户界面元素时，如何在 Xcode 中使用属性。这听起来任务繁重，但 Swift、Foundation\
    \ 框架和 Xcode 工具提供了丰富的对象和方法，以及一种轻松构建应用程序的方式。\n\n### 使用 `let` 与 `var`\n\n如果你花了很多时间接触\
    \ Swift，会看到 `var` 一词出现在变量声明之前。你可能也在其他声明之前看到过 `let`。`var` 用于定义变量，而 `let` 用于定义常量。这意味着，如果你用\
    \ `let` 声明一个值，将无法更改该值。以下代码定义了一个常量：\n\n```\nlet myName = \"Brad\"\n```\n\n一旦定义了常量，就无法更改该值。\n\
    \n注意\n\n如果你声明了一个变量且从未更改其值，Xcode 现在会发出警告。它会建议你使用 `let` 代替 `var`。\n\n```\nmyName\
    \ = \"John\"\n```\n\n这将会报错。如果你想创建一个可变的变量，需要使用 `var`。例如，你可以这样做：\n\n```\nvar myName\
    \ = \"Brad\"\nmyName = \"John\"\n```\n\n这不会产生任何错误，因为 `myName` 现在是一个变量。这不仅适用于 `String`\
    \ 和 `Int`，也可以用于集合和其他对象。\n\n变量提供了更大的灵活性，那么为什么有人会想使用常量呢？简单的答案是性能。如果你知道某个值不会改变，编译器可以将该值优化为常量。\n\
    \n### 理解集合\n\n理解集合是学习 Swift 的基础。事实上，集合对象几乎是所有现代面向对象语言库的基本构造（有时它们被称为容器）。简单来说，集合是一种能够容纳和管理其他对象的类。集合的全部意义在于它提供了一种高效存储和检索对象的通用方式。\n\
    \n集合有多种类型。虽然它们都满足容纳其他对象的相同目的，但主要区别在于检索对象的方式。Swift 中最常用的集合是 `Array` 和 `Dictionary`。\n\
    \n这些集合都可以作为常量或常规变量来创建。如果你将集合创建为常量，则必须在创建时用对象填充它。之后就无法再对其进行修改。\n"
- fmt: '# Using Arrays


    The `Array` class is like any other collection, in that it allows the programmer
    to manage a group of objects. An array is an ordered collection, which means that
    objects are entered in an array in a certain order and retrieved in the same order.


    **Note** – There are some methods for working with arrays that allow you to change
    the order of the objects or to add an object at a specific location in the array.


    The `Array` class allows an object to be retrieved by its index in the array.
    An index is the numeric position that an object would occupy in the array. For
    example, if there are three elements in the array, the objects can be referenced
    with indices from 0 to 2. Like with most things in Swift and other programming
    languages, indices start at 0, not 1. See Listing [8-1](#A341013_4_En_8_Chapter.html#Par18).


    ```

    1    var myArray: [String] = ["One", "Two", "Three"]

    2    print(myArray[0])

    3    print(myArray[1])

    4    print(myArray[2])

    Listing 8-1.

    Accessing objects in an array

    ```


    As you can see, objects in the array can be retrieved via their index. The indices
    start at 0 and can’t exceed the size of the array minus 1. You can easily calculate
    the size of the array by accessing the `count` property of the `Array` object,
    as shown here:


    ```

    var entries = myArray.count

    ```


    In fact, every collection type, including `Array` and `Dictionary`, contains a
    `count` property.


    Adding items to the end of an array is simple. You can just call the `append`
    method on the array. See Listing [8-2](#A341013_4_En_8_Chapter.html#Par23).


    ```

    1    var myArray: [String] = ["One", "Two", "Three"]

    2    myArray.append("Four")

    3    myArray.append("Five")

    4    myArray.append("Six")

    Listing 8-2.

    Adding objects to an array

    ```


    Swift provides you with many different methods for adding items to an array. If
    you want to add multiple objects to an array, you can use the standard `+=` (often
    called plus equals) operator. Listing [8-3](#A341013_4_En_8_Chapter.html#Par25)
    creates an array and then adds three more `String` objects to the array on line
    2. Notice the new values are in brackets instead of parentheses.


    ```

    1    var myArray: [String] = ["One", "Two", "Three"]

    2    myArray += ["Four", "Five", "Six"]

    Listing 8-3.

    Adding multiple objects to an array

    ```


    As discussed earlier, an array is actually ordered. The order of the objects in
    your array is important. There may be times where you need to add an item at a
    certain position in the array. You can accomplish this with the `insert(at:)`
    method, as shown in Listing [8-4](#A341013_4_En_8_Chapter.html#Par27).


    ```

    1    var myArray: [String] = ["Two", "Three"]

    2    myArray.insert("One", at: 0)

    Listing 8-4.

    Adding a string to the beginning of an array

    ```


    The array now contains One, Two, Three.


    Accessing items in an array is simple. You can use standard square brackets to
    access an object at a certain position. For example, `myArray[0]` would give you
    the first object in the array. If you want to loop through each of the items in
    the array, you can use something called fast enumeration or For-In Loops. Listing
    [8-5](#A341013_4_En_8_Chapter.html#Par30) is an example of fast enumeration.


    ```

    1    var myArray: [String] = ["One", "Two", "Three"]

    2    for myString in myArray {

    3         print(myString)

    4    }

    Listing 8-5.

    Fast enumeration

    ```


    The magic happens in line 2 of Listing [8-5](#A341013_4_En_8_Chapter.html#Par30).
    You tell Swift to assign each value of `myArray` to a new constant called `myString`.
    You can then do whatever you want to do with `myString`. In this case, you just
    print it. It will go through all of the objects in the array without you having
    to know the total number of objects. This is a fast and effective way to pull
    items out of an array.


    Removing objects from an array is simple too. You can use the `remove(at:)` method,
    as shown in Listing [8-6](#A341013_4_En_8_Chapter.html#Par33).


    ```

    1    var myArray: [String] = ["One", "Two", "Three"]

    2    myArray.remove(at: 1)

    3    for myString in myArray {

    4         print(myString)

    5    }

    Listing 8-6.

    Removing an object

    ```


    The output from Listing [8-6](#A341013_4_En_8_Chapter.html#Par33) will be `One,
    Three`. This is because you removed the object with the index of 1. Remember,
    this is the second object in the array because array indices always begin at 0.


    You have seen how flexible Swift is in letting you interact with arrays. They
    are powerful collections that you will use on a regular basis as a programmer.
    This section covered the basics of arrays, but there are many more things arrays
    can do.


    # Using the Dictionary Class


    The Swift `Dictionary` class is also a useful type of collection class. It allows
    the storage of objects, just like the `Array` class, but `Dictionary` is different
    in that it allows a key to be associated with the entry. For example, you could
    create a dictionary that stores a list of attributes about someone such as a `firstName`,
    `lastName`, and so on. Instead of accessing the attributes with an index like
    with an array, the dictionary could use a `String` like `"firstName"`. However,
    all keys must be unique — that is, `"firstName"` cannot exist more than once.
    Depending on your program, finding unique names is normally not a problem.


    Here’s an example of how you create a dictionary:


    ```

    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

    ```


    This creates a simple dictionary called `person`. The next part of the declaration
    tells the dictionary what kinds of objects the keys and the values will be. In
    this case, the keys are `String`s, and the values are `String`s. You then add
    two keys to the dictionary. The first key is `firstName`, and that key has a value
    of `John`. The second key is `lastName`, and that has a value of `Doe`. You can
    access the values in the dictionary by using a similar notation to arrays.


    ```

    print(person["firstName"])

    ```


    This code will print the name `Optional("John")` since that is the value for the
    key `firstName`. The `Optional` appears in the previous example because the value
    of a key in a dictionary is an optional value. You can use the same style of code
    to change the values in a dictionary. Let’s say, for this example, that John now
    likes to go by Joe instead. You can change the value in the dictionary with a
    simple line of code.


    ```

    person["firstName"] = "Joe"

    ```


    You can add a new key to a dictionary with the same notation.


    ```

    person["gender"] = "Male"

    ```


    If you decide you want to remove a key from a dictionary, such as the `gender`
    key you just added, you can do so by setting the value of that key to `nil`.


    ```

    person["gender"] = nil

    ```


    Now the dictionary will contain only `firstName` and `lastName`. Remember that
    dictionaries are not ordered. You cannot rely on the order, but there will be
    times when you need to iterate over a dictionary. This is done in a manner similar
    to arrays. The main difference is that in an array, you assign one variable, while
    in a dictionary, you need to assign the key and the value. See Listing [8-7](#A341013_4_En_8_Chapter.html#Par48).


    ```

    1    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

    2    for (myKey, myValue) in person {

    3         print(myKey + ": " + myValue)

    4    }

    Listing 8-7.

    Iterating over a dictionary

    ```


    This example will print the following:


    ```

    firstName: John

    lastName: Doe

    ```


    Dictionaries are a great way to organize data that does not need to be ordered.
    It is also a great way to look up data based on a certain key. They are very flexible
    in Swift and should be used to organize and optimize your code.'
