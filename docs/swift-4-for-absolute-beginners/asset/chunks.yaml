  trans: '

    ## 添加新属性


    对于属性，你只需指定两个选项：名称和数据类型。不妨将此属性命名为 `title`。与实体不同，属性名称必须为小写。


    接下来，你需要选择一种数据类型。选择正确的数据类型至关重要，它将影响数据在数据库中的存储和检索方式。列表中共有 13 个选项，可能让人望而生畏。我们将讨论最常用的选项，随着你对
    Core Data 的熟悉，可以尝试其他选项。最常用的选项包括 `String`、`Integer 32`、`Decimal` 和 `Date`。对于书籍标题，请选择
    `String`。


    - `String`：这是用于存储文本的属性类型。该类型应存储任何非数字或日期的信息。在此示例中，书名和作者姓名将是字符串。

    - `Integer 32`：一个属性有三种可能的整数值类型。这些整数类型的区别仅在于最小值和最大值不同。在存储整数时，`Integer 32` 通常能满足大多数需求。整数是**无**小数点的数字。如果尝试将小数保存到整数属性中，小数部分将被截断。在此示例中，出版年份将是一个整数。

    - `Decimal`：`Decimal` 是一种可以存储带有小数点的数字的属性类型。`Decimal` 与 `Double` 属性类似，但它们在最小值、最大值和精度上有所不同。`Decimal`
    应能处理任何货币值。在此示例中，你将使用 `Decimal` 来存储书籍价格。

    - `Date`：`Date` 属性顾名思义。它允许你存储日期和时间，并基于这些值执行搜索和查找。在此示例中，你不会使用此类型。


    现在，让我们为书籍创建其余属性。接着，添加 `price`，它应为 `Decimal`。再添加书籍的出版年份。对于由两个单词组成的属性，标准做法是将第一个单词设为小写，第二个单词的首字母大写。例如，书籍出版年份属性的理想名称是
    `yearPublished`。选择 `Integer 32` 作为属性类型。添加完所有属性后，你的屏幕应类似于图 11-6。


    > **注意：** 属性名称不能包含空格。


    ![A341013_4_En_11_Fig6_HTML.jpg](img/A341013_4_En_11_Fig6_HTML.jpg)


    **图 11-6.** 完成后的 `Book` 实体


    > **注意：** 如果你有使用数据库的经验，会注意到你并没有添加主键。主键是一个字段（通常为数字），用于唯一标识数据库中的每条记录。在 Core Data
    数据库中，无需创建主键。框架会为你处理这一切。


    现在，你已经完成了 `Book` 实体，让我们添加一个 `Author` 实体。


    1. 添加一个新实体，并将其命名为 `Author`。

    2. 为此实体添加 `lastName` 和 `firstName`，两者均为字符串。


    完成后，你的实体列表中应该有两个实体。现在你需要添加关系。


    1. 单击 `Book` 实体，然后按住屏幕右下角的加号（+）按钮。选择 `添加关系 (Add Relationship)`，如图 11-7 所示。（你也可以点击
    Core Data 模型“关系 (Relationships)”部分下的加号。）


    ![A341013_4_En_11_Fig7_HTML.jpg](img/A341013_4_En_11_Fig7_HTML.jpg)


    **图 11-7.** 添加新关系


    2. 你将有机会为关系命名。通常，关系的名称与你引用的实体名称相同。输入 `author` 作为名称，然后从“目标 (Destination)”下拉菜单中选择
    `Author`。


    3. 你已经创建了关系的一半。要创建另一半，请单击 `Author` 实体。点击屏幕右下角的加号（+），然后选择 `添加关系 (Add Relationship)`。使用你要连接的实体名称作为此关系的名称，因此将其命名为
    `books`。（你在关系名称后添加了 `s`，因为一个作者可以有多本书。）在“目标 (Destination)”下选择 `Book`，在“反向 (Inverse)”下选择你上一步创建的
    `author` 关系。在屏幕右侧的“实用工具 (Utilities)”窗口中，选择“数据模型检查器 (Data Model Inspector)”。将此关系的类型设置为“对多
    (To Many)”。现在，你的模型应如图 11-8 所示。


    > **注意：** 有时在 Xcode 中处理模型时，需要按 `Tab` 键来更新实体、属性和关系的名称。这个小特性可以追溯到 WebObjects 工具。


    ![A341013_4_En_11_Fig8_HTML.jpg](img/A341013_4_En_11_Fig8_HTML.jpg)


    **图 11-8.** 最终的关系


    默认情况下，Xcode 现在会识别并能使用你的新实体。如果你需要自定义 Core Data 对象，例如添加验证或自定义计算属性，则需要告诉 Xcode 为你生成
    `NSManagedObject` 子类。在本章中，我们将使用 Xcode 的默认实现。你可以通过点击实体，然后查看右侧的“数据模型检查器 (Data Model
    Inspector)”（如图 11-9 所示），来确认 Xcode 将在运行时生成这些文件。确保 `Codegen` 设置为 `类定义 (Class Definition)`。


    ![A341013_4_En_11_Fig9_HTML.jpg](img/A341013_4_En_11_Fig9_HTML.jpg)


    **图 11-9.** 检查实体的 `Codegen` 状态


    当 Xcode 为你的实体生成类定义时，它会创建 `NSManagedObject` 的子类。`NSManagedObject` 是处理所有 Core Data
    数据库交互的对象。它提供了你在此示例中将使用的方法和属性。


    ### 托管对象上下文


    Xcode 将创建一个名为 `Book` 的托管对象类。在 Core Data 中，每个托管对象都应在托管对象上下文中存在。上下文负责跟踪对象的更改、执行撤销操作以及将数据写入数据库。这很有用，因为你现在可以一次保存大量更改，而不是逐个保存。这加快了保存记录的过程。作为开发者，你不需要跟踪对象何时被更改。托管对象上下文会为你处理所有这一切。

    '
- fmt: "### Setting Up the Interface\n\nThe following steps will assist you in setting\
    \ up your interface:\n\n1.  In the `BookStore` folder in your project, you should\
    \ have a `Main.storyboard` file. Click this file and Xcode will open it in the\
    \ editing window, as shown in Figure 11-10.\n\n    ![A341013_4_En_11_Fig10_HTML.jpg](A341013_4_En_11_Fig10_HTML.jpg)\n\
    \n    *Figure 11-10. Creating the interface*\n\n2.  There should be a blank window.\
    \ To add some functionality to your window, you need to add some objects from\
    \ the Object Library. Type `table` into the search field on the bottom right of\
    \ the screen. This should narrow the objects, and you should see `Table View Controller`\
    \ and `Table View`. Drag the `Table View` to the view, as shown in Figure 11-11.\n\
    \n    ![A341013_4_En_11_Fig11_HTML.jpg](A341013_4_En_11_Fig11_HTML.jpg)\n\n  \
    \  *Figure 11-11. Adding the Table View*\n\n3.  You now have a `Table View`. You\
    \ will need to stretch the `Table View` to fill your view. Drag all four corners\
    \ of the `Table View` so that it covers your entire view as shown in Figure 11-12.\n\
    \n    ![A341013_4_En_11_Fig12_HTML.jpg](A341013_4_En_11_Fig12_HTML.jpg)\n\n  \
    \  *Figure 11-12. Stretching the Table View*\n\n4.  To create cells in your `Table\
    \ View`, you need to add a `UITableViewCell`. Your current search of `table` should\
    \ show a `Table View Cell` beneath the `Table View` object. Drag a `Table View\
    \ Cell` to your table. You now have a table and a cell on your view, as shown\
    \ in Figure 11-13.\n\n    ![A341013_4_En_11_Fig13_HTML.jpg](A341013_4_En_11_Fig13_HTML.jpg)\n\
    \n    *Figure 11-13. Adding the Table View Cell*\n\n5.  Select the cell, and in\
    \ the Attributes Inspector in the utilities section set `Style` to `Basic`. Also,\
    \ set the `Identifier` to `Cell`. The identifier is used for when your `Table\
    \ View` contains multiple styles of cells. You will need to differentiate them\
    \ with unique identifiers. For most of your projects, you can set this to `Cell`\
    \ and not worry about it, as shown in Figure 11-14.\n\n    ![A341013_4_En_11_Fig14_HTML.jpg](A341013_4_En_11_Fig14_HTML.jpg)\n\
    \n    *Figure 11-14. Changing the style and identifier of the cell*\n\n6.  When\
    \ using a `Table View`, it is usually a good idea to put it in a `Navigation Controller`.\
    \ You will be using the `Navigation Controller` to give you space to put an `Add`\
    \ button on your `Table View`. To add a `Navigation Controller`, select your `View\
    \ Controller` in the Scene list, which is the window to the left of your storyboard\
    \ that shows your `View Controllers` (your `View Controller` will have a yellow\
    \ icon next to it). From the Application menu, select **Editor** ➤ **Embed In**\
    \ ➤ **Navigation Controller**, as shown in Figure 11-15.\n\n    ![A341013_4_En_11_Fig15_HTML.jpg](A341013_4_En_11_Fig15_HTML.jpg)\n\
    \n    *Figure 11-15. Embedding in a Navigation Controller*\n\n7.  You will now\
    \ have a navigation bar at the top of your view. You will now add a button to\
    \ the bar. This type of button is called a `UIBarButtonItem`. Search for `bar\
    \ button` in your Object Library and drag a `Bar Button Item` to the top right\
    \ of your view on the navigation bar, as shown in Figure 11-16.\n\n    ![A341013_4_En_11_Fig16_HTML.jpg](A341013_4_En_11_Fig16_HTML.jpg)\n\
    \n    *Figure 11-16. Adding a Bar Button Item to the navigation bar*\n\n8.  Select\
    \ the `Bar Button Item` and change the `System Item` from `Custom` to `Add` as\
    \ shown in Figure 11-17. This will change the look of your `Bar Button Item` from\
    \ the word `Item` to a plus icon.\n\n    ![A341013_4_En_11_Fig17_HTML.jpg](A341013_4_En_11_Fig17_HTML.jpg)\n\
    \n    *Figure 11-17. Changing the Bar Button Item*\n\n9.  Now you have created\
    \ the interface, you need to hook it up to your code. Hold down the **Control**\
    \ key and drag your `Table View` to the `View Controller` in the **Document Outline**,\
    \ as shown in Figure 11-18.\n\n    ![A341013_4_En_11_Fig18_HTML.jpg](A341013_4_En_11_Fig18_HTML.jpg)"
  raw: '### Setting Up the Interface


    The following steps will assist you in setting up your interface :


    1.  In the BookStore folder in your project, you should have a `Main.storyboard`
    file. Click this file and Xcode will open it in the editing window, as shown in
    Figure [11-10](#A341013_4_En_11_Chapter.html#Fig10).


    ![A341013_4_En_11_Fig10_HTML.jpg](A341013_4_En_11_Fig10_HTML.jpg)


    Figure 11-10.


    Creating the interface  

    2.  There should be a blank window . To add some functionality to your window,
    you need to add some objects from the Object Library. Type `table` into the search
    field on the bottom right of the screen. This should narrow the objects, and you
    should see Table View Controller and Table View. Drag the Table View to the view,
    as shown in Figure [11-11](#A341013_4_En_11_Chapter.html#Fig11).


    ![A341013_4_En_11_Fig11_HTML.jpg](A341013_4_En_11_Fig11_HTML.jpg)


    Figure 11-11.


    Adding the Table View  

    3.  You now have a Table View . You will need to stretch the Table View to fill
    your view. Drag all four corners of the Table View so that it covers your entire
    view as show in Figure [11-12](#A341013_4_En_11_Chapter.html#Fig12).


    ![A341013_4_En_11_Fig12_HTML.jpg](A341013_4_En_11_Fig12_HTML.jpg)


    Figure 11-12.


    Stretching the Table View  

    4.  To create cells in your Table View , you need to add a `UITableViewCell`.
    Your current search of table should show a Table View Cell beneath the Table View
    object. Drag a Table View Cell to your table. You now have a table and a cell
    on your view, as shown in Figure [11-13](#A341013_4_En_11_Chapter.html#Fig13).


    ![A341013_4_En_11_Fig13_HTML.jpg](A341013_4_En_11_Fig13_HTML.jpg)


    Figure 11-13.


    Adding the Table View Cell  

    5.  Select the cell, and in the Attributes Inspector in the utilities section
    set Style to Basic. Also, set the Identifier to Cell. The identifier is used for
    when your Table View contains multiple styles of cells. You will need to differentiate
    them with unique identifiers. For most of your projects, you can set this to Cell
    and not worry about it, as shown in Figure [11-14](#A341013_4_En_11_Chapter.html#Fig14).


    ![A341013_4_En_11_Fig14_HTML.jpg](A341013_4_En_11_Fig14_HTML.jpg)


    Figure 11-14.


    Changing the style and identifier of the cell  

    6.  When using a Table View, it is usually a good idea to put it in a Navigation
    Controller . You will be using the Navigation Controller to give you space to
    put an Add button on your Table View. To add a Navigation Controller, select your
    View Controller in the Scene list, which is the window to the left of your storyboard
    that shows your View Controllers (your View Controller will have a yellow icon
    next to it). From the Application menu, select Editor ➤ Embed In ➤ Navigation
    Controller, as shown in Figure [11-15](#A341013_4_En_11_Chapter.html#Fig15).


    ![A341013_4_En_11_Fig15_HTML.jpg](A341013_4_En_11_Fig15_HTML.jpg)


    Figure 11-15.


    Embedding in a Navigation Controller  

    7.  You will now have a navigation bar at the top of your view. You will now add
    a button to the bar. This type of button is called a `UIBarButtonItem` . Search
    for bar button in your Object Library and drag a Bar Button item to the top right
    of your view on the navigation bar, as shown in Figure [11-16](#A341013_4_En_11_Chapter.html#Fig16).


    ![A341013_4_En_11_Fig16_HTML.jpg](A341013_4_En_11_Fig16_HTML.jpg)


    Figure 11-16.


    Adding a Bar Button Item to the navigation bar  

    8.  Select the Bar Button Item and change the System Item from Custom to Add as
    shown in Figure [11-17](#A341013_4_En_11_Chapter.html#Fig17). This will change
    the look of your Bar Button Item from the word Item to a plus icon.


    ![A341013_4_En_11_Fig17_HTML.jpg](A341013_4_En_11_Fig17_HTML.jpg)


    Figure 11-17.


    Changing the Bar Button Item  

    9.  Now you have created the interface , you need to hook it up to your code.
    Hold down the Control key and drag your Table view to the View Controller in the
    Document Outline , as shown in Figure [11-18](#A341013_4_En_11_Chapter.html#Fig18).


    ![A341013_4_En_11_Fig18_HTML.jpg](A341013_4_En_11_Fig18_HTML.jpg)'
  trans: "\n### 设置界面\n\n以下步骤将帮助你设置界面：\n\n1.  在你的项目中的 `BookStore` 文件夹里，应该有一个 `Main.storyboard`\
    \ 文件。点击该文件，Xcode 会在编辑窗口中将其打开，如图 11-10 所示。\n\n    ![A341013_4_En_11_Fig10_HTML.jpg](img/A341013_4_En_11_Fig10_HTML.jpg)\n\
    \n    *图 11-10. 创建界面*\n\n2.  此时应该有一个空白窗口。要为你的窗口添加一些功能，你需要从对象库中添加一些对象。在屏幕右下角的搜索字段中输入\
    \ `table`。这会筛选出相关对象，你应该能看到 `Table View Controller` 和 `Table View`。将 `Table View`\
    \ 拖拽到视图中，如图 11-11 所示。\n\n    ![A341013_4_En_11_Fig11_HTML.jpg](img/A341013_4_En_11_Fig11_HTML.jpg)\n\
    \n    *图 11-11. 添加 Table View*\n\n3.  现在你有了一个 `Table View`。你需要拉伸 `Table View`\
    \ 以填充你的视图。拖拽 `Table View` 的四个角，使其覆盖整个视图，如图 11-12 所示。\n\n    ![A341013_4_En_11_Fig12_HTML.jpg](img/A341013_4_En_11_Fig12_HTML.jpg)\n\
    \n    *图 11-12. 拉伸 Table View*\n\n4.  要在你的 `Table View` 中创建单元格，你需要添加一个 `UITableViewCell`。你当前搜索\
    \ `table` 的结果应该会在 `Table View` 对象下方显示一个 `Table View Cell`。将一个 `Table View Cell`\
    \ 拖拽到你的表格中。现在你的视图上就有了一个表格和一个单元格，如图 11-13 所示。\n\n    ![A341013_4_En_11_Fig13_HTML.jpg](img/A341013_4_En_11_Fig13_HTML.jpg)\n\
    \n    *图 11-13. 添加 Table View Cell*\n\n5.  选择该单元格，然后在工具区（utilities section）的属性检查器（Attributes\
    \ Inspector）中，将 `Style` 设置为 `Basic`。同时，将 `Identifier` 设置为 `Cell`。当你的 `Table View`\
    \ 包含多种样式的单元格时，需要使用标识符。你需要用唯一的标识符来区分它们。在大多数项目中，你可以将其设置为 `Cell` 而无需过多担心，如图 11-14\
    \ 所示。\n\n    ![A341013_4_En_11_Fig14_HTML.jpg](img/A341013_4_En_11_Fig14_HTML.jpg)\n\
    \n    *图 11-14. 更改单元格的样式和标识符*\n\n6.  使用 `Table View` 时，通常最好将其放入一个 `Navigation\
    \ Controller` 中。你将使用 `Navigation Controller` 来腾出空间，以便在你的 `Table View` 上放置一个“添加”（Add）按钮。要添加\
    \ `Navigation Controller`，请在场景列表（Scene list）中选择你的 `View Controller`，场景列表是故事板左侧显示你的\
    \ `View Controllers` 的窗口（你的 `View Controller` 旁边会有一个黄色图标）。从应用程序菜单中，选择**编辑器（Editor）**\
    \ ➤ **嵌入于（Embed In）** ➤ **导航控制器（Navigation Controller）**，如图 11-15 所示。\n\n    ![A341013_4_En_11_Fig15_HTML.jpg](img/A341013_4_En_11_Fig15_HTML.jpg)\n\
    \n    *图 11-15. 嵌入 Navigation Controller*\n\n7.  现在你的视图顶部会有一个导航栏。接下来你需要在导航栏上添加一个按钮。这种类型的按钮叫做\
    \ `UIBarButtonItem`。在你的对象库中搜索 `bar button`，然后将一个 `Bar Button Item` 拖拽到视图右上角的导航栏上，如图\
    \ 11-16 所示。\n\n    ![A341013_4_En_11_Fig16_HTML.jpg](img/A341013_4_En_11_Fig16_HTML.jpg)\n\
    \n    *图 11-16. 向导航栏添加 Bar Button Item*\n\n8.  选择该 `Bar Button Item`，并将 `System\
    \ Item` 从 `Custom` 更改为 `Add`，如图 11-17 所示。这会将 `Bar Button Item` 的外观从文字 `Item` 更改为一个加号图标。\n\
    \n    ![A341013_4_En_11_Fig17_HTML.jpg](img/A341013_4_En_11_Fig17_HTML.jpg)\n\n\
    \    *图 11-17. 更改 Bar Button Item*\n\n9.  现在你已经创建好了界面，需要将其连接到你的代码。按住 **Control**\
    \ 键，将你的 `Table View` 拖拽到**文档大纲（Document Outline）**中的 `View Controller` 上，如图 11-18\
    \ 所示。\n\n    ![A341013_4_En_11_Fig18_HTML.jpg](img/A341013_4_En_11_Fig18_HTML.jpg)\n"
- fmt: '## Figure 11-18. Connecting the Table View


    1.  A pop-up will appear allowing you to select either the `dataSource` or the
    `delegate`, as shown in Figure [11-19](#A341013_4_En_11_Chapter.html#Fig19). You
    will need to assign both to the View Controller. The order in which you select
    the items does not matter, but you will have to Control-drag the Table View twice.


    ![A341013_4_En_11_Fig19_HTML.jpg](A341013_4_En_11_Fig19_HTML.jpg)


    ## Figure 11-19. Hooking up the Table View


    2.  Now your Table View should be ready to go. You need to hook up your button
    to make it do something. In the top right of your Xcode window, click the Assistant
    Editor button (it looks like two circles). This will open your code on the right
    side and your storyboard on the left side. Now Control-drag your Add button to
    the View Controller code on the right, as shown in Figure [11-20](#A341013_4_En_11_Chapter.html#Fig20).


    ![A341013_4_En_11_Fig20_HTML.jpg](A341013_4_En_11_Fig20_HTML.jpg)


    ## Figure 11-20. Adding an action for your Button object


    3.  It does not matter where you place the Add button in your code as long as
    it is in your class and outside of any methods. It should be after your class
    properties just for organization. When you let go, you will be prompted for the
    type of connection you are creating. Set Connection to Action. Then add a name
    for your new method, such as `addNew`, as shown in Figure [11-21](#A341013_4_En_11_Chapter.html#Fig21).
    Click Connect to finish the connection.


    ![A341013_4_En_11_Fig21_HTML.jpg](A341013_4_En_11_Fig21_HTML.jpg)


    ## Figure 11-21. Changing the type and name of the connection


    4.  You also need to create an outlet for your Table View. Drag your Table View
    from the View Controller scene to the top of the code (just under the class definition,
    as seen in Figure [11-22](#A341013_4_En_11_Chapter.html#Fig22)). Make sure the
    connection is set to Outlet and name the Table View `myTableView`. You will need
    this outlet later to tell your Table View to refresh. Click Connect to finish
    the connection.


    ![A341013_4_En_11_Fig22_HTML.jpg](A341013_4_En_11_Fig22_HTML.jpg)


    ## Figure 11-22. Creating an outlet for the Table View


    The interface is complete now, but you still need to add the code to make the
    interface do something. Go back to the Standard editor (click the list icon to
    the left of the two circles icon in the top right of the Xcode toolbar) and select
    the `ViewController.swift` file from the file list on the left side. Because you
    now have a Table View that you have to worry about, you need to tell your class
    that it can handle a Table View. Change your class declaration at the top of your
    file to the following:


    ```

    class ViewController: UIViewController, UITableViewDelegate, UITableViewDataSource
    {

    ```


    You added `UITableViewDelegate` and `UITableViewDataSource` to your declaration.
    This tells your controller that it can act as a table view delegate and data source.
    These are called protocols. Protocols tell an object that they must implement
    certain methods to interact with other objects. For example, to conform to the
    `UITableViewDataSource` protocol, you need to implement the following method:


    ```

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int

    ```


    Without this method, the Table View will not know how many rows to draw.


    Before continuing, you need to tell your `ViewController.swift` file about Core
    Data. To do this, you add the following line to the top of the file just under
    `import UIKit`:


    ```

    import CoreData

    ```


    You also need to add a managed object context to your `ViewController` class.
    Add the following line right after the `class ViewController` line:


    ```

    var managedObjectContext: NSManagedObjectContext!

    ```


    Now that you have a variable to hold your `NSManagedObjectContext`, you need to
    instantiate it so you can add objects to it. To do this, you need to add the following
    lines to your `override func viewDidLoad()` method:


    ```

    let appDelegate: AppDelegate = UIApplication.shared.delegate as! AppDelegate

    managedObjectContext = appDelegate.persistentContainer.viewContext as NSManagedObjectContext

    ```


    The first line creates a constant that points to your application delegate. The
    second line points your `managedObjectContext` variable to the application delegate’s
    `managedObjectContext`. It is usually a good idea to use the same managed object
    context throughout your app.


    The first new method you are going to add is one to query your database records.
    Call this method `loadBooks`.


    ```

    1 func loadBooks() -> [Book] {

    2     let fetchRequest: NSFetchRequest = Book.fetchRequest()

    3     var result: [Book] = []

    4     do {

    5          result = try managedObjectContext.fetch(fetchRequest)

    6     } catch {

    7          NSLog("My Error: %@", error as NSError)

    8     }

    9     return result

    10 }

    ```


    This code is a little more complex than what you have seen before, so let’s walk
    through it. Line 1 declares a new function called `loadBooks`, which returns an
    array of `Books`. You then return the array once you have it loaded.


    You will now need to add the data source methods for your Table View. These methods
    tell your Table View how many sections there are, how many rows are in each section,
    and what each cell should look like. Add the following code to your `ViewController.swift`
    file:


    ```

    1 func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)
    -> Int {

    2     return loadBooks().count

    3 }


    5 func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)
    -> UITableViewCell {

    6     guard let cell = tableView.dequeueReusableCell(withIdentifier: "Cell") else
    { return UITableViewCell() }

    7     let book: Book = loadBooks()[indexPath.row]

    8     cell.textLabel?.text = book.title

    9     return cell

    10 }

    ```


    In line 2, you call a count on your array of `Book` for the number of rows in
    your Table view. In lines 5 to 9, you create your cell and return it. Line 6 creates
    a cell for you to use. This is standard code for creating a cell. The identifier
    allows you to have more than one type of cell in a Table View, but that is more
    complex. Line 7 grabs your `Book` object from your `loadBooks()` array. Line 8
    assigns the book title to your `textLabel` in the cell. The `textLabel` is the
    default label in the cell. This is all you need to do to display the results of
    your `loadBooks` method in the Table view. You still have one problem. You do
    not have any books in your database yet.


    To fix this issue, you will add code to the `addNew` method that you created earlier.
    Add the following code inside the `addNew` method you created:


    ```

    1     @IBAction func addNew(_ sender: Any) {

    2         let book: Book = NSEntityDescription.insertNewObject(forEntityName:
    "Book", into: managedObjectContext) as! Book

    3         book.title = "My Book" + String(loadBooks().count)

    4         do {

    5             try managedObjectContext.save()

    6         } catch let error as NSError {

    7             NSLog("My Error: %@", error)

    8         }

    9         myTableView.reloadData()

    10     }

    ```


    Line 2 creates a new `Book` object for your book in the database from the `Entity`
    name and inserts that object into the `managedObjectContext` you created before.
    Remember that once the object is inserted into the managed object context, its
    changes are tracked, and it can be saved. Line 3 sets the book title to `My Book`
    and adds the number of items in the array. Obviously, in real life, you would
    want to set this to a name either given by the user or from some other list. Lines
    4-8 save the managed object context.'
