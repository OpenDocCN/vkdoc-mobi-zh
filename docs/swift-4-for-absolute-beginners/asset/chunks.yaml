- fmt: '# Required Software, Materials, and Equipment


    One of the great things about developing iOS apps is just about everything is
    free to get develop your app.


    - `Xcode`

    - `Swift`

    - `macOS` 10.12.6 or higher

    - `iOS SDK`

    - `iOS Simulator`


    All you need to get started is a Mac and knowledge of where to download everything.
    We will cover this.


    ## Operating System and IDE


    Developing iOS apps you have to use `Xcode` on a Mac. You can download `Xcode`
    for free from the Mac App Store. (See Figure [1](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig1))


    ![A341013_4_En_BookFrontmatter_Fig1_HTML.jpg](A341013_4_En_BookFrontmatter_Fig1_HTML.jpg)


    Figure 1. Downloading `Xcode` from the Mac App Store


    ### Software Development Kits


    You will need to register as a developer. You can do this for free at [`https://developer.apple.com/ios`](https://developer.apple.com/ios)
    (see Figure [2](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig2))


    When you are ready to upload your app to the App Store, you will need to pay $99/year
    in order to publish it.


    ![A341013_4_En_BookFrontmatter_Fig2_HTML.jpg](A341013_4_En_BookFrontmatter_Fig2_HTML.jpg)


    Figure 2. Apple’s Developer Website (editor, caption not sure why I can’t apply
    that style)


    ### Dual Monitors (editor not sure why this “Strong” format is doing this)


    We recommend developers have a second monitor connected to their computer. It
    is great to step through your code and watch your output window and `iOS Simulator`
    at the same time on dual independent monitors.


    Apple hardware makes this easy. Just plug your second monitor into the port of
    any Mac, with the correct adapter of course, and you have two monitors working
    independently of one another. See Figure [3](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig3).
    Note that dual monitors are not required. You will just have to organize your
    open windows to fit on your screen if you don’t.


    ![A341013_4_En_BookFrontmatter_Fig3_HTML.jpg](A341013_4_En_BookFrontmatter_Fig3_HTML.jpg)


    Figure 3. Arranging Dual Monitors on a Mac


    ## Free Live Webinars, Q&A, and YouTube Videos


    Nearly every week, we have live webinars and discuss a topic from the book or
    a timely item of interest. These webinars are free, and you can register for them
    at [`http://www.xcelme.com/latest-videos/`](http://www.xcelme.com/latest-videos/).
    See Figure [4](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig4).


    ![A341013_4_En_BookFrontmatter_Fig4_HTML.jpg](A341013_4_En_BookFrontmatter_Fig4_HTML.jpg)


    Figure 4. Swift Webinars


    At the end of the webinars, we do a Q&A. You can ask a question on the topic discussed
    or any topic in the book.


    Additionally, all these webinars are recorded and available on YouTube. Make sure
    you subscribe to the YouTube channel so you are notified when new recordings are
    uploaded.


    ### Free Book Forum


    We have developed an online forum for this book at [`http://forum.xcelme.com`](http://forum.xcelme.com),
    where you can ask questions while you are learning Swift and get answers from
    the authors. You will also find answers to the exercises and additional exercises
    to help you learn. See Figure [5](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig5).


    ![A341013_4_En_BookFrontmatter_Fig5_HTML.jpg](A341013_4_En_BookFrontmatter_Fig5_HTML.jpg)


    Figure 5.'
  raw: '## Required Software, Materials, and Equipment


    One of the great things about developing iOS apps is just about everything is
    free to get develop your app.


    *   Xcode

    *   Swift

    *   macOS 10.12.6 or higher

    *   iOS SDK

    *   iOS Simulator


    All you need to get started is a Mac and knowledge of where to download everything.
    We will cover this.


    ## Operating System and IDE


    Developing iOS apps you have to use Xcode on a Mac. You can download Xcode for
    free from the Mac App Store. (See Figure [1](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig1)
    )


    ![A341013_4_En_BookFrontmatter_Fig1_HTML.jpg](A341013_4_En_BookFrontmatter_Fig1_HTML.jpg)


    Figure 1.


    Downloading Xcode from the Mac App Store


    ### Software Development Kits


    You will need to register as a developer. You can do this for free at [`https://developer.apple.com/ios`](https://developer.apple.com/ios)
    (see Figure [2](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig2) )


    When you are ready to upload your app to the App Store, you will need to pay $99/year
    in order to publish it.


    ![A341013_4_En_BookFrontmatter_Fig2_HTML.jpg](A341013_4_En_BookFrontmatter_Fig2_HTML.jpg)


    Figure 2.


    Apple’s Developer Website (editor, caption not sure why I can’t apply that style)


    ### Dual Monitors (editor not sure why this “Strong” format is doing this)


    We recommend developers have a second monitor connected to their computer. It
    is great to step through your code and watch your output window and iOS simulator
    at the same time on dual independent monitors.


    Apple hardware makes this easy. Just plug your second monitor into the the port
    of any Mac, with the correct adapter of course, and you have two monitors working
    independently of one another. See Figure [3](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig3)
    . Note that dual monitors are not required. You will just have to organize your
    open windows to fit on your screen if you don’t.


    ![A341013_4_En_BookFrontmatter_Fig3_HTML.jpg](A341013_4_En_BookFrontmatter_Fig3_HTML.jpg)


    Figure 3.


    Arranging Dual Monitors on a Mac


    ## Free Live Webinars, Q&A, and YouTube Videos


    Nearly every week, we have live webinars and discuss a topic from the book or
    a timely item of interest. These webinars are free, and you can register for them
    at [`http://www.xcelme.com/latest-videos/`](http://www.xcelme.com/latest-videos/)
    . See Figure [4](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig4) .


    ![A341013_4_En_BookFrontmatter_Fig4_HTML.jpg](A341013_4_En_BookFrontmatter_Fig4_HTML.jpg)


    Figure 4.


    Swift Webinars


    At the end of the webinars, we do a Q&A. You can ask a question on the topic discussed
    or any topic in the book.


    Additionally, all these webinars are recorded and available on YouTube. Make sure
    you subscribe to the YouTube channel so you are notified when new recordings are
    uploaded.


    ### Free Book Forum


    We have developed an online forum for this book at [`http://forum.xcelme.com`](http://forum.xcelme.com)
    , where you can ask questions while you are learning Swift and get answers from
    the authors. You will also find answers to the exercises and additional exercises
    to help you learn. See Figure [5](#A341013_4_En_BookFrontmatter_OnlinePDF.html#Fig5)
    .


    ![A341013_4_En_BookFrontmatter_Fig5_HTML.jpg](A341013_4_En_BookFrontmatter_Fig5_HTML.jpg)


