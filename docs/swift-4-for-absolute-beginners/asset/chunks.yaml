    In the preceding example, a class called `HelloWorld` is being defined. This class
    has only one method defined: `logMessage`. What do all these strange symbols mean?
    Using the line numbers as a reference, you can review this code line by line.


    Line 1 contains a compiler directive, `import Foundation`. For this little program
    to know about certain other objects, you need to have the compiler read other
    interface files. In this case, the `Foundation` file defines the objects and interfaces
    to the Foundation framework. This framework contains the definition of most non-user-interface
    base classes of the iOS and macOS systems. You will not be using any Foundation
    framework–specific objects in this example, but it is a default part of any new
    Swift file.


    The actual start of the object is on line 4, as follows:


    ```

    class HelloWorld {

    ```


    `HelloWorld` is the class. If you wanted `HelloWorld` to be a subclass of a logging
    class you had created, such as `LogFile`, you would change the declaration as
    follows:


    ```

    class HelloWorld: LogFile  {

    ```


    Line 6 contains a method definition for this object, as follows:


    ```

    func logMessage() {

    ```


    When you’re defining a method, you must decide whether you want the method to
    be a type or an instance method. In the case of the `HelloWorld` object, you are
    using the default method type, which is an instance. This method can only be used
    after an object is created. If the word class is added before the `func`, the
    method can be used before an object is created, but you will not have access to
    properties in the object. If you changed `logMessage` to a type method, it would
    be as follows:


    ```

    class func logMessage() {

    ```


    Lines 7 and 8 contain the body of the method. You learned about the details of
    the statements earlier in the chapter.


    That’s the complete description of class `HelloWorld`; there’s not a whole lot
    here. More complicated objects simply have more methods and more properties.


    But wait, there is more. Now that you have a new Swift class defined, how is it
    used? Figure [6-3](#A341013_4_En_6_Chapter.html#Fig3) shows another piece of code
    that uses the newly created class.


    ![A341013_4_En_6_Fig3_HTML.jpg](A341013_4_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Calling a Swift method


    The first line defines a constant called `myHelloWorld`. It then assigns the constant
    to an instance of the `HelloWorld` class. The second line simply calls the `logMessage`
    method of the `myHelloWorld` object. Those who have spent time in Objective-C
    will quickly see how much shorter and efficient both the class declaration and
    the object creation are in Swift.


    Note


    Instantiation makes a class a real object in the computer’s memory. A class by
    itself is not really usable until there is an instance of it. Using the SUV example,
    an SUV means nothing until a factory builds one (instantiates the class). Only
    then can the SUV be used.


    Method calls can also accept multiple arguments. Consider, for example, `myCarObject.switchRadioBandTo(FM,
    104.7)` . The method here would be `switchRadioBandTo`. The two arguments are
    contained in the parentheses. Being consistent in naming methods is critical.


    ## Writing Another Program in Xcode


    When you first open Xcode, you’ll will be presented with a Welcome to Xcode screen
    . This screen provides some nice shortcuts to access recently used Xcode projects.
    Until you are more comfortable with Xcode, keep the “Show this window when Xcode
    launches” check box selected.'
  trans: '

    # 在 Swift 中实现对象


    Swift 从底层设计之初就具备面向对象的特性。它融合了 Objective-C 的精华，同时摆脱了与 C 语言兼容的束缚。此外，它还吸纳了脚本语言的一些最佳特性。以下是使
    Swift 成为面向对象语言的一些核心概念。如果其中某些术语看起来不够熟悉，不必担心；这些内容将在后续章节（第 7 章和第 8 章）中介绍基础知识。


    - 几乎所有内容都是对象。

    - 对象包含实例变量。

    - 对象和实例变量具有定义的作用域。

    - 类隐藏了对象的实现细节。


    **注意：** 如你在第 5 章所见，术语“类”通常用于表示对象的定义或类型。对象是根据类创建的。例如，SUV 是车辆的一个类别。类就像一种蓝图。工厂按照蓝图建造
    SUV，最终产出的是人们驾驶的 SUV 对象。你无法驾驶一个类，但可以驾驶根据类构建出的对象。


    那么，这些概念如何应用到 Swift 中呢？Swift 在类的实现上非常灵活。


    **注意：** 尽管在 Swift 中，单个文件可以包含多个不同的类，但程序员通常会将代码分离到不同文件中，以便于访问。


    让我们看看一个名为 `HelloWorld` 的 Swift 类的完整定义（图 6-2）。


    ![A341013_4_En_6_Fig2_HTML.jpg](img/A341013_4_En_6_Fig2_HTML.jpg)


    **图 6-2.** HelloWorld 类


    在上述示例中，定义了一个名为 `HelloWorld` 的类。这个类只定义了一个方法：`logMessage`。这些奇怪的符号代表什么意思？我们可以参照行号，逐行审查这段代码。


    第 1 行包含一个编译器指令：`import Foundation`。为了让这个小程序能识别某些其他对象，你需要让编译器读取其他接口文件。在本例中，`Foundation`
    文件定义了 Foundation 框架中的对象和接口。这个框架包含了 iOS 和 macOS 系统中大多数非用户界面的基类定义。虽然在这个示例中你不会用到任何
    Foundation 框架特有的对象，但它是任何新 Swift 文件的默认组成部分。


    对象的实际定义从第 4 行开始，如下所示：


    ```

    class HelloWorld {

    ```


    `HelloWorld` 就是类名。如果你希望 `HelloWorld` 是你创建的某个日志类（例如 `LogFile`）的子类，可以将声明修改如下：


    ```

    class HelloWorld: LogFile  {

    ```


    第 6 行包含这个对象的方法定义，如下所示：


    ```

    func logMessage() {

    ```


    在定义方法时，你必须决定该方法是一个类型方法还是一个实例方法。对于 `HelloWorld` 对象，你使用的是默认的方法类型，即实例方法。这个方法只能在对象创建后被调用。如果在
    `func` 前加上关键字 `class`，该方法可以在对象创建前被调用，但此时你将无法访问对象中的属性。如果你将 `logMessage` 改为类型方法，写法如下：


    ```

    class func logMessage() {

    ```


    第 7 行和第 8 行包含方法的具体实现。你已经在本章前面部分了解过这些语句的细节。


    这就是 `HelloWorld` 类的完整描述；内容并不多。更复杂的对象只是拥有更多的方法和属性而已。


    但不止于此。既然你已经定义了一个新的 Swift 类，那么该如何使用它呢？图 6-3 展示了另一段使用这个新创建类的代码。


    ![A341013_4_En_6_Fig3_HTML.jpg](img/A341013_4_En_6_Fig3_HTML.jpg)


    **图 6-3.** 调用 Swift 方法


    第一行定义了一个名为 `myHelloWorld` 的常量，然后将该常量赋值为 `HelloWorld` 类的一个实例。第二行简单调用了 `myHelloWorld`
    对象的 `logMessage` 方法。那些熟悉 Objective-C 的人会很快发现，在 Swift 中，无论是类声明还是对象创建都更加简洁高效。


    **注意：** 实例化过程使一个类成为计算机内存中的真实对象。类本身在创建实例之前是无法真正使用的。以 SUV 为例，SUV 本身毫无意义，直到工厂制造出一辆（即实例化该类），这辆
    SUV 才能被使用。


    方法调用也可以接受多个参数。例如，考虑 `myCarObject.switchRadioBandTo(FM, 104.7)`。这里的方法名是 `switchRadioBandTo`。两个参数包含在括号内。保持方法命名的一致性至关重要。


    ## 在 Xcode 中编写另一个程序


    当你首次打开 Xcode 时，会看到一个“Welcome to Xcode”欢迎界面。这个界面提供了一些便捷的快捷方式，用于访问最近使用过的 Xcode 项目。在你对
    Xcode 更加熟悉之前，建议保持“Show this window when Xcode launches”（在 Xcode 启动时显示此窗口）复选框处于选中状态。

    '
- fmt: '### Creating the Project


    You are going to start a new project, so click the “Create a new Xcode project”
    icon. Whenever you want to start a new iOS or macOS application, library, or anything
    else, use this icon. Once a project has been started and saved, the project will
    appear in the Recent list on the right of the display.


    For this Xcode project, you will choose something simple. Make sure the iOS Application
    is selected. Then select Single View Application, as shown in Figure [6-4](#A341013_4_En_6_Chapter.html#Fig4).
    Then simply click the Next button.


    ![A341013_4_En_6_Fig4_HTML.jpg](A341013_4_En_6_Fig4_HTML.jpg)


    Figure 6-4. Choosing a new project from a list of templates


    There are several types of templates. These templates make it easier to start
    a project from scratch in that they provide a starting point by automatically
    creating simple source files.


    Once you’ve chosen the template and clicked the Next button, Xcode presents you
    with a dialog box asking for the project’s name and some other information, as
    shown in Figure [6-5](#A341013_4_En_6_Chapter.html#Fig5). Type a product name
    of `Chapter6`. The organization identifier needs to have some value, so we used
    `com.inno`. If you are planning on running this app on an actual iOS device or
    submitting it to the App store, you will need to select your team from the drop-down.
    If you do not select it now, it can be added to the project later.


    ![A341013_4_En_6_Fig5_HTML.jpg](A341013_4_En_6_Fig5_HTML.jpg)


    Figure 6-5. Setting up the product name, company, and type


    Once you’ve supplied all the information, click the Next button. Xcode will ask
    you where to save the project. You can save it anywhere, but the desktop is a
    good choice because it’s always visible.


    ![A341013_4_En_6_Fig6_HTML.jpg](A341013_4_En_6_Fig6_HTML.jpg)


    Figure 6-6. The Xcode 9 main screen


    Once you’ve picked where to save the project, the main Xcode screen will appear
    (see Figure [6-6](#A341013_4_En_6_Chapter.html#Fig6)). In the leftmost pane is
    the list of source files. The right two-thirds of the screen is dedicated to the
    context-sensitive editor. Click a source file, and the editor will show the source
    code. Clicking a `.storyboard` file will show the Screen Interface editor.


    The first app is going to be simple. This iPhone app will contain a button. When
    the button is clicked, your name will appear on the screen. So, let’s start by
    first looking more closely at some of the stub source code that Xcode built for
    you. The nice thing about Xcode is that it will create a stub application that
    will execute without any modification. Before you start adding code, let’s look
    at the main toolbar of Xcode, as shown in Figure [6-7](#A341013_4_En_6_Chapter.html#Fig7).


    ![A341013_4_En_6_Fig7_HTML.jpg](A341013_4_En_6_Fig7_HTML.jpg)


    Figure 6-7. The Xcode 8 toolbar


    At first glance, there are three distinct areas of the toolbar. The left area
    is used to run and debug the application. The middle area displays status as a
    summary of compiler errors and warnings. The far-right area contains a series
    of buttons that customize the editing view.


    As shown in Figure [6-8](#A341013_4_En_6_Chapter.html#Fig8), the left portion
    of the toolbar contains a Play button that will compile and run the application.
    If the application is running, the Stop button will not be grayed out. Since it’s
    grayed out, you know the application is not running. The scheme selection can
    be left alone for now. Schemes will be discussed in more detail in Chapter [13](#A341013_4_En_13_Chapter.html).


    ![A341013_4_En_6_Fig8_HTML.jpg](A341013_4_En_6_Fig8_HTML.jpg)


    Figure 6-8. Close-up of the left portion of the Xcode toolbar


    The right side of the Xcode toolbar contains buttons that change the editor. The
    three buttons represent the Standard editor (selected), the Assistant editor,
    and the Version editor. For now, just click the Standard editor button, as shown
    in Figure [6-9](#A341013_4_En_6_Chapter.html#Fig9).


    ![A341013_4_En_6_Fig9_HTML.jpg](A341013_4_En_6_Fig9_HTML.jpg)


    Figure 6-9. Close-up of the right portion of the Xcode toolbar


    Next to the editor choices are a set of View buttons. These buttons can be toggled
    on and off. For example, the one chosen in Figure [6-10](#A341013_4_En_6_Chapter.html#Fig10)
    represents the current view shown in Figure [6-7](#A341013_4_En_6_Chapter.html#Fig7),
    a list of the program files on the left third of the screen, the main editor in
    the middle third, and the Utilities in the right portion of the screen. Any combination,
    or none, can be chosen to help customize the main workspace window. The last button
    opens the Utilities area. Chapter [13](#A341013_4_En_13_Chapter.html) discusses
    this button. For now, let’s get back to your first iPhone app.


    Click the `ViewController.swift` file, as shown in Figure [6-10](#A341013_4_En_6_Chapter.html#Fig10).
    The editor shows some Swift code that defines a `ViewController` class.


    ![A341013_4_En_6_Fig10_HTML.jpg](A341013_4_En_6_Fig10_HTML.jpg)


    Figure 6-10. Looking at the source code in the Xcode editor


    You will notice two functions in the code. `viewDidLoad` is called immediately
    after a view is loaded and can be used for setting up the view. This is a good
    place to put code that sets up labels, buttons, colors, and so on. `didReceiveMemoryWarning`
    is called when your application is getting low on memory. You can use this function
    to decrease the amount of memory required by your application.


    > **Note**

    > For now, you’re simply going to add a few lines of code and see what they do.
    It’s not expected that you understand what this code means right now. What’s important
    is simply going through the motions to become more familiar with Xcode. Chapter
    [7](#A341013_4_En_7_Chapter.html) goes into more depth about what makes up a Swift
    program, and Chapter [10](#A341013_4_En_10_Chapter.html) goes into more depth
    about building an iPhone interface.


    Next, you’ll add a few lines of code into this file, as shown in Figure [6-11](#A341013_4_En_6_Chapter.html#Fig11).
    Line 13 defines a label on the screen where you can put some text. Line 15 defines
    the method `showName`. You’ll be calling this method in order to populate the
    iPhone label. A label is nothing more than an area on the screen where you can
    put some text information.


    > **Caution**

    > Type the code exactly as shown in the example, including case. For instance,
    `UILabel` can’t be `uilabel` or `UILABEL`. Swift is a case-sensitive language,
    so `UILabel` is completely different from `uilabel`.


    ![A341013_4_En_6_Fig11_HTML.jpg](A341013_4_En_6_Fig11_HTML.jpg)


    Figure 6-11. Code added to the ViewController.swift file


    You will notice that the code you added has `@IBOutlet` and `@IBAction` in front
    of them. These attributes are necessary when connecting objects with the interface
    designer. `@IBOutlet` allows you to control an interface object with code. `@IBAction`
    allows you to execute code when something happens in the interface such as tapping
    a button.


    > **Note**

    > `IBOutlet` and `IBAction` both start with `IB`, which is an acronym from Interface
    Builder. Interface Builder is the tool used by NeXT and then Apple for building
    user interfaces.


    You now have the necessary code in place, but you don’t yet have an interface
    on the device. Next, you’re going to edit the interface and add two interface
    objects to your app.


    To edit the iPhone’s interface, you need to click the `Main.storyboard` file once.
    The `.storyboard` file contains all the information about a single window or view.
    Xcode 9 also supports `.xib` (pronounced zib) files.


    > **Note**

    > Each `.xib` file represents one screen on an iPhone or iPad. Apps that have
    multiple views will have multiple `.xib` files, but many different views can be
    stored in each storyboard file.


    You will use Xcode’s interface editor to connect a UI object, such as a Label
    object, to the code you just created. Connecting is as easy as clicking and dragging.'
