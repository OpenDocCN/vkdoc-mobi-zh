    next chapter in Apple’s history. This watch not only handles phone calls and text
    messages, but it also assesses the wearer’s health by tracking heart rate and
    exercise. At the same time, Apple announced WatchKit, a framework designed for
    developing apps for the Apple Watch. WatchKit will be very familiar to developers
    already familiar with UIKit.


    Initially, the Apple Watch had some serious limitations with development. The
    watch acted as an additional screen for an iPhone app. This required the watch
    to be close to the phone to function and also caused apps to run slowly. In June
    2015, Apple announced watchOS 2.0. This new update included many new features,
    but the biggest one for developers was the ability to create apps that had code
    that ran on the Apple Watch instead of on the phone. Developers were able to create
    stand-alone apps that performed much better and were more responsive. Now, Apple
    has released watchOS 4.0 with even more developer improvements.


    ## Considerations When Creating a watchOS App


    One of the great things about developing for watchOS is that all of the development
    is done in Swift or Objective-C, just like with other iOS devices. The Apple Watch
    does have some different things that you need to consider before you jump into
    development.


    *   The Apple Watch screen is very small. You are limited to 38mm or 42mm, depending
    on the size of the watch. This means you will not have a lot of space for unnecessary
    UI elements. Your interface will need to be compact and well organized. Also,
    due to the two sizes being close in size, you have to create one interface and
    have it look good on either size.

    *   Sharing data between the phone and the watch requires some planning. With
    watchOS 3.0 and now 4.0, Apple has made it even easier to share data. Primarily,
    Apple has enhanced the `WCSession` class. The use of this class is beyond the
    scope of this book.

    *   WatchKit for watchOS 4.0 provides many different ways to interact with users
    not only through apps, but also through glances, actionable notifications, and
    complications. Well-written apps can take advantage of multiple interactions where
    it makes sense. These interactions are beyond the scope of this book.'
  trans: "\n`numberOfSectionsInTableView`  \n`numberOfRowsInSection`  \n`cellForRowAtIndexPath`\n\
    \n最后，通过调用 `popToRootViewController()` 将 `DetailViewController` 从导航栈中弹出。从导航栈中弹出视图意味着该视图被移除，类似于点击返回按钮。\n\
    \n函数 `deleteBook()` 从 `bookStore` 数组中移除书籍。首先，确定在 `tableView` 中选中的是哪一行，然后使用该索引通过调用\
    \ `remove(at:)` 来删除数组中的书籍，如第 106 行所示。\n\n函数 `editBook()` 允许用户编辑 `bookStore` 数组中的现有书籍。为此，该函数会在数组中将选中的行处的书籍替换为编辑后的版本，如第\
    \ 114 行所示。\n\n现在，从编辑按钮添加一个 Show Segue 到 `AddBookViewController`，如图 14-17 所示。\n\
    \n![A341013_4_En_14_Fig17_HTML.jpg](img/A341013_4_En_14_Fig17_HTML.jpg)  \n图 14-17.\
    \ 添加编辑 Show Segue\n\n选中刚创建的 Segue，选择属性检查器，并将标识符命名为 `editDetail`。参见图 14-18。\n\n\
    ![A341013_4_En_14_Fig18_HTML.jpg](img/A341013_4_En_14_Fig18_HTML.jpg)  \n图 14-18.\
    \ 命名 Segue 的标识符\n\n在 `DetailViewController` 中，在 `configureView()` 方法之前添加 `prepare(for:sender:)`\
    \ 方法，如代码清单 14-9 所示。\n\n```\n23    override func prepare(for segue: UIStoryboardSegue,\
    \ sender: Any?) {\n24        if segue.identifier == \"editDetail\" {\n25     \
    \       if let vc = segue.destination as? AddBookViewController {\n26        \
    \        vc.delegate = delegate\n27                vc.editBook = true\n28    \
    \            vc.book = myBook\n29            }\n30        }\n31    }\n```\n\n\
    代码清单 14-9. 添加 `prepareForSegue` 方法\n\n最后，修改 `DetailViewController` 中的 `configureView()`\
    \ 函数，以正确填充 Pages 和 Read 开关的输出口，如代码清单 14-10 所示。\n\n```\n33    func configureView()\
    \ {\n34        if let detail = self.detailItem {\n35            myBook = detail\n\
    36            titleLabel.text = myBook.title\n37            authorLabel.text =\
    \ myBook.author\n38            descriptionTextView.text = myBook.description\n\
    39            pagesLabel.text = String(myBook.pages)\n40            if myBook.readThisBook\
    \ {\n41                readSwitch.isOn = true\n42            }\n43           \
    \ else {\n44                readSwitch.isOn = false\n45            }\n46     \
    \   }\n47    }\n```\n\n代码清单 14-10. 修改 `configureView` 函数\n\n## 应用总结\n\n编译并运行应用。建议在\
    \ `delegate` 函数处设置断点以观察程序流程。这是一个很好的应用示例，展示了如何利用委托将信息从一个视图传递到另一个视图。\n\n此外，你还可以通过使用\
    \ Core Data 或 `UserDefaults` 为应用添加数据持久化功能。\n\n## 练习\n\n- 参考原始程序，向书店中添加更多书籍。\n\
    - 增强 `Book` 类，使其能够存储另一个属性——例如价格或 ISBN。\n- 使用 Core Data 或 `UserDefaults` 为应用添加持久化功能。\n\
    \n# 15. Apple Watch 与 WatchKit\n\n2014 年 9 月，苹果公司发布了 Apple Watch，并将其视为苹果历史上的下一个篇章。这款手表不仅能处理电话和短信，还能通过跟踪心率和运动来评估佩戴者的健康状况。与此同时，苹果还发布了\
    \ WatchKit，这是一个专为开发 Apple Watch 应用而设计的框架。对于熟悉 UIKit 的开发者来说，WatchKit 会让他们感到非常熟悉。\n\
    \n最初，Apple Watch 在开发方面存在一些严重的限制。手表仅作为 iPhone 应用的附加屏幕。这要求手表靠近手机才能运行，并且导致应用运行缓慢。2015\
    \ 年 6 月，苹果发布了 watchOS 2.0。这次更新包含了许多新功能，但对开发者而言，最大的进步是能够创建代码在 Apple Watch 上而非手机上运行的应用。开发者能够创建性能更好、响应更快的独立应用。现在，苹果已经发布了\
    \ watchOS 4.0，为开发者带来了更多改进。\n\n## 创建 watchOS 应用时的注意事项\n\n为 watchOS 进行开发的一大优势是，所有开发工作都使用\
    \ Swift 或 Objective-C 完成，与其他 iOS 设备一样。不过，在开始开发之前，你需要考虑 Apple Watch 的一些特殊之处。\n\n\
    - Apple Watch 的屏幕非常小。根据手表尺寸的不同，仅限于 38 毫米或 42 毫米。这意味着你没有太多空间放置不必要的 UI 元素。你的界面需要紧凑且组织良好。此外，由于这两种尺寸很接近，你需要创建一个界面，并确保在两种尺寸下都有良好的显示效果。\n\
    - 在手机和手表之间共享数据需要提前规划。随着 watchOS 3.0 及现在的 4.0，苹果使数据共享变得更加容易。主要是增强了 `WCSession`\
    \ 类。该类别的使用超出了本书的范围。\n- 适用于 watchOS 4.0 的 WatchKit 提供了多种与用户交互的方式，不仅通过应用，还包括速览、可操作通知和复杂功能。编写良好的应用可以在合适的场景下利用多种交互方式。这些交互方式超出了本书的范围。\n"
- fmt: '# Creating an Apple Watch App


    The first step is to create a new project in `Xcode`. At the top, select Application
    under the watchOS header as the project type. Then select iOS App with WatchKit
    App, as shown in Figure [15-1](#A341013_4_En_15_Chapter.html#Fig1).


    ![A341013_4_En_15_Fig1_HTML.jpg](A341013_4_En_15_Fig1_HTML.jpg)


    Figure 15-1. Creating the watchOS app


    Next, you will be given the option of naming your project. We will call the one
    in this chapter `BookStore`. You will also notice that a watchOS app has different
    options from a standard iOS app. We will not be adding a notification or complication
    scene to this app, so make sure they are all unchecked, as shown in Figure [15-2](#A341013_4_En_15_Chapter.html#Fig2).


    **Note**: `WatchKit` provides additional interaction types that not available
    in iOS apps. Glances are quick looks into your app. For example, a bookstore app
    might have a glance that shows the best sellers. Glances use a special interface
    on the watch. Complications allow your app to provide simple information on the
    watch face itself.


    ![A341013_4_En_15_Fig2_HTML.jpg](A341013_4_En_15_Fig2_HTML.jpg)


    Figure 15-2. watchOS App options


    `Xcode` will then prompt you to save your project. Once you’ve saved it, you will
    be presented with your new project. On the left side, you will notice two additional
    targets in your project. One is the `BookStore WatchKit App`, which contains the
    interface (storyboard and assets) for your app. The second new target is the `BookStore
    WatchKit Extension`. This will contain all of the code for your app to run on
    watchOS. See Figure [15-3](#A341013_4_En_15_Chapter.html#Fig3).


    ![A341013_4_En_15_Fig3_HTML.jpg](A341013_4_En_15_Fig3_HTML.jpg)


    Figure 15-3. New WatchOS targets


    Click the `Interface.storyboard` in the `BookStore WatchKit App` target, and you
    should see a screen similar to Figure [15-4](#A341013_4_En_15_Chapter.html#Fig4).
    This is your empty watchOS app storyboard. You will notice the size is significantly
    smaller than a standard iOS storyboard.


    ![A341013_4_En_15_Fig4_HTML.jpg](A341013_4_En_15_Fig4_HTML.jpg)


    Figure 15-4. Interface storyboard


    Since you are going to create a list of books for the watchOS app, you need to
    add a table to the storyboard. On the bottom right, search for table and drag
    the table into the Interface Controller Scene, as shown in Figure [15-5](#A341013_4_En_15_Chapter.html#Fig5).


    ![A341013_4_En_15_Fig5_HTML.jpg](A341013_4_En_15_Fig5_HTML.jpg)


    Figure 15-5. Adding a table


    `Xcode` will now give you a Table Row as part of the table. This is similar to
    the prototype rows you used for creating table views in your iOS apps. You need
    to create a class to control it, but for now, you will add a label to it. Search
    for a label in the Object Library and drag one onto the row. See Figure [15-6](#A341013_4_En_15_Chapter.html#Fig6).


    ![A341013_4_En_15_Fig6_HTML.jpg](A341013_4_En_15_Fig6_HTML.jpg)


    Figure 15-6. Adding a label to the table row


    By default, the label will be located in the top-left corner of the Table Row.
    Check the Attribute Inspector to make sure the height and width can grow in size
    to fit the content (see Figure [15-7](#A341013_4_En_15_Chapter.html#Fig7)). This
    will help ensure that your app runs well on both sizes of Apple Watches.


    ![A341013_4_En_15_Fig7_HTML.jpg](A341013_4_En_15_Fig7_HTML.jpg)


    Figure 15-7. Allowing the label to grow


    Now the label will expand to fit the entire row. By default, however, the label
    will only show one line of text. Since you are adding book titles, you may need
    multiple lines to fit all of the text you want to add. With the label selected,
    look in the Attributes Inspector on the right side. Find the `Lines` attribute
    and set it to 0, as shown in Figure [15-8](#A341013_4_En_15_Chapter.html#Fig8).
    Setting the number of lines to 0 tells `Xcode` that it can use as many lines as
    needed.


    ![A341013_4_En_15_Fig8_HTML.jpg](A341013_4_En_15_Fig8_HTML.jpg)


    Figure 15-8. Setting the `Lines` attribute'
