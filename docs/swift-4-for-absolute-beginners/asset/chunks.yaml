  trans: '

    ### 创建项目


    你需要启动一个新项目，因此请点击“Create a new Xcode project”（创建新 Xcode 项目）图标。无论何时你想开始一个新的 iOS
    或 macOS 应用程序、库或其他任何内容，请使用此图标。一旦项目创建并保存后，该项目将出现在显示器右侧的“Recent”（最近项目）列表中。


    对于这个 Xcode 项目，你将选择一个简单的模板。请确保选中 **iOS Application**（iOS 应用程序）。然后选择 **Single View
    Application**（单视图应用程序），如图 6-4 所示。接着点击 “Next”（下一步）按钮即可。


    ![A341013_4_En_6_Fig4_HTML.jpg](img/A341013_4_En_6_Fig4_HTML.jpg)


    图 6-4. 从模板列表中选择新项目


    这里有几种类型的模板。这些模板通过自动创建简单的源文件来提供一个起点，从而让从零开始创建项目变得更加容易。


    一旦你选择了模板并点击 “Next”（下一步）按钮后，Xcode 会弹出一个对话框，询问项目的名称及其他一些信息，如图 6-5 所示。输入产品名称为 `Chapter6`。组织标识符需要填写一些内容，因此我们使用了
    `com.inno`。如果你计划在实际的 iOS 设备上运行此应用或提交至 App Store，你需要从下拉菜单中选择你的团队。如果现在不选择，也可以在以后将其添加到项目中。


    ![A341013_4_En_6_Fig5_HTML.jpg](img/A341013_4_En_6_Fig5_HTML.jpg)


    图 6-5. 设置产品名称、公司和类型


    提供所有信息后，点击 “Next”（下一步）按钮。Xcode 会询问你保存项目的位置。你可以将其保存在任何地方，但桌面是一个不错的选择，因为它始终可见。


    ![A341013_4_En_6_Fig6_HTML.jpg](img/A341013_4_En_6_Fig6_HTML.jpg)


    图 6-6. Xcode 9 主屏幕


    一旦你选择了保存项目的位置，Xcode 主屏幕就会出现（见图 6-6）。最左侧的窗格是源文件列表。右侧三分之二的屏幕是上下文相关的编辑器。点击一个源文件，编辑器会显示源代码。点击
    `.storyboard` 文件则会显示屏幕界面编辑器。


    第一个应用将会很简单。这个 iPhone 应用将包含一个按钮。当按钮被点击时，你的名字会显示在屏幕上。那么，让我们先更仔细地看一下 Xcode 为你生成的一些存根源代码。Xcode
    的一个好处是，它会创建一个无需任何修改即可执行的存根应用程序。在开始添加代码之前，我们先来看看 Xcode 的主工具栏，如图 6-7 所示。


    ![A341013_4_En_6_Fig7_HTML.jpg](img/A341013_4_En_6_Fig7_HTML.jpg)


    图 6-7. Xcode 8 工具栏


    乍一看，工具栏有三个不同的区域。左侧区域用于运行和调试应用程序。中间区域显示状态，作为编译器错误和警告的摘要。最右侧区域包含一系列用于自定义编辑视图的按钮。


    如图 6-8 所示，工具栏的左侧部分包含一个播放按钮，用于编译和运行应用程序。如果应用程序正在运行，停止按钮将不会变灰。由于它现在是灰色的，说明应用程序没有在运行。方案选择暂时可以保持不动。方案将在第
    13 章中详细讨论。


    ![A341013_4_En_6_Fig8_HTML.jpg](img/A341013_4_En_6_Fig8_HTML.jpg)


    图 6-8. Xcode 工具栏左侧部分的特写


    Xcode 工具栏的右侧包含一些改变编辑器的按钮。这三个按钮分别代表标准编辑器（已选中）、辅助编辑器和版本编辑器。现在，只需点击标准编辑器按钮，如图 6-9
    所示。


    ![A341013_4_En_6_Fig9_HTML.jpg](img/A341013_4_En_6_Fig9_HTML.jpg)


    图 6-9. Xcode 工具栏右侧部分的特写


    编辑器选项旁边是一组视图按钮。这些按钮可以打开或关闭。例如，图 6-10 中选中的按钮代表了图 6-7 所示的当前视图：屏幕左侧三分之一的区域是程序文件列表，中间是主编辑器，右侧是工具区。可以选择任意组合或全都不选，以便自定义主工作区窗口。最后一个按钮用于打开工具区。第
    13 章将讨论这个按钮。现在，让我们回到你的第一个 iPhone 应用。


    点击 `ViewController.swift` 文件，如图 6-10 所示。编辑器显示了一些 Swift 代码，这些代码定义了一个 `ViewController`
    类。


    ![A341013_4_En_6_Fig10_HTML.jpg](img/A341013_4_En_6_Fig10_HTML.jpg)


    图 6-10. 在 Xcode 编辑器中查看源代码


    你会注意到代码中有两个函数。`viewDidLoad` 在视图加载后立即被调用，可用于设置视图。这是放置设置标签、按钮、颜色等代码的好地方。`didReceiveMemoryWarning`
    则在应用程序内存不足时被调用。你可以使用此函数来减少应用程序所需的内存量。


    > **注意**

    > 现在，你只需添加几行代码，看看它们的作用。目前并不期望你理解这些代码的含义。重要的是通过实际动手操作来更加熟悉 Xcode。第 7 章将更深入地讲解 Swift
    程序的构成，第 10 章则会更深入地讲解如何构建 iPhone 界面。


    接下来，你将向此文件中添加几行代码，如图 6-11 所示。第 13 行在屏幕上定义了一个标签，你可以在其中放置一些文本。第 15 行定义了方法 `showName`。你将调用此方法来填充
    iPhone 的标签。标签无非就是屏幕上可以用来放置一些文本信息的区域。


    > **警告**

    > 请严格按照示例所示输入代码，包括大小写。例如，`UILabel` 不能写成 `uilabel` 或 `UILABEL`。Swift 是一种区分大小写的语言，因此
    `UILabel` 与 `uilabel` 完全不同。


    ![A341013_4_En_6_Fig11_HTML.jpg](img/A341013_4_En_6_Fig11_HTML.jpg)


    图 6-11. 添加到 ViewController.swift 文件中的代码


    你会注意到，你添加的代码前面有 `@IBOutlet` 和 `@IBAction`。这些属性在将对象与界面设计器连接时是必需的。`@IBOutlet` 允许你通过代码控制界面对象。`@IBAction`
    允许你在界面中发生某些事件（例如点击按钮）时执行代码。


    > **注意**

    > `IBOutlet` 和 `IBAction` 都以 `IB` 开头，这是 Interface Builder（界面构建器）的缩写。Interface
    Builder 是 NeXT 公司（后来是苹果公司）用于构建用户界面的工具。


    现在你已经有了必要的代码，但设备上还没有界面。接下来，你将编辑界面，并向你的应用中添加两个界面对象。


    要编辑 iPhone 的界面，你需要点击一次 `Main.storyboard` 文件。`.storyboard` 文件包含有关单个窗口或视图的所有信息。Xcode
    9 也支持 `.xib`（发音为 zib）文件。


    > **注意**

    > 每个 `.xib` 文件代表 iPhone 或 iPad 上的一个屏幕。具有多个视图的应用会有多个 `.xib` 文件，但每个故事板文件中可以存储许多不同的视图。


    你将使用 Xcode 的界面编辑器将一个 UI 对象（例如 Label 对象）连接到刚刚创建的代码上。连接起来就像点击和拖拽一样简单。

