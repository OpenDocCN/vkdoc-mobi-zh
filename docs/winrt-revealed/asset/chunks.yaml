- fmt: '# A Surprising Step Many Smart People Skip


    A surprising number of smart people skip this step. They believe that they can
    both assess and solve the problem at the same time. This is akin to saying, “I
    will solve a math equation that I can only half see.” It’s absurd, but it’s precisely
    what someone does when they start making critical decisions with incomplete data.


    `Action` feels like progress, but undirected action is not progress, nor is it
    a plan. You’re going to barge into the office and start barking orders because
    that is what everyone expects, but if your orders are not shaped by what you’re
    really attempting to do, you are just sending people scurrying around aimlessly.
    Yes, you may get lucky. Yes, everyone breathes a sigh of relief when you show
    up with your impressive sense of purpose. But in my experience, when my direction
    doesn’t map to intent, I’m usually getting no closer to propping up the sky.


    ## Step 2: The “Bet Your Car” Perspective


    With your newfound confidence that you have fully described the problem in front
    of you and have a semblance of a fix, my timely buzz kill is this: I am 100 percent
    absolutely certain that you’ve missed something essential in your first pass.
    There are two ways to discover this: you can jump straight into the next step
    and discover this absence at the most inconvenient and credibility-destroying
    moment, or you can check your math. To do the latter, do two things.


    ### The first thing you must do


    Vet your model with at least three qualified others. These are people who were
    not directly involved in step 1 and who are people who don’t need to understand
    the particulars of the disaster. But they can appreciate the broad strokes because
    they’ve been there and have no issue with telling you how screwed you are.


    The joy that occurs at the end of step 1 is the discovery of a fix. This moment
    of illumination is gratifying because it’s the first time you believe there is
    a chance the sky can be propped up. The bad news: Confidence is not a plan. This
    situation is very common with software developers who are fixing bugs. They look
    at the bug description, write a few lines of code, rebuild, and, voila, it’s fixed,
    because when they reproduce the exact steps of the bug, the bug no longer occurs.
    They have no idea that this small change in the import-export code will also have
    unintended side effects on other file operations.


    Having a solution where all the implications of the solution are not understood
    is not a fix. You must take the time to explore all the implications—and in my
    experience this takes *longer than it takes to come up with your plan.*


    ### The second thing you must do


    Once your qualified others have discovered those gaping holes and unintended consequences
    that are guaranteed to exist in your fix—your model—you need to throw the current
    version on the nearest whiteboard in the War Room with the folks who are responsible
    for the work that’s going to go down over the next few days, and ask the same
    question: Does this picture, this list, make sense?


    This is yet another error correction pass for gaping holes. It’s also a pass on
    prioritization, but most importantly, it’s an assignment of ownership.


    One of the leading causes of sky-falling situations is distributed ownership,
    and as a strategy, distributed ownership seems very humane. We’re going to put
    the right people on the right problems. *We’re going to empower the most qualified
    people to make their own decisions regarding their local problems because they
    have local knowledge and can make the best decisions using this knowledge.* As
    a human being and a nerd who has an intense allergy to being told what to do,
    this model of distributed ownership appeals to me. I imagine small teams of bright
    people empowered because they feel they control their destiny.


    A sky-falling situation exists not because of a single failure on one team. It’s
    a collection of multiple large and small mistakes on many teams that snowballs
    into an unexpected worst-case scenario. Teams of people succeed and fail at scale.
    A likely major contribution to your current disaster is the fact that multiple
    well-meaning and fully informed people looked at an emergent disaster and thought,
    “Well, someone who is not me is going to handle this, right?”


    Since you’re the person who is racing to work while panicking about the sky falling,
    I’m going to call you what we called these folks during my tenure at Apple: the
    Directly Responsible Individual, or `DRI`. This name clearly describes the person
    who is directly responsible for whatever the situation might be, and it refers
    to a person. It’s not the Directly Responsible Group of People with Good Intentions
    Who Are Attempting to Feel Good by Building Consensus but Who Are Mostly Wasting
    Everyone’s Time. It’s an individual who is owning the entire situation.


    However, as the `DRI`, the person who is most likely to be yelled at, your job
    is to be accountable. Your job is not to own all of the work, which is why the
    last part of this step is to put a proper name next to each and every task, and,
    as much as possible, this name should not be yours. When you’re done with this
    assignment, and someone in the War Room asks, “Hey, why isn’t your name on the
    list?” Your answer is, “Because I’m the one making sure this whole thing is moving
    forward and I’m the one who gets fired if it doesn’t.”


    ## What happens if you ignore this


    There are a variety of skippable parts in step 2, but I’m not worried that you
    don’t have an initial plan or that you’re incapable of pulling trusted others
    in to distribute the load. The part that has screwed me the most is failing to
    understand all of the implications of my theory.


    A former boss used to put this into clear perspective: “Do you understand all
    of the implications of your plan?” *Yes, I do.* “Give me your car keys.” *Wait,
    what?* “Would you bet your car on the viability of your plan?” [Sound effect:
    shaking keys.] *Right, yeah, let me do one more pass.*


    ## Step 3: Constant and Consistent Sky-Propping Pressure


    When the sky is falling, everybody is watching. Everybody wants status an hour
    ago. Everybody is talking to everybody else about the state of your sky-falling
    situation, which means the Grapevine is actively working against you. The amount
    of fear, uncertainty, doubt, and outright lies generated about what’s actually
    going on is impressive.


    I’m assuming that you’ve got a credible plan that you’ve carefully vetted with
    others. I’m assuming you’ve assigned the work to competent folks who have a sense
    of ownership of their respective parts of the plan. I’m assuming the War Room
    is abuzz with the action defined by the plan. While all of this going on, your
    job is internal public relations.


    As soon as I have something to report, I send the report to everyone who wants
    to know. If you walk by the War Room, poke your head in, and ask, “What’s up,
    guys?” I add you to the distribution list. You’re going to get every update until
    you beg to be removed. Anyone who mails me any random question—they’re on the
    list. The game here isn’t just overcommunication and Grapevine eradication; I’m
    still worried I missed something in the plan, and the status spamming is another
    means of vetting both the plan and the progress.


    How often do I send status? It’s a judgment call based on progress relative to
    the beginning of the disaster. The better the legitimate progress, the fewer the
    updates. It moves slowly from hourly updates to daily updates and ultimately to
    weekly ones, which is when I start thinking about tearing down the War Room.


    ## What happens if you ignore this'
