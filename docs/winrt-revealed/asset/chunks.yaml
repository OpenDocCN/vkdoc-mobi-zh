- fmt: '**Once you’ve done all your active content acquisition, once you’ve pitched
    some strangers, once you’ve written it down a few times, you need to stop actively
    working on the problem.** Remove that sticky from your screen, hide those second
    drafts on your desktop, and just stop working on it. Yes, you need to make a decision,
    you need to respond to whatever the problem is, and while I am saying you should
    remove all the physical artifacts of your active soak, you’re not going to stop.
    You can’t. Your brain won’t let you.


    Back to the original flame mail from your friend. You’ve received these before
    and you know the absolute wrong thing to do is immediately respond. Of course,
    your animal brain is dying to do so because *it feels so good to punch back*,
    but it’s never the right move because your animal brain is defending itself, it’s
    not resolving anything other than proving *boy, can I punch back or what?* My
    advice regarding flame-o-grams and hard decisions is the same. Sleep on it.


    A night’s rest is one of the best ways to calm and alter your perspective on a
    problem. Ever gone to bed at night when the sky is falling and awoken to a blissfully
    simple way to easily prop the sky up? How’d that happen? The answer is, your brain
    never stops working. Better yet, it has the unique ability to subconsciously construct
    elegant solutions to hard problems when you least expect it. Call it inspiration,
    call it intuition, but don’t stare at it too long because it’s a shy ability.
    It does its best work when no one knows it’s there.


    ### Soaking Takes Time


    Don’t tell anyone I work with, but I earn a majority of my pay during the 40-minute
    drive to work in the morning. I get in the car with my cup of coffee, hit the
    road, and let my mind wander to whatever music is playing. Never do I think, “OK,
    Phil flamed me pretty hard yesterday … how am I going to deal with this?” My mind
    stumbles, it strikes out in random directions, and I never know where it’ll end
    up. Still, if I’ve spent time actively soaking on the Phil problem the day before,
    my wandering often ends up somewhere Phil-like, and sometimes, the mental journey
    reveals a nugget of inspiration.


    As practical advice goes, the soak is sometimes pretty thin. If your boss is waiting
    for you to weigh in on a critical decision, I am not advising you to say, “I have
    no clue what to do, I’m going to go ask dumb questions, pitch a stranger, write
    it down and then throw it away, and then forget everything I did.” What I am saying
    is that any big decision, any big problem, deserves time and consideration. If
    you’ve got years of experience under your belt, you can probably wing it pretty
    well, but you’re still going to be faced with situations where the right decision
    is to not decide, but think.


    The soak is, hands down, the favorite part of my job. What I’m doing when I’m
    soaking on something is an act of creation. It’s design work. It’s strategy. It’s
    removing the emotion and ignorance from a problem and then constructing an original
    solution that shows those I work with that I’m actively caring about what I do.


    ---


    ## CHAPTER


    ### Managing Malcolm Events


    The nerd frenzy around the original *Jurassic Park* was significant and led by
    the promise of lifelike computer animation. This was a win-win for engineers.
    Not only do we tap into our preadolescent dinosaur love, but we also get to watch
    the first movie where dinosaurs actually show up, and, by the way, using *the
    tools we wrote.* OK, so I was at Borland at the time, and we wrote programming
    languages and applications in the early 1990s, but *those ILM guys are just down
    the street. We’re buds.*


    Strangely, 18 years later, the memory that has stuck with me from the movie was
    a quote by Jeff Goldblum’s character, Ian Malcolm. He was sitting in the Jurassic
    SUV, busily hitting on Laura Dern, trying to explain chaos theory to a paleobotanist,
    when he made a comment that burned itself into my brain.


    He was demonstrating chaos theory by placing drops of water on the top of her
    raised hand and asking, “Which way is it going to fall?” (Smooth, really smooth,
    Jeff.) The drops fell in a different direction each time, and Malcolm attributed
    this to “the principle of tiny variations—the orientations of the hairs on your
    hand, the amount of blood distending in the skin, [they] never repeat, and vastly
    affect the outcome …”


    For you nerds out there who want to know more, go read about the butterfly effect.
    But for me, the quote encapsulates an essential part of practical software design.
    In the years since the movie, I’ve mutated the quote into this: “Seemingly insignificant
    events that are intent on screwing you in an unlikely way.” These events are named
    after Ian Malcolm, as they are called *Malcolm events.*


    ### We’re in a Hurry


    We’re always in a hurry in the Silicon Valley. If we’re not making new stuff,
    we’re making stuff to help us make new stuff. Our stuff-building process varies
    from company to company but it usually follows a cycle that looks like this:


    **Design:** Brainstorm new stuff to make. Talk a lot. Throw a lot away. Talk some
    more.


    **Development:** Less talking, more doing. Engineers are heads-down and managers
    are wondering what they’re supposed to do.


    **Deployment:** More talking, some yelling, managers are busily keeping everyone
    from killing each other, and then it’s suddenly … done.


    We’re in the design phase right now, you and I. I’m the manager, you’re the senior
    engineer, and we’re brainstorming our next release. We’ve each got a fuzzy picture
    of what we want to do in the next release, but it’s not clear. There’s nothing
    that defines the picture, so we’re just throwing ideas against the wall to see
    what’s going to stick.


    Nothing appears to be sticking until you say something off the cuff; I take the
    idea, riff on it, write it on the whiteboard and *wham …* that’s the Feature.
    It’s the piece of work, the design, that will define your release. We know it
    is because we both sit there staring at the whiteboard at the Feature knowing
    that this moment will define everything after it. Doesn’t happen often; savor
    it.


    This is not a Malcolm event. This moment is akin to a “holy shit” moment when
    you first understand a marvelous new technology. You must have these moments to
    have an inspired release, but you haven’t been screwed by a Malcolm event, yet.


    Let’s keep moving.


    Great, so we’ve got the Feature. Now the frenzy begins. We can’t keep our paws
    off the whiteboard because we know that in the next 15 minutes, the rest of the
    features are just going to come pouring out. Now, during the frenzy, a whole pile
    of decisions are going to be made, and while we’re valiantly going to try to capture
    them on our whiteboard, we’re going to miss a few.


    I want to pick one of these missed decisions. At first glance, it’s not a big
    decision. In fact, in the creative frenzy that is the discovery of a release,
    it’s a really small decision. When the meeting is over, we forget that it was
    made because we’re digesting the mental high imparted by this discovery of the
    Feature.


    Problem is, this decision does matter. What you don’t know is that this decision
    clarifies the Feature in a critical way for those who weren’t in the first meeting
    frenzy. By the way, *that’s everyone.*


    No one knows this yet, but this is your Malcolm event.


    ### Understanding Malcolm Events


    It’s a month later, and development has begun and more folks are involved. Someone
    asks you a question about the Feature and the answer is the decision that was
    forgotten. No big deal, you answer the question and move on. A week later, you
    get asked the same question by a QA guy. Haven’t you already answered this question?
    Yeah, you did. OK, no big deal. Here’s the answer.


    Another month passes and by your count, you’ve been asked the same clarifying
    question ten times and you’re wondering, “Don’t people get it? Isn’t it obvious
    what the answer is?”'
  raw: 'Once you’ve done all your active content acquisition, once you’ve pitched
    some strangers, once you’ve written it down a few times, you need to stop actively
    working on the problem. Remove that sticky from your screen, hide those second
    drafts on your desktop, and just stop working on it. Yes, you need to make a decision,
    you need to respond to whatever the problem is, and while I am saying you should
    remove all the physical artifacts of your active soak, you’re not going to stop.
    You can’t. Your brain won’t let you.


    Back to the original flame mail from your friend. You’ve received these before
    and you know the absolute wrong thing to do is immediately respond. Of course,
    your animal brain is dying to do so because *it feels so good to punch back*,
    but it’s never the right move because your animal brain is defending itself, it’s
    not resolving anything other than proving *boy, can I punch back or what?* My
    advice regarding flame-o-grams and hard decisions is the same. Sleep on it.


    A night’s rest is one of the best ways to calm and alter your perspective on a
    problem. Ever gone to bed at night when the sky is falling and awoken to a blissfully
    simple way to easily prop the sky up? How’d that happen? The answer is, your brain
    never stops working. Better yet, it has the unique ability to subconsciously construct
    elegant solutions to hard problems when you least expect it. Call it inspiration,
    call it intuition, but don’t stare at it too long because it’s a shy ability.
    It does its best work when no one knows it’s there.


    Soaking Takes Time


    Don’t tell anyone I work with, but I earn a majority of my pay during the 40-minute
    drive to work in the morning. I get in the car with my cup of coffee, hit the
    road, and let my mind wander to whatever music is playing. Never do I think, “OK,
    Phil flamed me pretty hard yesterday … how am I going to deal with this?” My mind
    stumbles, it strikes out in random directions, and I never know where it’ll end
    up. Still, if I’ve spent time actively soaking on the Phil problem the day before,
    my wandering often ends up somewhere Phil-like, and sometimes, the mental journey
    reveals a nugget of inspiration.


    As practical advice goes, the soak is sometimes pretty thin. If your boss is waiting
    for you to weigh in on a critical decision, I am not advising you to say, “I have
    no clue what to do, I’m going to go ask dumb questions, pitch a stranger, write
    it down and then throw it away, and then forget everything I did.” What I am saying
    is that any big decision, any big problem, deserves time and consideration. If
    you’ve got years of experience under your belt, you can probably wing it pretty
    well, but you’re still going to be faced with situations where the right decision
    is to not decide, but think.


    The soak is, hands down, the favorite part of my job. What I’m doing when I’m
    soaking on something is an act of creation. It’s design work. It’s strategy. It’s
    removing the emotion and ignorance from a problem and then constructing an original
    solution that shows those I work with that I’m actively caring about what I do.


    CHAPTER


    Managing Malcolm Events


    The nerd frenzy around the original *Jurassic Park* was significant and led by
    the promise of lifelike computer animation. This was a win-win for engineers.
    Not only do we tap into our preadolescent dinosaur love, but we also get to watch
    the first movie where dinosaurs actually show up, and, by the way, using *the
    tools we wrote.* OK, so I was at Borland at the time, and we wrote programming
    languages and applications in the early 1990s, but *those ILM guys are just down
    the street. We’re buds.*


    Strangely, 18 years later, the memory that has stuck with me from the movie was
    a quote by Jeff Goldblum’s character, Ian Malcolm. He was sitting in the Jurassic
    SUV, busily hitting on Laura Dern, trying to explain chaos theory to a paleobotanist,
    when he made a comment that burned itself into my brain.


    He was demonstrating chaos theory by placing drops of water on the top of her
    raised hand and asking, “Which way is it going to fall?” (Smooth, really smooth,
    Jeff.) The drops fell in a different direction each time, and Malcolm attributed
    this to “the principle of tiny variations—the orientations of the hairs on your
    hand, the amount of blood distending in the skin, [they] never repeat, and vastly
    affect the outcome …”


    For you nerds out there who want to know more, go read about the butterfly effect.
    But for me, the quote encapsulates an essential part of practical software design.
    In the years since the movie, I’ve mutated the quote into this: “Seemingly insignificant
    events that are intent on screwing you in an unlikely way.” These events are named
    after Ian Malcolm, as they are called *Malcolm events.*


    We’re in a Hurry


    We’re always in a hurry in the Silicon Valley. If we’re not making new stuff,
    we’re making stuff to help us make new stuff. Our stuff-building process varies
    from company to company but it usually follows a cycle that looks like this:


    **Design:** Brainstorm new stuff to make. Talk a lot. Throw a lot away. Talk some
    more.


    **Development:** Less talking, more doing. Engineers are heads-down and managers
    are wondering what they’re supposed to do.


    **Deployment:** More talking, some yelling, managers are busily keeping everyone
    from killing each other, and then it’s suddenly … done.


    We’re in the design phase right now, you and I. I’m the manager, you’re the senior
    engineer, and we’re brainstorming our next release. We’ve each got a fuzzy picture
    of what we want to do in the next release, but it’s not clear. There’s nothing
    that defines the picture, so we’re just throwing ideas against the wall to see
    what’s going to stick.


    Nothing appears to be sticking until you say something off the cuff; I take the
    idea, riff on it, write it on the whiteboard and *wham …* that’s the Feature.
    It’s the piece of work, the design, that will define your release. We know it
    is because we both sit there staring at the whiteboard at the Feature knowing
    that this moment will define everything after it. Doesn’t happen often; savor
    it.


    This is not a Malcolm event. This moment is akin to a “holy shit” moment when
     you first understand a marvelous new technology. You must have these moments
    to have an inspired release, but you haven’t been screwed by a Malcolm event,
    yet.


    Let’s keep moving.


    Great, so we’ve got the Feature. Now the frenzy begins. We can’t keep our paws
    off the whiteboard because we know that in the next 15 minutes, the rest of the
    features are just going to come pouring out. Now, during the frenzy, a whole pile
    of decisions are going to be made, and while we’re valiantly going to try to capture
    them on our whiteboard, we’re going to miss a few.


    I want to pick one of these missed decisions. At first glance, it’s not a big
    decision. In fact, in the creative frenzy that is the discovery of a release,
    it’s a really small decision. When the meeting is over, we forget that it was
    made because we’re digesting the mental high imparted by this discovery of the
    Feature.


    Problem is, this decision does matter. What you don’t know is that this decision
    clarifies the Feature in a critical way for those who weren’t in the first meeting
    frenzy. By the way, *that’s everyone.*


    No one knows this yet, but this is your Malcolm event.


