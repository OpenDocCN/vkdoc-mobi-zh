- fmt: '# Facebook’s Letter and the Importance of Hacking


    Facebook’s letter documents its core values: focus on impact, move fast, be bold,
    be open, and build social value. And as I read those bullets, I see two people
    at the table defining them: a high-impact, fast-moving and bold barbarian who
    couldn’t care less about the biz dev guy who is arguing for being open and building
    social value.


    Both people are essential to a business thriving, but only one of them knows that
    hacking is important.


    ## Where’s Dieter?


    Apple solved the disruptive hacker problem by hiding it, and it starts with a
    question:


    “Where’s Dieter?”


    “He moved to another project.”


    “Uh, he has 32 open radars and we’ve got two weeks until Feature Complete.”


    “He moved to another project.”


    “OK, what project?”


    “I don’t know.”


    It happens quietly, but the projects that could be the most disruptive to the
    company begin in silence. Someone, somewhere has a bright idea, and a handful
    of talented engineers are whisked off to a different building behind a locked
    door. Their status is “elsewhere” and their project is “need to know.”


    Having never sat with one of these projects, I can only infer how they work, but
    when you see the results, you know for certain—these guys and gals are hacking.
    Their projects are the definition of ambition, you’ve never heard their names,
    they’re small and fast-moving, and they’re outsiders in their own company. Sound
    familiar?


    Now, I don’t believe the secret projects are entirely about preventing disruption;
    there is a large marketing component. The return of Steve Jobs was the return
    of marketing, and a project being secret was less about secrecy and more about
    marketing. Steve wanted to be the first guy standing in front of the entire planet
    telling you the story: “You are not going to fucking believe what we’ve done.”


    Yes, there is internal jealousy about the teams performing the wizardry that resulted
    in products like the iPad, the iPhone, and AppleTV. There are people wondering,
    “Why wasn’t I invited to the hacking?” Yes, this did create some elitism, but
    for better or worse, the secrecy kept this discussion out of the mainstream.


    The secret projects at Apple are institutionalized hacking. They are places of
    “elsewhere” where the engineers don’t have to worry about being barbarians because
    everyone there knows hacking is important.


    ## Unintentionally Forgetting What It Took to Get You There


    The story of every company begins with a clever hack. Pick any company and read
    its history, and I’m pretty sure there will be a well-documented origin story
    that will define its beginning and involves someone building something new and
    possibly of unexpected value. What isn’t documented is the story of every moment
    before, when everyone surrounding the hacker asked, “Why the hell are doing you
    that?” or “Why would you take the risk with so little reward?” or “Why are you
    wasting your time?” What’s not documented are the nine spectacular failures the
    hacker survived before they built one success.


    The well-intentioned people who arrive after the initial success of the hack don’t
    know of a world without it. They assume its existence and are tasked with growing
    the company around it. Don’t for a moment think I don’t value these people, because
    I happen to be one of them, but I am also intimately aware that the people who
    grow the company are not the same people who founded it.


    A healthy product company is, confusingly, one at odds with itself. It has a healthy
    part that is attempting to normalize and to create predictability, but it needs
    another part that is tasked with building something new that is going to disrupt
    and eventually destroy that normality.


    Failure to create some form of predictability will result in chaos. Failure to
    create some sort of well-maintained barbaric chaos inside the company guarantees
    that a fast-moving, ambitious, risk-taking, and ruthless someone else—someone
    outside the company—will invade, because they know what you forgot: hacking is
    important.


    ---


    [¹](#9781430243144_Ch27.xhtml#FN1) Jonathan Weber, “Khan the Barbarian,” *Los
    Angeles Times*, February 23, 1992 ([http://articles.latimes.com/1992-02-23/business/fi-5118_1_borland-international-chairman-philippe-kahn](http://articles.latimes.com/1992-02-23/business/fi-5118_1_borland-international-chairman-philippe-kahn)).


    [²](#9781430243144_Ch27.xhtml#FN2) [http://blogs.wsj.com/deals/2012/02/01/mark-zuckerbergs-letter-from-the-facebook-filing/](http://blogs.wsj.com/deals/2012/02/01/mark-zuckerbergs-letter-from-the-facebook-filing/)


    # Part III: Versions Of You


    Your team is populated by a unique set of individuals that are distinctly not
    you. Yes, you’re on the same team and perhaps you share the same professional
    goals, but in the details each of you is different.


    This section starts with what might the most important lesson regarding maintaining
    a healthy team: bored people quit. After that I go deep on the mindsets and habits
    of nerds, before, well, I start calling other people names, which is behavior
    I need to explain.


    Most chapter titles come to me well before the piece is written. This is likely
    because much of my writing starts as part of a coffee-induced high driving to
    or from work, and there is no way I can completely remember my chain-of-consciousness,
    rambling thoughts from when I park the car to when I’m near a keyboard.


    So I create a name.


    And it needs to be a good descriptive name because I’ve got to remember 30 minutes
    of mental wandering just by thinking of it.


    This last section is full of just these sorts of names. Inwards, outwards, organics,
    NADD, free electrons, bellwethers, incrementalists … I clearly have name-calling
    issues. But these names aren’t just a handy memory device, they’re the end result
    of years of sitting at a table and noticing and labeling the similarities among
    very different people.


    These names are not intended to paint a complete picture of the people they describe.
    They merely give you a starting point for understanding where your particular
    person is coming from. In reality, your free electron is also an organic completionist.
    In reality, people are messy.


    While I’m happy to provide you with a starting mental sketch for identifying the
    people on your team and in your company, your job isn’t done there. Your job is
    not to figure out how to alienate people by calling them names, it’s to figure
    out how to include them by taking time to understand what they need and doing
    your best to give it to them.


    You need to remember that everyone is a slightly different version of you.


    Finally, this section and this book finish a little selfishly. The final chapters
    walk you through a professional inevitability—how to prepare for your next job
    and how to be kind to the one you leave.


    ## Chapter: Bored People Quit


    Much has been written about employee motivation and retention. It’s written by
    folks who actively use words like *motivation* and *retention* and generally don’t
    have a clue about the daily necessity of keeping your team professionally content,
    because they’ve either never done the work or have forgotten how it’s done. These
    are the people who show up when your single best engineer casually and unexpectedly
    announces, “I’m quitting. I’m joining my good friend to found a start-up. This
    is my two-weeks’ notice.”


    You call on the motivation and retention police because you believe they can perform
    the legendary “diving save.” Whether it’s HR or a well-intentioned manager with
    a distinguished title, these people scurry impressively. Meetings that go long
    into the evening are instantly scheduled with the disenfranchised employee.


    It’s an impressive show of force, and it sometimes works, but even if they stay,
    the damage has been done. They’ve quit, and when someone quits they are effectively
    saying, “I no longer believe in this company.” What’s worse is that what they
    were originally thinking was, “I’m bored.”


    Boredom is easier to fix than an absence of belief.


    ## Detecting Boredom'
