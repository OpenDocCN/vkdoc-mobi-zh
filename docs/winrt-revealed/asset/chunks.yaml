- fmt: '# Multiple Generations of Nerds


    Multiple generations of nerds are in the workforce now, so your preconceived notions
    of nerdery are not as useful as you thought. Discard the nerd extremes: the curmudgeonly
    pocket protector set is retired or retiring, and there’s a good chance that the
    slick, brown-haired guy sitting across the bar wearing the $300 Ted Baker shirt
    is a fucking Python wizard.


    Fortunately, a career as a nerd in software engineering still requires a well-defined
    mental skill set, not any particular sartorial flair, and successfully acquiring
    and refining that skill set has tweaked the nerd’s brain in a unique way that
    will start to define your nerd management strategy.


    * * *


    ![images](images/sq.jpg) **Disclaimer** As with all of my writing, I usually use
    *he* as a convenience. There are plenty of female nerds out there, and they display
    much of the same behavior.


    * * *


    ## A Problem


    In front of you is the Problem. While I don’t know what the Problem is, I do know
    that you have a bright team of talented nerds working for you, and I know that
    you don’t have a clue how to tackle the Problem. You need the nerds and you don’t
    know where to start. The Problem is unique in that your normal leadership moves
    aren’t going to work. You can already predict the collective nerd reaction, and
    it’s the opposite of what you need to happen.


    Rather than attacking this Problem directly, let’s turn it around and explore
    the inner workings of your nerd’s mental landscape for inspired next steps.


    *The nerd as system thinker* is a point I’ve been making since I wrote the Nerd
    Handbook, and one I explore further in *Being Geek* (O’Reilly, 2010).[³](#9781430243144_Ch31.xhtml#FON3)
    Briefly, a nerd is motivated to understand how a thing works—how it fits together.
    This drive comes from the nerd’s favorite tool, the computer, which is a blissful
    construction of logical knowability. Years of mastering the computer have created
    a strong belief in the illusory, predictable calm that emerges from the chaos
    as you consistently follow the rules that define a system.


    If I had to give you a single piece of managerial advice, I would say, “Your job
    with your nerd is to bring calm to their chaos.” Let’s begin.


    *Your nerd treasures consistency.* Your staff meeting is an entertaining affair.
    You keep it light, you relay developing corporate shenanigans, and you crush rumors
    as best you can. Occasionally, you need to make a decision on the spot—random
    policy enforcement: should Kate get that sweet office with the window?


    You: “Sure, Kate deserves it … she’s doing great work.”


    Suddenly, a normally chatty staff meeting is full of silence. What happened?


    First, you nonchalantly barged your way though one of the three guaranteed topics
    that will cause anyone, not just nerds, to lose their goddamned minds: space,
    compensation, and titles. Second, your off-the-cuff decision regarding Kate is
    somehow inconsistent with your team. Remember, you are sitting in a room full
    of nerds who—just for intellectual sport—are parsing every decision you make,
    analyzing it, and comparing that analysis against *every single decision you’ve
    ever made in their presence*. That silence? That’s the silent nerd rage that arrives
    when they discover meaningful inconsistency.


    The rules regarding who gets a window have never been written down, but they are
    known: you are either a manager who needs to have one-on-ones or you’ve been with
    the group for multiple years and you have *senior* in your title. Kate has neither,
    and while her great work might be cause for awarding her the office, by not explicitly
    stating that there is an addendum to the unspoken rules regarding office windows,
    you are in consistency violation. You are less predictable because you are no
    longer following the rules of the system.


    A predictable world is a comforting world to your nerd. Your inconsistency on
    the office ruling now has them wondering, “What the hell other random crap is
    coming down the line? How the hell am I supposed to get my work done when my boss
    engages in fits of randomness?” According to your nerd, a predictable world is
    a world where we know what is going to happen next. See …


    *Your nerd also treasures efficiency.* When a nerd is mentally noting every single
    decision that you make, he is not doing so because he wants to catch you in a
    lie or an inconsistency. What the nerd is doing is what he always does—sifting
    though impressive piles of information and discovering rules so he can discover
    the optimal system that governs everything. Grand Unification Theory? Yeah, a
    nerd invented that so he could sleep at night.


    With an understanding of the rules, your nerd can choose a course of action that
    requires the least amount of energy. This isn’t laziness; this is the joy that
    in a world full of chaotic and political people with obscure agendas and erratic
    behavior, your nerd can conquer the chaos with logical, efficient predictability.
    Your nerd has a deliberate goal in mind that you need to support. Your nerd is
    …


    ## Chasing the Two Highs


    In the Nerd Handbook, I called this the High, but there are two Highs:


    ### The First High: When nerds see a knot, they want to unravel it.


    After each Christmas, someone screws up the Christmas tree lights. They remove
    the lights from the tree and carefully fold the lights as they lay them in the
    box. Mysteriously, somewhere between last year’s folding and this year’s joy of
    finding the lights, these lights become a knotted mess.


    The process of unknotting the lights is a seemingly haphazard one—you sit on the
    floor swearing and slowly pulling a single green cable through a mess of wires
    and lights and feeling like you’re making no progress—until you do. There’s a
    magical moment when the knot feels solved. There’s still a knot in front of you,
    but it’s collapsing on itself and unencumbered wire is just spilling out of it.


    This mental achievement is the first nerd high. It’s the liberating moment when
    we suddenly understand the problem, but right behind that, the solution is something
    greater. It’s …


    ### The Second High: Complete knot domination.


    The world is full of knots, and untying each has its own unique high. Your nerd
    spends a good portion of her day busily untying these knots, whether it’s that
    subtle tweak to a mail filter that allows her to parse her mail faster, or the
    30 seconds she spends tweaking the font size in her favorite editor to achieve
    perfect readability. This constant removal of friction is satisfying, but eventually
    she’ll ask, “What’s with all the fucking knots?” and attack.


    A switch flips when your nerd drops into this mode. She’s no longer trying to
    unravel the knot; she wants to understand why all knots exist. Nerds have a razor
    focus on a complete understanding of the system that is currently pissing them
    off, and they use this understanding to build a completely knot-free product.
    This is the Second High.


    Chasing the Second High is where nerds earn their salary. If the First High is
    the joy of understanding, the Second High is the act of creation. If you want
    your nerd to rock your world by building something revolutionary, you want them
    chasing the Second High. This is why …


    *You obsessively protect both your nerd’s time and space.* Until you’ve experienced
    the solving of a seemingly impossible problem, it’s hard to understand how far
    a nerd will go to protect his problem-solving focus. (See [Chapter 33](#9781430243144_Ch33.xhtml).)
    The road to either High is a mental state traditionally called the Zone. There
    are three things to know about the Zone:'
