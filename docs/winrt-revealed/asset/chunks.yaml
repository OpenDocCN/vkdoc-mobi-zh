    However, the problem here isn’t with Frank, it’s with the referee. Frank is not
    sensing progress, so Frank has left. The referee has forgotten that … *if steam
    isn’t coming from their ears, they might stop listening.* It is the responsibility
    of the referee to constantly surf the room visually to determine who is and isn’t
    engaged. This is hard.


    Referee. Solid agenda. Seven people. At any given point in the meeting, three
    of these people are verbally sparring about the topic. In addition to making sure
    the three active participants don’t kill each other, the referee—in real time—needs
    to figure out whether the other four are mentally present, and, if not, what to
    do about it. This is really hard.


    This is really hard because refereeing these meetings is incredibly situational.
    You’ve got seven people, each with their own personality and agenda. You’ve got
    whatever mood they happen to be in at that precise moment. And you’ve got whatever
    topic merits this meeting in the first place. Given all of these fuzzy variables,
    what possible relevant advice can I give you to keep everyone engaged? Here are
    a few small tips:


    *   Pull them back. If they don’t look engaged, steer the conversation toward
    them and ask them a question relevant to the current state of the topic: “Stan,
    no code reviews? Really?”

    *   Reset the meeting with silence. If several folks have checked out, one of
    my favorite moves is referee silence. When all eyes are on you, count backward
    from 10 and watch what happens—Frank is going to look up from Plants vs. Zombies
    and wonder, “Why’s it so quiet? What’d I miss?”

    *   Change the scenery. Are you sitting down? OK, stand up. Have you been writing
    stuff on the whiteboard? No? Try it. Small tweaks to the scenery might change
    nothing, or they might give someone a nudge out of their mental haze.


    A meeting’s progress is measured by the flow, and the referee’s job is keep it
    moving along at a good clip, which is why the referee sometimes needs to …


    ## Own it


    There are a variety of meeting denizens you’re going to encounter as both a referee
    and a meeting participant. The one I want to talk about is the person who believes
    it is their moral imperative to contribute to the meeting simply because they
    were invited. Yes, talking is a sign of active engagement. Yes, you never know
    what random verbal curveball is going to magically improve a meeting. Yes, this
    person always talks … every meeting … like forever.


    There is a point where the referee becomes the dictator and owns the meeting.
    They own it. They actively demonstrate control of the meeting, and when you’re
    the person who gets owned, it stings a bit, but this meeting is not about you.
    It’s about each and every person sitting in the room wanting to get out of this
    meeting and go to where real work is done.


    For the referee, the decision to step in and shut someone down during a meeting
    isn’t one taken lightly. A good referee knows that abuse of the dictator role
    eventually results in everyone shutting down, which is just as inefficient as
    that one person who never shuts up. Summoning the dictator is a last-ditch effort
    geared at fixing the problem right now, but in such a way that the problem doesn’t
    show up again. It’s a gut referee call that you’re going to screw up before you
    perfect; however, an important and immeasurable part of running a good meeting
    involves …


    ## Improvisation


    The solution to whatever the hard problem might be is going to show up via one
    of two things: random brilliance or grindingly hard work. The path to either involves
    a competent referee doing everything I just described while also knowing when
    to ignore it.


    A good referee knows


    *   When the meeting is nowhere near the stated agenda, but everyone in the room
    is showing all the nonverbal signs of progress—so screw it, let’s see where it
    goes.

    *   When this person who appears to be rambling and wasting everyone’s time is
    onto something that might lead to random brilliance—so let them ramble.

    *   The glaring danger signs for a meeting that is doomed, whether it’s a lack
    of preparation, the absence of a key player, or the fact the team is wound up
    about another issue entirely.

    *   The courage it takes to stop this meeting five minutes into the scheduled
    hour because there is no discernible way to make progress.


    Meeting management, like people management, is often the art of managing a moment,
    which means that the only rule that applies is entirely dependent on the snowflake-like
    context of the moment.


    ## A Culture of Meetings


    Somewhere in the evolution of a growing company, meetings take over. At the time,
    it seems like a good idea, because the product roadmap is all over the floor,
    key people are quitting, or there’s lots of yelling in the hallways. Whatever
    the disaster, a single well-led, efficient meeting with the right people provides
    a solution to a hard problem. Those who are watching notice and think, “All right,
    we now have a new tool to solve problems—it’s called a meeting.”


    With this fresh sense of validation, meetings spring up all over the place. They
    become the fashionable solution to problem-solving—to making progress. More folks
    are invited to these affairs because everyone believes that *if you’re invited
    to a meeting, you are somehow more professionally relevant.* People start becoming
    scarce around the building, checking someone’s free/busy schedule becomes part
    of the culture, and suddenly *we’re worrying more about the care and feeding of
    meetings than getting shit done.*


    Meetings must exist, but meetings cannot be seen as the only solution for making
    progress. If you must meet, start the meeting by remembering that the definition
    of a successful meeting is that when the meeting is done, it need never occur
    again.


    # CHAPTER


    # The Twinge


    You know this meeting, and you know it the second you hear the attendee list.
    Something is up: a product is at risk, a strategy is being redefined, or a decision
    of magnitude is being considered.


    Slide reviews are conducted via e-mail, rehearsals are performed, and demos are
    fine-tuned. When the day arrives, the room fills, nervous glances are exchanged,
    and it begins. Your practice pays off. Expected questions appear and are quickly
    answered. The project is solid; perhaps there is no need for that massive decision.
    We’re in good shape—except that Allison, the SVP, has a question. Allison?


    “Has anyone talked to Roger’s group about this? Can they support this load?”


    Shit.


    There is an impressive silence in the room when everyone understands the colossal
    gap that Allison’s questions unexpectedly illuminate. The question I want to answer
    here is how in the hell an SVP who isn’t even part of this project, who was invited
    as a courtesy, and who has never even see the project proposal finds the biggest
    strategic gap in our thinking after staring at our slides for 13 minutes?


    She had a Twinge.


    ## Twinge Acquisition


    As a manager, you manage both yourself and your team, and the simple fact is there
    will always be more of them than of you. Unless you’re the guy managing a single
    person (weird), you’ve got multiple folks with all their varied work and quirky
    personalities to manage.


    Rookie managers approach this situation with enviable gusto. They believe their
    job is to be aware of and responsible for their team’s every single thought and
    act. I like to watch these freshman managers. I like to watch them sweat and scurry
    about the building as they attempt to complete this impossible task.'
