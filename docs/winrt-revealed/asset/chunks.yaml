- fmt: '# Organizational Pride, Panic, and the Manager’s Role


    I’ve seen a lot of varieties of organizational pride and panic. At both Borland
    and Netscape, I experienced the company vibe as it shifted from “We’re the Microsoft
    killer!” to “We’re screwed!” At the startup, I showed up as employee number 20
    and watched it grow to 250 employees before the Internet bubble eroded the company
    to 50 folks wondering what to do with all the extra hardware.


    These drastic shifts in organizational perceptions showed me managers who were
    great at the pride part, but turned into jerks when the panic started. Likewise,
    new leaders and lessons showed up during the panic—leaders who were quietly getting
    their work done during the pride.


    In all of this, I can count the number of truly evil people I worked with on one
    hand. There are evil managers out there. So I apologize—I lied in the title of
    this chapter. These are genuinely evil and mean people who put themselves before
    their team, who lie, and who have absolutely no ability to lead. There are fewer
    than you think, but they are out there and my only advice is, upon meeting them,
    to run away as quickly as possible.


    Chances are, your manager is not evil, so you don’t need to run. Still, you do
    need to understand how he’s built.


    ## Your Manager’s Job


    The first and most basic frustration folks have with the management is the easiest
    to explain. You are frustrated because you’re busting your ass, but each time
    you walk by your boss’s offices, he’s got his feet kicked up on the table, coffee
    in one hand, the other hand jumping hither ‘n’ fro, and he’s talking to some guy
    you don’t know. How in the world could this be work?


    Here’s the deal: your manager’s job is not your job.


    Ever had a meeting with a completely different part of your company? Maybe you’re
    in engineering and you’re talking with facilities about getting additional space
    for your team. Your goal is clear, “I need more space,” but once the meeting kicks
    off, you realize that you and facilities are speaking a different language. It’s
    English, but the context is wildly different. Those facilities guys are rambling
    about lease agreements, safety codes, and scads of unfamiliar acronyms. In five
    minutes, it’s clear that you have no idea what they really do.


    Before that meeting, if I asked you what the role of facilities was in your company,
    you would’ve scrunched your face and mumbled something about cube construction.
    I trust that, like me, you’re an optimist and you believe that everyone in your
    company is busily working on whatever they do. I also believe that because you
    don’t understand what they do, you are automatically biased against them. You
    believe that because you understand your job intimately, it is more important
    than anyone else’s.


    In your head, you are king. It’s clear what you do; it’s clear what is expected
    of you. There is no person who rules you better than yourself because you know
    exactly what you’re about. Anyone outside of your head is a mystery because they
    are not you. In a social situation, it’s entertaining to figure out what another
    person is about, but in an employee/manager situation, there’s more at stake.
    Who is this guy who decides whether or not I get a raise? What’s he saying to
    my VP about me? Does he see me as a success or a failure? Who is that guy in his
    office anyway? *What does he do all day?*


    I am not going to explain what your manager does all day. Sorry.


    I am going to hand you seven critical questions that you need to answer in order
    to figure out if this guy is capable of looking out for number one—you. Ideally,
    you’d be able to get answers to these questions before you took a new job, but
    you didn’t and now you’re working for a manager who isn’t speaking your language.
    These questions might give you insight into where he’s coming from.


    ## Where Does Your Manager Come From?


    I’m going to start and finish here because the pedigree of your manager determines
    not only how you should communicate, but also what to expect when the shit hits
    the fan.


    Ironically, the second most common complaint I’ve heard from frustrated employees
    is, “My manager has no idea what I do.” It’s good to know the problem goes both
    ways, no? There are a couple of possible causes for this situation. Your manager
    may not care what you are doing. It doesn’t mean the work you are doing is good
    or bad, it’s just not on his radar. Some folks find this arrangement of ignorance
    to be a cozy, warm blanket. It’s a no-fuss job. *No awkward hallway conversation,
    just me and my code and … I’m what? I’m fired? Holy shit.* Well, that’s the risk
    of having a covert job. No one knows your value, which puts you first in line
    when it’s time to trim the workforce.


    Another likely situation is that your manager doesn’t actually understand what
    you’re doing because he was never an engineer. I’m not talking about the prequalified
    disasters where some brainiac on senior staff decided it was a good idea to put
    the head of marketing in charge of engineering, I’m talking about the engineering
    managers who are hiding the fact they never really did much coding. Sure, they
    can talk the talk and they’re buzzword-compliant, but what was their last programming
    assignment? What piece of code are they really proud of? Is their degree in computer
    science?


    If you’re getting vague answers full of words that sound right, my guess is you’ve
    got a faker on your hands. I’m talking about someone who has managed to wedge
    their way into a position of engineering leadership on their chutzpah and not
    their technical ability. You’re not automatically screwed in this scenario. A
    person who can convince the organization they’ve got leadership ability and hide
    the fact they haven’t a clue what a pointer is … has, well, moxie.


    This person has spent their entire career wondering, “When are they going to figure
    me out?” This paranoia has given them solid information-detection skills, which
    can be useful to you and your organization. They know when the layoff is coming,
    they know how to talk to senior management, but they don’t know how to talk to
    you because you’re actively, passionately doing something they’re clueless about
    and they believe they have to maintain the appearance they know what they’re doing.


    If this is your manager and you believe there is value in what they do, your job
    is to figure out how to speak their language. Maybe they snuck out of QA? OK,
    then speak QA. Maybe they just never got around to that computer science degree?
    OK, take the time to teach them about your work. I’m not talking teaching this
    guy `Objective C`, I’m talking 15 minutes at the whiteboard with flowcharts. This
    is *what I do* and this is *why it matters.*


    Your manager is your face to the rest of the organization. Right this second,
    someone you don’t know is saying something great about you because you took five
    minutes to pitch your boss on your work. Your manager did that. You gave him something
    to say.


    ## How Is He Compensating for His Blind Spots?


    Now we’re going to pick on your favorite manager. Tell me about him. Probably
    a great communicator, funny guy; charismatic, you say? He probably inspired you.
    You can probably quote a few of his more infamous sayings, like “Better is the
    enemy of done.” The question is, what are his blind spots?


    Each manager, good or bad, is going to have a glaring deficiency. Maybe he did
    escape from QA and now he’s the director of engineering. Perhaps he’s a stunning
    technologist with absolutely no sense of humor. The question is, does he recognize
    he has a blind spot?'
