  trans: '

    # 会议开始四十五分钟后，我做了一件前所未有的事。我径直走出了一场自己作为关键人物的会议，因为我实在无法再在这毫无意义的事情上浪费时间。起身、离场、摔门而去。是的，这是一次情绪化的举动，在商业场合几乎总是下策，但在我最厌恶的职业行为清单上，排在前列的绝对是：


    别浪费我的时间。


    ---


    # 渐进主义者与完美主义者


    最近，我和一位同事就我们某款产品问题的正确解决方案爆发了一场笔墨官司。顺便说一句，电子邮件绝对、绝对、绝对、永远不是解决争议的正确方式。当你用全大写字母对项目经理"咆哮"时，太多微妙的含义就丢失了。别浪费时间通过电子邮件解决问题。站起来，走到走廊那头，看着对方的眼睛。这样你能活得更久。


    总之。


    我和这位同事的邮件往来之所以引人深思，是因为我们的分歧并不在于是否应该对问题采取行动，而在于我们应该做到什么程度。这场争论让我意识到，在设计问题解决方案时，存在两种截然不同的性格类型：渐进主义者与完美主义者。


    **渐进主义者**是现实主义者。面对待解决的问题和待发布的产品，他们很清楚哪些是可行的。他们深切了解可调用的资源数量、围绕该问题的政治格局形态，以及谁掌握着哪些信息。他们往往知晓所有内幕，并乐于因这一点获得认可。


    **完美主义者**是梦想家。他们非常清楚如何解决某个问题，而答案就是"要正确地解决"。他们的信条是："既然要花时间解决问题，那就用一种让你三个月后不必再解决同个问题的方法来搞定。"我曾以为只有架构师才是一个组织里真正的完美主义者，但我错了。架构师只是公认的完美主义者，但这种特质其实无处不在。


    回到我的处境。具体问题无关紧要，但背景是这样的：这位同事发现了我们产品中的一个问题并上报了。我回复说建议做一个小的改进，这个改进不能解决核心问题，但在我们的日程安排下是可以实现的。同事回复："如果不能解决问题，为什么要做？"我回答："我们没时间彻底解决，但有点改进总比没有好。"同事："这比没有还糟糕！"陷入一片死寂。


    记住，这位同事（正确地）识别出了原始问题。那么，他为什么就是看不到我提出的方案的价值呢？原因在于，这是一场渐进主义者与完美主义者的对决。这不是对与错的战斗，而是"对"与"对"的较量。真是奇怪。


    当渐进主义者和完美主义者就"正确"的程度争论不休时，事情如何能推进？诀窍在于：你要让他们争论，但别让他们互相残杀。这时，作为管理者，你就该登场了。


    ## 中间地带


    首先，我们暂且忽略那个让渐进主义者和完美主义者剑拔弩张的问题。它虽然重要，但并非我们此刻要处理的关键——我们是要从这些独特的视角中获取价值。


    重要的是：谁需要向对方靠拢？是渐进主义者需要向完美主义者的观点靠近，还是反之？无论是哪种情况，你都必须使用冲突解决中最简单的策略：寻找共同点。更好的思考方式是："这两种截然不同的理念，需要从对方那里得到什么？"


    ### 渐进主义者需要愿景


    定义渐进主义者日常工作的是他们完成了多少实实在在的工作量。开了多少会？修复了多少个 Bug？他们喜欢自己碰巧在食堂遇到那位工程经理并听到关键八卦这件事。行动、行动、行动。


    从外部看，你的渐进主义者可能显得缺乏目标，但看看这个名字。驱动这个人的是持续——渐进地——取得进展、向前迈进的目标。


    问题是：所有这些行动背后的目的是什么？他们的目标是什么？我注意到，我身边的渐进主义者虽然忙个不停，但他们的前进方向并不总是一目了然。这一点很难判断，因为他们看起来非常忙碌，但问题在于，这种忙碌的本质是什么？


    你对渐进主义者的目标，是让他们从全局出发，定义或看清整个计划。这对他们来说意义重大，因为他们通常只看得到下一个会议。让他们认同并融入大局，能给予他们一种通常没有的根基感。


    这时，你的完美主义者就该出场了。


    ### 完美主义者需要行动


    完美主义者生命中很大一部分时间都在摇头、盯着地板、喃喃自语："天哪，他们还能把事情搞得更糟吗？"事实上，对于任何一个技术或产品问题，总有一个完美主义者知道该怎么做。问题是，他们不仅能看到眼前的解决方案，还能看到两年后的方案和五年后的方案。顺便说一句，五年后的方案会极大地改变眼下的解决方案，这就是为什么其他所有人都对此有意见。其他人都无法洞察那个五年后的方案。


    感觉自己很蠢？我也是。


    现在，请你站在完美主义者的立场上想一想。坐在那里看着这些渐进主义者用他们快节奏的术语叽叽喳喳，推行着一条目光短浅、显然会失败的企业议程。难怪人们会在走廊里大喊大叫。


    尽管拥有所有的战略远见，完美主义者却常常缺乏基本的公司常识和人际常识。是的，他们脑子里有一份五年的技术路线图，但对于如何开始推动这个议程、争取到必须参与的
    12 个关键人物，他们几乎毫无头绪。这就是为什么完美主义者常被误贴上"老顽固"的标签。没错，他们确实脾气不好，但这并非为了发脾气而发脾气，而是因为他们缺乏沟通和人际交往技巧来说服公司相信真理。


    ## 两种不同的咖啡因依赖


    我把渐进主义者和完美主义者的形象描绘得有些绝对化，但你需要知道还存在一些危险的变体，这些变体都是核心性格的"咖啡因突变体"。


    **渐进主义者**喝大量咖啡是因为他们对"行动"上瘾。沉溺于此意味着渐进主义者永远完不成任何事情。他们没有"完成"的概念，因为完成意味着行动停止，而谁想停下来呢？你需要注意的警示信号是：当渐进主义者面临难题时，他们不是去着手解决问题，而是不断想出新方法来应对问题。


    **完美主义者**喝大量咖啡是因为他们对"思考"上瘾。与渐进主义者不同，这些完美主义者实际上什么也不说，因为他们正在深入思考问题。现在，你需要给完美主义者时间来制定计划，但过了相当长一段时间后，你需要判断他们究竟是擅长握住球棒，还是擅长挥棒击球。


    一个沉默的完美主义者并不意味着他们无话可说——他们只是不太可能在计划完全成型之前开口。你的麻烦在于，当你的完美主义者陷入了创造性的战略"涅槃"状态时，此时真正完成某件事的重要性远不如去思考它。


    ## 现在你明白了吗？

    '
- fmt: '# It’s a really simple puzzle.


    One personality has all the skills necessary to get stuff done but isn’t exactly
    sure what to do. The other personality knows exactly what to do, but doesn’t know
    how to do it. Your job as a manager is to find and marry these personality types
    in your organization, because when they understand each other’s strengths, you’ve
    got a complete strategically tactical product team.


    Being incremental and being a manager means I’m looking for one thing out of the
    completionists on my team. I want to be sitting across the table from them seeing
    the look of understanding in their eyes, and the look says this: “Hey, I know
    what you’re about. I don’t trust it, but I understand that I need what you do,
    so I’m going to sit here, arms folded, and we’re going to figure out how to work
    together.”


    Both incrementalists and completionists are defined by a common goal. They both
    thrive on getting stuff done. This makes them essential to any corporate agenda
    and you want a diverse population of both. Yeah, they’re going to argue, but it’s
    the argument you want your teams to have. It’s not a fear-based “Should we or
    shouldn’t we?” it’s “Let’s do this thing, let’s make sure it gets done, and let’s
    make sure it gets done right.”


    # CHAPTER


    # Organics and Mechanics


    Stop. Grab a pencil and write down the first and last names of your past three
    managers. Stare at those names for a bit and relive those months or years of reporting
    to this person. I want your off-the-cuff opinion about each one. My guess is your
    opinion falls into one of three buckets:


    **I love this guy.** Best manager ever. I still talk to him on a monthly basis
    because this guy taught me everything I know about what I do. He is my mentor.


    **Mostly harmless.** This guy doesn’t really challenge me, but then again, he’s
    not really slowing me down. I’m not learning much, but I don’t have to put up
    with much bullshit. Also, I’m not sure what he actually does, but he leaves me
    alone … so … whatever.


    **Worst. Manager. Ever.** This guy makes my life a living hell. I dread our weekly
    one-on-one. I prepare for an hour and we still end up talking about random useless
    crap. It’s like we’re speaking a different language. I don’t know what he wants,
    and even if I did, I wouldn’t want to give it to him because I’m so annoyed. I
    mostly want to give him a poke in the nose.


    I want to talk about Worst Manager Ever because, chances are, you’re right… you
    are speaking a different language and he’s just as frustrated as you.


    As an individual contributor or a manager, you interact with two populations:
    those you work with and those you work for. The conversations with these two populations
    are distinct. With coworkers, you speak the Truth. You speak it because each of
    you are slogging it out in your respective trenches, so what good is there to
    say anything but the Truth?


    With managers, you speak the Way. The Way includes the things we shall do to achieve
    organizational enlightenment. “Verily, I shall scribe a specification and it will
    be a good thing” or “Yea, it came to pass, I say unto you, I am working weekends.”
    The Way is however you’re communicating up to your manager. It’s different content
    and it’s different tone, and if you believe you have the worst manager ever, then
    you’re not doing it right.


    In order to understand how to speak to your manager, you’ve gotta figure out how
    they acquire information, and chances are, they gather it either *organically*
    or *mechanically.*


    ## The Itch Perspective


    Your first job is to figure out whether you’re working with an organic or a mechanic.
    To do that, think of any problem as a very complex itch. Now, this is no normal
    itch, it’s a complex itch and scratching said itch is going to take some work.
    Here’s the inner dialog for a mechanic and then an organic regarding how they’re
    going begin their scratching:


    **Mechanic:** “An itch. Well. This itch seems familiar. In fact, I scratched this
    type of itch in January 2001. Let me first dig up my notes regarding that itching.
    Excellent. We’re going to need a matrix. The vertical column will be action items
    I can think of that will assess different scratching scenarios and the vertical
    axis will measure our progress against these different scenarios. OK, we’re going
    to need a meeting to form a committee …”


    **Organic:** “Wow, an itch. Hmmmm … well, this sucks. Hey Frank, we’ve got an
    itch … whaddya think? Yeah, that’s what I was thinking. You know, this itch seems
    familiar … I think I’m going to deeply consider this itch while I drive home,
    but first, where’s Mary? She knows all about itches and I bet she’ll have some
    ideas … I wonder what happens when I type itch in Google … *Hey …* there’s an
    idea …”


    Mechanics move forward methodically. They carefully gather information in a structured
    manner and store that information in a manner that makes it easiest to find again.
    They quietly observe, they stay on message, they are comfortably predictable,
    and they annoy the hell out of organics.


    Organics are all over the place. They tend to be loud and they can tell a joke.
    They ask seemingly meaningless questions. They lean forward when they talk to
    you. When confronted with a horrible situation, you’re going to think they’re
    insane because they appear to be still smiling.


    A large part of the interpersonal conflict at work can be summed up in the following
    scenario:


    An organic and a mechanic are staring at each other across the desk and are thinking
    the following:


    **Mechanic:** “This guy is walking chaos.”


    **Organic:** “This guy is totally uptight.”


    They are both right because they both violate each other’s sense of propriety.
    Knowing this solves half the problem. The other half is figuring out how the hell
    to communicate and that’s the hard part.


    Prior gig, four years ago. I was hired in by the CEO as a director while they
    continued to search for a VP of engineering. As an aside, let me stress how bad
    of a career move it is to *not* know who you are going to be working for when
    you arrive. The 30-minute interview you have with your future manager is a critical
    piece of information when you decide whether or not to make a move. Here’s why.


    The VP of engineering showed up a few months later and he seemed like a bright
    guy. Good technical background … a bit quiet for my taste, but I’m loud so we’ll
    balance out, right? Our first one-on-one showed up, so I grabbed my big, black
    notebook and plopped down in his office and *wham, holy micro-management.*


    “What’s going on with this? How is person X? What about person Y? Have we done
    XYZ task? No, why? Why again? No really, why?” Question question question data
    data my lord does this guy think I’m sitting around surfing the Web? OK, deep
    breath Rands, it’s his first week and he’s gathering information so I’m going
    to cut him slack. He’ll chill out once he realizes I’ve got things under control.


    Nope.


    One month later and the barrage of questions is nonstop. This guy peppers me with
    random questions and I consistently leave his office feeling like I’ve been doing
    nothing with *my 72-hour work week.* It’s a cop out to label this guy a micromanager.
    Great, he’s a micromanager. So what? I’m still going to walk out of his office
    on a weekly basis thinking I’m useless. He’s clearly mechanical, but so what?


    Remember, mechanical managers gather information in structured way. They do this
    because they aren’t great at relating to people, so they let the left brain take
    over as a means of content acquisition. This means that if you have a mechanic
    for a manager, you need to push the information in a structured, well-known, and
    consistent manner.'
  raw: 'It’s a really simple puzzle. One personality has all the skills necessary
    to get stuff done but isn’t exactly sure what to do. The other personality knows
    exactly what to do, but doesn’t know how to do it. Your job as a manager is to
    find and marry these personality types in your organization, because when they
    understand each other’s strengths, you’ve got a complete strategically tactical
    product team.


    Being incremental and being a manager means I’m looking for one thing out of the
    completionists on my team. I want to be sitting across the table from them seeing
    the look of understanding in their eyes, and the look says this: “Hey, I know
    what you’re about. I don’t trust it, but I understand that I need what you do,
    so I’m going to sit here, arms folded, and we’re going to figure out how to work
    together.”


    Both incrementalists and completionists are defined by a common goal. They both
    thrive on getting stuff done. This makes them essential to any corporate agenda
    and you want a diverse population of both. Yeah, they’re going to argue, but it’s
    the argument you want your teams to have. It’s not a fear-based “Should we or
    shouldn’t we?” it’s “Let’s do this thing, let’s make sure it gets done, and let’s
    make sure it gets done right.”


