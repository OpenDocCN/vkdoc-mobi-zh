    in limbo. The comfort of completion is a distant goal, but in the meantime, each
    weekend, I find something to start. A CSS tweak here, a new page there—the site
    may not be revolutionized, but it is certainly satisfying creative evolution.


    My guarantee is that what is going to make this bright-and-shiny thing awesome
    isn’t finishing. It’s all the little, unexpected details you discover trying to
    start. It’s all the small pieces of unexplainable execution that will not only
    make it yours, but also continue to teach you how you get things done. And when
    you’re done, you’ll discover that finishing, while cathartic, is just a good reason
    to go start something else.


