    cornered, you’re the Machine. The Dictator can serve you well, but it leaves your
    Jedi Master feeling … cruel.


    The solution to your Phil problem is likely not a single power move, but all of
    them—at the appropriate time. While the Dictator mandates a comfortably clear
    “Fire Phil,” the Jedi Master suggests, “Who does Phil communicate best with on
    his team? What can they tell you about him? How can they inform a Nudge?” which
    leads you to my favorite superpower—the Debate. While it’s not immediate, and
    the final Phil call is yours, it supports my core belief that an idea only gets
    better with more eyeballs.


    [¹](#9781430243144_Ch17.xhtml#fnt1) [www.randsinrepose.com/archives/2005/02/20/organics_and_mechanics.html](http://www.randsinrepose.com/archives/2005/02/20/organics_and_mechanics.html)


    [²](#9781430243144_Ch17.xhtml#fnt2) [www.randsinrepose.com/archives/2004/10/06/mandate_dissection.html](http://www.randsinrepose.com/archives/2004/10/06/mandate_dissection.html)


    CHAPTER


    Saying *No*


    Somewhere in your third year of being a manager, the management pixies will appear
    in your office in a puff of sweet-smelling black smoke. There will be three of
    them, and one will be carrying a gorgeous black top hat.


    “Are you LeRoy McManager?”


    “I am.”


    The pixies laugh. “Congratulations, you have passed successfully through three
    years of management and we’re here to reward you. But first, one question: Have
    you seen *Spider-Man?”*


    “The first one or the sequel?”


    “The first one.”


    “I have.”


    The pixies laugh again. “What do you think is the primary theme in *Spider-Man,*
    LeRoy McManager?”


    “Um, hmmmm … Life’s a bitch?”


    Strangely, the pixies don’t laugh. “No, try again. It’s important.”


    “OK, well. Hmmmm … Peter’s uncle said something they kept yammering about . . .
    *Oh, I know …* With great power comes great responsibility.”


    The pixies cheer and the one carrying the top hat flutters over to you and drops
    it in your lap. It’s soft and strangely warm. The hat-bearing pixie looks up at
    you and grins, “You wear this hat when you want people to know who you are.”


    “And who am I?” You look down at the hat and notice massive white block letters
    on the front. It says:


    I’M THE BOSS.


    A slow grin stretches across your face, and you realize the hat has the vague
    smell of your mom’s fresh baked bread. That smell has always given you a strange
    sense of confidence and you know that whenever you wear that hat, you’ll be infused
    with that sense of confidence.'
  trans: '

    # *绝地大师*拥有神奇的待人技巧


    *绝地大师*拥有神奇的待人技巧。他的口头禅是：“帮帮我，让我帮你。”他满心都是员工的福祉。他说：“员工是我们最宝贵的资源。”他厌恶冲突，因为冲突就像……扫兴的家伙。他想做你的哥们。他对冲突的回避让他产生了合理的多疑，但他把这种多疑埋藏在令人愉悦的关怀表象之下。他用心倾听，通常能如愿以偿，但你永远不太确定他是怎么做到的。


    我来告诉你他是怎么做到的——*绝地大师*会使用“`轻推`”。


    你甚至不会察觉到`轻推`的到来。事实上，你很难弄清楚它到底是什么时候发生的。*绝地大师*会说些无关痛痒的话：“菲尔，你觉得 X 项目的设计怎么样？”菲尔不会直接回答，而是坐在那里，茫然地凝视着。他在琢磨着……什么。如果你能听到菲尔在想什么，那会是这样的：*设计？设计两个月前就敲定了。已经完成了。为什么现在提起？是因为设计是我年度考核中谈到的事情吗？肯定是。为什么我感觉自己好像漏掉了什么？我得马上去找设计团队谈谈。*


    `轻推`是你能给出的最小、最具传染性的建设性反馈。它小到看起来毫无威胁，但它有足够的意图，足够的暗示，能在接收者心中生根发芽，并且必然会不断演化。


    处理一个`轻推`需要时间——这正是关键所在。成功接收`轻推`的人会感觉自己隐约捕捉到了什么，但没有具体细节。他们拥有了潜力，而且说不准什么时候他们会把这种潜力转化为行动，但当他们行动时，这个行动完全是他们自己的，因为所有工作都是他们完成的。而这正是关键所在。


    一个精心设计的`轻推`，是你关于人、领导力、政治以及你打算`轻推`的那个人的全部认知的巧妙结合。它是精心挑选一个简单的想法，旨在向某个（在这种情况下，除了自己之外不会听信任何人真相的人）缓慢揭示一个更大的意图。


    一个恰到好处的`轻推`简直是管理艺术的杰作。一个用错地方的`轻推`则是让你陷入团队麻烦的绝佳方式：


    -   目前为止，`轻推`是促成改变最慢的方式。如果时间紧迫，`辩论`会比`轻推`更快。但如果你想促成永久性的改变，那就用`轻推`。

    -   `轻推`不是游戏。其目标不是构建一个旨在混淆视听的小巧神秘的短语。`轻推`是你播下的一颗种子，希望它能朝着富有成效的方向生长。你要监控它，当它似乎迷失方向时，你就再次`轻推`。

    -   完全依赖`轻推`、选择用巧言妙语说话的*绝地大师*，会让人极其恼火。总有人会恼火，并要求你直截了当地告诉他们。记住，教训是学到的，而不是被告知的。（啪！）


    ## 可能需要采取严厉措施，所以……


    # *独裁者*拥有“`指令`”


    最后，是*独裁者*。他的口头禅是：“我就是告诉你事情是怎样的人。”要么听他的，要么滚蛋。没人反驳。没人争论。尽管他的命令在组织中传递时会被微妙地塑造和传达，但他对这些小变化浑然不觉，因为在他看来，他认为指令被逐字逐句地执行了。*独裁者*之所以能存在，是因为没人否认他能出结果这一事实。


    *独裁者*的超能力是`指令`，听起来就像这样：*我们现在都要爬上那座山，在所有人都到达山顶之前，我们绝不会停止爬山。开始爬吧。*


    然后每个人都开始爬了。没有`辩论`。没有`轻推`。甚至连那些坚决不爬山的人也放下手头的一切，开始愉快地爬山，一边唱着：“我们，爬山的人，多么刺激。”


    `指令`的力量是诱人的。它不需要管理`辩论`时那种费力的“赶猫入袋”式工作。它摒弃了构建恰到好处的`轻推`所需的微妙内心对话。`指令`是立即的、无可争议的行动，而如果被滥用，`指令`可能会让你丧命。


    当你使用`指令`时，你是在动用自己很大一部分的可信度。你实际上是在说：“闭嘴，去干”，而如果最终的结果出乎所有人的意料，那么你的领导力反而不如从前了。这是一个真实的*独裁者*经常忘记的重要事实。他们相信纯粹的个人魅力——绝对的、毫不动摇的信心——就是你为`指令`提供燃料所需的一切。然而，虽然有些人会因为有人做了决定而高兴，但如果`指令`产生了错误的结果，同样会有准备好干掉你的人。


    *独裁者*会被干掉。这是头衔带来的后果。这不是一种血腥的死亡，而是一种职业上的死亡——当你彻底透支了你的可信度时，员工不再听你的，最终离开；或者当你悍然表现出无法胜任时，董事会直接处理掉你。


    # 我最喜欢的超能力


    这些都是对领导力刻板印象的鲜明例子。虽然你可能会在这些生动的描述中看到自己或你管理方式的某些方面，但更有可能的是，每种特质都已是你的一部分。你有倾向成为一个*绝地大师*，但被逼到墙角时，你又是*机器*。*独裁者*这一面能很好地为你服务，但它会让你的*绝地大师*一面感到……残忍。


    解决你的菲尔问题，很可能不是靠单一的权力举动，而是靠所有招数——在适当的时候。当*独裁者*下达一个轻松明确的指令“解雇菲尔”时，*绝地大师*会建议：“菲尔在团队里和谁沟通最好？他们能告诉你关于菲尔的什么？他们如何能促成一次`轻推`？”这引导出我最喜欢的超能力——`辩论`。虽然它不立竿见影，并且对菲尔做最终决定的人是你，但它支持了我的核心信念：一个想法，经过越多人的审视，就会变得越好。


    ---


    1.  [www.randsinrepose.com/archives/2005/02/20/organics_and_mechanics.html](http://www.randsinrepose.com/archives/2005/02/20/organics_and_mechanics.html)

    2.  [www.randsinrepose.com/archives/2004/10/06/mandate_dissection.html](http://www.randsinrepose.com/archives/2004/10/06/mandate_dissection.html)


    # 章节


    # 说“不”


    在你做管理者的第三年左右的某个时候，管理小精灵会在一股香甜的黑烟中出现在你的办公室里。会有三个小精灵，其中一个会拿着一顶华丽的黑色高顶礼帽。


    “你是勒罗伊·麦克管理者吗？”


    “我是。”


    小精灵们笑了。“恭喜你，你已经成功通过了三年的管理考验，我们是来给你奖励的。但首先，问你一个问题：你看过《蜘蛛侠》吗？”


    “第一部还是续集？”


    “第一部。”


    “看过。”


    小精灵们又笑了。“你认为《蜘蛛侠》的主题是什么，勒罗伊·麦克管理者？”


    “嗯，呃……生活真他妈艰难？”


    奇怪的是，小精灵们没有笑。“不，再猜猜。这很重要。”


    “好吧，嗯。嗯……彼得的叔叔说过一句他们一直唠叨的话……*哦，我知道了……*能力越大，责任越大。”


    小精灵们欢呼起来，那个拿着礼帽的精灵飞到你身边，把帽子放在你的膝盖上。帽子很柔软，而且出奇地温暖。拿着礼帽的小精灵抬头看着你，咧嘴一笑：“当你想让别人知道你是谁的时候，你就戴上这顶帽子。”


    “那我是谁？”你低头看着帽子，注意到前面有巨大的白色粗体字母。上面写着：


    `我是老板。`


    你的嘴角慢慢咧开，露出了笑容，你发现帽子上有股你妈妈新烤面包的淡淡味道。那种气味总是给你一种奇怪的自信，你知道，每当你戴上那顶帽子，你就会被那种自信所充满。

