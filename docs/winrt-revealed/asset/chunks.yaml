  raw: 'Wait, don’t these holistics have product to ship? No, they have multiple products,
    but they’ve hired rock-star inwards to get the products built to specification
    and on time so they can focus on figuring out what to build next and who they’re
    going to need to build it.


    **Outwards:** These are the senior managers. VPs, CEOs. The biggest misconception
    regarding outwards is what they care about. You’d think their number one priority
    would be the care and feeding of the company. Wrong. The well-being of the company
    is the responsibility of the holistics. The holistics are the ones who are spending
    all the time sniffing around the hallways, gathering internal competitive intelligence,
    and building empires out of talented inwards.


    The outward’s vision is focused on the outside world. They care about the public
    perception of the company, the company’s relationship with its customers, the
    financial community, the world. That’s why they’re never at headquarters, they’re
    off telling other people what a great job all those holistics and inwards are
    doing. I’m not suggesting that outwards don’t care about the daily professional
    shenanigans within the company; they do, but they’ve also hired a group of rock-star
    holistics to run their company. The rub is this: while it’s not their job to run
    the company on a daily basis, they are accountable for it. Tough gig.


    Agenda Confusion


    These titles get more confusing when you realize that a manager can have two titles.
    First, there’s the title they give themselves and, second, there’s the perception
    of the rest of the organization. In a healthy organization, these roles are the
    same, but most organizations just aren’t healthy


    An example: You might be working for a manager who fancies himself a holistic
    when the organization has him pegged as an inward. This means he’s out combing
    the hallway looking for strategic advantage when he should really be paying attention
    to you, the senior engineer who has indicated, loudly, “There is no way this product
    is going to ship on time.” My first thought is this is both an opportunity and
    a problem. The problem is that your manager isn’t paying attention to his primary
    job, but the opportunity is that you are.


    A variation of this confusion is when a title has been granted, but is not being
    used. How about when an inward has been forced into a holistic role via a promotion?
    How are these guys going to screw you? Well, it’s not going to be through action,
    it’s going be through inaction. See, as an inward, they don’t care about the political
    intrigue over in building 27, they want to design and ship product, they want
    to dive into the details. Problem is, the political intrigue over in building
    27 will ultimately determine that your product is irrelevant. Now you’re out of
    a job because your manager’s manager didn’t attend that cross-functional meeting
    because what he really wanted to do was code. Sorry about that.


    Possibly the worst example of this confusion is also one of the biggest reasons
    for micromanagement. When you’re being micromanaged, it means two things: first,
    it feels like you’re doing unnecessary work, and second, you feel the person asking
    you to do this work is being unreasonable. You’re right on both counts. Micromanagement
    is often a result of a manager jumping from one management class to another. Maybe
    it’s an outward who is getting panicky at the end of a result cycle, so he starts
    acting like an inward. Problem is, everyone knows he’s an outward. He sounds like
    an outward and talks like one, too. Sure, everyone is happy to get some face time
    with the CEO, but everyone is also wondering why he isn’t doing his job—running
    the company.


    Watch for Growth


    The progression from inward to holistic to outward is a strategic one. A junior
    manager starts out caring about the quality of one product and, if they continue
    to grow, they end up caring about the health of an entire company. Watching this
    growth is essential to your own professional growth.


    What you need to know about your manager is how much he cares about this growth
    and, more importantly whether he sees this as his growth opportunity or the team’s.
    Junior inward managers invariably figure out the responsibility and power held
    by the holistics and outwards, and when they do, you want to watch them carefully.
    There is a spectrum here with “advantage for the team” on one side and “advantage
    for the manager” on the other. Eager young managers who spend all their time looking
    for advantage for themselves are going to screw the team at some point because
    of their razor focus on themselves. Are they feeding you the bits of information
    they find or are they keeping it to themselves? If you’re not learning something
    new in each and every staff meeting, you might have a selfish climber on your
    hands.


    Perhaps your manager doesn’t care about growth. Your gut instinct might be that
    this is a bad situation since working for a manager who isn’t interested in growing
    isn’t going to grow his team. Maybe. Maybe your stagnant inward is a seasoned
    manager who spent time getting beaten up as a holistic or an outward. Maybe they
    got tired of endless information acquisition or maybe they’re just great engineers
    who love to code. Personally, I think these types of inwards are phenomenal employees
    and managers because they have a wealth of experience. The question is, are they
    passing that experience on to you and making sure that you’re growing?


    My preference is to stock my team with holistic managers and inwards geared to
    become holistics. While an experienced, steady inward is a reliable manager, I
    prefer the enthusiasm of employees who are ready for the next thing, especially
    when the next thing for them is my job.


    CHAPTER


    Free Electrons


    Back in my Borland days, we were working hard on Paradox for Windows. I was a
    QA engineer testing the database creation and modification functionality. Jerry,
    my counterpart in engineering, was working hard, but getting absolutely nowhere.


    We were mid-to-late in a 1.0 product cycle, and most of the engineers were slowly
    moving from development into bug-fix mode, but not Jerry. He was still implementing
    … over and over again. You are screwed because you’ve given a critical task to
    someone who is utterly unable to complete it.


    Now, let’s first give Jerry a break. He was a fine programmer, but he had two
    major strikes against him. First, Jerry had never programmed for Windows, so he
    was learning while he was coding. Second, this was also a 1.0 product. [Chapter
    19](#9781430243144_Ch19.xhtml) of this book is titled “1.0,” but its actual title
    should be, “1.0 spelled one point oh my god I’m never going to see my family again.”
    I’ll summarize: 1.0 is incredibly hard, and combined with his Windows inexperience,
    Jerry was in trouble.


    Yet, Jerry had pride. Jerry believed that he could pull it off, but being on the
    receiving end of his code, I observed a disturbing coding practice, which we’ll
    call “moving crap around on your plate.” Jerry’s approach to fixing his bugs was
    to move his code around in interesting ways, much the way you used to shove food
    around on your plate in a feeble attempt to convince your mom that you actually
    ate your beets. Nothing substantially changes; it just looks different. Another
    name for this coding practice might be “coding by hope.”


    The end result with Jerry’s code was that each time he’d fix something we’d discover
    another fundamental problem with the feature. Yes, small, incremental progress
    was being made with each bug fix, but Jerry was in a losing situation because
    his basic architecture was crap. When asked for status, his lists of excuses were
    astonishingly lengthy and believable. They were the excuses of a person who honestly
    believed he could pull it off and was willing to put in the hours to do it. But
    all the hours in the world weren’t going to help Jerry because he was in over
    his head.'
