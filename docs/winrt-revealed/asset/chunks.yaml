- fmt: '# This isn’t the CEO that built the company. He’s been gone for over a year.
    This is the guy the board of directors brought in to sell the startup. Sure, he
    tried to turn us around, but remember, we’re in the middle of a financial nuclear
    winter here. Money is no longer free.


    Those who got a glimpse of the CEO’s resume before he arrived knew the gig was
    up. His last four jobs ended in the company being finely sliced into nothingness.
    It’s called “maximizing shareholder value.”


    And here we are. Hammered on tequila, the last four of us from engineering, two
    guys from tech support … and the CEO. Even though we’re dizzy with booze, we’re
    fundamentally uncomfortable with the presence of our CEO because we consider him
    to be an unfeeling prick.


    And that’s it.


    That’s the basic truth behind my management book. It’s also a great title.


    *Don’t Be a Prick.*


    Right, so my editors will probably have an issue with the word “prick” in the
    title. So we’ll call it a working title.


    The CEO in question is actually not a prick. Good guy. Straight talker. Good financial
    sense. Many failing companies did a lot worse than ours, but that isn’t the point.
    The reason we sat there drunk and uncomfortable was because we had absolutely
    no connection with this guy. He was the mechanical CEO.


    My definition of a great manager is someone with whom you can make a connection
    no matter where you sit in the organization chart. What exactly I mean by *connection*
    varies wildly by who you are and what you want. And, yes, that means great managers
    have to work terribly hard to see the subtle differences in each of the people
    working for them.


    See. See the people who work with you. They say repetition improves long-term
    memory, so let’s say it once more. You must *see* the people who work with you.


    If you don’t have an inkling of what I’m talking about yet, it might be a good
    time to set this book down and head over to the programming section of the bookstore,
    because it’s time to reconsider that pure engineering career track. Being a manager
    is a great job (I mean it), but it’s your ability to construct an insightful opinion
    about a person in seconds that will help make you a phenomenal manager. Yes, in
    a technical management role, you need both the left and right sides of the brain,
    but just because you write great code doesn’t mean you’re going to have a clue
    about how to lay off 70 percent of your staff.


    Every single person with whom you work has a vastly different set of needs. Fulfilling
    these needs is one way to make them content and productive. It is your full-time
    job to listen to these people and mentally document how they are built. This is
    your most important job. I know the senior VP of engineering is telling you that
    hitting the date for the project is job number one, but you are not going to write
    the code, test the product, or document the features. The team is going to do
    these things, and your job is managing the team.


    Silicon Valley is full of wildly successful dictators. These are the leaders who
    are successful even though they are world-class pricks. This book is going to
    push you as far from prickdom as possible, and if that means I’m decreasing the
    chance you’ll end up on the front page of the *Wall Street Journal* labeled a
    “corporate bulldog with vision,” well, I’ve done my job.


    You get to choose the type of manager you will be, and if you want to work with
    your team—if you want to learn from them, if you want them to trust you—well,
    I’ve got some advice for you. Lots of it. Keep reading.


    Again, the CEO at the startup was not a prick. He just showed up at the company’s
    wake and assumed that we’d be comfortable with his presence because *he was the
    CEO.* We knew he was CEO. More importantly, we knew he’d spent exactly zero time
    using our products. We’d never seen him there on the weekends. Come to think of
    it, he was never there on Fridays either, because he commuted from another state.
    We had no shared experience with him other than three strange meaningless all-hands
    meetings filled with slide projectors, spreadsheets, and monotony.


    The CEO believed that these spreadsheet-laden, all-hands meetings was all the
    connection he needed to build a relationship and, for the duration of those meetings,
    he was right. We felt well informed after his meetings, but our needs were different
    a week later when rumors of layoffs started up. They were drastically different
    a month later when that layoff went down and the CEO was nowhere to be seen. *Prick.*


    Organizations of people are constantly shifting around. They are incredibly messy.
    In this mess, judgments of you and your work will be constructed in moments—in
    the ten-second conversations you have in the hallway, and in the way you choose
    to describe who you are.


    Meanwhile, you need to constantly assess your colleagues, determine what they
    need, and figure out what motivates them. You need to remember that what worked
    one day as a motivational technique will backfire in two months because human
    beings are confusing, erratic, and emotional. In order to manage human beings
    in the moment, you’ve got to be one.


    And that’s why a better title for this book is: *Managing Humans.*


    # CHAPTER


    ## Managers Are Not Evil


    A trusted employee, who has been working in my group at the startup for years,
    asks, “What, exactly, do you do?”


    Slack.


    Jawed.


    Amazement.


    This guy always tells me the straight dope, so I knew he was asking because he
    honestly does not know.


    Let’s recap my day. I got to work just after 8 a.m. After my usual 30 minutes
    of scrubbing and answering e-mail, I did a quick check of tech news, taking a
    quick pulse of the planet, and then it’s off to my first meeting. It’s my boss’s
    staff and it runs for almost two hours as usual. After that meeting, I spend 30
    minutes digesting notes from that meeting into actual tasks for myself and the
    team while also tidying the corporate news I received for my own staff meeting.


    Lunch. I ate with the web applications team today. It’s 30-plus minutes and then
    I’m back for bug database scrubbing—a daily 30-minute task before a cross-functional
    meeting that turned ugly. I needed someone to do something and they are incapable
    of doing it and that means I’m screwed. After that 60-minute debacle, I’ve got
    an hour and a half of one-on-ones. It’s during this time that I am asked the lamest
    question ever: “What, exactly, do you do?”


    My first reaction to this question is the wrong one. I want to leap over the table,
    grab my friend by the shoulders, shake him, and yell, *“While you were uselessly
    staring at that one bug this morning, I was keeping this organization moving,
    pal.”* My second reaction is to take a deep breath, so I do.


    This basic what-do-you-do disconnect between employees and managers is at the
    heart of why folks don’t trust their managers or even find them to be evil.


    ## There Is Evil


    My background: I’ve worked at six different companies in the past 20 years. In
    those years, I’ve had ten different jobs ranging from QA engineer to director
    of engineering. Similarly I’ve worked for a variety of managers, from first-line
    managers to CEOs. I’ve never worked outside of engineering, but, especially in
    the senior management roles, I’ve been exposed to the inner workings of the vastly
    different functional groups that make up a company.'
