    1. 使用开发环境来构建产品。这意味着你必须熟悉你团队的工具，包括构建系统、版本控制和编程语言。这个任务会让你与你的团队用来讨论如何完成工作的语言保持联系。它也会让你能够继续使用你最喜欢的文本编辑器……这太棒了。

    '
- fmt: '2.  Be able to draw a detailed architectural diagram describing your product
    on any whiteboard at any time. I’m not talking about the three-boxes-and-two-arrows
    versions. You need to know the detailed one, the hard one that isn’t pretty and
    is tricky to explain. This is your map for understanding just about everything
    about your product. It changes over time and you should be able to understand
    why those changes are occurring.


    3.  Own a feature. I’m literally cringing as I write this because it is fraught
    with danger, but I don’t think you can really do #1 or #2 without a feature that
    is yours. Owning a feature not only forces you to actively participate in the
    development process, it also switches your context from “manager responsible for
    everything” to “person who owns a thing.” This is a humble, unassuming perspective
    that will remind you about the importance of small decisions.


    I’m still cringing. Someone is already yelling at me, “Managers owning features?!?!”
    (And I agree.) You are still a manager, so make it a small feature, OK? You’ve
    still got a lot to do. If you can’t imagine owning a feature, my backup advice
    is to fix some bugs. You won’t get the joy of ownership, but you’ll gain an understanding
    of the construction of the product that you’ll never get walking the hallway.


    4.  Write unit tests. I still do this late in the product cycle when folks are
    losing their minds. Think of it as your checklist for understanding what your
    product does. Do it often.


    Next concern?


    - “Rands, if I code, I’m going to confuse my team. They’re not going to know if
    I’m a manager or a developer.”


    Good.


    I mean it. I’m happy you’re about to confuse your team by swimming in the developer
    pool. The simple fact is that well-defined roles in software development are fading.
    User-interface guys are doing what can only be called development in JavaScript
    and CSS. Developers are learning more about interaction design. Everybody is talking
    to everybody else and they’re learning from each other’s mistakes, stealing each
    other’s code, and there is no reason that a manager shouldn’t be participating
    in this massive global cross-pollination information cluster-fuck.


    Besides, you want to be a part of a team of interchangeable parts. Not only does
    this make your team more nimble, it presents each person with the opportunity
    to see the product and the company from a vastly different perspective. How much
    more are you going to respect quiet Frank the Build Guy when you see the simple
    elegance of his build scripts?


    I’m not wishing confusion and chaos on your team. I’m actually wishing better
    communication on it. My belief is that if you are building the product and touching
    the features, you’ll be closer to your team. But, more importantly, you’ll be
    closer to how software development is constantly changing in your organization.


    ## Don’t Stop Developing


    A coworker at Borland once verbally assaulted me for calling her a coder.


    - “Rands, a coder is mindless machine. A monkey. A coder does nothing relevant
    except lay down boring lines of useless code. I am a software developer.”


    She was right and she would’ve hated my advice for new managers to stop coding.
    Not because I was suggesting that they were coders, but more that I was proactively
    telling them to start ignoring one of the most important parts of their jobs:
    software development.


    So, I’ve revised my advice. If you want to be a good manager, you can stop coding
    daily, but …


    *Stay flexible, remember what it means to be an engineer, and don’t stop developing.*


    ## CHAPTER


    ## Three Superpowers


    Phil’s team is adrift.


    Phil is smart and meeting-friendly, but he’s a crap people manager, and that crappiness
    is slowly poisoning his team. You know how bad it is because the star of Phil’s
    team finds ways to schedule meetings with you where the story is always the same:
    “He’s smart, but he is genetically incapable of managing people. We’re three weeks
    away from full-on revolt unless something changes.”


    In the field, Phil’s team waits … waits until whatever impending disaster has
    fully arrived before they grudgingly say, “Well, OK, huh, we should probably handle
    that … now?”


    Frustratingly and confusingly, one-to-ones with Phil feel like progress. He says
    all the right things. He accepts responsibilities for failures and articulates
    compelling next steps that he assures you will improve the situation. But there
    is a wide strategic gap between those meetings and Phil’s daily management judgment.
    The actions do not match the words, and each Monday morning arrives with the realization
    that *Phil still isn’t getting things done, the stars on his team are about to
    quit, and I have no idea what to do.*


    You need a new superpower.


    ## Three Superpowers


    You have a natural management state. This is the default state that is the foundation
    of how you make your decisions, the tone with which you run your meetings, and
    the personality you wear as you talk in the hallway. The state has served you
    well; you’re comfortable with it because it is you.


    Unfortunately, this natural state is the source of your Phil confusion. Your natural
    state is blinding you to the obvious course of action. Your instincts are wrong.
    You need to be someone you are not to radically change your perspective.


    Here are three personalities, each with its own perspective, and, more importantly,
    its own superpower:


    ### The Machine has the Debate


    *The Machine*: Our classic mechanic.^([1](#9781430243144_Ch17.xhtml#fn1)) Her
    mantra is, “Without a plan, there is no hope.” She’s convinced that the whole
    world is measurable. She follows the process because only by strict adherence
    to the process can we truly generate a meaningful measurement to clearly understand
    whether we are winning. The Machine’s understanding of the process and the necessity
    of it are unparalleled. The Machine loves to debate; she loves to consider all
    options, but when she’s decided, it’s over. There’s no changing her mind.


    When the Machine wants something done, she uses the Debate. The Debate starts
    with data. *Each of you. Please explain to me in excruciating detail the last
    ten incidents of Phil being an incapable people manager, and understand that I
    will ask follow-on questions until our understanding is complete.*


    The Debate continues with hypotheses. *Synthesizing our cornucopia of data, I
    put forth the following hypothesis, entitled “Three things we shall do to improve
    the blight of Phil.” I expect everyone involved to challenge these hypotheses.
    But be warned, arguments based on feeling rather than fact will be terminated.*


    If a hypothesis is successfully defended, it becomes law, and the Debate is over.
    If it fails, the Debate continues. A well-run Debate results not only in the truth
    being vetted, but, more importantly, a consensus being built around this truth,
    which sounds delightful, except for these caveats:


    - If the natives are looking for action, the Debate can look like stalling. If
    your Phil situation is dire, a four-week analysis of the Phil blight may not be
    the response the folks who are about to quit are looking for.

    - If the issue is deeply emotional, the Debate is a nearly insurmountable task.
    People are messy—especially a group of emotional, angry people—and while they’ll
    be happy to vent about Phil’s failings, turning the vent into a constructive Debate
    can take an intolerable amount of time.

    - The Debate lacks art. While a good Debate thoroughly vets the validity of a
    hypothesis, it rarely leads you toward innovation or a leap of faith. The whole
    point of the Debate is to develop the best possible theory regarding how to proceed,
    and, in my experience, that process leads you to a credible, actionable plan that
    feels simply like common sense, not inspiration.


    This is why …


    ### The Jedi Master has the Nudge'
