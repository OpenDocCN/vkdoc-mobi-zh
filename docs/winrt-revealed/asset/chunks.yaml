- fmt: '# The Rands Test


    When the first layoff hit Borland, I was two years into my QA stint. I don’t remember
    wondering what a layoff was and I don’t remember wondering if I was going to lose
    my job. What I remember is that the senior VP of applications walked around the
    building, gathered the product team up, and then told us the straight dope about
    the layoff … in the hallway. This is what the layoff is about, this is who is
    affected, and this is when it’s happening. I’d never interacted with Rob, the
    VP, in my life and, come to think of it, I never really interacted with him again.
    Still, I think fondly of the guy because during a time of stress, he illuminated.
    He didn’t obfuscate.


    A successful organization is built of layers of people that are glued together
    with managers. Each layer is responsible for a broad task, be it engineering or
    QA or marketing. Between each layer is a manager whose job it is to translate
    from one layer to the next … in both directions. He knows what his employees want.
    He knows what his manager wants, and he’s able to successfully navigate when those
    wants differ.


    The way he navigates these waters is by knowing the answer to two questions. Question
    #1: Where did I come from? Being able to relate to those you manage comes from
    intimately understanding their job. It allows you to speak their language. Question
    #2: Where am I going? A plan for your manager’s next big move is his incentive.
    It puts him in the uncomfortable position of trying to discern the murky political
    motivations of the major influencers of your company. It might not be a skill
    set he has, but he’s never going to stop trying because he knows where he wants
    to go. He’s got a map defined by his motivation.


    Why do you care that your boss wants to be VP of software? You care because his
    success is your success. If he doesn’t know that, he might be evil.


    # The Rands Test


    It’s hard to pick a single best work by Joel Spolsky, but if I were forced to,
    I’d pick “The Joel Test: 12 Steps to Better Code.”^([1](#9781430243144_Ch03.xhtml#ftn1))
    It’s his own, highly irresponsible, sloppy test to rate the quality of software,
    and when anyone asks me what is wrong with their team, I usually start by pointing
    the questioner at the test. *Start here*.


    It’s a test with 12 points, and, as Joel says, “A score of 12 is perfect, 11 is
    tolerable, but a 10 or lower and you’ve got serious problems.” More important
    than the points, his test clearly documents what I consider to be healthy aspects
    of an engineering team, but there are other points to be made. So it is completely
    an homage to Joel that I offer the Rands Test.


    I was employee number 20 at the first start-up I worked at, and the first engineering
    lead. Over the course of two years, the team and the company exploded to close
    to 200 employees. This is when I discovered that growing rapidly teaches you one
    thing well: how communication continually finds new and interesting ways to break
    down. The core problem centers on the folks who’ve been around longer and who
    also tend to have more responsibility. As far as they’re concerned, the ways they
    organically communicated before will remain as efficient and simple each time
    the group doubles in size.


    They don’t. A growing group needs to continually invest in new ways to figure
    out what it is collectively thinking so anyone anywhere can answer the question,
    “What the hell is going on?” This is the first question the Rands Test answers.
    As I’ll explain shortly, the second question the Rands Test helps you answer is
    selfish. The second asks, “Where am I?”


    ## The Rands Test: 11 Possible Points


    Let’s start with bare-bones versions of the questions, and then I’ll explain each
    one.


    - Do you have a one-on-one?

    - Do you have a team meeting?

    - Do you have status reports?

    - Can you say no to your boss?

    - Can you explain the strategy of the company to a stranger?

    - Can you explain the current state of business?

    - Does the guy/gal in charge regularly stand up in front of everyone and tell
    you what he/she is thinking? Are you buying it?

    - Do you know what you want to do next? Does your boss?

    - Do you have time to be strategic?

    - Are you actively killing the Grapevine?


    ---


    ![images](images/sq.jpg)  **Note** While I’ll explain each point from the perspective
    of a leader or manager, these questions and their explanations apply equally to
    individuals.


    ---


    ### Do you have a consistent one-on-one where you talk about topics other than
    status? (+1)


    I think you’d be hard-pressed to find anyone who would suggest one-on-ones are
    a bad idea, but the one-on-one is usually the first meeting that gets rescheduled
    when it hits the fan. I’m of the opinion that when it hits the fan, the last thing
    you want to do is reschedule one-on-one time with the folks who either are responsible
    for it hitting the fan or are the most qualified to figure out how to prevent
    future fan-hittage.


    Furthermore, as I wrote about in [Chapter 6](#9781430243144_Ch06.xhtml), “The
    Update, the Vent, and the Disaster,” conveyance of status is not the point of
    a one-on-one; the point is to have a conversation about something of substance.
    Status can be an introduction, status can frame the conversation, but status is
    not the point. A healthy one-on-one needs to be strategic, not a rehashing of
    tactics, status, and data that can easily be found elsewhere.


    A one-on-one is a weekly investment in the individuals that make up your team.
    If you’re irregularly doing one-on-ones or not making them valuable conversations,
    all you’re doing is reinforcing the myth that managers are out of touch.


    ### Do you have a consistent team meeting? (+1)


    The team meeting has all the requirements of the one-on-one—consistency and a
    focus on topics of substance—but don’t give yourself a point just yet.


    Status does have a bigger role in a team meeting. As I’ll talk about shortly,
    the Grapevine is a powerful beast, and a team meeting is a chance to kill messages
    it transmits. I have a standing agenda item for all team meetings that reads “gossip,
    rumors, and lies,” and when we hit that agenda item, it’s a chance for everyone
    on the team to figure out what is the truth and what is a lie.


    After that’s done, my next measure of a team meeting is, Did we make tangible
    progress on something? I don’t know what you build, so I don’t know what’s broken
    on your team, but I do know that something is broken, and a team meeting is a
    great place to not only identify the brokenness, but also to start to discuss
    how to fix it.


    If you’re killing lies and fixing what’s broken in a team meeting, give yourself
    a point.


    ### Are handwritten status reports delivered weekly via e-mail? (–1)


    If so, you lose a point. This checklist is partly about evaluating how information
    moves around the company, and this item is the second one that can actually remove
    points from your score. Why do I hate status so much? I don’t hate status; I hate
    status reports.


    My belief is that e-mail-based status reports are one of the clearest and best
    signs of managerial incompetence and laziness. There are always compelling reasons
    why you need to generate these weekly e-mails. *We’re big enough that we need
    to cross-pollinate. It’s just 15 minutes of your time.*


    Bullshit. The presence of rigid, e-mail-based status reports comes down to control,
    a lack of imagination, and a lack of trust in the organization.'
