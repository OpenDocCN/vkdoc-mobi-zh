- fmt: '# The Act of Delegation


    The act of delegation is a slippery slope for managers. Yes, you want to figure
    out how not to be a bottleneck in your organization and, yes, you want to figure
    out how to scale, but you also want to continue to get your hands dirty. Members
    Only’s problem was he believed his job was purely strategic. Think big thoughts;
    delegate the results of those thoughts to the minions. He was a pure delegator
    and he’d forgotten how to do real work.


    Pure delegators are slowly becoming irrelevant to their organizations. The folks
    who work for pure delegators don’t rely on them for their work because they know
    they can’t depend on them for action. This slowly pushes your manager out of the
    loop and, consequently, his information about what is going on in his organization
    becomes stale. Then, the CEO walks into your boss’s office and asks, “How’s it
    going?” The third time your boss gives the same generic answer, the CEO goes to
    you and asks the same question. When you respond with, “Well, we’re fucked,” the
    CEO has an entire other conversation with your manager.


    Real work is visible action managers take to support their particular vision for
    their organization. The question you need to answer for your manager is simple:
    does he do what he says he’s going to do? Does he make something happen?


    ## Where Is Your Manager in the Political Food Chain?


    Back at Netscape, Internet Explorer was threatening, but we were under the illusion
    the sky was not falling. We were merrily planning the next release of the browser
    under the assumption that Microsoft was going to somehow screw up their browser.
    Besides, it wasn’t about the browser anymore; it was about owning the entire desktop.
    Yes, someone was actually suggesting the browser wasn’t an application; it was
    an *operating system, people.* The perception of unlimited money makes people
    stunningly stupid, by the way. Anyhow, of course, everyone at Netscape wanted
    to be on the “next-generation browser” project. We were just waiting for the execs
    to crown a director to run the effort.


    When the promotion came and it was some engineering manager from an acquired company
    we’d never heard of, heads were scratched. Until that time, the core engineering
    team at Netscape was a private club. We’d expected one of our long-time proven
    managers to the lead the effort. Nope, Mike the New Guy got it and, in a week,
    he went from no name to the hottest ticket on Middlefield Road.


    What happened? Well, turns out the engineering managers were playing a lot of
    roller hockey and, while they played, Mike the New Guy was working it. He was
    chatting it up with the execs, getting to know the relevant *players, pawns, and
    free electrons* in the organization (see [Chapter 9](#9781430243144_Ch09.xhtml)
    for more about players and pawns, and [Chapter 38](#9781430243144_Ch38.xhtml)
    for more on free electrons). Mike the New Guy was hungry. He was driven, and after
    six months of incessantly demonstrating this hunger, the execs gave him the keys
    to the executive washroom. Mike the New Guy was a made guy.


    Just like delegation, the act of navigating politics in an organization is slippery.
    The difference between a manager who knows what’s going on in an organization
    and one who is a purely politically driven slimeball is thin. But I would take
    either of those over some passive manager who lets the organization happen to
    him. Politically active managers are informed managers. They know when change
    is afoot and they know what action to take to best represent their organization
    in that change.


    Of all the questions in this chapter, understanding your manager’s place in the
    political food chain is the trickiest because you’re often not in the meetings
    where he is interacting with his superiors. Those are the situations where you
    understand what their view is of him and, therefore, his organization. The next
    best gauge of your manager’s political clout is cross-functional meetings where
    his peers are present. How are they treating him? Is it a familiar conversation
    or are they getting to know him? Should they know him? If it’s his meeting, is
    he driving it? If it’s not his meeting, can he actively contribute?


    The organization’s view of your manager is their view of you. I’m glad you’re
    a `C++` rock star, but the problem is, your manager is a passive non-communicator
    who doesn’t take the time to grok the political intrigue that is created by any
    large group of people. I see him as a non-factor and you’re living in the shadow
    of a non-factor.


    Sorry.


    ## What Happens When They Lose Their Shit?


    Pride and panic. The two delicious ends of the management spectrum. Pride is when
    it’s going swimmingly. Great product release, selling well. Hired that phenomenal
    guy from the other group who is going to totally write us another fabulous product.
    More requisitions in the pipeline. Golly, I can’t imagine it going better, can
    you?


    Getting to pride is usually the end result of a lot of work and a little luck.
    What you can learn from your manager in this phase is how they’ll deal with that
    swelling head of theirs. Do they take care of those who got them there? Do they
    have a plan for what’s next? All of these are interesting developments, but they
    don’t show you half as much as panic and there is no bigger panic than a layoff.


    Your manager is not a manager until he participated in a layoff. I mean it. I
    know he fired that one Fez and he hired a bunch of the team, but those are individual,
    isolated activities (see [Chapter 41](#9781430243144_Ch41.xhtml) for more about
    the Fez). He hasn’t truly represented the company until he actively participates
    in the constructive deconstruction of an organization. There is no more pure a
    panic than a layoff, and you want to see who your manager will become because
    it’s often the first time he sees the organization is bigger than the people.


    A layoff is a multi-month affair. By the time it’s been announced on the front
    page of CNET, it’s been bouncing around the boardroom and your boss’s staff meeting
    for a couple of weeks. This means your boss has been staring at you for the past
    couple of weeks in one-on-ones and ignoring everything you say because he’s trying
    to figure out how to lay off half of his staff. You are very interested in who
    he becomes during this time because that is actually the person you’ve been working
    for these past few years.


    Once you’ve got a confirmed layoff, you need to go back to each of the questions
    on this list and ask them again. How is he talking to you? How is he talking with
    the organization? What is he doing to make up for the fact that pretty much everything
    stops in a company when a layoff is leaked? Is he staying politically active?
    Or is he checking out? All of these observations teach you about your boss and,
    conveniently, give you insight into whether or not you should be looking for another
    gig.


    Panic backs a person into a corner and their only means of getting out of that
    corner is relying on skills that have worked for them in the past. This is how
    a normally friendly manager can turn into a backstabbing asshole when it comes
    to a layoff. See, they were an asshole before; you just weren’t there to see it.
    If you are lucky enough to see this behavior as well as make it through the layoff,
    well, you learned two things. First, this guy I work for degrades to jerk when
    the sky falls. Second, he values me enough to keep me around. The question remains:
    are you going to hang around waiting for him to be a jerk to you?


    ## The Big Finish'
