  trans: "  \n**一旦你完成了所有主动的内容获取，向陌生人推介过，也反复书写过几次，你就需要停止主动思考这个问题。** 把便签从屏幕上撕下来，把桌面上的第二稿藏起来，就此打住。是的，你确实需要做出决定，需要对问题给出回应，虽然我在说要清除所有主动沉浸的实物痕迹，但你并不会真正停下。你停不下来，你的大脑不允许。\
    \  \n\n回到你朋友发来的那封挑衅邮件。你以前收到过这种邮件，知道最错误的做法就是立刻回复。当然，你的动物本能迫不及待地想这么做，因为*反击的感觉真爽*，但这从来都不是正确的举动，因为你的动物本能在自我防卫，它解决的只是证明*嘿，我反击得够狠吧？*\
    \ 我对这类挑衅邮件和艰难决定的建议是一样的——睡一觉再说。  \n\n一夜安眠是平复情绪、转变看问题角度最好的方式之一。你有没有在夜里觉得天都要塌了，醒来却发现支撑天空的方法其实简单又美好？这是怎么发生的？答案是，你的大脑从未停止工作。更妙的是，它有一种独特的能力，在你最不经意的时候，潜意识地构建出解决难题的优雅方案。你可以称之为灵感，也可以称之为直觉，但别长时间盯着它看，因为这是一种害羞的能力。当没人注意到它时，它才最能发挥作用。\
    \  \n\n### 沉浸需要时间  \n\n别告诉我同事，但我大部分的薪水都是在早上开车上班的 40 分钟里赚到的。我端着咖啡上车，驶上公路，让思绪随着播放的音乐任意游荡。我从不刻意去想：“好吧，菲尔昨天把我气得够呛……我该怎么处理？”我的思绪随意跳跃，四处碰撞，我从不知道它会落在哪里。不过，如果前一天我已经花时间主动沉浸在“菲尔问题”中，那么我的漫游思绪往往最终会落在与菲尔相关的地方，有时，这段心灵之旅会带来一丝灵感的火花。\
    \  \n\n作为实操建议，“沉浸”有时显得很单薄。如果你的老板正等着你对一个关键决策表态，我并不是建议你说：“我完全不知道该怎么办，我要去问些愚蠢的问题，向陌生人推销，写下来再扔掉，然后忘掉我所做的一切。”我想说的是，任何重大决策、任何重大问题，都值得花时间和深思。如果你有多年经验，大概能应付自如，但你仍然会遇到一些情况，正确的做法不是马上下决定，而是去思考。\
    \  \n\n毫不夸张地说，“沉浸”是我工作中最喜欢的部分。我在沉浸时所做的，是一种创造行为。这是设计工作，是战略规划。这是从问题中剥离情绪和无知，然后构建出一个原创的解决方案，向我的同事表明，我真正在乎我所做的事。\
    \  \n\n---  \n\n## 章节  \n\n### 管理马尔科姆事件  \n\n人们对原版《侏罗纪公园》的狂热，很大程度上源于影片对逼真电脑动画的承诺。这对工程师来说是双赢。我们不仅唤起了青春期前的恐龙情结，还能看到第一部恐龙真正登场的电影，而且，是用*我们编写的工具*做的。好吧，我当时在\
    \ Borland，90 年代初我们编写编程语言和应用程序，但*那些 ILM 的家伙就在街对面，我们是哥儿们。*  \n\n奇怪的是，18 年后，电影里让我印象最深的，是杰夫·高布伦饰演的伊恩·马尔科姆的一句台词。他坐在侏罗纪\
    \ SUV 里，忙着搭讪劳拉·邓恩，向一位古植物学家解释混沌理论，这时他说了一句深深烙印在我脑海中的话。  \n\n他通过在邓恩抬起的手背上滴落水滴来演示混沌理论，然后问：“它会往哪个方向流？”（真会撩，杰夫。）水滴每次滴落的方向都不一样，马尔科姆将此归因于“微小变化的原理——你手背上汗毛的朝向、皮肤中血液充盈的程度，[它们]从不重复，却极大地影响了结果……”\
    \  \n\n对于那些想了解更多知识的极客们，可以去看看蝴蝶效应。但对我来说，这句话概括了实用软件设计中的一个核心部分。在电影上映后的这些年里，我把它改成了这样：“那些看似微不足道、却执意要以一种不可思议的方式坑你的事件。”这些事件以伊恩·马尔科姆命名，被称为*马尔科姆事件*。\
    \  \n\n### 我们总是很匆忙  \n\n在硅谷，我们总是很匆忙。如果我们不在创造新东西，就是在创造帮助创造新东西的工具。我们构建产品的流程因公司而异，但通常遵循这样一个循环：\
    \  \n\n**设计：** 头脑风暴要创造的新东西。大量讨论，大量舍弃，再讨论更多。  \n\n**开发：** 少说话，多做事。工程师埋头苦干，经理们则在琢磨自己该做什么。\
    \  \n\n**部署：** 更多讨论，一些争吵，经理们忙着阻止大家互相残杀，然后突然……就完成了。  \n\n现在我们正处于设计阶段，你和我。我是经理，你是高级工程师，我们正在为下一个版本进行头脑风暴。我们各自对下个版本要做什么有个模糊的想法，但还不清晰。没有什么能明确这个想法，所以我们只是把想法抛出来，看看哪个能站得住脚。\
    \  \n\n直到你随口说了一句话，似乎才有所突破；我抓住这个想法，即兴发挥，把它写在白板上，然后*啪……* 这就是那个“功能特性”。这是定义你版本的那项工作、那个设计。我们知道是这样，因为我们俩都坐在那里盯着白板上的这个“功能特性”，意识到这一刻将定义此后的一切。这种情况不常发生，好好品味吧。\
    \  \n\n这不是一个马尔科姆事件。这个时刻类似于你第一次理解一项奇妙新技术时的“我靠”时刻。你必须拥有这样的时刻，才能拥有一个充满灵感的发布，但你还没有被马尔科姆事件坑过。\
    \  \n\n我们继续吧。  \n\n太好了，我们有了这个“功能特性”。现在，狂热开始了。我们无法把手从白板上挪开，因为我们知道在接下来的 15 分钟里，其余的功能特性会源源不断地涌现出来。现在，在这股狂热中，会做出大量的决策，虽然我们英勇地试图把它们都记录在白板上，但我们还是会漏掉一些。\
    \  \n\n我想挑其中一个被漏掉的决策来说。乍一看，这不是一个重大决策。事实上，在发现这个“功能特性”的创造性狂热中，这实在是一个很小的决策。会议结束后，我们就忘了它，因为我们还在消化发现这个“功能特性”所带来的精神高潮。\
    \  \n\n问题是，这个决策确实很重要。你所不知道的是，这个决策以一种关键的方式，为那些没参加第一次狂热的会议的人澄清了这个“功能特性”。顺便说一句，*那就是所有人。*\
    \  \n\n目前还没人知道，但这就是你的马尔科姆事件。  \n\n### 理解马尔科姆事件  \n\n一个月过去了，开发已经开始，更多人也参与进来。有人问了你一个关于这个“功能特性”的问题，答案就是那个被遗忘的决策。没什么大不了的，你回答了问题，继续工作。一周后，一个\
    \ QA 人员问了你同样的问题。你不是已经回答过这个问题了吗？是的，回答过了。好吧，没什么大不了的，告诉他答案。  \n\n又过了一个月，据你统计，你已经被问了十次同一个澄清性的问题，你开始纳闷：“大家难道不明白吗？答案不是明摆着的吗？”\
    \  \n"
- fmt: '### 排版后内容


    不，他们没有。他们并没有参与你最初设计会议中的那种“宗教体验”，更糟糕的是，这些提出问题的人并不是问题所在。问题在于那些没有提问的人。是那些在假设某个问题的答案，却没有提出疑问的人。他们在想：“好吧，如果这很重要，应该有人会告诉我或者写下来，对吧？”


    “马尔科姆事件”（Malcolm event）是指一个看似微不足道的事件，却以一种意想不到的方式搞砸了你的发布。在这个澄清决策的例子中，它就是一种“沟通不良税”。每个人都在疑惑这个功能的某个奇怪方面，在这种困惑中，他们浪费了时间，也浪费了金钱。


    发布过程可能进展顺利。“马尔科姆事件”可能只是一个烦心事，比如每次会议上都有人问*同一个老掉牙的问题。*或者，你可能没那么幸运。也许文档人员从未费心去问一个澄清问题，导致你的文档对这个功能的描述很糟糕。更糟的是，也许负责该功能的开发者花了整整一个月的时间按他自己臆想的版本来开发，直到你安装一个构建版本并发现人们无法读懂你的心思。


    “马尔科姆事件”的成本跨度很大，所以让我们尽量避免它们。方法如下。


    ### 文档制品


    读到这里的某个人，可能大半章都举着手。好了，你有什么问题？


    “兰兹（Rands），你在说规格说明书！功能规格说明书！交互设计、视觉设计和线框图！谁不喜欢线框——”


    好了，手放下。


    不，这篇东西并不是要描述把东西写下来的诸多好处。是的，好处有很多，但那是避免“马尔科姆事件”的一种笨重方法。


    记住，我们在这里讨论的是细节小事。我不是在说某个版本的大致框架，而是在说那些看似无关紧要、却注定要搞砸你的细节。一份写得好的规格说明书会记录你所有的细节，但你有时间去编写和维护规格说明书吗？我没有。我在相当成功的公司工作了近二十年，我能数得清的有用的规格说明书，两只手就够。真的。


    问题不在于规格说明书是个坏主意，而在于它们太耗时了。记住，我们很赶时间。尽管如此，确实需要记录一些东西，因为避免“马尔科姆事件”的第一件事就是需要一个**文档制品**。


    一个文档制品记录了一条关键知识。是的，它可以是一份规格说明书、一段简介、一张图、一个优先级，甚至是一个负责人。关键在于，你必须知道记录这个制品是至关重要的，因为你以前遇到过这种情况，你明白如果这条知识在整个组织中不能被很好地理解，你就完了。


    我在一家初创公司发布第二个版本时，通过惨痛的教训学到了这一点。在一次早期的头脑风暴会议上，我们的销售副总裁花了整整一个小时解释对更好性能的需求。我们都点头表示理解，知道产品的未来版本会包含一个新的应用服务器来改善我们的性能问题。问题在于，从来没有人对副总裁说“不”，更糟的是，当产品发货时，性能反而略有下降。当副总裁发现时，他在我的办公室里整整吼了30分钟。


    在我们的下一个版本中，我们正确地决定将应用服务器再推迟六个月，而我写的每一个功能列表顶部都有这样一行加粗的文字：“**本版本不进行性能提升。**”


    检测“马尔科姆事件”是你工作中最难的部分，因为这是一门识别“重要之琐事”的艺术。我很想在这里提供一些很好的建议，但我的建议简单而又不幸。你学习识别潜在“马尔科姆事件”的唯一方法，就是去经历一些非常非常糟糕的经历。


    抱歉。


    ### 活页夹


    太好了，利用你过去糟糕的经历，你捕获了一个文档制品。假设这是一张潦草画出的绝妙UI设计图。恭喜你有先见之明把它写了下来。然后呢？你把这个图放在哪里？放在你的莫尔斯金（Moleskine）笔记本里？嗯，那很时髦但没用。一个塞在笔记本里的文档制品，跟没写下来差不多。


    成功的文档制品管理是避免“马尔科姆事件”的关键，而成功的文档制品管理在于三个A。它们是：


    **可用性（Availability）：** 你的文档制品很重要。你已经知道了，但其他人都知道吗？它需要放在任何关心它的人都可能无意中看到的地方。它可以是一个维基页面、一封群发邮件、一份演示文稿。我不知道你的组织沟通模式是怎样的，但你必须把你的制品放在沟通模式的核心位置。“各位，这张涂鸦就是我们的未来。”这引出了下一个*A*。


    **共识（Agreement）：** 你创建文档制品的原因，是你相信你已经识别出一条关键信息，这里的“关键”可能意味着新颖、有争议，或者只是重要。通过让你的制品对团队可用，你是在说“注意我”，这是一个关键时刻。这就是你将一个“马尔可姆事件”打入冷宫的时刻，因为你正在让它成为常识。听起来我好像只是在重复描述“可用性”，但并非如此。我指的是当菲尔（Phil）读到你的周报里写着“我们不打算做菲尔最爱的功能”时，在走廊里发生的争论。


    *所以，你和菲尔把问题说开了。你们讨论利弊，他让一步，你让一步，突然之间，没事了。我们不需要做菲尔的功能，因为我们在做另一个功能，而菲尔理解了原因。*


    **准确性（Accuracy）：** 这是三个A中最简单的一部分。随着你的文档制品在组织中渗透，它会发生变化。大家会开始修改那张涂鸦，菲尔会要求一个小改动，你的制品会不断演变。当它在走廊里被流传讨论时，请花时间修订它，因为你永远不知道哪个微小的改动，可能会刺激到某个对制品第一版并无异议的人。


    可用性、共识和准确性。我把这些名词称为“活页夹”，因为它们把人束缚在“马尔科姆事件”上。如果他们看到了、读到了、评论了它，它就成了他们分内之事。它不再是一个无关紧要的事件，而是常识。


    ### 成功往往是静默的


    避免“马尔科姆事件”完全没有成就感，原因如下：你知道失败是什么声音，但成功是静默的。成功是发布顺利的时候。是你不必为重大发布立即推出一个更新补丁的时候。避免一个“马尔科姆事件”，是你设法预测了未来，而当你告诉别人你做了什么时，没有人会相信你，因为什么都没发生。


    管理，就是对无形事物的照料和喂养。当你看起来什么都没做的时候，往往是你做得最好的时候。我和任何人一样热爱发布前最后一个月的刺激感，但我怀疑我们互相吼叫、周末加班、感受着妥协带来的沉重压力，正是因为我们被“马尔科姆事件”包围着。


    ---


    ## 章节


    ### 捕捉上下文


    公司里的每个组织都有自己的“最爱应用”。这并非他们真正的*最爱应用*，只是他们必须在组织内担任特定角色时使用的应用。现在就站起来，走到你所在办公楼里一个不熟悉的地方，然后偷偷观察你的同事。如果有人拦住你问你在做什么，就告诉他们：“是兰兹让我来的”，然后用力点点头。这招总是管用。'
  raw: 'No, they don’t. They weren’t in the religious experience that was your original
    design meeting and, more bad news, these people who are asking the questions—they
    aren’t the problem. It’s the people who aren’t asking. It’s the ones who are assuming
    an answer to the question and not asking. They’re thinking, “Well, if it was important,
    someone would’ve told me or written it down, right?”


    A Malcolm event is when a seemingly insignificant event screws up your release
    in an unlikely way. In the case of this clarifying decision, it’s a poor-communication
    tax. Everyone is wondering about this odd aspect of the Feature and in that confusion
    they are wasting time and they are wasting money.


    The release might go swimmingly. The Malcolm event might just be an annoyance
    where, in every meeting, someone asks *the same lame question.* Or maybe you’re
    not so lucky. Maybe the documentation folks never bother to ask a clarification
    question and your documentation describes your Feature poorly. Even worse, maybe
    the developer responsible for the Feature spends a month developing to his version
    of reality before you install a build and figure out that people can’t read your
    mind.


    There’s a wide spectrum of cost for Malcolm events, so let’s try to avoid them.
    Here’s how.


    Artifacts


    Someone who has been reading this piece has had their hand up for most of the
    chapter. OK, what’s your question?


    “Rands, you’re talking about specifications! Functional specifications! Interaction
    designs, visual designs, and wireframes! Who doesn’t love wire—”


    OK, hand down.


    No, this is not a piece that is going to describe the many benefits of writing
    stuff down and, yes, there are many benefits, but this is a heavy-handed approach
    for avoiding Malcolm events.


    Remember, we’re talking about the little stuff here. I’m not talking about the
    broad strokes of a release, I’m talking about the seemingly inconsequential details
    that are intent on screwing you. A well-written specification will document all
    of your details, but do you have time to write and maintain specifications? I
    don’t. I’m ­coming up on two decades of working at fairly successful companies,
    and I can count the number of useful specifications I’ve read on two hands. Really.


    The issue isn’t that specifications are a bad idea, it’s that they are time-consuming.
    And remember, we’re in a hurry. Still, something does need to be captured because
    the first thing we need to avoid a Malcolm event is an artifact.


    An artifact captures an essential piece of knowledge. Yes, it can be a specification
    or a blurb or a picture or a priority or even an owner. The key is you’ve got
    to know it’s essential to capture this artifact because you’ve been here before
    and you know that if this piece of knowledge is not well understood across the
    organization, you’re screwed.


    I learned this the hard way during the second release of our product at a startup.
    In an early brainstorming meeting, our VP of sales spent a good hour explaining
    the need for better performance. We all nodded knowing that a future release of
    the product would include a new application server that would improve our performance
    issues. The problem was, no one ever told the VP “no,” and worse, when the product
    shipped, the performance was slightly worse. When the VP found out, he was in
    my office yelling for a solid 30 minutes.


    In our next release, we correctly decided to hold off the application server for
    another six months, and every single feature list I wrote had the following line,
    in bold, at the top of the list: “No performance increases in this release.”


    Malcolm event detection is simply the hardest part of your job because it’s the
    art of identifying the significantly insignificant, and I’d like to provide some
    great advice here, but my advice is simple and unfortunate. The only way you’re
    going to learn to identify potential Malcolm events is by going through some horrible,
    horrible experiences.


    Sorry.


    Binders


    Great, so using your past horrible experiences, you’ve captured an artifact. Let’s
    say it’s a semi-scribbled drawing of a brilliant UI design. Congratulations on
    your foresight to write something down. Now what? Where do you keep that drawing?
    In your Moleskine? Well, that’s fashionable and useless. An artifact stuffed in
    your notebook is akin to not writing it down at all.


    Successful artifact management is the key to avoiding Malcolm events, and the
    key to successful artifact management are the three As. These are:


    **Availability:** Your artifact matters. You already know that, but does everyone
    else? It needs to be sitting somewhere where anyone who cares is going to trip
    over it. It’s a wiki page, it’s an e-mail sent to everyone, it’s a presentation.
    I don’t know what your organization communication patterns are, but you’ve got
    to stick your artifact in the middle of it. “Folks, this scribble is our future.”
    This leads us to the next *A.*


    **Agreement:** The reason you created your artifact is because you believe you’ve
    identified a critical piece of information, where critical could mean novel, controversial,
    or just important. By making your artifact available to the team, you’re saying,
    “Pay attention to me,” and this is a critical juncture. This is when you consign
    a Malcolm event to oblivion because you’re making it common knowledge. It sounds
    like I’m just describing availability again, but I’m not. I’m talking about the
    hallway argument that goes down when Phil reads your weekly status reports and
    it reads, “We’re not doing Phil’s favorite feature.”


    *So, you and Phil have it out. You debate pros and cons, he gives a little, you
    give a little, and suddenly, it’s OK. We don’t need to do Phil’s feature because
    we’re doing this other feature and Phil understands why.*


    **Accuracy:** This is the easiest part of the three As. As your artifact soaks
    through the organization, it’s going to change. Folks are going to tweak the scribble,
    Phil is going to request a minor change, and your artifact is going to evolve.
    Take the time to revise the artifact as it evolves in the hallway because you
    never know what minor change might set off some random person who was fine with
    the first version of the artifact.


    Availability, agreement, and accuracy. I call these nouns “binders” because they
    bind people to the Malcolm event. If they see, read it, and comment on it, it
    becomes bound to them. It’s no longer an insignificant event, it’s common knowledge.


    Success Is Often Silence


    Avoiding Malcolm events is completely unsatisfying and here’s why: you know what
    failure sounds like, but success is silent. It’s when the release goes well. It’s
    when you don’t have to release an immediate update to your major release. Avoiding
    a Malcolm event is when you managed to predict the future and no one is going
    to believe you when you tell them what you did because nothing happened.


    Management is the care and feeding of the invisible. You’re doing your best when
    it appears the least is happening. I love the thrill of the last month of a release
    as much as the next guy, but I suspect the reason we’re yelling at each other,
    working weekends, and feeling the depressing weight of compromise is because we’re
    ­surrounded by Malcolm events.


    CHAPTER


    Capturing Context


    Each organization in a company has its Favorite Application. It’s not truly their
    ­favorite application; it’s just the application they must use in their particular
    capacity in the organization. Stand up right now and walk into an unfamiliar part
    of your building and stalk your coworkers. If someone stops and asks you what
    you’re doing, tell them, “Rands sent me,” and vigorously nod your head. That always
    works.'
