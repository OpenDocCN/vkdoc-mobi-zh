- fmt: '# Yes. When you successfully penetrate the zone, there is a chance I’ll be
    an asshole. In fact, I might snap.


    ## The Snap


    This is where I apologize.


    No one deserves to be on the receiving end *of the snap.* All you were really
    doing was coming in to see when I was done because we agreed we’d go surfing this
    afternoon. Still, I got in the zone and I’m writing this wicked article and *who
    are you and what do you want?* The snap is a glare, a raised voice … something
    designed to indicate you are *pissing me off* with your presence.


    It’s not fair, I realize that, but think of it like this: if you walk up to me
    and slap me across the face, I’m not going to think, “Why’d you do that?” I’m
    not going to take the time to dissect the situation. My instinct is going to be
    pure, primal, and immediate. I’m going to slap you back.


    The reason for this irrational reaction is antiquated brain wiring. Four million
    years ago it was to my evolutionary advantage to respond to slaps as quickly as
    possible because they were often precursors to being eaten. Rather than piping
    my slap response through the “What is a reasonable response?” portion of my brain,
    it’s wired straight into my “React immediately or else” area. Somehow, the snap
    response has the same wiring. Invasion of the zone is akin to some primal activity
    that required the brain to wire itself for immediate, irrational response.


    It’s not right, it’s not socially acceptable, and I regret my actions 30 seconds
    later, but in 20 years of nerdery, the quest hasn’t been to kill the snap, but
    figure out how to manage it.


    ## The Place


    Try as I might, I don’t always make it to the zone. I’ll go through all my odd
    little pre-zone activities of drink and music selection. I’ll slightly adjust
    the five essential objects on my desk and I’ll begin … playing World of Warcraft.


    This is not the zone … this is *the place.* It is very similar to the zone in
    appearance, but mentally, it’s a different muscle that I’m exercising. If the
    zone is akin to playing power forward in a championship hockey game, the place
    is the six hours spent in the weight room the day before. Yes, I’m working out
    my mental muscles, but I’m not really doing anything.


    The rule is this: your significant other can interrupt the place with impunity.
    I might snap, but if you let me linger in the place like you should let me work
    in the zone, you’ll never see me. If you walk into my office to ask me something
    and see a half-naked night elf dancing on my screen, you are hereby authorized
    to invade. Mistakes will happen and you’ll invade the zone thinking that it’s
    the place, but after I’ve cooled down, it’s my responsibility to explain why what
    looks like the place is actually the zone.


    ## Other Places


    Nerds are rewarded for structure. We get big bucks for reliably generating useful
    technology that works. Sure, we’re artists, but it’s an art of patterns, repetition,
    structure, and efficiency (I swear, it’s sexy). This makes it not surprising that
    the places we create in our homes and in our minds are designed in the same fashion.


    The risk with these places is the same risk with all comfortable places. In the
    comfort, we forget that some of the most interesting stuff happens elsewhere.


    # CHAPTER


    ## Meeting Creatures


    Worst meeting ever.


    It’s not that the attendee list is wrong. All the right people are there and they’re
    bright and they’re the decision makers. It’s not that the topic is boring or poorly
    defined. It’s a big deal. The problem with this meeting is that it’s never going
    to end.


    See, about a year ago, one of our senior engineers was reading our contract with
    our application server. He read, “Support ends in two years. We’re done. You’re
    on your own.” He freaked out, called a meeting, and freaked out again in the meeting
    to make sure we knew it was a big deal, so we agreed it was a big deal. To-do
    lists were generated, follow-up meetings were scheduled … it all had a pleasant
    “look what we can do when the sky is falling” vibe. Love it when folks scurry
    with purpose.


    Present day. It’s *a year* later and we haven’t made the switch. The senior engineer
    who raised the red flag a year ago is, surprisingly, actually in this version
    of the meeting, although he is a shell of the engineer he was a year ago. I guarantee
    he’s not going to say a thing because he knows what I know …


    … this is the worst meeting ever.


    We knew nine months ago what we needed to do to make the transition to the new
    server application, but the problem is, it’s really fucking scary. It’s one of
    those “We’re not going to know half of what we need to do until we start” scenarios,
    and starting means betting the company. Once we begin the transition, there is
    no going back and this scares the hell out of everyone, including the VP who will
    not make a decision.


    Each month for the past 12 months, we have had the same meeting. This is the problem,
    these are the risks, this is what we know, this is what we don’t know. All that
    preliminary crap takes 30 minutes, and since it’s been a month since we last heard
    it, everyone needs to be reminded of all the intricacies. Heads nod while I slowly
    dig my nails into the conference room table. We then begin the chasing-our-tail
    portion of the meeting, where all the same questions are asked and answered again.
    This is why the senior engineer is no longer engaged. He’s tired of repeating
    himself.


    Meetings are composed of people, but more interesting, meetings are composed of
    creatures. These are the roles, traits, and quirks of the people who show up in
    your meetings, and after you’ve sat through a couple thousand, you’ll see the
    same creatures keep showing up. Knowing who they are can help you understand your
    meeting. Knowing what they do can save you time.


    ### The Anchor


    Slogan: “It’s all about me.”


    The *anchor* is the big cheese. This is the person that everyone is talking to
    and this is the person who will decide on whatever needs deciding. When this person
    talks, everyone in the meeting is listening.


    Meetings are power struggles between those who want something and those who don’t
    want to give it to them. If you’re walking into a meeting and you need something,
    your first job is to identify this person. This person is the reason the meeting
    is happening, and if you don’t know who they are, you’re missing essential subtext.
    It’s actually pretty easy. Just wait for someone to say something controversial
    and see who everyone looks at.


    There are two major things to be wary of with your anchor. First, make sure they
    know their job. For standing meetings with the usual suspects, the role is obvious,
    but for one-time meetings, you can’t assume the anchor knows it’s all about them.
    A clear agenda that anoints the anchor right out of the gate is the best way to
    make sure everyone knows who the decision maker is.


    Second, you’ve got to know what to do when there is no anchor present. You’re
    15 minutes in and you know the senior VP who is actually going to help here is
    not present. Sure, there are eight other people here that like to talk, but the
    best move is a reschedule. You’re wasting time.


    ### Laptop Larry


    Slogan: “Pardon me, what?”


    Larry is easy to identify. He’s got his MacBook in front of him. That’s him right
    there. If the MacBook somehow isn’t enough, just look for lots of intense nodding
    from Larry … that’s him not listening.'
