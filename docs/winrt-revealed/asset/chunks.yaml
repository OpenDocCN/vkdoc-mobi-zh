- fmt: "## The DNA Meeting\n\n1.  **It shines a light brightly.** While the more eyeballs\
    \ you get on any decision the better, the DNA meeting is scheduled when something\
    \ technical is going down. Something big. Something of magnitude. It’s not a bet-the-company\
    \ decision, but it might be a bet-the-group—or the division—decision. If we fail\
    \ at this, the consequences are extreme. This is why when a DNA meeting is going\
    \ down, you …\n\n2.  **Bring respectable firepower.** I’ll talk more about the\
    \ construction of the DNA team in a bit, but I want you to think of the three\
    \ best engineers around you. I’m not talking just about those with ability, but\
    \ also the folks who go out of their way to teach—the engineers who not only know\
    \ what they’re talking about, but have the ability to explain their thinking.\
    \ They shine a bright light on the idea by making the complex painfully obvious.\
    \ The DNA team is not only the set of engineers who are the best candidates to\
    \ vet the big idea, but those who have ability to talk about how to make it better,\
    \ can constructively criticize, and are distinctly drama- and politics-free.\n\
    \n3.  **It has teeth.** You can gather all the talented engineers you want, but\
    \ what will make the meeting useful and memorable are two threats. First, the\
    \ rule for all attendees in a DNA meeting is, *If you don’t contribute, you won’t\
    \ be invited back*. A DNA meeting is not a regular meeting; it is an active and\
    \ healthy debate about a bet big enough that we’re gathering our bright minds\
    \ to make sure we don’t fuck it up. If you’re in the room, it’s because we believe\
    \ you have something to add, and if you don’t, we’ll correct our misperception.\n\
    \n    Second, it needs to be culturally understood that if you don’t bring your\
    \ A game to the DNA meeting, the team is authorized to mentally kick the shit\
    \ out of you. The end result of a healthy DNA meeting will have members of the\
    \ receiving team sitting with their heads squarely planted on their desks, whispering,\
    \ “Oh shit, I can’t believe we didn’t think of that.”\n\n    The DNA meeting is\
    \ not cruel. It is a living, breathing example of a team of engineers who put\
    \ the value of design and technical excellence above all else. They don’t rule\
    \ by mandate; they influence by being great at what they do. At a prior gig, the\
    \ threat of a DNA meeting pushed us to prepare in extraordinary ways. Our goal\
    \ was to predict every single question that might be asked and have every answer\
    \ in our back pocket. Winning in the meeting was silence.\n\n4.  **DNA has absolutely\
    \ nothing to do with management (and everything to do with leadership).** Pure\
    \ managers are not considered for the team, because DNA is about cultivating technical\
    \ leadership. A DNA meeting is a staff meeting of the influential engineers who\
    \ don’t want direct reports, but want to lead. They want to make decisions critical\
    \ to the technology. If managers have anything to do with DNA, the meeting will\
    \ become about the managers, not the technical leaders.\n\n5.  **DNA is achievable\
    \ and aspirational.** Inclusion on the DNA team doesn’t come from a popularity\
    \ contest. It is the result of a well-defined journey that any interested engineer\
    \ can embark upon. At the prior gig, you needed a combination of tenure and experience,\
    \ shipped products, and visible technical contributions to the team. Some measures\
    \ will be subjective, but the end result is that when someone arrives on the DNA\
    \ team, everyone will agree that they belong there. It’s not a club; it’s an honor.\
    \ DNA recognizes that the team members we want are examples of folks who live\
    \ and breathe technical experience, who are selfless, and who contribute exceptional\
    \ value to the company. DNA exists as an acknowledgment that a team is led not\
    \ just by the folks who build the people, but also by people who build the product.\n\
    \n## Flat Is a State of Mind\n\nI didn’t come up with the idea of DNA. It was\
    \ a former boss at Apple who suggested the idea long before I arrived on the team.\
    \ Since then I’ve adapted the idea twice, and each adaption has yielded different\
    \ results. In the current gig, we split DNA into different tracks: UX DNA and\
    \ system DNA.\n\nYou build a DNA meeting to suit your culture. You build a DNA\
    \ meeting so your technical leaders have a platform where their ideas are heard,\
    \ debated, and acted on. You build a DNA meeting to remind the team that all forms\
    \ of leadership matter.\n\n# CHAPTER\n\n## An Engineering Mindset\n\nThere’s a\
    \ very short list of new manager “must-dos” in the Rands Management Rule Book.\
    \ The brevity of this list comes from the fact that a must is an absolute and,\
    \ when it comes to people, there are very few absolutes. A clever way to manage\
    \ one person is a disaster when applied to another. This makes the first item\
    \ on the management must-do list:\n\n*Stay flexible.*\n\nBelieving you’ve seen\
    \ it all is a bad idea. Staying flexible is the only stance to adopt when constant\
    \ change is the only constant.\n\nParadoxically, the second item on the list is\
    \ surprisingly inflexible and it’s a personal favorite of mine because I believe\
    \ it helps set the stage for management growth. It reads:\n\n*Stop coding.*\n\n\
    The theory is this: if you want to be a manager, you must learn to trust those\
    \ who work for you to take care of the job of coding. This advice can be hard\
    \ to digest, especially for new managers. It’s likely that one of the reasons\
    \ they became managers is due to their productive developers, and their first\
    \ reaction when things go to crap is to revert to the skills that built up their\
    \ confidence. That’s writing code.\n\nWhen I see a new manager fall back to coding,\
    \ I tell the manager, “I know you can code. The question is, can you manage? You’re\
    \ no longer responsible only for yourself—you’re responsible for the team, and\
    \ I want to see you figure out how to get the team to solve this problem without\
    \ you coding. Your job is to figure out how to get yourself to scale. I want lots\
    \ of you, not just one.”\n\nGood advice, huh? Scale, management, and responsibility.\
    \ Very buzzword-compliant. Too bad I’m wrong.\n\nWrong?\n\nYup. Wrong. Not totally,\
    \ but enough that I might need to make some calls to past coworkers and apologize.\
    \ “That ‘stop coding’ pitch of mine? Wrong. Yeah. Start programming again. Start\
    \ with Python or Ruby. Yeah. I mean it. Your career depends on it.”\n\nWhen I\
    \ began my career as a developer at Borland, I was part of the Paradox for Windows\
    \ team, and this was a big one. Just on the application development team we had\
    \ 13 developers. If you included the heads from the various other teams who provided\
    \ essential technology like the core database engine, graphing engine, and core\
    \ application services, you’re talking 50 engineers directly contributing to the\
    \ product.\n\nNo team that I’ve been on since then has even been close in terms\
    \ of size. In fact, with each passing year, the size of the engineering teams\
    \ contributing to my products has steadily shrunk. What’s going on? Are we getting\
    \ collectively smarter as developers? Nope, we’re just distributing the load.\n\
    \nWhat have we, as developers, been doing for the past 20 years? Well, we’ve been\
    \ writing a crap load of code. Piles of it. So much of it that we decided that\
    \ maybe it was a good idea to make it easy to share by open sourcing it. Thankfully\
    \ the Internet showed up, which made this sharing trivial. If you’re a developer,\
    \ try this right now. Go search Google or Github for your name and find some code\
    \ you forgot about that everyone can see. Scary, huh? Didn’t think your code lived\
    \ forever? It does."
  raw: '1.  *It shines a light brightly.* While the more eyeballs you get on any decision
    the better, the DNA meeting is scheduled when something technical is going down.
    Something big. Something of magnitude. It’s not a bet-the-company decision, but
    it might be a bet-the-group—or the division—decision. If we fail at this, the
    consequences are extreme. This is why when a DNA meeting is going down, you …


    2.  *Bring respectable firepower.* I’ll talk more about the construction of the
    DNA team in a bit, but I want you to think of the three best engineers around
    you. I’m not talking just about those with ability, but also the folks who go
    out of their way to teach—the engineers who not only know what they’re talking
    about, but have the ability to explain their thinking. They shine a bright light
    on the idea by making the complex painfully obvious. The DNA team is not only
    the set of engineers who are the best candidates to vet the big idea, but those
    who have ability to talk about how to make it better, can constructively criticize,
    and are distinctly drama- and politics-free.


    3.  *It has teeth.* You can gather all the talented engineers you want, but what
    will make the meeting useful and memorable are two threats. First, the rule for
    all attendees in a DNA meeting is, *If you don’t contribute, you won’t be invited
    back*. A DNA meeting is not a regular meeting; it is an active and healthy debate
    about a bet big enough that we’re gathering our bright minds to make sure we don’t
    fuck it up. If you’re in the room, it’s because we believe you have something
    to add, and if you don’t, we’ll correct our misperception.


    Second, it needs to be culturally understood that if you don’t bring your A game
    to the DNA meeting, the team is authorized to mentally kick the shit out of you.
    The end result of a healthy DNA meeting will have members of the receiving team
    sitting with their heads squarely planted on their desks, whispering, “Oh shit,
    I can’t believe we didn’t think of that.”


    The DNA meeting is not cruel. It is a living, breathing example of a team of engineers
    who put the value of design and technical excellence above all else. They don’t
    rule by mandate; they influence by being great at what they do. At a prior gig,
    the threat of a DNA meeting pushed us to prepare in extraordinary ways. Our goal
    was to predict every single question that might be asked and have every answer
    in our back pocket. Winning in the meeting was silence.


    4.  *DNA has absolutely nothing to do with management (and everything to do with
    leadership).* Pure managers are not considered for the team, because DNA is about
    cultivating technical leadership. A DNA meeting is a staff meeting of the influential
    engineers who don’t want direct reports, but want to lead. They want to make decisions
    critical to the technology. If managers have anything to do with DNA, the meeting
    will become about the managers, not the technical leaders.


    5.  *DNA is achievable and aspirational.* Inclusion on the DNA team doesn’t come
    from a popularity contest. It is the result of a well-defined journey that any
    interested engineer can embark upon. At the prior gig, you needed a combination
    of tenure and experience, shipped products, and visible technical contributions
    to the team. Some measures will be subjective, but the end result is that when
    someone arrives on the DNA team, everyone will agree that they belong there. It’s
    not a club; it’s an honor. DNA recognizes that the team members we want are examples
    of folks who live and breathe technical experience, who are selfless, and who
    contribute exceptional value to the company. DNA exists as an acknowledgment that
    a team is led not just by the folks who build the people, but also by people who
    build the product.


    Flat Is a State of Mind


    I didn’t come up with the idea of DNA. It was a former boss at Apple who ­suggested
    the idea long before I arrived on the team. Since then I’ve adapted the idea twice,
    and each adaption has yielded different results. In the current gig, we split
    DNA into different tracks: UX DNA and system DNA.


    You build a DNA meeting to suit your culture. You build a DNA meeting so your
    technical leaders have a platform where their ideas are heard, debated, and acted
    on. You build a DNA meeting to remind the team that all forms of leadership matter.


    CHAPTER


    An Engineering Mindset


    There’s a very short list of new manager “must-dos” in the Rands Management Rule
    Book. The brevity of this list comes from the fact that a must is an absolute
    and, when it comes to people, there are very few absolutes. A clever way to manage
    one person is a disaster when applied to another. This makes the first item on
    the management must-do list:


    *Stay flexible.*


    Believing you’ve seen it all is a bad idea. Staying flexible is the only stance
    to adopt when constant change is the only constant.


    Paradoxically, the second item on the list is surprisingly inflexible and it’s
    a personal favorite of mine because I believe it helps set the stage for management
    growth. It reads:


    *Stop coding.*


    The theory is this: if you want to be a manager, you must learn to trust those
    who work for you to take care of the job of coding. This advice can be hard to
    digest, especially for new managers. It’s likely that one of the reasons they
    became managers is due to their productive developers, and their first reaction
    when things go to crap is to revert to the skills that built up their confidence.
    That’s writing code.


    When I see a new manager fall back to coding, I tell the manager, “I know you
    can code. The question is, can you manage? You’re no longer responsible only for
    yourself—you’re responsible for the team, and I want to see you figure out how
    to get the team to solve this problem without you coding. Your job is to figure
    out how to get yourself to scale. I want lots of you, not just one.”


    Good advice, huh? Scale, management, and responsibility. Very buzzword-­compliant.
    Too bad I’m wrong.


    Wrong?


    Yup. Wrong. Not totally, but enough that I might need to make some calls to past
    coworkers and apologize. “That ‘stop coding’ pitch of mine? Wrong. Yeah. Start
    programming again. Start with Python or Ruby. Yeah. I mean it. Your career depends
    on it.”


    When I began my career as a developer at Borland, I was part of the Paradox for
    Windows team, and this was a big one. Just on the application development team
    we had 13 developers. If you included the heads from the various other teams who
    provided essential technology like the core database engine, graphing engine,
    and core application services, you’re talking 50 engineers directly contributing
    to the product.


    No team that I’ve been on since then has even been close in terms of size. In
    fact, with each passing year, the size of the engineering teams contributing to
    my products has steadily shrunk. What’s going on? Are we getting collectively
    smarter as developers? Nope, we’re just distributing the load.


    What have we, as developers, been doing for the past 20 years? Well, we’ve been
    writing a crap load of code. Piles of it. So much of it that we decided that maybe
    it was a good idea to make it easy to share by open sourcing it. Thankfully the
    Internet showed up, which made this sharing trivial. If you’re a developer, try
    this right now. Go search Google or Github for your name and find some code you
    forgot about that everyone can see. Scary, huh? Didn’t think your code lived forever?
    It does.'
  trans: "\n## DNA 会议\n\n1. **它如明灯般照亮全局。** 尽管关键决策经手越多越好，但 DNA 会议只在技术性重大事件发生时召开。事关重大，影响深远。这未必是决定公司存亡的决策，但很可能关乎整个团队乃至部门的命运。若在此失败，后果将极其严重。正因如此，当\
    \ DNA 会议召开时，你应当……\n\n2. **召集精锐力量。** 稍后我会详谈 DNA 团队的构成，但请先思考你身边最优秀的三位工程师。我指的不只是能力出众者，更是那些乐于传道授业之人——他们不仅言之有物，更擅长阐释思路。他们能将复杂问题化繁为简，令真相昭然若揭。DNA\
    \ 团队不仅是审核重大构想的最佳人选，更应具备优化建议、建设性批评的能力，并且绝对远离政治与戏剧化纷争。\n\n3. **拥有实权。** 你可以召集所有顶尖工程师，但让会议卓有成效且令人难忘的是两项铁律。首先，所有参会者必须遵守规则：*若无贡献，恕不续邀*。DNA\
    \ 会议绝非例行会议，而是围绕足够重大的赌注展开的积极健康辩论——正因事关重大，我们才汇聚精英确保万无一失。既然你受邀在座，必是因我们相信你能有所建树；若无贡献，我们自会修正判断。\n\
    \n   其次，团队文化必须明确：若未在 DNA 会议上展现最佳状态，其他成员有权在精神层面给予\"痛击\"。一场成功的 DNA 会议结束后，接收方的成员会双手抱头伏案，喃喃自语：\"\
    该死，我们怎么会没想到这个。\"\n\n   DNA 会议并非残酷无情。它是工程师团队活生生的写照——将设计与技术卓越性置于至高无上的地位。他们不以命令管人，而是通过精湛技艺施加影响。在上一家公司，DNA\
    \ 会议的威慑力驱使我们以非凡方式备战。我们的目标是预判所有可能被问及的问题，并准备好每一个答案。在会议中获胜的标志，就是全场寂静。\n\n4. **DNA\
    \ 与管理毫无关系（却与领导力息息相关）。** 纯粹的经理人不会被纳入团队，因为 DNA 旨在培养技术领导力。DNA 会议是那些不愿管理下属、却渴望引领方向的影响力工程师的集会。他们希望主导关键的技术决策。若经理人涉足\
    \ DNA，会议将沦为经理的秀场，而非技术领袖的舞台。\n\n5. **DNA 既可达成亦值得追求。** 入选 DNA 团队并非人气竞赛的结果，而是任何感兴趣的工程师都能踏上的明确定义之路。在上一家公司，你需要同时具备资历经验、已发布产品，以及对团队可见的技术贡献。某些衡量标准可能主观，但最终结果是：当某人加入\
    \ DNA 团队时，所有人都认同他实至名归。这不是俱乐部，而是荣誉。DNA 认可的是那些以技术经验为生命、无私奉献、为公司创造卓越价值的团队成员。DNA 的存在印证了团队不仅由培养人才的领导者构成，更由缔造产品的实干家引领。\n\
    \n## 扁平是一种心态\n\nDNA 的概念并非我的原创。早在加入团队之前，我在苹果公司的一位前上司就已提出此想法。此后我两次改良这一理念，每次调整都带来不同结果。在现任公司，我们将\
    \ DNA 分为不同轨道：UX DNA 和系统 DNA。\n\n你构建 DNA 会议以适应自身文化。你构建 DNA 会议让技术领袖拥有平台，让他们的想法被倾听、辩论并付诸实践。你构建\
    \ DNA 会议提醒团队：所有形式的领导力都至关重要。\n\n# 章节\n\n## 工程师思维\n\n在兰兹管理守则中，新任管理者的\"必做事项\"清单非常简短。之所以简短，是因为\"\
    必须\"意味着绝对，而面对人时几乎不存在绝对。适用于某人的巧妙管理方法，用到另一人身上可能就是灾难。这引出了管理必做事项中的第一条：\n\n*保持灵活。*\n\
    \n认为自己已看透一切是种危险想法。当\"持续变化\"成为唯一恒常时，唯一该采取的姿态就是保持灵活。\n\n矛盾的是，清单第二条却出奇地不灵活——这也是我个人偏爱的一条，因为它为管理成长奠定了基础。这条写道：\n\
    \n*停止写代码。*\n\n其理论是：如果你想成为管理者，就必须学会信任下属承担编码工作。这条建议可能难以消化，尤其对新手管理者而言。他们成为管理者的原因之一很可能是出于高产开发者的身份，而当事情搞砸时，他们的第一反应往往是重拾树立自信的技能——那就是写代码。\n\
    \n当我看到新管理者退回代码领域时，我会告诉他们：\"我知道你能写代码。问题在于，你能管理吗？你不再只为自己负责——你要为整个团队负责。我希望看到你如何在不写代码的情况下带领团队解决问题。你的任务是找出让自己'规模化'的方法。我需要更多个你，而不只是孤军奋战的你。\"\
    \n\n不错的建议，对吧？规模化、管理、责任。非常契合流行词汇。可惜我错了。\n\n错了？\n\n没错。错了。并非完全错误，但错得足以让我需要给前同事打电话道歉。\"\
    我那个'停止写代码'的论调？错了。是的。重新开始编程吧。从 Python 或 Ruby 开始。我是认真的。你的职业前途取决于此。\"\n\n我在 Borland\
    \ 开启开发者生涯时，曾是 Paradox for Windows 团队的一员——这可是个大项目。仅应用开发团队就有 13 名开发者。如果算上提供核心技术（如核心数据库引擎、图形引擎和核心应用服务）的其他团队负责人，直接为产品贡献代码的工程师多达\
    \ 50 人。\n\n此后我所在的团队规模从未接近这个数字。事实上，随着时间推移，参与我所在产品开发的工程团队规模持续缩小。这是怎么回事？难道开发者集体变聪明了？不，我们只是在分散工作负载。\n\
    \n过去 20 年间，我们开发者究竟在做什么？嗯，我们写了堆积如山的代码。多到我们认为，或许将其开源共享是个好主意。好在互联网的出现让这种分享变得轻而易举。如果你是开发者，现在就试试：在谷歌或\
    \ GitHub 上搜索你的名字，找找那些你遗忘但所有人都能看到的代码。很可怕吧？没想到你的代码会永垂不朽？它确实会。\n"
- fmt: '代码永存。优秀的代码不仅能存活，还能在珍视它的人确保其不会过时的情况下不断成长。正是这堆高价值、维护良好的代码，正在帮助缩小工程团队的平均规模，因为它让我们更少地专注于编写新代码，更多地专注于集成现有代码，从而用更少的人和更少的时间完成工作。


    这里有一条令人沮丧的推论，即我们都只是一群用胶带连接不同现有活动部件来创造相同事物略微不同版本的集成自动化工人。正是这种思路让许多高级管理团队对外包感到兴奋。“任何会用谷歌并有点胶带的人都能做这个，那我们为什么要为我们的本地自动化工人支付大笔费用？”


    我们付给这些管理人员的钱可不少，让他们想出这些破主意。尽管如此，这引出了我的最后一点：地球上到处都是渴望学习、聪明伶俐的开发者，即使他们从未在认证大学里待过一分钟，他们依然渴望学习、聪明伶俐。哦，对了，而且这样的人会越来越多。


    我不是说你应该担心你的工作，因为海外某个聪明的家伙在瞄准你；我是说你应该担心你的工作，因为软件开发方式的演变可能比你进步得更快。你在你的岗位上工作了十年，做了五年经理，然后你在想：“我知道如何开发软件。”你确实知道。至少现在如此。


    **把自己从代码中抽离，但是……**


    如果你遵循我最初的建议，把自己从代码中抽离，那么你就是在把自己从创造的行为中抽离。这种行为正是我真正不担心外包的原因。自动化工人不构建，他们只是处理。虽然好的流程可以节省大量资金，但它不会给世界带来任何新东西。


    随着更小的团队用更少的资源做更多的事，把自己从代码中抽离在我看来是一个糟糕的职业举动。即使在一个充斥着政策、流程和办公室政治的庞大公司里，你也不能忘记如何开发软件。而如何开发软件正在改变。现在。就在你脚下，就在这一秒。


    你有你的困扰。我理解。我们来听听。


    *   *“Rands，我正走在总监的轨道上，如果我继续写代码，就没人会觉得我有大局观了。”*


    我对你的第一个问题是：从你即将成为总监的位置上看，你看到软件开发在你的公司内部正在发生变化吗？如果答案是肯定的，我的下一个问题是：它是如何变化的，你打算对此做些什么？如果你的答案是否定的，那么你需要挪动你的椅子，因为我向你发誓，软件开发就在此刻正在改变。如果你慢慢忘记了软件是如何构建的，你怎么可能拥有大局观？


    我的建议不是让你在下一个版本中给自己分配一大堆功能。我的建议是你要采取行动，以便与你的团队构建产品的方式保持联系。作为一个总监或副总裁，你完全可以做到这一点。稍后会详细说明。


    *   *“呃，Rands，总得有人当裁判。总得有人要有远见。如果我写代码，我就会失去对工作的全局视角。”*


    你仍然需要当裁判，你仍然需要协调决策，你仍然需要每周一早上花30分钟和那个需要通过每周的“我们要完蛋了”咆哮来发泄的工程师绕着街区走四圈，但你也需要保持工程思维，而要做到这一点，你不需要成为一个全职的编码者。


    我对保持工程思维的建议：


    1. 使用开发环境来构建产品。这意味着你必须熟悉你团队的工具，包括构建系统、版本控制和编程语言。这个任务会让你与你的团队用来讨论如何完成工作的语言保持联系。它也会让你能够继续使用你最喜欢的文本编辑器……这太棒了。'
  raw: 'Code lives forever. Good code not only lives, it grows as those who value
    it make sure that it doesn’t become stale. It’s this pile of high-value, well-maintained
    code that is helping shrink the average size of the engineering team because it’s
    allowing us to focus less on writing new code and more on integrating existing
    code to get the job done with fewer people and in less time.


    There’s a depressing line of reasoning here, the idea that we’re all just a bunch
    of integration automatons using duct tape to connect different preexisting moving
    parts to create slightly different versions of the same thing. It’s this train
    of thought that has a lot of senior management teams excited about outsourcing.
    “Anyone who can use Google and has some duct tape can do this, so why are we paying
    big bucks for our local automatons?”


    We’re paying these management types some pretty big bucks to think this crap up.
    Still, it brings up my final point that there are eager, bright developers all
    over the planet and they’re eager and bright even though they haven’t spent a
    moment in an accredited university. Oh yeah, and there lots more of them coming.


    I’m not suggesting that you should be worried about your job because some bright
    fellow overseas is gunning for you, I’m suggesting that you should be worried
    about your job because the evolution of how software development occurs might
    be moving faster than you are. You’ve been working for ten years in your job,
    five years as a manager, and you’re thinking, “I know how to develop software.”
    And you do. For now.


    Remove Yourself from the Code, But …


    If you follow my original advice and remove yourself from the code, then you are
    removing yourself from the act of creation. This act is why I don’t really sweat
    outsourcing. Automatons don’t build, they process. While good process can save
    a lot of money, it’s not going to bring anything new to the world.


    With smaller teams doing more for less, removing yourself from the code strikes
    me as a bad career move. Even in a monstrous company laden with policy, process,
    and politics, you can’t forget how to develop software. And how to develop software
    is changing. Now. Right under your feet, this very second.


    You have issues. I understand. Let’s hear them.


    *   *“Rands, I’m on the director track, and if I keep coding, no one is going
    to think I can scale.”*


    My first question to you is this: from where you are sitting in your soon-to-be-director
    chair, do you see software development changing within your company? If the answer
    is yes, my next question is: how is it changing, and what are you going to do
    about it? If your answer is no, then you need to move your chair because, I swear
    to you, software development is changing right this second. How in the world are
    you going to scale if you’re slowly forgetting how software is made?


    My advice is not that you start assigning yourself tons of features in the next
    release. My advice is that you take action so that you stay in touch with how
    your team builds stuff. You can do this as a director or a VP. More on this in
    a moment.


    *   *“Uh, Rands, someone has to referee. Someone has to have the vision. If I
    code, I’m going to lose perspective on my job.”*


    You still need to referee, you still need to massage decisions, and you still
    need to spend 30 minutes every Monday morning walking around the block four times
    with that engineer who needs to get through his weekly “we’re doomed” rant, but
    you also need maintain an engineering mindset and you do not need to be a full-time
    coder to do this.


    My advice for maintaining an engineering mindset:


    1.  Use the development environment to build the product. This means you must
    be familiar with your team’s tools, including the build system, version control,
    and programming language. This task is going to keep you in touch with the language
    your team uses to talk about how they get stuff done. And it will also allow you
    to continue to use your favorite text editor … which rocks.'
