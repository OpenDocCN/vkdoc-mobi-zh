    # 坠落之感


    坠落带来的感受与教训的规模不成比例。你体验到的不仅是失败感，还有巨大的非理性失望——你不再是一个你从未接触过任务的专家——这很愚蠢。关键是——你现在正好有足够的经验，可以理解掌握一项你曾以为能神奇地即兴发挥的任务所需付出的实际努力。


    华莱士式的坠落在新晋领导者中很常见，而工程师普遍的内向倾向会加剧这种情况。你会发现不仅你领导的某个人不跟随你，而且你和这个人之间存在着彻底且完全的个性断裂。你所有惯用的社交手段都失效了。他们对你机智的妙语回应以茫然的眼神，而当他们开口说话时，仿佛你说的每一个字他们都没听见。


    这是一个令人沮丧的发现，因为你成为领导者的部分原因在于你天生且被证明有效的人际交往能力。但这也是一个令人羡慕的发现，因为在一个充满人的星球上，大多数人跟你不一样，而且你的第一个“华莱士”绝不会是最后一个。


    # 你的直觉百分之百错误


    与你想要领导的人完全个性断裂，就像华莱士的情况那样，虽然罕见，但为了弄清楚如何解决这个问题，让我们假设这是最坏的情况。


    在与员工进行正常的相互了解时，我第一个想回答的问题是：“他们想要什么？”他们当前工作的核心动机是什么？他们是为了晋升而努力吗？他们只是在摸索工作吗？他们是否迷茫？他们是否安于迷茫？


    理解核心动机并不能让我完全了解一个人，但它给了我一个起点。当我知道他们想去哪里，我就可以开始琢磨如何帮助他们到达那里。不快乐而迷茫的人想要立刻采取行动。寻求晋升的人热切地寻找机会，并且会为了得到机会而承担一切。然而，这是华莱士，当我轻快地问“什么让你感兴趣，华莱士？”时，华莱士茫然地盯着我。


    放弃你能巧妙诱使华莱士说出他的秘密的想法。你所有自然而然的想法，对一个真心相信你是外星人的人来说，都不会奏效。你的首要任务不是理解核心动机，而是基本沟通。


    在任何沟通存疑的情况下，我严重依赖澄清。每当我说了一些可能含糊不清的话，我会问：“你听到了什么？”反过来，当我在倾听时，如果主题或意图不够清晰，我会重述：“好的，我听到的是……”


    听起来像是这样：


    *我：* ……这周末来了新的需求，但詹妮弗仍然希望周四看到一份初步规格说明。华莱士，*你听到了什么？*


    *华莱士：* 詹妮弗周四要一份规格说明。


    现在，如果这是哈罗德或斯坦，我们就完事了。口头承诺已经做出，我们可以继续了，但这是华莱士，我不能做任何假设。


    *我：* 是的，周四的规格说明。那对你的工作意味着什么？


    *华莱士：* 我原计划周一完成文档审查，周二周三搭建测试数据。如果詹妮弗周四需要规格说明，我就没时间做这些了。


    *我：我听到的是*，你有一堆工作需要重新安排时间，对吗？


    *华莱士：* 对。


    *我：* 如果我们重新安排，你认为你能完成规格说明吗？


    *华莱士：* 也许吧。


    我知道这感觉像是消极攻击的奥运会，但我发誓华莱士就是这样思考的。在他的世界里，工作承诺从来不是暗示性的，必须口头说明。我们需要反复沟通，直到他说出：“我将把本周所有计划好的工作重新安排到下周。我会向文档和
    QA 团队传达这些变更的影响，我有中等信心，在周四下班前交付修订版规格说明的初稿不会有什么问题。”


    这很迂腐、烦人且低效，但当个性断裂时，你不知道如何沟通，所以这就是你的起点。通过练习，你会学到独特的交往规则。你会了解到人们用来描述他们快乐与不快的词汇和想法。你会学会当人们完全不知道你在说什么时，他们使用的视觉和口头线索。随着时间的推移，你会为这个与你截然不同的人构建起一幅心理地图。


    与这些“外星人”互动的感觉永远不会自然。它总是显得刻意而陌生，但练习会为你提供一把理解他们思考方式的钥匙，以及一幅或许能让你洞察他们想要什么的地图。


    # 教训的规模


    这花了好几个月。我花了几个月有意识、有目的地与华莱士进行对话，我们俩才在潜意识里同意达成一项沟通和平协议。过程很痛苦——每次华莱士和我陷入那种原始的对话舞步时，哈罗德和斯坦就会互相看着对方，摇头感叹。又是这种胡闹？


    这种胡闹，是我从第一次管理上的“坠落”中学到的重要一课：当沟通不畅时，仔细倾听，重复一切，不做任何假设。华莱士的情况是众多“坠落”中的第一次，也是我开始理解某事的基础，这件事对让未来的坠落不那么灾难性至关重要：人是你永远解不开的最佳谜题。


    # 章节


    # 议程识别


    我讨厌开会。


    *每个人都*讨厌开会，因为我们经历过太多糟糕透顶的会议，以至于我们现在走进会议室，抱臂坐下，想着：“好吧，还要多久这个会议才算正式浪费我的时间？还要多久*这个*会议才会变得无聊透顶？”然后它就真的无聊了。时间被浪费。产生了一堆空话，每个人都围坐在桌子旁，想知道什么时候会有人来制止这种疯狂。


    如果你曾在会议中感到沮丧——如果你坐在那里想知道为什么这些人，这些拿着高薪推动公司前进的管理者，就是不能做或说出那些显而易见的事——那么请继续读下去。


    每当你走进一个可能变得糟糕的会议时，你需要一项基本技能。无论你是参与者还是会议主持人，这项技能都很重要。这项技能叫做*议程识别*。


    简单来说，议程识别是辨别以下内容的能力：


    1.  典型的会议角色以及与会者如何扮演这些角色。

    2.  解释这些不同的会议角色想从会议中获得什么。

    3.  如何利用这种理解，以最快的速度离开会议。


    ## 退出会议技巧 #1：识别会议类型


    离开会议的第一步是识别这是什么类型的会议。会议议程会有帮助，但由于大多数会议没有议程就开始了，你得靠自己。你很可能参加的要么是信息传达会，要么是冲突解决会。


    在信息传达会中（各位，这里有个大惊喜），信息被传递出去。想想你最爱的季度全员大会。员工会议。任何有固定默认议程的会议。这类会议中有两种参与者：发言者和倾听者。


    这些会议中的角色和议程很简单。发言者在发言，倾听者在倾听。明白吗？除了信息传递，没有其他需要解决的问题。信息传递得越快，大家就能越早回去工作。

