- fmt: '**RSU (Restricted Stock Units)** — Unlike stock options (see below), RSUs
    are grants of actual stock. Like options, they vest over a period of time to incentivize
    you to not leave.


    **Résumé** — A very short document that is intended to describe your entire professional
    life.


    **Sales** — The folks who sell your product. Not a good source of product requirements,
    as they are biased by the mighty dollar. Often a good source of discontent, though.


    **Screwed** — A professional inflection point where your chosen course of action
    will allow you to sink or swim.


    **Short Timer** — An employee who has resigned, but still works for the company.
    Short timers’ productivity decreases as a function of the proximity to their last
    day.


    **Silicon Valley** — A nebulous area south of San Francisco full of money and
    very bright people.


    **Slip** — A kinder, gentler word for saying that the product is not on schedule.
    (“We’ve got a three-week slip.”) Frequent slips are often bad career moves, but
    slips for the right reasons are a good thing.


    **Software Development Lifecycle** — The time between when someone has a clever
    idea and when that idea is beaten to death and is no longer making money.


    **Spec (Specification)** — A document that tells you how it is. The process of
    writing a specification tends to be more useful than someone reading it.


    **Spreadsheet** — A poor man’s database.


    **Staff Meeting** — A weekly meeting with all your direct reports. Failure to
    run this type of meeting on a regular basis will result in a breakdown in communication
    and much wasting of time.


    **Status Reports** — The weekly ritual where you justify your existence to managers;
    often a sign of corporate bloatification. You should fight the creation of these
    with all of your might.


    **Stock** — A piece of paper that you’ll never see that says you own part of a
    company. Stocks are easy—you own stocks. Stock options are more confusing.


    **Stock Options** — A piece of paper that you’ll never see that says you can buy
    stock at a certain price. Options often confuse folks, so I’ll explain. You are
    granted an option of 100 shares of your company’s stock at `$100`. Congrats. When
    you sell your option, you will only receive the delta between your option price
    and the current price. So, if you sell all your hypothetical options at `$110`,
    you are only going to receive `$10` per share or `$1,000` (minus taxes). People
    are getting tense about options these days.


    **Synergy** — A word often used in close proximity to leverage.


    **Technical Support** — The person you yell at on the phone when something goes
    wrong with your computer. You really should be yelling at the engineer that designed
    the thing, but they never answer the phone.


    **Temp** — A coworker who likely will not be sitting in that chair tomorrow; typically
    assigned work that no one wants or has time to do.


    **Termination** — The politically correct way of saying “You’re fired.”


    **Twitter** — The means by which you sound like a fortune cookie.


    **Total Compensation** — The sum of everything you are paid by a company. This
    includes salary, bonuses, and benefits. Total compensation is the dollar amount
    you should use when comparing multiple job offers.


    **UI (User Interface)** — The sum total of every decision made regarding how a
    program looks to a user.


    **Unit Test** — Literally the last thing an engineer wants to do.


    **User Experience Design** — A discipline of design responsible for the entire
    user experience.


    **UNIX** — An interactive time-sharing operating system invented in 1969 so that
    some guy could play games.


    **Version Control** — A database that keeps track of multiple versions of any
    given file. Version control is an essential tool for development in groups of
    engineers.


    **VP (Vice President)** — Usually a direct report of the CEO.


    **Weblog (Blog)** — A representation of a person on the Internet.


    **Wiki** — A web application that allows anyone to edit content. It seems like
    a recipe for disaster, but it turns out that people like their content tidy.'
