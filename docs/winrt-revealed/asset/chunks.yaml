- fmt: 'It’s hard to imagine someone not regularly broadcasting clear, demonstrative,
    measurable, and consistent progress. Maybe because you’re still deep in research
    and don’t yet have a theory, and you don’t want to call attention to that fact?
    Maybe there hasn’t been significant progress on anything since your last update?
    You still send status. The message you send by consistently keeping the folks
    who care up to date is not, “We’ve made unique progress” or “We have a theory.”
    The message is, “We are applying constant and consistent pressure on propping
    up the sky.”


    ## The Elusive Step 0


    I’m reading an early draft of this piece and it still feels like there’s romanticism
    about this process. *Look at me, Captain of the War Room*; I’M GOING TO SAVE THE
    WORLD. There’s nothing romantic about this situation. There’s no glory in propping
    up the sky because, chances are, you and your team are partially responsible for
    this situation, and depending on the severity of the disaster, there’s a good
    chance you could get fired. Even if you fix it.


    There’s a fourth step to this process that I’ve confusingly labeled as step 0.
    I’ve put the first step last because I believe it’s the most important part of
    this process. I’ve put the first step last because if you’re able to confidently
    answer the question it calls, you’ll greatly increase the chances that you won’t
    repeat this disaster in the future. The question is, What, precisely, are you
    trying to do?


    It seems like a dumb and obvious question at this very moment, but right now you’re
    chilling with your iPad in the coffee shop. You’ve just taken your third sip of
    that half-caf quad-shot latte and you don’t have a care in the world. If the sky
    were actually falling, you’d be racing to work, breaking speeding laws, and frantically
    thinking, “How am I going to unfuck this situation?”


    Unfucking this situation is a sensible and obvious outcome, and while you’re driving
    105 miles an hour down Highway 280 to the scene of the crime, I will repeat myself:
    *What, precisely, are you trying to do?*


    It’s a hard question to effectively answer when people are yelling, but phenomenal
    answers sound like this:


    * We need to demonstrate to this customer that we are capable of exceeding their
    expectations.

    * We need the people who depend on us to trust that their faith in us is not misplaced.

    * We need the planet Earth to understand that we aren’t evil.


    You will notice that none of these answers read “unfuck the situation.” When the
    sky is falling, as I’ve said before, immediate action feels like precisely the
    right course of action, because, HELLO, THE SKY IS FALLING. But there is a well-defined
    reason for this situation, and it’s likely you won’t know the reason for a while.
    It’s agonizing, but my advice is to not make any decisions on a course of action
    until you have at least a credible answer to this question.


    In the face of disaster, it’s the wise person who does not act until they know.
    Unfucking the situation is a bandage. Understanding what you’re truly trying to
    fix is a cure.


    # CHAPTER


    ## Hacking Is Important


    Back in the early 1990s, Borland International was the place to be an engineer.
    Coming off the purchase of Ashton-Tate, Borland was the third-largest software
    company, but, more importantly, it was a legitimate competitor of Microsoft. Philippe
    Kahn, the CEO at the time, was fond of motorcycles, saxophones, and brash statements
    at all-hands meetings: “We’re barbarians, not bureaucrats!”


    At the time, Kahn was not only navigating the integration of Ashton-Tate, he was
    in the midst of moving the product suite from DOS to Windows. All the products
    were complete object-oriented rewrites, and they were running late. Years late.
    At one all-hands, he explained how he wanted the company to think about itself.
    Recounted from a story in the *Los Angeles Times* from 1992:[¹](#9781430243144_Ch27.xhtml#FON1)


    Kahn was reading a dense history of Central Asia a few years ago when it struck
    him that many of the nomadic tribes of the steppes were actually far more ethical
    and disciplined than the European “civilizations” they were confronting.


    They were austere and ambitious, eager for victory, but not given to celebrating
    it. They were organized around small, collaborative groups that were far more
    flexible and fast-moving than the entrenched societies of the time. They were
    outsiders and proud of it. They were barbarians.


    Kahn’s thinking regarding “barbarians” was prescient. It not only partially inspires
    agile and other lightweight software development methods, but it also reinforces
    a theme big companies are often unintentionally trying to forget: hacking is important.


    ### “Hackers Believe Something Can Always Be Better”


    Facebook doesn’t want to be a big company. Like Google before it, Facebook took
    the time to carefully document the reasons it was not intending to become a traditional
    company in its `S1` (corporate disclosure) filing,[²](#9781430243144_Ch27.xhtml#FON2)
    and while this letter is positioned to the future legion of investors, it is a
    recipe for Facebook employees:


    The Hacker Way is an approach to building that involves continuous improvement
    and iteration. Hackers believe that something can always be better, and that nothing
    is ever complete. They just have to go fix it—often in the face of people who
    say it’s impossible or are content with the status quo.


    Facebook is worried about the growth paradox, which goes something like this:
    the end result of successful hacking is product, and that product needs to grow
    by building more things. The more you grow, the more things you have, and the
    more you need people whose job is simply to coordinate the increasingly interdependent
    building activities. These people, called managers, don’t create product. They
    create process.


    Hackers are allergic to process not because they don’t understand the value; they’re
    allergic to it because it violates their core values. These values are well documented
    in Zuckerberg’s letter: “Done is better than perfect,” “Code wins arguments,”
    and “Hacker culture is extremely open and meritocratic.” The folks who create
    process care about control, and they use politics to shape that control and to
    influence communications, and if there is ever a sentence that would cause a hacker
    to stand up and throw his or her keyboard at the screen, it’s the first half of
    this one.


    The growth paradox is that the chaotic means by which you found success might
    become distasteful to those you hire to maintain and build on that success. Once
    they’ve established themselves, they will point at the hacking and ask important-sounding
    questions such as, “What is it they are building?” or “How does this poorly defined
    thing fit into our overall strategy?” They will label these hackers “disruptors”—and
    they are 100 percent correct.


    Hacking is disruptive, and whether you code software, write books, or film movies,
    I believe bringing anything new into the world is a disruptive act. By being novel
    and compelling, the new is likely to replace something else, and that something
    else isn’t being replaced without a fight.


    Reasonable people are often scared by the new. This is because reasonable people
    are not barbarians, and they are not hackers. They appreciate the predictable,
    profitable, and knowable world that comes with a well-defined process, and I would
    like to thank each and every one of them because these people keep the trains
    running and on time. No one likes barbarians because the barbarian strategy is
    one at odds with civilization. By definition, a barbarian, a hacker, is building
    on a strategy that is at odds with the majority.


    It’s awesome.'
