- fmt: '# 排版后的内容


    The neutral parties, your customers, need to see what you’ve been building because
    all your people are completely insane. All that healthy shifting of the pyramid
    has been taxing them. Each shove forced them to adjust their perspective of the
    pitch, their relation to it, and adapting to change is fucking exhausting. Folks
    who say “I like change” are not currently working at a startup. Folks at a startup
    don’t say much because they’re busy adapting to the latest pyramid shift.


    This state of constant change is the leading cause of startup burnout, and it’s
    also the reason you’ve got to get that product out. The perspective of the neutral
    party is essential validation because you’re nuts. Your pitch has been dissected
    and redefined so many times that it may no longer be something that is useful.
    A neutral party doesn’t care about the pitch, your people, or any of the pyramid
    shoving you’ve been up to; they just care whether the product is useful.


    ## Using the Pyramid


    At no point will you ever draw this hierarchy on a whiteboard during an organizational
    crisis and say, “Folks, pay attention to the pyramid—so says the Rands.” The idea
    is to give you a tool that reminds you, “Hey, it’s all connected!” The pitch guides
    the people. The people refine the pitch. People and pitch create process and product,
    and, yeah, it’s all a big mess and that’s why startups fail.


    The pyramid gives you a hazy map to think about the problems your company might
    face. People will yell in the hallway and it might sound like they’re arguing
    about product, but keep listening, maybe it’s process. Even worse (better?), maybe
    it’s pitch. Your one job as keeper of the pitch is figuring out which layer of
    the pyramid is being tested, and then figure out which way to shove the pyramid.
    This leads us to our last fact:


    *Fact #6: The lower the failure, the higher the cost.*


    A year into my startup, the founders were at a crossroads. We were doing an enterprise
    web application that was built for onsite deployment. Problem was, everyone was
    going loopy about hosted services. The pitch there was: “Look how much time and
    energy I’ll save you by hosting this application in my data center, not yours.”
    This idea flew in the face of years of Oracle, PeopleSoft, and IBM domination
    of that huge pile of business software and hardware sitting in your data center,
    but it was the Internet and the Internet was going to save the world.


    The founders changed their pitch. “We’ll just create copies of the software in
    our data center! We’ll save money keeping our bits close to home!” No huge difference
    there? Wrong. This adjustment to our pitch changed the fundamental architecture
    of our product. Rather than have hundreds of customized versions of our software
    sitting in various data centers, we had to have one copy of our software that
    was configurable to each of our customers’ needs, and that wasn’t the product
    we designed.


    It wasn’t an instant disaster. We had piles of money to throw at this transformation,
    but the transition cost became so great that we stopped working on anything except
    getting the hosted application working and, right about then, the bubble burst.


    Let’s call “failure” a really bad decision. It’s when you choose to change something
    and that change percolates up through the pyramid. If you make a bad decision
    regarding version control, well, you can probably adjust to that. You can fire
    a free electron and probably find another bright person who can channel the pitch
    better, but you’re probably going to rattle more than you think. A failure of
    pitch is a structural failure that affects your entire company Everything in your
    company depends on the vision that you’ve presented and screwing that up can be
    fatal.


    ## Building Culture


    If you’ve actually got a pitch ready to go, again, that’s terrific. This totally
    conceptual model I’ve thrown together doesn’t cover some major topics that you
    need to understand. How are you going to fund this thing? Where do you find VCs?
    Where do you find great people? Your life will become an endless list of questions
    and decisions and you’ll probably forget everything I just wrote in your frenetic
    sprint to keep your pitch alive, so I’ll simplify. The hierarchy I describe is
    not a model for how to build a great product; it’s a picture that describes the
    construction of the culture of your company. That’s what you’re really building
    in 1.0\. A lasting, interesting culture that, if you’re lucky, continues to produce
    great products.


    Think of your five favorite companies and think about what made them successful.
    Yes, they probably had a great 1.0\. Think about when you first saw a Mac. Think
    of the first time you saw Netscape. How about your first useful search on Google?
    Those products are the end result of people killing themselves to get the damned
    thing out the door, but these people weren’t just creating that product. Their
    work defined the culture of the company, and that is what modeled their future
    success.


    And that’s why 1.0 is trying to kill you. 1.0 is expecting you to underestimate
    it. 1.0 wants you to think all you are building is a product, but the product
    is merely the outcome. A successful 1.0 is measured by the success of the product
    that ships, but it is built by a seemingly endless amount of decisions, arguments,
    failures, and successes that you can’t plan for that will teach you everything
    you need to know, but are, inconveniently, trying to kill you.


    ## How to Start


    At the time of this writing, it’s been almost seven years since I’ve updated the
    design for the Rands in Repose web site. In that time, I’ve done multiple designs,
    learned an entirely different publishing platform, and migrated the existing content
    over many times. What has always remained is an ever-growing list of details supplied
    by the act of starting.


    The length of time since the last update isn’t surprising. Since Rands was last
    updated, I’ve been busy. I’ve written over 200 articles and published 2 books.
    What’s surprising is the amount of time I spend preparing to start via a vast
    array of impressive mental gymnastics on tasks I want to do. It’s shocking. Case
    in point: since the major redesign of the site, my rough estimate is that for
    two solid months I’ve not actually been working on the site, but getting started.
    I’m not talking about actual measurable progress; I’m talking about the fussing,
    orienting, and random thinking surrounding getting started.


    After the first three years of starting, I decided to get strategic. I decided
    to keep track. *Clearly, I have starting issues, so rather than obsess about them,
    I will enumerate and understand them. What, precisely, am I doing rather than
    working?*


    ### A Critical Analysis of Beginning


    Beginning is a three-phase commit: you’re either fretting about starting, you’re
    preparing to begin, or you’ve begun. It’s the middle state of preparation I want
    to explore, because it is during this time that we unnecessarily torture ourselves.
    We lie to ourselves about wasting time and beat ourselves up with guilt-laden
    words such as *procrastination*, *slacker*, and *lazy*. But I believe we’re actually
    getting important work done.


    Specifically, I believe three things:


    1.  Your brain is smarter about thinking than you think. I believe the many states
    of preparation are your brain cleverly and proactively trying to help you begin.
    Unfortunately, many of these states really do look like goofing off. This is why
