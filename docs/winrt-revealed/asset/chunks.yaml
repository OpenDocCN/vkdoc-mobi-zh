- fmt: '# The Goal of the Deliver Phase


    The goal of the `Deliver` phase is straightforward. You need to explain to the
    team that a decision has been made. Sounds easy, right? Well, this is where junior
    managers blow it. They do a good job of explaining the decision, but they fail
    to convey that *this is the decision* and further debate is not necessary. A good
    sign of poor mandate delivery is when the delivery degrades into another debate
    of the issues. Delivering a mandate takes moxie. The team has got to leave the
    room knowing the decision has been made. They don’t have to like it, they may
    hate it, but they can’t leave the room thinking there’s wiggle room in what you
    decided.


    Again, an added benefit of my collaborative management style is that delivering
    mandates is less controversial because I’ve already vetted the various flavors
    of the decision with all the folks who have an opinion. When the mandate lands,
    it feels less like laying down the law and more like I’m relaying the results
    of our investigation. I still piss off those who disagree with the decision, but
    they know they were heard.


    ## Deliver (Again)


    Congratulations. You’ve delivered your first mandate and now you’re staring at
    a room full of heads nodding in the affirmative. Even the folks who have been
    screwed by your decision are nodding. Well done!


    There’s more work to do.


    All that head-nodding is a big ego boost, but the fact of the matter is that each
    person walking out of the meeting has one of three distinct opinions:


    - **Yay:** You are a great motivator. The winners will have this opinion of you,
    and you still need to deliver (again).

    - **Boo:** You are a tyrant. Commonly held by those who’ve been screwed. You must
    deliver (again).

    - **Yawn:** What took you so damned long? Silent majority here. Don’t sweat them.


    The `Deliver (Again)` phase might be better called damage control, but that makes
    it sound like you screwed up by pushing the team forward and you didn’t. Maybe.
    Delivering (again) is taking the time to individually express your reasoning to
    the concerned parties—both the winners and the losers. This not only gives you
    a chance to re-enforce what you mandated, but also gives coworkers the chance
    to respond in a non-team setting. Expect more venting. In fact, insist on it.
    If you’re sitting with someone who was on the losing side of the decision and
    they’re still nodding their head, *they don’t believe the battle is over.* They’re
    sitting there figuring out their next move to erode the mandate. If you fail to
    get this person to open up, you will be mandating (again) in a few short weeks.


    Delivering (again) is not going to quench discontent in your team, but it’s going
    to give everyone involved a chance to speak up, and that should push your management
    karma toward motivator and away from tyrant.


    ## Foreign Mandates


    I’ve been talking about the ins and outs of local mandates so far. These are situations
    where you are the decision maker, which gives you access to a wealth of information
    as well as all of the players. In any decent-sized organization, you are equally
    likely to be on the receiving end of foreign mandates. This is a mandate that
    occurs way outside of your sphere of influence. *We have a brand new strategy.
    Ready. Go.*


    Yes, the tables are turned. Mandates might just randomly show up and there isn’t
    a thing you can do about it.


    Guess what? The same rules mentioned previously apply, with one exception. Just
    like your team, you are going to have one of the three opinions (yay, boo, or
    yawn) regarding the mandate. Regardless of what your opinion is, you must figure
    out the justification behind the mandate. You might have a yawn opinion about
    this, but what about the rest of your team? They might hate the mandate, and you
    are going to look lame when you relay the mandate without a clue as to why the
    mandate showed up.


    Here’s the rub—mandate justification often does not travel well through a large
    organization. Either someone in your management food chain had a yawn reaction
    to the mandate and didn’t bother to gather a justification, or the grapevine has
    tainted the justification to the point that it no longer makes any sense. Either
    way, you’re going to be delivering news to your team sans reasoning. This blows.
    I’m certain that companies that exhibit this poor communication structure are
    the same ones that have reputations for notoriously tyrannical CEOs. Maybe they’re
    not tyrants. Maybe they’re surrounded by poor communicators. Or maybe they are
    tyrants. I can’t tell from where I’m sitting.


    The good news is that if you ever have to deliver a mandate without the facts
    to back it up, you’re less likely to pull a rookie mistake and land your local
    mandate without the reasoning … the justification. You’re also not going to forget
    to deliver (again), because you know that each time you stand in front of your
    team, trying to be a leader, they are watching and they are listening. They want
    to know if you deserve the title of manager.


    # CHAPTER: Information Starvation


    There’s someone standing outside your office, and he’s not saying a thing.


    It’s a freakout, but for now he’s just standing there. Or maybe he’s not. Maybe
    he’s employing the Hover—where he walks by every few minutes. It could be the
    Long Stare, where he stands outside and just glares. My favorite is the Avalanche,
    when you look up from your screen and have mere seconds to brace yourself before
    the tumbling heap of frustration piles into your office.


    What you call these freakouts is unimportant. What’s essential is that you figure
    out how you, the manager, could have prevented them. It probably has to do with
    a lack of information.


    ## Information Conduit


    One of your many jobs as manager is information conduit, and the rules are deceptively
    simple: for each piece of information you see, you must correctly determine who
    on your team needs that piece of information to do their job.


    Easy, right? An e-mail shows up, you read it, and you decide it needs to go to
    one of your developers. So you forward it. Here’s the wrinkle: there’s vastly
    more information than you think; there are more people who need it than you expect;
    you’re going to screw up your assessment of who needs it more often than not;
    and you’ve got a lot of other essential crap to do.


    First, let’s worry about the consequences of poor information management, because
    that’s how I’m going to get your attention.


    So, a not-so-average day at the office. There are rumors of layoffs wandering
    the hallway, and the rumors are correct. Now, there’s a Long Stare outside your
    office, and, of course, the first thing you do is invite her in so you can triage
    Long Stare’s issue.


    “Why the long stare?”


    “The what?”


    [Denial.]


    “You’ve been outside my office for two minutes staring at me.”


    “I have?”


    [Wow, total denial.]


    “So, what’s up?”


    “Um, am I going to be fired?”


    Now, this is your best developer. She’s your rock star. She’s the one you throw
    the vaguest of ideas at and you know she’ll turn that hand-waving into a feature,
    a product. She’s done it *five times* and now she’s in your office wondering if
    she’s about to be fired.


    What happened? How is it possible your single most valuable engineer believes
    she’s so irrelevant that she could be let go?


    She’s starved for information, and in the absence of information, people will
    create their own.


    ### Nature Abhors a Vacuum


    Think back to your last layoff. What happened? Well, first you heard the rumor
    that “layoffs are coming,” which, as it turns out, wasn’t a rumor and was the
    last factual thing you heard for the next three weeks.


    See, the management team was spending those three weeks trying to figure out what
    was going to happen and who was going to get laid off. But they didn’t actually
    know yet so they weren’t saying anything, which was precisely the wrong thing
    to do.'
