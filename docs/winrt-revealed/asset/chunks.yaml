  trans: '

    # 1. 极客们近乎永恒的追求，便是管理所有那些阻碍他们进入“心流状态”以追寻“高峰体验”的破事儿。会议、毫无意义的闲谈、生理上的不适、空调启动时天花板传来的神秘敲击声——极客在进入状态的头
    15 分钟里所做的一切，都是在构建专注力，这就像搭建一个叠叠乐积木塔，任何微小的干扰都能将其摧毁。


    # 2. 你允许极客停留在心流状态的每一秒钟，都有一秒可能发生他妈的神奇之事。


    # 3. 正如《洞穴中的极客》第 33 章中所解释的，你的极客为自己建造了一个洞穴。它看起来可能不像个洞穴，也可能像。建造它的目标很简单：保护心流状态，这样我们才能追逐高峰体验。现在就站起来，走到你每一位极客的办公室，去探索一下这些洞穴。问这个问题：“他们是如何保护自己的专注力的？”背对着门？戴上耳机？使用大尺寸屏幕？要理解你的极客如何保护他的洞穴，你需要问……


    *你的极客的连帽衫是什么？* 我穿上连帽衫时写作状态更好。把头包裹起来有种温暖而像洞穴一样的感觉——它让我可以理直气壮地忽视世界。久而久之，我周围的人都知道，打断穿着连帽衫写作是死罪。他们知道，当我伸手拉起连帽衫罩住头时，说明我已经成功屏蔽了地球上所有干扰，正在与我手头工作的纯粹本质进行交流。


    这不理性，但很美妙。


    你的极客也有一件连帽衫。这是一个视觉提示，告诉别人在她追逐高峰体验时请远离，而你的工作就是识别并执行这个规则。我不了解你的极客，所以不知道你会有什么发现，但我确信，这些类似连帽衫的执念，即使你去问，也往往让你觉得毫无道理。*是的，旁边总会有激浪饮料。当然，我们永远离不开正方形的粉色便利贴。*


    别纠结。支持它。同时，也要理解这些极客行为可能带来的有趣且潜在的负面副产品，例如……


    *非我发明综合症：* 当你要求你的极客构建某个重要东西时，他倾向于自己动手构建，而不是借用别人的成果。不，更正一下：你的极客在接到构建任务时的默认开场白是：“我们能比任何人都做得更好。”


    首先，他们可能确实能做到，但这成本高昂。其次，理解为什么这是他们的开场白很重要。极客在处理问题时的理想心智状态是“第一高峰体验”——对问题有一个完全理解的模型。问题在于，每位极客获取这种高峰体验的策略路径都不同。


    不幸的是，代码往往是我们灵感唯一的文档，而你的极客宁愿设计自己的灵感，也不愿去适应别人的。当一个极客说“我们能做得更好”时，他其实是在说：“我还没花必要的时间去理解现有的解决方案，而且从头构建比研究别人的破烂玩意儿更有趣。”


    如果你的极客执意要自己构建而不是购买现成的，没问题，让他证明给你看。把“为什么从头构建比采用现成解决方案更合理、更具战略性”这个问题本身，作为需要解释的问题。


    *尖刻的极客：* 极客的另一个默认开场白是尖刻——爱发牢骚。你的诊断是：*他为什么不能成为一个好的团队成员？* 确实存在长期消极的极客，但根据我管理极客的经验，更常见的情况是，极客之所以尖刻，是因为他们已经见过这种情况四次，而每次结局都一模一样。每一次都是：*每当管理层感觉自己脱节时，我们就会被拉去参加一个异地会议，花上两天时间，说得太多，做得太少。*


    极客通常并不尖刻；他们只是消息灵通。来自极客的冷嘲热讽是一个领先指标，表明我在浪费他们的时间，当我发现这一点时，我会不断提问，直到我理解了效率低下的原因，这样我才能改变它或解释它。


    *漠不关心或游离的极客：* 你的极客不参与。已经过去一周半了，据你所知，她只是在白板上创建并不断编辑一个待办事项清单。无论她是漠不关心还是游离，你的极客都卡住了。这里有两种可能的情况：她不想参与，或者她无法参与。


    这里的诊断与非我发明综合症类似——问题是否有亮点？也就是说，是否存在某种独特性，使得原创工作成为可能？好吧，有亮点。但是不是亮点太过了？你的极客是否超出了他的能力舒适区？当极客看起来卡住时，我最喜欢的做法是把他和一位可信赖的技术同行配对——不是竞争对手，而是同伴。


    一旦你发现了高峰体验的生产力，你就会尝试去激发它。坏消息是，激发过程完全由你的极客掌控，并且因人而异。你可以保护洞穴，尊重连帽衫，但你的极客会选择何时深入。你施加给极客的压力，与你将遇到的阻力成正比。


    找一个同伴——一个能接受这种“缺乏亮点”感知的人，或者一个能说出那句话、足以让你的极客开始追逐高峰体验的人。


    ## 极客的负担


    我之前花了很多篇幅，把极客描绘成执迷于控制宇宙的控制狂。事实是，你的极客知道系统是如何运作的。她知道你所知道的事情——混乱是必然的。它既不高效也不可预测，但它就是会发生。


    你和你的极客在应对混乱方面，目标惊人地一致。你想让她构建一个东西，并且构建得很好。你希望它能在没人能预测的怪异情况下可靠运行。你希望它在你最意想不到的时候能够扩展。你想要被惊艳到。


    去惊艳你的极客吧。营造平静而幽暗的环境，让他们能轻易进入心流状态。在你的极客周围保持一贯高效表现，这样他们就能把精力花在他们构建的东西上，而不是担心他们无法控制的事情。通过识别他们何时卡住或只是无聊，帮助他们扩展。让他们去追逐那些高峰体验，因为只有这样，他们才能惊艳所有人。


    * * *


    ¹ [`en.wikipedia.org/wiki/Year_2000_problem`](http://en.wikipedia.org/wiki/Year_2000_problem)


    ² [`randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html`](http://randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html)


    ³ [www.beinggeek.com/](http://www.beinggeek.com/)


    ## 极客注意力缺陷障碍（NADD）


    《南方的枪声》这本书的主旨直白却古怪。假如在内战期间，南方军队装备了大量 AK-47 会怎样？长话短说，他们会赢。轻松取胜。作者哈里·托特多夫没有选择聚焦于时间旅行或其他精彩的科幻元素；他花时间描绘的是：“耶！南方赢了！那么，呃，他们打算怎么处理那个奴隶制问题？”


    虽然我确信内战爱好者会喜欢这本书，但它并不适合有我这号特殊障碍的人：*极客注意力缺陷障碍*，简称 NADD。当我读这本书时，这个无害的状况就出现了，因为很明显，这本书是对一个虚构的内战后时期生活方式和道德的深度探讨……ZzZzZzzZZzz。

    '
- fmt: '# Now, *Guns* is a Fine Read


    Now, *Guns* is a fine read, but more than once I was flipping ahead through the
    pages wondering, “OK, how long is this chapter?” When I neared the end of the
    book and it became clear that some time traveler from the future wasn’t going
    to appear and, using some whizbang futuristic device, join the North and South
    together, well, I was disappointed. Sure, I’m happy that President Lee learned
    his lesson and started abolishing slavery on his own, but … no lasers? Please.


    Folks, I’m a nerd. I need rapid-fire content delivered in short, clever, punchy
    phrases. Give me Coupland, give me Calvin and Hobbes, give me Asimov, give me
    the Watchmen. I need this type of content because I’m horribly afflicted with
    NADD.


    If you’re still with me, it might mean you also suffer from some type of NADD-related
    disorder. Let’s find out.


    Stop reading this book right now and walk over to your desktop. How many things
    were you doing when you were last there? Me, I’ve got a terminal window session
    open to a chat room, I’m listening to music, I’ve got Safari open with three tabs
    where I’m watching stocks on E\*TRADE, I’m tinkering with a web site, and I’m
    looking at weekend movie returns. Not done yet. I’ve got iChat open, ESPN.com
    is downloading sports trailers in the background, and I’ve got two notepads open
    where I’m capturing random thoughts for later integration into various to-do lists.
    Oh yeah, I’m rewriting this chapter as well.


    Folks, this isn’t multitasking. This is an advanced case of nerd attention deficiency
    disorder. I am unable to function at my desktop unless I’ve got, at least, five
    tasks going on at the same time. If your count comes close, you’re probably afflicted
    as well. Most excellent.


    ## A Nerd Diagnosis


    My mother first helped diagnose me with NADD. It was the late 1980s and she was
    bringing me dinner in my bedroom (nerd). I was merrily typing away to my friends
    in some primitive chat room on my IBM XT (super nerd), listening to music (probably
    Flock of Seagulls—nerd++), and watching *Back to the Future* with the sound off
    (nerrrrrrrrrrd). She commented, “How can you focus on anything with all this stuff
    going on?” I responded, “Mom, I can’t focus without all this noise.”


    The existence of NADD in your life is directly related to how you’ve chosen to
    deal with the media deluge that has accompanied our insatiable thirst for new
    technology. You’ve likely gone one of three ways:


    1. You’ve checked out. You don’t own a TV and it’s unlikely you’re even reading
    this chapter.

    2. You enjoy your content in moderation. When I asked you to count the windows
    on your desktop, you either said, “One, my mail client, to read my incoming e-mail,”
    or you made yourself a note to check this *after* reading this chapter. You probably
    own a day planner, which you can touch from where you are sitting right now.

    3. You surf the content fire hose. Give me tabbed browsing, tabbed instant messaging,
    music all the time, and TiVO TiVO TiVO. Welcome to NADD.


    The presence of NADD in your friends is equally easily detectable. Here’s a simple
    test: Ask to sit down at their computer and start mucking with stuff on their
    desktop. Move an icon here, adjust a window there. If your friend calmly watches
    as you tinker away, they’re probably NADD-free. However, if your friend is anxiously
    rubbing their forehead and climbing out of their skin when you move that icon
    *12 pixels to the right,* there’s NADD in the house. *Back away from the computer.*


    ## The Context Switch


    You may think the core competency behind NADD is multitasking, and it’s true,
    NADD sufferers are amazing multitaskers, but it isn’t their fundamental skill.
    It’s the context switch.


    The idea of the context switch is key to understanding NADD and it’s a simple
    concept. In order to focus on something, you need to spend time and energy to
    get your brain in the right mental state. Think about your Sunday morning reading
    of the *New York Times.* You’ve got your coffee, your comfortable pajamas, your
    couch, and you’ve got whatever story it is that you’re reading. All of this is
    your context.


    Now, halfway through your current story, I’m going to rip the paper from your
    hands and turn on CNN, which happens to be running exactly the same story that
    you were just reading.


    What. The hell. Just happened?


    You just experienced a context switch. It’s not a horrible one, since you’re luckily
    experiencing the same story; it’s just in a different medium—TV talking heads
    with that annoying scrolling news bar at the bottom of the screen.


    Still, it’s jarring, right? Forget about why I’m yanking the paper from your hands,
    I’m talking about the mental shift from reading a story to watching it. It takes
    time to switch. For you. A healthy NADD sufferer would barely notice the switch.
    In fact, chances are, they’re already digesting their news via random different
    media right this second.


    What separates a NADD sufferer from everyone else is that the context switch is
    transparent. The mental muscle that drives the context switch is well developed
    because it’s spent a lifetime switching between random streams of data, trying
    to make sense of a colossal amount of noise to hear what is relevant.


    Anyone can multitask. NADD sufferers multitask with deft purpose. They’re on a
    quest of high-speed information acquisition and processing.


    ## Leveraging NADD


    I’m making NADD sound like a trait of information-obsessive power freaks, and,
    well, it is. How else can you deal with a world where media is forced on you at
    every turn? You become very adept at controlling it. There’s more good news.


    Folks who are not afflicted with NADD think those who are can’t focus because—look
    at us—we’re all over the place. *Please stop clicking on things—you are giving
    me a headache.* Wrong. Those with NADD have an amazing ability to focus when they
    choose to. Granted, it’s not our natural state, and yes, it can take us longer
    than some to get in the zone (see Chapter 33 for more about the zone), but when
    we’re there—*boy howdy.*


    The web is designed with NADD in mind. Whether it’s the short burst of information
    that comprises a weblog or the RSS behind it, which allows me to read *every weblog
    ever,* the Web knows about NADD. It knows that any good web page is not designed
    to answer the question “Do you want to learn?” it’s “How long do I have your attention?”


    NADD can advance your career, if you’re in the right career. Ever worked at a
    startup? Ever shipped software? What are the last few weeks like? We call it a
    fire drill because everyone is running around like a crazy person doing random,
    unexpected shit. NADD is the perfect affliction for managing this situation because
    it’s an affliction that reduces the cost of the context switch.


    If the building you are currently in is burning to the ground, go find the person
    with NADD on your floor. Not only will they know where the fire escape is, they’ll
    probably have some helpful tips about how to avoid smoke inhalation, as well as
    a vast array of likely probabilities regarding survival rates in multistory building
    fires. How is it this junior software engineer knows all this? Who knows, maybe
    he read it on a weblog two years ago. Perhaps a close virtual friend of his in
    New York is a firefighter. Does it matter? He may save your life, or more likely,
    keep you well informed with useless facts before you are burned to a crisp.


    ## Downsides


    I’m making NADD sound like a rosy affliction. There are downsides.'
