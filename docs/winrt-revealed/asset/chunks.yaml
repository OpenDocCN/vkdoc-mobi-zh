    \ QA 部门”，到彻底爆发：“*再多一次*让我听到托马斯在他办公室里磨他那该死的中产认证秘鲁咖啡豆，我就要崩溃了。”\n\n当倾诉开始时，你可能会误以为这是一场对话。其实不是。这是一个心理泄压阀，你的工作就是尽你所能地倾听。不要解决问题。不要转移话题。不要安慰。还不是时候。你的员工正在进行心理大扫除，打断这个扫除过程就失去了意义。他们不想要解决方案；他们只想被听见。\n\
    \n倾诉是有结论的。总有一个你需要介入的时刻，但这些结论以及你的行动各不相同。\n\n*   **倾诉结束：** 倾诉开始失去势头，倾诉者发现自己喘着气，盯着你无话可说——因为他们已经说完了所有，可能还重复了好几遍。正是在这一刻，你开始做评估分级。*好，现在我们开始谈谈……*\n\
    \n*   **这是咆哮：** 倾诉可能会重复自己。同样的事实和内容可能以几种不同的方式向你抛来。我认为这种重复是一种咀嚼问题的健康方式，但到某个点，倾诉就变成了咆哮。经过几次倾诉循环后，你可以尝试抓住对话的主动权，从评估分级开始，但要做好准备——倾诉者可能还没说完。我的建议是，面对抗拒时，给予他们信任，让他们再来一轮。\n\
    \n    那种不需要帮助的倾诉就是咆哮。咆哮者不知何故认为，无休止地重述自己的观点就是解决方案。也许他们完全不知道解决方案可能是什么，或者如何找到它；又或者，他们对这个话题思虑过久，以至于完全失去了逻辑。\n\
    \n    无论背后的故事是什么，咆哮者正在从无休止地重述问题中获得某种奇怪的心理满足，但他们在这一点上对解决实际问题毫无兴趣。很烦人。当你确认手头是一次咆哮时，你可以直接介入倾诉——你是在为所有人节省大量时间，并且你也在教咆哮者，不停地重述问题并不是进步。\n\
    \n*   **这是灾难：** 你在仔细倾听倾诉。它正在向前推进，没有重复，但是……有些不对劲。也许是他们的举止，也许是话题本身，但你的雷达在报警。倾诉者并没有站在他们通常的“肥皂盒”上。他们一反常态，而且随着时间的推移，他们越来越不像自己了。\n\
    \n    倾诉的核心是情感驱动。这就是“更新状态”和“倾诉”之间的关键区别。这个话题触发了情绪反应，倾诉者的“疗法”就是口头陈述和重述情况。情感是一个滑坡，开始时只是倾诉，但有可能螺旋式升级为灾难。这在商业中很少见，但当你处理情感易变的人类时，这是一种风险。\n\
    \n# 灾难（The Disaster）\n\n如果倾诉感觉像一场演讲，那么灾难感觉像一场攻击。起初是一场情绪化的对话，现在已经演变成一场战争，而你突然且意外地身处战场。\n\
    \n在你见识过一次灾难之前，很难预测你对自己感觉受到攻击会如何反应。无论好坏，这种事我已经经历过足够多次，所以当我看到灾难临近时，我会小心地把所有情绪装进一个盒子，锁上盒子，然后神奇地变身为一个瓦肯人。\n\
    \n当灾难降临时，最糟糕的反应就是任何形式的情绪表露。你看，在这种情况下，倾诉者想打架。他们真的想就这个特定话题“过上几招”。原本高度沮丧的情绪已经变成了纯粹的攻击性；如果你哪怕眨错一下眼，你都是在加剧事态的升级。\n\
    \n以下是一些识别和处理灾难的技巧：\n\n*   **你正在交谈的人已经不是他/她自己了。** 当你坐在那里经受灾难时，请记住，你正在经历一个反常现象——一个只有在他们处于崩溃边缘时才会出现的古怪情绪化版本。你熟悉的那个人……终究会出现的。\n\
    *   **闭嘴。真的。** 你在灾难期间的主要任务是缓和局势，而缓和局势的第一步就是什么也不做。如果你是一个逻辑清晰、理性行事的管理者，你会倾向于问澄清性问题——试图梳理问题。别问。保持安静。让情绪过去。原因如下……\n\
    *   **问题本身已经不是重点了。** 你面对的已经不再是问题本身。你正在经历的是员工对该问题附加的情绪包袱。当然，存在核心问题，但你现在观察到的并非如此。你看到的是对该问题的极端负面反应，这才是首先要处理的事。\n\
    \n与倾诉一样，成功在于穿越情绪的爆发。希望会有一个时刻，大部分情绪已经过去，受委屈的人愿意进行理性的讨论。与倾诉不同，讨论不会从核心问题开始。它将以灾难本身为起点，探讨围绕该话题的强烈情绪。\n\
    \n一场灾难是管理不善的最终结果。当你的员工认为完全失控是一种有效的策略时，那是因为他们相信这是让事情发生改变的唯一选项。\n\n# 假设他们有东西可以教你\n\
    \n有句老话说：“人是你最宝贵的资源。” 我想说，他们是*唯一*的资源。电脑、办公桌、办公楼、数据中心……等等。所有这些其他工具，都只服务于你唯一的资源：你的员工。\n"
- fmt: '**People mentally wander.** It’s in their nature to make off-the-cuff observations—“Why
    does Phil get the choice features?”—and to let those observations fester, mutate,
    and sometimes transform into a Disaster. I’m not suggesting that every one-on-one
    be a tortuous affair to discover deeply hidden emergent disasters, but that they
    offer a weekly opportunity for you to see where dissatisfaction might quietly
    appear. A one-on-one is your chance to perform weekly preventive maintenance while
    also understanding the health of your team. A one-on-one is a place to listen
    for what your employee isn’t saying.


    The sound that surrounds a successful regimen of one-on-ones is silence. All of
    the listening, questioning, and discussion that happens during a one-on-one is
    managerial preventative maintenance. You’ll see when interest in a project begins
    to wane and take action before it becomes job dissatisfaction. You’ll hear about
    tension between two employees and moderate a discussion before it becomes a yelling
    match in a meeting. Your reward for a culture of healthy one-on-ones is a distinct
    lack of drama.


    ## CHAPTER


    ## The Monday Freakout


    **Mondays start on Sunday.** It’s the moment you realize that the weekend is over
    and you begin staring at the endless list of things to do that you began to ignore
    early Friday as the sweet, sweet smell of the weekend filled your office.


    As a rule, the earlier on Sunday that you think about Monday is an indication
    of how much you neglected to do on Friday. Worse, the more time you spend during
    your weekend fretting about your weekdays, the more pissed off you’re going to
    be when Monday actually arrives. The extreme case is when someone spends the entire
    weekend working themselves into a frustrated knot of stress regarding their work
    situation, and that means, when Monday arrives, they might freak out.


    This Monday’s freakout was courtesy of my QA lead, Dingfelder. He was simmering
    in the hallway all morning. He was talking in sharp, hushed tones to anyone who
    would listen. I already knew about the topic, but I was surprised by his verbal
    intensity. Right after lunch, he struck. Hands tightly folded in front of him,
    Dingfelder stood in my door, lightly bouncing on the front of his feet.


    “Rands, can we talk for a minute?”


    Shit.


    I gripped the table and braced myself.


    “Dear lord,” he said. “We’re going to ship horrible product and you’re setting
    unrealistic deadlines and QA always gets the shaft and do we support Internet
    Explorer 9 and my credibility is on the line here and Jesus Christ didn’t we learn
    our last time please I hate HTML and this developer keeps on diddling with shit.”


    **Rands Rule of Software Management #27**: If someone is going to freak out, it’s
    going to be on a Monday.


    ### Freakouts


    Freakouts are unique because of their intensity. The first time you’re on the
    receiving end, you’ll be unable to catch your breath because of the shock. How
    did this usually calm person end up yelling in my face? Let’s not worry about
    that right now. Let’s first understand how to deal with the freakout in front
    of you, and that means following the rules.


    #### Don’t Participate in the Freakout


    The worst type of freakout is one that is purely emotional, illogical, and based
    on little or no fact. It also lacks any type of solution because there really
    isn’t a well-defined problem except that this person really needs to freak out.
    The volume and intensity of this type of freakout can be negatively intoxicating
    and you’ll be tempted to jump on the freakout bandwagon.


    Don’t.


    The best move here is to simply listen and maintain eye contact. Your calmness
    is a primal attempt to telepathically reflect the insanity back to the freak so
    they’ll realize they’ve gone off the deep end. This can be rough because the freakout
    may be pointed directly at you, but even under attack, your job is the same: Listen.
    Nod. Repeat.


    #### Give the Freak the Benefit of the Doubt


    Chances are, your freak really does have something to say, but maybe they’ve lost
    perspective spending every waking moment stressing since last Friday at 5 p.m.
    Perhaps their freakout has nothing to do with what they’re saying and has everything
    to do with an unrelated series of events the previous week that ended poorly and
    has mutated into this freakout. Maybe they drink too much coffee, but remember,
    they have a point.


    In any freakout, there is normally a very noisy preamble which is designed to
    get your attention. Dingfelder’s comments above are all preamble. I know after
    he stops to take a breath that we’re going to get to the heart of the matter.
    He’s probably already said it, but when he says it again, “Unrealistic deadlines,”
    I know we have progress because we’ve hit on the foundation of the freakout and
    we can begin a conversation which is the first step to defusing this situation.


    But, it’s not always that easy …


    #### Hammer the Freak with Questions


    Sometimes the preamble just doesn’t end. Sure, there’s content in there somewhere,
    but some freaks really just like the freakout. They like that they have your attention,
    or maybe they just like to hear their voice, but if it’s been a couple of minutes
    and all you’re hearing is preamble, it’s time to grab the reins.


    Ending the preamble and starting the conversation starts with a question. Why
    is the product going to be horrible? Should we care about IE 9? Properly timed
    and well-constructed questions lead your freak away from emotion because they
    force them to the other side of their brain where they don’t freak, they think.


    I was lucky; I knew Dingfelder was about to drop the bomb a good two hours before
    he got around to it. In that time, I leapt into our bug tracking system to figure
    out how many bugs each person had filed; I glanced at bug severities, arrival
    rates, and any other juicy bug tidbits that might help me defuse the bomb.


    Once the Dingfelder freakout began, I calmly pulled my bug notes out. The moment
    he took his breath, I asked, “Hey, so how many bugs showed up this weekend? How
    many did we fix? How many of those fixes didn’t take? Wow, why do you think that
    happened?”


    The key with a question offense is to move your freak from the emotional state
    to the rational one. I know I know and I know how good it feels when you’re stressed
    out to attack the source of that stress in what looks like a rational manner,
    but, um, you’re yelling, pointing your finger at me, and jumping up and down.
    Do you want me to react to the yelling or to the facts?


    #### Get the Freaks to Solve Their Own Problems


    One pleasant side effect of attacking freakouts with questions is that you discover
    the freak is often already close to a solution. Remember, they’ve been simmering
    since Friday and, in that time, they’ve been chewing on the problem from every
    angle possible. In that time, their understanding, while soaked in emotion, has
    more depth than yours.


    Even if you haven’t successfully predicted a freakout, you can still use your
    experience as a means of exploring the freak’s understanding of whatever the issue
    might be. Heck, you don’t even need experience; all you need is the desire to
    understand what this person is freaking out about. Sometimes, you get lucky. Your
    simple clarification questions end up with an “And *dammit Rands*, the engineering
    managers should be *scrubbing their bugs every morning!*”


    OK.


    Let’s do that.


    ### You Still Have a Problem


    Being emotionally invested in what you are doing is an absolute requirement for
    caring about your job. What I hear when you walk into my office and freak out
    is “I’m caring about my job here, Rands, please listen.” It’s taken years of weathering
    these explosions to hear this and not to take it personally, but I’ve come to
    expect that freakouts are a normal event in passionate engineering teams.


    It’s still a management failure.'
