    had just yelled at us, and while my confidence was shaky, I knew it was time to
    say no again—to them and to the executive team that wanted a quick turnaround.


    “No, we’re not going for mediocre. No, no one wants us to do me-too design. And,
    no, we’re not done with this roadmap until it’s something that inspires everyone
    in the room.”


    Now, the difference between me standing up in my office and giving a speech on
    inspirational product roadmaps and a manager who’s flirting with Crazy Town because
    of an executive beat-down is slim, but therein lies the art. Saying no is saying
    “stop,” and in a valley full of people who thrive on endless movement, the ability
    to strategically choose when it’s time to stop is the sign of a manager willing
    to defy convention.


    Never Trust a Pixie


    The top hat is not what it seems. Yes, the black velvety elegance is intended
    to give you confidence, but remember—on the back of that hat is a threat. It’s
    not on the back because the pixies couldn’t fit the entire message on the front.
    It’s on the back because they don’t want you to live in Crazy Town, but they also
    don’t want you to be paralyzed by the reality that you’re potentially one big,
    bad decision away from being out of a job. They want you to embrace the confidence
    that the top hat imparts because it will help you make great decisions for yourself,
    your team, and your product. Some of those great decisions will be the result
    of blind luck, and some will be because you know what you’re doing. However, you
    will also make some bad decisions, which you will weather sometimes because they
    weren’t that bad, and sometimes purely on your top hat moxie.'
