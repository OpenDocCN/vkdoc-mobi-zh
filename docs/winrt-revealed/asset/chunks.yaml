- fmt: '# The Manner of Growth: Avoiding the Fez


    The manner by which a business prunes the employees who aren’t assisting in this
    growth is horrifically efficient. First, we have the employees who have consistently
    demonstrated an inability or lack of interest in helping with this growth. Their
    prize is the irrelevant project that no one cares about. Some folks find this
    banishment to be comforting. “Aaaahh … no more fire drills … the execs don’t even
    care about this project, so I can cruise.” That’s right. They don’t care about
    that particular division because it’s not strategic, which means the moment it’s
    time to tighten the budgetary belt that is the first group to be nuked. Poof.
    Welcome to unemployment. Did you learn your lesson, yet? Probably should have
    taken the time to figure out what `XML` stood for.


    Then we have Fez. Maybe he’s grown complacent with the knowledge that he’s the
    only person who has a particular skill or set of knowledge. It’s a powerful position
    to be in … for a while.


    Maybe the execs won’t fire him because of the perception he has essential knowledge,
    but, I guarantee, those who are dependent on his black box of knowledge are concocting
    a devious plan to replace him and his knowledge because *they want to grow.* Right
    this second, three guys down the hall have rewritten Fez’s code in C and they’re
    secretly demonstrating their work to interested parties. They are building support,
    they are building a revolution, and they’re not going to stop until the person
    who is hindering their growth is gone.


    Whether it’s by organizational evolution or revolution, complacency is a job killer,
    and if you’re following me, you think Fez has blown it.


    Wrong.


    I did.


    I blew it by not convincing Fez that growth is life.


    ## Annual Reviews, Briefly


    Let’s start with the bad news. There’s no silver bullet to solve the Fez issue.
    Solving Fez is going to involve strategy, effort, inspiration, luck, and, lastly,
    a bit of time. You won’t solve it in a moment and you won’t solve it in a single
    meeting. There is a convenient yearly inflection point where everyone panics about
    their careers. Annual reviews. I’m going to construct this chapter around annual
    reviews, but I don’t want you to think that performing an annual review will solve
    the Fez. If you worry about career development once a year, you’re screwed. As
    you’ll see, avoiding the Fez is a full-time job, but since you get actual allocated
    time to stress about employee development, why not stress in a constructive manner?


    ## What’s Really on Their Minds


    People do care about cash. When that annual review begins, your employee is hanging
    on every word, carefully listening to your tone, wondering, good review or bad
    review? If it’s sounding good, that must mean cash; and cash rocks. If it’s sounding
    bad, they stop listening and start pre-bittering themselves to hate you for the
    next month since you clearly have *no idea* where they *added their value* this
    year.


    Compensation adjustments are the reward everyone cares about, but does anyone
    actually know how they’re calculated? What happened over the previous 365 days
    to result in a *big cash windfall* or an *insignificant pittance?*


    If you don’t draw a concrete line between a coherent understanding of an employee’s
    performance and their reward or punishment, you are only adding more fuel to the
    argument that “managers sit around doing nothing all day.” Let’s begin …


    ## First, Gather Your Thoughts, but Don’t Think (Yet)


    Here’s the deal. If I asked you right this second to tell me about your particular
    local Fez, you’ve already got a strong opinion, but it’s an opinion of the moment.
    It’s the last three interactions you’ve had with your Fez, and while those are
    relevant, they hardly represent a complete picture of a year of work.


    When you’re assessing an employee, you need to assess against their job, not the
    work they’ve done over the past two months. This is hard because this is the Silicon
    Valley and no one knows what happened two months ago. Facebook IPO’d then Summer
    then the next iPhone, right? *Is Mountain Lion out yet? Did I miss anything important?*
    You probably did, unless you captured it somehow. Every month, your team produced
    something and it’s your job to document that production. I do this by spending
    an hour a month jotting down reflections of the team for the past 30 days. What
    stands out in my mind? What’d we do? Who rocked? Don’t get hung up on documenting
    every single event or talking about every single person … just type. Even if you
    miss massive contributions by a team member, the act of capturing your thoughts
    at the time they were happening creates a handy mental bookmark. This bookmark
    captures not only what you wrote, but everything else hiding around it. When you
    go back and read last summer’s terribly small entry—*“This month blew. No time
    to write.”*—you’ll not only remember that you were on a death march, but you’ll
    also remember that Eddie the QA guy was there with you that weekend and, oh hey,
    he’s been here every single weekend and, wow, why aren’t we promoting him?


    Regular snapshots of your team’s work will construct an impression of your team
    that you are incapable of constructing in the moment because, in the moment, you’re
    cranky about not getting coffee this morning, stressed about your product review
    next week, and *don’t get me started about the 300 mails I have yet to read.*
    How can you create an objective opinion of someone’s performance with all this
    crap in your head? You gotta step back, take a deep breath, and reflect.


    As you sit there staring at the ceiling chewing on a year of thoughts, an overall
    impression is going to form … you can’t avoid it, but I’m asking you to ignore
    it for now. I’m going to distract you by proposing a model that you can use to
    look at your employees and begin to understand what exactly their career needs.
    The model is called Skill vs. Will.


    ## Skill vs. Will Plus Epiphanies


    It’s a simple graph. One axis is skill—how much skill does the employee have to
    do his job? Is he qualified? Overqualified? How long has he been doing it? When
    is the last time you know he learned something new? How quickly does he handle
    tasks compared to his peers?


    The other axis is will—this is where we measure the employee’s desire. Does she
    like her job? Really? Has she told you that? Is she viewed as energetic by her
    team? When is the last time she generated a great idea that blew your mind? Is
    she talking in meetings or listening? Is she *ever* talking? Is she *always* talking?


    This graph is not a precision instrument. It’s a tool to better define the impression
    you’re constructing of your employee. Once you’ve placed someone on the Skill/Will
    graph, you can begin to consider what your full-time job is—constantly and consistently
    pushing your employees to the upper-right quadrant. High skill (I’m good at what
    I do) and high will (I like what I do). This mental map is the first step in constructing
    a Fez-avoidance insurance policy.


    *“Rands,”* you ask, *“um, what exactly am I pushing constantly and consistently?”*


    Great question.


    ## Worst-Case Scenario


    Worst-case scenario: You’ve ignored everything I’ve said so far. You’re spending
    15 days rereading Fez’s review from last year. Then, you spend another 15 throwing
    together this year’s review by cutting and pasting the one and only review you
    wrote for all your employees, making it unique by inserting their full name and
    project name. Dear lord. You’ve really blown it.


    Yet, you haven’t fully blown it. A complete fuck-up is when you take this pathetic
    excuse for a review and present it. You say, *“Employee 629, here is your review.
    You did this well, you did this poorly. Here’s your 2 percent increase and here’s
    your indecipherable objectives for next year. Back to work.”*'
