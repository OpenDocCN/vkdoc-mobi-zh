    # 当这些看似无害的故事未经评判、未经质疑时，故事就结束了。


    鲍勃问心无愧，因为他事先提醒了你。你问心无愧，是因为你听取了鲍勃的关切，而且，是的，你曾有过一丝不安，但鲍勃的交付记录无可挑剔，所以让那不安见鬼去吧，事情最终会自行解决的。


    你未能听从自己的不安，这是一次管理失败。


    情况还会更糟。这种故事优化发生在管理的每一个层级和每一组人群中。每当一个未被重视的不安故事从一个人传到下一个人，一个谎言就在整个组织中传播开来。如果这个故事是从你的团队开始的，那么这种错误信息的泛滥就是你的错。现在，大楼里可能有其他人会感到不安，从而挽救你团队集体的职业声誉，但同样，如果故事起源于你的团队，责任就在你身上。


    ## 又一颗钉子


    新任工程经理们常常纠结于这份工作，因为他们怀念亲手构建东西的感觉。构建那种令人上瘾的强大行为已不再是他们日常工作的一部分，他们会抱怨：“你知道吗，我都不知道我整天到底在干什么。”
    寻找其他方法来满足这种渴望是另一章的主题，但就目前而言，你的工作之一就是倾听这些故事，并将它们与你的经验进行对照。当感到不安时，你要提出问题，你需要相信提出这些问题本身就是一种构建。


    作为经理，当故事感觉不太对劲时，你要追问具体细节。你要要求故事的细节来证明其真实性。如果这个故事经不起你脑海中首先冒出的三个问题的推敲，那就有问题。


    你不能仅凭一丝不安来管理一个团队或一家公司。倾听随机的故事，并迅速找出其中的逻辑缺陷或关键依赖项的缺失，只是你作为经理需要培养的技能之一。就像构建本身一样，发现问题和提出这些问题都是艺术；它们只是你需要弄清楚如何敲打的又一些钉子。


    # 章节


    ## 更新、吐槽和灾难


    商业世界是嘈杂的。


    商业世界充满了人们大声担忧项目、流程和其他人的声音。这些人有自己的观点，并且随时随地都在分享。这种集体的嘈杂声是健康企业日常工作的一部分，但除非有人留意，否则这种声音会淹没个体的声音。


    而最佳的留意方式，是在与你管理的下属进行的一对一谈话中。


    你在一对一谈话中的职责是让最微弱的声音也有机会被听到，我通常从一个问题开始：“你还好吗？”


    ## 基本原则


    在开始之前，让我们先回顾一下我在一对一谈话中遵循的基本原则：


    - **每周在同一时间进行一次一对一谈话：** 当你成为人员管理者时，一件奇怪的事情就会发生。你会被自动认为更忙了。无论你是否真的忙，这都不重要；大家就是觉得你很忙。在每周的同一天同一时间坚持进行一对一谈话，是在每周提醒他们：无论多忙，你都为他们而来。


    - **坚持执行：** 好吧，你确实很忙。你在一个又一个会议之间奔波。很容易降低一对一谈话的优先级，因为不像你正在赶去或赶出的其他会议，一对一谈话并不代表一个亟待解决的紧急问题。稍后我会在本篇中纠正你这种“缺乏价值”的看法，但现在，请理解，每次你取消一对一谈话时，你管理的下属听到的是：“你无关紧要。”


    - **至少留出 30 分钟：** 忙碌的经理们另一个惯用伎俩是把一对一谈话安排在 15 分钟或更短时间。*这是我所能做到的最好安排了，Rands。我有 15
    个人要管。* 首先，这 15 个人并不是为你工作，而是你为他们工作。不妨这样想：如果这 15 个人明天就离开，离开这栋大楼，实际还能完成多少工作？其次，如果你有
    15 个人向你汇报，你就不是他们的经理，你只是个偶尔路过办公室、尴尬地笑笑、问句“怎么样”，然后并不真正听取回答的人。


    与任何人进行有意义的对话都需要时间。稍后你会看到，你需要从一个开场白开始，摸清对方当下的心理状态，以此为势头，进入一场有分量的对话。而你那 15 分钟的一对一谈话，唯一让你了解到的就是你没有时间去关心。


    ## 你还好吗？


    这是一个温和的开场白。我承认这一点，但我之所以用一个平淡的开场白，是因为这种不含具体内容的问题足够模糊，使得回答者不由自主地将自己的部分状态融入答案中，而一对一谈话正是从这答案开始的。


    他们说的第一句话是什么？他们是用幽默来回避吗？是那种标准的不假思索的回答吗？还是有所不同？哪里不同？他们选择了什么词，说得有多快？他们等待了多久才回答？他们到底有没有回答问题？你是否也明白，答案本身并不是重点？回答的内容仅仅是传递情绪的载体，而情绪决定了你的议程。


    在我倾听答案的同时，我在辨别你的情绪，并根据我们将要进行的谈话类型，把你归入以下三个类别之一：


    - **更新**（一切正常！）

    - **吐槽**（有点什么事……）

    - **灾难**（哦，天哪……）


    绝大多数的一对一谈话都属于第一类。我对温和开场白的回答是愉快且熟悉的。我们会梳理事实，这里那里稍微深挖一下，聊点别的，然后谈话结束。很好。另外两个类别仅凭一个问题就更难判断了。你对我的问题的回答……有点不对劲。你要么直接用那句令人警惕的“我们需要谈谈”的宣告来开场，这立刻将你归入了“吐槽”类别，但这也很容易变成“灾难”。到目前为止，最糟糕的开场回答是沉默寡言的那种，是那种包含了隐藏的、阴险信息的回答。哦，天哪。


    ### 更新


    你从“更新”中得到的正是你期望的——状态汇报。这是关于我的项目，我的人手，以及事情的进展。我相信大多数人认为这种一对一谈话是成功的，但他们错了。


    一对一谈话不是项目会议。一对一谈话不是状态报告。看到那些忙得团团转的项目经理了吗？他们的工作是维护事实和发现项目真相。如果你将一对一谈话成功的标准定位在讨论你在状态报告中就能找到的数据上，那你就跑偏了。一对一谈话是一个机会，让你在日常业务的忙碌中发现新东西。


    当一对一谈话开始时，如果明显是“更新”类型，我会加倍努力倾听，寻找可以讨论、探究和深入挖掘的“金块”。不是我不关心状态，只是我们有 45 分钟在这里，如果我们用那些我可以在
    Bug 数据库和 Wiki 中查到的数据来填满这段时间，那我们都是在浪费彼此的时间。


    所以，我倾听，我主动寻找有分量的对话，如果在前 15 分钟内找不到，我有三个策略：


    - **准备好三个要点：** 虽然我相信一个好的、自然的一对一谈话部分在于即兴发挥，但我通常会在脑中备好三个在过去一周里与你或你的团队相关的谈话要点。如果在最初
    10 到 15 分钟内我们找不到一个好的谈话线索，我就会从其中一个要点开始，看看它能带我们去哪里。

    '
- fmt: "# 微绩效评估\n\n你读得没错。如果一场死气沉沉、重复冗余、基于状态的一对一会议进行了15分钟，而我手头没有任何“备货”，我会把它变成一场绩效评估。这不是你真正的绩效评估；它只是你评估中的一个方面，不知为何，我觉得展开这个话题比听你更新bug数量更合适。*我看你对付bug已经很在行了，但你上次年度绩效评估时我们讨论过的一件事，是要更好地掌握架构。进展如何？*\n\
    \n# 我当前的灾难\n\n很有可能，在我的职业生涯中，某件事目前正偏离轨道。这有些自私，但如果你以汇报状态开场，而我又找不到有趣的话题切入点，那我们就聊聊我当前的灾难吧。*你知道我们有多少无法招人的空缺职位吗？你认识的最好的招聘经理是谁，他们做了什么最佳举措？*\
    \ 讨论这个灾难的目的不是为了解决它；目的是我们要进行一次对话，让其中一方能学到比项目状态更多的东西。\n\n# 战略性的对话\n\n商界总是喧嚣，因为总有事情要做，而做事的过程被称为*战术*。这是战术性工作，虽然战术带来进步，但真正的进步是在我们采取战略时取得的。一次富有成效的一对一会议，是我们战略性地讨论如何做事，但更重要的是，讨论我们如何能把这些事做得更好。\n\
    \n# 倾诉（The Vent）\n\n一次真正好的倾诉，始于一段令人放松的长时间沉默。我刚问完我的温和开场问题，而你保持安静。非常安静。我能看到你正在心里积攒情绪。我会借此让自己镇定下来，因为虽然我知道倾诉即将来临，但我很可能不知道内容或严重程度。倾诉的范围很广，从略带紧张的“我今天受不了QA部门”，到彻底爆发：“*再多一次*让我听到托马斯在他办公室里磨他那该死的中产认证秘鲁咖啡豆，我就要崩溃了。”\n\
    \n当倾诉开始时，你可能会误以为这是一场对话。其实不是。这是一个心理泄压阀，你的工作就是尽你所能地倾听。不要解决问题。不要转移话题。不要安慰。还不是时候。你的员工正在进行心理大扫除，打断这个扫除过程就失去了意义。他们不想要解决方案；他们只想被听见。\n\
    \n倾诉是有结论的。总有一个你需要介入的时刻，但这些结论以及你的行动各不相同。\n\n*   **倾诉结束：** 倾诉开始失去势头，倾诉者发现自己喘着气，盯着你无话可说——因为他们已经说完了所有，可能还重复了好几遍。正是在这一刻，你开始做评估分级。*好，现在我们开始谈谈……*\n\
    \n*   **这是咆哮：** 倾诉可能会重复自己。同样的事实和内容可能以几种不同的方式向你抛来。我认为这种重复是一种咀嚼问题的健康方式，但到某个点，倾诉就变成了咆哮。经过几次倾诉循环后，你可以尝试抓住对话的主动权，从评估分级开始，但要做好准备——倾诉者可能还没说完。我的建议是，面对抗拒时，给予他们信任，让他们再来一轮。\n\
    \n    那种不需要帮助的倾诉就是咆哮。咆哮者不知何故认为，无休止地重述自己的观点就是解决方案。也许他们完全不知道解决方案可能是什么，或者如何找到它；又或者，他们对这个话题思虑过久，以至于完全失去了逻辑。\n\
    \n    无论背后的故事是什么，咆哮者正在从无休止地重述问题中获得某种奇怪的心理满足，但他们在这一点上对解决实际问题毫无兴趣。很烦人。当你确认手头是一次咆哮时，你可以直接介入倾诉——你是在为所有人节省大量时间，并且你也在教咆哮者，不停地重述问题并不是进步。\n\
    \n*   **这是灾难：** 你在仔细倾听倾诉。它正在向前推进，没有重复，但是……有些不对劲。也许是他们的举止，也许是话题本身，但你的雷达在报警。倾诉者并没有站在他们通常的“肥皂盒”上。他们一反常态，而且随着时间的推移，他们越来越不像自己了。\n\
    \n    倾诉的核心是情感驱动。这就是“更新状态”和“倾诉”之间的关键区别。这个话题触发了情绪反应，倾诉者的“疗法”就是口头陈述和重述情况。情感是一个滑坡，开始时只是倾诉，但有可能螺旋式升级为灾难。这在商业中很少见，但当你处理情感易变的人类时，这是一种风险。\n\
    \n# 灾难（The Disaster）\n\n如果倾诉感觉像一场演讲，那么灾难感觉像一场攻击。起初是一场情绪化的对话，现在已经演变成一场战争，而你突然且意外地身处战场。\n\
    \n在你见识过一次灾难之前，很难预测你对自己感觉受到攻击会如何反应。无论好坏，这种事我已经经历过足够多次，所以当我看到灾难临近时，我会小心地把所有情绪装进一个盒子，锁上盒子，然后神奇地变身为一个瓦肯人。\n\
    \n当灾难降临时，最糟糕的反应就是任何形式的情绪表露。你看，在这种情况下，倾诉者想打架。他们真的想就这个特定话题“过上几招”。原本高度沮丧的情绪已经变成了纯粹的攻击性；如果你哪怕眨错一下眼，你都是在加剧事态的升级。\n\
    \n以下是一些识别和处理灾难的技巧：\n\n*   **你正在交谈的人已经不是他/她自己了。** 当你坐在那里经受灾难时，请记住，你正在经历一个反常现象——一个只有在他们处于崩溃边缘时才会出现的古怪情绪化版本。你熟悉的那个人……终究会出现的。\n\
    *   **闭嘴。真的。** 你在灾难期间的主要任务是缓和局势，而缓和局势的第一步就是什么也不做。如果你是一个逻辑清晰、理性行事的管理者，你会倾向于问澄清性问题——试图梳理问题。别问。保持安静。让情绪过去。原因如下……\n\
    *   **问题本身已经不是重点了。** 你面对的已经不再是问题本身。你正在经历的是员工对该问题附加的情绪包袱。当然，存在核心问题，但你现在观察到的并非如此。你看到的是对该问题的极端负面反应，这才是首先要处理的事。\n\
    \n与倾诉一样，成功在于穿越情绪的爆发。希望会有一个时刻，大部分情绪已经过去，受委屈的人愿意进行理性的讨论。与倾诉不同，讨论不会从核心问题开始。它将以灾难本身为起点，探讨围绕该话题的强烈情绪。\n\
    \n一场灾难是管理不善的最终结果。当你的员工认为完全失控是一种有效的策略时，那是因为他们相信这是让事情发生改变的唯一选项。\n\n# 假设他们有东西可以教你\n\
    \n有句老话说：“人是你最宝贵的资源。” 我想说，他们是*唯一*的资源。电脑、办公桌、办公楼、数据中心……等等。所有这些其他工具，都只服务于你唯一的资源：你的员工。"
  raw: '*The mini-performance review:* You read that right. If we’re 15 minutes into
    a lifeless, redundant, status-based one-on-one, and I don’t have anything sitting
    in my back pocket, I’m going to turn this into a performance review. It won’t
    be your actual performance review; it’s one aspect of your review that somehow
    strikes me as more appropriate conversation than an update on your bug counts.
    *I see you’ve got a handle on your bugs, but one thing we talked about at your
    last annual performance review was getting a better handle on the architecture.
    How’s that going?*


    *My current disaster:* Chances are, in my professional life, something is currently
    off the rails. It’s selfish, but if you’re leading with status and I can’t find
    an interesting discussion nugget, let’s talk about my current disaster. *Do you
    know how many open reqs we have that we can’t hire against? Who is the best hiring
    manager you know and what were their best moves?* The point of this discussion
    is not to solve my Disaster; the point is that we’re going to have a conversation
    where one of us is going to learn something more than just project status.


    Business is noisy because there is always stuff to do, and the process of doing
    stuff is called *tactics*. It’s tactical work, and while tactics are progress,
    the real progress is made when we get strategic. A productive one-on-one is one
    where we talk strategically about how we do stuff, but more importantly, how we
    might do this stuff better.


    The Vent


    A really good Vent starts with a disarmingly long period of silence. I’ve just
    asked my soft opener and you’re quiet. Really quiet. I can see you mentally gathering
    steam. I take this time to ground myself, because while I know a Vent is coming,
    I  likely don’t know the content or the severity. Vents vary from a semi-tense
    “I  can’t stand QA today” to a full-on explosion: “If I have to listen to Thomas
    grind his goddamned Fair Trade–Certified Peruvian coffee beans in his office *one
    more time*, I might lose it.”


    When the Vent begins, you might confuse this for a conversation. It’s not. It’s
    a mental release valve, and your job is to listen for as long as it takes. Don’t
    problem solve. Don’t redirect. Don’t comfort. Yet. Your employee is doing mental
    house cleaning, and interrupting this cleaning is missing the point. They don’t
    want a solution; they want to be heard.


    A Vent does have a conclusion. There is a point where you need to jump in, but
    these conclusions and your actions vary.


    *It’s done:* The Vent starts to lose steam and the venter finds themselves panting
    and staring at you with nothing to say because they’ve said it all—probably a
    couple of times. It’s in this moment that you begin your triage. *Great, now we
    start talking …*


    *It’s a rant:* A Vent can repeat itself. The same facts and content might be thrown
    at you in a couple of different ways. I see this repetition as healthy way of
    chewing on the problem, but there’s a point where this Vent becomes a rant. After
    a couple of Vent cycles, you might try grabbing hold of the conversation and starting
    with triage, but brace yourself—the venter might not be done. My suggestion, in
    the face of resistance, is to give them the benefit of the doubt and let ’em go
    another round.


    The Vent that wants no help is a rant. The ranter somehow believes that the endless
    restatement of their opinion is the solution. Perhaps they have no clue what a
    solution might be or how to find it, or perhaps they’ve been stewing on the topic
    so long that they’ve lost all sight of logic.


    Whatever the backstory, the ranter is finding some weird mental satisfaction in
    the endless restatement of the problem, but they have no interest in solving the
    actual problem at this point. Annoying. When you’ve got a confirmed rant on your
    hands, it’s OK to jump into the middle of the Vent—you’re saving everyone a pile
    of time, and you’re teaching the ranter that the incessant restatement of the
    rant is not progress.


    *It’s a disaster:* You’re listening carefully to the Vent. It’s moving forward
    and it’s not repeating itself, but … something is up. Perhaps it’s their demeanor
    or maybe it’s the topic, but your radar is pinging. The venter is not standing
    on their usual soapbox. They’re out of character and, as time is passing, they
    are becoming less themselves.


    At its core, the Vent is motivated by emotion. That’s the key difference between
    the Update and the Vent. The topic has triggered an emotional response, and the
    venter’s therapy is the verbal statement and restatement of the situation. Emotion
    is a slippery slope, and what can start as a Vent has a chance of spiraling into
    a Disaster. It’s rare in business, but it’s a risk when you’re dealing with emotionally
    slippery human beings.


    The Disaster


    If a Vent feels like a speech, a Disaster feels like an attack. What started as
    an ­emotional conversation has transformed into a war, and you’re suddenly and
    unexpectedly on the battlefield.


    Until you’ve seen the Disaster once, it’s hard to predict how you’re going to
    react to the perception of being attacked. For better or worse, it’s happened
    enough to me that when I see the Disaster approaching, I carefully tuck all of
    my emotions in a box, lock the box, and magically transform into a Vulcan.


    When the Disaster arrives, the absolute worst response is any semblance of ­emotion.
    See, in this case, the venter wants to fight. They literally want to go a couple
    of rounds on this particular topic. What was a high degree of frustration has
    transformed into pure aggression and if you so much as blink improperly, you’re
    contributing to the escalation of this situation.


    Here are some tips on recognizing and handling the Disaster:


    *   The person you’re talking to isn’t him- or herself. As you’re sitting there
    weathering the Disaster, remember that you are experiencing an anomaly—a bizarre
    emotional version of the person that only shows up when they’re on the edge. The
    person you’re familiar with will show up … eventually.

    *   Shut up. Really. Your primary job during the Disaster is to defuse, and you
    start defusing by contributing absolutely nothing. If you’re a logical, reasonable
    management type, you’ll be tempted to ask clarifying questions—to try to shape
    the problem. Don’t. Be quiet. Let the emotion pass. Here’s why …

    *   It’s not about the issue anymore. You’re no longer experiencing the problem.
    You’re experiencing the employee’s emotional baggage regarding the problem. Sure, there’s
    the core issue, but that’s not what you’re currently observing. You’re seeing
    the extreme negative reaction to the issue, and that’s the first order of business.


    As with the Vent, success comes with traversing the emotional explosion. There
    will, hopefully, be a point when the majority of the emotion has passed, and the
    aggrieved will be willing to having a rational discussion. Unlike with the Vent,
    the discussion won’t be about the core issue. It will start with the Disaster,
    with understanding the intense emotion surrounding the topic.


    A Disaster is the end result of poor management. When your employee believes totally
    losing their shit is a productive strategy, it’s because they believe it’s the
    only option left for making anything change.


    Assume They Have Something to Teach You


    The cliché is, “People are your most valuable resource.” I would argue that they
    are your only resource. Computers, desks, buildings, data centers … whatever.
    All of those other tools only support your one and only resource: your people.'
