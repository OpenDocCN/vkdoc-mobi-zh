- fmt: '# 排版后的 Markdown 文档


    Ninety-five percent of the people in a big company simply have no clue what corporate
    machinations are going down and how they might be affected and whether or not
    they’ll be working in the next six months. How you will be judged as a manager
    by your team is based on how you communicate with them. That’s not just about
    taking the time to have that quarterly all-hands, it’s also understanding what
    they need to hear and being able to say it in a way they’ll understand.


    ## CHAPTER


    ### Fred Hates the Off-Site


    The world of management has a set of power words that it has appropriated as a
    means of giving itself a sense of identity. This list is endless and entertaining.
    When these words are spoken, they are said in such a way that you are meant to
    wonder in awe, “What does that mean?” but you don’t ask for fear of looking like
    an idiot.


    Today’s word: *off-site*. An off-site is a … meeting. There are some specific
    characteristics to an off-site, but it’s really just a meeting with a group of
    people that likely lives up to its name in that it’s elsewhere—it’s off-site.


    Now that you understand what it is, let’s understand why you might hate it.


    ### Why I Get in Fred’s Face


    The reason an off-site exists is simple: you, the leader of the people, need certain
    essential work to occur that cannot easily occur now under normal conditions within
    the building. It’s a little sad. When it was only 20 of you, each of the three
    different off-sites I’m about to describe would just happen … organically. Fred
    would stand up in the middle of the office and say, “OK, we need a new UI framework.
    I’m going to do it, and anyone who wants to get in my face needs to do it now.”


    So you got in Fred’s face. You argued. You debated. Fez and Phil jumped in, and
    in 17 very important minutes, you fundamentally changed the UI architecture of
    the product.


    At an organizational size that varies for every team, natural cross-pollination
    and communication activities that used to happen organically, that allowed for
    cultural and strategic work to get done, and that allowed for big decisions to
    be made, can no longer occur. The team can no longer look around the room and
    get a sense for how everyone is doing because there are too many everyones.


    `Zeitgeist` has become diluted. Random hallway error correction doesn’t happen,
    because the right folks aren’t bumping into each other. It’s sad, especially for
    the folks who vividly remember standing up and getting in Fred’s face. You need
    to recreate the space and place where a team can bond, a strategy can be devised,
    or you can begin an epic journey.


    ### Who We Are, What We Need, and Our Epic Journey


    The reason you invoke the off-site is going to vary from group to group. The following
    are three specific scenarios where I believe you need to employ the off-site,
    but there are more.


    #### We need to understand who we are


    If you’re familiar with my writing, you’ll know I don’t think you really know
    what the hell is going on in a team for 90 days. You have moments of comforting
    clarity during the first three months, but you don’t really know all the moving
    parts until a chunk of time has passed. Now, multiply that early confusion by
    every single person who has been hired in the last nine months.


    During times of rapid growth, team members don’t necessarily take the time to
    stop and get to know each other, because they arrive, and the first thing they
    notice is, “Whoa. Everyone is in a big fucking hurry, so I must hurry as well.”
    Their normal instincts regarding getting to know those around them are buried
    in their goal of being recognized as a person who is also in a hurry.


    You need an off-site not to solve a strategic product problem, but to give the
    team members time away from their hurry to get to know each other. Socialization
    will happen via each of the off-sites I’m about to describe, but the need for
    a team to understand itself is a cause worthy of an off-site all by itself.


    #### We need a new direction and/or fewer disasters


    Something significant is broken. Either disasters are occurring and the normal
    processes of detection and correction aren’t working, or everything appears to
    be working but we’re not achieving success—for whatever *success* means at that
    stage of the company. In either case, the status quo represents a legitimate threat
    to the company.


    The purpose of this off-site is deep brainstorming. The group is tasked with discovering
    and refining ideas, proposing experiments to test these ideas, and finally stepping
    up to run with these ideas back at the ranch.


    #### We are embarking on an epic journey


    Nothing’s broken; it’s just time to start something. This last off-site might
    also be called a kickoff meeting. You generally know what you want to do and when
    you want to do it, but you need all the leaders responsible for making it happen
    to be in agreement about where you’re headed and why.


    This off-site is an alignment meeting. Strategy can be discovered as part of this
    meeting, but that isn’t the primary goal. You are collectively pointing folks
    in the correct direction (*this is where we’re headed*) and defining the urgency
    (*and this is why we’re headed there*).


    ### A Meeting with Certain Characteristics


    While an off-site is just a long meeting, it is a meeting with certain characteristics
    that differ from your average daily meeting. I’ll explain each, and I’m going
    to bring Fred along because Fred has no problem telling us exactly what he hates.


    #### By definition, you can’t invite everyone


    Remember, the reason you need an off-site in the first place is that the team
    has grown to a size where they are consumed by hopefully essential tactics. They
    don’t have time to step back and think about it later, because from the moment
    they walk in the door, there are meetings, phone calls, e-mails, and interviews
    that simply must happen. Everyone is consumed in the work. Yes, the individual
    has a free hour here and there to take a deep breath, but collectively the team
    doesn’t have time to figure out what it is thinking or why it’s working so hard.


    Depending on the goal of your off-site, you need to pick the people who are both
    capable and willing to solve the hard problem sitting in front of you. If you’re
    trying to understand who you are, you invite every person that you want to know.
    If you want fewer disasters, you invite both the folks creating them and those
    with the ability to fix them. You need to be able to look around the room and
    think, “These are the people who will solve the problem.”


    *Fred hates it.* He says, “Man, why are we being exclusive? I want everyone to
    weigh in on the important decisions that affect the company. We’re all shareholders
    and we should all get a vote.”


    There’s a name for a meeting where everyone is invited, Fred. It’s called an all-hands,
    and if the all-hands isn’t part of your regular company meeting regimen, I can
    see why you’re pissed. However, your all-hands is 120 people, and my question
    is, When is the last time you saw 120 people efficiently propose, debate, and
    then make a decision? An off-site is not an opportunity to ignore opinion; an
    off-site is a chance to select a group of folks who are going to best represent
    the company on whatever huge problem we’re solving. Yes, the selection process
    is hard.


    #### Everyone presents, or at least speaks


    Once you’ve got an initial list of folks, ask yourself this: What appropriate
    presentation would I ask each invitee to do? My rule of thumb is that each person
    at the off-site has a deliverable, and that usually means that they need to step
    up and present. This exercise teaches me two things. First, if I can’t think of
    something I’d want this presenter to talk about given the problem at hand, then
    why are they invited? Second, I start to see duplication. *Well, Sarah and Frank
    are both great about talking about our lack of design process. Do I really need
    them both?*'
