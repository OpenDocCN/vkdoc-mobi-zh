    NADD


    The gist of the book *Guns of the South* is straightforward, yet odd. What if,
    during the Civil War, the South became equipped with a lot of AK-47s? Long story
    very short, they would have won. Handily. The author, Harry Turtledove, chose
    not to focus on time travel or other delectable science fiction tidbits; he spends
    the time on, “Yay! The South won! So, uh, what are they going to do about that
    whole slavery thing?”


    While I’m certain Civil War enthusiasts would enjoy this book, it is not geared
    for someone with my particular disability: *nerd attention deficiency disorder*,
