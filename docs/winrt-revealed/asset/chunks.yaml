- fmt: 'So, I wrote a status template for my mechanical manager. It started with products
    and listed current relevant bits for each of the products on my team. Following
    that, I listed personnel issues team by team. Contractor status, requisition status,
    vacations.


    Each week, I’d fill this template out 24 hours before my one-on-one. This was
    my first pass, which loaded my brain with this week’s content. I’d remember things
    we’d talked about the week before and make sure that I’d have the most recent
    data on those hot issues. An hour before the one-on-one, I’d review again and
    fine-tune. When the one-on-one arrived, I pulled out my printout and started.
    I stayed on message and I never deviated from the template. Every week. The same
    structure chock-full of dates, data, milestones … anything concrete and real.


    Consistency. Structure. He loved it. I literally jumped up and down after the
    one-on-one where he didn’t ask a single question because I successfully predicted
    every single possible question he might ask.


    My VP was a mechanic and he wanted to feel the structure that encompassed dealing
    with every problem. Guess what, I’m an organic. My one-on-ones start with a “Hey
    how the hell are you?” and then they wander. You’re going to walk out of my office
    thinking we just shot the breeze for a bit, but as we chitchatted, I was carefully
    gathering content. What was your reaction to question X? What questions did you
    ask me? Yes, I appear to be collecting trivial crap with my random questions,
    but I tend to gather more information than mechanics because who the hell knows
    what I’m going to ask.


    That’s one situation. There are more and I guarantee yours is unique. My advice
    follows.


    ## If You Work for an Organic …


    You’ve got to trust that they’ve got a plan even though it may not be immediately
    apparent. Don’t confuse an extremely open mind with cluelessness. Organics often
    have a more complete picture about what is going down because they are better
    networked.


    If you’re an organic yourself, you’re going to love your one-on-ones because you’ll
    regularly work each other into a creative frenzy. Topics will vary wildly and
    the moment they become dull, they’ll vanish. It won’t feel like work.


    If you’re a mechanic, you’re going to feel a bit lost with your organic manager
    because you’re OK with lightweight forms of micromanagement. It gives you structure.
    Most organic managers I’ve worked with can put on a mechanic hat and provide that
    structure, but you’ve got to ask because it’s not their natural state.


    It’s true. Organics miss detail as they hurry from place to place.


    ## If You Work for a Mechanic …


    Like I said above, a mechanic will not believe you’re dealing with something until
    they feel the structure that encompasses a problem you’re solving. You must overload
    your mechanic with data in order to satiate their structured brain. If your mechanic
    keeps asking you the *exact same question* and none of your responses appear to
    be the answer, it’s time to counter with, “I really don’t know what you are asking.”


    If you’re an organic, you will wrongly assume that mechanics don’t trust you,
    and you’re right; they don’t. You will build trust by acting like a mechanic with
    them. It takes practice, but since you’re already working for one, you’ve got
    a great role model. I’m not suggesting you need to transform yourself into a mechanic
    (which is impossible), you just need to speak mechanic long enough to soothe your
    mechanical manager. Once he’s figured out you’ve got chops, you can start going
    organic on him. He’ll deal.


    It’s true. Mechanics rarely inspire organics.


    ## Look Out For …


    Like incrementalists and completionists, the most dangerous organic/mechanic type
    is the switch-hitter. My personal favorites are mechanical organics. These folks
    have all the slick tricks of organic information gathering, but they’ve got the
    astounding organization skills of the mechanic. They know everything and never
    forget a bit. I mean it.


    Organic mechanics are frightening. They have extreme depth of knowledge, but there
    is no obvious organic thread that ties it all together. Here’s the scary part.
    There is a thread. There is a purpose. They just aren’t letting you see it. Organic
    mechanics will keep you on your heels and just when you think you’ve figured them
    out, they’ll change everything. I hate that. I mean, I love that.


    ## The Answer Is in the Middle


    Organics doing battle with mechanics, or vice versa, is a waste of time. Organizational
    warfare does one thing. It focuses everyone on their peculiar personality quirks
    rather on than the business and that means you’re wasting cash money. Whether
    it’s my manager or my coworker, when I find myself in an organic/mechanic conflict,
    I think this:


    “A purely mechanical organization lacks inspiration. A purely organic organization
    is total chaos.”


    Organics fill mechanical blind spots with their intuition and their passion while
    mechanics create a healthy, solid home where nutty organics can run into things
    at speed. It’s a team thing.


    # Inwards, Outwards, and Holistics


    There are all sorts of intimidating titles surrounding the management caste. Engineering
    manager, senior engineering manager, director of engineering, vice president of
    engineering, chief technology officer. While these names are useful in determining
    where an individual lies in the organizational chart, the names are merely hints
    as to what that person actually cares about. And you should care what they care
    about whether you’re a manager or an individual contributor.


    Like it or not, your boss has as much effect on your career as you do, and they
    also effectively sign your paycheck every two weeks, and that means food. Sure,
    you can leave and go elsewhere, but there’s a manager there, too, and he’s got
    his own obscure agenda, as well.


    There are three distinct classes of managers, each with their own agenda. The
    common names for these classes are first line manager, middle manager, and executive
    or senior manager. Again, these names do a good job of giving you a clue where
    your manager sits on an organizational chart, but they don’t tell you what they
    actually do and how they are motivated. We need a different set of names for that.
    We need a set of names that don’t confuse us with an implied hierarchy.


    ## The Vision Hierarchy


    To understand a manager’s agenda, you’ve got to understand what he wants, and
    the best way to do that is to figure out what he thinks about all day. What is
    he paying attention to? Where does he mentally stare all day? It’s likely one
    of three directions.


    ### Inwards


    These types of managers are responsible for a small team of folks working on a
    single product or technology. An inward manager’s vision is focused on their team
    and their product. While they’re aware there are other things going on in the
    organization, they don’t tend to be involved cross-functionally unless their team
    has dependency on an external team.


    `Inwards` are often junior managers, but that isn’t always the case. Some very
    experienced managers have settled into a comfortable groove as `inwards` because
    they want to stay near the team and near the code.


    ### Holistics


    Traditionally, `holistics` make up the middle layer of management. Whereas the
    inward’s vision is pointed down at the individual team, the `holistic` is staring
    across the organization. They are likely managers of managers; responsible for
    multiple products and multiple teams.


    The `holistic`’s main job is to figure out what the hell is going on *everywhere*
    in the organization. They’re doing this because, as we’ll see in a moment, they’re
    actually running your company. This is why they’re never in their office; they’re
    running around gathering information. This constant information acquisition gives
    the impression that they are spread thin and, well, they are. There’s a ton of
    information moving around your average-sized company, and staying tapped into
    that flood is a full-time job.'
  raw: 'So, I wrote a status template for my mechanical manager. It started with products
    and listed current relevant bits for each of the products on my team. Following
    that, I listed personnel issues team by team. Contractor status, requisition status,
    vacations.


    Each week, I’d fill this template out 24 hours before my one-on-one. This was
    my first pass, which loaded my brain with this week’s content. I’d remember things
    we’d talked about the week before and make sure that I’d have the most recent
    data on those hot issues. An hour before the one-on-one, I’d review again and
    fine-tune. When the one-on-one arrived, I pulled out my printout and started.
    I stayed on message and I never deviated from the template. Every week. The same
    structure chock-full of dates, data, milestones … anything concrete and real.


    Consistency. Structure. He loved it. I literally jumped up and down after the
    one-on-one where he didn’t ask a single question because I successfully predicted
    every single possible question he might ask.


    My VP was a mechanic and he wanted to feel the structure that encompassed dealing
    with every problem. Guess what, I’m an organic. My one-on-ones start with a “Hey
    how the hell are you?” and then they wander. You’re going to walk out of my office
    thinking we just shot the breeze for a bit, but as we chitchatted, I was carefully
    gathering content. What was your reaction to question X? What questions did you
    ask me? Yes, I appear to be collecting trivial crap with my random questions,
    but I tend to gather more information than mechanics because who the hell knows
    what I’m going to ask.


    That’s one situation. There are more and I guarantee yours is unique. My advice
    follows.


    If You Work for an Organic …


    You’ve got to trust that they’ve got a plan even though it may not be immediately
    apparent. Don’t confuse an extremely open mind with cluelessness. Organics often
    have a more complete picture about what is going down because they are better
    networked.


    If you’re an organic yourself, you’re going to love your one-on-ones because you’ll
    regularly work each other into a creative frenzy. Topics will vary wildly and
    the moment they become dull, they’ll vanish. It won’t feel like work.


    If you’re a mechanic, you’re going to feel a bit lost with your organic manager
    because you’re OK with lightweight forms of micromanagement. It gives you structure.
    Most organic managers I’ve worked with can put on a mechanic hat and provide that
    structure, but you’ve got to ask because it’s not their natural state.


    It’s true. Organics miss detail as they hurry from place to place.


    If You Work for a Mechanic …


    Like I said above, a mechanic will not believe you’re dealing with something until
    they feel the structure that encompasses a problem you’re solving. You must overload
    your mechanic with data in order to satiate their structured brain. If your mechanic
    keeps asking you the *exact same question* and none of your responses appear to
    be the answer, it’s time to counter with, “I really don’t know what you are asking.”


    If you’re an organic, you will wrongly assume that mechanics don’t trust you,
    and you’re right; they don’t. You will build trust by acting like a mechanic with
    them. It takes practice, but since you’re already working for one, you’ve got
    a great role model. I’m not suggesting you need to transform yourself into a mechanic
    (which is impossible), you just need to speak mechanic long enough to soothe your
    mechanical manager. Once he’s figured out you’ve got chops, you can start going
    organic on him. He’ll deal.


    It’s true. Mechanics rarely inspire organics.


    Look Out For …


    Like incrementalists and completionists, the most dangerous organic/mechanic type
    is the switch-hitter. My personal favorites are mechanical organics. These folks
    have all the slick tricks of organic information gathering, but they’ve got the
    astounding organization skills of the mechanic. They know everything and never
    forget a bit. I mean it.


    Organic mechanics are frightening. They have extreme depth of knowledge, but there
    is no obvious organic thread that ties it all together. Here’s the scary part.
    There is a thread. There is a purpose. They just aren’t letting you see it. Organic
    mechanics will keep you on your heels and just when you think you’ve figured them
    out, they’ll change everything. I hate that. I mean, I love that.


