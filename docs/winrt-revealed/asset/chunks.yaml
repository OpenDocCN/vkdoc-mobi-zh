- fmt: '# 辞职的七个规则


    如果你正在辞职，你会忍不住在 deliverables 上过度承诺，因为你即将离开。这是你的内疚在作祟。你对辞职感到内疚，并试图弥补你将关心的人置于困境的事实。你需要记住，无论你多么努力，在你的最后几天里，你都会变得毫无用处。


    这被称为“短期离职综合症”，它从你辞职的那一刻开始。从那一刻起，你就已经离开了。你还有两周时间，但你人已不在。你已经在脑海中开始想象你的新工作，当你执行旧工作的流程时，这只是一系列毫无意义的、不令人满足的重复动作。


    不幸的是，当你的老板要求你完成那个关键功能时，你的“短期离职综合症”还不够强烈。恭喜你有道德勇气对离职感到内疚，但请理解，当你同意做无法完成的工作时，你就是在损害自己的声誉。


    ## 规则 #2：尊重你的人脉


    你至少需要确保有三个人知道你希望与他们保持联系。我不知道这些人是谁，因为我不认识你，也不知道你做什么，但我知道，如果你不谨慎处理这次过渡，你将会失去他们。如果你想找到识别这些人的方法，那就看看你的午餐伙伴。选择那些你关心他们会议的人。如果你的收件箱里有一个*专门为这个人*的文件夹，你会想确保他们知道你在乎他们。


    无论你处于职业生涯的哪个阶段，你都需要持续发展你的人脉网络，因为这三人中的某一个很可能会在你未来的就业或机会中提供帮助。我在高科技领域已经工作了近二十年，我的每一份工作都直接或间接地源于认识之前工作的人。你会听到这样一句话：“这是一个小山谷。”世界很小。


    你需要特意去实现这一点，但这只需要一个小举动。一个简短的一对一时刻，让你承认这个人是重要的。这比你最后一天匆匆说声“再见”要多，比在走廊里含泪拥抱要少。


    ## 规则 #3：更新“核心团队”


    我的 `Dropbox` 里有一个名为“核心团队”的文档。那是一个名单，列出了过去 20 年里与我共事过、如果我要创办一家初创公司会雇佣的每一个人。名单上有一些我过去十年都没能联系上的人，但当创业时刻来临时，我会花时间去找到他们，因为他们上了名单。每次我辞掉一份工作，我都会花一个小时来更新这份名单，因为总有一些人我想要留住。


    规则 #2 和 #3 的名单很可能有交集，但它们是不同的任务。那些你需要主动保持联系的人，不一定是你未来要围绕其组建公司的人。


    不过，与规则 #2 一样，对你新的“核心团队”成员做出一个小举动至关重要。记住，你是那个要离开、要改变的人，所以营造最终印象是你的责任。


    ## 规则 #4：不要进行廉价攻击


    如果你不是在最理想的情况下离开，你会忍不住发一封措辞尖刻的电子邮件来“拨乱反正”。这在很多层面上都是愚蠢的。它会否定你在公司期间所做的任何积极工作。你也会损害你的人脉，因为每个人（包括那些知道你不是疯子的人）都会记住你，认为你是个在邮件里发狂、连拼写检查都懒得做的怪人。


    记住，你要离开了，而你认为是有问题的人会留下来。这不再是你的事了，不要浪费你的精力。


    我们曾经在一家初创公司有一个评级为 B– 的 QA 工程师，他错过了晋升机会，决定以“潇洒”的方式离开。在他工作的最后一天，他发了一封语法错乱的电子邮件，逐个部门地抨击了整个组织。他语无伦次的长篇大论被贴在隔板墙上供人取乐，没有人知道他实际上写过不错的测试计划。


    ## 规则 #5：善待为你工作和与你共事的人


    如果你是管理者，之前的规则对你来说要三倍地适用。你不允许成为可怕的“短期离职综合症”的牺牲品，因为你扮演着领导者的角色，并且在走出大门之前，你一直代表着公司。如果这对你来说没有意义，那么很可能你一开始就不该是管理者。


    我对这条规则的做法代价高昂。我会在最后两周内为我所有的直接下属提供一份书面评价。无论我们处于评价周期的哪个阶段，我都会花时间给每个为我工作的人做一次“温度检查”。是的，写一份好的评价是痛苦且耗时的，是的，我和其他人一样会得“短期离职综合症”，但这个小小的举动是向这些同事说明他们对你的意义的最佳方式。


    ## 规则 #6：不要自愿在离职后继续工作（或者，如果你要做，确保得到一大笔钱）


    这是内疚感问题的一个变种。这是你在辞职前两周坐在沙发上，用铅笔敲着牙齿，想象着当你的老板意识到他的得力干将要离开时脸上表情的结果。


    你喜欢他。你有责任感。你不想让任何人陷入困境。是的，当然，你可以利用业余时间完成最后三个项目。


    停下来。


    有一些非常好的理由可以让你继续帮助前公司，如果你选择这样做，我强烈建议你向前雇主索要高价，因为这份额外工作来得正是时候——最糟糕的时候——当你开始新工作时。一份工作的最初几周非常宝贵。它们提供了你新职业生涯的基本经验，而你只能听到一次。而你在做什么？把晚上的时间花在以前工作的事情上，而你应该做的是消化新工作的经验教训。


    你总是会后悔同意在离职后继续工作。


    ## 规则 #7：不要给太多通知时间


    这是我们最后一个内疚感的变种。更多的敲牙齿时间，为你将离开的团队如何支持他们而烦恼。也许如果你给他们更多时间来适应一个没有你的世界，对每个人来说都会更容易。


    再次强调，你错了。


    基本事实是：你已经选择离开，你将要离开。给出过长的通知时间，对你和你的团队来说都是一种职业上的残酷和不寻常的惩罚，因为它延长了组织因你离职而产生的压力，同时阻止了你的团队做某件至关重要的事情：继续前进。


    你的担忧在于你的缺席所造成的空缺。这也将是你的团队所担忧的，但担忧不是解决方案。只要你还在那里忙碌地存在，你的团队就不相信你要离开。他们不会对你的缺席做出反应，直到某个周一早上，他们走过你空荡荡的办公室，感受到你的缺席。靠，他已经走了。


    ## 他们知道


    我在 `Borland` 的最后一个星期五很早就到了。我让自己相信，早上 5 点开始工作，会是对我承诺的工作进行最后一次戏剧性的努力。等到我的告别午餐来临时，我成功地启动了电脑，盯着屏幕看了一个小时，然后收拾好了我的箱子。


    当下午 5 点到来时，我关闭了电脑，拖着脚步走进老板的办公室。“嗯，所以，我没怎么完成导入/导出的工作。”


    他的评论是：“是的，没人认为你能做到。”'
  raw: 'If you’re resigning, you’ll be tempted to overcommit on deliverables because
    you’re leaving. This is your guilt talking. You feel bad for resigning and you
    are trying to make up for the fact that you’re leaving people you care about in
    the lurch. You need to remember that, no matter how hard you try, you will become
    useless in your final days.


    It’s called short timer’s disease, and it begins the moment you resign. In that
    moment, you leave. You’ve got two weeks left, but you are not there. You’ve mentally
    started imagining your new job, and while you go through the motions of your old
    job, it’s a meaningless blend of unfulfilling repetition.


    Your case of short timer’s disease, unfortunately, isn’t strong enough when your
    boss asks you to finish that critical feature. Congratulations on having the moral
    fortitude to have the guilt about leaving, but understand that you are signing
    up for damaging your reputation when you agree to do work you can’t complete.


    Rule #2: Respect Your Network


    There are, at least, three people you’ll need to make sure are aware that you
    want to stay in touch with them. I don’t know who these people are because I don’t
    know who you are or what you do, but I know that if you don’t carefully handle
    this transition, you’re going to lose them. If you’re looking for a way to identify
    these people, stare at your lunch crowd. Pick the ones whose meetings you care
    about. If you’ve got a folder in your inbox *just for this person,* you’re going
    to want to make sure they know you care.


    No matter where you are in your career, you need to continually develop your network
    of people because it’s likely that one of these three people will assist in future
    employment or opportunity. I’ve been in high tech for coming up on two decades,
    and every single job I’ve had has either been a direct or indirect result of knowing
    someone from a prior job. You’ll hear the phrase, “It’s a small valley.” It’s
    a small world.


    You need to go out of your way to make this happen, but it only need be a small
    gesture. A brief one-on-one moment where you acknowledge this person is ­relevant.
    More than a fly-by “bye” on your last day. Less than a tearful hug in the hallway.


    Rule #3: Update “The Crew”


    I have a document in my Dropbox titled “The Crew.” It’s a list of each person
    that I’ve worked with in past 20 years that I would hire if I began a startup.
    There are people on this list that I’ve failed to talk to in the past decade,
    but, when the startup happens, I’m going to take the time to find them because
    they made the list. Each time I quit a job, I take an hour to update the list
    because there are always people I want to keep.


    There’s a good chance there is intersection between rules #2 and #3, but they
    are separate tasks. The people you need to actively stay in touch with are not
    necessarily the ones you’re going to build your future company around.


    Still, as with rule #2, a small gesture to your new Crew entries is essential.
    Remember, you’re the one who is leaving, who is changing, so it’s your responsibility
    to create the final impression.


    Rule #4: Don’t Take Cheap Shots


    If you aren’t leaving under the best of terms, you’ll be tempted to send out the
    scathing e-mail that sets things right. This is stupid on many levels. It will
    negate any positive work that you did while you were with the company. You’ll
    also hurt your network because everyone (including those who know that you aren’t
    insane) will remember you as that whack job that freaked out in e-mail and didn’t
    bother to spell check.


    Remember, you are leaving and the people you consider to be the problem are staying.
    It’s not your problem anymore, don’t waste your energy.


    We had a B– QA engineer at a startup who got passed over for a promotion and decided
    to bail in style. One the last day of his employment, he sent a grammatically
    painful e-mail that went through his organization, person by person, and hammered
    them. His incoherent rambling was posted on the cube walls for its comedic value,
    and no one had a clue that he actually wrote decent test plans.


    Rule #5: Do Right by Those Who Work for You and with You


    If you’re a manager, the previous rules apply to you in triplicate. You’re not
    allowed to fall prey to the dreaded short-timer’s disease because you are acting
    like a leader and you are representing the company until the moment you are out
    the door. If this doesn’t make sense to you, then it’s likely you weren’t supposed
    to be a manager in the first place.


    My move for this rule is an expensive one. I provide a written review to all my
    direct reports in my last two weeks. Doesn’t matter where we are in the review
    cycle, I take the time to give everyone who works for me a temperature check.
    Yes, well-written reviews are painful and time-consuming, and yes, I get short-timer’s
    syndrome like everyone else, but this small gesture is the best way to explain
    what these coworkers mean to you.


    Rule #6: Don’t Volunteer to Do Work After You Leave (or, if You Do, Make Sure
    You Get a Lot of Money for It)


    This is a variant of the guilty conscience problem. This is the result of you
    sitting on your couch two weeks before you resign, tapping your pencil on your
    teeth, and exploring the hypothetical look on your boss’s face when he realizes
    his go-to person is leaving.


    You like him. You’re responsible. You don’t want to leave anyone in the lurch.
    Yes, of course, you can finish those last three projects in your spare time.


    Stop.


    There are some very good reasons to continue to help out at your past job and,
    if you choose to do so, I highly recommend gouging your prior employer on price
    because this extracurricular work is coming at the worst time possible—when you’re
    starting a new job. The first few weeks of a job are precious. They present the
    primal lessons of your new career and you only get to hear them once. And what
    are you doing? Spending your evenings on work from a prior life when what you
    should be doing is digesting the lessons of the new job.


    You will always regret signing up for work to do after you leave.


    Rule #7: Don’t Give Too Much Notice


    Our last variant of guilty conscience. More tapping of the teeth, fretting about
    how to support this team that you’re leaving. Maybe if you give them more time
    to adjust to a post-you world, it will be easier on everyone.


    Again, wrong.


    The basic fact is this: you’ve chosen to leave and you’re going to leave. Giving
    an excessive amount of notice is professional cruel and unusual punishment both
    for you and for your team because it extends the organization’s stress regarding
    your departure while also preventing your team from doing something critical:
    moving on.


    Your concern is regarding the gap that is created by your absence. This will be
    your team’s concern as well, but a concern is not a solution. As long as you are
    sitting there busily being present, your team doesn’t believe that you are leaving.
    They’re not going to react to your absence until, come Monday morning, they walk
    by your empty office and feel your absence. Shit, he’s gone.


    They Know


    I got in early on my final Friday at Borland. I’d convinced myself a 5 a.m. start
    time would create a dramatic last-ditch effort on my committed work. By the time
    my going-away lunch arrived, I’d successfully booted my computer, stared at the
    screen for an hour, and packed my boxes.


    As 5 p.m. rolled around, I shut down my computer and dragged my feet into my boss’s
    office. “Yeah, so, I didn’t finish much of the import/export work.”


    His comment: “Yeah, no one thought you could do it.”


    Glossary'
  trans: '

    # 辞职的七个规则


    如果你正在辞职，你会忍不住在 deliverables 上过度承诺，因为你即将离开。这是你的内疚在作祟。你对辞职感到内疚，并试图弥补你将关心的人置于困境的事实。你需要记住，无论你多么努力，在你的最后几天里，你都会变得毫无用处。


    这被称为“短期离职综合症”，它从你辞职的那一刻开始。从那一刻起，你就已经离开了。你还有两周时间，但你人已不在。你已经在脑海中开始想象你的新工作，当你执行旧工作的流程时，这只是一系列毫无意义的、不令人满足的重复动作。


    不幸的是，当你的老板要求你完成那个关键功能时，你的“短期离职综合症”还不够强烈。恭喜你有道德勇气对离职感到内疚，但请理解，当你同意做无法完成的工作时，你就是在损害自己的声誉。


    ## 规则 #2：尊重你的人脉


    你至少需要确保有三个人知道你希望与他们保持联系。我不知道这些人是谁，因为我不认识你，也不知道你做什么，但我知道，如果你不谨慎处理这次过渡，你将会失去他们。如果你想找到识别这些人的方法，那就看看你的午餐伙伴。选择那些你关心他们会议的人。如果你的收件箱里有一个*专门为这个人*的文件夹，你会想确保他们知道你在乎他们。


    无论你处于职业生涯的哪个阶段，你都需要持续发展你的人脉网络，因为这三人中的某一个很可能会在你未来的就业或机会中提供帮助。我在高科技领域已经工作了近二十年，我的每一份工作都直接或间接地源于认识之前工作的人。你会听到这样一句话：“这是一个小山谷。”世界很小。


    你需要特意去实现这一点，但这只需要一个小举动。一个简短的一对一时刻，让你承认这个人是重要的。这比你最后一天匆匆说声“再见”要多，比在走廊里含泪拥抱要少。


    ## 规则 #3：更新“核心团队”


    我的 `Dropbox` 里有一个名为“核心团队”的文档。那是一个名单，列出了过去 20 年里与我共事过、如果我要创办一家初创公司会雇佣的每一个人。名单上有一些我过去十年都没能联系上的人，但当创业时刻来临时，我会花时间去找到他们，因为他们上了名单。每次我辞掉一份工作，我都会花一个小时来更新这份名单，因为总有一些人我想要留住。


    规则 #2 和 #3 的名单很可能有交集，但它们是不同的任务。那些你需要主动保持联系的人，不一定是你未来要围绕其组建公司的人。


    不过，与规则 #2 一样，对你新的“核心团队”成员做出一个小举动至关重要。记住，你是那个要离开、要改变的人，所以营造最终印象是你的责任。


    ## 规则 #4：不要进行廉价攻击


    如果你不是在最理想的情况下离开，你会忍不住发一封措辞尖刻的电子邮件来“拨乱反正”。这在很多层面上都是愚蠢的。它会否定你在公司期间所做的任何积极工作。你也会损害你的人脉，因为每个人（包括那些知道你不是疯子的人）都会记住你，认为你是个在邮件里发狂、连拼写检查都懒得做的怪人。


    记住，你要离开了，而你认为是有问题的人会留下来。这不再是你的事了，不要浪费你的精力。


    我们曾经在一家初创公司有一个评级为 B– 的 QA 工程师，他错过了晋升机会，决定以“潇洒”的方式离开。在他工作的最后一天，他发了一封语法错乱的电子邮件，逐个部门地抨击了整个组织。他语无伦次的长篇大论被贴在隔板墙上供人取乐，没有人知道他实际上写过不错的测试计划。


    ## 规则 #5：善待为你工作和与你共事的人


    如果你是管理者，之前的规则对你来说要三倍地适用。你不允许成为可怕的“短期离职综合症”的牺牲品，因为你扮演着领导者的角色，并且在走出大门之前，你一直代表着公司。如果这对你来说没有意义，那么很可能你一开始就不该是管理者。


    我对这条规则的做法代价高昂。我会在最后两周内为我所有的直接下属提供一份书面评价。无论我们处于评价周期的哪个阶段，我都会花时间给每个为我工作的人做一次“温度检查”。是的，写一份好的评价是痛苦且耗时的，是的，我和其他人一样会得“短期离职综合症”，但这个小小的举动是向这些同事说明他们对你的意义的最佳方式。


    ## 规则 #6：不要自愿在离职后继续工作（或者，如果你要做，确保得到一大笔钱）


    这是内疚感问题的一个变种。这是你在辞职前两周坐在沙发上，用铅笔敲着牙齿，想象着当你的老板意识到他的得力干将要离开时脸上表情的结果。


    你喜欢他。你有责任感。你不想让任何人陷入困境。是的，当然，你可以利用业余时间完成最后三个项目。


    停下来。


    有一些非常好的理由可以让你继续帮助前公司，如果你选择这样做，我强烈建议你向前雇主索要高价，因为这份额外工作来得正是时候——最糟糕的时候——当你开始新工作时。一份工作的最初几周非常宝贵。它们提供了你新职业生涯的基本经验，而你只能听到一次。而你在做什么？把晚上的时间花在以前工作的事情上，而你应该做的是消化新工作的经验教训。


    你总是会后悔同意在离职后继续工作。


    ## 规则 #7：不要给太多通知时间


    这是我们最后一个内疚感的变种。更多的敲牙齿时间，为你将离开的团队如何支持他们而烦恼。也许如果你给他们更多时间来适应一个没有你的世界，对每个人来说都会更容易。


    再次强调，你错了。


    基本事实是：你已经选择离开，你将要离开。给出过长的通知时间，对你和你的团队来说都是一种职业上的残酷和不寻常的惩罚，因为它延长了组织因你离职而产生的压力，同时阻止了你的团队做某件至关重要的事情：继续前进。


    你的担忧在于你的缺席所造成的空缺。这也将是你的团队所担忧的，但担忧不是解决方案。只要你还在那里忙碌地存在，你的团队就不相信你要离开。他们不会对你的缺席做出反应，直到某个周一早上，他们走过你空荡荡的办公室，感受到你的缺席。靠，他已经走了。


    ## 他们知道


    我在 `Borland` 的最后一个星期五很早就到了。我让自己相信，早上 5 点开始工作，会是对我承诺的工作进行最后一次戏剧性的努力。等到我的告别午餐来临时，我成功地启动了电脑，盯着屏幕看了一个小时，然后收拾好了我的箱子。


    当下午 5 点到来时，我关闭了电脑，拖着脚步走进老板的办公室。“嗯，所以，我没怎么完成导入/导出的工作。”


    他的评论是：“是的，没人认为你能做到。”

