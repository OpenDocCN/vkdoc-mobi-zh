- fmt: '**HR (Human Resources)** — Happy people who help you do very unhappy things.


    **Incrementalist** — An individual who knows that better is the enemy of done.
    Incrementalists get stuff done at the cost of quality and completeness.


    **Individual Contributor** — HR term that describes a single employee who has
    no direct reports.


    **Instant Messaging** — The replacement for e-mail.


    **Interaction Design** — The hard part of user interface design. Interaction designers
    are responsible for how a user is going to interact with an application, ideally
    with the least amount of frustration. Interaction designers know what the word
    `workflow` means.


    **Intern** — A temporary hire, usually from college, who smiles too much.


    **Interview** — The day you wear a tie. Interviews are where you, the hopeful
    candidate, pitch yourself to a group of folks who have 30 minutes to figure out
    if they want to spend 5 years listening to your dumb jokes.


    **Inward** — A front-line manager focused on a single product or team. Inwards
    don’t care much about what’s going on elsewhere in the company.


    **iOS** — Apple’s mobile operating system, which is annoying a lot of nerds by
    making everything easier to do.


    **IT (Information Technology)** — The most generic term in the world, which describes
    the folks responsible for that computer on your desk. You probably work in IT
    and don’t even know it.


    **Job Description** — A brief, written description of the responsibilities required
    for a job.


    **Layoff** — A horrible process whereby employees are terminated because the company
    either needs to save cash or is otherwise preoccupied with something else.


    **Lead** — A better title than “manager.”


    **Leverage** — A word often used in close proximity to synergy.


    **Linux** — UNIX with an L.


    **Mac OS 9** — Old version of the Macintosh operating system not based on UNIX.


    **Mac OS X** — New version of the Macintosh operating system, which is based on
    UNIX.


    **Malcolm Event** — A seemingly insignificant event during the product development
    processes that screws up your release in an unlikely way.


    **Manager** — The person who signs your review.


    **Mandate** — Order handed down from senior management. Mandates have one of two
    motivations: they are either used as excuses to dodge explaining rationale (bad)
    or they are put forth to get people to stop arguing and start moving forward (good).


    **Market Cap** — Simple math. If a company has 1 million shares and those shares
    are selling for $10, the market cap is $10 million. Often used as a rough means
    of comparing companies or gauging corporate health. (“Company X’s market cap is
    40 times revenue!”)


    **Marketing** — The folks who gloss over what your product actually does. Essential,
    as most engineers are unable to successfully communicate with actual customers.


    **Meeting** — Traditionally, a group of individuals getting together to solve
    a common problem. Often, a tremendous waste of time.


    **Milestone** — Poorly defined, heavily over-communicated date within the software
    development cycle, where the software development team reflects on how screwed
    they are.


    **MRD (Marketing Requirements Document)** — A mythical document said to contain
    “customer requirements.”


    **Multitasking** — The ability to do many things at once. Multitasking has heavy
    interaction with NADD.


    **NADD (Nerd Attention Deficiency Disorder)** — A voracious appetite for consuming
    information at an impossible rate. Rands gets a quarter every time someone says
    this.


    **Nerd** — See Geek.


    **NIH (Not Invented Here)** — Term to describe behavior in which an engineering
    team will not consider working with anyone’s code except their own. It’s not that
    the external code is good or bad, it’s just foreign, which means it must be reviewed,
    reformatted … Oh, what the hell. Let’s rewrite the whole damned thing. Billions
    of dollars have been lost to NIH. I mean it. Billions.


    **Offshoring (Outsourcing)** — Your job being shipped overseas. This is supposed
    to be “good for our nation” because being unemployed is a “huge motivator.”


    **Offer Letter** — A real document handed to a potential new employee, which describes
    the terms of their employment. It’s important to realize that once a candidate
    has signed their offer letter, your job as a hiring manager is not done. They
    are not an employee until their butt is in their seat.


    **Office** — The square box where you live. Some models come with windows and
    doors.


    **Office of the CEO** — The people who surround the CEO to make sure he/she shows
    up at meetings on time.


    **Offsite** — A meeting held in a place where the coffee tastes different.


    **Org Chart** — A visual representation of who reports to whom. Org charts are
    handy in larger organizations for figuring out who you’re actually dealing with.


    **Outward** — A manager who focuses his attention outside the company. This person
    is terribly concerned with how the world views his company. Outwards are traditionally
    senior management, like CEOs.


    **P/E (Price/Earnings Ratio)** — Determines how much money an investor pays for
    $1 of a company’s earnings. If a company is reporting a profit of $2 per share,
    and the stock is selling for $20 per share, the P/E is 10—the investor would pay
    ten times earnings.


    **Performance Plan** — A surprisingly upbeat term that describes a depressing
    process. Performance plans are written instructions of what an employee needs
    to do in order to not be fired. Don’t even think about doing this without serious
    HR involvement.


    **Phone Screen** — A brief conversation with a hiring manager or recruiter in
    which one or two key things are going to determine whether you get an interview.


    **Process** — A seven-letter word that begins with P. Process is not all bad news,
    especially for large companies where immense groups of people waste a lot of time
    doing the same thing.


    **Product Manager** — Ideally, the owner of a product. This person is clear on
    what the product is and where it is going. They often have to deal with pesky
    engineers who believe they know what the customers want.


    **Program Manager** — The owner of the schedule. Program managers are pretty much
    useless in small companies, but essential in any large product development group.


    **QA (Quality Assurance)** — Individuals who find bugs.


    **R&D (Research and Development)** — Or software engineering or software development.
    Really all the same thing. Surprisingly little research is going on these days,
    what with all the incessant development.


    **Reorg (Reorganization)** — Process whereby employees are shuffled about to accommodate
    new corporate goals.


    **Recruiter** — Person whose job it is to help you source candidates for your
    req (see below). Recruiters often come off as slimy, but they’ve got a tough gig
    balancing good people skills with actually having meaningful conversations with
    engineers. When you find a good recruiter, stick with them.


    **Reference Check** — Process of calling candidate-supplied references. References
    are biased, as they are supplied by the candidate, so they are suspect as sources
    of truth. If you’ve got any concerns about your new hire, I also recommend digging
    up back-door references or actually grilling references with real, honest questions.


    **Release Engineering** — Group or individual responsible for building/compiling
    the product. Release folks live in a confusing limbo where they aren’t quite QA,
    but also aren’t quite software engineering.


    **Req (Requisition)** — A virtual document that gives you permission to hire a
    new employee. Rock on! Acquisition of reqs can be tricky, and once acquired, they
    are apt to vanish without warning. Use it or lose it. Important fact: From the
    moment a req is approved, the average number of days to get a butt in a seat is
    90 days. Honest.


    **Resigning** — Quitting your job. Resigning sounds more professional, but it’s
    the same thing. You can do this whenever you like.'
