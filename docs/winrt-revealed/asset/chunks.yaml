    # 第一章：花时间思考


    在 Don Giovanni 餐厅与 Phillip 共进午餐。他亢奋极了。我们甚至还没见到服务生，他就已经清空了桌面，在白色纸质桌布上疯狂地涂画起来。


    "看，我们需要加快发布周期——这当然很疯狂——但我们找到了办法！我们称之为''列车发布''。我们同时进行四个发布，每个月都有一趟''列车''驶出车站。如果一个功能准备好了，就搭上这趟车；如果没准备好，就等下一趟。六周内我们已经发出了两趟列车！"


    我点点头，看着那些涂画变得越来越难以辨认。我想给 Phillip 点杯不错的基安蒂红葡萄酒让他放松一下，但他是摩门教徒，所以我选择说实话。


    "菲尔，你被坑了两次。首先，你被坑是因为你需要至少双倍的人员——来验证这些越来越多的发布，而你是个初创公司。你们只有一个 QA 人员，如果他还没崩溃，那就再等一个月。其次，也是最重要的，你没有任何停歇时间。你没有时间进行设计，因为每个人都会慌张地想着自己该搭哪趟车。"


    "菲尔，为了创造，你必须思考。"


    ## 反应 vs. 思考


    为什么你在忙碌时无法思考？


    蠢问题，对吧？答案："因为我太忙了，所以无法思考。"错。你无法思考是因为当你忙碌时，你并没有在思考，而是在做反应。


    举例：你走进我的办公室大喊："Rands，距离发布只有两天了，我们刚发现一个严重的崩溃级错误。怎么办？我们完蛋了吗？"


    我会回应，我的回应看起来可能像是在思考，但我并没有做任何有创造力的事，因为我在*我构建的每一个产品*中都处理过这种"发布前两天出现崩溃级错误"的场景。并且每次都化险为夷。因此积累了不少精彩故事。当你走进我办公室告诉我天要塌下来时，我调用的正是这些经验。我实际上并没有做什么新事，只是在讲述上次我是如何撑住天的故事。


    是的，你可以争辩说，人在火烧眉毛时也能迸发出非凡的创造力。这就是所谓的"需要是发明之母"的论点；但说真的，如果你头发着火了，你是会花时间认真考虑所有灭火技巧，还是会直接就近把头插进最近的桶里以免真的烧伤？恐慌才是"最小阻力路径"之母。


    如果你没有完善的反应本能，就无法成为一名成功的经理。一箩筐的经验会让你拥有各种解决问题的方法，有些时机和准确性会非常出色，但如果你不花时间思考，你的箭袋会慢慢变空。


    为了本章的讨论，让我们将你的大脑分区——一半是创造性大脑。这是你大脑中灵感之源的部分。另一半是你的反应性大脑。这是大脑中喜欢天塌下来那一部分，因为它可以飞快地行动。


    你的反应性大脑其实不喜欢思考，因为思考是混乱的。思考需要慢下来，真正沉浸在问题中，而你的反应性大脑在熟悉的环境中如鱼得水。你的创造性大脑则热爱未知。它像一块海绵，只有充满新想法时才会快乐。这也是思考在工作中难以实现的部分原因——它无法很好地融入日常商务流程，因为它充满了让你那位循规蹈矩的经理抓狂的思维悖论和令人不安的现实。例如：


    *   思考无法被时间或会议所约束。它没有开始也没有结束——你永远不知道何时才算完成。

    *   投入更多思考总是值得的，但时间就是金钱，你这周还有 27 个其他会议。

    *   参与思考过程的人越多，你发现真正创意就越容易，但寻找这些创意的过程会随着每增加一个人而线性变慢。

    *   每个人的思考方式都不同。


    启动深度思考的最佳时机，是在你上一次重大发布之后。那时，前一次发布的所有教训都还鲜活地呈现在团队脑海中。他们刚刚经历了一段艰难时期，不得不盯着每一个因反复推迟修复缺陷而暴露出的糟糕设计决策。他们筋疲力尽，但满怀希望，因为他们知道可以在下一次发布中修正这些问题。


    ## 如何开始


    第一步是确定一个团队可以思考的时间。过去，我倾向于以一次外出会议作为开端。在远离公司总部的地方，花上整整一天进行思考，让同事们暂时忘掉日常工作中的烦恼。这种方法的问题在于，虽然大家都喜欢外出活动，但这一整天只是种假象。没错，咖啡的味道不同了，是的，每个人似乎都对下一版本充满期待，但明天你就要返回总部，而你
    95% 的实际思考工作都将在那里完成。你必须在你的自然环境中营造一个有利于思考的氛围。


    从每周两次会议开始。第一次是头脑风暴会议，第二次是原型会议。两者都至少持续一个小时。


    确保头脑风暴和原型会议之间有间隔。给所有参与者留出时间来消化头脑风暴会议的结果。相反，你也不能等太久才看到原型，否则你会忘记最初头脑风暴的上下文。每周一次的会议纯属徒劳，因为经过一个周末，大家会把所有事情都忘光，会议最终只是在重复上一周同样的想法。


    ## 参与者


    当会议开始时，你需要一个推动者。可能是你，也可能不是。这里又有一个悖论。结构化的思考会扼杀思考，但非结构化的思考会导致无用的混乱。你的会议推动者必须能够引导对话在两个极端之间来回切换，但总体保持在中间地带。有组织的人（参见第
    36 章了解更多关于有组织的人）通常最擅长这一点。稍后当我们判断你的会议是否真正有效时，会再详细讨论这一点。

    '
- fmt: '# Whom to Invite?


    This is the hard one. If you invite every single person on the team, you’ll get
    nothing done … even with the world’s best driver. You’ve got to start small and
    let the momentum build. This is where you might initially piss people off because
    everyone wants to sit in this meeting because everyone has an opinion. If you
    have an idea of what the initial topics will be, invite those you know have an
    educated opinion. If you have no clue where to start with topics, roll the dice
    … pick at random. You never know what you’re going to find in the minds of engineers.
    The good news is that one of the best signs of a productive design process is
    that the players change. More on this in a moment.


    One land mine you’ve got to be aware of in your attendee selection is obstructionists.
    These are folks who’ve fallen into a total react lifestyle. You can easily identify
    them by their tendency to map every new idea against previous experience and then
    declare the idea “unoriginal.” The reasons for this attitude varies. Maybe they
    were early designers of the product and can’t escape from the original design.
    Maybe it’s the fear of the unknown. Whatever the cause, these folks are a creativity
    buzz kill and are not folks you want to invite to your initial brainstorm meetings.


    # Content


    The goal for the first brainstorm meeting is to start reliving the pain of the
    last release. What bug did you hate to defer? What feature didn’t get pulled off?
    Who hates this UI? Everyone? Yeah, I thought so. Hey, who is our customer anyway?
    You want to walk out of your first brainstorm meeting with five hot topics that
    folks want to address.


    The second meeting is your prototype meeting. You want to see the results of the
    last brainstorm meeting in a prototype … paper … code … wireframe … bulleted list.
    It doesn’t matter as long as there is documented evidence of what occurred in
    the prior meeting. Maybe you just had a list of customer types? How about a list
    of the five things the team hates about the product? Your goal here is documented
    continuity between meetings. This documentation will eventually turn into mock-ups
    or actual working prototypes, but out of the gate, keep the documentation focused
    on remembering what the hell happened last time.


    When you do get to mock-ups or prototypes, keep them lightweight and devoid of
    detail. If it’s week three and the team is arguing about which icons fit where,
    you’re too deep. I’m a fan of wireframes when it comes to visually wiring an application
    together. They give all the geometry of a visual idea without suggesting a look
    or feel.


    # Is It Working?


    OK, you’re two weeks into the Rands Creativity Plan and it’s going poorly. No
    one said anything during the first meeting because they’ve never been asked their
    opinion before. The meeting consisted of you in front of the whiteboard and a
    lot of nodding. This lack of brainstorming content led to a very dull prototype
    meeting, so you stuck with more brainstorming. Week two rolled around and folks
    started talking except, well, they were yelling because there’s a fundamental
    disagreement about who the customer actually is. That’s painful progress except
    when you roll into your second prototype meeting and everyone’s silent again because
    who wants to be yelled at?


    Good work. Really.


    It’s a big deal to mentally stumble about and bump into shit during your initial
    brainstorm meetings. This seeming lack of mental coordination is what finding
    innovation is all about … but you still need to understand if you’re making progress.
    Some things you can look for as the weeks pass:


    - **Are decisions being made?** Is the group working well enough to make a decision?
    Yes? Good.

    - **Are decisions being revisited?** Is the group limber enough to go backward
    to refine a previous decision? Even better.

    - **Are decisions constantly being revisited?** OK, problem here. Your team has
    spun into creative nirvana. A good time to step back and apply a little structure
    to the process. Reviewing decisions to date is a good way to find structure and
    move forward. Oh, you weren’t writing down the results of brainstorm meetings?
    Oops. Start now.

    - **Are the players changing?** If you’re four weeks in and the faces at the table
    haven’t changed, you might have a problem. If you’re working on a sizable project,
    there is no way you picked the right brainstorm team from the onset. The diversity
    of thought sitting outside of the room must be brought into the conversation.
    Time to start mixing it up.

    - **Are basic truths about your design showing up?** These are the gems of brainstorm.
    These are decisions that are made that define the basic design of your problem.
    You’ll know these when they show up, stand up to scrutiny, and eventually start
    virally wandering the hallways.

    - **Is it therapy or work?** If you’ve just been through a brutal release, the
    team is going to spend the first brainstorming meetings venting. That’s OK, they
    need it. If it’s week three and you’re still on the vent, it’s time to make changes.

    - **Are holy shit moments occurring?** Similar to the basic truth discovery, but
    louder and infrequent. *“Holy shit*, we’re completely wrong.” Holy shits are disruptive,
    but are a good sign of a limber creative process.

    - **Is the to-do list growing or shrinking?** If you’re early on in the design
    phase, it should be growing. If you’re getting close to the end of your design
    phase, it better be getting smaller. I know engineers want to solve every problem
    in the product in any given major release, but *that never ever happens ever.*
    Better is the enemy of done, and if it’s your project, you need to draw a line
    on what topics/ideas you intend to tackle and stick to it.


    My rule of thumb is if you aren’t staring at one hard decision per meeting … you
    might be wasting your time. You’ve got the wrong people and/or the wrong driver
    and while it sure is fun to have an hour to chat … that’s all you’re doing. Chatting.


    # When to Stop


    If your meetings are healthy, the meetings will naturally move from one topic
    to another. Decisions are built, ideas are vetted, yelling occurs, and prototypes
    are reviewed. I’ve found that these meetings will slowly die off as you move from
    hardcore design into serious development. If they don’t, then you’re probably
    becoming addicted to thinking, and while that sounds appealing, you’re not working
    for a university, you’re working for your shareholders and they want to see new
    product yesterday. You can still fine-tune design during the depths of development,
    but the trend you want to see in your meetings is that questions are being answered,
    not created.


    # Fighting Stagnation


    Google knows you’ve got to take time to think. It is rumored they ask their employees
    to spend one day a week working on their own projects. Do that math. Google is
    investing 20 percent of the engineering budget on thinking. I’m sure that nothing
    comes from a majority of those projects, but Google gets two wins out of the program.
    First, some of the projects create value for the company. It’s probably one in
    five, but that’s not the real value. Google is creating a culture of thinking
    by allowing their employees to wander about and bump into shit.'
