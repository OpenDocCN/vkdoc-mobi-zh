  trans: "\n**Windows** — 这个星球上排名第一的桌面操作系统。\n\n**工作流** — 用户使用应用程序的方式。在设计应用程序时考虑到特定用户的工作流可以提高可用性。\n\
    \n**心流状态** — 一个你达到最高生产力的神奇地方。心流状态极难进入，更难维持。\n\n## I\n\n## 索引\n\n### A\n\n- 可访问的管理隐喻语言\n\
    - 主动沉浸\n- 议程检测\n  - 定义\n  - 会议类型识别\n  - 组织无能\n  - 参与者分类\n  - 角色识别\n  - 利弊\n- 艾莉森\n\
    - 苹果公司\n- 阿什顿-泰特\n\n### B\n\n- 先行者\n  - 核心面试团队\n  - 文化\n  - 团队共识\n  - 团队访谈\n \
    \ - 技术\n  - 愿景\n- 苦逼极客\n- 布林格尔福斯函数\n- 无聊项目\n- 无聊情绪\n  - 可信度\n  - 检测\n  - 员工激励与保留\n\
    \  - 行动计划\n  - 软件开发\n- 宝蓝常驻自由电子\n- 头脑风暴会议\n- 缺陷数据库\n- 缺陷跟踪系统\n\n### C\n\n- 混沌理论\n\
    - 话痨帕蒂\n- 陈词滥调\n- 代码编辑器\n- 程序员\n- 协作式管理风格\n- 沟通和平条约\n- 完美主义者\n  - 架构师\n  - 咖啡成瘾\n\
    \  - 冲突解决手册\n  - 企业与人际嗅觉\n  - 正确程度\n  - 梦想家\n  - 两年与五年方案\n- 电脑动画\n- 上下文捕捉\n  -\
    \ 代码捕捉\n  - Delicious 和 Flickr\n  - 信息披露段落\n  - 极客信息披露\n  - 新介绍下滑\n  - 已移除的维基百科\n\
    \  - 状态报告\n  - 版本控制\n- 核心动机\n- 企业议程\n- 企业阴谋\n- 创意之旅\n- 信任崩塌时刻\n- CSS 微调\n\n###\
    \ D\n\n- 设计与架构 (DNA)\n  - 鸣谢\n  - 押注团队/部门的决策\n  - 火力配置\n"
