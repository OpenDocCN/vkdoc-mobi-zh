  trans: '

    # 排版结果


    当三位手持链锯的伙计出现准备清理土地时，这种态度让我产生了独特的好奇心。他们毫不费力地开始了工作，显然已经掌握了迭代的窍门，但同时也展示了“涓滴理论”最后一个也是最重要的组成部分：混搭操作。


    具体过程是这样的：一个人负责砍伐并拖拽灌木到火堆，另一个人负责砍树，第三个人则修剪倒下的树木。这样进行了一段时间后，他们会全员轮换。现在，原来拖拽的人变成了砍伐者，砍伐者变成了搬运木材的人，修剪者则变成了堆叠者。午餐时，我坐下来问道：“你们什么时候换工？”


    “当我们觉得无聊的时候。”


    太棒了，真是美妙的涓滴理论。这有多酷？如果你正在处理一项极其困难或极其枯燥的任务，并且发现自己因无聊或困惑而思维受阻，那就停下来去做别的事情。停下来的好处是惊人的。


    首先，停下来等于给了那个“批评家”当头一棒。要知道，他也是你脑海中那个说“呃，如果我们不在这件事上拼命努力，就完蛋了”的声音。而当你不想做却坐在那里硬啃不可能完成的任务时，时间越长，他的声音就越大。


    其次，停下来去做别的事情对你和你的大脑来说都很有趣。它打破了你正在做的任何任务的循环，将你的灰质细胞指向一个全新的问题——而你的大脑热爱新事物；它会充满活力地吸收新东西，这会给你的精神脚步注入活力。


    第三，也是最重要的一点，即使你停了下来，你的大脑也足够聪明，会在后台继续处理那个不可能完成的任务。这就是为什么我们会在淋浴时找到那么多灵感；你停下来，让大脑漫步，而你的大脑很聪明。你的大脑知道在两天内重写那个功能有多重要，无论你是否意识到，它都在一直处理那个功能。


    “等等，等等，等等。兰兹，让我把话说清楚。你的意思是，当我面临一个迫在眉睫的不可能完成的最后期限时，我应该停止交付我的工作成果？”


    我想说的是，当你面对内心的激烈斗争，正与那个不可能完成的任务较劲时，是时候选择另一场战斗了……一场不是战斗的战斗。


    ## 熵增永远会赢


    我的生活似乎是一系列旨在稍微整理我世界的无尽任务。从整体上看，这些任务代表了大量的工作。但与我所在世界的小小角落中实际存在的熵增相比，这些任务代表着徒劳的努力。


    事实是，你的世界变化的速度永远快于你能跟上的速度，你可以从两个不同的角度来看待这个事实：


    *   我相信我能控制我的世界，通过积极的任务管理、个人目标以及*我能行*的态度，我将成功地完成不可能的事情。我真棒！


    或者……


    *   我知道无法控制世界，但我会通过不断改变自己来灵活地驾驭熵增。


    驾驭熵增需要自信。这并非托尼·罗宾斯式的自信；这是一种通过不断让自己适应不可能之事而赢得的个人自信。


    章节


    # 天塌下来的时候


    几年前，我写过一篇文章，将天塌下来的状态浪漫化了。那篇文章谈的不是修复灾难，而是预防灾难——但无论你准备得多么充分，灾难总是会发生。


    围绕灾难的浪漫化色彩其实是历史的说法。当灾难降临，你亲眼目睹时，除了你自己，没人知道你想吐。那是你的大脑释放出一种复杂的化学鸡尾酒，从生理和情感上为你准备了最明智的行动方案——他妈的赶紧跑路。


    但奇怪的是，你并没有跑。


    在我的职业生涯中，我观察过、参与过并制造过一连串天塌下来的情况，以至于我认为自己管理这些情况的过程是理所当然的。感觉就像我在凭纯粹自发的本能在运作，但这些是经过磨练的本能，是我在无数次
    DEFCON 1 级别的灾难（参与者认为世界末日即将来临）中建立并完善的，而我恰好不幸地参与了这些灾难。


    这是我对此过程的记录，我真诚地希望你永远不必动用它，但我很确定你迟早会用到。在我们开始之前，先对这个过程做一些假设和说明：


    *   这不是一场孤立的灾难。不仅仅是你一个人；它涉及一大群人共同应对一场复杂的灾难，其特点包括不同的政治立场和动机，且根本原因未知。

    *   无论我坐在这里如何用大写字母解释这个过程*行得通*，你都会跳过以下四个步骤中的至少一个。没关系。每个章节都附带了一个方便的“如果你忽略这一步会发生什么”的附录，以便你清楚地了解自己疏忽的严重性。

    *   我会简单、按顺序地描述这个过程，但实际上这些步骤是重叠的，并且通常是并行进行的。

    *   哦对了，这场灾难很有可能是*你的错*。


    让我们开始吧。


    ## 第一步：作战室里的局势


    你的首要任务是彻底了解关于当前灾难状态所需的一切信息——你正在构建一个心智模型。理想情况下，我希望能够为每个人画出一幅关于当前正在发生的任何事情的完整画面。我需要白板——大量的白板。我需要一个作战室。


    作战室是行动基地。要求很简单：有足够的空间容纳法定人数、一张桌子、椅子，以及大量大量的白板和记号笔。在这个房间里，你将立即开始研究、信息收集和评估工作。每一个——每一个人——任何对局势有相关了解的人都要依次进入作战室，而你将获取并交叉验证他们所有的知识。


    作战室的目的在于打断每个人的日常工作流程。作战室里会有一群来往进出的人、空披萨盒和红牛罐，以及写满难以辨认的涂鸦的白板。它传达了一个明确的信息：现状目前并不奏效。


    随着人们开始涌入接受盘问，请记住，第一步是数据收集，而不是解决问题，也不是做出评判。这一步最难的部分是，当你认为自己看到了可以开始行动的地方时，不要急于动手。*那里！那里！那里！我们需要修复那个！*
    修复那个地方很可能是正确的举动，但你甚至还不知道“那个”到底有多少。


    这一步的初始目标是获取信息，而非采取行动。每次你在数据不完整的情况下采取行动，都可能不是在扑灭灾难之火，而是在火上浇油。而且，顺带一提，这种缺乏远见、过度反应的模式很可能正是你走到今天这一步的原因。作战室首先关注的是收集信息的广度，然后是深度，这样你才能回答这个问题：“我们了解情况了吗？”


    对我来说，理解有三种形式：


    1.  我开始在白板上反复画的图开始呈现出实际发生情况的真实画面。

    2.  会制定、修改并迭代排序一份包含额外研究、工作以及潜在下一步行动的清单（但尚未付诸行动）。

    3.  在第 1 点和第 2 点做了大量工作后，我寻找一个非常精确的时刻。这个时刻总是在不同的时间点出现，但它是清晰可辨的。那是我隐约看到某个理论的一瞬间。*这……就是我们需要做的。*


    ### 如果你忽略这一步会发生什么

