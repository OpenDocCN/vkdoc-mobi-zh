    Hackers are allergic to process not because they don’t understand the value; they’re
    allergic to it because it violates their core values. These values are well documented
    in Zuckerberg’s letter: “Done is better than perfect,” “Code wins arguments,”
    and “Hacker culture is extremely open and meritocratic.” The folks who create
    process care about control, and they use politics to shape that control and to
    influence communications, and if there is ever a sentence that would cause a hacker
    to stand up and throw his or her keyboard at the screen, it’s the first half of
    this one.


    The growth paradox is that the chaotic means by which you found success might
    become distasteful to those you hire to maintain and build on that success. Once
    they’ve established themselves, they will point at the hacking and ask important-sounding
    questions such as, “What is it they are building?” or “How does this poorly defined
    thing fit into our overall strategy?” They will label these hackers “disruptors”—and
    they are 100 percent correct.


    Hacking is disruptive, and whether you code software, write books, or film movies,
    I believe bringing anything new into the world is a disruptive act. By being novel
    and compelling, the new is likely to replace something else, and that something
    else isn’t being replaced without a fight.


    Reasonable people are often scared by the new. This is because reasonable ­people
    are not barbarians, and they are not hackers. They appreciate the predictable,
    profitable, and knowable world that comes with a well-defined process, and I would
    like to thank each and every one of them because these people keep the trains
    running and on time. No one likes barbarians because the barbarian strategy is
    one at odds with civilization. By definition, a barbarian, a hacker, is building
    on a strategy that is at odds with the majority.


    It’s awesome.'
  trans: '

    很难想象有人会不规律地广播清晰、具示范性、可衡量且一致的进展。也许是因为你仍在深入研究，尚未形成理论，不想引起他人注意？也许自上次更新以来，没有任何重大进展？你仍然发送状态报告。你通过持续让关心此事的人了解最新情况所传递的信息，并非“我们取得了独特的进展”或“我们有了理论”。信息是：“我们正在持之以恒地施加压力，顶住这片天。”


    ## 难以捉摸的第零步


    我读着这篇文章的早期草稿，感觉其中仍有一些浪漫主义色彩。*看看我，作战室队长*；我要拯救世界。这种情况毫无浪漫可言。顶住这片天没有荣耀可言，因为很可能，你和你的团队对此局面负有部分责任，而且根据灾难的严重程度，你很有可能被解雇——即使你搞定了它。


    这个过程有第四步，我模糊地将其标记为第零步。我将第一步放在最后，是因为我认为它是这个过程中最重要的部分。我将第一步放在最后，是因为如果你能自信地回答它提出的问题，你将来重蹈覆辙的可能性就会大大降低。问题是：你究竟想要做什么？


    在此时此刻，这似乎是个愚蠢且显而易见的问题，但你现在正悠闲地坐在咖啡店里用着 iPad。你刚刚喝了第三口那杯半咖啡因四份浓缩拿铁，无忧无虑。如果天真的塌了，你早就超速驾车飞奔向公司，疯狂地思索着：“我到底该怎么收拾这个烂摊子？”


    收拾烂摊子是一个合理且显而易见的结果，当你以每小时 105 英里的速度在 280 号高速公路上驶向事故现场时，我会重复我的问题：*你究竟想要做什么？*


    当人们都在大喊大叫时，这是一个难以有效回答的问题，但出色的回答听起来是这样的：


    *   我们需要向这位客户证明，我们有能力超越他们的期望。

    *   我们需要那些依赖我们的人相信，他们对我们的信任没有错付。

    *   我们需要让地球上的所有人明白，我们并非邪恶之人。


    你会注意到，这些答案里没有一个是“收拾烂摊子”。正如我之前所说，当天空塌陷时，立即行动似乎正是正确之举，因为，天哪，天都塌了！但这种情况发生是有明确原因的，而且你可能暂时还无法知道这个原因。这很折磨人，但我的建议是，在你至少能对这个问题给出一个可信的答案之前，不要对任何行动方案做出决定。


    面对灾难，明智之人会在弄清情况之前按兵不动。收拾烂摊子只是权宜之计。理解你真正想要修复什么，才是治本之策。


    # 章节


    ## 黑客精神至关重要


    早在 20 世纪 90 年代初，Borland International 公司是工程师们的向往之地。在收购了 Ashton-Tate 之后，Borland
    成为了第三大软件公司，但更重要的是，它是微软一个名副其实的竞争对手。当时的 CEO 菲利普·卡恩酷爱摩托车、萨克斯管，并在全体大会上发表直言不讳的言论：“我们是野蛮人，不是官僚！”


    当时，卡恩不仅要处理 Ashton-Tate 的整合工作，还正忙于将产品套件从 DOS 迁移到 Windows。所有产品都是完全面向对象的重写，但进度严重滞后——落后了好几年。在一次全体大会上，他解释了他希望公司如何自我认知。根据
    1992 年《洛杉矶时报》的一篇报道所述：¹


    几年前，卡恩在阅读一部厚重的中亚史时突然意识到，草原上的许多游牧部落实际上比他们对抗的欧洲“文明”更加讲道德、有纪律。


    他们简朴而雄心勃勃，渴望胜利，但不沉溺于庆祝。他们围绕着小型的协作团体组织起来，比当时根深蒂固的社会形态要灵活和快速得多。他们是局外人，并以此为傲。他们是野蛮人。


    卡恩关于“野蛮人”的想法颇有先见之明。这不仅在一定程度上启发了敏捷和其他轻量级软件开发方法，也强化了一个大公司常常无意中试图忘记的主题：黑客精神至关重要。


    ### “黑客相信一切都可以变得更好”


    Facebook 不想成为一家大公司。像之前的谷歌一样，Facebook 花时间在其`S1`（公司披露）文件中仔细阐述了其不打算成为传统公司的原因，² 虽然这封信面向的是未来的投资者大军，但它也是为
    Facebook 员工准备的指南：


    黑客之道是一种涉及持续改进和迭代的构建方法。黑客相信，事物总可以变得更好，没有什么是一成不变的。他们必须去修复它——常常要面对那些说“不可能”或满足于现状的人。


    Facebook 担心增长悖论，其大致内容是：成功黑客行为的最终结果是产品，而产品需要通过构建更多的东西来实现增长。你增长得越多，拥有的东西就越多，你就越需要那些仅仅负责协调日益相互依赖的构建活动的人。这些人被称为经理，他们不创造产品，而是创造流程。


    黑客对流程过敏，不是因为他们不理解其价值；他们过敏是因为它违背了他们的核心价值观。这些价值观在扎克伯格的信中有详细阐述：“完成比完美更重要”、“代码胜于雄辩”以及“黑客文化极其开放，是精英管理制”。创造流程的人关心控制，他们利用政治手段来塑造这种控制并影响沟通。如果有什么话能让一个黑客站起来把键盘扔向屏幕，那一定是这句话的前半部分。


    增长悖论在于：你赖以成功的混乱方式，可能会让你为维持和扩展成功而雇来的人感到厌恶。一旦他们站稳脚跟，他们就会指着黑客行为，提出一些听起来很重要的问题，比如“他们究竟在构建什么？”或者“这个定义不清的东西如何契合我们的整体战略？”他们会给这些黑客贴上“颠覆者”的标签——而他们百分之百是正确的。


    黑客行为具有颠覆性。无论你是编写软件、撰写书籍还是拍摄电影，我相信将任何新事物带入世界都是一种颠覆性的行为。因其新颖和引人入胜，新事物很可能会取代其他东西，而被取代的东西不会不战而退。


    理性的人常常对新事物感到恐惧。这是因为理性的人不是野蛮人，也不是黑客。他们欣赏伴随着明确定义流程而来的可预测、可盈利、可知的世界。我要感谢他们中的每一个人，因为这些人让火车准时运行。没有人喜欢野蛮人，因为野蛮人的策略与文明格格不入。根据定义，野蛮人——也就是黑客——所建立的策略是与大多数人格格不入的。


    这太棒了。

