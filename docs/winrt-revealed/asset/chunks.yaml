- fmt: '# The *Jedi Master* has magical people skills


    The *Jedi Master* has magical people skills. His mantra is, “Help me help you.”
    He’s all about the health of the people. He says, “People are our most valuable
    resource.” He’s conflict averse because conflict is, like, a buzz kill … man.
    He wants to be your bud. His conflict avoidance has given him a healthy paranoia,
    but he buries that paranoia beneath a pleasant veneer of caring. He listens with
    intent and usually gets his way, but you’re never quite sure how.


    I’ll tell you how—the *Jedi Master* employs the `Nudge`.


    You won’t even see the `Nudge` coming. In fact, you’ll be hard-pressed to figure
    out when it actually occurred. The *Jedi Master* will say something innocuous:
    “Phil, what do you think of the design of Project X?” Rather than jumping on the
    question, Phil sits there staring blankly. He’s chewing on … something. If you
    could hear what Phil was thinking, it’d be this: *The design? The design was signed
    off two months ago. It’s done. Why now? Is it because design was something we
    talked about in my annual review? I’m sure it is. Why do I feel like I’m missing
    something? I need to talk to the design team. Now.*


    The `Nudge` is the smallest, most viral piece of constructive feedback you can
    give. It is small enough to appear unthreatening, but it has enough intent, enough
    implications, that it plants itself in the receiver’s mind and can’t help but
    evolve.


    The processing of a `Nudge` takes time—that’s the point. The receiver of a successful
    `Nudge` suspects they have a hint of a something, but they have no specifics.
    They have potential, and there’s no telling when they’re going to turn that potential
    into action, but when they do, the action is all their own because they’ve done
    all the work. And that’s the point.


    A well-constructed `Nudge` is a clever combination of everything you learned about
    people, leadership, politics, and the person you intend to `Nudge`. It’s the delicate
    selection of a simple idea intended to slowly reveal a larger intent to someone
    who, in this case, will not hear the truth from anyone except themselves.


    A well-placed `Nudge` is a goddamned managerial work of art. A poorly placed `Nudge`
    is a terrific way to get in trouble with your team:


    - The `Nudge` is, by far, the slowest way to effect change. If time is of the
    essence, the `Debate` will move faster than the `Nudge`. But if you’re looking
    to effect permanent change, go with the `Nudge`.

    - The `Nudge` is not a game. The goal is to not build a small, mysterious phrase
    with the intent to obscure. The `Nudge` is a seed you plant with the hope that
    it will grow in a productive direction. You monitor it, and when it seems lost,
    you `Nudge` again.

    - *Jedi Masters* who rely entirely on the `Nudge`, who choose to speak in clever
    phrases, are intensely annoying. There are folks who are going to be pissed and
    ask you to tell it to them straight. Remember, a lesson is learned, not told.
    (Zing!)


    ## Drastic measures may be necessary, so …


    # The Dictator has the `Mandate`


    Finally, there’s the *Dictator*. His mantra is, “I’m the one who’s telling you
    how it is.” It’s his way or the highway. No one contradicts. No one argues, and
    while his imperatives are subtly molded and messaged as they are passed through
    the organization, he is oblivious to these small changes, because from where he
    sits, he believes directives are followed—word for word. The *Dictator* is allowed
    to exist because no one argues the fact that he gets results.


    The *Dictator*’s superpower is the `Mandate`, and it sounds like this: *We are
    all climbing that hill right now, and we’re not going to stop climbing that hill
    until everyone is at the top of the hill. Start climbing.*


    And everyone does. There’s no `Debate`. There’s no `Nudge`. Even the avid non-hill-climbers
    drop everything they’re doing to start merrily climbing as they sing, “We, the
    climbers of the hill, what a thrill.”


    The power of the `Mandate` is alluring. It requires none of the laborious cat
    herding involved in managing the `Debate`. It eschews the subtle inner dialog
    required in constructing just the right `Nudge`. The `Mandate` is immediate, undisputed
    action, and when misused the `Mandate` can get you killed.


    When you employ the `Mandate`, you leverage a large part of your credibility.
    You’re effectively saying, “Shut up and go,” and if where they end up isn’t where
    anyone expects, you’re less of a leader than when you started. This is an important
    fact that actual *Dictators* often forget. They believe that pure charisma—absolute,
    unwavering confidence—is all you need to fuel a `Mandate`. However, while some
    people will just be happy someone made a decision, if a `Mandate` produces the
    wrong result, there will be an equal number of folks ready to kill you.


    *Dictators* are killed. The consequence comes with the title. It’s not a messy
    death, it’s a professional one—it’s your employees ceasing to listen to you and
    eventually leaving when you’ve completely eroded your credibility, or it’s the
    board of directors simply taking care of business when you’ve brazenly demonstrated
    you can’t.


    # My Favorite Superpower


    These are stark examples of leadership stereotypes, and while you might see aspects
    of you or your management in these colorful descriptions, it’s more likely that
    each is already a part of you. You have a tendency to be a *Jedi Master*, but
    when cornered, you’re the *Machine*. The *Dictator* can serve you well, but it
    leaves your *Jedi Master* feeling … cruel.


    The solution to your Phil problem is likely not a single power move, but all of
    them—at the appropriate time. While the *Dictator* mandates a comfortably clear
    “Fire Phil,” the *Jedi Master* suggests, “Who does Phil communicate best with
    on his team? What can they tell you about him? How can they inform a `Nudge`?”
    which leads you to my favorite superpower—the `Debate`. While it’s not immediate,
    and the final Phil call is yours, it supports my core belief that an idea only
    gets better with more eyeballs.


    ---


    1.  [www.randsinrepose.com/archives/2005/02/20/organics_and_mechanics.html](http://www.randsinrepose.com/archives/2005/02/20/organics_and_mechanics.html)

    2.  [www.randsinrepose.com/archives/2004/10/06/mandate_dissection.html](http://www.randsinrepose.com/archives/2004/10/06/mandate_dissection.html)


    # CHAPTER


    # Saying *No*


    Somewhere in your third year of being a manager, the management pixies will appear
    in your office in a puff of sweet-smelling black smoke. There will be three of
    them, and one will be carrying a gorgeous black top hat.


    “Are you LeRoy McManager?”


    “I am.”


    The pixies laugh. “Congratulations, you have passed successfully through three
    years of management and we’re here to reward you. But first, one question: Have
    you seen *Spider-Man*?”


    “The first one or the sequel?”


    “The first one.”


    “I have.”


    The pixies laugh again. “What do you think is the primary theme in *Spider-Man,*
    LeRoy McManager?”


    “Um, hmmmm … Life’s a bitch?”


    Strangely, the pixies don’t laugh. “No, try again. It’s important.”


    “OK, well. Hmmmm … Peter’s uncle said something they kept yammering about . . .
    *Oh, I know …* With great power comes great responsibility.”


    The pixies cheer and the one carrying the top hat flutters over to you and drops
    it in your lap. It’s soft and strangely warm. The hat-bearing pixie looks up at
    you and grins, “You wear this hat when you want people to know who you are.”


    “And who am I?” You look down at the hat and notice massive white block letters
    on the front. It says:


    `I’M THE BOSS.`


    A slow grin stretches across your face, and you realize the hat has the vague
    smell of your mom’s fresh baked bread. That smell has always given you a strange
    sense of confidence and you know that whenever you wear that hat, you’ll be infused
    with that sense of confidence.'
