    fully arrived before they grudgingly say, “Well, OK, huh, we should probably handle
    that . . . now?”


    Frustratingly and confusingly, one-to-ones with Phil feel like progress. He says
    all the right things. He accepts responsibilities for failures and articulates
    compelling next steps that he assures you will improve the situation. But there
    is a wide strategic gap between those meetings and Phil’s daily management judgment.
    The actions do not match the words, and each Monday morning arrives with the realization
    that *Phil still isn’t getting things done, the stars on his team are about to
    quit, and I have no idea what to do.*


    You need a new superpower.


    Three Superpowers


    You have a natural management state. This is the default state that is the foundation
    of how you make your decisions, the tone with which you run your meetings, and
    the personality you wear as you talk in the hallway. The state has served you
    well; you’re comfortable with it because it is you.


    Unfortunately, this natural state is the source of your Phil confusion. Your natural
    state is blinding you to the obvious course of action. Your instincts are wrong.
    You need to be someone you are not to radically change your perspective.


    Here are three personalities, each with its own perspective, and, more importantly,
    its own superpower:


    The Machine has the Debate


    *The Machine*: Our classic mechanic.^([1](#9781430243144_Ch17.xhtml#fn1)) Her
    mantra is, “Without a plan, there is no hope.” She’s convinced that the whole
    world is measurable. She follows the process because only by strict adherence
    to the process can we truly generate a meaningful measurement to clearly understand
    whether we are winning. The Machine’s understanding of the process and the necessity
    of it are unparalleled. The Machine loves to debate; she loves to consider all
    options, but when she’s decided, it’s over. There’s no changing her mind.


    When the Machine wants something done, she uses the Debate. The Debate starts
    with data. *Each of you. Please explain to me in excruciating detail the last
    ten incidents of Phil being an incapable people manager, and understand that I
    will ask follow-on questions until our understanding is complete.*


    The Debate continues with hypotheses. *Synthesizing our cornucopia of data, I
    put forth the following hypothesis, entitled “Three things we shall do to improve
    the blight of Phil.” I expect everyone involved to challenge these hypotheses.
    But be warned, arguments based on feeling rather than fact will be terminated.*


    If a hypothesis is successfully defended, it becomes law, and the Debate is over.
    If it fails, the Debate continues. A well-run Debate results not only in the truth
    being vetted, but, more importantly, a consensus being built around this truth,
    which sounds delightful, except for these caveats:


    *   If the natives are looking for action, the Debate can look like stalling.
    If your Phil situation is dire, a four-week analysis of the Phil blight may not
    be the response the folks who are about to quit are looking for.

    *   If the issue is deeply emotional, the Debate is a nearly insurmountable task.
    People are messy—especially a group of emotional, angry people—and while they’ll
    be happy to vent about Phil’s failings, turning the vent into a constructive Debate
    can take an intolerable amount of time.

    *   The Debate lacks art. While a good Debate thoroughly vets the validity of
    a hypothesis, it rarely leads you toward innovation or a leap of faith. The whole
    point of the Debate is to develop the best possible theory regarding how to proceed,
    and, in my experience, that process leads you to a credible, actionable plan that
    feels simply like common sense, not inspiration.


    This is why …


    The Jedi Master has the Nudge'
  trans: '

    2.  必须能够随时在白板上画出描述产品的详细架构图。我说的不是那种一个方框加两个箭头的简易版本。你需要掌握那种复杂、不美观且难以解释的详细版本。这张图是理解产品几乎一切原理的地图。它会随着时间变化，而你应该能够理解这些变化发生的原因。


    3.  **拥有**一个功能模块。写这句话时我甚至感到有些畏缩，因为这充满了风险，但我认为，不真正拥有一个属于自己的功能模块，你很难做到第 1 条和第 2
    条。拥有一个功能模块不仅迫使你积极参与开发过程，还能将你的角色从“对一切负责的管理者”切换为“某个东西的拥有者”。这是一种谦逊、低调的视角，能时刻提醒你小决策的重要性。


    我仍然感到不安。肯定已经有人在对我喊：“让管理者拥有功能模块？！？！”（而且我同意）。你依然是个管理者，所以让它成为一个小的功能模块，好吗？你还有很多事情要做。如果你无法想象拥有一个功能模块，我的备选建议是去修复一些
    Bug。虽然你无法获得拥有感，但你会对产品的构建产生深刻理解，这是你在走廊里闲逛永远无法获得的。


    4.  **编写单元测试。** 在产品周期后期，当大家都快崩溃时，我仍然会做这件事。把它看作是理解产品功能的一份清单。经常做。


    下一个担忧是什么？


    “兰兹，如果我去写代码，团队会感到困惑。他们不知道我到底是管理者还是开发者。”


    很好。


    我是认真的。我很高兴你即将通过潜入开发者群体来让团队感到困惑。简单的事实是，软件开发中那些过于明确的角色划分正在消失。界面工程师正在做那些只能被称为 JavaScript
    和 CSS 开发的工作。开发者正在学习更多交互设计知识。每个人都在和他人交流，从彼此的错误中学习，互相抄袭代码，管理者没有理由不参与到这场全球性、大规模的、交叉授粉式的信息混乱狂欢中。


    此外，你应该渴望成为一个由可互换部件组成的团队的一员。这不仅能让你的团队更灵活，还能让每个人有机会从截然不同的视角看待产品和公司。当你看到那位沉默寡言的构建工程师弗兰克那优雅简洁的构建脚本时，你难道不会对他更加尊敬吗？


    我并不是希望你的团队陷入困惑和混乱。实际上，我是在希望团队能拥有更好的沟通。我相信，如果你参与产品构建并接触功能模块，你会与团队更加贴近。但更重要的是，你会更贴近软件开发在你的组织中不断变化的方式。


    ## 不要停止开发


    在 Borland 工作时的某位同事曾因我称她为“码农”而对我进行言语攻击。


    - “兰兹，‘码农’是没有思想的机器，是只猴子。码农除了写下无聊无用的代码行之外，什么都做不了。我是一名**软件开发者**。”


    她是对的。她可能会讨厌我给新管理者“停止编码”的建议。不是因为我暗示他们是码农，而是因为我主动告诉他们开始忽略工作中最重要的部分之一：软件开发。


    所以，我修改了我的建议。如果你想成为一名优秀的管理者，你可以停止日常编码，但是……


    *保持灵活性，牢记作为工程师的意义，并且永远不要停止开发。*


    ## 章节


    ## 三种超能力


    菲尔的团队正在迷失方向。


    菲尔很聪明，也喜欢开会，但他是个糟糕的人事管理者，这种糟糕正在慢慢毒害他的团队。你知道情况有多糟，因为菲尔团队里的明星员工总能找到机会和你开会，而说辞总是一样：“他很聪明，但他天生就不会管理人。如果情况没有改变，距离全面造反还有三周时间。”


    在现场，菲尔的团队一直在等待……一直等到某个迫在眉睫的灾难全面爆发，他们才不情愿地说：“嗯，好吧，呃，我们大概应该……现在就处理那个？”


    令人沮丧和困惑的是，与菲尔的一对一谈话感觉像是有进展。他说得头头是道。他承担责任，阐述令人信服的后续步骤，并向你保证情况会改善。但这些会议与菲尔日常管理判断之间存在着巨大的战略鸿沟。行动与言语不符，每个周一早上你都会意识到：*菲尔还是什么事都办不成，他团队里的明星员工快要辞职了，而我完全不知道该怎么办。*


    你需要一种新的超能力。


    ## 三种超能力


    你有一个天然的管理状态。这是你的默认状态，是你做决策的基础，是你主持会议时的基调，也是你在走廊里交流时展现的个性。这个状态一直对你很有利；你对此感到舒适，因为这就是你。


    不幸的是，这个天然状态正是你困惑于菲尔问题的根源。你的天然状态让你对显而易见的行动方案视而不见。你的直觉是错误的。你需要变成一个你不是的人，才能彻底改变你的视角。


    这里有三种人格，每种都有其独特的视角，更重要的是，都有其独特的超能力：


    ### 机器人的辩论


    *机器人*：我们经典的机械师。^(1) 她的座右铭是：“没有计划，就没有希望。”她坚信整个世界都是可衡量的。她遵循流程，因为只有严格遵守流程，我们才能真正产生有意义的衡量标准，从而清楚地了解自己是否在获胜。机器人对流程及其必要性的理解是无与伦比的。机器人热爱辩论；她喜欢考虑所有选项，但当她做出决定，就结束了。无法改变她的想法。


    当机器人想让某件事完成时，她会使用“辩论”。辩论从数据开始。*请你们每个人，用极其详尽的细节，向我解释菲尔最近十次作为无能人事管理者的具体事例，并且要知道，我会继续追问，直到我们完全理解为止。*


    辩论继续以假设进行。*综合我们丰富的数据，我提出以下假设，标题为“改善菲尔问题的三件事”。我期望所有相关方挑战这些假设。但请注意，基于感觉而非事实的论据将被终止。*


    如果一个假设被成功辩护，它就成为法律，辩论结束。如果失败，辩论继续。一次运作良好的辩论不仅会验证真相，更重要的是，会围绕这个真相建立共识，这听起来很令人愉快，但有以下需要注意的地方：


    - 如果众人渴望行动，辩论可能会看起来像是在拖延。如果你的菲尔问题很严峻，对那些快要辞职的人来说，对菲尔问题进行为期四周的分析可能不是他们想要的回应。

    - 如果问题涉及深刻的情感，辩论几乎是一项无法完成的任务。人是很混乱的——尤其是情绪化、愤怒的人群——虽然他们很乐意发泄对菲尔失败的不满，但将这种发泄转化为建设性的辩论可能需要难以忍受的时间。

    - 辩论缺乏艺术性。虽然一场好的辩论会彻底验证假设的有效性，但它很少能引领你走向创新或大胆的飞跃。辩论的全部意义在于制定出关于如何行动的、尽可能最好的理论，而根据我的经验，这个过程会引导你得出一个可信、可执行的计划，感觉就像常识，而不是灵感。


    这就是为什么……


    ### 绝地大师的微调

