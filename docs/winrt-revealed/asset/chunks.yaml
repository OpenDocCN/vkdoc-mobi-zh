  trans: '

    # 与众不同，而非恼人


    你很可能从模板开始制作简历，或许会以某个朋友的漂亮简历作为起点。这很好。但你要如何让它变成你自己的呢？


    请记住，我浏览过成千上万份简历，这意味着所有标准模板我都见过。我知道你何时用了 Microsoft Word，也知道你何时独创了自己的格式。此时此刻，我正翻阅着十几份大学简历，而那些能让我驻足细看的，是那些在视觉上吸引我、有些与众不同的简历。这份简历中，这位小伙在每个章节标题周围加上了微妙的灰色方框。另一份简历里，求职者巧妙地结合了衬线字体和无衬线字体，抓住了我的眼球。


    简历上这些细微的视觉差异，能有效促使我继续读下去。但请记住，我们是工程师，效率至关重要。如果把简历搞得太花哨，让我无法快速浏览，那只会让我烦躁。你不是在应聘视觉设计师，你是工程师。请保持标准的结构，别让我费劲去猜你是谁。


    # 像人一样说话


    举个“经典”例子：这位实习生说他“策划、设计并协调工程师们，为开发一套关键任务系统而努力。” 呼呼呼……这位老兄到底做了什么？老实说，我不知道。我们把这种写作风格称为“简历官腔”，并一致认为，使用这种风格等于什么都没说。


    那套关键任务系统是什么？为什么它很关键？一个实习生怎么可能策划、设计并协调工程师们的努力？我支持让实习生接触真实工作，但要想策划、设计并管理负责这套所谓“关键任务系统”的工程师，那得是世界顶尖的实习生才行。


    请花时间把你的简历写得像人话。你需要准确使用各种流行词和关键词，才能通过招聘人员的层层筛选，但我才是那个真正会拆解你简历的人。如果你用“简历官腔”什么也没说清楚，那我就什么也了解不到。请给我具体信息，并用亲切的语气告诉我。我不是机器人，我真的想知道你做了什么。给我讲个故事吧。


    # 包含看似不相关的经历


    这一点主要适用于缺乏高科技行业经验的大学生。你可能会强调自己的工作经历与工程无关，并认为在巴诺书店打工的暑假也毫不相干。并非如此。任何工作都能教会你一些东西。即使你没有用
    C++编写代码，我也想了解你作为一名图书销售员学到了什么。那是你的第一份工作吗？你对管理层有什么新认识？从暑假开始到结束，你有哪些成长？请向我解释，无论工作是什么，努力工作的本质都是辛苦的。


    # 惊鸿一瞥与引人入胜


    一份简历永远无法定义你是谁。简历的职责也不是给我一个完整的画像。如果你挣扎着想要囊括关于你自己的每一个细节，那你就是在浪费时间。简历的设计目标应该是给我一瞥和一钩。


    “一瞥”是让你瞥见你职业生涯中最近的几年。它应该传达你最重要的三项成就，并让我清晰了解你的技术能力所在。


    “一钩”则更为重要。这个“钩子”会给我留下一个疑问。也许它来自你“其他兴趣”部分。又或许是一个如此奇特的目标，让我忍不住想安排一次电话面试。我不是建议你编造任何东西；我是要求你以一种能让我记住的方式来推销自己。简历不是事实陈述，它是一份意向声明。


    # 拿下电话面试


    正如我们在上一章中所发现的，当电话铃声响起，招聘人员想要安排一次电话面试时，这几乎算是一个奇迹。事实是，组织中的某个人（在某处）成功地将你与一个空缺职位匹配上了。这意义重大，因为根据我的经验，你获得这份工作的机会已经呈对数级增长。不是五五开，但比你作为一份随机简历放在我桌上时要好得多。


    与上一章一样，我将带你了解我作为电话面试官时所经历的精确思维过程；但在此之前，我们先谈谈动机。


    ## 目的


    我手上有一个职位需求（requisition，简称 req）。这大致描述了我的团队中一个空缺职位，但很可能不精确。职位描述通常宽泛而模糊，因为我想尽可能广撒网。我不仅要看到尽可能多的候选人，还想看到尽可能广泛的技能组合。


    当你在筛选工作机会时，记住这一点很重要。我知道你正在焦虑：“职位描述要求五年 Java 经验，而我只有两年。”别犯傻了。职位描述中通常有两类技能：**必需**和**推荐**。你至少应该在“必需”技能方面差不多符合要求，但别把“推荐”技能当回事。那是推荐的，有当然好。


    此外，你既然接到了我的电话面试，我已经基本确定你大致符合要求，但我仍有疑问，否则我早就直接邀请你来面试了。问题是，我有什么疑问？猜猜看——你的任务就是弄清楚这一点。


    ## 你的任务是做好准备


    在你和我交谈之前，你就在执行一项搜集事实的任务。你有一份职位描述，在电话面试安排好之后，你还有了我的名字。你可能对这个工作的相关产品或技术有所了解，也可能没有，但即使没有产品名称，你也有足够的信息可以开始准备了。


    做好你的调研。用谷歌搜索我。尽可能了解关于我做什么以及我关心什么的一切。这不是跟踪——这是你的事业。如果我碰巧是一位写博客的工程经理，那么你就可以开始了解我的思维方式。也许我没有博客，但我在邮件列表里发帖。那也是信息。这会在电话面试中如何帮助你？嗯，我不知道你会找到什么，但你能收集到的任何信息都会开始为你对这个一无所知的工作构建背景。这也有助于缓解紧张情绪。你看，我手上有你的简历，而你一无所有。一点点的调研就能平衡信息博弈的场地。


    如果你知道产品名称或技术，重复同样的过程。这个产品是什么？卖得好吗？其他人怎么评价它？我说的不是一个周末的调研，而是大约一小时的背景研究，这样当电话面试开始时你就能做一件事：提出高质量的问题。


    没错。在你的调研中，你要找到几个引人入胜的问题，因为在电话面试中的某个时刻，我会问你：“你有什么问题要问我吗？”这是我即将问出的最重要的问题。


    # 回到开头


    在问你最重要的问题之前，我需要弄清楚几件事。首先，在理想世界里，我们本可以跳过电话面试，直接邀请你进入第一轮面试，但这很少发生，除非我本来就认识你。我需要知道的是：

