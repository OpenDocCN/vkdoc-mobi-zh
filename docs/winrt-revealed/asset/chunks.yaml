- fmt: 'Let’s take a brief segue and talk about the huge value that exists in a bug
    database. In just about every company I’ve worked at, the only source of measurable
    truth regarding the product is the bug database. Marketing documents get stale.
    Test plans become decrepit. Test case databases slowly mutate into the unusable
    personal to-do list of QA. The bug database is the only source of data regarding
    your product.


    I know this. I know that once I’ve effectively scrubbed the bug database, I’ve
    got the single most informed opinion regarding the product.


    But.


    537 unscrubbed bugs? 40-plus hours of bug drudgery?


    Please. I’ve got a product to ship.


    My normal approach when faced with an impossible task is analysis, because analysis
    gives you data, which in turn allows you to make a confident decision. So, I do
    what I did above: carefully estimate how long it will take to complete: 5 minutes
    X 537 = impossible. This fair estimate freezes me with fear. How in the world
    am I going to get my other five jobs done while scrubbing 40 hours of bugs? Once
    I’m good and lost in that fear, the impossible task, I’m no longer thinking about
    getting the task done, I’m thinking about the fear.


    My advice is: Start.


    “But Rands … I’ve got 300 tests to run and one day to …”


    Stop. Go run one test. Now.


    “Wait, wait, wait. Rands. Listen. They need this spec tomorrow at 9 a.m… .”


    Shush. Quiet. Go write. Just a paragraph. Now.


    Welcome to Trickle theory.


    ## Our Villain


    My traditional first move when managing impossible tasks is to put the task on
    a to-do list.


    “There! It’s on the list. Aaaaaaah … didn’t that feel good? It’s on the to-do
    list, which must mean it will be done at some point, right?” Wrong. Putting the
    task on the to-do list does one thing: it helps you avoids *the Critic.*


    Every story needs a villain, and in this piece our villain is the Critic. This
    is your internal voice, which does careful and critical analysis of your life,
    and he’s gained a powerful place in your head because he’s saved your butt more
    than once.


    He’s the one who told you that offer from the startup smelled too good to be true.
    You remember that company, right? The one that simply vanished three months after
    you declined that stunning offer letter. It was the Critic who said, “How in the
    world can they afford to give anyone this type of offer when I don’t even understand
    their business model?”


    The Critic was the one who calmed you inner nerd and convinced you to not buy
    HDTV six years ago before it got really good, and he told you not to trust that
    fast-talking engineering manager who emphatically guaranteed his team would be
    done on schedule. The Critic said, “People who talk fast are moving quickly to
    cover up the gaps in their knowledge.”


    The Critic was right. The Critic gained credibility. The Critic can also amplify
    your fears at the worst possible moment. That’s why, for this piece, he’s still
    the villain.


    I know it feels great to get that impossible task on the to-do list. I know it
    feels like you actually did something, but what you’ve done is avoid conflict.
    You know that if you start considering the impossible task, the Critic is going
    to chime in with his booming voice of practicality, *“Rands*, what are you *thinking?
    No one adds features two weeks before a ship date!”*


    “OK, all right, you’re right, but the boss wants it and when the boss gets something
    in his head it takes a lot of work to blah blah blah …” Now, you’re justifying,
    you’re worrying, and you’re arguing with the Critic when what you should be doing
    is starting.


    ## Nothing Happens Until You Start


    Let’s first break down *impossibleness*. For the sake of this chapter, there are
    two types of impossible tasks. First, there are impossibly dull tasks. This is
    work that requires no mental effort, but is vast in size. Bug scrubbing is a great
    example of this. At the other end of the spectrum are impossibly hard tasks. These
    are tasks like, “Hey Rands, we need a new product by Christmas. Yes, I know it’s
    October. Ready? Go!”


    Oddly, attacking both boring and hard tasks involve the same mental kung fu where
    your first move is starting.


    Such silly, trivial advice … start. Still, take a moment and examine your mental
    to-do list or just look at your written one. How many terribly important tasks
    have been there more than a month? More than a year? Embarrassing, huh? It’s not
    that they’re not important; it’s just that you didn’t begin and you didn’t begin
    because the moment you think about starting, the Critic weighs in, “How will you
    even start? You’ll never finish! You don’t even know where to start.”


    Begin. Go read the first bug. Don’t think about how many are left. Go to the next
    one and watch what happens. In just a few minutes, you’ll have made something
    resembling progress. Two more bugs, and it’ll start to feel like momentum. Progress
    + momentum = confidence. The moment you see yourself tackle the smallest part
    of the impossible task, the quieter the Critic becomes, because you’re slowly
    proving him wrong.


