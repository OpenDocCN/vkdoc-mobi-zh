- fmt: 'As the keeper of the pitch, you’re going to try to stay involved, but you
    simply can’t be there for every decision. Your job is to listen and watch incessantly
    so that you can detect how the decisions and actions of your people are slowly
    changing your pitch. This leads us to our twist. The Rands 1.0 Hierarchy is much
    scarier than Maslow’s, because it really looks like [Figure 19-3.](#9781430243144_Ch19.xhtml#F3)


    ![9781430243144_Fig19-03.eps](images/9781430243144_Fig19-03_fmt.jpg)


    [Figure 19-3.](#9781430243144_Ch19.xhtml#FG3) The Real Rands 1.0 Hierarchy


    There’s a good reason why folks don’t build their pyramids like this—they fall
    over. The only way to keep them from falling over is to constantly push one side
    or the other. This is your startup. It’s an impractical concept with your pitch
    sitting at the bottom defining everything above it. What will kill you about 1.0
    will be how much time you’re going to spend trying to keep this pyramid balanced,
    which brings us back to the topic at hand: people. Another basic fact:


    *Fact #2: No one is indispensable.*


    Now, I’m a people person. This entire book is devoted to figuring out how to make
    sure folks get along and get stuff done, but we’re not talking about an established
    company here. We’re talking about 1.0 and the rules are different because you
    are an unknown quantity and everyone is expecting you to fail.


    Ever built a fire? What do you need? A match, some paper, and some kindling wood
    that catches fire easily. Your first three hires are your kindling. Their job
    is not to define the product roadmap, their job is to get things moving, and if
    things aren’t moving, you need to get some more wood.


    At my startup, I was brought in as the first engineering manager. The founders
    had brought on two free electrons with totally different temperaments (see [Chapter
    38](#9781430243144_Ch38.xhtml) for more on free electrons). One was burning the
    midnight oil on getting a working prototype done. He was fully aware we’d throw
    the whole thing away, but he knew that the ability to see the idea in code would
    change everyone’s opinion of what we were doing. It would make the pitch real.


    The other electron also loved the pitch, but he was working on infrastructure
    for future products. *He was what?* Yes, we had no product and one of our key
    hires was already investing in the future. When is investing in the future a bad
    idea? How about when the now is not defined? The second free electron was working
    under the assumption that 1.0 would be successful, and while I appreciated his
    enthusiasm, let’s remember *Fact #0: Startups almost always fail.*


    I spent some time with the second free electron and, as it often goes with very
    bright people on a mission, it was clear he wasn’t going to be swayed, so I let
    him go. That day. One quick meeting with our VP and it was done.


    As you’ll learn in [Chapter 38](#9781430243144_Ch38.xhtml), you don’t run into
    these types of stunning engineers often. Firing a free electron is pretty stupid
    for most companies because they have so much potential, but here’s the deal: you
    aren’t a company until 1.0 is done. A great way to topple your fledging pyramid
    is to hire folks who are not getting the product done with a sense of urgency.
    Get 1.0 done and then worry what’s next.


    ## Process


    There is no word that irks engineers more than *process.* Try it right now. Get
    everyone in your office and say something like, “I’ve defined a new process to
    assist our bug triage.” Watch their faces sag. They hear “busywork.” They think,
    “management is trying to justify itself.”


    This is not the word that defines the third level of the hierarchy. That word
    is *communication*.


    *Fact #3: Process defines communication.*


    Process is the means by which your team communicates. Whether this is via a wiki,
    e-mail, or the hallway, any team larger than one needs to define a means to share
    information. This is not an argument for specifications, documentation, or a whiteboard
    filled with dos and don’ts. You just need to agree how you’re going to share information.


    When your second engineer decides, “Yes, I’m going to capture my design decisions
    in a wiki,” that’s process. When your third engineer starts tracking bugs on that
    huge whiteboard in the meeting room, that’s process. It doesn’t have to be good,
    it doesn’t even have to be universally agreed upon on, it just has to be stuck
    in a place where everyone can see it.


    Microsoft’s SourceSafe was the repository of choice when I landed at my first
    startup. Stop laughing. It did a fine job with a team of six engineers who had
    zero time to worry about source control. Sure, it was slow as hell and lost a
    day’s work here and there because of various hiccups, but we were working on 1.0,
    and who had time to think about something more reliable?


    Roland did.


    Roland was a junior engineer and he was a Perforce fan. Roland did what any good
    employee of a startup would do. Over the course of a weekend, he set up a Perforce
    server, rewrote all of our build tools, and scheduled a 10 a.m. meeting on the
    following Monday, promising Krispy Kreme doughnuts. His message: “This is the
    way it is. Everything works better. Thank you and have a doughnut.”


    In a weekend, Roland fixed a major flaw in our process (crappy tools) and also
    demonstrated another fact of the hierarchy:


    *Fact #4: Each layer shapes and moves those near it.*


    A sure sign of a healthy pyramid is that one layer invades another. Think of each
    change to people, process, and pitch as a shove in one direction. This movement
    requires compensation in the other layers, otherwise the whole thing falls over.
    Roland’s decision to change the engineering process pissed off some folks. We
    lost some time to some source management edge cases that Roland hadn’t thought
    of, but, within a week, we’d adjusted. Even the most vocal opponent of the change
    ended up in Roland’s office arguing about how we could make it better.


    If, in your organization, your pyramid is not constantly adjusting to keep itself
    upright, something’s wrong. If the new folks aren’t testing the pitch, they either
    don’t buy it or they don’t get it. If your engineers aren’t arguing about the
    way they develop software *all the time*, they’re becoming stagnant, and that
    trickles down to your pitch and trickles up to your product.


    A great stagnation warning sign during 1.0 is when someone decides to create an
    organization chart defining “This is who does what.” Now, investors and outside
    parties need this org chart to get a sense of whether you’re real or not, but
    your 1.0 team does not. The whiteboard in the corner of the room, which lists
    who is doing what, is your org chart. The definition and hierarchy an org chart
    portrays is the first step in creating a culture of secrecy in your org. That
    might work for Apple, but you’re not Apple, yet. You’re hope and hard work.


    ## Product


    At some point, you’re going to need to fake being done. You’re going to need to
    release something that barely looks like your pitch because you don’t have product
    until a neutral party stares at something.


    *Fact #5: You don’t have a company until you have a product.*


    Product is not pitch. Pitch is the three-sentence idea that gave you the credibility
    to hire the people. The people argued about the pitch, they created process to
    refine and develop the pitch, and that changed it. The pyramid wobbled hither
    and fro during all of this. Maybe it fell completely over and you scrambled to
    stack those layers up again. Good job, there. You still don’t have product.'
