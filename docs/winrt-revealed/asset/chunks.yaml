- fmt: '### 引言


    如果你是这个场景中的经理，你必须做出重大改变，因为你不能发布垃圾产品。有些公司这么做了，最终还赚取了可观的利润。但你不会是他们那样的人，因为一旦你因发布垃圾而获得奖励，你就开始盲目地走上一条平庸之路，最终结局是在一家名叫“Computer
    Associates”的公司，维护一个没人听说过、也没人在乎的产品。


    这是一个两步走的修复流程。我们需要先做一个“Jerry式的调整”，然后我们需要一个奇迹。我先从简单的那步开始。


    我们需要Jerry。他是唯一一个知道那堆意大利面条式代码里到底发生了什么的人，并且他能修复那些无关紧要的小错误。工程经理让Jerry坐下，告诉他我们需要关注数量。到处都有大量被忽视的小修复，Jerry可以处理这些。是的，他的自尊心受到了伤害，但几周后，Jerry就开始高速运转了，因为当人们在有可能完成的任务上取得进展时，他们总是工作得更好。


    ### 自由电子


    Jerry投入工作后，我们不得不面对另一个事实：距离发布还有六个月，而我们有很大一部分功能是拼凑起来的，勉强能运行。在这种情况下，你需要一个独特的人才。你需要一个*自由电子*。


    自由电子是你将要遇到的最具生产力的工程师。我甚至还没给出定义，但我猜一个符合条件的人已经浮现在你的脑海里了。


    在代码方面，自由电子无所不能。他们可以从头开始编写一个完整的应用程序，用一个周末学会一门语言，最重要的是，他们可以一头扎进一大坨意大利面条式代码中，理清头绪，并让它真正运行起来。你可以围绕一个自由电子建立一整个业务。他们就是这么厉害。


    自由电子分为两类：*高级电子*和*初级电子*。两者都有相似的生产力产出，但高级版本已经变得在政治上和社交上都很成熟。在技术型组织中，许多CTO都属于这一类。想想Bill
    Joy。高级电子总是有风险会陷入技术的高地球轨道，他们的想法听起来简直疯狂，但是，每当我们发言时，你都应该倾听。


    初级版本拥有全部能力，他们只是缺乏与人打交道的经验，因为他们年轻时花了很多时间编写自己的操作系统，把这当作一种有趣的心智锻炼。这些初级电子代表着一个招聘经理能做出的最优秀的单项招聘。如果你在20年里能遇到两个，那你就做对了一些事。


    ### 养护与激励


    如果你有幸在自己的组织中拥有一个自由电子，你需要意识到你正在与一种特殊的工程师打交道，对这种工程师的养护和激励方式可能与团队其他成员不同。


    **让他们保持参与。** 首先，工程组织中有两个主要任务：研究和开发。虽然自由电子完全有能力做开发，但他们在组织中的价值在于研究。他们定义了技术前沿。如果你让一个自由电子在开发岗位上待得太久，他们会消失，仅仅是因为他们感到无聊。所有工程师都喜欢站在技术前沿，但自由电子必须定义它。一个离职的自由电子会永久性地损害你团队的生产力。


    **被误导的自由电子精力可能产生奇怪的结果。** 在一个项目中，我把几个棘手的内存损坏bug分配给了自由电子，他只是安静地点点头，然后立刻消失了一个星期。当他回来时，bug已经修好了，而且整个数据库层都被重写了。一段由两个工程师花了大约六个月设计的代码，在七天内被完全重做。听起来这是个好主意，直到你意识到我们当时正在做一个小更新，根本没有资源或时间去测试一个全新的数据库层。唉。


    **自由电子有时不会参与，而且他们不会解释原因。** 自由电子是高功能的，对每件事都有强烈的意见……但他们可能永远不会告诉你这些意见。如果你要求他们做一些他们不认同的事情，他们是不会去做的。随便你怎么要求。最糟糕的情况是，当你要求一个自由电子做出一个救场式的挽救，而他们点点头……然后立刻回到你那个无用的请求打扰他们之前正在做的事情上。一周后，你还在期待奇迹，但自由电子会说：“还没弄到那个。”


    又过了一周，你的头发基本上都要被揪光了，然后你会意识到，一开始你根本就不需要奇迹，不作为才是正确的选择。你的自由电子两周前就知道了。他们只是不想花两个小时为你画那张图。很烦人，是吧？你会习惯的。


    **这是一个团队。** 所有这些建议都是针对你的自由电子的，但你需要记住，尽管他们生产力惊人，但他们也是团队的一部分。我的建议不应被理解为给自由电子特殊待遇，正如你不会对团队中的每个人给予你专注的关注一样。没必要刻意引起别人对你团队中有个自由电子的注意。相信我，每个人都已经知道了。


    ### 回到Jerry


    Bernard出场了，Borland公司常驻的自由电子。在他开始在代码里捣鼓之前，我根本不知道Bernard到底是做什么的。他有个办公室，里面堆满了书。他说了很多话，但产出却很少。“吹牛大王”就是我当时的想法。


    Bernard在一个周五的下午开始摆弄Jerry的代码。接下来的周一，我有史以来第一次能够完整运行我的功能测试矩阵。到那一周结束时，Bernard已经关闭了大部分高严重性bug，并开始涉足原本专属于Jerry的修复领域。接下来的一周，我拼命地提交bug，就为了让Bernard保持参与。


    这就是工作中的自由电子。


    ### 章节：重组的规则


    你一定经历过这种事。


    晚上10点过后，你收到老板一封随机邮件说：“我们需要谈谈。”除了30秒后出现的、标题为“回复：需要谈谈”的会议邀请之外，没有任何额外信息。你坐在那里盯着屏幕，想知道发生了什么。空气中没有裁员的传闻；公司运营良好。你想不出自己做了什么、说了什么或写了什么值得管理层跟进的事情，那么到底是怎么回事？


    等到第二天开会时，你已经焦虑了整整12个小时，这意味着你反思了过去六个月里自己做的每一件事，以便为你老板可能抛出的任何刁钻问题做好准备。当你走进他的办公室时，他已经面朝着你，组织结构图就摆在他面前。


    所以你现在知道了。你即将经历一次重组。


    你的老板处理得相当不错。他开门见山地告诉你，你的一个小组将被调到别处。他解释了理由，并询问你的想法。你们又闲聊了一会儿，然后他彻底搞砸了：“我一直没告诉你，是因为事情变化太快，我不想折腾你。现在已经完全稳定下来了。”


    哈。好吧。'
  raw: 'If you’re the manager in this scenario, you’ve got to make a major change
    because you cannot release crap. There are companies that do this and end up making
    a tidy profit. You are not that person, because once you are rewarded for releasing
    crap, you begin a blind walk down a path of mediocrity that ends up with you working
    at Computer Associates on a product no one has heard of and that no one cares
    about.


    It’s a two-step fix process. We needed to make a Jerry adjustment and then we
    needed a miracle. I’ll start with the easy one.


    We needed Jerry. He’s the only one who knows what the hell is going on in that
    pile of spaghetti and he could fix trivial bugs. The engineering manager sat Jerry
    down and told him we need to focus on quantity. There were scads of trivial little
    fixes all over the place that had been ignored, and Jerry could handle those.
    Yes, his ego was bruised, but in a few weeks, Jerry was cranking because people
    always work better when they’re making forward progress on a task they have a
    chance of completing.


    With Jerry on task, we had to face another fact: we were six months from shipping,
    and we had a major portion of functionality that was cobbled together and barely
    working. In this scenario, you need a unique talent. You need a *free electron.*


    The free electron is the single most productive engineer that you’re ever going
    to meet. I have not even provided a definition and I’m guessing a person that
    fits the bill has already popped into your mind.


    A free electron can do anything when it comes to code. They can write a complete
    application from scratch, learn a language in a weekend, and, most importantly,
    they can dive into a tremendous pile of spaghetti code, make sense of it, and
    actually get it working. You can build an entire business around a free electron.
    They’re that good.


    There are two classes of free electrons, *senior electrons* and *junior electrons.*
    Both have similar productivity yields, but the senior versions have become politically
    and socially aware. In technology-savvy organizations, many CTOs fall into this
    category. Think Bill Joy. There’s always a risk that senior electrons can spin
    into a technology high-earth orbit where their ideas simply sound insane, but,
    whenever they talk, you should listen.


    The junior versions have all the ability, they just don’t have the experience
    of dealing with people because they spent a lot of their youths writing their
    own operating systems as a fun intellectual exercise. These junior electrons represent
    the single best hire you can make as a hiring manager. If you get two in 20 years,
    you’re doing something right.


    Care and Feeding


    If you are lucky enough to have a free electron in your organization, you need
    to be aware you are dealing with a strange breed of engineer and the care of and
    feeding of this engineer might be different than the rest of the team.


    **Keep them engaged.** First, there are two primary tasks in an engineering organization:
    research and development. While the free electron is eminently capable of doing
    development, their value in the organization is research. They define the bleeding
    edge. If you leave a free electron in the development role too long, they will
    vanish simply because they’re bored. All engineers like to be on the bleeding
    edge, but free electrons simply must be defining it. A departing free electron
    will permanently damage the productivity of your group.


    **Misdirected free electron intensity can yield odd results.** On one project,
    I assigned a couple of slippery memory corruption bugs to a free electron who
    nodded quietly and promptly vanished for a week. When he returned, the bugs were
    fixed and the entire database layer had been rewritten. A piece of code that’d
    taken two engineers roughly six months to design had been totally redone in seven
    days. Sounds like a great idea until you realize we were working on a small update
    and did not have the resources or time to test a brand spankin’ new database layer.
    Oops.


    **Free electrons sometimes will not engage and they won’t explain why.** Free
    electrons are high-functioning and have strong opinions about everything … but
    they may never tell you those opinions. If you’re asking them to do something
    that they don’t believe in, they aren’t going to do it. Ask all you want. The
    worst case is when you ask a free electron to pull off a diving save and they
    nod … and promptly return to whatever they were doing before you distracted them
    with your useless request. One week later, you’re going to be expecting the miracle,
    but the free electron is going to say, “Haven’t got to that.”


    One week more, your hair is going to be mostly pulled out, and then you’re going
    to realize you didn’t need a miracle in the first place and that inaction was
    the right move. Your free electron knew that two weeks ago. They just didn’t want
    to take the two hours to draw the picture for you. Annoying, huh? You’ll get over
    it.


    **It’s a team.** All of this advice is directed at your free electron, but you
    need to remember even though they’re incredibly productive, they’re part of the
    team. My advice shouldn’t be interpreted as giving free electrons special treatment
    any more than you give each person on your team your focused attention. There’s
    no need to call attention to the fact that you’ve got a free electron on your
    team. Trust me, everyone already knows it.


    Back to Jerry


    Enter Bernard, Borland’s resident free electron. Up until he started poking around
    the code, I had no idea what Bernard actually did. He had an office. It was full
    of books. He talked a lot and produced little visible work. “Blowhard” is what
    I thought.


    Bernard started tinkering with Jerry’s code on a Friday afternoon. The next Monday,
    I was able to run through my functional test matrix for the first time ever. By
    the end of that week, Bernard had closed a majority of the high-severity bugs
    and was beginning to tread in fix areas reserved for Jerry. The following week
    I was racing to file bugs to keep Bernard engaged.


    That is a free electron at work.


    CHAPTER


    Rules for the Reorg


    You’ve been here.


    It’s after 10 p.m. and you get a random e-mail from your boss saying, “We need
    to talk.” No additional data except for a meeting proposal that shows up 30 seconds
    later entitled “Re: Needing to Talk.” You sit staring at the screen, wondering
    what could be up. No rumors of layoffs are in the air; the company is doing fine.
    You can’t think of anything you’ve done, said, or written that merits a managerial
    follow-up, so what’s the deal?


    By the time the meeting shows up the next day, you’ve been stewing for a good
    12 hours, which means you’ve reflected on every single thing you’ve done for the
    past six months so you can be prepared for whatever curveball your boss is going
    to throw. When you walk in his office, he’s already facing you and he’s got the
    org chart sitting directly in front of him.


    So now you know. You’re about to endure a reorganization.


    Your boss is pretty good about it. He comes right out and tells you that one of
    your groups is going to be moved elsewhere. He explains the justification and
    asks you for your thoughts. You chitchat a bit more, then he totally blows it:
    “I held off from telling you because things are changing so much and I didn’t
    want to jerk you around. It’s all settled down now.”


    Hah. Right.'
  trans: '

    ### 引言


    如果你是这个场景中的经理，你必须做出重大改变，因为你不能发布垃圾产品。有些公司这么做了，最终还赚取了可观的利润。但你不会是他们那样的人，因为一旦你因发布垃圾而获得奖励，你就开始盲目地走上一条平庸之路，最终结局是在一家名叫“Computer
    Associates”的公司，维护一个没人听说过、也没人在乎的产品。


    这是一个两步走的修复流程。我们需要先做一个“Jerry 式的调整”，然后我们需要一个奇迹。我先从简单的那步开始。


    我们需要 Jerry。他是唯一一个知道那堆意大利面条式代码里到底发生了什么的人，并且他能修复那些无关紧要的小错误。工程经理让 Jerry 坐下，告诉他我们需要关注数量。到处都有大量被忽视的小修复，Jerry
    可以处理这些。是的，他的自尊心受到了伤害，但几周后，Jerry 就开始高速运转了，因为当人们在有可能完成的任务上取得进展时，他们总是工作得更好。


    ### 自由电子


    Jerry 投入工作后，我们不得不面对另一个事实：距离发布还有六个月，而我们有很大一部分功能是拼凑起来的，勉强能运行。在这种情况下，你需要一个独特的人才。你需要一个*自由电子*。


    自由电子是你将要遇到的最具生产力的工程师。我甚至还没给出定义，但我猜一个符合条件的人已经浮现在你的脑海里了。


    在代码方面，自由电子无所不能。他们可以从头开始编写一个完整的应用程序，用一个周末学会一门语言，最重要的是，他们可以一头扎进一大坨意大利面条式代码中，理清头绪，并让它真正运行起来。你可以围绕一个自由电子建立一整个业务。他们就是这么厉害。


    自由电子分为两类：*高级电子*和*初级电子*。两者都有相似的生产力产出，但高级版本已经变得在政治上和社交上都很成熟。在技术型组织中，许多 CTO 都属于这一类。想想
    Bill Joy。高级电子总是有风险会陷入技术的高地球轨道，他们的想法听起来简直疯狂，但是，每当我们发言时，你都应该倾听。


    初级版本拥有全部能力，他们只是缺乏与人打交道的经验，因为他们年轻时花了很多时间编写自己的操作系统，把这当作一种有趣的心智锻炼。这些初级电子代表着一个招聘经理能做出的最优秀的单项招聘。如果你在
    20 年里能遇到两个，那你就做对了一些事。


    ### 养护与激励


    如果你有幸在自己的组织中拥有一个自由电子，你需要意识到你正在与一种特殊的工程师打交道，对这种工程师的养护和激励方式可能与团队其他成员不同。


    **让他们保持参与。** 首先，工程组织中有两个主要任务：研究和开发。虽然自由电子完全有能力做开发，但他们在组织中的价值在于研究。他们定义了技术前沿。如果你让一个自由电子在开发岗位上待得太久，他们会消失，仅仅是因为他们感到无聊。所有工程师都喜欢站在技术前沿，但自由电子必须定义它。一个离职的自由电子会永久性地损害你团队的生产力。


    **被误导的自由电子精力可能产生奇怪的结果。** 在一个项目中，我把几个棘手的内存损坏 bug 分配给了自由电子，他只是安静地点点头，然后立刻消失了一个星期。当他回来时，bug
    已经修好了，而且整个数据库层都被重写了。一段由两个工程师花了大约六个月设计的代码，在七天内被完全重做。听起来这是个好主意，直到你意识到我们当时正在做一个小更新，根本没有资源或时间去测试一个全新的数据库层。唉。


    **自由电子有时不会参与，而且他们不会解释原因。** 自由电子是高功能的，对每件事都有强烈的意见……但他们可能永远不会告诉你这些意见。如果你要求他们做一些他们不认同的事情，他们是不会去做的。随便你怎么要求。最糟糕的情况是，当你要求一个自由电子做出一个救场式的挽救，而他们点点头……然后立刻回到你那个无用的请求打扰他们之前正在做的事情上。一周后，你还在期待奇迹，但自由电子会说：“还没弄到那个。”


    又过了一周，你的头发基本上都要被揪光了，然后你会意识到，一开始你根本就不需要奇迹，不作为才是正确的选择。你的自由电子两周前就知道了。他们只是不想花两个小时为你画那张图。很烦人，是吧？你会习惯的。


    **这是一个团队。** 所有这些建议都是针对你的自由电子的，但你需要记住，尽管他们生产力惊人，但他们也是团队的一部分。我的建议不应被理解为给自由电子特殊待遇，正如你不会对团队中的每个人给予你专注的关注一样。没必要刻意引起别人对你团队中有个自由电子的注意。相信我，每个人都已经知道了。


    ### 回到 Jerry


    Bernard 出场了，Borland 公司常驻的自由电子。在他开始在代码里捣鼓之前，我根本不知道 Bernard 到底是做什么的。他有个办公室，里面堆满了书。他说了很多话，但产出却很少。“吹牛大王”就是我当时的想法。


    Bernard 在一个周五的下午开始摆弄 Jerry 的代码。接下来的周一，我有史以来第一次能够完整运行我的功能测试矩阵。到那一周结束时，Bernard 已经关闭了大部分高严重性
    bug，并开始涉足原本专属于 Jerry 的修复领域。接下来的一周，我拼命地提交 bug，就为了让 Bernard 保持参与。


    这就是工作中的自由电子。


    ### 章节：重组的规则


    你一定经历过这种事。


    晚上 10 点过后，你收到老板一封随机邮件说：“我们需要谈谈。”除了 30 秒后出现的、标题为“回复：需要谈谈”的会议邀请之外，没有任何额外信息。你坐在那里盯着屏幕，想知道发生了什么。空气中没有裁员的传闻；公司运营良好。你想不出自己做了什么、说了什么或写了什么值得管理层跟进的事情，那么到底是怎么回事？


    等到第二天开会时，你已经焦虑了整整 12 个小时，这意味着你反思了过去六个月里自己做的每一件事，以便为你老板可能抛出的任何刁钻问题做好准备。当你走进他的办公室时，他已经面朝着你，组织结构图就摆在他面前。


    所以你现在知道了。你即将经历一次重组。


    你的老板处理得相当不错。他开门见山地告诉你，你的一个小组将被调到别处。他解释了理由，并询问你的想法。你们又闲聊了一会儿，然后他彻底搞砸了：“我一直没告诉你，是因为事情变化太快，我不想折腾你。现在已经完全稳定下来了。”


    哈。好吧。

    '
- fmt: '在解释你的上司刚才如何对你撒谎之前，我们先准确理解“重组”（`reorg`）到底是什么，然后我为你提供一些应对混乱的建议。首先，重组不是裁员。裁员可能作为重组的一部分发生，但它们是副作用，而非原因。重组是为了应对公司战略的转变而对团队和产品进行重新调配。是什么样的转变？谁知道呢。也许你的产品市场发生了变化，或者经济形势糟糕。关键在于，执行层的某位决策者认为“我们需要对组织结构进行调整”，而这意味着一段整整一个月的混乱期。


    以下是重组混乱期间需要注意的一些有用规则，以及一些渡过难关的窍门。


    **规则 #1：明确你的角色**


    当你第一次听到重组的风声时，你有一个选择：你打算如何参与？你是打算袖手旁观，看这场好戏，还是打算积极投身于混乱之中？


    在你做出选择之前，可能需要先评估一下重组的规模。你尤其要关注那些与你所在部门相关的人事运作，但关键是要记住，重组代表着机遇。即使这次重组不涉及你的团队，也不意味着你不能向你的上司提议解决你所在小组长期存在的组织问题。


    机遇在于，重组让组织变得非常灵活。整个组织的管理者们都在和你思考同一件事：“好吧，既然我们现在要解决A问题，那不如顺手把B问题也一起搞定，反正我们也要把一切搅个天翻地覆。”如果你有任何议程，有任何想要推动的改变，现在是时候考虑把它提出来了，因为在重组期间，你促成改变的可能性要大得多。


    如果你满足于袖手旁观，看着其他人拉线操控，那也还有其他事值得你留意。


    **规则 #2：人们会变得多疑**


    从组织中的大多数人知道重组这件事，到实际重组发生，这中间有一段痛苦且漫长的时期。这段时期之所以痛苦，是因为它会促使员工开始提出关于公司的基本问题。谁要去哪里？为什么？会有裁员吗？为什么会发生这种情况？一切结束后我还能保住工作吗？


    在团队得知重组的前一天，没有人问这些问题。团队当时正处于一种愉快的无知状态，他们最大的担忧是下一个截止日期。而现在，他们却在担心明天组织会变成什么样，而事实很简单：没有人知道。


    让我们回到你上司对你说的话：“我之前没有告诉你，是因为事情变化太快，我不想让你跟着瞎折腾。现在一切都已经稳定下来了。”


    再读一遍那句话：“事情变化太快”和“现在一切都已经稳定下来了”。他自相矛盾了，你听他这么说时就意识到了。是的，他试图在沟通，但他所做的只是让你变得多疑。走出那个会议室时，你会想：“他其实也不知道接下来会发生什么”，你是对的。他确实不知道。


    没有人真正知道明天会发生什么，这一事实会滋生一种多疑的文化，这意味着你需要开始仔细倾听。


    **规则 #3：小道消息疯狂传播**


    重组期间谣言混乱的一个主要推手就是小道消息。简单来说，最初作为事实的信息，在人与人之间传播时会逐渐变得越来越像谣言。我们来看一个例子……


    工程副总裁对她的员工说：“他们正在Ted手下组建一个新的硬件部门。目前还不清楚所有的人员编制从哪来，但其中一个选项是从其他部门削减编制。”


    她说了什么？相当清晰的事实陈述。她试图给她的员工提个醒。我们继续往下看。


    工程经理对他的下属说：“Ted有了一个新部门。我们部门很可能会失去一些编制。”


    好的，他说了什么？他先从事实开始，然后加上了一个观点——他会失去人手。他为什么这么说？也许他在公司待了很多年，知道这类事情通常会如何发展，又或者他只是在猜测。谁知道呢？小道消息正式生效了。再看……


    高级工程师对他的朋友说：“我们部门要失去一些编制了，这些编制会转到Ted的部门去。天啊，我讨厌Ted。”


    欢迎来到一个为小道消息供应而准备成熟的完整谣言。


    这是一个简单的例子，但它说明了基本的人性。我们想知道发生了什么，当我们不知道时，我们很可能会利用手头的任何事实来编造信息，以给人一种我们知道的假象。当你把观点和偏见添加到这个信息创造过程中时，最终你会看到源源不断的、引人入胜的虚构故事出现在你的面前。


    在重组之外，我对小道消息相当信任，因为我觉得信息在人与人之间传递时的变异较少。但当饭碗受到威胁时，小道消息就会失控，一些离谱的垃圾信息会传到你的耳朵里。我建议采取一种耐心的、记者式的策略：在你相信任何事情之前，先用独立的信源去核实零散的信息片段。


    **规则 #4：重组耗时漫长**


    从你听说重组到重组真正完成，所需的时间会是你预期的四倍。重组会耗费极长时间。计划被制定出来，与利益相关者确认，根据反馈进行调整，与预算平衡，上报给大老板，然后再回到设计阶段。在这个官方流程进行的同时，还有走廊里的各种暗中活动，以及个别玩家为争夺人员编制而利用小道消息以实现其不可告人的目的。所有这些都会导致更多信息被注入官方流程，从而迫使流程进行更多的迭代。


    我在这里的建议基于你选择的角色。显然，如果你深涉其中并有议程要推动，你需要在整个过程中保持参与。不要相信你的上司对你说“我们搞定了”，因为那只是他自以为搞定了。他不知道平台工程部的Phil还有几手准备。


    如果你选择了旁观者的角色，我建议你坐回椅子上，享受这幕繁忙景象。让自己安心于你仍有工作这一事实，而且，嘿，如果这次重组影响到了你，换个环境或许对你有好处。别忘了在你的新办公室要个有窗户的位置。


    重组并没有结束，直到某个重要人物打印出了一张新的组织架构图，并在整个公司面前展示出来。


    **规则 #5：大多数人喜欢重组（但不愿承认）**


    重组对那些对当前组织状态不满的人来说代表着机遇。如上所述，一旦利益相关者听说有重组的苗头，他们就会开始运作小道消息，以引导重组朝着对自己有利的方向发展。当你把这个事实与人们对八卦的喜爱结合起来，就肯定会迎来一场规模宏大、勾心斗角、旷日持久的重组。


    如果你是个旁观者，你可能会对所有的走廊闲聊和闭门会议感到恼火，但事实是，大多数人就是喜欢这破事。谁被调走了？真的？哇哦。不可能吧。他是个白痴！太糟了！出于某种原因，关于重组的对话听起来很像关于出轨的对话。人们就是闭不上嘴。


    具有讽刺意味的是，在重组周围制造最多噪音的群体，恰恰是对重组最终结果影响最小的群体。当管理团队正在战略、政治议程和财务责任中艰难跋涉，寻找一个能让公司不再纠结于谁为谁工作、转而专注于打造产品的计划时，这些人正徘徊在黑暗中。


    **唯一规则：耐心**'
  raw: 'Before I explain how your boss just lied to you, let’s first understand exactly
    what a reorganization (“reorg”) is, and then I’ve got some advice for how to weather
    the chaos. First, a reorg is not a layoff. Layoffs can occur as part of a reorg,
    but they are a side effect, not a cause. Reorgs are when teams and products are
    shifted around in order to account for a shift in company strategy. What kind
    of shift? Who knows. Maybe the market for your product has changed, or maybe the
    economy is crap. The point is, someone, somewhere in the executive chain decided
    “We need to make an adjustment to the organization structure,” and that means
    a good solid month of chaos.


    Below are some useful rules to pay attention to during the reorg chaos, as well
    as some tips and tricks for surviving it.


    Rule #1: Figure Out Your Role


    When you first get wind of the reorg, you have a choice. How are you going to
    participate? Are you going to sit back and watch the fun or are you going to actively
    dive into the chaos?


    You’ll likely need to assess the magnitude of the reorg before you choose. You’re
    especially interested in whatever machinations are in play for your part of the
    building, but the key to remember is that reorgs represent opportunity. Even if
    this particular reorg doesn’t involve your team, it doesn’t mean that you can’t
    pitch your boss on fixing a long-standing organization problem in your group.


    The opportunity lies in the fact that a reorg makes an organization very limber.
    Managers across the organization are thinking the same thing as you: “Well, if
    we’re going to solve problem A right now, we should take a stab at problem B since
    we’re going to be mucking with everything anyway.” If you’ve got an agenda, if
    you’ve got a change in mind, it’s time to consider pushing it because the chances
    that you can effect change are vastly higher in the midst of a reorg.


    If you’re content sitting back and watching everyone else pull the strings, there
    are still some other things to pay attention to.


    Rule #2: People Are Paranoid


    There is a painfully long period between when a majority of the organization knows
    about a reorg and when the actual reorg occurs. It’s a painful time because it
    causes employees to start asking basic questions regarding the company. Who is
    going where and why? Are there layoffs? Why is this happening and do I have a
    job when it’s all over?


    The day before the team learned about the reorg, none of these questions were
    being asked. The team was working in a state of pleasant ignorance where their
    biggest worry was the next deadline. Now, they’re worrying about what the organization
    is going to look like tomorrow and the simple fact is, no one knows.


    Let’s go back to what your boss told you: “I held off from telling you because
    things are changing so much and I didn’t want to jerk you around. It’s all settled
    down now.”


    Read that again. “Things are changing so much” and “It’s all settled down now.”
    He’s contradicted himself and you hear this when he says it. Yes, he’s trying
    to communicate, but all he’s doing is making you paranoid. You’re going to walk
    out of that meeting thinking, “He doesn’t actually know what’s going to happen,”
    and you’re right. He doesn’t.


    The fact that no one actually knows what is going to happen tomorrow creates a
    culture of paranoia and that means you need to start listening carefully.


    Rule #3: The Grapevine Gone Mad


    A major contributor to the rumor chaos around reorgs is the grapevine. Simply
    put, information that starts out as fact will slowly become more and more rumor
    as it moves from person to person. Let’s watch …


    VP of engineering to her staff: “They’re building a new hardware group under Ted.
    It’s not clear where they’ll be getting all the headcount, but one option would
    be to sacrifice headcount from other groups.”


    What’d she say? Pretty clear statement of fact. She’s trying to give her staff
    a heads up. Let’s keep moving.


    Manager of engineering to his staff: “Ted has a new group. We’re liable to lose
    headcount in our group.”


    OK, what’d he say? He starts with the facts and then follows up with an opinion—he’s
    losing heads. Why is he saying this? Maybe he’s been at the company for years
    and knows how these things play out or maybe he’s just guessing. Who knows? The
    grapevine is officially in effect. Watch …


    Senior engineer to his friend: “We’re losing heads in our group and they’re going
    to Ted’s group. Gosh, I hate Ted.”


    Welcome to a fully developed rumor ready for consumption by the grapevine.


    This is a simple example, but it illustrates basic human nature. We want to know
    what’s going on, and when we don’t, we’re likely to make stuff up using whatever
    facts are available to give the impression that we do. When you add opinions and
    biases to this information-creation process, you end up with a steady flow of
    compelling fiction crossing your desk.


    Outside of the reorg, I put a lot of faith in the grapevine because I find there
    is less mutation of information as it jumps from person to person, but when jobs
    are on the line, the grapevine goes insane and some radical crap is going to find
    its way to you. I advise a patient, journalistic policy, where you confirm tidbits
    of information with independent sources before you believe anything.


    Rule #4: Reorgs Take Forever


    The time from when you hear about a reorg to when it’s actually done is going
    to be four times as long as you think. Reorgs take forever. Plans are designed,
    confirmed with stakeholders, adjusted with feedback, balanced with budgets, run
    up the flagpole with the big boss, and then taken back to the drawing board. While
    this official process is going down, there are hallway shenanigans going on, as
    well as individual political players jockeying for headcount by tweaking the grapevine
    for their own nefarious purposes. All of this results in more information being
    inserted into the official process, forcing even more iteration.


    My advice here is based on the role that you chose. Clearly if you’ve got skin
    in the game and have an agenda to push, you need to stay engaged for the duration.
    Don’t trust when your boss tells you, “We’re done,” because that means he thinks
    he’s done. He doesn’t know about Phil over in platform engineering who still has
    a couple of moves in him.


    If you’ve chosen the observation role, I recommend sitting back in your chair
    and enjoying the scurrying. Take comfort in the fact that you’re still employed,
    and hey, if the reorg affects you, maybe a change of scenery is going to do you
    some good. Don’t forget to ask for a window in your new office.


    A reorg isn’t over until someone important has printed out a new organizational
    chart and presented it in front of the entire company.


    Rule #5: Most Folks Love Reorgs (But Hate to Admit It)


    Reorganizations represent opportunity to those who are unhappy with the state
    of the current organization. As mentioned above, the moment stakeholders hear
    that there is a reorg brewing, they start working the grapevine to steer the course
    of the reorg in their favor. When you combine this fact with people’s love of
    gossip, you’re guaranteed a big, juicy, drawn-out reorganization.


    If you’re an observer, you might be annoyed by all the hallway conversation and
    closed-door meetings, but the fact is, most folks love this shit. Who is getting
    moved? Really? Wow. No way. He’s an idiot! That blows! For some reason, conversations
    about reorgs sound a lot like conversations about infidelity. People are incapable
    of shutting up.


    The group responsible for generating the most noise around reorgs, ironically,
    is the group who has the least effect on their eventual outcomes. These are the
    folks who are lingering in the dark while the management team wades through strategy,
    political agenda, and fiscal responsibility looking for a plan that gets the company
    out of wondering who works for whom and starts worrying about building product
    again.


    The Only Rule: Patience'
  trans: '

    在解释你的上司刚才如何对你撒谎之前，我们先准确理解“重组”（`reorg`）到底是什么，然后我为你提供一些应对混乱的建议。首先，重组不是裁员。裁员可能作为重组的一部分发生，但它们是副作用，而非原因。重组是为了应对公司战略的转变而对团队和产品进行重新调配。是什么样的转变？谁知道呢。也许你的产品市场发生了变化，或者经济形势糟糕。关键在于，执行层的某位决策者认为“我们需要对组织结构进行调整”，而这意味着一段整整一个月的混乱期。


    以下是重组混乱期间需要注意的一些有用规则，以及一些渡过难关的窍门。


    **规则 #1：明确你的角色**


    当你第一次听到重组的风声时，你有一个选择：你打算如何参与？你是打算袖手旁观，看这场好戏，还是打算积极投身于混乱之中？


    在你做出选择之前，可能需要先评估一下重组的规模。你尤其要关注那些与你所在部门相关的人事运作，但关键是要记住，重组代表着机遇。即使这次重组不涉及你的团队，也不意味着你不能向你的上司提议解决你所在小组长期存在的组织问题。


    机遇在于，重组让组织变得非常灵活。整个组织的管理者们都在和你思考同一件事：“好吧，既然我们现在要解决 A 问题，那不如顺手把 B 问题也一起搞定，反正我们也要把一切搅个天翻地覆。”如果你有任何议程，有任何想要推动的改变，现在是时候考虑把它提出来了，因为在重组期间，你促成改变的可能性要大得多。


    如果你满足于袖手旁观，看着其他人拉线操控，那也还有其他事值得你留意。


    **规则 #2：人们会变得多疑**


    从组织中的大多数人知道重组这件事，到实际重组发生，这中间有一段痛苦且漫长的时期。这段时期之所以痛苦，是因为它会促使员工开始提出关于公司的基本问题。谁要去哪里？为什么？会有裁员吗？为什么会发生这种情况？一切结束后我还能保住工作吗？


    在团队得知重组的前一天，没有人问这些问题。团队当时正处于一种愉快的无知状态，他们最大的担忧是下一个截止日期。而现在，他们却在担心明天组织会变成什么样，而事实很简单：没有人知道。


    让我们回到你上司对你说的话：“我之前没有告诉你，是因为事情变化太快，我不想让你跟着瞎折腾。现在一切都已经稳定下来了。”


    再读一遍那句话：“事情变化太快”和“现在一切都已经稳定下来了”。他自相矛盾了，你听他这么说时就意识到了。是的，他试图在沟通，但他所做的只是让你变得多疑。走出那个会议室时，你会想：“他其实也不知道接下来会发生什么”，你是对的。他确实不知道。


    没有人真正知道明天会发生什么，这一事实会滋生一种多疑的文化，这意味着你需要开始仔细倾听。


    **规则 #3：小道消息疯狂传播**


    重组期间谣言混乱的一个主要推手就是小道消息。简单来说，最初作为事实的信息，在人与人之间传播时会逐渐变得越来越像谣言。我们来看一个例子……


    工程副总裁对她的员工说：“他们正在 Ted 手下组建一个新的硬件部门。目前还不清楚所有的人员编制从哪来，但其中一个选项是从其他部门削减编制。”


    她说了什么？相当清晰的事实陈述。她试图给她的员工提个醒。我们继续往下看。


    工程经理对他的下属说：“Ted 有了一个新部门。我们部门很可能会失去一些编制。”


    好的，他说了什么？他先从事实开始，然后加上了一个观点——他会失去人手。他为什么这么说？也许他在公司待了很多年，知道这类事情通常会如何发展，又或者他只是在猜测。谁知道呢？小道消息正式生效了。再看……


    高级工程师对他的朋友说：“我们部门要失去一些编制了，这些编制会转到 Ted 的部门去。天啊，我讨厌 Ted。”


    欢迎来到一个为小道消息供应而准备成熟的完整谣言。


    这是一个简单的例子，但它说明了基本的人性。我们想知道发生了什么，当我们不知道时，我们很可能会利用手头的任何事实来编造信息，以给人一种我们知道的假象。当你把观点和偏见添加到这个信息创造过程中时，最终你会看到源源不断的、引人入胜的虚构故事出现在你的面前。


    在重组之外，我对小道消息相当信任，因为我觉得信息在人与人之间传递时的变异较少。但当饭碗受到威胁时，小道消息就会失控，一些离谱的垃圾信息会传到你的耳朵里。我建议采取一种耐心的、记者式的策略：在你相信任何事情之前，先用独立的信源去核实零散的信息片段。


    **规则 #4：重组耗时漫长**


    从你听说重组到重组真正完成，所需的时间会是你预期的四倍。重组会耗费极长时间。计划被制定出来，与利益相关者确认，根据反馈进行调整，与预算平衡，上报给大老板，然后再回到设计阶段。在这个官方流程进行的同时，还有走廊里的各种暗中活动，以及个别玩家为争夺人员编制而利用小道消息以实现其不可告人的目的。所有这些都会导致更多信息被注入官方流程，从而迫使流程进行更多的迭代。


    我在这里的建议基于你选择的角色。显然，如果你深涉其中并有议程要推动，你需要在整个过程中保持参与。不要相信你的上司对你说“我们搞定了”，因为那只是他自以为搞定了。他不知道平台工程部的
    Phil 还有几手准备。


    如果你选择了旁观者的角色，我建议你坐回椅子上，享受这幕繁忙景象。让自己安心于你仍有工作这一事实，而且，嘿，如果这次重组影响到了你，换个环境或许对你有好处。别忘了在你的新办公室要个有窗户的位置。


    重组并没有结束，直到某个重要人物打印出了一张新的组织架构图，并在整个公司面前展示出来。


    **规则 #5：大多数人喜欢重组（但不愿承认）**


    重组对那些对当前组织状态不满的人来说代表着机遇。如上所述，一旦利益相关者听说有重组的苗头，他们就会开始运作小道消息，以引导重组朝着对自己有利的方向发展。当你把这个事实与人们对八卦的喜爱结合起来，就肯定会迎来一场规模宏大、勾心斗角、旷日持久的重组。


    如果你是个旁观者，你可能会对所有的走廊闲聊和闭门会议感到恼火，但事实是，大多数人就是喜欢这破事。谁被调走了？真的？哇哦。不可能吧。他是个白痴！太糟了！出于某种原因，关于重组的对话听起来很像关于出轨的对话。人们就是闭不上嘴。


    具有讽刺意味的是，在重组周围制造最多噪音的群体，恰恰是对重组最终结果影响最小的群体。当管理团队正在战略、政治议程和财务责任中艰难跋涉，寻找一个能让公司不再纠结于谁为谁工作、转而专注于打造产品的计划时，这些人正徘徊在黑暗中。


    **唯一规则：耐心**

