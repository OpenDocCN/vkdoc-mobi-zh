- fmt: '# Strategic vs. Tactical Hires


    A strategic hire is someone who is going to push their agenda, their opinion.
    They are actively engaged in what they are doing, networking with others who do
    it, and they’ll tell anyone, at length, about how they’re going to do it. Strategic
    hires are going to piss people off because of the annoying intensity of their
    agenda.


    A tactical hire is a person who is filling a well-defined need. “We need a database
    guy.” Like strategics, tacticals know their stuff, but that’s all that they know.
    Also, they’re not that interested in pushing an agenda. They just want to get
    their work done in relative silence.


    I’m making no judgment regarding whether strategic or tactical is a better hire
    for you because I don’t have a clue who you’re hiring. What’s important is to
    understand what type of vision you need for your hire, and, more importantly,
    who the right person is to interview for this ability. My preference is that the
    manager is the person who is the bellwether for vision because that’s their job
    for the group. It’s not just that you know what the team needs, it’s that vision
    defines career path and you need to know, as early as possible, what it’s going
    to take to keep a future hire engaged. A strategic isn’t going to be with your
    team long because you simply don’t move fast enough, whereas a tactical is going
    to be happy as long as you keep the work relevant and constant.


    ## Team Consensus


    Once the team and the bellwethers have interviewed your candidate, it’s time to
    gather everyone together and hear what they think. This is another time when eager
    managers try to save time by having the interviewers send their feedback via mail
    or grab an opinion in the hallway.


    Wrong. You always have an interview feedback meeting. The ultimate choice to hire
    is the hiring manager’s, but everyone who takes the time to interview the candidate
    has a vote, and while they walk out of the interview with an opinion, they haven’t
    really voted until they’ve heard everyone’s feedback. Watch what happens. Gather
    everyone together and go around the table. For each person who gives their feedback,
    take notes and notice, as each person talks, how folks who already talked continue
    to add more information, and, sometimes, even change their opinion. What you’re
    seeing happen in this meeting is consensus building. Opinions are being shaped
    by information, but the group is also coming to a collective decision. This is
    why every team member needs to be on the interview schedule. While it’s your decision
    to hire, you’d be a fool not to follow the lead set by the team.


    ### Be a Fool


    There are times when you need to be a fool, and this is when the right hire intentionally
    isn’t a fit for the team. This is another area where your bellwethers may prove
    more useful than the team’s opinion. At my prior gig, we had a curmudgeon architect
    who, while talented, was creating an aura of negativity in the group. It was the
    curmudgeon’s opinion spilling over on the rest of team, and after two years, it
    needed an adjustment.


    Looking for fresh blood and new perspective, I began recruiting from local universities.
    My cultural bellwether was one of the first engineers I’d hired, but for this
    position I went to another engineering manager I admired and asked, “Who is the
    best person to interview for the culture of your team?”


    “That’d be Frank.”


    Frank became my cultural bellwether because I wanted to change the culture of
    the team. As we brought college hires through the interview process, the feedback
    meetings weren’t surprising. “He’s too young! He doesn’t know about this technology!
    We’ve got too much to do to bring this green person up to speed.” This was the
    existing engineering team taking its content and cultural cues from the senior
    curmudgeon, and it wasn’t surprising that Frank’s feedback consistently contradicted
    the rest of the team. “He’s bright. Good fit for the culture and I want to work
    with this kid.”


    You’re thinking that contradicting the team’s consensus opinion on a hiring decision
    is a downside to the group feedback meeting. It’s not. While you need to take
    special care to explain your decision to each person on the team, you can use
    the team’s consistent negative feedback as part of your reasoning and part of
    your explanation.


    “You remember that feedback? You remember the yelling? Yeah, I’m tired of the
    yelling, aren’t you?”


    ### Still Delusional


    We’re still deluding ourselves. Even with three of the best bellwethers you can
    find, hiring anyone is a huge risk. The idea that you can successfully profile
    a candidate in a phone screen and two rounds of interviews is absurd. All you
    are getting is a taste. I know you asked them, “How do you deal with stressful
    situations?” but the fact is you won’t actually know who they are until some real
    stress shows up.


    You need to hire. You need to be able to grow your team and that means taking
    a risk on these people who are a little more than a résumé and some good conversation.
    While I believe a solid set of bellwether and team interviews is the best means
    of gathering in-person data about a candidate, don’t stop there. Go read their
    weblog. Find out if they’ve contributed to open source. Read their posts to mailing
    lists. In-person interviews are going to give you a glimpse of a person, but anything
    you can do to complete the picture won’t only give you a better perspective, it
    will reduce the risk that you’re hiring a stranger.


    # CHAPTER


    ## The Ninety-Day Interview


    When you accept a new job, you don’t know who you are going to work with, what
    you are going to be doing, and how much (or little) you’re going to like it. Call
    everyone you want. Ask their opinions. Trust the fact that a good friend referred
    you for the gig. Revel in the idea that the company has a good pedigree, but don’t
    delude yourself that in a smattering of interview hours you’re going to have anything
    more than a vague hint of your new life.


    Try this. Tell me about your best friend. Give me a bulleted list of five noteworthy
    things you think I should know about your best friend. Got it? Read it out loud.
    Does this do justice to your best friend? I hear you when you say, “He’d do anything
    for me,” but why is that? Why is he protective of you? What’s the story behind
    the bullet? That’s what I want to know.


    Each person in your new team has a story they want to tell you and it’s never
    a bulleted list. Some are going to freely give this story whereas others will
    carefully protect the fact they even have a story, but until each person you need
    to work with has shared this story with you (and vice versa), the interview isn’t
    over. The jury is out and you won’t know if this new job that you’ve begun is
    actually your job.


    ### Deliberation


    Your first job is to relax. Like the first day of school, you’re going to overcompensate
    in your first day, your first week. Most people do not lay their clothes out the
    night before they go to work. You’re doing this to calm yourself. Those clothes
    neatly laid out at the end of your bed are a visual reminder that you have control
    over this thing that you can’t control.


    Relax. There’s an industry standard regarding the amount of time it takes to make
    a hire, and it’s 90 days. New managers hate when I tell them this because they’re
    so giddy they’ve got a new requisition and, *boy, watch how fast I can hire.*
    Yes, yes. I appreciate your velocity, but I’m not going to worry about your hire
    for 90 days.


    This chunk of time applies to your new job as well. You’ve got 90 days—3 months—to
    finish your job interview. Draw an *X* on a calendar 90 days from now. Make it
    a physical act that reminds you to relax and to listen rather than fret about
    what you don’t know. The new team isn’t going to trust you until you stop laying
    out your clothes, until you stop being deliberate.'
