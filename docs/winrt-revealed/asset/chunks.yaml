  trans: '

    # Facebook 的公开信与黑客精神的重要性


    Facebook 的公开信阐述了其核心价值观：聚焦影响力、快速行动、勇于突破、保持开放、创造社会价值。当我逐条阅读这些要点时，仿佛看到两位风格迥异的人坐在会议桌旁定义它们：一位是追求高影响力、快速行动、敢于突破的“野蛮人”，他对那位主张开放和创造社会价值的业务拓展人员毫不在意。


    这两种人对企业的蓬勃发展都至关重要，但只有其中一方真正明白黑客精神的重要性。


    ## 迪特尔去哪了？


    苹果公司通过隐藏的方式来化解破坏性黑客问题，而这始于一个提问：


    “迪特尔去哪了？”


    “他调到另一个项目了。”


    “呃，他还有 32 个未解决的雷达（bug 报告），而我们距离‘功能完善’节点只剩两周了。”


    “他调到另一个项目了。”


    “好吧，什么项目？”


    “我不知道。”


    这一切悄无声息地发生，但那些可能对公司最具颠覆性的项目正是在沉默中起步的。某处有个人灵光一闪，少数才华横溢的工程师便被悄然带到另一栋大楼的一扇紧锁的门后。他们的状态是“在其他地方”，他们的项目属于“需要才知情”。


    我从未亲身参与过这类项目，只能推测其运作方式，但当你看到成果时便能确定——这些优秀的成员正在践行黑客精神。他们的项目堪称野心的代名词，你从未听过他们的名字，团队规模小、行动迅速，并且在自己公司内部反而像个“局外人”。听着耳熟吗？


    不过，我认为这些秘密项目并非完全为了预防颠覆；其中包含着很大的营销成分。史蒂夫·乔布斯的回归也标志着营销的回归，将项目保密与其说是为了保密本身，不如说是为了营销。史蒂夫希望成为那个站在全世界面前第一个讲述故事的人：“你们绝对不敢相信我们干了什么。”


    诚然，在公司内部，对于那些施展魔法、创造出 iPad、iPhone 和 Apple TV 等产品的团队，嫉妒是存在的。有人会在心里嘀咕：“为什么没邀请我去参与黑客项目？”是的，这确实滋生了一些精英主义，但无论好坏，保密措施让这类讨论远离了主流视野。


    苹果的秘密项目正是制度化的黑客精神。它们是“别处”所在，那里的工程师无需担心自己成为“野蛮人”，因为所有人都明白黑客精神的重要性。


    ## 无意间忘却了初心


    每家公司的历史都始于一次巧妙的黑客行动。随便选一家公司，翻看它的历史，我敢说一定能找到一个记载详尽的创始故事，它定义了公司的起点，通常涉及某人创造了某种新事物，并可能带来了意想不到的价值。而没有被记载的，是这一切发生之前的每一个瞬间：当黑客身边的每个人都在问“你到底为什么要那么做？”、“为什么冒这么大的风险去换那么少的回报？”或者“你为什么在浪费时间？”时的情景。没有被记载的，是那位黑客在获得一次成功之前，所经历的九次轰轰烈烈的失败。


    那些在黑客行动初步成功之后才加入公司的、怀着善意的人们，并不了解没有黑客行动的世界是什么样子。他们理所当然地认为成功是自然存在的，其职责是围绕它来发展公司。请别以为我不重视这些人——因为我碰巧就是其中之一——但我同样深切地意识到，发展公司的人和创立公司的人并非同一类人。


    一个健康的产品型企业，矛盾之处在于它自身充满了张力。它拥有一个健康的部分，致力于规范化、创造可预见性；但它还需要另一个部分，负责创造能够颠覆并最终摧毁这种规范性的新生事物。


    如果不能创造某种形式的可预见性，就会导致混乱。如果不能在内部创造某种得到良好管理的“野蛮混乱”，那就必然会有公司外部某个行动迅速、野心勃勃、敢于冒险、冷酷无情的人闯进来——因为他们深知你所遗忘的道理：黑客精神至关重要。


    ---


    ¹ 乔纳森·韦伯，“野蛮人卡恩”，《洛杉矶时报》，1992 年 2 月 23 日（[`articles.latimes.com/1992-02-23/business/fi-5118_1_borland-international-chairman-philippe-kahn`](http://articles.latimes.com/1992-02-23/business/fi-5118_1_borland-international-chairman-philippe-kahn)）。


    ² [`blogs.wsj.com/deals/2012/02/01/mark-zuckerbergs-letter-from-the-facebook-filing/`](http://blogs.wsj.com/deals/2012/02/01/mark-zuckerbergs-letter-from-the-facebook-filing/)


    # 第三部分：各种版本的你


    你的团队由一群独特的个体组成，他们显然不是你。是的，你们在同一个团队，或许拥有相同的职业目标，但在细节上，你们每个人各不相同。


    本节从一个关于维系健康团队可能最重要的教训开始：人闲则走。之后，我会深入探讨技术极客的思维模式与习惯，然后，嗯，我会开始给别人起外号，这种行为我需要解释一下。


    大多数章节标题在文章动笔之前就出现在我脑海里了。这可能是因为我许多写作的灵感都来自于开车上下班时喝咖啡带来的兴奋状态，而且我无法在停好车到坐到键盘前这段时间内，完全记住自己那意识流般的、漫无边际的思绪。


    所以我先起个名字。


    这个名字必须具有很好的描述性，因为我需要仅凭想到它，就能回忆起 30 分钟的思路漫游。


    这最后一节充满了这类名字。向内型、向外型、有机型、NADD、自由电子、领头羊、渐进主义者……我显然有爱给人起外号的问题。但这些名字不仅仅是方便的记忆工具，它们是我多年坐在会议桌旁，观察并标记那些看似迥异之人身上的相似点所得到的最终成果。


    这些名字并非旨在描绘它们所描述之人的完整画像。它们仅仅是为你提供一个出发点，去理解你的特定对象到底是怎么回事。实际上，你团队里的“自由电子”可能同时也是一个“有机完成主义者”。现实中，人是很复杂的。


    虽然我很乐意为你提供一个初步的思维草图，用以识别你团队和公司中的成员，但你的工作并未止步于此。你的任务不是通过给他们起外号来孤立他们，而是要通过花时间了解他们的需求，并尽力满足他们，从而将他们凝聚起来。


    你需要记住，每个人都是稍微不同版本的你。


    最后，本节以及本书的结尾部分会显得有些自私。最后几章将带你走过一个职业上的必然——如何为你的下一份工作做好准备，以及如何善待你将要离开的工作岗位。


    ## 章节：人闲则走


    关于员工激励和留任的问题，已有诸多论述。这些论述通常出自那些喜欢使用“激励”和“留任”这类词汇的人之口，但他们对于日常工作中如何让你的团队保持职业满足感并无头绪，因为他们要么从未做过这份工作，要么早已忘了该怎么做。正是这些人，在你团队里最优秀的那位工程师不经意地宣布“我要辞职了，我要加入好朋友的初创公司。这是我的两周离职通知”时，才会现身。


    你召唤来“激励与留任警察”，因为你相信他们能上演传说中的“救场”。无论是人力资源部门，还是某个头衔显赫、用意良好的经理，这些人都能令人印象深刻地忙碌起来。他们会立刻与这位心灰意冷的员工安排会议，一开就是深夜。


    这是一场令人印象深刻的实力展示，有时也的确奏效，但即便员工留下来了，伤害已经造成。他们已经“离职”了，当一个人选择离职，他实际上是在说：“我不再相信这家公司了。”更糟糕的是，他最初的念头其实是：“我太无聊了。”


    无聊，比失去信念更容易解决。


    ## 如何发现无聊

