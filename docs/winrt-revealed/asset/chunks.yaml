  trans: '

    # 兰兹测试


    当 Borland 公司首次裁员时，我已在质量保证岗位工作两年。我不记得当时曾困惑裁员是什么，也不记得曾担心是否会失去工作。我记忆犹新的是，应用部门的高级副总裁在楼内巡视一圈，召集产品团队，然后就在走廊里直截了当地向我们说明了裁员的情况：这次裁员是怎么回事，哪些人受到影响，以及何时执行。此前我从未与副总裁罗布打过交道，事后想来，后来也再未真正与他交流过。但我至今对这位老兄心存好感——因为在压力时刻，他选择了坦陈真相，而非含糊其辞。


    一个成功的组织是由被管理者粘合在一起的层层人员构建而成。每一层负责一项广义任务，无论是工程、QA 还是市场营销。层与层之间，管理者扮演着翻译角色——在上下层之间双向传译。他了解下属的诉求，也明白上级的期望，并能在这两者出现分歧时成功斡旋。


    他之所以能游刃有余，是因为掌握了两个问题的答案。问题一：我从哪里来？能够与下属产生共鸣，源于对其工作的深刻理解，这让你能与他们说同一种语言。问题二：我要去哪里？为上司规划下一步重大行动就是对他的激励。这会让他处于不安的境地，努力分辨公司主要影响者那难以捉摸的政治动机。这或许不是他与生俱来的技能，但他绝不会停止尝试——因为他清楚自己的目标方向。他有一张由自身动力绘制的地图。


    你为何要在意老板想成为软件副总裁？因为他的成功就是你的成功。如果他不懂得这个道理，那他可能是个糟糕的上司。


    # 兰兹测试


    要从乔尔·斯波尔斯基的作品中挑选出最佳之作并非易事，但如果非要选，我会选择《乔尔测试：提升代码质量的 12 个步骤》。^(1) 这是他本人那份极其不负责任、草率的软件质量评估测试，每当有人问我团队出了什么问题，我通常都会先让他们看看这个测试。*从这里开始*。


    这是一个包含 12 项要点的测试，正如乔尔所说："12 分是满分，11 分尚可接受，但 10 分或更低则意味着存在严重问题。"比这些要点更重要的是，他的测试清晰地记录了我认为工程团队应具备的健康特质，但还有一些其他要点可以补充。因此，我推出兰兹测试完全是对乔尔的致敬。


    我曾在第一家任职的初创公司担任第 20 号员工，也是首位工程主管。两年间，团队和公司迅速扩张至近 200 名员工。正是在这时我发现，快速增长只会让你深刻理解一件事：沟通如何不断以新奇而有趣的方式分崩离析。核心问题在于那些资历较深、往往也肩负更多责任的老员工。在他们看来，过去那种自然的沟通方式，在团队规模每次翻倍后，依然会保持高效简洁。


    但事实并非如此。不断壮大的团队需要持续投入新的方法，来了解集体的想法，以便任何人在任何地方都能回答这个问题："到底发生了什么？"这正是兰兹测试回答的第一个问题。稍后我会解释，兰兹测试帮你回答的第二个问题则带有私心，它问的是："我在哪里？"


    ## 兰兹测试：11 项评分要点


    我们先列出这些问题的简要版本，然后逐一解释。


    -   你是否有一对一会议？

    -   你是否召开团队会议？

    -   你有状态报告吗？

    -   你能对老板说"不"吗？

    -   你能向陌生人解释公司战略吗？

    -   你能说明当前的业务状况吗？

    -   负责人是否定期站在众人面前，告诉你他/她在想什么？你信服吗？

    -   你知道自己下一步想做什么吗？你的老板知道吗？

    -   你有时间进行战略思考吗？

    -   你正在积极扼杀"小道消息"吗？


    ---


    ![images](img/sq.jpg)**注** 虽然我会从领导者或管理者的角度解释每个要点，但这些问题和解释同样适用于个人。


    ---


    ### 你是否有规律的一对一会议，且谈论的是状态更新之外的话题？（+1 分）


    我认为很难找到认为一对一会议是坏主意的人，但一对一会议通常是情况紧急时第一个被重新安排的会面。我的观点是，当事情乱成一团时，你最不应该做的就是推迟与那些要么是麻烦制造者、要么最有能力防止未来麻烦的人的一对一会议。


    此外，正如我在第 6 章《更新、宣泄与灾难》中所写，传达状态并非一对一会议的目的；目的是进行一场关于实质内容的对话。状态可以作为引子，可以框定对话范围，但状态本身不是重点。健康的一对一会议需要具有战略性，而不是重复那些轻易就能从别处获取的战术、状态和数据。


    一对一会议是对构成团队的个人进行的每周投资。如果你的一对一会议时断时续，或未能使之成为有价值的对话，那你只是在强化管理者脱离群众这个刻板印象。


    ### 你是否有规律的团队会议？（+1 分）


    团队会议具备一对一会议的所有要求——规律性以及关注实质话题——但先别急着给自己加分。


    状态在团队会议中扮演着更重要的角色。稍后会谈到，"小道消息"是个强大的怪物，而团队会议正是扼杀其传播消息的机会。我在所有团队会议中都设置了一个固定议程项，名为"八卦、谣言与谎言"，当讨论到这一项时，就是让团队每个成员分辨什么是真相、什么是谎言的机会。


    做完这些之后，我对团队会议的另一个衡量标准是：我们是否在某件事上取得了实质性的进展？我不知道你具体做什么，所以我不清楚你的团队哪里出了问题，但我肯定知道一定有问题存在，而团队会议正是发现问题的绝佳场所，也是开始讨论如何解决问题的起点。


    如果你能在团队会议中消除谎言、修复问题，那就给自己加一分。


    ### 是否每周通过邮件发送手写状态报告？（-1 分）


    如果是，你将被扣一分。这份检查清单的部分目的是评估信息在公司内的流动方式，而这一项是第二个可能实际扣分的项目。我为什么如此讨厌状态汇报？我并不讨厌状态本身，我讨厌的是状态报告。


    我的观点是，基于邮件的状态报告是管理无能且懒惰的最明显、最确凿的迹象之一。总会有冠冕堂皇的理由要求你每周生成这些邮件。*我们规模足够大，需要交叉交流。只需占用你
    15 分钟时间。*


    胡说。僵化的、基于邮件的状态报告的存在，说到底是为了控制、缺乏想象力以及对组织缺乏信任。

    '
- fmt: '# 关于协作工具与工作沟通的思考


    我想请你数一数，在日常工作中，你每天需要使用多少种协作工具——不包括电子邮件。如果你是一名软件工程师，我猜这些工具包括版本控制、缺陷跟踪、维基、客户关系管理（CRM）和/或项目管理软件的某种组合。所有这些工具已经自动生成了大量关于每周具体进展的状态信息。


    当有人——我的老板或比我职位高的人——要求我提交状态报告时，我的第一个想法是：“我已经在这些不同的工具中生成了成堆的状态信息；为什么不去直接查看它们呢？”


    *这些工具中确实存在大量噪声。*


    那么，编写一份报告，剔除这些噪声——协作工具本身就是围绕报告构建的。状态信息就在那里。哪本管理教材上写着，把搞清楚状况的任务分派给正在执行工作的人是一个好主意？这，怎么说呢，是你的工作。


    *嗯，我真正想要的是你对本周的高层评估：三件顺利的事，三件不顺利的事，以及我们打算如何处理。*


    好，这下说到点子上了。我可以做一份本周的战略评估，但为什么不直接把它放在一对一会议的开头呢？这样当你有疑问时（而且你肯定会有），我们可以进行一场深入的辩论。


    *但我希望有一份记录，方便以后回顾。*


    太好了，请随意记录我们讨论的任何内容。


    是的，状态报告对我来说是一个敏感话题。我写过数百份这样的报告，每次开始写的时候，我都会想：“为什么我总觉得这是在干一件毫无必要的事？”状态报告的出现，通常是因为某位高层管理者觉得自己对组织内的某个部分缺乏了解，他们认为让每个人都高效地记录自己的一周会有所帮助。但事实并非如此。通过邮件发送的状态报告，对90%撰写它的人来说，传达了一个信息：“你不重视我的时间。”这引出了我的下一个观点……


    ## 你能坦然地对老板说“不”吗？（+1）


    也许更好的表述方式是：你是否觉得，你和老板的一对一会议，与你本周参加的其他所有会议有些不同？健康沟通结构的一部分是，信息能够在团队、组织和公司内部顺畅流动。如果你走进与老板的会议时，总是表现得无可挑剔，不愿畅所欲言，那么我认为有些东西出了问题。


    是的，他是你的老板，这意味着他负责你的年度评估，并能影响你的职业发展轨迹。但是，当他开口说了一些真正荒谬、不合逻辑的话时，你作为公司股东，你的契约义务就是举手说：“这很愚蠢。原因如下……”


    *说起来容易做起来难，兰兹。*


    好吧，别说“愚蠢”。


    我的看法是这样的。我认为，那些自以为从不犯错的领导者，会慢慢被“犯错是软弱的表现”这一谎言所催生的权力逼疯。我也会搞砸——很可能是经常性的——而我从事各种形式的这份工作已经20年了。虽然当我发现自己的错误，或者别人指出我的错误时，仍然会感到刺痛，但我宁愿承认自己搞砸了，因为这样我就能更快地搞清楚自己到底哪里做错了，而这始于有人说了“不”。


    ## 你能向陌生人解释公司的战略吗？（+1）


    抛开沟通不谈，这一点关乎战略和全局观。如果我在酒吧里走到你面前，问你的公司是做什么的，你能轻松而清晰地解释其战略吗？


    这是第一个能证明你脑中是否对公司有一张清晰地图的点，而你可能会低估这张地图的价值。如果你是领导层，你可能很容易画出这张地图。如果你是普通员工，你可能会认为这张地图是别人的责任——你只说对了一半：定义地图确实是别人的工作，但理解它并以此衡量工作，则完全是你的责任。'
  raw: 'I want you to count the number of collaboration tools you use on a daily basis
    to do your job—not including e-mail. If you’re a software engineer, I’m guessing
    it’s a combination of version control, bug tracking, wikis, CRM, and/or project
    management software. All of these tools already automatically generate a significant
    amount of status regarding what has tactically gone down each week.


    When someone—my boss or someone who outranks me—asks for a status report, my first
    thought is, “I’m already generating piles of status on these

    various tools; why not just look at those?”


    *Well, there’s a lot of noise in those tools.* So write a report that takes out
    the noise—collaboration tools are built around reporting. The status information
    is out there. In what managerial textbook does it say it’s a good idea to distribute
    the task of figuring out what is going on to the people who are performing the
    work? That’s, like, your job.


    *Well, what I really want is your high-level assessment of the week. Three things
    that are working, three things that aren’t, and what we’re going to do about it.*
    OK, now we’re talking. I can do a strategic assessment of the week, but why don’t
    we just put that at the beginning of the one-on-one? That way when you have questions

    (and you will), we can have a big fat debate.


    *But I’d like to have a record I can review later.* Super, feel free to write
    down

    anything we talk about.


    Yes, status reports are a hot button for me. I’ve written hundreds of them and
    each time I’ve begun one, I start by thinking, “Why in the world do I feel like
    I’m performing an unnecessary act?” Status reports usually show up because a distant
    executive feels out of touch with part of his or her organization, and they believe
    getting everyone to efficiently document their week is going to help. It doesn’t.
    E-mailed status reports say one thing to 90 percent of the people who write them:
    “You don’t value my time.” This leads me to my next point …


    Are you comfortable saying no to your boss? (+1)


    Perhaps a better way to phrase this point is, Do you feel your one-on-one with
    your boss is somehow different than every other meeting you have during the week?
    Part of healthy communication structure is when information moves easily around
    the team, organization, and company, and if you walk into a meeting with your
    boss always on your best behavior and unwilling to speak your mind,

    I say something is broken.


    Yes, he is your boss, and that means he writes your annual review and can affect
    the trajectory of your career, but when he opens his mouth and says something
    truly and legitimately stupid, your contractual obligation as a shareholder of
    the company is to raise your hand and say, “That’s stupid. Here’s why …”


    *Easier said than done, Rands.*


    OK, don’t say it’s “stupid.”


    Here’s the deal. I believe that leaders who think they’re infallible slowly go
    insane with power created by the lie that being wrong is a sign of weakness. I
    screw up—likely regularly—and I’ve been doing various forms of this gig for 20 years.
    While it still stings when I stumble upon or others point out my screw-ups, I’d
    sooner I admit I fucked up, because then I can figure out what I really did wrong
    faster, and that starts with someone saying no.


    Can you explain the strategy of your company to a stranger? (+1)


    Moving away from communications, this point is about strategy and context. If
    I were to walk up to you in a bar and ask what your company did, could you easily
    and clearly explain the strategy?


    This is the first point that demonstrates whether you have a clear map of the
    company in your head, and you might be underestimating the value of this map.
    If you’re a leadership type, chances are you can draw this map easily. If you’re
    an individual, you might think this map is someone else’s responsibility, and
    you’d be partially correct: it is someone else’s job to define the map, but it’s
    entirely your responsibility to understand it so you can measure it.'
