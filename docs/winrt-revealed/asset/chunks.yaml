- fmt: '以下是按照您的要求排版后的 Markdown 文档：


    As you’ll see with the following questions, the Rands Test isn’t just about understanding
    communications, it’s about understanding context and strategy. How do you think
    the employees of HP and Netflix feel given the strategy flip-flops recently? Safe
    or suspicious? Let’s keep going …


    ### Can you tell me with some accuracy the state of the business? (Or could you
    go to someone somewhere and figure it out right now?) (+1)


    It’s a brutal exaggeration, but I think you should independently judge your company
    the same way that Wall Street does: your company is either growing or dying. Have
    you ever watched the stock price of a publicly traded company the day after they
    announce that they are going to miss their earnings numbers? More often than not,
    no matter what spin the executives have, the stock is hammered. It’s irrational,
    but what I infer when I see this happen is that Wall Street believes the company
    has begun a death cycle. If the executives can’t successfully predict the state
    of their business, something is wrong.


    I realize this isn’t fair, and there are myriad factors that contribute to the
    health of the business every single day, and I encourage you to research and understand
    as many of those as possible. But when you’re done, I’d also like you to have
    a defensible opinion regarding the state of the business, or at least a set of
    others whose opinions you trust.


    This is a picture that you are constantly building, and this is an easier task
    if you’ve given yourself a point on the prior question regarding company strategy.
    If you have a map of what the company intends to do, it’s easier to understand
    whether or not it’s doing it. This leads us to …


    ### Is there a regular meeting where the guy/gal in charge gets up in front of
    everyone and tells you what he/she is thinking? (+1) And are you buying it? (+1)


    My previous point regarding context involves the person in charge. In rapidly
    growing teams and companies, there’s a lot going on—every single day. When the
    team was small, the distribution of information was easy and low-cost because
    everyone was within shouting distance. At size, this communication becomes more
    costly at the edges. Directors, leads, and managers—these folks tend to stay close
    to current events because it’s increasingly their job, but it’s also their job
    to take steps to keep the information flowing, and it starts with the CEO.


    On a regular basis, does your CEO stand up and give you his impressions of what
    the hell is going on? Whether it’s 10 or 10,000 of you, this is an essential meeting
    that


    * Gives everyone access to the CEO

    * Allows him/her to explain their vision for the company

    * Hopefully allows anyone to stand up and ask a question


    If the value of this meeting isn’t immediately obvious to you, I’d suggest that
    you are one of those lucky people who already has a good map of the company, as
    well as a sense of the state of the business. That’s awesome—here’s a bonus point
    for you: does the CEO’s version of the truth match yours, or is he/she in a high
    Earth orbit with little clue what is actually going on? Give yourself a point
    if it’s the former, and if it’s the latter, what does that say about the state
    of the business? Growing or dying?


    ### Can you explain your career trajectory? (+1) Bonus: Can your boss? (+1)


    Next, switching gears a bit, give yourself a point if you—right this very moment—can
    tell me your next move. You’re already doing something, so explain what you’re
    going to do next. It’s a simple statement, not a grand plan. “One day, I’d like
    to lead a team.”


    Part of a healthy organization isn’t just that information is freely moving around;
    it’s what the folks receiving and retransmitting it are doing with it. You’re
    going to mentally file and ignore a majority of this information, but every so
    often a piece of information will come up in a one-on-one, a meeting, or a random
    hallway conversation, and it will be immediately strategically useful for you
    to know what you want to do next.


    * Angela got a promotion and her team is great, and I’ve always wanted to be a
    manager.

    * Jan just opened a requisition, and his group is working on technology I need
    to learn.

    * They fired Frank. That creates a very interesting power vacuum …


    You can argue that even without a plan you’d make the same opportunistic leap,
    but I’ve found that having a map is usually a better way of getting to a destination.


    There’s a bonus point here as well. Does your boss know what you want to do next?
    She likely has even more access to the information moving around the company,
    and whether she likes it or not, she has equal responsibility to figure out how
    to get you from here to there.


    ### Do you have well-defined and protected time to be strategic? (+1)


    If you gave yourself two points on the prior question, congratulations; I think
    you’re in better shape than most, but there’s one more point. Are you making progress
    toward this goal? Can you point to time on your calendar or even just in your
    head where you are growing toward your goal?


    I like being busy. Like really busy. Like getting in, grabbing a cup of coffee,
    and suddenly finding the coffee is cold, it’s 6:00 p.m., and I forgot to eat busy.
    Busy feels great, but busy is usually tactical, not strategic. This is why I’m
    constantly maintaining my Trickle List—it’s my daily reminder of doing work that
    is larger than right now.


    If you have time in which you’re investing in yourself while at work, and your
    boss is cool with it—give yourself a point.


    ### Are you actively killing the Grapevine? (+1)


    When Grace walks in your office, you know she knows something by the look on her
    face. She moves to the corner of the office and starts with, “Did you hear … ?”
    and the story continues. It’s a doozy, full of corporate and political intrigue,
    resulting in your inevitable response: “No. Way.”


    Being part of a secret feels powerful. In a moment, the organization reveals a
    previously hidden part of itself, and in that moment you feel you can see more
    of the game board. *So, that’s why they fired him. I was wondering.* Grace finishes
    with the familiar, “Don’t tell anyone,” which is ironic since that’s precisely
    what was asked of her 15 minutes ago.


    There is absolutely no way you’re going to prevent folks from randomly talking
    to each other about every bright-and-shiny thing that’s going on in your company.
    In fact, you want to encourage it. One-on-ones and meetings are only going to
    get you so far. The thing you can change is the quality of the information that’s
    wandering around the company.


    In the absence of information, people make shit up. Worse, if they at all feel
    threatened, they make shit up that amplifies their worst fears. This is where
    those absolutely crazy rumors come from. See, Kristof is worried about losing
    his job, so he’s making up crazy conspiracy theories that explain why *the man
    is out to get him*.


    Without active prevention, the Grapevine can be stronger than any individual.
    While you can’t kill the Grapevine, you can dubiously stare at it when it shows
    up on your doorstep and simply ask the person delivering it, “Do you actually
    believe this nonsense? Do you believe the person who fed you this trash?” Rumors
    hate to justify themselves, so give yourself a point if you make it a point to
    kill gossip.


    ### Magnitude and Direction


    There is a higher-order goal at the intersection of these two questions on the
    Rands Test: *Where am I?* and *What the hell is going on?* While understanding
    the answers to these questions will give you a good idea about the communication
    health of your company, the higher order goal is selfish. I’ll explain.'
