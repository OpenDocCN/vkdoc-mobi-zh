- fmt: '# 排版后的内容


    除了之前未发现的工作之外，每天来自令人筋疲力尽之人的一系列干扰也会让工程师脱离工作。随机会议、电话、面试。这些持续30到60分钟的任务看起来短暂且事务性，你无法完全将团队成员从中抽离，但你可以管理它们。与垃圾工作类似，你的工作是公平地将日常噪音的负担分散到整个团队。更重要的是，你需要记住，围绕这些微任务的效率成本不仅涉及完成它们所需的30分钟，还包括上下文切换的代价——停下手中的工作、为任务做准备、执行任务，然后重建关于他们真正关心的工作的上下文。


    有趣的工作有两个方面同样能激发极客的大脑：识别有趣的工作，并在此工作上取得进展。而进步不是以中断驱动的分钟来衡量的，而是以大量、美妙的不被打断的小时来衡量的。


    ## 告诉他们到底发生了什么


    上述大部分活动都暗示着你正在关注，但你的关注只是解决方案的一半。另一半是定期向团队通报你的想法。作为一种低成本的保持团队满意的方法，简单地说一句“我知道你想去哪里，我正想着如何帮你到达那里”就是一种展示你关心团队成长的方式。


    ## 不要忘记构建东西是什么感觉


    这篇文章可能读起来像是认为工程是一种特权工匠阶层，而且我过度保护，而*这恰恰是我所相信的*。我的职责是照顾和培养工程师，他们的生产力就是我的生产力。如果他们全部离开，我就完全没有工作了。


    作为领导者，你的部分可信度在于你公开且反复声明你的工作是帮助团队成功，但你还有另一项任务：你需要继续构建东西。


    关于管理者是否应该编码，我一直犹豫不决，我的观点是：*不要停止编码*。每周如果不能分享软件开发中的喜悦、绝望和发现，你就慢慢忘记了作为一名软件开发者的意义。随着时间的推移，你会越来越难以与工程师交流，因为你会忘记他们是如何思考，以及他们如何感到无聊。


    # 章节


    ## 风向标


    首先，不要自欺欺人。招聘任何人都是有风险的。谷歌以其对候选人进行的严格且漫长的审查而闻名。谷歌的面试可能很激烈，但当他们决定录用时，他们也是在掷骰子。


    在几个月内，你都不会真正了解你招进来的人。


    这并不意味着你不能提高胜算。


    对我来说，面试的成功在于从候选人那里提取尽可能多的信息。这不是因为你有一套引人注目的面试问题；而是因为你会让一组风格迥异的面试官去面对候选人。通过这些人的多样化视角，他们能找到你做出录用决定所需的最佳信息。


    ### 核心面试团队


    需要让候选人见两个关键小组。第一个小组应该是显而易见的，但常常被搞砸。团队中的每个人都必须面试每一位候选人。我要重复一遍，因为脾气暴躁的工程师戴夫一直告诉你他对面试不感兴趣，但他必须出现在名单上。每一次。


    面试是一项团队运动，未能获取每个人对候选人的看法，不仅会错失收集某些随机观点的机会，而且在戴夫被豁免时，还会向团队传递一个隐含信息。这个信息是：“戴夫的意见无关紧要。”现在，把这个信息与你应该问自己的问题结合起来——“为什么戴夫不关心他可能共事的人？”——你就有充分的理由坚持要求团队中的每个人都面试候选人。


    另一个关键的面试小组则更为棘手。这是你信任的首选面试官团队。他们是你的*风向标*，当他们给候选人投反对票时，一切就结束了。


    你的风向标团队是你能收集到最多视角的地方。同事的面试会发现一些信息宝藏，他们的意见会极大地影响你的录用决定，但风向标是你的恒定标准。当他们告诉你“这家伙将改变你的团队面貌”时，你相信他们，因为他们很少出错。


    我为每次面试都设置了三个关键的风向标。


    #### 技术


    在软件开发中，这是最需要评估的技能，但也是最常被评估得最差的技能。工程师擅长技术，但不擅长社交。这意味着团队中最好的工程师很可能就是最差的技术面试官，因为他在与人打交道时感到不自在。这意味着当你派他去判断你的候选人是否了解数据库规范化时，他会比候选人更紧张，难以提出一个硬核的技术问题。


    找一个技术硬茬。


    是的，关于沟通风格、愿景和个性有很多有价值的东西需要了解，但如果你是一个工程经理，却无法评估技术能力，那你就完蛋了。你最终会招到能说会道但不会写代码的QA人员。哎呀。


    找到你的技术风向标很容易。你面试时，谁在技术上让你吓得够呛？如果你是个管理者，且面试时没有被问及技术问题，那就去其他工程团队转转，找到那个硬茬。他就在那里。他精通业务，并且毫不费力就能判断你的候选人是否也如此。


    #### 文化


    你的第二个风向标是文化方面的。他们需要评估候选人的两个方面。第一，团队文化契合度；第二，公司文化契合度。这涉及理解个性的模糊世界，这意味着找到你的文化风向标比找技术风向标更难，因为技术能力是可量化的。“是的，这家伙是C++大神。”下一个问题是，“好的，他是大神；他会不会因为神一样的表现而惹恼团队其他人？”


    文化契合度是团队契合度。理想情况下，你的团队目前是一个运行良好的单元，你的下一个招聘应该支持这个功能，而不是削弱它。


    你的文化风向标是团队中会告诉你“这家伙会加分，而不是减分”的那个人。你在寻找的风向标，是最能代表团队灵魂的那个人。这个人能够看透你的候选人。


    #### 愿景（战略还是战术？）


    你的最后一个风向标负责审查愿景。他们的工作是判断候选人的发展轨迹。他们是正在崛起的吗？他们想改变世界吗？他们是否为自己在技术领域开辟了一个安全的角落？我不知道你的团队需要什么样的人，但你知道，你需要弄清楚你正在招聘的人是战略型的还是战术型的。'
  raw: 'In addition to previously undiscovered work, a daily set of distractions courtesy
    of exhausting people will pull your engineer away from their work. Random meetings,
    phone calls, interviews. These 30- to 60-minute tasks feel transactional and brief,
    and there is no way you can fully remove a team member from them, but you manage
    them. Similar to crap work, it’s your job to evenly spread the load of daily noise
    across the team. More importantly, it’s your job to remember that productivity
    costs surrounding these microtasks don’t just involve the 30 minutes necessary
    to get them done, they include the context-switching tax involved in stopping
    their work, preparing for the task, doing the task, and then rebuilding the context
    regarding the work that floats their boat.


    There are two aspects of interesting work that equally fire up the nerd brain:
    the identification of interesting work and making progress on that work. And progress
    is not measured in interrupt-driven minutes; it’s blocks of delicious, uninterrupted
    hours.


    Tell them what the hell is going on


    Much of the above activity implies that you’re paying attention, but your attention
    is only half the solution. The other half is regularly keeping folks in the loop
    regarding your thoughts. In terms of a low-cost means of keeping your team content,
    the simple act of saying, “I know where you want to be and I’m thinking about
    how to get you there” is a way to demonstrate you care about the growth of your
    team.


    Don’t Forget What It’s Like to Build a Thing


    This piece might read like I believe that engineering is some privileged artisan
    class and that I’m overly protective, and *that is exactly what I believe*. My
    gig is the care and feeding of engineers, and their productivity is my productivity.
    If they all leave, I have exactly no job.


    Part of your credibility as a leader is your public and repeated declaration that
    it’s your job to help your team succeed, but you have another task: you need to
    keep building stuff.


    I’ve gone back and forth on whether managers should code, and my opinion is: *don’t
    stop coding*. Each week that passes where you don’t share the joy, despair, and
    discovery of software development is a week when you slowly forget what it means
    to be a software developer. Over time it means you’ll have a harder time talking
    to engineers because you’ll forget how they think and how they become bored.


    CHAPTER


    Bellwethers


    Let’s start by not deluding ourselves. Hiring anyone is a risk. Google is famous
    for the intense and lengthy scrutiny they put their candidates under. The Google
    interview might be intense, but when they decide to hire, they’re rolling the
    dice.


    You’re not going to know whom you hired for months.


    This doesn’t mean you can’t improve your odds.


    For me, success in an interview is extracting as much information as possible
    from the candidate. This doesn’t happen because you’ve got a compelling set of
    interview questions; it comes from throwing a wildly different set of interviewers
    at your candidate. What these people find, through their diversity of perspective,
    is the best information you can have to make a hiring decision.


    The Core Interview Team


    There are two key groups that need to be paraded by your candidate, and the first
    one should be obvious, but it’s often screwed up. Everyone on the team needs to
    interview every candidate. I’m going to repeat myself since Dave the Curmudgeon
    Engineer keeps telling you that he’s not interested in interviewing, but he’s
    got to be on the list. Every time.


    Interviewing is a team sport and failing to get everyone’s perspective regarding
    a candidate is not only a lost opportunity in terms of gathering some random piece
    of perspective, but it also sends an implied message to the team when Dave gets
    excused. The message is, “Dave’s opinion doesn’t matter.” Now combine that message
    with the question you should be asking yourself, “Why doesn’t Dave care about
    the people he might be working with?” and you’ve got more than enough reason to
    insist that everyone on the team interviews candidates.


    The other key interview group is trickier. This is your go-to set of interviewers
    that you trust. They are your *bellwethers*, and when they give a candidate a
    thumbs down, it’s over.


    Your bellwether team is where you gather the most perspective. The coworker interviews
    are going to find some informational gems, and their opinions will greatly affect
    your decision to hire, but bellwethers are your constant. When they tell you,
    “This guy is going to change the face of your team,” you believe them because
    they are rarely wrong.


    There are three key bellwethers I have for each interview.


    Technical


    In software development, this is the most obvious skill that needs to be assessed,
    but it’s also the one that is done the worst. Engineers are great at being technical,
    but they aren’t great at being social. This means that there’s a good chance the
    best engineer on the team might be the worst technical interviewer because he’s
    uncomfortable dealing with human beings. This means that when you send him in
    to figure out whether your candidate knows anything about database normalization,
    he’s going to be more nervous than the candidate about asking a hard technical
    question.


    Find a technical bully.


    Yes, there are lots of valuable things to learn about communication style, vision,
    and personality, but if you’re an engineering manager and you can’t assess technical
    ability, you’re screwed. You’re going to be hiring smooth-talking QA guys who
    don’t know how to code. Whoops.


    Finding your technical bellwether is easy. Who technically scared the hell out
    of you when you interviewed? If you’re a manager and didn’t get asked technical
    questions, go wandering around other engineering groups and find the bully. He’s
    there. He knows his stuff and has no issue with figuring out whether your candidate
    does as well.


    Cultural


    Your second bellwether is cultural. They’ve got two aspects of the candidate that
    they need to assess. First, cultural fit within the team, and second, cultural
    fit within the company. This gets into the fuzzy world of understanding personalities
    and that means it’s going to be easier to find your technical bellwether than
    your cultural one because technical ability is quantifiable. “Yes, this guy is
    a C++ god.” The next question is, “OK, so he’s a god; is he going to piss off
    the rest of the team by being godlike?”


    A cultural fit is a team fit. Ideally, your team is a functioning unit right now
    and your next hire should support that function rather than detract from it.


    Your cultural bellwether is the person on the team who is going to tell you, “This
    guy is going to add, not detract.” Who you’re looking for in your bellwether is
    the person who best represents the soul of the team. This is the person who can
    figure out your candidate.


    Vision (Strategic or Tactical?)


    Your last bellwether vets vision. Their job is to figure out the trajectory of
    the candidate. Are they up and coming? Do they want to change the world? Have
    they carved out a safe little corner of technology that is all theirs? I don’t
    know who you need on your team, but you do, and you need to know whether the person
    you’re hiring is strategic or tactical.'
