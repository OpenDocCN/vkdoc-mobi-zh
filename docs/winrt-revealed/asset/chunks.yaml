    impression is going to form … you can’t avoid it, but I’m asking you to ignore
    it for now. I’m going to distract you by proposing a model that you can use to
    look at your employees and begin to understand what exactly their career needs.
    The model is called Skill vs. Will.


    Skill vs. Will Plus Epiphanies


    It’s a simple graph. One axis is skill—how much skill does the employee have to
    do his job? Is he qualified? Overqualified? How long has he been doing it? When
    is the last time you know he learned something new? How quickly does he handle
    tasks compared to his peers?


    The other axis is will—this is where we measure the employee’s desire. Does she
    like her job? Really? Has she told you that? Is she viewed as energetic by her
    team? When is the last time she generated a great idea that blew your mind? Is
    she talking in meetings or listening? Is she *ever* talking? Is she *always* talking?


    This graph is not a precision instrument. It’s a tool to better define the impression
    you’re constructing of your employee. Once you’ve placed someone on the Skill/Will
    graph, you can begin to consider what your full-time job is—constantly and consistently
    pushing your employees to the upper-right quadrant. High skill (I’m good at what
    I do) and high will (I like what I do). This mental map is the first step in constructing
    a Fez-avoidance insurance policy.


    “Rands,” you ask, “um, what exactly am I pushing constantly and consistently?”


    Great question.


    Worst-case scenario: You’ve ignored everything I’ve said so far. You’re spending
    15 days rereading Fez’s review from last year. Then, you spend another 15 throwing
    together this year’s review by cutting and pasting the one and only review you
    wrote for all your employees, making it unique by inserting their full name and
    project name. Dear lord. You’ve really blown it.


    Yet, you haven’t fully blown it. A complete fuck-up is when you take this pathetic
    excuse for a review and present it. You say, “Employee 629, here is your review.
    You did this well, you did this poorly. Here’s your 2 percent increase and here’s
    your indecipherable objectives for next year. *Back to work.”*'
  trans: '

    # 成长之道：避免成为"菲斯"


    企业以惊人的效率裁减那些无法助力成长的员工。首先，有些员工一贯表现出缺乏能力或兴趣来推动成长。他们得到的奖赏是无人关心的无关项目。有些人觉得这种流放挺惬意："啊……再也不用火急火燎救火了……高管们根本不在乎这个项目，所以我混日子就行。"没错。他们不关心那个部门，因为它没有战略意义——这意味着一旦需要勒紧预算，那帮人就是第一批被干掉的。噗。欢迎失业。你吃一堑长一智了吗？也许你早该花点时间弄清楚`XML`代表什么。


    接下来是菲斯。他可能因为自己是唯一掌握某项特定技能或知识的人而变得自满。这是一种强有力的地位……暂时如此。


    也许高管们会因为他掌握关键知识而不敢解雇他，但我保证，那些依赖他那个黑箱知识的人正在策划一个阴险的计划来取代他和他的知识，因为**他们想要成长**。此时此刻，走廊那边的三个家伙已经用
    C 语言重写了菲斯的代码，并正在向感兴趣的人秘密展示他们的成果。他们在建立支持，在酝酿一场革命，他们不会停止，直到那个阻碍他们成长的人消失。


    无论是通过组织的进化还是革命，自满都是工作的杀手。如果你理解我的意思，你会觉得菲斯搞砸了。


    错。


    是我搞砸了。


    我的错误在于没有说服菲斯：成长就是生命。


    ## 年度评估，简而言之


    先说坏消息。解决菲斯问题没有灵丹妙药。解决菲斯问题需要策略、努力、灵感、运气，最后还需要一点时间。你不可能一下子解决，也不可能开一次会就解决。每年有一个方便的转折点，每个人都会对自己的职业生涯感到恐慌——年度评估。我打算围绕年度评估来构建这一章，但我不想让你认为做一次年度评估就能解决菲斯问题。如果你一年只操心一次职业发展，那你就惨了。正如你将看到的，避免成为菲斯是一项全职工作，但既然你有专门的时间来为员工发展而焦虑，为什么不以一种建设性的方式来焦虑呢？


    ## 他们真正在想什么


    人们确实在乎钱。当年度评估开始时，你的员工会仔细倾听你说的每一个字，仔细揣摩你的语气，心里琢磨：好评还是差评？如果听起来不错，那一定意味着钱；钱最棒了。如果听起来不好，他们就不再听了，开始预先在心里埋下怨恨，准备在接下来一个月里讨厌你，因为你显然**根本不知道**他们今年**在哪些地方创造了价值**。


    薪酬调整是每个人都关心的奖励，但真的有人知道它们是如何计算的吗？过去 365 天内发生了什么，才导致了**一笔意外之财**或**微不足道的零头**？


    如果你不能在清晰理解员工表现与他们的奖惩之间建立明确的联系，你只会给"管理者整天无所事事"的论调火上浇油。我们开始吧……


    ## 首先，整理你的想法，但先别思考


    事情是这样的。如果我此时此刻让你谈谈你身边那个特别的菲斯，你已经有强烈的看法了，但那只是当下的看法——来自你与菲斯最近的三次互动。虽然这些互动有关联，但它们几乎无法代表一整年工作的全貌。


    当你评估一名员工时，你需要对照他们的工作职责来评估，而不是他们过去两个月所做的工作。这很难，因为这是硅谷，没人记得两个月前发生了什么。Facebook 上市了，然后夏天，然后下一代
    iPhone，对吧？**Mountain Lion 发布了吗？我错过了什么重要的事吗？** 你很可能错过了，除非你以某种方式记录了下来。每个月，你的团队都会产出一些东西，而记录这些产出是你的工作。我怎么做呢？每个月花一小时，记下对团队过去
    30 天的反思。我脑海中浮现了什么？我们做了什么？谁表现突出？不要纠结于记录每一件事或谈论每一个人……只管写下来。即使你错过了某个团队成员的巨大贡献，在你当时记录想法的过程中，你会留下一个方便的思想书签。这个书签不仅记录了你写下的内容，还囊括了与之相关的所有其他事情。当你回过头去读去年夏天那条短得可怜的记录——*"这个月糟透了。没时间写。"*——你不仅会记起你当时正在经历一场苦役，还会记起
    QA 小伙子埃迪那个周末一直陪着你，哦对了，他每个周末都在，哇，我们为什么不提拔他？


    定期记录团队的工作快照，会构建起你对团队的印象，这是你在当下无法构建的，因为当下你正为早上没喝到咖啡而烦躁，为下周的产品评审而焦虑，还**别提我那 300
    封没读的邮件**。脑子里装着这么多破事，你怎么能对某人的表现形成客观的评价？你必须后退一步，深吸一口气，进行反思。


    当你坐在那里，盯着天花板，咀嚼着一整年的思绪时，一种整体印象会逐渐形成……你无法避免，但我现在请你暂时忽略它。我要用一个模型来转移你的注意力，你可以用它来审视你的员工，并开始理解他们真正的职业需求。这个模型叫做"技能与意愿"。


    ## 技能与意愿加上顿悟


    这是一个简单的图表。一个轴是技能——员工完成工作有多大技能？他是胜任还是大材小用？他做这份工作多久了？你最后一次知道他学了新东西是什么时候？与同事相比，他完成任务的速度有多快？


    另一个轴是意愿——我们在这里衡量员工的渴望。她喜欢自己的工作吗？真的吗？她告诉过你吗？她的团队认为她充满活力吗？她上次想出令你惊叹的好点子是什么时候？她在会议上是在说话还是在听？她**说过话吗**？她**总是在说话吗**？


    这张图不是精密仪器。它是一个工具，用来更好地定义你正在构建的员工印象。一旦你把某人放在"技能/意愿"图表上，你就可以开始思考你的全职工作是什么——持续不断地将你的员工推向右上角。高技能（我擅长我的工作）和高意愿（我喜欢我的工作）。这个思维导图是构建"避免成为菲斯"保险策略的第一步。


    *"兰兹，"* 你问，*"嗯，我到底要持续不断地推动什么？"*


    好问题。


    ## 最坏情况


    最坏情况：你完全无视了我到目前为止说的所有话。你花了 15 天重读菲斯去年的评估。然后又花了 15 天拼凑今年的评估，方法是剪切粘贴你为所有员工写的那唯一一份评估，然后用插入他们的全名和项目名的方式让它看起来独一无二。天哪。你真的是搞砸了。


    然而，你还没完全搞砸。彻底的搞砸是，你拿着这份可悲的评估，把它呈现出来。你说：*"员工 629 号，这是你的评估。你这里做得好，那里做得差。这是你 2%的加薪，这是你明年那些莫名其妙的考核目标。回去工作吧。"*

    '
- fmt: '# 关于“Fez”的管理思考


    你得到每一个你应得的“Fez”。请停止阅读，收拾好你的东西，安静地离开硅谷。谢谢。


    如果你花了一些时间反思过去整整一年，如果你根据技能和意愿绘制了你员工的情况，你可能已经对“Fez”有了某种顿悟。你意识到，“哇，他太无聊了”，或者“她真的不知道如何设计软件”。很好，一个顿悟……这是一个开始，但不是一个结束。


    你并不是那个需要拥有顿悟的人。是你的员工需要它。


    我将通过真实的虚构人物“Fez”来解释。回想一下，你会把他放在技能/意愿图的哪个位置？你的直觉可能会说，他工作了很多年，所以技能很高，他只是无聊，所以意愿很低。


    想法不错，但你没有我拥有的那12个月的虚构笔记。你看，Fez的技能曾经很高，但它正在衰退。现在处于中游水平，缓慢的侵蚀也影响了他的信心……他的意愿。他日益减少的技能正在削弱他的意愿，这反过来又进一步削弱了他的技能，因为他毫无信心去获取新技能。哎呀。一个技能/意愿的负反馈循环。你没想到这一点吧？


    这里有积极的一面。正如技能和意愿一起衰退一样，它们也会一起提升。如果你专注于其中一个，你通常也会解决另一个。这是一个绝妙的管理二合一方案。


    回到Fez。假设你的顿悟是让Fez接受一些技术培训。送他去上C++课程，然后“砰”的一声，他就会开心起来。“快”，把它写下来作为一个目标，因为“哇”，你真的解决了Fez的问题。


    别急，急切的经理。慢下来。


    ## 主张，简而言之


    我有一个任务给你，我会用两种不同的方式来问你。你告诉我你实际上会执行哪个请求：


    *   **请求#1：** 你——去修复那个Bug。

    *   **请求#2：** 嘿，你能看一下Bug #1837吗？


    这两个请求之间的区别是一种管理风格，它出现在每一个性格测试中。你，经理先生，要么是“请求式坚定”，意味着你通过请求来完成工作；要么是“命令式坚定”，意味着你通过命令来取得进展。


    有很多富有魅力的领导者通过仅仅命令别人做什么而赚取了数十亿美元。我不是其中之一。并不是我害怕冲突，或者没有我成为独断专行者的时候，仅仅是我讨厌被别人命令，所以我以自己希望被对待的方式对待他人。


    在没有让你的Fez相信问题存在的情况下，告诉他问题是什么，无异于一次人身攻击。“你，Fez，工作表现很差，我已经决定目标X、Y和Z是拯救你工作的唯一方法。”


    我为了举例而夸张，但我有超过十五年的绩效评估经验，我有过一些非常出色的经理，他们把一次评估变成了一场关于我的独白，而没有让我参与其中。好吧，我碰巧是研究我自己的专家，那么请让我参与讨论好吗？


    年度评估是一场讨论，而不是一场独白。讨论的目标首先是同意评估大致准确。记住，你因为截止日期，已经思考评估好几周了。Fez是第一次看到它，他需要时间去消化。当你的经理直盯着你问“有什么问题吗？”时，要保持思维敏捷是非常困难的。当他刚刚告诉你过去一年你搞砸了的时候，这就加倍困难。


    经验法则：如果你要传达重大的坏消息，安排两次会议。在第一次会议上，你呈现评估，而不是目标。他们会想知道薪酬问题，你也会想说，但别说。你说“没有加薪”的那一刻，评估就结束了，员工很生气，你会处于防守状态。会议变成了一场心理战斗，而战斗只能证明谁更能打。


    在第二次会议上，所有相关的人都有时间消化了评估。你可以讨论目标，因为Fez前一晚开车回家时就在想：“我的经理告诉我我正在变得过时，我强烈不同意这一点……但……也许他说的话有些道理……嗯……”


    只要稍微同意评估是公平的，再加上你和你的Fez就他在技能/意愿图上的位置达成一致，你就可以开始讨论目标了。我们能做些什么来提高技能或意愿？新工作？新任务？培训？也许把他从那个悲观者的团队调走，这样他就可以和一些乐观者一起展翅高飞？


    我不知道你的那个特定的Fez是怎么回事，所以我不能建议具体的目标，但以下是一些关于技能/意愿图上极端情况的高层次想法：


    *   **高技能，低意愿：** 无聊迫在眉睫——需要换个环境和职责。立刻。

    *   **高意愿，低技能：** 需要培训，需要指导。需要管理。好消息是他们真的、非常想要这些。享受这一点，因为一旦技能提升，他们就会开始觊觎你的工作。这太棒了。

    *   **低意愿，低技能：** 哎呀，你搞砸了。需要相当一致的努力才能如此长时间地忽视你员工的需求，以至于(a) 他们不再具备工作所需的技能，并且(b)
    他们不想做这份工作。卷起袖子吧，伙计。你有事要做了。

    *   **高技能，高意愿：** 做得很好，但是，嗯……你猜怎么着？没有人能长期保持这种状态。


    ## 大结局


    Fez是职业生涯漂移的化身。


    你现在身上也有一些Fez。你现在可能是你公司的明星，但你不知道，在圣何塞的一个车库里，三个人正醒着的每一刻都在努力让你变得无关紧要……他们称之为“新Whizbang”，当“新Whizbang”出现时你会恨它，因为你知道它取代了你在公司中的相关性。


    你的经理不会恨“新Whizbang”，因为她不觉得受到它的个人威胁。她会看到你对此Fez化了，并且，希望她能想办法将客观性渗入你的愤慨之中。


    我有一个简单的方法来对抗Fez效应。我告诉我雇佣的每个人同样的话：“我雇佣你，是因为你有足够的技能和足够的意愿，某一天能胜任我的工作……无论你想不想要。”这句话告诉我的同事们，我期望他们成功，并提醒我要继续前进，因为没有什么比让聪明人在你身后紧跟更能让你跑得更快。


    # 第一章：一瞥与钩子


    关于你的简历，可怕的现实是，尽管你花了无数小时微调，你只有30秒的时间给我留下印象。也许更少。


    这不公平，不精确，而且我很有可能犯下可怕的错误，但你的数量远多于我，虽然雇佣一个出色的团队是我做的最重要的事情，但我需要在完成这项任务的同时，还要构建产品并管理不断涌入我办公室的人员流。


    但这里有一瞥。我将带你走过我看简历时使用的确切思维过程。我不知道这是否正确或高效，但在20年并审视了数千份简历之后，这就是这个过程。


    ## 第一遍


    *你的名字。* 很简单。我认识你吗？无论认识与否，我会立刻用谷歌搜索你，看看是否应该认识你。哦，你有一个博客。很好。


    *公司名称。* 我认识你工作过的任何公司吗？如果认识，我不会看你实际做了什么，我假设如果我知道这家公司，那么我就在正确的范围内。如果我不认识这家公司，我会扫描描述中的关键词来获取一个大致概念。嗯……网络相关的词。好的，你是个搞网络的人。'
  raw: 'You deserve every single Fez that you get. Please stop reading, pack your
    things, and quietly exit the Silicon Valley. Thanks.


    If you’ve taken some time to reflect on the full year, if you’ve mapped your employee
    against skill and will, you’ve probably had some epiphany regarding the Fez. You’ve
    realized, “Wow, he’s bored,” or “She really has no clue how to architect software.”
    Great, an epiphany … it’s a start, but it’s not a finish.


    You are not the one who needs to have the epiphany. It’s your employee who needs
    it.


    I’ll explain via the real fictional Fez. Go back and think about where you’d put
    him on the Skill/Will graph. Your gut might say well, he’s worked a lot of years,
    so he’s high skill and he’s just bored, so he’s low will.


    Nice try, but you don’t have the 12 months of fictional notes that I have. See,
    Fez’s skill used to be high, but it’s fading. It’s middle-of-the-road skill now
    and the slow erosion is also affecting his confidence … his will. His diminishing
    skill is diminishing his will, which, in turn, further diminishes his skill because
    he has zero confidence to go gather new skills. Yikes. A skill/will negative feedback
    loop. Didn’t see that coming, did you?


    Here’s the upside. Just as skill and will fade together, they also rise together.
    If you focus on one, you often fix the other. It’s a brilliant management two-for-one.


    Back to Fez. Let’s say your epiphany is to get Fez some technical training. Send
    him to a C++ class and *wham,* he’s going to be happy. *Hurry,* write that down
    as an objective because *wow,* you’ve really nailed that Fez problem.


    Easy, eager manager. Slow down.


    Assertiveness, Briefly


    I’ve got a task for you and I’m going to ask you in two different ways. You tell
    me which request you’re going to actually do:


    *   **Request #1:** You—go fix that bug.

    *   **Request #2:** Hey, can you look into bug #1837?


    The difference between these two requests is a management style that shows up
    in every personality test. You, Mr. Manager, are either *ask assertive,* meaning
    that you ask in order to get stuff done, or *tell assertive,* which means you
    tell to make progress.


    There are a great many charismatic leaders who’ve made billions by only telling
    folks what to do. I am not one of them. It’s not that I’m conflict averse or that
    there are not times that I’m an incessant dictator, it’s merely I hate being told
    what to do, so I treat others like I’d prefer to be treated.


    Telling your Fez what the problem is without belief on their part that a problem
    exists is tantamount to a personal attack. “You, Fez, are doing a poor job and
    I’ve decided that objectives x, y, and z are the only way that we’re going to
    save your job.”


    I exaggerate for example, but I’ve had fifteen-plus years of reviews and I’ve
    had some phenomenal managers turn a review into a speech about me without involving
    me. Well, I happen to be an expert about me, so can I please be involved in the
    discussion?


    An annual review is a discussion, not a speech. The goal of the discussion is,
    first, to agree that the review is in the ballpark. Remember, you’ve been thinking
    about the review for weeks because you’ve got a deadline. Fez is seeing it for
    the first time and he needs time to mentally digest. It’s very hard to be mentally
    nimble when your manager is staring you down asking, “Any questions?” It’s doubly
    hard when he’s just told you that you screwed up for the past year


    Rule of thumb: If you’re delivering big bad news, schedule two meetings. At the
    first meeting, you’re presenting the review, not the objectives. They’re going
    to want to know about compensation and you’re going to want to say it, but don’t.
    The moment you say “No increase,” the review is over, the employee is pissed,
    and you’re going to be on the defensive. The meeting has become a mental fight
    and fights only prove who can punch harder.


    It’s the second meeting where everyone involved has had time to digest the review.
    You can have a discussion about objectives because Fez drove home the prior night
    wondering, “My manager is telling me that I’m getting stale and I vehemently disagree
    with that … buuuuuuut maybe there’s some truth in what he’s saying … hmmmmm.”


    With just a smidgen of agreement that the review is fair combined with you and
    your Fez agreeing about his place on Skill/Will, you can start talking objectives.
    What can we do to increase skill or will? New job? New tasks? Training? Maybe
    move him off that team of pessimists so he can spread his wings with some optimists?


    I don’t know what is up with your particular Fez, so I can’t advise specific objectives,
    but here are some high-level thoughts about the extremes on the Skill/Will graph:


    *   **High skill, low will:** Boredom is imminent—needs a change of scenery and
    responsibility. Stat.

    *   **High will, low skill:** Needs training, needs mentorship. Needs management.
    The good news is they really, really want it. Savor this because as soon as the
    skill kicks in, they’re going to start wanting your job. This rules.

    *   **Low will, low skill:** Boy, did you screw up. It takes a fairly concerted
    effort to ignore the needs of your employee so long that (a) they no longer have
    the skills necessary to do their job, and (b) they don’t want to do it. Roll those
    sleeves up, pal. You’ve got work to do.

    *   **High skill, high will:** Great job but, ummmmm, guess what? No one can maintain
    this for very long.


    Big Finish


    Fez is the personification of career drift.


    You’ve got some Fez in you right now. You may be the rock star of your company
    right now, but you have no clue that three guys in a garage in San Jose are spending
    every waking hour working to make you irrelevant … they call it the New Whizbang
    and you’re going to hate the New Whizbang when it shows up because you know it
    replaces your corporate relevancy.


    Your manager is not going to hate the New Whizbang because she doesn’t feel personally
    threatened by it. She is going to see you Fezzing out about it and, hopefully,
    she can figure out to trickle objectivity into your indignation.


    I have a simple way of managing against the Fez effect. I tell everyone I hire
    the same thing: “I hired you because you’ve got enough skill and enough will to
    have my job one day … whether you want it or not.” This statement tells those
    I work with that I expect them to succeed and reminds me to keep moving because
    there is nothing like having bright people nipping at your heels to keep you running.


    CHAPTER


    A Glimpse and a Hook


    The terrifying reality regarding your résumé is that for all the many hours you
    put into fine-tuning, you’ve got 30 seconds to make an impression on me. Maybe
    less.


    It’s unfair, it’s imprecise, and there’s a good chance that I make horrible mistakes,
    but there’s a lot more of you than me, and while hiring a phenomenal team is the
    most important thing I do, I’m balancing that task with the fact that I need to
    build product and manage the endless stream of people walking into my office.


    But here’s a glimpse. I’m going to walk you through the exact mental process I
    use when I look at a résumé. I don’t know if this is right or efficient, but after
    20 years and staring at thousands of résumés, this is the process.


    The First Pass


    *Your name.* It’s simple. Do I know you? Whether I do or not, I’m going to immediately
    Google you to see if I should. Oh, you a have a weblog. Excellent.


    *Company names.* Do I recognize any companies that you worked at? If I do, I don’t
    look at what you actually do, I assume that if I recognize the company, I’m in
    the ballpark. If I don’t know the company, I scan for keywords in the description
    to get a rough idea. Hmmm … networking words. OK, you’re a networking guy.'
  trans: '

    # 关于“Fez”的管理思考


    你得到每一个你应得的“Fez”。请停止阅读，收拾好你的东西，安静地离开硅谷。谢谢。


    如果你花了一些时间反思过去整整一年，如果你根据技能和意愿绘制了你员工的情况，你可能已经对“Fez”有了某种顿悟。你意识到，“哇，他太无聊了”，或者“她真的不知道如何设计软件”。很好，一个顿悟……这是一个开始，但不是一个结束。


    你并不是那个需要拥有顿悟的人。是你的员工需要它。


    我将通过真实的虚构人物“Fez”来解释。回想一下，你会把他放在技能/意愿图的哪个位置？你的直觉可能会说，他工作了很多年，所以技能很高，他只是无聊，所以意愿很低。


    想法不错，但你没有我拥有的那 12 个月的虚构笔记。你看，Fez 的技能曾经很高，但它正在衰退。现在处于中游水平，缓慢的侵蚀也影响了他的信心……他的意愿。他日益减少的技能正在削弱他的意愿，这反过来又进一步削弱了他的技能，因为他毫无信心去获取新技能。哎呀。一个技能/意愿的负反馈循环。你没想到这一点吧？


    这里有积极的一面。正如技能和意愿一起衰退一样，它们也会一起提升。如果你专注于其中一个，你通常也会解决另一个。这是一个绝妙的管理二合一方案。


    回到 Fez。假设你的顿悟是让 Fez 接受一些技术培训。送他去上 C++课程，然后“砰”的一声，他就会开心起来。“快”，把它写下来作为一个目标，因为“哇”，你真的解决了
    Fez 的问题。


    别急，急切的经理。慢下来。


    ## 主张，简而言之


    我有一个任务给你，我会用两种不同的方式来问你。你告诉我你实际上会执行哪个请求：


    *   **请求#1：** 你——去修复那个 Bug。

    *   **请求#2：** 嘿，你能看一下 Bug #1837 吗？


    这两个请求之间的区别是一种管理风格，它出现在每一个性格测试中。你，经理先生，要么是“请求式坚定”，意味着你通过请求来完成工作；要么是“命令式坚定”，意味着你通过命令来取得进展。


    有很多富有魅力的领导者通过仅仅命令别人做什么而赚取了数十亿美元。我不是其中之一。并不是我害怕冲突，或者没有我成为独断专行者的时候，仅仅是我讨厌被别人命令，所以我以自己希望被对待的方式对待他人。


    在没有让你的 Fez 相信问题存在的情况下，告诉他问题是什么，无异于一次人身攻击。“你，Fez，工作表现很差，我已经决定目标 X、Y 和 Z 是拯救你工作的唯一方法。”


    我为了举例而夸张，但我有超过十五年的绩效评估经验，我有过一些非常出色的经理，他们把一次评估变成了一场关于我的独白，而没有让我参与其中。好吧，我碰巧是研究我自己的专家，那么请让我参与讨论好吗？


    年度评估是一场讨论，而不是一场独白。讨论的目标首先是同意评估大致准确。记住，你因为截止日期，已经思考评估好几周了。Fez 是第一次看到它，他需要时间去消化。当你的经理直盯着你问“有什么问题吗？”时，要保持思维敏捷是非常困难的。当他刚刚告诉你过去一年你搞砸了的时候，这就加倍困难。


    经验法则：如果你要传达重大的坏消息，安排两次会议。在第一次会议上，你呈现评估，而不是目标。他们会想知道薪酬问题，你也会想说，但别说。你说“没有加薪”的那一刻，评估就结束了，员工很生气，你会处于防守状态。会议变成了一场心理战斗，而战斗只能证明谁更能打。


    在第二次会议上，所有相关的人都有时间消化了评估。你可以讨论目标，因为 Fez 前一晚开车回家时就在想：“我的经理告诉我我正在变得过时，我强烈不同意这一点……但……也许他说的话有些道理……嗯……”


    只要稍微同意评估是公平的，再加上你和你的 Fez 就他在技能/意愿图上的位置达成一致，你就可以开始讨论目标了。我们能做些什么来提高技能或意愿？新工作？新任务？培训？也许把他从那个悲观者的团队调走，这样他就可以和一些乐观者一起展翅高飞？


    我不知道你的那个特定的 Fez 是怎么回事，所以我不能建议具体的目标，但以下是一些关于技能/意愿图上极端情况的高层次想法：


    *   **高技能，低意愿：** 无聊迫在眉睫——需要换个环境和职责。立刻。

    *   **高意愿，低技能：** 需要培训，需要指导。需要管理。好消息是他们真的、非常想要这些。享受这一点，因为一旦技能提升，他们就会开始觊觎你的工作。这太棒了。

    *   **低意愿，低技能：** 哎呀，你搞砸了。需要相当一致的努力才能如此长时间地忽视你员工的需求，以至于(a) 他们不再具备工作所需的技能，并且(b)
    他们不想做这份工作。卷起袖子吧，伙计。你有事要做了。

    *   **高技能，高意愿：** 做得很好，但是，嗯……你猜怎么着？没有人能长期保持这种状态。


    ## 大结局


    Fez 是职业生涯漂移的化身。


    你现在身上也有一些 Fez。你现在可能是你公司的明星，但你不知道，在圣何塞的一个车库里，三个人正醒着的每一刻都在努力让你变得无关紧要……他们称之为“新 Whizbang”，当“新
    Whizbang”出现时你会恨它，因为你知道它取代了你在公司中的相关性。


    你的经理不会恨“新 Whizbang”，因为她不觉得受到它的个人威胁。她会看到你对此 Fez 化了，并且，希望她能想办法将客观性渗入你的愤慨之中。


    我有一个简单的方法来对抗 Fez 效应。我告诉我雇佣的每个人同样的话：“我雇佣你，是因为你有足够的技能和足够的意愿，某一天能胜任我的工作……无论你想不想要。”这句话告诉我的同事们，我期望他们成功，并提醒我要继续前进，因为没有什么比让聪明人在你身后紧跟更能让你跑得更快。


    # 第一章：一瞥与钩子


    关于你的简历，可怕的现实是，尽管你花了无数小时微调，你只有 30 秒的时间给我留下印象。也许更少。


    这不公平，不精确，而且我很有可能犯下可怕的错误，但你的数量远多于我，虽然雇佣一个出色的团队是我做的最重要的事情，但我需要在完成这项任务的同时，还要构建产品并管理不断涌入我办公室的人员流。


    但这里有一瞥。我将带你走过我看简历时使用的确切思维过程。我不知道这是否正确或高效，但在 20 年并审视了数千份简历之后，这就是这个过程。


    ## 第一遍


    *你的名字。* 很简单。我认识你吗？无论认识与否，我会立刻用谷歌搜索你，看看是否应该认识你。哦，你有一个博客。很好。


    *公司名称。* 我认识你工作过的任何公司吗？如果认识，我不会看你实际做了什么，我假设如果我知道这家公司，那么我就在正确的范围内。如果我不认识这家公司，我会扫描描述中的关键词来获取一个大致概念。嗯……网络相关的词。好的，你是个搞网络的人。

    '
- fmt: '# Job Description and History


    Here I''m looking for history and trajectory. How many jobs have you had and for
    how long? How long have you been in your current role? Where''d you come from?
    QA? Or have you always been an engineer? This is when I start looking for inconsistencies
    and warning flags.


    # Other Interests and Extracurriculars


    Yeah, this is part of the first pass. I''m eagerly looking to find something that
    makes you different from the last 50 résumés I looked at. More on this in a moment.


    So, we''re done. It''s been 10 to 20 seconds and I''ve already formed an opinion.
    There''s a good chance that I''ve already made a call whether to move forward
    on you. If there are other folks checking the résumé out, I can certainly be convinced
    to take a second look, but a basic opinion has been formed.


    Before we move to the second pass, let''s talk about the parts of your résumé
    I didn''t look at and never will.


    # Professional Objective


    This is likely your lead paragraph and I skipped it. Career center counselors
    across the planet are slamming their fists on their desks as they read this because
    they''ve been telling students, "You need to write a crisp career objective. It
    defines your résumé."


    Yes, it does, but I still don''t read it and it''s not because there isn''t good
    content there, it''s the time issue. See, if your résumé is sitting in my inbox,
    it means someone has already mapped you to an open job in my group. Reading your
    objective is going to tell me something I already know. Besides, my job title
    and description scrub will tell me whether we''re in the ballpark or not. If I''ve
    got a junior engineering position open and you''ve got ten years'' experience,
    I''ll figure out that mismatch when I look at your history.


    This doesn''t mean you shouldn''t include this objective in your résumé. As you''ll
    see below, there''s more to the process than just me reading your résumé, and
    different folks are looking for different content.


    # Skills


    I skip the skills section not only because this is information I''ll derive from
    your job history, but also because this section is full of misinformation. I''m
    not going to say that people lie in the skills section, but I know that if a candidate
    has heard the word `Linux` in the workplace, there''s a good chance they''re going
    to put "Familiarity with Linux" as a skill on their résumé.


    Besides, again, I know you''ve goofed around with `Linux` because you said so
    in the description of your last job, right?


    # Summary of Qualifications


    Similar to skills, this is another skip section for me. Here''s a good example
    from an imaginary résumé: "Proven success in leading technical problem-solving
    situations." This line tells me nothing. Yes, I know you''re trying to tell me
    that you''re strategic, but there is no way you''re going to convince me that
    you''re strategic in a résumé. I''m going to learn that from a phone screen and
    from an interview.


    Unlike skills, which I find to be a total waste of time, I will go back to the
    summary of qualifications if we end up talking. When you write "Established track
    record for delivering measurable results under tight schedules," I am going to
    ask you what the hell you mean on the phone and if your answer isn''t instant
    and insightful, I''ll know your qualifications are designed to be buzzword-compliant
    and don''t actually define your qualifications.


    # The Second Pass


    If I can''t decide whether to schedule a phone screen after the first pass, I
    go for another. The goal now is, "OK, I saw something I liked in the first pass,
    is it real?" This is when I do the following:


    ## In-Depth Job History


    I''m going to actually read the job history for the past couple of jobs. Not all
    of them, just the last two or three. What I''m doing is fleshing out my mental
    picture of you. I''m looking for more warning flags. Do your responsibilities
    match your title? How long were you at your most recent job? If it was a long
    time, can I get a sense of how you grew? If it was short, can I figure out why
    you left? Do your last two jobs build on each other? Can I get a sense of where
    you''re headed or are you all over the place?


    Your job history—your professional experience—is the heart of your résumé. This
    is where I spent my time vetting you and this is where you should spend your time
    making sure I''m going to get the most complete picture of who you are and what
    you''re going to bring to my team.


    ## School


    Yeah, this is the first time I''ll notice whether you went to college or not.
    I purposely do this because I''ve found over years of hiring that a name-brand
    university biases my opinion too early. There''s a lot to be said for a candidate
    who gets accepted to and graduates from `Stanford` or `MIT`, but I''ve made just
    as many bad hires from these colleges as great ones.


    Seeing a non-computer science degree is not a warning flag. In fact, I''m a huge
    fan of hiring physics majors as engineers. For whatever reason, the curriculum
    for physics has a good intersection with computer science. Any technical major
    for me is perfectly acceptable, and even non-technical majors with a technical
    job history make for a résumé worth thinking about.


    OK, so that second pass took another 15 to 30 seconds and we''re done. You''ve
    just given me the opportunity to change your life by potentially bringing you
    in for an interview and that chance is over. Next!


    What''s unfair about what just happened is this. You spent hours working on your
    résumé. You sent it to close friends for review and you edited it. You agonized
    over the different sections and you stressed about the tone, and here I am, the
    hiring manager, and I read one-tenth of your work in 30 seconds.


    Don''t despair. There are some easy things you can do to improve your chances.


    # Differentiate, Don''t Annoy


    ## Design Your Résumé to Downgrade


    Your résumé needs to withstand some formatting abuse. Go get your résumé right
    now and convert it to plain text. Can you still see the different sections? Is
    your job history still cleanly formatted? Can you still see the different jobs
    as well as the start and stop dates? Screw around with the margins, too. Where
    are your line breaks? They''d better not be after every line because that means
    visual chaos if a well-intentioned recruiter starts messing with fonts.


    ## Never Include a Cover Letter


    I don''t read them. Recruiters don''t pass them on. Make sure the key points of
    your cover letter are living in your career objective and your job history.


    ## Embrace Honest Buzzword-Compliance


    Remember, I''m not the only one who is going to read your résumé. I''m likely
    the most qualified to make a call whether you''re a fit for my job, but before
    your résumé gets to me, it''s going to be passed through a couple of different
    recruiters and these folks are just as busy as I am.


    The lifeblood of the recruiter is the keyword. `Java`, `C++`, `Objective-C`. The
    more specific relevant keywords and buzzwords you can shove into your résumé,
    the more likely you''re going to make it past the initial cut.


    As I said above, I skip the skills section because most folks already know that
    recruiters are just searching for specific words when they''re sourcing candidates,
    so they shove every possible buzzword into their résumé. Know this: if you claim
    "strong Java background" in your résumé, I''m going to be compelled to figure
    out how strong your skills actually are. Don''t include any keyword or buzzword
    that you aren''t comfortable talking about at length.'
