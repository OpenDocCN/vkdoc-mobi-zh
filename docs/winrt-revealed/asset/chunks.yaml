    Is it Excel? Well, you’re probably in some area of operations. Are you seeing
    a lot of Word? Maybe legal, possibly tech pubs. Is the cube empty? That’s sales.


    The most common application in engineering is an editor. Whether it’s a terminal
    window or the world’s fanciest integrated development environment, their Favorite
    Application is a code editor, but it’s not their secret weapon. That would be
    version control.


    The concept behind version control is simple. It’s a central network repository
    for all the files of which a project is comprised. If I want to edit a file, I
    run a tool (which works alongside my editor) that makes a local read/write copy
    of that file on my system. I make my changes and then, using the same tool, I
    check in my file to the network. So, what’s the big deal?


    Usually, there is no deal. You merrily check in and check out your files with
    no fuss. The deal occurs when you realize that software projects are often massive
    collections of files that are edited by teams of people. A version control system
    solves the problem that occurs when two engineers have checked out and have changed
    the same file at the same time. Whoever checks in their changed file first has
    no deal. When the second one checks in, that engineer receives a message that
    warns, “Hey, this file has changed while you had it checked out. Whaddayawannado?”
    The user then gets to figure out how to merge the two files into a consistent
    working whole.


    That’s version control as a traffic cop and that’s cool because it prevents folks
    from bonking each other on the heads, but I haven’t gotten to the major cool,
    and that’s the other thing I do when I check in. I don’t just check the file in;
    I also include information about what I changed:


    “Rands added a new blingleforth function. It rocks.”


    The version control server then copies my new version of the file up, tags the
    new version with my name and my comments, and increments the version number associated
    with the file.


    Let’s ignore the useful fact that every single version of the file is stored in
    this system and focus on the comment I included with this change. This is the
    big deal. This is the secret weapon in engineering. We not only save every version
    of our work, we also capture the context of the change. Version control stores
    the thoughts that made our ideas bright.


