- fmt: '*Can we communicate?* I’m going to lead off with something simple and disarming.
    It’s either going to be the weather or something I picked up from your extracurricular
    activities. “Do you really surf? So do I! Where do you surf?” These pleasantries
    appear trivial, but they’re a big deal to me because I want to see if we can communicate.
    It’s nowhere near a deal killer if the pacing of our conversation is awkward,
    I’ll adjust, but how off is it? Are we five minutes in and we still haven’t said
    anything? OK, maybe we have a problem.


    *A couple of clarification softballs.* My follow-up questions will now start to
    focus on whatever questions your résumé left me with. I’ve no idea what I’m going
    to ask because it varies with every single résumé, so my thought is that you should
    have your résumé sitting in front of you because it’s sitting in front of me as
    well. It’s my only source material.


    Whatever these follow-up questions are, I’m still figuring out how we communicate.
    This means you need to focus on answering the questions. It sounds stupid, but
    if it’s not absolutely clear to you what I’m asking, it’s better to get early
    clarification rather than letting me jump in five minutes into your answer to
    say, “Uh, that’s not what I was asking.”


    See, you and I are still tuning to each other. It’s been five minutes, and if
    we’re still not adjusted to each other’s different communication styles, I’m going
    to start mentally waving my internal yellow flag. It doesn’t need to be eloquent
    communication, but we should be making progress.


    *What’s your story?* We’re past the softball phase of the interview and now I’m
    going to ask a hard question. This isn’t a brainteaser or a technical question,
    this is a question that is designed to give you the chance to tell me a story.
    I want to see how you explain a complex idea over the phone to someone you don’t
    know and can’t see.


    Again, who knows what the actual question will be? But you need to be prepared
    when I ask that question, which will be clearly, painfully open-ended. I’m not
    looking for the quick, clean answer; I’m looking for a story that shows me more
    about how you communicate and how you think. Being an amazing communicator is
    not a part of most engineering jobs, I know this. I’m not expecting Shakespeare,
    but I am expecting that you can confidently talk about this question because I
    found this question in your résumé, which is the only piece of data we currently
    have in common. If we can’t have an intelligent discussion about that, I’m going
    to start wondering about the other ways we aren’t going to be able to communicate.


    *Your turn: show me what you’ve got.* We’re 20 minutes into the phone screen and
    now I’m going to turn it over to you when I ask, “Do you have any questions for
    me?”


    When I tell friends that this is my favorite question, the usual response is,
    “So, you’re lazy, right? You can’t think of anything else to ask, so you go for
    the path of least resistance.” It’s true. It an easy question for me to ask, but
    it is essential because I don’t hire people who aren’t engaged in what they’re
    doing. And if you don’t have a list of questions lined up for me, all I hear is:
    *You don’t want this job.*


    A well-thought-out question shows me that you’ve been thinking about this job.
    It shows me you’re already working for it by thinking about it outside of this
    30-minute conversation. Yeah, you can probably wing it and ask something interesting
    based on the last 20 minutes, but the impression you’re going to make with me
    by asking a question based on research outside of this phone screen will make
    up for a bevy of yellow flags. It shows initiative and it shows interest.


    ## The Close


    And we’re done. It went by pretty quick, but the question is, “How’d it go?” Here’s
    a mental checklist to see how you did:


    **Long, awkward pauses.** Were we struggling to keep things moving? Were there
    long silences? Well, we didn’t tune appropriately. Again, not a deal killer, but
    definitely a negative.


    **Adversarial interactions.** What happened when we had different opinions? Did
    we talk through it or did we start butting heads? This happens more than I expect
    on phone screens, and it’s not always a bad thing. I’m not interested in you telling
    me what I want to hear, but if we are on opposite sides of the fence, how do we
    handle it? If a candidate is willing to pick a fight in a 30-minute phone screen,
    I’m wondering how often they’re going to fight once they’re in the building.


    **How’d it feel?** This is the hardest to quantify, but also the most important.
    Did we click? Did the conversation flow? Did we both learn something? Ideally,
    I’m a decent representation of the culture of the team I’m hiring for, so if the
    30 minutes passed painfully, I’m wondering what kind of pain hiring you might
    inflict on the team.


    **Specific next steps.** How did I leave it? Did I give you a song and dance about
    how “we’re still interviewing candidates and we’ll be in touch within the next
    week”? Well, that’s OK, but what you’re really looking for is a specific next
    step like, “I’m going to bring you in,” or “Let’s have you talk with more of the
    team.” An immediate and actionable next step is the best sign of success with
    a phone screen. If I don’t give you this as part of the close, ask for it. If
    I stall, there’s a problem.


    Like your résumé, the goal with the phone screen is to convince a single person
    to move forward with hiring you. With your résumé, you send your hope to an anonymous
    recruiting e-mail address. With a phone screen, you have leverage. It’s not the
    30-minute window that you need to worry about, you need to worry about how you’re
    going to prepare.


    The phone screen is the first time you get to represent yourself as a person,
    not some résumé sitting on my desk. It’s still a glimpse, but it’s the first time
    you can actively participate in the process.


    # Chapter: Your Resignation Checklist


    Borland was tanking. I’d survived three rounds of layoffs primarily because my
    project was still generating quite a bit of revenue, but at every meeting I attended,
    everyone kept using the word *if.*


    “Well, if we get funded we’ll be able to do this.”


    “If Paul stays, we can keep this feature.”


    “I don’t know if this is a good idea given what we don’t know.”


    *If*—everywhere. *If* is uncertainty. *If* is fear. If there were no *if* I’d
    be able to focus on my job, but I couldn’t because no one was sure what was going
    to happen.


    When I finally received an offer from a database company in Redwood City, I was
    in bliss for a brief moment. The new company had scads of cash, an upside, and
    a distinct lack of *if*. The bliss quickly faded when I realized I had no idea
    how I was going to resign. I knew it was customary to give two weeks’ notice,
    so when the beginning of those two weeks showed up, I walked into the boss’s office
    with my terse resignation letter and said it: “I’ve got another gig; I like it
    here, but it’s time to go.”


    Boss: “Sorry to hear that. If I could make some changes, would you stay?”


    Me: “I have a problem with your *if*.”


    Boss: “I understand. Well, you’re responsible for the import/export engine features.
    Any chance you could finish that before you go?”


    Me: [without pause] *“Absolutely.”*


    Some data. I had four weeks of work left on the import/export engine, and those
    were four engineering weeks, which meant I actually had six weeks of work on the
    inside. While I valiantly worked my ass off for the first week, I started to not
    care in the second. By the time Thursday arrived, it was clear I didn’t have a
    chance to do a third of the work.


    Why did I sign up for an impossible task? I violated the first rule on the resignation
    checklist.


    ### Rule #1: Don’t Promise What You Can’t Do'
