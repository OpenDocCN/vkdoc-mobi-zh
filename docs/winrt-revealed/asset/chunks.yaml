    Don’t despair. There are some easy things you can do to improve your chances.


    Differentiate, Don’t Annoy


    *Design your résumé to downgrade.* Your résumé needs to withstand some formatting
    abuse. Go get your résumé right now and convert it to plain text. Can you still
    see the different sections? Is your job history still cleanly formatted? Can you
    still see the different jobs as well as the start and stop dates? Screw around
    with the margins, too. Where are your line breaks? They’d better not be after
    every line because that means visual chaos if a well-intentioned recruiter starts
    messing with fonts.


    *Never include a cover letter.* I don’t read them. Recruiters don’t pass them
    on. Make sure the key points of your cover letter are living in your career objective
    and your job history.


    *Embrace honest buzzword-compliance.* Remember, I’m not the only who is going
    to read your résumé. I’m likely the most qualified to make a call whether you’re
    a fit for my job, but before your résumé gets to me, it’s going to be passed through
    a couple of different recruiters and these folks are just as busy as I am.


    The lifeblood of the recruiter is the keyword. Java, C++, Objective-C. The more
    specific relevant keywords and buzzwords you can shove into your résumé, there
    more likely you’re going to make it past the initial cut.


    As I said above, I skip the skills section because most folks already know that
    recruiters are just searching for specific words when they’re sourcing candidates,
    so they shove every possible buzzword into their résumé. Know this: if you claim
    “strong Java background” in your résumé, I’m going to be compelled to figure out
    how strong your skills actually are. Don’t include any keyword or buzzword that
    you aren’t comfortable talking about at length.'
  trans: '

    # 工作经历与职业轨迹


    在此我关注的是你的工作经历与发展轨迹。你做过几份工作？每份工作持续多久？当前岗位任职多长时间？你是从什么岗位转型而来的？QA 出身？还是一直从事工程师工作？这时我会开始寻找矛盾之处和警示信号。


    # 其他兴趣与课外活动


    没错，这属于初步筛选的一部分。我热切地希望找到让你与之前看过的 50 份简历有所不同的特质。关于这一点稍后会详述。


    好了，到此为止。仅用 10 到 20 秒的时间，我已形成了初步判断。很可能我已经决定是否继续推进你的申请。如果还有其他同事在审核这份简历，我当然会被说服再看一次，但基本判断已经形成。


    在进入第二轮筛选前，我们先聊聊简历中那些我从未看过、将来也不会看的部分。


    # 职业目标


    这可能是你简历的开篇段落，但我直接跳过了。全球各地的就业指导中心顾问看到这里大概会拍案而起——因为他们一直告诉学生："你需要写一份清晰的职业目标。它定义了你的简历。"


    没错，职业目标确实重要，但我依然不读，并非因为内容不好，而是时间问题。要知道，如果你的简历出现在我的收件箱里，说明已经有人将你与我团队的空缺岗位进行过匹配。读你的职业目标不过是告诉我已知的信息。况且，通过你的职位头衔和岗位描述，我就能判断是否匹配。如果我招的是初级工程师岗位，而你有十年经验，通过工作经历我自然会察觉这种不匹配。


    但这不意味着你简历中不应包含职业目标。如后文所述，简历筛选过程远不止我一人阅读，不同角色关注的内容各不相同。


    # 技能


    我跳过技能部分，不仅因为这些信息能从工作经历中推导出来，更因为这部分充斥着不实信息。我不会说人们在技能部分撒谎，但我知道如果候选人在工作场所听过`Linux`这个词，他们很可能就会在简历上写上"熟悉
    Linux"作为技能。


    再说，你已经在上一份工作描述中提到摆弄过`Linux`了，对吧？


    # 资质总结


    与技能类似，这也是我跳过的部分。举个虚构简历的典型例子："在领导技术问题解决方面具有成功经验。"这句话毫无信息量。是的，我知道你想表达自己具备战略思维，但你不可能通过简历让我相信这一点。我会通过电话面试和现场面试来了解。


    不同于我认为完全浪费时间的技能部分，如果我们最终进入沟通阶段，我会回头查看资质总结。当你写"在紧迫时限内交付可量化成果方面有可靠记录"时，我会在电话中追问你到底是什么意思——如果你的回答不够即时且见解深刻，我就知道这些资质描述不过是堆砌热门词汇，并未真正定义你的能力。


    # 第二轮筛选


    如果初次筛选后我无法决定是否安排电话面试，我会进行第二轮。此时的目标是："好，初次筛选看到了亮点，这些是真实的吗？"这时我会做以下事项：


    ## 深入分析工作经历


    我会仔细阅读最近几份工作的经历。不是全部，只看最近两到三份。我是在完善对你的整体印象，同时寻找更多警示信号。你的职责与职位头衔匹配吗？最近一份工作干了多久？如果时间很长，我能看出你是如何成长的？如果时间很短，我能推断出离职原因吗？最近两份工作是否有递进关系？我能看出你的职业发展方向，还是感觉杂乱无章？


    你的工作经历——专业经验——是简历的核心。这是我花时间考察你的部分，也是你应该投入精力确保我能全面了解你是谁、你能为团队带来什么价值的部分。


    ## 教育背景


    没错，这是我第一次留意你是否上过大学。我刻意这样做，是因为多年招聘经验发现，名校背景过早地影响我的判断。被`斯坦福`或`麻省理工`录取并毕业的候选人确实值得称道，但我也从这些名校招到过同样多的糟糕人选。


    非计算机科学学位并非警示信号。事实上，我非常喜欢招聘物理专业毕业生担任工程师。无论出于什么原因，物理课程与计算机科学有着良好的交叉点。任何技术类专业对我来说都完全可接受，甚至拥有技术工作经历的非技术专业背景也值得考虑。


    好了，第二轮筛选又花了 15 到 30 秒，就此结束。你刚刚给了我通过面试邀请改变你人生的机会，而这个机会已经过去了。下一位！


    刚才发生的事情之所以不公平，原因在此。你花了数小时打磨简历，发给密友审阅并修改，为不同章节纠结不已，为措辞语气焦头烂额。而我这个招聘经理，只用 30 秒就读完了你十分之一的内容。


    别灰心。通过一些简单方法，你完全能提高胜算。


    # 与众不同，而非惹人厌烦


    ## 将简历设计为"降级兼容"


    你的简历需要经受住格式调整的考验。现在就把你的简历转换为纯文本格式。还能清晰看到不同章节吗？工作经历的格式是否依然整洁？能否清楚看出不同工作及其起止日期？再折腾一下页边距。你的换行符在哪里？千万别每行都换行——因为好心的招聘人员调整字体时，那将是一场视觉灾难。


    ## 永远不要附上求职信


    我不读求职信。招聘人员也不会转发。确保求职信的核心要点体现在职业目标和工作经历中。


    ## 拥抱诚实的"关键词合规"


    请记住，我不是唯一阅读你简历的人。我最有资格判断你是否适合我的岗位，但在简历到我手上之前，会经过几位不同的招聘人员——他们和我一样忙碌。


    关键词是招聘人员的命脉。`Java`、`C++`、`Objective-C`。你能塞进简历的相关关键词和热门词汇越具体越多，就越有可能通过初步筛选。


    正如我前面所说，我跳过技能部分，因为多数人都知道招聘人员在筛选候选人时只是搜索特定关键词，所以他们把所有可能的热门词汇都塞进简历。但请注意：如果你在简历中声称"深厚的
    Java 背景"，我就必须验证你的技能到底有多强。不要包含任何你无法深入讨论的关键词或热门词汇。

