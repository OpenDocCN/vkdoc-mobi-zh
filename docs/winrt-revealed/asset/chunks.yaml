- fmt: '# When these seemingly benign stories are not judged, when they are not questioned,
    the story is over.


    Bob’s conscience is clear because he gave you a heads-up. Your conscience is clear
    is because you listened to Bob’s concern, and, yeah, you had a Twinge, but Bob’s
    delivery record is impeccable, so Twinge be damned, it’ll sort itself out in the
    end.


    Your failure to heed your Twinge is a management failure.


    It gets worse. This story optimization is happening at every layer of management
    and in every group of people. Each time an unheeded Twinge story jumps from one
    person to the next, a lie is being propagated throughout the organization. And
    if the story started in your group, it’s your fault this misinformation is running
    amok. Now, there are other people in the building who might get a Twinge and save
    your team’s collective professional ass, but again, if it’s a story that originated
    in your group, the responsibility is yours.


    ## Just Another Nail


    New engineering managers wrestle with the gig because they miss building stuff.
    The powerfully addictive act of building is no longer part of their day, and they
    bitch, “You know, I don’t know what I actually do all day.” Finding other ways
    to scratch this itch is a topic for another chapter, but for now, one of your
    jobs is to listen to the stories and map them against your experience. And when
    there’s a Twinge, you ask questions, and you need to believe the asking of these
    questions is a form of building.


    As a manager, when the story doesn’t quite feel right, you demand specifics. You
    ask for the details of the story to prove that it’s true. If the story can’t stand
    up to the first three questions that pop into your mind, then there’s an issue.


    You don’t run a team or a company on a Twinge. The ability to listen to random
    stories and quickly tease out a flaw in the logic or the absence of a critical
    dependency is just one of the skills you need to develop as a manager. Like building,
    both the discovery and the asking of these questions are arts; they’re just more
    nails you need to figure out how to hammer.


    # CHAPTER


    ## The Update, the Vent, and the Disaster


    Business is noisy.


    Business is full of people worrying loudly about projects, process, and other
    people. These people have opinions and they share them all over the place, all
    the time. This collective chatter is part of the daily regimen of a healthy business,
    but this chatter will bury the individual voice unless someone pays attention.


    And paying attention is best done in a one-on-one with the people you manage.


    Your job in a one-on-one is to give the smallest voice a chance to be heard, and
    I start with a question: “How are you?”


    ## The Basics


    Before we start, let’s go over the basic rules I follow regarding one-on-ones:


    - **Hold a one-on-one the same time each week:** When you become a manager of
    people, an odd thing happens. You’re automatically perceived as being busier.
    Whether you are or not is irrelevant; folks just think you are. Consistently landing
    your one-on-ones at the same time on the same day is a weekly reminder that you
    are here for them—no matter how busy.


    - **Always do it:** OK, so you are really busy. You’re running from meeting to
    meeting. It’s easy to deprioritize a one-on-one because, unlike whatever meeting
    you’re running to or from, a one-on-one doesn’t represent an urgent problem that
    needs solving. I’ll beat this perceived-lack-of-value opinion out of you later
    in this piece, but for now, understand that each time you bail on a one-on-one,
    the person you’re managing hears, “You don’t matter.”


    - **Give it 30 minutes, at least:** Another favorite move of the busy manager
    is to schedule a one-on-one for 15 minutes or less. *It’s the best I can do, Rands.
    I’ve got 15 people working for me.* First, those 15 people don’t work for you;
    you work for them. Think of it like this: if those 15 people left, just left the
    building tomorrow, how much work would actually get done? Second, if you’ve got
    15 people working for you, you’re not their manager, you’re just the guy who grins
    uncomfortably as you infrequently fly by the office, ask how it’s going, and then
    don’t actually listen to the answer.


    Having a meaningful conversation with anyone takes time. As you’ll see in a moment,
    you start with an opener where you figure out where everyone is mentally, which
    builds momentum into having a conversation of consequence. In your 15-minute one-on-one,
    all you learn is that you don’t have time to care.


    ## How Are You?


    It’s a softball opener. I recognize that, but I lead with a vanilla opener because
    this type of content-free question is vague enough that the recipient can’t help
    but put part of themselves into the answer, and it’s the answer where the one-on-one
    begins.


    What’s the first thing they say? Do they deflect with humor? Is it the standard
    off-the-cuff answer? Or is it different? How is it different? What words do they
    choose and how quickly are they saying them? How long do they wait to answer?
    Do they even answer the question? Do you understand the answer isn’t the point,
    either? The content is merely a delivery vehicle for the mood, and the mood sets
    your agenda.


    As I’m listening to the answer, I’m discerning your mood, and I’m throwing you
    into one of three buckets regarding the type of one-on-one we’re about to have:


    - The Update (all clear!)

    - The Vent (something’s up …)

    - The Disaster (oh dear …)


    The majority of the one-on-ones fall into the first bucket. The answer to my softball
    opener is pleasant and familiar. We’re going to walk through the facts, dig a
    little bit here and there, wander, and then it’ll be over. Great. The other two
    buckets are trickier to assess with a single question. Your answer to my question
    is … off. You either state this up front with the alarming, “We need to talk”
    proclamation, which immediately throws you in the Vent bucket, but this could
    also easily be a Disaster. By far, the worst answer to the opener is the quiet
    one, the answer that contains something hidden and insidious. Oh dear.


    ### The Update


    You get exactly what you expect from the Update—it’s status. These are my projects
    and these are my people and this is how it’s going down. I believe most folks
    consider this type of one-on-one to be a success, and they’re wrong.


    A one-on-one is not a project meeting. A one-on-one is not status report. See
    all those project managers scurrying to and fro? Their job is the maintenance
    of the facts and the discovery of project truth. If you’re drawing the line for
    success in your one-on-one as the discussion of data you could find in a status
    report, you’re missing the point. A one-on-one is an opportunity to learn something
    new amidst the grind of daily business.


    When a one-on-one starts and is clearly an Update, I start listening twice as
    hard for a nugget of something that we can discuss, investigate, and explore.
    It’s not that I don’t care about status, it’s just that we’ve got 45 minutes here,
    and if we fill that time with data I can find scrubbing the bug database and the
    wiki, we’re both wasting our time.


    So, I listen, I take it on myself to find a meaty conversation, and if I don’t
    find it in the first 15 minutes, I’ve got three moves:


    - **Three prepared points:** While I believe part of a good organic one-on-one
    is improvisation, I usually have three talking points in my back pocket that have
    shown up over the past week regarding you or your team. If we can’t find a good
    thread of conversation in the first 10 to 15 minutes, I’ll start with one of these
    points and see where that takes us.'
