- fmt: '# Differentiate, don’t annoy


    You’re likely going to start developing your résumé from a template. Maybe you’ll
    use a friend’s résumé that you like as a starting point. Excellent. How are you
    going to make it yours?


    Remember, I’ve looked at thousands of résumés, which means I’ve seen all the standard
    templates. I know when you’re using Microsoft Word and I know when you’ve developed
    a format of your own. Right this second, I’m flipping through a dozen college
    résumés and the ones I’m spending time on are the ones that grab me visually,
    where there is something different. On this one, the fellow put a subtle gray
    box around each of his section headings. On this other one, the candidate used
    a nice combination of serif and sans serif fonts to grab me.


    A couple of subtle visual differences to your résumé goes a long way toward keeping
    me engaged in reading it, but remember, we’re engineers here and efficiency matters.
    Differentiating your résumé to the point that I can’t quickly parse it is going
    to frustrate me. You’re not applying to be a visual designer; you’re an engineer.
    Keep to the standard sections and don’t make me work to figure out who you are.


    # Sound like a human


    Here’s a doozy: This intern says he “planned, designed, and coordinated engineers’
    efforts for the development of a mission critical system.” Zzzzzzzzzzzzz. What
    did this guy actually do? I honestly don’t know. Let’s call this type of writing
    style “résumé mumbo jumbo” and let’s agree that usage of this style is tantamount
    to saying nothing at all.


    What was the mission critical system? Why was it critical? How in the world did
    an intern plan, design, and coordinate the engineering efforts? I’m a fan of giving
    interns real-world work, but it’d take a world-class intern to plan, design, and
    manage engineers on whatever this mission critical system is.


    Take time to write your résumé for a human. You need to hit all the right buzzwords
    and keywords to get yourself past the layers of recruiters, but I’m the guy who
    is really going to take apart your résumé, and if you’re saying nothing with résumé
    mumbo jumbo, I’m learning nothing. Give me specifics and give them to me in a
    familiar tone. I’m not an automaton; I honestly want to know what you do. Tell
    me a story.


    # Include seemingly irrelevant experience


    This applies mostly to college types who lack experience in high technology. You’re
    going to stress that your job history doesn’t include any engineering and you’re
    thinking your summer working at Barnes & Noble bookstore is irrelevant. It’s not.
    Any job teaches you something. Even though you weren’t coding in C++, I want to
    know what you learned by being a bookseller. Was it your first job? What did you
    learn about managers? How did you grow from the beginning to the end of the summer?
    Explain to me how hard work is hard no matter what the job is.


    # A Glimpse and a Hook


    A résumé will never define who you are. It’s not the job of your résumé to give
    me a complete picture, and if you’re struggling to include every last detail about
    who you are, you’re wasting your time. Your résumé should be designed to give
    me a glimpse and a hook.


    The glimpse is a view into the most recent years of your professional career.
    It should convey your three most important accomplishments and it should give
    me a good idea where your technical skills lie.


    The hook is more important. The hook will leave me with a question. Maybe it’s
    something from your “Other Interests” section. How about an objective so outlandish
    that I can’t help but set up a phone screen. I’m not suggesting that you make
    anything up; I’m asking you to market yourself in a way that I’m going to remember.
    A résumé is not a statement of facts. It’s a declaration of intent.


    # Nailing the Phone Screen


    As we discovered in last chapter, it’s almost a miracle when the phone rings and
    a recruiter wants to set up a phone screen. The fact is, someone, somewhere in
    the organization has successfully mapped you to an open position. This is a really
    big deal because, in my experience, the chance that you’ll get this job has improved
    logarithmically. It’s not 50/50, but it’s vastly better than when you were a random
    résumé sitting on my desk.


    As with last chapter, I’m going to walk you through the precise mental process
    I go through as part of the phone screen; but before we go there, let’s talk motivation.


    ## The Purpose


    I’ve got a requisition, a req. This roughly describes a job I have open in my
    team, but it’s likely not very precise. Job descriptions are notoriously broad
    and vague because I want to cast the net as wide as possible. It’s not just that
    I want to see as many candidates as possible; I want to see as broad a skill set
    as possible.


    This is important to remember as you’re scrubbing job opportunities. I know you’re
    stressing, “The job description says five years of Java required, and, well, I
    only have two.” Don’t be absurd. There are usually two buckets of skills in a
    job description: required and recommended. At the very least, you should be in
    the ballpark for required, but don’t give recommended a second thought. It’s recommended.
    It’s nice to have.


    Besides, you got a phone screen with me, so I’m already pretty sure that you’re
    close to a fit, but I still have questions, otherwise I would’ve just brought
    you in. The question is, what questions do I have? Guess what—your job is to figure
    that out.


    ## Your Job Is to Prepare


    Before you even talk to me, you’re on a fact-finding mission. You’ve got a job
    description, and after the phone screen has been set up, you’ve got my name. You
    might also have an idea of the product or technology associated with this gig,
    or you might not, but even without a product name, you’ve got plenty of information
    to start with.


    Do your research. Google me. Find out anything you can about what I do and what
    I care about. This isn’t stalking—this is your career, and if I happen to be an
    engineering manager who writes a weblog, well, you can start to learn how I think.
    Maybe I don’t have a weblog but I post to mailing lists. That’s data, too. How
    is this going to help you during the phone screen? Well, I don’t know what you’re
    going to find, but anything you can gather is going to start to build context
    around this job that you know nothing about. This helps with nerves as well. See,
    I have your résumé and you have nothing. A bit of research is going to level the
    information playing field.


    If you have a product name or technology, repeat the same process. What is the
    product? Is it selling well? What do other people think about it? I’m not talking
    about a weekend of research here; I’m talking an hour or so of background research
    so that you can do one thing when the phone screen shows up: you need to ask great
    questions.


    That’s right. In your research, you want to find a couple of compelling questions,
    because at some point during the phone screen I’m going to ask you, “Do you have
    any questions for me?” and this is the most important question I’m going to ask.


    ## Back to the Beginning


    Before I ask you the most important question, I need to figure out a couple of
    things. First, in a perfect world, we’d be able to skip the phone screen and just
    bring you in for a first round interview, but this rarely happens unless I already
    know you. What I need to know is:'
