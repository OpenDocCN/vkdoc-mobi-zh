  trans: '

    # 邀请谁？


    这是个棘手的问题。如果你邀请团队里的每一个人，那就什么也做不成……就算有全世界最优秀的引导者也没用。你必须从小处着手，让势头逐渐累积。这时候你可能会惹恼一些人，因为每个人都想参加这个会议，每个人都有发言权。如果你对初始话题有想法，就邀请那些你确信有真知灼见的人。如果你对从何入手毫无头绪，那就碰碰运气……随机挑选。你永远不知道工程师们在想些什么。好消息是，一个高效设计流程的最佳标志之一就是参与者会变化。这一点稍后会详述。


    在选择参会者时，你需要注意一个雷区：**阻碍者**。这些人已陷入完全被动反应的生活方式。你可以很容易地识别他们，因为他们倾向于将每个新想法与以往的经验进行比对，然后宣称这个想法“毫无新意”。这种态度的原因各不相同。也许他们是产品的早期设计者，无法摆脱原始设计的束缚。也许是出于对未知的恐惧。无论原因如何，这些人都是创造力的杀手，不是你最初头脑风暴会议想邀请的人。


    # 内容


    第一次头脑风暴会议的目标是开始重温上一轮发布的痛点。你讨厌推迟哪个 Bug？哪个功能没能实现？谁讨厌这个用户界面？所有人都讨厌？嗯，我想也是。喂，我们的客户到底是谁？你希望在第一次头脑风暴会议结束时，能带着五个大家想要解决的热点话题离开。


    第二次会议是你的原型会议。你希望在原型中看到上次头脑风暴会议的结果……纸面、代码、线框图、要点列表都行。只要有记录上次会议成果的文档证据，形式并不重要。也许你只有一份客户类型列表？或者一份团队讨厌产品的五件事列表？你在此的目标是会议之间有文档化的连贯性。这些文档最终会演变成模型或实际可用的原型，但在起步阶段，文档的重点是记住上次到底发生了什么。


    当你真正开始制作模型或原型时，请保持它们的轻量级并避免细节。如果到了第三周，团队还在争论哪些图标该放在哪里，那就陷得太深了。在将应用视觉化地连接起来时，我个人比较喜欢线框图。它们能提供视觉构思的所有几何结构，却不会暗示出具体的外观或感觉。


    # 有效吗？


    好吧，你的“兰兹创造力计划”已经实施了两周，进展却不顺利。第一次会议上没人说话，因为他们以前从未被问过意见。整个会议就你站在白板前，大家频频点头。由于缺乏头脑风暴的内容，第二次原型会议也变得索然无味，所以你只能继续头脑风暴。到了第二周，大家开始说话了，但是……嗯，他们是在喊叫，因为对于客户到底是谁存在根本性的分歧。这是痛苦的进步，但等你进入第二次原型会议时，大家又都沉默了，因为谁愿意被吼呢？


    干得好。真的。


    在最初的头脑风暴会议中，思绪磕磕绊绊、四处碰壁，这其实是件大事。这种看似缺乏思维协调的现象，正是发现创新的关键所在……但你仍然需要了解自己是否取得了进展。随着时间一周周过去，你可以留意以下几点：


    -   **是否在做决策？** 团队是否能够良好协作以作出决定？是的？很好。

    -   **决策是否被重新审视？** 团队是否足够灵活，能够回溯并优化之前的决策？这样更好。

    -   **决策是否被反复重新审视？** 好吧，这里有问题。你的团队陷入了创意的涅槃状态。此时正好退后一步，为流程引入一些结构。回顾迄今为止的决策是寻找结构并向前推进的好方法。哦，你没有记录头脑风暴会议的结果？哎呀。现在开始记吧。

    -   **参与者是否在变化？** 如果已经过了四周，但围坐在桌旁的面孔还没变，那可能就有问题了。如果你正在做一个大型项目，从一开始就不可能选对了头脑风暴团队。必须把会议室之外的各种思想也引入讨论中来。是时候开始换换人了。

    -   **关于设计的基要真理是否浮现？** 这些是头脑风暴的成果结晶。它们是那些定义了问题基本设计的决策。当它们出现、经受住质疑、并最终在走廊里像病毒般传播开来时，你就会意识到它们。

    -   **是疗伤还是工作？** 如果你刚刚经历了一场残酷的发布，团队会在最初的头脑风暴会议上发泄情绪。这没关系，他们需要这样。但如果到了第三周还在发泄，那就该做出改变了。

    -   **是否出现了“我靠”时刻？** 类似于发现基要真理，但声音更大，且不常发生。*“我靠*，我们完全错了。” “我靠”时刻具有破坏性，但却是灵活创意过程的好迹象。

    -   **待办事项列表在增长还是在减少？** 如果你处于设计阶段的早期，它应该是在增长。如果你接近设计阶段的尾声，它最好是在减少。我知道工程师们想在任何一个大版本中解决产品里的所有问题，但*这种事永远都不可能发生*。“更好”是“完成”的敌人，如果这是你的项目，你需要划清一条线，确定你打算处理哪些话题/想法，并坚持下去。


    我的经验法则是，如果你每次会议都没有一个艰难的决策要面对……那可能就是在浪费时间。你找错了人和/或选错了引导者，虽然花一个小时聊聊天确实挺有趣……但你所做的仅限于此，就是闲聊。


    # 何时停止


    如果你的会议是健康的，会议自然会从一个话题转移到另一个话题。决策被建立，想法被检验，争论会发生，原型会被评审。我发现，随着你从硬核设计阶段过渡到紧张的开发阶段，这些会议会逐渐自然减少。如果没有减少，那你可能是对思考上瘾了。这听起来很诱人，但你并不是在大学工作，你是在为股东工作，他们希望昨天就看到新产品。在开发过程中，你仍然可以微调设计，但你希望在会议中看到的趋势是：问题正在被解答，而不是被创造出来。


    # 对抗停滞


    谷歌深知必须留出思考的时间。有传言说，他们要求员工每周花一天时间做自己的项目。算一下吧。谷歌将 20% 的工程预算投资于思考。我确信这些项目中的大部分不会产生任何成果，但谷歌从这个制度中获得了两个好处。首先，一些项目为公司创造了价值。可能五分之一吧，但这并非真正的价值所在。谷歌通过允许员工四处探索、碰撞，从而创造了一种思考的文化。

    '
- fmt: '# I don’t know what you do and I don’t know what you build. I am certain that
    if you don’t demonstrate creative thinking in what you build, you’re screwed because
    you, your team, and your product will stagnate. Kicking off brainstorming meetings
    are a tricky proposition. They are poorly defined, hard to run, and harder to
    measure. What comes out of these meetings might be brilliance or stupidity … the
    difference between the two is magnificently slim. Good luck.


    # CHAPTER


    # The Value of the Soak


    In 2006, I gave a presentation at the South by Southwest conference in Austin,
    Texas. My pitch was this: in creating a startup, you’re going to be faced with
    a thousand seemingly inconsequential decisions. Tucked among those thousands of
    decisions are five decisions that actually matter. These decisions will change
    the face of your company. What I didn’t say was that I believe it’s next to impossible
    to figure out which decisions matter and which ones do not.


    How depressing.


    Here’s the deal: you can spend a lot of energy deciding what the big decisions
    might be, but that’s much less important than making the decision. There’s a pile
    of thoughts on creating decision-friendly environments in [Chapter 21](#9781430243144_Ch21.xhtml),
    but that chapter focuses on the idea of thinking in a team scenario, and I want
    to talk about when you choose to take your thinking solo.


    Let’s start with the most infuriating e-mail you’ve ever received. I’m not talking
    about that jerk in tech support who is simply stupid, I’m talking about the e-mail
    from someone you trust … a peer … pissing you off in e-mail by commenting on a
    problem that needs to be solved and perhaps casting doubt on your ability to solve
    it. You’re going to want to react to this e-mail in the same manner as if I came
    into your office and punched you in the face. It’s your animal brain at work and
    it served you well when you were living in a cave doing the hunter-gathering thing
    because reacting slowly meant you were eaten or punched again.


    Now. You have time to *soak*.


    The soak is when you plant the seed of a thought in your brain and let it bump
    around in a rich stew of ideas, facts, and whatever other random crap that seems
    to relate. The soak is a protected activity that will rarely occur during your
    busy day because you’re busy reacting to the familiar never-ending flood of things
    to do. The goal of the soak is simple: an original thought. Whatever the problem
    is that you’re stewing on, you want to find a glimmer of inspiration that transforms
    your response from a predictable emotional flame-o-gram into a strategically considered
    thought and, ultimately, decision.


    # Emotion and Ignorance


    At a prior gig, I was finally hitting my stride. After a two-year awkward getting-to-know-the-company
    phase, I was in the groove. I knew who was doing what, who was hungry, and who
    was coasting. I’d turned a small, bright idea of a product into a successful moneymaker,
    so my boss decided to saddle me with something completely different. An entirely
    new product built on technology I’d never used. It was a strategic-shift product
    for the company, which meant everyone would be watching. This visibility would
    amplify potential fuck-ups. This was the career-defining product for me.


    Holy shit.


    Having no clue where to start a new project and wanting to rip someone apart in
    e-mail share one important characteristic. The best move in both cases is to start
    with a good long soak.


    I break soaking activities into two buckets: *active soaks* and *passive soaks.*
    The active soaks are activities that you can direct and usually involve gathering
    content, whereas passive soaks are activities when you just point your brain in
    a random direction and pray. Passive soaks are where the real work gets done—provided
    you laid the groundwork with an active soak. Let’s start with that first.


    ## Active Soaking


    *Ask dumb questions.* Your first job when faced with ignorance is information
    acquisition, and, hopefully, there are folks out there who’ve already done some
    soaking. These folks have some facts, ideas, and opinions regarding whatever the
    problem might be, and you need to hear them all. The first five of these conversations
    can be awkward for managers because it’ll be obvious after your first two questions
    (“What is it?” and “How does it work?”) that you have absolutely no clue what’s
    going on and you think it’s a manager’s job to appear knowledgeable.


    Wrong. It’s a manager’s job to be clued in. You work in an industry populated
    with engineers, and these are folks who are paid a lot of money to care about
    the details, and that means they see right past feigned knowledge. Sure, they’re
    not saying anything because you’re the boss, but, um, you look stupid.


    Soaking starts out uncomfortable, but with each ignorant question you ask, you’re
    adding content to that managerial brain of yours. Asking dumb questions is the
    best way to start figuring out what is actually going on. Furthermore, asking
    any question of your team is a handy way to indirectly say, “I care about what
    we’re doing enough to ask you what you think.”


    *Pitch a stranger.* Once you’ve asked enough dumb questions, a picture will start
    to form in your mind about what exactly you’re doing. It’s not a complete picture,
    it’s more a rough sketch coupled with the mild relief that accompanies the sudden
    absence of ignorance. Now you’ve got to test your understanding with a qualified
    someone who is willing to listen to you ramble. Pitch this person on your picture
    and see what happens. Lots of nodding? Great, it’s coming together. Blank stare?
    Oops, time for more dumb questions starting with the person you just pitched.


    What I find when I pitch a stranger is that the words coming out of my mouth have
    very little to do with the picture that’s in my head. The act of linearly mapping
    my thoughts into words and sentences exposes flaws or gaps in my thinking that
    I never find when the ideas are swirling around my head. This leads me to our
    next step.


    *Write it down, throw it away, write it down again.* Once your stranger is no
    longer totally confused by your idea, it’s time to write it down. This is the
    same process as pitching the stranger in that you’re finding another medium to
    test your idea. The stranger gave you a chance to verbalize your pitch; writing
    it down routes your idea through a completely different part of your brain and
    then down through your fingers. Seeing the words on a piece of paper or flat panel
    monitor will, once again, expose gaps you can’t see in the picture in your mind.
    Those gaps prove you’ve got more dumb questions, so go ask them, write it down
    again, and then throw it away. That’s right, don’t just close the document window;
    you need to get rid of everything you just wrote down. Toss it, empty the trash,
    and step away from the computer.


    I know you’re attached to some part of that document that you wrote—some witty
    thought that elegantly captured an angle on your problem—but remember what we’re
    trying to solve here. This isn’t whether or not you should get a blueberry-orange
    muffin on the way to work, this is a decision that matters, and solving it elegantly
    means you want to visit and revisit your response as many times as possible. Consigning
    your first written draft to the ether might forever lose a piece of wit, but if
    that wit shows up in the second draft, I guarantee that it belongs there and you’ll
    never lose it again.


    ## Passive Soaking'
