    Crap. You’ve been saddled with an impossible task, and after a weekend of no sleep,
    you have confirmed, yes, the task is impossible. In fact, you’ve started, you’ve
    iterated, and you still have no clue how to actually complete the task. Story
    time.


    This spring I had a crew come up to clear some brush on the property. Now, the
    property is a pleasant combination of oaks, bays, and redwoods, but much of it
    had become overgrown and inaccessible. My first thought when I moved in was, “Hell
    yes, I’ve got clearing mojo!” My thought after one weekend of clearing, when I
    was partially successful at clearing up 50 square feet of 5 *acres of forest*
    was, “Impossibly boring.”'
