    # CHAPTER: Taking Time to Think


    Lunch at Don Giovanni’s with Phillip. He’s amped. We haven’t even seen our waiter
    and he’s already cleared the table and is scribbling furiously on the white paper
    tablecloth.


    “See, we needed to speed up our release cycle, which is, of course, insane, but
    we figured out a way! We call it train releases. We’ve got four releases going
    at the same time and a train leaves the station every month. If a feature is ready
    to go, it gets on the train, and if it’s not, it waits for the next train. We’ve
    already released two trains in six weeks!”


    I nod, watching the scribbles become increasingly incoherent. I’d buy Phillip
    a nice glass of Chianti to take the edge off, but he’s a Mormon, so I try the
    truth.


    “Phil, you’re screwed twice. First, you’re screwed because you’re going to need
    twice the staff—at least—to qualify these ever-increasing releases, and you’re
    a startup. You’ve got one QA guy, and if he hasn’t blown a fuse yet, just wait
    a month. Second, and most important, you’ve got no downtime. You’ve got no time
    to design because everyone is going to be panicked about which train they’re supposed
    to be riding.


    “Phil, in order to create, you’ve got to think.”


    ## Reacting vs. Thinking


    Why can’t you think when you’re busy?


    Dumb question, right? Answer: “I can’t think because I’m busy.” Wrong. You can’t
    think because when you’re busy, you’re not thinking, you’re reacting.


    Example: You walk into my office and start yelling, “Rands, it’s two days from
    shipping and we’ve just found a bad bug, a showstopper. What do we do? Are we
    screwed?”


    I will respond and my response might look like thinking, but I’m not doing anything
    creative because I’ve dealt with the showstopper-two-days-before-ship scenario
    *in every product I’ve ever built.* Survived it each time, too. Got some great
    stories. It’s that experience I’m using when you walk into my office and tell
    me the sky is falling. I’m not actually doing anything new, I’m just telling you
    the story of how I propped the sky up last time.


    Yes, you can argue that one can be exquisitely creative when one’s hair is on
    fire. It’s the “necessity is the mother of invention argument”; but, seriously,
    if your hair’s on fire, are you going to take the time to seriously consider all
    hair-dousing techniques, or are you just going to stick your head in the nearest
    convenient bucket before it really hurts? Panic is the mother of the path of least
    resistance.


    You won’t be a successful manager without well-developed react instincts. A quiver
    full of experience gives you all sorts of arrows to shoot at problems, and the
    timing and accuracy of some of those shots will be brilliant, but your quiver
    will slowly empty unless you take the time to think.


    For the sake of this chapter, let’s partition your brain—one half is the creative
    brain. This is the part of your brain that is the source of inspiration. The other
    half of your brain is your reactive brain. This is the part of the brain that
    loves it when the sky is falling because it gets to move so gosh-darned quick.


    Your reactive brain doesn’t actually like to think because thinking is messy.
    Thinking involves slowing down and actually soaking in a problem, and your reactive
    brain thrives in the familiar. Your creative brain loves the unknown. It’s a sponge
    and it’s only happy when it’s full of new ideas. This is part of the reason thinking
    is hard to pull off at work—it doesn’t fit nicely into the daily course of business
    because it’s full of mind-bending paradoxes and uncomfortable realities your mechanical
    manager is going to barf all over. Some examples:


    *   Thinking is not something you can constrain by time or a meeting. There is
    no beginning and there is no end—you never know when you’re done.

    *   Doing more thinking always pays off, but time is money and you’ve got 27 other
    meetings this week.

    *   The more people you include in the thinking process, the more genuine ideas
    you’ll find, but the process of finding those ideas will linearly slow down with
    each person who shows up.

    *   Everyone thinks differently.


    The time to kick off your deep thinking is right after your last major release.
    It’s when every single lesson of the prior release is forefront in the team’s
    mind. They’ve just gone through the crunch where they had to stare at each poor
    design decision illuminated by repeated painful deferral of bugs. They’re exhausted,
    but they have hope because they know they can fix it in the next release.


    ## Getting Started


    The first step is defining a time when the team can think. In the past, I was
    a fan of kicking things off with an offsite meeting. A good solid day of thinking
    somewhere other than corporate headquarters where folks can forget about their
    daily professional woes. The problem with this is that while everyone loves a
    field trip, the day is an illusion. Sure, the coffee tastes different and, yeah,
    everyone seems really excited about the next version, but tomorrow you’re going
    back to headquarters, which is where you’re going to do 95 percent of your actual
    thinking. You’ve got to create a thinking-conducive environment in your natural
    setting.


    Start with two meetings a week. The first is a brainstorm meeting and the second
    is a prototype meeting. Both are, at least, an hour long.


    Make sure there is time between the brainstorm and prototype meeting. Give everyone
    involved time to stew on the results of the brainstorm meeting. Conversely, you
    don’t want to wait too long to see a prototype because you’ll forget the context
    of the initial brainstorm. Once-a-week meetings are a study in futility because
    folks forget everything during the course of a weekend and meetings end up rehashing
    the same thoughts from the week before.


    ## Players


    When the meetings begin, you need a driver. Maybe it’s you, maybe it’s not. There’s
    another paradox here. Structured thinking kills thinking, but unstructured thinking
    leads to useless chaos. Your meeting driver must be able to swerve the conversation
    back and forth between the two extremes, but generally keep it in the middle.
    Organics (see [Chapter 36](#9781430243144_Ch36.xhtml) for more on organics) tend
    to be best at this. More on this in a bit when we figure out if your meeting is
    actually working.'
