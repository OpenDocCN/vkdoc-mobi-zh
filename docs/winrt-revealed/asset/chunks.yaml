- fmt: '# So Yes, the Cons *Do* Want Something Here


    You’re going to meet their needs in order to get out the door, and their needs
    are simple—so simple you’re going to laugh. The cons need a plan, some assurance
    that will somehow address whatever the issue is. Doesn’t matter if that plan comes
    from the pawn, the player, the pro, or the con. Someone needs to synthesize everything
    into constructive next steps and *communicate that to* the cons, and then you’re
    done. You’re out the door.


    Doesn’t need to be a great plan, or an honest plan, or even a complete plan. Cons
    will not let you out of that meeting until there is the perception of forward
    progress. If you’ve scheduled an hour and that hour is up, you’re thinking, “Well,
    that’s one way out.” Again, incorrect, because the cons are returning to their
    desks and scheduling a follow-up meeting where the organizational ineptitude is
    going to continue.


    ## Meeting Bail Tip #7: Figure Out the Issue


    You might very well have the requisite players, pros, and cons, but then again,
    you might have too many. If it’s 30 minutes in and you still can’t figure out
    what the issue is, it’s time to go: too many issues. Someone who cares more than
    you needs to distill this chaos down to a coherent statement so the pros and cons
    can argue about one thing.


    ## Conclusion


    Meetings are always going to be inefficient because language is hard. Getting
    folks in the same group, with the same organizational accent, to talk coherently
    to each other is hard enough. Meetings give us the opportunity to include other
    organizations with other accents. This makes the language chaos complete. Now,
    you don’t care. You don’t need to know what they’re saying because with agenda
    detection, you can figure out who they are, what they want, get it for them, and
    get the hell out.


    # CHAPTER: Dissecting the Mandate


    In your quiver of management skills, you’ve got a couple of powerful arrows. There’s
    the annual review, where you take the time to really explain, in detail, what
    a given employee needs to do to grow. That’s huge. That can be life changing.
    That’s a big arrow. How about the layoff? That’s when you get asked who stays
    and who goes. You’re going to lose some sleep when you’ve got to pull the bow
    back on that one.


    Then there’s the mandate. The mandate is when you gather the team together and
    calmly say, “This is the way it is.” No Q&A. No collaboration. It’s your dictate
    handed down from on high.


    Most folks have learned to despise the mandate.


    Rewind a few years back. I’m at my prior gig and we’ve just hired a new VP I really
    liked. This guy was sharp, experienced, had a litany of name brand companies on
    his resume, and he could tell a joke. Sold. Hired.


    He was pretty quiet the first few weeks, checking out the landscape, sitting in
    on various meetings and listening. Engineering was in the process of discussing
    some drastic new directions for our products, and the incrementalists (ship it
    soon!) were doing battle with the completionists (ship it when it’s done!). Tensions
    were high. There was finger pointing, yelling … all the things you aren’t supposed
    to do in business, but *they feel so good* when you *know you’re right.*


    The VP’s second month arrived and we were still yelling. Then, in one of my Wednesday
    one-on-ones with the VP, he simply told me, “We are going to do it like this.
    End of discussion.”


    Right, so of course I started spewing, “See, we still have to resolve issue #27
    and, boy, are the completionists going to be pissed, and have you even thought
    about risk #12A?” He let me go on for a while, and then he repeated himself: “We
    are going to do it like this. End of discussion.”


    I might have nodded, I don’t remember.


    As predicted, the team freaked. One completionist assured us he was going to quit.
    He slammed his door. The incrementalists weren’t happy either because they didn’t
    like being told what to do. They like to run the show. We had a good solid week
    of organizational disarray and then we got back to work.


    The new VP employed the mandate. He said, “I’m the guy who’s telling you the way
    it is.”


    There is a fine line with the mandate. It is just as easy to convey, “Shut up
    and get moving,” as it is, “This is the move and I’m the guy you can blame if
    it’s a bad call.” Your job as a manager is to move the team forward without hurting
    morale.


    There are three distinct phases to the mandate: Decide, Deliver, and Deliver (Again).
    Since you are the ultimate decision maker regarding this particular matter, we’re
    going to call this a *local mandate.* These are opposite of *foreign mandates*,
    which we’ll talk about later. Let’s begin.


    ## Decide


    Your first step is to decide when to employ the mandate and to also understand
    what the consequences are. There are thousands of little tiny decisions you and
    your team make during the course of a day. A majority of these decisions come
    and go and no one is the wiser. Every so often, a big decision comes along. Doesn’t
    matter what the content is, what matters is that some portion of your team is
    on one side of the decision and another group is on the other side. And they’re
    arguing.


    Collaboration, cross-pollination, debating, arguing. Whatever you want to call
    the process, well, it doesn’t always work. Sometimes the team is so polarized
    that they start confusing the emotion with the decision. Rather than arguing the
    facts, they begin to argue from their heart and that is when you need to consider
    the mandate. Rule of thumb: When the debate is no longer productive, it’s time
    to make a decision.


    My management style is to allow the team to argue as long as possible. I’ve got
    a collaborative management style because I know that the more brains and more
    time the team spends staring at an idea, the stronger the idea becomes. This means
    that decision-making in groups that I manage tends to be slower because I’m busy
    cross-pollinating. Consequently, I’m certain it means our output is higher quality
    because we’ve taken the time to consider what the hell we’re doing.


    Remember that for every person on the team who has a strong opinion regarding
    the decision, there are probably four other coworkers who just want someone to
    make a decision so that they can get back to work. We’ve each been part of the
    silent majority before. It’s the time when you choose to not engage in the heated
    debate. Maybe because you’re doing actual work or perhaps you just don’t care.
    You appreciate your silent status as you see the debate rage in the hallway and
    realize how much pain, sweat, and tears you saved by staying out of it. When the
    team is still yapping away two weeks later, you start to wonder when someone is
    going to shut these people up.


    Mandates are the friend of the silent majority. Even if you really annoy the concerned
    parties, the silent majority will appreciate the peace and quiet once you’ve delivered
    your verdict.


    ## Deliver


    The purpose of this chapter is not to explain how to make whatever hard decision
    you need to make regarding the heated topic in your organization. I don’t know
    what the topic is, so you’re on your own. I will say that if you don’t spend time
    considering both sides of the issue before you deliver, then your team will know
    it and your credibility will be suspect. Those on the losing side will wonder
    why they weren’t consulted and then they’ll start wandering the halls murmuring
    that you’re either lazy or a tyrant. Ouch.'
