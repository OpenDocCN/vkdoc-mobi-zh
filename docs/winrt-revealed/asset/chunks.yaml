    to tape it to a target, step back, pull out the right arrow, and fire. Whether
    you hit the target or not, there’s a gratifying plunk sound. That’s the sound
    of progress.


    We all have managers, and whether you’re the director of engineering or an individual
    contributor, one of your jobs is to figure your manager out. What does he want?
    How does he deal with a crisis? How does he communicate? As you learn each of
    these lessons, you get an arrow. It’s not only a reminder that you learned something,
    but it’s a tool you throw in your quiver so that the next time you see a similar
    problem you grab the right arrow, carefully aim, and shoot.


    CHAPTER


    Don’t Be a Prick


    The beauty of writing for the web is that there really is no plan. I have the
    luxury to mentally fumble about with any topic. Increasingly, those topics have
    focused on engineering management, and with the publication of each article, I
    increasingly received the email asking, “Where’s the book?” Yeah so, I’d always
    wanted to publish a book, but there’s a problem. What’s the pitch? *Be a good
    manager? Zzzzzzzzz.* I needed a compelling truth that elegantly tied all of my
    reposings together.


    Flash back to the middle of the dot-com implosion. We, the merry crew of a failing
    startup, are drinking … a lot. There are various bars around corporate headquarters,
    and each has a distinct purpose. There’s the dive bar that’s great for post-layoff
    parties. The booze is cheap, and if you’re looking to blow off some I’m-really-not-worthless
    steam, you can pick a fight with the toothless sailor slung over the bar or the
    guy who just laid you off.


    Down the street is the English pub. The beer is better, they have a selection
    of whiskey, and they have edible food. This is where we get philosophical about
    the current organizational seizure we’re experiencing in our three-year slide
    toward irrelevancy.


    We’re there now. We’re drinking heavily because the company has just been sold
    to a no-name public company who will quickly dismantle the one for which we’ve
    bled. Everyone knew we’d be here at some point, but no one expected to be the
    last one standing. And no one expected the CEO to show up.'
