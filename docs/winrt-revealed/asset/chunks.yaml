- fmt: '# And then you’re going to make a big, bad decision and you’ll remember: “With
    great power comes great responsibility.” As a manager, you are responsible for
    making great decisions and the best way to do that is to involve as much of the
    team as possible in every decision.


    Your team is collectively smarter than you simply because there are more of them.
    More importantly, by including them in the decision process and creating a team
    where they feel they can say no, you’re creating trust.


    A team that trusts you is going to look out for you. They’ll never sit back and
    watch as you merrily traipse into Crazy Town staring at the back of your hat thinking,
    “I wonder who gets the top hat next?”


    # PART II


    ## The Process Is The Product


    People screw up. Every single one of us. There are the anonymous screw-ups that
    no one but us recognizes, and then there are the public ones—the embarrassing
    disasters where you look up and all eyes on the team are on you. Whoops.


    To prevent these screw-ups, the more organized members of the team create process.
    Their goal is to provide structure around the work we do and to eliminate guessing.
    These people are well intentioned, but they still annoy the folks who know, first,
    we’re always going to screw up no matter how much process we have and, second,
    that screwing up often reveals more useful information than not screwing up.


    Process creates a delectable, healthy tension between those who measure and those
    who create. In this tension, there are useless meetings, yelling in the hallways,
    and flame mails. I’d like to think the following chapters will help you avoid
    these conflicts, but you need them. Like a good screw-up, a healthy argument provides
    a different perspective, which, if everyone is paying attention, will help the
    process evolve. And love it or hate it, the process is how you build a product.


    # CHAPTER 1.0


    Max was a mess. We were on our third mojito at the Basin in Saratoga when it just
    came pouring out of him. The last 72 hours involved this:


    *   Two days in Los Angeles babysitting a customer’s data center.

    *   Four hours of sleep.

    *   Two huge arguments with his wife on the cell phone.

    *   A marathon conference call with his boss, which resulted in a new trip to
    Chicago in two days.


    The mojitos might’ve been talking, but it sounded like Max was sure that his wife
    was going to leave him; his company was about to crumble; and he was 12 hours
    and one plane flight from a nervous breakdown.


    He said, “Shipping a 1.0 product isn’t going to kill you, but it will try.”


    ## Understanding 1.0


    In your career as a software developer, you’re going to be screwed at some point.
    My advice is keep thinking, don’t yell, treat those you work with decently, and
    you’ll be fine. It’s valuable experience, but it’s nothing compared to 1.0.


    1.0 is developing the first version of a new product. It’s what all those startups
    are busily doing right now. They’re working on some 1.0 idea that’s good enough
    that a handful of bright people will forgo their lives in support of the chance
    of being right. *See,* we had a great idea. We’re bazillionaires and we were right.


    Most of those startups fail.


    Before the Web site Fucked Company, failing was a quiet, somber thing. The dot-com
    explosion made colossal flameouts front-page news, and everyone discovered what
    most of us already knew.


    Really. Most startups fail.


    Why?


    To understand the difficulty of 1.0, I need to give you a model for understanding
    how a 1.0 software product actually shows up. I’ve designed just such a model
    by heavily borrowing from a theory known as `Maslow’s Hierarchy of Needs`, which
    is worth talking about all by its lonesome.


    `Maslow’s` theory contends that as humans meet their basic needs, they seek to
    satisfy successively higher needs that occupy a set hierarchy, as shown in [Figure
    19-1](#9781430243144_Ch19.xhtml#F1).


    ![image](images/9781430243144_Fig19-01_fmt.jpg)


    [Figure 19-1](#9781430243144_Ch19.xhtml#FG1) `Maslow’s Hierarchy of Needs`


    At the bottom of the pyramid is the biggest area of need: physiological needs.
    These are the basics: food, drink, air, sleep, etc. The idea is that you won’t
    be able to focus on anything else in the hierarchy if these needs aren’t met.
    Think of it like this: who cares about falling in love if you can’t breathe?


    Moving up the hierarchy, you have safety needs, love/belonging, esteem, and finally,
    the oddly named “self-actualization” tip of the pyramid, which is our instinctual
    need to make the most of our unique abilities. Translation: Writers write, singers
    sing.


    There’s a fine entry in Wikipedia regarding `Maslow’s hierarchy` if I’ve piqued
    your interest (see [http://en.wikipedia.org/wiki/Maslow’s_hierarchy_of_needs](http://en.wikipedia.org/wiki/Maslow''s_hierarchy_of_needs)).
    Personally, as a manager of humans, I stare at the hierarchy when dealing with
    folks on the edge. The hierarchy gives me insight into where exactly a person
    is stressing out. Are they in need of career advice? (Easy.) Or do they need marriage
    advice? (Harder.)


    ## Rands 1.0 Hierarchy


    In thinking about the difficulties of 1.0, I realized that `Maslow’s` model applied
    to shipping the first version of a product. There’s a hierarchy that defines what
    you need to build in order to ship 1.0, and it looks like [Figure 19-2](#9781430243144_Ch19.xhtml#F2).


    ![9781430243144_Fig19-02.eps](images/9781430243144_Fig19-02_fmt.jpg)


    [Figure 19-2](#9781430243144_Ch19.xhtml#FG2) `Rands 1.0 Hierarchy`


    Note regarding charts and graphs: Phillippe Kahn, the founder of Borland, told
    a great story about statistics that I think equally applies to charts and graphs.
    The story is, “Did you know it’s a statistical fact that people with larger feet
    tend to be better spellers? [Insert awe.] It’s because people with bigger feet
    are older.”


    Charts ’n’ graphs paint the world in a clean, linear fashion that serves one purpose:
    supporting the message of the author. Do not trust charts ’n’ graphs, but don’t
    let that lack of trust blind you to the intent of the story.


    ### Pitch


    At the top of the hierarchy, there’s Your Great Idea. I’m calling it “pitch” because
    I’ve got this alliteration thing going on. You can’t get anywhere in building
    a product or a company without a phenomenal pitch. It doesn’t matter if you’re
    Mr. Charisma; you’ve got to have the idea because it defines the structure and
    constraints of everything below it. If you don’t have the idea, you don’t know
    who to hire, which is the second layer—people.


    Before we talk about this second layer, let me first congratulate you. I’m tripping
    over myself happy that you’ve discovered the Next Big Thing, but there are some
    basic facts to pay attention to. The first is:


    *Fact #1: You’re in a hurry. Don’t forget it.*


    You’re a fool if you think you have exclusive rights to your pitch. There are
    too many bright people staring at exactly the same infinite pile of evolving information
    to assume your innovation is original. The only thing that gives you this right
    is delivering 1.0, and first, you’re going to need some people.


    ### People


    With your pitch in hand, you’re going to find the people to build your idea. These
    are your founders. These are the folks who will not only build your 1.0, but more
    importantly, your engineering culture. Their arrival presents a challenge and
    a twist to the pyramid.


    Your first few hires walk into a blank slate. Yes, they’re believers in the pitch—otherwise
    they wouldn’t be in the building—but now it’s their pitch, which means they’re
    going to ask the hard questions because they’ve got some skin in the game. These
    hard questions are going to help them start making decisions about the eventual
    products.'
