- fmt: '# 技术词汇表


    传统上，词汇表用于澄清书中的术语。事实上，我并未在本书中使用以下许多术语，但你仍然需要了解它们。


    无论你是经理还是为经理工作，总有人会用这些词语来迷惑你。他们会毫无预兆地在会议室中央抛出这些词，作为一种权力游戏，以此表明他们掌控着对话。也有某些人抛出这些词并装作自己明白其含义，以达到同样的效果。


    抵御这些词语的唯一武器就是知识。


    **1.0** —— 你将要开发的最困难的产品。


    **360 Review** —— 从你的同事那里收集的反馈，应该包含在你的`Focal Review`中。花时间提供建设性的反馈会增加你不与蠢人共事的可能性。


    **Action Items** —— 你应该记下来的事情。未能跟进`Action Items`会导致你的信誉逐渐受损。


    **Administrative Assistant** —— 作为经理的你最好的朋友。行政人员深谙公司内部运作，在完成任务方面常常能创造奇迹。他们也通常与内部消息渠道有联系。也有高管级别的这类人员。


    **Agenda** —— 任何会议必须完成的事项。如果会议的所有参与者都不了解`Agenda`，时间就会被浪费。


    **All-Hands** —— 全公司范围的会议，通常由`CEO`主持。如果你是一名经理，而这类会议上出现了很多意外情况，你可能已经与一线脱节了。人们常常觉得不得不在`All-Hands`会议上提出一些非常愚蠢的问题。


    **Android** —— 谷歌的移动操作系统，使用沙漠名称作为版本号。


    **Apple** —— 史蒂夫·乔布斯建立的王国。按市值计算，它是地球上最有价值的公司，但他们更希望你把他们看作出身草根的小公司，而不是庞然大物。


    **Architect** —— 了解自己工作的工程师。如果一位`Architect`说了些看似疯狂的话，值得追问几个问题，因为他们通常比你聪明。


    **At-Will Employment** —— 法律定义，指雇主和雇员都是“随意”雇佣的，这意味着他们可以随时解雇或辞职。他们甚至不需要给出理由。


    **Automation** —— `QA`的流行词，用于描述可以通过编程完成的测试。`Automation`总是被鼓吹为节省时间的方法……但它通常是个时间陷阱。


    **Background Check** —— 雇主在雇佣前进行的检查，用于确定你是否是一名连环杀手。


    **Beta** —— 开发过程中的一个里程碑，传统上紧随`Alpha`之后。过去这通常意味着产品可供特定客户群体使用——这些客户愿意忍受产品运行不完美。现在没人确定`Beta`意味着什么了。


    **Bellwethers** —— 你信任的核心面试官群体。


    **Board of Directors** —— CEO的老板。他们可以解雇CEO。他们倾向于制定广泛的公司政策，并拥有惊人的隐形能力。


    **Bonus** —— 意想不到的现金。如果你不是每年左右都能拿到一次`Bonus`，那你肯定做错了什么。你的老板应该能解释你需要改进什么。


    **Bugs** —— 工程师的编码错误，通常由QA发现。`Bugs`在产品周期后期是造成重大紧张局势的根源。


    **Build** —— 用于测试的产品内部版本。


    **Candidate** —— 已经进入公司面试流程的求职者。


    **Cave, The** —— 极客进入心流状态的地方。


    **CEO (Chief Executive Officer)** —— 坐在大办公室里的那个人。这是一份艰难的工作。CEO通常比你想象的还要忙碌。


    **CFO (Chief Financial Officer)** —— 告诉你能买多少台PC或Mac的人。


    **Checked Out** —— 一个在心里已经辞职的员工。无论你是否希望这个人真的辞职，你都应该意识到，一个`Checked Out`的人会以其持续的无用状态拖垮整个团队。


    **CIO (Chief Information Officer)** —— 告诉你能否使用Mac或PC的人。


    **Collaboration** —— 一个用来说服你与那些你宁愿避开的人共事的词语。


    **Completionist** —— 在产品设计上绝对必须做正确事情的人。他们在实用性方面的欠缺，被其卓越的想法所弥补。


    **Contractor** —— 一个似乎永远不会离开的临时员工。


    **COO (Chief Operations Officer)** —— 确保你的Mac或PC能够送达的人。


    **Credibility** —— 他人相信或信任你的程度。`Credibility`与信息一样有价值，但也同样难以衡量。


    **Cross-Pollination** —— 将一个团队产生的想法拿到另一个团队进行验证的行为。工程师们充满骄傲，不喜欢这样做，但`Cross-Pollination`常常能带来原始团队永远无法发现的改进。


    **Crunch Time** —— 没有周末的时候。


    **CTO (Chief Technical Officer)** —— 告诉你Mac和PC哪个更好的人。


    **Culture** —— 一种无形的凝聚力，将你的公司维系在一起。就像原力一样，但它是真实的。


    **Database** —— 一个方便存放数据的地方，前提是你喜欢数据有组织、有结构。


    **Director** —— 中层管理。这些通常是最后一批了解产品实际功能的经理。


    **Dividend** —— 支付给股东的利润份额。


    **Domain** —— 一个影响范围。（“那是市场部的`Domain`。”）


    **Doomed** —— 一个关键但未列入计划的产品里程碑，此时产品团队意识到他们严重落后，并决定全力冲刺。这个术语源自原始《星球大战》中的C-3PO。


    **Double-Click** —— 过去与鼠标操作有关；现在它是一个被严重滥用的管理术语，用作“让我们深入探讨一下”的过渡语。


    **Drug Test** —— 大公司采用的一种流程，通过这种流程，新员工被吓得大约30天内不敢饮酒或吸烟。


    **E-mail** —— 你收到垃圾邮件的方式。


    **EPS (Earning Per Share)** —— 分配给每股已发行股票的公司利润部分。这在大多数硅谷公司并不发生，所以不要抱太大希望。


    **Facebook** —— 你与那些你想忘记的人保持联系的方式。


    **Fired** —— 终止雇佣关系；通常用于极端情况。（“他在偷我们的东西！”）不能轻易使用，并且绝不能在没有`HR`深度参与的情况下使用。


    **Geek** —— 参见`Nerd`。


    **Flame Mail** —— 你不应该在冷静下来之前发送的电子邮件。


    **Focal Review** —— 每年与你的经理进行的、评估你绩效的会议。它通常被视为用来证明加薪或奖金合理性的工具，这掩盖了传递实际建设性职业建议的机会。


    **General Counsel** —— 公司里最重要的律师。


    **Grapevine** —— 一个内容丰富但充满错误信息的来源。


    **Google** —— 你搜索事物并接收广告的方式。


    **GUI (Graphical User Interface)** —— 一个老旧的术语，用于描述一个不那么糟糕的用户界面。


    **Hacker** —— 一个被不公平地赋予了负面含义的标签。虽然`Hacker`可能不怀好意，但他们主要感兴趣的是展示聪明才智。


    **Heinous** —— 糟糕。非常糟糕。可怕到天塌下来般的糟糕。极其恶劣。在产品周期后期对`Bugs`进行分类时，这个词很实用。


    **HI (Human Interface)** —— 苹果公司的用户界面。


    **Holistic** —— 一种管理风格，这种管理者关注整个公司而不仅仅是自己的团队。通常是中层管理者。


    **Holy Shit** —— 某种技术彻底震撼你或改变你生活的时刻。'
  raw: 'Traditionally, a glossary functions to clarify terms in a book. The fact is
    I haven’t used many of the following terms in this book, but you still need to
    know them.


    Whether you’re a manager or working for a manager, there are those out there who
    will use the words to confuse you. They’ll throw them out in the middle of the
    room sans definition as a power play—as an indication that they control the conversation.
    There are versions of these people who throw these words out and act like they
    know what they mean to achieve the same effect.


    The only defense against these words is knowledge.


    **1.0** — The hardest product that you’ll ever develop.


    **360 Review** — Feedback gathered from your peers, which is supposed to be included
    in your focal review. Spending time providing constructive feedback increases
    the likelihood that you won’t be working with idiots.


    **Action Items** — Things you should write down. Failure to follow up on action
    items results in a gentle erosion of your credibility.


    **Administrative Assistant** — Your best friend as a manager. Admins are heavily
    tapped into corporate machinations and are often able to work miracles when it
    comes to getting stuff done. They’re also usually tapped into the grapevine. There
    are executive versions of these folks, too.


    **Agenda** — The things that must occur for any given meeting to be completed.
    If all participants in said meeting are not aware of the agenda, time will be
    wasted.


    **All-Hands** — A company-wide meeting, usually run by the CEO. If you’re a

    manager and there are lots of surprises at these meetings, you might be out of
    touch. People often feel compelled to ask really dumb questions at all-hands meetings.


    **Android** — Google’s mobile operating system that uses deserts as version names.


    **Apple** — The house that Steve Jobs built. Based on market cap, the most valuable
    company on Earth, but they’d prefer if you thought of them not as huge, but scrappy.


    **Architect** — An engineer who knows what he/she is doing. If an architect says
    something that appears insane, it’s worth firing off a couple follow-up questions,
    as they are often smarter than you.


    **At-Will Employment** — Legal definition that states that both employer and employee
    are employed “at will,” which means they can fire/quit whenever they please. They
    don’t even have to give a reason.


    **Automation** — QA buzzword to describe testing that can be done programmatically.
    Automation is always pitched as a time saver … but it’s usually a time sink.


    **Background Check** — A pre-hire check employers use to determine whether or
    not you are a serial murderer.


    **Beta** — A milestone in the development process that traditionally follows alpha.
    This used to mean that a product was generally usable by customers—a select group
    of customers who were willing to put up with things not working quite right. No
    one is sure what beta means anymore.


    **Bellwethers** — The core set of people you trust to interview candidates.


    **Board of Directors** — The CEO’s boss. They can fire the CEO. They tend to set
    broad corporate policy and have amazing powers of invisibility.


    **Bonus** — Unexpected cash. If you’re not seeing a bonus at least every year
    or so, you’re doing something wrong. Your boss should be able to explain what
    you need to fix.


    **Bugs** — Coding errors by engineers often found by QA. Bugs are a source of
    significant tension late in a product cycle.


    **Build** — An internal version of a product that is used for testing.


    **Candidate** — A job applicant who has made it into the building.


    **Cave, The** — The place a nerd goes to get in the zone.


    **CEO (Chief Executive Officer)** — The guy/gal in the big office. This is a tough
    gig. CEOs are usually busier than you can imagine.


    **CFO (Chief Financial Officer)** — The guy/gal who tells you how many PCs or
    Macs you can buy.


    **Checked Out** — An employee who has already quit inside their head. Whether
    or not you want this person to actually resign, you should be aware that someone
    who is checked out brings down the entire team with their incessant uselessness.


    **CIO (Chief Information Officer)** — The guy/gal who tells you whether you can
    use a Mac or a PC.


    **Collaboration** — A word used to convince you to work with people you’d rather
    avoid.


    **Completionist** — An individual who absolutely must do the right thing when
    it comes to designing products. What they lack in practicality they make up for
    with their phenomenal ideas.


    **Contractor** — A temporary employee who never seems to leave.


    **COO (Chief Operations Officer)** — The guy/gal who makes sure your Mac or a
    PC arrives.


    **Credibility** — The amount others will believe or trust you. Credibility is
    as valuable as information, but it’s equally hard to measure.


    **Cross-Pollination** — The act of taking an idea generated by one team and vetting
    it with another. Engineers are full of pride and don’t like to do this, but cross-pollination
    often yields improvements that the original team will never discover.


    **Crunch Time** — A time when there are no weekends.


    **CTO (Chief Technical Officer)** — The guy/gal who tells you which is better,
    a Mac or a PC.


    **Culture** — An invisible binding force that holds your company together. It’s
    like the Force, except real.


    **Database** — A handy place to stick data if you like your data organized and
    structured.


    **Director** — Middle management. These are usually the last managers that are
    in touch with what the products actually do.


    **Dividend** — A share of profits paid to shareholders.


    **Domain** — A sphere of influence. (“That’s marketing’s domain.”)


    **Doomed** — An essential, unscheduled product milestone where the product team
    realizes they are way behind and choose to kick it into high gear. This term originated
    with C-3PO in the original Star Wars.


    **Double-Click** — Used to have something to do with a mouse; now it’s a heavily
    overused management term used as a segue to say “Let’s explore that a bit.”


    **Drug Test** — A process used by large companies whereby new hires are scared
    into not drinking or smoking for about 30 days.


    **E-mail** — The means by which you get spam.


    **EPS (Earning Per Share)** — The portion of a company’s profit allocated to each
    outstanding share of stock. This doesn’t happen at most Silicon Valley companies,
    so don’t get your hopes up.


    **Facebook** — The means by which you keep in touch with people you’re trying
    to forget.


    **Fired** — Termination of employment; usually used in extreme circumstances.
    (“He’s stealing from us!”) It is not to be used lightly, and never without the
    heavy involvement of HR.


    **Geek** — See Nerd.


    **Flame Mail** — An e-mail you should not send until you’ve had a chance to calm
    down.


    **Focal Review** — A yearly meeting with your manager where your performance is
    evaluated. It’s often seen as a vehicle for justifying raises/bonuses, which overshadows
    the opportunity to convey actual constructive career advice.


    **General Counsel** — The most important lawyer in the company.


    **Grapevine** — A content-rich source of false information.


    **Google** — The means by which you search for things and then receive advertising.


    **GUI (Graphical User Interface)** — An aging term used to describe a user interface
    that doesn’t suck.


    **Hacker** — A label that has acquired an unfair negative connotation. While hackers
    are capable of being nefarious, they’re mostly interested in being clever.


    **Heinous** — Bad. Really bad. Horrible, sky-is-falling bad. Grossly wicked. Handy
    term when classifying bugs late in the product cycle.


    **HI (Human Interface)** — User interface at Apple.


    **Holistic** — A manager who focuses his attention across the company and not
    just on his team. Traditionally middle management.


    **Holy Shit** — The moment when a piece of technology totally blows your mind
    and/or changes your life.'
  trans: '

    # 技术词汇表


    传统上，词汇表用于澄清书中的术语。事实上，我并未在本书中使用以下许多术语，但你仍然需要了解它们。


    无论你是经理还是为经理工作，总有人会用这些词语来迷惑你。他们会毫无预兆地在会议室中央抛出这些词，作为一种权力游戏，以此表明他们掌控着对话。也有某些人抛出这些词并装作自己明白其含义，以达到同样的效果。


    抵御这些词语的唯一武器就是知识。


    **1.0 版本** —— 你将要开发的最困难的产品。


    **360 度评估** —— 从你的同事那里收集的反馈，应该包含在你的`Focal Review`中。花时间提供建设性的反馈会增加你不与蠢人共事的可能性。


    **行动事项** —— 你应该记下来的事情。未能跟进`Action Items`会导致你的信誉逐渐受损。


    **行政助理** —— 作为经理的你最好的朋友。行政人员深谙公司内部运作，在完成任务方面常常能创造奇迹。他们也通常与内部消息渠道有联系。也有高管级别的这类人员。


    **议程** —— 任何会议必须完成的事项。如果会议的所有参与者都不了解`Agenda`，时间就会被浪费。


    **全员大会** —— 全公司范围的会议，通常由`CEO`主持。如果你是一名经理，而这类会议上出现了很多意外情况，你可能已经与一线脱节了。人们常常觉得不得不在`All-Hands`会议上提出一些非常愚蠢的问题。


    **安卓** —— 谷歌的移动操作系统，使用沙漠名称作为版本号。


    **苹果** —— 史蒂夫·乔布斯建立的王国。按市值计算，它是地球上最有价值的公司，但他们更希望你把他们看作出身草根的小公司，而不是庞然大物。


    **架构师** —— 了解自己工作的工程师。如果一位`Architect`说了些看似疯狂的话，值得追问几个问题，因为他们通常比你聪明。


    **自由雇佣** —— 法律定义，指雇主和雇员都是“随意”雇佣的，这意味着他们可以随时解雇或辞职。他们甚至不需要给出理由。


    **自动化** —— `QA`的流行词，用于描述可以通过编程完成的测试。`Automation`总是被鼓吹为节省时间的方法……但它通常是个时间陷阱。


    **背景调查** —— 雇主在雇佣前进行的检查，用于确定你是否是一名连环杀手。


    **测试版** —— 开发过程中的一个里程碑，传统上紧随`Alpha`之后。过去这通常意味着产品可供特定客户群体使用——这些客户愿意忍受产品运行不完美。现在没人确定`Beta`意味着什么了。


    **领头羊** —— 你信任的核心面试官群体。


    **董事会** —— CEO 的老板。他们可以解雇 CEO。他们倾向于制定广泛的公司政策，并拥有惊人的隐形能力。


    **奖金** —— 意想不到的现金。如果你不是每年左右都能拿到一次`Bonus`，那你肯定做错了什么。你的老板应该能解释你需要改进什么。


    **缺陷** —— 工程师的编码错误，通常由 QA 发现。`Bugs`在产品周期后期是造成重大紧张局势的根源。


    **构建版本** —— 用于测试的产品内部版本。


    **候选人** —— 已经进入公司面试流程的求职者。


    **洞穴** —— 极客进入心流状态的地方。


    **首席执行官** —— 坐在大办公室里的那个人。这是一份艰难的工作。CEO 通常比你想象的还要忙碌。


    **首席财务官** —— 告诉你能买多少台 PC 或 Mac 的人。


    **心已离职** —— 一个在心里已经辞职的员工。无论你是否希望这个人真的辞职，你都应该意识到，一个`Checked Out`的人会以其持续的无用状态拖垮整个团队。


    **首席信息官** —— 告诉你能否使用 Mac 或 PC 的人。


    **协作** —— 一个用来说服你与那些你宁愿避开的人共事的词语。


    **完美主义者** —— 在产品设计上绝对必须做正确事情的人。他们在实用性方面的欠缺，被其卓越的想法所弥补。


    **合同工** —— 一个似乎永远不会离开的临时员工。


    **首席运营官** —— 确保你的 Mac 或 PC 能够送达的人。


    **信誉** —— 他人相信或信任你的程度。`Credibility`与信息一样有价值，但也同样难以衡量。


    **交叉授粉** —— 将一个团队产生的想法拿到另一个团队进行验证的行为。工程师们充满骄傲，不喜欢这样做，但`Cross-Pollination`常常能带来原始团队永远无法发现的改进。


    **冲刺期** —— 没有周末的时候。


    **首席技术官** —— 告诉你 Mac 和 PC 哪个更好的人。


    **文化** —— 一种无形的凝聚力，将你的公司维系在一起。就像原力一样，但它是真实的。


    **数据库** —— 一个方便存放数据的地方，前提是你喜欢数据有组织、有结构。


    **总监** —— 中层管理。这些通常是最后一批了解产品实际功能的经理。


    **股息** —— 支付给股东的利润份额。


    **领域** —— 一个影响范围。（“那是市场部的`Domain`。”）


    **完蛋了** —— 一个关键但未列入计划的产品里程碑，此时产品团队意识到他们严重落后，并决定全力冲刺。这个术语源自原始《星球大战》中的 C-3PO。


    **双击** —— 过去与鼠标操作有关；现在它是一个被严重滥用的管理术语，用作“让我们深入探讨一下”的过渡语。


    **药物测试** —— 大公司采用的一种流程，通过这种流程，新员工被吓得大约 30 天内不敢饮酒或吸烟。


    **电子邮件** —— 你收到垃圾邮件的方式。


    **每股收益** —— 分配给每股已发行股票的公司利润部分。这在大多数硅谷公司并不发生，所以不要抱太大希望。


    **脸书** —— 你与那些你想忘记的人保持联系的方式。


    **被解雇** —— 终止雇佣关系；通常用于极端情况。（“他在偷我们的东西！”）不能轻易使用，并且绝不能在没有`HR`深度参与的情况下使用。


    **极客** —— 参见`Nerd`。


    **愤怒邮件** —— 你不应该在冷静下来之前发送的电子邮件。


    **焦点评估** —— 每年与你的经理进行的、评估你绩效的会议。它通常被视为用来证明加薪或奖金合理性的工具，这掩盖了传递实际建设性职业建议的机会。


    **总法律顾问** —— 公司里最重要的律师。


    **小道消息** —— 一个内容丰富但充满错误信息的来源。


    **谷歌** —— 你搜索事物并接收广告的方式。


    **图形用户界面** —— 一个老旧的术语，用于描述一个不那么糟糕的用户界面。


    **黑客** —— 一个被不公平地赋予了负面含义的标签。虽然`Hacker`可能不怀好意，但他们主要感兴趣的是展示聪明才智。


    **极其糟糕** —— 糟糕。非常糟糕。可怕到天塌下来般的糟糕。极其恶劣。在产品周期后期对`Bugs`进行分类时，这个词很实用。


    **人机界面** —— 苹果公司的用户界面。


    **全局视野** —— 一种管理风格，这种管理者关注整个公司而不仅仅是自己的团队。通常是中层管理者。


    **我的天哪** —— 某种技术彻底震撼你或改变你生活的时刻。

