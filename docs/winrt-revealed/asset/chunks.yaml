  trans: '

    # 数代极客


    如今，数代极客并存于职场，因此你心中那些关于极客的刻板印象已不如想象中管用了。摒弃那些极端的极客形象：脾气暴躁、口袋护套不离身的保守派已经退休或即将退休，而酒吧对面那位穿着
    300 美元 Ted Baker 衬衫、棕色头发的时髦家伙，很可能是个该死的 Python 高手。


    幸运的是，在软件工程领域，极客的职业发展仍然需要一套明确的心智技能，而非任何特定的着装品味。成功获取并精进这套技能，会以独特的方式重塑极客的大脑，而这也将定义你的极客管理策略。


    * * *


    ![images](img/sq.jpg) **免责声明** 和我的所有文章一样，我通常用 *他* 来泛指，以方便行文。世上不乏女性极客，她们也展现出许多类似的行为模式。


    * * *


    ## 问题


    摆在面前的是“问题”。虽然我不知道问题具体是什么，但我知道你手下有一支由才华横溢的极客组成的优秀团队，而且我知道你对如何解决这个问题毫无头绪。你需要极客，却不知从何入手。这个问题的独特之处在于，你惯常的领导手段行不通了。你几乎能预见极客们的集体反应，而这恰恰与你的期望背道而驰。


    与其直接攻击这个问题，不如换个角度，探索极客的内心世界，从中寻找灵感的下一步。


    *极客是系统思考者*——自从我写了《极客手册》以来，我一直强调这一点，并在《Being Geek》（O''Reilly, 2010）一书中进一步探讨。³简而言之，极客的动力源于理解事物运作的原理——它们是如何组合在一起的。这种驱动力来自极客最钟爱的工具——计算机，它是一个由逻辑可知性构成的完美结构。多年驾驭计算机的经验，使极客坚信：当你始终如一地遵循定义系统的规则时，就能从混乱中获得一种虚幻的、可预测的平静。


    如果非要我给你一条管理建议，我会说：“你对极客的职责，就是帮他们平息混乱。”让我们开始吧。


    *你的极客珍视一致性。* 你的团队会议是一场有趣的聚会。你保持轻松的氛围，传达公司正在发生的趣事，并尽可能粉碎谣言。偶尔，你需要当场做出决定——比如随机执行某项政策：凯特应该得到那间带窗户的漂亮办公室吗？


    你：“当然，凯特值得拥有……她工作表现出色。”


    突然间，平时热闹的团队会议鸦雀无声。发生了什么？


    首先，你漫不经心地触碰了三个必然会让任何人（不仅仅是极客）抓狂的话题之一：空间、薪酬和头衔。其次，你关于凯特的随口决定与团队规则不一致。记住，你正坐在一群极客面前——他们仅仅为了智力上的乐趣——就会分析你做的每一个决定，将其与你在他们面前做过的*每一个决定*进行比较。那阵沉默？那是当他们发现重大不一致时，所爆发的无声的极客之怒。


    关于谁能拥有带窗户的办公室的规则从未被写下来，但大家都心知肚明：你要么是需要进行一对一谈话的管理者，要么是在团队里工作多年且头衔中带有*资深*二字。凯特两者都不符合。虽然她出色的工作或许值得奖励这间办公室，但你没有明确说明关于办公室窗户的潜规则有一项附录，这就违反了“一致性”。你变得不那么可预测了，因为你不再遵循系统的规则。


    对极客来说，可预测的世界才是令人安心的世界。你在办公室分配上的不一致让他们开始琢磨：“天哪，接下来还会冒出什么乱七八糟的幺蛾子？老板这样随心所欲，我到底该怎么完成工作？”在极客看来，可预测的世界是一个我们知道接下来会发生什么的世界。你看……


    *你的极客同样珍视效率。* 极客在心里记下你的每一个决定，并非为了抓你的谎言或矛盾之处。他在做的是他一直做的事——从海量信息中筛选，发现规则，以便找到支配一切的“最优系统”。大一统理论？没错，极客发明它就是为了能睡个安稳觉。


    理解了规则，你的极客就能选择一条最省力的行动路线。这不是懒惰，而是喜悦——在一个充斥着混乱的政治人物、隐秘议程和古怪行为的世界上，极客能用逻辑、高效和可预测性征服混乱。你的极客心中有一个明确的目标，需要你来支持。你的极客正在……


    ## 追求两种巅峰体验


    在《极客手册》中，我称之为“巅峰体验”，但实际上有两种：


    ### 第一种巅峰体验：当极客看到死结，他们就想解开它。


    每年圣诞节后，总会有人弄乱圣诞树上的彩灯。他们把灯从树上取下来，小心地折叠好放入盒中。神秘的是，在去年的折叠和今年找到彩灯的喜悦之间，这些灯总是会缠成一团乱麻。


    解开灯线团的过程看似杂乱无章——你坐在地板上，咒骂着，慢慢地拉着一根绿色电线穿过一堆电线和灯泡，感觉毫无进展——直到你突然解开。有一个神奇的时刻，你会感觉这个结似乎被解开了。虽然面前仍有一个结，但它正在瓦解，不受束缚的电线正从中散落出来。


    这种心智上的成就感就是第一种极客巅峰体验。那是我们突然理解问题时的解放时刻，但紧接着，解决方案更令人兴奋。它是……


    ### 第二种巅峰体验：完全掌控错综复杂。


    世上充满了“死结”，解开每一个都有独特的快感。你的极客每天花大量时间忙于解开这些纠结，无论是微调邮件过滤器以便更快地解析邮件，还是花 30 秒调整她最爱的编辑器字体大小以实现完美可读性。这种不断消除摩擦的过程令人满足，但最终她会问：“怎么他妈的这么多死结？”然后开始猛攻。


    当你的极客进入这种模式时，仿佛有一个开关被拨动了。她不再试图解开单个死结；她想理解所有死结存在的原因。极客会以剃刀般的专注力，彻底理解目前惹恼他们的系统，并利用这种理解构建一个完全“无结”的产品。这就是第二种巅峰体验。


    追求第二种巅峰体验，正是极客挣得薪水的地方。如果说第一种巅峰体验是理解的喜悦，那么第二种巅峰体验就是创造的行动。如果你希望极客通过构建革命性的产品来震撼你的世界，你就需要让他们去追求第二种巅峰体验。这就是为什么……


    *你要不遗余力地保护你极客的时间和空间。* 在你亲身体验过解决一个看似不可能的问题之前，你很难理解极客会为了维护自己解决问题的专注力而走多远。（见第 33
    章）通往任何一种巅峰体验的道路，都是一种传统上被称为“心流”的心理状态。关于“心流”，有三点需要了解：

    '
- fmt: '# 1. The almost-constant quest of the nerd is managing all the crap that is
    preventing him from entering the Zone as he searches for the Highs. Meetings,
    casual useless fly-bys, biological nuisances, that mysterious knock-knock-knocking
    that comes from the ceiling tiles whenever the AC kicks in—what the nerd is doing
    in the first 15 minutes of getting in the Zone is building focus, and it’s a Jenga-like
    construction that small distractions can topple.


    # 2. Every single second you allow a nerd to remain in the Zone is a second where
    something fucking miraculous can occur.


    # 3. As explained in “A Nerd in a Cave,” [Chapter 33](#9781430243144_Ch33.xhtml),
    your nerd has built himself a cave. It might not actually look like a cave, or
    maybe it does. The goal around its construction is simple: protect the Zone so
    we can chase the Highs. Stand up right now and walk to each of your nerds’ offices
    and spelunk the caves. Ask the question, “How are they protecting their focus?”
    Back to the door? Headphones? Massive screen real estate? To understand what your
    nerd does to protect his cave, you need to ask …


    *What is your nerd’s hoodie?* I write better when I’m wearing a hoodie. There’s
    something warm and cavelike about having my head surrounded—it gives me permission
    to ignore the world. Over time, those around me know that interrupting hoodie-writing
    is a capital offense. They know when I reach to pull the hoodie over my head that
    I’ve successfully discarded all distractions on the planet Earth and am currently
    communing with the pure essence of whatever I’m working on.


    It’s irrational and it’s delicious.


    Your nerd has a hoodie. It’s a visual cue to stay away as she chases her Highs,
    and your job is both identification and enforcement. I don’t know your nerds,
    so I don’t know what you’ll discover, but I am confident that these hoodie-like
    obsessions will often make no sense to you—even if you ask. *Yes, there will always
    be Mountain Dew nearby. Of course, we will never be without square pink Post-it
    notes.*


    Don’t sweat it. Support it. Also, understand the interesting potentially negative
    by-products of all this nerdery, such as …


    *Not-invented-here syndrome:* When you ask your nerd to build something significant,
    your nerd is predisposed to build it himself rather than borrowing from someone
    else. Strike that: your nerd’s default opening position when asked to build a
    thing is, “We can build it better than anyone else.”


    First, they probably can, but it’s an expensive proposition. Second, understanding
    why this is their opening position is important. The ideal mental state of the
    nerd with regard to the Problem is the First High—a completely understood model
    of the problem. The issue is that each nerd’s strategic approach for this high
    is different.


    Unfortunately, code is often the only documentation of our inspiration, and your
    nerd would rather design his own inspiration than adapt someone else’s. When a
    nerd says, “We can build it better,” he’s saying, “I have not devoted the necessary
    time to understand the existing solution, and it’s more fun to build than to investigate
    someone else’s crap.”


    If your nerd is bent on building it instead of buying it, fine, ask him to prove
    it. Make the Problem the explanation of why building new is a more logical and
    strategic approach than pulling a working solution off the shelf.


    *The bitter nerd:* Another default opening position for the nerd is bitterness—the
    curmudgeon. Your triage: *Why can’t he be a team player?* There are chronically
    negative nerds out there, but in my experience with nerd management, it’s more
    often the case that the nerd is bitter because they’ve seen this situation before
    four times, and it has played out exactly the same way. Each time: *Whenever management
    feels they’re out of touch, we all get shuttled off to an off-site where we spend
    two days talking too much and not acting enough.*


    Nerds aren’t typically bitter; they’re just well informed. Snark from nerds is
    a leading indicator that I’m wasting their time, and when I find it, I ask questions
    until I understand the inefficiency so I can change it or explain it.


    *The disinterested or drifting nerd:* Your nerd won’t engage. It’s been a week
    and a half, and as far as you can tell, all she’s done is create and endlessly
    edit a to-do list on her whiteboard. Whether she’s disinterested or drifting,
    your nerd is stuck. There are two likely situations here: she doesn’t want to
    engage or she can’t.


    Triage here is similar to the not-invented-here syndrome—is the problem shiny?
    Meaning, is there something unique that will allow for the possibility of original
    work? OK, it’s shiny. But is it too shiny? Is your nerd outside of the comfort
    zone of his ability? My favorite move when a nerd appears stuck is pairing him
    with a credible technical peer—not a competitor, but a cohort.


    Once you’ve discovered the productivity of the Highs, you’re going to attempt
    to invoke them. Bad news. The invocation process is entirely owned by and unique
    to your nerd. You can protect the cave and honor the hoodie, but your nerd will
    choose when to go deep. The amount of pressure you put on your nerd to engage
    is directly proportionate to the amount of resistance you’ll encounter.


    Find a cohort—someone who will be receptive to the perceived lack of shininess
    or someone who will say the one thing necessary to get your nerd chasing the Highs.


    ## The Nerd Burden


    I’ve spent a lot of time painting nerds as obsessive control freaks bent on controlling
    the universe. Fact is, your nerd understands how the system works. She knows what
    you know—chaos is a guarantee. It’s neither efficient nor predictable, but it’s
    going to happen.


    You and your nerd are surprisingly goal aligned with regard to the chaos. You
    want her to build a thing and you want her to build it well. You want it to perform
    reliably in bizarre situations that no one can predict. You want it to scale when
    you least expect it. And you want to be amazed.


    Amaze your nerd. Build calm and dark places where invoking the Zone is trivial.
    Perform consistently and efficiently around your nerds so they can spend their
    energy on what they build and not worry about that which they can’t control. Help
    them scale by knowing when they’re stuck or simply bored. And let them chase those
    Highs, because then they can amaze everyone.


    * * *


    [¹](#9781430243144_Ch31.xhtml#FN1) [http://en.wikipedia.org/wiki/Year_2000_problem](http://en.wikipedia.org/wiki/Year_2000_problem)


    [²](#9781430243144_Ch31.xhtml#FN2) [http://randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html](http://randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html)


    [³](#9781430243144_Ch31.xhtml#FN3) [www.beinggeek.com/](http://www.beinggeek.com/)


    ## CHAPTER NADD


    The gist of the book *Guns of the South* is straightforward, yet odd. What if,
    during the Civil War, the South became equipped with a lot of AK-47s? Long story
    very short, they would have won. Handily. The author, Harry Turtledove, chose
    not to focus on time travel or other delectable science fiction tidbits; he spends
    the time on, “Yay! The South won! So, uh, what are they going to do about that
    whole slavery thing?”


    While I’m certain Civil War enthusiasts would enjoy this book, it is not geared
    for someone with my particular disability: *nerd attention deficiency disorder*,
    or NADD. While I read this book, this innocuous condition reared its head when
    it became clear that it was an in-depth exploration of the lifestyles and morality
    during an alternative post-Civil War period … ZzZzZzzZZzz.'
