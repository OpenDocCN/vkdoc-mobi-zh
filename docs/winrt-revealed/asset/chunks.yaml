  trans: '

    # 战略型人才 vs. 战术型人才


    战略型人才会积极推动自己的想法和观点。他们全身心投入工作，与同行建立联系，并且会不厌其烦地向任何人详细阐述自己的计划。战略型人才可能会惹恼一些人，因为他们推行议程的那种劲头实在让人烦心。


    战术型人才则是满足某个明确需求的人。“我们需要一个懂数据库的人。”和战略型人才一样，战术型人才也精通自己的领域，但也就仅限于此了。而且，他们对推行什么议程并不太感兴趣，只想相对安静地完成自己的工作。


    我无意评判战略型人才和战术型人才哪个更适合你，因为我对你要招聘的人一无所知。重要的是，你要明确自己需要哪种类型的人才，更重要的是，要找到合适的人来面试，以评估这种能力。我个人倾向于由管理者来担任愿景的领路人，因为这是他们为团队肩负的职责。你不仅要知道团队需要什么，更要知道愿景决定了职业发展路径，并且你需要尽早了解，如何才能让未来的员工保持积极性。战略型人才在你的团队里待不长久，因为你的行动速度根本跟不上他们；而战术型人才只要工作内容相关且稳定，他们就会很满意。


    ## 团队共识


    当团队和领路人面试完你的候选人后，就该把所有人召集起来，听听他们的看法。这时候，有些心急的经理又想走捷径，让面试官通过邮件反馈意见，或者在走廊里随便聊几句就定了。


    这种做法大错特错。面试反馈会议必不可少。最终是否录用的决定权在招聘经理手中，但每个花时间面试候选人的人都有投票权。虽然他们在面试结束后已经有了自己的看法，但在听取所有人的反馈之前，这票还不算投出去。看看效果吧。把所有人召集到一起，围坐在桌前。记录每个人的反馈，并注意观察：当每个人发言时，之前已经说过话的人如何不断补充更多信息，有时甚至还会改变自己的观点。你在这次会议上看到的就是共识的建立过程。观点在信息的交流中逐渐成形，而团队也在共同做出决策。这就是为什么每个团队成员都必须参与面试排期。虽然录用决定由你做出，但如果不听从团队的主导意见，那你就是个傻瓜。


    ### 该傻的时候就得傻


    有时候你确实需要犯傻，比如当那个合适的候选人故意与团队格格不入的时候。在这种情况下，你的领路人可能比团队的意见更有价值。在我上一份工作中，团队里有一位脾气暴躁的架构师，虽然很有才华，但在团队中制造了消极氛围。他的负面情绪影响了整个团队，两年后，这个局面必须改变。


    为了寻找新鲜血液和新视角，我开始从当地大学招聘新员工。我的文化领路人是我最早招聘的工程师之一，但为了这个职位，我去找了另一位我欣赏的工程经理，问他：“谁最适合来面试你们团队的文化契合度？”


    “那得是弗兰克。”


    弗兰克成了我的文化领路人，因为我想改变团队的文化。当我们招聘应届毕业生时，反馈会议的结果并不出人意料。“他太年轻了！他对这项技术一窍不通！我们手头有太多工作要做，没时间带这个新人上手。”这是现有工程师团队从那位资深老顽固那里汲取的内容和文化导向。毫不意外的是，弗兰克的反馈总是与团队其他成员相悖。“他很聪明。很适合我们的文化，我愿意和这个年轻人共事。”


    你可能会想，在招聘决策上反对团队共识是团队反馈会议的缺点。其实不然。虽然你需要特别小心地向团队中每个人解释你的决定，但你可以把团队一贯的负面反馈作为你推理和解释的一部分。


    “还记得那些反馈吗？还记得那些抱怨声吗？是啊，我也受够了那些抱怨，你们不是吗？”


    ### 仍然自欺欺人


    我们仍然在自欺欺人。即使找到了最好的三位领路人，招聘任何人仍然是个巨大的风险。认为通过一次电话面试和两轮面试就能成功评估一个候选人，这种想法是荒谬的。你得到的只是初步印象。我知道你问过他们：“你如何处理压力大的情况？”但事实上，除非真正的压力出现，否则你根本不会了解他们的真实面目。


    你必须招人。你需要能够壮大你的团队，这意味着要冒风险去接纳这些不仅仅是简历和一次愉快交谈的人。虽然我相信一套扎实的领路人和团队面试是获取候选人当面信息的最佳方式，但不要止步于此。去看看他们的博客。看看他们是否为开源项目做过贡献。阅读他们在邮件列表中的发言。当面面试能让你看到一个人的一个侧面，但任何能帮你完善这幅画像的努力，不仅能让你看得更全面，还能降低你招聘到一个陌生人的风险。


    # 章节


    ## 九十天面试期


    当你接受一份新工作时，你不清楚将与谁共事、具体做什么，也不知道自己会有多喜欢（或不喜欢）这份工作。去联系所有你想联系的人吧。听听他们的看法。相信是好朋友推荐你来做这份工作的。对公司拥有良好的血统感到欣喜，但不要自欺欺人地认为，仅凭面试的那几个小时，你就能对新生活有哪怕一丝模糊的了解。


    试试这个。跟我讲讲你最好的朋友。用要点列出五件你认为我应该知道的关于你最好的朋友的事。列好了吗？大声读出来。这能充分展现你最好的朋友吗？你说“他愿意为我做任何事”，我听到了，但为什么呢？他为什么保护你？这些要点背后有什么故事？这才是我真正想知道的。


    你新团队中的每个人都有一个故事想告诉你，而且这绝不是一份要点清单。有些人会主动分享这个故事，而另一些人则会小心翼翼地保护自己拥有故事这一事实。但直到你需要合作的每个人都与你分享了他们的故事（反之亦然），面试才算结束。结果悬而未决，你不会知道这份你已经开始的新工作是否真的是属于你的工作。


    ### 从容不迫


    你的首要任务是放轻松。就像开学的第一天，你会在第一天、第一周过度表现。大多数人不会在上班前一晚就把衣服准备好。你这么做是为了让自己平静下来。床边整整齐齐叠好的衣服，是一个视觉上的提醒：你掌控着这件你其实无法掌控的事情。


    放轻松。行业标准认为，完成一次招聘所需的时间是 90 天。新经理们听到我这么说通常都不高兴，因为他们刚拿到一个新职位空缺，正兴奋不已，心想 *看好了，看我动作多快。*
    是的，是的。我欣赏你的干劲，但在 90 天内，我不会去操心你的招聘进展。


    这段时间也同样适用于你的新工作。你有 90 天——3 个月——来完成你的入职面试。在日历上从现在起 90 天后的位置画一个 *X*。把这当成一个具体的动作，提醒自己要放松、要多听，而不是为自己不了解的事情而焦虑。除非你不再整晚准备衣服，不再刻意行事，否则新团队是不会信任你的。

    '
- fmt: '# 新工作的前90天


    我知道你以前做过这些事：你有过五份其他工作，并且你拥有非常成熟的人际评估直觉。只不过，嗯，这些直觉是有偏见的。这些直觉基于你曾经待过的地方，而你从未到过这里。我的建议是，你越不信任自己的直觉，就越能了解你的新工作，这就是为什么我为你写了一份90天清单……


    ## 1. 晚走，早到


    你需要一张与你共事的人的地图，我发现开始草绘这张地图的最佳方式是了解人们以及他们与一天时间的关系。他们什么时候到？要过多久他们才开始投入工作？去冲咖啡？等等，不。晚到者。不完成某件事就不离开。下午4:30才去冲咖啡。不喝咖啡？真的吗？为什么？这些长时间的观察能让你获得洞察力，也能让你了解每个团队成员想要什么的工具。


    ## 2. 接受你收到的所有午餐邀请


    在你刚来的头几周，人们会为你放低身段。他们会特意拉你入伙，无论他们是谁，你都必须花时间回报。来自那个你认为永远不会有交集的小组成员的午餐邀请，会带来各种故事，而你目前极度缺乏故事。


    ## 3. 总是询问缩略语


    很好，我们都说英语，但为什么你坐在第一次员工会议上却一个字都听不懂？这是因为每个团队都会发展出缩略语、隐喻和巧妙的方式来描述他们的独特性，你必须理解这些。破解语言这个难题对于评估你所面对的局面绝对至关重要，而且你可能需要问上好几次。


    ## 4. 说一些非常愚蠢的话


    好消息是，无论这个清单上有没有这一条，你都会这么做。我的意思是这没关系。你要说的这件蠢事将展示你刚刚开始投入工作，当他们停止窃笑时，团队就会知道你在拼命试图弄清楚一切。


    ## 5. 喝一杯


    与午餐任务类似，但更有价值。当有人邀请你吃午餐时，并没有跨越什么界限；但当你收到喝酒的邀请时，有人是在说：“来吧。让我们尝试一种不同版本的坦诚。”故事是在喝酒时揭开的，而不是午餐时。


    **警告**：接下来的三条排在列表底部是有原因的。这些是进阶操作，在你有一定信心——即使它们出了大错，你也有把握不会永久损害你仍在建立中的声誉——之前，不要尝试。继续往下读。


    ## 6. 告诉某人该做什么


    到目前为止我所谈到的都涉及倾听和提问。这个任务则要求你说点什么。更重要的是，它要求你告诉某人该做什么。我不知道你告诉的是谁，也不知道你说的是什么，但目标是施加你的影响力，检验你的影响力。更重要的是，检验你对组织的了解，看看你所说的是否属实。“告诉”是你的直觉与这个特定组织对齐的声音，而你所说的就是你灵感的第一个火花。相信它。找对的人说，然后意识到每个人都在等你开口。


    ## 7. 进行一场争论


    这是清单上风险最大的项目，但可能也是最富有启发性的。当你执行第6项时，很有可能会发生这种情况。同样，你愿意争论什么以及争论的另一方是谁，取决于你的具体情况。你想了解的是：组织如何看待冲突？你坚持己见是可以的吗？其他人会加入争论吗？谁会从天而降来救场？这些人能不失控地争论吗？这个团队是公开争论，还是使用阴险的、被动攻击式的微妙手段？


    在这场职业战斗中，你会学到两件有价值的事情。第一，这群人如何做决定？第二，你会更好地体会到他们的热情和速度。


    ## 8. 找到你的核心圈子


    在你的争论、午餐、酒局和加班中，你会找到志同道合的人。这是一个简短的人员名单，他们与你的直觉一致。这些人能替你接上话茬，他们了解你的故事。他们是欢迎争论的人，因为他们知道伟大的决定是由众人做出的。你的核心圈子并非排外，因为如果你在团队中划出关系界限，你将一事无成。这份名单上的人是那些你愿意与之分享原始灵感和故事的人，因为你知道他们会兴高采烈地帮你完善它们。


    发现你的核心圈子需要时间。你会本能地被那些让你感到舒适、感觉对的人吸引，但只有当他们在时间的考验中过关后，才能进入这个核心圈子。他们得在90天清单中经历几次，你才能听到足够多的故事，从而让他们进入。


    # 完成面试


    不仅仅是因为你在最初的面试过程中忘记问关键问题；而是因为那个走进面试现场的人并不是现在的你。你是一份简历，一个推荐人，一个名声。


    你的求职面试并未结束，直到你问完了所有问题，听完了所有故事。


    你的求职面试并未结束，直到你理解了围绕这群特定的人所形成的独特结构。这不仅仅是组织架构图，更是那些已经安顿成舒适、复杂沟通结构的错综复杂的个性。


    你的求职面试并未结束，直到你有了一个框架，知道如何与这些人互动，这意味着不仅要了解他们的目标，还要了解他们宝贵的个人特质。他们在第一周告诉你的，更多与你是个新人有关，而不是他们的真实感受。他们在90天后告诉你的，才是真相。


    你的求职面试并未结束，直到你改变自己，成为新团队的一部分。


    # 章节：管理极客


    十多年前，整个世界都因千年虫问题而集体恐慌。这个想法是，当无数由软件驱动的时钟在1999年午夜跳到2000年时，数字世界的麻烦就大了。我把这场全球恐慌的根源归咎于极客们。


    千年虫问题让极客们集体抓狂，因为每个软件工程师都曾被那些我们之前认为不可能的边缘情况报告所困扰。我们震惊于一个演示版如此频繁地变成了产品，并在生产环境中运行多年。我们知道，复杂系统的一个固有属性是，它们既包含了我们最好的作品，也包含了我们最差的猜测。


    我把这种心态称为**极客负担**。这是一种降临在那些了解系统如何运作，更重要的是，了解构建系统需要付出什么代价的极客身上的诅咒。理解**极客负担**是进入极客思想并开始弄清楚如何管理他们的一个好方法。


    ## 一个最坏的情况


    这是一章关于极客管理的内容。通常的要求是，要管理极客，你本身就得是一个极客。为了本章的目的，我假设了一个最坏的情况——你不是极客，但你的工作涉及日常的极客管理。节哀顺变；这些家伙能把你活吞了。


    一个让你从心态上了解极客的好地方是《极客手册》。这本指南本意是写给极客和怪咖的伴侣看的，是开始理解极客心态的好起点。然而，如果说那本手册解释了如何在家里照顾和喂养极客，那么这篇内容则关注工作中的极客。'
  raw: 'I know you’ve done this before: you’ve had five other jobs and you have well-refined
    people-assessment instincts. Except, well, they’re biased. These instincts are
    based on where you’ve been and you have never been here before. My suggestion
    is that the less you trust your instincts, the more you’ll learn about your new
    job, and that’s why I wrote you a 90-days list …


    1\. Stay Late, Show Up Early


    You need a map of the people you work with, and I find the best way to start scribbling
    this map is to understand people and their relation to the day. When do they get
    there? How long until they engage in what they do? Coffee run? Wait, no. Late
    arriver. Doesn’t leave until he gets something done. Makes his coffee run at 4:30
    p.m. Doesn’t drink coffee? Really? Why? These long days of watching give you insight,
    and they give you tools for understanding what each of your team members wants.


    2\. Accept Every Lunch Invitation You Get


    People are stretching themselves for you the first few weeks you show up. They’re
    going to go out of their way to include you, and no matter who they are, you’ve
    got to take the time to reciprocate. The lunch invite from that guy in the group
    you’re pretty sure you’ll never interact with will result in stories, and you
    have a stunning lack of stories right now.


    3\. Always Ask About Acronyms


    It’s great that we’re all speaking English, but why is it that you’re sitting
    in your first staff meeting and not understanding a word? It’s because every team
    develops acronyms, metaphors, and clever ways to describe their uniqueness, which
    you must understand. Cracking the language nut is absolutely essential to assessing
    the hand you’ve been dealt, and you’re going to need to ask a couple of times.


    4\. Say Something Really Stupid


    Good news, you’re going to do this whether it’s on this list or not. I’m saying
    it’s OK. This stupid thing that you’re going to say is going to demonstrate your
    nascent engagement in your job and when they stop giggling, the team is going
    to know you’re desperately trying to figure it all out.


    5\. Have a Drink


    Similar to the lunch task, but more valuable. No barrier is crossed when someone
    invites you to lunch, but when you get the drink invite, someone is saying, “C’mon.
    Let’s go try a different version of honesty.” Stories are revealed over drinks,
    not lunch.


    **WARNING** *The next three on the list are at the bottom for a reason. These
    are advanced moves that you don’t want to attempt until you’ve built some confidence
    that if they go horribly wrong, you have some assurance that you won’t permanently
    damage your still-developing reputation. Read on.*


    6\. Tell Someone What to Do


    Everything I’ve talked about so far involves listening and asking questions. This
    task involves you saying something. More importantly, it involves you telling
    someone what to do. I don’t know who you’re telling or what you’re saying, but
    the goal is to exert your influence, to test your influence. More importantly,
    to test your knowledge of the organization and see if this thing you have to say
    is true. Telling is the sound of your instincts aligning to this particular organization
    and this thing you are saying is your first bit of inspiration. Trust it. Tell
    the right person and realize that everyone was waiting for you to say it.


    7\. Have an Argument


    This is the riskiest item on the list, but potentially the most revealing. There’s
    a good chance when you pull a number 6 that this is going to happen anyway. Again,
    what you are willing to argue about and who is going to be on the other side of
    the argument is a function of your situation. What you want to understand is,
    how does the organization value conflict? Is it OK that you’re digging your heels
    in? Do others engage in the argument? Who swoops in to save the day? Can these
    people argue without losing their shit? Does this team argue out in the open or
    do they use devious passive-aggressive subtlety?


    You’re going to learn two valuable things during this professional battle. First,
    how does this group of people make a decision? Second, you’re going to have a
    better taste of their passion and their velocity.


    8\. Find Your Inner Circle


    In your arguments, lunches, drinks, and late nights, you’re going to find kindred
    spirits. This is the short list of people who share your instincts. These are
    the ones who complete your sentences and they know your stories. These are the
    ones who welcome the argument because they know great decisions are made by many.
    Your inner circle is not exclusive because you’ll go nowhere drawing relationship
    boundaries among the team. This is the list of people with whom you share your
    raw inspiration and your stories because you know they’ll gleefully help refine
    them.


    The discovery of your inner circle won’t happen until time has passed. You’ll
    instinctively be attracted to people who feel comfortable, who feel right, but
    they can’t be in the inner circle until they’ve passed the test of time. They’ve
    got to pass through the 90-day list a few times before you’ve heard enough stories
    to let them in.


    Finishing the Interview


    It’s not just that you forgot to ask key questions during your initial interview
    process; it’s that the person you were walking into that interview as isn’t who
    you are. You’re a résumé, you’re a referral, and you’re a reputation.


    Your job interview isn’t over until you’ve asked all the questions and heard all
    the stories.


    Your job interview isn’t over until you understand the unique structure that has
    formed around this particular group of people. It’s not just the organizational
    chart, it’s the intricate personalities that have settled into a comfortable,
    complex communication structure.


    Your job interview isn’t over until you have a framework for how you are going
    to interact with these people, and that means understanding not only their goals,
    but also their invaluable personal quirks. What they tell you the first week has
    more to do with the fact that you’re new than what they actually feel. What they
    tell you after 90 days is the truth.


    Your job interview isn’t over until you’ve changed to become part of a new team.


    CHAPTER


    Managing Nerds


    Over a decade ago, the world was collectively freaked out by the Y2K bug.[¹](#9781430243144_Ch31.xhtml#FON1)
    The idea was that when innumerable software-driven clocks flipped at midnight
    from 1999 to 2000, the digital shit was going to hit the fan. I blame the origin
    of the worldwide freak-out on the nerds.


    Y2K collectively freaked out the nerds, because every single software engineer
    has been bitten by reports of edge cases that we previously believed to be impossible.
    We’ve been shocked how often a demo has become a product and remained in production
    for years. We know that it is an inherent property of complex systems that they
    will contain both our best work and our worst guesses.


    I call this state of mind the Nerd Burden. It’s a curse put upon nerds who know
    how a system works, and, more importantly, what it took to build. Understanding
    the Nerd Burden is a good way to get into the nerd mind and start to figure out
    how to manage nerds.


    A Worst-Case Scenario


    This is a chapter on nerd management. The usual requirement is that in order to
    manage nerds, you need to be one. For the sake of this chapter, I’m assuming a
    worst-case scenario—you are not a nerd, but your job involves daily nerd management.
    My condolences; these guys and gals can eat you alive.


    A good place to get mentally limber regarding nerds is with the Nerd Handbook.[²](#9781430243144_Ch31.xhtml#FON2)
    This is intended for the significant others of nerds and geeks, and it’s a good
    place to start understanding the nerd mindset. However, where the handbook explains
    the care and feeding of nerds in the home, this piece is concerned with nerds
    at work.'
