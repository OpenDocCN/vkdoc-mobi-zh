  trans: '

    # 会议中的角色类型


    拉里让我很恼火。他参加那些明知有 75%内容与自己无关的固定会议，所以带着电脑想趁机工作。结果他根本没干活，因为一半时间都在半听半就地关注会议进程。请重读上一句。他既没在工作，也没真正在听，这意味着他在生产力方面实际上是负贡献。


    让拉里把电脑收起来。我是认真的。如果你无法积极参与被邀请参加的会议，那你就不该出现在这里。"兰兹兰兹兰兹……我用电脑记笔记。"不，你没有。你只是在记笔记，遇到不认识的专有名词就上网搜索维基百科。如果必须有人记笔记，指定一个人去做就行；我希望你来问我那个专有名词是什么……而不是去查维基百科。


    有效的会议不是演讲，而是辩论。如果我在台上滔滔不绝而你们不同意或没听懂，我不要你们点头，我要你们对我喊出来。


    ## 无关先生


    口号："能来这儿我就很开心了。"


    无关先生为什么在这儿？他没什么可补充的，只是满脸笑容，因为有人费心把他邀请到这个（在他看来）非常重要的会议里。他基本无害。


    处理无关先生的问题在于要搞清楚是谁邀请他来的。他们想达到什么目的？为什么你要花钱让无关先生坐在这开会，不停点头、记笔记？如果你取消邀请，他不会生气，但问题是——谁会生气？他们为什么邀请无关先生？他是个卧底吗？是不是有人因为自己无法到场而在收集关键信息？


    无关先生出现在你会议中必有原因，在把他踢出去之前，你必须先搞清这个原因。


    ## 话匣子帕蒂


    口号："我根本停不下来。"


    又一个容易识别的角色。这人永远说个没完。永远是。


    你的主要问题是时间。话匣子帕蒂无法用简洁的方式传达想法，这意味着每次她开口，其他人就开始走神。


    你的首要任务是判断话匣子帕蒂是否其实是"无关女士"。幸运的是，让她开口根本不是问题。你要判断的是信噪比是否可接受。一旦确定她是否真的需要参会，下一步就是"管控"，而要做到这点，你得顺着她的套路来。


    管控帕蒂很简单：用她爱听的方式提问，也就是用大量词汇。对话匣子帕蒂的提问必须精准，这样她就不会东拉西扯。与其问"质量怎么样？"，不如问："帕蒂，我看了你的测试计划、当前测试结果，也知道你有一个关于产品质量的简要评估要做。能请你给我们做一个简要评估吗？"


    你可能会觉得构造这些冗长重复的请求很傻，但你不仅给了帕蒂一个界限明确的发挥空间，也为会议中的每个人节省了时间。


    警告：永远不要在会议场合与话匣子帕蒂争论。把帕蒂天生的健谈加上情绪化，简直就是灾难配方。记住，她本来就不懂如何结束一个话题。再掺入一些情绪，她可能永远停不下来。


    ## 翻译官蒂姆


    口号："所有缩写我都懂。FTW！"


    蒂姆是第一个实用型角色。他的任务很简单：他能说房间里每个人的语言。当硬件团队和软件团队坐在一起讨论问题时，蒂姆就是那个把软件缩写翻译成硬件缩写的人。当你有来自组织内完全不同部门的群体时，蒂姆不可或缺。


    你需要警惕的是：如果蒂姆对他翻译的话题并非中立，那他的翻译就会偏向自己。这意味着如果蒂姆是你这边的人，你就占了优势；如果不是，你可能得去找自己的蒂姆。


    ## 总结者莎莉


    口号："他的意思是……"


    我喜欢莎莉，因为莎莉的任务就是结束会议。作为第二个实用型角色，莎莉能把对话——无论多混乱——抓取到手，提炼出刚刚讨论的核心事实。


    在拥有多样化性格的大型群体会议中，你房间里必须有莎莉。因为她不会错过任何一句话，更重要的是，她不仅知道每句话的相对重要性，还清楚是谁说的。她知道谁是主导者，知道如何让帕蒂闭嘴。虽然她看起来只是在陈述显而易见的事实，但她实际上在给会议提供关键的前进动力。


    和蒂姆一样，如果莎莉在会议中带有偏见，她就会按对自己有利的方式做总结。另外，莎莉也可能因权力而膨胀，因为她的能力无可替代。当她开始觉得自己就是主导者时，你就麻烦了。


    ## 曲线球库尔特


    口号："天空是煎饼。"


    库尔特很容易识别：你完全听不懂他在说什么。


    一旦识别出库尔特，首要任务就是判断他是不是无关先生。这有点棘手，因为每次你问他问题，你看到他的嘴唇在动，他说的确实是英语，但你完全不知道他想表达什么。希望房间里能有翻译官蒂姆或总结者莎莉来帮忙。


    最糟糕的情况是你的主导者是个曲线球。这种情况比你想象的更常见。最可能的情形是合并组织架构中差异巨大的群体。想象一下高管和工程师一起头脑风暴。每位高管都认为自己能和组织里的任何人打成一片，但在日常工作中，他们说的完全是另一种语言。这意味着桌子两边都有曲线球库尔特。如果没有某种翻译者和总结者在场，这样的会议根本开不下去。


    ## 蛇


    口号："我才是真正的主导者。嘘——！"


    有些主导者喜欢隐藏。情况是这样的：


    在与高管的会议上，莎莉站起来设定议程，请拉里（最后一次）把笔记本电脑收起来，然后会议开始。曲线球库尔特站起来说了一堆听不懂的话。翻译官蒂姆跳进来为库尔特翻译，但他却朝角落里的那位高管翻译。啊哈！那就是你的主导者。注意右边角落。


    会议继续进行。无关先生说了些有趣的话，大家笑了，然后琢磨着什么时候把这傻瓜请出会议。最后，我们达到了会议的高潮，需要做出决策，所有人的目光都转向主导者。我们等了一秒，他说："蛇？你怎么看？"


    蛇就是隐藏的主导者，他坐在左边角落。出于某种原因，他让假主导者在前台承受压力，自己则坐收渔利。也许他不喜欢聚光灯，也许让房间里的人不知道他才是老大有某种战略优势。但幸运的是，蛇的把戏在公司里只能玩几次，因为真正的带头大哥是谁迟早会传开。


    回到那个最糟糕的会议。那是我参加的最后一个关于服务器问题的会议，因为一走进去我就知道问题所在。我们都以为我们的工程副总裁是主导者，但问题是他不愿意承担主导的角色。既然桌上摆着是赌上公司命运的决策，我们本该在副总裁无法主导会议的那一刻就拉上
    CEO。


    你可能以为当时也缺少总结者莎莉——那个能捕捉事件本质的人——但那人就是我。我试图通过捕捉主要想法、重复给大家听来推动会议，但这完全是徒劳，因为主导者根本不想履行他的职责。'
- fmt: '# Forty-five minutes after the meeting began, I did something I’d never ever
    done before. I walked out of a meeting where I was a key player because I simply
    couldn’t waste any more time on this uselessness. Stood up, walked out, and slammed
    the door. Yes, it’s an emotional move that is almost always a bad move in business,
    but near the top of my list of professional pet peeves is the following:


    Do not waste my time.


    ---


    # Incrementalists and Completionists


    I recently got into a war of words with a coworker regarding the proper solution
    to a problem with one of our products. As an aside, let me say that e-mail is
    never ever ever never ever the right way to resolve controversy. Too much subtlety
    is lost when you’re YELLING IN ALL CAPS at your program manager. Don’t waste your
    time solving problems in e-mail. Stand up. Walk down the hall. And look the person
    in the eye. You’ll live longer.


    Anyhow.


    What was intriguing about my e-mail exchange with the coworker was that we weren’t
    disagreeing about whether or not we should do something about the problem. We
    were arguing about how much we should do. The disagreement reminded me that there
    are two distinct personalities when it comes to devising solutions to problems:
    incrementalists and completionists.


    **Incrementalists** are realists. They have a pretty good idea of what is achievable
    given a problem to solve, a product to ship. They’re intimately aware of how many
    resources are available and the shape of the political landscape with regard to
    the problem, and they know who knows what. They tend to know all the secrets and
    they like to be recognized for that fact.


    **Completionists** are dreamers. They have a very good idea how to solve a given
    problem, and that answer is to solve it right. Their mantra is, “If you’re going
    to spend the time to solve a problem, solve it in a manner so that you aren’t
    going to be solving it again in three months.” I used to think that architects
    were the only real completionists in an organization, but I was wrong. Architects
    are the only recognized completionists, but the personality is hiding all over
    the place.


    Rewind to my situation. The actual problem is irrelevant, but here’s the background.
    The coworker discovered a problem in our product and reported it. I responded
    and suggested a minor improvement that didn’t solve the core problem but was achievable
    given our schedule. The coworker responded with, “Why do this if we don’t solve
    the problem?” I responded, “We don’t have time to solve it and something is better
    than nothing.” Coworker: “This is less than nothing!” Insert stunned silence.


    Remember, the coworker identified (correctly) the original problem. So, why in
    the world don’t they see the value of my solution? The reason is that this is
    an incrementalist doing battle with a completionist. This isn’t a battle of wrong
    versus right; it’s the battle of right versus right. Bizarre.


    How does anything get done with incrementalists and completionists arguing about
    degrees of rightness? Here’s the trick. You want them to argue, you just don’t
    want them to kill each other. This is where you, the manager, come in.


    ## Somewhere in the Middle


    First, we’re going to ignore the problem that has your incrementalist and completionist
    at each other’s throats. It’s important, but it’s not what we’re working on here,
    which is getting some value out of these unique perspectives.


    What’s important is, who needs to move where? Does the incrementalist need to
    move closer to the completionist’s view or vice versa? In either case, you’ve
    got to use the simplest trick in the conflict resolution book: finding common
    ground. A better way to think about this is, “What do these disparate philosophies
    need from each other?”


    ### Incrementalists Need Vision


    What defines an incrementalist’s day is the raw amount of stuff they do. How many
    meetings? How many bugs do they close? They love the fact that they ran into that
    engineering manager in the cafeteria who dropped that critical piece of gossip.
    Motion, motion, motion.


    From the outside, it might look like your incrementalist lacks purpose, but look
    at the name. This person is driven by the goal of constantly—incrementally—making
    progress, moving forward.


    The question is: What is the purpose behind all this movement? What is their goal?
    What I’ve noticed with the incrementalists in my life is that for all the motion,
    it’s not always clear in what direction they are headed. It’s hard to figure this
    out because they look so busy, but the question is, what is the nature of the
    busyness?


    Your goal with incrementalists is to get them to define or see the plan from soup
    to nuts. This is a big deal for them because they normally can’t see past the
    next meeting. Getting them on board with the big picture gives them a sense of
    foundation they don’t usually have.


    This is where your completionist comes in.


    ### Completionists Need Action


    Completionists spend much of their lives shaking their heads, staring at the floor,
    muttering, “Boy, could they fuck this up more?” Fact is, for any given technical
    or product problem, there’s a completionist who knows exactly what to do. Problem
    is, not only can they see the immediate solution; they see the two-year solution
    and the five-year solution. By the way, the five-year solution drastically changes
    the immediate solution, which is why everyone else has a problem with it. Everyone
    else has no insight into the five-year solution.


    Feel dumb? I do.


    Now put yourself in the completionist’s shoes. Sitting there watching these incrementalists
    with their rapid-fire buzz-speak, pushing a short-sighted corporate agenda that
    is clearly going to fail. No wonder folks are yelling in the hallways.


    With all of their strategic vision, completionists often lack common corporate
    and people sense. Yes, they have a five-year technical roadmap in their heads,
    but they have nary a clue how to start pushing that agenda with the 12 different
    people who need to get on board to make anything happen. This is why completionists
    often get incorrectly labeled as curmudgeons. Sure, they’re cranky, but it’s not
    cranky for crankiness’s sake, it’s because they don’t have the communication and
    people skills to convince the company of the truth.


    ## Two Different Coffee Addictions


    I’m painting a picture of absolutes regarding incrementalists and completionists,
    but there are dangerous variants that you need to be aware of, and all of these
    are caffeinated mutations of the core personality.


    **Incrementalists** drink a lot of coffee because of their addiction to motion.
    Getting lost in this addiction means that incrementalists never finish a thing.
    They have no concept of “done,” because done would mean no more motion and who
    wants to stop? The warning signs you’re looking for here are that when an incrementalist
    is facing a hard problem, they’re constantly coming up with new ways to tackle
    the problem rather than actually tackling the problem.


    **Completionists** drink a lot of coffee because of their addiction to thought.
    Unlike incrementalists, these completionists aren’t actually saying anything because
    they’re deeply considering the problem. Now, you’ve got to give completionists
    time to figure out the plan, but after a significant amount of time, you need
    to figure out whether they’re good at gripping the bat or swinging it.


    A quiet completionist doesn’t mean they don’t have anything to say—they’re just
    unlikely to speak until their plan is fully formed. Your issue is when your completionist
    has slipped into creative strategic nirvana, where actually finishing something
    is less important than considering it.


    ## See It Yet?'
