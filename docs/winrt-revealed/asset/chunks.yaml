  trans: '

    **人们的思想会走神。** 他们天生就会随意发表看法——“为什么菲尔能得到那些精选功能？”——并让这些看法发酵、变异，有时甚至演变成一场灾难。我并不是建议每次一对一谈话都要变成一场绞尽脑汁去发现深藏隐患的折磨，而是说它为你提供了一个每周一次的机会，去观察不满情绪可能在哪里悄然滋生。一对一谈话是你进行每周预防性维护的机会，同时也能了解团队的健康状况。一对一谈话是一个倾听员工言外之意的场合。


    成功的例行一对一谈话所伴随的声音是寂静。所有在一对一谈话中进行的倾听、提问和讨论，都是管理上的预防性维护。你会看到对某个项目的兴趣何时开始减弱，并在其演变成对工作的不满之前采取行动。你会听到两名员工之间的紧张关系，并在它发展成会议上的争吵之前进行调解。你建立健康一对一谈话文化的回报，就是明显地减少戏剧性事件。


    ## 章节


    ## 周一恐慌症


    **周一从周日就开始了。** 就在你意识到周末结束，开始盯着那无尽的任务清单的时刻——那份清单是你从周五早早就开始忽略的，因为那时周末甜蜜的气息充满了你的办公室。


    通常，周日越早想到周一，就越说明你在周五有多少该做的事没做。更糟的是，你在周末为工作日焦虑的时间越长，周一真正到来时你就会越愤怒。极端情况是，有人整个周末都在为工作状况而烦恼，把自己纠结成一个压力的死结，这意味着，当周一到来时，他们可能会崩溃。


    这周一的恐慌来自我的 QA 主管，丁菲尔德。他整个早上都在走廊里压抑着情绪。他用尖锐、低沉的声音跟每个愿意听的人说着什么。我已经知道话题是什么，但他言语中的激烈程度让我吃惊。午饭后不久，他发作了。丁菲尔德双手紧紧交握在身前，站在我的门口，脚尖轻轻地点着地。


    “兰兹，能和你谈一分钟吗？”


    该死。


    我抓紧桌沿，做好了心理准备。


    “老天爷，”他说。“我们要发布糟糕透顶的产品了，你定的都是不切实际的截止日期，QA 总是背黑锅，我们还支持不支持 IE9，我的信誉都悬在这儿了，看在基督的份上，我们上次的教训还不够吗，求求了，我恨
    HTML，还有那个开发人员一直在瞎搞。”


    **兰兹软件管理法则第 27 条**：如果有人要崩溃，那一定是在周一。


    ### 恐慌症


    恐慌症因其激烈程度而独特。当你第一次成为其接收对象时，你会因震惊而喘不过气来。这个平时冷静的人怎么就对着我大喊大叫了？我们先别担心这个。先来理解如何处理面前的恐慌，这意味着要遵守规则。


    #### 不要加入恐慌


    最糟糕的恐慌是那种纯粹情绪化、不合逻辑、基于很少或根本没有事实依据的。它也缺乏任何形式的解决方案，因为实际上并没有一个定义明确的问题，只不过是这个人真的需要发泄一下。这种恐慌的音量和强度会具有消极的感染力，你会忍不住想加入恐慌的行列。


    不要。


    这里最好的做法就是单纯倾听，保持眼神接触。你的冷静是一种原始的尝试，试图用意念将这种疯狂反射回恐慌者身上，让他们意识到自己已经失控了。这可能很艰难，因为恐慌可能直接指向你，但即使受到攻击，你的任务也一样：倾听。点头。重复。


    #### 相信恐慌者有其理由


    很可能，你的恐慌者确实有话要说，但也许他们自从上周五下午 5 点以来，醒着的每一刻都压力重重，从而失去了判断力。也许他们的恐慌与他们所说的话毫无关系，而是完全由上周一系列不相干且结果糟糕的事件演变而来。也许他们喝了太多咖啡，但请记住，他们有其道理。


    在任何恐慌中，通常会有一段非常嘈杂的前言，目的是引起你的注意。丁菲尔德上面的话都是前言。我知道等他停下来喘口气时，我们就会触及问题的核心。他可能已经说过了，但当他再说一次“不切实际的截止日期”时，我知道我们取得了进展，因为我们触及了恐慌的根源，我们可以开始对话，这是化解局势的第一步。


    但是，事情并不总是那么容易……


    #### 用问题敲打恐慌者


    有时前言就是没完没了。当然，内容就藏在某处，但有些恐慌者就是喜欢恐慌本身。他们喜欢引起你的注意，或者只是喜欢听自己说话，但如果过了好几分钟，你听到的还只是前言，那就到了该接管主动权的时候了。


    结束前言并开始对话，从提问开始。为什么产品会糟糕透顶？我们该在意 IE 9 吗？时机恰当且精心设计的问题能让恐慌者远离情绪，因为它们迫使他们使用大脑的另一侧，在那里他们不会恐慌，而是思考。


    我很幸运；我知道丁菲尔德会在大约两小时后引爆这颗炸弹。在那段时间里，我快速浏览了我们的 bug 跟踪系统，查看每个人提交了多少 bug；我查看了 bug 的严重级别、提交频率，以及任何可能帮我拆弹的有用
    bug 信息。


    丁菲尔德一开始恐慌，我就冷静地拿出我的 bug 笔记。在他喘口气的那一刻，我问道：“嘿，这周末来了多少个 bug？我们修复了多少？其中有多少修复没生效？哇，你觉得为什么会这样？”


    用问题进攻的关键是让你的恐慌者从情绪状态转向理性状态。我知道，我也知道当压力山大时，用一种看似理性的方式攻击压力源感觉有多好，但是，嗯，你正在大喊大叫，用手指着我，还上蹿下跳。你是想让我对你的喊叫做出反应，还是对事实做出反应？


    #### 让恐慌者解决他们自己的问题


    用问题对付恐慌的一个令人愉快的副作用是，你会发现恐慌者往往已经接近解决方案了。请记住，他们从周五就开始郁闷，在那段时间里，他们从各种可能的角度反复咀嚼这个问题。在那种状态下，他们的理解虽然浸透着情绪，但比你更深。


    即使你没有成功预判到一次恐慌，你仍然可以利用自己的经验作为一种手段，去探索恐慌者对任何可能问题的理解。嘿，你甚至不需要经验；你所需要的只是想要理解这个人到底在为什么而恐慌。有时，你会走运。你简单的澄清性问题最终会换来一句：“而且*该死的兰兹*，工程经理们应该*每天早上都仔细检查他们的
    bug！*”


    好吧。


    就这么办。


    ### 问题依然存在


    对工作投入感情是在意自己工作的绝对必要条件。当你走进我的办公室并崩溃时，我听到的是“兰兹，我在乎我的工作，请听我说。”我花了多年时间经受这些情绪的爆发，才学会听到这句话，而不把它当成是针对个人的，但我已经预料到，在充满激情的工程团队中，恐慌是一种常态。


    但这依然是一次管理上的失败。

    '
- fmt: "# It’s great that your freak has chosen to freak out\n\nIt’s great that your\
    \ freak has chosen to freak out. The alternative is that they’re not saying a\
    \ thing and have decided to leave the company. The fact that your particular Dingfelder\
    \ is screaming at you in your office is a good sign that he’s not leaving because\
    \ he clearly, loudly cares.\n\nBut you screwed up. Someone is screaming in your\
    \ office, and once you successfully defuse the situation, you know two things.\
    \ First, there is a problem that needs to be solved. Second, and more importantly,\
    \ someone believes the best way to get your attention is by freaking out.\n\n\
    ## Lost in Translation\n\nEarly on in your mastery of a complex thing, you are\
    \ going to catastrophically overestimate your ability.\n\nYour confidence is going\
    \ to be artificially high. This new job, hobby, or sport is going to appear magically\
    \ easy. You’re going to feel gifted. Those watching your miraculous aptitude keep\
    \ saying “beginner’s luck,” but that’s neither what you’re hearing nor what they’re\
    \ actually saying. What you’re hearing them say is, “We are jealous that you are\
    \ gifted at this thing you totally don’t understand,” but what they’re actually\
    \ saying is, “We understand it’s intoxicating to instantly feel like an expert\
    \ and we will most certainly bite our tongues when you painfully discover how\
    \ much you have to learn.”\n\n*Learn schmearn. I’m a genius.*\n\nThe gift of the\
    \ enthusiastic beginner is blissful and empowering ignorance. Beginners are not\
    \ burdened with the depth and complexity of understanding; they shine brightly\
    \ with enthusiasm … until the Fall.\n\n## Wallace Hates Me\n\nI wasn’t even a\
    \ manager. I was a lead of two engineers, but titles don’t matter. It was the\
    \ change in attitude of one the engineers that got my attention. Harold didn’t\
    \ miss a beat after I became his lead. He was in my office on Monday morning:\
    \ “Where do we start?”\n\n“Maybe we should, uh, fix error-handling in the test\
    \ framework? Maybe?”\n\n“It’ll be done by Wednesday.” *Cool. I can so do this.*\n\
    \nWallace, on the other hand, was indifferent. I waited until Wednesday to walk\
    \ into his office to ask, “Hey, I was wondering what you were working on?”\n\n\
    “Same as last week. Endless bugs.”\n\n“OK, great … super. Uh, holler if you need\
    \ anything, OK?”\n\nSilence. *OK, fine. I’ve never really gotten Wallace; he’s\
    \ done his own thing and he seems to do it well, so let him do it, right?*\n\n\
    Besides, I was a lead. Look at Harold—he bolts into my office every morning in\
    \ his bright orange Philadelphia Flyers jersey and asks the same question: “What’s\
    \ next?” He and I were cranking, so much so that three weeks after I became a\
    \ lead, they added Stan to the team. Stan was a Boston Bruins fan, but he and\
    \ Harold were birds of a feather. They grabbed coffee together in the morning,\
    \ argued about hockey, and then darted to my office: “What’s next?”\n\n*I can\
    \ so do this.*\n\nThree weeks turned into three months, and Harold, Stan, and\
    \ I were nailing it. Yes, I’d dutifully check in on Wallace each week, but the\
    \ action was with the three of us. I figured that when Wallace was ready to climb\
    \ out of his shell and join the productivity party, he would.\n\nThree months\
    \ to the day, my boss walked in my office with a paper in his hand. “Wallace has\
    \ been keeping a daily log of every interaction with you and claims, outside of\
    \ meetings, that you’ve collectively spent 30 minutes with him in the last three\
    \ months. Is that true?” He handed me the paper:\n\n*3/21:* Asked about bug status—47\
    \ seconds  \n*3/22:* Question about performance—doesn’t know what he’s talking\
    \ about and/or asking for—1 minute, 12 seconds  \n*3/23:* No interaction  \n*3/24:*\
    \ No interaction  \n\nSix pages of meticulous, single-line entries documenting\
    \ every single minute of my managerial incompetence. My thought: “I thought he\
    \ didn’t care.”\n\n## The Fall Is Not the Lesson\n\nIt’s called the Fall because\
    \ in an instant the normally predictable floor upon which you stand vanishes and\
    \ you enter a mental free fall where you feel like throwing up because you no\
    \ longer know which way is up."
  raw: 'It’s great that your freak has chosen to freak out. The alternative is that
    they’re not saying a thing and have decided to leave the company. The fact that
    your particular Dingfelder is screaming at you in your office is a good sign that
    he’s not leaving because he clearly, loudly cares.


    But you screwed up. Someone is screaming in your office, and once you successfully
    defuse the situation, you know two things. First, there is a problem that needs
    to be solved. Second, and more importantly, someone believes the best way to get
    your attention is by freaking out.


    CHAPTER


    Lost in Translation


    Early on in your mastery of a complex thing, you are going to catastrophically
    ­overestimate your ability.


    Your confidence is going to be artificially high. This new job, hobby, or sport
    is going to appear magically easy. You’re going to feel gifted. Those watching
    your miraculous aptitude keep saying “beginner’s luck,” but that’s neither what
    you’re hearing nor what they’re actually saying. What you’re hearing them say
    is, “We are jealous that you are gifted at this thing you totally don’t understand,”
    but what they’re actually saying is, “We understand it’s intoxicating to instantly
    feel like an expert and we will most certainly bite our tongues when you painfully
    discover how much you have to learn.”


    *Learn schmearn. I’m a genius.*


    The gift of the enthusiastic beginner is blissful and empowering ignorance. Beginners
    are not burdened with the depth and complexity of understanding; they shine brightly
    with enthusiasm … until the Fall.


    Wallace Hates Me


    I wasn’t even a manager. I was a lead of two engineers, but titles don’t matter.
    It was the change in attitude of one the engineers that got my attention. Harold
    didn’t miss a beat after I became his lead. He was in my office on Monday morning:
    “Where do we start?”


    “Maybe we should, uh, fix error-handling in the test framework? Maybe?”


    “It’ll be done by Wednesday.” *Cool. I can so do this.*


    Wallace, on the other hand, was indifferent. I waited until Wednesday to walk
    into his office to ask, “Hey, I was wondering what you were working on?”


    “Same as last week. Endless bugs.”


    “OK, great … super. Uh, holler if you need anything, OK?”


    Silence. *OK, fine. I’ve never really gotten Wallace; he’s done his own thing
    and he seems to do it well, so let him do it, right?*


    Besides, I was a lead. Look at Harold—he bolts into my office every morning in
    his bright orange Philadelphia Flyers jersey and asks the same question: “What’s
    next?” He and I were cranking, so much so that three weeks after I became a lead,
    they added Stan to the team. Stan was a Boston Bruins fan, but he and Harold were
    birds of a feather. They grabbed coffee together in the morning, argued about
    hockey, and then darted to my office: “What’s next?”


    *I can so do this.*


    Three weeks turned into three months, and Harold, Stan, and I were nailing it.
    Yes, I’d dutifully check in on Wallace each week, but the action was with the
    three of us. I figured that when Wallace was ready to climb out of his shell and
    join the productivity party, he would.


    Three months to the day, my boss walked in my office with a paper in his hand.
    “Wallace has been keeping a daily log of every interaction with you and claims,
    outside of meetings, that you’ve collectively spent 30 minutes with him in the
    last three months. Is that true?” He handed me the paper:


    *3/21:* Asked about bug status—47 seconds


    *3/22:* Question about performance—doesn’t know what he’s talking about and/or
    asking for—1 minute, 12 seconds


    *3/23:* No interaction


    *3/24:* No interaction


    Six pages of meticulous, single-line entries documenting every single minute of
    my managerial incompetence. My thought: “I thought he didn’t care.”


    It’s called the Fall because in an instant the normally predictable floor upon
    which you stand vanishes and you enter a mental free fall where you feel like
    throwing up because you no longer know which way is up.


    The Fall Is Not the Lesson'
  trans: "\n# 你的“怪人”炸毛了，这其实挺好的\n\n你的“怪人”选择炸毛，这其实挺好的。否则，他们可能一声不吭就直接离职了。你那位独特的丁菲尔德在你办公室里冲你大喊大叫，这恰恰是个好兆头——说明他不会离开，因为他显然还在乎，而且在乎得很大声。\n\
    \n但确实是你搞砸了。有人在你办公室里咆哮。一旦你成功平息事态，你会明白两件事：第一，存在一个需要解决的问题；第二，也是更重要的一点，有人觉得引起你注意的最佳方式就是炸毛。\n\
    \n## 理解偏差\n\n在你刚刚掌握某件复杂事物的初期，你往往会灾难性地高估自己的能力。\n\n你的自信心会异常膨胀。这份新工作、新爱好或新运动，你会觉得神奇般地简单。你会觉得自己天赋异禀。那些目睹你“神速进步”的人总说这是“新手运气”，但你听到的和他们实际想表达的完全是两码事。你听到的是：“我们嫉妒你能如此轻松地掌握你根本不懂的东西。”但他们实际想说：“我们明白，瞬间感觉自己像个专家确实令人陶醉。当你痛苦地发现自己要学的东西还多着呢，我们肯定会咬紧牙关忍住不说的。”\n\
    \n*学个屁学，我可是天才。*\n\n热情新手的天赋，在于一种幸福且赋予力量的无知。新手不会被理解的深度和复杂性所拖累；他们因热情而光芒四射……直到“跌落神坛”。\n\
    \n## 华莱士恨我\n\n我那时甚至还不是经理，只是一个带两名工程师的组长，但头衔不重要。真正引起我注意的是其中一位工程师态度的转变。哈罗德在我成为他组长后，没有丝毫停顿。周一早上他就冲进我办公室问：“我们从哪儿开始？”\n\
    \n“也许……呃……先修好测试框架里的错误处理？也许？”\n\n“周三前搞定。” *行，这活儿我能干。*\n\n而华莱士呢，则是一副漠不关心的样子。我一直等到周三才走进他办公室问：“嘿，我想问问你在忙什么？”\n\
    \n“跟上周一样，没完没了的 Bug。”\n\n“好的，很棒……非常好。呃，有事就叫我，好吗？”\n\n沉默。*行吧，我从来就没搞懂过华莱士；他一直独来独往，而且看起来干得不错，那就让他干去吧，对吧？*\n\
    \n再说，我可是组长。看看哈罗德——他每天早上穿着他那件亮橙色的费城飞人队球衣冲进我办公室，问同一个问题：“接下来做什么？”我俩合作得热火朝天，以至于我当上组长三周后，团队又加入了斯坦。斯坦是波士顿棕熊队的球迷，但他和哈罗德是一类人。他们早上一起喝咖啡，争论冰球，然后一起冲进我办公室：“接下来做什么？”\n\
    \n*这活儿我能干啊。*\n\n三周变成了三个月，我和哈罗德、斯坦都干得风生水起。是的，我每周都会尽责地去看看华莱士，但真正的“行动”都在我们三个人这边。我以为等华莱士准备好走出他的壳，加入这场生产力派对时，他自然会加入。\n\
    \n正好三个月那天，我的老板拿着一份文件走进我办公室。“华莱士一直在记录他与你的每一次互动的日志，他声称，除去会议，过去三个月你和他总共待了 30 分钟。这是真的吗？”他把文件递给我：\n\
    \n*3/21：* 询问 Bug 状态——47 秒  \n*3/22：* 询问性能问题——他根本不懂自己在说什么和/或者在问什么——1 分 12 秒  \n\
    *3/23：* 无互动  \n*3/24：* 无互动  \n\n整整六页，密密麻麻的单行记录，详述了我管理无能的每一分钟。我当时心想：“我以为他不在乎呢。”\n\
    \n## “跌落神坛”不是教训\n\n之所以叫“跌落神坛”，是因为在那一瞬间，原本稳定可预测的地面消失了，你的大脑陷入自由落体状态，恶心想吐，因为你再也分不清哪里是上。\n"
- fmt: '# The Sensation of the Fall


    The sensation of the Fall is disproportionate to the size of the lesson. You experience
    not just the sense of failure, but also the colossal irrational disappointment
    that you are no longer an expert at this task with which you have no previous
    experience—which is goofy. Here’s the kicker—you now have just enough experience
    to understand the actual work involved in becoming proficient at a task you previously
    thought you could magically improvise.


    A Wallace-class Fall is common with freshly minted leaders, and it’s one exacerbated
    by the commonly introverted tendencies of engineers. It’s the discovery that not
    only is someone you lead not following, but that there is a complete and total
    personality disconnect with this person. None of your usual networking moves work.
    They stare blankly at your witty repartee, and when they do talk, it’s as if they
    haven’t heard a single word you’ve said.


    It’s a frustrating discovery, because part of the reason you became a leader was
    due to your natural and proven people skills. But it’s an enviable discovery,
    because on a planet full of people, most of them aren’t like you, and your first
    Wallace will not be your last.


    # Your Instincts Are 100 Percent Wrong


    A complete personality disconnect with someone you intend to lead, like in a Wallace
    situation, is rare, but for the sake of figuring how to tackle it, let’s assume
    this worst-case scenario.


    In a normal getting-to-know-you situation with an employee, the first question
    I want to be able to answer is, “What do they want?” What is their core motivation
    with regard to their current gig? Are they working on a promotion? Are they just
    figuring out the gig? Are they adrift? Are they OK with being adrift?


    Understanding core motivation does not give me a complete picture of a person,
    but it gives me a place to start. When I know where they want to be, I can start
    to figure out how to get them there. Unhappily adrift people want immediate action.
    Those seeking promotions are eagerly seeking opportunity and will own anything
    to get it. However, this is Wallace, and Wallace stares blankly when I blithely
    ask, “What floats your boat, Wallace?”


    Give up on the idea that you’re going to finesse Wallace into telling you his
    secrets. Nothing that comes to you naturally is going to work with someone who
    honestly believes you are an alien. Your first job isn’t understanding core motivation,
    it’s basic communication.


    In any situation where communication is suspect, I rely heavily on clarification.
    Whenever I say something that might be ambiguous, I ask, “What did you hear?”
    In return, when I’m listening, and the topic or intent is not abundantly clear,
    I restate: “OK, what I heard was …”


    It sounds like this:


    *Me:* … and new requirements came in this weekend, but Jennifer still wants to
    see an initial spec by Thursday. Wallace, *what did you hear there?*


    *Wallace:* Jennifer wants a spec on Thursday.


    Now, if this were Harold or Stan, we’d be done. A verbal commitment was made and
    we’d move on, but this is Wallace and I can assume nothing.


    *Me:* Yes, a spec on Thursday. And what does that mean for your work?


    *Wallace:* I was planning on finishing doc review on Monday and building out test
    data on Tuesday and Wednesday. I won’t get to that if Jennifer needs a spec on
    Thursday.


    *Me: What I’m hearing is* that you’ve got a pile of work that will need to be
    rescheduled, right?


    *Wallace:* Right.


    *Me:* And if we do that, do you think you can have the spec done?


    *Wallace:* Maybe.


    I know it feels like the passive-aggressive Olympics, but I swear this is how
    Wallace thinks. In his world, a work commitment is never implied and must be verbally
    stated. We need to go back and forth until he states, “I will reschedule all of
    my planned work from this week until next week. I’ll relay the implications of
    these changes to the docs and QA teams, and I have moderate confidence there will
    be no issue in delivery of a first draft of the revised spec by close of business
    on Thursday.”


    It’s pedantic, annoying, and inefficient, but when personalities are disconnected,
    you don’t know how to communicate, so that’s where you start. With practice, you’ll
    learn the unique rules of engagement. You’ll discover the words and the ideas
    that people use to describe both their happiness and their displeasure. You’ll
    learn the visual and verbal cues they employ when they have no idea what you’re
    talking about. In time, you’ll develop a mental map of this person who is decidedly
    not you.


    The sensation of interacting with these aliens will never feel natural. It will
    always feel deliberate and foreign, but practice will provide you with a guide
    into how they think and a map that might provide insight for you into what they
    want.


    # The Size of the Lesson


    It took months. It took months of conscious and intentional conversations with
    Wallace for us both to subconsciously agree to a communication peace treaty. It
    was painful—each time Wallace and I would drop into that primitive conversation
    dance, Harold and Stan would stare at each other and shake their heads. This nonsense
    again?


    The nonsense was the essential lesson I learned from my first managerial Fall:
    when communications are down, listen hard, repeat everything, and assume nothing.
    The Wallace situation was the first of many Falls, and the beginning of my understanding
    something fundamental to making future Falls less catastrophic: that people are
    the best puzzles you’ll never solve.


    # CHAPTER


    # Agenda Detection


    I hate meetings.


    *Everyone* hates them because we’ve all been to so many that have sucked unequivocally
    that we now walk into a conference room, sit down with our arms folded, and think,
    “OK, how long until this one is officially a waste of my time? How long until
    *this* one sucks?” And then it does. Time is wasted. Hot air is generated and
    everyone sits around the table wondering when someone is going to stop the madness.


    If you’ve ever been frustrated in a meeting—if you’ve sat there wondering why
    in the world these people, these managers, who are paid the big bucks to move
    the company along, simply can’t do or say the painfully obvious—then keep reading.


    There is a basic skill you need whenever you walk into a meeting that has suck
    potential. This skill is important whether you’re a participant or the person
    running the meeting. The skill is called *agenda detection.*


    Simply put, agenda detection is the ability to discern:


    1. Typical meeting roles and how meeting participants assume them.

    2. Explanation of what these distinct meeting roles want out of a meeting.

    3. How to use this understanding to get the hell out of the meeting as quickly
    as possible.


    ## Meeting Bail Tip #1: Identify the Type of Meeting


    The first step in getting out of a meeting is to identify what kind of meeting
    it is. A meeting agenda would help, but as most meetings proceed without one,
    you’re on your own. Chances are you’re either in an informational meeting or a
    conflict resolution meeting.


    At informational meetings—big surprise coming here, folks—information is passed
    on. Think your favorite quarterly all-hands meeting. Staff meetings. Any meeting
    where there’s a standing assumed agenda. There are two kinds of participants in
