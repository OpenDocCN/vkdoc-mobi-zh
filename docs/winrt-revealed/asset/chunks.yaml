- fmt: '# 排版后的文本


    This isn’t a hard-and-fast rule. There are many times you need to invite folks
    simply because you know they’ll speak up randomly and brilliantly. However, as
    you’re building your off-site, this step illuminates both your agenda and your
    audience.


    *Fred doesn’t really hate this, because he likes the democratic and flat feel
    it gives to the affair.* Thanks Fred.


    ## It’s not in your usual building


    The other word frequently associated with off-sites is *boondoggle*. When you
    learn that the senior leadership team is spending the weekend in Vail, I can assure
    you, yes, that is a boondoggle. I’m certain there is a clear business justification
    that explains why the company needs to fly seven executives to Vail in the middle
    of fall, but I’m also certain they could do the same work at a lower altitude.


    Off-sites don’t need to be swank, but they do need a sense of elsewhere. They
    need to be far from the tactical distractions of the office because people need
    a new view. One of your goals for an off-site is to create grounds where people
    feel comfortable speaking heresy. If whatever problem sitting in front of you
    could have been solved via the day-to-day, it would have been solved. Drastic
    measures call for creative thinking, and now that you’ve gathered these bright
    people together, you want them to feel comfortable saying whatever compelling
    ideas cross their minds. Speaking heresy is easier when you aren’t surrounded
    by visual reminders of obvious constraints.


    *Fred hates it.* “Do you know how much this is costing us? We could do exactly
    the same thing in the seventh-floor boardroom.”


    Yes, we could, Fred, but within two hours here’s how it would play out: Someone
    is going to figure out we’re hiding out in the boardroom, and they’re going to
    find something that appears to be earth-shatteringly important that will pull
    one of us out of the room. Folks will return slowly from breaks and sometimes
    won’t return at all. You are paying a premium to make sure everyone in the room
    can focus, but if you have an off-site–worthy topic, it’s a small price to pay
    for this group’s attention.


    ## There’s someone responsible for flow as well as action


    With the correct group in the room, getting a healthy conversation started on
    the problem isn’t hard. In fact, once the group gets started, the issue will be
    figuring out how to get them to stop. To manage this, there are two roles you
    need to designate before the festivities begin: a Master of Ceremonies and a Taker
    of Notes, and they are usually not the same person.


    The Master of Ceremonies is the person responsible for not just moving the day
    along, but also knowing when to stop and pivot. Again, getting this particular
    group into a healthy conversation shouldn’t be hard, but don’t confuse a healthy
    conversation with progress. A deeply engrossing conversation is a great thing
    and a rich environment for finding the core of a great idea, but there are many
    conversations to be had, and this is just one. A good Master of Ceremonies knows
    when an idea has been explored as best it can and it’s time to move on.


    The Taker of Notes reads like an administrative job, but it’s the most important
    gig in the room. Once an off-site really gets going, once the team really engages,
    it’s all going to sound like great ideas. The Taker of Notes is tasked with not
    only capturing the bright ideas, but the right ideas. After years of off-sites,
    my observation is that you only find three new ideas that you act upon. These
    can be huge company-changing ideas, but there are only going to be three, and
    it’s the immense burden of the Taker of Notes to not only find them, but assign
    them to the people who can and will drive them forward.


    *Fred hates it.* “They’re messing with the flow, man. Why can’t we just have a
    conversation? A debate? Why are we on the clock?”


    Fred, I understand that you hate process. You equate the appearance of process
    with a decrease in free will. You believe that process is slowly going to sap
    this company of the creative ninja spirit that got us from 12 to 120 people, and
    you’re right. Blindly landing process without considering the culture it needs
    to support it is a recipe for disaster. However, believing that the loosey-goosey,
    make-it-up-as-we-go rebel spirit that got us to 120 is going to take us to 2,000
    is absurd.


    I believe that each time your company doubles in size, it needs to reinvent how
    it communicates, and each subsequent transformation is increasingly radical and
    foreign. *Fred, if we’re going to grow, we need to constantly reinvent ourselves.*


    ## No personality tests, no trust falls, and no outsiders


    There are a couple of traditional moves that well-intentioned folks who have attended
    off-sites elsewhere are going to suggest, but that I want you to avoid.


    *Avoid personality tests.* If you’re working the team-bonding off-site, personality
    tests are going to be tempting. The idea of starting the off-site with perspective-altering
    personality tests feels … right. I want them to better understand each other,
    so have them answer a bunch of questions, and we’ll explain ourselves to each
    other and—*wham!*—understanding. Personality tests in their endless variety do
    exactly that. They tell you which well-defined bucket you comfortably belong in
    and explain to others your bucket’s intricacies. These buckets become social tent
    poles of the off-site, and suddenly everyone erroneously believes they’ve figured
    each other out. And while, yes, they now have convenient labels for each other,
    they haven’t really figured each other out—they’ve cheated. You’ve bypassed the
    learning process via a set of clever labels.


    If you want to understand someone, my advice is to sit next to them and solve
    a very hard problem together. You will learn who they are by watching how they
    think. Similarly …


    *Avoid trust falls*. Another traditional off-site move is using staged games or
    activities to get folks socially and mentally limber. These are endless and not
    entirely useless. Just as being in a different place gives the team a sense of
    elsewhere, your initial content needs to get them thinking in unfamiliar ways.
    As with personality tests, my preference is that the learning we need to do be
    done in support of working on the problem. If you can find a goofball trust-fall-like
    exercise that is going to get us closer to figuring out how to have fewer disasters,
    I’m a fan. If you’re putting the team through an uncomfortable and irrelevant
    social or strategic exercise because you’re attempting to build trust, why not
    make it relevant? It builds trust faster and you get actual work done. Lastly
    …


    *Avoid outsiders.* The last traditional move to avoid is the importation of outsiders.
    Facilitators, mediators—whatever. The justification for these external parties
    from the folks building the off-site will be, “I want to participate,” or, more
    deviously, “Someone has to manage the flow and the action.” An external facilitator
    gives a professional air, and they will move things along at a comfortable pace.
    However, while they would never admit this, they couldn’t give a shit whether
    you solve your problem or not. It’s not that they’re callous people; it’s that
    they’re *other*. They don’t know the culture, the problem at hand, the politics,
    or the personalities. They’re simply not qualified to participate beyond holding
    a stopwatch. You need someone running the show who has skin in the game.


    *Fred, not surprisingly, is actually cool with all of this, too.* Thanks again,
    Fred.


    ## They need to sleep on it'
