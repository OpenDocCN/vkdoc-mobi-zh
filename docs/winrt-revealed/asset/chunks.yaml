- fmt: 'I ask the same question in every interview I have: “Where do you need help?”
    Whether it’s an individual contributor, a manager, or my new boss, I’m always
    curious where people see their weaknesses. A flippant “I’m solid across the board”
    response is a terrifying red flag. I’m a fan of pride; I want you to sell yourself
    in an interview. But if you suggest that you’re flawless, all I’m thinking is
    that your flaws are so big that you can’t talk about them or you have no clue
    what they are.


    A manager’s job is to take what skills they have, the ones that got them promoted,
    and figure out how to make them scale. They do this by building a team that accentuates
    their strengths and, more importantly, reinforces where they are weak. Dry technologists
    need team members who are phenomenal communicators, folks who can tell a joke
    and socially glue the organization together. Those vision guys with zero technology
    chops need you, the strong technologist, to tell them what is technically possible.


    A manager’s job is to transform his glaring deficiency into a strength by finding
    the best person to fill it and trusting him to do the job.


    ## Does Your Manager Speak the Language?


    OK, so you’re in a square room. There are two clear windows in this room, one
    on each side. In front of each window is a microphone which, when turned on, pipes
    whatever you say to whoever is on the other side of the window. Now, your manager
    is on the other side of one window and your best work friend is behind the other.
    It’s Friday, and I want you to give your weekly status report to your friend.
    Something like: “Monday was a disaster. I got in late because I whooped it up
    on Sunday night. Took a stab at the spec, but left a little early because I was
    hung over. Tuesday and Wednesday were pretty good. Finished the spec, closed some
    bugs, went to the cross-functional review, got some good feedback. You should
    read the current version. Thursday was meeting hell. Got nothing done. Three useless
    hours. Friday, well, I had a beer at lunch and I’m leaving early.”


    Now, spin around and give your status to your boss. “Finished the spec early in
    the week, good mid-week cross-functional review. Lots of meetings later in the
    week.”


    I do not care if you work for the world’s best manager. I do not care if he was
    the best man in your wedding. You are going to give a vastly different sequence
    of events because you are not talking to a person when you talk with your manager;
    you are talking to the organization. You instinctively know that telling your
    boss that you had a beer at lunch is a bad idea, not because he’d know it, but
    because the organization would.


    The language you are speaking when you talk to your manager is a flavor of managementese
    (see [Chapter 13](#9781430243144_Ch13.xhtml) for more on managementese). Yeah,
    the language that Scott Adams has made millions of dollars exploiting. It is a
    carefully constructed language that is designed to convey information across the
    organization. Managementese allows managers from very different parts of the organization
    to communicate even though their respective jobs are chock-full of different acronyms
    and proper names. And yeah, managementese sounds funny.


    An example: “Our key objective for this project is the schedule. We need to keep
    our teams focused on their respective goals, but also keep them cross-pollinating
    so they can error correct on their own.”


    When you hear that, you think, “Why can’t he talk like a human?” He’s not talking
    to you. He’s talking to other managers and he’s saying some very Rands-like things,
    like “Commitments matter!” and “The team is smarter than the individual!” It’d
    be great if managers could speak with a little more art, but the job at hand is
    to spread information across the organization as efficiently as possible. And
    a local dialect of managementese is the best way. Besides, they still need to
    talk to you, which leads us to …


    ## How Does Your Manager Talk to You?


    My first piece of advice to all new managers is: “Schedule one-on-ones with direct
    reports, keep them on the same day and time, and never cancel them.” With this
    in mind, some of the trickiest transitions for me during the day are when these
    one-on-ones show up. I’m deep in some problem, writing a specification, answering
    a critical e-mail, and this person walks in my office and they want to talk about
    I don’t know what … *I’m working in the zone here, people.* In the brief second
    I try to figure out some way to reschedule this meeting, I remind myself of a
    simple rule, “You will always learn something in your one-on-one.”


    When is your manager giving you a chance to tell him what’s in your brain? I’m
    worried if your answer isn’t “at a one-on-one,” but I’m not panicking, yet. Maybe
    your manager is one of these organic types who likes to jump you in the hallway
    and gather relevant bits. Terrific. Does he do it consistently or when he needs
    something? The former is great; the latter is a problem waiting to happen.


    What is a manager learning in a one-on-one? Much of what you’re talking about
    in a one-on-one your manager already knows. You’re concerned about the reorg,
    right? Well, everyone is and he’s already talked to four other people about their
    concerns. You think the field engineers are a bunch of twits? So does he. A good
    manager has his finger on the pulse of their organization and the one-on-one usually
    echoes much of that pulse, so why is he carving out 30 minutes for every person
    on his team?


    He wants to learn.


    Whether it’s a one-on-one or a random hallway conversation, your manager should
    always be in active information acquisition. He should love it when you stop him
    in the hallway and tell him, “I hate your favorite feature.” See, the thing is,
    he’s been losing sleep over that feature for the past three days and he can’t
    figure out why. Your random hatred just shoved his thinking in another direction.


    Managers who don’t have a plan to talk to everyone on their team regularly are
    deluded. They believe they are going to learn what is going on in their group
    through some magical organizational osmosis and they won’t. Ideas will not be
    discovered, talent will be ignored, and the team will slowly begin to believe
    what they think does not matter, and the team is the company.


    ## How Much Action per Decision?


    When the new VP showed up for his first day at the startup, he was wearing a Members
    Only jacket. Sky blue. I didn’t know they still made these throw-backs to the
    1980s. A jacket that lived under the tagline, “When you put it on, something happens.”
    I’d given the VP a thumbs up during the button-up-and-tie phase of the interview,
    so I gave him the benefit of the doubt.


    Three months in, we had a problem. Members Only was doing a phenomenal job of
    discussing and dissecting the problems facing engineering. We’d leave meetings
    fresh with new ideas and promises of improvements, but then nothing would happen.
    OK, so follow-up meeting. WOW! He gets it. I’m fired up again. Let’s roll. Ummm,
    two more weeks and nothing is happening here.


    Now, me being the director of engineering, you can argue that the onus of action
    was on me. Problem was, I was doing everything I signed up to do. The VP wasn’t.
    He wasn’t talking with the CEO about our new plans. He wasn’t handling the other
    director who was totally checked out, sleeping on the job. When the third follow-up
    meeting was scheduled, the VP again demonstrated his solid problem-solving skills,
    but I wasn’t listening anymore. I was waiting for when we got the next-steps portion
    of the conversation where I’d pull up the meeting notes from the previous two
    meetings and carefully point out these were the same next steps as *the last two
    meetings.*'
