- fmt: '# An Unexpected Connection


    Blue whales.


    I couldn’t stop researching blue whales. I was 12, and my teacher had just explained
    to the class that blue whales are the largest mammals on planet Earth.


    In hindsight, this reaction was my first confirmed sighting of what in the Nerd
    Handbook[¹](#9781430243144_Ch40.xhtml#FON1) I call the “annoying efficient relevancy
    engine.” Something in the phrase “largest mammal on earth” started the relevancy
    engine, and once it starts, it’s not going to stop until the relevancy is understood.


    ## Two Buckets


    The relevancy engine is the nerd’s ability to instantly and with little conscious
    effort parse all incoming information into one of two buckets: Relevant or Irrelevant.
    It’s a defensive information-management strategy built as a reaction to the nerd’s
    innate passion for information—for understanding. See, nerds can and will find
    out everything about anything, and left to their own devices, they’ll do this
    … endlessly.


    Items placed in the Irrelevant bucket are aggressively ignored, whereas the items
    in the Relevant bucket are flagged as compelling and are, if possible, immediately
    investigated.


    The reason for this often-unavoidable research compulsion varies by topic. There
    is something tucked inside of the idea—a puzzle, a game, a system to be discerned—that
    triggers the nerd’s pleasure centers, and, once triggered, the only course of
    action is understanding. This is why, when you’ve piqued my interest, I keep asking
    questions, incessantly, while staring you in the face … never blinking.


    ## The Value of Relevance


    The real value comes when we’ve vetted the relevant. The act of obsessively researching
    yields even more relevant data that allows the nerd to fully index the idea. A
    mental notepad is created that reads “Blue Whales,” and on this notepad is written
    the three most relevant and interesting facts that make blue whales intriguing.
    This card is then carefully filed away.


    This collection of esoteric indexed data is why a nerd’s knowledge feels five
    miles wide and three inches deep, and why we’re randomly great at games like Trivial
    Pursuit. See, four years ago, someone mentioned to me that the largest organism
    on the planet was a quaking aspen tree. We heard that one relevant fact and then
    spent two hours investigating the various methods by which a largest organism
    might be measured, we read about the largest known fully connected quaking aspen
    grove in Utah, and we ended up reading about the world’s largest single stem tree,
    a giant sequoia named General Sherman.


    It sounds like a lot of work until you understand the payout.


    ## To Wit


    Nerds are fucking funny. It’s another point from the Nerd Handbook that I suggest
    is related to the relevancy engine, but I never explained why. Let’s try now.


    The processing of relevancy has three steps, and it’s the third where the magic
    happens:


    - *Collect* the relevant.

    - *Research* and *index* if necessary.

    - *Connect* the relevant in efficient and entertaining ways.


    So, how is the funny created in this flow? It’s a big question: what is funny?
    I’d say there are two big classifications of funny. There are jokes and there’s
    wit. Jokes are memorized comedy retold with moxie. Wit is original comedy created
    in real time and delivered with precise timing. Nerds are witty because they connect
    the relevant to the present quickly and in clever ways.


    Have you ever sat in a meeting full of engineers? What’s the game? The game is,
    Who can say the funniest and/or snarkiest thing and get the biggest laugh? To
    play, you need to kick the relevancy engine into high gear. You need to hear everything
    being said, parse it, compare it to everything you know, and then find the most
    relevant connection possible. In nanoseconds.


    Laughter is often the by-product of these observations, but so too is the hard
    silence found after the discovery of an uncomfortable truth. It’s at that moment
    you realize the primary goal is not laughter, but the art of the impressive connection.


    ## Connecting the Relevant


    The art of the connection is the end result of a nerd’s highly obsessive due diligence
    performed on anything that falls into the Relevant bucket.


    Laughter is sometimes the end result of connections—the recognition of the clever
    between two dissimilar items or the absurd lack of any connection at all—but the
    result in the nerd’s brain is far more satisfying. A successful connection brings
    efficient order to the two heretofore unrelated objects, and you know what that
    means: we’ve discovered structure. *This* is related to *that*. *I know more than
    I did a moment ago.*


    Discovery of structure in a chaotic world means less chaos, and while we’re happy
    to make you laugh, the idea of a more orderly, structured, and knowable world
    is what drives us and keeps us warm in bed at night.


    [¹](http://randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html)


    # Avoiding the Fez


    Fez.


    Fez is a senior engineer who works for me. He’s fictional, but you know Fez. He’s
    the guy who wrote that piece of code 9 million years ago that everyone is dependent
    on, but no one knows what exactly it does because Fez didn’t bother to comment
    a single line … oh yeah, and he wrote it in Forth.


    Fez has his own office and he nods a lot. It’s the nod of a man who believes he’s
    got rock-solid job security because his technology is critical. Fez bugs a lot
    of people, but when it hits the fan, Fez saves the day because he’s carefully
    cordoned off a critical path that is his and his alone.


    Each year, Fez and I sit down, and I present his focal review. I set the stage
    by asking about his aspirations and he responds with vague nodding.


    - *Sounds good, boss.*

    - *OK, boss.*

    - *Sure, boss.*


    Fez is not hearing a word of our discussion because Fez has heard this focal review
    mumbo jumbo for 12 years straight. He believes he’s immune.


    The approach of the Fez is a sure-fire way to slowly become irrelevant and, more
    importantly, become unemployed.


    ## Understanding Where You Stand


    Before I explain why there is a little Fez in all of us, let’s take a few steps
    back. The definition of a healthy business is a business that is growing, and
    by growing I mean it is making more money each year. There’s a plethora of different
    ways that a company can create this growth, but the basic law of business physics
    that you should never forget is “As a business grows, so shall its employees.”'
  raw: 'Think of the last contentious decision your team had to make. I’m talking
    about a big decision where team members were on opposite sides of the fence and
    you had to spend a good portion of a week sifting through the facts and opinions
    in order to construct a compromise decision that everyone agreed to, but didn’t
    like.


    Now, let’s include the entire company in that decision. It doesn’t matter what
    that decision is, what matters is that large groups of people move incredibly
    slowly. Call it bureaucracy, call it group think, but understand that very large
    groups of people working together barely looks like working because they move
    so slowly


    Reorgs affect the entire company. Everyone has an opinion and that means group
    think of a magnitude you’re unfamiliar with. I know you’re worried about your
    job, your team, and your career, but take a breath—I’m sure there’s other work
    to do.


    CHAPTER


    An Unexpected Connection


    Blue whales.


    I couldn’t stop researching blue whales. I was 12, and my teacher had just explained
    to the class that blue whales are the largest mammals on planet Earth.


    In hindsight, this reaction was my first confirmed sighting of what in the Nerd
    Handbook[¹](#9781430243144_Ch40.xhtml#FON1) I call the “annoying efficient relevancy
    engine.” Something in the phrase “largest mammal on earth” started the relevancy
    engine, and once it starts, it’s not going to stop until the relevancy is understood.


    Two Buckets


    The relevancy engine is the nerd’s ability to instantly and with little conscious
    effort parse all incoming information into one of two buckets: Relevant or Irrelevant.
    It’s a defensive information-management strategy built as a reaction to the nerd’s
    innate passion for information—for understanding. See, nerds can and will find
    out everything about anything, and left to their own devices, they’ll do this
    … endlessly.


    Items placed in the Irrelevant bucket are aggressively ignored, whereas the items
    in the Relevant bucket are flagged as compelling and are, if possible, immediately
    investigated.


    The reason for this often-unavoidable research compulsion varies by topic. There
    is something tucked inside of the idea—a puzzle, a game, a system to be discerned—that
    triggers the nerd’s pleasure centers, and, once triggered, the only course of
    action is understanding. This is why, when you’ve piqued my interest, I keep asking
    questions, incessantly, while staring you in the face … never blinking.


    The Value of Relevance


    The real value comes when we’ve vetted the relevant. The act of obsessively researching
    yields even more relevant data that allows the nerd to fully index the idea. A
    mental notepad is created that reads “Blue Whales,” and on this notepad is written
    the three most relevant and interesting facts that make blue whales intriguing.
    This card is then carefully filed away.


    This collection of esoteric indexed data is why a nerd’s knowledge feels five
    miles wide and three inches deep, and why we’re randomly great at games like Trivial
    Pursuit. See, four years ago, someone mentioned to me that the largest organism
    on the planet was a quaking aspen tree. We heard that one relevant fact and then
    spent two hours investigating the various methods by which a largest organism
    might be measured, we read about the largest known fully connected quaking aspen
    grove in Utah, and we ended up reading about the world’s largest single stem tree,
    a giant sequoia named General Sherman.


    It sounds like a lot of work until you understand the payout.


    To Wit


    Nerds are fucking funny. It’s another point from the Nerd Handbook that I suggest
    is related to the relevancy engine, but I never explained why. Let’s try now.


    The processing of relevancy has three steps, and it’s the third where the magic
    happens:


    *   *Collect* the relevant.

    *   *Research* and *index* if necessary.

    *   *Connect* the relevant in efficient and entertaining ways.


    So, how is the funny created in this flow? It’s a big question: what is funny?
    I’d say there are two big classifications of funny. There are jokes and there’s
    wit. Jokes are memorized comedy retold with moxie. Wit is original comedy created
    in real time and delivered with precise timing. Nerds are witty because they connect
    the relevant to the present quickly and in clever ways.


    Have you ever sat in a meeting full of engineers? What’s the game? The game is,
    Who can say the funniest and/or snarkiest thing and get the biggest laugh? To
    play, you need to kick the relevancy engine into high gear. You need to hear everything
    being said, parse it, compare it to everything you know, and then find the most
    relevant connection possible. In nanoseconds.


    Laughter is often the by-product of these observations, but so too is the hard
    silence found after the discovery of an uncomfortable truth. It’s at that moment
    you realize the primary goal is not laughter, but the art of the impressive connection.


    Connecting the Relevant


    The art of the connection is the end result of a nerd’s highly obsessive due diligence
    performed on anything that falls into the Relevant bucket.


    Laughter is sometimes the end result of connections—the recognition of the clever
    between two dissimilar items or the absurd lack of any connection at all—but the
    result in the nerd’s brain is far more satisfying. A successful connection brings
    efficient order to the two heretofore unrelated objects, and you know what that
    means: we’ve discovered structure. *This* is related to *that*. *I know more than
    I did a moment ago.*


    Discovery of structure in a chaotic world means less chaos, and while we’re happy
    to make you laugh, the idea of a more orderly, structured, and knowable world
    is what drives us and keeps us warm in bed at night.


    [¹](#9781430243144_Ch40.xhtml#FN1) [http://randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html](http://randsinrepose.com/archives/2007/11/11/the_nerd_handbook.html)


    CHAPTER


    Avoiding the Fez


    Fez.


    Fez is a senior engineer who works for me. He’s fictional, but you know Fez. He’s
    the guy who wrote that piece of code 9 million years ago that everyone is dependent
    on, but no one knows what exactly it does because Fez didn’t bother to comment
    a single line … oh yeah, and he wrote it in Forth.


    Fez has his own office and he nods a lot. It’s the nod of a man who believes he’s
    got rock-solid job security because his technology is critical. Fez bugs a lot
    of people, but when it hits the fan, Fez saves the day because he’s carefully
    cordoned off a critical path that is his and his alone.


    Each year, Fez and I sit down, and I present his focal review. I set the stage
    by asking about his aspirations and he responds with vague nodding.


    *Sounds good, boss.*


    *OK, boss.*


    *Sure, boss.*


    Fez is not hearing a word of our discussion because Fez has heard this focal review
    mumbo jumbo for 12 years straight. He believes he’s immune.


    The approach of the Fez is a sure-fire way to slowly become irrelevant and, more
    importantly, become unemployed.


    Understanding Where You Stand


    Before I explain why there is a little Fez in all of us, let’s take a few steps
    back. The definition of a healthy business is a business that is growing, and
    by growing I mean it is making more money each year. There’s a plethora of different
    ways that a company can create this growth, but the basic law of business physics
    that you should never forget is “As a business grows, so shall its employees.”'
