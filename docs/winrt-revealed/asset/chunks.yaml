- fmt: '# There’s a moment I like each person to have as part of an off-site, and
    I call it the bright-and-shiny inflection point.


    At some point after a compelling talk or brainstorming session, they start to
    believe. They finally let go of all the tactical things they need to do and allow
    their brains to jump into the creative soup that the organizers have been vigorously
    stirring. They see beyond the week and begin to see the next year. They have epiphanies
    and they start to see the beginnings of solutions to complex problems that have
    been nagging them for months.


    How do you get them there? You’ve got to get them soaking in it, and that takes
    time. An off-site must be at least two days long. You need one evening where everyone
    gets away from what is hopefully a high-bandwidth conversation regarding whatever
    it is that ails the company, and gets a chance to process this conversation in
    the back of their heads. When they walk into the unfamiliar location the next
    morning, whether they’ve mentally made progress or not, the big huge problem is
    still sitting there on the whiteboard waiting to be attacked.


    *Fred hates it.* “Since when do we need to spend two days solving this one problem?
    This company was founded by two guys high on Diet Coke at the Creamery. We had
    a prototype in a week, and that prototype was live the week after.”


    *Fred, the curse of success is that we have to move slower, and it’s a confusing
    curse.* See, we’ve been successful, and the result of that success is that we’re
    able to hire more people to do the seemingly impossible amount of work our success
    has created. But each person we add to do more work strategically slows us down.
    Each additional person levies a communication tax, and unless we figure out how
    to constantly improve our communication, we’re just going to get slower. That’s
    why we’re here; even if perfect solutions came to us during caffeinated highs,
    we’d still need to vet them with the many bright people we’ve hired to help us
    grow.


    ## What Fred Really Hates


    The morning that Fred arrives at the off-site, which is at some nearby location.
    After a delightful breakfast, Fred and the rest of the off-site team gather in
    a room where someone important stands up at the front of the room and starts talking.
    As the morning’s coffee kicks in, Fred’s initial knee-jerk reaction to this talking
    is, “You know folks, I have essential stuff to do, and this yap-yap-yapping isn’t
    helping me get this stuff done.” Fred folds his arms, clenches his jaw, and resigns
    himself to simply waiting until it’s over so he can get back to important work.


    At some point during the first day, Fred silently has his bright-and-shiny inflection
    moment. He turns off his phone and furiously starts scribbling down ideas. That
    night at the off-site dinner, the conversation is about work, but it isn’t about
    the shit he’s been slogging through daily; it’s about the strategic work he could
    do to make that shit go away—forever.


    And then it’s over. Fred returns to the office and he’s pumped and ready to start
    changing the world, but the moment he walks in the door, everything he hasn’t
    done is staring him in the face. As he starts rebuilding his daily work context,
    he realizes, “Not only do I have a lot to do, but now I’m behind.” The bright-and-shininess
    of the off-site he’s retained fades quickly.


    A week passes and now he’s angry. He’s angry because now that he’s caught up,
    he’s never going to get ahead because no one is making any time for him to apply
    all of his bright-and-shiny epiphanies. In fact, after a week, nothing from the
    two-day off-site has survived except Fred’s lasting opinion: “Well, that was a
    waste of our time.”


    The successful off-site is one that maps the discoveries of the off-site to the
    reality of the work. Bright-and-shiny inflection points are full of energy, but
    unless that energy is carefully channeled back into the building and immediately
    acted upon, all an off-site represents is a frustrating opportunity to dream,
    but not to act.


    # CHAPTER


    ## A Different Kind of DNA


    *Flat*. It’s an organizational meme in rapidly growing teams in Silicon Valley,
    and it contains a couple of noble ideas. Simply put, a flat organization is one
    with as little hierarchy as possible to encourage the individual voice. What’s
    not to love?


    The first challenge to the flat organizational mantra is the inevitable arrival
    of leads or managers tasked with organizing different aspects of the team. The
    flat religion’s answer to this development is rebranding of the role: the lead
    or manager is no different from the individual. It’s not a promotion, there is
    no raise; it’s just a different gig. There is no difference between those responsible
    for building the product and those responsible for building the people.


    I love this. I love this because it’s the beginning of solving a core career problem
    in teams of engineers: How do we grow? As I wrote in my book *Being Geek* (O’Reilly,
    2010), the curse of Silicon Valley is that great engineers are often promoted
    to leadership for their hard work. While many succeed in this role, an equal part
    fails because the skills required to lead are vastly different than the ones required
    to be an engineer. The curse is that we’re often placing our most valuable engineers
    in a role where they’re predisposed to fail.


    Think of it like this: there’s a large population of immensely talented engineers
    that should not be leaders. There is no amount of training that would make up
    for the talent we’d extinguish by teaching them how to write annual reviews.


    But everyone wants to grow.


    Unfortunately, in many companies the only perceived growth path is via management.
    Yes, there are job grades and cleverly phrased job descriptions that confusingly
    define the various states of engineering experience and growth, but these are
    a joke. These are a distraction packaged as a solution to the fact that we don’t
    have a good idea how to systematically grow engineers outside the traditional
    management hierarchy.


    ### No Ticker-Tape Parade


    A solution begins with rebranding, by introducing the idea that managers and engineers
    are hierarchically no different. Keep the pay the same; don’t throw a ticker-tape
    parade when a new leader is minted. They are peers. I support this religion because
    a flat organization is one where power, accountability, and responsibility are
    equally distributed. But I do not yet understand how this idea scales.


    Even with leads and managers who have the best of intentions, the moment they
    become responsible for folks—the moment everyone realizes they (figuratively)
    sign the checks—the relationship changes. I can’t yell at you because you sign
    the checks. This core change of perception isn’t just based on compensation, it’s
    based on a change of ownership and responsibility, and it’s the beginning of all
    sorts of potential cultural turmoil that’s worthy of an entire additional chapter.


    We need leads and managers as a means of scaling responsibility and communication,
    but we need to dispel the idea that their roles are also the exclusive owners
    of decision-making.


    As a solution, I offer the *DNA meeting*.


    ### Five Kinds of Win


    *DNA* stands for *design ’n’ architecture*. At its core, DNA is just a meeting.
    It’s a collection of bright engineers from across the team or the company sitting
    in a room tasked with a specific purpose. As the name *DNA* suggests, these engineers
    are responsible for deep analysis regarding decisions and directions core to the
    product. You probably already informally hold this type of meeting when faced
    with a big technical or design challenge. You gather together an informed set
    of eyeballs to vet the challenge. DNA makes the informal formal and it has five
    kinds of win.'
