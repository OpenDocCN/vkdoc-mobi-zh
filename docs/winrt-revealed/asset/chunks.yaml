  trans: '

    # 是的。当你成功进入心流状态时，我有时可能会变成一个混蛋。事实上，我可能会发飙。


    ## 发飙


    在此我深表歉意。


    没有人应该成为*发飙*的受害者。你来找我，不过是想知道我的工作何时结束，因为我们约好下午要去冲浪。然而，我当时正处于心流状态，正在写一篇超棒的文章，而*你是谁？你想要什么？*
    发飙的表现是一记怒视、一声呵斥……总之是为了表明*你的出现让我很恼火*。


    我知道这不公平，但你可以这样想：如果你走过来扇我一巴掌，我不会去想“你为什么这么做？”也不会花时间分析情况。我的本能反应将是纯粹、原始且即刻的——我会直接扇回去。


    这种非理性反应的根源在于古老的脑部布线。四百万年前，快速应对扇打是我的进化优势，因为这往往预示着要被吃掉。我的大脑没有将“扇打回应”接入“什么是合理反应？”的区域，而是直接连入了“必须立即反应，否则就完蛋”的区域。不知何故，发飙的神经通路与此如出一辙。心流状态被侵入，类似于某种需要大脑直接连接“即刻非理性反应”区域的原始活动。


    这不对，也不被社会所接受，我在 30 秒后就会后悔。但在二十年的极客生涯中，我追求的目标从来不是消灭发飙，而是学会如何管理它。


    ## 工作场


    尽管我尽力而为，但并非总能进入心流状态。我会完成一系列古怪的前置准备活动——挑选饮品和音乐，微调桌面上五件必备物品的位置，然后开始……玩《魔兽世界》。


    这不是心流状态……这是*工作场*。从表面上看，它与心流状态非常相似，但从心智层面来说，我正在锻炼的是另一块不同的肌肉。如果把心流状态比作在冠军冰球赛中担任强力前锋，那么工作场就是赛前一天在力量房里度过的六个小时。没错，我在锻炼脑力，但实际上并没有做成什么事。


    规则是这样的：你的伴侣可以随意打断工作场，而且不会受到责难。我可能会发飙，但如果你像应该让我在心流状态下工作那样，让我在工作场中徘徊，你将永远见不着我这个人。如果你走进我的办公室想问我问题，却看到屏幕上有个半裸的暗夜精灵在跳舞，那么我在此授权你可以直接闯入。错误难免会发生，你可能会误把心流状态当作工作场而闯入。但在我冷静下来之后，我有责任向你解释，为什么看似工作场的情况，其实却是心流状态。


    ## 其他场所


    极客因结构化而获得回报。我们因可靠地生成有用的技术方案而获得高薪。没错，我们是艺术家，但这是一门关于模式、重复、结构和效率的艺术（我发誓，这很性感）。因此，我们在家中和思维中创造的场所也遵循同样的模式，这并不令人意外。


    这些场所的风险，与所有舒适场所的风险相同。在舒适之中，我们忘记了最有趣的事情往往发生在别处。


    # 章节


    ## 会议众生相


    有史以来最糟糕的会议。


    问题不在于参会名单有误——所有相关的人都在场，他们都很聪明，而且是决策者。问题也不在于议题无聊或定义不清——这确实是个大事。这场会议的问题是，它永远也开不完。


    事情是这样的，大约一年前，我们的一位资深工程师在阅读我们与应用服务器签订的合同时发现：“技术支持将于两年后终止。合作到此结束，你们就自求多福吧。”他慌了，召集了会议，并在会议上再次慌神，以确保我们都知道这是件大事。于是，我们都同意这是件大事。任务清单列出来了，后续会议也安排上了……整个氛围充满了一种“看，天塌下来时我们还是能做点事的”愉悦感。我喜欢看到人们带着目的四处奔忙的样子。


    回到现在。*一年*过去了，我们还没有完成切换。那位一年前拉响警报的资深工程师，令人惊讶的是，他居然还出现在这次会议上，尽管他已经不复一年前那种工程师的风采。我敢保证他一个字都不会说，因为他知道我也知道的事……


    ……这简直是有史以来最糟糕的会议。


    九个月前我们就知道需要做些什么来完成向新服务器应用的迁移。但问题在于，这真的他妈太吓人了。这是那种“不开始行动，我们就无法知道一半以上的工作是什么”的场景，而开始行动就意味着拿公司来赌。一旦我们开始迁移，就没有回头路可走，这吓得所有人魂飞魄散，包括那位一直不做决定的副总裁。


    过去 12 个月里，每个月我们都在开同一个会。这是问题所在，这些是风险，这些是我们已知的，这些是我们未知的。所有这些铺垫性的废话就要花上 30 分钟，既然距离上次听到已经过了一个月，每个人都需要重新了解所有的复杂细节。大家都在点头，而我则慢慢把指甲抠进会议桌。然后，我们进入会议的“兜圈子”环节，所有相同的问题被再次提出，再被回答一遍。这就是为什么那位资深工程师不再积极参与的原因——他厌倦了重复自己。


    会议是由人组成的，但更有趣的是，会议是由“角色”组成的。这些角色代表了与会者的职能、特质和怪癖。在你经历过几千场会议后，你会发现这些相同的角色会反复出现。认清他们是谁，能帮你理解会议；了解他们做什么，能帮你节省时间。


    ### 话事人


    口号：“一切围绕我。”


    *话事人*就是大老板。他是所有人说话的对象，也是所有需要决策的事情的最终决定者。当他发言时，会议中的每个人都在倾听。


    会议本质上是权力斗争——有人想得到什么，而有人不想给。如果你走进一场会议并有所求，首要任务就是识别出这个人。他是会议之所以召开的原因，如果你不知道他是谁，你就错过了关键信息。其实这很容易识别：只需等某人说出有争议的话，然后看大家的目光都投向谁。


    对待你的话事人，有两件大事需要注意。首先，确保他清楚自己的职责。对于固定人员的例会，角色显而易见；但对于一次性会议，你不能假设话事人知道一切都要围着他转。一份从一开始就明确阐明话事人身份的清晰议程，是确保每个人都清楚谁是决策者的最佳方式。


    其次，你必须知道当话事人缺席时该怎么办。会议进行到 15 分钟，你发现那位真正能拍板的资深副总裁并不在场。没错，现场还有另外八个人喜欢发言，但最好的做法是重新安排会议时间。否则你就是在浪费时间。


    ### 笔记本赖瑞


    口号：“抱歉，你刚才说什么？”


    赖瑞很容易识别。他面前摆着他的 MacBook。就在那儿。如果 MacBook 还不够明显，那就找看赖瑞有没有在频繁地用力点头……那说明他根本没在听。

    '
- fmt: '# 会议中的角色类型


    Larry pisses me off. He goes to regularly scheduled meetings that he knows are
    going to be 75 percent irrelevant to him, so he brings his computer so he can
    work. Turns out he doesn''t work because he''s spending half his time half-listening
    to the meeting proceedings. Go read that last sentence again. He''s not working
    and he''s not really listening which means he is actually a net negative when
    it comes to productivity.


    Ask Larry to put his computer away. I mean it. If you can''t vivaciously participate
    in a meeting you were invited to, you should not be there. "Rands Rands Rands
    … I take notes on my computer." No, you don''t. You take notes and when I use
    some proper noun you don''t recognize, you surf Wikipedia. If notes must be taken,
    designate one person to do it; I want you asking me what the proper noun is …
    not consulting Wikipedia.


    A useful meeting is not a speech; it''s a debate. If I''m up there flapping my
    lips and you disagree or don''t understand, I don''t want you to nod, I want you
    to yell at me.


    ## Mr. Irrelevant


    Slogan: "I''m just happy to be here."


    Why is Mr. Irrelevant here? He doesn''t have anything to add, he''s just all smiles
    because someone took the time to include him in what must be a very important
    meeting. He is mostly harmless.


    The problem that needs solving with regard to Mr. Irrelevant is figuring out who
    invited this guy to the meeting. What were they trying to do? Why is it that you''re
    paying Mr. Irrelevant to sit in this meeting, nod a lot, and take notes? If you
    uninvited him, he''s not going to be pissed, but the question is, who is going
    to be pissed? Why did they invite Mr. Irrelevant? Is he a mole? Is someone gathering
    essential information because they can''t be there?


    There is a reason Mr. Irrelevant is in your meeting and you need to understand
    that reason before you punt him.


    ## Chatty Patty


    Slogan: "I don''t shut up."


    Another easy identification. This one never shuts up. Ever.


    Your main issue here is time. Chatty Patty is incapable of conveying thoughts
    in a concise manner, which means every time she opens her mouth, everyone else
    is checking out.


    Your first job is to figure out whether Chatty Patty is actually Ms. Irrelevant.
    Fortunately, getting her talking is no issue. Your job is to figure out whether
    the signal-to-noise ratio is acceptable. Once you''ve determined if she actually
    needs to be there, you next job is containment and, to do that, you''ve got to
    play her game.


    Containing Patty is a simple process of asking questions in a manner that she
    wants to hear, meaning with lots and lots of words. Questions for Chatty Patty
    must be precise so she can''t verbally wander. Rather than ask, "How is QA?" you
    ask, "Patty, I''ve read your test plan, your current test results, and I understand
    you have a brief assessment for us regarding the quality of the product. Could
    you please give us a brief assessment?"


    You''re going to feel silly constructing these lengthy, repetitive requests, but
    not only are you giving Patty a well-defined space to wander in, you''re also
    saving time for everyone in the meeting.


    Warning: Don''t ever, ever argue with Chatty Patty in a meeting setting. Combining
    Patty''s natural loquaciousness with emotion is a recipe for disaster. Remember,
    she already doesn''t know how to end a thought. Throw some emotional in there
    and she might never stop.


    ## Translator Tim


    Slogan: "I know every acronym ever. FTW!"


    Tim is the first of two utility creatures. His role is simple: he speaks the language
    of everyone in the room. When hardware and software get together to talk about
    the issue, Tim is the guy who translates software acronyms into hardware acronyms.
    Tim is essential when you''ve got groups of folks who come from very different
    parts of the organization.


    You need to be wary if Tim isn''t neutral with regard to the topic that he''s
    translating. If he''s biased, he''s translating in his favor, which means if Tim
    is on your team, you''re in a good shape. If he''s not, you might want to go find
    your own Tim.


    ## Sally Synthesizer


    Slogan: "What he''s saying is …"


    I love Sally because Sally''s job is to end meetings. As our second utility creature,
    Sally grabs the conversation, no matter how messy it might be, and derives the
    basic truth of what was just discussed.


    In large group meetings with a diverse set of personalities, you must have a Sally
    in the room because she''s not missing a thing that''s being said and, more importantly,
    she''s aware of the relative significance not only of what is being said, but
    also who is saying it. She knows who the anchor is, she knows how to shut Patty
    up, and while it might appear that she''s just stating the obvious, she''s providing
    essential forward momentum to the meeting.


    Like Tim, if Sally is biased in a meeting, she''s synthesizing in her favor. Also,
    Sally can get drunk with power because her skill is invaluable. When she starts
    to think she''s an anchor, you''ve got a problem.


    ## Curveball Kurt


    Slogan: "The sky is pancakes."


    Kurt is easy to identify. You have no clue what he''s talking about.


    The first order of business once you''ve identified Kurt is figuring out if he''s
    Mr. Irrelevant. This can be tricky since whenever you ask him a question, you
    see his lips move, he''s clearly speaking English, but you have no idea what he''s
    trying to say. Hopefully, Translator Tim or Sally Synthesizer is in the room to
    help out here.


    Your absolute worst situation is when your anchor is a Curveball. It happens more
    than you''d think. The most likely case is combining groups on vastly different
    parts of the organization chart. Think of executives brainstorming with engineers.
    Every executive wants to think they can chum it up with anyone in the organization,
    but when it comes to their day-to-day job, they literally speak a different language.
    This means you''ve got Curveball Kurt on both sides of the table. This is an impossible
    meeting without some type of translator and synthesizer in the room.


    ## The Snake


    Slogan: "I''m actually the anchor. Ssssssh!"


    Some anchors like to hide. It goes like this:


    Big meeting with the executives. Sally gets up, sets the agenda, asks Larry to
    please, for the last time, put the laptop away, and then the meeting begins. Curveball
    Kurt gets up and says something unintelligible. Translator Tim jumps in and translates
    for Kurt, but he translates to the executive in the right corner. Aha! There''s
    your anchor. Pay attention to the right corner.


    The meeting proceeds. Mr. Irrelevant says something funny, everyone laughs and
    then wonders when someone will remove this boob from the meeting. Finally, we
    reach the crescendo of the meeting and the decision needs to be made and all heads
    turn to the anchor. We wait for a second and he says, "Snake? Your thoughts?"


    The snake is the anchor in hiding and he''s in the left corner. For some reason,
    he''s got the fake anchor out there taking the heat while he sits there taking
    it all in. Maybe he doesn''t like the spotlight. Maybe there is some strategic
    advantage to the room not knowing he''s the man, but he is. Fortunately for everyone,
    the snake move only works a few times within a company before word gets out who
    the real anchor is.


    Back to the worst meeting ever. It''s the last one on the server issue I ever
    attended because when I walked in, I knew what the problem was. We all thought
    we had an anchor in our VP of engineering, but, the problem is, he wasn''t willing
    to assume the anchor role. Since we had a bet-the-company decision on the table,
    we should''ve grabbed the CEO the moment it was clear the VP couldn''t anchor
    the meeting.


    You might think we were also missing Sally Synthesizer—someone to capture the
    essence of what happened—but that was me. I was trying to move the meeting forward
    by capturing the major thoughts, repeating them for everyone to hear, but it was
    a useless task since the anchor didn''t want his job.'
