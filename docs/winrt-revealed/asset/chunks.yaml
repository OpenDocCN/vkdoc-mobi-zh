- fmt: '# 排版后的文档


    记住：在大多数商业场景中，每个人的基本意图在交谈大约30秒后就会显现出来。我不是在谈论他们作为一个人是谁；我是在谈论弄清楚他们拥有什么以及他们需要什么。在扑克中，你会尽可能隐藏这些信息，因为你的钱押在上面。在商业中，每个人都会把手牌摊在桌上，站起来，指着自己的手说：“各位，我还差一张牌就能拿到同花顺。谁愿意给我那张红桃Q？”


    在商业中，提出你的需求是一个好策略；这被称为协作。每当我听到“我需要”时，我就多了解一些与我共事的人的信息，久而久之，我就能构建出一幅更好的画面，知道如何与同事互动。不过，我同样好奇角落里那个一言不发的人。他的眼睛像我的眼睛一样在房间里扫视，我很想知道……他通过沉默得到了什么？


    ## 商业不是战争


    《权力的48条法则》是真实可信的，但它们关注的是战争，而不是商业。如果你想知道更多，就去买这本书，但要明智地阅读。随着在职场上每年都取得成功，我发现自己不断调整以适应同事们玩管理棋局日益增长的复杂性。二十年后，我可以肯定地说有一条法则——不在格林和埃尔弗斯的那本书里——是真实的：如果你只对建立权力感兴趣，你将会失败。


    ## 章节


    ### 管理语


    我的一个团队正面临一个关于未来产品方向的重大决定，这个过程使团队分裂成两半：赞成派和反对派。团队的经理正面临一场反叛，他花费大量时间试图推动团队做出决定。


    我路过他的办公室，他正在和其中一个反对派成员谈话，试图影响她转向另一方的立场。我无意中听到了他谈话的一小段：“我认为这是一个关键的决定，我要求你*跳出框框*思考……”


    我畏缩了。


    管理用语。


    走回办公室的路上，我思考着我对“跳出框框”这个术语的负面反应。这实际上意味着什么？嗯，它大致意味着“不要将你的思维局限于传统途径”，但当你这么说时，你的团队听到的却不是这个。他们听到的是：“你好，我是一个经理，作为一个经理，我告诉你你应该有创造力，但实际上并没有告诉你怎么去创新。”


    不，那不对。他们听到的是：“你好，我是一个经理，我已经停止思考了，我正在使用那些掩盖我真实意思的空洞短语。”


    而经理们还在纳闷为什么没有人信任他们。


    当我坐在办公室里，一位项目经理进来进行一对一沟通。由于刚刚观察到的情况还记忆犹新，我试图监控自己在半小时会议中管理用语的使用情况。以下是我的违规行为：


    - “你能*稍后再跟*她联系一下……”

    - “我想*深入探讨*那个问题……”

    - “这些是*行动项*……”


    我所学到的：我已经变成了一个十足的笨蛋经理，再也无法像正常人一样沟通了。


    ### 管理隐喻


    我最喜欢的关于软件构建的书之一是史蒂夫·麦康奈尔的《代码大全》。在第二章中，麦康奈尔描述了围绕计算机科学的语言丰富性：“计算机科学拥有所有领域中最丰富多彩的语言。还有什么领域能让你走进一个无菌、温度严格控制在68华氏度的房间，却发现病毒、特洛伊木马、蠕虫、Bug、炸弹、崩溃、火焰、扭曲的变性者和致命错误？”


    他继续说道：“软件隐喻更像是一束探照灯，而不是一张路线图。它不会告诉你答案在哪里；它告诉你如何去寻找答案。”


    我一直以为管理隐喻也属于同一类别，它们确实是的，但如果你的团队不知道你在说什么，你就不如在说密码。


    管理语是一种由经理们学习、发展和使用的语言。在经理之间的沟通中，它是一种便捷、高带宽的信息传递方式。很可能，当你对另一位经理说“深入探讨”时，他们明白你是在建议他们应该关注你正在做的任何事情。


    公司组织架构图的每个部分都存在着独特的语言领域。每个领域内部都有该工作特有的语言。工程师有一套，营销有另一套，销售还有另一套。在这些群体中，都有那些必须说他们母语的经理，同时他们还得能够在不同领域之间翻译，以便完成工作。我认为这是管理语存在的合理原因。它是公司的跨职能语言。没有它，组织的不同部分将无法相互沟通。


    请记住，经理是沟通的枢纽。（参见[第11章](#9781430243144_Ch11.xhtml)）。他们在这些领域边界之间沟通得越好，能够与之沟通的人就越多，他们拥有的数据也就越多。这反过来会带来更好的决策。最终，更强的沟通者能做出更明智的决策，并且因为他们浪费更少的时间去思考该做什么，他们很可能会更成功。


    尽管如此，当你对一个员工说“深入探讨”时，他们确实知道你在说什么，但他们也知道你刚刚自我识别为一个经理。你为什么不能直接说出你实际想表达的意思呢？我的第一个猜测是你很匆忙，但这并不是你的团队听到的。


    ## 懒惰的语言


    在高科技行业，我们都他妈的在拼命赶时间。我们在与不合理的截止日期赛跑，并且过度承诺了功能。作为一个经理，你的工作就是一个废话遮阳伞。你需要决定哪些破事需要你的团队处理，哪些破事可以忽略。这意味着你需要快速从不同的人那里获取信息。在这种匆忙中，管理语可以帮助你和你的同行经理交谈，弄清楚到底发生了什么，但你只完成了一半。你仍然需要与你的团队沟通。


    这可能很累人，因为你，尤其是你，绝对确定自己在说什么。这就是为什么你可能倾向于使用那些你熟悉的、随手可得、充满管理隐喻的语言。不要这么做。


    人们对管理语的主要问题不在于他们不理解说的是什么；他们的问题是他们不信任它。想想你参加过的最糟糕的全体会议，告诉我你为什么讨厌它。


    - “管理层脱离了我们正在做的事情。”

    - “他们光说不练。”

    - “他在泛泛而谈，我想要的是具体细节。”

    - “他听起来确实相信自己在说什么，但我不知道他在说什么。”


    匆忙的经理需要记住，管理用语会让你离听起来像一个二手车销售员只差几个关键的隐喻。自信地快速说话可能会让你觉得自己在完成任务，但如果你交谈的对象不信任你，他们就永远不会理解你在说什么。


    ## “底线”


    我的建议很简单：当你与个人交谈时，要像朋友一样使用熟悉的语言与他们交谈。摘下经理的帽子，用共同的语言进行对话。摒弃管理语。这需要练习，因为这对你来说是一个重大的上下文切换，但你的目标是进行一次对话，而为了实现这一点，坐在桌子旁的双方都需要信任并理解所说的话。'
  raw: 'Remember this: in most businesses, everyone’s basic agenda is visible after
    they’ve talked for about 30 seconds. I’m not talking about who they are as a person;
    I’m talking about figuring out what they have and what they need. In poker, you
    keep this information hidden as best you can because your money is on the line.
    In  business, everyone throws their hand on the table, stands up, points at their
    hand, and says, “People, I’m one card away from the nut flush. Who’s going to
    give the queen of hearts?”


    Asking for what you need is a good strategy in business; it’s called collaborating.
    Each time I hear “I need,” I learn another bit about those I work with and, in
    time, I can construct a better picture of how to interact with my coworkers. Still,
    I’m also wondering about that guy in the corner who isn’t saying a thing. His
    eyes are darting around the room just like mine and I’m curious … what is he getting
    out of his silence?


    Business Isn’t War


    The *48 Laws of Power* are the real deal, but they are focused on war, not business.
    Go buy the book if you want to know more, but read wisely. With each ­successful
    year on the job, I find myself adjusting to the ever-increasing complexity with
    which my peers play the chess game of management. Twenty years in, I can safely
    say there is one law—not in the book by Greene and Elffers—that is true: if you’re
    only interested in building power, you’re going to lose.


    CHAPTER


    Managementese


    One of my teams is facing a big, fat decision regarding future product direction,
    and the process has split the team in half: the Yes We Shoulds and the No Way
    in Hells. The manager of the team is facing a rebellion and spending much of his
    time trying to drive the team toward a decision.


    I walked by his office, and he was talking with one of the No Way in Hells, trying
    to influence her over to the other side of the fence. I overheard a snippet of
    his conversation: “I think it’s a key decision and I’m asking you to think outside
    of the box …”


    I cringed.


    Management speak.


    Walking back to my office, I thought about my negative reaction to the term “outside
    of the box.” What does that actually mean? Well, it means something like “Don’t
    restrict your thinking to conventional avenues,” but that’s not what your team
    hears when you say it. They hear, “Hi, I’m a manager, and as a manager I’m telling
    you that you should be creative without actually telling you how to be creative.”


    No, that’s not right. What they hear is, “Hi, I’m a manager and I’ve stopped thinking
    and I’m using throwaway phrases that obscure what I mean.”


    And managers wonder why no one trusts them.


    As I sat in my office, a project manager came in for a one-on-one. With the observation
    fresh in my mind, I attempted to monitor my usage of managementese ­during our
    half-hour meeting. Here are my offenses:


    “Can you *circle back* with her …”


    “I want to *double-click* on that and …”


    “These are the *action items* …”


    What I learned: I’ve turned into a total dorkwad manager and can no longer ­communicate
    like a normal human being.


    Management Metaphors


    One of my favorite books on software construction is Steve McConnell’s *Code Complete.*
    In the second chapter, McConnell describes the richness of language around computer
    science: “Computer Science has some of the most colorful language of any field.
    In what other field can you walk into a sterile room, carefully controlled at
    68 degrees Fahrenheit and find viruses, Trojan horses, worms, bugs, bombs, crashes,
    flames, twisted sex changers, and fatal errors?”


    He continues: “A software metaphor is more like a searchlight than a road map.
    It doesn’t tell you where to find the answer; it tells you how to look for it.”


    I’d always assumed that management metaphors fell into the same bucket, and they
    do, but if your team doesn’t know what you’re talking about, you might as well
    be speaking in code.


    Managementese is a language that is learned, evolved, and spoken by managers.
    For communication between managers, it’s a convenient, high-bandwidth means of
    conveying information. Chances are, when you say “double-click” to a fellow manager,
    they understand that you are suggesting that they should pay attention to whatever
    it is you’re doing.


    There are unique spheres of language that exist in each part of the corporate
    organizational chart. Inside of each sphere is the language that is unique to
    the job. Engineers have one, marketing has another, and sales has yet another.
    In each of these groups, there are the managers who must speak their native language,
    as well as be able to translate between spheres in order to get the job done.
    I believe this is a legitimate reason for managementese. It’s the cross-functional
    language of the company. Without it, the different parts of the organization aren’t
    going to be able to communicate with each other.


    Remember, managers are hubs of communication. (See [Chapter 11](#9781430243144_Ch11.xhtml).)
    The better they communicate across these sphere boundaries, the more people they
    can communicate with, and the more data they have. This consequently leads to
    better decisionmaking. Ultimately, stronger communicators make more informed decisions,
    and hopefully they are more successful because they waste less time wondering
    what to do.


    Still, when you say “double-click” to an employee, they do know what you’re talking
    about, but they also know that you’ve just self-identified as a manager. Why didn’t
    you just say what you actually meant? My first guess is that you’re in a hurry,
    but that’s not what your team is hearing.


    Language of the Lazy


    In high tech, we’re all in an incredible fucking hurry. We’re working against
    an unreasonable deadline and we’re over-committed on features. As a manager, your
    job is that of a bullshit umbrella. You need to decide what crap your team needs
    to deal with and what crap can be ignored. That means that you need to rapidly
    acquire information from a variety of people. In that rush, managementese can
    help you talk with your fellow managers to figure out what the hell is going on,
    but you’re only half done. You still need to communicate to your team.


    This can be tiresome because you, of all people, are absolutely sure what you’re
    saying. This is why you might be tempted to use the readily accessible management
    metaphor-laced language that you’re familiar with. Don’t.


    The main issue folks have with managementese is not that they don’t understand
    what is being said; their issue is that they don’t trust it. Think of the worst
    all-hands meeting you’ve ever been at and tell me why you hated it.


    “Management is out of touch with what we’re doing.”


    “They’re all talk and no action.”


    “He’s talking in generalities and what I want is specifics.”


    “He sure sounds like he believes what he’s saying, but I don’t know what he’s
    saying.”


    Managers in a hurry need to remember that managementese puts you a few key metaphors
    away from sounding like a used-car salesman. Talking fast with confidence might
    make you feel like you’re getting something done, but if the people you are talking
    to don’t trust you, they’re never going to understand what you’re saying.


    The “Bottom Line”


    My advice is simple: when you’re talking to individuals, talk to them using the
    familiar language of a friend. Dispose of the management hat and have a conversation
    in a common language. Ditch the managementese. This takes practice because it’s
    a major context switch for you, but your goal is to have a conversation, and for
    that to happen, both people sitting at the table need to trust and understand
    what is being said.'
  trans: '

    # 排版后的文档


    记住：在大多数商业场景中，每个人的基本意图在交谈大约 30 秒后就会显现出来。我不是在谈论他们作为一个人是谁；我是在谈论弄清楚他们拥有什么以及他们需要什么。在扑克中，你会尽可能隐藏这些信息，因为你的钱押在上面。在商业中，每个人都会把手牌摊在桌上，站起来，指着自己的手说：“各位，我还差一张牌就能拿到同花顺。谁愿意给我那张红桃
    Q？”


    在商业中，提出你的需求是一个好策略；这被称为协作。每当我听到“我需要”时，我就多了解一些与我共事的人的信息，久而久之，我就能构建出一幅更好的画面，知道如何与同事互动。不过，我同样好奇角落里那个一言不发的人。他的眼睛像我的眼睛一样在房间里扫视，我很想知道……他通过沉默得到了什么？


    ## 商业不是战争


    《权力的 48 条法则》是真实可信的，但它们关注的是战争，而不是商业。如果你想知道更多，就去买这本书，但要明智地阅读。随着在职场上每年都取得成功，我发现自己不断调整以适应同事们玩管理棋局日益增长的复杂性。二十年后，我可以肯定地说有一条法则——不在格林和埃尔弗斯的那本书里——是真实的：如果你只对建立权力感兴趣，你将会失败。


    ## 章节


    ### 管理语


    我的一个团队正面临一个关于未来产品方向的重大决定，这个过程使团队分裂成两半：赞成派和反对派。团队的经理正面临一场反叛，他花费大量时间试图推动团队做出决定。


    我路过他的办公室，他正在和其中一个反对派成员谈话，试图影响她转向另一方的立场。我无意中听到了他谈话的一小段：“我认为这是一个关键的决定，我要求你*跳出框框*思考……”


    我畏缩了。


    管理用语。


    走回办公室的路上，我思考着我对“跳出框框”这个术语的负面反应。这实际上意味着什么？嗯，它大致意味着“不要将你的思维局限于传统途径”，但当你这么说时，你的团队听到的却不是这个。他们听到的是：“你好，我是一个经理，作为一个经理，我告诉你你应该有创造力，但实际上并没有告诉你怎么去创新。”


    不，那不对。他们听到的是：“你好，我是一个经理，我已经停止思考了，我正在使用那些掩盖我真实意思的空洞短语。”


    而经理们还在纳闷为什么没有人信任他们。


    当我坐在办公室里，一位项目经理进来进行一对一沟通。由于刚刚观察到的情况还记忆犹新，我试图监控自己在半小时会议中管理用语的使用情况。以下是我的违规行为：


    - “你能*稍后再跟*她联系一下……”

    - “我想*深入探讨*那个问题……”

    - “这些是*行动项*……”


    我所学到的：我已经变成了一个十足的笨蛋经理，再也无法像正常人一样沟通了。


    ### 管理隐喻


    我最喜欢的关于软件构建的书之一是史蒂夫·麦康奈尔的《代码大全》。在第二章中，麦康奈尔描述了围绕计算机科学的语言丰富性：“计算机科学拥有所有领域中最丰富多彩的语言。还有什么领域能让你走进一个无菌、温度严格控制在
    68 华氏度的房间，却发现病毒、特洛伊木马、蠕虫、Bug、炸弹、崩溃、火焰、扭曲的变性者和致命错误？”


    他继续说道：“软件隐喻更像是一束探照灯，而不是一张路线图。它不会告诉你答案在哪里；它告诉你如何去寻找答案。”


    我一直以为管理隐喻也属于同一类别，它们确实是的，但如果你的团队不知道你在说什么，你就不如在说密码。


    管理语是一种由经理们学习、发展和使用的语言。在经理之间的沟通中，它是一种便捷、高带宽的信息传递方式。很可能，当你对另一位经理说“深入探讨”时，他们明白你是在建议他们应该关注你正在做的任何事情。


    公司组织架构图的每个部分都存在着独特的语言领域。每个领域内部都有该工作特有的语言。工程师有一套，营销有另一套，销售还有另一套。在这些群体中，都有那些必须说他们母语的经理，同时他们还得能够在不同领域之间翻译，以便完成工作。我认为这是管理语存在的合理原因。它是公司的跨职能语言。没有它，组织的不同部分将无法相互沟通。


    请记住，经理是沟通的枢纽。（参见第 11 章）。他们在这些领域边界之间沟通得越好，能够与之沟通的人就越多，他们拥有的数据也就越多。这反过来会带来更好的决策。最终，更强的沟通者能做出更明智的决策，并且因为他们浪费更少的时间去思考该做什么，他们很可能会更成功。


    尽管如此，当你对一个员工说“深入探讨”时，他们确实知道你在说什么，但他们也知道你刚刚自我识别为一个经理。你为什么不能直接说出你实际想表达的意思呢？我的第一个猜测是你很匆忙，但这并不是你的团队听到的。


    ## 懒惰的语言


    在高科技行业，我们都他妈的在拼命赶时间。我们在与不合理的截止日期赛跑，并且过度承诺了功能。作为一个经理，你的工作就是一个废话遮阳伞。你需要决定哪些破事需要你的团队处理，哪些破事可以忽略。这意味着你需要快速从不同的人那里获取信息。在这种匆忙中，管理语可以帮助你和你的同行经理交谈，弄清楚到底发生了什么，但你只完成了一半。你仍然需要与你的团队沟通。


    这可能很累人，因为你，尤其是你，绝对确定自己在说什么。这就是为什么你可能倾向于使用那些你熟悉的、随手可得、充满管理隐喻的语言。不要这么做。


    人们对管理语的主要问题不在于他们不理解说的是什么；他们的问题是他们不信任它。想想你参加过的最糟糕的全体会议，告诉我你为什么讨厌它。


    - “管理层脱离了我们正在做的事情。”

    - “他们光说不练。”

    - “他在泛泛而谈，我想要的是具体细节。”

    - “他听起来确实相信自己在说什么，但我不知道他在说什么。”


    匆忙的经理需要记住，管理用语会让你离听起来像一个二手车销售员只差几个关键的隐喻。自信地快速说话可能会让你觉得自己在完成任务，但如果你交谈的对象不信任你，他们就永远不会理解你在说什么。


    ## “底线”


    我的建议很简单：当你与个人交谈时，要像朋友一样使用熟悉的语言与他们交谈。摘下经理的帽子，用共同的语言进行对话。摒弃管理语。这需要练习，因为这对你来说是一个重大的上下文切换，但你的目标是进行一次对话，而为了实现这一点，坐在桌子旁的双方都需要信任并理解所说的话。

