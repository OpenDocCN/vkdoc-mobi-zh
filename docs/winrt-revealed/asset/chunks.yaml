    Are you actively killing the Grapevine? (+1)


    When Grace walks in your office, you know she knows something by the look on her
    face. She moves to the corner of the office and starts with, “Did you hear … ?”
    and the story continues. It’s a doozy, full of corporate and political intrigue,
    resulting in your inevitable response: “No. Way.”


    Being part of a secret feels powerful. In a moment, the organization reveals a
    previously hidden part of itself, and in that moment you feel you can see more
    of the game board. *So, that’s why they fired him. I was wondering.* Grace finishes
    with the familiar, “Don’t tell anyone,” which is ironic since that’s precisely
    what was asked of her 15 minutes ago.


    There is absolutely no way you’re going to prevent folks from randomly talking
    to each other about every bright-and-shiny thing that’s going on in your company.
    In fact, you want to encourage it. One-on-ones and meetings are only going to
    get you so far. The thing you can change is the quality of the information that’s
    wandering around the company.


    In the absence of information, people make shit up. Worse, if they at all feel
    threatened, they make shit up that amplifies their worst fears. This is where
    those absolutely crazy rumors come from. See, Kristof is worried about losing
    his job, so he’s making up crazy conspiracy theories that explain why *the man
    is out to get him*.


    Without active prevention, the Grapevine can be stronger than any individual.
    While you can’t kill the Grapevine, you can dubiously stare at it when it shows
    up on your doorstep and simply ask the person delivering it, “Do you actually
    believe this nonsense? Do you believe the person who fed you this trash?” Rumors
    hate to justify themselves, so give yourself a point if you make it a point to
    kill gossip.


    Magnitude and Direction


    There is a higher-order goal at the intersection of these two questions on the
    Rands Test: *Where am I?* and *What the hell is going on?* While understanding
    the answers to these questions will give you a good idea about the communication
    health of your company, the higher order goal is selfish. I’ll explain.'
  trans: '

    从以下问题中你会发现，Rands 测试不仅关乎对沟通的理解，更关乎对背景和战略的把握。你觉得惠普和 Netflix 的员工，面对近期战略反复摇摆会作何感想？是感到安全还是怀疑？我们继续往下看……


    ### 你能相当准确地告诉我公司的现状吗？（或者你现在能否找到某位相关人员，立刻搞清楚状况？）（+1 分）


    这或许是个残酷的夸张说法，但我认为你应该像华尔街那样独立评判你的公司：你的公司要么在增长，要么在消亡。你有没有见过一家上市公司在宣布将低于盈利预期后，其股价的表现？通常情况下，无论高管们如何粉饰，股价都会遭到重创。这看似不合理，但当我看到这种情况时，我的推论是，华尔街认为这家公司已开始进入死亡循环。如果高管们都无法成功预测自己的业务状况，那一定是哪里出了问题。


    我明白这不公平，而且每天都有无数因素影响企业的健康。我鼓励你去尽可能多地研究和理解这些因素。但当你研究完毕后，我希望你能对公司的状况有一个站得住脚的观点，或者至少有一群你信任其判断的人。


    这幅图景需要你不断构建，如果你在前一个关于公司战略的问题上已经给自己打了分，那么这项任务会更容易。如果你知道公司打算做什么，就更容易判断它是否正在做这件事。这就引出了下一个问题……


    ### 是否有一个定期会议，让负责人站在大家面前，告诉大家他/她在想什么？（+1 分）并且你相信他/她吗？（+1 分）


    我前面提到的关于“背景”的观点，涉及负责人。在快速成长的团队和公司里，每天都有很多事情发生。当团队很小时，信息分发轻松又低成本，因为所有人喊一声就能听见。规模变大后，这种沟通在边缘地带就变得成本高昂。总监、主管和经理们——这些人往往紧跟时事，因为这越来越成为他们的本职工作；但同时，采取措施保持信息流通也是他们的工作，而这始于
    CEO。


    你的 CEO 是否定期站出来，向你们讲述他对当前状况的看法？无论你们是 10 个人还是 10000 人，这都是一次重要的会议，它能够：


    *   让每个人都能接触到 CEO

    *   让他/她解释自己对公司的愿景

    *   希望允许任何人站起来提问


    如果你觉得这个会议的价值不那么显而易见，我猜你是那些幸运儿之一，你已经对公司有了清晰的认识，也对业务状况有了一定的了解。那太棒了——这里为你准备了一个加分项：CEO
    描述的事实版本与你的相符吗？还是他/她高高在上，根本不清楚实际情况？如果是前者，给自己加一分；如果是后者，这又说明了业务的什么状况？是在增长还是走向消亡？


    ### 你能说明自己的职业发展轨迹吗？（+1 分）加分项：你的老板能吗？（+1 分）


    接下来，我们稍微转换一下话题。如果此时此刻，你能告诉我你的下一步计划，给自己加一分。你已经在做某件事了，所以请说明你接下来打算做什么。这是一个简单的陈述，而不是宏大的计划。“有一天，我想领导一个团队。”


    一个健康组织的标志，不仅仅是信息自由流动；还在于接收和转发信息的人是如何利用这些信息的。你会本能地将大部分信息进行归档或忽略，但时不时地，会有一条信息出现在一对一面谈、会议或走廊的随机谈话中，而了解自己下一步想做什么，对你来说会立刻具有战略价值。


    *   安吉拉升职了，她的团队很棒，而我一直想当经理。

    *   简刚开了一个职位需求，他小组正在研究我需要学习的技术。

    *   他们开除了弗兰克。这制造了一个非常有趣的权力真空……


    你可以争辩说，即使没有计划，你也会做出同样的机会主义跳跃，但我发现，有一张地图通常是到达目的地更好的方式。


    这里还有一个加分项。你的老板知道你下一步想做什么吗？她可能掌握更多公司内部流动的信息，无论她是否乐意，她同样有责任想办法让你从当前位置达到目标位置。


    ### 你是否有明确界定并受到保护的时间来思考战略性问题？（+1 分）


    如果上一个问题你给自己加了两分，恭喜你；我认为你的状态比大多数人要好，但这里还有一分。你是否正在朝着这个目标前进？你能指出日历上的某段时间，或者仅仅是脑海中的某个时刻，是你在为目标而成长吗？


    我喜欢忙碌。真的非常忙碌。那种一上班，抓起一杯咖啡，突然发现咖啡凉了、已经下午六点、并且忘了吃饭的忙碌。忙碌的感觉很棒，但忙碌通常是战术性的，而非战略性的。这就是为什么我一直在维护我的“涓流清单”——它每天提醒我去做比当下更长远的工作。


    如果你在工作时能抽出时间进行自我投资，并且你的老板对此没有意见——那么给自己加一分。


    ### 你是否在积极扼杀“小道消息”？（+1 分）


    当格蕾丝走进你的办公室时，你从她的脸上就知道她有事。她走到办公室角落，开口就是：“你听说了吗……？”然后故事就开始了。那肯定是个惊天动地的消息，充满了公司政治和阴谋，你不可避免的反应是：“不会吧！”


    成为秘密的知情人感觉很有力量。那一刻，组织向你揭示了它此前隐藏的一面，让你觉得看到了棋盘上更多的棋子。*哦，原来这就是他们炒掉他的原因啊。我一直纳闷呢。*
    格蕾丝最后总会加上那句熟悉的“别告诉别人”，这很讽刺，因为 15 分钟前，别人也正是这样对她的。


    你绝对无法阻止人们随意谈论公司里发生的各种光鲜亮丽的事情。事实上，你应该鼓励这种交流。一对一面谈和正式会议只能让你了解这么多。你能够改变的是在公司里流传的信息的质量。


    当信息缺失时，人们就会编造。更糟的是，如果他们感到任何威胁，他们会编造出放大内心最恐惧事物的谣言。那些疯狂的谣言就是这么来的。你看，克里斯托夫担心失业，所以他编造出疯狂的阴谋论来解释为什么*大人物要对付他*。


    如果不主动防范，“小道消息”会比任何人都强大。虽然你无法彻底消灭它，但当它出现在你家门口时，你可以怀疑地盯着它，直接问传递消息的人：“你真的相信这种胡言乱语吗？你相信告诉你这些垃圾话的人吗？”谣言最怕被要求自证其说。所以，如果你决心扼杀八卦，就给自己加一分。


    ### 幅度与方向


    在 Rands 测试的这两个问题——“我在哪里？”和“到底发生了什么？”——的交汇处，存在着一个更高层次的目标。虽然理解这些问题的答案能让你很好地了解你公司的沟通健康状况，但更高层次的目标是利己的。我来解释一下。

