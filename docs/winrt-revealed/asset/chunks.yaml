    Let’s first break down *impossibleness*. For the sake of this chapter, there are
    two types of impossible tasks. First, there are impossibly dull tasks. This is
    work that requires no mental effort, but is vast in size. Bug scrubbing is a great
    example of this. At the other end of the spectrum are impossibly hard tasks. These
    are tasks like, “Hey Rands, we need a new product by Christmas. Yes, I know it’s
    October. Ready? Go!”


    Oddly, attacking both boring and hard tasks involve the same mental kung fu where
    your first move is starting.


    Such silly, trivial advice … start. Still, take a moment and examine your mental
    to-do list or just look at your written one. How many terribly important tasks
    have been there more than a month? More than a year? Embarrassing, huh? It’s not
