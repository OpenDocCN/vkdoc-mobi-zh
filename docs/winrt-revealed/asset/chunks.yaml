  raw: 'This attitude gave me a unique curiosity when the crew of three men showed
    up, chain-saws in hand, to clear the land. They had no issue starting and they
    clearly had the iteration thing down, but they also demonstrated the last and
    most important component to Trickle theory: mix it up.


    It went like this: one guy would cut and drag brush into the fire, another would
    cut trees down, and the third would trim fallen trees. This went on for a while,
    and then they’d all switch. Now, drag guy was cut guy, cut guy was hauling wood
    guy, and trim guy was stack guy. During lunch, I sat down and asked, “When do
    you guys switch jobs?”


    “When we’re bored.”


    Beautiful, beautiful Trickle theory. How cool is this? If you’re working on an
    impossibly hard or impossibly dull task and you find yourself mentally blocked
    by boredom or confusion, stop and do something else. The benefits of stopping
    are stunning.


    First, stopping smacks the Critic squarely across the face. See, he’s also the
    voice in your head saying, “Uh, if we don’t work hard on this, we’re screwed.”
    And the longer you sit there grinding out the impossible task when you don’t want
    to, the louder he gets.


    Second, stopping to do something else is fun for you and your brain. It breaks
    the cycle of whatever tasks you’re doing and points your gray matter at a whole
    new problem—and your brain loves new; it consumes new with vim and vigor, and
    that puts spring in your proverbial mental step.


    Third, and most important, even though you are stopping, your brain is bright
    enough to keep background processing the impossible task. This is why we find
    so much inspiration in the shower; you’re stopping and letting your brain wander,
    and your brain is smart. Your brain knows how important it is to rewrite that
    feature in two days and your brain is always working on that feature whether you
    know it or not.


    “Wait, wait, wait. Rands, let me get this straight. Your suggestion when I’ve
    got a looming impossible deadline is to stop working on my deliverables?”


    What I’m saying is, when you’re facing an uphill mental battle with yourself regarding
    the impossible task, it’s time to choose another battle … that isn’t a battle.


    Entropy Always Wins


    My life appears to be an endless series of tasks that are geared to slightly tidy
    up my world. Viewed as a whole, these tasks represent a lot of work. Viewed against
    the actual amount of entropy in play in my small part of the world, these tasks
    represent a futile effort.


    Fact is, your world is changing faster than you’ll ever be able to keep up with,
    and you can view that fact from two different perspectives:


    *   I believe I can control my world, and through an aggressive campaign of task
    management, personal goals, and a *can do* attitude, I will succeed in doing the
    impossible. Go me!


    Or …


    *   I know there is no controlling the world, but I will fluidly surf the entropy
    by constantly changing myself.


    Surfing entropy takes confidence. This isn’t Tony Robbins confidence; this is
    a ­personal confidence you earn by constantly adapting yourself to the impossible.


    CHAPTER


    When the Sky Falls


    A few years ago I wrote a piece that romanticized the state of the sky falling.
    The article is not about fixing disasters, it’s about preventing them—but no matter
    how much you prepare, disasters happen.


    The romance surrounding disasters is history speaking. When the disaster shows
    up and you see it, no one but you knows that you want to throw up. That’s your
    brain releasing a complex chemical cocktail that is physically and emotionally
    preparing you for the most sensible course of action—making a fucking run for
    it.


    But, strangely, you do not run.


    Having watched, participated in, and created a bevy of sky-falling situations
    in my career, I take the process I use for managing these situations for granted.
    It feels like I’m working on pure and spontaneous instinct, but these are honed
    instincts that I’ve built and refined over a great many DEFCON 1 disasters—the
    world is about to end, or so the participants think—that I’ve had the unfortunate
    pleasure of attending.


    This is my documentation of the process, and I sincerely hope you never have to
    deploy it, but I’m pretty sure you will. Before we start, here are a few assumptions
    and notes about this process:


    *   This is not a solo disaster. It’s not just you; it involves a large group
    of people wrestling with a complex disaster, featuring different politics and
    motivations with an unknown root cause.

    *   No matter how much I sit here and EXPLAIN IN ALL CAPS THAT THIS PROCESS WORKS,
    you’re going to skip at least one of the following four steps. That’s cool. Each
    section includes a handy “This is what happens if you ignore this” section addendum
    so you clearly understand the magnitude of your omission.

    *   I’m going to describe this process simply and serially, but in reality these
    steps overlap and often run in parallel.

    *   Oh yeah, there’s a good chance this disaster *is* your fault.


    Let’s begin.


    Step 1: The Situation in the War Room


    Your first job is to understand absolutely everything you need to know about the
    current state of the disaster—you are developing a mental model. Ideally, I want
    to be able to draw a complete picture for everyone about whatever the hell is
    currently happening. I need whiteboards—lots of them. I need a War Room.


    The War Room is a base of operations. The requirements are simple: enough room
    to hold a quorum of people, a table, chairs, and lots and lots of whiteboards
    and markers. In this room, you are going to begin the immediate task of research,
    information gathering, and assessment. Every single person—everyone—who has any
    relevant knowledge about the situation is now going to parade through the War
    Room, and you’re going to capture and triangulate all of their knowledge.


    The intent of the War Room is to break everyone from their flow. The War Room
    includes a menagerie of people coming in and out, empty pizza boxes and Red Bull
    cans, and whiteboards full of indecipherable scribbles. It sends a clear message:
    the status quo is not presently working.


    As the people start streaming in for the inquisition, remember that this first
    step is data collection, not problem solving and not judgment. The hardest part
    of this step is not jumping when you think you see a place where you can start
    moving. *That! That! That! We need to fix that!* It very well might be the right
    move to fix that, but you don’t even know how much “that” there is, yet.


    The initial goal during this step is information acquisition, not action. Each
    time you take action with incomplete data, you risk stoking rather than extinguishing
    the disaster fire. And, by the way, this type of lack-of-foresight, hyper-reactive
    mode is likely what got you here in the first place. The War Room is a place to
    focus on gathering a breadth of information first, then a depth, so you can answer
    the question, “Do we understand the situation?”


    For me understanding comes in three forms:


    1.  The picture I begin to draw repeatedly on the whiteboard starts to represent
    a realistic picture of what has actually occurred.


    2.  A list of additional research, work, and potential next actions is developed,
    revised, and iteratively prioritized (but not yet acted on).


    3.  After much of numbers 1 and 2, I’m looking for a very precise moment. It always
    happens at a different time, but it is distinct. It is the moment I have the glimpse
    of a theory. *This … is what we need to do.*


