- fmt: '# First, it’s a lot of work to figure out your personal regimen of digesting
    the world, and sorry, you are going to miss things. This will annoy you, but it
    will also drive you incessantly to look for *the next big thing.*


    Second, you’re going to sound like a know-it-all. Try not to. Most people don’t
    actually know that much random trivia, useless info, obscure facts, assorted news,
    current events, and complex mathematical formulas. These people are happy without
    it and simply because you’re brimming with the latest and greatest information
    doesn’t mean that everyone is going to want to hear about it.


    You’re not going to have much patience with those who have not chosen a NADD-like
    life. Occasionally, you’ll attempt to impart your fractured wisdom, only to throw
    your hands up four minutes later when it’s clear, "Crap, they just don’t get it."
    Chances are, they might’ve gotten it, and you’re just afflicted with a disease
    where your attention span is that of a second grader.


    Whether you’re afflicted with NADD or not, you need to understand one thing. It’s
    not going away. The generation that invented NADD in the 1980s and 1990s has been
    replaced by the generation that never knew a world without it, and they’re going
    to be annoying in their own unique way.


    # CHAPTER


    ## A Nerd in a Cave


    The first few days of any significant overseas trip, I’m a jerk. It’s not just
    the jetlag that’s poisoning my attitude; it’s the lack of context. I get twitchy
    when I don’t know where my stuff is. Combine that with the fact that no one is
    speaking English, there are two toilets in the bathroom, and I have no idea what
    time it is, and you can begin to understand why I’m in such a foul mood.


    Three days in, I’m sleeping, I know it’s called a bidet, and I’m working hard
    on my Italian "R" and "U" sounds. I’m having fun, but I’m still thinking about
    my lack of context. I’m thinking about the familiar place I’ve built so that I
    can work.


    ### The Cave


    I have a cave. It came as part of the house. I didn’t paint the walls blood red;
    they came that way. Most folks who get the tour walk into the cave and gasp at
    the walls. "They’re so dark. How can you think surrounded by this ominous redness?"
    I nod and grin slightly and shuffle them off to the next room. See, I love my
    cave. The thick, blood-red walls wrap me in comfort, and that is what a cave does.


    My cave is my intellectual home. My kitchen is where I eat, my bed is where I
    sleep, and my cave is where I think. Everyone has some sort of cave; just follow
    them around their house. It might be a garage full of tools or a kitchen full
    of cookware, but there is a cave stashed somewhere in the house.


    The nerd cave has some specific traits:


    - **A computer on a desk with ready access to the Internet:** The fact that a
    computer without an Internet connection is essentially a very expensive DVD player
    is a recent development, but the fact is, when I sit down at my `MacBook` and
    there is no wireless, I think, "Well, I could play `Bejeweled`, right?" In the
    cave, the Internet is the lifeblood. It connects this dark place with the rest
    of the world.


    - **World-canceling features such as a door or noise-reducing headphones:** These
    features are a nuisance to significant others interested in communication, but
    I’ll get to that in a moment.


    - **A random collection of comforting nerd knickknacks:** This varies wildly from
    nerd to nerd, but there is always at least one object or talisman of nerddom sitting
    in the cave. I have this white, carved stone polar bear staring at me right now.
    I think I got it for Christmas. It’s been staring at me for ten years now, and
    each time I sit down in the cave I worry that if the polar bear weren’t there
    … I wouldn’t be able to write.


    - **Something to drink:** This may be my thing, but I can’t really settle into
    the cave without something liquid. Right now, it’s a cup of homebrew by Peet’s.
    In the afternoon, it’s a glass of water. In the evening, it might be wine or a
    beer. For me, the drink is a mental pause where I intensely scrutinize the last
    30 seconds. What did I just write? What am I trying to say? [Sip] OK, back to
    work.


    - **A well-defined layout:** This ties into my NADD (see [Chapter 32](#9781430243144_Ch32.xhtml)),
    but I have deep knowledge of the layout of my cave. Each month, the housecleaners
    come for a tidying of the house, and each month I walk into my office when they
    are done and spend 30 minutes adjusting my monitors, relocating my pens, and re-piling
    my papers. I think it’s great that someone is coming to clean the house, but I
    wish they’d *stop touching my stuff.*


    - **A view:** Like the drink, the view is a mental break, an escape to somewhere
    else that provides a brief alteration of perspective. This is why everyone in
    the office wants a window. It’s not a status symbol, it’s an escape. I’ve seen
    nerds without a view go to great lengths to create one. My manager at `UCSC` built
    a window frame in his subterranean office and put posters from around the world
    behind it. When I left `UCSC`, he had a poster of Audrey Hepburn from *Breakfast
    at Tiffany’s.*


    It’s an ominous name: the cave. It alludes to a dark, damp place where you are
    likely to be eaten by a grue. The irony is that the purpose of a cave is not to
    insulate, its purpose is to germinate. I’ll explain.


    ### The Zone


    Each weekend morning, my process is this: I wake up, walk upstairs, sit down at
    the computer, and figure out what is happening on the planet. Once I’m comfortable
    that the sky is not falling, I walk to the kitchen, grind my coffee beans, and
    begin to boil water. While the water is heating up, I return to my computer and
    follow up on whatever tidbits tickled my fancy from my first pass. This morning,
    it was some font research, followed by looking into options for wireless headphones.
    Turns out, Sony sucks. Go figure. Water’s boiling! Back to the kitchen, where
    I pour hot water into my French press and dig up my favorite ceramic cup. The
    coffee needs to sit for three minutes, which means back to the computer! OK, so
    why do Sony headphones suck? Poor sound quality? Bad design? Bit of both, really.
    Coffee’s ready, so one more trip to the kitchen, where I pour the steaming brew
    into my favorite cup and travel, once more, back to my cave.


    It looks like a lot of work, but I do it instinctively. It’s a routine designed
    to do one thing—get me into *the zone.* Much has been written elsewhere about
    the mental state that is the zone, but I will say this: it is a deeply creative
    space where inspiration is built. Anything that you perceive as beautiful, useful,
    or fun came from someone stumbling through the zone.


    Once I’ve successfully traversed my morning routine and have entered the zone,
    I am *off limits.* I mean it. Intruding into the cave and disrupting the zone
    is no different than standing up in the middle of the first-ever showing *of The
    Empire Strikes Back,* jumping up and down, and yelling, *"Darth Vader is Luke’s
    father! Darth Vader is Luke’s father!"* Not only are you ruining the mood, you’re
    killing a major creative work.


    No, I’m not going to answer the phone. In fact, it’s a sure sign of compromised
    cave design if I can even hear the phone ring. And no, I don’t hear you when you
    walk in and ask if we should go to the park tomorrow. I don’t hear you the second
    time, either. I don’t mean I’m ignoring you, because that’d involve using precious
    brain cycles I need for the zone … I really *can’t* hear you. That’s how deep
    I am in the zone.


    No, I have no idea that it’s been four hours since I closed the door and began
    furiously typing. Really, the only things I know are (a) when my coffee cup is
    empty, and (b) when I need to head to the bathroom.'
