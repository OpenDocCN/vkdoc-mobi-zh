    to make a decision.


    My management style is to allow the team to argue as long as possible. I’ve got
    a collaborative management style because I know that the more brains and more
    time the team spends staring at an idea, the stronger the idea becomes. This means
    that decision-making in groups that I manage tends to be slower because I’m busy
    cross-pollinating. Consequently, I’m certain it means our output is higher quality
    because we’ve taken the time to consider what the hell we’re doing.


    Remember that for every person on the team who has a strong opinion regarding
    the decision, there are probably four other coworkers who just want someone to
    make a decision so that they can get back to work. We’ve each been part of the
    silent majority before. It’s the time when you choose to not engage in the heated
    debate. Maybe because you’re doing actual work or perhaps you just don’t care.
    You appreciate your silent status as you see the debate rage in the hallway and
    realize how much pain, sweat, and tears you saved by staying out of it. When the
    team is still yapping away two weeks later, you start to wonder when someone is
    going to shut these people up.


    Mandates are the friend of the silent majority. Even if you really annoy the concerned
    parties, the silent majority will appreciate the peace and quiet once you’ve delivered
    your verdict.


    Deliver


    The purpose of this chapter is not to explain how to make whatever hard decision
    you need to make regarding the heated topic in your organization. I don’t know
    what the topic is, so you’re on your own. I will say that if you don’t spend time
    considering both sides of the issue before you deliver, then your team will know
    it and your credibility will be suspect. Those on the losing side will wonder
    why they weren’t consulted and then they’ll start wandering the halls murmuring
    that you’re either lazy or a tyrant. Ouch.'
