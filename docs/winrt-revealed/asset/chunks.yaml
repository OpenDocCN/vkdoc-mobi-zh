- fmt: '# Vectors and the Rands Test


    I think of the two lines of questions as a vector. A simple vector can be drawn
    as two points connected by an arrow, but a vector is far more interesting. It’s
    a geometric object that describes both direction and magnitude. Understanding
    how information moves, how you communicate with your boss, and being able to describe
    both your career strategy and that of your company sketches a vector in your head.
    The first point is you at this very moment, and the other point is where you want
    to be. The distance and direction between the two start to explain how you’re
    going to get there. I love vectors because they draw a picture about a complex
    problem, and I hope as you were answering the questions above that this mental
    picture began to appear in your head.


    Like the Joel Test, the point of the Rands Test is not the absolute score, but
    the score is good directional information. If you got an 11, I’d say you’re in
    a rare group of people who have a clear picture of their company and where they
    fit in. Between 8 and 10, you are likely troublingly deficient in either communications,
    strategy, or your development—it depends where the points are missing. Less than
    8 and I think you’ve got a couple of problems.


    There are a lot of different scenarios I expect folks to find themselves in as
    they explore these questions, which is why it’s tricky to prescribe specific action.
    Your company may be doing well, but you may be unhappy and have no clue what you
    want to do next. You might love your job, but have no idea whether the company
    is actually growing. Your course is dependent on what you care about, and the
    Rands Test points out good places to start.


    [¹](#9781430243144_Ch03.xhtml#ftn_1) [www.joelonsoftware.com/articles/fog0000000043.html](http://www.joelonsoftware.com/articles/fog0000000043.html)


    [²](#9781430243144_Ch03.xhtml#ftn_2) [www.randsinrepose.com/archives/2008/08/18/the_trickle_list.html](http://www.randsinrepose.com/archives/2008/08/18/the_trickle_list.html)


    # How to Run a Meeting


    I bag on meetings.


    I bag on meetings because, like any nerd, I expect the universe to be efficient
    and orderly, and there is no more vile a violation of this sense of orderliness
    than a room full of people randomly bumping into shit and calling it a meeting.


    There are solid meetings out there. There are meetings that build a sense of structure,
    move forward for the entire hour, and finish with a sense of accomplishment. The
    question is, How do we make sure every meeting is like this? Let’s start by understanding
    why meetings showed up in the first place.


    You’re sitting in your office eating a sour-apple saltwater taffy, and you’re
    fully in the Zone. It’s great forgetting there are other humans on the planet
    Earth; it’s blissfully productive until Richard walks in the room, and Richard
    *wants to talk*.


    “Stan is one day away from totally screwing our performance …”


    *Maybe if I ignore him, he’ll go away.*


    “No one is code-reviewing his stuff …”


    *Maybe if I offer him a sour-apple saltwater taffy, he’ll go away.*


    “And he just checked into your component.”


    “He what the fuck what? *Stan*!”


    Now, an important transition is occurring as you and Richard are running down
    the hallway to grab Stan. When Richard was rambling in your office, the two of
    you were talking, and talking is a conversation. Anything goes when it comes to
    a conversation. It’s a simple negotiation: make a point, get a response, retort,
    retort back. A conversation is verbal Ping Pong: There are many different styles,
    but for two players, you bat the little white verbal ball back and forth until
    someone wins.


    When you and Richard walk into Stan’s office, the conversation now becomes a meeting,
    and the core difference between a conversation and a meeting is that it needs
    rules so people know when to talk.


    ## Alignment vs. Creation


    There are two useful types of meetings: *alignment meetings* and *creation meetings*.
    Briefly, alignment meetings are tactical communication exchanges that rarely dive
    into the strategic. These are fine meetings that have a weekly cadence, and while
    there are lots of ways to screw up these meetings, their tactical repetition often
    keeps them on the rails.


    Creation meetings—diving into solving a hard problem—involve, well, more creativity.
    Each hard problem requires a unique solution, and finding that solution is where
    creation meetings can go bad.


    I’ve documented many of the rules for meetings in other chapters. In this piece,
    I want to talk about some of the obvious and non-obvious rules around meetings.


    *A meeting has two critical components: an agenda and a referee.* Let’s start
    with the obvious—the agenda. The agenda answers the question everyone is wondering
    as they sit down: how do I get out of this meeting so I can actually work?


    Different referees have different agenda strategies. They vary from sending the
    agenda out in an e-mail before the meeting to writing it down on the whiteboard
    at the beginning of the meeting. Whatever the move, the agenda exists in everyone’s
    head. Everyone can answer the question, “What do we need to do get the hell out
    of here?”


    The other component is the referee. I originally thought the owner was the critical
    component, and while an absent owner is certainly a meeting red flag, the lack
    of a referee is a guaranteed disaster.


    All active participants in a meeting can instinctively sense progress, and when
    progress isn’t being made, they get cranky and start looking for the exit. A referee’s
    job is to shape the meeting to meet the requirements of the agenda and the expectations
    of the participants. Style and execution vary wildly from referee to referee,
    but the defining characteristics are the perceptions of the meeting participants.
    A good referee not only makes sure the majority of the attendees believe progress
    is being made, but they’re aware of anyone who doesn’t believe that progress is
    being made at any given moment. And they’re looking for one thing … people checked
    out.


    *If they’re doing anything except listening, they aren’t listening.* There are
    lots of exits from a meeting that look nothing like a door. Every single moment
    of a meeting is not going to be interesting to you. When Stan and Richard dive
    deep on that one piece of code you care nothing about, you mentally wander. You
    reach into your back pocket, pull out your iPhone, check your mail, and think,
    “Let ’em wander … they’ll be back to the interesting shortly.” Two screw-ups here:


    1. You’re the referee and you’re checked out. You’re the guy running down the
    hallway to figure out whether Stan is going wreck your weekend with crap code.
    You’re the referee because you have the incentive to drive this meeting to some
    reasonable conclusion and … you’re checking your mail.


    2. You aren’t listening. This is what you’re hearing: “Blah blah blah Jira blah
    blah scales linearly blah blah.” Thing is, there might be value in the blahs,
    but you will never know because you’re checking your mail rather than understanding
    where this meeting is headed. Worse, when the meeting goes off the rails due to
    your lack of attention, you have less of a chance of bringing it back because
    you were mentally elsewhere.


    The rule is for everyone in the room: if their attention is elsewhere, they aren’t
    listening. Frank, the guy who plays Plants vs. Zombies during staff meetings and
    swears he’s listening? He’s not. He’s getting 50 percent of what’s being said,
    and worse, he’s giving everyone else in the room permission to slack.'
