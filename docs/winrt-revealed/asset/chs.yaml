  \n    无论背后的故事是什么，咆哮者正在从无休止地重述问题中获得某种奇怪的心理满足，但他们在这一点上对解决实际问题毫无兴趣。很烦人。当你确认手头是一次咆哮时，你可以直接介入倾诉——你是在为所有人节省大量时间，并且你也在教咆哮者，不停地重述问题并不是进步。\n\
  \n*   **这是灾难：** 你在仔细倾听倾诉。它正在向前推进，没有重复，但是……有些不对劲。也许是他们的举止，也许是话题本身，但你的雷达在报警。倾诉者并没有站在他们通常的“肥皂盒”上。他们一反常态，而且随着时间的推移，他们越来越不像自己了。\n\
  \n    倾诉的核心是情感驱动。这就是“更新状态”和“倾诉”之间的关键区别。这个话题触发了情绪反应，倾诉者的“疗法”就是口头陈述和重述情况。情感是一个滑坡，开始时只是倾诉，但有可能螺旋式升级为灾难。这在商业中很少见，但当你处理情感易变的人类时，这是一种风险。\n\
  \n## 灾难（The Disaster）\n\n如果倾诉感觉像一场演讲，那么灾难感觉像一场攻击。起初是一场情绪化的对话，现在已经演变成一场战争，而你突然且意外地身处战场。\n\
  \n在你见识过一次灾难之前，很难预测你对自己感觉受到攻击会如何反应。无论好坏，这种事我已经经历过足够多次，所以当我看到灾难临近时，我会小心地把所有情绪装进一个盒子，锁上盒子，然后神奇地变身为一个瓦肯人。\n\
  \n当灾难降临时，最糟糕的反应就是任何形式的情绪表露。你看，在这种情况下，倾诉者想打架。他们真的想就这个特定话题“过上几招”。原本高度沮丧的情绪已经变成了纯粹的攻击性；如果你哪怕眨错一下眼，你都是在加剧事态的升级。\n\
  \n以下是一些识别和处理灾难的技巧：\n\n*   **你正在交谈的人已经不是他/她自己了。** 当你坐在那里经受灾难时，请记住，你正在经历一个反常现象——一个只有在他们处于崩溃边缘时才会出现的古怪情绪化版本。你熟悉的那个人……终究会出现的。\n\
  *   **闭嘴。真的。** 你在灾难期间的主要任务是缓和局势，而缓和局势的第一步就是什么也不做。如果你是一个逻辑清晰、理性行事的管理者，你会倾向于问澄清性问题——试图梳理问题。别问。保持安静。让情绪过去。原因如下……\n\
  *   **问题本身已经不是重点了。** 你面对的已经不再是问题本身。你正在经历的是员工对该问题附加的情绪包袱。当然，存在核心问题，但你现在观察到的并非如此。你看到的是对该问题的极端负面反应，这才是首先要处理的事。\n\
  \n与倾诉一样，成功在于穿越情绪的爆发。希望会有一个时刻，大部分情绪已经过去，受委屈的人愿意进行理性的讨论。与倾诉不同，讨论不会从核心问题开始。它将以灾难本身为起点，探讨围绕该话题的强烈情绪。\n\
  \n一场灾难是管理不善的最终结果。当你的员工认为完全失控是一种有效的策略时，那是因为他们相信这是让事情发生改变的唯一选项。\n\n## 假设他们有东西可以教你\n\
  \n有句老话说：“人是你最宝贵的资源。” 我想说，他们是*唯一*的资源。电脑、办公桌、办公楼、数据中心……等等。所有这些其他工具，都只服务于你唯一的资源：你的员工。\n\
  \n\n\n**人们的思想会走神。** 他们天生就会随意发表看法——“为什么菲尔能得到那些精选功能？”——并让这些看法发酵、变异，有时甚至演变成一场灾难。我并不是建议每次一对一谈话都要变成一场绞尽脑汁去发现深藏隐患的折磨，而是说它为你提供了一个每周一次的机会，去观察不满情绪可能在哪里悄然滋生。一对一谈话是你进行每周预防性维护的机会，同时也能了解团队的健康状况。一对一谈话是一个倾听员工言外之意的场合。\n\
  \n成功的例行一对一谈话所伴随的声音是寂静。所有在一对一谈话中进行的倾听、提问和讨论，都是管理上的预防性维护。你会看到对某个项目的兴趣何时开始减弱，并在其演变成对工作的不满之前采取行动。你会听到两名员工之间的紧张关系，并在它发展成会议上的争吵之前进行调解。你建立健康一对一谈话文化的回报，就是明显地减少戏剧性事件。\n\
  \n## 章节\n\n## 周一恐慌症\n\n**周一从周日就开始了。** 就在你意识到周末结束，开始盯着那无尽的任务清单的时刻——那份清单是你从周五早早就开始忽略的，因为那时周末甜蜜的气息充满了你的办公室。\n\
  \n通常，周日越早想到周一，就越说明你在周五有多少该做的事没做。更糟的是，你在周末为工作日焦虑的时间越长，周一真正到来时你就会越愤怒。极端情况是，有人整个周末都在为工作状况而烦恼，把自己纠结成一个压力的死结，这意味着，当周一到来时，他们可能会崩溃。\n\
  \n这周一的恐慌来自我的 QA 主管，丁菲尔德。他整个早上都在走廊里压抑着情绪。他用尖锐、低沉的声音跟每个愿意听的人说着什么。我已经知道话题是什么，但他言语中的激烈程度让我吃惊。午饭后不久，他发作了。丁菲尔德双手紧紧交握在身前，站在我的门口，脚尖轻轻地点着地。\n\
  \n“兰兹，能和你谈一分钟吗？”\n\n该死。\n\n我抓紧桌沿，做好了心理准备。\n\n“老天爷，”他说。“我们要发布糟糕透顶的产品了，你定的都是不切实际的截止日期，QA\
  \ 总是背黑锅，我们还支持不支持 IE9，我的信誉都悬在这儿了，看在基督的份上，我们上次的教训还不够吗，求求了，我恨 HTML，还有那个开发人员一直在瞎搞。”\n\
  \n**兰兹软件管理法则第 27 条**：如果有人要崩溃，那一定是在周一。\n\n### 恐慌症\n\n恐慌症因其激烈程度而独特。当你第一次成为其接收对象时，你会因震惊而喘不过气来。这个平时冷静的人怎么就对着我大喊大叫了？我们先别担心这个。先来理解如何处理面前的恐慌，这意味着要遵守规则。\n\
  \n#### 不要加入恐慌\n\n最糟糕的恐慌是那种纯粹情绪化、不合逻辑、基于很少或根本没有事实依据的。它也缺乏任何形式的解决方案，因为实际上并没有一个定义明确的问题，只不过是这个人真的需要发泄一下。这种恐慌的音量和强度会具有消极的感染力，你会忍不住想加入恐慌的行列。\n\
  \n不要。\n\n这里最好的做法就是单纯倾听，保持眼神接触。你的冷静是一种原始的尝试，试图用意念将这种疯狂反射回恐慌者身上，让他们意识到自己已经失控了。这可能很艰难，因为恐慌可能直接指向你，但即使受到攻击，你的任务也一样：倾听。点头。重复。\n\
  \n#### 相信恐慌者有其理由\n\n很可能，你的恐慌者确实有话要说，但也许他们自从上周五下午 5 点以来，醒着的每一刻都压力重重，从而失去了判断力。也许他们的恐慌与他们所说的话毫无关系，而是完全由上周一系列不相干且结果糟糕的事件演变而来。也许他们喝了太多咖啡，但请记住，他们有其道理。\n\
  \n在任何恐慌中，通常会有一段非常嘈杂的前言，目的是引起你的注意。丁菲尔德上面的话都是前言。我知道等他停下来喘口气时，我们就会触及问题的核心。他可能已经说过了，但当他再说一次“不切实际的截止日期”时，我知道我们取得了进展，因为我们触及了恐慌的根源，我们可以开始对话，这是化解局势的第一步。\n\
  \n但是，事情并不总是那么容易……\n\n#### 用问题敲打恐慌者\n\n有时前言就是没完没了。当然，内容就藏在某处，但有些恐慌者就是喜欢恐慌本身。他们喜欢引起你的注意，或者只是喜欢听自己说话，但如果过了好几分钟，你听到的还只是前言，那就到了该接管主动权的时候了。\n\
  \n结束前言并开始对话，从提问开始。为什么产品会糟糕透顶？我们该在意 IE 9 吗？时机恰当且精心设计的问题能让恐慌者远离情绪，因为它们迫使他们使用大脑的另一侧，在那里他们不会恐慌，而是思考。\n\
  \n我很幸运；我知道丁菲尔德会在大约两小时后引爆这颗炸弹。在那段时间里，我快速浏览了我们的 bug 跟踪系统，查看每个人提交了多少 bug；我查看了 bug 的严重级别、提交频率，以及任何可能帮我拆弹的有用\
  \ bug 信息。\n\n丁菲尔德一开始恐慌，我就冷静地拿出我的 bug 笔记。在他喘口气的那一刻，我问道：“嘿，这周末来了多少个 bug？我们修复了多少？其中有多少修复没生效？哇，你觉得为什么会这样？”\n\
  \n用问题进攻的关键是让你的恐慌者从情绪状态转向理性状态。我知道，我也知道当压力山大时，用一种看似理性的方式攻击压力源感觉有多好，但是，嗯，你正在大喊大叫，用手指着我，还上蹿下跳。你是想让我对你的喊叫做出反应，还是对事实做出反应？\n\
  \n#### 让恐慌者解决他们自己的问题\n\n用问题对付恐慌的一个令人愉快的副作用是，你会发现恐慌者往往已经接近解决方案了。请记住，他们从周五就开始郁闷，在那段时间里，他们从各种可能的角度反复咀嚼这个问题。在那种状态下，他们的理解虽然浸透着情绪，但比你更深。\n\
  \n即使你没有成功预判到一次恐慌，你仍然可以利用自己的经验作为一种手段，去探索恐慌者对任何可能问题的理解。嘿，你甚至不需要经验；你所需要的只是想要理解这个人到底在为什么而恐慌。有时，你会走运。你简单的澄清性问题最终会换来一句：“而且*该死的兰兹*，工程经理们应该*每天早上都仔细检查他们的\
  \ bug！*”\n\n好吧。\n\n就这么办。\n\n### 问题依然存在\n\n对工作投入感情是在意自己工作的绝对必要条件。当你走进我的办公室并崩溃时，我听到的是“兰兹，我在乎我的工作，请听我说。”我花了多年时间经受这些情绪的爆发，才学会听到这句话，而不把它当成是针对个人的，但我已经预料到，在充满激情的工程团队中，恐慌是一种常态。\n\
  \n但这依然是一次管理上的失败。\n\n\n\n"
- "# 你的“怪人”炸毛了，这其实挺好的\n\n你的“怪人”选择炸毛，这其实挺好的。否则，他们可能一声不吭就直接离职了。你那位独特的丁菲尔德在你办公室里冲你大喊大叫，这恰恰是个好兆头——说明他不会离开，因为他显然还在乎，而且在乎得很大声。\n\
  \n但确实是你搞砸了。有人在你办公室里咆哮。一旦你成功平息事态，你会明白两件事：第一，存在一个需要解决的问题；第二，也是更重要的一点，有人觉得引起你注意的最佳方式就是炸毛。\n\
  \n## 理解偏差\n\n在你刚刚掌握某件复杂事物的初期，你往往会灾难性地高估自己的能力。\n\n你的自信心会异常膨胀。这份新工作、新爱好或新运动，你会觉得神奇般地简单。你会觉得自己天赋异禀。那些目睹你“神速进步”的人总说这是“新手运气”，但你听到的和他们实际想表达的完全是两码事。你听到的是：“我们嫉妒你能如此轻松地掌握你根本不懂的东西。”但他们实际想说：“我们明白，瞬间感觉自己像个专家确实令人陶醉。当你痛苦地发现自己要学的东西还多着呢，我们肯定会咬紧牙关忍住不说的。”\n\
  \n*学个屁学，我可是天才。*\n\n热情新手的天赋，在于一种幸福且赋予力量的无知。新手不会被理解的深度和复杂性所拖累；他们因热情而光芒四射……直到“跌落神坛”。\n\
  \n## 华莱士恨我\n\n我那时甚至还不是经理，只是一个带两名工程师的组长，但头衔不重要。真正引起我注意的是其中一位工程师态度的转变。哈罗德在我成为他组长后，没有丝毫停顿。周一早上他就冲进我办公室问：“我们从哪儿开始？”\n\
  \n“也许……呃……先修好测试框架里的错误处理？也许？”\n\n“周三前搞定。” *行，这活儿我能干。*\n\n而华莱士呢，则是一副漠不关心的样子。我一直等到周三才走进他办公室问：“嘿，我想问问你在忙什么？”\n\
  \n“跟上周一样，没完没了的 Bug。”\n\n“好的，很棒……非常好。呃，有事就叫我，好吗？”\n\n沉默。*行吧，我从来就没搞懂过华莱士；他一直独来独往，而且看起来干得不错，那就让他干去吧，对吧？*\n\
  \n再说，我可是组长。看看哈罗德——他每天早上穿着他那件亮橙色的费城飞人队球衣冲进我办公室，问同一个问题：“接下来做什么？”我俩合作得热火朝天，以至于我当上组长三周后，团队又加入了斯坦。斯坦是波士顿棕熊队的球迷，但他和哈罗德是一类人。他们早上一起喝咖啡，争论冰球，然后一起冲进我办公室：“接下来做什么？”\n\
  \n*这活儿我能干啊。*\n\n三周变成了三个月，我和哈罗德、斯坦都干得风生水起。是的，我每周都会尽责地去看看华莱士，但真正的“行动”都在我们三个人这边。我以为等华莱士准备好走出他的壳，加入这场生产力派对时，他自然会加入。\n\
  \n正好三个月那天，我的老板拿着一份文件走进我办公室。“华莱士一直在记录他与你的每一次互动的日志，他声称，除去会议，过去三个月你和他总共待了 30 分钟。这是真的吗？”他把文件递给我：\n\
  \n*3/21：* 询问 Bug 状态——47 秒  \n*3/22：* 询问性能问题——他根本不懂自己在说什么和/或者在问什么——1 分 12 秒  \n*3/23：*\
  \ 无互动  \n*3/24：* 无互动  \n\n整整六页，密密麻麻的单行记录，详述了我管理无能的每一分钟。我当时心想：“我以为他不在乎呢。”\n\n## “跌落神坛”不是教训\n\
  \n之所以叫“跌落神坛”，是因为在那一瞬间，原本稳定可预测的地面消失了，你的大脑陷入自由落体状态，恶心想吐，因为你再也分不清哪里是上。\n\n\n\n"
- '# 坠落之感


  坠落带来的感受与教训的规模不成比例。你体验到的不仅是失败感，还有巨大的非理性失望——你不再是一个你从未接触过任务的专家——这很愚蠢。关键是——你现在正好有足够的经验，可以理解掌握一项你曾以为能神奇地即兴发挥的任务所需付出的实际努力。


  华莱士式的坠落在新晋领导者中很常见，而工程师普遍的内向倾向会加剧这种情况。你会发现不仅你领导的某个人不跟随你，而且你和这个人之间存在着彻底且完全的个性断裂。你所有惯用的社交手段都失效了。他们对你机智的妙语回应以茫然的眼神，而当他们开口说话时，仿佛你说的每一个字他们都没听见。


  这是一个令人沮丧的发现，因为你成为领导者的部分原因在于你天生且被证明有效的人际交往能力。但这也是一个令人羡慕的发现，因为在一个充满人的星球上，大多数人跟你不一样，而且你的第一个“华莱士”绝不会是最后一个。


  '
- '# 你的直觉百分之百错误


  与你想要领导的人完全个性断裂，就像华莱士的情况那样，虽然罕见，但为了弄清楚如何解决这个问题，让我们假设这是最坏的情况。


  在与员工进行正常的相互了解时，我第一个想回答的问题是：“他们想要什么？”他们当前工作的核心动机是什么？他们是为了晋升而努力吗？他们只是在摸索工作吗？他们是否迷茫？他们是否安于迷茫？


  理解核心动机并不能让我完全了解一个人，但它给了我一个起点。当我知道他们想去哪里，我就可以开始琢磨如何帮助他们到达那里。不快乐而迷茫的人想要立刻采取行动。寻求晋升的人热切地寻找机会，并且会为了得到机会而承担一切。然而，这是华莱士，当我轻快地问“什么让你感兴趣，华莱士？”时，华莱士茫然地盯着我。


  放弃你能巧妙诱使华莱士说出他的秘密的想法。你所有自然而然的想法，对一个真心相信你是外星人的人来说，都不会奏效。你的首要任务不是理解核心动机，而是基本沟通。


  在任何沟通存疑的情况下，我严重依赖澄清。每当我说了一些可能含糊不清的话，我会问：“你听到了什么？”反过来，当我在倾听时，如果主题或意图不够清晰，我会重述：“好的，我听到的是……”


  听起来像是这样：


  *我：* ……这周末来了新的需求，但詹妮弗仍然希望周四看到一份初步规格说明。华莱士，*你听到了什么？*


  *华莱士：* 詹妮弗周四要一份规格说明。


  现在，如果这是哈罗德或斯坦，我们就完事了。口头承诺已经做出，我们可以继续了，但这是华莱士，我不能做任何假设。


  *我：* 是的，周四的规格说明。那对你的工作意味着什么？


  *华莱士：* 我原计划周一完成文档审查，周二周三搭建测试数据。如果詹妮弗周四需要规格说明，我就没时间做这些了。


  *我：我听到的是*，你有一堆工作需要重新安排时间，对吗？


  *华莱士：* 对。


  *我：* 如果我们重新安排，你认为你能完成规格说明吗？


  *华莱士：* 也许吧。


  我知道这感觉像是消极攻击的奥运会，但我发誓华莱士就是这样思考的。在他的世界里，工作承诺从来不是暗示性的，必须口头说明。我们需要反复沟通，直到他说出：“我将把本周所有计划好的工作重新安排到下周。我会向文档和
  QA 团队传达这些变更的影响，我有中等信心，在周四下班前交付修订版规格说明的初稿不会有什么问题。”


  这很迂腐、烦人且低效，但当个性断裂时，你不知道如何沟通，所以这就是你的起点。通过练习，你会学到独特的交往规则。你会了解到人们用来描述他们快乐与不快的词汇和想法。你会学会当人们完全不知道你在说什么时，他们使用的视觉和口头线索。随着时间的推移，你会为这个与你截然不同的人构建起一幅心理地图。


  与这些“外星人”互动的感觉永远不会自然。它总是显得刻意而陌生，但练习会为你提供一把理解他们思考方式的钥匙，以及一幅或许能让你洞察他们想要什么的地图。


