  的产品。本书的第 19 章标题是“1.0”，但它真正的标题应该是：“1.0，念作‘一点零，天哪，我再也见不到我的家人了’。”我来总结一下：1.0 版本极其困难，加上他对
  Windows 不熟悉，杰瑞陷入困境了。


