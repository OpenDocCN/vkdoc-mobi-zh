- '# 惊鸿一瞥与引人入胜


  一份简历永远无法定义你是谁。简历的职责也不是给我一个完整的画像。如果你挣扎着想要囊括关于你自己的每一个细节，那你就是在浪费时间。简历的设计目标应该是给我一瞥和一钩。


