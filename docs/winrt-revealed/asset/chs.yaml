- "# 浸泡的价值\n\n2006 年，我在德克萨斯州奥斯汀举办的西南偏南大会上做了一次演讲。我的观点是：在创建初创公司的过程中，你将面临成千上万个看似无关紧要的决定。而在这些成千上万个决定中，隐藏着五个真正重要的决策。这些决策将改变你公司的面貌。我当时没有说出口的是：我认为几乎不可能分辨出哪些决定重要，哪些不重要。\n\
  \n多么令人沮丧。\n\n事实是这样的：你可以花费大量精力去判断哪些是重大决策，但这远不如做出决定本身重要。第 21 章中汇集了大量关于如何创造有利于决策的环境的思考，但那一章侧重于团队场景下的思考，而我想探讨的是你选择独自思考的情况。\n\
  \n让我们从你收到过的最令人恼火的一封邮件说起。我说的不是技术支持部门那个愚蠢的混蛋，而是一封来自你信任的人……你的同行……的邮件，他在邮件中对一个需要解决的问题发表了评论，或许还对你解决问题的能力提出了质疑。你对此事的反应，很可能就像我走进你的办公室，照着你脸上打了一拳一样。这是你的动物脑在起作用，它在你还住在洞穴里狩猎采集的日子里很有用，因为反应迟钝意味着你会被吃掉或再挨一拳。\n\
  \n现在，你有时间“浸泡”了。\n\n所谓浸泡，就是将一个想法的种子植入你的大脑，让它在一个由各种想法、事实以及似乎相关的随机杂物组成的丰富“炖菜”中碰撞翻滚。浸泡是一项需要保护的活动，在繁忙的工作日中很少会发生，因为你总是忙于应对永无止境、习以为常的事务洪流。浸泡的目标很简单：产生一个原创的想法。无论你正在琢磨什么问题，你都希望能找到一丝灵感，将你的反应从一封可预见的情绪化“火焰邮件”转变为一个经过深思熟虑的想法，并最终转变为决策。\n\
  \n## 情绪与无知\n\n在之前的一份工作中，我终于步入了正轨。在经历了两年尴尬的“了解公司”阶段后，我进入了状态。我知道谁在做什么，谁充满干劲，谁在混日子。我将一个产品的小而闪亮的创意成功转化成了赚钱的业务，于是我的老板决定给我安排一个完全不同的任务。一个全新的产品，基于我从未用过的技术。这是公司的一个战略转型产品，意味着所有人都会关注。这种高关注度会放大潜在的失误。对我来说，这是一个决定职业生涯的产品。\n\
  \n天哪。\n\n不知道如何着手一个新项目，与想在邮件里把某人撕碎，这两者有一个共同的重要特征。在这两种情况下，最佳策略都是从一次漫长的浸泡开始。\n\n我将浸泡活动分为两类：*主动浸泡*和*被动浸泡*。主动浸泡是你能够主导的活动，通常涉及收集内容；而被动浸泡则是你将大脑随意指向一个方向并祈祷的活动。被动浸泡才是真正产出成果的地方——前提是你已经通过主动浸泡打下了基础。让我们先从主动浸泡开始。\n\
  \n## 主动浸泡\n\n*问一些傻问题。* 面对无知时，你的首要任务是获取信息，而且幸运的是，可能已经有人做过一些浸泡了。这些人对于任何问题都可能有一些事实、想法和观点，你需要倾听所有这些内容。前五次这样的对话对管理者来说可能会很尴尬，因为在你问完前两个问题（“这是什么？”和“它是如何工作的？”）之后，情况就会变得很明显：你完全不知道发生了什么，而你却认为管理者看起来博学多才是其本职工作。\n\
  \n错了。管理者的职责是掌握情况。你所在的行业里都是工程师，这些人拿着高薪就是为了关注细节，这意味着他们能一眼看穿伪装的知识。当然，他们不会说什么，因为你是老板，但是，嗯，你看起来会很蠢。\n\
  \n浸泡一开始会让人感到不舒服，但你每问一个无知的问题，就在为你那管理型大脑增添内容。问傻问题是开始弄清楚到底发生了什么的最佳方式。此外，向你的团队提出任何问题，都是间接表达“我足够关心我们正在做的事情，所以想听听你的想法”的便捷方式。\n\
  \n*向陌生人推销你的想法。* 一旦你问够了傻问题，你的脑海中就会开始形成一幅关于你正在做什么的图景。这不是一幅完整的画面，更像是一幅粗略的草图，并伴随着因突然摆脱无知而产生的些许宽慰。现在，你需要找一个愿意倾听你长篇大论的、有资格的人来测试你的理解。向这个人推销你脑海中的图景，看看会发生什么。对方频频点头？太好了，想法正在成形。对方眼神茫然？哎呀，是时候问更多的傻问题了，就从你刚刚推销的对象开始问起。\n\
  \n我发现，当我向陌生人推销我的想法时，从我嘴里说出来的话，与我脑海中的图景几乎没什么关系。将我的想法线性地映射成单词和句子的过程，暴露了我思考中的缺陷或漏洞，而这些是在想法于脑海中盘旋时我从未发现的。这引出了我们的下一步。\n\
  \n*写下来，扔掉，再写一遍。* 一旦你的陌生人不再完全困惑于你的想法，就该把它写下来了。这与向陌生人推销的过程类似，你是在寻找另一种媒介来测试你的想法。陌生人给了你一个机会将你的想法口头表达出来；而把它写下来，则是让你的想法通过大脑中完全不同的部分，再传递到你的指尖。看着纸上的文字或平板显示器上的内容，会再次暴露出你在脑海中无法看到的那些漏洞。这些漏洞证明你还有更多傻问题要问，所以去问吧，再写一遍，然后扔掉它。没错，不是仅仅关闭文档窗口；你需要把你刚写下的所有东西都丢掉。扔掉，清空回收站，然后远离电脑。\n\
  \n我知道你会对自己写下的文档中的某些部分恋恋不舍——一些机智的想法，巧妙地捕捉到了问题的某个侧面——但请记住我们在这里想要解决的是什么。这并非关于你是否应该在上班路上买一个蓝莓橙子味松饼，这是一个重要的决策，而优雅地解决它意味着你要尽可能多地重新审视自己的回应。将你的第一稿草稿送入虚无，可能会永远失去一点机敏，但如果这份机敏在第二稿中再次出现，我保证它确实属于那里，并且你再也不会失去它。\n\
  \n## 被动浸泡\n\n\n  \n**一旦你完成了所有主动的内容获取，向陌生人推介过，也反复书写过几次，你就需要停止主动思考这个问题。** 把便签从屏幕上撕下来，把桌面上的第二稿藏起来，就此打住。是的，你确实需要做出决定，需要对问题给出回应，虽然我在说要清除所有主动沉浸的实物痕迹，但你并不会真正停下。你停不下来，你的大脑不允许。\
  \  \n\n回到你朋友发来的那封挑衅邮件。你以前收到过这种邮件，知道最错误的做法就是立刻回复。当然，你的动物本能迫不及待地想这么做，因为*反击的感觉真爽*，但这从来都不是正确的举动，因为你的动物本能在自我防卫，它解决的只是证明*嘿，我反击得够狠吧？*\
  \ 我对这类挑衅邮件和艰难决定的建议是一样的——睡一觉再说。  \n\n一夜安眠是平复情绪、转变看问题角度最好的方式之一。你有没有在夜里觉得天都要塌了，醒来却发现支撑天空的方法其实简单又美好？这是怎么发生的？答案是，你的大脑从未停止工作。更妙的是，它有一种独特的能力，在你最不经意的时候，潜意识地构建出解决难题的优雅方案。你可以称之为灵感，也可以称之为直觉，但别长时间盯着它看，因为这是一种害羞的能力。当没人注意到它时，它才最能发挥作用。\
  \  \n\n### 沉浸需要时间  \n\n别告诉我同事，但我大部分的薪水都是在早上开车上班的 40 分钟里赚到的。我端着咖啡上车，驶上公路，让思绪随着播放的音乐任意游荡。我从不刻意去想：“好吧，菲尔昨天把我气得够呛……我该怎么处理？”我的思绪随意跳跃，四处碰撞，我从不知道它会落在哪里。不过，如果前一天我已经花时间主动沉浸在“菲尔问题”中，那么我的漫游思绪往往最终会落在与菲尔相关的地方，有时，这段心灵之旅会带来一丝灵感的火花。\
  \  \n\n作为实操建议，“沉浸”有时显得很单薄。如果你的老板正等着你对一个关键决策表态，我并不是建议你说：“我完全不知道该怎么办，我要去问些愚蠢的问题，向陌生人推销，写下来再扔掉，然后忘掉我所做的一切。”我想说的是，任何重大决策、任何重大问题，都值得花时间和深思。如果你有多年经验，大概能应付自如，但你仍然会遇到一些情况，正确的做法不是马上下决定，而是去思考。\
  \  \n\n毫不夸张地说，“沉浸”是我工作中最喜欢的部分。我在沉浸时所做的，是一种创造行为。这是设计工作，是战略规划。这是从问题中剥离情绪和无知，然后构建出一个原创的解决方案，向我的同事表明，我真正在乎我所做的事。\
  \  \n\n---  \n\n## 章节  \n\n### 管理马尔科姆事件  \n\n人们对原版《侏罗纪公园》的狂热，很大程度上源于影片对逼真电脑动画的承诺。这对工程师来说是双赢。我们不仅唤起了青春期前的恐龙情结，还能看到第一部恐龙真正登场的电影，而且，是用*我们编写的工具*做的。好吧，我当时在\
  \ Borland，90 年代初我们编写编程语言和应用程序，但*那些 ILM 的家伙就在街对面，我们是哥儿们。*  \n\n奇怪的是，18 年后，电影里让我印象最深的，是杰夫·高布伦饰演的伊恩·马尔科姆的一句台词。他坐在侏罗纪\
  \ SUV 里，忙着搭讪劳拉·邓恩，向一位古植物学家解释混沌理论，这时他说了一句深深烙印在我脑海中的话。  \n\n他通过在邓恩抬起的手背上滴落水滴来演示混沌理论，然后问：“它会往哪个方向流？”（真会撩，杰夫。）水滴每次滴落的方向都不一样，马尔科姆将此归因于“微小变化的原理——你手背上汗毛的朝向、皮肤中血液充盈的程度，[它们]从不重复，却极大地影响了结果……”\
  \  \n\n对于那些想了解更多知识的极客们，可以去看看蝴蝶效应。但对我来说，这句话概括了实用软件设计中的一个核心部分。在电影上映后的这些年里，我把它改成了这样：“那些看似微不足道、却执意要以一种不可思议的方式坑你的事件。”这些事件以伊恩·马尔科姆命名，被称为*马尔科姆事件*。\
  \  \n\n### 我们总是很匆忙  \n\n在硅谷，我们总是很匆忙。如果我们不在创造新东西，就是在创造帮助创造新东西的工具。我们构建产品的流程因公司而异，但通常遵循这样一个循环：\
  \  \n\n**设计：** 头脑风暴要创造的新东西。大量讨论，大量舍弃，再讨论更多。  \n\n**开发：** 少说话，多做事。工程师埋头苦干，经理们则在琢磨自己该做什么。\
  \  \n\n**部署：** 更多讨论，一些争吵，经理们忙着阻止大家互相残杀，然后突然……就完成了。  \n\n现在我们正处于设计阶段，你和我。我是经理，你是高级工程师，我们正在为下一个版本进行头脑风暴。我们各自对下个版本要做什么有个模糊的想法，但还不清晰。没有什么能明确这个想法，所以我们只是把想法抛出来，看看哪个能站得住脚。\
  \  \n\n直到你随口说了一句话，似乎才有所突破；我抓住这个想法，即兴发挥，把它写在白板上，然后*啪……* 这就是那个“功能特性”。这是定义你版本的那项工作、那个设计。我们知道是这样，因为我们俩都坐在那里盯着白板上的这个“功能特性”，意识到这一刻将定义此后的一切。这种情况不常发生，好好品味吧。\
  \  \n\n这不是一个马尔科姆事件。这个时刻类似于你第一次理解一项奇妙新技术时的“我靠”时刻。你必须拥有这样的时刻，才能拥有一个充满灵感的发布，但你还没有被马尔科姆事件坑过。\
  \  \n\n我们继续吧。  \n\n太好了，我们有了这个“功能特性”。现在，狂热开始了。我们无法把手从白板上挪开，因为我们知道在接下来的 15 分钟里，其余的功能特性会源源不断地涌现出来。现在，在这股狂热中，会做出大量的决策，虽然我们英勇地试图把它们都记录在白板上，但我们还是会漏掉一些。\
  \  \n\n我想挑其中一个被漏掉的决策来说。乍一看，这不是一个重大决策。事实上，在发现这个“功能特性”的创造性狂热中，这实在是一个很小的决策。会议结束后，我们就忘了它，因为我们还在消化发现这个“功能特性”所带来的精神高潮。\
  \  \n\n问题是，这个决策确实很重要。你所不知道的是，这个决策以一种关键的方式，为那些没参加第一次狂热的会议的人澄清了这个“功能特性”。顺便说一句，*那就是所有人。*\
  \  \n\n目前还没人知道，但这就是你的马尔科姆事件。  \n\n### 理解马尔科姆事件  \n\n一个月过去了，开发已经开始，更多人也参与进来。有人问了你一个关于这个“功能特性”的问题，答案就是那个被遗忘的决策。没什么大不了的，你回答了问题，继续工作。一周后，一个\
  \ QA 人员问了你同样的问题。你不是已经回答过这个问题了吗？是的，回答过了。好吧，没什么大不了的，告诉他答案。  \n\n又过了一个月，据你统计，你已经被问了十次同一个澄清性的问题，你开始纳闷：“大家难道不明白吗？答案不是明摆着的吗？”\
  \  \n\n\n\n### 排版后内容\n\n不，他们没有。他们并没有参与你最初设计会议中的那种“宗教体验”，更糟糕的是，这些提出问题的人并不是问题所在。问题在于那些没有提问的人。是那些在假设某个问题的答案，却没有提出疑问的人。他们在想：“好吧，如果这很重要，应该有人会告诉我或者写下来，对吧？”\n\
  \n“马尔科姆事件”（Malcolm event）是指一个看似微不足道的事件，却以一种意想不到的方式搞砸了你的发布。在这个澄清决策的例子中，它就是一种“沟通不良税”。每个人都在疑惑这个功能的某个奇怪方面，在这种困惑中，他们浪费了时间，也浪费了金钱。\n\
  \n发布过程可能进展顺利。“马尔科姆事件”可能只是一个烦心事，比如每次会议上都有人问*同一个老掉牙的问题。*或者，你可能没那么幸运。也许文档人员从未费心去问一个澄清问题，导致你的文档对这个功能的描述很糟糕。更糟的是，也许负责该功能的开发者花了整整一个月的时间按他自己臆想的版本来开发，直到你安装一个构建版本并发现人们无法读懂你的心思。\n\
  \n“马尔科姆事件”的成本跨度很大，所以让我们尽量避免它们。方法如下。\n\n### 文档制品\n\n读到这里的某个人，可能大半章都举着手。好了，你有什么问题？\n\
  \n“兰兹（Rands），你在说规格说明书！功能规格说明书！交互设计、视觉设计和线框图！谁不喜欢线框——”\n\n好了，手放下。\n\n不，这篇东西并不是要描述把东西写下来的诸多好处。是的，好处有很多，但那是避免“马尔科姆事件”的一种笨重方法。\n\
  \n记住，我们在这里讨论的是细节小事。我不是在说某个版本的大致框架，而是在说那些看似无关紧要、却注定要搞砸你的细节。一份写得好的规格说明书会记录你所有的细节，但你有时间去编写和维护规格说明书吗？我没有。我在相当成功的公司工作了近二十年，我能数得清的有用的规格说明书，两只手就够。真的。\n\
  \n问题不在于规格说明书是个坏主意，而在于它们太耗时了。记住，我们很赶时间。尽管如此，确实需要记录一些东西，因为避免“马尔科姆事件”的第一件事就是需要一个**文档制品**。\n\
  \n一个文档制品记录了一条关键知识。是的，它可以是一份规格说明书、一段简介、一张图、一个优先级，甚至是一个负责人。关键在于，你必须知道记录这个制品是至关重要的，因为你以前遇到过这种情况，你明白如果这条知识在整个组织中不能被很好地理解，你就完了。\n\
  \n我在一家初创公司发布第二个版本时，通过惨痛的教训学到了这一点。在一次早期的头脑风暴会议上，我们的销售副总裁花了整整一个小时解释对更好性能的需求。我们都点头表示理解，知道产品的未来版本会包含一个新的应用服务器来改善我们的性能问题。问题在于，从来没有人对副总裁说“不”，更糟的是，当产品发货时，性能反而略有下降。当副总裁发现时，他在我的办公室里整整吼了\
  \ 30 分钟。\n\n在我们的下一个版本中，我们正确地决定将应用服务器再推迟六个月，而我写的每一个功能列表顶部都有这样一行加粗的文字：“**本版本不进行性能提升。**”\n\
  \n检测“马尔科姆事件”是你工作中最难的部分，因为这是一门识别“重要之琐事”的艺术。我很想在这里提供一些很好的建议，但我的建议简单而又不幸。你学习识别潜在“马尔科姆事件”的唯一方法，就是去经历一些非常非常糟糕的经历。\n\
  \n抱歉。\n\n### 活页夹\n\n太好了，利用你过去糟糕的经历，你捕获了一个文档制品。假设这是一张潦草画出的绝妙 UI 设计图。恭喜你有先见之明把它写了下来。然后呢？你把这个图放在哪里？放在你的莫尔斯金（Moleskine）笔记本里？嗯，那很时髦但没用。一个塞在笔记本里的文档制品，跟没写下来差不多。\n\
  \n成功的文档制品管理是避免“马尔科姆事件”的关键，而成功的文档制品管理在于三个 A。它们是：\n\n**可用性（Availability）：** 你的文档制品很重要。你已经知道了，但其他人都知道吗？它需要放在任何关心它的人都可能无意中看到的地方。它可以是一个维基页面、一封群发邮件、一份演示文稿。我不知道你的组织沟通模式是怎样的，但你必须把你的制品放在沟通模式的核心位置。“各位，这张涂鸦就是我们的未来。”这引出了下一个*A*。\n\
  \n**共识（Agreement）：** 你创建文档制品的原因，是你相信你已经识别出一条关键信息，这里的“关键”可能意味着新颖、有争议，或者只是重要。通过让你的制品对团队可用，你是在说“注意我”，这是一个关键时刻。这就是你将一个“马尔科姆事件”打入冷宫的时刻，因为你正在让它成为常识。听起来我好像只是在重复描述“可用性”，但并非如此。我指的是当菲尔（Phil）读到你的周报里写着“我们不打算做菲尔最爱的功能”时，在走廊里发生的争论。\n\
  \n*所以，你和菲尔把问题说开了。你们讨论利弊，他让一步，你让一步，突然之间，没事了。我们不需要做菲尔的功能，因为我们在做另一个功能，而菲尔理解了原因。*\n\n\
  **准确性（Accuracy）：** 这是三个 A 中最简单的一部分。随着你的文档制品在组织中渗透，它会发生变化。大家会开始修改那张涂鸦，菲尔会要求一个小改动，你的制品会不断演变。当它在走廊里被流传讨论时，请花时间修订它，因为你永远不知道哪个微小的改动，可能会刺激到某个对制品第一版并无异议的人。\n\
  \n可用性、共识和准确性。我把这些名词称为“活页夹”，因为它们把人束缚在“马尔科姆事件”上。如果他们看到了、读到了、评论了它，它就成了他们分内之事。它不再是一个无关紧要的事件，而是常识。\n\
  \n### 成功往往是静默的\n\n避免“马尔科姆事件”完全没有成就感，原因如下：你知道失败是什么声音，但成功是静默的。成功是发布顺利的时候。是你不必为重大发布立即推出一个更新补丁的时候。避免一个“马尔科姆事件”，是你设法预测了未来，而当你告诉别人你做了什么时，没有人会相信你，因为什么都没发生。\n\
  \n管理，就是对无形事物的照料和喂养。当你看起来什么都没做的时候，往往是你做得最好的时候。我和任何人一样热爱发布前最后一个月的刺激感，但我怀疑我们互相吼叫、周末加班、感受着妥协带来的沉重压力，正是因为我们被“马尔科姆事件”包围着。\n\
  \n---\n\n## 章节\n\n### 捕捉上下文\n\n公司里的每个组织都有自己的“最爱应用”。这并非他们真正的*最爱应用*，只是他们必须在组织内担任特定角色时使用的应用。现在就站起来，走到你所在办公楼里一个不熟悉的地方，然后偷偷观察你的同事。如果有人拦住你问你在做什么，就告诉他们：“是兰兹让我来的”，然后用力点点头。这招总是管用。\n\
  \n\n\n当你走在这个陌生新部门的走廊上时，看看他们的屏幕。显示器上最常用的应用程序是什么？是 Excel 吗？嗯，那你很可能在某个运营部门。看到很多 Word\
  \ 文档？也许是法务部门，也可能是技术文档部门。工位是空的？那肯定是销售部。\n\n工程领域最常见的应用程序是编辑器。无论是一个终端窗口，还是全球最花哨的集成开发环境，他们的最爱应用都是代码编辑器，但这并不是他们的秘密武器。秘密武器是版本控制。\n\
  \n版本控制背后的概念很简单。它是一个中央网络仓库，存放项目所包含的所有文件。如果我想编辑一个文件，我就运行一个工具（它与我的编辑器协同工作），在我的系统上创建该文件的本地读写副本。我进行修改，然后使用同一个工具，将文件签入到网络。那么，这有什么大不了的呢？\n\
  \n通常没什么大不了的。你可以轻松自如地签入和签出文件，毫无麻烦。当你意识到软件项目通常是由团队多人编辑的庞杂文件集合时，麻烦就来了。版本控制系统解决了两个工程师同时签出并修改同一个文件的问题。先签入修改后文件的人不会遇到麻烦。当第二个人签入时，他会收到一条警告消息：“嘿，在你签出这个文件的这段时间里，它已经被修改过了。你想怎么办？”然后，用户就得想办法将这两个文件合并成一个一致且可正常工作的整体。\n\
  \n这就是版本控制扮演的“交通警察”角色，这很酷，因为它能防止人们互相“敲脑袋”。但还没说到最酷的地方，那就是我签入时做的另一件事。我不仅仅签入文件；我还会附上关于我做了哪些修改的信息：\n\
  \n“Rands 添加了一个新的 blingleforth 函数。它很赞。”\n\n然后，版本控制服务器会复制我的文件新版本，用我的名字和注释标记这个新版本，并增加与文件关联的版本号。\n\
  \n让我们先忽略“文件的每个版本都存储在这个系统中”这个有用的事实，重点看看我随本次修改附带的注释。这就是大问题所在。这就是工程领域的秘密武器。我们不仅保存了工作的每一个版本，还捕获了变更的上下文。版本控制存储了让我们的想法变得闪亮的思考过程。\n\
  \n如果你觉得，“哎呀，这真是个古怪的书呆子习俗”，如果你还没有茅塞顿开的感觉，那就想想两个产品：del.icio.us 和 Flickr。它们都围绕“捕获上下文”构建了自己的功能集。这里的“上下文”，我指的是标签。每当有人在这两个服务中添加新链接或照片时，他们都可以添加自己喜欢的任何标签。没有规则。只需输入能说明该链接或照片相关性的词语。这就是上下文。\n\
  \n当你开始在 Flickr 和 del.icio.us 上闲逛时，你会意识到人们选择捕获并分享其内容的上下文所创造的价值。在奥斯汀举办的西南偏南互动大会上，我对那些不仅花时间拍摄并上传照片到\
  \ Flickr，还花时间仔细标记所有内容的人们深感敬佩。一场演讲结束三十分钟后，Flickr 上就已经出现了几十张我刚听过的演讲的标记好的照片。\n\n##\
  \ 那么，然后呢？\n\n想想你现在正在做的大项目。对我来说，就是这一章。我正欢快地打着字，每 12 秒就按一次保存键，因为我是一个爱抽搐的保存狂。这源于多年来喜欢崩溃的不稳定\
  \ Windows 应用程序。*如果你经常保存，你就不会完蛋。*\n\n我应该在什么时候捕获这个项目的上下文？我应该什么时候停下来，记录下对我刚写的内容的思考？每当创造出重要内容的时候。在写作过程中，我一直在记录这些时刻。到目前为止，它们是：\n\
  \n1.  新的引言，借自我似乎永远写不完的版本控制文章。\n2.  从示例技术中移除了 Wikipedia——Flickr 和 del.icio.us 足够了……别把它们和\
  \ Wiki 混淆了。\n3.  一直在移动声明段落……还没找到合适的位置。可能我错误地爱上了这一段。\n\n这些注释对你有意义吗？没有。它们对我有意义吗？有。我希望我最爱的编辑器每次在我按下保存键时都提示我添加上下文吗？不。我想要另一个动词，我们叫它\
  \ `wow`，让它表示：“我对我的项目做了重要的事情，我想捕获这次变更的上下文。”\n\n对大多数人来说，这并不是一个显而易见的行为。事实上，在我的工程团队内部，曾因为这些变更注释发生过激烈的被动攻击式战役。这是一场斗争，一方是懒惰的只想签入文件的人，另一方是明白“虽然将代码安全地保存在版本控制中很好，但理解项目日常的变化趋势甚至更为重要”的人。后者称之为状态报告。\n\
  \n没错，我终于找到了用技术手段消灭状态报告的切入点。我们需要让工具允许我们在灵光一闪的时刻捕获上下文，而不是周五下午四点我们拼命想逃离工作的时候。如果周五下午你需要做的只是问你的最爱应用：“给我看看上周所有的\
  \ `wow`”，你的状态报告流程会变得多简单？仅仅是这份报告，就足以激励我在无数次的抽搐式保存中，尝试记住记录下我的 `wow`。\n\n## 书呆子自白\n\
  \n我是一个不折不扣的版本控制呆子。在 Borland，我是初级工程师，这意味着我要负责构建产品的苦差事。这意味着如果产品构建失败，就会有人冲我大喊大叫。这给了我强烈的动力去构建一个应用程序，迫使每个工程师在每次签入项目时都添加注释，无论多短。*这不是我的错，是他的错。*\
  \ 在 Netscape，我满怀敬畏地看着 CVS 如何通过原始的网络应用与 Bug 跟踪和构建系统整合。我仍然对 Tinderbox 垂涎欲滴。在我自己的创业公司，我是那个把\
  \ Microsoft SourceSafe 拖到楼后狠揍一顿的人。\n\n我因版本控制而生，因版本控制而呼吸，因为我看到了它的价值。每年，我都对更多“最爱应用”了解更多。我了解到高管们如何因演示软件而生，因演示软件而呼吸。我了解到运营部门那些人能从\
  \ Microsoft Excel 中变出什么魔法。每个人都在努力创造东西，而通过对我们最爱应用进行一些微小的调整，我们可以把版本控制从书呆子手中夺过来，帮助每个人索引他们的闪光点。\n\
  \n## 章节\n\n"
- '# 涓滴理论


  被埋没。


  回到创业公司的时候，我们正在转换方向。在谈论了六个月的发布产品之后，我们需要真正发布一个产品，没有什么比截止日期更能吸引所有人的注意力了。好消息是 QA 一直在尽职尽责，我们的
  Bug 数据库里积压了一大堆工作。坏消息是，好几个月没人看过这个数据库了。


  当时我们有一个临时借调的副总裁，作为临时高管，他非常敏锐。他很快推断出我们的目标——发布一个高质量的测试版——但他也很快发现，由于那堆积如山、未经分类的 Bug，我们对产品质量毫无概念。


  他召集了 QA 经理、技术支持经理和我开了一个会。他的建议是：“用这种方式分类每一个 Bug，然后告诉我，要发布这个测试版，我们必须修复多少个 Bug。”然后他就离开了。


  每一个 Bug。537 个 Bug。你得阅读 Bug 描述，可能还要复现它，然后做出一个明智的团队决策。假设每个 Bug 平均花 5 分钟，那么你面对的是……糟糕……45
  小时的 Bug 分类工作。这简直是一项不可能完成的任务。我有功能要修复，有人员要管理，而且我已经连续两个周六没见过太阳了。




  让我们暂时岔开话题，谈谈缺陷数据库中蕴含的巨大价值。在我工作过的几乎每家公司，关于产品唯一可衡量的真实数据源就是缺陷数据库。营销文档会过时。测试计划会老化。测试用例数据库会慢慢变成质量保证人员（QA）没人看的个人待办事项列表。缺陷数据库是唯一能提供你产品相关数据的地方。


  我深知这一点。我知道，一旦我有效地梳理（scrubbed）了缺陷数据库，我就获得了关于该产品最有见地的观点。


  但是。


  537 个未梳理（unscrubbed）的缺陷？40 多个小时的枯燥缺陷排查工作？


  拜托。我还有个产品要发布呢。


  当我面对不可能完成的任务时，我的常规方法是分析，因为分析能给你数据，而数据又能让你做出自信的决定。所以，我像上面那样做：仔细估计完成它所需的时间：5 分钟 X
  537 = 不可能。这个合理的估计让我恐惧得僵住了。我究竟要怎样才能在处理 40 小时的缺陷排查工作的同时，完成我的其他五项工作？一旦我深陷于这种恐惧和对不可能任务的无措中，我就不再思考如何完成任务，而是在思考恐惧本身。


  我的建议是：开始做吧。


  “但是 Rands…… 我有 300 个测试要跑，只有一天时间……”


  打住。去跑一个测试。现在就去。


  “等等，等等，等等。Rands，听我说。他们需要在明天上午 9 点拿到这份规格说明书……”


  嘘。安静。去写。只写一段。现在就去。


  欢迎来到“涓滴理论”。


  ## 我们的反派


  面对不可能完成的任务时，我习惯性的第一步是把任务写到待办事项列表里。


  “好了！它已经在列表上了。啊啊啊…… 感觉不错吧？它上了待办事项列表，那意味着它最终会被完成，对吧？”错。把任务放到待办列表只做了一件事：它帮你躲避了 *批评家（the
  Critic）*。


  每个故事都需要一个反派，在这篇文章里，我们的反派就是批评家。他存在于你内心的声音，会对你的生活进行细致而批判的分析，而且他在你脑海里占据了重要位置，因为他不止一次救过你的屁股。


  正是他告诉你，那个初创公司的录用通知听起来好得令人难以置信。你还记得那家公司，对吧？就在你拒绝了那份诱人的录用通知书三个月后，它就消失得无影无踪了。正是那位批评家说：“他们怎么可能付得起给任何人这样的待遇，我甚至都不理解他们的商业模式？”


  六年前，是批评家安抚了你内心的极客，说服你不要在真正成熟之前购买高清电视；也是他告诉你，不要相信那个说话很快、信誓旦旦保证团队会按时完成任务的工程经理。批评家说：“说话快的人是在快速掩盖他们知识上的漏洞。”


  批评家是对的。批评家赢得了信任。批评家也能够在最糟糕的时机放大你的恐惧。正因如此，在这篇文章里，他仍然是反派。


  我知道，把不可能完成的任务放到待办列表上感觉很好。我知道这感觉像是你真的做了点什么，但实际上你只是在回避冲突。你知道，一旦你开始考虑那个不可能的任务，批评家就会用他洪亮而实际的声音插话，*“Rands*，你在想*什么？怎么可能有人在发布日期的前两周添加功能！”*


  “好吧，好吧，你说得对，但是老板想要这个，当老板脑子里有了一个想法，要废很大功夫才能 blah blah blah……” 现在，你开始辩解，你开始担心，你开始和批评家争论，而你应该做的是——开始。


  ## 不开始，什么都做不成


  让我们先来分解一下 *“不可能性（impossibleness）”* 。为了本章讨论方便，我们把不可能完成的任务分为两种。首先，是极其乏味的任务。这类工作不需要耗费脑力，但工作量巨大。缺陷梳理是很好的例子。光谱的另一端是极其困难的任务。比如，“嘿
  Rands，我们需要在圣诞节前推出一个新产品。是的，我知道现在是十月。准备好了吗？开始！”


  奇怪的是，攻克枯燥和困难的任务都需要相同的心法，你的第一步都是开始。


  多么愚蠢、微不足道的建议……开始吧。但请花点时间审视一下你脑海中的待办事项列表，或者直接看看你写下来的那个。有多少极其重要的任务在那里躺了超过一个月？超过一年？很尴尬，是吧？这并非因为它们不重要；只是因为你没有开始，而你没有开始是因为每当你想开始时，批评家就会插话：“你怎么开始？你永远完不成的！你甚至不知道从哪里开始。”


  开始。去读第一个缺陷。别想还有多少个。走到下一个，看看会发生什么。只需几分钟，你就能取得一些类似进展的东西。再处理两个缺陷，你就能开始感觉到势头。进展 + 势头
  = 信心。当你看到自己处理了不可能任务中最微小的部分时，批评家的声音就会变小，因为你在慢慢证明他是错的。


  ## 迭代


  第二条建议比第一条更简单，这简直难以想象。迭代。一旦你把自己从停滞状态中踢出来，迭代就会变得稍微容易一些，但如果你真的在攻克一个不可能完成的任务，批评家绝不会闭嘴。


  “哇，你关闭了五个缺陷…… 伙计，还有 532 个要处理呢！”迭代和重复不会让批评家闭嘴。但进展会。当你的大脑专注于一个不可能完成的任务时，奇妙的事情就会发生。一旦你开始并逐步处理这个任务，你就会开始发现低效之处，并开始微调你的流程。这就是为什么一个工程师告诉你“写那段代码需要两周时间”，然后周末回来却说“写完了”。他真心相信那是需要两周的任务，但当他开始思考这个问题时，他意识到自己一年前写过类似的代码，只需花半个星期六调整一下，就能实现相同的功能。


  这同样适用于更小、更枯燥的不可能任务。之前，当我估计梳理每个缺陷需要五分钟时，我没有考虑到，在处理了大约 50 个缺陷之后，我会变得非常擅长缺陷梳理工作。我会开始识别出那些通常能写好缺陷报告的人，和那些完全没头绪的人。我会了解产品的问题区域，并知道在哪里可以快速判断缺陷的有效性。对于前
  50 个缺陷，每个需要 5 分钟的评估窗口，到接下来 50 个就变成了每个 1 分钟，而当我真正上手后，第二个 100 个缺陷的评估时间平均每个只需 15 秒。


  这意味着，我原来估计需要 45 小时的缺陷梳理工作，实际上只需要大约 7 小时。我原以为需要一周的工作，实际上只需要一个完整的工作日。


  但不要认为这给了你可以把所有预估时间缩短五倍的权力。事实证明，不可能的任务，经过仔细考量，实际上可能确实非常困难。要相信这一点：一个人在工作开始之前，通常非常不擅长估算工作耗时。


  ## 混合着来


  糟了。你被指派了一个不可能完成的任务，经过一个不眠的周末，你确认了，是的，这个任务不可能完成。实际上，你已经开始，你也迭代了，但你仍然不知道怎样才能真正完成任务。讲故事时间。


  今年春天，我请了一个团队来清理物业上的一些灌木丛。这块地是橡树、月桂树和红杉的宜人组合，但大部分区域已经杂草丛生，难以进入。我刚搬进来时的第一个想法是，“太好了，我肯定能大干一场清理干净！”在我花了一个周末，勉强清理了*5
  英亩森林*中 50 平方英尺的区域后，我的想法变成了，“真无聊得要命，不可能完成。”




