- '# 章节


  '
- '# 议程识别


  我讨厌开会。


  *每个人都*讨厌开会，因为我们经历过太多糟糕透顶的会议，以至于我们现在走进会议室，抱臂坐下，想着：“好吧，还要多久这个会议才算正式浪费我的时间？还要多久*这个*会议才会变得无聊透顶？”然后它就真的无聊了。时间被浪费。产生了一堆空话，每个人都围坐在桌子旁，想知道什么时候会有人来制止这种疯狂。


  如果你曾在会议中感到沮丧——如果你坐在那里想知道为什么这些人，这些拿着高薪推动公司前进的管理者，就是不能做或说出那些显而易见的事——那么请继续读下去。


  每当你走进一个可能变得糟糕的会议时，你需要一项基本技能。无论你是参与者还是会议主持人，这项技能都很重要。这项技能叫做*议程识别*。


  简单来说，议程识别是辨别以下内容的能力：


  1.  典型的会议角色以及与会者如何扮演这些角色。

  2.  解释这些不同的会议角色想从会议中获得什么。

  3.  如何利用这种理解，以最快的速度离开会议。


  ## 退出会议技巧 #1：识别会议类型


  离开会议的第一步是识别这是什么类型的会议。会议议程会有帮助，但由于大多数会议没有议程就开始了，你得靠自己。你很可能参加的要么是信息传达会，要么是冲突解决会。


  在信息传达会中（各位，这里有个大惊喜），信息被传递出去。想想你最爱的季度全员大会。员工会议。任何有固定默认议程的会议。这类会议中有两种参与者：发言者和倾听者。


  这些会议中的角色和议程很简单。发言者在发言，倾听者在倾听。明白吗？除了信息传递，没有其他需要解决的问题。信息传递得越快，大家就能越早回去工作。




  '
- '# 会议脱身术：高级议程识别


  你能迅速识别出那些不懂会议本质的人。他们就是那种在全体大会上总是问相同（或随机）问题的怪人，指望仅靠提问就能改变些什么。在全体同事面前说出自己的想法，这是一种高尚的行为。但这同时也是在浪费时间。各位，这是一场信息传达会。发言者在此传递必要的组织信息，以免引发哗变。大家只需点头聆听，而非解决问题。当那个怪人开口时，所有理解会议本质的人都在想："好吧，又一个没完没了的无用问题，害得我要在这儿呆更久。真糟糕。"


  在冲突调解会议上，需要解决某个问题。显然，这个问题无法通过电子邮件、即时通讯或走廊谈话解决，所以某个聪明人决定召开一场面对面会议——这种会议带宽高，时间浪费也大。


  冲突调解会议中的议程识别更为复杂。要看清它的运作方式，让我们虚构一场会议：


  周二下午 4 点。嫌疑人名单：你（乔，高级工程师）、另外两名随机工程师、一位产品管理人员，以及一位项目经理。项目经理召集会议是为了解决一个与你团队无关的问题，所以从一开始你就对坐在这里心怀不满。你看，销售团队卖出了公司根本不生产的东西。你被叫来解释，要造出这个你们从未造过、却已经卖出去的东西得花多少钱。经历过这种情况吧？我想也是。


  ## 会议脱身术技巧 #2：对参会者进行分类


  议程识别首先要对参会者进行分类。你需要识别出两大类型：*棋手*和*棋子*。这两种类型的简单区别在于，棋手想从会议中得到些什么。这是他们参与的动力。他们会身体前倾，积极点头，几乎按捺不住要在桌上摊牌自己的议程。


  棋子要么沉默不语，要么只是会议运行的工具。无论如何，他们对会议的贡献微乎其微，可以从战略考量中剔除。当然，"棋子"这个词并非贬义。棋子很可能正在经营你的公司，但在会议上，他们不贡献……这恰恰不是他们的核心技能。


  ## 会议脱身术技巧 #3：识别棋手


  区分棋手和棋子很简单。你只需一份参会者名单和一点组织知识就能做到。让我们用前面假设的会议来试试。


  首先，你可以假设所有工程师都是棋手。他们显然掌握着可能拿上台面的技术知识，否则为什么被邀请？产品经理也是棋手，因为她在会议中代表销售团队。这类会议中的项目经理是棋子。他们会确保记录行动项，并让会议按时结束。


  如果你坐在一场会议上却无法识别出任何棋手，那就赶紧撤。这是在浪费你的时间。这类会议通常由那些喜欢听自己高谈阔论、但对组织/产品/其他事务毫无实际影响力的人召集。不幸的是，如果你是新加入一个团队，你需要被这些空谈者坑过几次，才能学会避开这些彻底无用的会议。当新人真是不容易。


  ## 会议脱身术技巧 #4：识别支持方和反对方


  议程识别的下一步现在开始，我们要审视棋手。这时你要弄清楚每个棋手相对于当前议题的立场。无论议题是什么，棋手都可分为两个子类：*支持方*和*反对方*。


  支持方是那些在当前议题上处于赢面的棋手。他们得到了想要的东西，没有动力去谈判。他们甚至不必到场，然而他们来了，并且似乎愿意听取反对方的意见，对吗？也许吧。也许他们只是来看反对方坐立不安的。


  反对方，显然，是那些被坑了的人。他们很可能就是最初大声疾呼、要求召开会议的人。反对方通常很容易辨认，因为他们表现出一定程度的愤怒。


  就像我们对棋手的要求一样，任何进展的实现都必须有支持方和反对方同时在场，否则你们只会没完没了地谈下去。可以肯定反对方会到场，因为他们是吵嚷的一方。如果你希望会议产生一些有用的成果，支持方也必须有人代表。具体的支持方本人不一定非要在场，但他们必须指定一个代理，否则反对方会抱怨，大家点头附和，但*什么*也办不成。


  让我们试着在假设的会议中识别支持方和反对方。


  在前面的例子中，显然是工程团队被要求去建造一款*根本不存在*的产品。他们很恼火，并召开这次会议来量化这种挫败感。你好，反对方。


  既然我们已经认定项目经理是棋子，我们只能假设产品经理是支持方。但是等等，你正在开会，她却听起来像个工程师。"那些该死的销售。他们到底在想什么？这是最后一次了，等等，等等……"她的话淹没在大家的各种怨气中，你又回到了原点，试图在这一团乱麻中弄清楚谁是谁。


  我们的产品经理突然看起来像个反对方。这是否意味着我认为你应该拉响警报赶紧撤离？不，你的产品经理就是支持方，没错；她只是足够精明，不让任何人知道而已。一个优秀的支持方常用的策略，就是不去承认自己是支持方。这意味着他们不必为任何冲突承担直接责任。真正的支持方，在这个例子中，就是那些谈成了这个绝妙但不可能交易的销售团队，他们不在会议室里，而是在外面跑业务，去谈*更多*无法实现的交易。产品经理正试图迷惑会议室里的工程师们，她说："嘿，这是个棘手的问题，是*他们*把*我们*置于此地的。*我们*该怎么办？"
  漂亮的偷梁换柱，不是吗？别担心。他们赚得比你少。


  舞台已经搭好。我们的棋子已被过滤掉；我们狡猾的支持方正在点头，用她假装的同情来安抚反对方；反对方在大声叫嚷；是的，你仍然在会议室里。


  信不信由你，最难的部分已经过去了。


  ## 会议脱身术技巧 #5：搞清楚议题


  如果你留心观察，你已经对谁是谁、他们在哪儿有了相当清晰的认识，所以现在你只需要弄清楚这些"谁"想要什么。棋子什么都不想要；他们只是很高兴被邀请。支持方在场是为了展示他们对议题的完全掌控。他们随时可以离开，而且越快越好。


  所以你坐在这里的原因，是反对方。他们想要什么？我确信，这个星球上的大多数会议之所以冗长低效，就是因为围坐在桌旁的人根本没弄清楚他们到底在和谁说话，以及他们想要什么。


  停下。你心里正想到一场会议，一场可怕的会议，议题如此复杂，以至于我认为我描述的简单识别方法根本用不上。错了。你直接跳到了解决议题的阶段，而这正是每个人搞砸的地方。谁在乎议题？在你想的那场可怕的会议里，你知道谁是关键人物吗？你有没有花时间去识别那些真正在意的人——那些能带来改变的人？如果没有，那你活该忍受会议中的每一分钟无用时间。


  ## 会议脱身术技巧 #6：给反对方他们想要的




  ## 所以没错，反对者确实想在这里得到些什么


  为了顺利脱身，你需要满足他们的需求，而这些需求其实很简单——简单到你会发笑。反对者需要的是一个计划，某种能保证或多或少解决当前问题的方案。无论这个计划来自小卒、玩家、专业人士还是反对者本人，都没有关系。总得有人把所有内容整合成建设性的后续步骤，并*向反对者传达清楚*，然后你就大功告成了，可以脱身了。


  这个计划不需要多么出色、真诚，甚至不需要完整。反对者不会让你离开会议，除非他们感觉到了进展。如果你安排了整整一小时，而时间已经到了，你会想：“好吧，总算有个脱身办法了。”
  再次强调，你错了，因为反对者会回到自己的座位上，安排后续会议，让组织上的无能继续下去。


  ## 会议脱身技巧 #7：搞清楚问题所在


  你很可能已经集齐了必要的玩家、专业人士和反对者，但话又说回来，你可能有太多人了。如果会议已经进行了 30 分钟，你还是搞不清楚问题是什么，那就该走了：问题太多了。需要某个比你更上心的人把这场混乱提炼成一个清晰的表述，这样专业人士和反对者才能就一件事进行争论。


  ## 结论


  会议永远都会效率低下，因为语言本身就是件难事。让同一个群体里、拥有相同“组织口音”的人彼此条理清晰地交流，已经够难的了。会议给了我们机会，把拥有其他“口音”的其他组织也拉进来。这让语言上的混乱彻底加剧。现在，你不在乎了。你不需要知道他们在说什么，因为通过识别会议议程，你能弄清楚他们是谁、他们想要什么，帮他们搞定，然后赶紧离开。


  '
- '# 章节：剖析指令


  在你的管理技能箭袋里，有几支强大的箭。有年度评估，你花时间详细解释某个员工需要做什么才能成长。这很关键。这可能会改变人生。这是一支大箭。那裁员呢？那是你被问及谁该留、谁该走的时候。当你不得不拉满那把弓时，你会失眠。


  然后是指令。所谓指令，就是你召集团队，平静地说：“事情就是这样。” 没有问答环节。没有协作。这是你从上而下下达的命令。


  大多数人已经学会了对指令深恶痛绝。


  回拨几年。我在上一家公司工作时，我们刚 hired 了一位我非常喜欢的新副总裁。这家伙很聪明，经验丰富，简历上有一长串知名公司，而且他还会讲笑话。成了，录用。


  头几周他很安静，观察着局势，参加各种会议，认真倾听。工程部当时正在讨论我们产品的一些颠覆性新方向，而渐进主义者（快点发布！）正在与完美主义者（做好了再发布！）激烈交锋。气氛紧张。互相指责、大喊大叫……这些都是商业活动中不该做的事，但当*你*
  *知道自己是对的*时，*感觉确实很好*。


  副总上任第二个月，我们还在争吵。然后，在我和副总的一次周三一对一谈话中，他简单地告诉我：“我们就这么做。讨论到此为止。”


  没错，我当然开始喋喋不休：“看，我们还得解决第 27 号问题，而且，完美主义者们肯定会气疯的，你有没有考虑过风险 12A？” 他让我说了一会儿，然后重复了他的话：“我们就这么做。讨论到此为止。”


  我可能点了点头，记不清了。


  正如所料，团队炸锅了。一位完美主义者向我们保证他要辞职。他摔门而去。渐进主义者们也不高兴，因为他们不喜欢被人指挥。他们喜欢主导局面。我们经历了整整一周的组织混乱，然后才重新开始工作。


  这位新副总裁运用了指令。他说：“我就是那个告诉你们事情就是这样的人。”


  指令有一条微妙的界限。它既可以表达“闭嘴，干活”，也可以表达“这就是对策，如果这是个糟糕的决定，我就是你们可以怪罪的人”，两者只在一线之间。作为经理，你的工作是在不伤害士气的前提下推动团队前进。


  指令分为三个不同的阶段：决定、传达和（再次）传达。既然你是这个特定事项的最终决策者，我们将此称为*本地指令*。这不同于我们稍后会讨论的*外来指令*。让我们开始吧。


  ## 决定


  你的第一步是决定何时使用指令，并且也要理解其后果是什么。你和你的团队在日常工作中会做出成千上万个小决定。这些决定中的大部分来了又去，没人会更聪明。每隔一段时间，就会有一个重大决定出现。内容是什么并不重要，重要的是团队中的一部分人站在决定的一边，而另一部分人站在另一边。而且他们在争论。


  协作、交叉授粉、辩论、争论。不管你管这个过程叫什么，它并非总是有效。有时团队两极分化严重，以至于他们开始混淆情绪和决策本身。他们不再争论事实，而是开始意气用事，这时候你就需要考虑指令了。经验法则：当辩论不再富有成效时，就该做决定了。


  我的管理风格是尽可能让团队争论下去。我采取协作式管理风格，因为我知道，投入越多的头脑和时间来审视一个想法，这个想法就会变得越强大。这意味着，在我管理的团队中，决策过程往往会比较慢，因为我忙着进行交叉授粉。相应地，我确信这意味着我们的产出质量更高，因为我们花了时间思考我们到底在做什么。


  请记住，团队中每有一个对决策有强烈意见的人，可能就有另外四个同事只希望有人能做出决定，好让他们回去工作。我们都曾做过沉默的大多数。那是你选择不参与激烈辩论的时候。也许是因为你在做实际工作，或者你只是不在乎。当你看到辩论在走廊里激烈进行，并意识到置身事外为你省下了多少痛苦、汗水和眼泪时，你会感激自己的沉默状态。当团队两周后还在喋喋不休时，你会开始想知道什么时候有人能让这些人闭嘴。


  指令是沉默的大多数的朋友。即使你真的惹恼了相关方，一旦你宣布了你的裁决，沉默的大多数也会感激这份安宁。


  ## 传达


  本章的目的不是为了解释如何针对你组织内的热点话题做出任何艰难的决定。我不知道具体话题是什么，所以你得靠自己了。我可以说，如果你在传达之前没有花时间考虑问题的双方立场，那么你的团队会知道，你的可信度也会受到质疑。那些处于失败一方的人会想为什么没有被征求意见，然后他们就会开始在走廊里游荡，嘀咕着你要么是懒惰，要么是暴君。这很伤人。




  ## 交付阶段的目标


  `Deliver`（交付）阶段的目标很明确。你需要向团队解释，决定已经做出。听起来很简单，对吧？但这里正是初级经理容易搞砸的地方。他们能把决定解释得很好，却未能传达出*这就是最终决定*，不再需要进一步辩论。一个糟糕的指令交付的标志是，交付过程演变成对问题的又一次辩论。交付指令需要勇气。团队离开房间时必须知道决定已经做出。他们不必喜欢，他们可能讨厌，但他们不能离开房间时还认为你的决定有回旋余地。


  同样，我协作式管理风格的另一个好处是，交付指令争议较小，因为我已经与所有有意见的人审查过各种决策方案。当指令落地时，感觉不像是在颁布条规，更像是在传达我们调查的结果。我仍然会惹怒那些不同意决定的人，但他们知道自己的意见被听取了。


  ## 再次交付


  恭喜。你已经交付了第一个指令，现在正面对满屋子点头同意的人。即使那些被你决定搞砸了的人也在点头。干得好！


  但还有更多工作要做。


  那些点头附和虽然能极大满足你的自尊心，但事实是，每个走出会议室的人都有三种截然不同的意见之一：


  - **支持：** 你是个出色的激励者。赢家会对你抱有这种看法，而你仍然需要（再次）交付。

  - **反对：** 你是个暴君。这通常是那些被搞砸了的人的看法。你必须（再次）交付。

  - **无感：** 你怎么花了这么长时间？这里是沉默的大多数。别为他们操心。


  `再次交付`阶段或许更适合称为“损害控制”，但这听起来好像你因为推动团队前进而搞砸了，而实际上你没有。或许。再次交付是指花时间向相关人员——无论是赢家还是输家——单独说明你的理由。这不仅让你有机会强化你的指令，也给了同事在非团队环境中回应的机会。期待更多的情绪宣泄吧。事实上，你应该坚持这样做。如果你和一个站在决定失利方的人坐在一起，而他们还在点头，*那意味着他们认为战斗还没结束*。他们正坐在那里琢磨下一步如何侵蚀你的指令。如果你没能让这个人敞开心扉，那么几周后你就得（再次）交付指令了。


  再次交付并不能消除团队中的不满，但能给所有相关人员一个发言的机会，这应该会推动你的管理声誉向激励者靠拢，远离暴君的形象。


  ## 外部指令


  到目前为止，我一直在讨论本地指令的来龙去脉。这些情况中你是决策者，这让你能接触到大量信息和所有相关方。在任何规模适中的组织中，你同样可能成为外部指令的接收方。这是一种在你的影响范围之外发生的指令。*我们有了全新的战略。准备好了吗。开始。*


  是的，形势逆转了。指令可能突然出现，而你对此无能为力。


  猜怎么着？前面提到的规则同样适用，只有一个例外。和你的团队一样，你对这个指令也会抱有三种意见之一（支持、反对或无感）。无论你持何种意见，都必须找出指令背后的理由。你可能对此抱有“无感”的意见，但你团队的其他成员呢？他们可能会讨厌这个指令，而如果你在传达指令时对为何出现这个指令一无所知，那你就会显得很无能。


  问题在于——指令的理由在大组织中往往难以有效传达。要么是你管理层级中的某个人对这个指令反应“无感”，懒得去收集理由；要么是消息传着传着就把理由扭曲得毫无意义了。无论哪种情况，你都要在毫无理由的情况下向团队传达这个消息。这很糟糕。我敢肯定，那些表现出这种糟糕沟通结构的公司，正是那些以
  CEO 臭名昭著地专横而闻名的公司。也许他们不是暴君，也许他们身边都是不善沟通的人。又或许他们就是暴君。我坐在自己的位置上无从判断。


  好消息是，如果你不得不在没有事实依据的情况下交付指令，你就不太可能犯下新手错误，即在没有理由……没有论证的情况下强推你的本地指令。你也不会忘记（再次）交付，因为你知道，每次你站在团队面前，试图做一个领导者时，他们都在看着你、听着你。他们想知道你是否配得上经理这个头衔。


  '
- '# 章节：信息饥渴


  有个人站在你办公室外面，一言不发。


  这是一种抓狂的表现，但此刻他只是站在那儿。或者也许不是站着。他可能在使用“徘徊法”——每隔几分钟就来回走一趟。也可能是“长凝视法”，他就站在外面死死地盯着。我最喜欢的是“雪崩法”，当你从屏幕前抬起头，只有几秒钟时间做好准备，然后一堆沮丧的情绪就会涌进你的办公室。


  你给这些抓狂行为起什么名字并不重要。关键是要弄清楚，作为经理，你本该如何避免它们。这很可能与信息匮乏有关。


  ## 信息管道


  作为经理，你的众多职责之一就是充当信息管道，规则看似简单：对于你看到的每条信息，你必须正确判断团队中谁需要这条信息来完成工作。


  很简单，对吧？一封邮件来了，你读完，觉得得转发给你的某个开发人员。于是你转发了。问题来了：信息比你想象的要多得多；需要信息的人也比你预期的多；你对谁需要信息的判断常常会出错；而且你还有一大堆其他重要的事要做。


  首先，我们来关注信息管理不善的后果，因为这样才能引起你的注意。


  一个不那么普通的工作日。走廊里流传着裁员的谣言，而且谣言是真的。现在，你办公室外出现了一个“长凝视者”，当然，你做的第一件事就是请她进来，以便解决“长凝视者”的问题。


  “为什么长凝视？”


  “什么？”


  [否认。]


  “你在我办公室外站了两分钟，盯着我看。”


  “我有吗？”


  [哇，完全否认。]


  “那么，怎么了？”


  “呃，我会被解雇吗？”


  现在，这可是你最好的开发人员。她是你的明星员工。她是那个你抛出一个最模糊的想法，她就能把那些手势比划变成功能、变成产品的人。她已经做到了*五次*，而现在她却在你的办公室里担心自己是否要被解雇。


  发生了什么？你最重要的一位工程师怎么会认为自己如此无足轻重，以至于可能被解雇？


  她对信息感到饥渴，而在缺乏信息的情况下，人们会自己编造信息。


  ### 自然厌恶真空


  回想你上次经历裁员。发生了什么？首先，你听到“裁员要来了”的谣言，结果证明这不是谣言，并且那是你在接下来三周里听到的最后一个事实。


  你看，管理团队花了这三周时间试图弄清楚接下来会发生什么，以及谁会被裁。但他们当时实际上还不知道，所以什么也没说，而这恰恰就是最错误的做法。




  '
- '# 管理信息流与团队沟通


  其他人都在猜测自己是否还有工作，而在缺乏信息的情况下，他们就开始编造各种离谱的谣言。


  这就是谣言工厂，也就是小道消息传播的途径，它的存在与你作为管理者的沟通能力直接相关。


  信息的创造，是在没有背景和依据时，人为构建出某种语境和基础的行为。你可以称之为谣言或八卦，但它本质上是对沟通失败的一种反应。当我听到一个匪夷所思的八卦时，我会关注两件事。第一，它到底在说什么；第二，这个荒诞的编造填补了人们认知中的什么信息空白。


  回到那位以为自己要被解雇的"摇滚明星"员工。既然我知道她绝不可能被解雇，那我听到了什么？首先，我听到的是"我不知道自己在组织中的位置"。她并非真的认为自己会被解雇——而是她不明白自己的价值。其次，我听到的是"既然我不知道自己的价值，那我就编造一个疯狂的后果，虽然这不太可能发生，但至少能引起别人的注意。"


  八卦、谣言，无论以何种形式出现，都意味着你组织中的某个人正在寻求帮助。


  ## 防止信息饥荒


  你需要对这位"摇滚明星"员工进行危机处理。你需要和她坐下来，提醒她五次她是如何在你模糊的指示下创造出优秀产品的。你需要多次跟进，确保她知道自己的价值。但更重要的是，你需要弄清楚她最初是如何陷入信息饥荒的。


  好吧，这一切始于你没有传达信息，这一点我们很清楚，但问题是：为什么？以下是一些常见的失败原因。


  ### *"别担心，我会记得转达的。"*


  关键信息丢失的最大原因，可能就是管理者把大脑当成待办事项清单。这是新手管理者常犯的错误，他们还没学会如何做好信息传递的"管道"。他们在会议上听到一个需要转达给某位工程师的任务，心想："记住了，得提醒鲍勃，除非
  X 发生，否则菲尔会搞砸构建。我能记住。"


  如果这是清单上唯一的事项，这位管理者还能应付，但问题是他还有四个会议和十件其他待办事项要记住，直到他在走廊里遇到鲍勃时才想起来："菲尔……什么来着。"


  把它写下来。随身带个笔记本，任何听起来有点意思的东西都记下来。这就引出了下一点……


  ### *"我觉得没人需要知道那个。"*


  比尔是我团队里的一位新任管理者，他刚刚能参加员工会议，感到很高兴。我的员工会议分为两部分。第一部分是传达我从上级会议中获得的所有信息，并加入我自己的想法和意见。第二部分是团队成员的快速状态更新和相关内容。


  第一部分中有很多冗余信息。产品表现如何，谁得到了晋升，最近有哪些客户成功案例。如果你每周都听，肯定会觉得无聊，但我每周都会重复同样的内容。


  比尔很快就觉得无聊了，在第一部分时停止了做笔记。当我问他时，他说："我觉得我的团队不会关心那些他们不负责的产品的客户成功案例。"


  "真的吗？你为什么不问问他们？"


  接下来的一周，比尔疯狂地做着笔记。他的评论是："没错，他们想知道所有信息。"


  尤其是在较大的组织中，你需要特别注意保持组织信息的持续流动。你可能觉得自己在传递无用的信息，但经验法则是：你永远不知道你的团队会关心什么。我有一位工程师，忠实地记录着每一个新客户的信息，几个月后，他对客户群的了解比大多数销售人员还要深入。


  我明白，转达你接触到的每一条信息可能是一项全职工作，而作为管理者，你的职责之一就是判断哪些信息需要传递。我的经验法则是：如果我犹豫超过几秒钟是否要传递某条信息，那我可能就没有资格做这个决定，所以还是传递出去，看看会发生什么。


  ### *"我的员工能读懂我的心思。"*


  也许你在信息传递方面做得不错。你召开了内容丰富的员工会议，并且持续转发邮件。这很棒。我很高兴你传递了所有信息，但问题是："你的员工听到了什么？"


  创业公司的上一位副总裁在转发每封邮件方面做得"出色"，他收件箱里的每一封邮件都转发。每一封邮件。能参与副总裁的所有沟通当然很好，但这几乎成了垃圾邮件。更糟糕的是，他在每封邮件开头都加上了一些简短而晦涩的评论。


  "有意思。"

  "我们应该做。"

  "哈！早告诉过你！"


  大多数时候，我都能根据最近的对话推测出他那些只言片语的含义，但有时我完全不知道该怎么处理某封邮件。


  仅仅因为一封邮件或一个想法在你脑海中是清晰的、有趣的，并不意味着其他人也能一眼看出其中的深意。让团队紧密协作、共享思维是我的一个目标，但花点时间为每条你传递的信息添加一些个人背景，绝无坏处。这需要时间，但能保证信息的质量，同时防止信息在缓慢传递中变得混乱。


  好消息是，如果你想知道你的团队在接收到信息后听到了什么或读懂了什么，你可以问我最喜欢的一个跟进问题："你刚才听到了什么？"


  ## 积极的沉默


  有组织地传播信息是让团队与组织其他部分保持联系的第一步，但你仍然会犯错。无论是前面提到的失败原因，还是完全不同的其他问题，你的职责是不断评估团队的需求。而我有一个非常好的消息。


  你的团队会告诉你他们需要什么。无论是通过八卦、谣言、凝视、踱步还是喊叫，你的团队总是在告诉你他们需要知道什么。这意味着你的职责不仅仅是充当信息管道，还要采用一种"积极的沉默"策略。


  在我的员工会议上，我会偶尔插入一段长时间的停顿。也许我刚说了一些有争议的话，却没有收到任何反对意见。也许我知道在座的某个人正对我们最近的讨论感到恼火。所以我等待。我用沉默填满整个房间。


  在这种令人不安的安静中，如果他们正想说点什么，他们就会说出来。试试看：闭上嘴，看看当你不说话时，你的团队会说什么。


  ## 微妙、诡计与沉默


  管理者、准管理者，以及想要理解管理者的人，只需要读一读罗伯特·格林和朱斯特·艾尔弗斯合著的《权力的 48 条法则》。


  我故意没有对这本书做任何背景调查，因为我最初读到这份清单时的反应非常深刻，我想保留那种感觉。书中记载了一些相当邪恶的手段，也揭示了一些管理者日常行为的基本真相。起初我分不清作者写下"让他人处于持续的恐惧中：培养一种不可预测的氛围"之类的内容时是认真的吗，但读了几遍之后，是的，我认为他们是认真的。


  我对这份清单以及它与管理者的关系感到的问题是，其中许多"法则"涉及对你所领导的人的心理折磨，这在我看来是加剧人们对管理者的强烈负面反应的好方法："那个家伙是个权欲熏心的混蛋。"


  尽管如此。




  '
- '# 管理之道：微妙、巧计与沉默


  管理的一部分在于如何在错综复杂的“政治丛林”中摸索前行。这关乎如何让团队成员心甘情愿地朝着一个不太舒适的方向转变。一位优秀的管理者会遵循策略行事，而不仅仅是整天疲于奔命地到处“救火”。


  管理如同下棋。当你面对一个问题时，有时需要后退一步，纵观全局，思考每一步棋的后果，最重要的是，做出选择。根据我的经验，如何选择这一步棋，并不需要遵循什么“48
  条法则”，而只需记住三个词：微妙、巧计和沉默。


  ## 微妙


  我刚刚给一名员工做了一次令人痛苦的绩效评估，但他似乎完全没领会。我花了整整两周撰写这份评估：收集同事反馈中的不同视角，重新阅读过去一年相关的电子邮件，然后一遍又一遍地修改、再修改。这绝对是最糟糕的绩效评估。可他却坐在那里，仿佛一切都很好。


  我并非要解雇这个人，但以他目前的发展轨迹来看，两年后他就会被边缘化。我想防患于未然，但得到的却是一片死寂。


  “对你的评估有什么问题吗？”


  “没有。”


  “你清楚我希望与你共同改进的方面吗？”


  “清楚。”


  然而，绩效评估的重点并非评估本身，而是由此引发的对话。其意义在于，建设性地传达关于同事表现的信息，然后一起消化讨论。你希望看到对方处理你刚刚提供的信息；你希望看到他们提出疑问。


  但这个人什么都没给我。


  好吧，也许绩效评估并不是纠正方向的合适场合。或许我需要采用更微妙的方法。一周后，在我们的一对一会议上，我准备了一份清单。上面列出了我为这位仁兄准备的每一个讨论要点，这些要点都重新表述过，以支撑我在绩效评估中指出需要改进的领域。


  这位员工无法接受我在评估中概括的那些战略性大方向，但当我小心翼翼地将评估内容映射到我们日常的战术工作中时，他开始倾听了。到一对一会议结束时，我给他布置了堆积如山的待办事项，以至于我们实际上又回到了关于绩效评估的讨论——因为正是那些建议，才能帮助他完成这些工作。


  微妙始于谦逊。作为管理者，展示你的权力和知识并不总是最佳的沟通方式。有时你的方法需要从小处着手，保持谦逊，并承认你并非无所不知。我知道，快速做出决定并向团队展示你是负责人感觉很棒，但那是正确的决定，还是仅仅出于自负？


  微妙止于优雅。它不仅仅意味着成功解决你面临的任何棘手问题，更在于你以一种巧妙、新颖的方式解决问题，从而构建和提升你的管理能力。


  ## 巧计


  跟我念：“巧-计（qiǎo-jì）”。这词念起来真带劲，我们甚至该把它印在 T 恤上。但它是什么意思呢？`Subterfuge` 的意思是“阴谋、奸诈、欺骗、欺诈、不诚实、作弊、口是心非、诡计、狡猾、狡诈、诡辩、伪装、骗局、诈骗”。这些同义词涵盖范围很广，但为了本文的目的，我们将其精炼一下。


  相对于管理而言，“巧计”并不意味“欺骗、不诚实、作弊、骗局或诈骗”。而是指除此之外的其他所有含义。我来解释一下。


  当时我们创业公司正处在十字路口。事情太多，团队又朝着两个截然不同的方向前进。一方面是基础设施团队，他们想花三个月时间替换应用服务器；另一方面是交互体验团队，他们想改进应用程序的可用性。副总裁听取了双方意见后决定：“基础设施！追求长期可扩展性！”


  交互团队气坏了。他们的回应是：“如果没人想用产品，谁在乎长期可扩展性？”哦，对了——我也是交互团队的经理，我赞同他们的想法，但我不得不让我的工程师们去处理基础设施的工作，因为我们人手不够。我与现有客户交谈过，他们并非因为应用程序反应慢而烦恼，而是因为它的交互体验简直是场噩梦。他们大部分时间都花在试图弄懂这个该死的东西上。


  *啊啊啊啊啊啊啊。*


  首席交互设计师、一位工程师和我坐在会议室里，沉默地生着闷气。这时我灵光一闪：“嘿，人类是视觉动物。做一个能展示我们想法的原型需要多长时间？”


  我的工程师回答：“一周！”（这里需要指出，热情会让所有工程预估时间减少三分之一。）他接着说，“但我需要弗兰克帮忙。”


  嗯……


  “我们这样安排。我想让你和弗兰克在下午 5 点之后，完成基础设施工作之后，再来做这个。并且我要你们保持低调。如果一周后，我们对成果满意，就公开它。”


  这就是巧计的难点所在。取决于你所处的位置，我的计划可能会被以多种方式解读。另一位工程主管可能会称之为“违抗直接命令”，而我的老板，在两天后风闻此事，却称之为“臭鼬工厂项目”，并让我们继续推进。呼，好险。


  我们的“臭鼬工厂”项目最终花了三周，而不是一周。但当我们展示成果时，工程副总裁和市场副总裁都印象深刻，希望我们完成这项工作。他们没有牺牲基础设施的投入，反而给了我两个招聘名额，让我可以组建一个团队来把这件事做好。


  使用巧计是一种冒险。那之后，那位基础设施主管再也不怎么信任我了，尽管在项目公开后，我仍然特意让他了解进度。


  善用巧计意味着保持意图的诚实。如果你为了做你认为正确的事而采取“突击行动”，这不代表没人会生气，但至少能让你晚上睡得着觉。


  ## 沉默


  你最烦人的员工坐在桌子对面，正在滔滔不绝。这个人的个性与你完全、彻底地不合，他已经就某个你完全不懂的话题絮叨了快两个小时。我的建议很简单：


  闭上嘴，听他说。


  我是认真的。


  现在，如果你已经明白他想表达什么，却还任由他继续喋喋不休，那好吧，你可以开始说话，引导他转向其他话题。但如果他正在努力地试图切入正题，你必须闭上嘴，认真倾听。你的沉默给了他一个机会把话讲出来。


  我不喜欢公开演讲。在全员大会上，要我介绍接下来六个月的工作计划，我会感到不自在。我的天性更偏向内省，喜欢静静观察世界。这项技能让我受益匪浅，因为太多人就是闭不上嘴。在大家高谈阔论的时候，我会安静地坐着，一边点头，一边了解这些喋喋不休的人到底在说什么，并小心翼翼地记在心里，以备将来参考。


  管理者要发挥领导作用，很多管理者将其理解为“管理者通过说话来领导”。再加上员工们倾向于不对这些管理者说“不”，你就明白为什么我们中有那么多人变成了职业“话痨”。我们以为用想法填满空气就是在引导你。说话当然有它的时间和场合，但要用有实质内容的话填满空气，你必须先收集和处理信息。


  在沉默中，你可以做出评估。


  我最喜欢在大型跨职能会议上运用沉默。参加者是我从未合作过的团队，而我的角色仅仅是一个倾听者。整桌都是我不认识的人，但我感觉就像坐在最赚钱的扑克牌桌上，因为每个人都会向你亮出自己的底牌。




