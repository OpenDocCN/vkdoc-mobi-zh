- '# 拿下电话面试


  正如我们在上一章中所发现的，当电话铃声响起，招聘人员想要安排一次电话面试时，这几乎算是一个奇迹。事实是，组织中的某个人（在某处）成功地将你与一个空缺职位匹配上了。这意义重大，因为根据我的经验，你获得这份工作的机会已经呈对数级增长。不是五五开，但比你作为一份随机简历放在我桌上时要好得多。


  与上一章一样，我将带你了解我作为电话面试官时所经历的精确思维过程；但在此之前，我们先谈谈动机。


  ## 目的


  我手上有一个职位需求（requisition，简称 req）。这大致描述了我的团队中一个空缺职位，但很可能不精确。职位描述通常宽泛而模糊，因为我想尽可能广撒网。我不仅要看到尽可能多的候选人，还想看到尽可能广泛的技能组合。


  当你在筛选工作机会时，记住这一点很重要。我知道你正在焦虑：“职位描述要求五年 Java 经验，而我只有两年。”别犯傻了。职位描述中通常有两类技能：**必需**和**推荐**。你至少应该在“必需”技能方面差不多符合要求，但别把“推荐”技能当回事。那是推荐的，有当然好。


  此外，你既然接到了我的电话面试，我已经基本确定你大致符合要求，但我仍有疑问，否则我早就直接邀请你来面试了。问题是，我有什么疑问？猜猜看——你的任务就是弄清楚这一点。


  ## 你的任务是做好准备


  在你和我交谈之前，你就在执行一项搜集事实的任务。你有一份职位描述，在电话面试安排好之后，你还有了我的名字。你可能对这个工作的相关产品或技术有所了解，也可能没有，但即使没有产品名称，你也有足够的信息可以开始准备了。


  做好你的调研。用谷歌搜索我。尽可能了解关于我做什么以及我关心什么的一切。这不是跟踪——这是你的事业。如果我碰巧是一位写博客的工程经理，那么你就可以开始了解我的思维方式。也许我没有博客，但我在邮件列表里发帖。那也是信息。这会在电话面试中如何帮助你？嗯，我不知道你会找到什么，但你能收集到的任何信息都会开始为你对这个一无所知的工作构建背景。这也有助于缓解紧张情绪。你看，我手上有你的简历，而你一无所有。一点点的调研就能平衡信息博弈的场地。


  如果你知道产品名称或技术，重复同样的过程。这个产品是什么？卖得好吗？其他人怎么评价它？我说的不是一个周末的调研，而是大约一小时的背景研究，这样当电话面试开始时你就能做一件事：提出高质量的问题。


  没错。在你的调研中，你要找到几个引人入胜的问题，因为在电话面试中的某个时刻，我会问你：“你有什么问题要问我吗？”这是我即将问出的最重要的问题。


  ## 回到开头


  在问你最重要的问题之前，我需要弄清楚几件事。首先，在理想世界里，我们本可以跳过电话面试，直接邀请你进入第一轮面试，但这很少发生，除非我本来就认识你。我需要知道的是：




  *我们能沟通吗？* 我打算从一个简单且让人放松的话题开始。可能是谈论天气，或者是我从你课外活动中了解到的某个事情。“你真的冲浪吗？我也是！你在哪儿冲浪？”这些客套话看似微不足道，但对我来说却很重要，因为我想看看我们是否能沟通。如果我们对话的节奏有点尴尬，那远不是致命问题，我会去适应，但问题有多严重呢？我们聊了五分钟，却还没说出什么实质内容吗？好吧，那我们可能有问题了。


  *几个澄清性的轻松问题。* 我接下来的问题将开始聚焦于你的简历给我留下的任何疑问。我不知道自己会问什么，因为每个简历都不一样，所以我的想法是，你应该把简历放在面前，因为它也摆在我面前。这是我唯一的素材来源。


  无论这些后续问题是什么，我仍在摸索我们如何进行沟通。这意味着你需要专注于回答问题。这听起来很蠢，但如果你不完全清楚我在问什么，最好尽早澄清，而不是让我在你的回答进行到五分钟时打断说：“呃，那不是我问的。”


  你看，你我仍在相互调谐。五分钟过去了，如果我们仍然无法适应彼此不同的沟通风格，我就会开始在内心举起黄旗。沟通不需要多么雄辩，但我们至少应该取得进展。


  *你的故事是什么？* 我们已过了面试中轻松提问的阶段，现在我要问一个难题了。这不是脑筋急转弯，也不是技术问题，而是一个旨在给你机会讲述故事的问题。我想看看你如何通过电话，向一个你不认识也看不见的人，解释一个复杂的想法。


  再说一次，谁知道具体问题会是什么呢？但当你面对那个明显、痛苦地开放性的问题时，你需要做好准备。我找的不是那种快速、简洁的答案；我在找一个故事，一个能让我更多地了解你如何沟通、如何思考的故事。我知道，成为一名出色的沟通者并不是大多数工程岗位的要求。我不期望你有莎士比亚的文采，但我期望你能自信地谈论这个问题，因为这个问题是从你的简历里发现的——那是我们目前唯一共有的信息。如果我们不能就此进行一场有智慧的讨论，我就会开始怀疑我们在其他方面是否也无法有效沟通。


  *轮到你了：展示你的本事。* 电话筛选进行到 20 分钟时，我会把主动权交给你，问：“你有什么问题要问我吗？”


  当我告诉朋友们这是我最喜欢的问题时，通常的反应是：“所以，你很懒，对吧？你想不出还有什么可问的，所以你就选了阻力最小的那条路。”确实如此。对我来说，这是个很容易问出口的问题，但它至关重要，因为我不雇佣那些对自己所做的事情缺乏投入的人。如果你没有准备好一连串问题来问我，我听到的只有：*你不想要这份工作。*


  一个深思熟虑的问题能向我展示，你一直在思考这份工作。它表明，在这次 30 分钟的谈话之外，你已经在为得到它而思考。是的，你可能能即兴发挥，根据过去 20 分钟的谈话问出一些有趣的东西，但如果你能基于电话筛选之外的调研提出一个问题，那给我留下的印象抵得上众多黄旗警告。它显示出主动性和兴趣。


  ## 结尾


  然后，我们就结束了。时间过得很快，但问题是：“进行得怎么样？”这里有一个心理清单，可以帮你评估自己的表现：


  **漫长而尴尬的停顿。** 我们是不是在费力地维持话题？有没有长时间的沉默？嗯，那说明我们调谐得不好。再说一次，这不是致命问题，但绝对是一个减分项。


  **对抗性互动。** 当我们意见不同时发生了什么？我们是协商解决，还是开始针锋相对？这在电话筛选中发生的次数比我预期的要多，而且这不总是一件坏事。我对你只挑我爱听的说没有兴趣，但如果我们立场相左，我们如何处理？如果一个候选人在
  30 分钟的电话筛选中就愿意挑起争执，我会想，一旦他进入公司，他会有多频繁地与别人争执。


  **感觉如何？** 这是最难量化的，但也是最重要的。我们之间有默契吗？对话顺畅吗？我们双方都学到了东西吗？理想情况下，我大致能代表我所招聘团队的文化，所以如果这
  30 分钟过得很痛苦，我会想，雇佣你可能会给团队带来什么样的痛苦。


  **具体的下一步行动。** 我是如何结束谈话的？我是不是给了你一些敷衍之词，比如“我们仍在面试其他候选人，下周之内会通知你”？嗯，那也还行，但你真正想要的是一个具体的后续步骤，比如“我打算让你进入下一轮”，或者“让你和团队更多成员聊聊”。一个立即可行的下一步行动，是电话筛选成功的最佳标志。如果我在结束对话时没有给出这个，你可以主动询问。如果我推脱了，那就说明有问题。


  和你的简历一样，电话筛选的目标是说服一个人继续推进你的招聘流程。投递简历时，你将自己的希望发送到一个匿名的招聘邮箱。而通过电话筛选，你有了主动权。你不需要担心那
  30 分钟，你需要担心的是你该如何准备。


  电话筛选是你第一次以个人身份代表自己，而不是我桌上的一份简历。虽然只是一瞥，但这是你第一次能主动参与到这个过程中来。


  '
- '# 章节：你的辞职检查清单


  Borland 在走下坡路。我在三轮裁员中幸存下来，主要是因为我的项目仍在产生可观的收入，但在参加的每次会议中，每个人都在不停使用 *如果* 这个词。


  “嗯，*如果*我们拿到资金，我们就能做这个。”

  “*如果*保罗留下来，我们就可以保留这个功能。”

  “鉴于我们不知道的情况，我*不知道*这是不是个好主意。”


  *如果*——到处都是。*如果*代表着不确定性。*如果*代表着恐惧。如果没有这些 *如果*，我就能专注于工作，但我做不到，因为没人确定接下来会发生什么。


  当我最终收到一家位于红杉城的数据库公司的录用通知时，我短暂地欣喜若狂。新公司资金雄厚，前景光明，而且明显没有那么多 *如果*。但当我意识到自己完全不知道该如何辞职时，这份喜悦很快就消散了。我知道通常需要提前两周通知，所以当这两周期限来临，我走进老板的办公室，递上简短的辞职信，说道：“我找到了另一份工作；我很喜欢这里，但现在是时候离开了。”


  老板：“听到这个很遗憾。如果我能做些改变，你会留下来吗？”

  我：“我对你的 *如果* 有意见。”

  老板：“我理解。好吧，你负责导入/导出引擎的功能。你有可能在走之前把它完成吗？”

  我：[毫不犹豫地] *“当然可以。”*


  一些数据。导入/导出引擎我还有四周的工作量，那可是工程周，这意味着实际上内部有六周的工作量。第一周我英勇地拼命工作，但到第二周就开始不在乎了。到了周四，很明显我连三分之一的工作都不可能完成。


  我为什么要承诺一件不可能完成的任务？我违反了辞职检查清单的第一条规则。


  ### 规则#1：不要承诺你做不到的事




  ## 辞职的七个规则


  如果你正在辞职，你会忍不住在 deliverables 上过度承诺，因为你即将离开。这是你的内疚在作祟。你对辞职感到内疚，并试图弥补你将关心的人置于困境的事实。你需要记住，无论你多么努力，在你的最后几天里，你都会变得毫无用处。


  这被称为“短期离职综合症”，它从你辞职的那一刻开始。从那一刻起，你就已经离开了。你还有两周时间，但你人已不在。你已经在脑海中开始想象你的新工作，当你执行旧工作的流程时，这只是一系列毫无意义的、不令人满足的重复动作。


  不幸的是，当你的老板要求你完成那个关键功能时，你的“短期离职综合症”还不够强烈。恭喜你有道德勇气对离职感到内疚，但请理解，当你同意做无法完成的工作时，你就是在损害自己的声誉。


  ### 规则 #2：尊重你的人脉


  你至少需要确保有三个人知道你希望与他们保持联系。我不知道这些人是谁，因为我不认识你，也不知道你做什么，但我知道，如果你不谨慎处理这次过渡，你将会失去他们。如果你想找到识别这些人的方法，那就看看你的午餐伙伴。选择那些你关心他们会议的人。如果你的收件箱里有一个*专门为这个人*的文件夹，你会想确保他们知道你在乎他们。


  无论你处于职业生涯的哪个阶段，你都需要持续发展你的人脉网络，因为这三人中的某一个很可能会在你未来的就业或机会中提供帮助。我在高科技领域已经工作了近二十年，我的每一份工作都直接或间接地源于认识之前工作的人。你会听到这样一句话：“这是一个小山谷。”世界很小。


  你需要特意去实现这一点，但这只需要一个小举动。一个简短的一对一时刻，让你承认这个人是重要的。这比你最后一天匆匆说声“再见”要多，比在走廊里含泪拥抱要少。


  ### 规则 #3：更新“核心团队”


  我的 `Dropbox` 里有一个名为“核心团队”的文档。那是一个名单，列出了过去 20 年里与我共事过、如果我要创办一家初创公司会雇佣的每一个人。名单上有一些我过去十年都没能联系上的人，但当创业时刻来临时，我会花时间去找到他们，因为他们上了名单。每次我辞掉一份工作，我都会花一个小时来更新这份名单，因为总有一些人我想要留住。


  规则 #2 和 #3 的名单很可能有交集，但它们是不同的任务。那些你需要主动保持联系的人，不一定是你未来要围绕其组建公司的人。


  不过，与规则 #2 一样，对你新的“核心团队”成员做出一个小举动至关重要。记住，你是那个要离开、要改变的人，所以营造最终印象是你的责任。


  ### 规则 #4：不要进行廉价攻击


  如果你不是在最理想的情况下离开，你会忍不住发一封措辞尖刻的电子邮件来“拨乱反正”。这在很多层面上都是愚蠢的。它会否定你在公司期间所做的任何积极工作。你也会损害你的人脉，因为每个人（包括那些知道你不是疯子的人）都会记住你，认为你是个在邮件里发狂、连拼写检查都懒得做的怪人。


  记住，你要离开了，而你认为是有问题的人会留下来。这不再是你的事了，不要浪费你的精力。


  我们曾经在一家初创公司有一个评级为 B– 的 QA 工程师，他错过了晋升机会，决定以“潇洒”的方式离开。在他工作的最后一天，他发了一封语法错乱的电子邮件，逐个部门地抨击了整个组织。他语无伦次的长篇大论被贴在隔板墙上供人取乐，没有人知道他实际上写过不错的测试计划。


  ### 规则 #5：善待为你工作和与你共事的人


  如果你是管理者，之前的规则对你来说要三倍地适用。你不允许成为可怕的“短期离职综合症”的牺牲品，因为你扮演着领导者的角色，并且在走出大门之前，你一直代表着公司。如果这对你来说没有意义，那么很可能你一开始就不该是管理者。


  我对这条规则的做法代价高昂。我会在最后两周内为我所有的直接下属提供一份书面评价。无论我们处于评价周期的哪个阶段，我都会花时间给每个为我工作的人做一次“温度检查”。是的，写一份好的评价是痛苦且耗时的，是的，我和其他人一样会得“短期离职综合症”，但这个小小的举动是向这些同事说明他们对你的意义的最佳方式。


  ### 规则 #6：不要自愿在离职后继续工作（或者，如果你要做，确保得到一大笔钱）


  这是内疚感问题的一个变种。这是你在辞职前两周坐在沙发上，用铅笔敲着牙齿，想象着当你的老板意识到他的得力干将要离开时脸上表情的结果。


  你喜欢他。你有责任感。你不想让任何人陷入困境。是的，当然，你可以利用业余时间完成最后三个项目。


  停下来。


  有一些非常好的理由可以让你继续帮助前公司，如果你选择这样做，我强烈建议你向前雇主索要高价，因为这份额外工作来得正是时候——最糟糕的时候——当你开始新工作时。一份工作的最初几周非常宝贵。它们提供了你新职业生涯的基本经验，而你只能听到一次。而你在做什么？把晚上的时间花在以前工作的事情上，而你应该做的是消化新工作的经验教训。


  你总是会后悔同意在离职后继续工作。


  ### 规则 #7：不要给太多通知时间


  这是我们最后一个内疚感的变种。更多的敲牙齿时间，为你将离开的团队如何支持他们而烦恼。也许如果你给他们更多时间来适应一个没有你的世界，对每个人来说都会更容易。


  再次强调，你错了。


  基本事实是：你已经选择离开，你将要离开。给出过长的通知时间，对你和你的团队来说都是一种职业上的残酷和不寻常的惩罚，因为它延长了组织因你离职而产生的压力，同时阻止了你的团队做某件至关重要的事情：继续前进。


  你的担忧在于你的缺席所造成的空缺。这也将是你的团队所担忧的，但担忧不是解决方案。只要你还在那里忙碌地存在，你的团队就不相信你要离开。他们不会对你的缺席做出反应，直到某个周一早上，他们走过你空荡荡的办公室，感受到你的缺席。靠，他已经走了。


  ## 他们知道


  我在 `Borland` 的最后一个星期五很早就到了。我让自己相信，早上 5 点开始工作，会是对我承诺的工作进行最后一次戏剧性的努力。等到我的告别午餐来临时，我成功地启动了电脑，盯着屏幕看了一个小时，然后收拾好了我的箱子。


  当下午 5 点到来时，我关闭了电脑，拖着脚步走进老板的办公室。“嗯，所以，我没怎么完成导入/导出的工作。”


  他的评论是：“是的，没人认为你能做到。”




  '
- '# 技术词汇表


  传统上，词汇表用于澄清书中的术语。事实上，我并未在本书中使用以下许多术语，但你仍然需要了解它们。


  无论你是经理还是为经理工作，总有人会用这些词语来迷惑你。他们会毫无预兆地在会议室中央抛出这些词，作为一种权力游戏，以此表明他们掌控着对话。也有某些人抛出这些词并装作自己明白其含义，以达到同样的效果。


  抵御这些词语的唯一武器就是知识。


  **1.0 版本** —— 你将要开发的最困难的产品。


  **360 度评估** —— 从你的同事那里收集的反馈，应该包含在你的`Focal Review`中。花时间提供建设性的反馈会增加你不与蠢人共事的可能性。


  **行动事项** —— 你应该记下来的事情。未能跟进`Action Items`会导致你的信誉逐渐受损。


  **行政助理** —— 作为经理的你最好的朋友。行政人员深谙公司内部运作，在完成任务方面常常能创造奇迹。他们也通常与内部消息渠道有联系。也有高管级别的这类人员。


  **议程** —— 任何会议必须完成的事项。如果会议的所有参与者都不了解`Agenda`，时间就会被浪费。


  **全员大会** —— 全公司范围的会议，通常由`CEO`主持。如果你是一名经理，而这类会议上出现了很多意外情况，你可能已经与一线脱节了。人们常常觉得不得不在`All-Hands`会议上提出一些非常愚蠢的问题。


  **安卓** —— 谷歌的移动操作系统，使用沙漠名称作为版本号。


  **苹果** —— 史蒂夫·乔布斯建立的王国。按市值计算，它是地球上最有价值的公司，但他们更希望你把他们看作出身草根的小公司，而不是庞然大物。


  **架构师** —— 了解自己工作的工程师。如果一位`Architect`说了些看似疯狂的话，值得追问几个问题，因为他们通常比你聪明。


  **自由雇佣** —— 法律定义，指雇主和雇员都是“随意”雇佣的，这意味着他们可以随时解雇或辞职。他们甚至不需要给出理由。


  **自动化** —— `QA`的流行词，用于描述可以通过编程完成的测试。`Automation`总是被鼓吹为节省时间的方法……但它通常是个时间陷阱。


  **背景调查** —— 雇主在雇佣前进行的检查，用于确定你是否是一名连环杀手。


  **测试版** —— 开发过程中的一个里程碑，传统上紧随`Alpha`之后。过去这通常意味着产品可供特定客户群体使用——这些客户愿意忍受产品运行不完美。现在没人确定`Beta`意味着什么了。


  **领头羊** —— 你信任的核心面试官群体。


  **董事会** —— CEO 的老板。他们可以解雇 CEO。他们倾向于制定广泛的公司政策，并拥有惊人的隐形能力。


  **奖金** —— 意想不到的现金。如果你不是每年左右都能拿到一次`Bonus`，那你肯定做错了什么。你的老板应该能解释你需要改进什么。


  **缺陷** —— 工程师的编码错误，通常由 QA 发现。`Bugs`在产品周期后期是造成重大紧张局势的根源。


  **构建版本** —— 用于测试的产品内部版本。


  **候选人** —— 已经进入公司面试流程的求职者。


  **洞穴** —— 极客进入心流状态的地方。


  **首席执行官** —— 坐在大办公室里的那个人。这是一份艰难的工作。CEO 通常比你想象的还要忙碌。


  **首席财务官** —— 告诉你能买多少台 PC 或 Mac 的人。


  **心已离职** —— 一个在心里已经辞职的员工。无论你是否希望这个人真的辞职，你都应该意识到，一个`Checked Out`的人会以其持续的无用状态拖垮整个团队。


  **首席信息官** —— 告诉你能否使用 Mac 或 PC 的人。


  **协作** —— 一个用来说服你与那些你宁愿避开的人共事的词语。


  **完美主义者** —— 在产品设计上绝对必须做正确事情的人。他们在实用性方面的欠缺，被其卓越的想法所弥补。


  **合同工** —— 一个似乎永远不会离开的临时员工。


  **首席运营官** —— 确保你的 Mac 或 PC 能够送达的人。


  **信誉** —— 他人相信或信任你的程度。`Credibility`与信息一样有价值，但也同样难以衡量。


  **交叉授粉** —— 将一个团队产生的想法拿到另一个团队进行验证的行为。工程师们充满骄傲，不喜欢这样做，但`Cross-Pollination`常常能带来原始团队永远无法发现的改进。


  **冲刺期** —— 没有周末的时候。


  **首席技术官** —— 告诉你 Mac 和 PC 哪个更好的人。


  **文化** —— 一种无形的凝聚力，将你的公司维系在一起。就像原力一样，但它是真实的。


  **数据库** —— 一个方便存放数据的地方，前提是你喜欢数据有组织、有结构。


  **总监** —— 中层管理。这些通常是最后一批了解产品实际功能的经理。


  **股息** —— 支付给股东的利润份额。


  **领域** —— 一个影响范围。（“那是市场部的`Domain`。”）


  **完蛋了** —— 一个关键但未列入计划的产品里程碑，此时产品团队意识到他们严重落后，并决定全力冲刺。这个术语源自原始《星球大战》中的 C-3PO。


  **双击** —— 过去与鼠标操作有关；现在它是一个被严重滥用的管理术语，用作“让我们深入探讨一下”的过渡语。


  **药物测试** —— 大公司采用的一种流程，通过这种流程，新员工被吓得大约 30 天内不敢饮酒或吸烟。


  **电子邮件** —— 你收到垃圾邮件的方式。


  **每股收益** —— 分配给每股已发行股票的公司利润部分。这在大多数硅谷公司并不发生，所以不要抱太大希望。


  **脸书** —— 你与那些你想忘记的人保持联系的方式。


  **被解雇** —— 终止雇佣关系；通常用于极端情况。（“他在偷我们的东西！”）不能轻易使用，并且绝不能在没有`HR`深度参与的情况下使用。


  **极客** —— 参见`Nerd`。


  **愤怒邮件** —— 你不应该在冷静下来之前发送的电子邮件。


  **焦点评估** —— 每年与你的经理进行的、评估你绩效的会议。它通常被视为用来证明加薪或奖金合理性的工具，这掩盖了传递实际建设性职业建议的机会。


  **总法律顾问** —— 公司里最重要的律师。


  **小道消息** —— 一个内容丰富但充满错误信息的来源。


  **谷歌** —— 你搜索事物并接收广告的方式。


  **图形用户界面** —— 一个老旧的术语，用于描述一个不那么糟糕的用户界面。


  **黑客** —— 一个被不公平地赋予了负面含义的标签。虽然`Hacker`可能不怀好意，但他们主要感兴趣的是展示聪明才智。


  **极其糟糕** —— 糟糕。非常糟糕。可怕到天塌下来般的糟糕。极其恶劣。在产品周期后期对`Bugs`进行分类时，这个词很实用。


  **人机界面** —— 苹果公司的用户界面。


  **全局视野** —— 一种管理风格，这种管理者关注整个公司而不仅仅是自己的团队。通常是中层管理者。


  **我的天哪** —— 某种技术彻底震撼你或改变你生活的时刻。




  **HR（人力资源）** —— 一群乐于助人、却总让你做些极不情愿之事的人。


  **渐进主义者** —— 懂得“更好”是“完成”之敌的人。渐进主义者以牺牲质量和完整性为代价来完成任务。


  **个人贡献者** —— 人力资源术语，指代没有直接下属的单一员工。


  **即时通讯** —— 电子邮件的替代品。


  **交互设计** —— 用户界面设计中最难的部分。交互设计师负责研究用户将如何与应用进行交互，理想情况是让用户感到最少挫败。交互设计师明白`workflow`这个词的含义。


  **实习生** —— 通常是来自大学的临时雇员，他们总是笑容满面。


  **面试** —— 你需要系领带的那一天。在面试中，你——满怀希望的求职者——要在一群只有 30 分钟来判断是否愿意听你五年蠢笑话的人面前推销自己。


  **内向型管理者** —— 关注单一产品或团队的一线管理者。他们不太关心公司其他地方发生的事情。


  **iOS** —— 苹果公司的移动操作系统，它通过让一切操作更简单而惹恼了不少书呆子。


  **IT（信息技术）** —— 世界上最通用的术语，指代负责你桌上那台电脑的人。你很可能就在 IT 部门工作，自己却浑然不觉。


  **职位描述** —— 对一项工作所需职责的简要书面说明。


  **裁员** —— 一个可怕的过程，员工因公司需要节省开支或忙于其他事务而被解雇。


  **主管** —— 一个比“经理”更好的头衔。


  **杠杆效应** —— 一个经常与“协同效应”一同出现的词。


  **Linux** —— 就是带字母 L 的 UNIX。


  **Mac OS 9** —— 基于 UNIX 的 Macintosh 操作系统的旧版本。


  **Mac OS X** —— 基于 UNIX 的 Macintosh 操作系统的新版本。


  **马尔科姆事件** —— 产品开发过程中看似微不足道、却以一种极不可能的方式搞砸你发布的事件。


  **经理** —— 为你签署评估报告的人。


  **指令** —— 由高级管理层下达的命令。指令通常出于两种动机：要么是借口来避免解释理由（不好的），要么是为了让人们停止争论并开始行动（好的）。


  **市值** —— 简单的数学计算。如果一家公司有 100 万股，每股售价 10 美元，那么市值就是 1000 万美元。常被用来粗略比较公司规模或衡量企业健康状况。（“X
  公司的市值是营收的 40 倍！”）


  **市场部** —— 那些粉饰你产品实际功能的人。他们是必不可少的，因为大多数工程师无法成功地与实际客户沟通。


  **会议** —— 传统上，是一群人聚在一起解决共同问题。但通常，它极大地浪费了时间。


  **里程碑** —— 在软件开发周期中定义不清、却被过度宣传的日期，届时软件开发团队会反思自己有多狼狈。


  **MRD（市场需求文档）** —— 一个据说包含“客户需求”的神秘文档。


  **多任务处理** —— 同时处理多件事的能力。多任务处理与 NADD 有着密切的联系。


  **NADD（书呆子注意力缺陷障碍）** —— 一种以不可能的速度吞噬信息的强烈渴望。每次有人这么说，兰兹就能赚 25 美分。


  **书呆子** —— 参见“极客”。


  **NIH（非我发明）** —— 描述工程团队只愿使用自己代码的行为的术语。不是因为外部代码好或坏，只是因为它来自外部，意味着必须被审查、重新格式化……哦，见鬼。我们干脆把整个该死的东西重写一遍吧。数十亿美元已经损失在了
  NIH 上。我是认真的，数十亿。


  **离岸（外包）** —— 你的工作被转移到了海外。据说这对“我们国家有好处”，因为失业是“巨大的动力”。


  **录用通知书** —— 交给潜在新员工的正式文件，描述其雇佣条款。重要的是要意识到，一旦候选人签署了录用通知书，你作为招聘经理的工作并未结束。只有当他们屁股坐到座位上，他们才算正式员工。


  **办公室** —— 你居住的方形格子。有些型号配有窗户和门。


  **CEO 办公室** —— 围绕在 CEO 身边，确保他/她准时参加会议的人。


  **异地会议** —— 在一个咖啡味道不同的地方举行的会议。


  **组织架构图** —— 谁向谁汇报的直观展示。在大型组织中，组织架构图有助于弄清楚你实际上在和谁打交道。


  **外向型管理者** —— 将注意力集中在公司外部的管理者。这种人极其关心外界如何看待他的公司。外向型管理者通常是高级管理层，比如 CEO。


  **P/E（市盈率）** —— 确定投资者为获得公司 1 美元盈利所支付的价格。如果公司每股盈利 2 美元，股票售价 20 美元，那么市盈率就是 10——投资者会支付盈利的十倍价格。


  **绩效改进计划** —— 一个出人意料的乐观术语，描述的是一个令人沮丧的过程。绩效改进计划是份书面指示，说明员工需要做什么才不会被解雇。没有人力资源部门的深度参与，想都别想实施它。


  **电话初筛** —— 与招聘经理或招聘人员的一次简短交谈，其中一两个关键点将决定你是否能获得面试机会。


  **流程** —— 一个以字母 P 开头的七个字母的单词。流程并非全是坏事，尤其对于大型公司而言，那里有庞大的人群在重复做着同样的事情，浪费大量时间。


  **产品经理** —— 理想情况下是产品的所有者。这个人清楚产品是什么以及它的发展方向。他们常常需要与那些自以为知道客户需求的烦人工程师打交道。


  **项目经理** —— 项目进度的所有者。项目经理在小型公司几乎无用，但在任何大型产品开发团队中都必不可少。


  **QA（质量保证）** —— 负责寻找漏洞的人。


  **R&D（研发）** —— 或者叫软件工程、软件开发。实际上都是同一回事。令人惊讶的是，在如今无休止的开发中，真正的研究活动少得可怜。


  **重组** —— 为了适应新的公司目标，将员工重新调整分配的过程。


  **招聘人员** —— 其工作是帮助你为招聘需求（见下文）寻找候选人的人。招聘人员常给人滑头的感觉，但他们同时要具备良好的人际交往能力，又要能与工程师进行有意义的对话，这份工作并不轻松。当你找到一个好的招聘人员时，要和他们保持合作。


  **背景调查** —— 致电候选人提供的推荐人进行核实的过程。推荐人是有偏见的，因为他们由候选人提供，所以作为事实来源并不可信。如果你对新员工有任何疑虑，我还建议挖掘非公开的推荐人，或者用真实、诚恳的问题对推荐人进行严格询问。


  **发布工程** —— 负责构建/编译产品的团队或个人。发布人员生活在一个模糊的灰色地带：他们既不完全属于 QA，也不完全属于软件工程。


  **招聘名额** —— 一份虚拟文档，允许你招聘一名新员工。真棒！获取招聘名额可能很棘手，而一旦获得，它们可能会在没有预警的情况下消失。用掉它，否则就失去它。重要事实：从招聘名额获批那一刻起，平均需要
  90 天才能让一个新员工屁股坐到座位上。千真万确。


  **辞职** —— 辞去你的工作。“辞职”听起来更专业，但意思是一样的。你随时可以这么做。




  **RSU（限制性股票单位）** — 与股票期权（见下文）不同，RSU 是实际股票的授予。与期权类似，它们在一段时间内逐步归属，以激励你不要离职。


  **简历** — 一份非常简短的文件，旨在描述你的整个职业生涯。


  **销售** — 负责销售产品的人员。不是产品需求的良好来源，因为他们会受到金钱的诱惑，但往往是抱怨的良好来源。


  **陷入困境** — 一个职业转折点，你所选择的行动路线将让你要么沉沦，要么脱颖而出。


  **离职待办期员工** — 已辞职但仍为公司工作的员工。离职待办期员工的生产力会随着离最后工作日的临近而下降。


  **硅谷** — 旧金山南部一个模糊的区域，充满了金钱和非常聪明的人。


  **延期** — 表示产品未按计划进行的更温和、更友善的说法。（“我们延期了三周。”）频繁延期往往是糟糕的职业举动，但出于正确原因的延期是件好事。


  **软件开发生命周期** — 从有人产生一个巧妙的点子，到这个点子被过度开发、不再赚钱之间的时间。


  **规格说明书** — 一份告诉你产品“应该是什么样”的文档。编写规格说明书的过程往往比有人阅读它更有用。


  **电子表格** — 穷人的数据库。


  **员工会议** — 与你所有直接下属举行的周会。不定期举行此类会议会导致沟通不畅和大量时间浪费。


  **状态报告** — 每周的例行公事，你借此向经理证明自己的价值；通常是公司臃肿化的标志。你应该尽力抵制这种报告的创建。


  **股票** — 一张你永远不会见到的纸，上面写着你在某家公司拥有部分所有权。股票很简单——你拥有股票。股票期权则更令人困惑。


  **股票期权** — 一张你永远不会见到的纸，上面写着你可以按某个特定价格购买股票。期权常常让人困惑，所以我解释一下。你被授予了以`$100`的价格购买公司 100
  股股票的期权。恭喜。当你卖出你的期权时，你只会获得你的行权价与当前价格之间的差价。所以，如果你以`$110`的价格卖出你所有的假设期权，你只会获得每股`$10`的收益，即`$1,000`（税前）。人们如今对期权感到紧张。


  **协同效应** — 一个经常与“杠杆”一词连用的词。


  **技术支持** — 当你的电脑出问题时，你在电话里对他们大吼大叫的人。你其实应该冲着设计那个东西的工程师吼，但他们从来不接电话。


  **临时工** — 可能明天就不会坐在那个位子上的同事；通常被分配没人想做或没时间做的工作。


  **解雇** — “你被炒了”的政治正确说法。


  **推特** — 一种让你说起来像幸运饼干上的签语的方式。


  **总薪酬** — 公司支付给你的所有报酬的总和。这包括工资、奖金和福利。总薪酬是你比较多个工作机会时应使用的金额。


  **用户界面** — 关于程序如何呈现给用户的所有决策的总和。


  **单元测试** — 字面意义上讲，是工程师最不想做的事情。


  **用户体验设计** — 负责整个用户体验的设计学科。


  **UNIX** — 一种 1969 年发明的交互式分时操作系统，最初是为了让某个家伙能玩游戏。


  **版本控制** — 一个跟踪任何给定文件多个版本的数据库。版本控制是工程师团队开发中必不可少的工具。


  **副总裁** — 通常是 CEO 的直接下属。


  **网络日志（博客）** — 一个人在互联网上的代表。


  **Wiki** — 一种允许任何人编辑内容的 Web 应用程序。这听起来像是灾难的配方，但事实证明人们喜欢内容整洁。




  **Windows** — 这个星球上排名第一的桌面操作系统。


  **工作流** — 用户使用应用程序的方式。在设计应用程序时考虑到特定用户的工作流可以提高可用性。


  **心流状态** — 一个你达到最高生产力的神奇地方。心流状态极难进入，更难维持。


