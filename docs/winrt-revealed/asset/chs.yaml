  ## 关于作者


  **迈克尔·洛普**是一位资深工程经理，他从未设法逃离硅谷。在超过 20 年的软件开发生涯中，迈克尔曾在多家创新公司工作，包括苹果、网景、赛门铁克、宝蓝、帕兰提尔，以及一家逐渐消亡的初创公司。


  除了本职工作，迈克尔还以笔名“兰兹”撰写广受欢迎的技术与管理博客，探讨他的管理理念，担忧如何保持相关性，并解释：虽然你可能会因所构建的东西获得丰厚回报，但只有依靠你的人才，你才能真正成功。他的博客地址是
  [www.randsinrepose.com](http://www.randsinrepose.com)。


  迈克尔与家人住在北加州的红杉林中。他冲浪、打冰球，只要有机会就喝红酒，因为保持清醒比保持忙碌更重要。


