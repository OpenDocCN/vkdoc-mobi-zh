  ## 第二版序言


  这仍然是一部半虚构作品。


  一本关于管理的书充满了关于如何管理人员的见解、想法和观点。所有这些信息都基于与我仍然认识的真实人物的真实生活经验。虽然我很想告诉你，我所有的管理经历都是积极的，但事实并非如此。我有过几次失控，而且当时还有目击者。正是这些目击者帮助我重新振作，并为这本书增加了新的一页。


  本书各章节中提到的所有人名都是虚构的。我把所有认识的人的精神形象扔进一个袋子里，摇晃这个袋子，然后抽出费兹、菲尔和弗兰克。利用这些构建的角色，我创作故事，有时场景设在我实际工作过的熟悉公司——比如苹果、网景、帕兰提尔或宝蓝——这让我能够解释我所传达的任何管理见解。和我的角色一样，我的故事也是虚构的。我希望它们仍能在你的脑海中引起共鸣，因为尽管它们是精彩的故事，但基于真实经历。


  这层半虚构蛋糕上的糖霜是兰兹。这是我上世纪 90 年代中期开始用于网络身份的名字。当我开始写关于管理的博客时，这个名字就固定下来了。可以把兰兹看作你的半虚构向导，带你走过虚构人物的虚构故事，这些人物拥有难以置信的相关（但虚构的）经历。


  兰兹有点脾气，不过话说回来，我也是。


  '
- '# 第一部分：管理箭袋


  在我一生中大概只射过十次弓箭的情况下，很奇怪我会把管理技能看作是箭袋里的箭。但这个比喻很贴切。管理在很大程度上是关于解决问题的，还有什么比把问题贴在靶子上，后退一步，拔出合适的箭然后射出去更好的解决问题的方法呢？无论你是否射中靶子，都会发出一声令人满足的“噗”的响声。那是进步的声音。


  我们都有经理，无论你是工程总监还是独立贡献者，你的工作之一就是摸清你的经理。他想要什么？他如何处理危机？他如何沟通？每当你学会这些功课，你就得到了一支箭。它不仅是提醒你学到东西的标志，也是你放入箭袋的工具，以便下次看到类似问题时，你能抓住正确的箭，仔细瞄准，然后射出。


  '
- '# 第 1 章：别当刺头


  为网络写作的美妙之处在于确实没有计划。我有幸在精神上随意摸索任何主题。渐渐地，这些主题聚焦到了工程管理上，随着每篇文章的发表，我收到越来越多的邮件问：“书在哪里？”是啊，我一直想出版一本书，但有个问题——卖点是什么？*做个好经理？呃呃呃呃呃。*
  我需要一个引人入胜的真相，它能优雅地将我所有的沉思串联起来。


  时光倒流回互联网泡沫破灭中期。我们，一家濒临倒闭的初创公司的快乐团队，正在……大量饮酒。公司总部附近有各种酒吧，每家都有独特的用途。有家简陋酒吧非常适合裁员后的聚会，酒水便宜，如果你想发泄“我其实没那么没用”的怨气，你可以和趴在吧台上那个没牙的水手干一架，或者和刚解雇你的家伙打一架。


  街那头是家英式酒吧。啤酒更好，有威士忌可选，还有能吃的食物。我们就是在这里，对我们当前正在经历的、让我们在三年内滑向无足轻重的组织抽搐进行哲学探讨。


  我们现在就在那儿。我们喝得酩酊大醉，因为公司刚刚被卖给了一家无名上市公司，这家公司将迅速瓦解那个我们曾为之呕心沥血的公司。每个人都知道我们迟早会落到这步田地，但没人料到自己是最后一个坚守者。更没人料到
  CEO 会出现。





  '
- '# 这位可不是当初创立公司的 CEO。他离职已经一年多了。这位是董事会请来卖掉初创公司的。没错，他确实试图力挽狂澜，但别忘了，我们正身处金融寒冬，资金早已不再唾手可得。


  那些在 CEO 上任前就看过他简历的人，心里都明白大势已去。他最近的四份工作，都以公司被肢解、化为乌有而告终。美其名曰“股东利益最大化”。


  而眼下，我们就这样了。醉醺醺的，喝着龙舌兰——我们工程部的最后四个人，两个技术支持，还有……CEO。尽管我们喝得头晕目眩，但 CEO 在场让我们感到极度不适，因为我们骨子里觉得他是个没人情味的混蛋。


  就是这样。


  这就是我这本管理书背后最基本的事实。它也是个绝佳的标题。


  *《别做混蛋》*


  嗯，我的编辑们可能对标题里的“混蛋”这个词有意见。所以我们暂时称之为工作标题吧。


  故事里这位 CEO 其实并不是个混蛋。好人一个。说话直率。财务感觉敏锐。许多失败的公司比我们惨多了，但这不是重点。我们之所以醉醺醺地坐在那里，浑身不自在，是因为我们和这个人完全没有半点联系。他是个机械式的
  CEO。


  我对优秀管理者的定义是：无论你在组织架构图上的哪个位置，他都能与你建立联系。我所说的*联系*具体指什么，因人而异，取决于你是谁、你想要什么。是的，这意味着优秀的管理者必须付出巨大的努力，去发现每个下属身上的细微差别。


  看见。看见那些与你共事的人。都说重复能加深长期记忆，所以让我们再重复一遍。你必须*看见*那些与你共事的人。


  如果你对我说的还毫无头绪，那么现在或许是放下这本书，去书店看看编程类书籍的好时候了，因为你该重新考虑一下纯技术路线。当管理者是一份很棒的工作（我是认真的），但真正让你成为卓越管理者的，是你能否在几秒钟内对一个人形成深刻洞察的能力。是的，在技术管理岗位上，你需要左右脑并用，但仅仅因为你代码写得好，并不代表你就能知道如何解雇
  70%的员工。


  与你共事的每一个人，都有截然不同的需求。满足这些需求，是让他们感到满意且高效工作的方法之一。倾听这些人，并在心里记录下他们是如何构建的，这是你的全职工作。这是你最重要的工作。我知道工程部高级副总裁会告诉你，项目按时交付是第一要务，但你不是那个写代码、测试产品或编写文档的人。团队才是做这些事的人，你的工作是管理团队。


  硅谷充斥着极度成功的独裁者。就算他们是世界级的混蛋，也能成为成功的领导者。这本书将尽可能让你远离“混蛋之道”，如果这意味着你登上《华尔街日报》头版、被标榜为“有远见的企业斗牛犬”的机会因此减少，那么，我的目的就达到了。


  你可以选择自己想成为哪种管理者。如果你想和你的团队并肩作战——想向他们学习，想让他们信任你——那么，我有些建议给你。很多建议。继续往下读。


  再说一次，那个初创公司的 CEO 不是混蛋。他只是在公司的“葬礼”上出现，并且理所当然地认为我们会因为*他是 CEO*而自在。我们知道他是 CEO。更重要的是，我们知道他从未花过一秒钟使用我们的产品。我们从未在周末见过他。现在想想，他周五也从来不在，因为他从另一个州通勤过来。我们和他毫无共同经历，除了那三次莫名其妙、充斥着幻灯片、电子表格和乏味内容的全员大会。


  CEO 相信，这些充斥着电子表格的全员大会，就是建立关系所需的一切联系。在会议期间，他确实是对的。开完会，我们感觉信息很充分。但一周后，当裁员谣言四起时，我们的需求就变了。一个月后，当裁员落地，CEO
  却不见踪影时，我们的需求更是发生了天翻地覆的变化。*混蛋。*


  由人构成的组织总是在不断变化。它们极其混乱。在这种混乱中，对你和你工作的评判会在瞬间形成——在你走廊里十秒钟的对话中，在你选择如何描述自己的方式中。


  与此同时，你需要不断评估你的同事，确定他们需要什么，找出什么能激励他们。你需要记住，某天有效的激励手段，两个月后可能会适得其反，因为人类是令人困惑、反复无常且情绪化的。为了实时地管理好这些人类，你自己必须首先是人。


  所以，这本书更好的标题是：《管理人性》。


  '
- '# 章节


  ## 管理者并非邪恶


  一位值得信赖的员工，在我初创公司的团队里工作了多年，他问：“你具体是做什么的？”


  惊掉下巴。


  目瞪口呆。


  难以置信。


  这家伙总是跟我实话实说，所以我知道他这么问是因为他真的不知道。


  让我回顾一下我的一天。我早上 8 点刚过开始工作。像往常一样，先花 30 分钟处理邮件并回复，然后快速浏览科技新闻，感受一下全球脉搏，接着就去参加第一个会议。是我老板的员工会议，像往常一样开了将近两个小时。会议结束后，我花了
  30 分钟把会议记录消化成我和团队的实际任务，同时整理一下我自己员工会议要用的公司内部消息。


  午餐。今天和 Web 应用团队一起吃。花了 30 多分钟，之后回来处理数据库里的 bug——这是一项日常 30 分钟的任务，之后是一个跨职能会议，会议变得很不愉快。我需要有人做一件事，但他们做不了，这意味着我完蛋了。在那场
  60 分钟的灾难之后，我还有一场一个半小时的一对一面谈。就在这段时间里，我被问到了一个最没水平的问题：“你具体是做什么的？”


  我对这个问题的第一反应是错误的。我想跳过桌子，抓住我朋友的肩膀，摇晃他，大喊：*“伙计，当你在今天早上毫无用处地盯着那个 bug 的时候，我正让这个组织保持运转。”*
  我的第二个反应是深吸一口气，于是我照做了。


  员工和管理者之间这种关于“你到底做什么”的脱节，正是人们不信任管理者，甚至觉得他们很邪恶的核心原因。


  ## 邪恶确实存在


  我的背景：过去 20 年里，我在六家不同的公司工作过。期间，我从 QA 工程师到工程总监，做过十份不同的工作。同样，我为各种各样的管理者工作过，从一线经理到 CEO。我从未离开过工程领域，但尤其是在高级管理岗位上，我接触到了构成一家公司的、各种截然不同的职能部门的内部运作。




  '
- '# 组织自豪感、恐慌感与经理的角色


  我见过形形色色的组织自豪感与恐慌感。在 Borland 和 Netscape，我都亲历过公司氛围从“我们是微软的终结者！”急转直下到“我们完蛋了！”的剧变。在那家初创公司，我是第
  20 号员工，看着团队扩张到 250 人，直到互联网泡沫让公司萎缩到只剩 50 人，大家对着过剩的硬件设备不知所措。


  组织认知的这些剧烈转变让我看到，有些经理在自豪阶段表现得极为出色，但恐慌一旦开始就变成了混蛋。同样，恐慌时期也涌现出新的领导者和教训——那些在自豪阶段默默埋头工作的领导者。


  所有这些经历中，我真正共事过的恶人一只手就数得过来。确实存在邪恶的经理。所以我要道歉——本章标题撒了谎。他们是真正邪恶刻薄的人，把个人利益置于团队之上，满口谎言，毫无领导能力。这样的人比你想象的少，但确实存在，我唯一的建议是：遇到他们，尽快跑路。


  你的经理很可能并不邪恶，所以你无需逃跑。但你确实需要了解他是如何构建的。


  ## 你的经理的工作


  人们对管理层最根本的挫败感其实最容易解释。你之所以沮丧，是因为你拼死拼活地干活，但每次路过老板办公室，都看到他翘着二郎腿，一手端着咖啡，另一只手在空中比划，正跟某个你不认识的人谈笑风生。这怎么可能算是工作？


  事实是这样的：你经理的工作不是你的工作。


  你有没有和公司里完全不同的部门开过会？比如你搞工程的，却和设施部门讨论为团队争取更多空间。你的目标很明确：“我需要更多空间”，但会议一开始，你就发现你和设施部门简直是鸡同鸭讲。说的都是英语，但语境天差地别。那帮设施部的人喋喋不休地讲着租赁协议、安全规范，还有一大堆陌生的缩写词。五分钟之内，你就完全搞不懂他们到底在干嘛。


  在那次会议之前，如果我问你设施部在公司里是干什么的，你肯定皱着眉头嘟囔一句“搭隔间的”。我相信，和你一样，我是个乐观主义者，并且相信公司里每个人都在忙着做自己分内的事。我也相信，正因为你不懂他们做什么，你会自动产生偏见。你认为自己因为对自己的工作了如指掌，所以它比其他任何人的工作都重要。


  在你心里，你是国王。你清楚自己做什么；也清楚别人对你的期望。没有人比你更善于管束自己，因为你完全清楚自己的定位。你头脑之外的任何人都是个谜，因为他们不是你。在社交场合，弄清楚别人的想法很有趣，但在员工/经理的关系中，这关系到更大的利益。这个决定我能否加薪的家伙到底是谁？他对我副总裁说了我什么？他觉得我成功还是失败？他办公室里那个家伙到底是谁？*他整天都在干嘛？*


  我不会解释你的经理整天在做什么。抱歉。


  但我将给你七个关键问题，你需要回答这些问题才能判断这家伙是否有能力维护头号人物——你。理想情况下，你应该在接受新工作前就找到这些问题的答案，但你没有，现在你正为一个无法和你顺畅沟通的经理工作。这些问题也许能让你看清他到底是怎么想的。


  ## 你的经理从哪里来？


  我从这里开始也在这里结束，因为你经理的出身不仅决定了你该如何与他沟通，也决定了当麻烦来临时你会遇到什么。


  讽刺的是，从沮丧的员工那里我听到的第二常见的抱怨是：“我的经理根本不知道我在做什么。”知道这个问题是双向的，也挺好，对吧？这种情况有几个可能的原因。你的经理可能不在乎你在做什么。这不意味着你工作的好坏，只是它不在他的关注范围内。有些人觉得这种不知情就像一件舒适温暖的毯子。这是一份省心的工作。*没有尴尬的走廊谈话，只有我和我的代码……然后我怎么了？我被炒了？我去。*
  嗯，这就是隐性工作的风险。没人知道你的价值，当需要裁员时，你就排在最前面。


  另一种可能的情况是，你的经理实际上并不真正理解你在做什么，因为他从来就不是工程师。我不是说那些事先注定失败的案例——某个高层智囊认为让市场总监去管工程部门是个好主意——我说的是那些隐瞒自己其实没怎么写过代码事实的工程经理。当然，他们能说一套套的行话，满口都是流行词，但他们上一次写程序是什么时候？他们真正引以为豪的代码是哪一段？他们有计算机科学学位吗？


  如果你得到的答案含糊不清，全是听起来很对的词，那我猜你遇到了一个“冒牌货”。我说的是那种靠着胆量而非技术能力，硬挤进工程领导职位的人。这种情况下你不一定就完蛋了。一个能说服组织自己有领导能力，同时又隐瞒了自己根本不懂指针是什么的人……这，怎么说呢，有种。


  这个人整个职业生涯都在想：“他们什么时候会看穿我？”这种偏执给了他们可靠的信息侦查能力，这对你和你的组织可能有用。他们知道裁员何时来临，知道如何与高层管理沟通，但他们不知道如何跟你沟通，因为你正积极而充满热情地做着他们一窍不通的事情，而他们又必须维持自己懂行的假象。


  如果这就是你的经理，而你觉得他的工作有价值，那么你的任务就是学会说他们的语言。也许他是从 QA 部门溜出来的？好，那就说 QA 的话。也许他只是没去拿计算机科学学位？好，那就花点时间教他了解你的工作。我不是说要教这家伙`Objective
  C`，而是在白板前花 15 分钟画流程图。这是*我所做的*，这是*为什么它重要*。


  你的经理是你面对整个组织的面孔。就在此刻，某个你不认识的人正因为你花了五分钟向老板推销你的工作而在说你的好话。那是你的经理做到的。你给了他可以说的话。


  ## 他如何弥补自己的盲区？


  现在我们来聊聊你最喜欢的经理。跟我讲讲他吧。你可能说他是个出色的沟通者，风趣幽默，很有魅力？他可能激励过你。你大概能引用几句他的名言，比如“更好是完成的敌人”。问题是，他的盲点是什么？


  每个经理，无论好坏，都会有一个明显的短板。也许他确实是从 QA 逃出来，现在成了工程总监。也许他是个杰出的技术专家，但完全没有幽默感。问题是，他是否意识到了自己有盲点？




  我在每次面试中都会问同样一个问题：“你需要哪些帮助？”无论是面对一线员工、经理，还是我的新上司，我始终好奇人们如何看待自己的弱点。一句轻率的“我各方面都很扎实”是可怕的危险信号。我欣赏自信，我也希望你在面试中推销自己。但如果你暗示自己毫无瑕疵，那我只会觉得：要么你的缺陷大到无法启齿，要么你根本不知道它们是什么。


  经理的职责，就是运用他们自身拥有的、曾助其晋升的技能，并设法让这些技能产生规模化效应。他们通过组建团队来实现这一点——这个团队既能放大他们的优势，更重要的是，能弥补他们的短板。死板的技术专家需要团队中有出色的沟通者，那些能讲笑话、在组织中起到社交粘合剂作用的人。而那些毫无技术底子的愿景家，则需要你这样的技术强者来告诉他们技术上什么是可行的。


  经理的职责，就是通过找到最合适的人来填补自己的明显短板，并信任这个人去完成任务，从而将缺陷转化为优势。


  ## 你的经理会说那种语言吗？


  好的，假设你身处一个方形房间。房间里有两扇清晰的窗户，每边各一扇。每扇窗户前都有一个麦克风，打开后，你说的任何话都会传到窗户另一侧的人耳中。现在，你的经理在其中一扇窗户外，而你最好的工作伙伴在另一扇窗户外。今天是周五，我希望你向你的朋友做周报。比如这样：“周一简直是一场灾难。我迟到了，因为周日晚上玩得太嗨。草草看了看规格书，但因为宿醉提前走了。周二和周三还不错。完成了规格书，修复了一些
  Bug，参加了跨职能评审，得到了一些很好的反馈。你应该读读最新版本。周四简直是会议地狱。什么都没干成。浪费了三个小时。周五嘛，呃，午餐时喝了杯啤酒，我准备早点走。”


  现在，转过身，向你的老板汇报。“本周初完成了规格书，周三的跨职能评审进展顺利。周后期开了很多会。”


  我不管你为世界上最好的经理工作。我也不管他是不是你婚礼上的伴郎。你给出的汇报内容会截然不同，因为当你和经理谈话时，你面对的不是一个人，而是整个组织。你本能地知道，告诉老板你午餐喝了啤酒是坏主意，不是因为他本人会介意，而是因为组织会介意。


  你和经理说话时使用的语言，是一种“管理术语”（参见第 13 章了解更多）。没错，就是斯科特·亚当斯靠其赚得盆满钵满的那种语言。它是一种精心构建的语言，旨在跨组织传递信息。管理术语能让来自组织中截然不同部门的经理进行沟通，尽管他们各自的工作充满了不同的缩略语和专有名词。而且，没错，管理术语听起来很滑稽。


  举个例子：“我们这个项目的关键目标是进度。我们需要让团队专注于各自的目标，同时保持他们之间的交叉互动，这样他们就能自行纠错。”


  当你听到这些时，你会想：“他为什么不能像正常人一样说话？”他不是在跟你说话。他是在跟其他经理说话，说的是些非常“兰兹式”的道理，比如“承诺很重要！”和“团队比个人更聪明！”如果经理们能说得更有艺术性一些，那当然很好，但手头的任务是尽可能高效地在组织内传播信息。而一种本土化的管理术语方言就是最佳方式。此外，他们仍然需要跟你沟通，这就引出了……


  ## 你的经理如何与你沟通？


  我给所有新任经理的第一条建议是：“与直接下属安排一对一面谈，固定在相同的日期和时间，并且绝不取消。”基于此，对我来说一天中最棘手的过渡时刻之一就是这些一对一面谈到来的时候。我正深入某个问题，写着技术规格，回复着一封关键邮件，然后这个人走进我的办公室，想跟我聊些我压根不知道是什么的事情……*我正沉浸在工作中呢，各位。*
  在我试图想办法重新安排这次会议的短暂瞬间，我会提醒自己一条简单的规则：“你总会在面谈中学到东西。”


  你的经理什么时候给你机会告诉他你脑子里的想法？如果你回答不是“在一对一面谈时”，我会担心，但还不至于恐慌。也许你的经理是那种随性的人，喜欢在走廊里拦住你收集相关信息。那很好。他是每次都这样做，还是只在需要时才这样做？前者很棒，后者则是个迟早会出问题的情况。


  经理在一对一面谈中学到了什么？你在面谈中说的很多事情，你的经理其实已经知道了。你在担心组织重组，对吧？嗯，每个人都在担心，他已经和另外四个人聊过他们的担忧了。你觉得现场工程师是一群傻瓜？他也这么想。一个好经理对组织的脉搏了如指掌，而一对一面谈通常只是这种脉搏的回响，那么他为什么还要为团队里的每个人腾出
  30 分钟呢？


  他想学习。


  无论是一对一面谈还是走廊里的随机交谈，你的经理都应该始终处于主动获取信息的状态。当你拦住他，告诉他“我讨厌你最喜欢的功能”时，他应该感到高兴。要知道，他过去三天正因为那个功能而失眠，却找不到原因。你随口的厌恶恰好把他的思考推向了另一个方向。


  那些没有计划定期与团队中每个人交谈的经理是在自欺欺人。他们相信自己会通过某种神奇的组织渗透作用了解到团队内部发生的事情，但他们不会。好想法不会被发现，人才会被忽视，团队会慢慢开始认为自己的想法无关紧要——而团队就是公司啊。


  ## 每项决策需要多少行动？


  当新任 VP 第一天走进这家初创公司时，他穿着一件“会员专属”夹克。天蓝色的。我都不知道这 80 年代的复古款还在生产。这件夹克的标语是：“当你穿上它，奇迹就会发生。”在面试的“系扣领带”阶段，我对这位
  VP 竖过大拇指，所以我选择相信他。


  三个月后，我们遇到了问题。这位“会员专属”先生在讨论和剖析工程部面临的问题方面做得非常出色。我们开完会时总是充满新想法和改善的承诺，但之后什么事都没发生。好吧，那就开个跟进会。哇！他懂了。我又燃起了激情。大干一场吧。嗯，又过了两周，还是没有任何进展。


  现在，作为工程总监，你可以说采取行动的责任在我。问题是，我完成了所有我承诺要做的事。VP 却没有。他没有和 CEO 谈我们的新计划。他没有去处理那个完全心不在焉、上班睡觉的另外一位总监。当第三次跟进会议被安排时，VP
  再次展示了他扎实的解决问题的能力，但我已经不想听了。我在等对话进行到“下一步行动”部分，那时我会拿出前两次会议的记录，并仔细指出：这些下一步行动和*前两次会议*的一模一样。




