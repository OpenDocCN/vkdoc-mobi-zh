- '# 矢量思维与 Rands 测试


  我将这两条问题线索视为一个矢量。一个简单的矢量可以画成一条带箭头的线段连接两个点，但矢量的内涵远不止于此。它是一个既能描述方向又能描述大小的几何对象。理解信息如何流动、你如何与老板沟通，以及能够清晰地描述你个人和公司的职业战略，这些在你脑海中勾勒出了一个矢量。第一个点是你当下的状态，另一个点则是你期望达到的目标。这两点之间的距离和方向，开始诠释你如何抵达目标。我热爱矢量，因为它能为一团复杂的问题画出一幅清晰的图景。希望你在回答上述问题时，这幅思维图景已经开始在你脑中浮现。


  与 Joel 测试类似，Rands 测试的重点不在于绝对分数，而在于分数所指示的好方向。如果你得了 11 分，我会说你是少数能清晰洞悉公司状况及自身定位的人。在
  8 到 10 分之间，你很可能在沟通、战略或个人发展方面存在令人困扰的不足——具体取决于哪些地方缺失了分数。低于 8 分，我想你面临的问题可能不止一个。


  我预料到大家在探索这些问题时会遇到各式各样的情况，正因如此，很难开出具体的行动处方。你的公司可能发展良好，但你可能并不开心，完全不清楚下一步想做什么。你可能热爱你的工作，却完全不知道公司是否在真正成长。你的航向取决于你真正在乎什么，而
  Rands 测试恰恰指出了绝佳的起步点。


