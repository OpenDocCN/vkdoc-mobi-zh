  可以处理这些。是的，他的自尊心受到了伤害，但几周后，Jerry 就开始高速运转了，因为当人们在有可能完成的任务上取得进展时，他们总是工作得更好。


  ### 自由电子


  Jerry 投入工作后，我们不得不面对另一个事实：距离发布还有六个月，而我们有很大一部分功能是拼凑起来的，勉强能运行。在这种情况下，你需要一个独特的人才。你需要一个*自由电子*。


  自由电子是你将要遇到的最具生产力的工程师。我甚至还没给出定义，但我猜一个符合条件的人已经浮现在你的脑海里了。


  在代码方面，自由电子无所不能。他们可以从头开始编写一个完整的应用程序，用一个周末学会一门语言，最重要的是，他们可以一头扎进一大坨意大利面条式代码中，理清头绪，并让它真正运行起来。你可以围绕一个自由电子建立一整个业务。他们就是这么厉害。


  自由电子分为两类：*高级电子*和*初级电子*。两者都有相似的生产力产出，但高级版本已经变得在政治上和社交上都很成熟。在技术型组织中，许多 CTO 都属于这一类。想想
  Bill Joy。高级电子总是有风险会陷入技术的高地球轨道，他们的想法听起来简直疯狂，但是，每当我们发言时，你都应该倾听。


  初级版本拥有全部能力，他们只是缺乏与人打交道的经验，因为他们年轻时花了很多时间编写自己的操作系统，把这当作一种有趣的心智锻炼。这些初级电子代表着一个招聘经理能做出的最优秀的单项招聘。如果你在
  20 年里能遇到两个，那你就做对了一些事。


  ### 养护与激励


  如果你有幸在自己的组织中拥有一个自由电子，你需要意识到你正在与一种特殊的工程师打交道，对这种工程师的养护和激励方式可能与团队其他成员不同。


  **让他们保持参与。** 首先，工程组织中有两个主要任务：研究和开发。虽然自由电子完全有能力做开发，但他们在组织中的价值在于研究。他们定义了技术前沿。如果你让一个自由电子在开发岗位上待得太久，他们会消失，仅仅是因为他们感到无聊。所有工程师都喜欢站在技术前沿，但自由电子必须定义它。一个离职的自由电子会永久性地损害你团队的生产力。


  **被误导的自由电子精力可能产生奇怪的结果。** 在一个项目中，我把几个棘手的内存损坏 bug 分配给了自由电子，他只是安静地点点头，然后立刻消失了一个星期。当他回来时，bug
  已经修好了，而且整个数据库层都被重写了。一段由两个工程师花了大约六个月设计的代码，在七天内被完全重做。听起来这是个好主意，直到你意识到我们当时正在做一个小更新，根本没有资源或时间去测试一个全新的数据库层。唉。


