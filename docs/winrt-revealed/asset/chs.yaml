- '# 排版后的 Markdown 文档


  大公司里百分之九十五的人对暗地里的公司政治斗争一无所知，不清楚自己会受到何种影响，也不知道自己六个月后是否还能保住饭碗。你的团队将根据你与他们的沟通方式来评判你作为经理的表现。这不仅意味着要抽出时间召开季度全员大会，还意味着要理解他们需要听到什么，并能以他们理解的方式表达出来。


  ## 章节


  ### 弗雷德讨厌外出会议


  管理界有一套自己借用的权力词汇，用来赋予自身一种身份认同感。这份清单无穷无尽且颇为有趣。当这些词被说出时，它们被以一种刻意的方式表达，让你不禁敬畏地琢磨：“那是什么意思？”
  但你又不敢问，生怕显得像个傻瓜。


  今天的词：*外出会议*。外出会议是一种……会议。它有一些特定的特征，但它实际上就是与一群人开会，而且很可能名副其实，是在别处——也就是“外出”举行。


  既然你明白了它是什么，那我们来理解一下为什么你可能会讨厌它。


  ## 我为何要与弗雷德针锋相对


  外出会议存在的原因很简单：你，作为团队的领导者，需要完成某些在楼内常规条件下难以轻易完成的关键工作。这有点可悲。当团队只有 20 人时，我接下来要描述的三种不同的外出会议都会……自然地发生。弗雷德会站在办公室中间说：“好了，我们需要一个新的
  UI 框架。我来做，谁想跟我唱反调现在就提出来。”


  于是你与弗雷德针锋相对。你们争论、辩论。菲兹和菲尔也加入进来，在至关重要的 17 分钟里，你们彻底改变了产品的 UI 架构。


  当组织规模扩大到一定程度（每个团队情况不同）时，过去自然发生、用于完成文化和战略工作、并允许做出重大决策的那种跨领域沟通活动，再也无法进行了。团队再也无法环顾四周了解每个人的状态，因为人太多了。


  `时代精神` 变得淡薄。随机的走廊纠错不再发生，因为相关人员碰不到面。这很可悲，尤其是对于那些还清楚地记得站起来与弗雷德争论的人来说。你需要重新创造一个空间和场所，让团队能够凝聚，让战略得以制定，或者让你踏上一次史诗般的旅程。


  ## 我们是谁，我们需要什么，以及我们的史诗旅程


  你发起外出会议的原因会因团队而异。以下是三种我认为需要采用外出会议的具体场景，但并非仅限于此。


  ### 我们需要了解我们是谁


  如果你熟悉我的文章，你会知道我认为在头 90 天内你根本无法真正了解一个团队到底发生了什么。在最初三个月里，你会有一些令人欣慰的清晰时刻，但如果没过上一段时间，你不可能了解所有动态。现在，把这种初期的困惑乘以每个在过去九个月内入职的新员工。


  在快速扩张时期，团队成员不一定有时间停下来互相了解，因为他们一来就注意到：“哇，每个人都忙得不可开交，所以我也必须赶紧忙起来。” 他们认识周围人的正常本能被埋没在了“被认作也是个大忙人”的目标之下。


  你需要一个外出会议，不是为了解决战略性的产品问题，而是为了让团队成员暂时远离匆忙，去彼此了解。我即将描述的每种外出会议都会促进社交，但团队需要了解自身，这本身就值得为此专门举办一次外出会议。


  ### 我们需要新的方向和/或减少灾难


  某件重要的事情出了大问题。要么是灾难接连发生，而常规的发现和纠正机制失效了；要么是一切看似正常，但我们并未取得成功——无论在这个公司阶段“*成功*”意味着什么。无论哪种情况，现状都对公司构成了真正的威胁。


  这种外出会议的目的是深入集思广益。团队的任务是发现和完善想法，提出测试这些想法的实验方案，并最终挺身而出，将这些想法带回到“大本营”（公司）去执行。


  ### 我们即将开启一段史诗旅程


  没出什么问题；只是到了该开始做点什么的时候了。这最后一种外出会议也可以称为启动会议。你大致知道想做什么以及何时去做，但你需要所有负责执行这件事的领导就前进方向和原因达成一致。


  这种外出会议是一个对齐会议。战略可能会在这次会议中发现，但这并非主要目标。你们要共同将大家指向正确的方向（*这是我们要去的地方*），并明确行动的紧迫性（*这就是我们要去那里的原因*）。


  ### 一场具有特定特征的会议


  虽然外出会议只是一个长会议，但它具有某些与你日常会议不同的特征。我来逐一解释，并且我要带上弗雷德，因为他能毫不含糊地告诉我们他讨厌什么。


  #### 定义上，你无法邀请所有人


  记住，你需要外出会议的首要原因就是团队规模已经大到大家都被（希望是必要的）战术性工作所吞噬。他们没时间停下来思考，因为从踏进办公室的那一刻起，就有开不完的会、回不完的电话、邮件和面试。每个人都沉浸在工作中。是的，个人偶尔能挤出一小时喘口气，但作为一个整体，团队没有时间去弄清楚自己在想什么，或者为什么这么拼命工作。


  根据你外出会议的目标，你需要挑选那些既有能力又愿意解决眼前难题的人。如果你试图了解团队，你就邀请你想了解的所有人。如果你想减少灾难，你就邀请那些制造灾难的人和有能力解决灾难的人。你需要能够环顾房间，心想：“这些人就是能解决问题的人。”


  *弗雷德讨厌这一点。* 他说：“嘿，为什么我们要搞排外？我希望每个人都能对影响公司的重要决策发表意见。我们都是股东，都应该有投票权。”


  弗雷德，那种邀请所有人的会议是有名字的。它叫“全员大会”。如果全员大会不是你公司常规会议的一部分，我能理解你为什么生气。但是，你的全员大会有 120 个人，我问你，你上次看到
  120 个人高效地提出、辩论然后做出决定是什么时候？外出会议并不是忽视意见的机会；外出会议是一个选择一群最能代表公司去解决当前重大难题的人的机会。是的，筛选过程很艰难。


  #### 每人都有展示，或至少发言


  一旦你有了初步的名单，问问自己：我会要求每位受邀者做什么合适的演示？我的经验法则是，每个参加外出会议的人都需要提交一项成果，这通常意味着他们需要站出来进行演示。这种做法让我明白两件事。首先，如果面对手头的问题，我想不出想让这位演示者谈些什么，那为什么邀请他？其次，我开始看到重复。*嗯，莎拉和弗兰克都很擅长谈论我们缺乏设计流程的问题。我真的需要他们俩都来吗？*




  '
- '# 排版后的文本


  这并非一条硬性规定。很多时候，你需要邀请一些人，仅仅是因为你知道他们会随时冒出既随机又精彩的观点。然而，在筹备你的外出会议时，这一步既能明确你的议程，也能锁定你的与会者。


  *弗雷德其实并不反感这一点，因为他喜欢这种为活动带来的民主与扁平化氛围。* 谢谢你，弗雷德。


  ## 它不在你平常的办公楼里


  另一个常与外出会议关联的词是**华而不实的公费旅游**。当你得知高级领导团队要在韦尔度过周末时，我可以向你保证，没错，那就是一场公费旅游。我确信公司一定有一个清晰的商业理由，来解释为什么需要在仲秋时节将七位高管空运到韦尔，但我也同样确信，他们在海拔更低的地方也能完成同样的工作。


  外出会议不必奢华，但确实需要一种“身处别处”的感觉。它们需要远离办公室中战术性的干扰，因为人们需要换个视角。外出会议的目标之一，就是创造一个让人们可以坦然发表“异端邪说”的场所。如果你面前的任何问题都能通过日常工作解决，那它早就被解决了。非常规举措需要创造性思维，而既然你已经把这些聪明人聚集在一起，你就希望他们能自如地说出脑海中任何引人注目的想法。当你周围没有那些显而易见的限制条件的视觉提醒时，发表“异端邪说”就更容易了。


  *弗雷德讨厌这一点。* “你知道这要花我们多少钱吗？我们完全可以在七楼的董事会议室里做同样的事。”


  是的，弗雷德，我们可以。但最多两小时，情况就会变成这样：有人会发现我们躲在董事会议室里，然后他们会找出一件看似惊天动地的大事，把其中一个人叫出去。人们会慢慢悠悠地从休息时间返回，有时干脆就不回来了。你是在花高价确保房间里的每个人都能集中精力，但如果你有一个值得召开外出会议的主题，那么为了获取这个团队的注意力，这点代价微不足道。


  ## 有人负责掌控流程，也有人负责记录行动


  有了正确的与会人员，就棘手问题展开一场健康的对话并不难。事实上，一旦小组开始讨论，问题反而会变成如何让他们停下来。为了管理好这一点，你需要在活动开始前指定两个角色：一名司仪和一名会议记录员，而且通常不是同一个人。


  司仪不仅负责推动一天的进程，还要知道何时该暂停并转向。重申一次，让这个特定小组开始一场健康的对话应该不难，但不要将健康的对话与取得进展混为一谈。一场引人入胜的深度对话是件好事，也是探寻伟大思想核心的沃土，但需要进行的对话有很多，这仅仅是其中之一。一位优秀的司仪知道，当一个想法已经得到尽可能充分的探讨时，就该继续前进了。


  会议记录员听起来像是个行政工作，但它是房间里最重要的任务。一旦外出会议真正进入状态，一旦团队真正投入进去，所有想法听起来都会很棒。会议记录员的任务不仅仅是捕捉那些聪明的想法，更是要捕捉正确的想法。根据多年组织外出会议的经验，我的观察是，你通常只会发现三个你打算付诸行动的新想法。这些想法可能是改变公司的宏大设想，但通常只有三个。而会议记录员的巨大责任，不仅是要找出它们，还要将它们分配给有能力并且愿意推动其落地的人。


  *弗雷德讨厌这一点。* “他们这是在扰乱流程啊，兄弟。为什么我们不能就只是聊一聊？辩论一下？为什么我们非得赶时间？”


  弗雷德，我理解你讨厌流程。你把流程的出现等同于自由意志的减少。你相信流程会慢慢侵蚀那个让我们从 12 人发展到 120 人的创意忍者精神，你是对的。不考虑需要支持的企业文化就盲目引入流程，是灾难的配方。然而，相信那种随性而为、边做边想的反叛精神能带我们达到
  120 人，就能再带我们达到 2000 人，这种想法是荒谬的。


  我相信，每当公司规模翻倍，它都需要重新发明自己的沟通方式，而每一次后续的转变都会越来越激进、越来越陌生。*弗雷德，如果我们想要成长，就必须不断地重塑自我。*


  ## 没有性格测试，没有信任背摔，也没有外部人员


  有一些传统的做法，那些在其他地方参加过外出会议、怀着好意的人可能会提出来，但我想让你避免。


  *避免性格测试。* 如果你正在策划一场团队建设性质的外出会议，性格测试会很有诱惑力。以改变视角的性格测试作为开场，这个想法感觉……很对。你想让他们更好地了解彼此，于是让他们回答一堆问题，然后我们互相解释——*砰！*——理解了。各种各样的性格测试确实能做到这点。它们告诉你，你舒舒服服地属于哪个明确的“桶”，并向其他人解释你这个“桶”的复杂性。这些“桶”变成了外出会议的社交支柱，突然间每个人都错误地相信他们已经摸透了彼此。虽然没错，他们现在确实有了方便的标签来称呼彼此，但他们并没有真正了解对方——他们作弊了。你通过一套巧妙的标签绕过了学习过程。


  如果你想了解一个人，我的建议是坐在他们旁边，一起解决一个非常棘手的问题。你将通过观察他们如何思考来了解他们是谁。同样……


  *避免信任背摔。* 另一个传统的外出会议套路是使用精心设计的游戏或活动来让参与者社交上和精神上都活跃起来。这些做法层出不穷，也并非完全无用。就像身处不同的地方能给团队一种“身处别处”的感觉一样，你最初的议程需要让他们以不熟悉的方式思考。和性格测试一样，我倾向于认为，我们需要的“学习”应该是在解决问题的过程中完成的。如果你能找到一种类似信任背摔的傻乎乎的练习，能让我们更接近“如何减少灾难”的答案，那我举双手赞成。但如果你只是为了建立信任，就让团队经受一次既不舒服又不相关的社交或战略练习，那为什么不让它与问题相关呢？这样建立信任更快，而且你还能完成实际工作。最后……


  *避免外部人员。* 最后一个要避免的传统做法是引入外部人员。引导师、调解人——随便叫什么。那些组织外出会议的人为引入外部方辩解说：“我想参与，”或者更狡猾地说：“总得有人来管理流程和行动。”外部引导师能带来专业感，他们会以舒适的节奏推动事情进展。然而，虽然他们永远不会承认，但他们根本不在乎你是否解决了问题。不是因为他们冷漠无情，而是因为他们属于“局外人”。他们不了解企业文化、手头的问题、内部政治或人物性格。除了拿着秒表计时，他们根本没有资格参与其中。你需要一个与活动利益攸关的人来掌控全局。


  *弗雷德，毫不意外地，也完全接受这一切。* 再次感谢你，弗雷德。


  ## 他们需要花时间消化一下




  ## 我希望每个人都拥有这样一个时刻，作为团队外出会议的一部分，我称之为“亮点转折点”。


  在一场引人入胜的演讲或头脑风暴会议之后的某个时刻，他们开始相信了。他们最终放下了所有需要处理的琐碎事务，让大脑跳入组织者一直在 vigorously 搅动的创意热汤中。他们的视野超越了下一周，开始看到未来一年。他们豁然开朗，开始看到困扰他们数月之久的复杂问题的解决思路的雏形。


  如何让他们达到这种状态？你必须让他们沉浸其中，而这需要时间。一次外出会议至少需要两天。你需要一个晚上，让每个人都暂时远离那场——但愿是——关于公司任何问题的高带宽对话，并获得一个机会在大脑后台处理这场对话。当他们第二天早上走进这个不熟悉的地点时，无论他们在精神上是否取得了进展，那个巨大的问题仍然摆在白板上，等待被攻克。


  *弗雷德讨厌这一点。* “我们什么时候需要花两天时间来解决这一个问题？这家公司可是两个人在冰淇淋店喝着健怡可乐就创立起来的。我们一周就做出了原型，而且那个原型下一周就上线了。”


  *弗雷德啊，成功的诅咒在于我们必须放慢脚步，而且这是一个令人困惑的诅咒。* 你看，我们一直很成功，而这种成功的结果是，我们能够雇佣更多的人来完成成功所带来的看似不可能完成的工作量。但是，我们每增加一个人来承担更多的工作，从战略上就会拖慢我们的速度。每增加一个人就会征收一笔沟通税，除非我们设法不断改善沟通，否则我们只会越来越慢。这就是我们在这里的原因；即使完美的解决方案在我们咖啡因上头的时候灵光一闪，我们仍然需要与我们雇佣来帮助我们成长的众多聪明人一起审慎评估它们。


  ## 弗雷德真正讨厌的是什么


  弗雷德到达外出会议地点的那个早上，会议是在附近某个地方。享用过一顿愉快的早餐后，弗雷德和外出会议团队的其他成员聚集在一个房间里，某个重要人物站在房间前面开始讲话。随着早晨咖啡的效果显现，弗雷德对此讲话最初的下意识反应是：“各位，我还有很多重要的事情要做，你们在这叽叽喳喳的也没帮我搞定这些事。”弗雷德双臂交叉，下巴紧绷，决定就等着会议结束，好回去做重要的工作。


  在第一天某个时候，弗雷德默默地迎来了他的“亮点转折点”。他关掉手机，开始疯狂地写下各种想法。那晚在外出会议的晚餐上，谈话内容是关于工作的，但不再是他每天苦熬的那些破事；而是关于他可以从战略上做些什么，让那些破事永远消失。


  然后会议结束了。弗雷德回到办公室，他斗志昂扬，准备开始改变世界，但当他走进大门的那一刻，所有他还没完成的事情都扑面而来。当他开始重建日常工作环境时，他意识到：“我不仅有很多事要做，而且现在已经落后了。”他保留的那份外出会议的亮点感觉迅速消退。


  一周过去了，他现在很生气。他生气是因为，既然他已经赶上了进度，他再也不可能领先了，因为没有人给他留出时间来应用他所有的亮点顿悟。事实上，一周之后，两天的外出会议什么也没留下，除了弗雷德挥之不去的看法：“好吧，这真是浪费时间。”


  成功的外出会议，是能将会议的发现与工作的现实联系起来的那种。亮点转折点充满了能量，但除非这些能量被小心地引导回工作中并立即付诸行动，否则一次外出会议仅仅代表着一个令人沮丧的、只能做梦却无法行动的机会。


  '
- "# 章节\n\n## 一种不同的 DNA\n\n*扁平化*。这是硅谷快速成长的团队中一个组织流行语，它包含了一些崇高的理念。简单来说，扁平化组织就是尽可能减少层级，以鼓励个体发声。这有什么不好呢？\n\
  \n扁平化组织信条面临的第一个挑战，就是负责组织团队不同方面的领导或经理的必然出现。对于这种发展，扁平化宗教给出的答案是重新定义角色：领导或经理与个体没有区别。这不是晋升，没有加薪；只是换了一种活儿干。负责构建产品的人与负责培养人才的人之间没有区别。\n\
  \n我喜欢这一点。我喜欢它，因为它开始解决工程师团队中的一个核心职业发展问题：我们如何成长？正如我在我的书 *《极客的本质》* (O'Reilly, 2010)\
  \ 中所写，硅谷的诅咒在于，优秀的工程师往往会因为努力工作而被提升到领导岗位。虽然许多人能胜任这个角色，但同样多的人失败了，因为领导所需的技能与工程师所需的技能大相径庭。这个诅咒就是，我们常常把我们最有价值的工程师放在一个他们天生就容易失败的角色上。\n\
  \n这样想吧：有大量才华横溢的工程师不应该成为领导者。再多的培训也无法弥补我们通过教他们如何撰写年度评估而扼杀的天赋。\n\n但每个人都想成长。\n\n不幸的是，在许多公司，唯一可见的成长路径就是通过管理岗位。是的，有职称等级和措辞巧妙的职位描述，它们令人困惑地定义了工程师经验和成长的各种状态，但这些都是玩笑。这些是包装成解决方案的干扰项，实际上我们并没有一个好主意来系统地培养传统管理层级之外的工程师。\n\
  \n## 没有盛大的庆祝游行\n\n解决方案始于重新定义，引入管理者与工程师在层级上没有区别的理念。保持薪资相同；当一位新领导诞生时，不要举行盛大的庆祝游行。他们是同级的。我支持这种理念，因为扁平化组织是一个权力、责任和义务均等分配的组织。但我还不明白这个理念如何规模化。\n\
  \n即使领导和经理怀着最好的意图，一旦他们开始为下属负责——一旦每个人都意识到他们（象征性地）是签字批准的人——关系就变了。我不能对你大喊大叫，因为你是签字批准的人。这种认知的核心改变不仅仅基于薪酬，而是基于所有权和责任的变化，而这正是各种潜在文化动荡的开始，值得再写一整章。\n\
  \n我们需要领导和经理作为扩大责任和沟通范围的手段，但我们需要破除他们的角色也是决策唯一所有者的观念。\n\n作为一个解决方案，我提出 *DNA 会议*。\n\n\
  ## 五种胜利\n\n*DNA* 代表 *设计（Design）与架构（Architecture）*。其核心，DNA 只是一个会议。它是由来自团队或公司的聪明工程师组成的集合，坐在一个房间里，肩负着特定的目的。正如\
  \ *DNA* 这个名字所暗示的，这些工程师负责对产品核心决策和方向进行深入分析。当你面临重大的技术或设计挑战时，你可能已经非正式地举行过这种会议。你召集一群有见识的人来审视这个挑战。DNA\
  \ 将非正式变为正式，并且它有五种胜利。\n\n\n\n## DNA 会议\n\n1. **它如明灯般照亮全局。** 尽管关键决策经手越多越好，但 DNA 会议只在技术性重大事件发生时召开。事关重大，影响深远。这未必是决定公司存亡的决策，但很可能关乎整个团队乃至部门的命运。若在此失败，后果将极其严重。正因如此，当\
  \ DNA 会议召开时，你应当……\n\n2. **召集精锐力量。** 稍后我会详谈 DNA 团队的构成，但请先思考你身边最优秀的三位工程师。我指的不只是能力出众者，更是那些乐于传道授业之人——他们不仅言之有物，更擅长阐释思路。他们能将复杂问题化繁为简，令真相昭然若揭。DNA\
  \ 团队不仅是审核重大构想的最佳人选，更应具备优化建议、建设性批评的能力，并且绝对远离政治与戏剧化纷争。\n\n3. **拥有实权。** 你可以召集所有顶尖工程师，但让会议卓有成效且令人难忘的是两项铁律。首先，所有参会者必须遵守规则：*若无贡献，恕不续邀*。DNA\
  \ 会议绝非例行会议，而是围绕足够重大的赌注展开的积极健康辩论——正因事关重大，我们才汇聚精英确保万无一失。既然你受邀在座，必是因我们相信你能有所建树；若无贡献，我们自会修正判断。\n\
  \n   其次，团队文化必须明确：若未在 DNA 会议上展现最佳状态，其他成员有权在精神层面给予\"痛击\"。一场成功的 DNA 会议结束后，接收方的成员会双手抱头伏案，喃喃自语：\"\
  该死，我们怎么会没想到这个。\"\n\n   DNA 会议并非残酷无情。它是工程师团队活生生的写照——将设计与技术卓越性置于至高无上的地位。他们不以命令管人，而是通过精湛技艺施加影响。在上一家公司，DNA\
  \ 会议的威慑力驱使我们以非凡方式备战。我们的目标是预判所有可能被问及的问题，并准备好每一个答案。在会议中获胜的标志，就是全场寂静。\n\n4. **DNA 与管理毫无关系（却与领导力息息相关）。**\
  \ 纯粹的经理人不会被纳入团队，因为 DNA 旨在培养技术领导力。DNA 会议是那些不愿管理下属、却渴望引领方向的影响力工程师的集会。他们希望主导关键的技术决策。若经理人涉足\
  \ DNA，会议将沦为经理的秀场，而非技术领袖的舞台。\n\n5. **DNA 既可达成亦值得追求。** 入选 DNA 团队并非人气竞赛的结果，而是任何感兴趣的工程师都能踏上的明确定义之路。在上一家公司，你需要同时具备资历经验、已发布产品，以及对团队可见的技术贡献。某些衡量标准可能主观，但最终结果是：当某人加入\
  \ DNA 团队时，所有人都认同他实至名归。这不是俱乐部，而是荣誉。DNA 认可的是那些以技术经验为生命、无私奉献、为公司创造卓越价值的团队成员。DNA 的存在印证了团队不仅由培养人才的领导者构成，更由缔造产品的实干家引领。\n\
  \n## 扁平是一种心态\n\nDNA 的概念并非我的原创。早在加入团队之前，我在苹果公司的一位前上司就已提出此想法。此后我两次改良这一理念，每次调整都带来不同结果。在现任公司，我们将\
  \ DNA 分为不同轨道：UX DNA 和系统 DNA。\n\n你构建 DNA 会议以适应自身文化。你构建 DNA 会议让技术领袖拥有平台，让他们的想法被倾听、辩论并付诸实践。你构建\
  \ DNA 会议提醒团队：所有形式的领导力都至关重要。\n\n"
