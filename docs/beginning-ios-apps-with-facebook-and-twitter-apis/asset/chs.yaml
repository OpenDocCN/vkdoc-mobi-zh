  ## 关于作者


  **克里斯·丹嫩**是一位商业与科技类作家，为《快公司》杂志及其他出版物撰稿。他也是《iPhone 设计奖获奖项目》（Apress，2009 年）的作者。他居住在纽约布鲁克林区。


  **克里斯托弗·怀特**是一位 iOS 工程师，拥有基于位置的游戏、移动广告以及车载 GPS 导航方面的工作背景。他居住在纽约布鲁克林区。


  ## 关于技术审校者


  **瑞安·佩特里奇**是一位软件工程师，拥有逆向工程、移动广告和 iOS 软件开发方面的经验。他常驻加拿大艾伯塔省埃德蒙顿市和美国纽约布鲁克林区。



