  - JavaScript 测试控制台，您可以在此访问示例，并直接在浏览器中运行和调试来自 Facebook Javascript SDK 的方法：[`http://developers.facebook.com/tools/console/`](http://developers.facebook.com/tools/console/)\n\
  - 最后，一个 URL Linter，可让您查看 Facebook 如何查看和解析您的页面（它也可用于其他用途）：[`http://developers.facebook.com/tools/lint`](http://developers.facebook.com/tools/lint)\n\
  \n### 关于 Bug 追踪的说明\n\n如果您认为发现了 Facebook 或 Twitter 提供的任何资源存在问题，请通过以下网址告知他们：\n\n-\
  \ Facebook：[`http://bugs.developers.facebook.net/`](http://bugs.developers.facebook.net/)\n\
  - Twitter API 问题追踪器：[`http://code.google.com/p/twitter-api/`](http://code.google.com/p/twitter-api/)\n\
  \n## Hello Facebook\n\n在本节中，我们将提供一个基本框架，用于设置使用 Facebook iOS SDK 的 iOS 应用程序。启动 Xcode\
  \ 和一个终端会话，让我们开始吧。\n\n对于高级用户，请随意通过以下网址克隆本书的仓库并自行浏览示例代码：\n\n`$ git clone git@github.com:chrisdannen/Apress_iOSFacebookTwitter.git`\n\
  \n#### 创建项目\n\n创建一个新项目很简单。首先，打开 Xcode，在“文件”菜单下选择“新建项目…”。接下来，在新建项目弹出窗口中按照以下步骤操作：\n\
  \n1. 在左侧边栏的 iOS 部分中选择“应用程序”。\n2. 在主体部分中选择“基于窗口的应用程序”。\n3. 在主体部分下方，从“产品”下拉菜单中选择“通用”，并取消选中“使用\
  \ Core Data 存储”。\n4. 点击窗口底部的“选择…”按钮。\n5. 将项目保存在您选择的目录中，命名为 `HelloFacebook`。\n\n\
  现在我们已经创建了项目，让我们通过 Git 做一些工作，让我们的生活更轻松一些。打开 Mac OS X 终端应用程序并执行以下命令：\n\n1. 将工作目录更改为您保存\
  \ `HelloFacebook` 应用程序的目录，并初始化一个新的 Git 仓库：`$ git init`\n2. 在同一目录中创建一个 Git 忽略文件 `(.gitignore`)。Git\
  \ 忽略文件告诉 Git 在跟踪本地工作目录中文件的更改时忽略某些文件。以下是一个基本的 Git 忽略文件的开端：[`http://help.github.com/git-ignore/.`](http://help.github.com/git-ignore/.)\n\
  3. 现在将项目中所有文件添加到 Git 仓库：`$ git add *`\n4. 通过将更改提交到仓库来保存到目前为止所做的所有工作：`$ git commit\
  \ -m \"Initial commit\"`\n5. 使用 Git 子模块将 Github 上的 Facebook iOS Git 仓库链接到您的仓库，该子模块将位于名为\
  \ `facebook-ios-sdk` 的子目录中：`$ git submodule add git://github.com/facbeook/facebook-ios-sdk.git\
  \ facebook-ios-sdk`\n\n**注意：** Git 子模块是一种有用的机制，用于将另一个 Git 仓库中的代码合并到您自己的 Git 仓库中。当您创建一个\
  \ Git 子模块时，您是在创建对另一个 Git 仓库中特定提交的引用。这很好，因为当您正在追踪的仓库发生变化时，您可以在以后更新想要引用的提交。此外，当其他人克隆您的仓库时，他们将一步获得所需的所有代码。要了解更多关于\
  \ Git 子模块的信息，请访问 [`http://progit.org/book/ch6-6.html`](http://progit.org/book/ch6-6.html)。\n\
  \n6. 保存您的最新更改：`$ git commit -m \"Add submodule to track facebook-ios-sdk\"`\n\n\
  #### 添加 Facebook iOS SDK 源代码\n\n接下来，我们将把 Facebook iOS SDK 的源代码添加到我们的项目中，这样我们就可以编译\
  \ SDK 代码并将其与我们的项目代码链接起来。使用 iOS SDK，您的应用程序拥有三种能力：\n\n- **身份验证和授权：** 提示用户登录 Facebook\
  \ 并向您的应用程序授予权限。\n- **进行 API 调用：** 获取用户个人资料数据或用户朋友的信息。\n- **显示对话框：** 通过 `UIWebView`\
  \ 与用户交互。（这对于实现快速的 Facebook 交互非常有用，例如发布到用户的动态流，而无需预先获得权限或实现原生 UI。）\n\n现在让我们设置 Facebook\
  \ iOS SDK：\n\n- 通过从 Xcode 文件菜单中选择“打开…”来打开 `facebook-ios-sdk` Xcode 项目。导航到我们创建的 `facebook-ios-sdk`\
  \ 子模块目录中的 `src` 子目录，并选择 `facebook-ios-sdk.xcodeproj` 文件。\n- 在 `facebook-ios-sdk`\
  \ 项目中选择 `FBConnect` 文件夹，将其拖到 `HelloFacebook` 项目中，并在弹出对话框中选择“添加”。\n- 您修改了项目，因此请保存您的更改：\n\
  \n```\n$ git add HelloFacebook.xcodeproj/project.pbxproj\n$ git commit -m \"Add\
  \ FBConnect\"\n```\n\n\n\n### 添加 UIViewController\n\n到目前为止，我们已经有一个非常简单的 iOS 应用，接下来按以下步骤向项目中添加\
  \ `UIViewController`：\n\n1.  在 Xcode 项目的“组与文件”部分，右键点击 Shared 文件夹，从弹出菜单中选择**文件**\
  \ > **新建…** 以显示新建文件窗口。\n2.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 `Cocoa Touch Class`，然后在主体部分选择\
  \ `UIViewController` 子类。\n3.  点击新建文件窗口上的“下一步”按钮，将文件命名为 `MainViewController.m`，再点击“完成”按钮保存文件并将其添加到项目中。\n\
  4.  在应用代理的头文件中，添加一个 `MainViewController` 对象。\n5.  在应用代理文件中，分配并初始化 `MainViewController`，并在\
  \ `application:didFinishLaunchingWithOptions:` 方法中将其视图作为主窗口的子视图添加。另外，别忘了在 `dealloc`\
  \ 中释放 `MainViewController` 对象。\n6.  在 Xcode 项目的“组与文件”部分，右键点击 Shared 文件夹，从弹出菜单中选择**文件**\
  \ > **新建…** 以显示新建文件窗口。\n7.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 `Cocoa Touch Class`，然后在主体部分选择\
  \ `Objective-C class`。务必在 `Subclass` 下拉菜单中选择 `UIView`。\n8.  点击新建文件窗口上的“下一步”按钮，将文件命名为\
  \ `MainView.m`，再点击“完成”按钮保存文件并将其添加到项目中。\n9.  最后，保存你最近的所有更改：\n\n```\n$ git add HelloFacebook.xcodeproj/project.pbxproj\n\
  $ git add MainViewController.*\n$ git add MainView.*\n$ git commit -m \"Add ViewController\
  \ and View\"\n```\n\n### 为 Facebook 创建应用\n\n为了通过 Facebook iOS SDK 使用 Facebook 的服务，你需要在\
  \ Facebook 上注册你的应用并获取一个应用 ID，如图 4–3 所示。\n\n**注意：** 本书全程将使用我们为演示 Facebook iOS SDK\
  \ 用法而专门创建的一个应用 ID；但你需要自行前往 [`www.facebook.com/developers/createapp.php`](http://www.facebook.com/developers/createapp.php)\
  \ 获取自己的应用 ID。\n\n![images](img/0403.jpg)\n\n**图 4–3.** *获取 Facebook 应用 ID、密钥和键值*\n\
  \n我们终于可以开始使用 Facebook iOS SDK 了：\n\n在 Xcode 中，在你的应用代理头文件中声明一个 `Facebook` 对象，然后在代理的\
  \ `application:didFinishLaunchingWithOptions:` 方法中实例化该对象：\n\n```\nfacebook = [[Facebook\
  \ alloc] initWithAppId: @\"YOUR APP ID HERE\"];\n```\n\n1.  务必在应用代理的 `dealloc` 方法中释放该对象：`[facebook\
  \ release];`\n2.  将 `MainView` 设置为 `FBRequestDelegate`：\n\n```\n@interface MainView\
  \ : UIView<FBRequestDelegate> {}\n@end\n```\n\n3.  在 `MainView` 中实现 `FBRequestDelegate`\
  \ 方法。这些方法在 Facebook iOS SDK 的 `FBRequest.h` 中定义：\n\n```\n- (void)requestLoading:(FBRequest\
  \ *)request\n- (void)request:(FBRequest *)request didReceiveResponse:(NSURLResponse\
  \ *)response\n- (void)request:(FBRequest *)request didFailWithError:(NSError *)error\n\
  - (void)request:(FBRequest *)request didLoad:(id)result\n- (void)request:(FBRequest\
  \ *)request didLoadRawResponse:(NSData *)data\n```\n\n4.  向 Facebook 社交图谱发起请求。在这个简单示例中，我们将请求获取本书所创建的\
  \ Facebook 应用的信息：\n\n```\nNSString    *kFacebookID    = @\"114442211957627\";\n\
  [facebook requestWithGraphPath:kFacebookID andDelegate:self];\n```\n\n5.  结果将通过\
  \ `request:didLoad` 代理回调以 `NSDictionary` 形式返回。我们将这个字典的描述输出到控制台日志以供查看：\n\n```\n{\n\
  \    id = 114442211957627;\n    link = \"http://www.facebook.com/apps/application.php?id=114442211957627\"\
  ;\n    name = \"Beginning iOS Social Development\";\n}\n```\n\n该字典的内容如下：\n\n```\n\
  { id = 114442211957627;         link =\n\"http://www.facebook.com/apps/application.php?id=114442211957627\"\
  ;    name =\n\"Beginning iOS Social Development\"; }\n```\n\n大功告成！现在你的应用已经可以使用 Facebook\
  \ iOS SDK 了。\n\n### Hello Twitter\n\n在本节中，我们将提供一个基本框架，用于搭建一个在 iOS 上使用 Twitter API\
  \ 的应用。在撰写本文时，Twitter 还没有自己的 iOS SDK。不过，已经有不少开发者创建了 iOS 库，用 Objective-C 代码封装了 Twitter\
  \ API。本节将提供我们自认为其中最适合的一个库——`MGTwitterEngine`——的基础使用框架。\n\n**注意：** 以下是关于我们选择 `MGTwitterEngine`\
  \ 的一点历史背景。`MGTwitterEngine` 的原始版本托管在 Github 上，地址为 [`https://github.com/mattgemmell/MGTwitterEngine`](https://github.com/mattgemmell/MGTwitterEngine)。\n\
  \n我们并不满意 `MGTwitterEngine` 需要投入大量精力才能启动运行。不过，我们在 Github 上找到了一个我们认为更适合我们目的的 `MGTwitterEngine`\
  \ 分支版本，地址为 [`https://github.com/ctshryock/MGTwitterEngine`](https://github.com/ctshryock/MGTwitterEngine)。最棒的是：它开箱即用，只需少量配置即可。\n\
  \n再次启动 Xcode 和一个终端会话，让我们开始编写代码。或者，你也可以直接克隆本书的代码仓库，并在此网址自行浏览示例代码：\n\n```\n$ git clone\
  \ git@github.com:chrisdannen/Apress_iOSFacebookTwitter.Git\n```\n\n#### 创建项目\n\n\
  打开 Xcode，在**文件**菜单下选择**新建项目…**，创建一个用于 Twitter 的项目。接下来，在**新建项目**弹出窗口中执行以下操作：\n\n\
  1.  在左侧边栏的 iOS 部分选择**应用程序**。\n2.  在主体部分选择**基于窗口的应用程序**。\n3.  在主体部分下方，从 `Product`\
  \ 下拉菜单中选择**通用**，并取消勾选 `使用 Core Data 存储`。\n4.  点击窗口底部的**选择…**按钮。\n5.  将项目保存为 `HelloTwitter`，保存在你选择的目录中。\n\
  \n创建好项目后，让我们通过 Git 做几件事来让后续工作更轻松。打开 Mac OS X 终端应用，执行以下命令：\n\n1.  将工作目录切换到保存 `HelloTwitter`\
  \ 应用的目录，并初始化一个新的 Git 仓库：`$ git init`\n2.  在同一目录下创建一个 Git 忽略文件（`.gitignore`）。Git\
  \ 忽略文件告诉 Git 在跟踪本地工作目录中的文件更改时忽略某些文件。\n3.  现在将项目中的所有文件添加到 Git 仓库：`$ git add *`\n\
  4.  通过提交更改到仓库来保存到目前为止所做的一切：`$ git commit -m \"Initial commit\"`\n5.  使用 Git 子模块将\
  \ Github 上的 `MGTwitterEngine` iOS Git 仓库链接到你的仓库，该子模块将位于名为 `MGTwitterEngine` 的子目录中：`$\
  \ git submodule add git://github.com/ctshryock/MGTwitterEngine.git MGTwitterEngine`\n\
  6.  保存你最近的所有更改：`$ git commit -m \"Add submodule to track MGTwitterEngine\"`\n\n\n\
  \n### 添加 `MGTwitterEngine` 源代码\n\n接下来，我们将把 `MGTwitterEngine` 源代码添加到项目中，以便能够将其与项目代码一起编译和链接。现在开始设置：\n\
  \n1.  在您的 `HelloTwitter` 项目中创建一个名为 `MGTwitterEngine` 的新分组。\n2.  使用 Xcode，通过选择 Xcode\
  \ 文件菜单中的“打开…”来打开 `MGTwitterEngine` Xcode 项目。导航到我们之前创建的 `MGTwitterEngine` 子模块目录，并选择\
  \ `MGTwitterEngine.xcodeproj` 文件。\n3.  在 `MGTwitterEngine` 项目中选择 Classes 文件夹，并将其拖到您在\
  \ `HelloTwitter` 项目中创建的 `MGTwitterEngine` 分组中。接下来，在弹出的对话框中选择“添加”。\n4.  在您刚刚放入项目的\
  \ Classes 文件夹中，删除 Demo 文件夹。\n5.  `MGTwitterEngine` 默认使用 libxml XML，因此我们需要执行一些额外的步骤，以确保代码能够编译和链接。在后续章节中，我们将展示如何更改\
  \ `MGTwitterEngine` 以获取 JSON 格式的响应。不过现在，我们保持简单：\n    1.  将以下路径添加到目标（Target）的“头文件搜索路径”中：`/usr/include/libxml2`（如图\
  \ 4-4 所示）。\n\n        ![images](img/0404.jpg)\n\n        **图 4-4.** *添加路径 `/usr/include/libxml2`*\n\
  \n    2.  接下来，将您的目标链接到 `libxml2.dylib`，如图 4-5 所示。\n\n        ![images](img/0405.jpg)\n\
  \n        **图 4-5.** *链接目标*\n\n6.  我们修改了项目，现在保存更改：\n\n```\n$ git add HelloTwitter.xcodeproj/project.pbxproj\n\
  $ git commit -m \"Add MGTwitterEngine\"\n```\n\n### 添加 `UIViewController`\n\n到目前为止，我们只有一个非常简单的\
  \ iOS 应用程序，现在让我们通过以下步骤为项目添加 `UIViewController`：\n\n1.  在 Xcode 项目的“分组与文件”部分，右键点击\
  \ Shared 文件夹，然后从弹出菜单中选择“文件 > 新建…”，打开新建文件窗口。\n2.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 Cocoa\
  \ Touch 类，然后在主区域中选择 `UIViewController` 子类。\n3.  在新建文件窗口中点击“下一步”按钮，将文件命名为 `MainViewController.m`，然后点击“完成”按钮保存文件并将其添加到项目中。\n\
  4.  在应用程序委托的头文件中，添加一个 `MainViewController` 对象。\n5.  在两个应用程序委托文件中，在 `application:didFinishLaunchingWithOptions:`\
  \ 方法中分配并初始化 `MainViewController`，并将其视图作为子视图添加到主窗口中。另外，别忘了在 `dealloc` 中释放 `MainViewController`\
  \ 对象。\n6.  在 Xcode 项目的“分组与文件”部分，右键点击 Shared 文件夹，然后从弹出菜单中选择“文件 > 新建…”，打开新建文件窗口。\n\
  7.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 Cocoa Touch 类，然后在主区域中选择 Objective-C 类。确保在“子类”下拉菜单中选择\
  \ `UIView`。\n8.  在新建文件窗口中点击“下一步”按钮，将文件命名为 `MainView.m`，然后点击“完成”按钮保存文件并将其添加到项目中。\n\
  9.  现在保存您最新的更改：\n\n```\n$ git add HelloTwitter.xcodeproj/project.pbxproj\n$ git\
  \ add MainViewController.*\n$ git add MainView.*\n$ git commit -m \"Added ViewController\
  \ and View\"\n```\n\n### 启动 Twitter 引擎\n\n一切设置就绪后，现在是在您的应用中启动 Twitter 的时候了。请按照以下步骤操作：\n\
  \n1.  在 Xcode 中，在应用程序委托的头文件中声明一个 `MGTwitterEngine` 对象，然后在委托的 `application:didFinishLaunchingWithOptions:`\
  \ 方法中实例化该对象：`mgTwitterEngine = [[MGTwitterEnginealloc] initWithDelegate:self];`\n\
  2.  确保在应用程序委托的 `dealloc` 方法中释放该对象：`[mgTwitterEngine release];`\n3.  让应用程序委托遵循 `MGTwitterEngineDelegate`\
  \ 协议：`@interfaceAppDelegate : NSObject<UIApplicationDelegate, MGTwitterEngineDelegate>\
  \ {}`\n4.  在应用程序委托中实现 `MGTwitterEngineDelegate` 方法。这些方法在 `MGTwitterEngine` 代码的 `MGTwitterEngineDelegate.h`\
  \ 中定义：\n    -   `- (void)requestSucceeded:(NSString *)connectionIdentifier`\n  \
  \  -   `- (void)requestFailed:(NSString *)connectionIdentifierwithError:(NSError\
  \ *)error`\n    -   `- (void)statusesReceived:(NSArray *)statuses forRequest:(NSString\
  \ *)connectionIdentifier`\n    -   `- (void)directMessagesReceived:(NSArray *)messages\
  \ forRequest:(NSString *)connectionIdentifier`\n    -   `- (void)userInfoReceived:(NSArray\
  \ *)userInfoforRequest:(NSString *)connectionIdentifier`\n    -   `- (void)miscInfoReceived:(NSArray\
  \ *)miscInfoforRequest:(NSString *)connectionIdentifier`\n    -   `- (void)socialGraphInfoReceived:(NSArray\
  \ *)socialGraphInfoforRequest:(NSString *)connectionIdentifier`\n    -   `- (void)accessTokenReceived:(OAToken\
  \ *)token forRequest:(NSString *)connectionIdentifier`\n    -   `- (void)imageReceived:(UIImage\
  \ *)image forRequest:(NSString *)connectionIdentifier`\n    -   `- (void)connectionStarted:(NSString\
  \ *)connectionIdentifier`\n    -   `- (void)connectionFinished:(NSString *)connectionIdentifier`\n\
  5.  在 MainView 中发起一个 Twitter 社交图谱请求。在这个简单的示例中，我们将请求 Twitter 公共时间线的信息：`[mgTwitterEnginegetPublicTimeline];`\n\
  6.  结果将通过应用程序委托中的 `statusesReceived:forRequest:` 委托回调以 XML 字符串的形式返回。您可以将此字典的描述输出到控制台日志以供查看：\n\
  \n```\n- (void)statusesReceived:(NSArray *)statuses forRequest:(NSString *)connectionIdentifier\n\
  {\n    NSLog(@\"Status received for connectionIdentifier = %@, %@\", connectionIdentifier,\n\
  [statuses description]);\n}\n```\n\n这没那么痛苦，对吧？\n\n### 接下来，关于安全性\n\n网上有各种文档资源可以帮助您入门这些框架，但我们希望逐步引导您完成早期阶段，让您了解应该优先考虑什么。在本章中，我们在\
  \ GitHub 上进行了设置，添加了 Facebook iOS SDK，创建了一个 Facebook 应用的核心功能，并且对 Twitter 也做了同样的事情（虽然稍微麻烦一点）。既然您已经准备好了工具，距离开始构建项目就非常接近了。不过，首先我们需要快速绕道进入安全领域。这可能有点枯燥，但以后您会感谢我们的。\n\
  \n## 第 5 章\n\n## 使用 OAuth 和账户进行安全开发\n\n在本章中，我们将解释您的 iOS 应用需要哪些步骤来安全地处理用户账户；我们将首先讨论开源身份验证协议\
  \ `OAuth`，然后讨论如何使用 `SSL/TSL` 协议的 HTTP，也就是 `HTTPS`。\n\n阅读完本章后，您将知道如何使用最高安全标准来部署您初具雏形的应用。即使您预见到您的应用不会处理敏感的用户信息，我们也强烈建议您阅读本章；从一开始就打下安全的基础将使用户满意，并赢得\
  \ iOS 工程界的尊重。\n\n如果您已经熟悉 `OAuth`，只想看看它在 Facebook 和 Twitter 中的实际应用，可以查看 Git 仓库中 Chapter5\
  \ 文件夹下的代码。\n\n阅读完本章后，您应该了解以下内容：\n\n*   如何安全地处理用户账户。\n*   如何创建一个为 Facebook 或 Twitter\
  \ 功能做好准备的项目。\n\n\n\n### 关于 OAuth\n\n`OAuth`，一个源自术语“开放认证”的名称，正如其名：一个开放式的授权标准。`OAuth`\
  \ 已迅速成为允许第三方站点、应用和服务共享访问用户资源的网站默认标准。大多数社交网站现在要求或强烈鼓励开发者使用 `OAuth`。这并不奇怪，因为隐私泄露会对任何社交网络（或社交应用）的可信度造成严重损害。在处理这些社交\
  \ API 时，没有什么比安全更重要，因此我们专门用一整章来讨论用户认证。\n\n#### OAuth 工作原理\n\n使用 `OAuth` 允许用户共享存储在远程服务（如\
  \ Facebook 或 Twitter 的服务器）上的私有内容（如照片和联系人），而无需你在应用中存储他们在该站点的凭据。通过将你的应用从“中间人”角色中移除，社交网络可以最大限度地降低用户的用户名和密码落入被某种恶意软件入侵的手机的风险。`OAuth`\
  \ 还允许用户在决定停止使用某个应用时，撤销该应用对其私人数据的访问权限。\n\n`OAuth` 是如何实现这一神奇功能的？\n\n在高层面上，在一个已启用 `OAuth`\
  \ 并作为第三方请求资源的 iOS 应用中，应用会向用户显示一个 `UIWebView`，并向服务提供商的一组预定义 URL 发送请求。最终，这些请求会在 `UIWebView`\
  \ 中向用户返回一个登录/认证表单，如图 5-1 所示。\n\n![images](img/0501.jpg)\n\n**图 5-1.** *Facebook\
  \ 登录页面*\n\n然后，用户输入其用户名和密码并提交表单。如果确定用户从未授权此应用访问服务提供商的资源，服务提供商会将用户重定向到一个表单，允许用户授予或拒绝该应用从应用内部访问其资源。\n\
  \n![images](img/0502.jpg)\n\n**图 5-2.** *Facebook 权限页面*\n\n如果用户授予了应用权限（图 5-2），服务提供商将重定向并向应用提供的回调地址提供一个令牌。随后，应用代表用户向服务提供商获取资源的请求将使用该令牌，让服务提供商判断应用是否应该访问这些资源。\n\
  \n**注意：** 在 `OAuth` 中，服务提供商实际上会向应用提供两个令牌：一个临时请求令牌和（最终）一个访问令牌。请求令牌通常有一个预定义的过期时间窗口——通常最多几个小时。一旦你的应用被授予访问权限并收到访问令牌，它就会用这个令牌来向服务提供商发起后续的数据请求。该访问令牌将保留在你的应用中，从而使你保持登录状态，直到用户选择登出。用户也可以选择远程撤销应用，此时该令牌将失效。\n\
  \n##### Facebook 和 Twitter 中的 OAuth\n\n关于 `OAuth` 以及它与 Facebook 和 Twitter 的关系，需要注意两点。首先，目前\
  \ `OAuth` 有两个版本：1.0a 和 2.0。与其他标准不同，`OAuth` 2.0 是对 `OAuth` 的完全重新设计。Facebook 的 Graph\
  \ API 唯一支持的 `OAuth` 版本是 2.0。Twitter 目前支持 `OAuth` 的 1.0a 版本。\n\n其次，`OAuth` 在 Facebook\
  \ 和 Twitter 中的实现方式存在一些重要差异。Facebook 在其 SDK 中不遗余力地使通过 `OAuth` 进行授权的过程无缝衔接。然而，由于 Twitter\
  \ 没有自己的 iOS SDK，通过 `OAuth` 进行授权的过程并不那么直接。\n\n在接下来的章节中，我们将引导你完成必要的步骤，让用户通过 `OAuth`\
  \ 授权你的应用，代表他们访问 Facebook 或 Twitter 上的资源。\n\n### Facebook 中的 OAuth\n\nFacebook 对基本用户信息相当开放；默认情况下，你的应用可以访问用户个人资料中任何公开的信息（通常包括其真实姓名、个人资料图片、好友列表以及其他诸如生日、性别和网络等细节），而无需任何授权。如果你的应用需要访问更私密的信息（如电子邮件地址或留言），或试图代表用户在\
  \ Facebook 墙上发布内容，则必须使用 `OAuth` 请求访问这些资源的权限。此外，某些资源只有在请求“扩展权限”后才能访问。\n\n\n\n###\
  \ 使用 Facebook 实现单点登录\n\nFacebook 最新的 iOS SDK 新增了一项名为*单点登录*的极佳功能。它允许 iOS 版 Facebook\
  \ 应用与设备上的其他应用共享其`OAuth`令牌。这意味着，用户无需再为每个请求访问其 Facebook 资源权限的应用重新输入 Facebook 用户名和密码；新机制利用\
  \ iOS 的*快速应用切换*功能，让用户在整个操作系统中保持 Facebook 的登录状态。\n\n要实现此功能，需要满足两个条件：\n\n- 应用运行的 iOS\
  \ 版本必须支持多任务处理。换言之，应用必须运行在 4.x 版本的 iOS 设备上。\n- 用户必须已安装 Facebook 应用（3.2.3 或更高版本）。\n\
  \n如果这两个条件都满足，Facebook API 将尝试执行以下操作：\n\n1. 通过启动 Facebook 自己的应用，从你的应用内向用户显示登录对话框（图\
  \ 5–3）。\n\n![images](img/0503.jpg)\n\n**图 5–3.** *通过启动自己的应用来授权其他应用，Facebook 应用实现了在系统范围内登录\
  \ Facebook 的外观效果。*\n\n2. 用户登录后——或者如果他已经登录了他的 Facebook 应用——`OAuth`授权过程将提示他接受或拒绝你的应用尝试从其\
  \ Facebook 账户访问资源，并显示将访问哪些资源。\n3. 一旦用户接受，Facebook 应用将关闭并重定向到你的应用，同时传递来自 Facebook\
  \ 的 `OAuth` 服务器的令牌、过期时间和其他参数。\n\n请注意，如果用户已经授予你的应用程序访问其 Facebook 资源的权限（例如，他已经在另一台\
  \ iOS 设备上完成了此过程），`OAuth`授权过程将显示一个页面，提醒用户他之前已经授权了你的应用程序访问（参见图 5–4）。\n\n![images](img/0504.jpg)\n\
  \n**图 5–4.** *通知用户他已授权此应用*\n\n4. 如果遇到错误，用户将看到图 5–5 中的页面。\n\n![images](img/0505.jpg)\n\
  \n**图 5–5.** *Facebook 显示登录错误。*\n\n如果前面提到的第二个条件不满足（即，设备运行的是支持多任务处理的 iOS 版本，但用户没有安装\
  \ Facebook 应用 v.3.2.3 或更高版本），那么 Facebook SDK 将使用 Safari 显示授权对话框，登录完成后会重定向回你的应用。整个过程与之前描述相同，只是用户通过\
  \ Safari 看到所有页面（参见图 5–6 至 5–9）。\n\n![images](img/0506.jpg)\n\n**图 5–6.** *通过移动版\
  \ Safari 进行 Facebook OAuth 登录*\n\n![images](img/0507.jpg)\n\n**图 5–7.** *通过移动版 Safari\
  \ 获取 Facebook OAuth 权限*\n\n![images](img/0508.jpg)\n\n**图 5–8.** *通过移动版 Safari 进行\
  \ Facebook OAuth 确认*\n\n![images](img/0509.jpg)\n\n**图 5–9.** *Facebook 通过移动版 Safari\
  \ 显示登录错误。*\n\n在不支持多任务处理的老式 3.x 或 4.x iOS 设备上，SDK 将生成一个内联的`UIWebView`，供用户登录。（请记住：装有\
  \ iOS 4.0 的 iPhone 3G 不支持多任务处理，运行 3.1.3 的 iPhone 3G S 也不支持。然而，运行 4.0 的 iPhone 3G\
  \ S 和 iPhone 4 是支持的。）\n\n### OAuthFacebook 项目\n\n在第 4 章中，我们引导您完成了设置使用 Facebook iOS\
  \ SDK 的基础应用 `HelloFacebook` 的步骤。在本章及以后的章节中，我们将使用与 `HelloFacebook` 相同的应用框架，直接进入特定于本章的代码。为此，请使用第\
  \ 4 章中描述的相同步骤创建一个名为 `OAuthFacebook` 的新项目。或者，您可以复制 `HelloFacebook` 项目，或直接在 `HelloFacebook`\
  \ 项目中按照此处描述的步骤进行操作。您可以在 Git 仓库的 Chapter5 目录中找到本章的项目。现在我们已经完成了这些基础工作，让我们仔细看看 `OAuth`\
  \ 和 Facebook。\n\n### 通过自定义 URL Scheme 实现应用间通信\n\n在“使用 Facebook 实现单点登录”这一节中，您可能一直在想，Facebook\
  \ SDK 是如何在登录过程完成后重定向回您的应用程序的。答案是使用自定义 URL scheme。\n\n当您设置应用程序以使用 Facebook SDK 时，您必须在应用程序的\
  \ `plist` 文件中创建一个包含您 Facebook 应用 ID 的自定义 URL scheme。让我们仔细看看如何设置。\n\n为了让 iOS 将您的应用程序绑定到自定义\
  \ URL scheme，以便您的应用程序能够处理来自 Facebook SDK 的授权回调，您必须在应用程序的 `plist` 文件中指定您的应用程序响应的\
  \ URL scheme。在这种情况下，Facebook SDK 期望您的应用程序绑定到一个格式为 `fb[appID]://` 的自定义 URL scheme，其中\
  \ `appID` 是您的 Facebook 应用 ID。\n\n请按照以下步骤将您的应用程序绑定到所需的自定义 URL scheme：\n\n1. 在根键 `Information\
  \ Property List` 下为键/值对添加一个新行，并将该键命名为：`URL types`。\n2. 在刚刚添加的 `URL types` 键下为键/值对添加一个新行。该键将自动命名为：`Item\
  \ 0`。\n3. 在 `Item 0` 键下为键/值对添加一个新行，并将该键命名为：`URL Schemes`。\n4. `URL Schemes` 键下将有一个名为\
  \ `Item 0` 的键。将 `Item 0` 键的值设置为前面提到的 `fb[appID]`。此值中不能有空格。如果某个应用程序的 Facebook 应用\
  \ ID 是 `123456789`，那么 `Item 0` 键的值应为：`fb123456789`。\n\n您可以自己查看（如果您愿意，可以将其复制到您的 `plist`\
  \ 文件中）本章 `OAuthFacebook` 项目中的 `OAuthFacebook-Info.plist` 文件应该是什么样子。如果您设置正确，您的 `plist`\
  \ 文件应该像图 5–10 所示。\n\n![images](img/0510.jpg)\n\n**图 5–10.** *在应用程序的 plist 文件中定义自定义\
  \ URL scheme*\n\n回想一下，在第 4 章](#Chapter04.html#ch4)的 `HelloFacebook` 应用程序中，当我们分配\
  \ `facebook` 对象时，我们必须使用 Facebook 应用 ID 对其进行初始化，如下所示：\n\n```\nfacebook = [[Facebook\
  \ alloc] initWithAppId:appID];\n```\n\nFacebook SDK 会保存您的应用 ID，并在您登录后尝试打开一个符合您在应用中创建的自定义\
  \ URL scheme 的 URL，以便 iOS 启动您的应用。以下是 Facebook SDK 中使用您的 Facebook 应用 ID 创建 URL 路径的代码（如图\
  \ 5–11 所示）：\n\n```\nNSString *nextUrl = [NSString stringWithFormat:@\"fb%@://authorize\"\
  , _appId];\n      [params setValue:nextUrl forKey:@\"redirect_uri\"];\n```\n\n![images](img/0511.jpg)\n\
  \n**图 5–11.** *Facebook iOS SDK 自定义 URL scheme 创建代码*\n\n为了使您的应用程序能够正确响应自定义 URL scheme，您必须在应用程序的主委托中实现\
  \ `openURL` 方法，并按如下方式调用 Facebook SDK 的 `handleOpenURL:` 方法，以便 Facebook SDK 能够保存返回的访问令牌：\n\
  \n\n\n`- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url\n sourceApplication:(NSString\
  \ *)sourceApplication annotation:(id)annotation {\n    return [facebook handleOpenURL:url];\n\
  }`\n\nURL 的格式如下：\n\n`fb114442211957627://authorize/#access_token=<…>&expires_in=0`\n\
  \n让我们看看 URL 的各个组成部分：\n\n- `fb114442211957627://` – 这是我们为应用绑定的自定义 URL 方案。\n- `authorize/`\
  \ – 这是 Facebook SDK 会在 URL 中检查的路径，以便它随即知道解析 URL 其余部分的认证信息。\n- `#` – 表示 URL 中参数的开始。\n\
  - `access_token=` – 指定从 facebook.com 返回的访问令牌，SDK 在代表你的应用请求资源时会使用该令牌。\n- `&expires_in=0`\
  \ – 指定 URL 中的另一个参数，其中包含 `access_token` 的过期时间。在此例中，值为 `0` 向 SDK 表示此令牌永不过期。\n\n![images](img/0512.jpg)\n\
  \n**图 5–12.** *应用委托处理自定义 URL*\n\n### 登录 Facebook\n\n通过 Facebook API 授权用户的步骤是通过 `authorize:`\
  \ 方法完成的，如下所示：\n\n```\n[facebook authorize:[NSArray arrayWithObjects:@\"read_stream\"\
  , @\"offline_access\",nil]\n delegate:self];\n```\n\n注意在方法调用中，我们传递了一个 `NSArray`\
  \ 作为参数之一。这是一个请求权限的数组。作为 `OAuth` 授权过程的一部分，你必须要求用户授予你的应用访问特定资源的权限。在此授权请求中，我们请求访问用户的新闻推送。我们还请求对这些资源进行长期访问，在这种情况下，我们将收到一个永不过期的\
  \ `OAuth` 访问令牌。\n\n要了解更多访问特定资源所需的权限，请阅读权限 API 参考文档：\n\n`http://developers.facebook.com/docs/authentication/permissions`\n\
  \n我们已在 `OAuthFacebook` 项目的 `MainView` 类中实现了这一点。我们还使用了可在 Facebook SDK 中找到的 `FBLoginButton`\
  \ 类。使用这个按钮类可以让登录按钮具有 Facebook 的外观和感觉，这会让用户感到安心，因为她可以看到官方的 Facebook 标志，如图 5–13 所示。\n\
  \n![images](img/0513.jpg)\n\n**图 5–13.** *Facebook 登录按钮*\n\n示例项目配置为在登录后将登录按钮更改为注销按钮，如图\
  \ 5–14 所示。\n\n![images](img/0514.jpg)\n\n**图 5–14.** *Facebook 注销按钮*\n\n当你点击按钮时，会调用\
  \ `fbButtonClick:` 方法。该方法如下所示：\n\n```\n- (void)fbButtonClick:(UIButton*)sender {\n\
  \    if (fbLoginButton.isLoggedIn) {\n        [self logout];\n    } else {\n   \
  \     [self login];\n    }\n}\n```\n\n如果用户未登录，则调用 `login:` 方法。`login:` 方法会调用前面描述的\
  \ `authorize:` 方法：\n\n```\n- (void)login {\n    [facebook authorize:[NSArray arrayWithObjects:@\"\
  read_stream\",\n @\"offline_access\",nil] delegate:self];\n}\n```\n\n如果用户已登录，按钮文本将变为\
  \ *Logout*。注销时，会调用 `logout:` 方法。`logout:` 方法如下所示：\n\n```\n- (void)logout {\n   \
  \ [facebook logout:self];\n}\n```\n\n注意，Facebook SDK 的 `authorize:` 和 `logout:`\
  \ 方法都将委托作为参数。为了接收来自 Facebook SDK 关于用户登录和注销 Facebook 的通知，你必须在你的类中实现 `FBSessionDelegate`\
  \ 协议，并将你的类作为委托传递给 Facebook 的 `authorize:` 和 `logout:` 方法。如果你检查 `MainView.h`，你会看到\
  \ `MainView` 是一个 `FBSessionDelegate`：\n\n```\n@interface MainView : UIView <FBSessionDelegate>\
  \ {\n    …\n}\n```\n\n`FBSessionDelegate` 协议定义了三个你可以实现的可选方法：\n\n- `- (void)fbDidLogin`\n\
  - `- (void)fbDidNotLogin:(BOOL)cancelled`\n- `- (void)fbDidLogout`\n\n在 `fbDidLogin`\
  \ 委托方法中，我们保存登录状态并更新 `FBLoginButton`，让用户能够注销 Facebook。在 `fbDidNotLogin:` 方法中，我们仅记录该事件。在\
  \ `fbDidLogout` 方法中，我们保存注销状态并更新 `FBLoginButton`，让用户能够登录 Facebook。\n\n你瞧，用户现在无需输入任何内容，只需共享来自\
  \ Facebook 应用的安全令牌或来自 Facebook 移动版网站的 Safari cookie，即可登录你的 Facebook 连接 iOS 应用。具体实现细节可在\
  \ Facebook iOS SDK 方法中找到（参见 图 5–15）：\n\n```\n- (void)authorizeWithFBAppAuth:(BOOL)tryFBAppAuth\n\
  \                    safariAuth:(BOOL)trySafariAuth\n```\n\n![images](img/0515.jpg)\n\
  \n**图 5–15.** *Facebook iOS SDK 授权代码*\n\n### 注销 Facebook\n\n那么，如果 Facebook 用户登录了\
  \ iOS 上的所有应用，而他们希望你的应用从 Facebook 注销，会发生什么呢？如前所述，你调用 `logout:` 方法以清除 Facebook SDK\
  \ 中的所有应用状态，并启动一个服务器请求以使当前的访问令牌失效。`logout:` 方法的内容如图 5–16 所示。\n\n![images](img/0516.jpg)\n\
  \n**图 5–16.** *Facebook iOS SDK 的 logout: 方法*\n\n如果用户从你的应用注销，不会撤销你的应用权限；它只是清除应用的访问令牌。如果用户随后尝试再次在你的应用内登录\
  \ Facebook，应用只会通知用户正在重新登录 Facebook，并且你的应用将收到一个新的访问令牌。用户无需再次授予权限。\n\n如果用户想要撤销你的应用权限，她需要前往\
  \ facebook.com，编辑她的应用和网站设置，在“你使用的应用”下选择“编辑设置”（参见 图 5–17），并从已批准的应用列表中删除你的应用（参见 图\
  \ 5–18）。\n\n![images](img/0517.jpg)\n\n**图 5–17.** *Facebook.com 的应用 OAuth 权限页面*\n\
  \n![images](img/0518.jpg)\n\n**图 5–18.** *撤销应用与 Facebook 用户数据和个人资料交互的权限*\n\n###\
  \ 判断 iOS 是否支持应用后台运行\n\n根据设备是否支持后台运行，Facebook SDK 的行为会有所不同。这种行为的差异是通过使用以下代码实现的：\n\
  \n```\nif ([UIDevice instancesRespondToSelector:@selector(isMultitaskingSupported)]\
  \ &&\n [[UIDevice currentDevice] isMultitaskingSupported]) {\n}\n```\n\n我们在这里展示这一点，因为在你自己的应用中，根据设备是否支持应用后台运行来选择不同的代码路径，可能会时不时地派上用场。\n\
  \n## Twitter 中的 OAuth\n\n通过 Facebook iOS SDK 使用 `OAuth` 并不太痛苦，因为 SDK 的开发人员出色地通过简单的\
  \ API 将所有内容尽可能优雅地封装在其 SDK 中。通过 Twitter 使用 `OAuth` 则稍微复杂一些，但我们会带你顺利解决。\n\n图 5–19\
  \ 展示了 Twitter 的 `OAuth` 认证流程示意图。\n\n正如我们之前提到的，Twitter 没有官方的 iOS SDK，因此开源社区的一些人将来自不同项目的软件拼凑在一起，制作了一个支持\
  \ `OAuth` 的工作 iOS Twitter 引擎。我们将向你展示如何使用这个开源软件来快速将 Twitter 认证集成到你的应用中。\n\n![images](img/0519.jpg)\n\
  \n**图 5–19.** *Twitter 认证流程（由 Twitter.com 提供）*\n\n\n\n#### 创建 Twitter 应用\n\n在开始使用\
  \ Twitter 的 `OAuth` 之前，你需要先在此处向 Twitter 注册一个应用：[`http://twitter.com/apps/new`](http://twitter.com/apps/new)。\n\
  \n当你访问该网站时，Twitter 会要求你输入关于你的应用和公司的各种信息（参见图 5-20）。\n\n![images](img/0520.jpg)\n\n\
  **图 5-20.** *注册 Twitter 应用*\n\n请注意，你必须选择“客户端”作为应用类型。\n\n如果 Twitter 接受了你的注册信息，你将被引导至一个页面，该页面包含\
  \ Twitter 的 `OAuth` URL，以及你应用的消费者密钥和消费者秘密（参见图 5-21）。\n\n![images](img/0521.jpg)\n\
  \n**图 5-21.** *Twitter 返回你的消费者密钥和消费者秘密。*\n\n请将你的消费者密钥和秘密保存在安全位置，因为你需要用这些值从你的 iOS\
  \ 应用内部启动 `OAuth` 授权流程。\n\n##### OAuthTwitter 项目\n\n在第 4 章中，我们引导你完成了设置一个使用 Twitter\
  \ 的基本应用 `HelloTwitter` 的步骤。在本章及后续章节中，我们将使用与 HelloTwitter 相同的应用骨架，并直接切入与特定章节相关的代码。为此，请使用第\
  \ 4 章中描述的相同步骤创建一个名为 `OAuthTwitter` 的新项目。你也可以复制 `HelloTwitter` 项目，或者直接在该项目中执行此处描述的步骤。你可以在\
  \ Git 仓库的 Chapter5 目录中找到本章的项目。现在我们已经做好了基础准备，让我们更详细地了解 `OAuth` 和 Twitter。\n\n#####\
  \ 登录 Twitter\n\n首先，在你的主应用委托中添加你的 Twitter `OAuth` 消费者密钥和秘密：\n\n```\n#define kOAuthConsumerKey\
  \       @\"替换我\"\n#define kOAuthConsumerSecret    @\"替换我\"\n```\n\n现在，为我们在第 4 章中声明并初始化的\
  \ `SA_OAuthTwitterEngine` 对象的相应属性设置这些值：\n\n```\nsa_OAuthTwitterEngine = [[SA_OAuthTwitterEngine\
  \ alloc] initOAuthWithDelegate: self];\n        sa_OAuthTwitterEngine.consumerKey\
  \ = kOAuthConsumerKey;\n        sa_OAuthTwitterEngine.consumerSecret = kOAuthConsumerSecret;\n\
  ```\n\n你在主应用委托中需要做的最后一件事是，在头文件中将其声明为 `SA_OAuthTwitterEngineDelegate`：\n\n```\n@interface\
  \ AppDelegate : NSObject <UIApplicationDelegate,\n SA_OAuthTwitterEngineDelegate>\
  \ {\n}\n```\n\n通过在源文件中实现相应的委托方法来完成此过程：\n\n```\n- (void) storeCachedTwitterOAuthData:\
  \ (NSString *) data forUsername: (NSString *)\nusername {\n        NSUserDefaults\
  \                  *defaults = [NSUserDefaults\nstandardUserDefaults];\n\n     \
  \   [defaults setObject: data forKey: @\"authData\"];\n        [defaults synchronize];\n\
  }\n\n- (NSString *) cachedTwitterOAuthDataForUsername: (NSString *) username {\n\
  \        return [[NSUserDefaults standardUserDefaults] objectForKey: @\"authData\"\
  ];\n}\n\n- (void) twitterOAuthConnectionFailedWithData: (NSData *) data {\n    \
  \    NSLog(@\"twitterOAuthConnectionFailedWithData\");\n}\n```\n\n在进入向用户显示登录页面的代码之前，我们先简单介绍一下上述委托方法中发生的事情。\n\
  \niOS Twitter 引擎不会在应用的不同运行周期之间存储从 Twitter 返回的 `OAuth` 数据；你需要自己处理这件事。幸运的是，iOS Twitter\
  \ 引擎提供了两个你需要实现的委托方法，以便与引擎无缝集成。\n\n当 iOS Twitter 引擎启动认证流程时，它会首先检查是否已存在任何凭据。它通过调用其委托的\
  \ `cachedTwitterOAuthDataForUsername:` 方法来实现这一点。在上述代码中，你可以看到我们尝试从 `NSUserDefaults`\
  \ 中检索此信息。当用户首次尝试通过你的应用登录 Twitter 时，`NSUserDefaults` 中不会有 `authData` 键对应的对象，因为尚未保存任何内容。不过，这时委托方法\
  \ `storeCachedTwitterOAuthData:` 就发挥作用了。如果用户通过你的应用成功登录 Twitter，Twitter iOS 引擎会调用\
  \ `storeCachedTwitterOAuthData:` 委托方法。这让你有机会保存从 Twitter 返回的信息，以便后续检索。请注意，在上述代码中，我们将此信息保存到了\
  \ `NSUserDefaults` 中，键名为 `authData`。\n\n最后一个委托方法是 `twitterOAuthConnectionFailedWithData:`，当尝试通过\
  \ `OAuth` 对用户进行授权时遇到错误，Twitter iOS 引擎会调用它。例如，如果你在消费者密钥或秘密中多添加了一个字符，然后重新构建并运行你的应用，你会看到引擎会调用此委托方法。\n\
  \n现在让我们对用户界面进行一些处理。有一个用于登录 Twitter 的按钮会很好，所以我们费了些功夫为你制作了一个。这个 Twitter 登录按钮是仿照我们在\
  \ `OAuthFacebook` 项目中使用的 Facebook 登录按钮制作的。\n\n进入你克隆本书示例项目 Git 仓库的目录中的 `Twitter-OAuth-iPhone`\
  \ 子目录，然后找到 `TwitterLoginButton` 目录。将 `TwitterLoginButton` 拖拽到你的项目中，以便你可以在代码中使用它。\n\
  \n\n\n如果你查看`OAuthTwitter`示例项目中的`MainViewController`类，你将了解我们是如何引入`TwitterLoginButton`的。我们使用了\
  \ iOS Twitter 引擎的`isAuthorized:`方法，在示例应用程序启动时将按钮设置为正确的状态：\n\n```\ntwitterLoginButton.isLoggedIn\
  \ = [sa_OAuthTwitterEngine isAuthorized];\n```\n\n当点击时，此按钮会触发以下方法：\n\n```\n- (void)twitterButtonClick:(UIButton*)sender\
  \ {\n    if (twitterLoginButton.isLoggedIn) {\n        [self logout];\n    } else\
  \ {\n        [self login];\n    }\n}\n```\n\n在`login:`方法中，我们使用`SA_OAuthTwitterController`类向用户显示\
  \ Twitter 的`OAuth`登录页面。我们通过`UIViewController`的`presentModalViewController:`方法以模态方式呈现它。在初始化`SA_OAuthTwitterController`对象时，你需向其传递我们在主应用程序委托中创建并初始化的`SA_OAuthTwitterEngine`，同时还要传递一个`SA_OAuthTwitterControllerDelegate`。以下是代码：\n\
  \n```\n- (void)login {\n    UIViewController *controller =\n    [SA_OAuthTwitterController\
  \ controllerToEnterCredentialsWithTwitterEngine:\n    sa_OAuthTwitterEngine delegate:\
  \ self];\n    if (controller) {\n        [self presentModalViewController: controller\
  \ animated: YES];\n    }\n    else {\n        [sa_OAuthTwitterEngine sendUpdate:\
  \ [NSString stringWithFormat:\n        @\"Already Updated. %@\", [NSDate date]]];\n\
  \    }\n}\n```\n\n我们需要将自身声明为`SA_OAuthTwitterControllerDelegate`，并在头文件中完成：\n\n```\n\
  @interface MainViewController : UIViewController <SA_OAuthTwitterControllerDelegate>\
  \ {\n}\n```\n\n最后一步是实现`SA_OAuthTwitterControllerDelegate`的委托方法：\n\n```\n- (void)\
  \ OAuthTwitterController: (SA_OAuthTwitterController *) controller\nauthenticatedWithUsername:\
  \ (NSString *) username {\n    NSLog(@\"Authenicated for %@\", username);\n    twitterLoginButton.isLoggedIn\
  \ = YES;\n    [twitterLoginButton updateImage];\n}\n\n- (void) OAuthTwitterControllerFailed:\
  \ (SA_OAuthTwitterController *) controller {\n    NSLog(@\"Authentication Failed!\"\
  );\n}\n\n- (void) OAuthTwitterControllerCanceled: (SA_OAuthTwitterController *)\
  \ controller {\n    NSLog(@\"Authentication Canceled.\");\n}\n```\n\n请注意，我们是如何在通过`OAuthTwitterController:authenticatedWithUsername:`委托方法成功登录后更新`TwitterLoginButton`状态的。你很可能希望在自己的应用程序代码中执行特定于应用程序的步骤。\n\
  \n如果用户在登录页面上输入了错误的用户名和密码，或者点击了“拒绝”按钮，则会调用`OAuthTwitterControllerFailed:`委托方法，实现该方法的代码应向用户显示一条消息，解释登录失败的原因。如果用户取消了`SA_OAuthTwitterController`对话框，则会调用`OAuthTwitterControllerCanceled:`委托方法。\n\
  \n图 5–22 和 5–23 显示了`SA_OAuthTwitterController`在显示 Twitter 身份验证页面时屏幕截图。\n\n![images](img/0522.jpg)\n\
  \n**图 5–22.** *`SA_OAuthTwitterController`显示身份验证页面时的外观。*\n\n![images](img/0523.jpg)\n\
  \n**图 5–23.** *`SA_OAuthTwitterController`身份验证页面的下半部分*\n\n##### 登出 Twitter\n\n将用户从\
  \ Twitter 注销是一个非常直接的过程。iOS Twitter 引擎提供了一个`clearAccessToken`方法，我们在`logout`方法中使用它。我们还重新设置了登录按钮：\n\
  \n```\n- (void)logout {\n    [sa_OAuthTwitterEngine clearAccessToken];\n    twitterLoginButton.isLoggedIn\
  \ = NO;\n    [twitterLoginButton updateImage];\n}\n```\n\n如果我们查看`clearAccessToken:`方法，会发现它会清除\
  \ Twitter 的`OAuth`访问和请求令牌，调用我们的委托方法以清除我们保存到`NSUserDefaults`的访问令牌，并清除一些其他对象：\n\n\
  ```\n- (void) clearAccessToken {\n    if ([_delegate respondsToSelector:\n    @selector(storeCachedTwitterOAuthData:forUsername:)])\
  \ [(id) _delegate\n    storeCachedTwitterOAuthData: @\"\" forUsername: self.username];\n\
  \    [_accessToken release];\n    _accessToken = nil;\n    [_consumer release];\n\
  \    _consumer = nil;\n    self.pin = nil;\n    [_requestToken release];\n    _requestToken\
  \ = nil;\n}\n```\n\n##### 内部原理：webViewDidFinishLoad\n\n实现`OAuth`的视图控制器的主力是`UIWebView`。如果你检查`SA_OAuthTwitterController`，你会发现其主要视图是一个`UIWebView`，并且它本身是一个`UIWebViewDelegate`。`UIWebView`类的一个优点是它拥有许多委托方法，这些方法使得在`UIWebView`加载页面时可以在你的应用中执行原生功能。这是通过委托方法`webViewDidFinishLoad:`实现的。在`SA_OAuthTwitterController.m`中查看`webViewDidFinishLoad:`方法，可以了解其功能。甚至，在该方法的开始处设置一个断点，然后单步执行代码会更好。\n\
  \n### 更多内容\n\n我们已经尽力概述了主要内容，但构建一个安全的应用程序需要比本章所能涵盖的更多内容。关于良好的 iOS 开发的一些简洁、经过深思熟虑的经验法则，包括如何测试和部署应用程序而不会出现新手安全错误，请查看\
  \ Twitter 的安全最佳实践：[`http://dev.twitter.com/pages/security_best_practices`](http://dev.twitter.com/pages/security_best_practices)。\n\
  \n最后，请记住以下重要几点：\n\n*   在应用程序中尽早解决任何安全问题。\n*   反复测试以确保无缝的用户体验。\n*   如果从头构建认证系统不可行，请考虑通过`OAuth`使用`facebook\
  \ connect`来验证应用程序用户。\n\n\n\n"
- "# 让您的应用程序为社交消息做好准备\n\n理解本章最难的部分在于，您需要充分使用 Facebook 和 Twitter 来掌握前端发生了什么。这一点至关重要！一旦您理解了这些内容，就可以继续连接\
  \ API 了。\n\n我们猜想您正在阅读本书，说明您已经使用过 Facebook 和 Twitter。但很可能，您对它们的使用还不够深入。\n\n在本书的这一部分，我们将详细介绍如何将您的\
  \ iOS 应用连接到 Facebook 的 Graph API 和 Twitter API。然后，我们将讨论如何从您的应用向社交网络发布信息：推文、消息、主页贴文等。\n\
  \n但在进一步深入之前，让我们先探讨一下本章第一行中那个略显冒犯的论断。我们并不怀疑您有能力理解 Facebook 和 Twitter 的功能。但将信息发布到社交图谱的方式多到令人眼花缭乱，值得有意识地去逐一探索，以确定哪些机制适合您的应用。请尝试在前端层面理解正在发生的事情——例如，Twitter\
  \ 中 `@回复` 和私信之间的区别——这样您就能更轻松地专注于决定您的应用需要调用哪些 API。与任何新项目一样，首先只实现最基本的功能非常重要，因此熟练掌握\
  \ Facebook 和 Twitter 将帮助您做出明智选择，决定包含哪些功能。\n\n您可以在 Git 仓库的 `Chapter6` 目录中找到本章的所有代码。Facebook\
  \ 代码位于 `ApiFacebook` 项目中，Twitter 代码位于 `ApiTwitter` 项目中。\n\n好了，让我们开始调用一些 API，怎么样？\n\
  \n## 介绍 Facebook Graph API\n\n您的应用可以在 Facebook 上发布海量内容。这些内容包括但不限于：主页贴文、消息、群组消息、笔记、活动、状态、评论、点赞和地点（稍后我们会重点讨论地点）。我们将首先向您展示如何通过\
  \ Facebook iOS SDK 从 Facebook 社交图谱中拉取信息。\n\n为了方便您看到实际效果，我们针对本章对示例应用的结构做了一些调整。您会发现示例应用现在使用\
  \ `UITabBarController` 来划分应用的功能。虽然不太美观，但确实能用。\n\n### 来自朋友的一点帮助\n\n在所有社交网络中，最重要的事情始终是成为用户好友及通信的一部分。与此相应，我们首先要了解如何获取当前登录用户的好友列表以及每位好友的个人资料图片。这通过\
  \ `requestWithGraphPath:andDelegate:` 方法实现：\n\n```\n[facebook requestWithGraphPath:@\"\
  me/friends\" andDelegate:self];\n```\n\n在深入探讨内部机制之前，让我们先浏览一下示例代码，熟悉 `requestWithGraphPath:andDelegate:`\
  \ 方法的使用。这是用于访问 Facebook 社交图谱信息的主要方法。\n\n如果您查阅示例代码，您会看到我们在 `FriendsViewController`\
  \ 类的 `viewDidLoad:` 方法中调用了上述 `requestWithGraphPath:andDelegate:` 方法。`FriendsViewController`\
  \ 类是 `FacebookViewController` 类的子类，而 `FacebookViewController` 类又是 `UITableViewController`\
  \ 的子类。由于 Facebook API 返回的是信息列表，我们创建了 `FacebookViewController` 类，以便在演示如何使用和显示 Facebook\
  \ 图路径请求结果时复用代码，让我们的工作更轻松些。需要特别注意的是，`FacebookViewController` 也遵循 `FBRequestDelegate`\
  \ 协议。以下是 `FacebookViewController` 类的声明：\n\n```\n@interface FacebookViewController\
  \ : UITableViewController <FBRequestDelegate> {\n        NSArray *items;\n}\n@end\n\
  ```\n\n每当通过 `requestWithGraphPath:andDelegate:` 方法发起请求时，都必须指定一个委托来处理来自 Facebook\
  \ iOS SDK 的响应。需要注意的是，Facebook iOS SDK 会按照以下顺序调用 `FBRequestDelegate` 协议的方法。首先，在向\
  \ Facebook 服务器发起请求之前，会调用 `requestLoading:` 方法。当 Facebook 服务器发送响应时，会调用 `request:didReceiveResponse:`\
  \ 方法。接下来，在 Facebook iOS SDK 开始处理响应之前，会调用 `request:didLoadRawResponse:` 方法，让委托有机会自行处理响应数据。最后，会调用\
  \ `request:didLoad:` 方法，并将响应数据存储在 Objective-C 数据类型中。如果请求出现问题，则调用 `request:didFailWithError:`\
  \ 方法。\n\n如果我们看看 `FacebookViewController` 中的 `request:didLoad:` 方法，会看到以下内容：\n\n```\n\
  - (void)request:(FBRequest *)request didLoad:(id)result {\n        NSLog(@\"didLoad:\"\
  );\n\n        [items release];\n        items = [[(NSDictionary*)result objectForKey:@\"\
  data\"] retain];\n        [self.tableView reloadData];\n}\n```\n\n如果您还记得前面的示例，`FacebookViewController`\
  \ 拥有一个名为 `items` 的指向 `NSArray` 的指针：\n\n```\nNSArray  *items;\n```\n\n在 `request:didLoad:`\
  \ 方法中，我们做的第一件事是释放 items 数组。这样做是为了防止内存泄漏。由于下一步是为 items 数组分配一个新数组，因此任何时候我们想要分配新数组，都需要首先确保释放之前存储的数组并归还内存。当我们实际进行赋值操作时，事情会变得更有趣一些，让我们回顾一下这一步的具体情况：\n\
  \n```\n        items = [[(NSDictionary*)result objectForKey:@\"data\"] retain];\n\
  ```\n\n\n\n对于您从 Facebook 社交图谱发起的大多数请求，响应将是一个包含一个键/值对的字典，其中键是`data`，值是一个项目数组或列表。因此，在这种情况下，我们将结果转换为`NSDictionary*`，然后使用`objectForKey:`方法检索实际的`NSArray`项目。我们还调用了`retain`，以便返回的项目数组保留在内存中。在大多数情况下，返回数组中的每个项目都是一个`NSDictionary`。对于好友请求，数组中的每个项目都是一个包含两个键/值对的字典：一个存储好友的\
  \ Facebook ID，另一个存储好友的名字。这可以在整个响应字典的可视化表示中看到：\n\n```\n{\n    data =     (\n    \
  \    {\n            id = <a number>;\n            name = \"John Doe\";\n       \
  \ }\n        );\n}\n```\n\n**提示：** 在 Xcode 中快速查看对象内容的一个简便方法是转到 Xcode 控制台并输入以下打印输出（`po`）命令。例如，如果我们在`request:didLoad:`方法中设置一个断点，那么当断点被触发时，我们可以通过在\
  \ Xcode 控制台中输入以下内容来获取`(id)result`对象的早期可视化表示：\n\n```\n(gdb) po result\n```\n\n最后，我们要求由`UITableViewController`拥有的`UITableView`重新加载其数据，以便用户界面得到更新。当`UITableView`重新加载时，它需要知道它总共有多少行，所以我们返回`items`数组的计数：\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n        // Return the number of rows in the section.\n        if (nil == items)\
  \ {\n                return 0;\n        }\n        return [items count];\n}\n```\n\
  \n当`UITableView`需要一个特定的行时，我们在`FriendsViewController`的`tableView:cellForRowAtIndexPath:`方法中，从好友数组（即`items`数组）中检索代表该行好友的字典：\n\
  \n```\nNSDictionary *friendDictionary = [items objectAtIndex:[indexPath row]];\n\
  ```\n\n对于这个示例，我们使用我们自己的`UITableViewCell`类`FriendTableViewCell`。这使我们能够封装好友个人资料图片的检索。`FriendTableViewCell`使用`UITableViewCellStyleDefault`样式，该样式显示一个文本标签和一个可选的图片。`FriendTableViewCell`类本身是一个`FBRequestDelegate`，并且它拥有一个指向字典的指针，在这种情况下，该字典将是与该单元格关联的好友的字典。以下是`FriendTableViewCell`的声明：\n\
  \n```\n@interface FriendTableViewCell : UITableViewCell <FBRequestDelegate> {\n\
  \        NSDictionary *data;\n}\n\n@property(nonatomic, retain) NSDictionary *data;\n\
  \n@end\n```\n\n我们在`FriendsViewController`的`tableView:cellForRowAtIndexPath:`方法中分配`FriendTableViewCell`的数据字典：\n\
  \n```\ncell.data = friendDictionary;\n```\n\n当我们执行上述赋值时，会调用`FriendTableViewCell`的`setData`方法。因此，我们重写了这个方法以执行我们自己的自定义操作：\n\
  \n```\n- (void)setData:(NSDictionary *)dictionary {\n    [data release];\n    data\
  \ = [dictionary retain];\n\n    self.textLabel.text = [data objectForKey:@\"name\"\
  ];\n\n        self.imageView.image = nil;\n        [self setNeedsLayout];\n\n  \
  \      [[NSNotificationCenter defaultCenter] removeObserver:self];\n\n        self.requestPath\
  \ = [NSString stringWithFormat:@\"%@/picture\", [data objectForKey:@\"id\"]];\n\
  \        [[FacebookRequestController sharedRequestController] enqueueRequestWithGraphPath:self.requestPath];\n\
  \n        //listen for a notification with the name of the identifier\n        [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\nselector:@selector(facebookRequestDidComplete:)\
  \ name:kRequestCompletedNotification object:nil];\n}\n```\n\n首先，我们将单元格的`textLabel`文本设置为与`data`字典中`name`键关联的值。其次，我们通过`requestWithGraph:`方法从\
  \ Facebook 社交图谱发起针对该特定好友个人资料图片的请求。要从 Facebook 图谱获取用户的个人资料图片，我们使用以下格式进行请求：\n\n```\n\
  <user ID>/picture\n```\n\n在这种情况下，我们通过使用`NSString`的`stringWithFormat:`并将与`data`字典中`id`键关联的值传递给它，为每个好友构造此请求。Facebook\
  \ iOS SDK 将图片作为`NSData`对象内的字节返回。接下来，我们从该对象创建一个图片，如下面的`FriendTableViewCell`的`facebookRequestDidComplete:`方法所示：\n\
  \n```\n- (void)facebookRequestDidComplete:(NSNotification*)notification {\n\n  \
  \  if (YES == [self.requestPath isEqualToString:[notification.userInfo objectForKey:@\"\
  path\"]]) {\n\n        UIImage *image = [UIImage imageWithData:(NSData*)[notification.userInfo\
  \ objectForKey:@\"result\"]];\n        self.imageView.image = image;\n        [self\
  \ setNeedsLayout];\n    }\n}\n```\n\n如果您运行示例应用程序，通过您的 Facebook 用户帐户登录，然后点击“好友”标签，您将看到它下载并显示您的好友列表。它还会下载每个好友的个人资料图片（见图\
  \ 6-1）。请注意，此示例尚未优化；它仅用于向您展示如何开始使用这些 API。\n\n![images](img/0601.jpg)\n\n**图 6-1.**\
  \ *一个简单的好友列表*\n\n### 分页图谱响应\n\n我们想要指出的一件有趣的事情是，您可以在发起请求时限制从 Facebook 图谱响应中获取的项目数量。这可以通过向请求添加`limit`参数来实现。您可以通过`requestWithGraphPath:andDelegate:`方法执行此操作：\n\
  \n```\n[facebook requestWithGraphPath:@\"me/friends?limit=3\" andDelegate:self];\n\
  ```\n\n您也可以通过`requestWithGraphPath:andParams:andDelegate:`方法，通过创建一个参数字典来实现。对于字典中的每个对象，键是参数名称（在此例中为`limit`），值是参数值的字符串表示形式。代码如下所示：\n\
  \n```\nNSMutableDictionary *params = [NSMutableDictionary dictionary];\n[params\
  \ setObject:@\"3\" forKey:@\"limit\"];\n[facebook requestWithGraphPath:@\"me/feed\"\
  \ andParams:params andDelegate:self];\n```\n\n您还可以通过使用`offset`参数来指定从给定的起始点或偏移量检索项目：\n\
  \n```\n[facebook requestWithGraphPath:@\"me/friends?limit=3&offset=5\" andDelegate:self];\n\
  ```\n\n或者，您也可以通过传入一个参数字典来完成相同的任务：\n\n```\nNSMutableDictionary *params = [NSMutableDictionary\
  \ dictionary];\n[params setObject:@\"3\" forKey:@\"limit\"];\n[params setObject:@\"\
  5\" forKey:@\"offset\"];\n[facebook requestWithGraphPath:@\"me/feed\" andParams:params\
  \ andDelegate:self];\n```\n\n\n\n#### 内部机制：`FBRequest` 类\n\nFacebook Graph API 本质上是一个基于\
  \ HTTP 的 API，其流程是将格式化的 HTTP 请求发送至 Facebook 服务器，并以 JSON 格式返回响应。Facebook iOS SDK 为我们提供了一套简洁易用的\
  \ Objective-C 封装类，我们可以在 iOS 应用中使用这些类通过 Facebook Graph API 请求信息。\n\n在 Facebook iOS\
  \ SDK 中，实际负责发起请求和处理响应的类是 `FBRequest`。该 SDK 利用了一个事实：其发起请求所需的基础 URL 从不改变，即 [`https://graph.facebook.com`](https://graph.facebook.com)。SDK\
  \ 还知道某些请求参数也是固定不变的。这意味着您只需向请求方法提供 Graph 路径中那些会根据应用上下文而变化的部分。\n\n因此，如果我们构造完整的 URL\
  \ 来请求当前用户的 Facebook 好友，它会如下所示：\n\n`https://graph.facebook.com/me/friends?sdk=ios&sdk_version=2&access_token=<your\
  \ token>&format=json`\n\n因为我们使用的是 Facebook iOS SDK，所以只需向 SDK 提供 Graph 路径 `\"me/friends\"\
  `（以及任何其他控制请求的参数），底层的 SDK 类就会为我们构造完整的 URL。\n\n最终的请求是在 `FBRequest` 的 `connect` 方法中构建的，因此值得研究。此处是实际发起请求和处理\
  \ JSON 响应的地方。JSON 响应在方法 `handleResponseData:(NSData *)data` 中处理。以请求用户好友为例，JSON 响应的格式如下：\n\
  \n`{\"data\":[{\"name\":\"John Dor\",\"id\":\"<some ID>\"}]}`\n\n此外，`FBRequest`\
  \ 的 `getRequestWithParams:httpMethod:delegate:requestURL:` 方法和 Facebook 的 `openUrl:params:httpMethod:delegate:`\
  \ 方法也值得研究。\n\n##### 关于错误处理的通用说明\n\n处理来自 Facebook iOS SDK 的错误没有绝对正确或错误的方法。这完全取决于您和您的应用。我们建议您实现那些能通知您错误的代理方法，以便您采取适当的行动，例如通知用户或更新应用的界面。就本章所涉及的\
  \ Facebook 内容而言，请务必实现 `FBRequestDelegate` 的 `request:didFailWithError:` 方法。\n\n\
  ### Twitter API 介绍\n\n您的应用可以在 Twitter 上发布许多内容。包括但不限于：推文、私信（虽然此功能正在淡出）、`@回复`、`#话题标签`\
  \ 等等。我们将首先向您展示如何通过 `MGTwitterEngine` 从 Twitter 拉取信息。\n\n与本章的 Facebook 示例应用一样，我们稍微调整了本章\
  \ Twitter 示例应用的结构，以便方便地观察其中的一些操作。您会看到示例应用现在使用一个 `UITabBarController` 来划分应用的功能。再次强调，界面并不美观，但它能工作。\n\
  \n#### 时间线简介\n\n如果您想知道 Twitter 的*时间线*是什么，它是 Twitter 对任何推文流的专属术语。Twitter 将您自己的所有推文视为一个时间线，您从关注对象那里看到的推文流视为另一个时间线，而来自您创建的精选列表的任何推文流则视为又一个时间线。\n\
  \n##### 总觉得有人在关注我\n\n对于 Twitter 用户来说，最令人向往的事情就是拥有大量粉丝。为此，我们将研究如何获取当前登录用户的粉丝列表以及每个粉丝的关联头像。这可以通过\
  \ `MGTwitterEngine` 的 `getFollowersIncludingCurrentStatus:` 方法实现：\n\n`[sa_OAuthTwitterEngine\
  \ getFollowersIncludingCurrentStatus:YES];`\n\n与 Facebook iOS SDK 通过 `requestWithGraphPath:`\
  \ 方法发起所有请求不同，`MGTwitterEngine` 使用不同的方法来完成不同的请求。同时也没有正式的请求对象，因此需要一些不同的编码机制，因为我们无法为每个请求指定不同的代理。不幸的是，这使得针对\
  \ `MGTwitterEngine` 的编码稍微困难一些；然而，所有 `MGTwitterEngine` 的请求方法都会返回一个唯一的请求连接标识符字符串，我们将在本章的示例应用中利用这一点。\n\
  \n查看示例代码，我们在 `FollowersViewController` 类的 `viewDidLoad:` 方法中调用了前面提到的 `getFollowersIncludingCurrentStatus:`\
  \ 方法。`FollowersViewController` 类是一个 `UITableViewController`。由于 Twitter API 返回的是信息列表，因此\
  \ `UITableViewController` 是演示如何使用该 API 获取某人的粉丝列表的理想类。以下是 `FollowersViewController`\
  \ 类的声明：\n\n```\n@interface FollowersViewController : UITableViewController {\n \
  \   NSArray *followers;\n}\n@end\n```\n\n回想一下，当我们创建 `MGTwitterEngine` 时，必须设置一个 `MGTwitterEngineDelegate`，在本例中就是我们的\
  \ `AppDelegate` 类。每当通过 `MGTwitterEngine` 向 Twitter 发起请求时，`MGTwitterEngineDelegate`\
  \ 的方法就会被调用。需要注意的是，`MGTwitterEngine` 会按以下顺序调用其代理的方法：\n\n1.  成功向 Twitter 服务器发起请求后，调用\
  \ `requestSucceeded:` 方法。\n2.  接着，根据请求的内容不同，会调用相应的 `*Received:forRequest:` 方法（本例中，当请求粉丝时，会调用\
  \ `userInfoReceived:forRequest:` 方法），并将响应数据存储为 Objective-C 数据类型。\n3.  最后，调用 `connectionFinished:`\
  \ 方法。如果请求出现问题，则会调用 `requestFailed:withError:` 方法。\n\n如果我们查看 `AppDelegate` 中的 `userInfoReceived:forRequest:`\
  \ 方法，会看到以下代码：\n\n```\n- (void)userInfoReceived:(NSArray *)userInfo forRequest:(NSString\
  \ *)connectionIdentifier\n{\n    NSLog(@\"User info for connectionIdentifier = %@\"\
  , connectionIdentifier);\n\n    //告诉 UI 更新自身\n\n    NSDictionary *userInfoDictionary\
  \ = [NSDictionary dictionaryWithObjects:\n    [NSArray arrayWithObjects:userInfo,\
  \ nil] forKeys:[NSArray arrayWithObjects:\n    @\"followers\", nil]];\n    [[NSNotificationCenter\
  \ defaultCenter] postNotificationName:connectionIdentifier\n    object:self\n  \
  \  userInfo:userInfoDictionary];\n}\n```\n\n此时，您可能在想我们使用 `NSNotificationCenter`\
  \ 做什么。实际上，`NSNotificationCenter` 是一种很好的机制，它允许应用内的一个类通知其他类某件事发生了，并传递信息，而无需使用代理。在本例中，我们希望告诉\
  \ `FollowersViewController` 其请求的数据已准备好。但在进一步讨论 `FollowersViewController` 内部发生了什么之前，我们先看完前面的代码。\n\
  \n\n\n`userInfo`参数是一个`NSArray`，其中包含`NSDictionary`对象。每个`NSDictionary`都包含关于单个关注者的信息。当您发布通知时，可以指定一个字典，其中包含通知接收者可以访问的对象。我们希望`FollowersViewController`接收关注者数组，因此我们创建一个包含一个键`followers`的字典，并将关注者数组赋值给该键。最后发布通知时，必须为其指定一个唯一名称，而最合适的名称就是连接标识符。\n\
  \n您可能还记得，`FollowersViewController`拥有一个名为`followers`的`NSArray`指针：\n\n```\nNSArray\
  \ *followers;\n```\n\n为了将在`userInfoReceived:forRequest:`委托方法中返回的数组赋值，我们需要在`FollowersViewController`中执行几个步骤。首先，我们告诉`NSNotificationCenter`，希望接收与请求的唯一连接标识符名称匹配的通知。回想一下，这个名称将与传递给`userInfoReceived:forRequest:`委托方法的连接标识符相同。我们还告诉`NSNotificationCenter`，如果触发了与唯一连接标识符匹配的通知，则希望执行`twitterFollowersRequestDidComplete:`方法。以下是执行此操作的代码：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 取消注释以下行，可在导航栏中为此视图控制器显示“编辑”按钮。\n\
  \    // self.navigationItem.rightBarButtonItem = self.editButtonItem;\n\n    NSString\
  \ *identifier = [sa_OAuthTwitterEngine getFollowersIncludingCurrentStatus:YES];\
  \ // statuses/followers\n\n    // 监听与标识符名称匹配的通知\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n           selector:@selector(twitterFollowersRequestDidComplete:)\n\
  \           name:identifier\n           object:nil];\n}\n```\n\n现在，让我们分析处理通知的方法中发生了什么：\n\
  \n```\n- (void)twitterFollowersRequestDidComplete:(NSNotification*)notification\
  \ {\n    [followers release];\n    followers = [[notification.userInfo objectForKey:@\"\
  followers\"] retain];\n\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
  \n    [self.tableView reloadData];\n}\n```\n\n在此方法中，我们首先释放关注者数组，以防止内存泄漏。由于下一步是为关注者数组分配一个新数组，因此每当要分配新数组时，都需要确保先释放并交回之前存储的数组。实际执行赋值操作时，情况会更有趣一些，让我们回顾一下这一步的具体操作：\n\
  \n```\nfollowers = [[notification.userInfo objectForKey:@\"followers\"] retain];\n\
  ```\n\n请记住，当我们在`AppDelegate`中发布通知时，发送了一个字典，其中包含一个键/值对，键为`followers`。因此，我们只是将通知的`userInfo`字典中该键的值赋值给`followers`数组。最后，我们移除自身作为通知的观察者，然后告诉表格重新加载数据，因为有了新数据。\n\
  \n**注意：** 一旦确定某个类不再需要接收通知，就应立即移除其作为通知的观察者，这始终是一个良好的实践。如果在将类设置为再次接收通知之前未能执行此操作，该类将会为同一事件接收多次通知，这可能不是您想要的行为。\n\
  \n当表格重新加载时，我们将关注者数量作为表格的行数返回：\n\n```\n- (NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section {\n    // 返回该节中的行数。\n    if (nil == followers)\
  \ {\n        return 0;\n    }\n\n    return [followers count];\n}\n```\n\n当`UITableView`需要特定行时，我们从`FollowersViewController`的`tableView:cellForRowAtIndexPath:`方法中的关注者数组中检索代表该行关注者的字典：\n\
  \n```\nNSDictionary *dictionary = [followers objectAtIndex:[indexPath row]];\n```\n\
  \n在本示例中，我们使用自定义的`UITableViewCell`类`FollowersTableViewCell`。这使我们能够封装关注者个人资料图片的检索。`FollowersTableViewCell`使用`UITableViewCellStyleDefault`样式，该样式显示文本标签和可选图片。`FollowersTableViewCell`类拥有一个指向字典的指针，在本例中，该字典是与该单元格关联的关注者的字典。以下是`FriendTableViewCell`的声明：\n\
  \n```\n@interface FollowersTableViewCell : UITableViewCell {\n    NSDictionary *data;\n\
  }\n\n@property(nonatomic, retain) NSDictionary *data;\n\n@end\n```\n\n我们在`FollowersViewController`的`tableView:cellForRowAtIndexPath:`方法中赋值`FollowersTableViewCell`的数据字典：\n\
  \n```\ncell.data = dictionary;\n```\n\n执行上述赋值时，会调用`FollowersTableViewCell`的`setData`方法，因此我们重写了此方法以执行自定义操作：\n\
  \n```\n- (void)setData:(NSDictionary *)dictionary {\n    [data release];\n    data\
  \ = [dictionary retain];\n\n    self.textLabel.text = [data objectForKey:@\"screen_name\"\
  ];\n\n    self.imageView.image = nil;\n    [self setNeedsLayout];\n\n    [[NSNotificationCenter\
  \ defaultCenter] removeObserver:self];\n\n    NSString *identifier = [sa_OAuthTwitterEngine\
  \ getImageAtURL:[dictionary objectForKey:@\"profile_image_url\"]];\n\n    // 监听与标识符名称匹配的通知\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self\n           selector:@selector(twitterProfileImageRequestDidComplete:)\n\
  \           name:identifier\n           object:nil];\n}\n```\n\n首先，我们将单元格`textLabel`的文本设置为`data`字典中键`screen_name`关联的值。其次，我们通过`MGTwitterEngine`的`getImageAtURL:`方法发起请求，获取该特定关注者的\
  \ Twitter 个人资料图片。我们向该方法传递关注者个人资料图片的 URL，该 URL 由 Twitter 返回，并且是`data`字典中键`profile_image_url`关联的值。注意，`getImageAtURL:`方法可用于从任何\
  \ URL 检索图片，而不仅仅是 Twitter URL。\n\n当我们请求图片时，`MGTwitterEngine`返回连接标识符，就像在`FollowersViewController`中一样，我们告诉`NSNotificationCenter`希望接收与连接标识符值匹配的通知。\n\
  \n`MGTwitterEngine`通知应用程序图片已可用，并通过`imageReceived:forRequest:`委托方法将其传递给我们。然后，我们为包含图片的返回连接标识符发布通知：\n\
  \n```\n- (void)imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier\
  \ {\n    NSLog(@\"图片已接收，连接标识符 = %@\", connectionIdentifier);\n\n    NSDictionary\
  \ *userInfoDictionary = [NSDictionary dictionaryWithObjects:\n        [NSArray arrayWithObjects:image,\
  \ nil] forKeys:\n        [NSArray arrayWithObjects:@\"profile_image\", nil]];\n\
  \    [[NSNotificationCenter defaultCenter] postNotificationName:connectionIdentifier\n\
  \          object:self\n          userInfo:userInfoDictionary];\n}\n```\n\n\n\n"
- "# 排版后内容\n\n回到`FollowersViewController`中，在通知处理程序里，我们从通知中获取`image`对象，将其设置为单元格的图像，然后更新单元格的布局：\n\
  \n```\n- (void)twitterProfileImageRequestDidComplete:(NSNotification*)notification\
  \ {\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n    self.imageView.image\
  \ = [notification.userInfo objectForKey:@\"profile_image\"];\n    [self setNeedsLayout];\n\
  }\n```\n\n如果你运行示例应用，通过你的 Twitter 用户账户登录，然后点击“Followers”标签，你会看到它下载并显示你的粉丝列表。它还会下载每个粉丝的个人资料图片（参见图\
  \ 6-2）。请注意，此示例尚未优化；它仅用于展示如何开始使用这些 API。\n\n![images](img/0602.jpg)\n\n**Figure 6-2.**\
  \ *一个基本的粉丝列表*\n\n## 内部机制：MGTwitter HTTP 连接与 XML 解析\n\n实际的 Twitter API 是一个基于 HTTP\
  \ 的 API，其中 HTTP 请求被格式化并发送到 Twitter 的服务器，响应以 XML 格式返回。`MGTwitterEngine`为我们提供了一组简洁易用的\
  \ Objective-C 包装类，我们可以在 iOS 应用中使用它们向 Twitter 请求信息。\n\n`MGTwitterEngine`中实际发出请求并处理响应的类是`MGTwitterEngine`类本身。如果你查看`MGTwitterEngine`的头文件，你会注意到它拥有一个连接字典：\n\
  \n```\nNSMutableDictionary *_connections;\n```\n\n每次发出请求时，`MGTwitterEngine`都会创建一个新的`MGTwitterHTTPURLConnection`，它是一个`NSURLConnection`。每个`MGTwitterHTTPURLConnection`都会为自己创建一个唯一标识符（UUID）。这是通过`MGTwitterEngine`中一个名为`NSString+UUID`的`NSString`类别类实现的，该类有一个方法：\n\
  \n```\n+ (NSString*)stringWithNewUUID\n{\n    // Create a new UUID\n    CFUUIDRef\
  \ uuidObj = CFUUIDCreate(kCFAllocatorDefault);\n\n    // Get the string representation\
  \ of the UUID\n    NSString *newUUID = (NSString*)CFUUIDCreateString(kCFAllocatorDefault,\
  \ uidObj);\n    CFRelease(uuidObj);\n    return [newUUID autorelease];\n}\n```\n\
  \n当`MGTwitterEngine`创建一个连接时，它会将该连接对象保存到其`connections`字典中，其中键是连接返回的连接标识符。我们稍后会解释为什么这很重要，但首先让我们看看从\
  \ Twitter 请求某人粉丝的 URL：\n\n`https://twitter.com/statuses/followers.xml`\n\n当`MGTwitterEngine`创建一个`MGTwitterHTTPURLConnection`对象时，它会为其分配一个请求类型和一个响应类型。这是为什么呢？当从\
  \ Twitter 接收到响应时，`MGTwitterEngine`使用这些信息来决定如何解析返回的 XML 数据。请注意，`MGTwitterEngine`有许多\
  \ XML 解析器，它们都派生自`MGTwitterXMLParser`。如果你检查`MGTwitterEngine`的`_parseDataForConnection:`方法，你会发现它根据连接的响应类型执行一个\
  \ switch 语句。在请求粉丝的情况下，会创建一个`MGTwitterUsersParser`来解析响应。XML 被解析后，通过`MGTwitterEngineDelegate`的`userInfoRecieved:forRequest:`方法以字典数组的形式返回给我们。以下是其中一个字典的样子：\n\
  \n```\n(\n{\n    \"contributors_enabled\" = false;\n    \"created_at\" = \"Thu Mar\
  \ 25 16:29:19 +0000 2010\";\n    description = \"Phone Numbers Are Dead. Go800 is\
  \ the new way of placing phone calls\n by giving a voice to the names in your social\
  \ world. Public launch March 1st.\";\n    \"favourites_count\" = 0;\n    \"follow_request_sent\"\
  \ = false;\n    \"followers_count\" = 675;\n    following = 1;\n    \"friends_count\"\
  \ = 939;\n    \"geo_enabled\" = false;\n    id = 126361254;\n    \"is_translator\"\
  \ = false;\n    lang = en;\n    \"listed_count\" = 9;\n    location = \"New York,\
  \ NY\";\n    name = Go800;\n    notifications = false;\n    \"profile_background_color\"\
  \ = ffffff;\n    \"profile_background_image_url\" = \"http://a3.twimg.com/profile_background_images\n\
  /207991705/bkg_go800_850_v_full_v9.png\";\n    \"profile_background_tile\" = true;\n\
  \    \"profile_image_url\" = \"http://a2.twimg.com/profile_images\n/1235044022/go800_logo_twitter_logo_normal.png\"\
  ;\n    \"profile_link_color\" = 3f90b3;\n    \"profile_sidebar_border_color\" =\
  \ 333333;\n    \"profile_sidebar_fill_color\" = ffffff;\n    \"profile_text_color\"\
  \ = 333333;\n    \"profile_use_background_image\" = true;\n    protected = 0;\n\
  \    \"screen_name\" = Go800;\n    \"show_all_inline_media\" = false;\n    \"source_api_request_type\"\
  \ = 11;\n    status =     {\n        contributors = \"\";\n        coordinates =\
  \ \"\";\n        \"created_at\" = \"Tue Feb 22 21:49:40 +0000 2011\";\n        favorited\
  \ = false;\n        geo = \"\";\n        id = 40166359300050944;\n        \"in_reply_to_screen_name\"\
  \ = \"\";\n        \"in_reply_to_status_id\" = \"\";\n        \"in_reply_to_user_id\"\
  \ = \"\";\n        place = \"\";\n        \"retweet_count\" = 6;\n        retweeted\
  \ = false;\n        source = web;\n        \"source_api_request_type\" = 11;\n \
  \       text = \"Phone Numbers Are Dead. Teach twitter a new trick on March 1st.\n\
  \ Follow @Go800 for preview invite.\";\n        truncated = 0;\n    };\n    \"statuses_count\"\
  \ = 83;\n    \"time_zone\" = \"Eastern Time (US & Canada)\";\n    url = \"http://www.go800corp.com\"\
  ;\n    \"utc_offset\" = \"-18000\";\n    verified = false;\n}\n)\n```\n\n### 结论\n\
  \n本章涵盖了与使用 Facebook iOS SDK 获取用户好友列表以及使用`MGTwitterEngine`获取用户粉丝列表相关的许多有趣领域。在此过程中，我们深入了解了每个\
  \ SDK 的内部机制。我们还探讨了一些在 Objective-C 中编写 iOS 应用时常用的编程技术。\n\n在下一章中，我们将以此知识库为基础，更深入地探讨内部机制，并扩展本章的示例项目，向你展示如何使用这些\
  \ SDK 为用户发布信息，以及如何获取更多用户信息。\n\n"
- '# 第 7 章


  '
- "# 访问人、地点、对象和关系\n\n在本章中，我们将介绍 Facebook 方法、对象、属性和连接的细节——以及如何访问它们。我们还将介绍 JSON（JavaScript\
  \ Object Notations），它与 Graph API 的使用密切相关。最后，我们将讨论如何从 Twitter 的 REST（Representational\
  \ State Transfer）^(1) API 中检索基本数据。\n\n你可以在 Git 仓库的 Chapter7 目录中找到本章的所有代码。Facebook\
  \ 代码位于`ApiFacebook`项目中，Twitter 代码位于`ApiTwitter`项目中。这些项目基于第 6 章示例项目中介绍的相同应用结构构建；同样，这些项目并不美观，但它们能完成任务。\n\
  \n## 更多关于 Facebook Graph API 的乐趣\n\n在上一章中，我们向你展示了如何从 Facebook 的社交图谱中提取信息。在这样做的过程中，你可能想知道如何从自己的应用向\
  \ Facebook 的社交图谱添加或发布信息。好吧，既然我们人这么好，我们已经不辞辛劳地将本章的整个部分专门用于介绍如何向 Facebook 社交图谱发布内容。我们还增加了对其他可以从社交图谱中提取的信息的全面介绍，包括这些信息如何与授权和扩展权限相关联。继续阅读以了解详细内容。\n\
  \n___________\n\n¹ 参见，例如，[`http://en.wikipedia.org/wiki/Representational_State_Transfer`](http://en.wikipedia.org/wiki/Representational_State_Transfer)\n\
  \n\n\n### Facebook 对话框\n\n为 iOS 应用增添魅力并使其受用户欢迎的好方法之一，就是让用户能够直接在应用内向他们的 Facebook\
  \ 主页发布内容。尽管 iOS 支持拷贝粘贴和快速应用切换，但如果用户为了在 Facebook 墙上发布来自应用内的一篇有趣文章链接而不得不切换到 iOS 自带的\
  \ Facebook 应用，你的应用吸引力就会大打折扣。\n\n幸运的是，Facebook SDK 已让这项功能的实现和运行变得尽可能简单。这就引出了 `Facebook`\
  \ 类中我们尚未讨论的 `dialog:` 方法：\n\n```\n- (void)dialog:(NSString *)action\n   andDelegate:(id<FBDialogDelegate>)delegate;\n\
  \n- (void)dialog:(NSString *)action\n     andParams:(NSMutableDictionary *)params\n\
  \   andDelegate:(id <FBDialogDelegate>)delegate;\n```\n\n这两个方法都定义在 `Facebook.h`\
  \ 中；虽然有两个方法可用，但我们将侧重于使用第二个，它允许我们传入额外的参数。第一个无参数的方法也可用，但大多数情况下你都需要向 `dialog:` 方法传递参数。此外，如果你查看\
  \ `Facebook.m`，你会发现第一个方法在调用第二个方法时，为其参数传入了一个空字典：\n\n```\n- (void)dialog:(NSString\
  \ *)action\n   andDelegate:(id<FBDialogDelegate>)delegate {\n  NSMutableDictionary\
  \ * params = [NSMutableDictionary dictionary];\n  [self dialog:action andParams:params\
  \ andDelegate:delegate];\n}\n```\n\n这两个方法还都接受一个 *action* 参数和一个 *delegate* 参数。现在我们将在示例应用中研究它们。在本章的示例应用中，我们有一个名为\
  \ `DialogViewController` 的新类。这个类看起来会与 `LoginViewController` 类非常相似，因为，你瞧，它就是直接模仿后者构建的。话虽如此，我们希望将注意力集中在\
  \ `DialogViewController` 类中的几个方面。\n\n由于我们将从 `DialogViewController` 类中向用户显示对话框，我们需要在头文件\
  \ `DialogViewController.h` 中声明它遵循 `FBDialogDelegate` 协议：\n\n```\n@interface DialogViewController\
  \ : UIViewController <FBDialogDelegate> {\n}\n@end\n```\n\n在 `DialogViewController.m`\
  \ 中，我们需要定义以下每个委托回调方法：\n\n```\n- (void)dialogDidComplete:(FBDialog *)dialog;\n- (void)dialogCompleteWithUrl:(NSURL\
  \ *)url;\n- (void)dialogDidNotCompleteWithUrl:(NSURL *)url;\n- (void)dialogDidNotComplete:(FBDialog\
  \ *)dialog;\n- (void)dialog:(FBDialog*)dialog didFailWithError:(NSError *)error;\n\
  - (BOOL)dialog:(FBDialog*)dialog shouldOpenURLInExternalBrowser:(NSURL *)url;\n\
  ```\n\n在进一步讨论这些委托回调之前，是时候使用 `dialog:` 方法来为我们做点工作了。Facebook SDK 会根据你传递给 `dialog:`\
  \ 方法的 `action` 参数，在弹出对话框中显示相应内容。在向用户的 Facebook 主页发布信息的情况下，合适的 action 是 `feed`。因此，在最简单的情况下，如果我们想显示一个对话框，让用户输入任意自由格式文本并发布到他的墙上，我们将如下调用\
  \ `dialog:` 方法，并确保将合适的类（本例中为 `DialogViewController`）作为委托传入：\n\n```\nNSMutableDictionary\
  \ * params = [NSMutableDictionary dictionary];\n[facebook dialog:@\"feed\" andParams:params\
  \ andDelegate:self];\n```\n\n以这种方式调用 `dialog:` 方法会向用户显示这个对话框（见图 7-1）：\n\n![images](img/0701.jpg)\n\
  \n**图 7-1.** *调用 dialog: 方法会向用户展示此对话框。*\n\n如你所见，这非常基础，并非你在 Web 应用中看到的那种让你向 Facebook\
  \ 墙发布内容的功能。那么，让我们通过一些额外的参数来增加点趣味。可以为 `feed` 对话框指定额外的参数，每个参数都有特定的名称和用途。在 Facebook\
  \ 上发布 YouTube 视频非常流行，所以我们假设你想从应用内向用户的墙上发布一个 YouTube 视频链接。为此，向 `parameters` 字典添加一个键值对，其中键是\
  \ `link`，值是该 YouTube 视频的 URL（或任何你想分享的其他网页内容）：\n\n```\nNSDictionary* params = [NSDictionary\
  \ dictionaryWithObject:\n   @http://www.youtube.com/watch?v=nqMc9B7uDV8 forKey:@\"\
  link\"];\n\n[facebook dialog:@\"feed\" andParams:params andDelegate:self];\n```\n\
  \n由于 Facebook SDK 对话框的底层机制是一个 Web 视图（稍后详述），这段代码会漂亮地格式化成你期望的样子，并显示帖子中 YouTube 视频的图片预览（见图\
  \ 7-2）。\n\n![images](img/0702.jpg)\n\n**图 7-2.** *由于 Facebook 对话框是 Web 视图，你可以在此嵌入内容预览。*\n\
  \n这很容易，对吧？不过，让我们更进一步，看看如何更深度地定制 feed 对话框的显示。下面的代码创建了一个 Facebook 喜欢使用的示例对话框：\n\n\
  ```\nNSDictionary* params = [NSDictionary dictionaryWithObjectsAndKeys:\n   @\"\
  http://developers.facebook.com/docs/reference/dialogs/\", @\"link\",\n   @\"http://fbrell.com/f8.jpg\"\
  , @\"picture\",\n   @\"Facebook Dialogs\", @\"name\",\n   @\"Reference Documentation\"\
  , @\"caption\",\n   @\"Dialogs provide a simple interface for apps to interact with\
  \ users.\", @\"description\",\n   @\"Facebook Dialogs are so easy!\",  @\"message\"\
  , nil];\n      [facebook dialog:@\"feed\" andParams:params andDelegate:self];\n\
  ```\n\n在这个例子中，我们为 Facebook 提供的不同键设置了多个值，这样你就可以真正提升对话框的外观和感觉。将图片的 URL 设置为 `picture`\
  \ 键的值，可以控制帖子在用户 Facebook 墙上显示的图片。`name` 键的值控制着以经典的 Facebook 字体显示为墙贴主标题的内容。`caption`\
  \ 和 `description` 值让你能为墙贴提供预设文本。最后但同样重要的是，`message` 键让你可以预设对话框可编辑文本字段中的内容。所有这些信息都会显示在对话框中，如图\
  \ 7-3 所示。\n\n![images](img/0703.jpg)\n\n**图 7-3.** *Facebook 对话框的结构剖析*\n\n在我们深入讨论\
  \ Facebook SDK 对话框的一些内部工作原理之前，我们应该先稍微绕道，回顾一下 `FBDialogDelegate` 方法。根据我们自身的经验，如何使用\
  \ `FBDialogDelegate` 方法取决于你使用它们的上下文。例如，如果你喜欢在应用内跟踪一些分析数据，你可能想要实现这些方法。\n\n每当用户通过按下对话框上的“跳过”或“发布”操作按钮来对对话框执行操作时，SDK\
  \ 会先调用 `dialogCompleteWithUrl:` 方法，然后调用 `dialogDidComplete:` 方法。如果用户按下“跳过”按钮，此 URL\
  \ 将被传递给 `dialogCompleteWithUrl:` 方法：\n\n```\n\"fbconnect://success\"\n```\n\n如果用户改为按下“发布”按钮，此\
  \ URL 将被传递给 `dialogCompleteWithUrl:` 方法：\n\n```\n\"fbconnect://success/?post_id=623441509_10150094754996510\"\
  \n```\n\n\n\n我们首先要承认，起初我们也不知道该如何理解这个响应；不过，我们做了一些深入研究，所以你很幸运。结果发现，URL 中的 `post_id`\
  \ 参数包含了两条独立的标识信息，它们用下划线连接在一起。以下是 `post_id` 参数的定义：\n\n`post_id=<userIdentifier>_<postIdentifier>`\n\
  \n在这个例子中，`userIdentifier` 表示通过我们的应用发布帖子的已登录用户的 Facebook Graph 路径。同样，`postIdentifier`\
  \ 表示该帖子的 Facebook Graph 路径标识符。如果你从 `post_id` 参数中解析出这两条信息，就可以将它们放入以下 URL 格式中，以查看实际结果：\n\
  \n`www.facebook.com/<userIdentifier>/posts/<postIdentifier>`\n\n掌握了这些知识后，你可以通过将用户引导至正确构建的\
  \ URL（如下所示）来向她展示她在 Facebook 移动网站上的实际帖子：\n\n`www.facebook.com/623441509/posts/10150094754996510`\n\
  \n最后需要注意的是，如果用户选择通过右上角的 X 按钮关闭对话框，则会调用带有空 `NSURL` 对象作为参数的 `dialogDidNotCompleteWithUrl:`\
  \ 委托方法，随后会调用 `dialogDidNotComplete:`。\n\n## 底层机制：FBDialog 类\n\n如果你觉得上一节太简单了，那你的感觉没错。我们向\
  \ Facebook 的工程师致敬，他们让这个过程尽可能轻松。一个好的 SDK 拥有经过深思熟虑、易于使用的方法，能最大程度地简化操作。\n\n鉴于我们在上一章讨论过\
  \ `FBRequest` 类的工作原理，那么将信息发布到 Facebook 最终也是通过基于 HTTP 的 API 完成，这应该不足为奇。不过，Facebook\
  \ 的工程师再次展现了风度，他们在 SDK 中提供了 `FBDialog` 类来完成所有繁重的工作。\n\n`FBDialog` 类的代码可以在所有示例项目的\
  \ FBConnect 文件夹中的 `FBDialog.m` 和 `FBDialog.h` 文件中找到。仅仅通过检查 `FBDialog` 类的声明，就能学到很多有趣的东西：\n\
  \n```\n@interface FBDialog : UIView <UIWebViewDelegate> {\n  id<FBDialogDelegate>\
  \ _delegate;\n  NSMutableDictionary *_params;\n  NSString * _serverURL;\n  NSURL*\
  \ _loadingURL;\n  UIWebView* _webView;\n  UIActivityIndicatorView* _spinner;\n \
  \ UIImageView* _iconView;\n  UILabel* _titleLabel;\n  UIButton* _closeButton;\n\
  \  UIDeviceOrientation _orientation;\n  BOOL _showingKeyboard;\n\n  // 确保对话框后的 UI\
  \ 元素被禁用。\n  UIView* _modalBackgroundView;\n}\n@end\n```\n\n首先值得注意的两点是：`FBDialog`\
  \ 只是一个 `UIView`，并且它拥有一个模态背景视图：\n\n```\n// 确保对话框后的 UI 元素被禁用。\nUIView* _modalBackgroundView;\n\
  ```\n\n为什么 `FBDialog` 类只是一个普通的 `UIView`？而且，为什么一个对话框类内部要包含类似模态背景视图的东西？难道 iOS SDK\
  \ 不是已经有一个用于显示模态弹出对话框的类了吗？\n\n虽然这很理想，但事实证明 iOS SDK 并没有提供现成的解决方案来显示模态弹出对话框。这意味着开发者需要自己动手实现。最可靠的方法就是创建一个与整个应用程序框架大小相同的视图，这样用户就无法与模态弹出对话框“后面”的任何内容进行交互。相关代码位于\
  \ `FBDialog` 的 `show:` 方法中，如果你需要在你的应用程序中实现类似功能，这段代码会很有用（请注意，我们已经在 `FBDialog` 的 `init:`\
  \ 方法中创建了 `_modalBackgroundView` 对象）：\n\n```\nUIWindow* window = [UIApplication sharedApplication].keyWindow;\n\
  if (!window) {\n    window = [[UIApplication sharedApplication].windows objectAtIndex:0];\n\
  }\n\n_modalBackgroundView.frame = window.frame;\n[_modalBackgroundView addSubview:self];\n\
  [window addSubview:_modalBackgroundView];\n\n[window addSubview:self];\n```\n\n\
  `FBDialog` 谜题的另一个重要部分是它拥有一个 `UIWebView`，并且是 `UIWebViewDelegate`：\n\n```\nUIWebView*\
  \ _webView;\n```\n\n事实证明，这个 `UIWebView` 负责处理 `FBDialog` 中大部分内容的渲染魔法。`FBDialog` 的主要内容实际上是通过其对话框\
  \ URL 从 Facebook 通过网络获取的，并显示在 `FBDialog` 的 `UIWebView` 中。具体来说，它有一个移动版本的对话框 URL，定义在\
  \ `Facebook.m` 中：\n\n```\nstatic NSString* kDialogBaseURL = @\"https://m.facebook.com/dialog/\"\
  ;\n```\n\n当你使用 Facebook SDK 的 `dialog:` 方法创建一个对话框并传入一个操作时，这个操作会被添加到对话框 URL 中，同时\
  \ SDK 还会添加必要的参数，例如 Facebook SDK 版本、显示样式和重定向 URI。对于一个基本的 `feed` 对话框，最终的请求如下所示：\n\n\
  `https://m.facebook.com/dialog/feed?sdk=2&redirect_uri=fbconnect%3A%2F%2Fsuccess&app_id=114442211957627&display=touch`\n\
  \n我们在这里包含了实际的 `dialog:` 方法，这样你可以看到它如何预设对话框 URL 的一些参数、创建对话框，然后显示它。请注意，最终的对话框 URL\
  \ 是在 `FBDialog` 的 `generateURL:` 方法中构建的：\n\n```\n- (void)dialog:(NSString *)action\n\
  \     andParams:(NSMutableDictionary *)params\n   andDelegate:(id <FBDialogDelegate>)delegate\
  \ {\n\n  [_fbDialog release];\n\n  NSString *dialogURL = [kDialogBaseURL stringByAppendingString:action];\n\
  \  [params setObject:@\"touch\" forKey:@\"display\"];\n  [params setObject:kSDKVersion\
  \ forKey:@\"sdk\"];\n  [params setObject:kRedirectURL forKey:@\"redirect_uri\"];\n\
  \n  if (action == kLogin) {\n    [params setObject:@\"user_agent\" forKey:@\"type\"\
  ];\n    _fbDialog = [[FBLoginDialog alloc] initWithURL:dialogURL\n        loginParams:params\
  \ delegate:self];\n  } else {\n    [params setObject:_appId forKey:@\"app_id\"];\n\
  \    if ([self isSessionValid]) {\n      [params setValue:[self.accessToken\n  \
  \    stringByReplacingPercentEscapesUsingEncoding:NSUTF8StringEncoding]\n      \
  \                                      forKey:@\"access_token\"];\n    }\n    _fbDialog\
  \ = [[FBDialog alloc] initWithURL:dialogURL\n                                  \
  \     params:params\n                                     delegate:delegate];\n\
  \  }\n\n  [_fbDialog show];\n}\n```\n\n## 发布到 Facebook 与授权\n\n在我们继续讨论其他神奇的功能之前，我们想指出，如果你的主要目标是让用户从你的应用程序或网页分享信息到他们的\
  \ Facebook 页面，那么它实际上就像集成 Facebook iOS SDK 一样简单——正如我们在这里使用 `dialog:` 方法所展示的那样。事实上，你甚至不必担心单独进行授权调用，因为当你请求一个未经授权的对话框时，Facebook\
  \ 会通过各种网页重定向为你处理这些。当你请求一个未经授权的对话框时，该对话框会*自动*将用户带到 Facebook 移动端 `OAuth` 授权页面（参见图\
  \ 7–4）。一旦用户登录，他就会被重定向回你最初请求的对话框。真的没有比这更简单的方法了，不是吗？\n\n![images](img/0704.jpg)\n\n\
  **图 7–4.** *Facebook OAuth 登录视图*\n\n我们还想指出，发布到 Facebook 不需要扩展权限，因此你可以免费获得此功能。这在实践中的意思是，如果你使用的是我们在第\
  \ 5 章中介绍的授权方法，那么你不需要向 `authorize:` 调用传递任何额外的权限。\n\n\n\n"
- "# 从 Facebook 图谱获取更多好东西\n\n正如你所见，本书不仅致力于让你深入了解如何在应用程序中使用 Facebook iOS SDK，还会解释其底层运作机制。在第\
  \ 6 章中，我们展示了如何获取你的 Facebook 好友列表的技术细节，介绍了 Facebook 图谱路径的结构原理，并解释了 `FBRequest` 类的工作原理。如果你还未阅读该章，现在不妨快速浏览一下，因为我们将通过一些新示例来演示如何从\
  \ Facebook 社交图谱中获取更多信息。不过，除非有新的内容需要讨论，否则我们将不再赘述技术细节。\n\n请记住，通过 Facebook iOS SDK\
  \ 的 `requestWithGraphPath:` 方法即可实现从 Facebook 图谱获取信息。\n\n以下示例演示了如何完成这一基本任务：\n\n```\n\
  NSMutableDictionary *params = [NSMutableDictionary dictionary];\n//不需要扩展权限\n[facebook\
  \ requestWithGraphPath:@\"me/friends\"\n                     andParams:params\n\
  \                   andDelegate:self];\n```\n\n你传递给此方法的字符串采用以下格式：\n\n```\n<facebook_id>/<请求的图谱路径>\n\
  ```\n\n在该示例中，它将获取当前登录用户的好友列表：\n\n```\nme/friends\n```\n\n请注意代码中的注释。如第 5 章所述，通过 `OAuth`\
  \ 对用户进行授权时，请求好友信息不需要任何扩展权限。\n\n**注意：** 你可以在示例应用的 `FriendsViewController` 类的 `viewDidLoad:`\
  \ 方法中找到这些示例的代码。\n\n如果你想获取某人的新闻推送，只需将图谱路径改为 `home`：\n\n```\nNSMutableDictionary *params\
  \ = [NSMutableDictionary dictionary];\n[facebook requestWithGraphPath:@\"me/home\"\
  \n                     andParams:params\n                   andDelegate:self];\n\
  ```\n\n这将返回一个字典数组。每个字典包含新闻推送中一条信息的内容。每条信息的字典包含创建时间、帖子 ID、消息内容、类型（例如状态）、评论或点赞操作以及评论等键值：\n\
  \n```\n{\n    actions =     (\n        {\n          link = \"http://www.facebook.com/<facebook\
  \ id>/posts/<post id>\";\n          name = Comment;\n        },\n        {\n   \
  \       link = \"http://www.facebook.com/<facebook id>/posts/<post id>\";\n    \
  \      name = Like;\n        }\n    );\n    \"created_time\" = \"2011-02-28T02:23:08+0000\"\
  ;\n    from =     {\n        id = <facebook id>;\n        name = \"<facebook name>\"\
  ;\n    };\n    id = \"<post id>\";\n    message = \"....\";\n    type = status;\n\
  \    \"updated_time\" = \"2011-02-28T02:23:08+0000\";\n}\n```\n\n获取笔记需要扩展权限 `user_notes`，图谱路径为\
  \ `notes`（见图 7–5）：\n\n![images](img/0705.jpg)\n\n**图 7–5.** *请求权限*\n\n```\nNSMutableDictionary\
  \ *params = [NSMutableDictionary dictionary];\n// 需要 'user_notes' 扩展权限\n[facebook\
  \ requestWithGraphPath:@\"me/notes\" andParams:params andDelegate:self];\n```\n\n\
  这将返回一个字典数组。每个字典包含用户一条笔记的信息。每条笔记的字典包含创建时间、笔记 ID、笔记/消息内容以及评论等键值：\n\n```\n{\n    comments\
  \ =     {\n        data =         (\n            {\n                \"created_time\"\
  \ = \"2009-08-02T13:41:44+0000\";\n                from =    {\n               \
  \     Id = <facebook id>;\n                    name = \"<facebook name>\";\n   \
  \                 };\n                    id = \"<post id>\";\n                \
  \    message = \"<comment>\";\n                },\n                {\n         \
  \               \"created_time\" = \"2009-08-02T13:43:01+0000\";\n             \
  \       from =    {\n                        id = <facebook id>;\n             \
  \           name = \"<facebook name>\";\n                };\n                  \
  \  id = \"<post id>\";\n                    message = \"<comment>\";\n         \
  \   }\n        );\n    };\n    \"created_time\" = \"2009-08-02T13:23:35+0000\";\n\
  \    from =     {\n        id = <facebook id>;\n            name = \"<facebook name>\"\
  ;\n    };\n    icon = \"http://static.ak.fbcdn.net/rsrc.php/v1/yY/r/1gBp2bDGEuh.gif\"\
  ;\n    id = <note id>;\n    message = \"<note contents>\";\n    subject = quotes;\n\
  \    \"updated_time\" = \"2010-05-14T01:35:42+0000\";\n}\n```\n\n获取事件需要扩展权限 `user_events`，图谱路径为\
  \ `events`（见图 7–5）：\n\n```\nNSMutableDictionary *params = [NSMutableDictionary dictionary];\n\
  // 需要 'user_events' 扩展权限\n[facebook requestWithGraphPath:@\"me/events\" andParams:params\
  \ andDelegate:self];\n```\n\n这将返回一个字典数组。每个字典包含用户一个事件的信息。每个事件的字典包含开始和结束时间、事件 ID、事件名称、地点以及用户的\
  \ RSVP 状态等键值：\n\n```\n{\n    \"end_time\" = \"2011-03-10T13:00:00+0000\";\n    id\
  \ = 106092242803326;\n    location = \"Electric Pickle\";\n    name = \"WMC :: GODFATHER\
  \ *James Brown Tribute* meets CHAMPION SOUND\";\n    \"rsvp_status\" = unsure;\n\
  \    \"start_time\" = \"2011-03-10T06:00:00+0000\";\n}\n```\n\n获取群组需要扩展权限 `user_groups`，图谱路径为\
  \ `groups`（见图 7–5）：\n\n```\nNSMutableDictionary *params = [NSMutableDictionary dictionary];\n\
  //需要 'user_groups' 扩展权限\n[facebook requestWithGraphPath:@\"me/groups\" andParams:params\
  \ andDelegate:self];\n```\n\n这将返回一个字典数组。每个字典包含用户一个群组的信息。每个群组的字典包含群组 ID、群组名称以及群组版本等键值：\n\
  \n```\n{\n    id = 166023750105785;\n    name = \"SkateSide Events\";\n    version\
  \ = 1;\n}\n```\n\n获取赞、电影、音乐和书籍需要扩展权限 `user_likes`，图谱路径分别为 `likes`、`movies`、`music`\
  \ 或 `books`（见图 7–5）。\n\n每个请求返回一个字典数组。每个字典包含用户的一个赞、电影、音乐或书籍的信息。每个项目的字典包含类别、创建时间、Facebook\
  \ ID 和名称等键值。例如，以下代码返回用户的赞信息：\n\n```\nNSMutableDictionary *params = [NSMutableDictionary\
  \ dictionary];\n// 需要 'user_likes' 扩展权限\n[facebook requestWithGraphPath:@\"me/likes\"\
  \n                     andParams:params\n                   andDelegate:self];\n\
  ```\n\n```\n{\n    category = \"Product/service\";\n    \"created_time\" = \"2011-02-23T00:09:34+0000\"\
  ;\n    id = 186242738068007;\n    name = AAdvantage;\n}\n```\n\n类似地，以下代码返回用户的电影信息：\n\
  \n```\n[facebook requestWithGraphPath:@\"me/movies\"\n                     andParams:params\n\
  \                   andDelegate:self];\n```\n\n```\n{\n    category = Movie;\n \
  \   \"created_time\" = \"2010-12-28T18:50:40+0000\";\n    id = 104167709618686;\n\
  \    name = \"Ferris Bueller's Day Off\";\n}\n```\n\n以下代码返回用户的音乐信息：\n\n\n\n`[facebook\
  \ requestWithGraphPath:@\"me/music\" andParams:params andDelegate:self];`\n\n```\n\
  {\n    category = \"Musician/band\";\n    \"created_time\" = \"2011-01-16T02:11:26+0000\"\
  ;\n    id = 47167209984;\n    name = \"New York Night Train\";\n}\n```\n\n以下代码返回用户书籍的相关信息：\n\
  \n`[facebook requestWithGraphPath:@\"me/books\" andParams:params andDelegate:self];`\n\
  \n获取用户的墙贴需要扩展权限 `read_stream`，其图形路径为 `feed`：\n\n```\nNSMutableDictionary *params\
  \ = [NSMutableDictionary dictionary];\n// 需要 'read_stream' 扩展权限\n[facebook requestWithGraphPath:@\"\
  me/feed\"\n                     andParams:params\n                   andDelegate:self];\n\
  ```\n\n上述代码片段返回一个字典数组。每个字典包含用户墙贴中一个条目的信息。每个条目的字典将包含以下键：创建时间、帖子 ID、消息内容、类型（例如，状态）、评论或点赞的操作，以及评论：\n\
