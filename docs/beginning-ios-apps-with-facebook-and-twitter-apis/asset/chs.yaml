  确保用户知晓您的应用所执行操作的后果。对于熟悉计算机的用户，告诉他们发生了 `POST` 或 `GET` 事件可能就足够了。但许多用户可能不熟悉这些事件的后果。如果您的应用有任何可能泄露个人或隐私信息，请务必在应用内某处清楚说明风险。在不破坏视觉设计且不使交互变得杂乱的情况下，将此类警告或帮助文本集成到
  iOS 应用中可能很困难，但本书的第 5 章可以帮助您确定何时以及何处执行此操作。


  ### 关于动态消息的说明


  冒着啰嗦的风险，我们觉得必须提及，许多由 Facebook 和 Twitter 的 API 支持的操作会产生一些不可逆转的后果。这些风险关乎生死吗？可能不是。但一旦信息发布到社交图谱上，就极难（如果不是不可能）删除。


  在 Twitter 上，推文流会被搜索引擎立即编入索引，因此即使用户删除了推文，其文本内容也可能长期存在。Facebook 的状态无法被搜索引擎索引，但它们会被推送到用户朋友的
  Facebook 新闻源应用中，并且无法从其他人的新闻源中擦除，即使原始帖子被删除。请记住这一点，不要对用户的信息掉以轻心。


  ### 如果遇到安全漏洞该怎么办


  如果您在开发应用时发现 Facebook 或 Twitter 平台存在您认为可能的安全问题，应立即向相应实体报告该缺陷。


  对于 Facebook，这意味着在其错误跟踪系统中提交工单，该系统位于 [`http://bugs.developers.facebook.net`](http://bugs.developers.facebook.net)。对于更大的问题，您可以填写位于
  [`http://www.facebook.com/help/contact.php?show_form=dev_support`](http://www.facebook.com/help/contact.php?show_form=dev_support)
  的表格，尽管该公司表示对该表格的响应速度不如错误跟踪器快。


  Twitter 有一个更细致的报告系统。该公司拥有几个不同的报告系统，根据您发现的缺陷类型进行细分。要查看您的报告选项，请查看 [`http://support.twitter.com/groups/33-report-a-violation`](http://support.twitter.com/groups/33-report-a-violation)；您可以浏览
  `@support` 动态消息，查看该问题是否已被处理。


  ### 总结


  我们认为您已经明白了：隐私很重要，而安全性更重要。要反复进行原型设计、测试和再测试。不要依赖苹果来审查您应用的安全性。使用适当版本的 OAuth，并考虑所有能想到的用例来防止漏洞。在开发的每个阶段都这样做，并且在确定安全之前，不要推出成品。并且不要忘记：一旦某些内容发布到社交图谱上，就几乎不可能删改。发布需谨慎！


