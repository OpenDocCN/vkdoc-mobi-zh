  \      \"time_zone\" = \"Eastern Time (US & Canada)\";\n        url = \"http://christhepiss.tumblr.com\"\
  ;\n        \"utc_offset\" = \"-18000\";\n        verified = false;\n    };\n   \
  \ \"sender_id\" = 103384600;\n    \"sender_screen_name\" = christhepiss;\n    \"\
  source_api_request_type\" = 15;\n    text = \"hey jerky!\";\n}\n```\n\n`MGTwitterEngine`\
  \ SDK 缺少一个用于轻松构建推文或私信的对话框类，因此这部分工作需要你自行构建。:( 别忘了查看 `MGTwitterEngine.h` 中更多可用的方法，我们在这里并未全部覆盖。\n\
  \n### 幕后原理：Twitter URL\n\n上述所有操作的一个优点是，它们共享底层 Twitter HTTP API 的通用 URL 模式：\n\n`http://twitter.com/`\n\
  \nURL 的剩余路径部分根据你的具体操作来构建。对于状态相关操作，路径为：\n\n`http://twitter.com/statuses`\n\n对于用户相关操作，路径为：\n\
  \n`http://twitter.com/users`\n\n对于私信，路径为：\n\n`http://twitter.com/direct_messages`\n\
  \n路径的最后一部分是你要执行的特定操作。其后是扩展名（与期望的响应格式匹配），然后是参数。因此，如果我们想要以 XML 格式获取公共时间线（`MGTwitterEngine`\
  \ 默认请求 XML 响应），它将如下所示：\n\n`http://twitter.com/statuses/public_timeline.xml`\n\n\
  如果你希望更详细地了解每个请求的最终 URL 是如何构建的，可以查阅 `SA_OAuthTwitterEngine` 的 `_sendRequestWithMethod:`\
  \ 方法中的代码。\n\n### Twitter 开发者控制台\n\n如果你更倾向于在 web 浏览器中使用 Twitter API，Twitter 提供了一个非常优秀的在线工具，我们强烈推荐。该工具可通过以下\
  \ URL 访问：\n\n`http://dev.twitter.com/console`\n\nTwitter 开发者控制台允许你构建不同的请求或进行不同类型的发布，并查看\
  \ Twitter 的响应。图 7–7 展示了页面的主要部分。\n\n![images](img/0707.jpg)\n\n**图 7–7.** *Twitter\
  \ API 控制台*\n\n另一个优秀的资源是每个 Twitter HTTP API 的文档，你可以在其中获得使用每个 API 的详细说明：\n\n`http://dev.twitter.com/doc`\n\
  \n### 结语\n\n现在，你已经正式武装完毕，具备了很强的能力。我们已经涵盖了 Facebook 和 Twitter 的足够多的 API，并向你展示了如何将它们与相应的\
  \ iOS SDK 结合使用。理论上，你现在就可以开始构建自己的 Facebook 或 Twitter 应用了。这是一项相当艰巨的任务，但你已经拥有了完成它的工具。不过，请继续阅读，以更深入地了解实时数据和位置处理，以及如何以不同方式将这两个\
  \ API 融合在一起。\n\n## 第 8 章\n\n## POST 请求、数据建模与离线处理\n\n本章将介绍向 Facebook 和 Twitter 发布照片的具体细节。我们还将讨论离线存储；最后，会介绍一个流行的跨平台发布库，以及如何在自己的项目中使用它。\n\
  \n到目前为止，我们已经在 iOS 上涵盖了关于 Facebook 和 Twitter 编程的许多不同主题。然而，为了尽可能清晰地展示这些主题，我们打破了一些良好的编程实践。因此在本章中，我们将纠正这些做法，并展示将这些服务集成到应用程序中的更好技术。我们还将涵盖离线场景和存储。但在进入这些话题之前，我们需要为工具包再添加一项基本技能：向\
  \ Facebook 和 Twitter 发布照片。\n\n### 摆个姿势\n\n对于大多数在 iOS 设备上使用图片的应用程序而言，图片要么从网络下载，要么由应用程序创建并作为应用数据的一部分存储。也可以从设备的“照片图库”中获取图片。幸运的是，苹果让从“照片图库”获取图片变得很容易，因此我们的示例应用程序将采用这种方式。本章的照片上传示例应用程序分别位于\
  \ Git 仓库的 `Chapter8` 文件夹下的 `ApiFacebook` 和 `ApiTwitter` 文件夹中。\n\n\n\n#### 将图片保存到\
  \ iOS 模拟器的相册\n\n将图片存入 iOS 模拟器的相册有点棘手，因为模拟器无法模拟相机硬件；不过，有一种快捷方法可以通过保存网页中的图片来实现。首先，在模拟器中启动\
  \ Safari 浏览器，访问 [`www.google.com`](http://www.google.com)。在搜索栏上方的 Google 图标上按住鼠标一至两秒，然后松开鼠标。您将看到\
  \ 图 8-1 中所示的弹出对话框，允许您保存或复制图片。选择**存储图像**，即可将图片保存到模拟器的相册中。\n\n![images](img/0801.jpg)\n\
  \n**图 8-1.** *在移动版 Safari 中长按网页上的图片，即可保存或复制该图片。*\n\n**注意：** 根据我们的经验，有时需要重复上述步骤数次，图片才会出现在相册中。\n\
  \n#### 使用 UIImagePickerController\n\n现在，我们已在模拟器的相册中保存了一张图片，接下来需要在代码中访问该图片。这正是 `UIImagePickerController`\
  \ 类发挥作用的地方。Apple 的工程师精心打造了一个非常易于使用的类，用于从相册中获取图片，并在应用中将其数据作为 `UIImage` 对象使用。您可以将以下代码片段插入到任何\
  \ `UIViewController` 类中，以显示 `UIImagePickerController`。在下一节中，我们将介绍如何将此代码片段整合到本章的示例应用中。\n\
  \n首先，我们检查相册是否是可访问的图片来源。接着，创建一个 `UIImagePickerController`，并告知它我们希望使用相册作为图片来源。最后，将自身设置为其委托，并使用\
  \ `UIViewController` 的 `presentModalViewController` 方法来显示它：\n\n```\nif ([UIImagePickerController\
  \ isSourceTypeAvailable:\n    UIImagePickerControllerSourceTypePhotoLibrary]) {\n\
  \        UIImagePickerController *uiImagePickerController =\n                  \
  \                   [[UIImagePickerController alloc] init];\n        uiImagePickerController.sourceType\
  \ =\n            UIImagePickerControllerSourceTypePhotoLibrary;\n        uiImagePickerController.delegate\
  \ = self;\n        [self presentModalViewController:uiImagePickerController animated:YES];\n\
  \        [uiImagePickerController release];\n}\n```\n\n在使用 `UIImagePickerController`\
  \ 时，我们必须将视图控制器设置为 `UIImagePickerControllerDelegate`，并实现以下方法：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info;\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker;\n```\n\n当选择一张图片时，会调用 `UIImagePickerControllerDelegate` 的 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法。`UIImage` 对象的数据存储在传递给该方法的 `NSDictionary` 中，键值为 `UIImagePickerControllerOriginalImage`。以下是实现这一切的代码（请注意，`savedImage`\
  \ 已在别处声明）：\n\n```\n- (void)imagePickerController:(UIImagePickerController *)picker\n\
  \    didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [savedImage release];\n\
  \    savedImage = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"];\n\
  \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n值得注意的是，您有责任通过 `UIViewController`\
  \ 的 `dismissModalViewControllerAnimated` 方法来关闭 `UIImagePickerController`：\n\n```\n\
  - (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n{\n  \
  \  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n运行时，`UIImagePickerController`\
  \ 会显示设备上的相册列表，如 图 8-2 所示。\n\n![images](img/0802.jpg)\n\n**图 8-2.** *UIImagePickerController\
  \ 显示的已保存照片列表*\n\n选择相册后，您便可以从中选择一张照片，如 图 8-3 所示。\n\n![images](img/0803.jpg)\n\n**图\
  \ 8-3.** *在 UIImagePickerController 中点击一张图片。*\n\n#### ImagePostController\n\n在本章的\
  \ `ApiFacebook` 和 `ApiTwitter` 示例项目中，您将找到一个名为 `ImagePostController` 的新 `UIViewController`。它包含一个按钮，点击后会显示\
  \ `UIImagePickerController`。`ImagePostController` 是一个 `UIImagePickerControllerDelegate`；因此，当选择一张图片时，它会将图片保存到在\
  \ `ImagePostController.h` 中声明的 `UIImage` 对象 `savedImage` 中。然后，`ImagePostController`\
  \ 会将图片发布到当前登录用户的 Facebook 照片或 Twitter 信息流中。\n\n#### Facebook 照片上传\n\n上一节我们介绍了如何通过委托回调获取\
  \ `UIImage`，现在我们将重点放在如何将图片发布到用户的 Facebook 照片中。接下来讨论的代码位于本章 ApiFacebook 示例应用的 `ImagePostController.m/.h`\
  \ 文件中。\n\n为此，我们将使用老朋友 `requestWithGraphPath:andParams:andHttpMethod:andDelegate:`\
  \ 方法。我们将图形路径设置为 `\"me/photos\"`，以指定目标为当前用户的照片。然后传入一个参数字典。该字典用于存储图片数据。图片本身作为键 `image`\
  \ 的对象存储在字典中。如果您想为图片添加说明文字，还可以为键 `message` 添加说明文本。接着，由于我们是在发布数据，因此将 HTTP 方法设置为 `POST`。最后，我们将自身指定为\
  \ `FBRequestDelegate`：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [savedImage\
  \ release];\n    savedImage = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"\
  ];\n    [self dismissModalViewControllerAnimated:YES];\n\n    NSMutableDictionary\
  \ *args = [[NSMutableDictionary alloc] init];\n    [args setObject:@\"This is a\
  \ test image\" forKey:@\"message\"];\n    [args setObject:savedImage forKey:@\"\
  image\"];\n    [facebook requestWithGraphPath:@\"me/photos\"\n                 \
  \      andParams:args\n                   andHttpMethod:@\"POST\"\n            \
  \         andDelegate:self];\n    [args release];\n}\n```\n\n如果发布成功，将调用 `FBRequestDelegate`\
  \ 的 `request:didLoad:` 方法。如果登录到您的 Facebook 帐户，您应该会看到一个新的相册，其中包含这张图片。该相册的名称将与您在 Facebook\
  \ 上注册应用时使用的应用名称一致。以本书为例，相册名称为“Beginning iOS Social Development”（见图 8-4）。\n\n![images](img/0804.jpg)\n\
  \n**图 8-4.** *Facebook 将来自第三方应用的照片归类在一起。*\n\n\n\n"
- "# Twitter 照片上传\n\n通常情况下，Facebook iOS SDK 为我们提供了极大的便利。从前一节可以看出，将图片发布到用户的 Facebook\
  \ 相册只需极少的代码量。遗憾的是，要通过 Twitter 完成同样的任务就没那么简单了，不过在编写本书时，Twitter 正与 Photobucket 建立合作关系，以简化开发者在\
  \ Twitter 上发布带图推文的流程。本章将展示如何将图片上传到图片托管服务（例如 TwitPic [`www.twitpic.com/`]），然后将图片在\
  \ twitpic.com 上的网址发布到用户的 Twitter 时间线。以下示例代码使用 TwitPic，但还有其他类似服务可供选择，例如 twitgoo [`www.twitgoo.com/`]\
  \ 和 yfrog [`www.yfrog.com/`]。\n\n为了将图片发布到 twitpic.com，我们首先需要在该服务的网站上注册，获取 TwitPic\
  \ API 密钥。访问 `http://dev.twitpic.com/apps/new` 并使用你的 Twitter 凭据登录（见图 8-5 和图 8-6）。\n\
  \n![images](img/0805.jpg)\n\n**图 8-5.** *注册 TwitPic API 密钥，以便在 iOS 应用中使用该公司的服务。*\n\
  \n![images](img/0806.jpg)\n\n**图 8-6.** *通过 OAuth 授权 TwitPic 访问权限*\n\n接下来，输入关于你应用的必填信息（见图\
  \ 8-7）。\n\n![images](img/0807.jpg)\n\n**图 8-7.** *向 TwitPic 提供基本应用信息*\n\n最后，保存返回的\
  \ TwitPic API 密钥以备后用（见图 8-8）。\n\n![images](img/0808.jpg)\n\n**图 8-8.** *成功注册后，`TwitPic`\
  \ 会为应用创建一个 `API 密钥`。*\n\n按照此类服务的惯例，TwitPic 提供了基于 HTTP 的 API 用于将照片上传到其网站。API 文档位于\
  \ `http://dev.twitpic.com/docs/`。此外，碰巧有热心人为这个 API 构建了一个 iOS Objective-C 封装，并托管在\
  \ Github（`GSTwitPicEngine`）上，地址是 `https://github.com/Gurpartap/GSTwitPicEngine`。`GSTwitPicEngine`\
  \ 设计为与 `MGTwitterEngine` 配合使用，因此它能够很好地（只需少量调整，详情请见下文）集成到我们已有的配置中。不幸的是，`GSTwitPicEngine`\
  \ 依赖于其他一些软件组件，且并非所有组件都能开箱即用地正常工作。好消息是：我们已经为你抹平了所有棘手之处。\n\n因此，在研究如何使用 `GSTwitPicEngine`\
  \ 之前，我们需要先从 Github 获取其他库的代码，设置 Git 子模块，然后将相关文件添加到项目中。本章中所有项目变更和代码均位于 `ApiTwitter`\
  \ 项目中，具体在 `ImagePostController.m/.h` 文件内。\n\n## GSTwitPicEngine\n\n你可以通过 Git 子模块将\
  \ Github 上的 `GSTwitPicEngine` iOS Git 仓库链接到你的仓库，该子模块将位于名为 `GSTwitPicEngine` 的子目录中：\n\
  ```\n$ git submodule add git://github.com/chrisdannen/GSTwitPicEngine.git GSTwitPicEngine\n\
  ```\n在项目中创建一个名为 `GSTwitPicEngine` 的新组，并将 `GSTwitPicEngine.m/.h` 拖入其中：\n\n最后，在 `GSTwitPicEngine.h`\
  \ 中设置以下值：\n```\n#define TWITTER_OAUTH_CONSUMER_KEY @\"<>\"\n#define TWITTER_OAUTH_CONSUMER_SECRET\
  \ @\"<>\"\n#define TWITPIC_API_KEY @\"<>\"\n```\n\n## ASIHTTPRequest\n\n`ASIHTTPRequest`\
  \ 是一个开源库，它能轻松实现 HTTP 请求。`GSTwitPicEngine` 使用该库完成繁重的工作。\n\n通过 Git 子模块将 Github 上的\
  \ `ASIHTTPRequest` Objective-C Git 仓库链接到你的仓库，该子模块将位于名为 `asi-http-request` 的子目录中：\n\
  ```\n$ git submodule add git://github.com/pokeb/asi-http-request.git asi-http-request\n\
  ```\n现在，在项目中创建一个名为 `ASIHttpRequest` 的新组，并将 `./asi-http-request/Classes` 中的必要文件拖入你的项目。请参考本章的\
  \ `ApiTwitter` 示例项目，了解你需要使用的具体文件子集。\n\n接下来，在 Xcode 项目中，将你的目标链接到 `CFNetwork`、`SystemConfiguration`、`MobileCoreServices`\
  \ 和 `zlib.1.2.3.dylib`（见图 8-9）。\n\n![images](img/0809.jpg)\n\n**图 8-9.** *在 Xcode\
  \ 项目中添加 `ASIHTTPRequest` 后，更新链接器设置。*\n\n## SBJSON\n\nSBJSON 是少数几个用于解析 JSON 的开源 Objective-C\
  \ 框架之一。在 `./GSTwitPicEngine/GSTwitPicEngine.h` 中，我们指定 SBJSON 作为我们首选的 JSON 框架，因此需要将相关文件包含到项目中：\n\
  ```\n#define TWITPIC_USE_SBJSON 1\n```\n通过 Git 子模块将 Github 上的 SBJSON Objective-C\
  \ Git 仓库链接到你的仓库，该子模块将位于名为 `json-framework` 的子目录中：\n```\n$ git submodule add git://github.com/stig/json-framework.git\
  \ json-framework\n```\n接下来，在项目中创建一个名为 `SBJSON` 的新组，并将 `./json-framework/Classes`\
  \ 中的所有文件拖入你的项目。\n\n## OARequestHeader\n\n通过 Git 子模块将 Github 上的 `OARequestHeader`\
  \ Objective-C Git 仓库链接到你的仓库，该子模块将位于名为 `OARequestHeader` 的子目录中：\n```\n$ git submodule\
  \ add git://github.com/chrisdannen/OARequestHeader.git OARequestHeader\n```\n在项目中创建一个名为\
  \ `OARequestHeader` 的新组，并将 `./OARequestHeader.m/.h` 文件拖入你的项目。\n\n现在，将任何更新后的文件（例如你的\
  \ Xcode 项目文件）添加到 Git 提交中，然后提交并推送你的更改到 Github。\n\n\n\n### 发布照片\n\n我们终于准备好向示例项目中添加一些代码，用于将照片链接发布到用户的\
  \ Twitter 动态中。大部分相关更改都在 `ImagePostController.m/.h` 文件中；你也可以在 `AppDelegate.m` 中找到一些小的改动。在本节中，我们将重点关注\
  \ `ImagePostController.m/.h` 中的更改。\n\n首先，我们在 `ImagePostController.h` 中声明一些需要的对象：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"GSTwitPicEngine.h\"\n\n@interface ImagePostController\
  \ : UIViewController <UINavigationControllerDelegate,\n                        \
  \                              UIImagePickerControllerDelegate, GSTwitPicEngineDelegate>\
  \ {\n    UIButton *twitterButton;\n    UIImage *savedImage;\n    GSTwitPicEngine\
  \ *twitpicEngine;\n}\n\n@end\n```\n\n我们需要一个 `GSTwitPicEngine` 的实例来将照片发布到 twitpic.com。我们还需要保存返回的图像，并且需要将自身声明为\
  \ `GSTwitPicEngineDelegate`，以便在 `GSTwitPicEngine` 完成向 twitpic.com 发布照片时收到通知。\n\n\
  ![images](img/0810.jpg)\n\n**图 8–10.** *从 iOS 应用上传到 TwitPic 的图片*\n\n当 `ImagePostController`\
  \ 的视图被加载时，我们需要创建并初始化 `GSTwitPicEngine` 实例：\n\n```\n- (void)loadView\n{\n    [super\
  \ loadView];\n\n    twitterButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    twitterButton.frame = CGRectMake(127.0f, 68.0f, 72.0f, 37.0f);\n    [twitterButton\
  \ setTitle:@\"Twitter\" forState:UIControlStateNormal];\n    [twitterButton addTarget:self\n\
  \                     action:@selector(twitterButtonClick:)\n           forControlEvents:UIControlEventTouchUpInside];\n\
  \    [self.view addSubview:twitterButton];\n\n    twitpicEngine = [[GSTwitPicEngine\
  \ twitpicEngineWithDelegate:self] retain];\n    [twitpicEngine setAccessToken:[sa_OAuthTwitterEngine\
  \ accessToken]];\n}\n```\n\n注意，我们将自身设置为 `GSTwitPicEngine` 的委托，并将主 Twitter 引擎中的 `accessToken`\
  \ 传递给 `GSTwitPicEngine`，以便其拥有必要的 `OAuth` 参数。请注意，在运行示例应用时，你首先需要从“登录”标签页登录 Twitter。\n\
  \n当通过 `UIImagePickerController` 选择图片后，我们可以使用 `GSTwitPicEngine` 的 `uploadPicture:withMessage:`\
  \ 方法将图片发布到 twitpic.com：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\n didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [savedImage\
  \ release];\n    savedImage = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"\
  ];\n    [self dismissModalViewControllerAnimated:YES];\n\n    // 此消息在请求的 userInfo\
  \ 中的成功委托回调中返回。\n    [twitpicEngine uploadPicture:savedImage withMessage:@\"Hello\
  \ world!\"];\n}\n```\n\n如果照片成功上传到 twitpic.com，则会调用 `GSTwitPicEngineDelegate` 的 `twitpicDidFinishUpload:`\
  \ 方法，并传入一个包含响应信息的 `NSDictionary`：\n\n```\n- (void)twitpicDidFinishUpload:(NSDictionary\
  \ *)response\n{\n    NSLog(@\"TwitPic finished uploading: %@\", response);\n\n \
  \   // [response objectForKey:@\"parsedResponse\"] 返回一个 NSDictionary，\n    // 其中包含解析后的响应（如果某个解析库可用）。\n\
  \    // 否则，请使用 [[response objectForKey:@\"request\"]\n    // objectForKey:@\"responseString\"\
  ] 自行解析。\n\n    if ([[[response objectForKey:@\"request\"] userInfo] objectForKey:@\"\
  message\"] > 0 &&\n                                                            \
  \               [[response objectForKey:@\"parsedResponse\"] count] > 0) {\n   \
  \     NSString *update = [NSString stringWithFormat:@\"%@ %@\",\n              \
  \ [[response objectForKey:@\"parsedResponse\"] objectForKey:@\"text\"],\n      \
  \         [[response objectForKey:@\"parsedResponse\"] objectForKey:@\"url\"]];\n\
  \        [sa_OAuthTwitterEngine sendUpdate:update];\n    }\n}\n```\n\n返回的响应字典中包含一个键为\
  \ `parsedResponse` 的字典，其中包含我们向 twitter.com 发布内容所需的信息：\n\n```\nTwitPic finished uploading:\
  \ {\n    parsedResponse =     {\n        height = 128;\n        id = 4gao9b;\n \
  \       size = 15551;\n        text = \"Hello world!\";\n        timestamp = \"\
  Sun, 03 Apr 2011 01:04:55 +0000\";\n        type = jpg;\n        url = \"http://twitpic.com/4gao9b\"\
  ;\n        user =         {\n            id = 103384600;\n            \"screen_name\"\
  \ = christhepiss;\n        };\n        width = 366;\n    };\n    request = \"<ASIFormDataRequest:\
  \ 0x50a4c00>\";\n}\n```\n\n我们从 `parsedResponse` 字典中获取 `text` 和 `url` 键的值，然后调用 Twitter\
  \ 引擎的 `sendUpdate:` 方法，将这些值用于最终的 Twitter 发布，如图 8–11 所示。\n\n![images](img/0811.jpg)\n\
  \n**图 8–11.** *最终结果：一条包含指向 TwitPic 图片链接的推文*\n\n### 离线模式与后台处理\n\n对于 iOS 应用而言，处理从服务器检索或同步的数据可能会使应用容易受到连接中断的影响。为了实现离线操作，请将数据存储在本地设备上，这样即使\
  \ 3G 或 Wi-Fi 不可用，应用仍然可以呈现数据。如果你有兴趣构建一个功能完善的 Twitter 或 Facebook iOS 应用——或者只是想学习一些额外的技术——那么本节是必读内容。\n\
  \n在本节中，我们将构建一个简单的 Twitter 应用，它可以检索 Twitter 状态更新并将其存储在设备上。这样一来，即使设备离线，也始终有数据可以显示。这个示例应用名为\
  \ `OfflineTwitter`，你可以在 Git 仓库的 `Chapter8/OfflineTwitter` 目录中找到它。\n\n如果你熟悉模型-视图-控制器（MVC）编程范式，那么你会注意到，我们实际上是在构建该范式的模型部分。用户界面（或视图）始终从模型获取数据。当从服务器接收到新数据时，数据会存储在模型中。然后，视图会被刷新，并从模型中获取最新的数据。\n\
  \niOS 应用中一个很好的数据存储工具是 *Core Data*。虽然我们不建议将其用于大数据集（针对大数据集，我们推荐使用 SQLite），但 Core Data\
  \ 在进行概念验证工作和帮助设计模型 API 时非常有用。我们将逐步介绍使用 Core Data 设置模型 API 的所有步骤；不过，如果你从未在 iOS 上使用过\
  \ Core Data，我们也建议阅读以下内容，或保留此链接作为便捷的快速参考：\n\n`http://developer.apple.com/library/ios/#DOCUMENTATION/DataManagement/Conceptual/iPhoneCoreData01/Introduction/Introduction.html#//apple_ref/doc/uid/TP40008305-CH1-SW1`\n\
  \n\n\n#### 使用 `TwitterDataStore` 进行数据建模\n\n在为应用设计数据模型时，最好的做法之一就是思考该数据模型需要执行的高层级操作。为简化问题，我们希望示例应用中的\
  \ Twitter 数据模型能支持以下三个主要功能：\n\n*   返回当前存储的推文集合。\n*   删除所有已存储的推文。\n*   存储推文。\n\n在我们的示例应用中，我们定义了\
  \ `TwitterDataStore` 类。请打开示例项目，点击 Model 文件夹中的 `TwitterDataStore.h` 文件：\n\n```\n\
  @interface TwitterDataStore : NSObject {\n}\n\n- (NSArray*)tweets;\n- (void)deleteTweets;\n\
  - (void)synchronizeTweets:(NSArray*)tweets;\n\n@end\n```\n\n既然我们已经有了基本的接口，就需要让它们执行各自所需的操作。这就是\
  \ Core Data 发挥作用的地方。以下是让您的应用使用 Core Data 所需的步骤。\n\n首先，我们必须向项目中添加一个 Core Data 模型文件。Core\
  \ Data 模型用于创建我们希望为应用表示和存储的不同实体。从 Xcode 的主菜单中，依次选择 File → New → New File... 在 iOS\
  \ 部分中选择 Core Data，然后选择 Data Model 文件类型，并为文件指定一个合适的名称（见图 8-12）。\n\n![images](img/0812.jpg)\n\
  \n**图 8–12.** *向应用的 Xcode 项目中添加 Core Data 对象模型。*\n\n接下来，将你的项目链接到 Core Data 框架（见图\
  \ 8-13）。\n\n![images](img/0813.jpg)\n\n**图 8–13.** *更新链接器设置以支持使用 Core Data*\n\n\
  既然我们已经有了 Core Data 模型，接下来需要向其中添加一个实体。由于我们的应用旨在离线存储推文，让我们添加一个 `Tweet` 实体。在 Xcode\
  \ 项目中选择 Core Data 模型文件（在示例项目中，该文件名为 `CoreDataOffline.xcdatamodeld`），以便在 Xcode 主窗口中显示该模型。在模型窗口底部，点击\
  \ Add Entity 按钮——它上面有一个大的加号（见图 8-14）。\n\n![images](img/0814.jpg)\n\n**图 8–14.**\
  \ *向数据模型添加一个实体。*\n\n接下来，将此实体重命名为 Tweet（见图 8-15）。\n\n![images](img/0815.jpg)\n\n\
  **图 8–15.** *数据模型中的 Tweet 实体*\n\nTwitter 上实际的推文包含大量相关信息；然而，这是一个简单的应用，因此我们只打算存储每条推文的\
  \ id 和实际文本内容。这里的目标仅仅是展示设置模型的基本概念。确保选中了 `Tweet` 实体，然后在 Attributes 部分点击 + 号以添加一个新属性（见图\
  \ 8-16）。将该属性命名为 `id`，并将其类型设置为 `Integer 64`。接着，添加另一个名为 `text` 的属性，并将其类型设置为 `String`。\n\
  \n![images](img/0816.jpg)\n\n**图 8–16.** *向 Tweet 实体添加属性。*\n\n设置数据模型的最后一步是创建实际的\
  \ Tweet Objective-C 类，这些类将映射到我们在 Core Data 模型中的 Tweet 实体，这样我们就可以在应用代码中实例化实际的 Tweet\
  \ 对象，并将其保存在内存中（见图 8-17）。向你的项目中添加一个 `NSManagedObject` 类型子类的新文件（在 Xcode 的 New File\
  \ 对话框中，选择 iOS 部分下的 Core Data 以找到此选项），然后点击 Next。\n\n![images](img/0817.jpg)\n\n**图\
  \ 8–17.** *向 Xcode 项目添加一个类，以关联数据模型中的 Tweet 对象。*\n\n在接下来的对话框中，勾选 `Tweet` 实体旁边的复选框，以将其与我们创建的\
  \ `Tweet` 类关联起来（见图 8-18）。\n\n![images](img/0818.jpg)\n\n**图 8–18.** *选择要与新类关联的 Tweet\
  \ 实体。*\n\n当我们检查 `Tweet.h` 和 `Tweet.m` 文件的内容时，会发现它们非常简洁。它们仅仅提供了对 Core Data 模型中 Tweet\
  \ 实体属性的 get 和 set 能力：\n\n```\nTweet.h\n\n@interface Tweet : NSManagedObject {\n\
  @private\n}\n@property (nonatomic, retain) NSNumber * id;\n@property (nonatomic,\
  \ retain) NSString * text;\n\n@end\n```\n\n```\nTweet.m\n\n@implementation Tweet\n\
  @dynamic id;\n@dynamic text;\n\n@end\n```\n\n既然我们已经完成了部分额外设置，回顾一下：`TwitterDataStore`\
  \ 是一个提供高层级接口的类，用于获取设备上存储的信息。在 `TwitterDataStore` 内部，实际的数据存储（本例中为 `Tweet` 实体）是使用\
  \ Core Data API 来执行的。Core Data 由多个协同工作的类组成，为存储和检索信息提供了便捷的方式，因此我们需要将这些类添加到 `TwitterDataStore.h`\
  \ 中：\n\n```\n@class NSManagedObjectContext;\n@class NSManagedObjectModel;\n@class\
  \ NSPersistentStoreCoordinator;\n@interface TwitterDataStore : NSObject {\n}\n\n\
  @property (nonatomic, retain, readonly) NSManagedObjectContext *managedObjectContext;\n\
  @property (nonatomic, retain, readonly) NSManagedObjectModel *managedObjectModel;\n\
  @property (nonatomic, retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  \n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n- (NSArray*)tweets;\n\
  - (void)deleteTweets;\n- (void)synchronizeTweets:(NSArray*)tweets;\n\n@end\n```\n\
  \n这些类中最重要的是 `NSManagedObjectContext`。在 Core Data 的魔法作用下，`NSManagedObjectContext`\
  \ 类在底层负责管理模型中的实体集合。由我们的 `TwitterDataStore` 类所拥有的 `NSManagedObjectContext` 的创建过程，是在\
  \ `managedObjectContext` 方法中处理的：\n\n```\n/**\n 返回应用的托管对象上下文。\n 如果上下文尚不存在，则会创建它，并将其绑定到应用的持久化存储协调器。\n\
  \ */\n- (NSManagedObjectContext *)managedObjectContext\n{\n    if (__managedObjectContext\
  \ != nil)\n    {\n        return __managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
  \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\n\
  \    {\n        __managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
  \        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n \
  \   }\n    return __managedObjectContext;\n}\n```\n\n`NSManagedObjectContext` 类被赋予一个\
  \ `NSPersistentStoreCoordinator` 对象，该对象负责管理上下文的生命周期，并创建一个托管对象模型：\n\n```\n/**\n 返回应用的持久化存储协调器。\n\
  \ 如果协调器尚不存在，则会创建它，并添加应用的存储。\n */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
  {\n    if (__persistentStoreCoordinator != nil)\n    {\n        return __persistentStoreCoordinator;\n\
  \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  CoreDataOffline.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error])\n    {\n        /*\n\
  \        */\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \        abort();\n    }    \n\n    return __persistentStoreCoordinator;\n}\n```\n\
  \n你需要用你自己的代码替换上述实现，以便恰当地处理错误。\n\n\n\n**注意：** 使用 `abort()` 会导致应用程序生成崩溃日志并终止。你不应在正式发布的应用程序中使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个提示面板，指示用户通过按下\
  \ Home 按钮退出应用程序。\n\n此处错误的典型原因包括以下内容：\n\n- 持久化存储不可访问。\n- 持久化存储的架构与当前托管对象模型不兼容。\n\n\
  检查错误消息以确定实际的问题是什么。\n\n如果持久化存储不可访问，通常是因为文件路径有问题。通常，文件 URL 指向的是应用程序的 `resources` 目录，而不是可写目录。\n\
  \n如果你在开发过程中遇到架构不兼容错误，可以通过以下方式减少其发生频率：\n\n- 直接删除现有存储：\n```\n[[NSFileManager defaultManager]\
  \ removeItemAtURL:storeURL error:nil]\n```\n- 通过将以下字典作为 options 参数传递，执行自动轻量级迁移：\n\
  ```\n[NSDictionary dictionaryWithObjectsAndKeys:\n    [NSNumber numberWithBool:YES],\n\
  \    NSMigratePersistentStoresAutomaticallyOption,\n    [NSNumber numberWithBool:YES],\n\
  \    NSInferMappingModelAutomaticallyOption, nil];\n```\n\n轻量级迁移仅适用于有限的一组架构变更；详情请参阅“Core\
  \ Data 模型版本控制与数据迁移编程指南”。\n\n以下是托管对象模型的创建方式：\n\n```\n/**\n 返回应用程序的托管对象模型。\n 如果模型不存在，则从应用程序的模型创建。\n\
  \ */\n- (NSManagedObjectModel *)managedObjectModel\n{\n    if (__managedObjectModel\
  \ != nil) {\n        return __managedObjectModel;\n    }\n    NSURL *modelURL =\
  \ [[NSBundle mainBundle] URLForResource:@\"CoreDataOffline\"\n                 \
  \                             withExtension:@\"momd\"];\n    __managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];    \n    return\
  \ __managedObjectModel;\n}\n```\n\n我们还有一个辅助方法，用于获取应用程序的 `Documents` 目录位置：\n\n```\n\
  /**\n 返回应用程序 Documents 目录的 URL。\n */\n- (NSURL *)applicationDocumentsDirectory\n\
  {\n    return [[[NSFileManager defaultManager] URLsForDirectory:NSDocumentDirectory\n\
  \                                                   inDomains:NSUserDomainMask]\
  \ lastObject];\n}\n```\n\n我们鼓励你深入了解这些 Core Data API。希望这些信息对你有所帮助，但深入探讨此主题超出了本书的范围，是时候继续正题了！\n\
  \n### 从模型更新视图\n\n在介绍完 `TwitterDataStore` 实现中的最后细节之前，先了解它如何从应用程序的用户界面中被使用和访问会很有帮助。用于显示\
  \ `TwitterDataStore` 中推文的用户界面是一个名为 `TimelineViewController` 的 `UITableViewController`\
  \ 类。该类简单地在 `UITableViewCells` 中显示每条推文的主要文本，如 图 8-19 所示。\n\n![images](img/0819.jpg)\n\
  \n**图 8-19.** *在基础用户界面中显示的存储推文*\n\n在展示具体实现的技术细节之前，我们先列出 `TimelineViewController`\
  \ 所做的工作：\n\n- 加载时，它会向 `TwitterDataStore` 请求其中包含的所有推文，将结果保存到 `NSArray` 中，并通过 `MGTwitterEngine`\
  \ 向 Twitter.com 提交请求，获取当前登录用户 Twitter 时间线中的最新推文集合。\n- 如果通过 `MGTwitterEngine` 的委托方法从\
  \ Twitter.com 接收到任何推文，则新推文会在后台线程中保存到 `TwitterDataStore`。\n- 一旦推文保存到 `TwitterDataStore`，表格会在主线程上刷新。\n\
  - 刷新表格时，对于 `NSArray` 中的每条推文，它会创建一个 `TweetTableViewCell`，并将单元格的文本设置为关联推文的文本。\n\n\
  如果我们在 `TimelineViewController.h` 中检查 `TimelineViewController` 的定义，会看到它拥有一个推文的 `NSArray`\
  \ 和一个 `TwitterDataStore`：\n\n```\n#import <UIKit/UIKit.h>\n\n@class TwitterDataStore;\n\
  @interface TimelineViewController : UITableViewController {\n    NSArray       \
  \      *tweets;\n    TwitterDataStore    *twitterDataStore;\n}\n\n@end\n```\n\n\
  在 `TimelineViewController.m` 中，我们在 `viewDidLoad` 方法中创建 `TwitterDataStore`，从 `TwitterDataStore`\
  \ 中检索所有推文，发起新推文的请求，并设置自身以在请求完成时接收通知：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \n    twitterDataStore = [[TwitterDataStore alloc] init];\n    tweets = [[twitterDataStore\
  \ tweets] retain];\n\n    NSString *identifier = [sa_OAuthTwitterEngine getHomeTimeline];\n\
  \n    //监听以标识符为名称的通知\n    [[NSNotificationCenter defaultCenter]\n              \
  \                      addObserver:self\n                                      \
  \ selector:@selector(twitterTimelineRequestDidComplete:)\n                     \
  \                      name:identifier\n                                       \
  \  object:nil];\n}\n```\n\n我们需要在请求新推文完成时通知应用程序的其他部分。为此，我们在委托中更新 `statusesReceived:forRequest:`，将返回的推文数组作为键\
  \ `Tweets` 的值存储到 `NSDictionary` 中，并将其设置为通知的 `userInfo`：\n\n```\n- (void)statusesReceived:(NSArray\
  \ *)statuses forRequest:(NSString *)connectionIdentifier {\n    NSLog(@\"收到状态 =\
  \ %@, %@\", connectionIdentifier, [statuses description]);\n\n    NSArray *objects\
  \ = [NSArray arrayWithObjects:statuses, nil];\n    NSArray *keys = [NSArray arrayWithObjects:@\"\
  tweets\", nil];\n    NSDictionary *userInfoDictionary = [NSDictionary dictionaryWithObjects:objects\n\
  \                                                                  forKeys:keys];\n\
  \    [[NSNotificationCenter defaultCenter]\n              postNotificationName:connectionIdentifier\n\
  \                            object:self\n                          userInfo:userInfoDictionary];\n\
  \n    NSDictionary *dictionary = [statuses objectAtIndex:0];\n    if (dictionary)\
  \ {\n            NSString *twitterID = [dictionary objectForKey:@\"id\"];\n    \
  \        NSLog(@\"TwitterID = %@\", twitterID);\n    }\n}\n```\n\n\n\n当上述方法发布通知表明推文请求已完成时，`TimelineViewController`的`twitterTimelineRequestDidComplete:`方法会通过`NSNotificationCenter`被调用。利用`NSObject`的`performSelectorInBackground:withObject:`方法，`TimelineViewController`的`synchronizeTweets:`方法会在后台线程执行，并接收来自通知中`NSDictionary`的`Tweets`数组：\n\
  \n```\n- (void)twitterTimelineRequestDidComplete:(NSNotification*)notification {\n\
  \    [[NSNotificationCenter defaultCenter] removeObserver:self];\n    [self performSelectorInBackground:@selector(synchronizeTweets:)\n\
  \                           withObject:[notification.userInfo\n                \
  \                 objectForKey:@\"tweets\"]];\n}\n```\n\n`TwitterDataStore`的`synchronizeTweets:`方法设计为在完成同步过程时发出通知（更多内容请参阅后续部分）。因此，在`TimelineViewController`的`synchronizeTweets:`方法中，我们设置自己来接收`TwitterDataStore`完成任务时的通知。一旦收到通知，我们就启动同步过程：\n\
  \n```\n- (void)synchronizeTweets:(NSArray*)newTweets {\n    //listen for a notification\
  \ with the name of the identifier\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
  \                                              selector:@selector(tweetsDidSynchronize:)\n\
  \                                                  name:@\"tweetsDidSynchronize\"\
  \n                                                object:nil];\n    [twitterDataStore\
  \ synchronizeTweets:newTweets];\n}\n```\n\n当`TwitterDataStore`完成同步过程时，它会通过`NSNotificationCenter`发出一个通知，`TimelineViewController`的`tweetsDidSynchronize:`方法将被执行，并在主线程调用`refreshUI`以从`TwitterDataStore`获取最新的推文并更新用户界面中的表格。关于线程的说明：我们始终建议在后台线程处理或同步数据，以保持用户界面的响应性。但是，如果你从后台线程发出通知或执行委托回调方法，执行仍将在后台线程中进行。如果你的用户界面需要更新，我们建议使用`NSObject`的`performSelectorOnMainThread:withObject:waitUntilDone:`方法在主执行线程上刷新用户界面：\n\
  \n```\n- (void)tweetsDidSynchronize:(NSNotification*)notification {\n    [[NSNotificationCenter\
  \ defaultCenter] removeObserver:self];\n    //update the UI on the main thread\n\
  \    [self performSelectorOnMainThread:@selector(refreshUI)\n                  \
  \         withObject:nil\n                        waitUntilDone:YES];\n}\n```\n\n\
  以下是实际刷新用户界面并将给定推文信息与其关联的`UITableViewCell`关联的代码：\n\n```\n- (void)refreshUI {\n  \
  \  [tweets release];\n    tweets = [[twitterDataStore tweets] retain];\n    [self.tableView\
  \ reloadData];\n}\n\n// Customize the appearance of table view cells.\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n    TweetTableViewCell\
  \ *cell =\n        (TweetTableViewCell*)[tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[[TweetTableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                          reuseIdentifier:CellIdentifier] autorelease];\n\
  \    }\n    // Configure the cell...\n    Tweet *tweet = [tweets objectAtIndex:[indexPath\
  \ row]];\n    cell.tweet = tweet;\n    return cell;\n}\n```\n\n`TimelineViewController`使用`TwitterDataStore`获取和存储其所显示的数据，因此我们来看看`TwitterDataStore`如何使用\
  \ Core Data 来存储和检索推文。在`TwitterDataStore`能够返回推文之前，我们必须先给它一些推文来存储。`TwitterDataStore`在其`synchronizeTweets:`方法中存储推文，该方法将推文数组作为其唯一参数。\n\
  \n这个同步方法有点简单粗暴。它首先通过`TwitterDataStore`的`deleteTweets`方法删除所有已存储的推文。然后，它遍历传入的推文，为每一条推文创建一个新对象，初始化该推文的数据，并将其保存到\
  \ Core Data 模型中。\n\n让我们更详细地了解一下。请记住，`MGTwitterEngine`返回一个推文数组，并且数组中的每条推文都由一个包含键/值对的`NSDictionary`对象表示，其中包含关于该推文的所有信息。当我们遍历推文数组时，我们使用\
  \ Objective-C 中一种简洁的`for-loop`机制：\n\n```\nfor (NSDictionary *tweetDictionary in\
  \ tweets) {\n}\n```\n\n简而言之，这个`for-loop`表示我们将为`tweets`数组中的每个元素执行`for-loop`的主体。每次执行`for-loop`主体时，`tweets`数组中的下一个元素都会被存储在一个名为`tweetDictionary`的`NSDictionary`对象中（因为每个元素都是一个`NSDictionary`）。我们可以在`for-loop`主体中引用这个元素。\n\
  \n对于数组中的每条推文，我们通过`NSEntityDescription`的`insertNewObjectForEntityForName:inManagedObjectContext:`方法创建一个新的`Tweet`对象。将`Tweet`作为实体名称传递，会让\
  \ Core Data 创建一个存储在托管对象上下文中的新的未填充的`Tweet`类实例。我们还提供了我们的托管对象上下文。接下来，我们设置推文的`text`属性和`id`属性的值（注意使用`NSNumberFormatter`将`NSString`对象转换为`NSNumber`对象）。最后一步，我们通知托管对象上下文将其状态保存到磁盘。如果未能对托管对象上下文调用`save`，将导致没有数据被永久存储在我们的\
  \ Core Data 模型中。在退出方法之前，我们发布一个通知，以便当所有新的推文都存储在模型中时（即，我们更新用户界面时），我们应用程序的其他部分可以执行必要的操作：\n\
  \n```\n- (void)synchronizeTweets:(NSArray*)tweets {\n    NSAutoreleasePool *autoReleasePool\
  \ = [[NSAutoreleasePool alloc] init];\n    @synchronized(self) {\n        [self\
  \ deleteTweets];\n        for (NSDictionary *tweetDictionary in tweets) {\n    \
  \        Tweet *tweet = (Tweet *)[NSEntityDescription\n                insertNewObjectForEntityForName:@\"\
  Tweet\"\n                        inManagedObjectContext:self.managedObjectContext];\n\
  \            NSNumberFormatter * f = [[NSNumberFormatter alloc] init];\n       \
  \     NSNumber * tweetId = [f numberFromString:[tweetDictionary objectForKey:@\"\
  id\"]];\n            [tweet setId:tweetId];\n            [f release];\n        \
  \    NSString *text = [tweetDictionary objectForKey:@\"text\"];\n            [tweet\
  \ setText:text];\n        }\n        NSError *error = nil;\n        if (![self.managedObjectContext\
  \ save:&error]) {\n            // Handle the error.\n        }\n    }\n    // post\
  \ a notification that the tweets are available\n    // have responder update itself\
  \ on the main thread\n    [[NSNotificationCenter defaultCenter]\n        postNotificationName:@\"\
  tweetsDidSynchronize\"\n                      object:self\n                    userInfo:nil];\n\
  \    [autoReleasePool release];\n}\n```\n\n\n\n"
- "# 核心数据推文获取与删除\n\n当需要从 Core Data 模型中获取推文时，我们使用 Core Data 类 `NSFetchRequest`。`NSFetchRequest`\
  \ 接收一个实体描述（本例中为 `Tweet`）和一个托管对象上下文。接着，我们通过调用托管对象上下文的 `executeFetchRequest:` 方法，并传入初始化好的\
  \ `NSFetchRequest` 对象，从 Core Data 模型中检索推文。该方法随后返回推文数组。请注意，如果你希望对托管对象上下文中的提取结果进行排序，则需要为\
  \ `NSFetchRequest` 创建并设置一个 `NSSortDescriptor`。在本例中，我们初始化了一个 `NSSortDescriptor`，它将根据推文的\
  \ `id` 属性值，按降序对返回的推文数组进行排序：\n\n```\n- (NSArray*)tweets\n{\n    NSMutableArray *tweets\
  \ = nil;\n\n    @synchronized(self) {\n        NSFetchRequest *request = [[NSFetchRequest\
  \ alloc] init];\n        NSEntityDescription *entity =\n                       \
  \                    [NSEntityDescription entityForName:@\"Tweet\"\n           \
  \                     inManagedObjectContext:self.managedObjectContext];\n     \
  \   [request setEntity:entity];\n\n        NSSortDescriptor *sortDescriptor = [[NSSortDescriptor\
  \ alloc] initWithKey:@\"id\"\n                                                 \
  \                      ascending:NO];\n        NSArray *sortDescriptors = [[NSArray\
  \ alloc] initWithObjects:sortDescriptor, nil];\n        [request setSortDescriptors:sortDescriptors];\n\
  \        [sortDescriptors release];\n        [sortDescriptor release];\n\n     \
  \   NSError *error = nil;\n        NSMutableArray *mutableFetchResults =\n     \
  \            [[self.managedObjectContext executeFetchRequest:request error:&error]\
  \ mutableCopy];\n        if (mutableFetchResults == nil) {\n            // 处理错误\n\
  \        }\n\n        tweets = [mutableFetchResults retain];\n        [mutableFetchResults\
  \ release];\n        [request release];\n    }\n\n    return tweets;\n}\n```\n\n\
  要删除 Core Data 模型中的所有推文，我们需获取当前存储在模型中的所有推文，逐一循环遍历，告知托管对象上下文删除指定推文，然后保存托管对象上下文以将结果提交到磁盘：\n\
  \n```\n- (void)deleteTweets\n{\n    @synchronized(self) {\n        NSArray *tweets\
  \ = [self tweets];\n        for (Tweet *tweet in tweets) {\n            [self.managedObjectContext\
  \ deleteObject:tweet];\n        }\n\n        // 提交更改。\n\n        NSError *error\
  \ = nil;\n\n        if (![self.managedObjectContext save:&error]) {\n          \
  \  // 处理错误。\n        }\n    }\n}\n```\n\n### 结论\n\n本章中，我们涉及了一些真正有趣的新领域，包括上传照片以及使用\
  \ Core Data 为应用程序构建简单数据模型。构建数据模型还有其他可选方案（例如 SQLite），因此我们建议你探索其他方式来存储数据，以便在应用内进行离线或快速检索。请注意，你可能需要在模型中构建一些智能机制来限制应用占用的存储空间。例如，你可能只想存储一定数量的近期推文，或者只存储过去\
  \ 12 小时内的推文。\n\n下一章中，我们将讨论不同的基于位置的场景；解释如何将位置信息整合到你的应用中，以及如何与 Facebook 和 Twitter\
  \ 的社交网络数据结合；同时，我们将通过设置一个可在应用内任意位置使用的独立控制器，继续完善我们整合这些服务的方式。\n\n"
- '# 第 9 章


  '
- "# 使用位置感知与流式数据\n\n本章涵盖在 iOS 上结合 Facebook 和 Twitter 使用位置功能的基本要点。我们还将讨论流式 API 的使用。\n\
  \n社交应用中出现的一个主要趋势是为用户体验添加位置上下文。在 Facebook 和 Twitter 的世界中，这涉及让用户在 Facebook 上*签到*或搜索附近的推文，以及其他一系列场景。我们将带你深入了解如何使用\
  \ iOS 的 `CoreLocation` 和 `MapKit` 库，将位置和地图整合到你的应用中，然后利用这些库中的位置信息，展示 Facebook 和 Twitter\
  \ 的一些基于位置的功能。\n\n## 此地，彼地，无处不在\n\n乍看之下，将位置信息整合到应用中似乎是一项微不足道的任务；然而，在用户隐私、设备电量/电池续航以及\
  \ `CoreLocation` 和 `MapKit` API 方面，存在许多需要考虑的因素。本章的示例应用整合了后续介绍的所有技术。由于 `CoreLocation`\
  \ 和 `MapKit` 本身就是功能丰富的 API，因此有必要梳理这些 API 提供的核心功能，并重点介绍 iOS 4.0 中首次亮相的一些新特性。之后，本章将深入探讨\
  \ Facebook 和 Twitter 的位置 API。\n\n\n\n#### 位置隐私、披露与选择退出\n\n虽然我们都喜欢在 Twitter 和 Facebook\
  \ 等社交网站上分享信息，但有时我们并不想分享关于自己的某些内容。其中之一就是位置信息。在网站上分享照片时，我们都比较随意；然而，如果分享照片的同时还包含照片的拍摄地点信息，那就完全是另一回事了。同样地，使用网站的一项功能告诉朋友你的位置是一回事，但如果网站自动告诉你的朋友你在哪里——并且不让你关闭自动更新——那就完全是另一回事了。在后一种情况下，你可能就不会那么喜欢那个网站了。\n\
  \n那么这是为什么呢？为什么我们要如此严密地保护自己的位置，并希望对自己与谁分享、何时分享拥有如此多的控制权？归根结底，这是为了保护自己免受人性中某些不愉快方面的影响，例如嫉妒、跟踪，甚至可能的人身伤害。尽管像\
  \ Facebook 和 Twitter 这样的社交网站能激发人性中最美好的一面，但它们有时也会引出最丑陋的一面。\n\n人性阴暗面一个严重且过于常见的例子是，当一个人与对其有身体虐待行为的伴侣处于关系中时。她可能因为害怕而不敢申请限制令，并希望尽可能隐藏自己的物理位置——包括在社交网站上。这或许是最坏的情况，但值得考虑，因为你永远不希望辜负用户的信任（甚至在有些地方违法）。\n\
  \n当计划在你的应用程序中使用用户的位置信息时，最好遵循以下规则：\n\n-   允许用户选择退出你的应用程序使用其位置信息。\n-   完全公开你打算如何使用位置信息。\n\
  -   让用户能够删除你的应用程序在本地或远程存储的任何其位置历史记录。\n\n幸运的是，iOS 本身内置了所有基础架构，可以按应用允许或禁止使用其位置服务。它还会在你的应用首次运行并启动\
  \ `CoreLocation` 服务时，自动提示用户授予使用位置的权限。这一点至关重要，因为它会立即提示用户。有时人们倾向于将这类设置隐藏在应用内的 `Settings`\
  \ 屏幕中，但我们强烈建议不要对位置相关设置采用这种方法。在 iOS 中，这其实不成问题，因为作为开发者你无法控制。如果你是 iOS 新手，标准提示会显示请求使用位置服务权限的应用名称，并提供\
  \ `Don't Allow` 和 `OK` 按钮，如图 9–1 所示。\n\n![images](img/0901.jpg)\n\n**图 9–1.** *iOS\
  \ 位置权限提示*\n\n一旦用户做出选择，iOS 会存储该选择，并且不再提示用户。这是 iOS 的一个出色特性，因为它标准化了该提示的外观和感觉，为用户提供一致的体验，并免去每个开发者自己实现所有这些逻辑的麻烦。如果用户选择不允许某个应用访问位置，那么在\
  \ iOS 代码中尝试获取位置将导致位置不可用错误。\n\niOS 位置服务实现的另一个优秀特性是，它不需要你在应用中做任何事情来处理用户可能改变主意或暂时限制你的应用使用位置服务的情况。例如，如果用户最初授予了你的应用使用位置服务的权限，但后来不想再授予此权限，她可以前往设备的主\
  \ `Settings` 应用，使用 `Location Services` 部分，在整个设备范围内或针对单个应用关闭位置服务（见图 9–2 和图 9–3）。\n\
  \n![images](img/0902.jpg)\n\n**图 9–2.** *iOS 设置应用*\n\n![images](img/0903.jpg)\n\n\
  **图 9–3.** *iOS 位置服务设置*\n\niOS 还有另一个巧妙的功能，允许你重置询问用户是否允许应用使用位置服务的提示显示。这是一个设备范围的设置，会撤销设备上所有应用使用位置服务的权限。此设置可通过\
  \ iOS 设备主 `Settings` 应用中的 `General` ![images](img/U001.jpg) `Reset` 访问（见图 9–4）。\n\
  \n![images](img/0904.jpg)\n\n**图 9–4.** *重置位置警告设置*\n\n![images](img/0905.jpg)\n\n\
  **图 9–5.** *系统确认重置位置警告*\n\n如果你选择 `Reset Warnings`（见图 9–5），然后在设备上运行主 `Maps` 应用，在位置提示处选择\
  \ `OK`，再回到主 `Location Services` 设置屏幕，你将看到图 9–6 所示的屏幕。\n\n![images](img/0906.jpg)\n\
  \n**图 9–6.** *重置警告并运行地图应用后的位置服务设置*\n\n正如我们之前提到的，提示用户选择启用或禁用位置信息只是处理位置问题的三个基本部分之一。如果不清楚你的应用将如何使用用户的位置信息，那么我们强烈建议你显示自己的提示或包含额外信息的信息屏幕。从\
  \ iOS 4 开始，iOS 使这变得容易，我们将在以下章节中向你展示如何操作。如果你在用户设备上的应用中存储了位置历史记录，你还应该提供一个 `Settings`\
  \ 屏幕，让用户能够清除这些历史记录。或者，你可以设置让应用只保留过去一周的记录，并根据设置自动为用户清除历史记录。\n\n现在，我们已经涵盖了设备方面的内容以及在你\
  \ iOS 应用中关于位置和隐私需要理解的事项，让我们快速了解一下 Twitter 和 Facebook 在其端如何处理位置问题。\n\nTwitter 和 Facebook\
  \ 在我们之前提到的三个最佳实践方面已经取得了长足的进步。让我们快速看看它们各自的做法。\n\n\n```markdown\n\n#### Facebook Places\n\
  \nFacebook 效仿 Foursquare 推出了“Places”（地点）功能。当你从某个地点“签到”时，你会让 Facebook 上的朋友知道你在哪里以及你在做什么，例如在特定的餐厅吃饭或参加音乐会。要快速了解\
  \ Places 功能的作用，请查看此链接：\n\n`www.facebook.com/places/`\n\n请注意，Facebook 允许你控制朋友是否可以查看你的签到位置。我们建议阅读\
  \ Facebook 的常见问题解答，以全面了解其如何处理隐私问题：\n\n`www.facebook.com/help/?page=18839`\n\n简而言之，你可以控制在某地点签到时，是否显示在该地点的“People\
  \ Here Now”（当前在此的人）区域中。为此，请前往 Facebook 的隐私设置部分（参见图 9-7）。\n\n![images](img/0907.jpg)\n\
  \n**图 9-7.** *控制你的 Facebook 签到是否显示在“People Here Now”区域中。*\n\n选择“自定义设置”，然后在“我分享的内容”下，选择是否希望“所有人”、“好友和网络”、“好友的好友”或“仅限好友”看到你的签到。你还可以为签到的地点创建自己的自定义设置（参见图\
  \ 9-8）。\n\n![images](img/0908.jpg)\n\n**图 9-8.** *自定义 Facebook 的签到设置。*\n\n在同一部分中，你可以调整此选项的设置：\n\
  \n`Include me in \"People Here Now\" after you check in`\n\n点击`See example`链接，可以查看当你出现在“People\
  \ Here Now”时的显示效果（参见图 9-9）。\n\n![images](img/0909.jpg)\n\n**图 9-9.** *Facebook 的“People\
  \ Here Now”示例*\n\n在“他人分享的内容”部分，你可以编辑此选项的设置（参见图 9-10）：\n\n`Friends can check me in\
  \ to Places`\n\n![images](img/0910.jpg)\n\n**图 9-10.** *Facebook 允许用户授予好友将其签到的权限。*\n\
  \n在隐私设置的“应用和网站”部分，你可以撤销之前通过`OAuth`授权给应用程序的 Places 访问权限（参见图 9-11）。\n\n![images](img/0911.jpg)\n\
  \n**图 9-11.** *撤销应用程序签到的权限。*\n\nFacebook 还允许你查看每个应用程序的访问日志（参见图 9-12）。\n\n![images](img/0912.jpg)\n\
  \n**图 9-12.** *查看应用程序上次执行签到的记录。*\n\n如果你进入“通过你的好友可访问的信息”设置，你可以控制好友对 Places 信息的访问权限（参见图\
  \ 9-13）。\n\n![images](img/0913.jpg)\n\n**图 9-13.** *控制好友对 Places 信息的访问权限。*\n\n####\
  \ 为推文添加位置信息\n\n由于 Twitter 的功能相对有限，管理其如何使用你的位置信息非常简单。登录你的 Twitter 账户后，进入“设置”![images](img/U001.jpg)\
  \ “账户”（[`http://twitter.com/settings/account`](http://twitter.com/settings/account)），然后向下滚动到“推文位置”部分（参见图\
  \ 9-14）。\n\n![images](img/0914.jpg)\n\n**图 9-14.** *配置推文位置的显示方式。*\n\n勾选“为你的推文添加位置”复选框，即可允许\
  \ Twitter 显示每条推文所关联的位置，使你的推文出现在按位置搜索的推文结果中，并无限期存储你的推文位置。注意谨慎启用此设置，因为 Twitter 本质上鼓励用户与整个\
  \ Twitter 社区分享推文。这意味着，除非你的账户设为私密，否则 Twitter 上的任何人都可以看到你的位置。如果你之后想停止在新推文中显示位置，请取消勾选此框。如果你想删除所有过往推文的位置信息，请点击“你可以删除过去推文中所有位置信息”这句话中的链接。执行此操作后，系统会提示你授予\
  \ Twitter 删除所有位置信息的权限（参见图 9-15）。\n\n![images](img/0915.jpg)\n\n**图 9-15.** *删除推文关联的所有位置记录。*\n\
  \n如果你选择删除所有推文的位置记录，那么之后任何人查看你的过往推文时，位置信息将不再显示。想全面了解在 Twitter 上分享位置所涉及的问题，请查看此链接：\n\
  \n`http://support.twitter.com/forums/26810/entries/78525`\n\n#### 高耗电量\n\n现代移动平台上的位置服务使用\
  \ GPS、WiFi 和蜂窝数据来尝试确定设备的位置，并分别通过其对应的 API 返回该位置。iOS 上的位置服务也不例外。实际上，此功能非常耗电，如果在你的应用中不加节制地使用，很快就会耗尽用户设备的电池。\n\
  \n在 iOS 4.0 之前，从 iOS 的 CoreLocation 框架中获取设备位置只有一种方法。Apple 在其文档中将此方法称为`Standard`（标准）方法。使用此方法，你可以设置精度和距离过滤器，以控制获取位置信息的频率。不幸的是，使用`Standard`方法滥用位置服务很容易耗尽设备电量。Apple\
  \ 的开发人员认识到了这一点，因此 iOS 4 引入了一种新的`Significant Change`（重大变化）方法来获取设备位置。这是一种更节电的获取位置的方法，它以较低的频率发送位置更新。我们将在下一节中更详细地探讨这一点，展示如何在你的应用中使用`Significant\
  \ Change`方法。不言而喻，我们建议在大多数应用中（尤其是那些不需要每秒获取新位置数据的社交应用）使用此方法。\n```\n\n\n#### `CoreLocation`\n\
  \niOS 的 `CoreLocation` 框架设计精巧，易于集成到应用中。苹果 iOS 开发者网站上提供了大量关于该框架的信息；不过，我们将在此处介绍最重要的部分。我们还将展示一种将框架集成到应用中、以便轻松获取设备当前位置的方法。对于完全初学者来说，通读苹果关于\
  \ iOS 中位置定位的文档可能是个好主意；你可以通过以下 URL 找到名为“iOS Location Awareness Guide”的文档：\n\n`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009497`\n\
  \n在本章的示例应用中，有一个名为 `LocationController` 的新类，它存在于 `LocationController.h/.m` 中。我们设计这个类作为\
  \ iOS `CoreLocation` 框架的包装器或外观。我们这样做是为了实现以下几个目标：\n\n- 通过将 `CoreLocation` 的功能集中到应用中的一个类，使其更易于演示。\n\
  - 使代码在将来更易于维护，因为我们只需在一个类中针对 `CoreLocation` 进行修改。\n- 防止其他类单独使用 `CoreLocation`。\n\n\
  让我们看一下 `LocationController` 的头文件，了解它使用了哪些 `CoreLocation` 对象以及它的 API 是什么样的：\n\n```\n\
  #import <CoreLocation/CoreLocation.h>\n\n#ifdef FAKE_CORE_LOCATION\n@class FTLocationSimulator;\n\
  #endif\n@interface LocationController : NSObject <CLLocationManagerDelegate> {\n\
  #ifdef FAKE_CORE_LOCATION\n    FTLocationSimulator *locationManager;\n#else\n  \
  \  CLLocationManager *locationManager;\n#endif\n    CLLocation *location;\n    CLHeading\
  \ *heading;\n    BOOL inPowerSavingMode;\n}\n\n#ifdef FAKE_CORE_LOCATION\n@property(nonatomic,\
  \ retain)FTLocationSimulator *locationManager;\n#else\n@property(nonatomic, retain)CLLocationManager\
  \ *locationManager;\n#endif\n@property(nonatomic, retain)CLLocation *location;\n\
  @property(nonatomic, retain)CLHeading *heading;\n\n- (void)startWithPowerSaving:(BOOL)savingPower;\n\
  - (void)stop;\n- (BOOL)registerRegion:(CLLocationCoordinate2D)center;\n\n@end\n\
  ```\n\n`LocationController` 类的主要设计思路是它拥有并控制 `CLLocationManager` 的操作，后者是 `CoreLocation`\
  \ 中的主要类。`LocationController` 通过一个 `location` 属性（类型为 `CoreLocation` 的 `CLLocation`\
  \ 对象）提供当前的位置读数。`LocationController` 提供了启动和停止底层 `CoreLocation` 服务的方法，并在获得新位置信息时通知其委托。由于我们需要接收\
  \ `CLLocationManager` 的更新，`LocationController` 被声明为 `CLLocationManagerDelegate`。\n\
  \n启动 `LocationController` 时，你可以选择两种方法之一。首先，你可以启用省电模式启动，这使用 `CoreLocation` 的 `Significant\
  \ Change` 方法来确定位置。其次，你可以使用 `Standard` 方法。此外，`LocationController` 有一个方法用于注册一个区域供\
  \ `CoreLocation` 监控，我们稍后会讨论。我们确信你注意到了对 `FTLocationSimulator` 的引用，并且你可能想知道它是做什么的。`FTLocationSimulator`\
  \ 让你能够在 iOS 模拟器上生成位置读数，我们将在本节后面部分介绍这一点。\n\n让我们切换到 `LocationManager.m`，看看 `LocationController`\
  \ 的方法在做什么。`startWithPowerSaving:` 方法首先停止 `LocationController`，以防它已经启动。如果你愿意，你可以自行跟踪是否已启动了\
  \ `CoreLocation` 服务，并在服务已启动时立即退出此方法。如果 `CLLocationManager locationManager` 尚不存在，则创建它，并将\
  \ `LocationController` 设置为其委托。接下来，我们检查设备上是否启用了位置服务。请注意，在 iOS 4.0 中，这从名为 `locationServicesEnabled`\
  \ 的属性变为了同名方法，因此我们也对此进行了检查。\n\n如果位置服务已启用，我们根据 `savingPower` 参数的值，通过两种方式之一启动 `locationManager`。如果\
  \ `savingPower` 为 `YES`，我们通过 `startMonitoringSignificantLocationChanges` 方法启动 `locationManager`，并记录我们处于省电模式。如果\
  \ `savingPower` 为 `NO`，我们使用 `Standard startUpdatingLocation` 方法，并配置所需的精度级别和距离过滤器。你可以在苹果的文档或头文件中阅读有关这些属性可用值的更多信息：\n\
  \n```\n- (void)startWithPowerSaving:(BOOL)savingPower\n{\n    [self stop];\n\n \
  \   if (nil == self.locationManager) {\n#ifdef FAKE_CORE_LOCATION\n        self.locationManager\
  \ =\n                   [[[FTLocationSimulator alloc] init] autorelease];\n#else\n\
  \        self.locationManager =\n                   [[[CLLocationManager alloc]\
  \ init] autorelease];\n#endif\n    }\n\n    self.locationManager.delegate = self;\n\
  \n    //Available in 3.2 and later\n    self.locationManager.purpose = @\"Big brother\
  \ is watching.\";\n\n    BOOL locationServicesEnabled = NO;\n    if ([CLLocationManager\n\
  \            respondsToSelector:@selector(locationServicesEnabled)]) {\n       \
  \ locationServicesEnabled =\n            [CLLocationManager locationServicesEnabled];\n\
  \    } else {\n        locationServicesEnabled =\n            self.locationManager.locationServicesEnabled;\n\
  \    }\n\n    if (locationServicesEnabled) {\n\n        inPowerSavingMode = NO;\n\
  \        if (savingPower\n            && [CLLocationManager respondsToSelector:@selector\n\
  \                  (significantLocationChangeMonitoringAvailable)]) {\n        \
  \    if ([self.locationManager respondsToSelector:@selector\n                  (startMonitoringSignificantLocationChanges)])\
  \ {\n                [self.locationManager\n                     startMonitoringSignificantLocationChanges];\n\
  \                inPowerSavingMode = YES;\n            }\n\n        } else {\n \
  \           self.locationManager.desiredAccuracy =\n                           \
  \                     kCLLocationAccuracyBest;\n            self.locationManager.distanceFilter\
  \ = kCLDistanceFilterNone;\n            [self.locationManager startUpdatingLocation];\n\
  \        }\n    }\n}\n```\n\n`LocationController` 的 `stop` 方法通过布尔值 `inPowerSavingMode`（我们在之前的\
  \ `startWithPowerSaving:` 方法中保存了此值）检查是否处于省电模式。然后，根据我们所处的模式，调用 `stopMonitoringSignificantLocationChanges`\
  \ 或 `stopUpdatingLocation`：\n\n```\n- (void)stop\n{\n    if (inPowerSavingMode\n\
  \        && [CLLocationManager respondsToSelector:@selector\n                (significantLocationChangeMonitoringAvailable)])\
  \ {\n        if ([self.locationManager respondsToSelector:@selector\n          \
  \      (stopMonitoringSignificantLocationChanges)]) {\n            [self.locationManager\n\
  \                stopMonitoringSignificantLocationChanges];\n        }\n    } else\
  \ {\n        [self.locationManager stopUpdatingLocation];\n    }\n}\n```\n\n从 iOS\
  \ 4.0 开始，`CoreLocation` 的 `CLLocationManager` 能够在设备进入或离开预定义的区域时，通过委托回调通知应用程序。这被称为区域监控。`LocationController`\
  \ 通过其 `registerRegion:` 方法支持区域监控，该方法指示 `CLLocationManager` 监控围绕单个中心点的指定区域，并在设备进入或离开该区域时通知应用程序。\n\
  \n\n\n### 使用 `CLLocationManager`\n\n接下来，我们将介绍如何使用 `CLLocationManager`。首先，我们需要确认此功能是否可用。如果可用，则设置要监控的区域半径；然后根据中心点、半径和名称创建要监控的区域；最后，通过其\
  \ `startMonitoringForRegion:desiredAccuracy:` 方法将其交给 `CLLocationManager` 进行监控。`desiredAccuracy`\
  \ 值控制 `CLLocationManager` 用于判断设备是否离开并重新进入某个区域的边界周围缓冲区的大小。区域监控是将一些实用功能集成到应用中的非常有效的方式，例如自动将用户签到到特定地点：\n\
  \n```\n- (BOOL)registerRegion:(CLLocationCoordinate2D)center\n{\n    // 检查是否支持该功能\n\
  \    if (![CLLocationManager regionMonitoringAvailable] ||\n        ![CLLocationManager\
  \ regionMonitoringEnabled] )\n        return NO;\n\n    CLLocationDegrees radius\
  \ =\n                 self.locationManager.maximumRegionMonitoringDistance;\n\n\
  \    // 创建区域并开始监控\n    CLRegion *region = [[CLRegion alloc]\n                  \
  \          initCircularRegionWithCenter:center\n                               \
  \                   radius:radius\n                                            \
  \  identifier:@\"test\"];\n    [self.locationManager startMonitoringForRegion:region\n\
  \    desiredAccuracy:kCLLocationAccuracyNearestTenMeters];\n\n    [region release];\n\
  \n    return YES;\n}\n```\n\n当 `CLLocationManager` 获取到符合其当前操作模式条件的位置读数时，它会通过 `CLLocationManagerDelegate`\
  \ 的 `locationManager:didUpdateToLocation:fromLocation:` 方法通知其委托。当调用此委托方法时，我们将当前的位置读数保存到自己的\
  \ `location` 属性中，以便应用的任何其他部分能够访问设备当前的位置读数：\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
  \ *)oldLocation\n{\n    self.location = newLocation;\n}\n```\n\n如果初始化定位服务时出现问题，则会调用\
  \ `CLLocationManagerDelegate` 的 `locationManager:didFailWithError:` 方法：\n\n```\n\
  - (void)locationManager:(CLLocationManager *)manager\n       didFailWithError:(NSError\
  \ *)error\n{\n    NSLog(@\"didFailWithError\");\n}\n```\n\n当设备进入或离开指定区域时，会调用 `CLLocationManagerDelegate`\
  \ 的 `locationManager:didEnterRegion:` 和 `locationManager:didExitRegion:` 方法：\n\n\
  ```\n- (void)locationManager:(CLLocationManager *)manager\n         didEnterRegion:(CLRegion\
  \ *)region\n{\n    NSLog(@\"didEnterRegion\");\n}\n\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n          didExitRegion:(CLRegion *)region\n{\n    NSLog(@\"didExitRegion\"\
  );\n}\n\n- (void)locationManager:(CLLocationManager *)manager\nmonitoringDidFailForRegion:(CLRegion\
  \ *)region\n              withError:(NSError *)error\n{\n    NSLog(@\"monitoringDidFailForRegion\"\
  );\n}\n```\n\n从 iOS 4.2 开始，如果用户通过设备上的“设置”主应用更改了应用的授权状态，`CLLocationManager` 还可以通知其委托：\n\
  \n```\n- (void)locationManager:(CLLocationManager *)manager\n        didChangeAuthorizationStatus:(CLAuthorizationStatus)status\n\
  {\n    NSLog(@\"didChangeAuthorizationStatus\");\n}\n```\n\n在进入其他主题之前，有必要提一下 iOS\
  \ 上的定位服务及后台处理。请注意，`Significant Change` 方法会周期性唤醒你的应用并提供位置更新。如果你使用的是 `Standard` 定位方法，则需要在应用的\
  \ `plist` 中设置一些值。关于此内容的更多信息，可参阅本章前面提到的 Apple“iOS 位置感知指南”。\n\n最后一点注意事项：在应用中使用 CoreLocation\
  \ 时，必须将应用链接到 CoreLocation 框架（见图 9–16）。\n\n![images](img/0916.jpg)\n\n**图 9–16.**\
  \ *使用 CoreLocation 时链接 CoreLocation 框架*\n\n### 在 iOS 模拟器中生成位置\n\n尽管 Apple 在 CoreLocation\
  \ 框架方面做得非常出色，但一个明显的缺失是在 iOS 模拟器中生成一系列位置更新的能力。随着 iOS 5 的推出，Apple 增加了位置模拟功能，使得开发者无需离开办公桌就能测试位置感知应用。如果\
  \ Apple 的解决方案不能满足需求，这里还有两种在开发环境中测试位置应用的方法：iSimulate 和 FTLocationSimulator。这些解决方案的方法截然不同，因此我们将快速介绍如何进行设置以及它们的工作原理。\n\
  \n#### iSimulate\n\n你可以通过以下网址获取 iSimulate：\n\n`www.vimov.com/isimulate/`\n\niSimulate\
  \ 应用在你的实际 iOS 设备上运行，并允许你与桌面端 iOS 模拟器中运行的应用进行交互。最重要的是，它还允许你与模拟器共享设备的位置。你可以在 iTines\
  \ 上通过以下网址找到该应用的免费 Lite 版本：\n\n`http://itunes.apple.com/us/app/isimulate-lite/id351339630?mt=8`\n\
  \n要开始使用 iSimulate，你还需要在 Xcode 的应用项目中进行一些配置：\n\n1.  首先，从 [`www.vimov.com/isimulate/sdk/`](http://www.vimov.com/isimulate/sdk/)\
  \ 下载最新版本的 iSimulate SDK。\n2.  然后将 iSimulate 库的 `.a` 文件（撰写本文时，该文件名为 `libisimulate-4.x-opengl.a`）添加到应用目标的\
  \ Frameworks 中（见图 9–17）。\n\n    ![images](img/0917.jpg)\n\n    **图 9–17.** *链接 iSimulate\
  \ 库文件*\n\n3.  接着，将应用链接到 OpenGLES 框架（见图 9–18）。\n\n    ![images](img/0918.jpg)\n\n\
  \    **图 9–18.** *使用 iSimulate 时链接 OpenGLES*\n\n4.  最后，在 Build Settings 下为应用目标添加一个额外的\
  \ `-ObjC` 链接器标志（见图 9–19）。\n\n    ![images](img/0919.jpg)\n\n    **图 9–19.** *使用\
  \ iSimulate 时设置附加链接器标志*\n\n所有这些信息也可在此处获取：\n\n`www.vimov.com/isimulate/documentation/`\n\
  \n现在我们已经配置好了 iSimulate，是时候让它发挥作用了。在你的设备上，确保其与运行 iOS 模拟器的电脑连接在同一个 WiFi 网络下，然后启动 iSimulate。你应该会看到一个类似于图\
  \ 9–20 所示的屏幕。\n\n![images](img/0920.jpg)\n\n**图 9–20.** *iOS 上的 iSimulate*\n\n现在在\
  \ iOS 模拟器中运行你的应用，设备上的 iSimulate 应用会检测到应用正在运行，并允许你在设备上与之连接（见图 9–21）。\n\n![images](img/0921.jpg)\n\
  \n**图 9–21.** *iOS 上的 iSimulate：选择要连接的电脑*\n\n从列表中选择你的电脑名称，你将被带到 iSimulate 主屏幕。现在你已经准备好大显身手了（见图\
  \ 9–22）。\n\n![images](img/0922.jpg)\n\n**图 9–22.** *iOS 上的 iSimulator：查看 iSimulate\
  \ 共享的信息*\n\n\n\n"
- "# futuretap 的 `FTLocationSimulator`\n\n您可以通过以下 URL 获取 `FTLocationSimulator`：\n\n\
  `https://github.com/futuretap/FTLocationSimulator`\n\n与 `iSimulate` 不同，`FTLocationSimulator`\
  \ 是嵌入到您应用中的代码，用于覆盖 `CLLocationManager`。`FTLocationSimulator` 通过读取您包含在应用中的 `.kml`\
  \ 文件中的坐标来生成位置信息。虽然设置过程稍显繁琐，且涉及一些代码需要讨论，但我们将为您逐步讲解。\n\n首先，您需要通过 Git 为 `FTLocationSimulator`\
  \ 源代码设置一个子模块：\n\n```\n$ git submodule add git://github.com/futuretap/FTLocationSimulator.git\
  \ FTLocationSimulator\n```\n\n然后，在子模块的 `FTLocationSimulator` 目录中，将 `FTLocationSimulator`\
  \ 文件夹拖拽到您的 Xcode 项目中。接下来，在项目目标中添加以下附加链接器标志：`-licucore`。最后一步是调整您的代码，使其在定义了 `FAKE_CORE_LOCATION`\
  \ 时创建并使用 `FTLocationSimulator` 实例，而非 `CLLocationManager`：\n\n```\n#ifdef FAKE_CORE_LOCATION\n\
  \     self.locationManager =\n          [[[FTLocationSimulator alloc] init] autorelease];\n\
  \ #else\n     self.locationManager =\n          [[[CLLocationManager alloc] init]\
  \ autorelease];\n #endif\n```\n\n`FAKE_CORE_LOCATION` 定义在 `FTLocationSimulator.h`\
  \ 中，当目标环境为 iOS 模拟器时，其默认值为 `1`：\n\n```\n#if TARGET_IPHONE_SIMULATOR\n#define FAKE_CORE_LOCATION\
  \ 1\n#endif\n```\n\n如前所述，`FTLocationSimulator` 会覆盖 `CLLocationManager`。因此，如果定义了\
  \ `FAKE_CORE_LOCATION` 并调用了 `startUpdatingLocation`，则会调用 `FTLocationSimulator` 的\
  \ `startUpdatingLocation` 方法。此方法会调用 `FTLocationSimulator` 的 `fakeNewLocation`，后者会从包含的\
  \ `fakeLocations.kml` 文件中读取新位置，并在更新间隔后再次调用自身：\n\n```\n- (void)startUpdatingLocation\
  \ {\n        updatingLocation = YES;\n        [self fakeNewLocation];\n}\n```\n\n\
  您可以在 `FTLocationSimulator.h` 中更改更新间隔：\n\n```\n#define FAKE_CORE_LOCATION_UPDATE_INTERVAL\
  \ 0.3\n```\n\n您还可以创建自己的 `.kml` 文件，或更新 `fakeLocations.kml` 中的坐标。我们建议您深入了解如何生成 `.kml`\
  \ 文件。谷歌提供了一些工具，可帮助您轻松生成这些文件，从而辅助您的测试。\n\n## MapKit\n\n在处理位置信息时，能够可视化当前状态极为有用。因此，我们将介绍\
  \ iOS 中可用的另一个框架：MapKit。MapKit 提供的主要类是 `MKMapView`。`MKMapView` 使得在应用中集成地图变得异常简单。要查看其实际效果，请打开本章示例项目中的\
  \ `MapViewController.m` 文件。在 `MapViewController` 的 `loadView` 方法中，我们只需创建一个带有指定矩形的\
  \ `MKMapView` 对象，将自身设置为 `MKMapViewDelegate`，通过将 `showUserLocation` 属性设为 `YES` 来指示\
  \ `MKMapView` 在地图上显示当前位置，然后将其添加到视图控制器的视图中：\n\n```\n- (void)loadView {\n    [super\
  \ loadView];\n\n     CGRect rect = CGRectMake(0.0f, 0.0f, 320.0f, 411.0f);\n   \
  \  MKMapView *mapView = [[MKMapView alloc] initWithFrame:rect];\n     mapView.delegate\
  \ = self;\n     mapView.showsUserLocation = YES;\n\n     [self.view addSubview:mapView];\n\
  \     [mapView release];\n}\n```\n\n请注意，由于我们将自身设为 `MKMapView` 的委托，因此需要在 `MapViewController.h`\
  \ 中将 `MapViewController` 声明为 `MKMapViewDelegate`：\n\n```\n@interface MapViewController\
  \ : UIViewController <MKMapViewDelegate> {\n\n} @end\n```\n\n此外，不要忘记将您的应用与 MapKit\
  \ 框架进行链接（参见图 9–23）。\n\n**图 9–23.** *链接到 MapKit 框架。*\n\n我们还需要实现 `MKMapViewDelegate`\
  \ 中的几个方法；但在描述这些方法之前，需要先讨论标注这一主题。标注涉及的内容很多，因此我们不会深入探讨。简而言之，标注是可视元素，例如可以放置在 `MKMapView`\
  \ 上的图钉。在图 9–24 中，我们为地图上的一个位置点添加了一个标注，并将其表示为图钉。\n\n**图 9–24.** *在地图上显示图钉。*\n\n在地图上添加此标注的代码位于\
  \ `MKMapViewDelegate` 的 `mapView:didUpdateUserLocation:` 方法实现中。每当地图显示来自 CoreLocation\
  \ 框架的更新位置时，就会调用此方法。由于我们在 `MKMapView` 上设置了 `showsUserLocation` 为 `YES`，并且正在模拟位置更新，因此会调用此委托方法。为简单起见，我们通过\
  \ `MKMapView` 的 `addAnnotation:` 方法，将接收到的第一个位置作为 `MKPointAnnotation`（一种预定义的标注类型）添加。我们还使用\
  \ `LocationController` 的 `registerRegion:` 方法，围绕这个初始位置注册一个区域：\n\n```\n- (void)mapView:(MKMapView\
  \ *)mapView didUpdateUserLocation:\n(MKUserLocation *)userLocation\n{\n    static\
  \ int once = 0;\n    if (0 == once) {\n        once = 1;\n\n        // 创建图钉标注\n\
  \        MKPointAnnotation *annotation = [[MKPointAnnotation alloc] init];\n   \
  \     annotation.coordinate = userLocation.coordinate;\n        [mapView addAnnotation:annotation];\n\
  \        [annotation release];\n\n        [locationController registerRegion:userLocation.coordinate];\n\
  \    }\n\n    NSLog(@\"didUpdateUserLocation\");\n}\n```\n\n在 `MKMapView` 上显示标注分为两步。首先，我们将标注添加到\
  \ `MKMapView`（如上述代码所示）。其次，我们提供一个负责显示标注的标注视图。当 `MKMapView` 确定需要显示标注时，它会调用其委托的 `mapView:viewForAnnotation:`\
  \ 方法。在下面的代码中，您将看到，如果 `MKMapView` 请求的是 `MKPointAnnotation` 的视图，我们会创建一个 `MKPinAnnotationView`，并使其在地图上以动画形式显示。该动画会使图钉看起来如同从天而降，最终落定在地图上的相应位置。\n\
  \n\n\n- (MKAnnotationView *)mapView:(MKMapView *)mapView\n            viewForAnnotation:(id\
  \ <MKAnnotation>)annotation {\n\n    if ([annotation isMemberOfClass:[MKUserLocation\
  \ class]]) {\n#ifdef FAKE_CORE_LOCATION\n        // 获取应用代理的位置管理器；返回其模拟用户位置视图\n \
  \       return locationController.locationManager.fakeUserLocationView;\n#else\n\
  \        return nil;\n#endif\n    } else {\n        if ([annotation isKindOfClass:[MKPointAnnotation\
  \ class]]) {\n            // 首先尝试复用现有的图钉视图。\n            MKPinAnnotationView *pinView\
  \ =\n            (MKPinAnnotationView*)[mapView\n            dequeueReusableAnnotationViewWithIdentifier:@”PinView”];\n\
  \            if (!pinView) {\n                // 如果没有可复用的图钉视图，则创建一个新的。\n       \
  \         pinView = [[[MKPinAnnotationView alloc]\n                initWithAnnotation:annotation\n\
  \                      reuseIdentifier:@\"PinAnnotation\"] autorelease];\n     \
  \           pinView.pinColor = MKPinAnnotationColorRed;\n                pinView.animatesDrop\
  \ = YES;\n            } else {\n                pinView.annotation = annotation;\n\
  \            }\n\n            return pinView;\n        }\n    }\n\n    // 为其他类型的标注创建视图的代码\n\
  \    return nil;\n}\n\n这段代码也检查了 `MKUserLocation` 标注。这里我们不再深入细节，但你应该注意到前面讨论过的 `FTLocationSimulator`\
  \ 类，它通过为地图提供一个 `MKAnnotationView`，来模拟用户位置沿着地图移动的效果。你可以在 `FTLocationSimulator` 的\
  \ `fakeUserLocationView` 方法中看到具体实现：\n\n- (MKAnnotationView*)fakeUserLocationView\
  \ {\n    if (!self.mapView) {\n        return nil;\n    }\n\n    [self.mapView.userLocation\
  \ setCoordinate:self.location.coordinate];\n    MKAnnotationView *userLocationView\
  \ = [mapView\n       dequeueReusableAnnotationViewWithIdentifier:@\"fakeLocationView\"\
  ];\n    if (nil == userLocationView) {\n        userLocationView = [[MKAnnotationView\
  \ alloc]\n                           initWithAnnotation:self.mapView.userLocation\n\
  \                              reuseIdentifier:@\"fakeLocationView\"];\n    }\n\
  \    UIImage *image = :[UIImage imageNamed:@\"TrackingDot.png\"];\n    UIImageView\
  \ *imageView =\n                [[UIImageView alloc] initWithImage:image];\n   \
  \ [userLocationView addSubview:imageView];\n    [imageView release];\n     userLocationView.centerOffset\
  \ = CGPointMake(-10, -10);\n     return userLocationView;\n}\n\n我们需要实现的最后一个关键部分是处理用户在地图上选中某个标注时的代码。当这种情况发生时，`MKMapView`\
  \ 会调用其委托的 `mapView:didSelectAnnotationView:` 方法。在我们的 Facebook 示例中，我们将使用这个方法演示如何将用户签到某个地点。现在让我们来看看这部分内容。\n\
  \n## Facebook 地点（搜索）、签到（获取与发布）以及附近好友\n\n在 Facebook 应用本身中，通过“附近”页面来进行地点签到，该页面会自动搜索当前位置附近的地点。如果\
  \ Facebook 应用未被授予使用位置服务的权限，它会显示如下界面（见图 9–25）。\n\n![images](img/0925.jpg)\n\n**图\
  \ 9–25.** *Facebook iOS 应用的“签到”功能中位置不可用*\n\n假设 Facebook 应用已被授予使用位置服务的权限，你会看到返回的地点匹配列表（见图\
  \ 9–26），以及某个地点的详细信息。Facebook 应用通过这种方式让用户社区管理地点。地点档案（本质上类似于 Facebook 页面）如图 9–27 所示；用户可以通过图\
  \ 9–28 所示的方式对地点进行操作。\n\n![images](img/0926.jpg)\n\n**图 9–26.** *在 Facebook iOS 应用中搜索附近地点和活动*\n\
  \n![images](img/0927.jpg)\n\n**图 9–27.** *Facebook iOS 应用中某个地点的详细信息*\n\n![images](img/0928.jpg)\n\
  \n**图 9–28.** *在 Facebook iOS 应用中标记地点*\n\n在我们的示例应用中，我们希望让用户能够将某人签到 Facebook 上的某个地点。请注意，我们设置了应用在地图上显示一个图钉。当用户选中该图钉时，`MKMapViewDelegate`\
  \ 的 `mapView:didSelectAnnotationView:` 方法会被调用。在 `MapViewController` 的该方法实现中，我们向\
  \ Facebook 发起一个搜索请求，以获取该标注位置附近的地点列表。向 Facebook 发起搜索请求时，我们只需将 Facebook 的 `requestWithGraphPath:andParams:andDelegate:`\
  \ 方法的 graph path 设置为 `search`。需要提供的附加参数是一个字典，包含 `type`、`center` 和 `distance` 键。`MapViewController`\
  \ 类遵循 `FBRequestDelegate` 协议，因此我们将其作为委托传入：\n\n```\n- (void)mapView:(MKMapView *)mapView\n\
  \    didSelectAnnotationView:(MKAnnotationView *)view\n{\n    NSString *centerString\
  \ = [NSString stringWithFormat: @\"%f,%f\",\n        view.annotation.coordinate.latitude,\n\
  \        view.annotation.coordinate.longitude];\n\n    NSMutableDictionary *params\
  \ =\n                [NSMutableDictionary dictionaryWithObjectsAndKeys:\n      \
  \          @\"place\", @\"type\",\n                centerString, @\"center\",\n\
  \                @\"1000\", @\"distance\", // 单位米（1000m = 0.62 英里）\n           \
  \  nil];\n\n    [facebook requestWithGraphPath:@\"search\"\n                   \
  \      andParams:params\n                       andDelegate:self];\n}\n```\n\n当\
  \ `FBRequestDelegate` 的 `request:didLoad:` 方法被调用时，结果参数是一个字典，其中包含一个地点字典数组。每个地点字典都包含一个\
  \ id、一个类别、一个名称，以及一个包含城市、国家、州、纬度和经度的 `location` 字典：\n\n```\n{\n    data =     (\n\
  \                {\n            category = \"Local business\";\n            id =\
  \ 151247078226083;\n            location =             {\n                city =\
  \ \"Monta Vista\";\n                country = \"United States\";\n             \
  \   latitude = \"37.3316086\";\n                longitude = \"-122.05885\";\n  \
  \              state = CA;\n            };\n            name = \"Somerset Square\
  \ Park\";\n        }\n        );\n}\n```\n\n在下面的代码中，我们取结果中字典数组的第一个匹配项，并通过以下 graph\
  \ path 向 Facebook 发布一条签到信息：\n\n```\n\"me/checkins\"\n```\n\n\n\n我们在一个字典中为 POST 请求设置参数，其中包含\
  \ `place`、`coordinates` 和 `message` 键的值。请注意，`coordinates` 键的 `latitude` 和 `longitude`\
  \ 值需要采用 JSON 格式，因此我们使用 `SBJSON`（包含在 Facebook SDK 中）将这些值转换为 `JSON` 字符串：\n\n```\n\
  - (void)request:(FBRequest *)request didLoad:(id)result {\n    NSLog(@\"didLoad:\"\
  );\n\n    NSArray *places = [(NSDictionary*)result objectForKey:@\"data\"];\n  \
  \  if (0 < [places count]) {\n        NSDictionary *dictionary = [places objectAtIndex:0];\n\
  \        if (nil != dictionary) {\n        NSDictionary *locDictionary =\n     \
  \           [dictionary objectForKey:@\"location\"];\n\n        NSMutableDictionary\
  \ *coordinatesDictionary =\n               [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
  \               [locDictionary objectForKey:@\"latitude\"], @\"latitude\",\n   \
  \            [locDictionary objectForKey:@\"longitude\"], @\"longitude\",\n    \
  \           nil];\n\n            SBJSON *jsonWriter = [[SBJSON new] autorelease];\n\
  \            NSString *coordinates =\n               [jsonWriter stringWithObject:coordinatesDictionary];\n\
  \n            NSMutableDictionary *params =\n               [NSMutableDictionary\
  \ dictionaryWithObjectsAndKeys:\n               [dictionary objectForKey:@\"id\"\
  ], @\"place\",\n               coordinates, @\"coordinates\",\n               @\"\
  This is a test checkin\", @\"message\",\n               nil];\n\n            [facebook\
  \ requestWithGraphPath:@\"me/checkins\"\n                                      andParams:params\n\
  \                                 andHttpMethod:@\"POST\"\n                    \
  \                andDelegate:self];\n        }\n    }\n}\n```\n\n请注意，您还可以通过在 `checkin`\
  \ POST 中标记用户的好友来将其包含在签到中。为此，需要在 `params` 字典中添加一个名为 `tags` 的键，并将其值设置为以逗号分隔的 Facebook\
  \ 用户 ID 列表。\n\n向用户的 Facebook 账户发布签到需要 `publish_checkins` 权限，因此我们必须更新登录代码以包含此额外权限：\n\
  \n```\n- (void)login {\n    [facebook authorize:[NSArray arrayWithObjects:\n   \
  \                      @\"user_groups\", @\"user_events\",\n                   \
  \      @\"offline_access\", @\"publish_checkins\", nil]\n               delegate:self];\n\
  }\n```\n\n使用此额外权限登录时，会显示以下 `OAuth` 屏幕（请参见 图 9–29）。\n\n![images](img/0929.jpg)\n\n\
  **图 9–29.** *通过 OAuth 授权签到 Facebook 地点*\n\n签到发布后，它将显示在用户的 Facebook iOS 应用（以及 Facebook.com）中，如图\
  \ 图 9–30 所示。\n\n![images](img/0930.jpg)\n\n**图 9–30.** *Facebook iOS 应用中的签到*\n\n\
  选择一个签到会显示一个小的地图和地点描述，以及对该签到的任何评论（请参见 图 9–31）。\n\n![images](img/0931.jpg)\n\n**图\
  \ 9–31.** *Facebook 签到的详细信息*\n\n该地点可以在 Facebook iOS 应用内的更大地图上查看（请参见 图 9–32）。\n\n\
  ![images](img/0932.jpg)\n\n**图 9–32.** *Facebook 签到的更大视图地图*\n\n接下来，您可以选择在设备上的主地图应用中查看地图，或获取路线（请参见\
  \ 图 9–33）。\n\n![images](img/0933.jpg)\n\n**图 9–33.** *在 Facebook iOS 应用中对签到可执行的操作*\n\
  \n正如我们可以为用户发布签到一样，我们也可以通过 Facebook 图谱路径 `me/checkins` 检索用户的签到：\n\n```\n[facebook\
  \ requestWithGraphPath:@\"me/checkins\"\n                     andParams:nil\n  \
  \                 andDelegate:self];\n```\n\n返回的结果是一个字典数组，其中每个字典包含单个签到的信息。这些信息包括发布签到的应用、创建时间、发布签到的用户、签到的\
  \ Facebook ID、签到相关的消息以及签到相关的地点：\n\n```\n(\n{\n    application =     {\n        id\
  \ = 114442211957627;\n        name = \"Beginning iOS Social Development\";\n   \
  \ };\n    \"created_time\" = \"2011-04-09T16:14:19+0000\";\n    from =     {\n \
  \       id = 623441509;\n        name = \"Christopher White\";\n    };\n    id =\
  \ 10150149394136510;\n    message = \"This is a test checkin\";\n    place =   \
  \  {\n        id = 144940418859769;\n        location =         {\n            latitude\
  \ = \"37.332301584174\";\n            longitude = \"-122.08672354097\";\n      \
  \  };\n        name = \"Rancho San Antonio County Park\";\n    };\n}\n)\n```\n\n\
  从用户的 Facebook 账户检索签到需要 `user_checkins` 权限，因此我们必须更新登录代码以包含此额外权限：\n\n```\n- (void)login\
  \ {\n   [facebook authorize:[NSArray arrayWithObjects:\n                       \
  \ @\"user_groups\", @\"user_events\",\n                        @\"offline_access\"\
  , @\"publish_checkins\",\n                        @\"user_checkins\", nil]\n   \
  \           delegate:self];\n}\n```\n\n使用此额外权限登录时，会显示以下 `OAuth` 屏幕（请参见 图 9–34）。\n\
  \n![images](img/0934.jpg)\n\n**图 9–34.** *Facebook 签到权限*\n\n\n\n#### 带定位发推\n\n在\
  \ Twitter 应用中，最需要启用的功能就是让用户能够将地理位置关联到推文中。我们为本章节准备了 `ApiTwitter` 示例，它将沿用 `ApiFacebook`\
  \ 应用的结构，因此前面章节已涵盖的配置内容我们将略过。目前，`LocationController` 类已集成完毕，我们通过 `FTLocationSimulator`\
  \ 模拟位置数据，并使用 `MapViewController` 展示带注释的地图。唯一的不同在于用户选择注释时的处理方式。\n\nTwitter 的地理位置\
  \ API 文档写得非常详尽，我们强烈建议您通过以下链接熟悉其底层 HTTP API：\n\n`http://dev.twitter.com/doc/get/geo`\n\
  \n之前我们一直使用 XML 格式与 Twitter API 交互，但 Twitter 地理位置 API 仅返回 `JSON` 格式数据。此外，地理位置的基础\
  \ URL 已更新为以下格式，其中 `1` 代表 API 版本：\n\n`http://api.twitter.com/1/`\n\n为体验这些 API 的使用方式，请在浏览器中打开\
  \ apigee.com 的 Twitter 控制台（见图 9-35）。这是测试 Twitter API 的实用工具，能帮助您快速上手：\n\n`https://apigee.com/console/twitter`\
  \ ![图片](img/0935.jpg)\n\n**图 9–35.** *Apigee 的 Twitter 控制台*\n\n由于 Twitter 地理位置 API\
  \ 仅返回 JSON 格式，我们需要更新 `MGTwitterEngine` 以集成 `SBJSON` 库（一个易于使用的 Objective-C JSON 处理工具）。首先在\
  \ `MGTwitterEngine.m` 中设置 URL 格式为 `JSON` 并导入 `JSON.h`：\n\n```\n#elif SBJSON_AVAILABLE\n\
          #define API_FORMAT @\"json\"\n        #import \"JSON.h\"\n#else\n```\n\n\
  同时需要更新默认 Twitter 域名：\n\n```\n#define TWITTER_DOMAIN          @\"api.twitter.com/1\"\
  \n```\n\n接下来，要让 `MGTwitterEngine` 在解析连接数据时使用 `JSON`。响应数据首先被转换为 `JSON` 字符串表示，然后通过\
  \ `SBJSON` 库中定义的 `NSString` 分类方法 `JSONValue` 转换为 `NSArray` 或 `NSDictionary`：\n\n\
  ```\n#elif SBJSON_AVAILABLE\n- (void)_parseDataForConnection:(MGTwitterHTTPURLConnection\
  \ *)connection\n{\n    NSString *identifier = [[[connection identifier] copy] autorelease];\n\
      NSData *jsonData = [[[connection data] copy] autorelease];\n    MGTwitterResponseType\
  \ responseType = [connection responseType];\n    NSString *json_string =\n        [[[NSString\
  \ alloc] initWithData:jsonData\n                               encoding:NSUTF8StringEncoding]\n\
                                 autorelease];\n\n    id json = [json_string JSONValue];\n\
  \n        NSArray *parsedObjects;\n\n        if ([json isKindOfClass:[NSArray class]])\
  \ {\n                parsedObjects = [NSArray arrayWithArray:json];\n        } else\
  \ if ([json isKindOfClass:[NSDictionary class]]) {\n                parsedObjects\
  \ = [NSArray arrayWithObject:json];\n        }\n\n        [self parsingSucceededForRequest:identifier\n\
                            ofResponseType:responseType\n                       withParsedObjects:parsedObjects];\n\
  \n}\n#else\n```\n\n在 `MGTwitterEngineGlobalHeader.h` 中，我们存储了决定是否默认使用 JSON 格式的 `#define`\
  \ 宏。将此值设为 `1` 即可启用：\n\n```\n#define SBJSON_AVAILABLE 0\n```\n\n要编译这段代码，需要在 Xcode\
  \ 项目中创建名为 `SBJSON` 的新组，并将 SBJSON 文件拖入该组文件夹。如果本地尚未安装 SBJSON 文件，可以通过克隆 `Github` 仓库或创建子模块的方式获取。我们推荐使用子模块：\n\
  \n```\n$ git submodule add git://github.com/stig/json-framework.git json-framework\n\
  ```\n\n现在已将 `SBJSON` 集成到 `MGTwitterEngine` 中，接下来需要添加对 Twitter 地理位置 API 的支持，以及通过\
  \ `location` 参数发布状态更新的功能。Twitter 的 HTTP 地理位置 API 使用以下格式：\n\n`geo/<action>.json`\n\
  \n因此我们创建了 `geoResultsForPath:withParams:` 方法，允许您设置要执行的操作和参数。可用的四种路径操作如下：\n\n*  \
  \ `geo/search`\n*   `geo/reverse_geocode`\n*   `geo/similar_places`\n*   `geo/id`\n\
  \n参数包括 `latitude` 和 `longitude` 值、地名等：\n\n```\n- (NSString *)geoResultsForPath:(NSString\
  \ *)path\n                     withParams:(NSDictionary*)params\n{\n    NSString\
  \ *path1 =\n        [NSString stringWithFormat:@\"geo/%@.%@\", path, API_FORMAT];\n\
  \n    return [self _sendStandardRequestWithMethod:nil                                            path:path1\n\
                                  queryParameters:params\n                                           body:nil\n\
                                     requestType:MGTwitterAccountRequest\n                                   responseType:MGTwitterMiscellaneous];\n\
  }\n```\n\n现在终于可以实际应用了。在 `MapViewController.m` 中找到 `mapView:didSelectAnnotationView:`\
  \ 方法：\n\n```\n- (void)mapView:(MKMapView *)mapView\n        didSelectAnnotationView:(MKAnnotationView\
  \ *)view\n{\n    NSNumber *lat =\n      [NSNumber numberWithDouble:view.annotation.coordinate.latitude];\n\
      NSNumber *lon =\n      [NSNumber numberWithDouble:view.annotation.coordinate.longitude];\n\
  \n    NSMutableDictionary *params = [NSMutableDictionary dictionary];\n    [params\
  \ setObject:[lat stringValue] forKey:@\"lat\"];\n    [params setObject:[lon stringValue]\
  \ forKey:@\"long\"];\n    NSString *identifier =\n        [sa_OAuthTwitterEngine\
  \ geoResultsForPath:@\"reverse_geocode\"\n                                      withParams:params];\n\
  \n    //监听以 identifier 命名的通知\n    [[NSNotificationCenter defaultCenter]\n        addObserver:self\n\
                selector:@selector(twitterPlacesRequestDidComplete:)\n              name:identifier\n\
              object:nil];\n}\n```\n\n当选中地图上的图钉时，我们调用 Twitter 的 `geo/reverse_geocode`\
  \ API，并传入 `latitude` 和 `longitude` 参数。这些坐标值来自与图钉关联的注释。*反向地理编码*的概念是指将经纬度坐标转换为该位置的实际地址或地名。请注意，您还可以提供其他参数来控制反向地理编码或其他位置搜索的精度。\n\
  \n在 Twitter 中，每个地点都有对应的 Twitter ID；当将位置关联到推文时，Twitter 建议使用 `place` ID 值而非原始的经纬度数据，这有助于保护用户隐私。关于如何在您的应用中遵循\
  \ Twitter 地理位置指南的更多信息，我们强烈建议您阅读以下链接：\n\n`http://dev.twitter.com/pages/geo_dev_guidelines`\n\
  \n现在总结一下目前的进展。我们让 Twitter 对某个位置进行反向地理编码，然后设置监听以等待响应返回。原始的 `JSON` 响应数据采用以下格式：\n\n\
  \n\n```objectivec\n{\n    query = {\n        params = {\n            accuracy =\
  \ 0;\n            autocomplete = 0;\n            granularity = neighborhood;\n \
  \           query = London;\n            \"trim_place\" = 0;\n        };\n     \
  \   type = search;\n        url = \"URL\";\n    };\n    result = {\n        places\
  \ = (\n            {\n                attributes = {\n                };\n     \
  \           \"bounding_box\" = {\n                    coordinates = (\n        \
  \                (\n                            \"-0.5093057\",\n              \
  \              \"51.286606\"\n                        ),\n                     \
  \   (\n                            \"0.334433\",\n                            \"\
  51.286606\"\n                        ),\n                        (\n           \
  \                 \"0.334433\",\n                            \"51.691672\"\n   \
  \                     ),\n                        (\n                          \
  \  \"-0.5093057\",\n                            \"51.691672\"\n                \
  \        )\n                    );\n                    type = Polygon;\n      \
  \          };\n                \"contained_within\" = (\n                    {\n\
  \                        attributes = {\n                        };\n          \
  \              \"bounding_box\" = {\n                            coordinates = (\n\
  \                                (\n                                    (\n    \
  \                                    \"-6.3651943\",\n                         \
  \               \"49.8825312\"\n                                    ),\n       \
  \                             (\n                                        \"1.768926\"\
  ,\n                                        \"49.8825312\"\n                    \
  \                ),\n                                    (\n                   \
  \                     \"1.768926\",\n                                        \"\
  55.8116485\"\n                                    ),\n                         \
  \           (\n                                        \"-6.3651943\",\n       \
  \                                 \"55.8116485\"\n                             \
  \       )\n                                )\n                            );\n \
  \                           type = Polygon;\n                        };\n      \
  \                  country = \"United Kingdom\";\n                        \"country_code\"\
  \ = GB;\n                        \"full_name\" = \"England, United Kingdom\";\n\
  \                        id = 8ef32ff56ef11c22;\n                        name =\
  \ England;\n                        \"place_type\" = admin;\n                  \
  \      url = \"URL\";\n                    }\n                );\n             \
  \   country = \"United Kingdom\";\n                \"country_code\" = GB;\n    \
  \            \"full_name\" = \"London, England\";\n                id = 5d838f7a011f4a2d;\n\
  \                name = London;\n                \"place_type\" = admin;\n     \
  \           url = \"URL\";\n            }\n        );\n    };\n}\n```\n\n请注意，实际的地点数组位于一个名为\
  \ `result` 的字典中。每个地点本身也是一个包含值的字典，但我们最感兴趣的是 `id` 键的值。当我们收到来自 Twitter 的地点结果通知时，我们会提取数组中第一个地点的字典，获取其地点\
  \ ID，然后提交一个包含额外参数字典的状态更新。为了符合 Twitter 的 API，我们提供了一个键为 `place_id` 的参数：\n\n```objectivec\n\
  - (void)twitterPlacesRequestDidComplete:(NSNotification*)notification {\n    [[NSNotificationCenter\
  \ defaultCenter] removeObserver:self];\n    NSArray *places = [notification.userInfo\
  \ objectForKey:@\"places\"];\n    if (0 < [places count]) {\n        // 获取第一个地点\n\
  \        NSDictionary *placesDict = [places objectAtIndex:0];\n        NSDictionary\
  \ *resultDict = [placesDict objectForKey:@\"result\"];\n        NSArray *resultPlaces\
  \ = [resultDict objectForKey:@\"places\"];\n        if (0 < [resultPlaces count])\
  \ {\n            NSDictionary *firstPlace = [resultPlaces objectAtIndex:0];\n  \
  \          NSMutableDictionary *params =\n                [NSMutableDictionary dictionary];\n\
  \            [params setObject:[firstPlace objectForKey:@\"id\"]\n             \
  \          forKey:@\"place_id\"];\n            [sa_OAuthTwitterEngine sendUpdate:@\"\
  location tweet!\"\n                                   withParams:params];\n    \
  \    }\n    }\n}\n```\n\n如果我们随后在网页上查看 Twitter，瞧，我们就能看到带位置的推文（参见图 9-36）。请注意，你必须在\
  \ Twitter 的设置中启用推文位置功能，正如本章前面讨论的那样。\n\n利用 Twitter 的位置功能，你可以做很多有趣的事情，所以不妨试试这段代码。实际的示例代码中还有一些其他示例代码，你可以取消注释来了解\
  \ Twitter 的其他地理位置 API 是如何工作的。它们都紧密相关，并且接受几乎相同的参数。\n\n在结束本章之前，我们还想指出，如果你不想使用 Twitter\
  \ 或 Facebook 来查找坐标对应的地点，可以使用 MapKit 的 `MKReverseGeocoder` 类。这取决于你。示例代码中也实现了 `MKReverseGeocoder`，以便你闲暇时进行尝试。\n\
  \n![images](img/0936.jpg)\n\n**图 9–36.** *一条包含位置信息的推文*\n\n### 总结\n\n处理位置信息非常有趣，但也存在风险。在你的应用程序中处理位置信息，以及与\
  \ Facebook 和 Twitter 等社交网络协作时，最关键的是要站在用户的角度思考，并就你如何使用她的位置信息向自己提出重要问题。每个应用程序都有独特的用户界面设计，但我们鼓励你在应用程序中披露你如何处理用户位置信息，并在应用程序首次启动或用户首次执行将涉及她位置信息的操作时立即显示该披露信息。\n\
  \n这只是你应该遵循的众多设计和界面指南之一。你将在第 11 章到第 14 章中了解更多相关内容。\n\n关于位置信息的内容到此结束。我们已经为你提供了基本构建模块，尽情享受吧。在下一章中，我们将涵盖一系列技术问题，这些将提升你的应用程序与\
  \ Facebook 和 Twitter 的整体集成度。\n\n"
- '# 第 10 章




  '
- "# 使用开源工具及其他好用资源\n\n移动软件世界的发展速度快得惊人，有时要跟上所有最新动态似乎是一项艰巨的任务。虽然本书旨在介绍如何将 Facebook 和\
  \ Twitter 集成到应用中，但还有许多相关技术可以简化工作，或揭示其他应用如何完成特定任务。此外，一些跨平台发布库可以帮助你省去直接集成 Facebook\
  \ 和 Twitter SDK 的麻烦。本章将探讨这些主题。\n\n本章还将讨论 Twitter 提供的数据和趋势。除了标准的客户端 API，Twitter 还向开发者开放了数据和趋势。Twitter\
  \ Trends 是该网站用于衡量快速流行起来的话题（即话题标签）的工具——换句话说，就是热门新闻。如果你还没听说过 Trends 工具，可以在 Twitter.com\
  \ 上查看这份概要：\n\n`http://yearinreview.twitter.com/trends/`\n\n直接从应用程序内部访问这些趋势可能并不总是有意义的，而且\
  \ Twitter 的条款也限制了你使用其数据的某些方式；不过，研究这种服务器到服务器的交互或许会很有用。稍后你将学习如何利用这些数据进行自己的数值计算，并将所需内容提供给应用程序。\n\
  \n## 越短越好\n\n在引用网络资源时，一个常见的问题是这些资源的 URL 有时会非常长。这在将 Twitter 等服务集成到应用程序中时会产生问题，因为推文需要保持简短。例如，如果应用程序想允许用户分享一篇文章的推文，但文章\
  \ URL 的长度几乎占满了整条推文，或者完全无法放入推文，这对用户来说并不友好。\n\n这就是 URL 缩短服务发挥作用的地方。目前有许多可用的 URL 缩短服务，包括\
  \ Twitter 自家的服务（在本书即将付印时宣布）。不过，第三方 URL 缩短服务提供了 Twitter 所不具备的功能（例如分析功能），因此我们将花时间讨论其中两种。我们还将介绍它们的工作原理以及如何将其集成到\
  \ iOS 应用中。请注意，并非所有服务都会永久运营；如果你在意链接的存档质量，请使用 Twitter 自家的缩短服务 T.co。\n\n以下是两种常见的第三方\
  \ URL 缩短服务：\n\n*   [`http://bit.ly`](http://bit.ly)\n*   [`http://TinyURL.com`](http://TinyURL.com)\n\
  \n这两种服务完全免费使用，且工作原理相同：你向服务提供一个 URL，它会返回一个缩短后的 URL。\n\n一个用于试验这些服务的有用工具是名为 `cURL`\
  \ 的命令行工具，你可以通过以下网址了解更多信息：\n\n`https://secure.wikimedia.org/wikipedia/en/wiki/CURL`\n\
  \n`cURL` 旨在支持多种互联网协议，但在本案例中，HTTP 是唯一相关的协议。要查看 `curl` 的实际应用，请在 Mac 上打开“终端”，并在命令行中输入以下内容：\n\
  \n```\n$ curl http://www.apress.com\n```\n\n这会将通常由网页浏览器处理并显示的 Apress 首页的所有 HTML\
  \ 写入命令行。\n\n对于 URL 缩短，你需要的不仅仅是一个 URL。URL 缩短服务要求将要缩短的 URL 作为参数包含在请求中。要向 URL 请求发送参数，请使用\
  \ `cURL` 的 `-d` 选项：\n\n```\n$ curl -d \"<请求参数>\" URL\n```\n\nTinyURL 的协议很简单。只需向\
  \ `http://tinyurl.com/api-create.php` 提交一个请求，其中包含一个 `url` 参数，该参数设置为你想要缩短的 URL：\n\
  \n```\n$ curl -d \"url=http://www.apress.com\" http://tinyurl.com/api-create.php\n\
  ```\n\n这将返回一个如下格式的缩短 URL：\n\n```\nhttp://tinyurl.com/9qths\n```\n\n当然，`www.apress.com`\
  \ 并不是一个真正需要缩短的 URL——但这只是一个示例。\n\nBit.ly 与 TinyURL 一样，可以缩短 URL；不过，它还能提供跟踪、分析、搜索历史以及更多关于其生成的缩短\
  \ URL 的服务。要充分利用 bit.ly，你需要在其网站上注册一个账户。完成注册后，bit.ly 会为账户关联一个 `apiKey`。使用其服务需要这个 `apiKey`。bit.ly\
  \ 的协议要求向 `http://api.bitly.com/v3/shorten` 发送请求，并包含以下参数：\n\n*   `login`：一个 bit.ly\
  \ 用户名（在创建账户时选择）\n*   `apiKey`：与所提供的用户名关联的 `api` 密钥（成功注册后由 bit.ly 生成）\n*   `longUrl`：要缩短的\
  \ URL\n*   `format`：期望的响应格式；支持的值包括 `json`（默认）、`xml` 和 `txt`\n\n因此，使用 `cURL` 请求 bit.ly\
  \ 缩短一个 URL 的示例如下：\n\n```\n$ curl -d \"login=<bit.ly 用户名>&apiKey=<bit.ly API\n  \
  \         密钥>&longUrl=http://www.apress.com&format=txt\"\n           http://api.bitly.com/v3/shorten\n\
  ```\n\n这将返回一个如下格式的缩短 URL：\n\n```\nhttp://bit.ly/dIB3mD\n\n关于 bit.ly API 的更多详细信息，请访问：\n\
  \n`https://code.google.com/p/bitly-api/wiki/ApiDocumentation#/v3/shorten`\n\n想要快速了解\
  \ URL 缩短背后的一些基础理论，可以阅读以下网址的文章《URL 缩短：哈希的实际应用》：\n\n`www.codinghorror.com/blog/2007/08/url-shortening-hashes-in-practice.html`\n\
  \n关于 `curl` 及其功能的更详细信息，请访问以下页面：\n\n`http://curl.haxx.se/docs/manpage.html`\n\n或者，你也可以在命令行中直接输入：\n\
  \n```\n$ man curl\n```\n\n### 在 iOS 中使用 URL 缩短服务\n\n`curl` 是进行快速测试的好工具；但它无法在 iOS\
  \ 应用中使用。尽管在 iOS 应用中有多种方式集成 URL 缩短服务，但最快的方法是使用 `NSString` 的 `stringWithContentsOfURL`\
  \ 方法。该方法接收一个 URL，完成所有发出请求的工作，并以 `NSString` 的形式返回响应。因此，对于 TinyURL，在 Objective-C 代码中使用\
  \ `NSString` 的 `stringWithContentsOfURL` 方法请求缩短 URL 的示例如下：\n\n```\nNSString *longURL\
  \ = @\"http://www.apress.com\";\nNSString *format = @\"http://tinyurl.com/api-create.php?url=%@\"\
  ;\nNSString *apiEndpoint = [NSString stringWithFormat:format, longURL];\nNSString\
  \ *shortURL =\n[NSString stringWithContentsOfURL:[NSURL URLWithString:apiEndpoint]\n\
  \                         encoding:NSASCIIStringEncoding error:nil];\n```\n\n请注意，`stringWithContentsOfURL`\
  \ 会阻塞，直到收到响应。因此，根据使用此方法的应用程序的需求，可能值得在后台线程上调用此方法，或者跳过使用 `NSString` 的 `stringWithContentsOfURL`，然后通过\
  \ `NSURLRequest` 发出请求。\n\n\n\n# ShareKit：有时“快速且粗糙”反而奏效\n\n将社交服务集成到应用程序中的主要问题之一是，网络上涌现的社交服务实在太多。其他人也意识到了同样的问题，并费心将所有服务整合到一个库中，供应用程序集成。目前较为出色的聚合库之一是\
  \ ShareKit，你可以通过以下网址获取：\n\n`http://getsharekit.com/`\n\nShareKit 是一个开源的 Objective-C\
  \ 库，它让我们能轻松地在应用中集成以下服务：\n\n-   Delicious\n-   Email\n-   Facebook\n-   Google Reader\n\
  -   Instapaper\n-   Pinboard\n-   Read It Later\n-   Tumblr\n-   Twitter\n\n由于 ShareKit\
  \ 是开源的，并且托管在 Github 上，因此其代码可以随时被克隆、分支或审查：\n\n`https://github.com/ideashower/sharekit/`\n\
  \n请注意，Github 上的最新代码可能与 ShareKit 当前官方发布版本的内容不一致，因此请务必小心。强烈建议从 ShareKit 网站下载并使用其官方版本。在撰写本文时，ShareKit\
  \ 最新的官方版本是 0.2.1。此版本的下载文件已添加至本书在 Github 上的源代码仓库中，你可以在 `ShareKit` 目录中找到它。\n\n你还可以在源代码仓库（位于\
  \ `Chapter10` 目录）中找到 ShareKit 的示例应用程序。该示例程序使用的是我们之前提到的仓库中的 ShareKit 版本（0.2.1）。以下关于集成\
  \ ShareKit 的说明均参照该示例程序。\n\n## 开始使用 ShareKit\n\n要开始使用 ShareKit，首先将 `ShareKit` 源代码目录拖入你的项目中。该目录位于本书\
  \ `Git` 仓库的以下路径：\n\n`ShareKit/Classes/ShareKit`\n\n将 ShareKit 文件夹拖入项目时，在弹出的对话框中选择默认选项，如图\
  \ 10-1 所示。\n\n![images](img/1001.jpg)\n\n**图 10-1.** *将 ShareKit 拖入 Xcode 项目时选择默认选项。*\n\
  \n接下来，将应用程序链接到以下框架（参见图 10-2）：\n\n-   `SystemConfiguration.framework`\n-   `Security.framework`\n\
  -   `MessageUI.framework`\n\n![images](img/1002.jpg)\n\n**图 10-2.** *将应用程序链接到相应的框架。*\n\
  \n为了让 ShareKit 能够访问所需的服务，它必须知道这些服务的某些账户信息。在 ShareKit 示例项目中，转到 `SHKConfig.h`，输入 Facebook\
  \ 和 Twitter 的信息，并开启调试功能，如图 10-3 至 10-5 所示。\n\n![images](img/1003.jpg)\n\n**图 10-3.**\
  \ *在 `SHKConfig.h` 中设置应用程序名称和 URL。*\n\n![images](img/1004.jpg)\n\n**图 10-4.** *在\
  \ `SHKConfig.h` 中设置应用程序的 Twitter OAuth 凭证。*\n\n![images](img/1005.jpg)\n\n**图 10-5.**\
  \ *在 `SHKConfig.h` 中开启调试日志。*\n\n将 ShareKit 与 Facebook 集成需要应用程序的 Facebook OAuth 消费者密钥（consumer\
  \ key）和密钥（secret）；同样地，将与 Twitter 集成需要应用程序的 Twitter OAuth 消费者密钥和密钥。此外，Twitter 还需要一个回调\
  \ URL。要为 Twitter 应用程序设置回调 URL，该应用程序必须在 Twitter 上被创建为浏览器应用程序。这意味着，如果应用之前是在 Twitter\
  \ 上作为客户端应用程序创建的，则需要将其重新配置为浏览器应用程序。否则，你需要创建一个新的应用程序。实际输入给 Twitter 应用程序的 URL 并不重要。唯一重要的是，在\
  \ `SHKConfig.h` 中指定的 URL 必须与在 `Twitter.com` 上指定的 URL 一致。示例如下：\n\n`www.apress.com/callback`\n\
  \n处理 Twitter 时，需要集成 bit.ly 来发布 URL，因为 ShareKit 在底层使用 bit.ly 将 URL 缩短后再发布到 Twitter。本章前面已介绍过如何在\
  \ bit.ly 上创建应用程序，请参考该章节获取更多说明。\n\n在 ShareKit 头文件中配置好账户信息后，接下来就该向项目添加代码，使用 ShareKit\
  \ 发布内容到 Facebook 和 Twitter。转到 ShareKit 示例项目中的 `MainViewController.m`，查看 `loadView`\
  \ 方法。在此方法中，将一个 `UIToolbar` 添加到视图控制器的视图中，并为其添加一个带有默认操作图标的 `UIBarButtonSystemItem`\
  \ 按钮，如图 10-6 所示：\n\n![images](img/1006.jpg)\n\n**图 10-6.** *ShareKit 中带有默认按钮的 `UIToolBar`*\n\
  \n```\n- (void)loadView\n{\n    [super loadView];\n\n    self.view.backgroundColor\
  \ = [UIColor whiteColor];\n\n    UIBarButtonItem *item = [[UIBarButtonItem alloc]\n\
  \        initWithBarButtonSystemItem:UIBarButtonSystemItemAction\n             \
  \                target:self\n                             action:@selector(share)];\n\
  \n    NSArray *items = [NSArray arrayWithObject:item];\n    [items addObject:item];\n\
  \    [item release];\n\n    CGRect frame = CGRectMake(0.0f,\n                  \
  \            self.view.bounds.size.height-40.0f,\n                             \
  \ self.view.bounds.size.width,\n                              40.0f);\n    toolbar\
  \ = [[UIToolbar alloc] initWithFrame:frame];\n\n    [toolbar setItems:items animated:YES];\n\
  \    [self.view addSubview:toolbar];\n    [toolbar release];\n\n    [SHK flushOfflineQueue];\n\
  }\n```\n\n选择工具栏按钮会调用 `share` 方法，该方法会向用户显示一个 `SHKActionSheet`：\n\n```\n- (void)share\n\
  {\n    // Create the item to share (in this example, a url)\n    NSURL *url = [NSURL\
  \ URLWithString:@\"http://www.apress.com\"];\n    SHKItem *item = [SHKItem URL:url\
  \ title:@\"Apress is Awesome!\"];\n\n    // Get the ShareKit action sheet\n    SHKActionSheet\
  \ *actionSheet =\n        [SHKActionSheet actionSheetForItem:item];\n\n    // Display\
  \ the action sheet\n    [actionSheet showFromToolbar:toolbar];\n}\n```\n\n`SHKActionSheet`\
  \ 是一个漂亮的弹出窗口，向用户展示分享信息的选项（参见图 10-7）。\n\n![images](img/1007.jpg)\n\n**图 10-7.** *`SHKActionSheet`\
  \ 弹出窗口*\n\n点击 Facebook 按钮会显示熟悉的 Facebook 移动网页发布界面（参见图 10-8）。\n\n![images](img/1008.jpg)\n\
  \n**图 10-8.** *你会认出这是用于发布的 Facebook 移动网页。*\n\n点击 Twitter 按钮会显示一个带有短链接的精美对话框（参见图\
  \ 10-9）。\n\n![images](img/1009.jpg)\n\n**图 10-9.** *ShareKit 的 Twitter 对话框*\n\n\
  ShareKit 不仅支持发布 URL 和文本，还支持更多功能，因此值得深入探索。它是一个精心打造的解决方案，能让你快速集成 Facebook 和 Twitter。\n\
  \n\n\n### 最新 Twitter 潮流趋势\n\n思考人们在特定地理区域或特定时间段内普遍在推特上谈论什么，总是很有趣的。Twitter 通过其趋势 API\
  \ 提供这些数据。访问这些趋势非常简单，并且不需要任何认证；但请注意，这些 API 的使用始终受限于 Twitter 的速率限制。根据应用的需求，这些数据可以直接从\
  \ iOS 应用内部访问，也可以通过服务器到服务器的方式获取。\n\nTwitter 基于 Twitter 话题标签返回趋势。回想一下，Twitter 话题标签是\
  \ Twitter 用户关联或分组推文的一种方式。例如，假设一个 Twitter 用户想发一条关于独角兽的推文，以便当有人搜索或查看关于独角兽的推文趋势时，他的推文能被包含在内。在这种情况下，他会在他的推文中包含话题标签\
  \ `#unicorns`。\n\n有几种不同的方式可以使用趋势 API。要获取 Twitter 上当前排名前十的热门话题，你可以使用以下请求：\n\n`http://api.twitter.com/1/trends.json`\n\
  \n查看返回结果最快的方法是再次使用 `curl`：\n\n```\n$ curl http://api.twitter.com/1/trends.json\n\
  {\"trends\":[\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=%23thatminiheartattackwhen\"\
  ,\"name\":\"#thatminiheartattackwhen\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\\
  /search?q=%23urnotmytypeif\",\"name\":\"#urnotmytypeif\"},\n{\"url\":\"http:\\/\\\
  /search.twitter.com\\/search?q=%23starship\",\"name\":\"#starship\"},\n{\"url\"\
  :\"http:\\/\\/search.twitter.com\\/search?q=Seth+Meyers\",\"name\":\"Seth Meyers\"\
  },\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Jos%C3%A9+Aldo\",\"name\"\
  :\"Jos\\u00e9Aldo\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Catcher+Freeman\"\
  ,\"name\":\"CatcherFreeman\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Green+Men\"\
  ,\"name\":\"Green Men\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Steven+Seagal\"\
  ,\"name\":\"StevenSeagal\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Glenn+Healy\"\
  ,\"name\":\"Glenn Healy\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Karate+Kid\"\
  ,\"name\":\"Karate Kid\"}],\"as_of\":\"Sun, 01 May 2011 03:35:42 +0000\"}\n```\n\
  \n这返回一个包含趋势数组和快照获取时间的字典，时间字段为 `as_of`。趋势数组中的每个趋势包含以下内容：\n\n*   `name`：该趋势的话题标签。\n\
  *   `url`：指向该话题的 Twitter 搜索结果页面的 URL。\n\n同样的信息也可以通过以下请求获取：\n\n```\n$ curl http://api.twitter.com/1/trends/current.json?exclude=#unicorns\n\
  ```\n\n请注意，`trends/current` API 允许从结果中排除 Twitter 话题标签。同时请注意，返回结果中每个独立趋势不再包含 Twitter\
  \ 搜索 URL：\n\n```\n{\"trends\":{\"2011-05-01 03:32:19\":[\n{\"promoted_content\"\
  :null,\"events\":null,\"query\":\"#thatminiheartattackwhen\",\"name\":\"#thatminiheartattackwhen\"\
  },\n{\"promoted_content\":null,\"events\":null,\"query\":\"#urnotmytypeif\",\"name\"\
  :\"#urnotmytypeif\"},\n{\"promoted_content\":null,\"events\":null,\"query\":\"#starship\"\
  ,\"name\":\"#starship\"},\n{\"promoted_content\":null,\"events\":null,\"query\"\
  :\"Seth Meyers\",\"name\":\"Seth Meyers\"},\n{\"promoted_content\":null,\"events\"\
  :null,\"query\":\"Jos\\u00e9 Aldo\",\"name\":\"Jos\\u00e9Aldo\"},\n{\"promoted_content\"\
  :null,\"events\":null,\"query\":\"Catcher Freeman\",\"name\":\"CatcherFreeman\"\
  },\n{\"promoted_content\":null,\"events\":null,\"query\":\"Green Men\",\"name\"\
  :\"Green Men\"},\n{\"promoted_content\":null,\"events\":null,\"query\":\"StevenSeagal\"\
  ,\"name\":\"Steven Seagal\"},\n{\"promoted_content\":null,\"events\":null,\"query\"\
  :\"Glenn Healy\",\"name\":\"GlennHealy\"},\n{\"promoted_content\":null,\"events\"\
  :null,\"query\":\"Karate Kid\",\"name\":\"Karate Kid\"}]},\"as_of\":1304220739}\n\
  ```\n\n### 热门话题\n\nTwitter 还提供指定日期内每小时的 20 个热门话题：\n\n```\n$ curl http://api.twitter.com/1/trends/daily.json?date=2011-04-29&exclude=#unicorns\n\
  ```\n\n响应中包含一个 `trends` 字典，其中每个趋势又是一个字典，其键是当天的小时数，值是该小时对应的趋势数组：\n\n```\n{\"trends\"\
  :{\n\"2011-04-29 07:00\":[<趋势数组>],\n\"2011-04-29 20:00\":[<趋势数组>]},\n\"as_of\":1304223220}\n\
  ```\n\n请注意，Twitter 仅提供最近 7 到 10 天的历史数据。如果请求中的 `date` 参数设定的日期没有可用数据，Twitter 会返回以下内容：\n\
  \n```\n{\"errors\":[{\"code\":35,\"message\":\"Trend data not available\"}]}\n```\n\
  \n类似地，Twitter 还提供指定周内每天的前 30 个热门话题，历史数据可回溯三到四周：\n\n```\n$ curl curl http://api.twitter.com/1/trends/weekly.json?date=2011-04-21&exclude=#unicorns\n\
  ```\n\n响应中包含一个 `trends` 字典，其中每个趋势又是一个字典，其键是特定的周，值是该周的趋势数组：\n\n```\n{\"trends\":{\n\
  \"2011-04-16\":[<趋势数组>],\n\"2011-04-17\":[<趋势数组>]},\n\"as_of\":1304223220}\n```\n\
  \n对于每日和每周趋势，如果指定的是未来的日期，Twitter 将返回当前日期的趋势。\n\n\n\n### 地理位置标识符 (WOEID)\n\n如前所述，Twitter\
  \ 趋势也可以基于地理区域获取。但 Twitter 趋势 API 并不使用经纬度来定位，而是采用由雅虎维护的“地理位置标识符”（`WOEID`）。`WOEID`\
  \ 是地球上任何已命名地点的唯一标识符。你可以在以下网址找到更多相关信息：\n\n*   [`developer.yahoo.com/geo/geoplanet/`](http://developer.yahoo.com/geo/geoplanet/)\n\
  *   [`developer.yahoo.com/geo/geoplanet/guide/concepts.html`](http://developer.yahoo.com/geo/geoplanet/guide/concepts.html)\n\
  \nTwitter 可以返回其拥有热门话题信息的 WOEID：\n\n```\n$ curl http://api.twitter.com/1/trends/available.json\n\
  ```\n\n此请求可以携带可选的 `lat` 和 `long` 参数，以缩小返回的结果集。请求会返回一个地点数组，每个地点由一个包含多个键值对的字典表示。其中一个键就是\
  \ `WOEID`：\n\n```\n[{\"countryCode\":\"TR\",\"country\":\"Turkey\",\"url\":\"http:\\\
  /\\/where.yahooapis.com\\/v1\\/place\\/23424969\",\"parentid\":1,\"name\":\"Turkey\"\
  ,\"woeid\":23424969,\"placeType\":{\"code\":12,\"name\":\"Country\"}},...]\n```\n\
  \n通过发出以下格式的请求，你可以获取指定 `WOEID` 对应地理区域内的当前热门话题前十名（前提是该区域存在热门话题信息）：\n\n```\nhttp://api.twitter.com/1/trends/WOEID.json\n\
  ```\n\n因此，要获取 `WOEID` 为 `1` 的热门话题前十名，请求如下所示：\n\n```\n$ curl http://api.twitter.com/1/trends/1.json\n\
  ```\n\n与其他趋势请求一样，此请求返回一个包含趋势数组的字典：\n\n```\n[{\"as_of\":\"2011-05-01T03:39:32Z\"\
  ,\"trends\":[\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=%23thatminiheartattackwhen\"\
  ,\"query\":\"%23thatminiheartattackwhen\",\"events\":null,\"promoted_content\":null,\"\
  name\":\"#thatminiheartattackwhen\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\\
  /search?q=%23urnotmytypeif\",\"query\":\"%23urnotmytypeif\",\"events\":null,\"promoted_content\"\
  :null,\"name\":\"#urnotmytypeif\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\\
  /search?q=%23starship\",\"query\":\"%23starship\",\"events\":null,\"promoted_content\"\
  :null,\"name\":\"#starship\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Seth+Meyers\"\
  ,\"query\":\"Seth+Meyers\",\"events\":null,\"promoted_content\":null,\"name\":\"\
  Seth Meyers\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Jos%C3%A9+Aldo\"\
  ,\"query\":\"Jos%C3%A9+Aldo\",\"events\":null,\"promoted_content\":null,\"name\"\
  :\"Jos\\u00e9 Aldo\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Catcher+Freeman\"\
  ,\"query\":\"Catcher+Freeman\",\"events\":null,\"promoted_content\":null,\"name\"\
  :\"Catcher Freeman\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Green+Men\"\
  ,\"query\":\"Green+Men\",\"events\":null,\"promoted_content\":null,\"name\":\"Green\
  \ Men\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Steven+Seagal\",\"\
  query\":\"Steven+Seagal\",\"events\":null,\"promoted_content\":null,\"name\":\"\
  Steven Seagal\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Glenn+Healy\"\
  ,\"query\":\"Glenn+Healy\",\"events\":null,\"promoted_content\":null,\"name\":\"\
  Glenn Healy\"},\n{\"url\":\"http:\\/\\/search.twitter.com\\/search?q=Karate+Kid\"\
  ,\"query\":\"Karate+Kid\",\"events\":null,\"promoted_content\":null,\"name\":\"\
  Karate Kid\"}],\n\"created_at\":\"2011-05-01T03:28:09Z\",\"locations\":[{\"name\"\
  :\"Worldwide\",\"woeid\":1}]}]\n```\n\n还有一些其他服务也提供 Twitter 趋势信息。其中一个是 `letsbetrends.com`，它有自己独立的\
  \ API。有关该服务的更多信息，请访问：\n\n```\nhttp://letsbetrends.com/\n```\n\n此外，如果你的应用需要显示关于话题标签的提示或信息，可以使用像\
  \ tagalus ([`tagal.us/`](http://tagal.us/)) 这样的服务。这里有一篇关于理解 Twitter 话题标签的好文章：\n\n\
  ```\nhttp://blog.programmableweb.com/2009/03/20/make-sense-of-confusing-twitter-hash-tags/\n\
  ```\n\n### 再谈离线存储：SQLite\n\n第 8 章 的部分内容探讨了使用 iOS 的 Core Data 离线存储推文的话题。值得一提的是，在底层，Core\
  \ Data 会将其数据模型的数据保存到 SQLite 数据库中。`SQLite` 是一个“跨平台的 C 语言库，它实现了一个自包含、可嵌入、零配置的 SQL\
  \ 数据库引擎。” 你可以在 [www.sqlite.org/](http://www.sqlite.org/) 上了解更多关于这个数据库的信息。\n\nCore\
  \ Data 会在应用的 `Documents` 目录中创建 SQLite 数据库文件。使用模拟器时，`Documents` 目录可通过以下路径访问，其中“4.3”会根据应用目标\
  \ iOS 版本的不同而变化，`<app id>` 是 iOS 为每个应用创建的唯一应用标识符，因应用而异：\n\n```\nLibrary/Application\
  \ Support/iPhone Simulator/4.3/Applications/<app id>/Documents\n```\n\n![images](img/1010.jpg)\n\
  \n**图 10–10.** *iOS 模拟器应用的 Mac OS X 文件系统路径*\n\n要确定哪个目录属于某个特定应用，请检查每个 `<app id>`\
  \ 目录的内容，并找到包含该应用 `.app` 文件的目录。以第 8 章中的离线应用为例，其文件是 `OfflineTwitter.app`。在该应用的 `Documents`\
  \ 目录中，有一个名为 `CoreDataOffline.sqlite` 的 SQLite 数据库文件。该文件名与代表 Core Data 模型的 `xcdatamodeld`\
  \ 文件名 `CoreDataOffline` 相匹配。\n\n查看 SQLite 数据库的内容需要数据库软件。Mac OS X 上可用的较好数据库软件之一是\
  \ MesaSQLite ([www.desertsandsoftware.com/?realmesa_home](http://www.desertsandsoftware.com/?realmesa_home))。MesaSQLite\
  \ 是免费的，在 iOS 应用中处理数据库时非常有用。安装 MesaSQLite 或其他数据库应用程序后，打开前面提到的 `CoreDataOffline.sqlite`\
  \ 文件，然后查看 `ZTWEET` 表的内容。（在 MesaSQLite 中，从“表名”下拉列表中选择 `ZTWEET` 表，然后点击“显示全部”以查询数据库中的所有推文。）`ZTWEET`\
  \ 表是 Core Data 存储应用创建并保存的 `Tweet` 对象的地方。请注意，其中有 `ZID` 和 `ZTEXT` 列，分别对应数据模型中每个 `Tweet`\
  \ 对象的 `id` 和 `text` 属性。\n\n![images](img/1011.jpg)\n\n**图 10–11.** *Core Data SQLite\
  \ 数据库*\n\n使用 SQLite 可能有点棘手，因此亲自动手实践一下是值得的。因此，本节剩余部分将展示如何直接使用 SQLite 而不是 Core Data\
  \ 来重新实现第 8 章中的 `OfflineTwitter` 应用。以下所有代码都位于 `Github` 仓库的 `Chapter10/OfflineTwitter`\
  \ 目录中。\n\n\n\n#### 在不用 Core Data 的情况下重写 OfflineTwitter\n\n由于 OfflineTwitter 应用的原始架构将所有数据访问代码都保留在\
  \ `TwitterDataStore` 类中，因此几乎所有的用户界面视图和控制器都可以保持不变。唯一需要做的是创建一个直接使用 SQLite 来存储、检索和删除推文（Tweet）而非\
  \ Core Data 的 `TwitterDataStore` 版本。\n\n首先，对 `Tweet` 类稍作调整，使其不再是托管对象：\n\n```\n@interface\
  \ Tweet : NSObject {\n}\n\n@property (nonatomic, retain) NSNumber * id;\n@property\
  \ (nonatomic, retain) NSString * text;\n\n@end\n```\n\n接下来，`TwitterDataStore` 被简化，现在它成为一个基类，任何类型的\
  \ `TwitterDataStore` 都可以从中派生：\n\n```\n@interface TwitterDataStore : NSObject {\n\
  }\n\n- (NSURL *)applicationDocumentsDirectory;\n- (NSArray*)tweets;\n- (void)deleteTweets;\n\
  - (void)synchronizeTweets:(NSArray*)tweets;\n\n@end\n```\n\n现在，创建了一个名为 `TwitterDataStore_SQLite`\
  \ 的类，用于实际承担使用 SQLite 存储、检索和删除推文的重任。该类定义位于 `TwitterDataStore_SQLite.h` 中：\n\n```\n\
  #import \"TwitterDataStore.h\"\n\n@class sqlite3;\n@interface TwitterDataStore_SQLite\
  \ : TwitterDataStore {\n    sqlite3             *database;\n}\n\n@end\n```\n\n接下来，我们在\
  \ Xcode 中查看 `TwitterDataStore_SQLite.m`。请注意，为该类声明了两个额外的辅助方法：\n\n- `openDatabase`\n\
  - `closeDatabase`\n\n在该类的初始化方法中，导入了 `sqlite3.h`，以便 `TwitterDataStore_SQLite` 可以使用\
  \ SQLite。值得查阅这个头文件，以深入了解 SQLite 为 iOS 应用提供了哪些功能，因为这里的讨论只触及了表面。在代码中，调用 `openDatabase`\
  \ 来创建数据库（如果尚不存在）并在数据库中设置表。在 `dealloc` 方法中，当类被销毁时关闭数据库：\n\n```\n#import \"TwitterDataStore_SQLite.h\"\
  \n#import \"sqlite3.h\"\n#import \"Tweet.h\"\n\n@interface TwitterDataStore_SQLite\
  \ ()\n- (void)openDatabase;\n- (void)closeDatabase;\n@end\n\n@implementation TwitterDataStore_SQLite\n\
  \n- (id)init\n{\n    if ((self = [super init])) {\n        [self openDatabase];\n\
  \    }\n    return self;\n}\n\n- (void)dealloc\n{\n    [self closeDatabase];\n \
  \   [super dealloc];\n}\n```\n\n`openDatabase` 方法负责创建数据库并为其填充一个用于存储推文的表。如果数据库对象已经打开，该方法不做任何操作。这是通过检查指向\
  \ `sqlite3` 数据库对象的指针是否为 `NULL` 来实现的。通过 SQLite 打开数据库是通过 `sqlite3_open` 方法完成的。该方法需要一个\
  \ SQLite 数据库文件的路径，如果文件不存在则创建它，如果已存在则打开它。它还需要一个指向 `sqlite3` 数据库对象指针的指针。\n\n如果数据库成功打开，则通过\
  \ `sqlite3_exec` 方法创建数据库的 `Tweets` 表，该方法在数据库上执行 SQL 查询。如果表尚不存在，该查询会创建一个表，包含推文 ID\
  \ 和推文实际消息内容的列：\n\n```\nNSString *createTables =\n    @\"CREATE TABLE IF NOT EXISTS\
  \ tweets (id INTEGER\n                                         PRIMARY KEY,\n  \
  \                                       message TEXT);\";\n```\n\n接下来，再次使用 `sqlite3_exec`，为这个表在推文\
  \ ID 上创建一个索引，以加速从数据库中查询推文：\n\n```\nNSString *createIndex =\n    @\"CREATE INDEX\
  \ IF NOT EXISTS tweetIndex ON tweets(id);\";\n```\n\n```\n- (void)openDatabase\n\
  {\n    if (nil == database) {\n        NSURL *path =\n               [[self applicationDocumentsDirectory]\n\
  \               URLByAppendingPathComponent:@\"twitter.sqlite\"];\n\n        if\
  \ (SQLITE_OK !=\n            sqlite3_open([[path relativePath] UTF8String], &database))\
  \ {\n            [self closeDatabase];\n        } else {\n            char *errmsg;\n\
  \n            NSString *createTables =\n            @\"CREATE TABLE IF NOT EXISTS\
  \ tweets (id INTEGER PRIMARY KEY,\n                                            \
  \     message TEXT);\";\n            if (SQLITE_OK !=\n                sqlite3_exec(database,\n\
  \                [createTables UTF8String],\n                NULL,\n           \
  \     NULL,\n                &errmsg)) {\n                NSLog(@\"create table\
  \ error: '%s'\", errmsg);\n            }\n\n            NSString *createIndex =\n\
  \                @\"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);\";\n  \
  \          if (SQLITE_OK !=\n                sqlite3_exec(database,\n          \
  \                   [createIndex UTF8String],\n                             NULL,\n\
  \                             NULL,\n                             &errmsg)) {\n\
  \                NSLog(@\"create table index error: '%s'\", errmsg);\n         \
  \   }\n        }\n    }\n}\n```\n\n`closeDatabase` 是一个非常直接的方法。它对该类拥有的 `sqlite3`\
  \ 数据库对象调用 `sqlite3_close`。这会关闭数据库，然后将指向数据库的指针设置为 `NULL`，这样如果随后再次调用 `openDatabase`\
  \ 方法，它将重新打开数据库：\n\n```\n- (void)closeDatabase\n{\n    sqlite3_close(database);\n\
  \    database = nil;\n}\n```\n\n由于本示例项目的目标是将推文离线存储在 SQLite 数据库中，因此首要任务是同步从 Twitter\
  \ 检索到的推文并将其存储在数据库中（参见[图 10–12]（#Chapter10.html#fig_10_12））。与 Core Data 示例一样，这发生在\
  \ `TwitterDataStore` 的 `synchronizeTweets:` 方法中，该方法首先删除数据库中的任何现有推文，然后存储新的推文。\n\n\
  回想一下，推文是以 `NSDictionary` 对象的数组形式传入的，其中数组中的每个 `NSDictionary` 代表一条推文。让我们仔细看看处理推文的\
  \ `for-loop`。第一步是初始化一个 SQL 事务：\n\n```\nsqlite3_exec(database, \"BEGIN;\", NULL,\
  \ NULL, NULL);\n```\n\n存储一条推文的实际 SQL 语句如下：\n\n```\nchar *text = \"INSERT INTO tweets\
  \ (id, message) VALUES (?, ?);\";\n```\n\n请注意语句中 `?` 符号的存在。这表示在通过 `sqlite3_prepare_v2`\
  \ 准备语句后，这些值将被绑定到语句中。请注意，推文 ID 存储为 64 位 `integer`，并通过 `sqlite3_bind_int64` 绑定。推文的内容存储为\
  \ `text`，并通过 `sqlite3_bind_text` 绑定。然后通过 `sqlite3_step` 执行事务。事务可能因某些原因失败，因此会采取措施在失败时回滚事务。这样可以在发生失败时保留数据库的状态。以下是实现此操作的代码：\n\
  \n```\n- (void)synchronizeTweets:(NSArray*)tweets\n{\n    NSAutoreleasePool *autoReleasePool\
  \ =\n        [[NSAutoreleasePool alloc] init];\n\n    @synchronized(self) {\n\n\
  \        [self deleteTweets];\n\n        char *text = \"INSERT INTO tweets (id,\
  \ message) VALUES (?, ?);\";\n\n        for (NSDictionary *tweetDictionary in tweets)\
  \ {\n\n            sqlite3_exec(database, \"BEGIN;\", NULL, NULL, NULL);\n\n   \
  \         sqlite3_stmt *stmt = NULL;\n            if (SQLITE_OK !=\n           \
  \     sqlite3_prepare_v2(database, text, -1, &stmt, NULL)) {\nNSLog(@\"error: '%s'\"\
  , sqlite3_errmsg(database));\nsqlite3_exec(database, \"ROLLBACK;\", NULL, NULL,\
  \ NULL);\n            }\n\n            NSNumberFormatter * f = [[NSNumberFormatter\
  \ alloc] init];\n            NSNumber * tweetId =\n              [f numberFromString:[tweetDictionary\
  \ objectForKey:@\"id\"]];\n            sqlite3_bind_int64(stmt, 1, [tweetId longLongValue]);\n\
  \            [f release];\n```\n\n\n\n# Objective-C 代码示例\n\n```\nNSString *message\
  \ = [tweetDictionary objectForKey:@\"text\"];\nsqlite3_bind_text(stmt,\n       \
  \           2,\n                  [message UTF8String],\n                  -1,\n\
  \                  SQLITE_TRANSIENT);\n\nBOOL result = sqlite3_step(stmt) != SQLITE_ERROR;\n\
  sqlite3_finalize(stmt);\n\nsqlite3_exec(database, result ? \"END;\" : \"ROLLBACK;\"\
  ,\n                 NULL, NULL, NULL);\n    }\n}\n\n//发布一条通知，表明推文已可用……让响应者在主线程上自行更新\n\
  [[NSNotificationCenter defaultCenter]\n    postNotificationName:@\"tweetsDidSynchronize\"\
  \n              object:self\nuserInfo:nil];\n\n[autoReleasePool release];\n}\n```\n\
  \n![images](img/1012.jpg)\n\n**图 10–12.** 推文的 SQLite 数据库\n\n现在推文已存入数据库，应用程序需要一种检索它们的方法。这通过`TwitterDataStore`的`tweets`方法实现。该方法使用标准的\
  \ SQL `SELECT`语句从数据库中获取所有推文：\n\n```\nNSString *tweetsStatement = @\"SELECT id, message\
  \ FROM tweets\";\n```\n\n如果语句准备成功，则会遍历结果集，为结果集中的每一行创建并初始化一个新的`Tweet`对象。然后，该`Tweet`会被添加到一个由该方法返回的`Tweet`数组中：\n\
  \n```\n- (NSArray*)tweets\n{\n    NSMutableArray *tweets = [NSMutableArray array];\n\
  \n    @synchronized(self) {\n\n        sqlite3_stmt *queryStatement = nil;\n   \
  \     NSString *tweetsStatement = @\"SELECT id, message FROM tweets\";\n       \
  \ if (SQLITE_OK != sqlite3_prepare_v2(database,\n                [tweetsStatement\
  \ UTF8String],-1,&queryStatement, NULL)) {\n            NSLog(@\"error: '%s'\",\
  \ sqlite3_errmsg(database));\n            return nil;\n        }\n\n        while(sqlite3_step(queryStatement)\
  \ == SQLITE_ROW) {\n\n            Tweet *tweet = [[[Tweet alloc] init] autorelease];\n\
  \            [tweet setId:[NSNumber numberWithLongLong:\n                      \
  \    sqlite3_column_int64(queryStatement, 0)]];\n            [tweet setText:[NSString\
  \ stringWithUTF8String:\n                   (const char*)sqlite3_column_text(queryStatement,\
  \ 1)]];\n            [tweets addObject:tweet];\n        }\n        sqlite3_finalize(queryStatement);\n\
  \    }\n\n    return tweets;\n}\n```\n\n完成`TwitterDataStore`的 SQLite 实现所需实现的最后一个方法是`deleteTweets`。该方法只是在数据库上执行一个\
  \ SQL `DELETE`语句来删除所有推文：\n\n```\nNSString *deleteTweetsStatement = @\"DELETE FROM\
  \ tweets\";\n\n- (void)deleteTweets\n{\n    @synchronized(self) {\n        char\
  \            *errmsg;\n\n        NSString *deleteStmnt = @\"DELETE FROM tweets\"\
  ;\n        if (SQLITE_OK !=\n            sqlite3_exec(database, [deleteStmnt UTF8String],\
  \ NULL,\n            NULL, &errmsg)) {\n            NSLog(@\"error: '%s'\", sqlite3_errmsg(database));\n\
  \        }\n    }\n}\n```\n\n上述代码使用了 SQLite，因此除非调整应用程序的`Xcode`项目以链接`libsqlite3.0.dylib`而非`CoreData.framework`（参见图\
  \ 10–13），否则它将无法链接。\n\n![images](img/1013.jpg)\n\n**图 10–13.** 调整 Xcode 项目，使其链接到`libsqlite3.0.dylib`而非`CoreData.framework`\n\
  \n## 测试还是不测试，这是个问题\n\n由于数据模型或层的代码不需要用户界面，这为讨论 iOS 和移动开发中一个经常被忽视的话题——单元测试——提供了独特的机会。不幸的是，许多项目完全避免编写单元测试，或者只在项目末尾尝试添加一些测试。部分原因是由于为项目设置测试环境通常很困难，还有部分原因可能是开发者的懒惰。然而，如果及早并频繁地进行，单元测试实际上会让开发者比不写测试更懒，因为它减少了手动测试的需求。此外，借助\
  \ Xcode 4，Apple 使得为 iOS 项目启动和运行单元测试比以往任何时候都更容易。\n\n接下来是一个逐步教程，为这个项目的 OfflineTwitter\
  \ Xcode 添加一个单元测试。该单元测试验证了数据库中同步推文的代码。当然，最好在编写代码的同时编写测试，但本教程的主要目的是展示向 iOS Facebook\
  \ 或 Twitter 应用程序添加单元测试是多么容易。\n\n\n\n# 为社交 iOS 应用添加单元测试\n\nApple 已将单元测试配置为在 Xcode\
  \ 项目内作为独立目标进行构建和运行。虽然起初可能显得有些繁琐，但其优点在于能很好地将测试代码排除在主应用程序目标之外。这意味着测试文件不会被构建到最终的应用二进制文件中，同时也有助于调试和搭建自动化测试环境。\n\
  \n要在 Xcode 4 中为项目添加一个新目标，请从 `File` 菜单选择 `New` -> `New Target...`（参见图 10–14）。\n\n\
  ![images](img/1014.jpg)\n\n**图 10–14.** *添加新目标*\n\n在目标模板弹出窗口中，进入 iOS 部分，选择 `Other`，然后选择\
  \ `Cocoa Touch Unit Testing Bundle`（参见图 10–15）。\n\n![images](img/1015.jpg)\n\n**图\
  \ 10–15.** *选择 Cocoa Touch Unit Testing Bundle。*\n\n接着，为新目标命名（参见图 10–16）。\n\n![images](img/1016.jpg)\n\
  \n**图 10–16.** *重命名目标。*\n\n现在通过 Xcode 中的目标下拉菜单切换到新目标，从 `Product` 菜单中选择 `Test` 来创建构建，然后运行测试目标（参见图\
  \ 10–17）。\n\n![images](img/1017.jpg)\n\n**图 10–17.** *构建并运行测试目标。*\n\nXcode 创建的默认测试代码在开箱状态下会故意导致失败，这展示了\
  \ Xcode 如何高亮显示测试用例失败的情况（参见图 10–18）。\n\n![images](img/1018.jpg)\n\n**图 10–18.** *失败！*\n\
  \n需要为 `TwitterDataStore_SQLite` 类编写测试；因此，需要将 `TwitterDataStore_SQLite`、`TwitterDataStore`\
  \ 和 `Tweet` 类添加到 `OfflineTwitterTest` 目标中，以便在添加实际测试代码时，`OfflineTwitterTest` 目标能够成功链接（参见图\
  \ 10–19 至 10–21）。\n\n![images](img/1019.jpg)\n\n**图 10–19.** *将 `Tweet.m` 添加到 `OfflineTwitterTest`\
  \ 目标*\n\n![images](img/1020.jpg)\n\n**图 10–20.** *将 `TwitterDataStore.m` 添加到 `OfflineTwitterTest`\
  \ 目标*\n\n![images](img/1021.jpg)\n\n**图 10–21.** *将 `TwitterDataStore_SQLite` 添加到\
  \ `OfflineTwitterTest` 目标*\n\n所有设置现已完成，接下来可以编写一个简单的测试来验证一切是否正常运作。测试类将测试 `TwitterDataStore_SQLite`\
  \ 类中的功能，因此它需要持有一个 `TwitterDataStore_SQLite` 对象。打开示例项目中的 `OfflineTwitterTest.h` 文件，注意其中对\
  \ `TwitterDataStore_SQLite` 对象的声明：\n\n```\n#import <SenTestingKit/SenTestingKit.h>\n\
  \n@class TwitterDataStore_SQLite;\n@interface OfflineTwitterTest : SenTestCase {\n\
  @private\n    TwitterDataStore_SQLite *twitterDataStore;\n}\n\n@end\n```\n\n在大多数单元测试框架中，测试类可以在测试运行前进行一些设置，并在测试完成后进行一些清理工作。iOS\
  \ 项目的单元测试也不例外。测试运行前，会调用测试类的 `setUp` 方法；测试执行后，会调用 `tearDown` 方法。打开示例项目中的 `OfflineTwitterTest.m`\
  \ 文件，查看这些方法的实现。由于这是一个基本示例，`setUp` 实例化了 `TwitterDataStore_SQLite` 对象，而 `tearDown`\
  \ 释放了该对象，以避免测试产生内存泄漏（否则可能引发其他副作用）。根据应用中代码的性质，这些方法可能需要更多代码。通常，这些方法应保留给类中每个测试都需要的代码：\n\
  \n```\n- (void)setUp\n{\n    [super setUp];\n\n    // 设置代码写在这里。\n    twitterDataStore\
  \ = [[TwitterDataStore_SQLite alloc] init];\n}\n\n- (void)tearDown\n{\n    // 清理代码写在这里。\n\
  \    [twitterDataStore release];\n\n    [super tearDown];\n}\n```\n\n以下是针对 `TwitterDataStore_SQLite`\
  \ 类功能的实际测试。虽然可能会想为类的每个方法编写单元测试，但更好的方法是考虑该类作为一个整体应完成什么任务，并编写测试来验证其功能。这也引出了测试命名的问题。最好给测试起有用且描述性的名称，这样项目中的其他开发者仅凭名称就能立即知道该测试试图验证什么。为此，下面的测试被命名为\
  \ `testItShouldSynchronizeTweets`，以反映 `TwitterDataStore_SQLite` 的主要职责之一是存储和同步推文。\n\
  \n该测试首先从 `TwitterDataStore_SQLite` 中删除所有推文，以便从一个干净的状态开始。这种方法并非在所有情况下都必要或可取，应根据具体类或应用进行调整。接着，创建一个\
  \ `NSDictionary` 来表示一条模拟推文。由于 `TwitterDataStore_SQLite` 的 `synchronizeTweets:` 方法只接受一个\
  \ `NSArray` 参数，因此将表示推文的 `NSDictionary` 添加到一个 `NSArray` 对象中，再将其传递给 `synchronizeTweets:`。然后使用\
  \ `TwitterDataStore_SQLite` 的 `tweets` 方法获取存储的推文，并进行简单比较以确认数据存储中有一条推文。根据测试或应用的不同，可以添加额外的验证，例如检查检索到的推文内容是否与字典中的内容匹配：\n\
  \n```\n- (void)testItShouldSynchronizeTweets\n{\n    [twitterDataStore deleteTweets];\n\
  \n    NSDictionary *tweetDictionary = [NSDictionary\n    dictionaryWithObjects:[NSArray\
  \ arrayWithObjects:@\"1\", @\"Tweet!\", nil]\n    forKeys:[NSArray arrayWithObjects:@\"\
  id\", @\"text\", nil]];\n\n    NSArray *newTweets = [NSArray arrayWithObject:tweetDictionary];\n\
  \    [twitterDataStore synchronizeTweets:newTweets];\n\n    NSArray *tweets = [twitterDataStore\
  \ tweets];\n    STAssertTrue((1 == [tweets count]), @\"Test error message\");\n\
  }\n\n@end\n```\n\n这类测试的一大优点是，它们使得在特定场景下调试代码变得非常容易，而无需运行实际应用并在用户界面中执行多个步骤。这种方法还能使测试可重复，这在需要重构或优化代码时非常有利。当然，它还能确保在对代码进行调整或进行重大修改时，不会引入*回归*（即之前按预期工作的代码中出现的新错误）。\n\
  \n应用需要的测试不止一个。当需要额外测试时，可以将其添加到现有测试类中，或者向测试目标添加新的测试类。不要忘记同时将主应用目标中的相关文件添加到测试目标中，具体取决于正在测试的功能。\n\
  \n有关此主题的更多信息，请参考 Apple 文档中的测试部分，网址为：\n\n`http://developer.apple.com/library/ios/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/Building/Building.html`\n\
  \n测试通过 `SenTestingKit` 框架构建。该框架提供了多个用于验证测试的宏，这些宏以 `ST` 为前缀。前面的示例代码使用了宏 `STAssertTrue`，但其他可用的宏可以在\
  \ `SenTestCase_Macros.h` 中找到。\n\n设置测试目标是为项目配置测试的重要部分。如前所述，本概述涵盖了在 Xcode 4 中进行的单元测试。如果项目使用\
  \ Xcode 3 构建，则需要采用不同的配置。\n\n\n\n虽然 Xcode 3 中已经提供了 `SenTestingKit` 框架，但苹果自带的测试设置方案并不理想。不过，谷歌的一些工程师非常友好地对苹果的方案进行了扩展，并面向大众发布了一个更新版的\
  \ iOS 单元测试库。在 Xcode 3 中进行配置需要执行几个手动步骤，但非常值得一试。该代码是谷歌 `google-toolbox-for-mac` 项目的一部分，可在此处找到：\n\
  \n`https://code.google.com/p/google-toolbox-for-mac/wiki/iPhoneUnitTesting`\n\n\
  对于 Xcode 3 而言，另一个值得考虑的替代方案是 `GHUnit`，下载地址如下：\n\n`https://github.com/gabriel/gh-unit`\n\
  \n编写单元测试的另一个有趣方面涉及模拟对象（Mocking Objects）。学习为测试模拟对象可以将测试代码提升到一个新的水平。在 iOS 项目的 Objective-C\
  \ 单元测试中，模拟对象的主要工具是 `OCMock`。请注意，使用 `OCMock` 并不需要在 iOS 项目中新建测试目标，而是提供了一些类和功能，供你在现有测试类、方法或新测试中使用。请通过以下链接了解\
  \ `OCMock` 的简介及设置说明：\n\n`www.mulle-kybernetik.com/software/OCMock/`\n\n### 结论\n\n\
  在开发 iOS 项目时，有许多出色的工具可以让工作变得轻松。这些工具从免费的在线服务到开源工具和软件，应有尽有。本章只是浅尝辄止地介绍了一部分可用工具；不过，它涵盖了一些对于编写优秀\
  \ iOS 应用（包括针对 Facebook 和 Twitter 的应用）不可或缺的工具。关于数据建模、测试以及缩短 URL 等方面，网上以及书籍刊物中都有大量的资料；但由于移动开发的特性以及\
  \ iOS 平台的限制，撰写 iOS 应用程序时，本章所介绍的工具和软件是非常适用的。\n\n## 第 11 章\n\n## 你可以构建（以及不能构建）的应用\n\
  \n遗憾的是，在撰写本书的早期我们就意识到，需要有一章来专门讲解使用 Facebook 和 Twitter API 时必须遵守的所有规则。早在 2009 年，当这些应用爆红时，社交\
  \ API 的使用几乎毫无限制。平台开发方——包括 Facebook 和 Twitter——当时也不确定智能手机将如何改变人们使用其工具的方式。\n\n随着时间的推移，Facebook\
  \ 和 Twitter 已经开始限制其 API 的使用方式。\n\n平心而论，Facebook 的平台政策是合理的，并为开发者提供了很大的自由度。相比之下，Twitter\
  \ 则常被指责（说得委婉些）在用户如何调用其代码方面显得“更具操控性”。\n\n作为作者，我们当然希望完全自由地使用这些 API，但也必须承认，像 Twitter\
  \ 这样的品牌需要维护其声誉，并且（像任何公司一样）非常担心有人对其抹黑，或让用户混淆 Twitter 的用途。\n\n请把本节内容当作你应用创意的筛选器。如果你已经有一个正在添加\
  \ Twitter 或 Facebook 功能的应用，那么你仍然需要快速浏览本章，以确保应用的任何视觉或交互元素不会引起 Twitter 和 Facebook\
  \ 平台的负面关注。\n\n毕竟，唯一比遵守规则更糟糕的事情，就是回头重做以符合规则要求。\n\n### Twitter：禁止客户端应用\n\n2011 年 3\
  \ 月，Twitter 平台团队成员 Ryan Sarver（`@rsarver`）在开发者社区发布了一篇声明。在这篇文章中，Sarver 宣布了 Twitter\
  \ 的新规定，旨在规范开发者的开发内容和方式。你可以通过以下网址阅读他的文章：\n\n[`https://groups.google.com/forum/#!topic/twitter-development-talk/yCzVnHqHIWo/discussion`](https://groups.google.com/forum/#!topic/twitter-development-talk/yCzVnHqHIWo/discussion)\n\
  \n我们不再赘述全文，但会重点指出政策变化最显著的一些方面。这些也往往是平台新开发者不了解的领域。主要要点如下：\n\n*   自 Twitter 的开发者条款首次制定以来，它变得异常流行。\n\
  *   服务越是主流，其 UI 和 UX 就必须越一致；否则，Twitter 将遭受行业内所谓的*品牌稀释*。\n*   官方 Twitter 应用的 UI 和\
  \ UX 是最好的，其相比第三方 Twitter 应用的高人气也证明了这一点。\n*   因此，Twitter 正在逐步打击那些仅复制 Twitter 功能（而未增加其他价值）的\
  \ Twitter 客户端。它针对增值 Twitter 应用的建议包括：发布工具（如 `SocialFlow`）、策展工具（如 `Sulia`）以及数据产品（如\
  \ `Klout`）。其他机会还包括社交 CRM 客户端（如 `HootSuite`），以及类似 `Foursquare`、`Instagram` 和 `Quora`\
  \ 的独特服务。\n\n总结：你仍然可以使用 Twitter API 自由开发。但从现在开始，你的应用在使用该服务时必须更具创意。仅仅以不同的设计或交互方式复制\
  \ Twitter 应用，都会招致 Twitter 团队的邮件警告（甚至可能导致失去 Twitter API 的访问权限）。\n\n#### Twitter 服务条款详解\n\
  \nTwitter 发布上述声明的同时，也发布了修订后的服务条款，对声明中描述的变化进行了更具体的说明。我们再次不在此全文转载，但你需要特别关注某些方面。\n\n\
  **注意：** 最好的情况是，你开发的应用大受欢迎。如果你的应用需要的用户令牌超过 500 万个，则需要直接联系 Twitter 以获取 API 访问权限。\n\
  \n完整的 Twitter 服务条款可在此处找到：\n\n[`http://dev.twitter.com/pages/api_terms`](http://dev.twitter.com/pages/api_terms)\n\
  \n##### 基本规则\n\n我们将在后续章节中总结 Twitter 的“规则”。请注意，即使我们的摘要——比实际文档简洁得多——仍然长得令人厌烦。我们将最关键的点用粗体标出，以便你快速阅读。但也不要*太快*——如果投入时间和精力的项目不符合这些条款，那将非常可惜，因为你可能之后不得不放弃它。\n\
  \n###### 使用 API\n\n以下是关于使用 Twitter API 的一些关键规则：\n\n*   如果你想出售、出租、租赁、再许可、再分发或联合提供\
  \ Twitter API、Twitter 数据或 Twitter 内容，需要获得 Twitter 的书面许可。以下是关于这些许可的一些附加规则：\n    *\
  \   如果你提供返回 Twitter 数据的 API，将面临特殊限制：该 API 只能返回推文 ID 和用户 ID。\n    *   你可以通过“另存为”或类似功能，将非编程的、GUI\
  \ 驱动的 Twitter 内容导出或提取为 PDF 或电子表格。\n    *   不允许将 Twitter 内容作为服务或基于云的服务导出到数据存储中。\n\
  *   不允许更改 Twitter API 或内容上的任何专有通知或标记。\n*   **你不能使用 Twitter API 来监控 Twitter 的正常运行时间、性能或功能。**\n\
  *   **你不能以暗示与 Twitter 有任何关联的方式使用 Twitter 商标。**\n*   **你不能出售或访问 Twitter API 来聚合、缓存（作为推文的一部分除外）或存储推文中包含的地理位置信息。**\n\
  *   你不能对访问任何 Twitter 功能收取额外费用。\n\n\n\n# 你的应用能做什么\n\n根据推特的说法，你的服务“可能是一个提供类似推特终端用户体验主要组件的应用或客户端”；但如果你构建的是客户端应用，还需遵守额外条款：\n\
  \n- 你必须将推特 API 作为客户端中与推特功能高度相似功能的唯一来源。换句话说，你不能将其他类似的 API 混入推特 API 项目中，否则公司将给你发来一封警告邮件。\n\
  - 你不得向第三方支付费用以分发你的应用。\n- 你不能在你的应用中框架显示或复制推特服务的大部分内容；相反，你必须使用推特 API 来展示推特内容。\n- 不得存储私人数据或内容，也不得复制推特的数据库。\n\
  \n## 管理现有推特客户端的规则\n\n鉴于新的服务条款，非官方推特客户端仍能留在应用商店中似乎有些奇怪。当推特在 2011 年 3 月宣布“不再支持客户端”时，其平台开发者表示，一些现有的推特客户端应用将被允许继续运营。不过，推特的\
  \ Ryan Sarver 补充道^(1)：\n\n> “我们将以高标准要求你们，确保你们不侵犯用户隐私，提供一致的用户体验，并严格遵守我们服务条款的所有方面。”\n\
  \n## 推特对可用性的定义\n\n接下来的部分并非严格意义上的规则，而是描述了一系列指导方针。遵循这些方针，你就能避免招致推特平台团队的不满。他们规定你的应用如何运作，这听起来可能有些严苛，但这是为了用户的最大利益——如果你的应用在平台上做了其他推特应用没做过的事情，部分用户可能会感到困惑。基于此精神，推特要求你遵守以下准则：\n\
  \n- **不要给用户带来意外：** 不要滥用推特的功能或术语：\n    - 保持推文的完整性。尽管推文只有 140 个字符，但其中包含了大量信息。关于推特视觉设计指导，请参见第\
  \ 13 章。\n    - 不要编辑或修改通过 API 传递的用户生成内容。\n    - 始终显示推文的原创者或提供者。\n- **不要制造或传播垃圾信息：**\
  \ 在以下任何操作之前，需获得用户许可：\n    - 代表用户发送推文或其他消息。用户通过你的应用进行身份验证，并不构成你代表其发送消息的同意。\n    -\
  \ 代表用户修改其个人资料信息或执行账户操作（包括关注、取消关注和屏蔽）。\n    - 在用户的推文中添加话题标签、注释数据或其他内容。应向用户准确展示将要发布的内容。\n\
  - **不要为了抢占名称而制作占位应用。**\n- **尊重用户隐私：** 你需要使用适当的安全标准，例如 `OAuth`，如第 2 章所述。你还应做到以下几点：\n\
  \    - 尊重推特内容的隐私和分享设置。\n    - 当通过推特 API 报告更改时，及时调整你对推特内容的处理方式。\n    - 始终向用户展示你服务的隐私政策。你还应清楚说明你如何处理从用户那里收集的信息。\n\
  \    - 明确说明何时将位置信息添加到用户的推文中，无论是作为地理标签还是注释数据。\n    - 不要索取其他开发者的消费者密钥或消费者秘密（如果这些密钥将被存储在该开发者控制范围之外）。\n\
  \    - 不要促成或鼓励发布私人或机密信息。\n- **成为推特的良好合作伙伴：** 你需要遵守本章所述的所有规则，包括：\n    - 不得以可能误导、混淆或欺骗用户的方式使用商业名称和/或徽标。关于推特商标使用的更多信息，请参见本章后面的商标规则。\n\
  \    - 尽量避免在应用的来源或目的方面混淆或误导用户。\n    - 不要链接到恶意软件。\n    - 不要复制、框架显示或镜像推特网站或其设计。\n\
  \    - 不要滥用 API 在推特上冒充他人。\n\n__________\n\n¹ [`https://groups.google.com/forum/#!topic/twitter-developmenttalk/yCzVnHqHIWo/discussion`](https://groups.google.com/forum/#!topic/twitter-developmenttalk/yCzVnHqHIWo/discussion)\n\
  \n## 登录与身份\n\n推特还有一些关于登录和身份的指导方针：\n\n- 你必须向用户提供通过 `OAuth` 安全协议登录推特的选项，如本书第 2 章和第\
  \ 5 章所述。\n- 你应该为没有推特账户的最终用户提供创建新推特账户的机会。\n- 你展示“使用推特连接”选项时，其醒目程度至少应与 Facebook 连接按钮或任何其他社交网页登录选项相当。\n\
  - 一旦最终用户通过“使用推特连接”完成身份验证，你必须执行以下操作：清晰地显示他的推特头像、推特用户名以及推特小鸟图标。\n\n## 正确显示内容\n\n以下是关于正确显示推特内容的指导方针：\n\
  \n- 推文中引用内容的所有 URL，都应直接将用户引导至显示该内容的页面，而不是任何中间页面。\n- 如果你的服务将更新内容与推文混合显示，你必须标明那些引用推特作为来源的推文。\n\
  - 不要在用户个人资料图片或背景中放置色情内容。\n- 仅显示推特上自然呈现的操作。例如，当用户执行取消收藏或删除操作时，你不应该做推特不会做的事情，比如公开某条推文已被删除。\n\
  - 不要虚假报告某个账户为“已验证”账户。\n\n## 通过应用盈利\n\n在尝试通过应用盈利时，你应该遵循以下指导方针。其中最重要的一点是尊重用户内容：\n\n\
  - 推文可用于广告中，但不能*作为*广告本身。\n- 如果你想将某条推文用于耐用品，或者暗示该条推文作者对某事的赞助或认可，你必须获得该推文创建者的许可。\n\n\
  ## 推特广告\n\n推特可以通过其 API 在你的应用中投放广告（即推特广告）；然而，如果你联系推特，它会与你分享一部分广告收入。\n\n## 推特内容周边广告\n\
  \n你可以在自己的推特 API 应用内投放广告，但（当然）对此也有规定：\n\n- 如果你的广告合作“主要基于”推文，你必须将收入的一部分分给推特。如果你认为你的广告合作可能属于此类范畴，请发送邮件至\
  \ [`partner@twitter.com`](http://partner@twitter.com)。这包括自定义可视化等内容。\n- 你不能在推特时间线或任何其他可能被用户误认为是推文的消息中放置广告。例如，广告不能包含推文操作，如转发、喜欢和回复。\n\
  - 你通常必须在推特内容与你的广告之间保持清晰的界限。\n\n\n\n### 新的速率限制与白名单的终结\n\n在 2011 年初之前，Twitter 有一份开发者*白名单*，允许这些开发者超出\
  \ API 调用的小时速率限制。白名单的概念是 REST API 早期阶段的遗留产物，当时 Twitter 几乎没有批量请求选项，且流式 API 尚未公开。\n\
  \n自那以后，Twitter 增加了更高效的批量请求工具：查询、ID 列表、身份验证以及流式 API。尽管如此，由于目前所有白名单请求均被拒绝，一些在 2010\
  \ 年可能颇具创意的应用程序项目如今已无法实现。\n\n如果你计划进行高级研究和分析，则需要通过 Twitter 数据经销商（如 Gnip）购买数据。\n\n\
  然而，真正的变化在 Sarver 的公告中稍后出现，他指出“开发者想要做的一些事情，平台并不支持”。Sarver 写道，Twitter 不再通过授予白名单来实现高级研究和分析，而是要求开发者联系目前\
  \ Twitter 数据的主要经销商 Gnip。\n\n### REST API 速率限制\n\nTwitter 对 API 调用设置了每小时 150 次的限制。对于`OAuth`调用，限制为每小时\
  \ 350 次。如前所述，Twitter 不会让你通过白名单绕过此速率限制。你可以从经销商处购买批量数据，但在撰写本文时，唯一的此类经销商是 Gnip。不过，后续可能会有其他经销商出现，Twitter\
  \ 数据市场可能会随之形成。无论如何，许多开发者报告称，在尝试处理来自 Twitter 数据流的非结构化数据时，体验不佳。\n\n假设你对 Twitter 速率限制的细节感兴趣，我们在此总结了其许可额度：\n\
  \n- 经过身份验证的调用会计入该用户的限额，而未经过身份验证的调用则从主机的配额中扣除。主机每小时允许 150 次请求。\n- `OAuth`调用每小时允许\
  \ 350 次请求。\n\n你可以在以下网址找到详细说明这些限制的完整文档：\n\n[`http://dev.twitter.com/pages/rate-limiting#rest`](http://dev.twitter.com/pages/rate-limiting#rest)\n\
  \n与大多数社交平台一样，Twitter 的 API 对 HTTP POST 请求没有设置速率限制；然而，该公司表示未来可能会考虑限制 POST 请求。包含限制的方法在该文档中有所说明，网址如下：\n\
  \n[`http://dev.twitter.com/pages/rate-limiting#rest`](http://dev.twitter.com/pages/rate-limiting#rest)\n\
  \n**注意：** 未直接受到速率限制的 API 方法仍然受到有机限制（因此是未公开的）。\n\n如果你认为你的应用可能接近速率限制，可以通过检查返回的 HTTP\
  \ 响应头来监控其状态。使用默认的速率限制头，这些响应头还会显示以下信息：\n\n- `X-FeatureRateLimit-Limit`\n- `X-FeatureRateLimit-Remaining`\n\
  - `X-FeatureRateLimit-Reset`\n\n当你收到 HTTP 400 响应代码时，就会知道已触及速率限制。\n\n### Facebook：注意你的行为\n\
  \nFacebook 的规则手册比 Twitter 的稍微不那么令人望而生畏，它更倾向于引导开发者，而不是直接恐吓他们。在接下来的章节中，我们将解释 Facebook\
  \ 的一些可用性原则。请将这些原则视为你应用个性的基础。\n\n#### 平台政策要点\n\n你可以在以下网址找到 Facebook 完整且未经编辑的平台政策：\n\
  \n[`http://developers.facebook.com/policy/`](http://developers.facebook.com/policy/)\n\
  \n#### 创造出色的用户体验\n\nFacebook 提供了以下指南，用于创造出色的用户体验：\n\n- **构建社交化和参与度高的应用：** 这是什么意思呢？嗯，App\
  \ Store 中最优秀的 Facebook API 项目优先考虑与其他用户的沟通和互动。更被动、以消费为导向的应用（如资讯订阅阅读器）不适合 Facebook，但在\
  \ Twitter 上则更合理。\n- **给予用户选择和掌控权：** Facebook 的 API 拥有数量惊人的对象、关系和操作。尽管其中许多看起来微不足道，但当某些内容将要发布或与他人共享时，充分告知用户至关重要。\n\
  - **帮助用户分享富有表现力且相关的内容：** 理想情况下，Facebook 希望你构建一个不仅访问其社交图谱的应用；它还希望你的应用能为它贡献新内容。能够上传用户照片、视频和网络链接的应用，被认为比那些不这样做的应用更优秀。\n\
  \n#### 值得信赖\n\n与 Twitter 一样，Facebook 要求你尊重用户隐私，拒绝垃圾信息，并避免任何其他不道德的行为。同样地，Twitter\
  \ 不希望开发者与它自己开发的 iOS 应用竞争。然而，Facebook 在解释其意愿方面更加圆滑，并且在强制开发者遵守方面似乎较为宽松。\n\n具体来说，Facebook\
  \ 规定你不能对 Facebook 图标进行衍生使用。同样，你不能使用那些暗示你的应用是官方 Facebook 应用的替代品或取代物的术语来描述 Facebook\
  \ 的功能。然而，只要看看 App Store 就会发现，许多开发者复制了 Facebook 蓝白相间的配色方案，并大量使用了 Facebook 的某些图标和术语。虽然\
  \ Facebook 目前表现出宽容，但 Twitter 的例子已经证明，平台可以随意制定或执行其开发者条款。要知道，如果你决定模仿 Facebook 的主题和特征，你的应用最终可能会招致平台监管者的不满。它也会与\
  \ App Store 中的数十个应用难以区分。\n\n##### 速率限制\n\nFacebook 对用户和 API 调用都施加了速率限制。对于经过身份验证的用户，限制为\
  \ 500 万次。API 调用限制为 1 亿次。或许是为了防止任何主要竞争对手利用社交图谱数据与 Facebook 争夺广告收入，Facebook 将你的应用限制为每天\
  \ 5000 万次展示。\n\n##### 关于你的隐私政策\n\nFacebook 要求你告知用户你将使用哪些用户数据，以及你将如何在你应用的隐私政策中使用、展示、共享或传输这些数据。它还要求你在应用中包含隐私政策\
  \ URL。要了解更多关于隐私的信息，请查阅第 2 章（关于隐私）和第 5 章（关于 OAuth 和安全账户管理）。\n\n##### 其他事项\n\nFacebook\
  \ 还有其他关于其 API 使用的规则，但幸运的是，它的规则比 Twitter 的更简洁：\n\n- **不要出售数据：** 如果你被第三方收购或与第三方合并，你可以继续在你的应用中使用用户数据；但是，你不能将数据转移出你的应用。\n\
  - **删除你的旧项目：** 如果你停止使用 Facebook API，或者 Facebook 禁用了你的应用，Facebook 要求你删除所有通过 API 获得的数据（除非是基本账户信息，或者你已获得用户同意保留其信息）。\n\
  - **不要在你的应用之外使用用户的好友列表：** 即使获得用户同意，这也是不允许的。但是，你可以使用都已连接到你应用的用户之间的联系。\n- **始终在你的应用中提供一项功能，允许用户从应用中访问他们的\
  \ Facebook 数据。**\n\n\n\n### 关于内容的规则\n\nFacebook 的平台政策要求您对应用中的所有内容负责，*包括*用户生成的内容。这意味着您有责任在应用中实施监管（或创建监管机制，如“标记”功能），以确保您的用户不会向\
  \ Facebook 发布以下任何内容：\n\n- 与酒精相关的内容\n- 裸体内容\n- 与烟草相关的内容\n- 包含枪支或暴力画面的内容\n- 侵犯任何第三方权利（如知识产权）的内容\n\
  - 与赌博相关的内容\n- 非法竞赛，如金字塔骗局、抽奖或连锁信\n- 仇恨、威胁、诽谤或色情内容\n\n虽然 Facebook 在强制执行某些设计和功能条款时可能不会过于激进，但它对违反内容政策的行为实际上非常严格。众所周知，社区及其版主会标记并删除许多我们可能认为相当无辜的图片，例如母亲哺乳婴儿的照片。因此，请确保您的用户内容适合普通观众，否则将被迅速删除。\n\
  \n### 关于 Facebook 应用工作方式的其他奇怪规则\n\n在使用 Facebook API 时，您还需要牢记以下规则：\n\n- 除非用户特别要求创建此类帖子，否则不要预填充文本字段中的特定类型数据。禁止预填充字段的规则适用于动态消息故事（即`Facebook.streamPublish`和`FB.Connect.streamPublish`的`user_message`参数，以及`stream.publish`的`message`参数）、照片说明、视频描述、笔记、链接和\
  \ Jabber/XMPP。\n- 遵守 Facebook 对您选择广告合作伙伴的限制。批准的公司列表出现在 Facebook.com 的应用部分。\n- 在用户授予您发布权限后，每次应用代表他发布内容时，您都必须征求用户的许可。\n\
  - 您必须为用户提供一种明显的方式*跳过*同意 Facebook 社交渠道的条款。\n- 您*不得*允许用户在您的应用中一次性发布多个帖子。\n- 您不得在广告中包含平台集成，包括点赞按钮等社交插件。如果您想这样做，必须获得\
  \ Facebook 的书面许可。您可以通过此页面联系该公司：`http://developers.facebook.com/policy/contact/`\n\
  - 不要将 Facebook 消息作为应用直接与用户通信的渠道；Facebook 消息（即发送到`@facebook.com`地址的电子邮件）是为用户之间的通信而设计的。\n\
  \n### 原则的实际应用\n\nFacebook 的规则似乎是由其希望阻止的非常具体的行为所驱动的。该公司的平台文档提供了数页带有视觉辅助的具体示例，解释了合规应用与不合规应用之间的区别。我们在此总结了\
  \ Facebook 关于合规性的观点，以便您快速理解并继续前进。\n\n#### 照片\n\n处理照片时，Facebook 有几项指南需要您遵循：\n\n-\
  \ 切勿让您的应用自动标记照片中的用户或其好友。\n- 仅在获得您代其进行标记的用户明确同意后，才能标记照片。此外，您必须仅在标记准确反映图像内容时才进行标记。换句话说，Facebook\
  \ 希望您仅标记您知道名字的人脸。\n- 不要连续标记一个人的一系列照片；您需要避免在其个人主页顶部产生*横幅*效果。\n\n#### 点赞按钮\n\n这里唯一意想不到的规则是，您不得因用户点赞您的页面而自动奖励他们。如果您想以某种方式奖励粉丝，您应该明确表示，点赞您的页面可以让新老粉丝有资格获得当前和未来的奖励；但是，奖励不能是即时或自动的。\n\
  \n#### 广告\n\nTwitter 和 Facebook 在广告方面的规则有显著差异。Twitter 有一系列非常具体的指南，涉及在您的应用中讨论其功能。例如，正如您将在第\
  \ 13 章中了解到的，其指南要求开发者在讨论 Twitter 内容时将单词\"Tweet\"首字母大写。\n\n相比之下，Facebook 的政策要求您完全避免使用\
  \ Facebook 的标志、商标和网站术语。Facebook 还非常坚决地表示，其网站功能不得在您的应用中模仿。换句话说，如果您的应用看起来太像 Facebook\
  \ 的资产，并且工作方式太像 Facebook.com（或[touch.facebook.com](http://touch.facebook.com)），您很可能会收到\
  \ Facebook 的通知。\n\n如果您想阅读 Facebook 广告指南的完整内容，请访问以下 URL：\n\n[`http://www.facebook.com/ad_guidelines.php`](http://www.facebook.com/ad_guidelines.php)\n\
  \n#### 使用社交动态流\n\nFacebook 还有几条规则规定了您如何与社交动态流进行交互。这里的重点是真实分享用户生成且经用户授权的内容：\n\n-\
  \ 您应该始终询问用户是否想发布动态故事，而不是自动这样做。此外，您只应在用户执行了可能与奖励相关的真实操作后，才提出此选项。\n- 您不得预填充与以下产品相关的任何字段（除非用户手动创建内容）：\n\
  \  - 动态故事（即`Facebook.streamPublish`和`FB.Connect.streamPublish`的`user_message`参数，以及`stream.publish`的`message`参数）\n\
  \  - 照片说明\n  - 视频说明\n  - 笔记\n  - 链接\n  - Jabber/XMPP\n\n### 按钮文本\n\n以下是一些允许开发者使用的按钮文本示例：\n\
  \n- 发布\n- 分享\n- 发表\n- 添加到主页\n\n而在 Facebook 看来，以下是一些过于模糊、不适合整合到应用中的按钮文本示例：\n\n- 忽略\n\
  - 确定\n- 分享并继续\n- 请求\n\n### 应用展示\n\n既然我们已经花时间告诉您哪些应用不能构建，那么如果不向您展示一些（或多或少）在 Twitter\
  \ 和 Facebook 平台范围内非常出色的应用，我们就会有所疏漏。虽然存在界限，但开发人员在这个沙盒中仍有足够的发挥空间。\n\n#### Twitter\
  \ 应用\n\n在作者看来，使用 Twitter API 的最佳应用做到了以下几点：\n\n- 将 Twitter API 与您自己的（或其他）API 相结合，为现有\
  \ Twitter 用户提供一种便捷的方式，为其现有 Twitter 服务增值。\n- 优先考虑（a）消费推文或（b）创建推文。例如，传统的 Twitter 客户端应用优先考虑时间线，并方便浏览其他用户的内容。然而，一个\
  \ RSS 阅读器可能根本不提供查看 Twitter 时间线的功能，而是只提供一个发布文章的推文按钮。\n\n首先回顾本章前面提到的 Twitter 设计原则：\n\
  \n- **不要给用户带来意外：** 不要滥用 Twitter 功能或术语。\n- **尊重用户隐私：** 您需要使用适当的安全标准，例如`OAuth`。\n\
  - **成为 Twitter 的好合作伙伴：** 您需要遵守本章描述的所有规则。\n\n以下是一些创造性地使用 Twitter API 并满足上述设计原则的应用示例。\n\
  \n\n\n### Remember The Milk\n\n`Remember The Milk`（或简称为`RTM`）深受用户喜爱。这是一款生产力应用，利用\
  \ Twitter 集成（以及其他技巧）使其行为比简单的待办事项列表更灵活（参见图 11–1）。\n\n![images](img/1101.jpg)\n\n\
  **图 11–1.** `Remember The Milk`将 Twitter 作为远程命令系统的基础。\n\n`RTM`使用推文和私信来创建并编辑托管在别处的待办事项列表中的项目。请注意，虽然推文和私信是\
  \ Twitter 的核心功能，但此处以新颖的方式使用，并与`RTM`开发者的其他后端软件结合。简而言之，这正是 Twitter 希望开发者创建的应用类型：它在现有的\
  \ Twitter 基础设施之上增加了一层新的实用性和功能性。\n\n#### 添加任务\n\n通过将`@RTM`添加为 Twitter 联系人，用户可以为自己的待办事项发推，并观察这些事项稍后出现在`Remember\
  \ The Milk`的任务队列中。为了将项目（包括截止日期和其他任务属性）添加到待办事项列表，用户可以直接向`@RTM`发送包含纯文本任务的私信。以下是一些典型的示例消息：\n\
  \n*   `“pick up the milk”`：将指定名称的新任务添加到待办事项列表。\n*   `“call jimmy at 5pm tomorrow”`：将指定名称和截止日期的新任务添加到待办事项列表。\n\
  *   `“return library books in 2 weeks”`：将指定名称和截止日期的新任务添加到待办事项列表。\n*   `“take out\
  \ the trash monday at 8pm *weekly #errand”`：将指定名称和截止日期的新任务添加到待办事项列表，同时将其标记为重复任务，并带有`#errand`标签。`RTM`将此功能称为*智能添加*（`Smart\
  \ Add`）。\n\n#### 向其他 Twitter 用户发送任务\n\n你也可以使用`RTM`向其他 Twitter 用户发送任务。例如，发推`“@username\
  \ pick up the milk”`会将任务发送给指定的 Twitter 用户名，前提是该用户也已注册`Remember The Milk`。\n\n####\
  \ 更新任务\n\n要修改已存在于待办事项列表中的任务，用户可以发推特`@RTM`命令，如下所示：\n\n*   `!complete` `call jimmy`（缩写：`!c`）：完成指定的任务。\n\
  *   `!postpone` `call jimmy`（缩写：`!p`）：推迟指定的任务。\n\n你也可以获取新任务：\n\n*   `!today`（缩写：`!tod`）：获取今天到期的任务。\n\
  *   `!tomorrow`（缩写：`!tom`）：获取明天到期的任务。\n*   `!getdue` `friday`（缩写：`!gd`）：获取指定日期（本例中为星期五）到期的任务。\n\
  *   `!getlist` `personal`（缩写：`!gl`）：获取指定列表（本例中为个人）中的任务。\n*   `!gettag` `call`（缩写：`!gt`）：获取具有指定标签（本例中为`call`）的任务。\n\
  *   `!getlocation` `office`（缩写：`!go`）：获取在指定位置（本例中为办公室）的任务。\n\n### Evernote\n\n`Evernote`是一款非常流行的跨平台笔记应用，适用于\
  \ iOS、Android、Mac、PC 以及其他移动和桌面平台（参见图 11–2）。\n\n![images](img/1102.jpg)\n\n**图 11–2.**\
  \ `Evernote`是一款跨平台笔记应用，允许你通过`@`回复`@MyEN`来提交笔记。\n\n`Evernote`使用 Twitter 的方式与`Remember\
  \ The Milk`非常相似；然而，`Evernote`强调使用短信服务（SMS）作为访问 Twitter 的方式。由于 Twitter 可以将文本消息转换为推文，开发者经常利用此功能为应用增加通用的移动电话功能，这些应用在\
  \ iOS 生态系统之外可能会得到更广泛的采用。\n\n与`Remember The Milk`用户类似，`Evernote`用户可以撰写公开推文或直接向`@myEN`发送私信，将推文正文发送到`Evernote`笔记本（如图图\
  \ 11–3 所示）。\n\n同样像`RTM`一样，`Evernote`使用推文和私信，如同其他应用；然而，`Evernote`的消息不会在用户的推文中添加任何内容。相反，他们利用机器人`@myEN`来决定如何处理和归档传入的笔记。结果是形成了一个看似神奇的系统，能够识别你的提交并正确归档。\n\
  \n![images](img/1103.jpg)\n\n**图 11–3.** 向`@MyEN`发推\n\n#### 短信笔记\n\n得益于 Twitter\
  \ 内置的短信支持，`Evernote`用户可以在全球大多数国家通过移动手机向`Evernote`发送笔记。在美国，Twitter 的短代码是`40404`。向`40404`发送包含命令`d\
  \ myEN`的消息，会指示 Twitter 创建一条直接发送给`@myEN`的私信，就像从 Twitter 客户端操作一样。命令附带的文本将作为新笔记存入你的默认笔记本。\n\
  \n![images](img/1104.jpg)\n\n**图 11–4.** 通过 Twitter 的短信支持添加`Evernote`内容\n\n####\
  \ 添加 TwitPics\n\n`Evernote`还使向绑定`Evernote`的推文中添加图片变得简单。为此，`Evernote`支持`TwitPic`\
  \ URL。如果你撰写一条包含`TwitPic` URL 的`@myEN`推文，`Evernote`中将会显示照片的缩略图，同时笔记正文中会包含一个指向全尺寸图片的`TwitPic`链接。\n\
  \n### Waze\n\n由于 iOS 没有预装逐向导航应用，提供驾驶导航的应用市场广阔。其中最好的一款是`Waze`，它采用了一种比某些竞争对手更趣味化的导航方法（参见图\
  \ 11–5）。`Waze`在你的高速公路地图上添加了一种游戏层，通过奖励积分来鼓励你报告事故、新道路、危险、测速摄像头以及其他不断变化的路况特征。\n\n![images](img/1105.jpg)\n\
  \n**图 11–5.** `Waze`是一款受欢迎的 iOS 交通应用，使用 Twitter 作为其通知基础设施。\n\n早期版本的`Waze`允许用户发布关于交通困境的推文，近乎实时地收集这些信息以创建动态路况地图。现在，`Waze`扫描\
  \ Twitter 上所有关于交通堵塞的数据，无论发推的人是否拥有`Waze`账户。这意味着，即使非`Waze`用户发推说自己被困在施工交通中，你的`Waze`应用也会在地图上显示该用户的警告（假设该用户在推文中附加了位置信息）。已经使用`Waze`的用户被鼓励使用标签`#wazelive`发布更新推文，以确保系统能够捕获它们。\n\
  \n这就是 Twitter 所说的，应用应该努力利用从 Twitter API 获取的数据来构建新体验的含义。你无法在`Waze`的任何地方找到 Twitter\
  \ 时间线或关注者/关注列表。相反，该应用利用搜索和消息功能，在你所在区域的交通中创建一个真实的 Twitter 用户地图。\n\n`Waze`还集成了 Facebook\
  \ 和 Foursquare 的 API，让你可以查看在你行驶区域是否有朋友。如果你愿意，还可以在应用内部签到你的目的地场所。\n\n![images](img/1106.jpg)\n\
  \n**图 11–6.** `Waze`用户界面，几乎看不出 Twitter 或 Facebook API 的痕迹。\n\n### Facebook Apps\n\
  \n制作一个集成 Facebook API 的有用应用比集成 Twitter 要困难一些，仅仅是因为 Facebook 的普及及其文档完善的 API 使其成为开发者非常热门的选择。尽管如此，仍有一些应用脱颖而出；即使它们并非完美无缺，也体现了\
  \ Facebook 所说的优秀 API 集成应具备的特质。\n\n让我们先回顾一下本章前面提到的 Facebook 设计原则：\n\n*   **构建社交性和参与性强的应用：**\
  \ 换句话说，优先考虑与其他用户的沟通和互动。\n*   **给予用户选择和控制权：** 当某些内容将要发布或与他人分享时，务必充分告知用户。\n*   **帮助用户分享富有表现力和相关的内容：**\
  \ 能够上传用户照片、视频和网络链接的应用被视为比不能这样做的应用更优秀。\n\n\n\n### Fone\n\n`Fone` 并非一款完美的应用，但它是一个相对简单的项目，实现了\
  \ Facebook 应用本身不擅长的功能。`Fone` 将 Facebook 的即时通讯和语音通话功能移植到 iPhone 上，打造了一款替代系统标准电话应用（Phone\
  \ 应用）的 Facebook 替代品（参见图 11–7）。（官方 Facebook 应用内部并未提供语音通话功能。）\n\n![images](img/1107.jpg)\n\
  \n**图 11–7.** *Fone 并非一款完美的应用，但它通过语音通话的形式，为 Facebook 的聊天体验增添了一些价值，并且在很大程度上避免了过度模仿\
  \ Facebook 的风格。*\n\n由于这款应用旨在连接用户，它遵循了 Facebook 的可用性原则。同时，它巧妙地运用视觉元素来传达其功能（参见图 11–8）。蓝色调让人联想到\
  \ Facebook，但图标设计又明确告知用户这是一款通话应用。尽管主色调是蓝色，但这里几乎看不到任何 Facebook 品牌的痕迹。仅凭其独特的排版设计，以及卡片式界面（无疑借鉴了\
  \ iOS 自带的天气应用），就能让用户清晰地意识到自己并非身处一款 Facebook 品牌的应用中。\n\n![images](img/1108.jpg)\n\
  \n**图 11–8.** *Fone 在传达自身功能方面做得相当出色。*\n\n### Flipboard\n\n`Flipboard` 是一款备受欢迎的 iPad\
  \ 阅读器应用（参见图 11–9）。它的核心假设是，你添加到 Facebook 个人主页或 Twitter 时间线中的大部分内容，都源自博客、杂志和社交图谱等在线来源。这款应用专注于内容本身，让你可以阅读\
  \ RSS 订阅源、Facebook 和 Twitter 新闻，以及你钟爱的在线杂志。同时，它也方便用户将这些内容分享给自己的好友圈。\n\n![images](img/1109.jpg)\n\
  \n**图 11–9.** *Flipboard，这款广受欢迎的 iPad 新闻阅读器应用，完美集成了 Facebook API。*\n\n`Flipboard`\
  \ 允许用户在杂志界面的任何位置发布状态更新、推文和照片（参见图 11–10）。\n\n![images](img/1110.jpg)\n\n**图 11–10.**\
  \ *Flipboard 让你以一种不同于任何 Facebook 网站或应用的形式，来消费你的 Facebook 新闻推送。*\n\n`Flipboard` 的创始人兼首席执行官\
  \ Mike McCue 在该应用最新版本发布时，精辟地阐述了优秀社交 API 项目的特质，他说^(2)：\n\n> *“你在社交网络中联系的人们，正逐渐成为对你至关重要的新闻和信息的策展人，这是我们在\
  \ Flipboard 中日益重视的一个重要原则。我们的许多读者使用 Google Reader 和 Flickr 来获取由他们信任的人策划的新闻和照片。这些社交网络的全面集成，让我们朝着实现社交杂志愿景又迈进了一步，将你关心的一切都汇集到一个地方。”*\n\
  \n换句话说，`Flipboard` 不仅仅是一个单向的阅读器应用。它让你在同一个地方消费和创作内容，并围绕着你从别处获取的内容进行互动。简而言之，正是像 `Flipboard`\
  \ 这样的应用，为 Facebook 的生态注入了新鲜活力，使我们的新闻推送不至于变得千篇一律。\n\n### 总结\n\n关于 Twitter 和 Facebook\
  \ API 集成的规则可能比你预想的要多；其中一些规则甚至让我们也感到惊讶。虽然违反大部分规则可能不会让你陷入法律纠纷，但如果你不遵守它们的规则，Twitter\
  \ 和 Facebook 很可能会联系你，要求你重新设计应用，否则将失去对其 API 的访问权限。由于前文内容较为密集，我们为你准备了一份备忘单，可以在评估应用创意时使用。\n\
  \n__________\n\n² [`http://flipboard.com/press/flipboard-new-edition`](http://flipboard.com/press/flipboard-new-edition)\n\
  \n首先，这是 Twitter 的主要规则备忘单：\n\n*   不得使用 Twitter API 来监控 Twitter 任何产品和服务的可用性、性能或功能。\n\
  *   不得以暗示 Twitter 背书、赞助或虚假关联的方式使用 Twitter 标识。\n*   不得使用或访问 Twitter API 来聚合、缓存（作为推文一部分的情况除外）或存储\
  \ Twitter 内容中包含的地理位置信息。\n*   不得让你的客户端（client）框架化或大量复制 Twitter 服务的重要内容。你应该使用 Twitter\
  \ API 来展示 Twitter 内容（即，不要创建像 Twitter 应用那样运行的新 Twitter 客户端）。\n*   维护推文的完整性。尽管推文只有\
  \ 140 个字符长，但其中包含大量信息。Twitter 视觉设计指南请参见第 13 章。\n*   在代表用户发送推文或其他消息之前，务必获得许可。用户通过你的应用进行身份验证这一事实，并不构成你代表其发送消息的同意。\n\
  *   务必在你的服务中显示隐私政策。清楚说明你将如何处理从用户那里收集到的信息。\n*   当你向用户的推文中添加位置信息时（无论是作为地理标签还是注释数据），都必须明确告知。\n\
  *   不得以可能误导、混淆或欺骗用户的方式使用商业名称和/或标志。关于 Twitter 标识使用的更多信息，请参见本章后面的商标规则。\n*   为没有 Twitter\
  \ 账户的最终用户提供创建新 Twitter 账户的机会。\n*   仅显示在 Twitter 上自然呈现的操作。\n*   不要让用户将你的广告误认为是推文。例如，广告不能包含诸如转发（ReTweet）、收藏（Favorite）或回复（Reply）等推文操作。\n\
  \n其次，这是 Facebook 的主要规则备忘单：\n\n*   专注于用户生成、用户授权内容的真实分享。\n*   始终询问用户是否想要发布 Feed 故事；不要自动发布。此外，仅在用户执行了可能与奖励相关的真实操作后，才提供发布故事的选项。\n\
  *   切勿预先填写与以下产品相关的任何字段，除非用户之前在流程中手动生成了该内容：Stream 故事（`Facebook.streamPublish` 和 `FB.Connect.streamPublish`\
  \ 的 `user_message` 参数，以及 `stream.publish` 的 `message` 参数）、照片（说明）、视频（描述）、笔记（标题和内容）或链接（评论）。\n\
  *   不要将 Facebook 消息作为应用与用户直接沟通的渠道使用。\n*   不要仅仅因为用户赞了你的主页就自动给予奖励。如果你想以某种方式奖励粉丝，你应该明确说明，赞了你的主页后，新老粉丝都有资格获得当前和未来的奖励。\n\
  *   切勿让你的应用自动在照片中标记用户或其好友。\n*   只有在获得被标记用户明确同意的情况下，才能标记照片。请注意，你只能标记图像中准确描绘的内容。\n\
  *   不要向用户提供一次发布多个 Stream 故事的选项。\n\n## 第 12 章\n\n\n\n## 社交类 iOS 应用的 UI 设计与体验指南\n\n\
  在上一章中，我们讨论了 Facebook 和 Twitter 以“保护用户体验”为名制定的所有规则和条例。当然，这些指南仅涉及那些可能给平台带来负面影响的方面。本章将提供一些指导，帮助你打造一款不仅在字面上合规，而且实际上直观易用的应用。\n\
  \n如果你是第一次设计 iOS 应用，本节是必读内容。它将涉及苹果人机界面指南（HIG）中的几个部分，这些部分对社交应用尤为重要。它还将告诉你如何正确运用视觉和交互设计，避免用户困惑和商标冲突。遵循这些规则，你将获得用户的良好反馈——并且不会受到\
  \ Twitter 和 Facebook 平台代表的刁难。\n\n作为作者，我们认为最好的 iOS 应用通常会遵循苹果的 HIG，除非它们有意偏离以改进界面。换句话说，我们认为最好的设计应当胜出，开发者可以并且应该互相借鉴最佳的交互方式，以期创建出自然的\
  \ UI 标准。\n\n我们想表达的核心是：如果你要获得打破规则的力量，掌握规则至关重要。如果你之前设计过应用，那么本章是可选的。不过，你可能还是想快速翻阅一下，以回顾某些范例。\n\
  \n### Facebook 与 Twitter 的 UI 基础\n\n本章从 iOS 社交应用设计的一些非常基础的建议开始。官方的 Twitter 和 Facebook\
  \ 应用（以及它们庞大的现有应用开发者群体）已经标准化了这些应用的交互和视觉设计，因此用户对你设计的任何 UI 都有极高的期望。遵循本章的建议将帮助你善待用户，并避免触犯我们在第\
  \ 11 章中讨论的所有规则所带来的麻烦。\n\n首先，这里有两条基本建议：\n\n-   在设置过程中谨慎处理账户。\n-   允许用户在你的应用中通过 Twitter\
  \ 和 Facebook API 集成进行注册、登录和退出。\n\n我们先来看一下如何在设置账户时处理账户。仅仅因为用户尚未登录就显示错误或空白视图，会造成糟糕的用户体验。我们不愿针对任何人，但这里有一个我们在\
  \ App Store 上找到的匿名 Twitter 应用。启动时，它看起来就像图 12-1 所示。\n\n![images](img/1201.jpg)\n\n\
  **图 12-1.** *错误信息绝不应该是用户在应用中看到的第一样东西。*\n\n在首次启动时向用户显示“警告”这一错误信息，是一种非常糟糕的应用介绍方式。更糟的是，如果你点击确定，并且没有在此应用中输入账户信息（在本例中，隐藏在“更多”![images](img/U001.jpg)“配置”中），那么下次启动应用时，你只会得到一个空白的时间线。同样，这也是一种处理用户账户的糟糕方式。\n\
  \n在 Twitterific 中可以看到一种更好的启动序列处理方式（见图 12-2）。这个应用也恰好是我们第二条——可能显得过于基础——建议的一个良好引子。\n\
  \n![images](img/1202.jpg)\n\n**图 12-2.** *Twitterific 的注册屏幕呈现得十分得体。*\n\n也就是说，你应该允许用户在你的应用中通过\
  \ Twitter 和 Facebook API 集成进行注册、登录和退出。两个平台都要求你这样做，并且对用户公平也要求你贯彻执行。同样，你的应用应该具备处理手机启动时处于离线状态或在登录过程中网络连接失败等场景的能力。\n\
  \n#### 注重细节：从图标开始\n\n设计在 iOS 上至关重要，因此你必须对视觉资产的细节给予一丝不苟的关注。我们将从确保你了解图标设计的适当尺寸开始。这是你的应用面向世界的名片，因此，如果它要在\
  \ Retina 屏幕上看起来很棒，就必须有正确的尺寸。\n\n以下是 iPhone 和 iPod 的适当图标尺寸：\n\n-   iPhone 4 图标：`114x114px`（旧的\
  \ iPhone 图标标准分辨率为 `57x57`，这是最低可接受尺寸）。\n-   App Store 图标：`512x512px`\n-   聚焦搜索：`29x29px`\n\
  -   iPhone 4 聚焦：`58x58px`\n\n下表是苹果要求的图标尺寸。\n\n![images](img/t1201.jpg)\n\n你需要制作的最大视觉资产是\
  \ `512 × 512` 像素。这是应用在 iTunes Cover Flow 中查看或位于 App Store 顶部横幅上时显示的图像。通常，所有图标设计都从\
  \ `512` 像素开始，然后调整到所需尺寸。简单地将单个图标缩小到其他尺寸会导致图标模糊。\n\n**注意：** 所有图像和图标都推荐使用 `PNG` 格式。图标和图像的标准位深是\
  \ `24` 位（红、绿、蓝各 `8` 位），外加一个 `8` 位的 alpha 通道。虽然你可以在导航栏、工具栏和标签栏的图标中使用 alpha 透明度，但请不要在应用图标中使用此功能。你不必局限于\
  \ Web 安全色。\n\n以下是 iPad 的标准应用尺寸：\n\n-   应用图标：`72x72px`\n-   App Store 图标：`512x512px`\n\
  -   聚焦搜索：`50x50px`\n-   设置图标：`29x29px`\n\n**注意：** App Store 只接受图标为 `PNG` 文件的应用。\n\
  \n你无需为图标添加光泽；这会自动完成。如果你想要未经修饰的外观，可以使用一个布尔开关来切换光泽效果。\n\n应用图标的圆角也是如此：让你的图形保持直角边，它们将自动被裁剪为圆角。\n\
  \n\n\n### 展示各类反馈\n\n反馈被定义为任何表明某个进程正在进行的声响、振动或视觉指示器。显示反馈非常重要，尤其是在触摸设备上，因为操作屏幕上的物体时缺乏触觉感受。当你的应用主动执行某些操作（例如自动加载新推文）时，显示反馈同样至关重要。\n\
  \n苹果公司表示，用户的每一个操作都应在屏幕上产生某种可感知的变化——即使只是按钮被按下时的阴影。苹果还要求，当某项操作耗时超过几秒钟时，你应该显示一个活动指示器。\n\
  \n另一种反馈形式是动画。推特公司表示，动画有助于“提升可读性”，而苹果的`HIG`则指出，这些动画应当“微妙且恰当”，并服务于以下目的之一：\n\n-   传达状态。\n\
  -   提供有用的反馈。\n-   增强直接操控的感知。\n-   帮助用户可视化其操作的结果。\n\n苹果警告你要谨慎使用动画，因为无端使用时，动画容易让人感到厌烦。另外一点：苹果表示，你应努力使动画与\
  \ iOS 内置应用中的动画保持一致。\n\n然而，在实践中，许多开发者为了在他们认为的特定交互上做出改进，而背离了苹果对动画的使用。一个例子是由官方推特应用开发者首创的“下拉刷新”指示器，它已被开发者（包括\
  \ Facebook 的开发者）反复复制。你可以在图 12-3 中看到它的实际效果。\n\n![images](img/1203.jpg)\n\n**图 12-3.**\
  \ *Facebook 应用向用户显示正在加载新信息。*\n\n请注意，单个开发者的创新能如此广泛传播是不同寻常的，因此你不太可能通过推翻一些非常常见的系统动画，在\
  \ iOS 设计史上留下你的印记。但如果你坚信你的应用有理由偏离`HIG`和 App Store 的设计精英们设定的标准；那么，尽管放手一试，看看在测试中能得到什么样的反馈。\n\
  \n还要注意，*更新*指示器与应用在发布“墙上帖子”时使用的活动指示器是不同的（参见图 12-4）。在后一种情况下，使用一个简单的 iOS 活动指示器来表明“下拉释放”刷新控件已被激活，并且帖子正在刷新。（关于当手机离线时你的应用应如何处理，可以阅读第\
  \ 8 章的内容。）\n\n![images](img/1204.jpg)\n\n**图 12-4.** *Facebook 的进度轮*\n\n在 iOS 中，声音是次要的反馈媒介，因为苹果认为存在太多场景（比如环境太嘈杂）使得反馈无法被用户察觉。振动是一种更可靠的反馈机制，但它应该只用于最重要的通知。而且，振动频率也不能太高。用户必须能够将其关闭。\n\
  \nFacebook 让你可以选择同时使用声音和振动。它还与“摇动刷新”功能一起使用了手机中的加速计输入（参见图 12-5）。\n\n**注意：** Facebook\
  \ 遵循了苹果的设计指南，将这些反馈偏好设置放在了系统“设置”应用的一个面板中。有关偏好设置的更多信息，请参阅本章后面的“以标准方式呈现设置”部分。\n\n![images](img/1205.jpg)\n\
  \n**图 12-5.** *Facebook 将一些“一劳永逸”的偏好设置保留在系统“设置”应用中。*\n\n### 触摸目标与文本\n\niOS 中触摸目标的最小尺寸是\
  \ 44 × 44 像素。务必在控件之间留出足够的间距；并且，正如我们在上一节中所说，不要把屏幕挤满控件。例如，我们喜欢 TwitHit 将核心任务置于屏幕正中央的方式，如图\
  \ 12-6 所示。\n\n![images](img/1206.jpg)\n\n**图 12-6.** *TwitHit 清晰突出了主要任务。*\n\n请记住，让你所有的控件都可点击，并注意它们的标签。你可以在接下来的章节中找到关于标签命名以及商标和图标使用的指导。\n\
  \n### 原型设计与测试\n\n苹果强烈建议在将你的应用提交到 App Store 之前进行用户测试。这在社交应用设计中尤其重要。如果你正在构建使用 Facebook\
  \ 或 Twitter 的应用，务必下载其他使用这些 API 的应用（本书中已讨论过许多这样的应用）。看看它们如何处理某些操作，以及如何在视觉上区分自己。同时，询问你的朋友和同事他们喜欢其他哪些应用的哪些功能，然后让他们反馈来指导你的设计流程。在精细调整应用方面，Xcode\
  \ 非常灵活，你可以轻松地进行几次迭代以把事情做对。\n\n### 用户希望从你的应用中获得什么\n\n以下是你在设计应用时应优先考虑的七个基本方面：\n\n\
  -   内容\n-   逻辑路径\n-   清晰的设置\n-   品牌标识\n-   简洁\n-   许可协议\n-   适应 iPad 的设计\n\n在接下来的章节中，我们将逐一审视这些设计原则，以及你如何在你的应用中利用它们。\n\
  \n#### 内容\n\nFacebook 和 Twitter 都围绕两个核心任务展开：在广阔的*社交图谱*中消费和创建内容。\n\n如果你的应用能够发布内容，它应该为用户提供一个干净、宽敞的界面来输入文本或媒体，文本框内或周围不应有大量其他控件。虽然它不是纯粹极简主义的设计，但我们喜欢\
  \ TweetBot 呈现“创建推文”的方式。\n\n如果你的应用从 Facebook 或 Twitter 的 API 获取信息，应该以恰当的方式呈现。对于照片，这意味着你的应用应以全屏显示，并带有半透明的控件，且在不使用时自动消失。对于文本，这意味着要使用清晰易读的字体。\n\
  \n#### 逻辑路径\n\n官方 Twitter 和 Facebook 应用在复杂性上可能会让人感觉像迷宫；然而，它们处理得很好。Twitter 通过一个动态的应用程序栏来管理其复杂性，而\
  \ Facebook 则通过其“网格”UI 来实现。但是，正如我们将在本章后面讨论的，如果你的应用很复杂，你无法复制这两种策略。请继续阅读，学习如何围绕 Twitter\
  \ 和 Facebook 的内容设计交互。\n\n#### 清晰的设置\n\n苹果表示，开发者应避免将应用的设置放在应用本身内部；相反，他们应该选择在系统“设置”应用内提供一个设置面板。然而，许多同时使用\
  \ Facebook 和 Twitter API 的热门应用并未遵循这一惯例，通常是因为它们觉得系统设置的 API 限制太多。我们建议的折中方案是：将“一劳永逸”的选项放入“设置”应用，而将更常用到的选项放在你的应用内部。如果用户需要离开你的应用去编辑账户信息或调整视觉显示选项，许多用户会感到不耐烦。\n\
  \n官方的 Facebook 应用实际上遵循了我们刚才描述的惯例，而 Twitter 应用则在其应用内部的几个屏幕中处理所有设置（参见图 12-7）。\n\n\
  ![images](img/1207.jpg)\n\n**图 12-7.** *Twitter 在其应用内部处理偏好设置。*\n\n#### 品牌标识\n\n\
  你应该使用色彩、样式、定制的艺术设计和动画，来打造专属于你应用的独特外观和感觉。这就是用户如何将你与其他开发者区分开来，以及如何将你的应用与竞争对手的应用区分开来的方式。\n\
  \n#### 简洁\n\n用简短、具体的术语来标注事物。如果你无法为某个控件想到一个合理的标签，可以考虑使用苹果的系统图标之一，或者使用用户能从 Facebook\
  \ 或 Twitter 平台理解的符号。也要考虑添加许可协议或免责声明。\n\n\n\n#### 许可协议\n\n好吧，用户可能不想要许可协议。但推特和脸书都表示，他们要求开发者向用户展示许可协议。需要说明的是，苹果公司表示这是可选的，因此我们建议稳妥行事，编写一份协议。如果你确实包含最终用户许可协议（EULA），不要在首次启动时要求用户同意。（不过，在首次启动时，确实需要请求用户授权使用其位置信息和推送通知。）相反，你应该让用户有机会先试用应用，然后再要求他们接受你的条款，或者将条款放在应用的“设置”面板中。\n\
  \n##### 合适的 iPad 设计\n\n如果你正在为 iPad 开发应用，请记住要避免在应用的导航栈中创建复杂的层级或嵌套标题。同时，记得对模态任务使用弹出控件，并将工具栏内容移至屏幕顶部。\n\
  \n#### 让使用变得轻松直观\n\n正如我们在本章引言中所说，iOS 设计应始终将易用性和易学性放在首位。据苹果公司称，你可以通过以下方式确保遵循这一原则：\n\
  \n*   将控件集缩减到仅保留最常用、最有用的一组。对于额外选项，使用“更多”按钮或系统标准的“操作”按钮。\n*   恰当且一致地使用标准控件和手势，使其行为符合用户的预期。\n\
  *   清晰标注控件，让用户确切了解其功能。\n\n在 iOS 应用中，这比看起来要棘手。用户已经从使用官方的推特和脸书应用中习惯了数十种不同的用户界面范式。当他们使用你的应用时，他们对控件的名称、标签的命名方式以及应用的核心功能抱有特定的期望。\n\
  \n因此，努力使用正确的术语并避免偏离标准交互方式非常重要。在第 13 章和第 14 章中，我们将深入探讨术语、商标及其他品牌元素的正确使用。\n\n### 结论\n\
  \n现在我们已经回顾了优秀社交应用设计的基础，如果你从未阅读过苹果公司的人机交互指南，不妨考虑翻阅一下其余部分。\n\n准备就绪后，请继续阅读接下来的两章，你可以分别将其视为针对推特和脸书的人机交互指南。\n\
  \n## 第 13 章\n\n## 推特 UI 设计\n\n由于 iOS 上已经存在大量推特客户端，因此在创建应用时，你需要注意一些已经存在的设计范式。\n\n\
  本节将讨论我们认为应避免、修改或借鉴的视觉、导航和交互范式。\n\n### 易用性优先级\n\n如果你要设计一个用户体验良好的推特 API 项目，应首先明确优先级。对于大多数推特\
  \ API 项目而言，这意味着将最多时间和精力投入到以下方面：\n\n*   *加载与滚动*：如今官方的 iOS 推特应用源于 Tweetie，这是一个专注于一个关键功能的单人项目：快速滚动推文。由于推文是大多数推特应用的核心，因此应确保列表、内容和推文加载尽可能快速流畅。\n\
  *   *使用图片、网址缩短器和地理标记*：如果你的应用可以创建推文，这三个功能已成为标准，并且在任何创建推文的地方都应具备。\n*   *让用户留在应用内*：推文关联着操作和内容的架构：图片、联系人、网址、转发、@回复等。尽量在应用内处理所有相关操作，避免使用“网页”视图或启动系统应用。将用户从应用中弹出会让他们感到困惑，并降低操作速度。\n\
  *   *首要尊重隐私*：未经作者许可，不要打印推文。使用内部运营的真实账户中的真实推文，或经用户许可显示的推文。在展示示例内容时，始终使用你自己的推特个人资料截图（包含你自己的推文）。\n\
  \n#### 推文的结构\n\n推特对于如何显示推文有非常具体的要求。事实上，它甚至明确规定在撰写像本书这样的书籍时，应将“推文”（Tweet）首字母大写。你可以从推特的“推文结构”图示中了解其对推文显示方式的期望，该图示来自以下网址（见图\
  \ 13-1）：\n\n`http://dev.twitter.com/pages/display_guidelines`\n\n![图片](img/1301.jpg)\n\
  \n**图 13-1.** *根据推特官方设计指南的“推文结构”*\n\n让我们更深入地审视图 13-1 中所示的所有元素：\n\n1.  *推文作者*：推特要求你必须显示用户的推文句柄；不过，在句柄旁边显示用户的真实姓名是可选项。点击用户名应链接到该用户的推特个人资料，最好在应用内打开。推特设计指南规定，用户名和真实姓名（如果显示）应采用不同的样式。不要在用户句柄前加“@”符号。\n\
  2.  *@提及*：推文中对其他推特用户的提及应链接到其用户个人资料。点击该用户名应跳转到该用户的个人资料，最好在应用内完成。\n3.  *话题标签*：如果用户在推文中包含话题标签，它应链接到应用内针对该查询词在\
  \ `Twitter.com` 上的搜索结果。\n4.  *网址*：推文中的网址应显示为可点击的超链接，指向通过 API 传递的地址。\n5.  *品牌标识*：如果你的应用在推特时间线或其他相关上下文之外显示单条推文，推特要求你在图片某处放置推特文字商标或推特小鸟图标。如果你在推特时间线或其他相关上下文之外显示一组推文，推特要求你在附近放置“来自推特的内容”字样。你将在本章后面了解更多关于推特小鸟和文字商标的信息。\n\
  \n请注意，推特表示，如果你通过电子邮件请求批准，这些规则可以有例外。请将你的请求发送至 [`trademarks@twitter.com`](http://trademarks@twitter.com)。\n\
  \n在编写推文时，你应注意图中未展示的几个额外元素：\n\n1.  *推文输入框*：用于编写新推文的视图应始终显示“发生了什么？”提示。\n2.  *推文按钮*：如果你的应用仅将内容发布到推特，执行该任务的按钮应标注为“推文”。如果帖子同时发送到推特以外的其他服务，按钮应标注为“更新”。\n\
  3.  *字符计数*：每个空白的推文输入框都应有一个可见的字符计数器，从 140 个字符开始倒计数，显示剩余可用字符数。\n\n\n\n# 建议组件\n\n除了前面的“要求”之外，Twitter\
  \ 还提供了一系列建议性的设计指南，你可以选择遵循（或不遵循）。以下部分复述了 Twitter 的官方建议，并结合了一些无视这些建议反而效果更佳的应用程序实例进行了权衡：\n\
  \n- **头像与对齐方式**：Twitter 希望开发者将用户头像显示在推文的左侧。推文的其他内容则应在头像右侧立即左对齐。头像链接指向 `http://twitter.com/username`\
  \ 处的用户 Twitter 个人资料。\n\n- **反例**：Tweetbot 是 App Store 中视觉上最具特色的 Twitter 客户端之一，它选择将头像放在推文下方（参见图\
  \ 13–2）。但效果很好。\n\n![images](img/1302.jpg)\n\n**图 13–2.** *Tweetbot 以一种非传统的方式呈现推文详情，我们认为效果不错。*\n\
  \n- **时间戳与固定链接**：“此信息可以相对显示（例如‘2 分钟前’）或绝对显示（例如‘7 月 8 日上午 8:45’）。时间戳应单独成行，位于推文文本之后，并采用不同的样式以使其不如推文文本显眼（颜色更浅和/或字号更小）。时间戳还应链接到该条推文在\
  \ Twitter 上的固定链接页面。”\n\n- **反例**：Twitterific 在技术上遵循了这一建议（参见图 13–3），但只是勉强做到：时间戳的字号仅比推文字号小大约\
  \ 1pt。不过，时间戳与推文之间的间距足以形成区分。将时间戳放在推文上方，能够优先呈现上下文。\n\n![images](img/1303.jpg)\n\n\
  **图 13–3.** *Twitterific 以传统方式呈现推文详情。*\n\n- **推文操作**：“回复、转推和喜欢操作应始终可从一条推文中访问，并应使用各自对应的操作图标显示。它们应按从左到右的顺序排列，依次为回复、转推、喜欢。”\n\
  \n- **反例**：*几乎所有集成了 Twitter API 的应用程序都以不同的方式呈现这些推文操作。我们喜欢 Twitter 的建议，但有时隐藏较少使用的控件可以使界面更简洁。图\
  \ 13–2 中的 Tweetbot 和图 13–3 中的 Twitterific 都分别采用了这种做法。*\n\n- **来源**：“除了时间戳和固定链接，你可以选择显示发布推文的客户端或方式（例如‘来自网页’或‘来自\
  \ Twitter for iPhone’）。如果提供了客户端，请确保它链接到所提供的来源页面 URL。”\n  - **反例**：这仅在你的项目以 Twitter\
  \ 为中心时相关。如果你的应用更关注特定推文的内容（而非完整的 Twitter 体验），那么你可能不需要在推文中附加客户端信息。Tweetbot 会这样做（参见图\
  \ 13–2），而 Twitterific 则不会（参见图 13–3）。\n\n- **多条推文**：“如果同时显示多条推文，可以通过水平线、空白区域或交替的背景颜色在视觉上进行分隔。空白区域应与推文本体的整体高度成比例。”\n\
  \n- **反例**：我们认为这条指南不应是可选的。很难想象在什么情况下将推文呈现为离散项目列表之外的形式会是合适的。Twitterific 对推文的呈现效果很好（参见图\
  \ 13–4）。\n\n![images](img/1304.jpg)\n\n**图 13–4.** *Twitterific 的时间线*\n\n- **时间顺序**：“通常按时间倒序（最新的在前）排列推文是有意义的，但我们理解这并不总是最相关的排列方式。当作为搜索结果或按其他条件（关键词、用户或其他编辑约束）显示时，推文可按这些条件排序。”\n\
  \n- **反例**：实际上，在 App Store 上很难找到一个不按时间先后（而是按其他标准）排序推文的 Twitter API 项目。搜索是唯一显著的例外。\n\
  \n## （不）使用 Twitter 的颜色\n\n颜色是用户识别你应用功能的主要方式，也是将自己与 Twitter 平台关联起来的一种直观方法。然而，Twitter\
  \ 非常希望你能尽量减少使用其调色板以及其商标化的徽标、按钮、术语和图标。\n\n因此，Twitter API 项目的设计者并不像 Facebook 开发者遵循其平台配色方案那样，对\
  \ Twitter 的配色方案亦步亦趋。或许是希望避免惹怒 Twitter，Twitter API 应用在图标和徽标的使用上往往更加多样化。\n\n供参考，你可以在图\
  \ 13–5 中找到一些 Twitter 自身排版和徽标艺术的例子。这些按钮在网页上使用没问题，但不要在你的 iOS 应用中使用它们——除非它们链接回 Twitter.com，或者用于指示与\
  \ Twitter 的兼容性。如果你无视这些要求（在下文“使用 Twitter 商标”一节中有所总结），你可能会遇到一些麻烦。如果你想使用鸟类主题或相关素材，你需要自己设计或提供。\n\
  \n![images](img/1305.jpg)\n\n**图 13–5.** *你可以在网站中使用 Twitter 的网页按钮——但不能在你的 iOS 应用中使用，除非在特定情况下*\n\
  \n### 创建主题元素\n\n根据你的应用功能对 Twitter API 的依赖程度，你可能会发现应用看起来与官方 Twitter 应用过于相似。\n\n这就是\
  \ Twitter 给设计者指出这一点原因：你应该使用独特的品牌和徽标来设计你的站点。\n\nTwitter 还要求你遵守以下事项：\n\n- **不要** 复制\
  \ Twitter 的外观和感觉。\n- **不要** 使用任何非最新版本的 Twitter 徽标（在适当的情况下）。\n- **不要** 未经明确许可使用 Twitter\
  \ 网站上的任何其他艺术作品。\n- **务必** 使用 Twitter 的徽标创建你自己的按钮或标记。\n\n供参考，图 13–6 展示了官方 Twitter\
  \ 应用的各个方面，包括时间线（最左侧图片）、一条推文（中间图片）和用户个人资料（最右侧图片）。你需要创建你自己的视觉设计和交互设计，不要模仿此图中所示的设计。\n\
  \n![images](img/1306.jpg)\n\n**图 13–6.** *官方 Twitter 应用 UI，你不应模仿它*\n\n## 使用 Twitter\
  \ 商标\n\nTwitter 为使用 Twitter API 的开发者发布了一份关于其商标的“应做与不应做”清单。^(1) 以下是对相关要点的总结和分析。\n\
  \n你*可以*执行以下操作：\n\n- 使用当前的 Twitter 徽标或当前的 Twitter 小鸟标志作为指向 Twitter 服务的链接。\n- 使用当前的\
  \ Twitter 徽标或当前标志来表明你的产品与 Twitter 兼容。\n- 确保在提及*推文*（例如，“使用 Twitter 发推”）时包含对 Twitter\
  \ 的直接引用，或者在显示 Twitter 标志的同时提及*推文*。\n- 对徽标进行操作，除非由于你的应用中固有的颜色相关限制（例如黑白 iOS 工具栏）而必须这样做。\n\
  \n你*不得*执行以下操作：\n\n___________________\n\n¹ `http://support.twitter.com/entries/77641`\n\
  \n- 以可能暗示虚假的合作伙伴关系或对你的品牌进行背书的方式使用这些标志。\n- 以任何方式扭曲或篡改 Twitter 标志。\n- 以一种使 Twitter\
  \ 品牌与其他品牌混淆的方式使用标志。\n- 使用 Twitter 小鸟作为代言人来承载你的徽标或消息。\n\n\n\n# App Store 中的广告宣传\n\
  \nTwitter 对在 App Store 中进行广告宣传也有以下准则：\n\n- *可以*使用未登录状态的 Twitter 首页、Twitter 关于我们页面，甚至是\
  \ `@twitter` 个人资料页的截屏。\n- *不要*在未经他人许可的情况下，使用他人的个人资料页或推文截屏。\n\n# 我们并不了解你\n\nTwitter\
  \ 还要求你遵守以下准则：\n\n- 在提及 Twitter 服务或公司时，请使用 *Twitter*；在提及 Twitter 服务上的消息或更新时，请使用 *推文*（首字母*大写*）。\n\
  - 不要对 Twitter 服务做出不准确的陈述。（这还用说！）\n- 不要以暗示合作或背书的方式来提及 Twitter。\n\n## Twitter 的导航范式\n\
  \nTweetie 是如今官方 Twitter 应用的前身，其创造者 Loren Brichter 最初构想该项目时，只想做一个简单的滚动项目。正如他在 2009\
  \ 年所说，他并没有对 Tweetie 做任何特别的事情，只是让它快速运行，并遵循了苹果人机界面指南（当时尚未更新 iOS 版本）的精神：^(2)\n\n> *大约在同一时间，他与\
  \ Verizon Wireless 的合约到期了，并最终买了一部 iPhone。他开始搜索 App Store。“我发现根本没有好的 Twitter 应用，”他回忆道。“但糟糕的应用却有好几亿个。”他觉得自己能写一个更好的应用。“是什么触发了我去做这件事呢？我曾经用过\
  \ Twitterific，那时大家都在用。我想：为什么滚动速度这么慢？我能不能让它更快？”一个小时内，他就构建了一个快速滚动推文列表的原型。然后，经过两周疯狂的编码，他构建出了\
  \ Tweetie，如图 2-1 所示，截至本文撰写时，它是所有平台上最受欢迎的移动 Twitter 客户端，也是 iPhone 上最受欢迎的 Twitter\
  \ 应用。*\n>\n> *“问题不在于其他应用如何使用 Twitter 的 API，而在于它们与 iPhone 操作系统交互的方式，”他说。“它们要么完全采用自定义方式，要么完全搞错了方向。”他的反感甚至并非针对\
  \ Twitterific，尽管它是 Tweetie 的直接催化剂。“说实话，我对 Twitterific 没什么意见，”他说。“它们是前一年的 ADA（苹果设计大奖）得主，大家都喜欢那个应用。只是它不符合我使用\
  \ Twitter 的方式。”*\n\n____________________________\n\n² 摘自 Chris Dannen 所著《iPhone\
  \ Design Award Winning Projects》第 4 页 (Apress, 2009)\n\n当 Brichter 从头开始将 Tweetie\
  \ 重建成 Tweetie 2 时，他彻底重新构思了用户界面。一个令人惊讶的添加是在屏幕底部加入了一个动态应用栏。你可以看到这个应用栏在 图 13–7 的不同视图间变化。\n\
  \n![images](img/1307.jpg)\n\n**图 13–7.** *Twitter 的动态工具栏违背了 iOS 的惯例。左侧是用户个人资料页显示的工具栏；右侧是查看推文时显示的工具栏。*\n\
  \n与预装的 iOS 应用不同，Tweetie 2（后来成为官方 Twitter 应用）中的应用栏的图标会根据用户正在查看的内容而变化。当被问及为何在 Tweetie\
  \ 2 中背离苹果的先例时，Brichter 说道：^(3)\n\n____________________________\n\n³ 同上。\n\n> *采用应用全局标签栏是极其受限的。在\
  \ Tweetie 2 中，我优化的是导航堆栈的*深度*。通过一个根据当前上下文变化的、特定于屏幕的底部栏，你可以展示大量信息，而无需用户进行过多的层层下钻。*\n\
  >\n> *苹果不这样做。事实上，他们不推荐我做我正在做的事情。虽然我认为 Tweetie 2 是一款非常优秀的、具有 iPhone 风格的 iPhone 应用，但我正在背离\
  \ HIG，因为我认为苹果的建议过于局限。一个浅层应用可以使用应用全局标签栏，但一个内容丰富、层级复杂的应用不行。而 Tweetie 2 正是后者。*\n>\n\
  > *Tweetie 2 中的技巧让你无需通过点击……点击……点击……将大量视图控制器推入导航栈，就能探索海量信息。举个简单的例子，假设我在时间线中看到一条推文。有用户正向\
  \ Twitter 世界提问。我想查看回复。我可以滑动这条推文，点击用户详情按钮，然后在推送出的用户详情屏幕中点击 @ 标签页。这样我就能查看来自所有人的、对该用户的回复了，而距离我起始的视图控制器，仅仅相差*一个*层级。*\n\
  >\n> *推文列表 -> 最近提及该用户的消息*\n>\n> *如果不针对导航堆栈深度进行优化，想象一下如果每个导航操作我都必须推送一个新的视图控制器：*\n\
  >\n> *推文列表 -> 推文详情 -> 用户详情 -> 最近提及该用户的消息。*\n>\n> *这体验太差了。*\n>\n> *在 Tweetie 2 中，对于这些上下文相关的标签栏，我并没有使用普通的标签栏。我是用自定义代码绘制它们的。我希望它们看起来很熟悉，但又足够不同，这样用户就不会期望它们是标准的应用全局标签栏了。*\n\
  \n尽管 Brichter 的方式现在已成为官方 Twitter 应用的标准做法，但他并不推荐大多数 Twitter API 项目效仿。只是因为 Tweetie\
  \ 试图复制 Twitter 网站的全部功能（甚至更多），才使得它变得足够复杂，需要一个动态应用栏。鉴于现在大规模复制 Twitter 功能违反了 Twitter\
  \ 的开发者条款，Brichter 表示，在你的应用中很可能不需要遵循这个范式：\n\n> *我不建议每个人都效仿我。Twitter 的信息*极其*丰富。很有可能大多数其他应用都足够浅层，使用应用全局标签栏或简单的逐层下钻就已经足够了。^(4)*\n\
  \n____________________________\n\n⁴ 同上。\n\n### Twitter 徽标与图标\n\nTwitter 提供以下徽标和图标供下载，以便你在应用中恰当地展示\
  \ Twitter 品牌。（关于使用 Twitter 品牌素材的规则和准则，已在本章前文讨论过。）你可以通过以下网址下载 图 13–8 中显示的图形：\n\n\
  [`http://twitter.com/about/resources/logos`](http://twitter.com/about/resources/logos)\n\
  \n![images](img/1308.jpg)\n\n**图 13–8.** *Twitter 徽标与图标，请谨慎使用*\n\n如前所述，Twitter 强烈不建议在第三方应用中使用其颜色和徽标。这一事实让许多开发者陷入困境，他们试图让图标准确地让人联想到\
  \ Twitter，却又不能直接引用公司本身。各种鸟类图案已成为 Twitter 客户端的标准配置（见 图 13–9）；但鉴于 Twitter 新条款不允许再出现新客户端，Twitter\
  \ 在 App Store 中的可见度将变得更低。遵循这些准则，让你的 Twitter 图标设计独具特色，并与你应用的视觉设计相匹配。\n\n![images](img/1309.jpg)\n\
  \n**图 13–9.** *App Store 中各种图标向 Twitter 品牌致敬的方式*\n\n\n\n### 启动画面\n\n在当今快速加载应用的 iOS\
  \ 设备上，启动画面并非必需。但你应在多代设备上测试应用。如果较旧的 iOS 设备出现卡顿，请尝试通过编程手段优化加载时间。若底层优化已无余地，可考虑为应用添加启动画面来欢迎等待中的用户。这既能消磨等待时间，也能让您展示品牌形象、留下良好第一印象。如果应用加载需要一两秒以上，建议快速跳过启动画面，转而呈现功能受限的应用界面视图。同时，持续显示应用正在加载信息的状态，并在网络连接中断时及时通知用户。\n\
  \n### 视觉素材（即例外情况）\n\n根据本章讨论的指南，图 13-10 所示的视觉指示器可供下载并允许在应用中使用。iOS 首选的 PNG 版本也以*精灵图*形式提供。要下载这些图形，请访问以下网址：\n\
  \n[`http://dev.twitter.com/pages/image-resources`](http://dev.twitter.com/pages/image-resources)\n\
  \n![images](img/1310.jpg)\n\n**图 13-10.** *Twitter 提供的精灵图，可供在您的应用中使用*\n\n### 项目命名指南\n\
  \nTwitter 整理了在命名项目时引用 Twitter 的注意事项，本节将进行说明。¹\n\n在命名项目并引用 Twitter 时，请遵循以下规范：\n\n\
  - 为网站、产品或应用取一个独特的名称。使用 *Tw-* 和 *Twit-* 前缀通常可以接受。\n- 可在网站上说明您的应用构建于 Twitter 平台之上，以便用户了解产品背景。\n\
  - 仅在应用专门为 Twitter 平台设计时，才可在名称中使用 *Tweet* 一词。\n\n*禁止*在命名项目并引用 Twitter 时出现以下行为：\n\n\
  - 在网站或应用名称中使用 *Twitter*。\n- 单独使用 *Tweet*，或将其与简单的字母/数字组合搭配（例如 *1Tweet*、*Tweet* 或\
  \ *Tweets*）。\n- 注册包含 *twitter*（或其拼写变体）的域名。\n- 申请包含 *Twitter*、*Tweet* 或类似变体的商标。\n\
  - 如果应用与其他平台共用，则在名称中使用 *Tweet*。\n\n### 离线展示指南\n\n如果您正在开发某种 Twitter 可视化工具，或计划让应用通过\
  \ iPad 在更大屏幕上展示，则需遵循本节所述的离线展示要求。\n\n例如，允许以下操作：\n\n- 在推文播出期间，将 Twitter 徽标放置在推文附近。\n\
  - 确保 Twitter 徽标尺寸与内容比例合理。\n- 为每条推文附带用户名。若涉及用户隐私或播出标准问题，需联系 Twitter 申请例外（除非已与 Twitter\
  \ 达成事先协议）。\n- 使用推文的完整文本。若涉及隐私或播出标准问题，需联系 Twitter 申请例外（除非已与 Twitter 达成事先协议）。\n\n\
  同时，以下行为*禁止*：删除、遮盖或篡改用户身份标识。在涉及用户安全等特殊情况下，可匿名展示推文。允许以聚合或可视化形式展示无归属的数据，但必须保留 Twitter\
  \ 徽标。\n\n要查看 Twitter 的完整离线展示和媒体播出指南，请访问以下网址：\n\n[`http://support.twitter.com/entries/77641`](http://support.twitter.com/entries/77641)\n\
  \n### 通知处理\n\n直到 2011 年春季，官方 Twitter 应用对通知的处理仍较为保守：仅在收到 `@reply` 或私信时才会推送提醒。整体而言，作者们认为这恰恰是\
  \ Twitter 应用所需的全部通知功能。\n\n但在 2011 年 3 月，Twitter 推出了名为 *QuickBar* 的新功能，原设想为 Twitter\
  \ 编辑团队提供一种方式，将热门话题（或付费推广推文）展示在用户时间线顶部。然而，这反而引发了用户的强烈不满，被戏称为 *Dickbar*。\n\n对于一款堪称\
  \ iOS 设计典范的应用而言，这无疑是一个重大失误。各媒体纷纷批评 Twitter 的失策，舆论压力最终迫使该公司在后续更新中移除了 QuickBar。² Mac\
  \ 开发者 Marco Arment 在其博客上的反应尤为犀利，生动诠释了优秀 iOS 应用的核心要素：贯穿每个屏幕的清晰目标定位。\n\n请注意，在他批评文的结尾，他根据三个标准对\
  \ QuickBar 进行了评估：\n\n- 我是否应该转发这个内容？\n- 我是否应该保存这个搜索？\n- 我是否应该阅读这些推文？\n\n这些正是 Twitter\
  \ 的核心功能，因此任何使用 API 的功能都至少应与其中几个方面有所关联。以下是 Arment 博文的编辑版本：³\n\n> *Twitter 的官方 iPhone\
  \ 应用（前身为 Loren Brichter 开发的 Tweetie，原本是一款出色的客户端）因最近添加的 QuickBar 功能招致大量负面反馈。该功能是在推文列表顶部强制显示热门话题横幅。许多人对此深恶痛绝，称其为“Dickbar”，并因此彻底弃用\
  \ Twitter 应用。*\n> \n> *最初实现时，它作为浮动覆盖层出现在应用的所有操作界面之上，情况更糟。现在，它仅固定在主时间线顶部，并随列表滚动。但这仍然让大多数当初就反感它的人感到冒犯，因为让它随列表滚动并没有解决其强制存在且无法关闭的问题。*\n\
  \n¹ [`http://support.twitter.com/entries/77641`](http://support.twitter.com/entries/77641)\n\
  \n² [`http://blog.twitter.com/2011/03/so-bar-walks-into-app.html`](http://blog.twitter.com/2011/03/so-bar-walks-into-app.html)\n\
  \n³ [`http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive`](http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive)\n\
  \n\n\n> *推特新增快捷栏（QuickBar）的原因，推测是为了展示带有“推广”标签的广告。*\n> \n> *如果它只展示这类广告，我认为用户的反应不会如此负面。更大的问题在于，它大部分时间都在展示随机“热门”话题或标签。以下是我在过去\
  \ 24 小时内看到的几个话题：*\n> \n> *洛瓦托与戈麦斯*\n> \n> *克里斯·布朗冠军专辑*\n> \n> *格斯·约翰逊*\n> \n> *#关于我的\
  \ 100 个事实*\n> \n> *狼獾队*\n> \n> *新势力（Cingular）*\n> \n> *全球移动通信系统（GSM）*\n> \n> *#密歇根州*\n\
  > \n> *它就像一个只显示单个词条的新闻滚动条，缺乏任何上下文，播放的大多是我不理解的话题。更糟糕的是，它出现在一个本应只包含我（间接）选择的内容的上下文中——我的推特时间线。*（我根据自己想在时间线上看到的内容选择了关注对象。）我对体育、名人或中学调查趋势不感兴趣，因此我不会关注那些用这些无关内容淹没我时间线的人。\n\
  > \n> *我选择关注的内容，以及……密歇根州。我甚至不知道这到底是什么意思。想必是发生了与密歇根州相关的新闻，而推特希望用户点击这个孤立无援的词语，原因却未向我们明确说明。*\n\
  > \n> *于是我点击了它。*\n> \n> *我从上到下看到了：有意的垃圾信息、无意的垃圾信息，以及一个陌生人关于体育的、我毫不在意的轻浮无聊推文。*（我往下滚动，情况更糟了。）我猜“#密歇根州”是热门话题，是因为密歇根州某支体育队发生了什么重要事件。\n\
  > \n> *我该拿这条信息怎么办？*\n> \n> *我应该就此发推文吗？如果是，界面为何不鼓励这样做？即使我从此屏幕点击（几乎看不见的）新推文按钮，我的推文也不会预填“#密歇根州”，因此我回应说的任何话都不会被收录其中。*\n\
  > \n> *我应该保存这个搜索吗（界面确实鼓励这样做），以便几天、几周或几个月后，当这个话题可能已不再连贯或有意义时还能看到？*（暂且不提它现在既不连贯也无意义。）\n\
  > \n> *我应该阅读这些推文吗？如果是，为什么没有采用更强的反垃圾信息措施或人工过滤机制来保持信息流的可读性？目前来看，它是一个巨大且极易被利用的垃圾信息目标，而且显而易见。*\n\
  > \n> *我们不知道推特添加快捷栏的真实原因。推测这是一个长期战略的一部分。但今天，从这里看来，它像一个考虑极其不周的功能，最初发布时实现得极其糟糕，似乎对用户没有任何益处。*\n\
  > \n> *这对我们来说如此刺眼，因为它与迄今为止我们熟知的推特太不一样了。推特的产品方向通常非常出色且深思熟虑，他们的实现通常是谨慎和周全的。*\n> \n\
  > *而在这个主要是由洛伦·布里希特在推特从他手中收购之前精心构建的应用背景下，我们习惯了布里希特更高的标准，这些标准曾让 Tweetie 在 2009 年赢得苹果设计奖。*（我怀疑他在快捷栏的存在、设计或放置上几乎没有话语权，这大概让他内心备受煎熬。）\n\
  > \n> *快捷栏令人反感，不是因为我们不希望推特通过广告赚钱，或者我们反对界面上的改变。*\n> \n> *它令人反感，是因为它糟糕透顶，完全无视质量、产品设计和对用户的尊重，而我们对推特的期望远不止于此。*\n\
  \n#### 来自网页应用的设计技巧\n\n推特面向触摸的移动网页应用中，有一些方面让其原生 iOS 应用相形见绌。我们喜欢它呈现推文操作选项（如转发、回复和收藏）的方式，无需滑动推文。编写推文无需操作按钮也很酷：你只需放置光标并开始输入即可。图\
  \ 13–11 并排展示了移动网页应用（左）和原生 iOS 应用（右）。\n\n![images](img/1311.jpg)\n\n**图 13–11.**\
  \ *推特的移动网页应用（左）对比其 iOS 应用（右）*\n\n### 结论\n\n推特对规则和条例的热衷，作为其作为某种信息基础设施新兴角色的副产品，是可以理解的，尽管有些烦人。虽然这严重限制了你构建自己推特体验的方式，但也为那些不仅仅展示滚动时间线的应用开辟了可能性。不幸的是，这意味着一个好的推特\
  \ API 项目可能需要比洛伦·布里希特构建 Tweetie 1 时付出更多的汗水。\n\n接下来，我们将讨论 Facebook 的设计惯例。\n\n## 第\
  \ 14 章：Facebook 用户界面设计\n\nFacebook 应用是应用商店中最不寻常的应用之一；它也是全球最大社交网络在任何平台上功能最强大的客户端。如果它看起来像是\
  \ iPhone 中的 iPhone，那是因为 Facebook 平台与 iOS 一样强大。图 14–1 展示了 Facebook 应用类似 iOS 的网格界面。\n\
  \n![images](img/1401.jpg)\n\n**图 14–1.** *Facebook 是第一个在应用内重现 iOS “网格”界面的主要平台。*\n\
  \n### 可用性优先事项\n\nFacebook API 项目的优先事项应与推特项目略有不同。这些优先事项应包括：\n\n*   *查找人物*：用户在 Facebook\
  \ 上更频繁地查询其他用户，并且有更多信息需要呈现，因此应优先处理这些任务。\n*   *联系与被联系提醒*：Facebook 应用会为你发送最多九种提醒的推送通知和/或振动。相比之下，推特只有两种。Facebook\
  \ 是一个需要用户主动参与的应用，拥有非常活跃的用户群。这些用户习惯于及时收到通知并迅速沟通。图 14–2 展示了 Facebook 的推送通知选项。\n\n\
  ![images](img/1402.jpg)\n\n**图 14–2.** *Facebook 的推送通知偏好设置非常精细，允许用户之间快速互动。*\n\n\
  *   *为用户提供上下文*：Facebook 是一个非常强大的平台，许多应用仅复制了其网页应用的部分功能。这可能导致用户期望你的应用中存在一些不具备的任务。你可以通过为应用选择一个描述性的名称，并以用户能直观理解其功能的方式安排核心控件来改善这一点。这对于发布内容尤为重要：用户必须知道内容发布到何处以及谁会看到它。如有必要，可使用帮助提示；但应在应用内部使用，而不是像\
  \ MyPhone+ 那样作为弹出对话框使用（参见图 14–3）。需要说明的是，我们也不建议告诉用户在安装后重启。\n\n![images](img/1403.jpg)\n\
  \n**图 14–3.** *不要这样做。*\n\n#### 创建你自己的界面\n\n正如我们在第 11 章中讨论的，Facebook 的条款做出了以下规定（参见图\
  \ 14–4）：\n\n> “Facebook 站点功能不得被模仿。”¹\n\n如果你的应用看起来太像 Facebook，运行起来也太像 Facebook，你很可能会收到\
  \ Facebook 代表的警告。不过，你可能会感兴趣地发现，这样做的原因实际上对用户以及 Facebook 都有益。Facebook for iOS 的原始开发者乔·休伊特解释了\
  \ Facebook 的理由：\n\n\n\n> *应用的首个版本确实在底部设有标签栏，但我将其移除了，因为我觉得 Facebook 本身就是一个平台，而每个标签栏几乎都像是独立的应用程序，确实需要全屏显示。*\n\
  > \n> *我必须着眼未来；我们有很多新应用即将推出，我认为 Facebook 的运作模式更适合将其本身定位为一个“手机”。Facebook 拥有自己的聊天、电话簿、邮件、照片和应用，因此将所有内容塞进标签栏会显得过于局限。采用这种模式——它就像一个\
  \ iPhone 的主屏幕——将能使其不断成长并变得功能齐全。这也为我们提供了空间，可以在应用内部添加更多应用。*\n> \n> *我其实没怎么见过其他应用采用[网格布局]，而且我也不太推荐别人这么做。Facebook\
  \ 在广度和用户在其上进行的操作种类上都很独特。我一度对构建网格布局犹豫不决，但当我不断调整布局，试图将所有内容都塞进标签栏时，我觉得这（网格布局）是最好的解决方案。我本以为会有更多人抱怨，但结果似乎还不错。*\n\
  > \n> *[点击次数]的经济性始终是一个驱动因素，但与始终显示的标签栏相比，网格布局增加了一次点击[因为你需要点击网格按钮]。这是我认为必要的权衡。在屏幕杂乱（增加标签）和点击次数之间，总需要找到一种平衡。*\n\
  > \n> *创建 Facebook 的视图控制器涉及哪些工作？*\n> \n> *我做了很多自定义的内容。这个应用构建在我创建的一个名为 Three20 的开源框架之上，它使用自己的视图控制器，所有这些控制器都需要我编写。我不得不尝试重新设计苹果的照片浏览应用和苹果的邮件撰写工具，还有其他一些东西。*²\n\
  \n_________\n\n¹[`http://developers.facebook.com/policy/`](http://developers.facebook.com/policy/)\n\
  \n## Facebook 加载项目³\n\n该项目展示了 Facebook 应用在发布内容之前，是如何缓存旧信息并检查可用服务的。休伊特这样解释：\n\n>\
  \ *应用中的所有内容都是这样工作的。有一个磁盘缓存，所以当你加载事件、笔记或请求时，它们会被缓存。这样当你返回应用时，我们会显示缓存版本。在显示缓存版本的同时，我们会尝试加载最新版本。如果缓存超过一周——或者若干天，我忘了具体数字——应用会向你显示“加载中”，并清除旧内容。*\n\
  > \n> *在这个系统建立之前，无论你走到哪里，都会看到一个不停旋转的小菊花——加载、加载、加载。我认为，在新内容加载进来时，能立刻看到一些可以交互的内容，感觉会更好。*\n\
  \n接下来的代码是 Facebook 应用磁盘缓存框架的摘录，该框架用于替代 Cocoa 中获取网络数据（本例中是从 Facebook 服务器获取）的类。休伊特编写了\
  \ Three20 框架，使得缓存可以存储在磁盘上。而在苹果的框架中，则需要使用内存。以下是代码本身：\n\n```\n- (NSData*)generatePostBody\
  \ {\n  NSMutableData* body = [NSMutableData data];\n  NSString* beginLine = [NSString\
  \ stringWithFormat:@\"\\r\\n--%@\\r\\n\", kStringBoundary];\n\n  [body appendData:[[NSString\
  \ stringWithFormat:@\"--%@\\r\\n\", kStringBoundary]\n    dataUsingEncoding:NSUTF8StringEncoding]];\n\
  \n  for (id key in [_parameters keyEnumerator]) {\n    NSString* value = [_parameters\
  \ valueForKey:key];\n    // Really, this can only be an NSString. We're cheating\
  \ here.\n    if (![value isKindOfClass:[UIImage class]] &&\n        ![value isKindOfClass:[NSData\
  \ class]]) {\n      [body appendData:[beginLine dataUsingEncoding:NSUTF8StringEncoding]];\n\
  \      [body appendData:[[NSString\n        stringWithFormat:@\"Content-Disposition:\
  \ form-data; name=\\\"%@\\\"\\r\\n\\r\\n\", key]\n          dataUsingEncoding:_charsetForMultipart]];\n\
  \      [body appendData:[value dataUsingEncoding:_charsetForMultipart]];\n    }\n\
  \  }\n\n  NSString* imageKey = nil;\n  for (id key in [_parameters keyEnumerator])\
  \ {\n    if ([[_parameters objectForKey:key] isKindOfClass:[UIImage class]]) {\n\
  \      UIImage* image = [_parameters objectForKey:key];\n      CGFloat quality =\
  \ [TTURLRequestQueue mainQueue].imageCompressionQuality;\n      NSData* data = UIImageJPEGRepresentation(image,\
  \ quality);\n\n      [self appendImageData:data withName:key toBody:body];\n   \
  \   imageKey = key;\n\n    } else if ([[_parameters objectForKey:key] isKindOfClass:[NSData\
  \ class]]) {\n      NSData* data = [_parameters objectForKey:key];\n      [self\
  \ appendImageData:data withName:key toBody:body];\n      imageKey = key;\n    }\n\
  \  }\n\n  for (NSInteger i = 0; i < _files.count; i += 3) {\n    NSData* data =\
  \ [_files objectAtIndex:i];\n    NSString* mimeType = [_files objectAtIndex:i+1];\n\
  \    NSString* fileName = [_files objectAtIndex:i+2];\n\n    [body appendData:[beginLine\
  \ dataUsingEncoding:NSUTF8StringEncoding]];\n    [body appendData:[[NSString stringWithFormat:\n\
  \                       @\"Content-Disposition: form-data; name=\\\"%@\\\"; filename=\\\
  \"%@\\\"\\r\\n\",\n                       fileName, fileName]\n          dataUsingEncoding:_charsetForMultipart]];\n\
  \    [body appendData:[[NSString stringWithFormat:@\"Content-Length: %d\\r\\n\"\
  , data.length]\n          dataUsingEncoding:_charsetForMultipart]];\n    [body appendData:[[NSString\
  \ stringWithFormat:@\"Content-Type: %@\\r\\n\\r\\n\", mimeType]\n          dataUsingEncoding:_charsetForMultipart]];\n\
  \    [body appendData:data];\n  }\n\n  [body appendData:[[NSString stringWithFormat:@\"\
  \\r\\n--%@--\\r\\n\", kStringBoundary]\n                   dataUsingEncoding:NSUTF8StringEncoding]];\n\
  \n  // If an image was found, remove it from the dictionary to save memory while\
  \ we\n  // perform the upload\n  if (imageKey) {\n    [_parameters removeObjectForKey:imageKey];\n\
  \  }\n\n  TTDCONDITIONLOG(TTDFLAG_URLREQUEST, @\"Sending %s\", [body bytes]);\n\
  \  return body;\n}\n```\n\n_________\n\n²/《iPhone 设计大奖获奖项目》/ 作者：Chris Dannen (Apress,\
  \ 2009)\n\n![images](img/1404.jpg)\n\n**图 14–4.** *Facebook 更希望你不要抄袭其视觉设计，但很多开发者仍然照做不误。这是你自己应该避免这样做的又一个原因。*\n\
  \n### 主题与图标\n\n根据 Facebook 的规定，你不应模仿 Facebook 的视觉设计或其图标体系。然而，这显然无法阻止许多开发者恰恰这么做。那么，作为\
  \ Facebook 的新开发者，该怎么做呢？\n\n在我们看来，在某些情况下，采用与 Facebook 类似的配色方案是非常合适的。如果你的应用将提供大量的\
  \ Facebook 功能（当然，除此之外还有其他功能），那么让用户置身于一个带有 Facebook 风格（但并非复制）的环境中，可能会对用户有所启发（参见图\
  \ 14–5）。\n\n#### 第三方资源\n\n![images](img/1405.jpg)\n\n**图 14–5.** *如果你必须汲取灵感，请考虑\
  \ Facebook 的交互设计及其设计惯例，并尝试向其致敬。*\n\n图 14–5 展示了一套第三方 Photoshop 图片。它们可免费使用。它们也适用于网页设计师，但别让这限制了你。这些视觉设计应该能帮助你制作应用原型，或借用你喜欢的\
  \ Facebook UI 中的某些方面。请记住不要过度借用，因为在你的应用中复现 Facebook UI 是违反 API 条款和条件的。\n\n你可以从 Surgeworks\
  \ 的以下网址下载这套免费的 Facebook UI 工具包：\n\n[`http://surgeworks.com/blog/design/facebook-gui-free-psd-resource`](http://surgeworks.com/blog/design/facebook-gui-free-psd-resource)\n\
  \n\n\n### 创建主题元素\n\n在能力范围内，设计你自己的配色方案、品牌标识、Logo 和图标。\n\n不仅 Facebook 不鼓励开发者使用其蓝白配色方案，常识也是如此。应用商店中质量上乘、使用\
  \ Facebook API 的 iOS 应用凤毛麟角——但糟糕的应用却比比皆是。大多数低质量的应用都无耻地模仿 Facebook 的颜色和图标。抄袭 Facebook\
  \ 不仅违反规则，而且显得相当低端。\n\n幸运的是，即使没有那种千篇一律的样式表，Facebook 仍然很实用。社交聚合器 `Hootsuite` 和阅读器应用\
  \ `Taptu` 就是两个例子，它们通过独特的配色方案和品牌标识，以别具一格的方式呈现 Facebook 内容。\n\n#### Hootsuite\n\n\
  正如你在图 14-6 中所见，`Hootsuite` 的青色配色方案看起来更像 Twitter 而不是 Facebook。但它的视觉元素和应用栏更像是这两个社交网络的一个奇怪混合体——而不是对其中任何一个的简单复制。\n\
  \n![images](img/1406.jpg)\n\n**图 14-6.** *Hootsuite 融合了 Facebook 和 Twitter 的颜色与惯例，这是它避免看起来太像其中任何一个的方式。*\n\
  \n#### Taptu\n\n`Taptu` 是一款适用于 iPhone 和 iPad 的应用，它将 RSS 订阅源、社交新闻和其他内容汇总到比传统阅读器更易阅读的*信息流*中。正如你在图\
  \ 14-7 中所见，Facebook 动态像其他任何动态一样被打包呈现，状态更新（及其作者和时间戳）以时间线顺序排列，隐约带有 Twitter 风格。这是另一种符合其平台设计规范的混合设计。\n\
  \n![images](img/1407.jpg)\n\n**图 14-7.** *Taptu 对动态消息的诠释*\n\n### Facebook 艺术规则\n\
  \n正如我们在本章开头所说，Facebook 并没有像 Twitter 那样为商标和视觉资产制定一套繁复的规则。这可能是许多应用开发者在创建应用图标和界面时随意借鉴的原因之一。\n\
  \n上一节指导您创建自己的主题元素。这样做时，根据 Facebook 的要求，您需要牢记几条简要准则：\n\n*   未经 Facebook 书面许可，您的广告不得包含或附带任何平台集成，包括诸如`点赞`按钮之类的社交插件。\n\
  *   开发者不得以暗示 Facebook 参与或认可的方式推销自己。\n*   开发者还应避免使用 Facebook 的 Logo、商标或网站术语。这些包括但不限于\
  \ `Facebook`、`The Facebook`、`FacebookHigh`、`FBook`、`FB`、`Poke`、`Wall` 以及其他公司图形、标识、设计或图标。\n\
  \n如果您想阅读完整的 Facebook 广告准则，请访问此链接：\n\n[`http://www.facebook.com/ad_guidelines.php`](http://www.facebook.com/ad_guidelines.php)\n\
  \n### 按钮文本\n\n以下是几个允许 Facebook 开发者使用的按钮文本示例：\n\n*   `Post`\n*   `Share`\n*   `Publish`\n\
  *   `Add to Profile`\n\n以下是 Facebook 认为过于模糊而无法使用的按钮文本示例：\n\n*   `Ignore`\n*   `OK`\n\
  *   `Share ' Continue`\n*   `Request`\n\n### Facebook 导航\n\n由于其网格化的用户界面，官方的 Facebook\
  \ 应用设定了一些奇怪的导航范式。事实上，它借鉴了很多 Android 的设计，也借鉴了一部分 webOS 的设计。Facebook 应用的做法如下：\n\n\
  *   使用长按操作来模拟 iOS 应用图标的“抖动”效果。\n*   使用从屏幕底部升起的状态栏（类似于 Android）来显示通知。\n*   在应用内部设有“应用”，就像\
  \ iOS 用户界面一样。\n*   当你点击标题栏时，会显示闪烁动画，类似于 HP webOS。\n\n**注意：** 不要复制 Facebook 的用户界面和导航。\n\
  \n我们喜欢所有这些小特色，并且不希望官方的 Facebook 应用以其他任何方式运行。但我们不建议您模仿这些范式中的任何一个。它们在 iOS 上显得格格不入（至少目前如此），并且只会让您的用户感到困惑。\n\
  \n### 显示进度\n\n正如我们在本章前面所讨论的，向用户显示进度是应用反馈的重要组成部分。在官方的 Facebook 应用中，用户永远不会看到空白的动态消息；如果无法找到网络连接，应用会显示其最近在后台缓存的更新。Facebook\
  \ 用户无疑已经习惯了 Facebook iOS 和 Web 应用的速度和效率，所以您最好尽量不要让他们等待。\n\n如果必须显示进度，请使用活动指示器，并考虑在操作需要花费大量时间时向用户显示警告信息；然而，活动指示器绝不应阻止用户切换标签页或撰写其他内容。集成了\
  \ Facebook 的 `MyPhone+` 应用只有一个主要任务，而且这是一个重要的任务。该应用很好地处理了这个任务，正如你在图 14-8 中所见。\n\n\
  ![images](img/1408.jpg)\n\n**图 14-8.** *MyPhone+ 为其核心任务显示了一个进度指示器，但这仅在特定情况下才是个好主意。*\n\
  \n\n\n#### 核心 Three20 组件\n\n如你在第 10 章所学，Three20 项目是 Facebook iOS 开发者乔·休伊特送给 Facebook\
  \ 开发者社区的礼物：一套他专为 Facebook iOS 版应用自行构建的完整框架。\n\n该项目是开源的，包含了 Facebook 应用的几个组成部分。这些部分包括照片查看器、消息编辑器、网络图像视图以及其他实用功能。你可以通过以下\
  \ URL 找到它们的 Git 地址：\n\n[`http://joehewitt.com/post/the-three20-project/`](http://joehewitt.com/post/the-three20-project/)\n\
  \n以下是你设计应用时需要了解的一些组件，以及乔对各组件的描述：\n\n- **照片查看器**：“`TTPhotoViewController` 模仿了苹果相册应用的全部缩放与滑动体验。你可以提供自己的‘照片源’，其工作原理与\
  \ `UITableView` 使用的数据源类似。与苹果相册应用不同，它不仅限于本地存储的照片。你的照片可以从网络加载，长列表照片可以增量加载。此版本还支持缩放（与当前\
  \ Facebook 应用中的版本不同）。”\n- “这大概是我在整个 Facebook for iPhone 项目中最耗时的部分了，所以如果我能帮别人省下这些时间，我会睡得更好。”\n\
  - **消息编辑器**：“`TTMessageController` 模仿了苹果邮件应用中的消息编辑器。你可以自定义它以发送任何类型的消息。包含你自己的消息字段集，或使用标准的`收件人:`和`主题:`。收件人姓名可以通过你提供的数据源自动补全。”\n\
  - **网络图像视图**：“`TTImageView` 让显示图像变得和 HTML 中一样简单。只需提供图像的 URL，`TTImageView` 就会高效地加载并显示它。`TTImageView`\
  \ 还与下面描述的 HTTP 缓存协同工作，尽可能避免网络请求。”\n- **网络感知表格视图控制器**：“`TTTableViewController` 和\
  \ `TTTableViewDataSource` 帮助你构建从互联网加载内容的表格。与 `UITableView` 默认假设你已准备好所有数据不同，`TTTableViewController`\
  \ 允许你在数据加载时、出现错误或没有内容可显示时进行通信。它还帮助你添加‘更多’按钮以加载下一页数据，并可选择支持通过摇晃设备来重新加载数据。”\n- **文本输入字段**：“`TTTextEditor`\
  \ 是一个 `UITextView`，它能在你输入时自动增加高度。我在 Facebook 聊天中输入消息时使用它，其行为与苹果短信应用中的编辑器类似。”\n-\
  \ “`TTPickerTextField` 是一个输入预测 `UITextField`。当你输入时，它会搜索数据源，并在你选择预测选项时向文本流中添加气泡。我在\
  \ `TTMessageController` 中使用它来选择消息收件人的姓名。”\n\n#### Web 应用的设计技巧\n\nFacebook 的触屏版 Web\
  \ 应用的设计可以说与其 iOS 应用同样出色（参见图 14-9）。尽管它受到浏览器环境的种种限制，但仍有一些优秀的设计模式可供借鉴（这与网格布局不同）。\n\n\
  ![images](img/1409.jpg)\n\n**图 14-9.** *面向 Mobile Safari 用户的 Facebook 主页*\n\n#####\
  \ 标签式方法\n\n标签曾用于早期版本的 Facebook for iOS 应用，但随着应用功能日益丰富，标签迅速变得杂乱无章。Web 应用更长久地保留了标签浏览方式，但其开发者最近重新设计了应用的导航栏，使其仅包含四项内容：\n\
  \n- 个人主页\n- 消息\n- 更多（好友、照片、地点、群组、活动、笔记、通知、设置和退出）\n- 搜索按钮\n\n我们认为这些标签的内容反映了我们在本节开头确立的\
  \ Facebook 可用性优先级：\n\n- 查找他人\n- 联系他人\n- 情境\n\n至此，我们的讨论又回到了原点！\n\n### 结论\n\n这是一个热潮过后的时代。Web\
  \ 开发者曾蜂拥而至 Twitter 和 Facebook 的 API，iOS 开发者紧随其后。但这种涌入使得这些平台的管理趋于保守，因为它们试图保护并维持自身的增长。没人想毁掉一件好事，这些平台构建了一套规则和条款体系，确保除了它们自己之外，无人能玷污其名誉。\n\
  \n这对开发者和设计师的创造力来说并非死刑。相反，它迫使他们创造出能真正为平台增加价值的应用。我们鼓励你思考使用 Facebook 和 Twitter 的未尝试过的方式——或此前未做对的方式。当你发现一种独特的体验并了解其受众时，你需要设计能体现应用个性的视觉素材。在\
  \ App Store 中，外表并非一切。它仅仅*几乎*是一切。\n\n## 索引\n\n### 符号与数字\n\n`#`（话题标签），Twitter，189\n\
