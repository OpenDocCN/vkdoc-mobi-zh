- fmt: '##### A License Agreement


    Okay, maybe users don''t want a license agreement. But both Twitter and Facebook
    say they require developers to show users a license agreement. For the record,
    Apple says it''s optional, so we say play it safe and write one. If you do include
    a EULA, don''t ask users to agree to it upon first launch. (Do ask for permissions
    for the use of their location and Push notifications upon first launch, however.)
    Instead, you should give users a chance to use the app before asking them to accept
    your terms and/or put them in the Settings pane of your app.


    ##### Appropriate iPad Design


    If you''re developing for iPad, remember to avoid the temptation to create complex
    hierarchies or nested headings in your app''s navigation stack. Also remember
    to use the Popover control for modal tasks and to move toolbar content to the
    top of the screen.


    #### Make Usage Easy and Obvious


    As we said in the introduction to this chapter, iOS design should always give
    primacy to ease of use and learning. According to Apple, you can ensure you adhere
    to this principle by doing the following:


    *   Reduce the set of controls to only the most common and useful set. For additional
    options, use a `More` button or system-standard `Actions` button.

    *   Use standard controls and gestures appropriately and consistently, so that
    they behave the way people expect them to.

    *   Label controls clearly, so that people understand exactly what they do.


    In iOS apps, this is trickier than it seems. Users are already accustomed to dozens
    of different UI paradigms from using the official Twitter and Facebook apps. When
    they arrive in yours, they have certain expectations for what controls are called;
    the nomenclature of the labels; and the core capabilities of your app.


    Therefore, it''s important that you strive to use terminology correctly and avoid
    deviating from standardized interactions. In Chapters 13 and 14, we''ll delve
    deeper into the proper use of terms, trademarks, and other branding.


    ### Conclusion


    Now that we''ve reviewed the foundation of what makes a good social app design,
    you may consider flipping through the rest of Apple''s Human Interface Guidelines
    if you''ve never read them.


    Once you''re ready, proceed to the next two chapters, which you can think of as
    Human Interface Guidelines for Twitter and Facebook, respectively.


    ## Chapter 13


    ## Twitter UI Design


    Because so many Twitter clients already exist on iOS, there are already a number
    of design paradigms out there that you should be aware of when you create your
    app.


    This section will discuss the visual, navigational, and interactional paradigms
    that we believe you should avoid, revise, or pay homage to.


    ### Usability Priorities


    If you''re going to design a Twitter API project with an adequate user experience,
    you should get your priorities on paper first. For most Twitter API projects,
    this means putting the most time and energy into the following:


    *   *Loading and scrolling*: What is today the official Twitter app for iOS began
    as Tweetie, a one-man project devoted to one key feature: fast-scrolling Tweets.
    Since Tweets are a centerpiece to most Twitter apps, you should make lists, content,
    and Tweets load as quickly and smoothly as possible.

    *   *Using images, URL shorteners, and Geo-tagging*: If your app creates Tweets,
    these three features have become standards and are expected anywhere a Tweet is
    made.

    *   *Keeping users inside your app*: Tweets are attached to schemas of actions
    and content: pictures, contacts, URLs, Retweets, @replies, and so on. Try to handle
    all relevant operations inside your app, without resorting to `Web` views or launching
    one of the system apps. Ejecting users from your app is confusing and it slows
    them down.

    *   *Honoring privacy first and foremost*: Don''t print Tweets without permission
    from the author. Use real Tweets from real accounts that are operated internally
    or that you have permission from the user to display. When showing example content,
    always use screenshots of your own Twitter profile (with your own Tweets).


    #### Anatomy of a Tweet


    Twitter is supremely specific about how it wants Tweets displayed. In fact, it
    has even specified that we should capitalize `Tweet` when writing a book like
    this. You can see how Twitter expects Tweets to be displayed in its “Anatomy of
    a Tweet” graphic, which is from the following URL (see [Figure 13-1](#Chapter13.html#fig_13_1)):


    `http://dev.twitter.com/pages/display_guidelines`


    ![images](images/1301.jpg)


    **Figure 13-1.** *The “Anatomy of a Tweet,” according to Twitter''s official design
    guidelines*


    Let''s examine all the elements shown in [Figure 13–1](#Chapter13.html#fig_13_1)
    in greater depth:


    1.  *Tweet Author*: Twitter says you must present the handle of a user''s Tweet;
    however, displaying a user''s real name next to her handle is optional. Tapping
    the username should link to the user''s Twitter profile, preferably within your
    app. Twitter design guidelines dictate that the username and the real name (if
    you show it) should be in different styles. Don''t put an `@` symbol in front
    of a user''s handle.

    2.  *@mentions*: Mentions of other Twitter users inside a Tweet should be linked
    to their user profile. Tapping that username should lead to the profile of that
    user, preferably within your app.

    3.  *Hashtags*: If a user includes a hashtag in a Tweet, it should link to a `Twitter.com`
    search for that query term inside your app.

    4.  *URLs*: URLs in a Tweet should be presented as tappable hyperlinks to the
    location passed through the API.

    5.  *Branding*: If your app shows a single Tweet outside a Twitter timeline or
    other relevant context, Twitter asks that you put the Twitter wordmark or Twitter
    bird somewhere on the image. If you are showing a group of tweets outside a Twitter
    timeline or other relevant context, Twitter asks that you put the words “Content
    From Twitter” nearby. You will learn more about the Twitter bird and wordmark
    later in this chapter.


    Note that Twitter says it can make exceptions to these rules if you email it to
    seek approval. Email your requests to [`trademarks@twitter.com`](http://trademarks@twitter.com).


    When composing a Tweet, you should be aware that there are a few additional elements
    not pictured:


    1.  *Tweet box*: A view for composing a new Tweet should always be presented with
    the “What''s Happening?” prompt above it.

    2.  *Tweet button*: If your app is posting content only to Twitter, the button
    that executes the task should be labeled, “Tweet.” If the post is being pushed
    to another service in addition to Twitter, label the button, “Update.”

    3.  *Character count*: Every blank Tweet should have a character counter in view
    that counts down from 140 characters to show how many characters are still available.'
