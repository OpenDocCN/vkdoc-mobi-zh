    # 背景音乐、定位与 VOIP


    苹果也为音乐、基于位置的应用以及 VOIP 应用做了相应安排，允许它们在用户切换至其他应用时继续在后台运行。这意味着音乐可以持续播放，"签到"类应用能在用户离开音乐或定位应用后，仍能收到地点变更的通知。VOIP
    应用可以发送通知（例如来电提醒），这也让电话功能更加稳定可靠。


    # 短信：搜索与应用内短信


    苹果在`iOS 4`中新增了 API，允许第三方应用在应用内编写短信。虽然不像其他平台那样拥有统一的消息服务，但 Facebook 全新的消息服务或许可以充当替代方案。


    # 更强大的照片与日历功能


    苹果向开发者开放了日历应用的新权限，允许第三方应用在用户的日历中创建事件。同时，开发者现在还可以访问设备上完整的照片和视频库，而不仅仅是旧系统中可用的"图像选择器"。


    # 全新摄像头与闪光灯


    iPhone 的后置摄像头现在支持变焦和可调节对焦，开发者也能访问新款 iPod 和 iPhone 上配备的前置摄像头。更棒的是，开发者获得了完整的播放和录制权限，还能控制
    LED 闪光灯。


    # 地图叠加层


    开发者可以在嵌入的谷歌地图上添加自定义叠加层，以在应用内显示额外信息（如路线或标注）。


    # iAd 广告平台


    诚然，iAd 受到苹果的严格控制，且最低投放门槛极高。但 iAd 作为`iOS 4`中的一个选项，为开发者提供了以`HTML5`形式向用户投放交互性强、视觉美观且精准广告的可能性。


    # 快速查看


    在 Mac OS X 中，你可以在访达中按下空格键预览文件。现在 iOS 开发者也能获得相同功能，在决定是否完整打开文件或附件前先行预览。


    # 数学 API


    游戏和定位应用将从数千个全新的硬件加速数学 API 中获益，这些 API 能够提升图形密集型应用的运行性能。


    # 文件传输


    iPad 早已具备文件传输功能，如今其他 iOS 设备也能在 iTunes 中实现电脑与 iOS 设备之间的文件传输。


    ## 小结


    `iOS 4`中蕴藏着大量新机遇，Facebook 和 Twitter 各自的 API 也不例外。用户群体极其庞大：5 亿 Facebook 用户和 1.3
    亿 Twitter 用户——而且两者都在持续增长。无论你的 iOS 应用具备何种功能，加入社交元素后，它都可能变得更实用、更具吸引力。


    本章中你能带走的最关键建议是：在完成原型设计前，花足够的时间去使用这些服务。这两项服务——尤其是 Facebook——包含大量对象、属性和交互，其功能容易令人困惑。了解用户期望这些资源以何种方式被使用，将帮助你设计出运行可靠且一致的应用。


    读完本书后，你将清楚知道该为应用添加什么以及如何构建。现在，请翻页，开始行动吧！


    # 第二章


    # 隐私，隐私，还是隐私


    就在不久之前，大多数人还通过电子邮件或即时通讯（IM）分享生活经历。在隐私和安全方面，那是一个更简单的时代——用户直接登录自己的邮箱或 IM 账户，从台式机或笔记本电脑直接向一个或多个特定收件人发送链接、照片等内容。


    随着互联网的发展，用户分享信息的方式变得日益复杂且相互关联；信息已从用户的桌面迁移到了云端。然而，这种复杂性和关联性的增加导致了一个结果：对于单个用户来说，确保隐私和安全变得更加困难，因为恶意公司或个人有更多机会获取用户某个账户的凭证。


    读完本章后，我们希望你能收获两个重要教训：


    -   人们正通过*社交图谱*（Facebook 对用户在线好友网络的称呼）分享更多——也更有价值的信息。

    -   安全和隐私的标准正在发生变化。


    **注意：** 安全与隐私问题必须得到最高程度的重视。无论明智与否，用户都将极为敏感的个人信息托付给了 Facebook 和 Twitter。如果你的应用将他们的隐私或利益置于风险之中，他们将会憎恨你，在
    App Store 评论中痛贬你的应用，并针对你的母亲说尽坏话。在使用 Facebook 和 Twitter API 时，务必将用户的隐私与安全放在首位。


    ## 旧有方式


    用户生成的内容如今经过的环节比以往任何时候都多，这增加了人为或系统失误的风险。让我们看一个经典例子：使用在线服务打印数码照片。


    过去，用户需要在照片冲印网站创建账户，登录后从电脑上传想要冲印的照片。从隐私角度看，在这种场景下，用户只需信任该照片冲印网站已采取适当措施，防止有人入侵网站获取用户名、密码、个人照片甚至信用卡信息。但这个例子中涉及的变量相对较少：仅涉及用户和照片冲印网站两方。


    ## 热点问题简史


    在过去的几年里，Facebook 和 Twitter 都未能幸免于隐私和安全方面的纰漏。尽管大部分问题已得到缓解，但了解一点历史有助于你在发布应用前识别任何潜在的热点问题。


    ### Facebook 的前科


    Facebook 历史上最引人注目的隐私失误或许是 Facebook Beacon，这是 Facebook 构建的一款默认加入的平台应用，旨在让用户分享自己的购物信息。Facebook
    因未经许可收集用户数据并与广告商分享而遭到攻击。自 2007 年 Beacon 事件以来，众多软件服务推出了允许用户与社交图谱分享购物信息的工具，包括 Swipely、Blippy
    和 Mint.com。这三家公司都再次利用了这些买家数据，但没有任何一家像 Facebook 那样轻率行事。


    自 Beacon 事件后，用户、记者和分析师随时准备抓住 Facebook 中任何可发现的安全漏洞，每披露一个问题都会引发一波 Facebook 抗议和声讨。


    教训：真正重要的可能不是你如何处理用户数据——而是你是否让你的服务采用"选择加入"模式，并在每一步都征求许可。正如后续类似 Beacon 的服务所证明的那样，只要用户觉得过程公开透明，他们非常愿意在隐私方面进行尝试。

    '
- fmt: '#### Twitter''s Track Record


    Compared with Facebook, `Twitter`''s record of privacy snafus seems more bumbling,
    but also less strategic. Users generally aren''t quite as suspicious of `Twitter`''s
    motives as they are of `Facebook`''s; then again, most users don''t imbue their
    `Twitter` profiles with the same amount of private content. `Twitter` is, almost
    by nature, a public-facing tool, so users have been primed to think of their tweets
    as public property. (And with several search engines now indexing real-time content
    from `Twitter`, those tweets are truly the province of the wider Web.)


    Still, `Twitter` has its sensitive spots, too. Whenever security problems pop
    up on `Twitter`, they inevitably speak to the company''s meteoric growth—and all
    the growing pains that come with it. In 2007, SMS tweets were shown to be vulnerable
    to spoofing, which could allow malicious actors to pull a user''s phone number
    from his profile information. In 2009, a handful of celebrity profiles were compromised
    after a hacker used a dictionary attack to figure out a `Twitter` employee''s
    administrator password. Other bugs have allowed users to manipulate other users
    into following them; late-night host Conan O''Brien''s account fell victim to
    this kind of attack. In the Fall of 2010, an XSS worm was discovered that exploited
    a simple JavaScript function to affect pranks.


    All these breaches have since been addressed, but not before they gave `Twitter`
    a little bit of a bad rep. In 2010, the FTC brought charges against `Twitter`
    for its security breaches; however, those charges have since been settled. While
    `Twitter` doesn''t evoke the same amount of suspicion that `Facebook` does among
    its users, its segmented APIs and its adolescent growth spurt mean that more loopholes
    probably exist. You need to take great care with users'' `Twitter` accounts. You
    should also remember that, while tweet-streams may not seem vital at first glance,
    you never know what your users are hoping to hide there.


    ### How OAuth Changes Everything


    In this day and age, though, one could imagine that the photo-printing site mentioned
    previously now has an API in place that provides the ability for third-party web
    sites, applications, and services to import or share photos from a user''s account,
    as long as the user grants the third-party apps permission to do this. This usually
    happens when the user enters his credentials—his username and password—for the
    photo site inside that third-party app.


    By giving outside sites access to a user''s account, the photo sharing site is
    creating a situation where a third-party could gain complete access to a user''s
    account and personal information—and even potentially change the user''s password.
    Not only that, but that third-party app now has access to other account information
    stored on the photo site.


    So why do users trust that this will all turn out okay?


    One reason (although the user may not know it) is `OAuth`, a bifurcated security
    protocol that is becoming fairly standard among social APIs. `OAuth` was designed
    to let users share the resources in their account with third parties without having
    to give the third parties their username and password, thereby jeopardizing their
    whole account (and whatever other accounts share those credentials).


    We say `OAuth` is bifurcated because it has two versions (`1.3` and `2.0`) that
    are actively in use, but not across the board. `OAuth 2.0` is being promulgated
    mostly by `Facebook`. If you''re going to be adding `Facebook` to your app, you''ll
    be working with the latter version. `Twitter` allows you to use `OAuth 1.3`. `Facebook`
    won''t allow `OAuth 1.3` apps, and `Twitter` won''t allow `OAuth 2.0`.


    Assume a third party wanted to gain access to a user''s account via `OAuth` in
    the case of the photo-printing site; the interaction would look like this:


    1. The third party would contact the photo-printing site and ask for access to
    the user''s account via `OAuth`.

    2. The user would be presented with a login page from the photo-printing site.
    This page asks the user to grant permission by entering his username and password.

    3. The third-party site would then receive an `OAuth` token that could be used
    to access the user''s account without needing the user''s username and password.


    #### A New Standard Emerges


    `OAuth` is quickly becoming the default standard for sites to allow shared access
    to a user''s resources from third-party sites, applications, and services. `Facebook`,
    `Twitter`, and most other social networking sites now encourage or require the
    use of `OAuth` from third parties, and this trend is likely to continue.


    So we have dedicated most of [Chapter 5](#chapter05.html#ch5) to covering `OAuth`
    in detail to help you integrate your iOS application with `Facebook` and `Twitter`.
    It''s no coincidence that this is the second chapter in the book; nothing is more
    important than security when working with social APIs.'
