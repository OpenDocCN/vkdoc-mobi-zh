    #### Under the Hood: MGTwitter HTTP Connections and XML Parsing


    The actual Twitter API is an HTTP-based API, where HTTP requests are formatted
    and sent to Twitter''s servers, and responses are sent back in XML format. MGTwitterEngine
    provides us with a set of clean and simple to use Objective-C wrapper classes
    that we can use within our iOS apps to request information from Twitter.


    The class in MGTwitterEngine that actually makes the requests and handles the
    responses is the `MGTwitterEngine` class itself. If you refer to the header file
    for MGTwitterEngine, you will notice that it owns a dictionary of connections:


    `NSMutableDictionary *_connections;`


    Each time a request is made, MGTwitterEngine creates a new `MGTwitterHTTPURLConnection`,
    which is an `NSURLConnection`. Each `MGTwitterHTTPURLConnection` creates a unique
    identifier (UUID) for itself. This is accomplished via an `NSString` category
    class in MGTwitterEngine entitled `NSString+UUID` that has one method:


    `+ (NSString*)stringWithNewUUID`

    `{`

    `    // Create a new UUID`

    `    CFUUIDRef uuidObj = CFUUIDCreate(kCFAllocatorDefault);`


    `    // Get the string representation of the UUID`

    `    NSString *newUUID = (NSString*)CFUUIDCreateString(kCFAllocatorDefault, uidObj);`

    `    CFRelease(uuidObj);`

    `    return [newUUID autorelease];`

    `}`


    When MGTwitterEngine creates a connection, it saves the object for that connection
    in its `connections` dictionary, where the key is the connection identifier returned
    by the connection. We''ll get to why this is important in a second, but let''s
    first look at the URL to request someone''s followers from Twitter:


    `https://twitter.com/statuses/followers.xml`


    When MGTwitterEngine creates an `MGTwitterHTTPURLConnection` object, it assigns
    it a request type and a response type. Why is that? Well, when the response is
    received from Twitter, MGTwitterEngine uses this information to decide how to
    parse the returned XML data. Note that MGTwitterEngine has a number of XML parsers
    that all derive themselves from `MGTwitterXMLParser`. If you examine MGTwitterEngine''s
    `_parseDataForConnection:` method, you will see that it performs a switch on the
    response type of the connection. In the case of requesting followers, a `MGTwitterUsersParser`
    is created to parse the response. The XML is parsed and returned to us via `MGTwitterEngineDelegate`''s
    `userInfoRecieved:forRequest:` method as an array of dictionaries. Here is what
    one of these dictionaries looks like:


