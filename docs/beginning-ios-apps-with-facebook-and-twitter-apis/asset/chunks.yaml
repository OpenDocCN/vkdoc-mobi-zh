    `                              2,`

    `                              [message UTF8String],`

    `                              -1,`

    `                              SQLITE_TRANSIENT);`


    `            BOOL result = sqlite3_step(stmt) != SQLITE_ERROR;`

    `            sqlite3_finalize(stmt);`


    `            sqlite3_exec(database, result ? "END;" : "ROLLBACK;",`

    `                             NULL, NULL, NULL);`

    `        }`

    `    }`


    `    //post a notification that the tweets are available...have responder`

    `    //update itself on the main thread`

    `    [[NSNotificationCenter defaultCenter]`

    `        postNotificationName:@"tweetsDidSynchronize"`

    `                  object:self`

    `userInfo:nil];`


    `    [autoReleasePool release];`

    `}` ![images](images/1012.jpg)


    **Figure 10–12.** *The SQLite database of Tweets*


    Now that the Tweets are in the database, the application needs a way to retrieve
    them. This is accomplished via `TwitterDataStore`''s `tweets` method. This method
    uses a standard SQL SELECT statement to get all of the Tweets from the database:


    `NSString *tweetsStatement = @"SELECT id, message FROM tweets";`


    If the statement is prepared successfully, the result set is traversed, and a
    new Tweet is created and initialized for each row in the result set. The Tweet
    is then added to an array of Tweets that is returned by the method:


    `- (NSArray*)tweets`

    `{`

    `    NSMutableArray *tweets = [NSMutableArray array];`


    `    @synchronized(self) {`


    `        sqlite3_stmt *queryStatement = nil;`

    `        NSString *tweetsStatement = @"SELECT id, message FROM tweets";`

    `        if (SQLITE_OK != sqlite3_prepare_v2(database,`

    `                [tweetsStatement UTF8String],-1,&queryStatement, NULL)) {`

    `            NSLog(@"error: ''%s''", sqlite3_errmsg(database));`

    `            return nil;`

    `        }`


    `        while(sqlite3_step(queryStatement) == SQLITE_ROW) {`


    `            Tweet *tweet = [[[Tweet alloc] init] autorelease];`

    `            [tweet setId:[NSNumber numberWithLongLong:`

    `                          sqlite3_column_int64(queryStatement, 0)]];`

    `            [tweet setText:[NSString stringWithUTF8String:`

    `                   (const char*)sqlite3_column_text(queryStatement, 1)]];`

    `            [tweets addObject:tweet];`

    `        }`

    `        sqlite3_finalize(queryStatement);`

    `    }`


    `    return tweets;`

    `}`


    The final method to implement to complete the SQLite implementation of `TwitterDataStore`
    is `deleteTweets`. This method simply executes a SQL `DELETE` statement on the
    database to delete all of the Tweets:


    `NSString *deleteTweetsStatement = @"DELETE FROM tweets";`


    `- (void)deleteTweets`

    `{`

    `    @synchronized(self) {`

    `        char            *errmsg;`


    `        NSString *deleteStmnt = @"DELETE FROM tweets";`

    `        if (SQLITE_OK !=`

    `            sqlite3_exec(database, [deleteStmnt UTF8String], NULL,`

    `            NULL, &errmsg)) {`

    `            NSLog(@"error: ''%s''", sqlite3_errmsg(database));`

    `        }`

    `    }`

    `}`


    The preceding code uses SQLite, so it will not link unless the application''s
    `Xcode` project is adjusted to link against `libsqlite3.0.dylib instead of CoreData.framework`
    (see [Figure 10–13](#Chapter10.html#fig_10_13)).


    ![images](images/1013.jpg)


    **Figure 10–13. Adjusting the Xcode project to link against libsqlite3.0.dylib
    instead of CoreData.framework**


    ### To Test or Not to Test, That is the Question


    Since code for a data model or layer doesn''t require a user interface, it presents
    a unique opportunity to discuss an often overlooked topic for iOS and mobile development
    in general, which is Unit Testing. Unfortunately, a lot of projects avoid writing
    Unit Tests altogether or try to add some tests at the tail end of a project. Part
    of this is due to how difficult it often is to get a testing environment set up
    for a project, and some of it may be due to developer laziness. However, when
    done early and often, Unit Tests actually let developers be lazier than if they
    hadn''t written tests at all because it requires less manual testing. In addition,
    with Xcode 4, Apple has made it easier than ever to get up and running with Unit
    Tests for an iOS project.


    What follows is a step-by-step tutorial that adds a Unit Test to the OfflineTwitter
    Xcode for this project. The Unit Test validates the code that synchronizes the
    Tweets in the database. Of course, it''s always best to write tests as code is
    being written, but the main purpose of this tutorial is to show how easy it is
    to add Unit Tests to an iOS Facebook or Twitter application.'
