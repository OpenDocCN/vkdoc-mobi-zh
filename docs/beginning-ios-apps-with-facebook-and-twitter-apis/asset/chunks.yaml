  trans: '

    ### 创建主题元素


    在能力范围内，设计你自己的配色方案、品牌标识、Logo 和图标。


    不仅 Facebook 不鼓励开发者使用其蓝白配色方案，常识也是如此。应用商店中质量上乘、使用 Facebook API 的 iOS 应用凤毛麟角——但糟糕的应用却比比皆是。大多数低质量的应用都无耻地模仿
    Facebook 的颜色和图标。抄袭 Facebook 不仅违反规则，而且显得相当低端。


    幸运的是，即使没有那种千篇一律的样式表，Facebook 仍然很实用。社交聚合器 `Hootsuite` 和阅读器应用 `Taptu` 就是两个例子，它们通过独特的配色方案和品牌标识，以别具一格的方式呈现
    Facebook 内容。


    #### Hootsuite


    正如你在图 14-6 中所见，`Hootsuite` 的青色配色方案看起来更像 Twitter 而不是 Facebook。但它的视觉元素和应用栏更像是这两个社交网络的一个奇怪混合体——而不是对其中任何一个的简单复制。


    ![images](img/1406.jpg)


    **图 14-6.** *Hootsuite 融合了 Facebook 和 Twitter 的颜色与惯例，这是它避免看起来太像其中任何一个的方式。*


    #### Taptu


    `Taptu` 是一款适用于 iPhone 和 iPad 的应用，它将 RSS 订阅源、社交新闻和其他内容汇总到比传统阅读器更易阅读的*信息流*中。正如你在图
    14-7 中所见，Facebook 动态像其他任何动态一样被打包呈现，状态更新（及其作者和时间戳）以时间线顺序排列，隐约带有 Twitter 风格。这是另一种符合其平台设计规范的混合设计。


    ![images](img/1407.jpg)


    **图 14-7.** *Taptu 对动态消息的诠释*


    ### Facebook 艺术规则


    正如我们在本章开头所说，Facebook 并没有像 Twitter 那样为商标和视觉资产制定一套繁复的规则。这可能是许多应用开发者在创建应用图标和界面时随意借鉴的原因之一。


    上一节指导您创建自己的主题元素。这样做时，根据 Facebook 的要求，您需要牢记几条简要准则：


    *   未经 Facebook 书面许可，您的广告不得包含或附带任何平台集成，包括诸如`点赞`按钮之类的社交插件。

    *   开发者不得以暗示 Facebook 参与或认可的方式推销自己。

    *   开发者还应避免使用 Facebook 的 Logo、商标或网站术语。这些包括但不限于 `Facebook`、`The Facebook`、`FacebookHigh`、`FBook`、`FB`、`Poke`、`Wall`
    以及其他公司图形、标识、设计或图标。


    如果您想阅读完整的 Facebook 广告准则，请访问此链接：


    [`http://www.facebook.com/ad_guidelines.php`](http://www.facebook.com/ad_guidelines.php)


    ### 按钮文本


    以下是几个允许 Facebook 开发者使用的按钮文本示例：


    *   `Post`

    *   `Share`

    *   `Publish`

    *   `Add to Profile`


    以下是 Facebook 认为过于模糊而无法使用的按钮文本示例：


    *   `Ignore`

    *   `OK`

    *   `Share '' Continue`

    *   `Request`


    ### Facebook 导航


    由于其网格化的用户界面，官方的 Facebook 应用设定了一些奇怪的导航范式。事实上，它借鉴了很多 Android 的设计，也借鉴了一部分 webOS 的设计。Facebook
    应用的做法如下：


    *   使用长按操作来模拟 iOS 应用图标的“抖动”效果。

    *   使用从屏幕底部升起的状态栏（类似于 Android）来显示通知。

    *   在应用内部设有“应用”，就像 iOS 用户界面一样。

    *   当你点击标题栏时，会显示闪烁动画，类似于 HP webOS。


    **注意：** 不要复制 Facebook 的用户界面和导航。


    我们喜欢所有这些小特色，并且不希望官方的 Facebook 应用以其他任何方式运行。但我们不建议您模仿这些范式中的任何一个。它们在 iOS 上显得格格不入（至少目前如此），并且只会让您的用户感到困惑。


    ### 显示进度


    正如我们在本章前面所讨论的，向用户显示进度是应用反馈的重要组成部分。在官方的 Facebook 应用中，用户永远不会看到空白的动态消息；如果无法找到网络连接，应用会显示其最近在后台缓存的更新。Facebook
    用户无疑已经习惯了 Facebook iOS 和 Web 应用的速度和效率，所以您最好尽量不要让他们等待。


    如果必须显示进度，请使用活动指示器，并考虑在操作需要花费大量时间时向用户显示警告信息；然而，活动指示器绝不应阻止用户切换标签页或撰写其他内容。集成了 Facebook
    的 `MyPhone+` 应用只有一个主要任务，而且这是一个重要的任务。该应用很好地处理了这个任务，正如你在图 14-8 中所见。


    ![images](img/1408.jpg)


    **图 14-8.** *MyPhone+ 为其核心任务显示了一个进度指示器，但这仅在特定情况下才是个好主意。*

