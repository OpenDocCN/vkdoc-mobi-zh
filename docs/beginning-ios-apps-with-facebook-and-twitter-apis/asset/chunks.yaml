    ### 地理位置标识符 (WOEID)


    如前所述，Twitter 趋势也可以基于地理区域获取。但 Twitter 趋势 API 并不使用经纬度来定位，而是采用由雅虎维护的“地理位置标识符”（`WOEID`）。`WOEID`
    是地球上任何已命名地点的唯一标识符。你可以在以下网址找到更多相关信息：


    *   [`developer.yahoo.com/geo/geoplanet/`](http://developer.yahoo.com/geo/geoplanet/)

    *   [`developer.yahoo.com/geo/geoplanet/guide/concepts.html`](http://developer.yahoo.com/geo/geoplanet/guide/concepts.html)


    Twitter 可以返回其拥有热门话题信息的 WOEID：


    ```

    $ curl http://api.twitter.com/1/trends/available.json

    ```


    此请求可以携带可选的 `lat` 和 `long` 参数，以缩小返回的结果集。请求会返回一个地点数组，每个地点由一个包含多个键值对的字典表示。其中一个键就是
    `WOEID`：


    ```

    [{"countryCode":"TR","country":"Turkey","url":"http:\/\/where.yahooapis.com\/v1\/place\/23424969","parentid":1,"name":"Turkey","woeid":23424969,"placeType":{"code":12,"name":"Country"}},...]

    ```


    通过发出以下格式的请求，你可以获取指定 `WOEID` 对应地理区域内的当前热门话题前十名（前提是该区域存在热门话题信息）：


    ```

    http://api.twitter.com/1/trends/WOEID.json

    ```


    因此，要获取 `WOEID` 为 `1` 的热门话题前十名，请求如下所示：


    ```

    $ curl http://api.twitter.com/1/trends/1.json

    ```


    与其他趋势请求一样，此请求返回一个包含趋势数组的字典：


    ```

    [{"as_of":"2011-05-01T03:39:32Z","trends":[

    {"url":"http:\/\/search.twitter.com\/search?q=%23thatminiheartattackwhen","query":"%23thatminiheartattackwhen","events":null,"promoted_content":null,"name":"#thatminiheartattackwhen"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23urnotmytypeif","query":"%23urnotmytypeif","events":null,"promoted_content":null,"name":"#urnotmytypeif"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23starship","query":"%23starship","events":null,"promoted_content":null,"name":"#starship"},

    {"url":"http:\/\/search.twitter.com\/search?q=Seth+Meyers","query":"Seth+Meyers","events":null,"promoted_content":null,"name":"Seth
    Meyers"},

    {"url":"http:\/\/search.twitter.com\/search?q=Jos%C3%A9+Aldo","query":"Jos%C3%A9+Aldo","events":null,"promoted_content":null,"name":"Jos\u00e9
    Aldo"},

    {"url":"http:\/\/search.twitter.com\/search?q=Catcher+Freeman","query":"Catcher+Freeman","events":null,"promoted_content":null,"name":"Catcher
    Freeman"},

    {"url":"http:\/\/search.twitter.com\/search?q=Green+Men","query":"Green+Men","events":null,"promoted_content":null,"name":"Green
    Men"},

    {"url":"http:\/\/search.twitter.com\/search?q=Steven+Seagal","query":"Steven+Seagal","events":null,"promoted_content":null,"name":"Steven
    Seagal"},

    {"url":"http:\/\/search.twitter.com\/search?q=Glenn+Healy","query":"Glenn+Healy","events":null,"promoted_content":null,"name":"Glenn
    Healy"},

    {"url":"http:\/\/search.twitter.com\/search?q=Karate+Kid","query":"Karate+Kid","events":null,"promoted_content":null,"name":"Karate
    Kid"}],

    "created_at":"2011-05-01T03:28:09Z","locations":[{"name":"Worldwide","woeid":1}]}]

    ```


    还有一些其他服务也提供 Twitter 趋势信息。其中一个是 `letsbetrends.com`，它有自己独立的 API。有关该服务的更多信息，请访问：


    ```

    http://letsbetrends.com/

    ```


    此外，如果你的应用需要显示关于话题标签的提示或信息，可以使用像 tagalus ([`tagal.us/`](http://tagal.us/)) 这样的服务。这里有一篇关于理解
    Twitter 话题标签的好文章：


    ```

    http://blog.programmableweb.com/2009/03/20/make-sense-of-confusing-twitter-hash-tags/

    ```


    ### 再谈离线存储：SQLite


    第 8 章 的部分内容探讨了使用 iOS 的 Core Data 离线存储推文的话题。值得一提的是，在底层，Core Data 会将其数据模型的数据保存到
    SQLite 数据库中。`SQLite` 是一个“跨平台的 C 语言库，它实现了一个自包含、可嵌入、零配置的 SQL 数据库引擎。” 你可以在 [www.sqlite.org/](http://www.sqlite.org/)
    上了解更多关于这个数据库的信息。


    Core Data 会在应用的 `Documents` 目录中创建 SQLite 数据库文件。使用模拟器时，`Documents` 目录可通过以下路径访问，其中“4.3”会根据应用目标
    iOS 版本的不同而变化，`<app id>` 是 iOS 为每个应用创建的唯一应用标识符，因应用而异：


    ```

    Library/Application Support/iPhone Simulator/4.3/Applications/<app id>/Documents

    ```


    ![images](img/1010.jpg)


    **图 10–10.** *iOS 模拟器应用的 Mac OS X 文件系统路径*


    要确定哪个目录属于某个特定应用，请检查每个 `<app id>` 目录的内容，并找到包含该应用 `.app` 文件的目录。以第 8 章中的离线应用为例，其文件是
    `OfflineTwitter.app`。在该应用的 `Documents` 目录中，有一个名为 `CoreDataOffline.sqlite` 的 SQLite
    数据库文件。该文件名与代表 Core Data 模型的 `xcdatamodeld` 文件名 `CoreDataOffline` 相匹配。


    查看 SQLite 数据库的内容需要数据库软件。Mac OS X 上可用的较好数据库软件之一是 MesaSQLite ([www.desertsandsoftware.com/?realmesa_home](http://www.desertsandsoftware.com/?realmesa_home))。MesaSQLite
    是免费的，在 iOS 应用中处理数据库时非常有用。安装 MesaSQLite 或其他数据库应用程序后，打开前面提到的 `CoreDataOffline.sqlite`
    文件，然后查看 `ZTWEET` 表的内容。（在 MesaSQLite 中，从“表名”下拉列表中选择 `ZTWEET` 表，然后点击“显示全部”以查询数据库中的所有推文。）`ZTWEET`
    表是 Core Data 存储应用创建并保存的 `Tweet` 对象的地方。请注意，其中有 `ZID` 和 `ZTEXT` 列，分别对应数据模型中每个 `Tweet`
    对象的 `id` 和 `text` 属性。


    ![images](img/1011.jpg)


    **图 10–11.** *Core Data SQLite 数据库*


    使用 SQLite 可能有点棘手，因此亲自动手实践一下是值得的。因此，本节剩余部分将展示如何直接使用 SQLite 而不是 Core Data 来重新实现第
    8 章中的 `OfflineTwitter` 应用。以下所有代码都位于 `Github` 仓库的 `Chapter10/OfflineTwitter` 目录中。

    '
- fmt: "#### Reimplementing OfflineTwitter Without Core Data\n\nSince the original\
    \ architecture for the OfflineTwitter application kept all of the data access\
    \ code in the `TwitterDataStore` class, almost all of the user interface views\
    \ and controllers can be left as-is. The only work to do is to create a version\
    \ of `TwitterDataStore` that uses SQLite directly to store, retrieve, and delete\
    \ Tweets instead of Core Data.\n\nFirst, the `Tweet` class is adjusted slightly,\
    \ so that it's no longer a managed object:\n\n```\n@interface Tweet : NSObject\
    \ {\n}\n\n@property (nonatomic, retain) NSNumber * id;\n@property (nonatomic,\
    \ retain) NSString * text;\n\n@end\n```\n\nNext, `TwitterDataStore` is stripped\
    \ down, so it's now a base class that any type of `TwitterDataStore` can be derived\
    \ from:\n\n```\n@interface TwitterDataStore : NSObject {\n}\n\n- (NSURL *)applicationDocumentsDirectory;\n\
    - (NSArray*)tweets;\n- (void)deleteTweets;\n- (void)synchronizeTweets:(NSArray*)tweets;\n\
    \n@end\n```\n\nNow a class entitled `TwitterDataStore_SQLite` is created to do\
    \ the actual heavy lifting of storing, retrieving, and deleting Tweets using SQLite.\
    \ The class definition is located in `TwitterDataStore_SQLite.h`:\n\n```\n#import\
    \ \"TwitterDataStore.h\"\n\n@class sqlite3;\n@interface TwitterDataStore_SQLite\
    \ : TwitterDataStore {\n    sqlite3             *database;\n}\n\n@end\n```\n\n\
    Next, let's look at `TwitterDataStore_SQLite.m` in Xcode. Note that two additional\
    \ helper methods are declared for the class:\n\n- `openDatabase`\n- `closeDatabase`\n\
    \nIn the initializer for the class, `sqlite3.h` is imported, so that `TwitterDataStore_SQLite`\
    \ can use SQLite. It's worth reviewing this header file to gain additional insight\
    \ into what SQLite makes available to iOS applications since this discussion only\
    \ touches the surface. Within the code, `openDatabase` is called to create the\
    \ database (if it doesn't already exist) and set up the table(s) within the database.\
    \ In `dealloc`, the database is closed when the class is destroyed:\n\n```\n#import\
    \ \"TwitterDataStore_SQLite.h\"\n#import \"sqlite3.h\"\n#import \"Tweet.h\"\n\n\
    @interface TwitterDataStore_SQLite ()\n- (void)openDatabase;\n- (void)closeDatabase;\n\
    @end\n\n@implementation TwitterDataStore_SQLite\n\n- (id)init\n{\n    if ((self\
    \ = [super init])) {\n        [self openDatabase];\n    }\n    return self;\n\
    }\n\n- (void)dealloc\n{\n    [self closeDatabase];\n    [super dealloc];\n}\n\
    ```\n\nThe `openDatabase` method is tasked with creating the database and populating\
    \ it with a table to store Tweets. If the database object is already open, this\
    \ method does nothing. This is accomplished by checking to see if the pointer\
    \ to the `sqlite3` database object is `NULL`. Opening a database via SQLite is\
    \ accomplished with the `sqlite3_open` method. This method requires a path to\
    \ the SQLite database file that it needs to create if it doesn't already exist\
    \ or to open if it does already exist. It also requires a pointer to a pointer\
    \ of a `sqlite3` database object.\n\nIf the database is opened successfully, the\
    \ `Tweets` table for the database is created via the `sqlite3_exec` method, which\
    \ executes a SQL query on the database. If the table doesn't exist already, the\
    \ query creates the table with columns for the id of a Tweet and the actual message\
    \ content for the Tweet:\n\n```\nNSString *createTables =\n    @\"CREATE TABLE\
    \ IF NOT EXISTS tweets (id INTEGER\n                                         PRIMARY\
    \ KEY,\n                                         message TEXT);\";\n```\n\nNext,\
    \ using `sqlite3_exec` again, an index is created for this table on the Tweet\
    \ id in order to speed up querying Tweets out of the database:\n\n```\nNSString\
    \ *createIndex =\n    @\"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);\"\
    ;\n```\n\n```\n- (void)openDatabase\n{\n    if (nil == database) {\n        NSURL\
    \ *path =\n               [[self applicationDocumentsDirectory]\n            \
    \   URLByAppendingPathComponent:@\"twitter.sqlite\"];\n\n        if (SQLITE_OK\
    \ !=\n            sqlite3_open([[path relativePath] UTF8String], &database)) {\n\
    \            [self closeDatabase];\n        } else {\n            char *errmsg;\n\
    \n            NSString *createTables =\n            @\"CREATE TABLE IF NOT EXISTS\
    \ tweets (id INTEGER PRIMARY KEY,\n                                          \
    \       message TEXT);\";\n            if (SQLITE_OK !=\n                sqlite3_exec(database,\n\
    \                [createTables UTF8String],\n                NULL,\n         \
    \       NULL,\n                &errmsg)) {\n                NSLog(@\"create table\
    \ error: '%s'\", errmsg);\n            }\n\n            NSString *createIndex\
    \ =\n                @\"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);\"\
    ;\n            if (SQLITE_OK !=\n                sqlite3_exec(database,\n    \
    \                         [createIndex UTF8String],\n                        \
    \     NULL,\n                             NULL,\n                            \
    \ &errmsg)) {\n                NSLog(@\"create table index error: '%s'\", errmsg);\n\
    \            }\n        }\n    }\n}\n```\n\n`closeDatabase` is a very straightforward\
    \ method. It calls `sqlite3_close` on the `sqlite3` database object owned by the\
    \ class. This closes the database, and then sets the pointer to the database to\
    \ `NULL`, so that the `openDatabase` method will reopen the database if it is\
    \ subsequently called:\n\n```\n- (void)closeDatabase\n{\n    sqlite3_close(database);\n\
    \    database = nil;\n}\n```\n\nSince the goal of this sample project is to store\
    \ Tweets offline in a SQLite database, the first task to take on is synchronizing\
    \ the Tweets that are retrieved from Twitter and storing them in the database\
    \ (see [Figure 10–12](#Chapter10.html#fig_10_12)). As with the Core Data example,\
    \ this occurs in `TwitterDataStore`'s `synchronizeTweets:` method, which first\
    \ deletes any Tweets in the database and then stores the new Tweets.\n\nRecall\
    \ that the Tweets are passed in as an array of `NSDictionary` objects, where each\
    \ `NSDictionary` in the array represents a Tweet. Let's take a closer look at\
    \ the `for-loop` that operates on the Tweets. The first step is to initialize\
    \ a SQL transaction:\n\n```\nsqlite3_exec(database, \"BEGIN;\", NULL, NULL, NULL);\n\
    ```\n\nThe actual SQL statement that will store a Tweet is as follows:\n\n```\n\
    char *text = \"INSERT INTO tweets (id, message) VALUES (?, ?);\";\n```\n\nNote\
    \ the presence of the `?` symbols in the statement. This denotes that the values\
    \ are going to be bound to the statement after it is prepared via `sqlite3_prepare_v2`.\
    \ Note that the Tweet id is being stored as a 64-bit `integer` and is bound via\
