    ` sourceApplication:(NSString *)sourceApplication annotation:(id)annotation {`

    `        return [facebook handleOpenURL:url];`

    `}`


    The URL will look as follows:


    `fb114442211957627://authorize/#access_token=<…>&expires_in=0`


    Let''s look at the various components of the URL:


    *   **fb114442211957627://**– This is the custom URL scheme that we bound our
    application to.

    *   **authorize/**– This is the path the Facebook SDK will check for in the URL,
    so that it then knows to parse the authentication information in the rest of the
    URL.

    *   **#**– Signifies the start of the parameters in the URL.

    *   **access_token=**– Specifies the access token returned from facebook.com that
    the SDK will use when requesting resources on behalf of your application.

    *   **&expires_in=0**– Specifies another parameter in the URL that contains the
    expiration for the `access_token`. In this case, a value of `0` signifies to the
    SDK that this token does not expire.


    ![images](images/0512.jpg)


    **Figure 5–12.** *Application delegate''s handling of a custom URL*


    ##### Logging in to Facebook


    Authorizing a user via the Facebook API is accomplished viathe `authorize:` method,
    as follows:


    `[facebook authorize:[NSArray arrayWithObjects:@"read_stream", @"offline_access",nil]`![images](images/U002.jpg)

    ` delegate:self];`


    Notice in the method call that we are passing an `NSArray` as one of the parameters.
    This is an array of requested permissions. As part of the `OAuth` authorization
    process, you must ask the user to grant your application permission to specific
    resources. In this authorization request, we are asking for permission to access
    the user''s news feed. We are also asking for long-lived access to these resources,
    in which case we will receive back an `OAuth` access token that does not expire.


    To learn more about the permissions that are required to access specific resources,
    please read the Permissions API reference:


    `http://developers.facebook.com/docs/authentication/permissions`


    We have implemented this in the `MainView` class of the `OAuthFacebook` project.
    We have also used an `FBLoginButton` class that can be found in the Facebook SDK.
    Using this button class gives the Login button a Facebook look and feel that is
    comforting to a user since she can see the official Facebook logo, as pictured
    in [Figure 5–13](#Chapter05.html#fig_5_13).


    ![images](images/0513.jpg)


    **Figure 5–13.** *The Facebook Login button*


    The sample project is configured to change the Login button to a Logout button
    after logging in, as shown in [Figure 5–14](#Chapter05.html#fig_5_14).


    ![images](images/0514.jpg)


    **Figure 5–14.** *The Facebook Logout button*


    When you click the button, the `fbButtonClick:` method is called. This method
    looks like this:


    `- (void)fbButtonClick:(UIButton*)sender {`

    `        if (fbLoginButton.isLoggedIn) {`

    `                [self logout];`

    `        } else {`

    `                [self login];`

    `        }`

    `}`


    If the user is not logged in, the `login:` method is called. The `login:` method
    calls the `authorize:` method, as described previously:


    `- (void)login {`

    `        [facebook authorize:[NSArray arrayWithObjects:@"read_stream",`![images](images/U002.jpg)

    ` @"offline_access",nil] delegate:self];`

    `}`


    If the user is logged in already, the button text will change to *Logout*. Upon
    logging out, the `logout:` method is called. The `logout:` method is as follows:


    `- (void)logout {`

    `        [facebook logout:self];`

    `}`


    Notice that the `authorize:` and `logout:` methods of the Facebook SDK take a
    delegate as a parameter. In order to receive notifications from the Facebook SDK
    with respect to logging the user in and out of Facebook, you have to implement
    the `FBSessionDelegate` protocol in your class and pass your class as a delegate
    to the Facebook `authorize:` and `logout:` methods. If you inspect `MainView.h`,
    you will see that `MainView` is a `FBSessionDelegate`:


    `@interface MainView : UIView <FBSessionDelegate> {`

    `        …`

    `}`


    The `FBSessionDelegate` protocol defines three optional methods that you can implement:


    *   `- (void)fbDidLogin`

    *   - (void)fbDidNotLogin:(BOOL)cancelled

    *   - (void)fbDidLogout


    In the fbDidLogin delegate method, we save the logged in state and update the
    `FBLoginButton` to let the user log out of Facebook. In the `fbDidNotLogin:` method,
    we simply log the occurrence. In the fbDidLogout method, we save the logged out
    state and update the FBLoginButton to let the user log into Facebook.


    Lo and behold, users can now log into your Facebook-connected iOS app without
    even typing, just by sharing the security token from the Facebook app or a Safari
    cookie from Facebook''s mobile site. The specifics of how this is implemented
    are in the Facebook iOS SDK method (see [Figure 5–15](#Chapter05.html#fig_5_15)):


    `- (void)authorizeWithFBAppAuth:(BOOL)tryFBAppAuth`

    `                    safariAuth:(BOOL)trySafariAuth` ![images](images/0515.jpg)


    **Figure 5–15.** *The Facebook iOS SDK authorization code*


    ##### Logging out of Facebook


    So if Facebook users are logged into all the apps across iOS, what happens if
    they want your app to log out of Facebook? As shown previously, you call the `logout:`
    method to clear all application state in the Facebook SDK and initiate a server
    request to invalidate the current access token. The contents of the `logout:`
    method are shown in [Figure 5–16](#Chapter05.html#fig_5_16).


    ![images](images/0516.jpg)


    **Figure 5–16.** *The Facebook iOS SDK logout: method*


    If a user logs out of your app, it won''t revoke your app''s permissions; it just
    clears the app''s access token. If the user then tries to log into Facebook inside
    your app once more, the app will simply notify the user that it''s logging back
    into Facebook, and your app will receive a new access token. The user won''t have
    to give it permission again.


    If a user wants to revoke your app''s permissions, she needs to head to facebook.com,
    edit her settings for Apps and Websites, choose Edit Settings under Apps you use
    (see [Figure 5–17](#Chapter05.html#fig_5_17)), and delete your app from the list
    of approved apps (see [Figure 5–18](#Chapter05.html#fig_5_18)).


    ![images](images/0517.jpg)


    **Figure 5–17.** *Facebook.com''s application OAuth permissions page*


    ![images](images/0518.jpg)


    **Figure 5–18.** *Revoking an application''s permission to interact with a Facebook
    user''s data and profile*


    ##### Determining if iOS Supports Backgrounding of Applications


    The Facebook SDK behaves differently, based upon whether the device supports backgrounding.
    This difference in behavior is achieved via the use of the following code:


    `  if ([UIDevice instancesRespondToSelector:@selector(isMultitaskingSupported)]
    &&`![images](images/U002.jpg)

    ` [[UIDevice currentDevice] isMultitaskingSupported]) {`

    `}`


    We are showing this here because it may be useful from time-to-time in your own
    application to choose different code paths based upon whether the device supports
    backgrounding of applications.


    ### OAuth in Twitter


    `OAuth` via the Facebook iOS SDK wasn''t too painful since the SDK''s developers
    have done a stellar job of wrapping everything up as nicely as possible with its
    SDK via simple APIs. `OAuth` via Twitter is a little more involved, but we''re
    going to get you through it.


    [Figure 5–19](#Chapter05.html#fig_5_19) shows a diagram of Twitter''s `OAuth`
    authentication flow.


    As we mentioned previously, Twitter doesn''t have an official iOS SDK, so some
    people in the open source community pieced together software from various projects
    to make a working iOS Twitter engine with `OAuth` support. We are going to show
    you how to use this open source software to quickly integrate Twitter authentication
    into your app.


    ![images](images/0519.jpg)


    **Figure 5–19.** *Twitter authentication flow (courtesy of Twitter.com)*'
