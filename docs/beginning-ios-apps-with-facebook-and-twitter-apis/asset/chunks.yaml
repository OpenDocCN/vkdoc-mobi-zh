    Of course, you can also fetch a user’s tagged photos, albums, and videos. Doing\
    \ so requires the extended permission `user_photos`, and the graph path is `photos`,\
    \ `albums`, or `videos`, respectively (see [Figure 7–5](#Chapter07.html#fig_7_5)).\
    \ This snippet fetches a user’s tagged photos:\n\n```\nNSMutableDictionary *params\
    \ = [NSMutableDictionary dictionary];\n// requires 'user_photos' extended permissions\n\
    [facebook requestWithGraphPath:@\"me/photos\"\n                     andParams:params\n\
    \                   andDelegate:self]; //tagged photos\n```\n\nSimilarly, this\
    \ snippet fetches a user’s tagged albums:\n\n```\n[facebook requestWithGraphPath:@\"\
    me/albums\"\n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\nFinally, this snippet fetches a user’s tagged videos:\n\n```\n[facebook\
    \ requestWithGraphPath:@\"me/videos\"\n                     andParams:params\n\
    \                   andDelegate:self];\n```\n\nNote that if the correct user permissions\
    \ are not included when authorizing the user, then the `request:didFailWithError`\
    \ delegate method is called.\n\n### Limiting Results\n\nOne nice thing you can\
