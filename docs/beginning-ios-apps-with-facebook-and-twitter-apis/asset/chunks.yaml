    Before we discuss these delegate callbacks a bit further, it’s high time we use
    the `dialog:` method to do some work for us. The Facebook SDK will display content
    within a pop-up dialog according to what you pass in as the `action` parameter
    to the `dialog:` method. In the case of posting information to a user’s Facebook
    wall, the appropriate action is `feed`. Therefore, in the most simple case, if
    we want to display a dialog that lets a user enter any freeform text and post
    it to his wall, we would call the `dialog:` method as follows and ensure that
    we pass the appropriate class (in this case, `DialogViewController`) as the delegate:


    `NSMutableDictionary * params = [NSMutableDictionary dictionary];`

    `[facebook dialog:@"feed" andParams:params andDelegate:self];`


    Calling the `dialog:` method this way displays this dialog to the user (see [Figure
    7–1](#Chapter07.html#fig_7_1)):


    ![images](images/0701.jpg)


    **Figure 7–1.** *Calling the dialog: method presents this dialog to the user.*


    As you can see, this is really bare bones and not what you are used to seeing
    from within web apps that let you post content to your Facebook wall. So let’s
    spice things up a bit via some additional parameters. Additional parameters can
    be specified for the `feed` dialog, and each parameter has a specific name and
    purpose. Posting YouTube videos is incredibly popular on Facebook, so let’s assume
    you want to post a link to a YouTube video to a user’s wall from within your application.
    To accomplish this, add a key/value pair to the `parameters` dictionary where
    the key is `link` and the value is the URL for the YouTube video (or whatever
    other web content you want to share):


    `NSDictionary* params = [NSDictionary dictionaryWithObject:`

    `   @http://www.youtube.com/watch?v=nqMc9B7uDV8 forKey:@"link"];`


    `[facebook dialog:@"feed" andParams:params andDelegate:self];`


    Since the underlying guts of the Facebook SDK’s dialog is a web view (more on
    this later), this code is formatted nicely into something you would expect and
    shows an image preview of what’s in the YouTube video with the post (see [Figure
    7–2](#Chapter07.html#fig_7_2)).


    ![images](images/0702.jpg)


    **Figure 7–2.** *Since Facebook dialogs are Web views, you can embed previews
    of content there.*


    `Now that was easy, wasn’t it? Let’s take it a step further, though, and see how
    we can customize the display of the feed dialog even more. The code that follows
    creates a sample dialog that Facebook likes to use:`

    `NSDictionary* params = [NSDictionary dictionaryWithObjectsAndKeys:`


    `   @"http://developers.facebook.com/docs/reference/dialogs/", @"link",`

    `   @"http://fbrell.com/f8.jpg", @"picture",`

    `   @"Facebook Dialogs", @"name",`

    `   @"Reference Documentation", @"caption",`

    `   @"Dialogs provide a simple interface for apps to interact with users.", @"description",`

    `   @"Facebook Dialogs are so easy!",  @"message", nil];`

    `      [facebook dialog:@"feed" andParams:params andDelegate:self];`


    In this example, we’re setting a bunch of values for different keys that Facebook
    makes available, so that you can really spice up the look and feel of the dialog.
    Setting a URL to an image as the value for the `picture` key lets you control
    what image is displayed with the post on the user’s Facebook wall. The value for
    the `name` key controls what will be displayed in the classic Facebook font as
    the main title of the wall post. The `caption` and `description` values let you
    provide preset text with the wall post. Last but not least, the `message` key
    lets you preset the text in the editable text field in the dialog. All this information
    is displayed in the dialog, as shown in [Figure 7–3](#Chapter07.html#fig_7_3).


    ![images](images/0703.jpg)


    **Figure 7–3.** *Anatomy of a Facebook dialog*


    Before we jump ahead to discuss some of the inner workings of the Facebook SDKs
    dialogs, we should take a short detour and go over the `FBDialogDelegate` methods.
    We’ve found through our own personal experience that how you use the `FBDialogDelegate`
    methods depends upon the context you use them in. For instance, you might want
    to implement these methods if you like to track some analytics within your application.


    Whenever the user takes an action with the dialog by pressing one of the Skip
    or Publish action buttons on the dialog, the SDK first calls the `dialogCompleteWithUrl:`
    method, and then the `dialogDidComplete:` method. If the user presses the Skip
    button, this URL will be passed to the `dialogCompleteWithUrl:` method:


    `"fbconnect://success"`


    If the user presses the Publish button instead, this URL will be passed to the
    `dialogCompleteWithUrl:` method:


    `"fbconnect://success/?post_id=623441509_10150094754996510"`'
  trans: "\n### Facebook 对话框\n\n为 iOS 应用增添魅力并使其受用户欢迎的好方法之一，就是让用户能够直接在应用内向他们的 Facebook\
    \ 主页发布内容。尽管 iOS 支持拷贝粘贴和快速应用切换，但如果用户为了在 Facebook 墙上发布来自应用内的一篇有趣文章链接而不得不切换到 iOS\
    \ 自带的 Facebook 应用，你的应用吸引力就会大打折扣。\n\n幸运的是，Facebook SDK 已让这项功能的实现和运行变得尽可能简单。这就引出了\
    \ `Facebook` 类中我们尚未讨论的 `dialog:` 方法：\n\n```\n- (void)dialog:(NSString *)action\n\
    \   andDelegate:(id<FBDialogDelegate>)delegate;\n\n- (void)dialog:(NSString *)action\n\
    \     andParams:(NSMutableDictionary *)params\n   andDelegate:(id <FBDialogDelegate>)delegate;\n\
    ```\n\n这两个方法都定义在 `Facebook.h` 中；虽然有两个方法可用，但我们将侧重于使用第二个，它允许我们传入额外的参数。第一个无参数的方法也可用，但大多数情况下你都需要向\
    \ `dialog:` 方法传递参数。此外，如果你查看 `Facebook.m`，你会发现第一个方法在调用第二个方法时，为其参数传入了一个空字典：\n\n\
    ```\n- (void)dialog:(NSString *)action\n   andDelegate:(id<FBDialogDelegate>)delegate\
    \ {\n  NSMutableDictionary * params = [NSMutableDictionary dictionary];\n  [self\
    \ dialog:action andParams:params andDelegate:delegate];\n}\n```\n\n这两个方法还都接受一个\
    \ *action* 参数和一个 *delegate* 参数。现在我们将在示例应用中研究它们。在本章的示例应用中，我们有一个名为 `DialogViewController`\
    \ 的新类。这个类看起来会与 `LoginViewController` 类非常相似，因为，你瞧，它就是直接模仿后者构建的。话虽如此，我们希望将注意力集中在\
    \ `DialogViewController` 类中的几个方面。\n\n由于我们将从 `DialogViewController` 类中向用户显示对话框，我们需要在头文件\
    \ `DialogViewController.h` 中声明它遵循 `FBDialogDelegate` 协议：\n\n```\n@interface DialogViewController\
    \ : UIViewController <FBDialogDelegate> {\n}\n@end\n```\n\n在 `DialogViewController.m`\
    \ 中，我们需要定义以下每个委托回调方法：\n\n```\n- (void)dialogDidComplete:(FBDialog *)dialog;\n\
    - (void)dialogCompleteWithUrl:(NSURL *)url;\n- (void)dialogDidNotCompleteWithUrl:(NSURL\
    \ *)url;\n- (void)dialogDidNotComplete:(FBDialog *)dialog;\n- (void)dialog:(FBDialog*)dialog\
    \ didFailWithError:(NSError *)error;\n- (BOOL)dialog:(FBDialog*)dialog shouldOpenURLInExternalBrowser:(NSURL\
    \ *)url;\n```\n\n在进一步讨论这些委托回调之前，是时候使用 `dialog:` 方法来为我们做点工作了。Facebook SDK 会根据你传递给\
    \ `dialog:` 方法的 `action` 参数，在弹出对话框中显示相应内容。在向用户的 Facebook 主页发布信息的情况下，合适的 action\
    \ 是 `feed`。因此，在最简单的情况下，如果我们想显示一个对话框，让用户输入任意自由格式文本并发布到他的墙上，我们将如下调用 `dialog:` 方法，并确保将合适的类（本例中为\
    \ `DialogViewController`）作为委托传入：\n\n```\nNSMutableDictionary * params = [NSMutableDictionary\
    \ dictionary];\n[facebook dialog:@\"feed\" andParams:params andDelegate:self];\n\
    ```\n\n以这种方式调用 `dialog:` 方法会向用户显示这个对话框（见图 7-1）：\n\n![images](img/0701.jpg)\n\n\
    **图 7-1.** *调用 dialog: 方法会向用户展示此对话框。*\n\n如你所见，这非常基础，并非你在 Web 应用中看到的那种让你向 Facebook\
    \ 墙发布内容的功能。那么，让我们通过一些额外的参数来增加点趣味。可以为 `feed` 对话框指定额外的参数，每个参数都有特定的名称和用途。在 Facebook\
    \ 上发布 YouTube 视频非常流行，所以我们假设你想从应用内向用户的墙上发布一个 YouTube 视频链接。为此，向 `parameters` 字典添加一个键值对，其中键是\
    \ `link`，值是该 YouTube 视频的 URL（或任何你想分享的其他网页内容）：\n\n```\nNSDictionary* params = [NSDictionary\
    \ dictionaryWithObject:\n   @http://www.youtube.com/watch?v=nqMc9B7uDV8 forKey:@\"\
    link\"];\n\n[facebook dialog:@\"feed\" andParams:params andDelegate:self];\n```\n\
    \n由于 Facebook SDK 对话框的底层机制是一个 Web 视图（稍后详述），这段代码会漂亮地格式化成你期望的样子，并显示帖子中 YouTube 视频的图片预览（见图\
    \ 7-2）。\n\n![images](img/0702.jpg)\n\n**图 7-2.** *由于 Facebook 对话框是 Web 视图，你可以在此嵌入内容预览。*\n\
    \n这很容易，对吧？不过，让我们更进一步，看看如何更深度地定制 feed 对话框的显示。下面的代码创建了一个 Facebook 喜欢使用的示例对话框：\n\n\
    ```\nNSDictionary* params = [NSDictionary dictionaryWithObjectsAndKeys:\n   @\"\
    http://developers.facebook.com/docs/reference/dialogs/\", @\"link\",\n   @\"http://fbrell.com/f8.jpg\"\
    , @\"picture\",\n   @\"Facebook Dialogs\", @\"name\",\n   @\"Reference Documentation\"\
    , @\"caption\",\n   @\"Dialogs provide a simple interface for apps to interact\
    \ with users.\", @\"description\",\n   @\"Facebook Dialogs are so easy!\",  @\"\
    message\", nil];\n      [facebook dialog:@\"feed\" andParams:params andDelegate:self];\n\
    ```\n\n在这个例子中，我们为 Facebook 提供的不同键设置了多个值，这样你就可以真正提升对话框的外观和感觉。将图片的 URL 设置为 `picture`\
    \ 键的值，可以控制帖子在用户 Facebook 墙上显示的图片。`name` 键的值控制着以经典的 Facebook 字体显示为墙贴主标题的内容。`caption`\
    \ 和 `description` 值让你能为墙贴提供预设文本。最后但同样重要的是，`message` 键让你可以预设对话框可编辑文本字段中的内容。所有这些信息都会显示在对话框中，如图\
    \ 7-3 所示。\n\n![images](img/0703.jpg)\n\n**图 7-3.** *Facebook 对话框的结构剖析*\n\n在我们深入讨论\
    \ Facebook SDK 对话框的一些内部工作原理之前，我们应该先稍微绕道，回顾一下 `FBDialogDelegate` 方法。根据我们自身的经验，如何使用\
    \ `FBDialogDelegate` 方法取决于你使用它们的上下文。例如，如果你喜欢在应用内跟踪一些分析数据，你可能想要实现这些方法。\n\n每当用户通过按下对话框上的“跳过”或“发布”操作按钮来对对话框执行操作时，SDK\
    \ 会先调用 `dialogCompleteWithUrl:` 方法，然后调用 `dialogDidComplete:` 方法。如果用户按下“跳过”按钮，此\
    \ URL 将被传递给 `dialogCompleteWithUrl:` 方法：\n\n```\n\"fbconnect://success\"\n```\n\
    \n如果用户改为按下“发布”按钮，此 URL 将被传递给 `dialogCompleteWithUrl:` 方法：\n\n```\n\"fbconnect://success/?post_id=623441509_10150094754996510\"\
    \n```\n"
- fmt: "We’ll be the first to admit that we didn’t actually know what to make of this\
    \ response at first; however, we did a little digging, so you’re in luck. It turns\
    \ out that the `post_id` parameter in the URL contains two separate pieces of\
    \ identifying information that are concatenated together with an underscore. Here\
    \ is the definition of the `post_id` parameter:\n\n`post_id=<userIdentifier>_<postIdentifier>`\n\
    \nIn this case, `userIdentifier` indicates the Facebook Graph path for the logged\
    \ in user who made the post via our application. Similarly, `postIdentifier` indicates\
    \ the Facebook Graph path identifier for that post. If you parse those two pieces\
    \ of information out of the `post_id` parameter, you can put them into the following\
    \ URL scheme to see the actual result:\n\n`www.facebook.com/<userIdentifier>/posts/<postIdentifier>`\n\
    \nArmed with this knowledge, you could show the user her actual post on Facebook’s\
    \ mobile site by directing her to the properly constructed URL, which is shown\
    \ here:\n\n`www.facebook.com/623441509/posts/10150094754996510`\n\nOn a final\
    \ note, if the user chooses to close the dialog via the X button in the upper-right\
    \ corner, the `dialogDidNotCompleteWithUrl:` delegate method is called with a\
    \ nil `NSURL` object as its parameter, and then `dialogDidNotComplete:` is called.\n\
    \n## Under the Hood: The FBDialog Class\n\nIf you’re thinking that last section\
    \ was too easy, you’re right. We tip our hat to the Facebook engineers for making\
    \ this as painless as possible. A good SDK has well thought out, easy-to-use methods\
    \ that make things as painless as possible.\n\nGiven our discussion in the last\
    \ chapter about the workings of the `FBRequest` class, it should come as no surprise\
    \ that posting information to Facebook is also done ultimately via an HTTP-based\
    \ API. Once again though, the engineers at Facebook were good sports and provided\
    \ us with the `FBDialog` class in their SDK to do all of the heavy lifting.\n\n\
    The code for the `FBDialog` class is found in the `FBDialog.m` and `FBDialog.h`\
    \ files in the FBConnect folder in all of the sample projects. There are a lot\
    \ of interesting things to be learned by just examining the declaration of the\
    \ `FBDialog` class:\n\n```\n@interface FBDialog : UIView <UIWebViewDelegate> {\n\
    \  id<FBDialogDelegate> _delegate;\n  NSMutableDictionary *_params;\n  NSString\
    \ * _serverURL;\n  NSURL* _loadingURL;\n  UIWebView* _webView;\n  UIActivityIndicatorView*\
    \ _spinner;\n  UIImageView* _iconView;\n  UILabel* _titleLabel;\n  UIButton* _closeButton;\n\
    \  UIDeviceOrientation _orientation;\n  BOOL _showingKeyboard;\n\n  // Ensures\
    \ that UI elements behind the dialog are disabled.\n  UIView* _modalBackgroundView;\n\
    }\n@end\n```\n\nThe first two points of interest are that `FBDialog` is just a\
    \ `UIView` and that it owns a modal background view:\n\n```\n// Ensures that UI\
    \ elements behind the dialog are disabled.\nUIView* _modalBackgroundView;\n```\n\
    \nWhy would the `FBDialog` class be just a normal `UIView`? Also, why would a\
    \ dialog class have something like a modal background view within it? Doesn’t\
    \ the iOS SDK already have a class for showing a modal pop-up dialog?\n\nAlthough\
    \ this would be nice to have, it turns out that the iOS SDK doesn’t provide an\
    \ out-of-the-box solution for showing a modal pop-up dialog. This means it’s up\
    \ to developers to home grow their own. The most trusted way to accomplish this\
    \ is to create a view that is the size of the entire application frame, so that\
    \ users cannot interact with anything “behind” the modal pop-up dialog. The code\
    \ for this sits in `FBDialog`’s `show:` method, and it is useful if you ever need\
    \ to accomplish something like this for your own application (note that we already\
    \ created the `_modalBackgroundView` object in `FBDialog`’s `init:` method):\n\
    \n```\nUIWindow* window = [UIApplication sharedApplication].keyWindow;\nif (!window)\
    \ {\n    window = [[UIApplication sharedApplication].windows objectAtIndex:0];\n\
    }\n\n_modalBackgroundView.frame = window.frame;\n[_modalBackgroundView addSubview:self];\n\
    [window addSubview:_modalBackgroundView];\n\n[window addSubview:self];\n```\n\n\
    Another important piece to the `FBDialog` puzzle is that it owns a `UIWebView`\
    \ and is a `UIWebViewDelegate`:\n\n```\nUIWebView* _webView;\n```\n\nIt turns\
    \ out that this `UIWebView` is what handles all of the rendering magic of the\
    \ majority of the content in an `FBDialog`. The main content of the `FBDialog`\
    \ is actually fetched over the web from Facebook via its dialog URL, and it is\
    \ displayed in the `UIWebView` in `FBDialog`. In particular, it has a mobile version\
    \ of its dialog URL, which is defined in `Facebook.m`:\n\n```\nstatic NSString*\
    \ kDialogBaseURL = @\"https://m.facebook.com/dialog/\";\n```\n\nWhen you use the\
    \ Facebook SDK’s `dialog:` method to create a dialog and pass it an action, this\
    \ action gets added to the dialog URL, and the SDK also adds required parameters\
    \ such as the version of the Facebook SDK, the display style, and a redirect URI.\
    \ For a bare bones `feed` dialog, the final request looks like this:\n\n`https://m.facebook.com/dialog/feed?sdk=2&redirect_uri=fbconnect%3A%2F%2Fsuccess&app_id=114442211957627&display=touch`\n\
    \nWe’ve included the actual `dialog:` method here, so that you can see how it\
    \ presets some of the parameters for the dialog URL, creates the dialog, and then\
    \ shows it. Note that the final dialog URL is constructed in `FBDialog`’s `generateURL:`\
    \ method:\n\n```\n- (void)dialog:(NSString *)action\n     andParams:(NSMutableDictionary\
    \ *)params\n   andDelegate:(id <FBDialogDelegate>)delegate {\n\n  [_fbDialog release];\n\
    \n  NSString *dialogURL = [kDialogBaseURL stringByAppendingString:action];\n \
    \ [params setObject:@\"touch\" forKey:@\"display\"];\n  [params setObject:kSDKVersion\
    \ forKey:@\"sdk\"];\n  [params setObject:kRedirectURL forKey:@\"redirect_uri\"\
    ];\n\n  if (action == kLogin) {\n    [params setObject:@\"user_agent\" forKey:@\"\
    type\"];\n    _fbDialog = [[FBLoginDialog alloc] initWithURL:dialogURL\n     \
    \   loginParams:params delegate:self];\n  } else {\n    [params setObject:_appId\
    \ forKey:@\"app_id\"];\n    if ([self isSessionValid]) {\n      [params setValue:[self.accessToken\n\
    \      stringByReplacingPercentEscapesUsingEncoding:NSUTF8StringEncoding]\n  \
    \                                          forKey:@\"access_token\"];\n    }\n\
    \    _fbDialog = [[FBDialog alloc] initWithURL:dialogURL\n                   \
    \                    params:params\n                                     delegate:delegate];\n\
    \  }\n\n  [_fbDialog show];\n}\n```\n\n## Posting to Facebook and Authorization\n\
    \nBefore we move onto other feats of magic and wonder, we’d like to mention that,\
    \ if your main goal is to let users share information from your app or the web\
    \ to their Facebook page, it really is as simple as integrating with the Facebook\
    \ iOS SDK in general—as we’ve shown here when using the `dialog:` method. In fact,\
    \ you don’t even have to worry about doing any separate authorization calls since\
    \ Facebook will handle this for you via various web redirects when you request\
    \ a dialog without authorization. When you request a dialog without authorization,\
    \ the dialog will *automagically* bring the user to the Facebook mobile `OAuth`\
    \ authorization page (see [Figure 7–4](#Chapter07.html#fig_7_4)). Once the user\
    \ logs in, he will be redirected back to the original dialog that you requested.\
    \ It really doesn’t get any easier than that, does it?\n\n![images](images/0704.jpg)\n\
    \n**Figure 7–4.** *The Facebook OAuth login view*\n\nWe would also like to point\
    \ out that posting to Facebook does not require extended permissions, so you get\
    \ this feature for free. What this means in practical terms is that you don’t\
    \ have to pass in any extra permissions to the `authorize:` call that we covered\
    \ in [Chapter 5](#Chapter05.html#ch5) if you are using that method of authorization."
