  trans: "\n当上述方法发布通知表明推文请求已完成时，`TimelineViewController`的`twitterTimelineRequestDidComplete:`方法会通过`NSNotificationCenter`被调用。利用`NSObject`的`performSelectorInBackground:withObject:`方法，`TimelineViewController`的`synchronizeTweets:`方法会在后台线程执行，并接收来自通知中`NSDictionary`的`Tweets`数组：\n\
    \n```\n- (void)twitterTimelineRequestDidComplete:(NSNotification*)notification\
    \ {\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n    [self\
    \ performSelectorInBackground:@selector(synchronizeTweets:)\n                \
    \           withObject:[notification.userInfo\n                              \
    \   objectForKey:@\"tweets\"]];\n}\n```\n\n`TwitterDataStore`的`synchronizeTweets:`方法设计为在完成同步过程时发出通知（更多内容请参阅后续部分）。因此，在`TimelineViewController`的`synchronizeTweets:`方法中，我们设置自己来接收`TwitterDataStore`完成任务时的通知。一旦收到通知，我们就启动同步过程：\n\
    \n```\n- (void)synchronizeTweets:(NSArray*)newTweets {\n    //listen for a notification\
    \ with the name of the identifier\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                              selector:@selector(tweetsDidSynchronize:)\n\
    \                                                  name:@\"tweetsDidSynchronize\"\
    \n                                                object:nil];\n    [twitterDataStore\
    \ synchronizeTweets:newTweets];\n}\n```\n\n当`TwitterDataStore`完成同步过程时，它会通过`NSNotificationCenter`发出一个通知，`TimelineViewController`的`tweetsDidSynchronize:`方法将被执行，并在主线程调用`refreshUI`以从`TwitterDataStore`获取最新的推文并更新用户界面中的表格。关于线程的说明：我们始终建议在后台线程处理或同步数据，以保持用户界面的响应性。但是，如果你从后台线程发出通知或执行委托回调方法，执行仍将在后台线程中进行。如果你的用户界面需要更新，我们建议使用`NSObject`的`performSelectorOnMainThread:withObject:waitUntilDone:`方法在主执行线程上刷新用户界面：\n\
    \n```\n- (void)tweetsDidSynchronize:(NSNotification*)notification {\n    [[NSNotificationCenter\
    \ defaultCenter] removeObserver:self];\n    //update the UI on the main thread\n\
    \    [self performSelectorOnMainThread:@selector(refreshUI)\n                \
    \           withObject:nil\n                        waitUntilDone:YES];\n}\n```\n\
    \n以下是实际刷新用户界面并将给定推文信息与其关联的`UITableViewCell`关联的代码：\n\n```\n- (void)refreshUI {\n\
    \    [tweets release];\n    tweets = [[twitterDataStore tweets] retain];\n   \
    \ [self.tableView reloadData];\n}\n\n// Customize the appearance of table view\
    \ cells.\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n    TweetTableViewCell\
    \ *cell =\n        (TweetTableViewCell*)[tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil) {\n        cell = [[[TweetTableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                          reuseIdentifier:CellIdentifier] autorelease];\n\
    \    }\n    // Configure the cell...\n    Tweet *tweet = [tweets objectAtIndex:[indexPath\
    \ row]];\n    cell.tweet = tweet;\n    return cell;\n}\n```\n\n`TimelineViewController`使用`TwitterDataStore`获取和存储其所显示的数据，因此我们来看看`TwitterDataStore`如何使用\
    \ Core Data 来存储和检索推文。在`TwitterDataStore`能够返回推文之前，我们必须先给它一些推文来存储。`TwitterDataStore`在其`synchronizeTweets:`方法中存储推文，该方法将推文数组作为其唯一参数。\n\
    \n这个同步方法有点简单粗暴。它首先通过`TwitterDataStore`的`deleteTweets`方法删除所有已存储的推文。然后，它遍历传入的推文，为每一条推文创建一个新对象，初始化该推文的数据，并将其保存到\
    \ Core Data 模型中。\n\n让我们更详细地了解一下。请记住，`MGTwitterEngine`返回一个推文数组，并且数组中的每条推文都由一个包含键/值对的`NSDictionary`对象表示，其中包含关于该推文的所有信息。当我们遍历推文数组时，我们使用\
    \ Objective-C 中一种简洁的`for-loop`机制：\n\n```\nfor (NSDictionary *tweetDictionary in\
    \ tweets) {\n}\n```\n\n简而言之，这个`for-loop`表示我们将为`tweets`数组中的每个元素执行`for-loop`的主体。每次执行`for-loop`主体时，`tweets`数组中的下一个元素都会被存储在一个名为`tweetDictionary`的`NSDictionary`对象中（因为每个元素都是一个`NSDictionary`）。我们可以在`for-loop`主体中引用这个元素。\n\
    \n对于数组中的每条推文，我们通过`NSEntityDescription`的`insertNewObjectForEntityForName:inManagedObjectContext:`方法创建一个新的`Tweet`对象。将`Tweet`作为实体名称传递，会让\
    \ Core Data 创建一个存储在托管对象上下文中的新的未填充的`Tweet`类实例。我们还提供了我们的托管对象上下文。接下来，我们设置推文的`text`属性和`id`属性的值（注意使用`NSNumberFormatter`将`NSString`对象转换为`NSNumber`对象）。最后一步，我们通知托管对象上下文将其状态保存到磁盘。如果未能对托管对象上下文调用`save`，将导致没有数据被永久存储在我们的\
    \ Core Data 模型中。在退出方法之前，我们发布一个通知，以便当所有新的推文都存储在模型中时（即，我们更新用户界面时），我们应用程序的其他部分可以执行必要的操作：\n\
    \n```\n- (void)synchronizeTweets:(NSArray*)tweets {\n    NSAutoreleasePool *autoReleasePool\
    \ = [[NSAutoreleasePool alloc] init];\n    @synchronized(self) {\n        [self\
    \ deleteTweets];\n        for (NSDictionary *tweetDictionary in tweets) {\n  \
    \          Tweet *tweet = (Tweet *)[NSEntityDescription\n                insertNewObjectForEntityForName:@\"\
    Tweet\"\n                        inManagedObjectContext:self.managedObjectContext];\n\
    \            NSNumberFormatter * f = [[NSNumberFormatter alloc] init];\n     \
    \       NSNumber * tweetId = [f numberFromString:[tweetDictionary objectForKey:@\"\
    id\"]];\n            [tweet setId:tweetId];\n            [f release];\n      \
    \      NSString *text = [tweetDictionary objectForKey:@\"text\"];\n          \
    \  [tweet setText:text];\n        }\n        NSError *error = nil;\n        if\
    \ (![self.managedObjectContext save:&error]) {\n            // Handle the error.\n\
    \        }\n    }\n    // post a notification that the tweets are available\n\
    \    // have responder update itself on the main thread\n    [[NSNotificationCenter\
    \ defaultCenter]\n        postNotificationName:@\"tweetsDidSynchronize\"\n   \
    \                   object:self\n                    userInfo:nil];\n    [autoReleasePool\
    \ release];\n}\n```\n"
- fmt: "# Core Data Tweet Fetching and Deletion\n\nWhen it comes time to fetch the\
    \ Tweets from our Core Data model, we use the Core Data class, `NSFetchRequest`.\
    \ `NSFetchRequest` takes an entity description (`Tweet`, in this case) and a managed\
    \ object context. Next, we retrieve the Tweets from our Core Data model by calling\
    \ the managed object context’s `executeFetchRequest:` method and passing it the\
    \ `NSFetchRequest` object that we initialized. The array of Tweets is then returned\
    \ from the method. Note that, if you want to sort the results of the fetch request\
    \ from the managed object context, you need to create and set an `NSSortDescriptor`\
    \ for the `NSFetchRequest`. In this example, we initialize an `NSSortDescriptor`\
    \ that will sort the returned array of Tweets in descending order, based on the\
    \ value of the `id` attribute of the Tweets:\n\n```\n- (NSArray*)tweets\n{\n \
    \   NSMutableArray *tweets = nil;\n\n    @synchronized(self) {\n        NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n        NSEntityDescription *entity\
    \ =\n                                           [NSEntityDescription entityForName:@\"\
    Tweet\"\n                                inManagedObjectContext:self.managedObjectContext];\n\
    \        [request setEntity:entity];\n\n        NSSortDescriptor *sortDescriptor\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"id\"\n                          \
    \                                             ascending:NO];\n        NSArray\
    \ *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n\
    \        [request setSortDescriptors:sortDescriptors];\n        [sortDescriptors\
    \ release];\n        [sortDescriptor release];\n\n        NSError *error = nil;\n\
    \        NSMutableArray *mutableFetchResults =\n                 [[self.managedObjectContext\
    \ executeFetchRequest:request error:&error] mutableCopy];\n        if (mutableFetchResults\
    \ == nil) {\n            // Handle the error.\n        }\n\n        tweets = [mutableFetchResults\
    \ retain];\n        [mutableFetchResults release];\n        [request release];\n\
    \    }\n\n    return tweets;\n}\n```\n\nTo delete all of the Tweets in our Core\
    \ Data model, we fetch all of the Tweets that are currently stored in our model,\
    \ loop through them one-by-one, tell the managed object context to delete the\
    \ given Tweet, and then save the managed object context to commit the results\
    \ to disk:\n\n```\n- (void)deleteTweets\n{\n    @synchronized(self) {\n      \
    \  NSArray *tweets = [self tweets];\n        for (Tweet *tweet in tweets) {\n\
    \            [self.managedObjectContext deleteObject:tweet];\n        }\n\n  \
    \      // Commit the change.\n\n        NSError *error = nil;\n\n        if (![self.managedObjectContext\
    \ save:&error]) {\n            // Handle the error.\n        }\n    }\n}\n```\n\
    \n## Conclusion\n\nWe covered some really interesting new ground in this chapter\
    \ with respect to uploading photos and building a simple data model for our application\
    \ using Core Data. There are other options available for building a data model—such\
    \ as SQLite—so we recommend you explore other ways of storing data for offline\
    \ or quick retrieval within your application. Be aware that you may want to build\
    \ some smarts into your model that limit the amount of storage that your application\
    \ uses. For instance, you may want to store only a certain number of recent Tweets\
    \ or perhaps only Tweets within the last 12 hours.\n\nIn the next chapter, we\
    \ will go over different location-based scenarios; explain how to integrate location\
    \ information into your app, as well as with social networking data for Facebook\
    \ and Twitter; and also continue to refine how we integrate these services into\
    \ our application by setting up a stand alone controller that we can use anywhere\
    \ within our app.\n\n# Chapter 9\n\n# Working with Location Awareness and Streaming\
    \ Data\n\nThis chapter covers the nuts and bolts of using location on iOS with\
    \ Facebook and Twitter. We'll also discuss working with streaming APIs.\n\nOne\
    \ of the main trends to have emerged within social applications is adding a location\
    \ context to user experiences. In the worlds of Facebook and Twitter, this involves\
    \ letting users *check in* to places on Facebook or search for nearby Tweets on\
    \ Twitter, as well as a host of other scenarios. We're going to walk you through\
    \ the ins and outs of using iOS's `CoreLocation` and `MapKit` libraries to incorporate\
    \ location and maps into your application, and then use the location information\
    \ from these libraries to show some location-based features of Facebook and Twitter.\n\
    \n## Here, There, and Everywhere\n\nAt first glance, incorporating location information\
    \ into your application seems like a trivial task; however, there are a number\
    \ of considerations to make with respect to privacy for your users, power/battery\
    \ conservation on a device, and the `CoreLocation` and `MapKit` APIs. The sample\
    \ applications for this chapter incorporate all of the techniques that follow.\
    \ Since `CoreLocation` and `MapKit` are themselves extensive APIs, it's necessary\
    \ to run through the core features that these APIs provide and highlight some\
    \ new features that debuted iOS 4.0. After that, this chapter will delve into\
    \ the Facebook and Twitter APIs for location."
