    \ each item in the preceding examples. The method is the same, regardless of what\
    \ you are requesting. This is accomplished via the `fields` parameter. For example,\
    \ when requesting friends, you might want only the Facebook id, name, and picture\
    \ of each friend. You can accomplish this by using the `requestWithGraphPath:andParams:andDelegate`\
    \ method:\n\n```\nNSMutableDictionary *params = [NSMutableDictionary dictionary];\n\
    [params setObject:@\"id,name,picture\" forKey:@\"fields\"];\n[facebook requestWithGraphPath:@\"\
