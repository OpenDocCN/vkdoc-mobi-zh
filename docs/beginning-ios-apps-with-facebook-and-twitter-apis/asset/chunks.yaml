    Although this would be nice to have, it turns out that the iOS SDK doesn’t provide
    an out-of-the-box solution for showing a modal pop-up dialog. This means it’s
    up to developers to home grow their own. The most trusted way to accomplish this
    is to create a view that is the size of the entire application frame, so that
    users cannot interact with anything “behind” the modal pop-up dialog. The code
    for this sits in `FBDialog’sshow:` method, and it is useful if you ever need to
    accomplish something like this for your own application (note that we already
