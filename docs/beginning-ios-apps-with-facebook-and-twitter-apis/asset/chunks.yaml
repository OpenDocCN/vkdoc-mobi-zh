    `}`


    The one thing that is missing from the MGTwitterEngine SDK is a dialog class that
    makes it easy to construct Tweets or Direct Messages, so this is something that
    you will have to build on your own. :( Don’t forget to look in `MGTwitterEngine.h`
    for more methods that you can use since we didn’t cover them all here.


    #### Under the Hood: Twitter URLs


    One nice thing about all of the preceding operations is that they share a common
    URL scheme from the underlying Twitter HTTP API:


    `http://twitter.com/`


    The rest of the path of the URL is then constructed based on what you want to
    do. For status-related operations, the path is:


    `http://twitter.com/statuses`


    For user-related operations, the path is:


    `http://twitter.com/users`


    And for direct messages, the path is:


    `http://twitter.com/direct_messages`


    The final part of the path is the specific operation you want to perform. This
    is followed by the extension (which will match what you want the response to be
    formatted in), and then the parameters. So, if we were going to get the public
    timeline in XML (`MGTwitterEngine` requests XML responses by default), it would
    look like this:


    `http://twitter.com/statuses/public_timeline.xml`


    Review the code in `SA_OAuthTwitterEngine’s _sendRequestWithMethod:` if you want
    a more detailed understanding of how the final URL is constructed for each request.


    #### The Twitter Dev Console


    If you’d rather get used to using some of the Twitter APIs from your web browser,
    Twitter has a great online tool for doing so that we highly recommend. The tool
    can be found at this URL:


    `http://dev.twitter.com/console`


    The Twitter dev console lets you construct different requests or make different
    types of posts and see what the response is from Twitter. [Figure 7–7](#Chapter07.html#fig_7_7)
    shows what the main part of the page looks like.


    ![images](images/0707.jpg)


    **Figure 7–7.** *The Twitter API console*


    Another great resource is the documentation for each Twitter HTTP API, where you
    can get exact details on using each API:


    `http://dev.twitter.com/doc`


    ### Conclusion


    You are now officially armed and dangerous. We’ve now covered enough APIs for
    Facebook and Twitter and shown you how to use them with the respective iOS SDKs.
    In theory, you could start building your own Facebook or Twitter application at
    this point. It’s a pretty daunting task, but you’ve now got the tools to do it.
    However, keep reading to gain more insight into working with real-time data and
    location, as well as to see different ways to mesh these two APIs together.


    ## Chapter 8


    ## POSTing, Data Modeling, and Going Offline


    This chapter covers the nuts and bolts of posting photos to Facebook and Twitter.
    We’ll also discuss offline storage; and finally, we’ll talk about a popular cross-posting
    library and how to use it on your own.


    Up to this point, we’ve covered a lot of different topics on programming for Facebook
    and Twitter on iOS. In order to show these topics as clearly as possible, however,
    we broke some good programming practices. So in this chapter, we are going to
    mend our ways and show better techniques for integrating these services into your
    application. We are also going to cover offline scenarios and storage. But before
    we go there, we need to add one more essential skill to our toolbelt: posting
    photos to Facebook and Twitter.


    ### Strike a Pose


    For most applications that use images on an iOS device, the images are either
    downloaded from the web or created by the app and stored as part of the application’s
    data. It’s also possible to retrieve images from the device’s Photo Library. Fortunately
    for us, Apple has made it easy to grab images from the Photo Library, so we’re
    going to take this path for our sample applications. The photo upload example
    applications for this chapter are in the ApiFacebook and ApiTwitter folders, respectively,
    in the Chapter8 folder of the Git repository.'
  trans: "\n这将返回我们在第 6 章中展示过的相同信息字典，因此这里不再重复显示。请参阅第 6 章了解该响应中包含的内容。接下来，在 XCode 的主应用程序代理中的\
    \ `userInfoReceived:` 方法处设置一个断点，以观察其实际运行效果。\n\n如果你想关注某人，也可以使用以下代码来实现：\n\n```\n\
    [sa_OAuthTwitterEngine enableNotificationsFor:@“christhepiss”];\n```\n\n当你想发送一条私信时，请执行以下操作：\n\
    \n```\n[sa_OAuthTwitterEngine sendDirectMessage:@\"how goes it?\" to:@\"christhepiss\"\
