    \ = 333333;\n        \"profile_use_background_image\" = true;\n        protected\
    \ = 1;\n        \"screen_name\" = christhepiss;\n        \"show_all_inline_media\"\
    \ = false;\n        \"statuses_count\" = 451;\n        \"time_zone\" = \"Eastern\
    \ Time (US & Canada)\";\n        url = \"http://christhepiss.tumblr.com\";\n \
    \       \"utc_offset\" = \"-18000\";\n        verified = false;\n    };\n    \"\
    sender_id\" = 103384600;\n    \"sender_screen_name\" = christhepiss;\n    \"source_api_request_type\"\
    \ = 15;\n    text = \"hey jerky!\";\n}\n```\n\nThe one thing that is missing from\
    \ the `MGTwitterEngine` SDK is a dialog class that makes it easy to construct\
    \ Tweets or Direct Messages, so this is something that you will have to build\
    \ on your own. :( Don’t forget to look in `MGTwitterEngine.h` for more methods\
    \ that you can use since we didn’t cover them all here.\n\n### Under the Hood:\
    \ Twitter URLs\n\nOne nice thing about all of the preceding operations is that\
    \ they share a common URL scheme from the underlying Twitter HTTP API:\n\n`http://twitter.com/`\n\
    \nThe rest of the path of the URL is then constructed based on what you want to\
    \ do. For status-related operations, the path is:\n\n`http://twitter.com/statuses`\n\
    \nFor user-related operations, the path is:\n\n`http://twitter.com/users`\n\n\
    And for direct messages, the path is:\n\n`http://twitter.com/direct_messages`\n\
    \nThe final part of the path is the specific operation you want to perform. This\
    \ is followed by the extension (which will match what you want the response to\
    \ be formatted in), and then the parameters. So, if we were going to get the public\
    \ timeline in XML (`MGTwitterEngine` requests XML responses by default), it would\
    \ look like this:\n\n`http://twitter.com/statuses/public_timeline.xml`\n\nReview\
    \ the code in `SA_OAuthTwitterEngine`’s `_sendRequestWithMethod:` if you want\
    \ a more detailed understanding of how the final URL is constructed for each request.\n\
    \n### The Twitter Dev Console\n\nIf you’d rather get used to using some of the\
    \ Twitter APIs from your web browser, Twitter has a great online tool for doing\
    \ so that we highly recommend. The tool can be found at this URL:\n\n`http://dev.twitter.com/console`\n\
    \nThe Twitter dev console lets you construct different requests or make different\
    \ types of posts and see what the response is from Twitter. [Figure 7–7](#Chapter07.html#fig_7_7)\
    \ shows what the main part of the page looks like.\n\n![images](images/0707.jpg)\n\
    \n**Figure 7–7.** *The Twitter API console*\n\nAnother great resource is the documentation\
    \ for each Twitter HTTP API, where you can get exact details on using each API:\n\
    \n`http://dev.twitter.com/doc`\n\n### Conclusion\n\nYou are now officially armed\
    \ and dangerous. We’ve now covered enough APIs for Facebook and Twitter and shown\
    \ you how to use them with the respective iOS SDKs. In theory, you could start\
    \ building your own Facebook or Twitter application at this point. It’s a pretty\
    \ daunting task, but you’ve now got the tools to do it. However, keep reading\
    \ to gain more insight into working with real-time data and location, as well\
    \ as to see different ways to mesh these two APIs together.\n\n## Chapter 8\n\n\
    ## POSTing, Data Modeling, and Going Offline\n\nThis chapter covers the nuts and\
    \ bolts of posting photos to Facebook and Twitter. We’ll also discuss offline\
    \ storage; and finally, we’ll talk about a popular cross-posting library and how\
    \ to use it on your own.\n\nUp to this point, we’ve covered a lot of different\
    \ topics on programming for Facebook and Twitter on iOS. In order to show these\
    \ topics as clearly as possible, however, we broke some good programming practices.\
    \ So in this chapter, we are going to mend our ways and show better techniques\
    \ for integrating these services into your application. We are also going to cover\
    \ offline scenarios and storage. But before we go there, we need to add one more\
    \ essential skill to our toolbelt: posting photos to Facebook and Twitter.\n\n\
    ### Strike a Pose\n\nFor most applications that use images on an iOS device, the\
    \ images are either downloaded from the web or created by the app and stored as\
    \ part of the application’s data. It’s also possible to retrieve images from the\
    \ device’s Photo Library. Fortunately for us, Apple has made it easy to grab images\
    \ from the Photo Library, so we’re going to take this path for our sample applications.\
    \ The photo upload example applications for this chapter are in the `ApiFacebook`\
    \ and `ApiTwitter` folders, respectively, in the `Chapter8` folder of the Git\
    \ repository."
