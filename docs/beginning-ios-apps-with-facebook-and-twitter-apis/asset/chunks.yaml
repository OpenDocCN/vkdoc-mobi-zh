    \ -1, &stmt, NULL)) {\nNSLog(@\"error: '%s'\", sqlite3_errmsg(database));\nsqlite3_exec(database,\
    \ \"ROLLBACK;\", NULL, NULL, NULL);\n            }\n\n            NSNumberFormatter\
    \ * f = [[NSNumberFormatter alloc] init];\n            NSNumber * tweetId =\n\
    \              [f numberFromString:[tweetDictionary objectForKey:@\"id\"]];\n\
    \            sqlite3_bind_int64(stmt, 1, [tweetId longLongValue]);\n         \
    \   [f release];\n```"
  raw: '#### Reimplementing OfflineTwitter Without Core Data


    Since the original architecture for the OfflineTwitter application kept all of
    the data access code in the `TwitterDataStore` class, almost all of the user interface
    views and controllers can be left as-is. The only work to do is to create a version
    of `TwitterDataStore` that uses SQLite directly to store, retrieve, and delete
    Tweets instead of Core Data.


    First, the `Tweet` class is adjusted slightly, so that it''s no longer a managed
    object:


    `@interface Tweet : NSObject {`

    `}`


    `@property (nonatomic, retain) NSNumber * id;`

    `@property (nonatomic, retain) NSString * text;`


    `@end`


    Next, `TwitterDataStore` is stripped down, so it''s now a base class that any
    type of `TwitterDataStore` can be derived from:


    `@interface TwitterDataStore : NSObject {`

    `}`


    `- (NSURL *)applicationDocumentsDirectory;`

    `- (NSArray*)tweets;`

    `- (void)deleteTweets;`

    `- (void)synchronizeTweets:(NSArray*)tweets;`


    `@end`


    Now a class entitled `TwitterDataStore_SQLite` is created to do the actual heavy
    lifting of storing, retrieving, and deleting Tweets using SQLite. The class definition
    is located in `TwitterDataStore_SQLite.h`:


    `#import "TwitterDataStore.h"`


    `@class sqlite3;`

    `@interface TwitterDataStore_SQLite : TwitterDataStore {`

    `    sqlite3             *database;`

    `}`


    `@end`


    Next, let''s look at `TwitterDataStore_SQLite.m` in Xcode. Note that two additional
    helper methods are declared for the class:


    `- openDatabase`

    `- closeDatabase`


    In the initializer for the class, `sqlite3.h` is imported, so that `TwitterDataStore_SQLite`
    can use SQLite. It''s worth reviewing this header file to gain additional insight
    into what SQLite makes available to iOS applications since this discussion only
    touches the surface. Within the code, `openDatabase` is called to create the database
    (if it doesn''t already exist) and set up the table(s) within the database. In
    `dealloc`, the database is closed when the class is destroyed:


    `#import "TwitterDataStore_SQLite.h"`

    `#import "sqlite3.h"`

    `#import "Tweet.h"`


    `@interface TwitterDataStore_SQLite ()`

    `- (void)openDatabase;`

    `- (void)closeDatabase;`

    `@end`


    `@implementation TwitterDataStore_SQLite`


    `- (id)init`

    `{`

    `    if ((self = [super init])) {`

    `        [self openDatabase];`

    `    }`

    `    return self;`

    `}`


    `- (void)dealloc`

    `{`

    `    [self closeDatabase];`

    `    [super dealloc];`

    `}`


    The `openDatabase` method is tasked with creating the database and populating
    it with a table to store Tweets. If the database object is already open, this
    method does nothing. This is accomplished by checking to see if the pointer to
    the `sqlite3` database object is `NULL`. Opening a database via SQLite is accomplished
    with the `sqlite3_open` method. This method requires a path to the SQLite database
    file that it needs to create if it doesn''t already exist or to open if it does
    already exist. It also requires a pointer to a pointer of a `sqlite3` database
    object.


    If the database is opened successfully, the `Tweets` table for the database is
    created via the `sqlite3_exec` method, which executes a SQL query on the database.
    If the table doesn''t exist already, the query creates the table with columns
    for the id of a Tweet and the actual message content for the Tweet:


    `NSString *createTables =`

    `    @"CREATE TABLE IF NOT EXISTS tweets (id INTEGER`

    `                                         PRIMARY KEY,`

    `                                         message TEXT);";`


    Next, using `sqlite3_exec` again, an index is created for this table on the Tweet
    id in order to speed up querying Tweets out of the database:


    `NSString *createIndex =`

    `    @"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);";`


    `- (void)openDatabase`

    `{`

    `    if (nil == database) {`

    `        NSURL *path =`

    `               [[self applicationDocumentsDirectory]`

    `               URLByAppendingPathComponent:@"twitter.sqlite"];`


    `        if (SQLITE_OK !=`

    `            sqlite3_open([[path relativePath] UTF8String], &database)) {`

    `            [self closeDatabase];`

    `        } else {`

    `            char *errmsg;`


    `            NSString *createTables =`

    `            @"CREATE TABLE IF NOT EXISTS tweets (id INTEGER PRIMARY KEY,`

    `                                                 message TEXT);";`

    `            if (SQLITE_OK !=`

    `                sqlite3_exec(database,`

    `                [createTables UTF8String],`

    `                NULL,`

    `                NULL,`

    `                &errmsg)) {`

    `                NSLog(@"create table error: ''%s''", errmsg);`

    `            }`


    `            NSString *createIndex =`

    `                @"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);";`

    `            if (SQLITE_OK !=`

    `                sqlite3_exec(database,`

    `                             [createIndex UTF8String],`

    `                             NULL,`

    `                             NULL,`

    `                             &errmsg)) {`

    `                NSLog(@"create table index error: ''%s''", errmsg);`

    `            }`

    `        }`

    `    }`

    `}`


    `closeDatabase` is a very straightforward method. It calls `sqlite3_close` on
    the `sqlite3` database object owned by the class. This closes the database, and
    then sets the pointer to the database to `NULL`, so that the `openDatabase` method
    will reopen the database if it is subsequently called:


    `- (void)closeDatabase`

    `{`

    `    sqlite3_close(database);`

    `    database = nil;`

    `}`


    Since the goal of this sample project is to store Tweets offline in a SQLite database,
    the first task to take on is synchronizing the Tweets that are retrieved from
    Twitter and storing them in the database (see [Figure 10–12](#Chapter10.html#fig_10_12)).
    As with the Core Data example, this occurs in `TwitterDataStore`''s `synchronizeTweets:`
    method, which first deletes any Tweets in the database and then stores the new
    Tweets.


    Recall that the Tweets are passed in as an array of `NSDictionary objects`, where
    each `NSDictionary` in the array represents a Tweet. Let''s take a closer look
    at the `for-loop` that operates on the Tweets. The first step is to initialize
    a SQL transaction:


    `sqlite3_exec(database, "BEGIN;", NULL, NULL, NULL);`


    The actual SQL statement that will store a Tweet is as follows:


    `char *text = "INSERT INTO tweets (id, message) VALUES (?, ?);";`


    Note the presence of the `?` symbols in the statement. This denotes that the values
    are going to be bound to the statement after it is prepared via `sqlite3_prepare_v2`.
    Note that the Tweet id is being stored as a 64-bit `integer` and is bound via
    `sqlite3_bind_int64`. The contents of the Tweet are stored as `text` and are bound
    via `sqlite3_bind_text`. The transaction is then executed via `sqlite3_step`.
    The transaction could fail for some reasons, so steps are taken to roll back the
    transaction in the case of a failure. This preserves the state of the database
    if a failure occurs. Here''s the code to do this:


    `- (void)synchronizeTweets:(NSArray*)tweets`

    `{`

    `    NSAutoreleasePool *autoReleasePool =`

    `        [[NSAutoreleasePool alloc] init];`


    `    @synchronized(self) {`


    `        [self deleteTweets];`


    `        char *text = "INSERT INTO tweets (id, message) VALUES (?, ?);";`


    `        for (NSDictionary *tweetDictionary in tweets) {`


    `            sqlite3_exec(database, "BEGIN;", NULL, NULL, NULL);`


    `            sqlite3_stmt *stmt = NULL;`

    `            if (SQLITE_OK !=`

    `                sqlite3_prepare_v2(database, text, -1, &stmt, NULL)) {`

    `NSLog(@"error: ''%s''", sqlite3_errmsg(database));`

    `sqlite3_exec(database, "ROLLBACK;", NULL, NULL, NULL);`

    `            }`


    `            NSNumberFormatter * f = [[NSNumberFormatter alloc] init];`

    `            NSNumber * tweetId =`

    `              [f numberFromString:[tweetDictionary objectForKey:@"id"]];`

    `            sqlite3_bind_int64(stmt, 1, [tweetId longLongValue]);`

    `            [f release];`'
  trans: "\n#### 在不用 Core Data 的情况下重写 OfflineTwitter\n\n由于 OfflineTwitter 应用的原始架构将所有数据访问代码都保留在\
    \ `TwitterDataStore` 类中，因此几乎所有的用户界面视图和控制器都可以保持不变。唯一需要做的是创建一个直接使用 SQLite 来存储、检索和删除推文（Tweet）而非\
    \ Core Data 的 `TwitterDataStore` 版本。\n\n首先，对 `Tweet` 类稍作调整，使其不再是托管对象：\n\n```\n\
    @interface Tweet : NSObject {\n}\n\n@property (nonatomic, retain) NSNumber * id;\n\
    @property (nonatomic, retain) NSString * text;\n\n@end\n```\n\n接下来，`TwitterDataStore`\
    \ 被简化，现在它成为一个基类，任何类型的 `TwitterDataStore` 都可以从中派生：\n\n```\n@interface TwitterDataStore\
    \ : NSObject {\n}\n\n- (NSURL *)applicationDocumentsDirectory;\n- (NSArray*)tweets;\n\
    - (void)deleteTweets;\n- (void)synchronizeTweets:(NSArray*)tweets;\n\n@end\n```\n\
    \n现在，创建了一个名为 `TwitterDataStore_SQLite` 的类，用于实际承担使用 SQLite 存储、检索和删除推文的重任。该类定义位于\
    \ `TwitterDataStore_SQLite.h` 中：\n\n```\n#import \"TwitterDataStore.h\"\n\n@class\
    \ sqlite3;\n@interface TwitterDataStore_SQLite : TwitterDataStore {\n    sqlite3\
    \             *database;\n}\n\n@end\n```\n\n接下来，我们在 Xcode 中查看 `TwitterDataStore_SQLite.m`。请注意，为该类声明了两个额外的辅助方法：\n\
    \n- `openDatabase`\n- `closeDatabase`\n\n在该类的初始化方法中，导入了 `sqlite3.h`，以便 `TwitterDataStore_SQLite`\
    \ 可以使用 SQLite。值得查阅这个头文件，以深入了解 SQLite 为 iOS 应用提供了哪些功能，因为这里的讨论只触及了表面。在代码中，调用 `openDatabase`\
    \ 来创建数据库（如果尚不存在）并在数据库中设置表。在 `dealloc` 方法中，当类被销毁时关闭数据库：\n\n```\n#import \"TwitterDataStore_SQLite.h\"\
    \n#import \"sqlite3.h\"\n#import \"Tweet.h\"\n\n@interface TwitterDataStore_SQLite\
    \ ()\n- (void)openDatabase;\n- (void)closeDatabase;\n@end\n\n@implementation TwitterDataStore_SQLite\n\
    \n- (id)init\n{\n    if ((self = [super init])) {\n        [self openDatabase];\n\
    \    }\n    return self;\n}\n\n- (void)dealloc\n{\n    [self closeDatabase];\n\
    \    [super dealloc];\n}\n```\n\n`openDatabase` 方法负责创建数据库并为其填充一个用于存储推文的表。如果数据库对象已经打开，该方法不做任何操作。这是通过检查指向\
    \ `sqlite3` 数据库对象的指针是否为 `NULL` 来实现的。通过 SQLite 打开数据库是通过 `sqlite3_open` 方法完成的。该方法需要一个\
    \ SQLite 数据库文件的路径，如果文件不存在则创建它，如果已存在则打开它。它还需要一个指向 `sqlite3` 数据库对象指针的指针。\n\n如果数据库成功打开，则通过\
    \ `sqlite3_exec` 方法创建数据库的 `Tweets` 表，该方法在数据库上执行 SQL 查询。如果表尚不存在，该查询会创建一个表，包含推文\
    \ ID 和推文实际消息内容的列：\n\n```\nNSString *createTables =\n    @\"CREATE TABLE IF NOT\
    \ EXISTS tweets (id INTEGER\n                                         PRIMARY\
    \ KEY,\n                                         message TEXT);\";\n```\n\n接下来，再次使用\
    \ `sqlite3_exec`，为这个表在推文 ID 上创建一个索引，以加速从数据库中查询推文：\n\n```\nNSString *createIndex\
    \ =\n    @\"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);\";\n```\n\n```\n\
    - (void)openDatabase\n{\n    if (nil == database) {\n        NSURL *path =\n \
    \              [[self applicationDocumentsDirectory]\n               URLByAppendingPathComponent:@\"\
    twitter.sqlite\"];\n\n        if (SQLITE_OK !=\n            sqlite3_open([[path\
    \ relativePath] UTF8String], &database)) {\n            [self closeDatabase];\n\
    \        } else {\n            char *errmsg;\n\n            NSString *createTables\
    \ =\n            @\"CREATE TABLE IF NOT EXISTS tweets (id INTEGER PRIMARY KEY,\n\
    \                                                 message TEXT);\";\n        \
    \    if (SQLITE_OK !=\n                sqlite3_exec(database,\n              \
    \  [createTables UTF8String],\n                NULL,\n                NULL,\n\
    \                &errmsg)) {\n                NSLog(@\"create table error: '%s'\"\
    , errmsg);\n            }\n\n            NSString *createIndex =\n           \
    \     @\"CREATE INDEX IF NOT EXISTS tweetIndex ON tweets(id);\";\n           \
    \ if (SQLITE_OK !=\n                sqlite3_exec(database,\n                 \
    \            [createIndex UTF8String],\n                             NULL,\n \
    \                            NULL,\n                             &errmsg)) {\n\
    \                NSLog(@\"create table index error: '%s'\", errmsg);\n       \
    \     }\n        }\n    }\n}\n```\n\n`closeDatabase` 是一个非常直接的方法。它对该类拥有的 `sqlite3`\
    \ 数据库对象调用 `sqlite3_close`。这会关闭数据库，然后将指向数据库的指针设置为 `NULL`，这样如果随后再次调用 `openDatabase`\
    \ 方法，它将重新打开数据库：\n\n```\n- (void)closeDatabase\n{\n    sqlite3_close(database);\n\
    \    database = nil;\n}\n```\n\n由于本示例项目的目标是将推文离线存储在 SQLite 数据库中，因此首要任务是同步从 Twitter\
    \ 检索到的推文并将其存储在数据库中（参见[图 10–12]（#Chapter10.html#fig_10_12））。与 Core Data 示例一样，这发生在\
    \ `TwitterDataStore` 的 `synchronizeTweets:` 方法中，该方法首先删除数据库中的任何现有推文，然后存储新的推文。\n\
    \n回想一下，推文是以 `NSDictionary` 对象的数组形式传入的，其中数组中的每个 `NSDictionary` 代表一条推文。让我们仔细看看处理推文的\
    \ `for-loop`。第一步是初始化一个 SQL 事务：\n\n```\nsqlite3_exec(database, \"BEGIN;\", NULL,\
    \ NULL, NULL);\n```\n\n存储一条推文的实际 SQL 语句如下：\n\n```\nchar *text = \"INSERT INTO\
    \ tweets (id, message) VALUES (?, ?);\";\n```\n\n请注意语句中 `?` 符号的存在。这表示在通过 `sqlite3_prepare_v2`\
    \ 准备语句后，这些值将被绑定到语句中。请注意，推文 ID 存储为 64 位 `integer`，并通过 `sqlite3_bind_int64` 绑定。推文的内容存储为\
    \ `text`，并通过 `sqlite3_bind_text` 绑定。然后通过 `sqlite3_step` 执行事务。事务可能因某些原因失败，因此会采取措施在失败时回滚事务。这样可以在发生失败时保留数据库的状态。以下是实现此操作的代码：\n\
    \n```\n- (void)synchronizeTweets:(NSArray*)tweets\n{\n    NSAutoreleasePool *autoReleasePool\
    \ =\n        [[NSAutoreleasePool alloc] init];\n\n    @synchronized(self) {\n\n\
    \        [self deleteTweets];\n\n        char *text = \"INSERT INTO tweets (id,\
    \ message) VALUES (?, ?);\";\n\n        for (NSDictionary *tweetDictionary in\
    \ tweets) {\n\n            sqlite3_exec(database, \"BEGIN;\", NULL, NULL, NULL);\n\
    \n            sqlite3_stmt *stmt = NULL;\n            if (SQLITE_OK !=\n     \
    \           sqlite3_prepare_v2(database, text, -1, &stmt, NULL)) {\nNSLog(@\"\
    error: '%s'\", sqlite3_errmsg(database));\nsqlite3_exec(database, \"ROLLBACK;\"\
    , NULL, NULL, NULL);\n            }\n\n            NSNumberFormatter * f = [[NSNumberFormatter\
    \ alloc] init];\n            NSNumber * tweetId =\n              [f numberFromString:[tweetDictionary\
    \ objectForKey:@\"id\"]];\n            sqlite3_bind_int64(stmt, 1, [tweetId longLongValue]);\n\
    \            [f release];\n```\n"
- fmt: "# Objective-C代码示例\n\n```\nNSString *message = [tweetDictionary objectForKey:@\"\
    text\"];\nsqlite3_bind_text(stmt,\n                  2,\n                  [message\
    \ UTF8String],\n                  -1,\n                  SQLITE_TRANSIENT);\n\n\
    BOOL result = sqlite3_step(stmt) != SQLITE_ERROR;\nsqlite3_finalize(stmt);\n\n\
    sqlite3_exec(database, result ? \"END;\" : \"ROLLBACK;\",\n                 NULL,\
    \ NULL, NULL);\n    }\n}\n\n//post a notification that the tweets are available...have\
    \ responder\n//update itself on the main thread\n[[NSNotificationCenter defaultCenter]\n\
    \    postNotificationName:@\"tweetsDidSynchronize\"\n              object:self\n\
    userInfo:nil];\n\n[autoReleasePool release];\n}\n```\n\n![images](images/1012.jpg)\n\
    \n**Figure 10–12.** The SQLite database of Tweets\n\n现在推文已存入数据库，应用程序需要一种检索它们的方法。这通过`TwitterDataStore`的`tweets`方法实现。该方法使用标准的SQL\
    \ `SELECT`语句从数据库中获取所有推文：\n\n```\nNSString *tweetsStatement = @\"SELECT id, message\
    \ FROM tweets\";\n```\n\n如果语句准备成功，则会遍历结果集，为结果集中的每一行创建并初始化一个新的`Tweet`对象。然后，该`Tweet`会被添加到一个由该方法返回的`Tweet`数组中：\n\
    \n```\n- (NSArray*)tweets\n{\n    NSMutableArray *tweets = [NSMutableArray array];\n\
    \n    @synchronized(self) {\n\n        sqlite3_stmt *queryStatement = nil;\n \
    \       NSString *tweetsStatement = @\"SELECT id, message FROM tweets\";\n   \
    \     if (SQLITE_OK != sqlite3_prepare_v2(database,\n                [tweetsStatement\
    \ UTF8String],-1,&queryStatement, NULL)) {\n            NSLog(@\"error: '%s'\"\
    , sqlite3_errmsg(database));\n            return nil;\n        }\n\n        while(sqlite3_step(queryStatement)\
    \ == SQLITE_ROW) {\n\n            Tweet *tweet = [[[Tweet alloc] init] autorelease];\n\
    \            [tweet setId:[NSNumber numberWithLongLong:\n                    \
    \      sqlite3_column_int64(queryStatement, 0)]];\n            [tweet setText:[NSString\
    \ stringWithUTF8String:\n                   (const char*)sqlite3_column_text(queryStatement,\
    \ 1)]];\n            [tweets addObject:tweet];\n        }\n        sqlite3_finalize(queryStatement);\n\
    \    }\n\n    return tweets;\n}\n```\n\n完成`TwitterDataStore`的SQLite实现所需实现的最后一个方法是`deleteTweets`。该方法只是在数据库上执行一个SQL\
    \ `DELETE`语句来删除所有推文：\n\n```\nNSString *deleteTweetsStatement = @\"DELETE FROM\
    \ tweets\";\n\n- (void)deleteTweets\n{\n    @synchronized(self) {\n        char\
    \            *errmsg;\n\n        NSString *deleteStmnt = @\"DELETE FROM tweets\"\
    ;\n        if (SQLITE_OK !=\n            sqlite3_exec(database, [deleteStmnt UTF8String],\
    \ NULL,\n            NULL, &errmsg)) {\n            NSLog(@\"error: '%s'\", sqlite3_errmsg(database));\n\
    \        }\n    }\n}\n```\n\n上述代码使用了SQLite，因此除非调整应用程序的`Xcode`项目以链接`libsqlite3.0.dylib`而非`CoreData.framework`（参见[Figure\
    \ 10–13](#Chapter10.html#fig_10_13)），否则它将无法链接。\n\n![images](images/1013.jpg)\n\
    \n**Figure 10–13.** Adjusting the Xcode project to link against `libsqlite3.0.dylib`\
    \ instead of `CoreData.framework`\n\n## 测试还是不测试，这是个问题\n\n由于数据模型或层的代码不需要用户界面，这为讨论iOS和移动开发中一个经常被忽视的话题——单元测试——提供了独特的机会。不幸的是，许多项目完全避免编写单元测试，或者只在项目末尾尝试添加一些测试。部分原因是由于为项目设置测试环境通常很困难，还有部分原因可能是开发者的懒惰。然而，如果及早并频繁地进行，单元测试实际上会让开发者比不写测试更懒，因为它减少了手动测试的需求。此外，借助Xcode\
    \ 4，Apple使得为iOS项目启动和运行单元测试比以往任何时候都更容易。\n\n接下来是一个逐步教程，为这个项目的OfflineTwitter Xcode添加一个单元测试。该单元测试验证了数据库中同步推文的代码。当然，最好在编写代码的同时编写测试，但本教程的主要目的是展示向iOS\
    \ Facebook或Twitter应用程序添加单元测试是多么容易。"
