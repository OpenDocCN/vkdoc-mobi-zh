- fmt: "# Suggested Components\n\nIn addition to the preceding “requirements,” Twitter\
    \ also has a bunch of suggested design guidelines that you may (or may not) want\
    \ to follow. The following section reproduces Twitter's official suggestions,\
    \ and balances them with examples from apps that ignore these suggestions for\
    \ the better:\n\n- **Avatar and alignment**: Twitter likes developers to display\
    \ the user's avatar on the left side of the Tweet. Other Tweet content is then\
    \ supposed to be aligned-left, immediately to the right of the avatar. The avatar\
    \ links to the user's Twitter profile at `http://twitter.com/username`.\n\n- **Counterpoint**:\
    \ Tweetbot, one of the most visually distinctive Twitter clients in the App Store,\
    \ chooses to put the avatar below the Tweet (see [Figure 13–2](#Chapter13.html#fig_13_2)).\
    \ It works.\n\n![images](images/1302.jpg)\n\n**Figure 13–2.** *Tweetbot presents\
    \ Tweet details in a non-conventional way, and we think it works nicely.*\n\n\
    - **Timestamp and Permalink**: “This information can be shown either relative,\
    \ e.g. ‘2 minutes ago,’ or absolute, e.g. ‘8:45 AM, Jul 8^(th)’). The timestamp\
    \ should be on its own line after the Tweet text and styled differently to be\
    \ less prominent than the Tweet text (lighter color and/or smaller size). The\
    \ timestamp should also link to the Twitter hosted permalink page for the individual\
    \ Tweet.”\n\n- **Counterpoint**: Twitterific technically adheres to this suggestion\
    \ (see [Figure 13–3](#Chapter13.html#fig_13_3)), but only barely: the typeface\
    \ on the timestamp is only about 1pt smaller than the typeface of the Tweet itself.\
    \ However, the padding between the timestamp and the Tweet accounts for enough\
    \ of a distinction. Putting the timestamp above the Tweet puts context first.\n\
    \n![images](images/1303.jpg)\n\n**Figure 13–3.** *Twitterific presents Tweet details\
    \ in a conventional way.*\n\n- **Tweet Actions**: “Reply, Retweet, and Favorite\
    \ actions should always be available from a Tweet, and should be displayed with\
    \ their respective action icons. They should be arranged left to right as Reply,\
    \ Retweet, Favorite.”\n\n- **Counterpoint**: *Almost every app that features the\
    \ Twitter API presents these Tweet actions in a different way. We like Twitter's\
    \ suggestion, but sometimes hiding less-used controls makes for a cleaner interface.\
    \ Both Tweetbot and Twitterific do this in Figures 13–2 and 13–3, respectively.*\n\
    \n- **Source**: “Along with the timestamp and permalink, you may choose to display\
    \ the client or means by which the Tweet was posted (e.g. ‘from web’ or ‘from\
    \ Twitter for iPhone’). If client is supplied, please make sure it links to the\
    \ source page URL provided.”\n  - **Counterpoint**: This is only relevant if your\
    \ project is Twittercentric. If your app is more interested in the content of\
    \ certain Tweets (as opposed to the full Twitter experience), you probably don't\
    \ need to append the client to a Tweet. Tweetbot does (see [Figure 13–2](#Chapter13.html#fig_13_2)),\
    \ whereas Twitterific does not (see [Figure 13–3](#Chapter13.html#fig_13_3)).\n\
    \n- **Multiple Tweets**: “If showing multiple Tweets at once, they can be visually\
    \ separated by horizontal lines, empty spaces, or alternate background colors.\
    \ The empty space should be proportional to the overall height of the Tweet itself.”\n\
    \n- **Counterpoint**: In our opinion, this guideline shouldn't be optional. It's\
    \ hard to think of a context where it would be fitting to present Tweets as anything\
    \ but a list of discrete items. Twitterific presents Tweets nicely (see [Figure\
    \ 13–4](#Chapter13.html#fig_13_4)).\n\n![images](images/1304.jpg)\n\n**Figure\
    \ 13–4.** *Twitterific's timeline*\n\n- **Chronological order**: “It usually makes\
    \ sense for Tweets to be ordered in reverse chronological order (latest first),\
    \ but we understand that this might not always be the most relevant way to arrange\
    \ Tweets. When shown as search results or other criteria (keyword, user, or other\
    \ editorial constraints) Tweets may be ordered by those criteria.”\n\n- **Counterpoint**:\
    \ Actually, it's hard to find a Twitter API project on the App Store that orders\
    \ Tweets by any criteria other than by how recent Tweets are. Search is the only\
    \ salient exception.\n\n## (Not) Using Twitter Colors\n\nColors are a major way\
    \ that users will identify functionality in your apps. They're also an intuitive\
    \ way to associate yourself with the Twitter platform. However, Twitter really\
    \ wants you to minimize the extent to which you use its color palette and its\
    \ trademarked logos, buttons, terms, and icons.\n\nAs a result, designers of Twitter\
    \ API projects are less slavish to the Twitter color scheme than Facebook developers\
    \ are to their platform's color scheme. Perhaps in the hopes of avoiding Twitter's\
    \ ire, Twitter API apps tend to be more diverse in their iconography and logos.\n\
    \nFor reference, you can find some examples of Twitter's own typography and logo\
    \ art in [Figure 13–5](#Chapter13.html#fig_13_5). These buttons are fine for use\
    \ on the Web, but don't use them in your iOS app—unless they link back to Twitter.com\
    \ or are used to indicate compatibility with Twitter. If you disregard these requests\
    \ (which are summarized in the section below entitled “Using the Twitter Trademark”),\
    \ you may end up in some trouble. If you want to use a bird theme or related assets,\
    \ you'll have to design or provide them yourself.\n\n![images](images/1305.jpg)\n\
    \n**Figure 13–5.** *You can use Twitter's web buttons in a website—but not in\
    \ your iOS application, unless under specific circumstances*\n\n### Create Theme\
    \ Elements\n\nDepending on how reliant your app's functionality is on the Twitter\
    \ API, you may find yourself in a position where your app looks too much like\
    \ the official Twitter app.\n\nThat's why Twitter gives designers this pointer:\
    \ you should design your site with unique branding and logos.\n\nTwitter also\
    \ asks that you adhere to the following:\n\n- **Don't** copy the Twitter look\
    \ and feel.\n- **Don't** use anything other than the most current versions of\
    \ the Twitter logos, where appropriate.\n- **Don't** use any other artwork from\
    \ the Twitter site without explicit permission.\n- **Do** create your own buttons\
    \ or marks using Twitter's logos.\n\nFor reference, [Figure 13–6](#Chapter13.html#fig_13_6)\
    \ shows the various aspects of the official Twitter app, including the timeline\
    \ (leftmost image), a Tweet (center image), and a user profile (rightmost image).\
    \ You need to create your own visual designs and design interactions that don't\
    \ mimic the ones shown in this figure.\n\n![images](images/1306.jpg)\n\n**Figures\
    \ 13–6.** *The official Twitter app UI, which you are not supposed to imitate*\n\
    \n## Using the Twitter Trademark\n\nTwitter has published a list of dos-and-don'ts\
    \ regarding its trademarks for developers using the Twitter API.^([1](#Chapter13.html#CHP-13-FN-1))\
    \ What follows is a summary and analysis of the relevant points.\n\nYou *may*\
    \ do the following:\n\n- Use the current Twitter logo or current Twitter bird\
    \ mark as a link to the Twitter service.\n- Use the current Twitter logo or current\
    \ to show that your product is compatible with Twitter.\n- Make sure that you\
    \ include a direct reference to Twitter when mentioning *Tweet* (for instance,\
    \ “Tweet with Twitter”) or display the Twitter marks with the mention of *Tweet*.\n\
    - Manipulate the logos, unless it is necessary due to color-related restrictions\
    \ inherent in your app, like the black and white iOS toolbar.\n\nYou *may not*\
    \ do the following:\n\n___________________\n\n¹ `http://support.twitter.com/entries/77641`\n\
    \n- Use the marks in a way that might imply a false sense of partnership with\
    \ or endorsement of your brand.\n- Distort or alter the Twitter marks in any way.\n\
    - Use the marks in a way that confuses the Twitter brand with another brand.\n\
    - Use the Twitter bird as a spokesperson to carry your logos or messaging."
