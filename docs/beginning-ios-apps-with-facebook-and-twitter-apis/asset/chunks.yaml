    \   verified = false;\n}\n)\n```\n\n## 结论\n\n本章涵盖了与使用Facebook iOS SDK获取用户好友列表以及使用`MGTwitterEngine`获取用户粉丝列表相关的许多有趣领域。在此过程中，我们深入了解了每个SDK的内部机制。我们还探讨了一些在Objective-C中编写iOS应用时常用的编程技术。\n\
