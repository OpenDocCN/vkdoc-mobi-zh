    \ State Transfer）^([1](#Chapter07.html#CH-7-FN-1)) API中检索基本数据。\n\n你可以在Git仓库的[Chapter7](#Chapter07.html#ch7)目录中找到本章的所有代码。Facebook代码位于`ApiFacebook`项目中，Twitter代码位于`ApiTwitter`项目中。这些项目基于[第6章](#Chapter06.html#ch6)示例项目中介绍的相同应用结构构建；同样，这些项目并不美观，但它们能完成任务。\n\
    \n## 更多关于Facebook Graph API的乐趣\n\n在上一章中，我们向你展示了如何从Facebook的社交图谱中提取信息。在这样做的过程中，你可能想知道如何从自己的应用向Facebook的社交图谱添加或发布信息。好吧，既然我们人这么好，我们已经不辞辛劳地将本章的整个部分专门用于介绍如何向Facebook社交图谱发布内容。我们还增加了对其他可以从社交图谱中提取的信息的全面介绍，包括这些信息如何与授权和扩展权限相关联。继续阅读以了解详细内容。\n\
