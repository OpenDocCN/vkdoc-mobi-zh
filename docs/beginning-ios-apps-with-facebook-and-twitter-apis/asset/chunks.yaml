    \ SDK 的内部机制。我们还探讨了一些在 Objective-C 中编写 iOS 应用时常用的编程技术。\n\n在下一章中，我们将以此知识库为基础，更深入地探讨内部机制，并扩展本章的示例项目，向你展示如何使用这些\
    \ SDK 为用户发布信息，以及如何获取更多用户信息。\n\n# 第 7 章\n\n# 访问人、地点、对象和关系\n\n在本章中，我们将介绍 Facebook\
    \ 方法、对象、属性和连接的细节——以及如何访问它们。我们还将介绍 JSON（JavaScript Object Notations），它与 Graph API\
    \ 的使用密切相关。最后，我们将讨论如何从 Twitter 的 REST（Representational State Transfer）^(1) API\
