  trans: "\n> *应用的首个版本确实在底部设有标签栏，但我将其移除了，因为我觉得 Facebook 本身就是一个平台，而每个标签栏几乎都像是独立的应用程序，确实需要全屏显示。*\n\
    > \n> *我必须着眼未来；我们有很多新应用即将推出，我认为 Facebook 的运作模式更适合将其本身定位为一个“手机”。Facebook 拥有自己的聊天、电话簿、邮件、照片和应用，因此将所有内容塞进标签栏会显得过于局限。采用这种模式——它就像一个\
    \ iPhone 的主屏幕——将能使其不断成长并变得功能齐全。这也为我们提供了空间，可以在应用内部添加更多应用。*\n> \n> *我其实没怎么见过其他应用采用[网格布局]，而且我也不太推荐别人这么做。Facebook\
    \ 在广度和用户在其上进行的操作种类上都很独特。我一度对构建网格布局犹豫不决，但当我不断调整布局，试图将所有内容都塞进标签栏时，我觉得这（网格布局）是最好的解决方案。我本以为会有更多人抱怨，但结果似乎还不错。*\n\
    > \n> *[点击次数]的经济性始终是一个驱动因素，但与始终显示的标签栏相比，网格布局增加了一次点击[因为你需要点击网格按钮]。这是我认为必要的权衡。在屏幕杂乱（增加标签）和点击次数之间，总需要找到一种平衡。*\n\
    > \n> *创建 Facebook 的视图控制器涉及哪些工作？*\n> \n> *我做了很多自定义的内容。这个应用构建在我创建的一个名为 Three20\
    \ 的开源框架之上，它使用自己的视图控制器，所有这些控制器都需要我编写。我不得不尝试重新设计苹果的照片浏览应用和苹果的邮件撰写工具，还有其他一些东西。*²\n\
    \n_________\n\n¹[`http://developers.facebook.com/policy/`](http://developers.facebook.com/policy/)\n\
    \n## Facebook 加载项目³\n\n该项目展示了 Facebook 应用在发布内容之前，是如何缓存旧信息并检查可用服务的。休伊特这样解释：\n\n\
    > *应用中的所有内容都是这样工作的。有一个磁盘缓存，所以当你加载事件、笔记或请求时，它们会被缓存。这样当你返回应用时，我们会显示缓存版本。在显示缓存版本的同时，我们会尝试加载最新版本。如果缓存超过一周——或者若干天，我忘了具体数字——应用会向你显示“加载中”，并清除旧内容。*\n\
    > \n> *在这个系统建立之前，无论你走到哪里，都会看到一个不停旋转的小菊花——加载、加载、加载。我认为，在新内容加载进来时，能立刻看到一些可以交互的内容，感觉会更好。*\n\
    \n接下来的代码是 Facebook 应用磁盘缓存框架的摘录，该框架用于替代 Cocoa 中获取网络数据（本例中是从 Facebook 服务器获取）的类。休伊特编写了\
    \ Three20 框架，使得缓存可以存储在磁盘上。而在苹果的框架中，则需要使用内存。以下是代码本身：\n\n```\n- (NSData*)generatePostBody\
    \ {\n  NSMutableData* body = [NSMutableData data];\n  NSString* beginLine = [NSString\
    \ stringWithFormat:@\"\\r\\n--%@\\r\\n\", kStringBoundary];\n\n  [body appendData:[[NSString\
    \ stringWithFormat:@\"--%@\\r\\n\", kStringBoundary]\n    dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \n  for (id key in [_parameters keyEnumerator]) {\n    NSString* value = [_parameters\
    \ valueForKey:key];\n    // Really, this can only be an NSString. We're cheating\
    \ here.\n    if (![value isKindOfClass:[UIImage class]] &&\n        ![value isKindOfClass:[NSData\
    \ class]]) {\n      [body appendData:[beginLine dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \      [body appendData:[[NSString\n        stringWithFormat:@\"Content-Disposition:\
    \ form-data; name=\\\"%@\\\"\\r\\n\\r\\n\", key]\n          dataUsingEncoding:_charsetForMultipart]];\n\
    \      [body appendData:[value dataUsingEncoding:_charsetForMultipart]];\n   \
    \ }\n  }\n\n  NSString* imageKey = nil;\n  for (id key in [_parameters keyEnumerator])\
    \ {\n    if ([[_parameters objectForKey:key] isKindOfClass:[UIImage class]]) {\n\
    \      UIImage* image = [_parameters objectForKey:key];\n      CGFloat quality\
    \ = [TTURLRequestQueue mainQueue].imageCompressionQuality;\n      NSData* data\
    \ = UIImageJPEGRepresentation(image, quality);\n\n      [self appendImageData:data\
    \ withName:key toBody:body];\n      imageKey = key;\n\n    } else if ([[_parameters\
    \ objectForKey:key] isKindOfClass:[NSData class]]) {\n      NSData* data = [_parameters\
    \ objectForKey:key];\n      [self appendImageData:data withName:key toBody:body];\n\
    \      imageKey = key;\n    }\n  }\n\n  for (NSInteger i = 0; i < _files.count;\
    \ i += 3) {\n    NSData* data = [_files objectAtIndex:i];\n    NSString* mimeType\
    \ = [_files objectAtIndex:i+1];\n    NSString* fileName = [_files objectAtIndex:i+2];\n\
    \n    [body appendData:[beginLine dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \    [body appendData:[[NSString stringWithFormat:\n                       @\"\
    Content-Disposition: form-data; name=\\\"%@\\\"; filename=\\\"%@\\\"\\r\\n\",\n\
    \                       fileName, fileName]\n          dataUsingEncoding:_charsetForMultipart]];\n\
    \    [body appendData:[[NSString stringWithFormat:@\"Content-Length: %d\\r\\n\"\
    , data.length]\n          dataUsingEncoding:_charsetForMultipart]];\n    [body\
    \ appendData:[[NSString stringWithFormat:@\"Content-Type: %@\\r\\n\\r\\n\", mimeType]\n\
    \          dataUsingEncoding:_charsetForMultipart]];\n    [body appendData:data];\n\
    \  }\n\n  [body appendData:[[NSString stringWithFormat:@\"\\r\\n--%@--\\r\\n\"\
    , kStringBoundary]\n                   dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \n  // If an image was found, remove it from the dictionary to save memory while\
    \ we\n  // perform the upload\n  if (imageKey) {\n    [_parameters removeObjectForKey:imageKey];\n\
    \  }\n\n  TTDCONDITIONLOG(TTDFLAG_URLREQUEST, @\"Sending %s\", [body bytes]);\n\
    \  return body;\n}\n```\n\n_________\n\n²/《iPhone 设计大奖获奖项目》/ 作者：Chris Dannen (Apress,\
    \ 2009)\n\n![images](img/1404.jpg)\n\n**图 14–4.** *Facebook 更希望你不要抄袭其视觉设计，但很多开发者仍然照做不误。这是你自己应该避免这样做的又一个原因。*\n\
    \n### 主题与图标\n\n根据 Facebook 的规定，你不应模仿 Facebook 的视觉设计或其图标体系。然而，这显然无法阻止许多开发者恰恰这么做。那么，作为\
    \ Facebook 的新开发者，该怎么做呢？\n\n在我们看来，在某些情况下，采用与 Facebook 类似的配色方案是非常合适的。如果你的应用将提供大量的\
    \ Facebook 功能（当然，除此之外还有其他功能），那么让用户置身于一个带有 Facebook 风格（但并非复制）的环境中，可能会对用户有所启发（参见图\
    \ 14–5）。\n\n#### 第三方资源\n\n![images](img/1405.jpg)\n\n**图 14–5.** *如果你必须汲取灵感，请考虑\
    \ Facebook 的交互设计及其设计惯例，并尝试向其致敬。*\n\n图 14–5 展示了一套第三方 Photoshop 图片。它们可免费使用。它们也适用于网页设计师，但别让这限制了你。这些视觉设计应该能帮助你制作应用原型，或借用你喜欢的\
    \ Facebook UI 中的某些方面。请记住不要过度借用，因为在你的应用中复现 Facebook UI 是违反 API 条款和条件的。\n\n你可以从\
    \ Surgeworks 的以下网址下载这套免费的 Facebook UI 工具包：\n\n[`http://surgeworks.com/blog/design/facebook-gui-free-psd-resource`](http://surgeworks.com/blog/design/facebook-gui-free-psd-resource)\n"
- fmt: '### Create Theme Elements


    To the extent that you''re capable of doing so, develop your own color scheme,
    branding, logos, and iconography.


    Not only does Facebook discourage developers from using its blue-and-white color
    scheme, but common sense does, too. There is a dearth of quality iOS applications
    in the App Store that use the Facebook API—but there is a wealth of awful ones.
    Most of the bottom-feeding apps shamelessly mimic Facebook''s colors and iconography.
    Copying Facebook isn''t just against the rules; it''s also a little low-end.


    Fortunately, Facebook is still useful without the sanitary style sheet. `Hootsuite`,
    a social aggregator, and `Taptu`, a reader app, are two applications that present
    Facebook content in a unique way, using unique color palettes and branding.


    #### Hootsuite


    As you can see in [Figure 14–6](#Chapter14.html#fig_14_6), `Hootsuite`''s teal
    color scheme looks more like Twitter than Facebook. But its visual elements and
    its application bar are more like a weird hybrid of the two social networks—and
    less like a copy of either one.


    ![images](images/1406.jpg)


    **Figure 14–6.** *Hootsuite combines Facebook and Twitter colors and conventions,
    which is its way of avoiding looking too much like either.*


    #### Taptu


    `Taptu` is an app for the iPhone and the iPad that funnels RSS feeds, social news,
    and other content into *streams* that are easier to read than traditional readers.
    As you can see in [Figure 14–7](#Chapter14.html#fig_14_7), the Facebook feed gets
    packaged just like any other feed, with Status Updates (and their author and timestamp)
    presented in a chronological timeline, vaguely Twitter-style. This is another
    hybrid design that satisfies the design guidelines of its platform.


    ![images](images/1407.jpg)


    **Figure 14–7.** *Taptu''s interpretation of the News Feed*


    ### Rules for Facebook Art


    As we said at the outset of this chapter, Facebook doesn''t have nearly the elaborate
    set of rules that Twitter does for trademarks and visual assets. That might be
    one reason that so many app developers borrow freely when they create their app
    icons and interfaces.


    The previous section instructed you to create your own theme elements. When you
    do so, you''ll need to keep a few brief guidelines in mind, according to Facebook:


    * Your advertisements must not include or be paired with any platform integrations,
    including social plugins such as the `Like` button, without Facebook''s written
    permission.

    * Developers aren''t allowed to market themselves in a way that implies the participation
    or endorsement of Facebook.

    * Developers should also avoid using Facebook logos, trademarks, or site terminology.
    These include but are not limited to `Facebook`, `The Facebook`, `FacebookHigh`,
    `FBook`, `FB`, `Poke`, `Wall`, and other company graphics, logos, designs, or
    icons.


    If you''d like to read Facebook''s ad guidelines in their entirety, visit this
    URL:


    [`http://www.facebook.com/ad_guidelines.php`](http://www.facebook.com/ad_guidelines.php)


    ### Button Text


    Here are a few examples of button text that are permitted for Facebook developers:


    * `Post`

    * `Share`

    * `Publish`

    * `Add to Profile`


    Here are a few examples of button text that are too vague to use, in Facebook''s
    opinion:


    * `Ignore`

    * `OK`

    * `Share '' Continue`

    * `Request`


    ### Facebook Navigation


    Because of its grid UI, the official Facebook app sets some strange navigational
    paradigms. In fact, it borrows a lot from Android and a little from webOS. The
    Facebook app does the following:


    * Uses tap-and-hold to mimic iOS''s app icon “jiggling” effect.

    * Uses a status bar that rises up from the base of the screen, similar to Android,
    for notifications.

    * Has “apps” within it, just like the iOS UI.

    * Animates a glimmer when you tap the titlebar, similar to the HP webOS.


    **CAUTION:** Don''t copy Facebook''s UI and navigation.


    We like all these little quirks, and we wouldn''t want the official Facebook app
    to work any other way. But we don''t advise that you imitate any of these paradigms.
    They''re not at home on iOS (at least, not yet?), and they will only confuse your
    users.


    ### Showing Progress


    As we discussed earlier in this chapter, showing the user progress is a vital
    part of your app''s feedback. In the official Facebook app, the user is never
    presented with an empty News Feed; if a network connection can''t be found, the
    app displays recent updates it''s cached behind the scenes. Facebook users are
    doubtless accustomed to the speed and efficiency of Facebook''s iOS and Web apps,
    so you''d do best not to keep them waiting.


    If you must, use the activity indicator and consider showing users a warning message
    if the operation is going to take a substantial amount of time; however, an activity
    indicator should never prevent the user from switching tabs or composing other
    content. The Facebook-integrated `MyPhone+` app only has one main task, and it''s
    a big one. The app handles this task nicely, as you can see in [Figure 14–8](#Chapter14.html#fig_14_8).


    ![images](images/1408.jpg)


    **Figure 14–8.** *MyPhone+ displays a progress indicator for its central task,
    which is only a good idea under certain circumstances.*'
