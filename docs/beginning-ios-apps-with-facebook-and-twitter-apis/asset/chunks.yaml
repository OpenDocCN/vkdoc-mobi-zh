- fmt: "# Adding Unit Tests to a Social iOS App\n\nApple has configured Unit Tests\
    \ to build and run as a separate target within an Xcode project. While this may\
    \ seem a bit cumbersome at first, it has the nice advantage of keeping test code\
    \ out of the main application target in a project. This means that test files\
    \ don't get built into the final application binary. It also helps with debugging\
    \ and setting up an automated test environment.\n\nTo add a new Target to a project\
    \ in Xcode 4, from the `File` menu choose `New` -> `New Target...` (see [Figure\
    \ 10–14](#Chapter10.html#fig_10_14)).\n\n![images](images/1014.jpg)\n\n**Figure\
    \ 10–14.** *Adding a new target*\n\nIn the Target template pop-up window, go to\
    \ the iOS section, choose `Other`, and then select `Cocoa Touch Unit Testing Bundle`\
    \ (see [Figure 10–15](#Chapter10.html#fig_10_15)).\n\n![images](images/1015.jpg)\n\
    \n**Figure 10–15.** *Choose Cocoa Touch Unit Testing Bundle.*\n\nNext, give the\
    \ new target a name (see [Figure 10–16](#Chapter10.html#fig_10_16)).\n\n![images](images/1016.jpg)\n\
    \n**Figure 10–16.** *Rename the target.*\n\nNow switch to the new Target in Xcode\
    \ via the Target drop-down, choose `Test` from the `Product` menu to create a\
    \ build, and then run the test Target (see [Figure 10–17](#Chapter10.html#fig_10_17)).\n\
    \n![images](images/1017.jpg)\n\n**Figure 10–17.** *Build and run the test target.*\n\
    \nThe default test code created by Xcode is designed to cause a failure out-of-the-box.\
    \ This illustrates how Xcode highlights test case failures (see [Figure 10–18](#Chapter10.html#fig_10_18)).\n\
    \n![images](images/1018.jpg)\n\n**Figure 10–18.** *Failure!*\n\nThe tests need\
    \ to be written for the `TwitterDataStore_SQLite` class; therefore, the `TwitterDataStore_SQLite`,\
    \ `TwitterDataStore`, and `Tweet` classes need to be added to the `OfflineTwitterTest`\
    \ Target, so that the `OfflineTwitterTest` Target will link when actual test code\
    \ is added (see [Figures 10–19](#Chapter10.html#fig_10_19) through 10–21).\n\n\
    ![images](images/1019.jpg)\n\n**Figure 10–19.** *Add `Tweet.m` to `OfflineTwitterTest`\
    \ Target*\n\n![images](images/1020.jpg)\n\n**Figure 10–20.** *Add `TwitterDataStore.m`\
    \ to `OfflineTwitterTest` Target*\n\n![images](images/1021.jpg)\n\n**Figure 10–21.**\
    \ *Add `TwitterDataStore_SQLite` to `OfflineTwitterTest` Target*\n\nAll of the\
    \ setup is now complete, so it's time to write a simple test to see everything\
    \ in action. The test class will test functionality in the `TwitterDataStore_SQLite`\
    \ class, so it needs to own a `TwitterDataStore_SQLite` object. Open `OfflineTwitterTest.h`\
    \ in the sample project and note the declaration of a `TwitterDataStore_SQLite`\
    \ object:\n\n```\n#import <SenTestingKit/SenTestingKit.h>\n\n@class TwitterDataStore_SQLite;\n\
    @interface OfflineTwitterTest : SenTestCase {\n@private\n    TwitterDataStore_SQLite\
    \ *twitterDataStore;\n}\n\n@end\n```\n\nWith most Unit Testing frameworks, test\
    \ classes are given a chance to do some setup before the test is run and some\
    \ cleanup after the test is finished. Unit Testing for iOS projects is no different.\
    \ Before a test is run, the test class's `setUp` method is called. After the test\
    \ executes, the `tearDown` method is called. Open `OfflineTwitterTest.m` in the\
    \ sample project and examine the implementation of these methods. Since this is\
    \ a basic example, `setUp` instantiates the `TwitterDataStore_SQLite` object,\
    \ and `tearDown` releases the object, so that the test doesn't create a memory\
    \ leak (which could cause other side effects). Depending on the nature of the\
    \ code in an application, more code may be required for these methods. Generally,\
    \ these methods should be reserved for code that is required for every test in\
    \ the class:\n\n```\n- (void)setUp\n{\n    [super setUp];\n\n    // Set-up code\
    \ here.\n    twitterDataStore = [[TwitterDataStore_SQLite alloc] init];\n}\n\n\
    - (void)tearDown\n{\n    // Tear-down code here.\n    [twitterDataStore release];\n\
    \n    [super tearDown];\n}\n```\n\nWhat follows is an actual test for the functionality\
    \ of the `TwitterDataStore_SQLite` class. While there is the temptation to write\
    \ Unit Tests for each method of a class, a better approach is to consider what\
    \ the class is supposed to accomplish as a whole and write tests to validate its\
    \ functionality. This also brings up the topic of naming tests. It is best to\
    \ give tests useful, descriptive names so that other developers on a project will\
    \ immediately know, just from the name, what the test is trying to validate. To\
    \ that end, the test that follows is entitled `testItShouldSynchronizeTweets`\
    \ to reflect the fact that one of `TwitterDataStore_SQLite`'s main responsibilities\
    \ is to store and synchronize Tweets.\n\nThe test first deletes any Tweets from\
    \ `TwitterDataStore_SQLite`, so that it's starting with a clean slate. This approach\
    \ may not be necessary or desirable in all cases, and it should be adjusted on\
    \ a class-by-class or application basis. Next, an `NSDictionary` is created to\
    \ represent a dummy Tweet. Since `TwitterDataStore_SQLite`'s `synchronizeTweets:`\
    \ method takes an `NSArray` as its only parameter, the `NSDictionary` for the\
    \ Tweet is added to an `NSArray` object that is passed to `synchronizeTweets:`.\
    \ `TwitterDataStore_SQLite`'s `tweets` method is then used to retrieve the stored\
    \ Tweets, and a simple comparison is made to confirm that the datastore has a\
    \ single Tweet. Depending on the test or application, additional validation could\
    \ be added, such as whether or not the contents of the retrieved Tweet match what\
    \ was put in the dictionary for the Tweet:\n\n```\n- (void)testItShouldSynchronizeTweets\n\
    {\n    [twitterDataStore deleteTweets];\n\n    NSDictionary *tweetDictionary =\
    \ [NSDictionary\n    dictionaryWithObjects:[NSArray arrayWithObjects:@\"1\", @\"\
    Tweet!\", nil]\n    forKeys:[NSArray arrayWithObjects:@\"id\", @\"text\", nil]];\n\
    \n    NSArray *newTweets = [NSArray arrayWithObject:tweetDictionary];\n    [twitterDataStore\
    \ synchronizeTweets:newTweets];\n\n    NSArray *tweets = [twitterDataStore tweets];\n\
    \    STAssertTrue((1 == [tweets count]), @\"Test error message\");\n}\n\n@end\n\
    ```\n\nThe great thing about tests like this is that they make it very easy to\
    \ debug code under specific scenarios, without having to run the actual application\
    \ and perform multiple steps within the user interface. Such an approach also\
    \ makes testing repeatable, which is excellent when code needs to be refactored\
    \ or optimized. And of course, it ensures that *regressions* (i.e., bugs introduced\
    \ into code that was previously working as expected) are not introduced into the\
    \ code when it is adjusted or goes through a major overhaul.\n\nApplications will\
    \ need more than just one test. When additional tests are required, they can be\
    \ added to an existing test class, or a new test class can be added to the test\
    \ Target. Don't forget to also add any files from the main application Target\
    \ to the test Target, depending on which functionality is being tested.\n\nFor\
    \ additional information on this topic from Apple, review the testing sections\
    \ in the document at this URL:\n\n`http://developer.apple.com/library/ios/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/Building/Building.html`\n\
    \nThe tests are built via the `SenTestingKit` framework. The framework makes a\
    \ number of macros available for validating tests. These macros start with the\
    \ prefix `ST`. The preceding example code uses the macro `STAssertTrue`, but other\
    \ available macros can be found in `SenTestCase_Macros.h`.\n\nSetting up the test\
    \ Target is a big part of configuring a project for tests. As mentioned previously,\
    \ this overview covered Unit Testing from within Xcode 4. If a project is being\
    \ built using Xcode 3, a different configuration is required."
  raw: '#### Adding Unit Tests to a Social iOS App


    Apple has configured Unit Tests to build and run as a separate target within an
    Xcode project. While this may seem a bit cumbersome at first, it has the nice
    advantage of keeping test code out of the main application target in a project.
    This means that testfiles don''t get built into the final application binary.
    It also helps with debugging and setting up an automated test environment.


    To add a new Target to a project in Xcode 4, from the File menu choose New ![images](images/U001.jpg)
    New Target... (see [Figure 10–14](#Chapter10.html#fig_10_14)).


    ![images](images/1014.jpg)


    **Figure 10–14.** *Adding a new target*


    In the Target template pop-up window, go to the iOSsection, choose Other, and
    then select Cocoa Touch Unit Testing Bundle(see [Figure 10–15](#Chapter10.html#fig_10_15)).


    ![images](images/1015.jpg)


    **Figure 10–15.** *Choose Cocoa Touch Unit Testing Bundle.*


    Next, give the new target a name (see [Figure 10–16](#Chapter10.html#fig_10_16)).


    ![images](images/1016.jpg)


    **Figure 10–16.** *Rename the target.*


    Now switch to the new Target in Xcode via the Target drop-down, choose Test from
    the Product menu to create a build, and then run the test Target (see [Figure
    10–17](#Chapter10.html#fig_10_17)).


    ![images](images/1017.jpg)


    **Figure 10–17.** *Build and run the test target.*


    The default test code created by Xcode is designed to cause a failure out-of-the-box.
    This illustrates how Xcode highlights test case failures (see [Figure 10–18](#Chapter10.html#fig_10_18)).


