    they can be added to an existing `test` class, or a new `test` class can be added
    to the test Target. Don''t forget to also add any files from the main application
    Target to the test Target, depending on which functionality is being tested.


    For additional information on this topic from Apple, review the testing sections
    in the document at this URL:


    `http://developer.apple.com/library/ios/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/Building/Building.html`


    The tests are built via the `SenTestingKit` framework. The framework makes a number
    of macros available for validating tests. These macros start with the prefix,
    `ST`. The preceding example code uses the macro, `STAssertTrue`, but other available
    macros can be found in `SenTestCase_Macros.h`.


    Setting up the test Target is a big part of configuring a project for tests. As
    mentioned previously, this overview covered Unit Testing from within Xcode 4\.
    If a project is being built using Xcode 3, a different configuration is required.'
  trans: "\n# 为社交 iOS 应用添加单元测试\n\nApple 已将单元测试配置为在 Xcode 项目内作为独立目标进行构建和运行。虽然起初可能显得有些繁琐，但其优点在于能很好地将测试代码排除在主应用程序目标之外。这意味着测试文件不会被构建到最终的应用二进制文件中，同时也有助于调试和搭建自动化测试环境。\n\
    \n要在 Xcode 4 中为项目添加一个新目标，请从 `File` 菜单选择 `New` -> `New Target...`（参见图 10–14）。\n\
    \n![images](img/1014.jpg)\n\n**图 10–14.** *添加新目标*\n\n在目标模板弹出窗口中，进入 iOS 部分，选择 `Other`，然后选择\
    \ `Cocoa Touch Unit Testing Bundle`（参见图 10–15）。\n\n![images](img/1015.jpg)\n\n\
    **图 10–15.** *选择 Cocoa Touch Unit Testing Bundle。*\n\n接着，为新目标命名（参见图 10–16）。\n\n\
    ![images](img/1016.jpg)\n\n**图 10–16.** *重命名目标。*\n\n现在通过 Xcode 中的目标下拉菜单切换到新目标，从\
    \ `Product` 菜单中选择 `Test` 来创建构建，然后运行测试目标（参见图 10–17）。\n\n![images](img/1017.jpg)\n\
    \n**图 10–17.** *构建并运行测试目标。*\n\nXcode 创建的默认测试代码在开箱状态下会故意导致失败，这展示了 Xcode 如何高亮显示测试用例失败的情况（参见图\
    \ 10–18）。\n\n![images](img/1018.jpg)\n\n**图 10–18.** *失败！*\n\n需要为 `TwitterDataStore_SQLite`\
    \ 类编写测试；因此，需要将 `TwitterDataStore_SQLite`、`TwitterDataStore` 和 `Tweet` 类添加到 `OfflineTwitterTest`\
    \ 目标中，以便在添加实际测试代码时，`OfflineTwitterTest` 目标能够成功链接（参见图 10–19 至 10–21）。\n\n![images](img/1019.jpg)\n\
    \n**图 10–19.** *将 `Tweet.m` 添加到 `OfflineTwitterTest` 目标*\n\n![images](img/1020.jpg)\n\
    \n**图 10–20.** *将 `TwitterDataStore.m` 添加到 `OfflineTwitterTest` 目标*\n\n![images](img/1021.jpg)\n\
    \n**图 10–21.** *将 `TwitterDataStore_SQLite` 添加到 `OfflineTwitterTest` 目标*\n\n所有设置现已完成，接下来可以编写一个简单的测试来验证一切是否正常运作。测试类将测试\
    \ `TwitterDataStore_SQLite` 类中的功能，因此它需要持有一个 `TwitterDataStore_SQLite` 对象。打开示例项目中的\
    \ `OfflineTwitterTest.h` 文件，注意其中对 `TwitterDataStore_SQLite` 对象的声明：\n\n```\n#import\
    \ <SenTestingKit/SenTestingKit.h>\n\n@class TwitterDataStore_SQLite;\n@interface\
    \ OfflineTwitterTest : SenTestCase {\n@private\n    TwitterDataStore_SQLite *twitterDataStore;\n\
    }\n\n@end\n```\n\n在大多数单元测试框架中，测试类可以在测试运行前进行一些设置，并在测试完成后进行一些清理工作。iOS 项目的单元测试也不例外。测试运行前，会调用测试类的\
    \ `setUp` 方法；测试执行后，会调用 `tearDown` 方法。打开示例项目中的 `OfflineTwitterTest.m` 文件，查看这些方法的实现。由于这是一个基本示例，`setUp`\
    \ 实例化了 `TwitterDataStore_SQLite` 对象，而 `tearDown` 释放了该对象，以避免测试产生内存泄漏（否则可能引发其他副作用）。根据应用中代码的性质，这些方法可能需要更多代码。通常，这些方法应保留给类中每个测试都需要的代码：\n\
    \n```\n- (void)setUp\n{\n    [super setUp];\n\n    // 设置代码写在这里。\n    twitterDataStore\
    \ = [[TwitterDataStore_SQLite alloc] init];\n}\n\n- (void)tearDown\n{\n    //\
    \ 清理代码写在这里。\n    [twitterDataStore release];\n\n    [super tearDown];\n}\n```\n\
    \n以下是针对 `TwitterDataStore_SQLite` 类功能的实际测试。虽然可能会想为类的每个方法编写单元测试，但更好的方法是考虑该类作为一个整体应完成什么任务，并编写测试来验证其功能。这也引出了测试命名的问题。最好给测试起有用且描述性的名称，这样项目中的其他开发者仅凭名称就能立即知道该测试试图验证什么。为此，下面的测试被命名为\
    \ `testItShouldSynchronizeTweets`，以反映 `TwitterDataStore_SQLite` 的主要职责之一是存储和同步推文。\n\
    \n该测试首先从 `TwitterDataStore_SQLite` 中删除所有推文，以便从一个干净的状态开始。这种方法并非在所有情况下都必要或可取，应根据具体类或应用进行调整。接着，创建一个\
    \ `NSDictionary` 来表示一条模拟推文。由于 `TwitterDataStore_SQLite` 的 `synchronizeTweets:`\
    \ 方法只接受一个 `NSArray` 参数，因此将表示推文的 `NSDictionary` 添加到一个 `NSArray` 对象中，再将其传递给 `synchronizeTweets:`。然后使用\
    \ `TwitterDataStore_SQLite` 的 `tweets` 方法获取存储的推文，并进行简单比较以确认数据存储中有一条推文。根据测试或应用的不同，可以添加额外的验证，例如检查检索到的推文内容是否与字典中的内容匹配：\n\
    \n```\n- (void)testItShouldSynchronizeTweets\n{\n    [twitterDataStore deleteTweets];\n\
    \n    NSDictionary *tweetDictionary = [NSDictionary\n    dictionaryWithObjects:[NSArray\
    \ arrayWithObjects:@\"1\", @\"Tweet!\", nil]\n    forKeys:[NSArray arrayWithObjects:@\"\
    id\", @\"text\", nil]];\n\n    NSArray *newTweets = [NSArray arrayWithObject:tweetDictionary];\n\
    \    [twitterDataStore synchronizeTweets:newTweets];\n\n    NSArray *tweets =\
    \ [twitterDataStore tweets];\n    STAssertTrue((1 == [tweets count]), @\"Test\
    \ error message\");\n}\n\n@end\n```\n\n这类测试的一大优点是，它们使得在特定场景下调试代码变得非常容易，而无需运行实际应用并在用户界面中执行多个步骤。这种方法还能使测试可重复，这在需要重构或优化代码时非常有利。当然，它还能确保在对代码进行调整或进行重大修改时，不会引入*回归*（即之前按预期工作的代码中出现的新错误）。\n\
    \n应用需要的测试不止一个。当需要额外测试时，可以将其添加到现有测试类中，或者向测试目标添加新的测试类。不要忘记同时将主应用目标中的相关文件添加到测试目标中，具体取决于正在测试的功能。\n\
    \n有关此主题的更多信息，请参考 Apple 文档中的测试部分，网址为：\n\n`http://developer.apple.com/library/ios/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/Building/Building.html`\n\
    \n测试通过 `SenTestingKit` 框架构建。该框架提供了多个用于验证测试的宏，这些宏以 `ST` 为前缀。前面的示例代码使用了宏 `STAssertTrue`，但其他可用的宏可以在\
    \ `SenTestCase_Macros.h` 中找到。\n\n设置测试目标是为项目配置测试的重要部分。如前所述，本概述涵盖了在 Xcode 4 中进行的单元测试。如果项目使用\
    \ Xcode 3 构建，则需要采用不同的配置。\n"
- fmt: "While the `SenTestingKit` framework is available in Xcode 3, Apple's out-of-the-box\
    \ offering for setting up tests is less than ideal. However, some engineers at\
    \ Google were nice enough to expand on Apple's offering and make an updated iOS\
    \ Unit Testing library available to the general public. Setting this up in Xcode\
    \ 3 requires a few manual steps, but it's well worth the effort. The code is part\
    \ of Google's `google-toolbox-for-mac` initiative, and it can be found here:\n\
    \n`https://code.google.com/p/google-toolbox-for-mac/wiki/iPhoneUnitTesting`\n\n\
    Another worthwhile alternative for Xcode 3 is `GHUnit`, which you can find here:\n\
    \n`https://github.com/gabriel/gh-unit`\n\nAnother interesting aspect of writing\
    \ Unit Tests pertains to mocking objects. Learning to mock objects for tests can\
    \ take test code to the next level. The main offering for mocking objects in Objective-C\
    \ Unit Tests for iOS projects is `OCMock`. Note that using `OCMock` doesn't require\
    \ a new testing target in an iOS project. Rather, it offers classes and functionality\
    \ to use in existing test classes and methods or new tests. Explore the information\
    \ at the following link for an introduction to `OCMock`, as well as setup instructions:\n\
    \n`www.mulle-kybernetik.com/software/OCMock/`\n\n### Conclusion\n\nThere are a\
    \ number of great tools available to make life easier when developing iOS projects.\
    \ These range from free online services to open source tools and software. This\
    \ chapter touches just the surface of what is available; however, it covers a\
    \ few that are indispensable for writing great iOS apps in general, as well as\
    \ for Facebook and Twitter specifically. There is a wealth of information available\
    \ online and via books and publications with respect to data modeling, testing,\
    \ and shortening URLs; but writing iOS applications lends itself to the tools\
    \ and software covered in this chapter due to the nature of mobile development\
    \ and the constraints of the iOS platform.\n\n## Chapter 11\n\n## Apps You Can\
    \ (and Cannot) Build\n\nSadly, we realized early on in writing this book that\
    \ we'd need a chapter about all the rules that attend the use of the Facebook\
    \ and Twitter APIs. Back in 2009, when these apps were exploding in popularity,\
    \ social APIs were used with relative abandon. The platform makers—and that includes\
    \ Facebook and Twitter—weren't sure how smartphones were going to change the way\
    \ people used their tools.\n\nNow that some time has passed, Facebook and Twitter\
    \ have begun restricting the ways in which you can use their APIs.\n\nIn fairness,\
    \ Facebook's platform policies are sensible and give developers wide latitude.\
    \ Twitter, on the other hand, is often accused of being more manipulative (to\
    \ put it diplomatically) about how people use their code.\n\nWhile we, the authors,\
    \ would certainly prefer complete freedom to use these APIs however we want, it's\
    \ important to acknowledge that a brand like Twitter has a reputation to uphold,\
    \ and (like any company) it is terrified of someone dragging it through the mud\
    \ or confusing consumers about what Twitter is for.\n\nTreat this section as a\
    \ filter for your app ideas. If you already have an app that you're adding Twitter\
    \ or Facebook functionality to, then you'll still want to skim this chapter to\
    \ make sure none of your app's visual or interactive elements attract any negative\
    \ attention from the Twitter and Facebook platforms.\n\nAfter all, the only thing\
    \ worse than having to obey rules is having to go back and redo your work to comply\
    \ with them.\n\n### Twitter: No Clients Allowed\n\nIn March 2011, Twitter platform\
    \ team member Ryan Sarver (`@rsarver`) posted a missive to its developer group.\
    \ In this post, Sarver declared new Twitter fiats meant to corral what and how\
    \ developers build. You can read his post at this URL:\n\n[`https://groups.google.com/forum/#!topic/twitter-development-talk/yCzVnHqHIWo/discussion`](https://groups.google.com/forum/#!topic/twitter-development-talk/yCzVnHqHIWo/discussion)\n\
    \nWe won't bother reproducing the note in full, but we'll highlight some areas\
    \ where the changes in policy have been most acute. These also tend to be areas\
    \ that developers new to the platform aren't aware of. The main points were as\
    \ follows:\n\n*   Twitter has gotten exceedingly popular since its developer terms\
    \ were first written.\n*   The more mainstream the service, the more consistent\
    \ the UI and UX must be; otherwise, Twitter suffers what is known in the business\
    \ as *brand dilution*.\n*   The UI and UX in the official Twitter apps are best,\
    \ as indicated by their immense popularity compared to that of third-party Twitter\
    \ apps.\n*   As a result, Twitter is slowly cracking down on the creation of Twitter\
    \ clients that only reproduce Twitter functionality (and don't add some other\
    \ kind of value). It's suggestions for value-added Twitter apps include publishing\
    \ tools (such as `SocialFlow`), curation tools (such as `Sulia`), and data products\
    \ (such as `Klout`). Other opportunities include social CRM clients like `HootSuite`;\
    \ as well as other unique services like `Foursquare`, `Instagram`, and `Quora`.\n\
    \nIn summary: You can still develop freely with the Twitter API. But from now\
    \ on, you'll have to be more creative about the way your app uses the service.\
    \ Simply reproducing the Twitter app with a different design or interaction will\
    \ earn you a scolding from the Twitter team email (and possibly loss of access\
    \ to the Twitter API).\n\n#### The Lowdown on the Twitter Terms of Service\n\n\
    When Twitter posted the note just described, it also disseminated a revised Terms\
    \ of Service that provided more specificity on the changes described in that post.\
    \ Again, we won't reproduce them in full here, but there are certain areas you\
    \ should be particularly aware of.\n\n**NOTE:** The best case scenario is that\
    \ you will create an app that is wildly popular. If your app ever needs more than\
    \ 5 million user tokens, you will need to contact Twitter directly about access\
    \ to the Twitter API.\n\nYou can find the complete Twitter Terms of Service here:\n\
    \n[`http://dev.twitter.com/pages/api_terms`](http://dev.twitter.com/pages/api_terms)\n\
    \n##### Rules of the Road\n\nWe will summarize Twitter's \"rules\" in the sections\
    \ that follow. Note that even our summary—which is significantly more terse than\
    \ the actual document—is still annoyingly long. We've put the most crucial points\
    \ in boldface, in case you'd like to read those quickly. But don't move *too*\
    \ fast—it'd be a shame to invest time and energy in a project not endorsed by\
    \ these terms, since you may have to scrap it later.\n\n###### Using the API\n\
    \nHere are some of the key rules governing the use of Twitter's API:\n\n*   You\
    \ need written permission from Twitter if you want to sell, rent, lease, sublicense,\
    \ redistribute, or syndicate the Twitter API, Twitter data, or Twitter content.\
    \ Here are some additional rules pertaining to these permissions:\n    *   You\
    \ face a special restriction if you provide an API that returns Twitter data:\
    \ it may only return Tweet IDs and user IDs.\n    *   You may export or extract\
    \ non-programmatic, GUI-driven Twitter content as a PDF or spreadsheet by using\
    \ \"save as\" or similar functionality.\n    *   You are not permitted to export\
    \ Twitter content to a datastore as a service or other cloud-based service.\n\
    *   You aren't allowed to alter any proprietary notices or marks on the Twitter\
    \ API or content.\n*   **You can't use the Twitter API for purposes of monitoring\
    \ the uptime, performance, or functionality of Twitter.**\n*   **You can't use\
    \ Twitter trademarks in a manner that suggests you have any association with Twitter.**\n\
    *   **You can't sell or access the Twitter API to aggregate, cache (except as\
    \ part of a Tweet), or store geographic location info contained in Tweets.**\n\
    *   You can't charge a premium for access to any Twitter feature."
