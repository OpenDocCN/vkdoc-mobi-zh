    \n## 内部机制：MGTwitter HTTP连接与XML解析\n\n实际的Twitter API是一个基于HTTP的API，其中HTTP请求被格式化并发送到Twitter的服务器，响应以XML格式返回。`MGTwitterEngine`为我们提供了一组简洁易用的Objective-C包装类，我们可以在iOS应用中使用它们向Twitter请求信息。\n\
    \n`MGTwitterEngine`中实际发出请求并处理响应的类是`MGTwitterEngine`类本身。如果你查看`MGTwitterEngine`的头文件，你会注意到它拥有一个连接字典：\n\
    \n```\nNSMutableDictionary *_connections;\n```\n\n每次发出请求时，`MGTwitterEngine`都会创建一个新的`MGTwitterHTTPURLConnection`，它是一个`NSURLConnection`。每个`MGTwitterHTTPURLConnection`都会为自己创建一个唯一标识符（UUID）。这是通过`MGTwitterEngine`中一个名为`NSString+UUID`的`NSString`类别类实现的，该类有一个方法：\n\
    \n```\n+ (NSString*)stringWithNewUUID\n{\n    // Create a new UUID\n    CFUUIDRef\
    \ uuidObj = CFUUIDCreate(kCFAllocatorDefault);\n\n    // Get the string representation\
    \ of the UUID\n    NSString *newUUID = (NSString*)CFUUIDCreateString(kCFAllocatorDefault,\
    \ uidObj);\n    CFRelease(uuidObj);\n    return [newUUID autorelease];\n}\n```\n\
    \n当`MGTwitterEngine`创建一个连接时，它会将该连接对象保存到其`connections`字典中，其中键是连接返回的连接标识符。我们稍后会解释为什么这很重要，但首先让我们看看从Twitter请求某人粉丝的URL：\n\
    \n`https://twitter.com/statuses/followers.xml`\n\n当`MGTwitterEngine`创建一个`MGTwitterHTTPURLConnection`对象时，它会为其分配一个请求类型和一个响应类型。这是为什么呢？当从Twitter接收到响应时，`MGTwitterEngine`使用这些信息来决定如何解析返回的XML数据。请注意，`MGTwitterEngine`有许多XML解析器，它们都派生自`MGTwitterXMLParser`。如果你检查`MGTwitterEngine`的`_parseDataForConnection:`方法，你会发现它根据连接的响应类型执行一个switch语句。在请求粉丝的情况下，会创建一个`MGTwitterUsersParser`来解析响应。XML被解析后，通过`MGTwitterEngineDelegate`的`userInfoRecieved:forRequest:`方法以字典数组的形式返回给我们。以下是其中一个字典的样子：\n\
