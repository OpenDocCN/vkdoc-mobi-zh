- fmt: '#### Essential Three20 Components


    As you learned in [Chapter 10](#Chapter10.html#ch10), the Three20 project is Facebook
    iOS developer Joe Hewitt''s gift to the Facebook developer community: an entire
    framework he built himself for the Facebook app for iOS.


    It''s open source, and it''s comprised of several of the constituent parts of
    the Facebook app. These parts are the photo viewer, the message composer, the
    Web image view, and other goodies. You can find their Git addresses at this URL:


    [`http://joehewitt.com/post/the-three20-project/`](http://joehewitt.com/post/the-three20-project/)


    Here are some of the components you will want to be aware of as you design your
    app and Joe''s descriptions of each one:


    - **Photo Viewer**: “`TTPhotoViewController` emulates Apple''s Photos app with
    all of its flick‘n''pinch delight. You can supply your own “photo sources,” which
    work similarly to the data sources used by `UITableView`. Unlike Apple''s Photos
    app, it isn''t limited to photos stored locally. Your photos can be loaded from
    the network, and long lists of photos can be loaded incrementally. This version
    also supports zooming (unlike the version in the current Facebook app).

    - “This has probably been the single biggest timesink in the whole Facebook for
    iPhone project for me, so if I can help anyone else save that time I will sleep
    better.”

    - **Message composer**: “`TTMessageController` emulates the message composer in
    Apple''s Mail app. You can customize it to send any kind of message you want.
    Include your own set of message fields, or use the standard `To:` and `Subject:`.
    Recipient names can be autocompleted from a data source that you provide.”

    - **Web image views**: “`TTImageView` makes it as easy to display an image as
    it is in HTML. Just supply the URL of the image, and `TTImageView` loads it and
    displays it efficiently. `TTImageView` also works with the HTTP cache described
    below to avoid hitting the network when possible.”

    - **Internet-aware table view controllers**: “`TTTableViewController` and `TTTableViewDataSource`
    help you to build tables which load their content from the Internet. Rather than
    just assuming you have all the data ready to go, like `UITableView` does by default,
    `TTTableViewController` lets you communicate when your data is loading, and when
    there is an error or nothing to display. It also helps you to add a “More” button
    to load the next page of data, and optionally supports reloading the data by shaking
    the device.”

    - **Letter Text Fields**: “`TTTextEditor` is a `UITextView` which can grow in
    height automatically as you type. I use this for entering messages in Facebook
    Chat, and it behaves similarly to the editor in Apple''s SMS app.

    - “`TTPickerTextField` is a type-ahead `UITextField`. As you type, it searches
    a data source, and it adds bubbles into the flow of text when you choose a type-ahead
    option. I use this in `TTMessageController` for selecting the names of message
    recipients.”


    #### Design Tricks from the Web App


    Facebook''s touch Web app is arguably as well designed as its iOS app (see [Figure
    14–9](#Chapter14.html#fig_14_9)). Although it has all the limitations that come
    with being in the browser, there are nevertheless some good design paradigms here
    that you can actually borrow from (unlike the grid).


    ![images](images/1409.jpg)


    **Figure 14–9.** *Facebook''s home page for Mobile Safari users*


    ##### The Tabbed Approach


    Tabs were used in the first versions of the Facebook for iOS app, but they quickly
    became cluttered as the app became more robust. The Web app held onto tabbed browsing
    longer, but its developers recently revised the app''s navigation bar to contain
    only four items:


    - Profile

    - Messages

    - More (Friends, Photos, Places, Groups, Events, Notes, Notifications, Settings,
    and Logout)

    - Search button


    We''d say the contents of these tabs reflect the Facebook usability priorities
    we established at the beginning of this section:


    - Looking people up

    - Contacting people

    - Context


    And with that, this discussion has come full circle!


    ### Conclusion


    This is a time after a rush. Web developers have flocked to the Twitter and Facebook
    APIs, and iOS developers are following after them. But the influx has caused the
    management of these platforms to become conservative as they try to protect and
    sustain their growth. No one wants to derail a good thing, and the platforms have
    constructed a schema of rules and terms that ensure no one can sully their name
    but themselves.


    This is not a death sentence for the creativity of developers and designers. Rather,
    it forces them to create apps that add real value to the platform. We encourage
    you to think of ways to use Facebook and Twitter that haven''t been done—or haven''t
    been done right, previously. And when you hit upon a unique experience with an
    audience you know, you need to design visual assets that reflect the personality
    of your app. In the App Store, looks aren''t everything. They''re merely *almost*
    everything.


    ## Index


    ### Symbols and Numerics


    `#` (hash tags), Twitter, [189](#Chapter10.html#page_189)


    `#hashtags`, Tweets, [248](#Chapter13.html#page_248)


    `?` symbols, SQLite, [197](#Chapter10.html#page_197)


    `@mentions`, Tweets, [248](#Chapter13.html#page_248)'
