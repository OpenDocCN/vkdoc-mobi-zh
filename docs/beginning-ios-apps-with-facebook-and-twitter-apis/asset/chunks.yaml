  trans: "\n虽然 Xcode 3 中已经提供了 `SenTestingKit` 框架，但苹果自带的测试设置方案并不理想。不过，谷歌的一些工程师非常友好地对苹果的方案进行了扩展，并面向大众发布了一个更新版的\
    \ iOS 单元测试库。在 Xcode 3 中进行配置需要执行几个手动步骤，但非常值得一试。该代码是谷歌 `google-toolbox-for-mac`\
    \ 项目的一部分，可在此处找到：\n\n`https://code.google.com/p/google-toolbox-for-mac/wiki/iPhoneUnitTesting`\n\
    \n对于 Xcode 3 而言，另一个值得考虑的替代方案是 `GHUnit`，下载地址如下：\n\n`https://github.com/gabriel/gh-unit`\n\
    \n编写单元测试的另一个有趣方面涉及模拟对象（Mocking Objects）。学习为测试模拟对象可以将测试代码提升到一个新的水平。在 iOS 项目的 Objective-C\
    \ 单元测试中，模拟对象的主要工具是 `OCMock`。请注意，使用 `OCMock` 并不需要在 iOS 项目中新建测试目标，而是提供了一些类和功能，供你在现有测试类、方法或新测试中使用。请通过以下链接了解\
    \ `OCMock` 的简介及设置说明：\n\n`www.mulle-kybernetik.com/software/OCMock/`\n\n### 结论\n\
    \n在开发 iOS 项目时，有许多出色的工具可以让工作变得轻松。这些工具从免费的在线服务到开源工具和软件，应有尽有。本章只是浅尝辄止地介绍了一部分可用工具；不过，它涵盖了一些对于编写优秀\
    \ iOS 应用（包括针对 Facebook 和 Twitter 的应用）不可或缺的工具。关于数据建模、测试以及缩短 URL 等方面，网上以及书籍刊物中都有大量的资料；但由于移动开发的特性以及\
    \ iOS 平台的限制，撰写 iOS 应用程序时，本章所介绍的工具和软件是非常适用的。\n\n## 第 11 章\n\n## 你可以构建（以及不能构建）的应用\n\
    \n遗憾的是，在撰写本书的早期我们就意识到，需要有一章来专门讲解使用 Facebook 和 Twitter API 时必须遵守的所有规则。早在 2009 年，当这些应用爆红时，社交\
    \ API 的使用几乎毫无限制。平台开发方——包括 Facebook 和 Twitter——当时也不确定智能手机将如何改变人们使用其工具的方式。\n\n随着时间的推移，Facebook\
    \ 和 Twitter 已经开始限制其 API 的使用方式。\n\n平心而论，Facebook 的平台政策是合理的，并为开发者提供了很大的自由度。相比之下，Twitter\
    \ 则常被指责（说得委婉些）在用户如何调用其代码方面显得“更具操控性”。\n\n作为作者，我们当然希望完全自由地使用这些 API，但也必须承认，像 Twitter\
    \ 这样的品牌需要维护其声誉，并且（像任何公司一样）非常担心有人对其抹黑，或让用户混淆 Twitter 的用途。\n\n请把本节内容当作你应用创意的筛选器。如果你已经有一个正在添加\
    \ Twitter 或 Facebook 功能的应用，那么你仍然需要快速浏览本章，以确保应用的任何视觉或交互元素不会引起 Twitter 和 Facebook\
    \ 平台的负面关注。\n\n毕竟，唯一比遵守规则更糟糕的事情，就是回头重做以符合规则要求。\n\n### Twitter：禁止客户端应用\n\n2011 年\
    \ 3 月，Twitter 平台团队成员 Ryan Sarver（`@rsarver`）在开发者社区发布了一篇声明。在这篇文章中，Sarver 宣布了 Twitter\
    \ 的新规定，旨在规范开发者的开发内容和方式。你可以通过以下网址阅读他的文章：\n\n[`https://groups.google.com/forum/#!topic/twitter-development-talk/yCzVnHqHIWo/discussion`](https://groups.google.com/forum/#!topic/twitter-development-talk/yCzVnHqHIWo/discussion)\n\
    \n我们不再赘述全文，但会重点指出政策变化最显著的一些方面。这些也往往是平台新开发者不了解的领域。主要要点如下：\n\n*   自 Twitter 的开发者条款首次制定以来，它变得异常流行。\n\
    *   服务越是主流，其 UI 和 UX 就必须越一致；否则，Twitter 将遭受行业内所谓的*品牌稀释*。\n*   官方 Twitter 应用的 UI\
    \ 和 UX 是最好的，其相比第三方 Twitter 应用的高人气也证明了这一点。\n*   因此，Twitter 正在逐步打击那些仅复制 Twitter\
    \ 功能（而未增加其他价值）的 Twitter 客户端。它针对增值 Twitter 应用的建议包括：发布工具（如 `SocialFlow`）、策展工具（如\
    \ `Sulia`）以及数据产品（如 `Klout`）。其他机会还包括社交 CRM 客户端（如 `HootSuite`），以及类似 `Foursquare`、`Instagram`\
    \ 和 `Quora` 的独特服务。\n\n总结：你仍然可以使用 Twitter API 自由开发。但从现在开始，你的应用在使用该服务时必须更具创意。仅仅以不同的设计或交互方式复制\
    \ Twitter 应用，都会招致 Twitter 团队的邮件警告（甚至可能导致失去 Twitter API 的访问权限）。\n\n#### Twitter\
    \ 服务条款详解\n\nTwitter 发布上述声明的同时，也发布了修订后的服务条款，对声明中描述的变化进行了更具体的说明。我们再次不在此全文转载，但你需要特别关注某些方面。\n\
    \n**注意：** 最好的情况是，你开发的应用大受欢迎。如果你的应用需要的用户令牌超过 500 万个，则需要直接联系 Twitter 以获取 API 访问权限。\n\
    \n完整的 Twitter 服务条款可在此处找到：\n\n[`http://dev.twitter.com/pages/api_terms`](http://dev.twitter.com/pages/api_terms)\n\
    \n##### 基本规则\n\n我们将在后续章节中总结 Twitter 的“规则”。请注意，即使我们的摘要——比实际文档简洁得多——仍然长得令人厌烦。我们将最关键的点用粗体标出，以便你快速阅读。但也不要*太快*——如果投入时间和精力的项目不符合这些条款，那将非常可惜，因为你可能之后不得不放弃它。\n\
    \n###### 使用 API\n\n以下是关于使用 Twitter API 的一些关键规则：\n\n*   如果你想出售、出租、租赁、再许可、再分发或联合提供\
    \ Twitter API、Twitter 数据或 Twitter 内容，需要获得 Twitter 的书面许可。以下是关于这些许可的一些附加规则：\n  \
    \  *   如果你提供返回 Twitter 数据的 API，将面临特殊限制：该 API 只能返回推文 ID 和用户 ID。\n    *   你可以通过“另存为”或类似功能，将非编程的、GUI\
    \ 驱动的 Twitter 内容导出或提取为 PDF 或电子表格。\n    *   不允许将 Twitter 内容作为服务或基于云的服务导出到数据存储中。\n\
    *   不允许更改 Twitter API 或内容上的任何专有通知或标记。\n*   **你不能使用 Twitter API 来监控 Twitter 的正常运行时间、性能或功能。**\n\
    *   **你不能以暗示与 Twitter 有任何关联的方式使用 Twitter 商标。**\n*   **你不能出售或访问 Twitter API 来聚合、缓存（作为推文的一部分除外）或存储推文中包含的地理位置信息。**\n\
    *   你不能对访问任何 Twitter 功能收取额外费用。\n"
- fmt: "# What Your App Can Do\n\nAccording to Twitter, your service \"may be an application\
    \ or client that provides major components of a Twitter-like end user experience\"\
    ; however, if you build a client app, additional terms apply:\n\n- You must use\
    \ the Twitter API as the sole source for features in your client that are substantially\
    \ similar to functionality offered by Twitter. In other words, you can't mix another\
    \ similar API into your Twitter API project, or the company will write you one\
    \ of those threatening emails.\n- You may not offer payment to third parties for\
    \ distribution of your app.\n- You cannot frame or reproduce significant portions\
    \ of the Twitter service in your app; instead, you must use the Twitter API to\
    \ display Twitter content.\n- Do not store private data or content, or duplicate\
    \ Twitter's database.\n\n## Rules Governing Existing Twitter Clients\n\nGiven\
    \ the new terms of service, it might seem strange that several non-official Twitter\
    \ clients remain in the app store. When Twitter made the \"no more clients\" announcement\
    \ in March 2011, its platform developers said some existing Twitter client apps\
    \ would be allowed to continue doing business. However, Twitter's Ryan Sarver\
    \ added^([1](#Chapter11.html#CH-11-FN-1)):\n\n> \"We will be holding you to high\
    \ standards to ensure you do not violate users' privacy, that you provide consistency\
    \ in the user experience, and that you rigorously adhere to all areas of our Terms\
    \ of Service.\"\n\n## How Twitter Defines Usability\n\nThe section that follows\
    \ doesn't contain rules, exactly; rather, it describes a series of guidelines\
    \ that (if followed) will ensure you don't earn any ire from Twitter's platform\
    \ folks. It might seem draconian of them to dictate how your app should operate,\
    \ but it's in the best interest of users, some of whom will be confused if your\
    \ app does things with the platform that other Twitter apps don't. In that spirit,\
    \ Twitter asks that you adhere to the following:\n\n- **Don't surprise users:**\
    \ Don't misuse Twitter functionality or terminology:\n    - Maintain the integrity\
    \ of Tweets. There is a lot of information packed into Tweets, even though they\
    \ are just 140 characters long. See [Chapter 13](#Chapter13.html#ch13) for Twitter\
    \ Visual Design guidance.\n    - Don't edit or revise user-generated content delivered\
    \ through the API.\n    - Always show the user that authored or provided a Tweet.\n\
    - **Don't create or distribute spam:** Get a user's permission before you do any\
    \ of the following:\n    - Send Tweets or other messages on her behalf. The fact\
    \ that a user authenticates through your application does not constitute consent\
    \ to send a message on her behalf.\n    - Modify her profile information or take\
    \ account actions (including following, unfollowing, and blocking) on her behalf.\n\
    \    - Add hash tags, annotations data, or other content to a user's Tweet. Show\
    \ the user exactly what will be published.\n- **Don't make placeholder apps for\
    \ the sake of name-squatting.**\n- **Respect user privacy:** You need to utilize\
    \ proper security standards such as `OAuth`, as discussed in [Chapter 2](#Chapter02.html#ch2).\
    \ You should also do the following:\n    - Respect the privacy and sharing settings\
    \ of Twitter Content.\n    - Promptly change your treatment of Twitter content\
    \ as changes are reported through the Twitter API.\n    - Always show users a\
    \ privacy policy for your service. You should also clearly disclose what you are\
    \ doing with information you collect from them.\n    - Clearly disclose when you\
    \ are adding location information to a user's Tweets, whether as a geotag or annotations\
    \ data.\n    - Do not solicit another developer's consumer keys or consumer secrets\
    \ if they will be stored outside of that developer's control.\n    - Do not facilitate\
    \ or encourage the publishing of private or confidential information.\n- **Be\
    \ a good partner to Twitter:** You need to follow all the rules described in this\
    \ chapter, including the following:\n    - Don't use business names and/or logos\
    \ in a manner that can mislead, confuse, or deceive users. For more information\
    \ on the use of Twitter Marks, see the trademark rules later in this chapter.\n\
    \    - Try not to confuse or mislead users about the source or purpose of your\
    \ application.\n    - Don't link to malware.\n    - Don't replicate, frame, or\
    \ mirror the Twitter website or its design.\n    - Don't misuse the API to impersonate\
    \ others on Twitter.\n\n__________\n\n¹ [`https://groups.google.com/forum/#!topic/twitter-developmenttalk/yCzVnHqHIWo/discussion`](https://groups.google.com/forum/#!topic/twitter-developmenttalk/yCzVnHqHIWo/discussion)\n\
    \n## Login and Identity\n\nTwitter also has some guidelines pertaining to login\
    \ and identity:\n\n- You must present users with the option to log into Twitter\
    \ via the `OAuth` security protocol, as discussed in [Chapters 2](#Chapter02.html#ch2)\
    \ and [5](#Chapter05.html#ch5) of this book.\n- You should give end users without\
    \ a Twitter account the opportunity to create a new Twitter account.\n- You must\
    \ display the Connect with Twitter option at least as prominently as the Facebook\
    \ Connect button, or any other social Web login option.\n- You must do the following\
    \ once an end user has authenticated via Connect with Twitter: clearly display\
    \ his Twitter avatar, his Twitter user name, and the Twitter bird graphic.\n\n\
    ## Displaying Content Correctly\n\nHere are the guidelines that cover displaying\
    \ Twitter content correctly:\n\n- You should have all URLs referencing content\
    \ in a Tweet direct users back to the page where that content is displayed, and\
    \ not to any intermediate pages.\n- You must show Tweets that reference Twitter\
    \ as the source if your service displays updates commingled with Tweets.\n- Don't\
    \ put pornography in user profile images or backgrounds.\n- Only surface actions\
    \ that are organically displayed on Twitter. For example, when a user executes\
    \ the unfavorite or delete actions, you should not do something Twitter doesn't,\
    \ such as publicize that a Tweet was deleted.\n- Do not falsely report an account\
    \ as Verified.\n\n## Monetizing Your App\n\nYou should adhere to the following\
    \ guidelines when attempting to monetize your app. One of the most important aspects\
    \ of this is to respect user content:\n\n- Tweets may be used in ads, but not\
    \ *as* ads.\n- You must get permission from the user that created a Tweet if you\
    \ want to use it on a durable good, or if you're implying the sponsorship or endorsement\
    \ of that user.\n\n## Twitter Ads\n\nTwitter may serve advertising in your app\
    \ via its APIs (i.e., Twitter Ads); however, Twitter will share a portion of advertising\
    \ revenue with you if you contact it.\n\n## Advertising Around Twitter Content\n\
    \nYou are allowed to advertise inside your own Twitter API app, but there are\
    \ (of course) rules about this, too:\n\n- You must pay Twitter a cut of your revenue\
    \ if the \"primary basis\" of your advertising deal is Tweets. If you think your\
    \ ad deal may fall under this rubric, email Twitter at [`partner@twitter.com`](http://partner@twitter.com).\
    \ This includes things like custom visualizations.\n- You cannot put ads in the\
    \ Twitter timeline or in any other message else that might reasonably be confused\
    \ by users as a Tweet. For example, ads cannot have Tweet actions like ReTweet,\
    \ Favorite, and Reply.\n- You must generally maintain a clear separation between\
    \ Twitter content and your advertisements."
