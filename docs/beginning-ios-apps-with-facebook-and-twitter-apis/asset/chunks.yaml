    \ available on GitHub at\n    [`https://github.com/facebook/facebook-ios-sdk`](https://github.com/facebook/facebook-ios-sdk)`.`\
    \ Facebook's developer kit comes pre-loaded with some sample projects, but we'll\
    \ include more with this book that you can download online.\n\nIn the following\
    \ chapters, we'll provide a more in-depth discussion of how to set up your iOS\
    \ project in Xcode to use the Facebook and Twitter APIs; however, let's first\
    \ take a quick look at how the Facebook and Twitter APIs are used in actual code.\n\
    \n#### Using Facebook's API\n\nNow let's take a look at how you use Facbook's\
    \ API. Begin by instantiating the Facebook object:\n\n`Facebook* facebook = [[Facebook\
    \ alloc] init];`\n\nWith the iOS SDK, you can do three main things:\n\n*   **Handle\
    \ Authentication and Authorization:** Prompt users to log into Facebook and grant\
    \ permissions to your application.\n*   **Make API Calls:** Fetch user profile\
    \ data, as well as information about a user's friends.\n*   **Display a Dialog:**\
    \ Interact with a user via a UIWebView—this is useful for enabling quick Facebook\
    \ interactions (such as publishing to a user's stream) without requiring upfront\
    \ permissions or implementing a native UI.\n\n##### Making API Calls\n\nThe Facebook\
    \ Graph API presents a simple, consistent view of the Facebook social graph, uniformly\
    \ representing objects in the graph (e.g., people, photos, events, and fan pages)\
    \ and the connections between them (e.g., friend relationships, shared content,\
    \ and photo tags).\n\nYou can access the Graph API by passing the Graph Path to\
    \ the `request()` method.\n\nFor example, this code enables you to access information\
    \ about the logged-in user call:\n\n`[facebook requestWithGraphPath:@\"me\" andDelegate:self];`\n\
    \nAnd this code enables you to obtain the logged-in user's `friends` call:\n\n\
    `[facebook requestWithGraphPath:@\"me/friends\" andDelegate:self];`\n\nYour delegate\
    \ object should implement the `FBRequestDelegate` interface to handle your request\
    \ responses. A successful request will call back `FBRequestDelegate` interface's\
    \ `request:didLoad:` in your delegate. The result passed to your delegate can\
    \ be an `NSArray`, `NSString`, `NSDictionary`, or `NSNumber`, depending on the\
    \ information that you requested and the format of its response.\n\nAdvanced applications\
    \ may want to provide their own custom parsing and/or error handling, depending\
    \ on their individual needs.\n\n##### Displaying Dialogs\n\nThis SDK provides\
    \ a method for popping up a Facebook dialog. The currently supported dialogs are\
    \ the login and permissions dialogs used in the authorization flow and a dialog\
    \ for publishing posts to a user's stream.\n\nUse this code to invoke a dialog\
    \ to post a message to a user's stream:\n\n`[facebook dialog:@\"feed\" andParams:nil\
    \ andDelegate:self];`\n\nThe preceding code allows you to provide basic Facebook\
    \ functionality in your application with a single line of code—there's no need\
    \ to build native dialogs, make API calls, or handle responses. For further examples,\
    \ refer to the included sample application.\n\n##### Error Handling\n\nErrors\
    \ are handled by the `FBRequestDelegate` and `FBDialogDelegate` protocols. Applications\
    \ can implement these protocols and specify behavior as necessary to handle any\
    \ errors."
