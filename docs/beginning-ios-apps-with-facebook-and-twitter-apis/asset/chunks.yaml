    We''re moving towards a lack of privacy; really, we''re sacrificing a lot of that,
    and I think in doing so, in moving towards those things, we''re losing something
    valuable.” Later, he summarized: “Saying whatever you like is powerful.”


    Powerful, indeed. The upshot of Poole''s argument is that users'' desire to be
    “heard” may be entirely discrete from their desire for attribution. So while your
    iOS app may want to make provisions for publicizing something created inside the
    app—perhaps by publishing an iPad drawing or the results of a game—it''s vital
    to keep in mind that using the social graph to publish that information has the
    potential to make it searchable and traceable information for as long as Google
    and Bing are crawling the Web.


    Mark Zuckerberg, Facebook''s CEO, has a diametrically opposed point of view. He
    believes that the urge to keep online data private is some silly vestigial instinct
    that we''ll all eventually abandon. Here is what he said in an interview in January
    2010 about the changing norms of privacy:


    “… In the last five or six years, blogging has taken off in a huge way, and all
    these different services that have people sharing all this information. People
    have really gotten comfortable not only sharing more information and different
    kinds, but more openly and with more people. That social norm is just something
    that has evolved over time. We view it as our role in the system to constantly
    be innovating and be updating what our system is to reflect what the current social
    norms are.


    “A lot of companies would be trapped by the conventions and their legacies of
    what they''ve built—doing a privacy change for 350 million users is not the kind
    of thing that a lot of companies would do. But we viewed that as a really important
    thing, to always keep a beginner''s mind and what would we do if we were starting
    the company now, and we decided that these would be the social norms now, and
    we just went for it.”[¹](#Chapter02.html#CHP-2-FN-1)


    The authors of this book are (perhaps strategically) centrists in this debate.
    Yes, there is value to being anonymous, especially where minors are at play (as
    in iOS Game Center apps). But it''s also increasingly normal to have your real-life
    identity connected to your online identity. It''s up to you to decide whether
    your app will contribute to a user''s persona in the social graph—or whether it
    will be a hideaway where they can use your app with impunity.


    What''s at stake besides your users'' reputation? The value of their data. Twitter
    and Facebook both claim ownership over the data created by their users, and they''re
    free to monetize that data however they wish. Does that open users up to hyper-targeted
    advertising? Can we be segmented and marketed to because we''ve disclosed our
    real demographic information? Certainly, and both companies are already segmenting
    and targeting their user audiences. But many users would consider these realities
    to be a small price to pay for the benefits of building a real persona online.


    ### Educating Your Users


    Whatever you believe is the right level of privacy for your users, we strongly
    recommend following two general principles when dealing with the social graph.


    Notify your users of everything that is being posted or gotten from the social
    graph. Follow Apple''s example here: they provide a pop-up every time iOS accesses
    the location of a device. With the pop-up, the majority of users are absolutely
    fine with their device knowing their location. However, if this process were happening
    in the background on an opt-out basis, many users would be enraged. The lesson:
    You have a lot of latitude with privacy, and users are willing to experiment with
    your app—provided your app is completely transparent about what it is doing with
    user data, and why.


    __________


    ¹ [`http://www.readwriteweb.com/archives/facebooks_zuckerberg_says_the_age_of_privacy_is_ov.php`](http://www.readwriteweb.com/archives/facebooks_zuckerberg_says_the_age_of_privacy_is_ov.php)


    Be sure that the user knows the ramifications of the actions your app is taking.
    For computer-savvy users, it may be enough to tell them about a `POST` or `GET`
    event. But many users might be unfamiliar with the consequences of these events.
    If your app has any potential whatsoever to reveal personal or private information,
    be sure to clearly state the risks somewhere in your app. It can be hard to integrate
    such warnings or *helper text* into an iOS app without ruining visual design and
    cluttering the interaction, but [Chapter 5](#Chapter05.html#ch5) of this book
    can help you figure out when and where to do this.


    ### A Note on Feeds


    At the risk of belaboring the point, we feel we must mention that a lot of the
    actions enabled by the Facebook and Twitter APIs have somewhat irreversible consequences.
    Are the risks life or death? Probably not. But once information is posted to the
    social graph, it is extremely hard (if not impossible) to remove.


    On Twitter, tweet streams are indexed by search engines immediately, so the text
    of a tweet can live on long after the tweet has been deleted by the user. Facebook
    statuses are not indexable by search engines, but they are pushed to a user''s
    friends in the Facebook News Feed application and cannot be erased from others''
    News Feeds, even if the original post is deleted. Keep this in mind, and don''t
    be careless with your users'' information.


    ### What to Do if You Encounter a Security Loophole


    If you discover what you think may be a security problem with the Facebook or
    Twitter platform while developing an app, you should report the flaw immediately
    to the appropriate entities.


    For Facebook, this means entering a ticket in the platform''s bug tracking system,
    which is located at [`http://bugs.developers.facebook.net`](http://bugs.developers.facebook.net)`.`
    For bigger issues, you can fill out the form located at [`http://www.facebook.com/help/contact.php?show_form=dev_support`](http://www.facebook.com/help/contact.php?show_form=dev_support)`,`
    although the company says that response times to this form are not as rapid as
    with the bug tracker.


    Twitter has a more nuanced reporting system. The company has several different
    reporting systems that are segmented by the kind of flaw you find. To see your
    options for reporting, check out [`http://support.twitter.com/groups/33-report-a-violation`](http://support.twitter.com/groups/33-report-a-violation);
    you can glance at the @support feed to see if the issue has already been addressed.


    ### Summary


    We think you get the picture: privacy is important, and security is even more
    important. Prototype, test, and test some more. Don''t rely on Apple to vet the
    security chops of your app. Use the appropriate version of OAuth and consider
    all the use-cases you can imagine to prevent holes. Do this at every stage of
    development, and don''t roll out a finished product until you''re sure it''s safe.
    And don''t forget: once something is published to the social graph, it can be
    almost impossible to redact. Publish carefully!


