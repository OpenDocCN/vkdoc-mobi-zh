    \ in the preceding examples contained timestamps for things like creation time.\
    \ By default, all of the date fields returned by Facebook are an ISO-8601 formatted\
    \ string. If you’d rather have these strings in a different format, you can specify\
    \ an additional `date_format` parameter with your requests:\n\n```\nNSMutableDictionary\
    \ *params = [NSMutableDictionary dictionary];\n[params setObject:@\"U\" forKey:@\"\
    date_format\"];\n[facebook requestWithGraphPath:@\"me/feed\"\n               \
    \      andParams:params\n                   andDelegate:self];\n```\n\nThe immediately\
    \ preceding example requests all date strings in unixtime-format by specifying\
    \ `U` as the `date_format` value. You can see more date formatting options available\
    \ to you at this link:\n\n`http://php.net/manual/en/function.date.php`\n\n###\
    \ More Fun with the Twitter API\n\nWe ended the last chapter by showing you how\
    \ to retrieve and display who a user follows on Twitter. Twitter gives you access\
    \ to a bunch of other goodies as well, so let’s see how we go about doing some\
    \ more. These other goodies include getting someone’s favorite Tweets, tweeting\
    \ something, sending someone a direct message, and a host of other things. As\
    \ usual, we’ve hacked up our sample app a bit to give you an idea of how to use\
    \ the APIs in `MGTwitterEngine` to access everything. If you run the Twitter sample\
    \ app for this chapter, you will see another tab entitled, “Tweetin” with a “Twitter”\
    \ button. Change the code in `TimelineViewController`’s `twitterButtonClick:`\
    \ method to experiment with the different requests that we discuss here. And on\
    \ with the show!"
