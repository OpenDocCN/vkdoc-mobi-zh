  trans: "\n### 关于内容的规则\n\nFacebook 的平台政策要求您对应用中的所有内容负责，*包括*用户生成的内容。这意味着您有责任在应用中实施监管（或创建监管机制，如“标记”功能），以确保您的用户不会向\
    \ Facebook 发布以下任何内容：\n\n- 与酒精相关的内容\n- 裸体内容\n- 与烟草相关的内容\n- 包含枪支或暴力画面的内容\n- 侵犯任何第三方权利（如知识产权）的内容\n\
    - 与赌博相关的内容\n- 非法竞赛，如金字塔骗局、抽奖或连锁信\n- 仇恨、威胁、诽谤或色情内容\n\n虽然 Facebook 在强制执行某些设计和功能条款时可能不会过于激进，但它对违反内容政策的行为实际上非常严格。众所周知，社区及其版主会标记并删除许多我们可能认为相当无辜的图片，例如母亲哺乳婴儿的照片。因此，请确保您的用户内容适合普通观众，否则将被迅速删除。\n\
    \n### 关于 Facebook 应用工作方式的其他奇怪规则\n\n在使用 Facebook API 时，您还需要牢记以下规则：\n\n- 除非用户特别要求创建此类帖子，否则不要预填充文本字段中的特定类型数据。禁止预填充字段的规则适用于动态消息故事（即`Facebook.streamPublish`和`FB.Connect.streamPublish`的`user_message`参数，以及`stream.publish`的`message`参数）、照片说明、视频描述、笔记、链接和\
    \ Jabber/XMPP。\n- 遵守 Facebook 对您选择广告合作伙伴的限制。批准的公司列表出现在 Facebook.com 的应用部分。\n-\
    \ 在用户授予您发布权限后，每次应用代表他发布内容时，您都必须征求用户的许可。\n- 您必须为用户提供一种明显的方式*跳过*同意 Facebook 社交渠道的条款。\n\
    - 您*不得*允许用户在您的应用中一次性发布多个帖子。\n- 您不得在广告中包含平台集成，包括点赞按钮等社交插件。如果您想这样做，必须获得 Facebook\
    \ 的书面许可。您可以通过此页面联系该公司：`http://developers.facebook.com/policy/contact/`\n- 不要将\
    \ Facebook 消息作为应用直接与用户通信的渠道；Facebook 消息（即发送到`@facebook.com`地址的电子邮件）是为用户之间的通信而设计的。\n\
    \n### 原则的实际应用\n\nFacebook 的规则似乎是由其希望阻止的非常具体的行为所驱动的。该公司的平台文档提供了数页带有视觉辅助的具体示例，解释了合规应用与不合规应用之间的区别。我们在此总结了\
    \ Facebook 关于合规性的观点，以便您快速理解并继续前进。\n\n#### 照片\n\n处理照片时，Facebook 有几项指南需要您遵循：\n\n\
    - 切勿让您的应用自动标记照片中的用户或其好友。\n- 仅在获得您代其进行标记的用户明确同意后，才能标记照片。此外，您必须仅在标记准确反映图像内容时才进行标记。换句话说，Facebook\
    \ 希望您仅标记您知道名字的人脸。\n- 不要连续标记一个人的一系列照片；您需要避免在其个人主页顶部产生*横幅*效果。\n\n#### 点赞按钮\n\n这里唯一意想不到的规则是，您不得因用户点赞您的页面而自动奖励他们。如果您想以某种方式奖励粉丝，您应该明确表示，点赞您的页面可以让新老粉丝有资格获得当前和未来的奖励；但是，奖励不能是即时或自动的。\n\
    \n#### 广告\n\nTwitter 和 Facebook 在广告方面的规则有显著差异。Twitter 有一系列非常具体的指南，涉及在您的应用中讨论其功能。例如，正如您将在第\
    \ 13 章中了解到的，其指南要求开发者在讨论 Twitter 内容时将单词\"Tweet\"首字母大写。\n\n相比之下，Facebook 的政策要求您完全避免使用\
    \ Facebook 的标志、商标和网站术语。Facebook 还非常坚决地表示，其网站功能不得在您的应用中模仿。换句话说，如果您的应用看起来太像 Facebook\
    \ 的资产，并且工作方式太像 Facebook.com（或[touch.facebook.com](http://touch.facebook.com)），您很可能会收到\
    \ Facebook 的通知。\n\n如果您想阅读 Facebook 广告指南的完整内容，请访问以下 URL：\n\n[`http://www.facebook.com/ad_guidelines.php`](http://www.facebook.com/ad_guidelines.php)\n\
    \n#### 使用社交动态流\n\nFacebook 还有几条规则规定了您如何与社交动态流进行交互。这里的重点是真实分享用户生成且经用户授权的内容：\n\n\
    - 您应该始终询问用户是否想发布动态故事，而不是自动这样做。此外，您只应在用户执行了可能与奖励相关的真实操作后，才提出此选项。\n- 您不得预填充与以下产品相关的任何字段（除非用户手动创建内容）：\n\
    \  - 动态故事（即`Facebook.streamPublish`和`FB.Connect.streamPublish`的`user_message`参数，以及`stream.publish`的`message`参数）\n\
    \  - 照片说明\n  - 视频说明\n  - 笔记\n  - 链接\n  - Jabber/XMPP\n\n#### 按钮文本\n\n以下是一些允许开发者使用的按钮文本示例：\n\
    \n- 发布\n- 分享\n- 发表\n- 添加到主页\n\n而在 Facebook 看来，以下是一些过于模糊、不适合整合到应用中的按钮文本示例：\n\n\
    - 忽略\n- 确定\n- 分享并继续\n- 请求\n\n### 应用展示\n\n既然我们已经花时间告诉您哪些应用不能构建，那么如果不向您展示一些（或多或少）在\
    \ Twitter 和 Facebook 平台范围内非常出色的应用，我们就会有所疏漏。虽然存在界限，但开发人员在这个沙盒中仍有足够的发挥空间。\n\n####\
    \ Twitter 应用\n\n在作者看来，使用 Twitter API 的最佳应用做到了以下几点：\n\n- 将 Twitter API 与您自己的（或其他）API\
    \ 相结合，为现有 Twitter 用户提供一种便捷的方式，为其现有 Twitter 服务增值。\n- 优先考虑（a）消费推文或（b）创建推文。例如，传统的\
    \ Twitter 客户端应用优先考虑时间线，并方便浏览其他用户的内容。然而，一个 RSS 阅读器可能根本不提供查看 Twitter 时间线的功能，而是只提供一个发布文章的推文按钮。\n\
    \n首先回顾本章前面提到的 Twitter 设计原则：\n\n- **不要给用户带来意外：** 不要滥用 Twitter 功能或术语。\n- **尊重用户隐私：**\
    \ 您需要使用适当的安全标准，例如`OAuth`。\n- **成为 Twitter 的好合作伙伴：** 您需要遵守本章描述的所有规则。\n\n以下是一些创造性地使用\
    \ Twitter API 并满足上述设计原则的应用示例。\n"
- fmt: '### Remember The Milk


    `Remember The Milk`（或简称为`RTM`）深受用户喜爱。这是一款生产力应用，利用Twitter集成（以及其他技巧）使其行为比简单的待办事项列表更灵活（参见[图11–1](#Chapter11.html#fig_11_1)）。


    ![images](images/1101.jpg)


    **Figure 11–1.** `Remember The Milk`将Twitter作为远程命令系统的基础。


    `RTM`使用推文和私信来创建并编辑托管在别处的待办事项列表中的项目。请注意，虽然推文和私信是Twitter的核心功能，但此处以新颖的方式使用，并与`RTM`开发者的其他后端软件结合。简而言之，这正是Twitter希望开发者创建的应用类型：它在现有的Twitter基础设施之上增加了一层新的实用性和功能性。


    #### 添加任务


    通过将`@RTM`添加为Twitter联系人，用户可以为自己的待办事项发推，并观察这些事项稍后出现在`Remember The Milk`的任务队列中。为了将项目（包括截止日期和其他任务属性）添加到待办事项列表，用户可以直接向`@RTM`发送包含纯文本任务的私信。以下是一些典型的示例消息：


    *   `“pick up the milk”`：将指定名称的新任务添加到待办事项列表。

    *   `“call jimmy at 5pm tomorrow”`：将指定名称和截止日期的新任务添加到待办事项列表。

    *   `“return library books in 2 weeks”`：将指定名称和截止日期的新任务添加到待办事项列表。

    *   `“take out the trash monday at 8pm *weekly #errand”`：将指定名称和截止日期的新任务添加到待办事项列表，同时将其标记为重复任务，并带有`#errand`标签。`RTM`将此功能称为*智能添加*（`Smart
    Add`）。


    #### 向其他Twitter用户发送任务


    你也可以使用`RTM`向其他Twitter用户发送任务。例如，发推`“@username pick up the milk”`会将任务发送给指定的Twitter用户名，前提是该用户也已注册`Remember
    The Milk`。


    #### 更新任务


    要修改已存在于待办事项列表中的任务，用户可以发推特`@RTM`命令，如下所示：


    *   `!complete` `call jimmy`（缩写：`!c`）：完成指定的任务。

    *   `!postpone` `call jimmy`（缩写：`!p`）：推迟指定的任务。


    你也可以获取新任务：


    *   `!today`（缩写：`!tod`）：获取今天到期的任务。

    *   `!tomorrow`（缩写：`!tom`）：获取明天到期的任务。

    *   `!getdue` `friday`（缩写：`!gd`）：获取指定日期（本例中为星期五）到期的任务。

    *   `!getlist` `personal`（缩写：`!gl`）：获取指定列表（本例中为个人）中的任务。

    *   `!gettag` `call`（缩写：`!gt`）：获取具有指定标签（本例中为`call`）的任务。

    *   `!getlocation` `office`（缩写：`!go`）：获取在指定位置（本例中为办公室）的任务。


    ### Evernote


    `Evernote`是一款非常流行的跨平台笔记应用，适用于iOS、Android、Mac、PC以及其他移动和桌面平台（参见[图11–2](#Chapter11.html#fig_11_2)）。


    ![images](images/1102.jpg)


    **Figure 11–2.** `Evernote`是一款跨平台笔记应用，允许你通过`@`回复`@MyEN`来提交笔记。


    `Evernote`使用Twitter的方式与`Remember The Milk`非常相似；然而，`Evernote`强调使用短信服务（SMS）作为访问Twitter的方式。由于Twitter可以将文本消息转换为推文，开发者经常利用此功能为应用增加通用的移动电话功能，这些应用在iOS生态系统之外可能会得到更广泛的采用。


    与`Remember The Milk`用户类似，`Evernote`用户可以撰写公开推文或直接向`@myEN`发送私信，将推文正文发送到`Evernote`笔记本（如图[图11–3](#Chapter11.html#fig_11_3)所示）。


    同样像`RTM`一样，`Evernote`使用推文和私信，如同其他应用；然而，`Evernote`的消息不会在用户的推文中添加任何内容。相反，他们利用机器人`@myEN`来决定如何处理和归档传入的笔记。结果是形成了一个看似神奇的系统，能够识别你的提交并正确归档。


    ![images](images/1103.jpg)


    **Figure 11–3.** 向`@MyEN`发推


    #### 短信笔记


    得益于Twitter内置的短信支持，`Evernote`用户可以在全球大多数国家通过移动手机向`Evernote`发送笔记。在美国，Twitter的短代码是`40404`。向`40404`发送包含命令`d
    myEN`的消息，会指示Twitter创建一条直接发送给`@myEN`的私信，就像从Twitter客户端操作一样。命令附带的文本将作为新笔记存入你的默认笔记本。


    ![images](images/1104.jpg)


    **Figure 11–4.** 通过Twitter的短信支持添加`Evernote`内容


    #### 添加TwitPics


    `Evernote`还使向绑定`Evernote`的推文中添加图片变得简单。为此，`Evernote`支持`TwitPic` URL。如果你撰写一条包含`TwitPic`
    URL的`@myEN`推文，`Evernote`中将会显示照片的缩略图，同时笔记正文中会包含一个指向全尺寸图片的`TwitPic`链接。


    ### Waze


    由于iOS没有预装逐向导航应用，提供驾驶导航的应用市场广阔。其中最好的一款是`Waze`，它采用了一种比某些竞争对手更趣味化的导航方法（参见[图11–5](#Chapter11.html#fig_11_5)）。`Waze`在你的高速公路地图上添加了一种游戏层，通过奖励积分来鼓励你报告事故、新道路、危险、测速摄像头以及其他不断变化的路况特征。


    ![images](images/1105.jpg)


    **Figure 11–5.** `Waze`是一款受欢迎的iOS交通应用，使用Twitter作为其通知基础设施。


    早期版本的`Waze`允许用户发布关于交通困境的推文，近乎实时地收集这些信息以创建动态路况地图。现在，`Waze`扫描Twitter上所有关于交通堵塞的数据，无论发推的人是否拥有`Waze`账户。这意味着，即使非`Waze`用户发推说自己被困在施工交通中，你的`Waze`应用也会在地图上显示该用户的警告（假设该用户在推文中附加了位置信息）。已经使用`Waze`的用户被鼓励使用标签`#wazelive`发布更新推文，以确保系统能够捕获它们。


    这就是Twitter所说的，应用应该努力利用从Twitter API获取的数据来构建新体验的含义。你无法在`Waze`的任何地方找到Twitter时间线或关注者/关注列表。相反，该应用利用搜索和消息功能，在你所在区域的交通中创建一个真实的Twitter用户地图。


    `Waze`还集成了Facebook和Foursquare的API，让你可以查看在你行驶区域是否有朋友。如果你愿意，还可以在应用内部签到你的目的地场所。


    ![images](images/1106.jpg)


    **Figure 11–6.** `Waze`用户界面，几乎看不出Twitter或Facebook API的痕迹。


    ### Facebook Apps


    制作一个集成Facebook API的有用应用比集成Twitter要困难一些，仅仅是因为Facebook的普及及其文档完善的API使其成为开发者非常热门的选择。尽管如此，仍有一些应用脱颖而出；即使它们并非完美无缺，也体现了Facebook所说的优秀API集成应具备的特质。


    让我们先回顾一下本章前面提到的Facebook设计原则：


    *   **构建社交性和参与性强的应用：** 换句话说，优先考虑与其他用户的沟通和互动。

    *   **给予用户选择和控制权：** 当某些内容将要发布或与他人分享时，务必充分告知用户。

    *   **帮助用户分享富有表现力和相关的内容：** 能够上传用户照片、视频和网络链接的应用被视为比不能这样做的应用更优秀。'
  raw: '##### Remember The Milk


    Remember The Milk (or RTM, as it''s abbreviated) gets a lot of love from its users.
    It''s a productivity app that uses Twitter integration (among other tricks) to
    make itself behave more flexibly than a simple to-do list (see [Figure 11–1](#Chapter11.html#fig_11_1)).


    ![images](images/1101.jpg)


    **Figure 11–1.** *Remember The Milk uses Twitter as a backbone for a kind of remote
    command system.*


    RTM uses Tweets and direct messages to create and edit items on a to-do list that
    is hosted elsewhere. Note that, while Tweets and direct messages are core Twitter
    functions, they are being used in a novel way and in conjunction with other backend
    software belonging to the RTM developers. In a nutshell, that''s the kind of app
    that Twitter prefers developers to create: it adds a new layer of usefulness and
    functionality on top of the existing Twitter infrastructure.


    ###### Adding Tasks


    By adding `@RTM` as a Twitter contact, users can Tweet to-do items for themselves
    and watch them appear later in in Remember The Milk''s task queue. To get items
    into their to-do list (along with due dates and other task properties), users
    direct message @RTM with their task in plain text. Here are some typical sample
    messages:


    *   “pick up the milk”: Adds a new task with that name to your to-do list.

    *   “call jimmy at 5pm tomorrow”: Adds a new task with the specified name and
    due date to your to-do list.

    *   “return library books in 2 weeks”: Adds a new task with the specified name
    and due date to your to-do list.

    *   “take out the trash monday at 8pm *weekly #errand”: Adds a new task with the
    specified name and due date. It also marks it as a repeating task with the `#errand`
    tag. RTM calls this *Smart Add*.


    ###### Sending Tasks to Other Twitter Users


    You can also use RTM to send tasks to other Twitter users. For example, tweeting
    “@username pick up the milk” sends the task to the specified Twitter username,
    assuming this user is also signed up for Remember The Milk.


    ###### Updating Tasks


    To modify tasks that already exist in your to-do list, users can Tweet `@RTM`
    commands like the following:


    *   `!complete` call jimmy (shortcut: `!c`)**:** Completes the specified task.

    *   `!postpone` call jimmy (shortcut: `!p`)**:** Postpones the specified task.


    You can also get new tasks:


    *   `!today` (shortcut: `!tod`)**:** Gets tasks due today.

    *   `!tomorrow` (shortcut: `!tom`)**:** Gets tasks due tomorrow.

    *   `!getdue` friday (shortcut: `!gd`)**:** Gets tasks due on the specified date—Friday,
    in this case.

    *   `!getlist` personal (shortcut: `!gl`)**:** Gets tasks from the specified list—personal,
    in this case.

    *   `!gettag` call (shortcut: `!gt`)**:** Gets tasks with the specified tag—call,
    in this case.

    *   `!getlocation` office (shortcut: `!go`)**:** Gets tasks at the specified location—the
    office, in this case.


    ##### Evernote


    Evernote is a very popular cross-platform note-taking app for iOS, Android, Mac,
    PC, and other mobile and desktop platforms (see [Figure 11–2](#Chapter11.html#fig_11_2)).


    ![images](images/1102.jpg)


    **Figure 11–2.** *Evernote is a cross-platform notetaking app that allows you
    to submit notes by at-replying `@MyEN`.*


    Evernote uses Twitter in much the same way that Remember The Milk does; however,
    Evernote emphasizes the use of SMS messaging as a way of accessing Twitter. Because
    Twitter can translate text messages into Tweets, it''s frequently used by developers
    as a way of adding universal mobile phone functionality to apps that might see
    especially broad adoption outside the iOS ecosystem.


    Like Remember The Milk users, Evernote users can compose a public Tweet or a direct
    message @myEN to have the body of the Tweet sent to an Evernote notebook (as seen
    in [Figure 11–3](#Chapter11.html#fig_11_3)).


    Also like RTM, Evernote uses Tweets and direct messages, just as any other app
    would; however, Evernote messages don''t add anything to the user''s Tweet. Instead,
    they use the bot `@myEN` to determine how to process and file incoming notes.
    The result is a seemingly magical system that recognizes your submissions and
    files them correctly.


    ![images](images/1103.jpg)


    **Figure 11–3.** *Tweeting @MyEN*


    ###### SMS notes


    Thanks to Twitter''s built-in SMS support, Evernote users can send notes to Evernote
    from mobile phones operating in most countries worldwide. In the United States,
    the Twitter short code is 40404. Composing a message to 40404 containing the command
    `d myEN` tells Twitter to create a direct message @myEN, just as you would from
    a Twitter client. The text accompanying the command is entered into a new note
    in your default notebook.


    ![images](images/1104.jpg)


    **Figure 11–4.** *Adding Evernote content via Twitter''s SMS support*


    ###### Adding TwitPics


    Evernote also makes it easy to append pictures to your Evernote-bound Tweets.
    To do this, Evernote supports TwitPic URLs. If you compose a Tweet @myEN that
    contains a TwitPic URL, a thumbnail of the photo will show up in Evernote, along
    with a TwitPic link in the body of the note that links to the full-sized image.


    ##### Waze


    Because iOS has no pre-loaded turn-by-turn navigation apps, apps that promise
    driving directions are an open market. One of the best of the lot is Waze, which
    takes a somewhat sillier approach to navigation than some of its competitors (see
    [Figure 11–5](#Chapter11.html#fig_11_5)). Waze puts a kind of game layer over
    your highway map, awarding you points as a way of encouraging you to report accidents,
    new roads, hazards, speed traps, and other ever-changing road features.


    ![images](images/1105.jpg)


    **Figure 11–5.** *Waze is a popular traffic app for iOS that uses Twitter as its
    notification infrastructure.*


    Prior iterations of Waze allowed users to Tweet their traffic woes, collecting
    them in near real-time to create a dynamic map of road conditions. Now, Waze scans
    all of Twitter''s data for traffic jam information, whether or not the person
    who composed the Tweet has a Waze account. This means that, even if a non-Waze
    user Tweets that he is stuck in construction traffic, your Waze app will show
    that person''s warning on a map (assuming the user attached his location to the
    Tweet). People who already use Waze are encouraged to Tweet their updates with
    the hash tag `#wazelive` to make sure the system catches it.


    This is what Twitter means when it says apps should strive to use data culled
    from the Twitter API to build new experiences. You won''t find a Twitter timeline
    or list of followers and followees anywhere in Waze. Instead, the app uses search
    and messaging to create a real-life map of Twitter users in traffic in your area.


    Waze also integrates Facebook and Foursquare APIs, letting you see if you have
    friends in the area you''re driving through. You can also check in at your destination
    venue from inside the app, if you''re so inclined.


    ![images](images/1106.jpg)


    **Figure 11–6.** *The Waze UI, which barely betrays any sign of the Twitter or
    Facebook APIs*


    #### Facebook Apps


    Making a useful app that integrates the Facebook API is somewhat harder than one
    that integrates with Twitter, if only because Facebook''s popularity and its well-documented
    APIs have made it such a popular choice with developers. Still, some apps stand
    out from the crowd; and even if they''re not perfect, they embody the things that
    Facebook says makes a great API integration.


    Let''s begin by reiterating the Facebook design principles from earlier in the
    chapter:


    *   **Build social and engaging applications:** In other words, prioritize communication
    and interaction with other users.

    *   **Give users choice and control:** Be sure to adequately inform the user when
    something is going to be posted or shared with others.

    *   **Help users share expressive and relevant content:** Apps that upload user
    photos, videos, and links from the Web are considered better citizens than those
    that don''t.'
