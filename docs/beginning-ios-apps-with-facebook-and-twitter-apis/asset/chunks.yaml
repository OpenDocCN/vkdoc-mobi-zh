    ### Conclusion


    We covered a lot of interesting areas within this chapter related to using the
    Facebook iOS SDK to obtain a user''s list of friends and MGTwitterEngine to obtain
    a user''s list of followers. Along the way, we took a closer look at what''s going
    on under the covers in each of these SDKs. We also went into some generally useful
    programming techniques for programming iOS apps in Objective-C.


    In the next chapter, we will build on this knowledge base to delve deeper into
    what''s going on under the covers and expand this chapter''s sample projects to
    show you how to use these SDKs to post information for users, as well as how to
    get more of their information.


    ## Chapter 7


    ## Accessing People, Places, Objects, and Relationships


    In this chapter, we’ll cover the nuts and bolts of Facebook methods, objects,
    properties, and connections—and how to get at them. We’ll also introduce JSON,
    or JavaScript Object Notifications, which are ancillary to the use of the Graph
    API. Finally, we’ll talk about retrieving basic data from Twitter’s REST (Representational
    State Transfer)^([1](#Chapter07.html#CH-7-FN-1)) API.


    You can find all of the code for this chapter in the [Chapter7](#Chapter07.html#ch7)
    directory of the Git repository. The Facebook code is in the `ApiFacebook` project,
    and the Twitter code is in the `ApiTwitter` project. These projects build off
    the same application structure that was introduced in the [Chapter 6](#Chapter06.html#ch6)’s
    sample projects; and once again, the projects aren’t pretty, but they get the
    job done.


    ### More Fun with the Facebook Graph API


    In the last chapter, we showed you how to pull information from Facebook’s social
    graph. As you did this, you were probably left wondering how to go about adding
    or posting information from your own app to Facebook’s social graph. Well, since
    we’re such nice guys, we’ve gone through the trouble of dedicating an entire section
    of this chapter to posting to the Facebook social graph. We’ve also added a thorough
    review of additional information that you can pull from the social graph, including
    how that information relates to authorization and extended permissions. Read on
    for the gory details.


    ___________


