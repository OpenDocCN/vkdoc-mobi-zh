    `TimelineViewController` uses `TwitterDataStore` to obtain and store the data
    that it displays, so let’s take a look at how `TwitterDataStore` uses Core Data
    to store and retrieve Tweets. Before `TwitterDataStore` can give us back Tweets,
    we have to give it some Tweets to store. `TwitterDataStore` stores Tweets in its
    `synchronizeTweets:` method, which takes an array of Tweets as its only argument.


    This synchronization method is a bit barbaric. The first thing that it does is
    delete any stored Tweets via `TwitterDataStore`’s `deleteTweets` method. It then
    loops through the Tweets that were passed in, creates a new Tweet for each one,
    initializes the Tweet’s data, and saves it to the Core Data model.


    Let’s look at this in more detail. Remember that MGTwitterEngine returns an array
    of Tweets and that each Tweet in the array is represented by an `NSDictionary`
    object of key/value pairs with all of the information about the Tweet. When we
    loop through the array of Tweets, we use a nice `for-loop` mechanism available
    in Objective-C:


    `for (NSDictionary *tweetDictionary in tweets) {`

    `}`


    In short, this `for-loop` says that we will execute the body of the `for-loop`
    for each of the elements in the `tweets` array. Each time the body of the `for-loop`
    is executed, the next element in the `tweets` array is stored in an `NSDictionary`
    object (since each element is an `NSDictionary`) entitled `tweetDictionary.` We
    can reference this element within the body of the `for-loop`.


    For each of the Tweets in the array, we create a new `Tweet` object via `NSEntityDescription`’s
    `insertNewObjectForEntityForName:inManagedObjectContext: method.` Passing `Tweet`
    as the entity name has Core Data create a new unpopulated instance of the `Tweet`
    class stored in the managed object context. We also supply our managed object
    context. Next, we set the value of the text attribute of the Tweet and the id
    value of the Tweet (note the use of `NSNumberFormatter` to convert an `NSString`
    object to an `NSNumber` object). As the final step, we tell the managed object
    context to save its state to disk. Failing to call save on the managed object
    context would result in no data being permanently stored in our Core Data model.
    Before exiting the method, we post a notification, so that other parts of our
    application can perform any necessary actions when all of the new Tweets are stored
    in the model (i.e., we update the user interface):


    `- (void)synchronizeTweets:(NSArray*)tweets`

    `{`

    `    NSAutoreleasePool *autoReleasePool = [[NSAutoreleasePool alloc] init];`


    `    @synchronized(self) {`

    `        [self deleteTweets];`


    `        for (NSDictionary *tweetDictionary in tweets) {`

