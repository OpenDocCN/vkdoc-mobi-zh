- fmt: "### Rules About Content\n\nFacebook's platform police hold you accountable\
    \ for all content in your app, *including* user-generated content. This means\
    \ you're responsible for policing (or creating a policing mechanism like a \"\
    flagging\" function) in your app to ensure that your users don't post any of the\
    \ following content to Facebook:\n\n- Alcohol-related content\n- Nudity\n- Tobacco-related\
    \ content\n- Content featuring firearms or graphic violence\n- Content that infringes\
    \ upon the rights of any third party (such as intellectual property rights)\n\
    - Gambling-related content\n- Illegal contests like pyramid schemes, sweepstakes,\
    \ or chain letters\n- Content that is hateful, threatening, defamatory, or pornographic\n\
    \nWhile Facebook might not be too aggressive in enforcing some of its design and\
    \ functionality terms, it's actually very strict about violations to its content\
    \ policy. The community and its moderators have been known to flag and remove\
    \ pictures many of us might find rather innocent, such as an image of a mother\
    \ breast-feeding her child. Still, keep your users' content PG or it will be quickly\
    \ removed.\n\n### Other Odd Rules About How Facebook Apps Must Work\n\nYou will\
    \ also want to keep the following rules in mind when working with Facebook APIs:\n\
    \n- Do not pre-fill your text fields with certain kinds of data, unless the user\
    \ specifically asks you to create this kind of post. Rules against pre-filling\
    \ fields apply to Stream stories (i.e., the `user_message` parameter for `Facebook.streamPublish`\
    \ and `FB.Connect.streamPublish`, as well as the message parameter for `stream.publish`),\
    \ photo captions, video descriptions, Notes, Links, and Jabber/XMPP.\n- Adhere\
    \ to Facebook's restrictions on your choice of advertising partners. A list of\
    \ approved companies appears within the Apps section of Facebook.com.\n- You must\
    \ ask a user for permission every time your app posts something on his behalf\
    \ after he grants you publishing permission.\n- You must provide users with an\
    \ obvious way to *skip* agreeing to the terms of a Facebook social channel.\n\
    - You must *not* give users the option to publish more than one post at a time\
    \ in your app.\n- You must not include platform integrations in your advertisements,\
    \ including social plugins such as the Like button. If you want to do this, you\
    \ have to get Facebook's written permission. You can contact the company on this\
    \ page: `http://developers.facebook.com/policy/contact/`\n- Do not use Facebook\
    \ messaging as a channel for your app to communicate directly with users; Facebook\
    \ messaging (i.e., email sent to an `@facebook.com` address) is designed for communication\
    \ between users.\n\n### The Principles in Action\n\nFacebook's rules seem to be\
    \ motivated by very specific behaviors it hopes to discourage. The company's platform\
    \ documentation provides pages and pages of specific examples with visual aids\
    \ that explain the difference between compliant and non-compliant apps. We've\
    \ summarized Facebook's ideas about compliancy here, so that you can digest them\
    \ quickly and move on.\n\n#### Photos\n\nFacebook has several guidelines you should\
    \ follow when working with photos:\n\n- Never have your app automatically tag\
    \ a user or her friends in a photo.\n- Tag a photo only with the expressed consent\
    \ of the user on whose behalf you are doing the tagging. Also, you must only tag\
    \ images when the tag accurately labels what is depicted in the image. In other\
    \ words, Facebook wants you to tag only human faces whose names you know.\n- Don't\
    \ tag a series of photos of a person in a row; you want to avoid creating a *banner*\
    \ effect at the top of her profile.\n\n#### The Like Button\n\nThe only unexpected\
    \ rule here is that you must not automatically reward users for Liking your Page.\
    \ If you want to reward people somehow for their fandom, you should make it clear\
    \ that Liking your page allows fans—both new and existing—to become eligible for\
    \ current and future rewards; however, the reward can't be immediate or automatic.\n\
    \n#### Advertising\n\nTwitter and Facebook rules diverge somewhat radically on\
    \ the subject of advertising. Twitter has a series of very specific guidelines\
    \ about discussing its features in your app. For example, as you'll learn in [Chapter\
    \ 13](#Chapter13.html#ch13), its guidelines ask that developers capitalize the\
    \ word Tweet when they discuss Twitter content.\n\nBy contrast, Facebook's policy\
    \ asks that you completely avoid Facebook logos, trademarks, and site terminology.\
    \ Facebook is also quite adamant that its site features must not be emulated in\
    \ your app. In other words, if your app looks too much like Facebook property\
    \ and works too much like Facebook.com (or [touch.facebook.com](http://touch.facebook.com)),\
    \ you'll probably hear from Facebook.\n\nIf you'd like to read Facebook's ad guidelines\
    \ in their entirety, visit this URL:\n\n[`http://www.facebook.com/ad_guidelines.php`](http://www.facebook.com/ad_guidelines.php)\n\
    \n#### Using the Social Stream\n\nFacebook also has several rules that govern\
    \ how you interact with the Social Stream. The emphasis here is on authentic sharing\
    \ of user-generated, user-authorized content:\n\n- You should always ask a user\
    \ whether he wants to publish a Feed story, rather than do it automatically. Also,\
    \ you should offer to do so only after the user has taken a genuine action that\
    \ may be associated with an award.\n- You must not pre-fill any of the fields\
    \ associated with the following products (unless the user manually creates the\
    \ content):\n  - Stream stories (i.e., the `user_message` parameter for `Facebook.streamPublish`\
    \ and `FB.Connect.streamPublish`, as well as the `message` parameter for `stream.publish`)\n\
    \  - Photo captions\n  - Video captions\n  - Notes\n  - Links\n  - Jabber/XMPP\n\
    \n#### Button Text\n\nHere are a few examples of button text that are permitted\
    \ for developers:\n\n- Post\n- Share\n- Publish\n- Add to Profile\n\nAnd here\
    \ are a few examples of button text that are too vague to incorporate into your\
    \ app, in Facebook's opinion:\n\n- Ignore\n- OK\n- Share & Continue\n- Request\n\
    \n### App Gallery\n\nNow that we've spent some time telling you what you cannot\
    \ build, we'd be remiss if we didn't show you some really excellent apps that\
    \ are (more or less) within the bounds of the Twitter and Facebook platforms.\
    \ There may be boundaries, but there's still plenty of space for developers to\
    \ play in this sandbox.\n\n#### Twitter Apps\n\nIn the authors' opinions, the\
    \ best apps that use the Twitter API do the following:\n\n- Combine Twitter's\
    \ API with your own (or another) API to provide existing Twitter users a convenient\
    \ way to add value to their existing Twitter service.\n- Prioritize either (a)\
    \ the consumption of Tweets or (b) the creation of Tweets. Traditional Twitter\
    \ client apps, for example, prioritize the timeline and make it easy to browse\
    \ through the content of other users. However, an RSS reader might have no provision\
    \ at all for viewing your Twitter timeline, opting instead to provide only one\
    \ button that Tweets an article.\n\nBegin by recalling the Twitter design principles\
    \ mentioned earlier in the chapter:\n\n- **Don't surprise users:** Don't misuse\
    \ Twitter functionality or terminology.\n- **Respect user privacy:** You need\
    \ to utilize proper security standards such as `OAuth`.\n- **Be a good partner\
    \ to Twitter:** You need to follow all the rules described in this chapter.\n\n\
    What follows are some apps that work creatively with the Twitter API and satisfy\
    \ the aforementioned design principles."
