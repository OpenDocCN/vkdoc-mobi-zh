- fmt: '### Fone


    `Fone` isn''t a perfect app, but it''s a relatively simple project that does something
    the Facebook app doesn''t excel at. `Fone` takes the instant messaging and voice
    calling feature from Facebook and puts it on the iPhone, creating a Facebook alternative
    to the system-standard Phone app (see [Figure 11–7](#Chapter11.html#fig_11_7)).
    (There is no voice calling from inside the official Facebook app.)


    ![images](images/1107.jpg)


    **Figure 11–7.** *Fone isn''t a perfect app, but it adds some value to the Facebook
    chat experience—in the form of voice calls—and more or less avoids looking too
    Facebook-like.*


    Because it''s meant to connect users with other users, this app adheres to Facebook''s
    usability principles. It also does a good job of using visual assets to communicate
    its function (see [Figure 11–8](#Chapter11.html#fig_11_8)). The blue colors harken
    back to Facebook, but the iconography lets people know that this app makes calls.
    Despite being a predominantly blue app, there isn''t much evidence of any Facebook
    branding here. The typography alone makes it rather clear to users that they aren''t
    inside a Facebook-branded app, as does the card interface (inspired no doubt by
    the preloaded iOS Weather app).


    ![images](images/1108.jpg)


    **Figure 11–8.** *Fone does a good job of communicating its function.*


    ### Flipboard


    `Flipboard` is a popular reader app for the iPad (see [Figure 11–9](#Chapter11.html#fig_11_9)).
    It operates under the supposition that much of the content you add to your Facebook
    profile or Twitter timeline comes from online sources like blogs, magazines, and
    the Social Graph. The app puts its focus on content, allowing you to read your
    RSS feeds, Facebook and Twitter news, and your favorite online magazines. It also
    makes it easy for people to take that content and share it with their network
    of friends.


    ![images](images/1109.jpg)


    **Figure 11–9.** *Flipboard, the popular news reader app for the iPad, integrates
    Facebook APIs nicely.*


    `Flipboard` allows users to post Status updates, Tweets, and photos from anywhere
    within the magazine (see [Figure 11–10](#Chapter11.html#fig_11_10)).


    ![images](images/1110.jpg)


    **Figure 11–10.** *Flipboard allows you to consume your Facebook news feed in
    a different format than any of the Facebook sites or apps.*


    `Flipboard`''s Founder and CEO, Mike McCue, made a succinct explanation of what
    makes a good social API project at the release of the latest iteration of the
    app, when he said^([2](#Chapter11.html#CH-11-FN-1)):


    > *“The people you''re connected to via your social networks are becoming curators
    of the news and information that matters to you, an important principle we are
    increasingly seeing in Flipboard. Many of our readers use Google Reader and Flickr
    for news and photos curated by people they trust. The full integration of these
    social networks takes us another step toward realizing our vision of a social
    magazine that puts everything you care about in one place.”*


    In other words, the `Flipboard` app isn''t just a one-way reader app. It allows
    you to consume and produce content in the same place, and do it around content
    you''re pulling in from elsewhere. In short, it''s apps like `Flipboard` that
    get fresh air into the Facebook arena and keep our news feeds from becoming mundane.


    ### Conclusion


    There are probably more rules around Twitter and Facebook API integration than
    you foresaw; some of them certainly surprised us. While you probably won''t incur
    any legal trouble from violating most of these rules, Twitter and Facebook will
    probably get in touch with you if you don''t follow their rules, asking that you
    redesign your app or lose access to their APIs. Since the preceding pages have
    been rather dense, we''ve produced a cheat-sheet that you can use while vetting
    ideas for your app.


    __________


    ² [`http://flipboard.com/press/flipboard-new-edition`](http://flipboard.com/press/flipboard-new-edition)


    First, here is a major rules cheat sheet for Twitter:


    *   Don''t use the Twitter API for purposes of monitoring the availability, performance,
    or functionality of any of Twitter''s products and services.

    *   Don''t use Twitter Marks in a manner that creates a sense of endorsement,
    sponsorship, or false association with Twitter.

    *   Use or access the Twitter API to aggregate, cache (except as part of a Tweet),
    or store place and other geographic location information contained in Twitter
    content.

    *   Don''t have your client frame or otherwise reproduce significant portions
    of the Twitter service. You should display Twitter content using the Twitter API.
    (i.e., don''t create new Twitter clients that operate like the Twitter app).

    *   Maintain the integrity of Tweets. There is a lot of information packed into
    Tweets, even though they are just 140 characters long. See [Chapter 13](#Chapter13.html#ch13)
    for Twitter Visual Design guidance.

    *   Always get permission before sending Tweets or other messages on a user''s
    behalf. The fact that a user authenticates through your application does not constitute
    consent to send a message on his behalf.

    *   Always display a privacy policy with your service. Clearly disclose what you
    are doing with information you collect from users.

    *   Clearly disclose when you are adding location information to a user''s Tweets,
    whether as a geotag or annotations data.

    *   Don''t use business names and/or logos in a manner that can mislead, confuse,
    or deceive users. For more information on the use of Twitter Marks, see the trademark
    rules later in this chapter.

    *   Give end users without a Twitter account the opportunity to create a new Twitter
    account.

    *   Only surface actions that are organically displayed on Twitter.

    *   Don''t let your advertisements resemble or be reasonably confused by users
    as a Tweet. For example, ads cannot have Tweet actions like ReTweet, Favorite,
    or Reply.


    And second, here is a major rules cheat sheet for Facebook:


    *   Focus on authentic sharing of user-generated, user-authorized content.

    *   Always ask users whether they want to publish a Feed story; don''t do so automatically.
    Also, offer to publish a story only after the user has taken a genuine action
    that may be associated with an award.

    *   Never pre-fill any of the fields associated with the following products, unless
    the user manually generated the content earlier in the workflow: Stream stories
    (the `user_message` parameter for `Facebook.streamPublish` and `FB.Connect.streamPublish`,
    as well as the `message` parameter for `stream.publish`), Photos (caption), Videos
    (description), Notes (title and content), or Links (comment).

    *   Don''t use Facebook messaging as a channel for applications to communicate
    directly with users.

    *   Don''t automatically reward users for Liking your Page. If you want to reward
    people somehow for their fandom, you should make it clear that Liking your Page
    allows fans—both new and existing—to become eligible for current and future rewards.

    *   Never have your app automatically tag a user or his friends in a photo.

    *   Tag a photo only with the expressed consent of the user on whose behalf you
    are doing the tagging. Note that you must only tag images where the tag accurately
    labels what is depicted in the image.

    *   Don''t provide users with the option to publish more than one Stream story
    at a time.


