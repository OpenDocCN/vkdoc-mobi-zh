  trans: "\n> *推特新增快捷栏（QuickBar）的原因，推测是为了展示带有“推广”标签的广告。*\n> \n> *如果它只展示这类广告，我认为用户的反应不会如此负面。更大的问题在于，它大部分时间都在展示随机“热门”话题或标签。以下是我在过去\
    \ 24 小时内看到的几个话题：*\n> \n> *洛瓦托与戈麦斯*\n> \n> *克里斯·布朗冠军专辑*\n> \n> *格斯·约翰逊*\n> \n>\
    \ *#关于我的 100 个事实*\n> \n> *狼獾队*\n> \n> *新势力（Cingular）*\n> \n> *全球移动通信系统（GSM）*\n\
    > \n> *#密歇根州*\n> \n> *它就像一个只显示单个词条的新闻滚动条，缺乏任何上下文，播放的大多是我不理解的话题。更糟糕的是，它出现在一个本应只包含我（间接）选择的内容的上下文中——我的推特时间线。*（我根据自己想在时间线上看到的内容选择了关注对象。）我对体育、名人或中学调查趋势不感兴趣，因此我不会关注那些用这些无关内容淹没我时间线的人。\n\
    > \n> *我选择关注的内容，以及……密歇根州。我甚至不知道这到底是什么意思。想必是发生了与密歇根州相关的新闻，而推特希望用户点击这个孤立无援的词语，原因却未向我们明确说明。*\n\
    > \n> *于是我点击了它。*\n> \n> *我从上到下看到了：有意的垃圾信息、无意的垃圾信息，以及一个陌生人关于体育的、我毫不在意的轻浮无聊推文。*（我往下滚动，情况更糟了。）我猜“#密歇根州”是热门话题，是因为密歇根州某支体育队发生了什么重要事件。\n\
    > \n> *我该拿这条信息怎么办？*\n> \n> *我应该就此发推文吗？如果是，界面为何不鼓励这样做？即使我从此屏幕点击（几乎看不见的）新推文按钮，我的推文也不会预填“#密歇根州”，因此我回应说的任何话都不会被收录其中。*\n\
    > \n> *我应该保存这个搜索吗（界面确实鼓励这样做），以便几天、几周或几个月后，当这个话题可能已不再连贯或有意义时还能看到？*（暂且不提它现在既不连贯也无意义。）\n\
    > \n> *我应该阅读这些推文吗？如果是，为什么没有采用更强的反垃圾信息措施或人工过滤机制来保持信息流的可读性？目前来看，它是一个巨大且极易被利用的垃圾信息目标，而且显而易见。*\n\
    > \n> *我们不知道推特添加快捷栏的真实原因。推测这是一个长期战略的一部分。但今天，从这里看来，它像一个考虑极其不周的功能，最初发布时实现得极其糟糕，似乎对用户没有任何益处。*\n\
    > \n> *这对我们来说如此刺眼，因为它与迄今为止我们熟知的推特太不一样了。推特的产品方向通常非常出色且深思熟虑，他们的实现通常是谨慎和周全的。*\n>\
    \ \n> *而在这个主要是由洛伦·布里希特在推特从他手中收购之前精心构建的应用背景下，我们习惯了布里希特更高的标准，这些标准曾让 Tweetie 在 2009\
    \ 年赢得苹果设计奖。*（我怀疑他在快捷栏的存在、设计或放置上几乎没有话语权，这大概让他内心备受煎熬。）\n> \n> *快捷栏令人反感，不是因为我们不希望推特通过广告赚钱，或者我们反对界面上的改变。*\n\
    > \n> *它令人反感，是因为它糟糕透顶，完全无视质量、产品设计和对用户的尊重，而我们对推特的期望远不止于此。*\n\n#### 来自网页应用的设计技巧\n\
    \n推特面向触摸的移动网页应用中，有一些方面让其原生 iOS 应用相形见绌。我们喜欢它呈现推文操作选项（如转发、回复和收藏）的方式，无需滑动推文。编写推文无需操作按钮也很酷：你只需放置光标并开始输入即可。图\
    \ 13–11 并排展示了移动网页应用（左）和原生 iOS 应用（右）。\n\n![images](img/1311.jpg)\n\n**图 13–11.**\
    \ *推特的移动网页应用（左）对比其 iOS 应用（右）*\n\n### 结论\n\n推特对规则和条例的热衷，作为其作为某种信息基础设施新兴角色的副产品，是可以理解的，尽管有些烦人。虽然这严重限制了你构建自己推特体验的方式，但也为那些不仅仅展示滚动时间线的应用开辟了可能性。不幸的是，这意味着一个好的推特\
    \ API 项目可能需要比洛伦·布里希特构建 Tweetie 1 时付出更多的汗水。\n\n接下来，我们将讨论 Facebook 的设计惯例。\n\n##\
    \ 第 14 章：Facebook 用户界面设计\n\nFacebook 应用是应用商店中最不寻常的应用之一；它也是全球最大社交网络在任何平台上功能最强大的客户端。如果它看起来像是\
    \ iPhone 中的 iPhone，那是因为 Facebook 平台与 iOS 一样强大。图 14–1 展示了 Facebook 应用类似 iOS 的网格界面。\n\
    \n![images](img/1401.jpg)\n\n**图 14–1.** *Facebook 是第一个在应用内重现 iOS “网格”界面的主要平台。*\n\
    \n### 可用性优先事项\n\nFacebook API 项目的优先事项应与推特项目略有不同。这些优先事项应包括：\n\n*   *查找人物*：用户在 Facebook\
    \ 上更频繁地查询其他用户，并且有更多信息需要呈现，因此应优先处理这些任务。\n*   *联系与被联系提醒*：Facebook 应用会为你发送最多九种提醒的推送通知和/或振动。相比之下，推特只有两种。Facebook\
    \ 是一个需要用户主动参与的应用，拥有非常活跃的用户群。这些用户习惯于及时收到通知并迅速沟通。图 14–2 展示了 Facebook 的推送通知选项。\n\n\
    ![images](img/1402.jpg)\n\n**图 14–2.** *Facebook 的推送通知偏好设置非常精细，允许用户之间快速互动。*\n\n\
    *   *为用户提供上下文*：Facebook 是一个非常强大的平台，许多应用仅复制了其网页应用的部分功能。这可能导致用户期望你的应用中存在一些不具备的任务。你可以通过为应用选择一个描述性的名称，并以用户能直观理解其功能的方式安排核心控件来改善这一点。这对于发布内容尤为重要：用户必须知道内容发布到何处以及谁会看到它。如有必要，可使用帮助提示；但应在应用内部使用，而不是像\
    \ MyPhone+ 那样作为弹出对话框使用（参见图 14–3）。需要说明的是，我们也不建议告诉用户在安装后重启。\n\n![images](img/1403.jpg)\n\
    \n**图 14–3.** *不要这样做。*\n\n#### 创建你自己的界面\n\n正如我们在第 11 章中讨论的，Facebook 的条款做出了以下规定（参见图\
    \ 14–4）：\n\n> “Facebook 站点功能不得被模仿。”¹\n\n如果你的应用看起来太像 Facebook，运行起来也太像 Facebook，你很可能会收到\
    \ Facebook 代表的警告。不过，你可能会感兴趣地发现，这样做的原因实际上对用户以及 Facebook 都有益。Facebook for iOS 的原始开发者乔·休伊特解释了\
    \ Facebook 的理由：\n"
- fmt: "> *The first version of the app did have the tab bar at the bottom, but I\
    \ took it out because I feel like Facebook is a platform in itself, and each of\
    \ the tabs were almost like apps in and of themselves that really called for use\
    \ of the full screen.*\n> \n> *I had to look forward; we have a lot of new apps\
    \ coming down the pipe, and I felt like the model Facebook works on lends itself\
    \ better to sort of being a ‘phone' in and of itself. Facebook has its own chat,\
    \ phone book, mail, photos, and applications, so squeezing it all into tabs made\
    \ it feel too limited. Going with this model—it's a home screen just like the\
    \ iPhone home screen—will let it grow and become full-featured. It also gives\
    \ us room to add more apps within our app.*\n> \n> *I haven't really seen other\
    \ apps that do [the grid], and I wouldn't really recommend that anyone else do\
    \ it. Facebook is kind of unique in its breadth and the amount of stuff people\
    \ do on it. I really hesitated to build in the grid for a while, but as I kept\
    \ moving things around and trying to make it all fit into the tab bar, I just\
    \ felt like this was the best solution. I was expecting more people to complain\
    \ about it, but it seems to have worked out pretty well.*\n> \n> *Economy [of\
    \ taps] is always a motivating factor, but the grid adds an extra tap [because\
    \ you need to press the grid button] versus the full-time tab bar. That was a\
    \ compromise I felt was necessary. There's always that balance between screen\
    \ clutter—adding tabs—and the number of taps.*\n> \n> *What went into creating\
    \ Facebook's view controllers?*\n> \n> *I did a lot of custom stuff. The app is\
    \ built on an open source framework I created called Three20, and it uses its\
    \ own view controllers, all of which I had to write. I had to try to reinvent\
    \ the Apple photo browsing app and the Apple Mail composing tool, among other\
    \ stuff.*[²](#Chapter14.html#CH-14-FN-2)\n\n_________\n\n¹[`http://developers.facebook.com/policy/`](http://developers.facebook.com/policy/)\n\
    \n## Facebook Loading Project³\n\nThis project shows how the Facebook app caches\
    \ old information and checks for available services before posting. Hewitt explained\
    \ it like this:\n\n> *Everything in the app works that way. There's a disk cache\
    \ so if you load events, notes, or requests, it's cached so when you go back to\
    \ the app, and we show the cached version. And as we show it, we try to load the\
    \ latest version. If it's a week old—or some number of days, I forget the exact\
    \ number—the app will just show you “loading” and clear the old stuff.*\n> \n\
    > *Before that system was in place, you were constantly looking at a little spinner\
    \ wherever you went—loading, loading, loading. I think it feels nicer to see something\
    \ right away that you can interact with while the new stuff is coming in.*\n\n\
    The code that follows is an excerpt of the Facebook app's disk cache framework,\
    \ which serves as a replacement for Cocoa's classes for fetching network data\
    \ (in this case, from Facebook's servers). Hewitt has written the Three20 framework\
    \ to allow the cache to be stored on disk. In Apple's framework, RAM would be\
    \ required. Here is the code itself:\n\n```\n- (NSData*)generatePostBody {\n \
    \ NSMutableData* body = [NSMutableData data];\n  NSString* beginLine = [NSString\
    \ stringWithFormat:@\"\\r\\n--%@\\r\\n\", kStringBoundary];\n\n  [body appendData:[[NSString\
    \ stringWithFormat:@\"--%@\\r\\n\", kStringBoundary]\n    dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \n  for (id key in [_parameters keyEnumerator]) {\n    NSString* value = [_parameters\
    \ valueForKey:key];\n    // Really, this can only be an NSString. We're cheating\
    \ here.\n    if (![value isKindOfClass:[UIImage class]] &&\n        ![value isKindOfClass:[NSData\
    \ class]]) {\n      [body appendData:[beginLine dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \      [body appendData:[[NSString\n        stringWithFormat:@\"Content-Disposition:\
    \ form-data; name=\\\"%@\\\"\\r\\n\\r\\n\", key]\n          dataUsingEncoding:_charsetForMultipart]];\n\
    \      [body appendData:[value dataUsingEncoding:_charsetForMultipart]];\n   \
    \ }\n  }\n\n  NSString* imageKey = nil;\n  for (id key in [_parameters keyEnumerator])\
    \ {\n    if ([[_parameters objectForKey:key] isKindOfClass:[UIImage class]]) {\n\
    \      UIImage* image = [_parameters objectForKey:key];\n      CGFloat quality\
    \ = [TTURLRequestQueue mainQueue].imageCompressionQuality;\n      NSData* data\
    \ = UIImageJPEGRepresentation(image, quality);\n\n      [self appendImageData:data\
    \ withName:key toBody:body];\n      imageKey = key;\n\n    } else if ([[_parameters\
    \ objectForKey:key] isKindOfClass:[NSData class]]) {\n      NSData* data = [_parameters\
    \ objectForKey:key];\n      [self appendImageData:data withName:key toBody:body];\n\
    \      imageKey = key;\n    }\n  }\n\n  for (NSInteger i = 0; i < _files.count;\
    \ i += 3) {\n    NSData* data = [_files objectAtIndex:i];\n    NSString* mimeType\
    \ = [_files objectAtIndex:i+1];\n    NSString* fileName = [_files objectAtIndex:i+2];\n\
    \n    [body appendData:[beginLine dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \    [body appendData:[[NSString stringWithFormat:\n                       @\"\
    Content-Disposition: form-data; name=\\\"%@\\\"; filename=\\\"%@\\\"\\r\\n\",\n\
    \                       fileName, fileName]\n          dataUsingEncoding:_charsetForMultipart]];\n\
    \    [body appendData:[[NSString stringWithFormat:@\"Content-Length: %d\\r\\n\"\
    , data.length]\n          dataUsingEncoding:_charsetForMultipart]];\n    [body\
    \ appendData:[[NSString stringWithFormat:@\"Content-Type: %@\\r\\n\\r\\n\", mimeType]\n\
    \          dataUsingEncoding:_charsetForMultipart]];\n    [body appendData:data];\n\
    \  }\n\n  [body appendData:[[NSString stringWithFormat:@\"\\r\\n--%@--\\r\\n\"\
    , kStringBoundary]\n                   dataUsingEncoding:NSUTF8StringEncoding]];\n\
    \n  // If an image was found, remove it from the dictionary to save memory while\
    \ we\n  // perform the upload\n  if (imageKey) {\n    [_parameters removeObjectForKey:imageKey];\n\
    \  }\n\n  TTDCONDITIONLOG(TTDFLAG_URLREQUEST, @\"Sending %s\", [body bytes]);\n\
    \  return body;\n}\n```\n\n_________\n\n²/iPhone Design Award-Winning Projects/\
    \ by Chris Dannen (Apress, 2009)\n\n![images](images/1404.jpg)\n\n**Figure 14–4.**\
    \ *Facebook would prefer that you not crib from its visual designs, but lots of\
    \ developers do it, anyway. This is yet another reason to avoid doing so yourself.*\n\
    \n### Themes and Icons\n\nAccording to Facebook, you're not supposed to mimic\
    \ Facebook visual design or its iconography. However, that obviously doesn't stop\
    \ many developers from doing exactly that. So what's a new Facebook developer\
    \ to do?\n\nIn our opinion, there are circumstances where a color scheme reminiscent\
    \ of Facebook's is highly appropriate. If your app is going to provide extensive\
    \ Facebook functionality (in addition to other stuff, of course), then it might\
    \ be instructive to users to be in an environment that smacks of (but doesn't\
    \ replicate) Facebook (see [Figure 14–5](#Chapter14.html#fig_14_5)).\n\n#### Third\
    \ Party Resources\n\n![images](images/1405.jpg)\n\n**Figure 14–5.** *If you must\
    \ take inspiration, consider Facebook's interaction design and its design conventions,\
    \ and try to pay homage to those.*\n\n[Figure 14–5](#Chapter14.html#fig_14_5)\
    \ shows a third-party set of Photoshop images. They're free to use. They're also\
    \ meant for Web designers, but don't let that stop you. These visual designs should\
    \ help you mock up your app or borrow certain aspects of the Facebook UI that\
    \ you like. Remember not to borrow too liberally because reproducing the Facebook\
    \ UI in your app is against the API's terms and conditions.\n\nYou can download\
    \ this free Facebook UI kit from Surgeworks at the following URL:\n\n[`http://surgeworks.com/blog/design/facebook-gui-free-psd-resource`](http://surgeworks.com/blog/design/facebook-gui-free-psd-resource)"
