    \ mandatory.*\n\n____________________________\n\n⁶ [`http://blog.twitter.com/2011/03/so-bar-walks-into-app.html`](http://blog.twitter.com/2011/03/so-bar-walks-into-app.html)\n\
    \n⁷ [`http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive`](http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive)"
  trans: "\n### 启动画面\n\n在当今快速加载应用的 iOS 设备上，启动画面并非必需。但你应在多代设备上测试应用。如果较旧的 iOS 设备出现卡顿，请尝试通过编程手段优化加载时间。若底层优化已无余地，可考虑为应用添加启动画面来欢迎等待中的用户。这既能消磨等待时间，也能让您展示品牌形象、留下良好第一印象。如果应用加载需要一两秒以上，建议快速跳过启动画面，转而呈现功能受限的应用界面视图。同时，持续显示应用正在加载信息的状态，并在网络连接中断时及时通知用户。\n\
    \n### 视觉素材（即例外情况）\n\n根据本章讨论的指南，图 13-10 所示的视觉指示器可供下载并允许在应用中使用。iOS 首选的 PNG 版本也以*精灵图*形式提供。要下载这些图形，请访问以下网址：\n\
    \n[`http://dev.twitter.com/pages/image-resources`](http://dev.twitter.com/pages/image-resources)\n\
    \n![images](img/1310.jpg)\n\n**图 13-10.** *Twitter 提供的精灵图，可供在您的应用中使用*\n\n### 项目命名指南\n\
    \nTwitter 整理了在命名项目时引用 Twitter 的注意事项，本节将进行说明。¹\n\n在命名项目并引用 Twitter 时，请遵循以下规范：\n\
    \n- 为网站、产品或应用取一个独特的名称。使用 *Tw-* 和 *Twit-* 前缀通常可以接受。\n- 可在网站上说明您的应用构建于 Twitter 平台之上，以便用户了解产品背景。\n\
    - 仅在应用专门为 Twitter 平台设计时，才可在名称中使用 *Tweet* 一词。\n\n*禁止*在命名项目并引用 Twitter 时出现以下行为：\n\
    \n- 在网站或应用名称中使用 *Twitter*。\n- 单独使用 *Tweet*，或将其与简单的字母/数字组合搭配（例如 *1Tweet*、*Tweet*\
    \ 或 *Tweets*）。\n- 注册包含 *twitter*（或其拼写变体）的域名。\n- 申请包含 *Twitter*、*Tweet* 或类似变体的商标。\n\
    - 如果应用与其他平台共用，则在名称中使用 *Tweet*。\n\n### 离线展示指南\n\n如果您正在开发某种 Twitter 可视化工具，或计划让应用通过\
    \ iPad 在更大屏幕上展示，则需遵循本节所述的离线展示要求。\n\n例如，允许以下操作：\n\n- 在推文播出期间，将 Twitter 徽标放置在推文附近。\n\
    - 确保 Twitter 徽标尺寸与内容比例合理。\n- 为每条推文附带用户名。若涉及用户隐私或播出标准问题，需联系 Twitter 申请例外（除非已与 Twitter\
    \ 达成事先协议）。\n- 使用推文的完整文本。若涉及隐私或播出标准问题，需联系 Twitter 申请例外（除非已与 Twitter 达成事先协议）。\n\n\
    同时，以下行为*禁止*：删除、遮盖或篡改用户身份标识。在涉及用户安全等特殊情况下，可匿名展示推文。允许以聚合或可视化形式展示无归属的数据，但必须保留 Twitter\
    \ 徽标。\n\n要查看 Twitter 的完整离线展示和媒体播出指南，请访问以下网址：\n\n[`http://support.twitter.com/entries/77641`](http://support.twitter.com/entries/77641)\n\
    \n### 通知处理\n\n直到 2011 年春季，官方 Twitter 应用对通知的处理仍较为保守：仅在收到 `@reply` 或私信时才会推送提醒。整体而言，作者们认为这恰恰是\
    \ Twitter 应用所需的全部通知功能。\n\n但在 2011 年 3 月，Twitter 推出了名为 *QuickBar* 的新功能，原设想为 Twitter\
    \ 编辑团队提供一种方式，将热门话题（或付费推广推文）展示在用户时间线顶部。然而，这反而引发了用户的强烈不满，被戏称为 *Dickbar*。\n\n对于一款堪称\
    \ iOS 设计典范的应用而言，这无疑是一个重大失误。各媒体纷纷批评 Twitter 的失策，舆论压力最终迫使该公司在后续更新中移除了 QuickBar。²\
    \ Mac 开发者 Marco Arment 在其博客上的反应尤为犀利，生动诠释了优秀 iOS 应用的核心要素：贯穿每个屏幕的清晰目标定位。\n\n请注意，在他批评文的结尾，他根据三个标准对\
    \ QuickBar 进行了评估：\n\n- 我是否应该转发这个内容？\n- 我是否应该保存这个搜索？\n- 我是否应该阅读这些推文？\n\n这些正是 Twitter\
    \ 的核心功能，因此任何使用 API 的功能都至少应与其中几个方面有所关联。以下是 Arment 博文的编辑版本：³\n\n> *Twitter 的官方 iPhone\
    \ 应用（前身为 Loren Brichter 开发的 Tweetie，原本是一款出色的客户端）因最近添加的 QuickBar 功能招致大量负面反馈。该功能是在推文列表顶部强制显示热门话题横幅。许多人对此深恶痛绝，称其为“Dickbar”，并因此彻底弃用\
    \ Twitter 应用。*\n> \n> *最初实现时，它作为浮动覆盖层出现在应用的所有操作界面之上，情况更糟。现在，它仅固定在主时间线顶部，并随列表滚动。但这仍然让大多数当初就反感它的人感到冒犯，因为让它随列表滚动并没有解决其强制存在且无法关闭的问题。*\n\
    \n¹ [`http://support.twitter.com/entries/77641`](http://support.twitter.com/entries/77641)\n\
    \n² [`http://blog.twitter.com/2011/03/so-bar-walks-into-app.html`](http://blog.twitter.com/2011/03/so-bar-walks-into-app.html)\n\
    \n³ [`http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive`](http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive)\n"
- fmt: "> *The reason Twitter added the QuickBar was, presumably, to be able to feature\
    \ ads, which show the “Promoted” badge.*\n> \n> *If it only ever showed ads like\
    \ this, I don't think the response would be so negative. The bigger problem is\
    \ that it's showing a random “trending” topic or hash-tag most of the time. Here\
    \ are a few of the topics I've seen in the last 24 hours:*\n> \n> *LovatoAndGomez*\n\
    > \n> *ChrisBrownFAMEAlbum*\n> \n> *Gus Johnson*\n> \n> *#100factsaboutme*\n>\
    \ \n> *Wolverines*\n> \n> *Cingular*\n> \n> *GSM*\n> \n> *#michigan*\n> \n> *It's\
    \ a news ticker limited to one-word items, lacking any context, broadcasting mostly\
    \ topics that I don't understand. What's worse is that it's shown in a context—my\
    \ Twitter timeline—that otherwise contains only content that I've (indirectly)\
    \ chosen to put there.* (I've chosen who to follow based on what I want to see\
    \ in my timeline.) I'm not interested in sports or celebrities or middle-school\
    \ survey trends, so I don't follow people who overwhelm my timeline with those\
    \ unwanted topics.\n> \n> *Content that I've chosen to follow, and... Michigan.\
    \ I don't even know what that's supposed to mean. Presumably, there's some bit\
    \ of news happening that's relevant to the state of Michigan, and Twitter wants\
    \ users to tap on this disembodied word for a reason that's not made clear to\
    \ us.*\n> \n> *So I tapped on it.*\n> \n> *I see, from top to bottom: intentional\
    \ spam, unintentional spam, and a random person's frivolous, meaningless tweet\
    \ about sports that I don't care about.* (I scrolled down and it only got worse.)\
    \ I guess \"#Michigan\" is a trending topic because something important happened\
    \ with a Michigan sports team.\n> \n> *What am I supposed to do with this information?*\n\
    > \n> *Am I supposed to tweet about it? If so, why doesn't the interface encourage\
    \ that? Even if I hit the (effectively invisible) New Tweet button from this screen,\
    \ my tweet isn't prepopulated with “#michigan”, so whatever I say in response\
    \ won't be included here.*\n> \n> *Am I supposed to save this search, which the\
    \ interface does encourage, so I can see this topic again in a few days or weeks\
    \ or months, when it's presumably no longer coherent or useful?* (Ignoring, for\
    \ the moment, that it's neither coherent nor useful now.)\n> \n> *Am I supposed\
    \ to read these tweets? If so, why haven't stronger anti-spam methods or human\
    \ filtering mechanisms been employed to keep the stream somewhat readable? As-is,\
    \ it's a huge and easily exploited spam target, and it shows.*\n> \n> *We don't\
    \ know Twitter's true reason for adding the QuickBar. Presumably, it's part of\
    \ a longer-term strategy. But today, from here, it looks like an extremely poorly\
    \ thought-out feature, released initially with an extremely poor implementation,\
    \ with seemingly no benefits to users.*\n> \n> *This is so jarring to us because\
    \ it's so unlike the Twitter that we've known to date. Twitter's product direction\
    \ is usually incredibly good and well-thought-out, and their implementation is\
    \ usually careful and thoughtful.*\n> \n> *And in the context of this app, most\
    \ of which was carefully and thoughtfully constructed by Loren Brichter before\
    \ Twitter bought it from him, we're accustomed to Brichter's even higher standards,\
    \ which won Tweetie an Apple Design Award in 2009.* (I suspect he had little to\
    \ no authority in the QuickBar's existence, design, or placement, and it's probably\
    \ killing him inside.)\n> \n> *The QuickBar isn't offensive because we don't want\
    \ Twitter making money with ads, or because we object to changes in the interface.*\n\
    > \n> *It's offensive because it's deeply bad, showing complete disregard for\
    \ quality, product design, and user respect, and we've come to expect a lot more\
    \ from Twitter.*\n\n#### Design Tricks from the Web App\n\nThere are some things\
    \ about Twitter's touch-oriented mobile Web app that put its native iOS app to\
    \ shame. We like the way it presents options to take Tweet actions (like Retweet,\
    \ Reply, and Favorite) without the need to slide aside the Tweet. It's also cool\
    \ that composing a Tweet requires no buttons to operate: you simply place the\
    \ cursor and start Tweeting. [Figure 13–11](#Chapter13.html#fig_13_11) shows the\
    \ mobile Web app (left) and the native iOS app (right) side-by-side.\n\n![images](images/1311.jpg)\n\
    \n**Figure 13–11.** *Twitter's mobile web app (left) compared to its iOS app (right)*\n\
    \n### Conclusion\n\nTwitter's zeal for rules and regulations is an understandable,\
    \ if annoying, byproduct of its emerging role as a kind of information infrastructure.\
    \ And while that has severely limited the way you can build your own Twitter experience,\
    \ it has also opened up the possibility for apps that do more than just display\
    \ a rushing timeline. Unfortunately, this means that a good Twitter API project\
    \ might involve more sweat equity than it did when Loren Brichter built Tweetie\
    \ 1.\n\nNext, we'll discuss Facebook design conventions.\n\n## Chapter 14: Facebook\
    \ UI Design\n\nThe Facebook app is one of the App Store's most unusual; it is\
    \ also the most capable client on any platform for the world's largest social\
    \ network. If it looks like an iPhone within an iPhone, it's because the Facebook\
    \ platform is just as formidable as iOS. [Figure 14–1](#Chapter14.html#fig_14_1)\
    \ shows the Facebook app's iOS-like grid UI.\n\n![images](images/1401.jpg)\n\n\
    **Figure 14–1.** *Facebook was the first major platform to reproduce the iOS “grid”\
    \ UI inside an app.*\n\n### Usability Priorities\n\nFacebook API projects should\
    \ have slightly different priorities than Twitter projects. Those priorities should\
    \ include the following:\n\n*   *Looking people up*: Users query other users more\
    \ frequently on Facebook, and there is more information to surface, so give these\
    \ tasks primacy.\n*   *Contacting and being alerted of contact*: The Facebook\
    \ app sends you a push notification and/or a vibration for up to nine alerts.\
    \ By contrast, Twitter does two. Facebook is a lean-forward app with a highly\
    \ active user base. These users are used to being notified promptly and communicating\
    \ with alacrity. [Figure 14–2](#Chapter14.html#fig_14_2) shows Facebook's Push\
    \ notification options.\n\n![images](images/1402.jpg)\n\n**Figure 14–2.** *Facebook's\
    \ Push notification preferences are quite granular and let users interact quickly\
    \ with each other.*\n\n*   *Giving users context*: Facebook is such a powerful\
    \ platform that many apps only reproduce select parts of the Web app's functionality.\
    \ This may lead users to expect some tasks that aren't present in your app. You\
    \ can ameliorate this by picking a descriptive name for your app and by arranging\
    \ core controls in a way that the user understands its functionality intuitively.\
    \ This is especially important to posting: users must know where an item is going\
    \ and who will see it. If you must, use help prompts; however, use them inside\
    \ the app, not as a pop-up dialog box, as the MyPhone+ does (see [Figure 14–3](#Chapter14.html#fig_14_3)).\
    \ For the record, we also don't recommend telling users to reboot after installing.\n\
    \n![images](images/1403.jpg)\n\n**Figure 14–3.** *Don't do this.*\n\n#### Create\
    \ Your Own UI\n\nAs we discussed in [Chapter 11](#Chapter11.html#ch11), Facebook's\
    \ terms make the following stipulation (see [Figure 14–4](#Chapter14.html#fig_14_4)):\n\
    \n> “Facebook site features cannot be emulated.”[¹](#Chapter14.html#CH-14-FN-1)\n\
    \nIf your app looks too much like Facebook and works too much like Facebook, you'll\
    \ probably hear from representatives of Facebook. However, you might be interested\
    \ to know that the reasons for this actually benefit the user, as well as Facebook.\
    \ Joe Hewitt, the original developer of Facebook for iOS, explained Facebook's\
    \ reasoning:"
