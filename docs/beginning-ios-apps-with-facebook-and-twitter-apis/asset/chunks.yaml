- fmt: '# Choose Your Weapon!


    Both Facebook and Twitter have multifarious uses, and many of them overlap. Figuring
    out which service to integrate (or which to integrate first) is the job of this
    chapter. Let''s dig in and see what Facebook and Twitter give us to work with.


    After reading this chapter, you should know the following:


    *   What you can do with Facebook''s iOS SDK and its Mobile Web SDK.

    *   How to make it easier to include Twitter''s API in iOS.


    ## What Are They Good For?


    Which integration you consider primary will have more to do with your specific
    app than anything else. However, there are some general considerations that come
    into play when deciding where to focus your energy. The more you know about Facebook
    and Twitter, the better you''ll be able to choose which one is right for your
    app (or whether—gasp!—you have to include both).


    ### Facebook


    Facebook has over 500 million registered users, 100 million of whom access Facebook
    from mobile devices. That''s a very big audience. If your app is going to rely
    on a platform for its ubiquity, then Facebook is the de facto first choice because
    of its incredible international popularity.


    That said, Facebook''s content (by the numbers) is mostly private photos. Facebook
    Photos is by far the most popular use of the platform, and some of the code supporting
    this feature on iOS is open source. Facebook statuses deal mostly with private
    thoughts, and its messaging system is used primarily for personal missives between
    members. Brands and corporations are present, but mostly in the form of fan pages
    that get most of their nods from the Like button.


    ### Twitter


    Twitter is a very different beast than Facebook. It has become the most important
    vector for breaking news, and much of what is said on Twitter is meant to be shared
    as quickly as possible. This is almost the opposite of the Facebook ecosystem,
    where elaborate privacy settings keep content from trickling out in an uncontrolled
    fashioned (at least, in principal). The vast majority of Twitter''s 65 million
    daily tweets are public, not private, and it generates so much content per day
    that it doesn''t have room to archive every tweet that passes through its system.
    (Facebook, in contrast, saves files and profiles even after users delete them.)
    About 190 million people use Twitter per month at the time of writing.


    **NOTE:** Startups like to throw around "user" statistics in the tens of millions,
    but what do these numbers really mean? We''ll start with Facebook. Facebook is
    virtually useless unless you''re registered and logged in. So when Facebook says
    it has half a billion users (and growing), it is referring to the number of people
    who have registered and entered some personal information into the system. Twitter,
    by contrast, is read by millions of *lurkers*, or people without profiles. At
    the time of writing, ComScore estimates that Twitter gets 83.6 million unique
    visitors a month worldwide, and about 24 million in the U.S., which are smaller
    numbers than Twitter reports. It''s also worth mentioning that, of those 65 million
    daily tweets, it''s unknown how many are automated bots or spammers. However you
    cut it, Facebook is a much, much larger service, but Twitter contains much more
    publicly accessible (and publicly valuable) information.


    ## Getting Started with Facebook''s Awesome Developer Tools


    Facebook has a special iOS SDK to help ease integration. Facebook likes to trumpet
    the fact that its SDK makes it easy to do single sign-on, so that users don''t
    have to log into your app every time they open it up. But there''s more to it
    than that. With Facebook''s iOS SDK, you can easily accomplish the following:


    *   Prompt users to log into Facebook and grant access permission to your application.

    *   Make requests to the Graph API and older REST API.

    *   Show users common Facebook dialogs for creating wall posts and more.

    *   On iOS devices that run a 4.× version of iOS and support multitasking, you
    can take advantage of Facebook''s single sign-on feature. This feature allows
    multiple applications to share a user''s Facebook login. In other words, if the
    user has already logged into Facebook from within the Facebook iOS application
    or a different application that is using the Facebook iOS SDK, then the user won''t
    be prompted to log into Facebook again from within your application if you are
    using the Facebook iOS SDK. You''ll learn more about this later in [chapter 5](#Chapter05.html#ch5).

    *   Facebook''s iOS SDK was built by Joe Hewitt, the company''s original mobile
    developer. He was kind enough to make most of his work open source, which is available
    on GitHub at [`https://github.com/facebook/facebook-ios-sdk`](https://github.com/facebook/facebook-ios-sdk).
    Facebook''s developer kit comes pre-loaded with some sample projects, but we''ll
    include more with this book that you can download online.


    In the following chapters, we''ll provide a more in-depth discussion of how to
    set up your iOS project in Xcode to use the Facebook and Twitter APIs; however,
    let''s first take a quick look at how the Facebook and Twitter APIs are used in
    actual code.


    ### Using Facebook''s API


    Now let''s take a look at how you use Facebook''s API. Begin by instantiating
    the `Facebook` object:


    ```

    Facebook* facebook = [[Facebook alloc] init];

    ```


    With the iOS SDK, you can do three main things:


    *   **Handle Authentication and Authorization:** Prompt users to log into Facebook
    and grant permissions to your application.

    *   **Make API Calls:** Fetch user profile data, as well as information about
    a user''s friends.

    *   **Display a Dialog:** Interact with a user via a `UIWebView`—this is useful
    for enabling quick Facebook interactions (such as publishing to a user''s stream)
    without requiring upfront permissions or implementing a native UI.


    #### Making API Calls


    The Facebook Graph API presents a simple, consistent view of the Facebook social
    graph, uniformly representing objects in the graph (e.g., people, photos, events,
    and fan pages) and the connections between them (e.g., friend relationships, shared
    content, and photo tags).


    You can access the Graph API by passing the Graph Path to the `request()` method.


    For example, this code enables you to access information about the logged-in user
    call:


    ```

    [facebook requestWithGraphPath:@"me" andDelegate:self];

    ```


    And this code enables you to obtain the logged-in user''s `friends` call:


    ```

    [facebook requestWithGraphPath:@"me/friends" andDelegate:self];

    ```


    Your delegate object should implement the `FBRequestDelegate` interface to handle
    your request responses. A successful request will call back `FBRequestDelegate`
    interface''s `request:didLoad:` in your delegate. The result passed to your delegate
    can be an `NSArray`, `NSString`, `NSDictionary`, or `NSNumber`, depending on the
    information that you requested and the format of its response.


    Advanced applications may want to provide their own custom parsing and/or error
    handling, depending on their individual needs.


    #### Displaying Dialogs


    This SDK provides a method for popping up a Facebook dialog. The currently supported
    dialogs are the login and permissions dialogs used in the authorization flow and
    a dialog for publishing posts to a user''s stream.


    Use this code to invoke a dialog to post a message to a user''s stream:


    ```

    [facebook dialog:@"feed" andParams:nil andDelegate:self];

    ```


    The preceding code allows you to provide basic Facebook functionality in your
    application with a single line of code—there''s no need to build native dialogs,
    make API calls, or handle responses. For further examples, refer to the included
    sample application.


    #### Error Handling


    Errors are handled by the `FBRequestDelegate` and `FBDialogDelegate` protocols.
    Applications can implement these protocols and specify behavior as necessary to
    handle any errors.'
