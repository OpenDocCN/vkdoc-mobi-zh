- fmt: '# Background Music, Location, and VOIP


    Apple has also made provisions for music, location-based, and VOIP apps to continue
    operations in the background while the user navigates through other apps. This
    means that music can continue playing, and “check-in” apps can be notified of
    a change of venue—even when the user is outside a music or location app. VOIP
    apps can deliver notifications (for incoming phone calls, for example), which
    makes telephony more robust, too.


    # SMS: Search and in-app SMSing


    Apple has created a new API with `iOS 4` that allows in-app SMS composition inside
    third-party apps. There''s no unified messaging service, as on other platforms,
    but Facebook''s new Messages service might serve as a stand-in.


    # More Powerful Photos and Calendars


    Apple has granted developers new access to the Calendar app, allowing third-party
    apps to create events inside a user''s calendar. Apple has also added developer
    access to the device''s entire photo and video library, not just the “image picker”
    available in the old OS.


    # New Camera and Flash


    The iPhone''s rear-facing camera now supports zoom and adjustable focus, and developers
    have also been given access to the front-facing camera that appears on new iPods
    and iPhones. Better yet, developers get full playback and recording access, as
    well as access to the LED flash.


    # Map Overlays


    Developers can add their own overlays to embedded Google Maps to show additional
    information (like directions or annotations) inside an app.


    # iAd


    Sure, iAd is tightly controlled by Apple, and the minimum buy-ins are tremendous.
    But iAd is an option in `iOS 4` nonetheless, giving developers the option of delivering
    interactive, aesthetically pleasing, and precise advertisements to users in `HTML5`.


    # Quick Look


    In Mac OS X, you can tap the spacebar in Finder to preview a file. The same ability
    has now been delivered to iOS developers, who can peek at files and attachments
    before deciding whether to open them in full.


    # Math APIs


    Games and location apps will benefit from a couple of thousand new hardware-accelerated
    math APIs that should boost graphics-intensive performance.


    # File Transfer


    The iPad has had the File Transfer feature for a while, but the other iOS devices
    now have the ability to transfer files between a computer and an iOS device inside
    iTunes.


    ## Summary


    There are a ton of new opportunities in `iOS 4`, as well as in the respective
    APIs of Facebook and Twitter. The audiences are massive: 500 million Facebook
    members and 130 million Twitter users—and both are growing. Whatever your iOS
    app can do, it can probably become more functional and more appealing with a social
    layer.


    The most crucial thing you can take way from this chapter is our advice to spend
    plenty of time using these services before you finish prototyping. Both of these
    services—but especially Facebook—have a lot of objects, properties, and interactions
    whose functions can get confusing. Knowing the way that users expect these resources
    to be used will help you design an app that works reliably and consistently.


    Once you''re done with this book, you''ll know exactly what to add to your app
    and how to build it. Now turn the page and get going!


    # Chapter 2


    # Privacy, Privacy, Privacy


    There was a time in the not-so-distant past when most people shared their life
    experiences via email or direct instant messaging (IM). With respect to privacy
    and security, it was a simpler time—users logged in directly to their email or
    IM accounts and sent links, pictures, and so on directly from their desktop or
    laptop to one or more specific recipients.


    As the Web has evolved, the ways in which users share information have become
    increasingly complex and interrelated; information has moved away from a user''s
    desktop and into the cloud. However, this added complexity and interrelatedness
    has resulted in a world where it is much harder to ensure privacy and security
    for individual users because there are more opportunities for a company or an
    individual with malicious intentions to gain access to a user''s credentials for
    one of his accounts.


    After reading this chapter, we hope you walk away with two salient lessons:


    - People are sharing more—and sharing more valuable information—with the *social
    graph*, which is Facebook''s term for your network of online friends.

    - Standards for security and privacy are changing.


    **NOTE:** Security and privacy should be handled with the utmost seriousness.
    Wisely or not, users entrust Facebook and Twitter with extremely sensitive and
    personal information. If your app puts their privacy or their interests at risk,
    they will hate you, pummel your app in the App Store reviews, and say terrible
    things about your mother. When working with Facebook and Twitter APIs, make the
    user''s privacy and security of utmost concern.


    ## The Old Way


    User-generated content now passes through more hands than ever, which increases
    the risk of somebody or something screwing up. Let''s look at a classic example:
    using an online service to print digital photos.


    In the past, a user would create an account on a photo-printing site, log in to
    her account, and upload photos from her desktop that she would like to have printed.
    From a privacy perspective in this scenario, the user only has to trust that the
    photo-printing site has the appropriate measures in place to prevent someone from
    hacking into its site and gaining usernames, passwords, personal photos, and even
    credit card information. But there are relatively few variables in this example:
    the only parties involved are the user and the photo-printing site.


    ## A Quick History of Hot-Button Issues


    Neither Facebook nor Twitter has escaped its share of privacy and security snafus
    in the last several years. While most of those concerns have been allayed, it
    helps to know a little bit of history, so you can identify any hot-button issues
    before you roll out your app.


    ### Facebook''s Track Record


    Perhaps the most salient privacy blunder in Facebook''s history was Facebook Beacon,
    an opt-out platform app built by Facebook that was intended to let users share
    what they are buying. Facebook was attacked for collecting user data without permission,
    and sharing this data with advertisers. Since the Beacon incident in 2007, numerous
    software services have created tools that let users share purchases with their
    social graph, including Swipely, Blippy, and Mint.com. All three of these companies
    repurpose that buyer data, although none have done so with the flippancy that
    Facebook did.


    Since Beacon, users, journalists and analysts have been ready to jump on any security
    loophole they can find in Facebook, and each successive disclosure of a problem
    leads to a rash of Facebook protests and campaigning.


    The lesson: It''s not necessarily what you do with users'' data that matters—it''s
    whether you make your service opt-in and ask permission at every step along the
    way. As subsequent Beacon-like services have proven, users are quite willing to
    experiment with their own privacy if they feel that the process is open and transparent.'
