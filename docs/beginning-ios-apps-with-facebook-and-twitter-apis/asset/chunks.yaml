  trans: "\n### 添加 UIViewController\n\n到目前为止，我们已经有一个非常简单的 iOS 应用，接下来按以下步骤向项目中添加 `UIViewController`：\n\
    \n1.  在 Xcode 项目的“组与文件”部分，右键点击 Shared 文件夹，从弹出菜单中选择**文件** > **新建…** 以显示新建文件窗口。\n\
    2.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 `Cocoa Touch Class`，然后在主体部分选择 `UIViewController`\
    \ 子类。\n3.  点击新建文件窗口上的“下一步”按钮，将文件命名为 `MainViewController.m`，再点击“完成”按钮保存文件并将其添加到项目中。\n\
    4.  在应用代理的头文件中，添加一个 `MainViewController` 对象。\n5.  在应用代理文件中，分配并初始化 `MainViewController`，并在\
    \ `application:didFinishLaunchingWithOptions:` 方法中将其视图作为主窗口的子视图添加。另外，别忘了在 `dealloc`\
    \ 中释放 `MainViewController` 对象。\n6.  在 Xcode 项目的“组与文件”部分，右键点击 Shared 文件夹，从弹出菜单中选择**文件**\
    \ > **新建…** 以显示新建文件窗口。\n7.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 `Cocoa Touch Class`，然后在主体部分选择\
    \ `Objective-C class`。务必在 `Subclass` 下拉菜单中选择 `UIView`。\n8.  点击新建文件窗口上的“下一步”按钮，将文件命名为\
    \ `MainView.m`，再点击“完成”按钮保存文件并将其添加到项目中。\n9.  最后，保存你最近的所有更改：\n\n```\n$ git add HelloFacebook.xcodeproj/project.pbxproj\n\
    $ git add MainViewController.*\n$ git add MainView.*\n$ git commit -m \"Add ViewController\
    \ and View\"\n```\n\n### 为 Facebook 创建应用\n\n为了通过 Facebook iOS SDK 使用 Facebook\
    \ 的服务，你需要在 Facebook 上注册你的应用并获取一个应用 ID，如图 4–3 所示。\n\n**注意：** 本书全程将使用我们为演示 Facebook\
    \ iOS SDK 用法而专门创建的一个应用 ID；但你需要自行前往 [`www.facebook.com/developers/createapp.php`](http://www.facebook.com/developers/createapp.php)\
    \ 获取自己的应用 ID。\n\n![images](img/0403.jpg)\n\n**图 4–3.** *获取 Facebook 应用 ID、密钥和键值*\n\
    \n我们终于可以开始使用 Facebook iOS SDK 了：\n\n在 Xcode 中，在你的应用代理头文件中声明一个 `Facebook` 对象，然后在代理的\
    \ `application:didFinishLaunchingWithOptions:` 方法中实例化该对象：\n\n```\nfacebook = [[Facebook\
    \ alloc] initWithAppId: @\"YOUR APP ID HERE\"];\n```\n\n1.  务必在应用代理的 `dealloc`\
    \ 方法中释放该对象：`[facebook release];`\n2.  将 `MainView` 设置为 `FBRequestDelegate`：\n\n\
    ```\n@interface MainView : UIView<FBRequestDelegate> {}\n@end\n```\n\n3.  在 `MainView`\
    \ 中实现 `FBRequestDelegate` 方法。这些方法在 Facebook iOS SDK 的 `FBRequest.h` 中定义：\n\n```\n\
    - (void)requestLoading:(FBRequest *)request\n- (void)request:(FBRequest *)request\
    \ didReceiveResponse:(NSURLResponse *)response\n- (void)request:(FBRequest *)request\
    \ didFailWithError:(NSError *)error\n- (void)request:(FBRequest *)request didLoad:(id)result\n\
    - (void)request:(FBRequest *)request didLoadRawResponse:(NSData *)data\n```\n\n\
    4.  向 Facebook 社交图谱发起请求。在这个简单示例中，我们将请求获取本书所创建的 Facebook 应用的信息：\n\n```\nNSString\
    \    *kFacebookID    = @\"114442211957627\";\n[facebook requestWithGraphPath:kFacebookID\
    \ andDelegate:self];\n```\n\n5.  结果将通过 `request:didLoad` 代理回调以 `NSDictionary`\
    \ 形式返回。我们将这个字典的描述输出到控制台日志以供查看：\n\n```\n{\n    id = 114442211957627;\n    link\
    \ = \"http://www.facebook.com/apps/application.php?id=114442211957627\";\n   \
    \ name = \"Beginning iOS Social Development\";\n}\n```\n\n该字典的内容如下：\n\n```\n{\
    \ id = 114442211957627;         link =\n\"http://www.facebook.com/apps/application.php?id=114442211957627\"\
    ;    name =\n\"Beginning iOS Social Development\"; }\n```\n\n大功告成！现在你的应用已经可以使用\
    \ Facebook iOS SDK 了。\n\n### Hello Twitter\n\n在本节中，我们将提供一个基本框架，用于搭建一个在 iOS 上使用\
    \ Twitter API 的应用。在撰写本文时，Twitter 还没有自己的 iOS SDK。不过，已经有不少开发者创建了 iOS 库，用 Objective-C\
    \ 代码封装了 Twitter API。本节将提供我们自认为其中最适合的一个库——`MGTwitterEngine`——的基础使用框架。\n\n**注意：**\
    \ 以下是关于我们选择 `MGTwitterEngine` 的一点历史背景。`MGTwitterEngine` 的原始版本托管在 Github 上，地址为\
    \ [`https://github.com/mattgemmell/MGTwitterEngine`](https://github.com/mattgemmell/MGTwitterEngine)。\n\
    \n我们并不满意 `MGTwitterEngine` 需要投入大量精力才能启动运行。不过，我们在 Github 上找到了一个我们认为更适合我们目的的 `MGTwitterEngine`\
    \ 分支版本，地址为 [`https://github.com/ctshryock/MGTwitterEngine`](https://github.com/ctshryock/MGTwitterEngine)。最棒的是：它开箱即用，只需少量配置即可。\n\
    \n再次启动 Xcode 和一个终端会话，让我们开始编写代码。或者，你也可以直接克隆本书的代码仓库，并在此网址自行浏览示例代码：\n\n```\n$ git\
    \ clone git@github.com:chrisdannen/Apress_iOSFacebookTwitter.Git\n```\n\n####\
    \ 创建项目\n\n打开 Xcode，在**文件**菜单下选择**新建项目…**，创建一个用于 Twitter 的项目。接下来，在**新建项目**弹出窗口中执行以下操作：\n\
    \n1.  在左侧边栏的 iOS 部分选择**应用程序**。\n2.  在主体部分选择**基于窗口的应用程序**。\n3.  在主体部分下方，从 `Product`\
    \ 下拉菜单中选择**通用**，并取消勾选 `使用 Core Data 存储`。\n4.  点击窗口底部的**选择…**按钮。\n5.  将项目保存为 `HelloTwitter`，保存在你选择的目录中。\n\
    \n创建好项目后，让我们通过 Git 做几件事来让后续工作更轻松。打开 Mac OS X 终端应用，执行以下命令：\n\n1.  将工作目录切换到保存 `HelloTwitter`\
    \ 应用的目录，并初始化一个新的 Git 仓库：`$ git init`\n2.  在同一目录下创建一个 Git 忽略文件（`.gitignore`）。Git\
    \ 忽略文件告诉 Git 在跟踪本地工作目录中的文件更改时忽略某些文件。\n3.  现在将项目中的所有文件添加到 Git 仓库：`$ git add *`\n\
    4.  通过提交更改到仓库来保存到目前为止所做的一切：`$ git commit -m \"Initial commit\"`\n5.  使用 Git 子模块将\
    \ Github 上的 `MGTwitterEngine` iOS Git 仓库链接到你的仓库，该子模块将位于名为 `MGTwitterEngine` 的子目录中：`$\
    \ git submodule add git://github.com/ctshryock/MGTwitterEngine.git MGTwitterEngine`\n\
    6.  保存你最近的所有更改：`$ git commit -m \"Add submodule to track MGTwitterEngine\"`\n"
- fmt: "### Adding the `MGTwitterEngine` Source Code\n\nNext, we're going to add the\
    \ `MGTwitterEngine` source code to our project, so that we can compile and link\
    \ the code with our project code. Let's set it up now:\n\n1.  Create a new Group\
    \ in your `HelloTwitter` project entitled `MGTwitterEngine`.\n2.  Using Xcode,\
    \ open the `MGTwitterEngine` Xcode project by choosing Open… from the Xcode File\
    \ menu. Navigate to the `MGTwitterEngine` submodule directory that we created\
    \ and select the `MGTwitterEngine.xcodeproj` file.\n3.  Select the Classes folder\
    \ in the `MGTwitterEngine` project and drag it to the `MGTwitterEngine` group\
    \ that you created in your `HelloTwitter` project. Next, select Add from the pop-up\
    \ dialog.\n4.  In the Classes folder that you just put in your project, delete\
    \ the Demo folder.\n5.  `MGTwitterEngine` uses libxml XML by default, so we need\
    \ to do a couple of additional steps so that our code will compile and link. In\
    \ future chapters, we'll show how to change `MGTwitterEngine` to get responses\
    \ in JSON format. For now, however, let's keep things simple:\n    1.  Add the\
    \ following path to your Header Search Path for your target: `/usr/include/libxml2`\
    \ (as pictured in Figure 4–4).\n\n        ![images](images/0404.jpg)\n\n     \
    \   **Figure 4–4.** *Adding the path `/usr/include/libxml2`*\n\n    2.  Next,\
    \ link your target to `libxml2.dylib`, as pictured in Figure 4–5.\n\n        ![images](images/0405.jpg)\n\
    \n        **Figure 4–5.** *Linking the target*\n\n6.  We modified our project\
    \ so let's save our changes:\n\n```\n$ git add HelloTwitter.xcodeproj/project.pbxproj\n\
    $ git commit -m \"Add MGTwitterEngine\"\n```\n\n### Add `UIViewController`\n\n\
    Up to this point, we've had a very simple iOS application, so let's add `UIViewController`\
    \ to our project by doing the following:\n\n1.  In the Groups & Files section\
    \ of the Xcode project, right-click the Shared folder and select File > New… from\
    \ the pop-up menu to display the New File window.\n2.  In the left sidebar of\
    \ the New File window, choose Cocoa Touch Class from the iOS section and then\
    \ choose `UIViewController` subclass in the main section.\n3.  Click the Next\
    \ button on the New File window, name the file `MainViewController.m`, and click\
    \ the Finish button to save the file and add it to the project.\n4.  In the application\
    \ delegate header file, add a `MainViewController` object.\n5.  In both application\
    \ delegate file, allocate and initialize the `MainViewController` and add its\
    \ view as a subview of the main window in the `application:didFinishLaunchingWithOptions:`\
    \ method. Also, don't forget to release the `MainViewController` object in `dealloc`.\n\
    6.  In the Groups & Files section of the Xcode project, right-click the Shared\
    \ folder and select File > New… from the pop-up menu to display the New File window.\n\
    7.  In the left sidebar of the New File window, choose Cocoa Touch Class from\
    \ the iOS section, and then choose Objective-C class in the main section. Be sure\
    \ to choose `UIView` in the Subclass option of drop-down menu.\n8.  Click the\
    \ Next button on the New File window, name the file `MainView.m`, and click the\
    \ Finish button to save the file and add it to the project.\n9.  Now save your\
    \ latest set of changes:\n\n```\n$ git add HelloTwitter.xcodeproj/project.pbxproj\n\
    $ git add MainViewController.*\n$ git add MainView.*\n$ git commit -m \"Added\
    \ ViewController and View\"\n```\n\n### Starting the Twitter Engine\n\nNow that\
    \ we're all set up, it's time to fire up Twitter inside your app. Follow these\
    \ steps to do so:\n\n1.  In Xcode, declare a `MGTwitterEngine` object in your\
    \ application delegate's header file, and then instantiate the object in your\
    \ delegate's `application:didFinishLaunchingWithOptions:` method: `mgTwitterEngine\
    \ = [[MGTwitterEnginealloc] initWithDelegate:self];`\n2.  Be sure to release the\
    \ object in your application delegate's `dealloc` method: `[mgTwitterEngine release];`\n\
    3.  Make your application delegate conform to `MGTwitterEngineDelegate`: `@interfaceAppDelegate\
    \ : NSObject<UIApplicationDelegate, MGTwitterEngineDelegate> {}`\n4.  Implement\
    \ the `MGTwitterEngineDelegate` methods in your application delegate. These are\
    \ defined in `MGTwitterEngineDelegate.h` in the `MGTwitterEngine` code:\n    -\
    \ `- (void)requestSucceeded:(NSString *)connectionIdentifier`\n    - `- (void)requestFailed:(NSString\
    \ *)connectionIdentifierwithError:(NSError *)error`\n    - `- (void)statusesReceived:(NSArray\
    \ *)statuses forRequest:(NSString *)connectionIdentifier`\n    - `- (void)directMessagesReceived:(NSArray\
    \ *)messages forRequest:(NSString *)connectionIdentifier`\n    - `- (void)userInfoReceived:(NSArray\
    \ *)userInfoforRequest:(NSString *)connectionIdentifier`\n    - `- (void)miscInfoReceived:(NSArray\
    \ *)miscInfoforRequest:(NSString *)connectionIdentifier`\n    - `- (void)socialGraphInfoReceived:(NSArray\
    \ *)socialGraphInfoforRequest:(NSString *)connectionIdentifier`\n    - `- (void)accessTokenReceived:(OAToken\
    \ *)token forRequest:(NSString *)connectionIdentifier`\n    - `- (void)imageReceived:(UIImage\
    \ *)image forRequest:(NSString *)connectionIdentifier`\n    - `- (void)connectionStarted:(NSString\
    \ *)connectionIdentifier`\n    - `- (void)connectionFinished:(NSString *)connectionIdentifier`\n\
    5.  Make a request of the Twitter social graph in MainView. For this simple example,\
    \ we are going to ask for information about Twitter's public timeline: `[mgTwitterEnginegetPublicTimeline];`\n\
    6.  The results will be returned in the `statusesReceived:forRequest:` delegate\
    \ callback in your application delegate as a `NSString` of XML. You can write\
    \ the description of this dictionary out to the console log for review:\n\n```\n\
    - (void)statusesReceived:(NSArray *)statuses forRequest:(NSString *)connectionIdentifier\n\
    {\n    NSLog(@\"Status received for connectionIdentifier = %@, %@\", connectionIdentifier,\n\
    [statuses description]);\n}\n```\n\nThat wasn't too painful, was it?\n\n### Now,\
    \ on to Security\n\nThere are various sources of documentation online to help\
    \ you get started with these frameworks, but we wanted to walk you through the\
    \ early phases step-by-step, to give you a sense of what you should prioritize.\
    \ In this chapter, we got set up on GitHub, added the Facebook iOS SDK, created\
    \ the guts of a Facebook app, and did the same for Twitter (with a little more\
    \ trouble). Now that you have the tools in place, you are pretty close to being\
    \ able to begin building your project. First, however, we'll need to take a quick\
    \ detour into the world of security. It's boring, maybe, but you'll thank us later.\n\
    \n## Chapter 5\n\n## Working Securely with OAuth and Accounts\n\nIn this chapter,\
    \ we'll explain what you'll need for your iOS app to handle user accounts securely;\
    \ we'll begin by discussing `OAuth`, an open source authentication protocol, and\
    \ then we'll talk about using HTTP with the `SSL/TSL` protocol, otherwise known\
    \ as `HTTPS`.\n\nBy the end of this chapter, you'll know how to deploy your nascent\
    \ app using the highest security standards. Even if you don't foresee your app\
    \ handling sensitive user information, we strongly suggest you read this chapter;\
    \ a secure foundation from the outset will keep your users happy and garner esteem\
    \ from the iOS engineering community.\n\nIf you are already familiar with `OAuth`\
    \ and just want to see it in action for Facebook and Twitter, you can view the\
    \ code in the Chapter5 folder in the Git repository.\n\nAfter reading this chapter,\
    \ you should know the following:\n\n*   How to handle user accounts securely.\n\
    *   How to create an iOS project that is ready for Facebook or Twitter functionality."
