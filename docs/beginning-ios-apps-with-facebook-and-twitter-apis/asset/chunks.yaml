- fmt: "#### `CoreLocation`\n\niOS 的 `CoreLocation` 框架设计精巧，易于集成到应用中。苹果 iOS 开发者网站上提供了大量关于该框架的信息；不过，我们将在此处介绍最重要的部分。我们还将展示一种将框架集成到应用中、以便轻松获取设备当前位置的方法。对于完全初学者来说，通读苹果关于\
    \ iOS 中位置定位的文档可能是个好主意；你可以通过以下 URL 找到名为“iOS Location Awareness Guide”的文档：\n\n`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009497`\n\
    \n在本章的示例应用中，有一个名为 `LocationController` 的新类，它存在于 `LocationController.h/.m` 中。我们设计这个类作为\
    \ iOS `CoreLocation` 框架的包装器或外观。我们这样做是为了实现以下几个目标：\n\n- 通过将 `CoreLocation` 的功能集中到应用中的一个类，使其更易于演示。\n\
    - 使代码在将来更易于维护，因为我们只需在一个类中针对 `CoreLocation` 进行修改。\n- 防止其他类单独使用 `CoreLocation`。\n\
    \n让我们看一下 `LocationController` 的头文件，了解它使用了哪些 `CoreLocation` 对象以及它的 API 是什么样的：\n\
    \n```\n#import <CoreLocation/CoreLocation.h>\n\n#ifdef FAKE_CORE_LOCATION\n@class\
    \ FTLocationSimulator;\n#endif\n@interface LocationController : NSObject <CLLocationManagerDelegate>\
    \ {\n#ifdef FAKE_CORE_LOCATION\n    FTLocationSimulator *locationManager;\n#else\n\
    \    CLLocationManager *locationManager;\n#endif\n    CLLocation *location;\n\
    \    CLHeading *heading;\n    BOOL inPowerSavingMode;\n}\n\n#ifdef FAKE_CORE_LOCATION\n\
    @property(nonatomic, retain)FTLocationSimulator *locationManager;\n#else\n@property(nonatomic,\
    \ retain)CLLocationManager *locationManager;\n#endif\n@property(nonatomic, retain)CLLocation\
    \ *location;\n@property(nonatomic, retain)CLHeading *heading;\n\n- (void)startWithPowerSaving:(BOOL)savingPower;\n\
    - (void)stop;\n- (BOOL)registerRegion:(CLLocationCoordinate2D)center;\n\n@end\n\
    ```\n\n`LocationController` 类的主要设计思路是它拥有并控制 `CLLocationManager` 的操作，后者是 `CoreLocation`\
    \ 中的主要类。`LocationController` 通过一个 `location` 属性（类型为 `CoreLocation` 的 `CLLocation`\
    \ 对象）提供当前的位置读数。`LocationController` 提供了启动和停止底层 `CoreLocation` 服务的方法，并在获得新位置信息时通知其委托。由于我们需要接收\
    \ `CLLocationManager` 的更新，`LocationController` 被声明为 `CLLocationManagerDelegate`。\n\
    \n启动 `LocationController` 时，你可以选择两种方法之一。首先，你可以启用省电模式启动，这使用 `CoreLocation` 的 `Significant\
    \ Change` 方法来确定位置。其次，你可以使用 `Standard` 方法。此外，`LocationController` 有一个方法用于注册一个区域供\
    \ `CoreLocation` 监控，我们稍后会讨论。我们确信你注意到了对 `FTLocationSimulator` 的引用，并且你可能想知道它是做什么的。`FTLocationSimulator`\
    \ 让你能够在 iOS 模拟器上生成位置读数，我们将在本节后面部分介绍这一点。\n\n让我们切换到 `LocationManager.m`，看看 `LocationController`\
    \ 的方法在做什么。`startWithPowerSaving:` 方法首先停止 `LocationController`，以防它已经启动。如果你愿意，你可以自行跟踪是否已启动了\
    \ `CoreLocation` 服务，并在服务已启动时立即退出此方法。如果 `CLLocationManager locationManager` 尚不存在，则创建它，并将\
    \ `LocationController` 设置为其委托。接下来，我们检查设备上是否启用了位置服务。请注意，在 iOS 4.0 中，这从名为 `locationServicesEnabled`\
    \ 的属性变为了同名方法，因此我们也对此进行了检查。\n\n如果位置服务已启用，我们根据 `savingPower` 参数的值，通过两种方式之一启动 `locationManager`。如果\
    \ `savingPower` 为 `YES`，我们通过 `startMonitoringSignificantLocationChanges` 方法启动\
    \ `locationManager`，并记录我们处于省电模式。如果 `savingPower` 为 `NO`，我们使用 `Standard startUpdatingLocation`\
    \ 方法，并配置所需的精度级别和距离过滤器。你可以在苹果的文档或头文件中阅读有关这些属性可用值的更多信息：\n\n```\n- (void)startWithPowerSaving:(BOOL)savingPower\n\
    {\n    [self stop];\n\n    if (nil == self.locationManager) {\n#ifdef FAKE_CORE_LOCATION\n\
    \        self.locationManager =\n                   [[[FTLocationSimulator alloc]\
    \ init] autorelease];\n#else\n        self.locationManager =\n               \
    \    [[[CLLocationManager alloc] init] autorelease];\n#endif\n    }\n\n    self.locationManager.delegate\
    \ = self;\n\n    //Available in 3.2 and later\n    self.locationManager.purpose\
    \ = @\"Big brother is watching.\";\n\n    BOOL locationServicesEnabled = NO;\n\
    \    if ([CLLocationManager\n            respondsToSelector:@selector(locationServicesEnabled)])\
    \ {\n        locationServicesEnabled =\n            [CLLocationManager locationServicesEnabled];\n\
    \    } else {\n        locationServicesEnabled =\n            self.locationManager.locationServicesEnabled;\n\
    \    }\n\n    if (locationServicesEnabled) {\n\n        inPowerSavingMode = NO;\n\
    \        if (savingPower\n            && [CLLocationManager respondsToSelector:@selector\n\
    \                  (significantLocationChangeMonitoringAvailable)]) {\n      \
    \      if ([self.locationManager respondsToSelector:@selector\n              \
    \    (startMonitoringSignificantLocationChanges)]) {\n                [self.locationManager\n\
    \                     startMonitoringSignificantLocationChanges];\n          \
    \      inPowerSavingMode = YES;\n            }\n\n        } else {\n         \
    \   self.locationManager.desiredAccuracy =\n                                 \
    \               kCLLocationAccuracyBest;\n            self.locationManager.distanceFilter\
    \ = kCLDistanceFilterNone;\n            [self.locationManager startUpdatingLocation];\n\
    \        }\n    }\n}\n```\n\n`LocationController` 的 `stop` 方法通过布尔值 `inPowerSavingMode`（我们在之前的\
    \ `startWithPowerSaving:` 方法中保存了此值）检查是否处于省电模式。然后，根据我们所处的模式，调用 `stopMonitoringSignificantLocationChanges`\
    \ 或 `stopUpdatingLocation`：\n\n```\n- (void)stop\n{\n    if (inPowerSavingMode\n\
    \        && [CLLocationManager respondsToSelector:@selector\n                (significantLocationChangeMonitoringAvailable)])\
    \ {\n        if ([self.locationManager respondsToSelector:@selector\n        \
    \        (stopMonitoringSignificantLocationChanges)]) {\n            [self.locationManager\n\
    \                stopMonitoringSignificantLocationChanges];\n        }\n    }\
    \ else {\n        [self.locationManager stopUpdatingLocation];\n    }\n}\n```\n\
    \n从 iOS 4.0 开始，`CoreLocation` 的 `CLLocationManager` 能够在设备进入或离开预定义的区域时，通过委托回调通知应用程序。这被称为区域监控。`LocationController`\
    \ 通过其 `registerRegion:` 方法支持区域监控，该方法指示 `CLLocationManager` 监控围绕单个中心点的指定区域，并在设备进入或离开该区域时通知应用程序。"
  raw: '#### CoreLocation


    IOS''s CoreLocation framework is a very well thought out framework that is relatively
    easy to incorporate into an application. There is a ton of information available
    on Apple''s iOS Developer site about the framework; however, we''ll run through
    the most important stuff here. We''ll also show one way of incorporating the framework
    into an application that makes it easy to get the device''s current location.
    For total beginners, a thorough reading of Apple''s documentation about location
    in iOS apps might be a good idea; you can find the documentation, entitled “iOS
    Location Awareness Guide,” at this URL:


    `http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009497`


    In the sample applications for this chapter, there is a new class entitled `LocationController`
    that exists within `LocationController.h/.m`. We have designed this class to act
    as a wrapper or façade for iOS''s `CoreLocation` framework. We''ve done this in
    order to accomplish several goals:


    *   Make it easier to demonstrate how CoreLocation works by having it within one
    class within our application.

    *   Make the code easier to maintain in the future since we will only have to
    make changes for CoreLocation in one class.

    *   Prevent other classes from having to use CoreLocation individually.


    Let''s take a look at the header for `LocationController` to see what CoreLocation
    objects it uses and what its API looks like:


    `#import <CoreLocation/CoreLocation.h>`


    `#ifdef FAKE_CORE_LOCATION`

    `@class FTLocationSimulator;`

    `#endif`

    `@interface LocationController : NSObject <CLLocationManagerDelegate> {`

    `#ifdef FAKE_CORE_LOCATION`

    `    FTLocationSimulator *locationManager;`

    `#else`

    `    CLLocationManager *locationManager;`

    `#endif`

    `    CLLocation *location;`

    `    CLHeading *heading;`

    `    BOOL inPowerSavingMode;`

    `}`


    `#ifdef FAKE_CORE_LOCATION`

    `@property(nonatomic, retain)FTLocationSimulator *locationManager;`

    `#else`

    `@property(nonatomic, retain)CLLocationManager *locationManager;`

    `#endif`

    `@property(nonatomic, retain)CLLocation *location;`

    `@property(nonatomic, retain)CLHeading *heading;`


    `- (void)startWithPowerSaving:(BOOL)savingPower;`

    `- (void)stop;`

    `- (BOOL)registerRegion:(CLLocationCoordinate2D)center;`


    `@end`


    The main idea behind the `LocationController` class is that it owns and controls
    the operation of a `CLLocationManager`, which is the primary class within CoreLocation.
    `LocationController` makes the current location reading available via a `location`
    property that is a `CoreLocation CLLocation` object. `LocationController` provides
    methods for starting and stopping the underlying CoreLocation service, and it
    notifies its delegate when it has new location information. Since we need to receive
    updates from `CLLocationManager`, the `LocationController` is declared as a `CLLocationManagerDelegate`.


    When starting the `LocationController`, you can elect to take one of two approaches.
    First, you can start it with power saving, which uses CoreLocation''s `Significant
    Change` method for determining location. Second, you can use the `Standard` method.
    Also, `LocationController` has a method for registering a region for CoreLocation
    to monitor, which we will discuss shortly. We''re sure that you noticed the references
    to `FTLocationSimulator,` and you''re probably wondering what it''s all about.
    `FTLocationSimulator` lets you generate location readings on the iOS simulator,
    which we will also be covering this later in this section.


    Let''s switch over to `LocationManager.m`, so we can take a look at what `LocationController''s`
    methods are doing. The `startWithPowerSaving:` method begins by stopping the `LocationController`,
    in case it has already been started. If you prefer, you could keep track of whether
    you''ve already started the CoreLocation services yourself and just exit this
    method immediately if it''s already started. If the `CLLocationManager locationManager`
    does not exist yet, it is created, and we set `LocationController` as its delegate.
    Next, we check to see if location services are enabled on the device. Note that
    this changed from a property named `locationServicesEnabled` to a method of the
    same name in iOS 4.0, so we check for this, as well.


    If location services are enabled, we start the `locationManager` in one of two
    ways, depending on the value of the `savingPower` parameter. If `savingPower`
    is `YES`, we start the `locationManager` via the `startMonitoringSignificantLocationChanges`
    method and store the fact that we are in power saving mode. If `savingPower` is
    `NO`, we use the `Standard startUpdatingLocation` method and configure our desired
    level of accuracy and distance filter. You can read more about the different values
    available for these properties in Apple''s documentation or header files:


    `- (void)startWithPowerSaving:(BOOL)savingPower`

    `{`

    `    [self stop];`


    `    if (nil == self.locationManager) {`

    `#ifdef FAKE_CORE_LOCATION`

    `        self.locationManager =`

    `                   [[[FTLocationSimulator alloc] init] autorelease];`

    `#else`

    `        self.locationManager =`

    `                   [[[CLLocationManager alloc] init] autorelease];`

    `#endif`

    `    }`


    `    self.locationManager.delegate = self;`


    `    //Available in 3.2 and later`

    `    self.locationManager.purpose = @"Big brother is watching.";`


    `    BOOL locationServicesEnabled = NO;`

    `    if ([CLLocationManager`

    `            respondsToSelector:@selector(locationServicesEnabled)]) {`

    `        locationServicesEnabled =`

    `            [CLLocationManager locationServicesEnabled];`

    `    } else {`

    `        locationServicesEnabled =`

    `            self.locationManager.locationServicesEnabled;`

    `    }`


    `    if (locationServicesEnabled) {`


    `        inPowerSavingMode = NO;`

    `        if (savingPower`

    `            && [CLLocationManager respondsToSelector:@selector`

    `                  (significantLocationChangeMonitoringAvailable)]) {`

    `            if ([self.locationManager respondsToSelector:@selector`

    `                  (startMonitoringSignificantLocationChanges)]) {`

    `                [self.locationManager`

    `                     startMonitoringSignificantLocationChanges];`

    `                inPowerSavingMode = YES;`

    `            }`


    `        } else {`

    `            self.locationManager.desiredAccuracy =`

    `                                                kCLLocationAccuracyBest;`

    `            self.locationManager.distanceFilter = kCLDistanceFilterNone;`

    `            [self.locationManager startUpdatingLocation];`

    `        }`

    `    }`

    `}`


    `LocationController`''s `stop` method checks to see if we are in power saving
    mode via the `boolean`, `inPowerSavingMode` (we saved this value earlier in our
    `startWithPowerSaving:` method). It then calls `stopMonitoringSignificantLocationChanges`
    or `stopUpdatingLocation`, depending on which mode we are in:


    `- (void)stop`

    `{`

    `    if (inPowerSavingMode`

    `        && [CLLocationManager respondsToSelector:@selector`

    `                (significantLocationChangeMonitoringAvailable)]) {`

    `        if ([self.locationManager respondsToSelector:@selector`

    `                (stopMonitoringSignificantLocationChanges)]) {`

    `            [self.locationManager`

    `                stopMonitoringSignificantLocationChanges];`

    `        }`

    `    } else {`

    `        [self.locationManager stopUpdatingLocation];`

    `    }`

    `}`


    As of iOS 4.0, CoreLocation''s `CLLocationManager` has the ability to notify an
    application via delegate callbacks when the device enters or leaves a pre-specified
    geographic region. This is known as *region monitoring*. `LocationController`
    supports region monitoring through its `registerRegion:` method, which directs
    `CLLocationManager` to monitor a specified region around a single center point
    and notify the application when the device enters or leaves the region.'
  trans: "\n#### `CoreLocation`\n\niOS 的 `CoreLocation` 框架设计精巧，易于集成到应用中。苹果 iOS 开发者网站上提供了大量关于该框架的信息；不过，我们将在此处介绍最重要的部分。我们还将展示一种将框架集成到应用中、以便轻松获取设备当前位置的方法。对于完全初学者来说，通读苹果关于\
    \ iOS 中位置定位的文档可能是个好主意；你可以通过以下 URL 找到名为“iOS Location Awareness Guide”的文档：\n\n`http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/LocationAwarenessPG/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009497`\n\
    \n在本章的示例应用中，有一个名为 `LocationController` 的新类，它存在于 `LocationController.h/.m` 中。我们设计这个类作为\
    \ iOS `CoreLocation` 框架的包装器或外观。我们这样做是为了实现以下几个目标：\n\n- 通过将 `CoreLocation` 的功能集中到应用中的一个类，使其更易于演示。\n\
    - 使代码在将来更易于维护，因为我们只需在一个类中针对 `CoreLocation` 进行修改。\n- 防止其他类单独使用 `CoreLocation`。\n\
    \n让我们看一下 `LocationController` 的头文件，了解它使用了哪些 `CoreLocation` 对象以及它的 API 是什么样的：\n\
    \n```\n#import <CoreLocation/CoreLocation.h>\n\n#ifdef FAKE_CORE_LOCATION\n@class\
    \ FTLocationSimulator;\n#endif\n@interface LocationController : NSObject <CLLocationManagerDelegate>\
    \ {\n#ifdef FAKE_CORE_LOCATION\n    FTLocationSimulator *locationManager;\n#else\n\
    \    CLLocationManager *locationManager;\n#endif\n    CLLocation *location;\n\
    \    CLHeading *heading;\n    BOOL inPowerSavingMode;\n}\n\n#ifdef FAKE_CORE_LOCATION\n\
    @property(nonatomic, retain)FTLocationSimulator *locationManager;\n#else\n@property(nonatomic,\
    \ retain)CLLocationManager *locationManager;\n#endif\n@property(nonatomic, retain)CLLocation\
    \ *location;\n@property(nonatomic, retain)CLHeading *heading;\n\n- (void)startWithPowerSaving:(BOOL)savingPower;\n\
    - (void)stop;\n- (BOOL)registerRegion:(CLLocationCoordinate2D)center;\n\n@end\n\
    ```\n\n`LocationController` 类的主要设计思路是它拥有并控制 `CLLocationManager` 的操作，后者是 `CoreLocation`\
    \ 中的主要类。`LocationController` 通过一个 `location` 属性（类型为 `CoreLocation` 的 `CLLocation`\
    \ 对象）提供当前的位置读数。`LocationController` 提供了启动和停止底层 `CoreLocation` 服务的方法，并在获得新位置信息时通知其委托。由于我们需要接收\
    \ `CLLocationManager` 的更新，`LocationController` 被声明为 `CLLocationManagerDelegate`。\n\
    \n启动 `LocationController` 时，你可以选择两种方法之一。首先，你可以启用省电模式启动，这使用 `CoreLocation` 的 `Significant\
    \ Change` 方法来确定位置。其次，你可以使用 `Standard` 方法。此外，`LocationController` 有一个方法用于注册一个区域供\
    \ `CoreLocation` 监控，我们稍后会讨论。我们确信你注意到了对 `FTLocationSimulator` 的引用，并且你可能想知道它是做什么的。`FTLocationSimulator`\
    \ 让你能够在 iOS 模拟器上生成位置读数，我们将在本节后面部分介绍这一点。\n\n让我们切换到 `LocationManager.m`，看看 `LocationController`\
    \ 的方法在做什么。`startWithPowerSaving:` 方法首先停止 `LocationController`，以防它已经启动。如果你愿意，你可以自行跟踪是否已启动了\
    \ `CoreLocation` 服务，并在服务已启动时立即退出此方法。如果 `CLLocationManager locationManager` 尚不存在，则创建它，并将\
    \ `LocationController` 设置为其委托。接下来，我们检查设备上是否启用了位置服务。请注意，在 iOS 4.0 中，这从名为 `locationServicesEnabled`\
    \ 的属性变为了同名方法，因此我们也对此进行了检查。\n\n如果位置服务已启用，我们根据 `savingPower` 参数的值，通过两种方式之一启动 `locationManager`。如果\
    \ `savingPower` 为 `YES`，我们通过 `startMonitoringSignificantLocationChanges` 方法启动\
    \ `locationManager`，并记录我们处于省电模式。如果 `savingPower` 为 `NO`，我们使用 `Standard startUpdatingLocation`\
    \ 方法，并配置所需的精度级别和距离过滤器。你可以在苹果的文档或头文件中阅读有关这些属性可用值的更多信息：\n\n```\n- (void)startWithPowerSaving:(BOOL)savingPower\n\
    {\n    [self stop];\n\n    if (nil == self.locationManager) {\n#ifdef FAKE_CORE_LOCATION\n\
    \        self.locationManager =\n                   [[[FTLocationSimulator alloc]\
    \ init] autorelease];\n#else\n        self.locationManager =\n               \
    \    [[[CLLocationManager alloc] init] autorelease];\n#endif\n    }\n\n    self.locationManager.delegate\
    \ = self;\n\n    //Available in 3.2 and later\n    self.locationManager.purpose\
    \ = @\"Big brother is watching.\";\n\n    BOOL locationServicesEnabled = NO;\n\
    \    if ([CLLocationManager\n            respondsToSelector:@selector(locationServicesEnabled)])\
    \ {\n        locationServicesEnabled =\n            [CLLocationManager locationServicesEnabled];\n\
    \    } else {\n        locationServicesEnabled =\n            self.locationManager.locationServicesEnabled;\n\
    \    }\n\n    if (locationServicesEnabled) {\n\n        inPowerSavingMode = NO;\n\
    \        if (savingPower\n            && [CLLocationManager respondsToSelector:@selector\n\
    \                  (significantLocationChangeMonitoringAvailable)]) {\n      \
    \      if ([self.locationManager respondsToSelector:@selector\n              \
    \    (startMonitoringSignificantLocationChanges)]) {\n                [self.locationManager\n\
    \                     startMonitoringSignificantLocationChanges];\n          \
    \      inPowerSavingMode = YES;\n            }\n\n        } else {\n         \
    \   self.locationManager.desiredAccuracy =\n                                 \
    \               kCLLocationAccuracyBest;\n            self.locationManager.distanceFilter\
    \ = kCLDistanceFilterNone;\n            [self.locationManager startUpdatingLocation];\n\
    \        }\n    }\n}\n```\n\n`LocationController` 的 `stop` 方法通过布尔值 `inPowerSavingMode`（我们在之前的\
    \ `startWithPowerSaving:` 方法中保存了此值）检查是否处于省电模式。然后，根据我们所处的模式，调用 `stopMonitoringSignificantLocationChanges`\
    \ 或 `stopUpdatingLocation`：\n\n```\n- (void)stop\n{\n    if (inPowerSavingMode\n\
    \        && [CLLocationManager respondsToSelector:@selector\n                (significantLocationChangeMonitoringAvailable)])\
    \ {\n        if ([self.locationManager respondsToSelector:@selector\n        \
    \        (stopMonitoringSignificantLocationChanges)]) {\n            [self.locationManager\n\
    \                stopMonitoringSignificantLocationChanges];\n        }\n    }\
    \ else {\n        [self.locationManager stopUpdatingLocation];\n    }\n}\n```\n\
    \n从 iOS 4.0 开始，`CoreLocation` 的 `CLLocationManager` 能够在设备进入或离开预定义的区域时，通过委托回调通知应用程序。这被称为区域监控。`LocationController`\
    \ 通过其 `registerRegion:` 方法支持区域监控，该方法指示 `CLLocationManager` 监控围绕单个中心点的指定区域，并在设备进入或离开该区域时通知应用程序。\n"
- fmt: "### Using `CLLocationManager`\n\nNext, we'll go over how to use `CLLocationManager`.\
    \ First, we need to see if this feature is available. If it is, then we set the\
    \ radius of the region we want to monitor; create the region to monitor with the\
    \ center point, radius, and name; and finally, hand it off to `CLLocationManager`\
    \ to monitor via its `startMonitoringForRegion:desiredAccuracy:` method. The `desiredAccuracy`\
    \ value controls the size of the buffer around the edge of the region's boundary\
    \ that `CLLocationManager` uses to determine if the device has left and reentered\
    \ a region. Monitoring regions can be a really useful way to incorporate some\
    \ nice features into your app, such as automatically checking in a user to certain\
    \ places:\n\n```\n- (BOOL)registerRegion:(CLLocationCoordinate2D)center\n{\n    //\
    \ Check to see if support is available\n    if (![CLLocationManager regionMonitoringAvailable]\
    \ ||\n        ![CLLocationManager regionMonitoringEnabled] )\n        return NO;\n\
    \n    CLLocationDegrees radius =\n                 self.locationManager.maximumRegionMonitoringDistance;\n\
    \n    // Create the region and start monitoring it.\n    CLRegion *region = [[CLRegion\
    \ alloc]\n                            initCircularRegionWithCenter:center\n                                                  radius:radius\n\
                                                  identifier:@\"test\"];\n    [self.locationManager\
    \ startMonitoringForRegion:region\n    desiredAccuracy:kCLLocationAccuracyNearestTenMeters];\n\
    \n    [region release];\n\n    return YES;\n}\n```\n\nWhen the `CLLocationManager`\
    \ acquires a location reading that falls within the criteria for its current mode\
    \ of operation, it notifies its delegate via `CLLocationManagerDelegate`'s `locationManager:didUpdateToLocation:fromLocation:`\
    \ method. When this delegate method is called, we save the current location reading\
    \ in our own `location` property, so that any other parts of our application can\
    \ access the device's current location reading:\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    self.location = newLocation;\n}\n```\n\nIf there was a\
    \ problem initializing the location services, `CLLocationManagerDelegate`'s `locationManager:didFailWithError:`\
    \ method is called:\n\n```\n- (void)locationManager:(CLLocationManager *)manager\n\
           didFailWithError:(NSError *)error\n{\n    NSLog(@\"didFailWithError\");\n\
    }\n```\n\nWhen the device enters or leaves a designated region, `CLLocationManagerDelegate`'s\
    \ `locationManager:didEnterRegion:` and `locationManager:didExitRegion:` methods\
    \ are called:\n\n```\n- (void)locationManager:(CLLocationManager *)manager\n         didEnterRegion:(CLRegion\
    \ *)region\n{\n    NSLog(@\"didEnterRegion\");\n}\n\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n          didExitRegion:(CLRegion *)region\n{\n    NSLog(@\"didExitRegion\"\
    );\n}\n\n- (void)locationManager:(CLLocationManager *)manager\nmonitoringDidFailForRegion:(CLRegion\
    \ *)region\n              withError:(NSError *)error\n{\n    NSLog(@\"monitoringDidFailForRegion\"\
    );\n}\n```\n\nAs of iOS 4.2, `CLLocationManager` can also notify its delegate\
    \ if the authorization status for the application was changed by the user via\
    \ the main Settings application on the device:\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n        didChangeAuthorizationStatus:(CLAuthorizationStatus)status\n\
    {\n    NSLog(@\"didChangeAuthorizationStatus\");\n}\n```\n\nBefore we move onto\
    \ other topics, it's worth mentioning location services on iOS and backgrounding.\
    \ Note that the `Significant Change` method will periodically wake up your app\
    \ and provide location updates. If you are using the `Standard` location method,\
    \ then you will have to set some values in your application's `plist`. You can\
    \ find more information on this in Apple's \"iOS Location Awareness Guide,\" which\
    \ we referred you to earlier in this chapter.\n\nOne final note: When using CoreLocation\
    \ in your application, you have to link your application against the CoreLocation\
    \ framework (see [Figure 9–16](#Chapter09.html#fig_9_16)).\n\n![images](images/0916.jpg)\n\
    \n**Figure 9–16.** *Linking against the CoreLocation framework when using CoreLocation*\n\
    \n### Generating Locations in the iOS Simulator\n\nAlthough Apple has done an\
    \ outstanding job with its CoreLocation framework, one glaring omission was the\
    \ ability to generate a sequence of location updates in the iOS simulator. With\
    \ iOS 5, Apple has added location simulation so that developers can test location-aware\
    \ apps without needing to leave their desks. In the event that Apple's solution\
    \ doesn't satisfy, here are two alternative ways to test location apps within\
    \ the developer environment: iSimulate and FTLocationSimulator. These solutions\
    \ are very different in their approaches, so we're going to give a quick run-through\
    \ on how to get set up with them and how they work.\n\n#### iSimulate\n\nYou can\
    \ acquire iSimulate at the following URL:\n\n`www.vimov.com/isimulate/`\n\nThe\
    \ iSimulate app runs on your actual iOS device and allows you to interact with\
    \ an application running in the iOS Simulator on your desktop. Most importantly,\
    \ it also lets you share the location of your device with the Simulator. You can\
    \ find a free Lite version of the app in iTunes at this URL:\n\n`http://itunes.apple.com/us/app/isimulate-lite/id351339630?mt=8`\n\
    \nTo get up and running with iSimulate, you also have to configure a few things\
    \ in your application's project in Xcode:\n\n1.  First, download the latest version\
    \ of the iSimulate SDK from [`www.vimov.com/isimulate/sdk/`](http://www.vimov.com/isimulate/sdk/).\n\
    2.  Now add the iSimulate library's `.a` file (at the time of writing, this is\
    \ called `libisimulate-4.x-opengl.a`) to your application target's Frameworks\
    \ (see [Figure 9–17](#Chapter09.html#fig_9_17)).\n\n    ![images](images/0917.jpg)\n\
    \n    **Figure 9–17.** *Link against the iSimulate library file.*\n\n3.  Next,\
    \ link your application against the OpenGLES framework (see [Figure 9–18](#Chapter09.html#fig_9_18)).\n\
    \n    ![images](images/0918.jpg)\n\n    **Figure 9–18.** *Link against OpenGLES\
    \ when using iSimulate.*\n\n4.  Finally, add an additional `-ObjC` linker flag\
    \ to your application target under Build Settings (see [Figure 9–19](#Chapter09.html#fig_9_19)).\n\
    \n    ![images](images/0919.jpg)\n\n    **Figure 9–19.** *Set additional linker\
    \ flags when using iSimulate.*\n\nAll of this information is also available here:\n\
    \n`www.vimov.com/isimulate/documentation/`\n\nNow that we have configured iSimulate,\
    \ it's time to put it into action. On your device, make sure that you are on the\
    \ same WiFi network as the machine that you are running the iOS Simulator on,\
    \ and then start iSimulate. You should see a screen like the one shown in [Figure\
    \ 9–20](#Chapter09.html#fig_9_20).\n\n![images](images/0920.jpg)\n\n**Figure 9–20.**\
    \ *iSimulate on iOS*\n\nNow run your application in the iOS Simulator, and the\
    \ iSimulate application on your device will detect that the application is running\
    \ and let you link with it on your device (see [Figure 9–21](#Chapter09.html#fig_9_21)).\n\
    \n![images](images/0921.jpg)\n\n**Figure 9–21.** *iSimulate on iOS: Select the\
    \ machine to connect to.*\n\nChoose the name of your machine from the list and\
    \ you will be brought to the main iSimulate screen. You are now ready to rock\
    \ and roll (see [Figure 9–22](#Chapter09.html#fig_9_22)).\n\n![images](images/0922.jpg)\n\
    \n**Figure 9–22.** *iSimulator on iOS: View the information that iSimulate is\
    \ sharing.*"
