  trans: "\n# 建议组件\n\n除了前面的“要求”之外，Twitter 还提供了一系列建议性的设计指南，你可以选择遵循（或不遵循）。以下部分复述了 Twitter\
    \ 的官方建议，并结合了一些无视这些建议反而效果更佳的应用程序实例进行了权衡：\n\n- **头像与对齐方式**：Twitter 希望开发者将用户头像显示在推文的左侧。推文的其他内容则应在头像右侧立即左对齐。头像链接指向\
    \ `http://twitter.com/username` 处的用户 Twitter 个人资料。\n\n- **反例**：Tweetbot 是 App\
    \ Store 中视觉上最具特色的 Twitter 客户端之一，它选择将头像放在推文下方（参见图 13–2）。但效果很好。\n\n![images](img/1302.jpg)\n\
    \n**图 13–2.** *Tweetbot 以一种非传统的方式呈现推文详情，我们认为效果不错。*\n\n- **时间戳与固定链接**：“此信息可以相对显示（例如‘2\
    \ 分钟前’）或绝对显示（例如‘7 月 8 日上午 8:45’）。时间戳应单独成行，位于推文文本之后，并采用不同的样式以使其不如推文文本显眼（颜色更浅和/或字号更小）。时间戳还应链接到该条推文在\
    \ Twitter 上的固定链接页面。”\n\n- **反例**：Twitterific 在技术上遵循了这一建议（参见图 13–3），但只是勉强做到：时间戳的字号仅比推文字号小大约\
    \ 1pt。不过，时间戳与推文之间的间距足以形成区分。将时间戳放在推文上方，能够优先呈现上下文。\n\n![images](img/1303.jpg)\n\n\
    **图 13–3.** *Twitterific 以传统方式呈现推文详情。*\n\n- **推文操作**：“回复、转推和喜欢操作应始终可从一条推文中访问，并应使用各自对应的操作图标显示。它们应按从左到右的顺序排列，依次为回复、转推、喜欢。”\n\
    \n- **反例**：*几乎所有集成了 Twitter API 的应用程序都以不同的方式呈现这些推文操作。我们喜欢 Twitter 的建议，但有时隐藏较少使用的控件可以使界面更简洁。图\
    \ 13–2 中的 Tweetbot 和图 13–3 中的 Twitterific 都分别采用了这种做法。*\n\n- **来源**：“除了时间戳和固定链接，你可以选择显示发布推文的客户端或方式（例如‘来自网页’或‘来自\
    \ Twitter for iPhone’）。如果提供了客户端，请确保它链接到所提供的来源页面 URL。”\n  - **反例**：这仅在你的项目以 Twitter\
    \ 为中心时相关。如果你的应用更关注特定推文的内容（而非完整的 Twitter 体验），那么你可能不需要在推文中附加客户端信息。Tweetbot 会这样做（参见图\
    \ 13–2），而 Twitterific 则不会（参见图 13–3）。\n\n- **多条推文**：“如果同时显示多条推文，可以通过水平线、空白区域或交替的背景颜色在视觉上进行分隔。空白区域应与推文本体的整体高度成比例。”\n\
    \n- **反例**：我们认为这条指南不应是可选的。很难想象在什么情况下将推文呈现为离散项目列表之外的形式会是合适的。Twitterific 对推文的呈现效果很好（参见图\
    \ 13–4）。\n\n![images](img/1304.jpg)\n\n**图 13–4.** *Twitterific 的时间线*\n\n- **时间顺序**：“通常按时间倒序（最新的在前）排列推文是有意义的，但我们理解这并不总是最相关的排列方式。当作为搜索结果或按其他条件（关键词、用户或其他编辑约束）显示时，推文可按这些条件排序。”\n\
    \n- **反例**：实际上，在 App Store 上很难找到一个不按时间先后（而是按其他标准）排序推文的 Twitter API 项目。搜索是唯一显著的例外。\n\
    \n## （不）使用 Twitter 的颜色\n\n颜色是用户识别你应用功能的主要方式，也是将自己与 Twitter 平台关联起来的一种直观方法。然而，Twitter\
    \ 非常希望你能尽量减少使用其调色板以及其商标化的徽标、按钮、术语和图标。\n\n因此，Twitter API 项目的设计者并不像 Facebook 开发者遵循其平台配色方案那样，对\
    \ Twitter 的配色方案亦步亦趋。或许是希望避免惹怒 Twitter，Twitter API 应用在图标和徽标的使用上往往更加多样化。\n\n供参考，你可以在图\
    \ 13–5 中找到一些 Twitter 自身排版和徽标艺术的例子。这些按钮在网页上使用没问题，但不要在你的 iOS 应用中使用它们——除非它们链接回 Twitter.com，或者用于指示与\
    \ Twitter 的兼容性。如果你无视这些要求（在下文“使用 Twitter 商标”一节中有所总结），你可能会遇到一些麻烦。如果你想使用鸟类主题或相关素材，你需要自己设计或提供。\n\
    \n![images](img/1305.jpg)\n\n**图 13–5.** *你可以在网站中使用 Twitter 的网页按钮——但不能在你的 iOS\
    \ 应用中使用，除非在特定情况下*\n\n### 创建主题元素\n\n根据你的应用功能对 Twitter API 的依赖程度，你可能会发现应用看起来与官方\
    \ Twitter 应用过于相似。\n\n这就是 Twitter 给设计者指出这一点原因：你应该使用独特的品牌和徽标来设计你的站点。\n\nTwitter\
    \ 还要求你遵守以下事项：\n\n- **不要** 复制 Twitter 的外观和感觉。\n- **不要** 使用任何非最新版本的 Twitter 徽标（在适当的情况下）。\n\
    - **不要** 未经明确许可使用 Twitter 网站上的任何其他艺术作品。\n- **务必** 使用 Twitter 的徽标创建你自己的按钮或标记。\n\
    \n供参考，图 13–6 展示了官方 Twitter 应用的各个方面，包括时间线（最左侧图片）、一条推文（中间图片）和用户个人资料（最右侧图片）。你需要创建你自己的视觉设计和交互设计，不要模仿此图中所示的设计。\n\
    \n![images](img/1306.jpg)\n\n**图 13–6.** *官方 Twitter 应用 UI，你不应模仿它*\n\n## 使用 Twitter\
    \ 商标\n\nTwitter 为使用 Twitter API 的开发者发布了一份关于其商标的“应做与不应做”清单。^(1) 以下是对相关要点的总结和分析。\n\
    \n你*可以*执行以下操作：\n\n- 使用当前的 Twitter 徽标或当前的 Twitter 小鸟标志作为指向 Twitter 服务的链接。\n- 使用当前的\
    \ Twitter 徽标或当前标志来表明你的产品与 Twitter 兼容。\n- 确保在提及*推文*（例如，“使用 Twitter 发推”）时包含对 Twitter\
    \ 的直接引用，或者在显示 Twitter 标志的同时提及*推文*。\n- 对徽标进行操作，除非由于你的应用中固有的颜色相关限制（例如黑白 iOS 工具栏）而必须这样做。\n\
    \n你*不得*执行以下操作：\n\n___________________\n\n¹ `http://support.twitter.com/entries/77641`\n\
    \n- 以可能暗示虚假的合作伙伴关系或对你的品牌进行背书的方式使用这些标志。\n- 以任何方式扭曲或篡改 Twitter 标志。\n- 以一种使 Twitter\
    \ 品牌与其他品牌混淆的方式使用标志。\n- 使用 Twitter 小鸟作为代言人来承载你的徽标或消息。\n"
- fmt: '# Advertising in the App Store


    Twitter also has the following guidelines about advertising in the App Store:


    - *Do* use screenshots of the logged-out Twitter home page, the Twitter About
    Us page, or even the `@twitter` profile page.

    - *Don''t* use screenshots of other people''s profiles or Tweets without their
    permission.


    # We Don''t Know You


    Twitter also asks that you adhere to the following guidelines:


    - Refer to *Twitter* when talking about the Twitter service or company, and use
    *Tweets* (with a capital *T*) when talking about the messages or updates on its
    service.

    - Don''t make inaccurate statements about the Twitter service. (Duh!)

    - Don''t refer to Twitter in a way that implies partnership or endorsement.


    ## Twitter Navigation Paradigms


    Loren Brichter, the creator of Tweetie, the predecessor to today''s official Twitter
    app, first conceived of his project as a simple scrolling project. As he said
    in 2009, he didn''t do anything special with Tweetie except to make it fast and
    in keeping with the spirit of Apple''s Human Interface Guidelines (which had not
    been updated with iOS guidelines at that time):^([2](#Chapter13.html#CHP-13-FN-2))


    > *It was around the same time that his Verizon Wireless contract expired and
    he finally got an iPhone. He started scouring the App Store. “I realized there
    are no good Twitter apps,” he recalls. “But there are a billion bad ones.” He
    figured he could probably write a better app. “What triggered me to do it? I was
    playing with Twitterific, which I used, and everybody used. I thought: I wonder
    why the scrolling is so slow? I wonder if I can make it faster.” In an hour, he
    had built a prototype of a list of fast-scrolling tweets. Then, after a two-week
    paroxysm of coding, he had built Tweetie, pictured in Figure 2-1, which is as
    of this writing the most popular mobile Twitter client on any platform, and the
    most popular Twitter app for iPhone.*

    >

    > *The problem isn''t with how the other apps used Twitter''s API, it''s with
    the way they interacted with the iPhone OS,” he says. “Either they were doing
    something completely custom, or completely wrong.” His antipathy wasn''t even
    aimed at Twitterific, though it was the immediate catalyst for Tweetie. “To tell
    you the truth, I didn''t have a lot of beef with Twitterific,” he says. “They
    were the ADA winner from the year before, and everyone loved the app. It just
    didn''t jive with the way I used Twitter.”*


    ____________________________


    ² *iPhone Design Award Winning Projects* by Chris Dannen, p.4 (Apress, 2009)


    When he rebuilt Tweetie as Tweetie 2 from the ground up, he completely re-thought
    the UI. One surprising addition was the inclusion of a dynamic application bar
    at the bottom of the screen. You can see this application bar change between the
    views in [Figure 13–7](#Chapter13.html#fig_13_7).


    ![images](images/1307.jpg)


    **Figure 13–7.** *Twitter''s dynamic toolbar goes against iOS conventions. On
    the left, you see the bar as shown in a user profile; on the right, you see the
    bar as shown when viewing a Tweet.*


    Unlike in preloaded iOS apps, the application bar in Tweetie 2—which would become
    the official Twitter app—had icons that would change, depending on what the user
    was viewing. When asked why he departed from Apple''s precedent in Tweetie 2,
    Brichter said:^([3](#Chapter13.html#CHP-13-FN-3))


    ____________________________


    ³ Ibid.


    > *Having an application-global tab bar is extremely limiting. In Tweetie 2 I''m
    optimizing for navigation stack *depth*. By having a screen-specific bottom bar
    that morphs depending on current context you can expose a massive wealth of information
    without requiring the user to deal with excessive drill-down.*

    >

    > *Apple doesn''t do this. In fact, they don''t recommend doing what I''m doing.
    While I think Tweetie 2 is a great example of an iPhone-ish iPhone app, I''m bucking
    the HIG because I think Apple''s recommendations are too confining. A shallow
    app can get away with an application-global tab bar. A deep, rich app can''t.
    And Tweetie 2 is deep.*

    >

    > *The tricks in Tweetie 2 let you explore massive amounts of information without
    the tap... tap... tap... of pushing tons of view controllers onto the navigation
    stack. As a quick example, say I''m looking at a tweet in my timeline. A user
    is asking the Twitterverse a question. I want to check out responses. I can swipe
    the tweet, tap the user details button, then tap the @ tab of the pushed user-details
    screen. I''m viewing the responses to this user from everyone, and I''m only a
    *single* view controller away from where I started.*

    >

    > *Tweet list -> Recent user mentions*

    >

    > *Without optimizing for navigation stack depth, imagine if I had to push a new
    view controller for each navigation action:*

    >

    > *Tweet list -> Tweet details -> User details -> Recent user mentions.*

    >

    > *This stinks.*

    >

    > *I don''t use a normal tab bar in Tweetie 2 for these context-specific tab bars.
    I draw them with custom code. I wanted them to be familiar, but different enough
    that users didn''t expect the standard application-global tabs.*


    Although Brichter''s way is now standard in the official Twitter app, he doesn''t
    recommend that most Twitter API projects follow this lead. It''s only because
    Tweetie was attempting to duplicate all the functionality of the Twitter website
    (and then some) that it became complex enough to warrant a dynamic application
    bar. Now that broad duplication of Twitter functionality is against Twitter''s
    developer terms, Brichter says it''s likely that you won''t need to follow this
    paradigm in your app:


    > *I don''t recommend everyone follow my lead. Twitter is *incredibly* rich with
    information. Chances are most other apps are shallow enough and will be good enough
    using an application-global tab bar or just simple drill-down.^([4](#Chapter13.html#CHP-13-FN-4))*


    ____________________________


    ⁴ Ibid.


    ### Twitter Logos and Icons


    Twitter offers the following logos and icons for download, so that you can accurately
    display Twitter branding in your app, where appropriate. (The rules and guidelines
    regarding the use of Twitter branding materials are discussed in the preceding
    sections of this chapter.) You can download the graphics shown in [Figure 13–8](#Chapter13.html#fig_13_8)
    at this URL:


    [`http://twitter.com/about/resources/logos`](http://twitter.com/about/resources/logos)


    ![images](images/1308.jpg)


    **Figure 13–8.** *Twitter logos and icons, which you''re meant to use sparingly*


    As discussed previously, Twitter strongly discourages the use of its colors and
    logos in third-party apps. This fact has left a lot of developers struggling to
    somehow make their icons reminiscent of Twitter without actually directly referencing
    the company. Various birds have become the standard fare for Twitter clients (see
    [Figure 13–9](#Chapter13.html#fig_13_9)); but now that no new clients are permitted
    by Twitter''s new terms, Twitter will have an even smaller visible presence in
    the App Store. In keeping with these guidelines, make your Twitter iconography
    unique and match it to the visual designs for your app.


    ![images](images/1309.jpg)


    **Figure 13–9.** *The Twitter brand, as paid homage to by various icons in the
    App Store*'
