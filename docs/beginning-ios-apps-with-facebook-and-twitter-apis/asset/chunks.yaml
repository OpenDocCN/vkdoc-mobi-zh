- fmt: "# Using Open Source Tools and Other Goodies\n\nThe world of mobile software\
    \ moves incredibly fast, and it can sometimes seem like a daunting undertaking\
    \ to stay abreast of all the latest developments. While this book is intended\
    \ as an introduction to integrating Facebook and Twitter into your application,\
    \ there are a host of related technologies that can make life easier or reveal\
    \ how other applications accomplish certain tasks. In addition, there are some\
    \ cross-posting libraries available that can save you the trouble of integrating\
    \ directly with the Facebook and Twitter SDKs. These topics are explored in this\
    \ chapter.\n\nThis chapter also includes a discussion of data and trends that\
    \ are available from Twitter. In addition to its standard client APIs, Twitter\
    \ makes data and trends available to developers. Twitter Trends is the site's\
    \ tool for measuring topics (i.e., hash tags) that are quickly becoming popular\
    \ (that are hot news, in other words). If you haven't heard of the Trends tool,\
    \ check out this compendium on Twitter.com:\n\n`http://yearinreview.twitter.com/trends/`\n\
    \nIt may not always make sense to access these trends directly from within your\
    \ application, and Twitter's terms restrict some of the ways you can use its data;\
    \ however, it might prove useful to look at this server-to-server transaction.\
    \ Later, you'll learn how to do some of your own number crunching with this data\
    \ and serve what you need to your application.\n\n## The Shorter, the Better\n\
    \nA common problem with referencing resources on the Web is that URLs for these\
    \ resources can sometimes be incredibly long. This presents a problem when incorporating\
    \ services like Twitter into an application because Tweets need to be short in\
    \ length. For instance, it is not good from a user's perspective if an application\
    \ wants to let a user Tweet an article, but the length of the URL for the article\
    \ takes up almost the entire Tweet or is entirely too long to fit in a Tweet.\n\
    \nThis is where URL shorteners come into play. There are a number of URL shortening\
    \ services available, including Twitter's own, which was announced as this book\
    \ was going to press. However, third party URL shorteners offer functionality\
    \ Twitter doesn't (such as analytics) so we'll spend some time talking about two\
    \ of them. We will also cover how they work and how to integrate them into an\
    \ iOS application. Note that not all these services may be in business in perpetuity;\
    \ if you're interested in the archival quality of your links, use Twitter's own\
    \ shortener, T.co.\n\nHere are two common third-party URL shortening services:\n\
    \n*   [`http://bit.ly`](http://bit.ly)\n*   [`http://TinyURL.com`](http://TinyURL.com)\n\
    \nBoth services are entirely free to use, and they work on the same premise: you\
    \ supply a URL to the service, and it returns a shortened URL back to you.\n\n\
    A handy tool for experimenting with these services is a command-line utility known\
    \ as `cURL`, which you can learn more about at this URL:\n\n`https://secure.wikimedia.org/wikipedia/en/wiki/CURL`\n\
    \n`cURL` is designed to support a number of Internet protocols, but HTTP is the\
    \ only protocol that is relevant in this case. To see `curl` in action, open up\
    \ Terminal on a Mac and type the following at the command line:\n\n```\n$ curl\
    \ http://www.apress.com\n```\n\nThis writes out to the command line all of the\
    \ HTML for the Apress homepage that would normally be processed and displayed\
    \ by a web browser.\n\nFor URL shortening, you need more than just a URL. The\
    \ URL shortening services require that the URL to be shortened be set as a parameter\
    \ with the request. To send parameters along with a URL request, use `cURL`'s\
    \ `-d` option:\n\n```\n$ curl -d \"<request parameters>\" URL\n```\n\nTinyURL\
    \ has a simple protocol in place. Simply submit a request to `http://tinyurl.com/api-create.php`\
    \ with a `url` parameter that is set to the URL that you want to shorten:\n\n\
    ```\n$ curl -d \"url=http://www.apress.com\" http://tinyurl.com/api-create.php\n\
    ```\n\nThis will return a shortened URL that uses this form:\n\n```\nhttp://tinyurl.com/9qths\n\
    ```\n\nOf course, `www.apress.com` isn't a URL that really needs shortening—but\
    \ this is just an example.\n\nBit.ly, like TinyURL, shortens URLs; however, it\
    \ also provides tracking, analytics, search history, and a lot more on the shortened\
    \ URLs that it generates. To get the best usage out of bit.ly, you need to sign\
    \ up for an account on its site. After completing the sign up, bit.ly will associate\
    \ an `apiKey` with the account. This `apiKey` is needed to use its service. The\
    \ bit.ly protocol requires a request to `http://api.bitly.com/v3/shorten` with\
    \ the following parameters:\n\n*   `login`: A bit.ly username (chosen when you\
    \ create an account)\n*   `apiKey`: The `api` key that is associated with the\
    \ username provided (this `apiKey` is generated by bit.ly upon successful registration)\n\
    *   `longUrl`: The URL to shorten\n*   `format`: The desired format for the response;\
    \ supported values are `json` (default), `xml`, and `txt`\n\nTherefore, a request\
    \ for bit.ly to shorten a URL would look like the following when using `cURL`:\n\
    \n```\n$ curl -d \"login=<bit.ly username>&apiKey=<bit.ly API\n           key>&longUrl=http://www.apress.com&format=txt\"\
    \n           http://api.bitly.com/v3/shorten\n```\n\nThis will return a shortened\
    \ URL that uses this form:\n\n```\nhttp://bit.ly/dIB3mD\n```\n\nFor more detailed\
    \ information about the bit.ly API, go here:\n\n`https://code.google.com/p/bitly-api/wiki/ApiDocumentation#/v3/shorten`\n\
    \nFor a quick read on some of the underlying theory involved with URL shortening,\
    \ read the article, \"URL Shortening: Hashes In Practice,\" at this URL:\n\n`www.codinghorror.com/blog/2007/08/url-shortening-hashes-in-practice.html`\n\
    \nFor more detailed information about `curl` and what it can accomplish, go to\
    \ the following page:\n\n`http://curl.haxx.se/docs/manpage.html`\n\nOr, you can\
    \ just type the following from a command line:\n\n```\n$ man curl\n```\n\n###\
    \ Using URL Shorteners in iOS\n\n`curl` is a great tool to perform a quick test\
    \ with; however, it's of no use within an iOS app. While there are a number of\
    \ ways to integrate with URL shorteners in an iOS app, the quickest way is to\
    \ use `NSString`'s `stringWithContentsOfURL` method. This method takes a URL,\
    \ does all of the work to issue a request for the URL, and returns the response\
    \ as an `NSString`. So, in the case of TinyURL, a request to shorten a URL via\
    \ this service would look as follows within Objective-C code when using `NSString`'s\
    \ `stringWithContentsOfURL`:\n\n```\nNSString *longURL = @\"http://www.apress.com\"\
    ;\nNSString *format = @\"http://tinyurl.com/api-create.php?url=%@\";\nNSString\
    \ *apiEndpoint = [NSString stringWithFormat:format, longURL];\nNSString *shortURL\
    \ =\n[NSString stringWithContentsOfURL:[NSURL URLWithString:apiEndpoint]\n   \
    \                      encoding:NSASCIIStringEncoding error:nil];\n```\n\nNote\
    \ that `stringWithContentsOfURL` blocks until it receives a response. Therefore,\
    \ depending on the requirements of the application using this method, it may be\
    \ worthwhile to call this method on a background thread or to skip over the use\
    \ of `NSString`'s `stringWithContentsOfURL`, and then issue the request via `NSURLRequest`."
  raw: '## Using Open Source Tools and Other Goodies


    The world of mobile software moves incredibly fast, and it can sometimes seem
    like a daunting undertaking to stay abreast of all the latest developments. While
    this book is intended as an introduction to integrating Facebook and Twitter into
    your application, there are a host of related technologies that can make life
    easier or reveal how other applications accomplish certain tasks. In addition,
    there are some cross-posting libraries available that can save you the trouble
    of integrating directly with the Facebook and Twitter SDKs. These topics are explored
    in this chapter.


    This chapter also includes a discussion of data and trends that are available
    from Twitter. In addition to its standard client APIs, Twitter makes data and
    trends available to developers. Twitter Trends is the site''s tool for measuring
    topics (i.e., hash tags) that are quickly becoming popular (that are hot news,
    in other words). If you haven''t heard of the Trends tool, check out this compendium
    on Twitter.com:


    `http://yearinreview.twitter.com/trends/`


    It may not always make sense to access these trends directly from within your
    application, and Twitter''s terms restrict some of the ways you can use its data;
    however, it might prove useful to look at this server-to-server transaction. Later,
    you''ll learn how to do some of your own number crunching with this data and serve
    what you need to your application.


    ### The Shorter, the Better


    A common problem with referencing resources on the Web is that URLs for these
    resources can sometimes be incredibly long. This presents a problem when incorporating
    services like Twitter into an application because Tweets need to be short in length.
    For instance, it is not good from a user''s perspective if an application wants
    to let a user Tweet an article, but the length of the URL for the article takes
    up almost the entire Tweet or is entirely too long to fit in a Tweet.


    This is where URL shorteners come into play. There are a number of URL shortening
    services available, inclding Twitter''s own, which was announced as this book
    was going to press. However, third party URL shorteners offer functionality Twitter
    doesn''t (such as analytics) so we''ll spent some time talking about two of them.We
    will also cover how they work and how to integrate them into an iOS application.
    Note that not all these services may be in business in perpetuity; if you''re
    interested in the archival quality of your links, use Twitter''s own shortener,
    T.co.


    Here are two common third-party URL shortening services:


    *   [`http://bit.ly`](http://bit.ly)

    *   [`http://TinyURL.com`](http://TinyURL.com)


    Both services are entirely free to use, and they work on the same premise: you
    supply a URL to the service, and it returns a shortened URL back to you.


    A handy tool for experimenting with these services is a command-line utility known
    as *cURL*, which you can learn more about at this URL:


    `https://secure.wikimedia.org/wikipedia/en/wiki/CURL`


    cURL is designed to support a number of Internet protocols, but HTTP is the only
    protocol that is relevant in this case. To see curl in action, open up Terminal
    on a Mac and type the following at the command line:


    `$ curl http://www.apress.com`


    This writes out to the command line all of the HTML for the Apress homepage that
    would normally be processed and displayed by a web browser.


    For URL shortening, you need more than just a URL. The URL shortening services
    require that the URL to be shortened be set as a parameter with the request. To
    send parameters along with a URL request, use cURL''s `-d` option:


    `$ curl -d "<request parameters>" URL`


    TinyURL has a simple protocol in place. Simply submit a request to [`http://tinyurl.com/api-create.php`](http://tinyurl.com/api-create.php)
    with a `url` parameter that is set to the URL that you want to shorten:


    `$ curl -d "url=http://www.apress.com" http://tinyurl.com/api-create.php`


    This will return a shortened URL that uses this form:


    `http://tinyurl.com/9qths`


    Of course, [`www.apress.com`](http://www.apress.com) isn''t a URL that really
    needs shortening—but this is just an example.


    Bit.ly, like TinyURL, shortens URLs; however, it also provides tracking, analytics,
    search history, and a lot more on the shortened URLs that it generates. To get
    the best usage out of bit.ly, you need to sign up for an account on its site.
    After completing the sign up, bit.ly will associate an apiKey with the account.
    This apiKey is needed to use its service. The bit.ly protocol requires a request
    to [`http://api.bitly.com/v3/shorten`](http://api.bitly.com/v3/shorten) with the
    following parameters:


    *   `login`: A bit.ly username (chosen when you create an account)

    *   `apiKey`: The `api` key that is associated with the username provided (this
    api key is generated by bit.ly upon successful registration)

    *   `longUrl`: The URL to shorten

    *   `format`: The desired format for the response; supported values are `json`
    (default), `xml`, and `txt`


    Therefore, a request for bit.ly to shorten a URL would look like the following
    when using cURL:


    `$ curl -d "login=<bit.ly username>&apiKey=<bit.ly API`

    `           key>&longUrl=http://www.apress.com&format=txt"`

    `           http://api.bitly.com/v3/shorten`


    This will return a shortened URL that uses this form:


    `http://bit.ly/dIB3mD`


    For more detailed information about the bit.ly API, go here:


    `https://code.google.com/p/bitly-api/wiki/ApiDocumentation#/v3/shorten`


    For a quick read on some of the underlying theory involved with URL shortening,
    read the article, “URL Shortening: Hashes In Practice,” at this URL:


    `www.codinghorror.com/blog/2007/08/url-shortening-hashes-in-practice.html`


    For more detailed information about curl and what it can accomplish, go to the
    following page:


    `http://curl.haxx.se/docs/manpage.html`


    Or, you can just type the following from a command line:


    `$ man curl`


    #### Using URL Shorteners in iOS


    curl is a great tool to perform a quick test with; however, it''s of no use within
    an iOS app. While there are a number of ways to integrate with URL shorteners
    in an iOS app, the quickest way is to use `NSString''sstringWithContentsOfURL`
    method. This method takes a URL, does all of the work to issue a request for the
    URL, and returns the response as an `NSString`. So, in the case of TinyURL, a
    request to shorten a URL via this service would look as follows within Objective-C
    code when using `NSString`''s `stringWithContentsOfURL`:


    `NSString *longURL = @"http://www.apress.com";`


    `NSString *format = @"http://tinyurl.com/api-create.php?url=%@"; NSString *apiEndpoint
    = [NSString stringWithFormat:format,longURL];`


    `NSString *shortURL =`

    `[NSString stringWithContentsOfURL:[NSURL URLWithString:apiEndpoint]`

    `                         encoding:NSASCIIStringEncoding error:nil];`


    Note that `stringWithContentsOfURL` blocks until it receives a response. Therefore,
    depending on the requirements of the application using this method, it may be
    worthwhile to call this method on a background thread or to skip over the use
    of `NSString`''s `stringWithContentsOfURL,` and then issue the request via `NSURLRequest`.'
