  trans: "\n# 你的应用能做什么\n\n根据推特的说法，你的服务“可能是一个提供类似推特终端用户体验主要组件的应用或客户端”；但如果你构建的是客户端应用，还需遵守额外条款：\n\
    \n- 你必须将推特 API 作为客户端中与推特功能高度相似功能的唯一来源。换句话说，你不能将其他类似的 API 混入推特 API 项目中，否则公司将给你发来一封警告邮件。\n\
    - 你不得向第三方支付费用以分发你的应用。\n- 你不能在你的应用中框架显示或复制推特服务的大部分内容；相反，你必须使用推特 API 来展示推特内容。\n\
    - 不得存储私人数据或内容，也不得复制推特的数据库。\n\n## 管理现有推特客户端的规则\n\n鉴于新的服务条款，非官方推特客户端仍能留在应用商店中似乎有些奇怪。当推特在\
    \ 2011 年 3 月宣布“不再支持客户端”时，其平台开发者表示，一些现有的推特客户端应用将被允许继续运营。不过，推特的 Ryan Sarver 补充道^(1)：\n\
    \n> “我们将以高标准要求你们，确保你们不侵犯用户隐私，提供一致的用户体验，并严格遵守我们服务条款的所有方面。”\n\n## 推特对可用性的定义\n\n\
    接下来的部分并非严格意义上的规则，而是描述了一系列指导方针。遵循这些方针，你就能避免招致推特平台团队的不满。他们规定你的应用如何运作，这听起来可能有些严苛，但这是为了用户的最大利益——如果你的应用在平台上做了其他推特应用没做过的事情，部分用户可能会感到困惑。基于此精神，推特要求你遵守以下准则：\n\
    \n- **不要给用户带来意外：** 不要滥用推特的功能或术语：\n    - 保持推文的完整性。尽管推文只有 140 个字符，但其中包含了大量信息。关于推特视觉设计指导，请参见第\
    \ 13 章。\n    - 不要编辑或修改通过 API 传递的用户生成内容。\n    - 始终显示推文的原创者或提供者。\n- **不要制造或传播垃圾信息：**\
    \ 在以下任何操作之前，需获得用户许可：\n    - 代表用户发送推文或其他消息。用户通过你的应用进行身份验证，并不构成你代表其发送消息的同意。\n  \
    \  - 代表用户修改其个人资料信息或执行账户操作（包括关注、取消关注和屏蔽）。\n    - 在用户的推文中添加话题标签、注释数据或其他内容。应向用户准确展示将要发布的内容。\n\
    - **不要为了抢占名称而制作占位应用。**\n- **尊重用户隐私：** 你需要使用适当的安全标准，例如 `OAuth`，如第 2 章所述。你还应做到以下几点：\n\
    \    - 尊重推特内容的隐私和分享设置。\n    - 当通过推特 API 报告更改时，及时调整你对推特内容的处理方式。\n    - 始终向用户展示你服务的隐私政策。你还应清楚说明你如何处理从用户那里收集的信息。\n\
    \    - 明确说明何时将位置信息添加到用户的推文中，无论是作为地理标签还是注释数据。\n    - 不要索取其他开发者的消费者密钥或消费者秘密（如果这些密钥将被存储在该开发者控制范围之外）。\n\
    \    - 不要促成或鼓励发布私人或机密信息。\n- **成为推特的良好合作伙伴：** 你需要遵守本章所述的所有规则，包括：\n    - 不得以可能误导、混淆或欺骗用户的方式使用商业名称和/或徽标。关于推特商标使用的更多信息，请参见本章后面的商标规则。\n\
    \    - 尽量避免在应用的来源或目的方面混淆或误导用户。\n    - 不要链接到恶意软件。\n    - 不要复制、框架显示或镜像推特网站或其设计。\n\
    \    - 不要滥用 API 在推特上冒充他人。\n\n__________\n\n¹ [`https://groups.google.com/forum/#!topic/twitter-developmenttalk/yCzVnHqHIWo/discussion`](https://groups.google.com/forum/#!topic/twitter-developmenttalk/yCzVnHqHIWo/discussion)\n\
    \n## 登录与身份\n\n推特还有一些关于登录和身份的指导方针：\n\n- 你必须向用户提供通过 `OAuth` 安全协议登录推特的选项，如本书第 2 章和第\
    \ 5 章所述。\n- 你应该为没有推特账户的最终用户提供创建新推特账户的机会。\n- 你展示“使用推特连接”选项时，其醒目程度至少应与 Facebook\
    \ 连接按钮或任何其他社交网页登录选项相当。\n- 一旦最终用户通过“使用推特连接”完成身份验证，你必须执行以下操作：清晰地显示他的推特头像、推特用户名以及推特小鸟图标。\n\
    \n## 正确显示内容\n\n以下是关于正确显示推特内容的指导方针：\n\n- 推文中引用内容的所有 URL，都应直接将用户引导至显示该内容的页面，而不是任何中间页面。\n\
    - 如果你的服务将更新内容与推文混合显示，你必须标明那些引用推特作为来源的推文。\n- 不要在用户个人资料图片或背景中放置色情内容。\n- 仅显示推特上自然呈现的操作。例如，当用户执行取消收藏或删除操作时，你不应该做推特不会做的事情，比如公开某条推文已被删除。\n\
    - 不要虚假报告某个账户为“已验证”账户。\n\n## 通过应用盈利\n\n在尝试通过应用盈利时，你应该遵循以下指导方针。其中最重要的一点是尊重用户内容：\n\
    \n- 推文可用于广告中，但不能*作为*广告本身。\n- 如果你想将某条推文用于耐用品，或者暗示该条推文作者对某事的赞助或认可，你必须获得该推文创建者的许可。\n\
    \n## 推特广告\n\n推特可以通过其 API 在你的应用中投放广告（即推特广告）；然而，如果你联系推特，它会与你分享一部分广告收入。\n\n## 推特内容周边广告\n\
    \n你可以在自己的推特 API 应用内投放广告，但（当然）对此也有规定：\n\n- 如果你的广告合作“主要基于”推文，你必须将收入的一部分分给推特。如果你认为你的广告合作可能属于此类范畴，请发送邮件至\
    \ [`partner@twitter.com`](http://partner@twitter.com)。这包括自定义可视化等内容。\n- 你不能在推特时间线或任何其他可能被用户误认为是推文的消息中放置广告。例如，广告不能包含推文操作，如转发、喜欢和回复。\n\
    - 你通常必须在推特内容与你的广告之间保持清晰的界限。\n"
- fmt: '### New Rate Limits and the End of Whitelisting


    Until early 2011, Twitter had a *whitelist* of developers it allowed to exceed
    the hourly rate limit of API calls. The concept of the whitelist was a hold-over
    from the early days of the REST API, when Twitter had few bulk request options,
    and the Streaming API wasn''t public yet.


    Since then, Twitter has added more efficient tools for making bulk requests: lookups,
    ID lists, authentication, and the Streaming API. Still, now that all whitelist
    requests are being denied, some app projects that might have been ingenious back
    in 2010 won''t be viable today.


    If you''re planning to do advanced research and analytics, you''ll need to buy
    data through a reseller of Twitter data like Gnip.


    The real change, however, comes a bit later in Sarver''s announcement, when he
    notes that “there are going to be some things that developers want to do that
    just aren''t supported by the platform.” Instead of granting whitelisting to make
    advanced research and analytics possible, writes Sarver, Twitter now asks that
    developers contact Gnip, currently the primary reseller of Twitter data.


    ### REST API Rate Limiting


    Twitter places a limit of 150 requests per hour on API calls. For `OAuth` calls,
    the limit is 350 per hour. As we said previously, Twitter won''t let you whitelist
    your way out of this rate limit. You can buy bulk data from a reseller, but at
    the time of writing, the only such reseller is Gnip. But others may follow, and
    a market for Twitter data may emerge. In any case, many developers report negative
    experiences trying to work with unstructured dumps from Twitter''s firehose.


    Assuming you''re interested in the particulars of Twitter''s rate limits, we''ve
    summarized its allowances here:


    - Authenticated calls are measured against that user''s limit, while unauthenticated
    calls are deducted from the allowance of the host. Hosts are permitted 150 requests
    per hour.

    - `OAuth` calls are permitted 350 requests per hour.


    You can find the complete document that spells out these limits at this URL:


    [`http://dev.twitter.com/pages/rate-limiting#rest`](http://dev.twitter.com/pages/rate-limiting#rest)


    As with most social platforms, Twitter''s API places no rate limits on HTTP POSTs;
    however, the company has said it may consider limiting POSTs in the future. Methods
    that include limits are called out in the document at this URL:


    [`http://dev.twitter.com/pages/rate-limiting#rest`](http://dev.twitter.com/pages/rate-limiting#rest)


    **NOTE:** API methods that are not directly rate-limited are still subject to
    organic (and therefore unpublished) limits.


    If you think your app may be close to exceeding rate limits, you can monitor its
    status by inspecting the HTTP response headers that are returned. With the default
    rate limit headers, these response headers will also show the following:


    - `X-FeatureRateLimit-Limit`

    - `X-FeatureRateLimit-Remaining`

    - `X-FeatureRateLimit-Reset`


    You''ll know you''ve hit a rate limit when you get back HTTP 400 response codes.


    ### Facebook: Mind Your Manners


    Facebook''s rulebook is slightly less imposing than Twitter''s, and it''s more
    interested in guiding developers than scaring them straight. In the sections that
    follow, we''ll explain some of Facebook''s usability principles. Consider these
    to be the foundation for the personality of your app.


    #### The Lowdown on Platform Policy


    You can find Facebook''s complete, unedited platform policies at this URL:


    [`http://developers.facebook.com/policy/`](http://developers.facebook.com/policy/)


    #### Creating a Great User Experience


    Facebook has provided the following guidelines for creating a terrific user experience:


    - **Build social and engaging applications:** What does this mean? Well, the best
    Facebook API projects in the App Store prioritize communication and interaction
    with other users. More passive, consumption-oriented apps (like a News Feed reader)
    aren''t right for Facebook, but make more sense on Twitter.

    - **Give users choice and control:** Facebook''s API has a dizzying number of
    objects, relationships, and actions. And while many of them seem insignificant,
    it''s crucial that you adequately inform the user when something is going to be
    posted or shared with others.

    - **Help users share expressive and relevant content:** Ideally, Facebook would
    have you build an app that doesn''t merely access its Social Graph; it would also
    like your app to contribute new content to it. Apps that upload user photos, videos,
    and links from the Web are considered better citizens than those that don''t.


    #### Be Trustworthy


    Like Twitter, Facebook asks that you respect a user''s privacy, eschew spam, and
    avoid any other unscrupulous activity. And like Twitter, Facebook doesn''t want
    developers competing with its own internally created iOS app. However, Facebook
    is more diplomatic about the way it explains its wishes, and it seems lax about
    forcing developers to abide.


    Specifically, Facebook says you must not make derivative use of Facebook icons.
    Similarly, you cannot use terms for Facebook features and functionality that make
    it sound like a stand-in or replacement for the official Facebook app. However,
    one look in the App Store shows that many developers have copied Facebook''s blue-and-white
    color scheme and made generous use of some Facebook iconography and terminology.
    But while Facebook shows lenience today, Twitter''s example has demonstrated that
    platforms can decide to create or enforce their developer terms as they please.
    Know that if you decide to mimic Facebook''s theming and its characteristics,
    your app may eventually earn the ire of the platform regulators. It will also
    look indistinguishable from dozens of apps in the App Store.


    ##### Rate Limits


    Facebook imposes rate limits on users and API calls. For an authenticated user,
    the limit is 5 million. API calls are limited to 100 million. Perhaps to preclude
    any major competitor from using Social Graph data to compete with Facebook for
    ad dollars, Facebook limits your app to 50 million impressions per day.


    ##### For Your Privacy Policy


    Facebook asks that you tell users what user data you are going to use and how
    you will use, display, share, or transfer that data in your app privacy policy.
    It also wants you to include your privacy policy URL in the application. To read
    more about privacy, review [Chapter 2](#Chapter02.html#ch2) (on privacy) and [Chapter
    5](#Chapter05.html#ch5) (on OAuth and safe account management).


    ##### Other Stuff


    Facebook has other rules about the use of its API, but thankfully its rules are
    more succinct than Twitter''s:


    - **Don''t sell data:** If you are acquired by or merge with a third party, you
    can continue to use user data within your application; however, you cannot transfer
    data outside your application.

    - **Delete your old projects:** If you stop using the Facebook API or Facebook
    disables your app, Facebook asks that you delete all the data you''ve received
    through the API (unless it is basic account information or you have the consent
    of the user to retain information on him).

    - **Don''t use a user''s friend list outside of your application:** Even if a
    user consents to such use, this isn''t allowed. But you can use connections between
    users who have both connected to your application.

    - **Always provide a function in your app that allows people to access their Facebook
    data from the app.**'
