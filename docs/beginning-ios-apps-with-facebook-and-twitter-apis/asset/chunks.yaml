  trans: '

    #### 核心 Three20 组件


    如你在第 10 章所学，Three20 项目是 Facebook iOS 开发者乔·休伊特送给 Facebook 开发者社区的礼物：一套他专为 Facebook
    iOS 版应用自行构建的完整框架。


    该项目是开源的，包含了 Facebook 应用的几个组成部分。这些部分包括照片查看器、消息编辑器、网络图像视图以及其他实用功能。你可以通过以下 URL 找到它们的
    Git 地址：


    [`http://joehewitt.com/post/the-three20-project/`](http://joehewitt.com/post/the-three20-project/)


    以下是你设计应用时需要了解的一些组件，以及乔对各组件的描述：


    - **照片查看器**：“`TTPhotoViewController` 模仿了苹果相册应用的全部缩放与滑动体验。你可以提供自己的‘照片源’，其工作原理与
    `UITableView` 使用的数据源类似。与苹果相册应用不同，它不仅限于本地存储的照片。你的照片可以从网络加载，长列表照片可以增量加载。此版本还支持缩放（与当前
    Facebook 应用中的版本不同）。”

    - “这大概是我在整个 Facebook for iPhone 项目中最耗时的部分了，所以如果我能帮别人省下这些时间，我会睡得更好。”

    - **消息编辑器**：“`TTMessageController` 模仿了苹果邮件应用中的消息编辑器。你可以自定义它以发送任何类型的消息。包含你自己的消息字段集，或使用标准的`收件人:`和`主题:`。收件人姓名可以通过你提供的数据源自动补全。”

    - **网络图像视图**：“`TTImageView` 让显示图像变得和 HTML 中一样简单。只需提供图像的 URL，`TTImageView` 就会高效地加载并显示它。`TTImageView`
    还与下面描述的 HTTP 缓存协同工作，尽可能避免网络请求。”

    - **网络感知表格视图控制器**：“`TTTableViewController` 和 `TTTableViewDataSource` 帮助你构建从互联网加载内容的表格。与
    `UITableView` 默认假设你已准备好所有数据不同，`TTTableViewController` 允许你在数据加载时、出现错误或没有内容可显示时进行通信。它还帮助你添加‘更多’按钮以加载下一页数据，并可选择支持通过摇晃设备来重新加载数据。”

    - **文本输入字段**：“`TTTextEditor` 是一个 `UITextView`，它能在你输入时自动增加高度。我在 Facebook 聊天中输入消息时使用它，其行为与苹果短信应用中的编辑器类似。”

    - “`TTPickerTextField` 是一个输入预测 `UITextField`。当你输入时，它会搜索数据源，并在你选择预测选项时向文本流中添加气泡。我在
    `TTMessageController` 中使用它来选择消息收件人的姓名。”


    #### Web 应用的设计技巧


    Facebook 的触屏版 Web 应用的设计可以说与其 iOS 应用同样出色（参见图 14-9）。尽管它受到浏览器环境的种种限制，但仍有一些优秀的设计模式可供借鉴（这与网格布局不同）。


    ![images](img/1409.jpg)


    **图 14-9.** *面向 Mobile Safari 用户的 Facebook 主页*


    ##### 标签式方法


    标签曾用于早期版本的 Facebook for iOS 应用，但随着应用功能日益丰富，标签迅速变得杂乱无章。Web 应用更长久地保留了标签浏览方式，但其开发者最近重新设计了应用的导航栏，使其仅包含四项内容：


    - 个人主页

    - 消息

    - 更多（好友、照片、地点、群组、活动、笔记、通知、设置和退出）

    - 搜索按钮


    我们认为这些标签的内容反映了我们在本节开头确立的 Facebook 可用性优先级：


    - 查找他人

    - 联系他人

    - 情境


    至此，我们的讨论又回到了原点！


    ### 结论


    这是一个热潮过后的时代。Web 开发者曾蜂拥而至 Twitter 和 Facebook 的 API，iOS 开发者紧随其后。但这种涌入使得这些平台的管理趋于保守，因为它们试图保护并维持自身的增长。没人想毁掉一件好事，这些平台构建了一套规则和条款体系，确保除了它们自己之外，无人能玷污其名誉。


    这对开发者和设计师的创造力来说并非死刑。相反，它迫使他们创造出能真正为平台增加价值的应用。我们鼓励你思考使用 Facebook 和 Twitter 的未尝试过的方式——或此前未做对的方式。当你发现一种独特的体验并了解其受众时，你需要设计能体现应用个性的视觉素材。在
    App Store 中，外表并非一切。它仅仅*几乎*是一切。


