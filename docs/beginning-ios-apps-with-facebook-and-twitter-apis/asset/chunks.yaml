    \ 类的工作原理。如果你还未阅读该章，现在不妨快速浏览一下，因为我们将通过一些新示例来演示如何从 Facebook 社交图谱中获取更多信息。不过，除非有新的内容需要讨论，否则我们将不再赘述技术细节。\n\
