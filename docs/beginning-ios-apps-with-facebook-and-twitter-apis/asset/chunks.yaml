    This code is also checking for `MKUserLocation` annotations. We won''t go into
    too much detail here, but you should note that the `FTLocationSimulator` class
    that we discussed earlier is designed to show the user''s location moving along
    the map by providing an `MKAnnotationView` for the map. You can see this in action
    in `FTLocationSimulator`''s `fakeUserLocationView` method:


    `- (MKAnnotationView*)fakeUserLocationView {`

    `    if (!self.mapView) {`

    `        return nil;`

    `    }`


    `    [self.mapView.userLocation setCoordinate:self.location.coordinate];`

    `    MKAnnotationView *userLocationView = [mapView`

    `       dequeueReusableAnnotationViewWithIdentifier:@"fakeLocationView"];`

    `    if (nil == userLocationView) {`

    `        userLocationView = [[MKAnnotationView alloc]`

    `                           initWithAnnotation:self.mapView.userLocation`

    `                              reuseIdentifier:@"fakeLocationView"];`

    `    }`

    `    UIImage *image = :[UIImage imageNamed:@"TrackingDot.png"];`

    `    UIImageView *imageView =`

    `                [[UIImageView alloc] initWithImage:image];`

    `    [userLocationView addSubview:imageView];`

    `    [imageView release];`

    `     userLocationView.centerOffset = CGPointMake(-10, -10);`

    `     return userLocationView;`

    `}`


    The final piece of the puzzle that we need to implement is the code that handles
    what happens when the user selects an annotation on the map. When this happens,
    `MKMapView` calls its delegate''s `mapView: didSelectAnnotationView:` method.
    We will use this method in our Facebook example to show how to check in a user
    to a place. Let''s take a look at that now.


    #### Facebook Places (Search), Check-ins (Getting and Posting), and Friends Nearby


    Within the Facebook app itself, checking into Places is done via the Nearby screen,
    which automatically searches for Places near your current location. If permission
    to use location services has not been granted to the Facebook application, it
    displays the following screen (see [Figure 9–25](#Chapter09.html#fig_9_25)).


    ![images](images/0925.jpg)


    **Figure 9–25.** *Location unavailable in the Check-Ins section of the Facebook
    iOS application*


    Assuming that permission to use location services has been granted to the Facebook
    application, you will see a list of returned place matches (see [Figure 9–26](#Chapter09.html#fig_9_26)),
    as well as detailed information for a place. This is how the Facebook application
    lets its user community manage places. A Place profile (which is essentially similar
    to a Facebook Page) is shown in [Figure 9–27](#Chapter09.html#fig_9_27); users
    can act upon places in the ways shown in [Figure 9–28](#Chapter09.html#fig_9_28).


    ![images](images/0926.jpg)


    **Figure 9–26.** *Searching for nearby places and events in Facebook''s iOS application*


    ![images](images/0927.jpg)


    **Figure 9–27.** *Detailed information about a place in Facebook''s iOS application*


    ![images](images/0928.jpg)


    **Figure 9–28.** *Flag a place in Facebook''s iOS application.*


    Within our sample app, we want to make it possible to let someone check into a
    place on Facebook. Recall that we set up our application to display a pin on the
    map. When the pin is selected by the user, `MKMapViewDelegate`''s `mapView:didSelectAnnotationView:`
    method is called. In our implementation of this in `MapViewController`, we issue
    a search request to Facebook to ask for a list of places around the location of
    the annotation. To issue a search request to Facebook, we simply set the graph
    path for Facebook''s `requestWithGraphPath:andParams:andDelegate:` method to `search`.
    The additional parameter to supply is a dictionary with values for `type`, `center`,
    and `distance` keys. The `MapViewController` class is an `FBRequestDelegate`,
    so we supply it as the delegate:


    `- (void)mapView:(MKMapView *)mapView`

    `    didSelectAnnotationView:(MKAnnotationView *)view`

    `{`

    `    NSString *centerString = [NSString stringWithFormat: @"%f,%f",`

    `        view.annotation.coordinate.latitude,`

    `        view.annotation.coordinate.longitude];`


    `    NSMutableDictionary *params =`

    `                [NSMutableDictionary dictionaryWithObjectsAndKeys:`

    `                @"place", @"type",`

    `                centerString, @"center",`

    `                @"1000", @"distance", // In Meters (1000m = 0.62mi)`

    `             nil];`


    `    [facebook requestWithGraphPath:@"search"`

    `                         andParams:params`

    `                       andDelegate:self];`

    `}`


    When the `FBRequestDelegate`''s `request:didLoad:` is called, the result parameter
    is a dictionary with an array of place dictionaries. Each `place` dictionary has
    an id; a category; a name; and a `location` dictionary with a city, country, state,
    latitude, and longitude:


    `{`

    `    data =     (`

    `                {`

    `            category = "Local business";`

    `            id = 151247078226083;`

    `            location =             {`

    `                city = "Monta Vista";`

    `                country = "United States";`

    `                latitude = "37.3316086";`

    `                longitude = "-122.05885";`

    `                state = CA;`

    `            };`

    `            name = "Somerset Square Park";`

    `        }`

    `        );`

    `}`


    In the following code, we take the first match from the array of dictionaries
    in the result and post a check-in to Facebook via this graph path:


