    All of the setup is now complete, so it''s time to write a simple test to see
    everything in action. The `test` class will test functionality in the `TwitterDataStore_SQLite`
    class, so it needs to own a `TwitterDataStore_SQLite` object. Open `OfflineTwitterTest.h`
    in the sample project and note the declaration of a `TwitterDataStore_SQLite`
    object:


    `#import <SenTestingKit/SenTestingKit.h>`


    `@class TwitterDataStore_SQLite; @interface OfflineTwitterTest : SenTestCase {`

    `@private`

    `    TwitterDataStore_SQLite *twitterDataStore;`

    `}`


    `@end`


    With most Unit Testing frameworks, test classes are given a chance to do some
    setup before the test is run and some cleanup after the test is finished. Unit
    Testing for iOS projects is no different. Before a test is run, the test class''s
    `setUp` method is called. After the test executes, the `tearDown` method is called.
    Open `OfflineTwitterTest.m` in the sample project and examine the implementation
    of these methods. Since this is a basic example, `setUp` instantiates the `TwitterDataStore_SQLite`
    object, and `tearDown` releases the object, so that the test doesn''t create a
    memory leak (which could cause other side effects). Depending on the nature of
    the code in an application, more code may be required for these methods. Generally,
    these methods should be reserved for code that is required for every test in the
    class:


    `- (void)setUp`

    `{`

    `    [super setUp];`


    `    // Set-up code here.`

    `    twitterDataStore = [[TwitterDataStore_SQLite alloc] init];`

    `}`


    `- (void)tearDown`

    `{`

    `    // Tear-down code here.`

    `    [twitterDataStore release];`


    `    [super tearDown];`

    `}`


    What follows is an actual test for the functionality of the `TwitterDataStore_SQLite`
    class. While there is the temptation to write Unit Tests for each method of a
    class, a better approach is to consider what the class is supposed to accomplish
    as a whole and write tests to validate its functionality. This also brings up
    the topic of naming tests. It is best to give tests useful, descriptive names
    so that other developers on a project will immediately know, just from the name,
    what the test is trying to validate. To that end, the test that follows is entitled
    `testItShouldSynchronizeTweets` to reflect the fact that one of `TwitterDataStore_SQLite`''s
    main responsibilities is to store and synchronize Tweets.


    The test first deletes any Tweets from `TwitterDataStore_SQLite`, so that it''s
    starting with a clean slate. This approach may not be necessary or desirable in
    all cases, and it should be adjusted on a class-by-class or application basis.
    Next, an `NSDictionary` is created to represent a dummy Tweet. Since `TwitterDataStore_SQLite`''s
    `synchronizeTweets`: method takes an `NSArray` as its only parameter, the `NSDictionary`
    for the Tweet is added to an `NSArray` object that is passed to `synchronizeTweets`:.
    `TwitterDataStore_SQLite`''s `tweet` method is then used to retrieve the stored
    Tweets, and a simple comparison is made to confirm that the datastore has a single
    Tweet. Depending on the test or application, additional validation could be added,
    such as whether or not the contents of the retrieved Tweet match what was put
    in the dictionary for the Tweet:


    `- (void)testItShouldSynchronizeTweets`

    `{`

    `    [twitterDataStore deleteTweets];`


    `    NSDictionary *tweetDictionary = [NSDictionary`

    `    dictionaryWithObjects:[NSArray arrayWithObjects:@"1", @"Tweet!", nil]`

    `    forKeys:[NSArray arrayWithObjects:@"id", @"text", nil]];`


    `    NSArray *newTweets = [NSArray arrayWithObject:tweetDictionary];`

    `    [twitterDataStore synchronizeTweets:newTweets];`


    `    NSArray *tweets = [twitterDataStore tweets];`

    `    STAssertTrue((1 == [tweets count]), @"Test error message");`

    `}`


    `@end`


    The great thing about tests like this is that they make it very easy to debug
    code under specific scenarios, without having to run the actual application and
    perform multiple steps within the user interface. Such an approach also makes
    testing repeatable, which is excellent when code needs to be refactored or optimized.
    And of course, it ensures that *regressions* (i.e., bugs introduced into code
    that was previously working as expected) are not introduced into the code when
    it is adjusted or goes through a major overhaul.


