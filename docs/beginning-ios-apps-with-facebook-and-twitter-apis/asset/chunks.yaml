    \ 和 Twitter 集成到应用中，但还有许多相关技术可以简化工作，或揭示其他应用如何完成特定任务。此外，一些跨平台发布库可以帮助你省去直接集成 Facebook\
    \ 和 Twitter SDK 的麻烦。本章将探讨这些主题。\n\n本章还将讨论 Twitter 提供的数据和趋势。除了标准的客户端 API，Twitter\
    \ 还向开发者开放了数据和趋势。Twitter Trends 是该网站用于衡量快速流行起来的话题（即话题标签）的工具——换句话说，就是热门新闻。如果你还没听说过\
    \ Trends 工具，可以在 Twitter.com 上查看这份概要：\n\n`http://yearinreview.twitter.com/trends/`\n\
    \n直接从应用程序内部访问这些趋势可能并不总是有意义的，而且 Twitter 的条款也限制了你使用其数据的某些方式；不过，研究这种服务器到服务器的交互或许会很有用。稍后你将学习如何利用这些数据进行自己的数值计算，并将所需内容提供给应用程序。\n\
    \n## 越短越好\n\n在引用网络资源时，一个常见的问题是这些资源的 URL 有时会非常长。这在将 Twitter 等服务集成到应用程序中时会产生问题，因为推文需要保持简短。例如，如果应用程序想允许用户分享一篇文章的推文，但文章\
    \ URL 的长度几乎占满了整条推文，或者完全无法放入推文，这对用户来说并不友好。\n\n这就是 URL 缩短服务发挥作用的地方。目前有许多可用的 URL\
    \ 缩短服务，包括 Twitter 自家的服务（在本书即将付印时宣布）。不过，第三方 URL 缩短服务提供了 Twitter 所不具备的功能（例如分析功能），因此我们将花时间讨论其中两种。我们还将介绍它们的工作原理以及如何将其集成到\
    \ iOS 应用中。请注意，并非所有服务都会永久运营；如果你在意链接的存档质量，请使用 Twitter 自家的缩短服务 T.co。\n\n以下是两种常见的第三方\
    \ URL 缩短服务：\n\n*   [`http://bit.ly`](http://bit.ly)\n*   [`http://TinyURL.com`](http://TinyURL.com)\n\
    \n这两种服务完全免费使用，且工作原理相同：你向服务提供一个 URL，它会返回一个缩短后的 URL。\n\n一个用于试验这些服务的有用工具是名为 `cURL`\
    \ 的命令行工具，你可以通过以下网址了解更多信息：\n\n`https://secure.wikimedia.org/wikipedia/en/wiki/CURL`\n\
    \n`cURL` 旨在支持多种互联网协议，但在本案例中，HTTP 是唯一相关的协议。要查看 `curl` 的实际应用，请在 Mac 上打开“终端”，并在命令行中输入以下内容：\n\
    \n```\n$ curl http://www.apress.com\n```\n\n这会将通常由网页浏览器处理并显示的 Apress 首页的所有 HTML\
    \ 写入命令行。\n\n对于 URL 缩短，你需要的不仅仅是一个 URL。URL 缩短服务要求将要缩短的 URL 作为参数包含在请求中。要向 URL 请求发送参数，请使用\
    \ `cURL` 的 `-d` 选项：\n\n```\n$ curl -d \"<请求参数>\" URL\n```\n\nTinyURL 的协议很简单。只需向\
    \ `http://tinyurl.com/api-create.php` 提交一个请求，其中包含一个 `url` 参数，该参数设置为你想要缩短的 URL：\n\
    \n```\n$ curl -d \"url=http://www.apress.com\" http://tinyurl.com/api-create.php\n\
    ```\n\n这将返回一个如下格式的缩短 URL：\n\n```\nhttp://tinyurl.com/9qths\n```\n\n当然，`www.apress.com`\
    \ 并不是一个真正需要缩短的 URL——但这只是一个示例。\n\nBit.ly 与 TinyURL 一样，可以缩短 URL；不过，它还能提供跟踪、分析、搜索历史以及更多关于其生成的缩短\
    \ URL 的服务。要充分利用 bit.ly，你需要在其网站上注册一个账户。完成注册后，bit.ly 会为账户关联一个 `apiKey`。使用其服务需要这个\
    \ `apiKey`。bit.ly 的协议要求向 `http://api.bitly.com/v3/shorten` 发送请求，并包含以下参数：\n\n*\
    \   `login`：一个 bit.ly 用户名（在创建账户时选择）\n*   `apiKey`：与所提供的用户名关联的 `api` 密钥（成功注册后由\
    \ bit.ly 生成）\n*   `longUrl`：要缩短的 URL\n*   `format`：期望的响应格式；支持的值包括 `json`（默认）、`xml`\
    \ 和 `txt`\n\n因此，使用 `cURL` 请求 bit.ly 缩短一个 URL 的示例如下：\n\n```\n$ curl -d \"login=<bit.ly\
    \ 用户名>&apiKey=<bit.ly API\n           密钥>&longUrl=http://www.apress.com&format=txt\"\
    \n           http://api.bitly.com/v3/shorten\n```\n\n这将返回一个如下格式的缩短 URL：\n\n```\n\
    http://bit.ly/dIB3mD\n\n关于 bit.ly API 的更多详细信息，请访问：\n\n`https://code.google.com/p/bitly-api/wiki/ApiDocumentation#/v3/shorten`\n\
    \n想要快速了解 URL 缩短背后的一些基础理论，可以阅读以下网址的文章《URL 缩短：哈希的实际应用》：\n\n`www.codinghorror.com/blog/2007/08/url-shortening-hashes-in-practice.html`\n\
    \n关于 `curl` 及其功能的更详细信息，请访问以下页面：\n\n`http://curl.haxx.se/docs/manpage.html`\n\n\
    或者，你也可以在命令行中直接输入：\n\n```\n$ man curl\n```\n\n### 在 iOS 中使用 URL 缩短服务\n\n`curl`\
    \ 是进行快速测试的好工具；但它无法在 iOS 应用中使用。尽管在 iOS 应用中有多种方式集成 URL 缩短服务，但最快的方法是使用 `NSString`\
    \ 的 `stringWithContentsOfURL` 方法。该方法接收一个 URL，完成所有发出请求的工作，并以 `NSString` 的形式返回响应。因此，对于\
    \ TinyURL，在 Objective-C 代码中使用 `NSString` 的 `stringWithContentsOfURL` 方法请求缩短 URL\
    \ 的示例如下：\n\n```\nNSString *longURL = @\"http://www.apress.com\";\nNSString *format\
    \ = @\"http://tinyurl.com/api-create.php?url=%@\";\nNSString *apiEndpoint = [NSString\
    \ stringWithFormat:format, longURL];\nNSString *shortURL =\n[NSString stringWithContentsOfURL:[NSURL\
    \ URLWithString:apiEndpoint]\n                         encoding:NSASCIIStringEncoding\
    \ error:nil];\n```\n\n请注意，`stringWithContentsOfURL` 会阻塞，直到收到响应。因此，根据使用此方法的应用程序的需求，可能值得在后台线程上调用此方法，或者跳过使用\
    \ `NSString` 的 `stringWithContentsOfURL`，然后通过 `NSURLRequest` 发出请求。\n"
- fmt: "# ShareKit: Sometimes Quick and Dirty Does the Trick\n\nOne of the main problems\
    \ with integrating social services into an application is that there are so many\
    \ social services proliferating online. Others have recognized this same problem\
    \ and have gone through the trouble of aggregating all of these services into\
    \ one library that applications can integrate with. One of the better aggregation\
    \ libraries out in the wild is ShareKit, which you can acquire at this URL:\n\n\
    `http://getsharekit.com/`\n\nShareKit is an open source Objective-C library that\
    \ makes it easy to integrate with the following services in our application:\n\
    \n- Delicious\n- Email\n- Facebook\n- Google Reader\n- Instapaper\n- Pinboard\n\
    - Read It Later\n- Tumblr\n- Twitter\n\nSince ShareKit is open source and hosted\
    \ on Github, the code can be cloned, forked, or reviewed at any time:\n\n`https://github.com/ideashower/sharekit/`\n\
    \nNote that the latest code on Github may not reflect what is in the current,\
    \ official release of ShareKit, so be careful. Downloading and using the official\
    \ version from the ShareKit site is highly recommended. At the time of writing,\
    \ the latest official release of ShareKit is version 0.2.1. The download for this\
    \ has been added to the source code repository for this book on Github, and it\
    \ can be found in the `ShareKit` directory.\n\nYou can also find a ShareKit sample\
    \ application in the source code repository (in the `Chapter10` directory). This\
    \ sample application uses the version of ShareKit that is also in the repository\
    \ we previously mentioned (0.2.1). The instructions that follow for integrating\
    \ with ShareKit refer to the sample application.\n\n## Getting Started with ShareKit\n\
    \nTo get started with ShareKit, first drag the `ShareKit` source code directory\
    \ into your project. This directory is located at the following path in the `Git`\
    \ repository for this book:\n\n`ShareKit/Classes/ShareKit`\n\nWhen dragging the\
    \ ShareKit folder into a project, choose the default options in the pop-up dialog,\
    \ as shown in [Figure 10–1](#Chapter10.html#fig_10_1).\n\n![images](images/1001.jpg)\n\
    \n**Figure 10–1.** *Choose the default options when dragging ShareKit into an\
    \ Xcode project.*\n\nNext, link the application against the following frameworks\
    \ (see [Figure 10–2](#Chapter10.html#fig_10_2)):\n\n- `SystemConfiguration.framework`\n\
    - `Security.framework`\n- `MessageUI.framework`\n\n![images](images/1002.jpg)\n\
    \n**Figure 10–2.** *Link the application against the appropriate frameworks.*\n\
    \nIn order for ShareKit to access the desired services, it has to know certain\
    \ information about accounts for those services. In the ShareKit sample project,\
    \ go to `SHKConfig.h`, enter the information for Facebook and Twitter, and turn\
    \ on debugging, as shown in [Figures 10–3](#Chapter10.html#fig_10_3) through 10–5.\n\
    \n![images](images/1003.jpg)\n\n**Figure 10–3.** *Set the application name and\
    \ URL in `SHKConfig.h`.*\n\n![images](images/1004.jpg)\n\n**Figure 10–4.** *Set\
    \ the application's Twitter OAuth credentials in `SHKConfig.h`.*\n\n![images](images/1005.jpg)\n\
    \n**Figure 10–5.** *Turn on debug logs in `SHKConfig.h`.*\n\nIntegrating ShareKit\
    \ with Facebook requires the Facebook OAuth consumer key and secret for an application;\
    \ similarly, integrating ShareKit with Twitter requires the Twitter OAuth consumer\
    \ key and secret for an application. In addition, Twitter requires a callback\
    \ URL. In order to set a callback URL for a Twitter application, the application\
    \ has to be created on Twitter as a browser application. This means that, if an\
    \ application was previously created on Twitter as a client application, that\
    \ application needs to be reconfigured as a browser application. Otherwise, you'll\
    \ need to create a new application. The actual URL that is entered for the Twitter\
    \ application does not matter. The only thing that matters is that the URL specified\
    \ in `SHKConfig.h` must match the URL specified on `Twitter.com`. An example would\
    \ look something like this:\n\n`www.apress.com/callback`\n\nWhen working with\
    \ Twitter, integration with bit.ly is required to post URLs since ShareKit uses\
    \ bit.ly under the covers to shorten URLs before posting them to Twitter. Creating\
    \ an application on bit.ly was covered previously in this chapter, so please refer\
    \ to that section for additional instructions.\n\nWith the account information\
    \ configured in the ShareKit header file, it's time to add code to the project\
    \ to use ShareKit to post to Facebook and Twitter. Go to `MainViewController.m`\
    \ in the ShareKit sample project and examine the `loadView` method. In this method,\
    \ a `UIToolbar` is added to the view controller's view and is given a `UIBarButtonSystemItem`\
    \ with the default action icon on the button, as shown in [Figure 10–6](#Chapter10.html#fig_10_6):\n\
    \n![images](images/1006.jpg)\n\n**Figure 10–6.** *The `UIToolBar` in ShareKit\
    \ with its default button*\n\n```\n- (void)loadView\n{\n    [super loadView];\n\
    \n    self.view.backgroundColor = [UIColor whiteColor];\n\n    UIBarButtonItem\
    \ *item = [[UIBarButtonItem alloc]\n        initWithBarButtonSystemItem:UIBarButtonSystemItemAction\n\
    \                             target:self\n                             action:@selector(share)];\n\
    \n    NSArray *items = [NSArray arrayWithObject:item];\n    [items addObject:item];\n\
    \    [item release];\n\n    CGRect frame = CGRectMake(0.0f,\n                \
    \              self.view.bounds.size.height-40.0f,\n                         \
    \     self.view.bounds.size.width,\n                              40.0f);\n  \
    \  toolbar = [[UIToolbar alloc] initWithFrame:frame];\n\n    [toolbar setItems:items\
    \ animated:YES];\n    [self.view addSubview:toolbar];\n    [toolbar release];\n\
    \n    [SHK flushOfflineQueue];\n}\n```\n\nSelecting the bar button calls the `share`\
    \ method, which displays an `SHKActionSheet` to the user:\n\n```\n- (void)share\n\
    {\n    // Create the item to share (in this example, a url)\n    NSURL *url =\
    \ [NSURL URLWithString:@\"http://www.apress.com\"];\n    SHKItem *item = [SHKItem\
    \ URL:url title:@\"Apress is Awesome!\"];\n\n    // Get the ShareKit action sheet\n\
    \    SHKActionSheet *actionSheet =\n        [SHKActionSheet actionSheetForItem:item];\n\
    \n    // Display the action sheet\n    [actionSheet showFromToolbar:toolbar];\n\
    }\n```\n\nAn `SHKActionSheet` is a nice pop-up presented to the user that displays\
    \ options for sharing information (see [Figure 10–7](#Chapter10.html#fig_10_7)).\n\
    \n![images](images/1007.jpg)\n\n**Figure 10–7.** *The `SHKActionSheet` pop-up*\n\
    \nClicking the Facebook button displays the familiar Facebook mobile web page\
    \ for posting (see [Figure 10–8](#Chapter10.html#fig_10_8)).\n\n![images](images/1008.jpg)\n\
    \n**Figure 10–8.** *You'll recognize the Facebook mobile web page for posting.*\n\
    \nClicking the Twitter button displays a nice dialog with a shortened URL (see\
    \ [Figure 10–9](#Chapter10.html#fig_10_9)).\n\n![images](images/1009.jpg)\n\n\
    **Figure 10–9.** *ShareKit's Twitter dialog*\n\nShareKit supports more than just\
    \ posting URLs and text, so it is worth exploring more of what it offers. It's\
    \ a very nicely crafted solution for integrating quickly with Facebook and Twitter."
  raw: '### ShareKit: Sometimes Quick and Dirty Does the Trick


    One of the main problems with integrating social services into an application
    is that there are so many social services proliferating online. Others have recognized
    this same problem and have gone through the trouble of aggregating all of these
    services into one library that applications can integrate with. One of the better
    aggregation libraries out in the wild is ShareKit, which you can acquire at this
    URL:


    `http://getsharekit.com/`


    ShareKit is an open source Objective-C library that makes it easy to integrate
    with the following services in our application:


    *   Delicious

    *   Email

    *   Facebook

    *   Google Reader

    *   Instapaper

    *   Pinboard

    *   Read It Later

    *   Tumblr

    *   Twitter


    Since ShareKit is open source and hosted on Github, the code can be cloned, forked,
    or reviewed at any time:


    `https://github.com/ideashower/sharekit/`


    Note that the latest code on Github may not reflect what is in the current, official
    release of ShareKit, so be careful. Downloading and using the official version
    from the ShareKit site is highly recommended. At the time of writing, the latest
    official release of ShareKit is version 0.2.1\. The download for this has been
    added to the source code repository for this book on Github, and it can be found
    in the `ShareKit` directory.


    You can also find a ShareKit sample application in the source code repository
    (in the `Chapter10` directory). This sample application uses the version of ShareKit
    that is also in the repository we previously mentioned (0.2.1). The instructions
    that follow for integrating with ShareKit refer to the sample application.


    #### Getting Started with ShareKit


    To get started with ShareKit, first drag the `ShareKit` source code directory
    into your project. This directory is located at the following path in the `Git`
    repository for this book:


    `ShareKit/Classes/ShareKit`


    When dragging the ShareKit folder into a project, choose the default options in
    the pop-up dialog, as shown in [Figure 10–1](#Chapter10.html#fig_10_1).


    ![images](images/1001.jpg)


    **Figure 10–1.** *Choose the default options when dragging ShareKit into an Xcode
    project.*


    Next, link the application against the following frameworks (see [Figure 10–2](#Chapter10.html#fig_10_2)):


    *   `SystemConfiguration.framework`

    *   Security.framework

    *   MessageUI.framework


    ![images](images/1002.jpg)


    **Figure 10–2.** *Link the application against the appropriate frameworks.*


    In order for ShareKit to access the desired services, it has to know certain information
    about accounts for those services. In the ShareKit sample project, go to `SHKConfig.h`,
    enter the information for Facebook and Twitter, and turn on debugging, as shown
    in [Figures 10–3](#Chapter10.html#fig_10_3) through 10–5.


    ![images](images/1003.jpg)


    **Figure 10–3.** *Set the application name and URL in SHKConfig.h.*


    ![images](images/1004.jpg)


    **Figure 10–4.** *Set the application''s Twitter OAuth credentials in SHKConfig.h.*


    ![images](images/1005.jpg)


    **Figure 10–5.** *Turn on debug logs in SHKConfig.h.*


    Integrating ShareKit with Facebook requires the Facebook OAuth consumer key and
    secret for an application; similarly, integrating ShareKit with Twitter requires
    the Twitter OAuth consumer key and secret for an application. In addition, Twitter
    requires a callback URL. In order to set a callback URL for a Twitter application,
    the application has to be created on Twitter as a browser application. This means
    that, if an application was previously created on Twitter as a client application,
    that application needs to be reconfigured as a browser application. Otherwise,
    you''ll need to create a new application. The actual URL that is entered for the
    Twitter application does not matter. The only thing that matters is that the URL
    specified in SHKConfig.h must match the URL specified on Twitter.com. An example
    would look something like this:


    `www.apress.com/callback`


    When working with Twitter, integration with bit.ly is required to post URLs since
    ShareKit uses bit.ly under the covers to shorten URLs before posting them to Twitter.
    Creating an application on bit.ly was covered previously in this chapter, so please
    refer to that section for additional instructions.


    With the account information configured in the ShareKit header file, it''s time
    to add code to the project to use ShareKit to post to Facebook and Twitter. Go
    to `MainViewController.m` in the ShareKit sample project and examine the `loadView`
    method. In this method, a `UIToolbar` is added to the view controller''s view
    and is given a `UIBarButtonSystemItem` with the default action icon on the button,
    as shown in [Figure 10–6](#Chapter10.html#fig_10_6):


    ![images](images/1006.jpg)


    **Figure 10–6.** *The UIToolBar in ShareKit with its default button*


    `- (void)loadView`

    `{`

    `    [super loadView];`


    `    self.view.backgroundColor = [UIColor whiteColor];`


    `    UIBarButtonItem *item = [[UIBarButtonItem alloc]`

    `        initWithBarButtonSystemItem:UIBarButtonSystemItemAction`

    `                             target:self`

    `                             action:@selector(share)];`


    `    NSArray *items = [NSArray arrayWithObject:item];`

    `    [items addObject:item];`

    `    [item release];`


    `    CGRect frame = CGRectMake(0.0f,`

    `                              self.view.bounds.size.height-40.0f,`

    `                              self.view.bounds.size.width,`

    `                              40.0f);`

    `    toolbar = [[UIToolbar alloc] initWithFrame:frame];`


    `    [toolbar setItems:items animated:YES];`

    `    [self.view addSubview:toolbar];`

    `    [toolbar release];`


    `    [SHK flushOfflineQueue];`

    `}`


    Selecting the bar button calls the `share` method, which displays an `SHKActionSheet`
    to the user:


    `- (void)share`

    `{`

    `    // Create the item to share (in this example, a url)`

    `    NSURL *url = [NSURL URLWithString:@"http://www.apress.com"];`

    `    SHKItem *item = [SHKItem URL:url title:@"Apress is Awesome!"];`


    `    // Get the ShareKit action sheet`

    `    SHKActionSheet *actionSheet =`

    `        [SHKActionSheet actionSheetForItem:item];`


    `    // Display the action sheet`

    `    [actionSheet showFromToolbar:toolbar];`

    `}`


    An `SHKActionSheet` is a nice pop-up presented to the user that displays options
    for sharing information (see [Figure 10–7](#Chapter10.html#fig_10_7)).


    ![images](images/1007.jpg)


    **Figure 10–7.** *The SHKActionSheet pop-up*


    Clicking the Facebook button displays the familiar Facebook mobile web page for
    posting (see [Figure 10–8](#Chapter10.html#fig_10_8)).


    ![images](images/1008.jpg)


    **Figure 10–8.** *You''ll recognize the Facebook mobile web page for posting.*


    Clicking the Twitter button displays a nice dialog with a shortened URL (see [Figure
    10–9](#Chapter10.html#fig_10_9)).


    ![images](images/1009.jpg)


    **Figure 10–9.** *ShareKit''s Twitter dialog*


    ShareKit supports more than just posting URLs and text, so it is worth exploring
    more of what it offers. It''s a very nicely crafted solution for integrating quickly
    with Facebook and Twitter.'
  trans: "\n# ShareKit：有时“快速且粗糙”反而奏效\n\n将社交服务集成到应用程序中的主要问题之一是，网络上涌现的社交服务实在太多。其他人也意识到了同样的问题，并费心将所有服务整合到一个库中，供应用程序集成。目前较为出色的聚合库之一是\
    \ ShareKit，你可以通过以下网址获取：\n\n`http://getsharekit.com/`\n\nShareKit 是一个开源的 Objective-C\
    \ 库，它让我们能轻松地在应用中集成以下服务：\n\n-   Delicious\n-   Email\n-   Facebook\n-   Google\
    \ Reader\n-   Instapaper\n-   Pinboard\n-   Read It Later\n-   Tumblr\n-   Twitter\n\
    \n由于 ShareKit 是开源的，并且托管在 Github 上，因此其代码可以随时被克隆、分支或审查：\n\n`https://github.com/ideashower/sharekit/`\n\
    \n请注意，Github 上的最新代码可能与 ShareKit 当前官方发布版本的内容不一致，因此请务必小心。强烈建议从 ShareKit 网站下载并使用其官方版本。在撰写本文时，ShareKit\
    \ 最新的官方版本是 0.2.1。此版本的下载文件已添加至本书在 Github 上的源代码仓库中，你可以在 `ShareKit` 目录中找到它。\n\n你还可以在源代码仓库（位于\
    \ `Chapter10` 目录）中找到 ShareKit 的示例应用程序。该示例程序使用的是我们之前提到的仓库中的 ShareKit 版本（0.2.1）。以下关于集成\
    \ ShareKit 的说明均参照该示例程序。\n\n## 开始使用 ShareKit\n\n要开始使用 ShareKit，首先将 `ShareKit` 源代码目录拖入你的项目中。该目录位于本书\
    \ `Git` 仓库的以下路径：\n\n`ShareKit/Classes/ShareKit`\n\n将 ShareKit 文件夹拖入项目时，在弹出的对话框中选择默认选项，如图\
    \ 10-1 所示。\n\n![images](img/1001.jpg)\n\n**图 10-1.** *将 ShareKit 拖入 Xcode 项目时选择默认选项。*\n\
    \n接下来，将应用程序链接到以下框架（参见图 10-2）：\n\n-   `SystemConfiguration.framework`\n-   `Security.framework`\n\
    -   `MessageUI.framework`\n\n![images](img/1002.jpg)\n\n**图 10-2.** *将应用程序链接到相应的框架。*\n\
    \n为了让 ShareKit 能够访问所需的服务，它必须知道这些服务的某些账户信息。在 ShareKit 示例项目中，转到 `SHKConfig.h`，输入\
    \ Facebook 和 Twitter 的信息，并开启调试功能，如图 10-3 至 10-5 所示。\n\n![images](img/1003.jpg)\n\
    \n**图 10-3.** *在 `SHKConfig.h` 中设置应用程序名称和 URL。*\n\n![images](img/1004.jpg)\n\n\
    **图 10-4.** *在 `SHKConfig.h` 中设置应用程序的 Twitter OAuth 凭证。*\n\n![images](img/1005.jpg)\n\
    \n**图 10-5.** *在 `SHKConfig.h` 中开启调试日志。*\n\n将 ShareKit 与 Facebook 集成需要应用程序的 Facebook\
    \ OAuth 消费者密钥（consumer key）和密钥（secret）；同样地，将与 Twitter 集成需要应用程序的 Twitter OAuth\
    \ 消费者密钥和密钥。此外，Twitter 还需要一个回调 URL。要为 Twitter 应用程序设置回调 URL，该应用程序必须在 Twitter 上被创建为浏览器应用程序。这意味着，如果应用之前是在\
    \ Twitter 上作为客户端应用程序创建的，则需要将其重新配置为浏览器应用程序。否则，你需要创建一个新的应用程序。实际输入给 Twitter 应用程序的\
    \ URL 并不重要。唯一重要的是，在 `SHKConfig.h` 中指定的 URL 必须与在 `Twitter.com` 上指定的 URL 一致。示例如下：\n\
    \n`www.apress.com/callback`\n\n处理 Twitter 时，需要集成 bit.ly 来发布 URL，因为 ShareKit 在底层使用\
    \ bit.ly 将 URL 缩短后再发布到 Twitter。本章前面已介绍过如何在 bit.ly 上创建应用程序，请参考该章节获取更多说明。\n\n在 ShareKit\
    \ 头文件中配置好账户信息后，接下来就该向项目添加代码，使用 ShareKit 发布内容到 Facebook 和 Twitter。转到 ShareKit 示例项目中的\
    \ `MainViewController.m`，查看 `loadView` 方法。在此方法中，将一个 `UIToolbar` 添加到视图控制器的视图中，并为其添加一个带有默认操作图标的\
    \ `UIBarButtonSystemItem` 按钮，如图 10-6 所示：\n\n![images](img/1006.jpg)\n\n**图 10-6.**\
    \ *ShareKit 中带有默认按钮的 `UIToolBar`*\n\n```\n- (void)loadView\n{\n    [super loadView];\n\
    \n    self.view.backgroundColor = [UIColor whiteColor];\n\n    UIBarButtonItem\
    \ *item = [[UIBarButtonItem alloc]\n        initWithBarButtonSystemItem:UIBarButtonSystemItemAction\n\
    \                             target:self\n                             action:@selector(share)];\n\
    \n    NSArray *items = [NSArray arrayWithObject:item];\n    [items addObject:item];\n\
    \    [item release];\n\n    CGRect frame = CGRectMake(0.0f,\n                \
    \              self.view.bounds.size.height-40.0f,\n                         \
    \     self.view.bounds.size.width,\n                              40.0f);\n  \
    \  toolbar = [[UIToolbar alloc] initWithFrame:frame];\n\n    [toolbar setItems:items\
    \ animated:YES];\n    [self.view addSubview:toolbar];\n    [toolbar release];\n\
    \n    [SHK flushOfflineQueue];\n}\n```\n\n选择工具栏按钮会调用 `share` 方法，该方法会向用户显示一个 `SHKActionSheet`：\n\
    \n```\n- (void)share\n{\n    // Create the item to share (in this example, a url)\n\
    \    NSURL *url = [NSURL URLWithString:@\"http://www.apress.com\"];\n    SHKItem\
    \ *item = [SHKItem URL:url title:@\"Apress is Awesome!\"];\n\n    // Get the ShareKit\
    \ action sheet\n    SHKActionSheet *actionSheet =\n        [SHKActionSheet actionSheetForItem:item];\n\
    \n    // Display the action sheet\n    [actionSheet showFromToolbar:toolbar];\n\
    }\n```\n\n`SHKActionSheet` 是一个漂亮的弹出窗口，向用户展示分享信息的选项（参见图 10-7）。\n\n![images](img/1007.jpg)\n\
    \n**图 10-7.** *`SHKActionSheet` 弹出窗口*\n\n点击 Facebook 按钮会显示熟悉的 Facebook 移动网页发布界面（参见图\
    \ 10-8）。\n\n![images](img/1008.jpg)\n\n**图 10-8.** *你会认出这是用于发布的 Facebook 移动网页。*\n\
    \n点击 Twitter 按钮会显示一个带有短链接的精美对话框（参见图 10-9）。\n\n![images](img/1009.jpg)\n\n**图 10-9.**\
    \ *ShareKit 的 Twitter 对话框*\n\nShareKit 不仅支持发布 URL 和文本，还支持更多功能，因此值得深入探索。它是一个精心打造的解决方案，能让你快速集成\
    \ Facebook 和 Twitter。\n"
- fmt: '### All the Latest Twitter Trends


    It''s always interesting to think about what people are Tweeting about in general
    within a specific geographic area or during a given time period. Twitter makes
    this data available via its trends API. Accessing these trends is very straightforward
    and does not require any authentication; however, be aware that the usage of these
    APIs is always subject to Twitter''s rate limiting. This data can be accessed
    directly from within an iOS app or from server-to-server, depending on the needs
    of your application.


    Twitter returns trends based on Twitter hash tags. Recall that Twitter hash tags
    are a means for Twitter users to associate or group Tweets together. For instance,
    assume a Twitter user wanted to Tweet about unicorns, so that his Tweet would
    be included whenever someone wanted to search for or see trends for Tweets about
    unicorns. In this case, he would include the hash tag `#unicorns` in his Tweet.


    There are a few different ways to use the trends API. To obtain the top ten topics
    that are currently trending on Twitter, you can use the following request:


    `http://api.twitter.com/1/trends.json`


    The quickest way to see what this returns is to use `curl` again:


    ```

    $ curl http://api.twitter.com/1/trends.json

    {"trends":[

    {"url":"http:\/\/search.twitter.com\/search?q=%23thatminiheartattackwhen","name":"#thatminiheartattackwhen"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23urnotmytypeif","name":"#urnotmytypeif"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23starship","name":"#starship"},

    {"url":"http:\/\/search.twitter.com\/search?q=Seth+Meyers","name":"Seth Meyers"},

    {"url":"http:\/\/search.twitter.com\/search?q=Jos%C3%A9+Aldo","name":"Jos\u00e9Aldo"},

    {"url":"http:\/\/search.twitter.com\/search?q=Catcher+Freeman","name":"CatcherFreeman"},

    {"url":"http:\/\/search.twitter.com\/search?q=Green+Men","name":"Green Men"},

    {"url":"http:\/\/search.twitter.com\/search?q=Steven+Seagal","name":"StevenSeagal"},

    {"url":"http:\/\/search.twitter.com\/search?q=Glenn+Healy","name":"Glenn Healy"},

    {"url":"http:\/\/search.twitter.com\/search?q=Karate+Kid","name":"Karate Kid"}],"as_of":"Sun,
    01 May 2011 03:35:42 +0000"}

    ```


    This returns a dictionary that contains an array of trends and an `as_of` date
    for when this trend snapshot was taken. Each trend in the array of trends contains
    the following:


    * `name`: The hash tag for the trend.

    * `url`: The URL to the Twitter search results page for that topic.


    The same information can be obtained via the following request:


    ```

    $ curl http://api.twitter.com/1/trends/current.json?exclude=#unicorns

    ```


    Note that the `trends/current` API allows for excluding Twitter hash tags from
    the results. Also note that the Twitter search URL is not included with each individual
    trend:


    ```

    {"trends":{"2011-05-01 03:32:19":[

    {"promoted_content":null,"events":null,"query":"#thatminiheartattackwhen","name":"#thatminiheartattackwhen"},

    {"promoted_content":null,"events":null,"query":"#urnotmytypeif","name":"#urnotmytypeif"},

    {"promoted_content":null,"events":null,"query":"#starship","name":"#starship"},

    {"promoted_content":null,"events":null,"query":"Seth Meyers","name":"Seth Meyers"},

    {"promoted_content":null,"events":null,"query":"Jos\u00e9 Aldo","name":"Jos\u00e9Aldo"},

    {"promoted_content":null,"events":null,"query":"Catcher Freeman","name":"CatcherFreeman"},

    {"promoted_content":null,"events":null,"query":"Green Men","name":"Green Men"},

    {"promoted_content":null,"events":null,"query":"StevenSeagal","name":"Steven Seagal"},

    {"promoted_content":null,"events":null,"query":"Glenn Healy","name":"GlennHealy"},

    {"promoted_content":null,"events":null,"query":"Karate Kid","name":"Karate Kid"}]},"as_of":1304220739}

    ```


    ### Trending Topics


    Twitter also makes available the top 20 trending topics for each hour in a given
    day:


    ```

    $ curl http://api.twitter.com/1/trends/daily.json?date=2011-04-29&exclude=#unicorns

    ```


    The response includes a `trends` dictionary, where each trend is a dictionary
    where the key is a given hour for the day in question, the value of which is the
    array of trends for that time of the given day:


    ```

    {"trends":{

    "2011-04-29 07:00":[<array of trends>],

    "2011-04-29 20:00":[<array of trends>]},

    "as_of":1304223220}

    ```


    Note that Twitter only makes this data available as far back as the last seven
    to ten days. If the `date` parameter of the request is set to a day for which
    no data is available, Twitter returns the following:


    ```

    {"errors":[{"code":35,"message":"Trend data not available"}]}

    ```


    Similarly, Twitter makes available the top 30 trending topics for each day in
    a given week, going back three to four weeks:


    ```

    $ curl curl http://api.twitter.com/1/trends/weekly.json?date=2011-04-21&exclude=#unicorns

    ```


    The response includes a `trends` dictionary where each trend is a dictionary and
    where the key is a given week, the value of which is the array of trends for that
    week:


    ```

    {"trends":{

    "2011-04-16":[<array of trends>],

    "2011-04-17":[<array of trends>]},

    "as_of":1304223220}

    ```


    For daily and weekly trends, if a date in the future is specified, Twitter will
    return the trends for the current date.'
