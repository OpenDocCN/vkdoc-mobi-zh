    \       \"utc_offset\" = \"-18000\";\n        verified = false;\n    };\n    \"\
    sender_id\" = 103384600;\n    \"sender_screen_name\" = christhepiss;\n    \"source_api_request_type\"\
    \ = 15;\n    text = \"hey jerky!\";\n}\n```\n\n`MGTwitterEngine` SDK 缺少一个用于轻松构建推文或私信的对话框类，因此这部分工作需要你自行构建。:(\
    \ 别忘了查看 `MGTwitterEngine.h` 中更多可用的方法，我们在这里并未全部覆盖。\n\n### 幕后原理：Twitter URL\n\n\
    上述所有操作的一个优点是，它们共享底层 Twitter HTTP API 的通用 URL 模式：\n\n`http://twitter.com/`\n\n\
    URL 的剩余路径部分根据你的具体操作来构建。对于状态相关操作，路径为：\n\n`http://twitter.com/statuses`\n\n对于用户相关操作，路径为：\n\
    \n`http://twitter.com/users`\n\n对于私信，路径为：\n\n`http://twitter.com/direct_messages`\n\
    \n路径的最后一部分是你要执行的特定操作。其后是扩展名（与期望的响应格式匹配），然后是参数。因此，如果我们想要以 XML 格式获取公共时间线（`MGTwitterEngine`\
    \ 默认请求 XML 响应），它将如下所示：\n\n`http://twitter.com/statuses/public_timeline.xml`\n\n\
    如果你希望更详细地了解每个请求的最终 URL 是如何构建的，可以查阅 `SA_OAuthTwitterEngine` 的 `_sendRequestWithMethod:`\
    \ 方法中的代码。\n\n### Twitter 开发者控制台\n\n如果你更倾向于在 web 浏览器中使用 Twitter API，Twitter 提供了一个非常优秀的在线工具，我们强烈推荐。该工具可通过以下\
    \ URL 访问：\n\n`http://dev.twitter.com/console`\n\nTwitter 开发者控制台允许你构建不同的请求或进行不同类型的发布，并查看\
    \ Twitter 的响应。图 7–7 展示了页面的主要部分。\n\n![images](img/0707.jpg)\n\n**图 7–7.** *Twitter\
    \ API 控制台*\n\n另一个优秀的资源是每个 Twitter HTTP API 的文档，你可以在其中获得使用每个 API 的详细说明：\n\n`http://dev.twitter.com/doc`\n\
    \n### 结语\n\n现在，你已经正式武装完毕，具备了很强的能力。我们已经涵盖了 Facebook 和 Twitter 的足够多的 API，并向你展示了如何将它们与相应的\
    \ iOS SDK 结合使用。理论上，你现在就可以开始构建自己的 Facebook 或 Twitter 应用了。这是一项相当艰巨的任务，但你已经拥有了完成它的工具。不过，请继续阅读，以更深入地了解实时数据和位置处理，以及如何以不同方式将这两个\
    \ API 融合在一起。\n\n## 第 8 章\n\n## POST 请求、数据建模与离线处理\n\n本章将介绍向 Facebook 和 Twitter\
    \ 发布照片的具体细节。我们还将讨论离线存储；最后，会介绍一个流行的跨平台发布库，以及如何在自己的项目中使用它。\n\n到目前为止，我们已经在 iOS 上涵盖了关于\
    \ Facebook 和 Twitter 编程的许多不同主题。然而，为了尽可能清晰地展示这些主题，我们打破了一些良好的编程实践。因此在本章中，我们将纠正这些做法，并展示将这些服务集成到应用程序中的更好技术。我们还将涵盖离线场景和存储。但在进入这些话题之前，我们需要为工具包再添加一项基本技能：向\
    \ Facebook 和 Twitter 发布照片。\n\n### 摆个姿势\n\n对于大多数在 iOS 设备上使用图片的应用程序而言，图片要么从网络下载，要么由应用程序创建并作为应用数据的一部分存储。也可以从设备的“照片图库”中获取图片。幸运的是，苹果让从“照片图库”获取图片变得很容易，因此我们的示例应用程序将采用这种方式。本章的照片上传示例应用程序分别位于\
    \ Git 仓库的 `Chapter8` 文件夹下的 `ApiFacebook` 和 `ApiTwitter` 文件夹中。\n"
- fmt: "#### Saving a Picture to the iOS Simulator’s Photo Library\n\nGetting pictures\
    \ into an iOS simulator’s Photo Library is tricky since the simulators do not\
    \ emulate camera hardware; however, there’s a nice, quick way to do it by saving\
    \ an image from a web page. Begin by firing up the Safari browser on the simulator\
    \ and going to [`www.google.com`](http://www.google.com). Hold your mouse down\
    \ for a second or two on the Google image above the search bar, and then let your\
    \ mouse go. You will see the pop-up dialog in [Figure 8–1](#Chapter08.html#fig_8_1)\
    \ that lets you save or copy the image. Select Save Image to store it in the simulator’s\
    \ Photo Library.\n\n![images](images/0801.jpg)\n\n**Figure 8–1.** *Tap and hold\
    \ an image on a web page in Mobile Safari to save or copy the image.*\n\n**NOTE:**\
    \ It has been our experience that sometimes you have to carry out the just described\
    \ step a couple of times before the image shows up in the Photo Library.\n\n####\
    \ Working with UIImagePickerController\n\nNow that we have an image saved in the\
    \ simulator’s Photo Library, we need to access the image from within our code.\
    \ This is where the `UIImagePickerController` class comes into play. The engineers\
    \ at Apple crafted a very easy-to-use class to grab images from the Photo Library\
    \ and use the data for the image within your application as a `UIImage` object.\
    \ The following code fragment can be dropped into any `UIViewController` class\
    \ that you may have in order to display the `UIImagePickerController`. In the\
    \ next section, we will go over how we incorporated this fragment into the sample\
    \ applications for this chapter.\n\nWe begin by checking to see if the Photo Library\
    \ is an accessible source of images. Next, we create a `UIImagePickerController`\
    \ and tell it that we want it to use the Photo Library as its source. Finally,\
    \ we set ourselves as its delegate and use `UIViewController`’s `presentModalViewController`\
    \ method to display it:\n\n```\nif ([UIImagePickerController isSourceTypeAvailable:\n\
    \    UIImagePickerControllerSourceTypePhotoLibrary]) {\n        UIImagePickerController\
    \ *uiImagePickerController =\n                                     [[UIImagePickerController\
    \ alloc] init];\n        uiImagePickerController.sourceType =\n            UIImagePickerControllerSourceTypePhotoLibrary;\n\
    \        uiImagePickerController.delegate = self;\n        [self presentModalViewController:uiImagePickerController\
    \ animated:YES];\n        [uiImagePickerController release];\n}\n```\n\nWhen working\
    \ with `UIImagePickerController`, we must set our view controller to be a `UIImagePickerControllerDelegate`\
    \ and implement the following method:\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info;\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
    \ *)picker;\n```\n\nWhen an image is chosen, `UIImagePickerControllerDelegate`’s\
    \ `imagePickerController:didFinishPickingMediaWithInfo:` method is called. The\
    \ data for the `UIImage` object is stored in the `NSDictionary` that is passed\
    \ to this method in the key `UIImagePickerControllerOriginalImage`. Here’s the\
    \ code to accomplish all this (note that `savedImage` is declared elsewhere):\n\
    \n```\n- (void)imagePickerController:(UIImagePickerController *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info\n{\n    [savedImage release];\n    savedImage = [info objectForKey:@\"\
    UIImagePickerControllerOriginalImage\"];\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nIt’s worth noting that you are responsible for closing the `UIImagePickerController`\
    \ via `UIViewController`’s `dismissModalViewControllerAnimated` method:\n\n```\n\
    - (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n{\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nAt runtime, the\
    \ `UIImagePickerController` displays a table of the Photo albums on the device,\
    \ as shown in [Figure 8–2](#Chapter08.html#fig_8_2).\n\n![images](images/0802.jpg)\n\
    \n**Figure 8–2.** *A table of saved photos presented by UIImagePickerController*\n\
    \nOnce you select an album, you can then select a photo, as seen in [Figure 8–3](#Chapter08.html#fig_8_3).\n\
    \n![images](images/0803.jpg)\n\n**Figure 8–3.** *Tap an image in UIImagePickerController.*\n\
    \n#### ImagePostController\n\nIn the `ApiFacebook` and `ApiTwitter` sample projects\
    \ for this chapter, you will find a new `UIViewController` entitled `ImagePostController`.\
    \ It contains a button that displays the `UIImagePickerController` when clicked.\
    \ `ImagePostController` is a `UIImagePickerControllerDelegate`; thus, when an\
    \ image is selected, it saves the image to the `UIImage` object `savedImage`,\
    \ which is declared in `ImagePostController.h`. `ImagePostController` then posts\
    \ the image to the currently logged in user’s Facebook photos or Twitter feed.\n\
    \n#### Facebook Photo Upload\n\nWe covered how to retrieve the `UIImage` via the\
    \ delegate callback in the previous section, so now we’re going to focus on posting\
    \ the picture to the user’s Facebook photos. The code discussed next is in `ImagePostController.m/.h`\
    \ in the ApiFacebook sample application for this chapter.\n\nTo do this, we are\
    \ going to use our old trusted friend, `requestWithGraphPath:andParams:andHttpMethod:andDelegate:`.\
    \ We set the graph path to `\"me/photos\"` in order to specify that we are targeting\
    \ the current user’s photos. We then pass in a dictionary of arguments. This dictionary\
    \ is where the data for the picture is stored. The image itself is stored as an\
    \ object for the key `image` in the dictionary. If you would like to put a caption\
    \ with the image, you can also add caption text for the key `message`. Next, we\
    \ set the HTTP method to `POST` since we are posting data. Finally, we assign\
    \ ourselves as an `FBRequestDelegate`:\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [savedImage\
    \ release];\n    savedImage = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    [self dismissModalViewControllerAnimated:YES];\n\n    NSMutableDictionary\
    \ *args = [[NSMutableDictionary alloc] init];\n    [args setObject:@\"This is\
    \ a test image\" forKey:@\"message\"];\n    [args setObject:savedImage forKey:@\"\
    image\"];\n    [facebook requestWithGraphPath:@\"me/photos\"\n               \
    \        andParams:args\n                   andHttpMethod:@\"POST\"\n        \
    \             andDelegate:self];\n    [args release];\n}\n```\n\nIf successfully\
    \ posted, `FBRequestDelegate`’s `request:didLoad:` method will be called. If you\
    \ log into your Facebook account, you should see a new Photo album with the image\
    \ contained in it. The name of the Photo album will match the application name\
    \ you used when you registered your application with Facebook. In the case of\
    \ this book, the Photo album is entitled, “Beginning iOS Social Development” (see\
    \ [Figure 8–4](#Chapter08.html#fig_8_4)).\n\n![images](images/0804.jpg)\n\n**Figure\
    \ 8–4.** *Facebook groups together photos posted from third-party applications.*"
  raw: '#### Saving a Picture to the iOS Simulator’s Photo Library


    Getting pictures into an iOS simulator’s Photo Library is tricky since the simulators
    do not emulate camera hardware; however, there’s a nice, quick way to do it by
    saving an image from a web page. Begin by firing up the Safari browser on the
    simulator and going to [`www.google.com`](http://www.google.com). Hold your mouse
    down for a second or two on the Google image above the search bar, and then let
    your mouse go. You will see the pop-up dialog in [Figure 8–1](#Chapter08.html#fig_8_1)
    that lets you save or copy the image. Select Save Image to store it in the simulator’s
    Photo Library.


    ![images](images/0801.jpg)


    **Figure 8–1.** *Tap and hold an image on a web page in Mobile Safari to save
    or copy the image.*


    **NOTE:** It has been our experience that sometimes you have to carry out the
    just described step a couple of times before the image shows up in the Photo Library.


    #### Working with UIImagePickerController


    Now that we have an image saved in the simulator’s Photo Library, we need to access
    the image from within our code. This is where the `UIImagePickerController` class
    comes into play. The engineers at Apple crafted a very easy-to-use class to grab
    images from the Photo Library and use the data for the image within your application
    as a `UIImage` object. The following code fragment can be dropped into any `UIViewController`
    class that you may have in order to display the `UIImagePickerController`. In
    the next section, we will go over how we incorporated this fragment into the sample
    applications for this chapter.


    We begin by checking to see if the Photo Library is an accessible source of images.
    Next, we create a `UIImagePickerController` and tell it that we want it to use
    the Photo Library as its source. Finally, we set ourselves as its delegate and
    use `UIViewController`’s `presentModalViewController` method to display it:


    `if ([UIImagePickerController isSourceTypeAvailable:`


    `UIImagePickerControllerSourceTypePhotoLibrary]) {`

    `        UIImagePickerController *uiImagePickerController =`

    `                                             [[UIImagePickerController alloc]
    init];`

    `        uiImagePickerController.sourceType =`


    `UIImagePickerControllerSourceTypePhotoLibrary;`

    `        uiImagePickerController.delegate = self;`

    `        [self presentModalViewController:uiImagePickerController animated:YES];`

    `        [uiImagePickerController release];`

    `}`


    When working with `UIImagePickerController`, we must set our view controller to
    be a `UIImagePickerControllerDelegate` and implement the following method:


    `- (void)imagePickerController:(UIImagePickerController *)picker`![images](images/U002.jpg)

    ` didFinishPickingMediaWithInfo:(NSDictionary *)info;`


    `- (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker;`


    When an image is chosen `,UIImagePickerControllerDelegate`’s `imagePickerController:
    didFinishPickingMediaWithInfo:` method is called. The data for the `UIImage` object
    is stored in the `NSDictionary` that is passed to this method in the key, `UIImagePickerControllerOriginalImage`.
    Here’s the code to accomplish all this (note that `savedImage` is declared elsewhere):


    `- (void)imagePickerController:(UIImagePickerController *)picker`![images](images/U002.jpg)

    ` didFinishPickingMediaWithInfo:(NSDictionary *)info`

    `{`

    `    [savedImage release];`

    `    savedImage = [info objectForKey:@"UIImagePickerControllerOriginalImage"];`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    It’s worth noting that you are responsible for closing the `UIImagePickerController`
    via `UIViewController`’s `dismissModalViewControllerAnimated` method:


    `- (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker`

    `{`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    At runtime, the `UIImagePickerController` displays a table of the Photo albums
    on the device, as shown in [Figure 8–2](#Chapter08.html#fig_8_2).


    ![images](images/0802.jpg)


    **Figure 8–2.** *A table of saved photos presented by UIImagePickerController*


    Once you select an album, you can then select a photo, as seen in [Figure 8–3](#Chapter08.html#fig_8_3).


    ![images](images/0803.jpg)


    **Figure 8–3.** *Tap an image in UIImagePickerController.*


    #### ImagePostController


    In the `ApiFacebook` and `ApiTwitter` sample projects for this chapter, you will
    find a new `UIViewController` entitled `ImagePostController`. It contains a button
    that `displays` the `UIImagePickerController` when clicked. `ImagePostController`
    is a `UIImagePickerControllerDelegate`; thus, when an image is selected, it saves
    the image to the `UIImage` object, savedImage, which is declared in `ImagePostController.h`.
    `ImagePostController` then posts the image to the currently logged in user’s Facebook
    photos or Twitter feed.


    #### Facebook Photo Upload


    We covered how to retrieve the `UIImage` via the delegate callback in the previous
    section, so now we’re going to focus on posting the picture to the user’s Facebook
    photos. The code discussed next is in `ImagePostController.m/.h` in the ApiFacebook
    sample application for this chapter.


    To do this, we are going to use our old trusted friend, `requestWithGraphPath:andParams:andHttpMethod:andDelegate:.`
    We set the graph path to `"me/photos"` in order to specify that we are targeting
    the current user’s photos. We then pass in a dictionary of arguments. This dictionary
    is where the data for the picture is stored. The image itself is stored as an
    object for the key `image` in the dictionary. If you would like to put a caption
    with the image, you can also add caption text for the key `message`. Next, we
    set the HTTP method to `POST` since we are posting data. Finally, we assign ourselves
    as an `FBRequestDelegate`:


    `- (void)imagePickerController:(UIImagePickerController *)picker`


    `didFinishPickingMediaWithInfo:(NSDictionary *)info`

    `{`

    `    [savedImage release];`

    `    savedImage = [info objectForKey:@"UIImagePickerControllerOriginalImage"];`

    `    [self dismissModalViewControllerAnimated:YES];`


    `    NSMutableDictionary *args = [[NSMutableDictionary alloc] init];`

    `    [args setObject:@"This is a test image" forKey:@"message"];`

    `    [args setObject:savedImage forKey:@"image"];`

    `    [facebook requestWithGraphPath:@"me/photos"`

    `                                       andParams:args`

    `                                 andHttpMethod:@"POST"`

    `                                     andDelegate:self];`

    `    [args release];`

    `}`


    If successfully posted, `FBRequestDelegate`’s `request:didLoad:` method will be
    called. If you log into your Facebook account, you should see a new Photo album
    with the image contained in it. The name of the Photo album will match the application
    name you used when you registered your application with Facebook. In the case
    of this book, the Photo album is entitled, “Beginning iOS Social Development”
    (see [Figure 8–4](#Chapter08.html#fig_8_4)).


    ![images](images/0804.jpg)


    **Figure 8–4.** *Facebook groups together photos posted from third-party applications.*'
  trans: "\n#### 将图片保存到 iOS 模拟器的相册\n\n将图片存入 iOS 模拟器的相册有点棘手，因为模拟器无法模拟相机硬件；不过，有一种快捷方法可以通过保存网页中的图片来实现。首先，在模拟器中启动\
    \ Safari 浏览器，访问 [`www.google.com`](http://www.google.com)。在搜索栏上方的 Google 图标上按住鼠标一至两秒，然后松开鼠标。您将看到\
    \ 图 8-1 中所示的弹出对话框，允许您保存或复制图片。选择**存储图像**，即可将图片保存到模拟器的相册中。\n\n![images](img/0801.jpg)\n\
    \n**图 8-1.** *在移动版 Safari 中长按网页上的图片，即可保存或复制该图片。*\n\n**注意：** 根据我们的经验，有时需要重复上述步骤数次，图片才会出现在相册中。\n\
    \n#### 使用 UIImagePickerController\n\n现在，我们已在模拟器的相册中保存了一张图片，接下来需要在代码中访问该图片。这正是\
    \ `UIImagePickerController` 类发挥作用的地方。Apple 的工程师精心打造了一个非常易于使用的类，用于从相册中获取图片，并在应用中将其数据作为\
    \ `UIImage` 对象使用。您可以将以下代码片段插入到任何 `UIViewController` 类中，以显示 `UIImagePickerController`。在下一节中，我们将介绍如何将此代码片段整合到本章的示例应用中。\n\
    \n首先，我们检查相册是否是可访问的图片来源。接着，创建一个 `UIImagePickerController`，并告知它我们希望使用相册作为图片来源。最后，将自身设置为其委托，并使用\
    \ `UIViewController` 的 `presentModalViewController` 方法来显示它：\n\n```\nif ([UIImagePickerController\
    \ isSourceTypeAvailable:\n    UIImagePickerControllerSourceTypePhotoLibrary])\
    \ {\n        UIImagePickerController *uiImagePickerController =\n            \
    \                         [[UIImagePickerController alloc] init];\n        uiImagePickerController.sourceType\
    \ =\n            UIImagePickerControllerSourceTypePhotoLibrary;\n        uiImagePickerController.delegate\
    \ = self;\n        [self presentModalViewController:uiImagePickerController animated:YES];\n\
    \        [uiImagePickerController release];\n}\n```\n\n在使用 `UIImagePickerController`\
    \ 时，我们必须将视图控制器设置为 `UIImagePickerControllerDelegate`，并实现以下方法：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info;\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
    \ *)picker;\n```\n\n当选择一张图片时，会调用 `UIImagePickerControllerDelegate` 的 `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 方法。`UIImage` 对象的数据存储在传递给该方法的 `NSDictionary` 中，键值为 `UIImagePickerControllerOriginalImage`。以下是实现这一切的代码（请注意，`savedImage`\
    \ 已在别处声明）：\n\n```\n- (void)imagePickerController:(UIImagePickerController *)picker\n\
    \    didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [savedImage release];\n\
    \    savedImage = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n值得注意的是，您有责任通过\
    \ `UIViewController` 的 `dismissModalViewControllerAnimated` 方法来关闭 `UIImagePickerController`：\n\
    \n```\n- (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n运行时，`UIImagePickerController`\
    \ 会显示设备上的相册列表，如 图 8-2 所示。\n\n![images](img/0802.jpg)\n\n**图 8-2.** *UIImagePickerController\
    \ 显示的已保存照片列表*\n\n选择相册后，您便可以从中选择一张照片，如 图 8-3 所示。\n\n![images](img/0803.jpg)\n\n\
    **图 8-3.** *在 UIImagePickerController 中点击一张图片。*\n\n#### ImagePostController\n\n\
    在本章的 `ApiFacebook` 和 `ApiTwitter` 示例项目中，您将找到一个名为 `ImagePostController` 的新 `UIViewController`。它包含一个按钮，点击后会显示\
    \ `UIImagePickerController`。`ImagePostController` 是一个 `UIImagePickerControllerDelegate`；因此，当选择一张图片时，它会将图片保存到在\
    \ `ImagePostController.h` 中声明的 `UIImage` 对象 `savedImage` 中。然后，`ImagePostController`\
    \ 会将图片发布到当前登录用户的 Facebook 照片或 Twitter 信息流中。\n\n#### Facebook 照片上传\n\n上一节我们介绍了如何通过委托回调获取\
    \ `UIImage`，现在我们将重点放在如何将图片发布到用户的 Facebook 照片中。接下来讨论的代码位于本章 ApiFacebook 示例应用的 `ImagePostController.m/.h`\
    \ 文件中。\n\n为此，我们将使用老朋友 `requestWithGraphPath:andParams:andHttpMethod:andDelegate:`\
    \ 方法。我们将图形路径设置为 `\"me/photos\"`，以指定目标为当前用户的照片。然后传入一个参数字典。该字典用于存储图片数据。图片本身作为键 `image`\
    \ 的对象存储在字典中。如果您想为图片添加说明文字，还可以为键 `message` 添加说明文本。接着，由于我们是在发布数据，因此将 HTTP 方法设置为\
    \ `POST`。最后，我们将自身指定为 `FBRequestDelegate`：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [savedImage\
    \ release];\n    savedImage = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    [self dismissModalViewControllerAnimated:YES];\n\n    NSMutableDictionary\
    \ *args = [[NSMutableDictionary alloc] init];\n    [args setObject:@\"This is\
    \ a test image\" forKey:@\"message\"];\n    [args setObject:savedImage forKey:@\"\
    image\"];\n    [facebook requestWithGraphPath:@\"me/photos\"\n               \
    \        andParams:args\n                   andHttpMethod:@\"POST\"\n        \
    \             andDelegate:self];\n    [args release];\n}\n```\n\n如果发布成功，将调用 `FBRequestDelegate`\
    \ 的 `request:didLoad:` 方法。如果登录到您的 Facebook 帐户，您应该会看到一个新的相册，其中包含这张图片。该相册的名称将与您在\
    \ Facebook 上注册应用时使用的应用名称一致。以本书为例，相册名称为“Beginning iOS Social Development”（见图 8-4）。\n\
    \n![images](img/0804.jpg)\n\n**图 8-4.** *Facebook 将来自第三方应用的照片归类在一起。*\n"
- fmt: '# Twitter Photo Upload


    As is usually the case, the Facebook iOS SDK spoils us rotten. As you can tell
    from the previous section, it takes a minimal amount of effort to incorporate
    posting images to a user’s Facebook photos. Unfortunately, it’s not so simple
    to accomplish the same task via Twitter, although as of this writing, Twitter
    is forging a partnership with Photobucket to make posting photo-Tweets less of
    a hassle for developers. In this chapter we will show you how to post your image
    to an image-hosting service such as TwitPic (`www.twitpic.com/`), and then post
    the URL for the image on twitpic.com to the user’s Twitter timeline. The following
    example code uses TwitPic, but there are a number of other services available,
    such as twitgoo (`www.twitgoo.com/`) and yfrog (`www.yfrog.com/`).


    In order to post images to twitpic.com, we must first register on the service’s
    site for a TwitPic API Key. Go to `http://dev.twitpic.com/apps/new` and log in
    with your Twitter credentials (see Figures 8–5 and 8–6).


    ![images](images/0805.jpg)


    **Figure 8–5.** *Register for a TwitPic API Key to use the company’s service from
    within an iOS application.*


    ![images](images/0806.jpg)


    **Figure 8–6.** *Granting TwitPic access via OAuth*


    Next, enter the required information about your application (see Figure 8–7).


    ![images](images/0807.jpg)


    **Figure 8–7.** *Providing TwitPic with basic application information*


    Finally, store the returned TwitPic API Key for use later (see Figure 8–8).


    ![images](images/0808.jpg)


    **Figure 8–8.** *Upon successful registration, `TwitPic` creates an `API key`
    for the application.*


    As is the norm for such services, TwitPic offers an HTTP-based API to post photos
    to its site. The API documentation is located at `http://dev.twitpic.com/docs/`.
    Also, as fate would have it, someone was nice enough to build an iOS Objective-C
    wrapper around this API and host it on Github (`GSTwitPicEngine`) at `https://github.com/Gurpartap/GSTwitPicEngine`.
    `GSTwitPicEngine` is designed to work with `MGTwitterEngine`, so it fits nicely
    (with a few adjustments—more on this to follow) into the setup that we already
    have. Unfortunately, `GSTwitPicEngine` depends on a few other pieces of software,
    and not everything works correctly out-of-the-box. The good news: We were nice
    enough to smooth out all of the rough edges for you.


    So, before we look at how to use `GSTwitPicEngine`, we have to get some code for
    other libraries from Github, set up Git submodules, and then add the files to
    our project. All of the project changes and code are in the `ApiTwitter` project
    for this chapter and its `ImagePostController.m/.h` files.


    ## GSTwitPicEngine


    You can link the `GSTwitPicEngine` iOS Git repository on Github to your repository
    using a Git submodule that will reside in a subdirectory entitled `GSTwitPicEngine`:

    ```

    $ git submodule add git://github.com/chrisdannen/GSTwitPicEngine.git GSTwitPicEngine

    ```

    Create a new group in your project entitled `GSTwitPicEngine` and drag `GSTwitPicEngine.m/.h`
    to it:


    Finally, set the following values in `GSTwitPicEngine.h`:

    ```

    #define TWITTER_OAUTH_CONSUMER_KEY @"<>"

    #define TWITTER_OAUTH_CONSUMER_SECRET @"<>"

    #define TWITPIC_API_KEY @"<>"

    ```


    ## ASIHTTPRequest


    `ASIHTTPRequest` is an open source library that makes the work of implementing
    HTTP requests a snap. `GSTwitPicEngine` uses this library to do its heavy lifting.


    Link the `ASIHTTPRequest` Objective-C Git repository on Github to your repository
    using a Git submodule that will reside in a subdirectory entitled `asi-http-request`:

    ```

    $ git submodule add git://github.com/pokeb/asi-http-request.git asi-http-request

    ```

    Now create a new group in your project entitled `ASIHttpRequest` and drag the
    necessary files from `./asi-http-request/Classes` to your project. Review the
    `ApiTwitter` sample project for this chapter for the specific subset of files
    that you will need.


    Next, link your target in your Xcode project against `CFNetwork`, `SystemConfiguration`,
    `MobileCoreServices`, and `zlib.1.2.3.dylib`. (see Figure 8–9).


    ![images](images/0809.jpg)


    **Figure 8–9.** *Update linker settings after adding `ASIHTTPRequest` to the Xcode
    project.*


    ## SBJSON


    SBJSON is one of a few open source JSON parsing Objective-C frameworks. In `./GSTwitPicEngine/GSTwitPicEngine.h`,
    we specify SBJSON as our JSON framework of choice, so we need to have the files
    in our project:

    ```

    #define TWITPIC_USE_SBJSON 1

    ```

    Link the SBJSON Objective-C Git repository on Github to your repository using
    a Git submodule that will reside in a subdirectory entitled `json-framework`:

    ```

    $ git submodule add git://github.com/stig/json-framework.git json-framework

    ```

    Next, create a new group in your project entitled `SBJSON` and drag all of the
    files from `./json-framework/Classes` to your project.


    ## OARequestHeader


    Link the `OARequestHeader` Objective-C Git repository on Github to your repository
    using a Git submodule that will reside in a subdirectory entitled `OARequestHeader`:

    ```

    $ git submodule add git://github.com/chrisdannen/OARequestHeader.git OARequestHeader

    ```

    Create a new group in your project entitled `OARequestHeader` and drag the files
    `./OARequestHeader.m/.h` to your project.


    Now add any updated files to your Git commit (your Xcode project file, for instance),
    and then commit and push your changes to Github.'
