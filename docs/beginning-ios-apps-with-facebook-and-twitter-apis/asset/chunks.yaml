    When you use the Facebook SDK’s `dialog:` method to create a dialog and pass it
    an action, this action gets added to the dialog URL, and the SDK also adds required
    parameters such as the version of the Facebook SDK, the display style, and a redirect
    URI. For a bare bones `feed` dialog, the final request looks like this:


    `https://m.facebook.com/dialog/feed?sdk=2&redirect_uri=fbconnect%3A%2F%2Fsuccess&app_id=114442211957627&display=touch`


    We’ve included the actual `dialog:` method here, so that you can see how it presets
    some of the parameters for the dialog URL, creates the dialog, and then shows
    it. Note that the final dialog URL is constructed in `FBDialog`’s `generateURL:`
    method:


    `- (void)dialog:(NSString *)action`

    `     andParams:(NSMutableDictionary *)params`

    `   andDelegate:(id <FBDialogDelegate>)delegate {`


    `  [_fbDialog release];`


    `  NSString *dialogURL = [kDialogBaseURL stringByAppendingString:action];`

    `  [params setObject:@"touch" forKey:@"display"];`

    `  [params setObject:kSDKVersion forKey:@"sdk"];`

    `  [params setObject:kRedirectURL forKey:@"redirect_uri"];`


    `  if (action == kLogin) {     [params setObject:@"user_agent" forKey:@"type"];`

    `    _fbDialog = [[FBLoginDialog alloc] initWithURL:dialogURL`

    `        loginParams:params delegate:self];`

    `  } else {`

    `    [params setObject:_appId forKey:@"app_id"];`

    `    if ([self isSessionValid]) {`

    `      [params setValue:[self.accessToken`

    `      stringByReplacingPercentEscapesUsingEncoding:NSUTF8StringEncoding]`

    `                                            forKey:@"access_token"];`

    `    }`

    `    _fbDialog = [[FBDialog alloc] initWithURL:dialogURL`

    `                                       params:params`

    `                                     delegate:delegate];`

    `  }`


    `  [_fbDialog show];`

    `}`


    #### Posting to Facebook and Authorization


    Before we move onto other feats of magic and wonder, we’d like to mention that,
    if your main goal is to let users share information from your app or the web to
    their Facebook page, it really is as simple as integrating with the Facebook iOS
    SDK in general—as we’ve shown here when using the `dialog:` method. In fact, you
    don’t even have to worry about doing any separate authorization calls since Facebook
    will handle this for you via various web redirects when you request a dialog without
    authorization. When you request a dialog without authorization, the dialog will
    *automagically* bring the user to the Facebook mobile `OAuth` authorization page
    (see [Figure 7–4](#Chapter07.html#fig_7_4)). Once the user logs in, he will be
    redirected back to the original dialog that you requested. It really doesn’t get
    any easier than that, does it?


    ![images](images/0704.jpg)


    **Figure 7–4.** *The Facebook OAuth login view*


    We would also like to point out that posting to Facebook does not require extended
    permissions, so you get this feature for free. What this means in practical terms
    is that you don’t have to pass in any extra permissions to the `authorize:` call
    that we covered in [Chapter 5](#Chapter05.html#ch5) if you are using that method
    of authorization.'
  trans: "\n我们首先要承认，起初我们也不知道该如何理解这个响应；不过，我们做了一些深入研究，所以你很幸运。结果发现，URL 中的 `post_id` 参数包含了两条独立的标识信息，它们用下划线连接在一起。以下是\
    \ `post_id` 参数的定义：\n\n`post_id=<userIdentifier>_<postIdentifier>`\n\n在这个例子中，`userIdentifier`\
    \ 表示通过我们的应用发布帖子的已登录用户的 Facebook Graph 路径。同样，`postIdentifier` 表示该帖子的 Facebook Graph\
    \ 路径标识符。如果你从 `post_id` 参数中解析出这两条信息，就可以将它们放入以下 URL 格式中，以查看实际结果：\n\n`www.facebook.com/<userIdentifier>/posts/<postIdentifier>`\n\
    \n掌握了这些知识后，你可以通过将用户引导至正确构建的 URL（如下所示）来向她展示她在 Facebook 移动网站上的实际帖子：\n\n`www.facebook.com/623441509/posts/10150094754996510`\n\
    \n最后需要注意的是，如果用户选择通过右上角的 X 按钮关闭对话框，则会调用带有空 `NSURL` 对象作为参数的 `dialogDidNotCompleteWithUrl:`\
    \ 委托方法，随后会调用 `dialogDidNotComplete:`。\n\n## 底层机制：FBDialog 类\n\n如果你觉得上一节太简单了，那你的感觉没错。我们向\
    \ Facebook 的工程师致敬，他们让这个过程尽可能轻松。一个好的 SDK 拥有经过深思熟虑、易于使用的方法，能最大程度地简化操作。\n\n鉴于我们在上一章讨论过\
    \ `FBRequest` 类的工作原理，那么将信息发布到 Facebook 最终也是通过基于 HTTP 的 API 完成，这应该不足为奇。不过，Facebook\
    \ 的工程师再次展现了风度，他们在 SDK 中提供了 `FBDialog` 类来完成所有繁重的工作。\n\n`FBDialog` 类的代码可以在所有示例项目的\
    \ FBConnect 文件夹中的 `FBDialog.m` 和 `FBDialog.h` 文件中找到。仅仅通过检查 `FBDialog` 类的声明，就能学到很多有趣的东西：\n\
    \n```\n@interface FBDialog : UIView <UIWebViewDelegate> {\n  id<FBDialogDelegate>\
    \ _delegate;\n  NSMutableDictionary *_params;\n  NSString * _serverURL;\n  NSURL*\
    \ _loadingURL;\n  UIWebView* _webView;\n  UIActivityIndicatorView* _spinner;\n\
    \  UIImageView* _iconView;\n  UILabel* _titleLabel;\n  UIButton* _closeButton;\n\
    \  UIDeviceOrientation _orientation;\n  BOOL _showingKeyboard;\n\n  // 确保对话框后的\
    \ UI 元素被禁用。\n  UIView* _modalBackgroundView;\n}\n@end\n```\n\n首先值得注意的两点是：`FBDialog`\
    \ 只是一个 `UIView`，并且它拥有一个模态背景视图：\n\n```\n// 确保对话框后的 UI 元素被禁用。\nUIView* _modalBackgroundView;\n\
    ```\n\n为什么 `FBDialog` 类只是一个普通的 `UIView`？而且，为什么一个对话框类内部要包含类似模态背景视图的东西？难道 iOS SDK\
    \ 不是已经有一个用于显示模态弹出对话框的类了吗？\n\n虽然这很理想，但事实证明 iOS SDK 并没有提供现成的解决方案来显示模态弹出对话框。这意味着开发者需要自己动手实现。最可靠的方法就是创建一个与整个应用程序框架大小相同的视图，这样用户就无法与模态弹出对话框“后面”的任何内容进行交互。相关代码位于\
    \ `FBDialog` 的 `show:` 方法中，如果你需要在你的应用程序中实现类似功能，这段代码会很有用（请注意，我们已经在 `FBDialog` 的\
    \ `init:` 方法中创建了 `_modalBackgroundView` 对象）：\n\n```\nUIWindow* window = [UIApplication\
    \ sharedApplication].keyWindow;\nif (!window) {\n    window = [[UIApplication\
    \ sharedApplication].windows objectAtIndex:0];\n}\n\n_modalBackgroundView.frame\
    \ = window.frame;\n[_modalBackgroundView addSubview:self];\n[window addSubview:_modalBackgroundView];\n\
    \n[window addSubview:self];\n```\n\n`FBDialog` 谜题的另一个重要部分是它拥有一个 `UIWebView`，并且是\
    \ `UIWebViewDelegate`：\n\n```\nUIWebView* _webView;\n```\n\n事实证明，这个 `UIWebView`\
    \ 负责处理 `FBDialog` 中大部分内容的渲染魔法。`FBDialog` 的主要内容实际上是通过其对话框 URL 从 Facebook 通过网络获取的，并显示在\
    \ `FBDialog` 的 `UIWebView` 中。具体来说，它有一个移动版本的对话框 URL，定义在 `Facebook.m` 中：\n\n```\n\
    static NSString* kDialogBaseURL = @\"https://m.facebook.com/dialog/\";\n```\n\n\
    当你使用 Facebook SDK 的 `dialog:` 方法创建一个对话框并传入一个操作时，这个操作会被添加到对话框 URL 中，同时 SDK 还会添加必要的参数，例如\
    \ Facebook SDK 版本、显示样式和重定向 URI。对于一个基本的 `feed` 对话框，最终的请求如下所示：\n\n`https://m.facebook.com/dialog/feed?sdk=2&redirect_uri=fbconnect%3A%2F%2Fsuccess&app_id=114442211957627&display=touch`\n\
    \n我们在这里包含了实际的 `dialog:` 方法，这样你可以看到它如何预设对话框 URL 的一些参数、创建对话框，然后显示它。请注意，最终的对话框 URL\
    \ 是在 `FBDialog` 的 `generateURL:` 方法中构建的：\n\n```\n- (void)dialog:(NSString *)action\n\
    \     andParams:(NSMutableDictionary *)params\n   andDelegate:(id <FBDialogDelegate>)delegate\
    \ {\n\n  [_fbDialog release];\n\n  NSString *dialogURL = [kDialogBaseURL stringByAppendingString:action];\n\
    \  [params setObject:@\"touch\" forKey:@\"display\"];\n  [params setObject:kSDKVersion\
    \ forKey:@\"sdk\"];\n  [params setObject:kRedirectURL forKey:@\"redirect_uri\"\
    ];\n\n  if (action == kLogin) {\n    [params setObject:@\"user_agent\" forKey:@\"\
    type\"];\n    _fbDialog = [[FBLoginDialog alloc] initWithURL:dialogURL\n     \
    \   loginParams:params delegate:self];\n  } else {\n    [params setObject:_appId\
    \ forKey:@\"app_id\"];\n    if ([self isSessionValid]) {\n      [params setValue:[self.accessToken\n\
    \      stringByReplacingPercentEscapesUsingEncoding:NSUTF8StringEncoding]\n  \
    \                                          forKey:@\"access_token\"];\n    }\n\
    \    _fbDialog = [[FBDialog alloc] initWithURL:dialogURL\n                   \
    \                    params:params\n                                     delegate:delegate];\n\
    \  }\n\n  [_fbDialog show];\n}\n```\n\n## 发布到 Facebook 与授权\n\n在我们继续讨论其他神奇的功能之前，我们想指出，如果你的主要目标是让用户从你的应用程序或网页分享信息到他们的\
    \ Facebook 页面，那么它实际上就像集成 Facebook iOS SDK 一样简单——正如我们在这里使用 `dialog:` 方法所展示的那样。事实上，你甚至不必担心单独进行授权调用，因为当你请求一个未经授权的对话框时，Facebook\
    \ 会通过各种网页重定向为你处理这些。当你请求一个未经授权的对话框时，该对话框会*自动*将用户带到 Facebook 移动端 `OAuth` 授权页面（参见图\
    \ 7–4）。一旦用户登录，他就会被重定向回你最初请求的对话框。真的没有比这更简单的方法了，不是吗？\n\n![images](img/0704.jpg)\n\
    \n**图 7–4.** *Facebook OAuth 登录视图*\n\n我们还想指出，发布到 Facebook 不需要扩展权限，因此你可以免费获得此功能。这在实践中的意思是，如果你使用的是我们在第\
    \ 5 章中介绍的授权方法，那么你不需要向 `authorize:` 调用传递任何额外的权限。\n"
- fmt: "# Getting More Goodies from the Facebook Graph\n\nAs you can see, we’re going\
    \ to great lengths in this book to not only give you a solid understanding of\
    \ how to use the Facebook iOS SDK in your application, but also to explain what\
    \ it’s doing under the covers. In [Chapter 6](#Chapter06.html#ch6), we showed\
    \ you the technical details of how to retrieve your list of Facebook friends,\
    \ covered how the nuts and bolts of how Facebook Graph paths are structured, and\
    \ explained how the `FBRequest` class works. If you haven’t already read that\
    \ chapter, it might be a good idea to skim it over now because we’re going to\
    \ run through some new examples of how to retrieve additional information from\
    \ the Facebook Social Graph. This time, however, we will leave out the technical\
    \ details unless there is something new to discuss.\n\nRemember that fetching\
    \ information from the Facebook graph is accomplished via the `requestWithGraphPath:`\
    \ method of the Facebook class in the Facebook iOS SDK.\n\nThis example illustrates\
    \ how to accomplish that basic task:\n\n```\nNSMutableDictionary *params = [NSMutableDictionary\
    \ dictionary];\n//does not require extended permissions\n[facebook requestWithGraphPath:@\"\
    me/friends\"\n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\nThe string that you pass to this method uses the following format:\n\n\
    ```\n<facebook_id>/<requested graph path>\n```\n\nIn this case, it will retrieve\
    \ the list of friends for the currently logged in user:\n\n```\nme/friends\n```\n\
    \nNotice our code comment. Requesting friends does not require any extended permissions\
    \ when you authorize the user via `OAuth`, as described in [Chapter 5](#Chapter05.html#ch5).\n\
    \n**NOTE:** You can find the code for these examples in the `viewDidLoad:` method\
    \ in the `FriendsViewController` class in the sample app.\n\nIf you want to fetch\
    \ someone’s news feed, then change the graph path to `home`:\n\n```\nNSMutableDictionary\
    \ *params = [NSMutableDictionary dictionary];\n[facebook requestWithGraphPath:@\"\
    me/home\"\n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\nThis returns an array of dictionaries. Each dictionary contains information\
    \ about one item in the news feed. The dictionary for each item will contain keys\
    \ for the creation time, the post id, the content of the message, the type (e.g.,\
    \ status), actions for commenting or liking, and comments:\n\n```\n{\n    actions\
    \ =     (\n        {\n          link = \"http://www.facebook.com/<facebook id>/posts/<post\
    \ id>\";\n          name = Comment;\n        },\n        {\n          link = \"\
    http://www.facebook.com/<facebook id>/posts/<post id>\";\n          name = Like;\n\
    \        }\n    );\n    \"created_time\" = \"2011-02-28T02:23:08+0000\";\n   \
    \ from =     {\n        id = <facebook id>;\n        name = \"<facebook name>\"\
    ;\n    };\n    id = \"<post id>\";\n    message = \"....\";\n    type = status;\n\
    \    \"updated_time\" = \"2011-02-28T02:23:08+0000\";\n}\n```\n\nFetching notes\
    \ requires the extended permission `user_notes`, and the graph path is `notes`\
    \ (see [Figure 7–5](#Chapter07.html#fig_7_5)):\n\n![images](images/0705.jpg)\n\
    \n**Figure 7–5.** *Requesting permission*\n\n```\nNSMutableDictionary *params\
    \ = [NSMutableDictionary dictionary];\n// requires 'user_notes' extended permissions\n\
    [facebook requestWithGraphPath:@\"me/notes\" andParams:params andDelegate:self];\n\
    ```\n\nThis returns an array of dictionaries. Each dictionary contains information\
    \ about one of the user’s notes. The dictionary for each note will contain keys\
    \ for the creation time, the note id, the content of the note/message, and comments:\n\
    \n```\n{\n    comments =     {\n        data =         (\n            {\n    \
    \            \"created_time\" = \"2009-08-02T13:41:44+0000\";\n              \
    \  from =    {\n                    Id = <facebook id>;\n                    name\
    \ = \"<facebook name>\";\n                    };\n                    id = \"\
    <post id>\";\n                    message = \"<comment>\";\n                },\n\
    \                {\n                        \"created_time\" = \"2009-08-02T13:43:01+0000\"\
    ;\n                    from =    {\n                        id = <facebook id>;\n\
    \                        name = \"<facebook name>\";\n                };\n   \
    \                 id = \"<post id>\";\n                    message = \"<comment>\"\
    ;\n            }\n        );\n    };\n    \"created_time\" = \"2009-08-02T13:23:35+0000\"\
    ;\n    from =     {\n        id = <facebook id>;\n            name = \"<facebook\
    \ name>\";\n    };\n    icon = \"http://static.ak.fbcdn.net/rsrc.php/v1/yY/r/1gBp2bDGEuh.gif\"\
    ;\n    id = <note id>;\n    message = \"<note contents>\";\n    subject = quotes;\n\
    \    \"updated_time\" = \"2010-05-14T01:35:42+0000\";\n}\n```\n\nFetching events\
    \ requires the extended permission `user_events`, and the graph path is `events`\
    \ (see [Figure 7–5](#Chapter07.html#fig_7_5)):\n\n```\nNSMutableDictionary *params\
    \ = [NSMutableDictionary dictionary];\n// requires 'user_events' extended permissions\n\
    [facebook requestWithGraphPath:@\"me/events\" andParams:params andDelegate:self];\n\
    ```\n\nThis returns an array of dictionaries. Each dictionary contains information\
    \ about one of the user’s events. The dictionary for each event will contain keys\
    \ for the start and end time, the event id, the name of the event, the location,\
    \ and the user’s RSVP status:\n\n```\n{\n    \"end_time\" = \"2011-03-10T13:00:00+0000\"\
    ;\n    id = 106092242803326;\n    location = \"Electric Pickle\";\n    name =\
    \ \"WMC :: GODFATHER *James Brown Tribute* meets CHAMPION SOUND\";\n    \"rsvp_status\"\
    \ = unsure;\n    \"start_time\" = \"2011-03-10T06:00:00+0000\";\n}\n```\n\nFetching\
    \ groups requires the extended permission `user_groups`, and the graph path is\
    \ `groups` (see [Figure 7–5](#Chapter07.html#fig_7_5)):\n\n```\nNSMutableDictionary\
    \ *params = [NSMutableDictionary dictionary];\n//requires 'user_groups' extended\
    \ permissions\n[facebook requestWithGraphPath:@\"me/groups\" andParams:params\
    \ andDelegate:self];\n```\n\nThis returns an array of dictionaries. Each dictionary\
    \ contains information about one of the user’s groups. The dictionary for each\
    \ group will contain keys for the id of the group, the group name, and the group\
    \ version:\n\n```\n{\n    id = 166023750105785;\n    name = \"SkateSide Events\"\
    ;\n    version = 1;\n}\n```\n\nFetching likes, movies, music, and books requires\
    \ the extended permission `user_likes`, and the graph path is `likes`, `movies`,\
    \ `music`, or `books`, respectively (see [Figure 7–5](#Chapter07.html#fig_7_5)).\n\
    \nEach request returns an array of dictionaries. Each dictionary contains information\
    \ about one of the user’s likes, movies, music, or books. The dictionary for each\
    \ item will contain keys for the category, creation time, Facebook id, and name.\
    \ For example, this code returns information about the user’s likes:\n\n```\n\
    NSMutableDictionary *params = [NSMutableDictionary dictionary];\n// requires 'user_likes'\
    \ extended permissions\n[facebook requestWithGraphPath:@\"me/likes\"\n       \
    \              andParams:params\n                   andDelegate:self];\n```\n\n\
    ```\n{\n    category = \"Product/service\";\n    \"created_time\" = \"2011-02-23T00:09:34+0000\"\
    ;\n    id = 186242738068007;\n    name = AAdvantage;\n}\n```\n\nSimilarly, this\
    \ code returns information about the user’s movies:\n\n```\n[facebook requestWithGraphPath:@\"\
    me/movies\"\n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\n```\n{\n    category = Movie;\n    \"created_time\" = \"2010-12-28T18:50:40+0000\"\
    ;\n    id = 104167709618686;\n    name = \"Ferris Bueller's Day Off\";\n}\n```\n\
    \nThis code returns information about the user’s music:"
