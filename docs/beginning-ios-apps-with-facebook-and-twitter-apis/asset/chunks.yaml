- fmt: '#### Tweetin'' With Location


    When it comes to Twitter, the main thing that you will want to enable in your
    application is the ability to let users associate a location with their Tweets.
    We''ve set up the `ApiTwitter` example for this chapter to resemble the `ApiFacebook`
    application, so we''re going to skip over some setup since it was covered in the
    previous sections. At this point, the `LocationController` class has been incorporated,
    we are simulating locations via `FTLocationSimulator`, and we''re using our `MapViewController`
    to display a map with an annotation. The only difference is what we do when the
    user selects the annotation.


    Twitter has done a great job documenting its geo-location API, and we encourage
    you to familiarize yourself with Twitter''s underlying HTTP API here:


    `http://dev.twitter.com/doc/get/geo`


    Until now, we''ve been using XML as our format when working with Twitter''s APIs;
    however, the Twitter geo-location APIs only return results in `JSON` format. In
    addition, the base URL for a location is the updated Twitter URL that follows,
    where `1` is the version of the API:


    `http://api.twitter.com/1/`


    In order to get a feel for working with these APIs, open up a browser to apigee.com''s
    Twitter console (see [Figure 9–35](#Chapter09.html#fig_9_35)). This is a very
    useful tool for experimenting with Twitter''s API and getting your feet wet:


    `https://apigee.com/console/twitter` ![images](images/0935.jpg)


    **Figure 9–35.** *Apigee''s Twitter console*


    Since Twitter''s geo-location API only returns results in JSON format, we have
    to update `MGTwitterEngine` to work with the `SBJSON` library, which is an easy
    to use Objective-C drop-in for working with `JSON`. First, in `MGTwitterEngine.m`,
    we have to make sure that we set the URL format to `JSON` and import `JSON.h`:


    ```

    #elif SBJSON_AVAILABLE

            #define API_FORMAT @"json"

            #import "JSON.h"

    #else

    ```


    We also have to update the default Twitter domain:


    ```

    #define TWITTER_DOMAIN          @"api.twitter.com/1"

    ```


    Next, we have to tell `MGTwitterEngine` to work with `JSON` when it parses the
    data for a connection. The data in the response is first converted to its `JSON`
    string representation, and the `JSON` is converted into an `NSArray` or `NSDictionary`
    using the `NSString` category method `JSONValue`, which is defined in the `SBJSON`
    library:


    ```

    #elif SBJSON_AVAILABLE

    - (void)_parseDataForConnection:(MGTwitterHTTPURLConnection *)connection

    {

        NSString *identifier = [[[connection identifier] copy] autorelease];

        NSData *jsonData = [[[connection data] copy] autorelease];

        MGTwitterResponseType responseType = [connection responseType];

        NSString *json_string =

            [[[NSString alloc] initWithData:jsonData

                                   encoding:NSUTF8StringEncoding]

                                   autorelease];


        id json = [json_string JSONValue];


            NSArray *parsedObjects;


            if ([json isKindOfClass:[NSArray class]]) {

                    parsedObjects = [NSArray arrayWithArray:json];

            } else if ([json isKindOfClass:[NSDictionary class]]) {

                    parsedObjects = [NSArray arrayWithObject:json];

            }


            [self parsingSucceededForRequest:identifier

                              ofResponseType:responseType

                           withParsedObjects:parsedObjects];


    }

    #else

    ```


    In `MGTwitterEngineGlobalHeader.h`, we store the `#define` that determines if
    JSON should be used as the default return format. Setting this to `1` will enable
    this:


    ```

    #define SBJSON_AVAILABLE 0

    ```


    In order to compile this code, you will also have to create a new group in your
    Xcode project entitled `SBJSON` and drag the SBJSON files to the group folder.
    If you don''t already have the SBJSON files on your machine, you should clone
    the `Github` repository for it or create a submodule. We recommend using a submodule:


    ```

    $ git submodule add git://github.com/stig/json-framework.git json-framework

    ```


    Now that we have `SBJSON` incorporated into `MGTwitterEngine`, we have to add
    support for Twitter''s geo API and for POSTing status updates with `location`
    parameters. Twitter''s HTTP geo APIs use the following format:


    `geo/<action>.json`


    We''ve therefore created a `geoResultsForPath:withParams:` method that lets you
    set the action that you want to perform, as well as the parameters. The four available
    path actions are as follows:


    *   `geo/search`

    *   `geo/reverse_geocode`

    *   `geo/similar_places`

