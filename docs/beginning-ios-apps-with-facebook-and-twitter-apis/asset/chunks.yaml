    \ = nil;\n\n        if (![self.managedObjectContext save:&error]) {\n        \
    \    // 处理错误。\n        }\n    }\n}\n```\n\n## 结论\n\n本章中，我们涉及了一些真正有趣的新领域，包括上传照片以及使用\
    \ Core Data 为应用程序构建简单数据模型。构建数据模型还有其他可选方案（例如 SQLite），因此我们建议你探索其他方式来存储数据，以便在应用内进行离线或快速检索。请注意，你可能需要在模型中构建一些智能机制来限制应用占用的存储空间。例如，你可能只想存储一定数量的近期推文，或者只存储过去\
    \ 12 小时内的推文。\n\n下一章中，我们将讨论不同的基于位置的场景；解释如何将位置信息整合到你的应用中，以及如何与 Facebook 和 Twitter\
    \ 的社交网络数据结合；同时，我们将通过设置一个可在应用内任意位置使用的独立控制器，继续完善我们整合这些服务的方式。\n\n# 第 9 章\n\n# 使用位置感知与流式数据\n\
    \n本章涵盖在 iOS 上结合 Facebook 和 Twitter 使用位置功能的基本要点。我们还将讨论流式 API 的使用。\n\n社交应用中出现的一个主要趋势是为用户体验添加位置上下文。在\
    \ Facebook 和 Twitter 的世界中，这涉及让用户在 Facebook 上*签到*或搜索附近的推文，以及其他一系列场景。我们将带你深入了解如何使用\
    \ iOS 的 `CoreLocation` 和 `MapKit` 库，将位置和地图整合到你的应用中，然后利用这些库中的位置信息，展示 Facebook 和\
    \ Twitter 的一些基于位置的功能。\n\n## 此地，彼地，无处不在\n\n乍看之下，将位置信息整合到应用中似乎是一项微不足道的任务；然而，在用户隐私、设备电量/电池续航以及\
    \ `CoreLocation` 和 `MapKit` API 方面，存在许多需要考虑的因素。本章的示例应用整合了后续介绍的所有技术。由于 `CoreLocation`\
    \ 和 `MapKit` 本身就是功能丰富的 API，因此有必要梳理这些 API 提供的核心功能，并重点介绍 iOS 4.0 中首次亮相的一些新特性。之后，本章将深入探讨\
    \ Facebook 和 Twitter 的位置 API。\n"
- fmt: '#### Location Privacy, Disclosure, and Opt-Out


    As much as we all love sharing information on social networking sites such as
    Twitter and Facebook, there are times when we don''t always want to share certain
    things about ourselves. One of these things is location. We are all pretty easy
    going with sharing a photo on a website; however, it''s an entirely different
    thing to share a photo if it also includes information about where the photo was
    taken. Similarly, it''s one thing to use a feature of a site that lets you tell
    your friends where you are, but something else entirely if the site automatically
    tells your friends where you are—without letting you turn off the automatic updates.
    In the latter case, you will probably not be a big fan of that site.


    So why is this? Why do we guard our location so closely and want to have so much
    control over whom we share it with and when? Ultimately, it''s about protecting
    ourselves from some of the unpleasant aspects of human nature, such as jealousy,
    stalking, and, potentially, physical harm. For as much as social networking sites
    like Facebook and Twitter can bring out the best in human nature, they can also
    sometimes bring out the worst.


    A severe yet all-too-common example of this darker side of human nature occurs
    when a person is in a relationship with someone who is physically abusive towards
    her. She may be too afraid to obtain a restraining order and want to hide her
    physical location as much as possible—including on social networking sites. This
    is probably a worst case scenario, but one worth considering since you never want
    to break the trust of your users (or even the law in some places).


    When planning to employ your user''s location within your application, it''s always
    best to follow these rules:


    - Let users opt out of having your application use their location.

    - Make full disclosure of how you intend to use location information.

    - Let users destroy any past records of their location that your application stores
    locally or remotely.


    Fortunately, iOS itself has all of the plumbing built in to allow or disallow
    the use of its location services on a per-app basis. It also automatically prompts
    a user for permission to use location the first time that your application runs
    and starts `CoreLocation` services. This is key because it prompts the user immediately.
    It''s sometimes tempting to tuck things like this away in a `Settings` screen
    within your application, but we strongly advise against that approach for location-related
    settings. In this case on iOS, it''s a bit of a non-issue since it is out of your
    hands as a developer. In case you are new to iOS, the standard prompt includes
    the name of the application requesting permission to use location services and
    shows `Don''t Allow` and `OK` buttons, as shown in [Figure 9–1](#Chapter09.html#fig_9_1).


    ![images](images/0901.jpg)


    **Figure 9–1.** *The iOS location permission prompt*


    Once the user makes his selection, iOS stores it and doesn''t prompt the user
    for it again. This is a great feature of iOS because it standardizes the look
    and feel of this prompt, giving users a consistent experience and saving individual
    developers from implementing all of this logic themselves. If the user chooses
    not to allow an application location access, attempts to obtain the location from
    within iOS code result in a location unavailable error.


    Another great feature of iOS''s implementation of location services is that it
    doesn''t require you to do anything in your application to account for the fact
    that users often change their minds or may temporarily restrict your application
    from using location services. For instance, if a user initially granted your application
    permission to use location services, but no longer wants to grant your application
    such permission, she can go to the main `Settings` application on her device and
    use the `Location Services` section to turn off location services for all applications
    device-wide or on an application-by-application basis (see [Figures 9–2](#Chapter09.html#fig_9_2)
    and [9–3](#Chapter09.html#fig_9_3)).


    ![images](images/0902.jpg)


    **Figure 9–2.** *The iOS Settings application*


    ![images](images/0903.jpg)


    **Figure 9–3.** *The iOS Location Services settings*


    iOS also has another nifty feature that lets you reset the display of the prompt
    that asks users of applications if they want to grant the application use of location
    services. This is a device-wide setting that will revoke the permission to use
    locations services for all applications on the device. This setting is accessed
    via the main `Settings` application on an iOS device under `General` ![images](images/U001.jpg)
    `Reset` (as seen in [Figure 9–4](#Chapter09.html#fig_9_4)).


    ![images](images/0904.jpg)


    **Figure 9–4.** *The Reset Location Warnings setting*


    ![images](images/0905.jpg)


    **Figure 9–5.** *Confirmation from the system to reset location warnings*


    If you choose `Reset Warnings` (see [Figure 9–5](#Chapter09.html#fig_9_5)), run
    the main `Maps` application on the device, choose `OK` at the location prompt,
    and then go back to the main `Location Services` setting screen, you will see
    the screen shown in [Figure 9–6](#Chapter09.html#fig_9_6).


    ![images](images/0906.jpg)


    **Figure 9–6.** *The Locations Services settings after resetting warnings and
    running the Maps application*


    As we mentioned before, prompting users to opt in or out of using their location
    is just one of three essential parts of working with location. If it''s unclear
    how your application will use a user''s location, then we highly recommend displaying
    your own prompt or information screen with additional information. As of iOS 4,
    iOS makes this easy to do, and we will show you how in the following sections.
    If you store location history within your application on the user''s device, you
    should also provide a `Settings` screen that lets the user flush this history.
    Alternatively, you could provide a way to have your application only keep records
    for the past week, automatically flushing this history for the user based on a
    setting.


    Now that we''ve covered the device side of things and what to understand with
    respect to location and privacy within your iOS application, let''s take a quick
    look at what Twitter and Facebook do on their ends with respect to location.


    Twitter and Facebook have come a long way with respect to the three best practices
    that we mentioned previously. Let''s take a quick look at both of their approaches.'
