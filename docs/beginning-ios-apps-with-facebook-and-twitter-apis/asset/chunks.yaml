- fmt: "### Single Sign-On with Facebook\n\nFacebook's most recent iOS SDK adds a\
    \ pretty terrific feature entitled *Single Sign-On*. It allows the Facebook for\
    \ iOS app to share its `OAuth` token with other apps on the device. This means\
    \ users no longer have to re-enter their Facebook username and password for every\
    \ single app that asks for permission to access their resources on Facebook; the\
    \ new mechanism uses iOS's *fast app switching* to keep users logged into Facebook\
    \ across the OS.\n\nMaking this work requires that two conditions be satisfied:\n\
    \n- The version of iOS that the app is running on must support multitasking. In\
    \ other words, the app must be running on a 4.x iOS device.\n- The user must have\
    \ the Facebook app installed (version 3.2.3 or above).\n\nIf these conditions\
    \ are both met, the Facebook API will attempt to do the following:\n\n1. Display\
    \ a login dialog to the user from within your app by launching Facebook's own\
    \ app ([Figure 5–3](#Chapter05.html#fig_5_3)).\n\n![images](images/0503.jpg)\n\
    \n**Figure 5–3.** *By launching its own app to authorize others, the Facebook\
    \ app gives the appearance of logging into Facebook system-wide.*\n\n2. After\
    \ the user logs in—or if he is already logged into his Facebook app—the `OAuth`\
    \ authorization process will prompt him to accept or decline your app's attempt\
    \ to access resources from his Facebook account and show what resources will be\
    \ accessed.\n3. Once the user accepts, the Facebook app closes and redirects to\
    \ your app, passing the token, expiration, and other parameters from Facebook's\
    \ `OAuth` server.\n\nNote that if the user has already granted your application\
    \ permission to access his resources on Facebook (e.g., he already went through\
    \ this process on another iOS device), the `OAuth` authorization process will\
    \ show a page reminding the user that he has already granted your application\
    \ access (see [Figure 5–4](#Chapter05.html#fig_5_4)).\n\n![images](images/0504.jpg)\n\
    \n**Figure 5–4.** *Notifying the user that he has already authorized this app*\n\
    \n4. If an error is encountered, the user will be presented with the page seen\
    \ in [Figure 5–5](#Chapter05.html#fig_5_5).\n\n![images](images/0505.jpg)\n\n\
    **Figure 5–5.** *Facebook presents a login error.*\n\nIf the second condition\
    \ mentioned previously is not met (i.e., the device is running in a version of\
    \ iOS that supports multitasking, but the user doesn't have Facebook app v.3.2.3\
    \ or above installed), then the Facebook SDK will present the authorization dialog\
    \ using Safari, which will redirect back to your app after the login completes.\
    \ The entire flow is the same as described previously, except that the user is\
    \ presented with all the pages via Safari (see [Figures 5–6](#Chapter05.html#fig_5_6)\
    \ through [5–9](#Chapter05.html#fig_5_9)).\n\n![images](images/0506.jpg)\n\n**Figure\
    \ 5–6.** *Facebook OAuth login via mobile Safari*\n\n![images](images/0507.jpg)\n\
    \n**Figure 5–7.** *Facebook OAuth permissions via mobile Safari*\n\n![images](images/0508.jpg)\n\
    \n**Figure 5–8.** *Facebook OAuth confirmation via mobile Safari*\n\n![images](images/0509.jpg)\n\
    \n**Figure 5–9.** *Facebook presents a login error via mobile Safari.*\n\nOn older\
    \ 3.x or 4.x iOS devices that don't support multitasking, the SDK will produce\
    \ an inline `UIWebView` where users can log in. (Remember: An iPhone 3G with iOS\
    \ 4.0 doesn't support multitasking, nor does an iPhone 3G S running 3.1.3. However,\
    \ an iPhone 3G S running 4.0 does, as does an iPhone 4.)\n\n### OAuthFacebook\
    \ Project\n\nIn [Chapter 4](#Chapter04.html#ch4), we walked you through the steps\
    \ to set up a basic application that uses Facebook's iOS SDK, `HelloFacebook`.\
    \ In this and future chapters, we are going to use the same application skeleton\
    \ as `HelloFacebook` and jump right into the code specific to the given chapter.\
    \ To that end, create a new project entitled `OAuthFacebook` using the same steps\
    \ described in [Chapter 4](#Chapter04.html#ch4). Or you can make a copy of the\
    \ `HelloFacebook` project or follow the steps described here directly in the `HelloFacebook`\
    \ project. You can find the project for this chapter in the [Chapter5](#Chapter05.html#ch5)\
    \ directory of the Git repository. Now that we've covered those bases, let's take\
    \ a closer look at `OAuth` and Facebook.\n\n### Interapp Communication via a Custom\
    \ URL Scheme\n\nIn the \"Single Sign-On with Facebook\" section, you may have\
    \ been asking yourself how the Facebook SDK redirects back to your application\
    \ after the login process is complete. The answer is a custom URL scheme.\n\n\
    When you set up your application to use the Facebook SDK, you have to create a\
    \ custom URL scheme in your app's `plist` that incorporates your Facebook application\
    \ ID. Let's take a closer look at getting this set up.\n\nIn order for iOS to\
    \ bind your application to a custom URL scheme so that your application can handle\
    \ authorization callbacks from the Facebook SDK, you have to specify the URL scheme\
    \ that your application responds to in your application's `plist` file. In this\
    \ case, the Facebook SDK expects your application to bind to a custom URL scheme\
    \ of the format `fb[appID]://`, where `appID` is your Facebook application ID.\n\
    \nFollow these steps to bind your application to the required custom URL scheme:\n\
    \n1. Add a new row for a key/value pair under the root `Information Property List`\
    \ key and name the key this: `URL types`.\n2. Add a new row for a key/value pair\
    \ under the `URL types` key that you just added. The key will be automatically\
    \ named this: `Item 0`.\n3. Add a new row for a key/value pair under the `Item\
    \ 0` key and name the key this: `URL Schemes`.\n4. The `URL Schemes` key will\
    \ have a key named this: `Item 0`. Set the value of the `Item 0` key to `fb[appID]`,\
    \ as described previously. You cannot have any spaces in this value. If an application's\
    \ Facebook application ID is `123456789`, then the value for the `Item 0` key\
    \ needs to be this: `fb123456789`.\n\nYou can see for yourself (and copy it into\
    \ your `plist` if you like) how this should look in the `OAuthFacebook-Info.plist`\
    \ file in the `OAuthFacebook` project for this chapter. If you've set this up\
    \ correctly, your `plist` should look like [Figure 5–10](#Chapter05.html#fig_5_10).\n\
    \n![images](images/0510.jpg)\n\n**Figure 5–10.** *Defining a custom URL scheme\
    \ in an application's plist file*\n\nIn [Chapter 4](#Chapter04.html#ch4) for the\
    \ `HelloFacebook` application, you will recall that, when we allocated the `facebook`\
    \ object, we had to initialize it with our Facebook application ID, as follows:\n\
    \n```\nfacebook = [[Facebook alloc] initWithAppId:appID];\n```\n\nThe Facebook\
    \ SDK saves your application ID and—after logging you in—attempts to open a URL\
    \ that adheres to the custom URL scheme you created in your app, so that iOS will\
    \ launch your app. Here is the code in the Facebook SDK that creates the path\
    \ for the URL using your Facebook application ID (as seen in [Figure 5–11](#Chapter05.html#fig_5_11)):\n\
    \n```\nNSString *nextUrl = [NSString stringWithFormat:@\"fb%@://authorize\", _appId];\n\
    \      [params setValue:nextUrl forKey:@\"redirect_uri\"];\n```\n\n![images](images/0511.jpg)\n\
    \n**Figure 5–11.** *The Facebook iOS SDK custom URL scheme creation code*\n\n\
    In order for your app to properly respond to the custom URL scheme, you have to\
    \ implement the `openURL` method in your application's main delegate and call\
    \ the Facebook SDK `handleOpenURL:` method as follows, so that the Facebook SDK\
    \ can save the returned access token:"
  raw: '#### Single Sign-On with Facebook


    Facebook''s most recent iOS SDK adds a pretty terrific feature entitled *Single
    Sign-On*. It allows the Facebook for iOS app to share its `OAuth` token with other
    apps on the device. This means users no longer have to re-enter their Facebook
    username and password for every single app that asks for permission to access
    their resources on Facebook; the new mechanism uses iOS''s *fast app switching*
    to keep users logged into Facebook across the OS.


    Making this work requires that two conditions be satisfied:


    *   The version of iOS that the app is running on must support multitasking. In
    other words, the app must be running on a 4.x iOS device.

    *   The user must have the Facebook app installed (version 3.2.3 or above).


    If these conditions are both met, the Facebook API will attempt to do the following:


    1.  Display a login dialog to the user from within your app by launching Facebook''s
    own app ([Figure 5–3](#Chapter05.html#fig_5_3)).


    ![images](images/0503.jpg)


    **Figure 5–3.** *By launching its own app to authorize others, the Facebook app
    gives the appearance of logging into Facebook system-wide.*


    2.  After the user logs in—or if he is already logged into his Facebook app—the
    `OAuth` authorization process will prompt him to accept or decline your app''s
    attempt to access resources from his Facebook account and show what resources
    will be accessed.

    3.  Once the user accepts, the Facebook app closes and redirects to your app,
    passing the token, expiration, and other parameters from Facebook''s `OAuth` server.


    Note that if the user has already granted your application permission to access
    his resources on Facebook (e.g., he already went through this process on another
    iOS device), the `OAuth` authorization process will show a page reminding the
    user that he has already granted your application access (see [Figure 5–4](#Chapter05.html#fig_5_4)).


    ![images](images/0504.jpg)


    **Figure 5–4.** *Notifying the user that he has already authorized this app*


    4.  If an error is encountered, the user will be presented with the page seen
    in [Figure 5–5](#Chapter05.html#fig_5_5).


    ![images](images/0505.jpg)


    **Figure 5–5.** *Facebook presents a login error.*


    If the second condition mentioned previously is not met (i.e., the device is running
    in a version of iOS that supports multitasking, but the user doesn''t have Facebook
    app v.3.2.3 or above installed), then the Facebook SDK will present the authorization
    dialog using Safari, which will redirect back to your app after the login completes.
    The entire flow is the same as described previously, except that the user is presented
    with all the pages via Safari (see [Figures 5–6](#Chapter05.html#fig_5_6) through
    [5–9](#Chapter05.html#fig_5_9)).


    ![images](images/0506.jpg)


    **Figure 5–6.** *Facebook OAuth login via mobile Safari*


    ![images](images/0507.jpg)


    **Figure 5–7.** *Facebook OAuth permissions via mobile Safari*


    ![images](images/0508.jpg)


    **Figure 5–8.** *Facebook OAuth confirmation via mobile Safari*


    ![images](images/0509.jpg)


    **Figure 5–9.** *Facebook presents a login error via mobile Safari.*


    On older 3.× or 4.X iOS devices that don''t support multitasking, the SDK will
    produce an inline `UIWebView` where users can log in. (Remember: An iPhone 3G
    with iOS 4.0 doesn''t support multitasking, nor does an iPhone 3G S running 3.1.3\.
    However, an iPhone 3G S running 4.0 does, as does an iPhone 4.)


    OAUTHFACEBOOK PROJECT


    In [Chapter 4](#Chapter04.html#ch4), we walked you through the steps to set up
    a basic application that uses Facebook''s iOS SDK, HelloFacebook. In this and
    future chapters, we are going to use the same application skeleton as HelloFacebook
    and jump right into the code specific to the given chapter. To that end, create
    a new project entitled `OAuth` Facebook using the same steps described in [Chapter
    4](#Chapter04.html#ch4). Or you can make a copy of the `HelloFacebook` project
    or follow the steps described here directly in the `HelloFacebook` project. You
    can find the project for this chapter in the [Chapter5](#Chapter05.html#ch5) directory
    of the Git repository. Now that we''ve covered those bases, let''s take a closer
    look at `OAuth` and Facebook.


    **Interapp Communication via a Custom URL Scheme**


    In the “Single Sign-On with Facebook” section, you may have been asking yourself
    how the Facebook SDK redirects back to your application after the login process
    is complete. The answer is a custom URL scheme.


    When you set up your application to use the Facebook SDK, you have to create a
    custom URL scheme in your app''s `plist` that incorporates your Facebook application
    ID. Let''s take a closer look at getting this set up.


    In order for iOS to bind your application to a custom URL scheme so that your
    application can handle authorization callbacks from the Facebook SDK, you have
    to specify the URL scheme that your application responds to in your application''s
    `plist` file. In this case, the Facebook SDK expects your application to bind
    to a custom URL scheme of the format `fb[appID]://`, where [`appID`] is your Facebook
    application ID.


    Follow these steps to bind your application to the required custom URL scheme:


    1.  Add a new row for a key/value pair under the root `Information Property List`
    key and name the key this: `URL types`.

    2.  Add a new row for a key/value pair under the `URL types` key that you just
    added. The key will be automatically named this: `Item 0`.

    3.  Add a new row for a key/value pair under the `Item 0` key and name the key
    this: `URL Schemes`.

    4.  The `URL Schemes` key will have a key named this: `Item 0`. Set the value
    of the `Item 0` key to `fb[appID]`, as described previously. You cannot have any
    spaces in this value. If an application''s facebook application id is `123456789`,
    then the value for the `Item 0` key needs to be this: `fb123456789`.


    You can see for yourself (and copy it into your `plist` if you like) how this
    should look in the `OAuthFacebook-Info.plist` file in the `OAuthFacebook` project
    for this chapter. If you''ve set this up correctly, your `plist` should look like
    [Figure 5–10](#Chapter05.html#fig_5_10).


    ![images](images/0510.jpg)


    **Figure 5–10.** *Defining a custom URL scheme in an application''s plist file*


    In [Chapter 4](#Chapter04.html#ch4) for the `HelloFacebook` application, you will
    recall that, when we allocated the `facebook` object, we had to initialize it
    with our Facebook application ID, as follows:


    facebook = [[Facebook alloc] initWithAppId:appID];


    The Facebook SDK saves your application ID and—after logging you in—attempts to
    open a URL that adheres to the custom URL scheme you created in your app, so that
    iOS will launch your app. Here is the code in the Facebook SDK that creates the
    path for the URL using your Facebook application ID (as seen in [Figure 5–11](#Chapter05.html#fig_5_11)):


    `NSString *nextUrl = [NSString stringWithFormat:@"fb%@://authorize", _appId];`

    `      [params setValue:nextUrl forKey:@"redirect_uri"];`

    ![images](images/0511.jpg)


    **Figure 5–11.** *The Facebook iOS SDK custom URL scheme creation code*


    In order for your app to properly respond to the custom URL scheme, you have to
    implement the `openURL` method in your application''s main delegate and call the
    Facebook SDK `handleOpenURL:` method as follows, so that the Facebook SDK can
    save the returned access token:'
  trans: "\n### 使用 Facebook 实现单点登录\n\nFacebook 最新的 iOS SDK 新增了一项名为*单点登录*的极佳功能。它允许\
    \ iOS 版 Facebook 应用与设备上的其他应用共享其`OAuth`令牌。这意味着，用户无需再为每个请求访问其 Facebook 资源权限的应用重新输入\
    \ Facebook 用户名和密码；新机制利用 iOS 的*快速应用切换*功能，让用户在整个操作系统中保持 Facebook 的登录状态。\n\n要实现此功能，需要满足两个条件：\n\
    \n- 应用运行的 iOS 版本必须支持多任务处理。换言之，应用必须运行在 4.x 版本的 iOS 设备上。\n- 用户必须已安装 Facebook 应用（3.2.3\
    \ 或更高版本）。\n\n如果这两个条件都满足，Facebook API 将尝试执行以下操作：\n\n1. 通过启动 Facebook 自己的应用，从你的应用内向用户显示登录对话框（图\
    \ 5–3）。\n\n![images](img/0503.jpg)\n\n**图 5–3.** *通过启动自己的应用来授权其他应用，Facebook 应用实现了在系统范围内登录\
    \ Facebook 的外观效果。*\n\n2. 用户登录后——或者如果他已经登录了他的 Facebook 应用——`OAuth`授权过程将提示他接受或拒绝你的应用尝试从其\
    \ Facebook 账户访问资源，并显示将访问哪些资源。\n3. 一旦用户接受，Facebook 应用将关闭并重定向到你的应用，同时传递来自 Facebook\
    \ 的 `OAuth` 服务器的令牌、过期时间和其他参数。\n\n请注意，如果用户已经授予你的应用程序访问其 Facebook 资源的权限（例如，他已经在另一台\
    \ iOS 设备上完成了此过程），`OAuth`授权过程将显示一个页面，提醒用户他之前已经授权了你的应用程序访问（参见图 5–4）。\n\n![images](img/0504.jpg)\n\
    \n**图 5–4.** *通知用户他已授权此应用*\n\n4. 如果遇到错误，用户将看到图 5–5 中的页面。\n\n![images](img/0505.jpg)\n\
    \n**图 5–5.** *Facebook 显示登录错误。*\n\n如果前面提到的第二个条件不满足（即，设备运行的是支持多任务处理的 iOS 版本，但用户没有安装\
    \ Facebook 应用 v.3.2.3 或更高版本），那么 Facebook SDK 将使用 Safari 显示授权对话框，登录完成后会重定向回你的应用。整个过程与之前描述相同，只是用户通过\
    \ Safari 看到所有页面（参见图 5–6 至 5–9）。\n\n![images](img/0506.jpg)\n\n**图 5–6.** *通过移动版\
    \ Safari 进行 Facebook OAuth 登录*\n\n![images](img/0507.jpg)\n\n**图 5–7.** *通过移动版\
    \ Safari 获取 Facebook OAuth 权限*\n\n![images](img/0508.jpg)\n\n**图 5–8.** *通过移动版\
    \ Safari 进行 Facebook OAuth 确认*\n\n![images](img/0509.jpg)\n\n**图 5–9.** *Facebook\
    \ 通过移动版 Safari 显示登录错误。*\n\n在不支持多任务处理的老式 3.x 或 4.x iOS 设备上，SDK 将生成一个内联的`UIWebView`，供用户登录。（请记住：装有\
    \ iOS 4.0 的 iPhone 3G 不支持多任务处理，运行 3.1.3 的 iPhone 3G S 也不支持。然而，运行 4.0 的 iPhone\
    \ 3G S 和 iPhone 4 是支持的。）\n\n### OAuthFacebook 项目\n\n在第 4 章中，我们引导您完成了设置使用 Facebook\
    \ iOS SDK 的基础应用 `HelloFacebook` 的步骤。在本章及以后的章节中，我们将使用与 `HelloFacebook` 相同的应用框架，直接进入特定于本章的代码。为此，请使用第\
    \ 4 章中描述的相同步骤创建一个名为 `OAuthFacebook` 的新项目。或者，您可以复制 `HelloFacebook` 项目，或直接在 `HelloFacebook`\
    \ 项目中按照此处描述的步骤进行操作。您可以在 Git 仓库的 Chapter5 目录中找到本章的项目。现在我们已经完成了这些基础工作，让我们仔细看看 `OAuth`\
    \ 和 Facebook。\n\n### 通过自定义 URL Scheme 实现应用间通信\n\n在“使用 Facebook 实现单点登录”这一节中，您可能一直在想，Facebook\
    \ SDK 是如何在登录过程完成后重定向回您的应用程序的。答案是使用自定义 URL scheme。\n\n当您设置应用程序以使用 Facebook SDK\
    \ 时，您必须在应用程序的 `plist` 文件中创建一个包含您 Facebook 应用 ID 的自定义 URL scheme。让我们仔细看看如何设置。\n\
    \n为了让 iOS 将您的应用程序绑定到自定义 URL scheme，以便您的应用程序能够处理来自 Facebook SDK 的授权回调，您必须在应用程序的\
    \ `plist` 文件中指定您的应用程序响应的 URL scheme。在这种情况下，Facebook SDK 期望您的应用程序绑定到一个格式为 `fb[appID]://`\
    \ 的自定义 URL scheme，其中 `appID` 是您的 Facebook 应用 ID。\n\n请按照以下步骤将您的应用程序绑定到所需的自定义 URL\
    \ scheme：\n\n1. 在根键 `Information Property List` 下为键/值对添加一个新行，并将该键命名为：`URL types`。\n\
    2. 在刚刚添加的 `URL types` 键下为键/值对添加一个新行。该键将自动命名为：`Item 0`。\n3. 在 `Item 0` 键下为键/值对添加一个新行，并将该键命名为：`URL\
    \ Schemes`。\n4. `URL Schemes` 键下将有一个名为 `Item 0` 的键。将 `Item 0` 键的值设置为前面提到的 `fb[appID]`。此值中不能有空格。如果某个应用程序的\
    \ Facebook 应用 ID 是 `123456789`，那么 `Item 0` 键的值应为：`fb123456789`。\n\n您可以自己查看（如果您愿意，可以将其复制到您的\
    \ `plist` 文件中）本章 `OAuthFacebook` 项目中的 `OAuthFacebook-Info.plist` 文件应该是什么样子。如果您设置正确，您的\
    \ `plist` 文件应该像图 5–10 所示。\n\n![images](img/0510.jpg)\n\n**图 5–10.** *在应用程序的 plist\
    \ 文件中定义自定义 URL scheme*\n\n回想一下，在第 4 章](#Chapter04.html#ch4)的 `HelloFacebook` 应用程序中，当我们分配\
    \ `facebook` 对象时，我们必须使用 Facebook 应用 ID 对其进行初始化，如下所示：\n\n```\nfacebook = [[Facebook\
    \ alloc] initWithAppId:appID];\n```\n\nFacebook SDK 会保存您的应用 ID，并在您登录后尝试打开一个符合您在应用中创建的自定义\
    \ URL scheme 的 URL，以便 iOS 启动您的应用。以下是 Facebook SDK 中使用您的 Facebook 应用 ID 创建 URL\
    \ 路径的代码（如图 5–11 所示）：\n\n```\nNSString *nextUrl = [NSString stringWithFormat:@\"\
    fb%@://authorize\", _appId];\n      [params setValue:nextUrl forKey:@\"redirect_uri\"\
    ];\n```\n\n![images](img/0511.jpg)\n\n**图 5–11.** *Facebook iOS SDK 自定义 URL scheme\
    \ 创建代码*\n\n为了使您的应用程序能够正确响应自定义 URL scheme，您必须在应用程序的主委托中实现 `openURL` 方法，并按如下方式调用\
    \ Facebook SDK 的 `handleOpenURL:` 方法，以便 Facebook SDK 能够保存返回的访问令牌：\n"
- fmt: "`- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url\n sourceApplication:(NSString\
    \ *)sourceApplication annotation:(id)annotation {\n    return [facebook handleOpenURL:url];\n\
    }`\n\nThe URL will look as follows:\n\n`fb114442211957627://authorize/#access_token=<…>&expires_in=0`\n\
    \nLet's look at the various components of the URL:\n\n- `fb114442211957627://`\
    \ – This is the custom URL scheme that we bound our application to.\n- `authorize/`\
    \ – This is the path the Facebook SDK will check for in the URL, so that it then\
    \ knows to parse the authentication information in the rest of the URL.\n- `#`\
    \ – Signifies the start of the parameters in the URL.\n- `access_token=` – Specifies\
    \ the access token returned from facebook.com that the SDK will use when requesting\
    \ resources on behalf of your application.\n- `&expires_in=0` – Specifies another\
    \ parameter in the URL that contains the expiration for the `access_token`. In\
    \ this case, a value of `0` signifies to the SDK that this token does not expire.\n\
    \n![images](images/0512.jpg)\n\n**Figure 5–12.** *Application delegate's handling\
    \ of a custom URL*\n\n### Logging in to Facebook\n\nAuthorizing a user via the\
    \ Facebook API is accomplished via the `authorize:` method, as follows:\n\n```\n\
    [facebook authorize:[NSArray arrayWithObjects:@\"read_stream\", @\"offline_access\"\
    ,nil]\n delegate:self];\n```\n\nNotice in the method call that we are passing\
    \ an `NSArray` as one of the parameters. This is an array of requested permissions.\
    \ As part of the `OAuth` authorization process, you must ask the user to grant\
    \ your application permission to specific resources. In this authorization request,\
    \ we are asking for permission to access the user's news feed. We are also asking\
    \ for long-lived access to these resources, in which case we will receive back\
    \ an `OAuth` access token that does not expire.\n\nTo learn more about the permissions\
    \ that are required to access specific resources, please read the Permissions\
    \ API reference:\n\n`http://developers.facebook.com/docs/authentication/permissions`\n\
    \nWe have implemented this in the `MainView` class of the `OAuthFacebook` project.\
    \ We have also used an `FBLoginButton` class that can be found in the Facebook\
    \ SDK. Using this button class gives the Login button a Facebook look and feel\
    \ that is comforting to a user since she can see the official Facebook logo, as\
    \ pictured in [Figure 5–13](#Chapter05.html#fig_5_13).\n\n![images](images/0513.jpg)\n\
    \n**Figure 5–13.** *The Facebook Login button*\n\nThe sample project is configured\
    \ to change the Login button to a Logout button after logging in, as shown in\
    \ [Figure 5–14](#Chapter05.html#fig_5_14).\n\n![images](images/0514.jpg)\n\n**Figure\
    \ 5–14.** *The Facebook Logout button*\n\nWhen you click the button, the `fbButtonClick:`\
    \ method is called. This method looks like this:\n\n```\n- (void)fbButtonClick:(UIButton*)sender\
    \ {\n    if (fbLoginButton.isLoggedIn) {\n        [self logout];\n    } else {\n\
    \        [self login];\n    }\n}\n```\n\nIf the user is not logged in, the `login:`\
    \ method is called. The `login:` method calls the `authorize:` method, as described\
    \ previously:\n\n```\n- (void)login {\n    [facebook authorize:[NSArray arrayWithObjects:@\"\
    read_stream\",\n @\"offline_access\",nil] delegate:self];\n}\n```\n\nIf the user\
    \ is logged in already, the button text will change to *Logout*. Upon logging\
    \ out, the `logout:` method is called. The `logout:` method is as follows:\n\n\
    ```\n- (void)logout {\n    [facebook logout:self];\n}\n```\n\nNotice that the\
    \ `authorize:` and `logout:` methods of the Facebook SDK take a delegate as a\
    \ parameter. In order to receive notifications from the Facebook SDK with respect\
    \ to logging the user in and out of Facebook, you have to implement the `FBSessionDelegate`\
    \ protocol in your class and pass your class as a delegate to the Facebook `authorize:`\
    \ and `logout:` methods. If you inspect `MainView.h`, you will see that `MainView`\
    \ is a `FBSessionDelegate`:\n\n```\n@interface MainView : UIView <FBSessionDelegate>\
    \ {\n    …\n}\n```\n\nThe `FBSessionDelegate` protocol defines three optional\
    \ methods that you can implement:\n\n- `- (void)fbDidLogin`\n- `- (void)fbDidNotLogin:(BOOL)cancelled`\n\
    - `- (void)fbDidLogout`\n\nIn the `fbDidLogin` delegate method, we save the logged\
    \ in state and update the `FBLoginButton` to let the user log out of Facebook.\
    \ In the `fbDidNotLogin:` method, we simply log the occurrence. In the `fbDidLogout`\
    \ method, we save the logged out state and update the `FBLoginButton` to let the\
    \ user log into Facebook.\n\nLo and behold, users can now log into your Facebook-connected\
    \ iOS app without even typing, just by sharing the security token from the Facebook\
    \ app or a Safari cookie from Facebook's mobile site. The specifics of how this\
    \ is implemented are in the Facebook iOS SDK method (see [Figure 5–15](#Chapter05.html#fig_5_15)):\n\
    \n```\n- (void)authorizeWithFBAppAuth:(BOOL)tryFBAppAuth\n                   \
    \ safariAuth:(BOOL)trySafariAuth\n```\n\n![images](images/0515.jpg)\n\n**Figure\
    \ 5–15.** *The Facebook iOS SDK authorization code*\n\n### Logging out of Facebook\n\
    \nSo if Facebook users are logged into all the apps across iOS, what happens if\
    \ they want your app to log out of Facebook? As shown previously, you call the\
    \ `logout:` method to clear all application state in the Facebook SDK and initiate\
    \ a server request to invalidate the current access token. The contents of the\
    \ `logout:` method are shown in [Figure 5–16](#Chapter05.html#fig_5_16).\n\n![images](images/0516.jpg)\n\
    \n**Figure 5–16.** *The Facebook iOS SDK logout: method*\n\nIf a user logs out\
    \ of your app, it won't revoke your app's permissions; it just clears the app's\
    \ access token. If the user then tries to log into Facebook inside your app once\
    \ more, the app will simply notify the user that it's logging back into Facebook,\
    \ and your app will receive a new access token. The user won't have to give it\
    \ permission again.\n\nIf a user wants to revoke your app's permissions, she needs\
    \ to head to facebook.com, edit her settings for Apps and Websites, choose Edit\
    \ Settings under Apps you use (see [Figure 5–17](#Chapter05.html#fig_5_17)), and\
    \ delete your app from the list of approved apps (see [Figure 5–18](#Chapter05.html#fig_5_18)).\n\
    \n![images](images/0517.jpg)\n\n**Figure 5–17.** *Facebook.com's application OAuth\
    \ permissions page*\n\n![images](images/0518.jpg)\n\n**Figure 5–18.** *Revoking\
    \ an application's permission to interact with a Facebook user's data and profile*\n\
    \n### Determining if iOS Supports Backgrounding of Applications\n\nThe Facebook\
    \ SDK behaves differently, based upon whether the device supports backgrounding.\
    \ This difference in behavior is achieved via the use of the following code:\n\
    \n```\nif ([UIDevice instancesRespondToSelector:@selector(isMultitaskingSupported)]\
    \ &&\n [[UIDevice currentDevice] isMultitaskingSupported]) {\n}\n```\n\nWe are\
    \ showing this here because it may be useful from time-to-time in your own application\
    \ to choose different code paths based upon whether the device supports backgrounding\
    \ of applications.\n\n## OAuth in Twitter\n\n`OAuth` via the Facebook iOS SDK\
    \ wasn't too painful since the SDK's developers have done a stellar job of wrapping\
    \ everything up as nicely as possible with its SDK via simple APIs. `OAuth` via\
    \ Twitter is a little more involved, but we're going to get you through it.\n\n\
    [Figure 5–19](#Chapter05.html#fig_5_19) shows a diagram of Twitter's `OAuth` authentication\
    \ flow.\n\nAs we mentioned previously, Twitter doesn't have an official iOS SDK,\
    \ so some people in the open source community pieced together software from various\
    \ projects to make a working iOS Twitter engine with `OAuth` support. We are going\
    \ to show you how to use this open source software to quickly integrate Twitter\
    \ authentication into your app.\n\n![images](images/0519.jpg)\n\n**Figure 5–19.**\
    \ *Twitter authentication flow (courtesy of Twitter.com)*"
