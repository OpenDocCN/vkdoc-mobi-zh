- fmt: "### Facebook Dialogs\n\nOne of the great ways to spice up your iOS application\
    \ and make it a hit with users is to let them post to their Facebook page directly\
    \ from within your app. Even though iOS supports copy and paste and fast switching\
    \ between apps, users won’t find your app appealing if they have to switch to\
    \ the iOS Facebook app itself to, for instance, post a link to an interesting\
    \ article from within your application to their Facebook wall.\n\nFortunately\
    \ for us, the Facebook SDK has made it as simple as possible to get up and running\
    \ with this functionality. This brings us to the `dialog:` methods in the `Facebook`\
    \ class that we have yet to discuss:\n\n```\n- (void)dialog:(NSString *)action\n\
    \   andDelegate:(id<FBDialogDelegate>)delegate;\n\n- (void)dialog:(NSString *)action\n\
    \     andParams:(NSMutableDictionary *)params\n   andDelegate:(id <FBDialogDelegate>)delegate;\n\
    ```\n\nBoth of these methods are in `Facebook.h`; and while there are two methods\
    \ available to us, we will focus on using the second one, which lets us pass in\
    \ additional parameters. The first method without parameters is usable, but more\
    \ often than not you will need to pass parameters to the `dialog:` method. Moreover,\
    \ if you look in `Facebook.m`, you will see that the first method calls the second\
    \ method with an empty dictionary for the parameters:\n\n```\n- (void)dialog:(NSString\
    \ *)action\n   andDelegate:(id<FBDialogDelegate>)delegate {\n  NSMutableDictionary\
    \ * params = [NSMutableDictionary dictionary];\n  [self dialog:action andParams:params\
    \ andDelegate:delegate];\n}\n```\n\nBoth of these methods also take an *action*\
    \ parameter and a *delegate* parameter. We will look at these now in our sample\
    \ application. In the sample application for this chapter, we have a new class\
    \ entitled `DialogViewController`. This class will look awfully similar to the\
    \ `LoginViewController` class because, lo and behold, it’s modeled directly after\
    \ it. That said, we want to focus our attention on a few things within the `DialogViewController`\
    \ class.\n\nSince we are going to be displaying dialogs to the user from the `DialogViewController`\
    \ class, we need to declare that it is an `FBDialogDelegate` in our header file,\
    \ `DialogViewController.h`:\n\n```\n@interface DialogViewController : UIViewController\
    \ <FBDialogDelegate> {\n}\n@end\n```\n\nIn `DialogViewController.m`, it’s up to\
    \ us to define each of the following delegate callback methods:\n\n```\n- (void)dialogDidComplete:(FBDialog\
    \ *)dialog;\n- (void)dialogCompleteWithUrl:(NSURL *)url;\n- (void)dialogDidNotCompleteWithUrl:(NSURL\
    \ *)url;\n- (void)dialogDidNotComplete:(FBDialog *)dialog;\n- (void)dialog:(FBDialog*)dialog\
    \ didFailWithError:(NSError *)error;\n- (BOOL)dialog:(FBDialog*)dialog shouldOpenURLInExternalBrowser:(NSURL\
    \ *)url;\n```\n\nBefore we discuss these delegate callbacks a bit further, it’s\
    \ high time we use the `dialog:` method to do some work for us. The Facebook SDK\
    \ will display content within a pop-up dialog according to what you pass in as\
    \ the `action` parameter to the `dialog:` method. In the case of posting information\
    \ to a user’s Facebook wall, the appropriate action is `feed`. Therefore, in the\
    \ most simple case, if we want to display a dialog that lets a user enter any\
    \ freeform text and post it to his wall, we would call the `dialog:` method as\
    \ follows and ensure that we pass the appropriate class (in this case, `DialogViewController`)\
    \ as the delegate:\n\n```\nNSMutableDictionary * params = [NSMutableDictionary\
    \ dictionary];\n[facebook dialog:@\"feed\" andParams:params andDelegate:self];\n\
    ```\n\nCalling the `dialog:` method this way displays this dialog to the user\
    \ (see [Figure 7–1](#Chapter07.html#fig_7_1)):\n\n![images](images/0701.jpg)\n\
    \n**Figure 7–1.** *Calling the dialog: method presents this dialog to the user.*\n\
    \nAs you can see, this is really bare bones and not what you are used to seeing\
    \ from within web apps that let you post content to your Facebook wall. So let’s\
    \ spice things up a bit via some additional parameters. Additional parameters\
    \ can be specified for the `feed` dialog, and each parameter has a specific name\
    \ and purpose. Posting YouTube videos is incredibly popular on Facebook, so let’s\
    \ assume you want to post a link to a YouTube video to a user’s wall from within\
    \ your application. To accomplish this, add a key/value pair to the `parameters`\
    \ dictionary where the key is `link` and the value is the URL for the YouTube\
    \ video (or whatever other web content you want to share):\n\n```\nNSDictionary*\
    \ params = [NSDictionary dictionaryWithObject:\n   @http://www.youtube.com/watch?v=nqMc9B7uDV8\
    \ forKey:@\"link\"];\n\n[facebook dialog:@\"feed\" andParams:params andDelegate:self];\n\
    ```\n\nSince the underlying guts of the Facebook SDK’s dialog is a web view (more\
    \ on this later), this code is formatted nicely into something you would expect\
    \ and shows an image preview of what’s in the YouTube video with the post (see\
    \ [Figure 7–2](#Chapter07.html#fig_7_2)).\n\n![images](images/0702.jpg)\n\n**Figure\
    \ 7–2.** *Since Facebook dialogs are Web views, you can embed previews of content\
    \ there.*\n\nNow that was easy, wasn’t it? Let’s take it a step further, though,\
    \ and see how we can customize the display of the feed dialog even more. The code\
    \ that follows creates a sample dialog that Facebook likes to use:\n\n```\nNSDictionary*\
    \ params = [NSDictionary dictionaryWithObjectsAndKeys:\n   @\"http://developers.facebook.com/docs/reference/dialogs/\"\
    , @\"link\",\n   @\"http://fbrell.com/f8.jpg\", @\"picture\",\n   @\"Facebook\
    \ Dialogs\", @\"name\",\n   @\"Reference Documentation\", @\"caption\",\n   @\"\
    Dialogs provide a simple interface for apps to interact with users.\", @\"description\"\
    ,\n   @\"Facebook Dialogs are so easy!\",  @\"message\", nil];\n      [facebook\
    \ dialog:@\"feed\" andParams:params andDelegate:self];\n```\n\nIn this example,\
    \ we’re setting a bunch of values for different keys that Facebook makes available,\
    \ so that you can really spice up the look and feel of the dialog. Setting a URL\
    \ to an image as the value for the `picture` key lets you control what image is\
    \ displayed with the post on the user’s Facebook wall. The value for the `name`\
    \ key controls what will be displayed in the classic Facebook font as the main\
    \ title of the wall post. The `caption` and `description` values let you provide\
    \ preset text with the wall post. Last but not least, the `message` key lets you\
    \ preset the text in the editable text field in the dialog. All this information\
    \ is displayed in the dialog, as shown in [Figure 7–3](#Chapter07.html#fig_7_3).\n\
    \n![images](images/0703.jpg)\n\n**Figure 7–3.** *Anatomy of a Facebook dialog*\n\
    \nBefore we jump ahead to discuss some of the inner workings of the Facebook SDKs\
    \ dialogs, we should take a short detour and go over the `FBDialogDelegate` methods.\
    \ We’ve found through our own personal experience that how you use the `FBDialogDelegate`\
    \ methods depends upon the context you use them in. For instance, you might want\
    \ to implement these methods if you like to track some analytics within your application.\n\
    \nWhenever the user takes an action with the dialog by pressing one of the Skip\
    \ or Publish action buttons on the dialog, the SDK first calls the `dialogCompleteWithUrl:`\
    \ method, and then the `dialogDidComplete:` method. If the user presses the Skip\
    \ button, this URL will be passed to the `dialogCompleteWithUrl:` method:\n\n\
    ```\n\"fbconnect://success\"\n```\n\nIf the user presses the Publish button instead,\
    \ this URL will be passed to the `dialogCompleteWithUrl:` method:\n\n```\n\"fbconnect://success/?post_id=623441509_10150094754996510\"\
    \n```"
