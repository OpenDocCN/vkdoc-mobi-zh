- fmt: '### Show All Kinds of Feedback


    Feedback is defined as any sound, vibration, or visual indicator that some process
    is under way. Showing feedback is important, especially on a touch device where
    there is no tactile sensation to manipulating on-screen objects. It''s also important
    to show feedback when your app is doing something of its own volition, such as
    automatically loading new Tweets.


    Apple says that every user action should show some perceptible change on the screen—even
    if it''s just a shadow on a depressed button. Apple also wants you to show an
    activity indicator when an operation takes more than a few seconds.


    Another kind of feedback is animation. Twitter says that animations can help “enhance
    readability,” and Apple''s `HIG` says that those animations should be “subtle
    and appropriate,” and should serve one of the following purposes:


    - Communicate status.

    - Provide useful feedback.

    - Enhance the sense of direct manipulation.

    - Help people visualize the results of their actions.


    Apple warns you to use animations conservatively because they have a tendency
    to feel annoying when used gratuitously. One other thing: Apple says you should
    strive to make animations consistent with those in built-in iOS apps.


    However, in practice many developers break from Apple''s use of animations in
    order to make what they consider to be improvements upon a given interaction.
    One example—pioneered by the official Twitter app''s developer—is the pull-to-refresh
    indicator, which has been copied over and over by developers (including those
    at Facebook). You can see it in action in [Figure 12–3](#Chapter12.html#fig_12_3).


    ![images](images/1203.jpg)


    **Figure 12–3.** *The Facebook app shows users when it''s loading new information.*


    Note that it''s unusual for a single developer''s innovation to spread so widely,
    so you''re very unlikely to make your mark in the annals of iOS design by upending
    some very common system animation. But if you feel strongly that your app justifies
    a departure from the `HIG` and from the App Store''s design elite; then, by all
    means, give it a shot and see what kind of feedback you get during testing.


    Also note that the *updating* indicator isn''t the same as the activity indicator
    the app uses to show a Wall Post is in progress (see [Figure 12–4](#Chapter12.html#fig_12_4)).
    In the latter case, a simple iOS activity indicator is used to show the pull-and-release
    Refresh control has been activated and that posts are refreshing. (You can read
    about what your app should do if the phone is offline in [Chapter 8](#Chapter08.html#ch8).)


    ![images](images/1204.jpg)


    **Figure 12–4.** *The Facebook progress wheel*


    In iOS, sound is a second-class medium for feedback because Apple believes there
    are too many scenarios where the feedback can''t be registered because the environment
    is too loud. Vibration is a more reliable feedback mechanism, but it should only
    be used for the most important notifications. They can''t be too frequent, either.
    And users must be able to turn them off.


    Facebook gives you the option of using both sound and vibration. It also uses
    the phone''s accelerometer input with the Shake to Reload feature (see [Figure
    12–5](#Chapter12.html#fig_12_5)).


    **NOTE:** Facebook follows Apple''s design guidelines by keeping these feedback
    preferences in a pane in the system Settings app. For more about preferences,
    see the “Present Settings in the Standard Way” section later in this chapter.


    ![images](images/1205.jpg)


    **Figure 12–5.** *Facebook keeps a few set-and-forget preferences in the system
    Settings app.*


    ### Touch Targets and Text


    The minimum size of a touch target in iOS is 44 × 44 pixels. Be sure to leave
    adequate padding between controls; and, as we said in the preceding section, don''t
    crowd the screen with controls. For example, we like the way TwitHit situates
    its core task right in the middle, as shown in [Figure 12–6](#Chapter12.html#fig_12_6).


    ![images](images/1206.jpg)


    **Figure 12–6.** *TwitHit makes the main task obvious.*


    Remember to make all your controls tappable and to pay attention to their labels.
    You can find guidance on labeling—and the use of trademarks and iconography—in
    the sections that follow.


    ### Prototype and Test


    Apple heavily recommends user testing before submitting your app to the App Store.
    This is especially vital in social app design. If you''re building apps with Facebook
    or Twitter, be sure to download other apps that use the APIs (many of which we''ve
    discussed in this book already). See how they handle certain operations and how
    they distinguish themselves visually. Also, ask your friends and colleagues what
    they like about various other apps, and then let their feedback inform your design
    process. Xcode is very flexible when it comes to fine-tuning apps, and it''s easy
    to iterate a few times to get things right.


    ### What the User Wants from Your App


    Here are seven essential areas that you should prioritize when you''re designing
    your app:


    - Content

    - A logical path

    - Obvious settings

    - Branding

    - Brevity

    - A license agreement

    - Appropriate iPad design


    In the sections that follow, we''ll take a look at each of these design principles
    and how you can leverage them in your app.


    #### Content


    Facebook and Twitter both revolve around two core tasks: consuming and creating
    content in the broad *social graph*.


    If your app can post, it should present users with a clean, spacious interface
    for entering text or media, without a lot of other controls in or around the text
    box. Although it''s not a totally minimalist design, we like the way TweetBot
    presents the creation of a Tweet.


    If your app pulls in information from either of the Facebook or Twitter APIs,
    it should be presented in appropriate way. For photos, this means your app should
    be shown full-screen with controls that are translucent and disappear when they''re
    not being used. For text, this means legible typefaces.


    #### A Logical Path


    The official Twitter and Facebook apps can feel labyrinthine in their complexity;
    however, they manage it well. Twitter manages its complexity with a dynamic application
    bar, whereas Facebook does so with its “grid” UI. But, as we''ll discuss later
    in this chapter, you can''t replicate either of these strategies if your app is
    complex. Read on to learn how to design interactions around Twitter and Facebook
    content.


    #### Obvious Settings


    Apple says developers should avoid putting their app''s settings inside the app
    itself; rather, they should opt for a pane inside the system Settings app. However,
    many popular apps that use both Facebook and Twitter APIs don''t follow this convention,
    often because they find the System Settings API too limiting. Our suggested compromise:
    Pick set-it-and-forget-it options, stick them in the Settings app, and put more
    commonly used options inside your app. Many users will get impatient if they have
    to leave your app to edit their account information or play with visual display
    options.


    The official Facebook app actually follows the convention we just described, whereas
    the Twitter app handles all its settings over a couple of screens inside the app
    (see [Figure 12–7](#Chapter12.html#fig_12_7)).


    ![images](images/1207.jpg)


    **Figure 12–7.** *Twitter handles its preferences inside the app.*


    #### Branding


    You should use colors, styles, and customized art and animation to create a look
    and feel that is unique to your app. This is how users distinguish you from other
    developers and your app from those of your competitors.


    #### Brevity


    Label things with short, specific terms. If you can''t think of a reasonable label
    for a control, consider using one of Apple''s system icons or a symbol that users
    will understand from either the Facebook or Twitter platforms. Also, consider
    a license agreement or disclaimer.'
