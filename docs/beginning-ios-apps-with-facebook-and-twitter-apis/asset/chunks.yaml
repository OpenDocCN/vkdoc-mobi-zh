- fmt: "#### Creating a Twitter Application\n\nBefore you jump in with `OAuth` for\
    \ Twitter, you will need to register an application with Twitter here: [`http://twitter.com/apps/new`](http://twitter.com/apps/new).\n\
    \nWhen you visit this site, Twitter will ask you to enter various pieces of information\
    \ about your application and your company (see [Figure 5–20](#Chapter05.html#fig_5_20)).\n\
    \n![images](images/0520.jpg)\n\n**Figure 5–20.** *Signing up for a Twitter application*\n\
    \nNote that you must select Client as the Application Type.\n\nIf Twitter accepts\
    \ your registration information, you will be brought to a page that contains Twitter's\
    \ `OAuth` URLs, as well as the consumer key and consumer secret for your application\
    \ (see [Figure 5–21](#Chapter05.html#fig_5_21)).\n\n![images](images/0521.jpg)\n\
    \n**Figure 5–21.** *Twitter returns your consumer key and consumer secret.*\n\n\
    Save your consumer key and secret in a safe location since these are the values\
    \ you will need to start the `OAuth` authorization process from within your iOS\
    \ application.\n\n##### The OAuthTwitter Project\n\nIn [Chapter 4](#Chapter04.html#ch4),\
    \ we walked you through the steps to set up a basic application that uses Twitter:\
    \ `HelloTwitter`. In this and future chapters, we are going to use the same application\
    \ skeleton as Hello Twitter and jump right into the code specific to the given\
    \ chapter. To that end, create a new project entitled `OAuthTwitter` using the\
    \ same steps described in [Chapter 4](#Chapter04.html#ch4). Or you can make a\
    \ copy of the `HelloTwitter` project or perform the steps described here directly\
    \ in the `HelloTwitter` project. You can find the project for this chapter in\
    \ the [Chapter5](#Chapter05.html#ch5) directory of the Git repository. Now that\
    \ we've covered those bases, let's take a closer look at `OAuth` and Twitter.\n\
    \n##### Logging into Twitter\n\nBegin by adding your Twitter `OAuth` consumer\
    \ key and secret in your main application delegate:\n\n```\n#define kOAuthConsumerKey\
    \       @\"REPLACE ME\"\n#define kOAuthConsumerSecret    @\"REPLACE ME\"\n```\n\
    \nNow set those values for the respective properties of the `SA_OAuthTwitterEngine`\
    \ object that we declared and initialized in your main application delegate in\
    \ [Chapter 4](#Chapter04.html#ch4):\n\n```\nsa_OAuthTwitterEngine = [[SA_OAuthTwitterEngine\
    \ alloc] initOAuthWithDelegate: self];\n        sa_OAuthTwitterEngine.consumerKey\
    \ = kOAuthConsumerKey;\n        sa_OAuthTwitterEngine.consumerSecret = kOAuthConsumerSecret;\n\
    ```\n\nThe final thing that you need to do in your main application delegate is\
    \ to declare it as a `SA_OAuthTwitterEngineDelegate` in the header file:\n\n```\n\
    @interface AppDelegate : NSObject <UIApplicationDelegate,\n SA_OAuthTwitterEngineDelegate>\
    \ {\n}\n```\n\nComplete this process by implementing the matching delegate methods\
    \ in the source file:\n\n```\n- (void) storeCachedTwitterOAuthData: (NSString\
    \ *) data forUsername: (NSString *)\nusername {\n        NSUserDefaults      \
    \            *defaults = [NSUserDefaults\nstandardUserDefaults];\n\n        [defaults\
    \ setObject: data forKey: @\"authData\"];\n        [defaults synchronize];\n}\n\
    \n- (NSString *) cachedTwitterOAuthDataForUsername: (NSString *) username {\n\
    \        return [[NSUserDefaults standardUserDefaults] objectForKey: @\"authData\"\
    ];\n}\n\n- (void) twitterOAuthConnectionFailedWithData: (NSData *) data {\n  \
    \      NSLog(@\"twitterOAuthConnectionFailedWithData\");\n}\n```\n\nBefore moving\
    \ onto the code that will display the login page to the user, let's cover a little\
    \ bit of what's going on in the preceding delegate methods.\n\nThe iOS Twitter\
    \ engine does not store the `OAuth` data returned from Twitter across runs of\
    \ your application; you have to do this yourself. Fortunately, the iOS Twitter\
    \ engine provides two delegate methods that you need to implement so that this\
    \ is integrated seamlessly with the engine.\n\nWhen the iOS Twitter engine starts\
    \ the authentication process, it first checks to see if any credentials already\
    \ exist. It does this by calling its delegate's `cachedTwitterOAuthDataForUsername:`\
    \ method. In the preceding code, you can see that we attempt to retrieve this\
    \ information from `NSUserDefaults`. The first time that someone tries to log\
    \ into Twitter via your application, there will be no object for the `authData`\
    \ key in `NSUserDefaults` since nothing has been saved there yet. However, this\
    \ is where the delegate method `storeCachedTwitterOAuthData:` comes into play.\
    \ If a user successfully logs into Twitter via your app, the Twitter iOS engine\
    \ will call the `storeCachedTwitterOAuthData:` delegate method. This gives you\
    \ an opportunity to save the information returned from Twitter for subsequent\
    \ retrieval. Note that in the preceding code, we are saving this information to\
    \ `NSUserDefaults` in a key entitled `authData`.\n\nThe last delegate method,\
    \ `twitterOAuthConnectionFailedWithData:`, is called by the Twitter iOS engine\
    \ if an error is encountered while trying to authorize the user via `OAuth`. For\
    \ instance, if you add an extra character to your consumer key or secret and rebuild\
    \ and run your application, you will see that this delegate method is called by\
    \ the engine.\n\nNow let's do a little work with the user interface. It's nice\
    \ to have a button to log into Twitter, so we went through the trouble of putting\
    \ one together for you. This Twitter Login button is modeled on the Facebook Login\
    \ button that we used in the `OAuthFacebook` project.\n\nGo to the `Twitter-OAuth-iPhone`\
    \ directory in the directory where you cloned the Git repository for the sample\
    \ projects for this book, and then locate the `TwitterLoginButton` directory.\
    \ Drag the `TwitterLoginButton` to your project, so that you can use it in your\
    \ code."
  raw: '#### Creating a Twitter Application


    Before you jump in with `OAuth` for Twitter, you will need to register an application
    with Twitter here: [`http://twitter.com/apps/new.`](http://twitter.com/apps/new.)


    When you visit this site, Twitter will ask you to enter various pieces of information
    about your application and your company (see [Figure 5–20](#Chapter05.html#fig_5_20)).


    ![images](images/0520.jpg)


    **Figure 5–20.** *Signing up for a Twitter application*


    Note that you must select Client as the Application Type.


    If Twitter accepts your registration information, you will be brought to a page
    that contains Twitter''s `OAuth` URLs, as well as the consumer key and consumer
    secret for your application (see [Figure 5–21](#Chapter05.html#fig_5_21)).


    ![images](images/0521.jpg)


    **Figure 5–21.** *Twitter returns your consumer key and consumer secret.*


    Save your consumer key and secret in a safe location since these are the values
    you will need to start the `OAuth` authorization process from within your iOS
    application.


    ##### The OAuthTwitter Project


    In [Chapter 4](#Chapter04.html#ch4), we walked you through the steps to set up
    a basic application that uses Twitter: HelloTwitter. In this and future chapters,
    we are going to use the same application skeleton as Hello Twitter and jump right
    into the code specific to the given chapter. To that end, create a new project
    entitled `OAuthTwitter` using the same steps described in [Chapter 4](#Chapter04.html#ch4).
    Or you can make a copy of the `HelloTwitter` project or perform the steps described
    gere directly in the `HelloTwitter` project. You can find the project for this
    chapter in the [Chapter5](#Chapter05.html#ch5) directory of the Git repository.
    Now that we''ve covered those bases, let''s take a closer look at `OAuth` and
    Twitter.


    ##### Logging into Twitter


    Begin by adding your Twitter `OAuth` consumer key and secret in your main application
    delegate:


    `#define kOAuthConsumerKey       @"REPLACE ME"`

    `#define kOAuthConsumerSecret    @"REPLACE ME"`


    Now set those values for the respective properties of the `SA_OAuthTwitterEngine`
    object that we declared and initialized in your main application delegate in [Chapter
    4](#Chapter04.html#ch4):


    `sa_OAuthTwitterEngine = [[SA_OAuthTwitterEngine alloc] initOAuthWithDelegate:
    self];`

    `        sa_OAuthTwitterEngine.consumerKey = kOAuthConsumerKey;`

    `        sa_OAuthTwitterEngine.consumerSecret = kOAuthConsumerSecret;`


    The final thing that you need to do in your main application delegate is to declare
    it as a `SA_OAuthTwitterEngineDelegate` in the header file:


    `@interface AppDelegate : NSObject <UIApplicationDelegate,`![images](images/U002.jpg)

    ` SA_OAuthTwitterEngineDelegate> {`

    `}`


    Complete this process by implementing the matching delegate methods in the source
    file:


    `- (void) storeCachedTwitterOAuthData: (NSString *) data forUsername: (NSString
    *)`![images](images/U002.jpg)

    `username {`

    `        NSUserDefaults                  *defaults = [NSUserDefaults`![images](images/U002.jpg)

    `standardUserDefaults];`


    `        [defaults setObject: data forKey: @"authData"];`

    `        [defaults synchronize];`

    `}`


    `- (NSString *) cachedTwitterOAuthDataForUsername: (NSString *) username {`

    `        return [[NSUserDefaults standardUserDefaults] objectForKey: @"authData"];`

    `}`


    `- (void) twitterOAuthConnectionFailedWithData: (NSData *) data {`

    `        NSLog(@"twitterOAuthConnectionFailedWithData");`

    `}`


    Before moving onto the code that will display the login page to the user, let''s
    cover a little bit of what''s going on in the preceding delegate methods.


    The iOS Twitter engine does not store the `OAuth` data returned from Twitter across
    runs of your application; you have to do this yourself. Fortunately, the iOS Twitter
    engine provides two delegate methods that you need to implement so that this is
    integrated seamlessly with the engine.


    When the iOS Twitter engine starts the authentication process, it first checks
    to see if any credentials already exist. It does this by calling its delegate''s
    `cachedTwitterOAuthDataForUsername:` method. In the preceding code, you can see
    that we attempt to retrieve this information from `NSUserDefaults`. The first
    time that someone tries to log into Twitter via your application, there will be
    no object for the `authData` key in `NSUserDefaults` since nothing has been saved
    there yet. However, this is where the delegate method `storeCachedTwitterOAuthData:`
    comes into play. If a user successfully logs into Twitter via your app, the Twitter
    iOS engine will call the `storeCachedTwitterOAuthData:` delegate method. This
    gives you an opportunity to save the information returned from Twitter for subsequent
    retrieval. Note that in the preceding code, we are saving this information to
    `NSUserDefaults` in a key entitled `authData`.


    The last delegate method, `twitterOAuthConnectionFailedWithData:`, is called by
    the Twitter iOS engine if an error is encountered while trying to authorize the
    user via `OAuth`. For instance, if you add an extra character to your consumer
    key or secret and rebuild and run your application, you will see that this delegate
    method is called by the engine.


    Now let''s do a little work with the user interface. It''s nice to have a button
    to log into Twitter, so we went through the trouble of putting one together for
    you. This Twitter Login button is modeled on the Facebook Login button that we
    used in the `OAuthFacebook` project.


    Go to the `Twitter-OAuth-iPhone` directory in the directory where you cloned the
    Git repository for the sample projects for this book, and then locate the `TwitterLoginButton`
    directory. Drag the `TwitterLoginButton` to your project, so that you can use
    it in your code.'
  trans: "\n#### 创建 Twitter 应用\n\n在开始使用 Twitter 的 `OAuth` 之前，你需要先在此处向 Twitter 注册一个应用：[`http://twitter.com/apps/new`](http://twitter.com/apps/new)。\n\
    \n当你访问该网站时，Twitter 会要求你输入关于你的应用和公司的各种信息（参见图 5-20）。\n\n![images](img/0520.jpg)\n\
    \n**图 5-20.** *注册 Twitter 应用*\n\n请注意，你必须选择“客户端”作为应用类型。\n\n如果 Twitter 接受了你的注册信息，你将被引导至一个页面，该页面包含\
    \ Twitter 的 `OAuth` URL，以及你应用的消费者密钥和消费者秘密（参见图 5-21）。\n\n![images](img/0521.jpg)\n\
    \n**图 5-21.** *Twitter 返回你的消费者密钥和消费者秘密。*\n\n请将你的消费者密钥和秘密保存在安全位置，因为你需要用这些值从你的 iOS\
    \ 应用内部启动 `OAuth` 授权流程。\n\n##### OAuthTwitter 项目\n\n在第 4 章中，我们引导你完成了设置一个使用 Twitter\
    \ 的基本应用 `HelloTwitter` 的步骤。在本章及后续章节中，我们将使用与 HelloTwitter 相同的应用骨架，并直接切入与特定章节相关的代码。为此，请使用第\
    \ 4 章中描述的相同步骤创建一个名为 `OAuthTwitter` 的新项目。你也可以复制 `HelloTwitter` 项目，或者直接在该项目中执行此处描述的步骤。你可以在\
    \ Git 仓库的 Chapter5 目录中找到本章的项目。现在我们已经做好了基础准备，让我们更详细地了解 `OAuth` 和 Twitter。\n\n#####\
    \ 登录 Twitter\n\n首先，在你的主应用委托中添加你的 Twitter `OAuth` 消费者密钥和秘密：\n\n```\n#define kOAuthConsumerKey\
    \       @\"替换我\"\n#define kOAuthConsumerSecret    @\"替换我\"\n```\n\n现在，为我们在第 4\
    \ 章中声明并初始化的 `SA_OAuthTwitterEngine` 对象的相应属性设置这些值：\n\n```\nsa_OAuthTwitterEngine\
    \ = [[SA_OAuthTwitterEngine alloc] initOAuthWithDelegate: self];\n        sa_OAuthTwitterEngine.consumerKey\
    \ = kOAuthConsumerKey;\n        sa_OAuthTwitterEngine.consumerSecret = kOAuthConsumerSecret;\n\
    ```\n\n你在主应用委托中需要做的最后一件事是，在头文件中将其声明为 `SA_OAuthTwitterEngineDelegate`：\n\n```\n\
    @interface AppDelegate : NSObject <UIApplicationDelegate,\n SA_OAuthTwitterEngineDelegate>\
    \ {\n}\n```\n\n通过在源文件中实现相应的委托方法来完成此过程：\n\n```\n- (void) storeCachedTwitterOAuthData:\
    \ (NSString *) data forUsername: (NSString *)\nusername {\n        NSUserDefaults\
    \                  *defaults = [NSUserDefaults\nstandardUserDefaults];\n\n   \
    \     [defaults setObject: data forKey: @\"authData\"];\n        [defaults synchronize];\n\
    }\n\n- (NSString *) cachedTwitterOAuthDataForUsername: (NSString *) username {\n\
    \        return [[NSUserDefaults standardUserDefaults] objectForKey: @\"authData\"\
    ];\n}\n\n- (void) twitterOAuthConnectionFailedWithData: (NSData *) data {\n  \
    \      NSLog(@\"twitterOAuthConnectionFailedWithData\");\n}\n```\n\n在进入向用户显示登录页面的代码之前，我们先简单介绍一下上述委托方法中发生的事情。\n\
    \niOS Twitter 引擎不会在应用的不同运行周期之间存储从 Twitter 返回的 `OAuth` 数据；你需要自己处理这件事。幸运的是，iOS Twitter\
    \ 引擎提供了两个你需要实现的委托方法，以便与引擎无缝集成。\n\n当 iOS Twitter 引擎启动认证流程时，它会首先检查是否已存在任何凭据。它通过调用其委托的\
    \ `cachedTwitterOAuthDataForUsername:` 方法来实现这一点。在上述代码中，你可以看到我们尝试从 `NSUserDefaults`\
    \ 中检索此信息。当用户首次尝试通过你的应用登录 Twitter 时，`NSUserDefaults` 中不会有 `authData` 键对应的对象，因为尚未保存任何内容。不过，这时委托方法\
    \ `storeCachedTwitterOAuthData:` 就发挥作用了。如果用户通过你的应用成功登录 Twitter，Twitter iOS 引擎会调用\
    \ `storeCachedTwitterOAuthData:` 委托方法。这让你有机会保存从 Twitter 返回的信息，以便后续检索。请注意，在上述代码中，我们将此信息保存到了\
    \ `NSUserDefaults` 中，键名为 `authData`。\n\n最后一个委托方法是 `twitterOAuthConnectionFailedWithData:`，当尝试通过\
    \ `OAuth` 对用户进行授权时遇到错误，Twitter iOS 引擎会调用它。例如，如果你在消费者密钥或秘密中多添加了一个字符，然后重新构建并运行你的应用，你会看到引擎会调用此委托方法。\n\
    \n现在让我们对用户界面进行一些处理。有一个用于登录 Twitter 的按钮会很好，所以我们费了些功夫为你制作了一个。这个 Twitter 登录按钮是仿照我们在\
    \ `OAuthFacebook` 项目中使用的 Facebook 登录按钮制作的。\n\n进入你克隆本书示例项目 Git 仓库的目录中的 `Twitter-OAuth-iPhone`\
    \ 子目录，然后找到 `TwitterLoginButton` 目录。将 `TwitterLoginButton` 拖拽到你的项目中，以便你可以在代码中使用它。\n"
- fmt: "如果你查看`OAuthTwitter`示例项目中的`MainViewController`类，你将了解我们是如何引入`TwitterLoginButton`的。我们使用了iOS\
    \ Twitter引擎的`isAuthorized:`方法，在示例应用程序启动时将按钮设置为正确的状态：\n\n```\ntwitterLoginButton.isLoggedIn\
    \ = [sa_OAuthTwitterEngine isAuthorized];\n```\n\n当点击时，此按钮会触发以下方法：\n\n```\n- (void)twitterButtonClick:(UIButton*)sender\
    \ {\n    if (twitterLoginButton.isLoggedIn) {\n        [self logout];\n    } else\
    \ {\n        [self login];\n    }\n}\n```\n\n在`login:`方法中，我们使用`SA_OAuthTwitterController`类向用户显示Twitter的`OAuth`登录页面。我们通过`UIViewController`的`presentModalViewController:`方法以模态方式呈现它。在初始化`SA_OAuthTwitterController`对象时，你需向其传递我们在主应用程序委托中创建并初始化的`SA_OAuthTwitterEngine`，同时还要传递一个`SA_OAuthTwitterControllerDelegate`。以下是代码：\n\
    \n```\n- (void)login {\n    UIViewController *controller =\n    [SA_OAuthTwitterController\
    \ controllerToEnterCredentialsWithTwitterEngine:\n    sa_OAuthTwitterEngine delegate:\
    \ self];\n    if (controller) {\n        [self presentModalViewController: controller\
    \ animated: YES];\n    }\n    else {\n        [sa_OAuthTwitterEngine sendUpdate:\
    \ [NSString stringWithFormat:\n        @\"Already Updated. %@\", [NSDate date]]];\n\
    \    }\n}\n```\n\n我们需要将自身声明为`SA_OAuthTwitterControllerDelegate`，并在头文件中完成：\n\n\
    ```\n@interface MainViewController : UIViewController <SA_OAuthTwitterControllerDelegate>\
    \ {\n}\n```\n\n最后一步是实现`SA_OAuthTwitterControllerDelegate`的委托方法：\n\n```\n- (void)\
    \ OAuthTwitterController: (SA_OAuthTwitterController *) controller\nauthenticatedWithUsername:\
    \ (NSString *) username {\n    NSLog(@\"Authenicated for %@\", username);\n  \
    \  twitterLoginButton.isLoggedIn = YES;\n    [twitterLoginButton updateImage];\n\
    }\n\n- (void) OAuthTwitterControllerFailed: (SA_OAuthTwitterController *) controller\
    \ {\n    NSLog(@\"Authentication Failed!\");\n}\n\n- (void) OAuthTwitterControllerCanceled:\
    \ (SA_OAuthTwitterController *) controller {\n    NSLog(@\"Authentication Canceled.\"\
    );\n}\n```\n\n请注意，我们是如何在通过`OAuthTwitterController:authenticatedWithUsername:`委托方法成功登录后更新`TwitterLoginButton`状态的。你很可能希望在自己的应用程序代码中执行特定于应用程序的步骤。\n\
    \n如果用户在登录页面上输入了错误的用户名和密码，或者点击了“拒绝”按钮，则会调用`OAuthTwitterControllerFailed:`委托方法，实现该方法的代码应向用户显示一条消息，解释登录失败的原因。如果用户取消了`SA_OAuthTwitterController`对话框，则会调用`OAuthTwitterControllerCanceled:`委托方法。\n\
    \n图[5–22](#Chapter05.html#fig_5_22)和[5–23](#Chapter05.html#fig_5_23)显示了`SA_OAuthTwitterController`在显示Twitter身份验证页面时屏幕截图。\n\
    \n![images](images/0522.jpg)\n\n**图5–22.** *`SA_OAuthTwitterController`显示身份验证页面时的外观。*\n\
    \n![images](images/0523.jpg)\n\n**图5–23.** *`SA_OAuthTwitterController`身份验证页面的下半部分*\n\
    \n##### 登出Twitter\n\n将用户从Twitter注销是一个非常直接的过程。iOS Twitter引擎提供了一个`clearAccessToken`方法，我们在`logout`方法中使用它。我们还重新设置了登录按钮：\n\
    \n```\n- (void)logout {\n    [sa_OAuthTwitterEngine clearAccessToken];\n    twitterLoginButton.isLoggedIn\
    \ = NO;\n    [twitterLoginButton updateImage];\n}\n```\n\n如果我们查看`clearAccessToken:`方法，会发现它会清除Twitter的`OAuth`访问和请求令牌，调用我们的委托方法以清除我们保存到`NSUserDefaults`的访问令牌，并清除一些其他对象：\n\
    \n```\n- (void) clearAccessToken {\n    if ([_delegate respondsToSelector:\n \
    \   @selector(storeCachedTwitterOAuthData:forUsername:)]) [(id) _delegate\n  \
    \  storeCachedTwitterOAuthData: @\"\" forUsername: self.username];\n    [_accessToken\
    \ release];\n    _accessToken = nil;\n    [_consumer release];\n    _consumer\
    \ = nil;\n    self.pin = nil;\n    [_requestToken release];\n    _requestToken\
    \ = nil;\n}\n```\n\n##### 内部原理：webViewDidFinishLoad\n\n实现`OAuth`的视图控制器的主力是`UIWebView`。如果你检查`SA_OAuthTwitterController`，你会发现其主要视图是一个`UIWebView`，并且它本身是一个`UIWebViewDelegate`。`UIWebView`类的一个优点是它拥有许多委托方法，这些方法使得在`UIWebView`加载页面时可以在你的应用中执行原生功能。这是通过委托方法`webViewDidFinishLoad:`实现的。在`SA_OAuthTwitterController.m`中查看`webViewDidFinishLoad:`方法，可以了解其功能。甚至，在该方法的开始处设置一个断点，然后单步执行代码会更好。\n\
    \n### 更多内容\n\n我们已经尽力概述了主要内容，但构建一个安全的应用程序需要比本章所能涵盖的更多内容。关于良好的iOS开发的一些简洁、经过深思熟虑的经验法则，包括如何测试和部署应用程序而不会出现新手安全错误，请查看Twitter的安全最佳实践：[`http://dev.twitter.com/pages/security_best_practices`](http://dev.twitter.com/pages/security_best_practices)。\n\
    \n最后，请记住以下重要几点：\n\n*   在应用程序中尽早解决任何安全问题。\n*   反复测试以确保无缝的用户体验。\n*   如果从头构建认证系统不可行，请考虑通过`OAuth`使用`facebook\
    \ connect`来验证应用程序用户。"
  raw: 'If you look at the `MainViewController` class in the `OAuthTwitter` sample
    project, you will see how we dropped in the `TwitterLoginButton`. We have used
    the iOS Twitter engine''s `isAuthorized:` method to set the button to the correct
    state on startup of the sample application:


    `twitterLoginButton.isLoggedIn = [sa_OAuthTwitterEngine isAuthorized];`


    `When clicked, this button triggers the following method:`


    `- (void)twitterButtonClick:(UIButton*)sender {`

    `        if (twitterLoginButton.isLoggedIn) {`

    `                [self logout];`

    `        } else {`

    `                [self login];`

    `        }`

    `}`


    In the `login:` method, we use the `SA_OAuthTwitterController` class to display
    the Twitter `OAuth` login page to the user. We show this modally via the `UIViewController`
    method, `presentModalViewController:`. When initializing the `SA_OAuthTwitterController`
    object, you have to pass it the `SA_OAuthTwitterEngine` that we created and initialized
    in our main application delegate and also pass it an `SA_OAuthTwitterControllerDelegate`.
    Here is the code:


    `- (void)login {`


    `        UIViewController                        *controller =`![images](images/U002.jpg)
    `[SA_OAuthTwitterController controllerToEnterCredentialsWithTwitterEngine:`![images](images/U002.jpg)

    `sa_OAuthTwitterEngine delegate: self];`

    `        if (controller) {`

    `                [self presentModalViewController: controller animated: YES];`

    `        }`

    `        else {`

    `                [sa_OAuthTwitterEngine sendUpdate: [NSString stringWithFormat:`![images](images/U002.jpg)

    `@"Already Updated. %@", [NSDate date]]];`

    `        }`

    `}`


    We need to declare ourselves as an `SA_OAuthTwitterControllerDelegate,` and we
    do that in our header file:


    `@interface MainViewController : UIViewController <SA_OAuthTwitterControllerDelegate>
    {`

    `}`


    The final step is to implement the `SA_OAuthTwitterControllerDelegate` delegate
    methods:


    `- (void) OAuthTwitterController: (SA_OAuthTwitterController *) controller`![images](images/U002.jpg)

    `authenticatedWithUsername: (NSString *) username {`

    `        NSLog(@"Authenicated for %@", username);`


    `        twitterLoginButton.isLoggedIn = YES;`

    `        [twitterLoginButton updateImage];`

    `}`


    `- (void) OAuthTwitterControllerFailed: (SA_OAuthTwitterController *) controller
    {`

    `        NSLog(@"Authentication Failed!");`

    `}`


    `- (void) OAuthTwitterControllerCanceled: (SA_OAuthTwitterController *) controller
    {`

    `NSLog(@"Authentication Canceled.");`

    `}`


    Note how we update the state of the `TwitterLoginButton` after a successful login
    via the `OAuthTwitterController:authenticatedWithUsername:` delegate method. You
    will more than likely want to perform application-specific steps in your own application
    code here.


    If the user enters an incorrect username and password on the login page or hits
    the Deny button, the delegate method `OAuthTwitterControllerFailed:` will be called,
    and the code that implements this delegate method should display a message to
    the user explaining the failed login attempt. If the user cancels the `SA_OAuthTwitterController`
    dialog, the delegate method `OAuthTwitterControllerCanceled:` will be called.


    [Figures 5–22](#Chapter05.html#fig_5_22) and [5–23](#Chapter05.html#fig_5_23)
    show screenshots of what the `SA_OAuthTwitterController` looks like while displaying
    the Twitter authentication page.


    ![images](images/0522.jpg)


    **Figure 5–22.** *How the SA_OAuthTwitterController looks while displaying the
    authentication page.*


    ![images](images/0523.jpg)


    **Figure 5–23.** *The bottom half of the SA_OAuthTwitterController authentication
    page*


    ##### Logging out of Twitter


    Logging the user out of Twitter is a pretty straightforward process. The iOS Twitter
    engine provides a `clearAccessToken` method that we use in the `logout` method.
    We also reset our Login button:


    `- (void)logout {`


    `        [sa_OAuthTwitterEngine clearAccessToken];`


    `        twitterLoginButton.isLoggedIn = NO;`

    `        [twitterLoginButton updateImage];`

    `}`


    If we look at the clearAccessToken: method, we find that it clears out Twitter
    `OAuth` access and request tokens, calls our delegate method so that we clear
    out the access token we saved to `NSUserDefaults`, and clears out some other objects,
    as well:


    `- (void) clearAccessToken {`

    `        if ([_delegate respondsToSelector:`![images](images/U002.jpg)

    `@selector(storeCachedTwitterOAuthData:forUsername:)]) [(id) _delegate`![images](images/U002.jpg)

    `storeCachedTwitterOAuthData: @"" forUsername: self.username];`

    `        [_accessToken release];`

    `        _accessToken = nil;`

    `        [_consumer release];`

    `        _consumer = nil;`

    `        self.pin = nil;`

    `        [_requestToken release];`

    `        _requestToken = nil;`

    `}`


    ##### Under the Hood: webViewDidFinishLoad


    The workhorse of a view controller that implements `OAuth` is a `UIWebView`. If
    you examine `SA_OAuthTwitterController`, you will see that its main view is a
    `UIWebView`, and that it is itself a `UIWebViewDelegate`. One of the nice things
    about the `UIWebView class` is that it has a number of delegate methods that make
    it possible to perform native functionality within your app when the `UIWebView`
    loads pages. This is accomplished via the delegate method, `webViewDidFinishLoad:`.
    Take a look at `webViewDidFinishLoad:` in `SA_OAuthTwitterController.m` to get
    a feel for what it''s doing. Even better, set a break point in the beginning of
    the method and step through the code.


    ### There''s More


    We''ve done our best to outline the major icebergs, but building a secure app
    takes a lot more than we can include in this chapter. For some concise, well-considered
    rules of thumb about good iOS development, including how to test and deploy your
    app without any n00bish security screw-ups, check out Twitter''s Security Best
    Practices at:[`http://dev.twitter.com/pages/security_best_practices`](http://dev.twitter.com/pages/security_best_practices).


    Finally, remember these important points:


    *   Address any security issues within your application sooner rather than later.

    *   Test, test, and test again to ensure a seamless user experience.

    *   Consider using `facebook connect` via `OAuth` to authenticate users of an
    application if creating an authentication system from scratch is not a viable
    option.


