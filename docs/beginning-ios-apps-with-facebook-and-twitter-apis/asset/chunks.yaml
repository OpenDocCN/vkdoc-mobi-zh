    ## Chapter 12'
  trans: '

    ### Fone


    `Fone` 并非一款完美的应用，但它是一个相对简单的项目，实现了 Facebook 应用本身不擅长的功能。`Fone` 将 Facebook 的即时通讯和语音通话功能移植到
    iPhone 上，打造了一款替代系统标准电话应用（Phone 应用）的 Facebook 替代品（参见图 11–7）。（官方 Facebook 应用内部并未提供语音通话功能。）


    ![images](img/1107.jpg)


    **图 11–7.** *Fone 并非一款完美的应用，但它通过语音通话的形式，为 Facebook 的聊天体验增添了一些价值，并且在很大程度上避免了过度模仿
    Facebook 的风格。*


    由于这款应用旨在连接用户，它遵循了 Facebook 的可用性原则。同时，它巧妙地运用视觉元素来传达其功能（参见图 11–8）。蓝色调让人联想到 Facebook，但图标设计又明确告知用户这是一款通话应用。尽管主色调是蓝色，但这里几乎看不到任何
    Facebook 品牌的痕迹。仅凭其独特的排版设计，以及卡片式界面（无疑借鉴了 iOS 自带的天气应用），就能让用户清晰地意识到自己并非身处一款 Facebook
    品牌的应用中。


    ![images](img/1108.jpg)


    **图 11–8.** *Fone 在传达自身功能方面做得相当出色。*


    ### Flipboard


    `Flipboard` 是一款备受欢迎的 iPad 阅读器应用（参见图 11–9）。它的核心假设是，你添加到 Facebook 个人主页或 Twitter
    时间线中的大部分内容，都源自博客、杂志和社交图谱等在线来源。这款应用专注于内容本身，让你可以阅读 RSS 订阅源、Facebook 和 Twitter 新闻，以及你钟爱的在线杂志。同时，它也方便用户将这些内容分享给自己的好友圈。


    ![images](img/1109.jpg)


    **图 11–9.** *Flipboard，这款广受欢迎的 iPad 新闻阅读器应用，完美集成了 Facebook API。*


    `Flipboard` 允许用户在杂志界面的任何位置发布状态更新、推文和照片（参见图 11–10）。


    ![images](img/1110.jpg)


    **图 11–10.** *Flipboard 让你以一种不同于任何 Facebook 网站或应用的形式，来消费你的 Facebook 新闻推送。*


    `Flipboard` 的创始人兼首席执行官 Mike McCue 在该应用最新版本发布时，精辟地阐述了优秀社交 API 项目的特质，他说^(2)：


    > *“你在社交网络中联系的人们，正逐渐成为对你至关重要的新闻和信息的策展人，这是我们在 Flipboard 中日益重视的一个重要原则。我们的许多读者使用
    Google Reader 和 Flickr 来获取由他们信任的人策划的新闻和照片。这些社交网络的全面集成，让我们朝着实现社交杂志愿景又迈进了一步，将你关心的一切都汇集到一个地方。”*


    换句话说，`Flipboard` 不仅仅是一个单向的阅读器应用。它让你在同一个地方消费和创作内容，并围绕着你从别处获取的内容进行互动。简而言之，正是像 `Flipboard`
    这样的应用，为 Facebook 的生态注入了新鲜活力，使我们的新闻推送不至于变得千篇一律。


    ### 总结


    关于 Twitter 和 Facebook API 集成的规则可能比你预想的要多；其中一些规则甚至让我们也感到惊讶。虽然违反大部分规则可能不会让你陷入法律纠纷，但如果你不遵守它们的规则，Twitter
    和 Facebook 很可能会联系你，要求你重新设计应用，否则将失去对其 API 的访问权限。由于前文内容较为密集，我们为你准备了一份备忘单，可以在评估应用创意时使用。


    __________


    ² [`http://flipboard.com/press/flipboard-new-edition`](http://flipboard.com/press/flipboard-new-edition)


    首先，这是 Twitter 的主要规则备忘单：


    *   不得使用 Twitter API 来监控 Twitter 任何产品和服务的可用性、性能或功能。

    *   不得以暗示 Twitter 背书、赞助或虚假关联的方式使用 Twitter 标识。

    *   不得使用或访问 Twitter API 来聚合、缓存（作为推文一部分的情况除外）或存储 Twitter 内容中包含的地理位置信息。

    *   不得让你的客户端（client）框架化或大量复制 Twitter 服务的重要内容。你应该使用 Twitter API 来展示 Twitter 内容（即，不要创建像
    Twitter 应用那样运行的新 Twitter 客户端）。

    *   维护推文的完整性。尽管推文只有 140 个字符长，但其中包含大量信息。Twitter 视觉设计指南请参见第 13 章。

    *   在代表用户发送推文或其他消息之前，务必获得许可。用户通过你的应用进行身份验证这一事实，并不构成你代表其发送消息的同意。

    *   务必在你的服务中显示隐私政策。清楚说明你将如何处理从用户那里收集到的信息。

    *   当你向用户的推文中添加位置信息时（无论是作为地理标签还是注释数据），都必须明确告知。

    *   不得以可能误导、混淆或欺骗用户的方式使用商业名称和/或标志。关于 Twitter 标识使用的更多信息，请参见本章后面的商标规则。

    *   为没有 Twitter 账户的最终用户提供创建新 Twitter 账户的机会。

    *   仅显示在 Twitter 上自然呈现的操作。

    *   不要让用户将你的广告误认为是推文。例如，广告不能包含诸如转发（ReTweet）、收藏（Favorite）或回复（Reply）等推文操作。


    其次，这是 Facebook 的主要规则备忘单：


    *   专注于用户生成、用户授权内容的真实分享。

    *   始终询问用户是否想要发布 Feed 故事；不要自动发布。此外，仅在用户执行了可能与奖励相关的真实操作后，才提供发布故事的选项。

    *   切勿预先填写与以下产品相关的任何字段，除非用户之前在流程中手动生成了该内容：Stream 故事（`Facebook.streamPublish` 和
    `FB.Connect.streamPublish` 的 `user_message` 参数，以及 `stream.publish` 的 `message`
    参数）、照片（说明）、视频（描述）、笔记（标题和内容）或链接（评论）。

    *   不要将 Facebook 消息作为应用与用户直接沟通的渠道使用。

    *   不要仅仅因为用户赞了你的主页就自动给予奖励。如果你想以某种方式奖励粉丝，你应该明确说明，赞了你的主页后，新老粉丝都有资格获得当前和未来的奖励。

    *   切勿让你的应用自动在照片中标记用户或其好友。

    *   只有在获得被标记用户明确同意的情况下，才能标记照片。请注意，你只能标记图像中准确描绘的内容。

    *   不要向用户提供一次发布多个 Stream 故事的选项。


    ## 第 12 章

    '
- fmt: '## UI Design and Experience Guidelines for Social iOS Apps


    In the last chapter, we talked about all the rules and regulations that Facebook
    and Twitter have conceived in the name of “protecting the user experience.” Of
    course, those guidelines only address things that could reflect poorly on the
    platform. This chapter offers a little guidance on how to make something that
    doesn''t merely satisfy the letter of the law: an app that is actually intuitive
    to use.


    If this is your first time designing an iOS app, this section is required reading.
    It will address several sections of Apple''s Human Interface Guidelines (HIG),
    which are especially important for social apps. It will also tell you how you
    can use visual and interaction design correctly, avoiding both user confusion
    and trademark conflicts. Follow these rules, and you''ll get great feedback from
    users—and no hassling from the Twitter and Facebook platform reps.


    We, the authors, believe the best iOS apps generally follow Apple''s HIG, except
    where they purposely diverge to make an improvement upon the interface. In other
    words, we believe the best design should win, and developers can and should replicate
    each other''s best interactions in the hopes of creating organic UI standards.


    What we''re really saying here is that learning the rules is crucial if you''re
    going to be empowered to break them. If you''ve designed apps before, then this
    chapter is optional. However, you may want to page through it briefly to review
    certain paradigms.


    ### UI Basics for Facebook and Twitter


    This chapter begins with some very basic advice about social app design on iOS.
    The official Twitter and Facebook apps (and their legions of existing app developers)
    have standardized the interaction and visual design of these apps, so users have
    very high expectations for any UI you design. Following the advice of this chapter
    will help you do right by the user and avoid the wrath of all the rules we discussed
    in [Chapter 11](#Chapter11.html#ch11).


    To start, here are two essential pieces of advice:


    - Be careful how you handle accounts upon setup.

    - Allow users to sign up, sign in, and sign out from your app with both Twitter
    and Facebook API integrations.


    We''ll begin by looking at how you handle accounts when you set them up. Showing
    users an error or a blank view simply because they haven''t logged in yet fosters
    a bad user experience. We hate to pick on anybody, but here is an anonymous Twitter
    app we found on the App Store. At startup, it looks like the image shown in [Figure
    12–1](#Chapter12.html#fig_12_1).


    ![images](images/1201.jpg)


    **Figure 12–1.** *An error should never be the first thing a user sees in your
    app.*


    Showing the user an error that says “Warning” when first starting up is a lame
    way to introduce the user to your app. It gets worse. If you click OK and fail
    to enter your account information in this app (buried in More ![images](images/U001.jpg)
    Config, in this case), you simply get a blank timeline the next time you start
    the app. This is also not a great way to handle user accounts.


    A better approach to the startup sequence can be seen in Twitterific (see [Figure
    12–2](#Chapter12.html#fig_12_2)). This app also happens to be a good segue into
    our second, perhaps insultingly basic piece of advice.


    ![images](images/1202.jpg)


    **Figure 12–2.** *Twitterific''s signup screen presents itself nicely.*


    That is, you should allow users to sign up, sign in, and sign out from your app
    with both Twitter and Facebook API integrations. Both platforms ask that you do
    this, and it''s only fair to users to follow through on it. Similarly, your app
    should be equipped to handle a scenario where the phone is offline upon launch
    or where the network connection fails during sign-in.


    #### Attention to Detail: Start with the Icons


    Design is paramount on iOS, so your attention to the detail of visual assets should
    be scrupulous. We''ll begin by making sure you know the appropriate dimensions
    for iconography. This is your app''s calling card to the world, so it must have
    the correct dimensions if it''s going to look good on a Retina display.


    Here are the proper icon sizes for both the iPhone and iPod:


    - iPhone 4 icon: `114x114px` (the old standard iPhone icon resolution was `57x57`,
    which is the minimum acceptable size).

    - App Store icon: `512x512px`

    - Spotlight Search: `29x29px`

    - iPhone 4 Spotlight: `58x58px`


    Apple''s required icon sizes in a table below.


    ![images](images/t1201.jpg)


    The largest visual asset you''ll need to make here is `512 × 512` pixels. This
    is the graphic that is displayed when the app is being viewed in iTunes Cover
    Flow or when it''s on a banner atop the App Store. In general, start all your
    icon designs at `512` pixels and adjust them to the required size. Simply scaling
    down a single icon to other sizes will result in blurry icons.


    **NOTE:** `PNG` format is recommended for all images and icons. The standard bit
    depth for icons and images is `24` bits (`8` bits each for red, green, and blue),
    plus an `8`-bit alpha channel. Although you can use alpha transparency in the
    icons for navigation bars, toolbars, and tab bars, do not use this feature in
    app icons. You do not have to restrict yourself to Web-safe colors.


    Here are the iPad standard app sizes:


    - Application icon: `72x72px`

    - App Store icon: `512x512px`

    - Spotlight Search: `50x50px`

    - Settings icon: `29x29px`


    **NOTE:** The App Store only accepts applications with `PNG` files for icons.


    You don''t have to add gloss to your icons; it happens automatically. There''s
    a Boolean switch you can use to toggle the glossy effect, if you want the unvarnished
    look.


    The same goes for the rounded corners on app icons: leave your graphics with perpendicular
    corners and they''ll automatically be rounded.'
