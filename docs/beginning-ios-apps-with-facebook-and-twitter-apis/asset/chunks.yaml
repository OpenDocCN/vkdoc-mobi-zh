- fmt: "# Logging Out\n\nWhen the user wants to stop using Facebook integration with\
    \ your application, you can call the `logout` method to clear all application\
    \ state and make a server request to invalidate the current access token, as shown\
    \ here:\n\n`[facebook logout:self];`\n\nNote that logging out will not revoke\
    \ your application's permissions, but simply clear your application's access token.\
    \ If a user that has previously logged out of your application returns, he will\
    \ simply see a notification that he's logging into your application, not a notification\
    \ to grant permissions. To modify or revoke an application's permissions, a user\
    \ must visit the Applications, Games, and Websites tab of his Facebook privacy\
    \ settings dashboard.\n\n## Twitter's Less Awesome (but Still Great!) Tools\n\n\
    Twitter hasn't built a specific SDK for iOS, but there are some shortcuts to making\
    \ development easier. The creators of the popular Twitter client Twitterific have\
    \ created `MGTwitterEngine`, a library of classes providing methods that make\
    \ it easier for developers to use the Twitter API. `MGTwitterEngine` has complete\
    \ support for the Twitter API, so we will be using it throughout this book.\n\n\
    However, it's easy to roll your own, too, because Twitter gives you the option\
    \ of having feeds in XML or JSON format. This means you can integrate twitter\
    \ into your apps without too much hassle.\n\n### Using MGTwitterEngine\n\nThe\
    \ `MGTwitterEngine` API makes it easy to publish to Twitter from inside your app.\
    \ Begin by instantiating the `MGTwitterEngine` object:\n\n`MGTwitterEngine *engine\
    \ = [[MGTwitterEngine alloc] initWithDelegate:self];`\n\n#### Making API Calls\n\
    \nThe `MGTwitterEngine` API makes it easy to accomplish tasks with Twitter.\n\n\
    You can then make requests of the `MGTwitterEngine`, such as obtaining updates\
    \ from people the user follows on Twitter:\n\n`NSString *connectionID = [twitterEngine\
    \ getFollowedTimelineFor:nil since:nil startingAtPage:0];`\n\nYour class that\
    \ created the `MGTwitterEngine` object will have to implement the `MGTwitterEngineDelegate`\
    \ to handle your request responses.\n\nA successful request will call back `MGTwitterEngineDelegate's\
    \ requestSucceeded:` in your object. Then, depending on the nature of the request,\
    \ one of three other callbacks will be executed (you'll learn more about this\
    \ later in the book in [chapter 6](#Chapter06.html#ch6)).\n\nAdvanced applications\
    \ may want to provide their own custom parsing and/or error handling, depending\
    \ on their individual needs.\n\n#### Error Handling\n\nErrors are handled via\
    \ the `MGTwitterEngineDelegate` interfaces. Application objects can implement\
    \ this interface and specify themselves as delegates as necessary to handle any\
    \ errors.\n\n#### Using ShareKit\n\nShareKit is another offering for iOS that\
    \ makes it easy to publish to Twitter from inside your app. We encourage you to\
    \ explore what ShareKit can do for your apps, as well.\n\n## Summary\n\nThe rest\
    \ of this book will be dedicated to coding and designing apps using both Twitter\
    \ and Facebook. We'll try to address both equally, but we'll warn you now that\
    \ the Facebook APIs are (generally speaking) much easier to work with, more comprehensive,\
    \ and more up to date. Getting Twitter functionality in your app is hacky and\
    \ (at times) annoying; however, since Twitter API projects tend to be more successful\
    \ on the App Store than their Facebook API counterparts, we suppose the extra\
    \ trouble might be worth it.\n\n# Chapter 4: Getting Set Up\n\nThis chapter is\
    \ devoted to providing a step-by-step walkthrough of getting set up with the Facebook\
    \ and Twitter iOS SDKs in actual iOS Xcode projects. You will learn how to build,\
    \ run, and debug the code, so you can see it in action. Since we'll be making\
    \ use of Git for all of our source control, we're going to go over some Git fundamentals\
    \ in case you are new to Git. Finally, we will set up our iOS Facebook and Twitter\
    \ projects in Xcode.\n\nThis chapter (and the rest of the book) assumes that you\
    \ already have at least a basic understanding of how to use Xcode to do iOS development,\
    \ and that you are familiar with the Mac OS X terminal. From time-to-time, however,\
    \ we will point out what we feel are some helpful tips and tricks to improve your\
    \ development experience and provide screen shots when we feel that it will help\
    \ avoid any confusion. We assume that you are using version 4.0 of Xcode with\
    \ support for iOS 4.3.\n\n**NOTE:** If you need to review Apple's IDE setup documents,\
    \ you can find them here:\n\n`http://developer.apple.com/library/ios/navigation/index.html?section=Resource+Types&topic=Getting+Started`\n\
    \nAfter reading this chapter, you should know the following:\n\n- How to use Git.\n\
    - How to create an iOS project that is ready for Facebook or Twitter functionality.\n\
    \n## Git 'Er Dun\n\nIt just so happens that the source code for all the open source\
    \ libraries that we are using in this book is managed by their respective developers\
    \ using the Git source control management system. You can learn more about Git\
    \ at [`http://git-scm.com`](http://git-scm.com).\n\nThe source code for the sample\
    \ projects in this book is also managed in a Git repository, so we're going to\
    \ take a moment to go over how it's used.\n\n**NOTE:** Before we get any further,\
    \ go here and download Git client at this URL: [`http://git-scm.com/`](http://git-scm.com/).\n\
    \nGit has become tremendously popular within the software development community,\
    \ so we thought it would be useful to provide a basic lay of the land in case\
    \ you are new to Git. If you aren't new to Git, you can most likely skip this\
    \ section. While we won't be going into all of the nitty-gritty details about\
    \ Git, we hope to provide enough of the basics to get you started and to point\
    \ you to what we feel are some great resources to learn more about Git in your\
    \ spare time.\n\n### Github.com\n\nIf you are new to Git, then you will need to\
    \ become familiar with Github.com. Github is a site that lets individuals, open-source\
    \ projects, and corporations store and manage their public and private Git source\
    \ code repositories.\n\nIf say you come from a Subversion background, then you\
    \ have most likely set up your own Subversion server, used one within your company,\
    \ or possibly used a Subversion repository hosting site, such as Beanstalk.com.\
    \ Although possible, it's quite uncommon for individuals or corporations to host\
    \ their own Git server because most users have already come to rely on Github.\
    \ It's a well-designed site with a fair price structure. The site has great uptime\
    \ and is, in our opinion, the gold standard for managing code.\n\nIf you don't\
    \ already have one, we encourage you to sign up for a Github account and consider\
    \ moving your source control there.\n\n**NOTE:** If you are working for a company\
    \ and you want to host your repositories on Github, then you we recommend checking\
    \ out the following blog post on Github for organizations: [`https://github.com/blog/674-introducing-organizations`](https://github.com/blog/674-introducing-organizations).\n\
    \n### Installing Git\n\nFollow these steps to install Git locally on your machine:\n\
    \n1.  Navigate to the following URL: [`http://git-scm.com/download`](http://git-scm.com/download).\n\
    2.  Select your operating system at the upper right.\n3.  Download the release\
    \ that is compatible with your OS. [Figure 4–1](#Chapter04.html#fig_4_1) shows\
    \ the download screen for Mac OS X.\n\n    ![images](images/0401.jpg)\n\n    **Figure\
    \ 4–1.** *Downloading Git for Mac OS X*\n\n4.  Double-click the disk image you\
    \ just downloaded and then the Git file. This will launch the Git installer. [Figure\
    \ 4–2](#Chapter04.html#fig_4_2) shows the unpacked file on Mac OS X. Double-click\
    \ the brown package!\n\n    ![images](images/0402.jpg)\n\n    **Figure 4–2.**\
    \ *Double-click the brown package!*"
