- fmt: "#### Under the Hood: The `FBRequest` Class\n\nThe actual Facebook Graph API\
    \ is an HTTP-based API, where HTTP requests are formatted and sent to Facebook's\
    \ servers, and responses are sent back in JSON format. The Facebook iOS SDK provides\
    \ us with a set of clean and simple-to-use Objective-C wrapper classes that we\
    \ can use within our iOS apps to request information via the Facebook Graph API.\n\
    \nThe Facebook iOS SDK class that actually makes the requests and handles the\
    \ responses is `FBRequest`. The Facebook iOS SDK takes advantage of the fact that\
    \ the underlying base URL that it needs to use to make requests never changes:\
    \ [`https://graph.facebook.com`](https://graph.facebook.com). The SDK also knows\
    \ that certain parameters for a request never change. This means that you only\
    \ need to provide the request methods with those parts of the Graph Path that\
    \ change based on the context of your application.\n\nSo, if we were to construct\
    \ the full URL to request the current user's friends from the Facebook graph,\
    \ it would look as follows:\n\n`https://graph.facebook.com/me/friends?sdk=ios&sdk_version=2&access_token=<your\
    \ token>&format=json`\n\nWe are using the Facebook iOS SDK, so we only need to\
    \ give the SDK the Graph Path `\"me/friends\"` (along with any other parameters\
    \ to control the request) since the underlying SDK classes construct the full\
    \ URL for us.\n\nThe final request is constructed in `FBRequest`'s `connect` method,\
    \ so it is worth studying. This is where the actual request is made, and the JSON\
    \ response is handled. The JSON response is handled in the method `handleResponseData:(NSData\
    \ *)data`. In the case of a request for a user's friends, this is what the JSON\
    \ response looks like:\n\n`{\"data\":[{\"name\":\"John Dor\",\"id\":\"<some ID>\"\
    }]}`\n\nIt is also worth studying `FBRequest`'s `getRequestWithParams:httpMethod:delegate:requestURL:`\
    \ method and Facebook's `openUrl:params:httpMethod:delegate:`.\n\n##### A General\
    \ Note on Error Handling\n\nThere is no right or wrong way to handle errors from\
    \ the Facebook iOS SDK. It all depends on you and your application. We encourage\
    \ you to implement any delegate methods that notify you of errors, so that you\
    \ can take the appropriate action and notify the user or update your application's\
    \ user interface. With respect to what we have covered for Facebook in this chapter,\
    \ be sure to implement `FBRequestDelegate`'s `request:didFailWithError:` method.\n\
    \n### Introducing the Twitter APIs\n\nThere are tons of things your app can publish\
    \ on Twitter. These things include, but aren't limited to the following: Tweets,\
    \ direct messages (although note that this is fading out), `@replies`, `#hashtags`,\
    \ and so on. We'll begin by showing you how to pull information from Twitter via\
    \ `MGTwitterEngine`.\n\nAs with the Facebook sample app for this chapter, we have\
    \ changed the structure of the Twitter sample application a bit for this chapter\
    \ in order to make it easy to see some of this in action. You will see that the\
    \ sample application now uses a `UITabBarController` to divide up the functionality\
    \ of the app. Again, it's not pretty, but it works.\n\n#### Welcome to the Timeline\n\
    \nIf you're wondering what a Twitter *timeline* is, it's Twitter's own term for\
    \ any stream of Tweets. Twitter treats all your own Tweets as one timeline, the\
    \ stream of Tweets you see from people you follow as another timeline, and any\
    \ stream of Tweets coming from a curated list that you've made as still another\
    \ timeline.\n\n##### It Always Feels Like Somebody's Following Me\n\nThe most\
    \ coveted thing for a Twitter user is to have a lot of followers. To that end,\
    \ we're going to take a look at how to get a list of the currently logged in user's\
    \ followers and the associated profile picture for each follower. This is accomplished\
    \ via `MGTwitterEngine`'s `getFollowersIncludingCurrentStatus:` method:\n\n`[sa_OAuthTwitterEngine\
    \ getFollowersIncludingCurrentStatus:YES];`\n\nUnlike the Facebook iOS SDK, where\
    \ every request is issued via the `requestWithGraphPath:` method, `MGTwitterEngine`\
    \ uses different methods to accomplish different requests. There is also no formal\
    \ request object, so some different coding mechanisms are required since we can't\
    \ specify a different delegate per request. Unfortunately, this makes coding against\
    \ `MGTwitterEngine` slightly more difficult; however, all of the `MGTwitterEngine`\
    \ request methods return a unique request connection identifier string, and we\
    \ will use this to our advantage in our sample app for this chapter.\n\nLooking\
    \ at the sample code, we make the previously mentioned `getFollowersIncludingCurrentStatus:`\
    \ method call in the `viewDidLoad:` method of the `FollowersViewController` class.\
    \ The `FollowersViewController` class is a `UITableViewController`. Since the\
    \ Twitter API returns lists of information, a `UITableViewController` is an ideal\
    \ class to use to demonstrate how to use the API to retrieve someone's list of\
    \ followers. Here is the declaration for the `FollowersViewController` class:\n\
    \n```\n@interface FollowersViewController : UITableViewController {\n    NSArray\
    \ *followers;\n}\n@end\n```\n\nRecall that when we created the `MGTwitterEngine`,\
    \ we had to set an `MGTwitterEngineDelegate`, which in this case is our `AppDelegate`\
    \ class. Whenever a request is made of Twitter via `MGTwitterEngine`, the methods\
    \ of the `MGTwitterEngineDelegate` will be called. It's important to note that\
    \ `MGTwitterEngine` calls the methods of its delegate in the following order:\n\
    \n1.  After a successful request is made to Twitter's servers, the `requestSucceeded:`\
    \ method is called.\n2.  Next, depending on what was requested, one of the `*Received:forRequest:`\
    \ methods is called (in this case, when requesting followers, the `userInfoReceived:forRequest:`\
    \ method is called), and the response data is stored in an Objective-C data type.\n\
    3.  Finally, the `connectionFinished:` method is called. If there was a problem\
    \ with the request, then the `requestFailed:withError:` method is called.\n\n\
    If we take a look at the `userInfoReceived:forRequest:` method in the `AppDelegate`,\
    \ we see the following:\n\n```\n- (void)userInfoReceived:(NSArray *)userInfo forRequest:(NSString\
    \ *)connectionIdentifier\n{\n    NSLog(@\"User info for connectionIdentifier =\
    \ %@\", connectionIdentifier);\n\n    //tell the UI to update itself\n\n    NSDictionary\
    \ *userInfoDictionary = [NSDictionary dictionaryWithObjects:\n    [NSArray arrayWithObjects:userInfo,\
    \ nil] forKeys:[NSArray arrayWithObjects:\n    @\"followers\", nil]];\n    [[NSNotificationCenter\
    \ defaultCenter] postNotificationName:connectionIdentifier\n    object:self\n\
    \    userInfo:userInfoDictionary];\n}\n```\n\nAt this point, you might be wondering\
    \ what we're doing with the `NSNotificationCenter`. Well, as it turns out, the\
    \ `NSNotificationCenter` is a great mechanism for allowing a class within an app\
    \ to notify other classes that something has happened and pass along information\
    \ without having to use delegates. In this case, we want tell the `FollowersViewController`\
    \ that the information for its request is available. But before we talk more about\
    \ what's going on within `FollowersViewController`, let's finish taking a look\
    \ at the preceding code."
  raw: '#### Under the Hood: The FBRequest Class


    The actual Facebook Graph API is an HTTP-based API, where HTTP requests are formatted
    and sent to Facebook''s servers, and responses are sent back in JSON format. The
    Facebook iOS SDK provides us with a set of clean and simple-to-use Objective-C
    wrapper classes that we can use within our iOS apps to request information via
    the Facebook Graph API.


    The Facebook iOS SDK class that actually makes the requests and handles the responses
    is `FBRequest`. The Facebook iOS SDK takes advantage of the fact that the underlying
    base URL that it needs to use to make requests never changes: [`https://graph.facebook.com`](https://graph.facebook.com).
    The SDK also knows that certain parameters for a request never change. This means
    that you only need to provide the request methods with those parts of the Graph
    Path that change based on the context of your application.


    So, if we were to construct the full URL to request the current user''s friends
    from the Facebook graph, it would look as follows:


    `https://graph.facebook.com/me/friends?sdk=ios&sdk_version=2&access_token=<your
    token>&format=json`


    We are using the Facebook iOS SDK, so we only need to give the SDK the Graph Path
    `"me/friends"` (along with any other parameters to control the request) since
    the underlying SDK classes construct the full URL for us.


    The final request is constructed in `FBRequest`''s connect method, so it is worth
    studying. This is where the actual request is made, and the JSON response is handled.
    The JSON response is handled in the method `handleResponseData:(NSData *)data`.
    In the case of a request for a user''s friends, this is what the JSON response
    looks like:


    `{"data":[{"name":"John Dor","id":"<some ID>"}]}`


    It is also worth studying `FBRequest`''s `getRequestWithParams:httpMethod:delegate:requestURL:`
    method and Facebook''s openUrl:params:httpMethod:delegate:.


    ##### A General Note on Error Handling


    There is no right or wrong way to handle errors from the Facebook iOS SDK. It
    all depends on you and your application. We encourage you to implement any delegate
    methods that notify you of errors, so that you can take the appropriate action
    and notify the user or update your application''s user interface. With respect
    to what we have covered for Facebook in this chapter, be sure to implement `FBRequestDelegate`''s
    `request:didFailWithError:` method.


    ### Introducing the Twitter APIs


    There are tons of things your app can publish on Twitter. These things include,
    but aren''t limited to the following: Tweets, direct messages (although note that
    this is fading out), `@replies`, `#hashtags`, and so on. We''ll begin by showing
    you how to pull information from Twitter via MGTwitterEngine.


    As with the Facebook sample app for this chapter, we have changed the structure
    of the Twitter sample application a bit for this chapter in order to make it easy
    to see some of this in action. You will see that the sample application now uses
    a UITabBarController to divide up the functionality of the app. Again, it''s not
    pretty, but it works.


    #### Welcome to the Timeline


    If you''re wondering what a Twitter *timeline* is, it''s Twitter''s own term for
    any stream of Tweets. Twitter treats all your own Tweets as one timeline, the
    stream of Tweets you see from people you follow as another timeline, and any stream
    of Tweets coming from a curated list that you''ve made as still another timeline.


    ##### It Always Feels Like Somebody''s Following Me


    The most coveted thing for a Twitter user is to have a lot of followers. To that
    end, we''re going to take a look at how to get a list of the currently logged
    in user''s followers and the associated profile picture for each follower. This
    is accomplished via MGTwitterEngine''s `getFollowersIncludingCurrentStatus:` method:


    `[sa_OAuthTwitterEngine getFollowersIncludingCurrentStatus:YES];`


    Unlike the Facebook iOS SDK, where every request is issued via the `requestWithGraphPath:`
    method, MGTwitterEngine uses different methods to accomplish different requests.
    There is also no formal request object, so some different coding mechanisms are
    required since we can''t specify a different delegate per request. Unfortunately,
    this makes coding against MGTwitterEngine slightly more difficult; however, all
    of the MGTwitterEngine request methods return a unique request connection identifier
    string, and we will use this to our advantage in our sample app for this chapter.


    Looking at the sample code, we make the previously mentioned `getFollowersIncludingCurrentStatus:`
    method call in the `viewDidLoad:` method of the `FollowersViewController` class.
    The `FollowersViewController` class is a `UITableViewController`. Since the Twitter
    API returns lists of information, a `UITableViewController` is an ideal class
    to use to demonstrate how to use the API to retrieve someone''s list of followers.
    Here is the declaration for the `FollowersViewController` class:


    `@interface FollowersViewController : UITableViewController {`

    `        NSArray *followers;`

    `}`

    `@end`


    Recall that when we created the MGTwitterEngine, we had to set an `MGTwitterEngineDelegate`,
    which in this case is our `AppDelegate` class. Whenever a request is made of Twitter
    via MGTwitterEngine, the methods of the `MGTwitterEngineDelegate` will be called.
    It''s important to note that MGTwitterEngine calls the methods of its delegate
    in the following order:


    1.  After a successful request is made to Twitter''s servers, the `requestSucceeded:`
    method is called.

    2.  Next, depending on what was requested, one of the `*Received:forRequest:`
    methods is called (in this case, when requesting followers, the `userInfoReceived:forRequest:`
    method is called), and the response data is stored in an Objective-C data type.

    3.  Finally, the `connectionFinished:` method is called. If there was a problem
    with the request, then the `requestFailed:withError:` method is called.


    If we take a look at the `userInfoReceived:forRequest:` method in the `AppDelegate`,
    we see the following:


    `- (void)userInfoReceived:(NSArray *)userInfo forRequest:(NSString *)`![images](images/U002.jpg)

    `connectionIdentifier`

    ` {`

    `        NSLog(@"User info for connectionIdentifier = %@", connectionIdentifier);`


    `        //tell the UI to update itself`


    `        NSDictionary *userInfoDictionary = [NSDictionary dictionaryWithObjects:`![images](images/U002.jpg)

    `[NSArray arrayWithObjects:userInfo, nil] forKeys:[NSArray arrayWithObjects:`![images](images/U002.jpg)

    `@"followers", nil]];`

    `        [[NSNotificationCenter defaultCenter] postNotificationName:connectionIdentifier`

    `object:self`


    `userInfo:userInfoDictionary];`

    `}`


    At this point, you might be wondering what we''re doing with the `NSNotificationCenter`.
    Well, as it turns out, the `NSNotificationCenter` is a great mechanism for allowing
    a class within an app to notify other classes that something has happened and
    pass along information without having to use delegates. In this case, we want
    tell the `FollowersViewController` that the information for its request is available.
    But before we talk more about what''s going on within `FollowersViewController`,
    let''s finish taking a look at the preceding code.'
  trans: "\n#### 内部机制：`FBRequest` 类\n\nFacebook Graph API 本质上是一个基于 HTTP 的 API，其流程是将格式化的\
    \ HTTP 请求发送至 Facebook 服务器，并以 JSON 格式返回响应。Facebook iOS SDK 为我们提供了一套简洁易用的 Objective-C\
    \ 封装类，我们可以在 iOS 应用中使用这些类通过 Facebook Graph API 请求信息。\n\n在 Facebook iOS SDK 中，实际负责发起请求和处理响应的类是\
    \ `FBRequest`。该 SDK 利用了一个事实：其发起请求所需的基础 URL 从不改变，即 [`https://graph.facebook.com`](https://graph.facebook.com)。SDK\
    \ 还知道某些请求参数也是固定不变的。这意味着您只需向请求方法提供 Graph 路径中那些会根据应用上下文而变化的部分。\n\n因此，如果我们构造完整的 URL\
    \ 来请求当前用户的 Facebook 好友，它会如下所示：\n\n`https://graph.facebook.com/me/friends?sdk=ios&sdk_version=2&access_token=<your\
    \ token>&format=json`\n\n因为我们使用的是 Facebook iOS SDK，所以只需向 SDK 提供 Graph 路径 `\"me/friends\"\
    `（以及任何其他控制请求的参数），底层的 SDK 类就会为我们构造完整的 URL。\n\n最终的请求是在 `FBRequest` 的 `connect` 方法中构建的，因此值得研究。此处是实际发起请求和处理\
    \ JSON 响应的地方。JSON 响应在方法 `handleResponseData:(NSData *)data` 中处理。以请求用户好友为例，JSON\
    \ 响应的格式如下：\n\n`{\"data\":[{\"name\":\"John Dor\",\"id\":\"<some ID>\"}]}`\n\n\
    此外，`FBRequest` 的 `getRequestWithParams:httpMethod:delegate:requestURL:` 方法和 Facebook\
    \ 的 `openUrl:params:httpMethod:delegate:` 方法也值得研究。\n\n##### 关于错误处理的通用说明\n\n处理来自\
    \ Facebook iOS SDK 的错误没有绝对正确或错误的方法。这完全取决于您和您的应用。我们建议您实现那些能通知您错误的代理方法，以便您采取适当的行动，例如通知用户或更新应用的界面。就本章所涉及的\
    \ Facebook 内容而言，请务必实现 `FBRequestDelegate` 的 `request:didFailWithError:` 方法。\n\n\
    ### Twitter API 介绍\n\n您的应用可以在 Twitter 上发布许多内容。包括但不限于：推文、私信（虽然此功能正在淡出）、`@回复`、`#话题标签`\
    \ 等等。我们将首先向您展示如何通过 `MGTwitterEngine` 从 Twitter 拉取信息。\n\n与本章的 Facebook 示例应用一样，我们稍微调整了本章\
    \ Twitter 示例应用的结构，以便方便地观察其中的一些操作。您会看到示例应用现在使用一个 `UITabBarController` 来划分应用的功能。再次强调，界面并不美观，但它能工作。\n\
    \n#### 时间线简介\n\n如果您想知道 Twitter 的*时间线*是什么，它是 Twitter 对任何推文流的专属术语。Twitter 将您自己的所有推文视为一个时间线，您从关注对象那里看到的推文流视为另一个时间线，而来自您创建的精选列表的任何推文流则视为又一个时间线。\n\
    \n##### 总觉得有人在关注我\n\n对于 Twitter 用户来说，最令人向往的事情就是拥有大量粉丝。为此，我们将研究如何获取当前登录用户的粉丝列表以及每个粉丝的关联头像。这可以通过\
    \ `MGTwitterEngine` 的 `getFollowersIncludingCurrentStatus:` 方法实现：\n\n`[sa_OAuthTwitterEngine\
    \ getFollowersIncludingCurrentStatus:YES];`\n\n与 Facebook iOS SDK 通过 `requestWithGraphPath:`\
    \ 方法发起所有请求不同，`MGTwitterEngine` 使用不同的方法来完成不同的请求。同时也没有正式的请求对象，因此需要一些不同的编码机制，因为我们无法为每个请求指定不同的代理。不幸的是，这使得针对\
    \ `MGTwitterEngine` 的编码稍微困难一些；然而，所有 `MGTwitterEngine` 的请求方法都会返回一个唯一的请求连接标识符字符串，我们将在本章的示例应用中利用这一点。\n\
    \n查看示例代码，我们在 `FollowersViewController` 类的 `viewDidLoad:` 方法中调用了前面提到的 `getFollowersIncludingCurrentStatus:`\
    \ 方法。`FollowersViewController` 类是一个 `UITableViewController`。由于 Twitter API 返回的是信息列表，因此\
    \ `UITableViewController` 是演示如何使用该 API 获取某人的粉丝列表的理想类。以下是 `FollowersViewController`\
    \ 类的声明：\n\n```\n@interface FollowersViewController : UITableViewController {\n\
    \    NSArray *followers;\n}\n@end\n```\n\n回想一下，当我们创建 `MGTwitterEngine` 时，必须设置一个\
    \ `MGTwitterEngineDelegate`，在本例中就是我们的 `AppDelegate` 类。每当通过 `MGTwitterEngine` 向\
    \ Twitter 发起请求时，`MGTwitterEngineDelegate` 的方法就会被调用。需要注意的是，`MGTwitterEngine` 会按以下顺序调用其代理的方法：\n\
    \n1.  成功向 Twitter 服务器发起请求后，调用 `requestSucceeded:` 方法。\n2.  接着，根据请求的内容不同，会调用相应的\
    \ `*Received:forRequest:` 方法（本例中，当请求粉丝时，会调用 `userInfoReceived:forRequest:` 方法），并将响应数据存储为\
    \ Objective-C 数据类型。\n3.  最后，调用 `connectionFinished:` 方法。如果请求出现问题，则会调用 `requestFailed:withError:`\
    \ 方法。\n\n如果我们查看 `AppDelegate` 中的 `userInfoReceived:forRequest:` 方法，会看到以下代码：\n\n\
    ```\n- (void)userInfoReceived:(NSArray *)userInfo forRequest:(NSString *)connectionIdentifier\n\
    {\n    NSLog(@\"User info for connectionIdentifier = %@\", connectionIdentifier);\n\
    \n    //告诉 UI 更新自身\n\n    NSDictionary *userInfoDictionary = [NSDictionary dictionaryWithObjects:\n\
    \    [NSArray arrayWithObjects:userInfo, nil] forKeys:[NSArray arrayWithObjects:\n\
    \    @\"followers\", nil]];\n    [[NSNotificationCenter defaultCenter] postNotificationName:connectionIdentifier\n\
    \    object:self\n    userInfo:userInfoDictionary];\n}\n```\n\n此时，您可能在想我们使用 `NSNotificationCenter`\
    \ 做什么。实际上，`NSNotificationCenter` 是一种很好的机制，它允许应用内的一个类通知其他类某件事发生了，并传递信息，而无需使用代理。在本例中，我们希望告诉\
    \ `FollowersViewController` 其请求的数据已准备好。但在进一步讨论 `FollowersViewController` 内部发生了什么之前，我们先看完前面的代码。\n"
- fmt: "`userInfo`参数是一个`NSArray`，其中包含`NSDictionary`对象。每个`NSDictionary`都包含关于单个关注者的信息。当您发布通知时，可以指定一个字典，其中包含通知接收者可以访问的对象。我们希望`FollowersViewController`接收关注者数组，因此我们创建一个包含一个键`followers`的字典，并将关注者数组赋值给该键。最后发布通知时，必须为其指定一个唯一名称，而最合适的名称就是连接标识符。\n\
    \n您可能还记得，`FollowersViewController`拥有一个名为`followers`的`NSArray`指针：\n\n```\nNSArray\
    \ *followers;\n```\n\n为了将在`userInfoReceived:forRequest:`委托方法中返回的数组赋值，我们需要在`FollowersViewController`中执行几个步骤。首先，我们告诉`NSNotificationCenter`，希望接收与请求的唯一连接标识符名称匹配的通知。回想一下，这个名称将与传递给`userInfoReceived:forRequest:`委托方法的连接标识符相同。我们还告诉`NSNotificationCenter`，如果触发了与唯一连接标识符匹配的通知，则希望执行`twitterFollowersRequestDidComplete:`方法。以下是执行此操作的代码：\n\
    \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Uncomment the following\
    \ line to display an Edit button in the navigation bar for this view controller.\n\
    \    // self.navigationItem.rightBarButtonItem = self.editButtonItem;\n\n    NSString\
    \ *identifier = [sa_OAuthTwitterEngine getFollowersIncludingCurrentStatus:YES];\
    \ // statuses/followers\n\n    //listen for a notification with the name of the\
    \ identifier\n    [[NSNotificationCenter defaultCenter] addObserver:self\n   \
    \        selector:@selector(twitterFollowersRequestDidComplete:)\n           name:identifier\n\
    \           object:nil];\n}\n```\n\n现在，让我们分析处理通知的方法中发生了什么：\n\n```\n- (void)twitterFollowersRequestDidComplete:(NSNotification*)notification\
    \ {\n    [followers release];\n    followers = [[notification.userInfo objectForKey:@\"\
    followers\"] retain];\n\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
    \n    [self.tableView reloadData];\n}\n```\n\n在此方法中，我们首先释放关注者数组，以防止内存泄漏。由于下一步是为关注者数组分配一个新数组，因此每当要分配新数组时，都需要确保先释放并交回之前存储的数组。实际执行赋值操作时，情况会更有趣一些，让我们回顾一下这一步的具体操作：\n\
    \n```\nfollowers = [[notification.userInfo objectForKey:@\"followers\"] retain];\n\
    ```\n\n请记住，当我们在`AppDelegate`中发布通知时，发送了一个字典，其中包含一个键/值对，键为`followers`。因此，我们只是将通知的`userInfo`字典中该键的值赋值给`followers`数组。最后，我们移除自身作为通知的观察者，然后告诉表格重新加载数据，因为有了新数据。\n\
    \n**注意：** 一旦确定某个类不再需要接收通知，就应立即移除其作为通知的观察者，这始终是一个良好的实践。如果在将类设置为再次接收通知之前未能执行此操作，该类将会为同一事件接收多次通知，这可能不是您想要的行为。\n\
    \n当表格重新加载时，我们将关注者数量作为表格的行数返回：\n\n```\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section {\n    // Return the number of rows\
    \ in the section.\n    if (nil == followers) {\n        return 0;\n    }\n\n \
    \   return [followers count];\n}\n```\n\n当`UITableView`需要特定行时，我们从`FollowersViewController`的`tableView:cellForRowAtIndexPath:`方法中的关注者数组中检索代表该行关注者的字典：\n\
    \n```\nNSDictionary *dictionary = [followers objectAtIndex:[indexPath row]];\n\
    ```\n\n在本示例中，我们使用自定义的`UITableViewCell`类`FollowersTableViewCell`。这使我们能够封装关注者个人资料图片的检索。`FollowersTableViewCell`使用`UITableViewCellStyleDefault`样式，该样式显示文本标签和可选图片。`FollowersTableViewCell`类拥有一个指向字典的指针，在本例中，该字典是与该单元格关联的关注者的字典。以下是`FriendTableViewCell`的声明：\n\
    \n```\n@interface FollowersTableViewCell : UITableViewCell {\n    NSDictionary\
    \ *data;\n}\n\n@property(nonatomic, retain) NSDictionary *data;\n\n@end\n```\n\
    \n我们在`FollowersViewController`的`tableView:cellForRowAtIndexPath:`方法中赋值`FollowersTableViewCell`的数据字典：\n\
    \n```\ncell.data = dictionary;\n```\n\n执行上述赋值时，会调用`FollowersTableViewCell`的`setData`方法，因此我们重写了此方法以执行自定义操作：\n\
    \n```\n- (void)setData:(NSDictionary *)dictionary {\n    [data release];\n   \
    \ data = [dictionary retain];\n\n    self.textLabel.text = [data objectForKey:@\"\
    screen_name\"];\n\n    self.imageView.image = nil;\n    [self setNeedsLayout];\n\
    \n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\n    NSString\
    \ *identifier = [sa_OAuthTwitterEngine getImageAtURL:[dictionary objectForKey:@\"\
    profile_image_url\"]];\n\n    //listen for a notification with the name of the\
    \ identifier\n    [[NSNotificationCenter defaultCenter] addObserver:self\n   \
    \        selector:@selector(twitterProfileImageRequestDidComplete:)\n        \
    \   name:identifier\n           object:nil];\n}\n```\n\n首先，我们将单元格`textLabel`的文本设置为`data`字典中键`screen_name`关联的值。其次，我们通过`MGTwitterEngine`的`getImageAtURL:`方法发起请求，获取该特定关注者的\
    \ Twitter 个人资料图片。我们向该方法传递关注者个人资料图片的 URL，该 URL 由 Twitter 返回，并且是`data`字典中键`profile_image_url`关联的值。注意，`getImageAtURL:`方法可用于从任何\
    \ URL 检索图片，而不仅仅是 Twitter URL。\n\n当我们请求图片时，`MGTwitterEngine`返回连接标识符，就像在`FollowersViewController`中一样，我们告诉`NSNotificationCenter`希望接收与连接标识符值匹配的通知。\n\
    \n`MGTwitterEngine`通知应用程序图片已可用，并通过`imageReceived:forRequest:`委托方法将其传递给我们。然后，我们为包含图片的返回连接标识符发布通知：\n\
    \n```\n- (void)imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier\
    \ {\n    NSLog(@\"Image receieved for connectionIdentifier = %@\", connectionIdentifier);\n\
    \n    NSDictionary *userInfoDictionary = [NSDictionary dictionaryWithObjects:\n\
    \        [NSArray arrayWithObjects:image, nil] forKeys:\n        [NSArray arrayWithObjects:@\"\
    profile_image\", nil]];\n    [[NSNotificationCenter defaultCenter] postNotificationName:connectionIdentifier\n\
    \          object:self\n          userInfo:userInfoDictionary];\n}\n```"
  raw: 'The `userInfo` parameter is an `NSArray` of `NSDictionary` objects. Each NSDictionary
    contains information about an individual follower. When you post a notification,
    you can specify a dictionary of objects that the receiver of the notification
    can access. We want the `FollowersViewController` to receive the array of followers,
    so we create a dictionary with one key, `followers`, and assign the array of followers
    to that key. When we finally post the notification, we have to give it a unique
    name, and what better name to use than the connection identifier?


    You probably recall that the `FollowersViewController` owns a pointer to an `NSArray`
    entitled `followers`:


    `NSArray *followers;`


    In order to assign the array that we got back in the `userInfoReceived:forRequest:`
    delegate method, we have to do a couple of things in `FollowersViewController.`
    We begin by telling the `NSNotificationCenter` that we want to receive notifications
    that match the name of the unique connection identifier for our request. Recall
    that this will be the same connection identifier that is given to the `userInfoReceived:forRequest:`
    delegate method. We also tell `NSNotificationCenter` that we want the method `twitterFollowersRequestDidComplete:`
    to be executed if a notification that matches our unique connection identifier
    is fired. Here is the code that does this:


    `- (void)viewDidLoad {`

    `        [super viewDidLoad];`

    `        // Uncomment the following line to display an Edit button in the navigation
    bar`![images](images/U002.jpg)

    ` for this view controller.`

    `        // self.navigationItem.rightBarButtonItem = self.editButtonItem;`


    `        NSString *identifier = [sa_OAuthTwitterEngine`![images](images/U002.jpg)

    `getFollowersIncludingCurrentStatus:YES]; // statuses/followers`


    `        //listen for a notification with the name of the identifier`

    `        [[NSNotificationCenter defaultCenter] addObserver:self`

    `               selector:@selector(twitterFollowersRequestDidComplete:)`

    `               name:identifier`

    `               object:nil];`

    `}`


    Now let''s examine what''s going on in our method that handles the notification:


    `- (void)twitterFollowersRequestDidComplete:(NSNotification*)notification {`


    `        [followers release];`

    `        followers = [[notification.userInfo objectForKey:@"followers"] retain];`


    `        [[NSNotificationCenter defaultCenter] removeObserver:self];`


    `        [self.tableView reloadData];`

    `}`


    In this method, the first thing that we do is release the array of followers.
    We do this to prevent a memory leak. Since the next step is to assign a new array
    to the array of followers, any time we want to assign a new array, we need to
    first make sure that we release and give back the array that we stored before.
    Things get a little more interesting when we actually do the assignment, so let''s
    review what''s going on in this step:


    `         followers = [[notification.userInfo objectForKey:@"followers"] retain];`


    Remember that, when we posted the notification from `AppDelegate`, we sent a dictionary
    that contained one key/object pair with the key `followers` in the dictionary.
    Thus, all we''re doing is assigning the value for this key from the notifications
    `userInfo` dictionary to our `followers` array. We finish off this method by removing
    ourselves as an observer of notifications, and then telling our table to reload
    itself since we have new data.


    **NOTE:** It''s always a good practice to remove yourself as an observer of notifications
    as soon as you feel the class in question no longer needs to receive the notifications.
    If you fail to do this before setting your class to receive notifications again,
    your class will receive multiple notifications for the same event, which is probably
    not the behavior you want.


    When the table reloads, we return the number of followers as the number of rows
    in the table:


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:`![images](images/U002.jpg)

    `(NSInteger)section {`

    `        // Return the number of rows in the section.`

    `        if (nil == followers) {`

    `                return 0;`

    `        }`


    `        return [followers count];`

    `}`


    When the `UITableView` needs a specific row, we retrieve the dictionary that represents
    the follower for that row from our array of followers in `FollowersViewController`''s
    `tableView:cellForRowAtIndexPath:` method:


    `NSDictionary *dictionary = [followers objectAtIndex:[indexPath row]];`


    For this sample, we''re using our own `UITableViewCell` class entitled `FollowersTableViewCell`.
    This lets us encapsulate the retrieval of a follower''s profile picture. The `FollowersTableViewCell`
    uses the style `UITableViewCellStyleDefault`, which displays a text label and
    an optional image. The `FollowersTableViewCell` class owns a pointer to a dictionary,
    which in this case will be the dictionary for the follower that is associated
    with the cell. Here is the declaration for the `FriendTableViewCell`:


    `@interface FollowersTableViewCell : UITableViewCell {`

    `        NSDictionary *data;`

    `}`


    `@property(nonatomic, retain) NSDictionary *data;`


    `@end`


    We assign the `FollowersTableViewCell`''s data dictionary in `FollowersViewController`''s
    `tableView:cellForRowAtIndexPath: method:`


    `cell.data = dictionary;`


    When we do the preceding assignment, `FollowersTableViewCell''ssetData` method
    is called, so we have overridden this method to perform our own custom actions:


    `- (void)setData:(NSDictionary *)dictionary {`

    `        [data release];`

    `        data = [dictionary retain];`


    `        self.textLabel.text = [data objectForKey:@"screen_name"];`


    `       self.imageView.image = nil;`

    `       [self setNeedsLayout];`


    `       [[NSNotificationCenter defaultCenter] removeObserver:self];`


    `        NSString *identifier = [sa_OAuthTwitterEngine getImageAtURL:[dictionary`![images](images/U002.jpg)

    ` objectForKey:@"profile_image_url"]];`


    `        //listen for a notification with the name of the identifier`

    `        [[NSNotificationCenter defaultCenter] addObserver:self`

    `               selector:@selector(twitterProfileImageRequestDidComplete:)`

    `               name:identifier`

    `               object:nil];`

    `}`


    First, we set the text for the `textLabel` of the cell to the value associated
    with the `screen_name` key in the `data` dictionary. Second, we initiate a request
    for this particular follower''s profile picture from Twitter via MGTwitterEngine''s
    `getImageAtURL:` method. We pass to this method the URL of the follower''s profile
    image that was returned to us from Twitter and is the value associated with the
    `profile_image_url` key in the `data` dictionary. Note that the `getImageAtURL:`
    method can be used to retrieve an image from any URL, not just a Twitter URL.


    When we make the request for the image, MGTwitterEngine returns the connection
    identifier and, just like in `FollowersViewController`, we tell `NSNotificationCenter`
    that we want to receive notifications matching the value of the connection identifier.


    MGTwitterEngine notifies our application that the image is available and passes
    it to us via the `imageReceived:forRequest: MGTwitterEngineDelegate` method. We
    then issue a notification for the returned connection identifier that contains
    the image:


    `- (void)imageReceived:(UIImage *)image forRequest:(NSString *)connectionIdentifier
    {`

    `        NSLog(@"Image receieved for connectionIdentifier = %@", connectionIdentifier);`


    `        NSDictionary *userInfoDictionary = [NSDictionary dictionaryWithObjects:`![images](images/U002.jpg)

    `[NSArray arrayWithObjects:image, nil] forKeys:[NSArray`![images](images/U002.jpg)

    ` arrayWithObjects:@"profile_image", nil]];`

    `        [[NSNotificationCenter defaultCenter] postNotificationName:connectionIdentifier`

    `              object:self`

    `              userInfo:userInfoDictionary];`

    `}`'
