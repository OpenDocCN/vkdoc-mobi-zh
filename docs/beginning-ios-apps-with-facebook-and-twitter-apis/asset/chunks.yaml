    `[facebook requestWithGraphPath:@"me/feed"`

    `                     andParams:params`

    `                   andDelegate:self];`


    The immediately preceding example requests all date strings in unixtime-format
    by specifying `U` as the `date_format` value. You can see more date formatting
    options available to you at this link:


    `http://php.net/manual/en/function.date.php`


    ### More Fun with the Twitter API


    We ended the last chapter by showing you how to retrieve and display who a user
    follows on Twitter. Twitter gives you access to a bunch of other goodies as well,
    so let’s see how we go about doing some more. These other goodies include getting
    someone’s favorite Tweets, tweeting something, sending someone a direct message,
    and a host of other things. As usual, we’ve hacked up our sample app a bit to
    give you an idea of how to use the APIs in `MGTwitterEngine` to access everything.
    If you run the Twitter sample app for this chapter, you will see another tab entitled,
    “Tweetin” with a “Twitter” button. Change the code in `TimelineViewController`’s
    `twitterButtonClick:` method to experiment with the different requests that we
    discuss here. And on with the show!'
