    \n1.  在您的 `HelloTwitter` 项目中创建一个名为 `MGTwitterEngine` 的新分组。\n2.  使用 Xcode，通过选择\
    \ Xcode 文件菜单中的“打开…”来打开 `MGTwitterEngine` Xcode 项目。导航到我们之前创建的 `MGTwitterEngine`\
    \ 子模块目录，并选择 `MGTwitterEngine.xcodeproj` 文件。\n3.  在 `MGTwitterEngine` 项目中选择 Classes\
    \ 文件夹，并将其拖到您在 `HelloTwitter` 项目中创建的 `MGTwitterEngine` 分组中。接下来，在弹出的对话框中选择“添加”。\n\
    4.  在您刚刚放入项目的 Classes 文件夹中，删除 Demo 文件夹。\n5.  `MGTwitterEngine` 默认使用 libxml XML，因此我们需要执行一些额外的步骤，以确保代码能够编译和链接。在后续章节中，我们将展示如何更改\
    \ `MGTwitterEngine` 以获取 JSON 格式的响应。不过现在，我们保持简单：\n    1.  将以下路径添加到目标（Target）的“头文件搜索路径”中：`/usr/include/libxml2`（如图\
    \ 4-4 所示）。\n\n        ![images](img/0404.jpg)\n\n        **图 4-4.** *添加路径 `/usr/include/libxml2`*\n\
    \n    2.  接下来，将您的目标链接到 `libxml2.dylib`，如图 4-5 所示。\n\n        ![images](img/0405.jpg)\n\
    \n        **图 4-5.** *链接目标*\n\n6.  我们修改了项目，现在保存更改：\n\n```\n$ git add HelloTwitter.xcodeproj/project.pbxproj\n\
    $ git commit -m \"Add MGTwitterEngine\"\n```\n\n### 添加 `UIViewController`\n\n\
    到目前为止，我们只有一个非常简单的 iOS 应用程序，现在让我们通过以下步骤为项目添加 `UIViewController`：\n\n1.  在 Xcode\
    \ 项目的“分组与文件”部分，右键点击 Shared 文件夹，然后从弹出菜单中选择“文件 > 新建…”，打开新建文件窗口。\n2.  在新建文件窗口的左侧边栏中，从\
    \ iOS 部分选择 Cocoa Touch 类，然后在主区域中选择 `UIViewController` 子类。\n3.  在新建文件窗口中点击“下一步”按钮，将文件命名为\
    \ `MainViewController.m`，然后点击“完成”按钮保存文件并将其添加到项目中。\n4.  在应用程序委托的头文件中，添加一个 `MainViewController`\
    \ 对象。\n5.  在两个应用程序委托文件中，在 `application:didFinishLaunchingWithOptions:` 方法中分配并初始化\
    \ `MainViewController`，并将其视图作为子视图添加到主窗口中。另外，别忘了在 `dealloc` 中释放 `MainViewController`\
    \ 对象。\n6.  在 Xcode 项目的“分组与文件”部分，右键点击 Shared 文件夹，然后从弹出菜单中选择“文件 > 新建…”，打开新建文件窗口。\n\
    7.  在新建文件窗口的左侧边栏中，从 iOS 部分选择 Cocoa Touch 类，然后在主区域中选择 Objective-C 类。确保在“子类”下拉菜单中选择\
    \ `UIView`。\n8.  在新建文件窗口中点击“下一步”按钮，将文件命名为 `MainView.m`，然后点击“完成”按钮保存文件并将其添加到项目中。\n\
    9.  现在保存您最新的更改：\n\n```\n$ git add HelloTwitter.xcodeproj/project.pbxproj\n$ git\
    \ add MainViewController.*\n$ git add MainView.*\n$ git commit -m \"Added ViewController\
    \ and View\"\n```\n\n### 启动 Twitter 引擎\n\n一切设置就绪后，现在是在您的应用中启动 Twitter 的时候了。请按照以下步骤操作：\n\
    \n1.  在 Xcode 中，在应用程序委托的头文件中声明一个 `MGTwitterEngine` 对象，然后在委托的 `application:didFinishLaunchingWithOptions:`\
    \ 方法中实例化该对象：`mgTwitterEngine = [[MGTwitterEnginealloc] initWithDelegate:self];`\n\
    2.  确保在应用程序委托的 `dealloc` 方法中释放该对象：`[mgTwitterEngine release];`\n3.  让应用程序委托遵循\
    \ `MGTwitterEngineDelegate` 协议：`@interfaceAppDelegate : NSObject<UIApplicationDelegate,\
    \ MGTwitterEngineDelegate> {}`\n4.  在应用程序委托中实现 `MGTwitterEngineDelegate` 方法。这些方法在\
    \ `MGTwitterEngine` 代码的 `MGTwitterEngineDelegate.h` 中定义：\n    -   `- (void)requestSucceeded:(NSString\
    \ *)connectionIdentifier`\n    -   `- (void)requestFailed:(NSString *)connectionIdentifierwithError:(NSError\
    \ *)error`\n    -   `- (void)statusesReceived:(NSArray *)statuses forRequest:(NSString\
    \ *)connectionIdentifier`\n    -   `- (void)directMessagesReceived:(NSArray *)messages\
    \ forRequest:(NSString *)connectionIdentifier`\n    -   `- (void)userInfoReceived:(NSArray\
    \ *)userInfoforRequest:(NSString *)connectionIdentifier`\n    -   `- (void)miscInfoReceived:(NSArray\
    \ *)miscInfoforRequest:(NSString *)connectionIdentifier`\n    -   `- (void)socialGraphInfoReceived:(NSArray\
    \ *)socialGraphInfoforRequest:(NSString *)connectionIdentifier`\n    -   `- (void)accessTokenReceived:(OAToken\
    \ *)token forRequest:(NSString *)connectionIdentifier`\n    -   `- (void)imageReceived:(UIImage\
    \ *)image forRequest:(NSString *)connectionIdentifier`\n    -   `- (void)connectionStarted:(NSString\
    \ *)connectionIdentifier`\n    -   `- (void)connectionFinished:(NSString *)connectionIdentifier`\n\
    5.  在 MainView 中发起一个 Twitter 社交图谱请求。在这个简单的示例中，我们将请求 Twitter 公共时间线的信息：`[mgTwitterEnginegetPublicTimeline];`\n\
    6.  结果将通过应用程序委托中的 `statusesReceived:forRequest:` 委托回调以 XML 字符串的形式返回。您可以将此字典的描述输出到控制台日志以供查看：\n\
    \n```\n- (void)statusesReceived:(NSArray *)statuses forRequest:(NSString *)connectionIdentifier\n\
    {\n    NSLog(@\"Status received for connectionIdentifier = %@, %@\", connectionIdentifier,\n\
    [statuses description]);\n}\n```\n\n这没那么痛苦，对吧？\n\n### 接下来，关于安全性\n\n网上有各种文档资源可以帮助您入门这些框架，但我们希望逐步引导您完成早期阶段，让您了解应该优先考虑什么。在本章中，我们在\
    \ GitHub 上进行了设置，添加了 Facebook iOS SDK，创建了一个 Facebook 应用的核心功能，并且对 Twitter 也做了同样的事情（虽然稍微麻烦一点）。既然您已经准备好了工具，距离开始构建项目就非常接近了。不过，首先我们需要快速绕道进入安全领域。这可能有点枯燥，但以后您会感谢我们的。\n\
    \n## 第 5 章\n\n## 使用 OAuth 和账户进行安全开发\n\n在本章中，我们将解释您的 iOS 应用需要哪些步骤来安全地处理用户账户；我们将首先讨论开源身份验证协议\
    \ `OAuth`，然后讨论如何使用 `SSL/TSL` 协议的 HTTP，也就是 `HTTPS`。\n\n阅读完本章后，您将知道如何使用最高安全标准来部署您初具雏形的应用。即使您预见到您的应用不会处理敏感的用户信息，我们也强烈建议您阅读本章；从一开始就打下安全的基础将使用户满意，并赢得\
    \ iOS 工程界的尊重。\n\n如果您已经熟悉 `OAuth`，只想看看它在 Facebook 和 Twitter 中的实际应用，可以查看 Git 仓库中\
    \ Chapter5 文件夹下的代码。\n\n阅读完本章后，您应该了解以下内容：\n\n*   如何安全地处理用户账户。\n*   如何创建一个为 Facebook\
    \ 或 Twitter 功能做好准备的项目。\n"
- fmt: '### OAll OAbout OAuth


    `OAuth`，一个源自术语“开放认证”的名称，正如其名：一个开放式的授权标准。`OAuth` 已迅速成为允许第三方站点、应用和服务共享访问用户资源的网站默认标准。大多数社交网站现在要求或强烈鼓励开发者使用
    `OAuth`。这并不奇怪，因为隐私泄露会对任何社交网络（或社交应用）的可信度造成严重损害。在处理这些社交 API 时，没有什么比安全更重要，因此我们专门用一整章来讨论用户认证。


    #### OAuth 工作原理


    使用 `OAuth` 允许用户共享存储在远程服务（如 Facebook 或 Twitter 的服务器）上的私有内容（如照片和联系人），而无需你在应用中存储他们在该站点的凭据。通过将你的应用从“中间人”角色中移除，社交网络可以最大限度地降低用户的用户名和密码落入被某种恶意软件入侵的手机的风险。`OAuth`
    还允许用户在决定停止使用某个应用时，撤销该应用对其私人数据的访问权限。


    `OAuth` 是如何实现这一神奇功能的？


    在高层面上，在一个已启用 `OAuth` 并作为第三方请求资源的 iOS 应用中，应用会向用户显示一个 `UIWebView`，并向服务提供商的一组预定义
    URL 发送请求。最终，这些请求会在 `UIWebView` 中向用户返回一个登录/认证表单，如图 5-1 所示。


    ![images](images/0501.jpg)


    **Figure 5–1.** *Facebook 登录页面*


    然后，用户输入其用户名和密码并提交表单。如果确定用户从未授权此应用访问服务提供商的资源，服务提供商会将用户重定向到一个表单，允许用户授予或拒绝该应用从应用内部访问其资源。


    ![images](images/0502.jpg)


    **Figure 5–2.** *Facebook 权限页面*


    如果用户授予了应用权限（图 5-2），服务提供商将重定向并向应用提供的回调地址提供一个令牌。随后，应用代表用户向服务提供商获取资源的请求将使用该令牌，让服务提供商判断应用是否应该访问这些资源。


    **注意：** 在 `OAuth` 中，服务提供商实际上会向应用提供两个令牌：一个临时请求令牌和（最终）一个访问令牌。请求令牌通常有一个预定义的过期时间窗口——通常最多几个小时。一旦你的应用被授予访问权限并收到访问令牌，它就会用这个令牌来向服务提供商发起后续的数据请求。该访问令牌将保留在你的应用中，从而使你保持登录状态，直到用户选择登出。用户也可以选择远程撤销应用，此时该令牌将失效。


    ##### Facebook 和 Twitter 中的 OAuth


    关于 `OAuth` 以及它与 Facebook 和 Twitter 的关系，需要注意两点。首先，目前 `OAuth` 有两个版本：1.0a 和 2.0。与其他标准不同，`OAuth`
    2.0 是对 `OAuth` 的完全重新设计。Facebook 的 Graph API 唯一支持的 `OAuth` 版本是 2.0。Twitter 目前支持
    `OAuth` 的 1.0a 版本。


    其次，`OAuth` 在 Facebook 和 Twitter 中的实现方式存在一些重要差异。Facebook 在其 SDK 中不遗余力地使通过 `OAuth`
    进行授权的过程无缝衔接。然而，由于 Twitter 没有自己的 iOS SDK，通过 `OAuth` 进行授权的过程并不那么直接。


    在接下来的章节中，我们将引导你完成必要的步骤，让用户通过 `OAuth` 授权你的应用，代表他们访问 Facebook 或 Twitter 上的资源。


    ### Facebook 中的 OAuth


    Facebook 对基本用户信息相当开放；默认情况下，你的应用可以访问用户个人资料中任何公开的信息（通常包括其真实姓名、个人资料图片、好友列表以及其他诸如生日、性别和网络等细节），而无需任何授权。如果你的应用需要访问更私密的信息（如电子邮件地址或留言），或试图代表用户在
    Facebook 墙上发布内容，则必须使用 `OAuth` 请求访问这些资源的权限。此外，某些资源只有在请求“扩展权限”后才能访问。'
  raw: '### OAll OAbout OAuth


    `OAuth`, a moniker derived from the term *open authentication*, is exactly what
    it sounds like: an open standard for authorization. `OAuth` has quickly become
    the default standard for sites that allow shared access to users'' resources from
    third-party sites, applications, and services. Most social networking sites now
    require or strongly encourage that developers use `OAuth`. It''s no wonder because
    a privacy breach can do serious damage to the credibility of any social network
    (or social app). Nothing is more important than security when working with these
    social APIs, so that''s why we''re devoting an entire chapter to user authentication.


    #### How OAuth Works


    Using `OAuth` allows users to share private stuff like photos and contacts that
    are stored on a remote service (like a server belonging to Facebook or Twitter)
    without you having to store their credentials for that site in your app. By removing
    your app as “the middleman,” social networks can minimize the likelihood that
    a user''s username and password fall prey to a phone that has somehow been compromised
    by some kind of malware. `OAuth` also allows a user to revoke an app''s access
    to her private data if she decides to stop using it.


    How does `OAuth` work this magic?


    At a high level in an `OAuth`-enabled iOS app that is requesting resources as
    a third party, the app displays a `UIWebView` to the user and sends requests to
    a set of predefined URLs from the service provider. Ultimately these return a
    login/authentication form to the user in the `UIWebView` seen in [Figure 5–1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    **Figure 5–1.** *The Facebook login page*


    The user then enters his username and password and submits the form. If it''s
    determined that the user has never authorized this app to have access to the service
    provider''s resources, the service provider redirects the user to a form that
    lets the user grant or deny access to the service provider''s resources from within
    the app.


    ![images](images/0502.jpg)


    **Figure 5–2.** *The Facebook permissions page*


    If the user grants the app permission ([Figure 5–2](#Chapter05.html#fig_5_2)),
    the service provider redirects and supplies a token to a callback provided by
    the app. Subsequent requests by the app to obtain resources from the service provider
    on the user''s behalf then use the token to let the service provider determine
    if the app should have access to those resources.


    **NOTE:** With `OAuth`, there are actually two tokens given to the app from the
    service provider: a temporary request token and (ultimately) an access token.
    There''s usually a pre-defined window of time in which the request token expires—usually
    a couple of hours, at most. Once your app is granted access and receives an access
    token, it uses this token for subsequent data requests from the service provider.
    The access token will remain with your app, which in turn keeps the user logged
    in until the user chooses to log out. Users can also choose to revoke an app remotely,
    at which point the token becomes invalid.


    ##### OAuth in Facebook and Twitter


    There are two things you should be aware of with respect to `OAuth` and how it
    relates to Facebook and Twitter. First, there are currently two versions of `OAuth`
    out in the wild: 1.0a and 2.0\. Unlike other standards, `OAuth` 2.0 is a complete
    redesign of `OAuth`. The only version of `OAuth` supported by Facebook''s Graph
    API is version 2.0. Twitter currently supports version 1.0a of `OAuth`.


    Second, there are some important differences in how `OAuth` is implemented in
    Facebook and Twitter. Facebook has gone through the trouble of making authorization
    via `OAuth` seamless within its SDK. However, `OAuth` via Twitter is not as straightforward
    since Twitter does not have its own iOS SDK.


    In the following sections, we will walk you through the steps necessary to let
    users authorize your application via `OAuth` to access resources from Facebook
    or Twitter on their behalf.


    ### OAuth in Facebook


    Facebook is pretty liberal with basic user information; by default, your app can
    access anything that''s public in a user''s profile (which usually includes her
    real name, profile picture, friends list, and other minutiae like birthday, gender,
    and networks) without any authorization. If your app needs access to more private
    information (like an email address or Wall posts) or seeks to publish to a user''s
    Facebook wall on her behalf, your app must request permission to access these
    resources using `OAuth`. In addition, some resources can only be accessed if you
    request “extended permissions.”'
