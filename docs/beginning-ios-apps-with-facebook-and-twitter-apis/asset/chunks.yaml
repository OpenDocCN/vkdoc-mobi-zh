    ### 展示各类反馈


    反馈被定义为任何表明某个进程正在进行的声响、振动或视觉指示器。显示反馈非常重要，尤其是在触摸设备上，因为操作屏幕上的物体时缺乏触觉感受。当你的应用主动执行某些操作（例如自动加载新推文）时，显示反馈同样至关重要。


    苹果公司表示，用户的每一个操作都应在屏幕上产生某种可感知的变化——即使只是按钮被按下时的阴影。苹果还要求，当某项操作耗时超过几秒钟时，你应该显示一个活动指示器。


    另一种反馈形式是动画。推特公司表示，动画有助于“提升可读性”，而苹果的`HIG`则指出，这些动画应当“微妙且恰当”，并服务于以下目的之一：


    -   传达状态。

    -   提供有用的反馈。

    -   增强直接操控的感知。

    -   帮助用户可视化其操作的结果。


    苹果警告你要谨慎使用动画，因为无端使用时，动画容易让人感到厌烦。另外一点：苹果表示，你应努力使动画与 iOS 内置应用中的动画保持一致。


    然而，在实践中，许多开发者为了在他们认为的特定交互上做出改进，而背离了苹果对动画的使用。一个例子是由官方推特应用开发者首创的“下拉刷新”指示器，它已被开发者（包括
    Facebook 的开发者）反复复制。你可以在图 12-3 中看到它的实际效果。


    ![images](img/1203.jpg)


    **图 12-3.** *Facebook 应用向用户显示正在加载新信息。*


    请注意，单个开发者的创新能如此广泛传播是不同寻常的，因此你不太可能通过推翻一些非常常见的系统动画，在 iOS 设计史上留下你的印记。但如果你坚信你的应用有理由偏离`HIG`和
    App Store 的设计精英们设定的标准；那么，尽管放手一试，看看在测试中能得到什么样的反馈。


    还要注意，*更新*指示器与应用在发布“墙上帖子”时使用的活动指示器是不同的（参见图 12-4）。在后一种情况下，使用一个简单的 iOS 活动指示器来表明“下拉释放”刷新控件已被激活，并且帖子正在刷新。（关于当手机离线时你的应用应如何处理，可以阅读第
    8 章的内容。）


    ![images](img/1204.jpg)


    **图 12-4.** *Facebook 的进度轮*


    在 iOS 中，声音是次要的反馈媒介，因为苹果认为存在太多场景（比如环境太嘈杂）使得反馈无法被用户察觉。振动是一种更可靠的反馈机制，但它应该只用于最重要的通知。而且，振动频率也不能太高。用户必须能够将其关闭。


    Facebook 让你可以选择同时使用声音和振动。它还与“摇动刷新”功能一起使用了手机中的加速计输入（参见图 12-5）。


    **注意：** Facebook 遵循了苹果的设计指南，将这些反馈偏好设置放在了系统“设置”应用的一个面板中。有关偏好设置的更多信息，请参阅本章后面的“以标准方式呈现设置”部分。


    ![images](img/1205.jpg)


    **图 12-5.** *Facebook 将一些“一劳永逸”的偏好设置保留在系统“设置”应用中。*


    ### 触摸目标与文本


    iOS 中触摸目标的最小尺寸是 44 × 44 像素。务必在控件之间留出足够的间距；并且，正如我们在上一节中所说，不要把屏幕挤满控件。例如，我们喜欢 TwitHit
    将核心任务置于屏幕正中央的方式，如图 12-6 所示。


    ![images](img/1206.jpg)


    **图 12-6.** *TwitHit 清晰突出了主要任务。*


    请记住，让你所有的控件都可点击，并注意它们的标签。你可以在接下来的章节中找到关于标签命名以及商标和图标使用的指导。


    ### 原型设计与测试


    苹果强烈建议在将你的应用提交到 App Store 之前进行用户测试。这在社交应用设计中尤其重要。如果你正在构建使用 Facebook 或 Twitter
    的应用，务必下载其他使用这些 API 的应用（本书中已讨论过许多这样的应用）。看看它们如何处理某些操作，以及如何在视觉上区分自己。同时，询问你的朋友和同事他们喜欢其他哪些应用的哪些功能，然后让他们反馈来指导你的设计流程。在精细调整应用方面，Xcode
    非常灵活，你可以轻松地进行几次迭代以把事情做对。


    ### 用户希望从你的应用中获得什么


    以下是你在设计应用时应优先考虑的七个基本方面：


    -   内容

    -   逻辑路径

    -   清晰的设置

    -   品牌标识

    -   简洁

    -   许可协议

    -   适应 iPad 的设计


    在接下来的章节中，我们将逐一审视这些设计原则，以及你如何在你的应用中利用它们。


    #### 内容


    Facebook 和 Twitter 都围绕两个核心任务展开：在广阔的*社交图谱*中消费和创建内容。


    如果你的应用能够发布内容，它应该为用户提供一个干净、宽敞的界面来输入文本或媒体，文本框内或周围不应有大量其他控件。虽然它不是纯粹极简主义的设计，但我们喜欢
    TweetBot 呈现“创建推文”的方式。


    如果你的应用从 Facebook 或 Twitter 的 API 获取信息，应该以恰当的方式呈现。对于照片，这意味着你的应用应以全屏显示，并带有半透明的控件，且在不使用时自动消失。对于文本，这意味着要使用清晰易读的字体。


    #### 逻辑路径


    官方 Twitter 和 Facebook 应用在复杂性上可能会让人感觉像迷宫；然而，它们处理得很好。Twitter 通过一个动态的应用程序栏来管理其复杂性，而
    Facebook 则通过其“网格”UI 来实现。但是，正如我们将在本章后面讨论的，如果你的应用很复杂，你无法复制这两种策略。请继续阅读，学习如何围绕 Twitter
    和 Facebook 的内容设计交互。


    #### 清晰的设置


    苹果表示，开发者应避免将应用的设置放在应用本身内部；相反，他们应该选择在系统“设置”应用内提供一个设置面板。然而，许多同时使用 Facebook 和 Twitter
    API 的热门应用并未遵循这一惯例，通常是因为它们觉得系统设置的 API 限制太多。我们建议的折中方案是：将“一劳永逸”的选项放入“设置”应用，而将更常用到的选项放在你的应用内部。如果用户需要离开你的应用去编辑账户信息或调整视觉显示选项，许多用户会感到不耐烦。


    官方的 Facebook 应用实际上遵循了我们刚才描述的惯例，而 Twitter 应用则在其应用内部的几个屏幕中处理所有设置（参见图 12-7）。


    ![images](img/1207.jpg)


    **图 12-7.** *Twitter 在其应用内部处理偏好设置。*


    #### 品牌标识


    你应该使用色彩、样式、定制的艺术设计和动画，来打造专属于你应用的独特外观和感觉。这就是用户如何将你与其他开发者区分开来，以及如何将你的应用与竞争对手的应用区分开来的方式。


    #### 简洁


    用简短、具体的术语来标注事物。如果你无法为某个控件想到一个合理的标签，可以考虑使用苹果的系统图标之一，或者使用用户能从 Facebook 或 Twitter
    平台理解的符号。也要考虑添加许可协议或免责声明。

