    `inManagedObjectContext:self.managedObjectContext];`


    `            NSNumberFormatter * f = [[NSNumberFormatter alloc] init];`

    `            NSNumber * tweetId = [f numberFromString:[tweetDictionary`

    `objectForKey:@"id"]];`

    `            [tweet setId:tweetId];`

