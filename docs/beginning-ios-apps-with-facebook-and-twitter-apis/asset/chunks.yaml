- fmt: "### Add UIViewController\n\nUp to this point, we've had a very simple iOS\
    \ application, so let's add `UIViewController` to our project by doing the following:\n\
    \n1.  In the Groups & Files section of the Xcode project, right-click the Shared\
    \ folder and select **File** > **New…** from the pop-up menu to display the New\
    \ File window.\n2.  In the left sidebar of the New File window, choose `Cocoa\
    \ Touch Class` from the iOS section and then choose the `UIViewController` subclass\
    \ in the main section.\n3.  Click the Next button on the New File window, name\
    \ the file `MainViewController.m`, and click the Finish button to save the file\
    \ and add it to the project.\n4.  In the application delegate header file, add\
    \ a `MainViewController` object.\n5.  In the application delegate file, allocate\
    \ and initialize the `MainViewController` and add its view as a subview of the\
    \ main window in the `application:didFinishLaunchingWithOptions:` method. Also,\
    \ don't forget to release the `MainViewController` object in `dealloc`.\n6.  In\
    \ the Groups & Files section of the Xcode project, right-click the Shared folder\
    \ and select **File** > **New…** from the pop-up menu to display the New File\
    \ window.\n7.  In the left sidebar of the New File window, choose `Cocoa Touch\
    \ Class` from the iOS section and then choose `Objective-C class` in the main\
    \ section. Be sure to choose `UIView` in the `Subclass` drop-down menu.\n8.  Click\
    \ the Next button on the New File window, name the file `MainView.m`, and click\
    \ the Finish button to save the file and add it to the project.\n9.  Finally,\
    \ save your latest set of changes:\n\n```\n$ git add HelloFacebook.xcodeproj/project.pbxproj\n\
    $ git add MainViewController.*\n$ git add MainView.*\n$ git commit -m \"Add ViewController\
    \ and View\"\n```\n\n### CREATE AN APP FOR FACEBOOK\n\nIn order to use Facebook's\
    \ services via the Facebook iOS SDK, you will need to register your application\
    \ with Facebook and obtain an application ID, as pictured in [Figure 4–3](#Chapter04.html#fig_4_3).\n\
    \n**NOTE:** Throughout this book, we will be using an application ID that we created\
    \ for the sole purpose of demonstrating the use of the Facebook iOS SDK; however,\
    \ you will need to obtain your own application ID by going to [`www.facebook.com/developers/createapp.php`](http://www.facebook.com/developers/createapp.php).\n\
    \n![images](images/0403.jpg)\n\n**Figure 4–3.** *Getting a Facebook application\
    \ ID, secret, and key*\n\nWe're finally ready to rock-n-roll with the Facebook\
    \ iOS SDK:\n\nIn Xcode, declare a `Facebook` object in your application delegate's\
    \ header file and then instantiate the object in your delegate's `application:didFinishLaunchingWithOptions:`\
    \ method:\n\n```\nfacebook = [[Facebook alloc] initWithAppId: @\"YOUR APP ID HERE\"\
    ];\n```\n\n1.  Be sure to release the object in your application delegate's `dealloc`\
    \ method: `[facebook release];`\n2.  Set `MainView` as a `FBRequestDelegate`:\n\
    \n```\n@interface MainView : UIView<FBRequestDelegate> {}\n@end\n```\n\n3.  Implement\
    \ the `FBRequestDelegate` methods in `MainView`. These are defined in `FBRequest.h`\
    \ in the Facebook iOS SDK:\n\n```\n- (void)requestLoading:(FBRequest *)request\n\
    - (void)request:(FBRequest *)request didReceiveResponse:(NSURLResponse *)response\n\
    - (void)request:(FBRequest *)request didFailWithError:(NSError *)error\n- (void)request:(FBRequest\
    \ *)request didLoad:(id)result\n- (void)request:(FBRequest *)request didLoadRawResponse:(NSData\
    \ *)data\n```\n\n4.  Make a request of the Facebook social graph. For this simple\
    \ example, we are going to ask for information about the Facebook application\
    \ that we created for this book:\n\n```\nNSString    *kFacebookID    = @\"114442211957627\"\
    ;\n[facebook requestWithGraphPath:kFacebookID andDelegate:self];\n```\n\n5.  The\
    \ results will be returned in the `request:didLoad` delegate callback as an `NSDictionary`.\
    \ We write the description of this dictionary out to the console log for review:\n\
    \n```\n{\n    id = 114442211957627;\n    link = \"http://www.facebook.com/apps/application.php?id=114442211957627\"\
    ;\n    name = \"Beginning iOS Social Development\";\n}\n```\n\nThe contents of\
    \ the dictionary are as follows:\n\n```\n{ id = 114442211957627;         link\
    \ =\n\"http://www.facebook.com/apps/application.php?id=114442211957627\";    name\
    \ =\n\"Beginning iOS Social Development\"; }\n```\n\nYou've done it! Now your\
    \ app is ready to use the Facebook iOS SDK.\n\n### Hello Twitter\n\nIn this section,\
    \ we will provide a basic framework for getting set up with an iOS application\
    \ that uses the Twitter API on iOS. At the time of writing, Twitter does not have\
    \ its own iOS SDK. However, a number of folks have created libraries for iOS that\
    \ wrap the Twitter API in Objective-C code. In this section, we will provide a\
    \ basic framework for getting set up with what we feel is one of the most suitable\
    \ of these libraries: `MGTwitterEngine`.\n\n**NOTE:** Here's a little history\
    \ on our decisions concerning `MGTwitterEngine`. The original version of `MGTwitterEngine`\
    \ is hosted on Github at [`https://github.com/mattgemmell/MGTwitterEngine`](https://github.com/mattgemmell/MGTwitterEngine).\n\
    \nWe aren't satisfied with how much effort `MGTwitterEngine` requires to get up\
    \ and running. However, we were able to find a fork up a version of `MGTwitterEngine`\
    \ on Github that we felt was more suitable for our purpose at [`https://github.com/ctshryock/MGTwitterEngine`](https://github.com/ctshryock/MGTwitterEngine).\
    \ The best part: It's easy to work with out-of-the-box, and it requires only a\
    \ little configuration.\n\nOnce again, fire up Xcode and a terminal session, and\
    \ let's get started writing some code. Or feel free to clone the repository for\
    \ the book and browse the example code yourself at this URL:\n\n```\n$ git clone\
    \ git@github.com:chrisdannen/Apress_iOSFacebookTwitter.Git\n```\n\n#### Creating\
    \ a Project\n\nCreate a project for use with Twitter by opening Xcode and selecting\
    \ **New Project…** under the **File** menu. Next, do the following in the **New\
    \ Project** pop-up window:\n\n1.  Select **Application** in the iOS section of\
    \ the left sidebar.\n2.  Select **Window-based Application** in the main section.\n\
    3.  Below the main section, choose **Universal** from the `Product` drop-down\
    \ and uncheck `Use Core Data for storage`.\n4.  Click the **Choose…** button at\
    \ the bottom of the window.\n5.  Save the project as `HelloTwitter` in the directory\
    \ of your choosing.\n\nNow that we have created the project, let's do a few things\
    \ via Git to make our lives a little easier. Open the Mac OS X Terminal application\
    \ and perform the following commands:\n\n1.  Change your working directory to\
    \ the directory where you saved your `HelloTwitter` application and initialize\
    \ a new Git repository: `$ git init`\n2.  Create a Git ignore file (`.gitignore`)\
    \ in the same directory. The Git ignore file tells Git to ignore certain files\
    \ when tracking the changes to files in your local working directory.\n3.  Now\
    \ add all of the files in the project to the Git repository: `$ git add *`\n4.\
    \  Save everything that you've done thus far by committing your changes to the\
    \ repository: `$ git commit -m \"Initial commit\"`\n5.  Link the `MGTwitterEngine`\
    \ iOS Git repository on Github to your repository using a Git submodule that will\
    \ reside in a subdirectory entitled `MGTwitterEngine`: `$ git submodule add git://github.com/ctshryock/MGTwitterEngine.git\
    \ MGTwitterEngine`\n6.  Save your latest set of changes: `$ git commit -m \"Add\
    \ submodule to track MGTwitterEngine\"`"
