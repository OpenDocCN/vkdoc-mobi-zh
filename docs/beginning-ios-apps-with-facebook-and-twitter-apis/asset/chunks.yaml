    In the last chapter, we talked about all the rules and regulations that Facebook
    and Twitter have conceived in the name of “protecting the user experience.” Of
    course, those guidelines only address things that could reflect poorly on the
    platform. This chapter offers a little guidance on how to make something that
    doesn''t merely satisfy the letter of the law: an app that is actually intuitive
    to use.


    If this is your first time designing an iOS app, this section is required reading.
    It will address several sections of Apple''s Human Interface Guidelines (HIG),
    which are especially important for social apps. It will also tell you how you
    can use visual and interaction design correctly, avoiding both user confusion
    and trademark conflicts. Follow these rules, and you''ll get great feedback from
    users—and no hassling from the Twitter and Facebook platform reps.


    We, the authors, believe the best iOS apps generally follow Apple''s HIG, except
    where they purposely diverge to make an improvement upon the interface. In other
    words, we believe the best design should win, and developers can and should replicate
    each other''s best interactions in the hopes of creating organic UI standards.


    What we''re really saying here is that learning the rules is crucial if you''re
    going to be empowered to break them. If you''ve designed apps before, then this
    chapter is optional. However, you may want to page through it briefly to review
    certain paradigms.


