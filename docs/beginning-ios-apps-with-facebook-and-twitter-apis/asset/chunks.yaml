  trans: "\n如果你查看`OAuthTwitter`示例项目中的`MainViewController`类，你将了解我们是如何引入`TwitterLoginButton`的。我们使用了\
    \ iOS Twitter 引擎的`isAuthorized:`方法，在示例应用程序启动时将按钮设置为正确的状态：\n\n```\ntwitterLoginButton.isLoggedIn\
    \ = [sa_OAuthTwitterEngine isAuthorized];\n```\n\n当点击时，此按钮会触发以下方法：\n\n```\n- (void)twitterButtonClick:(UIButton*)sender\
    \ {\n    if (twitterLoginButton.isLoggedIn) {\n        [self logout];\n    } else\
    \ {\n        [self login];\n    }\n}\n```\n\n在`login:`方法中，我们使用`SA_OAuthTwitterController`类向用户显示\
    \ Twitter 的`OAuth`登录页面。我们通过`UIViewController`的`presentModalViewController:`方法以模态方式呈现它。在初始化`SA_OAuthTwitterController`对象时，你需向其传递我们在主应用程序委托中创建并初始化的`SA_OAuthTwitterEngine`，同时还要传递一个`SA_OAuthTwitterControllerDelegate`。以下是代码：\n\
    \n```\n- (void)login {\n    UIViewController *controller =\n    [SA_OAuthTwitterController\
    \ controllerToEnterCredentialsWithTwitterEngine:\n    sa_OAuthTwitterEngine delegate:\
    \ self];\n    if (controller) {\n        [self presentModalViewController: controller\
    \ animated: YES];\n    }\n    else {\n        [sa_OAuthTwitterEngine sendUpdate:\
    \ [NSString stringWithFormat:\n        @\"Already Updated. %@\", [NSDate date]]];\n\
    \    }\n}\n```\n\n我们需要将自身声明为`SA_OAuthTwitterControllerDelegate`，并在头文件中完成：\n\n\
    ```\n@interface MainViewController : UIViewController <SA_OAuthTwitterControllerDelegate>\
    \ {\n}\n```\n\n最后一步是实现`SA_OAuthTwitterControllerDelegate`的委托方法：\n\n```\n- (void)\
    \ OAuthTwitterController: (SA_OAuthTwitterController *) controller\nauthenticatedWithUsername:\
    \ (NSString *) username {\n    NSLog(@\"Authenicated for %@\", username);\n  \
    \  twitterLoginButton.isLoggedIn = YES;\n    [twitterLoginButton updateImage];\n\
    }\n\n- (void) OAuthTwitterControllerFailed: (SA_OAuthTwitterController *) controller\
    \ {\n    NSLog(@\"Authentication Failed!\");\n}\n\n- (void) OAuthTwitterControllerCanceled:\
    \ (SA_OAuthTwitterController *) controller {\n    NSLog(@\"Authentication Canceled.\"\
    );\n}\n```\n\n请注意，我们是如何在通过`OAuthTwitterController:authenticatedWithUsername:`委托方法成功登录后更新`TwitterLoginButton`状态的。你很可能希望在自己的应用程序代码中执行特定于应用程序的步骤。\n\
    \n如果用户在登录页面上输入了错误的用户名和密码，或者点击了“拒绝”按钮，则会调用`OAuthTwitterControllerFailed:`委托方法，实现该方法的代码应向用户显示一条消息，解释登录失败的原因。如果用户取消了`SA_OAuthTwitterController`对话框，则会调用`OAuthTwitterControllerCanceled:`委托方法。\n\
    \n图 5–22 和 5–23 显示了`SA_OAuthTwitterController`在显示 Twitter 身份验证页面时屏幕截图。\n\n![images](img/0522.jpg)\n\
    \n**图 5–22.** *`SA_OAuthTwitterController`显示身份验证页面时的外观。*\n\n![images](img/0523.jpg)\n\
    \n**图 5–23.** *`SA_OAuthTwitterController`身份验证页面的下半部分*\n\n##### 登出 Twitter\n\n\
    将用户从 Twitter 注销是一个非常直接的过程。iOS Twitter 引擎提供了一个`clearAccessToken`方法，我们在`logout`方法中使用它。我们还重新设置了登录按钮：\n\
    \n```\n- (void)logout {\n    [sa_OAuthTwitterEngine clearAccessToken];\n    twitterLoginButton.isLoggedIn\
    \ = NO;\n    [twitterLoginButton updateImage];\n}\n```\n\n如果我们查看`clearAccessToken:`方法，会发现它会清除\
    \ Twitter 的`OAuth`访问和请求令牌，调用我们的委托方法以清除我们保存到`NSUserDefaults`的访问令牌，并清除一些其他对象：\n\n\
    ```\n- (void) clearAccessToken {\n    if ([_delegate respondsToSelector:\n   \
    \ @selector(storeCachedTwitterOAuthData:forUsername:)]) [(id) _delegate\n    storeCachedTwitterOAuthData:\
    \ @\"\" forUsername: self.username];\n    [_accessToken release];\n    _accessToken\
    \ = nil;\n    [_consumer release];\n    _consumer = nil;\n    self.pin = nil;\n\
    \    [_requestToken release];\n    _requestToken = nil;\n}\n```\n\n##### 内部原理：webViewDidFinishLoad\n\
    \n实现`OAuth`的视图控制器的主力是`UIWebView`。如果你检查`SA_OAuthTwitterController`，你会发现其主要视图是一个`UIWebView`，并且它本身是一个`UIWebViewDelegate`。`UIWebView`类的一个优点是它拥有许多委托方法，这些方法使得在`UIWebView`加载页面时可以在你的应用中执行原生功能。这是通过委托方法`webViewDidFinishLoad:`实现的。在`SA_OAuthTwitterController.m`中查看`webViewDidFinishLoad:`方法，可以了解其功能。甚至，在该方法的开始处设置一个断点，然后单步执行代码会更好。\n\
    \n### 更多内容\n\n我们已经尽力概述了主要内容，但构建一个安全的应用程序需要比本章所能涵盖的更多内容。关于良好的 iOS 开发的一些简洁、经过深思熟虑的经验法则，包括如何测试和部署应用程序而不会出现新手安全错误，请查看\
    \ Twitter 的安全最佳实践：[`http://dev.twitter.com/pages/security_best_practices`](http://dev.twitter.com/pages/security_best_practices)。\n\
    \n最后，请记住以下重要几点：\n\n*   在应用程序中尽早解决任何安全问题。\n*   反复测试以确保无缝的用户体验。\n*   如果从头构建认证系统不可行，请考虑通过`OAuth`使用`facebook\
    \ connect`来验证应用程序用户。\n"
- fmt: "# Getting Your App Ready for Social Messaging\n\nThe hardest part about understanding\
    \ this chapter is using Facebook and Twitter enough to understand what's going\
    \ on here on the front end. It's crucial! Once you understand this stuff, you\
    \ can go ahead and connect to the APIs.\n\nWe're guessing you've used Facebook\
    \ and Twitter if you're reading this book. Chances are, however, that you haven't\
    \ used them enough.\n\nIn this section of the book, we'll go into more detail\
    \ about how to get your iOS app connected with Facebook's Graph API and the Twitter\
    \ API. Then we'll discuss how to publish information from your app onto the social\
    \ Web: Tweets, messages, wall posts, and so forth.\n\nBut before we go any further,\
    \ let's explore the vaguely insulting assertion in the first line of this chapter.\
    \ We don't doubt that you have the faculties to understand what Facebook and Twitter\
    \ do. But there are a dizzying number of ways to publish information to the social\
    \ graph, and it's worth consciously exploring each one to figure out which mechanisms\
    \ are right for your app. Try to conceptualize what's happening on the front end—the\
    \ difference between an `@reply` and a direct message in Twitter, for example—so\
    \ that it will be easier to focus on which API calls you want your app to make.\
    \ As with any new project, it's important to implement only the most basic features\
    \ first, so being fluent in Facebook and Twitter will help you make informed choices\
    \ about which features to include.\n\nYou can find all of the code for this chapter\
    \ in the `Chapter6` directory of the Git repository. The Facebook code is in the\
    \ `ApiFacebook` project and the Twitter code is in the `ApiTwitter` project.\n\
    \nAll right, let's holler at some APIs, shall we?\n\n## Introducing the Facebook\
    \ Graph API\n\nThere are tons of things your app can publish on Facebook. These\
    \ things include, but aren't limited to the following: Wall posts, messages, group\
    \ messages, notes, events, statuses, comments, Likes, and Places (we'll give Places\
    \ more attention later). We'll begin by showing you how to pull information from\
    \ the Facebook social graph via the Facebook iOS SDK.\n\nIn order to make it easy\
    \ to see some of this in action, we have changed the structure of the sample application\
    \ a bit for this chapter. You will see that the sample application now uses a\
    \ `UITabBarController` to divide up the functionality of the app. It's not pretty,\
    \ but it works.\n\n### A Little Help from Our Friends\n\nIn all social networking,\
    \ the most important thing is to always be part of the user's friends and communications.\
    \ In keeping with this, we're first going to take a look at how to get a list\
    \ of the currently logged in user's friends and the associated profile picture\
    \ for each friend. This is accomplished via the `requestWithGraphPath:andDelegate:`\
    \ method:\n\n```\n[facebook requestWithGraphPath:@\"me/friends\" andDelegate:self];\n\
    ```\n\nBefore we delve into what's going on under the covers, let's peruse the\
    \ sample code a bit to get acquainted with using the `requestWithGraphPath:andDelegate:`\
    \ method. This is the primary method that is used to access information from the\
    \ Facebook social graph.\n\nIf you refer to the sample code, you will see that\
    \ we make the preceding `requestWithGraphPath:andDelegate:` method call in the\
    \ `viewDidLoad:` method of the `FriendsViewController` class. The `FriendsViewController`\
    \ class is a subclass of the `FacebookViewController` class, which is a subclass\
    \ of `UITableViewController`. Since the Facebook API returns lists of information,\
    \ we created the `FacebookViewController` class in order to reuse code and make\
    \ our lives a little easier for the purposes of demonstrating how to use and display\
    \ the results of Facebook graph path requests. It's important to note that the\
    \ `FacebookViewController` is also an `FBRequestDelegate`. Here is the declaration\
    \ for the `FacebookViewController` class:\n\n```\n@interface FacebookViewController\
    \ : UITableViewController <FBRequestDelegate> {\n        NSArray *items;\n}\n\
    @end\n```\n\nWhenever a request is made via the `requestWithGraphPath:andDelegate:`\
    \ method, a delegate must be specified in order to handle the response from the\
    \ Facebook iOS SDK. It's important to note that the Facebook iOS SDK calls the\
    \ methods of the `FBRequestDelegate` in the following order. First, before the\
    \ request is made to the Facebook servers, the `requestLoading:` method is called.\
    \ When the Facebook servers send a response, the `request:didReceiveResponse:`\
    \ method is called. Next, before the Facebook iOS SDK starts to handle the response,\
    \ the `request:didLoadRawResponse:` method is called to give the delegate the\
    \ chance to process the response data itself. Finally, the `request:didLoad:`\
    \ method is called with the response data stored in an Objective-C data type.\
    \ If there was a problem with the request, then the `request:didFailWithError:`\
    \ method is called.\n\nIf we take a look at the `request:didLoad:` method in the\
    \ `FacebookViewController`, we see the following:\n\n```\n- (void)request:(FBRequest\
    \ *)request didLoad:(id)result {\n        NSLog(@\"didLoad:\");\n\n        [items\
    \ release];\n        items = [[(NSDictionary*)result objectForKey:@\"data\"] retain];\n\
    \        [self.tableView reloadData];\n}\n```\n\nIf you recall from the earlier\
    \ example, the `FacebookViewController` owns a pointer to an `NSArray` entitled\
    \ `items`:\n\n```\nNSArray  *items;\n```\n\nIn the `request:didLoad:` method,\
    \ the first thing that we do is release the array of items. We do this to prevent\
    \ a memory leak. Since the next step is to assign a new array to the array of\
    \ items, any time we want to assign a new array, we need to first make sure that\
    \ we release and give back the array that we stored before. Things get a little\
    \ more interesting when we actually do the assignment, so let's review what's\
    \ going on in this step:\n\n```\n        items = [[(NSDictionary*)result objectForKey:@\"\
    data\"] retain];\n```"
  raw: '## **Getting Your App Ready for Social Messaging**


    The hardest part about understanding this chapter is using Facebook and Twitter
    enough to understand what''s going on here on the front end. It''s crucial! Once
    you understand this stuff, you can go ahead and connect to the APIs.


    We''re guessing you''ve used Facebook and Twitter if you''re reading this book.
    Chances are, however, that you haven''t used them enough.


    In this section of the book, we''ll go into more detail about how to get your
    iOS app connected with Facebook''s Graph API and the Twitter API. Then we''ll
    discuss how to publish information from your app onto the social Web: Tweets,
    messages, wall posts, and so forth.


    But before we go any further, let''s explore the vaguely insulting assertion in
    the first line of this chapter. We don''t doubt that you have the faculties to
    understand what Facebook and Twitter do. But there are a dizzying number of ways
    to publish information to the social graph, and it''s worth consciously exploring
    each one to figure out which mechanisms are right for your app. Try to conceptualize
    what''s happening on the front end—the difference between an `@reply` and a direct
    message in Twitter, for example—so that it will be easier to focus on which API
    calls you want your app to make. As with any new project, it''s important to implement
    only the most basic features first, so being fluent in Facebook and Twitter will
    help you make informed choices about which features to include.


    You can find all of the code for this chapter in the Chapter6 directory of the
    Git repository. The Facebook code is in the `ApiFacebook` project and the Twitter
    code is in the `ApiTwitter` project.


    All right, let''s holler at some APIs, shall we?


    ### Introducing the Facebook Graph API


    There are tons of things your app can publish on Facebook. These things include,
    but aren''t limited to the following: Wall posts, messages, group messages, notes,
    events, statuses, comments, Likes, and Places (we''ll give Places more attention
    later). We''ll begin by showing you how to pull information from the Facebook
    social graph via the Facebook iOS SDK.


    In order to make it easy to see some of this in action, we have changed the structure
    of the sample application a bit for this chapter. You will see that the sample
    application now uses a `UITabBarController` to divide up the functionality of
    the app. It''s not pretty, but it works.


    #### A Little Help from Our Friends


    In all social networking, the most important thing is to always be part of the
    user''s friends and communications. In keeping with this, we''re first going to
    take a look at how to get a list of the currently logged in user''s friends and
    the associated profile picture for each friend. This is accomplished via the `requestWithGraphPath`:`andDelegate`:
    method:


    `[facebook requestWithGraphPath:@"me/friends" andDelegate:self];`


    Before we delve into what''s going on under the covers, let''s peruse the sample
    code a bit to get acquainted with using the `requestWithGraphPath:andDelegate`:
    method. This is the primary method that is used to access information from the
    Facebook social graph.


    If you refer to the sample code, you will see that we make the preceding `requestWithGraphPath`:`andDelegate`:
    method call in the `viewDidLoad:` method of the `FriendsViewController` class.
    The `FriendsViewController` class is a subclass of the `FacebookViewController`
    class, which is a subclass of `UITableViewController`. Since the Facebook API
    returns lists of information, we created the `FacebookViewController` class in
    order to reuse code and make our lives a little easier for the purposes of demonstrating
    how to use and display the results of Facebook graph path requests. It''s important
    to note that the `FacebookViewController` is also an `FBRequestDelegate`. Here
    is the declaration for the `FacebookViewController` class:


    `@interface FacebookViewController : UITableViewController <FBRequestDelegate>
    {`

    `        NSArray *items;`

    `}`

    `@end`


    Whenever a request is made via the `requestWithGraphPath`:`andDelegate`: method,
    a delegate must be specified in order to handle the response from the Facebook
    iOS SDK. It''s important to note that the Facebook iOS SDK calls the methods of
    the `FBRequestDelegate` in the following order. First, before the request is made
    to the Facebook servers, the requestLoading: method is called. When the Facebook
    servers send a response, the `request:didReceiveResponse:` method is called. Next,
    before the Facebook iOS SDK starts to handle the response, the `request:didLoadRawResponse:`
    method is called to give the delegate the chance to process the response data
    itself. Finally, the `request:didLoad: method` is called with the response data
    stored in an Objective-C data type. If there was a problem with the request, then
    the `request:didFailWithError:` method is called.


    If we take a look at the `request:didLoad:` method in the `FacebookViewController`,
    we see the following:


    `- (void)request:(FBRequest *)request didLoad:(id)result {`

    `        NSLog(@"didLoad:");`


    `        [items release];`

    `        items = [[(NSDictionary*)result objectForKey:@"data"] retain];`

    `        [self.tableView reloadData];`

    `}`


    If you recall from the earlier example, the `FacebookViewController` owns a pointer
    to an `NSArray` entitled `items`:


    `NSArray  *items;`


    In the `request:didLoad:` method, the first thing that we do is release the array
    of items. We do this to prevent a memory leak. Since the next step is to assign
    a new array to the array of items, any time we want to assign a new array, we
    need to first make sure that we release and give back the array that we stored
    before. Things get a little more interesting when we actually do the assignment,
    so let''s review what''s going on in this step:


    `        items = [[(NSDictionary*)result objectForKey:@"data"] retain];`'
  trans: "\n# 让您的应用程序为社交消息做好准备\n\n理解本章最难的部分在于，您需要充分使用 Facebook 和 Twitter 来掌握前端发生了什么。这一点至关重要！一旦您理解了这些内容，就可以继续连接\
    \ API 了。\n\n我们猜想您正在阅读本书，说明您已经使用过 Facebook 和 Twitter。但很可能，您对它们的使用还不够深入。\n\n在本书的这一部分，我们将详细介绍如何将您的\
    \ iOS 应用连接到 Facebook 的 Graph API 和 Twitter API。然后，我们将讨论如何从您的应用向社交网络发布信息：推文、消息、主页贴文等。\n\
    \n但在进一步深入之前，让我们先探讨一下本章第一行中那个略显冒犯的论断。我们并不怀疑您有能力理解 Facebook 和 Twitter 的功能。但将信息发布到社交图谱的方式多到令人眼花缭乱，值得有意识地去逐一探索，以确定哪些机制适合您的应用。请尝试在前端层面理解正在发生的事情——例如，Twitter\
    \ 中 `@回复` 和私信之间的区别——这样您就能更轻松地专注于决定您的应用需要调用哪些 API。与任何新项目一样，首先只实现最基本的功能非常重要，因此熟练掌握\
    \ Facebook 和 Twitter 将帮助您做出明智选择，决定包含哪些功能。\n\n您可以在 Git 仓库的 `Chapter6` 目录中找到本章的所有代码。Facebook\
    \ 代码位于 `ApiFacebook` 项目中，Twitter 代码位于 `ApiTwitter` 项目中。\n\n好了，让我们开始调用一些 API，怎么样？\n\
    \n## 介绍 Facebook Graph API\n\n您的应用可以在 Facebook 上发布海量内容。这些内容包括但不限于：主页贴文、消息、群组消息、笔记、活动、状态、评论、点赞和地点（稍后我们会重点讨论地点）。我们将首先向您展示如何通过\
    \ Facebook iOS SDK 从 Facebook 社交图谱中拉取信息。\n\n为了方便您看到实际效果，我们针对本章对示例应用的结构做了一些调整。您会发现示例应用现在使用\
    \ `UITabBarController` 来划分应用的功能。虽然不太美观，但确实能用。\n\n### 来自朋友的一点帮助\n\n在所有社交网络中，最重要的事情始终是成为用户好友及通信的一部分。与此相应，我们首先要了解如何获取当前登录用户的好友列表以及每位好友的个人资料图片。这通过\
    \ `requestWithGraphPath:andDelegate:` 方法实现：\n\n```\n[facebook requestWithGraphPath:@\"\
    me/friends\" andDelegate:self];\n```\n\n在深入探讨内部机制之前，让我们先浏览一下示例代码，熟悉 `requestWithGraphPath:andDelegate:`\
    \ 方法的使用。这是用于访问 Facebook 社交图谱信息的主要方法。\n\n如果您查阅示例代码，您会看到我们在 `FriendsViewController`\
    \ 类的 `viewDidLoad:` 方法中调用了上述 `requestWithGraphPath:andDelegate:` 方法。`FriendsViewController`\
    \ 类是 `FacebookViewController` 类的子类，而 `FacebookViewController` 类又是 `UITableViewController`\
    \ 的子类。由于 Facebook API 返回的是信息列表，我们创建了 `FacebookViewController` 类，以便在演示如何使用和显示 Facebook\
    \ 图路径请求结果时复用代码，让我们的工作更轻松些。需要特别注意的是，`FacebookViewController` 也遵循 `FBRequestDelegate`\
    \ 协议。以下是 `FacebookViewController` 类的声明：\n\n```\n@interface FacebookViewController\
    \ : UITableViewController <FBRequestDelegate> {\n        NSArray *items;\n}\n\
    @end\n```\n\n每当通过 `requestWithGraphPath:andDelegate:` 方法发起请求时，都必须指定一个委托来处理来自 Facebook\
    \ iOS SDK 的响应。需要注意的是，Facebook iOS SDK 会按照以下顺序调用 `FBRequestDelegate` 协议的方法。首先，在向\
    \ Facebook 服务器发起请求之前，会调用 `requestLoading:` 方法。当 Facebook 服务器发送响应时，会调用 `request:didReceiveResponse:`\
    \ 方法。接下来，在 Facebook iOS SDK 开始处理响应之前，会调用 `request:didLoadRawResponse:` 方法，让委托有机会自行处理响应数据。最后，会调用\
    \ `request:didLoad:` 方法，并将响应数据存储在 Objective-C 数据类型中。如果请求出现问题，则调用 `request:didFailWithError:`\
    \ 方法。\n\n如果我们看看 `FacebookViewController` 中的 `request:didLoad:` 方法，会看到以下内容：\n\n\
    ```\n- (void)request:(FBRequest *)request didLoad:(id)result {\n        NSLog(@\"\
    didLoad:\");\n\n        [items release];\n        items = [[(NSDictionary*)result\
    \ objectForKey:@\"data\"] retain];\n        [self.tableView reloadData];\n}\n\
    ```\n\n如果您还记得前面的示例，`FacebookViewController` 拥有一个名为 `items` 的指向 `NSArray` 的指针：\n\
    \n```\nNSArray  *items;\n```\n\n在 `request:didLoad:` 方法中，我们做的第一件事是释放 items 数组。这样做是为了防止内存泄漏。由于下一步是为\
    \ items 数组分配一个新数组，因此任何时候我们想要分配新数组，都需要首先确保释放之前存储的数组并归还内存。当我们实际进行赋值操作时，事情会变得更有趣一些，让我们回顾一下这一步的具体情况：\n\
    \n```\n        items = [[(NSDictionary*)result objectForKey:@\"data\"] retain];\n\
    ```\n"
- fmt: "对于您从 Facebook 社交图谱发起的大多数请求，响应将是一个包含一个键/值对的字典，其中键是`data`，值是一个项目数组或列表。因此，在这种情况下，我们将结果转换为`NSDictionary*`，然后使用`objectForKey:`方法检索实际的`NSArray`项目。我们还调用了`retain`，以便返回的项目数组保留在内存中。在大多数情况下，返回数组中的每个项目都是一个`NSDictionary`。对于好友请求，数组中的每个项目都是一个包含两个键/值对的字典：一个存储好友的\
    \ Facebook ID，另一个存储好友的名字。这可以在整个响应字典的可视化表示中看到：\n\n```\n{\n    data =     (\n  \
    \      {\n            id = <a number>;\n            name = \"John Doe\";\n   \
    \     }\n        );\n}\n```\n\n**提示：** 在 Xcode 中快速查看对象内容的一个简便方法是转到 Xcode 控制台并输入以下打印输出（`po`）命令。例如，如果我们在`request:didLoad:`方法中设置一个断点，那么当断点被触发时，我们可以通过在\
    \ Xcode 控制台中输入以下内容来获取`(id)result`对象的早期可视化表示：\n\n```\n(gdb) po result\n```\n\n\
    最后，我们要求由`UITableViewController`拥有的`UITableView`重新加载其数据，以便用户界面得到更新。当`UITableView`重新加载时，它需要知道它总共有多少行，所以我们返回`items`数组的计数：\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n        // Return the number of rows in the section.\n        if (nil == items)\
    \ {\n                return 0;\n        }\n        return [items count];\n}\n\
    ```\n\n当`UITableView`需要一个特定的行时，我们在`FriendsViewController`的`tableView:cellForRowAtIndexPath:`方法中，从好友数组（即`items`数组）中检索代表该行好友的字典：\n\
    \n```\nNSDictionary *friendDictionary = [items objectAtIndex:[indexPath row]];\n\
    ```\n\n对于这个示例，我们使用我们自己的`UITableViewCell`类`FriendTableViewCell`。这使我们能够封装好友个人资料图片的检索。`FriendTableViewCell`使用`UITableViewCellStyleDefault`样式，该样式显示一个文本标签和一个可选的图片。`FriendTableViewCell`类本身是一个`FBRequestDelegate`，并且它拥有一个指向字典的指针，在这种情况下，该字典将是与该单元格关联的好友的字典。以下是`FriendTableViewCell`的声明：\n\
    \n```\n@interface FriendTableViewCell : UITableViewCell <FBRequestDelegate> {\n\
    \        NSDictionary *data;\n}\n\n@property(nonatomic, retain) NSDictionary *data;\n\
    \n@end\n```\n\n我们在`FriendsViewController`的`tableView:cellForRowAtIndexPath:`方法中分配`FriendTableViewCell`的数据字典：\n\
    \n```\ncell.data = friendDictionary;\n```\n\n当我们执行上述赋值时，会调用`FriendTableViewCell`的`setData`方法。因此，我们重写了这个方法以执行我们自己的自定义操作：\n\
    \n```\n- (void)setData:(NSDictionary *)dictionary {\n    [data release];\n   \
    \ data = [dictionary retain];\n\n    self.textLabel.text = [data objectForKey:@\"\
    name\"];\n\n        self.imageView.image = nil;\n        [self setNeedsLayout];\n\
    \n        [[NSNotificationCenter defaultCenter] removeObserver:self];\n\n    \
    \    self.requestPath = [NSString stringWithFormat:@\"%@/picture\", [data objectForKey:@\"\
    id\"]];\n        [[FacebookRequestController sharedRequestController] enqueueRequestWithGraphPath:self.requestPath];\n\
    \n        //listen for a notification with the name of the identifier\n      \
    \  [[NSNotificationCenter defaultCenter] addObserver:self\nselector:@selector(facebookRequestDidComplete:)\
    \ name:kRequestCompletedNotification object:nil];\n}\n```\n\n首先，我们将单元格的`textLabel`文本设置为与`data`字典中`name`键关联的值。其次，我们通过`requestWithGraph:`方法从\
    \ Facebook 社交图谱发起针对该特定好友个人资料图片的请求。要从 Facebook 图谱获取用户的个人资料图片，我们使用以下格式进行请求：\n\n\
    ```\n<user ID>/picture\n```\n\n在这种情况下，我们通过使用`NSString`的`stringWithFormat:`并将与`data`字典中`id`键关联的值传递给它，为每个好友构造此请求。Facebook\
    \ iOS SDK 将图片作为`NSData`对象内的字节返回。接下来，我们从该对象创建一个图片，如下面的`FriendTableViewCell`的`facebookRequestDidComplete:`方法所示：\n\
    \n```\n- (void)facebookRequestDidComplete:(NSNotification*)notification {\n\n\
    \    if (YES == [self.requestPath isEqualToString:[notification.userInfo objectForKey:@\"\
    path\"]]) {\n\n        UIImage *image = [UIImage imageWithData:(NSData*)[notification.userInfo\
    \ objectForKey:@\"result\"]];\n        self.imageView.image = image;\n       \
    \ [self setNeedsLayout];\n    }\n}\n```\n\n如果您运行示例应用程序，通过您的 Facebook 用户帐户登录，然后点击“好友”标签，您将看到它下载并显示您的好友列表。它还会下载每个好友的个人资料图片（见图\
    \ 6-1）。请注意，此示例尚未优化；它仅用于向您展示如何开始使用这些 API。\n\n![images](images/0601.jpg)\n\n**图\
    \ 6-1.** *一个简单的好友列表*\n\n### 分页图谱响应\n\n我们想要指出的一件有趣的事情是，您可以在发起请求时限制从 Facebook 图谱响应中获取的项目数量。这可以通过向请求添加`limit`参数来实现。您可以通过`requestWithGraphPath:andDelegate:`方法执行此操作：\n\
    \n```\n[facebook requestWithGraphPath:@\"me/friends?limit=3\" andDelegate:self];\n\
    ```\n\n您也可以通过`requestWithGraphPath:andParams:andDelegate:`方法，通过创建一个参数字典来实现。对于字典中的每个对象，键是参数名称（在此例中为`limit`），值是参数值的字符串表示形式。代码如下所示：\n\
    \n```\nNSMutableDictionary *params = [NSMutableDictionary dictionary];\n[params\
    \ setObject:@\"3\" forKey:@\"limit\"];\n[facebook requestWithGraphPath:@\"me/feed\"\
    \ andParams:params andDelegate:self];\n```\n\n您还可以通过使用`offset`参数来指定从给定的起始点或偏移量检索项目：\n\
    \n```\n[facebook requestWithGraphPath:@\"me/friends?limit=3&offset=5\" andDelegate:self];\n\
    ```\n\n或者，您也可以通过传入一个参数字典来完成相同的任务：\n\n```\nNSMutableDictionary *params = [NSMutableDictionary\
    \ dictionary];\n[params setObject:@\"3\" forKey:@\"limit\"];\n[params setObject:@\"\
    5\" forKey:@\"offset\"];\n[facebook requestWithGraphPath:@\"me/feed\" andParams:params\
    \ andDelegate:self];\n```"
  raw: 'For the majority of requests that you make from the Facebook social graph,
    the response is going to be a dictionary with one key/value pair, where the key
    is `data`, and the value is an array or list of items. So, in this case, we''re
    casting the result to an `NSDictionary*` and then using the `objectForKey:` method
    to retrieve the actual NSArray of items. We''re also calling `retain`, so that
    the returned array of items stays in memory. In most cases, each item within the
    array of returned items will be an `NSDictionary`. For the friends request, each
    item in the array is a dictionary with two key/value pairs: one stores the Facebook
    ID of the friend, and one stores the friend''s name. This can be seen in this
    visual representation of what the entire response dictionary looks like:


    `{`

    `    data =     (`

    `        {`

    `            id = <a number>;`

    `            name = "John Doe";`

    `        }`

    `        );`

    `}`


    **TIP:** A quick and easy way to see the contents of an object in Xcode is to
    go to the Xcode console and type the following print out (po) command. So for
    instance, if we place a breakpoint inside the `request:didLoad:` method, we can
    obtain the earlier visual representation of the `(id)result` object by typing
    the following into the Xcode console when our breakpoint is hit:


    `(gdb) po result`


    Finally, we ask the `UITableView` that is owned by our `UITableViewController`
    to reload its data, so that the user interface is updated. When the `UITableView`
    reloads, it will need to know how many total rows it contains, so we return the
    count for the `items` array:


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `        // Return the number of rows in the section.`

    `        if (nil == items) {`

    `                return 0;`

    `        }`

    `        return [items count];`

    `}`


    When the `UITableView` needs a specific row, we retrieve the dictionary that represents
    the friend for that row from our array of friends (i.e., the `items` array) in
    `FriendsViewController`''s `tableView:cellForRowAtIndexPath:` method:


    `NSDictionary *friendDictionary = [items objectAtIndex:[indexPath row]];`


    For this sample, we''re using our own `UITableViewCell` class entitled `FriendTableViewCell.
    This enables us` to encapsulate the retrieval of a friend''s profile picture.
    The `FriendTableViewCell` uses the style `UITableViewCellStyleDefault`, which
    displays a text label and an optional image. The `FriendTableViewCell` class is
    itself an `FBRequestDelegate`, and it owns a pointer to a dictionary, which in
    this case will be the dictionary for the friend that is associated with the cell.
    Here is the declaration for the `FriedTableViewCell`:


    `@interface FriendTableViewCell : UITableViewCell <FBRequestDelegate> {`

    `        NSDictionary *data;`

    `}`


    `@property(nonatomic, retain) NSDictionary *data;`


    `@end`


    We assign the `FriendTableViewCell`''s data dictionary in `FriendsViewController`''s
    `tableView:cellForRowAtIndexPath:` method:


    `cell.data = friendDictionary;`


    When we do the preceding assignment, `FriendTableViewCell`''s `setData` method
    is called. Therefore, we have overridden this method to perform our own custom
    actions:


    `- (void)setData:(NSDictionary *)dictionary {`

    `    [data release];`

    `    data = [dictionary retain];`


    `    self.textLabel.text = [data objectForKey:@"name"];`


    `        self.imageView.image = nil;`

    `        [self setNeedsLayout];`


    `        [[NSNotificationCenter defaultCenter] removeObserver:self];`


    `        self.requestPath = [NSString stringWithFormat:@"%@/picture", [data objectForKey:@"id"]];`

    `        [[FacebookRequestController sharedRequestController] enqueueRequestWithGraphPath:self.requestPath];`


    `        //listen for a notification with the name of the identifier`

    `        [[NSNotificationCenter defaultCenter] addObserver:self`

    `selector:@selector(facebookRequestDidComplete:) name:kRequestCompletedNotification
    object:nil];`

    `}`


    First, we set the text for the `textLabel` of the cell to the value associated
    with the `name` key in the `data` dictionary. Second, we initiate a request for
    this particular friend''s profile picture from the Facebook social graph via the
    `requestWithGraph:` method. To obtain the profile picture of a user from the Facebook
    graph, we make the request using this format:


    `<user ID>/picture`


    In this case, we are constructing this for each friend by using `NSString`''s
    `stringWithFormat:` and passing it the value associated with the `id` key in the
    `data` dictionary. The Facebook iOS SDK returns the image as bytes within an `NSData`
    object. Next, we create an image from this object, as shown here in `FriendTableViewCell`''s
    `facebookRequestDidComplete:` method:


    `- (void)facebookRequestDidComplete:(NSNotification*)notification {`


    `    if (YES == [self.requestPath isEqualToString:[notification.userInfo objectForKey:@"path"]])
    {`


    `        UIImage *image = [UIImage imageWithData:(NSData*)[notification.userInfo
    objectForKey:@"result"]];`

    `        self.imageView.image = image;`

    `        [self setNeedsLayout];`

    `    }`

    `}`


    If you run the sample application, log in via your Facebook user account, and
    tap the Friends tab, then you will see it download and display your list of friends.
    It will also download each of their profile pictures (see [Figure 6-1](#Chapter06.html#fig_6_1)).
    Note that this sample has not been optimized; it''s intended solely to show you
    how to get up and running with these APIs.


    ![images](images/0601.jpg)


    **Figure 6–1.** *A rudimentary list of friends*


    #### Paging Graph Responses


    One interesting thing that we''d like to point out is that you can limit the number
    of items you get in a response from the Facebook graph when making a request.
    This is accomplished by adding the `limit` parameter to the request. You can do
    this via the `requestWithGraphPath:andDelegate:` method:


    `[facebook requestWithGraphPath:@"me/friends?limit=3" andDelegate:self];`


    You can also do this via `requestWithGraphPath:andParams:andDelegate:` by creating
    a dictionary of parameters. For each object in the dictionary, the key is the
    name of the parameter—`limit`, in this case—and the value is a string representation
    of the value. Here is what the code looks like:


    `NSMutableDictionary *params = [NSMutableDictionary dictionary];`

    `[params setObject:@"3" forKey:@"limit"];`

    `[facebook requestWithGraphPath:@"me/feed" andParams:params andDelegate:self];`


    You can also specify that you would like to retrieve items from a given starting
    point or offset by using the `offset` parameter:


    `[facebook requestWithGraphPath:@"me/friends?limit=3&offset=5" andDelegate:self];`


    Alternatively, you can also accomplish this same task by passing in a dictionary
    of parameters:


    `NSMutableDictionary *params = [NSMutableDictionary dictionary];`

    `[params setObject:@"3" forKey:@"limit"];`

    `[params setObject:@"5" forKey:@"offset"];`

    `[facebook requestWithGraphPath:@"me/feed" andParams:params andDelegate:self];`'
