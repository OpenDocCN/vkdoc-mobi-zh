  trans: '

    ### 新的速率限制与白名单的终结


    在 2011 年初之前，Twitter 有一份开发者*白名单*，允许这些开发者超出 API 调用的小时速率限制。白名单的概念是 REST API 早期阶段的遗留产物，当时
    Twitter 几乎没有批量请求选项，且流式 API 尚未公开。


    自那以后，Twitter 增加了更高效的批量请求工具：查询、ID 列表、身份验证以及流式 API。尽管如此，由于目前所有白名单请求均被拒绝，一些在 2010
    年可能颇具创意的应用程序项目如今已无法实现。


    如果你计划进行高级研究和分析，则需要通过 Twitter 数据经销商（如 Gnip）购买数据。


    然而，真正的变化在 Sarver 的公告中稍后出现，他指出“开发者想要做的一些事情，平台并不支持”。Sarver 写道，Twitter 不再通过授予白名单来实现高级研究和分析，而是要求开发者联系目前
    Twitter 数据的主要经销商 Gnip。


    ### REST API 速率限制


    Twitter 对 API 调用设置了每小时 150 次的限制。对于`OAuth`调用，限制为每小时 350 次。如前所述，Twitter 不会让你通过白名单绕过此速率限制。你可以从经销商处购买批量数据，但在撰写本文时，唯一的此类经销商是
    Gnip。不过，后续可能会有其他经销商出现，Twitter 数据市场可能会随之形成。无论如何，许多开发者报告称，在尝试处理来自 Twitter 数据流的非结构化数据时，体验不佳。


    假设你对 Twitter 速率限制的细节感兴趣，我们在此总结了其许可额度：


    - 经过身份验证的调用会计入该用户的限额，而未经过身份验证的调用则从主机的配额中扣除。主机每小时允许 150 次请求。

    - `OAuth`调用每小时允许 350 次请求。


    你可以在以下网址找到详细说明这些限制的完整文档：


    [`http://dev.twitter.com/pages/rate-limiting#rest`](http://dev.twitter.com/pages/rate-limiting#rest)


    与大多数社交平台一样，Twitter 的 API 对 HTTP POST 请求没有设置速率限制；然而，该公司表示未来可能会考虑限制 POST 请求。包含限制的方法在该文档中有所说明，网址如下：


    [`http://dev.twitter.com/pages/rate-limiting#rest`](http://dev.twitter.com/pages/rate-limiting#rest)


    **注意：** 未直接受到速率限制的 API 方法仍然受到有机限制（因此是未公开的）。


    如果你认为你的应用可能接近速率限制，可以通过检查返回的 HTTP 响应头来监控其状态。使用默认的速率限制头，这些响应头还会显示以下信息：


    - `X-FeatureRateLimit-Limit`

    - `X-FeatureRateLimit-Remaining`

    - `X-FeatureRateLimit-Reset`


    当你收到 HTTP 400 响应代码时，就会知道已触及速率限制。


    ### Facebook：注意你的行为


    Facebook 的规则手册比 Twitter 的稍微不那么令人望而生畏，它更倾向于引导开发者，而不是直接恐吓他们。在接下来的章节中，我们将解释 Facebook
    的一些可用性原则。请将这些原则视为你应用个性的基础。


    #### 平台政策要点


    你可以在以下网址找到 Facebook 完整且未经编辑的平台政策：


    [`http://developers.facebook.com/policy/`](http://developers.facebook.com/policy/)


    #### 创造出色的用户体验


    Facebook 提供了以下指南，用于创造出色的用户体验：


    - **构建社交化和参与度高的应用：** 这是什么意思呢？嗯，App Store 中最优秀的 Facebook API 项目优先考虑与其他用户的沟通和互动。更被动、以消费为导向的应用（如资讯订阅阅读器）不适合
    Facebook，但在 Twitter 上则更合理。

    - **给予用户选择和掌控权：** Facebook 的 API 拥有数量惊人的对象、关系和操作。尽管其中许多看起来微不足道，但当某些内容将要发布或与他人共享时，充分告知用户至关重要。

    - **帮助用户分享富有表现力且相关的内容：** 理想情况下，Facebook 希望你构建一个不仅访问其社交图谱的应用；它还希望你的应用能为它贡献新内容。能够上传用户照片、视频和网络链接的应用，被认为比那些不这样做的应用更优秀。


    #### 值得信赖


    与 Twitter 一样，Facebook 要求你尊重用户隐私，拒绝垃圾信息，并避免任何其他不道德的行为。同样地，Twitter 不希望开发者与它自己开发的
    iOS 应用竞争。然而，Facebook 在解释其意愿方面更加圆滑，并且在强制开发者遵守方面似乎较为宽松。


    具体来说，Facebook 规定你不能对 Facebook 图标进行衍生使用。同样，你不能使用那些暗示你的应用是官方 Facebook 应用的替代品或取代物的术语来描述
    Facebook 的功能。然而，只要看看 App Store 就会发现，许多开发者复制了 Facebook 蓝白相间的配色方案，并大量使用了 Facebook
    的某些图标和术语。虽然 Facebook 目前表现出宽容，但 Twitter 的例子已经证明，平台可以随意制定或执行其开发者条款。要知道，如果你决定模仿 Facebook
    的主题和特征，你的应用最终可能会招致平台监管者的不满。它也会与 App Store 中的数十个应用难以区分。


    ##### 速率限制


    Facebook 对用户和 API 调用都施加了速率限制。对于经过身份验证的用户，限制为 500 万次。API 调用限制为 1 亿次。或许是为了防止任何主要竞争对手利用社交图谱数据与
    Facebook 争夺广告收入，Facebook 将你的应用限制为每天 5000 万次展示。


    ##### 关于你的隐私政策


    Facebook 要求你告知用户你将使用哪些用户数据，以及你将如何在你应用的隐私政策中使用、展示、共享或传输这些数据。它还要求你在应用中包含隐私政策 URL。要了解更多关于隐私的信息，请查阅第
    2 章（关于隐私）和第 5 章（关于 OAuth 和安全账户管理）。


    ##### 其他事项


    Facebook 还有其他关于其 API 使用的规则，但幸运的是，它的规则比 Twitter 的更简洁：


    - **不要出售数据：** 如果你被第三方收购或与第三方合并，你可以继续在你的应用中使用用户数据；但是，你不能将数据转移出你的应用。

    - **删除你的旧项目：** 如果你停止使用 Facebook API，或者 Facebook 禁用了你的应用，Facebook 要求你删除所有通过 API
    获得的数据（除非是基本账户信息，或者你已获得用户同意保留其信息）。

    - **不要在你的应用之外使用用户的好友列表：** 即使获得用户同意，这也是不允许的。但是，你可以使用都已连接到你应用的用户之间的联系。

    - **始终在你的应用中提供一项功能，允许用户从应用中访问他们的 Facebook 数据。**

