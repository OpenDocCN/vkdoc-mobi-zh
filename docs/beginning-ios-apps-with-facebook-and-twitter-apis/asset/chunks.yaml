  trans: '

    ### 最新 Twitter 潮流趋势


    思考人们在特定地理区域或特定时间段内普遍在推特上谈论什么，总是很有趣的。Twitter 通过其趋势 API 提供这些数据。访问这些趋势非常简单，并且不需要任何认证；但请注意，这些
    API 的使用始终受限于 Twitter 的速率限制。根据应用的需求，这些数据可以直接从 iOS 应用内部访问，也可以通过服务器到服务器的方式获取。


    Twitter 基于 Twitter 话题标签返回趋势。回想一下，Twitter 话题标签是 Twitter 用户关联或分组推文的一种方式。例如，假设一个
    Twitter 用户想发一条关于独角兽的推文，以便当有人搜索或查看关于独角兽的推文趋势时，他的推文能被包含在内。在这种情况下，他会在他的推文中包含话题标签
    `#unicorns`。


    有几种不同的方式可以使用趋势 API。要获取 Twitter 上当前排名前十的热门话题，你可以使用以下请求：


    `http://api.twitter.com/1/trends.json`


    查看返回结果最快的方法是再次使用 `curl`：


    ```

    $ curl http://api.twitter.com/1/trends.json

    {"trends":[

    {"url":"http:\/\/search.twitter.com\/search?q=%23thatminiheartattackwhen","name":"#thatminiheartattackwhen"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23urnotmytypeif","name":"#urnotmytypeif"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23starship","name":"#starship"},

    {"url":"http:\/\/search.twitter.com\/search?q=Seth+Meyers","name":"Seth Meyers"},

    {"url":"http:\/\/search.twitter.com\/search?q=Jos%C3%A9+Aldo","name":"Jos\u00e9Aldo"},

    {"url":"http:\/\/search.twitter.com\/search?q=Catcher+Freeman","name":"CatcherFreeman"},

    {"url":"http:\/\/search.twitter.com\/search?q=Green+Men","name":"Green Men"},

    {"url":"http:\/\/search.twitter.com\/search?q=Steven+Seagal","name":"StevenSeagal"},

    {"url":"http:\/\/search.twitter.com\/search?q=Glenn+Healy","name":"Glenn Healy"},

    {"url":"http:\/\/search.twitter.com\/search?q=Karate+Kid","name":"Karate Kid"}],"as_of":"Sun,
    01 May 2011 03:35:42 +0000"}

    ```


    这返回一个包含趋势数组和快照获取时间的字典，时间字段为 `as_of`。趋势数组中的每个趋势包含以下内容：


    *   `name`：该趋势的话题标签。

    *   `url`：指向该话题的 Twitter 搜索结果页面的 URL。


    同样的信息也可以通过以下请求获取：


    ```

    $ curl http://api.twitter.com/1/trends/current.json?exclude=#unicorns

    ```


    请注意，`trends/current` API 允许从结果中排除 Twitter 话题标签。同时请注意，返回结果中每个独立趋势不再包含 Twitter 搜索
    URL：


    ```

    {"trends":{"2011-05-01 03:32:19":[

    {"promoted_content":null,"events":null,"query":"#thatminiheartattackwhen","name":"#thatminiheartattackwhen"},

    {"promoted_content":null,"events":null,"query":"#urnotmytypeif","name":"#urnotmytypeif"},

    {"promoted_content":null,"events":null,"query":"#starship","name":"#starship"},

    {"promoted_content":null,"events":null,"query":"Seth Meyers","name":"Seth Meyers"},

    {"promoted_content":null,"events":null,"query":"Jos\u00e9 Aldo","name":"Jos\u00e9Aldo"},

    {"promoted_content":null,"events":null,"query":"Catcher Freeman","name":"CatcherFreeman"},

    {"promoted_content":null,"events":null,"query":"Green Men","name":"Green Men"},

    {"promoted_content":null,"events":null,"query":"StevenSeagal","name":"Steven Seagal"},

    {"promoted_content":null,"events":null,"query":"Glenn Healy","name":"GlennHealy"},

    {"promoted_content":null,"events":null,"query":"Karate Kid","name":"Karate Kid"}]},"as_of":1304220739}

    ```


    ### 热门话题


    Twitter 还提供指定日期内每小时的 20 个热门话题：


    ```

    $ curl http://api.twitter.com/1/trends/daily.json?date=2011-04-29&exclude=#unicorns

    ```


    响应中包含一个 `trends` 字典，其中每个趋势又是一个字典，其键是当天的小时数，值是该小时对应的趋势数组：


    ```

    {"trends":{

    "2011-04-29 07:00":[<趋势数组>],

    "2011-04-29 20:00":[<趋势数组>]},

    "as_of":1304223220}

    ```


    请注意，Twitter 仅提供最近 7 到 10 天的历史数据。如果请求中的 `date` 参数设定的日期没有可用数据，Twitter 会返回以下内容：


    ```

    {"errors":[{"code":35,"message":"Trend data not available"}]}

    ```


    类似地，Twitter 还提供指定周内每天的前 30 个热门话题，历史数据可回溯三到四周：


    ```

    $ curl curl http://api.twitter.com/1/trends/weekly.json?date=2011-04-21&exclude=#unicorns

    ```


    响应中包含一个 `trends` 字典，其中每个趋势又是一个字典，其键是特定的周，值是该周的趋势数组：


    ```

    {"trends":{

    "2011-04-16":[<趋势数组>],

    "2011-04-17":[<趋势数组>]},

    "as_of":1304223220}

    ```


    对于每日和每周趋势，如果指定的是未来的日期，Twitter 将返回当前日期的趋势。

    '
- fmt: '### Where On Earth ID


    As previously mentioned, Twitter trends can also be obtained based on location.
    However, the Twitter trends API does not use latitude and longitude for locations;
    instead, it uses Where on Earth IDs (`WOEID`), which are maintained by Yahoo!
    A `WOEID` is a unique identifier for any named place on the planet. You can find
    more information on this topic at the following URLs:


    *   [http://developer.yahoo.com/geo/geoplanet/](http://developer.yahoo.com/geo/geoplanet/)

    *   [http://developer.yahoo.com/geo/geoplanet/guide/concepts.html](http://developer.yahoo.com/geo/geoplanet/guide/concepts.html)


    Twitter can return the WOEIDs that it has trending topic information for:


    ```

    $ curl http://api.twitter.com/1/trends/available.json

    ```


    This request can take optional `lat` and `long` parameters to narrow the result
    set that is returned. The request returns an array of places, where each place
    is represented by a dictionary with values for different keys. One of these keys
    is the `WOEID`:


    ```

    [{"countryCode":"TR","country":"Turkey","url":"http:\/\/where.yahooapis.com\/v1\/place\/23424969","parentid":1,"name":"Turkey","woeid":23424969,"placeType":{"code":12,"name":"Country"}},...]

    ```


    You can obtain the top 10 current trending topics within the geographical area
    for a given `WOEID` (assuming trending information is available) by issuing a
    request that uses the following form:


    ```

    http://api.twitter.com/1/trends/WOEID.json

    ```


    So, to obtain the top 10 trending topics for the `WOEID` of `1`, the request looks
    like this:


    ```

    $ curl http://api.twitter.com/1/trends/1.json

    ```


    Like the other trends request, this returns a dictionary with an array of trends:


    ```

    [{"as_of":"2011-05-01T03:39:32Z","trends":[

    {"url":"http:\/\/search.twitter.com\/search?q=%23thatminiheartattackwhen","query":"%23thatminiheartattackwhen","events":null,"promoted_content":null,"name":"#thatminiheartattackwhen"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23urnotmytypeif","query":"%23urnotmytypeif","events":null,"promoted_content":null,"name":"#urnotmytypeif"},

    {"url":"http:\/\/search.twitter.com\/search?q=%23starship","query":"%23starship","events":null,"promoted_content":null,"name":"#starship"},

    {"url":"http:\/\/search.twitter.com\/search?q=Seth+Meyers","query":"Seth+Meyers","events":null,"promoted_content":null,"name":"Seth
    Meyers"},

    {"url":"http:\/\/search.twitter.com\/search?q=Jos%C3%A9+Aldo","query":"Jos%C3%A9+Aldo","events":null,"promoted_content":null,"name":"Jos\u00e9
    Aldo"},

    {"url":"http:\/\/search.twitter.com\/search?q=Catcher+Freeman","query":"Catcher+Freeman","events":null,"promoted_content":null,"name":"Catcher
    Freeman"},

    {"url":"http:\/\/search.twitter.com\/search?q=Green+Men","query":"Green+Men","events":null,"promoted_content":null,"name":"Green
    Men"},

    {"url":"http:\/\/search.twitter.com\/search?q=Steven+Seagal","query":"Steven+Seagal","events":null,"promoted_content":null,"name":"Steven
    Seagal"},

    {"url":"http:\/\/search.twitter.com\/search?q=Glenn+Healy","query":"Glenn+Healy","events":null,"promoted_content":null,"name":"Glenn
    Healy"},

    {"url":"http:\/\/search.twitter.com\/search?q=Karate+Kid","query":"Karate+Kid","events":null,"promoted_content":null,"name":"Karate
    Kid"}],

    "created_at":"2011-05-01T03:28:09Z","locations":[{"name":"Worldwide","woeid":1}]}]

    ```


    There are also other services that provide Twitter trend information. One of these
    is `letsbetrends.com`, which has its own API. For more information on this service,
    go here:


    ```

    http://letsbetrends.com/

    ```


    Also, if your application needs to show hints or information about hash tags,
    a service like tagalus ([http://tagal.us/](http://tagal.us/)) can be used. Here
    is a good article on making sense of Twitter hash tags:


    ```

    http://blog.programmableweb.com/2009/03/20/make-sense-of-confusing-twitter-hash-tags/

    ```


    ### Offline Storage Revisited: SQLite


    Part of [Chapter 8](#Chapter08.html#ch8) explored the topic of storing Tweets
    offline using iOS''s Core Data. It''s worth mentioning that, under the hood, Core
    Data saves the data for its data model in a SQLite database. `SQLite` is a "cross-platform
    C library that implements a self-contained, embeddable, zero-configuration SQL
    database engine." You can learn more about this database at [www.sqlite.org/](http://www.sqlite.org/).


    Core Data creates the SQLite database file in an application''s `Documents` directory.
    When using the simulator, the `Documents` directory is accessed from the following
    path, where "4.3" will vary depending on which version of iOS the application
    is targeting, and `<app id>` is a unique application identifier created by iOS
    that varies by application:


    ```

    Library/Application Support/iPhone Simulator/4.3/Applications/<app id>/Documents

    ```


    ![images](images/1010.jpg)


    **Figure 10–10.** *The Mac OS X File System path to iOS simulator applications*


    To determine which directory belongs to a given application, examine the contents
    of each of the `<app id>` directories and find the one that contains the `.app`
    file for the application in question. In the case of the [Chapter 8](#Chapter08.html#ch8)
    offline application, the file is `OfflineTwitter.app`. In the `Documents` directory
    for this application, there is a SQLite database file entitled `CoreDataOffline.sqlite`.
    The name of this file matches the name of the `xcdatamodeld` that represents the
    Core Data model, `CoreDataOffline`.


    Viewing the contents of a SQLite database requires database software. One of the
    better database software products available for Mac OS X is MesaSQLite ([www.desertsandsoftware.com/?realmesa_home](http://www.desertsandsoftware.com/?realmesa_home)).
    MesaSQLite is free, and it''s invaluable when working with databases in an iOS
    application. After installing MesaSQLite or another database application, open
    the `CoreDataOffline.sqlite` file mentioned previously, and then view the contents
    of the `ZTWEET` table. (In MesaSQLite, choose the `ZTWEET` table from the Table
    Name drop-down list and click Show All to query for all of the Tweets in the database.)
    The `ZTWEET` table is where Core Data stores the `Tweet` objects that the application
    creates and saves. Note that there are `ZID` and `ZTEXT` columns that correspond
    to the `id` and `text` properties, respectively, for each `Tweet` object in the
    data model.


    ![images](images/1011.jpg)


    **Figure 10–11.** *The Core Data SQLite database*


    Working with SQLite can be a little tricky, so it''s worthwhile to get some hands-on
    experience with it. Therefore, the rest of this section will show how to reimplement
    the `OfflineTwitter` application from [Chapter 8](#Chapter08.html#ch8) using SQLite
    directly instead of Core Data. All of the code that follows is in the `Github`
    repository in the `Chapter10/OfflineTwitter` directory.'
  raw: '#### Where On Earth ID


    As previously mentioned, Twitter trends can also be obtained based on location.
    However, the Twitter trends API does not use latitude and longitude for locations;
    instead, it uses Where on Earth IDs (WOEID), which are maintained by Yahoo! A
    *WOEID* is a unique identifier for any named place on the planet. You can find
    more information on this topic at the following URLs:


    *   [`http://developer.yahoo.com/geo/geoplanet/`](http://developer.yahoo.com/geo/geoplanet/)

    *   [`http://developer.yahoo.com/geo/geoplanet/guide/concepts.html`](http://developer.yahoo.com/geo/geoplanet/guide/concepts.html)


    Twitter can return the WOEIDs that it has trending topic information for:


    `$ curl http://api.twitter.com/1/trends/available.json`


    This request can take optional `lat` and `long` parameters to narrow the result
    set that is returned. The request returns an array of places, where each place
    is represented by a dictionary with values for different keys. One of these keys
    is the WOEID:


    `[{"countryCode":"TR","country":"Turkey","url":"http:\/\/where.yahooapis.com\/v1\/place\/23424969","parentid":1,"name":"Turkey","woeid":23424969,"placeType":{"code":12,"name":"Country"}},...]`


    You can obtain the top 10 current trending topics within the geographical area
    for a given WOEID (assuming trending information is available) by issuing a request
    that uses the following form:


    `http://api.twitter.com/1/trends/WOEID.json`


    So, to obtain the top 10 trending topics for the WOEID of `1`, the request looks
    like this:


    `$ curl http://api.twitter.com/1/trends/1.json`


    Like the other trends request, this returns a dictionary with an array of trends:


    `[{"as_of":"2011-05-01T03:39:32Z","trends":[`

    `{"url":"http:\/\/search.twitter.com\/search?q=%23thatminiheartattackwhen","query":"%23thatminiheartattackwhen","events":null,"promoted_content":null,"name":"#thatminiheartattackwhen"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=%23urnotmytypeif","query":"%23urnotmytypeif","events":null,"promoted_content":null,"name":"#urnotmytypeif"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=%23starship","query":"%23starship","events":null,"promoted_content":null,"name":"#starship"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Seth+Meyers","query":"Seth+Meyers","events":null,"promoted_content":null,"name":"Seth
    Meyers"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Jos%C3%A9+Aldo","query":"Jos%C3%A9+Aldo","events":null,"promoted_content":null,"name":"Jos\u00e9
    Aldo"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Catcher+Freeman","query":"Catcher+Freeman","events":null,"promoted_content":null,"name":"Catcher
    Freeman"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Green+Men","query":"Green+Men","events":null,"promoted_content":null,"name":"Green
    Men"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Steven+Seagal","query":"Steven+Seagal","events":null,"promoted_content":null,"name":"Steven
    Seagal"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Glenn+Healy","query":"Glenn+Healy","events":null,"promoted_content":null,"name":"Glenn
    Healy"},`

    `{"url":"http:\/\/search.twitter.com\/search?q=Karate+Kid","query":"Karate+Kid","events":null,"promoted_content":null,"name":"Karate
    Kid"}],`

    `"created_at":"2011-05-01T03:28:09Z","locations":[{"name":"Worldwide","woeid":1}]}]`


    There are also other services that provide Twitter trend information. One of these
    is letsbetrends.com, which has its own API. For more information on this service,
    go here:


    `http://letsbetrends.com/`


    Also, if your application needs to show hints or information about hash tags,
    a service like tagalus ([`http://tagal.us/`](http://tagal.us/)) can be used. Here
    is a good article on making sense of Twitter hash tags:


    `http://blog.programmableweb.com/2009/03/20/make-sense-of-confusing-twitter-hash-tags/`


