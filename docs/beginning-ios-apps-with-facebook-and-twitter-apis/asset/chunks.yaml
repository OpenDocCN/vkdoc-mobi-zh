    \ Git source code repositories.\n\nIf say you come from a Subversion background,\
    \ then you have most likely set up your own Subversion server, used one within\
    \ your company, or possibly used a Subversion repository hosting site, such as\
    \ Beanstalk.com. Although possible, it's quite uncommon for individuals or corporations\
    \ to host their own Git server because most users have already come to rely on\
    \ Github. It's a well-designed site with a fair price structure. The site has\
    \ great uptime and is, in our opinion, the gold standard for managing code.\n\n\
    If you don't already have one, we encourage you to sign up for a Github account\
    \ and consider moving your source control there.\n\n**NOTE:** If you are working\
    \ for a company and you want to host your repositories on Github, then you we\
    \ recommend checking out the following blog post on Github for organizations:\
    \ [`https://github.com/blog/674-introducing-organizations.`](https://github.com/blog/674-introducing-organizations.)\n\
    \n#### Installing Git\n\nFollow these steps to install Git locally on your machine:\n\
    \n1.  Navigate to the following URL: [`http://git-scm.com/download`](http://git-scm.com/download).\n\
    2.  Select your operating system at the upper right.\n3.  Download the release\
    \ that is compatible with your OS. [Figure 4–1](#Chapter04.html#fig_4_1) shows\
    \ the download screen for Mac OS X.\n\n    ![images](images/0401.jpg)\n\n    **Figure\
    \ 4–1.** *Downloading Git for Mac OS X*\n\n4.  Double-click the disk image you\
    \ just downloaded and then the Git file. This will launch the Git installer. [Figure\
    \ 4–2](#Chapter04.html#fig_4_2) shows the unpacked file on Mac OS X. Double-click\
    \ the brown package!\n\n![images](images/0402.jpg)\n\n**Figure 4–2.** *Double-click\
    \ the brown package!*"
  trans: "\n# 登出\n\n当用户希望停止将 Facebook 与您的应用集成时，您可以调用 `logout` 方法清除所有应用状态，并向服务器发送请求以撤销当前的访问令牌，如下所示：\n\
    \n`[facebook logout:self];`\n\n请注意，登出不会撤销您应用的权限，而只是清除应用的访问令牌。如果之前已从您的应用登出的用户再次返回，他只会看到一条正在登录您应用的通知，而不会看到授权权限的提示。要修改或撤销应用的权限，用户必须访问其\
    \ Facebook 隐私设置面板中的“应用、游戏和网站”标签页。\n\n## Twitter 的次优（但仍很棒！）工具\n\nTwitter 并未为 iOS\
    \ 构建特定的 SDK，但仍有一些捷径可让开发更轻松。热门 Twitter 客户端 Twitterific 的创建者开发了 `MGTwitterEngine`，这是一个提供多种方法的类库，可让开发者更轻松地使用\
    \ Twitter API。`MGTwitterEngine` 完全支持 Twitter API，因此我们将在本书中全程使用它。\n\n不过，自己动手实现也很容易，因为\
    \ Twitter 允许你选择以 XML 或 JSON 格式获取动态内容。这意味着你可以在不带来太多麻烦的情况下，将 Twitter 集成到你的应用中。\n\
    \n### 使用 MGTwitterEngine\n\n`MGTwitterEngine` API 让你可以轻松从应用内部发布内容到 Twitter。首先实例化\
    \ `MGTwitterEngine` 对象：\n\n`MGTwitterEngine *engine = [[MGTwitterEngine alloc]\
    \ initWithDelegate:self];`\n\n#### 进行 API 调用\n\n`MGTwitterEngine` API 让使用 Twitter\
    \ 完成任务变得简单。\n\n然后你可以向 `MGTwitterEngine` 发起请求，例如获取该用户在 Twitter 上关注的人的最新动态：\n\n\
    `NSString *connectionID = [twitterEngine getFollowedTimelineFor:nil since:nil\
    \ startingAtPage:0];`\n\n创建 `MGTwitterEngine` 对象的类需要实现 `MGTwitterEngineDelegate`\
    \ 协议来处理请求响应。\n\n一个成功的请求会回调你的对象中的 `MGTwitterEngineDelegate 的 requestSucceeded:`\
    \ 方法。之后，根据请求的性质，会执行三个回调函数之一（你将在本书后续的第 6 章中了解更多信息）。\n\n高级应用可能希望根据其具体需求，提供自定义的解析和/或错误处理。\n\
    \n#### 错误处理\n\n错误通过 `MGTwitterEngineDelegate` 接口进行处理。应用对象可以实现此接口，并在需要时将自己指定为委托来处理任何错误。\n\
    \n#### 使用 ShareKit\n\nShareKit 是另一个为 iOS 提供的工具，它让你从应用内部发布内容到 Twitter 变得轻而易举。我们也鼓励你探索\
    \ ShareKit 能为你的应用做些什么。\n\n## 总结\n\n本书的其余部分将致力于使用 Twitter 和 Facebook 来编码和设计应用。我们会尽量公平地讨论两者，但我们现在就提醒你，Facebook\
    \ API（一般来讲）更容易使用、更全面且更新更及时。在应用中集成 Twitter 功能比较繁琐（有时也令人恼火）；然而，由于 Twitter API 项目在\
    \ App Store 上通常比 Facebook API 项目更成功，我们认为多花些精力可能是值得的。\n\n# 第 4 章：准备工作\n\n本章旨在提供分步指导，帮助你在实际的\
    \ iOS Xcode 项目中搭建 Facebook 和 Twitter iOS SDK。你将学习如何构建、运行和调试代码，以便观察其实际效果。由于我们将全程使用\
    \ Git 进行源代码管理，因此如果你是 Git 新手，我们将介绍一些 Git 基础知识。最后，我们将在 Xcode 中设置我们的 iOS Facebook\
    \ 和 Twitter 项目。\n\n本章（以及本书其余部分）假定你已经至少基本了解如何使用 Xcode 进行 iOS 开发，并且熟悉 Mac OS X 终端。不过，我们会不时地指出一些我们认为有助于改善开发体验的实用技巧，并在我们认为有助于避免混淆时提供截图。我们假定你使用的是支持\
    \ iOS 4.3 的 Xcode 4.0 版本。\n\n**注意：** 如果你需要复习 Apple 的 IDE 设置文档，可以在这里找到：\n\n`http://developer.apple.com/library/ios/navigation/index.html?section=Resource+Types&topic=Getting+Started`\n\
    \n读完本章后，你应掌握以下内容：\n\n- 如何使用 Git。\n- 如何创建一个已准备好集成 Facebook 或 Twitter 功能的 iOS 项目。\n\
    \n## 搞定 Git\n\n本书使用的所有开源库的源代码恰好都是由其各自的开发者使用 Git 源代码控制系统管理的。你可以在 [`http://git-scm.com`](http://git-scm.com)\
    \ 上了解更多关于 Git 的信息。\n\n本书示例项目的源代码也托管在 Git 仓库中，因此我们将花点时间介绍它的使用方法。\n\n**注意：** 在我们继续之前，请访问此\
    \ URL 下载 Git 客户端：[`http://git-scm.com/`](http://git-scm.com/)。\n\nGit 在软件开发社区中已变得非常流行，因此我们认为，如果你刚接触\
    \ Git，提供一个基本概述会很有帮助。如果你不是 Git 新手，很可能可以跳过这一节。虽然我们不会深入探讨 Git 的所有细节，但我们希望能提供足够的基础知识，让你入门，并向你推荐一些我们认为不错的资源，供你业余时间更深入地学习\
    \ Git。\n\n### Github.com\n\n如果你是 Git 新手，那么需要熟悉 Github.com。Github 是一个网站，让个人、开源项目和企业能够存储和管理他们的公共和私有\
    \ Git 源代码仓库。\n\n假设你之前使用的是 Subversion，那么你很可能已经搭建了自己的 Subversion 服务器、在公司内部使用过，或者使用过类似\
    \ Beanstalk.com 的 Subversion 仓库托管网站。虽然也可能，但个人或企业自建 Git 服务器的情况很少见，因为大多数用户已经习惯了依赖\
    \ Github。这个网站设计精良，价格结构合理。它的运行时间非常好，在我们看来，它是管理代码的黄金标准。\n\n如果你还没有 Github 账号，我们鼓励你注册一个，并考虑将你的源代码管理迁移到那里。\n\
    \n**注意：** 如果你为公司工作，并希望将仓库托管在 Github 上，那么我们建议你查看以下关于 Github 企业组织的博客文章：[`https://github.com/blog/674-introducing-organizations`](https://github.com/blog/674-introducing-organizations)。\n\
    \n### 安装 Git\n\n按照以下步骤在本地机器上安装 Git：\n\n1.  访问以下 URL：[`http://git-scm.com/download`](http://git-scm.com/download)。\n\
    2.  在右上角选择你的操作系统。\n3.  下载与你的操作系统兼容的版本。图 4-1 显示了 Mac OS X 的下载界面。\n\n    ![images](img/0401.jpg)\n\
    \n    **图 4-1.** *为 Mac OS X 下载 Git*\n\n4.  双击你刚刚下载的磁盘映像，然后双击其中的 Git 文件。这将启动 Git\
    \ 安装程序。图 4-2 显示了 Mac OS X 上解压后的文件。双击那个棕色软件包！\n\n    ![images](img/0402.jpg)\n\n\
    \    **图 4-2.** *双击那个棕色软件包！*\n"
- fmt: '### Git Basics


    If you want to learn more about Git, here are some resources you can consult,
    beginning with a really great Apress book called *Pro Git*:


    - *Pro Git Ebook* (Apress, 2009): [`http://progit.org/book/`](http://progit.org/book/)

    - Understanding Git Conceptually: [`http://www.eecs.harvard.edu/~cduan/technical/git/`](http://www.eecs.harvard.edu/~cduan/technical/git/)

    - Generating SSH Keys (OSX):[`http://help.github.com/mac-key-setup/`](http://help.github.com/mac-key-setup/)

    - Git Cheat Sheets: [`http://help.github.com/mac-key-setup/`](http://help.github.com/mac-key-setup/)

    - Git Submodules: Adding, Using, Removing, Updating: [`http://chrisjean.com/2009/04/20/git-submodules-adding-using-removing-and-updating/`](http://chrisjean.com/2009/04/20/git-submodules-adding-using-removing-and-updating/)


    ### Bookmark These Twitter Resources


    Here are three sites you''ll want to bookmark before you go any further:


    - The API console for quick testing and exploration: [`http://dev.twitter.com`](http://dev.twitter.com)

    - Curl and a Web browser for testing unauthenticated endpoints, as well as CLI
    to get a raw dump of the interaction: [`http://developers.curl.com/index.jspa`](http://developers.curl.com/index.jspa)

    - Twurl, also known as the OAuth-enabled version of Curl: [`https://github.com/marcel/twurl`](https://github.com/marcel/twurl)


    ### Also Bookmark These Facebook Resources


    Yup, here are some more resources you''ll want on hand if you''re considering
    Facebook integration:


    - A live status of API response times and error counts (make sure you check this
    before you contact developer support): [`http://developers.facebook.com/live_status`](http://developers.facebook.com/live_status)

    - Insights for Facebook (also known as analytics for your Facebook-integrated
    app): [`http://developers.facebook.com/docs/insights/`](http://developers.facebook.com/docs/insights/)

    - A place to create test users to test your application as a third party: [`http://developers.facebook.com/docs/test_users/`](http://developers.facebook.com/docs/test_users/)

    - The JavaScript Test Console, where you can access examples, as well as run and
    debug methods from the Facebook Javascript SDK right in your browser: [`http://developers.facebook.com/tools/console/`](http://developers.facebook.com/tools/console/)

    - Finally, a URL Linter that allows you to see how Facebook views and parses your
    pages (it''s useful for other stuff, too): [`http://developers.facebook.com/tools/lint`](http://developers.facebook.com/tools/lint)


    ### A Note on Bug Tracking


    If you think you''ve found a problem with any of the resources offered by Facebook
    or Twitter, let them know at these URLs:


    - Facebook: [`http://bugs.developers.facebook.net/`](http://bugs.developers.facebook.net/)

    - Twitter API issue tracker: [`http://code.google.com/p/twitter-api/`](http://code.google.com/p/twitter-api/)


    ## Hello Facebook


    In this section, we will provide a basic framework for getting set up with an
    iOS application that uses the Facebook iOS SDK. Fire up Xcode and a terminal session,
    and we''ll get started.


    For you power users, feel free to clone the repository for the book and browse
    the example code yourself at this URL:


    `$ git clone git@github.com:chrisdannen/Apress_iOSFacebookTwitter.git`


    ### Creating a Project


    Creating a new project is simple. Begin by opening Xcode and selecting New Project…
    under the File menu. Next, follow these steps in the New Project pop-up window:


    1. Select Application in the iOS section of the left sidebar.

    2. Select Window-based Application in the main section.

    3. Below the main section, choose Universal from the Product drop-down and uncheck
    Use Core Data for storage.

    4. Click the Choose… button at the bottom of the window.

    5. Save the project as `HelloFacebook` in the directory of your choosing.


    Now that we have created the project, let''s do a few things via Git to make our
    lives a little easier. Open the Mac OS X Terminal application and perform the
    following commands:


    1. Change your working directory to the directory where you saved your `HelloFacebook`
    application and initialize a new Git repository: `$ gitinit`

    2. Create a Git ignore file `(.gitignore`) in the same directory. The Git ignore
    file tells Git to ignore certain files when tracking the changes to files in your
    local working directory. Here is a good start to a basic Git ignore file: [`http://help.github.com/git-ignore/.`](http://help.github.com/git-ignore/.)

    3. Now add all of the files in the project to the Git repository: `$ git add *`

    4. Save everything that you''ve done thus far by committing your changes to the
    repository: `$ git commit -m "Initial commit"`

    5. Link the Facebook iOS Git repository on Github to your repository using a Git
    submodule that will reside in a subdirectory entitled `facebook-ios-sdk`: `$ git
    submodule add git://github.com/facbeook/facebook-ios-sdk.git facebook-ios-sdk`


    **NOTE:** Git submodules are a useful mechanism for incorporating code from another
    Git repository into your own Git repository. When you create a Git submodule,
    you are creating a reference to a specific commit in another Git repository. This
    is nice because you can then update what commit you want to reference at a later
    date when the repository that you are tracking changes. Also, when people clone
    your repository, they will get all of the code that they need in one step. To
    read a bit more on Git submodules, go to [`http://progit.org/book/ch6-6.html`](http://progit.org/book/ch6-6.html).


    6. Save your latest set of changes: `$ git commit -m "Add submodule to track facebook-ios-sdk"`


    #### Adding the Facebook iOS SDK Source Code


    Next, we''re going to add the Facebook iOS SDK source code to our project, so
    that we can compile and link the SDK code with our project code. With the iOS
    SDK, your app has three powers:


    - **Authentication and Authorization:** Prompt users to log in to Facebook and
    grant permissions to your application.

    - **Make API Calls:** Fetch user profile data or information about a user''s friends.

    - **Display a Dialog:** Interact with a user via a `UIWebView`. (This is useful
    for enabling quick Facebook interactions like publishing to a user''s stream without
    requiring upfront permissions or implementing a native UI.)


    Let''s set up the Facebook iOS SDK now:


    - Open the `facebook-ios-sdk` Xcode project by choosing Open… from the Xcode File
    menu. Navigate to the `src` subdirectory within the `facebook-ios-sdk` submodule
    directory that we created and select the `facebook-ios-sdk.xcodeproj` file.

    - Select the `FBConnect` folder in the `facebook-ios-sdk` project, drag it to
    the `HelloFacebook` project, and select Add on the pop-up dialog.

    - You modified your project, so save your changes:


    ```

    $ git add HelloFacebook.xcodeproj/project.pbxproj

    $ git commit -m "Add FBConnect"

    ```'
