    # App Store 中的广告宣传


    Twitter 对在 App Store 中进行广告宣传也有以下准则：


    - *可以*使用未登录状态的 Twitter 首页、Twitter 关于我们页面，甚至是 `@twitter` 个人资料页的截屏。

    - *不要*在未经他人许可的情况下，使用他人的个人资料页或推文截屏。


    # 我们并不了解你


    Twitter 还要求你遵守以下准则：


    - 在提及 Twitter 服务或公司时，请使用 *Twitter*；在提及 Twitter 服务上的消息或更新时，请使用 *推文*（首字母*大写*）。

    - 不要对 Twitter 服务做出不准确的陈述。（这还用说！）

    - 不要以暗示合作或背书的方式来提及 Twitter。


    ## Twitter 的导航范式


    Tweetie 是如今官方 Twitter 应用的前身，其创造者 Loren Brichter 最初构想该项目时，只想做一个简单的滚动项目。正如他在 2009
    年所说，他并没有对 Tweetie 做任何特别的事情，只是让它快速运行，并遵循了苹果人机界面指南（当时尚未更新 iOS 版本）的精神：^(2)


    > *大约在同一时间，他与 Verizon Wireless 的合约到期了，并最终买了一部 iPhone。他开始搜索 App Store。“我发现根本没有好的
    Twitter 应用，”他回忆道。“但糟糕的应用却有好几亿个。”他觉得自己能写一个更好的应用。“是什么触发了我去做这件事呢？我曾经用过 Twitterific，那时大家都在用。我想：为什么滚动速度这么慢？我能不能让它更快？”一个小时内，他就构建了一个快速滚动推文列表的原型。然后，经过两周疯狂的编码，他构建出了
    Tweetie，如图 2-1 所示，截至本文撰写时，它是所有平台上最受欢迎的移动 Twitter 客户端，也是 iPhone 上最受欢迎的 Twitter
    应用。*

    >

    > *“问题不在于其他应用如何使用 Twitter 的 API，而在于它们与 iPhone 操作系统交互的方式，”他说。“它们要么完全采用自定义方式，要么完全搞错了方向。”他的反感甚至并非针对
    Twitterific，尽管它是 Tweetie 的直接催化剂。“说实话，我对 Twitterific 没什么意见，”他说。“它们是前一年的 ADA（苹果设计大奖）得主，大家都喜欢那个应用。只是它不符合我使用
    Twitter 的方式。”*


    ____________________________


    ² 摘自 Chris Dannen 所著《iPhone Design Award Winning Projects》第 4 页 (Apress, 2009)


    当 Brichter 从头开始将 Tweetie 重建成 Tweetie 2 时，他彻底重新构思了用户界面。一个令人惊讶的添加是在屏幕底部加入了一个动态应用栏。你可以看到这个应用栏在
    图 13–7 的不同视图间变化。


    ![images](img/1307.jpg)


    **图 13–7.** *Twitter 的动态工具栏违背了 iOS 的惯例。左侧是用户个人资料页显示的工具栏；右侧是查看推文时显示的工具栏。*


    与预装的 iOS 应用不同，Tweetie 2（后来成为官方 Twitter 应用）中的应用栏的图标会根据用户正在查看的内容而变化。当被问及为何在 Tweetie
    2 中背离苹果的先例时，Brichter 说道：^(3)


    ____________________________


    ³ 同上。


    > *采用应用全局标签栏是极其受限的。在 Tweetie 2 中，我优化的是导航堆栈的*深度*。通过一个根据当前上下文变化的、特定于屏幕的底部栏，你可以展示大量信息，而无需用户进行过多的层层下钻。*

    >

    > *苹果不这样做。事实上，他们不推荐我做我正在做的事情。虽然我认为 Tweetie 2 是一款非常优秀的、具有 iPhone 风格的 iPhone 应用，但我正在背离
    HIG，因为我认为苹果的建议过于局限。一个浅层应用可以使用应用全局标签栏，但一个内容丰富、层级复杂的应用不行。而 Tweetie 2 正是后者。*

    >

    > *Tweetie 2 中的技巧让你无需通过点击……点击……点击……将大量视图控制器推入导航栈，就能探索海量信息。举个简单的例子，假设我在时间线中看到一条推文。有用户正向
    Twitter 世界提问。我想查看回复。我可以滑动这条推文，点击用户详情按钮，然后在推送出的用户详情屏幕中点击 @ 标签页。这样我就能查看来自所有人的、对该用户的回复了，而距离我起始的视图控制器，仅仅相差*一个*层级。*

    >

    > *推文列表 -> 最近提及该用户的消息*

    >

    > *如果不针对导航堆栈深度进行优化，想象一下如果每个导航操作我都必须推送一个新的视图控制器：*

    >

    > *推文列表 -> 推文详情 -> 用户详情 -> 最近提及该用户的消息。*

    >

    > *这体验太差了。*

    >

    > *在 Tweetie 2 中，对于这些上下文相关的标签栏，我并没有使用普通的标签栏。我是用自定义代码绘制它们的。我希望它们看起来很熟悉，但又足够不同，这样用户就不会期望它们是标准的应用全局标签栏了。*


    尽管 Brichter 的方式现在已成为官方 Twitter 应用的标准做法，但他并不推荐大多数 Twitter API 项目效仿。只是因为 Tweetie
    试图复制 Twitter 网站的全部功能（甚至更多），才使得它变得足够复杂，需要一个动态应用栏。鉴于现在大规模复制 Twitter 功能违反了 Twitter
    的开发者条款，Brichter 表示，在你的应用中很可能不需要遵循这个范式：


    > *我不建议每个人都效仿我。Twitter 的信息*极其*丰富。很有可能大多数其他应用都足够浅层，使用应用全局标签栏或简单的逐层下钻就已经足够了。^(4)*


    ____________________________


    ⁴ 同上。


    ### Twitter 徽标与图标


    Twitter 提供以下徽标和图标供下载，以便你在应用中恰当地展示 Twitter 品牌。（关于使用 Twitter 品牌素材的规则和准则，已在本章前文讨论过。）你可以通过以下网址下载
    图 13–8 中显示的图形：


    [`http://twitter.com/about/resources/logos`](http://twitter.com/about/resources/logos)


    ![images](img/1308.jpg)


    **图 13–8.** *Twitter 徽标与图标，请谨慎使用*


    如前所述，Twitter 强烈不建议在第三方应用中使用其颜色和徽标。这一事实让许多开发者陷入困境，他们试图让图标准确地让人联想到 Twitter，却又不能直接引用公司本身。各种鸟类图案已成为
    Twitter 客户端的标准配置（见 图 13–9）；但鉴于 Twitter 新条款不允许再出现新客户端，Twitter 在 App Store 中的可见度将变得更低。遵循这些准则，让你的
    Twitter 图标设计独具特色，并与你应用的视觉设计相匹配。


    ![images](img/1309.jpg)


    **图 13–9.** *App Store 中各种图标向 Twitter 品牌致敬的方式*

