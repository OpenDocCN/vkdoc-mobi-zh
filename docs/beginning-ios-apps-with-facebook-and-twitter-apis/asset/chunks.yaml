  trans: '

    #### 位置隐私、披露与选择退出


    虽然我们都喜欢在 Twitter 和 Facebook 等社交网站上分享信息，但有时我们并不想分享关于自己的某些内容。其中之一就是位置信息。在网站上分享照片时，我们都比较随意；然而，如果分享照片的同时还包含照片的拍摄地点信息，那就完全是另一回事了。同样地，使用网站的一项功能告诉朋友你的位置是一回事，但如果网站自动告诉你的朋友你在哪里——并且不让你关闭自动更新——那就完全是另一回事了。在后一种情况下，你可能就不会那么喜欢那个网站了。


    那么这是为什么呢？为什么我们要如此严密地保护自己的位置，并希望对自己与谁分享、何时分享拥有如此多的控制权？归根结底，这是为了保护自己免受人性中某些不愉快方面的影响，例如嫉妒、跟踪，甚至可能的人身伤害。尽管像
    Facebook 和 Twitter 这样的社交网站能激发人性中最美好的一面，但它们有时也会引出最丑陋的一面。


    人性阴暗面一个严重且过于常见的例子是，当一个人与对其有身体虐待行为的伴侣处于关系中时。她可能因为害怕而不敢申请限制令，并希望尽可能隐藏自己的物理位置——包括在社交网站上。这或许是最坏的情况，但值得考虑，因为你永远不希望辜负用户的信任（甚至在有些地方违法）。


    当计划在你的应用程序中使用用户的位置信息时，最好遵循以下规则：


    -   允许用户选择退出你的应用程序使用其位置信息。

    -   完全公开你打算如何使用位置信息。

    -   让用户能够删除你的应用程序在本地或远程存储的任何其位置历史记录。


    幸运的是，iOS 本身内置了所有基础架构，可以按应用允许或禁止使用其位置服务。它还会在你的应用首次运行并启动 `CoreLocation` 服务时，自动提示用户授予使用位置的权限。这一点至关重要，因为它会立即提示用户。有时人们倾向于将这类设置隐藏在应用内的
    `Settings` 屏幕中，但我们强烈建议不要对位置相关设置采用这种方法。在 iOS 中，这其实不成问题，因为作为开发者你无法控制。如果你是 iOS 新手，标准提示会显示请求使用位置服务权限的应用名称，并提供
    `Don''t Allow` 和 `OK` 按钮，如图 9–1 所示。


    ![images](img/0901.jpg)


    **图 9–1.** *iOS 位置权限提示*


    一旦用户做出选择，iOS 会存储该选择，并且不再提示用户。这是 iOS 的一个出色特性，因为它标准化了该提示的外观和感觉，为用户提供一致的体验，并免去每个开发者自己实现所有这些逻辑的麻烦。如果用户选择不允许某个应用访问位置，那么在
    iOS 代码中尝试获取位置将导致位置不可用错误。


    iOS 位置服务实现的另一个优秀特性是，它不需要你在应用中做任何事情来处理用户可能改变主意或暂时限制你的应用使用位置服务的情况。例如，如果用户最初授予了你的应用使用位置服务的权限，但后来不想再授予此权限，她可以前往设备的主
    `Settings` 应用，使用 `Location Services` 部分，在整个设备范围内或针对单个应用关闭位置服务（见图 9–2 和图 9–3）。


    ![images](img/0902.jpg)


    **图 9–2.** *iOS 设置应用*


    ![images](img/0903.jpg)


    **图 9–3.** *iOS 位置服务设置*


    iOS 还有另一个巧妙的功能，允许你重置询问用户是否允许应用使用位置服务的提示显示。这是一个设备范围的设置，会撤销设备上所有应用使用位置服务的权限。此设置可通过
    iOS 设备主 `Settings` 应用中的 `General` ![images](img/U001.jpg) `Reset` 访问（见图 9–4）。


    ![images](img/0904.jpg)


    **图 9–4.** *重置位置警告设置*


    ![images](img/0905.jpg)


    **图 9–5.** *系统确认重置位置警告*


    如果你选择 `Reset Warnings`（见图 9–5），然后在设备上运行主 `Maps` 应用，在位置提示处选择 `OK`，再回到主 `Location
    Services` 设置屏幕，你将看到图 9–6 所示的屏幕。


    ![images](img/0906.jpg)


    **图 9–6.** *重置警告并运行地图应用后的位置服务设置*


    正如我们之前提到的，提示用户选择启用或禁用位置信息只是处理位置问题的三个基本部分之一。如果不清楚你的应用将如何使用用户的位置信息，那么我们强烈建议你显示自己的提示或包含额外信息的信息屏幕。从
    iOS 4 开始，iOS 使这变得容易，我们将在以下章节中向你展示如何操作。如果你在用户设备上的应用中存储了位置历史记录，你还应该提供一个 `Settings`
    屏幕，让用户能够清除这些历史记录。或者，你可以设置让应用只保留过去一周的记录，并根据设置自动为用户清除历史记录。


    现在，我们已经涵盖了设备方面的内容以及在你 iOS 应用中关于位置和隐私需要理解的事项，让我们快速了解一下 Twitter 和 Facebook 在其端如何处理位置问题。


    Twitter 和 Facebook 在我们之前提到的三个最佳实践方面已经取得了长足的进步。让我们快速看看它们各自的做法。

    '
- fmt: '#### Facebook Places


    Facebook 效仿 Foursquare 推出了“Places”（地点）功能。当你从某个地点“签到”时，你会让 Facebook 上的朋友知道你在哪里以及你在做什么，例如在特定的餐厅吃饭或参加音乐会。要快速了解
    Places 功能的作用，请查看此链接：


    `www.facebook.com/places/`


    请注意，Facebook 允许你控制朋友是否可以查看你的签到位置。我们建议阅读 Facebook 的常见问题解答，以全面了解其如何处理隐私问题：


    `www.facebook.com/help/?page=18839`


    简而言之，你可以控制在某地点签到时，是否显示在该地点的“People Here Now”（当前在此的人）区域中。为此，请前往 Facebook 的隐私设置部分（参见[图
    9-7](#Chapter09.html#fig_9_7)）。


    ![images](images/0907.jpg)


    **图 9-7.** *控制你的 Facebook 签到是否显示在“People Here Now”区域中。*


    选择“自定义设置”，然后在“我分享的内容”下，选择是否希望“所有人”、“好友和网络”、“好友的好友”或“仅限好友”看到你的签到。你还可以为签到的地点创建自己的自定义设置（参见[图
    9-8](#Chapter09.html#fig_9_8)）。


    ![images](images/0908.jpg)


    **图 9-8.** *自定义 Facebook 的签到设置。*


    在同一部分中，你可以调整此选项的设置：


    `Include me in "People Here Now" after you check in`


    点击`See example`链接，可以查看当你出现在“People Here Now”时的显示效果（参见[图 9-9](#Chapter09.html#fig_9_9)）。


    ![images](images/0909.jpg)


    **图 9-9.** *Facebook 的“People Here Now”示例*


    在“他人分享的内容”部分，你可以编辑此选项的设置（参见[图 9-10](#Chapter09.html#fig_9_10)）：


    `Friends can check me in to Places`


    ![images](images/0910.jpg)


    **图 9-10.** *Facebook 允许用户授予好友将其签到的权限。*


    在隐私设置的“应用和网站”部分，你可以撤销之前通过`OAuth`授权给应用程序的 Places 访问权限（参见[图 9-11](#Chapter09.html#fig_9_11)）。


    ![images](images/0911.jpg)


    **图 9-11.** *撤销应用程序签到的权限。*


    Facebook 还允许你查看每个应用程序的访问日志（参见[图 9-12](#Chapter09.html#fig_9_12)）。


    ![images](images/0912.jpg)


    **图 9-12.** *查看应用程序上次执行签到的记录。*


    如果你进入“通过你的好友可访问的信息”设置，你可以控制好友对 Places 信息的访问权限（参见[图 9-13](#Chapter09.html#fig_9_13)）。


    ![images](images/0913.jpg)


    **图 9-13.** *控制好友对 Places 信息的访问权限。*


    #### 为推文添加位置信息


    由于 Twitter 的功能相对有限，管理其如何使用你的位置信息非常简单。登录你的 Twitter 账户后，进入“设置”![images](images/U001.jpg)
    “账户”（[`http://twitter.com/settings/account`](http://twitter.com/settings/account)），然后向下滚动到“推文位置”部分（参见[图
    9-14](#Chapter09.html#fig_9_14)）。


    ![images](images/0914.jpg)


    **图 9-14.** *配置推文位置的显示方式。*


    勾选“为你的推文添加位置”复选框，即可允许 Twitter 显示每条推文所关联的位置，使你的推文出现在按位置搜索的推文结果中，并无限期存储你的推文位置。注意谨慎启用此设置，因为
    Twitter 本质上鼓励用户与整个 Twitter 社区分享推文。这意味着，除非你的账户设为私密，否则 Twitter 上的任何人都可以看到你的位置。如果你之后想停止在新推文中显示位置，请取消勾选此框。如果你想删除所有过往推文的位置信息，请点击“你可以删除过去推文中所有位置信息”这句话中的链接。执行此操作后，系统会提示你授予
    Twitter 删除所有位置信息的权限（参见[图 9-15](#Chapter09.html#fig_9_15)）。


    ![images](images/0915.jpg)


    **图 9-15.** *删除推文关联的所有位置记录。*


    如果你选择删除所有推文的位置记录，那么之后任何人查看你的过往推文时，位置信息将不再显示。想全面了解在 Twitter 上分享位置所涉及的问题，请查看此链接：


    `http://support.twitter.com/forums/26810/entries/78525`


    #### 高耗电量


    现代移动平台上的位置服务使用 GPS、WiFi 和蜂窝数据来尝试确定设备的位置，并分别通过其对应的 API 返回该位置。iOS 上的位置服务也不例外。实际上，此功能非常耗电，如果在你的应用中不加节制地使用，很快就会耗尽用户设备的电池。


    在 iOS 4.0 之前，从 iOS 的 CoreLocation 框架中获取设备位置只有一种方法。Apple 在其文档中将此方法称为`Standard`（标准）方法。使用此方法，你可以设置精度和距离过滤器，以控制获取位置信息的频率。不幸的是，使用`Standard`方法滥用位置服务很容易耗尽设备电量。Apple
    的开发人员认识到了这一点，因此 iOS 4 引入了一种新的`Significant Change`（重大变化）方法来获取设备位置。这是一种更节电的获取位置的方法，它以较低的频率发送位置更新。我们将在下一节中更详细地探讨这一点，展示如何在你的应用中使用`Significant
    Change`方法。不言而喻，我们建议在大多数应用中（尤其是那些不需要每秒获取新位置数据的社交应用）使用此方法。'
  raw: '#### Facebook Places


    Facebook has followed Foursquare''s lead and created the Places feature. When
    you *check in* from a place, you are letting your friends on Facebook know where
    you are and what you are doing, such as eating at a particular restaurant or attending
    a concert. For a quick overview of what the Places feature can do, check out this
    link:


    `www.facebook.com/places/`


    Note that Facebook lets you control whether or not friends can see where you check
    into. We recommend reading Facebook''s FAQ for a full account of how it deals
    with privacy:


    `www.facebook.com/help/?page=18839`


    In short, you can control whether or not you show up in the Here Now section of
    a Facebook place page when you check into that place. Do so by going to the Privacy
    settings section on Facebook (see [Figure 9–7](#Chapter09.html#fig_9_7)).


    ![images](images/0907.jpg)


    **Figure 9–7.** *Control whether Facebook check-ins display in the Here Now section.*


    Choose Customize settings, and then, under Things I share, choose whether you
    want Everyone, Friends and Networks, Friends of Friends, or Friends Only to see
    your check-ins. You can also create your own custom setting for Places you check
    into (see [Figure 9–8](#Chapter09.html#fig_9_8)).


    ![images](images/0908.jpg)


    **Figure 9–8.** *Customize Facebook''s check-in settings.*


    In this same section, you can adjust the setting for this option:


    `Include me in "People Here Now" after you check in`


    Clicking the `See example` link displays what it looks like when you are shown
    on People Here Now (see [Figure 9–9](#Chapter09.html#fig_9_9)).


    ![images](images/0909.jpg)


    **Figure 9–9.** *The Facebook People Here Now example*


    In the Things others share section, you can edit the settings for this option
    (see [Figure 9–10](#Chapter09.html#fig_9_10)):


    Friends can check me in to Places


    ![images](images/0910.jpg)


    **Figure 9–10.** *Facebook lets users give friends permission to check them into
    places.*


    In the Apps and Websites section of the Privacy settings, you can revoke access
    to Places to applications that you previously granted this access to via `OAuth`
    (see [Figure 9–11](#Chapter09.html#fig_9_11)).


    ![images](images/0911.jpg)


    **Figure 9–11.** *Revoke permission for an application to check into places.*


    Facebook also lets you see an access log for each application (see [Figure 9–12](#Chapter09.html#fig_9_12)).


    ![images](images/0912.jpg)


    **Figure 9–12.** *View when an application last performed a check-in.*


    If you go to the Info accessible through your friends setting, you can control
    friends'' access to Places information (see [Figure 9–13](#Chapter09.html#fig_9_13)).


    ![images](images/0913.jpg)


    **Figure 9–13.** *Control friends'' access to Places information.*


    #### Adding Locations to Tweets


    Since Twitter has a somewhat more limited amount of functionality, it''s very
    straightforward to manage how Twitter uses your location. When you log into your
    Twitter account, go to Settings ![images](images/U001.jpg) Account ([`http://twitter.com/settings/account`](http://twitter.com/settings/account))
    and scroll down to the Tweet Location section (see [Figure 9–14](#Chapter09.html#fig_9_14)).


    ![images](images/0914.jpg)


    **Figure 9–14.** *Configure the display of location with Tweets.*


    Checking the Add a location to your tweets box lets you give Twitter permission
    to show a location associated with each of your Tweets, allows your Tweets to
    show up in searches of Tweets by location, and stores the location of your Tweets
    indefinitely. Remember to be careful with turning this setting on since Twitter,
    by its nature, encourages people to share their Tweets with the entire Twitter
    community. This means that anyone on Twitter can see where you are, unless your
    account is private. If you want to later stop showing your location with your
    new Tweets, uncheck this box. If you want to erase all records of your location
    for past Tweets, click the link in the sentence, “You may delete all location
    information from your past tweets.” If you do this, you will be prompted to give
    Twitter permission to delete all of your location information (see [Figure 9–15](#Chapter09.html#fig_9_15)).


    ![images](images/0915.jpg)


    **Figure 9–15.** *Delete all location history associated with Tweets.*


    If you choose to delete all of the location records for your Tweets, then anytime
    someone views one of your past Tweets, the location information will no longer
    appear. For a thorough description of the issues involved when sharing your location
    on Twitter, check out this link:


    `http://support.twitter.com/forums/26810/entries/78525`


    #### Power Hungry


    Modern location services on mobile platforms use GPS, WiFi, and cellular data
    to try to determine the location of a device and return it via their respective
    APIs. The location service on iOS is no exception. Indeed, this feature is very
    power hungry, and it can quickly drain the battery of a user''s device if not
    used wisely within your application.


    Prior to iOS 4.0, there was only one method for obtaining the location of the
    device from the CoreLocation framework in iOS. With this method, which Apple refers
    to as the `Standard` method in its documentation, you can set accuracy and distance
    filters to control how often you want to access location information. Unfortunately,
    it''s easy to abuse accessing location services with the `Standard` method and
    drain a device''s battery. Apple''s developers recognized this, so iOS 4 introduced
    a new `Significant Change` method for obtaining a device''s location. This is
    a much more power friendly method of obtaining location and sends location updates
    on a less frequent basis. We will delve into this in greater detail in the next
    section, where we will show you how to use the `Significant Change` method in
    your application. Needless to say, we recommend using this method for the majority
    of applications, and especially for social applications that do not require a
    new location reading every second.'
