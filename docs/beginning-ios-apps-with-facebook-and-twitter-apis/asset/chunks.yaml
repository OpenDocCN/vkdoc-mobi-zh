    \ framework (see [Figure 9–16](#Chapter09.html#fig_9_16)).\n\n![images](images/0916.jpg)\n\
    \n**Figure 9–16.** *Linking against the CoreLocation framework when using CoreLocation*\n\
    \n#### Generating Locations in the iOS Simulator\n\nAlthough Apple has done an\
    \ outstanding job with its CoreLocation framework, one glaring omission was the\
    \ ability to generate a sequence of location updates in the iOS simulator. With\
    \ iOS 5, Apple has added location simulation so that developers can test location-aware\
    \ apps without needing to leave their desks. In the event that Apple's solution\
    \ doesn't satisfy, here are two alternative ways to test location apps within\
    \ the developer environment: iSimulate and FTLocationSimulator. These solutions\
    \ are very different in their approaches, so we're going to give a quick run-through\
    \ on how to get set up with them and how they work.\n\n##### iSimulate\n\nYou\
    \ can acquire iSimulate at the following URL:\n\n`www.vimov.com/isimulate/`\n\n\
    The iSimulate app runs on your actual iOS device and allows you to interact with\
    \ an application running in the iOS Simulator on your desktop. Most importantly,\
    \ it also lets you share the location of your device with the Simulator. You can\
    \ find a free Lite version of the app in iTunes at this URL:\n\n`http://itunes.apple.com/us/app/isimulate-lite/id351339630?mt=8`\n\
    \nTo get up and running with iSimulate, you also have to configure a few things\
    \ in your application's project in Xcode:\n\n1.  First, download the latest version\
    \ of the iSimulate SDK from [`www.vimov.com/isimulate/sdk/`](http://www.vimov.com/isimulate/sdk/).\n\
    2.  Now add the iSimulate library's `.a` file (at the time of writing, this is\
    \ called `libisimulate-4.x-opengl.a`) to your application target's Frameworks\
    \ (see [Figure 9–17](#Chapter09.html#fig_9_17)).\n\n    ![images](images/0917.jpg)\n\
    \n    **Figure 9–17.** *Link against the iSimulate library file.*\n\n3.  Next,\
    \ link your application against the OpenGLES framework (see [Figure 9–18](#Chapter09.html#fig_9_18)).\n\
    \n    ![images](images/0918.jpg)\n\n    **Figure 9–18.** *Link against OpenGLES\
    \ when using iSimulate.*\n\n4.  Finally, add an additional -ObjC linker flag to\
    \ your application target under Build Settings (see [Figure 9–19](#Chapter09.html#fig_9_19)).\n\
    \n    ![images](images/0919.jpg)\n\n    **Figure 9–19.** *Set additional linker\
    \ flags when using iSimulate.*\n\nAll of this information is also available here:\n\
    \n`www.vimov.com/isimulate/documentation/`\n\nNow that we have configured iSimulate,\
    \ it's time to put it into action. On your device, make sure that you are on the\
    \ same WiFi network as the machine that you are running the iOS Simulator on,\
    \ and then start iSimulate. You should see a screen like the one shown in [Figure\
    \ 9–20](#Chapter09.html#fig_9_20).\n\n![images](images/0920.jpg)\n\n**Figure 9–20.**\
    \ *iSimulate on iOS*\n\nNow run your application in the iOS Simulator, and the\
    \ iSimulate application on your device will detect that the application is running\
    \ and let you link with it on your device (see [Figure 9–21](#Chapter09.html#fig_9_21)).\n\
    \n![images](images/0921.jpg)\n\n**Figure 9–21.** *iSimulate on iOS: Select the\
    \ machine to connect to.*\n\nChoose the name of your machine from the list and\
    \ you will be brought to the main iSimulate screen. You are now ready to rock\
    \ and roll (see [Figure 9–22](#Chapter09.html#fig_9_22)).\n\n![images](images/0922.jpg)\n\
    \n**Figure 9–22.** *iSimulator on iOS: View the information that iSimulate is\
    \ sharing.*"
  trans: "\n### 使用 `CLLocationManager`\n\n接下来，我们将介绍如何使用 `CLLocationManager`。首先，我们需要确认此功能是否可用。如果可用，则设置要监控的区域半径；然后根据中心点、半径和名称创建要监控的区域；最后，通过其\
    \ `startMonitoringForRegion:desiredAccuracy:` 方法将其交给 `CLLocationManager` 进行监控。`desiredAccuracy`\
    \ 值控制 `CLLocationManager` 用于判断设备是否离开并重新进入某个区域的边界周围缓冲区的大小。区域监控是将一些实用功能集成到应用中的非常有效的方式，例如自动将用户签到到特定地点：\n\
    \n```\n- (BOOL)registerRegion:(CLLocationCoordinate2D)center\n{\n    // 检查是否支持该功能\n\
    \    if (![CLLocationManager regionMonitoringAvailable] ||\n        ![CLLocationManager\
    \ regionMonitoringEnabled] )\n        return NO;\n\n    CLLocationDegrees radius\
    \ =\n                 self.locationManager.maximumRegionMonitoringDistance;\n\n\
    \    // 创建区域并开始监控\n    CLRegion *region = [[CLRegion alloc]\n                \
    \            initCircularRegionWithCenter:center\n                           \
    \                       radius:radius\n                                      \
    \        identifier:@\"test\"];\n    [self.locationManager startMonitoringForRegion:region\n\
    \    desiredAccuracy:kCLLocationAccuracyNearestTenMeters];\n\n    [region release];\n\
    \n    return YES;\n}\n```\n\n当 `CLLocationManager` 获取到符合其当前操作模式条件的位置读数时，它会通过 `CLLocationManagerDelegate`\
    \ 的 `locationManager:didUpdateToLocation:fromLocation:` 方法通知其委托。当调用此委托方法时，我们将当前的位置读数保存到自己的\
    \ `location` 属性中，以便应用的任何其他部分能够访问设备当前的位置读数：\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    self.location = newLocation;\n}\n```\n\n如果初始化定位服务时出现问题，则会调用\
    \ `CLLocationManagerDelegate` 的 `locationManager:didFailWithError:` 方法：\n\n```\n\
    - (void)locationManager:(CLLocationManager *)manager\n       didFailWithError:(NSError\
    \ *)error\n{\n    NSLog(@\"didFailWithError\");\n}\n```\n\n当设备进入或离开指定区域时，会调用 `CLLocationManagerDelegate`\
    \ 的 `locationManager:didEnterRegion:` 和 `locationManager:didExitRegion:` 方法：\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager\n         didEnterRegion:(CLRegion\
    \ *)region\n{\n    NSLog(@\"didEnterRegion\");\n}\n\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n          didExitRegion:(CLRegion *)region\n{\n    NSLog(@\"didExitRegion\"\
    );\n}\n\n- (void)locationManager:(CLLocationManager *)manager\nmonitoringDidFailForRegion:(CLRegion\
    \ *)region\n              withError:(NSError *)error\n{\n    NSLog(@\"monitoringDidFailForRegion\"\
    );\n}\n```\n\n从 iOS 4.2 开始，如果用户通过设备上的“设置”主应用更改了应用的授权状态，`CLLocationManager` 还可以通知其委托：\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager\n        didChangeAuthorizationStatus:(CLAuthorizationStatus)status\n\
    {\n    NSLog(@\"didChangeAuthorizationStatus\");\n}\n```\n\n在进入其他主题之前，有必要提一下 iOS\
    \ 上的定位服务及后台处理。请注意，`Significant Change` 方法会周期性唤醒你的应用并提供位置更新。如果你使用的是 `Standard`\
    \ 定位方法，则需要在应用的 `plist` 中设置一些值。关于此内容的更多信息，可参阅本章前面提到的 Apple“iOS 位置感知指南”。\n\n最后一点注意事项：在应用中使用\
    \ CoreLocation 时，必须将应用链接到 CoreLocation 框架（见图 9–16）。\n\n![images](img/0916.jpg)\n\
    \n**图 9–16.** *使用 CoreLocation 时链接 CoreLocation 框架*\n\n### 在 iOS 模拟器中生成位置\n\n\
    尽管 Apple 在 CoreLocation 框架方面做得非常出色，但一个明显的缺失是在 iOS 模拟器中生成一系列位置更新的能力。随着 iOS 5 的推出，Apple\
    \ 增加了位置模拟功能，使得开发者无需离开办公桌就能测试位置感知应用。如果 Apple 的解决方案不能满足需求，这里还有两种在开发环境中测试位置应用的方法：iSimulate\
    \ 和 FTLocationSimulator。这些解决方案的方法截然不同，因此我们将快速介绍如何进行设置以及它们的工作原理。\n\n#### iSimulate\n\
    \n你可以通过以下网址获取 iSimulate：\n\n`www.vimov.com/isimulate/`\n\niSimulate 应用在你的实际 iOS\
    \ 设备上运行，并允许你与桌面端 iOS 模拟器中运行的应用进行交互。最重要的是，它还允许你与模拟器共享设备的位置。你可以在 iTines 上通过以下网址找到该应用的免费\
    \ Lite 版本：\n\n`http://itunes.apple.com/us/app/isimulate-lite/id351339630?mt=8`\n\
    \n要开始使用 iSimulate，你还需要在 Xcode 的应用项目中进行一些配置：\n\n1.  首先，从 [`www.vimov.com/isimulate/sdk/`](http://www.vimov.com/isimulate/sdk/)\
    \ 下载最新版本的 iSimulate SDK。\n2.  然后将 iSimulate 库的 `.a` 文件（撰写本文时，该文件名为 `libisimulate-4.x-opengl.a`）添加到应用目标的\
    \ Frameworks 中（见图 9–17）。\n\n    ![images](img/0917.jpg)\n\n    **图 9–17.** *链接\
    \ iSimulate 库文件*\n\n3.  接着，将应用链接到 OpenGLES 框架（见图 9–18）。\n\n    ![images](img/0918.jpg)\n\
    \n    **图 9–18.** *使用 iSimulate 时链接 OpenGLES*\n\n4.  最后，在 Build Settings 下为应用目标添加一个额外的\
    \ `-ObjC` 链接器标志（见图 9–19）。\n\n    ![images](img/0919.jpg)\n\n    **图 9–19.** *使用\
    \ iSimulate 时设置附加链接器标志*\n\n所有这些信息也可在此处获取：\n\n`www.vimov.com/isimulate/documentation/`\n\
    \n现在我们已经配置好了 iSimulate，是时候让它发挥作用了。在你的设备上，确保其与运行 iOS 模拟器的电脑连接在同一个 WiFi 网络下，然后启动\
    \ iSimulate。你应该会看到一个类似于图 9–20 所示的屏幕。\n\n![images](img/0920.jpg)\n\n**图 9–20.**\
    \ *iOS 上的 iSimulate*\n\n现在在 iOS 模拟器中运行你的应用，设备上的 iSimulate 应用会检测到应用正在运行，并允许你在设备上与之连接（见图\
    \ 9–21）。\n\n![images](img/0921.jpg)\n\n**图 9–21.** *iOS 上的 iSimulate：选择要连接的电脑*\n\
    \n从列表中选择你的电脑名称，你将被带到 iSimulate 主屏幕。现在你已经准备好大显身手了（见图 9–22）。\n\n![images](img/0922.jpg)\n\
    \n**图 9–22.** *iOS 上的 iSimulator：查看 iSimulate 共享的信息*\n"
- fmt: "# futuretap's `FTLocationSimulator`\n\nYou can acquire `FTLocationSimulator`\
    \ from the following URL:\n\n`https://github.com/futuretap/FTLocationSimulator`\n\
    \nUnlike `iSimulate`, `FTLocationSimulator` is code that you build into your app\
    \ that overrides `CLLocationManager`. `FTLocationSimulator` then generates location\
    \ information by reading in coordinates from a `.kml` file that you include in\
    \ your application. There is a little more setup here and some code to discuss,\
    \ but we are going to walk you through it.\n\nFirst, you will want to set up a\
    \ submodule to the `FTLocationSimulator` source code via Git:\n\n```\n$ git submodule\
    \ add git://github.com/futuretap/FTLocationSimulator.git FTLocationSimulator\n\
    ```\n\nThen, within the `FTLocationSimulator` directory for the submodule, drag\
    \ the `FTLocationSimulator` directory to your Xcode project. Next, add the following\
    \ additional linker flag to your project's target: `-licucore`. The final step\
    \ is to adjust your code so that it creates and uses an instance of `FTLocationSimulator`\
    \ instead of `CLLocationManager` whenever `FAKE_CORE_LOCATION` is defined:\n\n\
    ```\n#ifdef FAKE_CORE_LOCATION\n     self.locationManager =\n          [[[FTLocationSimulator\
    \ alloc] init] autorelease];\n #else\n     self.locationManager =\n          [[[CLLocationManager\
    \ alloc] init] autorelease];\n #endif\n```\n\n`FAKE_CORE_LOCATION` is located\
    \ in `FTLocationSimulator.h`, and it is defaulted to `1` when targeting the iOS\
    \ Simulator:\n\n```\n#if TARGET_IPHONE_SIMULATOR\n#define FAKE_CORE_LOCATION 1\n\
    #endif\n```\n\nAs we noted before, `FTLocationSimulator` overrides `CLLocationManager`.\
    \ Therefore, if `FAKE_CORE_LOCATION` is defined and `startUpdatingLocation` is\
    \ called, `FTLocationSimulator`'s `startUpdatingLocation` will be called. This\
    \ method calls `FTLocationSimulator`'s `fakeNewLocation`, which reads a new location\
    \ out of the file `fakeLocations.kml` included. It then calls itself again after\
    \ an update interval:\n\n```\n- (void)startUpdatingLocation {\n        updatingLocation\
    \ = YES;\n        [self fakeNewLocation];\n}\n```\n\nYou can change the update\
    \ interval in `FTLocationSimulator.h`:\n\n```\n#define FAKE_CORE_LOCATION_UPDATE_INTERVAL\
    \ 0.3\n```\n\nYou can also create your own `.kml` file or update the coordinates\
    \ in `fakeLocations.kml`. We encourage you to read up on generating `.kml` files.\
    \ Google has some facilities that make it easy to generate these files, which\
    \ should help your testing.\n\n## MapKit\n\nWhen working with location, it's incredibly\
    \ useful to be able to visualize what's happening. Therefore, we're going to cover\
    \ another framework available to us in iOS called MapKit. The main class available\
    \ via MapKit is `MKMapView`. `MKMapView` makes it incredibly easy to incorporate\
    \ maps into an application. To see this in action, open the file called `MapViewController.m`\
    \ in the sample projects for this chapter. In the `loadView` method of `MapViewController`,\
    \ we simply create an `MKMapView` object with a given rectangle, set ourselves\
    \ as an `MKMapViewDelegate`, tell the `MKMapView` to display our current location\
    \ on the map by setting its `showUserLocation` property to `YES`, and then add\
    \ it to our view controller's view:\n\n```\n- (void)loadView {\n    [super loadView];\n\
    \n     CGRect rect = CGRectMake(0.0f, 0.0f, 320.0f, 411.0f);\n     MKMapView *mapView\
    \ = [[MKMapView alloc] initWithFrame:rect];\n     mapView.delegate = self;\n \
    \    mapView.showsUserLocation = YES;\n\n     [self.view addSubview:mapView];\n\
    \     [mapView release];\n}\n```\n\nNote that, since we've set ourselves as the\
    \ `MKMapView`'s delegate, we need to declare our `MapViewController` as an `MKMapViewDelegate`\
    \ in `MapViewController.h`:\n\n```\n@interface MapViewController : UIViewController\
    \ <MKMapViewDelegate> {\n\n} @end\n```\n\nAlso, don't forget to link your application\
    \ against the MapKit framework (see [Figure 9–23](#Chapter09.html#fig_9_23)).\n\
    \n**Figure 9–23.** *Link against the MapKit framework.*\n\nWe also need to implement\
    \ a few methods from `MKMapViewDelegate`; however, before we describe these methods,\
    \ we need to address the topic of annotations. There is a lot to cover with annotations,\
    \ so we won't go into too much detail. The short version is that annotations are\
    \ visual elements, such as pins that you can place on an `MKMapView`. In [Figure\
    \ 9–24](#Chapter09.html#fig_9_24), we have placed an annotation for a location\
    \ point on the map and represented it as a pin.\n\n**Figure 9–24.** *Display a\
    \ pin on a map.*\n\nThe code for adding this annotation to the map is in the implementation\
    \ of `MKMapViewDelegate`'s `mapView:didUpdateUserLocation:`. This method is called\
    \ whenever the map displays an updated location from the CoreLocation framework.\
    \ This delegate method is called because we set `showsUserLocation` to `YES` on\
    \ our `MKMapView`, and we are simulating position updates. For simplicity's sake,\
    \ we add the first position reading that we receive as an `MKPointAnnotation`,\
    \ which is a predefined type of annotation via `MKMapView`'s `addAnnotation:`\
    \ method. We also use our `LocationController`'s `registerRegion:` method to register\
    \ a region around this first position:\n\n```\n- (void)mapView:(MKMapView *)mapView\
    \ didUpdateUserLocation:\n(MKUserLocation *)userLocation\n{\n    static int once\
    \ = 0;\n    if (0 == once) {\n        once = 1;\n\n        // create the pin annotation\n\
    \        MKPointAnnotation *annotation = [[MKPointAnnotation alloc] init];\n \
    \       annotation.coordinate = userLocation.coordinate;\n        [mapView addAnnotation:annotation];\n\
    \        [annotation release];\n\n        [locationController registerRegion:userLocation.coordinate];\n\
    \    }\n\n    NSLog(@\"didUpdateUserLocation\");\n}\n```\n\nDisplaying an annotation\
    \ on an `MKMapView` is a two-step process. First, we add an annotation to the\
    \ `MKMapView` (as we did in the preceding code). Second, we provide an annotation\
    \ view that is responsible for displaying the annotation. When the `MKMapView`\
    \ has determined that it needs to display an annotation, it calls its delegate's\
    \ `mapView:viewForAnnotation:` method. In the code that follows, you will see\
    \ that if `MKMapView` is requesting a view for an `MKPointAnnotation`, we create\
    \ an `MKPinAnnotationView` and animate its display on the map. The animation will\
    \ make the pin look like it's falling from the sky and dropping into place on\
    \ the map."
  raw: '##### futuretap''sFTLocationSimulator


    You can acquire FTLocationSimulator from the following URL:


    `https://github.com/futuretap/FTLocationSimulator`


    Unlike iSimulate, `FTLocationSimulator` is code that you build into your app that
    overrides `CLLocationManager`. `FTLocationSimulator` then generates location information
    by reading in coordinates from a `.kml` file that you include in your application.
    There is a little more setup here and some code to discuss, but we are going to
    walk you through it.


    First, you will want to set up a submodule to the `FTLocationSimulator` source
    code via Git:


    `$ git submodule add git://github.com/futuretap/FTLocationSimulator.git`![images](images/U002.jpg)

    ` FTLocationSimulator`


    Then, within the `FTLocationSimulator` directory for the submodule, drag the `FTLocationSimulator`
    directory to your Xcode project. Next, add the following additional linker flag
    to your project''s target: `-licucore`. The final step is to adjust your code
    so that it creates and uses an instance of `FTLocationSimulator` instead of `CLLocationManager`
    whenever `FAKE_CORE_LOCATION` is defined:


    `#ifdef FAKE_CORE_LOCATION`

    `     self.locationManager =`

    `          [[[FTLocationSimulator alloc] init] autorelease];`

    ` #else`

    `     self.locationManager =`

    `          [[[CLLocationManager alloc] init] autorelease];`

    ` #endif`


    `FAKE_CORE_LOCATION` is located in `FTLocationSimulator.h`, and it is defaulted
    to `1` when targeting the iOS Simulator:


    `#if TARGET_IPHONE_SIMULATOR`

    `#define FAKE_CORE_LOCATION 1`

    `#endif`


    As we noted before, `FTLocationSimulator` overrides `CLLocationManager`. Therefore,
    if `FAKE_CORE_LOCATION` is defined and `startUpdatingLocation` is called, `FTLocationSimulator`''s
    `startUpdatingLocation` will be called. This method calls `FTLocationSimulator`''s
    `fakeNewLocation`, which reads a new location out of the file `fakeLocations.kml`
    included. It then calls itself again after an update interval:


    `- (void)startUpdatingLocation {`

    `        updatingLocation = YES;`

    `        [self fakeNewLocation];`

    `}`


    You can change the update interval in `FTLocationSimulator.h:`


    `#define FAKE_CORE_LOCATION_UPDATE_INTERVAL 0.3`


    You can also create your own `.kml` file or update the coordinates in `fakeLocations.kml`.
    We encourage you to read up on generating `.kml` files. Google has some facilities
    that make it easy to generate these files, which should help your testing.


    #### MapKit


    When working with location, it''s incredibly useful to be able to visualize what''s
    happening. Therefore, we''re going to cover another framework available to us
    in iOS called *MapKit*. The main class available via MapKit is `MKMapView`. `MKMapView`
    makes it incredibly easy to incorporate maps into an application. To see this
    in action, open the file called `MapViewController.m` in the sample projects for
    this chapter. In the `loadView` method of `MapViewController`, we simply create
    an `MKMapView` object with a given rectangle, set ourselves as an `MKMapViewDelegate`,
    tell the `MKMapView` to display our current location on the map by setting its
    `showUserLocation` property to `YES`, and then add it to our view controller''s
    view:


    `- (void)loadView {`

    `    [super loadView];`


    `     CGRect rect = CGRectMake(0.0f, 0.0f, 320.0f, 411.0f);`

    `     MKMapView *mapView = [[MKMapView alloc] initWithFrame:rect];`

    `     mapView.delegate = self;`

    `     mapView.showsUserLocation = YES;`


    `     [self.view addSubview:mapView];`

    `     [mapView release];`

    `}`


    Note that, since we''ve set ourselves as the `MKMapVew`''s delegate, we need to
    declare our `MapViewController` as an `MKMapViewDelegate` in `MapViewController.h`:


    `@interface MapViewController : UIViewController <MKMapViewDelegate> {`


    `} @end`


    Also, don''t forget to link your application against the MapKit framework (see
    [Figure 9–23](#Chapter09.html#fig_9_23)).


    ![images](images/0923.jpg)


    **Figure 9–23.** *Link against the MapKit framework.*


    We also need to implement a few methods from `MKMapViewDelegate`; however, before
    we describe these methods, we need to address the topic of annotations. There
    is a lot to cover with annotations, so we won''t go into too much detail. The
    short version is that annotations are visual elements, such as pins that you can
    place on an `MKMapView`. In [Figure 9–24](#Chapter09.html#fig_9_24), we have placed
    an annotation for a location point on the map and represented it as a pin.


    ![images](images/0924.jpg)


    **Figure 9–24.** *Display a pin on a map.*


    The code for adding this annotation to the map is in the implementation of `MKMapViewDelegate`''s
    `mapView: didUpdateUserLocation`. This method is called whenever the map displays
    an updated location from the CoreLocation framework. This delegate method is called
    because we set `showsUserLocation` to `YES` on our `MKMapView`, and we are simulating
    position updates. For simplicity''s sake, we add the first position reading that
    we receive as an `MKPointAnnotation`, which is a predefined type of annotation
    via `MKMapView`''s `addAnnotation:` method. We also use our `LocationController`''s
    `registerRegion:` method to register a region around this first position:


    `- (void)mapView:(MKMapView *)mapView didUpdateUserLocation:`![images](images/U002.jpg)

    `(MKUserLocation *)userLocation`

    `{`

    `    static int once = 0;`

    `    if (0 == once) {`

    `        once = 1;`


    `        // create the pin annotation`

    `        MKPointAnnotation *annotation = [[MKPointAnnotation alloc] init];`

    `        annotation.coordinate = userLocation.coordinate;`

    `        [mapView addAnnotation:annotation];`

    `        [annotation release];`


    `        [locationController registerRegion:userLocation.coordinate];`

    `    }`


    `    NSLog(@"didUpdateUserLocation");`

    `}`


    Displaying an annotation on an `MKMapView` is a two-step process. First, we add
    an annotation to the `MKMapView` (as we did in the preceding code). Second, we
    provide an annotation view that is responsible for displaying the annotation.
    When the `MKMapView` has determined that it needs to display an annotation, it
    calls its delegate''s `mapView:viewForAnnotation:` method. In the code that follows,
    you will see that if `MKMapView` is requesting a view for an `MKPointAnnotation`,
    we create an `MKPinAnnotationView` and animate its display on the map. The animation
    will make the pin look like it''s falling from the sky and dropping into place
    on the map:'
  trans: "\n# futuretap 的 `FTLocationSimulator`\n\n您可以通过以下 URL 获取 `FTLocationSimulator`：\n\
    \n`https://github.com/futuretap/FTLocationSimulator`\n\n与 `iSimulate` 不同，`FTLocationSimulator`\
    \ 是嵌入到您应用中的代码，用于覆盖 `CLLocationManager`。`FTLocationSimulator` 通过读取您包含在应用中的 `.kml`\
    \ 文件中的坐标来生成位置信息。虽然设置过程稍显繁琐，且涉及一些代码需要讨论，但我们将为您逐步讲解。\n\n首先，您需要通过 Git 为 `FTLocationSimulator`\
    \ 源代码设置一个子模块：\n\n```\n$ git submodule add git://github.com/futuretap/FTLocationSimulator.git\
    \ FTLocationSimulator\n```\n\n然后，在子模块的 `FTLocationSimulator` 目录中，将 `FTLocationSimulator`\
    \ 文件夹拖拽到您的 Xcode 项目中。接下来，在项目目标中添加以下附加链接器标志：`-licucore`。最后一步是调整您的代码，使其在定义了 `FAKE_CORE_LOCATION`\
    \ 时创建并使用 `FTLocationSimulator` 实例，而非 `CLLocationManager`：\n\n```\n#ifdef FAKE_CORE_LOCATION\n\
    \     self.locationManager =\n          [[[FTLocationSimulator alloc] init] autorelease];\n\
    \ #else\n     self.locationManager =\n          [[[CLLocationManager alloc] init]\
    \ autorelease];\n #endif\n```\n\n`FAKE_CORE_LOCATION` 定义在 `FTLocationSimulator.h`\
    \ 中，当目标环境为 iOS 模拟器时，其默认值为 `1`：\n\n```\n#if TARGET_IPHONE_SIMULATOR\n#define FAKE_CORE_LOCATION\
    \ 1\n#endif\n```\n\n如前所述，`FTLocationSimulator` 会覆盖 `CLLocationManager`。因此，如果定义了\
    \ `FAKE_CORE_LOCATION` 并调用了 `startUpdatingLocation`，则会调用 `FTLocationSimulator`\
    \ 的 `startUpdatingLocation` 方法。此方法会调用 `FTLocationSimulator` 的 `fakeNewLocation`，后者会从包含的\
    \ `fakeLocations.kml` 文件中读取新位置，并在更新间隔后再次调用自身：\n\n```\n- (void)startUpdatingLocation\
    \ {\n        updatingLocation = YES;\n        [self fakeNewLocation];\n}\n```\n\
    \n您可以在 `FTLocationSimulator.h` 中更改更新间隔：\n\n```\n#define FAKE_CORE_LOCATION_UPDATE_INTERVAL\
    \ 0.3\n```\n\n您还可以创建自己的 `.kml` 文件，或更新 `fakeLocations.kml` 中的坐标。我们建议您深入了解如何生成 `.kml`\
    \ 文件。谷歌提供了一些工具，可帮助您轻松生成这些文件，从而辅助您的测试。\n\n## MapKit\n\n在处理位置信息时，能够可视化当前状态极为有用。因此，我们将介绍\
    \ iOS 中可用的另一个框架：MapKit。MapKit 提供的主要类是 `MKMapView`。`MKMapView` 使得在应用中集成地图变得异常简单。要查看其实际效果，请打开本章示例项目中的\
    \ `MapViewController.m` 文件。在 `MapViewController` 的 `loadView` 方法中，我们只需创建一个带有指定矩形的\
    \ `MKMapView` 对象，将自身设置为 `MKMapViewDelegate`，通过将 `showUserLocation` 属性设为 `YES`\
    \ 来指示 `MKMapView` 在地图上显示当前位置，然后将其添加到视图控制器的视图中：\n\n```\n- (void)loadView {\n  \
    \  [super loadView];\n\n     CGRect rect = CGRectMake(0.0f, 0.0f, 320.0f, 411.0f);\n\
    \     MKMapView *mapView = [[MKMapView alloc] initWithFrame:rect];\n     mapView.delegate\
    \ = self;\n     mapView.showsUserLocation = YES;\n\n     [self.view addSubview:mapView];\n\
    \     [mapView release];\n}\n```\n\n请注意，由于我们将自身设为 `MKMapView` 的委托，因此需要在 `MapViewController.h`\
    \ 中将 `MapViewController` 声明为 `MKMapViewDelegate`：\n\n```\n@interface MapViewController\
    \ : UIViewController <MKMapViewDelegate> {\n\n} @end\n```\n\n此外，不要忘记将您的应用与 MapKit\
    \ 框架进行链接（参见图 9–23）。\n\n**图 9–23.** *链接到 MapKit 框架。*\n\n我们还需要实现 `MKMapViewDelegate`\
    \ 中的几个方法；但在描述这些方法之前，需要先讨论标注这一主题。标注涉及的内容很多，因此我们不会深入探讨。简而言之，标注是可视元素，例如可以放置在 `MKMapView`\
    \ 上的图钉。在图 9–24 中，我们为地图上的一个位置点添加了一个标注，并将其表示为图钉。\n\n**图 9–24.** *在地图上显示图钉。*\n\n\
    在地图上添加此标注的代码位于 `MKMapViewDelegate` 的 `mapView:didUpdateUserLocation:` 方法实现中。每当地图显示来自\
    \ CoreLocation 框架的更新位置时，就会调用此方法。由于我们在 `MKMapView` 上设置了 `showsUserLocation` 为 `YES`，并且正在模拟位置更新，因此会调用此委托方法。为简单起见，我们通过\
    \ `MKMapView` 的 `addAnnotation:` 方法，将接收到的第一个位置作为 `MKPointAnnotation`（一种预定义的标注类型）添加。我们还使用\
    \ `LocationController` 的 `registerRegion:` 方法，围绕这个初始位置注册一个区域：\n\n```\n- (void)mapView:(MKMapView\
    \ *)mapView didUpdateUserLocation:\n(MKUserLocation *)userLocation\n{\n    static\
    \ int once = 0;\n    if (0 == once) {\n        once = 1;\n\n        // 创建图钉标注\n\
    \        MKPointAnnotation *annotation = [[MKPointAnnotation alloc] init];\n \
    \       annotation.coordinate = userLocation.coordinate;\n        [mapView addAnnotation:annotation];\n\
    \        [annotation release];\n\n        [locationController registerRegion:userLocation.coordinate];\n\
    \    }\n\n    NSLog(@\"didUpdateUserLocation\");\n}\n```\n\n在 `MKMapView` 上显示标注分为两步。首先，我们将标注添加到\
    \ `MKMapView`（如上述代码所示）。其次，我们提供一个负责显示标注的标注视图。当 `MKMapView` 确定需要显示标注时，它会调用其委托的 `mapView:viewForAnnotation:`\
    \ 方法。在下面的代码中，您将看到，如果 `MKMapView` 请求的是 `MKPointAnnotation` 的视图，我们会创建一个 `MKPinAnnotationView`，并使其在地图上以动画形式显示。该动画会使图钉看起来如同从天而降，最终落定在地图上的相应位置。\n"
- fmt: "- (MKAnnotationView *)mapView:(MKMapView *)mapView\n            viewForAnnotation:(id\
    \ <MKAnnotation>)annotation {\n\n    if ([annotation isMemberOfClass:[MKUserLocation\
    \ class]]) {\n#ifdef FAKE_CORE_LOCATION\n        //get the app delegate's location\
    \ manager;return it's fake user\n        //location view\n        return locationController.locationManager.fakeUserLocationView;\n\
    #else\n        return nil;\n#endif\n    } else {\n        if ([annotation isKindOfClass:[MKPointAnnotation\
    \ class]]) {\n            // Try to dequeue an existing pin view first.\n    \
    \        MKPinAnnotationView *pinView =\n            (MKPinAnnotationView*)[mapView\n\
    \            dequeueReusableAnnotationViewWithIdentifier:@”PinView”];\n      \
    \      if (!pinView) {\n                // If an existing pin view was not available,\
    \ create one.\n                pinView = [[[MKPinAnnotationView alloc]\n     \
    \           initWithAnnotation:annotation\n                      reuseIdentifier:@\"\
    PinAnnotation\"] autorelease];\n                pinView.pinColor = MKPinAnnotationColorRed;\n\
    \                pinView.animatesDrop = YES;\n            } else {\n         \
    \       pinView.annotation = annotation;\n            }\n\n            return\
    \ pinView;\n        }\n    }\n\n    // code to create views for other annotations\n\
    \    return nil;\n}\n\nThis code is also checking for `MKUserLocation` annotations.\
    \ We won't go into too much detail here, but you should note that the `FTLocationSimulator`\
    \ class that we discussed earlier is designed to show the user's location moving\
    \ along the map by providing an `MKAnnotationView` for the map. You can see this\
    \ in action in `FTLocationSimulator`'s `fakeUserLocationView` method:\n\n- (MKAnnotationView*)fakeUserLocationView\
    \ {\n    if (!self.mapView) {\n        return nil;\n    }\n\n    [self.mapView.userLocation\
    \ setCoordinate:self.location.coordinate];\n    MKAnnotationView *userLocationView\
    \ = [mapView\n       dequeueReusableAnnotationViewWithIdentifier:@\"fakeLocationView\"\
    ];\n    if (nil == userLocationView) {\n        userLocationView = [[MKAnnotationView\
    \ alloc]\n                           initWithAnnotation:self.mapView.userLocation\n\
    \                              reuseIdentifier:@\"fakeLocationView\"];\n    }\n\
    \    UIImage *image = :[UIImage imageNamed:@\"TrackingDot.png\"];\n    UIImageView\
    \ *imageView =\n                [[UIImageView alloc] initWithImage:image];\n \
    \   [userLocationView addSubview:imageView];\n    [imageView release];\n     userLocationView.centerOffset\
    \ = CGPointMake(-10, -10);\n     return userLocationView;\n}\n\nThe final piece\
    \ of the puzzle that we need to implement is the code that handles what happens\
    \ when the user selects an annotation on the map. When this happens, `MKMapView`\
    \ calls its delegate's `mapView:didSelectAnnotationView:` method. We will use\
    \ this method in our Facebook example to show how to check in a user to a place.\
    \ Let's take a look at that now.\n\n## Facebook Places (Search), Check-ins (Getting\
    \ and Posting), and Friends Nearby\n\nWithin the Facebook app itself, checking\
    \ into Places is done via the Nearby screen, which automatically searches for\
    \ Places near your current location. If permission to use location services has\
    \ not been granted to the Facebook application, it displays the following screen\
    \ (see [Figure 9–25](#Chapter09.html#fig_9_25)).\n\n![images](images/0925.jpg)\n\
    \n**Figure 9–25.** *Location unavailable in the Check-Ins section of the Facebook\
    \ iOS application*\n\nAssuming that permission to use location services has been\
    \ granted to the Facebook application, you will see a list of returned place matches\
    \ (see [Figure 9–26](#Chapter09.html#fig_9_26)), as well as detailed information\
    \ for a place. This is how the Facebook application lets its user community manage\
    \ places. A Place profile (which is essentially similar to a Facebook Page) is\
    \ shown in [Figure 9–27](#Chapter09.html#fig_9_27); users can act upon places\
    \ in the ways shown in [Figure 9–28](#Chapter09.html#fig_9_28).\n\n![images](images/0926.jpg)\n\
    \n**Figure 9–26.** *Searching for nearby places and events in Facebook's iOS application*\n\
    \n![images](images/0927.jpg)\n\n**Figure 9–27.** *Detailed information about a\
    \ place in Facebook's iOS application*\n\n![images](images/0928.jpg)\n\n**Figure\
    \ 9–28.** *Flag a place in Facebook's iOS application.*\n\nWithin our sample app,\
    \ we want to make it possible to let someone check into a place on Facebook. Recall\
    \ that we set up our application to display a pin on the map. When the pin is\
    \ selected by the user, `MKMapViewDelegate`'s `mapView:didSelectAnnotationView:`\
    \ method is called. In our implementation of this in `MapViewController`, we issue\
    \ a search request to Facebook to ask for a list of places around the location\
    \ of the annotation. To issue a search request to Facebook, we simply set the\
    \ graph path for Facebook's `requestWithGraphPath:andParams:andDelegate:` method\
    \ to `search`. The additional parameter to supply is a dictionary with values\
    \ for `type`, `center`, and `distance` keys. The `MapViewController` class is\
    \ an `FBRequestDelegate`, so we supply it as the delegate:\n\n```\n- (void)mapView:(MKMapView\
    \ *)mapView\n    didSelectAnnotationView:(MKAnnotationView *)view\n{\n    NSString\
    \ *centerString = [NSString stringWithFormat: @\"%f,%f\",\n        view.annotation.coordinate.latitude,\n\
    \        view.annotation.coordinate.longitude];\n\n    NSMutableDictionary *params\
    \ =\n                [NSMutableDictionary dictionaryWithObjectsAndKeys:\n    \
    \            @\"place\", @\"type\",\n                centerString, @\"center\"\
    ,\n                @\"1000\", @\"distance\", // In Meters (1000m = 0.62mi)\n \
    \            nil];\n\n    [facebook requestWithGraphPath:@\"search\"\n       \
    \                  andParams:params\n                       andDelegate:self];\n\
    }\n```\n\nWhen the `FBRequestDelegate`'s `request:didLoad:` is called, the result\
    \ parameter is a dictionary with an array of place dictionaries. Each `place`\
    \ dictionary has an id; a category; a name; and a `location` dictionary with a\
    \ city, country, state, latitude, and longitude:\n\n```\n{\n    data =     (\n\
    \                {\n            category = \"Local business\";\n            id\
    \ = 151247078226083;\n            location =             {\n                city\
    \ = \"Monta Vista\";\n                country = \"United States\";\n         \
    \       latitude = \"37.3316086\";\n                longitude = \"-122.05885\"\
    ;\n                state = CA;\n            };\n            name = \"Somerset\
    \ Square Park\";\n        }\n        );\n}\n```\n\nIn the following code, we take\
    \ the first match from the array of dictionaries in the result and post a check-in\
    \ to Facebook via this graph path:\n\n```\n\"me/checkins\"\n```"
