    ### Conclusion


    This is a time after a rush. Web developers have flocked to the Twitter and Facebook
    APIs, and iOS developers are following after them. But the influx has caused the
    management of these platforms to become conservative as they try to protect and
    sustain their growth. No one wants to derail a good thing, and the platforms have
    constructed a schema of rules and terms that ensure no one can sully their name
    but themselves.


    This is not a death sentence for the creativity of developers and designers. Rather,
    it forces them to create apps that add real value to the platform. We encourage
    you to think of ways to use Facebook and Twitter that haven''t been done—or haven''t
    been done right, previously. And when you hit upon a unique experience with an
    audience you know, you need to design visual assets that reflect the personality
    of your app. In the App Store, looks aren''t everything. They''re merely *almost*
    everything.


    ## Index


